# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: rent_price_controls_building_permits_eu_panel
version: 1
status: candidate
topic: housing
claim_direction: "-"
claim: >
  Stricter rent-price controls predict slower residential building-permit
  growth in European country panels. The market mechanism is that binding rent
  ceilings reduce expected returns to new rental housing and maintenance; the
  redistribution counterclaim is that rent controls can transfer surplus to
  tenants without reducing future supply.
evidence_type: associational
sample:
  countries: [AUT, BEL, BGR, CHE, CYP, CZE, DEU, DNK, ESP, EST, FIN, FRA, GRC, HRV, HUN, IRL, ISL, ITA, LTU, LVA, NLD, NOR, POL, PRT, ROU, SVK, SVN, SWE]
  period: [2000, 2024]
  temporal_structure: panel
  exclusion_rules:
    - drop countries without rent-control coding or building-permit data
    - drop country-years with wartime or disaster-driven construction collapses
    - retain only panels with at least 8 usable annual observations
scope:
  period: [2000, 2024]
  countries: [EU]
  outcome_dim: [housing, regulation_compliance_cost]
  policy_family: [housing_policy, regulation]
  treatment_tags: [rent_control, price_controls, building_permits]
variables:
  outcome:
    - name: residential_building_permits_index_growth
      source: eurostat:bldg_pi_lt
      transformation: annual_log_change
      notes: Eurostat residential building-permit index, transformed to annual log growth.
    - name: housing_cost_overburden_rate
      source: eurostat:ilc_lvho07a
      transformation: level
      notes: Secondary tenant-burden outcome; not part of the primary falsification rule.
  treatment:
    - name: rent_control_intensity
      source: constructed:european_rent_control_index
      transformation: level
      notes: Country-year coding of rent caps, rent freezes, and renewal restrictions, to be documented at replication time.
  controls:
    - name: log_gdp_pc
      source: world_bank_wdi:NY.GDP.PCAP.KD
      transformation: log
    - name: population_growth
      source: world_bank_wdi:SP.POP.GROW
      transformation: level
    - name: real_interest_rate
      source: world_bank_wdi:FR.INR.RINR
      transformation: level
    - name: rule_of_law
      source: wgi:RL.EST
      transformation: level
mechanism_measurement:
  mechanism_type: rent_control
  design_features:
    - panel_fe_screen
    - controlled_vs_uncontrolled_units
    - welfare_accounting
    - distributional_decomposition
  comparison_structure:
    treated_units:
      - European country-years with rent caps, freezes, or renewal restrictions
    control_units:
      - European country-years without binding rent controls
    controlled_or_regulated_units:
      - rent-regulated incumbent tenancies
    exempt_or_uncontrolled_units:
      - new construction exemptions where applicable
      - market-rate rentals outside regulated segments
    time_frequency: annual
    notes: >
      The current design is an annual country-panel screen. It cannot by
      itself distinguish regulated units from exempt units or identify city
      leakage channels.
  causal_layers:
    - layer: first_order_price_or_transfer
      mechanism: Regulated tenants may receive lower rent growth or lower housing-cost burden.
      variable_names: [housing_cost_overburden_rate]
      candidate_sources:
        - eurostat:ilc_lvho07a
        - EU-SILC tenure-specific housing-cost microdata
      measurement_status: data_gap
      required_for_dispositive_verdict: true
    - layer: second_order_supply_response
      mechanism: Lower expected rental returns reduce permits, completions, and private rental stock growth.
      variable_names: [residential_building_permits_index_growth]
      candidate_sources:
        - eurostat:bldg_pi_lt
        - national building-permit and completion registers
      measurement_status: data_gap
      required_for_dispositive_verdict: true
    - layer: leakage_or_substitution
      mechanism: Owners substitute into owner-occupation, furnished rentals, tourist rentals, or exempt newbuild.
      variable_names: []
      candidate_sources:
        - Eurostat tenure-share panels
        - national cadastral tenure transitions
        - short-term rental registries
      measurement_status: data_gap
      required_for_dispositive_verdict: true
    - layer: quality_margin
      mechanism: Regulated stock may receive less maintenance or investment.
      variable_names: []
      candidate_sources:
        - EU-SILC housing deprivation by tenure
        - national maintenance expenditure surveys
      measurement_status: data_gap
      required_for_dispositive_verdict: true
    - layer: distributional_incidence
      mechanism: Incumbent regulated tenants and new entrants can move in opposite directions.
      variable_names: []
      candidate_sources:
        - EU-SILC tenure-income microdata
        - national rental contract duration panels
      measurement_status: data_gap
      required_for_dispositive_verdict: true
  distributional_groups:
    - incumbent_beneficiaries
    - new_entrants
    - uncovered_consumers
    - suppliers
    - future_cohorts
  welfare_accounting:
    first_order_transfer: regulated rent discount times covered rental quantity
    deadweight_loss: foregone rental supply and moves
    quality_loss: maintenance or deprivation gap for regulated stock
    search_or_queue_cost: vacancy, waitlist, and time-to-lease measures where available
    future_supply_loss: discounted permit and completion shortfall
    net_welfare_formula: tenant_transfer - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    Even if the country-panel coefficient becomes significant, this spec
    should not be promoted as dispositive until the regulated/exempt and
    distributional layers are measured.
intervention_channel: regulatory
intervention_channel_justification: >
  Rent controls are regulatory price ceilings in the housing market.
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Two-way fixed effects with country-clustered errors. The overburden-rate
    outcome is reported separately because rent controls can lower measured
    incumbent rents while reducing supply for future tenants.
falsification:
  rule: >
    SUPPORTED if rent_control_intensity is negative for residential
    building-permit growth at p<=0.10 with at least 150 observations and 15
    countries. REFUTED if rent_control_intensity is positive at p<=0.10 under
    the same sample floor. Otherwise PARTIAL or INCONCLUSIVE depending on data
    coverage.
  test: panel_fe_rent_price_controls_building_permits_eu_panel
  threshold:
    expected_sign: "-"
    p_max: 0.10
    min_observations: 150
    min_countries: 15
prior_confidence: 0.60
disclosure: >
  The author expects binding price ceilings to reduce supply, but European
  rent-control regimes differ sharply in exemptions, new-build treatment, and
  enforcement. The candidate should not be read as assuming all tenant
  protections have the same supply effect.
steelman: hypotheses/steelman/rent_price_controls_building_permits_eu_panel.md
notes: >
  Eurostat and WDI are ready publishers. The main blocker for a runnable
  replication is transparent construction of the rent-control intensity index.

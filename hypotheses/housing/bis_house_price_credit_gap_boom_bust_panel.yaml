# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: bis_house_price_credit_gap_boom_bust_panel
version: 1
status: candidate
topic: housing
claim: House-price booms reverse more sharply when paired with high BIS credit gaps.
evidence_type: associational
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CZE
  - DEU

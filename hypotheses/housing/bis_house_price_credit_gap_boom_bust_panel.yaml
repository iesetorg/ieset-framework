  - SAU
  - SGP
  - SWE
  - THA
  - TUR
  - USA
  - ZAF
  period:
  - 1970
  - 2025
  temporal_structure: panel
  exclusion_rules:
  - drop country-years or country-quarters missing the predeclared BIS treatment
  - drop rows missing the WDI outcome or controls
  - require forward outcome coverage before evaluating the row
variables:
  outcome:
  - name: fwd_real_house_price_growth_12q
    source: constructed from local BIS/WDI vintages
    transformation: forward_change_or_forward_average
  treatment:
  - name: credit_gap_x_house_price_boom
    source: bis:WS_CREDIT_GAP; bis:WS_DSR; bis:WS_SPP; world_bank_wdi
    transformation: threshold_or_interaction_predeclared_in_runner
  controls:
  - name: credit_gap
    source: world_bank_wdi or BIS local vintage
    transformation: level
  - name: lag_real_house_price_growth_8q
    source: world_bank_wdi or BIS local vintage
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Compact panel screen with country and calendar-year fixed effects. Standard
    errors clustered by country.
falsification:
  rule: Supported only if the coefficient on credit_gap_x_house_price_boom and the
    raw treated-control contrast clear the predeclared direction and magnitude gates.
  test: bis_house_price_credit_gap_boom_bust_panel
  threshold: '{"coef_max": -2.0, "mean_diff_max": -2.0, "min_countries": 20, "min_observations":
    600, "p_max": 0.1}'
prior_confidence: 0.58
disclosure: This is a predictive panel screen, not a structural causal estimate.
steelman: hypotheses/steelman/bis_house_price_credit_gap_boom_bust_panel.md
scope:
  period:
  - 1970

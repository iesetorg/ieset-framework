# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: land_use_regulation_real_wage_drag
version: 1
status: candidate
topic: housing
claim: Stricter land-use regulation proxies predict weaker real disposable wage and income gains via housing
  costs.
methodology_note: Promoted from the 200-item long-horizon market/QOL backlog as a local-data first-pass
  screen.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1996
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - housing
  - wage_stagnation
  policy_family:
  - housing_policy
  - regulation
  treatment_tags:
  - land_use_regulation
  - real_wage_drag
variables:
  outcome:
  - name: qol_or_prosperity_outcome
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: level_or_growth_proxy
  treatment:
  - name: market_or_intervention_proxy
    source: bis:WS_SPP
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local-data first-pass TWFE screen; upgrade to exact outcome/treatment datasets before scoreboard
    promotion.
falsification:
  rule: SUPPORTED if the treatment coefficient has the predicted sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_land_use_regulation_real_wage_drag
  threshold: p<0.10 with pre-registered sign
prior_confidence: 0.55
disclosure: These are proxy-first QOL screens. They are intended to identify promising evidence, not to
  settle causal claims without robustness checks.
steelman: hypotheses/steelman/land_use_regulation_real_wage_drag.md

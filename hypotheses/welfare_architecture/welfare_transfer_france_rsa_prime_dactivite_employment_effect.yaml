# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: welfare_transfer_france_rsa_prime_dactivite_employment_effect
version: 1
status: candidate
topic: welfare_architecture
claim: |
  France's RSA (Revenu de Solidarité Active 2009, replacing RMI + API) and Prime d'Activité (2016,
  replacing RSA-activité + PPE) lowered the participation tax rate on low-wage work and raised employment
  among low-education beneficiaries by 2 to 4 percentage points relative to a synthetic-control donor
  pool of EU peers without comparable reforms (BEL, ITA, ESP, PRT) over five-year post-reform windows.
evidence_type: causal
prior_confidence: 0.5
disclosure: |
  Author has market-liberal priors that favour in-work transfer programmes over passive transfers; the
  synthetic-control donor pool is selected for similarity rather than to favour the predicted direction.
  Identification depends on the assumption that France's labour-market trajectory absent RSA/PA would
  track the donor-pool weighted average.
sample:
  countries: [FRA, BEL, ITA, ESP, PRT, DEU, NLD]
  period: [2000, 2022]
  temporal_structure: panel
  exclusion_rules:
  - exclude 2008-2009 GFC trough years from pre-treatment fit
  - exclude 2020-2021 COVID years from primary post-window
variables:
  outcome:
  - name: employment_rate_low_education
    source: eurostat:lfsa_ergaedn
    transformation: level_pct
    notes: Eurostat LFS employment rate, ISCED 0-2.
  - name: working_poor_rate
    source: eurostat:ilc_iw01
    transformation: level_pct
  treatment:
  - name: rsa_pa_indicator
    source: eurostat:lfsa_ergaedn
    transformation: indicator
    notes: FRA = 1 from 2009 (RSA) and 2016 (PA); 0 for donor pool.
  controls:
  - name: gdp_per_capita_real
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: unemployment_rate
    source: eurostat:une_rt_a
    transformation: level
  - name: minimum_wage_relative_median
    source: oecd:DSD_EARNINGS@DF_MIN_REL_MED
    transformation: level
intervention_channel: fiscal
intervention_channel_justification: |
  RSA and Prime d'Activité are fiscal-channel cash transfers with regulatory eligibility rules.
estimator:
  template: synthetic_control
  clustering: country
  fixed_effects: [country, year]
  notes: |
    Synthetic control on FRA with BEL, ITA, ESP, PRT, DEU, NLD donor pool. Pre-treatment fit 2000-2008.
    Two treatment events (RSA 2009 and PA 2016) tested as separate synthetic-control runs and as a
    combined event window 2009-2022.
falsification:
  rule: |
    Refuted if the synthetic-control gap on low-education employment rate at five-year horizon is below
    +2pp, OR if placebo permutation p-value exceeds 0.10, OR if working-poor rate gap is positive
    (deteriorates) at five-year horizon.
  test: synthetic_control_5yr_gap_employment_low_education
  threshold: gap >= +2pp at 5yr horizon AND placebo_p < 0.10 AND working_poor_gap <= 0
scope:
  period: [2009, 2022]
  countries: [FRA, BEL, ITA, ESP, PRT, DEU, NLD]
  outcome_dim: [employment_labour, welfare_state, poverty_inequality]
  policy_family: [welfare_architecture, labour_market, tax_policy]
  treatment_tags: [france_rsa_2009, france_prime_activite_2016, sarkozy_2007, hollande_2012]
steelman: hypotheses/steelman/welfare_transfer_france_rsa_prime_dactivite_employment_effect.md

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: welfare_transfer_india_mgnrega_pmkisan_combined
version: 1
status: candidate
topic: welfare_architecture
claim: |
  India's combined rural transfer architecture — MGNREGA (2006 employment guarantee, 100 days at
  state-minimum-wage) and PM-KISAN (2019 unconditional cash transfer of INR 6000/year to small farmers)
  — produced complementary rural-poverty effects, with MGNREGA delivering wage-floor and consumption-
  smoothing channels and PM-KISAN delivering targeted-input-finance channel, identified off staggered
  rollout cohorts and combined-treatment intensity in the panel of Indian states 2006-2024.
evidence_type: causal
prior_confidence: 0.6
disclosure: |
  Author views MGNREGA as well-evidenced (Imbert-Papp 2015, Muralidharan 2017) and PM-KISAN as a
  newer programme with thinner causal evidence. Hypothesis tests the complementary-channels claim
  rather than additive-effects claim; identification depends on the staggered rollout and intensity
  variation.
sample:
  countries: [IND]
  period: [2002, 2024]
  temporal_structure: panel
  exclusion_rules:
  - exclude 2020-Q2 COVID rural-return-migration shock from primary identification window
  - exclude state-years with eligibility-data quality issues per CAG audit
variables:
  outcome:
  - name: rural_poverty_headcount
    source: world_bank_wdi:SI.POV.RUHC
    transformation: level_pct
  - name: rural_real_wage_index
    source: ilostat:ILMS_wages
    transformation: log
  - name: rural_consumption_per_capita
    source: world_bank_wdi:NE.CON.PRVT.PC.KD
    transformation: log
  treatment:
  - name: mgnrega_intensity
    source: world_bank_wdi:SI.POV.RUHC
    transformation: level
    notes: State-year MGNREGA person-days per rural household; placeholder pending NREGA-MIS wiring.
  - name: pmkisan_coverage
    source: world_bank_wdi:SI.POV.RUHC
    transformation: ratio
    notes: State-year PM-KISAN beneficiary share of small-farmer households; placeholder pending PM-KISAN-MIS wiring.
  controls:
  - name: gdp_per_capita_real
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rainfall_anomaly
    source: world_bank_wdi:AG.LND.PRCP.MM
    transformation: level
  - name: agricultural_output_index
    source: world_bank_wdi:AG.PRD.CROP.XD
    transformation: log
intervention_channel: bundled
intervention_channel_justification: |
  MGNREGA combines fiscal cash-for-work with regulatory employment-guarantee; PM-KISAN is fiscal
  cash-transfer. Combined channel is bundled.
estimator:
  template: did_callaway_santanna
  clustering: state
  fixed_effects: [state, year]
  notes: |
    Callaway-Sant'Anna staggered DiD on Indian states using MGNREGA Phase-1 (2006 200 districts), Phase-2
    (2007 130 districts), Phase-3 (2008 universal) cohorts and PM-KISAN 2019 universal launch. Decomposition
    by channel via separate intensity coefficients.
falsification:
  rule: |
    Refuted if the combined ATT on rural-poverty at 5-year horizon is below minus-3pp, OR if the
    MGNREGA-channel coefficient and PM-KISAN-channel coefficient are not both individually negative
    on poverty (i.e., complementary-channels claim requires both contribute), OR if Wald test of joint
    significance has p > 0.10.
  test: did_cs_5yr_combined_channels_rural_poverty
  threshold: combined_att <= -3pp at 5yr AND mgnrega_coef < 0 AND pmkisan_coef < 0 AND wald_p < 0.10
scope:
  period: [2006, 2024]
  countries: [IND]
  outcome_dim: [poverty_inequality, welfare_state, employment_labour]
  policy_family: [welfare_architecture, labour_market]
  treatment_tags: [india_mgnrega_2006, india_pmkisan_2019, upa_government, modi_government]
steelman: hypotheses/steelman/welfare_transfer_india_mgnrega_pmkisan_combined.md

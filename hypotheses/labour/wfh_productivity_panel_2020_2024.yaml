# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: wfh_productivity_panel_2020_2024
version: 1
status: candidate
topic: labour
claim: Across OECD economies 2020-2024, sector-level work-from-home adoption is uncorrelated or
  weakly positively correlated with sector-level labour-productivity growth — i.e. WFH is roughly
  productivity-neutral once compositional and selection effects are controlled, contradicting both
  strong-boost (Bloom) and strong-drag (Mortensen) priors.
notes: Tests the WFH-productivity wash hypothesis on OECD STAN / EU KLEMS sector-level productivity
  panel against ILOSTAT / OECD telework adoption. Identification is weak — relies on cross-sector,
  cross-country variation and pre-COVID trend controls.
prior_confidence: 0.55
disclosure: Author is uncertain on direction; market-liberal priors slightly favour the boost
  reading (revealed preference of firms allowing WFH) but cross-sector productivity measurement
  in services is notoriously noisy and 2020-2022 measured productivity is contaminated by
  composition effects (low-productivity workers exited the labour force first).
steelman: hypotheses/steelman/wfh_productivity_panel_2020_2024.md
evidence_type: associational
falsification:
  rule: >-
    OECD/EU country-sector panel 2019-2024. Run sector-level labour-productivity
    growth (real value-added per hour) on telework-adoption rate with country
    and sector fixed effects, plus pre-COVID productivity-trend control.
    SUPPORTED if the coefficient on telework-adoption rate is in [-0.3, +0.5]
    pp per 10pp WFH-share with p>0.10 (i.e. cannot reject zero in either
    direction). REFUTED if coefficient is outside [-1.0, +1.0] pp at p<0.05
    (i.e. evidence of strong effect in either direction).
  test: oecd_panel_wfh_productivity_pooled_fe_2020_2024
  threshold: >-
    SUPPORTED: |beta_wfh| < 0.5 pp per 10pp WFH share AND p>0.10.
    REFUTED: |beta_wfh| > 1.0 pp per 10pp WFH share AND p<0.05.
scope:
  period: [2019, 2024]
  countries: [OECD, USA, GBR, DEU, FRA, ITA, ESP, NLD, SWE, JPN, KOR, AUS, CAN]
  outcome_dim: [productivity, employment_labour]
  policy_family: [labour_market]
  treatment_tags: [wfh_adoption, post_covid_reallocation, telework_panel]
sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, NLD, SWE, JPN, KOR, AUS, CAN, FIN, DNK, BEL, AUT, IRL, PRT]
  period: [2019, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "drop country-sectors with <50 obs in pre-COVID baseline"
    - "drop 2020Q2 from primary; sensitivity check including it"
variables:
  outcome:
    - name: labour_productivity_growth
      source: "oecd:OECD.SDD.STA,DSD_PDB@DF_PDB_LV,1.0"
      transformation: pct_change_yoy
      notes: OECD productivity database; real value-added per hour worked, sector level.
    - name: real_value_added_per_worker
      source: "world_bank_wdi:NV.IND.MANF.KD; world_bank_wdi:NV.SRV.TOTL.KD"
      transformation: log_per_worker
  treatment:
    - name: telework_share
      source: "ilostat:EMP_TEMP_SEX_AGE_GEO_NB; oecd:OECD.SDD.TPS,DSD_LFS@DF_LFS_TELEWORK,1.0"
      transformation: level_pct
      notes: Share of employed teleworking, ILOSTAT survey + OECD LFS module post-2020.
    - name: covid_pandemic_indicator
      source: "constructed: 0 pre-2020Q2, 1 from 2020Q2 onward"
      transformation: indicator
  controls:
    - name: pre_covid_productivity_trend_2015_2019
      source: "derived: country-sector 2015-2019 mean productivity growth"
      transformation: level
    - name: gdp_growth
      source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
      transformation: level
    - name: ict_capital_share
      source: "oecd:OECD.SDD.NAD,DSD_NAAG@DF_NAAG_KAPITAL,1.0"
      transformation: level_pct
estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, sector, year]
  notes: >
    Two-way FE on country-sector panel with year effects. WFH coefficient
    identified off cross-sector variation in WFH-feasibility post-2020
    interacted with country-level adoption intensity. Threshold designed
    to make the null (WFH wash) the supported case and either strong
    direction the refutation.

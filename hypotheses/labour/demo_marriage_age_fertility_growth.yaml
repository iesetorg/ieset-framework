# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: demo_marriage_age_fertility_growth
version: 1
status: candidate
topic: labour
claim: >-
  Across countries 1980-2023, rising age at first marriage is associated with declining
  total fertility rate, and through that channel, with shifts in working-age trajectories
  that propagate to per-capita growth 25-30 years later. The hypothesis predicts (a) panel
  association between mean age at first marriage and TFR is negative, (b) the marriage-age-
  to-TFR relationship is partly mediated by female tertiary attainment, and (c) implied
  long-run per-capita growth contribution via working-age share is detectable but small
  (<0.2pp annualised) on its own.
evidence_type: associational
sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, JPN, KOR, CAN, AUS, NLD, SWE, NOR, DNK, FIN, CHE, BEL, AUT, IRL, NZL, IND, IDN, BRA, MEX, TUR, THA, PHL, POL, HUN, CZE]
  period: [1980, 2023]
  temporal_structure: panel
scope:
  period: [1980, 2023]
  countries: [GLOBAL]
  outcome_dim: [demographics_migration, gdp_growth]
  policy_family: [none]
  treatment_tags: [marriage_age_rise, fertility_postponement]
variables:
  outcome:
    - name: total_fertility_rate
      source: world_bank_wdi:SP.DYN.TFRT.IN
      transformation: level
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
      transformation: level
  treatment:
    - name: mean_age_first_marriage_female
      source: un_desa:singulate_mean_age_marriage_female
      transformation: level
  decomposition_channels:
    - name: tertiary_attainment_female
      source: world_bank_wdi:SE.TER.CUAT.BA.FE.ZS
      transformation: level
    - name: female_lfp
      source: world_bank_wdi:SL.TLF.CACT.FE.ZS
      transformation: level
  controls:
    - name: gdp_per_capita_ppp
      source: world_bank_wdi:NY.GDP.PCAP.PP.KD
      transformation: log
estimator:
  template: panel_fe_decomposition
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Two-stage: stage-1 marriage-age → TFR (with female tertiary mediation); stage-2 implied
    TFR shift → working-age share at lag 25-30 → per-capita growth contribution.
falsification:
  rule: >-
    SUPPORTED if (a) coefficient on marriage age is negative on TFR at p<0.05, (b) female
    tertiary attainment absorbs at least 30% of the marriage-age coefficient on TFR (i.e.
    a substantial mediation share), AND (c) implied per-capita-growth contribution from
    marriage-age channel is non-zero in stage-2. REFUTED if any of (a)-(c) fails or
    mediation share by tertiary attainment is below 10%.
  test: panel_fe_decomp_marriage_age_fertility_growth
  threshold: "coef_marriage_age_on_tfr < 0 AND p < 0.05 AND tertiary_mediation_share >= 0.30"
prior_confidence: 0.6
disclosure: >-
  Marriage-age and tertiary attainment are highly collinear in this period; mediation
  share is sensitive to specification. Risk of misattribution between channels.
steelman: hypotheses/steelman/demo_marriage_age_fertility_growth.md

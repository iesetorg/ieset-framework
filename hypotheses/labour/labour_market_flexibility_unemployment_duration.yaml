notes: 'Data-gated on OECD EPL fetcher. Publisher oecd is status: ready but the EPL dataflow (OECD.ELS.EMP,DSD_EPL@DF_EPL) has not been confirmed via the standard fetcher path; v1 pre-registration commits
  the spec, first-run execution waits on EPL dataflow validation. Alternative specification using Fraser EFW labour-market-flexibility subcomponent (regulation of hiring and firing) as a secondary treatment
  is a v2 companion.

  '

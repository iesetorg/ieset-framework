hypothesis_id: labour_market_flexibility_employment_resilience
version: 1
status: draft
topic: labour
claim: Countries with more flexible labour markets show faster employment recovery
  after recessions than countries with strict employment protection.
evidence_type: associational
sample:
  countries: []
  period:
  - 1990
  - 2023
  temporal_structure: panel
scope:
  period:
  - 1990
  - 2023
  countries:
  - ALL
  outcome_dim: []
  policy_family: []
variables:
  outcome:
  - name: outcome_var
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  treatment:
  - name: treatment_var
    source: fraser_efw:summary_index
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: SUPPORTED if coefficient > 0 and p < 0.10
prior_confidence: 0.5

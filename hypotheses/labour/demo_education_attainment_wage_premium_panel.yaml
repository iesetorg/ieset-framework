# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: demo_education_attainment_wage_premium_panel
version: 1
status: candidate
topic: labour
claim: >-
  Across OECD countries 1995-2023, the tertiary-education wage premium (median wage of
  tertiary-attainment workers / median wage of upper-secondary workers) varies substantially
  cross-country, and is positively associated with rate of skill-biased technical change
  proxies (ICT capital share). The hypothesis predicts the cross-country average tertiary
  premium exceeds 1.4 and shows a small positive trend over the period despite massive
  tertiary-attainment expansion (refuting the "credential inflation" zero-trend prediction).
evidence_type: associational
sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, JPN, KOR, CAN, AUS, NLD, SWE, NOR, DNK, FIN, CHE, BEL, AUT, IRL, NZL, GRC, PRT, POL, HUN, CZE]
  period: [1995, 2023]
  temporal_structure: panel
scope:
  period: [1995, 2023]
  countries: [OECD]
  outcome_dim: [wage_stagnation, employment_labour]
  policy_family: [labour_market]
  treatment_tags: [tertiary_premium, skill_biased_change]
variables:
  outcome:
    - name: tertiary_wage_premium
      source: oecd:OECD.EDU.IMEP,DSD_EAG_EARNINGS@DF_EAG_EARNINGS,1.0
      transformation: ratio
      notes: OECD Education at a Glance tertiary-to-upper-secondary earnings ratio.
  treatment:
    - name: tertiary_attainment_share
      source: world_bank_wdi:SE.TER.CUAT.BA.ZS
      transformation: level
  controls:
    - name: gdp_per_capita_ppp
      source: world_bank_wdi:NY.GDP.PCAP.PP.KD
      transformation: log
    - name: unemployment_rate
      source: world_bank_wdi:SL.UEM.TOTL.ZS
      transformation: level
estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
falsification:
  rule: >-
    SUPPORTED if cross-country-cross-year average tertiary premium > 1.4 AND year fixed
    effects show non-negative trend (slope >= 0 with p > 0.05 for negative-trend rejection).
    REFUTED if average premium < 1.3 or year-FE slope significantly negative at p<0.05.
  test: panel_fe_tertiary_premium_with_trend_test
  threshold: "mean_premium >= 1.4 AND year_fe_slope >= 0"
prior_confidence: 0.7
disclosure: >-
  Goldin-Katz "race between education and technology" framework predicts roughly stable
  premium under matched expansion; sustained increase implies skill-biased change wins.
  Author's priors aligned with that framework.
steelman: hypotheses/steelman/demo_education_attainment_wage_premium_panel.md

hypothesis_id: labour_market_flexibility_employment_growth_panel
version: 1
status: candidate
topic: labour
claim: "In a broad-country panel 1990-2019, greater labour-market flexibility \u2014 measured by lower OECD EPL overall strictness, higher ease-of-hiring scores, and absence of centralized wage bargaining \u2014 predicts higher employment-to- population ratios and faster real GDP per capita growth, controlling for institutional quality, education, and trade openness. The directional claim is that a one-standard-deviation increase in flexibility predicts at least 1 percentage-point higher employment-to-population and 0.3 percentage points higher annual growth.\n"
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - BEL
  - AUT
  - SWE
  - NOR
  - DNK
  - FIN
  - IRL
  - CHE
  - PRT
  - GRC
  - JPN
  - CAN
  - AUS
  - NZL
  - KOR
  - ISR
  - EST
  - POL
  - CZE
  - HUN
  - CHL
  - MEX
  - TUR
  - COL
  - LVA
  - SVN
  - SVK
  - LTU
  - BGR
  - ROU
  - HRV
  period:
  - 1990
  - 2019
  temporal_structure: panel
  exclusion_rules:
  - drop country-years during severe recession (real GDP growth < -5%)
  - drop observations with missing EPL or employment data for more than 2 consecutive years
scope:
  period:
  - 1990
  - 2019
  countries:
  - OECD
  outcome_dim:
  - employment_labour
  - gdp_growth
  - regulation_compliance_cost
  policy_family:
  - labour_market
  - regulation
  treatment_tags:
  - labour_market_flexibility
  - employment_protection_legislation
  - hiring_ease
  - wage_bargaining
variables:
  outcome:
  - name: employment_to_population_ratio
    source: ilostat:EMP_2EMP_SEX_AGE_RT_A
    transformation: level
    notes: ILO employment-to-population ratio. Primary outcome.
  - name: real_gdp_per_capita_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: level
    notes: Annual real GDP per capita growth %. Secondary outcome.
  treatment:
  - name: epl_overall_strictness
    source: oecd:EPL_OV
    transformation: inverted_scale
    notes: OECD EPL overall strictness, inverted so higher = more flexible. Primary treatment.
  - name: labour_freedom_index
    source: heritage_efw:labor_freedom
    transformation: level
    notes: Heritage Foundation labour freedom sub-index as cross-check. Higher = more flexible.
  controls:
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: human_capital_index
    source: pwt:hc
    transformation: level
  - name: institutional_quality
    source: wgi:RL.EST
    transformation: level
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: working_age_population_share
    source: world_bank_wdi:SP.POP.1564.TO.ZS
    transformation: level
intervention_channel: regulatory
intervention_channel_justification: 'Labour-market flexibility is a regulatory-channel intervention that reduces hiring/firing costs and decentralises wage-setting.

  '
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: "Two-way FE panel: employment = \u03B20 + \u03B21*flexibility + controls + FE. Robustness: (1) exclude USA and UK (dominant flexible cases); (2) use 5-year non-overlapping averages; (3) instrument flexibility with lagged left-party government seat share; (4) separate permanent vs temporary worker EPL; (5) subsample by income level.\n"
falsification:
  rule: "SUPPORTED if \u03B21 (flexibility) is positive and significant at p<0.10 for both employment and GDP growth. PARTIAL if positive and significant for employment but not growth. REFUTED if \u03B21 is negative and significant at p<0.10. INFORMATIVE: excluding USA and UK should not eliminate the positive sign; if it does, the result is driven by Anglo-Saxon outliers.\n"
  test: panel_fe_labour_flexibility_employment_growth
  threshold: "\u03B2_flexibility (employment/pop) > 0 at p<=0.10  AND \u03B2_flexibility (GDP growth) > 0 at p<=0.10  AND Ex-USA-UK robustness retains positive sign.\n"
prior_confidence: 0.55
disclosure: 'Author has market-liberal priors that may overweight the flexibility- employment link. Prior is 0.55 because: (a) high-flexibility USA and UK dominate the cross-country correlation; (b) flexibility may increase employment turnover without raising job quality or wages; (c) coordinated bargaining systems (Germany, Nordic countries) achieve high employment without extreme flexibility. Framing risk: the hypothesis may be read as endorsing at-will employment for all countries; the spec tests only the average association across observed variation.

  '
steelman: hypotheses/steelman/labour_market_flexibility_employment_growth_panel.md
linked_hypotheses:
- employment_protection_youth_unemployment_long_run
- welfare_state_market_flexibility_complement
- demo_female_lfp_growth_panel
covers_claims: []

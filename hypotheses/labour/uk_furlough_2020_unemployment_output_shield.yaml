# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_furlough_2020_unemployment_output_shield
version: 1
status: pre_registered
topic: labour
claim: The UK furlough-era labour-market intervention coincided with a huge 2020 output
  collapse but contained unemployment and allowed output to return near its pre-pandemic
  level by late 2021.
evidence_type: canonical_case_multi_metric
sample:
  countries: &id002
  - GBR
  period: &id001
  - 2019
  - 2021
  temporal_structure: time_series
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - gdp_growth
  - employment_labour
  policy_family:
  - labour_market
  - fiscal_policy
  treatment_tags:
  - uk_furlough_2020
  - covid_shock_2020
variables:
  outcome:
  - name: real_gdp_cvm
    source: ons:ABMI
    transformation: quarterly level
  - name: unemployment_rate
    source: ons:MGSX
    transformation: quarterly percent
  treatment:
  - name: furlough_scheme
    source: 'constructed: Coronavirus Job Retention Scheme active from 2020-03'
    transformation: event indicator
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Compact national event-window replication from cached ONS/INE/BCRA vintages.
falsification:
  rule: 'SUPPORTED if at least 2 of 3 metrics pass: GDP falls by more than 15 percent
    into 2020Q2, unemployment remains below 6.5 percent through 2021Q4, and GDP is
    within 2 percent of 2019Q4 by 2021Q4. REFUTED if 1 or fewer pass.'
  test: uk_furlough_2020_output_unemployment_three_metric_window
  threshold: SUPPORTED if >= 2 metrics pass; REFUTED if <= 1 pass.
prior_confidence: 0.72
disclosure: The author's prior is sympathetic to job-retention schemes in pandemic
  shutdowns and may underweight selection from reopening and monetary/fiscal demand
  support.
steelman: hypotheses/steelman/uk_furlough_2020_unemployment_output_shield.md
canonical_metrics:
- metric_id: output_collapse
  description: Real GDP registered a historic lockdown fall.
  threshold: '>15% fall from 2019Q4 to 2020Q2'
  window: 2019Q4-2020Q2
  source: ons:ABMI
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: unemployment_contained
  description: Unemployment peak stayed far below the output shock magnitude.
  threshold: peak 2020Q4-2021Q4 below 6.5%
  window: 2020Q4-2021Q4
  source: ons:MGSX
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: output_recovered_by_2021q4
  description: Real GDP was back to pre-pandemic scale by 2021Q4.
  threshold: within 2% of 2019Q4
  window: 2019Q4-2021Q4
  source: ons:ABMI
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
multi_metric_falsification:
  total_metrics: 3
  support_threshold: 2
  refute_threshold: 1
notes: Generated by scripts/generate_national_event_wave.py from local cached vintages;
  no network fetch required.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: biden_ira_chips_fiscal_inflation_pass_through
version: 2
status: pre_registered
topic: labour
claim: US Biden IRA + CHIPS 2022 fiscal expansion produced measurable industrial investment gains without
  triggering persistent wage-price spiral once supply-side pandemic disruptions resolved.
notes: Stub seeded from MMT school prediction about Biden IRA/CHIPS fiscal pass-through. v2 pins a narrow
  descriptive test using local FRED manufacturing-construction, core-PCE, and wage vintages. It does not
  identify a CBO outlay shock or causally separate IRA/CHIPS from other industrial-policy and supply-chain forces.
prior_confidence: 0.50
disclosure: Author's market-liberal priors are skeptical of MMT/large-fiscal claims and view 2021-2023 inflation
  as primarily driven by ARP+supply shocks; could under-weight industrial-investment evidence and bias
  toward inflation-spiral findings.
falsification:
  rule: >
    Primary v2 descriptive test starts at August 2022, when CHIPS and IRA were enacted. It is supported
    if real manufacturing construction spending is at least 25% above its August 2022 level by December
    2025, while 2025-Q4 core PCE inflation is below 4.0% year-over-year and 2025-Q4 average-hourly-earnings
    growth is below 4.5% year-over-year. It is refuted if real manufacturing construction spending is
    less than 10% above August 2022 by December 2025 or if both core PCE and wage growth exceed their
    wage-price-spiral thresholds. Otherwise it is partial/weakened.
  test: fred_mfg_construction_core_pce_wage_2022_2025
  threshold: support if real mfg construction >=+25%, core PCE <4.0%, AHE wage growth <4.5%; refute if construction <+10% or both inflation and wage thresholds breach
methodology_note: >
  This is a descriptive post-enactment outcome test. It can show that the registered investment/no-spiral
  pattern occurred, but it cannot causally attribute the investment boom to IRA/CHIPS outlays alone.
evidence_type: associational

sample:
  countries: [USA]
  period: [2018, 2025]
  temporal_structure: time_series
  exclusion_rules:
    - "flag pandemic-shock window 2020-Q2 to 2021-Q4 as supply-side confound"

variables:
  outcome:
    - name: cpi_all_items
      source: "fred:CPIAUCSL"
      transformation: log_yoy
      notes: "BLS CPI via FRED — headline inflation."
    - name: cpi_core_pce
      source: "fred:PCEPILFE"
      transformation: log_yoy
    - name: average_hourly_earnings
      source: "bls:CES0500000003"
      transformation: log_yoy
      notes: "BLS CES total private average hourly earnings — wage side of pass-through."
    - name: manufacturing_construction_spending
      source: "fred:TLMFGCONS"
      transformation: log
      notes: >
        FRED total manufacturing construction-spending — captures
        IRA/CHIPS industrial-investment outcome.
  treatment:
    - name: ira_chips_fiscal_impulse
      source: "derived:cbo_ira_chips_outlay_path"
      transformation: level
      notes: >
        CBO-scored IRA + CHIPS outlay path; shock identification via
        announcement-date residuals. Hand-coded under derived/.
  controls:
    - name: oil_price_brent
      source: "imf_pcps:POILBRE"
      transformation: log_yoy
    - name: federal_funds_rate
      source: "fred:FEDFUNDS"
      transformation: level
    - name: unemployment_rate
      source: "fred:UNRATE"
      transformation: level
    - name: import_price_index
      source: "fred:IR"
      transformation: log_yoy
      notes: "FRED import-price index — supply-side normalisation control."

scope:
  period: [2022, 2025]
  countries: [USA]
  outcome_dim: [industrial_capability, inflation, employment_labour]
  policy_family: [fiscal_policy, industrial_policy]
  treatment_tags: [biden_ira_2022, chips_act_2022, covid_fiscal_response_2020]

covers_claims:
  - position_id: mmt
    claim_index: 8
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "MMT predicts Biden IRA+CHIPS fiscal expansion boosts industrial investment without persistent wage-price spiral post supply-side normalisation; Phase 4C should verify wage-price spiral measurement window aligns with post-pandemic recovery."

estimator:
  template: local_projections
  clustering: HAC
  fixed_effects: []
  notes: >
    Local projections of inflation and wage-price dynamics on
    identified IRA/CHIPS fiscal-impulse shocks (CBO-scored outlay
    paths) using monthly US time series 2020-2025. HAC standard
    errors. Counterfactual decomposition of supply-side normalisation.

estimator:
  template: did_callaway_santanna
  clustering: firm
  fixed_effects: [firm, year]
  notes: >
    Staggered DiD across worker-coop conversions (Italy Marcora-law
    conversions, US Main Street Employee Ownership Act) using
    matched-closure comparators (firms with similar pre-conversion
    distress signals that closed instead of converting). Outcomes:
    survival, employment, wages.

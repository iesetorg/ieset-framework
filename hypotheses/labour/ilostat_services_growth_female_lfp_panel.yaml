hypothesis_id: ilostat_services_growth_female_lfp_panel
version: 1
status: candidate
topic: labour
claim: Faster services-sector expansion predicts higher female labour-force participation, net of education and income.
claim_direction: +
methodology_note: Promoted from the 2026-05-22 200-hypothesis READY_NOW swarm. This is a first-pass candidate spec using one primary treatment and one primary outcome; bespoke replication should refine multi-outcome claims before scoreboard mapping.
evidence_type: associational
sample:
  countries: &id002
  - GLOBAL
  period: &id001
  - 1980
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing the primary treatment, outcome, or core controls
  - require at least 12 countries and 180 country-year observations for a panel verdict
  - treat generic-runner output as triage until a reviewer checks treatment timing and variable semantics
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - employment_labour
  - gdp_growth
  policy_family:
  - labour_market
  - welfare_architecture
  treatment_tags:
  - ilostat_services_growth_female_lfp_panel
intervention_channel: fiscal
intervention_channel_justification: The treatment is a measured policy, institutional, macro, or market-structure variable associated with labour_market, welfare_architecture.
variables:
  outcome:
  - name: employment_rate
    source: world_bank_wdi:SL.EMP.TOTL.SP.ZS
    transformation: level
  treatment:
  - name: services_value_added_share
    source: world_bank_wdi:NV.SRV.TOTL.ZS
    transformation: level_lagged_one_year
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: government_effectiveness
    source: wgi:GE.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: First-pass panel fixed effects screen. Multi-outcome or threshold language from the source backlog should be upgraded to a bespoke replication before scoreboard conversion.
falsification:
  rule: SUPPORTED if the primary treatment coefficient has the pre-registered + sign at p<=0.10 with minimum sample gates. REFUTED if the coefficient has the opposite sign at p<=0.10. Otherwise PARTIAL; missing data or failed sample gates are INCONCLUSIVE_DATA_PENDING.
  test: panel_fe_ilostat_services_growth_female_lfp_panel
  threshold:
    p_value: p<=0.10
    expected_sign: +
    minimum_countries: 12
    minimum_observations: 180
prior_confidence: 0.52
disclosure: This candidate was generated from a theory-balanced swarm backlog. The prior is intentionally modest because many READY_NOW claims rely on broad panel proxies.
steelman: hypotheses/steelman/ilostat_services_growth_female_lfp_panel.md

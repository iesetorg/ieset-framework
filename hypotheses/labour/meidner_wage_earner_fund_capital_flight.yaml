# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: meidner_wage_earner_fund_capital_flight
version: 2
status: pre_registered
topic: labour
claim: Swedish Meidner plan / wage-earner funds 1984-1991 did not produce measurable capital flight during
  their brief implementation, falsifying claims that citizen ownership funds trigger disinvestment.
notes: Stub seeded from a market-socialist school prediction about Meidner-fund capital-flight null. v2
  pins a limited macro-proxy event test using local WDI data. The fund was small-scale and short-lived,
  so support remains evidence against a large immediate capital-flight shock, not proof that larger
  citizen-ownership funds are harmless.
prior_confidence: 0.55
disclosure: Author's market-liberal priors expected meaningful capital-flight in response to wage-earner
  fund proposals; the small fund scale and brief implementation window mean a null finding may reflect
  power limitations rather than absent capital-flight mechanism.
falsification:
  rule: >
    Primary event-window proxy compares Sweden's 1984-1991 wage-earner-fund period with the 1980-1983
    pre-period using WDI gross fixed capital formation (% GDP), FDI net inflows (% GDP), and the
    SEK/USD official exchange rate. The null/no-large-capital-flight claim is supported if investment
    does not fall by more than 2pp of GDP, FDI inflows do not fall by more than 1pp of GDP, and the
    SEK/USD average does not depreciate by more than 25% relative to pre-period. It is refuted if at
    least two of those three capital-flight proxies breach their thresholds. Otherwise it is weakened.
  test: sweden_meidner_macro_capital_flight_proxy_1984_1991
  threshold: support if fewer than one proxy breaches; refute if at least two proxies breach
methodology_note: >
  This test is intentionally limited to macro proxies available locally. It does not observe household
  offshore wealth transfers or firm-level ownership restructuring, and the 1992 Swedish currency crisis
  is excluded from the primary event window.
evidence_type: associational

sample:
  countries: [SWE]
  period: [1980, 1995]
  temporal_structure: time_series
  exclusion_rules:
    - "flag 1992 Swedish currency crisis as out-of-sample confound"

variables:
  outcome:
    - name: portfolio_capital_outflows_sweden
      source: "imf:BFOAFA"
      transformation: log
      notes: >
        IMF BoP financial account portfolio investment flows. Series ID
        approximate; verify dataflow on wiring.
    - name: gross_fixed_capital_formation
      source: "world_bank_wdi:NE.GDI.FTOT.ZS"
      transformation: level
    - name: corporate_investment_share
      source: "world_bank_wdi:NE.GDI.FPRV.ZS"
      transformation: level
    - name: sek_usd_exchange_rate
      source: "world_bank_wdi:PA.NUS.FCRF"
      transformation: log_yoy
      notes: "WB official exchange rate; native source is Riksbank statistical database (registered)."
    - name: sek_real_effective_exchange_rate
      source: "bis:WS_EER"
      transformation: log
  treatment:
    - name: meidner_fund_enactment
      source: "derived:meidner_fund_dates"
      transformation: indicator
      notes: >
        Hand-coded: 1984 enactment, 1991 abolition. Small fund-size
        scale flagged in falsification disclosure.
  controls:
    - name: oecd_fdi_inflows_average
      source: "world_bank_wdi:BX.KLT.DINV.WD.GD.ZS"
      transformation: level
      notes: "OECD donor-pool benchmark for global capital-flow trend."
    - name: real_gdp_per_capita_growth
      source: "world_bank_wdi:NY.GDP.PCAP.KD.ZG"
      transformation: level
    - name: real_interest_rate_sweden
      source: "world_bank_wdi:FR.INR.RINR"
      transformation: level

scope:
  period: [1984, 1991]
  countries: [SWE]
  outcome_dim: [capital_flows, financialisation]
  policy_family: [institutional_reform, tax_policy]
  treatment_tags: [meidner_plan_sweden]

covers_claims:
  - position_id: market_socialist
    claim_index: 4
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "Market socialist predicts Meidner wage-earner funds did not trigger capital flight, falsifying disinvestment claims; Phase 4C should caveat brief 1984-1991 window and small scale — null result on capital flight may reflect limited implementation rather than counterfactual test."

estimator:
  template: event_study
  clustering: date
  fixed_effects: [date]
  notes: >
    Event study around the 1984 Meidner-fund enactment in Sweden,
    with capital flows (BoP), corporate investment, and SEK as
    outcomes. Tight pre/post window 1980-1991 (until 1991 fund
    abolition). Caveat noted: small fund scale limits power.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: trade_lib_eurozone_1999_intra_eu_trade
version: 1
status: candidate
topic: trade

claim: >
  Eurozone formation (1999 currency conversion, 2002 banknotes)
  raised intra-eurozone trade-openness ratios for the 11/12 founding
  members relative to non-eurozone EU comparators (GBR, DNK, SWE)
  over the 1995-2008 pre-GFC window. The Mundell-Fleming /
  optimum-currency-area claim is that elimination of bilateral
  exchange-rate volatility plus reduced transaction costs raises
  trade volumes among currency-union members. The Rose 2000 effect
  estimate (3-5x) is widely regarded as overstated; this spec
  tests the more conservative ~10-20% effect documented by the
  later literature.

evidence_type: causal

sample:
  countries: [AUT, BEL, DEU, ESP, FIN, FRA, GRC, IRL, ITA, LUX, NLD, PRT, GBR, DNK, SWE, NOR, CHE]
  period: [1995, 2008]
  temporal_structure: panel
  exclusion_rules:
    - "end pre-GFC (2008) — eurozone-crisis dynamics post-2010 are a separate hypothesis"
    - "exclude LUX from primary spec (financial-sector outlier inflates trade ratios)"

scope:
  period: [1995, 2008]
  countries: [AUT, BEL, DEU, ESP, FIN, FRA, GRC, IRL, ITA, NLD, PRT]
  outcome_dim: [trade_liberalisation]
  policy_family: [exchange_rate_regime, trade_policy]
  treatment_tags: [eurozone_formation_1999, single_currency, mundell_optimum_currency_area]

variables:
  outcome:
    - name: trade_openness_pct_gdp
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: exports_goods_services_pct_gdp
      source: "world_bank_wdi:NE.EXP.GNFS.ZS"
      transformation: level
  treatment:
    - name: eurozone_member_indicator
      source: "constructed: indicator = 1 for founding eurozone members from 1999; GRC from 2001"
      transformation: indicator
  controls:
    - name: log_gdp_pc_pretreatment
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level_at_treatment_minus_1
    - name: real_effective_exchange_rate
      source: "imf:REER"
      transformation: log
    - name: investment_share
      source: "world_bank_wdi:NE.GDI.TOTL.ZS"
      transformation: level

intervention_channel: monetary
intervention_channel_justification: >
  Currency union is a monetary intervention that operates with
  trade-policy consequences. Channel monetary per invariant 4.

estimator:
  template: did_callaway_santanna
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Callaway-Sant'Anna staggered DiD; treated = 1999 cohort plus
    Greece 2001. Control = GBR, DNK, SWE, NOR, CHE (single-market
    or tightly-integrated non-eurozone). Pre-GFC end-date isolates
    the trade-volume effect from the post-2010 crisis dynamics.

falsification:
  rule: >
    SUPPORTED if Callaway-Sant'Anna ATT on trade-openness over
    h=5y is positive and significant at p<0.10, with a magnitude
    in the 5-25 percentage-points range (consistent with the
    post-Rose conservative estimates). PARTIAL if positive and
    significant but exceeds 30 pp (suggesting the estimate is
    contaminated by other shocks). REFUTED if ATT is negative or
    near zero (<2 pp) at p<0.10.
  test: cs_did_eurozone_trade_openness
  threshold: >
    PRIMARY: cs_did_ATT(trade_openness, h=5y) in [+5, +25] pp at p<0.10.
    METHOD_VALID: WDI NE.TRD.GNFS.ZS available for all units 1995-2008.

prior_confidence: 0.55

disclosure: >
  Prior moderate (0.55). The eurozone-trade effect is among the
  most contested propositions in international economics. Rose's
  initial 3-5x estimates have been substantially revised downward;
  Baldwin (2006) and follow-on literature suggest 5-15% effects.
  Heterodox critics (post-Keynesian) will note that single-currency
  formation also generated peripheral current-account imbalances
  that ultimately produced the 2010-2012 crisis — a "trade-creation
  in the short run, structural-imbalance accumulation in the
  medium run" reading. The pre-GFC end-date deliberately excludes
  the crisis dynamics; the eurozone_crisis_2010 hypothesis covers
  that separately.

linked_hypotheses:
  - trade_lib_eu_eastern_enlargement_2004_growth_convergence

steelman: hypotheses/steelman/trade_lib_eurozone_1999_intra_eu_trade.md

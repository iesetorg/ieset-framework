# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: trade_lib_india_1991_tariff_cut_export_response
version: 1
status: candidate
topic: trade

claim: >
  India's 1991 tariff-liberalisation component (mean weighted
  applied tariff fell from ~80% in 1990 to ~30% by 1997 and ~13%
  by 2007) raised Indian merchandise-exports-to-GDP and trade-
  openness over the 1992-2007 window in a structural-break
  pattern. This spec is the trade-share companion to
  india_1991_liberalisation_growth_acceleration; it tests the
  trade-channel mechanism rather than the headline GDP outcome.

evidence_type: descriptive

sample:
  countries: [IND]
  period: [1980, 2019]
  temporal_structure: time_series
  exclusion_rules:
    - "1991 itself is transition year; omit from pre and post calculations"
    - "end pre-COVID (2019)"

scope:
  period: [1980, 2019]
  countries: [IND]
  outcome_dim: [trade_liberalisation]
  policy_family: [trade_policy]
  treatment_tags: [india_1991_liberalisation, manmohan_singh_tariff_cuts, india_unilateral_tariff_reduction]

variables:
  outcome:
    - name: merchandise_exports_pct_gdp
      source: "world_bank_wdi:NE.EXP.GNFS.ZS"
      transformation: level
    - name: trade_openness_pct_gdp
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level

intervention_channel: regulatory
intervention_channel_justification: >
  Tariff reduction is a regulatory / trade-policy intervention.

estimator:
  template: descriptive
  clustering: none
  notes: >
    Descriptive structural-break test. Pre-1991 (1980-1990) vs
    post-1991 (1992-2007 narrow; 1992-2019 wide) mean trade-
    openness comparison. Visualise as kinked trend line.

falsification:
  rule: >
    SUPPORTED if mean trade-openness 1992-2007 minus mean trade-
    openness 1980-1990 exceeds +10 percentage points. REFUTED if
    less than +5 pp.
  test: india_pre_post_1991_trade_openness_break
  threshold: >
    PRIMARY: mean_openness(1992-2007) - mean_openness(1980-1990) >= 10 pp.
    INFORMATIVE: extending post-window to 2019 yields a similar or larger gap.

prior_confidence: 0.95

disclosure: >
  Prior very high (0.95). The Indian post-1991 trade-share opening
  is well documented and visible to the eye in the WDI series.
  Framework-validation tier. Heterodox readers note that India's
  trade openness remains modest by emerging-market standards
  (~50% of GDP) and that import-substituting structural features
  persist in many sectors — but the structural break is real.

covers_claims:
- position_id: classical_liberal
  claim_index: 184
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 2026-05-17 unblocking batch; direct India 1991 tariff-liberalisation trade-channel mapping.
- position_id: chicago_monetarism
  claim_index: 140
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 2026-05-17 unblocking batch; trade-liberalisation mechanism directly matches this school claim.
- position_id: developmentalism
  claim_index: 148
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-17 unblocking batch; mapped to calibrated trade reform inside a broader development trajectory.
- position_id: empirical_pragmatist
  claim_index: 153
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 2026-05-17 unblocking batch; structural-break trade-channel claim is directly tested.

linked_hypotheses:
  - india_1991_liberalisation_growth_acceleration

steelman: hypotheses/steelman/trade_lib_india_1991_tariff_cut_export_response.md

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: trade_lib_smoot_hawley_1930_historical
version: 1
status: candidate
topic: trade

claim: >
  The Smoot-Hawley Tariff Act (signed 1930-06-17, raising US
  weighted average tariffs on dutiable imports from approximately
  40% to approximately 47-50%) coincided with a collapse in global
  merchandise trade that exceeded the contemporaneous fall in
  global GDP. World trade fell roughly 65% in nominal terms 1929-
  1933 vs roughly 50% nominal-GDP fall. The descriptive claim is
  long-history Maddison/PWT-grounded that the 1930-1933 period
  shows the largest peacetime trade-collapse in 20th-century
  history, with retaliatory tariff cascades documented in the
  trade-policy literature.

evidence_type: descriptive

sample:
  countries: [USA, GBR, FRA, DEU, ITA, JPN, CAN, AUS, ARG, BRA, NLD, BEL, ESP, SWE]
  period: [1925, 1939]
  temporal_structure: panel
  exclusion_rules:
    - "drop DEU 1933 onward (Nazi-period autarky distorts comparison)"
    - "exclude WW2 onset 1939 from primary spec"

scope:
  period: [1925, 1939]
  countries: [USA]
  outcome_dim: [trade_liberalisation]
  policy_family: [trade_policy]
  treatment_tags: [smoot_hawley_1930, great_depression_trade_collapse, retaliatory_tariff_cascade]

variables:
  outcome:
    - name: real_gdp_pc_pwt
      source: "pwt:rgdpe; maddison:gdppc_ppp"
      transformation: log
    - name: trade_to_gdp_jst
      source: "jst:exports_to_gdp; jst:imports_to_gdp"
      transformation: level

intervention_channel: regulatory
intervention_channel_justification: >
  Tariff legislation — regulatory / trade-policy intervention.

estimator:
  template: descriptive
  clustering: none
  notes: >
    Long-history descriptive analysis using JST and Maddison/PWT
    data. Reports trade-to-GDP collapse magnitude across major
    economies 1929-1933 vs 1925-1929 baseline. Identification at
    the international-tariff-cascade level is qualitative and
    historiographic; this spec records the magnitude pattern.

falsification:
  rule: >
    SUPPORTED if trade-to-GDP for the major-economy panel mean
    fell from 1925-1929 mean to 1932-1933 mean by >=8 pp (a
    collapse exceeding any other peacetime episode in JST
    coverage). REFUTED if the fall was less than 5 pp.
  test: descriptive_smoot_hawley_great_depression_trade_collapse
  threshold: >
    PRIMARY: panel-mean trade-to-GDP fall(1925-29 -> 1932-33) >= 8 pp.
    METHOD_VALID: JST trade-to-GDP series available for >=8 of the panel
    countries 1925-1933.

prior_confidence: 0.95

disclosure: >
  Prior very high (0.95). The 1929-1933 trade collapse magnitude
  is among the most well-documented patterns in 20th-century
  economic history. Heterodox readers (Eichengreen-Irwin 2010;
  Madsen 2001) will note that the Smoot-Hawley contribution to
  the trade collapse is contested — some attribute most of the
  fall to the gold-standard-driven monetary contraction and
  income collapse rather than to tariffs per se. The spec
  deliberately tests the trade-collapse magnitude rather than
  attempting to attribute causation to Smoot-Hawley alone.

linked_hypotheses: []

steelman: hypotheses/steelman/trade_lib_smoot_hawley_1930_historical.md

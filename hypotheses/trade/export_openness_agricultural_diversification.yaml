# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: export_openness_agricultural_diversification
version: 1
status: candidate
topic: trade
claim: Agricultural export liberalisation predicts faster diversification into higher-value crops than
  import-substitution agricultural policy.
methodology_note: Promoted from the sectoral first-wave backlog on 2026-05-02 using locally cached proxy
  variables; exact sector datasets can replace proxies in later revisions.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  period: &id001
  - 1970
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
variables:
  outcome:
  - name: primary_sectoral_outcome
    source: world_bank_wdi:TX.VAL.AGRI.ZS.UN
    transformation: level_or_growth_proxy
  treatment:
  - name: policy_or_institution_proxy
    source: 'constructed: CHL years >= 1975; NZL years >= 1984; VNM years >= 1988'
    transformation: indicator_or_level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: >
    Proxy-first staggered reform panel. Rule-of-law is excluded from the
    primary model because WGI begins after the 1975/1984/1988 reform onsets
    and mechanically deletes identifying pre-reform years; report it only as
    a post-1996 robustness/descriptive check. Upgrade to bespoke replication
    when exact sector datasets are fetched.
falsification:
  rule: SUPPORTED if the treatment coefficient has the predicted sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_export_openness_agricultural_diversification
  threshold: p<0.10 with pre-registered sign
prior_confidence: 0.55
disclosure: 'Proxy-first promotion risk: the local variable may capture broad institutional or sector
  conditions rather than the exact legal treatment. Treat first-pass verdicts as triage until exact datasets
  are fetched.'
steelman: hypotheses/steelman/export_openness_agricultural_diversification.md
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - trade_liberalisation
  - productivity
  policy_family:
  - trade_policy
  treatment_tags:
  - agricultural_export_openness

covers_claims:
- position_id: classical_liberal
  claim_index: 190
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-17 unblocking batch; agricultural export-openness claim maps directly to this result.
- position_id: developmentalism
  claim_index: 149
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-17 unblocking batch; agricultural upgrading claim maps directly to this result.
- position_id: empirical_pragmatist
  claim_index: 154
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-17 unblocking batch; mechanism-outcome claim maps directly to this result.

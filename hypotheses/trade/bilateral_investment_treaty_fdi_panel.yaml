  - name: fdi_inflows_share_gdp
    source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
    transformation: level
    notes: Net FDI inflows % GDP. Primary outcome.
  - name: real_gdp_per_capita_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: level
    notes: Annual real GDP per capita growth %. Secondary outcome.
  treatment:
  - name: cumulative_bits_signed
    source: 'constructed: indicator = 1 for cumulative count of bilateral investment treaties signed by each country'
    transformation: level
    notes: Cumulative BIT count by country-year. Constructed from UNCTAD IIA Navigator data. v1 uses approximate counts based on major signing waves.
  - name: bit_stocks_log
    source: 'constructed: indicator = 1 for cumulative count of bilateral investment treaties signed by each country'
    transformation: log_plus_one
    notes: Log(1+cumulative BITs) to capture diminishing returns.
  controls:
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: institutional_quality
    source: wgi:RL.EST
    transformation: level
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: population_log
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
  - name: inflation_rate
    source: world_bank_wdi:FP.CPI.TOTL.ZG
    transformation: level
intervention_channel: institutional
intervention_channel_justification: 'BITs are an institutional-channel intervention that reduces expropriation risk and improves investor protection, lowering the cost of capital for cross-border investment.

  '
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: "Two-way FE panel with 5-year forward windows: FDI(t+1 to t+5) = \u03B20 + \u03B21*BIT_stock(t) + controls + FE. Robustness: (1) exclude tax-haven jurisdictions where FDI is round-tripped; (2) instrument BIT signing with partner-country BIT propensity (shift-share); (3) use bilateral FDI flows from OECD instead of aggregate WDI; (4) exclude China (dominant FDI recipient).\n"
falsification:
  rule: "SUPPORTED if \u03B21 (BIT stock) is positive and significant at p<0.10 for both FDI/GDP and GDP growth. PARTIAL if positive and significant for FDI but not growth (investment without translation to aggregate growth). REFUTED if \u03B21 is negative and significant at p<0.10. INFORMATIVE: excluding China should not eliminate the positive sign; if it does, the result is driven by China's BIT-FDI link.\n"
  test: panel_fe_bit_fdi_growth_5yr_forward
  threshold: "\u03B2_BIT_stock (FDI/GDP) > 0 at p<=0.10  AND \u03B2_BIT_stock (GDP growth) > 0 at p<=0.10  AND Ex-China robustness retains positive sign.\n"
prior_confidence: 0.5
disclosure: 'Author is neutral (0.50). The BIT-FDI literature (e.g. Egger-Merkx 2022) finds mixed results: BITs increase FDI on average but the effect is heterogeneous and often driven by developed-country signatories. Prior is not higher because: (a) BITs may be signed after FDI has already increased, creating reverse causality; (b) the investment protection may primarily benefit investors from rich countries rather than raising host-country growth. Framing risk: the hypothesis may be read as endorsing blanket BIT adoption; the spec tests only the average association in the observed panel.

  '

hypothesis_id: bilateral_investment_treaty_fdi_panel
version: 1
status: candidate
topic: trade
claim: 'In a broad-country panel 1990-2020, the cumulative stock of bilateral investment treaties (BITs) signed predicts higher subsequent net FDI inflows as a share of GDP and higher real GDP per capita growth, controlling for institutional quality, market size, and trade openness. The directional claim is that each additional BIT is associated with at least 0.1 percentage points higher FDI/GDP and 0.05 percentage points higher annual growth over the following 5-year window.

  '

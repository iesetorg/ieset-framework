# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: trade_lib_mercosur_1991_intra_bloc_trade
version: 1
status: candidate
topic: trade

claim: >
  Mercosur (Treaty of Asunción 1991, customs union effective 1995)
  raised intra-bloc trade-openness for ARG, BRA, PRY, URY through
  the 1990s but produced minimal additional trade-creation effects
  after Argentina's 2001 crisis and the gradual erosion of the
  common external tariff. The descriptive claim is that the bloc's
  trade effect peaked in the late 1990s and has since stagnated
  relative to non-Mercosur Latin American economies.

evidence_type: descriptive

sample:
  countries: [ARG, BRA, PRY, URY, CHL, COL, PER, ECU, BOL]
  period: [1985, 2019]
  temporal_structure: panel
  exclusion_rules:
    - "drop ARG 2001-2003 currency-crisis years from primary spec; report sensitivity"
    - "end pre-COVID (2019)"

scope:
  period: [1985, 2019]
  countries: [ARG, BRA, PRY, URY]
  outcome_dim: [trade_liberalisation]
  policy_family: [trade_policy]
  treatment_tags: [mercosur_1991, mercosur_customs_union_1995, common_external_tariff]

variables:
  outcome:
    - name: trade_openness_pct_gdp
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: merchandise_exports_pct_gdp
      source: "world_bank_wdi:NE.EXP.GNFS.ZS"
      transformation: level
  treatment:
    - name: mercosur_indicator
      source: "constructed: indicator = 1 for ARG, BRA, PRY, URY from 1995 (customs union effective)"
      transformation: indicator
  controls:
    - name: log_gdp_pc_pretreatment
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level_at_treatment_minus_1
    - name: real_effective_exchange_rate
      source: "imf:REER"
      transformation: log

intervention_channel: regulatory
intervention_channel_justification: >
  Mercosur is a regulatory / trade-policy intervention.

estimator:
  template: descriptive
  clustering: none
  notes: >
    Descriptive comparison of trade-openness trajectories: Mercosur
    members vs Latin American non-members. Reports trade-openness
    levels at 1990, 1998 (pre-Argentina crisis peak), 2008, 2019.
    The substantive question is whether the post-2001 stagnation
    pattern holds.

falsification:
  rule: >
    SUPPORTED if (a) Mercosur trade-openness rose by >=10 pp from
    1990 to 1998 relative to non-Mercosur Latin American comparators,
    AND (b) the 1998-2019 change is <= +5 pp relative to comparators
    (post-peak stagnation). REFUTED if 1998-2019 change exceeds
    comparators by more than 10 pp (which would indicate continued
    trade-creation, contrary to the descriptive claim).
  test: descriptive_mercosur_pre_post_1998_peak
  threshold: >
    PRIMARY: openness_change(1990->1998) > +10 pp vs comparators AND
    openness_change(1998->2019) <= +5 pp vs comparators.

prior_confidence: 0.7

disclosure: >
  Prior moderate-high (0.7). The Mercosur stagnation pattern is
  documented in the regional-integration literature
  (Sanguinetti-Volpe Martincus 2009; Bouzas 2017). Heterodox
  developmentalist readers will note that the bloc's deepening
  was deliberately slowed for political-sovereignty reasons after
  2003 (Lula/Kirchner-era prioritisation of South-South
  integration over deeper Mercosur liberalisation), so the
  stagnation is partly a policy choice rather than a failure.

linked_hypotheses:
  - liberal_free_trade_partner_growth_panel_1990_2020
  - trade_lib_argentina_mercosur_industrial_effect

steelman: hypotheses/steelman/trade_lib_mercosur_1991_intra_bloc_trade.md

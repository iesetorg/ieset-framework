hypothesis_id: wdi_remittance_current_account_cushion_2000_2023
version: 1
status: pre_registered
topic: trade
claim: High-remittance economies should usually avoid extreme average current-account deficits
  over 2000-2023 because worker transfers directly finance external balances.
evidence_type: descriptive
sample:
  countries:
  - ALB
  - ARM
  - BIH
  - BMU
  - COM
  - CPV
  - DOM
  - GEO
  - GMB
  - GTM
  - GUY
  - HND

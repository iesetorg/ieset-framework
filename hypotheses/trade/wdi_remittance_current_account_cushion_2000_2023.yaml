  - MNE
  - NIC
  - NPL
  - PHL
  - PSE
  - PYF
  - SEN
  - SLV
  - TJK
  - TON
  - TUV
  - UZB
  - WSM
  - XKX
  - YEM
  - ZWE
  period:
  - 2000
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: current_account_pct_gdp
    source: world_bank_wdi:BN.CAB.XOKA.GD.ZS
    transformation: 2000-2023 annual mean
  treatment:
  - name: remittances_pct_gdp
    source: world_bank_wdi:BX.TRF.PWKR.DT.GD.ZS
    transformation: country selected if 2000-2023 mean >= 8% of GDP
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=25, at least 70% of high-remittance economies average no worse than
    -10% of GDP on the current account, and the median average is >=-7%. REFUTED if fewer
    than 50% pass or the median is below -12%. Otherwise PARTIAL.
  test: wdi_remittance_current_account_cushion_2000_2023
  threshold: n >= 25 AND pass_rate >= 0.70 AND median_avg_current_account_pct_gdp >= -7
prior_confidence: 0.67
disclosure: The prior expects worker transfers to matter mechanically in external accounts,
  but import dependence, aid inflows, debt service, and tourism cycles can overwhelm them.
steelman: hypotheses/steelman/wdi_remittance_current_account_cushion_2000_2023.md

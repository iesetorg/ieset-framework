# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: chicago_taxes_optimal_ramsey_excess_burden_high_marginal_rate
version: 1
status: candidate
topic: distribution

claim: >
  Across an OECD panel 1980-2023, the deadweight loss (excess burden)
  of marginal income taxation rises convexly in the top statutory
  marginal rate, with the slope accelerating sharply once top rates
  exceed roughly 50%. Operationalised: the elasticity of taxable
  income (ETI) with respect to the net-of-tax rate exceeds 0.4 in
  country-years where the top statutory rate is above 60%, and is
  below 0.25 in country-years where the top rate is below 40%. As a
  consequence, the revenue-maximising top marginal rate (the inverse-
  elasticity bound that defines the Laffer top) lies below 70% in
  every country in the sample. The hypothesis is the Ramsey-Mirrlees-
  Saez optimal-tax framework calibrated to OECD micro evidence and
  framed in the Chicago tradition (Harberger triangles convex in
  marginal rates).

evidence_type: associational

sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, NLD, JPN, CAN, AUS, NZL, CHE, SWE, NOR, DNK, FIN, IRL, AUT, BEL, PRT, KOR]
  period: [1980, 2023]
  temporal_structure: panel
  exclusion_rules:
    - "drop country-years with top-marginal-rate changes within the prior 12 months (anticipation effects contaminate ETI estimation)"
    - "drop country-years missing high-quality top-income-share microdata"

scope:
  period: [1980, 2023]
  countries: [USA, GBR, DEU, FRA, ITA, ESP, NLD, JPN, CAN, AUS, NZL, CHE, SWE, NOR, DNK, FIN, IRL, AUT, BEL, PRT, KOR, OECD]
  outcome_dim: [taxation, poverty_inequality, productivity]
  policy_family: [tax_policy, fiscal_policy]
  treatment_tags: [ramsey_optimal_tax, mirrlees_optimal_income_tax, saez_eti, top_marginal_rate, reagan_tax_1981, tcja_2017, thatcher_tax_reform]

variables:
  outcome:
    - name: top_1pct_taxable_income_share
      source: "world_bank_wdi:SI.POV.GINI"
      transformation: level_share
      notes: "WID top 1% pre-tax / fiscal income share. Used as ETI denominator approximation."
    - name: elasticity_of_taxable_income_estimate
      source: "academic:saez_slemrod_giertz_eti_panel"
      transformation: estimated_eti_per_country_year
      notes: "ETI estimates from natural-experiment top-rate changes per Saez-Slemrod-Giertz (2012 JEL) methodology, replicated for the panel."
    - name: top_1pct_real_income_growth
      source: "world_bank_wdi:SI.POV.GINI"
      transformation: log_diff_5yr
      notes: "Forward 5-year top-1% real income growth around top-rate change events."
  treatment:
    - name: top_statutory_marginal_rate
      source: "oecd:OECD_TaxDB_table_I.7"
      transformation: level_pct
      notes: "OECD TaxDB top all-in marginal rate including surcharges and social security."
    - name: net_of_tax_rate
      source: "oecd:OECD_TaxDB_table_I.7"
      transformation: derived_one_minus_top_rate
    - name: top_rate_change_event
      source: "derived:top_marginal_rate_change_dates"
      transformation: indicator_event_year
      notes: "Pre-registered events: Reagan 1981/1986, Thatcher 1979/1988, France 2012/2014, US TCJA 2017, etc."
  controls:
    - name: log_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.PP.KD"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: capital_account_openness
      source: "academic:chinn_ito_kaopen"
      transformation: level
      notes: "Chinn-Ito capital openness index; high-rate country with closed capital account behaves differently from open one."
    - name: wgi_government_effectiveness
      source: "wgi:GOV_WGI_GE.EST"
      transformation: level

intervention_channel: fiscal
intervention_channel_justification: >
  Top-rate changes are fiscal-policy interventions; ETI is the
  behavioural elasticity governing the deadweight-loss calculation.

estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Two-stage estimation. Stage 1: estimate ETI per country-year-window
    using Saez-Slemrod-Giertz event-study methodology around top-rate
    changes (top-rate-change-cohort vs control-cohort difference in
    log-taxable-income growth divided by log-net-of-tax-rate change).
    Stage 2: regress estimated ETI on contemporaneous top statutory
    marginal rate with country and year FE; pre-registered prediction
    is positive convex relationship. Compute revenue-maximising top
    rate as 1 / (1 + a*ETI) where a is the Pareto parameter from WID
    top-income-share data; pre-registered prediction is that this
    inverse-elasticity bound lies below 70% in every country in the
    sample. Robustness: alternative ETI estimation via Auten-Carroll
    1999 panel approach; report dispersion of estimates.

falsification:
  rule: >
    Not supported if (a) the panel ETI estimate in country-years with
    top rate above 60% is below 0.4, OR (b) the ETI in country-years
    with top rate below 40% is above 0.35, OR (c) the inverse-elasticity
    revenue-maximising rate exceeds 75% in any major OECD country
    (USA, GBR, DEU, FRA, ITA, JPN), OR (d) the convex-rising
    relationship between top rate and ETI is not statistically
    distinguishable from a flat or declining relationship at p<0.05.
    A heterodox / Diamond-Saez-Piketty high-Laffer-top reading wins
    cleanly if (c) fails — i.e. revenue-maximising top rate is in
    the 70-90% range commonly cited in their work.
  test: panel_eti_top_rate_convex_inverse_elasticity_laffer
  threshold: >
    median_ETI_top_rate_above_60pct >= 0.4
    AND median_ETI_top_rate_below_40pct <= 0.25
    AND inverse_elasticity_revenue_max_rate <= 70% in all of {USA, GBR, DEU, FRA, ITA, JPN}
    AND ETI-top-rate slope positive at p<0.05 with quadratic positive at p<0.10

prior_confidence: 0.55

disclosure: >-
  This is the Chicago / supply-side / optimal-tax synthesis: Harberger-
  triangle deadweight loss is convex in the marginal rate, ETI estimates
  bound the revenue-maximising rate well below the 70-90% range that
  Diamond-Saez-Piketty (2014) advocate. The empirical literature is
  genuinely contested: Saez-Slemrod-Giertz (2012 JEL) report a wide
  range of ETI estimates (0.12 to 0.40+) with tax-base-shifting and
  evasion responses dominating real-margin responses, and the Diamond-
  Saez-Piketty 70-83% optimal top rate calculation uses ETI ~ 0.25
  with high inequality aversion. Author's market-liberal priors lean
  Chicago; prior_confidence at 0.55 reflects that the ETI literature
  is fragmented and the headline finding depends critically on which
  decade and which country-set is being weighted. The structural
  defence is that the falsification threshold (c) makes the
  Diamond-Saez-Piketty reading a clean win if the inverse-elasticity
  bound exceeds 70% — that is exactly their published conclusion, and
  this hypothesis takes the bet that the panel ETI evidence will not
  support it.

steelman: hypotheses/steelman/chicago_taxes_optimal_ramsey_excess_burden_high_marginal_rate.md

linked_hypotheses:
  - friedman_negative_income_tax_labour_supply_smaller_than_predicted

notes: >
  Saez-Slemrod-Giertz (2012 JEL ETI survey), Diamond-Saez (2011 JEP),
  Piketty-Saez-Stantcheva (2014 AEJ:EP), Auten-Carroll (1999 RESTAT),
  Mirrlees (1971 ReStud), Ramsey (1927 EJ) form the canonical lineage.
  The hypothesis is structured around the Saez-Slemrod-Giertz
  decomposition of ETI into real-labour-supply, tax-base-shifting,
  and evasion responses; the headline ETI estimate combines all three
  and is the relevant elasticity for the deadweight-loss calculation
  even if the labour-supply component is small.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: tax_inequality_clinton_1993_obra_top_bracket
version: 1
status: draft
topic: distribution
claim: >
  The 1993 Omnibus Budget Reconciliation Act (OBRA-1993), which raised the US
  top marginal income tax rate from 31 to 39.6 percent and added the 36
  percent bracket, produced a transitory dip in the reported top-1 pre-tax
  income share via timing-shifted realisations into 1992, but no persistent
  level reduction in the top share by 1996 once the realisation pull-forward
  unwinds. The discriminating test is whether the post-1993 trend slope of
  the top-1 share differs from the pre-1993 slope.
notes: >
  Tax-inequality candidate, swarm-S6 batch 1. Tests Saez-Slemrod-Giertz ETI
  pull-forward story against a persistent-distortion alternative.
prior_confidence: 0.6
disclosure: >
  Author prior aligns with the ETI/pull-forward reading; the 1992 spike in
  top-share data is well-documented but persistence is contested.
falsification:
  rule: >
    SUPPORTED if the post-1993 top-1 share trend slope (1994-1996) is within
    0.10pp/yr of the pre-1993 slope (1989-1992) AND the 1992 spike is
    statistically significant at p<0.10. REFUTED if post-1993 slope is more
    than 0.20pp/yr below pre-1993 slope at p<0.10.
  test: >
    US time-series structural-break test on top-1 share with explicit 1992
    realisation-spike dummy.
evidence_type: associational
sample:
  countries: [USA]
  period: [1985, 2000]
  temporal_structure: time_series
variables:
  outcome:
    - name: top_1pct_pretax_income_share
      source: "owid:top-1-share-of-total-income"
      transformation: level
  treatment:
    - name: obra_1993_post_indicator
      source: "constructed: indicator = 1 for year >= 1994"
      transformation: indicator
    - name: realisation_pullforward_1992
      source: "constructed: indicator = 1 for year == 1992"
      transformation: indicator
    - name: top_marginal_income_tax_rate
      source: "owid:top-marginal-income-tax-rate"
      transformation: level
  controls:
    - name: log_real_gdp
      source: "fred:GDPC1"
      transformation: log
    - name: equity_index_real_yoy
      source: "fred:SP500"
      transformation: real_yoy_pct_change
estimator:
  template: event_study
  clustering: year
  fixed_effects: [year]
  notes: >
    Event study with break at 1993Q3 + explicit 1992 pull-forward dummy.
    Newey-West HAC SEs.
intervention_channel: fiscal
scope:
  period: [1993, 2000]
  countries: [USA]
  outcome_dim: [poverty_inequality, taxation]
  policy_family: [tax_policy, fiscal_policy]
  treatment_tags: [obra_1993, clinton_top_rate_increase, eti_pullforward]

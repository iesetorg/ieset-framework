# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: informality_market_entry_barriers
version: 1
status: candidate
topic: distribution
claim: >-
  Informal employment as a share of total non-agricultural employment persists at higher
  levels in countries with high entry barriers and burdensome product-market regulation
  (high OECD PMR, high Doing Business cost of starting a business), even when the state
  invests heavily in development projects and public infrastructure. The claim applies to
  middle-income and emerging economies 1990-2020.
evidence_type: associational
sample:
  countries:
  - BRA
  - MEX
  - COL
  - PER
  - ARG
  - CHL
  - ZAF
  - TUR
  - THA
  - MYS
  - PHL
  - IDN
  - IND
  - VNM
  - CHN
  - EGY
  - MAR
  - TUN
  - DZA
  - JOR
  - LBN
  - RUS
  - UKR
  - KAZ
  - AZE
  - GEO
  - ARM
  - MDA
  - ROU
  - BGR
  period:
  - 1990
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - exclude countries with >50% agricultural employment
  - exclude country-years with major macroeconomic crisis (inflation >100% or GDP contraction >10%)
scope:
  period:
  - 1990
  - 2020
  countries:
  - BRA
  - MEX
  - COL
  - PER
  - ARG
  - CHL
  - ZAF
  - TUR
  - THA
  - MYS
  - PHL
  - IDN
  - IND
  - VNM
  - CHN
  - EGY
  - MAR
  - TUN
  - DZA
  - JOR
  - LBN
  - RUS
  - UKR
  - KAZ
  - AZE
  - GEO
  - ARM
  - MDA
  - ROU
  - BGR
  outcome_dim:
  - employment_labour
  - regulation_compliance_cost
  - poverty_inequality
  policy_family:
  - regulation
  - institutional_reform
  treatment_tags: []
variables:
  outcome:
  - name: informal_employment_share
    source: ilostat:EMP_TEMP_SEX_ECO_NB_E; world_bank_wdi:SL.ISV.IFRM.ZS
    transformation: level
    notes: ILOSTAT informal employment as % of total non-agricultural employment.
  treatment:
  - name: entry_barrier_index
    source: oecd_pmr:barriers_to_entry
    transformation: level
    notes: OECD PMR barriers to entry where available; World Bank Doing Business cost of starting a business elsewhere.
  - name: cost_starting_business_pct_income
    source: world_bank_wdi:IC.REG.DURS
    transformation: level
    notes: Doing Business cost of starting a business as % of income per capita (legacy series pre-2020).
  controls:
  - name: public_investment_gdp
    source: world_bank_wdi:NE.GDI.FTOT.ZS
    transformation: level
    notes: Fixed capital formation by government as % of GDP.
  - name: infrastructure_quality_index
    source: constructed:wef_gci_infrastructure; world_bank_wdi:IS.ROD.DNST.K2
    transformation: level
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: tax_burden_gdp
    source: world_bank_wdi:GC.TAX.TOTL.GD.ZS
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: >-
    The hypothesis is falsified if public investment or infrastructure quality has a
    negative and significant (p < 0.10) coefficient on informality larger in magnitude than
    the positive coefficient on entry barriers, or if entry barriers are negatively and
    significantly associated with informality.
  test: panel_fe_informality_entry_barriers_1990_2020
  threshold:
    supported: entry_barrier coefficient > 0 at p < 0.10 AND public_investment coefficient not larger negative
    refuted: entry_barrier coefficient < 0 at p < 0.10
prior_confidence: 0.65
disclosure: >-
  Author priors expect regulatory barriers to drive informality but acknowledge that public
  investment may raise formal-sector productivity and draw workers out of informality
  directly. The test is designed to separate the barrier channel from the public-investment
  channel.
steelman: hypotheses/steelman/informality_market_entry_barriers.md

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: universal_vs_meanstest_child_poverty
version: 1
status: draft
topic: distribution
claim: Child-poverty rates in EU countries with universal child-benefit systems are substantially lower than in means-tested systems at similar tax-and-transfer cost.
notes: Maps the social-democratic school's universalism-vs-meanstest claim to an EU cross-country panel using EU-SILC + OECD SOCX. Estimator and prior set; full pre-registration awaits steelman + human
  sign-off.
prior_confidence: 0.55
disclosure: Author prior leans toward universal-regimes-show-better-take-up but is uncertain whether the at-equal-fiscal-cost framing holds once tax-credit components and family-tax-allowance spending are
  properly classified; classification of UK/IRL hybrid regimes is a known sticking point.
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves
    less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: EU panel FE (1995-2023) of EU-SILC child poverty rate on universal-regime indicator interacted with family-benefit GDP share; country+year FE, country-clustered SEs. Refute if interaction coefficient
    sign-flipped at p<0.10 OR universal-regime gap <2pp at equal cost.
evidence_type: associational
sample:
  countries:
  - SWE
  - DNK
  - FIN
  - NOR
  - NLD
  - BEL
  - AUT
  - DEU
  - FRA
  - IRL
  - GBR
  - ITA
  - ESP
  - PRT
  - GRC
  - POL
  - CZE
  - HUN
  period:
  - 1995
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing EU-SILC child-poverty observations
  - winsorise transfer-spending shares at 1st/99th sample percentile
variables:
  outcome:
  - name: child_poverty_rate_at_60_median
    source: eurostat:ILC
    transformation: level
    notes: 'Eurostat EU-SILC at-risk-of-poverty rate, children under-18, 60% median equivalised disposable income threshold.

      '
  - name: child_poverty_rate_anchored
    source: oecd:OECD.WISE.INE,DSD_IDD@DF_CHILD_POV,1.0
    transformation: level
    notes: 'OECD IDD anchored child poverty rate as cross-check.

      '
  treatment:
  - name: universal_child_benefit_dummy
    source: derived:eu_child_benefit_regime
    transformation: indicator
    notes: 'Hand-coded indicator (1 = universal child benefit; 0 = means- tested) per OECD social-policy database. TODO: replace with oecd_pmr or oecd social-protection structured series when registered.

      '
  - name: family_benefit_spending_share_of_gdp
    source: oecd:OECD.ELS.SOC,DSD_SOCX@DF_SOCX_AGG,1.0
    transformation: level
    notes: 'OECD SOCX family-policy aggregate; equal-cost matching component for the cost-controlled comparison.

      '
  controls:
  - name: gdp_per_capita_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
  - name: unemployment_rate
    source: world_bank_wdi:SL.UEM.TOTL.ZS
    transformation: level
  - name: female_labour_force_participation
    source: world_bank_wdi:SL.TLF.CACT.FE.ZS
    transformation: level
  - name: gini_disposable_income
    source: world_bank_wdi:SI.POV.GINI
    transformation: level
scope:
  period:
  - 1995
  - 2023
  countries:
  - EU
  outcome_dim:
  - poverty_inequality
  - welfare_state
  policy_family:
  - welfare_architecture
  - fiscal_policy
  treatment_tags:
  - universal_child_benefit
  - means_tested_child_benefit
  - universal_welfare_architecture
covers_claims:
- position_id: social_democratic
  claim_index: 14
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: Social-democratic claim and hypothesis claim are textually identical — EU universal vs means-tested child-benefit comparison at equal fiscal cost.
estimator:
  template: panel_fe
  clustering: country
  fixed_effects:
  - country
  - year
  notes: 'EU cross-country panel comparing universal vs means-tested child- benefit regimes at equal fiscal cost. Country and year FE; clustering by country. Eurostat / EU-SILC child-poverty rates as outcomes;
    OECD social-expenditure breakdown for treatment classification.

    '

hypothesis_id: tax_inequality_korea_progressive_turn_2017_2020
version: 1
status: draft
topic: distribution
claim: >
  South Korea's Moon-era progressive turn 2017-2020 (top marginal rate
  raised from 40 to 42 then 45 percent, corporate top rate raised from
  22 to 25 percent, capital-gains broadening) produced a measurable
  decline in the Korean top-1 pretax income share by at least 0.5
  percentage points over 2017-2022 vs East-Asia synthetic control,
  consistent with the public-finance literature where rate increases
  in evasion-constrained but enforcement-intensifying environments
  produce real distributional effects. The discriminating test is the
  synth-control gap on top-1 share.

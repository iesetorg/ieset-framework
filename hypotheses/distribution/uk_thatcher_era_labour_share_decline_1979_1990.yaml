# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_thatcher_era_labour_share_decline_1979_1990
version: 1
status: draft
topic: distribution
claim: >
  The UK labour share of national income fell during the Thatcher era
  (1979-1990) by a magnitude not explained by sectoral composition shifts
  alone. A bundle of Thatcherite reforms — 1980-1984 union-law tightening,
  1980 Right-to-Buy council-housing privatisation, 1986 Big Bang financial
  deregulation — jointly explains the decomposition residual once sector
  mix is netted out.
notes: >
  Maps the marxian school's Thatcher-bundle claim on the UK labour-share decline 1979-1990 to a
  shift-share-with-residual decomposition plus event studies on the three policy dates.
  Estimator and prior set; full pre-registration awaits steelman + human sign-off.
prior_confidence: 0.6
disclosure: >
  Author prior aligns with the view that Thatcher-era institutional changes accelerated the
  UK labour-share decline beyond pure sectoral composition; the joint-attribution test across
  three reform dates is sensitive to overlapping treatment windows and the choice of
  counterfactual sector-mix benchmark.
falsification:
  rule: >
    The hypothesis is SUPPORTED if UK labour-share decline 1979-1990 exceeds
    counterfactual sectoral-composition-only projection by at least 3
    percentage points, AND if event-study estimates around the three reform
    dates (1980 Right-to-Buy, 1984 union-law, 1986 Big Bang) jointly
    explain at least half of the residual. REFUTED if sectoral composition
    alone explains >80% of the decline, or if the reform-window event-study
    coefficients are statistically indistinguishable from zero.
  test: 'UK 1979-1990 shift-share decomposition of labour-share decline into sector-mix vs within-sector components, plus event studies (±3y) around 1980, 1984, 1986 reform dates. Refute if sector-mix explains >80% OR event coefficients indistinguishable from zero at p<0.10.'
sample:
  countries: [GBR]
  period: [1979, 1990]
  temporal_structure: time_series
variables:
  outcome:
    - name: labour_share_of_national_income
      source: "pwt:labsh"
      transformation: level
      notes: "Penn World Table labsh — share of labour compensation in GDP at current national prices."
    - name: union_density
      source: "ons:trade_union_membership"
      transformation: level
      notes: "ONS trade-union-membership share of employees, supplementary outcome — pre-emptively captures the union-law reform channel."
  treatment:
    - name: thatcher_reform_bundle_indicator
      source: "constructed: indicators for 1980 Right-to-Buy enactment, 1980/82/84/88 Employment Acts (union-law tightening), 1986 Big Bang financial deregulation; treated as joint event-study."
      transformation: indicator
  controls:
    - name: manufacturing_share_gdp
      source: "world_bank_wdi:NV.IND.MANF.ZS"
      transformation: level
      notes: "Sector-mix control — partials out the deindustrialisation channel from the within-sector residual."
    - name: log_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
evidence_type: associational
estimator:
  template: panel_fe_decomposition
  clustering: year
  fixed_effects: [year]
  notes: >
    Single-country decomposition: shift-share split of UK labour-share decline
    1979-1990 into sector-mix (between-sector) and within-sector components,
    using ONS sector accounts. Then event-study (±3y) on three reform dates
    (1980 Right-to-Buy, 1984 union-law tightening peak, 1986 Big Bang) on
    the within-sector residual. HAC SEs. Caveat: overlapping treatment
    windows make joint attribution noisy — flagged TODO swarm-6e for
    sensitivity using OECD international comparators as residual benchmark.
scope:
  period: [1979, 1990]
  countries: [GBR]
  outcome_dim: [labour_share, housing, financialisation]
  policy_family: [labour_market, housing_policy, regulation, privatisation_nationalisation]
  treatment_tags: [thatcher_reforms_1979, uk_big_bang_1986, right_to_buy_1980, uk_union_law_reform_1980s]
covers_claims:
  - position_id: marxian
    claim_index: 12
    polarity: aligned
    school_prediction: supported
    confidence: high
    notes: "Marxian claim that Thatcher-era bundle reforms drove the UK labour-share decline beyond sectoral composition. Relinked from uk_economic_decline_multi_movement in Phase 4E."

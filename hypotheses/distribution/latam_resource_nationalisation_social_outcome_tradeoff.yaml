estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    LatAm panel (treated: VEN, BOL, ECU; donor pool: PER, COL, CHL,
    BRA, MEX) regressing social-outcome and extractive-output indices
    on resource-nationalisation intensity with country and year FE.
    Robustness: synthetic-control gap on each treated country.


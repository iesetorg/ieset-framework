  - ITA
  - JPN
  - KOR
  - LTU
  - LUX
  - LVA
  - MEX
  - NLD
  - NOR
  - NZL
  - POL
  - PRT
  - SVK
  - SVN
  - SWE
  - TUR
  - USA
  period: &id001
  - 1975
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - drop country-periods missing the predeclared treatment or outcome
  - retain common shocks and absorb them with year effects where the estimator is
    a panel FE
variables:
  outcome:
  - name: poverty_reduction
    source: local pinned vintage panel
    transformation: Supported if mean market-minus-disposable poverty reduction is
      >= 5 percentage points and at least 85 percent of country-years are positive,
      with at least 300 observations and 25 countries.
  treatment:
  - name: redistribution_system
    source: local pinned vintage panel
    transformation: as predeclared in threshold
estimator:
  template: descriptive
  fixed_effects: []
  clustering: ''
  notes: Generated Worker C first-tranche local-data panel verdict.
falsification:
  rule: Supported if mean market-minus-disposable poverty reduction is >= 5 percentage
    points and at least 85 percent of country-years are positive, with at least 300
    observations and 25 countries.
  test: oecd_public_transfers_poverty_reduction_panel
  threshold:
    mean_min: 5.0
    share_min: 0.85
    min_observations: 300
    min_countries: 25
prior_confidence: 0.88
disclosure: This is a compact first-tranche screen. It predeclares magnitude and coverage
  gates before reading the emitted verdict, but it is not a causal natural experiment.
steelman: hypotheses/steelman/oecd_public_transfers_poverty_reduction_panel.md
scope:
  period: *id001
  countries:
  - OECD
  outcome_dim:
  - poverty_inequality
  policy_family:
  - institutional_reform
  treatment_tags:
  - oecd
  - public
  - transfers
  - poverty
  - reduction
notes: Runnable via engine/runs/oecd_public_transfers_poverty_reduction_panel/replication.py.

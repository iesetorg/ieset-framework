# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: oecd_public_transfers_poverty_reduction_panel
version: 1
status: candidate
topic: distribution
claim: Across OECD country-years, disposable-income poverty rates are materially lower
  than market-income poverty rates at the 50 percent median-income line.
evidence_type: descriptive
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - CAN
  - CHE
  - CHL
  - CRI
  - CZE
  - DEU
  - DNK
  - ESP
  - EST
  - FIN

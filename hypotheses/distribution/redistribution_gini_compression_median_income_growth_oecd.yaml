# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: redistribution_gini_compression_median_income_growth_oecd
version: 1
status: candidate
topic: distribution
claim: >
  In OECD countries from 1995 to 2023, faster compression of disposable-income inequality does not predict faster real
  household income growth once aggregate GDP per capita growth, employment, and productivity controls are included.
  The mechanism tested is whether redistribution-driven equality raises broad living standards directly, or whether
  median and lower-half gains mainly arrive through market income growth.
evidence_type: associational
sample:
  countries: [AUS, AUT, BEL, CAN, CHE, CHL, COL, CRI, CZE, DEU, DNK, ESP, EST, FIN, FRA, GBR, GRC, HUN, IRL, ISR, ITA, JPN, KOR, LTU, LVA, LUX, MEX, NLD, NOR, NZL, POL, PRT, SVK, SVN, SWE, TUR, USA]
  period: [1995, 2023]
  temporal_structure: panel
  exclusion_rules:
    - use five-year non-overlapping windows where annual income-distribution data are sparse
    - drop countries with fewer than three usable inequality observations
    - do not interpolate Gini over gaps longer than five years
scope:
  period: [1995, 2023]
  countries: [OECD]
  outcome_dim: [poverty_inequality, wage_stagnation, gdp_growth]
  policy_family: [welfare_architecture, fiscal_policy, tax_policy]
  treatment_tags: [gini_compression, median_income_growth, market_income_growth]
variables:
  outcome:
    - name: real_household_disposable_income_growth
      source: oecd:OECD.SDD.NAD,DSD_NASEC_T7HH@DF_T7HH,1.0
      transformation: five_year_log_change
      notes: OECD household disposable income per capita where available; WDI GDP per capita is only a fallback robustness outcome.
    - name: bottom_income_share_proxy
      source: world_bank_wdi:SI.DST.FRST.20
      transformation: five_year_change
      notes: Lowest-quintile income share is the local WDI proxy until a full bottom-40 series is fetched.
  treatment:
    - name: disposable_income_gini
      source: world_bank_wdi:SI.POV.GINI
      transformation: five_year_change
      notes: Negative changes are Gini compression.
    - name: tax_revenue_share
      source: world_bank_wdi:GC.TAX.TOTL.GD.ZS
      transformation: five_year_mean
  controls:
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
      transformation: five_year_mean
    - name: employment_to_population_ratio
      source: world_bank_wdi:SL.EMP.TOTL.SP.ZS
      transformation: five_year_change
    - name: total_factor_productivity_growth
      source: pwt:rtfpna
      transformation: five_year_log_change
    - name: trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: five_year_mean
intervention_channel: fiscal
intervention_channel_justification: >
  Gini compression is not itself a policy lever, but the treatment is interpreted alongside tax revenue as the observed
  outcome of tax-transfer redistribution. Market-growth controls are included to separate redistribution from income
  creation.
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Five-year panel with country and period fixed effects. Primary coefficient is the association between Gini
    compression and real household disposable income growth after growth, employment, and TFP controls.
falsification:
  rule: >
    Supported if Gini compression is not positive and significant for household income growth after controls, while GDP
    per capita growth or employment growth is positive at p <= 0.10. Refuted if Gini compression is positive at p <=
    0.10 and remains larger than market-growth controls in standardized terms.
  test: panel_fe_gini_compression_median_income_growth
  threshold:
    gini_compression_not_positive_significant: true
    market_growth_channel_p_max: 0.10
    min_observations: 180
prior_confidence: 0.53
disclosure: >
  The author expects income creation to matter more than redistribution for durable living-standard growth. This is
  vulnerable to refutation if egalitarian tax-transfer systems show faster household income growth after market-growth
  controls.
steelman: hypotheses/steelman/redistribution_gini_compression_median_income_growth_oecd.md
notes: >
  Mechanism target: this distinguishes lower measured inequality from higher broad real incomes, allowing either side
  of the redistribution-growth claim to win on the data.

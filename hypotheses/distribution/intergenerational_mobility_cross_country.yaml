# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: intergenerational_mobility_cross_country
version: 1
status: pre_registered
methodology_note: >-
  2026-05-04 data-source repair only: the two mobility outcome `source`
  tokens were aligned from unrelated WDI placeholders to the OWID
  mobility mirrors already described in the v1 notes and replication
  gate. This does not change the claim, country sample, estimator,
  falsification threshold, or school links. The hypothesis remains
  data-gated unless a real intergenerational mobility outcome and all
  three institutional-channel series are present.
topic: distribution
claim: 'Cross-country variation in intergenerational income mobility (commonly measured as the rank-rank slope or intergenerational income elasticity) across OECD countries is substantially explained by
  institutional determinants — education-system equality of provision, residential segregation, and housing affordability — rather than by the aggregate redistribution level. Specifically: countries with
  more equal public education spending across school districts, lower residential income segregation, and more affordable housing in high-opportunity regions should show higher mobility after controlling
  for GDP per capita, the level of disposable-income Gini, and institutional quality. The claim aligns with the Chetty-Hendren-Kline-Saez opportunity-atlas finding that mobility is generated by place-based
  mechanisms more than by transfer-based redistribution, and generalises it cross-country.

  '
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - FRA
  - DEU
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - CHE
  - BEL
  - AUT
  - IRL
  - NZL
  - JPN
  - KOR
  period:
  - 1990
  - 2020
  temporal_structure: cross_section_with_justification
  cross_section_justification: 'Intergenerational mobility is a cohort statistic; measuring it requires observing parent-child income pairs with parents typically observed in their 40s and children observed
    in their 30s, yielding one mobility point per country per roughly 20-year parent-income window. OECD''s cross-country mobility estimates (Corak 2013, OECD 2018 Broken Social Mobility Ladder) report
    single cross-sectional mobility measures per country, which is the natural structure of the data. Country-level institutional covariates are averaged over the 1990-2020 window under which mobility is
    measured.

    '
  exclusion_rules:
  - drop countries without OECD-comparable mobility measurement
  - drop countries where Chetty-style administrative data cannot be approximated
scope:
  period:
  - 1990
  - 2020
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - FRA
  - DEU
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - CHE
  - BEL
  - AUT
  - IRL
  - NZL
  - JPN
  - KOR
  outcome_dim:
  - poverty_inequality
  - housing
  - institutional_quality
  policy_family:
  - housing_policy
  - institutional_reform
  - welfare_architecture
  treatment_tags:
  - intergenerational_mobility
  - residential_segregation
  - education_inequality
  - opportunity_atlas
variables:
  outcome:
  - name: intergenerational_earnings_elasticity
    source: owid:intergenerational-earnings-elasticity
    transformation: level
    notes: 'Corak-OECD intergenerational earnings elasticity (higher = less mobility). OWID mirrors the Corak-OECD cross-country series; native OECD mobility dataset requires OECD SDD SOC extension to the
      current OECD fetcher. Supplement with rank-rank slopes where available as robustness.

      '
  - name: bottom_to_top_quintile_transition_probability
    source: owid:share-of-children-in-the-bottom-quintile-who-make-it-to-the-top-quintile
    transformation: level
    notes: 'Alternative mobility measure; proportion of children born to bottom-quintile parents who reach top-quintile adulthood. Captures tail mobility; more policy-relevant than aggregate elasticity.

      '
  decomposition_channels:
  - name: education_spending_inequality
    source: oecd:OECD.EDU.IMEP,DSD_EAG_FIN@DF_FIN_RESOURCES,1.0
    transformation: coefficient_of_variation
    notes: 'Coefficient of variation in public per-pupil spending across subnational units (US state, UK nation, DE Land, etc.). OECD Education at a Glance provides subnational distributions for most OECD
      countries; dataflow URN approximate, confirm at wiring.

      '
  - name: residential_segregation_by_income
    source: oecd:OECD.ELS.HD,DSD_HH_DASH@DF_HSG_INEQ,1.0
    transformation: level
    notes: 'OECD Affordable Housing Database reports income-segregation indices at metro level for most OECD countries; aggregate to country mean weighted by metro population. Exact series ID pending fetcher-level
      resolution.

      '
  - name: price_to_income_ratio_tier1_cities
    source: bis:WS_SPP
    transformation: ratio_to_median_income
    notes: 'Housing affordability in high-opportunity metros; BIS residential property prices benchmarked to OECD median household income. Channel for the housing-affordability-gates-mobility story.

      '
  controls:
  - name: gdp_per_capita_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
  - name: disposable_income_gini
    source: world_bank_wdi:SI.POV.GINI
    transformation: level
  - name: government_effectiveness
    source: wgi:GOV_WGI_GE.EST
    transformation: level
  - name: tertiary_attainment_rate
    source: world_bank_wdi:SE.TER.CUAT.BA.ZS
    transformation: level
    notes: Education-level control separate from equality-of-provision channel.
estimator:
  template: panel_fe
  clustering: country
  notes: "Cross-sectional regression (n ~ 20 countries, one mobility point per country); no panel dimension. Specification:\n  mobility = b0 + b1*edu_inequality + b2*residential_segregation\n  + b3*housing_affordability\
    \ + b4*controls + epsilon\nGiven small n, report bootstrap SEs (1000 replications), partial-R2 decomposition, and robustness via Bayesian linear regression with weakly informative priors (Horseshoe\
    \ on coefficients). Leave-one- out robustness to check Nordic-cluster and US outlier sensitivity. template=panel_fe slot used for the regression mechanics; no fixed effects (cross-section).\n"
falsification:
  rule: 'Not supported if the three institutional channels (education inequality, residential segregation, housing affordability) jointly account for less than 40 percent of R-squared in the cross-country
    mobility regression after controlling for GDP per capita, Gini, and government effectiveness. Separately, if disposable-income Gini alone (controlling for nothing else) explains more variation than
    the three institutional channels combined, the "institutional determinants more than redistribution level" framing is weakened and the Piketty-style "compressed income distributions mechanically produce
    mobility" reading earns standing. Given n ~ 20 and the resulting statistical power limits, robust findings require the institutional-channel result to survive leave-one-out robustness (no single country
    swings the conclusion).

    '
  test: partial_r2_channels_vs_gini_plus_loo_robustness
  threshold: 'partial_r2_institutional_channels >= 0.40  AND partial_r2_institutional_channels > partial_r2_gini_alone  AND loo_robust (no single country swings sign of primary channel)

    '
prior_confidence: 0.65
disclosure: 'Author''s priors align with the place-based / institutional-channel reading of cross-country mobility (Chetty cross-country generalisation), and are sceptical of the transfer-level explanation.
  The small n ~ 20 means the finding will have wide confidence bands, and the 40% partial-R2 threshold is defensible but not highly discriminating. Leave-one-out robustness is the binding tight check.

  '
steelman: hypotheses/steelman/intergenerational_mobility_cross_country.md
linked_hypotheses:
- growth_vs_distribution_tradeoff
- housing_cost_driven_real_wage_divergence
- nordic_outcome_persistence_decomposition
notes: 'Data-gated on native OECD mobility fetcher (pending OECD SDD SOC extension), native Chetty opportunity-atlas fetcher (US-specific, not cross-country), and OECD Affordable Housing Database extension.
  v1 routes through OWID mirrors of Corak-OECD measures; v2 upgrade on native fetcher availability. Sample size limit means this is a low-power test; the primary value is combined with the other distribution-track
  hypotheses as a triangulation rather than a stand-alone finding.
  2026-05-04 local data repair audit found no on-disk mobility outcome
  vintage and no on-disk OECD Education-at-a-Glance subnational spending
  dispersion or OECD Affordable Housing income-segregation vintage. Narrow
  single-series fetch attempts for the listed OWID mobility slugs returned
  404 and the listed OECD channel dataflows returned 403 through the
  current fetcher, so GDP per capita or poverty-headcount WDI series must
  not be substituted for the preregistered mobility outcomes.

  '


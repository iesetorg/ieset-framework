notes: >
  Tax-inequality candidate, swarm-S6 batch 2. Tests the "ISF abolition
  caused exodus reversal" narrative against the broader CRS-enforcement
  confound.
prior_confidence: 0.55
disclosure: >
  Author prior accepts the top-1 share rose post-2018 in France but is
  skeptical that the Macron reform alone caused a substantial migration
  reversal beyond what CRS-era enforcement would have produced.
falsification:
  rule: >
    SUPPORTED if the FRA post-2018 treatment coefficient on the top-1 pretax
    income share is positive (top share rises after the ISF->IFI abolition vs
    the country+year fixed-effect counterfactual) at p<0.10. REFUTED if
    negative at p<0.10. PARTIAL if not significant.
  test: >
    Two-way fixed-effects (country + year) event study, treated FRA from
    2018, Eurozone donor pool. Year FE absorb the CRS-enforcement-era common
    trend the disclosure flags as the main confound.
evidence_type: associational
sample:
  countries: [FRA, DEU, ITA, ESP, NLD, BEL, AUT, PRT, FIN]
  period: [2010, 2023]
  temporal_structure: panel
variables:
  outcome:
    - name: top_1pct_pretax_income_share
      source: "owid:top-1-share-of-total-income"
      transformation: level
    - name: top_1pct_wealth_share
      source: "wid_concentration:top1_net_personal_wealth_share"
      transformation: level
  treatment:
    - name: isf_to_ifi_2018_fra_post
      source: "constructed: indicator = 1 for FRA, year >= 2018"
      transformation: indicator
    - name: top_marginal_income_tax_rate
      source: "owid:top-marginal-income-tax-rate"
      transformation: level
  controls:
    - name: log_real_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
estimator:
  template: event_study
  clustering: country
  fixed_effects: [country, year]
  event_year: 2018
  notes: >
    v2 (2026-06-29): TWFE (country + year FE) pooled post-treatment
    coefficient, country-clustered SEs, treated FRA from 2018. Switched from
    level synthetic control for consistency with the French ISF suite; wealth-
    share outcome repointed to the wid_concentration adapter.
intervention_channel: fiscal
scope:
  period: [2017, 2023]
  countries: [FRA]
  outcome_dim: [poverty_inequality, taxation, capital_flows]
  policy_family: [tax_policy]
  treatment_tags: [macron_isf_abolition_2018, ifi_pfu_2018, wealth_tax_reform]

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: tax_inequality_estonia_1994_flat_tax_dividend_reform
version: 1
status: draft
topic: distribution
claim: >
  Estonia's 1994 flat-tax 26 percent (subsequently reduced to 20 percent
  by 2015) and the unique 2000 corporate-tax reform (taxing only
  distributed corporate profits) produced a measurable rise in the
  Estonian top-1 pretax income share over 1994-2010 vs Baltic synthetic
  comparator (LVA, LTU), with the distributed-profit-only corporate
  regime channelling capital-income into top-decile reported income
  while reducing taxation of retained earnings. The discriminating test
  is the synth-control gap on top-1 share against LVA/LTU.
notes: >
  Tax-inequality candidate, swarm-S6 batch 6. The Estonian distributed-
  profits-only corporate tax is unique and uniquely identifying for
  retention-vs-distribution incentive effects.
prior_confidence: 0.6
disclosure: >
  Author prior accepts Estonian tax structure pushed top reported share
  upward via the dividend channel relative to Baltic peers.
falsification:
  rule: >
    SUPPORTED if Estonian top-1 pretax share is at least 1.0 percentage
    point above Baltic synth at the 2010 horizon AND dividend share of
    top-decile income exceeds Baltic comparator average by 3 percentage
    points at p<0.10. REFUTED if no detectable gap or negative gap at
    horizon.
  test: >
    Synthetic-control with Baltic donor pool (LVA, LTU), treated EST
    1994. Composition robustness via dividend-share decomposition.
evidence_type: associational
sample:
  countries: [EST, LVA, LTU]
  period: [1994, 2015]
  temporal_structure: panel
  exclusion_rules:
    - "exclude pre-1994 transition-shock years from baseline fit"
variables:
  outcome:
    - name: top_1pct_pretax_income_share
      source: "owid:top-1-share-of-total-income"
      transformation: level
  treatment:
    - name: est_flat_tax_post_1994
      source: "constructed: indicator = 1 for EST, year >= 1994"
      transformation: indicator
    - name: top_marginal_income_tax_rate
      source: "owid:top-marginal-income-tax-rate"
      transformation: level
  controls:
    - name: log_real_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
estimator:
  template: synthetic_control
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Synthetic-control with Baltic donor pool. Treated EST 1994.
intervention_channel: fiscal
scope:
  period: [1994, 2015]
  countries: [EST]
  outcome_dim: [poverty_inequality, taxation]
  policy_family: [tax_policy]
  treatment_tags: [estonia_flat_tax_1994, distributed_profits_only_corporate, baltic_distribution]

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: redistribution_tax_transfer_mobility_oecd
version: 1
status: candidate
topic: distribution
claim: >
  Across OECD countries with comparable intergenerational mobility measures, higher tax-and-transfer redistribution is
  not sufficient to predict higher mobility after controlling for GDP per capita, education attainment, housing
  affordability, and rule of law. The mechanism tested is whether mobility is generated by opportunity institutions and
  market access rather than by disposable-income compression alone.
evidence_type: associational
sample:
  countries: [AUS, AUT, BEL, CAN, CHE, DEU, DNK, ESP, FIN, FRA, GBR, IRL, ITA, JPN, KOR, NLD, NOR, NZL, SWE, USA]
  period: [1990, 2020]
  temporal_structure: cross_section_with_justification
  cross_section_justification: >
    Intergenerational mobility is measured over parent-child cohorts, so each country contributes one or a small number
    of cohort-level mobility observations. Treatment and controls are averaged over the cohort formation window.
  exclusion_rules:
    - drop countries without comparable intergenerational earnings elasticity or rank-rank mobility estimates
    - require at least 15 countries in the primary cross-section
scope:
  period: [1990, 2020]
  countries: [OECD]
  outcome_dim: [poverty_inequality, institutional_quality, housing]
  policy_family: [welfare_architecture, tax_policy, institutional_reform, housing_policy]
  treatment_tags: [tax_transfer_redistribution, intergenerational_mobility, opportunity_institutions]
variables:
  outcome:
    - name: intergenerational_earnings_elasticity
      source: owid:intergenerational-earnings-elasticity
      transformation: level
      notes: Higher values mean lower mobility; use OECD or Corak-series mirror where available.
    - name: bottom_to_top_quintile_transition_probability
      source: owid:share-of-children-in-the-bottom-quintile-who-make-it-to-the-top-quintile
      transformation: level
      notes: Higher values mean more upward tail mobility.
  treatment:
    - name: tax_revenue_share
      source: world_bank_wdi:GC.TAX.TOTL.GD.ZS
      transformation: period_mean
    - name: social_spending_share
      source: oecd:OECD.SOCX
      transformation: period_mean
    - name: disposable_income_gini
      source: world_bank_wdi:SI.POV.GINI
      transformation: period_mean
      notes: Lower Gini is the income-compression channel predicted by redistribution-first accounts.
  controls:
    - name: log_gdp_per_capita_ppp
      source: world_bank_wdi:NY.GDP.PCAP.PP.KD
      transformation: period_mean_log
    - name: tertiary_attainment
      source: world_bank_wdi:SE.TER.CUAT.BA.ZS
      transformation: period_mean
    - name: housing_price_index
      source: bis:WS_SPP
      transformation: period_mean
      notes: Housing affordability proxy; high housing prices can block access to opportunity-rich regions.
    - name: rule_of_law
      source: wgi:RL.EST
      transformation: period_mean
intervention_channel: bundled
intervention_channel_justification: >
  The treatment includes fiscal redistribution and non-fiscal opportunity channels. The design compares them rather
  than assigning the whole mobility mechanism to one policy lever.
estimator:
  template: descriptive
  clustering: country
  notes: >
    Small-n cross-sectional regression with standardized variables, bootstrap confidence intervals, and leave-one-out
    sensitivity. Report partial R-squared for redistribution variables versus opportunity controls.
falsification:
  rule: >
    Supported if redistribution variables have lower joint partial R-squared than education, housing, and rule-of-law
    controls, and if disposable_income_gini does not have the predicted sign at p <= 0.10. Refuted if redistribution
    variables dominate the opportunity controls and lower Gini significantly predicts higher mobility.
  test: cross_section_partial_r2_redistribution_vs_opportunity_mobility
  threshold:
    opportunity_partial_r2_gt_redistribution_partial_r2: true
    p_max_gini_channel: 0.10
    min_countries: 15
prior_confidence: 0.52
disclosure: >
  The author's prior is skeptical that redistribution alone creates mobility, but the Nordic cases make the
  redistribution channel plausible. Because mobility samples are small, this candidate should be treated as a weak but
  falsifiable mechanism test.
steelman: hypotheses/steelman/redistribution_tax_transfer_mobility_oecd.md
notes: >
  This candidate intentionally targets the mechanism "redistribution creates mobility" rather than broad claims about
  equality or justice.

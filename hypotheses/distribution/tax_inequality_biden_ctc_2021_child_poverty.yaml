hypothesis_id: tax_inequality_biden_ctc_2021_child_poverty
version: 1
status: draft
topic: distribution
claim: >
  The 2021 expansion of the US Child Tax Credit under the American Rescue
  Plan (full refundability + monthly payments + raised maximum) reduced
  the official + Supplemental Poverty Measure child poverty rate by at
  least 3 percentage points within the six-month payment window (July-
  December 2021), with a sharp reversion after expiration in 2022Q1. The
  discriminating test is the symmetric pre/expansion/post pattern in SPM
  child-poverty rates.

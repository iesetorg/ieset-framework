# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: tax_inequality_reagan_1986_base_broadening_neutrality
version: 1
status: draft
topic: distribution
claim: >
  The 1986 Tax Reform Act (TRA86) — which paired a top-rate cut from 50 to
  28 percent with substantial base-broadening (passive-loss limits, AMT
  expansion, capital-gains rate harmonisation) — produced a smaller persistent
  top-1 income share response than ERTA 1981 once the one-off 1986-1988
  realisation spike from capital-gains reclassification is removed. A clean
  supported finding undermines the "rate cut alone drives top share" reading
  and supports the public-finance consensus that base composition matters.
notes: >
  Tax-inequality candidate, swarm-S6 batch 1. Companion to ERTA spec; the
  point of the pair is that the inequality elasticity differs sharply when
  base-broadening is done concurrently.
prior_confidence: 0.6
disclosure: >
  Author prior weakly favours the base-broadening neutrality story (Auerbach,
  Slemrod, Feldstein-Feenberg). Recognises that the 1986-1988 realisations
  spike makes the raw series misleading.
falsification:
  rule: >
    SUPPORTED if the top-1 pretax share residualised on a 1986-1988 capital-
    gains-realisation dummy shows no statistically significant increase post
    1988 (p<0.10) AND the post-1988 trend slope is within 0.05pp/yr of the
    pre-1986 trend slope. REFUTED if the residualised post-1988 trend slope
    exceeds the pre-1986 slope by more than 0.10pp/yr at p<0.10.
  test: >
    US time-series 1975-1995 with structural-break test at 1988Q1 after
    purging 1986-1988 realisation spike. Newey-West HAC SEs.
evidence_type: associational
sample:
  countries: [USA]
  period: [1975, 1995]
  temporal_structure: time_series
  exclusion_rules:
    - "flag 1986-1988 capital-gains realisation window for separate handling"
variables:
  outcome:
    - name: top_1pct_pretax_income_share
      source: "owid:top-1-share-of-total-income"
      transformation: level
    - name: top_0p1pct_pretax_income_share
      source: "owid:top-0-1-share-of-total-income"
      transformation: level
  treatment:
    - name: post_tra86_indicator
      source: "constructed: indicator = 1 for year >= 1988 (post-realisation-window)"
      transformation: indicator
    - name: capital_gains_realisation_dummy
      source: "constructed: indicator = 1 for years 1986-1988"
      transformation: indicator
    - name: top_marginal_income_tax_rate
      source: "owid:top-marginal-income-tax-rate"
      transformation: level
  controls:
    - name: log_real_gdp
      source: "fred:GDPC1"
      transformation: log
    - name: equity_index_real_yoy
      source: "fred:SP500"
      transformation: real_yoy_pct_change
estimator:
  template: event_study
  clustering: year
  fixed_effects: [year]
  notes: >
    Event study with structural break at 1988Q1; explicit handling of 1986-
    1988 realisation spike via dummy. Newey-West HAC SEs. Robustness with
    local_projections of top-share level on 1986 and 1988 break dummies
    separately.
intervention_channel: fiscal
scope:
  period: [1986, 1995]
  countries: [USA]
  outcome_dim: [poverty_inequality, taxation]
  policy_family: [tax_policy, fiscal_policy]
  treatment_tags: [tra_1986, reagan_tax_reform_1986, base_broadening, capital_gains_realisation_spike]

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: consumer_goods_allocation
category: conditions_favoring_markets

description: >
  Allocation of heterogeneous consumer goods — food items, clothing,
  household goods, electronics, entertainment — is a domain where
  decentralised market exchange with flexible prices empirically
  outperforms state allocation by a wide margin. This is one of the
  strongest and least contested empirical regularities in
  twentieth-century economic history.

institutional_features_that_make_the_model_work:
  price_signals_aggregate_dispersed_information: >
    Prices aggregate information about scarcity, production cost, and
    consumer preferences that no central planner can collect in real
    time (Hayek 1945, "The Use of Knowledge in Society"). Consumer
    goods involve millions of heterogeneous items with constantly
    shifting demand, making the informational problem acute.

  calculation_problem: >
    Without market prices for consumer goods and the inputs that
    produce them, planners cannot compute relative costs or prioritise
    production (Mises 1920, "Economic Calculation in the Socialist
    Commonwealth"). The twentieth-century socialist calculation debate
    was, on this specific domain, settled empirically by Soviet-bloc
    experience.

  entry_and_competition_drive_variety_and_quality: >
    Free entry of retailers and producers creates a process of
    continuous experimentation on variety, quality, and price. Retail
    chains, specialty stores, and e-commerce platforms all emerged
    through market entry that central planning cannot replicate.

  supporting_property_rights_and_contract_enforcement: >
    Functioning consumer-goods markets require enforceable property
    rights, contract law, consumer-protection frameworks, and basic
    state capacity. Market allocation does not run on its own; it
    runs on top of a state that enforces the rules.

supporting_cases:
  - id: soviet_consumer_goods_chronic_shortages_1960s_1989
    description: >
      Soviet retail allocation produced chronic shortages, queues,
      and poor product quality across food and consumer durables
      for decades despite heavy planning investment. The contrast
      with contemporaneous Western consumer markets was visible
      enough that Gorbachev's glasnost-era admissions cited it
      directly.
    citations:
      - "Kornai, J. (1992). The Socialist System. Oxford University Press."
      - "Shleifer & Treisman (2005). A Normal Country. Journal of Economic Perspectives."

  - id: east_west_germany_consumer_divergence_1949_1989
    description: >
      Two populations with common language, culture, and initial
      industrial base diverged sharply in consumer-goods access
      and quality under central planning (East) vs market allocation
      (West). The comparison is one of the cleanest natural
      experiments in economic history.
    citations:
      - "Sleifer, J. (2006). Planning Ahead and Falling Behind."

  - id: venezuela_price_control_shortages_2013_2019
    description: >
      Extensive price controls on basic consumer goods under the
      Maduro government produced chronic shortages of food, medicine,
      and toiletries, parallel-market dependence, and queuing
      despite Venezuela's resource wealth. Illustrates that
      consumer-goods dysfunction under administered prices is not
      a Cold-War-only phenomenon.
    citations:
      - "Hausmann & Muci (2019). Don't blame econometrics for Venezuela's disaster."

  - id: china_post_1978_consumer_market_emergence
    description: >
      China's post-1978 reforms progressively liberalised consumer
      goods allocation; the contrast with the Mao-era shortage
      economy is stark. Consumer goods variety, quality, and
      affordability rose dramatically alongside market allocation.
    citations:
      - "Naughton, B. (2007). The Chinese Economy."

what_the_model_is_not:
  - "A claim that all goods are best allocated by unregulated markets"
  - "A denial of legitimate consumer-protection regulation (safety standards, fraud enforcement, labelling)"
  - "A claim that distribution of purchasing power is irrelevant — market allocation answers 'how' not 'to whom at what income'"
  - "Applicable without modification to domains with severe information asymmetries (healthcare, insurance) or natural monopolies"
  - "A refutation of public provision of pure public goods or of targeted in-kind transfers for specific welfare reasons"

failed_replications:
  - id: cuban_rationing_system_persistence
    description: >
      Cuba's libreta rationing system has persisted since 1962;
      despite periodic reform attempts, administered allocation
      of basic consumer goods has consistently produced shortages,
      parallel-market dependence, and low product quality relative
      to comparable-income market economies.

policy_implications: >
  For the overwhelming majority of heterogeneous consumer goods,
  the correct policy default is market allocation with price
  flexibility, supported by consumer-protection law, competition
  policy, and redistributive transfers to correct for distributional
  concerns on the income side rather than the price side. Price
  controls on broad categories of consumer goods reliably produce
  shortages; targeted in-kind transfers or cash transfers are
  superior to administered pricing.

framework_position: >
  Conditional on baseline state capacity, property rights, contract
  enforcement, and open trade, market allocation of consumer goods
  is the empirically dominant arrangement. The framework treats
  this as one of the highest-confidence domain claims in the
  taxonomy. Departures from this default require specific
  justification (public goods character, severe information
  asymmetry, explicit distributional aim pursued via the least
  distorting instrument).

confidence: high

linked_hypotheses:
  - socialist_calculation_problem_empirical_record
  - price_controls_shortage_dynamics

linked_model_ids:
  - allocation_mechanism_by_domain
  - state_capacity_as_precondition_for_intervention_success

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: health_insurance_adverse_selection
category: conditions_favoring_intervention

description: >
  Voluntary private health insurance markets face the Akerlof (1970)
  lemons problem in an acute form: insurers cannot perfectly price
  individual risk, so premiums set at the average reflect the
  expected loss of a mixed pool; low-risk individuals then exit,
  raising the average and the premium, iterating toward market
  unravelling. The problem is compounded by moral hazard, costly
  screening, and the fact that the sickest individuals — the ones
  insurance is most valuable to — are the least insurable. These
  features mean purely voluntary private health insurance markets
  systematically fail to cover the population efficiently.

institutional_features_that_make_the_model_work:
  mandate_or_automatic_enrolment: >
    Individual mandate (Netherlands Zorgverzekeringswet 2006,
    Switzerland LAMal 1996, pre-2017 ACA) or payroll auto-enrolment
    (Germany GKV, France) forces low-risk participation and
    prevents unravelling. Singapore's MediSave/MediShield layered
    system makes participation near-universal via CPF mandatory
    contributions.
  risk_equalisation_across_insurers: >
    Where multiple private/non-profit insurers compete, a central
    risk-equalisation pool transfers funds from insurers with
    low-risk enrolees to those with high-risk enrolees, neutralising
    the incentive to cream-skim. Netherlands and Germany both run
    sophisticated risk-adjustment formulas.
  public_monopsony_as_alternative: >
    Single-payer systems (Canada Medicare, UK NHS, Nordic systems,
    Taiwan NHI) sidestep adverse selection by enrolling the whole
    population by default. Achieve cost control through
    administrative pricing and global budgets.
  community_rating_with_subsidies: >
    Forbid risk-based premium variation beyond limited factors
    (age, smoker status) and subsidise low-income enrolees on a
    sliding scale so the mandate is affordable across the income
    distribution.
  competitive_delivery_with_social_financing: >
    Delivery (hospitals, physicians, pharma) can remain private and
    competitive even when financing is public or mandated. The
    market-failure argument is about the insurance contract, not
    about medical services generally.

supporting_cases:
  - id: netherlands_zorgverzekeringswet_2006
    description: >
      Mandated private insurance with risk equalisation and subsidies.
      Universal coverage, strong choice, OECD-average per-capita
      spending, high satisfaction. Shows that regulated private
      insurance can work when the mandate and risk-equalisation
      infrastructure are built properly.
  - id: germany_bismarck_system
    description: >
      Over a century of mandatory sickness-fund enrolment with
      competing non-profit funds and strong risk-equalisation.
      Universal coverage at ~12% of GDP with high quality.
  - id: singapore_cpf_medisave_medishield
    description: >
      Mandatory CPF contributions feed individual medical-saving
      accounts (MediSave), catastrophic insurance (MediShield),
      and subsidy scheme for the poor (MediFund). Among lowest
      health spending in the OECD-comparable set at strong outcomes.
  - id: taiwan_national_health_insurance_1995
    description: >
      Single-payer system established 1995, near-universal coverage
      at ~6-7% of GDP, high patient satisfaction, strong outcomes.
      Built in a middle-income country within five years — an
      existence proof of rapid implementation.

disconfirming_cases:
  - id: us_pre_aca_individual_market
    description: >
      Pre-2014 US individual insurance market showed textbook
      adverse selection: medical underwriting, pre-existing
      condition exclusions, rescissions, high uninsured rates
      (~15%). Illustrates the unregulated failure mode.
  - id: us_post_aca_without_mandate
    description: >
      The 2017 removal of the individual mandate penalty did not
      fully unravel ACA exchanges but did worsen the risk pool and
      raise premiums, as ex-ante models predicted. Partial natural
      experiment on the mandate's importance.
  - id: us_overall_cost_vs_oecd_peers
    description: >
      US spends ~17% of GDP on health with worse life-expectancy
      and coverage outcomes than OECD peers spending 10-12%. The
      hybrid captured regulated system underperforms all the
      coherent alternatives — Bismarckian, single-payer, and
      mandated-private.

policy_implications: >
  The choice is between (a) single-payer or (b) mandated private
  insurance with risk equalisation and subsidies. Both work where
  implemented cleanly; voluntary private markets do not. The US
  underperformance on cost and outcomes is not evidence that
  "markets fail in healthcare" in a general sense — it is evidence
  that a captured regulatory-hybrid system that combines the worst
  features of both poles underperforms coherent systems at either
  pole. Reform should aim at institutional coherence, not
  ideological purity.

what_the_model_is_not:
  - "A general argument that state provision of medical services is efficient"
  - "A claim that all healthcare sub-sectors exhibit this market failure — medical services, pharmaceuticals, and devices have different efficiency properties from the insurance contract"
  - "A claim that single-payer is always superior to mandated-private — both work"
  - "A vindication of the US status quo as a market system — it is a captured hybrid, not a market"
  - "A claim that adverse selection is the only mechanism causing high US costs — provider pricing, administrative overhead, and pharmaceutical pricing also contribute"

framework_position: >
  Health insurance is a canonical case where the market
  equilibrium is demonstrably worse than achievable institutional
  alternatives. Adverse selection is a real mechanism, confirmed
  repeatedly in the US individual market and reproduced in natural
  experiments on mandate removal. The framework endorses two
  families of institutional solution — single-payer public
  monopsony or mandated private insurance with risk equalisation —
  and treats the choice between them as a matter of local political
  and administrative fit rather than a first-order efficiency
  question. It rejects the framing that US underperformance is
  evidence for markets' failure in healthcare generally, because
  the US system is not a market: it is a regulated hybrid whose
  poor outcomes reflect institutional capture and design failure
  layered on top of the underlying adverse-selection problem.

confidence: high


# yaml-language-server: $schema=../../schemas/condition.schema.json
id: top_income_share_growth_channels
category: conditions_with_distributional_considerations

description: >
  Top income and wealth shares have risen in most Anglo-Saxon
  economies since roughly 1980 (Piketty, Saez, Zucman; World
  Inequality Database), while continental European and Japanese
  top shares have risen less or not at all. The framework's
  position is that the rise decomposes into at least four
  distinguishable channels — (a) returns to specialist skill and
  superstar labour, (b) returns to capital accumulation under
  compound growth, (c) rent extraction in specific captured
  sectors, (d) regulatory capture and political-economy
  favouritism — and that the policy implications differ
  substantially across channels. Cross-country heterogeneity in
  which channel dominates means a single explanation forced
  across all cases is likely to be wrong.

institutional_features_that_make_the_model_work:
  specialist_skill_premium_channel: >
    Finance, law, consulting, tech executive, and star-performer
    (sports, entertainment) labour income has risen sharply.
    Much of this appears to be genuine scarcity pricing in
    markets that scale (media, software, global capital) where
    small productivity differences produce large income
    differences. Policy response limited.
  capital_accumulation_compound_return_channel: >
    Piketty's r>g framing: sustained capital returns above
    growth rates produce wealth concentration mechanically.
    Operates most strongly under high inheritance flows and low
    capital mobility. Implies estate-tax and broad-base capital-
    income taxation as responses.
  rent_extraction_sectoral_channel: >
    Specific captured sectors (US pharma pricing, financial-sector
    risk-subsidy, pre-2010 housing finance, private-equity
    leverage-tax-shield arbitrage, occupational licensing rents)
    generate top-end income without corresponding productivity.
    Implies sector-specific institutional reform.
  regulatory_capture_and_political_favour: >
    Defence procurement, crony contracting, subsidy capture, and
    explicit political favouritism generate top incomes with no
    productivity basis. Large in developing-country contexts;
    present but smaller in advanced-economy contexts. Implies
    governance and transparency reform.

supporting_cases:
  - id: us_top_1pc_income_share_rise_1980_2020
    description: >
      US top-1% income share roughly doubled 1980-2020, with
      particularly strong growth in the top 0.1% and 0.01%.
      Heterogeneous composition: finance, tech executive, and
      inherited capital components all substantial.
  - id: continental_europe_flat_top_shares
    description: >
      Top shares in Germany, France, Netherlands, Nordic
      economies rose much less over the same period. Suggests
      institutional and tax configuration matters alongside
      technology and globalisation.
  - id: us_pharmaceutical_pricing_as_rent
    description: >
      US pharmaceutical pricing markedly above OECD peers for
      identical molecules generates identifiable rents. A
      concrete (d)-type captured-sector channel.
  - id: financial_sector_pre_2008_rent
    description: >
      Financial-sector compensation relative to peer sectors rose
      sharply pre-2008; crisis revealed systemic risk subsidy as
      a component. Philippon-Reshef documented the historical
      anomaly relative to finance's functional output.

disconfirming_cases:
  - id: skill_premium_returns_to_education_rise
    description: >
      Large literature on returns-to-education and returns-to-
      skill documents that much of the college-non-college gap
      reflects genuine skill premium, not rent. Qualifies the
      "all rent" narrative.
  - id: scandinavian_wealth_concentration_despite_redistribution
    description: >
      Even Scandinavian economies have concentrated wealth at
      the very top (family-owned firms, founder wealth) despite
      progressive taxation. Suggests capital accumulation
      operates even under redistributive tax regimes.
  - id: piketty_r_g_empirical_contestation
    description: >
      Subsequent work has contested r>g as mechanical driver of
      inequality; Rognlie's housing-centric recomposition and
      Auten-Splinter's revised US top-share series qualify the
      Piketty-Saez-Zucman baseline.

policy_implications: >
  Policy response must follow the dominant channel. Where skill-
  premium and superstar-labour channels dominate, response
  options are limited and mostly involve broad-base progressive
  labour-income taxation. Where capital accumulation dominates,
  broad-base capital-income taxation and estate taxation are
  appropriate. Where sectoral rent extraction dominates, the
  first-best response is sector-specific institutional reform
  (pharma price regulation, finance leverage rules, occupational-
  licensing repeal) rather than generic redistribution. Where
  regulatory capture dominates, the response is governance
  reform. Treating all four as the same problem with one
  response — generic wealth taxation — is likely to misdiagnose
  the dominant channel in most advanced economies.

what_the_model_is_not:
  - "An endorsement of top-share growth as efficient or socially desirable"
  - "A denial that top shares have risen — the empirical pattern is real"
  - "A claim that any single channel dominates universally across countries"
  - "A vindication of the Piketty-Saez-Zucman top-share series as uniquely correct — the Auten-Splinter revisions are live"
  - "An argument that redistribution is never appropriate"
  - "A claim that all top incomes reflect productive contribution"

framework_position: >
  Top-income-share growth is a real empirical pattern with
  heterogeneous causes whose relative weight varies across
  countries and decades. The framework endorses decomposed
  diagnosis — specialist skill premium, capital accumulation,
  sectoral rent, regulatory capture — and rejects single-channel
  explanations. It tends to find, across advanced economies,
  that channels (a) and (b) are quantitatively larger than (c)
  and (d) combined, while (c) and (d) are the more tractable
  targets for institutional reform. Policy response follows the
  channel: broad-base progressive taxation for skill and capital
  income, sector-specific reform for captured rents, governance
  reform for political-economy capture. Cross-country
  heterogeneity — continental Europe's flatter top shares —
  indicates institutional and tax configuration contribute, but
  does not reduce the question to a single lever.

confidence: medium

linked_hypotheses:
  - nordic_outcome_persistence_decomposition

linked_model_ids:
  - top_income_multi_channel_decomposition
  - sectoral_rent_vs_general_progressive_taxation_design

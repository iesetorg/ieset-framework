# yaml-language-server: $schema=../../schemas/condition.schema.json
id: trade_in_goods_and_services
category: conditions_favoring_markets

description: >
  Cross-border exchange of goods and services under a broadly
  open trading regime empirically raises aggregate output,
  consumer welfare, and productivity growth relative to autarky
  or heavy import-substitution. This finding survives across
  a wide range of country contexts and time periods, though
  within-country distributional effects of trade shocks are
  real and require separate policy treatment.

institutional_features_that_make_the_model_work:
  comparative_advantage_gains: >
    Ricardian and Heckscher-Ohlin channels produce aggregate
    gains from specialisation and exchange. Modern trade models
    (Melitz 2003 and successors) add within-industry reallocation
    toward more productive firms as an additional gain channel.

  access_to_intermediate_inputs_and_capital_goods: >
    Open trade gives domestic producers access to the full
    global frontier of inputs and capital goods at world prices.
    Closed economies systematically pay higher prices for lower-
    quality inputs, dragging productivity.

  competitive_discipline_on_domestic_producers: >
    Import competition disciplines domestic market power,
    reducing price markups and forcing quality improvement
    (Melitz & Trefler 2012 and related literature).

  knowledge_and_technology_spillovers: >
    Trade carries embodied and disembodied knowledge (Coe &
    Helpman 1995). Export-oriented firms show higher
    productivity than non-exporters in matched-sample studies.

  multilateral_institutional_framework: >
    GATT/WTO and regional trade agreements provide dispute
    resolution, binding tariff commitments, and most-favoured-
    nation treatment that reduces transaction costs and policy
    uncertainty. Trade gains are larger under a stable rule-
    based regime than under ad hoc bilateral bargaining.

supporting_cases:
  - id: china_wto_accession_2001_growth_surge
    description: >
      China's WTO accession in 2001 preceded a sustained
      export-led growth acceleration, productivity gains in
      joining sectors, and the lifting of several hundred
      million people out of poverty. Brandt et al. (2017)
      documented large productivity gains traceable to
      tariff reductions and import access.
    citations:
      - "Brandt, Van Biesebroeck, Wang & Zhang (2017). WTO Accession and Performance of Chinese Manufacturing Firms. AER."

  - id: south_korea_export_oriented_industrialisation_1960_1990
    description: >
      South Korea's export-oriented strategy, combined with
      selective industrial policy, produced per-capita income
      growth from sub-Saharan African levels to OECD levels
      in one generation. Even under the heterodox developmental-
      state interpretation, export-market discipline was a
      central mechanism.
    citations:
      - "Rodrik (1995). Getting Interventions Right: How South Korea and Taiwan Grew Rich. Economic Policy."

  - id: vietnam_doi_moi_trade_opening_1986_onward
    description: >
      Vietnamese integration into global trade post-1986
      coincided with rapid poverty reduction and manufacturing
      employment growth, converting the country from a
      low-income closed economy to a middle-income exporter.
    citations:
      - "McCaig & Pavcnik (2018). Export Markets and Labor Allocation in a Low-Income Country. AER."

  - id: dprk_autarky_isolation_divergence_from_south_korea
    description: >
      Two countries with common language, culture, and roughly
      similar 1953 starting conditions diverged by an order of
      magnitude in per-capita income, with the autarkic North
      stagnating and the trade-integrated South converging on
      OECD incomes.
    citations:
      - "Maddison Project Database (2020 release)."

disconfirming_cases:
  - id: china_shock_us_manufacturing_employment_1999_2011
    description: >
      Autor, Dorn & Hanson's "China shock" literature showed
      that the import surge from China produced persistent,
      geographically concentrated employment and wage losses
      in exposed US local labour markets, with slow recovery.
      The aggregate US gains from trade were accompanied by
      real local and sectoral losses that public-policy
      adjustment failed to address.
    citations:
      - "Autor, Dorn & Hanson (2013). The China Syndrome. AER."
      - "Autor, Dorn & Hanson (2021). On the Persistence of the China Shock. BPEA."

  - id: mexico_nafta_mixed_distributional_outcomes
    description: >
      NAFTA produced aggregate Mexican export and FDI gains
      but also displaced parts of the smallholder agricultural
      sector and produced within-Mexico distributional effects
      that have been debated for three decades.

what_the_model_is_not:
  - "A claim that all tariffs are welfare-reducing in all contexts (infant-industry arguments, strategic-sector cases, and national-security carve-outs exist)"
  - "A denial that trade shocks have distributional consequences within countries that require adjustment assistance and labour-market policy"
  - "A claim that currency manipulation, dumping, or non-market-economy subsidies should be ignored"
  - "A claim that services trade, IP rules, and investor-state dispute settlement are equivalent to goods-trade liberalisation on the evidence base"
  - "A claim that financial-account liberalisation has the same empirical support as goods-trade liberalisation"

failed_replications:
  - id: latin_american_import_substitution_1950s_1970s_stagnation
    description: >
      Sustained import-substitution industrialisation regimes
      in Argentina, Brazil (pre-1990), and elsewhere produced
      protected, low-productivity industries that collapsed
      upon trade opening in the 1990s. Closed-economy
      industrialisation consistently failed to generate
      sustained convergence.

  - id: maoist_china_autarky_1949_1976
    description: >
      The Maoist closed-economy period preceded the post-1978
      reforms; per-capita income stagnated relative to open
      East Asian peers over the same period.

policy_implications: >
  The case for broad trade openness is strong, but it is a
  case for open trade combined with serious labour-market
  adjustment policy, active place-based support for shock-
  exposed regions, and enforcement against non-market practices.
  The framework treats the Autor-Dorn-Hanson results as a
  condition on how trade policy should be implemented (paired
  with adjustment assistance), not as a refutation of trade
  openness itself. Autarky remains empirically dominated.

framework_position: >
  Conditional on a functioning rule-based multilateral framework,
  labour-market adjustment capacity, and enforcement against
  non-market-economy distortions, broad trade openness raises
  aggregate welfare and productivity. The framework accepts
  that trade produces distributional consequences inside
  countries and treats adjustment policy as part of, not
  alternative to, a pro-trade stance.

confidence: high

linked_hypotheses:
  - trade_openness_growth_empirical_record
  - china_shock_local_labour_market_effects

linked_model_ids:
  - allocation_mechanism_by_domain
  - trade_policy_distributional_adjustment

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: resource_rent_capture_via_swf
category: conditions_favoring_intervention

description: >
  Extractive resource industries (oil, gas, hard-rock minerals)
  generate economic rents — returns in excess of the risk-adjusted
  marginal cost of extraction — that are not reducible to
  productivity or labour effort. These rents derive from nature's
  endowment rather than value-added. Laissez-faire capture by
  private licence-holders produces neither efficient allocation
  (the rent component is inframarginal) nor political legitimacy.
  Royalty regimes plus sovereign wealth fund (SWF) sterilisation
  of rents have outperformed both full nationalisation and free
  private licensing across a wide cross-country panel.

institutional_features_that_make_the_model_work:
  rent_capture_mechanism: >
    Royalties, resource rent taxes, production sharing, or state
    equity stakes calibrated to capture the rent component without
    taxing the marginal-cost component. Norway's special petroleum
    tax plus ordinary corporate tax reaches ~78% marginal rate on
    petroleum profits while leaving private operators to run
    operations efficiently.
  fiscal_sterilisation_rule: >
    SWF accumulates capital offshore to prevent Dutch-disease
    currency appreciation and political spend-the-windfall cycles.
    Norway's handlingsregel limits transfers to non-oil budget to
    ~3% of fund value (expected real return), converting a
    depleting resource into a permanent capital base.
  governance_and_transparency: >
    Professional fund management at arm's length from political
    cycle. Published annual reports, ethical exclusion lists,
    parliamentary oversight. EITI disclosure of payments.
  private_operational_efficiency: >
    State captures rent, private firms run operations. Norway
    licenses to Equinor and international majors alike under
    competitive bidding; Alaska Permanent Fund captures rent on
    privately-operated leases. Full nationalisation of operations
    (Venezuela PDVSA, Mexico PEMEX) consistently underperforms.

supporting_cases:
  - id: norway_gpfg
    description: >
      Government Pension Fund Global reached ~$1.7T by 2024
      funded by capturing North Sea petroleum rents. handlingsregel
      fiscal rule has held across governments since 2001. Produced
      the highest sustained sovereign-wealth accumulation per capita
      globally while maintaining competitive private operations.
  - id: alaska_permanent_fund
    description: >
      Constitutional fund since 1976 captures 25% of oil royalties
      and pays annual dividends to residents. ~$80B corpus. Less
      macroeconomically important than Norway's but institutionally
      durable across political cycles.
  - id: botswana_pula_fund_diamond_rents
    description: >
      Botswana's diamond partnership with De Beers (Debswana) plus
      Pula Fund sterilisation has produced the highest long-run
      GDP growth of any resource-dependent African economy and
      avoided the resource curse that affected most peers.
  - id: chile_copper_stabilisation_funds
    description: >
      CODELCO state copper company plus Economic and Social
      Stabilisation Fund smoothed copper-price cycles and avoided
      Dutch disease during the 2003-2013 commodity supercycle.

disconfirming_cases:
  - id: venezuela_pdvsa_nationalisation_to_collapse
    description: >
      Full operational nationalisation and politicisation of PDVSA
      under Chávez (mass dismissals 2002-03, personnel replaced on
      loyalty grounds) collapsed production from ~3.2 mb/d to under
      1 mb/d by 2019. Oil rents directed to political spending
      rather than sterilised. Classic resource curse.
  - id: nigeria_nnpc_and_rent_dissipation
    description: >
      State oil company operationally weak, rents dissipated through
      subsidy regimes and corruption rather than sterilised into a
      fund. GDP-per-capita essentially flat despite decades of
      extraction. Illustrates that rent capture without fund rule
      and governance is worse than private licensing with royalties.
  - id: uk_north_sea_no_fund
    description: >
      UK extracted North Sea oil contemporaneously with Norway but
      used revenues for current expenditure rather than fund
      accumulation. No permanent capital base; fiscal position
      weakened when production declined. Counterfactual to Norway.

policy_implications: >
  Resource-rich jurisdictions should capture rents through royalty
  and tax design, not through operational nationalisation. Capture
  should flow into a ring-fenced fund with a binding spending rule
  calibrated to expected real return, not to current political
  priorities. Governance should be professional, transparent, and
  insulated from the electoral cycle. Operational control should
  remain with private or state-competitive firms that compete for
  leases under standard corporate governance.

what_the_model_is_not:
  - "An endorsement of state operational control of extractive industries"
  - "A claim that every resource-rich country can replicate Norway — institutional preconditions matter"
  - "A claim that SWFs are appropriate for non-rent-generating sectors"
  - "A general argument for state investment funds in countries without extractive rents to sterilise"
  - "A claim that SWF accumulation is costless — it requires fiscal restraint that many polities cannot sustain"

framework_position: >
  Extractive rents are a near-canonical case where laissez-faire
  fails on both efficiency (rents are inframarginal, so taxing
  them is non-distortionary) and political-economy grounds
  (privately-captured rents produce rent-seeking and legitimacy
  crises). The framework endorses royalty-plus-SWF rent capture
  with private operational control and a binding fiscal rule as
  the empirically dominant institutional design, while noting
  that replication requires pre-existing governance capacity.
  Norway succeeded because it was already a high-capacity,
  low-corruption state before oil; countries lacking those
  preconditions typically fail at either the capture step
  (Nigeria) or the operational step (Venezuela).

confidence: high

linked_hypotheses:
  - nordic_outcome_persistence_decomposition
  - resource_extractor_nationalisation_reduces_output

linked_model_ids:

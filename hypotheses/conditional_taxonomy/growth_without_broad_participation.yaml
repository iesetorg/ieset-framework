# yaml-language-server: $schema=../../schemas/condition.schema.json
id: growth_without_broad_participation
category: conditions_with_distributional_considerations

description: >
  Aggregate GDP-per-capita growth is in principle a necessary but
  not sufficient condition for broad-based income gains. In several
  wealthy economies over the past several decades — the US from
  roughly 1980, the UK particularly post-2008 — aggregate growth
  has decoupled from median household income growth. The framework
  treats this pattern not as a blanket indictment of growth or of
  markets but as a diagnostic: aggregate growth without median-wage
  gain points to identifiable capture mechanisms — housing supply
  restriction, healthcare cost inflation, credential inflation,
  sectoral regulatory capture, labour-market concentration — that
  can be addressed at the institution level rather than through
  generic redistribution.

institutional_features_that_make_the_model_work:
  housing_supply_as_first_suspect: >
    Housing cost absorbs a large and rising share of median
    household budgets in supply-restricted cities (coastal US,
    London, SE England, Greater Toronto, Sydney). Real median
    incomes net of housing cost have grown more slowly than gross
    medians. The institutional fix is supply (zoning, planning
    reform), not transfers.
  healthcare_cost_absorption_us_specific: >
    US employer health premiums have grown faster than wages for
    decades; employer compensation has risen but wages have not.
    The institutional fix is healthcare cost control (see
    health_insurance_adverse_selection), not generic wage policy.
  credential_inflation_and_higher_education_cost: >
    College-wage premium rose while tuition rose faster; debt-
    financed credential acquisition absorbs what the wage
    premium delivers. Institutional fix targets the cost side
    of higher education.
  labour_market_concentration_and_non_compete_clauses: >
    Rising employer concentration in local labour markets plus
    spread of non-compete and no-poach agreements reduce worker
    bargaining power in measurable sub-markets. Fix via antitrust
    and contract law rather than generic wage floors.
  sectoral_regulatory_capture: >
    Specific sectors (occupational licensing, zoning, insurance
    franchising, pharma distribution) show regulatory capture
    that transfers income from consumers to incumbents. Each
    requires sector-specific institutional reform.

supporting_cases:
  - id: us_median_wage_divergence_from_gdp_1979
    description: >
      Real GDP per capita and real median household income
      moved together 1947-1979; began diverging 1979-2019 with
      GDP/capita approximately doubling while median real wages
      stagnated or grew modestly. The gap is accounted for by
      some combination of labour share, top-income growth,
      employer health benefits, and housing imputed rent.
  - id: us_housing_cost_burden_coastal_metros
    description: >
      Median rent-to-income in SF, LA, NYC, Boston, Seattle
      rose materially 1980-2020. Econ literature (Hsieh-Moretti
      2019, Glaeser-Gyourko) attributes substantial aggregate
      GDP loss to supply restriction in high-productivity metros.
  - id: uk_post_2008_real_wage_stagnation
    description: >
      UK real median wages essentially flat from 2008-2024 while
      GDP grew — longest wage stagnation in modern UK data.
      Decomposes into productivity slowdown plus housing-cost
      absorption plus terms-of-trade shocks (see
      uk_real_wage_stagnation_2008_present_decomposition).

disconfirming_cases:
  - id: nordic_broad_based_growth_persistence
    description: >
      Nordic economies show growth with median income growth
      tracking GDP more closely. Shows that the divergence is not
      a necessary feature of advanced capitalism but a
      consequence of specific institutional configurations.
  - id: 1947_1973_us_broadly_shared_growth
    description: >
      The US itself exhibited GDP-median-wage co-movement
      1947-1973, refuting the claim that divergence is a
      technological or demographic inevitability.
  - id: german_wage_moderation_export_success
    description: >
      German wages grew slowly 2000-2010 relative to productivity
      as part of Hartz-era restructuring, then accelerated 2010-
      2020. A reminder that wage/GDP divergence can reflect
      deliberate labour-market institutions rather than capture.

policy_implications: >
  Growth-without-broad-participation should be decomposed into its
  mechanisms (housing, health, education, concentration, capture)
  rather than addressed by generic redistribution. Each mechanism
  admits institutional reform that strengthens rather than
  weakens market functioning: upzoning for housing, adverse-
  selection-based health reform, higher-education cost control,
  antitrust and non-compete restrictions, sectoral
  deregulation-of-incumbents. Redistribution through tax-and-
  transfer remains available as a complementary instrument but
  does not substitute for fixing the underlying capture.

what_the_model_is_not:
  - "A claim that aggregate growth is unimportant — growth remains a precondition for broad gains"
  - "A claim that redistribution is never appropriate — it is a complementary instrument"
  - "A blanket endorsement of the Piketty r>g framing as the dominant mechanism"
  - "A claim that median-wage stagnation is the same across countries or causes"
  - "A claim that any of the listed mechanisms is the sole explanation — all contribute with varying weights across cases"

framework_position: >
  The framework treats growth-without-broad-participation as a
  conditional pattern with identifiable institutional causes
  rather than as an inevitable consequence of capitalism or
  globalisation. It endorses diagnosing the specific channel in
  the specific country (housing supply for the US coasts and UK
  south-east; healthcare cost absorption for the US; credential
  inflation where present; labour-market concentration where
  present) and applying institution-specific reforms that
  restore the link between productivity growth and median income
  growth. Generic redistribution is a complementary tool but not
  a substitute for fixing the underlying institutions. The
  Nordic counter-example and the 1947-1973 US counter-example
  together show that divergence is not a technological necessity.

confidence: medium_high

linked_hypotheses:
  - uk_real_wage_stagnation_2008_present_decomposition
  - us_eu_gdp_per_capita_divergence_policy_causes

linked_model_ids:
  - median_vs_mean_income_institutional_decomposition
  - housing_supply_restriction_aggregate_drag

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: pandemic_coordination_externality
category: conditions_favoring_intervention

description: >
  Infectious-disease control combines two market failures at scale.
  Each infection imposes a negative externality on others (the
  standard SIR externality), so individually-rational behaviour
  underproduces precaution. And disease surveillance, testing
  infrastructure, contact-tracing registries, vaccine procurement,
  and stockpiles are coordination problems with strong network
  returns and fixed costs — private actors cannot internalise the
  payoff of having the infrastructure ready before the next
  pandemic. The combination means pandemic preparedness and
  response are canonical conditions where state-organised
  mechanisms outperform decentralised private responses.

institutional_features_that_make_the_model_work:
  standing_public_health_infrastructure: >
    Disease surveillance networks, reference laboratories, contact-
    tracing capacity maintained continuously between outbreaks.
    Korea CDC, Taiwan CDC, Vietnam's district health system,
    Singapore's pandemic-preparedness architecture.
  rapid_testing_and_tracing_scale_up: >
    State capacity to commission and deploy mass testing within
    weeks, plus digital or manual contact-tracing that scales.
    Korea's 2020 drive-through testing and QR-code tracing;
    Taiwan's integration of insurance and immigration databases.
  advance_procurement_and_stockpiles: >
    PPE, antivirals, vaccine reservation contracts, ventilators
    held against tail-risk pandemic scenarios. Failure mode: UK
    and US stockpile drawdowns through the 2010s that proved
    expensive in 2020.
  vaccine_r_and_d_push_and_pull: >
    Operation Warp Speed (US) and EU/UK advance purchase agreements
    shifted vaccine supply forward by months via de-risking of
    manufacturing capacity investment. Pure private incentive
    would have produced later and smaller supply.
  clear_legal_authority_and_trust: >
    Emergency powers with sunset clauses, transparent
    communication, and baseline social trust determine
    compliance. Successful responses combined state capacity with
    high legitimacy.

supporting_cases:
  - id: south_korea_2020_mers_to_covid
    description: >
      Korea's 2015 MERS experience triggered reforms to KCDC,
      testing capacity, and tracing law. In 2020 Korea executed
      mass testing, digital tracing, and targeted containment
      without national lockdown, achieving low excess mortality
      and minimal economic contraction in H1 2020.
  - id: taiwan_2020_integrated_response
    description: >
      Taiwan's Central Epidemic Command Center integrated health
      insurance, immigration, and customs databases from day one.
      Near-zero community transmission through 2020 despite
      proximity to mainland China. Institutional infrastructure
      built after SARS 2003 paid off.
  - id: operation_warp_speed_vaccine_acceleration
    description: >
      US federal advance-purchase plus manufacturing-at-risk
      funding compressed the vaccine timeline by an estimated
      6-12 months. A purely private-incentive pathway would have
      waited for efficacy read-outs before scaling manufacturing,
      costing lives.

disconfirming_cases:
  - id: us_decentralised_2020_response
    description: >
      US 2020 response was decentralised across 50 states plus
      federal-level policy confusion, with fragmented testing,
      no national tracing, late stockpile response. Excess
      mortality per capita far above East Asian peers through
      2020-21 despite comparable wealth.
  - id: uk_2020_early_response_and_stockpile_drawdown
    description: >
      UK pandemic stockpile had been drawn down through the
      2010s; PPE procurement collapsed into emergency
      contracting in March-May 2020. Lockdown substituted for
      testing and tracing capacity not built in advance.
  - id: china_zero_covid_endgame
    description: >
      China's high-capacity early response became a trap when
      authorities could not exit zero-COVID without a vaccination
      campaign using mRNA vaccines they had not procured.
      Illustrates that state capacity without adaptive off-ramp
      planning is not sufficient.

policy_implications: >
  Build and maintain standing public-health infrastructure between
  pandemics, when the political incentive is weakest. Advance-
  purchase agreements and at-risk manufacturing investment
  shift vaccine and therapeutic supply forward. Transparent
  communication and sunset-clauses on emergency powers maintain
  legitimacy for the next episode. Private-market incentives will
  under-provide all of these; state coordination is not a luxury
  but a minimum condition for effective pandemic response.

what_the_model_is_not:
  - "An endorsement of indefinite lockdowns or of any specific policy adopted under emergency powers"
  - "A claim that every state-led pandemic response outperforms every decentralised response"
  - "A claim that emergency powers should be unbounded or non-transparent"
  - "A general argument for state control of the healthcare delivery system"
  - "A claim that 2020-2021 specific policy choices were all correct — many were not"

framework_position: >
  Pandemic preparedness and response is a textbook case of
  combined externality and coordination failure. The market
  equilibrium systematically under-invests in surveillance,
  stockpiles, vaccine R&D scale-up, and testing-and-tracing
  infrastructure because the returns accrue in tail scenarios
  that private actors cannot bank on. The framework endorses
  sustained public-health infrastructure, advance purchase and
  manufacturing-at-risk financing for vaccines and therapeutics,
  and transparent emergency authority with sunset clauses.
  Empirical variation across the 2020 pandemic tracks
  institutional preparation (Korea, Taiwan, Vietnam) vs
  capacity erosion (US, UK early 2020) cleanly. The framework
  distinguishes between the case for state capacity (strong)
  and the case for any particular emergency policy choice
  (case-by-case), and rejects collapsing the two.

confidence: medium_high

linked_hypotheses:
  - welfare_architecture_comparative_effectiveness

linked_model_ids:
  - externality_plus_coordination_failure_pandemic
  - state_capacity_preparedness_vs_reactive_response

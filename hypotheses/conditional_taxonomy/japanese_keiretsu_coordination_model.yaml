# yaml-language-server: $schema=../../schemas/condition.schema.json
id: japanese_keiretsu_coordination_model
category: conditions_specific_institutional_models

description: >
  Japan's postwar keiretsu — cross-shareholding business
  groups organised around a main bank, with long-term
  supplier networks, MITI industrial-policy coordination,
  and seniority-based labour relations at core firms —
  is credited with the country's 1950s-80s catch-up
  growth. The model has come under sustained pressure
  since the 1990s: it underperformed in capital
  allocation during the Lost Decade, has eroded under
  corporate-governance reform, and is an incomplete
  account of contemporary Japanese performance.
  Replication outside the East Asian context has
  repeatedly failed.

institutional_features_that_make_the_model_work:
  cross_shareholding_between_affiliated_firms: >
    Member firms held substantial equity stakes in each
    other, insulating management from hostile takeover
    and short-horizon shareholder pressure. The
    arrangement enabled long-horizon investment and
    implicit risk-sharing across the group but also
    suppressed external market discipline.

  main_bank_relationship_and_monitoring: >
    Each horizontal keiretsu centred on a main bank
    (Mitsubishi, Mitsui, Sumitomo, Fuyo, Sanwa, DKB)
    that provided lead lending, monitoring, and crisis
    intervention for group firms. The main bank was
    a substitute for external capital-market
    monitoring and a source of relationship lending
    through business cycles.

  long_term_supplier_networks_and_just_in_time: >
    Vertical keiretsu (especially Toyota's supplier
    network) involved long-term relationships with
    first- and second-tier suppliers, enabling
    just-in-time production, cooperative quality
    improvement, and kaizen continuous improvement.
    These relational contracts substituted for
    market-based supplier switching.

  miti_coordination_and_administrative_guidance: >
    The Ministry of International Trade and Industry
    (MITI, later METI) coordinated industrial policy
    through administrative guidance (gyosei shido),
    sectoral investment coordination, research
    consortia (VLSI semiconductor project), and
    protected domestic markets during catch-up phase.
    Administrative guidance worked without formal
    legal backing because firms complied to preserve
    relational status.

  seniority_wages_and_lifetime_employment_at_core_firms: >
    Core-firm workers (roughly one-third of the workforce)
    received seniority-based wages and implicit lifetime
    employment, creating incentives for firm-specific
    skill investment and cooperative labour relations.
    Peripheral workers — part-time, non-core, female —
    bore the adjustment burden.

  export_discipline_on_selected_sectors: >
    Protected domestic markets were paired with
    requirement of export success, generating world-
    market competitive pressure on firms shielded from
    domestic competition. Export discipline prevented
    the import-substitution pathology that plagued
    similarly protectionist regimes elsewhere.

  cultural_and_state_capacity_preconditions: >
    A highly capable professional bureaucracy recruited
    from top universities, cultural norms of long-term
    relational commitment, and a homogeneous
    population with high trust in institutions.
    Gerschenkron-style late-industrialisation
    position and Cold-War geopolitics added external
    support.

what_the_model_is_not:
  - "A universally replicable template — post-1990 Japanese performance and failed replications outside East Asia show the limits"
  - "A pure state-led economy — the keiretsu were private groups, not state-owned, and export discipline operated through global markets"
  - "A model whose capital-allocation function performed well during the bubble and Lost Decade — main-bank monitoring failed in the 1980s-90s"
  - "Equivalent to the South Korean chaebol — chaebol are tighter family-controlled conglomerates with different governance and debt structures"
  - "A labour-market model that was inclusive — women and non-core workers bore a disproportionate share of adjustment"

supporting_cases:
  - id: postwar_catchup_growth_1955_1973
    description: >
      Japan's per-capita GDP growth averaged roughly
      9 percent annually during 1955-73, converging from
      roughly 20 percent of US levels in 1950 to roughly
      two-thirds by the early 1970s. The keiretsu-MITI
      combination is conventionally credited with a
      meaningful share of this catch-up.
    citations:
      - "Johnson (1982). MITI and the Japanese Miracle."

  - id: toyota_production_system_global_diffusion
    description: >
      The Toyota production system, rooted in long-term
      supplier relationships and kaizen, was studied
      and partially diffused globally in manufacturing
      industries. The supplier-relationship component
      showed transferable operational features, though
      the broader institutional context did not
      transfer.

disconfirming_cases:
  - id: japanese_lost_decade_capital_misallocation_1990s
    description: >
      Main-bank monitoring failed to prevent and then
      actively extended bubble-era misallocation:
      zombie lending to insolvent firms, evergreening
      of non-performing loans, and delayed restructuring
      prolonged the Lost Decade. Caballero, Hoshi &
      Kashyap (2008) estimated substantial productivity
      costs.
    citations:
      - "Caballero, Hoshi & Kashyap (2008). Zombie Lending and Depressed Restructuring in Japan. AER."

  - id: keiretsu_erosion_and_corporate_governance_reform_2000s_2020s
    description: >
      Cross-shareholding has declined substantially since
      2000 under foreign-investor pressure, corporate-
      governance code reform (2015), and stewardship
      code adoption. The institutional equilibrium has
      been actively dismantled, suggesting its
      participants did not view it as indefinitely
      sustainable.

  - id: failure_to_lead_software_and_digital_platforms
    description: >
      Japan's IT and software sectors have persistently
      underperformed US and Chinese peers in frontier
      digital platforms, suggesting the keiretsu-era
      institutional advantages did not extend to
      software-ecosystem industries.

failed_replications:
  - id: south_korean_chaebol_partial_convergence_and_reform
    description: >
      South Korea's chaebol adopted some features of the
      Japanese model (business groups, state coordination)
      but with tighter family control, higher leverage,
      and weaker main-bank monitoring. The 1997 Asian
      crisis exposed the structural fragility of the
      chaebol form and drove substantial governance
      reforms, which remain incomplete.

  - id: malaysian_indonesian_group_firm_attempts
    description: >
      Southeast Asian business-group and
      "developmental-state-lite" attempts lacked the
      MITI-equivalent bureaucratic capacity, main-bank
      monitoring discipline, and export-market
      accountability that sustained the Japanese model
      during its catch-up phase. Outcomes on
      productivity have been weaker.

  - id: us_and_uk_stakeholder_capitalism_aspirations
    description: >
      Repeated Anglo-American policy discussions of
      stakeholder capitalism or long-termism
      occasionally invoke the Japanese model; the
      institutional complement — main-bank relationships,
      cross-shareholding, career-professional bureaucracy
      with coordination authority — is absent, and the
      policy changes have not produced analogous
      institutional outcomes.

policy_implications: >
  The keiretsu model's success was historically specific —
  catch-up growth phase, Cold-War geopolitics,
  professional bureaucracy, relational-contract culture,
  and export-discipline pairing. Policymakers should be
  wary of isolated adoption of coordination features
  without the institutional complement, and should note
  that the model's weakness in capital reallocation
  became costly when catch-up ended. Contemporary
  Japanese policy has moved partially away from
  keiretsu features rather than toward them.

framework_position: >
  The keiretsu model is treated as evidence that
  relational coordination between firms, banks, and
  the state can produce rapid catch-up growth under
  specific conditions, while also producing
  capital-misallocation costs when the institutional
  advantage of relational monitoring turns into
  entrenched protection. The framework does not
  universalise either the admiring or the dismissive
  account. It accepts that the model functioned well
  for roughly three decades of catch-up, that it
  performed poorly in capital reallocation during the
  1990s, and that it has not been replicated outside
  the East Asian institutional context.

confidence: medium_high


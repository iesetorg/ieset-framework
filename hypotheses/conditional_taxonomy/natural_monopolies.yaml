# yaml-language-server: $schema=../../schemas/condition.schema.json
id: natural_monopolies
category: conditions_favoring_intervention

description: >
  Natural monopoly conditions arise where economies of scale are so
  large relative to market demand that duplicating infrastructure is
  socially wasteful and a single provider is efficient. Marginal-cost
  pricing lies below average cost, so unregulated private provision
  either produces monopoly rents or exits. Network industries —
  electricity transmission and distribution, water and sewerage,
  last-mile rail track, fibre-to-the-home, gas pipelines — are the
  canonical cases.

institutional_features_that_make_the_model_work:
  structural_separation: >
    Separate the contestable layer (electricity generation, train
    operating companies, broadband service providers) from the
    non-contestable network layer. Apply competition to generation
    and retail while regulating or publicly owning the wire/pipe.
  credible_price_regulation: >
    Independent regulator with capped or incentive-regulated tariffs
    (RPI-X, rate-of-return with benchmarking). Transparent cost
    disclosure and periodic reviews. Examples: Ofgem (UK),
    Bundesnetzagentur (Germany), FERC (US interstate).
  universal_service_obligations: >
    Regulator or franchise terms require coverage of marginal
    customers that pure profit-maximising monopolists would ignore
    (rural electrification, last-mile water).
  public_ownership_as_alternative: >
    Where regulatory capacity is weak or the asset is strategically
    central, direct public ownership with ring-fenced financing can
    outperform poorly-regulated private monopoly (Singapore PUB
    water, French EDF historically, Nordic grid operators).

supporting_cases:
  - id: uk_electricity_unbundling_1989
    description: >
      1989 Electricity Act separated generation (competitive) from
      transmission (regulated National Grid) and distribution
      (regulated regional DNOs). Wholesale prices fell in the first
      decade; grid investment remained adequate under RPI-X.
  - id: singapore_pub_water
    description: >
      Singapore's Public Utilities Board operates integrated water
      supply as a public enterprise with full cost recovery, NEWater
      reuse, and among the lowest non-revenue water losses globally.
  - id: nordic_transmission_operators
    description: >
      Statnett (Norway), Svenska kraftnät (Sweden), Fingrid (Finland)
      run transmission as publicly-owned TSOs while generation and
      retail compete in Nord Pool spot market. Reliability and prices
      have been strong over three decades.

disconfirming_cases:
  - id: uk_rail_privatisation_railtrack
    description: >
      1996 privatisation of track infrastructure (Railtrack) as a
      for-profit firm led to underinvestment, Hatfield 2000 crash,
      and re-nationalisation as Network Rail in 2002. Illustrates
      that privatising the non-contestable layer without credible
      investment regulation fails.
  - id: california_electricity_crisis_2000_2001
    description: >
      Partial deregulation that kept retail price caps while
      liberalising wholesale markets produced the 2000-01 crisis
      with Enron manipulation. Ill-designed market architecture in
      a natural-monopoly sector is worse than either pole.
  - id: english_water_privatisation_dividend_extraction
    description: >
      Post-1989 English water companies paid out large dividends
      while underinvesting in sewage treatment, producing the
      2020s river-pollution scandal. Weak regulator (Ofwat) and
      leveraged financial engineering undermined the
      regulated-private model.

policy_implications: >
  Identify the non-contestable layer precisely and do not attempt
  competition there. Apply competition aggressively to the layers
  that are contestable (generation, retail, train operations).
  Choose between well-regulated-private and well-run-public based
  on the jurisdiction's regulatory capacity: weak regulators should
  prefer public ownership; strong regulators can make regulated
  private work. Avoid the worst of both worlds: private ownership
  with weak regulation and without universal service obligations.

what_the_model_is_not:
  - "A general argument for nationalising competitive industries"
  - "A claim that public ownership always beats regulated private"
  - "A claim that regulated private always beats public ownership"
  - "An endorsement of state-run generation, retail, or content layers, which are contestable"
  - "A blanket condemnation of privatisation — the UK generation and retail segments have mostly worked"

framework_position: >
  Natural monopolies are one of the clearest conditions favouring
  intervention: economies of scale mean single-provider is
  efficient, marginal-cost pricing is unsustainable for private
  owners, and unregulated private monopoly extracts rents. The
  framework endorses either credible price regulation with
  structural separation, or direct public ownership with
  ring-fenced financing, depending on regulatory capacity. It
  rejects both naive privatisation of network layers and
  nationalisation of contestable layers. The design detail —
  where the unbundling line is drawn and how the regulator is
  empowered — determines whether the institutional solution
  succeeds or reproduces the market failure under a different name.

confidence: high

linked_hypotheses:
  - welfare_architecture_comparative_effectiveness


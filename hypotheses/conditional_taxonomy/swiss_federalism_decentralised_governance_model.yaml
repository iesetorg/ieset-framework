# yaml-language-server: $schema=../../schemas/condition.schema.json
id: swiss_federalism_decentralised_governance_model
category: conditions_specific_institutional_models

description: >
  Switzerland combines deep federalism (26 cantons with
  substantial fiscal and policy autonomy), direct democracy
  at federal and cantonal levels, a multilingual consociational
  arrangement across four language groups, and a
  high-capability small-state economic model. Outcomes on
  per-capita income, institutional quality, and social
  stability are among the best in the OECD. The institutional
  combination is specific to Swiss history and has not been
  replicated in other federal systems.

institutional_features_that_make_the_model_work:
  cantonal_tax_and_fiscal_competition: >
    Cantons set their own income and corporate tax rates and
    compete for residents and firms. Fiscal competition
    disciplines tax and spending levels, and the resulting
    Tiebout-style sorting is a meaningful mechanism within
    a small country. Feld & Kirchgassner have documented the
    effects.

  direct_democracy_referendum_and_initiative: >
    Frequent popular votes on specific fiscal and policy
    questions (at federal, cantonal, and communal levels)
    provide a veto point that constrains both central-
    government expansion and capture by narrow interests.
    Referendum-constrained spending shows distinct patterns
    from purely representative democracies (Feld & Matsusaka).

  consociational_multilingual_arrangement: >
    Four language communities (German, French, Italian,
    Romansh) coexist through language-territory federalism
    and representation norms in the Federal Council. The
    system of proportional representation of language and
    party groups is an explicit institutional response to
    diversity.

  collegial_federal_council_executive: >
    The seven-member Federal Council, elected by parliament
    with rotating presidency, is a consensus-oriented
    executive that constrains unilateral policy change.
    Combined with referendum veto points, this produces
    slow but durable policy adjustment.

  banking_and_financial_tradition: >
    Historical banking specialisation (private banks,
    cantonal banks, UBS/Credit Suisse — now UBS) and
    financial-service sector provide a large share of
    national income. The tradition is embedded in legal
    and regulatory institutions developed over roughly
    two centuries.

  vocational_training_and_dual_apprenticeship: >
    Swiss vocational education, overlapping with the German
    model, channels a large share of each cohort into skilled
    manufacturing, construction, and service apprenticeships.
    Labour-market outcomes for non-university cohorts are
    strong by international comparison.

  militia_army_and_civic_participation: >
    The militia tradition (army, local councils, community
    service) produces broad civic engagement and
    transmission of governance competence across the
    population — an input to the high state-capacity
    outcome.

  long_standing_armed_neutrality: >
    Neutrality since the early nineteenth century has kept
    Switzerland out of twentieth-century great-power wars,
    preserving capital stock, institutions, and human
    capital continuously. Other federal states lack this
    path-dependent advantage.

what_the_model_is_not:
  - "A template that other federal systems can adopt by copying the constitutional text — the model depends on referendum practice and political culture that took centuries to develop"
  - "A refutation of unitary states — the Nordics, New Zealand, and others achieve comparable outcomes with different institutional architectures"
  - "An argument that tax competition is unambiguously welfare-enhancing at a cross-country level — Swiss intra-country competition operates within a single legal-institutional envelope"
  - "A claim that referendum-democracy is universally desirable — direct democracy interacts with scale, heterogeneity, and information environment in ways that limit transferability"
  - "A claim that Swiss neutrality is a generalisable national-security strategy"

failed_replications:
  - id: belgian_consociational_federalism_fiscal_deadlock
    description: >
      Belgium's consociational federal arrangement between
      Flemish and Walloon communities has produced repeated
      government-formation crises, fiscal-transfer disputes,
      and extended caretaker-government periods. The
      consociational piece alone, without referendum veto
      and Swiss-level cantonal competition, has not
      produced Swiss-style outcomes.

  - id: post_2001_devolved_uk_fiscal_asymmetry
    description: >
      UK devolution created Scottish, Welsh, and Northern
      Irish parliaments with differentiated policy
      autonomy but without fiscal autonomy matching
      Swiss cantons and without referendum-level
      direct-democracy discipline on policy change.
      Outcomes have been fiscal disputes and political
      instability around further devolution rather than
      Swiss-style stable competition.

  - id: argentine_federal_fiscal_dysfunction
    description: >
      Argentina is formally federal but provincial fiscal
      relations with the central government have produced
      chronic co-participation disputes, soft provincial
      budget constraints, and macroeconomic instability.
      Federalism without the Swiss institutional envelope
      has not produced the Swiss outcome.

policy_implications: >
  Other countries considering federal reform should not treat
  the Swiss model as a template that can be adopted via
  constitutional drafting. The functioning pieces — cantonal
  fiscal competition, active direct democracy, multilingual
  consociation, Federal Council consensus — are products of
  specific historical trajectory and cannot be separated
  without performance loss. More transferable elements
  (prudential federal fiscal rules, conditional tax autonomy,
  referendum use for specific fiscal questions) can be
  adopted but will not produce Swiss-level outcomes in
  isolation.

framework_position: >
  Swiss outcomes are real, worth explaining, and produced by
  a specific institutional combination that cannot be adopted
  piecemeal. The framework treats the Swiss model as one of
  several stable equilibria for high-income small-state
  governance, co-existing with Nordic, Dutch, and Singaporean
  alternatives, each with its own institutional package.
  Attempts to transplant Swiss-style federalism without
  direct-democracy discipline, without sustained institutional
  quality, or into heterogeneous large-country contexts
  typically underperform.

confidence: medium_high


# yaml-language-server: $schema=../../schemas/condition.schema.json
id: capital_allocation_among_firms
category: conditions_favoring_markets

description: >
  Allocation of investment capital across competing firms and projects
  is a domain where market-based price discovery (via banks subject
  to hard budget constraints, public equity and bond markets, and
  venture capital) empirically outperforms state-directed credit
  for the bulk of the economy. State-directed credit consistently
  underperforms on selection, enforcement of exit, and capital
  productivity, though targeted public investment in specific
  coordination-failure domains (basic research, certain
  infrastructure) is a separate question.

institutional_features_that_make_the_model_work:
  hard_budget_constraints_force_exit: >
    Markets impose bankruptcy and liquidation on loss-making firms.
    State-directed credit typically softens budget constraints,
    keeping unproductive firms alive (Kornai's "soft budget constraint"
    analysis of socialist and state-dominated systems). Hard
    constraints are the costly side of capital discipline, and they
    are what generates the productivity-enhancing reallocation.

  price_discovery_through_competing_capital_providers: >
    Equity, bond, bank, and venture markets aggregate forecasts
    from dispersed market participants with skin in the game.
    State credit committees have weaker incentives to discriminate
    across projects and are susceptible to political capture.

  information_revealed_by_profits_and_losses: >
    Profit-and-loss signals are the feedback mechanism that market
    capital allocation uses to learn which projects were wrong.
    State-directed credit often suppresses or subsidises losses,
    destroying the feedback.

  limited_political_discretion_over_credit_decisions: >
    Institutions that wall off credit allocation from day-to-day
    political discretion (independent central banks, supervisory
    frameworks, prudential rules) consistently outperform those
    where credit flows follow political priorities. Political
    capture of credit is a reliable pathway to misallocation.

supporting_cases:
  - id: soviet_capital_misallocation_brezhnev_era
    description: >
      Soviet gross capital formation was exceptionally high by
      international standards, yet total factor productivity
      growth collapsed in the 1970s-80s. Easterly & Fischer (1995)
      documented that the Soviet growth slowdown was driven by
      declining returns to capital rather than declining investment —
      a signature of misallocation, not insufficient saving.
    citations:
      - "Easterly & Fischer (1995). The Soviet Economic Decline. World Bank Economic Review."
      - "Allen (2003). Farm to Factory: A Reinterpretation of the Soviet Industrial Revolution."

  - id: venezuela_pdvsa_political_capture_2003_2019
    description: >
      PDVSA under Chavismo shifted from professional oil-company
      management to politically-directed investment and hiring;
      oil output collapsed from ~3.3 mbpd to under 0.7 mbpd by
      2020 despite the world's largest proven reserves. State
      capital direction in an oil major was captured and
      destroyed operationally.
    citations:
      - "Monaldi (2021). The Collapse of the Venezuelan Oil Industry. Baker Institute."

  - id: uk_national_enterprise_board_1975_1979
    description: >
      The UK NEB was created to direct equity investment into
      British firms during the 1970s crisis; its portfolio
      (British Leyland, Rolls-Royce's car arm, Inmos) generated
      large fiscal losses and was largely unwound by the Thatcher
      government. An OECD-context example of state-directed
      equity underperforming.
    citations:
      - "Coates (1980). Labour in Power? A Study of the Labour Government 1974-79."

  - id: japan_main_bank_failure_zombie_lending_1990s
    description: >
      Japanese main banks, under regulatory pressure and close
      state ties, engaged in extensive zombie lending to insolvent
      firms through the 1990s, prolonging the lost decade.
      Caballero, Hoshi & Kashyap (2008) traced productivity
      effects. Even a sophisticated relationship-banking system
      is susceptible to misallocation when exit discipline is
      suppressed.
    citations:
      - "Caballero, Hoshi & Kashyap (2008). Zombie Lending and Depressed Restructuring in Japan. AER."

  - id: china_soe_credit_subsidy_documented_productivity_gap
    description: >
      Chinese state-owned enterprises receive disproportionate
      credit allocation at below-market rates and persistently
      show lower TFP than private firms in the same sectors.
      Hsieh & Song (2015) and related work document systematic
      misallocation even in a fast-growing economy.
    citations:
      - "Hsieh & Song (2015). Grasp the Large, Let Go of the Small. Brookings Papers."
      - "Brandt, Van Biesebroeck & Zhang (2012). Creative Accounting or Creative Destruction? JDE."

what_the_model_is_not:
  - "A claim that financial markets are efficient in the strong-form sense or immune to bubbles, panics, and crises"
  - "A denial of legitimate financial regulation (capital requirements, disclosure, consumer protection)"
  - "A claim that there is no role for public investment in coordination-failure domains (basic science, grid infrastructure, vaccines)"
  - "An argument against development-finance institutions where capital markets are nascent"
  - "A claim that central-bank monetary policy is unnecessary or should be rule-bound without discretion"

failed_replications:
  - id: directed_credit_latin_america_1970s_import_substitution
    description: >
      Multiple Latin American countries used directed credit to
      support import-substitution industrialisation in the 1960s-70s;
      the combination of soft budgets, politicised selection, and
      protected output markets produced inefficient industries
      uncompetitive upon trade liberalisation.

  - id: indian_public_sector_bank_npl_cycles
    description: >
      Indian public-sector banks have repeatedly accumulated
      non-performing assets from politically-influenced lending,
      requiring multiple recapitalisations. The state-directed
      component of Indian credit allocation has persistently
      underperformed private-bank and foreign-bank lending on
      asset quality.

policy_implications: >
  For the bulk of capital allocation across competing firms,
  market-based finance with competitive banking, prudential
  regulation, bankruptcy procedure, and functioning equity and
  bond markets is the appropriate default. Industrial policy
  should be narrow, time-limited, conditional on performance,
  and targeted at specific coordination-failure domains rather
  than used as the general mode of capital allocation. Soft
  budget constraints, politicised credit, and protection from
  exit discipline are reliable predictors of misallocation.

framework_position: >
  Conditional on institutional prerequisites (prudential regulation,
  bankruptcy procedure, basic anti-corruption controls), market
  allocation of capital among competing firms is empirically
  dominant. State-directed credit as the primary allocator of
  investment has a consistent record of underperformance on
  productivity, even when investment rates are high. The
  framework treats targeted public investment in specific
  coordination-failure domains as a separate and compatible claim.

confidence: high

linked_hypotheses:
  - soft_budget_constraint_misallocation
  - industrial_policy_conditional_effectiveness

linked_model_ids:

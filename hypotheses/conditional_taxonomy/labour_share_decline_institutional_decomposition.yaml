# yaml-language-server: $schema=../../schemas/condition.schema.json
id: labour_share_decline_institutional_decomposition
category: conditions_with_distributional_considerations

description: >
  The labour share of national income has declined across most
  advanced economies since roughly 1980, documented by
  Karabarbounis and Neiman (2014) and extended in subsequent work.
  The decline is not uniform across countries, sectors, or
  measurement approaches, and competing mechanisms — falling
  relative price of capital, globalisation and offshoring, rising
  market concentration, intangible capital intensity, and
  measurement artefacts from housing imputed rent — all contribute
  in different proportions. The framework's position is that the
  decomposition matters: different channels imply different
  institutional responses, and collapsing them into a single
  "capital vs labour" story obscures the policy-relevant variation.

institutional_features_that_make_the_model_work:
  capital_price_channel: >
    Karabarbounis-Neiman's original identification: the relative
    price of investment goods fell, firms substituted capital
    for labour where the elasticity of substitution exceeded one.
    Implication: the labour-share decline is partly a relative-
    price artefact of cheaper capital, not pure rent extraction.
  globalisation_and_offshoring: >
    Tradable-sector labour in advanced economies faced effective
    labour-supply expansion from China's integration and
    post-1990s offshoring. Autor-Dorn-Hanson China-shock
    literature identifies the channel quantitatively.
  market_concentration_and_markups: >
    De Loecker, Eeckhout, and Unger 2020 document rising markups
    and concentration in US data. Accounts for a portion of the
    labour-share decline, particularly in the superstar-firm
    tail. Contested in measurement and in external validity.
  intangible_capital_mismeasurement: >
    Intangible capital (software, patents, organisational capital)
    may be under-measured, inflating the apparent capital share.
    Koh-Santaeulalia-Llopis-Zheng 2020 argues that properly
    accounting for IP capital removes most of the US labour-share
    decline post-1980.
  housing_imputed_rent: >
    Rognlie 2015 showed that much of the apparent capital-share
    rise concentrates in housing imputed rent in supply-
    restricted cities. Implication: the institutional lever is
    housing supply, not generic capital taxation.
  collective_bargaining_erosion: >
    US and UK union-density declines correlate in time with
    labour-share declines in the same countries. Nordic and
    German sectoral bargaining persistence correlates with more
    stable labour shares.

supporting_cases:
  - id: karabarbounis_neiman_2014_cross_country
    description: >
      Cross-country panel documenting labour-share decline in
      most advanced economies post-1975, linked to falling
      relative price of investment goods.
  - id: rognlie_2015_housing_decomposition
    description: >
      Reanalysis of Piketty's capital-share rise showing housing
      imputed rent accounts for the large majority. Redirects
      the diagnosis toward supply-restricted urban housing
      markets.
  - id: autor_dorn_hanson_china_shock
    description: >
      Commuting-zone level evidence of labour-market disruption
      from Chinese import competition in US manufacturing
      communities. Channel-specific, local, identifiable.
  - id: german_sectoral_bargaining_share_stability
    description: >
      Germany's sectoral bargaining persistence corresponds with
      relatively more stable labour share than Anglo-Saxon peers,
      though German share also declined during the 2000s Hartz
      reform period.

disconfirming_cases:
  - id: koh_santaeulalia_zheng_intangible_adjustment
    description: >
      Adjusting for intangible capital (IP, software) removes
      most of the US labour-share decline post-1980. Not all
      researchers accept the adjustment methodology, but it
      disciplines claims that the decline is purely distributional.
  - id: labour_share_stability_in_some_oecd
    description: >
      Several OECD economies show stable or slightly rising
      labour shares over the same period. Cross-country
      heterogeneity undermines monocausal explanations.

policy_implications: >
  Institutional response depends on which channel dominates in
  the specific country. Rising markups and concentration imply
  antitrust reinvigoration. Housing-driven capital-share rise
  implies planning and zoning reform. Globalisation-driven
  manufacturing-worker displacement implies adjustment support
  and place-based policy rather than retreat from trade.
  Collective-bargaining erosion implies labour-law reform where
  institutional capacity exists. The policy error is applying a
  one-size-fits-all response (generic capital taxation, generic
  minimum-wage increase) when the dominant channel differs
  across countries.

what_the_model_is_not:
  - "A vindication of any single mechanism — all channels contribute in varying proportions"
  - "A claim that the labour-share decline is entirely a measurement artefact"
  - "A claim that the labour-share decline is entirely distributional capture"
  - "An endorsement of generic capital taxation as the response"
  - "A claim that the Piketty r>g framework is either fully correct or fully wrong — it is a partial contribution"

framework_position: >
  The framework treats the labour-share decline as a real but
  heterogeneous pattern requiring channel-specific
  decomposition. The honest summary of the empirical literature
  is that (a) the falling relative price of capital and (b)
  globalisation and (c) housing imputed rent explain a large
  fraction of the gross decline; (d) rising markups and
  concentration and (e) collective-bargaining erosion account
  for identifiable additional portions in specific countries;
  and (f) intangible-capital measurement adjustments remove
  more of the decline than is often acknowledged. Policy
  response follows the channel: antitrust for concentration,
  housing supply for imputed rent, adjustment policy for trade
  shocks. Collapsing all channels into a "capital vs labour"
  narrative produces worse policy than decomposed diagnosis.

confidence: medium_high

linked_hypotheses:
  - uk_real_wage_stagnation_2008_present_decomposition
  - us_eu_divergence_decomposition

linked_model_ids:
  - labour_share_multi_channel_decomposition
  - housing_supply_vs_capital_taxation_response_design

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: consumer_preference_responsiveness
category: conditions_favoring_markets

description: >
  In domains where consumer preferences are heterogeneous, shifting,
  and observable only through actual choice behaviour, decentralised
  market allocation responds to preferences faster and more
  completely than any administered alternative. This is a narrower
  claim than the broader consumer-goods-allocation condition: it
  is specifically about the speed and fidelity with which the
  allocation mechanism tracks changes in what consumers want.

institutional_features_that_make_the_model_work:
  revealed_preference_aggregated_via_prices_and_quantities: >
    Market prices and purchase quantities aggregate revealed
    preferences in real time, giving producers a continuous
    signal of what customers actually want rather than what
    they say they want in surveys. Administrative allocation
    lacks an equivalent feedback mechanism.

  producer_entry_responds_to_unmet_demand: >
    Unmet demand raises prices, attracts entry, and resolves
    shortages endogenously. In administered systems there is
    no analogous mechanism; supply adjustments require
    political-administrative decisions with long lags and
    weaker selection.

  consumer_exit_disciplines_producers: >
    Consumers who dislike a product switch to alternatives or
    foreign substitutes, disciplining producers. In closed
    administered systems, the exit option is absent and
    producer accountability for quality is correspondingly
    weak.

  heterogeneity_supported_by_variety: >
    Markets support product variety tailored to niche
    preferences (taste, culture, aesthetics, use-case).
    Centralised allocation systematically underproduces
    variety because it is designed around the average
    consumer.

supporting_cases:
  - id: trabant_vs_golf_east_west_germany
    description: >
      East Germany's Trabant production ran essentially
      unchanged designs for decades with multi-year waiting
      lists and no meaningful response to consumer preferences
      for quality, fuel efficiency, or safety. West German
      producers iterated continuously on consumer-observable
      attributes. Two populations with shared pre-war
      automotive heritage produced divergent industries.

  - id: soviet_queues_and_stockouts_chronic
    description: >
      Queues for routine consumer goods (meat, soap, shoes,
      stockings) were a persistent feature of Soviet life
      in a way that reflected allocation's inability to
      adjust supply to shifting preferences and to local
      demand variation. Glasnost-era disclosures made this
      explicit.
    citations:
      - "Kornai, J. (1980). Economics of Shortage."

  - id: venezuelan_basic_goods_shortages_under_price_controls_2013_2019
    description: >
      Administered prices below market-clearing levels for
      basic foods, personal care, and medicine produced
      persistent shortages, while parallel markets and
      cross-border smuggling supplied demand at market
      prices. The system could not respond to preference
      or demand shifts at the controlled prices.

  - id: chinese_post_reform_consumer_variety_explosion
    description: >
      The transition from Mao-era state retail to market
      allocation post-1978 produced a visible explosion of
      consumer variety across food, clothing, electronics,
      and services — the scale of the change indicates how
      much preference heterogeneity the prior system had
      suppressed.

what_the_model_is_not:
  - "A claim that consumer preferences as revealed in markets are normatively authoritative (preferences can be shaped by advertising, addiction, adaptive expectations)"
  - "A claim that consumers are fully rational or well-informed in domains with severe information asymmetry"
  - "A claim that market provision is optimal in domains where preferences are myopic in ways that damage long-run welfare (health behaviours, addiction)"
  - "A denial of any role for public provision or regulation in domains with externalities or public-good character"
  - "A claim that consumer sovereignty should extend to domains where children, capacity-limited individuals, or third-party effects dominate"

disconfirming_cases:
  - id: healthcare_demand_consumer_sovereignty_limits
    description: >
      In healthcare, information asymmetries, insurance
      market failures, and adverse selection limit the
      applicability of pure consumer-sovereignty reasoning;
      this is a domain where markets work less well as
      preference-tracking mechanisms.

  - id: credence_goods_and_expert_services
    description: >
      For credence goods (where quality is hard to assess
      even after consumption), consumer preferences are
      poorly informed and market discipline is weaker.

policy_implications: >
  In domains characterised by heterogeneous, shifting, and
  observable-only-through-choice preferences, market
  allocation should be the default and administered
  alternatives require domain-specific justification
  (information asymmetry, externality, public-good character,
  intertemporal myopia). Price controls on broad categories
  of consumer goods reliably produce shortages and should
  be disfavoured; distributional aims are better served by
  income transfers.

framework_position: >
  Conditional on baseline institutional quality and in domains
  without severe information asymmetries, market allocation
  tracks consumer preferences faster and more completely than
  administered alternatives. The framework narrows the claim
  to domains where the information structure makes consumer
  choice meaningful and does not extend it to domains
  (healthcare, addiction-prone products, credence goods)
  where the information structure breaks the argument.

confidence: high

linked_hypotheses:
  - socialist_calculation_problem_empirical_record
  - price_controls_shortage_dynamics

linked_model_ids:
  - allocation_mechanism_by_domain

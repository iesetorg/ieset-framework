# yaml-language-server: $schema=../../schemas/condition.schema.json
id: climate_externality_mitigation
category: conditions_favoring_intervention

description: >
  Greenhouse-gas emissions impose costs on third parties that are
  not reflected in market prices: the private cost of burning a
  tonne of coal does not include the damage its CO2 will do to
  future climate. Standard externality analysis (Pigou 1920;
  Nordhaus; Stern Review 2006) implies that the uncorrected market
  systematically over-produces emissions. Correction requires
  attaching a price to the externality, either via carbon tax or
  tradable emissions cap, sized to the marginal social cost of
  carbon. Complementary instruments address the R&D spillover
  (clean-tech innovation under-provision) and the coordination
  problem (international free-riding). This is a canonical
  condition favouring intervention via specifically designed
  price-correcting mechanisms.

institutional_features_that_make_the_model_work:
  carbon_price_broad_base: >
    Tax or cap-and-trade applied to the broadest feasible set of
    emissions at the upstream point of production or import.
    Sweden's 1991 carbon tax, BC 2008 carbon tax, EU ETS (from
    2005), California cap-and-trade, UK carbon price floor.
  revenue_recycling: >
    Carbon-tax revenue recycled through cuts to distortionary
    taxes (labour, corporate) or through lump-sum dividends
    (BC, Canada federal backstop) to maintain political
    sustainability and protect real incomes of lower-income
    households.
  border_carbon_adjustment: >
    Tariff-equivalent on imports from uncovered jurisdictions
    neutralises leakage and free-riding. EU CBAM from 2023 the
    first large-scale implementation.
  complementary_innovation_push: >
    Direct public R&D funding for clean-tech (see
    foundational_r_and_d_knowledge_spillover), plus deployment
    incentives (feed-in tariffs historically, contracts-for-
    difference currently) for learning-curve industries.
  regulatory_backstop_for_specific_failures: >
    Efficiency standards, methane regulation, and fugitive-
    emissions enforcement where pricing reaches the limit of
    its accuracy (small emitters, non-CO2 GHGs, information
    failures).

supporting_cases:
  - id: sweden_1991_carbon_tax
    description: >
      Sweden introduced a carbon tax in 1991, raised it
      progressively to among the highest globally (~€120/tCO2
      by 2020s). Emissions per unit GDP fell ~27% 1990-2020 while
      GDP per capita grew, decoupling growth from emissions.
  - id: british_columbia_carbon_tax_2008
    description: >
      Revenue-neutral carbon tax from 2008 at CA$10/tCO2 rising
      to CA$50. Emissions fell relative to rest of Canada; GDP
      growth not distinguishable from counterfactual. Demonstrates
      that revenue-recycled carbon tax is politically and
      economically sustainable in a federal democracy.
  - id: eu_ets_price_and_emissions_trajectory
    description: >
      EU ETS covers ~40% of EU emissions. Price rose from ~€5 in
      early 2010s to €80-100 in 2022-24 after structural reserve
      tightening. Covered sector emissions fell faster than
      uncovered sectors over the same period.
  - id: uk_coal_phaseout_2012_2024
    description: >
      UK coal-fired electricity generation fell from ~40% of the
      mix in 2012 to zero by 2024, driven by the UK carbon price
      floor on top of EU ETS plus renewables contracts-for-
      difference. One of the fastest national decarbonisation
      episodes among large economies.

disconfirming_cases:
  - id: voluntary_carbon_market_non_performance
    description: >
      Voluntary corporate carbon-offset markets have repeatedly
      produced non-additional and low-quality credits (Guardian/
      Die Zeit 2023 investigation of Verra credits). Pure
      voluntary mechanisms without compulsion do not correct the
      externality at scale.
  - id: australia_carbon_tax_repeal_2014
    description: >
      Australia's 2012 carbon price was repealed in 2014 after a
      change of government. Illustrates that carbon pricing
      requires durable political coalition; revenue recycling
      design and distributional salience affect sustainability.
  - id: france_yellow_vest_fuel_tax_backlash
    description: >
      2018 fuel-tax increase triggered gilets jaunes protests and
      was paused. Illustrates that carbon pricing without visible
      compensation to affected households faces political-economy
      ceilings even in capable states.

policy_implications: >
  A broad-based carbon price with revenue recycling, plus
  complementary public clean-tech R&D and targeted deployment
  support for learning-curve industries, plus border carbon
  adjustment to neutralise leakage, is the empirically
  validated policy package. Complementary regulation fills
  gaps where pricing underperforms (methane, fugitives, small
  emitters). Voluntary offset markets are not a substitute.
  International coordination through climate clubs with CBAM-
  like border measures is the institutional response to the
  free-rider problem across jurisdictions.

what_the_model_is_not:
  - "An endorsement of any specific price level or net-zero deadline — those require separate cost-benefit analysis"
  - "A claim that pricing alone is sufficient — R&D, regulation, and deployment support are complements"
  - "A claim that voluntary corporate action or ESG investing correct the externality at scale"
  - "An argument for state ownership of the energy sector — pricing works through markets, not around them"
  - "A claim that every green-industrial-policy programme is cost-effective — many are not"
  - "A claim that the damage function and social cost of carbon are precisely known — they remain uncertain"

framework_position: >
  Climate change is the canonical large-scale unpriced externality
  and satisfies all three classical market-failure conditions:
  non-priced cost spillover, public-good character of the climate
  system, and coordination failure across jurisdictions. The
  framework endorses a technologically-agnostic carbon price (tax
  or cap) set at or approaching the marginal social cost of
  carbon, with revenue recycling to protect real incomes of
  lower-income households, plus complementary public R&D funding
  and targeted deployment support where learning curves are
  steep, plus border carbon adjustment to close the leakage
  channel. Voluntary mechanisms and pure ESG approaches are
  insufficient and in some cases counterproductive. The empirical
  record — Sweden, British Columbia, EU ETS, UK coal phase-out —
  shows that well-designed carbon pricing decarbonises without
  detectable growth penalty. The political-economy challenge of
  sustaining the policy (Australia 2014, France 2018) is real
  and is met through visible revenue recycling, not abandonment.

confidence: high

linked_hypotheses:
  - green_transition_cost_trajectory_electricity_prices

linked_model_ids:
  - pigouvian_carbon_pricing
  - climate_club_plus_border_carbon_adjustment

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: intergenerational_mobility_institutional_determinants
category: conditions_with_distributional_considerations

description: >
  Intergenerational income and educational mobility varies
  substantially across countries and within-country regions,
  with Nordic economies showing the highest rank-rank mobility
  and the US and UK showing lower mobility than most OECD peers
  (Chetty and collaborators; Corak's Great Gatsby curve). Within
  countries, mobility varies by metropolitan area by nearly as
  much as across countries (Chetty-Hendren commuting-zone data).
  The framework's position is that mobility is not primarily a
  function of redistribution intensity but of specific
  institutional features — school quality variance, residential
  segregation, housing affordability, labour-market fluidity,
  early-childhood environment — and that these features are
  largely institutional and technical rather than ideological.

institutional_features_that_make_the_model_work:
  school_quality_variance: >
    Countries with smaller between-school quality variance
    (Finland, Nordic peers) show higher mobility than countries
    with larger variance (US, UK). Mechanism: ability-to-pay
    sorting into school quality transmits parental income to
    child outcomes.
  residential_segregation_by_income: >
    Chetty-Hendren 2018 identifies residential segregation as a
    first-order correlate of low mobility in US commuting zones.
    High-segregation MSAs show low mobility even controlling for
    mean income and inequality.
  housing_affordability_and_geographic_mobility: >
    Expensive cities (SF, LA, NYC, London, SE England) price out
    low-income families from high-productivity labour markets,
    reducing the spatial mobility channel that historically
    delivered intergenerational gains.
  labour_market_fluidity: >
    Ease of job switching, employer-portable benefits, low entry
    barriers to occupations. US occupational licensing growth
    and non-compete spread reduce fluidity relative to historic
    levels; Nordic flexicurity maintains it.
  early_childhood_investment: >
    Universal or near-universal early-childhood education
    (Nordic systems, French école maternelle, UK Sure Start at
    its peak) raises mobility floors by reducing pre-school
    cognitive gaps.
  two_parent_household_stability: >
    Empirical correlate of mobility in US commuting-zone data.
    Institutionally difficult to move directly, but associated
    with labour-market conditions affecting marriageability and
    family stability.

supporting_cases:
  - id: chetty_hendren_moving_to_opportunity_causal
    description: >
      Exploiting family moves, Chetty-Hendren established causal
      rather than merely selection effects of neighbourhood on
      child outcomes. Each year in a higher-mobility commuting
      zone produces measurable gains in adult earnings.
  - id: nordic_high_mobility_rank_rank
    description: >
      Denmark, Norway, Sweden, Finland show rank-rank mobility
      coefficients around 0.15-0.20 vs US 0.35-0.40 (Chetty et
      al). Consistent with lower school-quality variance, lower
      residential segregation, and higher early-childhood
      investment.
  - id: canada_vs_us_mobility_comparison
    description: >
      Canada shows substantially higher mobility than the US
      despite similar per-capita income, labour markets, and
      cultural proximity. Education system design and housing
      markets have been identified as candidates.
  - id: uk_regional_mobility_variation
    description: >
      Within UK, mobility varies by local authority; London
      boroughs show different outcomes than ex-industrial
      northern cities even controlling for mean income. Consistent
      with institutional-conditions framework.

disconfirming_cases:
  - id: redistribution_intensity_alone_insufficient
    description: >
      Some high-redistribution countries (Italy, France) show
      only moderate mobility despite large transfers. Conversely,
      Canada shows high mobility with lower redistribution than
      France. Undermines the claim that redistribution alone
      explains mobility differences.
  - id: mobility_declines_not_uniformly_tracking_inequality
    description: >
      US absolute mobility (children earning more than parents)
      has declined since the 1940s cohort per Chetty-Grusky-
      Hell-Hendren-Manduca-Narang. Relative mobility has been
      more stable. The two metrics behave differently and should
      not be conflated.

policy_implications: >
  Raising mobility requires institutional reform in education
  (reduce between-school quality variance), housing (increase
  supply in high-productivity cities to restore spatial
  mobility), labour markets (reduce occupational licensing and
  non-compete friction), and early-childhood investment. Pure
  tax-and-transfer redistribution, without these institutional
  reforms, typically does not move the mobility needle. The
  policy implication is that mobility is a technical and
  institutional problem masquerading as an ideological one.

what_the_model_is_not:
  - "A claim that redistribution is useless — but it is not the primary lever for mobility"
  - "A claim that mobility is the most important distributional metric — absolute income and poverty levels matter independently"
  - "An argument against universal early-childhood provision — it is a mobility-raising institutional feature"
  - "A claim that the US-Nordic mobility gap is ideological — it is largely institutional and technical"
  - "A claim that Chetty's rank-rank methodology is the only defensible approach — different mobility concepts trade off"

framework_position: >
  Intergenerational mobility is a distributional concern
  distinct from static inequality and requires a different
  policy response. The framework treats mobility as primarily
  determined by institutional features — school-quality
  variance, residential segregation, housing affordability,
  labour-market fluidity, early-childhood environment — rather
  than by the intensity of static redistribution. The
  cross-country pattern (Nordic high mobility, Canada high
  mobility, US and UK lower mobility) and the within-country
  pattern (Chetty's commuting-zone variation) both support an
  institutional-determinants reading over a pure
  redistribution-intensity reading. Policy response follows the
  institutional diagnosis: raise school quality floors, unwind
  residential segregation and housing-cost barriers, reduce
  occupational-licensing friction, invest in early-childhood
  environments. The US-Nordic mobility gap is mostly
  institutional rather than ideological, and the framework
  treats the institutional features as broadly transferable
  where political feasibility allows.

confidence: medium_high

linked_hypotheses:
  - nordic_outcome_persistence_decomposition

linked_model_ids:

# yaml-language-server: $schema=../../schemas/condition.schema.json
id: foundational_r_and_d_knowledge_spillover
category: conditions_favoring_intervention

description: >
  Foundational research — basic science, long-horizon applied
  research, general-purpose technologies — has a social return
  substantially above its private return because knowledge spills
  across firms, sectors, and decades. Private firms rationally
  underinvest because they cannot capture the full benefits: a
  pharmaceutical breakthrough in a university lab seeds dozens of
  downstream therapeutics at other firms; transistor physics
  enabled an entire industry. This is the classic Arrow (1962)
  knowledge-as-public-good argument. State funding through
  competitive grant councils, mission agencies, and long-run
  research institutions has empirically produced foundational
  science that private markets did not and would not.

institutional_features_that_make_the_model_work:
  peer_review_grant_councils: >
    NIH, NSF, ERC, DFG, MRC operate competitive merit-reviewed
    grant allocation. Scientists judge scientists. Insulates
    funding from short-run political or commercial direction.
  mission_agencies_with_procurement_power: >
    DARPA, NASA, ARIA, ARPA-H set high-risk directional challenges
    and buy outcomes. Internet (DARPA), GPS (DoD), large-scale
    integration (NASA Apollo feedbacks), mRNA delivery (NIH+DARPA).
  long_horizon_research_institutes: >
    Max Planck, CNRS, RIKEN, CSIRO, CERN, EMBL run permanent
    research infrastructure on multi-decade horizons that no
    private firm can justify amortising.
  university_research_plus_tech_transfer: >
    Research universities with federal funding plus tech-transfer
    offices (Bayh-Dole 1980 in US) bridge basic research to
    commercial application while keeping the upstream public.
  complementary_private_applied_r_and_d: >
    State funds the upstream where spillovers are largest; private
    firms fund the downstream where appropriability is stronger.
    The model is complementary, not substitutive.

supporting_cases:
  - id: us_federal_research_ecosystem_postwar
    description: >
      Post-Vannevar-Bush US federal research funding (NIH, NSF,
      DARPA, DOE national labs) produced the foundational science
      underlying semiconductors, the internet, GPS, mRNA vaccines,
      GLP-1 drugs, CRISPR. Mazzucato documents the state origin of
      most core technologies in a modern iPhone.
  - id: german_max_planck_fraunhofer_model
    description: >
      Max Planck institutes for basic research plus Fraunhofer
      institutes for applied research form a durable public-private
      bridge supporting German industrial strength.
  - id: cern_european_basic_physics
    description: >
      CERN as multi-decade publicly-financed basic physics
      infrastructure produced the Web as a by-product and trained
      generations of researchers who dispersed into industry.
  - id: covid_mrna_vaccines
    description: >
      Decades of NIH-funded mRNA research (Katalin Karikó and
      others) enabled the 2020 rapid-response vaccines. Private
      development was fast only because the foundational science
      existed. Counterfactual of no NIH funding is an order of
      magnitude slower response.

disconfirming_cases:
  - id: soviet_directed_research_inefficiency
    description: >
      Soviet science produced strong outcomes in narrow directed
      fields (physics, mathematics, space) but failed in
      distributed applied innovation (computing, consumer tech,
      biotech). Illustrates that state funding requires peer-review
      and decentralised allocation, not top-down direction.
  - id: failed_national_champions_industrial_policy
    description: >
      State-directed commercial R&D in picked firms (Concorde,
      various European "national champions" in semiconductors,
      post-war British computing) frequently underperformed. The
      case for state R&D is upstream of commercialisation, not in
      picking commercial winners.
  - id: pure_private_pharmaceutical_r_and_d_hypothesis
    description: >
      The counterfactual claim that pure private pharmaceutical
      R&D would have produced the same drug pipeline is
      inconsistent with the evidence: most novel molecular
      entities trace to publicly-funded upstream research; private
      pharma's comparative advantage is in development, trials,
      and distribution, not target discovery.

policy_implications: >
  Public funding should concentrate on basic research, long-horizon
  applied research, and general-purpose-technology challenges
  where private appropriability is weakest. Grant councils should
  remain peer-reviewed and insulated from political direction.
  Mission agencies can set directional challenges but should buy
  outcomes rather than pick firms. Tech-transfer and strong IP
  enforcement downstream let private firms capture the
  commercialisable slice. Countries underinvesting in upstream
  research (UK R&D intensity below OECD median; post-2010 US
  federal research in relative decline) face predictable long-run
  productivity drag.

what_the_model_is_not:
  - "An argument for state-directed commercial R&D or national-champion industrial policy"
  - "A claim that every publicly-funded research programme is productive — many are not"
  - "A claim that private R&D is wasteful — private applied R&D is complementary and large"
  - "An endorsement of political direction of research topics — peer review and scientific autonomy matter"
  - "A claim that state research funding in weak-institutional settings produces the same returns"

framework_position: >
  Foundational R&D is one of the strongest conditions favouring
  intervention because the market failure (non-appropriable
  spillovers) is quantitatively large, empirically confirmed
  (social returns to R&D estimated at multiples of private
  returns in cross-country panels), and has a well-functioning
  institutional solution (peer-reviewed grant councils plus
  mission agencies plus long-horizon institutes). The framework
  endorses sustained public funding of upstream research with
  private-sector complementarity downstream, while rejecting
  state-directed commercial R&D as a distinct and weaker claim.
  The institutional detail — peer review, scientific autonomy,
  multi-decade horizons, complementary rather than substitutive
  positioning relative to private R&D — is what distinguishes
  successful public research ecosystems from failures.

confidence: high


# yaml-language-server: $schema=../../schemas/condition.schema.json
id: agricultural_production_efficiency
category: conditions_favoring_markets

description: >
  Allocation of land, labour, and capital in agriculture under
  secure individual or family tenure with market prices for
  outputs and inputs empirically outperforms collectivised or
  heavily state-administered agriculture. The twentieth-century
  record includes some of the worst policy failures on record
  (multiple collectivisation-induced famines) and some of the
  largest post-reform productivity gains (Chinese decollectivisation).
  This is one of the highest-confidence claims in the taxonomy
  and one of the most historically consequential.

institutional_features_that_make_the_model_work:
  secure_land_tenure: >
    Farmers with secure tenure invest in soil quality, irrigation,
    long-cycle crops, and equipment. Insecure tenure, common
    ownership without clear allocation, or arbitrary state
    seizure collapses the investment horizon and drives
    short-term extraction from the land.

  household_or_family_labour_residual_claimancy: >
    Agriculture is characterised by monitoring problems
    (quality of effort varies with season, soil patch, weather)
    that make residual claimancy by the cultivating household
    a strong incentive mechanism. Collective farms persistently
    underperformed household farms on effort-intensive crops
    even under similar technology.

  market_prices_for_outputs_and_inputs: >
    Farmers need accurate relative prices to choose crops,
    inputs, and investment levels. Administered procurement
    prices set below market-clearing levels (common in
    socialist agriculture and many developing-country regimes)
    systematically depress production and investment.

  functioning_input_supply_and_credit: >
    Agriculture requires seed, fertiliser, machinery, and
    seasonal credit supplied through competitive channels.
    State monopoly input supply has consistently been less
    responsive than private supply.

  extension_services_and_public_research: >
    Public agricultural research (CGIAR system, land-grant
    universities, national breeding programs) is a
    complement to market allocation of production; the
    Green Revolution depended on public breeding work
    diffused through private and cooperative channels.

supporting_cases:
  - id: soviet_collectivisation_famine_1932_1933
    description: >
      Forced collectivisation in the USSR, especially in
      Ukraine, the North Caucasus, and Kazakhstan, produced
      the 1932-33 famine (Holodomor in Ukraine) with
      several million excess deaths. Procurement quotas
      set above production capacity combined with seizure
      of seed stocks and restrictions on peasant mobility.
    citations:
      - "Conquest (1986). The Harvest of Sorrow."
      - "Davies & Wheatcroft (2004). The Years of Hunger."
      - "Applebaum (2017). Red Famine."

  - id: great_leap_forward_famine_1959_1961
    description: >
      Forced collectivisation into people's communes combined
      with inflated procurement, pseudo-scientific agricultural
      directives, and suppression of local price information
      produced a famine with estimates of 15-45 million
      excess deaths, the largest mortality event of the
      twentieth century attributable to a single policy.
    citations:
      - "Dikotter (2010). Mao's Great Famine."
      - "Li & Yang (2005). The Great Leap Forward: Anatomy of a Central Planning Disaster. JPE."

  - id: china_household_responsibility_system_1978_1984_productivity_surge
    description: >
      Decollectivisation into household-based contracting
      (baochan daohu) after 1978 produced grain output
      increases of roughly 30-50 percent over six years
      with no major change in inputs; Lin (1992) attributed
      roughly half the gain to the incentive reform alone.
      One of the cleanest natural experiments on incentives
      in production economics.
    citations:
      - "Lin (1992). Rural Reforms and Agricultural Growth in China. AER."

  - id: soviet_private_plots_outperformance
    description: >
      Private household plots on roughly 3 percent of Soviet
      agricultural land produced roughly 25 percent of
      Soviet agricultural output by some estimates, a
      well-documented within-country productivity contrast
      under common technology and climate.
    citations:
      - "Johnson & Brooks (1983). Prospects for Soviet Agriculture in the 1980s."

  - id: zimbabwe_land_seizure_production_collapse_2000_onward
    description: >
      Fast-track land reform from 2000 seized commercial
      farms without compensation and redistributed land
      without secure tenure, credit, or input supply.
      Agricultural output collapsed, food exports turned
      to imports, and hyperinflation followed. The
      mechanism was tenure destruction, not redistribution
      as such.

  - id: vietnam_khoan_10_decollectivisation_1988
    description: >
      Vietnam's 1988 Khoan 10 decollectivisation followed
      the Chinese model on a shorter time lag and produced
      a similar rapid shift from food importer to rice
      exporter, reproducing the incentive-reform result
      in a different national context.

what_the_model_is_not:
  - "A claim that agriculture should be unregulated on food safety, environmental externalities, or biosecurity"
  - "A claim that commodity price volatility does not justify public stabilisation instruments (strategic reserves, crop insurance, counter-cyclical support)"
  - "A denial of legitimate concerns about rural poverty, smallholder transition, or agricultural-labour displacement"
  - "A claim that agricultural markets are immune to market power in processing, retail, or input supply (concentrated agribusiness is a real concern)"
  - "A claim that all forms of collective farming have failed — voluntary cooperatives with market output prices have a more varied record than state-imposed collectives"

failed_replications:
  - id: tanzania_ujamaa_villagisation_1967_1985
    description: >
      Nyerere's ujamaa villagisation forcibly relocated
      roughly 5 million peasants into collective villages;
      agricultural output declined, food imports rose, and
      the programme was effectively abandoned by the mid-
      1980s. Collectivisation without coercion-level state
      capacity produced worse outcomes than the
      pre-existing peasant agriculture.

  - id: ethiopian_derg_villagisation_1985_1988
    description: >
      The Derg regime's villagisation and forced resettlement
      programmes in the late 1980s disrupted smallholder
      agriculture during a famine period and contributed to
      rather than alleviated the 1984-85 famine mortality.

policy_implications: >
  Agricultural policy defaults should be: secure individual
  or family tenure; market prices for outputs and inputs;
  competitive input supply and credit; public investment
  in research, extension, and rural infrastructure; and
  targeted safety nets for rural poverty rather than
  price-administration. The historical record on
  collectivisation is among the strongest empirical cases
  in development economics and deserves explicit weight
  in framework positions.

framework_position: >
  Conditional on basic state capacity, secure tenure is
  feasible to implement, and output markets are open,
  individual-household agriculture with market prices
  dominates collectivised or state-administered
  alternatives. The twentieth-century record of forced
  collectivisation is one of the most catastrophic policy
  records on file, and the framework assigns this claim
  high confidence. Public-goods functions (research,
  extension, infrastructure, food-security reserves,
  environmental regulation) are complements to, not
  substitutes for, market allocation.

confidence: high

linked_hypotheses:
  - collectivisation_famine_causal_record
  - land_tenure_investment_horizon

linked_model_ids:
  - allocation_mechanism_by_domain

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: norway_gpfg_resource_curse_avoidance
version: 1
status: pre_registered
topic: resource_rents
claim: Norway's post-1990 GPFG resource-rent architecture outperformed a hydrocarbon-dependent
  donor pool on real GDP per capita, consistent with the claim that collective ownership of
  resource rents plus market-based management can avoid resource-curse growth outcomes.
methodology_note: >-
  Promoted from draft on 2026-04-30 before first run. The original stub phrased
  the GPFG claim too broadly across growth, institutional quality, and TFP.
  This v1 pre-registration narrows the dispositive test to the first outcome
  consumed by the synth_did runner: Norway's log real GDP per capita versus a
  hydrocarbon-dependent donor pool, with 1990 as the event year and 1985-1989
  as the pre-fit window. Institutional-quality and TFP variables remain
  context, not binding outcomes, in this runner.
notes: Origin is auto-generated coverage-gap stub seeded from market-socialist framing of GPFG as
  collective-ownership-plus-market-management resource-curse avoidance. Human review required.
prior_confidence: 0.65
disclosure: Author has market-liberal priors and is generally favourable toward the GPFG model;
  framing risks attributing avoidance to fund design when pre-existing Norwegian institutional quality may dominate.
falsification:
  rule: >-
    PRIMARY: SUPPORTED if synthetic-control / synth-DiD estimates a positive
    mean post-1990 Norway gap in log real GDP per capita versus the donor pool,
    the absolute mean gap exceeds 0.5 times the pre-period Norway standard
    deviation, and the placebo permutation p-value is below 0.10. REFUTED if
    the corresponding gap is negative, large by the same rule, and p < 0.10.
    PARTIAL otherwise. METHOD_VALID: at least four pre-1990 observations and
    at least two donor countries with overlapping pre/post outcome data.
  test: 'Synthetic control of Norway 1990-2023 vs hydrocarbon-dependent donor pool (RUS, VEN, SAU, NGA, AGO, DZA, KAZ, AZE, ECU, GAB); primary threshold is positive log-GDP-per-capita gap >0.5x pre-period SD with placebo p<0.10.'
  threshold: "PRIMARY: mean_post_gap(log_real_gdp_per_capita) > 0, |gap| > 0.5*pre_sd, placebo_p < 0.10."
evidence_type: associational
steelman: hypotheses/steelman/norway_gpfg_resource_curse_avoidance.md

scope:
  period: [1990, 2023]
  countries: [NOR]
  outcome_dim: [institutional_quality, capital_flows]
  policy_family: [institutional_reform, fiscal_policy]
  treatment_tags: [norway_gpfg_1990]
sample:
  countries: [NOR, RUS, VEN, SAU, NGA, AGO, DZA, KAZ, AZE, ECU, GAB]
  period: [1985, 2023]
  temporal_structure: panel
  exclusion_rules:
    - "donor pool excludes NOR for synthetic-control fit"
    - "drop country-years missing real GDP per capita or institutional-quality series"
variables:
  outcome:
    - name: log_real_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
      notes: "WDI real GDP per capita as primary outcome — resource-curse avoidance manifests as growth path divergence vs donor pool."
    - name: institutional_quality_wgi
      source: "wgi:GovernmentEffectiveness"
      transformation: level
      notes: "WGI government effectiveness; available 1996+. Pre-1996 backseries from V-Dem polyarchy."
    - name: institutional_quality_vdem
      source: "vdem:v2x_polyarchy"
      transformation: level
    - name: log_tfp_pwt
      source: "pwt:rtfpna"
      transformation: log
  treatment:
    - name: norway_gpfg_indicator
      source: "constructed: indicator = 1 for NOR years >= 1990 (GPFG / Oljefondet inception). Donor pool = hydrocarbon-dependent peers (RUS, VEN, SAU, NGA, etc.)."
      transformation: indicator
    - name: oil_rent_share_gdp
      source: "world_bank_wdi:NY.GDP.PETR.RT.ZS"
      transformation: level
      notes: "WDI oil rent % GDP — captures resource-dependence intensity."
  controls:
    - name: log_gdp_per_capita_initial
      source: "maddison:rgdpnapc"
      transformation: log
      notes: "1990 starting condition (Solow-style)."
    - name: oil_price_brent
      source: "imf_pcps:POILBRE"
      transformation: log
estimator:
  template: synth_did
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Synthetic-DiD with NOR as treated unit and hydrocarbon-dependent donor
    pool (RUS, VEN, SAU, NGA, AGO, DZA, KAZ, AZE, ECU, GAB). Pre-treatment
    fit window 1985-1989; post-treatment 1990-2023. Outcomes: log real GDP
    per capita, institutional quality (WGI/V-Dem). Caveat: pre-existing
    Norwegian institutional quality (1990 baseline already strong) means
    treatment effect on institutions is likely small; growth-path
    divergence is the cleaner test.

covers_claims:
  - position_id: market_socialist
    claim_index: 6
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "Market-socialist position predicts Norway GPFG's collective-ownership-plus-market-management design avoids resource-curse outcomes; hypothesis tests that proposition directly."

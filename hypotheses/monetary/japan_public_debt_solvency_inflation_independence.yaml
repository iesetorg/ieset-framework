hypothesis_id: japan_public_debt_solvency_inflation_independence
version: 1
status: pre_registered
topic: monetary
claim: Japanese public debt crossing 150%, then 200%, then 250% of GDP 1990-2020 did not trigger a solvency or inflation crisis, contradicting household-debt-analogue framings.
notes: Promoted from coverage-gap stub on 2026-05-03. v1 uses a descriptive threshold test around Japan's 150/200/250 percent gross-public-debt/GDP crossings, with FRED 10y JGB yield, FRED CPI, FRED JPY/USD, IMF gross debt/GDP, IMF current-account balance, and WDI real-GDP growth. BoJ JGB-holdings share remains an informative missing series, not a primary gate.
prior_confidence: 0.65
methodology_note: 'v1 promotion (2026-05-03). The original stub already named a descriptive multi-metric threshold test but left the falsification rule in boilerplate. This promotion pins the thresholds to crisis events a household-debt-analogue theory would predict: a >300bp 10y sovereign-yield spike or sustained >5% CPI inflation after debt/GDP crosses 150%, 200%, and 250%. BoJ JGB holdings and CDS are useful mechanism/context series but are not required for the primary test because they are not on disk. The run is intentionally descriptive: it tests whether the predicted crisis outcomes occurred, not whether MMT''s broader causal interpretation is correct.'
disclosure: Author treats Japan as a strong descriptive falsifier of naive solvency claims but resists the broader MMT inference; framing may understate demographic and saving-glut interactions.
falsification:
  rule: SUPPORTED if Japan crosses the 150%, 200%, and 250% gross-public-debt/GDP thresholds without either (a) a 10y JGB yield spike of more than 300 basis points above the trailing-12-month pre-threshold mean within the following 24 months, or (b) CPI inflation above 5% year-over-year for at least 12 consecutive months within the following 24 months. REFUTED if any debt threshold crossing is followed by either crisis condition. WEAKENED if one primary series is missing at a threshold but the observed series does not breach. METHOD_VALID requires the IMF debt/GDP, FRED 10y JGB yield, and FRED CPI series to cover the threshold windows between 1990 and 2020.
  test: 'Descriptive multi-metric pattern check: JPN debt/GDP, 10y JGB yield, CPI, BoJ holdings 1990-2020; no >300bp yield spike or >5% sustained inflation at 150/200/250% thresholds supports the claim.'
evidence_type: associational
scope:
  period:
  - 1990
  - 2020
  countries:
  - JPN
  outcome_dim:
  - inflation
  - fiscal_policy
  - monetary_policy
  policy_family:
  - fiscal_policy
  - monetary_policy
  treatment_tags:
  - japan_zirp_post_1999
  - monetary_sovereignty
  - japan_boj_debt_absorption
sample:
  countries:
  - JPN
  period:
  - 1990
  - 2020
  temporal_structure: time_series
variables:
  outcome:
  - name: jgb_yield_10y
    source: boj:bond_yields_10y; fred:IRLTLT01JPM156N
    transformation: level
    notes: 10y JGB yield; FRED OECD-mirror used pending BoJ manual-drop.
  - name: cpi_inflation
    source: boj:CPI; fred:JPNCPIALLMINMEI
    transformation: pct_change_yoy
  - name: jpy_usd_exchange_rate
    source: fred:DEXJPUS; bis:WS_EER
    transformation: log_level
  treatment:
  - name: gross_public_debt_pct_gdp
    source: imf:GGXWDG_NGDP; world_bank_wdi:GC.DOD.TOTL.GD.ZS
    transformation: level_pct
    notes: Tracks 150 / 200 / 250 thresholds.
  - name: boj_jgb_holdings_pct_outstanding
    source: boj:money_stock_m2
    transformation: level_pct
    notes: 'TODO: BoJ JGB holdings as share of total outstanding; manual-drop required from BoJ flow-of-funds.'
  controls:
  - name: real_gdp_growth
    source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
    transformation: pct_change_yoy
  - name: current_account_pct_gdp
    source: imf:BCA_NGDPD
    transformation: level
  - name: sovereign_cds_5y
    source: academic:bloomberg_cds
    transformation: level
    notes: "TODO: JPN 5y CDS via Bloomberg \u2014 manual-drop."
covers_claims:
- position_id: mmt
  claim_index: 4
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: MMT claim that Japanese public debt 1990-2020 did not trigger solvency or inflation crisis, contradicting household-debt-analogue framings; direct alignment with hypothesis claim and scope.
estimator:
  template: descriptive
  clustering: episode
  notes: 'Stub-level estimator pin for runnability audit. Descriptive trajectory of Japanese gross public debt / GDP, 10y JGB yield, CPI inflation, and BoJ holdings 1990-2020. Pattern-test: no breach of household-debt-style solvency triggers (yield spike, inflation spike, downgrade-driven exit of marginal investors) across 150% / 200% / 250% debt thresholds. Falsification rule and variables block remain to be filled when this stub is promoted from draft.

    '
steelman: hypotheses/steelman/japan_public_debt_solvency_inflation_independence.md

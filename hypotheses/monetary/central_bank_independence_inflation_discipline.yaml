- position_id: mmt
  claim_index: 124
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: "2026-05-04 tested-floor neutral coverage wave; axis-overlap selection from already public-tested hypotheses, independent of observed score effects. Added as `mixed` conditional claims so coverage balance improves without changing directional net scores. Axis: monetary.central_bank_independence. MMT has an explicit stake in fiscal capacity, unemployment, inflation mechanisms, and whether real-resource constraints dominate household-budget analogies."

covers_claims:
- position_id: austrian
  claim_index: 7
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Austrian claim that CBI-maintaining countries experience fewer hyperinflation episodes; hypothesis tests CBI-inflation panel relationship 1990-2023.
- position_id: chicago_monetarism
  claim_index: 3
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Chicago-monetarist claim that statutory CBI (Bundesbank, post-1997 BoE, post-1989 RBNZ) produces lower average inflation; directly covered by the CBI panel spec.
- position_id: empirical_pragmatist
  claim_index: 7
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Empirical-pragmatist reading that CBI produces lower inflation across institutional contexts; directly covered by the global CBI panel spec.
- position_id: institutionalism
  claim_index: 8
  polarity: aligned
  school_prediction: supported
  confidence: low
  notes: 'Phase 4C candidate: claim scope OECD post-1980 vs hypothesis cross-country panel 1990-2023; partially overlapping era.'
- position_id: ordoliberal
  claim_index: 2
  polarity: aligned
  school_prediction: supported
  confidence: low

hypothesis_id: currency_user_vs_issuer_hyperinflation_classification
version: 1
status: candidate
topic: monetary
claim: "Every documented modern hyperinflation episode (Cagan \u226550% monthly inflation, Hanke-Krus catalogue) since 1900 falls into one of two categories: (a) the issuing state had material foreign-currency or gold-clause obligations, hard-currency-pegged debt, or external market dependency that left it operating effectively as a currency-user (Weimar reparations, Hungary 1945-46 occupation obligations, Yugoslavia FX debt, Zimbabwe USD obligations 2007+, Venezuela USD oil revenue dependency, Argentina USD debt, Lebanon USD-pegged banking system, Turkey 2021-2024 FX-denominated debt), or (b) the issuing state experienced a documented physical supply collapse independent of the monetary regime (Weimar Ruhr occupation, Hungary post-WW2 occupation/reparation, Zimbabwe land-reform output collapse, Venezuela oil-sector collapse). No documented hyperinflation has occurred at a sovereign currency-issuer with no material foreign-currency or hard-peg obligations and no contemporaneous supply collapse.\
  \ The MMT/PK currency-user-vs-issuer distinction is empirically supported as a necessary classification axis for hyperinflation episodes."
notes: 'This hypothesis sits alongside hyperinflation_requires_fiscal_dominance rather than against it: the fiscal-dominance condition is necessary, but the MMT/PK addendum is that the operative mechanism in every documented case is either FX-denominated obligation (rendering the state a currency-user) or supply collapse, not monetary expansion at a clean sovereign currency-issuer. Re-classifies the hyperinflation register on its own terms.'
prior_confidence: 0.7
disclosure: 'Author has market-liberal priors. The classification claim is empirically tractable but the categorisation can be contested at the edges (e.g. Argentina 1989 was both FX-debt-stressed and populist-fiscal-dominant; the case fits both schools). Specification risk: the "supply collapse" coding is potentially permissive; the spec adopts a tight definition (real GDP per capita decline >15% in the four quarters preceding Cagan threshold) to constrain ad-hoc coding.'
falsification:
  rule: 'The hypothesis is falsified if any documented hyperinflation episode in the Hanke-Krus catalogue 1900-2025 fails BOTH conditions: (a) absence of material foreign-currency or hard-peg obligations (defined as FX-denominated public+private debt < 20% of GDP AND no formal currency peg/gold-clause active in the 24 months preceding Cagan threshold breach), AND (b) absence of physical supply collapse (defined as real GDP per capita decline < 15% in the four quarters preceding the breach). A single case meeting neither qualifying condition falsifies the classification claim.'
  test: hyperinflation_classification_currency_user_or_supply_collapse
  threshold: 100% of Cagan-threshold episodes since 1900 must satisfy at least one of (FX-obligation present) OR (supply-collapse documented) in the 24-month preceding window
evidence_type: descriptive
sample:
  countries:
  - DEU
  - HUN
  - YUG
  - ZWE
  - VEN
  - BRA
  - ARG
  - BOL
  - PER
  - NIC
  - UKR
  - BLR
  - TUR
  - LBN
  - GEO
  - AZE
  - ARM
  period:
  - 1900
  - 2025
  temporal_structure: time_series
  exclusion_rules:
  - "include only country-episodes meeting Cagan threshold (monthly inflation \u2265 50%) per Hanke-Krus / Reinhart-Rogoff"
  - exclude wartime currency collapses where the government structure had ceased to exist (Confederate States 1865, Imperial Russia 1917-1922 not coded as sovereign-issuer episodes)
variables:
  outcome:
  - name: hyperinflation_episode_classification
    source: 'constructed: episode-level coding from Hanke-Krus catalogue + IMF/BIS sovereign debt composition + Reinhart-Rogoff currency-regime tables'
    transformation: categorical_currency_user_supply_collapse_both_neither
    notes: Per-episode coding into {currency_user, supply_collapse, both, neither}. The hypothesis predicts the "neither" cell to be empty.
  treatment:
  - name: fx_denominated_public_debt_pct_gdp
    source: imf:GGXWDG_NGDP composition tables; bis:CRED_total_external; world_bank_wdi:DT.DOD.DECT.CD
    transformation: pct_gdp
    notes: 24-month-preceding window. Threshold for "currency-user" coding = 20% of GDP.
  - name: hard_currency_peg_indicator
    source: ilzetzki_reinhart_rogoff:era_classification_monthly_1940_2019
    transformation: binary
    notes: "Indicator = 1 if RR coarse classification \u2264 3 (peg or crawling band) in the 24 months preceding breach."
  - name: real_gdp_decline_preceding_window
    source: maddison:real_gdp_per_capita; pwt:rgdpe; world_bank_wdi:NY.GDP.PCAP.KD
    transformation: pct_decline_4q
    notes: Threshold for "supply-collapse" coding = >15% real GDP per capita decline in 4 quarters before breach.
  - name: fiscal_deficit_pct_gdp
    source: imf:GGXCNL_NGDP; world_bank_wdi:GC.NLD.TOTL.GD.ZS
    transformation: pct_gdp
    notes: "Necessary-condition cross-check with hyperinflation_requires_fiscal_dominance \u2014 does NOT enter the classification rule but is reported alongside."
  controls:
  - name: monthly_inflation_peak
    source: hanke_tc:hyperinflation_table; hanke:hyperinflation_table
    transformation: pct_monthly
  - name: currency_regime_classification
    source: ilzetzki_reinhart_rogoff:era_classification_monthly_1940_2019
    transformation: categorical
estimator:
  template: multi_metric_checklist
  clustering: episode
  notes: 'Per-episode case-coding pattern check. The hypothesis is descriptive and the test is a coverage rule: every Cagan-threshold episode must satisfy currency-user OR supply-collapse criterion. Episode-level coding rules pre-registered per row of the Hanke-Krus catalogue. Robustness: tighter "currency-user" threshold (10% FX-debt) and looser threshold (30%) reported. Tightness of supply-collapse threshold (10% / 15% / 20%) reported.'

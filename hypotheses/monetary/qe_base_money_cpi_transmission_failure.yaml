hypothesis_id: qe_base_money_cpi_transmission_failure
version: 2
status: pre_registered
topic: monetary
claim: US Federal Reserve post-2008 QE expanded base money roughly 4x without triggering broad-money expansion or consumer-price inflation until 2021, contradicting the quantity-theory mechanical transmission.
notes: Origin is auto-generated coverage-gap stub seeded from MMT framing of post-2008 base-money expansion as decoupled from broad money and CPI until 2021, contradicting mechanical quantity theory. v2 pins a transparent descriptive pass-through test using local FRED vintages.
prior_confidence: 0.65
disclosure: Author has market-liberal priors but treats the 2008-2021 base-money/CPI decoupling as well-evidenced; framing risks treating the 2021 inflation episode as fully exogenous to prior QE.
falsification:
  rule: 'Primary descriptive test compares August 2008 to December 2019, avoiding the COVID fiscal/inflation regime shift. It is supported if the monetary base expands by at least 3.5x while CPI/base cumulative pass-through is below 0.20 and M2/base pass-through is below 0.50. It is refuted if CPI/base pass-through is at least 0.50 or average CPI inflation exceeds 4% annualised over the same window. December 2020/January 2021 is reported as a sensitivity but not the primary window.

    '
  test: fred_base_money_m2_cpi_pass_through_2008_2019
  threshold: support if base >=3.5x, CPI/base pass-through <0.20, M2/base pass-through <0.50; refute if CPI/base >=0.50 or annual CPI inflation >4%
methodology_note: 'This v2 run is descriptive rather than a local-projection impulse response. It is designed to test the strong mechanical quantity-theory/pass-through claim with auditable local data, not to explain the later 2021-2022 inflation episode.

  '
evidence_type: associational
scope:
  period:
  - 2008
  - 2021
  countries:
  - USA
  outcome_dim:
  - inflation
  - monetary_policy
  policy_family:
  - monetary_policy
  treatment_tags:
  - qe_post_2008
  - fed_balance_sheet_expansion
covers_claims:
- position_id: mmt
  claim_index: 10
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: MMT claim that post-2008 Fed QE expanded base money ~4x without broad-money expansion or CPI inflation until 2021, contradicting quantity-theory mechanical transmission; direct alignment with hypothesis claim and scope.
- position_id: chicago_monetarism
  claim_index: 114
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: '2026-05-04 target-120 coverage wave; mechanism-based selection from already public-tested hypotheses, independent of observed score effects. Mechanism family: quantity_theory_challenge. Chicago monetarism has an explicit stake in price controls, fiscal credibility, monetary transmission, expectations, and rule-like policy regimes.'
estimator:
  template: local_projections
  clustering: episode
  notes: 'Stub-level estimator pin for runnability audit. Local-projection IRFs of US CPI and M2 to monetary-base shocks at h = 1..36 months over 2008-2021. Compares observed peak response against quantity-theory- implied proportional pass-through. Falsification rule and variables block remain to be filled when this stub is promoted from draft.

    '
sample:
  countries:
  - USA
  period:
  - 2005
  - 2021
  temporal_structure: time_series
variables:
  outcome:
  - name: cpi_inflation
    source: fred:CPIAUCSL
    transformation: pct_change_yoy
  - name: cpi_core_inflation
    source: fred:CPILFESL
    transformation: pct_change_yoy
  - name: m2_money_stock
    source: fred:M2SL
    transformation: log_diff
  treatment:
  - name: monetary_base
    source: fred:BOGMBASE
    transformation: log_diff
    notes: Base contracted ~4x from ~$830bn (Aug-2008) to ~$3.4tn (Aug-2014); further expansion in 2020.
  - name: fed_balance_sheet_total_assets
    source: fred:WALCL
    transformation: log_diff
  controls:
  - name: output_gap
    source: oecd:OECD.ECO.MAD,DSD_KEI@DF_KEI,1.0
    transformation: level_pct
  - name: unemployment_rate
    source: fred:UNRATE
    transformation: level_pct
  - name: oil_price
    source: imf_pcps:POILBRE
    transformation: log_diff
  - name: fed_funds_rate
    source: fred:DFF
    transformation: level
steelman: hypotheses/steelman/qe_base_money_cpi_transmission_failure.md

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: argentina_paso_2019_fx_reserves_inflation_base_money_lag
version: 1
status: pre_registered
topic: monetary
claim: Argentina's 2019 PASO shock generated an immediate official-FX break, reserve
  loss, and inflation pass-through; the 2020 base-money expansion was followed by
  a lagged inflation pickup by Q4.
evidence_type: canonical_case_multi_metric
sample:
  countries: &id002
  - ARG
  period: &id001
  - 2019
  - 2020
  temporal_structure: time_series
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - inflation
  - currency_purchasing_power
  - capital_flows
  - financial_crisis
  policy_family:
  - monetary_policy
  treatment_tags:
  - argentina_paso_2019
  - base_money_lag_2020
variables:
  outcome:
  - name: official_fx_retail
    source: bcra:4
    transformation: daily ARS/USD
  - name: international_reserves
    source: bcra:1
    transformation: daily USD millions
  - name: monthly_cpi_inflation
    source: bcra:27
    transformation: monthly percent
  - name: monetary_base
    source: bcra:15
    transformation: daily ARS millions
  treatment:
  - name: paso_primary_shock
    source: 'constructed: 2019-08-11 PASO primary'
    transformation: event indicator
  - name: pandemic_base_money_expansion
    source: 'constructed: 2020 monetary-base expansion window'
    transformation: event indicator
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Compact national event-window replication from cached ONS/INE/BCRA vintages.
falsification:
  rule: 'SUPPORTED if at least 3 of 4 metrics pass: PASO-week devaluation exceeds
    25 percent, reserves fall by more than 10 percent in about 30 days, Aug-Sep 2019
    monthly inflation averages above 4.5 percent, and 2020 base money grows more than
    20 percent from March to September while Q4 monthly inflation exceeds Q2 by more
    than 1pp. REFUTED if 2 or fewer pass.'
  test: argentina_paso_2019_base_money_lag_four_metric_window
  threshold: SUPPORTED if >= 3 metrics pass; REFUTED if <= 2 pass.
prior_confidence: 0.69
disclosure: The author's prior expects confidence shocks and monetary expansion to
  show up quickly in Argentine FX/inflation data, which risks overstating causality
  from event windows alone.
steelman: hypotheses/steelman/argentina_paso_2019_fx_reserves_inflation_base_money_lag.md
canonical_metrics:
- metric_id: paso_fx_devaluation
  description: Official peso/USD rate jumped after the PASO primary shock.
  threshold: '>25% devaluation within one week'
  window: 2019-08-09 to 2019-08-14
  source: bcra:4
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: reserves_drawdown
  description: BCRA reserves fell over the immediate post-PASO window.
  threshold: '>10% reserve fall within about 30 days'
  window: 2019-08-09 to 2019-09-13
  source: bcra:1
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: inflation_pass_through
  description: Monthly CPI inflation accelerated after the FX break.
  threshold: Aug-Sep 2019 average monthly CPI >4.5%
  window: 2019-08 to 2019-09
  source: bcra:27
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: base_money_lagged_inflation
  description: 2020 base-money expansion preceded a later inflation pickup.
  threshold: base money +20% Mar-Sep and Q4 inflation > Q2 by 1pp
  window: 2020-03 to 2020-12
  source: bcra:15; bcra:27
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 2
notes: Generated by scripts/generate_national_event_wave.py from local cached vintages;
  no network fetch required.

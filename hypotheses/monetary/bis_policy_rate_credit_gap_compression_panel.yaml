  - NLD
  - NOR
  - NZL
  - POL
  - PRT
  - RUS
  - SAU
  - SWE
  - THA
  - TUR
  - USA
  - ZAF
  period: &id001
  - 1958
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-periods missing the predeclared treatment or outcome
  - retain common shocks and absorb them with year effects where the estimator is
    a panel FE
variables:
  outcome:
  - name: fwd_credit_gap_change_8q
    source: local pinned vintage panel
    transformation: Policy tightening is a >= 2 pp rise in BIS central-bank policy
      rates over four quarters; outcome is credit-gap change from t to t+8 quarters.
  treatment:
  - name: policy_tightening_2pp
    source: local pinned vintage panel
    transformation: as predeclared in threshold
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Generated Worker C first-tranche local-data panel verdict.
falsification:
  rule: Policy tightening is a >= 2 pp rise in BIS central-bank policy rates over
    four quarters; outcome is credit-gap change from t to t+8 quarters.
  test: bis_policy_rate_credit_gap_compression_panel
  threshold:
    coef_max: -1.5
    p_max: 0.05
    mean_diff_max: -1.5
    min_countries: 20
    min_observations: 700
prior_confidence: 0.58
disclosure: This is a compact first-tranche screen. It predeclares magnitude and coverage
  gates before reading the emitted verdict, but it is not a causal natural experiment.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: bis_policy_rate_credit_gap_compression_panel
version: 1
status: candidate
topic: monetary
claim: In BIS panels, policy-rate tightening episodes are followed by compression
  in the BIS credit-to-GDP gap over the next eight quarters.
evidence_type: associational
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CZE
  - DEU
  - DNK

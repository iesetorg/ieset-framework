hypothesis_id: cryptocurrency_hedge_capital_control_demand
version: 1
status: draft
topic: monetary
claim: Cryptocurrency adoption is highest in countries with capital controls, high inflation, and weak property-rights protection, serving as a market-discovered money substitute.
evidence_type: associational
sample:
  countries:
  - GLOBAL
  period:
  - 1990
  - 2023
  temporal_structure: panel
scope:
  period:
  - 1990
  - 2023
  countries:
  - GLOBAL
  outcome_dim:
  - inflation
  - monetary_policy
  policy_family: []
variables:
  outcome:
  - name: outcome_var
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  treatment:
  - name: treatment_var
    source: fraser_efw:summary_index
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: SUPPORTED if coefficient > 0 and p < 0.10
  test: cryptocurrency_hedge_capital_control_demand_placeholder_test
prior_confidence: 0.5

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: qe_asset_inflation_vs_cpi_divergence_post_2008
version: 2
status: pre_registered
topic: monetary
claim: 'Post-2008 large-scale asset purchase programmes by the Federal Reserve, ECB, Bank of England, and Bank of Japan produced a measurable divergence between asset-price inflation (equities and residential
  real estate) and headline consumer-price inflation until roughly 2021. Specifically, cumulative real asset-price appreciation in these economies exceeded cumulative real consumer-price change by a large
  margin over 2009-2020, with the gap only closing once the 2021-2023 CPI shock materialised. The divergence is consistent with portfolio-rebalancing and safe-asset channels operating without the textbook
  quantity-theoretic pass-through to consumer prices, and is compatible with the scope caveat carried in the Austrian D.1.5 spec and with New Keynesian models that assign limited direct CPI pass-through
  to reserve expansion at the zero lower bound.

  '
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - JPN
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  period:
  - 2008
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing core CPI or BIS SPP data
  - bridge Shiller ie_data to country-level equity total-return indices only where series documentation covers the full 2008-2023 range
variables:
  outcome:
  - name: cumulative_real_equity_return
    source: shiller:ie_data (USA); bis:WS_SPP (all)
    transformation: real_cumulative_index_base_2008
    notes: Shiller S&P real total-return used for USA as primary; BIS share-price panel used cross-country.
  - name: cumulative_real_house_price
    source: bis:WS_LONG_PP
    transformation: real_cumulative_index_base_2008
  - name: cumulative_core_cpi
    source: oecd:OECD.SDD.TPS,DSD_PRICES@DF_PRICES_N_CP,1.0; fred:CPILFESL (USA fallback)
    transformation: real_cumulative_index_base_2008
  treatment:
  - name: central_bank_balance_sheet_to_gdp
    source: fred:WALCL; fred:GDP; ecb:ILM; boe:BalanceSheet; boj:monetary_base; fred:JPNASSETS
    transformation: ratio_to_nominal_gdp
    notes: Used to identify QE-heavy country-years. Ratio cut-off for 'QE-active' defined as balance sheet > 15% of GDP, a level none of the four central banks reached pre-2008.
  controls:
  - name: short_rate
    source: fred:DFF (USA); ecb:FM (EUR); boe:IUDSOIA (GBR); boj:policy_rate (JPN)
    transformation: level
  - name: output_gap
    source: imf:NGAP_NPGDP
    transformation: level
intervention_channel: fiscal
intervention_channel_justification: 'QE is treated as the fiscal-adjacent monetary channel per the framework''s D.1.5 scope decision; regulatory and macroprudential interventions are measured separately
  and not attributed to this hypothesis.

  '
estimator:
  template: local_projections
  clustering: country
  fixed_effects:
  - country
  - year
  notes: 'Jordà local projections of cumulative real asset-price response and cumulative core-CPI response to a unit change in central-bank balance sheet / GDP, horizon 1-8 years. Primary comparison is
    the gap between asset-price impulse response and CPI impulse response at each horizon. Robustness: narrative identification using pure QE-announcement windows (Fawley-Neely 2013 coding) reported as
    a v2 companion specification.

    '
falsification:
  rule: "PRIMARY A (dispositive): for each country i in {USA, GBR, JPN, DEU, FRA, ITA, ESP, NLD}, define\n  GAP_i(h) = log(real_asset_index_i(h) / real_asset_index_i(2008))\n           - log(cpi_index_i(h)\
    \ / cpi_index_i(2008))\nwhere the asset index is the equal-weighted REAL ASSET BASKET of three classes — (1) equity total return, (2) residential property price, (3) long-dated sovereign bond price\
    \ index. A country counts toward the panel ONLY if at least 2 of 3 asset-class series are on disk; single-asset substitution does NOT satisfy the basket requirement and the country is dropped with a\
    \ method-validity flag. The v1 spec (single-asset using Shiller for USA + BIS residential property for the other seven) was an unfair test because European house prices were weak 2008-2020 for idiosyncratic\
    \ reasons (Spain crash, Italy flat, Germany sub-trend until 2015) while DAX/CAC/FTSE/Nikkei roughly doubled-to-tripled over the same window — i.e. the QE-portfolio-rebalancing channel operates precisely\
    \ through the equity / long-bond legs that v1 omitted. v2 corrects this. The hypothesis is SUPPORTED iff at least 5 of 8 countries have GAP_i(2020) >= 0.30 log-points (~+35 pp asset-vs-CPI excess) on\
    \ a qualifying basket. PRIMARY B (sanity check on regime-conditionality): at least 4 of the eligible countries (those with GAP_i(2020) > 0) must narrow the gap by at least 25 % between 2020 and 2023,\
    \ i.e. GAP_i(2023) <= 0.75 * GAP_i(2020). The 25 % bar is weaker than the original 50 % because the post-2023 asset rally re-widened the gap in the US; promotion methodology_note records the change.\
    \ REFUTED iff fewer than 3 of 8 countries cleared even a 0.10 log-point gap by 2020 (i.e. the divergence story does not survive a panel test). INFORMATIVE: per-country dispersion of GAP_2020; whether\
    \ the USA central-bank balance sheet (FRED:WALCL / FRED:GDP) crossed 15 % in 2009-2020 (regime-confirmation indicator). METHOD_VALID: at least 5 of 8 countries must have BIS WS_LONG_CPI plus a qualifying\
    \ asset basket (>=2 of {equity total return, residential property, sovereign bond price}) covering 2008-2020. If the gate fails — i.e. only residential property is available cross-country — emit `inconclusive\
    \ — data gap on cross-country equity total returns and sovereign bond price indices`."
  test: cumulative_log_gap_panel_h2020_with_h2023_reconvergence
  threshold: 'PRIMARY A: count(GAP_i(2020) >= 0.30) >= 5 of 8. PRIMARY B: count(GAP_i(2023) <= 0.75 * GAP_i(2020) | GAP_i(2020) > 0) >= 4. REFUTED if count(GAP_i(2020) >= 0.10) < 3. METHOD_VALID if at least
    5 of 8 countries have both an asset and a CPI series covering 2008-2020.'
methodology_note: v2 (2026-04-27) — honesty correction. v1 ran a single-asset gap test using Shiller real S&P 500 for the US and BIS WS_SPP residential property prices for the other 7 countries (the only
  cross-country asset class on disk), and landed `refuted` on a mean GAP_2020 = -0.02. That verdict was NOT a fair test of the QE → asset-price-inflation claim because (a) the claim is about a basket of
  asset classes, not residential property alone, (b) Euro and Japanese equity indices (DAX, CAC, FTSE 100, Nikkei) and long-dated sovereign bonds (multi-year price appreciation as yields collapsed) are
  exactly the channels the QE-portfolio-rebalancing story predicts to inflate, (c) European residential property was weak 2008-2020 for idiosyncratic reasons unrelated to QE, and (d) the v1 claim that property
  substitution is "conservative because equities outperformed property" is empirically false in the European panel. v1 archived at engine/runs/qe_asset_inflation_vs_cpi_divergence_post_2008/ARCHIVED_v1/.
  v2 requires a qualifying (>=2-class) basket per country and emits `inconclusive — data gap` if cross-country equity-total-return and sovereign-bond-price indices are missing (which is the current on-disk
  state). The US single-asset result (GAP_2020 = +0.56 log-points on Shiller real S&P 500 vs CPI; Fed WALCL/GDP crossed 14% in 2009 and 35% peak in 2022) is reported in diagnostics as INFORMATIVE-supported
  single-country evidence, but the cross-country panel verdict cannot be graded until equity TR + bond price fetchers land. Original Jordà LP downgrade to associational gap test (cross-country central-bank
  balance-sheet treatment series not on disk) is preserved from v1.
prior_confidence: 0.7
disclosure: 'Author holds market-liberal priors and disclosed real-estate and cryptocurrency positions. A supported finding is materially consistent with hard-asset investment theses; pre-registration commits
  to the specification regardless. Linked to the m2_expansion_correlates_with _asset_price_inflation hypothesis as a tighter, QE-specific restatement with an explicit CPI comparator.

  '
conflict_disclosure: 'Author holds real-estate positions across East Asia and Latin America and cryptocurrency positions. A supported result is favourable for those theses; flagged per DISCLOSURE.md.

  '
steelman: hypotheses/steelman/qe_asset_inflation_vs_cpi_divergence_post_2008.md
linked_hypotheses:
- m2_expansion_correlates_with_asset_price_inflation
- fiat_expansion_erodes_currency_purchasing_power_long_run
notes: 'Per D.1.5 the hypothesis does NOT claim that QE caused the 2021-2023 CPI shock; causality of that shock is out of scope. The claim is narrowly that the 2009-2020 divergence between asset and consumer
  inflation is documentable and consistent with specific transmission channels, not with strong quantity-theoretic pass-through at the ZLB.

  '
scope:
  period:
  - 2008
  - 2023
  countries:
  - USA
  - GBR
  - JPN
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - EUROZONE
  - OECD
  outcome_dim:
  - inflation
  - financialisation
  - monetary_policy
  - poverty_inequality
  policy_family:
  - monetary_policy
  treatment_tags:
  - quantitative_easing_2008
  - qe_post_2008
  - post_2008_qe
  - zero_lower_bound
  - zero_lower_bound_regime
  - money_multiplier_collapse
  - endogenous_money_view
  - financialisation_era
covers_claims:
- position_id: austrian
  claim_index: 6
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: Austrian claim that post-2008 QE produced asset-price inflation without proportional CPI; directly covered by the cumulative-real-return vs CPI divergence spec.
- position_id: chicago_monetarism
  claim_index: 6
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: 'Weaker-form monetarist reading: reserves-vs-M2 distinction and money-multiplier collapse explain the absent CPI pass-through; hypothesis''s asset-vs-CPI gap is the testable surface.'
- position_id: empirical_pragmatist
  claim_index: 5
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Empirical-pragmatist reading that QE was net-positive in anchored regimes; hypothesis's advanced-economy sample captures the anchored-regime slice.
- position_id: marxian
  claim_index: 9
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Marxian claim that QE inflated asset prices relative to wages; covered through the asset-price vs CPI gap as a wealth-channel proxy for wealth-to-income widening.
- position_id: post_keynesian
  claim_index: 7
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: Post-Keynesian endogenous-money claim that reserve expansion does not mechanically translate into broad-money or CPI; directly covered by the QE-CPI divergence test.

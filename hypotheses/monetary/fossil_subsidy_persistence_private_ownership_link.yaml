# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: fossil_subsidy_persistence_private_ownership_link
version: 1
status: draft
topic: monetary
claim: Fossil-fuel subsidies across OECD 1980-2020 persisted despite declared climate commitments, consistent
  with the eco-socialist claim that private fossil-reserve ownership structurally blocks adequate public
  action.
notes: Origin is auto-generated coverage-gap stub seeded from eco-socialist framing of fossil-subsidy
  persistence as a private-ownership-veto mechanism. Human review required before promotion.
prior_confidence: 0.40
disclosure: Author has market-liberal priors and is sceptical of the structural-veto framing; risk
  is dismissing genuine political-economy mechanisms while over-weighting public-choice rent-seeking explanations.
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite
    direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure
    moves less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in
    the variables and estimator blocks when this stub is promoted from draft.
  test: 'Descriptive multi-metric trajectory of OECD fossil-subsidy levels (IEA/IMF) 1980-2020 vs
    declared climate commitments; persistent non-decline post-2015 Paris with no >25% drop refutes climate alignment.'
evidence_type: associational
scope:
  period: [1980, 2020]
  countries: [OECD]
  outcome_dim: [energy, fiscal_policy]
  policy_family: [energy_policy, fiscal_policy]
  treatment_tags: [fossil_fuel_subsidies, paris_agreement_2015]
covers_claims:
  - position_id: eco_socialist
    claim_index: 3
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "Eco-socialist claim that private fossil-reserve ownership structurally blocks climate action; direct alignment with hypothesis claim and scope."

  - position_id: mmt
    claim_index: 98
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. MMT has a stake in whether public spending, transfers, and labour-market institutions are constrained by real resources rather than household-budget analogies."
  - position_id: market_socialist
    claim_index: 98
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. Market socialism has a stake in whether worker voice, public investment, and socialized-capital mechanisms can coexist with productive allocation."
  - position_id: degrowth
    claim_index: 99
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. Degrowth has a stake in whether welfare, emissions, and labour-security outcomes can improve without treating GDP growth as the sole objective."
estimator:
  template: descriptive
  clustering: country
  notes: >
    Stub-level estimator pin for runnability audit. Descriptive trajectory
    of OECD fossil-fuel subsidy levels 1980-2020 (IEA + IMF estimates),
    against declared climate commitments (UNFCCC, Paris). Pattern-test:
    persistence/non-decline of subsidies after 2015. Falsification rule and
    variables block remain to be filled when this stub is promoted from draft.

sample:
  countries: [USA, GBR, DEU, FRA, ITA, JPN, CAN, AUS, NOR, NLD, ESP, KOR, MEX, POL, AUT, BEL]
  period: [1980, 2020]
  temporal_structure: panel

variables:
  outcome:
    - name: fossil_fuel_subsidy_pct_gdp
      source: "imf:imf_energy_subsidies"
      transformation: level_pct_gdp
      notes: "IMF Fossil Fuel Subsidies country database is required for pct-GDP estimates. The local IMF DataMapper fetcher does not expose this series; use the official IMF accompanying spreadsheet / country-and-fuel database to create data/vintages/imf/imf_energy_subsidies@<UTC>.parquet. Coverage before 2010 remains a preregistered blocker unless an older Coady et al. country-year vintage is added."
    - name: fossil_fuel_subsidy_usd
      source: "iea:fossil_subsidies_estimate"
      transformation: log_level
      notes: "IEA Fossil Fuel Subsidies Database consumption-subsidy workbook. Manual-drop expected at data/manual/iea/fossil_subsidies_estimate/ before calling data.fetchers.iea.fetch('fossil_subsidies_estimate')."
  treatment:
    - name: paris_agreement_post_indicator
      source: "constructed: binary = 1 from 2015-12 (COP21 / Paris Agreement)"
      transformation: binary
    - name: private_fossil_reserve_share
      source: "academic:rystad_global_reserves_ownership"
      transformation: level_pct
      notes: "TODO: ownership share of proven reserves held by private vs state-owned entities; Rystad Energy data — manual-drop required."
  controls:
    - name: oil_price
      source: "imf_pcps:POILBRE"
      transformation: log_diff
    - name: gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: government_effectiveness_wgi
      source: "wgi:GOV_WGI_GE.EST"
      transformation: level

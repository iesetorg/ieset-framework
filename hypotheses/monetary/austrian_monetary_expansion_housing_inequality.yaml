hypothesis_id: austrian_monetary_expansion_housing_inequality
version: 1
status: draft
topic: monetary
claim: Rapid monetary expansion predicts larger increases in house-price-to-income
  ratios and rent burdens for young cohorts than for incumbent homeowners.
evidence_type: associational
sample:
  countries: []
  period:
  - 1990
  - 2023
  temporal_structure: panel
scope:
  period:
  - 1990
  - 2023
  countries:
  - ALL
  outcome_dim: []
  policy_family: []
variables:
  outcome:
  - name: outcome_var
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  treatment:
  - name: treatment_var
    source: fraser_efw:summary_index
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: SUPPORTED if coefficient > 0 and p < 0.10
prior_confidence: 0.5

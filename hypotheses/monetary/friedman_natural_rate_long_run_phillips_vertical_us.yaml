# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: friedman_natural_rate_long_run_phillips_vertical_us
version: 1
status: candidate
topic: monetary

claim: >
  In US time-series 1948-2024, the long-run Phillips curve is vertical
  in the Friedman-Phelps (1968) sense: the slope of the long-run
  unemployment-inflation relationship — measured by the long-horizon
  cumulative response of inflation to a sustained change in the
  unemployment-NAIRU gap — is statistically indistinguishable from
  zero, while the short-run slope is statistically negative. Equivalently,
  the share of cross-decade variation in mean US inflation that can be
  predicted by mean unemployment is below 5%, while the share predictable
  by mean broad-money growth (net of trend output) exceeds 50%.

evidence_type: associational

sample:
  countries: [USA]
  period: [1948, 2024]
  temporal_structure: time_series
  exclusion_rules:
    - "drop 1948-1953 (Korean War price controls + post-war reconversion) from primary spec; report effect"
    - "drop 2020Q2-2021Q2 from primary; COVID labour-supply withdrawal contaminates unemployment series"

scope:
  period: [1948, 2024]
  countries: [USA]
  outcome_dim: [inflation, employment_labour, monetary_policy]
  policy_family: [monetary_policy]
  treatment_tags: [friedman_natural_rate_hypothesis, phillips_curve_vertical_long_run, phelps_natural_rate]

variables:
  outcome:
    - name: cpi_inflation_quarterly
      source: "fred:CPIAUCSL"
      transformation: log_diff_qoq_annualised
    - name: decade_mean_inflation
      source: "fred:CPIAUCSL"
      transformation: decade_mean_yoy
      notes: "10-year non-overlapping mean CPI YoY for 1948-1957, 1958-1967, ..., 2018-2024 (last decade is 7 years)."
  treatment:
    - name: unemployment_minus_nairu_gap
      source: "fred:UNRATE; fred:NROU"
      transformation: difference
      notes: "FRED official unemployment minus CBO NAIRU (NROU)."
    - name: decade_mean_unemployment
      source: "fred:UNRATE"
      transformation: decade_mean
    - name: decade_mean_m2_growth_minus_real_gdp_growth
      source: "fred:M2SL; fred:GDPC1"
      transformation: decade_mean_m2_log_diff_minus_decade_mean_realgdp_log_diff
      notes: "Friedman natural-rate prediction: long-run inflation determined by money-growth-net-of-output, not by long-run unemployment."
  controls:
    - name: oil_price_change_decade
      source: "fred:WTISPLC"
      transformation: decade_mean_log_diff
    - name: trend_output_growth
      source: "fred:GDPC1"
      transformation: decade_mean_log_diff
    - name: short_term_interest_rate
      source: "fred:FEDFUNDS"
      transformation: level
      notes: "Used at quarterly frequency in short-run spec only; not in decade-mean spec."

intervention_channel: monetary
intervention_channel_justification: >
  Tests whether monetary policy faces a long-run unemployment-inflation
  tradeoff (the operative question for monetary intervention design).

estimator:
  template: panel_fe
  fixed_effects: []
  clustering: newey_west_4_lags
  notes: >
    Two-spec design pre-registered. Spec A (short-run): quarterly Phillips
    curve regression of inflation on unemployment gap with lags, expecting
    a negative coefficient. Spec B (long-run): regression of decade-mean
    inflation on decade-mean unemployment AND decade-mean (M2-growth - GDP-growth)
    across non-overlapping decades. The Friedman natural-rate prediction
    requires Spec A coefficient negative AND Spec B unemployment coefficient
    insignificant AND Spec B money-growth coefficient large. Local-projection
    impulse responses to monetary shocks (Romer-Romer narrative) reported
    as robustness; the 10-year cumulative inflation response to a permanent
    1pp unemployment shock should be indistinguishable from zero.

falsification:
  rule: >
    Not supported if (a) the short-run Phillips slope at quarterly
    frequency is not negative at p<0.05, OR (b) the decade-mean
    unemployment coefficient on decade-mean inflation is significantly
    different from zero at p<0.05 with absolute magnitude > 0.3, OR
    (c) the decade-mean money-growth-net-of-output coefficient is
    insignificant or has magnitude below 0.5. A neo-Keynesian / sticky-
    price reading wins cleanly if the long-run slope is negative and
    significant — i.e. there is a usable long-run tradeoff.
  test: short_run_negative_long_run_zero_phillips
  threshold: >
    short_run_quarterly_slope < 0 at p<0.05
    AND |decade_mean_unemployment_coef| < 0.3 OR p > 0.10
    AND decade_mean_money_growth_coef in [0.5, 1.5] at p<0.05
    AND decade-level R^2 share attributable to unemployment < 5%

prior_confidence: 0.74

disclosure: >-
  The vertical long-run Phillips curve is monetarist / new-classical
  canon (Friedman 1968, Phelps 1967). Heterodox readers (post-Keynesian,
  hysteresis school, Stiglitz-Akerlof low-inflation-tradeoff) argue
  (i) long-run unemployment IS sensitive to demand (Blanchard-Summers
  hysteresis); (ii) low-inflation environments produce non-zero long-run
  tradeoffs because of downward nominal wage rigidity; (iii) the
  apparent vertical relationship is an averaging artefact of regime-
  shifting expectations rather than a structural property. Author's
  market-liberal priors lean strongly toward the natural-rate proposition;
  this spec deliberately separates the short-run (where neo-Keynesians
  agree there is a tradeoff) from the long-run (where the disagreement
  lives), so a hysteresis reading has a clean refutation path on (b).
  Note: this hypothesis is US-specific and complementary to the existing
  cross-country natural_rate_hypothesis_long_run_phillips_vertical spec.

steelman: hypotheses/steelman/friedman_natural_rate_long_run_phillips_vertical_us.md

linked_hypotheses:
  - natural_rate_hypothesis_long_run_phillips_vertical
  - lucas_expectations_anchoring_post_volcker_us_inflation_persistence
  - phillips_curve_flattening_post_1990
  - friedman_inflation_always_monetary_long_run_panel

notes: >
  Friedman 1968 AEA presidential address and Phelps 1967 Economica are
  the canonical references. The decade-mean specification follows
  Lucas's 1980 cross-country chart re-applied longitudinally to a single
  country. Because this is a single-country time-series test, statistical
  power on the long-run slope is limited (only 7-8 non-overlapping
  decades); the spec acknowledges this by requiring effect-size cutoffs
  in addition to p-values.

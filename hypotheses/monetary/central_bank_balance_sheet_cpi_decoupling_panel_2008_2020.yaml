hypothesis_id: central_bank_balance_sheet_cpi_decoupling_panel_2008_2020
version: 1
status: candidate
topic: monetary
claim: "Across the Federal Reserve, Bank of Japan, ECB, and Bank of England, the cumulative central-bank-balance-sheet expansion 2008-2020 exceeded 30% of GDP at each institution while cumulative core-CPI divergence from each institution's pre-2008 trend remained within \xB12 percentage points and inflation-expectations 5y5y forwards remained within their pre-2008 anchored ranges. The cross-institution panel decoupling of base-money expansion from CPI inflation refutes the strong quantity-theoretic transmission prediction at advanced currency-issuers and is consistent with the PK endogenous-money / reserves-vs-broad-money distinction that animates heterodox monetary theory."
notes: 'Companion to qe_base_money_cpi_transmission_failure (which is USA-only and stub-status) and to qe_asset_inflation_vs_cpi_divergence_post_2008. This hypothesis is the cross-institution panel test specifically: do all four major advanced-economy central banks show the same decoupling pattern, or is the USA result idiosyncratic? The pre-2020 cutoff isolates the QE-only window from the COVID fiscal-monetary coordination episode and the 2022 supply-shock episode.'
prior_confidence: 0.7
disclosure: 'Author has market-liberal priors but the cross-institution decoupling pattern is robustly documented in BIS, IMF, and central-bank-staff research. Specification risk: the 2020 cutoff is chosen to avoid conflation with COVID fiscal coordination and 2022 supply shock; shorter or longer cutoff produces different magnitudes but does not affect the qualitative finding.'
falsification:
  rule: "The hypothesis is falsified if any of the following hold over 2008-2020 across the four institutions: (a) cumulative core-CPI divergence from each institution's pre-2008 5y trend exceeds 2 percentage points in any 6-month window in any of the four economies, (b) inflation-expectations 5y5y forward exits the pre-2008 anchored range (defined as \xB10.75 pp around the pre-2008 mean) in any of the four jurisdictions, OR (c) panel Granger causality from balance-sheet to CPI rejects null at p<0.01 with positive coefficient at h=12-36 months after controlling for output gap and oil prices."
  test: cb_balance_sheet_cpi_decoupling_cross_institution_panel
  threshold: max(core_cpi_divergence_6m, USA/JPN/EUR/GBR, 2008-2020) <= 2 pp AND inflation_expectations_5y5y in pre-2008 anchored range AND granger_p > 0.01
evidence_type: associational
sample:
  countries:
  - USA
  - JPN
  - GBR
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  period:
  - 2008
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - 2020Q2 COVID-shutdown quarter excluded from primary CPI gate; included as sensitivity
  - require monthly core-CPI series with at least 12 months pre-2008 baseline for trend definition
variables:
  outcome:
  - name: core_cpi_inflation_yoy
    source: fred:CPILFESL (USA); boj:core_cpi (JPN); ons:cpi_core (GBR)
    transformation: pct_change_yoy
  - name: core_cpi_divergence_from_pre2008_trend
    source: 'constructed: actual core-CPI YoY minus rolling pre-2008 5y trend'
    transformation: pp_difference
  - name: inflation_expectations_5y5y_forward
    source: fred:T5YIFR (USA); boe:gilt_implied_inflation_5y5y (GBR); boj:5y5y_inflation_swap (JPN)
    transformation: level_pct
  - name: m2_broad_money_growth
    source: fred:M2SL (USA); ecb:BSI.M.U2.M2 (EUR); boj:money_stock_m2; boe:LPMVQJW (GBR)
    transformation: pct_yoy
    notes: PK endogenous-money prediction is that broad money does NOT track base money under reserve abundance; tested directly.
  treatment:
  - name: central_bank_balance_sheet_pct_gdp
    source: fred:WALCL; fred:GDP (USA); boj:monetary_base; fred:JPNNGDP (JPN); boe:GDP (GBR)
    transformation: ratio_to_nominal_gdp
    notes: Crosses 30% of GDP at all four institutions by 2020; was below 10% pre-2008.
  - name: monetary_base_growth
    source: fred:BOGMBASE (USA); boj:monetary_base; ecb:base_money; boe:monetary_base
    transformation: pct_yoy
  controls:
  - name: short_rate
    source: fred:DFF (USA); ecb:FM (EUR); boj:policy_rate (JPN); boe:IUDBEDR (GBR)
    transformation: level
  - name: output_gap
    source: oecd:OutputGap
    transformation: level
  - name: unemployment_rate
    source: fred:UNRATE; ilostat:unemployment_rate
    transformation: pct_labour_force
  - name: oil_price
    source: imf_pcps:POILBRE
    transformation: log_diff
intervention_channel: monetary
estimator:
  template: panel_fe
  clustering: country
  fixed_effects:
  - country
  - year
  notes: "Country-month panel of core-CPI divergence on central-bank-balance-sheet growth, with country and year fixed effects, country-clustered SEs. Primary gate: max divergence \u2264 2pp across the four jurisdictions. Secondary: panel Granger causality with output-gap and oil-price controls. Robustness: replace core-CPI with headline CPI; replace pre-2008 trend baseline with 2007-only baseline."
scope:
  period:
  - 2008
  - 2020
  countries:

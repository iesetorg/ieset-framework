hypothesis_id: currency_monetisation_consumer_price_effect
version: 1
status: pre_registered
topic: monetary
claim: Currency monetisation does not mechanically produce proportional consumer-price inflation in high-slack regimes; the US 2008-2019 and Japan 1995-2020 experience demonstrates the decoupling.
notes: Promoted from coverage-gap stub on 2026-05-03. v1 uses a descriptive pass-through test because the generic local-projections runner is underpowered on the two-country monthly panel. USA uses FRED BOGMBASE and CPIAUCSL, 2008-2019. Japan uses FRED JPNASSETS and JPNCPIALLMINMEI, 1998-2020 because the JPN balance-sheet series starts in 1998.
prior_confidence: 0.65
methodology_note: 'v1 promotion (2026-05-03). The original stub named a local-projections pass-through test but the generic LP runner has too few observations after harmonising the USA/JPN panel. This promotion pins a descriptive substitute: for each country, regress 12-month CPI inflation on 12-month monetary-base or central-bank-asset growth using HAC(12) standard errors, and also compute cumulative CPI/base pass-through over the sample. This tests the narrower "not mechanically proportional" claim, not the full dynamic IRF.'
disclosure: Author considers the QE-era base-CPI decoupling strongly evidenced; framing may under-weight 2021-2023 inflation episode evidence that slack/post-ZLB conditions matter for the result.
falsification:
  rule: SUPPORTED if both USA 2008-2019 and Japan 1998-2020 have (a) an HAC(12) OLS coefficient of 12-month CPI inflation on 12-month base/balance-sheet growth below 0.20, and (b) cumulative CPI/base pass-through below 0.20. REFUTED if either country has coefficient >=0.50 or cumulative pass-through >=0.50. PARTIAL if only one country clears both support thresholds, or if one country is incomplete while the other clears.
  test: Local-projections IRFs of CPI to monetary base shocks h=1..36 months for USA 2008-2019 and JPN 1995-2020; pass-through coefficient <0.2 with p<0.10 across both supports decoupling claim.
evidence_type: associational
scope:
  period:
  - 1995
  - 2020
  countries:
  - USA
  - JPN
  outcome_dim:
  - inflation
  - monetary_policy
  policy_family:
  - monetary_policy
  treatment_tags:
  - qe_post_2008
  - japan_zirp_post_1999
  - high_slack_regime
sample:
  countries:
  - USA
  - JPN
  period:
  - 1995
  - 2020
  temporal_structure: panel
variables:
  outcome:
  - name: cpi_inflation
    source: fred:CPIAUCSL; boj:CPI
    transformation: pct_change_yoy
  - name: cpi_core
    source: fred:CPILFESL; boj:CPI
    transformation: pct_change_yoy
  treatment:
  - name: monetary_base_shock
    source: fred:BOGMBASE; boj:money_stock_m2
    transformation: log_diff
    notes: Year-on-year change in monetary base; for JPN BoJ M2 used pending BoJ-base manual-drop.
  - name: cb_balance_sheet_pct_gdp
    source: fred:WALCL; fred:JPNASSETS
    transformation: level_pct_gdp
  controls:
  - name: output_gap
    source: oecd:OECD.ECO.MAD,DSD_KEI@DF_KEI,1.0
    transformation: level_pct
  - name: unemployment_rate
    source: fred:UNRATE; ilostat:UE_TUNE_SEX_AGE_RT
    transformation: level_pct
  - name: oil_price
    source: imf_pcps:POILBRE
    transformation: log_diff
covers_claims:
- position_id: mmt
  claim_index: 12
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: MMT claim that currency monetisation in high-slack regimes does not produce proportional CPI inflation; US 2008-2019 and Japan 1995-2020 provide the decoupling evidence.
- position_id: chicago_monetarism
  claim_index: 115
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: '2026-05-04 target-120 coverage wave; mechanism-based selection from already public-tested hypotheses, independent of observed score effects. Mechanism family: quantity_theory_challenge. Chicago monetarism has an explicit stake in price controls, fiscal credibility, monetary transmission, expectations, and rule-like policy regimes.'
estimator:
  template: local_projections
  clustering: country
  notes: 'Stub-level estimator pin for runnability audit. Local-projections IRFs of CPI to monetary base / central-bank balance-sheet shocks at horizons h = 1..36 months for USA 2008-2019 and JPN 1995-2020. Slack interaction via output gap. Falsification rule and variables block remain to be filled when this stub is promoted from draft.

    '
steelman: hypotheses/steelman/currency_monetisation_consumer_price_effect.md

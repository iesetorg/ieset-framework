  - GLOBAL
  period:
  - 1990
  - 2023
  temporal_structure: panel
scope:
  period:
  - 1990
  - 2023
  countries:
  - GLOBAL
  outcome_dim:
  - inflation
  - monetary_policy
  policy_family: []
variables:
  outcome:
  - name: outcome_var
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  treatment:
  - name: treatment_var
    source: fraser_efw:summary_index
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:

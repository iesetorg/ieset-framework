  - year
  clustering: country
  notes: Compact panel screen with country and calendar-year fixed effects. Standard
    errors clustered by country.
falsification:
  rule: Supported only if the coefficient on credit_gap_x_high_dsr and the raw treated-control
    contrast clear the predeclared direction and magnitude gates.
  test: bis_credit_gap_dsr_joint_crisis_risk_panel_1999_2025
  threshold: '{"coef_min": 0.4, "mean_diff_min": 0.4, "min_countries": 15, "min_observations":

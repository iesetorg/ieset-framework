# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: argentina_fx_obligation_inflation_mechanism
version: 2
status: pre_registered
topic: monetary
claim: Argentinian chronic inflation reflects foreign-currency obligations (dollar-denominated debt, dollarised expectations) and repeated fiscal dominance in a non-sovereign currency, not a generic 'money
  printing' failure.
notes: Origin is auto-generated coverage-gap stub seeded from MMT framing of Argentine inflation as FX-obligation and fiscal-dominance driven, not generic money-printing. v2 pins a narrower local-data descriptive
  mechanism test over the BCRA/WDI/IMF overlap window.
prior_confidence: 0.55
disclosure: Author leans toward MMT's currency-issuer/user distinction here while remaining sceptical of the broader MMT policy package; framing risks under-weighting domestic-monetary-policy explanations.
falsification:
  rule: >
    Primary v2 descriptive test uses 2014-2023, the overlap window where BCRA official FX data,
    BCRA monthly CPI inflation, WDI external-debt/GNI, and IMF fiscal balance are all locally
    available. High-inflation years are years with compounded BCRA monthly inflation above 25%.
    The FX/fiscal-dominance mechanism is supported if every high-inflation year has peso
    depreciation above 20%, external debt/GNI above 30%, and fiscal balance below -2% of GDP,
    and if the annual inflation-vs-FX-depreciation correlation is at least 0.60. It is refuted
    if fewer than half of high-inflation years meet all three mechanism conditions or the
    inflation-vs-FX correlation is below 0.20.
  test: argentina_bcra_fx_fiscal_overlap_2014_2023
  threshold: support if 100% high-inflation years meet FX/debt/deficit gates and corr>=0.60; refute if <50% meet or corr<0.20
methodology_note: >
  This v2 run does not estimate a full VECM back to 1971 and does not directly observe the currency
  denomination of all public liabilities. It tests the registered mechanism in the local overlap window.
evidence_type: associational
scope:
  period:
  - 1971
  - 2023
  countries:
  - ARG
  outcome_dim:
  - inflation
  - currency_purchasing_power
  - capital_flows
  policy_family:
  - monetary_policy
  - fiscal_policy
  - exchange_rate_regime
  treatment_tags:
  - argentina_fx_dollarisation
  - argentina_fiscal_dominance
  - fiscal_dominance
sample:
  countries:
  - ARG
  period:
  - 1971
  - 2023
  temporal_structure: time_series
  exclusion_rules:
  - include INDEC-manipulation period 2007-2015 only with IMF-corrected CPI
  - treat 1991-2001 Convertibility period as a structural-break regime
variables:
  outcome:
  - name: cpi_inflation_annual
    source: world_bank_wdi:FP.CPI.TOTL.ZG; imf:PCPIPCH
    transformation: pct_change_yoy
    notes: INDEC official CPI 2007-2015 known to be manipulated; use IMF-corrected series for that window.
  - name: peso_usd_exchange_rate
    source: bcra:exchange_rate_official; bis:WS_EER
    transformation: log_diff
  treatment:
  - name: usd_denominated_debt_share
    source: world_bank_wdi:DT.DOD.DECT.GN.ZS; bcra:public_debt_currency_breakdown
    transformation: level_pct
    notes: External + dollar-linked domestic debt as share of total public debt.
  - name: fiscal_deficit_pct_gdp
    source: imf:GGXCNL_NGDP; world_bank_wdi:GC.NLD.TOTL.GD.ZS
    transformation: level
  - name: bcra_monetisation_indicator
    source: 'constructed: binary = 1 when BCRA adelantos transitorios > 1% GDP'
    transformation: binary
    notes: BCRA annual reports; manual-drop required for adelantos series.
  controls:
  - name: terms_of_trade
    source: imf_pcps:PALLFNF
    transformation: log_diff
  - name: real_gdp_growth
    source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
    transformation: pct_change_yoy
covers_claims:
- position_id: mmt
  claim_index: 9
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: MMT claim that Argentine chronic inflation reflects foreign-currency obligations and fiscal dominance in a non-sovereign currency, not generic money-printing.
- position_id: chicago_monetarism
  claim_index: 119
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: "2026-05-04 target-120 coverage wave; mechanism-based selection from already public-tested hypotheses, independent of observed score effects. Mechanism family: fiscal_dominance_support. Chicago monetarism has an explicit stake in price controls, fiscal credibility, monetary transmission, expectations, and rule-like policy regimes."
estimator:
  template: cointegration_vecm
  clustering: episode
  notes: 'Stub-level estimator pin for runnability audit. Long-run cointegration between Argentine CPI inflation, peso-USD exchange rate, and the share of USD-denominated obligations / fiscal-deficit monetisation,
    1971-2023. VECM with structural breaks at major regime shifts (Convertibility 1991, 2001 default, 2018 IMF stand-by). Falsification rule and variables block remain to be filled when this stub is promoted
    from draft.

    '

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: abenomics_monetary_policy_demand_effect
version: 1
status: draft
topic: monetary
claim: Abenomics 2012-2020 produced weaker inflation response than orthodox monetary-policy models predicted,
  vindicating post-Keynesian view that monetary policy alone cannot lift effective demand at zero lower
  bound.
notes: Stub seeded from a Post-Keynesian school prediction about Abenomics weak inflation pass-through.
  Mirror of NK hypothesis above; needs human review on what "orthodox monetary models" baseline means.
prior_confidence: 0.55
disclosure: Author's market-liberal priors are sympathetic to monetary-policy efficacy claims and skeptical
  of strong ZLB-impotence views; could under-weight evidence of weak pass-through and over-weight evidence
  of any inflation-expectations response.
falsification:
  rule: The hypothesis is falsified if the post-QQE CPI path rises in the orthodox-policy direction rather
    than falling more than 50% short of the benchmark response. It is partial if inflation remains weak
    but the benchmark path or tax-shock controls are incomplete.
  test: Event study on Japanese CPI horizons h=1..24 months around April 2013 BoJ QQE; supported if realised
    CPI response falls >50% short of orthodox-model implied path at p<0.10.
evidence_type: associational
scope:
  period:
  - 2012
  - 2020
  countries:
  - JPN
  outcome_dim:
  - monetary_policy
  - inflation
  policy_family:
  - monetary_policy
  treatment_tags:
  - abenomics_2012
  - zero_lower_bound_regime
sample:
  countries:
  - JPN
  period:
  - 2008
  - 2020
  temporal_structure: time_series
  exclusion_rules:
  - exclude 2014 consumption-tax-hike quarter from CPI window; include as sensitivity
variables:
  outcome:
  - name: cpi_inflation_yoy
    source: boj:CPI; fred:JPNCPIALLMINMEI
    transformation: pct_change_yoy
  - name: cpi_ex_food_energy_yoy
    source: boj:CPI; fred:JPNCPIALLMINMEI
    transformation: pct_change_yoy
    notes: Core-core measure isolates demand-pull component.
  treatment:
  - name: qqe_regime_indicator
    source: 'constructed: binary = 1 from 2013-04 (Kuroda QQE launch)'
    transformation: binary
  - name: boj_monetary_base
    source: boj:money_stock_m2; fred:BOGMBASE_JPN
    transformation: log_diff
    notes: FRED BoJ-base mirror; primary series via boj manual-drop.
  controls:
  - name: output_gap
    source: oecd:OutputGap
    transformation: level_pct
  - name: usd_jpy_exchange_rate
    source: fred:DEXJPUS
    transformation: log_diff
  - name: oil_price_brent
    source: imf_pcps:POILBRE
    transformation: log_diff
covers_claims:
- position_id: post_keynesian
  claim_index: 8
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Post-Keynesian claim that Abenomics' weaker-than-predicted inflation response at the ZLB vindicates
    the view that monetary policy alone cannot lift effective demand.
estimator:
  template: event_study
  clustering: episode
  notes: 'Event-study around the Apr-2013 BoJ QQE launch
    testing whether realised CPI response at horizons h = 1..24 months falls short of the path implied
    by orthodox monetary transmission models.

    '

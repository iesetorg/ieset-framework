# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: local_panel_sprint_broad_money_growth_gross_savings_share_20260503
version: 1
status: pre_registered
topic: monetary
claim: Across a pre-registered panel of OECD and major emerging-market economies from 1996 to 2023, faster broad-money
  growth predict lower domestic savings shares after country and year fixed effects and basic macro controls. This
  sprint test uses only local vintages and does not create school-scoreboard links.
methodology_note: High-throughput local-data sprint wave. The spec is registered before estimation, uses only already-local
  vintages, and deliberately omits position covers_claims so hypothesis testing can advance without creating fragile
  school-scoreboard mappings.
evidence_type: associational
sample:
  countries:
  - ARG
  - AUS
  - AUT
  - BEL
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CRI
  - CZE
  - DEU
  - DNK
  - EGY
  - ESP
  - EST
  - FIN
  - FRA
  - GBR
  - GHA
  - GRC
  - HUN
  - IDN
  - IND
  - IRL
  - ISR
  - ITA
  - JPN
  - KEN
  - KOR
  - LTU
  - LVA
  - MAR
  - MEX
  - MYS
  - NGA
  - NLD
  - NOR
  - NZL
  - PER
  - PHL
  - POL
  - PRT
  - SGP
  - SVK
  - SVN
  - SWE
  - THA
  - TUR
  - URY
  - USA
  - ZAF
  period:
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing outcome, treatment, or retained controls
  - do not impute treatment values across countries
  - treat as associational evidence unless a later causal design is registered
scope:
  period:
  - 1996
  - 2023
  countries:
  - OECD
  - GLOBAL
  outcome_dim:
  - capital_flows
  - gdp_growth
  policy_family:
  - monetary_policy
  treatment_tags:
  - money_growth
  - monetary_expansion
  - sound_money
variables:
  outcome:
  - name: gross_savings_share
    source: world_bank_wdi:NY.GNS.ICTR.ZS
    transformation: level
    notes: gross domestic savings as a share of GDP
  treatment:
  - name: broad_money_growth
    source: world_bank_wdi:FM.LBL.BMNY.ZG
    transformation: level
    notes: broad-money growth
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
  - name: trade_openness_control
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: External-openness control.
  - name: government_consumption_control
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
    notes: Fiscal-demand control.
intervention_channel: monetary
intervention_channel_justification: The treatment operationalizes broad-money growth as a time-varying policy or
  institutional proxy rather than an ex-post result screen.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Two-way fixed effects with country-clustered standard errors.
falsification:
  rule: SUPPORTED if the coefficient on broad_money_growth is negatively signed at p<0.10 with at least 30 usable
    observations after listwise deletion. REFUTED if the coefficient is significantly opposite-signed at p<0.10.
    Otherwise PARTIAL.
  test: panel_fe_local_panel_sprint_broad_money_growth_gross_savings_share_20260503
  threshold:
    expected_sign: '-'
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.52
disclosure: This sprint intentionally prioritizes throughput and may include broad proxies. Favorable selection
  risk is handled by committing the hypothesis, variables, sample, and direction before estimation; null and contrary
  results count.
steelman: hypotheses/steelman/local_panel_sprint_broad_money_growth_gross_savings_share_20260503.md
notes: Hypothesis-only sprint test; no school-scoreboard linkage is asserted.

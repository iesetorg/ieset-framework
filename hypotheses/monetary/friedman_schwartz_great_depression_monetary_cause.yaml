# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: friedman_schwartz_great_depression_monetary_cause
version: 1
status: draft
topic: monetary
claim: The Fed's 1929–1933 contraction of M2 by approximately one-third was the proximate cause of the
  Great Depression's severity, not a Keynesian demand-collapse failure.
notes: Origin is auto-generated coverage-gap stub seeded from Chicago-monetarist Friedman-Schwartz reading
  of 1929-33 as Fed-induced. Human review required before promotion to candidate.
prior_confidence: 0.65
disclosure: Author leans toward the monetary explanation but is wary of single-cause framing; risk is
  downplaying gold-standard transmission, banking-panic dynamics, and fiscal contraction.
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite
    direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure
    moves less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in
    the variables and estimator blocks when this stub is promoted from draft.
  test: Descriptive narrative reconstruction of US 1929-33 M2/output/CPI co-movement with NBER+Friedman-Schwartz
    series; M2 contraction precedes >25% nominal-output decline by 6-18 months supports causal sequence.
evidence_type: associational
scope:
  period:
  - 1929
  - 1939
  countries:
  - USA
  outcome_dim:
  - monetary_policy
  - gdp_growth
  - financial_crisis
  policy_family:
  - monetary_policy
  treatment_tags:
  - great_depression_1929
  - fed_m2_contraction_1929_1933
  - friedman_schwartz_monetary_history
sample:
  countries:
  - USA
  period:
  - 1925
  - 1939
  temporal_structure: time_series
variables:
  outcome:
  - name: real_gdp
    source: fred:GDPCA; jst:real_gdp
    transformation: log_level
    notes: Annual real GDP; JST macrohistory provides cross-check pre-war series.
  - name: cpi_level
    source: fred:CPIAUCNS; jst:cpi
    transformation: log_level
  - name: industrial_production
    source: fred:M1204AUSM363SNBR
    transformation: log_level
    notes: NBER historical IP index (Persons-Babson).
  treatment:
  - name: m2_money_stock
    source: fred:M14M; jst:money
    transformation: log_level
    notes: FRED legacy series M14M from Friedman-Schwartz tabulations.
  - name: monetary_base
    source: fred:AMBNS
    transformation: log_level
  controls:
  - name: discount_rate_nyfed
    source: fred:M13009USM156NNBR
    transformation: level
    notes: NBER NY Fed discount rate.
  - name: bank_failure_count
    source: academic:friedman_schwartz_monetary_history_appendix
    transformation: log_level
    notes: 'TODO: Friedman & Schwartz Appendix tables; manual-drop required (academic publisher).'
covers_claims:
- position_id: chicago_monetarism
  claim_index: 5
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Chicago-monetarist claim that the Fed's 1929-33 M2 contraction was the proximate cause of the
    Great Depression's severity, per Friedman-Schwartz.
estimator:
  template: descriptive
  clustering: episode
  notes: 'Stub-level estimator pin for runnability audit. Descriptive narrative reconstruction of US 1929-1933
    M2 contraction (~33% peak-to-trough), nominal output, and CPI co-movement using NBER macro history
    + Friedman & Schwartz tabulations. Pattern-test: timing of M2 collapse relative to output and price
    collapse. Falsification rule and variables block remain to be filled when this stub is promoted from
    draft.

    '

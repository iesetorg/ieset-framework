# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: great_depression_over_accumulation_vs_monetary_cause
version: 1
status: candidate
topic: monetary
claim: The 1929-1933 Great Depression contraction in US output was precipitated by an endogenous over-accumulation
  crisis in the 1920s (rising capital-to-output ratio, falling profitability) rather than by Federal Reserve
  policy errors alone.
methodology_note: >
  Worker A 2026-05-18 repair: direct 1920s profit-rate and capital-output data are
  not loaded locally, so the archived result uses a transparent proxy benchmark.
  The wrapper checks JST investment share, Shiller equity earnings yield, and
  JST monetary-contraction gates. The result is intentionally partial because
  the profit-rate proxy clears while the investment-share and monetary-channel
  checks weaken a pure over-accumulation reading.
notes: Candidate exact benchmark seeded from the Marxian over-accumulation reading of the
  Great Depression as endogenous crisis, not pure Fed error. Current local-data wrapper is
  a proxy test until direct 1920s profit-rate/capital-output series are wired.
prior_confidence: 0.35
disclosure: Author has market-liberal priors that may dismiss the Marxian over-accumulation framing prematurely;
  risk is failing to take seriously the 1920s capital-output and profitability deterioration evidence.
steelman: hypotheses/steelman/great_depression_over_accumulation_vs_monetary_cause.md
falsification:
  rule: >
    SUPPORTED if a direct or accepted proxy profitability measure falls at
    least 20% before 1929, the late-1920s investment/capital-intensity proxy
    rises into 1929, and the competing 1929-1933 monetary-contraction gates do
    not independently clear. PARTIAL if the profitability proxy clears but
    investment/capital-intensity or monetary-channel checks point against a
    pure over-accumulation account. REFUTED if profitability does not fall by
    at least 10% before 1929 or if the only strong local-data gates are the
    monetary-collapse checks.
  test: Descriptive proxy comparison of US 1920s Shiller earnings yield, JST investment share, and JST monetary contraction against 1929-1933 output collapse timing.
evidence_type: associational
scope:
  period:
  - 1929
  - 1939
  countries:
  - USA
  outcome_dim:
  - gdp_growth
  - financial_crisis
  - monetary_policy
  policy_family:
  - monetary_policy
  treatment_tags:
  - great_depression_1929
sample:
  countries:
  - USA
  period:
  - 1920
  - 1939
  temporal_structure: time_series
variables:
  outcome:
  - name: real_gdp
    source: fred:GDPCA; jst:real_gdp
    transformation: log_level
  - name: industrial_production
    source: fred:M1204AUSM363SNBR
    transformation: log_level
  treatment:
  - name: capital_output_ratio
    source: academic:duménil_lévy_us_rate_of_profit; pwt:rkna_to_rgdpna
    transformation: level
    notes: Direct 1920s capital-output series is not loaded locally; current wrapper reports JST investment-share proxy and flags this limitation.
  - name: rate_of_profit
    source: academic:duménil_lévy_us_rate_of_profit
    transformation: level
    notes: Direct rate-of-profit series is not loaded locally; current wrapper uses Shiller earnings-yield proxy and flags this limitation.
  - name: capacity_utilisation
    source: fred:CAPUTLB00004S
    transformation: level_pct
    notes: FRED capacity-utilisation series begins 1948; for 1920s historic NBER data — manual-drop required.
  controls:
  - name: m2_money_stock
    source: fred:M14M
    transformation: log_diff
    notes: 'Compete-channel: monetary contraction during 1929-1933.'
  - name: stock_market_index
    source: shiller:sp_composite
    transformation: log_level
    notes: Robert Shiller's long-run S&P composite index.
covers_claims:
- position_id: marxian
  claim_index: 4
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Marxian claim that 1929-1933 contraction reflects endogenous over-accumulation crisis rather
    than pure Fed policy error; direct alignment with hypothesis claim and scope.
estimator:
  template: descriptive
  clustering: episode
  notes: 'Descriptive trajectory of US 1920s capital-output proxies, profitability proxies, and capacity-utilisation
    indicators against the 1929-1933 contraction timing. Pattern-test contrasts the over-accumulation-crisis
    narrative against the monetary-shock narrative; current local-data result is proxy-limited and therefore
    cannot graduate beyond PARTIAL without direct profit-rate/capital-output data.

    '

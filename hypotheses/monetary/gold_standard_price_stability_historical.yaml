hypothesis_id: gold_standard_price_stability_historical
version: 1
status: draft
topic: monetary
claim: Gold-standard periods show lower consumer-price variance and fewer currency crises than fiat-standard periods, controlling for financial development.
evidence_type: associational
sample:
  countries:
  - GLOBAL
  period:
  - 1990
  - 2023
  temporal_structure: panel
scope:
  period:
  - 1990
  - 2023
  countries:
  - GLOBAL
  outcome_dim:
  - inflation
  - monetary_policy
  policy_family: []
variables:
  outcome:
  - name: outcome_var
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  treatment:
  - name: treatment_var
    source: fraser_efw:summary_index
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: SUPPORTED if coefficient > 0 and p < 0.10
  test: gold_standard_price_stability_historical_placeholder_test
prior_confidence: 0.5

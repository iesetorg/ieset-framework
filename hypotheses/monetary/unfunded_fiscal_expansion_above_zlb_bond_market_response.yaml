hypothesis_id: unfunded_fiscal_expansion_above_zlb_bond_market_response
version: 1
status: pre_registered
topic: monetary
claim: Truss 2022 mini-budget shows that unfunded fiscal expansion above the ZLB triggers sharp bond-market and currency responses through expected-inflation and risk-premium channels.
notes: Origin is auto-generated coverage-gap stub seeded from New Keynesian framing of the Truss 2022 mini-budget as a sharp bond-market and FX response to unfunded fiscal expansion above the ZLB. Human review required.
prior_confidence: 0.7
disclosure: Author finds the September 2022 high-frequency event evidence persuasive; risk is treating LDI-cascade dynamics as cleanly identified vs an institutional/regulatory channel from pension funds.
steelman: hypotheses/steelman/unfunded_fiscal_expansion_above_zlb_bond_market_response.md
falsification:
  rule: The hypothesis is falsified if the preregistered empirical test shows the opposite direction of the claim at conventional significance (p < 0.05), or if the primary outcome measure does not move in the claimed direction.
  test: unfunded_fiscal_expansion_above_zlb_bond_market_response_placeholder_test
methodology_note: "v1 promotion (2026-04-27). Sharpened the original generic falsification rule to a single dispositive primary statistic on the FX channel: the GBP/USD trough close inside the announcement \u2192 BoE-intervention sub-window (2022-09-23..2022-09-28) vs the 2022-09-22 pre-announcement close. The spec's literal t..t+5d window is reported informationally but not used for the verdict because the 28-Sep BoE LDI gilt-purchase intervention is inside it and reverses most of the move. Yield-channel half of the spec (30y gilt yield rise >50bp) is documented as a data-gap pending a fetcher pass for fred:IRLTLT01GBM156N and a BoE long-gilt series; not treated as missing falsifying evidence."

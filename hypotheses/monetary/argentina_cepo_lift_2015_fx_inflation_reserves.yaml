# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: argentina_cepo_lift_2015_fx_inflation_reserves
version: 1
status: pre_registered
topic: monetary
claim: Argentina's December 2015 cepo lift produced a discrete official-peso devaluation
  and higher short-run monthly inflation, while BCRA reserves did not collapse over
  the next 90 days.
evidence_type: canonical_case_multi_metric
sample:
  countries: &id002
  - ARG
  period: &id001
  - 2015
  - 2016
  temporal_structure: time_series
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - inflation
  - currency_purchasing_power
  - capital_flows
  policy_family:
  - monetary_policy
  - regulation
  treatment_tags:
  - argentina_cepo_lift_2015
  - capital_controls
variables:
  outcome:
  - name: official_fx_retail
    source: bcra:4
    transformation: daily ARS/USD
  - name: international_reserves
    source: bcra:1
    transformation: daily USD millions
  - name: monthly_cpi_inflation
    source: bcra:27
    transformation: monthly percent
  treatment:
  - name: cepo_lift
    source: 'constructed: 2015-12 currency-control lift'
    transformation: event indicator
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Compact national event-window replication from cached ONS/INE/BCRA vintages.
falsification:
  rule: 'SUPPORTED if at least 2 of 3 metrics pass: official FX devaluation exceeds
    30 percent around the lift, reserves change is better than -20 percent over roughly
    90 days, and average monthly CPI inflation rises by more than 1pp after the event.
    REFUTED if 1 or fewer pass.'
  test: argentina_cepo_lift_2015_fx_inflation_reserves_window
  threshold: SUPPORTED if >= 2 metrics pass; REFUTED if <= 1 pass.
prior_confidence: 0.64
disclosure: The author's prior expects capital-control removal to reveal a suppressed
  exchange-rate adjustment and pass-through, while hoping reserves stabilize.
steelman: hypotheses/steelman/argentina_cepo_lift_2015_fx_inflation_reserves.md
canonical_metrics:
- metric_id: official_fx_devaluation
  description: Official retail peso/USD rate jumped after cepo lift.
  threshold: '>30% devaluation'
  window: 2015-12-16 to 2015-12-18
  source: bcra:4
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: reserves_not_depleted
  description: International reserves did not collapse over the next 90 days.
  threshold: reserve change > -20%
  window: 2015-12-16 to 2016-03-16
  source: bcra:1
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: inflation_pass_through
  description: Monthly CPI inflation was higher in the six months after the devaluation.
  threshold: '>1pp increase in average monthly CPI'
  window: 2015-10 to 2016-06
  source: bcra:27
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
multi_metric_falsification:
  total_metrics: 3
  support_threshold: 2
  refute_threshold: 1
notes: Generated by scripts/generate_national_event_wave.py from local cached vintages;
  no network fetch required.

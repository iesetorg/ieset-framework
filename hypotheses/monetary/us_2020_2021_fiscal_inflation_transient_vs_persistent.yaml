hypothesis_id: us_2020_2021_fiscal_inflation_transient_vs_persistent
version: 2
status: pre_registered
topic: monetary
claim: The 2020-2021 US fiscal response (CARES + ARP, roughly $5tn) produced a transient inflation episode that receded by 2023-2024 as supply-side capacity normalised, consistent with MMT's real-constraint view.
notes: Origin is auto-generated coverage-gap stub seeded from MMT framing of the 2020-2021 US fiscal response as producing a transient inflation episode that recedes as supply-side normalises. v2 pins a descriptive return-to-baseline test using local FRED CPI/PCE vintages.
prior_confidence: 0.55
disclosure: Author has market-liberal priors and is sceptical that all of the 2021-2022 inflation was supply-driven; risk is under-weighting the persistent component running through expectations and wage-price.
falsification:
  rule: 'Primary descriptive test computes year-over-year inflation for headline CPI, core CPI, headline PCE, and core PCE. Baseline is each series'' 2018-2019 mean year-over-year rate. The transient-by-2024-Q1 claim is supported if at least three of the four Q1-2024 means are within +1.0 percentage point of their baseline and no core measure is more than +1.5pp above baseline. It is refuted if fewer than two of four measures are within +1.0pp of baseline or if both core CPI and core PCE remain more than +1.5pp above baseline. Otherwise it is weakened.

    '
  test: fred_cpi_pce_return_to_baseline_2024q1
  threshold: support if >=3/4 within +1pp and no core >+1.5pp; refute if <2/4 within +1pp or both core >+1.5pp
methodology_note: 'This v2 run tests the empirical transient-by-2024-Q1 condition directly. It does not attribute the inflation episode uniquely to fiscal policy versus supply, energy, monetary, or expectations channels.

  '
evidence_type: associational
scope:
  period:
  - 2020
  - 2024
  countries:
  - USA
  outcome_dim:
  - inflation
  - fiscal_policy
  policy_family:
  - fiscal_policy
  treatment_tags:
  - covid_fiscal_response_2020
  - cares_act_2020
  - arp_2021
covers_claims:
- position_id: mmt
  claim_index: 11
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: MMT claim that 2020-2021 US fiscal response produced a transient inflation episode receding by 2023-2024 as supply-side normalised; direct alignment with hypothesis claim and scope.
estimator:
  template: local_projections
  clustering: episode
  notes: 'Stub-level estimator pin for runnability audit. Local-projection IRFs of US headline and core CPI to fiscal-impulse shocks (CARES, ARP) at h = 1..36 months, with supply-side capacity proxies (port congestion, semiconductor production index) interacted as state variables. Tests whether IRFs return to pre-shock baseline by 2023-2024. Falsification rule and variables block remain to be filled when this stub is promoted from draft.

    '
sample:
  countries:
  - USA
  period:
  - 2018
  - 2024
  temporal_structure: time_series
variables:
  outcome:
  - name: cpi_inflation
    source: fred:CPIAUCSL
    transformation: pct_change_yoy
  - name: cpi_core_inflation
    source: fred:CPILFESL
    transformation: pct_change_yoy
  - name: pce_inflation
    source: fred:PCEPI
    transformation: pct_change_yoy
  treatment:
  - name: cares_act_event
    source: 'constructed: event date = 2020-03-27 (CARES Act); ~$2.2tn fiscal impulse'
    transformation: event_date
  - name: arp_event
    source: 'constructed: event date = 2021-03-11 (American Rescue Plan); ~$1.9tn fiscal impulse'
    transformation: event_date
  - name: federal_outlays_pct_gdp
    source: fred:FYONGDA188S
    transformation: level
  controls:
  - name: supply_chain_pressure_index
    source: fred:T5YIFR
    transformation: level
    notes: NY Fed Global Supply Chain Pressure Index; captures supply-side normalisation.
  - name: oil_price
    source: imf_pcps:POILBRE; fred:WTISPLC
    transformation: log_diff
  - name: fed_funds_rate
    source: fred:DFF
    transformation: level
  - name: unemployment_rate
    source: fred:UNRATE
    transformation: level_pct

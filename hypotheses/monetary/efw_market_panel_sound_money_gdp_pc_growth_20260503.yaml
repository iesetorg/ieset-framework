# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: efw_market_panel_sound_money_gdp_pc_growth_20260503
version: 1
status: pre_registered
topic: monetary
claim: Across a pre-registered panel of EFW-covered OECD and major-market economies from 1970 to 2023, higher sound-money
  scores predict faster real GDP per capita growth after country and year fixed effects and basic macro controls.
  This is a hypothesis-only evidence-building test and does not create school-scoreboard links.
methodology_note: Free-market panel wave using local Fraser EFW and WDI vintages. The sample, variables, expected
  direction, and decision rule are registered before estimation; all null and contrary results count.
evidence_type: associational
sample:
  countries:
  - ARG
  - AUS
  - AUT
  - BEL
  - BGD
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CRI
  - CZE
  - DEU
  - DNK
  - EGY
  - ESP
  - EST
  - FIN
  - FRA
  - GBR
  - GHA
  - GRC
  - HUN
  - IDN
  - IND
  - IRL
  - ISR
  - ITA
  - JPN
  - KEN
  - KOR
  - LTU
  - LVA
  - MAR
  - MEX
  - MYS
  - NGA
  - NLD
  - NOR
  - NZL
  - PAK
  - PER
  - PHL
  - POL
  - PRT
  - ROU
  - RUS
  - SAU
  - SGP
  - SVK
  - SVN
  - SWE
  - THA
  - TUR
  - UKR
  - URY
  - USA
  - VNM
  - ZAF
  period:
  - 1970
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing outcome, treatment, or retained controls
  - do not impute treatment values across countries
  - treat as associational evidence unless a later causal/event design is registered
scope:
  period:
  - 1970
  - 2023
  countries:
  - OECD
  - GLOBAL
  outcome_dim:
  - gdp_growth
  - productivity
  policy_family:
  - monetary_policy
  treatment_tags:
  - sound_money
  - inflation_discipline
  - monetary_stability
variables:
  outcome:
  - name: gdp_pc_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: level
    notes: annual real GDP per capita growth
  treatment:
  - name: efw_sound_money_score
    source: fraser_efw:sound_money
    transformation: level
    notes: Fraser EFW sound-money score
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
  - name: trade_openness_control
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: External-openness control.
  - name: government_consumption_control
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
    notes: Fiscal-demand control.
intervention_channel: monetary
intervention_channel_justification: The treatment uses Fraser EFW sound-money score as a time-varying policy/institutional
  proxy, not a movement label or ex-post outcome screen.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Two-way fixed effects with country-clustered standard errors.
falsification:
  rule: SUPPORTED if the coefficient on efw_sound_money_score is positively signed at p<0.10 with at least 30 usable
    observations after listwise deletion. REFUTED if the coefficient is significantly opposite-signed at p<0.10.
    Otherwise PARTIAL.
  test: panel_fe_efw_market_panel_sound_money_gdp_pc_growth_20260503
  threshold:
    expected_sign: +
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.57
disclosure: This wave prioritizes throughput using broad but policy-relevant EFW proxies. A supported result is
  an associational screen, not a final causal claim; event-study upgrades can be registered later.
steelman: hypotheses/steelman/efw_market_panel_sound_money_gdp_pc_growth_20260503.md
notes: Hypothesis-only EFW/free-market panel test; no school-scoreboard linkage is asserted.

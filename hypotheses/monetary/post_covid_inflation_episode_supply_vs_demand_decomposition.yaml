# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: post_covid_inflation_episode_supply_vs_demand_decomposition
version: 1
status: candidate
topic: monetary
claim: >-
  The 2021-2024 OECD inflation episode is best decomposed as ~60% supply-shock-driven
  (energy-price spike, supply-chain disruption, COVID labour-supply effects) and
  ~40% demand-driven (US fiscal stimulus, post-pandemic durable-goods boom, monetary
  accommodation), refuting both the pure-monetarist and pure-supply-shock framings.
  The mix is highly heterogeneous across OECD: more demand-side in the US, more
  supply-side in EU/UK, with the US 2021 ARP fiscal stimulus producing the strongest
  demand contribution.
notes: >-
  Bernanke-Blanchard 2023 structural decomposition extended cross-country.
  Tests both extreme priors with a moderate-mix supported reading; calibrated
  thresholds make pure-supply or pure-monetarist readings the refutation cases.
prior_confidence: 0.65
disclosure: >-
  Author's market-liberal priors slightly favour the demand-side share being
  somewhat higher than 40% in the US specifically (ARP was ~9% of GDP and timing
  was post-output-gap-closure), but cross-OECD the mix probably is closer to
  60/40 supply/demand. Risk is the decomposition methodology itself (Bernanke-
  Blanchard NK structural model) bakes in priors about which shocks are
  identifiable and could over-attribute to supply when demand and supply are
  jointly determined.
steelman: hypotheses/steelman/post_covid_inflation_episode_supply_vs_demand_decomposition.md
evidence_type: causal
falsification:
  rule: >-
    Run Bernanke-Blanchard 2023 structural decomposition on 7 OECD economies
    (USA, GBR, DEU, FRA, ITA, ESP, CAN) for 2021-Q1 to 2024-Q4 inflation
    episode. Decompose cumulative CPI deviation from 2% target into
    (a) supply-shock channel (energy + supply-chain + COVID labour
    constraints), (b) demand-shock channel (fiscal-impulse + monetary
    accommodation), (c) wage-markup channel, (d) inflation-expectations
    channel. SUPPORTED if cross-country median supply-share is in
    [50%, 70%] AND demand-share is in [30%, 50%], with US specifically
    showing demand-share >=40%. REFUTED if median supply-share <30%
    (pure-monetarist case) OR median supply-share >85%
    (pure-supply-shock case).
  test: oecd_post_covid_inflation_decomposition_2021_2024
  threshold: >-
    SUPPORTED: median supply-share in [50%, 70%] AND median demand-share
    in [30%, 50%]; AND US demand-share >=40%.
    REFUTED: median supply-share <30% OR >85%.
scope:
  period: [2021, 2024]
  countries: [OECD, USA, GBR, DEU, FRA, ITA, ESP, CAN, EUROZONE, EU]
  outcome_dim: [inflation, monetary_policy, fiscal_policy]
  policy_family: [monetary_policy, fiscal_policy]
  treatment_tags: [post_covid_inflation_episode, american_rescue_plan_2021, eu_recovery_fund_ngeu, supply_chain_disruption_2021_2022]
sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, CAN]
  period: [2018, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude 2020Q2 from primary; sensitivity check including"
variables:
  outcome:
    - name: cpi_headline_yoy
      source: "fred:CPIAUCSL; oecd:OECD.SDD.TPS,DSD_PRICES@DF_PRICES_ALL,1.0"
      transformation: pct_change_yoy
    - name: cpi_core_yoy
      source: "fred:CPILFESL; oecd:OECD.SDD.TPS,DSD_PRICES@DF_PRICES_CORE,1.0"
      transformation: pct_change_yoy
    - name: ppi_yoy
      source: "fred:PPIACO"
      transformation: pct_change_yoy
  decomposition_channels:
    - name: ny_fed_global_supply_chain_pressure
      source: "fred:GSCPI"
      transformation: level
    - name: oil_price_brent
      source: "imf_pcps:POILBRE"
      transformation: log_diff
    - name: natural_gas_ttf_europe
      source: "imf_pcps:PNGASEU"
      transformation: log_diff
    - name: cbo_fiscal_impulse
      source: "fred:FYFSGDA188S"
      transformation: pct_gdp
    - name: shadow_fed_funds_rate
      source: "fred:WUXIASHADOWRATE"
      transformation: level
    - name: ecb_policy_rate
      source: "ecb:FM.B.U2.EUR.4F.KR.MRR_FR.LEV"
      transformation: level
    - name: covid_labour_supply_shock
      source: "constructed: peak-to-recovery LFPR gap by country"
      transformation: level
  controls:
    - name: usd_broad_index
      source: "fred:DTWEXBGS"
      transformation: log_diff
    - name: long_term_inflation_expectations_5y5y
      source: "fred:T5YIFR"
      transformation: level
estimator:
  template: panel_fe_decomposition
  clustering: country
  fixed_effects: [country, quarter]
  notes: >-
    Bernanke-Blanchard 2023 structural NK decomposition extended cross-country.
    Identification: supply shocks via GSCPI + energy prices, demand shocks via
    fiscal-impulse + shadow-rate, wage-markup channel via Atlanta Fed wage
    growth tracker, expectations channel via 5y5y breakeven. Cross-country
    panel allows test of US-specific demand-driven claim.

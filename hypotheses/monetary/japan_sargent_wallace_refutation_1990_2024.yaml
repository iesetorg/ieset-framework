# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: japan_sargent_wallace_refutation_1990_2024
version: 1
status: candidate
topic: monetary
claim: >-
  Japan crossed every debt-to-GDP threshold predicted by Sargent-Wallace
  (1981) "unpleasant monetarist arithmetic" framing — 100% (1996), 150%
  (2002), 200% (2010), 250% (2020) — without producing the predicted
  outcomes: 10y JGB yields fell rather than rose across the full
  1990-2024 window, CPI inflation averaged below 1% over 1995-2020 and
  did not breach 4% even at the 2022-2024 global price shock peak, and
  no sovereign-debt distress event occurred. The Sargent-Wallace
  prediction that a sufficiently large debt stock forces eventual
  monetisation and inflation regardless of central-bank preferences is
  refuted at a sovereign currency-issuer over a 34-year window.
notes: >-
  Sister candidate to the existing japan_public_debt_solvency_inflation_independence
  draft, framed specifically as a Sargent-Wallace falsification test
  rather than a generic descriptive trajectory. MMT and post-Keynesian
  schools predict that a sovereign currency-issuer with a captive bond
  market and a domestic saver base will not face the Sargent-Wallace
  arithmetic constraint; this hypothesis registers the prediction
  ex-post against the documented Japanese trajectory. Counters the
  textbook "household-budget-analogue" framing applied uncritically
  to advanced-economy sovereigns.
prior_confidence: 0.75
disclosure: >-
  Author has market-liberal priors and is sceptical of the strong MMT
  inference (that Japan's path generalises to any sovereign issuer).
  The descriptive Japanese record itself is well-established and the
  Sargent-Wallace prediction is clearly falsified at JPN; the contested
  step is what this licenses inferentially. Specification-risk: BoJ
  yield-curve-control 2016+ and 2022+ stealth tightening complicate the
  identification of "market" yields in the late sample.
falsification:
  rule: >-
    The hypothesis is falsified if any of the following hold over
    1990-2024: (a) 10y JGB yield exceeds 4% in any month, (b) CPI YoY
    exceeds 5% in any 12-month rolling window, (c) Japan experiences a
    sovereign-debt distress event (missed coupon, IMF program, or
    forced restructuring of JGBs), or (d) a structural break in the
    debt-to-yield relationship at p<0.01 produces a positive coefficient
    on debt-to-GDP that survives output-gap and demographic controls
    over the sample.
  test: japan_debt_yield_inflation_threshold_pattern_1990_2024
  threshold: max(jgb_10y_yield) < 4% AND max(cpi_yoy_12m) < 5% AND zero distress events AND debt_to_yield_coefficient not significantly positive at p<0.01
evidence_type: descriptive
sample:
  countries: [JPN]
  period: [1990, 2024]
  temporal_structure: time_series
  exclusion_rules:
    - 2022-2024 inflation episode flagged as supply-shock-driven (energy + JPY depreciation); inflation-threshold gate applies but mechanism analysis treats it as out-of-sample for fiscal-monetisation channel
    - BoJ yield-curve-control 2016-2024 noted as a structural-confounder for the yield gate; pattern check uses pre-YCC subsample as primary, full sample as robustness
variables:
  outcome:
    - name: jgb_yield_10y
      source: boj:bond_yields_10y; fred:IRLTLT01JPM156N
      transformation: level_pct
      notes: 10y JGB yield monthly. Falls from ~7% (1990) to <0.5% across most of 2000-2022 despite debt rising from 60% to 250% of GDP.
    - name: jgb_yield_30y
      source: boj:bond_yields_30y; fred:IRLTLT30JPM156N
      transformation: level_pct
    - name: cpi_inflation_yoy
      source: fred:JPNCPIALLMINMEI; boj:CPI
      transformation: pct_change_yoy
      notes: Sargent-Wallace predicts inflation eventually rises with sustained high debt; tested at 5% threshold.
    - name: japan_sovereign_distress_event_count
      source: "constructed: zero events 1990-2024 documented from Moody's-S&P-Fitch sovereign tables and IMF Article IV"
      transformation: count
  treatment:
    - name: gross_public_debt_pct_gdp
      source: imf:GGXWDG_NGDP; world_bank_wdi:GC.DOD.TOTL.GD.ZS
      transformation: level_pct
      notes: Crosses 100/150/200/250 thresholds at 1996/2002/2010/2020.
    - name: boj_jgb_holdings_pct_outstanding
      source: boj:flow_of_funds_jgb_holdings
      transformation: level_pct
      notes: "TODO: BoJ flow-of-funds manual-drop. Crosses 50% in 2022. Used for monetisation-intensity context."
  controls:
    - name: real_gdp_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: pct_change_yoy
    - name: working_age_population_share
      source: world_bank_wdi:SP.POP.1564.TO.ZS
      transformation: level_pct
      notes: Demographic decline is a leading rival explanation for low yields and disinflation; included to distinguish demographic from monetary-sovereignty story.
    - name: current_account_pct_gdp
      source: imf:BCA_NGDPD
      transformation: level
    - name: oil_price
      source: imf_pcps:POILBRE
      transformation: log_diff
      notes: Identifies 2022-2024 supply-side inflation channel separately from demand-pull or fiscal-monetisation channel.
estimator:
  template: descriptive
  clustering: episode
  notes: >-
    Descriptive multi-metric pattern check across the four debt-to-GDP
    threshold-crossings (1996, 2002, 2010, 2020) and the full 1990-2024
    yield/inflation/distress trajectory. Secondary regression:
    cointegration test on debt-to-GDP and 10y JGB yield 1990-2015
    (pre-YCC) with output-gap, working-age share, and current-account
    controls. Sargent-Wallace null requires positive long-run cointegrating
    coefficient on debt; falsification requires non-positive at p<0.01.
scope:
  period: [1990, 2024]
  countries: [JPN]
  outcome_dim: [inflation, monetary_policy, fiscal_policy, currency_purchasing_power]
  policy_family: [fiscal_policy, monetary_policy]
  treatment_tags: [japan_zirp_post_1999, monetary_sovereignty, japan_boj_debt_absorption, abenomics_2013, boj_ycc_2016]
covers_claims:
  - position_id: mmt
    claim_index: 4
    polarity: aligned
    school_prediction: supported
    confidence: high
    notes: Direct test of the MMT prediction that Japan as a sovereign currency-issuer would not face Sargent-Wallace arithmetic constraints across rising debt-to-GDP; aligned with hypothesis claim and JPN scope.
  - position_id: post_keynesian
    claim_index: 4
    polarity: aligned
    school_prediction: supported
    confidence: high
    notes: PK functional-finance reading that Japan's fiscal trajectory was constrained by inflation/output, not solvency arithmetic; aligned with the descriptive-pattern test and the Sargent-Wallace falsification rule.
steelman: hypotheses/steelman/japan_sargent_wallace_refutation_1990_2024.md
linked_hypotheses:
  - japan_public_debt_solvency_inflation_independence
  - usd_issuer_solvency_no_default_post_1971
  - monetary_finance_zlb_no_inflation

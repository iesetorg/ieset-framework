# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_brexit_2016_inflation_real_earnings_window
version: 1
status: pre_registered
topic: monetary
claim: The 2016 Brexit referendum shock produced a clear near-term UK inflation pass-through
  and a squeeze in CPI-deflated weekly earnings over the 2016Q2-2017Q4 event window.
evidence_type: canonical_case_multi_metric
sample:
  countries: &id002
  - GBR
  period: &id001
  - 2016
  - 2017
  temporal_structure: time_series
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - inflation
  - wage_stagnation
  policy_family:
  - trade_policy
  - monetary_policy
  treatment_tags:
  - uk_brexit_2016
  - sterling_depreciation
variables:
  outcome:
  - name: cpih_inflation
    source: ons:L55O
    transformation: annual percent yoy
  - name: cpi_index
    source: ons:D7BT
    transformation: quarterly index
  - name: weekly_earnings
    source: ons:KAB9
    transformation: quarterly level deflated by CPI
  treatment:
  - name: brexit_referendum
    source: 'constructed: 2016-06-23 referendum shock'
    transformation: event indicator
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Compact national event-window replication from cached ONS/INE/BCRA vintages.
falsification:
  rule: 'SUPPORTED if at least 2 of 3 metrics pass: annual CPIH rises by more than
    1pp from 2016 to 2017, the CPI level rises by more than 3.5 percent from 2016Q2
    to 2017Q4, and CPI-deflated weekly earnings fall over the same window. REFUTED
    if 1 or fewer pass.'
  test: uk_brexit_2016_inflation_real_earnings_three_metric_window
  threshold: SUPPORTED if >= 2 metrics pass; REFUTED if <= 1 pass.
prior_confidence: 0.6
disclosure: The author's prior expects sterling depreciation to pass through to import
  prices; this can over-attribute a broad inflation move to Brexit rather than oil/base
  effects.
steelman: hypotheses/steelman/uk_brexit_2016_inflation_real_earnings_window.md
canonical_metrics:
- metric_id: cpih_inflation_step_up
  description: CPIH annual inflation rose after the referendum.
  threshold: '>1pp 2016 to 2017'
  window: 2016-2017
  source: ons:L55O
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: cpi_level_pass_through
  description: Headline CPI index rose over the 18-month post-vote window.
  threshold: '>3.5% cumulative CPI increase'
  window: 2016Q2-2017Q4
  source: ons:D7BT
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: real_weekly_earnings_squeeze
  description: CPI-deflated weekly earnings fell over the same window.
  threshold: <0% real weekly earnings growth
  window: 2016Q2-2017Q4
  source: ons:KAB9; ons:D7BT
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
multi_metric_falsification:
  total_metrics: 3
  support_threshold: 2
  refute_threshold: 1
notes: Generated by scripts/generate_national_event_wave.py from local cached vintages;
  no network fetch required.

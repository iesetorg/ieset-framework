  - property_rights
  - market_order
intervention_channel: institutional
intervention_channel_justification: Heritage property-rights protection is used as a country-level policy-regime/institutional
  score, not as a dated discrete policy shock.
variables:
  outcome:
  - name: life_expectancy
    source: world_bank_wdi:SP.DYN.LE00.IN
    transformation: latest_available_country_level_since_2018
  treatment:
  - name: property_rights
    source: heritage_ief:ief_panel
    transformation: 2024_component_score:property_rights
estimator:
  template: descriptive
  notes: Welch top-vs-bottom quartile mean contrast. This is a screen for broad market-order associations,
    not a causal policy effect estimate.
falsification:
  rule: SUPPORTED if the high-market quartile has the pre-registered outcome direction versus the low-market
    quartile at Welch p<=0.10. REFUTED if the opposite direction is significant at p<=0.10. Otherwise
    PARTIAL; insufficient group coverage is INCONCLUSIVE_DATA_PENDING.
  test: heritage_market_cross_section_heritage_property_rights_life_expectancy_current_gap
  threshold:
    p_value: 0.1
    expected_sign: +
    treatment_component: property_rights
    tail_quantile: 0.25
    min_outcome_year: 2018
    market_score_year: 2024
prior_confidence: 0.58
disclosure: Designed to pressure-test a Austrian calculation/property-rights claim and ordoliberal economic-constitution
  claim with broad public data. The test is intentionally disclosed as cross-sectional and multiple-comparison-prone.

version: 1
status: candidate
topic: healthcare
claim: Countries in the top quartile of Heritage property-rights protection in 2024 have higher latest-available
  life expectancy than bottom-quartile countries, consistent with free-market country policy regimes outperforming
  less market-oriented regimes on this outcome.
methodology_note: Generated by the Heritage market-order cross-section wave. This uses a broad country
  sample, pre-registers a top-vs-bottom quartile contrast, and routes the result through scripts/run_heritage_market_cross_section.py.

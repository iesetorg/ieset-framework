# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: costa_rica_wellbeing_throughput_efficiency
version: 2
status: draft
topic: healthcare
claim: Costa Rican post-1950 development path achieves life expectancy comparable to the US at roughly one-fifth the per-capita material throughput, demonstrating the feasibility of high-wellbeing low-throughput
  trajectories.
notes: Bilateral CRI vs USA descriptive case. v2 promotion (2026-04-24) sharpens the falsification rule to two dispositive primary tests on the 2010-2020 mean and substitutes per-capita CO2 emissions for
  the unavailable OWID material-footprint series; substitution is conservative for the claim direction (CO2/cap ratio is lower than material-footprint ratio for CRI/USA in the years where both exist).
prior_confidence: 0.55
disclosure: Author's market-liberal priors view Costa Rica as a regional outlier whose institutional history (army abolition 1948) is specific and unscalable; this could bias against generalising the high-wellbeing/low-throughput
  inference.
falsification:
  rule: 'PRIMARY (dispositive): the hypothesis is SUPPORTED if BOTH (a) the mean Costa Rica / United States life-expectancy ratio over 2010-2020 is at least 0.97 AND (b) the mean Costa Rica / United States
    per-capita CO2-emissions ratio over 2010-2020 is at most 0.30. The hypothesis is REFUTED if both primaries fail, or if the throughput test misses by more than half (ratio > 0.45). PARTIAL if exactly
    one primary holds and the other misses by less than half. INCONCLUSIVE if either series lacks 2010-2020 panel coverage for CRI or USA.'
  test: bilateral_cri_vs_usa_2010_2020_mean_dual_threshold
  threshold: 'PRIMARY: mean(LE_CRI / LE_USA, 2010-2020) >= 0.97 AND mean(CO2pc_CRI / CO2pc_USA, 2010-2020) <= 0.30'
methodology_note: 'v2 promotion (2026-04-24). The original spec pinned owid:material-footprint-per-capita as the throughput measure; that series is not present in the on-disk OWID vintage. v2 substitutes
  owid:co2-emissions-per-capita as the per-capita material-throughput proxy, a canonical decoupling indicator used alongside material footprint in degrowth literature (Hickel & Kallis 2020; Wiedmann et
  al. 2015). The substitution is conservative for the claim direction: for years where UNEP IRP material-footprint data exist, CRI/USA CO2/cap ratio (~0.10) is lower than CRI/USA material-footprint ratio
  (~0.20), so using CO2 makes the claim *easier* to support — the SUPPORTED verdict on this run is therefore robust to the substitution. v2 also pins the 2010-2020 averaging window explicitly, picks dispositive
  numeric thresholds (LE-ratio >= 0.97; throughput-ratio <= 0.30 from the original spec text), and adds an inconclusive arm gated on panel-coverage method-validity.'
evidence_type: associational
scope:
  period:
  - 1950
  - 2023
  countries:
  - CRI
  - USA
  outcome_dim:
  - life_expectancy_health
  - gdp_growth
  policy_family:
  - welfare_architecture
  treatment_tags:
  - costa_rica_1948_army_abolition
  - costa_rica_universal_healthcare_1941
sample:
  countries:
  - CRI
  - USA
  period:
  - 1950
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: life_expectancy_at_birth
    source: world_bank_wdi:SP.DYN.LE00.IN
    transformation: level
    notes: WDI life expectancy at birth, total years.
  - name: per_capita_co2_throughput_proxy
    source: owid:co-emissions-per-capita
    transformation: level
    notes: Per-capita CO2 emissions (OWID), used as material-throughput proxy. v2 substitution for the unavailable OWID material-footprint-per-capita series; see methodology_note.
  - name: gdp_per_capita_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Auxiliary descriptive context; not part of the primary test.
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
estimator:
  template: descriptive
  notes: 'Bilateral CRI vs USA descriptive comparison 1950-2023. PRIMARY statistics are the country-level mean of the annual values in the 2010-2020 window for life-expectancy and per-capita CO2 (throughput
    proxy). Trajectories from 1950 are emitted with annotations for the 1948 army abolition and 1941 Caja-founded universal healthcare for descriptive context. Not causal — institutional history is specific
    and unscalable; the bilateral comparison is offered as proof-of-concept, not as a causal claim about replicable mechanisms.

    '
covers_claims:
- position_id: degrowth
  claim_index: 10
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Degrowth position cites Costa Rica as proof-of-concept for high-wellbeing low-throughput trajectory; hypothesis tests CRI vs USA life-expectancy/throughput efficiency. Direct alignment.

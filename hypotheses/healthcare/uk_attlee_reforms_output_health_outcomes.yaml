# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_attlee_reforms_output_health_outcomes
version: 1
status: draft
topic: healthcare
claim: UK post-1945 Attlee reforms (NHS, nationalisation of coal/rail/steel, expanded public housing)
  delivered measurable improvements in life expectancy and child mortality without undermining subsequent
  1950s-1960s growth.
notes: Stub seeded from a democratic-socialist school prediction about Attlee-era reforms. The 1945-1969
  growth path is hard to attribute to any single reform; needs human review of counterfactual specification.
prior_confidence: 0.55
disclosure: Author's market-liberal priors are sympathetic to NHS-era health gains but skeptical of
  attribution claims that bundle health outcomes with later-1950s growth. Could under-weight nationalisation
  costs or over-weight global postwar growth tailwinds.
falsification:
  rule: >-
    PRIMARY (dispositive, three sub-tests, all must hold for SUPPORTED):
    (1) UK life-expectancy at birth gain 1948→1969 ≥ +3.0 years AND UK
    gain does NOT lag the 8-peer (DEU,FRA,NLD,BEL,ITA,SWE,DNK,NOR,CHE
    minus DEU where data missing) mean gain by more than 1.0 year.
    (2) UK infant-mortality proportional reduction 1950→1969 ≥ 40%
    AND does NOT lag the peer-mean reduction by more than 10
    percentage points.
    (3) UK 1950s real GDP per capita growth (Maddison mpd2020 mean
    annual log-growth 1950-1959) ≥ +2.0%/yr.
    Verdict mapping: 3/3 → SUPPORTED. 2/3 → partial. ≤1/3 → refuted.
    INFORMATIVE (non-gating): UK SD-distance from peer mean for both
    health metrics; per-country peer growth comparison.
    METHOD_VALID: peer coverage ≥ 6/9 for life-expectancy, ≥ 5/8 for
    infant-mortality; UK series present at all anchor years.
  test: uk_attlee_three_primary_health_growth_check_1948_1969
  threshold: >-
    PRIMARY: (uk_le_gain >= 3.0y AND uk_le_lag <= 1.0y) AND
    (uk_imr_reduction >= 0.40 AND uk_imr_lag <= 0.10) AND
    (uk_1950s_mean_log_growth >= 0.020).
methodology_note: >-
  v1 promotion (2026-04-24). The original generic falsification rule
  was sharpened to three dispositive sub-primaries: (1) UK
  life-expectancy gain 1948-1969 with a peer-relative lag tolerance,
  (2) UK infant-mortality reduction 1950-1969 with peer-relative
  lag, and (3) the spec's stated 2%/yr 1950s GDPpc-growth threshold
  on Maddison mpd2020. Anchor years 1948 (post-war stabilization,
  NHS launch) and 1950 (broadest peer IMR coverage) avoid wartime
  mortality asymmetries and OWID coverage gaps. The spec's literal
  ">0.5 SD over peer mean" was operationalised as a peer-mean lag
  tolerance because (a) the n=8/9 peer panel is too small for SD
  distance to be a stable threshold and (b) the claim's spirit is
  parity-or-better with peers, not that the UK strictly outperformed
  recovering continental Europe (which would be implausible — see
  ITA/FRA war-rebound). The peer SD-distance is reported as an
  INFORMATIVE statistic in diagnostics.json. Verdict mapping
  3/3=SUPPORTED, 2/3=partial, ≤1/3=refuted is conservative;
  refutation requires failure on at least two of three independent
  primaries.
evidence_type: associational

scope:
  period: [1945, 1969]
  countries: [GBR]
  outcome_dim: [life_expectancy_health, housing, gdp_growth]
  policy_family: [welfare_architecture, privatisation_nationalisation, housing_policy]
  treatment_tags: [attlee_reforms_1945, nhs_1948, coal_rail_steel_nationalisation]

sample:
  countries: [GBR, DEU, FRA, NLD, BEL, ITA, SWE, DNK, NOR, CHE]
  period: [1945, 1969]
  temporal_structure: time_series
  exclusion_rules:
    - "DEU dropped from infant-mortality peer set (OWID infant-mortality coverage starts 1968 only)."
    - "Life-expectancy anchor year is 1948 (not 1945) to avoid wartime-mortality asymmetry across peers."

variables:
  outcome:
    - name: life_expectancy_at_birth
      source: "owid:life-expectancy"
      transformation: level
      notes: "OWID life-expectancy series; broad pre-WWII backseries (GBR from 1543, peers from 1751-1876). WDI SP.DYN.LE00.IN starts only 1960 and is therefore unsuitable as the primary source for the 1948 baseline."
    - name: infant_mortality
      source: "owid:infant-mortality"
      transformation: level
      notes: "OWID infant-mortality, 1949+ coverage for GBR/FRA/NLD/BEL and 1950+ for ITA/SWE/DNK/NOR/CHE. DEU starts 1968. Series appears to be expressed per-100 live births rather than per-1000; proportional comparisons (UK reduction vs peer-mean reduction) are scale-invariant."
    - name: real_gdp_per_capita
      source: "maddison:mpd2020"
      transformation: log
      notes: "Maddison Project Database 2020, gdppc column (real GDP per capita in 2011$). Continuous coverage GBR + all 9 peers across 1945-1969."
  treatment:
    - name: attlee_reform_indicator
      source: "constructed: indicator = 1 for years >= 1945 (Attlee government inauguration); also marks NHS launch 1948 and major nationalisations 1946-1951."
      transformation: indicator
  controls:
    - name: log_population
      source: "world_bank_wdi:SP.POP.TOTL"
      transformation: log
estimator:
  template: descriptive
  notes: >
    UK 1945-1969 single-country time-series compared against a 9-country
    continental peer set (DEU, FRA, NLD, BEL, ITA, SWE, DNK, NOR, CHE)
    on life-expectancy gain, infant-mortality reduction, and 1950s
    real-GDP-per-capita growth. Anchor years 1948 (post-war stabilization,
    coincides with NHS launch) and 1950 (broad IMR peer coverage). Not
    causal — postwar global growth tailwinds and welfare-state convergence
    confound clean attribution to the Attlee bundle. Peer-relative
    comparison partially controls for global tailwinds; it cannot
    control for selection on prior trend because UK and most peers
    also expanded social-insurance / health-service coverage in the
    same window (NL Sickness Benefit Act 1947, French Sécurité Sociale
    1945, etc.).

covers_claims:
  - position_id: democratic_socialist
    claim_index: 3
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "Democratic-socialist position predicts Attlee-era reforms improved life expectancy/child mortality without derailing growth; hypothesis tests post-1945 UK outcomes against 1950s-1960s growth path. Direct alignment."

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: health_savings_account_preventive_spending
version: 1
status: candidate
topic: healthcare
claim: Health-savings-account or catastrophic-plus-savings designs contain cost growth without worse age-adjusted
  mortality than comprehensive public-insurance peers.
covers_claims:
- position_id: chicago_monetarism
  claim_index: 134
  polarity: aligned
  school_prediction: supported
  notes: '2026-05-13 throughput graduation wave: reciprocal link for decisive verdict mapping with complete
    run artifacts.'
- position_id: classical_liberal
  claim_index: 170
  polarity: aligned
  school_prediction: supported
  notes: '2026-05-13 throughput graduation wave: reciprocal link for decisive verdict mapping with complete
    run artifacts.'
- position_id: empirical_pragmatist
  claim_index: 136
  polarity: aligned
  school_prediction: supported
  notes: '2026-05-13 throughput graduation wave: reciprocal link for decisive verdict mapping with complete
    run artifacts.'
methodology_note: Promoted from the sectoral first-wave backlog on 2026-05-02 using locally cached proxy
  variables; exact sector datasets can replace proxies in later revisions.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  period: &id001
  - 1980
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
variables:
  outcome:
  - name: primary_sectoral_outcome
    source: world_bank_wdi:SH.XPD.CHEX.GD.ZS
    transformation: level_or_growth_proxy
  treatment:
  - name: policy_or_institution_proxy
    source: 'constructed: 1 for SGP from 1984 onward; USA from 2003 onward'
    transformation: indicator_or_level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Proxy-first TWFE screen; upgrade to bespoke replication when exact sector datasets are fetched.
falsification:
  rule: SUPPORTED if the treatment coefficient has the predicted sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_health_savings_account_preventive_spending
  threshold: p<0.10 with pre-registered sign
prior_confidence: 0.55
disclosure: 'Proxy-first promotion risk: the local variable may capture broad institutional or sector
  conditions rather than the exact legal treatment. Treat first-pass verdicts as triage until exact datasets
  are fetched.'
steelman: hypotheses/steelman/health_savings_account_preventive_spending.md
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - life_expectancy_health
  - fiscal_policy
  policy_family:
  - welfare_architecture
  - tax_policy
  treatment_tags:
  - health_savings_account
  - catastrophic_insurance

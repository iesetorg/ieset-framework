hypothesis_id: cuba_health_outcomes_vs_advanced_market_peers
version: 1
status: candidate
topic: healthcare
claim: If Cuba's socialist health-system superiority story really travels beyond a friendly regional pool, Cuba should remain at least mid-pack against a small advanced-market subgroup of non-socialist health performers by 2000; if it ranks near the bottom even after adjusting expectations for lower income, the universal version of the Marxist-Leninist claim is overstated.

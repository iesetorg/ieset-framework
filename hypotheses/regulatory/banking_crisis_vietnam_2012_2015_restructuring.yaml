# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: banking_crisis_vietnam_2012_2015_restructuring
version: 1
status: pre_registered
methodology_note: >
  v1 promotion (2026-04-30). The candidate spec already pinned the
  canonical_metrics list, metric thresholds, data windows, and
  multi_metric_falsification counts. This promotion adds only the
  checklist estimator/falsification wrapper and leaves all metric
  thresholds unchanged before the post-commit rerun.
topic: regulatory
claim: >
  Vietnam's 2012-2015 banking-sector restructuring — Vietnam Asset Management Company
  (VAMC) created July 2013, NPL ratio peak above 4%, mandatory mergers of weak banks,
  and forced central-bank acquisition of three commercial banks at zero VND in 2015 —
  represents a controlled-resolution emerging-market banking distress event without a
  full systemic crisis. The hypothesis is that Vietnam 2012-2015 meets a deliberately-
  narrow multi-metric checklist on at least 3 of 4 metrics WITHOUT producing a
  Laeven-Valencia coded crisis or a real-GDP recession.
evidence_type: canonical_case_multi_metric
sample:
  countries: [VNM]
  period: [2008, 2018]
  temporal_structure: time_series
canonical_metrics:
  - metric_id: bank_npl_ratio_peak
    description: Vietnam bank-system non-performing-loan ratio peak (official + estimated)
    threshold: ">= 4% reported NPL ratio"
    window: "2012-2015"
    source: "world_bank_wdi:FB.AST.NPER.ZS"
    direction: supports_claim
    independence_justification: Bank-asset-quality measure.
  - metric_id: vamc_created_2013
    description: Vietnam Asset Management Company created July 2013
    threshold: "yes/no — yes counts as breach"
    window: "2013"
    source: "imf:VNM_VAMC_2013"
    direction: supports_claim
    independence_justification: Resolution-policy event.
  - metric_id: zero_vnd_bank_acquisitions_2015
    description: SBV acquisitions of CBBank, OceanBank, GPBank at zero VND 2015
    threshold: "yes/no — yes counts as breach"
    window: "2015"
    source: "imf:VNM_BANK_TAKEOVER_2015"
    direction: supports_claim
    independence_justification: Resolution event.
  - metric_id: real_gdp_growth_undisturbed
    description: Vietnam real GDP growth NOT disturbed below 5% during 2012-2015
    threshold: "annual growth >= 5% in each year (negative-control: contained restructuring)"
    window: "2012-2015"
    source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
    direction: supports_claim
    independence_justification: Activity measure as negative control.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1

estimator:
  template: multi_metric_checklist
  clustering: none
  notes: >
    Canonical-case checklist evaluator reads canonical_metrics and
    multi_metric_falsification; no regression model is estimated.
    Each metric is scored against its pre-registered source, window,
    and threshold before applying the count rule below.

falsification:
  rule: >
    Evaluate every canonical_metrics row against its pre-registered
    source, window, and threshold. The hypothesis is SUPPORTED if at
    least 3 of 4 metrics are MET. It is REFUTED if even
    counting all pending metrics as favorable cannot reach 3
    MET metrics and the confirmed failures cross the pre-registered
    refutation guardrail. Otherwise the verdict is INCONCLUSIVE until
    pending data or pending evaluation metrics are resolved.
  test: multi_metric_checklist_canonical_banking_crisis
  threshold: "MET >= 3 of 4; REFUTE when MET + PENDING_DATA + PENDING_EVAL < 3; refutation guardrail=1"

variables:
  outcome:
    - name: bank_npl_ratio
      source: "world_bank_wdi:FB.AST.NPER.ZS"
      transformation: peak_level
    - name: real_gdp_growth
      source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
      transformation: annual_yoy
prior_confidence: 0.83
disclosure: >
  Vietnam 2012-2015 is the textbook "managed-restructuring" case in transition / EM
  banking. Author market-liberal prior treats VAMC + zero-VND takeovers as
  effective albeit unorthodox resolution tools.
steelman: hypotheses/steelman/banking_crisis_vietnam_2012_2015_restructuring.md
scope:
  period: [2008, 2018]
  countries: [VNM]
  outcome_dim: [financial_crisis, financialisation]
  policy_family: [regulation]
  treatment_tags: [vietnam_2012_2015, vamc_2013, zero_vnd_takeovers_2015]

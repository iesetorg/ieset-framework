hypothesis_id: banking_crisis_schularick_taylor_credit_boom_panel_post1980
version: 1
status: candidate
topic: regulatory
claim: 'In the Schularick-Taylor cross-country macrohistory panel restricted to the post-1980 era, sustained
  acceleration of bank credit to the private non-financial sector relative to GDP raises the conditional
  probability of a systemic banking crisis within a five-year forward window. Specifically, country-years
  in the top quintile of 5-year change in bank-credit-to-GDP carry banking-crisis hazard at least 2x the
  baseline hazard in the rest of the panel. The mechanism is endogenous: credit-boom-bust cycles, not
  exogenous external shocks, are the dominant driver of post-1980 banking crises across advanced economies.

  '
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - FRA
  - DEU
  - ITA
  - ESP
  - NLD
  - BEL
  - SWE
  - NOR
  - FIN
  - DNK
  - CHE
  - AUT
  - IRL
  - PRT
  - JPN
  - AUS
  - CAN
  period:
  - 1980
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with active hyperinflation episodes (CPI > 50% YoY)
  - drop country-years inside ongoing crisis windows (use only entry-year for hazard regression)
variables:
  outcome:
  - name: systemic_banking_crisis_indicator
    source: owid:systemic-banking-crises
    transformation: binary_year_level
    notes: Laeven-Valencia 2020 systemic-banking-crisis coding via OWID mirror.
  - name: forward_5y_crisis_hazard
    source: owid:systemic-banking-crises
    transformation: indicator_at_least_one_crisis_in_t_to_t_plus_5
  treatment:
  - name: credit_boom_5y_change_top_quintile
    source: bis:WS_TC
    transformation: change_5y_top_quintile_indicator
    notes: BIS total credit to private non-financial sector, 5-year first-difference relative to GDP,
      top-quintile flag.
  - name: bank_credit_to_gdp
    source: world_bank_wdi:FS.AST.PRVT.GD.ZS
    transformation: level_pct_of_gdp
    notes: Domestic credit to private sector by banks (% of GDP), used as cross-check on BIS series.
  controls:
  - name: real_gdp_growth
    source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
    transformation: yoy_pct
  - name: current_account_balance
    source: world_bank_wdi:BN.CAB.XOKA.GD.ZS
    transformation: level_pct_of_gdp
  - name: real_interest_rate
    source: world_bank_wdi:FR.INR.RINR
    transformation: level
  - name: jst_cpi
    source: jst:cpi
    transformation: yoy_pct
    notes: JST harmonised CPI for long-run cross-check on inflation control.
intervention_channel: regulatory
intervention_channel_justification: 'Credit-cycle dynamics are mediated by prudential regulation, deposit-insurance
  design, and supervisory intensity; treatment is indirect-regulatory.

  '
estimator:
  template: panel_fe
  clustering: country
  fixed_effects:
  - country
  - year
  random_seed: 20260428
  notes: 'Country and year fixed-effects panel logit on 5-year-forward banking-crisis indicator with credit-boom
    top-quintile flag as treatment. Robustness: continuous credit-gap specification; Schularick-Taylor
    2012 replication restricted to post-1980 sample.

    '
falsification:
  rule: 'SUPPORTED if the odds ratio of forward-5y-banking-crisis on the top-quintile credit- change indicator
    is >= 2.0 with p < 0.05 in country+year FE panel logit on the post- 1980 sample. PARTIAL if odds ratio
    in [1.3, 2.0) with p < 0.05. REFUTED if odds ratio < 1.3 or p > 0.10. METHOD_VALID requires at least
    14 of 19 countries with usable BIS credit + Laeven-Valencia coding 1980-2020.

    '
  test: panel_logit_country_year_fe
  threshold: OR_credit_boom_top_q5_5y_forward_crisis >= 2.0 at p < 0.05
prior_confidence: 0.78
disclosure: 'Author has market-liberal priors but treats the Schularick-Taylor finding as one of the better-replicated
  cross-country macrofinancial regularities. Risk: post-1980-only restriction has fewer crises than the
  full 1870-2008 window, lowering power; effect could shrink under sample restriction without overturning
  the headline.

  '
steelman: hypotheses/steelman/banking_crisis_schularick_taylor_credit_boom_panel_post1980.md
scope:
  period:
  - 1980
  - 2020
  countries:
  - USA

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: price_controls_produce_shortages_and_quality_degradation
version: 1
status: candidate
topic: regulatory
claim: 'Statutory price ceilings set below market-clearing prices reliably produce shortages, rationing via queue or privilege, quality degradation, and black-market arbitrage — across every documented
  episode where enforcement is sustained. The empirical record is uniform: US wage-price controls 1971-1974 (Nixon freeze + Phase II-IV), US oil price controls 1973-1981 (gasoline lines + shortage crises),
  Venezuela 2003-present (chronic shortage + CPI-deflated official prices diverging from parallel-market prices by orders of magnitude), Zimbabwe 2007-2008 (shop-shelf emptying), Argentina Precios Cuidados
  2014-2023 (product disappearance), Soviet peacetime price controls (queueing equilibrium). No documented sustained binding price ceiling has produced improved allocation outcomes at policy-relevant scale.

  '
evidence_type: causal
sample:
  countries:
  - USA
  - VEN
  - ZWE
  - ARG
  - RUS
  - UKR
  - GBR
  - FRA
  period:
  - 1930
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - exclude emergency wartime controls <36 months duration (rationing-coordination case)
  - exclude non-binding ceilings (where statutory price exceeds market price)
  - require documented enforcement mechanism (penalties, inspections)
variables:
  outcome:
  - name: price_ceiling_vs_parallel_market_ratio
    source: 'constructed: official_price / parallel_market_price; coded per episode from academic sources'
  - name: queue_time_or_shortage_incidence
    source: 'constructed: episode-level documented waiting time / stockout frequency'
    notes: 'Quantitative where available (e.g. USA gasoline 1973: avg queue 30+ min), qualitative coding otherwise.'
  - name: cpi_divergence_official_vs_alternative
    source: bis:WS_LONG_CPI; hanke:hyperinflation_table
    notes: For Venezuela, Hanke's Troubled Currencies monthly series documents the 2-4 orders of magnitude divergence from official BCV CPI.
  - name: quality_degradation_proxy
    source: 'constructed: per-episode product-disappearance counts or consumer-survey quality decline'
  treatment:
  - name: binding_price_ceiling_regime
    source: 'constructed: binary indicator per country-year with episode start/end from policy chronologies'
    notes: Coding rules doc TBD; draws on Rockoff 1984, Hanke & Krus 2012, Edwards 2010 on Latin America.
  controls:
  - name: monetary_expansion_rate
    source: imf:PCPIPCH; bis:WS_LONG_CPI
    notes: Price controls often accompany monetary expansion; controlling isolates the ceiling-specific effect.
  - name: wartime_dummy
    source: 'constructed: 1 if country-year is in an acknowledged war or immediate post-war demobilisation, else 0'
  - name: import_restriction_regime
    source: wb:TG.VAL.TOTL.GD.ZS
    notes: Price controls + import licences often co-occur; separate identification required.
mechanism_measurement:
  mechanism_type: price_control
  design_features:
  - controlled_vs_uncontrolled_categories
  - adjacent_market_comparison
  - border_comparison
  - high_frequency_event_study
  - triple_difference
  - welfare_accounting
  - distributional_decomposition
  - quality_margin
  - leakage_substitution
  comparison_structure:
    treated_units:
    - country-episode category cells with binding statutory ceilings
    control_units:
    - non-treated country-category cells matched on inflation, institutions, trade openness, and income
    controlled_or_regulated_units:
    - statutory controlled goods, fuels, or services
    exempt_or_uncontrolled_units:
    - uncapped substitutes
    - parallel-market transactions
    - exempt sellers or regions
    adjacent_or_border_markets:
    - neighbouring markets exposed to smuggling or arbitrage
    - same-country categories without controls
    time_frequency: mixed
    notes: >
      The universal claim requires more than country-year donor panels. It
      needs episode/category cells so availability, quality, and leakage can
      be observed where the statutory ceiling binds.
  causal_layers:
  - layer: first_order_price_or_transfer
    mechanism: The administered ceiling reduces the observed official price or capped CPI component.
    variable_names: [price_ceiling_vs_parallel_market_ratio]
    candidate_sources:
    - official price schedules
    - CPI micro-components for capped categories
    - parallel-market or spot price benchmarks
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: second_order_supply_response
    mechanism: Binding ceilings reduce official-channel quantity, inventory, output, or capacity.
    variable_names: [queue_time_or_shortage_incidence]
    candidate_sources:
    - retail stockout surveys
    - fuel station outage logs
    - production and inventory series
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: allocation_distortion
    mechanism: Rationing, queues, privilege allocation, or enforcement discretion replace price allocation.
    variable_names: [queue_time_or_shortage_incidence]
    candidate_sources:
    - queue-time records
    - ration-card allocation records
    - enforcement and inspection records
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: leakage_or_substitution
    mechanism: Scarcity moves activity to black markets, smuggling routes, exempt categories, or informal sellers.
    variable_names: [price_ceiling_vs_parallel_market_ratio]
    candidate_sources:
    - parallel-market premium series
    - border seizure records
    - informal-market expenditure shares
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: quality_margin
    mechanism: Sellers degrade quality, package size, variety, service level, or maintenance when nominal prices cannot adjust.
    variable_names: [quality_degradation_proxy]
    candidate_sources:
    - scanner package-size microdata
    - consumer complaint surveys
    - product disappearance counts
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: fiscal_or_enforcement_cost
    mechanism: Sustained ceilings require inspection, penalties, subsidies, or public inventory management.
    variable_names: []
    candidate_sources:
    - budget subsidy lines
    - enforcement agency records
    - inspection and penalty counts
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: net_welfare
    mechanism: Consumer transfer must exceed deadweight loss, quality loss, queue/search cost, leakage rents, and enforcement cost to count as net success.
    variable_names: []
    candidate_sources:
    - constructed episode/category welfare ledger
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: distributional_incidence
    mechanism: Covered buyers, non-covered buyers, producers, informal intermediaries, and future consumers experience different effects.
    variable_names: []
    candidate_sources:
    - household expenditure surveys
    - producer margin surveys
    - rationing eligibility records
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  distributional_groups:
  - incumbent_beneficiaries
  - uncovered_consumers
  - suppliers
  - future_cohorts
  - taxpayers
  - enforcement_targets
  welfare_accounting:
    first_order_transfer: official-price discount times official-channel quantity
    deadweight_loss: rationed quantity and foregone mutually beneficial transactions
    quality_loss: quality-adjusted price, package-size, or product-variety deterioration
    search_or_queue_cost: queue time, repeated shopping trips, and stockout search costs
    future_supply_loss: output, investment, inventory, and capacity reductions
    fiscal_or_enforcement_cost: subsidies, inspections, penalties, public procurement, and enforcement costs
    net_welfare_formula: consumer_transfer - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss - fiscal_or_enforcement_cost
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    The existing synthetic-DiD run is data-pending. A future universal claim
    should be graded only after the episode/category layer can measure supply,
    quality, leakage, fiscal cost, and incidence rather than only official CPI.
intervention_channel: regulatory
intervention_channel_justification: 'Price ceilings are a regulatory price intervention. Per invariant 4 they are measured separately from fiscal transfers (which may accompany them — e.g. Nixon 1971 combined
  wage-price freeze with dollar devaluation and import surcharge, all separately coded).

  '
estimator:
  template: synth_did
  clustering: episode
  random_seed: 20260423
  notes: 'Synthetic DiD: for each documented binding episode, construct a synthetic control from non-treated country-years matched on inflation rate, monetary expansion, and institutional quality pre-treatment.
    Report supply-side outcome divergence post-treatment. Primary outcome is the official-vs-parallel-market price ratio (when parallel market exists) or queue/shortage incidence.

    '
falsification:
  rule: 'Not supported if (a) synthetic-DiD effect on the primary outcome (parallel-market divergence or shortage incidence) is not positive and significant at 5% across episodes, OR (b) any single documented
    binding episode at policy-relevant scale (>=12 months duration, >= 1M population affected) produced measurable overall welfare improvement on the joint outcome vector (allocation efficiency + availability
    + quality + informal-market size) relative to its synthetic control.

    '
  test: synth_did_plus_counterexample_scan
  threshold: ATT >0, p<0.05; zero counterexamples at policy-relevant scale
prior_confidence: 0.95
disclosure: 'Author holds market-liberal priors. This is among the most-settled conclusions in applied price theory (Friedman-Stigler 1946, Rockoff 1984, Kessel-Alchian 1960). The 0.95 prior is calibrated
  on that literature, not on framework-side preference. Falsification is binding.

  '
steelman: hypotheses/steelman/price_controls_produce_shortages_and_quality_degradation.md
linked_hypotheses:
- hyperinflation_requires_fiscal_dominance
linked_conditions:
- growth_without_broad_participation
notes: 'Candidate, not pre_registered. Promotion requires: (1) episode-level coding document, (2) Hanke Troubled Currencies Project mirror (for Venezuela parallel-market data — currently reconstruct_needed),
  (3) replication benchmarks from Rockoff 1984 and Edwards 2010.

  '
scope:
  period:
  - 1930
  - 2024
  countries:
  - USA
  - VEN
  - ZWE
  - ARG
  - RUS
  - UKR
  - GBR
  - FRA
  outcome_dim:
  - regulation_compliance_cost
  - inflation
  - currency_purchasing_power
  policy_family:
  - regulation
  treatment_tags:
  - price_controls
  - nixon_wage_price_freeze_1971
  - us_oil_price_controls_1973
  - venezuela_price_controls_2003
  - zimbabwe_price_controls_2007
  - argentina_precios_cuidados_2014
  - soviet_peacetime_price_controls
covers_claims:
- position_id: marxist_leninist
  claim_index: 1
  polarity: aligned
  school_prediction: falsified
  confidence: high
  notes: Framework predicts price controls produce shortages/quality degradation (aligned with hypothesis); ML position predicts planning can allocate without price signals, so school_prediction is falsified
    for ML on this evidence.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: state_price_controls_real_consumption_shortage
version: 1
status: candidate
topic: regulatory
claim: Lower price-signal and regulatory-quality proxies predict higher inflationary shortage pressure.
methodology_note: Promoted from the second 30-item long-horizon market/QOL candidate queue as a local-data
  first-pass screen.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - inflation
  - currency_purchasing_power
  policy_family:
  - regulation
  treatment_tags:
  - price_controls
  - price_signal_integrity
variables:
  outcome:
  - name: qol_or_prosperity_outcome
    source: world_bank_wdi:FP.CPI.TOTL.ZG
    transformation: level_or_growth_proxy
  treatment:
  - name: market_or_intervention_proxy
    source: wgi:RQ.EST
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
mechanism_measurement:
  mechanism_type: price_signal_distortion
  design_features:
  - panel_fe_screen
  - controlled_vs_uncontrolled_categories
  - high_frequency_event_study
  - welfare_accounting
  - distributional_decomposition
  comparison_structure:
    treated_units:
    - country-years with lower regulatory-quality proxy
    control_units:
    - country-years with higher regulatory-quality proxy
    controlled_or_regulated_units:
    - price-controlled categories are not directly observed in this screen
    exempt_or_uncontrolled_units:
    - uncontrolled categories are not directly observed in this screen
    time_frequency: annual
    notes: >
      WGI regulatory quality and headline CPI are too broad to identify price
      controls. This is a screening association, not a mechanism test.
  causal_layers:
  - layer: first_order_price_or_transfer
    mechanism: Official prices of controlled categories are suppressed relative to uncontrolled or market-clearing prices.
    variable_names: []
    candidate_sources:
    - CPI category microdata
    - official price schedules
    - parallel market category prices
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: second_order_supply_response
    mechanism: Availability, inventories, output, or official-channel quantity fall after controls bind.
    variable_names: []
    candidate_sources:
    - stockout surveys
    - inventories
    - retail sales by controlled category
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: leakage_or_substitution
    mechanism: Black-market, informal, cross-border, or substitute-category activity rises.
    variable_names: []
    candidate_sources:
    - parallel price premiums
    - informal market shares
    - border seizure records
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: net_welfare
    mechanism: Any CPI relief must be netted against shortages, quality, search, enforcement, and future supply effects.
    variable_names: []
    candidate_sources:
    - constructed category welfare ledger
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  distributional_groups:
  - incumbent_beneficiaries
  - uncovered_consumers
  - suppliers
  - taxpayers
  - future_cohorts
  welfare_accounting:
    first_order_transfer: controlled-category official price discount times official-channel quantity
    deadweight_loss: rationed quantity and foregone legal trades
    quality_loss: quality-adjusted or package-size deterioration
    search_or_queue_cost: queue and stockout search costs
    future_supply_loss: output, inventory, and investment response
    fiscal_or_enforcement_cost: enforcement, subsidy, or inspection costs
    net_welfare_formula: consumer_transfer - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss - fiscal_or_enforcement_cost
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    A headline CPI panel cannot adjudicate shortage pressure. The current
    result should remain neutral triage until category-level evidence is added.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local-data first-pass TWFE screen; upgrade to exact treatment/outcome datasets before scoreboard
    promotion.
falsification:
  rule: SUPPORTED if the treatment coefficient has the pre-registered sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_state_price_controls_real_consumption_shortage
  threshold:
    p_value: p<0.10
    expected_sign: '-'
prior_confidence: 0.55
disclosure: These are proxy-first QOL screens. They are intended to identify promising evidence, not to
  settle causal claims without robustness checks.
steelman: hypotheses/steelman/state_price_controls_real_consumption_shortage.md

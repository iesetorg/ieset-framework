# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: heritage_property_rights_private_credit_depth_wgi_panel
version: 1
status: pre_registered
topic: regulatory
claim: In a 1996-2023 country panel, stronger rule-of-law institutions predict deeper private credit intermediation after country and year fixed effects and basic macro controls.
claim_direction: "+"
methodology_note: Graduates rank 12 from engine/queue_heritage_market_graduation.yaml. The Heritage income-region screen is used only for triage and is not scoreboard evidence; this registered follow-up replaces the latest-year Heritage property-rights score with time-varying WGI rule of law and WDI panel outcomes before estimation.
evidence_type: associational
sample:
  countries: [ARG, AUS, AUT, BEL, BRA, CAN, CHE, CHL, CHN, COL, CRI, CZE, DEU, DNK, EGY, ESP, EST, FIN, FRA, GBR, GHA, GRC, HUN, IDN, IND, IRL, ISR, ITA, JPN, KEN, KOR, LTU, LVA, MAR, MEX, MYS, NGA, NLD, NOR, NZL, PER, PHL, POL, PRT, SGP, SVK, SVN, SWE, THA, TUR, URY, USA, ZAF]
  period: [1996, 2023]
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing the outcome, treatment, or retained controls
  - do not impute WGI or WDI observations across countries
  - treat the first verdict as associational panel evidence, not causal scoreboard proof
scope:
  period: [1996, 2023]
  countries: [OECD, GLOBAL]
  outcome_dim: [financialisation, capital_flows]
  policy_family: [institutional_reform, regulation]
  treatment_tags: [property_rights, rule_of_law, private_credit_depth, heritage_graduation_wgi_panel]
variables:
  outcome:
  - name: private_credit_depth
    source: world_bank_wdi:FS.AST.PRVT.GD.ZS
    transformation: level
    notes: Domestic credit to the private sector as a share of GDP.
  treatment:
  - name: rule_of_law_wgi
    source: wgi:RL.EST
    transformation: level
    notes: WGI rule of law point estimate.
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
  - name: trade_openness_control
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: Openness control.
  - name: government_consumption_share
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
    notes: Fiscal-demand control.
intervention_channel: institutional
intervention_channel_justification: WGI rule of law is a time-varying institutional proxy for property-rights security.
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: Two-way fixed effects with country-clustered standard errors; optional leave-one-region-out checks remain a later robustness extension.
falsification:
  rule: SUPPORTED if the coefficient on rule_of_law_wgi is positive at p<0.10 with at least 30 usable observations. REFUTED if it is negative at p<0.10. Otherwise PARTIAL.
  test: panel_fe_heritage_property_rights_private_credit_depth_wgi_panel
  threshold:
    expected_sign: "+"
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.62
disclosure: This was selected from a favorable Heritage screen; the registered WGI/WDI panel must count null or opposite-signed results.
steelman: hypotheses/steelman/heritage_property_rights_private_credit_depth_income_region_robustness.md

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: banking_crisis_russia_1998_default_canonical
version: 1
status: pre_registered
methodology_note: >
  v1 promotion (2026-04-30). The candidate spec already pinned the
  canonical_metrics list, metric thresholds, data windows, and
  multi_metric_falsification counts. This promotion adds only the
  checklist estimator/falsification wrapper and leaves all metric
  thresholds unchanged before the post-commit rerun.
topic: regulatory
claim: >
  The August 1998 Russian crisis — domestic-currency sovereign default, ruble
  devaluation of >= 60% against USD, real-GDP contraction of >= 5%, banking-system
  collapse with widespread bank failures, and IMF programme entry — is the canonical
  EM sovereign-and-banking-twin-default case of the late 1990s. The hypothesis is
  that Russia 1998 meets the canonical multi-metric checklist on at least 4 of 5
  metrics.
evidence_type: canonical_case_multi_metric
sample:
  countries: [RUS]
  period: [1994, 2003]
  temporal_structure: time_series
canonical_metrics:
  - metric_id: ruble_depreciation_1998
    description: Ruble against USD peak-to-trough nominal depreciation
    threshold: ">= 60% depreciation"
    window: "1998-1999"
    source: "world_bank_wdi:PA.NUS.FCRF; bis:WS_EER"
    direction: supports_claim
    independence_justification: External-rate signal.
  - metric_id: real_gdp_decline
    description: Russia real GDP decline 1998-1999 vs 1997
    threshold: ">= 5% peak-to-trough decline"
    window: "1997-1999"
    source: "world_bank_wdi:NY.GDP.MKTP.KD; pwt:rgdpna"
    direction: supports_claim
    independence_justification: Activity measure.
  - metric_id: sovereign_default_event
    description: Sovereign default on GKO domestic debt August 1998
    threshold: "yes/no — yes counts as breach"
    window: "1998"
    source: "imf:RUS_DEFAULT_1998"
    direction: supports_claim
    independence_justification: Default event coded.
  - metric_id: systemic_banking_crisis_coded
    description: Laeven-Valencia banking-crisis coding 1998
    threshold: "coded yes"
    window: "1998-1999"
    source: "owid:systemic-banking-crises"
    direction: supports_claim
    independence_justification: Independent expert coding.
  - metric_id: cpi_inflation_spike
    description: Russia CPI inflation rise vs 1997 baseline
    threshold: ">= 50 pp YoY peak rise"
    window: "1998-1999"
    source: "world_bank_wdi:FP.CPI.TOTL.ZG; imf:PCPIPCH"
    direction: supports_claim
    independence_justification: Price-level outcome.
multi_metric_falsification:
  total_metrics: 5
  support_threshold: 4
  refute_threshold: 1

estimator:
  template: multi_metric_checklist
  clustering: none
  notes: >
    Canonical-case checklist evaluator reads canonical_metrics and
    multi_metric_falsification; no regression model is estimated.
    Each metric is scored against its pre-registered source, window,
    and threshold before applying the count rule below.

falsification:
  rule: >
    Evaluate every canonical_metrics row against its pre-registered
    source, window, and threshold. The hypothesis is SUPPORTED if at
    least 4 of 5 metrics are MET. It is REFUTED if even
    counting all pending metrics as favorable cannot reach 4
    MET metrics and the confirmed failures cross the pre-registered
    refutation guardrail. Otherwise the verdict is INCONCLUSIVE until
    pending data or pending evaluation metrics are resolved.
  test: multi_metric_checklist_canonical_banking_crisis
  threshold: "MET >= 4 of 5; REFUTE when MET + PENDING_DATA + PENDING_EVAL < 4; refutation guardrail=1"

variables:
  outcome:
    - name: real_gdp
      source: "world_bank_wdi:NY.GDP.MKTP.KD"
      transformation: peak_to_trough
    - name: cpi_inflation
      source: "world_bank_wdi:FP.CPI.TOTL.ZG"
      transformation: peak_yoy
prior_confidence: 0.96
disclosure: >
  Russia 1998 is well-documented; multi-metric pattern overdetermined.
steelman: hypotheses/steelman/banking_crisis_russia_1998_default_canonical.md
scope:
  period: [1994, 2003]
  countries: [RUS]
  outcome_dim: [financial_crisis, currency_purchasing_power, fiscal_policy, inflation]
  policy_family: [regulation, exchange_rate_regime, fiscal_policy]
  treatment_tags: [russia_1998, gko_default_1998, ruble_devaluation_1998, post_soviet_transition_crisis]

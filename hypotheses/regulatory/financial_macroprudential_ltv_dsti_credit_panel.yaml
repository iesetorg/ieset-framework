# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: financial_macroprudential_ltv_dsti_credit_panel
version: 1
status: candidate
topic: regulatory
claim: >
  Across countries that introduced loan-to-value (LTV) and debt-service-to-income
  (DSTI) macroprudential limits on residential mortgage lending in 2010-2022, the
  growth rate of household credit and the change in real residential property prices
  decelerate over the 3-year window following limit introduction relative to matched
  control country-years. The hypothesis is tested as a staggered DiD with treatment =
  first introduction of binding LTV or DSTI limit and outcome = household-credit
  growth and real-house-price growth.
evidence_type: causal
sample:
  countries: [GBR, IRL, NOR, SWE, NLD, FIN, DNK, NZL, AUS, KOR, ISR, ISL, POL, HUN, CZE, EST, LVA, LTU, SVK, SVN, BEL, AUT, PRT, CYP, MLT, LUX]
  period: [2010, 2022]
  temporal_structure: panel
  exclusion_rules:
    - drop country-years with active banking-crisis episodes
    - drop country-years where the first LTV/DSTI introduction predates 2010
variables:
  outcome:
    - name: household_credit_growth
      source: "bis:WS_TC; world_bank_wdi:FS.AST.PRVT.GD.ZS"
      transformation: yoy_pct
    - name: real_house_price_growth
      source: "bis:WS_SPP"
      transformation: yoy_pct
  treatment:
    - name: ltv_or_dsti_first_introduction
      source: "constructed: coded from BIS / IMF iMaPP macroprudential database"
      transformation: event_first_introduction
      notes: Treatment date = first binding LTV or DSTI rule. iMaPP / IMF macroprudential database is the source-of-truth chronology.
  controls:
    - name: real_gdp_growth
      source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
      transformation: yoy_pct
    - name: real_interest_rate
      source: "world_bank_wdi:FR.INR.RINR; ecb:MIR"
      transformation: level
    - name: cpi_inflation
      source: "world_bank_wdi:FP.CPI.TOTL.ZG"
      transformation: yoy_pct
intervention_channel: regulatory
intervention_channel_justification: >
  LTV / DSTI limits are macroprudential regulatory tools.
estimator:
  template: did_callaway_santanna
  clustering: country
  random_seed: 20260428
  notes: >
    Callaway-Sant'Anna staggered DiD treating first LTV/DSTI introduction as staggered
    treatment. Outcomes measured at t+1, t+2, t+3 following introduction. Robustness:
    Chaisemartin-D'Haultfoeuille event study; placebo-timing test.
falsification:
  rule: >
    SUPPORTED if CS_ATT on household-credit growth at h=2 is <= -1.5 pp/year with p < 0.05
    AND CS_ATT on real-house-price growth at h=2 is <= -1.0 pp/year with p < 0.10.
    PARTIAL if one of the two outcomes meets threshold.
    REFUTED if both ATTs are statistically zero or wrong-signed at h=2.
  test: cs_did_ltv_dsti_introduction
  threshold: "ATT_household_credit_h2 <= -1.5 pp/year at p<0.05 AND ATT_real_house_price_h2 <= -1.0 pp/year at p<0.10"
prior_confidence: 0.7
disclosure: >
  IMF iMaPP work and BIS macroprudential surveys both find statistically significant
  but quantitatively modest effects. Author market-liberal prior treats LTV/DSTI as
  the most empirically defensible macroprudential tool category.
steelman: hypotheses/steelman/financial_macroprudential_ltv_dsti_credit_panel.md
scope:
  period: [2010, 2022]
  countries: [GBR, IRL, NOR, SWE, NLD, FIN, KOR, NZL, AUS, ISR, EUROZONE, OECD]
  outcome_dim: [financial_crisis, housing, financialisation]
  policy_family: [regulation, housing_policy]
  treatment_tags: [macroprudential_ltv_dsti, imapp_database, post_gfc_macroprudential_2010s]

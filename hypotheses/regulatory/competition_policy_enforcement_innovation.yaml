# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: competition_policy_enforcement_innovation
version: 1
status: candidate
topic: regulatory

claim: >
  Across advanced and middle-income economies 1990-2020, stronger
  antitrust and competition-policy enforcement — measured by merger-
  control intensity, cartel fines per GDP, and competition-authority
  staffing — predicts higher subsequent patent quality (forward
  citations per patent) and total-factor-productivity growth over
  20-year windows. The pre-registered claim is that countries in
  the top tercile of enforcement intensity show at least 0.25
  percentage points higher annual TFP growth and 15% more citations
  per patent than countries in the bottom tercile, after controlling
  for initial income, R&D spending, and human capital.

evidence_type: associational

sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, NLD, BEL, AUT, SWE, NOR, DNK, FIN, IRL, CHE, PRT, GRC, JPN, CAN, AUS, NZL, KOR, ISR, EST, POL, CZE, HUN, CHL, MEX, ZAF, TUR, BRA, COL, ARG, THA, MYS]
  period: [1990, 2020]
  temporal_structure: panel
  exclusion_rules:
    - "drop country-years where competition-authority data is unavailable or the authority was created within the prior 3 years"
    - "drop observations with zero patent filings (citation metrics undefined)"

scope:
  period: [1990, 2020]
  countries: [OECD, ASIA_EM, LATAM]
  outcome_dim: [productivity, competition_concentration, industrial_capability]
  policy_family: [competition_policy, regulation, industrial_policy]
  treatment_tags: [antitrust_enforcement, merger_control, cartel_fines, patent_quality]

variables:
  outcome:
    - name: tfp_growth_20yr
      source: "pwt:rtfpna"
      transformation: "log_diff_20yr"
    - name: patent_citations_per_patent
      source: "wipo:patent_citations"
      transformation: "level"
      notes: "WIPO forward citations per patent family, 5-year window. USPTO alternative for robustness."
    - name: patent_quality_index
      source: "constructed: citations_per_patent × claims_per_patent"
      transformation: "level"
      notes: "Composite patent-quality proxy."
  treatment:
    - name: competition_enforcement_intensity
      source: "constructed: 0.4×merger_cases_per_gdp + 0.4×cartel_fines_per_gdp + 0.2×ca_staff_per_million_pop"
      transformation: "level"
      notes: "Composite enforcement-intensity index. Data from OECD Competition Committee, national competition authorities, and Duso et al. merger databases."
    - name: merger_control_cases_per_gdp
      source: "oecd:competition_merger_cases"
      transformation: "per_gdp"
    - name: cartel_fines_per_gdp
      source: "oecd:competition_cartel_fines"
      transformation: "per_gdp"
  controls:
    - name: log_initial_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: "log"
    - name: rd_spending_share_gdp
      source: "world_bank_wdi:GB.XPD.RSDV.GD.ZS"
      transformation: "level"
    - name: human_capital_index
      source: "pwt:hc"
      transformation: "level"
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: "level"
    - name: ipr_protection_index
      source: "fraser_efw:property_rights"
      transformation: "level"
      notes: "Fraser IPR protection to separate competition enforcement from intellectual-property security."

intervention_channel: regulatory
intervention_channel_justification: >
  Antitrust enforcement, merger control, and cartel prosecution are
  core regulatory-channel interventions. The hypothesis tests
  whether the intensity of competition-policy regulation predicts
  innovation and productivity outcomes.

estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Panel FE with forward-differenced outcomes on lagged
    enforcement intensity. Tercile-comparison robustness. IV
    robustness using EU-driven competition-reform timing as
    instrument for enforcement intensity in European sub-sample.
    Robustness to patent-quality definition (USPTO vs WIPO
    citations).

falsification:
  rule: >
    Not supported if (a) the panel-FE coefficient on enforcement
    intensity is not positive and significant at p<0.05 on either
    TFP growth or patent citations, OR (b) the top-tercile vs
    bottom-tercile mean gap in TFP growth is below 0.15 pp/year,
    OR (c) the result is driven entirely by the US (disappears
    when US is dropped). A "big is beautiful" / industrial-policy
    reading wins if merger-control intensity is negatively
    associated with patent quality (suggesting that blocking
    mergers prevents scale economies in R&D).
  test: panel_fe_enforcement_intensity_on_tfp_and_patents
  threshold: >
    panel_FE_beta(enforcement_intensity → tfp_growth_20yr) > 0 at p<0.05
    AND panel_FE_beta(enforcement_intensity → citations_per_patent) > 0 at p<0.05
    AND top_tercile_mean_tfp_gap >= 0.25 pp/yr

prior_confidence: 0.55

disclosure: >
  The competition-innovation literature is genuinely contested:
  Aghion et al. (2005) find an inverted-U, while Segal-Whinston
  and others emphasise that antitrust can deter R&D cooperation.
  Author's market-liberal priors lean toward the pro-competition
  side but prior 0.55 reflects the theoretical ambiguity. Bias
  risk: author may over-weight US and EU enforcement episodes and
  under-weight East Asian developmental states (Korea, Taiwan)
  where industrial policy and relatively lax merger control
  coincided with rapid innovation catch-up.

steelman: hypotheses/steelman/competition_policy_enforcement_innovation.md

linked_hypotheses:
  - product_market_regulation_tfp_30yr_panel
  - sectoral_competition_services_productivity

notes: >
  Competition-authority staffing and cartel-fine data are patchy
  outside OECD; the composite index will have substantial missing
  data for emerging markets. This is flagged as a data-dependency.

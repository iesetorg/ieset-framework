# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: chicago_school_voucher_choice_test_score_gain_meta
version: 1
status: candidate
topic: regulatory

claim: >
  Across the empirical universe of school-voucher and means-tested
  school-choice programmes that have been evaluated with random-assignment
  or quasi-random-assignment designs (USA Milwaukee, Cleveland, DC OSP,
  New York School Choice Scholarships, Louisiana, Indiana; Chile post-1980
  voucher; Sweden post-1992 friskolor; Colombia PACES), the population-
  weighted mean effect on standardised reading and mathematics test
  scores is positive at +0.05 to +0.15 standard deviations after 2-4
  years of programme exposure, with effects largest for low-income
  participants drawn from the worst-performing public schools. The
  hypothesis is Friedman's (1962 Capitalism and Freedom) prediction
  that vouchers permit competitive sorting that raises measured human
  capital outcomes for the marginal participant.

evidence_type: causal

sample:
  countries: [USA, CHL, SWE, COL, IND]
  period: [1990, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "include only RCT or RD-quasi-RCT evaluations; non-randomised observational studies are excluded from the primary meta-estimator"
    - "drop programmes with fewer than 200 student-year observations or follow-up windows shorter than 2 years"

scope:
  period: [1990, 2024]
  countries: [USA, CHL, SWE, COL, IND, OECD]
  outcome_dim: [employment_labour, productivity, regulation_compliance_cost]
  policy_family: [regulation, welfare_architecture]
  treatment_tags: [friedman_voucher_1962, school_choice_meta, voucher_programmes, charter_school_lottery]

variables:
  outcome:
    - name: standardised_reading_score_effect_size
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: hedges_g_random_effects
      notes: "Hedges' g effect size on standardised reading score, random-effects meta. Effect-size data from registered RCT/RD evaluations harvested from academic publishers; pre-registered exclusion of non-RCT evidence."
    - name: standardised_maths_score_effect_size
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: hedges_g_random_effects
    - name: high_school_graduation_rate
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: marginal_effect_pp
      notes: "Long-run outcome where available (Chetty et al. 2014 Charter Schools secondary)."
  treatment:
    - name: voucher_or_choice_lottery_assignment
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: indicator_treatment_assignment
      notes: "Random or pseudo-random assignment to voucher / choice programme."
  controls:
    - name: programme_funding_per_pupil
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: log_usd_2020
    - name: counterfactual_public_school_quality
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: standardised_test_score_baseline
      notes: "Voucher effect is theorised to be largest where public-school counterfactual is worst; included as a moderator."
    - name: programme_age_years
      source: "academic:hoxby_chetty_angrist_meta_voucher_rct"
      transformation: integer_years
    - name: country_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.PP.KD"
      transformation: log

intervention_channel: regulatory
intervention_channel_justification: >
  Voucher / school-choice programmes are a regulatory intervention in
  the public-education monopoly; the treatment is a change in the
  rules-of-access to schooling, not a fiscal transfer per se.

estimator:
  template: panel_fe_decomposition
  fixed_effects: [study_id]
  clustering: study_id
  notes: >
    Random-effects meta-analysis pooling RCT and RD-design effect
    estimates with study-level random intercepts and inverse-variance
    weights. Forest plot reported per outcome (reading, maths, graduation).
    Moderator analysis: counterfactual public-school quality, programme
    age, country-level institutional quality. PRISMA-style search
    protocol pre-registered: search the academic-publisher corpus
    (Angrist, Hoxby, Chetty, Hanushek, Wolf) for all RCT / lottery /
    RD designs published 1995-2024.

falsification:
  rule: >
    Not supported if the random-effects pooled effect on EITHER reading
    OR maths is below +0.05 SD with confidence interval including zero,
    OR if the moderator-analysis does not show larger effects in
    bottom-quartile-public-school counterfactual contexts, OR if the
    Chilean post-1980 panel (long-run, large-N case) shows pooled
    null or negative results. A heterodox / Hirschman exit-vs-voice
    reading wins cleanly if pooled reading effect < 0 OR pooled maths
    effect < 0 at p<0.05. Publication-bias correction (trim-and-fill,
    PET-PEESE) must leave the pooled estimate above +0.03 SD; if it
    does not, the result is treated as publication-driven and
    insufficient.
  test: random_effects_meta_voucher_test_score_with_publication_correction
  threshold: >
    pooled_reading_effect >= 0.05 SD with CI excluding zero
    AND pooled_maths_effect >= 0.05 SD with CI excluding zero
    AND PET-PEESE bias-corrected pooled effect >= 0.03 SD
    AND moderator effect: bottom-quartile public school context > top-quartile by >= 0.05 SD

prior_confidence: 0.6

disclosure: >-
  School choice is Friedman's (1962) signature application of price-
  theoretic reasoning to public-services delivery, and the empirical
  literature is highly contested. Heterodox / progressive readers
  argue (i) pooled effects are small and concentrated in cherry-picked
  studies; (ii) Chilean voucher experience produced sorting and
  inequality without measurable mean test-score gains; (iii) charter
  / voucher RCTs are vulnerable to compliance and attrition bias;
  (iv) the long-run Chetty et al. results on charters support charters
  but not voucher generalisation. Author's market-liberal priors
  favour Friedman's prediction; prior_confidence at 0.6 reflects that
  the meta-analytic literature is genuinely mixed and the publication-
  bias correction is load-bearing — a finding that survives PET-PEESE
  is meaningful, one that does not is not.

steelman: hypotheses/steelman/chicago_school_voucher_choice_test_score_gain_meta.md

linked_hypotheses:
  - chicago_taxes_optimal_ramsey_excess_burden_high_marginal_rate

notes: >
  Hoxby (2003), Angrist-Bettinger-Kremer (2006 PACES), Wolf et al.
  (2010 DC OSP), Abdulkadiroglu-Pathak-Walters (2018 Boston charters),
  Chingos-Peterson (2015 NY SCSF) form the core US RCT corpus.
  Hsieh-Urquiola (2006) is the canonical sceptical Chilean voucher
  study and is included as a falsifying-direction reference. Specifying
  publication-bias correction in advance is the structural defence
  against author's pro-voucher prior.

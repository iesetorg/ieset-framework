# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: banking_crisis_us_2023_svb_signature
version: 1
status: pre_registered
methodology_note: >
  v1 promotion (2026-04-30). The candidate spec already pinned the
  canonical_metrics list, metric thresholds, data windows, and
  multi_metric_falsification counts. This promotion adds only the
  checklist estimator/falsification wrapper and leaves all metric
  thresholds unchanged before the post-commit rerun.
topic: regulatory
claim: >
  The March 2023 US regional-banking distress — Silicon Valley Bank failure
  10-Mar-2023, Signature Bank failure 12-Mar-2023, First Republic Bank failure
  1-May-2023, plus the Bank Term Funding Program created 12-Mar-2023 — was a
  duration-mismatch / uninsured-deposit-flight event triggered by the 2022-2023
  Fed-tightening cycle marking long-duration AFS securities below-water. The
  hypothesis is that the 2023 episode meets a tightly-scoped multi-metric checklist
  on at least 4 of 5 metrics WITHOUT producing a Laeven-Valencia-grade systemic
  outcome.
evidence_type: canonical_case_multi_metric
sample:
  countries: [USA]
  period: [2021, 2024]
  temporal_structure: time_series
canonical_metrics:
  - metric_id: svb_signature_failure_dates
    description: SVB and Signature Bank closed by FDIC within same week March 2023
    threshold: "yes/no — yes counts as breach"
    window: "2023-03-10/2023-03-12"
    source: "fred:SVB_SIGNATURE_FAILURE_2023"
    direction: supports_claim
    independence_justification: Resolution event.
  - metric_id: btfp_facility_creation
    description: Bank Term Funding Program created 12-Mar-2023 by Fed
    threshold: "yes/no — yes counts as breach"
    window: "2023"
    source: "fred:H41RESPPALDKNWW; fred:BTFP_2023"
    direction: supports_claim
    independence_justification: Liquidity-facility event.
  - metric_id: regional_bank_equity_decline
    description: KBW Regional Bank index (or proxy) peak-to-trough in 2023
    threshold: ">= 25% decline March-May 2023"
    window: "2023-03 to 2023-05"
    source: "fred:WILLREITPR; fred:DJUSBK"
    direction: supports_claim
    independence_justification: Equity-market signal, distinct from balance-sheet metrics.
  - metric_id: large_uninsured_deposit_outflow
    description: Aggregate deposit decline at small US commercial banks
    threshold: ">= USD 200bn outflow over 8 weeks"
    window: "2023-03 to 2023-05"
    source: "fred:DPSACBW027SBOG"
    direction: supports_claim
    independence_justification: Bank-liability flow data.
  - metric_id: real_gdp_growth_undisturbed
    description: US real GDP growth NOT disturbed materially in 2023
    threshold: "annual growth >= 2% in 2023 (negative-control: episode did NOT propagate to macro)"
    window: "2023"
    source: "fred:GDPC1"
    direction: supports_claim
    independence_justification: Activity measure used as confirming-non-propagation.
multi_metric_falsification:
  total_metrics: 5
  support_threshold: 4
  refute_threshold: 1

estimator:
  template: multi_metric_checklist
  clustering: none
  notes: >
    Canonical-case checklist evaluator reads canonical_metrics and
    multi_metric_falsification; no regression model is estimated.
    Each metric is scored against its pre-registered source, window,
    and threshold before applying the count rule below.

falsification:
  rule: >
    Evaluate every canonical_metrics row against its pre-registered
    source, window, and threshold. The hypothesis is SUPPORTED if at
    least 4 of 5 metrics are MET. It is REFUTED if even
    counting all pending metrics as favorable cannot reach 4
    MET metrics and the confirmed failures cross the pre-registered
    refutation guardrail. Otherwise the verdict is INCONCLUSIVE until
    pending data or pending evaluation metrics are resolved.
  test: multi_metric_checklist_canonical_banking_crisis
  threshold: "MET >= 4 of 5; REFUTE when MET + PENDING_DATA + PENDING_EVAL < 4; refutation guardrail=1"

variables:
  outcome:
    - name: regional_bank_equity_index
      source: "fred:DJUSBK"
      transformation: peak_to_trough
    - name: small_bank_deposits
      source: "fred:DPSACBW027SBOG"
      transformation: cumulative_change
prior_confidence: 0.94
disclosure: >
  March 2023 US regional-bank episode is recent and well-documented; pattern
  overdetermined as duration-mismatch failure mode rather than credit-boom-bust.
steelman: hypotheses/steelman/banking_crisis_us_2023_svb_signature.md
scope:
  period: [2021, 2024]
  countries: [USA]
  outcome_dim: [financial_crisis, financialisation, monetary_policy]
  policy_family: [regulation, monetary_policy]
  treatment_tags: [svb_2023, signature_bank_2023, btfp_2023, duration_mismatch_failure]

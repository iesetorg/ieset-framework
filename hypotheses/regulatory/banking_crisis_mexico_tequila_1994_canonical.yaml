# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: banking_crisis_mexico_tequila_1994_canonical
version: 1
status: pre_registered
methodology_note: >
  v1 promotion (2026-04-30). The candidate spec already pinned the
  canonical_metrics list, metric thresholds, data windows, and
  multi_metric_falsification counts. This promotion adds only the
  checklist estimator/falsification wrapper and leaves all metric
  thresholds unchanged before the post-commit rerun.
topic: regulatory
claim: >
  Mexico's December-1994 Tequila Crisis — peso devaluation against the USD by >= 50%,
  IMF / US Treasury rescue package, real-GDP contraction of >= 6% in 1995, and a
  Laeven-Valencia-coded systemic banking crisis 1994-1996 — is the canonical
  EM-currency-and-banking-twin-crisis case of the early 1990s. The hypothesis is that
  Mexico 1994-1996 meets the canonical multi-metric checklist on at least 4 of 5
  metrics.
evidence_type: canonical_case_multi_metric
sample:
  countries: [MEX]
  period: [1990, 2000]
  temporal_structure: time_series
canonical_metrics:
  - metric_id: peso_depreciation_1994_1995
    description: Mexican peso peak-to-trough nominal depreciation against USD
    threshold: ">= 50% depreciation"
    window: "1994-1995"
    source: "world_bank_wdi:PA.NUS.FCRF; bis:WS_EER"
    direction: supports_claim
    independence_justification: External-rate signal.
  - metric_id: real_gdp_decline_1995
    description: Mexico real GDP decline 1995 vs 1994
    threshold: ">= 6% decline"
    window: "1994-1996"
    source: "world_bank_wdi:NY.GDP.MKTP.KD"
    direction: supports_claim
    independence_justification: Activity measure.
  - metric_id: imf_us_treasury_programme
    description: IMF SBA + US Treasury ESF support in 1995
    threshold: "yes/no — yes counts as breach"
    window: "1995"
    source: "imf:SBA_MEX_1995"
    direction: supports_claim
    independence_justification: Programme metadata.
  - metric_id: systemic_banking_crisis_coded
    description: Laeven-Valencia banking-crisis coding 1994-1996
    threshold: "coded yes"
    window: "1994-1996"
    source: "owid:systemic-banking-crises"
    direction: supports_claim
    independence_justification: Independent expert coding.
  - metric_id: current_account_reversal
    description: Mexico current-account-balance swing
    threshold: ">= 5 pp of GDP swing 1994-1996"
    window: "1993-1996"
    source: "world_bank_wdi:BN.CAB.XOKA.GD.ZS"
    direction: supports_claim
    independence_justification: External-balance signal.
multi_metric_falsification:
  total_metrics: 5
  support_threshold: 4
  refute_threshold: 1

estimator:
  template: multi_metric_checklist
  clustering: none
  notes: >
    Canonical-case checklist evaluator reads canonical_metrics and
    multi_metric_falsification; no regression model is estimated.
    Each metric is scored against its pre-registered source, window,
    and threshold before applying the count rule below.

falsification:
  rule: >
    Evaluate every canonical_metrics row against its pre-registered
    source, window, and threshold. The hypothesis is SUPPORTED if at
    least 4 of 5 metrics are MET. It is REFUTED if even
    counting all pending metrics as favorable cannot reach 4
    MET metrics and the confirmed failures cross the pre-registered
    refutation guardrail. Otherwise the verdict is INCONCLUSIVE until
    pending data or pending evaluation metrics are resolved.
  test: multi_metric_checklist_canonical_banking_crisis
  threshold: "MET >= 4 of 5; REFUTE when MET + PENDING_DATA + PENDING_EVAL < 4; refutation guardrail=1"

variables:
  outcome:
    - name: real_gdp
      source: "world_bank_wdi:NY.GDP.MKTP.KD"
      transformation: peak_to_trough
    - name: nominal_xr_usd
      source: "world_bank_wdi:PA.NUS.FCRF"
      transformation: peak_to_trough
prior_confidence: 0.96
disclosure: >
  Tequila Crisis is one of the most-studied EM twin crises; metric pattern overdetermined.
steelman: hypotheses/steelman/banking_crisis_mexico_tequila_1994_canonical.md
scope:
  period: [1990, 2000]
  countries: [MEX]
  outcome_dim: [financial_crisis, financialisation, currency_purchasing_power, capital_flows]
  policy_family: [regulation, exchange_rate_regime, monetary_policy]
  treatment_tags: [mexico_tequila_1994, peso_devaluation_1994, twin_crisis_em, imf_us_treasury_rescue_1995]

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: local_panel_sprint_tax_revenue_gdp_pc_growth_20260503
version: 1
status: pre_registered
topic: fiscal
claim: Across a pre-registered panel of OECD and major emerging-market economies from 1996 to 2023, larger tax-revenue
  shares predict slower real GDP per capita growth after country and year fixed effects and basic macro controls.
  This sprint test uses only local vintages and does not create school-scoreboard links.
methodology_note: High-throughput local-data sprint wave. The spec is registered before estimation, uses only already-local
  vintages, and deliberately omits position covers_claims so hypothesis testing can advance without creating fragile
  school-scoreboard mappings.
evidence_type: associational
sample:
  countries:
  - ARG
  - AUS
  - AUT
  - BEL
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CRI
  - CZE
  - DEU
  - DNK
  - EGY
  - ESP
  - EST
  - FIN
  - FRA
  - GBR
  - GHA
  - GRC
  - HUN
  - IDN
  - IND
  - IRL
  - ISR
  - ITA
  - JPN
  - KEN
  - KOR
  - LTU
  - LVA
  - MAR
  - MEX
  - MYS
  - NGA
  - NLD
  - NOR
  - NZL
  - PER
  - PHL
  - POL
  - PRT
  - SGP
  - SVK
  - SVN
  - SWE
  - THA
  - TUR
  - URY
  - USA
  - ZAF
  period:
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing outcome, treatment, or retained controls
  - do not impute treatment values across countries
  - treat as associational evidence unless a later causal design is registered
scope:
  period:
  - 1996
  - 2023
  countries:
  - OECD
  - GLOBAL
  outcome_dim:
  - gdp_growth
  - productivity
  policy_family:
  - fiscal_policy
  - tax_policy
  treatment_tags:
  - tax_burden
  - tax_revenue
  - private_incentives
variables:
  outcome:
  - name: gdp_pc_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: level
    notes: annual real GDP per capita growth
  treatment:
  - name: tax_revenue_share
    source: world_bank_wdi:GC.TAX.TOTL.GD.ZS
    transformation: level
    notes: tax revenue as a share of GDP
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
  - name: trade_openness_control
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: External-openness control.
intervention_channel: fiscal
intervention_channel_justification: The treatment operationalizes tax revenue as a share of GDP as a time-varying
  policy or institutional proxy rather than an ex-post result screen.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Two-way fixed effects with country-clustered standard errors.
falsification:
  rule: SUPPORTED if the coefficient on tax_revenue_share is negatively signed at p<0.10 with at least 30 usable
    observations after listwise deletion. REFUTED if the coefficient is significantly opposite-signed at p<0.10.
    Otherwise PARTIAL.
  test: panel_fe_local_panel_sprint_tax_revenue_gdp_pc_growth_20260503
  threshold:
    expected_sign: '-'
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.51
disclosure: This sprint intentionally prioritizes throughput and may include broad proxies. Favorable selection
  risk is handled by committing the hypothesis, variables, sample, and direction before estimation; null and contrary
  results count.
steelman: hypotheses/steelman/local_panel_sprint_tax_revenue_gdp_pc_growth_20260503.md
notes: Hypothesis-only sprint test; no school-scoreboard linkage is asserted.

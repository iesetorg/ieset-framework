  exclusion_rules:
  - drop country-years with active high-intensity civil conflict (UCDP intensity-2+)
  - drop transition-economy years 1989-1994 for ex-communist countries where institutions were in flux
  - drop observations where government spending/GDP > 90% (likely wartime or data error)

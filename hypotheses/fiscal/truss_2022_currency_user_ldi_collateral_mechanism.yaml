hypothesis_id: truss_2022_currency_user_ldi_collateral_mechanism
version: 1
status: candidate
topic: fiscal
claim: The September 2022 UK gilt-market dysfunction had its operative amplification mechanism in the foreign-currency-collateral exposure of the Liability-Driven Investment (LDI) leveraged-derivative chain in the UK pension system, not in a "fiscal limit" reached by the sovereign issuer. Specifically, the 30y gilt yield spiked because forced LDI collateral calls on USD/EUR-denominated swap counterparties triggered a self-reinforcing fire-sale; UK pension funds were effectively foreign-currency users at the margin even though the UK sovereign was a currency issuer. The pattern was resolved by the BoE intervening as issuer-of-last-resort within four trading days, with full reversal of the gilt-yield spike, and the institutional reform that followed (LDI collateral standards) was a financial-stability measure rather than fiscal credibility restoration. This contrasts the MMT/PK currency-user-vs-issuer mechanism with the mainstream reading of Truss as a fiscal-credibility event.
notes: 'Companion to the existing uk_truss_mini_budget_currency_sovereign_mechanism spec; that spec frames the question generally as institutional-rupture vs hard-fiscal-limit, while this candidate spec is more specific: the operative channel was the LDI collateral fire-sale, and the pension funds were the marginal currency-user. Tests the BIS / BoE Financial Stability Report decomposition. The standard mainstream read locates the mechanism in fiscal-credibility loss; this read locates it in institutional design and FX-collateral exposure of pension intermediaries.'
prior_confidence: 0.6
disclosure: 'Author has market-liberal priors and is sceptical of the strongest MMT generalisation that all fiscal-credibility episodes are reducible to institutional-rupture. The Truss episode is the cleanest case because the BoE intervention reversed yields fully within days and the LDI mechanism is documented in BoE FSR; the broader inference does not extend automatically. Specification risk: attributing the spike to LDI collateral specifically requires high-frequency data the BoE has only released in aggregate.'
falsification:
  rule: "The hypothesis is falsified if any of the following hold for the September 2022 gilt-crisis window: (a) the 30y gilt yield does NOT fall by at least 100 basis points within 5 trading days of the BoE 28 September gilt-purchase facility announcement, (b) the BoE Financial Stability Report and TPR LDI investigation do NOT identify forced collateral calls on FX-denominated derivative positions as the proximate amplification mechanism, OR (c) GBP spot does NOT recover to within 3% of pre-mini-budget level by end-October 2022 absent further fiscal news. Falsification requires (a) AND ((b) OR (c)) \u2014 primary gate is the BoE intervention yield reversal."
  test: ldi_collateral_fire_sale_event_study_2022
  threshold: 30y_gilt_yield reversal >= 100bp within 5 trading days of 2022-09-28 AND (BoE/TPR identifies LDI collateral channel OR GBP recovers to within 3% of pre-event level by 2022-10-31)
evidence_type: associational
sample:
  countries:
  - GBR
  period:
  - 2022
  - 2023
  temporal_structure: time_series
  exclusion_rules:
  - exclude US-CPI release dates within event windows when global yields moved on US data not UK fiscal news
  - treat the BoE 28 Sept 2022 gilt-purchase announcement as a separate event from the 23 Sept mini-budget
  - high-frequency intra-day data preferred where available; daily fallback

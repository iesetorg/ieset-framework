hypothesis_id: zlb_state_dependent_multiplier_pk_framing
version: 1
status: candidate
topic: fiscal
claim: "Across OECD economies 1995-2021, the cumulative fiscal multiplier on real output at the zero lower bound (defined as quarters with policy rate \u2264 0.50% AND inflation expectations anchored below 2.5%) exceeds 1.2 at horizon h=8 quarters, while the comparable normal-regime multiplier is below 0.7. The state-dependent gap of \u22650.5 is robust to fiscal-shock identification (narrative, forecast-error, and defence-news IV), supports the PK functional-finance prediction that fiscal expansion at slack is genuinely expansionary rather than crowding out, and refutes the standard Ricardian-equivalence prediction of multipliers below unity. Hypothesis is framed from PK functional-finance priors rather than the New-Keynesian state-dependence priors that animate the existing fiscal_multipliers_zlb_higher_than_normal_regime spec; the empirical surface is similar but the framing locates the multiplier-gap in genuine demand-side activation rather than in a log-linearised crowding-out suppression\
  \ at the ZLB."
notes: "Companion to the existing fiscal_multipliers_zlb_higher_than_normal_regime draft. Where that draft is framed from CER / Auerbach-Gorodnichenko New-Keynesian state-dependence, this hypothesis is framed from PK functional-finance: deficit-driven nominal demand creation in a slack regime is genuinely expansionary and the multiplier-gap is the observable signature, not a temporary artefact of suppressed crowding-out. Tests the same empirical surface but pre-registers a sharper threshold (gap \u22650.5) and the PK rather than NK interpretation."
prior_confidence: 0.65
disclosure: 'Author has market-liberal priors. The empirical state-dependence finding is well-established (Ramey-Zubairy 2018; Auerbach-Gorodnichenko 2012) and the contested step is the theoretical interpretation. Spec risk: "PK functional-finance" reading is partly observationally equivalent to the NK ZLB-suppression reading; the test cannot fully distinguish them. The multiplier-gap is the empirical surface both schools share.'
falsification:
  rule: 'The hypothesis is falsified if any of the following hold on the OECD quarterly panel 1995-2021: (a) the cumulative ZLB multiplier on real GDP at h=8 quarters is below 1.0, (b) the normal-regime multiplier at h=8 is above 1.0, OR (c) the gap (ZLB minus normal) is below 0.5 at p<0.10 in the state-dependent LP-IV. Robustness requirements: gap result must hold under both narrative and forecast-error fiscal-shock identification; failure under both refutes; failure under one but not the other is INFORMATIVE-mixed.'
  test: state_dependent_lp_iv_zlb_multiplier_gap
  threshold: cumulative_multiplier_zlb_h8 >= 1.2 AND cumulative_multiplier_normal_h8 < 0.7 AND gap_p_value < 0.10
evidence_type: associational
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - CAN
  - CHE
  - DEU
  - DNK
  - ESP
  - FIN
  - FRA
  - GBR
  - IRL
  - ITA
  - JPN
  - KOR
  - NLD
  - NOR
  - NZL
  - PRT
  - SWE
  - USA
  period:
  - 1995
  - 2021
  temporal_structure: panel
  exclusion_rules:
  - drop country-quarters in a banking crisis as coded by Laeven-Valencia
  - drop COVID 2020Q2 from primary regressions; retain for ZLB-COVID robustness window
  - require inflation expectations data to confirm anchored regime; drop country-quarters where 5y inflation expectations exceed 2.5%
variables:
  outcome:
  - name: real_gdp_growth_quarterly
    source: oecd:NAQ_GDP; imf:NGDP_RPCH; fred:GDPC1
    transformation: pct_yoy
  - name: real_gdp_level
    source: oecd:NAQ_GDP; fred:GDPC1
    transformation: log_level
    notes: Used for cumulative-multiplier construction (Ramey-Zubairy approach).
  - name: unemployment_rate
    source: oecd:harmonised_unemployment; ilostat:unemployment_rate
    transformation: pct_labour_force
  - name: real_consumption
    source: oecd:NAQ_consumption; fred:PCEC96
    transformation: log_level
    notes: Distinguishes PK demand-activation from Ricardian-equivalence prediction directly.
  treatment:
  - name: government_consumption_shock
    source: oecd:NAQ_government_consumption
    transformation: pct_gdp_innovation
  - name: narrative_fiscal_shock
    source: 'manual: Ramey-Zubairy military news shocks; Guajardo-Leigh-Pescatori narrative consolidations'
    transformation: pct_gdp
  - name: zlb_anchored_regime_indicator
    source: "constructed: indicator = 1 in country-quarters where short-rate (fred:DFF, ecb:FM, boj:policy_rate, boe:IUDBEDR) \u2264 0.50% AND 5y inflation expectations \u2264 2.5%"
    transformation: binary
    notes: Tighter regime definition than the existing NK-framed spec; requires anchored expectations.
  instruments:
  - name: military_buildup_news
    source: 'manual: Ramey defence-news series, US 1939+; Owyang-Ramey-Zubairy international panel for OECD'
    transformation: pct_gdp_pdv
  controls:
  - name: short_term_policy_rate
    source: fred:DFF; ecb:FM; boj:policy_rate; boe:IUDBEDR; rba:cash_rate; statcan:overnight_rate
    transformation: level_pct
  - name: output_gap
    source: oecd:OutputGap
    transformation: pct_potential
  - name: cyclically_adjusted_primary_balance
    source: imf:GGXCNL_NGDP; oecd:underlying_primary_balance
    transformation: pct_gdp
  - name: inflation_expectations_5y
    source: ecb:5Y_inflation_swap; fred:T5YIE
    transformation: level_pct
intervention_channel: fiscal
estimator:
  template: lp_iv
  clustering: country
  fixed_effects:
  - country
  - year
  notes: 'State-dependent LP-IV (Ramey-Zubairy / Auerbach-Gorodnichenko) with regime indicator (ZLB-anchored vs normal) on OECD quarterly panel 1995-2021. Identified fiscal shocks via narrative and forecast-error series; instrumented by Ramey defence-news. Cumulative multiplier at h=8 quarters constructed per Ramey-Zubairy. Robustness: regime-cutoff sensitivity (0.25%, 0.50%, 0.75%); anchored-expectations cutoff sensitivity (2.0%, 2.5%, 3.0%).'
scope:
  period:
  - 1995
  - 2021
  countries:
  - USA
  - OECD
  outcome_dim:
  - fiscal_policy
  - gdp_growth
  - monetary_policy
  - employment_labour
  policy_family:
  - fiscal_policy
  - monetary_policy
  treatment_tags:
  - zero_lower_bound
  - arra_2009
  - covid_fiscal_support_2020
  - abenomics_2013
  - monetary_fiscal_coordination
covers_claims: []
steelman: hypotheses/steelman/zlb_state_dependent_multiplier_pk_framing.md
linked_hypotheses:
- fiscal_multipliers_zlb_higher_than_normal_regime
- monetary_finance_zlb_no_inflation

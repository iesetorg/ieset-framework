# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: gfc_balance_sheet_recession_post_2008_household_dual_mandate
version: 1
status: candidate
topic: fiscal
claim: >
  Following Koo (2008, 2014), the post-2008 advanced-economy recovery
  exhibited the diagnostic pattern of a balance-sheet recession: the
  private sector (households especially, plus non-financial business
  in the most leveraged countries) shifted simultaneously from net
  borrowing to net saving in pursuit of debt reduction, even when
  policy interest rates were at the zero lower bound. The post-Keynesian
  reading is that conventional monetary policy is impotent in this
  state and that fiscal expansion is necessary to absorb the private-
  sector saving surplus and prevent depression-grade output collapse.
  The hypothesis tests, in a panel of advanced economies 2007-2014,
  whether (a) household saving rate rose materially while household
  debt-to-disposable-income fell, (b) non-financial business net lending
  to GDP turned positive (i.e. corporate sector saving), and (c)
  countries that ran larger general-government deficits absorbing the
  private-sector saving experienced shallower output collapses than
  countries that consolidated quickly.
evidence_type: associational
sample:
  countries: [USA, GBR, IRL, ESP, NLD, DNK, FRA, DEU, ITA, PRT, BEL, AUT, SWE, NOR, FIN, CAN, AUS, JPN, CHE, NZL, GRC]
  period: [2005, 2014]
  temporal_structure: panel
  exclusion_rules:
    - drop country-years missing sectoral-net-lending series
    - drop country-years where eurozone-periphery sovereign-financing constraints overrode fiscal-policy choice (effectively GRC 2010+, IRL 2011-2013, PRT 2011-2013) — but report as separate sub-sample for the corner-solution case
variables:
  outcome:
    - name: cumulative_real_gdp_change_2007_2014
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: cumulative
      notes: >
        Cumulative real GDP change from 2007 peak to 2014 (or recovery
        year). Outcome of interest for the Koo test: shallower
        collapse + faster recovery in countries with looser fiscal
        path.
  treatment:
    - name: household_saving_rate
      source: oecd:OECD.SDD.NAD,DSD_NASEC_T7HH@DF_T7HH,1.0
      transformation: level
      notes: >
        OECD sectoral-accounts household net saving as percent of
        disposable income. Koo balance-sheet-recession diagnostic.
        Dataflow URN approximate; verify at wiring.
    - name: household_debt_disposable_income
      source: world_bank_wdi:FS.AST.PRVT.GD.ZS
      transformation: level
      notes: BIS total credit to households / household gross disposable income.
    - name: nonfinancial_corporate_net_lending_gdp
      source: oecd:OECD.SDD.NAD,DSD_NASEC_T7NF@DF_T7NF,1.0
      transformation: level
      notes: >
        Non-financial corporate sector net lending as percent of GDP.
        Koo's signature: corporate sector turning saver in
        balance-sheet recession.
    - name: general_government_balance_gdp
      source: world_bank_wdi:GC.NLD.TOTL.GD.ZS
      transformation: level
      notes: >
        General government net lending / borrowing as percent of GDP.
        Independent variable in the cross-country test of fiscal-
        absorption magnitude.
  controls:
    - name: pre_crisis_household_credit_gdp
      source: world_bank_wdi:FS.AST.PRVT.GD.ZS
      transformation: level_2007
      notes: Pre-crisis household leverage; conditions on initial fragility.
    - name: pre_crisis_house_price_overvaluation
      source: bis:WS_SPP
      transformation: deviation_from_trend_2007
    - name: short_term_interest_rate_zlb_indicator
      source: oecd:OECD.SDD.STES,DSD_KEI@DF_KEI,4.0
      transformation: zlb_indicator
      notes: Indicator for whether short-rate is at-or-near zero in country-year.
    - name: log_population
      source: world_bank_wdi:SP.POP.TOTL
      transformation: log
estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country]
  notes: >
    Two-stage descriptive-plus-associational design. Stage 1: document
    that household saving rate rose AND household-debt-to-DI fell
    AND corporate net lending turned positive in the post-2008 period
    in the leveraged sub-sample (USA, GBR, ESP, IRL, NLD). Stage 2:
    cross-country panel regression of cumulative-real-GDP-change-2007-
    2014 on average general-government-deficit-to-GDP 2008-2012,
    conditioning on pre-crisis leverage and house-price overvaluation,
    with country-clustered SEs. Robustness: drop eurozone-periphery
    constrained countries, report sub-samples.
falsification:
  rule: >
    Not supported if (a) household saving rate did NOT rise materially
    in the leveraged sub-sample 2008-2012, OR (b) non-financial
    corporate net lending did NOT turn positive in any of the
    leveraged countries (which would refute the corporate-sector
    saving leg of the Koo diagnostic), OR (c) the cross-country
    regression of cumulative-output-change on government-deficit
    yields a coefficient that is statistically zero or negative
    after conditioning on pre-crisis leverage (which would refute
    the fiscal-absorption-shallows-recession prediction). All three
    sub-tests must support the Koo diagnostic for the hypothesis
    to be classified as supported.
  test: koo_diagnostic_three_pronged_balance_sheet_recession_test
  threshold: >
    household saving rate rises >= 3 pp 2007-2010 in leveraged sub-sample AND
    NFC net lending positive in >= 3 of leveraged sample countries by 2010 AND
    coef(government deficit -> cumulative output change) > 0 at p < 0.10
    (more stimulus -> shallower output collapse)
prior_confidence: 0.65
disclosure: >
  Author framing draws on the Koo balance-sheet-recession framework
  (2008, 2014) and on the post-Keynesian / Minsky reading of
  debt-deflation dynamics. A market-liberal reader would object that
  the cross-country government-deficit-vs-output-change correlation
  is heavily endogenous (countries with deeper recessions had larger
  automatic-stabiliser deficits, not the other way round), that the
  Koo diagnostic generalises poorly outside Japan-1990s and
  US-2008-2012, that the corporate-saving leg reflects
  multinational-tax-residence accounting rather than real
  balance-sheet adjustment in some countries (especially Ireland), and
  that the headline recession-shallowing-with-fiscal-expansion claim
  is plausibly the wrong sign once eurozone-periphery
  fiscal-consolidation-under-duress sub-sample is treated honestly
  (Ireland and Spain ran tight fiscal AND recovered, vs Greece ran
  enforced-tight fiscal AND collapsed). Authorial framing risk
  acknowledged; the three-pronged falsification rule imposes a high
  bar for a "supported" classification.
steelman: hypotheses/steelman/gfc_balance_sheet_recession_post_2008_household_dual_mandate.md
linked_hypotheses:
  - household_debt_minsky_cycle_2008
  - fiscal_multipliers_zlb_higher_than_normal_regime
  - gfc_household_debt_wage_stagnation_link
scope:
  period: [2005, 2014]
  countries: [OECD]
  outcome_dim: [fiscal_policy, gdp_growth, financial_crisis]
  policy_family: [fiscal_policy]
  treatment_tags:
    - balance_sheet_recession
    - koo_diagnostic
    - gfc_2008
    - household_deleveraging
notes: >
  Candidate, not pre_registered. On promotion, confirm OECD sectoral-
  accounts dataflow URNs, secure a registered fetcher for sectoral
  net-lending decomposition, and document the leveraged-sub-sample
  selection rule (country list pre-registered). The eurozone-periphery
  sovereign-financing-constraint sub-sample treatment is the
  cleanest design choice.

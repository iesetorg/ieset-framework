# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: mena_egypt_sisi_macro_stabilisation_2014_2024
version: 1
status: candidate
topic: fiscal
claim: >-
  Egypt's 2014-onwards Sisi-era macro stabilisation (2016-2019 IMF EFF programme, energy-
  subsidy reform 2014-2019, mega-project investment programme, sequential currency
  devaluations) delivered headline-fiscal-deficit reduction and per-capita-GDP-growth
  acceleration over 2014-2019, but the post-2020 trajectory shows reversal: external-
  debt accumulation, recurring FX crises, military-economic-footprint expansion, and a
  growth model heavily dependent on Gulf bailouts. The pre-registered claim is that, in
  a synthetic-control design with non-GCC MENA peers (Morocco, Tunisia, Jordan), Egypt's
  2014-2019 cumulative log-GDP-pc growth gap exceeds the synthetic counterfactual by at
  least +5 log-points (early-period success) AND post-2020 cumulative growth gap is
  statistically indistinguishable from synthetic counterfactual or negative (later-period
  reversal). The null counter-claim is that the entire 2014-2024 window shows sustained
  outperformance vs MENA peers and the "reversal" framing is wrong.
evidence_type: causal
sample:
  countries:
  - EGY
  - MAR
  - TUN
  - JOR
  period:
  - 2008
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - flag Tunisia 2011 Arab Spring window; retain
  - exclude COVID 2020Q2-2020Q4 from fitting
scope:
  period:
  - 2008
  - 2024
  countries:
  - EGY
  - MAR
  - TUN
  - JOR
  outcome_dim:
  - gdp_growth
  - fiscal_policy
  - capital_flows
  - currency_purchasing_power
  policy_family:
  - fiscal_policy
  - monetary_policy
  - exchange_rate_regime
  treatment_tags:
  - sisi_consolidation_2014
  - egypt_imf_eff_2016
  - egypt_subsidy_reform_2014_2019
variables:
  outcome:
  - name: real_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD; imf:NGDPRPC
    transformation: log_level
  - name: primary_fiscal_balance_share_gdp
    source: imf:GGXONLB_NGDP; world_bank_wdi:GC.BAL.CASH.GD.ZS
    transformation: level
  - name: gross_external_debt_share_gdp
    source: imf:BX_DOD; world_bank_wdi:DT.DOD.DECT.GN.ZS
    transformation: level
  - name: cpi_inflation_yoy
    source: world_bank_wdi:FP.CPI.TOTL.ZG; imf:PCPIPCH
    transformation: yoy
  treatment:
  - name: sisi_era_indicator
    source: 'constructed: 1 for EGY from 2014-06 onward'
    transformation: binary
  - name: phase_indicator
    source: 'constructed: 1 (early 2014-2019) vs 2 (post-2019)'
    transformation: ordinal
    notes: 'Phase split allows the spec to test reversal hypothesis with sub-period contrast.'
  controls:
  - name: brent_oil_price
    source: fred:DCOILBRENTEU
    transformation: log_level
  - name: us_policy_rate
    source: fred:FEDFUNDS
    transformation: level
  - name: terms_of_trade
    source: world_bank_wdi:TT.PRI.MRCH.XD.WD
    transformation: level
  - name: tourism_arrivals
    source: world_bank_wdi:ST.INT.ARVL
    transformation: log_level
  - name: suez_canal_revenue_proxy
    source: imf:Egypt_BPM6; world_bank_wdi:BX.GSR.NFSV.CD
    transformation: log_level
intervention_channel: bundled
intervention_channel_justification: >-
  The Sisi-era programme bundles fiscal-channel (subsidy reform, VAT introduction
  2016, public-investment expansion), monetary-channel (CBE policy rate adjustments,
  three currency-regime steps), and institutional-channel (military-economic role,
  property-rights regime, security-state expansion) interventions. Bundled coding
  per invariant 4.
estimator:
  template: synth_did
  clustering: country
  notes: >-
    Primary: synth_did with EGY treated from 2014Q3, MENA peer donor pool. Phase
    decomposition: separate 2014-2019 and 2020-2024 sub-period effects. Robustness
    drops Tunisia (2011-2014 instability confound), drops Jordan (parallel IMF-
    programme contamination 2016-2019).
falsification:
  rule: >-
    Not supported if the phase-decomposition does NOT show the predicted asymmetric
    pattern: specifically (a) early-phase 2014-2019 cumulative log-GDP-pc gap > +5
    log-points at p_perm < 0.10, AND (b) late-phase 2020-2024 cumulative gap is at
    most +2 log-points (i.e. not significantly outperforming) — failure of either
    asymmetry conjunct falsifies. Additionally, if external-debt-share-of-GDP did NOT
    rise by at least 15 ppts more than counterfactual over 2014-2024, the
    "Gulf-bailout-dependent reversal" story is unsupported.
  test: synth_did_phase_decomposition_with_debt_validation
  threshold: >-
    early_phase_2014_2019_cumulative_gap >= 0.05 at p_perm < 0.10 AND
    late_phase_2020_2024_cumulative_gap <= 0.02 AND
    external_debt_share_gdp_gap_2014_2024 >= 15 ppts
prior_confidence: 0.6
disclosure: >-
  Author's prior is moderate that the early-vs-late asymmetry holds. Egypt's 2016-2019
  was widely praised; post-2020 has been characterised by recurring FX crises requiring
  Gulf rescue (UAE Ras El Hekma 2024). Prior 0.60 reflects directional confidence
  tempered by the difficulty of quantifying the phase asymmetry against a small
  donor pool (3 units).
conflict_disclosure: No Egyptian asset exposure.
steelman: hypotheses/steelman/mena_egypt_sisi_macro_stabilisation_2014_2024.md
linked_hypotheses:
- mena_egypt_floatation_episodes_2016_2024
notes: >-
  Designed to be orthogonal to the floatation-episodes hypothesis: that one tests the
  three currency events; this tests the broader fiscal-stabilisation arc with phase
  decomposition. Data-gated on CAPMAS, MoF, and IMF Article IV.

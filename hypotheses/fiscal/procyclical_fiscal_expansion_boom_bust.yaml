covers_claims:
- position_id: austrian
  claim_index: 8
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Austrian position claims boom-era unfunded fiscal expansions (Blair-Brown 2001-2007 UK, Kirchner 2003-2015 ARG) produce subsequent structural weakness; hypothesis includes both as pre-registered
    canonical procyclical cases.
- position_id: chicago_monetarism
  claim_index: 104
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: "2026-05-04 target-120 coverage wave; mechanism-based selection from already public-tested hypotheses, independent of observed score effects. Mechanism family: fiscal_rules_support. Chicago monetarism has an explicit stake in price controls, fiscal credibility, monetary transmission, expectations, and rule-like policy regimes."
- position_id: eco_socialist
  claim_index: 126
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: "2026-05-04 tested-floor neutral coverage wave; axis-overlap selection from already public-tested hypotheses, independent of observed score effects. Added as `mixed` conditional claims so coverage balance improves without changing directional net scores. Axis: regulatory.energy_supply_security. Eco-socialism has an explicit stake in public control, ecological planning, fossil-fuel lock-in, and wellbeing beyond GDP."

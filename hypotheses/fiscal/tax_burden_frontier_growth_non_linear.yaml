# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: tax_burden_frontier_growth_non_linear
version: 1
status: candidate
topic: fiscal

claim: >
  At high-income levels (GDP per capita above OECD median), very high tax
  burdens — defined as total tax revenue above 40% of GDP — predict weaker
  long-run total factor productivity growth unless paired with unusually high
  state capacity (top tercile WGI Government Effectiveness) and high labour-
  market flexibility (top tercile OECD EPL), in an OECD and high-income panel
  1980-2020. The directional claim is that the growth cost of high taxes is
  conditional on institutional and labour-market quality, and is positive and
  significant only when both complementary conditions are absent.

evidence_type: associational

sample:
  countries: [AUS, AUT, BEL, CAN, CHE, CHL, CZE, DEU, DNK, ESP, EST, FIN, FRA, GBR, GRC, HUN, IRL, ISR, ITA, JPN, KOR, LTU, LVA, LUX, MEX, NLD, NOR, NZL, POL, PRT, SVK, SVN, SWE, TUR, USA, GBR]
  period: [1980, 2020]
  temporal_structure: panel
  exclusion_rules:
    - "drop country-years during systemic banking crisis (Laeven-Valencia)"
    - "drop observations with tax revenue > 60% of GDP (likely measurement error or oil-fund accounting)"
    - "drop transition years 1989-1994 for post-communist accession economies"

variables:
  outcome:
    - name: total_factor_productivity_growth
      source: "pwt:rtfpna"
      transformation: annual_log_change
      notes: "Penn World Table TFP at constant national prices."
    - name: labour_productivity_growth
      source: "pwt:rgdpo"
      transformation: annual_log_change_per_worker
      notes: "Real GDP per worker growth as secondary outcome."
  treatment:
    - name: total_tax_revenue_pct_gdp
      source: "oecd_revenue_statistics:total_tax_revenue"
      transformation: level
      notes: "OECD Revenue Statistics total tax revenue as % of GDP. Available for OECD members and selected partners."
    - name: state_capacity_index
      source: "wgi:GE.EST"
      transformation: level
      notes: "WGI Government Effectiveness. Threshold variable for state capacity."
    - name: labour_market_flexibility_index
      source: "oecd_epl:overall_epl"
      transformation: inverted_scale
      notes: "OECD Employment Protection Legislation, inverted so higher = more flexible."
  controls:
    - name: initial_log_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
    - name: human_capital_index
      source: "pwt:hc"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: public_investment_share
      source: "world_bank_wdi:NE.GDI.FTOT.ZS"
      transformation: level
      notes: "Gross fixed capital formation as % of GDP. Controls for public-investment composition."
    - name: regulatory_quality
      source: "wgi:RQ.EST"
      transformation: level
  decomposition_channels:
    - name: r_d_expenditure_pct_gdp
      source: "world_bank_wdi:GB.XPD.RSDV.GD.ZS"
      transformation: level
      notes: "Channel: high taxes may crowd out private R&D or fund public R&D."
    - name: business_entry_rate
      source: "world_bank_wdi:IC.BUS.NREG"
      transformation: per_1000_working_age
      notes: "Channel: tax burden and labour rigidities may reduce business dynamism."

intervention_channel: fiscal
intervention_channel_justification: >
  Tax revenue is a fiscal-channel intervention. State capacity and labour-
  market flexibility are institutional and regulatory channels that condition
  the fiscal effect.

estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Two-way FE panel with triple interaction: TFP growth = β0 + β1*tax +
    β2*state_capacity + β3*labour_flex + β4*(tax × state_capacity) +
    β5*(tax × labour_flex) + β6*(tax × state_capacity × labour_flex) +
    controls + FE. Subsample analysis: high-tax (>40% GDP) countries split
    by state-capacity and labour-flex terciles. Robustness: (1) use
    Heritage EFW tax-burden subindex instead of OECD tax revenue; (2)
    exclude Nordic countries to check for Nordic-driven results; (3) 5-year
    non-overlapping averages.

falsification:
  rule: >
    SUPPORTED if the marginal effect of tax revenue on TFP growth is
    negative and significant at p<0.10 in the low-state-capacity /
    low-labour-flexibility cell, AND is insignificant or positive in the
    high-state-capacity / high-labour-flexibility cell. PARTIAL if the
    high-tax negative effect survives in all cells but is attenuated in
    the high-capacity / high-flexibility cell. REFUTED if the marginal
    tax effect is positive and significant in the low-capacity / low-
    flexibility cell. INFORMATIVE: excluding Nordic countries should not
    eliminate the negative effect in the low-complementarity cell.
  test: panel_fe_nonlinear_tax_state_capacity_labour_flexibility_tfp
  threshold: >
    Marginal tax effect < 0 at p<=0.10 in low-capacity / low-flex cell  AND
    Marginal tax effect p >= 0.10 in high-capacity / high-flex cell  AND
    Ex-Nordic robustness retains pattern.

prior_confidence: 0.60

disclosure: >
  Author is moderately confident (0.60). The tax-and-growth literature
  (e.g., Scully 1989, Johansson et al. 2008) finds negative associations
  between tax ratios and growth, but identification is weak and the Nordic
  counter-examples (high taxes, high growth) are prominent. The non-linear
  specification is designed to accommodate the Nordic case without ad-hoc
  dummying. Framing risk: the hypothesis may be read as endorsing low taxes
  for all rich countries; the spec explicitly tests complementarity and
  does not claim that high taxes are always harmful.

steelman: hypotheses/steelman/tax_burden_frontier_growth_non_linear.md

scope:
  period: [1980, 2020]
  countries: [OECD]
  outcome_dim: [productivity, taxation, fiscal_policy]
  policy_family: [tax_policy, fiscal_policy, labour_market]
  treatment_tags: [tax_burden, state_capacity, labour_market_flexibility]

linked_hypotheses:
  - state_size_reduces_household_income_growth
  - welfare_architecture_market_openness_nordic
  - welfare_state_market_flexibility_complement

notes: >
  Data readiness:
  - OECD Revenue Statistics total tax revenue (ready)
  - OECD EPL overall (ready)
  - WGI GE.EST, RQ.EST (ready)
  - PWT rtfpna, rgdpo, hc (ready)
  - WDI GDP pc, trade openness, public investment, R&D, business entry (ready)
  - Heritage EFW tax burden (ready)

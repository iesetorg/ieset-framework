# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_truss_mini_budget_currency_sovereign_mechanism
version: 1
status: draft
topic: fiscal
claim: UK Truss mini-budget 2022 gilt crisis reflected market confidence and institutional-framework rupture
  rather than an MMT-predicted hard fiscal limit, because the BoE restored order by intervening as issuer.
notes: Maps the MMT school's Truss-as-institutional-rupture-not-hard-limit claim to a high-frequency
  event study around 2022 gilt-crisis dates. Estimator and prior set; full pre-registration awaits
  steelman + human sign-off.
prior_confidence: 0.4
disclosure: Author prior is skeptical of the MMT framing — even granting that BoE intervention
  resolved the immediate LDI-driven dysfunction, market repricing of GBP and gilt risk premia
  reflected fiscal-credibility concerns that an MMT framework deemphasises. The institutional-vs-
  resource-constraint distinction may be partially semantic.
falsification:
  rule: >-
    PRIMARY (dispositive): the dispositive thresholds for this hypothesis are encoded directly in
    engine/runs/uk_truss_mini_budget_currency_sovereign_mechanism/replication.py and pinned in methodology_note. The auto-grader's verdict in
    diagnostics.json corresponds to those dispositive checks, not to the legacy boilerplate. See
    methodology_note for the exact pre-registered thresholds.
    
    Headline: REFUTED if FX leg < 1.5% OR yield leg < +20bp OR retrace < 25%.
  test: 'High-frequency event study (intra-day, ±2d) around 2022-09-23 mini-budget and 2022-09-28 BoE LDI intervention; outcomes 30y gilt yield, GBP/USD, gilt curve breakpoints. Refute if BoE intervention does not normalise gilt yields within 5 trading days OR if pre-intervention spike persists post-Truss-resignation absent BoE action.'
evidence_type: associational

sample:
  countries: [GBR]
  period: [2022, 2023]
  temporal_structure: time_series
  exclusion_rules:
    - "exclude US-CPI release dates within event windows (Sept 13 2022) when global yields moved on US data not UK fiscal news"
    - "treat the BoE 28 Sept 2022 gilt-purchase announcement as a separate event from the 23 Sept mini-budget"

variables:
  outcome:
    - name: gilt_yield_30y
      source: "boe:IUDMNZC (UK 30y gilt yield, daily)"
      transformation: bp_level
      notes: "Primary high-frequency outcome — long-end gilt yields moved most sharply on the mini-budget."
    - name: gilt_yield_10y
      source: "boe:IUDMNZC (UK 10y gilt yield, daily)"
      transformation: bp_level
    - name: gbp_usd_spot
      source: "fred:DEXUSUK; boe:XUDLUSS"
      transformation: log_level
      notes: "Currency channel — touched all-time low on 26 Sept 2022."
    - name: gbp_eur_spot
      source: "ecb:EXR.D.GBP.EUR; boe:XUDLERS"
      transformation: log_level
    - name: ldi_pension_fund_collateral_indicator
      source: "boe:financial_stability_report (qualitative pre/post)"
      transformation: descriptive_event_indicator
      notes: "TODO: no quantitative LDI-collateral series is publicly published; the institutional-rupture mechanism is read off BoE FSR commentary."
  treatment:
    - name: mini_budget_announcement
      source: "constructed: indicator = 1 on 2022-09-23 (Kwarteng growth-plan announcement); 0 otherwise"
      transformation: event_dummy
    - name: boe_gilt_intervention_announcement
      source: "constructed: indicator = 1 on 2022-09-28 (BoE temporary gilt-purchase facility); 0 otherwise"
      transformation: event_dummy
    - name: truss_resignation
      source: "constructed: indicator = 1 on 2022-10-20; 0 otherwise"
      transformation: event_dummy
  controls:
    - name: us_10y_yield
      source: "fred:DGS10"
      transformation: bp_level
      notes: "Global-rate confounder."
    - name: bund_10y_yield
      source: "ecb:IRS.M.DE; fred:IRLTLT01DEM156N"
      transformation: bp_level
    - name: vix
      source: "fred:VIXCLS"
      transformation: level
    - name: boe_bank_rate
      source: "boe:IUDBEDR"
      transformation: level_pct

scope:
  period: [2022, 2023]
  countries: [GBR]
  outcome_dim: [fiscal_policy, financial_crisis, monetary_policy]
  policy_family: [fiscal_policy, monetary_policy]
  treatment_tags: [uk_truss_mini_budget_2022, boe_gilt_intervention_2022]

covers_claims:
  - position_id: mmt
    claim_index: 6
    polarity: aligned
    school_prediction: mixed
    confidence: medium
    notes: "MMT position reads the Truss mini-budget gilt crisis as institutional-framework rupture rather than a hard-fiscal-limit event, with BoE gilt intervention as the mechanism; hypothesis tests exactly that institutional-vs-resource-constraint interpretation."

estimator:
  template: event_study
  clustering: date
  fixed_effects: [date]
  notes: >
    High-frequency event study around the September 2022 mini-budget
    announcement and BoE gilt-market intervention dates, with gilt
    yields, GBP, and gilt-yield/yield-curve breakpoints as outcomes.
    Tight intra-day window isolates announcement effects from
    confounders.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: mondragon_cooperative_resilience
version: 1
status: draft
topic: growth
claim: Mondragón cooperative network (Spain, 1956-present) has sustained productivity and employment stability through successive recessions at levels comparable to Basque private-sector peers.
notes: Seeded from a market-socialist claim that the Mondragón cooperative network has sustained productivity and employment stability through successive recessions at levels comparable to Basque private-sector
  peers. Single- network canonical case; human review needed for the matched-peer construction.
prior_confidence: 0.55
disclosure: 'Authorial bias risk: market-socialist framing wants Mondragón to dominate conventional firms. The network is self-selected (capital constraints filter out riskier ventures) and Mondragón has
  divested loss-making units abroad, so survivorship inflates apparent resilience.'
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves
    less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: Multi-metric checklist for Mondragón vs Basque private-sector peers 1970-2023 across employment retention through 1992/2008/2020 recessions, productivity, and survival rates; falsified if Mondragón
    underperforms peers on 2 of 3 metrics.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - ESP
  period:
  - 1970
  - 2023
  temporal_structure: time_series
variables:
  outcome:
  - name: unemployment_rate
    source: world_bank_wdi:SL.UEM.TOTL.ZS
    transformation: level
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
  - name: regional_unemployment_basque
    source: ine:tasa_paro_pais_vasco
    transformation: level
  - name: tfp_index
    source: pwt:rtfpna
    transformation: level
  treatment:
  - name: mondragon_proxy
    source: 'manual:mondragon_employment_count_annual  # TODO swarm-6: Mondragón corporate reports — no registered fetcher'
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: 'Single-network canonical case (Mondragón cooperative network 1956-2023). Pattern-match across productivity, employment stability across recessions (1973, 1992, 2008, 2020), survival rates, and
    wage compression vs Basque private-sector matched peers. Tests cooperative-form resilience claim.

    '
scope:
  period:
  - 1956
  - 2023
  countries:
  - ESP
  outcome_dim:
  - productivity
  - employment_labour
  policy_family:
  - institutional_reform
  - labour_market
  treatment_tags:
  - mondragon_cooperative
covers_claims:
- position_id: market_socialist
  claim_index: 3
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 'Market-socialist prediction: Mondragón cooperative network sustains productivity and employment stability comparable to Basque private-sector peers; direct alignment with hypothesis.'

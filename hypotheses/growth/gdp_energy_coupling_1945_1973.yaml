hypothesis_id: gdp_energy_coupling_1945_1973
version: 2
status: pre_registered
topic: growth
claim: Post-1945 Western GDP growth 1945-1973 tracked closely with energy and resource use; the assumption that this coupling is severable has not been empirically demonstrated at policy-relevant scale.
notes: Seeded from a degrowth claim that postwar Western GDP-energy coupling was tight and that severability is empirically unproven at scale. v2 pins a CO2-throughput proxy test because the local OWID primary-energy vintage is absent while OWID CO2-per-capita and Maddison GDP/population are available for the postwar window.
prior_confidence: 0.65
disclosure: 'Authorial bias risk: tight 1945-1973 coupling is well-documented but generalising to "severability unproven at scale" extrapolates beyond the sample period; degrowth framing emphasises this period because it predates the post-1980s relative-decoupling literature.'
falsification:
  rule: 'Primary v2 proxy test reconstructs total CO2 emissions as OWID CO2-per-capita times Maddison population for the registered Western/OECD country set over 1950-1973. Estimate log(total CO2) on log(real GDP) with country and year fixed effects, clustered by country. The resource-coupling proxy is partially supported if elasticity is at least 0.7 with p<0.05. It is refuted if elasticity is below 0.7 with p<0.05. It is inconclusive/weak otherwise. Full support still requires primary energy or material-throughput vintages.

    '
  test: western_oecd_co2_gdp_elasticity_1950_1973
  threshold: partial support if beta>=0.7 and p<0.05; refute if beta<0.7 and p<0.05
methodology_note: 'CO2 is a carbon-throughput proxy, not direct primary-energy consumption. The verdict is capped at partial even when the proxy elasticity supports tight coupling.

  '
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - DEU
  - FRA
  - ITA
  - NLD
  - BEL
  - AUT
  - SWE
  - NOR
  - DNK
  - FIN
  - CHE
  - JPN
  - CAN
  - AUS
  period:
  - 1945
  - 1973
  temporal_structure: panel
variables:
  outcome:
  - name: log_real_gdp
    source: maddison:gdp_ppp
    transformation: log
  - name: log_gdp_pc_ppp
    source: maddison:gdppc_ppp
    transformation: log
  treatment:
  - name: log_primary_energy_consumption
    source: owid:primary-energy-consumption
    transformation: log
  - name: log_co2_emissions
    source: owid:annual-co2-emissions-per-country
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: 'OECD-country panel of GDP growth on primary-energy and material-throughput use 1945-1973. Reports the GDP-energy elasticity over the postwar golden age. Tests whether the coupling was tight enough to warrant scepticism of severability claims at policy-relevant scales.

    '
scope:
  period:
  - 1945
  - 1973
  countries:
  - OECD
  - USA
  - EU
  outcome_dim:
  - gdp_growth
  - energy
  policy_family:
  - none
  treatment_tags:
  - postwar_golden_age
  - bretton_woods_era
covers_claims:
- position_id: degrowth
  claim_index: 2
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 'Degrowth prediction: post-1945 Western GDP growth tracked energy and resource use; severability of coupling is unproven at policy-relevant scale; direct alignment with hypothesis.'
steelman: hypotheses/steelman/gdp_energy_coupling_1945_1973.md

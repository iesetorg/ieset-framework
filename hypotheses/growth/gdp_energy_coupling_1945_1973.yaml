# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: gdp_energy_coupling_1945_1973
version: 1
status: draft
topic: growth
claim: Post-1945 Western GDP growth 1945-1973 tracked closely with energy and resource use; the assumption that this coupling is severable has not been empirically demonstrated at policy-relevant scale.
notes: Seeded from a degrowth claim that postwar Western GDP-energy coupling was tight and that severability is empirically unproven at scale. Panel FE design; human review needed on early-period energy-data
  quality.
prior_confidence: 0.65
disclosure: 'Authorial bias risk: tight 1945-1973 coupling is well-documented but generalising to "severability unproven at scale" extrapolates beyond the sample period; degrowth framing emphasises this
  period because it predates the post-1980s relative-decoupling literature.'
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves
    less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: OECD panel FE regression of log primary-energy use on log real GDP, country and year FE 1945-1973; falsified if estimated GDP-energy elasticity is below 0.7 (i.e. material relative-decoupling) at
    p<0.05.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - DEU
  - FRA
  - ITA
  - NLD
  - BEL
  - AUT
  - SWE
  - NOR
  - DNK
  - FIN
  - CHE
  - JPN
  - CAN
  - AUS
  period:
  - 1945
  - 1973
  temporal_structure: panel
variables:
  outcome:
  - name: log_real_gdp
    source: maddison:gdp_ppp
    transformation: log
  - name: log_gdp_pc_ppp
    source: maddison:gdppc_ppp
    transformation: log
  treatment:
  - name: log_primary_energy_consumption
    source: owid:primary-energy-consumption
    transformation: log
  - name: log_co2_emissions
    source: owid:annual-co2-emissions-per-country
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: 'OECD-country panel of GDP growth on primary-energy and material-throughput use 1945-1973. Reports the GDP-energy elasticity over the postwar golden age. Tests whether the coupling was tight enough
    to warrant scepticism of severability claims at policy-relevant scales.

    '
scope:
  period:
  - 1945
  - 1973
  countries:
  - OECD
  - USA
  - EU
  outcome_dim:
  - gdp_growth
  - energy
  policy_family:
  - none
  treatment_tags:
  - postwar_golden_age
  - bretton_woods_era
covers_claims:
- position_id: degrowth
  claim_index: 2
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 'Degrowth prediction: post-1945 Western GDP growth tracked energy and resource use; severability of coupling is unproven at policy-relevant scale; direct alignment with hypothesis.'

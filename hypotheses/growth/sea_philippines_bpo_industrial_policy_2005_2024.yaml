# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: sea_philippines_bpo_industrial_policy_2005_2024
version: 1
status: candidate
topic: growth

claim: >-
  The Philippines' business-process-outsourcing (BPO) sector — built
  through PEZA tax incentives, English-language workforce, and a 2005-
  onwards explicit industrial-policy push — produced a measurable
  services-led structural shift, with services value-added share of GDP
  rising by at least +5 percentage points 2005-2019 and per-capita GDP
  growth differential vs the ASEAN-5 peer mean (IDN, MYS, THA, VNM)
  averaging at least +0.3pp/yr over 2005-2019.

evidence_type: associational

notes: >-
  Tests services-led growth model versus the manufacturing-export model
  of regional peers. Services share is the structural-shift test;
  growth differential is the output test.

prior_confidence: 0.60

disclosure: >-
  Author tilts neutral. Bias risk: under-weighting remittance-channel
  growth (Filipino overseas worker remittances ~10% of GDP) which
  contributes alongside BPO. Mitigation: services-share test isolates
  domestic-services growth from remittance channel.

steelman: hypotheses/steelman/sea_philippines_bpo_industrial_policy_2005_2024.md

falsification:
  rule: >-
    PRIMARY (dispositive, BOTH for SUPPORTED): (1) services value-added
    share for PHL rises by at least +5pp from 2005 to 2019; AND
    (2) PHL real GDP-pc growth minus ASEAN-5 peer mean (IDN, MYS, THA,
    VNM) over 2005-2019 averages at least +0.3pp/yr. REFUTED if EITHER
    fails.
  test: philippines_bpo_services_share_growth_differential_2005_2019
  threshold: >-
    PRIMARY 1: services_va_pct_gdp(PHL, 2019) - services_va_pct_gdp(PHL, 2005) >= 5.
    PRIMARY 2: gdp_pc_growth(PHL, 2005-2019 mean) - gdp_pc_growth(ASEAN5, 2005-2019 mean) >= 0.003.
    METHOD_VALID: WDI NV.SRV.TOTL.ZS and NY.GDP.PCAP.KD.ZG for PHL and ASEAN-5 across 2005-2019.

sample:
  countries: [PHL, IDN, MYS, THA, VNM]
  period: [2000, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "primary window 2005-2019 to avoid COVID 2020-2022 distortion"

scope:
  period: [2005, 2024]
  countries: [PHL]
  outcome_dim: [gdp_growth, productivity, industrial_capability]
  policy_family: [industrial_policy, tax_policy]
  treatment_tags: [philippines_bpo_sector, peza_tax_incentives, services_led_growth]

variables:
  outcome:
    - name: real_gdp_pc_growth
      source: "world_bank_wdi:NY.GDP.PCAP.KD.ZG"
      transformation: level
    - name: services_value_added_pct_gdp
      source: "world_bank_wdi:NV.SRV.TOTL.ZS"
      transformation: level
    - name: log_gdp_pc_ppp
      source: "world_bank_wdi:NY.GDP.PCAP.PP.KD"
      transformation: log
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
  treatment:
    - name: post_2005_bpo_indicator
      source: "constructed: indicator = 1 for PHL, year >= 2005"
      transformation: indicator
  controls:
    - name: gross_capital_formation_pct_gdp
      source: "world_bank_wdi:NE.GDI.TOTL.ZS"
      transformation: level
    - name: log_population
      source: "world_bank_wdi:SP.POP.TOTL"
      transformation: log

estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >-
    Two-way fixed effects panel with ASEAN-5 peer pool.

intervention_channel: bundled
intervention_channel_justification: >-
  PEZA tax + workforce policy + industrial-policy designation combine
  fiscal (tax incentives), regulatory (PEZA zone framework), and
  institutional (workforce-targeting) channels.

linked_hypotheses:
  - sea_indonesia_jokowi_infrastructure_2014_2024
  - sea_vietnam_doi_moi_followon_growth_1995_2024

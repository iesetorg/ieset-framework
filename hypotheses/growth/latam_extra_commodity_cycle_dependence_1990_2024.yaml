# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: latam_extra_commodity_cycle_dependence_1990_2024
version: 1
status: candidate
topic: growth

claim: >
  Across Latin American economies 1990-2024, the cross-country
  variation in real-GDP growth is materially driven by the global
  commodity-price cycle, with a measurable "China-supercycle"
  dividend 2003-2014 and a "post-supercycle penalty" 2014-2019. The
  pre-registered claim is (a) panel-FE regression of real-GDP growth
  on a country-specific terms-of-trade index shows a positive
  coefficient at p < 0.05 across the panel, AND (b) the cumulative
  growth gap between commodity-export-heavy LATAM economies and
  manufacturing-heavy LATAM economies widened during 2003-2014 and
  narrowed (or reversed) during 2014-2019, AND (c) sovereign-debt
  spreads (proxied by external debt service share of exports) move
  inversely with terms of trade. The mechanism is the standard
  external-finance + tradables-channel transmission of commodity
  prices to growth.

evidence_type: associational

sample:
  countries: [ARG, BOL, BRA, CHL, COL, CRI, DOM, ECU, GTM, HND, JAM, MEX, PAN, PER, PRY, SLV, TTO, URY, VEN]
  period: [1990, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude VEN post-1999 from baseline panel; report VEN as separate case in commentary"
    - "exclude 2020-2021 COVID window from cumulative-growth endpoint"

scope:
  period: [1990, 2024]
  countries: [LATAM]
  outcome_dim: [gdp_growth, capital_flows, fiscal_policy]
  policy_family: [trade_policy, none]
  treatment_tags: [china_supercycle_2003_2014]

variables:
  outcome:
    - name: real_gdp_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
    - name: log_gdp_pc_constant
      source: world_bank_wdi:NY.GDP.PCAP.KD
      transformation: log
    - name: external_debt_service_share_exports
      source: world_bank_wdi:DT.TDS.DECT.EX.ZS
      transformation: level
    - name: fiscal_balance_share_gdp
      source: imf:GGXCNL_NGDP
      transformation: level
  treatment:
    - name: terms_of_trade
      source: world_bank_wdi:TT.PRI.MRCH.XD.WD
      transformation: level
    - name: china_supercycle_window
      source: "constructed: binary = 1 for 2003-2014"
      transformation: binary
  controls:
    - name: us_policy_rate
      source: fred:FEDFUNDS
      transformation: level
    - name: us_gdp_growth
      source: fred:GDPC1
      transformation: yoy_growth

estimator:
  template: panel_fe
  clustering: country
  notes: >
    Primary: panel_fe of real-GDP growth on terms-of-trade with
    country and year FE. Secondary: cumulative-growth comparison
    of commodity-export-heavy vs manufacturing-heavy sub-panel
    across the supercycle and post-supercycle windows.

falsification:
  rule: >
    Not supported if (a) terms-of-trade coefficient on real-GDP
    growth is not positive at p < 0.05 across the panel, OR (b) the
    cumulative growth gap between commodity-heavy and
    manufacturing-heavy sub-panels did not widen 2003-2014 and
    narrow 2014-2019, OR (c) external-debt-service share of exports
    does not move inversely with terms of trade.
  test: panel_fe_plus_subpanel_decomposition
  threshold: >
    terms_of_trade_coefficient > 0 at p < 0.05
    AND commodity_minus_manufacturing_growth_gap(2003-2014) > commodity_minus_manufacturing_growth_gap(2014-2019)
    AND corr(external_debt_service_share_exports, terms_of_trade) < 0

prior_confidence: 0.85

disclosure: >
  Author macro prior is high that LATAM growth tracks commodity
  cycles. Risk: co-moving manufacturing exporters (MEX) may
  contaminate the sub-panel comparison.

steelman: hypotheses/steelman/latam_extra_commodity_cycle_dependence_1990_2024.md

linked_hypotheses:
  - peru_post_fujimori_growth_2001_2019
  - bolivia_morales_resource_nationalism_2006_2019

notes: >
  Cross-LATAM panel; canonical-pattern test for commodity-cycle
  transmission.

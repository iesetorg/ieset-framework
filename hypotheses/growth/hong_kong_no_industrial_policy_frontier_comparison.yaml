# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: hong_kong_no_industrial_policy_frontier_comparison
version: 1
status: candidate
topic: growth
claim: Hong Kong long-run income convergence without classic industrial policy matches or exceeds developmentalist Asian comparators after controlling for initial income.
evidence_type: causal
sample:
  countries:
    - HKG
    - KOR
    - TWN
    - SGP
    - JPN
    - MYS
    - THA
    - PHL
    - IDN
  period: [1960, 2024]
  temporal_structure: panel
variables:
  outcome:
    - name: real_gdp_per_capita
      source: world_bank_wdi:NY.GDP.PCAP.KD
      transformation: log
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
  treatment:
    - name: hong_kong_dummy
      source: constructed:binary_indicator
      transformation: binary
      notes: Coded 1 for Hong Kong throughout the period.
    - name: developmentalist_dummy
      source: constructed:binary_indicator
      transformation: binary
      notes: Coded 1 for KOR, TWN, SGP, JPN (MITI era), MYS, THA during their developmentalist periods.
  controls:
    - name: log_initial_gdp_pc
      source: maddison:real_gdp_pc
      transformation: log
    - name: trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: level
    - name: institutional_quality
      source: wgi:RL.EST
      transformation: level
    - name: human_capital
      source: owid:mean-years-of-schooling-long-run-1870
      transformation: level
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: Panel FE comparing Hong Kong growth trajectory to developmentalist Asian comparators, controlling for initial income and institutions. Synthetic control for Hong Kong as a robustness check.
falsification:
  rule: The hypothesis is refuted if Hong Kong real GDP-per-capita growth is significantly lower than the developmentalist comparator average after controlling for initial income, or if the Hong Kong coefficient is negative and significant at p<0.10.
  test: panel_fe_hk_vs_developmentalist
  threshold:
    hk_coef: ">=0 or p>=0.10"
prior_confidence: 0.55
disclosure: Author acknowledges that Hong Kong pre-1997 benefited from British institutional heritage and refugee human capital, which are hard to separate from policy effects.
steelman: hypotheses/steelman/hong_kong_no_industrial_policy_frontier_comparison.md
scope:
  period: [1960, 2024]
  countries:
    - HKG
    - KOR
    - TWN
    - SGP
    - JPN
    - MYS
    - THA
    - PHL
    - IDN
  outcome_dim:
    - gdp_growth
    - institutional_quality
  policy_family:
    - trade_policy
    - institutional_reform
    - industrial_policy
  treatment_tags:
    - hong_kong_laissez_faire
    - hong_kong_rule_of_law
notes: Hong Kong data requires Maddison or IMF rather than WDI for some periods due to political status coding. Initial income matching uses Maddison real GDP per capita.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: canada_market_liberalisation_vs_state_industry_1988_2024
version: 1
status: candidate
topic: growth

claim: >
  Canada’s long-run prosperity after the Canada–US Free Trade Agreement
  (1988) and NAFTA (1994) is more associated with market openness than with
  national industrial-policy initiatives. In a panel of OECD economies,
  Canada’s post-1988 cumulative log GDP-per-capita growth and labour
  productivity are positively associated with trade openness and FDI inflows,
  while federal industrial-policy spending (proxied by government consumption
  on economic affairs) does not show a comparable positive association.

evidence_type: causal

sample:
  countries:
    - CAN
    - USA
    - GBR
    - AUS
    - NZL
    - DNK
    - SWE
    - NOR
    - FIN
    - NLD
    - BEL
    - AUT
    - CHE
    - DEU
    - FRA
    - JPN
    - KOR
  period: [1988, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude COVID 2020-2021"

scope:
  period: [1988, 2024]
  countries:
    - CAN
    - USA
    - GBR
    - AUS
    - NZL
    - DNK
    - SWE
    - NOR
    - FIN
    - NLD
    - BEL
    - AUT
    - CHE
    - DEU
    - FRA
    - JPN
    - KOR
  outcome_dim:
    - gdp_growth
    - productivity
    - trade_liberalisation
  policy_family:
    - trade_policy
    - industrial_policy
    - institutional_reform
  treatment_tags:
    - canada_us_fta_1988
    - nafta_1994
    - canada_industrial_policy_strategic_innovation_fund

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
  treatment:
    - name: canada_post_1988
      source: "constructed: 1 for CAN from 1988 onward"
      transformation: binary
  controls:
    - name: initial_gdp_pc_1988
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: level_at_1988
    - name: human_capital
      source: "pwt:hc"
      transformation: level
    - name: wgi_govt_effectiveness
      source: "wgi:GE.EST"
      transformation: level
    - name: us_policy_rate
      source: "fred:FEDFUNDS"
      transformation: level
    - name: commodity_terms_of_trade
      source: "world_bank_wdi:TT.PRI.MRCH.XD.WD"
      transformation: level

intervention_channel: bundled
intervention_channel_justification: >
  The treatment spans trade integration (trade policy) and domestic
  regulatory reforms that accompanied FTA/NAFTA. Bundled coding per
  invariant 4.

estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Primary: panel FE with CAN × post-1988 interaction. Secondary:
    synthetic control for CAN using OECD donor pool.

falsification:
  rule: >
    Refuted if the panel-FE coefficient on CAN × post-1988 is negative and
    significant at p<0.05, or if Canada’s cumulative log GDP-pc gap vs
    synthetic counterfactual is negative over 1988–2024.
  test: panel_fe_canada_fta
  threshold: >
    beta_canada_post1988 > 0 AND p < 0.10; synthetic_gap > 0.

prior_confidence: 0.60

disclosure: >
  Author is moderately confident that trade integration mattered more than
  industrial policy for Canada, but acknowledges that commodity cycles and
  US demand are powerful confounds.

steelman: hypotheses/steelman/canada_market_liberalisation_vs_state_industry_1988_2024.md

linked_hypotheses:
  - liberal_capital_account_openness_growth_premium_panel

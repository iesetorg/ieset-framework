# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: china_extra_property_bubble_bust_2020_2024
version: 1
status: candidate
topic: growth

claim: >-
  China's property-sector deleveraging shock 2020-2024 — triggered by the
  August 2020 "three red lines" policy on developer leverage, escalating
  through Evergrande's September 2021 default, Country Garden's 2023
  liquidity crisis, and the persistent ghost-cities inventory overhang —
  produced a structural break in residential investment and a sustained
  drag on aggregate growth that is identifiable in real GDP, gross capital
  formation, and the household-consumption share of GDP. Post-shock
  (2021-2024) annualised real GDP growth is at least 2 percentage points
  per year below the 2010-2019 trend, and gross fixed capital formation
  share of GDP falls by at least 3 percentage points peak-to-trough.

evidence_type: descriptive

notes: >-
  China-specific structural break around the 2020 "three red lines" policy.
  Property-sector contraction is large enough in scale to dominate the
  aggregate national-accounts series; no donor pool needed. Cross-checks
  via residential-investment share, capital formation, and consumption
  share insulate against any single series being smoothed.

prior_confidence: 0.78

disclosure: >-
  Author tilts toward the property-bust-as-structural-drag reading. Bias
  risk is conflating the 2020-2024 slowdown with zero-COVID effects (a
  separate hypothesis). Mitigation: post-2022 reopening window includes
  property continuation while COVID measures end, separating the channels.

steelman: hypotheses/steelman/china_extra_property_bubble_bust_2020_2024.md

falsification:
  rule: >-
    PRIMARY (dispositive): SUPPORTED if (a) mean real GDP-pc growth
    2021-2024 is at least 2pp/yr below mean 2010-2019; AND (b) gross
    fixed capital formation share of GDP falls by at least 3pp from
    2019 to 2024 trough. REFUTED if either condition reverses sign
    (post growth higher than pre, or capital formation share rising).
    INFORMATIVE (not gating): household-consumption share of GDP
    should NOT spike upward by >2pp (which would indicate rebalancing
    rather than pure drag).
  test: china_property_bust_growth_capital_formation_break_2020_2024
  threshold: >-
    PRIMARY: gdp_growth(2021-2024) - gdp_growth(2010-2019) <= -0.02 AND
    gcf_pct_gdp(2024) - gcf_pct_gdp(2019) <= -3.0.
    METHOD_VALID: WDI NY.GDP.PCAP.KD.ZG and NE.GDI.FTOT.ZS available
    for CHN through 2024.

sample:
  countries: [CHN]
  period: [2008, 2024]
  temporal_structure: time_series
  exclusion_rules:
    - "2020 itself is COVID-shock year; growth comparison uses 2021-2024 post-window"
    - "official Chinese statistics 2022-2024 flagged for smoothing risk; cross-check capital-formation and consumption shares"

scope:
  period: [2010, 2024]
  countries: [CHN]
  outcome_dim: [gdp_growth, housing]
  policy_family: [regulation, fiscal_policy]
  treatment_tags: [china_three_red_lines_2020, evergrande_default_2021, country_garden_crisis_2023, china_property_bust]

variables:
  outcome:
    - name: real_gdp_growth
      source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
      transformation: level
    - name: real_gdp_pc_growth
      source: "world_bank_wdi:NY.GDP.PCAP.KD.ZG"
      transformation: level
    - name: gross_fixed_capital_formation_pct_gdp
      source: "world_bank_wdi:NE.GDI.FTOT.ZS"
      transformation: level
    - name: household_consumption_pct_gdp
      source: "world_bank_wdi:NE.CON.PRVT.ZS"
      transformation: level
  treatment:
    - name: post_three_red_lines_indicator
      source: "constructed: indicator = 1 for years >= 2021"
      transformation: indicator

estimator:
  template: descriptive
  clustering: none
  notes: >-
    Pre-post structural break comparison around 2020 three-red-lines policy.
    Visualise as kinked trend line for GDP growth and GFCF share. Robustness:
    rolling 3-year windows around the break date.

linked_hypotheses:
  - china_zero_covid_2022_2023_demand_collapse_recovery
  - china_extra_lgfv_debt_evolution_2015_2024
  - china_extra_demographic_cliff_2020_2024

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: economic_freedom_index_income_correlation
version: 1
status: draft
topic: growth
claim: Economic-freedom indices (Fraser, Heritage) correlate positively with per-capita income levels
  across countries, with the strongest sub-indices being legal-system and sound-money.
notes: Seeded from a classical-liberal claim that Fraser/Heritage economic-freedom indices correlate with
  per-capita income and that legal-system and sound-money sub-indices do most of the work. Human review
  required to address obvious endogeneity before promotion.
prior_confidence: 0.55
disclosure: >-
  Authorial bias risk: economic-freedom indices are constructed by liberal-leaning think tanks (Fraser, Heritage) and embed contested weighting choices; a positive cross-section correlation almost certainly exists but the causal direction (institutions to income vs income to institutions) is not identified by panel FE.
falsification:
  rule: >
    PRIMARY: the hypothesis is SUPPORTED if the headline economic-freedom
    coefficient on log GDP per capita is positive at p<0.05 and at least one
    of the legal-system or sound-money sub-index coefficients is also positive
    at p<0.10 in the same panel-FE design. It is REFUTED if the headline
    coefficient is non-positive at p<0.10 or if both named sub-indices are
    non-positive. Otherwise the result is PARTIAL because a positive headline
    correlation without sub-index decomposition does not fully test the claim.
  test: 'Panel FE regression of log GDP per capita on Fraser EFW headline + sub-component scores 1971-2023,
    country and year FE, clustered SE; falsified if headline coefficient is not positive and significant at
    p<0.05.'
methodology_note: >
  2026-05-04 sharpening: replaced generic draft boilerplate with the explicit
  headline-plus-subindex rule already described by the claim and test. The
  p<0.05 headline threshold and p<0.10 component threshold are conventional
  screening levels and were not chosen from the archived estimate.
evidence_type: associational

sample:
  countries: [USA, GBR, DEU, FRA, ITA, ESP, NLD, BEL, AUT, SWE, NOR, DNK, FIN, IRL, JPN, CAN, AUS, NZL, CHN, IND, BRA, MEX, IDN, ZAF, RUS, TUR, KOR, SGP, HKG, CHL, ARG, VEN, EGY, NGA, KEN, GHA, PHL, VNM, MYS, THA, POL, HUN, CZE, EST]
  period: [1980, 2022]
  temporal_structure: panel

variables:
  outcome:
    - name: log_gdp_pc_ppp
      source: "world_bank_wdi:NY.GDP.PCAP.PP.KD"
      transformation: log

  treatment:
    - name: fraser_efw_aggregate
      source: "fraser_efw:aggregate_score"
      transformation: level
    - name: heritage_ief_overall
      source: "heritage_ief:overall"
      transformation: level
    - name: fraser_legal_system
      source: "fraser_efw:legal_system_property_rights"
      transformation: level
    - name: fraser_sound_money
      source: "fraser_efw:sound_money"
      transformation: level

  controls:
    - name: log_population
      source: "world_bank_wdi:SP.POP.TOTL"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: rule_of_law
      source: "wgi:RL.EST"
      transformation: level

estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Cross-country panel of log GDP per capita on Fraser/Heritage economic-
    freedom index level and sub-component scores (legal-system, sound-money,
    trade, regulation, government size). Tests both the headline correlation
    and the sub-index decomposition claim.

scope:
  period: [1971, 2023]
  countries: [GLOBAL]
  outcome_dim: [gdp_growth, institutional_quality]
  policy_family: [institutional_reform, monetary_policy]
  treatment_tags: [fraser_economic_freedom_index, heritage_economic_freedom_index]

covers_claims:
  - position_id: classical_liberal
    claim_index: 3
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "Classical-liberal prediction: economic-freedom indices correlate with per-capita income, with legal-system and sound-money sub-indices strongest; direct alignment with hypothesis."

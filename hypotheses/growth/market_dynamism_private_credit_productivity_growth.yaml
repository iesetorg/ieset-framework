# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: market_dynamism_private_credit_productivity_growth
version: 1
status: candidate
topic: growth
claim: Deeper private credit markets predict faster subsequent total-factor-productivity and real GDP per-capita growth.
claim_direction: "+"
evidence_type: associational
sample:
  countries: [USA, GBR, CAN, AUS, NZL, DEU, FRA, ITA, ESP, NLD, SWE, NOR, DNK, FIN, JPN, KOR, CHN, IND, BRA, MEX, CHL, ARG, TUR, ZAF, POL, EST, VNM, THA, MYS, IDN, COL, PER, PHL, EGY, MAR, KEN, NGA, BGD, PAK, LKA]
  period: [1990, 2019]
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing private-credit treatment, PWT TFP outcome, or WDI controls
  - winsorize private-credit depth at the 1st and 99th percentiles before estimation
  - require at least 20 countries and 250 country-year observations after constructing forward outcomes
scope:
  period: [1990, 2019]
  countries: [GLOBAL]
  outcome_dim: [gdp_growth, productivity, capital_flows]
  policy_family: [regulation, institutional_reform]
  treatment_tags: [private_credit, private_capital_allocation, productivity_growth]
variables:
  outcome:
  - name: tfp_growth_5yr_forward
    source: pwt:rtfpna
    transformation: cumulative_log_growth_5yr_forward
  - name: real_gdp_pc_growth_5yr_forward
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: cumulative_log_growth_5yr_forward
  treatment:
  - name: private_credit_depth
    source: world_bank_wdi:FS.AST.PRVT.GD.ZS
    transformation: level_lagged_one_year
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: investment_share
    source: world_bank_wdi:NE.GDI.TOTL.ZS
    transformation: level
  - name: government_consumption_share
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: Private-credit depth is a proxy for decentralized capital allocation; the design does not separate healthy intermediation from credit booms.
falsification:
  rule: SUPPORTED if private-credit depth is positive at p<0.10 for forward TFP growth and has the same sign for forward GDP-per-capita growth. REFUTED if the TFP coefficient is negative at p<0.10. Otherwise PARTIAL.
  test: panel_fe_market_dynamism_private_credit_productivity_growth
  threshold:
    p_value: "p<0.10"
    expected_sign: "+"
    minimum_countries: 20
    minimum_observations: 250
prior_confidence: 0.57
disclosure: The pro-market prior is tempered by known crisis and over-credit channels; negative estimates would be credible evidence against simple private-finance growth claims.
steelman: hypotheses/steelman/market_dynamism_private_credit_productivity_growth.md

  temporal_structure: panel
variables:
  outcome:
  - name: under5_mortality_decline
    source: world_bank_wdi:SH.DYN.MORT
    transformation: endpoint percent decline
  treatment:
  - name: electricity_access_gain
    source: world_bank_wdi:EG.ELC.ACCS.ZS
    transformation: country selected if endpoint gain >= 30pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=40, at least 70% of selected countries reduce under-5 mortality by
    >=50%, and the median decline is >=60%. REFUTED if fewer than 50% pass or the median decline
    is <40%. Otherwise PARTIAL.
  test: wdi_electrification_under5_mortality_followthrough_1990_2023
  threshold: n >= 40 AND pass_rate >= 0.70 AND median_under5_mortality_decline_pct >= 60
prior_confidence: 0.74
disclosure: The prior expects electrification to travel with broad development capacity, but
  the design is descriptive and cannot isolate grid access from vaccines, income, sanitation,
  or conflict.

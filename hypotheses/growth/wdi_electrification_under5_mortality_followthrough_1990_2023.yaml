hypothesis_id: wdi_electrification_under5_mortality_followthrough_1990_2023
version: 1
status: pre_registered
topic: growth
claim: Countries with large electricity-access gains from 1990 to 2023 should usually show
  large under-5 mortality reductions over the same development window.
evidence_type: descriptive

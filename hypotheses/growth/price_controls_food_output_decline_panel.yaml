hypothesis_id: price_controls_food_output_decline_panel
version: 1
status: candidate
topic: growth
claim: Countries maintaining long-lived food price controls or state procurement show slower agricultural
  value-added growth than market-priced peers.
methodology_note: Promoted from the sectoral first-wave backlog on 2026-05-02 using locally cached proxy
  variables; exact sector datasets can replace proxies in later revisions.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  period: &id001
  - 1970
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
variables:
  outcome:
  - name: primary_sectoral_outcome
    source: world_bank_wdi:NV.AGR.TOTL.ZS
    transformation: level_or_growth_proxy
  treatment:
  - name: policy_or_institution_proxy
    source: 'constructed: 1 for ARG from 2006 onward; ZWE from 2000 onward; ZMB from 1980 onward'
    transformation: indicator_or_level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
mechanism_measurement:
  mechanism_type: price_control
  design_features:
  - panel_fe_screen
  - controlled_vs_uncontrolled_categories
  - high_frequency_event_study
  - welfare_accounting
  - distributional_decomposition
  - leakage_substitution
  comparison_structure:
    treated_units:
    - country-years coded as having long-lived food price controls or state procurement
    control_units:
    - country-years without the coded treatment
    controlled_or_regulated_units:
    - controlled staple-food categories and state-procured commodities
    exempt_or_uncontrolled_units:
    - uncapped crops, imported substitutes, informal sellers, and uncontrolled retail channels
    time_frequency: annual
    notes: >
      The current run is a broad annual country-panel screen using
      agricultural value-added share. It does not identify controlled crops
      versus uncontrolled crops, official versus informal channels, or
      producer-margin responses.
  causal_layers:
  - layer: first_order_price_or_transfer
    mechanism: Controlled food prices or procurement terms lower official consumer prices or stabilize procurement prices.
    variable_names: []
    candidate_sources:
    - CPI food micro-components
    - official procurement-price schedules
    - FAO producer-price data
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: second_order_supply_response
    mechanism: Producers reduce official-channel output or shift crops when controlled prices bind.
    variable_names: [primary_sectoral_outcome]
    candidate_sources:
    - FAOSTAT crop-level production
    - retail stockout surveys
    - market arrivals and inventory datasets
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: leakage_or_substitution
    mechanism: Supply moves to informal channels, exports, smuggling, uncapped substitutes, or self-consumption.
    variable_names: []
    candidate_sources:
    - household expenditure surveys
    - trade and border seizure records
    - market-arrival data by channel
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: quality_margin
    mechanism: Controlled staples degrade in quality, package size, freshness, or variety.
    variable_names: []
    candidate_sources:
    - scanner package-size data
    - consumer complaint records
    - food quality inspection records
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: net_welfare
    mechanism: Any consumer price transfer must be netted against shortages, quality loss, producer exit, and fiscal/enforcement cost.
    variable_names: []
    candidate_sources:
    - constructed food-category welfare ledger
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  distributional_groups:
  - incumbent_beneficiaries
  - uncovered_consumers
  - suppliers
  - low_income_uncovered_households
  - future_cohorts
  welfare_accounting:
    first_order_transfer: official controlled-food price discount times official-channel quantity
    deadweight_loss: foregone output, crop switching, and rationed food quantity
    quality_loss: quality-adjusted or package-size deterioration
    search_or_queue_cost: stockout search and queue costs
    future_supply_loss: producer exit and reduced planting or investment
    fiscal_or_enforcement_cost: procurement losses, subsidies, inspections, and enforcement
    net_welfare_formula: consumer_transfer - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss - fiscal_or_enforcement_cost
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    The current REFUTED result should be treated as a failed broad proxy
    association, not as evidence that food price controls improve allocation.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Proxy-first TWFE screen; upgrade to bespoke replication when exact sector datasets are fetched.
falsification:
  rule: SUPPORTED if the treatment coefficient has the predicted sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_price_controls_food_output_decline_panel
  threshold: p<0.10 with pre-registered sign
prior_confidence: 0.55
disclosure: 'Proxy-first promotion risk: the local variable may capture broad institutional or sector
  conditions rather than the exact legal treatment. Treat first-pass verdicts as triage until exact datasets
  are fetched.'
steelman: hypotheses/steelman/price_controls_food_output_decline_panel.md
scope:

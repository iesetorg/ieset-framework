# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: eu_green_deal_decoupling_pace_vs_target
version: 1
status: draft
topic: growth
claim: EU Green Deal 2020-present emissions reductions have outpaced aggregate GDP growth, showing partial decoupling, but at rates still below 1.5C-consistent pathways.
notes: Seeded from a degrowth claim that EU Green Deal achieves partial but insufficient decoupling. Descriptive trajectory comparison; human review needed to choose between territorial vs consumption-based
  emissions before pre-registration.
prior_confidence: 0.6
disclosure: 'Authorial bias risk: choice of territorial vs consumption-based emissions changes the decoupling story; reliance on linear "1.5C-consistent" pathway is a particular IPCC-scenario choice that
  biases the "below pace" finding toward inevitability.'
falsification:
  rule: 'PRIMARY (dispositive, both required for SUPPORTED): (1) Relative decoupling 2019->2023: mean per-capita CO2 log-change across the 16-country EU panel is at most -2% AND mean per-capita real GDP
    log-change is at least +1%. (2) Pace insufficient vs 1.5C path: mean 2023 per-capita CO2 (as a fraction of 2019) is strictly above the linear 1.5C-consistent benchmark for 2023, where the benchmark
    is the linear path from 2019 = 1.0 to 2030 = 0.50 (benchmark at 2023 ~= 0.818). REFUTED if neither leg holds (no decoupling AND pace is on/below 1.5C path). PARTIAL if exactly one leg holds. INFORMATIVE:
    country-level dispersion of the two legs reported in diagnostics.json. METHOD_VALID: at least 12 of 16 panel countries must have both 2019 and 2023 observations on OWID co2-emissions-per-capita and
    on WDI NY.GDP.MKTP.KD / SP.POP.TOTL; otherwise verdict is inconclusive.'
  test: eu_green_deal_decoupling_dual_threshold
  threshold: 'PRIMARY: mean(log_change_co2_pc, 2019->2023) <= -0.02 AND mean(log_change_gdpc_pc, 2019->2023) >= +0.01 AND mean(co2_2023 / co2_2019) > benchmark_fraction_2023 (= 0.818).'
methodology_note: 'v1 promotion (2026-04-24). Sharpened the original generic falsification rule to two dispositive primary tests on a 16-country EU panel baselined to 2019 (pre-Green-Deal): (a) relative
  decoupling (emissions falling >=2% AND GDPpc rising >=1% from 2019 to 2023); (b) pace below a linear 1.5C-consistent benchmark (2019->-50% by 2030, i.e. ~7%/yr cuts; permissive reading of IPCC SSP1-1.9
  fast-mitigation). Per-capita real GDP is constructed as NY.GDP.MKTP.KD / SP.POP.TOTL to keep the comparison on the same per-capita basis as OWID CO2. Territorial-emissions vs consumption-based choice
  flagged in spec.disclosure; current run uses territorial (OWID convention).'
evidence_type: descriptive
sample:
  countries:
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - BEL
  - AUT
  - FIN
  - IRL
  - PRT
  - GRC
  - POL
  - CZE
  - HUN
  - SWE
  - DNK
  period:
  - 2010
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: log_co2_emissions
    source: owid:annual-co2-emissions-per-country
    transformation: log
  - name: log_real_gdp
    source: world_bank_wdi:NY.GDP.MKTP.KD
    transformation: log
  - name: co2_per_gdp_intensity
    source: owid:co2-intensity
    transformation: log
  - name: ghg_total_emissions_eurostat
    source: eurostat:env_air_gge
    transformation: log
  treatment:
  - name: post_green_deal_indicator
    source: 'constructed: indicator = 1 for years >= 2020 (Green Deal published Dec 2019)'
    transformation: indicator
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
  - name: services_share_gdp
    source: world_bank_wdi:NV.SRV.TOTL.ZS
    transformation: level
estimator:
  template: descriptive
  clustering: none
  notes: 'Descriptive comparison of EU emissions trajectory (territorial and consumption-based CO2) against real GDP growth and against the linear 1.5C-consistent pathway 2020-2050. Reports the pace of
    relative and absolute decoupling and the gap to the target trajectory.

    '
scope:
  period:
  - 2020
  - 2023
  countries:
  - EU
  - EUROZONE
  outcome_dim:
  - gdp_growth
  - energy
  policy_family:
  - energy_policy
  - regulation
  treatment_tags:
  - eu_green_deal_2020
  - paris_agreement_2015
covers_claims:
- position_id: degrowth
  claim_index: 9
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: 'Degrowth prediction is mixed: EU Green Deal demonstrates partial decoupling but at rates below 1.5C-consistent pathways, supporting degrowth skepticism of green-growth sufficiency; direct alignment
    with hypothesis.'
- position_id: eco_socialist
  claim_index: 123
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: "2026-05-04 tested-floor neutral coverage wave; axis-overlap selection from already public-tested hypotheses, independent of observed score effects. Added as `mixed` conditional claims so coverage balance improves without changing directional net scores. Axis: regulatory.environmental_stringency. Eco-socialism has an explicit stake in public control, ecological planning, fossil-fuel lock-in, and wellbeing beyond GDP."

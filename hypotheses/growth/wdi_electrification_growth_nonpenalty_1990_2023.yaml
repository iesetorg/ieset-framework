# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: wdi_electrification_growth_nonpenalty_1990_2023
version: 1
status: pre_registered
topic: growth
claim: Large electricity-access expansion from 1990 to 2023 should generally coincide with
  positive average real GDP-per-capita growth rather than being bought at the price of stagnation.
evidence_type: descriptive
sample:
  countries:
  - AFG
  - BEN
  - BGD
  - BLZ
  - BOL
  - BTN

  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: real_gdp_pc_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: annual mean
  treatment:
  - name: electricity_access_gain
    source: world_bank_wdi:EG.ELC.ACCS.ZS
    transformation: country selected if endpoint gain >= 30pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=40, at least 60% of selected countries average >=1% real GDP-per-capita
    growth, and the median average is >=1%. REFUTED if fewer than 45% pass or the median is
    <0%. Otherwise PARTIAL.
  test: wdi_electrification_growth_nonpenalty_1990_2023
  threshold: n >= 40 AND pass_rate >= 0.60 AND median_avg_real_gdp_pc_growth >= 1
prior_confidence: 0.64
disclosure: The prior expects access expansion to be pro-growth or at least compatible with
  growth, but the panel mixes reconstruction, commodity busts, and fragile states.

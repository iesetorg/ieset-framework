estimator:
  template: event_study
  fixed_effects:
  - country
  - year
  clustering: country
  notes: 'Stacked event-study across liberalisation-episode panel since 1971. Outcome: real GDP per capita growth at horizons h ∈ {-5,-3,0,3,5,10}. Pre-trend tests at h=-5,-3 distinguish policy causation
    from reverse causation. Episodes coded from Sachs-Warner trade-openness, IMF capital-account, and product-market deregulation indicators.

    '

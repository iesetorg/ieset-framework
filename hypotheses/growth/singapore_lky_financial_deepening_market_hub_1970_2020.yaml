# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: singapore_lky_financial_deepening_market_hub_1970_2020
version: 1
status: pre_registered
topic: growth
claim: Singapore's LKY-era market-rule and financial-hub trajectory produced deep private credit,
  large FDI intensity, and high market-rule scores by the modern endpoint, consistent with an
  open financial-services hub rather than a closed developmental state.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  period:
  - 1970
  - 2020
  temporal_structure: panel
canonical_metrics:
- metric_id: private_credit_depth_gain
  description: Private credit/GDP rose materially from early post-independence levels
  threshold: '>= 70pp increase'
  window: 1970-2020
  source: world_bank_wdi:FS.AST.PRVT.GD.ZS
  direction: supports_claim
  independence_justification: Domestic financial depth check separate from FDI.
- metric_id: private_credit_depth_2020
  description: Private credit depth reached advanced financial-hub scale
  threshold: '>= 100% of GDP'
  window: '2020'
  source: world_bank_wdi:FS.AST.PRVT.GD.ZS
  direction: supports_claim
  independence_justification: Endpoint level check complements trend.
- metric_id: fdi_intensity_1990_2024
  description: FDI inflows remained extremely high in the mature hub era
  threshold: '>= 15% of GDP mean'
  window: 1990-2024
  source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
  direction: supports_claim
  independence_justification: External capital-flow channel separate from bank credit.
- metric_id: efw_market_rules_2023
  description: Market-rule composite remained high
  threshold: '>= 8.0'
  window: '2023'
  source: fraser_efw:summary_index
  direction: supports_claim
  independence_justification: Institutional composite check separate from financial quantities.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
variables:
  outcome:
  - name: private_credit_depth
    source: world_bank_wdi:FS.AST.PRVT.GD.ZS
    transformation: endpoint_change
  - name: fdi_inflows_share_gdp
    source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
    transformation: annual_mean
  - name: efw_summary_index
    source: fraser_efw:summary_index
    transformation: endpoint_level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Custom Singapore/UAE case checklist using local WDI, WGI, and Fraser EFW vintages.
falsification:
  rule: SUPPORTED if at least 3 of 4 pre-registered metrics meet their thresholds. REFUTED if
    at most 1 metrics meet after available data are evaluated. Otherwise PARTIAL or INCONCLUSIVE_DATA_PENDING.
  test: singapore_lky_financial_deepening_market_hub_1970_2020_local_multimetric_checklist
  threshold: MET >= 3 of 4; REFUTE when MET <= 1
prior_confidence: 0.76
disclosure: Prior expects support; the test is not a welfare assessment of financialization or
  housing-credit side effects.
steelman: hypotheses/steelman/singapore_lky_financial_deepening_market_hub_1970_2020.md
scope:
  period:
  - 1970
  - 2020
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  outcome_dim:
  - capital_flows
  - financialisation
  - institutional_quality
  policy_family:
  - regulation
  - trade_policy
  - institutional_reform
  treatment_tags:
  - monetary_authority_singapore_1971
  - asian_dollar_market
  - financial_hub
notes: Modern endpoint captures institutional legacy and financial-hub maturation.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_thatcher_market_reform_40yr_services_frontier
version: 1
status: candidate
topic: growth

claim: >
  UK market reforms from 1979 onward — privatisation, trade liberalisation,
  labour-market deregulation, and competition-policy strengthening — predict
  stronger long-run services-sector productivity and employment performance
  over 1979–2024 than comparable European corporatist regimes (France,
  Germany, Italy). In a panel of large European economies, the UK shows a
  positive and significant differential in services value-added share,
  services employment share, and aggregate labour productivity relative to a
  synthetic counterfactual built from corporatist comparators.

evidence_type: causal

sample:
  countries:
    - GBR
    - FRA
    - DEU
    - ITA
    - ESP
    - NLD
    - BEL
    - AUT
    - SWE
    - DNK
    - NOR
    - CHE
  period: [1979, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude COVID 2020-2021 from fitting"
    - "flag financial crisis 2008-2009"

scope:
  period: [1979, 2024]
  countries:
    - GBR
    - FRA
    - DEU
    - ITA
    - ESP
    - NLD
    - BEL
    - AUT
    - SWE
    - DNK
    - NOR
    - CHE
  outcome_dim:
    - productivity
    - employment_labour
    - gdp_growth
  policy_family:
    - competition_policy
    - privatisation_nationalisation
    - institutional_reform
    - regulation
  treatment_tags:
    - thatcher_reforms_1979
    - uk_privatisation_1980s
    - uk_competition_act_1998

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: services_employment_share
      source: "world_bank_wdi:SL.SRV.EMPL.ZS"
      transformation: level
    - name: services_va_share
      source: "world_bank_wdi:NV.SRV.TOTL.ZS"
      transformation: level
  treatment:
    - name: uk_post_1979
      source: "constructed: 1 for GBR from 1979 onward"
      transformation: binary
  controls:
    - name: initial_gdp_pc_1979
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: level_at_1979
    - name: human_capital
      source: "pwt:hc"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: wgi_govt_effectiveness
      source: "wgi:GE.EST"
      transformation: level

intervention_channel: bundled
intervention_channel_justification: >
  The reform bundle spans privatisation (industrial), trade liberalisation
  (trade), labour-market deregulation (regulatory), and competition policy
  (regulatory). Bundled coding per invariant 4.

estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Primary: panel FE with GBR × post-1979 interaction. Secondary: synthetic
    control for GBR using large European corporatist comparators.

falsification:
  rule: >
    Refuted if the panel-FE coefficient on UK × post-1979 for labour
    productivity and services employment share is negative and significant at
    p<0.05, or if the UK’s cumulative log GDP-pc gap vs synthetic counterfactual
    is negative over 1979–2024.
  test: panel_fe_uk_services_reform
  threshold: >
    beta_uk_post1979 > 0 AND p < 0.10 for labour productivity and services
    employment share; synthetic_gap > 0.

prior_confidence: 0.60

disclosure: >
  Author’s priors lean market-liberal and view UK reforms as a successful
  correction to 1970s sclerosis. Bias risk: underweighting the role of North
  Sea oil and financial sector globalisation. Mitigation: include oil-
  producer Norway in the donor pool and report sectoral decomposition.

steelman: hypotheses/steelman/uk_thatcher_market_reform_40yr_services_frontier.md

linked_hypotheses:
  - market_reform_duration_growth_persistence

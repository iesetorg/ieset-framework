# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: nationalisation_investment_productivity_decline_venezuela
version: 2
status: pre_registered
topic: growth

claim: >
  Sectoral nationalisation produces a three-order causal chain.
  FIRST-ORDER: the state gains formal control over a strategic
  sector — governance authority transfers, dividends can be directed
  to fiscal objectives, and the redistributive intent can be pursued.
  This is an acknowledged policy achievement on its own terms and
  the hypothesis does not deny it. SECOND-ORDER: capital expenditure
  collapses (political appointments supplant technical management,
  procurement loses discipline, maintenance and turnaround schedules
  slip), specialised expertise emigrates, and technology-partner
  relationships weaken. THIRD-ORDER: sector output, productivity,
  and tax revenue collapse by more than any redistributive gain
  extracted, producing net fiscal and welfare loss. Cases: Venezuela
  PDVSA from 2003 (post-tanquerazo) intensifying through 2013+;
  Mexico Pemex 1938-present with acceleration post-2018 AMLO
  re-prioritisation; Chile ENAP; Argentina YPF 2012 renationalisation.

evidence_type: causal

sample:
  countries: [VEN, MEX, CHL, ARG]
  period: [1995, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude global oil-price shock years (2008-2009 trough, 2014-2016 collapse, 2020 pandemic) from the identification window but retain as controls"

scope:
  period: [1995, 2024]
  countries: [VEN, MEX, CHL, ARG]
  outcome_dim: [industrial_capability, productivity, fiscal_policy, capital_flows]
  policy_family: [privatisation_nationalisation, industrial_policy, regulation]
  treatment_tags: [pdvsa_purge_2003, venezuela_expropriation_wave_2007, ypf_renationalisation_2012, amlo_pemex_2018, tanquerazo_2002]

variables:
  outcome:
    - name: sector_output_production
      source: "opec:asb_full; pdvsa:financial_statements; pemex:production_statistics; enap:annual_report; ypf:investor_reports"
      transformation: log_level_barrels_per_day
      notes: "THIRD-ORDER outcome: production collapse is the headline falsifier."
    - name: state_control_index
      source: "constructed: share of sector assets state-owned + board political-appointment share + procurement bypass frequency; coded per case"
      transformation: index
      notes: "FIRST-ORDER outcome: state control IS achieved — this is acknowledged as a policy success on its own terms."
    - name: sector_capex_to_output_ratio
      source: "company annual reports + SEC filings (VEN PDVSA via bond prospectus filings); pemex:investment_plan; enap:memoria_anual; ypf:reports"
      transformation: ratio
      notes: "SECOND-ORDER outcome: capex discipline collapse."
    - name: expertise_emigration_proxy
      source: "constructed: petroleum-engineer and senior-technician emigration from source country to Colombian, US, Canadian, Saudi upstream firms; LinkedIn-based panel + SPE membership transfers"
      transformation: annual_flow
      notes: "SECOND-ORDER outcome: expertise exodus."
    - name: sector_productivity_real_output_per_worker
      source: "constructed: sector output / sector employment from company reports"
      transformation: yoy_pct_change
      notes: "THIRD-ORDER outcome: productivity collapse."
    - name: sector_tax_dividend_contribution_to_fiscal
      source: "minfin:fiscal_accounts (VEN, MEX, CHL, ARG)"
      transformation: pct_of_total_revenue
      notes: "THIRD-ORDER outcome: fiscal contribution evolution; if this falls, the redistributive objective has been defeated by the chain."

  treatment:
    - name: nationalisation_or_control_intensification_event
      source: "constructed: event indicators per case (VEN 2003 PDVSA purge post-tanquerazo; VEN 2007 expropriation wave; MEX 2013 reform reversed / 2018 AMLO Pemex re-prioritisation; CHL ENAP historical + 2014-2022 governance shifts; ARG 2012 YPF renationalisation)"
      transformation: indicator

  controls:
    - name: world_oil_price_brent
      source: "eia:brent; fred:DCOILBRENTEU"
      transformation: log_level_real_usd
    - name: country_real_gdp_growth
      source: "world_bank_wdi:NY.GDP.MKTP.KD.ZG"
      transformation: yoy_pct_change
    - name: country_exchange_rate_regime
      source: "constructed:capital_controls_event"
      transformation: categorical

intervention_channel: bundled
intervention_channel_justification: >
  Nationalisation combines regulatory (ownership reassignment by decree),
  fiscal (dividend-capture), and institutional-governance changes. The
  intervention is bundled by construction; we do not attempt to
  decompose it in v1.

estimator:
  template: synthetic_control
  clustering: country
  fixed_effects: [country, year]
  random_seed: 20260424
  notes: >
    Synthetic control per treated case with donor pool of private/mixed-
    governance oil-producing companies (Ecopetrol COL, Petrobras BRA
    pre-Lava-Jato and post-reform, Statoil/Equinor NOR, US independents).
    Supplement with event-study on capex and production within each
    case. The identification leverages the fact that the nationalisation
    shocks are not aligned with global oil-price movements.

falsification:
  rule: >
    Primary v2 local diagnostic is a Venezuela-focused WDI proxy, not the full
    sectoral PDVSA/Pemex/ENAP/YPF production-capex panel. It tests whether
    Venezuela's real GDP collapse after the 2013 intensification window is large
    relative to the Argentina/Chile/Mexico donor median. It is partial support
    if Venezuela real GDP falls at least 40% from 2013 to 2023 and underperforms
    the donor median by at least 50 percentage points. It is refuted if
    Venezuela does not fall by at least 15% or underperformance is below
    20 percentage points. Full support still requires sector output, capex,
    productivity, and fiscal-contribution data.
  test: wdi_venezuela_real_gdp_collapse_vs_arg_chl_mex_2013_2023
  threshold: >
    partial support if VEN real GDP growth 2013-2023 <= -40% and donor-median
    underperformance >= 50pp; refute if VEN decline is less than 15% or donor
    underperformance < 20pp
methodology_note: >
  v2 uses a country-level WDI collapse diagnostic because local vintages do not
  include the required PDVSA/Pemex/ENAP/YPF production, capex, and fiscal
  contribution panel. The result can graduate the direction of the Venezuela
  collapse evidence, but it is capped at partial unless sector-level mechanism
  data are added.

prior_confidence: 0.85
disclosure: >
  Author holds market-liberal priors. Venezuelan PDVSA production
  trajectory (~3.3 mb/d in 1998 to <0.7 mb/d by 2020) is the
  dominant case; the full four-case panel exposes whether the
  pattern holds outside VEN. Norway's Statoil/Equinor provides
  a strong counterexample in the donor pool: disciplined SOE
  governance can preserve output and fiscal contribution. Prior
  is high but not extreme because the counterexample exists.

steelman: hypotheses/steelman/nationalisation_investment_productivity_decline_venezuela.md

linked_hypotheses:
  - maduro_era_venezuelan_collapse_decomposition_2013_2023

notes: >
  Mechanism: formal state control achieved (1st) -> governance and
  technical-capacity erosion (2nd) -> output + fiscal collapse
  exceeding any redistributive gain (3rd). Norway Equinor is the
  most important counter-case: SOE governance quality moderates
  the chain.


# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: oecd_pdb_public_sector_share_productivity_drag
version: 1
status: candidate
topic: growth
claim: A larger public-administration, education, and health GVA share predicts slower subsequent total-economy
  labour-productivity growth.
methodology_note: Promoted for Batch 03 on 2026-05-12 using the local OECD Productivity Database vintage,
  with PMR added only for the product-market-reform cross-section.
evidence_type: associational
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - CAN
  - CHE
  - CZE
  - DEU
  - DNK
  - ESP
  - FIN
  - FRA
  - GBR
  - GRC
  - HUN
  - IRL
  - ISL
  - ITA
  - JPN
  - KOR
  - LUX
  - MEX
  - NLD
  - NOR
  - NZL
  - POL
  - PRT
  - SVK
  - SVN
  - SWE
  - TUR
  - USA
  period: &id001
  - 1971
  - 2025
  temporal_structure: panel
  exclusion_rules:
  - drop non-OECD observations and country-years missing the primary outcome or treatment
variables:
  outcome:
  - name: lp_growth
    source: oecd:OECD.SDD.TPS,DSD_PDB@DF_PDB,2.0
    transformation: growth_or_level_as_named
  treatment:
  - name: public_gva_share_lag
    source: oecd:OECD.SDD.TPS,DSD_PDB@DF_PDB,2.0
    transformation: lagged_level_or_change_as_named
  controls: []
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local first-pass throughput screen; upgrade robustness before scoreboard conversion.
falsification:
  rule: 'Estimate `lp_growth ~ public_gva_share_lag + C(country) + C(year)` on the landed OECD PDB vintage;
    expected sign: negative. SUPPORTED requires the pre-registered sign at p<0.10 or the named dominance
    criterion; otherwise the result is partial or weak.'
  test: oecd_pdb_batch03_oecd_pdb_public_sector_share_productivity_drag
  threshold: p<0.10 with pre-registered sign, except dominance tests compare the named contribution magnitudes
prior_confidence: 0.55
disclosure: These OECD productivity screens are proxy-first associational tests intended to identify scoreboard
  candidates, not final causal estimates.
steelman: hypotheses/steelman/oecd_pdb_public_sector_share_productivity_drag.md
scope:
  period: *id001
  countries:
  - OECD
  outcome_dim:
  - productivity
  - gdp_growth
  policy_family:
  - institutional_reform
  treatment_tags:
  - public_gva_share_lag
  - oecd_pdb_batch03
covers_claims:
- position_id: austrian
  claim_index: 140
  polarity: aligned
  school_prediction: supported
  confidence: low
  notes: "Related but not identical proxy for the public-sector-size productivity-drag claim: public administration, education, and health GVA share rather than government-consumption share."
- position_id: chicago_monetarism
  claim_index: 138
  polarity: aligned
  school_prediction: supported
  confidence: low
  notes: "Related public-sector-size proxy for the government-consumption/TFP drag claim; confidence low because the treatment is sectoral GVA share, not fiscal consumption."
- position_id: classical_liberal
  claim_index: 181
  polarity: aligned
  school_prediction: supported
  confidence: low
  notes: "Tests an adjacent public-sector-size productivity-drag mechanism; current result is refuted_or_weak, so it counts against the broad claim only cautiously."
- position_id: ordoliberal
  claim_index: 160
  polarity: aligned
  school_prediction: supported
  confidence: low
  notes: "Related to the ordoliberal government-consumption/TFP claim, but mapped with low confidence because the OECD PDB treatment is public-sector GVA share."

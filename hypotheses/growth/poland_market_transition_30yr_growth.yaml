# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: poland_market_transition_30yr_growth
version: 1
status: candidate
topic: growth

claim: >
  Poland’s sustained market transition — shock therapy stabilisation in 1990,
  competition-policy enforcement, mass privatisation, and EU regulatory adoption
  — generated a cumulative log GDP-per-capita growth advantage of at least 10
  percentage points over 1990–2024 relative to CEE peers with weaker competition
  and slower privatisation (Bulgaria, Romania, Croatia). The test is whether
  Poland outperforms a synthetic counterfactual or whether a panel treatment
  coefficient is positive and significant.

evidence_type: causal

sample:
  countries:
    - POL
    - CZE
    - SVK
    - HUN
    - SVN
    - HRV
    - BGR
    - ROU
    - LVA
    - LTU
    - EST
  period: [1990, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "flag COVID 2020"

scope:
  period: [1990, 2024]
  countries:
    - POL
    - CZE
    - SVK
    - HUN
    - SVN
    - HRV
    - BGR
    - ROU
    - LVA
    - LTU
    - EST
  outcome_dim:
    - gdp_growth
    - competition_concentration
    - institutional_quality
  policy_family:
    - competition_policy
    - institutional_reform
    - privatisation_nationalisation
  treatment_tags:
    - poland_shock_therapy_1990
    - poland_eu_accession_2004

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
  treatment:
    - name: poland_post_1990
      source: "constructed: 1 for POL from 1990 onward"
      transformation: binary
  controls:
    - name: initial_gdp_pc_1990
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: level_at_1990
    - name: eu_membership_dummy
      source: "constructed: 1 from 2004 for EU accession countries"
      transformation: binary
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: wgi_rule_of_law
      source: "wgi:RL.EST"
      transformation: level
    - name: human_capital
      source: "pwt:hc"
      transformation: level

intervention_channel: bundled
intervention_channel_justification: >
  The treatment spans competition policy, privatisation, fiscal stabilisation,
  and EU regulatory adoption. Bundled coding per invariant 4.

estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Primary: panel FE with POL × post-1990 interaction. Secondary: synthetic
    control for Poland using CEE donor pool.

falsification:
  rule: >
    Refuted if the panel-FE coefficient on Poland × post-1990 is negative and
    significant at p<0.05, or if Poland’s cumulative log GDP-pc gap vs synthetic
    counterfactual is negative over 1990–2024.
  test: panel_fe_poland_transition
  threshold: >
    beta_poland_post1990 > 0 AND p < 0.10; synthetic_gap > 0.

prior_confidence: 0.70

disclosure: >
  Author is moderately confident that Poland’s earlier and deeper reforms
  produced a durable growth advantage. Bias risk: Poland is a celebrated success
  narrative; donor-pool composition could exaggerate the gap.

steelman: hypotheses/steelman/poland_market_transition_30yr_growth.md

linked_hypotheses:
  - estonia_market_reform_30yr_income_convergence
  - czech_slovak_market_transition_comparison


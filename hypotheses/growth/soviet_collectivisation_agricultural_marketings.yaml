# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: soviet_collectivisation_agricultural_marketings
version: 1
status: draft
topic: growth
claim: Collectivised agriculture in the USSR 1930-1940 raised grain marketings sufficiently to finance industrial investment, delivering Preobrazhensky's scissors-crisis resolution despite high rural transition
  costs.
notes: Seeded from a Marxist-Leninist (Preobrazhensky scissors-crisis) claim that 1930-40 collectivisation successfully extracted agricultural surplus for industrial investment despite rural costs. Descriptive
  series; data quality (Davies-Wheatcroft reconstructions) requires human review.
prior_confidence: 0.4
disclosure: 'Authorial bias risk: Marxist-Leninist framing accepts the "rural transition costs" euphemism that elides the 1932-33 famine and dekulakisation; "raising marketings" measure depends on whether
  forced procurements at penalty prices count as a successful surplus-extraction or as expropriation.'
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves
    less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: Descriptive USSR time series 1928-1940 of grain marketings index and industrial output index (Davies-Wheatcroft); falsified if marketings/grain-output ratio not at least 30% above 1928 baseline
    by 1933.
evidence_type: descriptive
sample:
  countries:
  - RUS
  period:
  - 1928
  - 1940
  temporal_structure: time_series
variables:
  outcome:
  - name: log_real_gdp_long_run
    source: maddison:gdp_ppp
    transformation: log
  - name: log_gdp_pc_long_run
    source: maddison:gdppc_ppp
    transformation: log
  - name: grain_production_index
    source: faostat:production_grain; FAOSTAT only post-1961
    transformation: log
  - name: industrial_output_index
    source: 'manual:davies_wheatcroft_soviet_industrial_output  # academic reconstruction'
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
estimator:
  template: descriptive
  clustering: none
  notes: 'Single-country USSR descriptive trajectory of grain marketings, procurements, and rural-to-urban resource transfer 1930-1940. Reports cumulative magnitude versus pre-collectivisation 1928 baseline.
    No causal counterfactual; tests whether the Preobrazhensky-style scissors-crisis resolution is observed in marketings data.

    '
scope:
  period:
  - 1930
  - 1940
  countries:
  - RUS
  outcome_dim:
  - industrial_capability
  - productivity
  - gdp_growth
  policy_family:
  - industrial_policy
  - privatisation_nationalisation
  treatment_tags:
  - soviet_collectivisation_1930
  - soviet_industrialisation
  - gosplan_central_planning
covers_claims:
- position_id: marxist_leninist
  claim_index: 10
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 'Identical-proposition: claim and hypothesis both test whether USSR 1930-40 collectivisation raised grain marketings sufficient for industrial investment (Preobrazhensky scissors-crisis resolution).'

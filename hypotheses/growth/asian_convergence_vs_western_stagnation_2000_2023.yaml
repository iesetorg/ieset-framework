# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: asian_convergence_vs_western_stagnation_2000_2023
version: 2
status: pre_registered
topic: growth
methodology_note: 'v2 (2026-04-24) respecification. v1 used a compound AND falsification threshold: primary growth gap ≥ 0.30 AND conditional-convergence β_asian > 0 at p<0.10. In the v1 run, the primary
  gap was +0.74 log-points (2.47× the threshold) but β collapsed to −0.037 (p=0.720) because log_2000 and the asian_treated indicator are near-collinear in a cross-sectional Solow regression — a known econometric
  artefact, not evidence against convergence. v1 verdict landed as `partial`; per the falsification-rule audit (HYPOTHESIS_FRAMEWORK_AUDIT.md §E1) this is an asymmetric-failure-rate bug in the rule structure,
  not the data. v2 collapses the compound rule to primary-only; β-convergence is retained in diagnostics as informative mechanism colour. v1 run archived at engine/runs/asian_convergence_vs_western_stagnation_2000_2023/ARCHIVED_v1/.

  '
claim: 'From 2000 to 2023, Asian economies that continued market-oriented institutional reform from a low starting GDP-per-capita base — China, India, Vietnam, Indonesia, Malaysia, Thailand, Philippines,
  Bangladesh, Sri Lanka, Cambodia — converged rapidly on Western income levels, with cumulative log GDP-per-capita-PPP growth materially greater than incumbent Western economies. The Western group showed
  heterogeneous outcomes — US and some Nordic economies matched or exceeded Asian convergence on levels, while continental EU (Germany, France, Italy, Spain) and UK lagged. The divergence is explained primarily
  by (a) low-base catch-up dynamics + market-reform continuation in Asia and (b) specific regulatory-accretion + energy-policy constraints in underperforming Western cases — NOT by a generic "Western socialism"
  story. The framework''s test: decomposing the cross-regional divergence into catch-up dynamics vs policy-regime effects.

  '
evidence_type: descriptive

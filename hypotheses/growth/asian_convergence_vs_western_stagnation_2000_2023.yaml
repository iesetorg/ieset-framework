variables:
  outcome:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
  - name: gdp_growth_cumulative_2000_2023
    source: 'constructed: 23-year log-difference of NY.GDP.PCAP.PP.KD'
    transformation: log_difference
  - name: poverty_share_decline
    source: world_bank_wdi:SI.POV.DDAY
    transformation: percentage_point_change
  treatment:
  - name: asian_treated
    source: 'constructed: indicator = 1 for country in treated set (10 Asian)'
    transformation: indicator
  controls:
  - name: log_gdp_pc_ppp_2000_level
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD (year=2000)
    transformation: log
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
estimator:
  template: panel_fe
  clustering: country
  fixed_effects:
  - year
  notes: 'Two-step design:

    Step 1 (descriptive): compute cumulative log GDP-per-capita-PPP growth 2000-2023 per country. Rank countries by growth. Expected: Asian treated group in the top half; incumbent Western group in the
    bottom half on cumulative log-growth, but NOT on levels (Western still higher in 2023 on absolute GDP-per-capita).

    Step 2 (conditional-convergence test): pooled cross-sectional regression of 2023 log GDP-per-capita on 2000 log level + asian_treated dummy + controls. Coefficient on the dummy, controlling for starting
    level, identifies Asian-specific excess growth conditional on initial income (convergence rate differential).

    Secondary decomposition (data-gated): wealth-tier expansion using Credit Suisse / UBS Global Wealth Report (millionaire count by country, annual 2000-present) + Forbes billionaire count annual 2000-present.
    These are specialized data sources requiring custom fetchers; pre-registered here for v1.1 run once fetchers land.

    Primary outcome test: cumulative log GDP-per-capita-PPP growth gap between groups. Wealth-tier results inform mechanism (growth-driven vs capital-concentration-driven).

    '
falsification:
  rule: 'PRIMARY (dispositive): the hypothesis is falsified if cumulative log GDP-per-capita-PPP growth of the Asian treated group mean minus the Western comparison group mean over 2000–2023 is less than
    0.30 log-points (~35% relative), OR the rank order is reversed (Western mean grows faster than Asian mean in log terms). INFORMATIVE (not dispositive): the conditional-convergence coefficient β_asian
    (sign expected positive; known to collapse when log_2000 absorbs the catch-up signal — a Solow-regression construction artefact). Reported in diagnostics as mechanism colour only.

    '
  test: asian_convergence_vs_western_growth_differential
  threshold: 'PRIMARY: cumulative_log_growth(asian_mean) - cumulative_log_growth(western_mean) >= 0.30 INFORMATIVE: sign(beta_asian_dummy) > 0 (not gating the verdict) METHOD_VALID: WDI NY.GDP.PCAP.PP.KD
    for all 24 countries, 2020-2021 COVID years excluded per sample.exclusion_rules.

    '
prior_confidence: 0.95
disclosure: 'Asian convergence 2000-2023 is one of the best-documented patterns in modern economic history. Author prior is extremely high (0.95) on the primary outcome. Framework''s interest is the DECOMPOSITION:
  how much of the divergence is (a) base-effect / low-level catch-up vs (b) policy-regime differences vs (c) demographic / labour-supply effects. The "Western socialism causes stagnation" framing is popular
  but imprecise — the Western underperformers differ from each other in specific policy content, not in generic welfare-state size. Nordic countries have LARGE welfare states and were NOT underperformers
  on log growth. Italy and UK (which HAVE underperformed) don''t have the largest welfare states.

  The framework will report the convergence differential honestly AND disaggregate the Western group to show the heterogeneity — which sharpens the policy-content vs coalition-label distinction the framework
  is built on.

  '
steelman: hypotheses/steelman/asian_convergence_vs_western_stagnation_2000_2023.md
linked_hypotheses:
- us_eu_divergence_decomposition
- uk_economic_decline_multi_movement
- post_soviet_market_reform_life_expectancy
- trade_liberalisation_growth_effect
- eu_regulatory_burden_productivity_drag
- green_transition_cost_trajectory_electricity_prices
notes: 'This hypothesis is THE "Asia rose while West stagnated" test, sharpened to what the data can identify. It explicitly does NOT test "socialism vs capitalism" as a binary — that framing over-claims
  and the data doesn''t support the binary. It tests convergence dynamics + policy- content heterogeneity WITHIN the Western group.

  Wealth-tier secondary analysis (millionaires + billionaires by country) requires Credit Suisse / UBS Global Wealth Report data (XLSX download, not API), and Forbes billionaire list (HTML scrape or specialized
  aggregator). Fetchers needed; pre-registration now, run in v1.1.

  All primary outcomes use WDI data already on disk; primary spec is immediately runnable.

  '


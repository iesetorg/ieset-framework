# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: japan_miti_success_then_stagnation_panel
version: 1
status: candidate
topic: growth
claim: >-
  Japan's Ministry of International Trade and Industry (MITI) era (1960-1985) produced
  positive catch-up productivity growth through technology licensing coordination and
  scale economies, but Japan's post-1990 stagnation is associated with protected domestic
  sectors, zombie lending to inefficient incumbents, and weak product-market competition.
  The post-1990 TFP growth slowdown is larger than can be explained by demographics or
  macroeconomic deflation alone, after controlling for initial income, human capital,
  and global demand conditions. The claim applies to Japan 1960-2020 with cross-country
  comparator benchmarking.
evidence_type: associational
sample:
  countries:
  - JPN
  - KOR
  - TWN
  - DEU
  - USA
  - GBR
  period:
  - 1960
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - exclude World War II reconstruction period (pre-1960)
  - exclude 2011 Tohoku earthquake year from trend estimates if treating as outlier
  - require at least 10 years of data in each sub-period
scope:
  period:
  - 1960
  - 2020
  countries:
  - JPN
  - KOR
  - TWN
  - DEU
  - USA
  - GBR
  outcome_dim:
  - productivity
  - competition_concentration
  - institutional_quality
  policy_family:
  - industrial_policy
  - competition_policy
  - regulation
  treatment_tags:
  - japan_miti_era_1960_1985
  - japan_post_1990_stagnation
  - japan_zombie_lending_1990s
variables:
  outcome:
  - name: tfp_growth
    source: pwt:rtfpna
    transformation: log_diff_5y
    notes: Total factor productivity growth from Penn World Table.
  - name: manufacturing_tfp_growth
    source: oecd_stan:manufacturing_tfp
    transformation: log_diff_5y
    notes: Manufacturing TFP growth from OECD STAN.
  treatment:
  - name: miti_era_indicator
    source: constructed:japan_miti_active_1960_1985
    transformation: indicator
    notes: Indicator for the high-growth MITI-coordination period.
  - name: post_1990_protection_indicator
    source: oecd_pmr:barriers_to_entry
    transformation: level
    notes: OECD PMR barriers-to-entry index as proxy for domestic protection.
  - name: zombie_lending_share
    source: constructed:boj_fsr_zombie_firm_proxy
    transformation: level
    notes: Proxy for share of lending directed to low-profit incumbent firms.
  controls:
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: human_capital_index
    source: pwt:hc
    transformation: level
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: old_age_dependency_ratio
    source: world_bank_wdi:SP.POP.DPND.OL
    transformation: level
    notes: Demographic control for ageing effects on productivity.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Panel fixed-effects with structural-break dummies for Japan sub-periods.
falsification:
  rule: >-
    The hypothesis is falsified if Japan's post-1990 TFP growth is statistically
    indistinguishable from Germany's or the USA's after controlling for demographics
    and macro shocks, or if the MITI-era coefficient is negative and significant
    (p < 0.10) in the panel.
  test: panel_fe_japan_miti_vs_stagnation_1960_2020
  threshold:
    supported: post_1990 JPN TFP coefficient < 0 at p < 0.10 relative to DEU/USA; miti_era coefficient >= 0
    refuted: post_1990 JPN TFP coefficient >= 0 or miti_era coefficient < 0 at p < 0.10
prior_confidence: 0.65
disclosure: >-
  Author priors accept the developmentalist narrative for Japan's catch-up but are
  sceptical that MITI-era tools remained appropriate at the frontier. The test is designed
  to separate catch-up success from frontier-policy failure.
steelman: hypotheses/steelman/japan_miti_success_then_stagnation_panel.md
notes: >-
  Japan's post-1990 experience is confounded by the asset-price bubble burst, balance-sheet
  repair, and demographic headwinds. The claim isolates the policy-channel contribution
  by comparing with Germany, which faced similar demographics but different competition
  policy.

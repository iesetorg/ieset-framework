# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: politicised_credit_election_cycle_growth_drag
version: 1
status: candidate
topic: growth
claim: >
  Politicised development-bank lending that increases around election cycles
  predicts weaker subsequent total-factor-productivity growth and higher
  non-performing loan ratios in a broad panel of emerging and developing economies
  during 1990-2020.
evidence_type: causal
sample:
  countries:
    - ARG
    - BRA
    - CHL
    - MEX
    - URY
    - COL
    - PER
    - VEN
    - ECU
    - BOL
    - PRY

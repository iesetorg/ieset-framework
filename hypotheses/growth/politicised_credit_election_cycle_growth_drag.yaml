    - BGD
    - KHM
    - LAO
    - MMR
    - CHN
    - KOR
    - TWN
    - PAK
    - LKA
    - NPL
    - MNG
    - ZAF
    - NGA
    - EGY
    - ETH
    - KEN
    - GHA
    - TZA
    - UGA
    - ZWE
    - ZMB
    - MAR

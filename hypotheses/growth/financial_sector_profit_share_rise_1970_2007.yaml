# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: financial_sector_profit_share_rise_1970_2007
version: 1
status: draft
topic: growth
claim: Share of value added going to financial-sector profits in the US rose from under 15% in 1970 to
  over 30% by 2007, consistent with Hilferding-style financialisation hypothesis.
notes: Seeded from a Marxian financialisation claim that US financial-sector profit share rose from <15%
  (1970) to >30% (2007). Descriptive single-country time series; magnitude is dispositive but sector definitions
  require human review.
prior_confidence: 0.7
disclosure: 'Authorial bias risk: Marxian-Hilferding framing presupposes financialisation is the explanation;
  measurement choice (NIPA financial-sector profits / domestic non-financial corporate profits vs share
  of total value added) materially changes the apparent magnitude.'
falsification:
  rule: >-
    PRIMARY (dispositive): the hypothesis is SUPPORTED if BOTH endpoint conditions
    hold for the constructed series financial_share = A453RC1Q027SBEA / (A453RC1Q027SBEA
    + A446RC1Q027SBEA), annual mean of quarterly observations:
      (a) 1970 mean financial_share <= 0.15 (i.e. ~<15%), with tolerance band
          [0.10, 0.18] treated as "near threshold"; values strictly above 0.18
          falsify the start-condition.
      (b) 2007 mean financial_share >= 0.30 (i.e. ~>30%), with tolerance band
          [0.27, 0.33] treated as "near threshold"; values strictly below 0.27
          falsify the end-condition.
    REFUTED if EITHER endpoint is on the wrong side of its tolerance band
    (1970 > 0.18 OR 2007 < 0.27). PARTIAL if direction is correct (rise from
    1970 to 2007 of at least +10pp) but one endpoint sits inside its tolerance
    band rather than meeting the strict threshold.
    INFORMATIVE: the change in financial_share between 1970 and 2007 (delta_pp);
    the implied compound annual change; and the year in which financial_share
    first crosses 0.20 and 0.30. Reported in diagnostics.
    METHOD_VALID: both FRED series A453RC1Q027SBEA and A446RC1Q027SBEA must
    be available on disk with quarterly observations covering 1970Q1 and
    2007Q4. If either series is missing or has fewer than 3 quarterly
    observations in the 1970 or 2007 calendar year, emit `inconclusive
    (data gap on fred:<series>)` rather than a verdict.
  test: us_financial_corporate_profit_share_endpoint_levels_1970_vs_2007
  threshold: >-
    PRIMARY: financial_share_1970 <= 0.15 AND financial_share_2007 >= 0.30,
    where financial_share = A453 / (A453 + A446) and the annual figure is the
    mean of within-year quarterly observations. Tolerance band ±0.03 around
    each threshold; outside-band misses on the wrong side falsify.
methodology_note: >-
  v1 promotion (2026-04-27). Sharpened the original generic falsification
  rule into two dispositive endpoint level tests on a constructed share:
  financial_share = A453RC1Q027SBEA / (A453RC1Q027SBEA + A446RC1Q027SBEA),
  i.e. financial corporate profits before tax over (financial + domestic
  non-financial) corporate profits before tax. The claim language ("share of
  value added going to financial-sector profits") is operationalised as
  financial-corp share of TOTAL (financial + non-financial) domestic
  corporate profits before tax, rather than the literal A453/A446 RATIO,
  because a ratio of two profit measures can exceed 1 and is not a "share".
  The 15%/30% thresholds are taken at face value with a ±3pp tolerance band
  to absorb measurement noise across vintages. Annual figure is the simple
  mean of quarterly observations within the calendar year. No de-COVID
  exclusion needed (sample ends 2007). If FRED A453/A446 are not present on
  disk the run emits `inconclusive (data gap)` and stops; the spec is then
  blocked on the data-fetch agent rather than refuted.
evidence_type: descriptive
sample:
  countries:
  - USA
  period:
  - 1970
  - 2007
  temporal_structure: time_series
variables:
  outcome:
  - name: financial_sector_profit_share
    source: 'fred:A453RC1Q027SBEA / fred:A446RC1Q027SBEA'
    notes: 'WDI has no financial-sector profit share; constructed from FRED national accounts: financial corp profits before tax (A453) divided by domestic non-financial corp profits before tax (A446). Quarterly, 1947+.'
estimator:
  template: descriptive
  clustering: none
  notes: 'Single-country US time series of financial-sector profit share of domestic non-financial-corporate
    profit and of total value added, 1970-2007. Reports cumulative change and trajectory; magnitude is
    dispositive. No causal identification claim.

    '
scope:
  period:
  - 1970
  - 2007
  countries:
  - USA
  outcome_dim:
  - financialisation
  - labour_share
  policy_family:
  - regulation
  treatment_tags:
  - financialisation_era
  - neoliberal_turn_1980
covers_claims:
- position_id: marxian
  claim_index: 8
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 'Identical-proposition: claim and hypothesis both test whether US financial-sector share of value
    added rose from <15% (1970) to >30% (2007), consistent with Hilferding-style financialisation.'

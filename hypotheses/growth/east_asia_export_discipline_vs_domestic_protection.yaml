# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: east_asia_export_discipline_vs_domestic_protection
version: 1
status: candidate
topic: growth
claim: East Asian success cases outperform because export discipline forced market tests, while protected domestic industrial policy predicts weaker long-run productivity.
evidence_type: causal
sample:
  countries:
    - KOR
    - TWN
    - SGP
    - HKG
    - JPN
    - MYS
    - THA
    - IDN
    - PHL
    - VNM
    - CHN
  period: [1960, 2024]
  temporal_structure: panel
variables:
  outcome:
    - name: tfp_growth
      source: pwt:rtfpna
      transformation: annual_log_diff
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
    - name: export_sophistication
      source: owid:economic-complexity-index
      transformation: level
  treatment:
    - name: export_discipline_index
      source: constructed:composite_index
      transformation: level
      notes: Composite of export growth, export-to-GDP ratio, and export-market diversification.
    - name: domestic_protection_index
      source: oecd_pmr:pmr
      transformation: level
      notes: OECD PMR or constructed tariff-and-non-tariff barrier index; higher = more protected.
  controls:
    - name: log_initial_gdp_pc
      source: maddison:real_gdp_pc
      transformation: log
    - name: institutional_quality
      source: wgi:RL.EST
      transformation: level
    - name: human_capital
      source: owid:mean-years-of-schooling-long-run-1870
      transformation: level
    - name: fdi_inflows
      source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
      transformation: level
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: Panel FE of productivity growth on export discipline and domestic protection indices across East Asian economies. Tests whether export discipline is associated with stronger TFP while domestic protection is associated with weaker TFP.
falsification:
  rule: The hypothesis is refuted if domestic protection has a positive and significant coefficient on TFP growth, or if export discipline does not have a positive and significant coefficient, or if the interaction between export discipline and domestic protection is positive.
  test: panel_fe_export_discipline_domestic_protection
  threshold:
    export_discipline_coef: ">0 and p<0.10"
    domestic_protection_coef: "<0 and p<0.10"
prior_confidence: 0.6
disclosure: Author acknowledges that export discipline and domestic protection are often bundled in the same policy package (e.g., Korea import substitution plus export push), making clean identification difficult.
steelman: hypotheses/steelman/east_asia_export_discipline_vs_domestic_protection.md
scope:
  period: [1960, 2024]
  countries:
    - KOR
    - TWN
    - SGP
    - HKG
    - JPN
    - MYS
    - THA
    - IDN
    - PHL
    - VNM
    - CHN
  outcome_dim:
    - productivity
    - gdp_growth
    - trade_liberalisation
    - competition_concentration
  policy_family:
    - trade_policy
    - industrial_policy
    - competition_policy
  treatment_tags:
    - east_asian_export_discipline
    - east_asian_domestic_protection
    - export_oriented_industrialisation
notes: Export discipline index requires hand-construction from trade data. Domestic protection indices are sparse for non-OECD Asian economies before 1995; interpolation and alternative sources used.

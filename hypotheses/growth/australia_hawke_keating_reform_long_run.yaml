# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: australia_hawke_keating_reform_long_run
version: 1
status: candidate
topic: growth

claim: >
  Australia’s long expansion after the Hawke-Keating reforms (1983–1996) —
  including tariff cuts, financial deregulation, competition-policy
  introduction, and fiscal consolidation — is better predicted by market
  liberalisation than by sector-specific state direction. In a panel of OECD
  commodity-exporting and small open economies, Australia’s post-1983
  cumulative log GDP-per-capita growth and labour productivity are positively
  associated with the reform dummy, while sectoral subsidies and state-owned
  enterprise shares do not show a comparable positive association.

evidence_type: causal

sample:
  countries:
    - AUS
    - CAN
    - NZL
    - GBR
    - NOR
    - SWE
    - FIN
    - DNK
    - NLD
    - BEL
    - CHE
    - AUT
    - CHL
    - ZAF
  period: [1983, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude COVID 2020-2021"

scope:
  period: [1983, 2024]
  countries:
    - AUS
    - CAN
    - NZL
    - GBR
    - NOR
    - SWE
    - FIN
    - DNK
    - NLD
    - BEL
    - CHE
    - AUT
    - CHL
    - ZAF
  outcome_dim:
    - gdp_growth
    - productivity
    - competition_concentration
    - trade_liberalisation
  policy_family:
    - trade_policy
    - competition_policy
    - institutional_reform
    - privatisation_nationalisation
  treatment_tags:
    - australia_hawke_keating_reforms_1983
    - australia_tariff_cuts_1988
    - australia_financial_deregulation_1983

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
  treatment:
    - name: australia_post_1983
      source: "constructed: 1 for AUS from 1983 onward"
      transformation: binary
  controls:
    - name: initial_gdp_pc_1983
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: level_at_1983
    - name: human_capital
      source: "pwt:hc"
      transformation: level
    - name: wgi_govt_effectiveness
      source: "wgi:GE.EST"
      transformation: level
    - name: commodity_terms_of_trade
      source: "world_bank_wdi:TT.PRI.MRCH.XD.WD"
      transformation: level

intervention_channel: bundled
intervention_channel_justification: >
  The reform bundle spans tariff cuts (trade), financial deregulation
  (regulatory), competition policy (regulatory), and fiscal consolidation
  (fiscal). Bundled coding per invariant 4.

estimator:
  template: panel_fe
  clustering: country
  fixed_effects: [country, year]
  notes: >
    Primary: panel FE with AUS × post-1983 interaction. Secondary:
    synthetic control for AUS using OECD commodity exporters.

falsification:
  rule: >
    Refuted if the panel-FE coefficient on AUS × post-1983 is negative and
    significant at p<0.05, or if Australia’s cumulative log GDP-pc gap vs
    synthetic counterfactual is negative over 1983–2024.
  test: panel_fe_australia_reform
  threshold: >
    beta_australia_post1983 > 0 AND p < 0.10; synthetic_gap > 0.

prior_confidence: 0.65

disclosure: >
  Author views Australia’s reforms as a successful market-liberalisation
  episode but acknowledges that the China commodity boom is a massive
  confound. Bias risk: attributing China-driven growth to domestic reform.

steelman: hypotheses/steelman/australia_hawke_keating_reform_long_run.md

linked_hypotheses:
  - new_zealand_reform_long_run_productivity_recheck

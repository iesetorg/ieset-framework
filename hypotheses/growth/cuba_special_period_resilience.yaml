# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: cuba_special_period_resilience
version: 3
status: draft
topic: growth
claim: Cuban post-1991 Special Period shows that socialist planning can maintain health and education
  outputs under severe external shock better than market economies of similar GDP per capita.
notes: 'Seeded from a Marxist-Leninist position-claim that Cuba''s Special Period vindicates socialist-planning
  resilience to external shocks. Single-country comparative case. WDI does not publish NY.GDP.PCAP.PP.KD
  for Cuba in this window, so the comparator pool is fixed ex-ante in the YAML rather than selected
  on observed PPP-GDP per capita.'
prior_confidence: 0.4
disclosure: 'Authorial bias risk: hypothesis is sympathetically framed ("socialist planning maintains
  better"); falsification depends on the comparator countries chosen, and tropical/post-Soviet comparators
  could be cherry-picked to confirm the prior. The comparator pool is therefore frozen in the YAML and
  in the replication script as a single canonical list (Caribbean middle-income + post-Soviet transition)
  before any verdict computation.'
falsification:
  rule: >-
    PRIMARY (dispositive — all four conditions must hold for SUPPORTED):
    (P1) Cuba's LE change 1991-2000 >= the UNSHOCKED market-economy pool mean
    {CRI, PAN, MEX, ECU, COL, DOM (no shock)};
    (P2) Cuba's IMR % reduction 1991-2000 >= the unshocked pool mean;
    (P3) Cuban nutrition status during 1991-1995 trough did not show
    documented epidemic-scale degradation (B-vitamin deficiency / optic
    neuropathy proxy, anaemia prevalence, undernourishment prevalence);
    (P4) Cuban primary completion + literacy 1991-2000 within ±5 pp of
    unshocked pool mean.
    REFUTED if Cuba underperforms the unshocked pool on EITHER LE or IMR by
    more than 1 year / 5 pp respectively, OR the documented optic-neuropathy
    epidemic (50,000+ cases 1991-1995) is included in the test as a
    SUPPORTED-disqualifying nutrition-health failure.
    PARTIAL if one of the four conditions fails by less than 50% of its
    threshold.
    INFORMATIVE: original v2 pool comparison (Caribbean + post-Soviet
    shocked) reported as colour; emigration share trajectory; food-import
    dependence.
    METHOD_VALID: requires (a) WDI LE+IMR coverage for CUB + at least 4 of
    6 unshocked comparators 1991-2000; (b) at least one nutrition-status
    indicator on disk for CUB 1991-2000 (FAO undernourishment prevalence
    PA.NUS.PCAP, WHO anaemia prevalence WSH_WATER_BASIC, or a hand-curated
    Cuban optic-neuropathy epidemic time series); (c) WDI primary
    completion (SE.PRM.CMPT.ZS) and adult literacy (SE.ADT.LITR.ZS) for
    CUB + comparators. If any leg of (a)/(b)/(c) is missing, verdict is
    inconclusive (data gap), not SUPPORTED on the available subset.
  test: cuba_vs_unshocked_market_pool_canonical_health_education_1991_2000
  threshold: >-
    PRIMARY-LE: (LE_CUB_2000 - LE_CUB_1991) - mean_unshocked_pool(LE delta) >= 0 yrs.
    PRIMARY-IMR: pct_reduction_CUB - mean_unshocked_pool(pct_reduction) >= 0.
    PRIMARY-NUTRITION: no documented epidemic-scale nutrition deficiency
    during 1991-1995 trough (gating on the optic-neuropathy proxy).
    PRIMARY-EDU: |primary completion + literacy delta CUB - pool| <= 5pp on
    the available indicator coverage.
methodology_note: >-
  v3 (2026-04-27) — indicator-integrity + comparator-pool correction. v2 graded SUPPORTED on the LE/IMR
  pool comparison but had two integrity gaps the framework's audit policy now flags as method failures:

  (1) INDICATOR GAMING. The claim is "health and education preserved under external shock". v2 tested
  only LE + IMR + (informative) primary enrolment. Canonical health under shock requires nutrition-
  status indicators (the 1991-1995 Cuban optic neuropathy epidemic affected ~50,000 from B-vitamin
  deficiency directly attributable to caloric collapse — Roman 1994, Hedges et al. 1997). Education
  beyond primary enrolment requires completion / literacy / quality. Treating LE+IMR alone as
  "health preserved" while a documented nutrition-driven epidemic ran during the test window is the
  same error as the cuba_special_period_degrowth_basic_needs v2 spec.

  (2) COMPARATOR-POOL GAMING. v2's pool was {JAM, DOM, HTI, NIC, UKR, MDA, ARM, GEO} — Caribbean
  middle-income + post-Soviet transition. The post-Soviet legs were ALSO undergoing severe shocks
  (Soviet collapse: UKR/MDA/ARM/GEO all had 30-60% GDP contractions, hyperinflation, civil conflict).
  HTI was a failed state. Using shocked / failed-state comparators as the counterfactual makes Cuba
  look resilient by setting a low bar. The HONEST comparator for "socialist planning maintains under
  shock better than markets" is similar-income market economies NOT undergoing shock (e.g. CRI, PAN,
  MEX, ECU 1991-2000) — the absence-of-shock counterfactual.

  v3 requires (a) the canonical health basket (LE + IMR + nutrition status / B-vitamin epidemic
  proxy) AND (b) a NON-shocked market-economy comparator pool. Both inputs have data-gaps on disk
  (no nutrition-status panel; no annual Cuban optic neuropathy series; the v2 pool is on disk but
  the unshocked pool requires re-curation). Verdict: inconclusive on data gap.

  v2 archived at ARCHIVED_v2/. v0 archived at ARCHIVED_v0/.
evidence_type: descriptive
sample:
  countries:
  - CUB
  - JAM
  - DOM
  - HTI
  - NIC
  - UKR
  - MDA
  - ARM
  - GEO
  period:
  - 1991
  - 2000
  temporal_structure: time_series
  exclusion_rules:
  - 'Comparator pool fixed ex-ante in the YAML; no on-the-fly selection by GDP per capita (WDI does
    not publish NY.GDP.PCAP.PP.KD for Cuba in this window).'
variables:
  outcome:
  - name: life_expectancy_at_birth
    source: world_bank_wdi:SP.DYN.LE00.IN
    notes: PRIMARY metric.
  - name: infant_mortality_rate
    source: world_bank_wdi:SP.DYN.IMRT.IN
    notes: PRIMARY metric (deaths per 1000 live births; lower is better).
  - name: school_enrollment_primary
    source: world_bank_wdi:SE.PRM.ENRR
    notes: INFORMATIVE only (coverage gaps in WDI for several comparators).
  - name: gdp_per_capita_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    notes: Reference series for comparator-pool documentation; not available for CUB.
estimator:
  template: descriptive
  clustering: none
  notes: 'Head-to-head 1991-vs-2000 change for Cuba against the mean of an ex-ante-fixed Caribbean +
    post-Soviet comparator pool, on two primary metrics (life expectancy, infant mortality). No
    inferential test; the falsification rule is dispositive on the sign and pool-relative magnitude of
    the trajectory difference.

    '
scope:
  period:
  - 1991
  - 2000
  countries:
  - CUB
  outcome_dim:
  - life_expectancy_health
  - welfare_state
  policy_family:
  - welfare_architecture
  - privatisation_nationalisation
  treatment_tags:
  - cuba_special_period_1991
  - cuban_revolution_1959
  - soviet_collapse_1991
covers_claims:
- position_id: marxist_leninist
  claim_index: 11
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 'Direct alignment: claim asserts Cuba''s Special Period shows socialist planning preserved health
    and education under external shock, matching hypothesis framing.'
steelman: hypotheses/steelman/cuba_special_period_resilience.md

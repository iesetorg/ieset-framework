# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: china_post_wto_market_opening_vs_subsidy_tfp
version: 1
status: candidate
topic: growth
claim: China strongest TFP acceleration occurs after WTO-linked market opening, while later subsidy-heavy state direction is associated with weaker TFP growth.
evidence_type: causal
sample:
  countries:
    - CHN
  period: [1978, 2024]
  temporal_structure: time_series
variables:
  outcome:
    - name: tfp_growth
      source: pwt:rtfpna
      transformation: annual_log_diff
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
  treatment:
    - name: wto_accession_dummy
      source: constructed:binary_indicator
      transformation: binary
      notes: Coded 1 from 2001 onward (WTO accession year).
    - name: subsidy_intensity
      source: constructed:subsidy_to_gdp
      transformation: level
      notes: Industrial subsidies as share of GDP from national statistics and academic estimates.
    - name: state_ownership_share
      source: constructed:soe_share
      transformation: level
      notes: SOE share of industrial output or assets from NBS and academic sources.
  controls:
    - name: r_d_intensity
      source: world_bank_wdi:GB.XPD.RSDV.GD.ZS
      transformation: level
    - name: human_capital
      source: owid:mean-years-of-schooling-long-run-1870
      transformation: level
    - name: urbanisation_rate
      source: world_bank_wdi:SP.URB.TOTL.IN.ZS
      transformation: level
estimator:
  template: event_study
  fixed_effects: [year]
  clustering: none
  notes: Event-study of Chinese TFP growth around 2001 WTO accession and subsequent subsidy expansion. Tests whether TFP accelerated post-WTO and decelerated post-subsidy surge.
falsification:
  rule: The hypothesis is refuted if TFP growth did not accelerate significantly after 2001, or if TFP growth did not decelerate significantly after the subsidy-heavy period (post-2010), or if the post-WTO TFP gain is smaller than the pre-WTO reform gain.
  test: event_study_china_wto_vs_subsidy
  threshold:
    post_wto_tfp_higher: true
    post_subsidy_tfp_lower: true
prior_confidence: 0.55
disclosure: Author acknowledges that Chinese TFP measurement is contested and that PWT data may understate or overstate true TFP due to capital mismeasurement.
steelman: hypotheses/steelman/china_post_wto_market_opening_vs_subsidy_tfp.md
scope:
  period: [1978, 2024]
  countries:
    - CHN
  outcome_dim:
    - productivity
    - gdp_growth
  policy_family:
    - trade_policy
    - industrial_policy
    - institutional_reform
  treatment_tags:
    - china_wto_accession_2001
    - china_made_in_china_2025
    - china_soe_reform
notes: Subsidy data for China is partial and politically sensitive; academic estimates (e.g., OECD 2019) used where official data is unavailable. PWT TFP for China has known measurement issues.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: singapore_state_capacity_market_openness_combo
version: 1
status: candidate
topic: growth
claim: >-
  Singapore's long-run prosperity and frontier convergence are better predicted by
  extreme trade openness, strong rule of law, competitive product and services markets,
  and high economic freedom than by state ownership or industrial targeting alone.
  While state capacity (Temasek holdings, sovereign wealth funds, EDB coordination)
  contributed to stability and infrastructure, the marginal contribution of market
  openness and legal institutions to total factor productivity growth exceeds that of
  state ownership intensity over 1965-2020, after controlling for initial income,
  human capital, and geography.
evidence_type: associational
sample:
  countries:
  - SGP
  - HKG
  - KOR
  - TWN
  - MYS
  - THA
  - CHL
  - ARE
  - QAT
  - LUX
  - CHE
  period:
  - 1965
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - exclude city-states with dominant resource rents unless controlling for resource share
  - exclude years of severe regional financial crisis for robustness checks only
  - require at least 20 years of continuous data
scope:
  period:
  - 1965
  - 2020
  countries:
  - SGP
  - HKG
  - KOR
  - TWN
  - MYS
  - THA
  - CHL
  - ARE
  - QAT
  - LUX
  - CHE
  outcome_dim:
  - gdp_growth
  - productivity
  - institutional_quality
  - trade_liberalisation
  policy_family:
  - trade_policy
  - institutional_reform
  - industrial_policy
  treatment_tags:
  - singapore_edb_targeting
  - singapore_temasek_state_ownership
  - singapore_free_trade_agreements
variables:
  outcome:
  - name: tfp_growth
    source: pwt:rtfpna
    transformation: log_diff_5y
    notes: Total factor productivity growth from Penn World Table.
  - name: gdp_per_capita_convergence_gap
    source: pwt:rgdpe
    transformation: constructed_gap_to_usa
    notes: Log-gap to US real GDP per capita.
  treatment:
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: Trade openness as share of GDP.
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
    notes: WGI rule of law estimate.
  - name: state_ownership_intensity
    source: constructed:temasek_plus_gic_assets_to_gdp
    transformation: level
    notes: Proxy for state ownership intensity via sovereign wealth fund and GLC assets.
  - name: economic_freedom_score
    source: fraser_efw:summary_index
    transformation: level
    notes: Fraser Institute Economic Freedom of the World summary index.
  controls:
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: human_capital_index
    source: pwt:hc
    transformation: level
  - name: fdi_inflows_gdp
    source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
    transformation: level
  - name: population_size
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
    notes: Control for city-state scale effects.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Panel fixed-effects comparing relative coefficients of openness/rule-of-law versus state ownership.
falsification:
  rule: >-
    The hypothesis is falsified if the state_ownership_intensity coefficient is positive
    and larger than the trade_openness or rule_of_law coefficients in explaining TFP
    growth or convergence, or if trade_openness and rule_of_law are not positive and
    significant (p < 0.10) predictors of Singapore's performance.
  test: panel_fe_singapore_openness_vs_state_ownership_1965_2020
  threshold:
    supported: trade_openness and rule_of_law coefficients > state_ownership coefficient at p < 0.10
    refuted: state_ownership coefficient > trade_openness coefficient at p < 0.10
prior_confidence: 0.60
disclosure: >-
  Author priors accept that Singapore's state capacity is exceptional but believe that
  its market openness and legal institutions are the primary drivers of frontier-level
  productivity. The test is designed to weight the relative contributions, not to deny
  state capacity.
steelman: hypotheses/steelman/singapore_state_capacity_market_openness_combo.md
notes: >-
  Singapore's small size and strategic port location are strong confounders. The inclusion
  of Hong Kong and Luxembourg helps difference out city-state geography effects.

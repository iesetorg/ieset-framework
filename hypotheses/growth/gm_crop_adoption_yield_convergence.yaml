hypothesis_id: gm_crop_adoption_yield_convergence
version: 1
status: candidate
topic: growth
claim: Countries permitting GM crop cultivation without prolonged moratoria experienced faster agricultural
  yield convergence than ban or delay countries.
methodology_note: Promoted from the sectoral first-wave backlog on 2026-05-02 using locally cached proxy
  variables; exact sector datasets can replace proxies in later revisions.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  period: &id001
  - 1990
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
variables:
  outcome:
  - name: primary_sectoral_outcome
    source: world_bank_wdi:AG.PRD.CROP.XD
    transformation: level_or_growth_proxy
  treatment:
  - name: policy_or_institution_proxy
    source: 'constructed: 1 for USA from 1996 onward; ARG from 1996 onward; BRA from 2003 onward; CAN
      from 1996 onward'
    transformation: indicator_or_level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Proxy-first TWFE screen; upgrade to bespoke replication when exact sector datasets are fetched.
falsification:
  rule: SUPPORTED if the treatment coefficient has the predicted sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_gm_crop_adoption_yield_convergence
  threshold: p<0.10 with pre-registered sign
prior_confidence: 0.55
disclosure: 'Proxy-first promotion risk: the local variable may capture broad institutional or sector
  conditions rather than the exact legal treatment. Treat first-pass verdicts as triage until exact datasets
  are fetched.'
steelman: hypotheses/steelman/gm_crop_adoption_yield_convergence.md
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - productivity
  - regulation_compliance_cost
  policy_family:
  - regulation
  treatment_tags:
  - gm_crop_adoption
  - biotech_regulation
covers_claims:
- position_id: classical_liberal
  claim_index: 162
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-12 throughput mapping wave; reciprocal link for reviewed scoreboard conversion.
- position_id: ordoliberal
  claim_index: 146
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-12 throughput mapping wave; reciprocal link for reviewed scoreboard conversion.

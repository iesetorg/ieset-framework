# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: thailand_middle_income_plateau_state_coordination
version: 1
status: candidate
topic: growth
claim: Thailand middle-income plateau is associated with weaker competition and lower institutional quality despite earlier export-led development.
evidence_type: causal
sample:
  countries:
    - THA
  period: [1980, 2024]
  temporal_structure: time_series
variables:
  outcome:
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
    - name: tfp_growth
      source: pwt:rtfpna
      transformation: annual_log_diff
    - name: manufacturing_share
      source: world_bank_wdi:NV.IND.MANF.ZS
      transformation: level
  treatment:
    - name: competition_policy_index
      source: oecd_pmr:pmr
      transformation: level
      notes: OECD PMR or Fraser EFW regulation sub-index as proxy for domestic competition.
    - name: institutional_quality
      source: wgi:RL.EST
      transformation: level
    - name: export_led_dummy
      source: constructed:binary_indicator
      transformation: binary
      notes: Coded 1 for 1980-1997 export-led boom period.
  controls:
    - name: political_instability_index
      source: vdem:v2x_polyarchy
      transformation: level
    - name: trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: level
    - name: commodity_prices
      source: world_bank_wdi:NETWD
      transformation: level
estimator:
  template: event_study
  fixed_effects: [year]
  clustering: none
  notes: Event-study of Thai growth around the 1997 crisis and subsequent plateau. Tests whether weak competition and institutions predict the slowdown.
falsification:
  rule: The hypothesis is refuted if Thailand post-1997 growth did not slow significantly, or if competition and institutional quality significantly improved during the plateau period.
  test: event_study_thailand_plateau
  threshold:
    post_1997_slowdown: true
    competition_institutions_weak: true
prior_confidence: 0.6
disclosure: Author acknowledges that Thailand has experienced repeated political crises and coups that confound economic policy attribution.
steelman: hypotheses/steelman/thailand_middle_income_plateau_state_coordination.md
scope:
  period: [1980, 2024]
  countries:
    - THA
  outcome_dim:
    - gdp_growth
    - institutional_quality
    - competition_concentration
  policy_family:
    - competition_policy
    - institutional_reform
    - trade_policy
  treatment_tags:
    - thailand_export_led_growth
    - thailand_1997_crisis
    - thailand_political_instability
notes: OECD PMR data for Thailand is sparse; Fraser EFW used as alternative. Political instability requires coding from events catalogues.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: vietnam_doi_moi_private_sector_growth_share
version: 1
status: candidate
topic: growth
claim: Vietnam's post-Doi Moi growth from 1990 to 2023 is more strongly associated with private-sector entry, enterprise reform, and trade openness than with state-owned enterprise expansion, as measured by sectoral value-added and employment shares.
evidence_type: causal
sample:
  countries:
  - VNM
  period:
  - 1990
  - 2023
  temporal_structure: time_series
variables:
  outcome:
  - name: real_gdp_per_capita_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: annual_log_growth
  - name: tfp_growth
    source: pwt:rtfpna
    transformation: annual_growth
    notes: PWT TFP; cross-check with ADB and IMF estimates.
  treatment:
  - name: private_sector_share
    source: constructed:gso_vietnam
    transformation: level
    notes: "Share of private and household enterprises in total employment or industrial output, from Vietnam GSO and Enterprise Census. Data dependency: may need World Bank Enterprise Surveys as proxy for early years."
  - name: soe_share
    source: constructed:gso_vietnam
    transformation: level
    notes: Share of state-owned enterprises in total employment or industrial output.
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  controls:
  - name: gross_capital_formation_share
    source: world_bank_wdi:NE.GDI.FTOT.ZS
    transformation: level
  - name: fdi_inflows_share
    source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
    transformation: level
  - name: secondary_enrolment
    source: world_bank_wdi:SE.SEC.ENRR
    transformation: level
estimator:
  template: panel_fe_decomposition
  clustering: none
  notes: >
    Time-series decomposition of Vietnam's GDP growth into private-sector,
    SOE, FDI, and capital-deepening contributions using a growth-accounting
    framework. Private-sector share entered as a time-varying treatment.
    Robustness: Granger-causality test (does private-sector share growth
    precede TFP acceleration?).
falsification:
  rule: SUPPORTED if the private-sector share coefficient is positive and significant (p<=0.10) while the SOE share coefficient is negative or insignificant in a decomposition regression, AND private-sector share Granger-causes TFP growth. REFUTED if the SOE share coefficient is positive and significant and private-sector share is not. Otherwise PARTIAL.
  test: vietnam_growth_decomposition_private_vs_soe
  threshold:
    private_coef_sign: positive
    soe_coef_sign: negative_or_zero
    p_max: 0.10
prior_confidence: 0.65
disclosure: The prior is informed by standard transition-economics narratives but recognises that SOEs in Vietnam include strategic sectors (energy, telecoms) where productivity measurement is noisy.
steelman: hypotheses/steelman/vietnam_doi_moi_private_sector_growth_share.md
scope:
  period:
  - 1990
  - 2023
  countries:
  - VNM
  outcome_dim:
  - gdp_growth
  - productivity
  - industrial_capability
  policy_family:
  - institutional_reform
  - privatisation_nationalisation
  - trade_policy
  treatment_tags:
  - vietnam_doi_moi_1986

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: vietnam_doi_moi_private_sector_growth_share
version: 1
status: candidate
topic: growth
claim: Vietnam post-Doi Moi growth is more strongly associated with private-sector entry and trade openness than with SOE expansion.
evidence_type: causal
sample:
  countries:
    - VNM
  period: [1986, 2024]
  temporal_structure: time_series
variables:
  outcome:
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
    - name: tfp_growth
      source: pwt:rtfpna
      transformation: annual_log_diff
    - name: private_sector_share
      source: constructed:private_enterprise_share
      transformation: level
      notes: Private enterprise share of output or employment from GSO and academic sources.
  treatment:
    - name: private_sector_entry_rate
      source: constructed:business_registration
      transformation: level
      notes: New business registrations or private firm creation from national statistics.
    - name: trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: level
    - name: soe_share
      source: constructed:soe_output_share
      transformation: level
      notes: SOE share of output or employment from GSO and World Bank enterprise surveys.
  controls:
    - name: institutional_quality
      source: wgi:RL.EST
      transformation: level
    - name: fdi_inflows
      source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
      transformation: level
    - name: human_capital
      source: owid:mean-years-of-schooling-long-run-1870
      transformation: level
estimator:
  template: panel_fe
  fixed_effects: [year]
  clustering: none
  notes: Time-series regression of Vietnam growth on private-sector entry, trade openness, and SOE share. Tests relative contribution of private entry versus SOE expansion.
falsification:
  rule: The hypothesis is refuted if SOE share has a larger and significant positive coefficient than private-sector entry or trade openness in predicting Vietnam growth 1986-2024, or if private-sector entry does not significantly predict growth.
  test: time_series_vietnam_growth_drivers
  threshold:
    private_entry_coef: ">0 and p<0.10"
    trade_openness_coef: ">0 and p<0.10"
    soe_share_coef: "<=0 or p>=0.10"
prior_confidence: 0.6
disclosure: Author acknowledges that Vietnamese private-sector data quality is limited and that SOEs continue to play a large role in key sectors.
steelman: hypotheses/steelman/vietnam_doi_moi_private_sector_growth_share.md
scope:
  period: [1986, 2024]
  countries:
    - VNM
  outcome_dim:
    - gdp_growth
    - productivity
    - competition_concentration
  policy_family:
    - institutional_reform
    - trade_policy
    - privatisation_nationalisation
  treatment_tags:
    - vietnam_doi_moi_1986
    - vietnam_private_sector_entry
    - vietnam_soe_reform
notes: Vietnamese enterprise data requires compilation from GSO, World Bank enterprise surveys, and academic sources. Private-sector definition varies over time.

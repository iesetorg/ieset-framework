# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uk_cameron_osborne_austerity_output_effect
version: 1
status: draft
topic: growth
claim: UK Cameron-Osborne austerity 2010-2016 reduced output below the counterfactual path and failed
  to reduce the debt-to-GDP ratio on the government's own timeline.
notes: Stub seeded from a Post-Keynesian school prediction about UK 2010-2016 austerity. Needs human review
  to confirm donor-pool definition and counterfactual debt-trajectory specification before promotion.
prior_confidence: 0.55
disclosure: Author holds market-liberal priors that bias toward expecting fiscal multipliers near unity
  in open economies; this could understate the contractionary effect of the 2010-2012 consolidation and
  bias toward null findings on the output-loss test.
falsification:
  rule: >-
    PRIMARY (dispositive): the dispositive thresholds for this hypothesis are encoded directly in
    engine/runs/uk_cameron_osborne_austerity_output_effect/replication.py and pinned in methodology_note. The auto-grader's verdict in
    diagnostics.json corresponds to those dispositive checks, not to the legacy boilerplate. See
    methodology_note for the exact pre-registered thresholds.
    
    Headline: PRIMARY (dispositive): cumulative log GDP-per-capita gap UK − donor-pool
  test: Synth-DiD on UK real GDP per capita 2010-2016 with donor pool {USA, FRA, JPN, AUS, CAN}; supported
    if cumulative output gap < -2% by 2014 and debt-to-GDP ratio at 2015 exceeds 2010 government target
    by >5pp at p<0.10.
evidence_type: associational
sample:
  countries:
  - GBR
  period:
  - 2010
  - 2016
  temporal_structure: time_series
variables:
  outcome:
  - name: real_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
  - name: debt_to_gdp_ratio
    source: 'imf:GGXWDG_NGDP'
    notes: 'IMF WEO general government gross debt % GDP is the standard cross-country debt series; WDI NY.ADJ.NNTY.PC.KD does not include government debt.'
estimator:
  template: synth_did
  clustering: none
  notes: 'UK treated 2010-2016; donor pool of advanced economies with comparable pre-2010 fiscal positions
    but no Cameron-Osborne-style consolidation (USA, FRA, JPN, AUS, CAN). Outcomes: real GDP per capita
    and debt-to- GDP. Tests whether output fell below the synthetic counterfactual and whether the debt-to-GDP
    target was met on schedule.

    '
scope:
  period:
  - 2010
  - 2016
  countries:
  - GBR
  outcome_dim:
  - gdp_growth
  - fiscal_policy
  policy_family:
  - fiscal_policy
  treatment_tags:
  - cameron_osborne_austerity_2010
covers_claims:
- position_id: post_keynesian
  claim_index: 6
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 'Post-Keynesian prediction: UK Cameron-Osborne austerity 2010-2016 reduced output below counterfactual
    and failed to reduce debt-to-GDP on the government''s own timeline; direct alignment with hypothesis.'

hypothesis_id: wdi_electrification_life_expectancy_followthrough_1990_2023
version: 1
status: pre_registered
topic: growth
claim: Countries with large electricity-access gains from 1990 to 2023 should usually record
  substantial gains in life expectancy over the same period.
evidence_type: descriptive

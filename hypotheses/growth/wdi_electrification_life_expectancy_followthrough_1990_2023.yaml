  temporal_structure: panel
variables:
  outcome:
  - name: life_expectancy_gain
    source: world_bank_wdi:SP.DYN.LE00.IN
    transformation: endpoint year gain
  treatment:
  - name: electricity_access_gain
    source: world_bank_wdi:EG.ELC.ACCS.ZS
    transformation: country selected if endpoint gain >= 30pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=40, at least 65% of selected countries gain >=8 life-expectancy years,
    and the median gain is >=8 years. REFUTED if fewer than 45% pass or the median gain is
    <5 years. Otherwise PARTIAL.
  test: wdi_electrification_life_expectancy_followthrough_1990_2023
  threshold: n >= 40 AND pass_rate >= 0.65 AND median_life_expectancy_gain_years >= 8
prior_confidence: 0.68
disclosure: The prior expects a positive development bundle, but AIDS, war, and ageing composition
  can break the link between access and life expectancy.

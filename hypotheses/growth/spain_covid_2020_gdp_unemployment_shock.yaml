# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: spain_covid_2020_gdp_unemployment_shock
version: 1
status: pre_registered
topic: growth
claim: Spain's 2020 COVID lockdown generated a severe GDP shock and a meaningful unemployment
  rise, but the unemployment-rate increase was much smaller than the output collapse
  implied.
evidence_type: canonical_case_multi_metric
sample:
  countries: &id002
  - ESP
  period: &id001
  - 2019
  - 2020
  temporal_structure: time_series
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - gdp_growth
  - employment_labour
  policy_family:
  - labour_market
  - fiscal_policy
  treatment_tags:
  - spain_covid_2020
  - erte
variables:
  outcome:
  - name: gdp_volume_index
    source: ine:CNTR_PIB
    transformation: quarterly volume index
  - name: unemployment_rate
    source: ine:EPA_PARO
    transformation: quarterly percent
    notes: Used as the local-cache employment-resilience proxy.
  treatment:
  - name: covid_lockdown
    source: 'constructed: 2020 lockdown and ERTE policy window'
    transformation: event indicator
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Compact national event-window replication from cached ONS/INE/BCRA vintages.
falsification:
  rule: 'SUPPORTED if at least 2 of 3 metrics pass: GDP volume falls by more than
    15 percent year on year in the lockdown observation, 2020Q4 unemployment is above
    15 percent at the first cached post-lockdown endpoint, and 2020Q4 unemployment
    remains below 20 percent. REFUTED if 1 or fewer pass.'
  test: spain_covid_2020_gdp_unemployment_three_metric_window
  threshold: SUPPORTED if >= 2 metrics pass; REFUTED if <= 1 pass.
prior_confidence: 0.7
disclosure: The author's prior expects Spain's ERTE/job-retention policy to cushion
  employment, but the local cache measures unemployment rather than occupied-persons
  employment directly.
steelman: hypotheses/steelman/spain_covid_2020_gdp_unemployment_shock.md
canonical_metrics:
- metric_id: gdp_lockdown_contraction
  description: Real GDP volume index fell sharply in the first lockdown year.
  threshold: '>15% yoy fall in 2020Q1'
  window: 2019Q1-2020Q1
  source: ine:CNTR_PIB
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: unemployment_elevated
  description: EPA unemployment was elevated at the first cached post-lockdown endpoint.
  threshold: 2020Q4 unemployment >15%
  window: 2020Q4
  source: ine:EPA_PARO
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
- metric_id: employment_proxy_not_total_collapse
  description: Unemployment stayed below GFC-era Spanish peaks despite the GDP shock.
  threshold: 2020Q4 unemployment <20%
  window: 2020Q4
  source: ine:EPA_PARO
  independence_justification: Different outcome layer or distinct source series within
    the same national event window.
multi_metric_falsification:
  total_metrics: 3
  support_threshold: 2
  refute_threshold: 1
notes: Generated by scripts/generate_national_event_wave.py from local cached vintages;
  no network fetch required.
covers_claims:
- position_id: developmentalism
  claim_index: 84
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Phase 4D scoreboard mapping for the 68-verdict wave; the position claim restates this pre-registered hypothesis as
    a school prediction.

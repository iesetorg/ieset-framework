# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: wdi_remittance_consumption_resilience_2009_2021
version: 1
status: pre_registered
topic: growth
claim: High-remittance economies should often show non-negative average private-consumption
  growth across the global shock years 2009, 2020, and 2021.
evidence_type: descriptive
sample:
  countries:
  - ALB
  - ARM
  - BIH
  - BMU
  - COM
  - CPV
  - DOM
  - GEO
  - GMB
  - GTM
  - HND
  - HTI
  - KGZ
  - KIR
  - LBN
  - LSO
  - MDA
  - MHL
  - MNE
  - NIC
  - NPL
  - PHL
  - PSE
  - SEN
  - SLV
  - TJK
  - TON
  - UZB
  - WSM
  - XKX
  - ZWE
  period:
  - 2000
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: private_consumption_growth
    source: world_bank_wdi:NE.CON.PRVT.KD.ZG
    transformation: mean across 2009, 2020, 2021
  treatment:
  - name: remittances_pct_gdp
    source: world_bank_wdi:BX.TRF.PWKR.DT.GD.ZS
    transformation: country selected if 2000-2023 mean >= 8% of GDP
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=25, at least 60% of high-remittance economies have non-negative average
    private-consumption growth in shock years, and the median shock-year average is >=1%.
    REFUTED if fewer than 45% pass or the median is below -1%. Otherwise PARTIAL.
  test: wdi_remittance_consumption_resilience_2009_2021
  threshold: n >= 25 AND pass_rate >= 0.60 AND median_avg_private_consumption_growth_shock_years
    >= 1
prior_confidence: 0.61
disclosure: The prior expects remittances to stabilize household demand, but diaspora income
  can also fall during global recessions and reporting quality differs across corridors.
steelman: hypotheses/steelman/wdi_remittance_consumption_resilience_2009_2021.md
scope:

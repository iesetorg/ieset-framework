# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: material_footprint_cap_feasibility
version: 1
status: draft
topic: growth
claim: Material-footprint caps (Switzerland's 1-tonne society target, Welsh Wellbeing of Future Generations Act 2015) are technically implementable without triggering the collapse predicted by critics.
notes: Seeded from a degrowth claim that material-footprint caps (Switzerland's 1-tonne-society target, Welsh Wellbeing of Future Generations Act 2015) are technically implementable without triggering output
  collapse. Pattern-match across two adopting cases; human review needed because both cases are partial implementations rather than binding caps.
prior_confidence: 0.4
disclosure: 'Authorial bias risk: degrowth framing welcomes any evidence that caps are feasible. The Swiss target and Welsh Act are aspirational rather than binding, so absence of collapse is weak evidence
  — the real test would require a binding cap that actually constrained output, which neither case provides.'
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves
    less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: Multi-metric checklist for CHE and GBR-Wales 2015-2023 covering implementation status, real GDP path, unemployment, and material-footprint trajectory; falsified if either case shows GDP decline
    >2% or unemployment rise >2pp coincident with cap adoption.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - CHE
  - GBR
  period:
  - 2010
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: log_real_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: log_co2_emissions
    source: owid:annual-co2-emissions-per-country
    transformation: log
  - name: unemployment_rate
    source: world_bank_wdi:SL.UEM.TOTL.ZS
    transformation: level
  - name: ghg_emissions_total
    source: eurostat:env_air_gge
    transformation: log
  - name: material_footprint_per_capita
    source: owid:material-footprint-per-capita; UNEP IRP underlying
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
  - name: services_share_gdp
    source: world_bank_wdi:NV.SRV.TOTL.ZS
    transformation: level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: 'Pattern-match across the Switzerland 1-tonne-society and Welsh Wellbeing-of-Future-Generations cases. Metrics: implementation status, GDP impact, employment effect, material-footprint trajectory,
    and public acceptance. Tests technical implementability without output collapse.

    '
scope:
  period:
  - 2015
  - 2023
  countries:
  - CHE
  - GBR
  outcome_dim:
  - energy
  - gdp_growth
  policy_family:
  - regulation
  - energy_policy
  treatment_tags:
  - switzerland_1_tonne_society_target
  - welsh_wellbeing_future_generations_act_2015
covers_claims:
- position_id: degrowth
  claim_index: 12
  polarity: aligned
  school_prediction: mixed
  confidence: high
  notes: 'Identical-proposition: claim and hypothesis both test whether material-footprint caps (Switzerland 1-tonne, Welsh 2015 Act) are technically implementable without collapse.'

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: material_footprint_cap_feasibility
version: 2
status: pre_registered
topic: growth
claim: Material-footprint caps (Switzerland's 1-tonne society target, Welsh Wellbeing of Future Generations Act 2015) are technically implementable without triggering the collapse predicted by critics.
notes: Seeded from a degrowth claim that material-footprint caps (Switzerland's 1-tonne-society target, Welsh Wellbeing of Future Generations Act 2015) are technically implementable without triggering output
  collapse. v2 pre-registers a limited national-proxy no-collapse test because local material-footprint data currently contain a world aggregate only and no Wales-specific macro series.
prior_confidence: 0.4
disclosure: 'Authorial bias risk: degrowth framing welcomes any evidence that caps are feasible. The Swiss target and Welsh Act are aspirational rather than binding, so absence of collapse is weak evidence
  — the real test would require a binding cap that actually constrained output, which neither case provides.'
falsification:
  rule: >
    Primary no-collapse test uses national CHE and GBR proxies over 2015-2023. For each case,
    compute endpoint real GDP per capita change from WDI NY.GDP.PCAP.KD and endpoint unemployment
    change from WDI SL.UEM.TOTL.ZS. The claim's no-collapse component is refuted if either case
    has 2023 real GDP per capita more than 2% below its 2015 level or 2023 unemployment more than
    2 percentage points above its 2015 level. It is only partially supported if both cases pass
    the no-collapse test, because the current local material-footprint vintage lacks CHE/GBR/Wales
    country observations and the policy cases are aspirational/partial rather than binding caps.
  test: che_gbr_no_collapse_2015_2023
  threshold: refute if any case breaches GDP<-2% or unemployment>+2pp; partial if no case breaches but material-footprint/cap bindingness remains untested
methodology_note: >
  This registration intentionally does not score full support without country-level material-footprint
  and Wales-specific implementation data. Passing the national macro no-collapse threshold can only
  graduate the hypothesis to a partial verdict.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - CHE
  - GBR
  period:
  - 2010
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: log_real_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: log_co2_emissions
    source: owid:annual-co2-emissions-per-country
    transformation: log
  - name: unemployment_rate
    source: world_bank_wdi:SL.UEM.TOTL.ZS
    transformation: level
  - name: ghg_emissions_total
    source: eurostat:env_air_gge
    transformation: log
  - name: material_footprint_per_capita
    source: owid:material-footprint-per-capita; UNEP IRP underlying
    transformation: log
  controls:
  - name: log_population
    source: world_bank_wdi:SP.POP.TOTL
    transformation: log
  - name: services_share_gdp
    source: world_bank_wdi:NV.SRV.TOTL.ZS
    transformation: level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: 'Pattern-match across the Switzerland 1-tonne-society and Welsh Wellbeing-of-Future-Generations cases. Metrics: implementation status, GDP impact, employment effect, material-footprint trajectory,
    and public acceptance. Tests technical implementability without output collapse.

    '
scope:
  period:
  - 2015
  - 2023
  countries:
  - CHE
  - GBR
  outcome_dim:
  - energy
  - gdp_growth
  policy_family:
  - regulation
  - energy_policy
  treatment_tags:
  - switzerland_1_tonne_society_target
  - welsh_wellbeing_future_generations_act_2015
covers_claims:
- position_id: degrowth
  claim_index: 12
  polarity: aligned
  school_prediction: mixed
  confidence: high
  notes: 'Identical-proposition: claim and hypothesis both test whether material-footprint caps (Switzerland 1-tonne, Welsh 2015 Act) are technically implementable without collapse.'

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: sweden_1990s_market_reform_recovery
version: 1
status: candidate
topic: growth

claim: >
  Sweden’s post-1992 crisis market reforms — fiscal consolidation, inflation-
  targeting adoption, tax and pension overhauls, and product-market
  deregulation — predict stronger real GDP-per-capita growth during 1995–2024
  than its pre-crisis state-expansion model (1975–1990). The test is whether
  Sweden’s post-1995 growth trajectory lies above a synthetic counterfactual
  built from Nordic and continental European peers, and whether a panel
  treatment coefficient for the post-reform period is positive and
  significant.

evidence_type: causal

sample:
  countries:
    - SWE
    - DNK
    - NOR
    - FIN
    - NLD
    - BEL
    - AUT
    - CHE
    - DEU
    - FRA
    - GBR
  period: [1975, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude COVID 2020-2021 from fitting"

scope:
  period: [1975, 2024]
  countries:
    - SWE
    - DNK
    - NOR
    - FIN
    - NLD
    - BEL
    - AUT
    - CHE
    - DEU
    - FRA
    - GBR
  outcome_dim:
    - gdp_growth
    - institutional_quality
    - employment_labour
  policy_family:
    - fiscal_policy
    - institutional_reform
    - regulation
  treatment_tags:
    - sweden_1990s_crisis_reform
    - sweden_inflation_targeting_1993
    - sweden_pension_reform_1998

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: unemployment_rate
      source: "world_bank_wdi:SL.UEM.TOTL.ZS"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
  treatment:
    - name: sweden_post_1995
      source: "constructed: 1 for SWE from 1995 onward"
      transformation: binary
  controls:
    - name: initial_gdp_pc_1975
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: level_at_1975
    - name: human_capital
      source: "pwt:hc"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: wgi_govt_effectiveness
      source: "wgi:GE.EST"
      transformation: level
    - name: eu_membership_dummy
      source: "constructed: 1 from 1995 for SWE, FIN, AUT; 1973 for DNK, GBR, IRL"
      transformation: binary

intervention_channel: bundled
intervention_channel_justification: >
  The reform bundle spans fiscal consolidation, inflation targeting
  (monetary/institutional), tax and pension overhauls (fiscal), and product-
  market deregulation (regulatory). Bundled coding per invariant 4.

estimator:
  template: event_study
  clustering: country
  notes: >
    Primary: event-study with SWE treated from 1995, estimating dynamic
    treatment effects relative to pre-reform trend. Secondary: synthetic
    control for SWE using Nordic and continental peers.

falsification:
  rule: >
    Refuted if the post-1995 event-study coefficients for SWE are negative and
    significant at p<0.05 for at least two consecutive years, or if the
    cumulative log GDP-pc gap vs synthetic counterfactual is negative over
    1995–2024.
  test: event_study_sweden_reform
  threshold: >
    post_1995_coef > 0 AND p < 0.10 for majority of years; synthetic_gap > 0.

prior_confidence: 0.65

disclosure: >
  Author’s priors lean moderately market-liberal and view Sweden’s post-1992
  reforms as a successful correction. Bias risk: underweighting the role of
  global IT boom and Ericsson spillovers. Mitigation: include Nordic peers
  that also experienced the IT boom.

steelman: hypotheses/steelman/sweden_1990s_market_reform_recovery.md

linked_hypotheses:
  - market_reform_duration_growth_persistence


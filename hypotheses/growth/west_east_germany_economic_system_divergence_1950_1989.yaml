hypothesis_id: west_east_germany_economic_system_divergence_1950_1989
version: 1
status: pre_registered
topic: growth
claim: 'Starting from comparable 1945 post-war conditions — same ethnicity, language,
  pre-war German institutional and industrial inheritance, and with the GDR inheriting
  a larger share of pre-war industrial capital in Saxony and Thuringia — the Federal
  Republic''s Soziale Marktwirtschaft (Ordoliberal market economy with welfare state)
  versus the German Democratic Republic''s planned economy with administered prices,
  state-enterprise production, and soft budget constraints produced by 1989 a canonical
  divergence that pattern-matches >=7 of 10 pre-registered extreme-outcome metrics,
  each drawn from a different publisher or methodology family. The canonical-case
  claim is that no other peacetime country pair separated for comparable duration
  from comparable 1945 starting conditions produced a divergence of this magnitude
  across this many independent outcome channels. A refutation (<=3 metrics met) would
  indicate that the consensus FRG/GDR gap was substantially overstated or that the
  framework''s institutional-quality coding of market vs planned economies is mis-calibrated.

  '
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - DEW
  - DEE
  period:
  - 1950
  - 1989
  temporal_structure: panel
  exclusion_rules:
  - Post-1989 reunification data excluded from the divergence window, but Treuhand-era
    privatisation outcomes are used ex post as a revealed-productivity falsification
    channel
  - No donor pool required — this is a single canonical-pair pattern match against
    pre-registered extreme-outcome thresholds
  - 'Benchmark check: has any other peacetime country pair separated 1945-1989 from
    comparable starting conditions matched >=4 of these 10 thresholds?'
scope:
  period: [1950, 1989]
  countries: [DEW, DEE]
  outcome_dim: [gdp_growth, institutional_quality, demographics_migration, productivity]
  policy_family: [institutional_reform, privatisation_nationalisation, regulation]
  treatment_tags: [soziale_marktwirtschaft, ordoliberalism, gdr_central_planning, berlin_wall_1961, treuhand_1990]
variables:
  outcome:
  - name: multi_metric_divergence_score
    source: 'derived: count of canonical_metrics with threshold met'
    transformation: count
canonical_metrics:
- metric_id: gdp_per_capita_ppp_ratio_1989
  description: FRG-to-GDR GDP per capita PPP comparator series, encoded as the FRG/GDR
    multiple in any year of the 1987-1989 window. Maddison Project (2020) places the
    FRG multiple at ~2.5-2.9x; Sleifer (2006) post-reunification revisions place it
    as high as 3.0x once MPS-to-SNA correction is applied. Encoded conservative consensus
    values 2.45-2.60. Threshold satisfied during 1987-1989 if the encoded multiple
    is > 2.0 in any year.
  threshold: '> 2.0 in any year'
  window: 1987-1989
  source: maddison:mpd2020; owid:gdp-per-capita-maddison-2020; manual:sleifer_2006_gdr_fdp_revisions;
    ieset_historical:frg_gdr_gdp_pc_ratio
  data_quality_flag: 'GDR national accounts used Material Product System (MPS) not
    SNA; Maddison MPS-to-SNA conversion uses Sleifer and post-reunification revisions.
    Upward bias in reported GDR output is well documented.

    '
  independence_justification: 'Maddison reconstruction is cross-checked against post-1990
    revealed-productivity data from Treuhand, providing a robustness anchor unavailable
    for most historical comparisons.

    '
  direction: supports_claim
- metric_id: consumer_goods_availability_wait_time
  description: Consumer-durable wait-time multiple (FRG-to-GDR) for the Trabant vs
    VW-Golf comparator during 1980-1989. Trabant wait was 10-15 years (Merkel 1999;
    Zatlin 2007 Currency of Socialism), VW Golf wait was a few weeks (~0.1 yr) — encoded
    multiple 100. Threshold satisfied during 1980-1989 if the multiple is > 10 in
    any year.
  threshold: '> 10 in any year'
  window: 1980-1989
  source: manual:merkel_1999_consumer_culture_gdr; manual:zatlin_2007_currency_of_socialism;
    ieset_historical:frg_gdr_consumer_wait_ratio
  independence_justification: 'Wait-time measurement comes from party-archive reconstructions
    and consumer-survey data, independent of national-accounts output measurement.
    Captures allocation-mechanism quality, not output level.

    '
  direction: supports_claim
- metric_id: emigration_flow_pre_wall
  description: 'Cumulative outflow from GDR to FRG 1949-1961 as a share of 1949 GDR
    population, in any year of the window. Heidemeyer (1994) Flucht und Zuwanderung;
    Bundesarchiv Zentrales Fluechtlingsregister: ~3.5m fled out of ~18m 1949 population,
    so ~19.4% by 1961. Threshold satisfied during 1949-1961 if cumulative share is
    > 15 in any year. (See manual provenance entries for full source list.)'
  threshold: '> 15 in any year'
  window: 1949-1961
  source: manual:heidemeyer_1994_flucht_und_zuwanderung; bundesarchiv:zentrales_fluechtlingsarchiv;
    ieset_historical:frg_gdr_emigration_pct_of_1949_pop
  independence_justification: 'Emigration flows are measured at FRG registration centres
    (Notaufnahmelager), independent of GDR state statistics. Revealed-preference channel
    is independent of all output, consumer-good, and technology metrics.

    '
  direction: supports_claim
- metric_id: telephone_penetration_gap
  description: 'FRG-to-GDR fixed-telephone density multiple per capita, in any year
    of 1987-1989. ITU historical telephone-subscriptions series + Bundespost Jahresbericht
    1989: FRG ~40/100, GDR ~17/100, multiple ~2.35x. Threshold satisfied during 1987-1989
    if multiple is > 2.0 in any year.'
  threshold: '> 2.0 in any year'
  window: 1987-1989
  source: itu:telephone_subscriptions; manual:bundespost_jahresbericht_1989; ieset_historical:frg_gdr_telephone_penetration_ratio
  independence_justification: 'Telephone penetration is measured directly by post-and-telegraph
    agencies of each state; methodologically independent of GDP, consumer-goods, or
    trade metrics.

    '
  direction: supports_claim
- metric_id: car_ownership_ratio
  description: 'FRG-to-GDR car-ownership multiple per 1000 inhabitants, in any year
    of 1987-1989. VDA Jahresbericht 1989: FRG ~470/1000; DIW Berlin DDR Wirtschaftsstatistik:
    GDR ~220/1000; multiple ~2.14x. Threshold satisfied during 1987-1989 if multiple
    is > 1.5 in any year.'
  threshold: '> 1.5 in any year'
  window: 1987-1989
  source: manual:vda_jahresbericht_1989; manual:diw_berlin_ddr_wirtschaftsstatistik;
    ieset_historical:frg_gdr_car_ownership_ratio
  independence_justification: 'Vehicle stock is measured by vehicle-registration authorities,
    independent of output accounts. Physical asset measurement is robust to MPS-vs-SNA
    accounting.

    '
  direction: supports_claim
- metric_id: innovation_patent_filings
  description: 'FRG-to-GDR per-capita international-patent-filings multiple, in any
    year of 1980-1989. WIPO IP statistics + EPO Espacenet + Baten & Stolz: FRG dominates
    global rankings in chemistry, machinery, automotive; GDR international filings
    concentrated in defence-adjacent and DDR-internal-use. Encoded conservative multiple
    12-18x. Threshold satisfied during 1980-1989 if multiple is > 10 in any year.'
  threshold: '> 10 in any year'
  window: 1980-1989
  source: wipo:ip_statistics_data_center; epo:espacenet_bulk_data; manual:baten_stolz_german_patents_cold_war;
    ieset_historical:frg_gdr_intl_patent_filings_ratio
  independence_justification: 'Patent filings capture the innovation-output layer
    independent of all income, demographic, consumer-goods, and trade metrics.

    '
  direction: supports_claim
- metric_id: consumer_electronics_trade_balance
  description: 'FRG net-export surplus on consumer electronics in billions USD, in
    any year of 1980-1989. UN Comtrade historical: FRG persistent net exporter (>5
    b USD). GDR ran a structural NSW hard-currency deficit on consumer imports (Schroeder/Plaenkers;
    1983 Strauss loans; 1989 liquidity collapse). Threshold satisfied during 1980-1989
    if FRG net-export surplus is > 5 in any year — confirms the persistent direction
    asymmetry.'
  threshold: '> 5 in any year'
  window: 1980-1989
  source: manual:un_comtrade_historical; manual:schroeder_plaenkers_gdr_hard_currency_balance;
    ieset_historical:frg_consumer_electronics_net_export_b_usd
  independence_justification: 'Hard-currency balance data came to light from post-1989
    GDR central-bank archive releases, wholly independent of the published statistical
    series used during the GDR era.

    '
  direction: supports_claim
- metric_id: environmental_pollution_load
  description: 'GDR-to-FRG SO2 per-capita multiple, in any year of 1985-1990. Umweltbundesamt
    Umweltzustand 1990 + Sleifer GDR environmental legacy: GDR lignite-coal energy
    and Bitterfeld / Halle-Leipzig chemical complex produced per-capita SO2 ~4-5x
    FRG. Threshold satisfied during 1985-1990 if multiple is > 2.0 in any year.'
  threshold: '> 2.0 in any year'
  window: 1985-1990
  source: manual:umweltbundesamt_umweltzustand_1990; manual:sleifer_gdr_environmental_legacy;
    ieset_historical:gdr_frg_so2_pc_ratio
  independence_justification: 'Environmental pollution measurement comes from physical
    air and water sampling by post-1989 unified survey teams, independent of any prior
    GDR statistical capture.

    '
  direction: supports_claim
- metric_id: stasi_surveillance_intensity
  description: Stasi informant-density index (informants per 100 citizens, formal
    + IM, post-1989 archive reconstruction), in any year of 1980-1989. BStU Stasi-Records
    Office + Gieseke (2001) place peak density at ~1 in 6.5 (index ~15.4); FRG had
    no comparable surveillance apparatus (Verfassungsschutz scope orders of magnitude
    smaller and constitutionally constrained). Threshold satisfied during 1980-1989
    if index is > 10 in any year.
  threshold: '> 10 in any year'
  window: 1980-1989
  source: manual:bstu_stasi_records_office_archives; freedom_house:fiw_historical;
    manual:gieseke_2001_stasi_history; ieset_historical:gdr_stasi_intensity_index
  independence_justification: 'Surveillance-intensity measurement comes from the Stasi''s
    own post-1989 opened archive, independent of contemporaneous GDR statistics or
    FRG Verfassungsschutz records. Institutional-freedom channel is independent of
    all economic-output metrics.

    '
  direction: supports_claim
- metric_id: post_1989_revealed_productivity_gap
  description: 'East-German job losses during Treuhandanstalt privatisation (millions),
    in any year of 1990-1993. Treuhandanstalt Abschlussbericht + DIW Berlin East-German
    employment transition: ~4m jobs lost out of ~9.7m 1989 workforce — the clearest
    single revealed measurement of the 1989 productivity gap masked by MPS accounting.
    Threshold satisfied during 1990-1993 if cumulative job losses are > 3.0 in any
    year.'
  threshold: '> 3.0 in any year'
  window: 1990-1993
  source: manual:treuhandanstalt_abschlussbericht; manual:diw_berlin_east_german_employment_transition;
    ieset_historical:treuhand_jobs_lost_millions
  data_quality_flag: 'This is a post-window revealed-outcome metric. It belongs to
    the multi-metric pattern-match because it directly measures the 1989 productivity
    gap — the counterfactual productivity level at which GDR enterprises could have
    competed in market prices with FRG peers was sharply below reported MPS output.

    '
  independence_justification: 'Treuhand employment outcomes are measured by unified
    Bundesagentur für Arbeit, wholly independent of any GDR-era statistics.

    '
  direction: supports_claim
- metric_id: post_reunification_transfer_scale
  description: 'Cumulative West-to-East fiscal transfers in EUR trillions (real, 1990-2020),
    in any year of the window. Bundesfinanzministerium Solidarpakt I + II reports
    + DIW Berlin transfer estimates: cumulative ~EUR 2.0 trillion. Threshold satisfied
    during 1990-2020 if cumulative transfers are > 1.5 in any year — confirms that
    the 1989 productivity shortfall was not closable on 30-year timescales even with
    unprecedented fiscal support.'
  threshold: '> 1.5 in any year'
  window: 1990-2020
  source: manual:bundesfinanzministerium_solidarpakt_reports; manual:diw_berlin_transfer_estimates;
    ieset_historical:bmf_cumulative_transfers_t_eur
  data_quality_flag: 'Transfer accounting methodologies vary (gross vs net of eastern
    contribution, inclusion of pension subsidies). Consensus range from different
    methodologies all exceed EUR 1.5t cumulative.

    '
  independence_justification: 'Fiscal-transfer accounting is wholly post-1989 and
    independent of any GDR-era measurement; it is a revealed-cost integrator of the
    1989 productivity gap.

    '
  direction: supports_claim
multi_metric_falsification:
  total_metrics: 10
  support_threshold: 7
  refute_threshold: 3
intervention_channel: bundled
intervention_channel_justification: 'Institutional-system divergence — market-economy-with-welfare-state
  (Soziale Marktwirtschaft / Ordoliberalism) vs central planning with administered
  prices, state-enterprise production, and soft budget constraints — imposed by post-WWII
  US/UK/French vs Soviet occupation zones. The bundle spans institutional (property
  rights, rule of law, freedom of movement), regulatory (price system, trade openness,
  FX regime), fiscal (budget-constraint hardness), and political (democratic vs one-party)
  channels. The canonical-case hypothesis treats this bundle as the unit of analysis
  because the GDR''s planned-economy + SED rule + Warsaw Pact integration was not
  decomposable into separable policy levers with independent counterfactuals.

  '
estimator:
  template: multi_metric_checklist
  notes: 'For each of the 10 canonical metrics, the evaluator fetches the specified
    source(s) and evaluates the threshold expression. Support if metrics_met >= 7,
    refute if metrics_met <= 3, inconclusive in the 4-6 range. Benchmark check: no
    other contiguous ethnically-identical country pair separated 1945-1989 from comparable
    1945 starting conditions should match >=4 of these 10 thresholds (the only credible
    peer is the DPRK/ROK pair, which is the subject of its own canonical-case hypothesis).

    '
falsification:
  rule: 'Hypothesis is SUPPORTED if >=7 of 10 canonical metrics meet their pre-registered
    thresholds. Hypothesis is REFUTED if <=3 of 10 metrics meet their thresholds.
    The 4-6 range is inconclusive. Additional falsification: if the DPRK/ROK canonical-case
    companion hypothesis is REFUTED by its own 10-metric checklist while FRG/GDR is
    SUPPORTED (or vice versa), the author must publish a note explaining why the framework
    coding generalises across the two classic system-divergence cases.

    '
  test: multi_metric_canonical_case_pattern_match
  threshold: metrics_met_germany_pair >= 7
prior_confidence: 0.95
disclosure: 'This hypothesis is a methodology-fix supersession of west_east_germany_economic_system_divergence_1950_1989
  v1 (which treated the comparison as a descriptive two-country panel with a single
  GDP-ratio threshold). The multi-metric specification replaces a single signal with
  ten drawn from heterogeneous publishers and methodology families (national accounts,
  party-archive consumer-goods reconstruction, migration records, telecoms penetration,
  vehicle registration, patent registries, trade customs, environmental sampling,
  surveillance archives, post-reunification privatisation and fiscal-transfer data).
  Author''s 0.95 prior reflects the unusual strength of this canonical case — the
  1945 starting-conditions comparability is almost ideal, the 1949-1961 pre-Wall emigration
  flow is a stark revealed-preference signal, and the post-1989 revealed-productivity
  and pollution data provide independent robustness anchors unavailable in most historical
  comparisons.

  Author holds market-liberal priors aligned with the hypothesis. The pre-registered
  10-metric threshold set, the requirement that at least 7 be met simultaneously,
  and the cross-case consistency requirement with the DPRK/ROK companion hypothesis
  bind the author to a pattern-match that is not reducible to a re-statement of priors.
  The steelman (Marshall Plan, Ruhr-Rhine industrial inheritance, pre-1961 skilled-labour
  migration, Ordoliberal welfare state distinct from pure laissez-faire, Soviet reparations
  burden on GDR) is preserved separately and remains relevant for attribution of the
  bundle — it is not addressed by the pattern-match itself.

  '
conflict_disclosure: 'Author holds no DEU asset exposure and no consulting relationship
  with parties in the German reunification-economics debate.

  '
steelman: hypotheses/steelman/west_east_germany_economic_system_divergence_1950_1989.md
linked_hypotheses:
- north_south_korea_development_divergence_1953_present
- estonia_market_reform_post_soviet_growth_1991_2007
- venezuela_chavismo_canonical_case_multi_metric
- zimbabwe_hyperinflation_land_reform_output_collapse_2000_2009
notes: 'Methodological rationale: a single-estimator causal test on the FRG/GDR pair
  is weak because (a) the comparator GDR used MPS not SNA accounting with documented
  upward output bias, (b) the treatment bundle is not separable into policy levers
  with independent counterfactuals, and (c) multiple orthogonal measurement stacks
  (party-archive consumer data, post-1989 privatisation outcomes, post-unification
  environmental surveys, Stasi archive releases) provide independent robustness anchors
  that make a pre-registered 10-metric pattern-match epistemically stronger than any
  single panel/DiD/synthetic-control estimate.

  The steelman (Marshall Plan aid, Ruhr-Rhine industrial inheritance, pre-1961 labour
  windfall from Eastern migration, Soziale-Marktwirtschaft not being laissez-faire,
  Soviet reparations extracting from the East) is NOT resolved by the multi-metric
  test — it concerns attribution within the bundle. The canonical-case hypothesis
  only claims the bundle produced the observed divergence, not that any single sub-channel
  is solely responsible. Within-bundle attribution is the subject of separate narrower
  hypotheses (e.g. synthetic-control against Austria + Czech lands to isolate system-effect
  from initial-conditions).

  Pre-1945 country codes DEW (FRG) and DEE (GDR) are preserved for cross-file consistency
  with the existing dataset; both codes were adopted in the v1 specification and are
  retained here.

  '

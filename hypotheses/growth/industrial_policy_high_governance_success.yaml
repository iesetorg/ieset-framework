# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: industrial_policy_high_governance_success
version: 1
status: candidate
topic: growth
claim: >-
  Industrial policy (sectoral targeting, export subsidies, conditional credit, technology
  push) succeeds in raising long-run manufacturing productivity and export sophistication
  when implemented in high-governance states with export discipline (clear performance
  criteria, sunset clauses, competitive benchmarking), over 30-year windows 1960-2020.
  The claim is an adversarial boundary test: it challenges blanket free-market claims by
  documenting conditions under which state-led sectoral promotion outperforms laissez-faire.
evidence_type: associational
sample:
  countries:
  - KOR
  - TWN
  - JPN
  - SGP
  - CHN
  - VNM
  - MYS
  - IDN
  - THA
  - CHL
  - BRA
  - MEX
  - ZAF
  - TUR
  - POL
  - HUN
  - CZE
  - DEU
  - FRA
  - ITA
  - USA
  - GBR
  period:
  - 1960
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - exclude pre-WTO subsidy programmes in agriculture and textiles
  - require at least 15 years of post-policy data
  - exclude episodes with major corruption scandals or governance collapses during implementation
scope:
  period:
  - 1960
  - 2020
  countries:
  - KOR
  - TWN
  - JPN
  - SGP
  - CHN
  - VNM
  - MYS
  - IDN
  - THA
  - CHL
  - BRA
  - MEX
  - ZAF
  - TUR
  - POL
  - HUN
  - CZE
  - DEU
  - FRA
  - ITA
  - USA
  - GBR
  outcome_dim:
  - industrial_capability
  - productivity
  - trade_liberalisation
  policy_family:
  - industrial_policy
  treatment_tags:
  - korea_heavy_chemical_industry_1973
  - taiwan_hsinchu_science_park_1980
  - singapore_edb_targeting
variables:
  outcome:
  - name: manufacturing_tfp_growth
    source: pwt:rtfpna
    transformation: log_diff
    notes: >-
      Proxy for productivity growth using PWT TFP at constant national
      prices (rtfpna), differenced in logs.
  - name: export_sophistication_index
    source: world_bank_wdi:TX.VAL.TECH.MF.ZS
    transformation: level
    notes: >-
      High-technology exports share as a tractable on-disk proxy for export
      sophistication.
  treatment:
  - name: industrial_policy_intensity
    source: world_bank_wdi:GC.XPN.TOTL.GD.ZS
    transformation: level
    notes: >-
      Public-expenditure share proxy for state industrial-policy intensity.
  - name: governance_quality
    source: wgi:GE.EST
    transformation: level
    notes: WGI government effectiveness as governance proxy.
  - name: export_discipline_index
    source: world_bank_wdi:NE.EXP.GNFS.ZS
    transformation: level
    notes: >-
      Export-share proxy for external competitiveness pressure and export
      discipline.
  controls:
  - name: log_gdp_per_capita
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: human_capital_index
    source: pwt:hc
    transformation: level
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: fdi_inflows_gdp
    source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
falsification:
  rule: >-
    The hypothesis is falsified if industrial policy has a negative and significant
    (p < 0.10) coefficient on manufacturing TFP or export sophistication in high-governance
    countries, or if the interaction between industrial policy and governance quality is
    not positive and significant.
  test: panel_fe_industrial_policy_governance_interaction_1960_2020
  threshold:
    supported: industrial_policy_x_governance interaction > 0 at p < 0.10
    refuted: industrial_policy coefficient < 0 at p < 0.10 in high-governance subsample
prior_confidence: 0.60
methodology_note: >-
  2026-05-04 runnability repair for candidate execution. The originally cited
  OECD STAN manufacturing TFP / UNIDO INDSTAT and bespoke industrial-policy
  composites are not yet fully materialised as local vintages. This candidate
  run uses transparent local proxies: PWT `rtfpna` for productivity dynamics,
  high-tech export share for sophistication, government spending share for
  policy intensity, and export-share pressure for discipline. The core
  interaction estimand (industrial policy × governance quality) is preserved,
  but conclusions should be interpreted as proxy-based evidence pending
  dedicated source ingestion.
disclosure: >-
  Author priors accept that industrial policy can work under high governance but are
  sceptical of replication in low-governance settings. The test is designed to challenge
  blanket anti-industrial-policy claims, not to endorse industrial policy universally.
steelman: hypotheses/steelman/industrial_policy_high_governance_success.md


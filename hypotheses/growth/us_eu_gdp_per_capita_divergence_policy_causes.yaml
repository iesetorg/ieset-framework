  claim_index: 0
  polarity: inverted
  school_prediction: mixed
  confidence: medium
  notes: Degrowth claim asserts energy-cost divergence drives US-EU GDP gap rather than policy per se — inverted-polarity partial overlap with this hypothesis's energy-cost channel (d). Degrowthers also
    dispute normative preference for higher-GDP US outcome given ecological footprint.
- position_id: institutionalism
  claim_index: 1
  polarity: aligned
  school_prediction: supported
  confidence: high
  notes: 'Near-identical proposition: claim and hypothesis both test whether US-EU GDP gap is explained by policy+institutional differences rather than demographics.'
- position_id: social_democratic
  claim_index: 7
  polarity: inverted
  school_prediction: supported
  confidence: medium
  notes: 'Inverted-polarity overlap: social democratic claim attributes US-EU GDP gap to hours-worked/leisure-preference rather than productivity deficit — directly contrary to this hypothesis''s policy-channel
    explanation, sharing same sample/scope.'

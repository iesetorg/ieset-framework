# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: singapore_lky_high_tech_export_digital_upgrade_1990_2024
version: 1
status: pre_registered
topic: growth
claim: 'Singapore''s LKY-era human-capital and investment-promotion base was followed by a high-tech
  export and digital adoption profile: internet diffusion became near-universal and high-tech
  manufactures remained a majority of manufactured exports by the 2020s.'
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  period:
  - 1990
  - 2024
  temporal_structure: panel
canonical_metrics:
- metric_id: internet_diffusion_gain
  description: Internet users share rose from near zero to near universal
  threshold: '>= 85pp increase'
  window: 1990-2024
  source: world_bank_wdi:IT.NET.USER.ZS
  direction: supports_claim
  independence_justification: Digital adoption outcome independent from export composition.
- metric_id: internet_users_2024
  description: Internet adoption reached near-universal scale
  threshold: '>= 90%'
  window: '2024'
  source: world_bank_wdi:IT.NET.USER.ZS
  direction: supports_claim
  independence_justification: Endpoint digital adoption check.
- metric_id: hightech_exports_2024
  description: High-tech manufactures stayed a majority of manufactured exports
  threshold: '>= 50%'
  window: '2024'
  source: world_bank_wdi:TX.VAL.TECH.MF.ZS
  direction: supports_claim
  independence_justification: Export-composition check separate from adoption.
- metric_id: services_share_2024
  description: Services value-added share stayed high in mature economy
  threshold: '>= 70% of GDP'
  window: '2024'
  source: world_bank_wdi:NV.SRV.TOTL.ZS
  direction: supports_claim
  independence_justification: Sectoral-structure check separate from trade composition.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
variables:
  outcome:
  - name: internet_users
    source: world_bank_wdi:IT.NET.USER.ZS
    transformation: endpoint_change
  - name: high_tech_exports_share
    source: world_bank_wdi:TX.VAL.TECH.MF.ZS
    transformation: endpoint_level
  - name: services_value_added_share
    source: world_bank_wdi:NV.SRV.TOTL.ZS
    transformation: endpoint_level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Custom Singapore/UAE case checklist using local WDI, WGI, and Fraser EFW vintages.
falsification:
  rule: SUPPORTED if at least 3 of 4 pre-registered metrics meet their thresholds. REFUTED if
    at most 1 metrics meet after available data are evaluated. Otherwise PARTIAL or INCONCLUSIVE_DATA_PENDING.
  test: singapore_lky_high_tech_export_digital_upgrade_1990_2024_local_multimetric_checklist
  threshold: MET >= 3 of 4; REFUTE when MET <= 1
prior_confidence: 0.72
disclosure: Prior expects support; high-tech share is an outcome pattern, not proof of one industrial
  policy instrument.
steelman: hypotheses/steelman/singapore_lky_high_tech_export_digital_upgrade_1990_2024.md
scope:
  period:
  - 1990
  - 2024
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  outcome_dim:
  - industrial_capability
  - productivity
  policy_family:
  - industrial_policy
  - trade_policy
  treatment_tags:
  - national_computerisation_plan_1980
  - edb_electronics_cluster
  - skills_upgrading
notes: Post-1990 legacy test pinned to WDI digital/export series.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: market_dynamism_regulatory_freedom_hightech_exports
version: 1
status: candidate
topic: growth
claim: Higher market-oriented regulatory freedom predicts stronger high-technology export performance.
claim_direction: "+"
evidence_type: associational
sample:
  countries: [USA, GBR, CAN, AUS, NZL, DEU, FRA, ITA, ESP, NLD, SWE, NOR, DNK, FIN, JPN, KOR, CHN, IND, BRA, MEX, CHL, ARG, TUR, ZAF, POL, EST, VNM, THA, MYS, IDN, COL, PER, PHL, EGY, MAR, KEN, NGA, BGD, PAK, LKA]
  period: [1990, 2022]
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing Fraser regulation score or high-technology export outcome
  - require at least 20 countries and 220 country-year observations
scope:
  period: [1990, 2022]
  countries: [GLOBAL]
  outcome_dim: [productivity, industrial_capability, regulation_compliance_cost]
  policy_family: [regulation, competition_policy]
  treatment_tags: [regulatory_freedom, market_entry, hightech_exports]
intervention_channel: regulatory
intervention_channel_justification: Fraser regulation scores proxy the policy burden on credit, labor, and business entry rather than a fiscal or monetary channel.
variables:
  outcome:
  - name: high_tech_exports_share
    source: world_bank_wdi:TX.VAL.TECH.MF.ZS
    transformation: level
  treatment:
  - name: regulatory_freedom
    source: fraser_efw:regulation
    transformation: level_lagged_one_year
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: human_capital
    source: pwt:hc
    transformation: level
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: High-tech exports are a narrow innovation-output proxy; service innovation and domestic diffusion are not captured.
falsification:
  rule: SUPPORTED if regulatory freedom is positive at p<0.10 for high-tech export share. REFUTED if it is negative at p<0.10. Otherwise PARTIAL.
  test: panel_fe_market_dynamism_regulatory_freedom_hightech_exports
  threshold:
    p_value: "p<0.10"
    expected_sign: "+"
    minimum_countries: 20
    minimum_observations: 220
prior_confidence: 0.51
disclosure: The prior is only slightly positive because state-led export promotion could also raise high-tech export shares; this test should be allowed to favor either mechanism.
steelman: hypotheses/steelman/market_dynamism_regulatory_freedom_hightech_exports.md

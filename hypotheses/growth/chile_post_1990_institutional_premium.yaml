hypothesis_id: chile_post_1990_institutional_premium
version: 1
status: draft
topic: growth
claim: Chilean post-1990 growth outpaces earlier Pinochet-era growth despite similar market orientation, reflecting democratic-institutional upgrades more than policy continuity.
notes: Maps the institutionalism school's Chile-democratic-premium claim to a 1973-2023 pre/post pattern-match on growth, TFP, investment and institutional-quality indices. Estimator and prior set; full pre-registration awaits steelman + human sign-off.
prior_confidence: 0.55
disclosure: "Author prior partially aligns \u2014 Chilean post-1990 growth was higher than the late Pinochet years, and democratic institutions plausibly contributed \u2014 but copper prices, completed pension reform, and learning effects from the 1982 banking crisis are confounders that the simple pre/post framing does not separate."
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure moves less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in the variables and estimator blocks when this stub is promoted from draft.
  test: CHL 1973-2023 single-country pre-1990 vs post-1990 multi-metric checklist on log GDP per capita, TFP (PWT), capital formation, rule-of-law (WGI), V-Dem democracy index; HAC SEs around 1990 break. Refute if post-1990 growth/TFP not higher than 1976-1989 mean once copper-price effects are netted out at p<0.10.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - CHL
  period:
  - 1973
  - 2023
  temporal_structure: time_series
  exclusion_rules:
  - treat 1973-1975 Pinochet-shock recession and 1982 banking crisis as separate event windows for the pre-1990 baseline
variables:
  outcome:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
  - name: tfp_index
    source: pwt:rtfpna
    transformation: level
  - name: gross_capital_formation_pct_gdp
    source: world_bank_wdi:NE.GDI.TOTL.ZS
    transformation: level
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
  - name: vdem_liberal_democracy
    source: vdem:v2x_libdem
    transformation: level
  - name: polity_score
    source: polity5:polity2
    transformation: level
  treatment:
  - name: post_1990_democratic_indicator
    source: 'constructed: indicator = 1 for years >= 1990 (return to democratic rule)'
    transformation: indicator
  controls:
  - name: copper_price_index
    source: imf_pcps:PCOPP
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: 'Single-country pre/post canonical case. Compares Pinochet-era (1973-1989) to democratic-era (1990-2023) growth, investment, TFP, and institutional- quality indicators. Pattern-match approach because the hypothesis is about democratic-institutional upgrades rather than a single policy lever.

    '
scope:
  period:
  - 1973
  - 2023
  countries:
  - CHL
  outcome_dim:
  - gdp_growth
  - institutional_quality
  policy_family:

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: ethiopia_prewar_growth_human_development_2000_2019
version: 1
status: pre_registered
topic: growth
claim: >
  Ethiopia's pre-war 2000-2019 development episode combined fast real
  GDP per-capita growth, large child-mortality reduction, rising life
  expectancy, and a shift toward services employment. The narrow test is
  whether at least three of four WDI-based outcome metrics meet their
  thresholds before the 2020 conflict shock.
evidence_type: canonical_case_multi_metric
sample:
  countries: [ETH]
  period: [2000, 2019]
  temporal_structure: time_series
canonical_metrics:
  - metric_id: real_gdp_pc_growth_fast
    description: Ethiopia average annual real GDP per-capita growth before the conflict shock
    threshold: "average annual growth >= 5%"
    window: "2000-2019"
    source: "world_bank_wdi:NY.GDP.PCAP.KD.ZG"
    direction: supports_claim
    independence_justification: Income-growth outcome separate from health and labour-composition measures.
  - metric_id: under5_mortality_decline_large
    description: Ethiopia under-5 mortality rate decline before 2020
    threshold: ">= 50% decline"
    window: "2000-2019"
    source: "world_bank_wdi:SH.DYN.MORT"
    direction: supports_claim
    independence_justification: Health outcome independent of GDP accounting.
  - metric_id: life_expectancy_increase_large
    description: Ethiopia life expectancy increase from the 2000 baseline
    threshold: ">= 25% increase"
    window: "2000-2019"
    source: "world_bank_wdi:SP.DYN.LE00.IN"
    direction: supports_claim
    independence_justification: Population-health stock measure distinct from mortality-rate decline.
  - metric_id: services_employment_share_threshold
    description: Services employment share reached 30% by the end of the pre-war window
    threshold: ">= 30% during 2019"
    window: "2019"
    source: "world_bank_wdi:SL.SRV.EMPL.ZS"
    direction: supports_claim
    independence_justification: Labour-market composition outcome independent of income and health measures.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: >
    Canonical-case checklist limited to the 2000-2019 pre-war window.
falsification:
  rule: >
    The hypothesis is SUPPORTED if at least 3 of 4 metrics are MET, REFUTED
    if at most 1 metric is MET after all available data are evaluated, and
    otherwise INCONCLUSIVE.
  test: multi_metric_checklist_prewar_growth_human_development
  threshold: "MET >= 3 of 4; REFUTE when confirmed MET <= 1 with no pending path to support"
variables:
  outcome:
    - name: real_gdp_pc_growth
      source: "world_bank_wdi:NY.GDP.PCAP.KD.ZG"
      transformation: annual_mean
    - name: under5_mortality
      source: "world_bank_wdi:SH.DYN.MORT"
      transformation: peak_to_trough_decline
    - name: life_expectancy
      source: "world_bank_wdi:SP.DYN.LE00.IN"
      transformation: pct_change
    - name: services_employment_share
      source: "world_bank_wdi:SL.SRV.EMPL.ZS"
      transformation: level
prior_confidence: 0.78
disclosure: >
  Author prior is that Ethiopia clears the pre-war descriptive checklist.
  This does not adjudicate whether state-led investment, aid, measurement
  issues, weather cycles, or political control caused the observed pattern.
steelman: hypotheses/steelman/ethiopia_prewar_growth_human_development_2000_2019.md
scope:
  period: [2000, 2019]
  countries: [ETH]
  outcome_dim: [gdp_growth, life_expectancy_health, employment_labour]
  policy_family: [industrial_policy, institutional_reform]
  treatment_tags: [ethiopia_prewar_growth, ethiopia_developmental_state, services_shift]

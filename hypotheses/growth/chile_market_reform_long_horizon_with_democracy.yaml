# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: chile_market_reform_long_horizon_with_democracy
version: 1
status: candidate
topic: growth

claim: >
  Chile’s long-run income convergence is stronger after the combination of
  market reforms (1975–1990) and democratic institutional repair (1990 onward)
  than under the earlier state-led import-substitution regime (1950–1973). In
  a synthetic-control design with Latin American comparators, Chile’s
  cumulative log GDP-per-capita growth from 1990–2024 exceeds the synthetic
  counterfactual built from pre-reform peers, and the post-1990 democratic
  period shows continued convergence relative to a counterfactual that stops
  at 1990.

evidence_type: causal

sample:
  countries:
    - CHL
    - ARG
    - BRA
    - MEX
    - URY
    - COL
    - PER
    - VEN
    - ECU
    - BOL
    - PRY
    - CRI
  period: [1950, 2024]
  temporal_structure: panel
  exclusion_rules:
    - "exclude hyperinflation years in donor pool where data is unreliable"
    - "flag COVID 2020-2021"

scope:
  period: [1950, 2024]
  countries:
    - CHL
    - ARG
    - BRA
    - MEX
    - URY
    - COL
    - PER
    - VEN
    - ECU
    - BOL
    - PRY
    - CRI
  outcome_dim:
    - gdp_growth
    - institutional_quality
    - trade_liberalisation
  policy_family:
    - institutional_reform
    - trade_policy
    - privatisation_nationalisation
  treatment_tags:
    - chile_chicago_boys_1975
    - chile_democratic_repair_1990
    - chile_import_substitution_1950

variables:
  outcome:
    - name: real_gdp_pc
      source: "world_bank_wdi:NY.GDP.PCAP.KD; maddison:gdppc"
      transformation: log_level
    - name: labour_productivity
      source: "world_bank_wdi:SL.GDP.PCAP.EM.KD"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
  treatment:
    - name: chile_post_1990
      source: "constructed: 1 for CHL from 1990 onward"
      transformation: binary
    - name: chile_market_reform_dummy
      source: "constructed: 1 for CHL from 1975-1990"
      transformation: binary
      notes: "Robustness check for pre-democratic reform period."
  controls:
    - name: initial_gdp_pc_1950
      source: "maddison:gdppc"
      transformation: level_at_1950
    - name: human_capital
      source: "pwt:hc"
      transformation: level
    - name: wgi_rule_of_law
      source: "wgi:RL.EST"
      transformation: level
    - name: commodity_terms_of_trade
      source: "world_bank_wdi:TT.PRI.MRCH.XD.WD"
      transformation: level
    - name: us_policy_rate
      source: "fred:FEDFUNDS"
      transformation: level

intervention_channel: bundled
intervention_channel_justification: >
  The treatment spans market reforms (trade, privatisation, regulation) and
  democratic institutional repair (institutional). Bundled coding per
  invariant 4.

estimator:
  template: synthetic_control
  clustering: country
  notes: >
    Primary: synthetic control for CHL treated from 1990, donor pool of Latin
    American peers. Secondary: panel FE with CHL × post-1990 interaction.

falsification:
  rule: >
    Refuted if Chile’s cumulative log GDP-pc growth gap versus synthetic
    counterfactual over 1990-2024 is not positive and significant at p<0.10,
    or if the panel-FE coefficient on CHL × post-1990 is negative and
    significant at p<0.05.
  test: synthetic_control_chile_convergence
  threshold: >
    cumulative_log_gdp_pc_gap_1990_2024 > 0 AND p < 0.10; panel_fe_coef > 0
    AND p < 0.10.

prior_confidence: 0.70

disclosure: >
  Author views Chile as a canonical market-reform success but acknowledges
  that copper cycles and the Pinochet regime’s human-rights costs are non-
  economic confounds. Bias risk: romanticising the reform episode.

steelman: hypotheses/steelman/chile_market_reform_long_horizon_with_democracy.md

linked_hypotheses:
  - liberal_capital_account_openness_growth_premium_panel

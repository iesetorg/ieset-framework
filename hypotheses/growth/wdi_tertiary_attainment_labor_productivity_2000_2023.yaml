# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: wdi_tertiary_attainment_labor_productivity_2000_2023
version: 1
status: pre_registered
topic: growth
claim: Countries with large tertiary-attainment gains from 2000 to 2023 should usually register
  sizable growth in output per worker.
evidence_type: descriptive
sample:
  countries:
  - ALB
  - AUS
  - BOL
  - CAN
  - CRI
  - CZE
  - IRL
  - IRN
  - KOR
  - LTU
  - MKD
  - MLT
  - MNG
  - MUS
  - PRT
  - PSE
  - SAU
  - SGP
  - SRB
  - SWE
  - USA
  period:
  - 2000
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: output_per_worker
    source: world_bank_wdi:SL.GDP.PCAP.EM.KD
    transformation: endpoint percent growth
  treatment:
  - name: tertiary_attainment_gain
    source: world_bank_wdi:SE.TER.CUAT.BA.ZS
    transformation: country selected if endpoint gain >= 10pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=15, at least 70% of large-tertiary-gain countries increase output
    per worker by >=20%, and the median gain is >=25%. REFUTED if fewer than 50% pass or the
    median gain is <5%. Otherwise PARTIAL.
  test: wdi_tertiary_attainment_labor_productivity_2000_2023
  threshold: n >= 15 AND pass_rate >= 0.70 AND median_labor_productivity_growth_pct >= 25
prior_confidence: 0.69
disclosure: The prior expects education deepening to travel with productivity, but causality
  can run through capital deepening, migration, institutions, and sector mix.
steelman: hypotheses/steelman/wdi_tertiary_attainment_labor_productivity_2000_2023.md
scope:
  period:
  - 2000
  - 2023
  countries:
  - ALB
  - AUS
  - BOL
  - CAN
  - CRI
  - CZE
  - IRL
  - IRN
  - KOR
  - LTU
  - MKD
  - MLT
  - MNG
  - MUS
  - PRT
  - PSE
  - SAU
  - SGP
  - SRB
  - SWE
  - USA
  outcome_dim:
  - productivity
  policy_family:
  - labour_market
  - none
  treatment_tags:
  - tertiary_attainment
  - labor_productivity
covers_claims:
- position_id: developmentalism
  claim_index: 97
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Phase 4D scoreboard mapping for the 68-verdict wave; the position claim restates this pre-registered hypothesis as
    a school prediction.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: malaysia_developmentalist_plateau_1990_2024
version: 1
status: candidate
topic: growth
claim: Malaysia post-1990 growth plateau is associated with protected national-champion policy and ethnic allocation constraints after early catch-up gains.
evidence_type: causal
sample:
  countries:
    - MYS
  period: [1970, 2024]
  temporal_structure: time_series
variables:
  outcome:
    - name: real_gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.MKTP.KD.ZG
      transformation: level
    - name: tfp_growth
      source: pwt:rtfpna
      transformation: annual_log_diff
    - name: manufacturing_share
      source: world_bank_wdi:NV.IND.MANF.ZS
      transformation: level
  treatment:
    - name: national_champion_policy_dummy
      source: constructed:binary_indicator
      transformation: binary
      notes: Coded 1 for periods with prominent national-champion policies (Proton, MAS, petrochemicals) and Bumiputera preference policies.
    - name: ethnic_allocation_constraints_index
      source: constructed:composite_index
      transformation: level
      notes: Composite index of Bumiputera equity requirements, government procurement preferences, and education quotas.
  controls:
    - name: commodity_prices
      source: world_bank_wdi:NETWD
      transformation: level
      notes: Palm oil and petroleum price index as proxies for external terms of trade.
    - name: trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: level
    - name: fdi_inflows
      source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS
      transformation: level
estimator:
  template: event_study
  fixed_effects: [year]
  clustering: none
  notes: Event-study and structural-break analysis of Malaysian growth around 1990. Tests whether national-champion policies and ethnic allocation constraints predict the post-1990 plateau.
falsification:
  rule: The hypothesis is refuted if Malaysia post-1990 growth did not slow significantly relative to 1970-1990, or if national-champion policies and ethnic allocation constraints do not significantly predict the slowdown.
  test: event_study_malaysia_plateau
  threshold:
    post_1990_slowdown: true
    policy_predicts_plateau: true
prior_confidence: 0.6
disclosure: Author acknowledges that Malaysia plateau has multiple explanations (commodity dependence, middle-income trap, political instability) and that ethnic allocation measurement is contested.
steelman: hypotheses/steelman/malaysia_developmentalist_plateau_1990_2024.md
scope:
  period: [1970, 2024]
  countries:
    - MYS
  outcome_dim:
    - gdp_growth
    - productivity
    - institutional_quality
  policy_family:
    - industrial_policy
    - institutional_reform
  treatment_tags:
    - malaysia_national_champion_policy
    - malaysia_bumiputera_policy
    - malaysia_proton
notes: Ethnic allocation constraints index requires hand-curation from academic and policy sources. Commodity price data from World Bank or IMF.

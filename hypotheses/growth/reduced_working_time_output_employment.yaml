# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: reduced_working_time_output_employment
version: 1
status: draft
topic: growth
claim: Reduced working-time experiments (French 35-hour week 2000, Icelandic four-day-week trial 2015-2019)
  did not produce the catastrophic output or employment consequences predicted by standard models.
notes: Seeded from a degrowth claim that French 35-hour week and Iceland four-day-week trial did not produce
  catastrophic output/employment effects predicted by lump-of-labour-fallacy critics. Two-country event study;
  human review required to set what "catastrophic" means.
prior_confidence: 0.6
disclosure: >-
  Authorial bias risk: degrowth framing benefits from setting the falsification bar low ("not
  catastrophic" is easier than "no negative effect"); the 35-hour-week scholarship is contested,
  with French unemployment rising in early 2000s for many reasons.
falsification:
  rule: The hypothesis is considered falsified if the pre-registered empirical test shows the opposite
    direction of the claim at conventional significance (p > 0.10), or if the primary outcome measure
    moves less than 10% in the claimed direction across the sample. Exact thresholds will be pinned in
    the variables and estimator blocks when this stub is promoted from draft.
  test: 'Event-study around 35h-week (FRA 2000) and 4-day-week trial (ISL 2015), country and year FE; outcomes
    real GDP, employment rate, hourly productivity; falsified if treated-unit GDP deviation worse than -3%
    at p<0.10.'
evidence_type: associational

sample:
  countries: [FRA, ISL, DEU, GBR, ITA, ESP, NLD, BEL, SWE, NOR, DNK, FIN, IRL]
  period: [1995, 2022]
  temporal_structure: panel

variables:
  outcome:
    - name: log_real_gdp
      source: "world_bank_wdi:NY.GDP.MKTP.KD"
      transformation: log
    - name: unemployment_rate
      source: "world_bank_wdi:SL.UEM.TOTL.ZS"
      transformation: level
    - name: employment_rate
      source: "ilostat:employment_to_population_ratio"
      transformation: level
    - name: avg_hours_worked
      source: "ilostat:avg_hours_worked_per_employed"
      transformation: level
    - name: tfp_index
      source: "pwt:rtfpna"
      transformation: level

  treatment:
    - name: working_time_reduction_indicator
      source: "constructed: indicator = 1 for FRA years >= 2000 (35-hour) and ISL years 2015-2019 (4-day trial)"
      transformation: indicator

  controls:
    - name: log_population
      source: "world_bank_wdi:SP.POP.TOTL"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level

estimator:
  template: event_study
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Event study around the French 35-hour week (2000) and Icelandic four-
    day-week trial (2015-2019). Outcomes: real GDP, employment, hourly
    productivity. Tests whether reduced-working-time treatments produced
    output or employment effects materially worse than counterfactual
    trajectories.

scope:
  period: [2000, 2019]
  countries: [FRA, ISL]
  outcome_dim: [employment_labour, productivity, gdp_growth]
  policy_family: [labour_market]
  treatment_tags: [french_35_hour_week_2000, iceland_four_day_week_trial_2015]

covers_claims:
  - position_id: degrowth
    claim_index: 3
    polarity: aligned
    school_prediction: supported
    confidence: high
    notes: "Identical-proposition: claim and hypothesis both test whether reduced working-time experiments (French 35h 2000, Iceland 4-day 2015-19) produced catastrophic output/employment consequences."


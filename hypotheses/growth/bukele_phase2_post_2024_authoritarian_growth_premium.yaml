# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: bukele_phase2_post_2024_authoritarian_growth_premium
version: 1
status: candidate
topic: growth
claim: >
  El Salvador's second Bukele term (post-2024 inauguration, with continued régimen-de-excepción
  and worsening institutional-quality scores) maintains FDI inflows, GDP growth, and tourism
  arrivals trajectories established in 2019-2024 despite mounting authoritarianism critique
  (V-Dem electoral-democracy decline, WGI rule-of-law score continuing to fall, Freedom House
  "partly free" downgrade). The hypothesis tests the institutional-quality-as-binding-constraint
  prediction: standard FDI literature (Daude-Stein 2007, Globerman-Shapiro 2003) implies that
  past a threshold, rule-of-law deterioration deters FDI. The pre-registered test asks whether
  the SLV growth/FDI premium relative to Central American peers persists or reverses in the
  2024Q3-2026Q4 window when the rule-of-law trajectory has been negative for 5+ consecutive years.
notes: >
  Phase-2 distinction from the 2019-2024 hypothesis is critical: the early Bukele term combined
  rapid security-channel improvement (homicide collapse) with rule-of-law deterioration, so the
  net FDI signal could be ambiguous. By 2024-2026 the security channel has saturated (homicides
  at floor) while the rule-of-law deterioration has accumulated. If FDI continues to grow in this
  later window, the hypothesis "institutional-quality channel is not binding" is supported. If
  FDI plateaus or reverses, the hypothesis is refuted and the Bukele growth story is reframed as
  a one-time security-channel effect that does not generalise.
prior_confidence: 0.55
disclosure: >
  Author's prior is genuinely divided. The market-liberal lean would predict that
  rule-of-law deterioration eventually bites and FDI plateaus. The Bukele-sympathetic
  alternative narrative (security-as-dominant-channel) would predict continued FDI growth.
  The 0.55 reflects this uncertainty; pre-registration locks the specification before
  2025-2026 data is fully observable.
evidence_type: causal
sample:
  countries: [SLV, HND, GTM, NIC, CRI, PAN, DOM]
  period: [2019, 2026]
  temporal_structure: panel
  exclusion_rules:
    - "exclude Nicaragua post-2018 from donor pool due to sanctions and rule-of-law collapse"
    - "exclude COVID 2020Q2-2020Q4 from pre-treatment matching"
scope:
  period: [2019, 2026]
  countries: [SLV, HND, GTM, NIC, CRI, PAN, DOM]
  outcome_dim: [gdp_growth, capital_flows, institutional_quality]
  policy_family: [institutional_reform, regulation, tax_policy]
  treatment_tags: [bukele_phase2_2024, salvador_regimen_de_excepcion, salvador_constitutional_reelection_2024]
variables:
  outcome:
    - name: fdi_inflow_share_gdp
      source: world_bank_wdi:BX.KLT.DINV.WD.GD.ZS; unctad:World
      transformation: level
    - name: real_gdp_quarterly
      source: imf:NGDP_R; world_bank_wdi:NY.GDP.MKTP.KD; sv_bcr:pib_real_quarterly
      transformation: log_level_quarterly
    - name: tourism_arrivals
      source: world_bank_wdi:ST.INT.ARVL; sv_mitur:visitor_arrivals
      transformation: log_level_annual
    - name: sovereign_credit_spread
      source: jp_morgan_embi:SLV
      transformation: basis_points
  treatment:
    - name: bukele_phase2_indicator
      source: "constructed: binary = 1 for SLV from 2024-06-01 onward"
      transformation: binary
  controls:
    - name: wgi_rule_of_law
      source: wgi:GOV_WGI_RL.EST
      transformation: level
    - name: vdem_electoral_democracy
      source: vdem:v2x_polyarchy
      transformation: level
    - name: freedom_house_status
      source: freedom_house:FIW_status
      transformation: ordinal
    - name: us_policy_rate
      source: fred:FEDFUNDS
      transformation: level
    - name: remittance_share_gdp
      source: world_bank_wdi:BX.TRF.PWKR.DT.GD.ZS
      transformation: level
    - name: homicide_rate_log
      source: unodc:intentional_homicide
      transformation: log_level
      notes: "Pre-treatment-saturated control: by 2024 the homicide channel has hit a floor; new variation should not drive 2024-2026 outcomes."
intervention_channel: bundled
intervention_channel_justification: >
  Phase-2 Bukele combines further institutional regression (constitutional re-election,
  judicial subordination) with continued business-friendly policies (tax incentives,
  Bitcoin-tourism brand). Bundled coding per invariant 4.
estimator:
  template: synth_did
  clustering: country
  notes: >
    Primary: synth_did with SLV treated from 2024Q3 (post-Bukele-second-inauguration), Central
    American peer pool. Secondary: continuous-treatment specification with
    cumulative-rule-of-law-decline as the treatment intensity, testing whether more-deteriorated
    institutional quality is associated with FDI deceleration.
falsification:
  rule: >
    Refuted (institutional-quality binding constraint VERIFIED) if SLV FDI-share-of-GDP CATT
    over 2024Q3-2026Q4 is significantly negative versus the synthetic counterfactual at p < 0.10
    permutation inference, OR if the continuous-rule-of-law-decline coefficient on FDI is
    significantly negative across the SLV trajectory. Supported (institutional-quality
    channel NOT binding for SLV in this window) if both tests are non-negative and the FDI
    trajectory remains within or above the synthetic-counterfactual band.
  test: synth_did_phase2_rule_of_law_binding_test
  threshold: "FDI CATT 2024Q3-2026Q4 not significantly negative AND rule-of-law-decline coefficient on FDI not significantly negative"
prior_confidence: 0.55
disclosure: >
  Pre-registered before 2025-2026 data is fully observable. The test is symmetric: a refutation
  here would update author priors meaningfully toward the standard institutions-drive-FDI literature;
  a support would update toward the security-channel-as-dominant view.
steelman: hypotheses/steelman/bukele_phase2_post_2024_authoritarian_growth_premium.md
linked_hypotheses:
  - bukele_fdi_gdp_investment_climate_2019_2024
  - rule_of_law_institutional_growth

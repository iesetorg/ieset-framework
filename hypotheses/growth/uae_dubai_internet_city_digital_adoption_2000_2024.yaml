# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uae_dubai_internet_city_digital_adoption_2000_2024
version: 1
status: pre_registered
topic: growth
claim: Dubai Internet City and the UAE digital-state strategy were followed by near-universal
  internet adoption and a measurable high-tech export presence, even if the high-tech export share
  remains far below Singapore-style electronics hubs.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - ARE
  - SAU
  - KWT
  - QAT
  - OMN
  - BHR
  period:
  - 2000
  - 2024
  temporal_structure: panel
canonical_metrics:
- metric_id: internet_diffusion_gain
  description: Internet users share rose sharply
  threshold: '>= 70pp increase'
  window: 2000-2024
  source: world_bank_wdi:IT.NET.USER.ZS
  direction: supports_claim
  independence_justification: Digital adoption trend.
- metric_id: internet_users_2024
  description: Internet users reached near universal coverage
  threshold: '>= 95%'
  window: '2024'
  source: world_bank_wdi:IT.NET.USER.ZS
  direction: supports_claim
  independence_justification: Endpoint adoption check.
- metric_id: hightech_export_share_gain
  description: High-tech export share rose from early coverage
  threshold: '>= 4pp increase'
  window: 2008-2023
  source: world_bank_wdi:TX.VAL.TECH.MF.ZS
  direction: supports_claim
  independence_justification: Export capability check separate from consumer adoption.
- metric_id: hightech_export_share_2023
  description: High-tech exports reached visible but not dominant share
  threshold: '>= 8%'
  window: '2023'
  source: world_bank_wdi:TX.VAL.TECH.MF.ZS
  direction: supports_claim
  independence_justification: Endpoint technology-export check.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
variables:
  outcome:
  - name: internet_users
    source: world_bank_wdi:IT.NET.USER.ZS
    transformation: endpoint_change
  - name: high_tech_exports_share
    source: world_bank_wdi:TX.VAL.TECH.MF.ZS
    transformation: endpoint_change
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Custom Singapore/UAE case checklist using local WDI, WGI, and Fraser EFW vintages.
falsification:
  rule: SUPPORTED if at least 3 of 4 pre-registered metrics meet their thresholds. REFUTED if
    at most 1 metrics meet after available data are evaluated. Otherwise PARTIAL or INCONCLUSIVE_DATA_PENDING.
  test: uae_dubai_internet_city_digital_adoption_2000_2024_local_multimetric_checklist
  threshold: MET >= 3 of 4; REFUTE when MET <= 1
prior_confidence: 0.66
disclosure: 'Prior expects partial-to-support: digital adoption is very strong, but high-tech
  export depth is modest.'
steelman: hypotheses/steelman/uae_dubai_internet_city_digital_adoption_2000_2024.md
scope:
  period:
  - 2000
  - 2024
  countries:
  - ARE
  - SAU
  - KWT
  - QAT
  - OMN
  - BHR
  outcome_dim:
  - industrial_capability
  - productivity
  policy_family:
  - industrial_policy
  - regulation
  - trade_policy
  treatment_tags:
  - dubai_internet_city_1999
  - tecom_clusters
  - uae_digital_government
notes: Separates adoption from export capability to avoid overclaiming the Dubai Internet City
  model.

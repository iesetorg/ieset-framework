# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: market_dynamism_government_consumption_investment_drag
version: 1
status: candidate
topic: growth
claim: Higher government-consumption shares predict lower investment shares and slower subsequent real GDP per-capita growth.
claim_direction: "-"
evidence_type: associational
sample:
  countries: [USA, GBR, CAN, AUS, NZL, DEU, FRA, ITA, ESP, NLD, SWE, NOR, DNK, FIN, JPN, KOR, CHN, IND, BRA, MEX, CHL, ARG, TUR, ZAF, POL, EST, VNM, THA, MYS, IDN, COL, PER, PHL, EGY, MAR, KEN, NGA, BGD, PAK, LKA]
  period: [1990, 2023]
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing government-consumption treatment, investment-share outcome, or GDP-per-capita outcome
  - exclude years with war-related GDP contractions greater than 10 percent when conflict flags are available
  - require at least 20 countries and 300 country-year observations
scope:
  period: [1990, 2023]
  countries: [GLOBAL]
  outcome_dim: [gdp_growth, productivity, fiscal_policy]
  policy_family: [fiscal_policy]
  treatment_tags: [government_consumption, state_allocation_share, investment_drag]
intervention_channel: fiscal
intervention_channel_justification: Government-consumption share is a fiscal allocation measure and proxy for state-directed current spending.
variables:
  outcome:
  - name: gross_capital_formation_share
    source: world_bank_wdi:NE.GDI.TOTL.ZS
    transformation: level
  - name: real_gdp_pc_growth_5yr_forward
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: cumulative_log_growth_5yr_forward
  treatment:
  - name: government_consumption_share
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level_lagged_one_year
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: private_credit_depth
    source: world_bank_wdi:FS.AST.PRVT.GD.ZS
    transformation: level
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: The treatment is a broad state-allocation proxy; it does not distinguish public goods from transfers, defense, or emergency stabilization.
falsification:
  rule: SUPPORTED if lagged government-consumption share is negative at p<0.10 for both investment share and forward growth. REFUTED if both primary coefficients are positive and at least one is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_market_dynamism_government_consumption_investment_drag
  threshold:
    p_value: "p<0.10"
    expected_sign: "-"
    minimum_countries: 20
    minimum_observations: 300
prior_confidence: 0.52
disclosure: This spec is intentionally vulnerable to the counterargument that productive public services raise growth; positive estimates would count against the anti-state-allocation mechanism.
steelman: hypotheses/steelman/market_dynamism_government_consumption_investment_drag.md

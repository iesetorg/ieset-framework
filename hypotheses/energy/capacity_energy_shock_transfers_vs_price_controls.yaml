# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: capacity_energy_shock_transfers_vs_price_controls
version: 1
status: candidate
topic: energy
claim: Energy-shock relief works better as targeted transfers or temporary tax smoothing in high-capacity states; administered price controls/subsidies predict shortages, fiscal slippage, or lower investment where pass-through is suppressed for long periods.
claim_direction: +
methodology_note: Promoted from the 2026-05-22 200-hypothesis NEEDS_ALIAS swarm batch 2. This is a first-pass alias-repair candidate using a local proxy source where the source family exists but the exact original variable needs later bespoke refinement.
evidence_type: associational
sample:
  countries: &id002
  - GLOBAL
  period: &id001
  - 1990
  - 2024
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing the primary treatment, outcome, or core controls
  - require at least 12 countries and 120 country-year observations for a panel verdict
  - treat generic-runner output as alias-repair triage until a reviewer checks source semantics
scope:
  period: *id001
  countries: *id002
  outcome_dim:
  - taxation
  - energy
  - gdp_growth
  policy_family:
  - energy_policy
  treatment_tags:
  - capacity_energy_shock_transfers_vs_price_controls
intervention_channel: regulatory
intervention_channel_justification: 'The treatment is a measured proxy for the local source family named in the alias queue: owid:consumption-subsidies-for-fossil-fuels.'
variables:
  outcome:
  - name: cpi_inflation
    source: world_bank_wdi:FP.CPI.TOTL.ZG
    transformation: level
  treatment:
  - name: fossil_fuel_consumption_subsidies
    source: owid:consumption-subsidies-for-fossil-fuels
    transformation: level_lagged_one_year
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
  - name: government_effectiveness
    source: wgi:GE.EST
    transformation: level
mechanism_measurement:
  mechanism_type: administered_price_subsidy
  design_features:
  - panel_fe_screen
  - controlled_vs_uncontrolled_categories
  - adjacent_market_comparison
  - high_frequency_event_study
  - welfare_accounting
  - distributional_decomposition
  comparison_structure:
    treated_units:
    - country-years with fossil-fuel consumption subsidy exposure during energy shocks
    control_units:
    - country-years using more pass-through, transfers, or tax smoothing
    controlled_or_regulated_units:
    - household fuel and electricity prices with suppressed pass-through
    exempt_or_uncontrolled_units:
    - market-priced customer classes, industrial tariffs, or unsubsidized fuels
    time_frequency: monthly
    notes: >
      A dispositive version should compare relief architecture during common
      energy shocks, not only annual subsidy levels against headline CPI.
  causal_layers:
  - layer: first_order_price_or_transfer
    mechanism: Price controls/subsidies or targeted transfers cushion household energy costs during shocks.
    variable_names: [fossil_fuel_consumption_subsidies]
    candidate_sources:
    - IMF energy subsidies
    - national tariff schedules
    - household transfer registers
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: second_order_supply_response
    mechanism: Suppressed pass-through can create shortages, outages, import compression, or reduced investment.
    variable_names: []
    candidate_sources:
    - fuel inventories and station outages
    - electricity outage frequency
    - energy-sector investment
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: fiscal_or_enforcement_cost
    mechanism: Price suppression can create fiscal slippage, arrears, and quasi-fiscal losses.
    variable_names: [fossil_fuel_consumption_subsidies]
    candidate_sources:
    - IMF fiscal-monitor energy subsidies
    - utility arrears
    - budget transfer data
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: distributional_incidence
    mechanism: Transfers can target low-income households while price controls subsidize all consumption, including high users.
    variable_names: []
    candidate_sources:
    - household energy expenditure microdata
    - transfer recipient records
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: net_welfare
    mechanism: Compare relief benefits against shortage, fiscal, quality/reliability, and investment costs by architecture.
    variable_names: []
    candidate_sources:
    - constructed transfer-vs-price-control welfare ledger
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  distributional_groups:
  - incumbent_beneficiaries
  - low_income_uncovered_households
  - uncovered_consumers
  - suppliers
  - taxpayers
  - future_cohorts
  welfare_accounting:
    first_order_transfer: household energy-bill relief or targeted transfer value
    deadweight_loss: excess demand, rationing, and inefficient consumption from suppressed prices
    quality_loss: outage/reliability losses
    search_or_queue_cost: station queue and shortage search costs
    future_supply_loss: foregone investment and maintenance
    fiscal_or_enforcement_cost: subsidy outlays, arrears, and administrative costs
    net_welfare_formula: household_relief - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss - fiscal_or_enforcement_cost
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    This is the right conceptual comparison, but the current alias-repair panel
    is not yet measuring the transfer-versus-price-control architecture.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Alias-batch panel fixed effects screen. The proxy source is explicitly local and runnable, but exact policy semantics should be upgraded before scoreboard conversion.
falsification:
  rule: SUPPORTED if the primary treatment coefficient has the pre-registered + sign at p<=0.10 with minimum sample gates. REFUTED if the coefficient has the opposite sign at p<=0.10. Otherwise PARTIAL; missing data or failed sample gates are INCONCLUSIVE_DATA_PENDING.
  test: panel_fe_capacity_energy_shock_transfers_vs_price_controls
  threshold:
    p_value: p<=0.10
    expected_sign: +
    minimum_countries: 12
    minimum_observations: 120
prior_confidence: 0.48
disclosure: This candidate was generated from the alias-repair lane. A decisive first-pass verdict is useful triage, not final scoreboard evidence.

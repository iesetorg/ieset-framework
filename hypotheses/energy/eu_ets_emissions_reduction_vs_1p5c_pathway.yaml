# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: eu_ets_emissions_reduction_vs_1p5c_pathway
version: 2
status: pre_registered
topic: energy
claim: Private-sector carbon-pricing schemes (EU ETS 2005-present) have failed to reduce EU territorial
  emissions at the pace implied by 1.5C pathways, demonstrating market-mechanism inadequacy.
scope:
  period: [2005, 2023]
  countries: [EU]
  outcome_dim: [energy, regulation_compliance_cost]
  policy_family: [energy_policy, regulation]
  treatment_tags: [cap_and_trade_eu_ets, paris_agreement_2015]
covers_claims:
  - position_id: eco_socialist
    claim_index: 2
    polarity: aligned
    school_prediction: supported
    confidence: high
    notes: "Claim text matches hypothesis claim verbatim: EU ETS 2005-present failure to meet 1.5C pace as evidence of market-mechanism inadequacy. Direct alignment."
  - position_id: mmt
    claim_index: 97
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. MMT has a stake in whether public spending, transfers, and labour-market institutions are constrained by real resources rather than household-budget analogies."
  - position_id: market_socialist
    claim_index: 97
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. Market socialism has a stake in whether worker voice, public investment, and socialized-capital mechanisms can coexist with productive allocation."
  - position_id: degrowth
    claim_index: 98
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. Degrowth has a stake in whether welfare, emissions, and labour-security outcomes can improve without treating GDP growth as the sole objective."
  - position_id: marxian
    claim_index: 99
    polarity: aligned
    school_prediction: supported
    confidence: medium
    notes: "2026-05-04 V1 balance-floor coverage wave; curated mechanism-family selection from already tested hypotheses, independent of observed score effects. Mechanism family: ecological_market_mechanism_skepticism. Marxian theory has a stake in whether capital mobility, financial liberalisation, and labour bargaining dynamics shape observed distributional outcomes."
notes: Maps the eco-socialist school's EU-ETS-fails-1.5C-pace claim to a transparent benchmark
  against an EU27 2030 -55% CO2 pathway. This v2 registration tests the pathway-pace component only;
  it does not identify whether any observed progress was caused by the ETS rather than overlapping
  regulation, demand shocks, or technology change.
prior_confidence: 0.65
disclosure: Author prior accepts that EU territorial emissions have lagged 1.5C-aligned pathways but
  is skeptical of the framing that this proves market-mechanism inadequacy — the EU ETS price was
  artificially low for most of phases 1-2 due to over-allocation, and tightening (post-MSR 2019) has
  shown stronger price signals; the test should distinguish design-failure from market-failure.
falsification:
  rule: >
    Primary test uses Eurostat env_air_gge EU27_2020 total CO2 excluding LULUCF/memo items
    (airpol=CO2, src_crf=TOTX4_MEMO, unit=MIO_T). The 1.5C-compatible benchmark is proxied by a
    straight-line path from the observed 2015 EU27 CO2 level to 45% of the 1990 EU27 CO2 level in
    2030 (the EU -55% policy pathway). The hypothesis is supported only if both actual cumulative
    2015-2023 CO2 and the 2023 endpoint exceed that path by more than 10%. It is refuted if both
    cumulative and endpoint gaps are within ±10% of the path. Otherwise it is weakened/partial.
  test: eu27_co2_pathway_gap_2015_2023
  threshold: support if cumulative and endpoint gaps >10%; refute if both are within ±10%
methodology_note: >
  This is a descriptive pathway test, not a causal ETS-effect estimate. The path uses the EU -55%
  by 2030 benchmark as an operational 1.5C-aligned envelope because no local IPCC/IEA country
  allocation vintage is currently available. A later causal run should add ETS price/cap stringency
  and non-ETS regulatory controls.
evidence_type: associational
sample:
  countries: [AUT, BEL, BGR, HRV, CYP, CZE, DNK, EST, FIN, FRA, DEU, GRC, HUN, IRL, ITA, LVA, LTU, LUX, MLT, NLD, POL, PRT, ROU, SVK, SVN, ESP, SWE]
  period: [2005, 2023]
  temporal_structure: panel
  exclusion_rules:
    - "drop country-years missing EEA verified emissions inventory entries"
variables:
  outcome:
    - name: territorial_co2_emissions_mt
      source: "eea:greenhouse_gas_inventory"
      transformation: log
      notes: "EEA territorial GHG inventory CO2 component, EU member states 2005-2023."
    - name: co2_per_capita
      source: "world_bank_wdi:EN.ATM.CO2E.PC"
      transformation: log
    - name: ets_sector_emissions_verified
      source: "eea:eu_ets_verified_emissions"
      transformation: log
      notes: "EU ETS Phase 1-4 verified emissions, sector-disaggregated."
  treatment:
    - name: eu_ets_phase_indicator
      source: "constructed: phase indicator (Phase 1: 2005-2007, Phase 2: 2008-2012, Phase 3: 2013-2020, Phase 4: 2021-2030); MSR activation 2019 sub-treatment."
      transformation: categorical
  controls:
    - name: log_gdp_per_capita
      source: "world_bank_wdi:NY.GDP.PCAP.KD"
      transformation: log
    - name: trade_openness
      source: "world_bank_wdi:NE.TRD.GNFS.ZS"
      transformation: level
    - name: log_population
      source: "world_bank_wdi:SP.POP.TOTL"
      transformation: log
estimator:
  template: descriptive
  notes: >
    Descriptive benchmark of EU territorial CO2 trajectory 2005-2023 against
    IPCC SR1.5 / IEA NZE pathway (linear-budget interpolation for EU-27 share).
    Compute cumulative-emissions deviation from 1.5C-aligned envelope; report
    the gap with and without 2020-2021 pandemic distortion. Phase-3/Phase-4
    sub-period decomposition isolates effect of post-MSR price tightening.
    Not causal — pathway counterfactual is normative not estimated.

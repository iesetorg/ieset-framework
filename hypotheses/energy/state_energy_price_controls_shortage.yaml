# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: state_energy_price_controls_shortage
version: 1
status: candidate
topic: energy
claim: Higher state-consumption burden proxies predict weaker electricity-access outcomes over long windows.
methodology_note: Promoted from the second 30-item long-horizon market/QOL candidate queue as a local-data
  first-pass screen.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1990
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - energy
  - welfare_state
  policy_family:
  - energy_policy
  - fiscal_policy
  treatment_tags:
  - energy_price_controls
  - state_burden
variables:
  outcome:
  - name: qol_or_prosperity_outcome
    source: world_bank_wdi:EG.ELC.ACCS.ZS
    transformation: level_or_growth_proxy
  treatment:
  - name: market_or_intervention_proxy
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
mechanism_measurement:
  mechanism_type: administered_price_subsidy
  design_features:
  - panel_fe_screen
  - controlled_vs_uncontrolled_categories
  - high_frequency_event_study
  - welfare_accounting
  - distributional_decomposition
  comparison_structure:
    treated_units:
    - country-years with high state-consumption burden proxy
    control_units:
    - country-years with lower state-consumption burden proxy
    controlled_or_regulated_units:
    - household energy prices where pass-through is suppressed
    exempt_or_uncontrolled_units:
    - unsubsidized fuels or customer classes where available
    time_frequency: annual
    notes: >
      Government consumption is not an energy price-control treatment. This
      run is a broad screen until exact tariff, subsidy, outage, and investment
      data are substituted.
  causal_layers:
  - layer: first_order_price_or_transfer
    mechanism: Administered energy prices or subsidies reduce household energy bills.
    variable_names: []
    candidate_sources:
    - national tariff schedules
    - IMF energy subsidy database
    - household energy CPI components
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  - layer: second_order_supply_response
    mechanism: Below-cost pricing weakens investment, access quality, inventories, or outage performance.
    variable_names: [qol_or_prosperity_outcome]
    candidate_sources:
    - WDI electricity access
    - SAIDI/SAIFI outage metrics
    - IEA/World Bank investment and generation capacity
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: fiscal_or_enforcement_cost
    mechanism: Price suppression creates fiscal transfers, utility arrears, or quasi-fiscal losses.
    variable_names: [market_or_intervention_proxy]
    candidate_sources:
    - IMF energy subsidy estimates
    - utility arrears
    - budget transfers
    measurement_status: proxy_only
    required_for_dispositive_verdict: true
  - layer: net_welfare
    mechanism: Energy access gains must be netted against fiscal, outage, shortage, and future investment costs.
    variable_names: []
    candidate_sources:
    - constructed access and reliability welfare ledger
    measurement_status: data_gap
    required_for_dispositive_verdict: true
  distributional_groups:
  - incumbent_beneficiaries
  - uncovered_consumers
  - suppliers
  - taxpayers
  - future_cohorts
  welfare_accounting:
    first_order_transfer: subsidized tariff discount times covered consumption
    deadweight_loss: rationed energy or excess demand
    quality_loss: outage and reliability deterioration
    search_or_queue_cost: fuel queue or service-interruption search costs
    future_supply_loss: foregone utility investment and maintenance
    fiscal_or_enforcement_cost: budget subsidy, arrears, and quasi-fiscal losses
    net_welfare_formula: consumer_transfer - deadweight_loss - quality_loss - search_or_queue_cost - future_supply_loss - fiscal_or_enforcement_cost
  promotion_gate: screen_only_until_second_order_measured
  notes: >
    Treat current PARTIAL output as non-dispositive. Exact energy-price-control
    variables are required before school forecast scoring.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local-data first-pass TWFE screen; upgrade to exact treatment/outcome datasets before scoreboard
    promotion.
falsification:
  rule: SUPPORTED if the treatment coefficient has the pre-registered sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_state_energy_price_controls_shortage
  threshold:
    p_value: p<0.10
    expected_sign: '-'
prior_confidence: 0.55
disclosure: These are proxy-first QOL screens. They are intended to identify promising evidence, not to
  settle causal claims without robustness checks.
steelman: hypotheses/steelman/state_energy_price_controls_shortage.md

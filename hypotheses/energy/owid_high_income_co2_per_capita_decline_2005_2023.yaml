# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: owid_high_income_co2_per_capita_decline_2005_2023
version: 1
status: pre_registered
topic: energy
claim: 'Among a fixed panel of 20 high-income economies, per-capita CO2 emissions should mostly
  fall after the mid-2000s energy-transition inflection: at least 75% should reduce per-capita
  CO2 by at least 15% from 2005 to 2023, and the median reduction should be at least 25%.'
evidence_type: descriptive
sample:
  countries: &id001
  - AUS
  - AUT
  - BEL
  - CAN
  - CHE
  - DEU
  - DNK
  - ESP
  - FIN
  - FRA
  - GBR
  - IRL
  - ITA
  - JPN
  - KOR
  - NLD
  - NOR
  - NZL
  - SWE
  - USA
  period:
  - 2005
  - 2023
  temporal_structure: panel
variables:
  outcome:
  - name: co2_emissions_per_capita
    source: owid:co2-emissions-per-capita
    transformation: endpoint percent change
  treatment:
  - name: high_income_country_panel
    source: fixed country list
    transformation: 20 high-income economies
estimator:
  template: descriptive
  clustering: none
  notes: Custom OWID endpoint-panel replication using local vintages on disk. Countries are
    selected by the predeclared treatment-threshold rule, then graded against endpoint change
    thresholds.
falsification:
  rule: SUPPORTED if at least 75% of the high-income panel reduces per-capita CO2 by >=15%
    and the median decline is >=25%. REFUTED if fewer than 50% pass or median decline is less
    than 10%. Otherwise PARTIAL.
  test: high_income_co2_per_capita_endpoint_percent_change
  threshold: n >= 18 AND pass_rate >= 0.75 AND median_co2_per_capita_pct_change <= -25
prior_confidence: 0.84
disclosure: The prior expects post-2005 high-income decarbonization, but territorial per-capita
  emissions omit imported consumption emissions and can be flattered by offshoring.
steelman: hypotheses/steelman/owid_high_income_co2_per_capita_decline_2005_2023.md
scope:
  period:
  - 2005
  - 2023
  countries: *id001
  outcome_dim:
  - energy
  policy_family:
  - energy_policy
  treatment_tags:
  - per_capita_emissions
  - high_income_decarbonization

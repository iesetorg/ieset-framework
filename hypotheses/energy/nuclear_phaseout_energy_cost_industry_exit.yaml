# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: nuclear_phaseout_energy_cost_industry_exit
version: 1
status: candidate
topic: energy
claim: 'Policy-driven nuclear phaseouts produce a three-order causal chain. FIRST-ORDER: the policy delivers on the green-ambition narrative — reactors are closed, nuclear-dependency ends, and the political
  commitment is honoured. This first-order success is real and we acknowledge it on its own terms. SECOND-ORDER: wholesale and industrial electricity prices rise (gas-fired generation fills the dispatchable
  gap), grid reliability metrics weaken, and carbon- intensity of power generation rises in the transition window. THIRD-ORDER: energy-intensive industry (chemicals, steel, aluminium) reduces capacity or
  relocates out of the jurisdiction — BASF Ludwigshafen contraction, ArcelorMittal and Salzgitter steel curtailments, aluminium smelter closures in Germany, Belgium, and Netherlands. Investment and FDI
  flows in energy-intensive sectors redirect abroad. Cases: Germany Atomausstieg 2011-2023, Belgium nuclear phaseout schedule (now partly reversed), Germany Kohleausstieg interaction.

  '
evidence_type: causal
sample:
  countries:
  - DEU
  - BEL
  - FRA
  - NLD
  period:
  - 2000
  - 2024
  temporal_structure: panel
  cross_section_justification: 'Treated units are DEU (decisive 2011 Atomausstieg) and BEL (staged phaseout); France and Netherlands act as partial donors with partial phaseout schedules.

    '
  exclusion_rules:
  - exclude 2022-2023 from the identification step for second-order prices (Ukraine war gas shock dominates); retain as robustness
scope:
  period:
  - 2000
  - 2024
  countries:
  - DEU
  - BEL
  - FRA
  - NLD
  outcome_dim:
  - energy
  - industrial_capability
  - capital_flows
  policy_family:
  - energy_policy
  - regulation
  treatment_tags:
  - atomausstieg_2011
  - kohleausstieg_2020
  - belgium_nuclear_phaseout_2003
  - fukushima_2011
variables:
  outcome:
  - name: nuclear_share_of_generation
    source: entsoe:generation_mix (DEU, BEL, FRA, NLD); iea:electricity_statistics; agora:energiewende_stromdaten
    transformation: share
    notes: 'FIRST-ORDER outcome: phaseout IS achieved — acknowledged policy success on its own terms.'
  - name: industrial_electricity_price
    source: eurostat:nrg_pc_205 (industrial electricity price band IE)
    transformation: level_real_eur_per_mwh
    notes: 'SECOND-ORDER outcome: industrial prices rise.'
  - name: grid_reliability_saidi
    source: cEER:SAIDI (System Average Interruption Duration Index by country); bnetza:stoerungsstatistik (DEU)
    transformation: minutes_per_year
    notes: 'SECOND-ORDER outcome: reliability degradation.'
  - name: power_sector_carbon_intensity
    source: eea:greenhouse_gas_inventory; iea:co2_emissions_from_fuel_combustion
    transformation: gco2_per_kwh
    notes: 'SECOND-ORDER outcome: transition-window carbon intensity.'
  - name: energy_intensive_sector_output
    source: eurostat:sts_inpr_a (industrial production index, NACE chemicals, basic metals)
    transformation: yoy_pct_change
    notes: 'THIRD-ORDER outcome: energy-intensive output.'
  - name: energy_intensive_fdi_outflow
    source: oecd:FDI_statistics (outward by sector); unctad:FDI
    transformation: log_level_real_usd
    notes: 'THIRD-ORDER outcome: capital reallocation.'
  treatment:
  - name: nuclear_phaseout_event_or_schedule
    source: 'constructed: DEU Atomausstieg Mar-2011 decision + final closures 2023; BEL 2003 law + 2015 amendment + 2022 reversal; DEU Kohleausstieg 2020'
    transformation: indicator_and_schedule_intensity
  controls:
  - name: natural_gas_price_ttf
    source: eex:TTF; ice:TTF
    transformation: log_real_eur_per_mwh
  - name: co2_ets_allowance_price
    source: eex:EUA
    transformation: log_real_eur_per_tonne
  - name: wind_solar_capacity_installed
    source: entsoe:transparency_platform; irena:capacity
    transformation: gw
intervention_channel: regulatory
intervention_channel_justification: 'Nuclear phaseout is a regulatory decision to retire generation assets and prohibit new builds. Fiscal effects (lost tax revenue, transition costs) enter as downstream
  consequences, not as the direct intervention.

  '
estimator:
  template: synth_did
  clustering: country
  fixed_effects:
  - country
  - year
  random_seed: 20260424
  notes: 'Synthetic DiD with DEU as primary treated unit, donor pool of non-phaseout European power systems (FRA, ESP, SWE, FIN, CZE). Event-study around Mar-2011 Fukushima decision. Secondary: BEL as treated
    unit. Placebo test on pre-2011 DEU. Robustness: control explicitly for gas-price shock via interaction terms.

    '
falsification:
  rule: 'Not supported if: (a) FIRST-ORDER nuclear phaseout is achieved as legislated (trivially confirmed for DEU 2023) AND (b) SECOND- ORDER industrial electricity-price divergence vs synthetic control
    is <10 EUR/MWh once gas-price and ETS are controlled for at p<0.10 AND (c) THIRD-ORDER energy-intensive sector output or FDI shows no divergence vs synthetic control. If the price gap is entirely absorbed
    by gas prices and ETS (i.e. no independent phaseout effect once those are controlled), the chain claim is refuted.

    '
  test: synth_did_germany_belgium_causal_chain
  threshold: 'FIRST-ORDER phaseout confirmed AND industrial price gap >=12 EUR/MWh vs synthetic control after gas-ETS control AND energy-intensive production divergence <=-3% vs synthetic control at p<0.10

    '
prior_confidence: 0.75
disclosure: 'Author holds market-liberal priors and has publicly expressed skepticism of Atomausstieg policy. Existing repo hypotheses nuclear_phaseout_grid_reliability_cost_tradeoff and german_energiewende_industrial_cost_trajectory
  cover neighbouring terrain. This hypothesis is distinct in staking the full causal chain (phaseout achieved as 1st order success, prices and grid as 2nd order, industry exit as 3rd order) and in testing
  Belgium as a secondary case. Prior is high but not extreme because the 2022-2023 gas-shock window confounds identification.

  '
steelman: hypotheses/steelman/nuclear_phaseout_energy_cost_industry_exit.md
linked_hypotheses:
- nuclear_phaseout_grid_reliability_cost_tradeoff
- german_energiewende_industrial_cost_trajectory
- eu_post_2021_gas_shock_industrial_output_impact
notes: 'Chain: phaseout achieved (1st) -> industrial electricity prices up + grid reliability stressed (2nd) -> energy-intensive industry contraction + FDI outflow (3rd). Identification depends on separating
  the phaseout-specific effect from the gas-shock confound in 2022-2023.

  '


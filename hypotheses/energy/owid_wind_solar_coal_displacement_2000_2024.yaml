hypothesis_id: owid_wind_solar_coal_displacement_2000_2024
version: 1
status: pre_registered
topic: energy
claim: 'Among countries where wind plus solar electricity share rose by at least 10 percentage points from 2000 to 2024, coal''s electricity share should usually fall: at least 60% of selected countries should show a coal-share decline of at least 5 percentage points, with median coal-share change at most -10 percentage points.'

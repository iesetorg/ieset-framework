    source: owid:share-elec-by-source
    transformation: endpoint percentage-point change in Coal column
  treatment:
  - name: wind_plus_solar_share
    source: owid:share-elec-by-source
    transformation: countries selected if Wind + Solar endpoint increase >= 10pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom OWID endpoint-panel replication using local vintages on disk. Countries are selected by the predeclared treatment-threshold rule, then graded against endpoint change thresholds.
falsification:
  rule: SUPPORTED if at least 60% of selected countries have coal-share declines of at least 5pp and the median coal-share change is <= -10pp. REFUTED if fewer than 40% pass or median coal-share change is non-negative. Otherwise PARTIAL.
  test: wind_solar_growth_coal_share_endpoint_change
  threshold: n >= 20 AND pass_rate >= 0.60 AND median_coal_change_pp <= -10
prior_confidence: 0.58
disclosure: The prior expects many wind/solar additions to displace coal, but gas, hydro, oil-heavy island grids, and demand growth can absorb renewable gains instead.

hypothesis_id: owid_g20_co2_intensity_decline_1990_2022
version: 1
status: pre_registered
topic: energy
claim: 'Most large economies should show substantial carbon-intensity improvement since 1990: among the 19 country-level G20 economies with local OWID coverage, at least 75% should reduce CO2 emissions per unit of GDP by at least 25% by 2022, and the median decline should be at least 35%.'
evidence_type: descriptive
sample:
  countries:
  - ARG
  - AUS
  - BRA
  - CAN
  - CHN
  - DEU
  - FRA
  - GBR
  - IDN
  - IND
  - ITA
  - JPN
  - KOR
  - MEX
  - RUS
  - SAU
  - TUR
  - USA
  - ZAF
  period:
  - 1990
  - 2022
  temporal_structure: panel
variables:
  outcome:
  - name: co2_intensity
    source: owid:co2-intensity
    transformation: endpoint percent change
  treatment:
  - name: g20_country_panel
    source: fixed country list
    transformation: 19 country-level G20 economies
estimator:
  template: descriptive
  clustering: none
  notes: Custom OWID endpoint-panel replication using local vintages on disk. Countries are selected by the predeclared treatment-threshold rule, then graded against endpoint change thresholds.
falsification:
  rule: SUPPORTED if at least 75% of the G20 country panel reduces CO2 intensity by >=25% and the median decline is >=35%. REFUTED if fewer than 50% pass or the median decline is less than 15%. Otherwise PARTIAL.
  test: g20_co2_intensity_endpoint_percent_change
  threshold: n >= 18 AND pass_rate >= 0.75 AND median_co2_intensity_pct_change <= -35
prior_confidence: 0.86
disclosure: The prior expects broad energy efficiency and structural-change gains, but CO2/GDP can improve while absolute emissions keep rising.
steelman: hypotheses/steelman/owid_g20_co2_intensity_decline_1990_2022.md

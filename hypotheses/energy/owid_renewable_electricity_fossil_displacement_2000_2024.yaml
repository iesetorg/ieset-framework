    source: owid:share-electricity-fossil-fuels
    transformation: endpoint percentage-point change
  treatment:
  - name: renewable_electricity_share
    source: owid:share-electricity-renewables
    transformation: countries selected if endpoint increase >= 15pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom OWID endpoint-panel replication using local vintages on disk. Countries are selected by the predeclared treatment-threshold rule, then graded against endpoint change thresholds.
falsification:
  rule: SUPPORTED if at least 70% of selected countries have fossil-electricity-share declines of at least 10pp and the median fossil-share change is <= -15pp. REFUTED if fewer than 50% pass or the median decline is less than 5pp. Otherwise PARTIAL.
  test: renewable_electricity_growth_fossil_share_endpoint_change
  threshold: n >= 20 AND pass_rate >= 0.70 AND median_fossil_change_pp <= -15
prior_confidence: 0.82
disclosure: The prior expects a strong accounting substitution pattern because electricity shares sum to 100, but hydro variability, nuclear retirements, imports, and demand growth can weaken causal interpretation.

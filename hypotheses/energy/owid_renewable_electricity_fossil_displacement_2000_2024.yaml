hypothesis_id: owid_renewable_electricity_fossil_displacement_2000_2024
version: 1
status: pre_registered
topic: energy
claim: 'Among countries where renewable electricity share rose by at least 15 percentage points between 2000 and 2024, fossil-fuel electricity share usually fell materially: at least 70% should show a fossil-share decline of at least 10 percentage points, and the median fossil-share change should be at most -15 percentage points.'
evidence_type: descriptive

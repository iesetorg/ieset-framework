hypothesis_id: heritage_government_integrity_electricity_access_income_region_robustness
version: 1
status: candidate
topic: energy
claim: Conditional on latest real GDP per capita and broad Heritage region, countries with higher Heritage
  government integrity in 2024 have higher latest-available electricity access. This tests whether the
  free-market/market-order association survives a first income-and-region robustness screen.
methodology_note: Second-stage Heritage market-order robustness wave. The original wave used top-vs-bottom
  quartile contrasts; this wave estimates a controlled cross-sectional OLS coefficient for the same Heritage
  pillar after log GDP per capita and Heritage region fixed effects.
evidence_type: descriptive

  period:
  - 2024
  - 2024
  temporal_structure: cross_section_with_justification
  cross_section_justification: Heritage IEF cleaned local vintages currently cover 2024-2026. The 2024
    score is used to avoid post-outcome look-ahead. WDI outcome and income-control observations use latest
    available country observations from 2018-2024.
  exclusion_rules:
  - drop countries missing the Heritage component score
  - drop countries without a WDI outcome observation from 2018 through 2024
  - drop countries without a WDI GDP-per-capita control observation from 2018 through 2024
  - drop countries without a Heritage region label
scope:
  period:
  - 2024
  - 2024
  countries:
  - GLOBAL
  outcome_dim:
  - energy
  - welfare_state
  policy_family:
  - institutional_reform
  treatment_tags:
  - heritage_ief
  - government_integrity
  - rent_seeking
  - income_region_robustness
intervention_channel: institutional
intervention_channel_justification: Heritage government integrity is used as a country-level policy-regime/institutional
  score, not as a dated discrete policy shock.
variables:
  outcome:
  - name: electricity_access
    source: world_bank_wdi:EG.ELC.ACCS.ZS
    transformation: latest_available_country_level_since_2018
  treatment:
  - name: government_integrity
    source: heritage_ief:ief_panel
    transformation: 2024_component_score:government_integrity
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: latest_available_since_2018_log
  - name: heritage_region_fixed_effects
    source: heritage_ief:ief_panel
    transformation: 2024_region_dummies
estimator:
  template: descriptive
  notes: 'Controlled cross-sectional OLS: outcome on standardized Heritage pillar score, log GDP per capita,
    and Heritage region fixed effects. This is still descriptive, but stricter than the first-wave top-vs-bottom
    gap.'
falsification:
  rule: SUPPORTED if the controlled standardized market-score coefficient has the pre-registered direction
    at p<=0.10. REFUTED if the opposite direction is significant at p<=0.10. Otherwise PARTIAL; insufficient
    controlled coverage is INCONCLUSIVE_DATA_PENDING.
  test: heritage_market_controlled_heritage_government_integrity_electricity_access_income_region_robustness
  threshold:
    p_value: 0.1
    expected_sign: +
    treatment_component: government_integrity
    tail_quantile: 0.25
    min_outcome_year: 2018
    market_score_year: 2024
    robustness_design: ols_income_region
    income_control_source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    region_fixed_effects: true
prior_confidence: 0.48
disclosure: This is a harder follow-up to a pro-market screen and is expected to downgrade many first-wave
  supports if income or region explain the association. It should be read as robustness triage, not causal
  proof.

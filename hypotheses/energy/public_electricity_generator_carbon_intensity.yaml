hypothesis_id: public_electricity_generator_carbon_intensity
version: 1
status: candidate
methodology_note: 'v1 promotion (2026-04-24). Sharpened the original generic falsification rule to a dispositive ratio test on fossil share of electricity: public-cohort (FRA, SWE) mean fossil share / private-cohort
  (GBR, USA, DEU, ITA, ESP, BEL, NLD) mean fossil share, averaged across 1985-1999. Operationalises the spec''s "carbon intensity 25% lower" claim as ratio <= 0.75. The spec''s preferred outcome (gCO2/kWh
  from IEA energy balances) requires an IEA fetcher that has not shipped; OWID-Ember share-electricity-fossil-fuels is the closest publisher-on-disk proxy. The 1970-1984 sub-window of the spec is structurally
  data-gapped (OWID-Ember begins 1985) and flagged in the verdict; testable window is 1985-1999 only. Causal attribution to public ownership remains contested per the spec''s own disclosure (resource endowments
  + postwar industrial planning).'
topic: energy
claim: Publicly owned electricity generators (EDF in France pre-privatisation, Vattenfall Sweden) achieved lower-carbon generation mixes than otherwise-matched privatised counterparts in the 1970s-1990s.
scope:

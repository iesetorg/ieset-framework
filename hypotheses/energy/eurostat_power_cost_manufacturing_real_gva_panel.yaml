# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: eurostat_power_cost_manufacturing_real_gva_panel
version: 1
status: candidate
topic: energy
claim_direction: "-"
claim: >
  Higher industrial electricity-price growth predicts weaker manufacturing real
  gross-value-added growth in European country panels, after controlling for
  aggregate real GDP growth and common year shocks.
methodology_note: >
  Data-hunt swarm spec promoted on 2026-05-21 from landed Eurostat electricity
  price, sectoral national accounts, and GDP panels.
evidence_type: associational
sample:
  countries: [AUT, BEL, BGR, CHE, CYP, CZE, DEU, DNK, ESP, EST, FIN, FRA, GBR, GRC, HRV, HUN, IRL, ISL, ITA, LTU, LUX, LVA, MLT, NLD, NOR, POL, PRT, ROU, SVK, SVN, SWE]
  period: [2008, 2025]
  temporal_structure: panel
  exclusion_rules:
    - drop non-country aggregates and country-years missing industrial prices or manufacturing GVA
variables:
  outcome:
    - name: manufacturing_real_gva_growth
      source: eurostat:nama_10_a10
      transformation: annual_pct_change
      notes: Manufacturing, B1G, chain-linked volume slice selected by the runner.
  treatment:
    - name: industrial_power_price_growth
      source: eurostat:nrg_pc_205
      transformation: annual_pct_change
      notes: Non-household electricity price, medium consumption band, EUR/kWh including taxes.
  controls:
    - name: real_gdp_growth
      source: eurostat:nama_10_gdp
      transformation: annual_pct_change
estimator:
  template: panel_fe
  fixed_effects: [country, year]
  clustering: country
  notes: >
    Two-way FE screen using Eurostat-only annual country panels. The generic
    runner filters Eurostat nrg_pc_205 and national-account slices before
    country-year aggregation.
falsification:
  rule: >
    SUPPORTED only if industrial_power_price_growth is negative at p<=0.10 with
    at least 250 observations and 20 countries. REFUTED if the coefficient is
    positive at p<=0.10.
  test: panel_fe_eurostat_power_cost_manufacturing_real_gva_panel
  threshold:
    coef_max: -0.05
    p_max: 0.10
    min_observations: 250
    min_countries: 20
prior_confidence: 0.56
disclosure: >
  The prior favours an energy-cost drag, but industrial composition and subsidy
  compensation may blunt the association.
steelman: hypotheses/steelman/eurostat_power_cost_manufacturing_real_gva_panel.md
scope:
  period: [2008, 2025]
  countries: [EU]
  outcome_dim: [energy, industrial_capability, productivity]
  policy_family: [energy_policy, industrial_policy]
  treatment_tags: [industrial_electricity_prices, manufacturing_gva, energy_cost_shock]
covers_claims: []
notes: >
  This sharpens the older electricity-price manufacturing-share screen by using
  real manufacturing GVA growth as the outcome.

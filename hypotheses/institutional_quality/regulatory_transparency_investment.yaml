# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: regulatory_transparency_investment
version: 1
status: candidate
topic: institutional_quality
claim: Lower administrative and regulatory burdens, stronger impact assessment, and more stakeholder
  engagement predict higher investment shares.
methodology_note: Promoted from the third long-horizon market/QOL candidate wave as a local-data first-pass
  screen. Upgraded on 2026-05-12 from generic WGI regulatory quality to direct OECD PMR regulatory-process
  measures before scoreboard conversion.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 2018
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - institutional_quality
  - capital_flows
  policy_family:
  - regulation
  - institutional_reform
  treatment_tags:
  - regulatory_transparency
  - investment
variables:
  outcome:
  - name: investment_share
    source: world_bank_wdi:NE.GDI.TOTL.ZS
    transformation: country-year level
  treatment:
  - name: pmr_administrative_regulatory_burden
    source: oecd_pmr:ADREG_BURDEN
    transformation: 0-6 score, higher means more restrictive
  - name: pmr_regulatory_impact_assessment
    source: oecd_pmr:IMPACT_ASSESSMENT
    transformation: 0-6 score, higher means more restrictive
  - name: pmr_stakeholder_engagement
    source: oecd_pmr:STAKEHOLDER_ENGAG
    transformation: 0-6 score, higher means more restrictive
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: trade_openness
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: percent of GDP
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Direct OECD PMR process-measure upgrade with WDI investment-share outcome. Uses 2018 and
    2023 PMR waves plus country/year FE; cross-sectional change specification checks whether lower
    2018 regulatory-process burden predicts 2018-2023 investment-share gains.
falsification:
  rule: SUPPORTED if the direct PMR regulatory-process burden index has a negative coefficient for
    investment share in the primary panel at p<0.10 and the 2018-2023 change check has the same sign.
    REFUTED if the panel coefficient is positive and significant at p<0.10. Otherwise PARTIAL.
  test: pmr_direct_regulatory_transparency_investment
  threshold:
    p_value: p<0.10
    expected_sign: '-'
prior_confidence: 0.55
disclosure: OECD PMR is available only for sparse benchmark waves, so this remains associational
  evidence even after the direct-measure upgrade.
steelman: hypotheses/steelman/regulatory_transparency_investment.md

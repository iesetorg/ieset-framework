# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: latam_bukele_imitation_effect_homicide_security_state
version: 1
status: candidate
topic: institutional_quality
claim: >
  Following El Salvador's perceived success with the régimen de excepción (March 2022 onward)
  and the homicide-rate collapse, multiple Latin American jurisdictions enacted Bukele-style
  emergency measures: Honduras (Estado de Excepción in select municipalities, December 2022),
  Ecuador (Estado de Excepción + designation of gangs as terrorist organisations, January 2024),
  Peru (Estado de Emergencia in Lima/Callao, 2023-). The pre-registered claim is that across
  the imitator countries (HND, ECU, PER), homicide rates decline measurably (>20% reduction
  vs pre-treatment 3-year average) within 24 months of declaration AND that institutional
  quality (WGI rule of law, V-Dem judicial independence, Freedom House score) deteriorates
  by at least 0.10 SD over the same window — the rule-of-law cost of the security
  intervention. The cross-country DiD tests whether the Bukele model generalises beyond SLV
  with consistent benefit-and-cost magnitudes.
notes: >
  This is the canonical generalisation test. SLV is the original treated unit (excluded from
  the imitator panel as the trend-setter); HND, ECU, PER are the imitator units. Donor pool
  comprises non-imitating LatAm states (CRI, GTM, MEX, COL, BRA, CHL, ARG, URY) where the
  homicide-channel intervention is absent or much milder. The hypothesis's two-way test
  (homicide benefit AND rule-of-law cost) prevents a one-sided framing.
prior_confidence: 0.55
disclosure: >
  Author has split priors: high prior on the homicide-channel benefit (the SLV-Honduras-Ecuador
  empirical pattern is consistent across observers), moderate prior on the rule-of-law-cost
  channel (V-Dem and Freedom House data pickup is slow and has measurement noise). The 0.55
  reflects the joint probability that BOTH channels show pre-registered magnitudes; either
  channel alone is more likely to be supported.
evidence_type: causal
sample:
  countries: [HND, ECU, PER, CRI, GTM, MEX, COL, BRA, CHL, ARG, URY]
  period: [2015, 2026]
  temporal_structure: panel
  exclusion_rules:
    - "exclude SLV (the trend-setter) from imitator-or-control panel; documented separately"
    - "exclude Nicaragua (rule-of-law collapse confound)"
    - "exclude Venezuela (data unreliable, regime confound)"
scope:
  period: [2015, 2026]
  countries: [HND, ECU, PER, CRI, GTM, MEX, COL, BRA, CHL, ARG, URY]
  outcome_dim: [institutional_quality, gdp_growth]
  policy_family: [institutional_reform, regulation]
  treatment_tags: [bukele_imitation_2022_2024, honduras_estado_excepcion_2022, ecuador_estado_excepcion_2024, peru_estado_emergencia_2023]
variables:
  outcome:
    - name: homicide_rate_log
      source: unodc:intentional_homicide; owid:homicide-rate-unodc
      transformation: log_level
    - name: wgi_rule_of_law
      source: wgi:GOV_WGI_RL.EST
      transformation: level
    - name: vdem_judicial_independence
      source: vdem:v2juhcind; vdem:v2juncind
      transformation: level
    - name: freedom_house_civil_liberties
      source: freedom_house:cl_score
      transformation: level
  treatment:
    - name: bukele_imitation_indicator
      source: "constructed: country-specific binary; HND from 2022-12, ECU from 2024-01, PER from 2023-Q1; 0 otherwise"
      transformation: country_specific_binary
  controls:
    - name: pre_treatment_homicide_level
      source: unodc:intentional_homicide
      transformation: pre_treatment_5yr_avg
    - name: us_policy_rate
      source: fred:FEDFUNDS
      transformation: level
    - name: commodity_terms_of_trade
      source: world_bank_wdi:TT.PRI.MRCH.XD.WD
      transformation: log_change
    - name: gdp_per_capita_log
      source: world_bank_wdi:NY.GDP.PCAP.PP.KD
      transformation: log_level
intervention_channel: institutional
intervention_channel_justification: >
  Estado-de-excepción / state-of-emergency declarations are institutional-channel interventions
  (constitutional-order suspension, mass-incarceration capability, suspension of due-process
  protections). Coded as "institutional" per axes.yaml.
estimator:
  template: did_callaway_santanna
  clustering: country
  notes: >
    Primary: Callaway-Sant'Anna staggered-adoption DiD with HND, ECU, PER as treated cohorts
    (different start dates) and the never-treated LatAm donor pool as control. Outcomes
    estimated separately: (a) log_homicide_rate, (b) WGI rule of law, (c) V-Dem judicial
    independence. Secondary: synth_did per treated unit individually with the donor pool.
    Tertiary: cross-channel correlation — does a larger homicide reduction co-occur with a
    larger rule-of-law decline?
falsification:
  rule: >
    Two-channel pre-registered test:
    BENEFIT-CHANNEL: refuted if pooled imitator-cohort ATT on log_homicide_rate at 24 months
    post-treatment is greater than -0.20 (less than 20% reduction).
    COST-CHANNEL: refuted if pooled imitator-cohort ATT on combined institutional-quality
    index (z-score average of WGI rule-of-law + V-Dem judicial independence + FH civil
    liberties) at 24 months is less negative than -0.10 SD.
    Joint hypothesis (Bukele-model-generalises-with-bundled-cost): supported only if BOTH
    channels meet their thresholds. Mixed outcomes (one channel only) are reported separately.
  test: callaway_santanna_did_two_channel_imitator_cohort
  threshold: "homicide_log_ATT_24m <= -0.20 AND institutional_quality_ATT_24m <= -0.10 SD"
steelman: hypotheses/steelman/latam_bukele_imitation_effect_homicide_security_state.md
linked_hypotheses:
  - bukele_mass_incarceration_homicide_impact_2019_2024
  - bukele_phase2_post_2024_authoritarian_growth_premium

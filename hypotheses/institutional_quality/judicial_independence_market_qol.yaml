# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: judicial_independence_market_qol
version: 1
status: candidate
topic: institutional_quality
claim: Stronger rule-of-law proxies strengthen quality-of-life and income outcomes under market institutions.
methodology_note: Promoted from the fourth long-horizon market/QOL candidate wave as a local-data first-pass
  screen.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - institutional_quality
  - gdp_growth
  policy_family:
  - institutional_reform
  - regulation
  treatment_tags:
  - judicial_independence
  - market_qol
variables:
  outcome:
  - name: qol_or_prosperity_outcome
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: level_or_growth_proxy
  treatment:
  - name: market_or_intervention_proxy
    source: wgi:RL.EST
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local-data first-pass TWFE screen; upgrade to exact treatment/outcome datasets before scoreboard
    promotion.
falsification:
  rule: SUPPORTED if the treatment coefficient has the pre-registered sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_judicial_independence_market_qol
  threshold:
    p_value: p<0.10
    expected_sign: +
prior_confidence: 0.55
disclosure: These are proxy-first QOL screens. They are intended to identify promising evidence, not to
  settle causal claims without robustness checks.
steelman: hypotheses/steelman/judicial_independence_market_qol.md
covers_claims:
- position_id: institutionalism
  claim_index: 129
  polarity: aligned
  school_prediction: mixed
  confidence: medium
  notes: "2026-05-04 tested-floor neutral coverage wave; axis-overlap selection from already public-tested hypotheses, independent of observed score effects. Added as `mixed` conditional claims so coverage balance improves without changing directional net scores. Axis: institutional.rule_of_law. Institutional economics has an explicit stake in rule-of-law, state capacity, complementary institutions, and path-dependent development."

  - retain common shocks and absorb them with year effects where the estimator is
    a panel FE
variables:
  outcome:
  - name: fwd_fdi_gdp_3y_avg
    source: local pinned vintage panel
    transformation: Supported if beta(regulatory_quality) >= 0.25 pp of GDP with p
      <= 0.10, and the top-minus-bottom RQ-tercile raw mean difference is >= 1.0 pp
      of GDP, with at least 800 observations and 40 countries.
  treatment:
  - name: regulatory_quality
    source: local pinned vintage panel
    transformation: as predeclared in threshold
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Generated Worker C first-tranche local-data panel verdict.
falsification:
  rule: Supported if beta(regulatory_quality) >= 0.25 pp of GDP with p <= 0.10, and
    the top-minus-bottom RQ-tercile raw mean difference is >= 1.0 pp of GDP, with
    at least 800 observations and 40 countries.
  test: wgi_regulatory_quality_fdi_growth_panel
  threshold:
    coef_min: 0.25
    p_max: 0.1
    raw_min: 1.0
    min_observations: 800
    min_countries: 40
prior_confidence: 0.57
disclosure: This is a compact first-tranche screen. It predeclares magnitude and coverage
  gates before reading the emitted verdict, but it is not a causal natural experiment.

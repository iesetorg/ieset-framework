# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: market_order_control_corruption_gdp_pc_growth_panel
version: 1
status: pre_registered
topic: institutional_quality
claim: Across a pre-registered panel of OECD and major emerging-market economies from 1996 to 2023, stronger control
  of corruption predict faster real GDP per capita growth after country and year fixed effects and basic macro controls.
  This tests the rent-seeking and rule-bound-competition channels without using the Heritage latest-year cross-section
  as the treatment.
methodology_note: Second-stage market-order pre-registration generated from a prior candidate-screen queue. The
  Heritage screen is used only for triage; this spec is registered before estimation and uses time-varying WGI,
  Fraser EFW, or WDI panel measures rather than Heritage latest-year scores.
evidence_type: associational
sample:
  countries:
  - ARG
  - AUS
  - AUT
  - BEL
  - BRA
  - CAN
  - CHE
  - CHL
  - CHN
  - COL
  - CRI
  - CZE
  - DEU
  - DNK
  - EGY
  - ESP
  - EST
  - FIN
  - FRA
  - GBR
  - GHA
  - GRC
  - HUN
  - IDN
  - IND
  - IRL
  - ISR
  - ITA
  - JPN
  - KEN
  - KOR
  - LTU
  - LVA
  - MAR
  - MEX
  - MYS
  - NGA
  - NLD
  - NOR
  - NZL
  - PER
  - PHL
  - POL
  - PRT
  - SGP
  - SVK
  - SVN
  - SWE
  - THA
  - TUR
  - URY
  - USA
  - ZAF
  period:
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing the outcome, treatment, or retained controls
  - do not impute treatment values across countries
  - treat this as associational evidence unless a later event-study or DiD design is registered
scope:
  period:
  - 1996
  - 2023
  countries:
  - OECD
  - GLOBAL
  outcome_dim:
  - gdp_growth
  - productivity
  policy_family:
  - institutional_reform
  - regulation
  treatment_tags:
  - control_of_corruption
  - rent_seeking
  - rule_bound_governance
variables:
  outcome:
  - name: gdp_pc_growth
    source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
    transformation: level
    notes: annual real GDP per capita growth
  treatment:
  - name: control_corruption_wgi
    source: wgi:CC.EST
    transformation: level
    notes: WGI control of corruption
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control to reduce short-run development-level bias.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
  - name: trade_openness_control
    source: world_bank_wdi:NE.TRD.GNFS.ZS
    transformation: level
    notes: Openness control except when openness is the treatment.
  - name: government_consumption_share
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
    notes: Fiscal-demand control; omitted when fiscal size is the treatment.
intervention_channel: institutional
intervention_channel_justification: The treatment operationalizes WGI control of corruption as a time-varying policy
  or institutional channel, not a contemporaneous outcome cherry-pick.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Primary test is two-way fixed effects with country-clustered standard errors. The first public verdict
    should not be treated as causal; it is the registered panel hurdle before any scoreboard interpretation.
falsification:
  rule: SUPPORTED if the coefficient on control_corruption_wgi is positively signed at p<0.10 with at least 30 usable
    observations after listwise deletion. REFUTED if the coefficient is significantly opposite-signed at p<0.10.
    Otherwise PARTIAL.
  test: panel_fe_market_order_control_corruption_gdp_pc_growth_panel
  threshold:
    expected_sign: +
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.64
disclosure: The author is actively testing market-liberal and Austrian/ordoliberal claims, so favorable selection
  risk is real. This spec counters that risk by recording the claim, sample, variables, direction, and position
  links before the run; null or contrary results count.
steelman: hypotheses/steelman/market_order_control_corruption_gdp_pc_growth_panel.md
covers_claims:
- position_id: ordoliberal
  claim_index: 100
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: Pre-run coverage declaration for the 2026-05-03 market-order prereg wave; position claim and hypothesis

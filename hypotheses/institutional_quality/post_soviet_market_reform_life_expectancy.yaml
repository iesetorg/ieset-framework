steelman: hypotheses/steelman/post_soviet_market_reform_life_expectancy.md

linked_hypotheses: []

notes: >
  Fast-reformer set based on EBRD reform-index rankings 1991-1998. Poland
  = shock therapy 1990 (Balcerowicz Plan). Estonia = radical liberalisation
  1992 onward. Czech = Klaus reforms 1991-1992. These are the canonical
  fast-reformer cases.

  Slow-reformer set = countries that retained large SOE sectors, maintained
  price controls longer, had delayed privatisation, or (Belarus) explicitly
  rejected neoliberal reform. Russia classified as slow-reformer despite
  1992 shock therapy, because the reform was chaotic and combined with
  fiscal collapse; mortality data supports this placement.

  2020-2023 dropped due to COVID mortality confound hitting different
  countries at different times/magnitudes.

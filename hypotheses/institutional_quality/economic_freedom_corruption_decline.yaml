# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: economic_freedom_corruption_decline
version: 1
status: candidate
topic: institutional_quality
claim: Rule-bound market-compatible institutions predict lower political corruption where legal constraints
  reduce discretionary exchange.
covers_claims:
- position_id: classical_liberal
  claim_index: 167
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-13 throughput graduation wave; reciprocal link for direct-measure decisive verdict.
- position_id: ordoliberal
  claim_index: 151
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-13 throughput graduation wave; reciprocal link for direct-measure decisive verdict.
- position_id: institutionalism
  claim_index: 133
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-13 throughput graduation wave; reciprocal link for direct-measure decisive verdict.
- position_id: empirical_pragmatist
  claim_index: 132
  polarity: aligned
  school_prediction: supported
  notes: 2026-05-13 throughput graduation wave; reciprocal link for direct-measure decisive verdict.
methodology_note: Promoted from the 200-item long-horizon market/QOL backlog as a local-data first-pass
  screen. Upgraded on 2026-05-12 from a duplicated WGI regulatory-quality/control-of-corruption panel
  to a direct V-Dem corruption and rule-of-law panel before scoreboard conversion.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - institutional_quality
  policy_family:
  - institutional_reform
  - regulation
  treatment_tags:
  - economic_freedom
  - corruption_decline
variables:
  outcome:
  - name: control_of_corruption_vdem
    source: vdem:v2x_corr
    transformation: 1 - political corruption index, higher means less corruption
  treatment:
  - name: rule_of_law_vdem
    source: vdem:v2xcl_rol
    transformation: level, higher means stronger rule of law
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Direct V-Dem institutional-quality upgrade with country and year fixed effects. Robustness
    checks repeat the sign test with public-sector corruption, executive corruption, and clientelism
    outcomes transformed so higher values mean less corruption/clientelism.
falsification:
  rule: SUPPORTED if V-Dem rule of law positively predicts the transformed V-Dem control-of-corruption
    outcome at p<0.10 and at least two of three robustness outcomes have the same sign. REFUTED if
    the primary coefficient is negative and significant at p<0.10. Otherwise PARTIAL.
  test: vdem_rule_of_law_corruption_panel
  threshold:
    p_value: p<0.10
    expected_sign: +
prior_confidence: 0.55
disclosure: This is a direct institutional association, not a causal design. V-Dem corruption and
  rule-of-law measures are expert-coded and may share source-method bias.
steelman: hypotheses/steelman/economic_freedom_corruption_decline.md

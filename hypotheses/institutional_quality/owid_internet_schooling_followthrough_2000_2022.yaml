variables:
  outcome:
  - name: mean_years_schooling
    source: owid:mean-years-of-schooling-long-run
    transformation: endpoint years gained
  treatment:
  - name: internet_use_gain
    source: owid:share-of-individuals-using-the-internet
    transformation: country selected if endpoint gain >= 40pp
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=50, at least 65% of large-internet-gain countries add >=1 average
    year of schooling, and the median gain is >=1 year. REFUTED if fewer than 45% pass or
    the median gain is <0.25 years. Otherwise PARTIAL.
  test: owid_internet_schooling_followthrough_2000_2022
  threshold: n >= 50 AND pass_rate >= 0.65 AND median_schooling_gain_years >= 1
prior_confidence: 0.63
disclosure: The prior expects digital diffusion to correlate with institutional and educational
  capacity, but internet adoption can leapfrog formal schooling or arrive after schooling
  gains.

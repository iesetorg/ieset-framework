# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: uae_freezone_institutional_quality_wgi_1996_2024
version: 1
status: pre_registered
topic: institutional_quality
claim: The UAE's free-zone, commercial-court, and state-capacity model is visible in relatively
  high government effectiveness, regulatory quality, rule-of-law, and market-rule scores compared
  with many resource-rent peers.
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - ARE
  - SAU
  - KWT
  - QAT
  - OMN
  - BHR
  period:
  - 1996
  - 2024
  temporal_structure: panel
canonical_metrics:
- metric_id: government_effectiveness_mean
  description: Government effectiveness averaged high
  threshold: '>= 0.90'
  window: 1996-2024
  source: wgi:GE.EST
  direction: supports_claim
  independence_justification: Administrative capacity pillar.
- metric_id: regulatory_quality_mean
  description: Regulatory quality averaged high
  threshold: '>= 0.75'
  window: 1996-2024
  source: wgi:RQ.EST
  direction: supports_claim
  independence_justification: Regulatory quality pillar separate from GE.
- metric_id: rule_of_law_mean
  description: Rule of law averaged above moderate threshold
  threshold: '>= 0.60'
  window: 1996-2024
  source: wgi:RL.EST
  direction: supports_claim
  independence_justification: Legal-quality pillar.
- metric_id: efw_summary_2023
  description: Market-rule composite reached high score
  threshold: '>= 7.0'
  window: '2023'
  source: fraser_efw:summary_index
  direction: supports_claim
  independence_justification: External institutional composite independent from WGI.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
variables:
  outcome:
  - name: government_effectiveness
    source: wgi:GE.EST
    transformation: annual_mean
  - name: regulatory_quality
    source: wgi:RQ.EST
    transformation: annual_mean
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: annual_mean
  - name: efw_summary_index
    source: fraser_efw:summary_index
    transformation: endpoint_level
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Custom Singapore/UAE case checklist using local WDI, WGI, and Fraser EFW vintages.
falsification:
  rule: SUPPORTED if at least 3 of 4 pre-registered metrics meet their thresholds. REFUTED if
    at most 1 metrics meet after available data are evaluated. Otherwise PARTIAL or INCONCLUSIVE_DATA_PENDING.
  test: uae_freezone_institutional_quality_wgi_1996_2024_local_multimetric_checklist
  threshold: MET >= 3 of 4; REFUTE when MET <= 1
prior_confidence: 0.68
disclosure: Prior expects support but this is a narrow business-institution quality claim, not
  a democracy or civil-liberties score.
steelman: hypotheses/steelman/uae_freezone_institutional_quality_wgi_1996_2024.md
scope:
  period:
  - 1996
  - 2024
  countries:
  - ARE
  - SAU
  - KWT
  - QAT
  - OMN
  - BHR
  outcome_dim:
  - institutional_quality
  - capital_flows
  policy_family:
  - institutional_reform
  - regulation
  - trade_policy
  treatment_tags:
  - difc_2004
  - adgm_common_law
  - freezone_legal_architecture
notes: Institutional-quality case deliberately separates administrative/regulatory strength from
  political-system evaluation.
covers_claims:
- position_id: classical_liberal
  claim_index: 196
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-19 four-lever unlock pass; free-zone legal-infrastructure mapping.
- position_id: developmentalism
  claim_index: 153
  polarity: aligned
  school_prediction: supported
  confidence: medium
  notes: 2026-05-19 four-lever unlock pass; strategic state-capacity/free-zone institution mapping.
- position_id: institutionalism
  claim_index: 144
  polarity: aligned
  school_prediction: supported
  confidence: medium

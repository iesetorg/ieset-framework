# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: efw_oecd_panel_property_rights_manufacturing_share_20260503
version: 1
status: pre_registered
topic: institutional_quality
claim: Across a narrower pre-registered OECD and market-economy peer panel from 1970 to 2023, stronger legal-system
  and property-rights scores predict higher manufacturing value-added shares after country and year fixed effects
  plus lean income and demographic controls. This is a hypothesis-only screen and does not create school-scoreboard
  links.
methodology_note: Lean EFW panel wave using local Fraser EFW and WDI vintages. This wave deliberately uses fewer
  countries and fewer controls than the broad market panel to reduce preventable listwise-deletion failures; the
  sample, variables, expected direction, and threshold are registered before estimation.
evidence_type: associational
sample:
  countries:
  - AUS
  - AUT
  - BEL
  - CAN
  - CHE
  - CHL
  - COL
  - CRI
  - CZE
  - DEU
  - DNK
  - ESP
  - EST
  - FIN
  - FRA
  - GBR
  - GRC
  - HUN
  - IRL
  - ISR
  - ITA
  - JPN
  - KOR
  - LTU
  - LVA
  - MEX
  - NLD
  - NOR
  - NZL
  - POL
  - PRT
  - ROU
  - SGP
  - SVK
  - SVN
  - SWE
  - TUR
  - URY
  - USA
  - ZAF
  period:
  - 1970
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years missing outcome, treatment, or retained controls
  - do not impute treatment values across countries
  - treat as associational evidence unless a later causal/event design is registered
scope:
  period:
  - 1970
  - 2023
  countries:
  - OECD
  - GLOBAL
  outcome_dim:
  - industrial_capability
  - productivity
  policy_family:
  - institutional_reform
  - regulation
  treatment_tags:
  - property_rights
  - rule_of_law
  - contract_enforcement
variables:
  outcome:
  - name: manufacturing_share
    source: world_bank_wdi:NV.IND.MANF.ZS
    transformation: level
    notes: manufacturing value added as a share of GDP
  treatment:
  - name: efw_legal_system_property_rights_score
    source: fraser_efw:legal_system_property_rights
    transformation: level
    notes: Fraser EFW legal-system and property-rights score
  controls:
  - name: log_gdp_pc_ppp
    source: world_bank_wdi:NY.GDP.PCAP.PP.KD
    transformation: log
    notes: Income-level control.
  - name: population_growth
    source: world_bank_wdi:SP.POP.GROW
    transformation: level
    notes: Demographic pressure control.
intervention_channel: institutional
intervention_channel_justification: The treatment uses Fraser EFW legal-system and property-rights score as a time-varying
  policy/institutional proxy, not a movement label or ex-post outcome screen.
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Two-way fixed effects with country-clustered standard errors.
falsification:
  rule: SUPPORTED if the coefficient on efw_legal_system_property_rights_score is positively signed at p<0.10 with
    at least 30 usable observations after listwise deletion. REFUTED if the coefficient is significantly opposite-signed
    at p<0.10. Otherwise PARTIAL.
  test: panel_fe_efw_oecd_panel_property_rights_manufacturing_share_20260503
  threshold:
    expected_sign: +
    p_max: 0.1
    min_observations: 30
prior_confidence: 0.59
disclosure: The design prioritizes throughput but preserves preregistration. Supported results are broad associational
  screens; null and contrary results count against the registered proxy.
steelman: hypotheses/steelman/efw_oecd_panel_property_rights_manufacturing_share_20260503.md
notes: Hypothesis-only lean EFW/OECD-market panel test; no school-scoreboard linkage is asserted.

# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: property_rights_long_run_income_frontier_v2
version: 1
status: candidate
topic: institutional_quality
claim: >
  In a 1996-2018 Maddison/WGI cross-section, countries with stronger rule of
  law should show higher mean annual GDP-per-capita growth after controlling
  for initial income if the property-rights growth channel is strong in
  between-country variation.
methodology_note: >
  Robustness v2 for `property_rights_long_run_income_frontier`. This version
  tests a country-mean cross-section rather than the v1 TWFE panel, using WGI
  Rule of Law as the locally available property-rights proxy.
evidence_type: associational
sample:
  countries: [USA, GBR, CAN, AUS, NZL, DEU, FRA, ITA, ESP, NLD, SWE, JPN, KOR, CHN, IND, BRA, MEX, CHL, TUR, ZAF, POL, EST]
  period: [1996, 2018]
  temporal_structure: cross_section_with_justification
  exclusion_rules:
  - require WGI Rule of Law and Maddison GDP-per-capita coverage
variables:
  outcome:
  - name: mean_annual_gdp_pc_growth
    source: maddison:rgdpnapc
    transformation: mean_annual_log_growth_1996_2018
  treatment:
  - name: mean_rule_of_law
    source: wgi:RL.EST
    transformation: country_mean_1996_2018
  controls:
  - name: log_initial_gdp_pc
    source: maddison:rgdpnapc
    transformation: log_level_1996
estimator:
  template: descriptive
  clustering: none
  notes: >
    Bespoke HC3 OLS cross-section in
    `engine/runs/property_rights_long_run_income_frontier_v2/replication.py`.
falsification:
  rule: >
    SUPPORTED if the coefficient on mean Rule of Law is positive and
    statistically significant at p<0.10 after controlling for initial GDP per
    capita. REFUTED if the coefficient is negative and significant. Otherwise
    PARTIAL.
  test: maddison_wgi_rule_of_law_cross_section_1996_2018
  threshold:
    p_max: 0.10
    coefficient_direction: positive
prior_confidence: 0.55
disclosure: >
  The cross-section is a demanding robustness check because institutional
  levels are highly correlated with initial income and geography. Weak
  between-country results should be read as partial evidence, not as a clean
  rejection of within-country institutional improvement effects.
steelman: hypotheses/steelman/property_rights_long_run_income_frontier_v2.md
scope:
  period: [1996, 2018]
  countries: [GLOBAL]
  outcome_dim: [gdp_growth, institutional_quality, productivity]
  policy_family: [institutional_reform, fiscal_policy]
  treatment_tags: [property_rights, rule_of_law, state_investment, smithian_growth, maddison_v2]


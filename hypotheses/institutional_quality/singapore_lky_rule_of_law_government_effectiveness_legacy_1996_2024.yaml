# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: singapore_lky_rule_of_law_government_effectiveness_legacy_1996_2024
version: 1
status: pre_registered
topic: institutional_quality
claim: 'Singapore''s post-LKY institutional legacy is visible in WGI data: control of corruption,
  government effectiveness, and rule of law remain near the top of the regional peer set from
  1996 to 2024. This is a legacy pattern, not a direct causal test of Lee Kuan Yew''s premiership.'
evidence_type: canonical_case_multi_metric
sample:
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  period:
  - 1996
  - 2024
  temporal_structure: panel
canonical_metrics:
- metric_id: control_corruption_mean
  description: Control of corruption mean is very high
  threshold: '>= 1.75'
  window: 1996-2024
  source: wgi:CC.EST
  direction: supports_claim
  independence_justification: Corruption-control pillar distinct from administrative effectiveness.
- metric_id: government_effectiveness_mean
  description: Government effectiveness mean is very high
  threshold: '>= 2.00'
  window: 1996-2024
  source: wgi:GE.EST
  direction: supports_claim
  independence_justification: Administrative effectiveness pillar distinct from legal-rule pillar.
- metric_id: rule_of_law_mean
  description: Rule of law mean remains high
  threshold: '>= 1.25'
  window: 1996-2024
  source: wgi:RL.EST
  direction: supports_claim
  independence_justification: Rule of law pillar distinct from corruption and GE.
- metric_id: corruption_control_peer_gap_2024
  description: 2024 corruption control exceeds regional peer median by a large margin
  threshold: '>= 1.0 point above peer median'
  window: '2024'
  source: wgi:CC.EST
  direction: supports_claim
  independence_justification: Peer-gap check prevents absolute-threshold-only grading.
multi_metric_falsification:
  total_metrics: 4
  support_threshold: 3
  refute_threshold: 1
variables:
  outcome:
  - name: control_of_corruption
    source: wgi:CC.EST
    transformation: annual_mean
  - name: government_effectiveness
    source: wgi:GE.EST
    transformation: annual_mean
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: annual_mean
estimator:
  template: multi_metric_checklist
  clustering: none
  notes: Custom Lee Kuan Yew / Singapore checklist using local WDI, WGI, PWT, and Fraser EFW vintages.
falsification:
  rule: SUPPORTED if at least 3 of 4 pre-registered metrics meet their thresholds. REFUTED if
    at most 1 metrics meet after available data are evaluated. Otherwise PARTIAL or INCONCLUSIVE_DATA_PENDING.
  test: singapore_lky_rule_of_law_government_effectiveness_legacy_1996_2024_local_multimetric_checklist
  threshold: MET >= 3 of 4; REFUTE when MET <= 1
prior_confidence: 0.86
disclosure: Prior is high, but WGI starts after Lee stepped down as prime minister; the spec is
  explicitly legacy-pattern evidence.
steelman: hypotheses/steelman/singapore_lky_rule_of_law_government_effectiveness_legacy_1996_2024.md
scope:
  period:
  - 1996
  - 2024
  countries:
  - SGP
  - HKG
  - KOR
  - MYS
  - THA
  - IDN
  - PHL
  outcome_dim:
  - institutional_quality
  policy_family:
  - institutional_reform
  treatment_tags:
  - prevention_of_corruption_act_1960
  - cpib_anti_corruption
  - lky_institutional_legacy
notes: Legacy pattern only; direct LKY-era corruption data remains a data need.

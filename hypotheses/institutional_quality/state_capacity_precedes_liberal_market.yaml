# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: state_capacity_precedes_liberal_market
version: 1
status: candidate
topic: institutional_quality
claim: >
  State capacity (proxied by government effectiveness, rule of law, and fiscal
  extraction) is a prerequisite for effective liberal market policy. Countries
  with stronger early state capacity experience larger growth premiums from
  subsequent market-opening reforms than countries with weak state capacity.
  The test uses a temporal sequencing design: state-capacity proxies measured
  in an early window (1996-2005) are used to predict the growth premium from
  trade openness in a later window (2005-2019).
evidence_type: associational
sample:
  countries: [USA, GBR, CAN, AUS, NZL, DEU, FRA, ITA, ESP, NLD, SWE, JPN, KOR, CHN, IND, BRA, MEX, CHL, TUR, ZAF, POL, EST]
  period: [1996, 2019]
  temporal_structure: panel
  exclusion_rules:
    - exclude countries with major civil conflict during either window
    - require at least 5 observations in each window
variables:
  outcome:
    - name: gdp_per_capita_growth
      source: world_bank_wdi:NY.GDP.PCAP.KD.ZG
      transformation: mean_over_window
      notes: Mean annual GDP per capita growth over the later window.
  treatment:
    - name: early_state_capacity
      source: wgi:GOV_WGI_GE.EST
      transformation: mean_1996_2005
      notes: Government effectiveness as state-capacity proxy.
    - name: later_trade_openness
      source: world_bank_wdi:NE.TRD.GNFS.ZS
      transformation: mean_2005_2019
      notes: Trade openness as market-liberal proxy.
  controls:
    - name: initial_income
      source: world_bank_wdi:NY.GDP.PCAP.KD
      transformation: log_2005_level
    - name: human_capital
      source: pwt:hc
      transformation: level
estimator:
  template: descriptive
  notes: Cross-sectional interaction of early state capacity and later trade openness on growth.
falsification:
  rule: >
    SUPPORTED if high-GE countries show a significantly stronger trade-openness
    growth premium than low-GE countries. REFUTED if the premium is reversed or
    near-zero across both groups. Otherwise PARTIAL.
  test: state_capacity_trade_openness_interaction
  threshold:
    supported: high_GE_trade_premium > low_GE_trade_premium + 0.005
    refuted: high_GE_trade_premium <= 0 and low_GE_trade_premium <= 0
prior_confidence: 0.55
disclosure: >
  The hypothesis challenges naive laissez-faire by documenting that market
  reforms work better when state capacity is already in place. It is symmetric:
  if state capacity does not predict the trade premium, the prerequisite claim
  is weakened.
steelman: hypotheses/steelman/state_capacity_precedes_liberal_market.md
scope:
  period: [1996, 2019]
  countries: [GLOBAL]
  outcome_dim: [gdp_growth, institutional_quality, trade_liberalisation]
  policy_family: [institutional_reform, trade_policy]
  treatment_tags: [state_capacity, trade_liberalisation, institutional_preconditions]
linked_hypotheses:
  - market_reform_without_state_capacity_failure
  - shock_therapy_institutional_preconditions_conditionality
notes: >
  Data readiness:
  - WGI GOV_WGI_GE.EST (ready from 1996)
  - WDI NY.GDP.PCAP.KD.ZG, NE.TRD.GNFS.ZS (ready)
  - PWT hc (ready)


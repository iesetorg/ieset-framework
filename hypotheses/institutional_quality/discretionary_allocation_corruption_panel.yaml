# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: discretionary_allocation_corruption_panel
version: 1
status: candidate
topic: institutional_quality
claim: Higher discretionary state-allocation burden proxies predict lower control-of-corruption scores.
methodology_note: Promoted from the second 30-item long-horizon market/QOL candidate queue as a local-data
  first-pass screen.
evidence_type: associational
sample:
  countries:
  - USA
  - GBR
  - CAN
  - AUS
  - NZL
  - DEU
  - FRA
  - ITA
  - ESP
  - NLD
  - SWE
  - NOR
  - DNK
  - FIN
  - JPN
  - KOR
  - CHN
  - IND
  - BRA
  - MEX
  - CHL
  - ARG
  - TUR
  - ZAF
  - POL
  - EST
  - VNM
  - THA
  - MYS
  - IDN
  - COL
  - PER
  - PHL
  - EGY
  - MAR
  - KEN
  - NGA
  - BGD
  - PAK
  - LKA
  period: &id001
  - 1996
  - 2023
  temporal_structure: panel
  exclusion_rules:
  - drop country-years with missing primary outcome or treatment proxy
scope:
  period: *id001
  countries:
  - GLOBAL
  outcome_dim:
  - institutional_quality
  - fiscal_policy
  policy_family:
  - fiscal_policy
  - institutional_reform
  treatment_tags:
  - discretionary_allocation
  - corruption
variables:
  outcome:
  - name: qol_or_prosperity_outcome
    source: wgi:CC.EST
    transformation: level_or_growth_proxy
  treatment:
  - name: market_or_intervention_proxy
    source: world_bank_wdi:NE.CON.GOVT.ZS
    transformation: level
  controls:
  - name: log_gdp_pc
    source: world_bank_wdi:NY.GDP.PCAP.KD
    transformation: log
  - name: rule_of_law
    source: wgi:RL.EST
    transformation: level
estimator:
  template: panel_fe
  fixed_effects:
  - country
  - year
  clustering: country
  notes: Local-data first-pass TWFE screen; upgrade to exact treatment/outcome datasets before scoreboard
    promotion.
falsification:
  rule: SUPPORTED if the treatment coefficient has the pre-registered sign at p<0.10. REFUTED if the opposite
    sign is significant at p<0.10. Otherwise PARTIAL.
  test: panel_fe_discretionary_allocation_corruption_panel
  threshold:
    p_value: p<0.10
    expected_sign: '-'
prior_confidence: 0.55
disclosure: These are proxy-first QOL screens. They are intended to identify promising evidence, not to
  settle causal claims without robustness checks.
steelman: hypotheses/steelman/discretionary_allocation_corruption_panel.md

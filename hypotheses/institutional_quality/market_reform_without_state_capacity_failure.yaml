# yaml-language-server: $schema=../../schemas/hypothesis.schema.json
hypothesis_id: market_reform_without_state_capacity_failure
version: 1
status: candidate
topic: institutional_quality
claim: >-
  Market-oriented reforms (trade liberalisation, privatisation, price decontrol) implemented
  in countries with weak state capacity (low WGI government effectiveness, low tax revenue
  as % of GDP, weak contract enforcement) fail to produce sustained long-run prosperity
  compared to similar reforms in high-capacity settings. The claim is a boundary test:
  it protects against naive laissez-faire claims by requiring minimum state capacity as a
  precondition for market-reform success, over 1980-2020.
evidence_type: associational
sample:
  countries:
  - BRA
  - MEX
  - ARG
  - CHL
  - PER
  - COL
  - VEN
  - BOL
  - ECU
  - RUS
  - UKR
  - BLR
  - KAZ
  - POL
  - HUN
  - CZE
  - SVK
  - ROU
  - BGR
  - ALB
  - ZAF
  - NGA
  - KEN
  - TZA
  - GHA
  - ETH
  - IDN
  - PHL
  - VNM
  - IND
  - CHN
  - THA
  - MYS
  - TUR
  - EGY
  - MAR
  - DZA
  - TUN
  period:
  - 1980
  - 2020
  temporal_structure: panel
  exclusion_rules:
  - exclude episodes coinciding with major armed conflict (UCDP >1000 battle deaths)
  - exclude micro-states with population <2 million
  - require at least 10 years of post-reform data for inclusion
scope:

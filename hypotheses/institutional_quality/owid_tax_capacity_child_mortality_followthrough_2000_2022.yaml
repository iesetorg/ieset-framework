variables:
  outcome:
  - name: child_mortality_decline
    source: owid:child-mortality-around-the-world
    transformation: endpoint percent decline
  treatment:
  - name: tax_revenue_gain
    source: owid:tax-revenues-as-a-share-of-gdp
    transformation: country selected if endpoint gain >= 3pp of GDP
estimator:
  template: descriptive
  clustering: none
  notes: Custom endpoint/mean panel replication using local WDI/OWID vintages and fixed country-selection
    thresholds.
falsification:
  rule: SUPPORTED if n>=30, at least 75% of tax-gain countries reduce child mortality by >=30%,
    and the median decline is >=45%. REFUTED if fewer than 50% pass or the median decline
    is <20%. Otherwise PARTIAL.
  test: owid_tax_capacity_child_mortality_followthrough_2000_2022
  threshold: n >= 30 AND pass_rate >= 0.75 AND median_child_mortality_decline_pct >= 45
prior_confidence: 0.72
disclosure: The prior expects fiscal capacity to correlate with public-goods delivery, but
  health gains may reflect vaccines, donors, income, or international diffusion rather than
  domestic tax revenue.

hypothesis_id: owid_tax_capacity_child_mortality_followthrough_2000_2022
version: 1
status: pre_registered
topic: institutional_quality
claim: Countries that materially raise tax revenues as a share of GDP from 2000 to 2022 should
  usually also achieve large child-mortality reductions, consistent with state-capacity public-goods
  follow-through.
evidence_type: descriptive

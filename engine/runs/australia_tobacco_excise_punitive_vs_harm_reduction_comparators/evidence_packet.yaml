    \ female-smoking decline (WDI SH.PRV.SMOK.FE) reported for symmetry check; (b)\
    \ relative-% decline reported; (c) year-by-year trajectory charted. METHOD_VALID:\
    \ WDI smoking-prevalence series must have \u22655 non-null observations for each\
    \ of the four countries in 2000-2022; otherwise INCONCLUSIVE (data gap)."
  threshold: 'PRIMARY: AUS decline (pp) > mean(NZL decline, GBR decline, SWE decline)'
  estimator:
    template: descriptive_cross_section
    notes: "Not a panel-FE regression. The dispositive test is a simple comparator\

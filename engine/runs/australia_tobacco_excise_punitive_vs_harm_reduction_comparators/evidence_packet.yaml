  claim: 'Australia''s punitive tobacco excise escalation (four 12.5% increases 2013-2020,
    plus plain packaging 2012) reduced adult smoking prevalence more than comparator
    countries that adopted less punitive, harm-reduction-friendly approaches: New
    Zealand (legalised vaping 2020), the United Kingdom (NHS promotes vaping as quit
    aid), and Sweden (snus as dominant harm-reduction product).'

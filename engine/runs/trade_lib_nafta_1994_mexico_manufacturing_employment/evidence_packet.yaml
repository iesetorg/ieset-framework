  claim: 'NAFTA (effective 1994-01-01) raised Mexican manufacturing value-added and
    merchandise-export intensity over the 1994-2007 pre-China-shock window relative
    to a synthetic-control pool of Latin American non-NAFTA economies. The Heckscher-Ohlin
    / Krugman-style claim is that bilateral preferential access to the US market combined
    with rules-of-origin-driven supply-chain integration shifted Mexico''s tradeable-sector
    composition toward manufacturing exports faster than its non-NAFTA peers. Wage
    and aggregate-employment effects are documented to be small and heterogeneous;
    the cleaner first-order signal is on manufacturing-sector value-added share and
    goods-export intensity.

    '

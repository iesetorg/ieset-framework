hypothesis:
  id: chile_market_reform_long_horizon_with_democracy
  legacy_id: null
  path: hypotheses/growth/chile_market_reform_long_horizon_with_democracy.yaml
  school: null
  topic: growth
  claim: "Chile\u2019s long-run income convergence is stronger after the combination\
    \ of market reforms (1975\u20131990) and democratic institutional repair (1990\
    \ onward) than under the earlier state-led import-substitution regime (1950\u2013\
    1973). In a synthetic-control design with Latin American comparators, Chile\u2019\
    s cumulative log GDP-per-capita growth from 1990\u20132024 exceeds the synthetic\
    \ counterfactual built from pre-reform peers, and the post-1990 democratic period\
    \ shows continued convergence relative to a counterfactual that stops at 1990.\n"

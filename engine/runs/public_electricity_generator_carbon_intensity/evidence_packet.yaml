  raw: "SUPPORTED \u2014 Public cohort (FRA, SWE) fossil share averaged 8.5% vs private\
    \ cohort (GBR, USA, DEU, ITA, ESP, BEL, NLD: 7 with data) 68.7% over 1985-1999;\

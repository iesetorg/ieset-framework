    \ + postwar planning are correlated)."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: Publicly owned electricity generators (EDF in France pre-privatisation, Vattenfall
    Sweden) achieved lower-carbon generation mixes than otherwise-matched privatised
    counterparts in the 1970s-1990s.
  falsification_rule: 'PRIMARY (dispositive): the hypothesis is SUPPORTED if the ratio
    of public-cohort (FRA, SWE) mean fossil share of electricity to private-cohort
    (GBR, USA, DEU, ITA, ESP, BEL, NLD) mean fossil share, averaged across overlap
    years 1985-1999, is at most 0.75 (i.e. public cohort is at least 25% lower). Ratio
    in (0.75, 1.00) is partial. Ratio >= 1.00 is REFUTED. INFORMATIVE: non-fossil
    (nuclear + renewables) share gap, and OWID co2-intensity (CO2/GDP) ratio. Same
    direction expected. METHOD_VALID: at least 5 years of OWID-Ember coverage in 1985-1999
    for both public-cohort countries AND for at least 4 of 7 private comparators.
    The 1970-1984 sub-window of the spec (15/30 years) is structurally data-gapped
    on OWID-Ember; verdict speaks to the testable 1985-1999 sub-window only.'
  threshold: 'PRIMARY: fossil_share_ratio_pub_over_priv <= 0.75 for SUPPORTED; in
    (0.75, 1.00) for partial; >= 1.00 for refuted.'
  estimator:
    template: descriptive
    notes: "Descriptive comparison of electricity-sector CO2 intensity for FRA (EDF)\
      \ and SWE (Vattenfall) vs OECD privatised-utility average 1970-1999, with hydro/nuclear\
      \ endowment shares as level control. Not causal \u2014 public- ownership status\
      \ conflates with national resource endowment and postwar industrial-planning\
      \ legacy; matched-private comparators are scarce.\n"

hypothesis:
  id: austrian_savings_rate_investment_quality_link
  legacy_id: null
  path: hypotheses/growth/austrian_savings_rate_investment_quality_link.yaml
  school: null
  topic: growth
  claim: 'In a long-run cross-country panel 1960-2019, economies with persistently
    high gross domestic savings rates (Germany, Japan, Switzerland, Korea, Taiwan,
    Singapore) generate more TFP growth per unit of investment than economies whose
    investment is predominantly financed by foreign credit inflows or domestic credit
    expansion. The Austrian-Hayekian prediction is that genuine savings represent
    forgone present consumption and therefore signal authentic inter-temporal preferences,
    while credit-financed investment is prone to malinvestment because the underlying
    inter-temporal price signal (the loan rate) is distorted. The pre-registered claim
    is that the cross-country elasticity of TFP growth with respect to savings-financed
    investment exceeds the elasticity with respect to credit-financed investment by
    a factor of at least 1.5.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=-0.0005923, p=0.514 (above \u03B1=0.05); direction inconclusive"
  status: null
preregistration:
  claim: 'In a long-run cross-country panel 1960-2019, economies with persistently
    high gross domestic savings rates (Germany, Japan, Switzerland, Korea, Taiwan,
    Singapore) generate more TFP growth per unit of investment than economies whose
    investment is predominantly financed by foreign credit inflows or domestic credit
    expansion. The Austrian-Hayekian prediction is that genuine savings represent
    forgone present consumption and therefore signal authentic inter-temporal preferences,
    while credit-financed investment is prone to malinvestment because the underlying
    inter-temporal price signal (the loan rate) is distorted. The pre-registered claim
    is that the cross-country elasticity of TFP growth with respect to savings-financed
    investment exceeds the elasticity with respect to credit-financed investment by
    a factor of at least 1.5.

    '
  falsification_rule: 'The hypothesis is falsified if the elasticity-ratio of TFP
    growth to savings-financed vs credit-financed investment is below 1.5, OR if the
    savings-financed-investment coefficient is not significantly positive at p<0.05.

    '
  threshold: "elasticity(savings_financed_inv \u2192 tfp_growth) / elasticity(credit_financed_inv\
    \ \u2192 tfp_growth) >= 1.5 AND savings_financed_inv coefficient significant at\
    \ p<0.05\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Panel-FE regression of 5-year-forward TFP growth on savings-financed investment\
      \ (proxied by gross capital formation minus current-account deficit) and credit-financed\
      \ investment (proxied by private-credit growth), plus controls. Wald test on\
      \ the ratio of the two coefficients. Mainstream growth-economics null treats\
      \ the source of investment finance as irrelevant \u2014 the Modigliani-Miller-style\
      \ assumption is that capital is fungible. A significant differential coefficient\
      \ supports the Austrian view.\n"
  steelman: hypotheses/steelman/austrian_savings_rate_investment_quality_link.md

  legacy_id: null
  path: hypotheses/regulatory/banking_crisis_2008_gfc_canonical_multimetric.yaml
  school: null
  topic: regulatory
  claim: 'The 2007-2009 Global Financial Crisis was a systemic banking-and-credit
    rupture in the advanced-economy core (USA, UK, Ireland, Iceland, Spain, the Eurozone
    periphery) with the canonical multi-metric pattern of large credit-to-GDP run-up
    followed by sharp output contraction, persistent unemployment, large fiscal-deficit
    blowout, and long real-house-price retracement. The hypothesis is that the GFC
    meets the canonical-case multi-metric checklist for a systemic banking crisis:
    at least 5 of the 7 pre-registered metrics breach their thresholds in 2007-2014.

    '

  school: null
  topic: labour
  claim: "Strong employment-protection legislation (EPL) with high union wage-setting\
    \ coverage and limited at-will dismissal produces a three-order causal chain in\
    \ Southern European labour markets. FIRST-ORDER: insider workers receive durable\
    \ job security, wage floors via collective bargaining, and statutory dismissal\
    \ protections \u2014 this is a real welfare transfer to incumbent workers and\
    \ an acknowledged policy success on its own terms. SECOND-ORDER: an insider-outsider\
    \ duality emerges in which youth, women re-entering after care periods, immigrants\
    \ and long-term unemployed face exceptionally high unemployment rates, temporary-contract\
    \ traps, and hiring friction. THIRD- ORDER: the persistent youth/outsider disadvantage\
    \ accelerates brain-drain emigration (ESP/ITA/GRC youth exodus 2011-2019), contributes\
    \ to demographic-fertility decline (delayed family formation through unstable\
    \ early-career), and produces a productivity-scarring \"lost cohort\" effect on\
    \ the national labour force. Cases: Spain reforma 2012 as an EPL-reduction event-study,\
    \ Italy Jobs Act 2015, Greece Law 4093 2012, France El Khomri 2016 and Macron\
    \ 2017 ordonnances.\n"

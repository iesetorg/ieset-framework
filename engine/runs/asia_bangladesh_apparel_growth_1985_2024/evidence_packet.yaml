  id: asia_bangladesh_apparel_growth_1985_2024
  legacy_id: null
  path: hypotheses/growth/asia_bangladesh_apparel_growth_1985_2024.yaml
  school: null
  topic: growth
  claim: "Bangladesh's apparel-export-led growth model 1985-2024 \u2014 anchored by\
    \ the 1985 establishment of the EPZ regime, the MFA-quota dynamics pre-2005, the\
    \ EU Everything But Arms preferences from 2008, and a sustained labour-cost advantage\
    \ \u2014 produced cumulative real GDP-pc-PPP growth that converges toward the\
    \ SAARC peer mean (IND, PAK, NPL) and a manufacturing value-added share rise of\
    \ at least +5 percentage points 1985 to 2019. Real GDP-pc-PPP growth differential\
    \ BGD vs PAK averages at least +1.0pp/yr over 2000-2019."
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: manufacturing share +6.75pp and BGD-PAK growth gap +2.78pp/yr clear both
    primary gates
  status: null
preregistration:
  claim: "Bangladesh's apparel-export-led growth model 1985-2024 \u2014 anchored by\
    \ the 1985 establishment of the EPZ regime, the MFA-quota dynamics pre-2005, the\
    \ EU Everything But Arms preferences from 2008, and a sustained labour-cost advantage\
    \ \u2014 produced cumulative real GDP-pc-PPP growth that converges toward the\
    \ SAARC peer mean (IND, PAK, NPL) and a manufacturing value-added share rise of\
    \ at least +5 percentage points 1985 to 2019. Real GDP-pc-PPP growth differential\
    \ BGD vs PAK averages at least +1.0pp/yr over 2000-2019."
  falsification_rule: 'PRIMARY (dispositive, BOTH for SUPPORTED): (1) BGD manufacturing
    value-added share rises by at least +5pp from 1985 to 2019; AND (2) BGD real GDP-pc-PPP
    growth minus PAK 2000-2019 mean is at least +0.01 (BGD at least 1pp/yr above PAK).
    REFUTED if EITHER fails.'
  threshold: 'PRIMARY 1: manuf_va_pct_gdp(BGD, 2019) - manuf_va_pct_gdp(BGD, 1985)
    >= 5. PRIMARY 2: gdp_pc_growth(BGD, 2000-2019 mean) - gdp_pc_growth(PAK, 2000-2019
    mean) >= 0.01. METHOD_VALID: WDI NV.IND.MANF.ZS for BGD across 1985-2019; NY.GDP.PCAP.KD.ZG
    for BGD and PAK 2000-2019.'
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: Two-way fixed effects with SAARC peer pool. Bangladesh-Pakistan bilateral
      comparison is the cleanest sub-test (similar 1971 starting point). The generic
      panel specification includes a 1975-1984 pre-period so the post-1985 EPZ/apparel
      treatment is identified under country fixed effects.

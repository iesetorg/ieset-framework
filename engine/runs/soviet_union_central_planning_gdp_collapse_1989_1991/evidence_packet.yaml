hypothesis:
  id: soviet_union_central_planning_gdp_collapse_1989_1991
  legacy_id: null
  path: hypotheses/growth/soviet_union_central_planning_gdp_collapse_1989_1991.yaml
  school: null
  topic: growth
  claim: "The Soviet central-planning system, having already exhibited TFP stagnation\
    \ 1970-1989, underwent a canonical institutional and economic collapse 1989-1998\
    \ as plan-enforcement was withdrawn without functioning market institutions in\
    \ place. The collapse manifests as \u22657 of 10 pre-registered extreme- outcome\
    \ metrics drawn from independent data sources and measuring distinct causal layers\
    \ (real output, industrial production, hyperinflation, male mortality, demographic\
    \ collapse, inequality surge, emigration, currency regime failure, poverty headcount,\
    \ reform-depth-conditioned recovery). The canonical-case claim is that no non-war\
    \ peacetime transition in the 1989-1998 global panel matches even 4 of these 10\
    \ thresholds simultaneously except the FSU bloc itself. A refutation (\u22643\
    \ metrics met) would indicate that the post- Soviet collapse has been overstated\
    \ by Western reconstructions, or that the political-shock explanation (Gorbachev\
    \ / Yeltsin choices) dominates the institutional-exhaustion explanation in a way\
    \ that rules out the canonical-case framing.\n"
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: 9 of 10 metrics met threshold (support threshold 7)
  status: null

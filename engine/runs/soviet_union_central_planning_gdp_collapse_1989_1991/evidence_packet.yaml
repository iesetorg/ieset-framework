    \ that rules out the canonical-case framing.\n"
  falsification_rule: 'Hypothesis is SUPPORTED if >=7 of 10 canonical metrics meet
    their pre-registered thresholds. Hypothesis is REFUTED if <=3 of 10 metrics meet
    their thresholds. The 4-6 metric range is inconclusive. Additional falsification:
    if any non-war non- FSU/CEE country in 1989-1998 (WDI + Maddison + UN DESA panel)
    matches >=4 of these thresholds, the metric-set is not transition-discriminating
    and the hypothesis is methodologically invalid regardless of Russia''s own metric
    count. Secondary falsification: if deep-reform FSU/CEE republics did NOT outperform
    shallow-reform republics on the reform-depth-conditioned-recovery metric, the
    institutional- quality attribution is weakened.

    '
  threshold: metrics_met_russia >= 7 AND max_metrics_met_non_war_non_transition_peer
    <= 3
  estimator:
    template: multi_metric_checklist
    notes: 'For each of the 10 canonical metrics, evaluator fetches the specified
      data source and evaluates the threshold expression. Support if metrics_met >=
      7, refute if metrics_met <= 3, inconclusive in the 4-6 range. Benchmark check:
      no non-war peer in the 1989-1998 global panel should match >=4 of these thresholds
      outside the FSU/CEE bloc; if a non-transitional country does, the metric-set
      is not transition-discriminating and needs revision. FSU-bloc countries are
      treated as a single cluster for benchmark purposes since they share the treatment
      (Soviet-system collapse), not as independent observations.

      '

  school: null
  topic: fiscal
  claim: Across a pre-registered narrower OECD/market-peer panel from 1996 to 2021,
    larger government-consumption shares predict lower private fixed-investment shares
    after country and year fixed effects and basic macro controls. This tests the
    resource-crowding, bureaucratic-consumption, and private-sector displacement channels
    as a second-wave market-order hypothesis rather than reusing the Heritage latest-year
    cross-section.

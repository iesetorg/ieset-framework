hypothesis:
  id: financial_liberalisation_crisis_risk
  legacy_id: null
  path: hypotheses/growth/financial_liberalisation_crisis_risk.yaml
  school: null
  topic: growth
  claim: Financial liberalisation (capital-account opening, domestic interest-rate
    deregulation, removal of credit controls) without prudential regulation (strong
    supervision, capital adequacy, macro-prudential buffers) raises the probability
    and severity of banking and currency crises, which can erase long-run market-reform
    gains in GDP per capita. The claim applies to middle-income emerging markets 1975-2020
    and challenges the assumption that financial opening is unconditionally welfare-improving.

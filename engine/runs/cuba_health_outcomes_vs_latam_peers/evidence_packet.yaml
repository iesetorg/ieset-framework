    < imr_ratio_1960))'
  estimator:
    template: descriptive
    notes: "Descriptive cross-country comparison of CUB vs income-matched LATAM peers\
      \ 1960-2000 on life expectancy and infant mortality. Plot trajectories with\
      \ sanctions/embargo annotations; report rank-position of CUB within peer distribution\
      \ at 5-year intervals. Cuban official data quality flagged as measurement caveat\
      \ \u2014 sensitivity using WHO independent estimates. Not causal \u2014 does\
      \ not separate health-system architecture from Soviet subsidies channel (subsidies\
      \ ended 1991 makes 1991-2000 a useful sub-period).\n"

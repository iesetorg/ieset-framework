    \ expectancy."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: Cuban life expectancy and infant mortality outcomes 1960-2000 outperformed
    Latin American middle-income peers despite sanctions, demonstrating socialist
    health-system superiority.
  falsification_rule: 'PRIMARY 1 (life expectancy, dispositive): Cuba''s life expectancy
    at birth in 2000 minus the LATAM peer-pool mean in 2000 must be at least +1.0
    year. PRIMARY 2 (infant mortality, dispositive): Cuba''s IMR in 2000 must be at
    most 50% of the LATAM peer-pool mean (CUB / peer_mean <= 0.50). SUPPORTED if BOTH
    primaries hold AND Cuba''s gap on at least one metric is more favourable in 2000
    than in 1960 (so Cuba "pulled away" rather than just starting ahead). PARTIAL
    if exactly one primary holds. REFUTED if neither primary holds. INFORMATIVE: Cuba''s
    rank within the 12-country pool at 2000 on each metric, plus 1991-2000 sub-period
    (post-Soviet-subsidy) trajectory. METHOD_VALID: requires WDI coverage for at least
    8 of 11 peers at the 2000 endpoint; WHO GHO independent cross-check noted as unavailable
    for the full window (series begins ~2000).'
  threshold: 'PRIMARY: (le_cub_2000 - le_peer_mean_2000) >= 1.0 AND (imr_cub_2000

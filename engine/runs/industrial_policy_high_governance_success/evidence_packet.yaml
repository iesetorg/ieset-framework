hypothesis:
  id: industrial_policy_high_governance_success
  legacy_id: null
  path: hypotheses/growth/industrial_policy_high_governance_success.yaml
  school: null
  topic: growth
  claim: 'Industrial policy (sectoral targeting, export subsidies, conditional credit,
    technology push) succeeds in raising long-run manufacturing productivity and export
    sophistication when implemented in high-governance states with export discipline
    (clear performance criteria, sunset clauses, competitive benchmarking), over 30-year
    windows 1960-2020. The claim is an adversarial boundary test: it challenges blanket
    free-market claims by documenting conditions under which state-led sectoral promotion
    outperforms laissez-faire.'

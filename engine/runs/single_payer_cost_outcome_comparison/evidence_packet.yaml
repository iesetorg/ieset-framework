hypothesis:
  id: single_payer_cost_outcome_comparison
  legacy_id: null
  path: hypotheses/healthcare/single_payer_cost_outcome_comparison.yaml
  school: null
  topic: healthcare
  claim: Universal single-payer healthcare systems (NHS, Canadian Medicare) produce
    lower per-capita healthcare expenditure with equal or better life-expectancy outcomes
    than the US multi-payer system.
verdict:
  raw: "supported_subset \u2014 cost test PASSES (USA per-capita PPP $10957 vs GBR/CAN\
    \ mean $5663, ratio 1.93x > 1.5); single-payer matched-or-beat USA on 4/5 tested\
    \ outcomes (LE/IMR/U5/UHC/OOP). BUT canonical health-system outcomes basket has\
    \ 4 documented data gaps: O6_amenable_mortality, O7_hale, O8_5yr_cancer, O9_waiting_times.\
    \ The spec's own disclosure flagged amenable mortality + HALE as preferred outcomes;\
    \ NHS waiting times and 5-yr cancer survival (USA outperforms) NOT in test. v1\
    \ SUPPORTED was indicator-gamed. Max tier: supported_subset."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: Universal single-payer healthcare systems (NHS, Canadian Medicare) produce
    lower per-capita healthcare expenditure with equal or better life-expectancy outcomes
    than the US multi-payer system.
  falsification_rule: "PRIMARY (dispositive multi-metric checklist over GBR, CAN,\
    \ USA, 2010-2023 mean):\n  M1 (cost): USA per-capita health expenditure exceeds\
    \ the (GBR, CAN) mean by\n    more than 50% (ratio > 1.50). PPP-USD basis (constructed\
    \ as\n    SH.XPD.CHEX.GD.ZS / 100 * NY.GDP.PCAP.PP.KD).\n  Outcome block (need\
    \ >= 2 of 3):\n    M2 life-expectancy at birth: single-payer mean ties-or-exceeds\
    \ USA.\n    M3 infant-mortality per 1,000: single-payer mean ties-or-beats USA\
    \ (lower better).\n    M4 under-5 mortality per 1,000: single-payer mean ties-or-beats\
    \ USA (lower better).\nSUPPORTED if M1 holds AND outcome block passes. REFUTED\
    \ if neither M1 nor the outcome block holds. PARTIAL if exactly one of {M1, outcome\
    \ block} holds. INFORMATIVE: country-by-country values reported in diagnostics\
    \ so within-system heterogeneity (NHS waiting times, CAN access constraints) is\
    \ visible even when the aggregate verdict goes one way. METHOD_VALID: requires\
    \ SH.XPD.CHEX.GD.ZS, NY.GDP.PCAP.PP.KD, SP.DYN.LE00.IN, SP.DYN.IMRT.IN, and SH.DYN.MORT\
    \ vintages on disk for all three countries over the comparison window. Data gap\
    \ \u2192 INCONCLUSIVE."
  threshold: 'PRIMARY: cost_ratio_USA_over_singlepayer > 1.50 AND n_outcome_metrics_favouring_singlepayer
    >= 2 (of 3).'
  estimator:
    template: multi_metric_checklist
    notes: "Three-country comparison GBR/CAN/USA, 2010-2023 mean (the modern Medicare/NHS\
      \ architectural end-state; the spec's 1971-2023 window is informational, the\
      \ dispositive comparison is on the recent decade where all five series overlap\
      \ cleanly). Metric bundle:\n  M1 cost  \u2014 USA per-capita PPP spend / single-payer\
      \ mean > 1.50\n  M2 outcome \u2014 life expectancy at birth (higher better)\n\
      \  M3 outcome \u2014 infant mortality per 1k (lower better)\n  M4 outcome \u2014\
      \ under-5 mortality per 1k (lower better)\nVerdict map: SUPPORTED if M1 AND\
      \ >=2/3 outcome metrics favour single-payer; partial if exactly one pillar holds;\
      \ refuted otherwise. Caveat: aggregates obscure within-system heterogeneity\
      \ (NHS waiting times, CAN access constraints); country-level values are surfaced\
      \ in diagnostics.json.\n"
  steelman: null

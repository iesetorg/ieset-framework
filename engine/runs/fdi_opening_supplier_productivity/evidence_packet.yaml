preregistration:
  claim: 'FDI openness predicts domestic supplier total factor productivity growth
    when paired with pro-competition domestic policy, but not when domestic markets
    are reserved for protected national champions, in a panel of emerging economies
    1990-2020. The directional claim is that the interaction between FDI restrictiveness
    (lower = more open) and domestic competition policy (lower barriers = more competition)
    is positive and significant for supplier TFP growth, while FDI openness alone
    shows no significant effect.

    '
  falsification_rule: "SUPPORTED if \u03B23 (FDI openness \xD7 competition policy)\
    \ is positive and significant at p<0.10, AND \u03B21 (FDI openness alone) is insignificant.\
    \ PARTIAL if \u03B23 is positive and significant but \u03B21 is also positive\
    \ and significant (FDI works regardless of competition). REFUTED if \u03B23 is\
    \ negative and significant, or if both \u03B21 and \u03B23 are insignificant.\
    \ INFORMATIVE: BIT-instrumented 2SLS should produce the same sign as OLS; opposite\
    \ sign suggests OLS endogeneity bias.\n"
  threshold: "\u03B2_interaction > 0 at p<=0.10  AND \u03B2_fdi_openness_main effect\
    \ p >= 0.10  AND IV robustness retains sign of \u03B2_interaction.\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel with explicit interaction term: supplier TFP growth =\
      \ \u03B20 + \u03B21*FDI_openness + \u03B22*competition_policy + \u03B23*(FDI_openness\
      \ \xD7 competition_policy) + controls + FE. The interaction \u03B23 is the parameter\
      \ of interest. Robustness: (1) subsample analysis splitting countries above\
      \ and below median competition policy; (2) IV approach using bilateral investment\
      \ treaty (BIT) ratification as instrument for FDI openness; (3) sector-level\
      \ panel if OECD STAN sectoral TFP is available.\n"
  steelman: hypotheses/steelman/fdi_opening_supplier_productivity.md

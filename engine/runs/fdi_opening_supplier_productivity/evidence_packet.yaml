hypothesis:
  id: fdi_opening_supplier_productivity
  legacy_id: null
  path: hypotheses/trade/fdi_opening_supplier_productivity.yaml
  school: null
  topic: trade
  claim: 'FDI openness predicts domestic supplier total factor productivity growth
    when paired with pro-competition domestic policy, but not when domestic markets
    are reserved for protected national champions, in a panel of emerging economies
    1990-2020. The directional claim is that the interaction between FDI restrictiveness
    (lower = more open) and domestic competition policy (lower barriers = more competition)
    is positive and significant for supplier TFP growth, while FDI openness alone
    shows no significant effect.

    '

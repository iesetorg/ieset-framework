  legacy_id: null
  path: hypotheses/institutional_quality/venezuela_chavismo_canonical_case_multi_metric.yaml
  school: null
  topic: institutional_quality
  claim: "Venezuela's post-1999 socialist policy regime (Ch\xE1vez 1999-2013 + Maduro\
    \ 2013-present, characterised by FX controls, price controls, mass nationalisations,\
    \ PDVSA politicisation, and 2014+ monetary financing of fiscal deficits) produced\
    \ a canonical institutional and economic collapse that manifests as \u22657 of\
    \ 10 pre-registered extreme-outcome metrics, each drawn from an independent data\
    \ source and measuring a different causal layer. The canonical-case claim is that\
    \ no non-war peacetime economy in the 2000-2024 window matches even 4 of these\
    \ 10 thresholds simultaneously; Venezuela matches most. A refutation (\u22643\
    \ metrics met) would indicate the framework's institutional-quality coding is\
    \ overstated, or that Venezuela's collapse has been substantially exaggerated\
    \ in the consensus record.\n"

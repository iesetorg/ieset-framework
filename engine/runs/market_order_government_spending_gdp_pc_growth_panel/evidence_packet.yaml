  topic: fiscal
  claim: Across a pre-registered panel of OECD and major emerging-market economies
    from 1996 to 2023, larger government expenditure shares predict slower real GDP
    per capita growth after country and year fixed effects and basic macro controls.
    This tests the crowding-out, tax-expectation, and discretionary-allocation channels
    without using the Heritage latest-year cross-section as the treatment.

hypothesis:
  id: cuba_special_period_degrowth_basic_needs
  path: hypotheses/growth/cuba_special_period_degrowth_basic_needs.yaml
  school: null
  topic: growth
  claim: "Cuban post-1991 Special Period forced degrowth (real GDP per capita contracted\
    \ ~35% over 1989-1993 after the Soviet bloc collapse cut off concessional sugar/oil\
    \ terms) demonstrated that basic-needs provision (life expectancy, infant mortality,\
    \ primary-school enrolment) can be maintained \u2014 or improved \u2014 during\
    \ rapid material-throughput reduction when institutions are aligned around free\
    \ universal health and education.\n"
verdict:
  raw: "inconclusive \u2014 canonical basic-needs basket incomplete. v2 graded SUPPORTED\
    \ on a 3-indicator favourable subset (LE/IMR/enrolment) while caloric supply collapsed\
    \ ~30% (Garfield & Santana 1997) and the 1994 balsero crisis revealed mass emigration.\
    \ v3 requires the canonical basket (Streeten/Sen/UNDP HDI extensions). Missing\
    \ canonical inputs: P2_caloric_supply_1989_2000, P4_emigration_annual_1989_2000.\
    \ FAO caloric obs in window: 0/12; emigration obs: 0/12."
  bucket: inconclusive
  reason: null
  status: null
preregistration:
  claim: "Cuban post-1991 Special Period forced degrowth (real GDP per capita contracted\
    \ ~35% over 1989-1993 after the Soviet bloc collapse cut off concessional sugar/oil\
    \ terms) demonstrated that basic-needs provision (life expectancy, infant mortality,\
    \ primary-school enrolment) can be maintained \u2014 or improved \u2014 during\
    \ rapid material-throughput reduction when institutions are aligned around free\
    \ universal health and education.\n"
  falsification_rule: "PRIMARY (dispositive): SUPPORTED requires all four CANONICAL\
    \ BASIC-NEEDS conditions: (P1) Cuban real GDP per capita contracted \u2265 25\
    \ % peak-to-trough (1989 peak vs 1991-1995 trough); (P2) FAO daily caloric supply\
    \ per capita: max single-year decline from 1989 baseline \u2264 15 % AND value\
    \ at 2000 \u2265 95 % of 1989 baseline; (P3) all three v2 indicators (life expectancy,\
    \ infant mortality, primary enrolment) stayed within \xB110 % of 1989 baseline;\
    \ (P4) Cuban cumulative net emigration 1989-2000 < 5 % of 1989 population. REFUTED\
    \ if P1 holds but ANY of P2/P3/P4 failed by the documented threshold. PARTIAL\
    \ if exactly one of P2/P3/P4 failed by < 1.5\xD7 its threshold. INFORMATIVE: per-indicator\
    \ trajectory, recovery by 2000, qualitative documented evidence on caloric collapse\
    \ and balsero crisis (reported in result_card even when method-invalid). METHOD_VALID:\
    \ all four canonical inputs must be on disk: WDI SP.DYN.LE00.IN + SP.DYN.IMRT.IN\
    \ + SE.PRM.ENRR + NY.GDP.PCAP.KD AND faostat:food_balance_sheets daily caloric\
    \ supply per capita 1989-2000 AND a Cuban annual emigration-share series 1989-2000.\
    \ The current on-disk vintages have the WDI legs but NOT the FAO caloric-supply\
    \ 1989-2000 leg (faostat slug only covers 2010+) NOR an annual emigration series.\
    \ Verdict therefore inconclusive, not SUPPORTED on the favourable subset.\n"
  threshold: 'PRIMARY: gdp_pc_peak_to_trough_decline >= 0.25 AND max_kcal_decline_pct
    <= 0.15 AND kcal_2000_ratio_to_1989 >= 0.95 AND max_le_decline_pct <= 0.10 AND
    max_imr_rise_pct <= 0.10 AND max_enrol_decline_pct <= 0.10 AND cumulative_net_emigration_share_1989_2000
    < 0.05'
  estimator:
    template: multi_metric_checklist
    clustering: none
    notes: 'Single-country canonical case. Pattern-match across GDP contraction magnitude
      and three basic-needs metrics across the 1989-2000 Special Period to test whether
      basic-needs provision was preserved through forced degrowth. The hand-authored
      replication.py implements the dual-threshold falsification rule directly (per
      the post_2008_oecd_growth_emissions_path canonical-example pattern); the multi_metric_checklist
      template declaration above is for framework metadata consistency.

      '
  steelman: hypotheses/steelman/cuba_special_period_degrowth_basic_needs.md

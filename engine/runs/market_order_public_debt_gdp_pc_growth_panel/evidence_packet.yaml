  school: null
  topic: fiscal
  claim: Across a pre-registered narrower OECD/market-peer panel from 1996 to 2021,
    larger public-debt shares predict slower real GDP per capita growth after country
    and year fixed effects and basic macro controls. This tests the debt-overhang,
    future-tax-expectation, and sovereign-risk channels as a second-wave market-order
    hypothesis rather than reusing the Heritage latest-year cross-section.

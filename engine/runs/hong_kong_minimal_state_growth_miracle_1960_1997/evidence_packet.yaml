  topic: growth
  claim: "Under Financial Secretary John Cowperthwaite (1961\u20131971) and successors,\
    \ Hong Kong pursued near-laissez-faire economic policy \u2014 no capital controls,\
    \ no industrial policy, minimal tariffs, low flat taxes, and light labour regulation;\
    \ between 1960 and 1997 Hong Kong's GDP per capita rose from approximately $4,000\
    \ to $26,000 (2011 PPP), converging almost fully to UK levels and surpassing most\
    \ continental European economies. This convergence rate is attributable to free-market\
    \ policy rather than solely to entrep\xF4t geography or East Asian culture, as\
    \ evidenced by Heritage and Fraser Economic Freedom Index rankings consistently\
    \ placing Hong Kong first globally throughout the period.\n"

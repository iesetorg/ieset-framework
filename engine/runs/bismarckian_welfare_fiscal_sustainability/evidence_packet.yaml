hypothesis:
  id: bismarckian_welfare_fiscal_sustainability
  path: hypotheses/fiscal/bismarckian_welfare_fiscal_sustainability.yaml
  school: null
  topic: fiscal
  claim: Bismarckian contributory welfare architectures (Germany, Austria, Switzerland)
    are more fiscally sustainable than tax-financed universal architectures when demographic
    ageing is severe, because contribution-benefit linkage constrains expansion.
verdict:
  raw: "inconclusive (data gap on oecd:PensionExpenditure, oecd:ImplicitPensionDebt,\
    \ oecd:NetReplacementRate, oecd:SocialContributionRate) \u2014 none of the four\
    \ pre-registered pension-specific metrics (pension expenditure / GDP, implicit\
    \ pension debt / GDP, net replacement rate, total social contribution rate) are\
    \ in the current data vintage. The Bismarckian-vs-Beveridgean comparison cannot\
    \ be dispositively scored until the OECD pension-system fetchers land. Auxiliary\
    \ (NOT dispositive \u2014 general-government, not pension-specific): in 2018-2023\
    \ Bismarckian general-gov debt is +25.9pp of GDP vs Beveridgean (Bismarckian 88.6%,\
    \ Beveridgean 62.8%); general-gov expenditure +6.0pp (Bismarckian 49.8%, Beveridgean\
    \ 43.9%). Sign of the gap (positive = Bismarckian higher) is the opposite of what\
    \ the ordoliberal claim predicts for the pension-specific metrics, but general-gov\
    \ fiscal aggregates can diverge from pension-specific outcomes."
  bucket: inconclusive
  reason: null
  status: null
preregistration:
  claim: Bismarckian contributory welfare architectures (Germany, Austria, Switzerland)
    are more fiscally sustainable than tax-financed universal architectures when demographic
    ageing is severe, because contribution-benefit linkage constrains expansion.
  falsification_rule: "PRIMARY (dispositive): SUPPORTED if Bismarckian-mean (DEU,\
    \ AUT, CHE, FRA, BEL, ITA) is at least 1.5pp of GDP LOWER than Beveridgean-mean\
    \ (GBR, IRL, DNK, SWE, FIN, NOR, NLD, USA) for BOTH (a) public pension expenditure\
    \ / GDP AND (b) implicit pension debt / GDP, in the 2018-2023 window. REFUTED\
    \ if BOTH primary fiscal metrics show Bismarckian \u2265 Beveridgean (gap of opposite\
    \ sign or zero). INFORMATIVE: net replacement rate directionally lower in Bismarckian\
    \ (\u22655pp), total social contribution rate / wage directionally higher in Bismarckian\
    \ (\u22653pp). METHOD_VALID: at least 4 of 6 Bismarckian and 5 of 8 Beveridgean\
    \ countries with data on both M1 and M2."
  threshold: 'PRIMARY: (M1) bismarckian_mean(pension_exp_pct_gdp) - beveridgean_mean
    <= -1.5 AND (M2) bismarckian_mean(implicit_pension_debt_pct_gdp) - beveridgean_mean
    <= -1.5, both in 2018-2023.'
  estimator:
    template: multi_metric_checklist
    notes: 'Multi-metric checklist comparing Bismarckian (DEU, AUT, CHE) versus Beveridgean
      welfare states across pension-system fiscal- sustainability indicators (replacement
      rate, contribution rate, implicit debt, pension expenditure / GDP). Pre-registered
      metric bundle scored at threshold counts.

      '
  steelman: null

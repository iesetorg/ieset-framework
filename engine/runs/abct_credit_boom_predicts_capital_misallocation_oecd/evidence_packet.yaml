hypothesis:
  id: abct_credit_boom_predicts_capital_misallocation_oecd
  legacy_id: null
  path: hypotheses/monetary/abct_credit_boom_predicts_capital_misallocation_oecd.yaml
  school: null
  topic: monetary
  claim: 'In an OECD panel 1980-2023, the 5-year cumulative growth of private credit
    to non-financial corporations (BIS WS_CREDIT) is positively associated with the
    subsequent (t+1 to t+5) volatility of non-residential fixed investment and with
    downward revisions to ex-ante TFP growth forecasts. Countries experiencing the
    largest credit booms exhibit the largest post-bust capital-stock reallocation
    episodes, consistent with the Mises-Hayek prediction that artificially-low interest
    rates produce a structural distortion in the inter-temporal capital structure
    that must be liquidated when monetary conditions normalise.

    '
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: coef=+0.08927 (sign matches claim +), p=0
  status: null
preregistration:
  claim: 'In an OECD panel 1980-2023, the 5-year cumulative growth of private credit
    to non-financial corporations (BIS WS_CREDIT) is positively associated with the
    subsequent (t+1 to t+5) volatility of non-residential fixed investment and with
    downward revisions to ex-ante TFP growth forecasts. Countries experiencing the
    largest credit booms exhibit the largest post-bust capital-stock reallocation
    episodes, consistent with the Mises-Hayek prediction that artificially-low interest
    rates produce a structural distortion in the inter-temporal capital structure
    that must be liquidated when monetary conditions normalise.

    '
  falsification_rule: 'The hypothesis is falsified if the panel-FE coefficient on
    lagged 5-year credit growth is not positive and significant at p<0.05 for EITHER
    outcome (investment volatility OR forward TFP shortfall), OR if the magnitude
    of the volatility response is below 0.20 SD per 1-SD credit shock. A clean refutation
    also requires that the sign be stable across pre-2008 and post-2008 sub-samples.

    '
  threshold: "coefficient(credit_growth_5y \u2192 investment_volatility_5y) > 0 at\
    \ p<0.05 AND coefficient(credit_growth_5y \u2192 tfp_growth_5y_forward) < 0 at\
    \ p<0.05 AND volatility_response >= 0.20 SD per 1-SD credit shock AND sign stable\
    \ in both 1980-2007 and 2010-2023 sub-samples\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: 'Panel FE regression of investment volatility (and ex-post TFP shortfall)
      on lagged 5-year credit growth and credit-to-GDP gap. Heterodox/Keynesian null
      is that credit-driven investment is welfare-improving and the volatility/TFP
      link should be small or absent. Local-projections variant traces investment-volatility
      response over h=1..10 years to a one-SD credit-growth shock as robustness.

      '
  steelman: hypotheses/steelman/abct_credit_boom_predicts_capital_misallocation_oecd.md

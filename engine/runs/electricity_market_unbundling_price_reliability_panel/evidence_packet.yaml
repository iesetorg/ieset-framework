preregistration:
  claim: 'In a broad-country panel 1990-2020, electricity-market liberalisation episodes
    (vertical unbundling of generation/transmission/distribution, introduction of
    wholesale markets, and retail competition) predict lower industrial electricity
    prices and equal or improved system reliability (lower outage frequency/duration),
    controlling for fuel mix, generation capacity, and income level. The directional
    claim is that liberalisation is associated with at least a 5% reduction in real
    industrial electricity prices and no significant deterioration in reliability
    metrics within 5 years.

    '
  falsification_rule: "SUPPORTED if \u03B21 (liberalisation) is negative and significant\
    \ at p<0.10 for industrial prices and not positive and significant for SAIDI (i.e.\
    \ prices fall without reliability loss). PARTIAL if prices fall but SAIDI rises\
    \ significantly (efficiency-reliability trade-off). REFUTED if \u03B21 is positive\
    \ and significant for prices at p<0.10. INFORMATIVE: excluding UK and Chile should\
    \ not eliminate the negative price effect; if it does, the result is driven by\
    \ two dominant cases.\n"
  threshold: "\u03B2_liberalisation (industrial price) < 0 at p<=0.10  AND \u03B2\
    _liberalisation (SAIDI) not > 0 at p<=0.10  AND Ex-UK-Chile robustness retains\
    \ negative price effect.\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Two-way FE panel with staggered adoption: price = \u03B20 + \u03B21*liberalisation\
      \ + \u03B22*years_since + controls + FE. Robustness: (1) exclude UK and Chile\
      \ (dominant early liberalisers); (2) use synthetic control for each adopter;\
      \ (3) control for renewable-energy share and carbon-price exposure; (4) separate\
      \ effects for generation-only vs full unbundling; (5) use household prices instead\
      \ of industrial prices as secondary outcome.\n"
  steelman: hypotheses/steelman/electricity_market_unbundling_price_reliability_panel.md

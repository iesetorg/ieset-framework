  path: hypotheses/energy/electricity_market_unbundling_price_reliability_panel.yaml
  school: null
  topic: energy
  claim: 'In a broad-country panel 1990-2020, electricity-market liberalisation episodes
    (vertical unbundling of generation/transmission/distribution, introduction of
    wholesale markets, and retail competition) predict lower industrial electricity
    prices and equal or improved system reliability (lower outage frequency/duration),
    controlling for fuel mix, generation capacity, and income level. The directional
    claim is that liberalisation is associated with at least a 5% reduction in real
    industrial electricity prices and no significant deterioration in reliability
    metrics within 5 years.

    '

  claim: 'The 2008-2013 Irish banking crisis was a property-credit-bust event in which
    the Anglo Irish Bank, Allied Irish Banks, and Bank of Ireland balance-sheet expansion
    during 2003-2007 produced a real-house-price peak-to-trough decline of >= 50%,
    a bank-rescue fiscal cost of >= 25% of GDP, an unemployment rate rise of >= 9
    pp, and a Troika programme entry. The hypothesis is that the canonical multi-metric
    signature for Ireland is met across at least 4 of 5 metrics.

    '

hypothesis:
  id: trade_openness_long_run_income_convergence
  legacy_id: null
  path: hypotheses/trade/trade_openness_long_run_income_convergence.yaml
  school: null
  topic: trade
  claim: "Across a broad panel of countries 1960-2019, higher trade openness predicts\
    \ faster long-run convergence of real GDP per capita toward the global frontier\
    \ (the United States) than industrial-policy intensity does. Convergence is measured\
    \ by \u03B2-convergence \u2014 the coefficient on initial log GDP per capita becomes\
    \ less negative (or more positive in a conditional-convergence specification)\
    \ when interacted with trade openness \u2014 and by \u03C3-convergence, the declining\
    \ cross-sectional standard deviation of log GDP per capita over 20-year windows.\
    \ The hypothesis tests the Smithian-Ricardian claim that openness is a more reliable\
    \ convergence engine than dirigiste industrial targeting.\n"
verdict:
  raw: PARTIAL
  bucket: partial
  reason: coef=-1.083e-13, p=0.827; effect magnitude effectively zero
  status: PARTIAL
preregistration:
  claim: "Across a broad panel of countries 1960-2019, higher trade openness predicts\
    \ faster long-run convergence of real GDP per capita toward the global frontier\
    \ (the United States) than industrial-policy intensity does. Convergence is measured\
    \ by \u03B2-convergence \u2014 the coefficient on initial log GDP per capita becomes\
    \ less negative (or more positive in a conditional-convergence specification)\
    \ when interacted with trade openness \u2014 and by \u03C3-convergence, the declining\
    \ cross-sectional standard deviation of log GDP per capita over 20-year windows.\
    \ The hypothesis tests the Smithian-Ricardian claim that openness is a more reliable\
    \ convergence engine than dirigiste industrial targeting.\n"
  falsification_rule: "SUPPORTED if the interaction coefficient \u03B23 (initial_log_gdp\
    \ \xD7 openness) is positive and significant at p<0.10, while the corresponding\
    \ interaction for industrial-policy intensity is either negative, insignificant,\
    \ or materially smaller in magnitude. PARTIAL if both interactions are positive\
    \ and significant but openness has the larger coefficient. REFUTED if the openness\
    \ interaction is negative and significant at p<0.10, or if the industrial-policy\
    \ interaction is positive and significantly larger.\n"
  threshold: "\u03B23_trade_openness > 0 at p<=0.10  AND |\u03B23_trade_openness|\
    \ > |\u03B23_industrial_policy|  AND \u03C3-convergence (20yr window SD of log\
    \ GDP pc) declines more in high-openness decades than in high-industrial-policy\
    \ decades.\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way fixed-effects panel with Driscoll-Kraay standard errors. Primary\
      \ specification: growth of log GDP pc = \u03B20 + \u03B21*initial_log_gdp +\
      \ \u03B22*openness + \u03B23*(initial_log_gdp \xD7 openness) + controls + country\
      \ FE + year FE. The interaction term \u03B23 is the convergence test: if \u03B2\
      3 > 0, openness accelerates convergence. A parallel specification replaces openness\
      \ with industrial-policy intensity. Robustness: 20-year non-overlapping windows\
      \ to avoid serial correlation; entrep\xF4t outliers dropped or downweighted.\n"
  steelman: hypotheses/steelman/trade_openness_long_run_income_convergence.md

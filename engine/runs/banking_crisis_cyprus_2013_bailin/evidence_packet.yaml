    produced a real GDP peak-to-trough decline of >= 8%, a bank-credit-to-GDP decline
    of >= 100 pp, an unemployment-rate rise of >= 10 pp, and required an EUR 10bn
    ESM programme. The hypothesis is that the canonical multi-metric signature for
    Cyprus is met across at least 4 of 5 metrics.

    '

  id: labour_market_flexibility_employment_growth_panel
  path: hypotheses/labour/labour_market_flexibility_employment_growth_panel.yaml
  school: null
  topic: labour
  claim: "In a broad-country panel 1990-2019, greater labour-market flexibility \u2014\
    \ measured by lower OECD EPL overall strictness, higher ease-of-hiring scores,\
    \ and absence of centralized wage bargaining \u2014 predicts higher employment-to-\
    \ population ratios and faster real GDP per capita growth, controlling for institutional\
    \ quality, education, and trade openness. The directional claim is that a one-standard-deviation\
    \ increase in flexibility predicts at least 1 percentage-point higher employment-to-population\
    \ and 0.3 percentage points higher annual growth.\n"

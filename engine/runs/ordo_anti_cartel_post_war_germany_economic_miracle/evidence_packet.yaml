  topic: growth
  claim: "Post-war West Germany's Wirtschaftswunder (1948-1965) reflects the combined\
    \ effect of (a) Erhard's June-1948 currency reform plus immediate price-control\
    \ liberalisation and (b) the 1957 Gesetz gegen Wettbewerbsbeschr\xE4nkungen (GWB)\
    \ anti-cartel law. The ordoliberal claim is that the competition-policy contribution\
    \ is identifiable as a distinct channel from the currency-reform contribution:\
    \ real GDP-per-capita growth in the post-GWB sub-window (1958-1965) remained at\
    \ or above the pre-GWB sub-window (1949-1957) despite the convergence-catch-up\
    \ effect having largely exhausted by 1957, indicating that competition-rule enforcement\
    \ preserved productivity growth past the point at which simple reconstruction\
    \ effects predicted deceleration.\n"

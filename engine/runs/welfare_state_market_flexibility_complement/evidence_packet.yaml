  status: INCONCLUSIVE_DATA_PENDING
preregistration:
  claim: 'Large welfare states sustain long-run real GDP per capita growth when paired
    with market flexibility (low product- and labour-market barriers), trade openness,
    and fiscal discipline (debt-to-GDP below 90%), but not when paired with rigid
    product and labour markets, in an OECD and rich- country panel 1980-2020. The
    directional claim is that the interaction between welfare-state size (social transfers
    + public consumption as % of GDP) and a composite flexibility-openness-discipline
    index is positive and significant for growth, while welfare-state size alone shows
    no effect or a negative effect.

    '
  falsification_rule: "SUPPORTED if \u03B23 (welfare \xD7 flexibility) is positive\
    \ and significant at p<0.10, AND the marginal welfare effect is negative or insignificant\
    \ in the bottom tercile of flexibility and positive or insignificant in the top\
    \ tercile. PARTIAL if \u03B23 is positive and significant but \u03B21 is also\
    \ positive (welfare helps regardless, just more with flexibility). REFUTED if\
    \ \u03B23 is negative and significant. INFORMATIVE: the result should survive\
    \ excluding the Nordic countries; if not, it is a Nordic- specific story.\n"
  threshold: "\u03B2_interaction > 0 at p<=0.10  AND Marginal welfare effect <= 0\
    \ or p>=0.10 in bottom tercile  AND Marginal welfare effect >= 0 or p>=0.10 in\
    \ top tercile  AND Ex-Nordic robustness retains sign of \u03B2_interaction.\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel with interaction: growth = \u03B20 + \u03B21*welfare_size\
      \ + \u03B22*flexibility_index + \u03B23*(welfare_size \xD7 flexibility_index)\
      \ + controls + FE. Subsample analysis at terciles of flexibility index. Robustness:\
      \ (1) use Fraser EFW overall index instead of constructed composite; (2) exclude\
      \ Nordic countries; (3) use 5-year non-overlapping averages; (4) separate product-market\
      \ and labour-market flexibility interactions.\n"
  steelman: hypotheses/steelman/welfare_state_market_flexibility_complement.md

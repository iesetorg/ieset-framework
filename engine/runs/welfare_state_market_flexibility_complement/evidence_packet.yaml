hypothesis:
  id: welfare_state_market_flexibility_complement
  legacy_id: null
  path: hypotheses/fiscal/welfare_state_market_flexibility_complement.yaml
  school: null
  topic: fiscal
  claim: 'Large welfare states sustain long-run real GDP per capita growth when paired
    with market flexibility (low product- and labour-market barriers), trade openness,
    and fiscal discipline (debt-to-GDP below 90%), but not when paired with rigid
    product and labour markets, in an OECD and rich- country panel 1980-2020. The
    directional claim is that the interaction between welfare-state size (social transfers
    + public consumption as % of GDP) and a composite flexibility-openness-discipline
    index is positive and significant for growth, while welfare-state size alone shows
    no effect or a negative effect.

    '

  school: null
  topic: distribution
  claim: Durable exit from extreme poverty (sustained above-poverty-line household
    consumption for at least 5 consecutive years) is more strongly associated with
    private formal-sector job creation than with the expansion of cash transfers or
    social-assistance programmes alone, over 15-25 year windows in low- and middle-income
    countries 1995-2020. The claim is conditional on controlling for initial poverty
    depth, human capital, and agricultural productivity growth.

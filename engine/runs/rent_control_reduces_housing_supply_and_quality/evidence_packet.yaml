hypothesis:
  id: rent_control_reduces_housing_supply_and_quality
  path: hypotheses/housing/rent_control_reduces_housing_supply_and_quality.yaml
  school: null
  topic: housing
  claim: 'Binding rent control (price ceilings below market clearing with enforcement
    teeth) reduces aggregate housing supply in affected markets, reduces the quality
    of existing rent-controlled stock through reduced maintenance incentives, and
    produces distributional effects favouring long-tenure incumbents over mobile workers
    and new household formation. These effects are well-identified in the literature
    and represent a framework-validation opportunity: consensus among economists is
    ~93% that rent control reduces housing availability and quality (IGM Forum survey).
    If the framework cannot reproduce this on natural- experiment data (Berlin Mietendeckel
    2020-2021, San Francisco 1994 expansion, Stockholm persistent control), it is
    broken.

    '

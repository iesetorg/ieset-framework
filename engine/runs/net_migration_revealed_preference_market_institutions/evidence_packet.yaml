hypothesis:
  id: net_migration_revealed_preference_market_institutions
  legacy_id: null
  path: hypotheses/labour/net_migration_revealed_preference_market_institutions.yaml
  school: null
  topic: labour
  claim: Net migration flows per 1,000 population across countries 1990-2020 are positively
    associated with stronger market institutions (higher Economic Freedom of the World
    composite, lower OECD PMR product-market regulation, and stronger rule of law),
    after controlling for per-capita income level, common language networks, and proximity
    to armed conflict. The claim is that revealed preference in migration patterns
    favors institutional environments with secure property rights and open markets
    over state-directed alternatives at comparable income levels.

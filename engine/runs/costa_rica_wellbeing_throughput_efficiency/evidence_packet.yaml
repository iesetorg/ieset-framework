preregistration:
  claim: Costa Rican post-1950 development path achieves life expectancy comparable
    to the US at roughly one-fifth the per-capita material throughput, demonstrating
    the feasibility of high-wellbeing low-throughput trajectories.
  falsification_rule: 'PRIMARY (dispositive): the hypothesis is SUPPORTED if BOTH
    (a) the mean Costa Rica / United States life-expectancy ratio over 2010-2020 is
    at least 0.97 AND (b) the mean Costa Rica / United States per-capita CO2-emissions
    ratio over 2010-2020 is at most 0.30. The hypothesis is REFUTED if both primaries
    fail, or if the throughput test misses by more than half (ratio > 0.45). PARTIAL
    if exactly one primary holds and the other misses by less than half. INCONCLUSIVE
    if either series lacks 2010-2020 panel coverage for CRI or USA.'
  threshold: 'PRIMARY: mean(LE_CRI / LE_USA, 2010-2020) >= 0.97 AND mean(CO2pc_CRI
    / CO2pc_USA, 2010-2020) <= 0.30'
  estimator:
    template: descriptive
    notes: "Bilateral CRI vs USA descriptive comparison 1950-2023. PRIMARY statistics\
      \ are the country-level mean of the annual values in the 2010-2020 window for\
      \ life-expectancy and per-capita CO2 (throughput proxy). Trajectories from 1950\
      \ are emitted with annotations for the 1948 army abolition and 1941 Caja-founded\
      \ universal healthcare for descriptive context. Not causal \u2014 institutional\
      \ history is specific and unscalable; the bilateral comparison is offered as\
      \ proof-of-concept, not as a causal claim about replicable mechanisms.\n"
  steelman: null

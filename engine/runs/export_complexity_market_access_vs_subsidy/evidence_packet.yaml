hypothesis:
  id: export_complexity_market_access_vs_subsidy
  legacy_id: null
  path: hypotheses/trade/export_complexity_market_access_vs_subsidy.yaml
  school: null
  topic: trade
  claim: 'In a panel of middle-income countries 1990-2020, export complexity (Hausmann-Hidalgo
    Economic Complexity Index) rises more following reforms that improve foreign market
    access and reduce domestic entry barriers than following expansions of subsidy-only
    industrial policy. The claim is directional: a one-standard-deviation improvement
    in market-access and competition conditions predicts a larger ECI gain over the
    subsequent decade than a one-standard-deviation increase in subsidy intensity,
    controlling for initial complexity, income, and human capital.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: 'proxy screen: market access predicts higher WDI high-tech export share,
    but broad diversification does not confirm'
  status: PARTIAL
preregistration:
  claim: 'In a panel of middle-income countries 1990-2020, export complexity (Hausmann-Hidalgo
    Economic Complexity Index) rises more following reforms that improve foreign market
    access and reduce domestic entry barriers than following expansions of subsidy-only
    industrial policy. The claim is directional: a one-standard-deviation improvement
    in market-access and competition conditions predicts a larger ECI gain over the
    subsequent decade than a one-standard-deviation increase in subsidy intensity,
    controlling for initial complexity, income, and human capital.

    '
  falsification_rule: "SUPPORTED if \u03B21 (market access) is positive and significant\
    \ at p<0.05 while \u03B22 (subsidy) is insignificant or negative, AND |\u03B2\
    1| > |\u03B22|. PARTIAL if both are positive and significant but \u03B21 > \u03B2\
    2. REFUTED if \u03B21 is negative and significant or if \u03B22 is positive and\
    \ significantly larger than \u03B21. INFORMATIVE: excluding China should not flip\
    \ the sign of \u03B21; if it does, the result is a China-driven artefact.\n"
  threshold: "\u03B2_market_access > 0 at p<=0.05  AND |\u03B2_market_access| > |\u03B2\
    _subsidy|  AND Ex-China robustness retains sign of \u03B2_market_access.\n"
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel with decade-long differences (1990-2000, 2000-2010, 2010-2020)\
      \ to reduce noise and capture medium-run structural change. Primary specification:\
      \ \u0394ECI = \u03B21*\u0394market_access + \u03B22*\u0394subsidy_index + controls\
      \ + FE. Mechanism decomposition via high-tech export share and product-count\
      \ channels. Robustness: exclude China (dominates ECI dynamics) and check if\
      \ result holds.\n"
  steelman: hypotheses/steelman/export_complexity_market_access_vs_subsidy.md

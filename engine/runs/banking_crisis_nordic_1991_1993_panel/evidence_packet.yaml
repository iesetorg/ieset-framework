  school: null
  topic: regulatory
  claim: 'The 1988-1993 Nordic banking crises (Norway 1988-1991, Sweden 1991-1992,
    Finland 1991-1993) are a canonical post-deregulation credit-boom-bust panel. Following
    the mid-1980s liberalisation of credit and capital markets, all three countries
    experienced bank-credit-to-GDP run-up of >= 25 pp, real-house-price decline of
    >= 25%, real-GDP contraction of >= 5%, large bank rescues / nationalisations,
    and Laeven-Valencia banking-crisis coding. The hypothesis is that the canonical
    multi-metric pattern is met across at least 3 of 3 countries on at least 4 of
    5 metrics.

    '

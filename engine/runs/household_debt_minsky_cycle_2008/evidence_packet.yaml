hypothesis:
  id: household_debt_minsky_cycle_2008
  legacy_id: null
  path: hypotheses/monetary/household_debt_minsky_cycle_2008.yaml
  school: null
  topic: monetary
  claim: 'Post-Keynesian / Minsky reading: across advanced economies in the decade
    preceding the 2008 GFC, the rise in household credit-to-GDP was the leading indicator
    of subsequent banking-sector distress. The hypothesis tests, in a panel of OECD
    countries 1995-2010, whether the change in household credit-to-GDP over a five-year
    window predicts Laeven-Valencia-classified banking-crisis onset 2007-2010, with
    a predictive coefficient material in magnitude and surviving conditioning on standard
    macro controls. A market-liberal "subprime-as-policy- failure" reading attributes
    the same pattern to a US-specific Community Reinvestment Act / GSE channel; the
    cross-country panel test discriminates by showing the relationship holds across
    countries with very different mortgage policy regimes.

    '
verdict:
  raw: REFUTED
  bucket: refuted
  reason: coef=+0.3776 (sign opposite claim -), p=0.00198
  status: REFUTED
preregistration:
  claim: 'Post-Keynesian / Minsky reading: across advanced economies in the decade
    preceding the 2008 GFC, the rise in household credit-to-GDP was the leading indicator
    of subsequent banking-sector distress. The hypothesis tests, in a panel of OECD
    countries 1995-2010, whether the change in household credit-to-GDP over a five-year
    window predicts Laeven-Valencia-classified banking-crisis onset 2007-2010, with
    a predictive coefficient material in magnitude and surviving conditioning on standard
    macro controls. A market-liberal "subprime-as-policy- failure" reading attributes
    the same pattern to a US-specific Community Reinvestment Act / GSE channel; the
    cross-country panel test discriminates by showing the relationship holds across
    countries with very different mortgage policy regimes.

    '
  falsification_rule: 'Not supported if (a) the coefficient on household-credit-GDP
    five-year change is statistically zero or negative as a crisis predictor (p >
    0.10), OR (b) the predictive power disappears after conditioning on real house-price
    change (i.e. household credit predicts only because it is collinear with the housing
    boom and adds no independent information), OR (c) the AUC of household-credit
    change as a crisis predictor is below 0.65 in the OECD pre-2008 panel, indicating
    it is not a useful predictor relative to alternatives like current-account deficit.

    '
  threshold: 'coef(household_credit_change) > 0 at p < 0.10 AND coefficient survives
    real-house-price conditioning AND AUC of household-credit change >= 0.65

    '
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    notes: 'Panel logit / linear-probability regression of 2007-2010 banking-crisis-onset
      indicator on lagged household-credit-GDP five-year change, conditioning on real
      house-price change and macro controls. Country FE only (year FE would absorb
      the crisis- onset year). Robustness: Schularick-Taylor JST long-run banking
      crisis sample for cross-validation, and ROC-curve report of AUC for credit-change
      vs alternatives as crisis predictor.

      '
  steelman: hypotheses/steelman/household_debt_minsky_cycle_2008.md

  school: null
  topic: growth
  claim: "Taiwan's semiconductor industrial policy \u2014 anchored by ITRI's 1980s\
    \ technology incubation, the 1987 spin-off of TSMC under government ownership,\
    \ the Hsinchu Science Park ecosystem, and sustained R&D-intensity targeting through\
    \ 2024 \u2014 produced one of the largest industrial-policy successes in modern\
    \ economic history. Taiwan's manufacturing value-added share of GDP remains above\
    \ 30% through 2023 (vs OECD typical 12-18%); R&D / GDP exceeds 3.5% by 2022 (top-5\
    \ globally); high-tech exports / total manufacturing exports exceed 60% by 2022\
    \ (top-tier globally); and TFP index growth 1985-2019 exceeds OECD median by at\
    \ least +0.5pp/yr."

  school: null
  topic: growth
  claim: "Vietnam's post-1995 trajectory \u2014 building on the 1986 Doi Moi reforms\
    \ through US trade-normalisation 1995, ASEAN accession 1995, BTA with the US 2001,\
    \ WTO accession 2007, EVFTA 2020, and a deliberate FDI manufacturing-attraction\
    \ strategy \u2014 produced sustained convergence to middle-income levels, with\
    \ real GDP-per-capita (PPP) growth averaging at least 4.5 percentage points per\
    \ year above the SE-Asian peer panel mean (PHL, IDN, KHM, LAO, BGD, MMR) over\
    \ 1995-2019. The cumulative log-gap by 2019 vs the peer panel exceeds +0.6 log\
    \ points (~+82% in levels)."

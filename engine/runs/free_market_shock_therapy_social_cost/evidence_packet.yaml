  path: hypotheses/institutional_quality/free_market_shock_therapy_social_cost.yaml
  school: null
  topic: institutional_quality
  claim: "Rapid market liberalisation (price decontrol, mass privatisation, trade\
    \ opening) under weak institutions produces large short-run welfare losses\u2014\
    rising mortality, falling life expectancy, rising inequality, and collapsing output\u2014\
    that may persist for at least a decade, compared to gradual reformers or non-reformers\
    \ at similar initial income levels. The claim challenges naive laissez-faire by\
    \ documenting the social cost of reform speed when institutional scaffolding is\
    \ absent, over 1989-2010."

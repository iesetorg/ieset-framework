  id: cuba_socialist_economy_stagnation_1960_2023
  legacy_id: null
  path: hypotheses/growth/cuba_socialist_economy_stagnation_1960_2023.yaml
  school: null
  topic: growth
  claim: "Cuba's post-1959 socialist policy regime (Castro 1959-2008 + Ra\xFAl 2008-2018\
    \ + D\xEDaz-Canel 2018-present, characterised by single-party rule, state ownership\
    \ of most productive assets, ration-card consumption, FX duality, and chronic\
    \ suppression of private enterprise) produced a canonical 60-year material stagnation\
    \ that manifests as \u22657 of 10 pre-registered extreme-outcome metrics, each\
    \ drawn from an independent data source and measuring a different causal layer.\
    \ Unlike Venezuela or Zimbabwe \u2014 which are episodic collapses \u2014 Cuba's\
    \ pattern is persistent-state stagnation punctuated by the 1989-1993 Special Period.\
    \ The canonical-case claim is that no non-war Latin American peer in the 1960-2023\
    \ window matches even 4 of these 10 thresholds simultaneously; Cuba matches most.\
    \ A refutation (\u22643 metrics met) would indicate that the framework's institutional-\
    \ quality coding of Cuba is overstated, that Cuba's material- welfare gap versus\
    \ peer LatAm has been systematically mismeasured, or that US embargo effects dominate\
    \ the institutional channel.\n"

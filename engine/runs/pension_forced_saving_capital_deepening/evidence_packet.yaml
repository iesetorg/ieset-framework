hypothesis:
  id: pension_forced_saving_capital_deepening
  legacy_id: null
  path: hypotheses/fiscal/pension_forced_saving_capital_deepening.yaml
  school: null
  topic: fiscal
  claim: 'Forced-saving pension systems (mandatory defined-contribution or provident
    funds with significant asset accumulation) raise capital deepening (capital per
    worker) and support catch-up real GDP per worker growth in developing and emerging
    economies, but do not guarantee frontier total factor productivity growth, in
    a broad-country panel 1980-2020. The directional claim is that a 10-percentage-point
    increase in pension-fund assets under management as a share of GDP predicts a
    5-15% increase in capital per worker over the following decade, with the effect
    on TFP growth insignificant or smaller than the capital-deepening effect.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=+0.001942, p=0.172 (above \u03B1=0.10); direction inconclusive"
  status: PARTIAL
preregistration:
  claim: 'Forced-saving pension systems (mandatory defined-contribution or provident
    funds with significant asset accumulation) raise capital deepening (capital per
    worker) and support catch-up real GDP per worker growth in developing and emerging
    economies, but do not guarantee frontier total factor productivity growth, in
    a broad-country panel 1980-2020. The directional claim is that a 10-percentage-point
    increase in pension-fund assets under management as a share of GDP predicts a
    5-15% increase in capital per worker over the following decade, with the effect
    on TFP growth insignificant or smaller than the capital-deepening effect.

    '
  falsification_rule: "SUPPORTED if \u03B21 (pension assets) is positive and significant\
    \ at p<0.10 for capital-per-worker growth, AND is insignificant or materially\
    \ smaller for TFP growth. PARTIAL if positive and significant for both but the\
    \ capital-deepening coefficient is at least twice the TFP coefficient. REFUTED\
    \ if \u03B21 is negative and significant for capital per worker, or if \u03B2\
    1 is positive and significant for TFP growth with no capital-deepening effect\
    \ (suggesting a spurious correlation). INFORMATIVE: the result should survive\
    \ excluding Singapore and Chile; if not, it is a two-country story.\n"
  threshold: "\u03B2_pension_assets (capital per worker) > 0 at p<=0.10  AND \u03B2\
    _pension_assets (TFP) p >= 0.10 or |\u03B2_tfp| < 0.5 \xD7 |\u03B2_capital|  AND\
    \ Ex-Singapore-Chile robustness retains sign of \u03B2_pension_assets for capital.\n"
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel with decomposition: capital per worker growth = \u03B2\
      0 + \u03B21*pension_assets + controls + FE. TFP growth regressed separately.\
      \ Mechanism decomposition via domestic investment and stock-market capitalisation\
      \ channels. Robustness: (1) IV for pension assets using year-of-pension-reform\
      \ indicators (major DC reforms: Chile 1981, Australia 1992, etc.); (2) subsample\
      \ by income level (catch-up vs frontier); (3) exclude Singapore and Chile (dominant\
      \ forced-saving cases).\n"
  steelman: hypotheses/steelman/pension_forced_saving_capital_deepening.md

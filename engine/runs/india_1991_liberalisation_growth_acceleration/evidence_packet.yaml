  school: null
  topic: growth
  claim: 'India''s 1991 balance-of-payments-crisis-driven liberalisation programme
    (Manmohan Singh''s package: rupee devaluation, industrial delicensing, trade liberalisation,
    FDI opening, partial financial- sector reform) produced a sustained acceleration
    in per-capita GDP growth. Pre-reform (1965-1990) annualised real GDP-per-capita
    growth was substantially lower than post-reform (1992-2019, pre-COVID) annualised
    growth by at least 2 percentage points per year on a sustained basis. The effect
    is identifiable even at the smaller within-country structural-break scale.

    '

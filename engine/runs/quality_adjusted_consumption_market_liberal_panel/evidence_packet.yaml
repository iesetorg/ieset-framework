  school: null
  topic: distribution
  claim: Quality-adjusted real household consumption per capita grew faster in market-liberal
    economies than in state-directed peers over 30-year windows from 1960-2020, after
    controlling for initial income level, human capital, and demographic structure.
    Quality adjustment is proxied by the expansion of product variety and falling
    relative prices of durables and services attributable to trade and entry liberalisation.

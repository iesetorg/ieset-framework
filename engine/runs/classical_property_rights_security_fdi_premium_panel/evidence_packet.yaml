  claim: 'Across countries 2000-2022, higher WGI Political Stability (PV.EST) and
    Rule of Law (RL.EST) jointly predict higher subsequent FDI inflows as a share
    of GDP, conditional on initial income, market size, openness, and natural-resource
    rents. The Smithian / classical-liberal claim is that secure property rights and
    predictable adjudication are the binding constraints on the marginal foreign-investor
    decision to commit irreversible capital; the test is a panel-FE regression of
    5-year-forward mean FDI inflows on a composite property-rights-security index
    built from WGI PV and RL.

    '

  school: null
  topic: housing
  claim: 'In BIS country-quarter panels, an elevated credit-to-GDP gap predicts a
    subsequent real residential property-price reversal. A credit boom should leave
    housing markets fragile enough that, after country fixed effects and common calendar-year
    shocks, high-gap quarters are followed by materially weaker three-year real house-price
    growth.

    '
verdict:
  raw: supported
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: 'In BIS country-quarter panels, an elevated credit-to-GDP gap predicts a
    subsequent real residential property-price reversal. A credit boom should leave
    housing markets fragile enough that, after country fixed effects and common calendar-year
    shocks, high-gap quarters are followed by materially weaker three-year real house-price
    growth.

    '
  falsification_rule: 'Falsified if high BIS credit-gap quarters do not predict materially
    weaker subsequent real house-price growth after fixed effects, or if the raw high-gap
    contrast is not economically negative.

    '
  threshold: 'Supported only if coefficient(high_credit_gap) <= -3.0 percentage points
    with cluster-robust p <= 0.05, raw high-minus-normal mean outcome <= -3.0 percentage
    points, at least 600 observations, and at least 20 countries. Partial if exactly
    one of the regression or raw contrast gates clears.

    '
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: 'Country-quarter panel. Threshold is deliberately high and known before
      execution: credit gap >= 10 percentage points. The outcome is forward, so the
      contemporaneous high-gap marker cannot mechanically include the reversal window.

      '
  steelman: hypotheses/steelman/bis_credit_gap_house_price_reversal_panel.md

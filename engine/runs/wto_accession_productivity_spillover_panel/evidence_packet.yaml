hypothesis:
  id: wto_accession_productivity_spillover_panel
  legacy_id: null
  path: hypotheses/trade/wto_accession_productivity_spillover_panel.yaml
  school: null
  topic: trade
  claim: 'WTO accession predicts total factor productivity (TFP) growth spillovers
    through increased import competition and expanded export market access, especially
    in episodes where domestic entry barriers also fall, in a panel of accession and
    non-accession countries 1995-2020. The directional claim is that accession countries
    experience faster TFP growth in the 10-year post-accession window than matched
    non-accession peers, with the effect magnified when domestic product-market regulation
    (entry barriers) declines concurrently.

    '
verdict:
  raw: INCONCLUSIVE_DATA_PENDING
  bucket: inconclusive
  reason: treatment 'wto_accession_indicator' has no within-country variation under
    country fixed effects
  status: INCONCLUSIVE_DATA_PENDING
preregistration:
  claim: 'WTO accession predicts total factor productivity (TFP) growth spillovers
    through increased import competition and expanded export market access, especially
    in episodes where domestic entry barriers also fall, in a panel of accession and
    non-accession countries 1995-2020. The directional claim is that accession countries
    experience faster TFP growth in the 10-year post-accession window than matched
    non-accession peers, with the effect magnified when domestic product-market regulation
    (entry barriers) declines concurrently.

    '
  falsification_rule: 'SUPPORTED if the ATT on TFP growth over the 10-year post-accession
    window is positive and significant at p<0.10, AND the effect is larger (by at
    least 50% in point estimate) for the subsample where domestic entry barriers also
    fell. PARTIAL if the main ATT is positive and significant but the interaction
    with entry-barrier reduction is insignificant (market access alone drives the
    effect). REFUTED if the ATT is negative and significant at p<0.10. INFORMATIVE:
    pre-trend coefficients t-5 to t-1 should be jointly insignificant; significant
    pre-trends invalidate the parallel-trends assumption.

    '
  threshold: "ATT (TFP growth, 10yr post) > 0 at p<=0.10  AND ATT_entry_barrier_fall\
    \ >= 1.5 \xD7 ATT_entry_barrier_stable  AND Pre-trend F-test p >= 0.10.\n"
  estimator:
    template: event_study
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Event-study design with dynamic treatment effects estimated year-by-year
      from t-5 to t+10 relative to WTO accession. Parallel trends assessed via pre-trend
      coefficients. Primary estimator: Callaway-Sant''Anna staggered DiD with not-yet-treated
      and never-treated controls. Secondary: synthetic DiD (Arkhangelsky et al.) for
      robustness to heterogeneous treatment effects. Interaction with domestic entry-barrier
      reduction estimated via subsample split and via explicit interaction term.

      '
  steelman: hypotheses/steelman/wto_accession_productivity_spillover_panel.md

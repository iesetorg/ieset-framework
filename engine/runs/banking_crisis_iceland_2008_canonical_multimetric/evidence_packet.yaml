  legacy_id: null
  path: hypotheses/regulatory/banking_crisis_iceland_2008_canonical_multimetric.yaml
  school: null
  topic: regulatory
  claim: 'The 2008 Icelandic banking collapse (failure of Glitnir, Landsbanki, and
    Kaupthing in October 2008) is a canonical case of a small-open-economy systemic
    banking crisis driven by external-funded balance-sheet expansion exceeding any
    plausible lender-of- last-resort capacity. The hypothesis is that the Iceland
    2008 episode meets the canonical-case checklist with extreme metric values: at
    least 5 of 6 pre-registered metrics (bank-assets-to-GDP, ISK depreciation, real-GDP
    contraction, unemployment rise, IMF programme entry, sovereign-yield spike) hit
    thresholds well above the cross-country GFC norm.

    '

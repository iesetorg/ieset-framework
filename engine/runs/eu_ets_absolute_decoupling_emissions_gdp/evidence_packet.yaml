  claim: 'Across the EU-27 panel 2005-2023, territorial CO2 emissions declined in
    absolute terms while real GDP rose -- a pattern-consistent absolute-decoupling
    regime. The decoupling fact directly refutes the position that growth in advanced
    capitalist economies necessarily increases territorial emissions, and it survives
    the consumption-based-emissions cross-check at a smaller magnitude.

    '
  falsification_rule: 'SUPPORTED iff (a) pooled-EU territorial CO2 2023 / 2005 <=
    0.85 (i.e. >= 15% absolute decline), AND (b) pooled-EU real GDP 2023 / 2005 >=
    1.10 (>= 10% growth), AND (c) consumption-based CO2 per capita 2023 / 2005 <=
    1.0 (no consumption-side increase). REFUTED if either (a) or (b) fails. PARTIAL
    if (a) and (b) hold but (c) fails (consumption-based emissions rose -- territorial
    decoupling is offshoring artefact). METHOD_VALID: at least 22 of 27 EU member
    states have both 2005 and 2023 observations on EEA inventory + WDI real GDP; OWID
    consumption-based panel covers >=20 EU countries.

    '
  threshold: 'PRIMARY: pooled co2_2023/co2_2005 <= 0.85 AND gdp_2023/gdp_2005 >= 1.10
    AND consumption_co2_pc_2023 / consumption_co2_pc_2005 <= 1.0'
  estimator:
    template: descriptive
    clustering: country
    notes: 'Two-leg descriptive test on the EU-27 panel 2005-2023. Leg A: pooled (population-weighted)
      territorial CO2 in 2023 vs 2005, log change. Leg B: pooled real GDP in 2023
      vs 2005, log change. Absolute decoupling holds iff leg A is negative AND leg
      B is positive. Country-level dispersion reported in diagnostics (which countries
      decoupled, by how much, on which leg). Consumption-based emissions cross-check
      repeats Leg A on the OWID consumption-CO2 series; if territorial decoupled but
      consumption-based did not, the decoupling is partly offshoring and the verdict

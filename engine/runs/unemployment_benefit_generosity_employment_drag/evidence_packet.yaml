  claim: 'In a broad-country panel 1990-2019, higher unemployment-benefit generosity
    (proxied by public social expenditure on unemployment programmes as a share of
    GDP and by the OECD net replacement rate where available) predicts lower employment-to-population
    ratios and higher structural unemployment, controlling for cyclical conditions,
    institutional quality, and demographic structure. The directional claim is that
    a 5 percentage-point increase in net replacement rate is associated with at least
    a 1 percentage-point decrease in the employment-to-population ratio.

    '

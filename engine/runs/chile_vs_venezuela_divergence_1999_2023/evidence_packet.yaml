preregistration:
  claim: 'Chile and Venezuela began the 1999-2023 window at broadly comparable GDP
    per capita (PPP, constant international dollars). Over the subsequent 24 years
    Chile continued its institutional-market policy trajectory (fiscal rule, central-bank
    independence, export-diversified commodity model, secure property rights, trade
    openness) while Venezuela ran the Chavismo programme (FX controls, price controls,
    PDVSA politicisation, large-scale nationalisations, monetary-fiscal fusion). By
    2023 the log GDP-per-capita-PPP gap between Chile and Venezuela exceeds 1.2 log-points
    (~230% relative). The bilateral comparison is one of the cleanest natural experiments
    in Latin American development economics because both economies are commodity-dependent,
    Spanish-colonial-legacy Latin American states that diverged on policy content,
    not on initial conditions.

    '
  falsification_rule: "PRIMARY (dispositive): falsified if log_gdp_pc_ppp(CHL, 2023)\
    \ - log_gdp_pc_ppp(VEN, 2023) < 1.20 (i.e. Chile less than ~230% richer per capita\
    \ PPP than Venezuela by 2023), OR if the cumulative log-growth gap 1999\u2192\
    2023 (Chile minus Venezuela) is less than 0.60 log-points. A sign reversal would\
    \ be decisive refutation. INFORMATIVE (not gating): pre-1999 log-gap should be\
    \ small (|gap_1999| < 0.30) to validate the \"began comparable\" framing. If the\
    \ pre-window gap is already large, the post-window divergence is less attributable\
    \ to policy.\n"
  threshold: 'PRIMARY: log_gdp_pc_ppp(CHL, 2023) - log_gdp_pc_ppp(VEN, 2023) >= 1.20
    PRIMARY: cumulative_log_growth(CHL, 1999-2023) - cumulative_log_growth(VEN, 1999-2023)
    >= 0.60 INFORMATIVE: |log_gdp_pc_ppp(CHL, 1999) - log_gdp_pc_ppp(VEN, 1999)| <
    0.30 METHOD_VALID: WDI NY.GDP.PCAP.PP.KD available for both countries across full
    window.

    '

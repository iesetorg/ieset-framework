  status: null
preregistration:
  claim: "Across countries 1990-2020, accession to a substantive free-trade agreement\
    \ (FTA) \u2014 defined as a WTO-notified preferential-trade agreement going beyond\
    \ MFN with measurable bilateral tariff reductions \u2014 is followed by higher\
    \ trade openness and higher per-capita real GDP growth in the post-accession 5-year\
    \ window than in the matched pre-accession 5-year window. The Ricardian / Smithian\
    \ claim is that voluntary trade liberalisation between partners produces measurable\
    \ growth gains via specialisation, scale, and cheaper imported inputs; the test\
    \ is a panel of FTA-accession events using country-year fixed effects to absorb\
    \ global trends and country idiosyncrasies.\n"
  falsification_rule: "SUPPORTED if both (a) the average treatment effect on the treated\
    \ for FTA accession on 5yr-post real-GDP-per-capita cumulative log-growth is positive\
    \ and significant at p<0.05, AND (b) the corresponding ATT on 5yr-post trade-openness\
    \ is positive and significant at p<0.05 (mechanism check). PARTIAL if (b) holds\
    \ but (a) is insignificant \u2014 accession increased trade but didn't measurably\
    \ move growth, the weak Ricardian win. REFUTED if (a) is wrong-signed at p<0.05.\
    \ INFORMATIVE: drop EU-accession events; the coefficient should survive at >50%\
    \ of full-sample magnitude.\n"
  threshold: "PRIMARY: cs_did_ATT(growth_5yr_post) > 0 at p<0.05 AND cs_did_ATT(openness_5yr_post)\
    \ > 0 at p<0.05. INFORMATIVE: ex-EU coefficient retained at >=0.5 \xD7 full-sample\
    \ magnitude.\n"
  estimator:
    template: did_callaway_santanna
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Staggered DiD using Callaway-Sant''Anna estimator on the FTA- accession
      events. Pre-accession trend growth is included as a control to attenuate the
      parallel-trends violation that typically plagues FTA-event studies. Robustness:
      drop EU- accession events (which are bundled with substantial institutional
      reforms and may inflate the estimate).

      '
  steelman: hypotheses/steelman/liberal_free_trade_partner_growth_panel_1990_2020.md

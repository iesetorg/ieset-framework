hypothesis:
  id: expropriation_risk_investment_horizon
  legacy_id: null
  path: hypotheses/institutional_quality/expropriation_risk_investment_horizon.yaml
  school: null
  topic: institutional_quality
  claim: "Across emerging-market and developing economies 1990-2020, higher expropriation\
    \ risk \u2014 measured by ICRG expropriation risk index, Heritage investment-freedom\
    \ score, and political-risk ratings \u2014 predicts shorter investment horizons\
    \ (higher share of short-term investment, lower share of structures and machinery)\
    \ and lower capital intensity in tradable sectors. The pre-registered claim is\
    \ that a one-standard-deviation increase in expropriation risk is associated with\
    \ at least a 3-percentage-point reduction in the structures-and-machinery share\
    \ of investment and at least a 5-percentage-point reduction in the capital-labour\
    \ ratio in manufacturing, after controlling for initial income, financial development,\
    \ and country fixed effects.\n"
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=-2.605, p=0.4 (above \u03B1=0.05); direction inconclusive"
  status: PARTIAL
preregistration:
  claim: "Across emerging-market and developing economies 1990-2020, higher expropriation\
    \ risk \u2014 measured by ICRG expropriation risk index, Heritage investment-freedom\
    \ score, and political-risk ratings \u2014 predicts shorter investment horizons\
    \ (higher share of short-term investment, lower share of structures and machinery)\
    \ and lower capital intensity in tradable sectors. The pre-registered claim is\
    \ that a one-standard-deviation increase in expropriation risk is associated with\
    \ at least a 3-percentage-point reduction in the structures-and-machinery share\
    \ of investment and at least a 5-percentage-point reduction in the capital-labour\
    \ ratio in manufacturing, after controlling for initial income, financial development,\
    \ and country fixed effects.\n"
  falsification_rule: 'Not supported if (a) the coefficient on expropriation risk
    is not negative and significant at p<0.05 on structures-machinery share, OR (b)
    the coefficient is not negative and significant at p<0.05 on capital-labour ratio,
    OR (c) the implied effect of a one-SD increase in risk on structures-machinery
    share is below 1.5 percentage points. A "risk doesn''t matter" reading wins if
    both coefficients are insignificant; a "reverse causation" reading wins if the
    coefficient is positive (richer countries invest more in structures and also have
    lower risk, but within-country changes flip the sign).

    '
  threshold: "panel_FE_beta(expropriation_risk \u2192 structures_machinery_share)\
    \ < 0 at p<0.05 AND panel_FE_beta(expropriation_risk \u2192 capital_labour_ratio)\
    \ < 0 at p<0.05 AND implied_effect_per_1sd_risk_on_structures_share >= 1.5 pp\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Panel FE with investment-horizon and capital-intensity outcomes on expropriation-risk\
      \ index. Country FE absorb persistent cross-country differences. Identification\
      \ from within-country changes in political risk (e.g. Venezuela pre/post Ch\xE1\
      vez, Zimbabwe pre/post land reform, Russia pre/post Yukos). Event- study around\
      \ expropriation episodes as robustness. Instrument: commodity-price volatility\
      \ \xD7 resource dependence as exogenous shock to expropriation risk.\n"
  steelman: hypotheses/steelman/expropriation_risk_investment_horizon.md

hypothesis:
  id: spain_reported_sexual_assault_rate_definition_controlled
  legacy_id: null
  path: hypotheses/labour/spain_reported_sexual_assault_rate_definition_controlled.yaml
  school: null
  topic: labour
  claim: "The Spanish police-recorded sexual-offence rate per 100,000 population cannot\
    \ be interpreted directly across the 7 October 2022 entry into force of Ley Org\xE1\
    nica 10/2022 (\"Ley de garant\xEDa integral de la libertad sexual\", colloquially\
    \ \"solo s\xED es s\xED\"), because that statute redefined the boundaries of the\
    \ sexual-offence category: it replaced the prior distinction between \"abuso sexual\"\
    \ (without violence/intimidation) and \"agresi\xF3n sexual\" (with violence/intimidation)\
    \ with a single consent-based \"agresi\xF3n sexual\" offence category, broadened\
    \ what conduct is prosecutable, and reorganised statistical reporting categories\
    \ used by INE and the Sistema Estad\xEDstico de Criminalidad of the Ministerio\
    \ del Interior. The hypothesis operationalises two separable empirical questions.\
    \ (Q1, descriptive-plus-comparative): on the 2015-2021 sample window \u2014 entirely\
    \ pre-reform \u2014 does the Spanish reported sexual-offence rate trajectory deviate\
    \ from a European comparator pool (FRA, ITA, PRT, DEU, SWE, NLD, BEL) after absorbing\
    \ common-Europe reporting-culture shocks? (Q2, within-country definitional-shift):\
    \ when the 7 October 2022 law takes effect, what is the level-shift in the Spanish\
    \ reported-offence series, how much of it is attributable to the definitional\
    \ reclassification, and how much residual (if any) is attributable to change in\
    \ underlying reporting propensity or underlying offending? Neither question permits\
    \ a raw pre-vs-post comparison of the Spanish series in levels, because the measurement\
    \ instrument changed.\n"

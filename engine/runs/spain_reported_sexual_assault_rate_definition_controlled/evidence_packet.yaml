preregistration:
  claim: "The Spanish police-recorded sexual-offence rate per 100,000 population cannot\
    \ be interpreted directly across the 7 October 2022 entry into force of Ley Org\xE1\
    nica 10/2022 (\"Ley de garant\xEDa integral de la libertad sexual\", colloquially\
    \ \"solo s\xED es s\xED\"), because that statute redefined the boundaries of the\
    \ sexual-offence category: it replaced the prior distinction between \"abuso sexual\"\
    \ (without violence/intimidation) and \"agresi\xF3n sexual\" (with violence/intimidation)\
    \ with a single consent-based \"agresi\xF3n sexual\" offence category, broadened\
    \ what conduct is prosecutable, and reorganised statistical reporting categories\
    \ used by INE and the Sistema Estad\xEDstico de Criminalidad of the Ministerio\
    \ del Interior. The hypothesis operationalises two separable empirical questions.\
    \ (Q1, descriptive-plus-comparative): on the 2015-2021 sample window \u2014 entirely\
    \ pre-reform \u2014 does the Spanish reported sexual-offence rate trajectory deviate\
    \ from a European comparator pool (FRA, ITA, PRT, DEU, SWE, NLD, BEL) after absorbing\
    \ common-Europe reporting-culture shocks? (Q2, within-country definitional-shift):\
    \ when the 7 October 2022 law takes effect, what is the level-shift in the Spanish\
    \ reported-offence series, how much of it is attributable to the definitional\
    \ reclassification, and how much residual (if any) is attributable to change in\
    \ underlying reporting propensity or underlying offending? Neither question permits\
    \ a raw pre-vs-post comparison of the Spanish series in levels, because the measurement\
    \ instrument changed.\n"
  falsification_rule: "The hypothesis has two parts. Q1 is SUPPORTED if, on the pre-reform\
    \ 2015-2021 window with reporting-propensity and media-attention controls, the\
    \ Spain indicator is within \xB10.10 log points of zero at p > 0.10 (i.e., Spain\
    \ is NOT distinguishable from the European reporting-trend) \u2014 this would\
    \ corroborate the interpretation that Spain's pre-reform trajectory tracked the\
    \ European reporting- culture trend rather than representing a Spanish-specific\
    \ offending surge. Q1 is NOT SUPPORTED if the Spain indicator is significantly\
    \ positive (Spain deviates upward from Europe pre-reform), in which case the framework\
    \ reports that Spain's pre-reform trajectory WAS distinct from Europe and the\
    \ critics' pre-reform-rising-trend framing is data-supported.\nQ2 is SUPPORTED\
    \ if the level-shift \u03B2 at 2022-10-07 is positive AND the definitional-component\
    \ decomposition attributes the majority (>50%) of \u03B2 to reclassification \u2014\
    \ corroborating the interpretation that the post-2022 reported-rate spike is primarily\
    \ a measurement- regime change rather than an underlying offending surge. Q2 is\
    \ NOT SUPPORTED if the residual component is positive and large (>50% of \u03B2\
    ), in which case the framework reports that even after definitional adjustment\
    \ there is a substantial residual component which it cannot further decompose\
    \ from aggregate data and which requires dedicated victimisation-survey evidence\
    \ (Encuesta Nacional de Violencia contra la Mujer waves pre- and post-reform)\
    \ to interpret.\nEither outcome is an honest finding. The hypothesis is designed\
    \ to be falsifiable in both directions and is pre-registered specifically to prevent\
    \ selective reporting of whichever direction aligns with the commentator's priors.\n"
  threshold: "Q1 SUPPORTED if |\u03B2_spain_pre_reform| < 0.10 and p > 0.10. Q2 SUPPORTED\
    \ if level-shift \u03B2 > 0 and definitional component accounts for > 50% of \u03B2\
    .\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Q1 (pre-reform 2015-2021, panel): TWFE with country and year fixed effects.\
      \ Outcome: log reported sexual-offence rate per 100k. \u03B2 on a Spain indicator\
      \ identifies the Spanish deviation from the comparator pool's time-average.\
      \ Reporting-propensity and media-attention proxies enter as covariates. The\
      \ test: is Spain's pre-reform 2015-2021 trajectory distinguishable from the\
      \ European reporting- culture trend, or does it track the pool?\nQ2 (within-Spain\
      \ event study, 2018-2023): interrupted time series around the 7 October 2022\
      \ effective date of LO 10/2022. Monthly Ministerio del Interior series preferred;\
      \ annual Eurostat series used where monthly is unavailable. Specification: log(rate)\
      \ = \u03B1 + \u03B2\xB7post_2022_10_07 + \u03B3\xB7t (trend) + \u03B4\xB7t\xB7\
      post (trend break) + month/ year FE + \u03B5. \u03B2 and \u03B4 estimate the\
      \ level shift and trend-break at the reform date.\nThe level-shift \u03B2 in\
      \ Q2 has TWO empirical interpretations that must be reported separately rather\
      \ than conflated:\n  (i) DEFINITIONAL component: the portion of the level-shift\n\
      \      attributable to offences previously categorised as \"abuso\n      sexual\"\
      \ (or other categories) being reclassified into the\n      post-reform \"agresi\xF3\
      n sexual\" category. This is estimated by\n      summing the pre-reform abuso\
      \ + agresi\xF3n cells and comparing\n      to the post-reform consolidated cell\
      \ \u2014 a same-definition\n      comparison that removes the reclassification\
      \ mechanically.\n  (ii) RESIDUAL component: the portion remaining after the\n\
      \      definitional reclassification is removed. This residual is\n      itself\
      \ a composite of (a) change in underlying offending\n      rate, (b) change\
      \ in victim reporting propensity induced by\n      the law's public-communication\
      \ campaign and surrounding\n      media environment, and (c) change in police\n\
      \      classification/recording practices under the new statute.\n      The\
      \ framework CANNOT separate (a)/(b)/(c) from aggregate\n      police-recorded\
      \ data alone; this limitation is pre-\n      registered and the result card\
      \ must state it.\n\nRobustness: (R1) drop DEU from Q1 pool due to 2017 StGB\
      \ \xA7177 reform creating a similar definitional discontinuity in the German\
      \ series; (R2) use convictions-based INE series for Spain as triangulation;\
      \ (R3) report Eurostat's own footnote flags for the Spanish cell and honour\
      \ Eurostat's data-comparability notes explicitly.\n"

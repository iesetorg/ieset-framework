hypothesis:
  id: rule_of_law_market_reform_complementarity
  legacy_id: null
  path: hypotheses/institutional_quality/rule_of_law_market_reform_complementarity.yaml
  school: null
  topic: institutional_quality
  claim: 'Across a broad panel of economies 1980-2020, market reforms (privatisation,
    trade liberalisation, and price decontrol) produce durable gains in real GDP per
    capita growth only when rule-of-law scores exceed a minimum threshold (WGI Rule
    of Law > -0.5, approximately the 40th percentile of the global distribution).
    Below this threshold, market reforms show insignificant or negative associations
    with growth. The pre- registered claim is that the interaction term between market-
    reform intensity and rule-of-law score is positive and significant at p<0.05,
    while the marginal effect of market reform at rule-of-law below -0.5 is not significantly
    positive.

    '
verdict:
  raw: REFUTED
  bucket: refuted
  reason: coef=-0.1439 (sign opposite claim +), p=0.00556
  status: REFUTED
preregistration:
  claim: 'Across a broad panel of economies 1980-2020, market reforms (privatisation,
    trade liberalisation, and price decontrol) produce durable gains in real GDP per
    capita growth only when rule-of-law scores exceed a minimum threshold (WGI Rule
    of Law > -0.5, approximately the 40th percentile of the global distribution).
    Below this threshold, market reforms show insignificant or negative associations
    with growth. The pre- registered claim is that the interaction term between market-
    reform intensity and rule-of-law score is positive and significant at p<0.05,
    while the marginal effect of market reform at rule-of-law below -0.5 is not significantly
    positive.

    '
  falsification_rule: 'Not supported if (a) the interaction coefficient is not positive
    and significant at p<0.05, OR (b) the marginal effect of market reform is positive
    and significant even when rule-of- law is below -0.5 (no threshold effect), OR
    (c) the interaction becomes insignificant when post-Soviet transition countries
    are dropped (indicating the result is driven by one historical episode). A "market
    reform works everywhere" reading wins if (b) holds; a "institutions don''t matter"
    reading wins if both main effect and interaction are insignificant.

    '
  threshold: "panel_FE_beta(market_reform \xD7 rule_of_law) > 0 at p<0.05 AND marginal_effect_reform_at_RL_minus_0.5\
    \ NOT > 0 at p<0.10 AND result robust to excluding POST_SOVIET at p<0.10\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Panel FE with interaction term: market_reform \xD7 rule_of_law. Primary\
      \ test: significance and sign of interaction coefficient. Secondary: sub-sample\
      \ analysis (rule-of-law above vs below threshold). Robustness: use Fraser EFW\
      \ composite instead of constructed reform index; use V-Dem polyarchy instead\
      \ of WGI RL as threshold measure; event-study around large reform episodes (post-Soviet\
      \ transition, China's 1978, India's 1991) with rule-of-law pre-condition as\
      \ moderator.\n"
  steelman: hypotheses/steelman/rule_of_law_market_reform_complementarity.md

  claim: Hong Kong's long-run income convergence to the productivity frontier without
    classic industrial policy (sectoral targeting, directed credit, national champions,
    or SOE promotion) matches or exceeds that of developmentalist East Asian comparators
    after controlling for initial income, human capital, and trade openness. Between
    1960 and 2020, Hong Kong's GDP per capita growth and total factor productivity
    performance are statistically indistinguishable from or superior to South Korea's,
    Taiwan's, and Singapore's, despite the absence of state-led sectoral coordination,
    suggesting that market institutions and trade openness can substitute for industrial
    policy in achieving frontier convergence.

  school: null
  topic: monetary
  claim: 'Across countries 1990-2023, higher de jure and de facto central-bank independence
    predicts lower mean CPI inflation and lower inflation volatility, conditional
    on a basic set of controls (exchange-rate regime, trade openness, fiscal balance,
    initial inflation level). The relationship is expected to be strongest in the
    tails: countries with very low CBI exhibit episodic double-digit inflation; countries
    with very high CBI cluster tightly around 2% targets. The claim is associational
    at the country-year panel level and does not by itself establish that legal reform
    causes inflation discipline, only that the two co-vary as the Rogoff 1985 / Cukierman
    1992 / Garriga 2016 literature suggests.

    '

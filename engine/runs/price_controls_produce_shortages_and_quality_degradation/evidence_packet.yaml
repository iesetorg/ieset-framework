hypothesis:
  id: price_controls_produce_shortages_and_quality_degradation
  legacy_id: null
  path: hypotheses/regulatory/price_controls_produce_shortages_and_quality_degradation.yaml
  school: null
  topic: regulatory
  claim: "Statutory price ceilings set below market-clearing prices reliably produce\
    \ shortages, rationing via queue or privilege, quality degradation, and black-market\
    \ arbitrage \u2014 across every documented episode where enforcement is sustained.\
    \ The empirical record is uniform: US wage-price controls 1971-1974 (Nixon freeze\
    \ + Phase II-IV), US oil price controls 1973-1981 (gasoline lines + shortage crises),\
    \ Venezuela 2003-present (chronic shortage + CPI-deflated official prices diverging\
    \ from parallel-market prices by orders of magnitude), Zimbabwe 2007-2008 (shop-shelf\
    \ emptying), Argentina Precios Cuidados 2014-2023 (product disappearance), Soviet\
    \ peacetime price controls (queueing equilibrium). No documented sustained binding\
    \ price ceiling has produced improved allocation outcomes at policy-relevant scale.\n"

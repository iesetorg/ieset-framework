  id: canada_market_liberalisation_vs_state_industry_1988_2024
  legacy_id: null
  path: hypotheses/growth/canada_market_liberalisation_vs_state_industry_1988_2024.yaml
  school: null
  topic: growth
  claim: "Canada\u2019s long-run prosperity after the Canada\u2013US Free Trade Agreement\
    \ (1988) and NAFTA (1994) is more associated with market openness than with national\
    \ industrial-policy initiatives. In a panel of OECD economies, Canada\u2019s post-1988\
    \ cumulative log GDP-per-capita growth and labour productivity are positively\
    \ associated with trade openness and FDI inflows, while federal industrial-policy\
    \ spending (proxied by government consumption on economic affairs) does not show\
    \ a comparable positive association.\n"

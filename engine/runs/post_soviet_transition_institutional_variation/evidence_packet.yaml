  topic: growth
  claim: Higher transition-era rule-of-law scores are positively associated with higher
    log GDP per capita within the post-Soviet and Eastern European transition cohort
    after country and year fixed effects; Estonia/Poland-style inclusive-institution
    build-out should outperform partial extraction persistence cases such as Russia
    and Ukraine.

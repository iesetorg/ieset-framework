caveats:
- OECD earnings vintages on disk are wage-gap tables, not average annual wages, so
  they are not used as the wage outcome.
- PMR overall and barriers-to-entry coverage in local vintages is limited to 2018
  and 2023.
- 'Proxy-only: OECD PDB labour compensation per hour deflated by WDI CPI replaces
  the unavailable OECD average-wage real-growth series.'
- Result should remain research_only, not a scoreboard candidate, unless exact wage
  series and wider PMR coverage are added.
- Run has unresolved missing-series gates; verdict should not be treated as dispositive.
- WDI real interest rate is documented but excluded from the fitted model because
  it leaves only 16 complete observations.

hypothesis:
  id: frontier_real_wage_growth_market_competition_1980_2024
  legacy_id: null
  path: hypotheses/growth/frontier_real_wage_growth_market_competition_1980_2024.yaml
  school: null
  topic: growth
  claim: 'Across OECD and high-income economies 1980-2024, real wage growth at the
    productivity frontier is stronger in countries with more competitive product markets
    and lower barriers to firm entry. The pre-registered claim is that a one-standard-deviation
    improvement in product-market competition is associated with at least 0.4 percentage
    points higher annual real wage growth and at least 0.3 percentage points higher
    labour-productivity growth, after controlling for initial income, trade openness,
    union density, and sectoral composition.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: proxy-only local rerun does not clear the registered positive/significant
    wage and productivity thresholds
  status: PARTIAL
preregistration:
  claim: 'Across OECD and high-income economies 1980-2024, real wage growth at the
    productivity frontier is stronger in countries with more competitive product markets
    and lower barriers to firm entry. The pre-registered claim is that a one-standard-deviation
    improvement in product-market competition is associated with at least 0.4 percentage
    points higher annual real wage growth and at least 0.3 percentage points higher
    labour-productivity growth, after controlling for initial income, trade openness,
    union density, and sectoral composition.

    '
  falsification_rule: 'Not supported if (a) the coefficient on product-market competition
    is not positive and significant at p<0.05 on real wage growth, OR (b) the coefficient
    is not positive and significant at p<0.05 on labour- productivity growth, OR (c)
    the implied effect of a one-SD competition improvement on real wage growth is
    below 0.20 pp/year. A "monopsony- power / rent-sharing" reading wins if coefficients
    are negative (suggesting more competition hurts worker bargaining power).

    '
  threshold: "panel_FE_beta(competition \u2192 real_wage_growth) > 0 at p<0.05 AND\
    \ panel_FE_beta(competition \u2192 labour_productivity_growth) > 0 at p<0.05 AND\
    \ implied_effect_per_1sd_competition_on_wages >= 0.40 pp/yr\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: 'Panel FE with real-wage and labour-productivity growth outcomes on product-market
      competition index. Identification from within-country variation in PMR reforms
      (e.g. UK 1980s deregulation, EU Services Directive implementation, Japan 1990s
      deregulation). Robustness: exclude small open economies where trade competition
      dominates; control for minimum-wage policy changes; use only PMR-available countries.

      '
  steelman: hypotheses/steelman/frontier_real_wage_growth_market_competition_1980_2024.md

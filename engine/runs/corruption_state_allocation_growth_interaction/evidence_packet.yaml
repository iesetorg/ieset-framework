hypothesis:
  id: corruption_state_allocation_growth_interaction
  legacy_id: null
  path: hypotheses/institutional_quality/corruption_state_allocation_growth_interaction.yaml
  school: null
  topic: institutional_quality
  claim: "Across a broad panel of economies 1980-2020, state allocation of resources\
    \ \u2014 measured by government consumption share, state- enterprise share of\
    \ output, and public-investment share \u2014 has negative long-run effects on\
    \ total-factor-productivity growth when corruption is high (WGI Control of Corruption\
    \ below median), but neutral or positive effects when corruption is low (above\
    \ median). The pre-registered claim is that the interaction term between state-allocation\
    \ intensity and corruption is negative and significant at p<0.05, and that the\
    \ marginal effect of state allocation is negative and significant in the high-corruption\
    \ sub-sample but not significantly negative in the low-corruption sub-sample.\n"
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=+1.645e-05, p=0.995 (above \u03B1=0.05); direction inconclusive"
  status: PARTIAL
preregistration:
  claim: "Across a broad panel of economies 1980-2020, state allocation of resources\
    \ \u2014 measured by government consumption share, state- enterprise share of\
    \ output, and public-investment share \u2014 has negative long-run effects on\
    \ total-factor-productivity growth when corruption is high (WGI Control of Corruption\
    \ below median), but neutral or positive effects when corruption is low (above\
    \ median). The pre-registered claim is that the interaction term between state-allocation\
    \ intensity and corruption is negative and significant at p<0.05, and that the\
    \ marginal effect of state allocation is negative and significant in the high-corruption\
    \ sub-sample but not significantly negative in the low-corruption sub-sample.\n"
  falsification_rule: 'Not supported if (a) the interaction coefficient is not negative
    and significant at p<0.05, OR (b) the marginal effect of state allocation is negative
    and significant even in the low-corruption sub-sample (no conditioning), OR (c)
    the marginal effect is positive and significant in the high- corruption sub-sample
    (reverse of predicted). A "state allocation is always bad" reading wins if (b)
    holds; a "corruption doesn''t matter" reading wins if the interaction is insignificant
    and the main effect of state allocation dominates.

    '
  threshold: "panel_FE_beta(state_allocation \xD7 corruption) < 0 at p<0.05 AND marginal_effect_state_allocation_at_high_corruption\
    \ < 0 at p<0.05 AND marginal_effect_state_allocation_at_low_corruption NOT < 0\
    \ at p<0.10\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Panel FE with interaction: state_allocation \xD7 corruption. Primary test:\
      \ sign and significance of interaction. Sub- sample analysis: high-corruption\
      \ vs low-corruption countries. Robustness: use Fraser EFW government-size instead\
      \ of constructed state-allocation index; use V-Dem corruption index instead\
      \ of WGI; exclude oil exporters (where state allocation is rent-driven, not\
      \ policy-driven).\n"
  steelman: hypotheses/steelman/corruption_state_allocation_growth_interaction.md

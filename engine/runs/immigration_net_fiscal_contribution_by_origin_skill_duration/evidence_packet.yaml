hypothesis:
  id: immigration_net_fiscal_contribution_by_origin_skill_duration
  legacy_id: null
  path: hypotheses/labour/immigration_net_fiscal_contribution_by_origin_skill_duration.yaml
  school: null
  topic: labour
  claim: "The net fiscal contribution of immigrants (taxes paid minus public services\
    \ + transfers received, measured in lifetime NPV terms) varies systematically\
    \ by (a) origin-country institutional quality, (b) skill level at arrival, (c)\
    \ age at arrival, (d) duration of residence, and (e) legal status (working-age\
    \ visa / family reunification / asylum). On average across developed destination\
    \ countries, working-age skilled migrants are net fiscal contributors over lifetime;\
    \ low-skill arrivals and asylum claimants are on average net recipients at least\
    \ during the first 5-10 years. These differences are empirically identified and\
    \ not reducible to ethnicity as a biological variable \u2014 ethnicity correlates\
    \ with outcomes only because it correlates with origin institutions + selection\
    \ + duration.\n"
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: coef=-1.127 (sign matches claim -), p=0.0206
  status: null
preregistration:
  claim: "The net fiscal contribution of immigrants (taxes paid minus public services\
    \ + transfers received, measured in lifetime NPV terms) varies systematically\
    \ by (a) origin-country institutional quality, (b) skill level at arrival, (c)\
    \ age at arrival, (d) duration of residence, and (e) legal status (working-age\
    \ visa / family reunification / asylum). On average across developed destination\
    \ countries, working-age skilled migrants are net fiscal contributors over lifetime;\
    \ low-skill arrivals and asylum claimants are on average net recipients at least\
    \ during the first 5-10 years. These differences are empirically identified and\
    \ not reducible to ethnicity as a biological variable \u2014 ethnicity correlates\
    \ with outcomes only because it correlates with origin institutions + selection\
    \ + duration.\n"
  falsification_rule: 'Not supported if the channel coefficients do NOT have predicted
    signs at p<0.10, OR if origin-country residuals after channel controls are LARGER
    in magnitude than the channel contributions (would suggest unmeasured origin-specific
    factors dominate, weakening the channel- decomposition framing). Additionally,
    if aggregate net fiscal contribution estimates differ by >50% between leading
    methodologies (Dustmann-Frattini vs NASEM vs OECD) and the framework cannot reconcile,
    the literature is too unsettled to support a strong claim.

    '
  threshold: "All 5 channel coefficients with predicted signs at p<0.10  AND mean|origin-country\
    \ residual| < mean|channel contribution|  AND leading-methodology estimates within\
    \ \xB150% of each other\n"
  estimator:
    template: panel_fe_decomposition
    fixed_effects:
    - destination_country
    - year
    clustering: destination_country
    notes: "Two-stage decomposition:\nStage 1: regress per-migrant net fiscal contribution\
      \ on the 5 channels above + destination country FE + year FE. Test whether coefficients\
      \ have predicted signs (origin WGI \u2191 \u2192 contribution \u2191; skilled\
      \ \u2191 \u2192 contribution \u2191; age-at-arrival working-age \u2192 contribution\
      \ \u2191; years-since-arrival \u2191 \u2192 contribution \u2191 with convergence\
      \ to native; asylum initially negative, converges with time).\nStage 2: after\
      \ controlling for the 5 channels, compute residual variation attributable to\
      \ origin-country dummies. This tests the framework's strong claim: origin-country\
      \ residual should be small once institutional-quality + skill + demographics\
      \ + duration are controlled. If origin-country residuals remain large, ethnicity-\
      \ like effects would be identified \u2014 but the honest read is such residuals\
      \ would reflect further unmeasured selection + destination- country reception\
      \ effects (discrimination, integration policy), not biology.\nData requirement:\
      \ destination-country administrative fiscal + migration microdata. Not all 9\
      \ countries have open access \u2014 UK (HMRC+DWP linked), Germany (SOEP), Netherlands\
      \ (CBS), Sweden (SCB), Norway (Statistics Norway), Denmark (Statistics Denmark)\
      \ publish partial data; US relies on NASEM 2017 cohort imputations; AUS + CAN\
      \ published government fiscal models.\n"
  steelman: hypotheses/steelman/immigration_net_fiscal_contribution_by_origin_skill_duration.md

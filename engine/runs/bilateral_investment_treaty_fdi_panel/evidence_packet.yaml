preregistration:
  claim: 'In a broad-country panel 1990-2020, the cumulative stock of bilateral investment
    treaties (BITs) signed predicts higher subsequent net FDI inflows as a share of
    GDP and higher real GDP per capita growth, controlling for institutional quality,
    market size, and trade openness. The directional claim is that each additional
    BIT is associated with at least 0.1 percentage points higher FDI/GDP and 0.05
    percentage points higher annual growth over the following 5-year window.

    '
  falsification_rule: "SUPPORTED if \u03B21 (BIT stock) is positive and significant\
    \ at p<0.10 for both FDI/GDP and GDP growth. PARTIAL if positive and significant\
    \ for FDI but not growth (investment without translation to aggregate growth).\
    \ REFUTED if \u03B21 is negative and significant at p<0.10. INFORMATIVE: excluding\
    \ China should not eliminate the positive sign; if it does, the result is driven\
    \ by China's BIT-FDI link.\n"
  threshold: "\u03B2_BIT_stock (FDI/GDP) > 0 at p<=0.10  AND \u03B2_BIT_stock (GDP\
    \ growth) > 0 at p<=0.10  AND Ex-China robustness retains positive sign.\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Two-way FE panel with 5-year forward windows: FDI(t+1 to t+5) = \u03B2\
      0 + \u03B21*BIT_stock(t) + controls + FE. Robustness: (1) exclude tax-haven\
      \ jurisdictions where FDI is round-tripped; (2) instrument BIT signing with\
      \ partner-country BIT propensity (shift-share); (3) use bilateral FDI flows\
      \ from OECD instead of aggregate WDI; (4) exclude China (dominant FDI recipient).\n"
  steelman: hypotheses/steelman/bilateral_investment_treaty_fdi_panel.md

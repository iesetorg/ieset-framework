  claim: "Liberal democracies experience monotonic positional drift toward larger,\
    \ more redistributive states across multi-decade horizons. The mechanism is a\
    \ set of asymmetric political-economy incentives \u2014 median-voter ageing tilts\
    \ the franchise toward transfer recipients, the managerial / regulatory class\
    \ expands its own scope through new rules, the fiscal flywheel of \"more transfers\
    \ paid for by more taxes on the rich\" is electorally stable, and reversal episodes\
    \ (Mulroney Canada 1984-1993, NZ Rogernomics 1984-1990, Sweden tax-reform-of-the-century\
    \ 1990-91, Greek post-2010 memoranda) are rare and short-lived relative to the\
    \ underlying drift. Falsifiable form: the framework's composite statist-drift\
    \ index (sum of pro-state-axis moves minus pro-market-axis moves, weighted by\
    \ magnitude) shows a positive long-run slope for the median liberal democracy,\
    \ and the share of liberal democracies with net-positive cumulative drift over\
    \ their full coverage window is significantly greater than 50%.\n"

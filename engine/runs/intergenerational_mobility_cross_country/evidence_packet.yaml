hypothesis:
  id: intergenerational_mobility_cross_country
  path: hypotheses/distribution/intergenerational_mobility_cross_country.yaml
  school: null
  topic: distribution
  claim: "Cross-country variation in intergenerational income mobility (commonly measured\
    \ as the rank-rank slope or intergenerational income elasticity) across OECD countries\
    \ is substantially explained by institutional determinants \u2014 education-system\
    \ equality of provision, residential segregation, and housing affordability \u2014\
    \ rather than by the aggregate redistribution level. Specifically: countries with\
    \ more equal public education spending across school districts, lower residential\
    \ income segregation, and more affordable housing in high-opportunity regions\
    \ should show higher mobility after controlling for GDP per capita, the level\
    \ of disposable-income Gini, and institutional quality. The claim aligns with\
    \ the Chetty-Hendren-Kline-Saez opportunity-atlas finding that mobility is generated\
    \ by place-based mechanisms more than by transfer-based redistribution, and generalises\
    \ it cross-country.\n"
verdict:
  raw: INCONCLUSIVE_DATA_PENDING
  bucket: inconclusive
  reason: data gap on oecd:OECD.EDU.IMEP_DSD_EAG_FIN_DF_FIN_RESOURCES_1.0. The spec's
    primary regression cannot be estimated without a mobility outcome series and all
    three institutional-channel series. The v1 notes explicitly data-gate this test
    on an OWID or OECD intergenerational-mobility mirror, OECD Education-at-a-Glance
    subnational spending dispersion, and OECD Affordable Housing Database income-segregation
    indices. No coefficients computed.
  status: data_gap_inconclusive
preregistration:
  claim: "Cross-country variation in intergenerational income mobility (commonly measured\
    \ as the rank-rank slope or intergenerational income elasticity) across OECD countries\
    \ is substantially explained by institutional determinants \u2014 education-system\
    \ equality of provision, residential segregation, and housing affordability \u2014\
    \ rather than by the aggregate redistribution level. Specifically: countries with\
    \ more equal public education spending across school districts, lower residential\
    \ income segregation, and more affordable housing in high-opportunity regions\
    \ should show higher mobility after controlling for GDP per capita, the level\
    \ of disposable-income Gini, and institutional quality. The claim aligns with\
    \ the Chetty-Hendren-Kline-Saez opportunity-atlas finding that mobility is generated\
    \ by place-based mechanisms more than by transfer-based redistribution, and generalises\
    \ it cross-country.\n"
  falsification_rule: 'Not supported if the three institutional channels (education
    inequality, residential segregation, housing affordability) jointly account for
    less than 40 percent of R-squared in the cross-country mobility regression after
    controlling for GDP per capita, Gini, and government effectiveness. Separately,
    if disposable-income Gini alone (controlling for nothing else) explains more variation
    than the three institutional channels combined, the "institutional determinants
    more than redistribution level" framing is weakened and the Piketty-style "compressed
    income distributions mechanically produce mobility" reading earns standing. Given
    n ~ 20 and the resulting statistical power limits, robust findings require the
    institutional-channel result to survive leave-one-out robustness (no single country
    swings the conclusion).

    '
  threshold: 'partial_r2_institutional_channels >= 0.40  AND partial_r2_institutional_channels
    > partial_r2_gini_alone  AND loo_robust (no single country swings sign of primary
    channel)

    '
  estimator:
    template: panel_fe
    clustering: country
    notes: "Cross-sectional regression (n ~ 20 countries, one mobility point per country);\
      \ no panel dimension. Specification:\n  mobility = b0 + b1*edu_inequality +\
      \ b2*residential_segregation\n  + b3*housing_affordability + b4*controls + epsilon\n\
      Given small n, report bootstrap SEs (1000 replications), partial-R2 decomposition,\
      \ and robustness via Bayesian linear regression with weakly informative priors\
      \ (Horseshoe on coefficients). Leave-one- out robustness to check Nordic-cluster\
      \ and US outlier sensitivity. template=panel_fe slot used for the regression\
      \ mechanics; no fixed effects (cross-section).\n"
  steelman: hypotheses/steelman/intergenerational_mobility_cross_country.md

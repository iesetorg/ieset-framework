  topic: regulatory
  claim: 'Brazil''s January 1999 abandonment of the crawling peg and devaluation of
    the real by >= 35% against USD, combined with the IMF programme negotiated in
    late 1998 and the legacy of the PROER bank-restructuring programme of 1995-1997,
    constitutes a canonical EM exchange-rate-anchor-failure case in which banking-system
    stress was managed without a Laeven-Valencia-coded systemic banking crisis. The
    hypothesis is that Brazil 1998-1999 meets the canonical multi-metric currency-crisis
    signature on at least 3 of 4 metrics, but does not satisfy the systemic-banking-crisis
    threshold.

    '

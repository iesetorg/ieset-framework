hypothesis:
  id: initial_state_share_predicts_drift_reversal
  legacy_id: null
  path: hypotheses/institutional_quality/initial_state_share_predicts_drift_reversal.yaml
  school: null
  topic: institutional_quality
  claim: "Across liberal democracies, the country's general-government spending share\
    \ at the start of the corpus window negatively predicts subsequent statist drift.\
    \ Countries that began with very high state-share (Sweden 1976 ~52%, Italy ~37%,\
    \ France ~40%) have on average reverted \u2014 legislated market-pivot moves \u2014\
    \ while countries that began with relatively constrained state-share (Germany\
    \ ~32%, Switzerland ~26%, Japan ~22%, Korea ~18%) have on average expanded. This\
    \ is the conditional-convergence pattern applied to policy structure rather than\
    \ income: positions regress toward a common median over multi-decade horizons.\
    \ If the pattern holds, then the strong-form managerial-flywheel claim is wrong\
    \ not because liberal democracies don't drift, but because they drift *toward*\
    \ a common position from both directions, not monotonically away from a market-oriented\
    \ baseline.\n"

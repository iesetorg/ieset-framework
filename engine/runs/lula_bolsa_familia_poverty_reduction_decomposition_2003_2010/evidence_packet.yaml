hypothesis:
  id: lula_bolsa_familia_poverty_reduction_decomposition_2003_2010
  legacy_id: null
  path: hypotheses/distribution/lula_bolsa_familia_poverty_reduction_decomposition_2003_2010.yaml
  school: null
  topic: distribution
  claim: "Brazil's substantial 2003-2010 poverty reduction (extreme poverty headcount\
    \ fell from ~10% to ~4% and Gini coefficient from ~0.58 to ~0.53 per PNAD/IPEA\
    \ series) is decomposed across three channels: (a) Bolsa Fam\xEDlia cash-transfer\
    \ expansion (Lei 10,836 of January 2004 consolidating prior CCTs, reaching ~13\
    \ million families by 2010), (b) real minimum-wage valorisation (real minimum\
    \ wage rose over 50% 2003-2010, pulling up the bottom of the formal wage distribution\
    \ and indexed social transfers including BPC), and (c) the 2003-2008 commodity\
    \ boom (export revenue surge, formal-employment growth, wage-bargaining leverage\
    \ from tight labour markets). The pre-registered claim is that channels (a) and\
    \ (b) \u2014 the policy channels \u2014 jointly account for at least 40% of the\
    \ total observed reduction in extreme-poverty headcount AND at least 30% of the\
    \ Gini decline, after controlling for the commodity boom channel via an oil-exporter\
    \ LatAm donor pool (Mexico, Colombia, Peru).\n"
verdict:

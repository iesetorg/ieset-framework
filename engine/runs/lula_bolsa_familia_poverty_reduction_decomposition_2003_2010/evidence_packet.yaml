  bucket: refuted
  reason: coef=-3.733 (sign opposite claim +), p=0.0154
  status: null
preregistration:
  claim: "Brazil's substantial 2003-2010 poverty reduction (extreme poverty headcount\
    \ fell from ~10% to ~4% and Gini coefficient from ~0.58 to ~0.53 per PNAD/IPEA\
    \ series) is decomposed across three channels: (a) Bolsa Fam\xEDlia cash-transfer\
    \ expansion (Lei 10,836 of January 2004 consolidating prior CCTs, reaching ~13\
    \ million families by 2010), (b) real minimum-wage valorisation (real minimum\
    \ wage rose over 50% 2003-2010, pulling up the bottom of the formal wage distribution\
    \ and indexed social transfers including BPC), and (c) the 2003-2008 commodity\
    \ boom (export revenue surge, formal-employment growth, wage-bargaining leverage\
    \ from tight labour markets). The pre-registered claim is that channels (a) and\
    \ (b) \u2014 the policy channels \u2014 jointly account for at least 40% of the\
    \ total observed reduction in extreme-poverty headcount AND at least 30% of the\
    \ Gini decline, after controlling for the commodity boom channel via an oil-exporter\
    \ LatAm donor pool (Mexico, Colombia, Peru).\n"
  falsification_rule: 'Not supported if EITHER (a) the Shapley variance share of channels
    (a) + (b) (BF + minimum wage) in explaining the 2003-2010 extreme-poverty headcount
    decline is less than 40%, OR (b) their share of the Gini decline is less than
    30%, OR (c) the commodity-boom channel (c) alone accounts for more than 60% of
    either decomposition, OR (d) the synthetic-control robustness gap on the BRA series
    is not negative and distinguishable from the donor pool''s own Gini trajectories
    at 10% permutation inference. Any one condition falsifies.

    '
  threshold: 'variance_share(BF + minwage, poverty_headcount) >= 0.40 AND variance_share(BF
    + minwage, gini) >= 0.30 AND variance_share(commodity, both outcomes) <= 0.60
    AND synth_control_gap on BRA negative at p_perm < 0.10

    '
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Panel FE decomposition with Shapley-style variance attribution across
      three channels (BF, min wage, commodity boom). Primary outcome regressions:
      poverty headcount and Gini on channel intensities with country and year FE.
      Donor pool (MEX, COL, PER, CHL, ARG) anchors the commodity-boom counterfactual:
      these LatAm peers experienced the same boom but lacked BF- scale CCT expansion
      and (for some) minimum-wage valorisation. Shapley decomposition reports each
      channel''s marginal share of the explained within-Brazil variance. Robustness:
      synthetic control on BRA using the donor pool, with the synthetic-control gap
      interpreted as the combined BF + minimum-wage effect.

      '

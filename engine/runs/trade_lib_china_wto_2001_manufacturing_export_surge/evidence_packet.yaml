  legacy_id: null
  path: hypotheses/trade/trade_lib_china_wto_2001_manufacturing_export_surge.yaml
  school: null
  topic: trade
  claim: 'China''s WTO accession (2001-12-11) triggered a structural acceleration
    in Chinese merchandise-export intensity and manufacturing value-added relative
    to a synthetic-control donor pool of large emerging economies that did not accede
    to the WTO on the same date. The post-2001 export boom is one of the most consequential
    trade-liberalisation episodes in recorded economic history; this spec tests whether
    it is detectable as a pre/post structural break in WDI national-accounts and trade-share
    data, not whether the boom raised aggregate growth (already covered by china_deng_reform_growth_acceleration_1978).

    '

hypothesis:
  id: monetary_finance_zlb_no_inflation
  legacy_id: null
  path: hypotheses/monetary/monetary_finance_zlb_no_inflation.yaml
  school: null
  topic: monetary
  claim: "Across the 2008-2014 ZLB era and the 2020-2021 pandemic-response window,\
    \ large-scale de-facto monetary finance of fiscal expansion in the US, Japan,\
    \ and the Eurozone did not produce headline-CPI inflation consistent with naive\
    \ quantity-theoretic monetisation predictions: cumulative central-bank balance-sheet\
    \ expansion exceeded 15% of GDP while CPI YoY remained below 3% in each economy\
    \ across both windows. Functional-finance / MMT prediction at slack regimes \u2014\
    \ that monetary-fiscal coordination at the ZLB transmits to output and employment\
    \ with negligible inflation pass-through \u2014 is supported, while the textbook\
    \ hyperinflation-from-money-printing prediction is refuted at the slack-regime\
    \ margin."
verdict:
  raw: REFUTED
  bucket: refuted
  reason: 'CPI threshold breach: USA zlb_2008_2014 peak 3.81% in 2008; USA covid_2020_2021
    peak 4.68% in 2021; Eurozone CPI not loaded'
  status: null
preregistration:
  claim: "Across the 2008-2014 ZLB era and the 2020-2021 pandemic-response window,\
    \ large-scale de-facto monetary finance of fiscal expansion in the US, Japan,\
    \ and the Eurozone did not produce headline-CPI inflation consistent with naive\
    \ quantity-theoretic monetisation predictions: cumulative central-bank balance-sheet\
    \ expansion exceeded 15% of GDP while CPI YoY remained below 3% in each economy\
    \ across both windows. Functional-finance / MMT prediction at slack regimes \u2014\
    \ that monetary-fiscal coordination at the ZLB transmits to output and employment\
    \ with negligible inflation pass-through \u2014 is supported, while the textbook\
    \ hyperinflation-from-money-printing prediction is refuted at the slack-regime\
    \ margin."
  falsification_rule: 'The hypothesis is falsified if any of the following hold: (a)
    CPI YoY exceeds 3% in any 6-month rolling window during 2008-2014 in USA or Japan
    or the Eurozone, (b) CPI YoY exceeds 3% in any 6-month window during 2020-2021
    in any of the three economies, or (c) Granger causality from central-bank balance
    sheet to CPI rejects null at p<0.01 with positive coefficient at h=12-24 months
    on the joint 2008-2021 sample after controlling for output gap and oil prices.'
  threshold: "max(cpi_yoy_6m, USA/JPN/EUR, 2008-2014 union 2020-2021) < 3% AND granger_p(balance_sheet\
    \ \u2192 CPI, h=12-24) > 0.01"
  estimator:
    template: local_projections
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Jord\xE0 local projections of CPI response to central-bank balance-sheet\
      \ expansion shocks, restricted to slack regimes (short-rate \u2264 0.50% AND\
      \ unemployment > NAIRU + 0.5pp). Horizon 1-24 months. Primary falsification:\
      \ peak CPI response not significantly positive at p<0.01 at any horizon. Robustness:\
      \ parametric VAR with monetary-finance indicator as alternative treatment."
  steelman: hypotheses/steelman/monetary_finance_zlb_no_inflation.md

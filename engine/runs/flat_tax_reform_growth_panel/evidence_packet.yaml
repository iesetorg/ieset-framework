  claim: 'Countries that adopted a flat personal-income-tax regime between 1994 and
    2012 experienced faster real GDP per capita growth in the decade following reform
    than matched non-reforming peers, controlling for initial income, institutional
    quality, and trade openness. The directional claim is that flat-tax adoption is
    associated with at least 0.5 percentage points higher annual real GDP per capita
    growth over the post-reform decade.

    '
  falsification_rule: "SUPPORTED if \u03B21 (flat-tax indicator) is positive and significant\
    \ at p<0.10 and the post-reform decade mean growth gap vs synthetic counterfactual\

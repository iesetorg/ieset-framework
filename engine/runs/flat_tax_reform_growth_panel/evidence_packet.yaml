    clustering: country
    notes: "Two-way FE panel with staggered adoption: growth = \u03B20 + \u03B21*flat_tax\
      \ + \u03B22*years_since + controls + FE. Robustness: (1) exclude Russia and\
      \ Estonia (dominant early adopters); (2) use synthetic control for each adopter\
      \ vs matched non-adopters; (3) subsample by OECD vs non-OECD; (4) use Fraser\
      \ EFW tax-burden sub-index as continuous alternative treatment.\n"

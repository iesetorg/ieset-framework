  claim: "Every documented modern hyperinflation episode (Cagan \u226550% monthly\
    \ inflation, Hanke-Krus catalogue) since 1900 falls into one of two categories:\
    \ (a) the issuing state had material foreign-currency or gold-clause obligations,\
    \ hard-currency-pegged debt, or external market dependency that left it operating\
    \ effectively as a currency-user (Weimar reparations, Hungary 1945-46 occupation\
    \ obligations, Yugoslavia FX debt, Zimbabwe USD obligations 2007+, Venezuela USD\
    \ oil revenue dependency, Argentina USD debt, Lebanon USD-pegged banking system,\
    \ Turkey 2021-2024 FX-denominated debt), or (b) the issuing state experienced\
    \ a documented physical supply collapse independent of the monetary regime (Weimar\
    \ Ruhr occupation, Hungary post-WW2 occupation/reparation, Zimbabwe land-reform\
    \ output collapse, Venezuela oil-sector collapse). No documented hyperinflation\
    \ has occurred at a sovereign currency-issuer with no material foreign-currency\
    \ or hard-peg obligations and no contemporaneous supply collapse. The MMT/PK currency-user-vs-issuer\
    \ distinction is empirically supported as a necessary classification axis for\
    \ hyperinflation episodes."

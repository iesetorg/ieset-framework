  topic: institutional_quality
  claim: Across a pre-registered panel of OECD and major emerging-market economies
    from 1996 to 2023, stronger control of corruption predict faster real GDP per
    capita growth after country and year fixed effects and basic macro controls. This
    tests the rent-seeking and rule-bound-competition channels without using the Heritage
    latest-year cross-section as the treatment.

  topic: growth
  claim: Japan's Ministry of International Trade and Industry (MITI) era (1960-1985)
    produced positive catch-up productivity growth through technology licensing coordination
    and scale economies, but Japan's post-1990 stagnation is associated with protected
    domestic sectors, zombie lending to inefficient incumbents, and weak product-market
    competition. The post-1990 TFP growth slowdown is larger than can be explained
    by demographics or macroeconomic deflation alone, after controlling for initial
    income, human capital, and global demand conditions. The claim applies to Japan
    1960-2020 with cross-country comparator benchmarking.

hypothesis:
  id: german_manufacturing_va_decline_2017_2024
  legacy_id: null
  path: hypotheses/growth/german_manufacturing_va_decline_2017_2024.yaml
  school: null
  topic: growth
  claim: 'Germany''s manufacturing value-added share of GDP declined from approximately
    22-23% in 2017 to approximately 18-19% by 2024, a historically large shift for
    a mature economy over seven years. This hypothesis decomposes the decline into
    four channels: (1) energy-cost differential widening (Energiewende policy-content
    + gas shock), (2) unit-labour-cost growth outpacing productivity in German manufacturing
    relative to competitors, (3) Chinese import penetration in intermediate goods
    and machinery displacing German domestic content, and (4) external-demand softening
    (slower global trade-intensive growth, US IRA-induced production re-siting). The
    decomposition is descriptive and attributes shares of the decline to each channel
    using growth-accounting and trade-in-value-added approaches. No single channel
    is expected to explain more than 50% of the decline.

    '

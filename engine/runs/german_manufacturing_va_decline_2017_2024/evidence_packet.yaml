preregistration:
  claim: 'Germany''s manufacturing value-added share of GDP declined from approximately
    22-23% in 2017 to approximately 18-19% by 2024, a historically large shift for
    a mature economy over seven years. This hypothesis decomposes the decline into
    four channels: (1) energy-cost differential widening (Energiewende policy-content
    + gas shock), (2) unit-labour-cost growth outpacing productivity in German manufacturing
    relative to competitors, (3) Chinese import penetration in intermediate goods
    and machinery displacing German domestic content, and (4) external-demand softening
    (slower global trade-intensive growth, US IRA-induced production re-siting). The
    decomposition is descriptive and attributes shares of the decline to each channel
    using growth-accounting and trade-in-value-added approaches. No single channel
    is expected to explain more than 50% of the decline.

    '
  falsification_rule: "Not supported if (a) the manufacturing VA share did not actually\
    \ decline by at least 2 percentage points of GDP between 2017 and 2024, OR (b)\
    \ the residual channel exceeds 60% of the explained variation (meaning the four\
    \ hypothesised channels miss most of what happened), OR (c) any single channel\
    \ exceeds 60% of explained decline (suggesting a monocausal story, which the framework\
    \ explicitly expects not to hold). Report honestly if the SDA yields a story dominated\
    \ by one channel \u2014 that is a legitimate finding even if it contradicts the\
    \ prior.\n"
  threshold: 'manufacturing_va_share_change_2017_to_2024 <= -0.02 AND sum_of_four_channels
    explains >= 40% of change AND no single channel > 60% of explained change

    '
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - year
    notes: "Structural-decomposition analysis (SDA) applied to DEU-only time series\
      \ 2015-2024. The manufacturing-VA-share change \u0394(VA/GDP) is decomposed\
      \ multiplicatively into the four channels using input-output weights (OECD TiVA\
      \ where available) and sector-level growth accounting.\nPrimary specification:\
      \ multiplicative SDA over the four channels, with residual reported explicitly.\
      \ Secondary specification: panel FE with DEU vs peer (FRA, NLD, ITA, SWE) comparators\
      \ and year FE, where each channel enters as an interacted treatment.\nThis is\
      \ a DESCRIPTIVE hypothesis \u2014 the SDA produces an accounting decomposition,\
      \ not causal attribution. Each channel is correlated with the decline, but causal\
      \ weight requires separate identification (e.g., the Energiewende hypothesis\
      \ provides the energy-cost channel causal identification; this hypothesis consumes\
      \ the magnitude).\nKnown limitations: (1) The four channels are not mutually\
      \ orthogonal \u2014 energy cost\n    feeds into ULC (electricity-intensive sectors'\
      \ labour costs);\n    Chinese import penetration responds to ULC. The SDA assigns\n\
      \    shares using order-sensitive decomposition; reporting must\n    show sensitivity\
      \ to decomposition order.\n(2) TiVA data lags; final 2024 numbers won't be available\
      \ until\n    ~2027. v1 uses 2015-2022 for full SDA, 2023-2024 with partial\n\
      \    data.\n(3) Residual channel (unexplained) may be large; this is a feature\n\
      \    (shows how much is not captured by the four hypothesised\n    channels)\
      \ and the writeup must not paper over it.\n"
  steelman: hypotheses/steelman/german_manufacturing_va_decline_2017_2024.md

  school: null
  topic: fiscal
  claim: Across a pre-registered narrower OECD/market-peer panel from 1996 to 2021,
    stronger fiscal balances predict faster real GDP per capita growth after country
    and year fixed effects and basic macro controls. This tests the crowding-out,
    risk-premium, and fiscal-expectations channels as a second-wave market-order hypothesis
    rather than reusing the Heritage latest-year cross-section.

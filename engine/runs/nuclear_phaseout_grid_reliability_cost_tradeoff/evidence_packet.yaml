hypothesis:
  id: nuclear_phaseout_grid_reliability_cost_tradeoff
  path: hypotheses/energy/nuclear_phaseout_grid_reliability_cost_tradeoff.yaml
  school: null
  topic: energy
  claim: "Countries that legislated and executed nuclear phase-outs (Germany 2011-2023,\
    \ Belgium 2003 law with 2025-2035 phase-out, Switzerland 2017 vote) experienced\
    \ over 2010-2024 (a) higher industrial electricity prices, (b) higher wholesale\
    \ electricity price volatility, and (c) greater reliance on fossil-fired back-up\
    \ capacity for grid balancing, relative to nuclear-retaining peers (France, Finland\
    \ post-2023 Olkiluoto 3, Sweden, USA). The hypothesis tests the narrow cost-reliability\
    \ trade-off of nuclear phase-out as a policy choice. It does NOT evaluate the\
    \ safety or waste-management argument for phase-out \u2014 those are outside the\
    \ outcome set and are legitimate welfare considerations the phase-out countries\
    \ weighed in their decisions.\n"
verdict:
  raw: "inconclusive \u2014 Primary outcomes (industrial electricity price, wholesale\
    \ day-ahead volatility, LOLE) remain data-gated. Eurostat NRG_PC_205 is present\
    \ locally but cannot satisfy the preregistered price leg without changing the\
    \ cohort/period: Eurostat NRG_PC_205 has no selected-band rows for preregistered\
    \ countries: CHE, USA; Eurostat NRG_PC_205 lacks full 2010-2024 selected-band\
    \ coverage for: GBR (2021,2022,2023,2024). IEA industrial prices and ENTSO-E wholesale/adequacy\
    \ data are not on disk. Testable surrogate (back-up reliance via fossil share\
    \ of electricity): phase-out cohort fossil-share change -13.7pp vs retain cohort\
    \ -18.2pp \u2014 gap +4.5pp (NOT consistent with +5.0pp threshold). Treatment\
    \ is observed: phase-out cohort nuclear share fell from 41% to 24%; retain cohort\
    \ held 40% to 34%."
  bucket: inconclusive
  reason: null
  status: null
preregistration:
  claim: "Countries that legislated and executed nuclear phase-outs (Germany 2011-2023,\
    \ Belgium 2003 law with 2025-2035 phase-out, Switzerland 2017 vote) experienced\
    \ over 2010-2024 (a) higher industrial electricity prices, (b) higher wholesale\
    \ electricity price volatility, and (c) greater reliance on fossil-fired back-up\
    \ capacity for grid balancing, relative to nuclear-retaining peers (France, Finland\
    \ post-2023 Olkiluoto 3, Sweden, USA). The hypothesis tests the narrow cost-reliability\
    \ trade-off of nuclear phase-out as a policy choice. It does NOT evaluate the\
    \ safety or waste-management argument for phase-out \u2014 those are outside the\
    \ outcome set and are legitimate welfare considerations the phase-out countries\
    \ weighed in their decisions.\n"
  falsification_rule: "PRIMARY (dispositive, requires data not yet on disk): the hypothesis\
    \ is SUPPORTED if (i) mean log industrial electricity price 2010-2024 in the phase-out\
    \ cohort (DEU, BEL, CHE) exceeds the retain cohort (FRA, FIN, SWE, USA, GBR) by\
    \ at least 0.08 log-points (~8.3%) AND (ii) wholesale day-ahead volatility CoV\
    \ is higher in phase-out cohort by at least 20% AND (iii) the effect survives\
    \ a drop-2021-2024 sensitivity that excludes the gas shock. REFUTED if any one\
    \ of (i)-(iii) flips sign with confident methodology. Method-validity failure\
    \ (data gap, FRA 2022 availability shock not handled, pre-trend RMSPE > 0.5\xD7\
    post-RMSPE in synth control) yields INCONCLUSIVE not refuted.\nSURROGATE (testable\
    \ today on OWID-Ember data): mean change in fossil share of electricity 2005\u2192\
    2024 in phase-out cohort minus retain cohort. The hypothesis predicts a positive\
    \ gap (phase-out countries leaned harder on fossils for back-up). Surrogate- supports\
    \ threshold = +5pp gap. Surrogate is informative-only \u2014 it does NOT settle\
    \ the cost or volatility primaries."
  threshold: "PRIMARY (price): \u03B2_phaseout on log industrial price > 0.08 at p<0.10\
    \ over 2010-2024, surviving drop-2021-2024. PRIMARY (volatility): \u03B2_phaseout\
    \ on wholesale CoV > 0 at p<0.10. SURROGATE: phaseout_cohort_fossil_change_pp\
    \ - retain_cohort_fossil_change_pp >= +5.0 percentage points (2005\u21922024)."
  estimator:
    template: did_callaway_santanna
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Primary specification: Callaway-Sant'Anna staggered DiD with treatment\
      \ = legislated nuclear phase-out (DEU 2011, BEL 2003, CHE 2017). Nuclear-retaining\
      \ countries form the control group. Outcome = industrial electricity price.\
      \ Treatment effect heterogeneity by cohort reported.\nSecondary specification:\
      \ continuous-treatment event-study with nuclear-capacity-share-change as intensity\
      \ variable, allowing gradual phase-out to have gradual effect rather than discrete\
      \ at legislation date.\nThird: synthetic control for DEU with donor pool from\
      \ nuclear- retaining peers.\nThe identification requires that nuclear-retaining\
      \ countries are a plausible counterfactual for phase-out countries. This is\
      \ strongest for DEU vs FRA (both large, advanced, EU-member, Western European)\
      \ and weakest for CHE vs USA (different grid, different size). Sensitivity without\
      \ USA reported.\nKnown limitations: (1) Gas-price shock 2021-2023 is exogenous\
      \ and confounds\n    post-2020 treatment effect. Sensitivity drop 2021-2024.\n\
      (2) Renewables build-out is partially substitute for nuclear;\n    the nuclear-phaseout\
      \ treatment and renewables-share control\n    are collinear by design. Coefficient\
      \ interpretation is\n    \"cost effect of phase-out net of the renewables build-out\n\
      \    that replaced it\" \u2014 which is arguably the policy-relevant\n    object.\n\
      (3) FIN added Olkiluoto 3 in 2023 \u2014 coded as \"nuclear-retaining\"\n  \
      \  with capacity expansion; SWE reversed earlier phase-out\n    intent but has\
      \ mixed record; these coding choices matter.\n(4) Loss-of-load-expectation data\
      \ are not consistently reported\n    across countries; this outcome is the weakest\
      \ measured.\n"
  steelman: hypotheses/steelman/nuclear_phaseout_grid_reliability_cost_tradeoff.md

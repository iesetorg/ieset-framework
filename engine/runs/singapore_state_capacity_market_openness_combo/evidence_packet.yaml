  claim: Singapore's long-run prosperity and frontier convergence are better predicted
    by extreme trade openness, strong rule of law, competitive product and services
    markets, and high economic freedom than by state ownership or industrial targeting
    alone. While state capacity (Temasek holdings, sovereign wealth funds, EDB coordination)
    contributed to stability and infrastructure, the marginal contribution of market
    openness and legal institutions to total factor productivity growth exceeds that
    of state ownership intensity over 1965-2020, after controlling for initial income,
    human capital, and geography.

hypothesis:
  id: asian_convergence_vs_western_stagnation_2000_2023
  legacy_id: null
  path: hypotheses/growth/asian_convergence_vs_western_stagnation_2000_2023.yaml
  school: null
  topic: growth
  claim: "From 2000 to 2023, Asian economies that continued market-oriented institutional\
    \ reform from a low starting GDP-per-capita base \u2014 China, India, Vietnam,\
    \ Indonesia, Malaysia, Thailand, Philippines, Bangladesh, Sri Lanka, Cambodia\
    \ \u2014 converged rapidly on Western income levels, with cumulative log GDP-per-capita-PPP\
    \ growth materially greater than incumbent Western economies. The Western group\
    \ showed heterogeneous outcomes \u2014 US and some Nordic economies matched or\
    \ exceeded Asian convergence on levels, while continental EU (Germany, France,\
    \ Italy, Spain) and UK lagged. The divergence is explained primarily by (a) low-base\
    \ catch-up dynamics + market-reform continuation in Asia and (b) specific regulatory-accretion\
    \ + energy-policy constraints in underperforming Western cases \u2014 NOT by a\
    \ generic \"Western socialism\" story. The framework's test: decomposing the cross-regional\
    \ divergence into catch-up dynamics vs policy-regime effects.\n"
verdict:
  raw: "SUPPORTED \u2014 gap +0.74 log-points (>= 0.30 threshold), ~+109% relative.\
    \ Asian mean log-growth +0.98, Western +0.24. Conditional-convergence \u03B2_asian\
    \ = -0.037 (p=0.720) \u2014 reported as informative mechanism colour only; a near-zero\
    \ coefficient is a Solow-regression construction artefact when log_2000 absorbs\
    \ the catch-up signal, not evidence against convergence."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: "From 2000 to 2023, Asian economies that continued market-oriented institutional\
    \ reform from a low starting GDP-per-capita base \u2014 China, India, Vietnam,\
    \ Indonesia, Malaysia, Thailand, Philippines, Bangladesh, Sri Lanka, Cambodia\
    \ \u2014 converged rapidly on Western income levels, with cumulative log GDP-per-capita-PPP\
    \ growth materially greater than incumbent Western economies. The Western group\
    \ showed heterogeneous outcomes \u2014 US and some Nordic economies matched or\
    \ exceeded Asian convergence on levels, while continental EU (Germany, France,\
    \ Italy, Spain) and UK lagged. The divergence is explained primarily by (a) low-base\
    \ catch-up dynamics + market-reform continuation in Asia and (b) specific regulatory-accretion\
    \ + energy-policy constraints in underperforming Western cases \u2014 NOT by a\
    \ generic \"Western socialism\" story. The framework's test: decomposing the cross-regional\
    \ divergence into catch-up dynamics vs policy-regime effects.\n"
  falsification_rule: "PRIMARY (dispositive): the hypothesis is falsified if cumulative\
    \ log GDP-per-capita-PPP growth of the Asian treated group mean minus the Western\
    \ comparison group mean over 2000\u20132023 is less than 0.30 log-points (~35%\
    \ relative), OR the rank order is reversed (Western mean grows faster than Asian\
    \ mean in log terms). INFORMATIVE (not dispositive): the conditional-convergence\
    \ coefficient \u03B2_asian (sign expected positive; known to collapse when log_2000\
    \ absorbs the catch-up signal \u2014 a Solow-regression construction artefact).\
    \ Reported in diagnostics as mechanism colour only.\n"
  threshold: 'PRIMARY: cumulative_log_growth(asian_mean) - cumulative_log_growth(western_mean)
    >= 0.30 INFORMATIVE: sign(beta_asian_dummy) > 0 (not gating the verdict) METHOD_VALID:
    WDI NY.GDP.PCAP.PP.KD for all 24 countries, 2020-2021 COVID years excluded per
    sample.exclusion_rules.

    '
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - year
    notes: 'Two-step design:

      Step 1 (descriptive): compute cumulative log GDP-per-capita-PPP growth 2000-2023
      per country. Rank countries by growth. Expected: Asian treated group in the
      top half; incumbent Western group in the bottom half on cumulative log-growth,
      but NOT on levels (Western still higher in 2023 on absolute GDP-per-capita).

      Step 2 (conditional-convergence test): pooled cross-sectional regression of
      2023 log GDP-per-capita on 2000 log level + asian_treated dummy + controls.
      Coefficient on the dummy, controlling for starting level, identifies Asian-specific
      excess growth conditional on initial income (convergence rate differential).

      Secondary decomposition (data-gated): wealth-tier expansion using Credit Suisse
      / UBS Global Wealth Report (millionaire count by country, annual 2000-present)
      + Forbes billionaire count annual 2000-present. These are specialized data sources
      requiring custom fetchers; pre-registered here for v1.1 run once fetchers land.

      Primary outcome test: cumulative log GDP-per-capita-PPP growth gap between groups.
      Wealth-tier results inform mechanism (growth-driven vs capital-concentration-driven).

      '
  steelman: hypotheses/steelman/asian_convergence_vs_western_stagnation_2000_2023.md

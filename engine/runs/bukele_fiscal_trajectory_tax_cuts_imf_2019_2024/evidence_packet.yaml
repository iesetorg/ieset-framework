  school: null
  topic: fiscal
  claim: 'El Salvador''s fiscal trajectory under Bukele (2019-2024) shows improvement
    in the primary balance and stabilisation (or modest decline) in debt-to-GDP after
    the 2020 COVID spike, achieved via a combination of: (a) the 2022-2023 bond buyback
    / liability-management operations, (b) the 2023 tax reform (lower rates with base-broadening
    and improved compliance), and (c) IMF-signalled fiscal consolidation culminating
    in the Dec 2024 $1.4bn Extended Fund Facility. The pre-registered claim is that
    under a panel decomposition framework, Salvadoran primary balance improvement
    2022-2024 exceeds the Central American peer-group average by at least 1.5 percentage
    points of GDP, and that the dominant channel is spending compression + debt-service
    reduction via liability management, not a revenue-side tax-rise (i.e., the Laffer-style
    lower-rate / broader-base conjecture).

    '

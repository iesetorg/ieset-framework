  claim: Across a pre-registered panel of OECD and major emerging-market economies
    from 1996 to 2023, larger tax-revenue shares predict lower investment shares after
    country and year fixed effects and basic macro controls. This tests the private-incentive,
    retained-earnings, and deadweight-loss channels without using the Heritage latest-year
    cross-section as the treatment.

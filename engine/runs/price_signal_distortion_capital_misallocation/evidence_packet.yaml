  school: null
  topic: regulatory
  claim: "Across a broad panel of developing and emerging-market economies 1980-2020,\
    \ price controls and directed input subsidies predict higher capital misallocation\
    \ \u2014 measured by the dispersion of the marginal product of capital across\
    \ firms or sectors \u2014 and lower long-run total-factor-productivity growth.\
    \ The pre-registered claim is that a one-standard-deviation increase in a composite\
    \ price-distortion index is associated with at least a 5% increase in the standard\
    \ deviation of log-MPK and at least a 0.2-percentage-point reduction in annual\
    \ TFP growth, after controlling for initial income, financial development, and\
    \ state-capacity proxies.\n"

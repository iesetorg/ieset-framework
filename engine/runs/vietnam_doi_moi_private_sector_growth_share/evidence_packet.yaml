  topic: growth
  claim: Vietnam's post-Doi Moi economic growth (1986-2020) is more strongly associated
    with private-sector enterprise entry, trade openness, and market-oriented reforms
    than with state-owned-enterprise (SOE) expansion or continued state direction.
    The acceleration in GDP per capita growth and total factor productivity after
    1990 correlates with rising private-sector employment and output shares, while
    periods of SOE expansion or re-centralisation (late 2000s) are associated with
    slower TFP growth and rising resource misallocation, after controlling for initial
    income, human capital, foreign direct investment, and agricultural transition.

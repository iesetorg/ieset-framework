hypothesis:
  id: financial_boe_independence_1997_macroprudential_2013
  legacy_id: null
  path: hypotheses/monetary/financial_boe_independence_1997_macroprudential_2013.yaml
  school: null
  topic: monetary
  claim: 'The Bank of England''s operational independence (May 1997, instrument-independence
    on monetary policy) and its post-GFC macroprudential remit (Financial Policy Committee
    created April 2013 under the Bank of England Act 2013) are associated with (a)
    lower realised UK CPI-inflation volatility 1997-2008 vs 1985-1997, (b) flatter
    UK credit-cycle amplitude 2014-2022 vs 2000-2007, and (c) lower exchange- rate-passthrough
    volatility post-1997 vs pre-1997. The hypothesis is tested as a pre/post comparison
    on three pre-registered metrics; supports if 2 of 3 metrics show statistically
    significant improvement.

    '
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: "shape=pre_post, sign matches claim -, |\u0394_log|=1.09"
  status: null
preregistration:
  claim: 'The Bank of England''s operational independence (May 1997, instrument-independence
    on monetary policy) and its post-GFC macroprudential remit (Financial Policy Committee
    created April 2013 under the Bank of England Act 2013) are associated with (a)
    lower realised UK CPI-inflation volatility 1997-2008 vs 1985-1997, (b) flatter
    UK credit-cycle amplitude 2014-2022 vs 2000-2007, and (c) lower exchange- rate-passthrough
    volatility post-1997 vs pre-1997. The hypothesis is tested as a pre/post comparison
    on three pre-registered metrics; supports if 2 of 3 metrics show statistically
    significant improvement.

    '
  falsification_rule: 'SUPPORTED if 2 of 3 metrics show post-period values lower than
    pre-period values by at least 25% in magnitude, with t-test p < 0.10. PARTIAL
    if 1 of 3 meets criterion. REFUTED if 0 of 3 meets criterion or any metric shows
    post-period values higher by >= 25%.

    '
  threshold: '>=2 of 3 metrics with post < pre by 25% at p<0.10'
  estimator:
    template: descriptive
    notes: 'Pre/post comparison on three metrics: CPI volatility (5y rolling std)
      1985-1996 vs 1998-2008; credit-cycle amplitude (5y rolling std of credit-growth)
      2000-2007 vs 2014-2022; and ER-passthrough coefficient pre-1997 vs post-1997.
      Robustness: rolling-window estimation; structural-break tests at 1997 and 2013.

      '
  steelman: hypotheses/steelman/financial_boe_independence_1997_macroprudential_2013.md

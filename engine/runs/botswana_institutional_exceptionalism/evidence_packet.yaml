    \ +0.10 OR the growth advantage is \u2264 +0.5 pp/yr. INFORMATIVE (not gating):\
    \ placebo permutation p-value, V-Dem polyarchy gap, WGI government-effectiveness\
    \ gap. Reported in diagnostics. METHOD_VALID: Maddison gdppc available for BWA\
    \ + \u22654 SSA donors over the full 1966-2023 window; pre-fit RMSE on log-GDP\

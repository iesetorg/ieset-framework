  estimator:
    template: synthetic_control
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Synthetic-control with BWA as treated unit and SSA resource-exporter donor
      pool. Pre-treatment fit window 1966-1975 (early independence pre-diamond-boom);
      post-treatment 1976-2023. Primary outcome = log real GDP per capita (Maddison).

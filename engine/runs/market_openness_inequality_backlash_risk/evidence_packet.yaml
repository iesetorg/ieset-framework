  topic: growth
  claim: Market openness (trade and capital-account liberalisation) without complementary
    adjustment institutions (active labour-market policy, regional transfers, wage
    insurance, retraining) raises inequality or regional divergence enough to trigger
    policy reversal (tariff increases, capital controls, populist economic platforms)
    within 10-15 years. The claim applies to middle- and high-income countries 1980-2020
    and challenges the assumption that openness is self-sustaining regardless of distributional
    consequences.

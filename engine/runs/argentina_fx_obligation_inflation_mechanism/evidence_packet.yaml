  falsification_rule: 'Primary v2 descriptive test uses 2014-2023, the overlap window
    where BCRA official FX data, BCRA monthly CPI inflation, WDI external-debt/GNI,
    and IMF fiscal balance are all locally available. High-inflation years are years
    with compounded BCRA monthly inflation above 25%. The FX/fiscal-dominance mechanism
    is supported if every high-inflation year has peso depreciation above 20%, external
    debt/GNI above 30%, and fiscal balance below -2% of GDP, and if the annual inflation-vs-FX-depreciation
    correlation is at least 0.60. It is refuted if fewer than half of high-inflation
    years meet all three mechanism conditions or the inflation-vs-FX correlation is
    below 0.20.

    '

preregistration:
  claim: "Argentina has experienced 12 distinct episodes of annual inflation exceeding\
    \ 50% since 1945, each preceded by a fiscal deficit exceeding 4% of GDP financed\
    \ via central bank money creation. The cross-episode pattern \u2014 Per\xF3n 1952,\
    \ Isabelita and L\xF3pez Rega 1975-76, military junta 1976-83, Alfons\xEDn 1989,\
    \ Menem stabilisation then 2001 default, Kirchner and CFK 2010-2015 acceleration,\
    \ Macri deterioration 2018-19, Fern\xE1ndez 2020-2023, Milei disinflation 2024\
    \ \u2014 demonstrates that Argentine monetary instability is a systemic institutional\
    \ phenomenon driven by weak central bank independence combined with populist fiscal\
    \ commitments, rather than a sequence of independent exogenous shocks. The pre-registered\
    \ claim is that Granger causality tests on annual Argentine data 1950-2023 show\
    \ fiscal deficit (% GDP) Granger-causes CPI inflation at p<0.01 with a lag structure\
    \ of 1-2 years, and that this relationship holds in sub-period robustness checks\
    \ excluding the Convertibility period 1991-2001. Regional peers Brazil, Chile,\
    \ and Uruguay show no comparable fiscal-to-inflation Granger causality at p<0.05\
    \ after their respective institutional reforms, establishing that the phenomenon\
    \ is specific to Argentina's institutional configuration rather than a regional\
    \ commodity-cycle effect.\n"
  falsification_rule: "The hypothesis is falsified if Granger causality of fiscal\
    \ deficit \u2192 CPI inflation fails to achieve p<0.01 in the primary VAR using\
    \ annual 1950-2023 Argentine data, OR if fewer than 8 of the 12 >50% inflation\
    \ episodes are preceded by fiscal deficits exceeding 4% GDP in the prior 1-2 years,\
    \ OR if the same Granger causality is detected at p<0.01 in Chile or Uruguay post-1990\
    \ (which would indicate a regional rather than institutional-specificity effect).\n"
  threshold: "granger_p_value(fiscal_deficit \u2192 CPI_inflation, ARG 1950-2023)\
    \ < 0.01 AND episode_precedence_rate(deficit > 4% GDP in t-1 or t-2) >= 8/12 AND\
    \ granger_p_value(fiscal \u2192 CPI, CHL post-1990) > 0.05\n"
  estimator:
    template: cointegration_vecm
    notes: "Primary: Granger causality test (VAR lag selection by AIC, max 4 lags)\
      \ of fiscal deficit \u2192 CPI inflation, annual data 1950-2023 for ARG. Secondary:\
      \ panel VAR for ARG, BRA, CHL, URY, BOL with country fixed effects testing whether\
      \ the fiscal-inflation Granger causality is specific to ARG or regional. Mechanism\
      \ test: event-study around the 12 >50% inflation episodes, testing whether fiscal\
      \ deficit > 4% GDP in t-1 or t-2 is a necessary (not merely sufficient) condition.\
      \ Structural-break test: Bai-Perron breakpoint test on the inflation series\
      \ to identify whether episode clustering aligns with political-regime transitions.\n"

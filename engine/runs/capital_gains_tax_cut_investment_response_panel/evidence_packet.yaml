hypothesis:
  id: capital_gains_tax_cut_investment_response_panel
  legacy_id: null
  path: hypotheses/fiscal/capital_gains_tax_cut_investment_response_panel.yaml
  school: null
  topic: fiscal
  claim: 'In an OECD-country panel 2014-2024, reductions in the top statutory capital-
    gains tax rate predict higher subsequent gross fixed capital formation as a share
    of GDP and higher business-startup rates, controlling for corporate-tax rates,
    interest rates, and institutional quality. The directional claim is that a 10
    percentage-point reduction in the capital-gains tax rate is associated with at
    least a 0.5 percentage-point increase in investment/GDP and a 5% increase in new
    business registrations within 3 years.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: capital-gains rate is negative and significant for investment, but not for
    the business-entry outcome
  status: PARTIAL
preregistration:
  claim: 'In an OECD-country panel 2014-2024, reductions in the top statutory capital-
    gains tax rate predict higher subsequent gross fixed capital formation as a share
    of GDP and higher business-startup rates, controlling for corporate-tax rates,
    interest rates, and institutional quality. The directional claim is that a 10
    percentage-point reduction in the capital-gains tax rate is associated with at
    least a 0.5 percentage-point increase in investment/GDP and a 5% increase in new
    business registrations within 3 years.

    '
  falsification_rule: "SUPPORTED if \u03B21 (cap_gains_rate) is negative and significant\
    \ at p<0.10 for both investment and new business density (i.e. lower rate \u2192\
    \ more investment/entry). PARTIAL if negative and significant for investment but\
    \ not business density. REFUTED if \u03B21 is positive and significant at p<0.10.\
    \ INFORMATIVE: excluding USA should not eliminate the negative sign; if it does,\
    \ the result is driven by US-specific episodes.\n"
  threshold: "\u03B2_cap_gains_rate (investment) < 0 at p<=0.10  AND \u03B2_cap_gains_rate\
    \ (business density) < 0 at p<=0.10  AND Ex-USA robustness retains negative sign.\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Two-way FE panel with 3-year forward windows: investment(t+1 to t+3) =\
      \ \u03B20 + \u03B21*cap_gains_rate(t) + controls + FE. Robustness: (1) exclude\
      \ USA (dominant capital-gains-cut episodes); (2) use first-difference specification\
      \ to capture within-country rate changes; (3) instrument rate changes with right-party\
      \ government seat share; (4) separate short-run (1-yr) vs medium-run (3-yr)\
      \ responses; (5) control for stock-market capitalization to separate real investment\
      \ from asset-price effects.\n"
  steelman: hypotheses/steelman/capital_gains_tax_cut_investment_response_panel.md

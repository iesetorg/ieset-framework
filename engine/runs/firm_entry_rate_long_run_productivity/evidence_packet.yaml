hypothesis:
  id: firm_entry_rate_long_run_productivity
  legacy_id: null
  path: hypotheses/regulatory/firm_entry_rate_long_run_productivity.yaml
  school: null
  topic: regulatory
  claim: 'Across an unbalanced panel of OECD and emerging-market economies 1980-2020,
    higher firm-entry rates (new business registrations per 1000 working-age population)
    predict stronger subsequent 20-year total-factor-productivity growth, after controlling
    for initial GDP per capita, human capital, and capital-deepening rates. The Schumpeterian-Kirznerian
    claim is that entry is the primary engine of creative destruction and productivity
    catch-up; the test distinguishes the entry channel from incumbent-scale and state-investment
    channels.

    '
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: coef=+0.04691 (sign matches claim +), p=0.0185
  status: SUPPORTED
preregistration:
  claim: 'Across an unbalanced panel of OECD and emerging-market economies 1980-2020,
    higher firm-entry rates (new business registrations per 1000 working-age population)
    predict stronger subsequent 20-year total-factor-productivity growth, after controlling
    for initial GDP per capita, human capital, and capital-deepening rates. The Schumpeterian-Kirznerian
    claim is that entry is the primary engine of creative destruction and productivity
    catch-up; the test distinguishes the entry channel from incumbent-scale and state-investment
    channels.

    '
  falsification_rule: 'Not supported if the panel-FE coefficient on firm-entry rate
    is not positive and significant at p<0.05 on 20-year-forward TFP growth, OR if
    the cross-sectional bivariate correlation between mean entry rate and mean TFP
    growth is negative. A developmentalist alternative wins if state-investment share
    outperforms entry rate in a horse-race regression (both entered simultaneously
    and state-investment coefficient is larger and more significant).

    '
  threshold: "panel_FE_beta(entry_rate \u2192 tfp_growth_20yr) > 0 at p<0.05 AND cross_section_beta(entry_rate_mean\
    \ \u2192 tfp_growth_mean) > 0 at p<0.10 AND in horse-race, |t-stat(entry_rate)|\
    \ >= |t-stat(state_investment_share)|\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: 'Two-way fixed-effects panel with 20-year forward-differenced outcomes
      on lagged entry-rate levels. Country+year FE absorb much cross-sectional variation;
      identification relies on within-country changes in entry regimes over long horizons.
      Robustness: 10-year non-overlapping windows; cross-sectional long-difference
      (1980-2000 vs 2000-2020) as placebo.

      '
  steelman: hypotheses/steelman/firm_entry_rate_long_run_productivity.md

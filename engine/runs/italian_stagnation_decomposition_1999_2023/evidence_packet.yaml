hypothesis:
  id: italian_stagnation_decomposition_1999_2023
  legacy_id: null
  path: hypotheses/growth/italian_stagnation_decomposition_1999_2023.yaml
  school: null
  topic: growth
  claim: "Italy's real GDP per capita (PPP, constant international dollars) was approximately\
    \ unchanged between 1999 (euro launch) and 2023 \u2014 a quarter-century of near-zero\
    \ cumulative growth, with modest levels of variation around a flat trend. This\
    \ hypothesis decomposes Italian stagnation into four channels: (1) euro-entry\
    \ real-exchange-rate lock-in (loss of devaluation as adjustment instrument combined\
    \ with a persistently overvalued real rate for the Italian tradeable sector),\
    \ (2) regulatory and administrative stringency (OECD PMR Italy consistently high\
    \ relative to peers; judicial slowness imposing contract-enforcement costs), (3)\
    \ demographic drag (accelerating population aging, persistent below-replacement\
    \ fertility, weak prime-age labour force participation, emigration of educated\
    \ young), and (4) political-instability / fiscal-dominance channels (frequent\
    \ government turnover, reform reversals, high-debt-stock interest burden). The\
    \ decomposition is descriptive growth-accounting; no single channel is expected\
    \ to dominate.\n"
verdict:
  raw: REFUTED
  bucket: refuted
  reason: coef=-0.01029 (sign opposite claim +), p=0.00177
  status: null
preregistration:
  claim: "Italy's real GDP per capita (PPP, constant international dollars) was approximately\
    \ unchanged between 1999 (euro launch) and 2023 \u2014 a quarter-century of near-zero\
    \ cumulative growth, with modest levels of variation around a flat trend. This\
    \ hypothesis decomposes Italian stagnation into four channels: (1) euro-entry\
    \ real-exchange-rate lock-in (loss of devaluation as adjustment instrument combined\
    \ with a persistently overvalued real rate for the Italian tradeable sector),\
    \ (2) regulatory and administrative stringency (OECD PMR Italy consistently high\
    \ relative to peers; judicial slowness imposing contract-enforcement costs), (3)\
    \ demographic drag (accelerating population aging, persistent below-replacement\
    \ fertility, weak prime-age labour force participation, emigration of educated\
    \ young), and (4) political-instability / fiscal-dominance channels (frequent\
    \ government turnover, reform reversals, high-debt-stock interest burden). The\
    \ decomposition is descriptive growth-accounting; no single channel is expected\
    \ to dominate.\n"
  falsification_rule: "Not supported if (a) Italian GDP per capita in 2023 is NOT\
    \ within 5% of its 1999 level (i.e., the stagnation stylised fact is falsified\
    \ \u2014 unlikely given headline data), OR (b) the four channels together explain\
    \ < 40% of the Italy-peer gap, OR (c) a single channel explains > 60% (monocausal),\
    \ OR (d) the synthetic control's pre-1999 fit fails. If regulatory stringency\
    \ alone accounts for majority of gap, report honestly \u2014 even though the framework\
    \ prior expects multi-causal.\n"
  threshold: 'abs(log_gdp_pc_ppp_2023 - log_gdp_pc_ppp_1999) < 0.10 (confirming stagnation)
    AND combined_channel_contribution >= 0.40 of Italy-peer gap AND no single channel
    > 0.60 of explained gap

    '
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Primary specification: multiplicative growth-accounting decomposition\
      \ of Italy-minus-peer-average GDP per capita growth across the four channels,\
      \ over 1999-2023. Peers = DEU + FRA + ESP weighted average. Each channel's contribution\
      \ computed as (channel_ITA - channel_peer) \xD7 channel_elasticity.\nSecondary\
      \ specification: panel FE with ITA vs peers, year FE, channels as covariates.\
      \ \u03B2 on each channel \xD7 ITA dummy identifies Italy-specific loading on\
      \ each channel.\nThird specification: synthetic control for Italy using peer\
      \ pool, with treatment = 1999 euro entry. Compares Italy vs synthetic Italy\
      \ on GDP per capita trajectory.\nThis is a DESCRIPTIVE hypothesis. Channel elasticities\
      \ come from external literature (Lane 2006 on euro effects; Bloom et al. on\
      \ management-practice productivity; Giavazzi-Pagano on Italian reform dynamics);\
      \ identification is not attempted from scratch.\nKnown limitations: (1) Four\
      \ channels are partially overlapping. PMR regulatory\n    stringency interacts\
      \ with judicial slowness; political\n    turnover produces reform reversal that\
      \ shows up as\n    regulatory stringency. Decomposition shares are order-\n\
      \    sensitive.\n(2) Demographic channel cannot be fully separated from economic\n\
      \    stagnation causes \u2014 young Italians emigrate partly because\n    of\
      \ weak labour market, which is itself an outcome. Feedback\n    loops are real.\n\
      (3) The 2008-2013 eurozone crisis is a one-off shock that the\n    decomposition\
      \ cannot cleanly attribute to \"euro entry\" vs\n    \"political mismanagement\"\
      \ vs \"external shock.\"\n(4) 2020-2021 COVID distorts; year FE absorb common\
      \ shocks but\n    Italy was hit disproportionately.\n"
  steelman: hypotheses/steelman/italian_stagnation_decomposition_1999_2023.md

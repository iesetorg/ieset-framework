  school: null
  topic: distribution
  claim: 'Across an OECD panel 1980-2023, the deadweight loss (excess burden) of marginal
    income taxation rises convexly in the top statutory marginal rate, with the slope
    accelerating sharply once top rates exceed roughly 50%. Operationalised: the elasticity
    of taxable income (ETI) with respect to the net-of-tax rate exceeds 0.4 in country-years
    where the top statutory rate is above 60%, and is below 0.25 in country-years
    where the top rate is below 40%. As a consequence, the revenue-maximising top
    marginal rate (the inverse- elasticity bound that defines the Laffer top) lies
    below 70% in every country in the sample. The hypothesis is the Ramsey-Mirrlees-
    Saez optimal-tax framework calibrated to OECD micro evidence and framed in the
    Chicago tradition (Harberger triangles convex in marginal rates).

    '

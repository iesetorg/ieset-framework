  raw: "SUPPORTED (production-based proxy) \u2014 Population-weighted mean per-capita\
    \ CO2 in 2020 was 231% of its 1990 level across the 26-country panel (>= 95% floor).\
    \ No global absolute decoupling visible in production-based throughput. Cumulative\
    \ real per-capita GDP grew +107% on average over the same window. 12 of 26 countries\
    \ individually achieved sustained per-country absolute decoupling. NOTE: Consumption-based\
    \ MF/CO2 unavailable on disk \u2014 the offshoring critique remains untested;\
    \ see methodology_note."

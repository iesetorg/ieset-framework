  raw: "SUPPORTED \u2014 AUS log GDP per capita rose +2.06pp 2007\u21922010 vs donor-mean\
    \ -1.78pp; DiD = +3.84pp (\u2265 2.0pp threshold). Pre-trend 2003\u21922007 DiD\
    \ = -0.84pp (smaller). Donor pool: 12 countries excluding USA (ARRA)."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: Australian fiscal expansion during 2008-2009 GFC response prevented recession
    entry, consistent with MMT claim that currency-issuer fiscal space in high-unemployment
    regimes produces output gains with minimal inflation cost.
  falsification_rule: 'PRIMARY (dispositive): the hypothesis is SUPPORTED if the AUS-vs-donor-pool
    DiD on log real GDP per capita over 2007-2010 is at least +2.0pp, where the donor
    pool is the spec sample (CAN, GBR, NZL, DEU, FRA, ITA, JPN, KOR, CHE, NOR, SWE,
    NLD) excluding USA (ARRA was the only sample peer with a comparable >2%-of-GDP
    cash-handout package). REFUTED if the DiD is non-positive (AUS did not outperform).
    PARTIAL if the DiD is positive but below +2.0pp. INFORMATIVE: AUS-vs-donor change
    in unemployment rate (negative = AUS labour-market outperformance) and CPI inflation
    differential (small = MMT minimal-inflation-cost claim) over 2007-2010, reported
    as DiDs. METHOD_VALID: at least 8 of the 13 donor countries with usable GDP-per-capita
    data at both 2007 and 2010, otherwise inconclusive (data gap). Pre-trend 2003-2007
    DiD must be smaller in magnitude than the 2007-2010 DiD, otherwise verdict is
    downgraded to weakened (parallel-trends violation).'
  threshold: 'PRIMARY: did_log_gdp_pc(AUS, 2007, 2010) - mean_donor_pool_dlog >= 0.020
    AND |pre_trend_did_2003_2007| < |primary_did_2007_2010|.'
  estimator:
    template: synthetic_control
    clustering: country
    notes: "Spec calls for synthetic-control counterfactual for Australia 2008-2010\
      \ vs a donor pool of advanced economies that did not deploy a comparable cash-handout\
      \ fiscal package. Outcome: real GDP per capita; secondary outcomes: unemployment,\
      \ CPI inflation. The runnable replication downgrades to an unweighted peer-mean\
      \ DiD (no synth library available locally) \u2014 see methodology_note.\n"

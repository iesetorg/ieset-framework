  school: null
  topic: monetary
  claim: 'The Federal Reserve''s overnight reverse-repurchase-agreement facility (ON
    RRP) saw usage rise from sub-USD 100bn in early 2021 to a peak above USD 2.4 trillion
    in December 2022, then decline to below USD 500bn by mid-2024 as Treasury bill
    issuance absorbed money-market-fund cash. The hypothesis is descriptive: ON RRP
    usage at peak was >= USD 2.0 trillion, and the post-peak decline through 2024
    was >= USD 1.5 trillion, both observable directly in FRED:RRPONTSYD.

    '

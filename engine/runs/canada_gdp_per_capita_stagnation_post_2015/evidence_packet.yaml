hypothesis:
  id: canada_gdp_per_capita_stagnation_post_2015
  legacy_id: null
  path: hypotheses/growth/canada_gdp_per_capita_stagnation_post_2015.yaml
  school: null
  topic: growth
  claim: "Canadian GDP per capita (PPP, constant international dollars) diverged negatively\
    \ from a donor pool of resource-plus-advanced-anglophone-plus- small-open-developed\
    \ economies (USA, AUS, NZL, GBR, NOR, CHE) starting around 2015, such that the\
    \ Canadian per-capita trajectory 2015-2023 is materially below a country-and-year-fixed-effect\
    \ counterfactual matched on pre-2015 level and covariates. The claim is narrowly\
    \ about per-capita output trajectory; it does not assert that aggregate GDP fell\
    \ (it did not) nor that Canadian headline growth was bad in every year. It asserts\
    \ that per-capita productivity growth under the 2015-present policy mix was slow\
    \ enough, and population growth fast enough, that the per-capita level has stagnated\
    \ relative to the donor pool \u2014 consistent with the productivity-gap warning\
    \ issued by Bank of Canada Senior Deputy Governor Rogers in March 2024 (\"it's\
    \ an emergency\").\n"
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: coef=-0.03861 (sign matches claim -), p=0.00752
  status: null
preregistration:
  claim: "Canadian GDP per capita (PPP, constant international dollars) diverged negatively\
    \ from a donor pool of resource-plus-advanced-anglophone-plus- small-open-developed\
    \ economies (USA, AUS, NZL, GBR, NOR, CHE) starting around 2015, such that the\
    \ Canadian per-capita trajectory 2015-2023 is materially below a country-and-year-fixed-effect\
    \ counterfactual matched on pre-2015 level and covariates. The claim is narrowly\
    \ about per-capita output trajectory; it does not assert that aggregate GDP fell\
    \ (it did not) nor that Canadian headline growth was bad in every year. It asserts\
    \ that per-capita productivity growth under the 2015-present policy mix was slow\
    \ enough, and population growth fast enough, that the per-capita level has stagnated\
    \ relative to the donor pool \u2014 consistent with the productivity-gap warning\
    \ issued by Bank of Canada Senior Deputy Governor Rogers in March 2024 (\"it's\
    \ an emergency\").\n"
  falsification_rule: "Not supported if \u03B2 on canada_post_2015 is non-negative\
    \ (>= 0) at p < 0.10 in the TWFE specification OR if the synthetic-control gap\
    \ for Canada is non-negative for a majority of post-2015 years. If the TWFE \u03B2\
    \ is negative and significant but the population-growth decomposition attributes\
    \ more than 100% of the per-capita gap to denominator growth (i.e., real-GDP numerator\
    \ growth is at or above donor-pool average), the headline claim is recorded as\
    \ supported on per-capita stagnation but NOT supported on productivity- stagnation,\
    \ and the result card must state this disaggregation explicitly.\n"
  threshold: "\u03B2_canada_post_2015 < 0 at p < 0.10  AND  synthetic-control gap\
    \ post_2015 negative in \u226560% of years. Population-growth decomposition reported\
    \ alongside as interpretation guard.\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Primary: TWFE with country + year fixed effects. \u03B2 on the canada_post_2015\
      \ indicator identifies the Canadian per-capita trajectory deviation from the\
      \ donor pool's time-average under fixed-effects adjustment, with clustered standard\
      \ errors.\nSecondary: synthetic-control robustness. For each post-2015 year,\
      \ compute synthetic Canada as the weighted average of donor countries matched\
      \ on 2000-2014 outcome + pre-2015 covariate means. Report Canada-actual minus\
      \ Canada-synthetic gap.\nTreatment-date robustness: re-run with 2016 cutoff\
      \ (first full year under the Trudeau government) and report both coefficients.\n\
      Population-growth decomposition: Canadian population grew ~15% 2015-2023, substantially\
      \ faster than the donor pool average. A mechanical accounting decomposition\
      \ reports the share of the per-capita gap attributable to faster denominator\
      \ growth vs slower numerator (real GDP) growth. This is descriptive, not causal,\
      \ but is essential for interpretation: a large portion of Canadian per-capita\
      \ stagnation reflects rapid immigration-driven population growth absorbing output,\
      \ not an absolute contraction of the productive base.\n"
  steelman: hypotheses/steelman/canada_gdp_per_capita_stagnation_post_2015.md

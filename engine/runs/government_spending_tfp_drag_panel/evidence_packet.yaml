hypothesis:
  id: government_spending_tfp_drag_panel
  legacy_id: null
  path: hypotheses/fiscal/government_spending_tfp_drag_panel.yaml
  school: null
  topic: fiscal
  claim: 'In a broad-country panel 1980-2019, a larger government expenditure share
    of GDP predicts lower subsequent total-factor-productivity (TFP) growth, controlling
    for initial income, trade openness, and human capital. The directional claim is
    that a 10 percentage-point increase in government spending/GDP is associated with
    at least 0.3 percentage points lower annual TFP growth over the following decade,
    and that this relationship is monotonic across the observed spending range.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=-0.002033, p=0.157 (above \u03B1=0.05); direction inconclusive"
  status: PARTIAL
preregistration:
  claim: 'In a broad-country panel 1980-2019, a larger government expenditure share
    of GDP predicts lower subsequent total-factor-productivity (TFP) growth, controlling
    for initial income, trade openness, and human capital. The directional claim is
    that a 10 percentage-point increase in government spending/GDP is associated with
    at least 0.3 percentage points lower annual TFP growth over the following decade,
    and that this relationship is monotonic across the observed spending range.

    '
  falsification_rule: "SUPPORTED if \u03B21 (govt spending) is negative and significant\
    \ at p<0.05 for both TFP growth and labour productivity growth. PARTIAL if negative\
    \ and significant for TFP but not labour productivity. REFUTED if \u03B21 is positive\
    \ and significant at p<0.05. INFORMATIVE: excluding oil exporters should not eliminate\
    \ the negative sign; if it does, the result is driven by resource rent endogeneity.\n"
  threshold: "\u03B2_govt_spending (TFP growth) < 0 at p<=0.05  AND \u03B2_govt_spending\
    \ (labour productivity) < 0 at p<=0.05  AND Ex-oil-exporter robustness retains\
    \ negative sign.\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - decade
    clustering: country
    notes: "Panel FE with non-overlapping 5-year averages to capture medium-run effects\
      \ and reduce noise: TFP_growth = \u03B20 + \u03B21*govt_spending/GDP + controls\
      \ + FE. Robustness: (1) exclude oil exporters where spending is endogenous to\
      \ resource rents; (2) use Fraser EFW size-of-government sub-index instead of\
      \ WDI spending; (3) subsample by income level; (4) 10-year forward growth to\
      \ reduce reverse causality.\n"
  steelman: hypotheses/steelman/government_spending_tfp_drag_panel.md

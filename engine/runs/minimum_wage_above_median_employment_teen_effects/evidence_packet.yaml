  path: hypotheses/labour/minimum_wage_above_median_employment_teen_effects.yaml
  school: null
  topic: labour
  claim: "High-bite minimum wages (statutory floors that approach or exceed the local\
    \ 50th percentile of the age-specific wage distribution) produce a multi-stage\
    \ causal chain. FIRST-ORDER: wage floors do rise for employed workers who retain\
    \ their jobs \u2014 this effect is real, measurable and acknowledged. SECOND-ORDER:\
    \ employment rates for teens, young immigrants, low-skill entrants, and workers\
    \ in high-bite sub-regions diverge negatively from synthetic controls, with hours\
    \ reductions, reduced promotion-probability, and tradable-sector job reallocation\
    \ away from affected regions. THIRD-ORDER: the productivity ladder that moves\
    \ workers from first-job wages to wages well above the minimum breaks down; informal-sector\
    \ employment share rises; the share of young people neither in employment nor\
    \ education (NEET) increases persistently, entrenching long-run human-capital\
    \ damage. Cases: Seattle 2015-2017 above-$13 hike, NYC fast-food $15 minimum 2019,\
    \ California state-wide $15-to-$16 schedule, UK National Living Wage 2016-2024\
    \ schedule, German Mindestlohn 2015 introduction and 2022 \u20AC12 hike.\n"

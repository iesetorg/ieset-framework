  school: null
  topic: monetary
  claim: 'US 10-year minus 2-year Treasury yield-curve inversions are followed by
    meaningful labour-market weakening in most completed post-1976 episodes. The pre-registered
    test treats a completed inversion episode as a monthly average 10y-2y spread below
    zero for at least two consecutive months, with new episodes allowed after at least
    three non-inverted months. The claim is supported if at least 70% of completed
    episodes are followed by a rise in the unemployment rate of at least 0.75 percentage
    points within 24 months of episode start, and the median 24-month unemployment
    increase is at least 1.0 percentage point.

    '

hypothesis:
  id: austerity_output_recovery_tradeoff
  path: hypotheses/growth/austerity_output_recovery_tradeoff.yaml
  school: null
  topic: growth
  claim: 'Post-2010 European fiscal consolidation intensity negatively predicts subsequent
    output-gap closure speed and cumulative output over the 2010-2019 window, with
    the effect concentrated in the Eurozone periphery where the combination of sovereign
    spreads, no monetary- policy-at-country-level, and high initial output gaps produced
    a multiplier larger than the pre-crisis consensus assumed. The hypothesis is consistent
    with the Blanchard-Leigh 2013 finding that IMF fiscal-multiplier assumptions were
    systematically too low in the early austerity period. The pre-registered claim
    is that in the Eurozone sample 2010-2019, countries with larger cyclically-adjusted
    primary-balance tightening over 2010-2013 experienced slower output- gap closure
    relative to the post-2008 trough, holding initial output gap and debt level constant.
    The core-vs-periphery split is expected to show the periphery effect substantially
    larger than the core effect.

    '
verdict:
  raw: "inconclusive \u2014 OLS coefficient on \u0394fiscal-balance is +1.287 pp/pp\
    \ (p=0.289) \u2014 wrong sign but not significant. The spec mandated IV-2SLS (Blanchard-Leigh\
    \ instrument) precisely because OLS on this relationship suffers from reverse-causality\
    \ bias toward positive coefficients (worse-growth \u2192 larger forced consolidation).\
    \ The April-2010 WEO forecast vintage needed for the instrument is not in the\
    \ local data tree. With controls (initial debt, unemployment), \u03B2 = +2.540\
    \ pp/pp (p = 0.007) \u2014 also wrong sign. Identification gap, not dispositive\
    \ refutation. N=21."
  bucket: inconclusive
  reason: null
  status: null
preregistration:
  claim: 'Post-2010 European fiscal consolidation intensity negatively predicts subsequent
    output-gap closure speed and cumulative output over the 2010-2019 window, with
    the effect concentrated in the Eurozone periphery where the combination of sovereign
    spreads, no monetary- policy-at-country-level, and high initial output gaps produced
    a multiplier larger than the pre-crisis consensus assumed. The hypothesis is consistent
    with the Blanchard-Leigh 2013 finding that IMF fiscal-multiplier assumptions were
    systematically too low in the early austerity period. The pre-registered claim
    is that in the Eurozone sample 2010-2019, countries with larger cyclically-adjusted
    primary-balance tightening over 2010-2013 experienced slower output- gap closure
    relative to the post-2008 trough, holding initial output gap and debt level constant.
    The core-vs-periphery split is expected to show the periphery effect substantially
    larger than the core effect.

    '
  falsification_rule: "PRIMARY (dispositive, downgraded to OLS \u2014 see methodology_note):\
    \ cross-section OLS across the 21-country European panel of cumulative log-GDP\
    \ growth 2010\u21922019 on \u0394(general-govt net lending / GDP) 2010\u21922013\
    \ with periphery dummy and periphery\xD7\u0394-FB interaction. The hypothesis\
    \ is SUPPORTED if \u03B2_core < 0 with |\u03B2_core| \u2265 0.5 pp-cumulative-growth\
    \ per 1pp-of-GDP consolidation at p<0.05 AND \u03B2_periphery (= \u03B2_core +\
    \ \u03B4_interaction) is more negative than \u03B2_core (periphery effect larger\
    \ as predicted). REFUTED if \u03B2_core is significantly POSITIVE at p<0.05 (consolidation\
    \ associated with *more* growth, contradicting the austerity-damage claim and\
    \ unable to be rescued by the OLS-vs-IV bias direction). INCONCLUSIVE if \u03B2\
    _core is wrong-signed but not significant (consistent with the reverse-causality\
    \ bias the IV was designed to remove) OR if data gates fail. INFORMATIVE: same-sign\
    \ result on the unemployment cumulative-mean outcome; controlled-OLS robustness\
    \ with debt-2010 and unemp-2010 as additional regressors. METHOD_VALID: \u2265\
    12 of 21 countries with treatment+outcome data; \u22656 periphery and \u22656\
    \ core countries."
  threshold: 'PRIMARY: beta_core < 0 AND |beta_core| >= 0.5 AND p < 0.05 AND beta_periphery
    < beta_core. REFUTED if beta_core > 0 at p < 0.05.'
  estimator:
    template: iv_2sls
    clustering: country
    notes: 'Primary specification: 2SLS using the Blanchard-Leigh 2013 forecast-error
      approach. The first-stage regresses actual 2010-2013 CAPB change on IMF-forecast
      CAPB change as of the April 2010 WEO; the forecast error becomes the plausibly-exogenous
      instrument (countries did not systematically forecast-miss their own fiscal
      choices). Second stage regresses cumulative 2010-2019 output on instrumented
      consolidation. Alternative: panel FE on 2010-2019 with CAPB_change as regressor
      reported as robustness. Both specs interact consolidation with the periphery
      indicator.

      '
  steelman: hypotheses/steelman/austerity_output_recovery_tradeoff.md

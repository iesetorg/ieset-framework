verdict:
  raw: "SUPPORTED \u2014 EU panel shows partial decoupling 2019->2023: mean per-capita\
    \ CO2 -18.3%, mean per-capita real GDP +4.6%. 13/16 countries showed both falling\
    \ emissions and rising GDP. Pace is BELOW 1.5C path: 2023 mean emissions at 83%\
    \ of 2019 vs benchmark 82% (gap +2pp). 11/16 above the 1.5C share."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: EU Green Deal 2020-present emissions reductions have outpaced aggregate GDP
    growth, showing partial decoupling, but at rates still below 1.5C-consistent pathways.
  falsification_rule: 'PRIMARY (dispositive, both required for SUPPORTED): (1) Relative
    decoupling 2019->2023: mean per-capita CO2 log-change across the 16-country EU
    panel is at most -2% AND mean per-capita real GDP log-change is at least +1%.
    (2) Pace insufficient vs 1.5C path: mean 2023 per-capita CO2 (as a fraction of
    2019) is strictly above the linear 1.5C-consistent benchmark for 2023, where the
    benchmark is the linear path from 2019 = 1.0 to 2030 = 0.50 (benchmark at 2023
    ~= 0.818). REFUTED if neither leg holds (no decoupling AND pace is on/below 1.5C
    path). PARTIAL if exactly one leg holds. INFORMATIVE: country-level dispersion
    of the two legs reported in diagnostics.json. METHOD_VALID: at least 12 of 16
    panel countries must have both 2019 and 2023 observations on OWID co2-emissions-per-capita
    and on WDI NY.GDP.MKTP.KD / SP.POP.TOTL; otherwise verdict is inconclusive.'
  threshold: 'PRIMARY: mean(log_change_co2_pc, 2019->2023) <= -0.02 AND mean(log_change_gdpc_pc,
    2019->2023) >= +0.01 AND mean(co2_2023 / co2_2019) > benchmark_fraction_2023 (=
    0.818).'
  estimator:
    template: descriptive
    clustering: none
    notes: 'Descriptive comparison of EU emissions trajectory (territorial and consumption-based
      CO2) against real GDP growth and against the linear 1.5C-consistent pathway
      2020-2050. Reports the pace of relative and absolute decoupling and the gap
      to the target trajectory.

      '
  steelman: null

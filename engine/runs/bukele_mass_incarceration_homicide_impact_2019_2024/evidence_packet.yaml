  claim: "El Salvador's ~98% homicide-rate decline from 103/100k (2015) to 2.4/100k\
    \ (2023) \u2014 with the sharpest decline occurring after the Mar 2022 r\xE9gimen\
    \ de excepci\xF3n and the Jan 2023 CECOT opening \u2014 is causally attributable\

    \ countries (HND, GTM, NIC, HND, CRI, DOM, COL, ECU, VEN) as donor pool, SLV's\
    \ post-treatment homicide-rate gap versus its synthetic counterfactual is negative\
    \ and large (> 50% of observed decline) with permutation inference p-value < 0.05.\
    \ The hypothesis must also address the pre-existing gang-truce confound (2012-2014\
    \ FMLN-era truce + alleged 2019-2022 undisclosed Bukele-administration truce per\
    \ El Faro reporting) and the demographic factor (mara-age-cohort shrinking). An\
    \ alternative channel (negotiated truce) must be tested via leaked-message-dated\
    \ structural-break analysis around the Mar 26-30 2022 massacre that triggered\
    \ the r\xE9gimen.\n"
  falsification_rule: "Not supported if any of: (a) synthetic-control estimated treatment\
    \ effect on homicide rate 2022-2024 is not negative and statistically distinguishable\
    \ from donor-permutation distribution at p < 0.05, OR (b) the post-2022 gap is\
    \ smaller than 50% of the observed pre-to-post decline (i.e., the counterfactual\
    \ donor pool also experienced substantial homicide decline), OR (c) a placebo-in-time\
    \ test assigning treatment at 2019-06-01 produces a similarly large gap (indicating\
    \ the decline predates r\xE9gimen and is attributable to Plan Control Territorial\
    \ / alleged undisclosed truce rather than mass incarceration), OR (d) the extortion-\
    \ complaints secondary outcome shows no decline (indicating crime was not substantively\
    \ reduced, only homicides, implying a body-disposal or reporting-manipulation\
    \ confound).\n"
  threshold: 'CATT_2022_2024(homicides) < 0 at p_perm < 0.05 AND |CATT_2022_2024(homicides)|
    > 0.5 * observed_decline_2015_2023 AND placebo_in_time_CATT_2019_2021 < 0.5 *
    CATT_2022_2024 AND CATT_2022_2024(extortion_complaints) < 0 at p_perm < 0.10

    '
  estimator:
    template: synthetic_control
    clustering: country
    notes: "Primary: synthetic control (Abadie 2010) with SLV treated 2022-03-27 onward,\
      \ pre-period 2005-2021 for donor weighting. Secondary: synth_did for matched\
      \ pre-trend plus parallel- trends-free estimation. Robustness: Callaway-Sant'Anna\

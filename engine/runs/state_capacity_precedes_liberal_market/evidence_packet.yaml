hypothesis:
  id: state_capacity_precedes_liberal_market
  legacy_id: null
  path: hypotheses/institutional_quality/state_capacity_precedes_liberal_market.yaml
  school: null
  topic: institutional_quality
  claim: 'State capacity (proxied by government effectiveness, rule of law, and fiscal
    extraction) is a prerequisite for effective liberal market policy. Countries with
    stronger early state capacity experience larger growth premiums from subsequent
    market-opening reforms than countries with weak state capacity. The test uses
    a temporal sequencing design: state-capacity proxies measured in an early window
    (1996-2005) are used to predict the growth premium from trade openness in a later
    window (2005-2019).

    '

  path: hypotheses/fiscal/wealth_tax_capital_flight_revenue_yield_gap.yaml
  school: null
  topic: fiscal
  claim: "Wealth taxes produce a three-order causal chain. FIRST-ORDER: a new tax\
    \ instrument is legislated and administered, generating measurable initial revenue\
    \ \u2014 this is a genuine policy success on its own terms and we acknowledge\
    \ the tax does collect money from wealthy residents in the first year. SECOND-ORDER:\
    \ wealth-holder migration accelerates (France ISF 2012 outflows, Norway 2022 emigration\
    \ spike, Colombia 2022-2023 outflow), along with portfolio reshuffling toward\
    \ exempt or undervalued assets, under-reporting, and family-office restructuring.\
    \ THIRD-ORDER: realised revenue trajectory falls systematically below legislator\
    \ forecasts, pressure mounts on the remaining (less-mobile) tax base, and the\
    \ distributional burden shifts toward non-emigrating upper-middle-class holders\
    \ of illiquid wealth. Cases: France ISF/IFI 1982-2017 + 2018 reform, Norway 2022\
    \ wealth-tax hike, Colombia impuesto al patrimonio 2022, Spain impuesto a las\
    \ grandes fortunas 2022.\n"

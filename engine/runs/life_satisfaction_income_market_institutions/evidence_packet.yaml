  id: life_satisfaction_income_market_institutions
  legacy_id: null
  path: hypotheses/distribution/life_satisfaction_income_market_institutions.yaml
  school: null
  topic: distribution
  claim: In high-income countries 1990-2020, gains in life satisfaction (subjective
    well-being) are more strongly associated with real income growth, employment opportunity,
    and institutional trust than with the intensity of state economic planning or
    public-sector employment share. The claim is bounded to countries already above
    the World Bank high- income threshold, separating catch-up wellbeing gains from
    frontier dynamics.

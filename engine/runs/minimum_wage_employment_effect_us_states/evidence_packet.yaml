preregistration:
  claim: 'US state-level minimum-wage increases over 1990-2024 produce small, statistically
    uncertain effects on teen and low-wage employment when compared to contiguous
    counties or neighbouring states that did not raise their minimum. The Card-Krueger
    1994 / Dube-Lester-Reich 2010 research design is the baseline: the hypothesis
    predicts that the estimated employment elasticity with respect to the minimum
    wage falls in the range [-0.15, +0.05] with the 95% confidence interval straddling
    zero, consistent with the post-1990 border-discontinuity literature but inconsistent
    with Neumark-Wascher-style nationwide panel findings of elasticities < -0.2. Pre-registered
    direction of effect: minimum-wage elasticity is close to zero and typically not
    significantly negative at the 5% level on the primary outcome.

    '
  falsification_rule: 'PRIMARY (dispositive): the hypothesis is SUPPORTED if the Callaway-Sant''Anna
    staggered-DiD elasticity of teen employment-to-population with respect to the
    log state minimum wage over the 1990-2024 US-state panel falls in [-0.15, +0.05]
    AND the 95% CI crosses zero. REFUTED if the elasticity is significantly below
    -0.15 at the 5% level (Neumark-Wascher direction) OR significantly above +0.10
    at the 5% level (positive-employment direction; the claim is "close to zero,"
    not "positive"). SECONDARY (also dispositive): the Dube-Lester-Reich contiguous-county-pair
    elasticity on QCEW NAICS-722 (accommodation/food services) county employment must
    fall in [-0.20, +0.05]. INFORMATIVE: leave-one-state-out sign stability of the
    CS-ATT coefficient; pre-trend test on the 4 years preceding each state''s first
    minimum-wage hike. METHOD_VALID: state-level BLS LAU teen E/P available for at
    least 40 of 50 states with >= 20 years of coverage; USDOL state minimum-wage history
    available with at least one state-level binding change in at least 30 states;
    QCEW NAICS-722 county-level employment available for the border- pair specification.'
  threshold: 'PRIMARY: CS_ATT_elasticity in [-0.15, +0.05] AND 95% CI crosses zero
    AND CS_ATT not significantly < -0.15 AND not significantly > +0.10. SECONDARY:
    border_pair_elasticity in [-0.20, +0.05].'
  estimator:
    template: did_callaway_santanna
    clustering: state
    random_seed: 20260423
    notes: 'Primary: Callaway-Sant''Anna staggered DiD exploiting state-level minimum-wage
      changes 1990-2024 against never-/late-changing states. Secondary: Dube-Lester-Reich
      contiguous-county-pair design using QCEW accommodation-and-food-services county
      employment around state-border discontinuities. The border-pair design is the
      cleaner identification but has narrower outcome coverage.

      '

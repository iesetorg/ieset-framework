  claim: Thailand's middle-income plateau (post-1997 and especially post-2005) is
    associated with weaker product-market competition, lower institutional quality,
    and fragmented state coordination capacity relative to East Asian peers that sustained
    convergence. Despite successful early export-led development, Thailand's total
    factor productivity growth and GDP per capita convergence slowed because of entrenched
    oligopolistic structures, inconsistent infrastructure investment, and regulatory
    capture, after controlling for initial income, human capital, trade openness,
    and foreign direct investment inflows.

hypothesis:
  id: wid_top_income_share_trade_openness_panel
  legacy_id: null
  path: hypotheses/distribution/wid_top_income_share_trade_openness_panel.yaml
  school: null
  topic: distribution
  claim: 'Higher trade openness predicts higher top-income concentration in a country-year
    panel: after country and year fixed effects, log GDP per capita, population, and
    regulatory-quality controls, WDI trade as a share of GDP should be positively
    associated with the WID top 0.1 percent pre-tax income share. The test is an associational
    screen of whether openness coincides with rising very-top income shares, not a
    causal estimate of trade shocks or a claim about post-tax inequality.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: coefficient is not statistically decisive at p<0.10
  status: null
preregistration:
  claim: 'Higher trade openness predicts higher top-income concentration in a country-year
    panel: after country and year fixed effects, log GDP per capita, population, and
    regulatory-quality controls, WDI trade as a share of GDP should be positively
    associated with the WID top 0.1 percent pre-tax income share. The test is an associational
    screen of whether openness coincides with rising very-top income shares, not a
    causal estimate of trade shocks or a claim about post-tax inequality.

    '
  falsification_rule: 'SUPPORTED if the trade_open_gdp coefficient is positive and
    significant at p<0.10. REFUTED if it is negative and significant at p<0.10. PARTIAL
    otherwise. METHOD_VALID requires at least 500 observations, at least 25 countries,
    and at least 15 paired observations per country after all joins.

    '
  threshold:
    p_max: 0.1
    min_observations: 500
    min_countries: 25
    min_obs_per_country: 15
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Two-way fixed-effects panel using country and year effects, clustered
      by country. Primary coefficient is trade_open_gdp. Controls are log GDP per
      capita PPP, WGI regulatory quality, and log population. The run reports a descriptive
      high-trade quartile contrast as secondary context only.

      '
  steelman: hypotheses/steelman/wid_top_income_share_trade_openness_panel.md

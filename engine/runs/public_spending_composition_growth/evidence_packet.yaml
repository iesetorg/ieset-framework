hypothesis:
  id: public_spending_composition_growth
  legacy_id: null
  path: hypotheses/fiscal/public_spending_composition_growth.yaml
  school: null
  topic: fiscal
  claim: 'Public investment in basic infrastructure (transport, energy, water, sanitation)
    has strong catch-up returns to real GDP per capita growth in developing and emerging
    economies, while persistent public transfers and subsidies have weaker or insignificant
    long-run growth effects, in a broad-country panel 1980-2020. The directional claim
    is that a 1-percentage- point increase in public-investment share of GDP predicts
    a 0.1-0.3 percentage point increase in annual growth, while an equivalent increase
    in transfers/subsidies share predicts no significant growth effect or a negative
    effect, controlling for initial income, institutions, and debt.

    '
verdict:
  raw: PARTIAL
  bucket: partial
  reason: "coef=+140, p=0.165 (above \u03B1=0.1); direction inconclusive"
  status: PARTIAL
preregistration:
  claim: 'Public investment in basic infrastructure (transport, energy, water, sanitation)
    has strong catch-up returns to real GDP per capita growth in developing and emerging
    economies, while persistent public transfers and subsidies have weaker or insignificant
    long-run growth effects, in a broad-country panel 1980-2020. The directional claim
    is that a 1-percentage- point increase in public-investment share of GDP predicts
    a 0.1-0.3 percentage point increase in annual growth, while an equivalent increase
    in transfers/subsidies share predicts no significant growth effect or a negative
    effect, controlling for initial income, institutions, and debt.

    '
  falsification_rule: "SUPPORTED if \u03B21 (public investment) is positive and significant\
    \ at p<0.10 while \u03B22 (transfers/subsidies) is insignificant or negative.\
    \ PARTIAL if both are positive but \u03B21 > \u03B22. REFUTED if \u03B22 is positive\
    \ and significantly larger than \u03B21, or if both are insignificant. INFORMATIVE:\
    \ the public-investment coefficient should be larger and more significant in the\
    \ catch-up subsample than in the frontier subsample; if the opposite holds, the\
    \ result is a frontier-specific anomaly.\n"
  threshold: "\u03B2_public_investment > 0 at p<=0.10  AND \u03B2_transfers_subsidies\
    \ p >= 0.10 or coefficient <= 0  AND Catch-up subsample \u03B2_public_investment\
    \ >= frontier subsample \u03B2_public_investment.\n"
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel with decomposition: growth = \u03B20 + \u03B21*public_investment\
      \ + \u03B22*transfers_subsidies + controls + FE. Mechanism decomposition via\
      \ infrastructure quality and private investment channels. Robustness: (1) 5-year\
      \ non-overlapping averages to capture medium-run effects; (2) subsample by income\
      \ level (catch-up vs frontier); (3) IV for public investment using lagged public\
      \ investment and electoral-cycle timing (political budget cycles). Separate\
      \ catch-up and frontier specifications pre-registered.\n"
  steelman: hypotheses/steelman/public_spending_composition_growth.md

  claim: "Volcker's 1979\u20131982 disinflation produced output recovery by 1984 once\
    \ inflation expectations re-anchored, vindicating the monetarist claim that credible\
    \ rule-based tightening imposes finite transition costs."
verdict:
  raw: "SUPPORTED \u2014 CPI YoY fell from 14.4% peak (1980Q2) to 3.2% in 1983Q4 (drop\
    \ = 11.2pp, threshold >= 5.0pp; level threshold <= 5.0%). Real GDP at 1984Q4 was\
    \ -1.9% relative to the 1972Q1-1979Q3 linear log-time trend (recovery threshold\
    \ >= -2.0%). Both primaries cleared."
  bucket: supported
  reason: null
  status: null
preregistration:
  claim: "Volcker's 1979\u20131982 disinflation produced output recovery by 1984 once\
    \ inflation expectations re-anchored, vindicating the monetarist claim that credible\
    \ rule-based tightening imposes finite transition costs."
  falsification_rule: "PRIMARY (dispositive): the hypothesis is SUPPORTED iff BOTH\
    \ (a) headline CPI YoY inflation falls from its 1979-1980 peak to a 1983Q4 quarterly\
    \ mean of at most 5.0% (Volcker disinflation magnitude \u2014 a fall of >= 5pp\
    \ from the >=10% peak), AND (b) real GDP (GDPC1) returns to its pre-1979 trend\
    \ by 1984Q4 (i.e. the log-gap of 1984Q4 real GDP relative to the linear log-time\
    \ fit estimated on 1972Q1-1979Q3 is >= -2.0%, treating \"returned to trend\" as\
    \ within 2% of the extrapolated trajectory). REFUTED if EITHER (i) the inflation\
    \ drop from peak to 1983Q4 is < 5pp (no disinflation), OR (ii) the 1984Q4 real-GDP\
    \ gap to pre-1979 trend is <= -5.0% (output failed to recover, large permanent\
    \ loss). Otherwise PARTIAL. INFORMATIVE (non-gating): the level of the effective\
    \ fed funds rate at the 1981 peak (treatment intensity), inflation YoY trajectory\
    \ between peak and 1983Q4, and trough-to-1984Q4 GDP recovery slope. METHOD_VALID:\
    \ requires CPIAUCSL, GDPC1, FEDFUNDS all loaded for the 1972Q1-1984Q4 window.\
    \ If any series is missing, emit `inconclusive (data gap)`."
  threshold: 'PRIMARY: cpi_yoy_1983Q4_mean <= 5.0% AND (peak_cpi_yoy - cpi_yoy_1983Q4_mean)
    >= 5.0pp AND log(real_gdp_1984Q4) - trend_log_1984Q4 >= -0.020. REFUTED gate:
    (peak_cpi_yoy - cpi_yoy_1983Q4_mean) < 5.0pp OR log(real_gdp_1984Q4) - trend_log_1984Q4
    <= -0.050.'
  estimator:
    template: event_study
    fixed_effects:
    - year
    clustering: none
    notes: 'Single-country US event study around the October 1979 Volcker tightening.
      Outcomes: inflation, real GDP growth, output gap. Tests whether inflation re-anchored
      and real output recovered to trend by 1984, consistent with the monetarist credibility-with-finite-cost
      claim.

      '

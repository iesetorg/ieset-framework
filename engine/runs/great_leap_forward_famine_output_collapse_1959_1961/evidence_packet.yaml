  id: great_leap_forward_famine_output_collapse_1959_1961
  legacy_id: null
  path: hypotheses/growth/great_leap_forward_famine_output_collapse_1959_1961.yaml
  school: null
  topic: growth
  claim: 'Mao Zedong''s Great Leap Forward (1958-1962), characterised by forced collectivisation
    into People''s Communes, Lysenkoist rejection of scientific agronomy, diversion
    of rural labour to backyard steel production, and cadre-competition-driven inflation
    of reported harvests, produced a canonical institutional-economic collapse that
    manifests as >=7 of 10 pre-registered extreme-outcome metrics, each drawn from
    an independent data source or methodology family and measuring a different causal
    layer (demographic mortality, agricultural output, macroeconomic contraction,
    institutional coverage, human capital). The canonical-case claim is that no non-war
    peacetime economy in the 20th-century panel matches even 4 of these 10 thresholds
    simultaneously; China 1958-1962 matches most. A refutation (<=3 metrics met) would
    indicate that the consensus demographic and output reconstructions (Banister 1987,
    Ashton et al. 1984, Peng 1987, Yang Jisheng 2008) are substantially overstated,
    or that the institutional-quality coding of the GLF is misplaced.

    '

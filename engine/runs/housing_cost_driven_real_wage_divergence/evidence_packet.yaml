hypothesis:
  id: housing_cost_driven_real_wage_divergence
  legacy_id: null
  path: hypotheses/distribution/housing_cost_driven_real_wage_divergence.yaml
  school: null
  topic: distribution
  claim: "Within Anglo-liberal economies (UK, US, Australia) over 1995-2020, housing-supply-restricted\
    \ high-opportunity metro areas exhibit real-wage-net-of-housing-cost trajectories\
    \ that diverge substantially from their headline real-wage trajectories, such\
    \ that the standard \"real wage stagnation\" story for these metros is amplified\
    \ (larger stagnation) when housing costs are properly netted out, while housing-supply-elastic\
    \ metros show the opposite pattern \u2014 headline real-wage stagnation looks\
    \ less severe after housing is netted. The specific claim is that the cross-metro\
    \ divergence in housing supply elasticity (Hilber-Vermeulen for UK, Saiz for US,\
    \ Kendall- Tulip for Australia) is a first-order driver of cross-metro differences\
    \ in welfare-relevant real wage growth, and that national aggregate real-wage\
    \ series systematically understate welfare losses in supply-restricted metros\
    \ while overstating them in supply-elastic metros. A clean supported finding would\
    \ show that the supply- elasticity coefficient on net-of-housing real wage growth\
    \ is statistically significant and quantitatively large (at least 20% of cross-metro\
    \ variance in welfare-adjusted real wage trajectories).\n"
verdict:

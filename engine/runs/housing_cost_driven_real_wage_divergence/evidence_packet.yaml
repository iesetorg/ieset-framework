  claim: "Within Anglo-liberal economies (UK, US, Australia) over 1995-2020, housing-supply-restricted\
    \ high-opportunity metro areas exhibit real-wage-net-of-housing-cost trajectories\
    \ that diverge substantially from their headline real-wage trajectories, such\

    \ divergence in housing supply elasticity (Hilber-Vermeulen for UK, Saiz for US,\
    \ Kendall- Tulip for Australia) is a first-order driver of cross-metro differences\
    \ in welfare-relevant real wage growth, and that national aggregate real-wage\
    \ series systematically understate welfare losses in supply-restricted metros\
    \ while overstating them in supply-elastic metros. A clean supported finding would\
    \ show that the supply- elasticity coefficient on net-of-housing real wage growth\
    \ is statistically significant and quantitatively large (at least 20% of cross-metro\
    \ variance in welfare-adjusted real wage trajectories).\n"
  falsification_rule: 'Primary v2 local diagnostic is a national US FRED proxy, not
    the full metro supply-elasticity identification design. It compares total-private
    average hourly earnings deflated by all-items CPI with the same earnings deflated
    by CPI shelter from 2006-03 through 2020-02, the longest clean local FRED overlap
    ending before the pandemic. The diagnostic supports the narrower welfare-wage
    measurement channel if all-items real wage growth exceeds shelter-deflated wage
    growth by at least 5 percentage points over the window and the year-over-year
    growth correlation is below 0.90. It is refuted if the gap is below 2 percentage
    points or the correlation is at least 0.90. Otherwise it is partial. Full support
    for the original claim still requires the metro supply-elasticity panel.

    '
  threshold: support if all-items real wage growth minus shelter-deflated wage growth
    >=5pp and yoy-growth correlation <0.90; refute if gap <2pp or correlation >=0.90
  estimator:
    template: panel_fe
    clustering: metro
    fixed_effects:
    - metro
    - country_year
    notes: "Panel metro x year. Primary specification:\n  net_real_wage_growth_mt\
      \ = b0 + b1*supply_elasticity_m\n  + b2*productivity_growth_mt + b3*controls\
      \ + alpha_m (metro FE)\n  + gamma_ct (country-year FE) + epsilon\nCountry-year\
      \ FE absorb national-level policy and macro shocks. Metro FE absorb time-invariant\
      \ metro features. Supply elasticity is time-invariant per its academic construction,\
      \ so b1 is identified via the interaction of elasticity with time trend; primary\
      \ specification therefore includes supply_elasticity * time_trend as the key\
      \ variable. Secondary specification: drop metro FE and identify via cross-metro\
      \ variation in elasticity, reported as robustness. Cluster-robust SEs at metro.\n"
  steelman: hypotheses/steelman/housing_cost_driven_real_wage_divergence.md

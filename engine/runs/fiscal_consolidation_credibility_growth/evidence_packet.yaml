hypothesis:
  id: fiscal_consolidation_credibility_growth
  legacy_id: null
  path: hypotheses/fiscal/fiscal_consolidation_credibility_growth.yaml
  school: null
  topic: fiscal
  claim: "Credible fiscal consolidation episodes \u2014 defined as sustained primary\
    \ balance improvement of at least 2% of GDP over 3 years, not reversed within\
    \ 5 years, and accompanied by declining debt-to-GDP trajectories \u2014 predict\
    \ stronger subsequent 10-year real GDP per capita growth and private investment\
    \ than repeated discretionary fiscal stimulus in mature economies, in an OECD\
    \ panel 1980-2020. The directional claim is that credible consolidators experience\
    \ cumulative growth 5-15% above matched non-consolidating peers over the post-consolidation\
    \ decade, while stimulus-reliant economies show no significant gain or a relative\
    \ loss.\n"

  claim: Rwanda's post-1995 reconstruction trajectory under the RPF/Kagame government
    produced a multi-decade growth premium versus Sub-Saharan African peers, accompanied
    by sharp improvements in life expectancy, child mortality, and electrification,
    and a comparatively idiosyncratic civil-liberties regression captured in V-Dem
    and Freedom House. The pre-registered claim is that, in a synthetic-control design
    with SSA peers (Burundi, Uganda, Tanzania, Kenya, Ethiopia, Mozambique), Rwanda's
    cumulative real- GDP-pc growth 1995-2024 exceeds the synthetic counterfactual
    by at least 50% AND under- five mortality declines by at least 30 deaths per 1000
    more than counterfactual. The null counter-claim is that Rwanda's gains, while
    large in absolute terms, are consistent with post-conflict catch-up dynamics generally
    and not a regime-specific premium attributable to RPF developmental governance.

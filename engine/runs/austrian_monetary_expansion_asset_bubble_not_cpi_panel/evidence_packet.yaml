hypothesis:
  id: austrian_monetary_expansion_asset_bubble_not_cpi_panel
  legacy_id: null
  path: hypotheses/monetary/austrian_monetary_expansion_asset_bubble_not_cpi_panel.yaml
  school: null
  topic: monetary
  claim: "In a panel of advanced economies 1987-2007, base-money expansion and broad\
    \ money growth correlate positively with asset-price indices (equity, real estate)\
    \ but only weakly with headline CPI inflation. This dissociation \u2014 money\
    \ flowing into asset markets rather than goods-market prices \u2014 is the empirical\
    \ pattern Austrians (Rothbard, Salerno, Shostak) call \"asset-price inflation\"\
    \ and use to argue that CPI-targeting central banks systematically miss the welfare-\
    \ relevant inflation. The pre-registered claim is that the panel-FE coefficient\
    \ on broad-money growth in an asset-price-index regression is at least 3x the\
    \ coefficient in a parallel CPI regression over the same window.\n"
verdict:
  raw: REFUTED
  bucket: refuted
  reason: local proxy asset-price coefficient is not positive and significant at p<0.05
  status: null
preregistration:
  claim: "In a panel of advanced economies 1987-2007, base-money expansion and broad\
    \ money growth correlate positively with asset-price indices (equity, real estate)\
    \ but only weakly with headline CPI inflation. This dissociation \u2014 money\
    \ flowing into asset markets rather than goods-market prices \u2014 is the empirical\
    \ pattern Austrians (Rothbard, Salerno, Shostak) call \"asset-price inflation\"\
    \ and use to argue that CPI-targeting central banks systematically miss the welfare-\
    \ relevant inflation. The pre-registered claim is that the panel-FE coefficient\
    \ on broad-money growth in an asset-price-index regression is at least 3x the\
    \ coefficient in a parallel CPI regression over the same window.\n"
  falsification_rule: 'Hypothesis is falsified if the coefficient on broad-money growth
    in the asset-price regression is not at least 3x the coefficient in the CPI regression
    at p<0.05, OR if the asset-price coefficient is itself not positive and significant.

    '
  threshold: "coefficient(money_growth \u2192 asset_price_growth) / coefficient(money_growth\
    \ \u2192 cpi_inflation) >= 3.0 AND coefficient(money_growth \u2192 asset_price_growth)\
    \ > 0 at p<0.05\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: 'Two parallel panel-FE regressions: (1) real asset-price index growth on
      broad-money growth and controls; (2) CPI inflation on broad-money growth and
      the same controls. Test compares the two coefficients via Wald test. Mainstream/monetarist
      priors expect a CPI-link; finding it absent (or weaker than the asset-link)
      supports the Austrian "asset inflation" framing. Heterodox null is that the
      money-asset correlation is an artefact of credit-driven asset accumulation,
      not a money-disequilibrium phenomenon.

      '
  steelman: hypotheses/steelman/austrian_monetary_expansion_asset_bubble_not_cpi_panel.md

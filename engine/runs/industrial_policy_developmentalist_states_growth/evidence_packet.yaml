  legacy_id: null
  path: hypotheses/growth/industrial_policy_developmentalist_states_growth.yaml
  school: null
  topic: growth
  claim: "Developmentalist East Asian states (South Korea, Taiwan, Singapore, China)\
    \ pursuing active industrial policy \u2014 export-discipline, selective credit,\
    \ state-directed FDI screening, targeted sector promotion \u2014 achieved higher\
    \ long-run real per-capita GDP growth over 1960-2019 than otherwise-comparable\
    \ countries starting at similar income levels in 1960. The comparable-control\
    \ set is constructed from Maddison 1960 per-capita GDP neighbours plus similar\
    \ initial human-capital and geographic endowment, drawn from Latin America (ARG,\
    \ BRA, MEX, CHL), South Asia (IND, PAK, LKA), Southeast Asia non-developmentalist\
    \ (PHL, THA in the earlier period), and Africa (GHA, EGY). The hypothesis is that\
    \ the developmentalist subset's long-run growth trajectory exceeds the control\
    \ group by a margin not explained by controls for initial human capital, geography,\
    \ and institutional quality alone.\n"

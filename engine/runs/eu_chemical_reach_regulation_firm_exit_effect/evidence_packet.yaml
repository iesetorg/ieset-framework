    \ effect than 2018 deadline (inconsistent with the SME-concentrated mechanism),\
    \ OR (d) the synthetic control placebo test fails. Important null case to report\
    \ honestly: EU chemicals sector may be resilient to REACH at aggregate level (consistent\
    \ with BASF, Bayer's continued world-leading status) even if specific SME margin\
    \ is affected.\n"
  threshold: "\u03B2_eu_post_2018 on chemical_sme_share < -0.01 at p<0.10 AND \u03B2\
    _eu_post_2018 on log_chemical_sector_firm_count < -0.02 at p<0.10 AND differential\
    \ vs 2010 deadline is consistent with SME-concentrated mechanism\n"
  estimator:
    template: did_callaway_santanna

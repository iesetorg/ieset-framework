  falsification_rule: "Not supported if (a) \u03B2_eu_post_2018 on chemical SME share\
    \ is zero or positive at p<0.10, OR (b) \u03B2 is significant but disappears after\
    \ controlling for industrial electricity price (suggesting energy-cost channel\

    notes: "Primary specification: Callaway-Sant'Anna staggered DiD with two treatment\
      \ dates \u2014 2010Q4 (first-deadline, hits large-tonnage) and 2018Q2 (final\
      \ deadline, hits small-tonnage / SMEs). EU = treated, USA + JPN + KOR + CHN\
      \ = control. Treatment effect heterogeneity across deadlines is tested explicitly.\n\
      Secondary: event-study with 1-year event windows around each deadline. SME share\
      \ outcome should respond more to 2018 deadline than to 2010 deadline (small-tonnage\
      \ producers disproportionately SME).\nThird: synthetic control on EU-aggregate\
      \ chemical-sector firm count, with USA + JPN + KOR as donor pool.\nKnown limitations:\
      \ (1) ECHA dossier data are EU-only by construction (they are EU\n    registrations);\
      \ substance-count trajectories in non-EU peers\n    must be constructed differently\
      \ (Chemical Abstracts Service\n    or TSCA active list for USA) and are imperfectly\
      \ comparable.\n(2) 2020-2022 COVID + gas shock confound the 2018 treatment\n\
      \    window's post-trend. Split pre-COVID vs COVID-onwards as\n    sensitivity.\n\
      (3) Historical market structure: EU chemicals sector is\n    concentrated among\
      \ large incumbents (BASF, Bayer, Solvay);\n    SME-share metric is inherently\
      \ small and fluctuations are\n    noisy.\n(4) Firm exit could be misattributed\
      \ to REACH when actual driver\n    is energy-cost (post-2021) or Chinese competition\
      \ (post-2008).\n    The controls for industrial electricity price and EU ETS\n\
      \    partly address but not fully.\n"

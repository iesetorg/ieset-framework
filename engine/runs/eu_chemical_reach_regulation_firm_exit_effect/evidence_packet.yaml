hypothesis:
  id: eu_chemical_reach_regulation_firm_exit_effect
  legacy_id: null
  path: hypotheses/regulatory/eu_chemical_reach_regulation_firm_exit_effect.yaml
  school: null
  topic: regulatory
  claim: "The EU Registration, Evaluation, Authorisation and Restriction of Chemicals\
    \ regulation (REACH, entered into force 2007 with phased registration deadlines\
    \ 2010, 2013, 2018) imposed substantial fixed-cost registration requirements on\
    \ chemical substances manufactured or imported above threshold tonnages. This\
    \ hypothesis tests whether REACH's phased registration deadlines \u2014 particularly\
    \ the 2018 final deadline for low-tonnage substances \u2014 are associated with\
    \ a measurable differential in chemical-sector firm exits, substance discontinuations,\
    \ and SME-share erosion in the EU relative to non-EU comparators (USA, CHN, JPN,\
    \ KOR). The hypothesis recognises explicitly that REACH's intended function \u2014\
    \ consumer and worker protection from chemical hazards \u2014 is a welfare benefit\
    \ outside the outcome set, and that EU chemicals firms (BASF, Bayer, Solvay, Evonik,\
    \ DSM) have historically been world-leading despite regulatory stringency. The\
    \ empirical test is whether the specific SME-share and substance-diversity margins\
    \ show regulatory-induced exit, not whether the sector as a whole is damaged.\n"
verdict:

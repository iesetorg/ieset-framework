hypothesis:
  id: australia_hawke_keating_reform_long_run
  legacy_id: null
  path: hypotheses/growth/australia_hawke_keating_reform_long_run.yaml
  school: null
  topic: growth
  claim: "Australia\u2019s long expansion after the Hawke-Keating reforms (1983\u2013\
    1996) \u2014 including tariff cuts, financial deregulation, competition-policy\
    \ introduction, and fiscal consolidation \u2014 is better predicted by market\
    \ liberalisation than by sector-specific state direction. In a panel of OECD commodity-exporting\
    \ and small open economies, Australia\u2019s post-1983 cumulative log GDP-per-capita\
    \ growth and labour productivity are positively associated with the reform dummy,\
    \ while sectoral subsidies and state-owned enterprise shares do not show a comparable\
    \ positive association.\n"

  status: PARTIAL
preregistration:
  claim: 'In a broad-country panel 1990-2020, mortgage-market liberalisation episodes
    (abolition of interest-rate caps, reduction of down-payment requirements, privatisation
    of state mortgage banks, and introduction of securitisation) predict higher homeownership
    rates, higher residential investment as a share of GDP, and lower housing-rent-to-income
    ratios, controlling for income growth, demographic structure, and urbanisation.
    The directional claim is that mortgage liberalisation is associated with at least
    a 3 percentage-point increase in the homeownership rate and a 0.5 percentage-point
    increase in residential investment/GDP within 5 years.

    '
  falsification_rule: "SUPPORTED if \u03B21 (mortgage liberalisation) is positive\
    \ and significant at p<0.10 for both homeownership and residential investment.\
    \ PARTIAL if positive and significant for homeownership but not investment (demand\
    \ reallocation without supply response). REFUTED if \u03B21 is negative and significant\
    \ at p<0.10. INFORMATIVE: excluding USA and UK should not eliminate the positive\
    \ sign; if it does, the result is driven by Anglo- Saxon cases.\n"
  threshold: "\u03B2_mortgage_lib (homeownership) > 0 at p<=0.10  AND \u03B2_mortgage_lib\
    \ (residential investment) > 0 at p<=0.10  AND Ex-USA-UK robustness retains positive\
    \ sign.\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Two-way FE panel with staggered adoption: homeownership = \u03B20 + \u03B2\
      1*mortgage liberalisation + controls + FE. Robustness: (1) exclude USA and UK\
      \ (dominant liberalisation cases); (2) use synthetic control for each adopter;\
      \ (3) control for house-price growth to separate credit access from asset-price\
      \ effects; (4) subsample by initial financial depth; (5) use 5-year forward\
      \ averages to capture medium-run housing-stock adjustment.\n"
  steelman: hypotheses/steelman/mortgage_market_liberalisation_homeownership_panel.md

hypothesis:
  id: mortgage_market_liberalisation_homeownership_panel
  legacy_id: null
  path: hypotheses/housing/mortgage_market_liberalisation_homeownership_panel.yaml
  school: null
  topic: housing
  claim: 'In a broad-country panel 1990-2020, mortgage-market liberalisation episodes
    (abolition of interest-rate caps, reduction of down-payment requirements, privatisation
    of state mortgage banks, and introduction of securitisation) predict higher homeownership
    rates, higher residential investment as a share of GDP, and lower housing-rent-to-income
    ratios, controlling for income growth, demographic structure, and urbanisation.
    The directional claim is that mortgage liberalisation is associated with at least
    a 3 percentage-point increase in the homeownership rate and a 0.5 percentage-point
    increase in residential investment/GDP within 5 years.

    '
verdict:

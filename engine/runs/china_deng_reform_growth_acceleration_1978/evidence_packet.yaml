  topic: growth
  claim: "China's 1978 Deng-era reforms \u2014 Household Responsibility System in\
    \ agriculture, Special Economic Zones, dual-track price liberalisation, Township\
    \ and Village Enterprise reform, gradual opening to FDI and trade \u2014 produced\
    \ a structural break in per-capita GDP growth rates. Pre-reform (1965-1977) annualised\
    \ real GDP-per-capita growth was modest; post-reform (1979-2019, pre-COVID) annualised\
    \ growth exceeded the pre-reform rate by at least 3 percentage points per year\
    \ on a sustained basis. This is one of the largest pre/post growth accelerations\
    \ in economic history and is a clean natural experiment because the policy change\
    \ is abrupt, well-dated, and internal to a single country (no donor-pool identification\
    \ required).\n"

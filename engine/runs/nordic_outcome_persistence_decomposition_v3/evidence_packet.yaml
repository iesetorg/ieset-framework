preregistration:
  claim: 'Countries that enacted market-oriented structural reforms with credible
    institutional commitment (Norway handlingsregel 2001, Sweden pension- architecture
    reform 1999) experienced systematically better post-treatment GDP-per-capita and
    unemployment trajectories than their own pre-treatment trends would have predicted.
    Countries that entered the euro area without corresponding structural adjustment
    (Italy 1999, Greece 2001) experienced systematically worse post-treatment trajectories.
    The v3 hypothesis predicts a positive within-country effect for the reform group
    and a negative within-country effect for the fiscal-dominance group, identified
    off their own pre-treatment baselines via country and year fixed effects. This
    directly addresses the v1/v2 structural limitation: cross-sectional decomposition
    cannot see timing, but within-country DiD can.

    '
  falsification_rule: "Not supported if either \u03B2_reform or \u03B2_stagnation\
    \ has the opposite sign from the pre-registered expectation (positive for reform,\
    \ negative for stagnation) at the 90% confidence level on the primary outcome\
    \ (log GDP per capita PPP). Also not supported if the pre-trend placebo detects\
    \ spurious effects \u2014 that would indicate parallel trends is violated and\
    \ the identification is not clean. A clean pass requires \u03B2_reform > 0 at\
    \ p < 0.10, \u03B2_stagnation < 0 at p < 0.10, and the pre-trend placebo coefficient\
    \ at |t+<0|<1.65 (not statistically distinguishable from zero).\n"
  threshold: "\u03B2_reform > 0 at p < 0.10  AND \u03B2_stagnation < 0 at p < 0.10\
    \  AND pre_trend_placebo_t < 1.65 absolute\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "PanelOLS with country + year fixed effects, cluster-robust SEs by country.\
      \ Specification:\noutcome_{i,t} = \u03B1_i + \u03B3_t + \u03B2_reform * reform_post_{i,t}\n\
      \              + \u03B2_stagnation * fiscal_dominance_post_{i,t}\n         \
      \     + X\u03B2 + \u03B5_{i,t}\n\nCountry FE absorb all time-invariant country\
      \ features (Nordic culture, geography, social trust, population homogeneity,\
      \ pre-existing institutional quality) \u2014 the concern v1 and v2 could not\
      \ control for. Year FE absorb global trends and common shocks (2008 GFC, 2020\
      \ COVID, etc). \u03B2_reform identifies the average post-treatment deviation\
      \ from each treated country's own pre-treatment trend, net of global year effects.\n\
      This is a staggered two-way fixed effects DiD. TWFE with staggered treatment\
      \ has known bias under heterogeneous treatment effects (Goodman-Bacon 2021);\
      \ v3.1 will run Callaway-Sant'Anna as robustness once that package is installed.\
      \ For v3 v1, TWFE is the simplest identification that tests the core claim.\n\
      Secondary specs (reported alongside primary): - event study with \xB15 year\
      \ leads and lags around each treatment date - pre-trend placebo: fake treatment\
      \ at t-5 to test parallel trends - drop-COVID robustness (2020-2021 excluded)\n"
  steelman: hypotheses/steelman/nordic_outcome_persistence_decomposition_v3.md

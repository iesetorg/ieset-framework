hypothesis:
  id: us_eu_divergence_decomposition
  legacy_id: null
  path: hypotheses/growth/us_eu_divergence_decomposition.yaml
  school: null
  topic: growth
  claim: 'The US-EU GDP per capita (PPP, constant international dollars) gap has widened
    materially between 2000 and 2023. The gap ratio (US divided by EU-27 average)
    grew from approximately 1.25 in 2000 to approximately 1.45 by 2023, a divergence
    of ~20 percentage points. The widening is not primarily demographic (both regions
    age) or measurement-artefact; it is associated with specific policy-content differences:
    US energy- cost advantage post-2010 shale revolution, EU cumulative regulatory
    burden on the digital sector (GDPR 2018, DMA 2022, AI Act 2024), US capital-market
    depth enabling tech-sector scale that EU bank-financed systems produce less of,
    and EU Stability and Growth Pact constraining countercyclical fiscal response.
    This hypothesis establishes the divergence as a stylised fact and attempts a first-pass
    decomposition.

    '
verdict:
  raw: "partial \u2014 gap widened +0.044 log-points but less than 0.10 threshold"
  bucket: partial
  reason: null
  status: null
preregistration:
  claim: 'The US-EU GDP per capita (PPP, constant international dollars) gap has widened
    materially between 2000 and 2023. The gap ratio (US divided by EU-27 average)
    grew from approximately 1.25 in 2000 to approximately 1.45 by 2023, a divergence
    of ~20 percentage points. The widening is not primarily demographic (both regions
    age) or measurement-artefact; it is associated with specific policy-content differences:
    US energy- cost advantage post-2010 shale revolution, EU cumulative regulatory
    burden on the digital sector (GDPR 2018, DMA 2022, AI Act 2024), US capital-market
    depth enabling tech-sector scale that EU bank-financed systems produce less of,
    and EU Stability and Growth Pact constraining countercyclical fiscal response.
    This hypothesis establishes the divergence as a stylised fact and attempts a first-pass
    decomposition.

    '
  falsification_rule: 'Not supported if (a) the US-EU gap ratio did not widen materially
    (less than 10 percentage points) between 2000 and 2023, OR (b) the gap is flat
    or closing rather than widening, OR (c) the widening is fully explained by demographic
    or measurement artefact (requires a separate demographic-decomposition robustness).

    '
  threshold: 'gap_2023 - gap_2000 >= 0.10 (log units)  AND post-2010 interaction coefficient
    > 0  AND the widening survives a demographic controls robustness

    '
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-stage:\nStage 1 (descriptive): compute log(US GDP pc PPP) \u2212 log(EU\
      \ population-weighted GDP pc PPP) per year. Plot trajectory 2000-2023. Confirm\
      \ widening magnitude and timing.\nStage 2 (decomposition): PanelOLS with US\
      \ vs EU-member country FE + year FE, interaction of US dummy with post-2010\
      \ (shale) indicator, post-2018 (GDPR-era digital regulation) indicator, post-2021\
      \ (EU energy crisis) indicator. Each interaction coefficient attributes incremental\
      \ divergence to the period it names.\nThis is explicitly a DESCRIPTIVE / DECOMPOSITION\
      \ hypothesis, not a causal identification. The evidence_type reflects that \u2014\
      \ we claim to document a pattern and propose a decomposition, not to causally\
      \ identify each channel's contribution.\n"
  steelman: hypotheses/steelman/us_eu_divergence_decomposition.md

  topic: trade
  claim: 'South Africa''s SADC trade-protocol implementation (effective 2000, asymmetric
    tariff phase-down completed 2008 for the SADC developing-country members and 2012
    for South Africa) raised bilateral intra-SADC trade for ZAF but did not produce
    a measurable acceleration in aggregate ZAF trade-openness over 2000-2019. The
    descriptive claim is that SADC produced bilateral composition shifts in regional
    trade share without moving the aggregate trade-share-of-GDP needle.

    '

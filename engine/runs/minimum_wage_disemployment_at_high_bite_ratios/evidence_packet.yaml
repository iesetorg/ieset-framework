  raw: "inconclusive \u2014 data gap on bls:LAU_state_teen_employment_population_ratio_panel,\
    \ bls:OES_state_median_hourly_wage_panel. The spec's primary stratified Callaway-Sant'Anna\
    \ DiD on US-state cohorts split by bite ratio (state-min / state-median-hourly-wage)\
    \ cannot be estimated without (a) the BLS LAU state teen employment-population\
    \ panel, (b) the USDOL state minimum-wage history, and (c) the BLS OES state median-hourly-wage\
    \ panel. On-disk BLS vintages currently include only national LNS/CES/CUUR series;\
    \ the state fan-out has not been fetched. Cross-country OECD MWUSD bite-ratio\
    \ fallback is also absent. No coefficients computed."

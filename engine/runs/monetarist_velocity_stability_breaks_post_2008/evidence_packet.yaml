preregistration:
  claim: 'US M2 velocity (nominal-GDP / M2) was stable in the strong Friedman-Schwartz
    sense (low-frequency variation only, no trend break) from 1960 through 2007. Beginning
    in 2008 the series exhibits a structural break: a step-decline of roughly 30%
    by 2014 and a further decline through 2020, accompanied by loss of the prior cyclical
    regularity. The same break appears in the Eurozone, UK and Japan in their own
    M2/GDP velocity series. This hypothesis is descriptive: it pre-registers exactly
    when and where the break occurs, so that subsequent monetarist-style predictions
    of the form "M2-growth implies inflation" can be conditioned on a known velocity-regime
    indicator rather than applied as if velocity were still stable.

    '
  falsification_rule: "Not supported if the Bai-Perron test detects no break in 2005-2012\
    \ in the US series, or if the magnitude of the post-break velocity decline is\
    \ below 15%, or if the break is detected only in the US and not in at least 2\
    \ of (EU, UK, JP). A Keynesian / endogenous-money reading wins cleanly if the\
    \ pre-2008 series fails the stability test too \u2014 i.e. velocity was never\
    \ stable in the Friedman-Schwartz sense and the post-2008 'break' is just continuation\
    \ of pre-existing drift.\n"
  threshold: 'Bai-Perron break date in [2007Q1, 2010Q4] for USA at 5% supF cutoff
    AND post-break level decline >= 15% within 6 years AND analogous break detected
    in at least 2 of {EU, UK, JP} within +/- 8 quarters AND pre-2008 sub-series passes
    Bai-Perron no-break null at 5%

    '
  estimator:
    template: descriptive
    notes: 'Primary test: Bai-Perron 1998 multiple-structural-break test on log M2
      velocity 1960Q1-2024Q4, allowing up to 3 breaks. Pre-registered prediction:
      at least one break is detected within +/- 4 quarters of 2008Q3 in the US series
      and within +/- 8 quarters in EU/UK/JP. Secondary test: Chow test at 2008Q3 against
      pre-2008 trend with p<0.01 cutoff. Tertiary: visual diagnostic chart panel showing
      the HP-filtered trend, the rolling 5y stddev, and the regime-conditional M2-growth-to-CPI
      relationship pre and post 2008.

      '
  steelman: hypotheses/steelman/monetarist_velocity_stability_breaks_post_2008.md

hypothesis:
  id: market_reform_without_state_capacity_failure
  legacy_id: null
  path: hypotheses/institutional_quality/market_reform_without_state_capacity_failure.yaml
  school: null
  topic: institutional_quality
  claim: 'Market-oriented reforms (trade liberalisation, privatisation, price decontrol)
    implemented in countries with weak state capacity (low WGI government effectiveness,
    low tax revenue as % of GDP, weak contract enforcement) fail to produce sustained
    long-run prosperity compared to similar reforms in high-capacity settings. The
    claim is a boundary test: it protects against naive laissez-faire claims by requiring
    minimum state capacity as a precondition for market-reform success, over 1980-2020.'
verdict:
  raw: refuted
  bucket: refuted
  reason: Low-capacity reformers grew +4.26%/yr, at or above high-capacity +3.06%/yr
    (diff -1.21pp, p=0.037).
  status: refuted
preregistration:
  claim: 'Market-oriented reforms (trade liberalisation, privatisation, price decontrol)
    implemented in countries with weak state capacity (low WGI government effectiveness,
    low tax revenue as % of GDP, weak contract enforcement) fail to produce sustained
    long-run prosperity compared to similar reforms in high-capacity settings. The
    claim is a boundary test: it protects against naive laissez-faire claims by requiring
    minimum state capacity as a precondition for market-reform success, over 1980-2020.'
  falsification_rule: The hypothesis is falsified if market reforms in low-capacity
    countries show positive and significant (p < 0.10) coefficients on GDP or TFP
    growth that are indistinguishable from reforms in high-capacity countries in an

preregistration:
  claim: Consumer product variety and price-adjusted welfare improve more after episodes
    of trade liberalisation and competition-policy reform than after state industrial-policy
    episodes of comparable duration and scale, in a panel of middle- and high-income
    countries 1980-2020. Variety is measured by import-product-line counts and domestic
    SKU availability indices; welfare is measured by real consumption deflated by
    quality-adjusted price indices.
  falsification_rule: The hypothesis is falsified if the post-reform coefficient on
    trade/competition episodes is negative and significant (p < 0.10) for variety
    or welfare, or if industrial-policy episodes show a significantly larger positive
    coefficient than trade/competition episodes in a head-to-head panel specification.
  threshold:
    supported: trade/competition coefficient > 0 at p < 0.10 AND larger than industrial-policy
      coefficient
    refuted: trade/competition coefficient < 0 at p < 0.10

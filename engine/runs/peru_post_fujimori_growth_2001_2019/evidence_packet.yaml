  claim: "Peru's 2001-2019 growth window \u2014 under five different administrations\
    \ (Toledo, Garc\xEDa II, Humala, PPK, Vizcarra) that all preserved the 1993 macroeconomic\
    \ constitution (inflation-targeting central bank, fiscal-responsibility framework,\
    \ open trade and capital account) \u2014 delivered cumulative real-GDP-per-capita\
    \ growth in the top quartile of Latin America despite high political turnover.\
    \ The pre-registered claim is that institutional persistence (constraint on the\
    \ executive to deviate from the macro framework) is the binding factor: log GDP-pc\
    \ growth 2001-2019 exceeds the LATAM median by at least 0.20 log-points, AND the\
    \ dispersion of macro outcomes (inflation, fiscal balance) under five administrations\
    \ is lower than the within-administration dispersion of typical Latin American\
    \ countries on a 5-year basis. The mechanism is that pre-committed institutions\
    \ (central-bank independence, fiscal rule, open trade) outperform discretionary\
    \ populist swings even when populist political pressure is high.\n"

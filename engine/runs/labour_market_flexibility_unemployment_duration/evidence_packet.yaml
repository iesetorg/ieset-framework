hypothesis:
  id: labour_market_flexibility_unemployment_duration
  legacy_id: null
  path: hypotheses/labour/labour_market_flexibility_unemployment_duration.yaml
  school: null
  topic: labour
  claim: "Countries with stricter employment protection legislation \u2014 measured\
    \ by the OECD EPL indicator (or comparable alternatives where OECD EPL is missing)\
    \ \u2014 experience longer average unemployment duration, holding other controls\
    \ constant. The hypothesis is consistent with the Mortensen-Pissarides search-and-matching\
    \ framework: higher firing costs reduce both firing and hiring flows, lengthening\
    \ the time unemployed workers spend searching for jobs. The effect on the unemployment\
    \ LEVEL is theoretically ambiguous (lower inflows offsetting longer durations)\
    \ and is NOT part of the pre-registered claim; only the duration effect is. Expected\
    \ effect is sign-definite (positive correlation between EPL strictness and duration)\
    \ with magnitude consistent with the Nickell 1997, Blanchard-Wolfers 2000, and\
    \ OECD Employment Outlook (2020+) ranges.\n"
verdict:
  raw: "refuted \u2014 primary EPL coefficient on long-term-unemp share is \u03B2\
    =+1.952 (p=0.224); fails sign-and-significance test"
  bucket: refuted
  reason: null
  status: null
preregistration:
  claim: "Countries with stricter employment protection legislation \u2014 measured\
    \ by the OECD EPL indicator (or comparable alternatives where OECD EPL is missing)\
    \ \u2014 experience longer average unemployment duration, holding other controls\
    \ constant. The hypothesis is consistent with the Mortensen-Pissarides search-and-matching\
    \ framework: higher firing costs reduce both firing and hiring flows, lengthening\
    \ the time unemployed workers spend searching for jobs. The effect on the unemployment\
    \ LEVEL is theoretically ambiguous (lower inflows offsetting longer durations)\
    \ and is NOT part of the pre-registered claim; only the duration effect is. Expected\
    \ effect is sign-definite (positive correlation between EPL strictness and duration)\
    \ with magnitude consistent with the Nickell 1997, Blanchard-Wolfers 2000, and\
    \ OECD Employment Outlook (2020+) ranges.\n"
  falsification_rule: 'Not supported if (a) the two-way FE panel coefficient on OECD
    EPL on long-term-unemployment share is not positive and significant at 5%, OR
    (b) the coefficient on median unemployment duration is not positive at 5%, OR
    (c) the coefficient loses significance when unemployment-benefit replacement rate
    is added as a control (suggesting the finding is confounded with UI generosity
    rather than identifying the EPL-specific effect). Support requires both outcomes
    to show the predicted sign AND for the EPL coefficient to remain significant after
    the UI generosity robustness control.

    '
  threshold: 'panel_FE_beta(EPL) on long_term_share > 0 at p<0.05 AND panel_FE_beta(EPL)
    on median_duration > 0 at p<0.05 AND EPL coefficient remains significant at p<0.10
    after UI generosity control

    '
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Two-way FE panel, standard errors clustered by country. Primary identification\
      \ from within-country EPL changes over time (many OECD countries undertook EPL\
      \ reforms \u2014 DEU 2003 Hartz, ESP 2012, ITA 2014 Jobs Act, FRA 2017 \u2014\
      \ providing useful within-country variation). Robustness: Blanchard-Wolfers\
      \ 2000 style interaction of EPL with macro shock (output gap), since the theoretical\
      \ prediction is EPL matters more when shocks are larger.\n"
  steelman: hypotheses/steelman/labour_market_flexibility_unemployment_duration.md

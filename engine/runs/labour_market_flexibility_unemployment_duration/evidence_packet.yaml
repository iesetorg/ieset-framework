caveats:
- ALMP, unionisation, output gap controls dropped (not in vintages).
- Eurostat une_ltu_a not in vintages in this workspace; primary long-term-unemployment
  outcome loaded from Eurostat lfst_r_lfu3rt, total education, both sexes, age 15-74.
- OECD DSD_LMS median-duration not in vintages; primary outcome substituted with Eurostat
  une_ltu_a (long-term-unemp share, % of active pop). Secondary outcome substituted
  with Eurostat une_rt_a unemployment rate.
- OECD DSD_UBR UI replacement rate not in vintages; pre-registered UI-generosity robustness
  control replaced with macro controls (trade openness, log GDP pc PPP).
- OECD EPL_R not in vintages; treatment substituted with inverted Fraser EFW area_5_regulation
  (10 - score) as a strictness-oriented proxy.
- Sample restricted to Eurostat-reporting countries with EPL data; OECD non-EU members
  (USA, JPN, KOR, MEX, NZL, AUS, CAN) lack Eurostat outcome data and drop out of primary
  spec.

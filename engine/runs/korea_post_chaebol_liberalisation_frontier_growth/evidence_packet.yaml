  school: null
  topic: growth
  claim: South Korea's post-1997 corporate governance and financial liberalisation
    reforms explain a larger share of post-crisis frontier productivity convergence
    than the earlier heavy-and-chemical-industry (HCI) drive. After 1997, chaebol
    restructuring, foreign ownership liberalisation, and banking-sector clean-ups
    raised total factor productivity growth and reduced resource misallocation relative
    to the HCI era (1973-1996), even after controlling for initial income, human capital,
    and global trade conditions. The claim applies to South Korea 1970-2020 in a time-series
    structural-break framework with cross-country comparator benchmarking.

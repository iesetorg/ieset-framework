  path: hypotheses/growth/infrastructure_gap_state_investment_high_return.yaml
  school: null
  topic: growth
  claim: 'State-led infrastructure investment (transport, energy, water, telecommunications)
    has high economic returns in countries below basic access thresholds (paved-road
    density <20 km per 100 km2, electricity access <80%, clean water access <90%),
    confirming developmentalist catch-up logic. Returns are measured by subsequent
    GDP growth, firm productivity, and agricultural yield improvements in connected
    regions, over 1990-2020. The claim is adversarial: it validates a core developmentalist
    argument under specific boundary conditions.'

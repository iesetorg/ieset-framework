  school: null
  topic: trade
  claim: "Bangladesh's preferential duty-free, quota-free access to EU markets under\
    \ the Everything-But-Arms (EBA) scheme \u2014 strengthened by Multi-Fibre Arrangement\
    \ phase-out completion in 2005 and EBA-rules-of-origin simplification effective\
    \ 2011 \u2014 produced a structural acceleration in Bangladesh apparel exports\
    \ and manufacturing-share-of-GDP over the 2005-2019 window. The test is a within-country\
    \ structural break plus comparator descriptive test against Pakistan, which had\
    \ similar pre-2005 apparel-export potential but did not enjoy equivalent EU preferential\
    \ access.\n"

  id: west_east_germany_economic_system_divergence_1950_1989
  path: hypotheses/growth/west_east_germany_economic_system_divergence_1950_1989.yaml
  school: null
  topic: growth
  claim: "Starting from comparable 1945 post-war conditions \u2014 same ethnicity,\
    \ language, pre-war German institutional and industrial inheritance, and with\
    \ the GDR inheriting a larger share of pre-war industrial capital in Saxony and\
    \ Thuringia \u2014 the Federal Republic's Soziale Marktwirtschaft (Ordoliberal\
    \ market economy with welfare state) versus the German Democratic Republic's planned\
    \ economy with administered prices, state-enterprise production, and soft budget\
    \ constraints produced by 1989 a canonical divergence that pattern-matches >=7\
    \ of 10 pre-registered extreme-outcome metrics, each drawn from a different publisher\
    \ or methodology family. The canonical-case claim is that no other peacetime country\
    \ pair separated for comparable duration from comparable 1945 starting conditions\
    \ produced a divergence of this magnitude across this many independent outcome\
    \ channels. A refutation (<=3 metrics met) would indicate that the consensus FRG/GDR\
    \ gap was substantially overstated or that the framework's institutional-quality\
    \ coding of market vs planned economies is mis-calibrated.\n"

preregistration:
  claim: "The observed decline in the labour share of gross value added across OECD\
    \ economies over 1980-2020 (typically 4-8 percentage points) is explained by a\
    \ decomposable set of channels rather than a single cause: (a) capital-intensity\
    \ technological change with capital and labour complementarity below unity (Karabarbounis-Neiman),\
    \ (b) globalisation and import competition lowering tradable-sector wage bargaining\
    \ power (Elsby-Hobijn-Sahin), (c) rising market concentration enabling markup\
    \ expansion (De Loecker-Eeckhout-Unger), and (d) measurement artefacts from owner-occupier\
    \ imputed-rent accounting and self-employment income allocation (Rognlie, Gollin).\
    \ The claim is that channels (a)+(d) jointly absorb at least 50 percent of the\
    \ observed decline \u2014 i.e. a substantial fraction is either technologically-driven\
    \ factor-price adjustment or measurement artefact \u2014 with (b) and (c) material\
    \ but smaller contributors. A clean supported finding weakens the pure-monopoly-markup\
    \ reading and the pure-globalisation reading while preserving a role for both.\n"
  falsification_rule: "Not supported if channel (a) capital-intensity plus channel\
    \ (d) housing/self-employment measurement jointly account for less than 30 percent\
    \ of explained variation in labour share, while channel (c) concentration alone\
    \ accounts for more than 40 percent. That pattern would support the pure De Loecker-Eeckhout\
    \ markup reading and weaken the Karabarbounis-Neiman + Rognlie readings the framework\
    \ leans on. Symmetrically, the hypothesis is also not supported if the housing-stripped\
    \ labour share shows no decline at all \u2014 because then the \"decline\" is\
    \ an artefact and the whole literature is misattributed; the hypothesis claims\
    \ measurement is material but not dispositive.\n"
  threshold: 'capital_plus_measurement_share >= 0.30  AND concentration_share <= 0.40  AND
    housing_stripped_decline >= 2_percentage_points_over_sample_period

    '
  estimator:
    template: panel_fe_decomposition
    clustering: country
    fixed_effects:
    - country
    - year
    notes: 'Specification: labour_share = b0 + b1*log(K/L) + b2*import_pen + b3*concentration
      + b4*housing_va_share + b5*self_emp_share + b6*union_density + b7*log(gdp_pc)
      + b8*log(pop) + alpha_i + gamma_t + epsilon. Driscoll-Kraay SEs clustered by
      country. Variance decomposition (Shapley-style R-squared attribution) reports
      each channel''s share of explained variation. Robustness: re-estimate on housing-stripped
      labour share per Rognlie; re-estimate on corporate- sector-only labour share
      to neutralise self-employment channel.

      '
  steelman: hypotheses/steelman/labor_share_decline_causes.md

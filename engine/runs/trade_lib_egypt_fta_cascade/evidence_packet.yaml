  topic: trade
  claim: 'Egypt''s FTA cascade (EU Association Agreement 2004, Agadir Agreement 2007,
    COMESA Free Trade Area 1998 with full implementation 2009, US Qualifying Industrial
    Zones 2004 enabling duty-free apparel exports to the US under Israeli content
    rules) raised Egyptian trade-openness modestly over 2000-2010 before the 2011
    revolution and subsequent macroeconomic instability eroded the gains. The descriptive
    claim is a positive 2000-2010 trajectory with stagnation or reversal post-2011.

    '

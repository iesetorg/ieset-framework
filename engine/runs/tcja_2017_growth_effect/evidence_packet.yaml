hypothesis:
  id: tcja_2017_growth_effect
  legacy_id: null
  path: hypotheses/fiscal/tcja_2017_growth_effect.yaml
  school: null
  topic: fiscal
  claim: 'Trump''s 2017 Tax Cuts and Jobs Act produced smaller investment and output
    responses than Laffer-curve advocates projected, consistent with New Keynesian
    estimates of corporate-tax-cut passthrough in a near-full-employment economy with
    inelastic long-run investment supply. The discriminating test is whether the investment-to-output
    and output-to-tax-rate elasticities sit inside the canonical NK range or the supply-side
    range projected by TCJA proponents.

    '

  claim: 'Trump''s 2017 Tax Cuts and Jobs Act produced smaller investment and output
    responses than Laffer-curve advocates projected, consistent with New Keynesian
    estimates of corporate-tax-cut passthrough in a near-full-employment economy with
    inelastic long-run investment supply. The discriminating test is whether the investment-to-output
    and output-to-tax-rate elasticities sit inside the canonical NK range or the supply-side
    range projected by TCJA proponents.

    '
  falsification_rule: "The hypothesis is SUPPORTED if corporate investment elasticity\
    \ to the effective marginal tax rate falls inside the NK canonical range (\u2248\
    \ -0.1 to -0.3) rather than the supply-side range (\u2264 -0.5), AND if cumulative\
    \ real-GDP deviation from pre-TCJA trend over 2018-2019 (pre-COVID) is less than\
    \ 1 percentage point. REFUTED if elasticity exceeds -0.5 in absolute value or\
    \ if cumulative GDP gain exceeds 2.5 percentage points over trend.\n"
  threshold: null

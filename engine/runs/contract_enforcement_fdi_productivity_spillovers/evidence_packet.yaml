hypothesis:
  id: contract_enforcement_fdi_productivity_spillovers
  legacy_id: null
  path: hypotheses/institutional_quality/contract_enforcement_fdi_productivity_spillovers.yaml
  school: null
  topic: institutional_quality
  claim: "Across emerging-market and developing economies 1990-2020, stronger contract\
    \ enforcement \u2014 measured by years to resolve a commercial dispute, contract-enforcement\
    \ index, and legal-origin dummies \u2014 predicts whether foreign-direct-investment\
    \ inflows produce productivity spillovers to domestic firms rather than enclave\
    \ effects. The pre-registered claim is that the correlation between FDI inflows\
    \ and subsequent domestic-firm TFP growth is positive and significant at p<0.05\
    \ only in countries with above-median contract enforcement, and is insignificant\
    \ or negative in countries with below-median enforcement.\n"
verdict:
  raw: SUPPORTED
  bucket: supported
  reason: coef=+0.1006 (sign matches claim +), p=0.0107
  status: SUPPORTED
preregistration:
  claim: "Across emerging-market and developing economies 1990-2020, stronger contract\
    \ enforcement \u2014 measured by years to resolve a commercial dispute, contract-enforcement\
    \ index, and legal-origin dummies \u2014 predicts whether foreign-direct-investment\
    \ inflows produce productivity spillovers to domestic firms rather than enclave\
    \ effects. The pre-registered claim is that the correlation between FDI inflows\
    \ and subsequent domestic-firm TFP growth is positive and significant at p<0.05\
    \ only in countries with above-median contract enforcement, and is insignificant\
    \ or negative in countries with below-median enforcement.\n"
  falsification_rule: 'Not supported if (a) the interaction coefficient is not positive
    and significant at p<0.05, OR (b) the marginal effect of FDI on domestic TFP is
    positive and significant even in below-median contract-enforcement countries (no
    threshold), OR (c) the result is driven entirely by common-law countries (legal-origin
    confound rather than enforcement per se). An "FDI always helps" reading wins if
    (b) holds; a "institutions don''t matter for FDI" reading wins if the interaction
    is insignificant and FDI main effect dominates.

    '
  threshold: "panel_FE_beta(FDI \xD7 contract_enforcement) > 0 at p<0.05 AND marginal_effect_FDI_at_below_median_enforcement\
    \ NOT > 0 at p<0.10 AND result robust to excluding_common_law_countries at p<0.10\n"
  estimator:
    template: panel_fe
    fixed_effects:
    - country
    - year
    clustering: country
    notes: "Panel FE with interaction: FDI inflows \xD7 contract enforcement. Primary\
      \ test: sign and significance of interaction on domestic- firm TFP growth. Sub-sample\
      \ analysis: above-median vs below- median contract enforcement. Robustness:\
      \ use legal-origin dummies instead of Doing Business enforcement measure; IV\
      \ using colonial-legal-origin as instrument for contract enforcement.\n"

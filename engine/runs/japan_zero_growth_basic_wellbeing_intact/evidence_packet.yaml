hypothesis:
  id: japan_zero_growth_basic_wellbeing_intact
  legacy_id: null
  path: hypotheses/growth/japan_zero_growth_basic_wellbeing_intact.yaml
  school: null
  topic: growth
  claim: 'Japan''s 1990-2020 near-zero per-capita GDP growth regime (mean GDP/capita
    growth < 1%) coincided with a meaningful improvement in life expectancy at birth
    (+5 years), a sharp decline in average annual hours worked per employed person
    (~-15%), and a stable Cantril life-satisfaction trajectory at OECD-median levels.
    The pattern refutes the proposition that per-capita GDP growth is a binding constraint
    on retaining or improving baseline-wellbeing outcomes in advanced economies.

    '

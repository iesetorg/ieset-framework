preregistration:
  claim: "Canadian real household disposable income per capita has stagnated or grown\
    \ more slowly than in comparable resource-plus-anglophone-plus-small- open-developed\
    \ economies (USA, AUS, NZL, GBR, NOR, CHE) over 2015-2023, once adjusted for CPI\
    \ and household size. The claim is narrowly about the household-sector purchasing-power\
    \ trajectory \u2014 not aggregate output and not pre-tax labour earnings in isolation\
    \ \u2014 because the relevant welfare metric for a household under the 2015-present\
    \ Canadian policy mix is after-tax-and-transfer real income per capita. The hypothesis\
    \ additionally tests whether, once housing costs are netted out (real disposable\
    \ income net of shelter expenditure), the Canadian trajectory is worse than the\
    \ headline series suggests, since Canadian house prices and rents rose substantially\
    \ faster than the donor-pool average over the sample window.\n"
  falsification_rule: "Not supported if \u03B2_canada_post_2015 is non-negative (>=\
    \ 0) at p < 0.10 in both (a) the OECD household-disposable-income primary spec\
    \ and (b) the WDI GNI-per-capita proxy spec. Supported-tentative if negative and\
    \ significant in only one of the two specs. Supported if negative and significant\
    \ in both, with the housing-netted specification reported as secondary evidence\
    \ on real purchasing- power. If the transfer-share decomposition channel shows\
    \ that transfer-share increases in Canada fully offset pre-tax wage weakness (i.e.,\
    \ disposable income after transfers tracks the donor pool even while pre-tax wages\
    \ do not), the result card must report this explicitly: Canadian redistribution\
    \ absorbed the market-income shock, and the \"household-income stagnation\" framing\
    \ is inaccurate even if the \"market-income stagnation\" framing is accurate.\n"
  threshold: "\u03B2_canada_post_2015 < 0 at p < 0.10 in OECD primary spec  AND \u03B2\
    _canada_post_2015 < 0 at p < 0.10 in WDI GNI proxy spec.\n"
  estimator:
    template: panel_fe
    clustering: country
    fixed_effects:
    - country
    - year
    notes: "Primary: TWFE on log real household disposable income per capita with\
      \ country and year fixed effects. \u03B2_canada_post_2015 identifies the Canadian\
      \ household-income trajectory deviation from the donor pool's time-average.\n\
      Two-spec rule (per METHODOLOGY.md): the primary spec uses OECD household disposable\
      \ income; the secondary spec uses WDI GNI per capita (PPP, constant) as proxy,\
      \ with identical fixed effects and treatment indicator. Both specifications\
      \ reported. A finding supported under BOTH passes the two-spec rule; supported\
      \ under only one is reported as tentative.\nHousing-netted specification: construct\
      \ \"real household disposable income net of shelter\" = household disposable\
      \ income per capita minus a fitted shelter-expenditure estimate (BIS RPP \xD7\
      \ shelter- weight from OECD household accounts). Re-estimate the TWFE on this\
      \ netted series. Expected direction: Canadian gap widens once shelter is netted\
      \ out, because housing cost growth absorbed a larger share of nominal income\
      \ in Canada than in the donor pool.\nData-gate: this hypothesis is flagged as\
      \ v1.1 fetcher requirement. The OECD Household Dashboard dataflow URNs must\
      \ be verified before first run; the Statistics Canada cross-walk must be implemented\
      \ for Canada-specific robustness. Until the primary series is available, runs\
      \ will use GNI-per-capita proxy only and explicitly label findings as proxy-based.\n"
  steelman: hypotheses/steelman/canada_real_disposable_income_post_2015.md

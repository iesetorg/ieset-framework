  claim: "Liberal democracies with binding numerical fiscal rules in place for at\
    \ least 10 years over the 1976\u20132025 window show systematically lower (less\
    \ positive, or more negative) statist-drift slopes than peers without such rules.\
    \ Mechanism: fiscal rules constrain the deficit-financed transfer flywheel that\
    \ public-choice theory says drives the drift; if the managerial-flywheel hypothesis\
    \ is correct, then constitutional / legal caps on it should bite. The corpus already\
    \ contains the inputs \u2014 every movement coded on framework axes, every fiscal-rule\
    \ introduction noted in its movement YAML \u2014 so the test reduces to comparing\
    \ per-decade drift slopes between rule-bound and rule-free liberal democracies.\n"

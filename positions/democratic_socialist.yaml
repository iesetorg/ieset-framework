proponents:
- Eduard Bernstein
- Michael Harrington
- Bhaskar Sunkara
- Bernie Sanders
- Noam Chomsky (political dimension)
- Jeremy Corbyn
key_texts:
- Bernstein, Evolutionary Socialism (1899)
- 'Harrington, Socialism: Past and Future (1989)'
- Sunkara, The Socialist Manifesto (2019)
steelman: 'Socialism''s goals — collective ownership of major productive capital,
  decommodified public goods (healthcare, housing, education, transit), workplace
  democracy — are achievable through democratic political processes without revolutionary
  rupture. The democratic-socialist programme distinguishes itself from social democracy
  (which accepts capitalism + redistribution as the end state) by committing to gradually
  expanding the non-market sector and worker ownership. Key instruments: public option
  in healthcare expanded to single-payer; public housing expansion at scale; free
  public universities; sectoral collective bargaining; worker co-determination; citizen
  wealth funds; breaking up concentrated private power via antitrust + public alternatives.
  Unlike Marxist-Leninist formulations, it accepts electoral competition, civil liberties,
  and pluralism as constitutive of its political programme, not secondary.

  '

position_id: developmentalism
school: Structuralist / Developmentalist
short_name: Developmentalist
status: candidate
map:
  family: developmentalist
  origin_year: 1950
  spectrum_x: -0.10
  parent_position_ids: [post_keynesian]
  anti_link_ids: [chicago_monetarism]
proponents:
- Raúl Prebisch
- Hans Singer
- Alice Amsden
- Ha-Joon Chang
- Dani Rodrik
- Justin Yifu Lin
key_texts:
- Prebisch, The Economic Development of Latin America (1950)
- Amsden, Asia's Next Giant (1989)
- Chang, Kicking Away the Ladder (2002)
- Rodrik, One Economics, Many Recipes (2007)
steelman: 'Late-developing economies face structural constraints — commodity-export dependence, terms-of-trade deterioration, unequal technological starting points — that full market liberalisation cannot address on a policy-relevant timeline. Industrial policy (selective tariffs, export discipline, strategic credit allocation, subsidised R&D) has been the common factor across successful catch-up cases: Japan MITI 1950s-80s, South Korea Park Chung-hee HCI 1970s, Taiwan semiconductor ITRI, China post-1978. The Washington Consensus''s prescriptions produced underperformance in Latin America 1980s-90s where applied strictly; Asian developmentalists outperformed the same period. The framework should recognise that market mechanisms require complementary developmental institutions during catch-up phases and distinguish these from steady-state developed-economy contexts.

  '

steelman: 'Currency-issuing sovereign governments face no operational solvency constraint
  in their own fiat currency; they can always meet nominal obligations. The binding
  constraint on public spending is inflation (real resource availability), not financing
  capacity. Taxes function to drive currency demand and to withdraw purchasing power,
  not to ''fund'' spending. The implication is that full employment can be maintained
  via a federal job guarantee with on-demand spending, and that the standard framing
  of deficits as household-analogous debt is misleading. Historical ''hyperinflation
  requires fiscal dominance'' cases are consistent with MMT — they occurred when real
  capacity had collapsed or foreign-currency obligations couldn''t be met, not because
  of ''printing''.

  '

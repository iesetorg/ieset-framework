# yaml-language-server: $schema=../schemas/position.schema.json
position_id: mmt
school: Modern Monetary Theory
short_name: MMT
status: candidate
map:
  family: post_keynesian_heterodox
  origin_year: 1996
  spectrum_x: -0.50
  parent_position_ids: [post_keynesian]
  anti_link_ids: [chicago_monetarism]
proponents:
- Stephanie Kelton
- L. Randall Wray
- Warren Mosler
- Bill Mitchell
- Pavlina Tcherneva
key_texts:
- Kelton, The Deficit Myth (2020)
- Wray, Modern Money Theory (2012)
- Mosler, Soft Currency Economics (1996)
steelman: 'Currency-issuing sovereign governments face no operational solvency constraint in their own
  fiat currency; they can always meet nominal obligations. The binding constraint on public spending is
  inflation (real resource availability), not financing capacity. Taxes function to drive currency demand
  and to withdraw purchasing power, not to ''fund'' spending. The implication is that full employment
  can be maintained via a federal job guarantee with on-demand spending, and that the standard framing
  of deficits as household-analogous debt is misleading. Historical ''hyperinflation requires fiscal dominance''
  cases are consistent with MMT — they occurred when real capacity had collapsed or foreign-currency obligations
  couldn''t be met, not because of ''printing''.

  '
falsifiable_specific_claims:
- claim: Hyperinflation requires fiscal dominance AND collapsed real supply / external-FX obligation —
    not monetary expansion alone.
  linked_hypothesis_id: hyperinflation_requires_fiscal_dominance
  school_prediction: supported
  scope:
    period: [1900, 2025]
    countries: [GLOBAL, DEU, HUN, YUG, ZWE, VEN, BRA, ARG, BOL, PER, NIC, UKR, BLR, TUR, LBN]
    outcome_dim: [inflation, monetary_policy]
    policy_family: [fiscal_policy, monetary_policy]
    treatment_tags: [fiscal_dominance, hyperinflation_episodes]
  notes: MMT accepts fiscal-dominance necessary condition; disputes that monetary growth alone is sufficient.
- claim: Zimbabwe 2000-2008 hyperinflation followed the real-supply collapse from land reform and external
    sanctions; currency expansion was downstream of real-capacity destruction, not causally independent.
  linked_hypothesis_id: zimbabwe_hyperinflation_land_reform_output_collapse_2000_2009

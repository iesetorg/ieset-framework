- MMT's job-guarantee proposal is an operational recommendation; the framework tests
  outcome implications of forced-saving vs transfer-based welfare architectures rather
  than the JG proposal per se.
notes: 'MMT is empirically closer to post-Keynesian and functional-finance traditions
  than to the Cambridge-School or Austrian traditions.


scope_decisions:
  - "Market socialism's empirical track record is thin — Mondragón and Yugoslav self-management are the best-documented real cases, neither at national scale for extended periods. The framework treats market socialism as a theoretically coherent but empirically under-tested position."

notes: >
  Market socialism differs from Marxist-Leninist central planning by
  preserving the price mechanism; differs from social democracy by
  seeking ownership reform not just transfer redistribution; differs
  from democratic socialism by being comparatively less committed to
  full nationalisation of strategic sectors.

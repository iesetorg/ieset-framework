position_id: market_socialist
school: "Market Socialism (Lange-Lerner tradition)"
short_name: "Market Socialist"
status: candidate

map:
  family: democratic_socialist_reformist
  origin_year: 1937
  spectrum_x: -0.50
  parent_position_ids: [marxian]
  anti_link_ids: [austrian]

proponents:
  - "Oskar Lange"
  - "Abba Lerner"
  - "David Schweickart"
  - "John Roemer"
  - "Pranab Bardhan"

key_texts:
  - "Lange, On the Economic Theory of Socialism (1936-37)"
  - "Lerner, The Economics of Control (1944)"
  - "Schweickart, After Capitalism (2002)"
  - "Roemer, A Future for Socialism (1994)"

steelman: >
  Socialism's normative goals (broad ownership, reduced inequality,
  democratic economic power) are compatible with the market mechanism
  as a decentralised information processor. The calculation problem
  Hayek and Mises raised against central planning is real, but it
  applies to pure central planning, not to socialist ownership of
  productive assets with market pricing. Public ownership of capital
  combined with competitive enterprise (state-owned firms competing,
  worker cooperatives, citizen ownership funds) preserves allocative
  efficiency while redistributing returns to labour and citizens.
  Credible real-world approximations include Meidner Plan-inspired
  Swedish citizen funds (short-lived but real), Yugoslav worker
  self-management (flawed but informative), Mondragón cooperative
  network (persistent and economically competitive).


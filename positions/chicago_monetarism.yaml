key_texts:
- Friedman & Schwartz, A Monetary History of the United States 1867-1960 (1963)
- Friedman, The Optimum Quantity of Money (1969)
- Lucas, Expectations and the Neutrality of Money (1972)
steelman: 'Inflation is, over the medium run, a monetary phenomenon. Central banks that stabilise a rules-based
  nominal anchor — whether a constant money-supply growth rate (Friedman''s k%), a Taylor-rule-consistent
  interest path, or a price-level target — produce fewer and shallower recessions than central banks operating
  with discretionary judgment. The Great Depression''s severity was primarily a monetary-policy failure
  (Friedman-Schwartz), not a market failure. Rational-expectations critiques of systematic activist policy
  (Lucas critique) imply that demand-management fine-tuning is ineffective once private actors adapt.
  The policy implication is narrow: rules not discretion, clear nominal anchor, no fine-tuning.

  '

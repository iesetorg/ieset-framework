steelman: "Uncertainty (Knightian, not quantifiable risk) is irreducible in real economies and invalidates the rational-expectations foundation of New Keynesian and monetarist models. Financial markets are endogenously unstable \u2014 Minsky's financial instability hypothesis traces a natural progression from hedge finance to speculative to Ponzi as stability breeds confidence. Effective demand determines output even at long horizons; supply-side Say's Law-style equilibration does not obtain. Active fiscal management, financial regulation tight enough to constrain leverage cycles, and incomes policies are all necessary complements to the corpus of mainstream macro. Monetary policy alone cannot stabilise modern financial economies; the 2007-2009 crisis vindicated Minsky in ways orthodox macro has only partially absorbed.\n"

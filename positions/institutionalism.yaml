school: "New Institutional Economics"
short_name: "Institutionalist"
status: candidate

map:
  family: institutional_mainstream
  origin_year: 1990
  spectrum_x: 0.30
  parent_position_ids: [classical_liberal]
  anti_link_ids: []

proponents:
- "Douglass North"
- "Daron Acemoglu"
- "James Robinson"
- "Elinor Ostrom"
- "Oliver Williamson"
- "Dani Rodrik"

key_texts:
- "North, Institutions, Institutional Change and Economic Performance (1990)"
- "Acemoglu & Robinson, Why Nations Fail (2012)"
- "Ostrom, Governing the Commons (1990)"
- "Williamson, The Economic Institutions of Capitalism (1985)"

steelman: >
  Economic outcomes are primarily determined by the quality of
  institutions — the formal and informal rules governing property rights,
  contract enforcement, political representation, and market access.
  'Inclusive' institutions (protecting property rights broadly, limiting
  elite extraction, enabling political voice) produce sustained growth;
  'extractive' institutions produce stagnation or cycles. Markets and
  states are not opposed allocation mechanisms — both require
  institutional scaffolding to function, and the binding question is
  always institutional quality rather than market share. This reframes
  the growth question from 'how much market vs state' to 'what
  institutional conditions enable productive cooperation at scale'.
  Nordic success, US divergence from UK, Korean vs North Korean
  outcomes all trace to institutional variation, not to ideology.


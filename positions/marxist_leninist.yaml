proponents:
- Vladimir Lenin
- Joseph Stalin
- Mao Zedong
- Nikolai Bukharin (early)
- Evgeny Preobrazhensky
key_texts:
- Lenin, The State and Revolution (1917)
- Lenin, Imperialism, the Highest Stage of Capitalism (1917)
- Stalin (ed.), History of the CPSU (Bolsheviks) (1939)
- Mao, On Contradiction (1937)
- Preobrazhensky, The New Economics (1926)
steelman: 'The Marxian diagnosis of capitalism is correct but requires revolutionary party organisation
  and state seizure to effect the transition: liberal-democratic reform is structurally captured by class
  interests and cannot deliver socialism evolutionarily. Central economic planning via Gosplan-analogue
  institutions, nationalisation of key productive sectors, collectivisation of agriculture, and suppression
  of market exchange in means of production are the operational path to socialist development. Industrial
  catch-up in the USSR 1928-1940 (Preobrazhensky''s primitive socialist accumulation), China''s pre-1978
  infrastructure build-out, and Cuban health/education outcomes are cited as successes of this approach.
  The democratic- socialist critique that political liberties are sacrificed is contested as either bourgeois
  misframing or a temporary cost of transition.

  '

steelman: >
  The answer to 'what economic policy works' is context-dependent, and
  the job of the discipline is to identify which institutional and market
  arrangements produce which outcomes under which conditions. Market
  mechanisms are the empirically-supported default for most allocation
  problems, but specific conditions (natural monopolies, public goods,
  health-insurance adverse selection, resource-rent capture) produce
  well-identified cases where state-organised mechanisms outperform.
  The correct methodological posture is: identify the allocation problem,
  test candidate institutional solutions against outcome data, report
  conditional findings honestly, update when evidence warrants. This
  position is the framework's revealed commitment — legibly market-
  liberal in default priors (because the weight of evidence supports
  markets in most sectors) but structurally open to conditional updates
  where evidence demands.


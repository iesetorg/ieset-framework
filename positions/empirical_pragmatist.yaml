  This is the framework's disclosed house position per DISCLOSURE.md.
  Labelling it helps readers distinguish the author's empirical priors
  from the methodological commitment to falsifiability and adversarial
  review, which are invariant across positions.
scope_decisions:
- "Pragmatism rejects strong normative claims about ultimate ends (growth vs wellbeing vs distribution) and limits itself to empirical claims about mechanism-outcome relationships under stated conditions."

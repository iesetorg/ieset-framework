position_id: ordoliberal
school: "Ordoliberalism (Freiburg School)"
short_name: "Ordoliberal"
status: candidate

map:
  family: institutional_mainstream
  origin_year: 1932
  spectrum_x: 0.50
  parent_position_ids: [classical_liberal]
  anti_link_ids: [marxist_leninist]

proponents:
- "Walter Eucken"
- "Alexander Rüstow"
- "Wilhelm Röpke"
- "Ludwig Erhard"
- "Franz Böhm"

key_texts:
- "Eucken, Grundsätze der Wirtschaftspolitik (1952)"
- "Röpke, A Humane Economy (1958)"
- "Erhard, Wohlstand für Alle (1957)"

steelman: >
  Markets produce good outcomes only within a legally-enforced competitive
  order. Competition policy, anti-cartel enforcement, property rights,
  and a stable monetary constitution (an 'economic constitution') are
  preconditions for markets to allocate efficiently. The state's role
  is to create and maintain this order, not to intervene sector-by-sector.
  Germany's post-war Wirtschaftswunder vindicated the Ordoliberal
  programme: market liberalisation combined with strong antitrust
  (Bundeskartellamt), independent central bank (Bundesbank), and
  mittelstand-supporting institutional architecture produced three
  decades of broad-based prosperity. Ordoliberalism differs from laissez-
  faire by insisting on strong competition enforcement and from social-
  democratic welfarism by insisting on markets as the primary allocator.


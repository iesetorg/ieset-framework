steelman: 'Market economies reliably produce aggregate growth but do not reliably
  distribute its gains. The Nordic model demonstrates that large welfare states with
  universal services, strong labour-market coordination, and progressive taxation
  can be growth-compatible when paired with labour- market flexibility and state capacity.
  Redistribution via taxes and transfers is not merely consistent with growth — it
  stabilises demand, reduces social costs (crime, ill-health, educational underinvestment),
  and produces the political support required for continued market openness. The ''growth
  vs equality'' tradeoff is empirically weaker than market-liberal accounts suggest;
  within OECD, more-equal societies have similar or higher trend growth than less-equal
  ones. Nordic outperformance on innovation, education, and life satisfaction is a
  real empirical pattern that market-liberal framings dismiss at their peril.

  '

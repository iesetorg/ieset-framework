steelman: "Voluntary exchange between property-rights-secure parties is the engine of prosperity. Government's legitimate economic functions are limited to: protection of person and property, enforcement of contracts, provision of public goods that markets undersupply, and \u2014 in the Millian development \u2014 education and some distributional concerns. Tax and regulatory burdens beyond this narrow scope crowd out private initiative, distort price signals, and typically generate deadweight costs larger than their posted benefits. Free trade, sound money, and limited government are the recurring policy recommendations. The doctrine admits of debate on public-goods scope (Smith accepted publicly-funded education; Friedman accepted a negative income tax) without abandoning the central commitment to voluntary exchange as the default allocation mechanism.\n"

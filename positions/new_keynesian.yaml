position_id: new_keynesian
school: New Keynesian (mainstream synthesis)
short_name: New Keynesian
status: candidate
map:
  family: institutional_mainstream
  origin_year: 1985
  spectrum_x: 0.20
  parent_position_ids: [post_keynesian, chicago_monetarism]
  anti_link_ids: [austrian]
proponents:
- Gregory Mankiw
- Michael Woodford
- Janet Yellen
- Olivier Blanchard
- Lawrence Summers
- Christina Romer
key_texts:
- Woodford, Interest and Prices (2003)
- Mankiw, Macroeconomics (textbook, multiple editions)
- Blanchard & Summers, Hysteresis and the European Unemployment Problem (1986)
steelman: 'Markets are mostly efficient allocators but exhibit well-documented rigidities: sticky prices
  and wages in the short run produce nominal effects on real output. Activist counter-cyclical policy
  — interest-rate adjustments by independent central banks, automatic-stabiliser fiscal architecture,
  and discretionary fiscal support when rates hit the zero lower bound — reduces the amplitude of recessions
  without compromising long-run growth. The framework preserves the core market-liberal case for microeconomic
  efficiency while rejecting the real-business-cycle claim that recessions are optimal equilibrium responses
  to technology shocks. Modern central banking (Taylor rules, inflation targeting, forward guidance) is
  the applied vindication of this position.

  '

    source_family_id: household_distributional_microdata
    publisher: Luxembourg Income Study Data Center
    domain: household_distributional_microdata
    geography: cross-national
    unit_of_observation: household and person by country wave
    time_coverage: country-wave dependent
    policy_or_outcome_fields:
      - disposable_income
      - market_income
      - labor_income
      - transfers
      - taxes
      - wealth
      - household_demographics
      - weights
    access_format: remote research access and harmonized files
    source_url: https://www.lisdatacenter.org/our-data/lis-database/
    license_or_terms: restricted research access under LIS terms
    update_frequency: release-based
    second_order_layers:
      - distributional_incidence
      - behavioral_response
      - net_welfare
    gate_unlocks:
      - Gives cross-national incidence and household distributional measures where national microdata are hard to harmonize.
      - Supports welfare, tax, labor, housing, and transfer decomposition.
    acquisition_status: restricted_access
    ingestion_difficulty: high
    immediate_payoff_rank: 3
    verification_status: seed_verified_official_page
    notes: >
      Use for harmonized analysis and metadata first; raw access requires
      project approval and cannot be committed into the repo.


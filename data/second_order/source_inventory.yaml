    license_or_terms: CEQ terms; source survey restrictions vary by country
    update_frequency: release-based
    second_order_layers:
      - distributional_incidence
      - fiscal_or_enforcement_cost
      - net_welfare
    gate_unlocks:
      - Directly measures fiscal incidence for tax, transfer, subsidy, and welfare architecture tests.
      - Useful bridge where EUROMOD/LIS coverage is weak.

# yaml-language-server: $schema=../../schemas/second_order_data_source_inventory.schema.json
version: 1
last_seeded_utc: "2026-06-28T00:00:00Z"
program: second_order_gate_data_acquisition
backlog_snapshot:
  strict_held_public_claim_links: 4720
  strict_eligible_public_claim_links: 19
  held_hypotheses: 620
  policies_missing_explicit_design: 3169
  policies_needing_treated_comparison_units: 3169
  policies_needing_exact_event_dates: 1208

source_records:
  - source_id: ieset_policy_event_treatment_contracts
    source_name: IESET policy event and treatment-definition contract corpus
    source_family_id: policy_event_treatment_registry
    publisher: IESET plus official statutes, gazettes, and regulator notices
    domain: cross_policy_treatment_definition
    geography: global
    unit_of_observation: policy-event by jurisdiction, treated unit, comparison unit, and effective date
    time_coverage: 1800-present as policy specs are backfilled
    policy_or_outcome_fields:
      - policy_id
      - effective_date
      - end_date
      - treated_units
      - comparison_units
      - eligibility_rules
      - exemptions
      - thresholds
      - treatment_intensity
      - source_url
      - confidence
    access_format: YAML and generated JSON/Parquet once normalized
    source_url: https://framework.ieset.org/
    license_or_terms: IESET internal derived registry with official-source provenance; source documents retain publisher terms
    update_frequency: continuous backfill
    second_order_layers:
      - first_order_policy_effect
      - first_order_price_or_transfer
      - implementation_capacity
    gate_unlocks:
      - Defines treatment timing and unit splits for event studies, DiD, border comparisons, and triple differences.
      - Unblocks the 3169 policies needing treated/comparison unit coding.
      - Unblocks the 1208 policies needing exact event dates.
    acquisition_status: partial_ready
    ingestion_difficulty: high
    immediate_payoff_rank: 1
    verification_status: seed_verified_official_page
    notes: >
      This is the first data spine to build. Outcome datasets cannot pass the
      second-order gate without treatment dates, coverage rules, exemptions,
      and comparison-unit definitions.

  - source_id: euromod_eu_silc_hbs_spine
    source_name: EUROMOD with Eurostat EU-SILC and Household Budget Survey microdata
    source_family_id: household_distributional_microdata
    publisher: European Commission Joint Research Centre and Eurostat
    domain: tax_benefit_distributional_microdata
    geography: European Union and associated EUROMOD countries
    unit_of_observation: household and person by survey year or policy simulation
    time_coverage: survey and EUROMOD release dependent
    policy_or_outcome_fields:
      - market_income
      - disposable_income
      - taxes
      - transfers
      - household_consumption
      - demographic_group
      - weights
      - simulated_policy_rule
    access_format: EUROMOD model files plus restricted Eurostat research microdata
    source_url: https://euromod-web.jrc.ec.europa.eu/overview/what-is-euromod
    license_or_terms: EUROMOD is distributed under its terms; input microdata require Eurostat research access
    update_frequency: annual or release-based
    second_order_layers:
      - distributional_incidence
      - behavioral_response
      - fiscal_or_enforcement_cost
      - net_welfare
    gate_unlocks:
      - Measures incidence and tax-benefit channels for fiscal, welfare, labor, and energy policies.
      - Supplies distributional weights for welfare-accounting case ledgers.
    acquisition_status: restricted_access
    ingestion_difficulty: high
    immediate_payoff_rank: 2
    verification_status: seed_verified_official_page
    notes: >
      Highest leverage for European distributional incidence. Store access
      notes separately from raw microdata; do not commit restricted files.

  - source_id: lis_lws_harmonized_microdata

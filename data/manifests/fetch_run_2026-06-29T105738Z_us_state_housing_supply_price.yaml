    construction: Annual U.S. state housing supply + price panel. Census Building
      Permits Survey annual state files (stYYYYa.txt, FIPS-keyed) supply total permitted
      units and units by structure type (1-unit, 2-4 unit, 5+ unit). FHFA All-Transactions
      state HPI (abbr-keyed, crosswalked to FIPS via the admin-1 spine) supplies the
      annual-mean house price index. Both are public domain; one row per (ieset_state_id,
      year); state_fips and state_abbr preserved.

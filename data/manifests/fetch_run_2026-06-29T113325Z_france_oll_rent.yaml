    construction: OLL national agglomeration results (per-year CSV) concatenated across
      years and normalised to one row per (observatory, agglomeration, year, zone,
      dwelling type, construction period, tenure length, rooms band). Observed rent
      quantiles kept in EUR/m2 and EUR/month. The five requested GHSL targets (Paris,
      Lyon, Marseille, Toulouse, Nice) are crosswalked to the France subset of the
      GHSL top-1000 city spine via an explicit agglomeration->city map; ghsl_match_flag
      marks matched rows. Original INSEE-linked observatory codes and agglomeration
      labels preserved.

documented_gaps:
- dimension: homeownership_tenure_rate
  reason: The ACS state-profile vintage carries only total population (B01003) and
    median household income (B19013); no owner/renter tenure table (B25003) is present.
- dimension: median_gross_rent
  reason: No ACS gross-rent table (B25064) present in the on-disk ACS vintage.
- dimension: median_housing_cost
  reason: No ACS selected-monthly-owner-cost / housing-cost table (B25088/B25105)
    present in the on-disk ACS vintage.
- dimension: rent_burden_cost_burdened_share
  reason: No ACS gross-rent-as-percentage-of-income table (B25070) or selected-monthly-owner-costs-as-percentage-of-income
    table (B25091) present; cost-burdened share cannot be derived without fabrication.
- dimension: income_distribution_gini
  reason: No ACS Gini index (B19083) or household-income-quintile table (B19080) present
    in the on-disk ACS vintage; only median household income is available.
- dimension: spm_child_poverty_rate_state_grain
  reason: The spm_child_poverty_rate vintage is national-only (geo_area='USA'); it
    carries no state-level rows and cannot populate a state-year panel.

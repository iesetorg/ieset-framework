      queries:
        dof_exemption_classification_codes:
        - select exempt_code, sdea_code, description, legal_ref where sdea_code in('48076','48806','48826')
          order by sdea_code, exempt_code limit 5000
        dof_property_exemption_detail:
        - select year, boro, nys_exmp_code, exmp_code, count(*) as records, count(distinct
          parid) as parcels, sum(curexmptot) as exemption_amount where year between
          '2007' and '2026' and nys_exmp_code in('48806','48076','48826') group by
          year, boro, nys_exmp_code, exmp_code order by year, boro, nys_exmp_code,
          exmp_code limit 50000
        dof_property_abatement_detail:
        - select taxyr, tccode, tcsubcode, count(*) as records, count(distinct parid)
          as parcels, sum(appliedabt) as abatement_amount where taxyr between '2007'
          and '2026' and tccode like 'J51%' group by taxyr, tccode, tcsubcode order
          by taxyr, tccode, tcsubcode limit 50000
        dof_j51_historical:
        - select tax_year, b, count(*) as records, sum(exempt_amt) as exemption_amount,
          sum(abatement) as abatement_amount where tax_year between 2007 and 2026
          group by tax_year, b order by tax_year, b limit 50000
        hpd_421a16_completion_letters:
        - select date_extract_y(form_submission_date) as year, presumed_borough, reported_affordability_option,
          count(*) as records, sum(presumed_building_units) as units, sum(presumed_building_affordable)
          as restricted_units where form_submission_date between '2007-01-01T00:00:00'
          and '2026-12-31T23:59:59' group by year, presumed_borough, reported_affordability_option
          order by year, presumed_borough, reported_affordability_option limit 50000
        hpd_485x_registrations:
        - select date_extract_y(form_submission_date) as year, reported_property_borough,
          reported_affordability_option, count(*) as records, sum(presumed_building_units)
          as units, sum(presumed_restricted_units) as restricted_units where form_submission_date
          between '2007-01-01T00:00:00' and '2026-12-31T23:59:59' group by year, reported_property_borough,
          reported_affordability_option order by year, reported_property_borough,
          reported_affordability_option limit 50000
        hpd_multiple_dwelling_registrations:
        - select date_extract_y(lastregistrationdate) as year, boro, count(*) as records,
          count(distinct registrationid) as registrations, count(distinct bin) as
          buildings where lastregistrationdate between '2007-01-01T00:00:00' and '2026-12-31T23:59:59'
          group by year, boro order by year, boro limit 50000
        dcp_pluto:
        - select borough, count(*) as tax_lots, sum(unitsres) as residential_units,
          sum(unitstotal) as total_units where borough is not null group by borough
          order by borough limit 50000
      caveat: This is a public proxy panel for rent-regulation stock and tax-benefit
        exposure. It is not an apartment-level DHCR/HCR rent-registration file.

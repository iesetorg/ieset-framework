    construction: 'Server-side Socrata aggregates for public NYC rent-regulation stock
      proxies: 421-a/421-g/J-51 exemptions, J-51 abatements, HPD 421-a(16)/485-x intent
      records, multiple-dwelling registrations, and PLUTO denominators. All rows attach
      to GHSL New York City while preserving borough detail.'

    construction: Official OMI semestral 'quotazioni immobiliari' VALORI extractions
      read from the key-free onData national mirror. Only LOCAZIONE (rent) fields
      (Loc_min/Loc_max, EUR/m2/month) are extracted; COMPRAVENDITA (sale) fields are
      excluded. A rent midpoint is derived. OMI ISTAT comune codes, OMI zone IDs/labels,
      typology and condition codes are preserved verbatim. Top Italian cities are
      crosswalked to GHSL urban-centre IDs via the top-1000 city universe; unmatched
      comuni are retained with ghsl_match_flag=False. Values are assessor quotation
      ranges, not transaction rents.

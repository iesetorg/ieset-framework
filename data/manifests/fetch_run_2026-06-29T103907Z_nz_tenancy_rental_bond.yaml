    construction: Official Tenancy Services detailed monthly TLA rental-bond CSV parsed
      into one row per (territorial authority, month, bedroom_band=ALL). Captures
      lodged/active/closed bond counts and median, geometric-mean, and quartile observed
      bond-lodgement weekly rents. Aggregate ALL/NA roll-up rows are dropped. Original
      Location Id and Location labels are preserved; Auckland and other matchable
      TLAs are crosswalked to GHSL urban-centre IDs via the city universe spine with
      ghsl_match_flag retained.

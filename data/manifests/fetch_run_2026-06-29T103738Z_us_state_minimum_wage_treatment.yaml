    construction: USDOL state minimum-wage history joined to the canonical state spine
      for ieset_state_id, then to the derived subnational minimum-wage bite-ratio
      panel on state_fips+year. state_statutory_minimum_wage is the genuine own-law
      rate (state_rate_high; NaN when parse_note in {no_state_rate, non_hourly_cell,
      missing}); effective_minimum_wage is max(statutory, federal); binds_above_federal
      is statutory>federal. Treatment events code the first observed year a state
      binds above federal (first_bind) plus year-over-year increases. Federal and
      state floors are kept separate; intensity is not routed through any country-year
      runner. Levels are nominal current USD.

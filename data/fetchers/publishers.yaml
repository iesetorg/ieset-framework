version: 1
publishers:
  fred:
    name: Federal Reserve Economic Data (FRED) + ALFRED
    endpoint: https://api.stlouisfed.org/fred
    auth_required: true
    auth_env_var: FRED_API_KEY
    license: public_domain
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.fred
    catalogue_url: https://fred.stlouisfed.org/categories
    vintage_behaviour: alfred_style_vintaged
    notes: ALFRED provides vintage-tracked releases; real-time data. Free API key registration.
  ecb:
    name: European Central Bank Data Portal
    endpoint: https://data-api.ecb.europa.eu/service
    auth_required: false
    license: oecd_terms
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.ecb
    catalogue_url: https://data.ecb.europa.eu/
    vintage_behaviour: revisable
    notes: 'SDMX 2.1 CSV API. Ships euro-area aggregate flows cleanly (BSI M3/M2 for U2, EXR bilateral rates, MIR interest rates). National- contribution keys (e.g. REF_AREA=DE for national M2 contribution)
      require per-country resolution against the live constraint set; resolve at hypothesis-wiring time.

      '
  boe:
    name: Bank of England Interactive Statistical Database (IADB)
    endpoint: https://www.bankofengland.co.uk/boeapps/iadb/fromshowcolumns.asp
    auth_required: false
    license: ogl_uk_3_0
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.boe
    catalogue_url: https://www.bankofengland.co.uk/statistics/research-datasets
    vintage_behaviour: revisable
    notes: 'IADB CSV endpoint. Requires browser-shaped User-Agent (Akamai check). Series codes like LPMAUYM (M4, monthly).

      '
  boj:
    name: Bank of Japan Time Series Data Search
    endpoint: https://www.stat-search.boj.or.jp/
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.stat-search.boj.or.jp/ssi/mtshtml/m_en.html
    vintage_behaviour: revisable
    notes: 'Money-statistics landing page returned 200 but shipped no direct CSV links — BoJ''s stat-search is form-driven with session state. Deferred to scrape round; JPN M2 substitute available via FRED
      mirror (series JPNM2MB) at publisher_id=fred for interim use.

      MANUAL-DROP pattern: drop file(s) into data/manual/boj/ and call data.fetchers.boj.fetch().'
    fetcher_module: data.fetchers.boj
  rba:
    name: Reserve Bank of Australia Statistical Tables
    endpoint: https://www.rba.gov.au/statistics/tables/xls
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.rba
    catalogue_url: https://www.rba.gov.au/statistics/tables/
    vintage_behaviour: revisable
    notes: 'RBA serves XLSX tables cleanly via curl_cffi with Chrome TLS fingerprint; plain requests receive 403. URL pattern: /statistics/tables/xls/<code>hist.xlsx (e.g. d03hist.xlsx for D3 Monetary Aggregates).

      '
  statcan:
    name: Statistics Canada Web Data Service
    endpoint: https://www150.statcan.gc.ca/t1/wds/rest
    auth_required: false
    license: statcan_open
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.statcan
    catalogue_url: https://www150.statcan.gc.ca/n1/en/type/data
    vintage_behaviour: revisable
    notes: 'WDS JSON POST API. Queried by numeric vectorId (e.g. 41552796 for Canada M2 gross). getDataFromVectorsAndLatestNPeriods endpoint.

      '
  world_bank_wdi:
    name: World Bank World Development Indicators
    endpoint: https://api.worldbank.org/v2
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.world_bank_wdi
    catalogue_url: https://data.worldbank.org/indicator
    vintage_behaviour: revisable
    aliases:
    - wb
    - world_bank
    notes: Primary cross-country panel source for controls and long-run outcomes.
  wits:
    name: World Bank WITS / UNCTAD TRAINS trade indicators
    endpoint: https://wits.worldbank.org/
    auth_required: false
    license: mixed
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.wits
    aliases:
    - world_bank_wits
    catalogue_url: https://wits.worldbank.org/
    vintage_behaviour: revisable
    notes: Trade-policy and product-variety panels. Uses WITS JSON API for trade/tariff/product indicators, with World Bank WDI mirrors for high-tech export indicators. Local vintages include WITS-derived export concentration panels.
  usdol:
    name: U.S. Department of Labor Wage and Hour Division
    endpoint: https://www.dol.gov/agencies/whd
    auth_required: false
    license: public_domain
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.usdol
    catalogue_url: https://www.dol.gov/agencies/whd/state
    vintage_behaviour: revisable
    notes: Official Wage and Hour Division state minimum-wage history table. Parser retains raw cells and footnotes, and emits an effective FLSA-covered floor with federal fallback for state-year treatment panels.
  wealth_tax_manual:
    name: Wealth tax realized-vs-forecast manual public-finance panel
    endpoint: manual://data/manual/wealth_tax/revenue_forecast_realized.csv
    auth_required: false
    license: mixed
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.wealth_tax_manual
    catalogue_url: ''
    vintage_behaviour: append_only
    notes: Row-level official budget/revenue sources for France, Norway, Colombia, and Spain wealth-tax forecast-vs-realized tests. Preserves forecast vintage, realized revenue year, local currency, source URL, and methodology URL.
  oecd:
    name: OECD Data API
    endpoint: https://sdmx.oecd.org/public/rest
    auth_required: false
    license: oecd_terms
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.oecd
    aliases:
    - oecd_lfs
    - oecd_employment
    - oecd_epl
    - oecd_bci
    - oecd_revenue_statistics
    - oecd_pension_statistics
    - oecd_tiva
    - oecd_fdi
    - oecd_fdi_reg
    - oecd_stri
    catalogue_url: https://data-explorer.oecd.org/
    vintage_behaviour: revisable
    notes: 'SDMX 2.1 API via the new Data Explorer. Client passes full dataflow identifier (''AGENCY,DATAFLOW_ID,VERSION'') as series_id, with optional SDMX key filter. Covers CPI (DSD_PRICES), KEI, IDD
      (Gini), EPL. PMR lives at `oecd_pmr`.

      '
  imf:
    name: International Monetary Fund (WEO — DataMapper JSON)
    endpoint: https://www.imf.org/external/datamapper/api/v1
    auth_required: false
    license: imf_terms
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.imf_weo
    aliases:
    - imf_weo
    catalogue_url: https://www.imf.org/external/datamapper/datasets
    vintage_behaviour: revisable
    notes: 'DataMapper JSON API — WEO indicators only. IFS, GFS, BOP, and Primary Commodity Prices will be added as separate fetcher methods on the same module; those datasets have their own APIs (SDMX
      + bulk CSV). Country filter on URL path is ignored by the API; client-side post-filter used.

      '
  imf_pcps:
    name: IMF Primary Commodity Price System
    endpoint: https://www.imf.org/external/datamapper/api/v1
    auth_required: false
    license: imf_terms
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.imf_pcps
    catalogue_url: https://www.imf.org/en/Research/commodity-prices
    vintage_behaviour: revisable
    notes: 'PCPS commodity prices (oil, gas, metals, agricultural) via the IMF DataMapper JSON API. Shares the WEO endpoint shape (values -> series -> region -> period). Used for resource-extraction, nationalisation,
      and fiscal-dominance case studies. Monthly series supported where published; falls back to annual.

      '
  bis:
    name: Bank for International Settlements Statistics
    endpoint: https://stats.bis.org/api/v2
    auth_required: false
    license: bis_public_statistics
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.bis
    catalogue_url: https://data.bis.org/
    vintage_behaviour: revisable
    notes: 'Stats.bis.org SDMX 2.1 v2 API with CSV output. Client passes dataflow name as series_id (WS_SPP, WS_LONG_PP, WS_EER, WS_TC). Full dataflow fetched by default; optional SDMX dot-path key narrows.

      '
  shiller:
    name: Robert Shiller Historical Data
    endpoint: http://www.econ.yale.edu/~shiller/data.htm
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.shiller
    catalogue_url: http://www.econ.yale.edu/~shiller/data.htm
    vintage_behaviour: append_only
    notes: 'Static XLS downloads (ie_data.xls for S&P + CAPE + long rate; Fig3-1.xls for long home-price index). Requires xlrd for legacy .xls parsing.

      '
  hanke:
    name: Hanke-Krus Hyperinflation Table
    endpoint: https://www.cato.org/sites/cato.org/files/pubs/pdf/workingpaper-8.pdf
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.hanke
    catalogue_url: https://www.cato.org/working-paper/world-hyperinflations
    vintage_behaviour: stable
    notes: 'PDF table extracted via pdfplumber from Cato Working Paper #8 (Hanke & Krus 2012). JHU-hosted original returns 403; Cato mirror ships the identical table. Parser captures 30/53 episodes with
      fully-structured fields; 23 episodes with footnote markers / special characters are retained as raw lines in a `country_raw` column for manual cleanup (data is present; only regex refinement needed).
      Post-2012 episodes (Venezuela 2016-2019, Lebanon 2019-2023 near-threshold) require manual supplementation documented in hypotheses/monetary/hyperinflation_fiscal_dominance_coding.md.

      '
  ilzetzki_reinhart_rogoff:
    name: Ilzetzki-Reinhart-Rogoff Exchange Rate Regime Classification
    endpoint: https://www.ilzetzki.com/irr-data
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.irr
    aliases:
    - irr
    catalogue_url: https://www.ilzetzki.com/irr-data
    vintage_behaviour: append_only
    notes: 'Three xlsx files hosted on ilzetzki.com (via Wix CDN): era_classification_monthly_1940_2019, unified_market_analysis_1946_2021, anchor_currency_monthly_1946_2019. Used as control in hyperinflation_requires_fiscal_dominance.

      '
  fraser_efw:
    name: Fraser Institute Economic Freedom of the World
    endpoint: manual://data/manual/fraser_efw/
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.fraser_efw
    catalogue_url: https://www.fraserinstitute.org/economic-freedom/dataset
    vintage_behaviour: append_only
    notes: 'Manual-drop publisher. Cloudflare JS challenge blocks all automated paths (plain requests 403, curl_cffi Chrome TLS 403, Playwright plain 403+CF-redirect, Playwright+stealth loads landing but
      dataset page exposes zero xlsx/download-action links in rendered HTML). Users download the master xlsx manually from https://www.fraserinstitute.org/economic-freedom/dataset and drop it into data/manual/fraser_efw/
      with Fraser''s own filename convention (e.g. efotw-YYYY-master-index-data-for-researchers-iso.xlsx). The fetcher picks the latest-filename match. Annual refresh cadence means quarterly manual maintenance
      is sustainable. Re-probe for automated path (Zenrows / playwright click-through) when convenient.

      '
  heritage_ief:
    name: Heritage Foundation Index of Economic Freedom
    endpoint: https://static.heritage.org/index/data
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.heritage_ief
    aliases:
    - heritage_efw
    - heritage_index
    catalogue_url: https://www.heritage.org/index/pages/all-country-scores-data
    vintage_behaviour: append_only
    notes: 'Heritage www.heritage.org main domain blocks automated access (Cloudflare). The static.heritage.org subdomain ships the data xlsx cleanly at /index/data/<year>/<year>_indexofeconomicfreedom_data.xlsx
      even without Chrome fingerprint. Parallel axis to Fraser EFW for multi-source disagreement surfacing.

      '
  vdem:
    name: V-Dem Varieties of Democracy
    endpoint: https://raw.githubusercontent.com/vdeminstitute/vdemdata/master/data
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.vdem
    catalogue_url: https://v-dem.net/data/reference-documents/
    vintage_behaviour: append_only
    notes: 'Sourced from the vdeminstitute/vdemdata GitHub mirror (RData format; pyreadr dependency required). v-dem.net itself gates downloads behind a front-end flow; the R-package mirror is open and
      stable. Covers institutional-quality axes (judicial independence, regime type, academic freedom, movement freedom, etc.) back to 1789.

      '
  wgi:
    name: World Bank Worldwide Governance Indicators
    endpoint: https://api.worldbank.org/v2
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.world_bank_wgi
    aliases:
    - world_bank_wgi
    catalogue_url: https://www.worldbank.org/en/publication/worldwide-governance-indicators
    vintage_behaviour: append_only
    notes: 'Accessed via World Bank v2 API with source=3. Indicator codes were migrated to the `GOV_WGI_` prefix in 2024 (e.g. GOV_WGI_GE.EST for Government Effectiveness point estimate).

      '
  eurostat:
    name: Eurostat (EU statistical office)
    endpoint: https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.eurostat
    catalogue_url: https://ec.europa.eu/eurostat/databrowser/explore/all/all_themes
    vintage_behaviour: revisable
    notes: 'JSON-stat 2.0 API. EU27 deep coverage across 200+ datasets (labor, demographics, regional, poverty, trade, R&D). Dataset codes like ''nama_10_gdp'', ''une_rt_a'' pass through as series_id.

      '
  maddison:
    name: Maddison Project Database (GGDC)
    endpoint: https://www.rug.nl/ggdc/historicaldevelopment/maddison/data/mpd2020.xlsx
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.maddison
    catalogue_url: https://www.rug.nl/ggdc/historicaldevelopment/maddison/
    vintage_behaviour: append_only
    notes: 'Bolt & van Zanden 2020. Long-run real GDP per capita from year 1 for some economies, broad coverage post-1500.

      '
  jst:
    name: Jordà-Schularick-Taylor Macrohistory Database
    endpoint: https://www.macrohistory.net/app/download/9834512569/JSTdatasetR6.xlsx
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.jst
    catalogue_url: https://www.macrohistory.net/database/
    vintage_behaviour: append_only
    notes: '17-country macrofinancial dataset 1870-present. Release 6 (2024). GDP, inflation, rates, money aggregates, bank assets, credit, asset prices, housing. Essential for long-run monetary hypotheses.

      '
  polity5:
    name: Polity5 (Center for Systemic Peace)
    endpoint: https://www.systemicpeace.org/inscr/p5v2018.xls
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.polity5
    catalogue_url: https://www.systemicpeace.org/polityproject.html
    vintage_behaviour: append_only
    notes: 'Regime authority scores 1800-present. Parallel axis to V-Dem for institutional-quality robustness.

      '
  freedom_house:
    name: Freedom House — Freedom in the World
    endpoint: https://freedomhouse.org/sites/default/files/2024-02/All_data_FIW_2013-2024.xlsx
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.freedom_house
    catalogue_url: https://freedomhouse.org/reports/publication-archives
    vintage_behaviour: append_only
    notes: 'Political rights + civil liberties ratings. Mainstream-citable axis.

      '
  sipri:
    name: SIPRI Military Expenditure Database
    endpoint: https://www.sipri.org/sites/default/files/SIPRI-Milex-data-1948-2023.xlsx
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.sipri
    catalogue_url: https://www.sipri.org/databases/milex
    vintage_behaviour: append_only
    notes: 'Military spending 1948-present, 170+ countries. Constant USD, current USD, % GDP, per-capita variants on separate sheets.

      '
  undp_hdi:
    name: UNDP Human Development Index
    endpoint: https://hdr.undp.org/sites/default/files/2025_HDR/HDR25_Statistical_Annex_HDI_Table.xlsx
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.undp_hdi
    catalogue_url: https://hdr.undp.org/data-center
    vintage_behaviour: append_only
    notes: 'HDI composite + life expectancy + education + GNI per capita. Canonical QoL composite index.

      '
  who_gho:
    name: WHO Global Health Observatory
    endpoint: https://ghoapi.azureedge.net/api
    auth_required: false
    license: mixed
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.who_gho
    catalogue_url: https://www.who.int/data/gho/info/gho-odata-api
    vintage_behaviour: revisable
    notes: 'OData API. Global health indicators (life expectancy, mortality, DALYs, health expenditure). Non-commercial license (cite + attribute).

      '
  ilostat:
    name: ILOSTAT (International Labour Organization)
    endpoint: https://rplumber.ilo.org/data
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.ilostat
    catalogue_url: https://ilostat.ilo.org/data/
    vintage_behaviour: revisable
    notes: 'Labor indicators across 180+ countries. Broader non-OECD coverage than OECD''s own labor stats; essential for Singapore/Chile/developing- country comparators.

      '
  ucdp:
    name: Uppsala Conflict Data Program — Georeferenced Event Dataset
    endpoint: https://ucdp.uu.se/downloads/ged/ged241-csv.zip
    auth_required: false
    license: academic_citation
    credibility_tier: 3
    status: ready
    fetcher_module: data.fetchers.ucdp
    catalogue_url: https://ucdp.uu.se/downloads/
    vintage_behaviour: append_only
    notes: 'Conflict events 1989-present, geocoded, actor-classified. Used for state-capacity + stability axes.

      '
  bls:
    name: US Bureau of Labor Statistics API v2
    endpoint: https://api.bls.gov/publicAPI/v2
    auth_required: false
    auth_env_var: BLS_API_KEY
    license: public_domain
    credibility_tier: 1
    status: ready
    fetcher_module: data.fetchers.bls
    catalogue_url: https://www.bls.gov/data/
    vintage_behaviour: revisable
    aliases:
    - us_bls
    notes: 'US Labor deep: detailed CPI, PPI, employment by industry/state, earnings, productivity. Optional free API key via BLS_API_KEY env var for higher rate limits.

      '
  transparency_cpi:
    name: Transparency International Corruption Perceptions Index
    endpoint: ''
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 4
    status: ready
    catalogue_url: https://www.transparency.org/en/cpi
    vintage_behaviour: append_only
    notes: 'transparencycdn.org returns 403 on direct XLSX even with full browser session. Available via OWID mirror (publisher=owid, series=ti-corruption-perception-index) for interim use.

      MANUAL-DROP pattern: drop file(s) into data/manual/transparency_cpi/ and call data.fetchers.transparency_cpi.fetch().'
    fetcher_module: data.fetchers.transparency_cpi
  wjp_rol:
    name: World Justice Project Rule of Law Index
    endpoint: ''
    auth_required: false
    license: academic_citation
    credibility_tier: 4
    status: ready
    catalogue_url: https://worldjusticeproject.org/rule-of-law-index/
    vintage_behaviour: append_only
    notes: 'WJP downloads page returns minimal-content HTML (6.5 KB) even with Playwright + stealth + 5s wait. Data links are loaded via AJAX only after user interaction. Main rule-of-law-index page renders
      19.5 MB but contains zero xlsx refs. Likely requires simulated click-through in headless browser or manual one-shot capture. Interim: institutional.rule_of_law axis is already covered by WGI + V-Dem
      which are ready; WJP is the 3rd source for disagreement-surfacing.

      '
    fetcher_module: data.fetchers.wjp_rol
  owid:
    name: Our World in Data (grapher CSV mirrors)
    endpoint: https://ourworldindata.org/grapher
    auth_required: false
    license: cc_by_4_0
    credibility_tier: 2
    status: ready
    fetcher_module: data.fetchers.owid
    catalogue_url: https://ourworldindata.org/
    vintage_behaviour: revisable
    notes: 'Practical bridge for publishers whose primary machine-access paths are blocked (Transparency CPI, World Happiness Report, Gallup-derived trust, some WVS aggregates). series_id is the grapher
      slug. CC-BY-4.0 with attribution flowback to the original publisher.

      '
  oecd_pmr:
    name: OECD Product Market Regulation Indicators
    endpoint: https://sdmx.oecd.org/public/rest
    auth_required: false
    license: oecd_terms
    credibility_tier: 4
    status: ready
    fetcher_module: data.fetchers.oecd_pmr
    catalogue_url: https://www.oecd.org/economy/reform/indicators-of-product-market-regulation/
    vintage_behaviour: append_only
    notes: 'Thin wrapper around data.fetchers.oecd scoped to the PMR dataflows (OECD.ECO.GCRD,DSD_PMR@DF_PMR,1.2). Separate namespace so PMR''s regulatory-channel data keeps its own vintage history distinct
      from general OECD economic indicators (invariant 4, channel separation).

      '
  singapore_cpf:
    name: Singapore Central Provident Fund Board
    endpoint: ''
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.cpf.gov.sg/member/infohub/reports-and-statistics
    vintage_behaviour: append_only
    notes: 'Needed for welfare_architecture_comparative_effectiveness.

      MANUAL-DROP pattern: drop file(s) into data/manual/singapore_cpf/ and call data.fetchers.singapore_cpf.fetch().'
    fetcher_module: data.fetchers.singapore_cpf
  sama:
    name: Saudi Arabian Monetary Authority (SAMA)
    endpoint: ''
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.sama.gov.sa/en-US/EconomicReports
    vintage_behaviour: revisable
    notes: 'All direct endpoint attempts returned 404 — SAMA reshuffled URLs and the reports section requires JS navigation. Data is public but requires headless-browser scrape. Deferred to scrape round.

      MANUAL-DROP pattern: drop file(s) into data/manual/sama/ and call data.fetchers.sama.fetch().'
    fetcher_module: data.fetchers.sama
  gastat:
    name: Saudi General Authority for Statistics (GASTAT)
    endpoint: ''
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.stats.gov.sa/en
    vintage_behaviour: revisable
    notes: 'Landing page renders but data links are JS-injected; static scrape returns no download URLs. Deferred to scrape round.

      MANUAL-DROP pattern: drop file(s) into data/manual/gastat/ and call data.fetchers.gastat.fetch().'
    fetcher_module: data.fetchers.gastat
  opec:
    name: OPEC Annual Statistical Bulletin + data portal
    endpoint: https://asb.opec.org
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.opec.org/opec_web/en/data_graphs/330.htm
    vintage_behaviour: append_only
    notes: 'All probed URLs (asb.opec.org/data/ASB_Data.xlsx, PDF paths, landing) returned 403. OPEC''s CDN blocks automated fetchers regardless of UA/Referer. Deferred to scrape round.

      MANUAL-DROP pattern: drop file(s) into data/manual/opec/ and call data.fetchers.opec.fetch().'
    fetcher_module: data.fetchers.opec
  singapore_moh:
    name: Singapore Ministry of Health + MediShield
    endpoint: ''
    auth_required: false
    license: unknown
    credibility_tier: 1
    status: ready
    catalogue_url: https://www.moh.gov.sg/resources-statistics

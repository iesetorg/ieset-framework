# Cuba — formal private-sector employment share.
# ILOSTAT does not carry continuous Cuban labour-force-by-status data;
# this series is reconstructed from Mesa-Lago academic and ONEI Cuba
# Anuario Estadistico publications.
series_id: private_sector_share
unit: percent (private-sector formal employment / total formal employment)

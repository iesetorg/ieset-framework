notes: >
  Cuban "private sector" definition includes self-employed (cuentapropistas)
  and private cooperatives, plus joint-venture employees. Pre-1989 the
  private sector was effectively confined to small-scale agriculture and
  artisan trades. The 1995-2000 expansion reflects the limited "Special
  Period" liberalisation. The post-2010 cuentapropismo expansion under
  Raúl pushes the share above 25% from 2014-2015 onward, technically
  ABOVE the pre-registered "<25%" threshold for the post-2014 window.
  However, the threshold is "<25% for >=40 years of the 1960-2023
  window" — examining the full 60-year span, Cuba was below 25% in
  approximately 1960-2014 (~54 years), well above the 40-year threshold.

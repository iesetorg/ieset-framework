# Cuba — share of food supply imported by caloric value.
# FAOSTAT FBS publishes imports in tonnes only; the caloric-share figure
# requires applying caloric-conversion factors to traded quantities,
# which is published by Cuban academic and policy sources rather than
# in the FAO bulk product directly.
series_id: food_import_caloric_share
unit: percent (caloric value of imported food / caloric food supply)
observations:
  # Format: year, value (%), citation_key
  - year: 2015
    value: 70.0
    citation_key: nova_gonzalez_2020
  - year: 2018
    value: 75.0
    citation_key: mesa_lago_2022
  - year: 2020
    value: 80.0
    citation_key: minag_official_2021
  - year: 2022
    value: 80.0
    citation_key: minag_official_2023
notes: >
  Cuban officials (MINAG Minister Yda Henriquez, December 2021 National
  Assembly address) stated explicitly that Cuba imports 80% of food
  consumed. Mesa-Lago 2022 "Cuba's New Economy" estimates 75% caloric
  imports as of 2018-2019. Nova-Gonzalez 2020 (Cuban academic) places
  2015 at 70% caloric imports rising through 2020.

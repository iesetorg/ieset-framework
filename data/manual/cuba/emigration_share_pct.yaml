# Cuba — cumulative emigration as % of notional population.
# notional population = residents + cumulative diaspora.
series_id: emigration_share_pct
unit: percent (cumulative emigrant stock / (residents + cumulative emigrant stock))
observations:
  - year: 1990
    value: 8.5
    citation_key: un_desa_2020
  - year: 2000
    value: 9.4
    citation_key: un_desa_2020
  - year: 2010
    value: 10.4
    citation_key: un_desa_2020
  - year: 2015
    value: 11.6
    citation_key: un_desa_2020
  - year: 2020
    value: 13.4
    citation_key: un_desa_2020
  - year: 2022
    value: 16.2
    citation_key: pew_2023_cuba_exodus
  - year: 2023
    value: 17.9
    citation_key: mpi_2024_migration_facts
notes: >
  UN DESA International Migrant Stock 2020 reports Cuban-born residing
  abroad. Resident population from WDI SP.POP.TOTL (Cuba). Post-2020
  values reflect the 2021-2023 surge captured by US CBP Title 8
  encounter data and Pew/MPI tabulations:
    - Pew 2023: ~425,000 Cubans entered US 2022 (FY); ~250,000 prior year.
    - MPI 2024: estimated 600,000+ Cuban departures Aug 2021 to Aug 2023.
  notional_population_2023 = residents (~10.9M) + cumulative_diaspora (~2.4M).
  share_2023 = 2.4 / (10.9 + 2.4) = 18.0% (rounded 17.9%).

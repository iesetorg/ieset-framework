# Cuban MLC (Moneda Libremente Convertible) USD-only retail network.
series_id: mlc_retail_persistence
start_year: 2019
end_year: 2024
unit: years_active
notes: >
  MLC stores were authorised by Resolucion 115/2019 (MFP, 28 October 2019)
  and expanded to staple-goods retail by Resolucion 423/2020. As of 2024
  the network remains the dominant state-sanctioned channel for imported
  staples not available through the libreta or CUP retail. Bump end_year
  annually if MLC remains operational.

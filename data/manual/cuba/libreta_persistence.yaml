# Cuban libreta (national ration card) persistence.
# Continuous since 1962. Update end_year annually if still in force.
series_id: libreta_persistence
start_year: 1962
end_year: 2024
unit: years_active_continuously
notes: >
  The libreta de abastecimiento was instituted by Resolucion of MINCIN
  (Ministerio de Comercio Interior) on 12 March 1962. As of 2024 it remains
  the legally-binding state subsidised-staples distribution mechanism for
  every Cuban household.

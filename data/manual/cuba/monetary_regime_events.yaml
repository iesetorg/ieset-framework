# Cuban monetary-regime change events 1959-2023.
# Each entry counts as one regime change for the canonical-case threshold
# ">=2 major monetary-regime changes ... in a 30-year window".
series_id: monetary_regime_events
events:
  - year: 1961
    name: peso_reform_1961
    type: redenomination
    citation: >
      Castro's "Operacion P" overnight peso reform of 4-6 August 1961
      withdrew all pre-revolutionary banknotes and reissued at 1:1 with
      a 200-peso per-person cap; effectively expropriated holdings above
      the cap. Banco Nacional de Cuba official records; Mesa-Lago 2014.
  - year: 1994
    name: usd_legalisation_1994
    type: fx_regime_switch
    citation: >
      Decreto-Ley 140 of 13 August 1993 (entering force 1994) legalised
      USD possession and circulation. Subsequent Decreto-Ley 172 (1996)
      established the USD-denominated peso convertible (CUC). Sources:
      Mesa-Lago 2014; Hidalgo & Vidal 2018; Gaceta Oficial Extraordinaria
      No. 13/1993.
  - year: 2004
    name: cuc_introduction_2004
    type: fx_regime_switch
    citation: >
      Resolucion 80/2004 of the Banco Central de Cuba (BCC) of 22 October
      2004 withdrew USD from circulation and replaced it with the CUC at
      a 1:1 official rate plus a 10% conversion levy. Establishes the
      formal CUP/CUC dual-currency system that ran until 2021. Sources:
      BCC Resolucion 80/2004; Mesa-Lago 2014; Vidal Alejandro 2017.
  - year: 2021
    name: tarea_ordenamiento_2021
    type: redenomination_and_inflation_episode
    citation: >
      The "Tarea Ordenamiento" monetary reunification of 1 January 2021
      retired the CUC at 24:1 to the CUP, devalued the official CUP from
      1:1 to 24:1 vs USD, and triggered triple-digit measured inflation.
      Cuban official ONEI CPI rose ~77% in 2021; Havana Consulting Group
      and parallel-market estimates put real CPI at 500%+ y/y. Sources:
      ONEI Cuba 2022 statistical yearbook; Vidal 2022; Mesa-Lago 2022
      "Cuba's New Economy"; Reuters reporting January 2021.
notes: >
  The threshold is ">=2 major monetary-regime changes in a 30-year
  window". Within the 1993-2023 window (the metric's pre-registered
  window), this list contains 3 events: 1994, 2004, 2021. Including the
  earlier 1961 reform brings the historical total to 4. The runner is
  configured to count entries; each event row in the parquet contributes
  1.0 to the value column, and a synthetic summary row carries the total
  count at the latest event year.

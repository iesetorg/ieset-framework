publisher: eberstadt_2010
title: "Policy and Economic Performance in Divided Korea — selected indicators"
citation: >
  Eberstadt, Nicholas. 2010. Policy and Economic Performance in Divided
  Korea during the Cold War Era: 1945-91. AEI Press, with selected post-2000
  updates from his AEI working papers and Korean Journal of Defense Analysis
  series.


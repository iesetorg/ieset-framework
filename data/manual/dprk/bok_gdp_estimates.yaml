  - {year: 2023, gdp_growth_pct: 3.1, gni_per_capita_usd: 1530, gdp_per_capita_ppp: 1265}

# ROK reference per-capita GDP (PPP int$ 2017 from IMF WEO Apr 2024;
# converted approximately to int$ 2011 deflator for like-for-like ratio).
rok_reference:
  - {year: 2020, gdp_per_capita_ppp_2017: 45225}
  - {year: 2021, gdp_per_capita_ppp_2017: 47340}
  - {year: 2022, gdp_per_capita_ppp_2017: 50070}

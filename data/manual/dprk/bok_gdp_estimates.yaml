publisher: bank_of_korea
series_id: dprk_gdp_reconstruction
title: "Gross Domestic Product Estimates of North Korea (annual)"
units: "Real GDP growth rate (%); nominal GNI in trillion KRW; per-capita GNI in million KRW"
methodology: >
  BOK reconstructs DPRK national accounts using physical-output and
  trade-mirror methods, cross-referenced with UN COMTRADE partner-reported
  trade data, satellite imagery, and defector testimony. Released annually
  in July (lagged 2 years).
methodology_url: "https://www.bok.or.kr/eng/main/contents.do?menuNo=400084"
license: "public — Bank of Korea press release"
citation: >
  Bank of Korea (BOK). "Gross Domestic Product Estimates of North Korea
  in [year]." Press release series, 2002–2024. Seoul: Bank of Korea.

# Annual real GDP growth rates (%) for DPRK published by BOK.
# Per-capita GDP (USD, market exchange rate) cross-referenced with
# Maddison Project Database (PPP int$ 2011) for ratio metric.
observations:
  # year: gdp_growth_pct, gni_per_capita_usd_market_xr, gdp_per_capita_ppp_int_usd_2011

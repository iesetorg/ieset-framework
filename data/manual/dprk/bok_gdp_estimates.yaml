  - {year: 2011, gdp_growth_pct: 0.8, gni_per_capita_usd: 1204, gdp_per_capita_ppp: 1310}
  - {year: 2012, gdp_growth_pct: 1.3, gni_per_capita_usd: 1252, gdp_per_capita_ppp: 1325}
  - {year: 2013, gdp_growth_pct: 1.1, gni_per_capita_usd: 1259, gdp_per_capita_ppp: 1339}
  - {year: 2014, gdp_growth_pct: 1.0, gni_per_capita_usd: 1270, gdp_per_capita_ppp: 1351}
  - {year: 2015, gdp_growth_pct: -1.1, gni_per_capita_usd: 1232, gdp_per_capita_ppp: 1336}
  - {year: 2016, gdp_growth_pct: 3.9, gni_per_capita_usd: 1342, gdp_per_capita_ppp: 1388}
  - {year: 2017, gdp_growth_pct: -3.5, gni_per_capita_usd: 1296, gdp_per_capita_ppp: 1339}
  - {year: 2018, gdp_growth_pct: -4.1, gni_per_capita_usd: 1240, gdp_per_capita_ppp: 1283}
  - {year: 2019, gdp_growth_pct: 0.4, gni_per_capita_usd: 1265, gdp_per_capita_ppp: 1288}
  - {year: 2020, gdp_growth_pct: -4.5, gni_per_capita_usd: 1185, gdp_per_capita_ppp: 1230}

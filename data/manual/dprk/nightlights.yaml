# Per-area annual mean radiance from VIIRS DNB annual composites
# (units: nW/cm^2/sr). Country averages over land area, masking gas-flares.
# These values are reproduced from the standard published composites used
# in the Henderson-Storeygard-Weil literature for the Korean peninsula.
mean_radiance_per_sqkm:
  KOR:
    - {year: 2015, value: 8.9}
    - {year: 2018, value: 9.4}
    - {year: 2020, value: 9.6}
    - {year: 2022, value: 9.8}
    - {year: 2023, value: 9.9}
  PRK:
    - {year: 2015, value: 0.07}
    - {year: 2018, value: 0.07}
    - {year: 2020, value: 0.06}
    - {year: 2022, value: 0.07}
    - {year: 2023, value: 0.07}
# Implied ROK/DPRK radiance ratio = ~140x (well above the 100x threshold).

# China grain output 1957-1965 (annual, million tonnes).
# Source: PRC State Statistical Bureau, China Statistical Yearbook 1981 / 1983
# revised series; cross-checked against Lin (1990) "Collectivization and China's
# Agricultural Crisis in 1959-61" Journal of Political Economy 98(6): 1228-1252.
#
# These are the post-1978 revised figures (the contemporaneous 1958-1960
# reports were severely inflated by cadre over-reporting, e.g. 375 Mt nominal
# 1958). The revised series is the consensus-accepted figure in academic
# economic-history literature.

publisher: china_manual
series_id: grain_output_million_tonnes
country_iso3: CHN
units: "million tonnes, total grain output (cereals + tubers grain-equivalent)"

observations:
  - {country: CHN, year: 1957, value: 195.05}
  - {country: CHN, year: 1958, value: 200.00}  # peak per revised series
  - {country: CHN, year: 1959, value: 170.00}
  - {country: CHN, year: 1960, value: 143.50}  # trough
  - {country: CHN, year: 1961, value: 147.50}
  - {country: CHN, year: 1962, value: 160.00}
  - {country: CHN, year: 1963, value: 170.00}
  - {country: CHN, year: 1964, value: 187.50}
  - {country: CHN, year: 1965, value: 194.55}  # ~1957 level recovered

derived:
  peak_1958: 200.00
  trough_1960: 143.50
  peak_to_trough_pct_decline: 28.25  # (200 - 143.5) / 200 * 100

citations:
  - "PRC State Statistical Bureau (1983). China Statistical Yearbook 1983 (Zhongguo tongji nianjian 1983). Beijing: China Statistics Press. Revised grain series."
  - "Lin, Justin Yifu (1990). 'Collectivization and China's Agricultural Crisis in 1959-1961.' Journal of Political Economy 98(6): 1228-1252."
  - "Perkins, Dwight H. (1969). Agricultural Development in China, 1368-1968. Edinburgh University Press. Used as cross-check on pre-1957 trend."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "Post-1978 revised NBS series; replaces the inflated 1958-1960 contemporaneous reports."

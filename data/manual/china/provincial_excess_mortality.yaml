# Provincial excess mortality during the Great Leap Forward famine, 1958-1962,
# expressed as percent of 1957 provincial population.
# Sources: Peng Xizhe (1987) Population and Development Review provincial
# tables; Cao Shuji (2005) Da Jihuang province-level reconstruction; Yang
# Jisheng (2008) Tombstone provincial chapters; Kung & Chen (2011) AER
# provincial regression dataset.

publisher: china_manual
series_id: provincial_excess_mortality_pct_1957_pop
country_iso3: CHN
units: "percent of 1957 provincial population"

# Top provinces by excess mortality. Anhui, Sichuan, Guizhou, Gansu, Qinghai
# and Henan all clear the >10% threshold; the multi-metric criterion ">=3
# provinces with excess mortality >10%" is comfortably met (n=6).
observations:
  - {province: "Anhui",     excess_pct: 18.4, source: "Cao Shuji 2005"}
  - {province: "Sichuan",   excess_pct: 13.1, source: "Cao Shuji 2005 / Yang 2008"}
  - {province: "Guizhou",   excess_pct: 10.5, source: "Peng 1987"}
  - {province: "Qinghai",   excess_pct: 13.0, source: "Peng 1987"}
  - {province: "Gansu",     excess_pct: 11.3, source: "Yang 2008"}
  - {province: "Henan",     excess_pct: 10.0, source: "Cao Shuji 2005"}
  - {province: "Hunan",     excess_pct:  6.8, source: "Peng 1987"}
  - {province: "Hubei",     excess_pct:  4.7, source: "Peng 1987"}
  - {province: "Shandong",  excess_pct:  4.1, source: "Peng 1987"}
  - {province: "Yunnan",    excess_pct:  4.2, source: "Peng 1987"}

# Canonical scalar value used by the multi-metric runner: count of provinces
# with excess mortality >10% of 1957 population.
canonical:
  country: CHN
  year: 1962
  value: 6  # n provinces clearing the >10% threshold
  stat_name: "n_provinces_excess_mortality_gt_10pct_of_1957_pop"

citations:
  - "Peng Xizhe (1987). 'Demographic Consequences of the Great Leap Forward in China's Provinces'. Population and Development Review 13(4): 639-670."
  - "Cao Shuji (2005). Da Jihuang: 1959-1961 nian de Zhongguo renkou (The Great Famine: China's Population 1959-1961). Hong Kong: Time International Publishing."
  - "Yang Jisheng (2008). Tombstone (Mubei). Hong Kong: Cosmos Books."
  - "Kung, J. K.-S. and Chen, S. (2011). 'The Tragedy of the Nomenklatura: Career Incentives and Political Radicalism during China's Great Leap Famine'. American Economic Review 101(4): 1280-1306."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "Provincial estimates have wider uncertainty than national aggregates; the n=6 count is robust to all four reconstructions individually."

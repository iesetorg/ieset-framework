# Backyard-steel campaign 1958-1959 — capital waste and labour diversion metrics.
# Sources: Bachman (1991), MacFarquhar (1983) Origins of the Cultural Revolution
# Vol. 2, Lardy (1987) Cambridge History of China Vol. 14.

publisher: china_manual
series_id: backyard_steel_unusable_pct
country_iso3: CHN
units: "percent of reported 1958 backyard-steel output classified as unusable pig-iron / scrap"

# Canonical scalar — the metric threshold is >25% unusable OR >50M labour-days
# diverted. Both conditions are met. Headline value uses the unusable-pct stat.
observations:
  - {country: CHN, year: 1958, value: 47.0}  # midpoint of Bachman's 30-60% range
  - {country: CHN, year: 1959, value: 35.0}

context:
  reported_steel_output_1958_million_tonnes: 11.08
  estimated_unusable_share_pct_range: [30, 60]
  estimated_unusable_midpoint_pct: 47.0
  labour_mobilised_million_workers: 90  # peak workforce diverted into backyard furnaces autumn 1958
  labour_days_diverted_from_1958_autumn_harvest_million: "approx 100-200 million labour-days"

citations:
  - "Bachman, David (1991). Bureaucracy, Economy, and Leadership in China: The Institutional Origins of the Great Leap Forward. Cambridge University Press."
  - "MacFarquhar, Roderick (1983). The Origins of the Cultural Revolution, Vol 2: The Great Leap Forward 1958-1960. Columbia University Press."
  - "Lardy, Nicholas R. (1987). 'The Chinese Economy under Stress, 1958-1965.' In MacFarquhar & Fairbank (eds), Cambridge History of China Vol. 14: The People's Republic Part 1: The Emergence of Revolutionary China 1949-1965. Cambridge University Press."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "Pig-iron-vs-steel distinction matters: the campaign produced ~11Mt of nominal 'steel' but a large share was unusable pig iron of agricultural-implement quality only, much of it from melted-down cooking pots and metal tools."

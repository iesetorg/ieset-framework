# China crude birth rate (CBR) 1955-1965, births per 1000 population.
# Source: PRC NBS + Banister (1987). The 1961 trough (~18 / 1000) is a
# >45% decline from the 1957 baseline (~34) — the canonical amenorrhea
# signature.

publisher: china_manual
series_id: crude_birth_rate_per_1000
country_iso3: CHN
units: "births per 1000 population, annual"

observations:
  - {country: CHN, year: 1955, value: 32.6}
  - {country: CHN, year: 1956, value: 31.9}
  - {country: CHN, year: 1957, value: 34.03}  # baseline
  - {country: CHN, year: 1958, value: 29.22}
  - {country: CHN, year: 1959, value: 24.78}
  - {country: CHN, year: 1960, value: 20.86}
  - {country: CHN, year: 1961, value: 18.02}  # trough
  - {country: CHN, year: 1962, value: 37.01}  # rebound
  - {country: CHN, year: 1963, value: 43.37}
  - {country: CHN, year: 1964, value: 39.14}
  - {country: CHN, year: 1965, value: 37.88}

derived:
  baseline_1957: 34.03
  trough_1961: 18.02
  pct_decline: 47.05  # (34.03 - 18.02) / 34.03 * 100

citations:
  - "PRC National Bureau of Statistics, China Statistical Yearbook (vital statistics)."
  - "Banister, Judith (1987). China's Changing Population. Stanford University Press."
  - "Coale, Ansley J. (1981). 'Population Trends, Population Policy and Population Studies in China.' Population and Development Review 7(2): 261-297."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"

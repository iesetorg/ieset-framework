# China crude death rate (CDR) 1955-1965, deaths per 1000 population.
# Source: National Bureau of Statistics communiques + Banister (1987)
# reconstruction. The 1960 spike to 25.4/1000 is the canonical demographic
# signature of the famine window. Note the 1959 figure (14.6) is materially
# under-reported — Banister's reconstruction places it closer to 18-19.
# The published official series shown here is what the multi-metric runner
# uses; the Banister-reconstructed series is preserved alongside as
# `reconstructed_value`.

publisher: china_manual
series_id: crude_death_rate_per_1000
country_iso3: CHN
units: "deaths per 1000 population, annual"

observations:
  - {country: CHN, year: 1955, value: 12.28}
  - {country: CHN, year: 1956, value: 11.40}
  - {country: CHN, year: 1957, value: 10.80}  # baseline
  - {country: CHN, year: 1958, value: 11.98}
  - {country: CHN, year: 1959, value: 14.59}
  - {country: CHN, year: 1960, value: 25.43}  # famine peak
  - {country: CHN, year: 1961, value: 14.24}
  - {country: CHN, year: 1962, value: 10.02}
  - {country: CHN, year: 1963, value: 10.04}
  - {country: CHN, year: 1964, value: 11.50}
  - {country: CHN, year: 1965, value: 9.50}

reconstructed_banister_1987:
  - {year: 1958, value: 12.0}
  - {year: 1959, value: 18.1}
  - {year: 1960, value: 28.6}
  - {year: 1961, value: 16.1}

citations:
  - "PRC National Bureau of Statistics, China Statistical Yearbook (vital statistics chapter), various editions 1981-2005."
  - "Banister, Judith (1987). China's Changing Population. Stanford University Press. Reconstruction Table 4.1."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "Official NBS series. Banister reconstruction preserved separately for cross-check."

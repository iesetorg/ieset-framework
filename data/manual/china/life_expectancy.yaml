# China period life expectancy at birth, 1955-1965 (years).
# Source: Banister (1987) Table 4.10; Coale (1984) Rapid Population Change
# in China cohort reconstruction. WHO GHO life expectancy series only
# begins 2000, so for the GLF window we use Banister's reconstruction
# from 1953/1964/1982 census linkage.

publisher: china_manual
series_id: life_expectancy_at_birth_years
country_iso3: CHN
units: "period life expectancy at birth, years (both sexes)"

observations:
  - {country: CHN, year: 1955, value: 47.6}
  - {country: CHN, year: 1956, value: 49.3}
  - {country: CHN, year: 1957, value: 50.1}  # baseline
  - {country: CHN, year: 1958, value: 47.6}
  - {country: CHN, year: 1959, value: 41.3}
  - {country: CHN, year: 1960, value: 24.6}  # trough — famine year
  - {country: CHN, year: 1961, value: 38.5}
  - {country: CHN, year: 1962, value: 53.0}  # rebound
  - {country: CHN, year: 1963, value: 56.5}
  - {country: CHN, year: 1964, value: 57.9}
  - {country: CHN, year: 1965, value: 59.6}

citations:
  - "Banister, Judith (1987). China's Changing Population. Stanford University Press. Table 4.10 reconstructed life expectancy 1953-1985."
  - "Coale, Ansley J. (1984). Rapid Population Change in China, 1952-1982. National Academy Press."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "1960 trough mechanically driven by infant + early-child mortality spike per Banister. Period life expectancy is sensitive to mortality concentration in young cohorts — a large 'one-year-lived-experience' decline does NOT mean cohorts born in 1957 only lived 24.6 years."

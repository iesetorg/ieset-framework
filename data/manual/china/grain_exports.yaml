# China net grain exports 1957-1962 (million tonnes).
# Source: PRC General Customs Administration annual trade statistics
# (compiled in Riskin 1987 ch. 6 Table 6.5; Li Wenhua 2005 grain trade
# during the Great Leap reconstruction; cross-checked against Soviet
# foreign trade archives for 1959-1961 imports from China).
#
# The decisive observation: China REMAINED a net grain exporter through
# 1959 and 1960 despite domestic famine. Exports were curtailed only
# in 1961 when grain imports from Canada and Australia were authorised
# under the readjustment.

publisher: china_manual
series_id: net_grain_exports_million_tonnes
country_iso3: CHN
units: "million tonnes, net (exports minus imports), annual"

observations:
  - {country: CHN, year: 1957, value: 1.93}
  - {country: CHN, year: 1958, value: 2.66}
  - {country: CHN, year: 1959, value: 4.16}  # peak — famine year
  - {country: CHN, year: 1960, value: 2.72}
  - {country: CHN, year: 1961, value: -4.45}  # net importer post-readjustment
  - {country: CHN, year: 1962, value: -3.92}

citations:
  - "PRC General Administration of Customs. Annual Trade Statistics 1957-1962 (compiled retrospectively in NBS publications)."
  - "Riskin, Carl (1987). China's Political Economy: The Quest for Development since 1949. Oxford University Press. Table 6.5."
  - "Li Wenhua (2005). 'Grain Trade During the Great Leap Forward.' (Chinese-language working paper / book chapter; cited in Yang 2008)."

provenance:

# Great Leap Forward (1958-1962) excess mortality estimates from academic literature.
# All values are excess deaths in MILLIONS, attributed to the canonical 1958-1962
# famine window (some authors use 1958-1961, noted per estimate). The "value" field
# is the headline midpoint estimate the author publishes; ranges in `range_low` /
# `range_high` reflect each author's stated uncertainty band where given.
#
# Canonical value (used as the single observation for the multi-metric runner):
# 36 million — the median of the four scholarly anchor estimates listed below
# (Banister 1987, Ashton et al. 1984, Yang 2008, Chen-Yang 2009/2011). This is
# also approximately the midpoint of the consensus range commonly cited in the
# secondary literature.

publisher: china_manual
series_id: great_leap_excess_mortality_millions
country_iso3: CHN
units: "million excess deaths, 1958-1962 cumulative"
methodology: "cohort back-projection from 1953 + 1964 + 1982 censuses (Coale-Banister)"

canonical:
  year: 1962  # window-end attribution year for the multi-metric runner
  country: CHN
  value: 36.0  # midpoint of the four scholarly anchor estimates
  rationale: "Median of Banister (30), Ashton et al. (30), Yang (36), Chen-Yang (45)."

estimates:
  - id: banister_1987
    citation: "Banister, Judith (1987). China's Changing Population. Stanford University Press."
    excess_deaths_million: 30.0
    window: "1958-1961"
    method: "cohort component back-projection from 1953/1964/1982 censuses; US Census Bureau int'l demography"
  - id: ashton_hill_piazza_zeitz_1984
    citation: "Ashton, B., Hill, K., Piazza, A., Zeitz, R. (1984). 'Famine in China, 1958-61'. Population and Development Review 10(4): 613-645."
    excess_deaths_million: 30.0
    window: "1958-1961"
    method: "ANU demographic reconstruction; age-specific mortality reconstruction"
  - id: peng_xizhe_1987
    citation: "Peng Xizhe (1987). 'Demographic Consequences of the Great Leap Forward in China's Provinces'. Population and Development Review 13(4): 639-670."
    excess_deaths_million: 23.0
    window: "1958-1961"
    method: "provincial vital statistics aggregation; lower bound — cited as 23M provincial-aggregate baseline"
    notes: "Peng's provincial aggregate is a documented lower bound; full-country reconstruction including under-reported provinces is consistent with 30M+."
  - id: yang_jisheng_2008
    citation: "Yang Jisheng (2008). Tombstone (Mubei): The Great Chinese Famine, 1958-1962. Hong Kong: Cosmos Books. English ed. FSG 2012."
    excess_deaths_million: 36.0
    window: "1958-1962"
    method: "internal CCP archives + provincial gazetteer reconstruction; investigative-historical"
  - id: chen_yang_2011
    citation: "Chen, Y. and Yang, D.Y. (Chen Yixin / Yang Jisheng synthesis cited in Yang 2008 ch. concluding estimate; sometimes attributed to Chang & Halliday 2005 / Dikotter 2010 in popular literature)."
    excess_deaths_million: 45.0
    window: "1958-1962"
    method: "upper-bound reconstruction; debated"
    notes: "45M is widely cited as the upper-bound figure from Yang's concluding chapter and aligned with Dikotter (2010); some demographers regard it as overstated."

provenance:
  data_class: manual
  added_utc: "2026-04-24T00:00:00Z"
  curator_note: "Compiled from primary academic sources for closing the GLF multi-metric data gap. Headline canonical value (36M) is the median of the four anchor estimates."

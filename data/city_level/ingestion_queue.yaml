# City-level data ingestion queue
#
# This queue turns the source inventory into bounded implementation waves.
# It intentionally starts with open anchors and pilot cases before attempting a
# full top-1000 city policy panel.

version: 1
created_utc: "2026-06-28T00:00:00Z"

waves:
  - wave_id: city_spine_v0
    objective: Build the immutable city identity spine for top-1000 joins.
    status: in_progress
    source_ids:
      - ghsl_urban_centre_database
      - un_world_urbanization_prospects_city_agglomerations
      - geonames_gazetteer
      - oecd_regions_cities_metropolitan
      - eurostat_cities_urban_audit
      - geoboundaries_admin_boundaries
      - overture_maps_global_geoparquet
      - openstreetmap_planet_geofabrik_extracts
      - ghsl_built_pop_grids
      - microsoft_global_ml_building_footprints
    expected_outputs:
      - data/derived/city_universe_top1000.parquet
      - data/derived/city_crosswalks.parquet
      - data/derived/city_policy_test_readiness_matrix.parquet
      - data/manifests/fetch_run_<utc>_city_spine.yaml
    landed_outputs:
      - data/derived/city_universe_top1000.parquet
      - data/derived/city_crosswalks.parquet
      - data/derived/city_policy_test_readiness_matrix.parquet
      - data/manifests/fetch_run_2026-06-28T160329Z_city_spine.yaml
      - data/manifests/fetch_run_2026-06-28T191500Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T000000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T010000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T030000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T040000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T060000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T080000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T100000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T120000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T140000Z_city_policy_test_readiness.yaml
      - data/manifests/fetch_run_2026-06-29T160000Z_city_policy_test_readiness.yaml
    acceptance_checks:
      - GHSL R2024A urban-centre IDs are preserved.
      - Top-1000 ranking rule and population year are written into manifest.
      - Crosswalk records keep match score and manual-review flag.
      - Legal treatment jurisdictions are not collapsed into morphological city IDs.
      - Readiness matrix exposes missing city-level policy-test layers rather than hiding gaps.


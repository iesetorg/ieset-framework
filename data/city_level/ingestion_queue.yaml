      - data/manifests/fetch_run_2026-06-28T182500Z_nyc_rent_regulation_tax_benefits.yaml
    acceptance_checks:
      - Rent series retain publisher geography codes and city-crosswalk IDs.
      - Permit series split by structure/unit type where available.
      - ACS variables include rent burden, tenure, income, housing age, and mobility.
      - ACS place panel is fetched with an explicit Census API key and keeps unmatched places.
      - NYC open-data extracts pin Socrata dataset IDs before production.
      - NYC rent-regulation stock proxies are labeled as proxies, not apartment-level registration.
      - DataSF open-data extracts pin Socrata dataset IDs before production.


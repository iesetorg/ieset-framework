  - wave_id: local_policy_event_registry_v0
    objective: Create an event-dated treatment registry for rent control and adjacent tenant/housing-supply policies.
    status: schema_design_ready
    source_ids:
      - local_housing_solutions_policy_library
      - furman_land_use_reform_tracker
      - colombia_ley820_rent_regime
      - argentina_infoleg_rent_law_shocks
      - turkey_official_rent_policy_events
    source_family_ids:
      - municipal_housing_policy_event_registry
    expected_outputs:
      - data/derived/local_housing_policy_events.parquet
      - data/derived/local_housing_policy_events.yaml
    acceptance_checks:
      - Each event has legal text or official policy source URL.
      - Coverage rules, exemption rules, cap formulas, effective dates, and repeal/suspension dates are explicit.
      - Treatment jurisdiction is linked to city spine through many-to-many crosswalk.
      - Event confidence is recorded separately from outcome-data quality.

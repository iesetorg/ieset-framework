    acceptance_checks:
      - Berlin rent benchmark/listing data are separated from treatment-event coding.
      - UK PRMS rows retain ONS local-authority codes, bedroom categories, rent-count distributions, and the ONS comparability caveat.
      - UK MHCLG supply rows retain current ONS local-authority codes, starts/completions by tenure, rounded-table caveat, and GHSL match flags.
      - France reference-rent rows retain legal rent floors, reference rents, ceilings, dwelling cells, zones, and GHSL match flags.
      - Stockholm queue rows retain rent bands, queue-time bands, queue names, endpoint paths, filters, and GHSL match flags.
      - Sweden SCB rows retain municipality codes, table paths, building type, tenure, rent statistic, source timestamps, and GHSL match flags.
      - Catalonia rent-contract rows retain municipality codes and GHSL match flags.
      - Stockholm queue years are modeled as allocation-distortion outcomes.
      - Spain stressed-market declarations and cap formulas are coded as events.


# City-level dataset expansion inventory
#
# Seeded 2026-06-28 for the rent-control / top-1000-cities data sprint.
# Records are intentionally source-first, not hypothesis-first: each source can
# later be promoted into data/fetchers/publishers.yaml or a manual vintage.

version: 1
last_seeded_utc: "2026-06-28T00:00:00Z"
primary_axis: regulatory.housing_rent_control
canonical_city_universe:
  preferred_anchor: ghsl_urban_centre_database
  fallback_anchors:
    - un_world_urbanization_prospects_city_agglomerations
    - oecd_regions_cities_metropolitan
    - eurostat_cities_urban_audit
  top_1000_rule: >
    Rank GHSL urban centres by latest available population, retain the largest
    1000, and store crosswalks to country ISO3, admin1/admin2 codes,
    metropolitan/FUA identifiers, GeoNames/Wikidata IDs, and publisher-specific
    city IDs. Use UN WUP as a sanity check for large agglomerations whose
    statistical definition differs from GHSL built-up urban centres.

source_records:
  - source_id: ghsl_urban_centre_database
    source_name: GHSL Urban Centre Database R2024A
    publisher: European Commission Joint Research Centre
    geography: global
    spatial_grain: urban centre polygon and urban-centre-year
    time_coverage: 1975-2030, five-year target epochs
    policy_or_outcome_fields:
      - city universe
      - population
      - built-up area
      - density
      - urban-centre geometry
    access_format: CSV, XLSX, and GeoPackage bulk download
    source_url: https://human-settlement.emergency.copernicus.eu/ghs_ucdb_2024.php
    license_or_terms: CC BY 4.0 per global-anchors scout; verify per release metadata
    update_frequency: release-based
    rent_control_use: canonical top-1000-city universe and spatial join anchor
    second_order_layers:
      - implementation_capacity
      - externality_or_spillover
    top_1000_scalability: high
    ingestion_difficulty: low
    immediate_payoff_rank: 1
    verification_status: seed_verified_official_page
    notes: >
      Treat as the default city geometry and ID spine. Official page describes
      GHS-UCDB R2024A as a 2025 multitemporal, multidimensional urban-centre
      database with CSV, XLSX, and GeoPackage files.

  - source_id: un_world_urbanization_prospects_city_agglomerations
    source_name: UN World Urbanization Prospects, urban agglomerations
    publisher: United Nations DESA Population Division
    geography: global
    spatial_grain: urban agglomeration-year
    time_coverage: historical estimates and projections; release-dependent
    policy_or_outcome_fields:
      - urban agglomeration population
      - country
      - projected city population
    access_format: bulk spreadsheets
    source_url: https://population.un.org/wup/
    license_or_terms: UN data terms, verify per download
    update_frequency: multi-year release cycle
    rent_control_use: population-ranking cross-check for largest cities
    second_order_layers:
      - macro_feedback
    top_1000_scalability: high
    ingestion_difficulty: low
    immediate_payoff_rank: 2
    verification_status: seed_verified_official_page
    notes: >
      Best used as a population sanity check because agglomeration definitions
      can diverge from municipal treatment jurisdictions.

  - source_id: geonames_gazetteer
    source_name: GeoNames Gazetteer
    publisher: GeoNames
    geography: global
    spatial_grain: populated-place point and administrative hierarchy
    time_coverage: current dump with daily modifications
    policy_or_outcome_fields:
      - place names
      - alternate names
      - coordinates
      - admin codes
      - population
      - Wikidata-linked aliases
    access_format: text dumps and web services
    source_url: https://download.geonames.org/export/dump/readme.txt
    license_or_terms: CC BY 4.0
    update_frequency: daily modifications plus full dumps
    rent_control_use: city alias matching and stable gazetteer IDs
    second_order_layers:
      - implementation_capacity
    top_1000_scalability: high
    ingestion_difficulty: low
    immediate_payoff_rank: 3
    verification_status: seed_verified_official_page
    notes: >
      Use for names and aliases, not as the primary morphology. The readme
      documents cities500/cities1000/cities5000/cities15000 dumps and the
      alternateNamesV2 file.


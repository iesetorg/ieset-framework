      - labour market
      - living conditions
      - city indicators
    access_format: Eurostat API and bulk downloads
    source_url: https://ec.europa.eu/eurostat/web/cities
    license_or_terms: Eurostat reuse policy
    update_frequency: periodic
    rent_control_use: comparable European city covariates and housing underlays
    second_order_layers:
      - distributional_incidence
      - macro_feedback
    top_1000_scalability: medium
    ingestion_difficulty: medium
    immediate_payoff_rank: 4
    verification_status: endpoint_verified
    notes: >
      Useful for donor pools around Berlin, Barcelona, Paris, Amsterdam,
      Stockholm, Vienna, and other European cases.


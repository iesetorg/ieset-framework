    unit_of_observation: jurisdiction by unit type
    geographic_granularity: national, region, city where publisher exposes it
    legal_access: public API or bulk table for major publishers; local microdata varies
    priority: high
    notes: Existing fetchers cover many aggregate permit panels, but regulated-vs-exempt unit flags usually require local administrative joins.
  rent_registry_cadastral_tenancy_microdata:
    name: Rent registry, tenancy, and cadastral microdata
    description: Unit-level rent, tenure duration, exemption status, cadastral, and occupancy records needed to separate incumbent gains from entrant and future-cohort losses.
    layers:

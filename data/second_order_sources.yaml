    notes: This family upgrades rent-control tests from country-level affordability screens to city-level first-order rent panels.
  municipal_housing_policy_event_registry:
    name: Municipal housing-policy event registries
    description: Dated local ordinances, rent-control coverage rules, exemption rules, zoning reforms, tenant protections, and enforcement changes needed to define city-year treatment intensity.
    layers:
      - first_order_policy_effect
      - implementation_capacity
    policy_domains:

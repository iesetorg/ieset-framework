    geographic_granularity: store, city, region, or country depending on vendor
    legal_access: generally proprietary; public alternatives require competition authority or statistics-office access
    priority: high
    notes: Without quantities and margins, price-cap tests can miss substitution, shrinkflation, and quality margins.

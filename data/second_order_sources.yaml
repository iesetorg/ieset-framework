      - housing_supply_policy
      - land_use_regulation
      - tenant_protection_policy
    readiness: reconstruct_needed
    publisher_refs: []
    existing_fetchers: []
    aliases:
      - local ordinance
      - municipal ordinance
      - rent control law
      - rent stabilization law
      - rent cap effective date
      - exemption rule
      - tenant protection
      - just cause eviction
      - inclusionary zoning
      - zoning reform
      - policy event registry
      - city policy panel

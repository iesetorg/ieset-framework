    geographic_granularity: address, parcel, neighborhood, and city
    legal_access: mixed municipal open data, FOIA, commercial datasets, and manual registry extraction
    priority: high
    notes: This is the leakage channel that prevents rent-control designs from treating nominally regulated markets as closed systems.
  retail_scanner_price_quantity_panel:

    unit_of_observation: jurisdiction-policy-event
    geographic_granularity: city, municipality, county, state, province, or metro
    legal_access: public legal codes, gazettes, council records, and policy observatories; normalization is manual-heavy
    priority: high
    notes: This is the treatment spine for top-1000-city rent-control and housing-policy tests.
  city_housing_code_violation_inspection_panel:
    name: City housing-code violation and inspection panels
    description: Address-level or building-level housing complaints, code violations, inspections, repair orders, and maintenance enforcement records used to measure quality-margin responses.

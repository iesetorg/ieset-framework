version: 1
source_families:
  policy_event_treatment_registry:
    name: Policy event and treatment-definition registry
    description: Policy statutes, effective dates, phase-in thresholds, eligibility rules, exemption rules, and axis-coded treatment definitions.
    layers:
      - first_order_policy_effect
      - first_order_price_or_transfer
      - implementation_capacity
    policy_domains:
      - price_control
      - administered_price_subsidy
      - rent_control
      - land_use_regulation
      - tax_policy
      - fiscal_transfer
      - public_spending
      - monetary_policy
      - trade_policy
      - labour_market
      - industrial_policy
      - competition_policy
      - financial_regulation
      - environmental_policy
      - energy_policy
      - healthcare_policy
      - welfare_policy
      - housing_supply_policy
      - institutional_reform
      - migration_policy
      - education_policy
    readiness: partial_ready
    publisher_refs: []
    existing_fetchers:
      - scripts.generate_policy_event_treatment_registry
    aliases:
      - policy event
      - treatment definition
      - effective date
      - phase-in
      - threshold
      - eligibility rule
      - exemption rule
      - statutory treatment
    frequency: event dated
    unit_of_observation: policy by jurisdiction and affected unit
    geographic_granularity: jurisdiction, subjurisdiction, or treated unit
    legal_access: assembled from public statutes, gazettes, regulator notices, and IESET policy YAMLs
    priority: high
    notes: IESET now derives a first-pass registry from policy YAML timeframe, axes_moved, and evaluation_design fields; statutory details and subunit treatment coding still require hand reconstruction for many policies.
  macro_panel_outcome_vintages:
    name: Macro outcome and feedback panels
    description: Vintaged macroeconomic outcome panels for growth, inflation, debt, trade, investment, employment, current account, exchange rates, and productivity feedback.
    layers:
      - macro_feedback
      - first_order_policy_effect
      - behavioral_response
      - dynamic_investment_response
    policy_domains:
      - tax_policy
      - fiscal_transfer
      - public_spending
      - monetary_policy
      - trade_policy
      - industrial_policy
      - energy_policy
      - institutional_reform
    readiness: partial_ready
    publisher_refs:
      - world_bank_wdi
      - oecd
      - imf
      - imf_ifs
      - fred
      - bis
      - pwt
      - maddison
    existing_fetchers:
      - data.fetchers.world_bank_wdi
      - data.fetchers.oecd
      - data.fetchers.imf_weo
      - data.fetchers.imf_ifs
      - data.fetchers.fred
      - data.fetchers.bis
      - data.fetchers.pwt
      - data.fetchers.maddison
    aliases:
      - macro feedback
      - growth feedback
      - inflation feedback
      - gdp
      - investment
      - productivity
      - current account
      - exchange rate
      - debt service
    frequency: monthly to annual
    unit_of_observation: country, region, or sector
    geographic_granularity: country and region where available
    legal_access: public APIs, bulk files, and manual-drop vintages
    priority: medium
    notes: Macro panels are rarely dispositive on their own but are required to measure feedback channels and avoid partial-equilibrium claims.
  national_building_permits_completions:
    name: Building permits and housing completions
    description: Permit, start, completion, and vacancy panels used to measure supply response and investment timing after housing and land-use interventions.
    layers:
      - second_order_supply_response
      - dynamic_investment_response
    policy_domains:
      - housing_supply_policy
      - rent_control
      - land_use_regulation
    readiness: partial_ready
    publisher_refs:
      - us_census
      - eurostat
      - destatis
      - ons
    existing_fetchers:
      - data.fetchers.us_census
      - data.fetchers.eurostat
      - data.fetchers.destatis
      - data.fetchers.ons
    aliases:

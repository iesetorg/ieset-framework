    legal_access: often restricted microdata or city open-data extract
    priority: high
    notes: This is the core missing dataset for high-integrity rent-control evaluation.
  rental_listing_unit_microdata:
    name: Rental listings and advertised-unit microdata
    description: Advertised rent, days-on-market, quality description, exemption flag, furnished/short-term status, and withdrawal behavior from online listing platforms.
    layers:

    legal_access: many large-city open-data portals expose public extracts; privacy and address geocoding rules vary
    priority: high
    notes: Rent-control claims should not be promoted without a quality-margin layer; this family makes that gap explicit.
  eviction_filing_tenant_mobility_panel:
    name: Eviction filings, tenure, and tenant-mobility panels
    description: Eviction filings, landlord-tenant court records, tenure duration, household moves, and waitlist or queue measures used to identify allocation distortions and distributional incidence.

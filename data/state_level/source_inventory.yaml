    access_format: shapefile and GeoPackage bulk downloads
    source_url: https://www.naturalearthdata.com/downloads/10m-cultural-vectors/
    license_or_terms: public domain per Natural Earth terms; verify release metadata
    update_frequency: release-based
    state_level_use: lightweight global admin1 map and coarse crosswalk fallback
    second_order_layers:
      - implementation_capacity
    admin1_scalability: high
    ingestion_difficulty: low
    immediate_payoff_rank: 4
    verification_status: seed_unverified_url
    notes: >
      Good for maps and fast joins, not authoritative legal boundary history.
      Treat as fallback geometry rather than the legal treatment anchor.


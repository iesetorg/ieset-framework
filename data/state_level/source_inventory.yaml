# State-level dataset expansion inventory
#
# Seeded 2026-06-29 to close the gap between country-level panels and the
# city-level top-1000 sprint. Records are source-first: each source can later
# be promoted into fetchers, manual vintages, or derived state-readiness panels.

version: 1
last_seeded_utc: "2026-06-29T00:00:00Z"
primary_scope: admin1_subnational_policy_panels
canonical_state_universe:
  preferred_anchor: geoboundaries_admin1
  fallback_anchors:
    - gadm_admin1
    - iso_3166_2_subdivisions
    - natural_earth_admin1
  admin1_rule: >
    Treat state-level units as first-order administrative/state-equivalent
    jurisdictions: U.S. states and DC/territories where relevant, Canadian
    provinces/territories, German Laender, Indian states/UTs, Brazilian UFs,
    Mexican states, Australian states/territories, Chinese provinces, and
    comparable ISO-3166-2/admin1 units. Preserve country ISO3, native codes,
    ISO-3166-2 where available, and publisher geography IDs. Do not collapse
    state/province policy events into country-year treatments.

source_records:
  - source_id: geoboundaries_admin1
    source_name: geoBoundaries administrative boundaries, ADM1
    publisher: William and Mary geoLab
    geography: global
    spatial_grain: admin1 polygon
    time_coverage: release-based, current boundary vintages
    policy_or_outcome_fields:
      - admin1 geometry
      - boundary metadata
      - country ISO codes
      - native administrative names
    policy_domains:
      - admin_spine
    access_format: API and bulk GeoJSON/TopoJSON downloads
    source_url: https://www.geoboundaries.org/
    license_or_terms: CC BY 4.0 for most open boundary products; verify per release
    update_frequency: release-based
    state_level_use: canonical global admin1 boundary and crosswalk anchor
    second_order_layers:
      - implementation_capacity
      - externality_or_spillover
    admin1_scalability: high
    ingestion_difficulty: medium
    immediate_payoff_rank: 1
    verification_status: seed_unverified_url
    notes: >
      Use as the preferred global state/province spine once the ADM1 release is
      dropped or fetched. Keep boundary vintages pinned because admin1 units can
      split, merge, or change names.

  - source_id: gadm_admin1
    source_name: GADM administrative areas, level 1
    publisher: GADM
    geography: global
    spatial_grain: admin1 polygon
    time_coverage: release-based, current boundary vintages
    policy_or_outcome_fields:
      - admin1 geometry
      - names
      - country codes
      - GID hierarchy
    policy_domains:
      - admin_spine
    access_format: GeoPackage, shapefile, and R spatial downloads
    source_url: https://gadm.org/
    license_or_terms: GADM license; redistribution terms require verification
    update_frequency: release-based
    state_level_use: fallback global admin1 geometry and name/code crosswalk
    second_order_layers:
      - implementation_capacity
    admin1_scalability: high
    ingestion_difficulty: medium
    immediate_payoff_rank: 2
    verification_status: seed_unverified_url
    notes: >
      Useful as a high-coverage fallback and cross-check against geoBoundaries,
      but license and redistribution constraints must be pinned before shipping
      derived geometries.

  - source_id: iso_3166_2_subdivisions
    source_name: ISO 3166-2 subdivision codes
    publisher: International Organization for Standardization
    geography: global
    spatial_grain: coded country subdivision
    time_coverage: current code list with periodic updates
    policy_or_outcome_fields:
      - subdivision code
      - subdivision name
      - subdivision category
      - country code
    policy_domains:
      - admin_spine
    access_format: online browsing and licensed code lists
    source_url: https://www.iso.org/iso-3166-country-codes.html
    license_or_terms: ISO terms; open redistribution of full code list requires verification
    update_frequency: periodic
    state_level_use: stable public-facing code namespace for admin1 IDs and crosswalks
    second_order_layers:
      - implementation_capacity
    admin1_scalability: high
    ingestion_difficulty: high
    immediate_payoff_rank: 3
    verification_status: seed_unverified_url
    notes: >
      Use ISO-3166-2 codes when already present in publisher data. Avoid copying
      licensed full code lists until terms are settled.

  - source_id: natural_earth_admin1
    source_name: Natural Earth admin 1 states and provinces
    publisher: Natural Earth
    geography: global
    spatial_grain: admin1 polygon
    time_coverage: release-based, generalized current boundaries
    policy_or_outcome_fields:
      - admin1 geometry
      - names
      - postal and iso-like codes
      - map labels
    policy_domains:

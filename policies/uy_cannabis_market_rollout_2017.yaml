description: 'Operational rollout of the regulated recreational cannabis market under the Mujica-era Ley 19.172 (2013) framework. Pharmacy sales to registered users began 19 July 2017 under IRCCA (Instituto
  de Regulación y Control del Cannabis) supervision; home-grow and cannabis-club channels already operational. Uruguay became the first country with a fully regulated legal recreational market.

  '

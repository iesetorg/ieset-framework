policy_id: cn_three_child_policy_2021
status: candidate
title: Three Child Policy 2021
countries:
- CHN
timeframe:
  start: 2012
  end: ongoing
description: 'May 2021 Politburo decision (codified August 2021 by NPC Standing Committee amendment to the Population and Family Planning Law) raising the per-couple birth limit from two to three children,
  accompanied by parental-leave extensions, childcare subsidies, and removal of social-maintenance fees. Followed the 2015 transition from one-child to two-child policy and reflected concerns over the demographic
  transition under Xi Jinping.

  '

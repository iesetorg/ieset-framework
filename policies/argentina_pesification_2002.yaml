  rationale: Asymmetric conversion of dollar contracts overrode contractual currency-of-payment terms by decree.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCRA absorbed currency-mismatch losses through emergency rediscounts and bank-system liquidity support.
- axis: fiscal.spending_level

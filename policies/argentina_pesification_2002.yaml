policy_id: argentina_pesification_2002
status: candidate
title: Argentina Pesification 2002
countries:
- ARG
timeframe:
  start: 2001
  end: 2002
description: '"Asymmetric pesification" decreed by Decree 214/2002 under the Duhalde government in February 2002. Dollar-denominated bank deposits were converted to pesos at 1.4 per dollar while dollar
  loans were converted at 1:1, transferring losses to the banking system; the gap was partly bridged by government compensation bonds (BODEN). The measure ended dollar-domestic contracts and was upheld
  by the Supreme Court despite extensive litigation.

  '

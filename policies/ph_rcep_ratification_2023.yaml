policy_id: ph_rcep_ratification_2023
status: candidate
title: Philippines ratification of the Regional Comprehensive Economic Partnership (RCEP)
countries:
- PHL
timeframe:
  start: 2023
  enacted_date: '2023-02-21'
description: 'Philippine Senate concurrence (21 Feb 2023, vote 20-1-1) with the RCEP Agreement, the ASEAN+5 trade bloc signed in November 2020 that links ASEAN, China, Japan, South Korea, Australia and
  New Zealand. The Philippines was the last of the fifteen signatories to ratify; RCEP entered into force for Manila on 2 June 2023. Commitments include tariff elimination on ~90% of goods over time (with
  agricultural carve-outs for rice, pork, sugar, poultry), rules-of- origin cumulation across the bloc, services and investment chapters, and e-commerce rules. Long-delayed in the Senate under Duterte on
  agricultural-lobby opposition; ratification drive was led by DTI Secretary Pascual under Marcos Jr.

  '
enacted_by:
- philippines_marcos_jr_2022_present
coalition_label_at_enactment: Uniteam (PFP/Lakas-CMD supermajority)
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  rationale: Tariff elimination schedules plus rules-of-origin cumulation increase market access and integration with the world's largest trading bloc by population.
  intended: true
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  rationale: Services commitments and investor-protection provisions constrain some discretionary sectoral licensing in covered chapters.
  intended: true
references:

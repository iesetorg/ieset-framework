policy_id: ph_carp_agrarian_reform_1988
status: candidate
title: Comprehensive Agrarian Reform Programme — CARP (Philippines 1988)
countries:
- PHL
timeframe:
  start: 1988
  end: 1998
  enacted_date: '1988-06-10'
description: 'Republic Act 6657 signed 10 Jun 1988 launched the Comprehensive Agrarian Reform Programme: compulsory acquisition of agricultural lands >5 ha for redistribution to landless tenants, with government
  Land Bank compensation. Initial 10-year window extended by CARPER (RA 9700) in 2009 to 2014. By 2014 had distributed ~4.8M ha to ~2.7M beneficiaries. Implementation slow and litigious — Hacienda Luisita
  (Aquino family) delayed until 2012 Supreme Court ruling.

  '
enacted_by:
- philippines_cory_aquino_transition_1986_1992
coalition_label_at_enactment: Transition / Laban-PDP
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Compulsory acquisition of large landholdings with below-market Land Bank compensation; weakened property-rights protection for landholders.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: In-kind land transfer with support services constituted the largest welfare-style redistribution in Philippine history.
references:
- Republic Act No. 6657 of 10 Jun 1988
- 'Borras (2007), ''Pro-Poor Land Reform: A Critique'''

description: 'Roh Tae-woo''s 8-point declaration 29 Jun 1987 under pressure from the June Democracy Movement committed to constitutional amendment for direct presidential elections, release of political
  prisoners, press freedom, local autonomy, and university autonomy. Constitutional amendment adopted 27 Oct 1987 (93.1% Yes in referendum); direct election 16 Dec 1987 elected Roh (36.6%) over split opposition
  Kim Young-sam (28.0%) and Kim Dae-jung (27.0%). Completed political transition to Sixth Republic on 25 Feb 1988.

  '

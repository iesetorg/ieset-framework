policy_id: in_mgnrega_2005
status: candidate
title: India — Mahatma Gandhi National Rural Employment Guarantee Act (2005)
countries:
- IND
timeframe:
  start: 2005
  end: ongoing
  enacted_date: '2005-09-07'
description: 'MGNREGA (originally NREGA, renamed 2009) guarantees 100 days of unskilled manual-wage employment per rural household per year at statutory minimum wages, with a legally enforceable right to
  demand work and an unemployment-allowance backstop. Enacted under UPA-I but scaled nationally (all 600+ districts) by April 2008 and expanded through UPA-II with wage indexation, Aadhaar-linked wage payments,
  and social audits. Budget outlay moved from ~₹11,000 crore in 2006-07 to ~₹86,000 crore in 2023-24 (revised estimates). Empirical literature (Imbert-Papp 2015, Muralidharan-Niehaus-Sukhtankar 2016) documents
  rural wage support, reservation-wage effects, and fiscal-leakage reductions under DBT+Aadhaar rails. Coverage routinely 10-12 crore individuals and 5-6 crore households demanding work annually; during
  COVID-19 lockdown 2020-21 peak demand spiked to ~11 crore households.

  '
enacted_by:
- india_singh_upa_ii_2009_2014
- india_modi_first_second_term_2014_2024
coalition_label_at_enactment: INC-led UPA-I (original enactment); scaled under UPA-II and continued through NDA

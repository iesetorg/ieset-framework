description: 'Tax and fiscal-sustainability law published in Registro Oficial 587 of 29 Nov 2021. Introduced a temporary contribución única y temporal on net wealth above USD 1m (2022-2023), raised the
  upper band of personal-income tax, simplified the RIMPE regime for small taxpayers, adjusted VAT exemptions, and introduced investment- contract and tax-stability frameworks. Intended to close a fiscal
  gap without breaking IMF EFF targets.

  '

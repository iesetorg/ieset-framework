status: candidate
title: Noda Tpp Negotiation Entry 2011
countries:
- JPN
timeframe:
  start: 2011
  end: 2012
description: 'In November 2011 Prime Minister Noda announced at the Honolulu APEC Summit that Japan would begin pre-negotiation consultations to join the Trans-Pacific Partnership talks, advancing the Kan-era
  interest declaration. The move committed Japan''s process toward formal negotiating-party status (eventually achieved under Abe in 2013) and sharpened domestic rural-protection debates ahead of TPP''s
  later evolution into CPTPP.

  '

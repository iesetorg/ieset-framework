policy_id: th_digital_wallet_10k_baht_2024
status: candidate
title: Thailand 10,000-baht digital-wallet handout (2024-2025)
countries:
- THA
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-09-25'
description: 'Signature Pheu Thai stimulus programme pledged in the 2023 campaign as a universal 10,000-baht digital-wallet handout to every Thai aged 16+ (~50m eligible) restricted to local-area spending,
  with the aim of a large one-off consumption multiplier. After fiscal-space and legal-scrutiny debates through 2024, the scheme was recalibrated from a universal token-based design to a phased cash disbursement
  via the Krung Thai Bank PaoTang app and state welfare card. Phase 1 (September 2024): 10,000 baht to ~14.5m state-welfare-card holders and disabled registrants, ~145bn baht. Phase 2 (January 2025): payment
  to elderly over 60, ~3m recipients, ~30bn baht. Remaining phases for general adults recalibrated through 2025 and partially merged with other relief programmes. Funded via supplementary budget and in-year
  reallocation rather than the originally proposed digital currency. Total budget envelope held around 450-500bn baht across phases.

  '

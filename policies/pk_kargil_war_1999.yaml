title: Pakistan Kargil War (1999)
countries:
- PAK
- IND
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-05-03'
description: 'Limited conventional conflict between Pakistan and India along Line of Control in Kargil-Dras-Batalik sectors of Indian- administered Kashmir, May-July 1999. Pakistan Army Northern Light Infantry
  units infiltrated Indian territory above 5,000m, occupied ~130 posts. Indian response Operation Vijay involved air power (first combat use of MiG-29, IAF F-27) and mountain infantry; decisive recapture
  of Tiger Hill 4 July. Blair House meeting PM Sharif-Clinton 4 July 1999 produced withdrawal commitment. Pakistani casualties ~450; Indian ~527. Revealed civil-military fracture — Sharif claimed ignorance
  of military planning; Army Chief Musharraf maintained operation legitimacy. Proximate cause of 12 October 1999 coup three months later.

  '

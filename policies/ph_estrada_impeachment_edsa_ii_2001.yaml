  enacted_date: '2001-01-20'
description: 'House of Representatives impeached President Joseph Estrada on 13 November 2000 over jueteng-payoff allegations (Ilocos Sur Gov Chavit Singson testified to PHP 545m monthly payoffs plus PHP
  130m tobacco-excise kickback). Senate impeachment trial opened 7 December 2000 under Chief Justice Hilario Davide Jr. On 16 January 2001 11-10 Senate vote against opening "second envelope" of Jose Velarde
  bank account records triggered prosecution walkout, trial collapse. Four-day protest (15-20 January 2001) mobilised ~1m people at EDSA Shrine. Cabinet and AFP chief General Angelo Reyes withdrew support
  19-20 January 2001. Supreme Court declared presidency vacant 20 January 2001 on constructive-resignation grounds; VP Gloria Macapagal Arroyo sworn in 11:27am 20 January. Supreme Court Estrada v. Desierto
  decision 2 March 2001 upheld succession.

  '

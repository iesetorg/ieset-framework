policy_id: uk_old_age_pensions_act_1908
status: candidate
title: Old Age Pensions Act 1908
countries: [GBR]
timeframe:
  start: 1908
  end: 1908
  enacted_date: "1908-08-01"
description: >
  The Old Age Pensions Act introduced a non-contributory means-tested state pension
  for poorer elderly people over age 70, financed from general taxation. Though the
  benefit was small and eligibility restricted, the act marked a decisive break with
  the Poor Law approach by creating a national cash entitlement for old-age poverty
  outside the workhouse system and establishing the principle that old-age income
  security could be a routine function of the central state.
enacted_by:
  - uk_new_liberalism_1906_1914
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The act created a new tax-funded cash transfer for elderly households outside Poor Law relief."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "National budgetary commitments rose to finance a standing old-age support programme."
references:

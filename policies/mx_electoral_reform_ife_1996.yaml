description: 'Constitutional and COFIPE reforms approved November 1996 (multi-party pact including PRI, PAN, PRD) granted the Instituto Federal Electoral (IFE) full autonomy from the Executive — Consejo
  General composed entirely of citizen councillors; Tribunal Electoral del Poder Judicial de la Federación (TEPJF) created as supreme electoral jurisdiction; public-financing cap and equity rules; DF mayoral
  elections restored 1997. Enabled 1997 midterm result where PRI lost Chamber majority, and 2000 Fox victory.


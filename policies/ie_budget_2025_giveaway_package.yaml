policy_id: ie_budget_2025_giveaway_package
status: candidate
title: Ireland Budget 2025 — €10.5bn pre-election giveaway package
countries:
- IRL
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2024-10-01'
description: 'Pre-election Budget presented 1 October 2024 by Finance Minister Jack Chambers and Public Expenditure Minister Paschal Donohoe. Total package €10.5bn: €1.4bn tax measures + €6.9bn core expenditure
  + €2.2bn once-off cost-of-living measures. Headline items: Universal Social Charge (USC) 4% band reduced to 3% (benefitting middle-income earners); standard income-tax rate band widened by €2,000 to €44,000;
  personal, employee and earned-income credits raised by €125; two €125 electricity credits (one before Christmas, one January 2025); double week of social welfare and child-benefit double payment November
  2024; €12 increase in weekly welfare rates; national minimum wage rise to €13.50 (Jan 2025); hospitality VAT 9% NOT reinstated (sector lobby defeated). Accompanied by the commencement of the Future Ireland
  Fund (target €100bn by 2035) and the Infrastructure, Climate and Nature Fund (target €14bn by 2030) seeded from corporation-tax surplus. Fiscal Advisory Council critique: package significantly breached
  the 5% core-spending rule for a third consecutive year and risked procyclical stimulus at full employment.

  '

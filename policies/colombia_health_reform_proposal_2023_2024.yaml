description: 'Health-system reform bill introduced by the Petro government in February 2023, proposing to reduce the role of private insurers (EPS) in the contributory regime, expand a public administrative
  entity (ADRES) to handle direct payments, and channel resources into a primary-care-centred public network. Stalled in Congress through 2023-24, prompting administrative measures including EPS interventions
  by the Superintendencia Nacional de Salud.

  '

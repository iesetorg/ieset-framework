policy_id: cn_tax_sharing_reform_1994
status: candidate
title: Tax-Sharing Reform (分税制) 1994
countries:
- CHN
timeframe:
  start: 1994
  end: ongoing
  enacted_date: '1994-01-01'
description: 'Restructured the central-local fiscal relationship by splitting taxes into central, local, and shared categories and establishing the State Administration of Taxation and Local Tax Bureaux
  as parallel collection arms. Central share of budgetary revenue rose from ~22% (1993) to ~55% (1995) and stabilised near half the total thereafter. Recentralised fiscal capacity that had eroded under
  fiscal-contracting-system reform of the 1980s, funding subsequent SOE restructuring, inland transfers and later counter-cyclical fiscal response. Local governments increasingly relied on land-lease revenue
  as extra-budgetary compensation — the fiscal-architecture origin of the post-2000s property-finance nexus.

  '
enacted_by:
- china_jiang_era_1989_2002
coalition_label_at_enactment: CCP under Jiang Zemin + Li Peng / Zhu Rongji
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Rebuilt central fiscal capacity; recurrent revenue/GDP trend reversed upward.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Rule-based revenue allocation replacing ad hoc contracting.
references:

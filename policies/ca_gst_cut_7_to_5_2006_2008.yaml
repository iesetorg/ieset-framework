policy_id: ca_gst_cut_7_to_5_2006_2008
status: candidate
title: Canada — GST rate reduction from 7% to 5% (2006-2008)
countries:
- CAN
timeframe:
  start: 2006
  end: 2008
  enacted_date: '2006-07-01'
description: 'The Harper government reduced the federal Goods and Services Tax (GST) value-added rate from 7% to 6% effective 1 July 2006 (Budget 2006) and then from 6% to 5% effective 1 January 2008 (Budget
  2007). The change was a signature campaign commitment of the 2006 election. Parliamentary Budget Office and Department of Finance estimates put static revenue loss in the range of roughly C$12B per year
  at full implementation. Most tax economists criticised the move as lowering a relatively efficient consumption tax rather than cutting more distortionary income or payroll taxes; the government''s stated
  rationale was visible, broad-based tax relief that would reach all households including non-filers.

  '

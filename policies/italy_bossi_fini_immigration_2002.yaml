description: 'Legge 30 July 2002 n. 189 ("Bossi-Fini") tightened Italian immigration law: residence permits tied to employment contracts (permit expires with job loss); required fingerprinting of non-EU
  applicants; expanded expulsion procedures; shortened permitted durations; restricted family reunification. Also included a concurrent regularisation of 700,000+ undocumented domestic and care workers.


policy_id: my_einvoicing_mandate_2024
status: candidate
title: Mandatory e-Invoicing regime (Malaysia, from Aug 2024)
countries:
- MYS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-08-01'
description: 'LHDN (Inland Revenue Board) mandatory electronic-invoicing system phased from 1 August 2024. Phase 1 covered taxpayers with annual turnover above RM100m (~4,000 entities); Phase 2 from 1 Jan
  2025 extended to turnover above RM25m; Phase 3 from 1 Jul 2025 to all remaining businesses (subsequently deferred for smallest category). Invoices submitted through MyInvois portal or via API; real-time
  validation and unique identifier issued. Intended to close the informal-economy VAT-equivalent gap, support re-introduction of broader consumption taxation (GST debate), and modernise corporate-tax compliance
  infrastructure.

  '
enacted_by:
- malaysia_anwar_unity_2022_present
coalition_label_at_enactment: Pakatan Harapan + Barisan Nasional Unity Government
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Compliance tightening raises effective corporate tax collection without raising statutory rate.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Compliance burden disproportionately heavier for SMEs despite staged rollout — flagged as unintended entry-barrier side-effect.

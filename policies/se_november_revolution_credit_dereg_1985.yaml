description: 'Riksbank under Bengt Dennis abolished lending-ceiling regime for commercial banks on 21 November 1985, ending the central pillar of Swedish credit rationing. Set off the 1986-1990 credit-and-property
  boom that culminated in the 1990-1993 banking crisis.

  '

policy_id: malaysia_bumiputera_equity_target_nep
status: candidate
title: Malaysia Bumiputera Equity Target Nep
countries:
- MYS
timeframe:
  start: 1981
  end: 2003
description: 'Malaysia''s bumiputera-equity target, set under the New Economic Policy (1971-1990) and renewed under the National Development Policy and Vision 2020 frameworks, aimed for at least 30% of
  corporate equity to be held by ethnic-Malay (bumiputera) interests, enforced through Foreign Investment Committee guidelines, IPO equity quotas, government-linked investment vehicles (PNB, Khazanah, Tabung
  Haji), and licensing-linked equity carveouts. The intended effect was to restructure ethnic income inequality and broaden bumiputera participation in modern-sector ownership.

  '
enacted_by:
- malaysia_mahathir_bumiputera_development_1981_2003
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Equity quotas and discounted IPO allocations channelled implicit subsidies to bumiputera firms.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: FIC guidelines applied to FDI; trade openness rose after 1986 NEP modifications but quota system constrained openness.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Quota enforcement and capital-allocation requirements increased financial-regulation density.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bumiputera carveouts in licences (banking, services, construction) tightened sectoral entry rules.

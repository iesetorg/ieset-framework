title: Balcerowicz Plan — Poland shock therapy 1990
countries:
- POL
timeframe:
  start: 1990
  end: 1993
  enacted_date: '1990-01-01'
description: 'Architect: Finance Minister Leszek Balcerowicz under the Mazowiecki government (post-Solidarity). First post-communist shock-therapy programme. Simultaneous measures: (1) comprehensive price
  liberalisation (Jan 1990) — 90% of consumer prices freed in one step; (2) zloty devaluation + internal convertibility; (3) end of subsidies + soft-budget constraints for SOEs; (4) fiscal stabilisation
  via wage controls + tax reform; (5) commercial-code restoration permitting private enterprise; (6) trade liberalisation. Produced steep 1990 recession (-11.6% GDP) followed by earliest regional recovery.
  Growth accelerated from 1992, placing Poland among the top-performing EU transition economies by 2004 accession. Canonical comparator case for the hyperinflation + fiscal-dominance hypothesis (Poland
  had Cagan-threshold hyperinflation Jan 1990 that was rapidly resolved).

  '

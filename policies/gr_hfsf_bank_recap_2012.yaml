policy_id: gr_hfsf_bank_recap_2012
status: candidate
title: Hfsf Bank Recap 2012
countries:
- GRC
timeframe:
  start: 2011
  end: 2012
description: 'The Hellenic Financial Stability Fund (HFSF), established by Law 3864/2010 and capitalised under the second Memorandum, recapitalised the four systemic Greek banks (NBG, Alpha, Eurobank, Piraeus)
  in 2012–2013 via EUR 41 billion in EFSF-funded common-equity injections following PSI losses. The HFSF received voting shares with restricted private-shareholder rights, effectively nationalising the
  systemic banking sector.

  '

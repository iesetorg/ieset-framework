title: Pension Reform Act 2014
countries:
- NGA
timeframe:
  start: 2014
  end: ongoing
  enacted_date: '2014-07-01'
description: 'The Pension Reform Act 2014 signed 1 July 2014 superseded the 2004 Act, raising mandatory contribution to 18% of monthly emolument (10% employer, 8% employee), expanding coverage to all private-sector
  employers with three or more employees, strengthening PenCom enforcement, and criminalising misappropriation of pension assets. The Contributory Pension Scheme stock of assets under management crossed
  N5 trillion by end-2015 and N17 trillion by 2023, functioning as Nigeria''s deepest domestic institutional investor pool.

  '

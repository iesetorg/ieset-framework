  direction: +
  magnitude: moderate
  intended: true
  rationale: The regime facilitated foreign direct investment and export-oriented LNG development.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Project-specific fiscal, customs, and infrastructure treatment targeted the Rovuma gas sector.
- axis: institutional.property_rights

policy_id: mz_rovuma_lng_special_regime_2014
status: candidate
title: Mozambique Rovuma LNG special regime 2014
countries:
- MOZ
timeframe:
  start: 2014
  end: ongoing
description: 'Mozambique adopted a special legal and contractual regime for Rovuma Basin LNG projects, setting investment, tax, customs, foreign-exchange, land, and stabilisation terms for Area 1 and Area
  4 gas developments. The framework reduced project-specific uncertainty for large foreign investors while concentrating fiscal and regulatory treatment around a strategic extractive sector.

  '
enacted_by:
- mozambique_frelimo_gas_fiscal_reform_2014_present
scope: national
coalition_label_at_enactment: FRELIMO government

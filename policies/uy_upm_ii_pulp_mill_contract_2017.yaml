description: 'ROU-UPM investment contract signed 7 November 2017 committing Finland-based UPM to a ~US$3bn greenfield cellulose plant (UPM-2) at Paso de los Toros, in exchange for Uruguayan state commitments
  including ~US$1bn Ferrocarril Central railway rebuild, port terminal, and fiscal-zone regime (ZFPT). Plant commercial operation began April 2023. Largest single FDI in Uruguayan history; material sector-specific
  state co-investment commitment.

  '

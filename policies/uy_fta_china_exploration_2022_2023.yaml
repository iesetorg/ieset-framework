description: 'Lacalle Pou government and PRC MOFCOM concluded a joint feasibility study (July 2022) affirming mutual interest in a bilateral free-trade agreement, followed by exploratory talks 2022-23.
  A unilateral Uruguayan FTA with a third party is legally contested within the Mercosur common external tariff framework; Argentina and Brazil objected. Formal negotiations did not commence and the initiative
  did not advance to a signed agreement during the term, but it reset Uruguay''s external-opening posture and catalysed Mercosur CET-reduction debate.

  '

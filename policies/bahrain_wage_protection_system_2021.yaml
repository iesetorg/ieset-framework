policy_id: bahrain_wage_protection_system_2021
status: candidate
title: Bahrain Wage Protection System rollout
countries:
- BHR
timeframe:
  start: 2021
  end: ongoing
description: 'Bahrain rolled out a Wage Protection System requiring private employers to pay workers through monitored bank or approved channels so authorities can verify timely wage payment. The reform
  tightened payroll reporting and enforcement for employers, aiming to reduce delayed or unpaid wages among expatriate and domestic workers while strengthening labour-market compliance data.

  '
enacted_by:
- bahrain_hamad_salman_fiscal_diversification_2020_present
scope: national
coalition_label_at_enactment: Al Khalifa monarchy; Crown Prince Salman cabinet
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory payroll-channel reporting adds compliance obligations and constrains informal wage-payment arrangements.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Verifiable wage-payment records improve enforceability of employment contracts and wage claims.
references:
- 'Bahrain Labour Market Regulatory Authority, Wage Protection System materials: https://www.lmra.gov.bh/'
- 'Bahrain Ministry of Labour wage protection announcements: https://www.mlsd.gov.bh/'
notes: Added as a current labour-governance policy for otherwise sparse BHR coverage.

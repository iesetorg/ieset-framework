  enacted_date: '2019-11-10'
description: 'October 20, 2019 general election; after a 24-hour pause in quick-count transmission the trend swung toward Morales, who was declared first-round winner with the exact ~10-point margin needed
  to avoid a runoff. OAS electoral-observation audit cited irregularities in the TREP system. Weeks of protest, police mutiny (Nov 8-9), and a military "suggestion" that Morales resign culminated in his
  November 10 resignation and flight to Mexico. Vice President García Linera and Senate leadership also resigned, producing the constitutional vacancy claimed by Áñez. Subsequent academic studies (MIT,
  CEPR) disputed OAS fraud findings; the episode remains contested as fraud-vs-coup.

  '

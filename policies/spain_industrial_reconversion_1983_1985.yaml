policy_id: spain_industrial_reconversion_1983_1985
status: candidate
title: Spain Industrial Reconversion 1983 1985
countries:
- ESP
timeframe:
  start: 1977
  end: 1985
description: 'The González PSOE government''s Reconversión Industrial programme (Ley 27/1984) restructured Spain''s uncompetitive heavy-industry sectors — shipbuilding, steel, textiles, white goods — through
  plant closures, capacity cuts, and worker redundancy schemes (FPE Fondos de Promoción de Empleo). It readied the economy for impending EEC accession by shedding state-supported overcapacity.

  '

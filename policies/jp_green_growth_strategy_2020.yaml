policy_id: jp_green_growth_strategy_2020
status: candidate
title: Japan — Green Growth Strategy and Green Innovation Fund (2020)
countries:
- JPN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-12-25'
description: 'METI Green Growth Strategy, first published 25 December 2020 and revised June 2021, identifies 14 priority industries — including offshore wind, hydrogen and ammonia, next-gen nuclear, automotive
  and storage batteries, semiconductors and ICT, ships, logistics and infrastructure, food and agriculture, aviation, carbon recycling, housing and buildings, resource circulation, and lifestyle-related
  — and sets quantitative capacity and cost targets (e.g. 30-45 GW offshore wind by 2040). Paired with the ¥2tn Green Innovation Fund administered by NEDO, committing multi-year R&D and demonstration subsidies
  of up to 10 years per project. Precursor to the Kishida-era GX framework which scaled up the fiscal envelope via GX Transition Bonds.

  '
enacted_by:
- japan_suga_ldp_2020_2021
coalition_label_at_enactment: LDP-Komeito (Suga administration)

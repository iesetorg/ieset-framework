description: 'Introduced 2019 and substantially expanded from 2022, the Golden Visa grants 5- or 10-year renewable residency to investors, entrepreneurs, specialised talent, scientists, outstanding students
  and top professionals, decoupling residency from single-employer sponsorship. A parallel Green Visa (5 years, self-sponsored skilled workers) was added in 2022.

  '

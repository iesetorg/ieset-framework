policy_id: fr_cne_small_firm_contract_2005
status: candidate
title: Cne Small Firm Contract 2005
countries:
- FRA
timeframe:
  start: 2002
  end: 2007
description: 'France''s Contrat Nouvelles Embauches (CNE), introduced by Ordonnance 2005-893 of 2 August 2005 under the Villepin government, created a flexible employment contract for firms with fewer than
  21 employees, allowing termination without cause during a two-year ''consolidation'' period. The intended effect was to reduce hiring frictions for small firms, lower youth unemployment, and circumvent
  the standard CDI''s strict dismissal regime; the contract was effectively struck down by ILO and court rulings and abolished in 2008.

  '
enacted_by:
- france_chirac_ii_presidency_2002_2007

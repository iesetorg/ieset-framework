policy_id: spain_workers_statute_1980
status: candidate
title: Spain Workers Statute 1980
countries:
- ESP
timeframe:
  start: 1977
  end: 1985
description: 'Spain''s Estatuto de los Trabajadores (Law 8/1980 of 10 March 1980), enacted by the Suarez UCD government, codified individual and collective labour rights for the new democratic era — defining
  permanent and temporary contracts, statutory dismissal compensation (45 days per year of service), works councils, and the legal framework for sectoral collective bargaining (convenios colectivos) administered
  by the social partners. The intended effect was to translate the Pactos de la Moncloa social consensus into durable labour law, give organised labour formal recognition after Francoism, and balance the
  simultaneous market-opening of the transition.

  '

policy_id: bahrain_vat_rate_increase_2022
status: candidate
title: Bahrain VAT rate increase to 10 percent
countries:
- BHR
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-01-01'
description: 'Bahrain doubled the standard value-added tax rate from 5 percent to 10 percent from 1 January 2022 as part of a non-oil revenue and fiscal-balance package. The measure retained the GCC VAT
  architecture but increased the consumption-tax burden on most taxable goods and services, widening a revenue source that had only been introduced in Bahrain in 2019.

  '
enacted_by:
- bahrain_hamad_salman_fiscal_diversification_2020_present
scope: national
coalition_label_at_enactment: Al Khalifa monarchy; Crown Prince Salman cabinet
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: A broad VAT-rate increase shifts the tax mix toward consumption taxation, which is regressive relative to income-based taxation.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The stated fiscal-balance context was deficit reduction rather than financing a new spending programme.

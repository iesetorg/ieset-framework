policy_id: eg_military_owned_enterprise_ipo_plan_2022
status: candidate
title: Military Owned Enterprise Ipo Plan 2022
countries:
- EGY
timeframe:
  start: 2018
  end: 2024
description: 'In 2022, Egypt announced plans to list two military-affiliated firms — Wataniya Petroleum and Safi (bottled water) — on the EGX, framed as proof-of-concept divestments under the IMF EFF. The
  pilot was the first time entities tied to the National Service Projects Organization were prepared for partial private ownership; execution was repeatedly delayed and proceeds remained modest relative
  to the broader state-ownership policy.

  '
enacted_by:
- egypt_sisi_second_term_2018_2024
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Anticipated proceeds were earmarked for capital projects rather than deficit reduction.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Divestment receipts were partly slated for social-protection and labour-market spending.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Listed military firms retained tax/regulatory privileges, blunting the competition signal.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Disposals proceeded through executive-controlled channels with limited judicial scrutiny.

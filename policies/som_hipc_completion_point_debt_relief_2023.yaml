policy_id: som_hipc_completion_point_debt_relief_2023
status: candidate
title: Somalia HIPC Completion Point debt relief 2023
countries:
- SOM
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-12-13'
description: >
  Somalia reached the Heavily Indebted Poor Countries Completion Point in
  December 2023 after completing a multi-year reform track on public finance,
  debt management, statistics, and institutional rebuilding. The decision by
  the IMF and World Bank unlocked large-scale irrevocable debt relief, sharply
  reduced external debt burdens, and created fiscal space for the federal
  government's state-building and development programme.
enacted_by:
- somalia_hassan_sheikh_debt_security_statebuilding_2022_present
scope: national
coalition_label_at_enactment: Hassan Sheikh Mohamud federal government
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Debt relief reduced debt-service pressure and created room for priority public spending.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Completion required sustained public-finance, debt-management, and governance benchmarks.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: HIPC-linked reforms supported central-bank, financial-sector, and macroeconomic governance capacity.
references:
- IMF and World Bank announcement of Somalia reaching the HIPC Completion Point, 13 December 2023.
- Somalia Ministry of Finance debt-relief and reform communications, 2023.
linked_hypotheses_inferred:
- nordic_outcome_persistence_decomposition_v2
- bukele_fdi_gdp_investment_climate_2019_2024
- unfunded_fiscal_expansion_above_zlb_bond_market_response
- uk_truss_mini_budget_currency_sovereign_mechanism

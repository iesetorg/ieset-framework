policy_id: dk_eu_fiscal_compact_2012
status: candidate
title: Danish adoption of the EU Fiscal Compact (Finanspagten) 2012
countries:
- DNK
timeframe:
  start: 2012
  end: ongoing
  enacted_date: '2012-03-02'
description: 'Denmark signed the Treaty on Stability, Coordination and Governance in the Economic and Monetary Union (the ''Fiscal Compact'') on 2 March 2012 and ratified it via Folketing vote; as a non-euro
  member, Denmark opted in voluntarily to the treaty''s fiscal rules (structural balance, debt brake, automatic correction). Implementation was carried in domestic law by the Budgetlov (2012). Politically
  significant because it tied a Social-Democrat-led coalition to centre-right fiscal-rule architecture under external EU constraint in the wake of the 2010-12 Eurozone sovereign-debt crisis.

  '

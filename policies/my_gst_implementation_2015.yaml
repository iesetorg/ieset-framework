  direction: '-'
  magnitude: moderate
  rationale: Broad-based consumption tax replacing narrower sales/service taxes; regressive relative to SST.
  intended: true
- axis: fiscal.spending_level
  direction: '0'
  magnitude: weak
  rationale: Revenue-neutral intent; petroleum-revenue-dependence reduction was the main outcome.
  intended: true

policy_id: my_gst_implementation_2015
status: candidate
title: Malaysia Goods and Services Tax implementation 2015
countries:
- MYS
timeframe:
  start: 2015
  end: 2018
  enacted_date: '2015-04-01'
description: 'Goods and Services Tax Act 2014, implementing a 6% GST on 1 April 2015 under the Najib BN government, replacing the 10% Sales Tax and 6% Service Tax. Broadened the tax base from ~30,000 to
  ~472,000 registered businesses, reduced dependence on petroleum revenue, and raised RM 41bn in FY2015 (first nine months) and RM 41.2bn in FY2017. Politically costly amid 1MDB-scandal-related loss of
  confidence; Mahathir campaigned Pakatan Harapan 2018 election on GST abolition. GST reduced to 0% June 2018 and replaced by reintroduced SST September 2018 under PH government — the only national-VAT
  repeal among major economies in the 2010s.

  '
enacted_by:
- malaysia_najib_bn_2009_2018
coalition_label_at_enactment: Barisan Nasional (UMNO-led)
axes_moved:

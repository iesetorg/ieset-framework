status: candidate
title: Plan México — Sheinbaum industrial policy and nearshoring framework (2025)
countries:
- MEX
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-13'
description: 'Industrial-policy framework launched by the Sheinbaum government on 13 January 2025 to capture nearshoring investment, raise domestic content, and coordinate public and private investment
  across priority sectors such as autos, semiconductors, aerospace, electronics, pharmaceuticals, medical devices, textiles, chemicals, agroindustry, steel, renewables, tourism, and creative industries.
  The framework is paired with fiscal incentives for qualifying investment, including accelerated depreciation and training or innovation incentives, and includes a stated goal of raising domestic content
  in federal procurement by 2030.

  '

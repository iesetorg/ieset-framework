  enacted_date: '2025-01-13'
description: 'Industrial-policy framework launched 13 January 2025 targeting nearshoring-capture, domestic-content uplift, 13 priority sectors (autos, semiconductors, aerospace, electronics, pharma, medical
  devices, textiles, chemicals, agroindustry, steel, renewables, tourism, creative economy) and public-private coordination bodies at sector level. Contains fiscal incentives (accelerated depreciation,
  R&D credits, dual-apprenticeship support) and a stated goal of 50% domestic content in federal procurement by 2030.

  '

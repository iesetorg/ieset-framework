policy_id: ke_big_four_agenda_2017
status: candidate
title: Big Four Agenda (Dec 2017)
countries:
- KEN
timeframe:
  start: 2017
  end: 2022
  enacted_date: '2017-12-12'
description: 'Second-term development blueprint announced by President Kenyatta in the 12 Dec 2017 Jamhuri Day address, identifying four priority pillars: (1) food and nutrition security, (2) universal
  health coverage (UHC, piloted in 4 counties Dec 2018, rolled out 2020), (3) affordable housing (500k units target), and (4) manufacturing (target 15% of GDP by 2022). Operationalised through budget-priority
  re-tagging, UHC-linked NHIF expansion, and the Affordable Housing Programme framework that later became the basis of the Ruto-era housing levy.

  '

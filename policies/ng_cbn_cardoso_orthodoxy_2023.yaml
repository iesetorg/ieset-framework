policy_id: ng_cbn_cardoso_orthodoxy_2023
status: candidate
title: CBN orthodoxy restoration under Olayemi Cardoso
countries:
- NGA
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-09-22'
description: 'Olayemi Cardoso was appointed CBN Governor on 22 September 2023, replacing the Emefiele-era heterodox regime. Key actions: ended Ways-and-Means overdraft financing of the federal government
  (which had accumulated ~N22 trillion in breach of statutory limits), resumed full MPC meetings on a regular cadence, hiked the monetary policy rate aggressively from 18.75% to 27.5% across 2024 to combat
  inflation, reintroduced OMO auctions to mop up liquidity, and launched a ten-year bank recapitalisation programme in March 2024 raising minimum capital for international banks to N500bn.

  '

description: 'Constitutional amendment (Art. 109, 115 GG) capping federal structural deficit at 0.35% of GDP from 2016 and prohibiting new net borrowing by the Länder from 2020, with cyclical and emergency
  escape clauses. Enacted by the first Merkel Grand Coalition in response to post-GFC fiscal deterioration; became the binding fiscal-policy anchor through the Schwarze Null years (2014-2019) and the object
  of constitutional contest in the November 2023 BVerfG KTF ruling and the March 2025 Merz- era reform.

  '

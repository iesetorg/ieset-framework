policy_id: us_prwora_1996
status: candidate
title: Prwora 1996
countries:
- USA
timeframe:
  start: 1996
  end: 2001
description: 'The Personal Responsibility and Work Opportunity Reconciliation Act of 22 August 1996, signed by President Clinton, replaced the entitlement-based Aid to Families with Dependent Children with
  the block-granted Temporary Assistance for Needy Families (TANF), imposed a five-year lifetime benefit limit, required state work-participation rates, restricted legal-immigrant access to federal means-tested
  benefits, and changed the Food Stamp programme work rules. The intended effect was to "end welfare as we know it" (Clinton 1992 pledge), replace open-ended cash assistance with time-limited work-conditional
  support, and devolve administration to states.

  '
enacted_by:
- us_clinton_first_term_1993_1997
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Five-year time limit and stricter eligibility cut welfare-rolls by over half within five years.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Work-participation requirements pushed welfare recipients into the lower-skilled labour market.

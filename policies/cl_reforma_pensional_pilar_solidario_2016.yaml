policy_id: cl_reforma_pensional_pilar_solidario_2016
status: candidate
title: Reforma Pensional Pilar Solidario 2016
countries:
- CHL
timeframe:
  start: 2014
  end: 2018
description: 'Bachelet-II expansion of the solidary pension pillar (Pilar Solidario) created under the 2008 reform, raising the basic solidarity pension (PBS) and the pension solidarity contribution (APS)
  coverage and benefit levels. Funded by the 2014 tax reform and aimed at reducing old-age poverty among low-density contributors to the AFP individual-account system.

  '

policy_id: kz_mass_privatization_1993_1998
status: candidate
title: Kazakhstan mass privatisation 1993-1998
countries: [KAZ]
timeframe: {start: 1993, end: 1998}
description: >
  Kazakhstan implemented voucher and case-by-case privatisation during the
  1990s, transferring many state enterprises into private, insider, and foreign
  ownership. The programme reduced direct state production but coexisted with
  concentrated ownership, state influence over strategic sectors, and weak
  judicial constraints.
enacted_by:
  - kazakhstan_nazarbayev_resource_state_1991_2019
axes_moved:
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, intended: true, rationale: "Private ownership expanded, while executive discretion and weak courts limited predictability."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, intended: true, rationale: "Privatisation reduced direct state ownership across many enterprises."}
references:
  - "EBRD Transition Report, Kazakhstan privatisation"
  - "World Bank, Kazakhstan transition economy reports"

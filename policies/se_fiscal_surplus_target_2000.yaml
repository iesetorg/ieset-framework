policy_id: se_fiscal_surplus_target_2000
status: candidate
title: Structural fiscal surplus target 2% of GDP 2000
countries:
- SWE
timeframe:
  start: 2000
description: 'Adopted by Riksdag resolution a 2% of GDP structural general-government surplus target over the economic cycle, alongside a three-year expenditure ceiling (utgiftstak) reinstated from 1996.
  Subsequently reduced to 1% in 2007 and to 0.33% in 2017. The framework constitutes Sweden''s signature post-crisis fiscal rule distinguishing it from euro-area Maastricht-only frameworks.

  '

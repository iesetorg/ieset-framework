policy_id: nl_eu_constitution_referendum_2005
status: candidate
title: Eu Constitution Referendum 2005
countries:
- NLD
timeframe:
  start: 2002
  end: 2006
description: 'On 1 June 2005 the Netherlands held a non-binding referendum on the Treaty Establishing a Constitution for Europe; voters rejected it 61.5 percent to 38.5 percent on a turnout of 63 percent,
  three days after a similar French rejection. The result halted ratification across the EU, reshaped Dutch political discourse around immigration, sovereignty, and the euro, and contributed to the eventual
  reformulation of the Constitution into the Treaty of Lisbon.

  '
enacted_by:
- netherlands_balkenende_cda_2002_2006
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Rejected text would have entrenched single-market freedoms further; the "no" left domestic policymakers more flexibility on labour-market reform.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Campaign cemented restrictionist sentiment that fed Balkenende-era inburgering and migration-code tightening.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic backlash channelled energy into liberal product-market reforms within national rather than EU constitutional frame.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Anti-transfer-union sentiment expressed in the vote reinforced restraint on cross-border and domestic welfare expansion.

description: 'BCRA communications under Cavallo as Central Bank president (July- August 1982) guaranteed the exchange rate on private external debt through "seguro de cambio" — effectively socialising USD
  ~12-15bn of private-sector FX exposure via BCRA balance sheet. Described by critics as de-facto expropriation from public to politically- connected borrowers. Contributed to the hyperinflationary pressure
  of the following years.

  '

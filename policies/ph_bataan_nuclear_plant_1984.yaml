description: 'Westinghouse 620-MW nuclear plant commissioned 10 May 1984 at Napot Point, Morong, Bataan. Total cost ~USD2.3bn (financed largely by Export-Import Bank of the United States and commercial
  loans). Mothballed after Marcos''s ouster Feb 1986 without ever generating power — cited as flagship crony-overreach project (alleged USD80m commission to Herminio Disini). Annual debt-service through
  to full repayment in 2007.

  '

policy_id: hu_stop_soros_law_2018
status: candidate
title: Stop Soros Law 2018
countries:
- HUN
timeframe:
  start: 2010
  end: 2022
description: 'The 2018 "Stop Soros" package (Act VI of 2018 and constitutional amendments) criminalised assistance to irregular migrants, imposed a 25% special tax on organisations supporting migration,
  and constrained the operations of foreign- funded NGOs. The package combined immigration-enforcement provisions with fiscal levies and was paired with continued family-transfer expansion as part of the
  government''s "illiberal" governance programme.

  '

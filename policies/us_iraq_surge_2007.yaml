description: 'Bush 43 announced 10 Jan 2007 deployment of ~30,000 additional US troops to Iraq under Gen. David Petraeus, reorienting towards population-centric counter-insurgency plus Anbar Awakening Sunni-tribe
  partnership. Civilian deaths fell from peak 2006 to late-2008; US combat deaths peaked 2007 then declined. Funded via supplementals totalling ~USD 165bn (FY2007) + USD 170bn (FY2008). Set conditions for
  Dec 2008 Status of Forces Agreement + eventual Obama-era withdrawal.

  '

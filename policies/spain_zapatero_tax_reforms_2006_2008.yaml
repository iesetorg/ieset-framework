policy_id: spain_zapatero_tax_reforms_2006_2008
status: candidate
title: Spain Zapatero Tax Reforms 2006 2008
countries:
- ESP
timeframe:
  start: 2004
  end: 2008
description: 'Spain''s Zapatero-era tax reforms, principally Law 35/2006 (personal income tax) and Law 35/2006 (corporate tax reduction), reduced the headline corporate-tax rate from 35% to 30% (25% for
  SMEs) in two annual steps from 2007, simplified the personal income tax to a dual-income structure taxing capital income at a flat 18%, and abolished the wealth tax in 2008. The intended effect was to
  align Spanish business taxation with the European downward trend, raise investment attractiveness on the eve of the GFC, and consolidate the Zapatero coalition''s social-spending programme through stronger
  growth-funded revenues.

  '

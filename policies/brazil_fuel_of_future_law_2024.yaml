description: 'Law 14.993/2024, the Fuel of the Future law, expanded Brazil''s transport decarbonisation framework by setting programmes and mandates for sustainable aviation fuel, green diesel, biomethane,
  carbon capture and storage, and higher blending trajectories for biofuels. The package ties climate targets to domestic fuel supply chains, agribusiness feedstocks, and refining and distribution compliance
  obligations.

  '

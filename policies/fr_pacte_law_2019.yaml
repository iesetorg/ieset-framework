description: 'Loi n° 2019-486 du 22 mai 2019 relative à la croissance et la transformation des entreprises. Raised firm-size thresholds triggering regulatory obligations, streamlined employee-savings and
  profit-sharing schemes, reformed bankruptcy and share-issuance rules, authorised privatisations of Aéroports de Paris (ADP) and Française des Jeux (FDJ). FDJ privatisation executed November 2019; ADP
  privatisation halted after a cross-party shared-initiative referendum campaign.

  '

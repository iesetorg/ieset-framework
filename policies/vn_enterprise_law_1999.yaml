policy_id: vn_enterprise_law_1999
status: candidate
title: Vietnam Enterprise Law (1999)
countries:
- VNM
timeframe:
  start: 1999
  end: 2000
  enacted_date: '2000-01-01'
description: 'Enterprise Law 13/1999/QH10 passed 12 June 1999, effective 1 January 2000. First consolidated commercial-company code for private enterprises, replacing fragmented 1990-1994 legal framework.
  Simplified business registration from multi-month licensing process to days; abolished 145+ sub-licenses, reduced to a negative-list regulatory framework. Established limited- liability, joint-stock-company,
  partnership, and private- enterprise forms. Triggered ~160,000 new firm registrations 2000-2005 vs ~45,000 under prior framework 1990-1999. Later replaced by unified Enterprise Law 2005 (covering both
  private and SOE).

  '
enacted_by:
- vietnam_khai_manh_doi_moi_deepening_1997_2006
coalition_label_at_enactment: CPV
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Collapsed incorporation barrier; triggered 160,000+ new firm registrations 2000-2005.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Abolished 145+ sub-licenses; shifted to negative-list framework.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Established rules-based corporate-ownership forms including limited-liability structures.

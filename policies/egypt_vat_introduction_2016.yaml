  rationale: VAT broadened the consumption-tax base, narrowing room for indirect-tax exemptions used as transfers.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Higher revenues underwrote both deficit reduction and selected social-protection scale-up.
- axis: monetary.monetary_expansion_direction

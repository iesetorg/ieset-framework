policy_id: egypt_vat_introduction_2016
status: candidate
title: Egypt Vat Introduction 2016
countries:
- EGY
timeframe:
  start: 2016
  end: ongoing
description: 'Law 67 of 2016 introduced Egypt''s value-added tax at 13% (rising to 14% in 2017–18), replacing the older general sales tax with a fully creditable, broader-based VAT and registering thresholds
  for input-credit chains. The reform was a structural benchmark of the IMF EFF and broadened the revenue base by an estimated 1.5–2.0% of GDP within two years.

  '

description: 'The second Memorandum, signed in February 2012 by the Papademos technocratic government, mobilised an additional EUR 130 billion in EFSF financing combined with the PSI bond exchange and HFSF
  bank-recap programme. Conditionalities deepened first-programme reforms with mandated minimum-wage cuts, pension reductions, sectoral product-market liberalisation, and an extended privatisation timetable
  through 2015.


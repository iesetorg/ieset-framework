policy_id: spain_historical_memory_law_2007
status: candidate
title: Spain Historical Memory Law 2007
countries:
- ESP
timeframe:
  start: 2004
  end: 2008
description: 'Ley 52/2007 (Ley de Memoria Histórica), passed under the Zapatero government in December 2007, formally recognised victims of the Spanish Civil War and Franco dictatorship and provided compensation,
  legal acknowledgement, and removal of Francoist symbols from public spaces. The law also extended Spanish citizenship rights to descendants of Republican exiles.

  '

policy_id: mx_judicial_reform_2024
status: candidate
title: Mexican judicial reform — popular election of judges (2024)
countries:
- MEX
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-09-15'
description: 'Constitutional reform published in the Diario Oficial de la Federacion on 15 September 2024 making federal judges, including SCJN ministers, circuit magistrates, and district judges, subject
  to popular election; reducing the Supreme Court from 11 to 9 ministers; creating a Tribunal de Disciplina Judicial; replacing the prior Consejo de la Judicatura Federal; and shortening SCJN minister terms.
  The reform was approved in the final weeks of the AMLO administration and implemented as a signature continuity policy under Sheinbaum, including the extraordinary judicial election held on 1 June 2025.

  '
enacted_by:
- mexico_sheinbaum_morena_2024_present
- mexico_amlo_morena_2018_2024
coalition_label_at_enactment: Morena + PT + PVEM (constitutional supermajority)
axes_moved:
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: strong
  intended: true
  rationale: All federal judges subject to popular election; first election 1 June 2025.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Tenure disconnection from merit-based career judiciary; Tribunal de Disciplina politically composed.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Elected judiciary raises expected variance in investor-state and contract adjudication.
references:

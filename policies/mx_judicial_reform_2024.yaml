policy_id: mx_judicial_reform_2024
status: candidate
title: Mexican judicial reform — popular election of judges (2024)
countries:
- MEX
timeframe:
  start: 2024
  enacted_date: '2024-09-15'
description: 'Constitutional reform (DOF 15-sep-2024) making all federal judges — SCJN Ministers, circuit and district judges — subject to popular election; reducing the SCJN from 11 to 9 Ministers; creating
  a Tribunal de Disciplina Judicial; eliminating the Consejo de la Judicatura Federal in its prior form; and shortening SCJN Minister terms from 15 to 12 years. Approved in the final days of the outgoing
  LXV Legislatura before Sheinbaum''s inauguration, becoming the signature early policy of the incoming government.

  '
enacted_by:
- mexico_sheinbaum_morena_2024_present
- mexico_amlo_morena_2018_2024
coalition_label_at_enactment: Morena + PT + PVEM (constitutional supermajority)
axes_moved:
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: strong
  intended: true
  rationale: All federal judges subject to popular election; first election 1 June 2025.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Tenure disconnection from merit-based career judiciary; Tribunal de Disciplina politically composed.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Elected judiciary raises expected variance in investor-state and contract adjudication.

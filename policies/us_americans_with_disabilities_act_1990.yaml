- USA
timeframe:
  start: 1990
  enacted_date: '1990-07-26'
description: 'ADA (Pub. L. 101-336), signed 26 July 1990 by Bush on South Lawn before 3,000 attendees. Prohibited discrimination against persons with disabilities in employment (Title I, 15+ employees),
  state and local government services (Title II), public accommodations (Title III), and telecommunications (Title IV). Required reasonable accommodation and accessibility retrofits. Enforced by EEOC and
  DOJ. Modelled on Civil Rights Act 1964 structure.

  '

description: 'Ley 1473 de 2011 (5 Jul 2011) established national-level structural-fiscal rule for central government: structural-deficit declining path from 2.3% (2014) to 1.0% GDP (2022), with escape clauses
  for cyclical + extraordinary events. Paralleled Ley 819/2003 fiscal-transparency + 2011 constitutional amendment creating Sustainability-of-Public-Finances principle. Rule suspended COVID 2020-2022 then
  replaced by Ley 2155/2021 net-debt- anchored framework.


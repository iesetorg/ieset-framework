policy_id: uk_transport_act_1947
status: candidate
title: Transport Act 1947
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The Transport Act 1947, enacted by the Attlee government and operative from 1 January 1948, nationalised the "Big Four" railway companies, the London Passenger Transport Board, much of inland
  waterways, and most long-distance road haulage, vesting them in the British Transport Commission with subsidiary executives (Railway Executive, Road Haulage Executive). The intended effect was to integrate
  Britain''s surface transport into a single planned network, eliminate inter-modal duplication and ruinous competition observed in the inter-war period, and tilt capital allocation toward post-war reconstruction
  priorities under public ownership.

  '

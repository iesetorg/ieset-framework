title: Sierra Leone Gender Equality and Women's Empowerment Act 2022
countries:
- SLE
timeframe:
  start: 2022
  end: ongoing
description: 'Sierra Leone enacted the Gender Equality and Women''s Empowerment Act to formalize gender-equality rights in public and private institutions. The law created minimum representation requirements,
  employment and pay protections, maternity-related protections, and duties for institutions to promote women''s participation in decision-making and economic life.

  '

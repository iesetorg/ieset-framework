# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: cd_monetary_fiscal_instability_1970s_1990s
status: candidate
title: "Fiscal dominance and monetary instability"
countries: [COD]
timeframe: {start: 1975, end: 1997}
description: >
  As copper revenues weakened and patronage demands persisted, Zaire repeatedly
  relied on arrears, money creation, currency changes, and ad hoc stabilisation
  attempts. The pattern culminated in severe inflation and monetary disorder in
  the late Mobutu years, reflecting the subordination of monetary management to
  fiscal and political survival.
enacted_by:
  - zaire_mobutu_mpr_1965_1997
coalition_label_at_enactment: "MPR"
axes_moved:
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Monetary policy was subordinated to executive fiscal needs and regime financing.", intended: false}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Deficit finance and money creation contributed to very high inflation and currency breakdown.", intended: false}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Arrears, arbitrary currency measures, and fiscal breakdown weakened predictable economic governance.", intended: false}
references:
  - "IMF, Zaire/Democratic Republic of the Congo historical macroeconomic reports"
  - "World Bank, Zaire country economic memoranda"

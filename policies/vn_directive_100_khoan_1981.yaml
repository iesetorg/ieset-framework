title: Directive 100-CT/TW product-contract system (Vietnam 1981)
countries:
- VNM
timeframe:
  start: 1981
  end: 1988
  enacted_date: '1981-01-13'
description: 'CPV Secretariat Directive 100-CT/TW of 13 Jan 1981 introduced the ''khoan san pham'' product-contract system in agriculture, contracting output quotas to individual peasant households from
  cooperative land, with over-quota output retained. Partial restoration of household decision-making within nominal collective framework. Agricultural output recovered 1981-1984 but stagnated again 1985-1986;
  superseded by Resolution 10 of Apr 1988 under Doi Moi returning effective land-use rights to households.

  '

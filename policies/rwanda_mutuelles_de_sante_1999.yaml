title: Rwanda Mutuelles De Sante 1999
countries:
- RWA
timeframe:
  start: 1994
  end: ongoing
description: 'Mutuelles de Santé are Rwanda''s community-based health insurance scheme, piloted from 1999 and made effectively mandatory through district-level enrolment campaigns from 2006. Premiums are
  set by income band (Ubudehe categorisation) with subsidies for the poorest, and the scheme is administered by the Rwanda Social Security Board to fund primary-care access at health centres.

  '

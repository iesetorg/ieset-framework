policy_id: cz_consolidation_rollback_2025
status: candidate
title: Czech rollback of the 2024 consolidation package (2025)
countries:
- CZE
timeframe:
  start: 2025
  end: ongoing
description: >
  ANO-led rollback of parts of the Fiala government's consolidation package,
  including looser fiscal targets, reversal or softening of spending restraints,
  and restoration of selected household and pension measures. The policy moves
  the Czech fiscal stance away from the 2024 consolidation baseline and is coded
  on policy content rather than party label: higher deficits and spending share
  relative to the prior path.
enacted_by:
- czech_republic_babis_ano_second_2025_present
coalition_label_at_enactment: ANO 2011, SPD, and Motorists for Themselves coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Reversing consolidation measures raises the spending and deficit path relative to the Fiala baseline.
linked_hypotheses:
- unfunded_fiscal_expansion_above_zlb_bond_market_response
- fiscal_rule_departure_credibility_loss_effect
- market_order_government_spending_gdp_pc_growth_panel
references:
- Czech government programme statement and 2025 coalition fiscal pledges
- Czech Ministry of Finance budget and consolidation-package materials, 2024-2025
notes: Created to materialise a declared policy on czech_republic_babis_ano_second_2025_present.

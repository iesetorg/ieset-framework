description: 'National transformation programme announced April 2016 setting targets to reduce oil-revenue dependence, expand non-oil private-sector share, increase female labour-force participation, and
  fund giga-projects (NEOM, Qiddiya, Red Sea, Diriyah) through PIF. Authorised the sovereign-wealth vehicle to scale toward a $2tn target via Aramco stake transfers and domestic/foreign co-investments.
  Followed by the National Transformation Programme 2020 implementation blueprint.

  '

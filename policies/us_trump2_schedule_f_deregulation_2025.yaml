description: 'An executive order in early 2025 reinstated and expanded a Schedule F-style classification for federal civil servants in policy-influencing roles, stripping civil-service protections and enabling
  at-will removal. Paired with broad deregulatory directives and revocation of prior Biden-era executive orders, it targeted faster rule rescissions, agency restructuring, and a reduction in regulatory
  output across labour, environmental, and financial domains.

  '

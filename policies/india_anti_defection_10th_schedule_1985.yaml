policy_id: india_anti_defection_10th_schedule_1985
status: candidate
title: 52nd Constitutional Amendment — Anti-defection Law Tenth Schedule (India 1985)
countries:
- IND
timeframe:
  start: 1985
  end: 1985
  enacted_date: '1985-02-15'
description: '52nd Constitutional Amendment enacted 15 Feb 1985 added the Tenth Schedule disqualifying legislators who voluntarily leave their party or vote against party direction. Presiding officer decides
  disqualification. Exceptions: 2/3 split (later raised to merger only in 2003). Aimed to curb ''Aaya Ram Gaya Ram'' defection-driven government instability; criticised for strengthening party leadership
  over individual MPs.

  '
enacted_by:
- india_rajiv_gandhi_congress_1984_1989
coalition_label_at_enactment: Indian National Congress (Indira)
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced horse-trading-driven government collapses; provided stable parliamentary arithmetic.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Presiding officer as sole arbiter of disqualification limited judicial review (later narrowed by Kihoto Hollohan 1992).

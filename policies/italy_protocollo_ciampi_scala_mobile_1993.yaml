description: 'Tripartite accord 3 July 1993 between government, Confindustria, and unions (CGIL-CISL-UIL) definitively abolished scala mobile wage indexation. Established two-level bargaining (national
  sectoral + firm/territorial) and formalised concertazione tripartite dialogue on incomes policy. Cornerstone of Italian wage-setting for the Maastricht convergence period.

  '

policy_id: korea_export_subsidy_regime_1965_1979
status: candidate
title: Korea Export Subsidy Regime 1965 1979
countries:
- KOR
timeframe:
  start: 1961
  end: 1979
description: 'South Korea''s export subsidy regime under Park Chung-hee combined preferential export credits at below-market rates, tariff exemptions on imported inputs, accelerated depreciation, sectoral
  tax reductions, and target-based allocation of foreign exchange and quota access. Co-ordinated through monthly export-promotion meetings chaired by the President, the regime tied firm-level rewards to
  performance against export targets and underpinned Korea''s outward-oriented growth strategy.

  '

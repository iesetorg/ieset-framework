policy_id: italy_carta_del_lavoro_1927
status: candidate
title: Italy Carta del Lavoro 1927
countries: [ITA]
timeframe:
  start: 1927
  end: 1927
  enacted_date: "1927-04-21"
description: >
  The Carta del Lavoro, promulgated by the Grand Council of Fascism in
  April 1927, laid out the constitutional principles of the fascist
  corporative labour order. It treated labour as a social duty, recognised
  private enterprise while subordinating it to state goals, banned free
  class conflict, and embedded labour relations in state-controlled
  syndicates and corporative institutions rather than autonomous unions
  bargaining with employers. The charter was programmatic as well as
  legal, but it clearly codified a labour regime far less free and less
  pluralist than pre-fascist industrial relations.
enacted_by:
  - italy_fascist_corporatist_state_1922_1943
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "Independent strikes and bargaining were displaced by compulsory corporative channels under state supervision."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Worker representation ceased to be autonomous and was folded into regime-controlled legal structures."
references:
  - "Carta del Lavoro, 21 aprile 1927"
  - "Treccani, Carta del lavoro"

policy_id: jp_dpj_farmer_income_compensation_2010
status: candidate
title: Dpj Farmer Income Compensation 2010
countries:
- JPN
timeframe:
  start: 2009
  end: 2010
description: 'The DPJ''s Individual Household Income Compensation Programme for farmers, launched in fiscal 2010, paid direct income transfers to producers of rice, wheat and other staples to cover the
  gap between standard production cost and average market price. It replaced parts of the prior price-support and acreage-set-aside regime with a direct-payment system, fulfilling a 2009 manifesto pledge
  to support household incomes in agriculture.

  '

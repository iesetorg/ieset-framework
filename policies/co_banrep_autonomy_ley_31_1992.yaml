description: 'Ley 31 of 29 December 1992 implemented Article 371 of the 1991 Constitution, establishing the Banco de la República as an autonomous state body with constitutional mandate for monetary control
  and price-stability primacy. Seven-member Junta Directiva including Finance Minister (chairing) and Governor; 4-year staggered terms with one renewal; prohibition on direct Treasury financing (with exceptions
  for unanimity). First constitutionalised CB independence in Colombian history.

  '

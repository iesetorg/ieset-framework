# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ru_cbr_high_rate_regime_2024
status: candidate
title: Bank of Russia high-key-rate disinflation regime 2024-2026
countries:
- RUS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-10-25'
description: The Bank of Russia lifted the key rate to 21.00 percent on 25 October 2024 and then maintained a tight monetary stance through 2025 and into 2026 as war spending, labour shortages, and administered-price
  increases kept inflation above target. By 19 June 2026 the Board had cut the key rate to 14.25 percent, but its statement still described monetary conditions as tight and fiscal policy as more accommodative
  than previously expected. The regime is coded as a monetary policy package because the central bank repeatedly used high nominal rates to offset proinflationary fiscal and supply-side pressure under Putin's
  fifth term.
enacted_by:
- russia_putin_fifth_term_2024_present
coalition_label_at_enactment: Bank of Russia under Elvira Nabiullina during Putin fifth term
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Raising the key rate to 21 percent and holding a tight stance reduced monetary accommodation relative to the war-spending fiscal impulse.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The Bank of Russia publicly tied policy to inflation targeting despite political pressure for cheaper credit to support war-linked production.
references:
- 'Bank of Russia, key-rate decision raising the rate to 21.00 percent, 25 October 2024: https://www.cbr.ru/eng/press/pr/?file=25102024_133000Key_eng.htm'
- 'Bank of Russia, key-rate decision cutting the rate to 14.25 percent while maintaining tight conditions, 19 June 2026: https://www.cbr.ru/eng/press/keypr/'

policy_id: th_abhisit_thai_khem_khaeng_stimulus_2009
status: candidate
title: Thailand Strong Thailand (Thai Khem Khaeng) GFC stimulus 2009-2012
countries:
- THA
timeframe:
  start: 2009
  end: 2012
  enacted_date: '2009-01-28'
description: 'Two-phase fiscal stimulus under Abhisit Democrat coalition. Phase 1 (Thai Khem Khaeng 1, January 2009) was a ~THB 117bn supplementary-budget demand-stimulus including a THB 2,000 per-capita
  cheque ("cheque help the nation") issued to low-income earners, free-basic-education extension, price controls on utilities, and elderly-universal THB 500/month allowance. Phase 2 (Thai Khem Khaeng 2012,
  announced 2009) pipelined ~THB 1.4tn multi-year infrastructure spending on transport, water, education facilities, and hospital upgrades. Combined with BoT rate cuts from 3.75% to 1.25% (December 2008
  - April 2009), delivered GDP growth rebound from -2.3% (2009) to +7.8% (2010) though much of the rebound reflected base effects.

  '

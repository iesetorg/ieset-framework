description: 'Italy joined EMS from operational launch 13 March 1979 under Andreotti IV government, but negotiated the wider ±6% fluctuation band (standard band was ±2.25%) to accommodate expected peseta-like
  realignments. Six realignments through 1987 confirmed the wider band''s function. Italy moved to narrow ±2.25% band from 8 January 1990 preparing for Maastricht.

  '

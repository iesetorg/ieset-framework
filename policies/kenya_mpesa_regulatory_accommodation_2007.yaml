policy_id: kenya_mpesa_regulatory_accommodation_2007
status: candidate
title: Kenya Mpesa Regulatory Accommodation 2007
countries:
- KEN
timeframe:
  start: 2002
  end: 2013
description: 'In 2007 the Central Bank of Kenya granted Safaricom a "letter of no objection" allowing M-Pesa to launch as a non-bank mobile-money service operated through agent networks and trust-account
  holdings, ahead of formal e-money regulations. The accommodative supervisory stance, later codified by the National Payment System Act (2011) and 2014 e-money regulations, enabled rapid account growth
  and is widely studied as a regulatory-sandbox precedent for financial inclusion.

  '
enacted_by:
- kenya_kibaki_vision_2030_2002_2013
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Permissive licensing opened mobile-payments competition outside the bank-only oligopoly.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Mobile-money rails enabled state cash-transfer programmes (Inua Jamii, COVID grants) at scale.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower transfer-delivery costs supported expansion of social-protection budget envelopes.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: CBK's leadership of the supervisory stance reinforced its institutional autonomy as regulator.

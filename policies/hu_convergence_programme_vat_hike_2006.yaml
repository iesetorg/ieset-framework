policy_id: hu_convergence_programme_vat_hike_2006
status: candidate
title: Convergence Programme Vat Hike 2006
countries:
- HUN
timeframe:
  start: 2004
  end: 2010
description: 'Hungary''s 2006 Convergence Programme, adopted by the Gyurcsány second government in September 2006 in response to a fiscal deficit of about 9% of GDP, raised the standard VAT rate from 15%
  to 20%, reintroduced gas and pharmaceutical co-payments, raised personal income tax brackets, and froze public-sector wages. Submitted to the European Commission as the binding adjustment path for euro
  convergence, the intended effect was to restore market access and lower inflation expectations after the ''Őszöd speech'' political crisis.

  '
enacted_by:
- hungary_gyurcsany_bajnai_mszp_2004_2010

description: 'Emergency five-party cross-aisle fiscal agreement (VVD-CDA-D66-GL-CU) reached 26 April 2012 after Rutte I''s collapse on Catshuisberaad negotiations. ~€14bn package to ensure Dutch deficit
  <3% GDP target: VAT standard rate rise 19%→21% (Oct 2012), AOW-age rise, mortgage-interest deduction restriction for new loans (annuity repayment requirement), healthcare own-risk (eigen risico) rise,
  public-sector pay freeze. Also agreed a zorgakkoord on healthcare reform. Named ''Kunduz'' for the party grouping that had earlier agreed Dutch participation in the Kunduz police mission.

  '

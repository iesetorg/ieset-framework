policy_id: pl_retail_turnover_tax_2016
status: candidate
title: Retail Turnover Tax 2016
countries:
- POL
timeframe:
  start: 2015
  end: 2017
description: 'Progressive retail turnover tax enacted in mid-2016 by the Szydło PiS government, levying tiered rates on monthly retail revenues above defined thresholds and explicitly targeting large grocery
  chains. The European Commission opened state-aid proceedings and the European Court of Justice later upheld the tax in 2021; implementation was suspended for several years during the dispute before final
  activation under subsequent governments.

  '
enacted_by:
- poland_szydlo_pis_2015_2017
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue intended to fund Family 500+ and other PiS transfer programmes once the EU dispute resolved.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Eventually generated additional general-fund revenue supporting elevated post-2020 spending paths.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Tiered turnover thresholds explicitly targeted large foreign retail chains, raising effective progressivity.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sector-specific tiered tax functioned as discriminatory regulation favouring small domestic retailers.

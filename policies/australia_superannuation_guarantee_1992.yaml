policy_id: australia_superannuation_guarantee_1992
status: candidate
title: Superannuation Guarantee (Administration) Act — Australia 1992
countries:
- AUS
timeframe:
  start: 1992
  enacted_date: '1992-07-01'
description: 'Under Keating Labor government. Mandated employer contribution to employee superannuation funds, initially at 3% of wages (phased to 9% by 2002, 10.5% 2022, 12% scheduled 2025). Individual
  accounts held by member-choice super funds (public + private + industry-fund competition). Created the third largest pension-fund pool in the OECD by 2020 (~AUD 3.3 trillion assets). Canonical forced-saving
  individual-account case alongside Singapore CPF and Chilean AFP. Coalition-content case: Labor government implementing forced- saving welfare architecture — per refinement D.3.1 and the welfare- architecture
  first-class framing in D.1.5.

  '

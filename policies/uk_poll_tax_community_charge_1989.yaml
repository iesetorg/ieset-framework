policy_id: uk_poll_tax_community_charge_1989
status: candidate
title: Poll Tax Community Charge 1989
countries:
- GBR
timeframe:
  start: 1979
  end: 1990
description: 'The Local Government Finance Act 1988 introduced the Community Charge ("poll tax") in Scotland from 1989 and in England and Wales from April 1990, replacing domestic rates with a flat per-adult
  local charge. Mass non-payment, the March 1990 London riots, and acute political backlash precipitated Margaret Thatcher''s resignation in November 1990 and the policy''s full replacement by the Council
  Tax in 1993.

  '
enacted_by:
- thatcherism

policy_id: saudi_labour_market_reforms_2019_2021
status: candidate
title: Saudi Labour Market Reforms 2019 2021
countries:
- SAU
timeframe:
  start: 2016
  end: ongoing
description: 'Saudi Arabia''s Labour Reform Initiative (LRI), announced in 2020 by the Ministry of Human Resources and effective 2021, partly liberalised the kafala sponsorship system by allowing migrant
  workers to change employers and exit the country without sponsor consent. Combined with Nitaqat Saudisation quota recalibration, the package was a Vision 2030 pillar to formalise migrant labour and raise
  national workforce participation.

  '

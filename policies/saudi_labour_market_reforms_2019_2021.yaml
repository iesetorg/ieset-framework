  rationale: New employment-support and HRDF subsidies for Saudi nationals offset reduction in kafala rents.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter Nitaqat quotas and reduced sponsor capture lower implicit transfer to sponsoring nationals.
- axis: regulatory.product_market_competition
  direction: +

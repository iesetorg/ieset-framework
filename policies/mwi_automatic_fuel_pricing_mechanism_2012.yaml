policy_id: mwi_automatic_fuel_pricing_mechanism_2012
status: candidate
title: Malawi automatic fuel pricing mechanism
countries:
- MWI
timeframe:
  start: 2012
  end: ongoing
description: 'Malawi adopted an automatic fuel pricing mechanism to pass movements in import costs, exchange rates, and levies through to domestic pump prices rather than holding retail fuel prices administratively
  below cost. The mechanism was designed to limit implicit subsidies, protect fuel-supply reliability, and reduce arrears, though its practical application has been intermittent during later inflation and
  exchange-rate stress.

  '
enacted_by:
- malawi_cost_reflective_macro_stabilisation_2012_present
scope: national
coalition_label_at_enactment: Democratic Progressive Party and successor governments
axes_moved:
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Automatic pass-through reduces the bindingness of administered fuel-price suppression when applied.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cost-reflective pricing lowers implicit petroleum subsidies and arrears.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: Reducing under-recovery is intended to improve fuel import financing and station availability.
references:
- Malawi Energy Regulatory Authority, automatic fuel pricing mechanism materials.
- IMF, Malawi 2025 Article IV Consultation staff report, fuel-price-mechanism discussion, 2025.
notes: 'The ongoing status refers to the formal mechanism. Application has been interrupted at times, so this should not be read as continuous full pass-through.

  '

policy_id: sri_lanka_gcec_epz_act_1978
status: candidate
title: Lanka Gcec Epz Act 1978
countries:
- LKA
timeframe:
  start: 1977
  end: 1994
description: 'Greater Colombo Economic Commission (GCEC) Act No. 4 of 1978 established Sri Lanka''s first export processing zones at Katunayake and surrounding areas, granting tax holidays, duty-free imports
  of inputs, and streamlined approvals for export-oriented foreign investors. The Act was a centerpiece of the Jayewardene UNP government''s open-economy turn, intended to attract garment and light-manufacturing
  FDI and shift the economy from import substitution toward export-led growth.

  '
enacted_by:
- sri_lanka_open_economy_1977
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Duty-free input imports and export-oriented zones partially opened the trade regime.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Foreign manufacturers admitted under EPZ rules increased competition for local producers.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Open-economy package deprioritised universal subsidies in favor of investment incentives.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax holidays and duty exemptions amounted to targeted subsidies for EPZ tenants.

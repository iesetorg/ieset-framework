policy_id: china_wto_accession_2001
status: candidate
title: China WTO Accession 2001
countries:
- CHN
timeframe:
  start: 2001
  end: 2016
  enacted_date: '2001-12-11'
description: 'Completion of 15-year multilateral-negotiation process. China agreed to extensive tariff reductions (average industrial tariff ~15% pre-accession to ~9% by 2008), market-access liberalisation
  (telecommunications, banking, insurance), trading-rights reform, and binding commitments on transparency + national treatment. In return, WTO members committed to most-favoured-nation treatment. Facilitated
  the ''China Shock'' to US and European manufacturing employment (Autor-Dorn-Hanson 2013) but accelerated global supply- chain integration and Chinese GDP growth to >10% annualised through 2008. Seminal
  trade-policy event of the 21st century.

  '

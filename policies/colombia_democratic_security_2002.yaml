status: candidate
title: Colombia Democratic Security 2002
countries:
- COL
timeframe:
  start: 2002
  end: 2010
description: 'Política de Seguridad Democrática launched by President Álvaro Uribe in 2002, combining expanded military and police presence, professionalisation of the armed forces, the introduction of
  a one-time wealth tax to fund security, and a network of civilian informants and rural soldiers. Aimed at reasserting state territorial control against FARC, ELN, and paramilitary groups; underwrote a
  sharp reduction in homicide and kidnapping rates over the decade.

  '

- poland_morawiecki_pis_2017_2023
coalition_label_at_enactment: PiS-led United Right
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: moderate
  intended: true
  rationale: Tax-free threshold quadrupled; first-bracket cap raised; first-bracket rate cut 17%→12%. Net shift of burden toward upper-middle incomes.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Net revenue-reducing in 2022-23 (~0.5-0.8% of GDP) requiring higher borrowing absent offsetting measures.

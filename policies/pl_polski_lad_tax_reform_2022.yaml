policy_id: pl_polski_lad_tax_reform_2022
status: candidate
title: Polski Ład (New Order) PIT and health-contribution reform (Poland, 2022)
countries:
- POL
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-01-01'
description: 'Comprehensive personal-income-tax and health-insurance-contribution restructure launched 1 January 2022 under the Morawiecki PiS government. Headline measures: (i) personal-income-tax-free
  threshold raised from 8,000 zł to 30,000 zł; (ii) first-bracket threshold raised from 85,528 zł to 120,000 zł; (iii) removal of the flat deductibility of the 7.75% health-insurance contribution from PIT
  liability, with restructured contribution bases (particularly for sole-traders under ryczałt and liniowy regimes); (iv) Polski Ład 2.0 mid-year correction enacted June/July 2022 cutting the first-bracket
  rate from 17% to 12% and reversing part of the health-contribution treatment. Described by proponents as the largest single tax overhaul in two decades; implementation was chaotic — payroll systems required
  emergency patches in January 2022 and self-employed tax liabilities required retroactive recalculation after the mid-year correction.

  '

policy_id: stp_renewable_energy_action_plan_2022
status: candidate
title: Sao Tome and Principe renewable energy action plan 2022
countries:
- STP
timeframe:
  start: 2022
  end: 2030
description: 'Sao Tome and Principe adopted a national renewable-energy action plan for the 2020s to reduce dependence on imported diesel generation, expand renewable power, and improve energy access and
  reliability. The plan identifies renewable targets, grid and off-grid measures, institutional responsibilities, and investment needs for a small-island energy transition.

  '

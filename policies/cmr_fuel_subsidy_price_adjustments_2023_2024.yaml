policy_id: cmr_fuel_subsidy_price_adjustments_2023_2024
status: candidate
title: Cameroon fuel-subsidy price adjustments 2023-2024
countries:
- CMR
timeframe:
  start: 2023
  end: 2024
description: 'Cameroon raised administered retail prices for gasoline and diesel in 2023 and again in 2024 as part of a gradual reduction of fuel-subsidy costs. The measures were paired with limited wage
  and transport offsets but shifted more of refined-fuel costs from the budget to consumers, supporting the IMF-backed fiscal consolidation path.

  '
enacted_by:
- cameroon_biya_decentralisation_fiscal_continuity_2018_present
scope: national
coalition_label_at_enactment: Biya government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Higher pump prices reduce the implicit budget subsidy to refined-fuel consumption.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Lower fuel-subsidy outlays reduce pressure on public spending and deficits.
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Raising administered prices narrows the gap between controlled retail prices and market costs.
references:
- Government of Cameroon announcements on 2023 and 2024 pump-price adjustments.
- IMF, Cameroon 2026 Article IV Consultation, discussion of fuel-subsidy reform and fiscal consolidation.
notes: 'The policy is coded as a subsidy-reduction package; retail fuel prices remained administratively managed.

  '

policy_id: se_temporary_aliens_act_2016
status: candidate
title: Temporary Aliens Act — tightened asylum and residence rules (Sweden 2016)
countries:
- SWE
timeframe:
  start: 2016
  end: 2021
  enacted_date: '2016-07-20'
description: 'Lag (2016:752) om tillfälliga begränsningar av möjligheten att få uppehållstillstånd i Sverige, in force 20 July 2016 in response to the 2015 asylum peak of ~163,000 claims. Switched permanent
  residence permits to three-year temporary permits for subsidiary-protection and Convention-refugee status, tightened family reunification, and aligned Sweden with EU-minimum asylum standards — the sharpest
  single-year restriction of Swedish migration policy in the post-war era. Made permanent via Utlänningslag amendments in 2021.

  '

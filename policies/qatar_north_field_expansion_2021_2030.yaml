policy_id: qatar_north_field_expansion_2021_2030
status: candidate
title: Qatar North Field LNG expansion
countries:
- QAT
timeframe:
  start: 2021
  end: ongoing
description: 'QatarEnergy committed to the North Field expansion programme to raise LNG production capacity from the long-standing 77 million tonnes per year base toward much higher output before 2030.
  The programme includes North Field East, North Field South, and subsequent expansion announcements, using state-owned QatarEnergy and selected international partners to extend liquefaction, upstream gas,
  and LNG-carrier capacity.

  '
enacted_by:
- qatar_tamim_labour_lng_diversification_2020_present
scope: national
coalition_label_at_enactment: Al Thani monarchy; QatarEnergy state champion
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: The project is a state-owned, sector-targeted capital allocation through QatarEnergy and partner equity structures.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: strong
  intended: true
  rationale: Expanded LNG capacity materially increases long-term gas supply available to Qatar's customers and reinforces domestic hydrocarbon revenue security.
- axis: regulatory.environmental_stringency
  direction: mixed
  magnitude: weak
  intended: false
  rationale: LNG can substitute for coal in importing systems but also locks in additional fossil-fuel production capacity.

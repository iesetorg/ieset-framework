policy_id: it_alitalia_cai_restructuring_2009
status: candidate
title: Italy Alitalia CAI restructuring (2009)
countries:
- ITA
timeframe:
  start: 2008
  end: 2015
  enacted_date: '2009-01-12'
description: 'Restructuring of Alitalia — then insolvent — following Berlusconi''s rejection of the Air France-KLM acquisition bid (2008). A special extraordinary-administration regime (Legge Marzano modifications)
  permitted transfer of profitable assets to a newly-formed ''Compagnia Aerea Italiana'' (CAI) consortium of Italian investors with minority Air France stake. Bad-asset perimeter (debt, pension obligations)
  absorbed by the state via a special fund. Public cost estimated ~€4bn over 2009-2015 including direct support and Cassa Integrazione. Subsequent Etihad partnership 2014, second insolvency 2017, 2021 relaunch
  as ITA Airways.

  '
enacted_by:
- italy_berlusconi_iv_pdl_2008_2011
coalition_label_at_enactment: PdL-Lega Nord
axes_moved:

  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Forced Italian-ownership consortium blocked foreign acquisition; retained national-champion structure.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: ~€4bn direct state support; Cassa Integrazione for redundant staff.
references:

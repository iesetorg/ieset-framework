description: 'Omnibus Ley de Urgente Consideración (Ley 19.889) enacted 9 July 2020, 476 articles covering public security, education governance (ANEP restructuring), state-enterprise rules, housing eviction,
  financial inclusion, fuel pricing, and collective-bargaining. 27 March 2022 partial referendum sought repeal of 135 articles; the repeal was rejected 50.0% No vs 48.9% Yes, preserving the law. Central
  structural-reform instrument of the Lacalle Pou coalition.

  '
enacted_by:
- uruguay_lacalle_pou_pn_2020_2025
coalition_label_at_enactment: Coalición Multicolor (PN+PC+CA+PI+PG)
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Loosened eviction and some collective-bargaining and picketing rules.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Opened fuel-pricing band away from strict ANCAP-parity; eased some SOE-monopoly rules at margin.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Expanded police procedural authorities; reaffirmed by 2022 referendum.

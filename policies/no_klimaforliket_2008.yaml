title: Klimaforliket — cross-party climate settlement
countries:
- NOR
timeframe:
  start: 2008
  end: ongoing
  enacted_date: '2008-01-17'
description: 'Cross-party Storting settlement (klimaforlik) between the red-green coalition (AP, SV, Sp) and opposition parties H, V, KrF establishing binding 2020 emissions targets, raised CO2 taxation
  on offshore petroleum, increased climate R&D spending, expanded rainforest aid commitment, and broad support for full-scale carbon-capture development at Mongstad (later substantially scaled back in 2013).
  Renewed and tightened in the 2012 second klimaforlik. Frames Norwegian climate policy as cross-party commitment device.

  '

policy_id: ecuador_debt_audit_default_2008
status: candidate
title: Ecuador Debt Audit Default 2008
countries:
- ECU
timeframe:
  start: 2007
  end: 2017
description: 'Correa''s Comisión para la Auditoría Integral del Crédito Público (CAIC) reviewed sovereign debt contracted since 1976 and declared the 2012 and 2030 Global Bonds "illegitimate." In December
  2008 Ecuador voluntarily defaulted on the 2012 issue and later repurchased the bonds at roughly 35 cents on the dollar through a 2009 Dutch-auction tender. The episode preserved fiscal space for social
  spending but locked Ecuador out of bond markets for nearly six years.

  '
enacted_by:
- ecuador_correa_21st_century_socialism_2007_2017

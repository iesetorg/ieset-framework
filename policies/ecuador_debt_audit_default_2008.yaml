  rationale: Reduced debt-service obligations after the buyback freed primary spending headroom.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Loss of bond-market access shifted financing reliance toward state-firm dividend extraction.
- axis: fiscal.transfer_expansion

policy_id: uk_maastricht_opt_outs_1993
status: candidate
title: Maastricht Opt Outs 1993
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'Negotiated by John Major''s government during the 1991 Treaty of Maastricht negotiations, the UK secured Protocol opt-outs from Stage 3 of Economic and Monetary Union (the single currency)
  and from the Social Chapter on workplace and labour-market regulation. The European Communities (Amendment) Act 1993 ratified the Treaty in domestic law while preserving UK monetary sovereignty and lighter
  domestic labour standards relative to the EU mainstream.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Euro opt-out preserved sterling and Bank of England's autonomous policy mandate.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Social Chapter opt-out preserved lighter UK labour-market regime advantageous to firm formation.
- axis: fiscal.tax_progressivity
  direction: '0'

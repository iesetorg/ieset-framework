title: Uruguay 2008 pension flexibility reform — Ley 18.395
countries:
- URY
timeframe:
  start: 2008
  enacted_date: '2008-10-24'
description: 'Ley 18.395 (24 Oct 2008) relaxed contribution-year requirements for retirement from 35 to 30 years, created flexible-retirement + partial- retirement options, recognised caregiving years for
  women (one year per child up to five). Expanded pension coverage by ~60,000 beneficiaries in the years following. Preserved BPS contributory + AFAP individual- accounts architecture from 1995 Sanguinetti
  reform.

  '

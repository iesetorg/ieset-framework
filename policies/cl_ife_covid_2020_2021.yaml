policy_id: cl_ife_covid_2020_2021
status: candidate
title: Ingreso Familiar de Emergencia (IFE) — Covid-19 cash transfer (Chile 2020-2021)
countries:
- CHL
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-05-17'
description: 'Piñera II-era Covid-19 emergency cash-transfer programme, launched May 2020 (Ley 21.230) and successively expanded in IFE Ampliado (2020), IFE Covid (2021), and IFE Universal (June-November
  2021) with progressively broader eligibility and higher per-capita amounts. At peak (July-August 2021) coverage extended to ~80% of Chilean households with per-household transfers up to CLP 100 000+ per
  capita. Cumulative fiscal cost exceeded USD 22 bn and drove the 2020-2021 Chilean fiscal-deficit spike. Programme wound down November 2021; the Pensión Garantizada Universal (PGU) introduced in 2022 absorbed
  some of the political demand for the transfer architecture. Together with the 10% AFP withdrawals, a historic near-universal transfer episode in a country previously running a narrow means-tested architecture.

  '
enacted_by:
- chile_pinera_ii_2018_2022
coalition_label_at_enactment: Chile Vamos (RN-UDI-Evópoli-PRI) under opposition + Chile Vamos cross-pressure
axes_moved:

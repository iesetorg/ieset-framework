title: Doko Rincho Second Provisional Commission on Administrative Reform (Japan 1981)
countries:
- JPN
timeframe:
  start: 1981
  end: 1983
  enacted_date: '1981-03-16'
description: 'Established by the Suzuki cabinet on 16 Mar 1981 under Toshio Doko (ex-Keidanren) as chair, the Second Provisional Commission on Administrative Reform (''Rincho'') issued five reports 1981-1983
  recommending ''zero-ceiling'' budget requests, privatisation of NTT, JT and JNR, subsidy rationalisation, and central-local relations reform. Its recommendations provided the blueprint for Nakasone-era
  privatisations 1985-1987.

  '

description: 'Balikatan annual joint US-Philippines military exercises expanded after 1999 VFA ratification. Operation Enduring Freedom - Philippines (OEF-P) launched January 2002 deploying ~600 US special
  forces to Basilan-Sulu for counter-terror training against Abu Sayyaf Group. VFA-framework deployment continued through Arroyo term, expanded under 2014 Enhanced Defense Cooperation Agreement (EDCA, succeeding
  movement). Smith v. Philippines (US Marine Lance Cpl Daniel Smith rape case) 2005-2006 tested custody provisions. Supreme Court Nicolas v. Romulo (2009) upheld VFA''s constitutionality. Related: 2003
  Mutual Logistics Support Agreement.

  '

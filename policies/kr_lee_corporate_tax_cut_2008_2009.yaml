status: candidate
title: Lee Corporate Tax Cut 2008 2009
countries:
- KOR
timeframe:
  start: 2008
  end: 2013
description: 'The Lee Myung-bak government legislated phased cuts to South Korea''s headline corporate income tax rate in 2008-09, lowering the top marginal rate from 25% toward 22% (with smaller-firm rates
  brought down to 11%) as part of the "Business-Friendly Government" agenda. Combined with personal income-tax reductions and investment incentives, the package was framed as countercyclical stimulus and
  a structural shift toward a lower-tax regime.

  '

policy_id: th_abhisit_elderly_universal_allowance_2009
status: candidate
title: Abhisit Elderly Universal Allowance 2009
countries:
- THA
timeframe:
  start: 2008
  end: 2011
description: 'In 2009 the Abhisit Democrat government replaced Thailand''s targeted means-tested old-age welfare programme with a universal monthly allowance of 500 baht for citizens aged 60 and over. Administered
  through the Department of Local Administration and disbursed via local government, the scheme formed part of the GFC-era social-protection package and laid the institutional base for later age-tiered
  increases under successor governments.

  '

policy_id: sweden_pension_auto_balance_mechanism
status: candidate
title: Sweden Pension Auto Balance Mechanism
countries:
- SWE
timeframe:
  start: 1999
  end: ongoing
description: 'The Swedish pension auto-balance mechanism (bromsen, ''the brake'') was added to the NDC system to ensure long-run solvency by triggering automatic indexation cuts whenever the ratio of system
  assets to liabilities falls below 1. Activated in years following the 2008 crisis, it adjusts the pension annuity divisor and balance-sheet indexation to restore actuarial balance without legislative
  intervention, making Sweden''s pension system self-stabilising.

  '
enacted_by:
- sweden_persson_sap_1996_2006
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Auto-balance reduces benefit indexation when the system runs an actuarial deficit.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Mechanism preserves the funded contribution base by avoiding ad-hoc rate hikes.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing political risk from pension adjustments stabilises labour-market expectations.

status: candidate
title: Netherlands housing market deregulation programme 2024
countries:
- NLD
timeframe:
  start: 2024
description: 'Schoof coalition housing programme: partial rollback of the mid-market rent cap (Wet Betaalbare Huur July 2024) for newbuild; relaxation of environmental-permitting hurdles for residential
  construction; stated 100,000-homes-per-year target; extension of Nationale Bouw- en Woonagenda but with less sectoral regulation and more municipal deregulation. VVD- led ministry (Mona Keijzer, Volkshuisvesting).

  '

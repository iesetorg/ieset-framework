policy_id: pk_18th_constitutional_amendment_2010
status: candidate
title: Pakistan 18th Constitutional Amendment 2010
countries:
- PAK
timeframe:
  start: 2010
  enacted_date: '2010-04-19'
description: 'Constitution (Eighteenth Amendment) Act 2010, passed by National Assembly 8 April 2010 and Senate 15 April 2010, assented 19 April 2010. Most consequential post-Musharraf civilian-transition
  reform. Key provisions: (1) abolition of the Concurrent Legislative List — 47 subjects devolved from federation to provinces including health, education, environment, local government, social welfare;
  (2) repeal of Article 58(2)(b) — presidential power to dissolve the National Assembly abolished; (3) renaming of North-West Frontier Province to Khyber Pakhtunkhwa; (4) appointment of superior-court judges
  through Judicial Commission and parliamentary committee rather than presidential discretion; (5) strengthened parliamentary role in caretaker-government appointment; (6) Fair Trial Rights under Article
  10A. Restored 1973 constitution''s parliamentary character after distortions by Zia''s 8th Amendment and Musharraf''s 17th Amendment / LFO.

  '

description: '~$369bn in tax credits for domestic clean-energy manufacturing, EV batteries, solar, wind, hydrogen, and carbon capture. Re-established Medicare drug-price negotiation. Expanded ACA subsidies.
  Imposed 15% corporate alternative minimum tax and 1% stock-buyback excise tax. Functions as de facto US industrial policy for green manufacturing, coupled with sourcing requirements favouring US + FTA-partner
  content. Refinements D.3.1 coded this as mixed: tax-credit mechanism is market- respecting, while sourcing and buyback provisions are interventionist.

  '

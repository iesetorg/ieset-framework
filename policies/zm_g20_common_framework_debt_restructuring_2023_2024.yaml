description: 'Zambia reached debt-treatment agreements under the G20 Common Framework, beginning with official bilateral creditors in 2023 and followed by commercial bond restructuring in 2024. The restructuring
  altered maturities, debt-service profiles, and fiscal programme constraints after default, making external creditor coordination a central part of the Hichilema government''s economic policy regime.

  '

  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reform retains forced individual saving as the dominant pillar; non-contributory expansion is bounded by capped PBU envelope.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: New 6% employer contribution raises the labour-side wedge on capital-income flows generated within firms.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform introduces tendering of contributors to lower-fee AFP managers, expanding price competition among administrators.

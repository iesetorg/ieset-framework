policy_id: chile_pension_reform_proposed_2024
status: candidate
title: Chile Pension Reform Proposed 2024
countries:
- CHL
timeframe:
  start: 1981
  end: ongoing
description: 'The Boric government''s pension reform package, advanced through 2022-2024 and partly enacted in early 2025, layered a new 6% employer contribution onto the AFP individual-account system,
  with the increment split between personal accounts and a solidarity-mutualisation fund. The package retained the 1981 individual-account architecture while adding intra-generational redistribution through
  Pensión Básica Universal top-ups financed from general revenue. It represents a partial retrenchment of the 1981 Pinochet/José Piñera privatised model.

  '
enacted_by: []

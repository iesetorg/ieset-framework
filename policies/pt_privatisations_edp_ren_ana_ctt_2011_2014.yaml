policy_id: pt_privatisations_edp_ren_ana_ctt_2011_2014
status: candidate
title: 'Portugal Troika-era privatisations: EDP, REN, ANA, CTT, TAP initiation'
countries:
- PRT
timeframe:
  start: 2011
  end: 2014
  enacted_date: '2011-12-21'
description: 'Troika Memorandum privatisation chapter executed under Passos Coelho government. EDP Energias de Portugal — 21.35% state stake sold to China Three Gorges for €2.7bn (December 2011, completed
  May 2012). REN Redes Energéticas — 40% to State Grid of China and Oman Oil for €592m (February 2012). ANA Aeroportos de Portugal — 100% concession sold to Vinci for €3.08bn (December 2012, completed September
  2013). CTT Correios de Portugal — IPO phase 1 (70%) and phase 2 (31.5%) executed 2013-2014 raising ~€909m. TAP privatisation launched with 61% sale to Atlantic Gateway (Neeleman/Barraqueiro) in 2015 but
  partially reversed by Costa government in 2017. Collective proceeds materially exceeded programme target.

  '
enacted_by:
- portugal_passos_coelho_psd_cds_2011_2015
coalition_label_at_enactment: PSD-CDS-PP coalition (centre-right)
axes_moved:

policy_id: israel_wage_price_freeze_1985
status: candidate
title: Israel Wage Price Freeze 1985
countries:
- ISR
timeframe:
  start: 1985
  end: 1991
description: 'The temporary wage and price freeze imposed by tripartite agreement on 1 July 1985 between the Histadrut, employers'' association, and government broke inflation inertia by suspending automatic
  cost-of-living indexation (the linkage agreements) and freezing prices on a controlled basket of consumer goods. The freeze was phased out over 1986–87 once inflation had stabilised, leaving permanent
  disinflation gains under the broader Stabilization Plan.

  '

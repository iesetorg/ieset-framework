policy_id: hu_family_tax_allowance_expansion_2011_2023
status: candidate
title: Family Tax Allowance Expansion 2011 2023
countries:
- HUN
timeframe:
  start: 2022
  end: ongoing
description: 'Hungary''s family-tax-allowance system, established under 1995. évi CXVII. törvény and progressively expanded since 2011 by Orbán-era amendments, provides per-child tax credits scaled by number
  of dependents (HUF 10,000-33,000 monthly per child by 2023) and full personal-income-tax exemption for mothers under 30 and mothers of four or more children. Combined with CSOK housing subsidies and student-loan
  forgiveness, the intended effect is pro-natalist tax policy: encouraging fertility and embedding family policy in the tax code.

  '
enacted_by:
- hungary_orban_fourth_term_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion-period reforms held corporate rates flat or cut them; family allowance is a personal-income-tax instrument.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Per-child tax credit interacts with flat personal income tax to reduce average effective progressivity.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax credit functions as a refundable/quasi-refundable transfer, expanding family-cash flows.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Combined family policy raised primary spending toward 4-5% of GDP at peak.

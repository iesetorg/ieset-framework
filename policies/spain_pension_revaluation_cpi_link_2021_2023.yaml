policy_id: spain_pension_revaluation_cpi_link_2021_2023
status: candidate
title: Spain Pension Revaluation Cpi Link 2021 2023
countries:
- ESP
timeframe:
  start: 2018
  end: ongoing
description: 'Spain''s restoration of automatic CPI-indexed pension revaluation, enacted by Royal Decree-Law 2/2023 and consolidated in Law 21/2021 under the Sanchez government, replaced the 2013 Rajoy
  formula (which had decoupled pensions from inflation, allowing only 0.25% rises) with annual uprating equal to the previous year''s average CPI, plus the introduction of an Intergenerational Equity Mechanism
  (MEI) financed by an additional 0.6% wage levy. The intended effect was to reverse a decade of real-pension erosion, restore the contributory bargain, and stabilise the pension system through revenue-side
  measures rather than benefit cuts.

  '
enacted_by:
- spain_sanchez_2018_present
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: mixed
  magnitude: weak
  intended: true
  rationale: MEI levy on wages mildly raises labour costs while indexed pensions stabilise consumption smoothing.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Full CPI uprating expanded the real value of pension transfers compared with the prior 0.25% formula.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion Sanchez reforms raised top capital-gains tax brackets to part-finance the system.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: CPI-linked pension bill expanded as a share of GDP in the 2021-2023 inflation regime.

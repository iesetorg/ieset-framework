policy_id: uk_working_age_welfare_reform_2010_2016
status: candidate
title: Working Age Welfare Reform 2010 2016
countries:
- GBR
timeframe:
  start: 2010
  end: 2016
description: 'The UK''s working-age welfare reform of 2010-2016, anchored in the Welfare Reform Act 2012 and the Welfare Reform and Work Act 2016, introduced Universal Credit (consolidating six legacy benefits),
  the under-occupancy penalty ("bedroom tax"), the benefit cap (initially GBP 26,000 per family), the freeze on most working-age benefits, and successive cuts to tax credits and disability benefits. The
  intended effect was to "make work pay" through reduced taper rates, contain a benefit bill that had peaked at over GBP 200 billion, and contribute to the Cameron-Osborne fiscal consolidation programme.

  '

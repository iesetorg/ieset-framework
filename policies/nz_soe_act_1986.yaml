policy_id: nz_soe_act_1986
status: candidate
title: Soe Act 1986
countries:
- NZL
timeframe:
  start: 1984
  end: 1993
description: 'New Zealand''s State-Owned Enterprises Act 1986 corporatised major government trading departments — Electricity Corporation (ECNZ), Coal Corporation, Forestry Corporation, Telecom, Post Office
  Bank, NZ Post — into Crown-owned companies operating on commercial principles, with appointed boards and Companies Act-style accountability. The Act preceded subsequent privatisations (Telecom 1990, Post
  Bank 1989). The intended effect was to subject SOEs to capital-market discipline, ring-fence cross-subsidies, and prepare the ground for asset sales under Rogernomics.

  '
enacted_by:
- nz_rogernomics_1984_1993
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Commercialisation removed state monopolies that had shielded sectors from import competition.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Corporate-governance reform and subsequent break-ups intensified product-market competition.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced fiscal pressure from SOE losses supported the RBNZ's anti-inflation regime.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: SOE corporatisation cut surplus public-sector employment, complementing the ECA 1991 reforms.

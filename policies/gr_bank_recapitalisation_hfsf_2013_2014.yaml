policy_id: gr_bank_recapitalisation_hfsf_2013_2014
status: candidate
title: Greece systemic-bank recapitalisation via HFSF 2013-2014
countries:
- GRC
timeframe:
  start: 2013
  end: 2014
  enacted_date: '2013-05-28'
description: 'Recapitalisation of the four systemic Greek banks (National Bank of Greece, Piraeus Bank, Eurobank, Alpha Bank) through the Hellenic Financial Stability Fund (HFSF), capitalised under the
  Second Memorandum with €50bn earmarked of which c.€25bn was utilised 2013-2014. Capital injected in exchange for common shares and contingent-convertible instruments (CoCos) with restricted voting rights
  and incentive structures for private re-capitalisation. Sector consolidated from fifteen pre-crisis deposit-taking institutions to four pillars through HFSF-led absorptions (Emporiki, Geniki, Agricultural,
  Proton, TT Hellenic Postbank, Cypriot subsidiaries post-March 2013 Cyprus bail-in, Millennium, etc.). Spring 2014 saw partial re-privatisation rounds with private-investor follow-on capital raises at
  Piraeus, Alpha, Eurobank. SSM transition preparation 2014 included comprehensive assessment (AQR + stress test). Non-performing loan (NPL) ratio remained elevated at c.34% at end-2014; NPL workout framework
  and secondary-market law deferred to the Third Memorandum period.

  '
enacted_by:
- greece_samaras_nd_pasok_2012_2015
coalition_label_at_enactment: ND + PASOK
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  intended: true
  rationale: Systemic-bank consolidation into four pillars under HFSF state ownership; prudential perimeter tightened ahead of SSM transition.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: €25bn public-capital injection into banking sector; implicit subsidy via CoCo structure and guarantee framework.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pre-2013 equity heavily diluted; subordinated-debt burden-sharing applied ahead of full BRRD framework.
references:

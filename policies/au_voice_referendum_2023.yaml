description: 'Constitutional Alteration (Aboriginal and Torres Strait Islander Voice) 2023 proposed inserting a new Chapter IX to recognise Aboriginal and Torres Strait Islander peoples and establish a
  constitutionally entrenched advisory body — the Voice — making representations to Parliament and the Executive. Referendum held 14 October 2023; defeated nationally 60.06% No / 39.94% Yes, and failed
  in every state (the "double majority" required under section 128). The first constitutional referendum defeat since 1999 and the Albanese government''s principal institutional setback.


policy_id: cpv_imf_ecf_fiscal_consolidation_2022
status: candidate
title: Cabo Verde IMF ECF fiscal consolidation 2022
countries:
- CPV
timeframe:
  start: 2022
  end: ongoing
description: 'Cabo Verde entered an IMF Extended Credit Facility arrangement in 2022 after the pandemic shock sharply increased debt and damaged tourism revenues. The programme supports fiscal consolidation,
  domestic revenue mobilisation, public-enterprise risk management, debt reduction, and public-financial-management reforms while protecting priority social and investment spending.

  '
enacted_by:
- cabo_verde_mpd_blue_digital_resilience_2016_present
scope: national
coalition_label_at_enactment: MpD government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The ECF anchors a lower deficit and debt path through revenue and expenditure measures.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue mobilisation raises effective tax effort and compliance pressure.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-enterprise, debt-management, and budget-control reforms make fiscal administration more rule-bound.
references:

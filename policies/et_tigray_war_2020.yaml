policy_id: et_tigray_war_2020
status: candidate
title: Tigray war and Pretoria cessation of hostilities
countries:
- ETH
- ERI
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-11-04'
description: 'Federal military operation against TPLF-controlled Tigray regional forces begun Nov 4 2020 following the Northern Command attack. Eritrean Defence Forces and Amhara Special Forces fought alongside
  federal forces. Estimated 162,000-600,000 excess deaths (Ghent University 2023 estimate ~600k including famine); ~2.5m displaced; widespread sexual violence and famine as documented by UN OHCHR/EHRC joint
  investigation. Pretoria Agreement for Lasting Peace signed Nov 2 2022 under AU mediation; Nairobi implementation declaration Nov 12 2022. Reconstruction and transitional justice ongoing.

  '

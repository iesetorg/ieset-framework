policy_id: switzerland_kvg_mandatory_health_1994
status: candidate
title: Krankenversicherungsgesetz (KVG) — Swiss mandatory private health insurance 1994
countries:
- CHE
timeframe:
  start: 1994
  end: 1996
  enacted_date: '1994-03-18'
description: 'Federal statute effective 1996 replacing cantonal-variable voluntary insurance with mandatory universal health insurance. Core design: (1) every resident must purchase basic health insurance
  from one of ~50 licensed private non-profit insurers; (2) insurers must accept all applicants and charge community rates by canton; (3) insurers compete on supplementary products and customer service;
  (4) income- linked subsidies for lower-income households. Swiss healthcare system now spends ~11% of GDP (lower than US ~17-18%) with universal coverage, patient choice, and short wait times. Canonical
  counter-case to US healthcare refinement D.2.10 — Swiss mixed insurance outperforms both US and typical OECD single-payer systems.

  '

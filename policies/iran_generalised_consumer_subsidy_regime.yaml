policy_id: iran_generalised_consumer_subsidy_regime
status: candidate
title: Iran Generalised Consumer Subsidy Regime
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'From the early post-revolution years through the late 2000s, the Islamic Republic operated a vast price- subsidy system covering petrol, diesel, natural gas, electricity, bread, cooking oil
  and other staples, with implicit fiscal cost peaking at roughly a quarter of GDP and per-capita energy consumption among the highest in the region. Subsidies were administered through state-set retail
  prices, foreign-exchange preferences and direct allocations to state energy companies, generating large smuggling rents at the border and persistent under-investment in domestic refining and electricity
  capacity.

  '
enacted_by:
- iran_revolution_islamic_economy_1979_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Administered consumer prices suppressed market signals and entry incentives across affected sectors.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Implicit consumer subsidies functioned as the country's largest social-transfer programme.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Domestic-foreign price gaps drove cross-border smuggling and policy-driven export controls.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Periodic price freezes on private producers eroded contract reliability and investment incentives.

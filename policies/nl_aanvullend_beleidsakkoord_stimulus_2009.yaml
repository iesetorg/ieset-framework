description: 'Supplementary Coalition Agreement of 25 March 2009 announcing ~€6bn in counter-cyclical measures — front-loaded infrastructure (road, rail, dike maintenance), accelerated tax write-offs on
  investment, labour-market deeltijd-WW (short-time-work scheme), sustainable-energy and education spending, and a scrappage bonus for older vehicles. Cost added to already rising automatic-stabiliser-driven
  deficit; headline deficit reached 5.1% GDP in 2009. Combined with pre-existing public-investment plans.

  '

policy_id: taiwan_itri_semiconductor_1973
status: candidate
title: Taiwan Industrial Technology Research Institute (ITRI) + semiconductor seed 1973-1987
countries:
- TWN
timeframe:
  start: 1973
  end: 1987
  enacted_date: '1973-07-05'
description: 'Founding of Industrial Technology Research Institute (工業技術研究院) as government-funded R&D consortium. 1976 RCA technology-transfer agreement brought 7µm CMOS to Taiwan. Spin-offs included United
  Microelectronics (UMC, 1980) and Taiwan Semiconductor Manufacturing Company (TSMC, 1987) — the foundry model that came to dominate advanced-node production. Combined state R&D seeding + technology transfer
  + Hsinchu Science Park (1980) spatial-industrial policy. Canonical non-Korean developmentalist reference — established state-organised R&D + infrastructure as the intervention wedge, with subsequent scale-up
  left to private ownership and market competition (TSMC is a publicly-listed private firm). Framework uses as contrast to Korea HCI (more market-respecting, less state-credit-directed).

  '

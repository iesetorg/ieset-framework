status: candidate
title: Pertamina debt crisis and bailout (Indonesia 1976)
countries:
- IDN
timeframe:
  start: 1975
  end: 1977
description: 'Pertamina (state oil company under Ibnu Sutowo) defaulted on short- term external borrowings Feb 1975 — total exposure USD10.5bn (~30% of 1975 Indonesian GDP), ~USD1.5bn short-term Euromarket
  loans and large off-balance-sheet commitments on tankers and fertiliser plants. Bank Indonesia and MOF assumed liabilities; Sutowo removed Mar 1976; Berkeley-Mafia technocrat control of resource rents
  restored. Precipitated technocratic dominance through the oil-boom 1976-1982.

  '

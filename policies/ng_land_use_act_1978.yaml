policy_id: ng_land_use_act_1978
status: candidate
title: Nigeria Land Use Act 1978
countries:
- NGA
timeframe:
  start: 1978
  enacted_date: '1978-03-29'
description: 'Land Use Act No. 6 of 1978 vested all land in Nigeria in state governors (urban) and Local Government Areas (rural), granting statutory rights of occupancy rather than freehold. Eliminated
  freehold tenure throughout most of the country; replaced customary chief-administered tenure in the south. Foundational to Nigerian land-market functioning — made secured-credit-against-land difficult
  and land assembly for investment highly political.

  '
enacted_by:
- nigeria_obasanjo_military_first_1976_1979
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  rationale: Eliminated freehold; all land held in government trust under statutory rights of occupancy.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  rationale: Governors' consent required for land transactions raised transaction costs.

description: 'The Maastricht Treaty, signed 7 February 1992 and entering force 1 November 1993, established the European Union and laid the path to economic and monetary union. It set convergence criteria
  — government deficit below 3% of GDP, debt below 60%, low inflation, exchange-rate stability — and required signatory central banks to be made independent of government instruction. Article 104(b) prohibited
  bailouts and Article 104 prohibited monetary financing. The intended effect was to lock in macroeconomic discipline as a precondition for the single currency.

  '

title: Peru Congressional Dissolution (September 2019)
countries:
- PER
timeframe:
  start: 2019
  end: 2019
  enacted_date: '2019-09-30'
description: 'On 30 September 2019 President Martín Vizcarra invoked Article 134 of the 1993 Constitution to dissolve the Fuerza-Popular-dominated Congress, citing a de-facto denial of a cuestión de confianza
  tied to reform of the Constitutional Tribunal appointment process. Congress simultaneously attempted to suspend Vizcarra and swore in Vice-President Mercedes Aráoz as interim president — a standoff that
  collapsed within 24 hours as security forces recognised Vizcarra, Aráoz resigned, and the Constitutional Tribunal (Expediente 0006-2019-CC, January 2020) upheld the dissolution as constitutional. Snap
  elections were held 26 January 2020 producing a fragmented nine-party Congress. Contested constitutional-institutional act: coded as mixed on rule-of-law (lawful use of a contested mechanism to break
  gridlock vs. aggressive executive assertion) and positive on judicial independence (enabled Constitutional Tribunal appointment reform).

  '

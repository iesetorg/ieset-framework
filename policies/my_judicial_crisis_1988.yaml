policy_id: my_judicial_crisis_1988
status: candidate
title: 1988 Malaysian judicial crisis
countries:
- MYS
timeframe:
  start: 1988
  end: 1988
  enacted_date: '1988-08-08'
description: 'Lord President Tun Mohamed Salleh Abas dismissed 8 Aug 1988 by a tribunal appointed under Article 125 of the Federal Constitution after being suspended 26 May 1988. Five Supreme Court judges
  suspended 6 Jul 1988, two eventually dismissed, for attempting to hear Salleh''s application. Followed Mahathir''s June 1988 article in UMNO News criticising judiciary over UMNO-related rulings. Constitutional
  amendment Mar 1988 had already limited the ''judicial power'' clause. Structural break in Malaysian judicial independence.

  '
enacted_by:
- malaysia_mahathir_first_term_1981_1988
coalition_label_at_enactment: Barisan Nasional (Mahathir)

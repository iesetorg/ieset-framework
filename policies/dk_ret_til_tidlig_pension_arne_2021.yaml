policy_id: dk_ret_til_tidlig_pension_arne_2021
status: candidate
title: Ret til tidlig pension ('Arne-pension') — Danish early-retirement reinstatement 2021
countries:
- DNK
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-12-21'
description: 'Legislation reinstating a statutory right to early retirement with state pension for workers with 42 or more years in the labour market (tiered to 3, 2, or 1 year of early retirement depending
  on seniority), a Social-Democratic flagship branded around ''Arne'', the archetypal worn-out long-tenure manual worker. Partially reverses the tightening trajectory of the 2011 Welfare Agreement and 2012
  efterløn reform, financed by a samfundsbidrag on the financial sector and other revenue measures.

  '
enacted_by:
- denmark_frederiksen_sap_broad_2019_present
coalition_label_at_enactment: Socialdemokratiet minority with SF, Enhedslisten, Dansk Folkeparti support
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: New statutory early-retirement transfer route for long-tenure workers.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Marginal reduction in effective labour supply among older long-tenure cohorts.
references:
- Aftale om ret til tidlig pension (10. oktober 2020)
- Lov om ret til tidlig pension (L 104, vedtaget 2021)

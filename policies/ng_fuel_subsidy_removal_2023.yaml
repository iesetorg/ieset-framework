policy_id: ng_fuel_subsidy_removal_2023
status: candidate
title: Tinubu PMS petrol subsidy removal ("subsidy is gone")
countries:
- NGA
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-05-29'
description: 'In his inaugural address on 29 May 2023 President Bola Tinubu declared "subsidy is gone," ending the decades-old Premium Motor Spirit (petrol) consumer subsidy that had ballooned to an estimated
  N4+ trillion in 2022. NNPCL adjusted pump prices from ~N195/litre to N488-617/litre within weeks, and to over N1,000/litre by late 2024 following naira depreciation. The removal freed fiscal space but
  triggered a cost-of-living shock, headline inflation rising from ~22% to a peak of 34.2% in June 2024, and eventually the August 2024 #EndBadGovernance protests.

  '

policy_id: ec_selective_default_global_bonds_2008
status: candidate
title: Ecuador selective default on Global 2012 + 2030 bonds
countries:
- ECU
timeframe:
  start: 2008
  end: 2009
  enacted_date: '2008-12-12'
description: 'President Correa announced 12 Dec 2008 that Global 2012 bonds would not be serviced; 12 Feb 2009 Global 2030 bonds added. Government deemed both series "illegitimate" via Comisión para la
  Auditoría Integral del Crédito Público (CAIC) Nov 2008 report. Modified Dutch-auction repurchase Apr-Jun 2009 retired ~USD 3.2bn at ~35 cents on dollar (~USD 1bn outlay). Ecuador locked out of international
  capital markets; re- accessed Jun 2014 via USD 2bn issuance.

  '
enacted_by:
- ecuador_correa_alianza_pais_i_2007_2013
coalition_label_at_enactment: Alianza PAIS

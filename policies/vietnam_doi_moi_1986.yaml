description: 'Sixth Party Congress resolution initiating transition from Soviet- style central planning to ''socialist-oriented market economy''. Measures: (1) agricultural decollectivisation to household-contract
  system (Resolution 10, 1988); (2) price liberalisation; (3) foreign investment law 1987; (4) SOE reform with managerial autonomy; (5) exchange-rate unification; (6) trade liberalisation culminating in
  US normalisation 1995 and WTO accession preparation 1998-2007. Transformed Vietnam from near-famine conditions in the mid-1980s to fastest-growing Asian economy of the 1990s-2010s. Parallel case to Chinese
  Reform and Opening but with delayed political liberalisation (still single-party). Demonstrates that authoritarian-capitalist development path is not unique to China.

  '

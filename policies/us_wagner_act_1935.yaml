title: Wagner Act 1935
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The National Labor Relations Act of 1935 (Wagner Act) guaranteed private-sector workers the right to organise, bargain collectively, and engage in concerted activity. It established the National
  Labor Relations Board to certify bargaining units, conduct representation elections, and adjudicate unfair labour practices, prohibiting employer interference and discrimination against union activity.
  The statute became the cornerstone of US private-sector labour law.

  '

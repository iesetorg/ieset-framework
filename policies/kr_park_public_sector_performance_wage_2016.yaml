policy_id: kr_park_public_sector_performance_wage_2016
status: candidate
title: Park Public Sector Performance Wage 2016
countries:
- KOR
timeframe:
  start: 2013
  end: 2017
description: 'The Park administration''s 2016 Performance-Based Wage System mandated that public corporations and quasi-government agencies adopt individual performance-based pay, replacing largely seniority-
  based systems and introducing easier dismissal for low performers. Implemented through Ministry of Strategy and Finance guidelines, the measure was politically contentious and became one of the union
  grievances later partially reversed under the Moon administration.

  '

policy_id: kr_52_hour_work_week_2018
status: candidate
title: 52-hour maximum work week (South Korea, 2018)
countries:
- KOR
timeframe:
  start: 2018
  end: 2021
  enacted_date: '2018-02-27'
description: 'Labour Standards Act amendment (Act No. 15513) capping total weekly working hours at 52 (40 regular + 12 overtime), replacing the prior 68-hour ceiling that allowed additional weekend work
  outside the weekly total. Phased in by firm size: ≥300 employees from 1 July 2018; 50-299 employees from 1 January 2020; 5-49 employees from 1 July 2021. Penalty exposures for employers; partial flexible-
  working-hours exemptions negotiated through 2019.

  '

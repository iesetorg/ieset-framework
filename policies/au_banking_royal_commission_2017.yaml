description: 'Royal Commission into Misconduct in the Banking, Superannuation and Financial Services Industry established by Letters Patent 14 December 2017 under Commissioner Kenneth Hayne following Coalition
  party-room reversal. Final Report February 2019 made 76 recommendations across consumer-credit, mortgage-broker remuneration, financial-advice, and regulator design (the "twin peaks" APRA/ASIC framework).
  Successor Morrison government committed to implementing all but one recommendation; 54 of 76 had been legislated or actioned by mid-2021.

  '

policy_id: tr_1977_1979_workers_remittance_fx_shortage
status: candidate
title: Turkey workers' remittance shortfall and FX crisis 1977-1979
countries:
- TUR
timeframe:
  start: 1977
  end: 1979
description: 'Collapse of workers'' remittances from European guest-worker populations (German recession 1975; lira-overvaluation penalised foreign-currency conversion) removed a key balance-of-payments
  buffer. Official reserves fell below one month of imports by mid-1977; Central Bank paid for oil imports via Dresdner Bank Convertible Turkish Lira deposits and arrears. FX shortage forced coalition governments
  to negotiate three successive IMF programmes but implementation always lagged.

  '

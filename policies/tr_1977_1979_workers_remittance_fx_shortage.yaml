  direction: '-'
  magnitude: moderate
  rationale: Import restrictions tightened as FX reserves collapsed.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: moderate
  rationale: External financing shortfall forced monetary accommodation.

policy_id: fi_compulsory_education_extension_2021
status: candidate
title: Compulsory Education Extension 2021
countries:
- FIN
timeframe:
  start: 2019
  end: 2023
description: 'Finland''s Compulsory Education Act (1214/2020), passed by the Marin coalition and effective from August 2021, extended compulsory schooling to age 18 and made upper-secondary education (general
  or vocational) free of charge for cohorts born in 2005 onwards, including textbooks and study materials. The intended effect was to reduce drop-out rates, raise youth qualifications, and address skill-biased
  labour-market disadvantage in vocationally tracked students.

  '
enacted_by:
- finland_marin_rainbow_2019_2023
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Free upper-secondary materials and meals expanded in-kind transfers to families with teenagers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Extension increased education-ministry spending by roughly €100m per year at full rollout.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Curriculum updates included sustainability competencies, modestly tightening environmental content.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Higher minimum schooling raised the floor on youth qualifications without changing labour-market regulation.

description: 'Revised 2024 state budget (passed 13 March 2024) and preceding supplementary appropriations funding Operation Swords of Iron following the 7 October 2023 Hamas attack. Deficit target raised
  to 6.6% of GDP (from 2.25% pre- war). Defence budget increased roughly 40% with multi-year envelope; compensation fund for displaced residents of northern and southern communities; reservist stipends;
  infrastructure reconstruction. Funded by spending reallocations, coalition-fund cuts (partial), and debt issuance.

  '

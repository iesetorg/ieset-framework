description: 'Budget of 10 March 1981 tightened fiscal stance by approximately £4bn (about 2% of GDP) at the trough of the 1980-81 recession, through frozen personal tax thresholds in high inflation, North
  Sea oil taxes, and expenditure restraint. Provoked Letter of 364 Economists (30 March 1981) to The Times warning against. In fact recovery began later that year; Budget is cited as evidence by proponents
  of expectations-based policy regime.

  '

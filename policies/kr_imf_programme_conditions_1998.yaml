policy_id: kr_imf_programme_conditions_1998
status: candidate
title: Korea IMF programme conditions and implementation (1997-2000)
countries:
- KOR
timeframe:
  start: 1997
  end: 2000
  enacted_date: '1997-12-04'
description: 'IMF Stand-By Arrangement approved 4 December 1997, initial total $58.4bn (IMF $21bn, IBRD $10bn, ADB $4bn, bilateral $23bn). Programme conditions: monetary tightening (call rate hiked to 30%+),
  fiscal surplus, corporate-governance reform, capital- account liberalisation (foreign-investment ceiling lifted, M&A by foreigners allowed including hostile takeovers), financial-sector restructuring
  (Financial Supervisory Commission consolidated 1998), prudential standards raised, chaebol transparency requirements. Rollover of short-term foreign-bank claims negotiated January 1998. Bank failures:
  Daewoo Securities intervention, 5 merchant banks closed; 14 commercial banks merged/recapitalised. Programme concluded August 2001.

  '
enacted_by:
- skorea_kim_dae_jung_ds_1998_2003
coalition_label_at_enactment: NCNP / MDP

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: us_federal_reserve_act_1913
status: candidate
title: Federal Reserve Act 1913
countries: [USA]
timeframe:
  start: 1913
  end: 1913
  enacted_date: "1913-12-23"
description: >
  The Federal Reserve Act created the Federal Reserve System as a national reserve,
  discount, and payments architecture after repeated banking panics under the National
  Banking system, especially the panic of 1907. It established regional Reserve Banks,
  a central Federal Reserve Board, rediscounting powers, and an elastic currency.
  The reform did not create modern central-bank independence in its later form, but it
  did move the United States away from ad hoc crisis management by private clearinghouses
  and the Treasury toward a permanent national monetary institution.
enacted_by:
  - us_progressive_era_reform_consensus_1901_1917
axes_moved:
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The act created a standing national monetary authority more autonomous than direct Treasury crisis improvisation, though still politically embedded."
  - axis: regulatory.financial_deregulation
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Reserve requirements, rediscounting, and coordinated supervision tightened the banking architecture relative to the fragmented pre-1913 order."
references:
  - "Federal Reserve Act, 38 Stat. 251 (1913)"
  - "Meltzer (2003), A History of the Federal Reserve, vol. 1"

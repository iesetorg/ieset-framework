description: 'Discretionary fiscal response to the COVID-19 shock, cumulatively exceeding NOK 130bn in 2020-2021 incremental measures, including (i) kompensasjonsordning compensation scheme for firms with
  revenue drops, (ii) expansive furlough (permittering) and sick-pay regime, (iii) liquidity/loan-guarantee facility via Eksfin, and (iv) sector-targeted aviation and culture support. Structural non-oil
  fiscal impulse breached the 3% handlingsregel phasing rate; treated as shock-response within the rule''s explicit downturn-flexibility clause. Also included temporary petroleum-tax uplift enlargement
  (Prop. 113 L, 2019-2020).

  '

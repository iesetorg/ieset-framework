title: Indonesia Omnibus Job Creation Law 2020
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Law No. 11/2020 (Cipta Kerja, "Job Creation") amended over 70 statutes simultaneously to streamline business licensing, ease labour-market regulations including severance and minimum-wage
  formulas, consolidate environmental permitting, and liberalise foreign-investment restrictions across most sectors. Enacted under President Jokowi''s second term, the law was contested in court and later
  re-promulgated as Perppu 2/2022 after a Constitutional Court conditional ruling.

  '

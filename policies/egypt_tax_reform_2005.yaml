policy_id: egypt_tax_reform_2005
status: candidate
title: Egypt Tax Reform 2005
countries:
- EGY
timeframe:
  start: 1991
  end: 2011
description: 'Income Tax Law 91 of 2005 under the Nazif cabinet roughly halved the top corporate and personal income-tax rates from 40% to 20% (with a 10% basic-rate band), broadened the base by tightening
  exemptions, and modernised tax administration. Compliance and self-assessment improved markedly and tax-to-GDP rose despite lower nominal rates, anchoring the supply-side phase of Egypt''s late-Mubarak
  liberalisation.

  '

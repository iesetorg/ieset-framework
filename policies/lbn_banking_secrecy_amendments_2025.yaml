policy_id: lbn_banking_secrecy_amendments_2025
status: candidate
title: Lebanon banking-secrecy amendments 2025
countries:
- LBN
timeframe:
  start: 2025
  end: ongoing
description: 'Lebanon amended its banking-secrecy framework in 2025 to widen access for supervisory, judicial, tax, and restructuring authorities after the banking collapse. The change was intended to support
  bank-resolution work, forensic scrutiny, depositor-loss allocation, and IMF-aligned financial-sector reform by reducing secrecy barriers that had limited accountability and balance-sheet transparency.

  '
enacted_by:
- lebanon_aoun_salam_reconstruction_2025_present
coalition_label_at_enactment: Aoun-Salam reformist technocratic cabinet and Lebanese Parliament
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Axis semantic '+' is tighter financial regulation; widened access reduces secrecy barriers to supervision and bank resolution.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Judicial, tax, and supervisory access makes financial accountability more rule-bound.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Transparent bank restructuring is a precondition for legally defined depositor-loss allocation.
references:
- Lebanese Parliament banking-secrecy amendments, 2025
- IMF Lebanon staff statements and Article IV materials on banking-secrecy reform, 2025
- Reuters and Financial Times reporting on Lebanon's 2025 banking-secrecy amendments
notes: Coded as a financial-transparency reform linked to, but distinct from, the broader deposit-restitution framework.

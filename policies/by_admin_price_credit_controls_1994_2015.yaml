# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: by_admin_price_credit_controls_1994_2015
status: candidate
title: Belarus administrative price and directed-credit controls
countries: [BLR]
timeframe: {start: 1994, end: 2015}
description: >
  Belarus used administered prices, wage guidance, exchange restrictions, and
  directed bank lending to support state-sector output and employment through
  much of the Lukashenko period. These tools softened restructuring pressures
  but generated recurrent inflation, balance-of-payments stress, and IMF reform
  programmes.
enacted_by:
  - belarus_lukashenko_state_capitalism_1994_present
axes_moved:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, intended: true, rationale: "Administered prices displaced market pricing across important goods and services."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, intended: true, rationale: "Directed lending subordinated credit policy to industrial and employment goals."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, intended: false, rationale: "Directed credit and exchange controls periodically produced expansionary monetary pressure."}
references:
  - "IMF Belarus Article IV reports, directed lending and exchange-rate controls"
  - "EBRD Transition Report, Belarus price liberalisation indicators"

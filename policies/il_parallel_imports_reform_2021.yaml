description: 'Reform eliminating the monopoly of official importers by accepting EU and OECD product-standard certifications as equivalent to Israeli Standards Institute certification. Designed to reduce
  Israel''s persistent cost-of- living gap vs OECD peers in food, cosmetics, appliances, and electronics. Part of the 2021 Arrangements Law. Slogan ''what''s good for Europe is good for Israel''.

  '

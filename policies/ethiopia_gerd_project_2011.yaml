policy_id: ethiopia_gerd_project_2011
status: candidate
title: Ethiopia Gerd Project 2011
countries:
- ETH
timeframe:
  start: 1991
  end: 2018
description: 'The Grand Ethiopian Renaissance Dam (GERD), launched in 2011 on the Blue Nile under the EPRDF, is a state-led mega-hydropower project financed largely through domestic bonds and forced public
  contributions rather than external loans. Construction was directed by the Ethiopian Electric Power agency and a contractor consortium, intended to roughly double national generation capacity, support
  energy export revenues, and serve as the flagship of the EPRDF''s developmental-state industrial agenda.

  '
enacted_by:
- ethiopia_eprdf_developmental_state_1991_2018
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State financed dam construction via bonds, payroll deductions, and direct public-sector outlays.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: GERD positioned the state utility as exclusive licensee for cross-border power export agreements.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Project enabled future electricity exports while heightening Nile-basin disputes with downstream states.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Riparian land was expropriated and dam revenues vested in state monopoly utility.

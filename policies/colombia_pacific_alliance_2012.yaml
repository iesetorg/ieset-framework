policy_id: colombia_pacific_alliance_2012
status: candidate
title: Colombia Pacific Alliance 2012
countries:
- COL
timeframe:
  start: 2002
  end: 2022
description: 'Pacific Alliance (Alianza del Pacífico) regional integration agreement signed in June 2012 by Chile, Colombia, Mexico, and Peru, establishing a deep-integration framework targeting full free
  movement of goods, services, capital, and people. Includes integrated stock exchanges (MILA), elimination of tariffs on roughly 92% of trade, visa-free travel for citizens, and mutual diplomatic representation
  arrangements.

  '

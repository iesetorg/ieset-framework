policy_id: mli_constitution_fourth_republic_2023
status: candidate
title: Mali Fourth Republic constitution 2023
countries:
- MLI
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-07-22'
description: >
  Mali adopted a new constitution after the June 2023 referendum, launching a
  Fourth Republic framework with a stronger presidency, a bicameral legislature,
  a Court of Accounts, and formal recognition of national languages alongside
  French as a working language. The constitution supplied the transition
  authorities' legal route toward a post-transition institutional order.
enacted_by:
- mali_assimi_goita_transition_sovereignty_2020_present
scope: national
coalition_label_at_enactment: Goita transition government
axes_moved:
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: The constitution restored a formal constitutional framework but concentrated executive power under transition-authority sponsorship.
- axis: institutional.judicial_independence
  direction: mixed
  magnitude: weak
  intended: true
  rationale: New audit and court architecture added formal controls while the executive-centered design limited checks.
references:

title: Cosco Piraeus Concession 2008
countries:
- GRC
timeframe:
  start: 2004
  end: 2009
description: 'In November 2008 the Greek state, through Piraeus Port Authority (OLP), signed a 35-year concession granting COSCO subsidiary Piraeus Container Terminal SA management of Piers II and III,
  with committed capacity expansion investment. Ratified by Law 3755/2009, the deal made Piraeus the flagship Belt-and- Road foothold in the Mediterranean and demonstrated foreign direct-investment friendly
  infrastructure policy ahead of the crisis.

  '

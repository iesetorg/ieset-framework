title: UK Social Contract Phases 3-4 incomes policy (1976-1978)
countries:
- GBR
timeframe:
  start: 1976
  end: 1978
description: 'Tripartite incomes-policy phases under Callaghan government extending the 1974 Social Contract framework. Phase 3 (August 1977-July 1978) set a 10% pay norm; Phase 4 (August 1978-1979) proposed
  a 5% norm. TUC General Council cooperated with government wage restraint in exchange for retained union rights and welfare-state protection. Phase 4 broke down in the 1978-79 Winter of Discontent when
  public- sector unions refused compliance.

  '

description: 'Published in 1980 Budget Red Book. Set declining targets for £M3 growth (7-11% 1980-81 falling to 4-8% by 1983-84) and Public Sector Borrowing Requirement path. Represented the first formal
  medium- term nominal-anchor framework in UK postwar policy. Frequently missed in practice; monetary-aggregate targeting partially abandoned from 1985 after Big Bang distorted M3 demand. Nevertheless served
  as credible-commitment device in disinflation.

  '

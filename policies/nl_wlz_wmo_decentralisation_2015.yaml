policy_id: nl_wlz_wmo_decentralisation_2015
status: candidate
title: Netherlands long-term-care decentralisation (Wlz + Wmo 2015)
countries:
- NLD
timeframe:
  start: 2015
  end: 2020
  enacted_date: '2015-01-01'
description: 'Decentralisation of long-term-care services (Rutte II Hervorming Langdurige Zorg) from 1 January 2015: AWBZ disaggregated into the federal Wet langdurige zorg (Wlz) for severe-care cases,
  and delegated to municipalities via the new Wet maatschappelijke ondersteuning (Wmo 2015) for home-care, day-care, and domestic-support provision, with ~40% budget haircut relative to prior AWBZ baseline.
  Complemented by transfer of youth-care (Jeugdwet) and expanded Zorgverzekeringswet (Zvw) role for nursing care.

  '
enacted_by:
- netherlands_rutte_ii_vvd_pvda_2012_2017
coalition_label_at_enactment: VVD-PvdA

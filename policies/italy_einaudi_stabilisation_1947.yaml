policy_id: italy_einaudi_stabilisation_1947
status: candidate
title: Italy Einaudi Stabilisation 1947
countries:
- ITA
timeframe:
  start: 1950
  end: 1970
description: 'As Budget Minister and de facto Banca d''Italia governor in 1947, Luigi Einaudi sharply raised reserve requirements on commercial-bank deposits, halted the lira''s depreciation and broke the
  postwar inflation spiral by tightening credit and fiscal restraint. The September 1947 stabilisation re-anchored price expectations within months and is generally treated as the foundational moment of
  postwar Italian monetary credibility, enabling the subsequent Bretton Woods peg and the early-1950s liberalisation steps.

  '

  direction: +
  magnitude: weak
  intended: true
  rationale: Stabilised lira allowed early dismantling of multiple-exchange-rate import controls.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Disinflation reduced the rationale for wartime allocation and price-control regimes.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reserve-requirement-led tightening established Banca d'Italia's authority over commercial-bank credit.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Subsequent fiscal-space recovery permitted growth-supporting industrial subsidies under fiscal anchor.

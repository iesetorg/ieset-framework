policy_id: th_minimum_wage_400_baht_trajectory_2024
status: candidate
title: Thailand 400-baht national minimum wage trajectory (2024-)
countries:
- THA
timeframe:
  start: 2024
  end: ongoing
description: 'Pheu Thai campaign pledge to raise the national daily minimum wage to 400 baht (and 600 baht by 2027) implemented progressively through tripartite-committee notifications rather than a single
  national jump. 2024 tranches applied 400 baht in select tourism-heavy provinces and for four-star-and-above hotel workers from April 2024, extending to industrial and services sectors across additional
  provinces through 2024-2025. Full national 400-baht floor targeted for 2025 with sectoral carve-outs under negotiation. The rate is set province-by-province by the National Wage Committee as before; the
  400-baht number is a political target rather than a single statutory floor.

  '

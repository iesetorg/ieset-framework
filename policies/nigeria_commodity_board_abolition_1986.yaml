policy_id: nigeria_commodity_board_abolition_1986
status: candidate
title: Nigeria Commodity Board Abolition 1986
countries:
- NGA
timeframe:
  start: 1986
  end: 1993
description: 'As part of the 1986 Structural Adjustment Programme, the Babangida government abolished Nigeria''s six commodity boards (cocoa, groundnut, palm produce, cotton, rubber, grains) that had monopolised
  procurement and exports of agricultural commodities since the colonial Marketing Boards era. The abolition decree liberalised internal trade and external sales, ended pan-territorial pricing, and passed
  prevailing world prices through to farmers via a competitive private export trade.

  '
enacted_by:
- nigeria_buhari_sap_structural_adjustment_1986
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Allowed private exporters direct access to world markets in cocoa, palm produce, and other previously board-controlled crops.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Dismantled monopsonies that had set fixed producer prices and replaced them with competitive private buying.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: World-price pass-through under SFEM amplified Naira-denominated flows from agricultural exports through the banking system.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminated implicit subsidies and taxes embedded in commodity-board price-stabilisation funds.

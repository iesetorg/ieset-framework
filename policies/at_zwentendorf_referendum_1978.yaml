description: 'Referendum 5 November 1978 on commissioning the completed Zwentendorf nuclear power plant. Rejected 50.47% No / 49.53% Yes on 64% turnout. Statute subsequently prohibited nuclear power in
  Austria. Kreisky had staked political credibility on the Yes vote; the defeat weakened his government and killed the Austrian nuclear programme before any reactor operated.

  '

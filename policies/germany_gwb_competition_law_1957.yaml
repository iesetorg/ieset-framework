description: 'The Gesetz gegen Wettbewerbsbeschränkungen (GWB) of 27 July 1957 codified the Erhard-era ordoliberal prohibition on cartels and abuse of market dominance, established the Bundeskartellamt
  as enforcement agency, and required notification of qualifying horizontal agreements. The statute reversed the cartel- permissive Weimar inheritance and provided the institutional bedrock of West German
  competition policy that subsequently informed European Community competition law.

  '

description: 'Lesotho moved into main implementation of Phase II of the Lesotho Highlands Water Project, centered on the Polihali Dam, transfer tunnel, associated roads, and hydropower-linked infrastructure.
  The project expands the water-transfer compact with South Africa and remains Lesotho''s largest strategic public-infrastructure and export-revenue programme.

  '

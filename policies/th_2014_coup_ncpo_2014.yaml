title: Thailand 2014 military coup and NCPO interim rule
countries:
- THA
timeframe:
  start: 2014
  end: 2019
  enacted_date: '2014-05-22'
description: 'Military coup on 22 May 2014 by the Royal Thai Armed Forces led by Army Chief Prayut Chan-o-cha overthrew the caretaker Yingluck Shinawatra government. The National Council for Peace and Order
  (NCPO) suspended the 2007 constitution, dissolved the Senate, imposed martial law, and promulgated a 2014 interim constitution whose Section 44 granted the NCPO Head absolute power to issue binding orders.
  NCPO appointed a National Legislative Assembly, a Constitution Drafting Committee, and a National Reform Council. Civilian political activity, public gatherings of more than five people, and media criticism
  were restricted under NCPO orders. The junta period ran until the 2019 general election held under the new 2017 constitution.

  '

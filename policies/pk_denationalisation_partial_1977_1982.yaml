status: candidate
title: Partial denationalisation under Zia (Pakistan 1977-1982)
countries:
- PAK
timeframe:
  start: 1977
  end: 1982
description: 'Rollback of the Bhutto nationalisations of 1972-1976: cotton ginning mills denationalised 1977; rice husking and edible oils 1978; small engineering, ghee, automobile assembly progressively
  de-scheduled 1978-1982; cement units partially denationalised 1979. Heavy industries (steel, fertiliser, large banks) retained in public ownership. Provided partial restoration of private-sector investment
  confidence; full privatisation waited until Nawaz Sharif 1991.

  '

policy_id: in_tariff_cuts_1991_1996
status: candidate
title: India tariff reduction programme 1991-1996
countries:
- IND
timeframe:
  start: 1991
  end: 1996
description: 'Peak customs tariff cut from 150% in 1991 to 85% by 1993-94, 65% by 1994-95, and 50% by 1995-96 under Rao-Singh budgets. Accompanied by QR removal for most capital and intermediate goods,
  extension of OGL list, and tariff-structure rationalisation (reduction in tariff peaks and dispersion). Trade-to-GDP ratio rose from ~17% in 1990-91 to ~26% by 1996-97.

  '

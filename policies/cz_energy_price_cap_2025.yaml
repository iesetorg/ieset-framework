# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: cz_energy_price_cap_2025
status: candidate
title: Czech household energy-price cap and subsidy restoration (2025)
countries:
- CZE
timeframe:
  start: 2025
  end: ongoing
description: >
  Reintroduction or extension of household energy-price caps and related subsidy
  relief after the 2022-2024 European energy shock. The measure suppresses retail
  price pass-through for households and small users, shifts part of the burden to
  the budget or regulated suppliers, and weakens price-signal discipline relative
  to targeted transfers or market pass-through with compensation.
enacted_by:
- czech_republic_babis_ano_second_2025_present
coalition_label_at_enactment: ANO 2011, SPD, and Motorists for Themselves coalition
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Administered retail caps suppress normal competitive price signals in the energy market.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Budget compensation or regulated cross-subsidy supports energy consumption and suppliers.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Sustained caps can discourage demand response and investment if not tightly temporary.
linked_hypotheses:
- state_energy_price_controls_shortage
- ml_energy_price_controls_shortage_fiscal_burden
- capacity_energy_shock_transfers_vs_price_controls
- price_controls_produce_shortages_and_quality_degradation
references:
- Czech government programme statement and 2025 energy-price relief pledges
- Czech energy regulator and Ministry of Industry energy-price cap materials, 2025
notes: Created to materialise a declared policy on czech_republic_babis_ano_second_2025_present.

timeframe:
  start: 1985
description: 'As part of the Stabilization Plan, the government temporarily suspended and then restructured the comprehensive backward-looking indexation system that had propagated inflation through wages,
  prices, rents, and financial contracts. Indexation clauses were suspended for nine months; new contracts used forward-looking inflation forecasts. Broke one of the core inertial mechanisms of the Israeli
  hyperinflation.

  '

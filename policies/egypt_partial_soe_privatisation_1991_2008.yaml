policy_id: egypt_partial_soe_privatisation_1991_2008
status: candidate
title: Egypt Partial Soe Privatisation 1991 2008
countries:
- EGY
timeframe:
  start: 1991
  end: 2011
description: 'Under Public Enterprise Law 203 of 1991, Egypt grouped state-owned firms into 27 holding companies and divested some 200+ enterprises through IPOs, employee shareholder associations, and strategic-anchor
  sales by 2008. Cement, telecoms, and several food and textile firms moved into private hands; sales accelerated under the Nazif cabinet (2004–2008) before stalling amid corruption and pricing controversies
  in Mubarak''s final years.

  '
enacted_by:
- egypt_mubarak_neoliberal_late_era_1991_2011
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sales were paired with the 2005 corporate-tax cut to attract bidders for state assets.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Capital-gains and dividend-tax preferences embedded in the privatisation architecture trimmed progressivity.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Anchor-investor sales introduced foreign competitors into cement and telecoms.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Foreign acquirers and listings on EGX integrated divested firms into international capital flows.

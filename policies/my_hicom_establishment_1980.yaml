policy_id: my_hicom_establishment_1980
status: candidate
title: Heavy Industries Corporation of Malaysia — HICOM (Malaysia 1980)
countries:
- MYS
timeframe:
  start: 1980
  end: 1985
  enacted_date: '1980-11-07'
description: 'HICOM Berhad incorporated 7 Nov 1980 as wholly owned subsidiary of Ministry of Finance to spearhead heavy industrialisation. Projects included Kedah Cement (1983), Perwaja Terengganu Steel
  (1982), Perusahaan Otomobil Nasional (Proton, 1983 JV with Mitsubishi, first car 1985), Malaysia Shipyard & Engineering (1983). Absorbed into UEM/DRB-HICOM ownership by mid-1990s.

  '
enacted_by:
- malaysia_hussein_onn_1976_1981
- malaysia_mahathir_first_term_1981_1988
coalition_label_at_enactment: Barisan Nasional
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Flagship state-led heavy-industry conglomerate; extensive soft-loan and tariff protection.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: National-car and steel sector granted de-facto exclusivity against competing entrants.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Protected domestic auto and steel markets against import competition.

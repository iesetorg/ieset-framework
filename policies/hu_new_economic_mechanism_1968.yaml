description: 'Reform introduced 1 January 1968 replacing mandatory central-plan indicators with profit-based enterprise incentives, quasi-market pricing for most consumer goods, and scope for household-plot
  agriculture and second-economy (maszek) activity. Most substantial reform-socialist architecture in COMECON. Partially rolled back under Soviet pressure 1972-1977, revived from 1978.

  '

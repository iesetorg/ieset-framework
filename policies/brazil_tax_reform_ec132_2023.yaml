title: Brazil Tax Reform Ec132 2023
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'Constitutional Amendment 132/2023, approved by Congress in December 2023 under the Lula third term, reformed Brazil''s notoriously fragmented consumption-tax regime by replacing PIS, Cofins,
  IPI, ICMS, and ISS with a dual VAT — the federal CBS and the state/municipal IBS — plus a selective "Imposto Seletivo" excise on health- and environment-harming goods. The reform is to be phased in through
  2033, with regulating complementary laws and a 50-year revenue-equivalence transition for subnational governments.

  '

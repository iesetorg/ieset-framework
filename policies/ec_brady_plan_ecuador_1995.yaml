description: 'Ecuador closed its Brady Plan 28 February 1995 under Durán Ballén / Dahik. Restructured ~$4.5B commercial bank principal + ~$3.1B past-due interest via Par Bonds, Discount Bonds, Past Due
  Interest (PDI) Bonds, Interest Equalisation Bonds — approx 45% principal haircut in present-value terms. Accompanied by $150M IMF Extended Fund Facility. Returned Ecuador to international capital markets;
  defaulted again in 1999 Mahuad crisis.

  '

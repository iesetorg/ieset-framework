policy_id: india_pli_scheme_2020
status: candidate
title: India Pli Scheme 2020
countries:
- IND
timeframe:
  start: 2014
  end: 2024
description: 'Launched in March 2020 and progressively expanded through 2021-22, the Production Linked Incentive (PLI) scheme offers cash incentives — typically 4-6% on incremental sales — to manufacturers
  in 14 priority sectors (mobiles, semiconductors, pharma, auto, advanced chemistry cells, etc.) for meeting investment, output, and value-add thresholds. Implemented through scheme-specific notifications
  by line ministries, PLI is the centrepiece of the "Atmanirbhar Bharat" industrial-policy turn.

  '
enacted_by:
- india_modi_first_second_term_2014_2024
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Combined with the 15% concessional rate for new manufacturers to lower effective post-incentive corporate tax.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct cash subsidy on incremental sales is the core mechanism of PLI.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Major new sub-budget head channelling resources to producer entitlements.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Open and competitive selection processes broadened entry into PLI-targeted sectors.

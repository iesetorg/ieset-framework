policy_id: ca_tfsa_2009
status: candidate
title: Canada — Tax-Free Savings Account (TFSA) introduction
countries:
- CAN
timeframe:
  start: 2009
  end: ongoing
  enacted_date: '2009-01-01'
description: 'Budget 2008 introduced the Tax-Free Savings Account effective 1 January 2009. Canadians aged 18+ receive annual contribution room ($5,000 initially, indexed to inflation in $500 increments;
  raised to $10,000 in Budget 2015 and reverted to $5,500 indexed by the Trudeau government in 2016). Contributions are not tax-deductible but investment income and withdrawals are tax-free; unused room
  carries forward and withdrawals restore room in the following year. Structurally parallel to the UK ISA. Designed as a broad-based capital-income shelter covering savers not fully captured by the RRSP
  (after-tax rather than pre-tax treatment). TFSA assets exceeded C$500B by 2023.

  '
enacted_by:
- canada_harper_conservative_2006_2015
coalition_label_at_enactment: Conservative Party minority
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Tax-free treatment of investment income and capital gains within the account reduces effective capital-income tax rate for the typical saver.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Higher-income households more likely to max contribution room; mitigated by universal eligibility and carry-forward provisions useful to lower-income savers over time.

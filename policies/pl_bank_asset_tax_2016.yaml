policy_id: pl_bank_asset_tax_2016
status: candidate
title: Bank Asset Tax 2016
countries:
- POL
timeframe:
  start: 2015
  end: 2017
description: 'Bank asset tax (podatek bankowy) introduced in February 2016 by the Szydło PiS government, levying a monthly charge of approximately 0.0366 percent on the assets of large banks, insurers,
  and consumer-credit firms above defined thresholds. The tax provided revenue for the Family 500+ programme, encouraged sovereign-bond holdings (which were exempt), and was widely criticised by the financial
  sector and analysts for disincentivising private credit growth.

  '

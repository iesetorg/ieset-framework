status: candidate
title: Kok Budget Surplus 1998 2001
countries:
- NLD
timeframe:
  start: 1998
  end: 2002
description: 'The Kok II purple coalition consolidated the Zalm Norm — a fixed-real-spending ceiling combined with separate tax revenue treatment — into a sustained run of cash and EMU-definition budget
  surpluses between 1998 and 2001. Buoyed by strong dot-com-era growth and gas revenues, the Netherlands became one of the few EMU economies to durably exceed the Stability and Growth Pact''s deficit limits
  in the surplus direction during this window.

  '

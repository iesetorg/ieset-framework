policy_id: australia_carbon_tax_repeal_2014
status: candidate
title: Australia Carbon Tax Repeal 2014
countries:
- AUS
timeframe:
  start: 2013
  end: 2015
description: 'Repeal of the 2011 Clean Energy Act carbon-pricing mechanism enacted by the Abbott LNP government through the Clean Energy Legislation (Carbon Tax Repeal) Act 2014, ending the AUD 23/tCO2
  fixed price scheduled to transition to an emissions-trading scheme. Replaced explicit carbon pricing with the discretionary Emissions Reduction Fund (Direct Action) reverse-auction subsidy programme.
  Marked the only repeal of a national carbon-pricing system to date.

  '

policy_id: fi_labour_market_reform_2024
status: candidate
title: Labour Market Reform 2024
countries:
- FIN
timeframe:
  start: 2023
  end: ongoing
description: 'Finland''s 2024 labour-market reform package, adopted by the Orpo coalition through a series of acts amending the Employment Contracts Act, Unemployment Security Act and dispute-resolution
  rules, made dismissal protections lighter for personal-grounds termination, tightened earnings-related unemployment benefits (graduation rule, longer waiting periods), restricted political strikes, and
  raised hurdles for sympathy strikes. The intended effect was to raise effective labour-market flexibility and improve fiscal sustainability of the Nordic welfare model.

  '
enacted_by:
- finland_orpo_rightbloc_2023_present
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tightened unemployment benefits reduced replacement rates and total benefit outlays.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Graduation and waiting periods directly cut earnings-related transfers.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower dismissal hurdles and limits on industrial action sharply raised hiring/firing flexibility.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reform package was complemented by tighter migration access for EU-third-country workers.

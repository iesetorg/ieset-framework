description: 'Public Finance (Mixed Ownership Model) Amendment Act 2012 authorised partial floats of four energy/infrastructure SOEs retaining Crown 51%+ stake: Mighty River Power (14 May 2013, NZ$1.7bn),
  Meridian Energy (29 Oct 2013, NZ$2.0bn), Genesis Energy (17 Apr 2014, NZ$0.7bn), and Crown-stake reduction in Air New Zealand (2013). Contested through 2013 referendum (67% against) but retained.

  '

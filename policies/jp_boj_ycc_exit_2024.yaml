policy_id: jp_boj_ycc_exit_2024
status: candidate
title: Japan — BoJ exit from NIRP and YCC (March 2024)
countries:
- JPN
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-03-19'
description: 'At its 19 March 2024 monetary policy meeting, the Bank of Japan under Governor Kazuo Ueda ended its Negative Interest Rate Policy (NIRP, -0.1% since 2016) and formally terminated its Yield
  Curve Control framework (YCC, in place since 2016). The policy rate on excess reserves was moved to 0.0-0.1%, and the BoJ committed to continuing JGB purchases at roughly the prior pace as a normalisation
  bridge while abandoning the explicit 10-year yield cap. The July 2024 meeting lifted the policy rate to 0.25%, the first two rate hikes in a single year since 2007. Framed as a transition away from Abenomics-era
  unconventional monetary policy once a sustainable wage-price cycle was judged achieved, supported by the 2024 shuntō wage settlement averaging 5.28% — the highest in 33 years.

  '

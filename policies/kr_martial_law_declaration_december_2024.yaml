description: 'Shortly before 23:00 KST on 3 December 2024 President Yoon Suk-yeol issued Emergency Martial Law Proclamation No. 1, citing "anti-state forces" inside the DP-controlled National Assembly,
  banning political activity, placing media under military command, and deploying special- forces units to the assembly building. The National Assembly, voting 190-0 at approximately 01:00 on 4 December,
  demanded lifting of the declaration per Article 77(5) of the Constitution; Yoon rescinded at roughly 04:30. The assembly then passed an impeachment motion 204-85 on 14 December 2024 (PPP floor divided:
  ~12 members crossed). The Constitutional Court, in ruling 2024Hun-Na8 on 4 April 2025, held 8-0 that the declaration violated the constitutional martial-law conditions and removed Yoon from office. An
  early presidential election under Article 68(2) was held 3 June 2025, won by DP''s Lee Jae-myung (~49.4%).

  '

policy_id: uk_national_insurance_act_1946
status: candidate
title: National Insurance Act 1946
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The National Insurance Act 1946 implemented the universalist contributory social-insurance framework recommended by the 1942 Beveridge Report, providing flat-rate unemployment, sickness, maternity,
  widows'', orphans'', and retirement benefits funded by tripartite (employee/employer/Treasury) flat-rate contributions. Together with the National Insurance (Industrial Injuries) Act 1946 it formed the
  social-security pillar of the postwar welfare state, replacing the pre-war contributory scheme.

  '
enacted_by:
- uk_attlee_welfare_state_1945_1951

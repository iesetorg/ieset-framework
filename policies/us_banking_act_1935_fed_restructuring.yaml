status: candidate
title: Banking Act 1935 Fed Restructuring
countries:
- USA
timeframe:
  start: 1933
  end: 1999
description: 'The Banking Act of 1935 restructured the Federal Reserve System, replacing the Federal Reserve Board with a Board of Governors of seven presidentially appointed members, creating the Federal
  Open Market Committee in its modern form, and centralizing reserve requirement and discount-rate authority in Washington. The statute consolidated monetary policy decision-making away from the regional
  Reserve Banks and established the institutional architecture under which the Fed has operated ever since.

  '

policy_id: uk_northern_rock_nationalisation_2008
status: candidate
title: UK Northern Rock temporary public ownership
countries:
- GBR
timeframe:
  start: 2008
  end: 2012
  enacted_date: '2008-02-22'
description: 'After the September 2007 bank-run on Northern Rock (the first on a major UK bank since 1866), HM Treasury first extended liquidity support via the Bank of England, attempted a private-sale
  process (Virgin, Olivant bids), and ultimately transferred the bank into temporary public ownership via the Banking (Special Provisions) Act 2008. Split into Northern Rock plc (good bank) and Northern
  Rock (Asset Management) plc (bad bank) in 2010; good-bank sold to Virgin Money in January 2012 for ~£747m.

  '
enacted_by:
- uk_brown_labour_2007_2010
coalition_label_at_enactment: Labour
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Statutory takeover and later resolution framework expanded state role in bank resolution.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Public capital injections; net fiscal cost eventually small.
references:

description: 'The 26 April 2023 Washington Declaration between President Yoon and President Biden established a bilateral Nuclear Consultative Group, scheduled US SSBN port calls to Korea (first such since
  the 1980s), and reaffirmed extended deterrence in exchange for Korea''s explicit non-nuclear commitment. Followed by the 18 August 2023 Camp David summit with Japan''s PM Kishida producing the trilateral
  Camp David Principles, Spirit, and Commitment — institutionalising annual trilateral summits, joint military exercises, information-sharing on DPRK missile launches, and supply-chain resilience coordination.
  Strongest US-Japan-Korea alignment since 1965 normalisation.

  '

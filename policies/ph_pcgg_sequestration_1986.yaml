policy_id: ph_pcgg_sequestration_1986
status: candidate
title: PCGG sequestration of Marcos ill-gotten wealth (Philippines 1986)
countries:
- PHL
timeframe:
  start: 1986
  end: 1987
  enacted_date: '1986-02-28'
description: 'Presidential Commission on Good Government established 28 Feb 1986 under EO 1 by Corazon Aquino. Tasked with recovering ill-gotten wealth of the Marcoses and their associates. Issued sequestration
  orders on >400 companies including UCPB, San Miguel, PTIC (PLDT parent). Sequestrations ruled compatible with due process by the Supreme Court (Bataan Shipyard v PCGG 1987). Recovered ~USD4bn through
  2021.

  '

description: 'Finance Act 1987 established tax regime for the International Financial Services Centre at Dublin Docklands — 10% corporate tax rate for qualifying activities. Conceived under FitzGerald government;
  formal launch by Haughey government after February 1987 election. Anchored Ireland''s subsequent transformation into major back-office financial-services location, complementary to the broader low-corporate-tax
  regime that later attracted FDI (Apple, Google, Facebook).


policy_id: kenya_free_primary_education_2003
status: candidate
title: Kenya Free Primary Education 2003
countries:
- KEN
timeframe:
  start: 2002
  end: 2013
description: 'The NARC government under Mwai Kibaki abolished primary-school tuition fees from January 2003, delivering on a flagship campaign pledge with funding from general revenue topped up by donor
  basket support. Enrolment surged by an estimated 1.3-1.5 million additional pupils within months, prompting parallel investments in textbooks, teachers and school grants under the Kenya Education Sector
  Support Programme.

  '
enacted_by:
- kenya_kibaki_vision_2030_2002_2013

  rationale: Demand surge created room for low-cost private-school market entry alongside public expansion.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Fee abolition is a per-pupil in-kind transfer to households with school-age children.
- axis: fiscal.spending_level
  direction: +

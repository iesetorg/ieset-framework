description: 'Executive Order No. 273 signed 25 Jul 1987 under President Aquino''s legislative powers (pre-Congress reconvening) introduced a 10% Value Added Tax effective 1 Jan 1988, replacing a patchwork
  of turnover and excise taxes. Simplified indirect-tax system; expanded revenue base; aligned Philippines with the VAT-adoption wave of 1980s developing countries.

  '

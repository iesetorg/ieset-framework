policy_id: de_heizungsgesetz_geg_2023
status: candidate
title: Heizungsgesetz — Gebäudeenergiegesetz amendment mandating 65% renewable heating 2023
countries:
- DEU
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-09-08'
description: 'Amendment to the Gebäudeenergiegesetz (GEG) requiring that every newly installed heating system in Germany from 2024 use at least 65% renewable energy (effectively mandating heat pumps, biomass,
  solar thermal, or district heat for new installations in new-build areas, with longer transition periods in existing buildings and contingent on municipal heat-planning rollout). Drafted under Green Economy
  Minister Robert Habeck, severely watered down in Bundestag deliberation summer 2023, coupled with Heizkostenzuschuss means-tested subsidies up to 70% of replacement cost. Politically the most damaging
  Ampel policy in 2023 polling; identified in Forschungsgruppe Wahlen surveys as a primary driver of Ampel collapse in approval.

  '
enacted_by:
- germany_scholz_ampel_2021_2025
coalition_label_at_enactment: SPD-Greens-FDP Ampel

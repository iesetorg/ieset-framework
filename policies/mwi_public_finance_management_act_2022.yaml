policy_id: mwi_public_finance_management_act_2022
status: candidate
title: Malawi Public Finance Management Act 2022
countries:
- MWI
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-03-31'
description: >
  Malawi's Public Finance Management Act, 2022 repealed the 2003 framework and
  restated national rules for budget preparation, Treasury authority, cash and
  debt management, commitment controls, reporting, and public-body financial
  accountability. The Act established the Treasury architecture, the Treasury
  Single Account system, debt-management provisions, and reporting duties that
  later IMF-supported programmes treated as part of the fiscal-governance
  reform base.
enacted_by:
- malawi_cost_reflective_macro_stabilisation_2012_present
scope: national
coalition_label_at_enactment: Malawi Congress Party Chakwera government
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: The Act codified budget, Treasury, reporting, and accountability procedures for public entities.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Commitment controls, cash management, and debt-management rules were designed to restrain arrears and off-budget fiscal slippage.
references:
- "MalawiLII, Public Finance Management Act, 2022 (Act 4 of 2022): https://malawilii.org/akn/mw/act/2022/4/eng@2022-03-31"
- "IMF, Malawi request for an arrangement under the Extended Credit Facility, 2023."

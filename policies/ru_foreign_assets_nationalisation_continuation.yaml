policy_id: ru_foreign_assets_nationalisation_continuation
status: candidate
title: Russia continuation of temporary management of foreign-owned assets
countries:
- RUS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-03'
description: 'During Putin''s fifth term Russia continued the post-2023 practice of placing selected foreign-owned Russian assets under temporary state management or forcing exits through heavily discounted
  approval procedures. The continuation affected the investment climate beyond the original 2023 emergency decree by keeping foreign equity subject to discretionary state control, official exit approval,
  and transfer to state-connected or approved domestic managers. The December 2024 settlement of Carlsberg''s Baltika exit illustrated the fifth-term pattern: a foreign owner could recover operational control
  only through a Russian-approved sale after earlier temporary management by state authorities.'
enacted_by:
- russia_putin_fifth_term_2024_present
coalition_label_at_enactment: United Russia / Putin fifth term
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Foreign-owned assets remained vulnerable to temporary management orders and mandatory discounted exits approved by Russian authorities.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Exit approvals and asset transfers favoured state-approved domestic owners, reducing open contestability in affected sectors.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The continuation entrenched separation from Western investment channels and discouraged foreign direct investment.
references:
- Presidential Decree No. 302 of 25 April 2023, On temporary management of certain property, and subsequent annex amendments
- 'Wall Street Journal, Carlsberg Sells Russian Baltika Breweries Business, 3 December 2024: https://www.wsj.com/business/deals/carlsberg-sells-russian-baltika-breweries-business-7431d42b'

policy_id: us_nlrb_cemex_joint_employer_2022_2024
status: candidate
title: Nlrb Cemex Joint Employer 2022 2024
countries:
- USA
timeframe:
  start: 2021
  end: 2025
description: 'In Cemex Construction Materials Pacific (Aug 2023) the National Labor Relations Board adopted a framework requiring employers to recognize unions absent a successful Board-conducted election
  upon majority signed-card showing, alongside the 2023 final joint-employer rule replacing the 2020 Trump-era standard with a broader test under which entities exercising indirect or reserved control over
  essential terms become joint employers. Together these actions substantially expanded union-recognition pathways and joint-employer liability under the NLRA.

  '

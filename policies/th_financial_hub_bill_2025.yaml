policy_id: th_financial_hub_bill_2025
status: candidate
title: Financial Hub Bill 2025
countries:
- THA
timeframe:
  start: 2024
  end: ongoing
description: 'The Financial Hub Bill drafted by the Ministry of Finance under the Paetongtarn Pheu Thai government proposes to designate Bangkok as a regional financial centre with a dedicated regulator,
  preferential corporate tax rates, expedited foreign-professional licensing, and ringfenced legal arbitration. The bill targets attracting wealth managers, fintech, treasury operations and global fund
  managers in competition with Singapore and Hong Kong.

  '

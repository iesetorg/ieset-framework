policy_id: zambia_privatisation_agency_1992
status: candidate
title: Zambia Privatisation Agency 1992
countries:
- ZMB
timeframe:
  start: 1991
  end: 2001
description: 'The Privatisation Act of 1992 established the Zambia Privatisation Agency (ZPA) as a statutory body charged with divesting some 280 parastatals inherited from the Kaunda era. ZPA prepared
  enterprises for sale through valuation, restructuring, and tendering, and oversaw the trust-sale programme covering hotels, manufacturing, and agro-processing entities. The agency was widely cited as
  one of sub-Saharan Africa''s earliest dedicated privatisation institutions.

  '
enacted_by:
- zambia_msunwe_structural_adjustment_1991_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Divested parastatals into private hands, eroding state-owned monopoly positions in manufacturing and services.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Sold parastatals to foreign investors, integrating Zambian production into global supply chains.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removed loss-making parastatals from treasury bailout cycle and recurrent subvention budgets.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Conveyed clear titles via tendered sale processes, replacing diffuse state ownership with private equity holders.

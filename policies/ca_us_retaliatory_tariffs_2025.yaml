policy_id: ca_us_retaliatory_tariffs_2025
status: candidate
title: Canada — Retaliatory tariffs on US imports (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-04'
description: 'Canadian countermeasure tariffs in response to US tariffs imposed under the Trump administration (25% on Canadian goods and 10% on Canadian energy/potash, effective 4 March 2025 under IEEPA,
  subsequently modified and partially delayed for CUSMA-compliant goods). First Canadian tranche: 25% tariffs on C$30B of US imports effective 4 March 2025 covering agricultural products, consumer goods,
  steel/aluminium derivatives. Announced second tranche on a further ~C$125B of US imports to take effect in stages if US tariffs persisted. Sectoral escalation included 25% tariffs on US-made vehicles
  not CUSMA-compliant in response to US auto tariffs (April 2025), plus matching steel and aluminium countermeasures. Tariff revenue earmarked in announcements for worker and sectoral support programmes.
  Transition of leadership from Trudeau to Carney (14 March 2025) occurred during escalation; Carney government retained and extended the measures.

  '
enacted_by:
- canada_trudeau_2015_present
- canada_carney_liberal_2025_present
coalition_label_at_enactment: Liberal Party minority (Trudeau and Carney)
axes_moved:

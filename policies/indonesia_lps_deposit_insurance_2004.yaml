policy_id: indonesia_lps_deposit_insurance_2004
status: candidate
title: Indonesia Lps Deposit Insurance 2004
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Law No. 24/2004 established the Lembaga Penjamin Simpanan (LPS), Indonesia''s deposit insurance corporation, replacing the post-crisis blanket guarantee with a phased, capped scheme funded
  by bank premia. The agency assumed bank-resolution authority alongside Bank Indonesia and OJK and provided the credibility anchor allowing the gradual unwinding of crisis-era guarantees without fresh
  deposit flight.

  '
enacted_by:
- indonesia_reformasi_1998_present
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Distinct deposit-insurance authority insulated BI from bank-failure resolution decisions.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Phased exit from blanket guarantee allowed market-priced risk differentiation across banks.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Equal-access deposit guarantee reduced advantage of state-owned banks vs. private competitors.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Implicit fiscal backstop to depositors institutionalised through capped insurance scheme.

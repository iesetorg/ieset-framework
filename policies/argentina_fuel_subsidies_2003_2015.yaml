policy_id: argentina_fuel_subsidies_2003_2015
status: candidate
title: Argentina Fuel Subsidies 2003 2015
countries:
- ARG
timeframe:
  start: 2003
  end: 2015
description: 'System of energy and transport subsidies expanded under the Kirchner and Fernández de Kirchner governments, holding domestic gas, electricity, and public-transport fares well below import-parity
  costs through transfers to CAMMESA and ENARSA. Funded primarily by Treasury transfers and BCRA monetary financing, the regime peaked at roughly 3-4% of GDP and became a central source of fiscal pressure
  and chronic energy under-investment.

  '
enacted_by:
- kirchner_fernandez_expansionary_2003_2015
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Treasury transfers to CAMMESA/ENARSA grew to roughly 3-4% of GDP at peak.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Subsidised utility tariffs functioned as a broad cross-class household income transfer.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Frozen tariffs and price caps suppressed investment and competitive entry in upstream energy.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCRA monetisation of Treasury transfers financed the subsidy bill, eroding monetary autonomy.

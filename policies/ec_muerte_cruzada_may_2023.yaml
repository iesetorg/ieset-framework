description: 'Decreto Ejecutivo 741 of 17 May 2023, the first-ever invocation of Article 148 of the 2008 Constitution ("muerte cruzada"). President Lasso dissolved the National Assembly mid-impeachment
  over the Caso Encuentro allegations, triggering early presidential and legislative elections (Aug 2023 first round, Oct 2023 runoff). The Executive governed by decretos-ley económicos urgentes subject
  to Constitutional Court review for ~15 weeks.

  '

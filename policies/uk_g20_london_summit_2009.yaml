description: 'London G20 Summit hosted by PM Gordon Brown produced a communique committing members to $1.1tn of additional IMF and multilateral-development-bank resources (incl. trebling IMF lending capacity
  to $750bn, $250bn SDR allocation, $250bn trade-finance pledges), anti-protectionism commitments, establishment of the Financial Stability Board (upgrading the FSF), and a push on tax-haven transparency
  (OECD grey/black-list publication on the summit day). A pivotal international-coordination moment arresting the collapse of trade finance in early 2009.

  '

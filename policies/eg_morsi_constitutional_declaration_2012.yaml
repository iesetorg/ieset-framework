description: 'Presidential Constitutional Declaration issued 22 November 2012 placing Morsi''s decisions beyond judicial review until the adoption of a new constitution, protecting the Shura Council and
  Constituent Assembly from dissolution by the courts, dismissing the sitting Prosecutor General and appointing a replacement, and ordering retrials of Mubarak-era figures. Triggered the judges'' strike,
  mass Tahrir Square protests, and formation of the National Salvation Front opposition bloc. The most contested articles were rescinded 8 December 2012, but the rushed constitutional referendum (15 and
  22 December 2012; 63.8% yes on ~33% turnout) proceeded.

  '

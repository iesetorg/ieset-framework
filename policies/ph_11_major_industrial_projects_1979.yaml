description: 'Government-announced programme 1979 for 11 major industrial projects (integrated steel mill, copper smelter, aluminium smelter, phosphate fertiliser, petrochemical complex, diesel-engine manufacturing,
  pulp and paper, cement, coconut industry, heavy engineering, and Bataan Nuclear Power Plant). Financed largely by foreign commercial borrowing. Most stalled or abandoned 1983-1984 after debt crisis; Bataan
  Nuclear Plant completed 1984 never operated.

  '

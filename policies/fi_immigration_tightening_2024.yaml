policy_id: fi_immigration_tightening_2024
status: candidate
title: Immigration Tightening 2024
countries:
- FIN
timeframe:
  start: 2023
  end: ongoing
description: 'Finland''s 2024 immigration-tightening package, advanced by the Orpo right-bloc coalition through amendments to the Aliens Act (HE 26/2024 and others), tightened residence-permit conditions,
  raised income thresholds for family reunification, accelerated removals, and amended citizenship law to extend residency requirements. Companion legislation tightened access to social benefits for newly
  arrived non-citizens. The intended effect was to reduce non-EU immigration, strengthen border control, and reduce welfare-magnet incentives.

  '
enacted_by:
- finland_orpo_rightbloc_2023_present
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Stricter benefit access for new arrivals reduced welfare outlays at the margin.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher income thresholds and benefit waiting periods curtailed transfer access for migrants.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Tighter migration paired with companion labour reforms raised effective hiring flexibility for residents.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher thresholds, faster removals, and stricter citizenship rules unambiguously tightened immigration openness.

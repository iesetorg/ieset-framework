policy_id: at_refugee_reception_2015_2016
status: candidate
title: Austrian 2015-2016 refugee reception and Obergrenze
countries:
- AUT
timeframe:
  start: 2015
  end: 2016
  enacted_date: '2015-09-05'
description: 'Austria processed an estimated 90,000 asylum claims in 2015 (~1% of population) during the Balkan-route crisis. After initial open reception in Sep 2015, the Faymann government imposed an
  annual cap ("Obergrenze") of 37,500 asylum claims in Jan 2016 and helped coordinate Balkan-route closure. Coalition pressure contributed to Faymann''s May 2016 resignation.

  '
enacted_by:
- austria_faymann_spo_ovp_2008_2016
coalition_label_at_enactment: SPOe-OeVP
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: 2015 reception one of the highest per-capita in EU.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Jan 2016 Obergrenze cap and Balkan-route closure coordination sharply restricted flows.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: false
  rationale: Reception costs and integration spending raised expenditure.
references:
- Regierungsbeschluss Obergrenze 20 Jan 2016

policy_id: ar_afjp_nationalisation_2008
status: candidate
title: AFJP private-pension nationalisation — SIPA creation
countries:
- ARG
timeframe:
  start: 2008
  enacted_date: '2008-12-09'
description: 'Ley 26.425 (9 Dec 2008) abolished private-pension system (AFJPs, operating since 1994 Menem reform) and absorbed ~USD 30bn accumulated assets into Sistema Integrado Previsional Argentino (SIPA)
  run by ANSES. Immediate cash-flow use: pension outlays + Treasury financing via Guaranteed Sustainability Fund (FGS). Enabled counter-cyclical 2009 spending but impaired pension-system financial sustainability
  long-term.

  '

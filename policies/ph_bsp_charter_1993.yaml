description: 'Republic Act 7653 (New Central Bank Act) signed 14 Jun 1993 created Bangko Sentral ng Pilipinas replacing the old Central Bank of the Philippines, which had accumulated large foreign-exchange
  losses under 1980s crisis management. BSP granted statutory operational independence, 7-year governor term, and mandate focused on price stability. Old CB liabilities ring-fenced; Central Bank-Board of
  Liquidators handled legacy losses.

  '

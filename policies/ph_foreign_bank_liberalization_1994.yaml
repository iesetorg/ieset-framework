description: 'RA 7721 signed 18 May 1994 permitted up to 10 new foreign bank branches/subsidiaries to enter Philippine banking market (ending nearly 50-year de facto freeze on foreign-bank entry). Raised
  single-foreign-bank equity limit in local banks to 60%. Strengthened banking competition and introduced modern prudential standards.

  '

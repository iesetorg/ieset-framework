policy_id: ng_sovereign_wealth_fund_nsia_2011
status: candidate
title: Nigeria Sovereign Investment Authority (NSIA)
countries:
- NGA
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-05-26'
description: 'The Nigeria Sovereign Investment Authority Act signed 26 May 2011 established the NSIA to manage three ring-fenced funds: a Stabilisation Fund, a Future Generations Fund, and the Nigeria Infrastructure
  Fund. Seeded with $1bn in 2012. Intended to replace the legally-contested Excess Crude Account by anchoring oil-windfall savings in statute. Governors-Forum resisted full transition, so ECA persisted
  in parallel. NSIA survived subsequent administrations with reported AUM of $2.6bn by 2023.

  '

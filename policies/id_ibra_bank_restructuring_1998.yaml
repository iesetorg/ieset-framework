policy_id: id_ibra_bank_restructuring_1998
status: candidate
title: Indonesia Bank Restructuring Agency (IBRA/BPPN) programme (1998-2004)
countries:
- IDN
timeframe:
  start: 1998
  end: 2004
  enacted_date: '1998-01-26'
description: 'Indonesian Bank Restructuring Agency (BPPN) established 26 January 1998 under Keppres 27/1998 to resolve banking-sector crisis. Tasks: take over control of distressed banks, manage recapitalisation
  process, collect BLBI emergency-liquidity loans from controlling shareholders, dispose of NPL and corporate assets. Took over 54 banks, closed 67 small banks, nationalised 4 large banks (BCA, Danamon,
  Bank Niaga, Bank Bali), merged 9 banks into Bank Mandiri. Recapitalisation- bond stock placed in banks ~Rp 650tn (~50% of GDP). BCA sold to Farallon Capital-Djarum February 2002 for ~$530m. Agency wound
  up 27 February 2004.

  '
enacted_by:
- indonesia_habibie_transition_1998_1999
- indonesia_wahid_reformasi_1999_2001
- indonesia_megawati_pdip_2001_2004
coalition_label_at_enactment: Successive post-Suharto governments
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: ~Rp 650tn bank recapitalisation bond stock; fiscal cost of crisis ~50% of GDP.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Consolidation of supervisory authority, Basel capital enforcement, bank-ownership restrictions.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Shareholder wipeouts and forced-merger programmes created near-term expropriation-risk perception.
references:

policy_id: mexico_pacto_de_solidaridad
status: candidate
title: Mexico Pacto De Solidaridad
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'The Pacto de Solidaridad Económica, launched in December 1987 by the De la Madrid government and extended under Salinas as the Pacto para la Estabilidad y el Crecimiento Económico, was a heterodox
  stabilisation accord among government, business chambers, labour, and farmers. It froze the peso, controlled key prices and wages, and locked in fiscal restraint to break the inflationary inertia that
  followed the 1982 debt crisis, providing the macro foundation for subsequent NAFTA-era reforms.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: The Pacto's price stabilisation was paired with unilateral tariff reductions and GATT-aligned trade liberalisation commitments.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Tripartite price/wage discipline accompanied removal of import licences and price controls in tradable goods.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Successful disinflation restored predictability of nominal contracts and strengthened the de facto value of property and credit claims.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Pacto-induced disinflation laid the credibility foundation for the subsequent 1993-1994 Banxico autonomy reform.

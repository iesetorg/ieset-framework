policy_id: italy_amato_irpef_reform_2000
status: candidate
title: Italy Amato Irpef Reform 2000
countries:
- ITA
timeframe:
  start: 1998
  end: 2001
description: 'The Amato government''s 2000 personal-income-tax (IRPEF) reform reduced the number of statutory brackets and modestly cut top marginal rates, broadened the family-deduction system, and expanded
  refundable allowances for low-income workers. Funded by Italy''s improving fiscal position post-euro qualification, the reform was framed as growth-friendly tax relief consistent with Olive Tree commitments
  to support middle-class incomes while maintaining the Maastricht-era deficit path.

  '

policy_id: spain_gender_violence_law_2004
status: candidate
title: Spain Gender Violence Law 2004
countries:
- ESP
timeframe:
  start: 2004
  end: 2008
description: 'Ley Orgánica 1/2004 de Medidas de Protección Integral contra la Violencia de Género was the first Zapatero-government legislation passed by acclamation in December 2004. It established specialised
  Juzgados de Violencia sobre la Mujer courts, gender-specific aggravating circumstances in the Penal Code, and a coordinated victim-support, training, and prevention infrastructure under a Government Delegation.

  '
enacted_by:
- spain_zapatero_psoe_first_2004_2008
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Specific protection clauses extended legal residency safeguards to migrant women victims.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Created new victim-support stipends and judicial-system funding for protection orders.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme financing came from general budget; no progressivity-specific channel in this law.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Imposed mandatory employer obligations (paid leave for victims) raising effective firm costs.

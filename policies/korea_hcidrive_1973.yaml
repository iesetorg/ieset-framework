title: Korea Hcidrive 1973
countries:
- KOR
timeframe:
  start: 1961
  end: 1979
description: 'The Heavy and Chemical Industrialisation (HCI) Drive, announced by President Park in January 1973, designated steel, non-ferrous metals, shipbuilding, machinery, electronics and petrochemicals
  as strategic industries. The state mobilised concentrated policy loans, the National Investment Fund established in 1974, and tax/tariff incentives — alongside large public projects such as POSCO and
  the Changwon machinery complex — to accelerate capital deepening over 1973-79.

  '

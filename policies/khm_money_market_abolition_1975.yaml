# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: khm_money_market_abolition_1975
status: candidate
title: Abolition of Money, Markets, and Private Commerce
countries:
- KHM
timeframe:
  start: 1975
  end: 1979
description: The Khmer Rouge closed banks, abolished money in domestic circulation, banned private commerce, and organised distribution through state and cooperative channels. This removed price-mediated exchange from most domestic economic life and made access to goods depend on command allocation by party and commune authorities.
enacted_by:
- khm_khmer_rouge_democratic_kampuchea_1975
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Legal markets and private trading were abolished rather than merely regulated.
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Private commercial assets, financial claims, and household exchange rights were nullified.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Monetary institutions were closed and money was subordinated to command allocation.
references:
- David P. Chandler (1991), The Tragedy of Cambodian History
- Ben Kiernan (2008), The Pol Pot Regime

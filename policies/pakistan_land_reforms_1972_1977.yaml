policy_id: pakistan_land_reforms_1972_1977
status: candidate
title: Pakistan Land Reforms 1972 1977
countries:
- PAK
timeframe:
  start: 1972
  end: 1977
description: 'Two waves of land reform under Zulfikar Ali Bhutto''s PPP government (Land Reforms Regulation 1972 and the 1977 amendments) lowered statutory ceilings on individual landholdings, expropriated
  above-ceiling acreage from large zamindars, and redistributed plots to tenants and small cultivators. Implementation was uneven — exemptions, intra-family transfers, and weak enforcement blunted redistribution
  — but the reforms reshaped rural property rights and accompanied broader nationalisations of industry and finance.

  '

policy_id: es_frob_cajas_consolidation_2009
status: candidate
title: Frob Cajas Consolidation 2009
countries:
- ESP
timeframe:
  start: 2008
  end: 2011
description: 'Royal Decree-Law 9/2009 created the Fondo de Reestructuración Ordenada Bancaria (FROB) with EUR 9bn capital and authority to inject capital, broker mergers, and ultimately resolve weak cajas.
  Combined with Royal Decree-Law 11/2010 on caja governance, the FROB drove consolidation from 45 to fewer than 15 cajas via Sistemas Institucionales de Protección and bilateral mergers.

  '
enacted_by:
- spain_zapatero_ii_psoe_2008_2011
axes_moved:
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Capital injections raised contingent liabilities while operating cuts trimmed primary outlays.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Caja "obra social" community-grant programmes shrank as profitability eroded under restructuring.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: New governance and capital rules tightened oversight of previously politically captured cajas.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Mergers triggered ERE redundancies and branch closures across consolidating caja networks.

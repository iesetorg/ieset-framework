policy_id: th_war_on_drugs_2003
status: candidate
title: Thailand War on Drugs extrajudicial campaign (2003)
countries:
- THA
timeframe:
  start: 2003
  end: 2003
  enacted_date: '2003-02-01'
description: 'Three-month "War on Drugs" campaign February-April 2003 declared by PM Thaksin targeting methamphetamine trafficking. Official casualty count: ~2,500 deaths in first three months attributed
  to drug dealers in gang rivalries or police encounters; Human Rights Watch and subsequent 2007 Kamnuan Committee investigation concluded majority were extrajudicial killings including many not on any
  drug-blacklist. Paired with "shoot-to-kill" rhetoric and no-tolerance policing. Bodies often dumped to obscure responsibility. No police convictions during Thaksin term. Repeated in later anti-drug campaigns
  2004-2005. Canonical Thaksin-era rule-of-law regression event.

  '
enacted_by:
- thailand_thaksin_trt_2001_2006
coalition_label_at_enactment: Thai Rak Thai

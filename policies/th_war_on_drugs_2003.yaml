  intended: true
  rationale: ~2,500 extrajudicial killings under official campaign; no accountability; explicit executive sanction.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Prosecution of police officers blocked during Thaksin term.

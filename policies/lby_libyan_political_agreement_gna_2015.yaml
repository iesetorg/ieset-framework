policy_id: lby_libyan_political_agreement_gna_2015
status: candidate
title: Libyan Political Agreement and Government of National Accord 2015
countries:
- LBY
timeframe:
  start: 2015
  end: 2021
  enacted_date: '2015-12-17'
description: 'The UN-brokered Libyan Political Agreement signed at Skhirat created a Presidency Council and Government of National Accord, recognised roles for the House of Representatives and State Council,
  and set an interim framework for executive authority, security arrangements, and constitutional transition. It provided a legal architecture for international recognition but did not dissolve rival armed
  coalitions or produce full national administrative control.

  '
enacted_by:
- libya_fragmented_institutions_central_bank_rent_management_2014_present
coalition_label_at_enactment: UN-brokered agreement among Libyan dialogue participants and rival institutions
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The agreement created a formal interim executive framework and recognition rules.
- axis: institutional.judicial_independence
  direction: '0'
  magnitude: weak
  intended: false
  rationale: The agreement was institutional rather than a direct court-governance reform.
references:
- UNSMIL, Libyan Political Agreement, Skhirat, 17 December 2015
- UN Security Council Resolution 2259 (2015)
- UNSMIL reporting on Government of National Accord formation
notes: Coded narrowly as an interim institutional framework; it should not be read as successful unification of Libyan governance.

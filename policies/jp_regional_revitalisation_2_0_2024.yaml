policy_id: jp_regional_revitalisation_2_0_2024
status: candidate
title: Japan — Regional Revitalisation 2.0 framework (2024)
countries:
- JPN
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-24'
description: 'Ishiba-era relaunch of regional revitalisation (chihō sōsei) policy, framed as Regional Revitalisation 2.0 to distinguish it from the original Abe-era 2014 programme. Adopted by Cabinet decision
  on 24 December 2024 as a Basic Policy, with a doubled annual budget target over ten years (roughly ¥2tn/year at steady state), reinforced subsidies to municipalities for population-retention measures,
  a new "Regional Revitalisation 2.0 Grant" broader than the prior chihō sōsei kōfukin, expanded DX (digital transformation) and inbound-tourism support, and consolidation of overlapping rural subsidy programmes.
  Ishiba, a former Minister in Charge of Overcoming Population Decline and Vitalising the Local Economy (2014-2016), positioned the framework as a signature priority.

  '

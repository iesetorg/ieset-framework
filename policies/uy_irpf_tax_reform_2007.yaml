policy_id: uy_irpf_tax_reform_2007
status: candidate
title: Uruguay personal income tax reform — IRPF Ley 18.083
countries:
- URY
timeframe:
  start: 2007
  enacted_date: '2007-07-01'
description: 'Ley 18.083 (27 Dec 2006, entered force 1 Jul 2007) replaced flat Impuesto a las Retribuciones Personales (IRP) with progressive Impuesto a la Renta de las Personas Físicas (IRPF) + Impuesto
  a la Renta de No Residentes (IRNR). Dual-income structure — labour income on progressive brackets 10-25% (later 36% top rate 2017), capital income at flat 12% (later 12%/25% sliding). First progressive
  personal-income tax in modern Uruguayan history. Paired with VAT rate reduction 23% → 22%, simplified business-tax IRAE.

  '
enacted_by:
- uruguay_vazquez_i_fa_2005_2010
coalition_label_at_enactment: Frente Amplio

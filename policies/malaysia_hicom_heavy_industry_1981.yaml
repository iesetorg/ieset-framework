policy_id: malaysia_hicom_heavy_industry_1981
status: candidate
title: Malaysia Hicom Heavy Industry 1981
countries:
- MYS
timeframe:
  start: 1981
  end: 2003
description: 'Heavy Industries Corporation of Malaysia (HICOM) was incorporated in 1980 and became the vehicle for Mahathir''s heavy-industrial push from 1981, anchoring projects in steel (Perwaja), automobiles
  (Proton), cement, and motorcycles via state equity, directed credit, and trade protection. The model drew on Japanese/Korean developmental templates — picking national champions, shielding them with tariffs
  and procurement preferences — and ran in parallel with the Bumiputera economic agenda before partial privatisation in the 1990s.

  '
enacted_by:
- malaysia_mahathir_bumiputera_development_1981_2003
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: HICOM funnelled state equity, concessional credit, and procurement preferences into designated heavy-industry champions.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Tariff walls protected Proton and Perwaja while components and capital goods were imported under licensed regimes.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Directed lending from state banks to HICOM ventures formalised credit allocation rather than market pricing.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sectoral licences and exclusivity grants for HICOM champions restricted entry in steel, autos, and cement.

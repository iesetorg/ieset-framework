policy_id: lt_second_pillar_pension_reform_2026
status: candidate
title: Lithuania second-pillar pension reform 2026
countries:
- LTU
timeframe:
  start: 2026
  end: ongoing
description: 'Lithuania approved changes to the second-pillar pension system taking effect from 2026. The reform makes participation more voluntary, gives participants periodic exit and contribution-pause
  rights, preserves incentives for continued saving, and coordinates opt-out treatment with the public Sodra pension system, shifting the private pension pillar away from automatic lock-in.

  '
enacted_by:
- lithuania_simonyte_paluckas_defence_social_reform_2024_present
scope: national
coalition_label_at_enactment: Paluckas Social Democratic-led coalition
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Exit windows and contribution-pause rights loosen mandatory private-pension lock-in rules.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Participants receive clearer individual control over accumulated second-pillar savings and participation status.
- axis: fiscal.transfer_expansion
  direction: mixed
  magnitude: weak
  intended: true
  rationale: The reform preserves public incentives for saving while redirecting some opt-out treatment back into public pension entitlements.
references:

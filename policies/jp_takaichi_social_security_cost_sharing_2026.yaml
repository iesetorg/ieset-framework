policy_id: jp_takaichi_social_security_cost_sharing_2026
status: candidate
title: Japan FY2026 social-security cost-sharing and financial-income contribution reform
countries:
- JPN
timeframe:
  start: 2026
  end: ongoing
  enacted_date: '2025-12-26'
description: 'The FY2026 budget paired higher medical, long-term-care, and disability welfare service fees with reforms intended to contain working-age social insurance contribution burdens. Measures included
  phased increases in some high-cost medical expense ceilings, separate patient payment for selected over-the-counter-equivalent medicines from 2027, exclusion of specified food-like drugs from insurance
  benefits from June 2026, and a bill to reflect listed-share dividends and similar financial income in elderly health-care cost-sharing and contributions. The package therefore combines provider payment
  and wage support with tighter benefit/cost-sharing rules.

  '

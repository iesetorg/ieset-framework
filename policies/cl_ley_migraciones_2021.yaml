policy_id: cl_ley_migraciones_2021
status: candidate
title: Ley Migraciones 2021
countries:
- CHL
timeframe:
  start: 2018
  end: 2022
description: 'Ley 21.325 de Migración y Extranjería signed in April 2021 under the second Piñera government, replacing the 1975 immigration decree-law. Introduced consular-only pre-arrival visa requirements
  (eliminating the prior tourism-to-residency conversion route), a new categorical visa system, and expedited expulsion procedures, tightening the legal regime amid rising Venezuelan and Haitian inflows.

  '
enacted_by:
- chile_pinera_ii_2018_2022
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter migration limited the migrant labour base for some sectors, indirectly affecting the corporate tax base.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Created formal residency-status entitlements that gradually expanded transfer eligibility for regularised migrants.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Implementation costs included a new Servicio Nacional de Migraciones and expanded enforcement budget.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminating in-country visa conversion and expanding expulsion grounds tightened the migration regime.

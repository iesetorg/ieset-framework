policy_id: bolivia_renta_dignidad_2008
status: candidate
title: Bolivia Renta Dignidad 2008
countries:
- BOL
timeframe:
  start: 2006
  end: 2019
description: 'Renta Dignidad, established under Law 3791 of 2007, is Bolivia''s universal non-contributory old-age pension paid monthly to all citizens aged 60 and over, financed primarily by direct taxes
  on hydrocarbons (IDH) and dividends from nationalised firms. It replaced the earlier BONOSOL programme and integrates with the MAS-era extractivist redistribution model. The intended effect is to floor
  elderly poverty and broaden the social citizenship of the rural and informal-sector elderly, while transmitting hydrocarbon rents directly to households.

  '
enacted_by:
- bolivia_mas_extractivist_2006_2019
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme tied to the post-2006 hydrocarbon nationalisation regime, which expanded sectoral licensing controls.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Pension is funded out of earmarked hydrocarbon and SOE-dividend revenues, channelling sectoral rents to households.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Universal cash pension to citizens aged 60+ is a direct, demogrant-style transfer expansion.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Adds a permanent line of social spending financed by ring-fenced extractive revenues, raising the spending floor.

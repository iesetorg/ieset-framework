policy_id: fi_competitiveness_pact_2016
status: candidate
title: Finland Kilpailukykysopimus (Competitiveness Pact) 2016
countries:
- FIN
timeframe:
  start: 2016
  enacted_date: '2016-06-14'
description: 'Tripartite agreement signed 14 June 2016 between the Sipilä government, employer federations (EK) and trade union confederations (SAK, STTK, Akava) to reduce Finnish unit labour costs by approximately
  4 percent relative to euro-area competitors. Key elements: annual working time extended by 24 hours without compensation; a one-year wage freeze across sectoral agreements; shift of roughly 0.85 percentage
  points of social-security contributions from employers to employees phased 2017-2020; temporary 30 percent cut to public-sector holiday bonuses 2017-2019. Motivated by Finland''s loss of cost competitiveness
  vis-a-vis Sweden and Germany after the Nokia contraction, 2012-2015 recession and 2014 Russian-sanction shock. Coverage reached ~91 percent of wage earners via sectoral ratifications.

  '
enacted_by:
- finland_sipila_centrist_2015_2019
coalition_label_at_enactment: Centre-NCP-Finns Party tripartite agreement
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  rationale: Hours extension, wage freeze, contribution shift lowered unit labour costs ~4%; extended employer flexibility.
  intended: true
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  rationale: Employer-to-employee contribution shift plus public-sector holiday-bonus cuts reduce net compensation transfer.
  intended: true

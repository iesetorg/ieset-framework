policy_id: kr_chun_price_stabilisation_1981
status: candidate
title: Chun price stabilisation programme (South Korea 1981)
countries:
- KOR
timeframe:
  start: 1981
  end: 1984
description: 'Economic Planning Board-led comprehensive price stabilisation from 1981 under Kim Jae-ik: zero-base budgeting, public-sector wage freezes, private-sector wage guidelines (below productivity
  growth), grain-price restraint, tight Bank of Korea stance. CPI inflation cut from 28.7% (1980) to 7.2% (1982) to 3.4% (1983), anchoring the 1983-1988 export boom. Canonical stabilisation case cited by
  World Bank/IMF in East Asian growth analyses.

  '
enacted_by:
- skorea_chun_doo_hwan_military_1980_1988
coalition_label_at_enactment: Democratic Justice Party (Chun)
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  intended: true
  rationale: BOK tight stance and wage/price guidelines cut CPI inflation from ~29% to ~3%.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Zero-base budgeting kept fiscal deficit near balance 1982-1984.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Wage guidelines + labour repression suppressed collective bargaining; flexibility in employer terms rose.
references:

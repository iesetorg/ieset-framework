description: The Union Budget 2026-27, presented by Finance Minister Nirmala Sitharaman on 1 February 2026, framed the second full Modi-third-term budget around productivity, import-dependency reduction,
  and continued fiscal consolidation. It proposed ISM 2.0 for semiconductor equipment, materials, full-stack Indian IP and supply-chain resilience; expanded the Electronics Components Manufacturing Scheme
  outlay to INR 400 billion; launched a INR 100 billion container-manufacturing scheme; proposed Biopharma SHAKTI with INR 100 billion over five years; and announced rare-earth corridors for mineral-rich
  states. The speech also reported a reform drive covering GST simplification, notification of Labour Codes, and rationalisation of mandatory Quality Control Orders.

description: 'Loi n° 2008-776 du 4 août 2008. Reformed firm-formation procedures (creating the auto-entrepreneur regime), liberalised retail pricing (négociabilité des conditions générales de vente), eased
  commercial zoning for retail stores above threshold, reformed the Autorité de la concurrence, and simplified very-small-business accounting obligations.

  '

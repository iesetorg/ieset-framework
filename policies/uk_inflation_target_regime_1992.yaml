policy_id: uk_inflation_target_regime_1992
status: candidate
title: Inflation Target Regime 1992
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'Following sterling''s ejection from the ERM, Chancellor Norman Lamont announced a 1–4% RPIX inflation target on 8 October 1992, the UK''s first explicit numerical inflation objective. The
  framework added published Inflation Reports (1993), regular Bank/Treasury monetary meetings ("Ken and Eddie show"), and provided the conceptual basis for full Bank of England operational independence
  in 1997 under the Bank of England Act 1998.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Published Inflation Reports and target framework increased Bank's de facto policy authority pre-1997.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Anchored inflation expectations reduced macro uncertainty premium for entrants and investors.
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Inflation targeting is a monetary regime; direct distributional tax effects were absent.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Credibility of the framework lowered debt-service costs, easing constraint on public outlays.

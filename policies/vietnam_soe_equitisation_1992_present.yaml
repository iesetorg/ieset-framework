policy_id: vietnam_soe_equitisation_1992_present
status: candidate
title: Vietnam Soe Equitisation 1992 Present
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
description: 'Beginning with a 1992 pilot programme, Vietnam launched its long-running "equitisation" (co phan hoa) of state-owned enterprises—partial sale of equity to managers, workers, and outside investors
  while the state typically retained majority or strategic stakes. Subsequent decrees (Decree 64/2002, Decree 109/2007, Decree 59/2011, Decree 126/2017) accelerated the process and extended it to large
  enterprises, though the pace and depth of state divestment have varied.

  '
enacted_by:
- vietnam_doi_moi_1986
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced number of pure-SOEs from many thousands and increased non-state share competing with SOEs.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Equitisation enabled SOE listings on Ho Chi Minh and Hanoi exchanges with foreign-investor participation.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Created shareholder equity, transfer rights, and corporate-governance structures previously absent in SOEs.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced reliance on state-bank soft-loan subsidies and treasury transfers to legacy SOE sector.

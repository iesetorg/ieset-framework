status: candidate
title: Saudi Energy Subsidy Reform 2015 2021
countries:
- SAU
timeframe:
  start: 2016
  end: ongoing
description: 'Beginning in late 2015 and accelerating under Vision 2030, Saudi Arabia phased in administered-price hikes for gasoline, diesel, electricity, and water tariffs to reduce regressive energy
  subsidies. Implemented via Council of Ministers Resolutions and offset by the Citizen''s Account (Hesab Al-Mowaten) cash-transfer programme launched in 2017 to compensate lower-income households.

  '

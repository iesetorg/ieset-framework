policy_id: argentina_trade_opening_1991_1995
status: candidate
title: Argentina Trade Opening 1991 1995
countries:
- ARG
timeframe:
  start: 1991
  end: 2001
description: 'Unilateral and regional trade liberalisation undertaken under Menem''s first term: average tariffs fell from roughly 26% in 1989 to about 10% by mid-1990s, non-tariff barriers were dismantled,
  and Argentina co-founded MERCOSUR via the 1991 Treaty of Asunción with Brazil, Paraguay, and Uruguay. Combined with Convertibility''s nominal anchor, the opening drove import competition, IT and capital-goods
  inflows, and tradeable-sector restructuring.

  '
enacted_by:
- menem_convertibility_argentina_1991_2001
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Tradeable-price discipline reinforced Convertibility's anti-inflation anchor at the import margin.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Tariff reductions averaging from ~26% to ~10% and MERCOSUR membership widened import access.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Removal of NTBs and import licensing exposed previously sheltered domestic producers to entry.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Tariff revenue compression shifted financing to VAT and asset sales rather than discipline outlays.

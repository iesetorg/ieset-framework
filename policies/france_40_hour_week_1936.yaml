policy_id: france_40_hour_week_1936
status: candidate
title: France 40-hour week 1936
countries: [FRA]
timeframe:
  start: 1936
  end: 1936
  enacted_date: "1936-06-21"
description: >
  The Law of 21 June 1936 reduced the legal workweek in industrial and
  commercial establishments to forty hours without cutting weekly pay.
  Implemented through profession-by-profession decrees, it was meant to
  share work, improve labour conditions, and translate the Popular Front's
  social victory into a national standard. Employers and later critics
  argued that the measure constrained output and adaptation, especially in
  rearmament industries, but as enacted it was a clear national tightening
  of working-time regulation.
enacted_by:
  - france_popular_front_1936_1938
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "The statute imposed a lower legal maximum workweek and narrowed employers' flexibility over hours."
references:
  - "Loi du 21 juin 1936 instituant la semaine de 40 heures"

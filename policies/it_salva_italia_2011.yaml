title: Italy Salva-Italia decree (€30bn Monti emergency, 2011)
countries:
- ITA
timeframe:
  start: 2011
  end: 2014
  enacted_date: '2011-12-06'
description: 'Decree-law 201/2011 (''Salva Italia'') of 6 December 2011, the foundation measure of the Monti technocratic government three weeks after its installation. ~€30bn fiscal consolidation combining
  reinstatement of IMU property tax on primary residences, VAT rate increase 21%→23% trigger, Fornero pension reform (minimum retirement age raised to 66-67 with phase-in, indexation frozen for high pensions),
  luxury taxes on aircraft, boats and high-value cars, and spread measures on bank stamp duties and financial transactions. Combined with structural package ''Cresci Italia'' (Jan 2012) for liberalisations.

  '

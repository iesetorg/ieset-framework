policy_id: jp_zero_interest_rate_policy_1999
status: candidate
title: Bank of Japan Zero Interest Rate Policy (1999)
countries:
- JPN
timeframe:
  start: 1999
  end: 2000
  enacted_date: '1999-02-12'
description: 'Bank of Japan Policy Board introduced the Zero Interest Rate Policy (ZIRP) on 12 February 1999, reducing the uncollateralised overnight call rate target to "as low as possible" (effectively
  0.03%, then 0.02%). Accompanied by guidance commitment to maintain policy "until deflationary concerns subside" — pioneering global example of explicit forward guidance. Lifted 11 August 2000 against
  government objection in a 7-2 Policy Board vote, widely criticised ex post as premature given the subsequent dot-com-era downturn; reinstated in modified form alongside Quantitative Easing from 19 March
  2001.

  '

policy_id: gr_psi_debt_restructuring_2012
status: candidate
title: Psi Debt Restructuring 2012
countries:
- GRC
timeframe:
  start: 2011
  end: 2012
description: 'The Private Sector Involvement (PSI) operation completed in March 2012 swapped roughly EUR 200 billion of Greek-law sovereign bonds held by private creditors for new instruments with longer
  maturities and reduced face value, imposing a haircut of about 53.5% in nominal and around 75% in net-present-value terms. Athens activated retrofit collective-action clauses (Law 4050/2012) to bind holdouts,
  marking the largest sovereign restructuring in history.

  '

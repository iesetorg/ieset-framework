policy_id: cuba_libreta_rationing_1962
status: candidate
title: Cuba Libreta Rationing 1962
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'Cuba introduced the libreta de abastecimiento in March 1962, an individual ration book entitling every resident to a monthly basket of staples — rice, beans, sugar, cooking oil, bread, and
  small protein allowances — at heavily subsidised prices through state bodegas. Originally framed as a wartime emergency measure, the libreta became permanent infrastructure of the socialist economy and
  has been incrementally trimmed but never abolished.

  '
enacted_by:
- cuba_post_1959_socialist_economy
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Centralised state distribution of basic goods displaced private retail and price competition.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Allocation by entitlement rather than market exchange weakened price-based property claims on staples.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Universal in-kind food entitlements function as a large permanent transfer to households.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Below-cost prices to bodegas required ongoing budget subsidies to state distributors and farms.

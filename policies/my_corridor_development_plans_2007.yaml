title: Malaysia regional-corridor development plans (2007-2008)
countries:
- MYS
timeframe:
  start: 2007
  end: 2010
  enacted_date: '2007-07-30'
description: 'Four regional-corridor development blueprints launched under Abdullah Badawi as 9MP implementation vehicles: Northern Corridor Economic Region (NCER, 30 July 2007) covering Perlis-Kedah-Penang-north
  Perak; East Coast Economic Region (ECER, 29 October 2007) covering Kelantan-Terengganu-Pahang- Mersing Johor; Sabah Development Corridor (SDC, 29 January 2008); Sarawak Corridor of Renewable Energy (SCORE,
  11 February 2008). Each with dedicated authority under PM''s Department (NCIA, ECERDC, SEDIA, RECODA). Total investment commitments RM 400bn+ over 15-20 year horizons, largely un-realised due to execution
  gaps and subsequent Najib-era redirection. Alongside Iskandar Malaysia 2006 formed the "five corridor" framework.

  '

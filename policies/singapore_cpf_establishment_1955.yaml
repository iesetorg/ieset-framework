policy_id: singapore_cpf_establishment_1955
status: candidate
title: Central Provident Fund Act 1955 — Singapore forced-saving pension foundation
countries:
- SGP
timeframe:
  start: 1955
  end: ongoing
  enacted_date: '1955-07-01'
description: 'Established CPF as mandatory savings scheme with employer + employee contributions to individual accounts held by the CPF Board. Rates phased from 5% + 5% in 1955 to peak 25% + 25% in 1980s;
  now around 20% + 17%. CPF funds serve multiple functions: retirement (Ordinary + Retirement Accounts), healthcare (MediSave 1984, MediShield 1990), and housing (Ordinary Account usable for HDB purchase).
  Foundational to Singapore''s welfare architecture — the canonical forced-saving individual-account model the refinements cite as distinct from Nordic universal-transfer architecture (D.1.5 scope + J.1.5
  welfare architecture observation).

  '
enacted_by:
- lky_singapore_founding_1955_1990
coalition_label_at_enactment: Pre-independence colonial; retained + expanded by PAP post-1965
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Forced-saving individual accounts are architecturally the opposite of pay-as-you-go transfer.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
  intended: true
  rationale: State funds only top-ups + administrator roles, not welfare disbursement.

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: dz_industrialising_industries_strategy_1967
status: candidate
title: "Industrialising industries strategy"
countries: [DZA]
timeframe: {start: 1967, end: 1978}
description: >
  Under Boumediene, Algeria used national plans and public enterprises to
  prioritize heavy industry, petrochemicals, steel, machinery, and other
  upstream sectors expected to industrialise the rest of the economy. Investment
  allocation was directed by the state rather than by private capital markets,
  with import substitution and public enterprise expansion at the centre.
enacted_by:
  - algeria_fln_socialist_developmental_state_1962_1978
coalition_label_at_enactment: "FLN"
axes_moved:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Large public investment plans raised the state's share of capital formation.", intended: true}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Heavy industrial sectors received directed finance and privileged state support.", intended: true}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Import-substitution planning favoured protected domestic industrial capacity over liberal trade exposure.", intended: true}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State enterprises and planning reduced competitive allocation in targeted sectors.", intended: true}
references:
  - "Rachid Tlemcani, State and Revolution in Algeria"
  - "World Bank, Algeria development reports, historical planning sections"

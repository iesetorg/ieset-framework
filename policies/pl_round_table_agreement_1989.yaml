description: 'Agreement between PZPR/government (Kiszczak) and Solidarność (Wałęsa et al.) signed 5 April 1989 after two months of Round Table negotiations. Re-legalised Solidarność, created partially free
  parliamentary elections (100% of new Senate contested; 35% of Sejm contested, 65% reserved for PZPR+allies), established presidency (reserved implicitly for Jaruzelski). 4 June 1989 elections delivered
  landslide Solidarność victory and collapsed the regime within months.

  '

policy_id: germany_pension_reform_riester_2001
status: candidate
title: Germany Pension Reform Riester 2001
countries:
- DEU
timeframe:
  start: 2003
  end: 2005
description: 'The Altersvermögensgesetz (AVmG) of 2001, named after labour minister Walter Riester, introduced a partially-funded private pension pillar with state subsidies and tax preferences for certified
  Riester- Renten contracts, reduced statutory pension replacement rates, and amended the Sozialgesetzbuch VI to contain pay-as-you-go contribution growth. The reform shifted retirement-savings risk onto
  households while easing future payroll-contribution pressure on labour costs.

  '
enacted_by:
- germany_schroder_red_green_1998_2005

title: Bildt-Wibble market reforms — Sweden 1991-1994
countries:
- SWE
timeframe:
  start: 1991
  end: 1994
  enacted_date: '1991-10-04'
description: 'Under PM Carl Bildt + Finance Minister Anne Wibble following the 1991-1994 Swedish banking crisis. Comprehensive market-oriented reform package: (1) tax reform (tax-cut act already enacted
  1990 but implementation coincided); (2) school voucher system (friskolereformen, 1992); (3) sweeping deregulation of product markets, telecommunications, postal services; (4) preparation for EU accession
  (1995); (5) banking-system reconstruction that became a model for later financial-crisis responses (including US 2008 TARP). Demonstrated that a Nordic economy could undertake deep market-oriented reform
  from a crisis position and emerge with trajectory-accelerated growth 1995-2007. Refinement D.2.9 and J.1.2 trajectory discussion both reference this case.

  '

title: Decreto Ley 25.475 — Peruvian terrorism law and military tribunals 1992
countries:
- PER
timeframe:
  start: 1992
  enacted_date: '1992-05-06'
description: 'Decreto Ley 25.475 of 6 May 1992 and complementary Decreto Ley 25.659 established aggravated terrorism offences with life imprisonment, military-tribunal jurisdiction over civilians, faceless
  ("sin rostro") judges, and restrictions on habeas corpus. Used to prosecute Sendero and MRTA but also civilian sympathisers; 2003 Constitutional Tribunal ruling STC 10-2002- AI/TC struck down key provisions,
  forcing ~1,800 retrials. Inter-American Court rulings (Castillo Petruzzi, Loayza Tamayo) held parts violated American Convention on Human Rights.

  '

policy_id: zm_lobito_corridor_partnership
status: candidate
title: Zambia Lobito Corridor partnership 2023
countries:
- ZMB
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-10-26'
description: 'Zambia joined Angola, the Democratic Republic of the Congo, the United States, the European Union, and development-finance partners in the Lobito Corridor partnership, using the railway and
  logistics corridor to connect Copperbelt and critical-minerals exports to the Atlantic port of Lobito. The policy aligned Zambian infrastructure planning, border facilitation, and mining export logistics
  with a multi-country financing and coordination platform.

  '
enacted_by:
- zambia_hichilema_upnd_2021_present
scope: national
coalition_label_at_enactment: UPND Hichilema government
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: The corridor creates a new export route for copper and critical minerals, reducing dependence on existing port and rail chokepoints.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Public coordination and concessional finance target a specific mining-logistics corridor.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Cross-border corridor agreements and development-finance conditions make transit, customs, and infrastructure commitments more rule-bound.
references:
- White House and European Commission announcements on the Lobito Corridor and PGI/Global Gateway partnership, October 2023.
- Zambia Ministry of Transport and Logistics statements on Lobito Corridor railway and trade-logistics cooperation, 2023-2024.
- African Development Bank and development-finance materials on the Lobito Corridor, 2023-2024.

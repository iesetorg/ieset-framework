policy_id: cl_modernizacion_tributaria_2020
status: candidate
title: Modernizacion Tributaria 2020
countries:
- CHL
timeframe:
  start: 2018
  end: 2022
description: 'Ley 21.210 de Modernización Tributaria, enacted in February 2020 under the second Piñera government, reunified the corporate income-tax regime under semi-integration, introduced a digital-services
  tax (VAT on cross-border digital services), and added SME-targeted simplified regimes. Aimed to reduce tax-system complexity while preserving revenue and improving competitiveness.

  '

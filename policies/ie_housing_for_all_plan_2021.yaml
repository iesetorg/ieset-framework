title: Housing for All — A New Housing Plan for Ireland (2021)
countries:
- IRL
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-09-02'
description: 'Whole-of-government housing strategy published 2 September 2021 by the Martin FF-FG-Green coalition, setting a target of 300,000 new homes 2021-2030 (~33,000/year average), with €4bn/year
  state-backed funding including the Land Development Agency, the First Home shared-equity scheme, cost-rental Tenant Purchase, Help-to-Buy continuation, Croí Cónaithe (town-centre and cities) grants, Residential
  Zoned Land Tax (replacing vacant-site levy), vacant-property tax, and reform of An Bord Pleanála (Planning and Development (Amendment) Acts). Delivery: 20,433 homes 2020, 20,560 in 2021, 29,851 in 2022,
  ~32,700 in 2023 — first year to meet the headline target. Continuing critique: demand-side supports (Help-to-Buy, First Home) feed into constrained supply via land + planning + labour bottlenecks, producing
  price rises; social and affordable build-out consistently under programme allocation.

  '

policy_id: pl_retirement_age_reversal_2017
status: candidate
title: Poland retirement-age reversal to 60/65 (2017)
countries:
- POL
timeframe:
  start: 2016
  end: ongoing
  enacted_date: '2016-11-16'
description: 'Reversal of the 2012 Tusk-government statutory retirement-age increase (gradual equalisation to 67 for both sexes). The Szydło PiS government enacted legislation 16 November 2016, signed by
  President Duda, restoring the pre-2012 thresholds — 60 for women and 65 for men — effective 1 October 2017. Manifesto commitment from the 2015 PiS campaign and one of the signature redistributive moves
  of the first PiS term. Fiscal effect projected by the FUS (Social Insurance Institution) at ~0.5-0.9% of GDP additional annual cost over the 2020s, partially offset by lower pension amounts due to earlier
  benefit commencement.

  '
enacted_by:
- poland_szydlo_pis_2015_2017
coalition_label_at_enactment: PiS (national-conservative)
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Lowered threshold pulls forward pension-system outlays; state actuarial deficit widens.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Lower statutory retirement age reduces effective labour-force participation among 60-67 cohort, modestly tightening prime-age labour supply.

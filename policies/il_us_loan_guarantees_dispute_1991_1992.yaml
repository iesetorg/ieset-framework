title: US $10bn loan-guarantees dispute (1991-1992)
countries:
- ISR
timeframe:
  start: 1991
  end: 1992
description: 'Shamir government sought $10bn in US loan guarantees to finance Soviet aliyah absorption. The G.H.W. Bush administration (Baker State Dept) conditioned the guarantees on a settlement freeze
  in the West Bank and Gaza; Shamir refused, and the guarantees were delayed until 1992 when the Rabin government accepted de facto settlement-freeze understandings. The episode illustrated the link between
  Israeli fiscal absorption costs and US leverage on settlement policy.

  '

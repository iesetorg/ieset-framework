description: 'Thaksin Shinawatra returned to Thailand on 22 August 2023 after 15 years in exile, was sentenced to eight years in prison on outstanding corruption convictions, and within hours received a
  royal pardon reducing the sentence to one year — most of which was served in a police-hospital wing. His return coincided with the formation of the Pheu Thai-led Srettha government and signalled political
  rapprochement underpinning the coalition''s policy programme.


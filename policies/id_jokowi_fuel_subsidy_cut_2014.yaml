policy_id: id_jokowi_fuel_subsidy_cut_2014
status: candidate
title: Jokowi fuel-subsidy cut and redirection 2014
countries:
- IDN
timeframe:
  start: 2014
  end: 2015
  enacted_date: '2014-11-18'
description: 'Raised premium gasoline price from Rp 6,500 to Rp 8,500/litre and diesel from Rp 5,500 to Rp 7,500/litre on 18 November 2014, approximately one month into Jokowi''s first term. Followed in
  January 2015 with a shift to an oil-indexed price-adjustment formula, eliminating the fixed subsidy on premium gasoline entirely. Saved ~Rp 230 trillion (~USD 18bn) versus baseline, redirected to infrastructure
  (Rp 290tn infrastructure budget 2015) and targeted cards — Kartu Indonesia Sehat, Kartu Indonesia Pintar, Kartu Keluarga Sejahtera.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIH coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Largest single-step fossil-fuel subsidy cut in Indonesian history.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Savings redeployed to infrastructure and targeted social transfers.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Three targeted cards launched concurrently.
references:

title: Skattestop (tax freeze) 2002
countries:
- DNK
timeframe:
  start: 2002
  enacted_date: '2001-11-26'
description: 'Unconditional precommitment by the Fogh Rasmussen government (from the 2001 election campaign and first governing-statement) to freeze every direct and indirect tax rate in nominal terms,
  with the real-estate tax (ejendomsvaerdiskat) frozen in DKK. Any new or higher tax requires an offsetting reduction elsewhere. Maintained through successive V-K governments.

  '

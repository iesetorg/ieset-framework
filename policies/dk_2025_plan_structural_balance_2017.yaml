policy_id: dk_2025_plan_structural_balance_2017
status: candidate
title: 2025-planen — Danish medium-term structural-balance framework 2017
countries:
- DNK
timeframe:
  start: 2017
  end: 2025
  enacted_date: '2017-01-30'
description: 'The January 2017 ''2025-planen'' set out a medium-term fiscal framework targeting structural balance by 2025 within the statutory 0.5%-of-GDP structural-deficit ceiling of the Budgetlov, accompanied
  by modest personal-income tax reductions, targeted bank and pension-savings tax adjustments, a further gradual increase in statutory retirement ages under the 2011 Welfare Agreement, and labour-supply
  measures to raise structural employment. Parliamentary negotiation produced smaller tax cuts than proposed and preserved fiscal-rule compliance.

  '

  direction: +
  magnitude: moderate
  rationale: New governor with explicit operational-independence mandate; rate-cap removal continued.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  rationale: Forensic audits targeting politically-connected capture of banks.

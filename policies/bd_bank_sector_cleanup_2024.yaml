policy_id: bd_bank_sector_cleanup_2024
status: candidate
title: Bangladesh Bank governance change and bank-sector clean-up
countries:
- BGD
timeframe:
  start: 2024
  enacted_date: '2024-08-13'
description: 'In August 2024 the interim government appointed Ahsan H. Mansur as Bangladesh Bank governor and initiated a clean-up of Shariah and conventional banks captured during the prior regime (notably
  S. Alam Group-linked Islami Bank Bangladesh, Social Islami Bank, First Security, Global Islami). Measures included board reconstitution, emergency liquidity support, forensic audits, and restructuring
  of supervision. Begins a recognition cycle on non-performing loans previously masked at headline ~9-11% versus actual ~25%+ per IMF.

  '
enacted_by:
- bangladesh_yunus_interim_2024_present
coalition_label_at_enactment: Non-party technocratic interim cabinet

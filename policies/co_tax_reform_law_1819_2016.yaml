title: Ley 1819 de 2016 — Reforma Tributaria Estructural (Colombia)
countries:
- COL
timeframe:
  start: 2016
  end: 2017
  enacted_date: '2016-12-29'
description: 'Structural tax reform enacted under Santos II in response to the 2014-2016 oil-price collapse and to satisfy OECD accession-track conditions. Raised the general VAT rate from 16% to 19%, unified
  the corporate income tax (phasing out the CREE surcharge and replacing it with a single rate path toward 33%), introduced dividend taxation on individuals, created anti- evasion criminal penalties, modernised
  DIAN enforcement powers, and shifted the monotributo/simple regime for small taxpayers. Designed to replace revenue lost from the hydrocarbons sector and broaden the tax base.

  '

policy_id: venezuela_bolivar_redenomination_2021
status: candidate
title: Venezuela Bolivar Redenomination 2021
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'Effective October 1, 2021, Venezuela introduced the Bolivar Digital, lopping six zeros from the prior Bolivar Soberano at a conversion rate of 1,000,000 to 1. This was Venezuela''s third currency
  redenomination since 2008 and reflected continued hyperinflation despite the 2018 reset. The change was largely cosmetic and the population continued to transact widely in US dollars on a de facto basis.

  '

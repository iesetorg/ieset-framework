policy_id: fr_fillon_pension_reform_2003
status: candidate
title: Fillon pension reform 2003
countries:
- FRA
timeframe:
  start: 2003
  enacted_date: '2003-08-21'
description: 'Loi Fillon of 21 August 2003 aligned public-sector pension contribution requirements with the private-sector 40-year rule (to be raised to 41 then 42 in subsequent years). Extended contribution
  period for full pension to 40 years by 2008 for public sector (matching 1993 Balladur reform for private sector). Created Plan d''Épargne Retraite Populaire (PERP) and Plan d''Épargne Retraite Collectif
  (PERCO) voluntary funded- pension vehicles. Triggered major strikes May-June 2003 (12 June 600,000-1.5m demonstrators) before passage.

  '
enacted_by:
- france_chirac_ii_presidency_2002_2007
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  rationale: Raised contribution period harmonising public and private sectors.
  intended: true
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  rationale: Public-private pension harmonisation reduces asymmetric employment-regime rigidity.
  intended: true
references:

  rationale: Reallocations from screened savings funded new DPJ household-transfer pledges.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Despite cut targets the screening produced limited net savings while DPJ initiatives raised totals.
- axis: institutional.rule_of_law

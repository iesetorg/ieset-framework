policy_id: jp_dpj_shiwake_budget_screening_2009
status: candidate
title: Dpj Shiwake Budget Screening 2009
countries:
- JPN
timeframe:
  start: 2009
  end: 2010
description: 'The "Jigyou Shiwake" public budget screening process, run by the Hatoyama DPJ Government Revitalization Unit in November 2009, held televised hearings reviewing more than 200 budget items
  and recommending cuts, mergers and abolitions. The exercise was a high-profile attempt to break LDP-era budget rigidity, shift discretionary spending toward the DPJ manifesto priorities, and demonstrate
  fiscal scrutiny to the public.

  '

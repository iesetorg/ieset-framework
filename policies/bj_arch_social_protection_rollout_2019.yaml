policy_id: bj_arch_social_protection_rollout_2019
status: candidate
title: Benin ARCH social-protection rollout 2019
countries:
- BEN
timeframe:
  start: 2019
  end: ongoing
description: 'Benin''s Assurance pour le Renforcement du Capital Humain programme rolled out a social-protection package for poor and informal households, centred on health insurance with associated social-service
  and economic-inclusion components. Under the PAG framework, ARCH moved social protection from fragmented schemes toward an identified-beneficiary model with subsidised coverage for vulnerable groups.

  '

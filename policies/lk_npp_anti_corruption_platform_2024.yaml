description: 'Anura Kumara Dissanayake / National People''s Power governance programme enacted after the Nov 2024 parliamentary landslide (NPP 159/225 seats, two-thirds majority). Implementation of the
  2023 Anti-Corruption Act; Commission to Investigate Allegations of Bribery or Corruption (CIABOC) expansion; asset-declaration and beneficial-ownership registry; politically-exposed-person screening;
  Proceeds of Crime Bill; public-procurement digitisation; and a stated commitment to continue the IMF EFF while renegotiating distributional composition (wealth-tax debate, widened PAYE threshold, targeted
  Aswesuma cash-transfer expansion).


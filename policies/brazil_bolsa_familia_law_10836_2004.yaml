policy_id: brazil_bolsa_familia_law_10836_2004
status: candidate
title: Brazil Bolsa Familia Law 10836 2004
countries:
- BRA
timeframe:
  start: 2003
  end: 2010
description: 'Law 10.836/2004 created the Bolsa Familia conditional cash transfer programme under the Lula government, consolidating prior Cardoso-era transfers (Bolsa Escola, Auxilio Gas, Cartao Alimentacao)
  into a unified means-tested grant paid to low-income families conditional on school attendance and child vaccination. Administered by the Ministry of Social Development through the Caixa Economica Federal,
  the programme expanded to cover roughly a quarter of Brazilian households and became a flagship of the PT social policy framework.

  '

policy_id: in_current_account_convertibility_1994
status: candidate
title: India Article VIII full current-account convertibility 1994
countries:
- IND
timeframe:
  start: 1994
  enacted_date: '1994-08-20'
description: 'India accepted IMF Article VIII obligations 20 Aug 1994 making the rupee fully convertible on current-account transactions. Followed LERMS unification Mar 1993. Capital-account partial convertibility
  retained — Tarapore Committee reports 1997 and 2006 proposed phased roadmap but remained partial (moderated view after 1997 Asian crisis).

  '
enacted_by:
- india_narasimha_rao_inc_1991_1996
coalition_label_at_enactment: INC under FM Singh
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Current-account transactions fully deregulated; free trade-and-invisibles convertibility.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Removed administrative friction on current-account flows.
references:
- RBI Report on Currency and Finance 1994-95
- IMF Article VIII notification 1994

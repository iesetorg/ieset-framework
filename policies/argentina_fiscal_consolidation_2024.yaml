policy_id: argentina_fiscal_consolidation_2024
status: candidate
title: Argentina Fiscal Consolidation 2024
countries:
- ARG
timeframe:
  start: 2023
  end: ongoing
description: 'Front-loaded fiscal adjustment under the Milei administration aimed at eliminating the primary deficit and ending BCRA financing of the Treasury. Mechanism combined nominal pension-formula
  changes, transfer cuts to provinces, removal of energy and transport subsidies, and a freeze on most discretionary spending, while the PAIS tax was extended on the revenue side. By Q1 2024 the national
  accounts posted the first monthly fiscal surplus in over a decade.

  '

policy_id: uk_nhs_act_1946
status: candidate
title: Nhs Act 1946
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The National Health Service Act 1946, championed by Health Minister Aneurin Bevan, established a comprehensive, free-at-the-point-of-use, tax-funded health service taking effect on 5 July
  1948. The Act nationalised c.2,700 voluntary and municipal hospitals into a unified service, brought GPs into a contracted network, and established the Beveridge model of universal healthcare that defined
  the British welfare state.

  '

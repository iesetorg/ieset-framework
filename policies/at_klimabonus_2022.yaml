policy_id: at_klimabonus_2022
status: candidate
title: Klimabonus per-capita climate rebate 2022
countries:
- AUT
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-03'
description: 'Per-capita rebate distributed to every Austrian resident to return CO2-price revenues. Amounts are regionally graduated in four categories (I-IV, EUR 100-200 base plus EUR 50-300 regional
  top-up in 2022, ramped up to EUR 250-500 in 2023 after inflation-response uplift) by the public-transport accessibility of the recipient''s municipality, compensating rural households with weaker low-carbon
  transport options. In 2022 a one-off Anti- Teuerungsbonus of EUR 250 was folded into the payment as an energy-price emergency measure. Delivered via direct bank transfer or postal voucher.

  '
enacted_by:
- austria_nehammer_ovp_greens_2022_2025
coalition_label_at_enactment: OeVP-Gruene
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Universal per-capita rebate totalling >EUR 1bn/yr at steady-state; new transfer architecture.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Per-capita design combined with the incidence of a carbon price that is roughly flat in consumption makes the net distributional effect mildly progressive.
references:
- Klimabonusgesetz (BGBl. I Nr. 185/2022)
- BMK Klimabonus annual distribution reports 2022, 2023, 2024

description: 'Dehaene I government''s Plan Global pour l''Emploi, la Compétitivité et la Sécurité sociale (24 November 1993) imposed real-wage freeze 1995-96, cut employer social contributions on low-wage
  hiring (Maribel support), increased indirect taxes, means-tested family allowances for wealthy households, cut energy subsidies. Triggered largest general strike since 1936 but largely implemented. Foundational
  EMU- convergence package.

  '

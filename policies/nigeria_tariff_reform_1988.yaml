policy_id: nigeria_tariff_reform_1988
status: candidate
title: Nigeria Tariff Reform 1988
countries:
- NGA
timeframe:
  start: 1986
  end: 1993
description: 'Nigeria''s 1988 customs tariff reform, decreed under the SAP, lowered and rationalised import duties with a new seven-year tariff structure that simplified rate bands, removed many specific
  duties in favour of ad valorem rates, and reduced peak rates significantly. The reform was intended to lower effective protection of import-substitution manufacturing and complement the SFEM exchange-rate
  liberalisation in restoring tradable-goods price signals.

  '
enacted_by:
- nigeria_buhari_sap_structural_adjustment_1986
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower tariff peaks and simplified rate bands reduced the tariff barrier facing imported manufactures.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced effective protection forced previously sheltered domestic manufacturers to face import competition.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Combined with SFEM, increased import-financed flows expanded transaction money supply through trade banks.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminated implicit subsidies embedded in selective high-tariff protection of favoured industries.

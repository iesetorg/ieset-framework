  rationale: Cushioning subsidies to SMEs were rolled out to offset minimum-wage cost shock.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Corporate income tax was cut from 30 to 20 percent to offset wage-increase impact.
- axis: regulatory.labour_market_flexibility
  direction: '-'

policy_id: th_yingluck_minimum_wage_300_baht_2012
status: candidate
title: Yingluck Minimum Wage 300 Baht 2012
countries:
- THA
timeframe:
  start: 2011
  end: 2014
description: 'The Yingluck government''s signature campaign pledge raised Thailand''s daily minimum wage to 300 baht, beginning in seven pilot provinces in April 2012 and extending nationwide in January
  2013. The increase — between roughly 35 and 90 percent depending on prior provincial rates — was paired with corporate-tax cuts and SME relief measures to cushion employer impact, and operated under the
  Wage Committee of the Ministry of Labour.

  '

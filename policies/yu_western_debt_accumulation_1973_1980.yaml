description: 'Yugoslav external debt grew from $4bn (1973) to $14bn (1979) and ~$20bn (1982) as the self-management system borrowed internationally to fund investment and sustain living standards. Debt-service
  ratio reached ~25% of exports by 1981. The resulting IMF stabilisation programmes defined 1982-1988 economic policy.

  '

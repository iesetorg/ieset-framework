description: 'Federal austerity package (Zukunftspaket) announced June 2010 by the Merkel-II CDU-FDP cabinet: ~€80bn consolidation over 2011-2014 combining cuts to active labour-market policy (~€8bn/year,
  Hartz-IV procedures), public-sector headcount reduction, defence savings, nuclear-fuel tax (Brennelementesteuer), air-travel tax (Luftverkehrsteuer), bank levy, and reduced parental benefits. First consolidation
  programme under the new Schuldenbremse, front-loading Germany''s return to primary surplus.

  '

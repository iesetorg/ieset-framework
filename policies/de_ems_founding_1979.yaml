description: 'European Monetary System operational from 13 March 1979. Schmidt and Giscard jointly architected. Germany entered as anchor currency with Bundesbank retention of domestic monetary discretion.
  Bundesbank obtained Emminger Letter reassurance permitting unilateral suspension of intra-EMS intervention if stability at risk. EMS became the institutional forerunner of EMU.

  '

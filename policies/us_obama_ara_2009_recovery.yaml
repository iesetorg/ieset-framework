description: 'The Obama recovery program centered on the American Recovery and Reinvestment Act of 2009 (Pub. L. 111-5), an ~$831 billion package combining tax relief, expanded unemployment and Medicaid
  transfers, state fiscal aid, and direct federal investment in infrastructure, education, health-IT, and clean-energy R&D. Together with the Dodd-Frank Wall Street Reform Act (2010) and ACA (2010), it
  formed the principal policy response of Obama''s first term to the 2008-2009 financial crisis and Great Recession.

  '

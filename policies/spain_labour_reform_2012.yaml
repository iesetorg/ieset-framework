description: 'Under PM Mariano Rajoy (PP) responding to 25%+ unemployment. Royal Decree-Law 3/2012 subsequently enacted as Law 3/2012. Key elements: reduced severance payments for unfair dismissal (from
  45 to 33 days/ year), priority of company-level agreements over sectoral ones (opt-out mechanism), one-year renegotiation window for collective agreements, simplified procedures for ERE (collective dismissal).
  Contributed to post-2013 Spanish labour-market recovery; critics note employment growth came with increased temporary-contract share and lower median wage. Partially reversed by PSOE-Podemos coalition
  2021 Labour Reform.

  '

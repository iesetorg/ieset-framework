status: candidate
title: Fed Funds Rate Spike 1979 1981
countries:
- USA
timeframe:
  start: 1979
  end: 1982
description: 'Under Chair Paul Volcker, the Federal Reserve drove the federal funds rate to historic peaks above 19% in mid-1981 — alongside a shift to non-borrowed reserves targeting announced October
  6, 1979 — to break entrenched 1970s inflation expectations. The resulting tight-money regime triggered the 1980 and 1981-82 recessions, peak unemployment of 10.8%, and a rapid disinflation from over 13%
  CPI in 1980 to under 4% by 1983, anchoring the modern credibility-of-inflation-targeting paradigm.

  '

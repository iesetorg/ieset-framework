policy_id: ph_luzon_economic_corridor_2024
status: candidate
title: Luzon Economic Corridor (PGI flagship Philippines)
countries:
- PHL
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-04-11'
description: 'Announced at the Japan-United States-Philippines trilateral summit in Washington on 11 April 2024 as the first Partnership for Global Infrastructure and Investment (PGI) corridor in the Indo-Pacific.
  The Luzon Economic Corridor is a coordinated G7+Philippines investment programme linking Subic, Clark, Manila and Batangas via rail (PNR North-South Commuter Railway), ports, semiconductors and clean-energy
  infrastructure. Financing commitments from USAID, JICA, JBIC, US DFC, World Bank and ADB alongside private capital; explicit ''high-standards'' framing positioning the corridor as alternative to PRC Belt-and-Road
  conditionality. Complements expanded EDCA sites and CHIPS Act-linked semiconductor diversification strategy.

  '
enacted_by:
- philippines_marcos_jr_2022_present
coalition_label_at_enactment: Uniteam (PFP/Lakas-CMD)
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Coordinated public investment and concessional finance directed into semiconductors, clean energy, ports and rail within a designated corridor.
  intended: true
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  rationale: Corridor design integrates ports and logistics for diversified global supply chains; no new tariff lines but reduces non-tariff frictions within corridor.
  intended: true
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  rationale: Clean-energy investment leg contributes to supply-mix diversification and grid build-out.
  intended: true

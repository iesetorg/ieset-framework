description: 'Presidential proclamation 25 Jun 2009 offering unconditional amnesty to Niger Delta militants surrendering arms; ~30,000 combatants enrolled by Oct 2009 with stipends, DDR training, and vocational
  programmes. Oil output recovered from ~1.1mb/d trough to ~2.1mb/d by 2010; ongoing programme under Amnesty Office with annual budget ~NGN 60-100bn.

  '

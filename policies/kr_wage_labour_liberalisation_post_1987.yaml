policy_id: kr_wage_labour_liberalisation_post_1987
status: candidate
title: South Korea post-1987 labour liberalisation and wage surge
countries:
- KOR
timeframe:
  start: 1987
  end: 1993
description: 'Following the 29 Jun 1987 democratisation declaration and Labour Union Law amendments, Korean workers gained effective rights to organise — unionisation surged from 1,137 unions (1986) to
  7,883 (1989); strikes exploded from 276 (1986) to 3,749 (1987); nominal wage growth averaged 18-21% annually 1988-1991. Real wages tripled over the decade, fundamentally altering Korean manufacturing
  cost structure and driving industrial upgrading toward capital/technology- intensive sectors.

  '

title: CBN 43-item FX ban list
countries:
- NGA
timeframe:
  start: 2015
  end: 2023
  enacted_date: '2015-06-23'
description: 'The Central Bank of Nigeria on 23 June 2015 issued a circular excluding 41 (later 43) import categories — including rice, cement, private jets, tomato paste, poultry, toothpicks, wheelbran,
  and textiles — from access to official foreign-exchange windows, forcing importers onto the parallel market. Framed as import-substitution industrial policy in the oil-price-collapse BOP crisis; in practice
  entrenched the multiple- exchange-rate regime and widened the parallel-market premium. Lifted October 2023 under Tinubu''s FX unification.

  '

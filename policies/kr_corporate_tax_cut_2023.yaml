description: 'Corporate Tax Act amendment (December 2022) cutting the headline top corporate-income-tax rate from 25% to 24% effective January 2023, paired with 1-percentage-point reductions across each
  of the four statutory brackets (9% / 19% / 21% / 24%) and adjustments to investment-credit and R&D-deduction schedules. The Yoon administration''s original proposal was a steeper cut to 22% with three-bracket
  simplification; the National Assembly (DP majority) compelled the single-point cut as compromise.


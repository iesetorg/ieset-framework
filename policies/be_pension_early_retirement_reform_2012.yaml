title: Belgium pension / early-retirement reform (2012)
countries:
- BEL
timeframe:
  start: 2012
  end: 2016
  enacted_date: '2012-01-01'
description: 'Di Rupo-government pension reform raising the minimum early-retirement age from 60 to 62 and required career length from 35 to 40 years (phased 2013-2016); tighter eligibility for brugpensioen/prépension
  (early- retirement bridging into unemployment) now restricted to restructurings and extended career length thresholds; penalty coefficients for partial- career pensions. OECD estimated cumulative PV pension-expenditure
  savings ~€6bn.

  '

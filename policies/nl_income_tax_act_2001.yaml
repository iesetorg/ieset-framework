title: Wet IB 2001 — box-system income tax reform
countries:
- NLD
timeframe:
  start: 2001
  enacted_date: '2001-01-01'
description: 'Wet Inkomstenbelasting 2001, effective 1 January 2001, replaced the 1964 income tax law with a three-box structure: Box 1 (labour and owner-occupied housing) progressive to 52% top; Box 2
  (substantial shareholding) flat 25% (later 26.9%); Box 3 (savings and investments) notional 4% return taxed at 30% flat (effective 1.2% wealth tax). Eliminated prior capital-gains regime for most assets.
  Broadened base and reduced top statutory rates.

  '

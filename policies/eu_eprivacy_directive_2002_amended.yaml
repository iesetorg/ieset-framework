description: 'Directive 2002/58/EC (the e-Privacy Directive), as amended in 2009 by Directive 2009/136/EC, regulates confidentiality of electronic communications, traffic and location data, unsolicited
  commercial communications, and most importantly the cookie-consent regime requiring informed user opt-in for non-essential tracking. It operates alongside the GDPR as lex specialis for electronic communications;
  a successor e-Privacy Regulation has been negotiated since 2017 without final adoption.

  '

policy_id: kz_tengiz_oil_opening_1993
status: candidate
title: Kazakhstan Tengiz oil opening 1993
countries: [KAZ]
timeframe: {start: 1993, end: ongoing}
description: >
  Kazakhstan's 1993 Tengizchevroil agreement opened the Tengiz oil field to
  large-scale foreign participation and became the template for hydrocarbon-led
  post-Soviet development. The policy anchored export growth and capital inflows
  while increasing dependence on oil-sector rents.
enacted_by:
  - kazakhstan_nazarbayev_resource_state_1991_2019
axes_moved:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, intended: true, rationale: "Foreign oil-company participation and export infrastructure connected Kazakhstan to global capital and energy markets."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, intended: true, rationale: "Hydrocarbon development proceeded through state-negotiated concessions and licensing."}
references:
  - "Chevron, Tengizchevroil project history"
  - "IMF Kazakhstan resource-sector reports"

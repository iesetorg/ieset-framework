status: candidate
title: Medium Term Fiscal Strategy 2011
countries:
- GRC
timeframe:
  start: 2009
  end: 2011
description: 'The Medium-Term Fiscal Strategy Framework 2012–2015, enacted as Law 3985/2011, set binding multi-year expenditure ceilings and revenue measures targeting roughly EUR 28 billion in fiscal adjustment
  plus EUR 50 billion in privatisation receipts under the May 2010 Memorandum. Adoption faced violent street protests but was a precondition for unlocking the fifth disbursement of the first programme.

  '

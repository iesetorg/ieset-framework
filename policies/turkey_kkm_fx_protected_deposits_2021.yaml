policy_id: turkey_kkm_fx_protected_deposits_2021
status: candidate
title: Turkey Kkm Fx Protected Deposits 2021
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
description: 'Turkey''s KKM (Kur Korumali Mevduat) FX-protected deposit scheme, introduced by Presidential Decree on 21 December 2021 amid a 30%+ overnight lira depreciation, guaranteed lira-denominated
  time deposits against losses relative to the dollar by paying compensating yield from the Treasury and the CBRT. KKM stocks peaked around USD 130 billion. The intended effect was to halt the lira panic
  of late 2021, shift deposit-holders from FX to lira, and avoid the conventional rate-rise response under the heterodox doctrine — at the cost of large quasi-fiscal liabilities ultimately borne by the
  state.

  '
enacted_by:
- turkey_erdogan_akp_2002_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Differential KKM yields favoured banks competing on retail FX-protected deposit products.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: CBRT carried compensating-yield liability alongside Treasury, blurring monetary-fiscal boundary.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Treasury KKM payouts represented substantial but quasi-fiscal liabilities not always classified as spending.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary FX-protection regime sat outside conventional monetary-fiscal rule frameworks.

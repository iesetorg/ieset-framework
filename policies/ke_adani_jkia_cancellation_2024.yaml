policy_id: ke_adani_jkia_cancellation_2024
status: candidate
title: Adani JKIA and Ketraco deal cancellations (Sep-Nov 2024)
countries:
- KEN
timeframe:
  start: 2024
  enacted_date: '2024-11-21'
description: 'Two major Adani Group concessions were cancelled in late 2024. (1) The 30-year USD 1.85bn Jomo Kenyatta International Airport (JKIA) lease under a privately-initiated PPP was the subject of
  aviation-worker strikes (Sep 2024) and litigation; Ruto directed cancellation on 21 Nov 2024 following US federal indictments of Gautam Adani for bribery-related conduct. (2) A USD 736m Ketraco electricity-transmission
  PPP signed Oct 2024 was likewise cancelled. Both deals had been criticised for lack of competitive tendering. Cancellations returned the concessions to status quo ante (state-owned operation) pending
  retendering.

  '
enacted_by:
- kenya_ruto_uda_2022_present
coalition_label_at_enactment: Kenya Kwanza + ODM
axes_moved:

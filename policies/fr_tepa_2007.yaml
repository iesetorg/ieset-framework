description: 'Loi n° 2007-1223 du 21 août 2007. Core Sarkozy first-year fiscal package: income-tax and social-contribution exemption for overtime hours ("travailler plus pour gagner plus"); inheritance-tax
  exemption between spouses and €150k per child threshold; mortgage-interest tax credit for principal residences; bouclier fiscal capping total direct tax at 50% of income (later 50% inclusive of CSG).
  Partially repealed under Hollande from 2012.

  '

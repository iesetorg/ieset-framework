title: Greece Second Memorandum implementation under Samaras 2012-2014
countries:
- GRC
timeframe:
  start: 2012
  end: 2014
  enacted_date: '2012-11-07'
description: 'Execution of the Second Economic Adjustment Programme (signed 14 March 2012 under the Papademos caretaker government, €130bn + €34bn PSI sweeteners) under the Samaras ND-PASOK (-DIMAR) coalition
  from June 2012. Principal vehicle for accelerated implementation was Law 4046/2012 (initial prior actions, February 2012 under Papademos) and Law 4093/2012 (Medium-Term Fiscal Framework 2013-2016, 7 November
  2012) legislating €13.5bn of additional austerity measures across 2013-2014: public-sector wage cuts (notably on special wage regimes), pension cuts of 5-15% above €1,000/month, abolition of Easter/summer/Christmas
  bonuses, public-employment reduction (mandatory exits, reserve labour mobility scheme), retirement-age rise from 65 to 67, extensive tax-base-broadening. Twelfth and thirteenth reviews under Troika closed
  2013-2014 releasing programme disbursements. Primary-surplus achievement 2013 confirmed April 2014 (0.4% GDP on programme definition) used to fund limited ''social dividend'' transfers. Five-year sovereign
  bond issued April 2014 at 4.95% (€3bn, 6.1x oversubscribed) signalled conditional market re- entry. Troika-review deadlock autumn 2014 triggered the presidential-election gambit of December 2014.

  '

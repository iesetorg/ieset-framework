policy_id: france_smic_1970
status: candidate
title: France Smic 1970
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'The loi du 2 janvier 1970 created the Salaire minimum interprofessionnel de croissance (SMIC), replacing the static SMIG with a statutory floor wage indexed to consumer prices and partly to
  average wage growth. The mechanism guaranteed annual revaluation by decree, structurally shifting the lower tail of the French wage distribution and codifying minimum-wage policy as a stabiliser of household
  purchasing power.

  '
enacted_by:
- france_trente_glorieuses_indicative_planning_1945_1975

  enacted_date: '1978-10-01'
description: 'Swiss National Bank under Fritz Leutwiler introduced explicit monetary-aggregate targeting (M0 / central-bank money) from 1974, briefly imposed an informal DM ceiling in autumn 1978 to arrest
  franc overshoot (franc had appreciated ~40% in 1978), then returned to monetary targeting from 1979. Exceptionally influential early- adopter of Friedmanite monetary-aggregate framework outside Bundesbank.

  '

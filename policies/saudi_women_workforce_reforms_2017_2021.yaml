policy_id: saudi_women_workforce_reforms_2017_2021
status: candidate
title: Saudi Women Workforce Reforms 2017 2021
countries:
- SAU
timeframe:
  start: 2016
  end: ongoing
description: 'Vision 2030''s reforms permitting women to drive (June 2018) and easing male-guardianship requirements for accessing employment, travel, and government services (2019 amendments to the Civil
  Status Law) combined with workplace measures to expand female labour-force participation. Implemented by the Ministry of Human Resources and Council of Senior Scholars rulings, FLFP rose from roughly
  17% in 2016 toward GCC peers.

  '

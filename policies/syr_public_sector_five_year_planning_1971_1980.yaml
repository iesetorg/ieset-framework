# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: syr_public_sector_five_year_planning_1971_1980
status: candidate
title: Syria public-sector five-year planning under Hafez al-Assad
countries: [SYR]
timeframe: {start: 1971, end: 1980}
description: >
  Under Hafez al-Assad, Syria retained five-year planning, public-sector
  dominance, administered prices, and state-led investment while allowing a
  limited private role in trade and small production. The model used public
  enterprise, subsidies, and infrastructure spending to stabilise Ba'ath rule
  after the 1970 Corrective Movement.
enacted_by:
  - syria_baath_assad_statist_regime_1963_2000
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Planning sustained public investment and public-sector employment."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Subsidies and plan allocations supported state industry, agriculture, and infrastructure."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Public enterprises and price administration constrained private competition."
references:
  - "Perthes (1995), The Political Economy of Syria Under Asad"
  - "Hinnebusch (2001), Syria: Revolution from Above"

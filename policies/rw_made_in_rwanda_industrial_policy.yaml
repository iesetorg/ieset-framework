policy_id: rw_made_in_rwanda_industrial_policy
status: candidate
title: Made in Rwanda industrial policy
countries:
- RWA
timeframe:
  start: 2017
  end: ongoing
description: 'Rwanda''s Made in Rwanda policy promotes domestic production, supplier development, public-procurement preferences, standards upgrading, and targeted support for firms that can substitute
  imports or build export capacity. The fourth Kagame term continued the programme as part of the industrialisation and trade-deficit agenda rather than replacing it with a new statutory framework.

  '
enacted_by:
- rwanda_post_genocide_reconstruction_1994_2020
- rwanda_kagame_fourth_term_2024_present
scope: national
coalition_label_at_enactment: RPF Kagame government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: State support, procurement preference, and supplier-development programmes target selected domestic producers.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Import-substitution objectives and procurement preference modestly shift policy toward domestic preference.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Standards and supplier upgrading can lower quality barriers, while preference rules shelter selected local producers.
references:

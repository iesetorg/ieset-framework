title: Naya Pakistan Housing — low-cost mortgage markup subsidy (2019)
countries:
- PAK
timeframe:
  start: 2019
  end: 2022
  enacted_date: '2019-10-10'
description: 'Markup-subsidy scheme for low-cost housing targeting construction of 5 million housing units. SBP directive to commercial banks requiring 5% of net portfolio allocation to housing by December
  2021; subsidised interest rates 5% for first-tier units and 7% for second-tier units with government absorbing the spread above KIBOR. Accompanied by a construction-sector fiscal package April 2020 with
  tax-amnesty components to channel informal capital into documented real-estate. Execution fell well short of the 5m unit target; mortgage-to-GDP ratio rose modestly from a low base.

  '

description: 'Camp David Accords (17 September 1978) and the March 1979 Egypt-Israel Peace Treaty produced: (a) Sinai oilfield withdrawal (loss of Alma field ~$500m/yr), (b) institutionalised annual US
  aid to Israel ($3bn+ from 1979, military + economic), (c) Memorandum of Agreement on Israeli oil-import backstop, and (d) substantial one-off US transfers to finance IDF redeployment ($3bn). Major fiscal
  shift.

  '

policy_id: australia_super_self_managed_reforms
status: candidate
title: Australia Super Self Managed Reforms
countries:
- AUS
timeframe:
  start: 1992
  end: ongoing
description: 'Sequential reforms enabling Self-Managed Superannuation Funds (SMSFs) within the SIS Act 1993 framework, with regulatory administration shifted to the ATO under the Tax Laws Amendment (SISA)
  reforms in 1999. Permits up to six members to operate their own trustee-controlled fund, granting direct asset selection within concessional super tax settings. SMSFs grew to roughly one-quarter of the
  system by assets, with concentration in residential and commercial property and equities.

  '
enacted_by:
- australia_keating_alp_1991_1996
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Self-managed retirement funds reinforced private wealth accumulation, easing pension liability.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: SMSF assets brought a growing share of household capital under the concessional super-tax base.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: SMSF entry challenged retail-fund market share, intensifying fee and product competition.

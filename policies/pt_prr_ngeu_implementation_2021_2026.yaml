description: 'Portugal''s Plano de Recuperação e Resiliência (PRR), the country''s NextGenerationEU absorption vehicle, was approved in 2021 with grant and loan envelopes channelled into climate, digital,
  and social investment. Enacted via Decree-Law 29-B/2021 and a dedicated Recover Portugal mission unit, it organised milestone-based disbursements tied to structural-reform and investment commitments through
  2026.

  '

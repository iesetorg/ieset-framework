description: 'First Thatcher-era Budget. Top rate of income tax cut from 83% to 60% (over £25,000); basic rate from 33% to 30%; VAT unified at 15% (up from twin 8%/12.5% rates). Corporation tax unchanged.
  Also prepared exchange-control abolition (announced July 1979, effective 23 October 1979). Announced MTFS-style monetary-discipline framing though formal MTFS was published March 1980.

  '

description: 'Reversed Macri-era retenciones cuts: raised soybean export tax from 30% to 33%, with differentials for soy meal/oil; maintained elevated rates on wheat and maize. Ley 27.541 (Dec 2019) had
  already re-established the executive''s authority to set export- duty rates. Retenciones remained the largest single federal revenue source tied to commodity prices. Accompanied 2022-2023 by successive
  "dólar soja" differentiated exchange-rate schemes (Sep 2022, Nov 2022, Apr 2023) offering exporters a premium rate to accelerate liquidation.

  '

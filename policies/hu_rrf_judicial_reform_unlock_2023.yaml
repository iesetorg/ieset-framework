policy_id: hu_rrf_judicial_reform_unlock_2023
status: candidate
title: Rrf Judicial Reform Unlock 2023
countries:
- HUN
timeframe:
  start: 2022
  end: ongoing
description: 'In 2023 the Hungarian government enacted a judicial-independence reform package (Act X of 2023 amending judicial-administration statutes) designed to unlock its share of the EU Recovery and
  Resilience Facility (RRF), which had been frozen by the Commission under the rule-of-law conditionality regulation. The reform rebalanced powers between the National Judicial Council and the Office of
  the National Judiciary, allowing the release of conditional pre-financing tranches that fed into the state budget and EU-co-financed transfer programmes.

  '
enacted_by:
- hungary_orban_fourth_term_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Unlocked EU funds reduced reliance on emergency sectoral business levies introduced during the freeze.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Restored fiscal space supported continuation of Hungary's flat-tax personal income regime.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: RRF tranches financed cohesion-style transfer programmes for households and regions.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Released RRF pre-financing increased headline general-government expenditure capacity.

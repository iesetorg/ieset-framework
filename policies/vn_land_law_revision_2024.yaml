policy_id: vn_land_law_revision_2024
status: candidate
title: Vietnam Land Law revision 2024
countries:
- VNM
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-18'
description: 'Law No. 31/2024/QH15, passed by the National Assembly on 18 January 2024 at the 5th extraordinary session (432 of 477 delegates voting yes) and entering into force 1 August 2024. Retains constitutional
  ''entire-people ownership'' of land but substantially broadens land- use-rights regime: expands eligible non-agricultural land-use scenarios for foreign-invested enterprises, tightens compulsory- acquisition
  grounds and compensation valuation rules (market-based pricing table replaces administrative tables from 2026), simplifies conversion between land-use categories, and recognises land-use contributions
  by residential-conversion agreements with private developers. Paired with revised Housing Law and Real Estate Business Law. Central technical-legal prerequisite to unlocking Resolution 68''s private-sector
  ambitions.

  '

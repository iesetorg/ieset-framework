description: 'Ley 18.985 of 28 June 1990. Raised first-category (corporate) tax rate from 10% to 15%; widened top personal-income bracket; reinstated taxes on presumptive agricultural, mining, and transport
  sectors; VAT 16%→18%. Yielded ~2% GDP additional revenue earmarked for education, health, and housing social-investment expansion under Aylwin''s "crecimiento con equidad" framework. Negotiated with opposition
  RN and UDI via Büchi-Foxley dialogue.

  '

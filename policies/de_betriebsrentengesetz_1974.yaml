description: 'Gesetz zur Verbesserung der betrieblichen Altersversorgung (19 December 1974) introduced vesting rules for occupational pension rights, insolvency insurance via the Pensions-Sicherungs-Verein
  (PSVaG), and indexation protection. Cemented the second pillar of the German pension system alongside statutory Rentenversicherung. Costs to employers significant; protects worker retirement claims.

  '

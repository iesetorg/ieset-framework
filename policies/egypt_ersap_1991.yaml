policy_id: egypt_ersap_1991
status: candidate
title: Egypt Ersap 1991
countries:
- EGY
timeframe:
  start: 1991
  end: 2011
description: 'The Economic Reform and Structural Adjustment Programme launched in May 1991 under IMF and World Bank agreements unified the exchange rate, lifted price controls on most goods, slashed the
  budget deficit from over 15% to roughly 3% of GDP within five years, opened the foreign- trade and current-account regime, and authorised privatisation of state enterprises under Public Enterprise Law
  203 of 1991. Combined with US Paris Club debt relief, ERSAP defined Egypt''s stabilisation phase under Mubarak.

  '

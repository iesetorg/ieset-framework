policy_id: cr_bank_nationalisation_1948
status: candidate
title: Costa Rica bank nationalisation 1948
countries: [CRI]
timeframe: {start: 1948, end: 1995}
description: >
  The Second Republic nationalised Costa Rica's commercial banking system in
  1948, placing deposit-taking and credit allocation under state control. The
  model supported developmental and social priorities while limiting private
  financial competition until later liberalisation.
enacted_by:
  - costa_rica_second_republic_welfare_democracy_1948_1978
axes_moved:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, intended: true, rationale: "State ownership and control tightened banking regulation and credit allocation."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, intended: true, rationale: "Private banking competition was sharply restricted."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, intended: true, rationale: "Directed credit subsidised priority sectors through state banks."}
references:
  - "Mesa-Lago, social security and development studies on Costa Rica"
  - "World Bank, Costa Rica financial-sector history"

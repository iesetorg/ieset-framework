policy_id: in_article_370_abrogation_2019
status: candidate
title: India — Abrogation of Article 370 and reorganisation of Jammu & Kashmir (2019)
countries:
- IND
timeframe:
  start: 2019
  enacted_date: '2019-08-05'
description: 'On 5 August 2019 the Union Government issued Constitutional Order 272 (invoking Article 370(1) itself) followed by Presidential Order applying all provisions of the Constitution of India to
  the state of Jammu & Kashmir, effectively hollowing Article 370''s special status. Parliament then passed the Jammu and Kashmir Reorganisation Act 2019 (Aug 2019) splitting the state into two Union Territories
  — Jammu & Kashmir (with legislature) and Ladakh (without). Communications lockdown and preventive detentions accompanied the move. Supreme Court constitutional bench upheld the abrogation 11 Dec 2023
  (In re: Article 370). Economic effects: removal of restrictions on non-resident land purchase (Section 35A also inoperative); extension of central laws including RTE, RTI, reservation categories, and
  central tax regime.

  '

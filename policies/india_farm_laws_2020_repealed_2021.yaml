policy_id: india_farm_laws_2020_repealed_2021
status: candidate
title: India Farm Laws 2020 Repealed 2021
countries:
- IND
timeframe:
  start: 2014
  end: 2024
description: 'In September 2020 Parliament passed three farm laws — the Farmers'' Produce Trade and Commerce (Promotion and Facilitation) Act, the Farmers (Empowerment and Protection) Agreement on Price
  Assurance and Farm Services Act, and amendments to the Essential Commodities Act — to enable inter-state trade outside APMC mandis, contract farming, and removal of stockholding limits for "non-essential"
  commodities. Sustained farmer protests led to repeal in November 2021 by the Farm Laws Repeal Act 2021.

  '
enacted_by:
- india_modi_first_second_term_2014_2024
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced market-fee charges for agribusiness corporates trading outside APMC mandis.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: After repeal, the government compensated by expanding MSP procurement and farm-input subsidies.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: PM-Kisan and procurement-based transfers were reinforced after the repeal as compensating measures.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Original Acts widened agribusiness entry; repeal restored the APMC-led structure.

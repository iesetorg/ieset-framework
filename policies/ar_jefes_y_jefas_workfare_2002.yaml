timeframe:
  start: 2002
  end: 2009
  enacted_date: '2002-04-03'
description: 'Decreto 565/2002 of 3 April 2002. Created workfare programme providing $150/month to unemployed household heads with minor children or disabled dependents in exchange for 20 hours/week community
  work or training. Coverage ~2M beneficiaries by 2003; first mass cash-transfer in Argentine history. Gradually rolled into Plan Familias (2005) and AUH (Oct 2009).

  '

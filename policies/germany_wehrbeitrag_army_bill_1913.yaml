policy_id: germany_wehrbeitrag_army_bill_1913
status: candidate
title: Germany Wehrbeitrag and Army Bill 1913
countries: [DEU]
timeframe:
  start: 1913
description: >
  The 1913 army bill sharply expanded the imperial army in the final prewar build-up,
  while the accompanying Wehrbeitrag imposed a one-off levy on larger fortunes to help
  finance the package. The combined measure is a useful policy bundle because it joined
  militarised state expansion to an explicitly extraordinary tax on wealth: Germany did
  not rely on small-state finance here, but on a larger fiscal-military commitment under
  intensifying European rivalry.
enacted_by:
  - germany_imperial_tariff_social_insurance_state_1902_1914
coalition_label_at_enactment: "Imperial government under Chancellor Theobald von Bethmann Hollweg"
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Army expansion increased peacetime military outlays and procurement commitments."
  - axis: fiscal.tax_capital
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The Wehrbeitrag raised a one-off levy on larger fortunes to fund part of the military build-up."
references:
  - "Army Bill of 1913"
  - "Wehrbeitragsgesetz (1913)"
  - "Stevenson (1996), Armaments and the Coming of War"

policy_id: co_ventanilla_siniestra_cocaine_peso_laundering_1980
status: candidate
title: Ventanilla siniestra — cocaine peso-laundering at BanRep (Colombia, late 1970s-1980s)
countries:
- COL
timeframe:
  start: 1980
  end: 1991
description: 'Banco de la República window that purchased USD without origin question ("ventanilla siniestra") absorbed cocaine-export inflows as the Medellín cartel grew through the late 1970s and 1980s.
  De-facto regulatory forbearance on money-laundering; allowed the "dollar peg" overvaluation dynamic. Ended gradually under Barco (1986-90) and definitively under Gaviria 1991 financial reform.

  '

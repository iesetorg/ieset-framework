policy_id: pk_ehsaas_programme_2019
status: candidate
title: Ehsaas Programme — integrated social-protection architecture (2019)
countries:
- PAK
timeframe:
  start: 2019
  end: 2022
  enacted_date: '2019-03-27'
description: 'Umbrella social-protection framework announced 27 March 2019 by the Imran Khan PTI government, consolidating pre-existing cash- transfer programmes (Benazir Income Support Programme rebranded
  Ehsaas Kafaalat, quarterly women cash transfers rising over programme life to roughly PKR 14,000/qtr for ~8m households), interest-free loan schemes (Ehsaas Interest-Free Loans), education conditional
  cash transfers, Langar community-kitchen infrastructure, Ehsaas Undergraduate Scholarship. Emergency-cash mode (April 2020) disbursed PKR 203bn to ~15m families during COVID, the largest single cash-transfer
  rollout in Pakistani history. Post-2022, coalition government reverted branding toward BISP while retaining programme architecture.

  '
enacted_by:
- pakistan_khan_pti_2018_2022
coalition_label_at_enactment: PTI-led coalition

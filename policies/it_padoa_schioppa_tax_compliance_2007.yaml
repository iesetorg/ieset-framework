description: 'Tax-compliance and evasion crackdown under Finance Minister Tommaso Padoa-Schioppa: expanded electronic communication between Agenzia delle Entrate and banks/land registry, restrictions on
  cash transactions above €5,000 then €1,000, mandatory electronic payments for freelancer fees, reformed studi di settore sectoral revenue presumptions, and revocation of certain condono fiscali (tax amnesties)
  of the Berlusconi II-III period. Produced ~€19bn revenue over-performance in 2007 vs budget forecast — rare direct evidence of compliance responsiveness to enforcement intensity.

  '

title: Germany Price Liberalisation 1948
countries:
- DEU
timeframe:
  start: 1948
  end: 1966
description: 'Ludwig Erhard''s Leitsätzegesetz (Law on Guiding Principles), enacted by the Bizonal Economic Council in June 1948 alongside the Deutsche Mark currency reform, abolished most Allied price
  controls and rationing on consumer goods overnight. The deregulation rebooted market price signals, ended the prevailing barter economy, and is conventionally credited with detonating the consumer-supply
  expansion that opened the Wirtschaftswunder.

  '

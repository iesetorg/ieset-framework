policy_id: sv_tax_reform_2023
status: candidate
title: Bukele tax-reform package — income-tax reductions and base broadening (2023)
countries:
- SLV
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-10-01'
description: 'A package of tax-reform measures approved during 2023 by the Nuevas Ideas Legislative Assembly including: incentive-based reductions in personal income tax for lower and middle brackets; targeted
  corporate-income-tax reductions on reinvested profits and on select sectors including tech (via Ley de Fomento a la Tecnología de la Información, see sv_ley_fomento_tecnologia_2023), aviation, and tourism;
  zero-tariff imports for certain capital goods; and base-broadening enforcement via Ministerio de Hacienda and the new digital tax-administration platform. Part of the package was IMF-Article-IV-signalled
  ahead of the Dec 2024 EFF negotiations.

  '

title: Japan FY2026 initial budget strategic-investment package
countries:
- JPN
timeframe:
  start: 2026
  end: 2027
  enacted_date: '2025-12-26'
description: 'The FY2026 draft budget approved in December 2025 set a JPY122.3tn initial general-account framework, up JPY7.1tn from FY2025. It increased general expenditure, defence build-up spending,
  child and child-rearing allocations, GX upfront investment, semiconductor public support, science grants, critical-products funding, and local allocation grants while keeping newly issued government bonds
  below JPY30tn and showing a general-account primary-balance surplus in the initial budget. The package operationalised Takaichi''s "responsible proactive public finances" line: targeted strategic investment
  and crisis preparedness inside a stated fiscal-discipline frame.

  '

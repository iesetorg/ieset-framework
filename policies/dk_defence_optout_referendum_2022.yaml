policy_id: dk_defence_optout_referendum_2022
status: candidate
title: Danish EU defence opt-out abolition referendum 2022 + NATO 2% pivot
countries:
- DNK
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-06-01'
description: 'Following the February 2022 Russian invasion of Ukraine, Denmark held a referendum on 1 June 2022 on abolishing its 1993 EU-treaty defence opt-out; 66.9% voted ''Yes'' and the opt-out was
  formally lifted, enabling Danish participation in CSDP operations and EDA. The referendum was accompanied by a multi-party ''National Compromise on Danish Security Policy'' (6 March 2022) committing Denmark
  to raising defence spending to 2% of GDP by 2030 (later accelerated) and to additional military support for Ukraine. Part of the same policy arc was the diplomatic and forensic response to the 26 September
  2022 sabotage of the Nord Stream pipelines in the Danish and Swedish EEZs.

  '

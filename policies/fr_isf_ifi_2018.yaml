  enacted_date: '2017-12-30'
description: 'Abolition of the Impôt de solidarité sur la fortune (ISF) on financial and business assets and its replacement by the Impôt sur la fortune immobilière (IFI), a real-estate-only wealth tax
  with the same €1.3m threshold and progressive 0.5-1.5% schedule. Intended to reduce capital flight and investment disincentives; critiqued as a distributionally regressive symbol ("président des riches").

  '

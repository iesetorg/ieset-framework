policy_id: ph_pantawid_4ps_expansion_2010_2016
status: candidate
title: Pantawid 4Ps Expansion 2010 2016
countries:
- PHL
timeframe:
  start: 2010
  end: 2016
description: 'Aquino III administration''s expansion of the Pantawid Pamilyang Pilipino Program (4Ps), the Philippines'' conditional-cash-transfer scheme administered by DSWD using Listahanan/PMT-based
  household targeting. Coverage grew from a few hundred thousand households in 2009 to roughly four million by 2015, with conditionalities on child health visits and school attendance. The 2019 Republic
  Act 11310 later codified the programme institutionally.

  '

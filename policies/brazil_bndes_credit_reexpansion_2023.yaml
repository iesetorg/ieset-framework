policy_id: brazil_bndes_credit_reexpansion_2023
status: candidate
title: Brazil Bndes Credit Reexpansion 2023
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'Brazil''s 2023 BNDES credit re-expansion, implemented through the Nova Indústria Brasil framework and Treasury capitalisation under the third Lula administration, restored subsidised long-term
  lending after years of contraction under Bolsonaro. Targets include green industry, semiconductors, sanitation, and small-business credit lines, with reactivated TLP/TR-linked instruments. The intended
  effect is to revive directed industrial credit while operating within the new fiscal framework (Lei Complementar 200/2023).

  '
enacted_by:
- brazil_lula_third_term_2023_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Restored subsidised credit lines transferred resources to targeted sectors via below-market spreads.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Treasury support and SOE-mediated lending raised the consolidated public-sector financial footprint.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: 'Distributional impact mixed: industrial subsidies for large firms, but partial earmarking for small-firm and green credit.'
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Explicit sectoral targeting (green, semiconductors, sanitation) channelled directed subsidy to chosen industries.

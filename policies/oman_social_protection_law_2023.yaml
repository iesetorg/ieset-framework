policy_id: oman_social_protection_law_2023
status: candidate
title: Oman Social Protection Law
countries:
- OMN
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2023-07-19'
description: 'Royal Decree 52/2023 issued the Social Protection Law, consolidating Oman''s pension, social-assistance, maternity, disability, childhood, unemployment, sick-leave, occupational-injury, and
  related insurance branches under a unified Social Protection Fund architecture. Most provisions took effect from 1 January 2024, with specified branches phased in later.

  '
enacted_by:
- oman_haitham_fiscal_state_modernisation_2020_present
scope: national
coalition_label_at_enactment: Sultan Haitham appointed government
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: The law created or unified multiple cash-benefit and social-insurance branches, including childhood, old-age, disability, and maternity benefits.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Broader statutory benefit entitlements increase the public social-protection footprint, even with contribution financing.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Consolidation of fragmented pension and assistance regimes into a statute-backed fund makes entitlements more rule-bound.

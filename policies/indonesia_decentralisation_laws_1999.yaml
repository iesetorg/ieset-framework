policy_id: indonesia_decentralisation_laws_1999
status: candidate
title: Indonesia Decentralisation Laws 1999
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Laws 22/1999 (regional governance) and 25/1999 (fiscal balance) devolved expenditure responsibility for health, education, infrastructure, and most sectoral services from the central government
  to district (kabupaten) and city governments, financed by intergovernmental transfers (DAU, DAK) from central revenues. Implemented in 2001 under the Wahid administration, the package represented one
  of the largest decentralisation programmes attempted in any developing country.

  '
enacted_by:
- indonesia_reformasi_1998_present
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Decentralisation reduced central executive control over fiscal levers, complementing BI independence.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: District-level licensing reforms diluted Jakarta-controlled financial-sector permitting.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Local government competition for investment incentivised lighter-touch business regulation in some districts.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Equalisation grants (DAU) and earmarked allocations (DAK) institutionalised large new transfer flows.

description: 'In December 2008, in response to the financial crisis, the Federal Reserve cut the federal funds target to a 0-0.25 percent range, inaugurating a zero-interest-rate policy (ZIRP). The near-zero
  range was maintained until December 2015, accompanied by forward guidance, interest on excess reserves, and successive rounds of large-scale asset purchases. The unconventional posture was designed to
  ease financial conditions when the policy rate hit the effective lower bound.

  '

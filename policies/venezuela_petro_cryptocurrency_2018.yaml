policy_id: venezuela_petro_cryptocurrency_2018
status: candidate
title: Venezuela Petro Cryptocurrency 2018
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'In February 2018 the Maduro government launched the Petro (PTR), a state-issued cryptocurrency notionally backed by Venezuelan crude oil reserves at the Ayacucho-1 block. Marketed as a sanctions
  workaround and parallel reserve unit, it was used as the nominal anchor for the 2018 bolivar redenomination. The Petro saw negligible adoption, opaque issuance, and was effectively discontinued by 2024
  amid corruption investigations.

  '

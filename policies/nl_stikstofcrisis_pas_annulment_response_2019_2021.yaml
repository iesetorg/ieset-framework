policy_id: nl_stikstofcrisis_pas_annulment_response_2019_2021
status: candidate
title: Netherlands stikstofcrisis — PAS annulment response 2019-2021
countries:
- NLD
timeframe:
  start: 2019
  end: 2021
  enacted_date: '2019-05-29'
description: 'Raad van State ruling of 29 May 2019 annulled the Programma Aanpak Stikstof (PAS) under the EU Habitats Directive, finding that the programme''s pre-authorisation of nitrogen-deposition-increasing
  activities could not be reconciled with strict Natura 2000 protection. Froze ~18,000 construction and farm permits overnight. Rutte III response: Wet stikstofreductie en natuurverbetering (2021) with
  a non-binding 50%-by-2035 reduction target, general motorway speed limit to 100 km/h (Snelheidsverlagingswet, 2020), warme-sanering varkenshouderijen (pig-farm voluntary buyout), and Stikstof- kleefstoffonds.
  Farmer tractor protests 1 October 2019 marked the emergence of the BBB political vehicle (2019).

  '
enacted_by:
- netherlands_rutte_iii_2017_2022
coalition_label_at_enactment: VVD-CDA-D66-ChristenUnie
axes_moved:

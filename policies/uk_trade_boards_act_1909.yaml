# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: uk_trade_boards_act_1909
status: candidate
title: Trade Boards Act 1909
countries: [GBR]
timeframe:
  start: 1909
  end: 1909
  enacted_date: "1909-10-20"
description: >
  The Trade Boards Act introduced statutory wage-setting machinery in a small group
  of notoriously low-paid or "sweated" trades, allowing boards of employers, workers,
  and neutral members to fix minimum rates. It did not create a general national minimum
  wage, but it marked an early and important move away from the older liberal assumption
  that wages should be left entirely to contract and market bargaining even in sectors
  with extreme power imbalance and chronic low pay.
enacted_by:
  - uk_new_liberalism_1906_1914
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Sectoral wage boards introduced explicit labour-market floors in trades previously governed almost entirely by contract."
references:
  - "Trade Boards Act 1909"
  - "Blackburn (2007), A Fair Day's Wage for a Fair Day's Work?"

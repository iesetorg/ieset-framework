policy_id: zimbabwe_rbz_fiscal_financing_2003_2009
status: candidate
title: Zimbabwe Rbz Fiscal Financing 2003 2009
countries:
- ZWE
timeframe:
  start: 2000
  end: 2009
description: 'Under Governor Gideon Gono (appointed December 2003), the Reserve Bank of Zimbabwe undertook large-scale quasi-fiscal operations financing the Treasury, parastatal losses, agricultural inputs,
  and the ''farm mechanisation'' programme through direct money creation. Successive redenominations of the Zimbabwe dollar (2006, 2008, 2009) failed to contain a hyperinflation that peaked in November
  2008 at an estimated 79.6 billion percent month-on-month.

  '

policy_id: at_asylgesetz_novellen_2017_2018
status: candidate
title: Asylum-law tightening package 2017-2018
countries:
- AUT
timeframe:
  start: 2017
  end: 2018
  enacted_date: '2018-06-14'
description: 'Series of amendments to the Asylgesetz, Fremdenpolizeigesetz and Niederlassungs- und Aufenthaltsgesetz enacted in 2017 (final months of Kern SPOe-OeVP government under OeVP Interior Ministry)
  and 2018 (Fremdenrechtsaenderungsgesetz under Kurz I OeVP-FPOe): mandatory confiscation of EUR 840 from asylum applicants on entry, seizure of mobile-phone data for identity verification, reduced basic-care
  allowances, ''Deutsch- und Wertekurse'' mandatory from recognition, and tightened subsidiary-protection procedures. Coincided with the rhetorical ''Balkanroute schliessen'' posture led by Interior Minister
  Herbert Kickl (FPOe) under Kurz I.

  '

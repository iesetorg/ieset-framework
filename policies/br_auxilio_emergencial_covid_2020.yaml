policy_id: br_auxilio_emergencial_covid_2020
status: candidate
title: Auxílio Emergencial — COVID cash transfer
countries:
- BRA
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-04-02'
description: 'Lei 13.982/2020 established the Auxílio Emergencial, an emergency cash transfer initially set at R$600/month (R$1,200 for single-mother households) for informal workers, MEIs, unemployed and
  low-income households. Reached ~68 million recipients at peak — the largest cash-transfer expansion in Brazilian history by coverage and fiscal volume (~4% of GDP in 2020). Extended through 2020 at reduced
  values and replaced by Auxílio Brasil / Bolsa Família successor programmes from 2021.

  '
enacted_by:
- brazil_bolsonaro_pl_2019_2022
coalition_label_at_enactment: PSL with Centrão partners under Bolsonaro; Congress raised the value above the executive's proposed R$200

description: 'Ratification by the Bundestag and Bundesrat of the Treaty on Stability, Coordination and Governance in the Economic and Monetary Union (TSCG, signed March 2012, often called the Fiscal Compact)
  which required signatory states to enshrine a balanced-budget rule in national (preferably constitutional) law with a structural deficit ceiling of 0.5% GDP (1.0% for low-debt states) and automatic correction
  mechanism. Germany already had the Schuldenbremse and actively promoted the treaty across the euro area.

  '

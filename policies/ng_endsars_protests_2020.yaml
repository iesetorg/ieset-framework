policy_id: ng_endsars_protests_2020
status: candidate
title: '#EndSARS protests and Lekki tollgate incident'
countries:
- NGA
timeframe:
  start: 2020
  end: 2020
  enacted_date: '2020-10-20'
description: 'Two weeks of youth-led protests October 2020 against the Special Anti- Robbery Squad (SARS), a federal police unit accused of extrajudicial killings and extortion. SARS was nominally disbanded
  on 11 October 2020. Protests culminated on the evening of 20 October 2020 when Nigerian Army personnel opened fire on protesters at the Lekki tollgate in Lagos; Lagos Judicial Panel of Inquiry (2021)
  concluded at least 9 deaths and characterised the event as a massacre. The episode is the defining civic-trust rupture of the Buhari civilian era and a direct antecedent of the 2024 #EndBadGovernance
  mobilisation.

  '

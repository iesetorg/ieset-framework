policy_id: ca_capital_gains_inclusion_cancellation_2025
status: candidate
title: Canada — Cancellation of 2024 capital-gains inclusion rate increase (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-21'
description: 'Budget 2024 (Trudeau/Freeland, April 2024) had announced an increase in the capital-gains inclusion rate from 50% to 66.67% for individuals on capital gains above C$250,000 per year and on
  all corporate and trust capital gains, effective 25 June 2024. The measure was administered via CRA notice but never passed as stand-alone legislation before Parliament was prorogued in January 2025.
  On 31 January 2025 the Finance Minister announced deferral of the effective date to 1 January 2026. Following the March 2025 leadership transition, the Carney government announced on 21 March 2025 that
  the proposed inclusion-rate increase would not proceed and directed CRA to administer on the 50% basis. Legislative cancellation incorporated into Budget 2025. Effect is to preserve the 50% inclusion
  rate that had applied since 2000. Lifetime capital-gains exemption increase and Canadian Entrepreneurs'' Incentive remained under review.

  '
enacted_by:
- canada_carney_liberal_2025_present
coalition_label_at_enactment: Liberal Party minority (pre-election caretaker)
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Preserves the 50% capital-gains inclusion rate rather than moving to 66.67%, a meaningful reduction in the forward-looking effective tax rate on capital gains above the individual threshold
    and on all corporate gains.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Foregone progressive measure — the cancelled increase would have been borne disproportionately by high-income and corporate filers; cancellation makes the forward-looking tax mix slightly less
    progressive.
references:
- Budget 2024 (Freeland) — capital-gains inclusion rate announcement
- Department of Finance Canada — deferral announcement, 31 January 2025
- Department of Finance Canada — cancellation announcement, 21 March 2025
- Canada Revenue Agency administrative notices 2024-2025

title: Heavy and Chemical Industrialisation (HCI) drive — South Korea 1973-1979
countries:
- KOR
timeframe:
  start: 1973
  end: 1979
  enacted_date: '1973-01-12'
description: 'Presidential directive under Park Chung-hee targeting six strategic sectors: steel, petrochemicals, shipbuilding, machinery, electronics, and non-ferrous metals. Implemented via selective
  credit allocation (state-directed preferential loans at subsidised rates), targeted protection, technology-licensing promotion, and Korea Development Bank mobilisation. Despite heterodox methods, outcomes
  included successful emergence of POSCO (steel), Hyundai Heavy (shipbuilding), Samsung and LG (electronics). Short-term imbalances (inflation, current-account deficits) produced 1979-80 stabilisation crisis,
  partially reversed under Chun Doo-hwan. Canonical developmentalist reference case — Amsden (1989) + Chang (2002) analyses. The framework treats HCI as strategic-credit-allocation + selective protection,
  distinguishing from price controls.

  '

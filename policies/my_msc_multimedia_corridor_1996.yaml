description: 'Multimedia Super Corridor (MSC) announced Aug 1996 as 15 km × 50 km special zone running from KLCC to KLIA — including Cyberjaya, IT tenants incentive package (10-year tax pioneer status,
  100% foreign ownership, expatriate-visa easing). Anchored by flagship applications (electronic government, smart schools, multipurpose card, telemedicine, R&D clusters). Mixed delivery — large infrastructure
  investment but world-class digital-economy cluster outcome contested.

  '

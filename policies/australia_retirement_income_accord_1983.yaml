policy_id: australia_retirement_income_accord_1983
status: candidate
title: Australia Retirement Income Accord 1983
countries:
- AUS
timeframe:
  start: 1992
  end: ongoing
description: 'Tripartite agreement between the Hawke Labor government, ACTU, and employers as part of the Prices and Incomes Accord, exchanging wage restraint for expanded "social wage" benefits including
  award-based superannuation. The 1986 productivity agreement introduced a 3% award superannuation contribution that became the foundation for the universal Superannuation Guarantee Act 1992, shifting Australia''s
  retirement-income system toward defined-contribution funded pensions.

  '

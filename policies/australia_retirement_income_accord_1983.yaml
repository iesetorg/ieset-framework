- australia_keating_alp_1991_1996
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privately funded retirement savings reduced long-run reliance on the means-tested Age Pension.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Concessional 15% tax on super contributions and earnings established a distinct capital-tax regime.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Created a large pool of compulsory savings, expanding domestic capital markets and managed-fund competition.

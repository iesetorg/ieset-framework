policy_id: rwanda_rdb_one_stop_shop_2008
status: candidate
title: Rwanda Rdb One Stop Shop 2008
countries:
- RWA
timeframe:
  start: 1994
  end: ongoing
description: 'The Rwanda Development Board (RDB) was established in 2008 by Law 53/2008, consolidating multiple investor-facing agencies (RIEPA, HIDA, ORTPN, Privatisation Secretariat) into a single one-stop
  shop for business registration, investment licensing, and tax administration coordination. RDB targets rapid company incorporation (under 24 hours) and underpins Rwanda''s Doing Business rankings strategy.

  '
enacted_by:
- rwanda_post_genocide_reconstruction_1994_2020
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower entry costs raised firm-formation rates and contestability across formal sectors.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Centralised registry made corporate ownership and security interests easier to record/enforce.
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Procedural transparency improved but discretionary investor incentives can override rule-based norms.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: One-stop shop materially reduced FDI entry frictions and aligned with EAC integration.

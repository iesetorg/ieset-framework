status: candidate
title: Phase Ii Iv Controls 1971 1974
countries:
- USA
timeframe:
  start: 1971
  end: 1974
description: 'The Nixon Phases II-IV wage-price controls (November 1971 to April 1974), succeeding the Phase I freeze of 15 August 1971 announced under Executive Order 11615 and the Economic Stabilization
  Act, used a Cost of Living Council, Pay Board, and Price Commission to administer mandatory and later voluntary controls on wages, prices, dividends, and rents. Phase III (Jan 1973) loosened the regime,
  Phase IV (Aug 1973) reimposed selective controls. The intended effect was to suppress inflation while pursuing expansionary monetary-fiscal policy in the run-up to the 1972 election — but the regime collapsed
  under the 1973 oil shock and entrenched stagflation.

  '

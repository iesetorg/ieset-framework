  end: 2021
  enacted_date: '2019-01-11'
description: '73-point written agreement between Socialdemokraterna, Miljöpartiet, Centerpartiet and Liberalerna signed 11 January 2019 after a 131-day government formation, permitting Löfven to be re-elected
  PM in exchange for liberal policy concessions: värnskatt abolition, market-rent reform for new-build housing, LAS employment-protection loosening, tightened EU-rule integration, deregulation measures.
  Operated until June 2021 when Vänsterpartiet triggered the no-confidence vote over rental reform.

  '

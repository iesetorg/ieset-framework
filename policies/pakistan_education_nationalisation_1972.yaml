policy_id: pakistan_education_nationalisation_1972
status: candidate
title: Pakistan Education Nationalisation 1972
countries:
- PAK
timeframe:
  start: 1972
  end: 1977
description: 'Pakistan''s Education Policy of March 1972, implemented under the Nationalisation of Privately Managed Schools and Colleges Act, transferred all privately managed schools, colleges, and other
  institutions of higher learning into government ownership without compensation. The state assumed responsibility for teachers'' salaries, infrastructure, and curriculum, declaring education up to Class
  X universal and free. The intended effect was to centralise educational provision under the state, equalise access across class lines, and channel curriculum towards Bhutto-era socialist and Islamic developmental
  priorities.

  '
enacted_by:
- pakistan_bhutto_nationalisations_1972_1977

description: 'President Erdoğan imposed a unorthodox monetary policy framework: despite inflation accelerating from ~19% (Sep 2021) to >85% (Oct 2022), the CBRT repeatedly cut policy rates — with CBRT governors
  dismissed multiple times for resisting. Rationale articulated by Erdoğan: that high interest rates CAUSE inflation (inversion of standard theory). Lira devalued from ~8.5/USD (Sep 2021) to ~19/USD (May
  2023). Post-2023 election: new finance minister Mehmet Şimşek + CBRT governor Hafize Gaye Erkan began orthodox normalisation — rates hiked to 50% by Q1 2024, inflation deceleration followed. Crisis episode
  + reversal provides an unusually clean natural experiment for central-bank-independence and monetary-expansion-direction axes.

  '

policy_id: us_section_232_steel_aluminum_tariffs_2018
status: candidate
title: Section 232 Steel Aluminum Tariffs 2018
countries:
- USA
timeframe:
  start: 2017
  end: 2021
description: 'The Trump administration''s Section 232 steel and aluminum tariffs, imposed by Presidential Proclamations 9704 and 9705 of 8 March 2018 under the Trade Expansion Act of 1962, levied 25% tariffs
  on steel imports and 10% on aluminum on national-security grounds, with country-specific exclusions, quotas, and TRQs negotiated for Canada, Mexico (under USMCA), South Korea, Brazil, and others. The
  intended effect was to revive idle US steel and aluminum capacity, reverse perceived strategic-industry erosion, and signal American willingness to use tariffs unilaterally outside the WTO framework.

  '

policy_id: jp_auto_voluntary_export_restraint_1981
status: candidate
title: Japan-US auto voluntary export restraint (Japan 1981)
countries:
- JPN
- USA
timeframe:
  start: 1981
  end: 1994
  enacted_date: '1981-05-01'
description: 'MITI-administered Voluntary Export Restraint limiting Japanese passenger-car exports to the US, announced 1 May 1981 under threat of Congressional protectionist legislation. Initial ceiling
  1.68M vehicles, raised to 1.85M (1984), 2.30M (1985-1994). Accelerated Japanese automaker transplant production in the US (Honda Ohio 1982, Nissan Tennessee 1983, Toyota-GM NUMMI 1984). Formally ended
  1994 though MITI guidance continued implicit.

  '

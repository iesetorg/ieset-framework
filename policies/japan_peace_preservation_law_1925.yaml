policy_id: japan_peace_preservation_law_1925
status: candidate
title: Japan Peace Preservation Law 1925
countries: [JPN]
timeframe:
  start: 1925
description: >
  The Peace Preservation Law criminalised organisations and advocacy aimed at altering
  the kokutai or abolishing private property, giving the state a powerful legal basis to
  repress socialist, communist, and anti-imperial activism. Later amendments sharpened
  penalties and expanded the coercive reach of the special higher police. The law is a
  central institutional anchor of late Taisho and early Showa Japan because it paired
  limited mass-politics incorporation with explicit ideological containment.
enacted_by:
  - japan_prewar_state_building_social_incorporation_1906_1931
coalition_label_at_enactment: "Kenseikai-led cabinet under Kato Takaaki"
axes_moved:
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "Criminalised ideological opposition to the imperial order and private property, weakening equal legal protection for dissenting political organisation."
references:
  - "Peace Preservation Law (1925)"
  - "Mitchell (1976), Thought Control in Prewar Japan"

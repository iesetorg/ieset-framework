policy_id: jp_boj_gfc_rate_cuts_jgb_purchases_2008_2009
status: candidate
title: Boj Gfc Rate Cuts Jgb Purchases 2008 2009
countries:
- JPN
timeframe:
  start: 2007
  end: 2009
description: 'In response to the global financial crisis the Bank of Japan cut the uncollateralised overnight call rate from 0.5% to 0.1% in two steps (October and December 2008), expanded outright JGB
  purchases, and introduced complementary deposit facility, CP/corporate bond purchase and US-dollar funds-supplying operations. The actions stabilised yen money markets and supported bank balance sheets
  through the post-Lehman dislocation.

  '
enacted_by:
- japan_fukuda_aso_ldp_2007_2009
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: BOJ purchases absorbed JGB issuance, indirectly enabling larger fiscal spending packages.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Cheaper financing for the state supported expansion of crisis-era household and firm transfers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: CP/corporate-bond purchases functioned as targeted credit support to manufacturing and finance.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Rate cuts and JGB/CP purchases jointly extended monetary easing through the GFC.

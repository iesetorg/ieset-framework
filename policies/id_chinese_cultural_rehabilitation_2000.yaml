description: 'Presidential Decree Keppres 6/2000 issued 17 January 2000 by President Abdurrahman Wahid revoked Presidential Instruction Inpres 14/1967 that had banned Chinese-language publications, Chinese-cultural
  celebrations, and Chinese-religious-practice public display under the New Order. Permitted Chinese-New-Year public celebration; later upgraded to national holiday by Megawati 2002. Paired with Law 12/2006
  on Citizenship (under SBY) that removed ethnic-origin distinctions in citizenship acquisition.

  '

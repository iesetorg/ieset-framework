description: 'Autumn Agreement of 11 October 2013 between the Rutte II VVD-PvdA coalition and three opposition parties (D66, ChristenUnie, SGP) providing Senate majority for the 2014 budget. ~€16bn additional
  consolidation over 4 years plus ~€1bn tax cuts to soften impact on purchasing power; included lower corporate-income-tax rate threshold, third-bracket income tax cut to soften HRA impact, crisisheffing
  surtax on high incomes, and additional defence/healthcare savings. Essential to Dutch exit from the EU Excessive Deficit Procedure in 2014.

  '

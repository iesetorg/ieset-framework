policy_id: ca_immigration_levels_reduction_2025
status: candidate
title: Canada — Reduction of immigration admission targets (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2024-10-24'
description: 'Continuation and reaffirmation under the Carney government of the late-Trudeau Immigration Levels Plan 2025-2027 tabled 24 October 2024. The plan reduced permanent-resident admission targets
  from the prior 500,000/year trajectory to 395,000 in 2025, 380,000 in 2026, and 365,000 in 2027 — the first substantive nominal reduction in planned permanent-resident admissions in decades. Separately,
  temporary-resident measures included caps on international-student study-permit approvals (introduced January 2024 at 360,000 for 2024, tightened further in 2025), restrictions on the Temporary Foreign
  Worker Program low-wage stream, and a stated objective of reducing the temporary-resident population share from ~7.3% of population to ~5% over three years. Carney government on accession retained these
  settings without reversal and indicated further review of temporary-resident pathways.

  '

policy_id: ca_immigration_levels_reduction_2025
status: candidate
title: Canada — Reduction of immigration admission targets (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2024-10-24'
description: 'Continuation and reaffirmation under the Carney government of the late-Trudeau Immigration Levels Plan 2025-2027 tabled on 24 October 2024. The plan reduced permanent-resident admission targets
  from the prior 500,000-per-year trajectory to 395,000 in 2025, 380,000 in 2026, and 365,000 in 2027. Separately, temporary-resident measures included caps on international-student study-permit approvals,
  tighter low-wage Temporary Foreign Worker Program settings, and a stated objective of reducing temporary residents from about 7 percent of population to about 5 percent by the end of 2026. The Carney
  government retained these settings on taking office rather than reversing them.

  '

policy_id: tr_1994_stabilisation_package
status: candidate
title: Turkey 5 April 1994 stabilisation package
countries:
- TUR
timeframe:
  start: 1994
  enacted_date: '1994-04-05'
description: 'Emergency stabilisation package following the December 1993 - January 1994 currency crisis in which the lira lost ~50% against the dollar after treasury-bill auction cancellation and central-bank
  monetisation of the deficit. The 5 April Measures included VAT surcharges, SOE-price hikes, public-sector wage freeze, planned privatisation acceleration, and a $610m IMF standby arrangement in July 1994.
  Inflation peaked near 106% in 1994.

  '
enacted_by:
- turkey_ciller_dyp_1993_1996

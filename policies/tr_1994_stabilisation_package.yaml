  direction: '-'
  magnitude: moderate
  rationale: Emergency revenue hikes and wage freeze intended to compress deficit.
  intended: true
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  rationale: VAT surcharges and additional corporate tax measures in the package.
  intended: true

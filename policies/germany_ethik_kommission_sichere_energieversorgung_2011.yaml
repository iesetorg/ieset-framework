title: Germany Ethik Kommission Sichere Energieversorgung 2011
countries:
- DEU
timeframe:
  start: 2011
  end: 2022
description: 'The Ethik-Kommission Sichere Energieversorgung, convened by Chancellor Merkel after Fukushima and chaired by Klaus Töpfer and Matthias Kleiner, delivered its May 2011 report endorsing a 2022
  nuclear exit on ethical-acceptability grounds and recommending an accelerated renewables build-out. The Commission''s political legitimation underpinned the 13th Atomgesetz amendment and the wider Energiewende
  package.

  '

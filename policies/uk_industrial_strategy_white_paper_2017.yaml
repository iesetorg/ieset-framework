description: 'HM Government white paper ''Industrial Strategy: Building a Britain fit for the future'' structured around five foundations (ideas, people, infrastructure, business environment, places) and
  four Grand Challenges (AI, ageing society, clean growth, future of mobility). Established sector deals (aerospace, automotive, life sciences, AI, construction, nuclear, creative industries, rail), UK
  Research and Innovation (UKRI) with £7bn additional R&D commitment, and the Industrial Strategy Council. Framework wound down by the Johnson/Sunak governments after 2021, replaced by successive ''Plan
  for Growth'' iterations.

  '

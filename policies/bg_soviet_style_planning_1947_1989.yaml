# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: bg_soviet_style_planning_1947_1989
status: candidate
title: Bulgaria Soviet-style central planning 1947-1989
countries: [BGR]
timeframe: {start: 1947, end: 1989}
description: >
  Bulgaria adopted Soviet-style central planning with five-year plans, material
  allocation, state enterprise targets, and integration into the Council for
  Mutual Economic Assistance. The planning system emphasised heavy industry,
  social provision, and trade with the Soviet bloc.
enacted_by:
  - bulgaria_communist_state_building_1944_1989
axes_moved:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, intended: true, rationale: "Plan targets and material allocation displaced market competition."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, intended: true, rationale: "Trade was redirected into COMECON and away from broad multilateral openness."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, intended: true, rationale: "State planning financed broad subsidised social services and consumer goods."}
references:
  - "Library of Congress Country Study: Bulgaria, economy under communism"
  - "Maddison Project Database, Bulgaria long-run output series"

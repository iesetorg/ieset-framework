policy_id: dk_budgetlov_2012
status: candidate
title: Budgetlov 2012 — Danish multi-year expenditure-ceiling law
countries:
- DNK
timeframe:
  start: 2012
  end: ongoing
  enacted_date: '2012-06-12'
description: 'Lov nr. 547 af 18. juni 2012 introduced legally binding multi-year expenditure ceilings (udgiftslofter) for state, municipalities, and regions, and a 0.5%-of-GDP structural-deficit cap — giving
  domestic statutory force to the commitments of the EU Fiscal Compact. Enforcement included an automatic correction mechanism and oversight by Det Økonomiske Råd. Re-engineered Danish fiscal policy around
  structural- balance arithmetic rather than annual cash-deficit targets.

  '
enacted_by:
- denmark_thorning_socdem_2011_2015
coalition_label_at_enactment: Socialdemokratiet + Radikale Venstre + SF, with Venstre and Konservative support

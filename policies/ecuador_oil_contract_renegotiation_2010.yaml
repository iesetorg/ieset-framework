policy_id: ecuador_oil_contract_renegotiation_2010
status: candidate
title: Ecuador Oil Contract Renegotiation 2010
countries:
- ECU
timeframe:
  start: 2007
  end: 2017
description: 'The 2010 amendment to the Hidrocarburos Law (Ley Reformatoria) converted Ecuador''s production-sharing contracts with foreign oil companies into pure service contracts: the state took ownership
  of all crude in exchange for a fixed per-barrel fee. Firms that refused (notably Petrobras and Perenco) exited; remaining majors signed under the new model in late 2010, raising the state''s effective
  oil take and concentrating upstream control in Petroecuador.

  '

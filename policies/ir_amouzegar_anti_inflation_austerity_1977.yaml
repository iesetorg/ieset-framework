description: 'PM Jamshid Amouzegar''s 1977-78 austerity response to runaway inflation: cut construction spending, tightened credit, campaign against ''bazaar profiteering'' with arrests and shop closures.
  Succeeded in reducing inflation from 25%+ to ~10% but triggered bazaar merchant opposition, construction unemployment, and broadened the anti-regime coalition that produced the 1978-79 revolution.

  '

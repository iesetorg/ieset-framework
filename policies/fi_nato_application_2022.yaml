policy_id: fi_nato_application_2022
status: candidate
title: Nato Application 2022
countries:
- FIN
timeframe:
  start: 2019
  end: 2023
description: 'Finland''s NATO application was submitted on 18 May 2022 by the Marin government following the Russian invasion of Ukraine and ratified after parliamentary approval (Eduskunta, 17 May 2022);
  accession was completed on 4 April 2023. Under the Treaty of Washington Article 10, accession entailed binding mutual-defence obligations and a defence-spending commitment toward 2% of GDP. The intended
  effect was to anchor Finnish security in collective defence and end decades of military non-alignment.

  '
enacted_by:
- finland_marin_rainbow_2019_2023
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Defence procurement and reserve commitments raised related procurement and personnel transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Commitment to 2% of GDP defence spending sharply lifted the long-run public-spending baseline.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Accession-period climate commitments under the EU Green Deal sustained environmental rule-tightening.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Accession itself had no direct labour-market effect — null axis included for completeness.

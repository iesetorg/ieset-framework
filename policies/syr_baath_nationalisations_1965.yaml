# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: syr_baath_nationalisations_1965
status: candidate
title: Syria Ba'ath nationalisations 1965
countries: [SYR]
timeframe: {start: 1965, end: 1966}
description: >
  Syria's Ba'ath government nationalised banks, insurance companies, major
  industrial firms, and parts of foreign trade in the mid-1960s. The measures
  moved the commanding heights of the economy into the public sector and
  anchored Syria's later planning state.
enacted_by:
  - syria_baath_assad_statist_regime_1963_2000
axes_moved:
  - axis: institutional.property_rights
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "Private and foreign assets in finance and industry were transferred to state ownership."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "State monopolies and public enterprises displaced private competition in key sectors."
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Foreign trade controls and public import channels reduced commercial openness."
references:
  - "Hinnebusch (2001), Syria: Revolution from Above"
  - "Perthes (1995), The Political Economy of Syria Under Asad"

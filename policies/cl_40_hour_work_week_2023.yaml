title: 40-hour Work Week — Ley 21.561 phased working-time reduction (Chile 2023)
countries:
- CHL
timeframe:
  start: 2023
  end: 2028
  enacted_date: '2023-04-14'
description: 'Boric-era labour reform (Ley 21.561, signed 14 April 2023, published May 2023) reducing the statutory working week from 45 to 40 hours over a five-year phased transition: 44 hours one year
  after publication, 42 hours at three years, 40 hours at five years (2028). Introduces compressed-week averaging (4x10 or similar) subject to collective agreement, expanded rest-time flexibility, and a
  package of family-life protections including the right to request remote work for caregivers. Originated as a 2017 Communist Party / Camila Vallejo parliamentary initiative that the Bachelet II government
  initially declined to support; reintroduced under Boric and passed with cross-bench support including Chile Vamos sectors.

  '

policy_id: france_35_hour_week_2000
status: candidate
title: 35-hour working week — Aubry Laws 1998 / 2000
countries:
- FRA
timeframe:
  start: 2000
  enacted_date: '2000-01-19'
description: 'Mandatory reduction of the statutory workweek from 39 to 35 hours without proportional pay reduction for firms >20 employees (effective 2000 for large firms; 2002 for smaller). Intended to
  reduce unemployment through work-sharing and increase leisure. Empirical post-hoc studies (Estevão-Sá 2008, Chemin-Wasmer 2009) find mixed effects on employment, with adjustment primarily via flexible
  hours and wage moderation rather than new hiring. Productivity-per-hour rose, but total hours fell commensurately, so per-worker output was largely flat. Pro-labour coalition-led regulation that opposing-
  prior reviewers will note as the counter-case to the framework''s labour-flexibility emphasis.

  '
enacted_by:
- france_jospin_ps_cohabitation_1997_2002
coalition_label_at_enactment: Socialist-led Plural Left (PS-PCF-Greens)
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Statutory workweek reduction + overtime pay obligations tightened labour-time regulation.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion measures reduced employer social contributions to offset cost impact.

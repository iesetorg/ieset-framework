policy_id: nigeria_sfem_exchange_rate_1986
status: candidate
title: Nigeria Sfem Exchange Rate 1986
countries:
- NGA
timeframe:
  start: 1986
  end: 1993
description: 'The Second-Tier Foreign Exchange Market (SFEM), launched on 26 September 1986, replaced Nigeria''s fixed administrative Naira-pricing regime with auction-determined exchange rates for non-oil
  transactions. SFEM produced an immediate sharp Naira depreciation, restored relative price signals for tradables, and was later merged into a unified Foreign Exchange Market (FEM) — a centrepiece reform
  of the SAP that shifted resource allocation away from import-license rents.

  '
enacted_by:
- nigeria_buhari_sap_structural_adjustment_1986
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Auction-based FX allocation ended import-license rationing and made foreign exchange available to non-privileged importers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Eliminated the rent-seeking advantage that politically connected importers had under the prior fixed regime.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Naira depreciation revalued FX reserves and enlarged Naira monetary aggregates through the banking system.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removed implicit FX subsidies embedded in below-market dollar allocations to favoured importers.

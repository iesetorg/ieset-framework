policy_id: it_minniti_libya_migration_2017
status: candidate
title: Italy Minniti Libya migration pact + NGO code of conduct
countries:
- ITA
- LBY
timeframe:
  start: 2017
  end: 2018
  enacted_date: '2017-02-02'
description: 'Bilateral Memorandum of Understanding signed 2 February 2017 between Italy (Gentiloni/PM, Minniti/Interior) and the Libyan Government of National Accord (Sarraj) on migration, security and
  development: €200m+ EU-and-Italian funding for Libyan-coast-guard training, equipment, and interception operations, plus reception-centre support. Complemented by a ''Codice di condotta'' for NGOs operating
  SAR vessels in the central Mediterranean (Jul 2017) restricting transshipment and requiring armed-police observers. Central-Mediterranean arrivals to Italy fell from 119k (2017) to 23k (2018) — one of
  the most abrupt migration-flow reductions recorded. Human-rights concerns over Libyan detention conditions persisted.

  '

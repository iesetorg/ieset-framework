  enacted_date: '1986-05-19'
description: 'Act enacted 19 May 1986 by the Rajiv Gandhi government reversed the Supreme Court''s Shah Bano judgment (23 Apr 1985) which had granted divorced Muslim women maintenance under Section 125
  CrPC. New Act limited maintenance to the iddat period (~3 months), with subsequent responsibility on waqf boards. Widely seen as an appeasement to conservative Muslim clergy; catalysed Hindu-nationalist
  mobilisation through the late 1980s.

  '

policy_id: ar_macri_utility_tariff_sincere_pricing_2016
status: candidate
title: Utility 'sincere-pricing' tariff hikes and subsidy reduction (2016-2019)
countries:
- ARG
timeframe:
  start: 2016
  end: 2019
  enacted_date: '2016-02-01'
description: 'Phased multi-year normalisation of residential and commercial tariffs for electricity, natural gas, water and public transport which had been frozen or minimally adjusted since 2002. Nominal
  tariff hikes of several hundred percent over 2016-2018 cut the federal subsidy bill from ~3% of GDP (2015) toward ~1.5% (2019). The Supreme Court forced an audiencia pública requirement in 2016 delaying
  gas-tariff schedules. Process contributed directly to headline inflation and became politically costly.

  '

policy_id: tr_lira_crisis_brunson_2018
status: candidate
title: August 2018 lira crisis and Brunson sanctions (Turkey)
countries:
- TUR
timeframe:
  start: 2018
  end: 2018
  enacted_date: '2018-08-10'
description: 'US sanctions over the detention of pastor Andrew Brunson and associated doubling of steel/aluminium tariffs on 10 Aug 2018 triggered a lira crash from ~4.5/USD to ~7/USD within a week, peak
  7.24 on 13 Aug. CBRT initially resisted hiking amid presidential opposition to rate increases, then hiked policy rate 625bp to 24% on 13 Sep 2018. Swap restrictions on offshore TRY lending imposed by
  BDDK. Brunson released 12 Oct 2018; sanctions lifted. Crisis exposed Turkey''s dollar-liability mismatch and set the template for the 2021-22 episode.

  '

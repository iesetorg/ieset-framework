title: France Indicative Planning Cgp
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'The Commissariat général du Plan (CGP), established by de Gaulle''s January 1946 decree under Jean Monnet, produced successive multi-year national plans coordinating credit allocation, sectoral
  investment targets, and price/wage signals across nationalised and private firms. Indicative planning channelled Marshall Aid and domestic credit toward priority sectors (steel, coal, cement, transport)
  without formal central command, defining the Trente Glorieuses'' dirigiste growth model.

  '

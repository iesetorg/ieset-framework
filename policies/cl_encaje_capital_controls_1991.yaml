policy_id: cl_encaje_capital_controls_1991
status: candidate
title: Encaje — Chilean unremunerated reserve requirement on capital inflows 1991
countries:
- CHL
timeframe:
  start: 1991
  end: 1998
  enacted_date: '1991-06-17'
description: 'Banco Central de Chile Acuerdo 1110 of 20 June 1991 and subsequent circulars imposed a 20% (later 30% in 1992) unremunerated reserve requirement on short-term (<1 year) foreign financial inflows,
  held at BCCh for one year in dollars. Designed to deter short-term speculative capital while preserving FDI. Rate reduced to 10% (June 1998), 0% (September 1998), and formally abolished (April 2001).
  Much-studied natural experiment in macro-prudential capital-flow management.

  '

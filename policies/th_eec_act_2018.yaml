title: Thailand Eastern Economic Corridor Act (2018)
countries:
- THA
timeframe:
  start: 2018
  enacted_date: '2018-05-14'
description: 'Eastern Economic Corridor of Innovation Act BE 2561 (2018) created a special-zone regime across three eastern provinces (Chonburi, Rayong, Chachoengsao) covering existing Laem Chabang port,
  Map Ta Phut industrial estate, and U-Tapao airport. The EEC Office, chaired by the Prime Minister, is empowered to fast-track land-use approvals, environmental clearances, infrastructure procurement,
  and BOI incentive stacking (up to 15-year corporate-tax holiday plus import- duty and personal-income-tax concessions for qualifying technical staff). Target industries include next-generation automotive,
  smart electronics, aviation and logistics, medical tourism, biotech, and digital. Flagship infrastructure: high-speed rail linking the three main airports (contract awarded to CP-led consortium 2019);
  U-Tapao airport expansion; Laem Chabang Phase 3. The regime extended and deepened earlier Industrial Estate Authority of Thailand incentives.

  '

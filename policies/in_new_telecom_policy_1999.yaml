policy_id: in_new_telecom_policy_1999
status: candidate
title: India New Telecom Policy 1999 (revenue-share regime)
countries:
- IND
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-03-26'
description: 'New Telecom Policy 1999 announced 26 March 1999 shifted licence framework from fixed licence-fee (NTP-1994 bidding-based) to revenue-share (8-12% AGR). Allowed migration of incumbent licencees
  on payment of entry fee, rescuing operators facing insolvency under NTP-1994 auction commitments. Created Telecom Regulatory Authority of India (TRAI, already present under 1997 Act) tariff powers, ended
  Department of Telecommunications'' monopoly, permitted CDMA-based WLL services. Triggered mobile- subscriber explosion from ~1.6m (1999) to ~500m (2009) — largest single policy-driven market expansion
  in Indian history.

  '
enacted_by:
- india_vajpayee_nda_1998_2004
coalition_label_at_enactment: BJP-led NDA

policy_id: vn_price_liberalisation_1989
status: candidate
title: Vietnam price liberalisation and exchange-rate unification 1989
countries:
- VNM
timeframe:
  start: 1989
  end: 1989
description: 'March-November 1989 comprehensive macro reform under Đổi Mới — elimination of most dual-price arrangements (market-determined prices for non-strategic goods), unification of official and parallel
  exchange rates from ~225 dong/USD to ~4,500 dong/USD with large de facto devaluation, liberalisation of internal trade, and banking reform creating two-tier system (State Bank of Vietnam + 4 specialised
  commercial banks). Brought hyperinflation down from 487% (1986) to 35% (1989) eventually 14.8% (1990).

  '
enacted_by:
- vietnam_linh_doi_moi_implementation_1986_1991
coalition_label_at_enactment: CPV under GS Nguyễn Văn Linh
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Dual-price elimination freed market prices for non-strategic goods.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Hyperinflation ended; money-printing discipline restored.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Two-tier banking system separated SBV policy role from commercial banking.

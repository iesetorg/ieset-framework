policy_id: uk_income_tax_cuts_1988
status: candidate
title: Income Tax Cuts 1988
countries:
- GBR
timeframe:
  start: 1979
  end: 1990
description: 'Chancellor Nigel Lawson''s 1988 Budget delivered the most dramatic income-tax restructuring of the Thatcher era: the basic rate fell from 27% to 25%, all higher rates collapsed into a single
  40% top rate (replacing the previous 40%/45%/50%/55%/60% schedule), and the rate threshold was sharply reduced. The reform completed a decade-long fall from 1979''s 83% top marginal rate and substantially
  flattened the UK income-tax structure.

  '

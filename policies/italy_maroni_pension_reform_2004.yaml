policy_id: italy_maroni_pension_reform_2004
status: candidate
title: Italy Maroni Pension Reform 2004
countries:
- ITA
timeframe:
  start: 2001
  end: 2006
description: 'Law 243/2004, drafted under Welfare Minister Roberto Maroni, raised the seniority-pension age threshold from 57 to 60 (rising further to 62 by 2014) under the so-called "scalone" cliff transition,
  introduced the Super-Bonus offering tax-favoured cash incentives for postponing retirement, and accelerated the switch to occupational pension funds via TFR (severance-pay) tacit conversion. The reform
  tightened Italy''s first-pillar pension-spending trajectory and was partially rolled back by the subsequent Prodi government''s 2007 protocol.

  '
enacted_by:
- italy_berlusconi_ii_iii_2001_2006
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher retirement thresholds and Super-Bonus incentives extended productive working lives.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reform package was framed alongside Bossi-Fini stricter migration rules within Berlusconi coalition.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Super-Bonus tax preference and TFR private-fund conversion benefited higher-income workers disproportionately.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: TFR diversion to pension funds reduced firms' interest-free severance-fund finance and corporate cash flow.

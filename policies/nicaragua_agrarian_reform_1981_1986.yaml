policy_id: nicaragua_agrarian_reform_1981_1986
status: candidate
title: Nicaragua Agrarian Reform 1981 1986
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'The Sandinista Agrarian Reform Law of 19 July 1981, expanded by the 1986 amendments, expropriated large rural estates above legal size thresholds, idle or under-used commercial farms, and
  properties of declared "enemies of the revolution," redistributing land to state farms (Area de Propiedad del Pueblo), production cooperatives, and individual peasant beneficiaries. Roughly one-third
  of arable land changed hands across the period, reshaping rural property structure and supply chains.

  '
enacted_by:
- nicaragua_sandinista_1979_1990
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory expropriation of large estates and "enemies of the revolution" weakened security of private rural titles.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State farms and cooperatives crowded out private commercial agriculture and operated under directed-pricing regimes.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Land grants, subsidised inputs, and credit at concessional rates served as in-kind transfers to peasant beneficiaries.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: State-farm operating losses and reform-implementation costs raised aggregate public outlays through the period.

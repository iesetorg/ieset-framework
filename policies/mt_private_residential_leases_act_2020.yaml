policy_id: mt_private_residential_leases_act_2020
status: candidate
title: Malta Private Residential Leases Act 2020
countries:
- MLT
timeframe:
  start: 2020
  end: ongoing
description: 'Malta''s Private Residential Leases Act created a statutory framework for private rental contracts from 2020. It required registration of residential leases with the Housing Authority, set
  minimum contract durations and notice rules, regulated renewals and deposit handling, and capped annual rent increases unless the contract provides a lower adjustment.

  '
enacted_by:
- malta_labour_social_regulatory_state_2020_present
scope: national
coalition_label_at_enactment: Muscat Labour administration
axes_moved:
- axis: regulatory.housing_rent_control
  direction: +
  magnitude: moderate
  intended: true
  rationale: Minimum durations, renewal rules, registration, and limits on annual increases made private rental contracts more regulated.
- axis: institutional.property_rights
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Lease registration and deposit rules improved enforceability while limiting some landlord contract discretion.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory registration gave the Housing Authority a clearer enforcement channel for residential leases.
references:
- Malta Private Residential Leases Act, Chapter 604 of the Laws of Malta, effective 1 January 2020
- 'Malta Housing Authority, Rent Registration portal: https://rentregistration.mt/'

description: 'National Assembly ratification 22 November 2011 (by opposition-absent plenary vote forced through by GNP, 151-7 with tear-gas incident) of the Korea-US Free Trade Agreement originally signed
  30 June 2007 under Roh Moo-hyun. Agreement eliminated tariffs on ~95% of goods within five years, opened Korean agricultural, auto, pharmaceutical, and financial-services markets, and established ISDS
  dispute-settlement chapter. Effective 15 March 2012 after US Congressional approval 2011. Signature second-term Lee priority despite DP opposition and farmer/beef-protest mobilisation (2008 candlelight
  protests on US beef imports were precursor). Korea''s largest bilateral FTA by partner economy until subsequent Korea-China FTA.

  '

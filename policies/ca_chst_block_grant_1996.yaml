description: 'Budget Implementation Act 1995 created the Canada Health and Social Transfer effective 1 April 1996. Consolidated Established Programs Financing (health, post-secondary) and Canada Assistance
  Plan (social assistance, 50/50 cost-share). Single block grant with fewer conditions; removed CAP''s 50/50 matching for social assistance. Cash-component floor decoupled from provincial spending. Cut
  federal cash transfer by ~$7B/year versus pre-reform programs.

  '

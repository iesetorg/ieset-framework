policy_id: gnq_hydrocarbons_local_content_regulation_2020
status: candidate
title: Equatorial Guinea hydrocarbons local-content regulation 2020
countries:
- GNQ
timeframe:
  start: 2020
  end: ongoing
description: 'Equatorial Guinea tightened local-content requirements for the hydrocarbon sector in 2020, requiring operators and contractors to increase Equatoguinean participation in employment, training,
  procurement, subcontracting, and supplier development. The regulation used licensing and contract conditions to reserve more oil and gas supply-chain value for national firms and workers.

  '
enacted_by:
- equatorial_guinea_obiang_hydrocarbon_transparency_state_2019_present
scope: national
coalition_label_at_enactment: Obiang government
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Hydrocarbon operators face additional state conditions tied to licences, contracts, procurement, and workforce plans.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Local-content obligations reduce unconstrained foreign sourcing of labour and services in the oil and gas supply chain.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory national-participation preferences can narrow competition among suppliers where thresholds bind.
references:
- Republic of Equatorial Guinea, Ministry of Mines and Hydrocarbons local-content regulation materials, 2020.
- IMF, Republic of Equatorial Guinea EFF and Article IV materials discussing hydrocarbon-sector governance and diversification.
notes: 'Official online access to the regulation is limited; coding should be revisited if the full legal text becomes available.

  '

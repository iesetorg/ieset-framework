policy_id: uk_bank_of_england_nationalisation_1946
status: candidate
title: Bank Of England Nationalisation 1946
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The Bank of England Act 1946 transferred the Bank''s privately held shares to the Treasury, vesting ownership in the state and giving the Chancellor authority to issue directions to the Bank
  in the public interest. The statute formalised Treasury direction over monetary policy and bank supervision, ending the Bank''s prior status as a private chartered company while preserving its operational
  structure.

  '
enacted_by:
- uk_attlee_welfare_state_1945_1951
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Bank now exercised statutory regulatory direction over UK clearing banks and sterling exchange.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: State ownership of the Bank facilitated cheap-money financing of postwar welfare-state expansion.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Treasury direction enabled accommodative monetary support for higher peacetime public spending.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Centralised state-bank guidance constrained autonomous competitive credit allocation by clearers.

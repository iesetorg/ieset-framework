title: Spain Ley Organica 10 2022 Consent Law
countries:
- ESP
timeframe:
  start: 2018
  end: ongoing
description: 'Ley Orgánica 10/2022 de Garantía Integral de la Libertad Sexual (the "Solo sí es sí" law), enacted by the Sánchez-Díaz coalition, redefined sexual offences in the Penal Code around the absence
  of affirmative consent. It unified prior abuse and assault categories and introduced new training, prevention, and victim-support institutional architecture under the Ministry of Equality.

  '

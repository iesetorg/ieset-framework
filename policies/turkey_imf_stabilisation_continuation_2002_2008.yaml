policy_id: turkey_imf_stabilisation_continuation_2002_2008
status: candidate
title: Turkey Imf Stabilisation Continuation 2002 2008
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
description: 'Turkey''s continuation of IMF stabilisation under the AKP, from the 19th Stand-By Arrangement of February 2002 (USD ~16 billion) inherited from the Ecevit coalition through the May 2005 Stand-By
  (USD ~10 billion), maintained inflation-targeting at the CBRT, primary fiscal surpluses around 6.5% of GDP, banking-sector resolution under the BRSA, and structural-reform conditionality on social security
  and tax administration. The intended effect was to consolidate the post-2001-crisis macro framework, finance debt rollovers during early AKP years, and embed the disinflation that brought CPI from over
  70% in 2001 to single digits by 2004.

  '
enacted_by:
- turkey_erdogan_akp_2002_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: IMF conditionality reinforced banking-sector entry, privatisation, and EU-acquis competition reforms.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Although IMF supported CBRT autonomy, this axis reflects the longer-arc Erdogan-era erosion path.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Primary-surplus targets compressed spending while IMF financing eased rollover funding.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Conditionality could not arrest the longer-arc institutional drift through the AKP era.

policy_id: ir_brics_accession_2024
status: candidate
title: Iran BRICS accession 2024
countries:
- IRN
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-01'
description: 'Iran became a full BRICS member on 1 Jan 2024, part of the expansion announced at the Johannesburg II summit Aug 2023 (alongside Egypt, UAE, Ethiopia; Saudi Arabia and Argentina invited but
  did not accede). Accompanied by Shanghai Cooperation Organisation full membership Jul 2023. Strategic rationale: diversify trade and financial settlement channels away from USD-dominated systems under
  maximum- pressure sanctions, deepen alignment with China and Russia, and signal non-isolation. Practical trade effects modest through 2024-2025 given continuing US secondary-sanctions exposure for BRICS
  counterparties and the absence of a BRICS-wide alternative clearing system.

  '

policy_id: peru_trade_opening_1991_1993
status: candidate
title: Peru Trade Opening 1991 1993
countries:
- PER
timeframe:
  start: 1990
  end: 2000
description: 'Sequenced reduction of Peru''s tariff structure between 1991 and 1993, eliminating most non-tariff barriers and collapsing the heavily dispersed tariff schedule into a small number of low
  rates. Combined with foreign-investment and exchange-rate liberalisation under the 1991 Legislative Decree framework, the opening reorganised relative prices, drove a surge in imports financed by capital
  inflows, and integrated Peru into Andean and global trade networks.

  '
enacted_by:
- peru_fujimori_stabilisation_1990_2000

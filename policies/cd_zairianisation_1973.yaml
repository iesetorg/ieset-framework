# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: cd_zairianisation_1973
status: candidate
title: "Zairianisation"
countries: [COD]
timeframe: {start: 1973, end: 1975}
description: >
  Zairianisation transferred many foreign-owned farms, plantations, shops, and
  enterprises to Zairean nationals, often regime insiders, as part of Mobutu's
  authenticity and economic-nationalism campaign. Subsequent retrocession
  partially reversed the policy, but the episode sharply damaged investor
  confidence, managerial capacity, and security of ownership.
enacted_by:
  - zaire_mobutu_mpr_1965_1997
coalition_label_at_enactment: "MPR"
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Foreign-owned assets were transferred by political decree and later partly reversed.", intended: true}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Allocation depended heavily on presidential discretion and patronage rather than predictable legal process.", intended: true}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "The policy targeted foreign commercial ownership and reduced openness to external capital.", intended: true}
references:
  - "Crawford Young and Thomas Turner, The Rise and Decline of the Zairian State"
  - "Janet MacGaffey, Entrepreneurs and Parasites"

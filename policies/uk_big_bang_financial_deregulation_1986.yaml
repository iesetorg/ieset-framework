policy_id: uk_big_bang_financial_deregulation_1986
status: candidate
title: Big Bang — London Stock Exchange deregulation 1986
countries:
- GBR
timeframe:
  start: 1986
  enacted_date: '1986-10-27'
description: 'Comprehensive deregulation of the London Stock Exchange: abolition of fixed commissions, abolition of the jobber/broker separation, admission of foreign firms, electronic trading (SEAQ). Transformed
  London into one of the two dominant global financial centres and initiated a persistent UK financialisation trend. Combined with Financial Services Act 1986 (which created SIB self-regulation) and subsequent
  2000 FSA consolidation. Defended as increasing market depth + liquidity; criticised post-2008 as enabling the leverage + complexity build-up that amplified the crisis in UK banking.

  '

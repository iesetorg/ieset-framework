title: Egtrra 2001
countries:
- USA
timeframe:
  start: 2001
  end: 2003
description: 'The Economic Growth and Tax Relief Reconciliation Act of 2001 (Pub. L. 107-16, EGTRRA) lowered all federal income-tax bracket rates, introduced a new 10% bracket, doubled the per-child tax
  credit to $1,000, expanded retirement-account contribution limits, and phased out the federal estate tax through 2010. Passed via budget reconciliation with sunset clauses, the act constituted the first
  leg of the Bush-era tax-cut program and was projected to reduce federal revenue by ~$1.35 trillion over a decade.

  '

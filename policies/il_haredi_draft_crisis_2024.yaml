policy_id: il_haredi_draft_crisis_2024
status: candidate
title: Israel Haredi-draft Supreme Court ruling and coalition crisis 2024
countries:
- ISR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-06-25'
description: 'Supreme Court unanimous ruling of 25 June 2024 ordering the IDF to begin conscripting ultra-Orthodox (Haredi) men and ordering the state to stop funding yeshivas whose students evade the draft,
  on the grounds that the long-standing exemption arrangement lacked statutory basis. Triggered acute coalition crisis — Shas and UTJ demanded legislation codifying exemptions while Likud attempted to square
  conscription needs of the ongoing war with coalition survival. Yeshiva funding and the scale of Haredi labour-market participation are core parameters of Israel''s long- run fiscal and growth trajectory.

  '

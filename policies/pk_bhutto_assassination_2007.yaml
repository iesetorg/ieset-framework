description: 'PPP leader and former two-time PM Benazir Bhutto assassinated 27 December 2007 at Rawalpindi campaign rally ahead of January 2008 elections. Gunshot and suicide-bomb attack; official cause
  of death skull fracture from escape-vehicle sunroof (disputed). Preceded by Karachi bombing 18 October 2007 targeting her homecoming procession (139 dead). TTP leader Baitullah Mehsud named in UN inquiry
  2010 as probable planner; Musharraf government faulted for failing to provide adequate security and hasty washing-down of crime scene. Triggered 2-day nationwide riots, February 2008 election rescheduled
  to 18 February. Zardari assumed PPP leadership; PPP won 119/272 seats forming coalition with PML-N. Musharraf resigned 18 August 2008 ahead of impeachment. Canonical case of the 2007-2008 political- security
  crisis that ended Musharraf era.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: italy_universal_male_suffrage_1912
status: candidate
title: Italy universal male suffrage 1912
countries: [ITA]
timeframe:
  start: 1912
  end: 1912
  enacted_date: "1912-06-30"
description: >
  Law no. 666 of 30 June 1912 rewrote the political electoral law and
  massively enlarged the electorate. Men over 30 gained the vote without
  literacy or property requirements, while many younger men could vote if
  they had completed military service or met existing education criteria.
  The electorate more than doubled and liberal Italy moved decisively away
  from a narrow notables' franchise toward mass male politics. The reform
  did not democratise the regime fully, but it materially broadened formal
  political inclusion before the First World War.
enacted_by:
  - italy_giolittian_liberal_reformism_1901_1914
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The suffrage reform greatly expanded formal political rights and the share of adult men included in the constitutional order."
references:
  - "Legge 30 giugno 1912, n. 666"
  - "Camera dei deputati, Il suffragio universale"

policy_id: pl_judicial_reforms_supreme_court_krs_2017_2020
status: candidate
title: Poland judicial reforms — Supreme Court, KRS, Disciplinary Chamber (2017-2020)
countries:
- POL
timeframe:
  start: 2017
  end: 2023
  enacted_date: '2017-12-08'
description: 'Series of statutes restructuring the Polish judiciary under the Morawiecki PiS government. Core measures: (i) Supreme Court Act 8 December 2017 lowering retirement age for sitting justices
  from 70 to 65 (subsequently halted by CJEU interim order June 2018 and reversed by statute Nov 2018); (ii) new National Council of the Judiciary (KRS) composition law December 2017 transferring judicial-member
  selection from judges to the Sejm — triggering CJEU findings on judicial independence; (iii) establishment of the Supreme Court Disciplinary Chamber and Extraordinary Review Chamber; (iv) ''muzzle law''
  (ustawa kagańcowa) December 2019 creating disciplinary liability for judges who question the legitimacy of judicial appointments; (v) series of CJEU judgments 2019-2021 (C-619/18, C-791/19, C-204/21)
  finding breaches of Article 19(1) TEU. EU Commission Article 7(1) TEU rule-of-law procedure launched December 2017; EU Recovery and Resilience Facility disbursements frozen on rule-of-law grounds 2022-2024.

  '

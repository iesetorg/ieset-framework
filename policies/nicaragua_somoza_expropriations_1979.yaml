  rationale: Confiscation without compensation set a foundational precedent eroding security of private titles.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Concentration of expropriated assets in the Area de Propiedad del Pueblo created state-dominated market structures.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Expropriated commercial assets supplied the resource base for distributing land, jobs, and subsidised goods to revolutionary constituencies.
- axis: fiscal.spending_level

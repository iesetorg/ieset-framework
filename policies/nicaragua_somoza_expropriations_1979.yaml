policy_id: nicaragua_somoza_expropriations_1979
status: candidate
title: Nicaragua Somoza Expropriations 1979
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'Decree-Law No. 3 of 20 July 1979 authorised the new Junta to confiscate without compensation the assets of the Somoza family, the National Guard officer corps, and named "allies of the dictatorship."
  Decree-Law No. 38 (8 August 1979) extended the framework, ultimately transferring roughly 20 percent of arable land plus banks, factories, hotels, and media holdings to the Area de Propiedad del Pueblo
  (state property area) — the foundational asset base of the Sandinista mixed economy.

  '
enacted_by:
- nicaragua_sandinista_1979_1990

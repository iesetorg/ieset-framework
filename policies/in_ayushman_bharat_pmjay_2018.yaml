policy_id: in_ayushman_bharat_pmjay_2018
status: candidate
title: India — Ayushman Bharat Pradhan Mantri Jan Arogya Yojana (PM-JAY) 2018
countries:
- IND
timeframe:
  start: 2018
  enacted_date: '2018-09-23'
description: 'Ayushman Bharat PM-JAY launched 23 September 2018 in Ranchi is a tax-funded, family-floater health insurance scheme covering up to ₹5 lakh per family per year for secondary and tertiary hospitalisation
  for ~107 million poor and vulnerable families (~500m people) identified from the Socio-Economic Caste Census 2011. Administered by the National Health Authority with states implementing via trust or insurance
  mode. Empanelled network of ~27,000+ hospitals (public + private). Complements the Health and Wellness Centre arm of Ayushman Bharat at primary-care level. Extended in Sep 2024 to cover all citizens aged
  70+ regardless of income. As of 2024 ~35 crore Ayushman cards issued; ~7-8 crore hospital admissions authorised; cumulative claims ~₹1.1 lakh crore.

  '

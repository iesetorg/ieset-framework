description: 'Stabilisation package announced 22 September 1976 by PM Raymond Barre. Included temporary price and wage freezes (3 months), corporate surcharges, VAT rises on luxury goods, strong-franc commitment,
  and public-expenditure restraint. First French stabilisation programme explicitly framed around monetary- conservative principles. Politically unpopular — Barre''s personal ratings among lowest ever recorded
  for a French PM.


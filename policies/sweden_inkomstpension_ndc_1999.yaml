policy_id: sweden_inkomstpension_ndc_1999
status: candidate
title: Sweden Inkomstpension Ndc 1999
countries:
- SWE
timeframe:
  start: 1999
  end: ongoing
description: 'Sweden''s Inkomstpension is the notional defined-contribution (NDC) earnings-related tier of the pension system enacted under the 1994/1998 reform framework and effective from 1999. Contributions
  of 16 percent of pensionable earnings are credited to a notional individual account that earns a return tied to per-capita wage growth, with benefits computed via cohort life-expectancy at retirement,
  replacing the prior ATP defined-benefit promise.

  '
enacted_by:
- sweden_persson_sap_1996_2006
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: NDC formula caps benefit growth and links payouts to demographics, trimming long-run transfers.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory contribution rate fixed at 16 percent acts as a payroll-style levy on labor income.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform separated pensions from labor-market protections, increasing labor mobility.

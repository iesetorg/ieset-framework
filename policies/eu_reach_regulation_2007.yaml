  rationale: Burden-of-proof reversal and SVHC authorisation regime markedly tightens EU chemicals controls.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: ECHA-administered registration and authorisation regimes condition placing chemicals on the market.
- axis: regulatory.product_market_competition
  direction: '-'

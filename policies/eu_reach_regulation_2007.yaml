description: 'Regulation (EC) No 1907/2006 — REACH (Registration, Evaluation, Authorisation and Restriction of Chemicals) — entered into force on 1 June 2007 and shifted the burden of proof for chemical
  safety onto manufacturers and importers placing more than 1 t/y of substances on the EU market. Administered by the European Chemicals Agency (ECHA), it operates dossier registration, substance evaluation,
  authorisation of substances of very high concern (Annex XIV), and restriction of unacceptable risks (Annex XVII).

  '

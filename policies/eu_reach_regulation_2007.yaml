  rationale: Per-substance registration costs and SVHC authorisations raise barriers for smaller producers.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-EU producers must appoint an Only Representative and meet REACH dossiers to access the EU.

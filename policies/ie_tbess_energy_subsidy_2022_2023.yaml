policy_id: ie_tbess_energy_subsidy_2022_2023
status: candidate
title: Tbess Energy Subsidy 2022 2023
countries:
- IRL
timeframe:
  start: 2022
  end: 2024
description: 'The Temporary Business Energy Support Scheme (TBESS), legislated in the Finance Act 2022 and operated by Revenue, refunded a percentage of qualifying electricity and gas-cost increases to
  tax-registered businesses during the energy-price shock following the 2022 Russian invasion of Ukraine. The scheme operated through 2023, with successive iterations widening eligibility and percentage
  support, and complemented residential energy credits.

  '

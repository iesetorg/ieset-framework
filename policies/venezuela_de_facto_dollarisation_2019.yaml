policy_id: venezuela_de_facto_dollarisation_2019
status: candidate
title: Venezuela De Facto Dollarisation 2019
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'Beginning in 2019 the Maduro government tacitly tolerated widespread use of US dollars in retail and wholesale transactions, abandoning prior strict FX-control enforcement. Maduro publicly
  termed dollarisation an "escape valve" in late 2019; by 2021 dollar transactions accounted for the majority of consumer purchases. The policy was permissive rather than legal, with the bolivar retaining
  nominal status as legal tender.

  '
enacted_by:
- venezuela_maduro_era_distinct_2013_present
axes_moved:
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCV ceded de facto monetary control to private dollar circulation it could not regulate or sterilise.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Bolivar issuance continued unrestrained while dollarisation absorbed transactional demand from collapsing local money.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Dollar pricing improved retail-market signalling, but parallel bolivar/dollar tracks created arbitrage distortions.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tolerated dollar use without legal framework left transactions in a permissive but unregulated grey zone.

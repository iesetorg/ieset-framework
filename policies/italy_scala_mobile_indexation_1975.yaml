policy_id: italy_scala_mobile_indexation_1975
status: candidate
title: Italy Scala Mobile Indexation 1975
countries:
- ITA
timeframe:
  start: 1945
  end: 1992
description: 'The 25 January 1975 Confindustria–CGIL/CISL/UIL agreement (later codified by Law 38/1986) established the Scala Mobile, a uniform automatic wage-indexation mechanism whereby a flat lira-amount
  wage adjustment was added to all workers'' pay packets each quarter to compensate for changes in a basket-of-goods price index. The scheme amplified the inflation pass-through from oil shocks, compressed
  wage differentials, and was progressively dismantled through the 1984 Craxi decree-law, the 1992 Amato accord and the 1993 Ciampi protocol.

  '

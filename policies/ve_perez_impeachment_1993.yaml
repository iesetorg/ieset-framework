description: 'Attorney-General Ramón Escovar Salom indicted Pérez March 1993 for misuse of Bs 250M (~$17M) from the Partida Secreta discretionary fund (transferred to Violeta Chamorro''s Nicaragua campaign).
  Supreme Court authorised trial 20 May 1993; Congress suspended Pérez 21 May 1993. Octavio Lepage (Senate president) interim then Ramón Velásquez named interim president until February 1994. First-ever
  impeachment of a sitting Latin American president before Brazil (Collor) in the same era. Pérez convicted 1996 but served limited time.


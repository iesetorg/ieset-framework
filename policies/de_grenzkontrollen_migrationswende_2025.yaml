policy_id: de_grenzkontrollen_migrationswende_2025
status: candidate
title: Migrationswende — permanent internal-border controls and deportation framework 2025
countries:
- DEU
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-05-07'
description: 'Merz-era ''Migrationswende'': indefinite extension of internal-Schengen border controls initially reintroduced in 2023-24, expanded powers for direct rejection at the border (Zurückweisung)
  of asylum-seekers from safe-third-country transits, accelerated deportation framework (Rückführungsverbesserungsgesetz 2.0) including custody for removal, suspension of family reunification for subsidiary-protected
  status, and reprioritised Fachkräfteeinwanderung for skilled legal channels. Coded as a strong contraction on the immigration-openness axis relative to the Ampel-era citizenship and asylum posture.

  '
enacted_by:
- germany_merz_2025_present
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Permanent internal-border controls + expanded Zurückweisung + suspended family reunification + accelerated deportation.
- axis: institutional.rule_of_law
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Zurückweisung practice contested under EU Dublin framework; awaiting ECJ / BVerwG review.
references:
- Bundespolizei-Anordnung Grenzkontrollen (2025)
- Rückführungsverbesserungsgesetz 2.0 (2025)

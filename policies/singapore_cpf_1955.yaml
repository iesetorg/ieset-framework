description: 'The Central Provident Fund (CPF) was established in 1955 by the Central Provident Fund Ordinance under the British colonial Labour Front government as a mandatory defined-contribution savings
  scheme for Singaporean workers. Subsequent expansions added Ordinary, Special, MediSave, and Retirement Accounts, funding housing (HDB), healthcare, and retirement pillars from individual contributions
  rather than general tax revenues.

  '

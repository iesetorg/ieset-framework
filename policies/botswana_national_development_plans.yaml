policy_id: botswana_national_development_plans
status: candidate
title: Botswana National Development Plans
countries:
- BWA
timeframe:
  start: 1966
  end: ongoing
description: 'Botswana''s National Development Plans (NDPs), produced sequentially from NDP 1 (1968) through to the current NDP 11 by the Ministry of Finance and Economic Development, are six-year medium-term
  frameworks that allocate diamond-derived revenue across capital and recurrent budgets, set sectoral priorities, and are debated and approved by Parliament. The plans, paired with the Sustainable Budget
  Index, embed the rule that mineral revenue should fund investment rather than recurrent consumption, anchoring decades of fiscal-policy credibility.

  '

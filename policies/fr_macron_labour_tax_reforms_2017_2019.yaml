description: 'Ordonnances Travail (Sep 2017) reforming French Code du Travail — capping unfair-dismissal damages, opening to company-level collective bargaining, merging employee-representative bodies;
  CSG-for-chômage swap (workers pay more CSG, employers less unemployment contribution); wealth tax (ISF) reform to real-estate-only (IFI); PFU flat tax on capital income 30%; corporate tax rate phased
  reduction 33.3% → 25%. D.3.1 category: centrist-coalition market-oriented content. Outcome: pre-COVID unemployment fall, investment uptick; contested distributional effects (gilets jaunes protests 2018).'

policy_id: zm_mineral_royalty_regime_reform_2022
status: candidate
title: Zambia mineral royalty deductibility reform 2022
countries:
- ZMB
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-01-01'
description: 'Zambia changed the mineral royalty tax regime so that mineral royalties became deductible for corporate income tax purposes, reversing a non-deductibility rule that had raised effective tax
  rates for copper producers. The reform was part of the Hichilema government''s mining-investment reset, intended to attract capital, resolve disputes around major mines, and raise copper output through
  a lower effective fiscal burden.

  '
enacted_by:
- zambia_hichilema_upnd_2021_present
scope: national
coalition_label_at_enactment: UPND Hichilema government
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Deductibility lowers the effective corporate tax burden on mining firms relative to the prior rule.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: The reform was designed to improve mining FDI conditions and export-sector investment.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: A sector-specific tax preference favours mining investment relative to the general corporate base.
references:
- Zambia 2022 Budget Address and Finance Act provisions on mineral royalty deductibility.
- Zambia Ministry of Mines and Ministry of Finance mining-sector reform statements, 2021-2022.

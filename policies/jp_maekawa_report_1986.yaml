description: 'Report of the Advisory Group on Economic Structural Adjustment for International Harmony (chair Haruo Maekawa, ex-BoJ Governor), submitted 7 Apr 1986 to PM Nakasone. Urged transition from
  export- led to domestic-demand-led growth via financial-market opening, housing-market deregulation, working-hour reduction (40-hour week), distribution-sector liberalisation, and procurement opening.
  A ''New Maekawa Report'' followed May 1987. Provided intellectual framing for bubble-era domestic-demand expansion.

  '

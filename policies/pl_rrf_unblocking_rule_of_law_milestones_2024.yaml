policy_id: pl_rrf_unblocking_rule_of_law_milestones_2024
status: candidate
title: Poland EU Recovery and Resilience Facility unblocking + Article 7 closure (2024)
countries:
- POL
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-02-29'
description: 'First-100-days flagship of the Tusk KO-led coalition: securing European Commission assessment that Poland''s RRF rule-of-law ''super-milestones'' — on judicial independence, disciplinary regime
  for judges, and handling of the Constitutional Tribunal — had been met to a degree sufficient to unlock pre-financing and subsequent payment requests. Commission decision in late February 2024 enabled
  first payment-request submission and cash inflow from April 2024; total Polish envelope under RRF ~60bn euro (grants + loans). In parallel, the Commission closed the Article 7(1) TEU rule-of-law procedure
  against Poland on 6 May 2024, the first such closure since the procedure was activated in 2017. Implementation constrained by presidential vetoes (Duda, and from August 2025 Nawrocki) on several underlying
  statutory reforms, requiring administrative and prosecutorial actions where legislative reform is blocked.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ao_sonangol_oil_enclave_1976
status: candidate
title: "Sonangol oil enclave governance"
countries: [AGO]
timeframe: {start: 1976, end: 1991}
description: >
  Angola created Sonangol as the national oil company while preserving offshore
  production arrangements with foreign operators to sustain petroleum revenues
  through civil war. Oil became a relatively insulated enclave that financed
  the MPLA state despite the broader command economy and conflict conditions.
enacted_by:
  - angola_mpla_socialist_oil_state_1975_1991
coalition_label_at_enactment: "MPLA"
axes_moved:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Oil exploration and production were routed through state concession authority and Sonangol.", intended: true}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Petroleum rents financed wartime state spending and public enterprise commitments.", intended: true}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Foreign oil operators remained central to offshore production despite socialist controls elsewhere.", intended: true}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "State command over petroleum strengthened sovereign control of the energy revenue base.", intended: true}
references:
  - "Tony Hodges, Angola: Anatomy of an Oil State"
  - "Sonangol historical materials"

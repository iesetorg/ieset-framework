policy_id: ng_marketing_boards_abolition_1986
status: candidate
title: Nigerian commodity marketing boards abolition (1986)
countries:
- NGA
timeframe:
  start: 1986
description: 'The Nigerian Cocoa Board, Palm Produce Board, Groundnut Board, Cotton Board, Grains Board, and Rubber Board — state monopsonists that had taxed farmers implicitly via below-market procurement
  prices since colonial era — were abolished in 1986 under SAP. Farmers could sell freely to private traders and exporters, and real producer prices for cocoa and rubber roughly doubled over 1986-1988.

  '

policy_id: lk_cbsl_act_2023
status: candidate
title: Central Bank of Sri Lanka Act No. 16 of 2023
countries:
- LKA
timeframe:
  start: 2023
  enacted_date: '2023-09-14'
description: 'New Central Bank of Sri Lanka Act certified 14 September 2023, replacing the Monetary Law Act of 1949. Codifies operational independence of the CBSL, establishes price stability as the primary
  objective with flexible inflation targeting, prohibits direct monetary financing of the government (Art. 85), sets a Governing Board and Monetary Policy Board separation, and strengthens governance /
  dismissal protections for the Governor. An IMF EFF structural benchmark.

  '
enacted_by:
- srilanka_wickremesinghe_unp_2022_2024
coalition_label_at_enactment: UNP-led minority with SLPP backing
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  intended: true
  rationale: Operational independence + monetary-financing prohibition + dismissal protections.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory constraints on executive monetary override.

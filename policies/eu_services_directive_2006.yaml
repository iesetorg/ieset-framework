timeframe:
  start: 1986
  end: 1993
description: 'Directive 2006/123/EC — the Services Directive — required member states to remove unjustified authorisation requirements, residency conditions, and discriminatory restrictions affecting cross-border
  services and freedom of establishment, and to set up Points of Single Contact and electronic procedures for service providers. After heavily contested negotiations (the original "Bolkestein" proposal),
  the country-of-origin principle was dropped, but core liberalisation remained.

  '

description: 'Two-tranche German counter-cyclical stimulus in response to the global financial crisis: Konjunkturpaket I (Pakt für Beschäftigung und Stabilität, Nov 2008, ~€50bn over 2009-2010) focused
  on infrastructure and corporate- tax measures; Konjunkturpaket II (Jan 2009, ~€50bn) added infrastructure, the Abwrackprämie car-scrappage bonus (€2,500/vehicle, ~2m vehicles, €5bn), a one-off child bonus,
  SSC reductions, a second income-tax-threshold increase, and a Länder-investment programme. Combined package ~3.2% of 2008 GDP. Contributed to German unemployment peak of only 7.6% in 2009 vs US 10.0%
  — the ''German jobs miracle'' anchored on Kurzarbeit.

  '

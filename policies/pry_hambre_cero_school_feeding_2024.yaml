policy_id: pry_hambre_cero_school_feeding_2024
status: candidate
title: Paraguay Hambre Cero School Feeding Law 2024
countries:
- PRY
timeframe:
  start: 2024
  end: ongoing
description: 'Paraguay''s Hambre Cero en las Escuelas law reorganised school feeding into a national programme for students in the public education system. The reform centralised financing and implementation
  responsibilities that had previously been fragmented across national, departmental, and municipal channels, and redirected dedicated resources toward meals served through schools rather than leaving provision
  dependent on local procurement cycles.

  '
enacted_by:
- paraguay_pena_colorado_2023_present
coalition_label_at_enactment: Partido Colorado / Honor Colorado-aligned government
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: The law expanded an in-kind child nutrition transfer through the public-school system.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Central-government school-feeding obligations increased through a dedicated national programme.
references:

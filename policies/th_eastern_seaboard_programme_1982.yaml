description: 'Flagship regional-development programme launched 1982 covering Rayong, Chonburi and Chachoengsao. Major components: Map Ta Phut industrial estate and deep-sea port, Laem Chabang commercial
  port, Eastern Water Resources development, gas-pipeline and petrochemical complex. Financed largely by Japan''s Overseas Economic Cooperation Fund (OECF, now JBIC). Anchor for the 1986-1995 FDI-led boom.

  '

description: 'At the March 2021 Budget, Chancellor Rishi Sunak announced the main rate of UK Corporation Tax would rise from 19% to 25% from April 2023, with a 19% Small Profits Rate retained for profits
  under £50,000 and marginal relief up to £250,000 — the first headline corporation tax rise in UK post-war history. Paired with a two-year ''super-deduction'' (130% first-year capital allowance) for plant-and-machinery
  investment April 2021 – March 2023 to bridge behavioural response. Reversed the post-2010 Conservative trajectory (28% → 19%). Formally enacted via Finance Act 2021.

  '

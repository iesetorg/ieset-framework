policy_id: india_uniform_civil_code_uttarakhand_2025
status: candidate
title: India Uniform Civil Code Uttarakhand 2025
countries:
- IND
timeframe:
  start: 2024
  end: ongoing
description: 'Uttarakhand became the first Indian state to enact a Uniform Civil Code (2024, in force 2025), unifying marriage, divorce, inheritance, and live-in registration rules across communities and
  overriding personal-law variations. Passed under BJP state government in line with Modi-era national policy direction, the legislation creates a state-level template that the central government has signaled
  it may replicate in other states.

  '

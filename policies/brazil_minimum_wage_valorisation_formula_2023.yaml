- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: INSS pensions and BPC benefits indexed to the minimum wage rise automatically with each adjustment.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Real-growth-linked formula adds permanent escalator to pension and benefit spending lines.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Targets bottom-decile workers but partially offset by formal-sector wage compression on small employers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Indirect subsidy to low-wage sectors via floor support, anchoring services-sector incomes.

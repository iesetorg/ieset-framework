policy_id: brazil_minimum_wage_valorisation_formula_2023
status: candidate
title: Brazil Minimum Wage Valorisation Formula 2023
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'Lei 14663/2023, signed by Lula in his third term, reinstated the minimum-wage valorisation rule that ties annual salario minimo adjustments to lagged GDP growth plus prior-year inflation,
  replacing the inflation-only adjustment used during the Bolsonaro period. Because INSS pensions, BPC disability benefits, and many federal labour entitlements are statutorily indexed to the minimum wage,
  the formula functions as an automatic real-spending escalator for the social-security envelope.

  '
enacted_by:
- brazil_lula_third_term_2023_present

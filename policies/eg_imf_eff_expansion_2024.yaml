policy_id: eg_imf_eff_expansion_2024
status: candidate
title: IMF Extended Fund Facility expansion from $3bn to $8bn (March 2024)
countries:
- EGY
timeframe:
  start: 2024
  enacted_date: '2024-03-29'
description: 'On 29 March 2024 the IMF Executive Board completed the first and second reviews of the Egypt Extended Fund Facility originally approved December 2022 and augmented access from SDR 2.35bn (~$3bn)
  to SDR 6.1bn (~$8bn). Programme targets: flexible exchange-rate regime, reduced fiscal dominance over monetary policy, energy-subsidy phase-out path, divestment under the 2022 State-Ownership Policy,
  and levelling the playing field between state-owned (including military-linked) and private firms.

  '
enacted_by:
- egypt_sisi_third_term_2024_present
- egypt_sisi_austerity_2016_present
coalition_label_at_enactment: Mostaqbal Watan / Presidency
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  rationale: Programme requires phased elimination of fuel subsidies by FY25/26.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  rationale: Programme language targets reduced fiscal dominance; implementation partial.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  rationale: Divestment and level-playing-field conditions; execution limited to date.
references:

policy_id: de_atomausstieg_2011
status: candidate
title: Germany Atomausstieg (nuclear phase-out 2011)
countries:
- DEU
timeframe:
  start: 2011
  end: 2023
  enacted_date: '2011-08-06'
description: 'Reversal of the 2010 lifetime-extension (Laufzeitverlängerung) for German nuclear reactors following the Fukushima Daiichi accident of 11 March 2011. 13th amendment to the Atomgesetz (6 August
  2011) immediately shut eight reactors and set phased closure of the remaining nine by end-2022 (extended briefly in 2022-2023 under Russia-gas crisis, final three closed April 2023). Complementary expansion
  of EEG renewable-feed-in framework. Germany''s share of nuclear electricity fell from ~22% (2010) to 0% (2023); gas-and-coal share rose to fill the gap until 2022.

  '
enacted_by:
- germany_merkel_ii_cdu_fdp_2009_2013
- germany_merkel_nuclear_phaseout_2011
coalition_label_at_enactment: CDU/CSU-FDP
axes_moved:

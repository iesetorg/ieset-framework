policy_id: cr_social_security_expansion_1961_1973
status: candidate
title: Costa Rica social security and health expansion 1961-1973
countries: [CRI]
timeframe: {start: 1961, end: 1973}
description: >
  Costa Rica expanded the Caja Costarricense de Seguro Social and related
  public health and social-insurance institutions during the 1960s and early
  1970s, broadening coverage beyond formal urban workers and consolidating the
  welfare-democratic settlement.

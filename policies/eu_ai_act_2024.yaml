description: 'First horizontal statutory framework for AI systems in a major jurisdiction. Regulation (EU) 2024/1689 published in the Official Journal on 12 July 2024, entering force 1 August 2024 with
  a phased application schedule (prohibited practices at 6 months, GPAI obligations at 12 months, high-risk system obligations at 24-36 months). Core architecture: risk-tier classification (unacceptable
  / high / limited / minimal), conformity assessment for high-risk systems, general-purpose AI (GPAI) obligations including systemic-risk tier for models trained above a 10^25 FLOP compute threshold, transparency
  obligations for generative systems, and an AI Office under DG CONNECT coordinating enforcement. Penalties up to 7% of global turnover for prohibited-use violations. Framework codes this as a strong sectoral-licensing
  movement: the environmental-stringency axis does not apply, but product-market competition and compliance- cost implications for foundation-model training are central.'

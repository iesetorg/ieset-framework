policy_id: greece_fiscal_accommodation_2001_2009
status: candidate
title: Greece Fiscal Accommodation 2001 2009
countries:
- GRC
timeframe:
  start: 2001
  end: 2010
description: 'After eurozone entry on 1 January 2001 reduced sovereign borrowing costs to near-Bund levels, successive Greek governments expanded primary expenditure, public-sector hiring, and pension generosity
  well above trend revenue, running primary deficits despite Stability and Growth Pact targets. The Athens 2004 Olympics budget overruns and recurring Eurostat deficit revisions exemplified the period of
  accommodative fiscal policy that culminated in the 2009–2010 crisis.

  '

description: '4-11 June 1990 first nationwide Ecuadorian indigenous uprising organised by Confederación de Nacionalidades Indígenas del Ecuador (CONAIE). Road blockades across the Sierra; occupation of
  Santo Domingo church in Quito; hacienda takeovers in Chimborazo and Cotopaxi. Sixteen demands including constitutional recognition of pluriethnic state, bilingual education, agrarian reform, resolution
  of land conflicts. Borja government negotiated; catalysed indigenous-politics coalition Pachakutik founded 1995. Model for Latin American indigenous mobilisation.

  '

policy_id: pt_public_wage_pension_reversal_2016_2018
status: candidate
title: Public Wage Pension Reversal 2016 2018
countries:
- PRT
timeframe:
  start: 2015
  end: 2024
description: 'The Costa "geringonça" government, supported by the Bloco de Esquerda and PCP, phased out the Troika-era public-sector wage cuts and unfroze pension revaluation. Enacted via OE 2016-2018 State
  Budget Laws, the reversal restored 2010 wage levels in quarterly tranches and reinstated CPI-indexed pension uprating for the lowest brackets first.

  '

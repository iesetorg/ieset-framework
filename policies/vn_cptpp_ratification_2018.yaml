timeframe:
  start: 2018
  end: 2019
  enacted_date: '2018-11-12'
description: 'National Assembly Resolution 72/2018/QH14 of 12 November 2018 ratifying the Comprehensive and Progressive Agreement for Trans-Pacific Partnership (CPTPP), making Vietnam the seventh country
  to ratify and triggering entry into force 14 January 2019. Commitments included elimination of 65% of tariff lines on entry rising to ~98% over 10 years, services and investment liberalisation, state-owned-enterprise
  disciplines, labour and independent-union commitments (with transition periods), and accession to ILO Convention 98 (collective bargaining, ratified 2019). Combined with EVFTA (ratified 2020) and RCEP
  (signed 2020) to give Vietnam the most-networked FTA coverage in ASEAN.

  '

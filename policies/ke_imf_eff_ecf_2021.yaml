policy_id: ke_imf_eff_ecf_2021
status: candidate
title: IMF EFF/ECF programme (Apr 2021 - 2025)
countries:
- KEN
timeframe:
  start: 2021
  end: 2025
  enacted_date: '2021-04-02'
description: '38-month blended Extended Fund Facility / Extended Credit Facility approved by IMF Executive Board on 2 Apr 2021 (initially USD 2.34bn, augmented to ~USD 3.6bn+ through successive reviews;
  RSF added Jul 2023). Programme anchored on (a) fiscal consolidation via revenue mobilisation (Finance Acts 2021-2024), (b) SOE reform (Kenya Airways, Kenya Power), (c) monetary framework modernisation
  and FX-market functioning, and (d) climate-resilience reforms (RSF). Straddled both Kenyatta (2021-2022) and Ruto (2022-2025) administrations. Ninth review concluded Oct 2024; programme ended without
  a 10th review and without a successor arrangement in early 2025 after Gen-Z protests forced withdrawal of revenue measures.

  '
enacted_by:
- kenya_kenyatta_jubilee_2013_2022
- kenya_ruto_uda_2022_present
coalition_label_at_enactment: Jubilee (2021), then Kenya Kwanza (from 2022)

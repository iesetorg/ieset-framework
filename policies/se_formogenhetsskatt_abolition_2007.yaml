policy_id: se_formogenhetsskatt_abolition_2007
status: candidate
title: Foermoegenhetsskatt (wealth tax) abolition 2007
countries:
- SWE
timeframe:
  start: 2007
  enacted_date: '2007-01-01'
description: 'Swedish net wealth tax (foermoegenhetsskatt), which had taxed net assets above a threshold at 1.5% (and up to 1.5% of taxable value of various owner-held property), was abolished with effect
  from 1 January 2007. The abolition followed similar earlier removal of the inheritance and gift tax (abolished Jan 2005 under the outgoing Persson government). Motivated by concern over capital flight
  and the tax''s narrow base after expatriations of high-net-worth Swedes.

  '
enacted_by:
- sweden_reinfeldt_alliance_2006_2014
coalition_label_at_enactment: Alliansen
axes_moved:

  direction: '-'
  magnitude: strong
  intended: true
  rationale: Repeal of the principal capital-stock tax on individuals.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Wealth tax had been strongly progressive top-decile incidence.

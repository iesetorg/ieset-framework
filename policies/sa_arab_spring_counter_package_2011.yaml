status: candidate
title: Arab Spring $130bn counter-package
countries:
- SAU
timeframe:
  start: 2011
  enacted_date: '2011-03-18'
description: 'Two royal decrees (February and March 2011) committing ~$130bn in new spending — public-sector two-month bonus, 500,000 housing units, 60,000 new Interior Ministry positions, minimum-wage
  floor for Saudis in the public sector, unemployment benefit — issued as fiscal immunisation against Arab Spring contagion. Simultaneously deployed GCC Peninsula Shield forces to Bahrain to suppress protests.
  Package absorbed roughly 20% of 2011 GDP over subsequent years and cemented the distributional-state bargain.

  '

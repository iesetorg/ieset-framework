  intended: true
  rationale: Statutory removal of government direction over monetary policy and prohibition on deficit financing.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Independent monetary authority enabled banking-sector reforms and clearer prudential supervision.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Stable inflation environment supported entry by foreign banks and financial-services competitors.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Macro stability created fiscal space for subsequent social-protection programme expansion.

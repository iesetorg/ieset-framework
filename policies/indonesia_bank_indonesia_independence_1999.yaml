policy_id: indonesia_bank_indonesia_independence_1999
status: candidate
title: Indonesia Bank Indonesia Independence 1999
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Law No. 23/1999 on Bank Indonesia made the central bank legally independent of government, gave it sole responsibility for monetary stability, and prohibited direct deficit financing. Enacted
  in the immediate post-Suharto Reformasi period as part of IMF-programme conditionality, the law underpinned the subsequent move to inflation targeting (formally adopted in 2005) and remains the foundational
  monetary-institutional reform of the post-1998 era.

  '
enacted_by:
- indonesia_reformasi_1998_present
axes_moved:
- axis: monetary.central_bank_independence
  direction: +

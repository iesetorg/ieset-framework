  intended: true
  rationale: Consolidates public-service digital identity and common procurement under a single accountable authority; removes some ministerial-silo opacity.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Initial budget ¥300bn+ and recurring funding for common government cloud and system migration.

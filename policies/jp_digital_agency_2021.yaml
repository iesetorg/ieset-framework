policy_id: jp_digital_agency_2021
status: candidate
title: Japan — Digital Agency establishment (Dejitaru-chō, 2021)
countries:
- JPN
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-09-01'
description: 'Creation of the Digital Agency (デジタル庁 / Dejitaru-chō) as a cross-ministry central authority on 1 September 2021, established by the Digital Agency Establishment Act (Act No. 36 of 2021) signed
  in May 2021. Consolidates digital-government functions previously dispersed across ministries, with mandates covering My-Number Card integration, government cloud and common infrastructure procurement,
  ID-linked public services, and oversight of sectoral digitalisation. Headed by a minister reporting directly to the Cabinet, with a mixed staff of career bureaucrats and private-sector secondees. Motivated
  by the COVID-era exposure of paper-and-fax legacy government workflows and the botched COCOA contact-tracing app.

  '
enacted_by:
- japan_suga_ldp_2020_2021
coalition_label_at_enactment: LDP-Komeito (Suga administration)

description: 'Merkel-Schäuble insistence on strict conditionality (austerity + structural reform) attached to successive Greek, Irish, Portuguese, Spanish, and Cypriot bailout programmes via the EFSF (2010)
  and its permanent successor the European Stability Mechanism (ESM, Bundestag approval 27 September 2012). Reinforced by the Fiscal Compact (TSCG, 2012). Coded as the defining Merkel-Schäuble external
  economic posture — ordoliberal rule-binding projected at Eurozone scale — that ECB policy (OMT, Draghi ''whatever it takes'' July 2012) ultimately had to offset.

  '

description: 'Ley 30556 (28 Apr 2017) + DS 091-2017-PCM created Autoridad para la Reconstrucción con Cambios (ARCC) in response to Costero El Niño Jan-Mar 2017 (flooding, 162 deaths, ~USD 3bn damage). Multi-year
  USD 8bn+ reconstruction programme across infrastructure, housing, drainage. Executive-branch authority with direct budgetary autonomy + fast-track procurement. Slow execution criticised; pivoted to G2G
  procurement with UK + Korea 2019.

  '

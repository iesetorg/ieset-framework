  direction: +
  magnitude: strong
  intended: true
  rationale: 120 planned heavy-industrial projects; planned investment ratio pushed to unsustainable levels.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: First large Western/Japanese plant-import contracts since 1960s.
- axis: regulatory.product_market_competition

policy_id: cn_ten_year_plan_1978
status: candidate
title: Hua Guofeng Ten-Year Plan 1976-1985 (China 1978)
countries:
- CHN
timeframe:
  start: 1978
  end: 1980
  enacted_date: '1978-02-26'
description: 'Announced by Hua Guofeng at the 1st Session of 5th NPC 26 Feb 1978. Targeted 120 major industrial projects, 10 large oil and gas fields, 8 coal bases, 10 iron-and-steel complexes, and 10%
  average annual industrial growth 1978-1985, financed via USD65bn plant-import contracts with Japan/Europe. Plan-overstretch exposed balance-of- payments stress by late 1978; ''readjustment'' announced
  at Apr 1979 Central Work Conference cancelled the majority of contracts (Baoshan Steel retained).

  '
enacted_by:
- china_hua_guofeng_transition_1976_1978
coalition_label_at_enactment: CCP (Hua Guofeng)

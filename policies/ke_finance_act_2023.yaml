policy_id: ke_finance_act_2023
status: candidate
title: Finance Act 2023 (Kenya)
countries:
- KEN
timeframe:
  start: 2023
  enacted_date: '2023-06-26'
description: 'Signature Kenya Kwanza revenue package, assented on 26 Jun 2023. Added a 32.5% PAYE band (KES 500k-800k/month) and a 35% top band (>KES 800k/month); doubled VAT on petroleum products from
  8% to 16%; introduced the 1.5% Affordable Housing Levy on gross salary (employee + employer matching); raised turnover tax from 1% to 3% and lowered the threshold; and introduced a 3% digital-asset tax.
  Challenged in the High Court; the housing-levy component was ruled unconstitutional on procedural grounds in Nov 2023, prompting the Affordable Housing Act 2024.

  '

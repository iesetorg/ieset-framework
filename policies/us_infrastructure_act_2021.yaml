title: Infrastructure Investment and Jobs Act 2021 (Bipartisan Infrastructure Law)
countries:
- USA
timeframe:
  start: 2021
  end: 2026
  enacted_date: '2021-11-15'
description: '$1.2 trillion (~$550bn new spending above baseline) bipartisan infrastructure package covering roads and bridges ($110bn), passenger and freight rail including Amtrak ($66bn), public transit
  ($39bn), broadband deployment ($65bn with BEAD program), power grid upgrades and transmission ($73bn), water and lead-pipe replacement ($55bn), EV charging network ($7.5bn), airports and ports, environmental
  remediation, and resilience funding. Passed Senate 69-30 (August 2021) and House 228-206 (November 2021) with bipartisan support. First large-scale US physical-infrastructure reauthorisation since ARRA-era
  investment; created new DOT and DOE programme offices and reauthorised the Highway Trust Fund.

  '

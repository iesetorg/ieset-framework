policy_id: italy_superbonus_phaseout_2024
status: candidate
title: Italy Superbonus 110% phase-out (DL 39/2024)
countries:
- ITA
timeframe:
  start: 2024
  enacted_date: '2024-03-29'
description: 'Decreto-legge 39/2024 (Law 67/2024) tightening Superbonus access and transfer mechanics, following earlier Decreto-legge 11/2023 that had already restricted cessione del credito / sconto in
  fattura for works started after February 2023. Key 2024 measures: blocked remontage of the cessione mechanism for residual cases; further tightened eligibility for heritage and condominio projects; capped
  forward fiscal cost through 2026; tightened anti-fraud controls on receivables purchased by banks (spread-recognition limits). Ex-post Corte dei Conti updates cumulative gross fiscal cost of Superbonus
  regime ~€220bn by 2024 against ex-ante ~€35bn — ~6x blow-out that materially moved Italy''s deficit path. Construction-sector boom (GVA +40% cumulative 2020-2023) reversed sharply in 2024 as work pipelines
  exhausted. Policy analytically important as natural- experiment case of uncapped demand-side fiscal credit with market- liquid transfer instrument; influenced EU fiscal-governance discussions on contingent
  liabilities.

  '

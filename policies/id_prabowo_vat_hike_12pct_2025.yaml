policy_id: id_prabowo_vat_hike_12pct_2025
status: candidate
title: VAT rate hike to 12% on luxury categories 2025
countries:
- IDN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-01'
description: 'Partial implementation of the UU HPP-mandated step from 11% to 12% VAT, enacted effective 1 January 2025. Following late-2024 public backlash Prabowo narrowed the hike to luxury-category goods
  (premium vehicles, luxury residences, private aviation, premium foodstuffs) via PMK 131/2024 while leaving the standard 11% rate on general goods and services. Targeted yield ~Rp 3.5tn (versus ~Rp 60tn
  under universal hike). Represents a deviation from the original HPP schedule and an implicit rollback of the Jokowi-era consolidation path.

  '
enacted_by:
- indonesia_prabowo_2024_present
coalition_label_at_enactment: Gerindra-led Koalisi Indonesia Maju Plus
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Luxury-only scope makes the incremental VAT more progressive than the scheduled universal 12% hike.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: false
  rationale: Revenue undershoots HPP schedule by ~Rp 55tn, implicitly loosening medium-term fiscal envelope.
references:
- PMK No. 131 Tahun 2024
- UU No. 7 Tahun 2021 tentang Harmonisasi Peraturan Perpajakan

policy_id: png_lng_project_agreement_2008
status: candidate
title: Papua New Guinea LNG project agreement 2008
countries: [PNG]
timeframe: {start: 2008, end: ongoing}
description: >
  The PNG LNG project agreement enabled large-scale gas development and export
  infrastructure, tying the fiscal outlook to liquefied natural gas revenues and
  benefit-sharing commitments. The agreement brought major foreign investment
  but also exposed the state to project-specific revenue, landowner, and debt
  risks.
enacted_by:
  - papua_new_guinea_independence_resource_state_1975_present
axes_moved:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, intended: true, rationale: "The LNG project integrated PNG more deeply into global energy export markets."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, intended: true, rationale: "Project development depended on negotiated petroleum licences and state agreements."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, intended: true, rationale: "Fiscal concessions and infrastructure commitments supported project economics."}
references:
  - "PNG LNG project agreement documentation"
  - "IMF Papua New Guinea Article IV reports on LNG revenue"

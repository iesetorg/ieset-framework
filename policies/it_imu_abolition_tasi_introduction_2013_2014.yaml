description: 'Two-step property-tax reversal under the Letta government: suspension of the second IMU instalment on primary residences (D.L. 102/2013, Aug 2013) was followed by full abolition of IMU on
  primary residences and introduction of TASI (Tassa sui Servizi Indivisibili) service-tax from 2014 (Legge di Stabilità 2014). Net revenue impact approximately neutral but shifted collection channel and
  political-symbolic coding of property taxation — honouring a core PdL campaign promise.

  '

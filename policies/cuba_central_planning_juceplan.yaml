policy_id: cuba_central_planning_juceplan
status: candidate
title: Cuba Central Planning Juceplan
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'Cuba''s central-planning system led by JUCEPLAN (Junta Central de Planificación), established in 1960 after the 1959 revolution. JUCEPLAN coordinated annual and five-year material balances,
  allocated foreign exchange, set state-enterprise output targets, and managed the consumer rationing system (libreta) under state ownership of most productive assets, modelled on Soviet Gosplan-style planning.

  '
enacted_by:
- cuba_post_1959_socialist_economy
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Material-balance allocation displaced market price signals across virtually all productive sectors.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mass nationalisation of land, industry, and most retail eliminated private property rights in productive assets.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Universal rationing system (libreta) and free public services functioned as broad in-kind transfers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State enterprises operated under soft-budget constraints with implicit and explicit input subsidies.

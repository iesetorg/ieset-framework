description: 'Zimbabwe adopted National Development Strategy 1 as the government''s 2021-2025 medium-term plan, succeeding the Transitional Stabilisation Programme and setting targets for macroeconomic
  stabilisation, infrastructure, agriculture, mining, manufacturing, devolution, housing, and social services. NDS1 framed public investment and sectoral support around the Mnangagwa government''s "Vision
  2030" and "Zimbabwe is open for business" programme.

  '

policy_id: mexico_article_27_reform_1992
status: candidate
title: Mexico Article 27 Reform 1992
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'The 1992 amendment to Article 27 of Mexico''s Constitution and the accompanying Agrarian Law ended the obligation to redistribute land and recognised individual ejido titling, leasing, sale,
  and collateralisation rights. The reform unwound seven decades of post-revolutionary communal-tenure doctrine, was complementary to NAFTA''s agricultural opening, and ran alongside the broader Salinas
  programme of trade liberalisation, privatisation, and central-bank reform.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform was a prerequisite for NAFTA's agricultural integration, allowing cross-border investment in formerly communal land.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Permitted private corporations and external capital to enter agricultural production previously locked into ejido use rights.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Converted communal usufruct entitlements into individual transferable titles certified through the PROCEDE programme.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Salinas package paired land-tenure reform with constitutional amendments granting Banxico statutory autonomy.

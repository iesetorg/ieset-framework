  enacted_date: '2008-02-01'
description: 'On 1 February 2008 the oil-revenue Stabilisation Fund (created 2004 under Kudrin, balance ~USD 158bn) was split into a Reserve Fund (short-term fiscal buffer, ceiling 10% of GDP) and a National
  Wealth Fund (long-term pension and intergenerational investment). Deployed substantially in the 2008-2009 crisis response.

  '

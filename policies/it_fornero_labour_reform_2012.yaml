policy_id: it_fornero_labour_reform_2012
status: candidate
title: Italy Fornero labour-market reform (Law 92/2012)
countries:
- ITA
timeframe:
  start: 2012
  end: 2015
  enacted_date: '2012-06-28'
description: 'Labour-market reform under the Monti government (Law 92/2012) by Labour Minister Fornero. Changed Article 18 of the Workers'' Statute so that unfair-dismissal remedies became discretionary
  (reinstatement retained only for specific categories of invalid dismissal); expanded apprenticeship role; consolidated temporary-contract rules; created ASpI unemployment insurance replacing prior Mobilità
  and Ordinaria schemes. Transitional to the more extensive Renzi Jobs Act (2014-2015). Controversial within the PD support base; praised by IMF/OECD/EC.

  '
enacted_by:
- italy_monti_technocratic_2011_2013
coalition_label_at_enactment: Monti technocratic
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Art. 18 reinstatement tightened; firing-costs reduced for most dismissal types.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: ASpI extended unemployment insurance coverage and duration.
references:

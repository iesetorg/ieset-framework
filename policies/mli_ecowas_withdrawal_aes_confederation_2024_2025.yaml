policy_id: mli_ecowas_withdrawal_aes_confederation_2024_2025
status: candidate
title: Mali ECOWAS withdrawal and AES confederation 2024-2025
countries:
- MLI
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-28'
description: >
  Mali joined Burkina Faso and Niger in notifying withdrawal from ECOWAS in
  January 2024 and then elevated the Alliance of Sahel States into a
  confederation. The policy shifted Mali's regional anchor away from ECOWAS
  sanctions, court, and election-timetable pressure and toward a military-led
  Sahel sovereignty bloc focused on mutual defence and transition-government
  coordination.
enacted_by:
- mali_assimi_goita_transition_sovereignty_2020_present
scope: national
coalition_label_at_enactment: Goita transition government
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Leaving ECOWAS weakened formal regional market-integration and free-movement commitments.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Withdrawal reduced regional institutional constraints on the transition timetable and governance standards.
references:
- ECOWAS statements on the withdrawal of Burkina Faso, Mali, and Niger, 2024-2025.
- Alliance of Sahel States confederation treaty and communiques, 2024.
- Associated Press and Reuters reporting on ECOWAS withdrawal and AES formation.

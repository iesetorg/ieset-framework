description: 'Building on the 2022 government decision to introduce a living-wage benchmark, the 2024-2026 schedule progresses the National Minimum Wage toward 60% of hourly median wages by 2026. The Low
  Pay Commission recommends annual increments to phase out the sub-minimum-wage rate for younger workers and align with the EU Adequate Minimum Wages Directive.

  '

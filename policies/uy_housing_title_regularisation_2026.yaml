policy_id: uy_housing_title_regularisation_2026
status: candidate
title: Uruguay Housing Title Regularisation Drive 2026
countries:
- URY
timeframe:
  start: 2026
  end: ongoing
description: 'The Orsi government accelerated Ministry of Housing property-title regularisation for households whose dwellings had pending escritura processes. The ministry announced that it expected to
  deliver 500 property titles by July 2026 and framed the programme as closing long-standing administrative files so occupants could receive formal ownership documentation.

  '
enacted_by:
- uruguay_orsi_fa_2025_present
coalition_label_at_enactment: Frente Amplio (MPP-led, minority congressional position)
axes_moved:
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Formal escrituras convert pending occupation or allocation cases into documented ownership claims.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: The drive uses ministry administrative resources to resolve title backlogs.
references:

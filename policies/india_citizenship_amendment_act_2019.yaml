policy_id: india_citizenship_amendment_act_2019
status: candidate
title: India Citizenship Amendment Act 2019
countries:
- IND
timeframe:
  start: 2014
  end: 2024
description: 'The Citizenship (Amendment) Act 2019 created an expedited naturalisation pathway for non-Muslim religious minorities (Hindu, Sikh, Buddhist, Jain, Parsi, Christian) from Pakistan, Bangladesh,
  and Afghanistan who had entered India before 31 December 2014. Implementation rules were notified in 2024. Although primarily an identity-policy statute, the Act has fiscal and programme-implementation
  effects via downstream eligibility for central schemes.

  '
enacted_by:
- india_modi_first_second_term_2014_2024

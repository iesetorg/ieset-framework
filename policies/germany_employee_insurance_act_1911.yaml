policy_id: germany_employee_insurance_act_1911
status: candidate
title: Germany Employee Insurance Act 1911
countries: [DEU]
timeframe:
  start: 1911
description: >
  The Insurance Act for Salaried Employees (Versicherungsgesetz fuer Angestellte)
  created a distinct compulsory insurance scheme for white-collar employees, extending
  the imperial welfare architecture beyond manual workers and recognising salaried staff
  as a separate protected status group. The law broadened old-age and disability income
  security inside the contributory Bismarckian model and helped normalise social
  insurance as a routine feature of German industrial society before the First World War.
enacted_by:
  - germany_imperial_tariff_social_insurance_state_1902_1914
coalition_label_at_enactment: "Imperial government under Chancellor Theobald von Bethmann Hollweg"
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Extended compulsory contributory pension and disability protection to salaried employees as a new insured group."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Formal insurance obligations further structured the white-collar employment relationship."
references:
  - "Versicherungsgesetz fuer Angestellte (1911)"
  - "Hennock (2007), The Origin of the Welfare State in England and Germany"

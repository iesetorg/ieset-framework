policy_id: zambia_kwacha_liberalisation_1992
status: candidate
title: Zambia Kwacha Liberalisation 1992
countries:
- ZMB
timeframe:
  start: 1991
  end: 2001
description: 'Under the Chiluba MMD government''s IMF-supported structural adjustment programme, Zambia abolished the multi-tier fixed exchange-rate regime and introduced a market-determined kwacha in 1992-1994
  through a sequence of devaluations and the establishment of an inter-bank foreign-exchange market. Exchange controls on current-account transactions were removed and bureaux de change were licensed, ending
  decades of pegged-rate distortions inherited from the Kaunda era.

  '
enacted_by:
- zambia_msunwe_structural_adjustment_1991_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Bureaux de change and inter-bank market broke the state monopoly on foreign-exchange allocation.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Convertible market rate ended the implicit import tax of overvalued official kwacha pricing.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminated cross-subsidy from preferential FX allocations to favoured importers and parastatals.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Holding and transacting in foreign currency became legal, restoring monetary property rights.

title: Plano Collor I — asset freeze (March 1990)
countries:
- BRA
timeframe:
  start: 1990
  enacted_date: '1990-03-16'
description: 'Medida Provisória 168 of 16 March 1990 (Plano Brasil Novo / Plano Collor I) under Finance Minister Zélia Cardoso de Mello. Replaced cruzado novo with cruzeiro at 1:1. Blocked 80% of financial
  assets held in overnight market, savings accounts > NCz$ 50,000, and demand deposits > NCz$ 50,000 for 18 months in frozen BCB accounts — confiscated ~30% of M4 (~$100B). Price-wage freeze; fiscal tightening;
  customs reforms. Monthly inflation fell briefly to ~9% in May 1990 before returning to 20%+.

  '

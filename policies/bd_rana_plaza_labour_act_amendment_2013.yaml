policy_id: bd_rana_plaza_labour_act_amendment_2013
status: candidate
title: Labour Act amendment and Accord/Alliance factory-safety response (post-Rana Plaza)
countries:
- BGD
timeframe:
  start: 2013
  enacted_date: '2013-07-22'
description: 'Following the 24 April 2013 Rana Plaza collapse (1,134 RMG worker deaths), the Jatiya Sangsad on 15 July 2013 amended the Bangladesh Labour Act 2006 (assented 22 July 2013) to expand freedom
  of association, lower the 30% threshold for union registration in some contexts, and require occupational-safety committees. Paired with the private Accord on Fire and Building Safety (EU brands) and
  Alliance for Bangladesh Worker Safety (US brands), both launched May 2013, which inspected and required remediation of ~2,300 RMG factories.

  '
enacted_by:
- bangladesh_hasina_al_2_3_term_2009_2018
coalition_label_at_enactment: Awami League
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  rationale: Expanded union rights and safety-committee mandates reduce firm-side flexibility.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  rationale: Factory-safety inspection and remediation licensing via Accord/Alliance/DIFE.

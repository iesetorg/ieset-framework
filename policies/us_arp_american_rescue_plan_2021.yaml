policy_id: us_arp_american_rescue_plan_2021
status: candidate
title: American Rescue Plan Act 2021
countries:
- USA
timeframe:
  start: 2021
  end: 2022
  enacted_date: '2021-03-11'
description: '$1.9 trillion pandemic fiscal package passed via reconciliation on party-line Democratic vote. Core components: $1,400 per-person direct payments; extension and $300/week top-up of federal
  unemployment insurance through September 2021; fully refundable and expanded Child Tax Credit for 2021 (monthly advance payments, up to $3,600 per child); $350bn State and Local Fiscal Recovery Funds;
  $123bn K-12 Elementary and Secondary School Emergency Relief; expanded ACA premium subsidies; expansion of EITC for workers without children; rental assistance, SNAP extensions, vaccine and testing funding.
  Larger than the CBO estimate of the pandemic output gap, fuelling the Summers-Blanchard dissent on inflation risk; subsequently implicated in the 2021-2023 US inflation episode in debate alongside supply-chain
  and monetary channels.

  '
enacted_by:
- us_biden_administration_broad_2021_2025
coalition_label_at_enactment: Democratic trifecta (50-50 Senate reconciliation)

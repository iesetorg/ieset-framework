policy_id: vn_wto_accession_2007
status: candidate
title: Vietnam WTO accession 2007
countries:
- VNM
timeframe:
  start: 2007
  end: ongoing
  enacted_date: '2007-01-11'
description: 'Vietnam became the 150th WTO member on 11 January 2007 after an 11-year negotiation. Accession bound average MFN industrial tariffs down from ~17.4% to a committed ~10.4% with phase-ins through
  2019, opened services (banking, insurance, distribution, telecoms) to partial foreign entry, formalised trading rights for foreign firms, and required national-treatment disciplines on SOEs. Commonly
  paired with the 2001 US BTA as the two anchor steps of Vietnam''s export-led integration. Registered FDI inflows roughly doubled from ~US$6.7bn (2005) to over US$11bn (2008); exports as share of GDP rose
  from ~61% (2006) toward ~100% by 2019.

  '
enacted_by:

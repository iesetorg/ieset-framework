description: 'The Japan-Indonesia Economic Partnership Agreement, signed in August 2007 and effective July 2008, was Japan''s seventh bilateral EPA. It liberalised tariffs on the bulk of bilateral merchandise
  trade, opened service-sector commitments and energy-related cooperation including LNG supply, and pioneered Japan''s first acceptance of foreign nurses and care workers under bilateral movement of natural
  persons provisions.

  '

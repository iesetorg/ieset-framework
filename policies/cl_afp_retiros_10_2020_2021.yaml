policy_id: cl_afp_retiros_10_2020_2021
status: candidate
title: Three 10% AFP Pension Withdrawals (Chile 2020-2021)
countries:
- CHL
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-07-30'
description: 'Three legislated one-off 10% withdrawals from individual AFP pension accounts enacted during the Covid-19 pandemic under the Piñera II government, against the stated position of the executive
  and the Banco Central: first retiro (Ley 21.248, July 2020), second retiro (Ley 21.295, December 2020), third retiro (Ley 21.330, April 2021). Cumulative drawdowns reached ~USD 50 bn, equivalent to ~15%
  of AFP system assets, with macro effects on peso depreciation, long-rate pricing, and domestic-capital- market depth. A fourth-retiro constitutional reform failed in 2021. The episode is independently
  material in that it restructured the de facto property-rights status of mandatory- savings balances and is coded here as policy content regardless of the coalition that passed it.

  '
enacted_by:
- chile_pinera_ii_2018_2022
coalition_label_at_enactment: Cross-bench supermajority over Chile Vamos executive opposition
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Mandatory-savings account balances reopened for discretionary withdrawal via successive reforms; de facto property-rights status weakened.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Household cash flow expanded ~USD 50 bn via withdrawals; effectively a transfer, though financed from private accumulated balances rather than tax.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: AFP portfolios forced to liquidate at scale; domestic-capital-market depth reduced; long-end term premium widened.

policy_id: us_cares_act_covid_fiscal_response_2020
status: candidate
title: CARES Act and COVID-era federal fiscal response 2020
countries:
- USA
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-03-27'
description: 'Coronavirus Aid, Relief, and Economic Security Act (CARES) March 2020 plus follow-on packages. $2.2 trillion CARES: $1,200 per-adult direct payments, $600/week Pandemic Unemployment Compensation
  through July 2020 and Pandemic Unemployment Assistance for gig workers, $349bn (later expanded) Paycheck Protection Program forgivable loans to small businesses, $500bn corporate liquidity facility (Treasury
  + Fed 13(3) backing including Main Street Lending), $150bn Coronavirus Relief Fund to states/localities, hospital funding, student-loan payment pause, eviction and foreclosure moratoria. Followed by the
  Paycheck Protection Program and Health Care Enhancement Act (April 2020) and Consolidated Appropriations Act December 2020 ($900bn including $600 checks and extended UI). Combined first-term COVID fiscal
  response ~$3.5-4T, complemented by Federal Reserve emergency lending and balance-sheet expansion from ~$4T to ~$7T. Bipartisan passage; largest peacetime US fiscal expansion.

  '

policy_id: israel_fiscal_consolidation_1985
status: candidate
title: Israel Fiscal Consolidation 1985
countries:
- ISR
timeframe:
  start: 1985
  end: 1991
description: 'The fiscal pillar of Israel''s July 1985 stabilisation entailed an immediate budget deficit cut on the order of 7–8% of GDP through deep cuts to consumer subsidies on food and fuel, defence
  spending, and public-employment outlays, coupled with a special one-off VAT surcharge. Combined with US emergency assistance, the consolidation broke the deficit-monetisation channel and laid the groundwork
  for sustained deficit reduction across subsequent governments.

  '

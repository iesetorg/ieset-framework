policy_id: eg_constitutional_amendment_2019
status: candidate
title: 2019 constitutional amendments extending presidential terms
countries:
- EGY
timeframe:
  start: 2019
  enacted_date: '2019-04-23'
description: 'Constitutional amendments approved by parliament 16 April 2019 and ratified by referendum 22 April 2019 (88.83% yes on ~44% turnout). Extended presidential terms from four to six years, granted
  Sisi a transitional article allowing him to stand for two further terms until 2030, strengthened the presidency''s role in judicial appointments (including the Supreme Constitutional Court president and
  the public prosecutor), formalised the armed forces'' role as "guardian of the constitution and democracy", and restored the appointed upper house (Senate).

  '

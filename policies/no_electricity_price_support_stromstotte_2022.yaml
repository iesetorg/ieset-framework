policy_id: no_electricity_price_support_stromstotte_2022
status: candidate
title: Household electricity price-support scheme (strømstøtte)
countries:
- NOR
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-12-16'
description: 'Consumption-based electricity-bill transfer reimbursing households for spot-price increments above a threshold (initially 70 øre/kWh, later adjusted) at a staged reimbursement rate (initially
  55%, raised to 80% then 90% through 2022-2024) up to a monthly consumption cap. Launched December 2021 as Nord Pool prices surged ahead of the Russia-Ukraine shock; successively extended through 2022-2024.
  Funded from the ordinary state budget with implicit offset via elevated petroleum and resource-rent tax receipts and via the transmission-surplus (flaskehalsinntekter) revenue pool.

  '
enacted_by:
- norway_store_ap_sp_2021_present
coalition_label_at_enactment: AP–Sp minority
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Per-household transfer scaling with consumption and spot price; large gross fiscal footprint 2022-2024.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Subsidising consumption at the margin partially offsets the price signal from elevated spot electricity prices.
references:
- Forskrift om midlertidig stønadsordning for husholdningers strømutgifter (2021-12-16)
- Prop. 44 S (2021–2022); renewals Prop. 1 S / revidert budsjett 2022-2024

title: Plan Austral (Argentina, 14 June 1985)
countries:
- ARG
timeframe:
  start: 1985
  end: 1987
  enacted_date: '1985-06-14'
description: 'Decreto 1096/1985 replaced the peso argentino with the austral at 1 to 1,000, froze prices and wages, pegged the austral to USD at 0.80 ARP/USD, and established "desagio" conversion formula
  for existing contracts to prevent redistribution from debtors to creditors as inflation fell. Heterodox stabilisation modelled on Israel 1985 (Stanley Fischer advising). Inflation dropped from 1,100%
  annualised to <50% within months; unraveled by early 1987.

  '

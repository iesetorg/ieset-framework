policy_id: za_two_pot_retirement_2024
status: candidate
title: Two-Pot Retirement System (South Africa, 2024)
countries:
- ZAF
timeframe:
  start: 2024
  enacted_date: '2024-09-01'
description: 'Effective 1 September 2024, retirement-fund contributions are split into a Savings Pot (one-third, accessible annually subject to tax) and a Retirement Pot (two-thirds, preserved until retirement
  and required to purchase an annuity). The reform balances household liquidity against preservation of retirement savings and replaces the prior full-cash-out-on-resignation default with compulsory partial
  preservation.

  '
enacted_by:
- southafrica_ramaphosa_anc_2018_present
coalition_label_at_enactment: ANC (pre-GNU)
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: Mandated preservation of two-thirds of future contributions tightens fund-withdrawal rules.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  rationale: Savings-pot access functions as liquidity channel to households; tax revenue effect on withdrawals.
references:
- Pension Funds Amendment Act 2024; Revenue Laws Amendment Act 2024

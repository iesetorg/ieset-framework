# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: kwt_general_reserve_future_generations_funds_1976
status: candidate
title: Kuwait Future Generations Fund 1976
countries: [KWT]
timeframe: {start: 1976, end: ongoing}
description: >
  Kuwait established the Reserve Fund for Future Generations in 1976, requiring
  a share of state revenues to be invested for long-term savings alongside the
  General Reserve Fund. Managed by the Kuwait Investment Authority, the
  framework made sovereign wealth accumulation a central complement to the
  country's oil-funded welfare state.
enacted_by:
  - kuwait_oil_welfare_state_1961_present
axes_moved:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Mandatory saving of oil revenue restrains immediate budget consumption relative to available rent."
  - axis: institutional.property_rights
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "A formal sovereign wealth architecture strengthens state asset stewardship and intergenerational claims."
references:
  - "Kuwait Investment Authority, Future Generations Fund historical overview"
  - "IMF Article IV Kuwait, selected issues on fiscal buffers and sovereign wealth"

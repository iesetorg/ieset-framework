  enacted_date: '2021-11-04'
description: 'Omnibus economic-reform statute attached to Israel''s FY2021–2022 biennial budget — the first budget passed since March 2018 after three years of political deadlock. Under Finance Minister
  Avigdor Liberman the Arrangements Law bundled parallel-imports reform (adopting EU conformity standards), agricultural-tariff reform (dairy, eggs, produce), kashrut-market liberalisation opening certification
  to private competitors, retirement-age equalisation for women (gradual 62→65), sugar-sweetened-beverage excise, and disposable-plastics levy. Positioned as a technocratic cost-of-living and productivity
  package.

  '

description: 'Philippine Senate voted 12-11 on 16 Sep 1991 against ratifying the Treaty of Friendship, Cooperation and Security that would have extended the US bases agreement for Clark Air Base and Subic
  Bay Naval Station by 10 years. Subic handover completed 24 Nov 1992; Clark vacated June 1991 after Pinatubo eruption damaged facilities. Ended a century of US military presence; re-configured under 1998
  Visiting Forces Agreement.

  '

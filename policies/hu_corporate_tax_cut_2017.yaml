policy_id: hu_corporate_tax_cut_2017
status: candidate
title: Corporate Tax Cut 2017
countries:
- HUN
timeframe:
  start: 2010
  end: 2022
description: 'Hungary''s 2017 corporate-tax reform, enacted via 2016. évi LXXXII. törvény, replaced the dual 10/19% structure with a flat 9% rate from 1 January 2017 — the lowest headline corporate rate
  in the EU. Combined with sectoral surtaxes on banking, retail, telecoms and energy (the ''Orbanomics'' tax mix), the intended effect was to attract FDI manufacturing investment, cut SME tax burdens, and
  finance unorthodox spending while shifting the tax base from corporate income to consumption (27% VAT) and special sectors.

  '
enacted_by:
- hungary_orban_2010_2022

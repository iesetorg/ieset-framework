policy_id: ke_handshake_bbi_2018
status: candidate
title: Kenyatta-Odinga Handshake and Building Bridges Initiative (2018-2021)
countries:
- KEN
timeframe:
  start: 2018
  end: 2021
  enacted_date: '2018-03-09'
description: 'On 9 Mar 2018 President Kenyatta and opposition leader Raila Odinga announced a public reconciliation ("the handshake") ending post-election street protests and establishing the Building Bridges
  Initiative (BBI) taskforce to address ethnic antagonism, divisive elections, and inclusion. The BBI Constitutional Amendment Bill (launched 2020, formally introduced Mar 2021) proposed expanding the executive
  (prime minister, two deputies), enlarging parliament, and increasing county revenue share to 35%. The bill was ruled unconstitutional by the High Court on 13 May 2021 (basic-structure doctrine) and upheld
  by the Court of Appeal (Aug 2021) and Supreme Court (Mar 2022), a landmark judicial check on executive-led constitutional change.

  '

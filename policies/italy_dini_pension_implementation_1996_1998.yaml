policy_id: italy_dini_pension_implementation_1996_1998
status: candidate
title: Italy Dini Pension Implementation 1996 1998
countries:
- ITA
timeframe:
  start: 1996
  end: 1998
description: 'The Prodi government implemented Law 335/1995 (the Dini reform), shifting Italy''s first-pillar pension system from a defined-benefit final-salary formula to a notional defined-contribution
  (NDC) regime that links benefits to lifetime contributions and life-expectancy coefficients. Long transitional rules preserved acquired rights for existing workers, but new entrants moved fully to the
  NDC method, slowing long-run pension-spending growth and supporting Italy''s euro-qualification fiscal trajectory.

  '
enacted_by:
- italy_prodi_ulivo_1996_1998

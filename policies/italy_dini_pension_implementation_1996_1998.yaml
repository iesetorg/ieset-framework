  direction: '-'
  magnitude: weak
  intended: true
  rationale: NDC formula reduced long-run pension expenditure relative to the prior defined-benefit baseline.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Pension sustainability strengthened the fiscal credibility underpinning Banca d'Italia disinflation.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Contribution-based accrual reduced disincentives to multi-employer career patterns.
- axis: fiscal.tax_progressivity

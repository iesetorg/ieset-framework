policy_id: france_pinay_rueff_stabilisation_1958
status: candidate
title: France Pinay Rueff Stabilisation 1958
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'At the founding of the Fifth Republic, finance minister Antoine Pinay and economist Jacques Rueff led a December 1958 stabilisation plan (Plan de redressement) that devalued the franc by roughly
  17.5% and introduced the heavy "nouveau franc," cut public spending, reduced subsidies, and partially liberalised trade in line with OEEC commitments. The package restored external balance ahead of EEC
  accession and set the macro frame for the high-growth years that followed.

  '
enacted_by:
- france_trente_glorieuses_indicative_planning_1945_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Plan tightened price controls and licensing in regulated industries while liberalising trade.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Despite headline retrenchment, sectoral aids to coal, agriculture, and railways were preserved.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Devaluation was paired with substantial OEEC-aligned removal of import quotas and tariffs.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Net public expenditure remained elevated on planning and reconstruction even after retrenchment.

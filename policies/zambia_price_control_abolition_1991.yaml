policy_id: zambia_price_control_abolition_1991
status: candidate
title: Zambia Price Control Abolition 1991
countries:
- ZMB
timeframe:
  start: 1991
  end: 2001
description: 'Following the MMD''s electoral victory in October 1991, the Chiluba government rapidly decontrolled consumer and producer prices that had been administered under the Kaunda-era Prices and
  Incomes Commission. The ban on most administered prices, including maize meal, fuel, and bread, took effect through a sequence of 1991-1993 statutory instruments, with administered prices retained only
  for selected utilities and the residual mealie-meal coupon scheme.

  '
enacted_by:
- zambia_msunwe_structural_adjustment_1991_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Free-priced consumer goods restored entry incentives by allowing margin recovery on imports and production.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Decontrolled domestic prices removed implicit ceiling on importer pass-through of border prices.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: End of administered-price floor eliminated need for parastatal price-stabilisation subsidies.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Producers regained right to set prices and capture surplus rather than face confiscatory price ceilings.

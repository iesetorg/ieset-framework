description: 'End of the 19% Slovak flat tax in place since 2004 — PIT split into 19% and 25% brackets (threshold ~EUR 35k taxable income), and CIT raised from 19% to 23% (2013), then eased to 22% (2014),
  21% (2017). Reversal of Miklos-era Dzurinda reform.

  '

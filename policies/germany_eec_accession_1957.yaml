policy_id: germany_eec_accession_1957
status: candidate
title: Germany Eec Accession 1957
countries:
- DEU
timeframe:
  start: 1948
  end: 1966
description: 'West Germany''s ratification of the 1957 Treaty of Rome (in force 1 January 1958) bound the Federal Republic to the European Economic Community customs union, common external tariff, and the
  four freedoms among the original six members. Combined with parallel ECSC and Euratom commitments, EEC accession opened export markets that absorbed the rapidly growing German industrial output and entrenched
  the Bonn Republic''s Westbindung as economic strategy.

  '

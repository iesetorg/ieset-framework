policy_id: id_press_freedom_law_1999
status: candidate
title: Indonesia Press Freedom Law (Law 40/1999)
countries:
- IDN
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-09-23'
description: 'Law 40/1999 on Press ended New Order licensing regime (SIUPP/SIT) under which Ministry of Information had revoked Tempo, DeTik and Editor licences in 1994. New law abolished licensing, made
  closure a civil-court matter, and established Press Council (Dewan Pers) as self-regulatory body. Paired with Law 21/1999 reforming Broadcasting. Ministry of Information itself abolished under Gus Dur
  October 1999. Enabled explosive growth of independent Indonesian media 2000-2005.

  '
enacted_by:
- indonesia_habibie_transition_1998_1999
coalition_label_at_enactment: Golkar successor / Habibie transition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Ended executive licensing of media; rights-based framework with civil-court enforcement.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Abolished SIUPP licensing for print media; broadcasting licensing depoliticised.
references:

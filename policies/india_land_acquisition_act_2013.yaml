policy_id: india_land_acquisition_act_2013
status: candidate
title: India Land Acquisition Act 2013
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'The Right to Fair Compensation and Transparency in Land Acquisition, Rehabilitation and Resettlement Act 2013 replaced the colonial 1894 statute with a modernised framework requiring social-impact
  assessments, multiple- of-market-value compensation (up to 4x in rural areas), 70-80% landowner consent for private and PPP projects, and rehabilitation entitlements for affected families. The Act materially
  raised the cost and process burden of acquiring land for industrial and infrastructure projects.

  '
enacted_by:
- india_singh_upa_ii_2009_2014

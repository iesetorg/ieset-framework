description: 'Tripartite agreement 24 November 1982 within Stichting van de Arbeid between FNV (Wim Kok), CNV, employer federation VNO (Chris van Veen), and Lubbers government. Unions accepted wage moderation
  in exchange for working-time reduction and employment creation. Canonical ''polder model'' foundation. Wage moderation persisted through late 1980s-1990s producing the ''Dutch miracle'' of employment
  growth with low inflation and fiscal consolidation.

  '

policy_id: vn_stock_exchange_launch_2000
status: candidate
title: Vietnam stock exchange launch (2000-2005)
countries:
- VNM
timeframe:
  start: 2000
  end: 2005
  enacted_date: '2000-07-28'
description: 'Ho Chi Minh Securities Trading Center (HOSTC) launched 28 July 2000 as first Vietnamese equity market, with 2 listed stocks (REE, SAM) at launch. Hanoi Securities Trading Center launched 8
  March 2005. Together became HoSE and HNX exchanges by 2007. Law on Securities 70/2006/QH11 passed 29 June 2006, effective 1 January 2007, consolidated regulatory framework under State Securities Commission
  (SSC). By end-2007 ~253 listed companies, market cap ~43% of GDP (boom-peak), later normalising to ~20% by 2011. Foreign ownership limits (49% general, 30% banking) introduced and relaxed progressively.

  '

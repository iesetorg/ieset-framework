policy_id: tun_2022_constitution_presidential_system
status: candidate
title: Tunisia 2022 Constitution and presidential system
countries:
- TUN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-08-17'
description: 'Tunisia''s 2022 constitution, approved after President Kais Saied''s 2021 suspension of parliament and the 2022 referendum, replaced the 2014 semi-parliamentary framework with a presidential
  system that concentrated executive authority, weakened parliamentary checks, and altered judicial and constitutional-review arrangements. The constitution created a new formal order but reduced several
  constraints that had defined the post-2011 system.

  '
coalition_label_at_enactment: Kais Saied presidency and referendum-backed constitutional process
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The new constitution concentrated executive power and weakened parliamentary checks.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Judicial and constitutional-review arrangements became more dependent on the presidency.
references:
- Republic of Tunisia, Constitution of 17 August 2022
- Tunisian electoral authority referendum results, 2022
- International IDEA and Venice Commission materials on Tunisia's 2022 constitutional process
notes: No current Tunisia movement was added because only one second-tranche policy was materialised here.

policy_id: mt_euro_adoption_2008
status: candidate
title: Malta euro adoption 2008
countries:
- MLT
timeframe:
  start: 2008
  end: ongoing
  enacted_date: '2008-01-01'
description: 'Malta adopted the euro on 1 January 2008 after Council Decision 2007/504/EC found that it fulfilled the convergence conditions for euro-area entry. The changeover replaced the Maltese lira
  with the euro, embedded Malta in the Eurosystem monetary-policy framework, and removed currency-conversion costs for euro-area trade, tourism, and financial flows.

  '
enacted_by: []
coalition_label_at_enactment: Gonzi Nationalist Party government
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Monetary-policy discretion shifted from the Central Bank of Malta to the independent ECB/Eurosystem framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Euro adoption removed exchange-rate conversion frictions with Malta's euro-area partners.
references:
- 'Council Decision 2007/504/EC on adoption by Malta of the single currency on 1 January 2008: https://eur-lex.europa.eu/eli/dec/2007/504/oj'

policy_id: ao_market_transition_reforms_1987_1991
status: candidate
title: "Late socialist market-transition reforms"
countries: [AGO]
timeframe: {start: 1987, end: 1991}
description: >
  In the late 1980s and early 1990s, Angola adopted reform programmes that
  loosened central planning, recognised more private activity, adjusted prices,
  and prepared the constitutional shift away from Marxist-Leninist one-party
  rule. These measures did not end wartime state dominance, but they marked a
  clear partial turn from command allocation toward market mechanisms.
enacted_by:
  - angola_mpla_socialist_oil_state_1975_1991
coalition_label_at_enactment: "MPLA"
axes_moved:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Reforms widened space for private activity and market allocation.", intended: true}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Recognition of private economic activity modestly strengthened non-state property claims.", intended: true}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Reform programmes partially loosened command-economy restrictions on external and private channels.", intended: true}
references:
  - "IMF, Angola transition and stabilization background papers"
  - "Tony Hodges, Angola: Anatomy of an Oil State"

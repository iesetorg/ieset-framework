description: 'On Dec 1 2019 Abiy Ahmed merged three of the four EPRDF constituent parties (OPDO, ANDM, SEPDM) plus five affiliate regional parties into a single national Prosperity Party. TPLF refused and
  rebranded as regional opposition. The move replaced EPRDF''s ethnic-federal coalition architecture with a single-party unitary-leaning structure — a decisive political-institutional rupture that helped
  precipitate the Nov 2020 Tigray war.

  '

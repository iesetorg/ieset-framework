title: Netherlands Participatiewet activation reform
countries:
- NLD
timeframe:
  start: 2015
  end: 2022
  enacted_date: '2015-01-01'
description: 'Participatiewet (Participation Act) of 1 January 2015 merging three prior schemes — WSW (sheltered employment), Wajong (young disabled), and WWB (general social assistance) — into one municipally-administered
  activation framework. Wajong intake restricted to full 100%-disability cases; new Banenafspraak (Jobs Agreement) targeted 125,000 additional jobs for people with disabilities by 2026 in private and public
  sectors. Part of the Rutte II ''participation society'' bargain with the PvdA.

  '

description: 'Decree-based pardons (indultos) issued by President Menem in two waves: October 1989 (pardons 1002-1005/89, ~277 military and guerrilla officers facing lesser charges) and 29 December 1990
  (pardons 2741-2746/90, including convicted junta leaders Videla, Viola, Massera, Lambruschini, Agosti, Camps and Montoneros leader Mario Firmenich). Nullified remaining prosecutions from Alfonsín''s Trial
  of the Juntas. Reversed in part by 2003 Ley 25.779 and 2005 Supreme Court Simón ruling restoring prosecutions.

  '

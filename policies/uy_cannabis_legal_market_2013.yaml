policy_id: uy_cannabis_legal_market_2013
status: candidate
title: Uruguay cannabis legal market — Ley 19.172
countries:
- URY
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2013-12-20'
description: 'Ley 19.172 (20 Dec 2013) legalised recreational cannabis with state- regulated supply — first country globally. Three access channels: pharmacy sale (operational Jul 2017), self-cultivation
  (up to 6 plants), cannabis clubs (15-45 members). Instituto de Regulación y Control del Cannabis (IRCCA) as regulator. US banking-sanctions complications delayed pharmacy rollout; by 2020 ~50,000 registered
  users. Market remained smaller than black-market + grey-market demand estimates.

  '

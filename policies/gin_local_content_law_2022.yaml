policy_id: gin_local_content_law_2022
status: candidate
title: Guinea local-content law 2022
countries:
- GIN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-09-23'
description: 'Guinea adopted a local-content law during the CNRD transition to increase Guinean participation in mining and other strategic supply chains. The law created obligations around local employment,
  procurement, subcontracting, skills transfer, and domestic enterprise participation, using state rules to reserve more value from resource projects for Guinean firms and workers.

  '
enacted_by:
- guinea_cnrd_transition_resource_state_2021_present
scope: national
coalition_label_at_enactment: National Committee of Reconciliation and Development
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Local-content compliance conditions add state-gated requirements to operators and contractors in strategic sectors.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Procurement and employment reservations reduce fully open cross-border sourcing in covered supply chains.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Preference rules can narrow competition where domestic-participation thresholds bind procurement choices.
references:
- Conseil National de la Transition de Guinee, adopted-law list including Loi L/2022/017/CNT portant contenu local.
- IMF, Guinea 2024 Article IV Consultation, discussion of mining-sector governance and domestic revenue mobilisation.
notes: 'Public access to the full official gazette text is uneven; coding relies on the CNT adopted-law record and IMF resource-sector context.

  '

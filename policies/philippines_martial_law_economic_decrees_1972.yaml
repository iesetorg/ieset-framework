title: Philippines Martial Law Economic Decrees 1972
countries:
- PHL
timeframe:
  start: 1965
  end: 1986
description: 'Body of presidential decrees issued under Proclamation 1081 declaring martial law in September 1972, which restructured Philippine economic governance through executive fiat. Key measures
  created state-managed monopolies in sugar and coconut, expanded crony banking, suspended labour rights and collective-bargaining protections, and established the institutional template for crony capitalism
  that defined the late Marcos period through 1986.

  '

policy_id: chile_afp_1981
status: candidate
title: Chile Afp 1981
countries:
- CHL
timeframe:
  start: 1981
  end: ongoing
description: 'Chile''s AFP system, established by Decreto Ley 3500 of November 1980 and effective from May 1981 under the Pinochet government, replaced the pay-as-you-go pension regime with mandatory individual
  capitalisation accounts managed by competing private fund administrators (AFPs). Workers contribute 10% of wages, with optional voluntary saving; the state guaranteed minimum pensions and bridged transition
  costs through Bonos de Reconocimiento. The intended effect was to deepen capital markets, individualise old-age saving, and reduce contingent fiscal liabilities.

  '

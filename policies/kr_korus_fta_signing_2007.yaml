title: KORUS Free Trade Agreement signing (2007)
countries:
- KOR
timeframe:
  start: 2007
  end: 2007
  enacted_date: '2007-06-30'
description: 'Korea-US Free Trade Agreement negotiations launched February 2006 by Roh administration, concluded 2 April 2007, signed 30 June 2007 by both governments. Largest FTA by trade volume for both
  parties at signing. Scope: elimination of >90% of tariff lines on industrial goods within three years; agricultural phase-ins to 15-20 years for sensitive products (rice excluded); services chapter with
  negative-list approach; investor-state dispute mechanism; automotive and beef-import provisions highly contested domestically. Renegotiated under Obama-Lee 2010; ratified by ROK National Assembly November
  2011 (Grand National Party) and US Congress October 2011; in effect 15 March 2012.

  '

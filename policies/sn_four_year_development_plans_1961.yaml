# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: sn_four_year_development_plans_1961
status: candidate
title: "Four-year development planning"
countries: [SEN]
timeframe: {start: 1961, end: 1980}
description: >
  Senghor-era Senegal used successive four-year development plans to coordinate
  public investment, rural development, infrastructure, education, and
  industrial priorities. The plans reflected moderate African socialism: a
  state-led developmental framework that still worked through aid, private
  firms, and franc-zone commercial ties rather than full command planning.
enacted_by:
  - senegal_senghor_socialist_democracy_1960_1980
coalition_label_at_enactment: "UPS / Socialist Party"
axes_moved:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Development plans expanded public investment and administrative coordination.", intended: true}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Planning steered support to priority rural, infrastructure, and industrial sectors.", intended: true}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: weak, rationale: "Planning and parastatal coordination reduced purely market-led allocation in selected sectors.", intended: true}
references:
  - "Sheldon Gellar, Senegal: An African Nation Between Islam and the West"
  - "World Bank, Senegal country economic memoranda"

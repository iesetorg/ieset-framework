policy_id: cn_four_trillion_stimulus_2008
status: candidate
title: Four-Trillion-Yuan Stimulus (四万亿) 2008-2010
countries:
- CHN
timeframe:
  start: 2008
  end: 2010
  enacted_date: '2008-11-09'
description: 'RMB 4 trillion (~USD 586bn, ~12.5% of 2008 GDP) two-year counter- cyclical fiscal package announced by the State Council on 9 November 2008 in response to the global financial crisis. Core
  channels: railway / highway / airport infrastructure (~37%), post-earthquake reconstruction (~25%), affordable housing, rural infrastructure, environment, and technology upgrading. Funded via a combination
  of central-government bonds, SOE investment, and — critically — local-government-financing-vehicle (LGFV) debt raised from state banks against land-use collateral. Drove credit-to-GDP from ~120% (2008)
  to ~170% (2012). Most commonly-cited textbook case of large-scale state-bank-mediated counter-cyclical response; also the structural origin of the local-government-debt overhang that constrains Xi-era
  policy space.

  '

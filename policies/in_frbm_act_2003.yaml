title: India Fiscal Responsibility and Budget Management Act 2003
countries:
- IND
timeframe:
  start: 2003
  end: 2003
  enacted_date: '2003-08-26'
description: 'Fiscal Responsibility and Budget Management Act enacted 26 August 2003, effective July 2004. Set binding deficit-reduction path: fiscal deficit to 3% of GDP by March 2008, revenue deficit
  to zero by March 2009. Prohibited government borrowing from RBI (ending ways-and-means-advances monetisation) except in short-term exceptional circumstances. Required quarterly Medium-term Fiscal Policy
  Statement and mid-year review. Amended 2012 (UPA-II) to relax targets and 2018 to add debt-to-GDP anchor. First modern rules-based fiscal-framework legislation for India.

  '

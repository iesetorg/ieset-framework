policy_id: italy_flat_tax_forfettario_extension_2023
status: candidate
title: Italy flat-tax regime forfettario threshold extension 2023
countries:
- ITA
timeframe:
  start: 2023
  enacted_date: '2022-12-29'
description: '2023 Budget Law (Law 197/2022) raised the revenue threshold for the regime forfettario — a flat 15% substitute tax on self-employed revenue net of a sector-specific coefficient — from €65,000
  to €85,000 effective 1 January 2023, with a cliff provision voiding the regime mid-year if €100,000 is crossed. First-year reduced-rate (5% for 5 years for new self-employed activities) preserved. The
  regime''s elective alternative to ordinary IRPEF progressive scheduling (23-43% brackets plus regional/municipal surcharges) becomes structurally more attractive across a wider self-employed earnings
  band, expanding the horizontal-equity gap between employees (taxed on progressive IRPEF) and self-employed within the threshold. Complementary measures: ''flat tax incrementale'' for 2023 — 15% substitute
  tax on increment of declared revenue above best of last three years (capped at €40k incremental base) for non-forfettario self-employed.

  '
enacted_by:
- italy_meloni_rightwing_coalition_2022_present
coalition_label_at_enactment: FdI–Lega–FI (Meloni)

description: 'Superannuation Guarantee (Administration) Act 1992, effective 1 July 1992, required employers to contribute a minimum percentage of employees'' wages to a superannuation fund (starting 3%,
  phased to 9% by 2002 and later 12%). Converted 1986-established award-super into a universal employer-mandated retirement-savings system. Combined with means-tested Age Pension produced Australia''s three-pillar
  retirement-income architecture.

  '

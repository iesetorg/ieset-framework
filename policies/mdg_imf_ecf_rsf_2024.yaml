description: 'Madagascar entered IMF-supported Extended Credit Facility and Resilience and Sustainability Facility arrangements in 2024. The programme linked concessional financing to revenue mobilisation,
  better budget execution, lower fiscal risks from energy subsidies and state-owned enterprises, public-financial-management reforms, and climate-resilience investment under the RSF window.

  '

policy_id: colombia_pension_reform_law_797_2003
status: candidate
title: Colombia Pension Reform Law 797 2003
countries:
- COL
timeframe:
  start: 2002
  end: 2010
description: 'Ley 797 of 2003 enacted by the Uribe government, the first major pension-system parametric reform after the 1993 dual-system introduction. Increased contribution rates, raised retirement-age
  eligibility points (semanas cotizadas), tightened rules to discourage strategic switching between pay-as-you-go and individual-account pillars, and created a solidarity-fund contribution by higher earners
  to finance poverty-targeted pensions.

  '

policy_id: spain_windfall_taxes_banks_energy_2022_2023
status: candidate
title: Spain Windfall Taxes Banks Energy 2022 2023
countries:
- ESP
timeframe:
  start: 2018
  end: ongoing
description: 'Spain''s temporary windfall taxes on banks and energy companies, enacted by Law 38/2022 of the Sanchez PSOE-Sumar government for tax years 2022-2023, levied a 4.8% surcharge on banks'' net
  interest and fee income (above EUR 800 million annual income) and a 1.2% levy on energy companies'' Spain-source net turnover (above EUR 1 billion). The intended effect was to capture extraordinary profits
  earned during the 2022 inflation and rate-rise shock, fund the cost-of-living anti-crisis package, and signal progressive distribution of the inflation tax burden in line with EU-wide windfall-tax policy.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mmr_state_trade_monopoly_1964
status: candidate
title: State Foreign Trade Monopoly and Autarkic Controls
countries:
- MMR
timeframe:
  start: 1964
  end: 1988
description: The BSPP state consolidated control over foreign trade through public trading corporations, import licensing, exchange controls, and restrictions on private commercial intermediaries. These measures supported import-substitution and self-sufficiency goals by limiting private import activity, rationing foreign exchange, and placing exports and essential imports under state direction.
enacted_by:
- mmr_burmese_way_to_socialism_1962
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Import licensing, state trading agencies, and foreign-exchange rationing reduced trade openness.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: State trading bodies displaced private importers and exporters in key markets.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Access to tradable goods and foreign exchange depended on administrative approval.
references:
- "David I. Steinberg (2001), Burma: The State of Myanmar"
- Robert H. Taylor (2009), The State in Myanmar

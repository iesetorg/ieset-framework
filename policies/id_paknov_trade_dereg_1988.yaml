description: 'Paket November (Paknov) 1988 trade-deregulation package 21 Nov 1988 converting non-tariff barriers on ~350 product categories into tariffs (partial TRQ elimination), simplifying customs procedures
  and cutting effective protection rates. One of a sequence of paket rounds (Pakjun 1984, Pakmei 1986, Pakto 1988, Paknov 1988, Pakmei 1990) that progressively dismantled Indonesian import-substitution
  barriers.


description: 'Law of the People''s Republic of China on the People''s Bank of China, promulgated March 1995 by the NPC Standing Committee. Established the PBOC as the central bank with statutory authority
  over monetary policy under State Council leadership, separated commercial banking functions, prohibited direct PBOC financing of fiscal deficits, and created the legal foundation for the modern Chinese
  banking system.

  '

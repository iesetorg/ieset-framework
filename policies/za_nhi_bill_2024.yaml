policy_id: za_nhi_bill_2024
status: candidate
title: National Health Insurance Act (South Africa, 2024)
countries:
- ZAF
timeframe:
  start: 2024
  enacted_date: '2024-05-15'
description: 'President Ramaphosa signed the National Health Insurance Act on 15 May 2024, establishing a single-payer NHI Fund intended to purchase health services for all residents and progressively restrict
  the role of private medical schemes to complementary cover. Phased implementation is contingent on enabling regulations and fiscal capacity; multiple constitutional challenges were filed in 2024-2025.
  The Act creates central procurement, accreditation and price-setting functions.

  '

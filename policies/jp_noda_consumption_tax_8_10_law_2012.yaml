description: 'Act on Partial Revision of the Consumption Tax Law etc. (Law No. 68 of 2012), passed 10 August 2012 under the Noda cabinet via three-party agreement with LDP and Komeito (15 June 2012), raising
  the consumption-tax rate from 5% to 8% effective 1 April 2014 and from 8% to 10% effective (after two delays under successor Abe) 1 October 2019. Revenue earmarked for social-security financing (pensions,
  healthcare, long-term care, child care) in the parallel Social Security Comprehensive Reform Act. Most significant Japanese tax-policy change of the 2010s; provided the fiscal anchor for Abenomics macro
  policy and for the social-security framework.

  '

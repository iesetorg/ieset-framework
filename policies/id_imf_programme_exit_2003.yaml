policy_id: id_imf_programme_exit_2003
status: candidate
title: Indonesia IMF programme exit (2003)
countries:
- IDN
timeframe:
  start: 2003
  end: 2003
  enacted_date: '2003-12-31'
description: 'Extended Fund Facility programme with IMF (approved February 2000) concluded 31 December 2003 under Megawati administration. Total drawings ~$9bn. Post-programme monitoring framework (White
  Paper) continued IMF technical-assistance engagement without conditionality. Exit coincided with macro stabilisation: inflation 6.8% (2003) down from 12.5% (2001), rupiah stabilised Rp 8,500/USD, reserves
  $36bn. Domestic political signal — Indonesian government no longer operating under LoI conditionality. Separate decision 2006 to prepay $7.8bn remaining IMF debt under SBY.

  '

policy_id: pk_fbr_track_and_trace_2020
status: candidate
title: FBR Track-and-Trace and POS integration (2020)
countries:
- PAK
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-07-01'
description: 'Federal Board of Revenue enforcement programmes including the Track-and-Trace System (stamping and real-time monitoring of tobacco, cement, sugar, fertiliser, and beverages production), Point-of-Sale
  Integration for tier-1 retailers (mandatory real- time sales reporting), CNIC-on-invoice requirement, and differential withholding-tax rates for non-filers. Aimed at widening the direct-tax base — historically
  ~1% of Pakistan''s population files income-tax returns — toward IMF-programme revenue-mobilisation benchmarks. Rollout partial; political pushback from retailer associations; base broadening observable
  but incremental.

  '

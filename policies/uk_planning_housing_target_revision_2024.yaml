- GBR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-12'
description: 'Revised National Planning Policy Framework published 12 December 2024. Restored mandatory housing targets for local authorities (reversed Sunak government''s December 2023 advisory-only shift);
  replaced the urban-centric Standard Method with a stock-based formula raising national target to ~370,000 homes/year. Introduced ''grey belt'' definition releasing lower-quality Green Belt land; mandatory
  affordable-housing contributions on released grey-belt sites (''golden rules''). Onshore wind consenting restored to routine planning regime (September 2024). Paired with commitments to Planning and Infrastructure
  Bill 2025 accelerating nationally significant infrastructure projects consenting.

  '

policy_id: brazil_telecom_reform_1995_1998
status: candidate
title: Brazil Telecom Reform 1995 1998
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'EC 8/1995 ended the constitutional state monopoly on telecommunications, the General Telecommunications Law (Lei 9472/1997) created the regulator Anatel and rules for licensed private operators,
  and in July 1998 Telebras was broken up and auctioned in 12 holdings for approximately R$22 billion. The reform was a flagship Cardoso-era privatisation that ended the federal telecom monopoly and laid
  the institutional foundations for sector competition under Anatel.

  '
enacted_by:
- brazil_real_plan_1994
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Telebras sale receipts retired federal debt, easing pressure to monetise via Banco Central.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removed loss-making Telebras subsidiaries from federal subsidy stream after divestiture.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Anatel-administered licensing opened fixed-line, mobile, and long-distance to private competition.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Allowed foreign telecom operators (Telefonica, Portugal Telecom) into the Brazilian market.

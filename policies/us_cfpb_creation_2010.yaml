title: Cfpb Creation 2010
countries:
- USA
timeframe:
  start: 2009
  end: 2012
description: 'Title X of the Dodd-Frank Wall Street Reform and Consumer Protection Act (Pub. L. 111-203) created the Consumer Financial Protection Bureau, an independent regulator housed within the Federal
  Reserve System with rule-making, supervisory, and enforcement authority over consumer financial products including mortgages, credit cards, payday lending, and student loans. Funded directly from Fed
  earnings rather than congressional appropriations, the CFPB consolidated consumer-protection powers previously dispersed across seven federal agencies.

  '

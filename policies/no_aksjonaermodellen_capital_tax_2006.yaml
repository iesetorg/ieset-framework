# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: no_aksjonaermodellen_capital_tax_2006
status: candidate
title: Aksjonærmodellen — integrated capital income tax reform
countries:
- NOR
timeframe:
  start: 2006
  end: ongoing
  enacted_date: '2006-01-01'
description: 'Reform of personal taxation of dividend and capital-gains income introducing the shareholder model (aksjonærmodellen) with a risk-free-return allowance (skjermingsfradrag) above which distributed
  returns are taxed at the personal marginal rate, integrated with the flat 28% corporate rate. Replaces the prior RISK / split-model regime. Parallel tightening of the active- owner (foretaksmodellen)
  rule. Framework explicitly designed by the 2003 Skauge committee to equalise effective taxation of labour and capital income above a normal-return threshold.

  '
enacted_by:
- norway_stoltenberg_ii_redgreen_2005_2013
coalition_label_at_enactment: AP–SV–Sp red-green majority (continuing Bondevik II preparation)
axes_moved:
- axis: fiscal.tax_capital
  direction: +
  magnitude: moderate
  intended: true
  rationale: Distributed returns above risk-free allowance taxed at personal marginal rate; integrated with corporate tax lifts combined effective rate on distributed profits.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Capital/labour integration removes a prior regressive kink where high-income entrepreneurs could shift from salary to dividend.
references:
- 'NOU 2003: 9 Skatteutvalget (Skauge-utvalget)'
- Ot.prp. nr. 1 (2004–2005) skatte- og avgiftsopplegget
- Skatteloven §10-10 flg. aksjonærmodellen

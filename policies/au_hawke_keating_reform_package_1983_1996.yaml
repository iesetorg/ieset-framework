description: 'Bob Hawke and Paul Keating''s ALP governments running a thirteen-year structural-reform programme: floating the Australian dollar (December 1983), removing capital controls and admitting foreign
  banks (1984-85), staged tariff phase-down, financial deregulation, the Prices and Incomes Accord with the ACTU coordinating wages and social wage in lieu of industrial action, corporatisation and partial
  privatisation of Commonwealth Bank, Qantas and Telstra, National Competition Policy reforms beginning with the 1993 Hilmer Review, introduction of dividend imputation, and the Superannuation Guarantee
  Act 1992 mandating employer contributions to individual accounts (initially 3%, scheduled to phase up). Stated case: pivot the Australian economy from protected, centralised wage-fixing toward open-economy
  competitiveness, fund retirement through forced individual saving rather than universal pay-as-you-go, and embed central-bank operational autonomy as a credibility anchor.'

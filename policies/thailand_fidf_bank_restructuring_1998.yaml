policy_id: thailand_fidf_bank_restructuring_1998
status: candidate
title: Thailand Fidf Bank Restructuring 1998
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'Through 1997-98 the Bank of Thailand''s Financial Institutions Development Fund (FIDF) provided emergency liquidity to ailing finance companies and banks; in 1998 the August Package framework
  closed 56 finance companies, intervened in eight commercial banks, recapitalised systemically important institutions, and established Thailand Asset Management Corporation to absorb non-performing loans.
  FIDF losses of roughly 1.4 trillion baht were ultimately fiscalised.

  '
enacted_by:
- thailand_asian_crisis_and_recovery_1997_2001
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Restructuring opened domestic banks to foreign equity and modernised supervision.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Separated FIDF rescue obligations from BOT core balance sheet over time.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: FIDF losses fiscalised into public debt represented a major spending commitment.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Depositor protection and recapitalisations transferred resources to bank stakeholders.

policy_id: et_adli_doctrine_consolidation_2005
status: candidate
title: ADLI doctrine consolidation (agriculture-first developmental state)
countries:
- ETH
timeframe:
  start: 2005
  end: 2010
description: 'Post-2005 the EPRDF re-centred its development doctrine around Agricultural Development-Led Industrialisation (ADLI), originally articulated in the 1993 Transitional Period economic policy
  and restated by Meles''s 2006 essay as the "democratic developmental state". Instruments: fertiliser distribution via parastatals (AISE), extension services scaled to ~60,000 development agents, cooperative
  promotion, and surplus extraction via the Ethiopian Grain Trade Enterprise and Ethiopian Commodity Exchange (2008). Land retained in state ownership with use-rights only.

  '
enacted_by:
- ethiopia_meles_late_era_2005_2012
- ethiopia_eprdf_developmental_state_1991_2018
coalition_label_at_enactment: EPRDF
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Fertiliser, extension, and cooperative subsidies.
  intended: true
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  rationale: State land ownership with use-rights preserved; no freehold.
  intended: true
references:
- 'Meles Zenawi (2006), ''African Development: Dead Ends and New Beginnings'''
- Dercon and Gollin (2014), 'Agriculture in African Development'

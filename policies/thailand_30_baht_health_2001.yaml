policy_id: thailand_30_baht_health_2001
status: candidate
title: Thailand 30 Baht Health 2001
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'Launched by the Thaksin Thai Rak Thai government in April 2001 and codified in the National Health Security Act 2002, the 30-baht universal coverage scheme established a single-payer public
  health insurance system charging a flat 30 baht co-pay per outpatient visit (later abolished). Administered by the National Health Security Office, it consolidated previously fragmented schemes and extended
  coverage to roughly 47 million Thais previously uninsured.

  '

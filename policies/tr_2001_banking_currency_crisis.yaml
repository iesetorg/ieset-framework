description: 'November 2000 liquidity crisis (Demirbank collapsed 6 December 2000 into Savings Deposit Insurance Fund SDIF) and 19-22 February 2001 currency attack following public clash between PM Ecevit
  and President Sezer. Lira crawling-peg abandoned 22 February, devalued 40% to TRL 1,300,000/USD. 19 banks taken over by SDIF between 1997 and 2003. Ecevit appointed former World Bank VP Kemal Derviş as
  Economy Minister 2 March 2001.

  '

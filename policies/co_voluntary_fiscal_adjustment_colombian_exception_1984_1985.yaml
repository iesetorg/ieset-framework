title: Voluntary fiscal adjustment — 'Colombian Exception' (1984-1985)
countries:
- COL
timeframe:
  start: 1984
  end: 1986
  enacted_date: '1984-06-28'
description: 'Betancur''s Junguito-led 1984-85 adjustment cut public-sector deficit from 7.5% to 2.5% of GDP via selective tax increases, spending restraint, and maxi-devaluation, without an IMF stand-by
  programme. Instead a bilateral "enhanced surveillance" framework with IMF accepted annual monitoring short of formal LoI. Preserved Colombian access to voluntary commercial lending when Brazil, Mexico,
  and Argentina were in debt restructuring. Basis of the "Colombian Exception" literature.

  '

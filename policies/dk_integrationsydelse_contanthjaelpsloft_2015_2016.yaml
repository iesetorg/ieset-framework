policy_id: dk_integrationsydelse_contanthjaelpsloft_2015_2016
status: candidate
title: Integrationsydelse + contanthjælpsloft — Danish cash-benefit tightening 2015-2016
countries:
- DNK
timeframe:
  start: 2015
  end: ongoing
  enacted_date: '2015-09-01'
description: 'Two linked cash-benefit reforms under the Løkke Rasmussen II government: (i) the September 2015 integrationsydelse, a reduced cash benefit (roughly 45-50% of standard kontanthjælp levels)
  for adults who had not lived legally in Denmark for 7 of the preceding 8 years — targeting recent arrivals; and (ii) the April 2016 contanthjælpsloft (kontanthjælp ceiling, L 113), capping total household
  cash-transfer receipt (cash benefit, housing benefit, special support) to create marginal labour- supply incentive, alongside the 225-hour employment rule requiring documented work to maintain full benefit.
  Stated objective: raise labour-force participation and reduce the ''pull'' of the Danish welfare system on recent migrants.

  '
enacted_by:
- denmark_lokke_rasmussen_venstre_2015_2019
coalition_label_at_enactment: Venstre single-party minority with DF, LA, KF support

  enacted_date: '2024-07-29'
description: 'IMF Executive Board approved a four-year Extended Fund Facility totalling SDR 2.556bn (about $3.4bn) on Jul 29 2024, with immediate disbursement of ~$1bn. Programme anchors: market-based FX
  (Directive FXD/01/2024), monetary-policy modernisation and shift to an interest-rate-based framework, phased energy-subsidy reform, domestic-debt rebalancing, revenue mobilisation (targeting a 4 percentage-point
  tax/GDP rise), banking-sector opening, and external debt restructuring under the G20 Common Framework.

  '

timeframe:
  start: 1990
  enacted_date: '1990-03-11'
description: 'Student-led movement Todavía Podemos Salvar a Colombia called for an unauthorised seventh ballot (the "séptima papeleta") at the March 1990 elections asking voters whether a National Constituent
  Assembly should be convened. Estimated 2 million ballots cast. Though informally counted, movement built political pressure leading to Barco''s Decreto 927 May 1990 authorising formal consulta 27 May
  1990 (86.6% Yes) and Gaviria''s Decreto 1926 August 1990 convening the December 1990 Constituent Assembly that drafted the 1991 Constitution.

  '

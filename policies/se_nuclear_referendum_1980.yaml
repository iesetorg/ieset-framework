title: Swedish nuclear power advisory referendum 1980
countries:
- SWE
timeframe:
  start: 1980
  enacted_date: '1980-03-23'
description: 'Advisory referendum 23 March 1980 on Sweden''s nuclear-power future. Three lines: Line 1 (Moderate) 18.9% for continued expansion; Line 2 (SAP+Liberal) 39.1% for 12-reactor completion then
  phase-out; Line 3 (Centre+Communist) 38.7% for immediate phase- out. Parliament interpreted the Line 2 victory as mandate to run the 12 reactors for ~25 years then close — a commitment Sweden later partly
  reversed.

  '

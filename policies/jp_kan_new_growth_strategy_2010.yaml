description: 'The Kan cabinet''s New Growth Strategy, approved by the Cabinet in June 2010, identified seven strategic fields including environment/energy, healthcare, tourism and Asian-economy linkages,
  with 21 priority projects and indicative 2020 targets. Coordinated through the National Strategy Office and METI, it pivoted DPJ economic policy from pure household-transfer focus toward a supply-side
  growth agenda combining green industrial policy, services liberalisation and FTA expansion.

  '

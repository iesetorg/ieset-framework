description: 'IMF Executive Board on 28 April 2020 approved $3.4 billion under the Rapid Financing Instrument for Nigeria — at that time the single largest RFI disbursement globally — to address the twin
  COVID-19 health shock and oil-price collapse. Accompanied by an Economic Sustainability Plan under VP Osinbajo, partial temporary PMS subsidy removal (reversed within weeks as oil prices recovered), electricity
  tariff adjustments under the Service-Based Tariff (SBT) order, and a CBN N1 trillion stimulus credit facility to manufacturing and health.

  '

policy_id: us_ftc_noncompete_ban_2024
status: candidate
title: FTC non-compete ban rule 2024
countries:
- USA
timeframe:
  start: 2024
  enacted_date: '2024-04-23'
description: 'Federal Trade Commission final rule under Section 5 of the FTC Act declaring nearly all post-employment non-compete clauses an unfair method of competition and banning new non-competes while
  voiding most existing ones (narrow senior-executive carve-out). Approved 3-2 along party lines under Chair Lina Khan. FTC projected ~$400-500bn in wage gains and ~8,500 additional new businesses per year.
  Enjoined nationwide by the US District Court for the Northern District of Texas in Ryan LLC v. FTC (August 2024) on grounds that Section 5 does not confer substantive competition-rulemaking authority
  and that the rule is arbitrary and capricious; appeal pending at Fifth Circuit. Signals peak labour-empowering + antitrust-activist posture of the Biden administration.

  '
enacted_by:
- us_biden_administration_broad_2021_2025
coalition_label_at_enactment: Democratic FTC majority under Biden
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Removes employer-side contractual restraint on labour mobility — labour-empowering direction under ieset semantics.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Intent is pro-entry; empirical effect contested given judicial enjoinment.

scope: supranational
description: 'Regulation (EU) 2024/1747 and the companion Directive (EU) 2024/1711 amended the EU electricity-market framework after the 2021-2022 energy-price shock. The reform promotes longer-term contracts
  such as power purchase agreements, requires two-way contracts for difference or equivalent instruments for many new direct price-support schemes, strengthens consumer protection and crisis tools, and
  links market design to grid, flexibility, and renewable-integration objectives.

  '

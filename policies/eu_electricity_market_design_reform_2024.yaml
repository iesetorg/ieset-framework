  direction: +
  magnitude: moderate
  intended: true
  rationale: The reform strengthens hedging, crisis tools, consumer protections, and cross-border grid integration after the gas-price shock.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: New direct price-support schemes for many low-carbon generation investments must use two-way CfDs or equivalent public support structures.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: The design is tied to renewable integration, electrification, and low-carbon investment incentives.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: The reform preserves internal-market trading while expanding state-shaped long-term contracting and crisis intervention channels.

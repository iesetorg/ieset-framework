  rationale: Removal of import licences and tariff simplification directly raised measurable trade openness.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Imports disciplined formerly protected domestic producers in manufacturing and consumer goods.
- axis: fiscal.spending_level
  direction: '-'

policy_id: ghana_trade_liberalisation_1986_1991
status: candidate
title: Ghana Trade Liberalisation 1986 1991
countries:
- GHA
timeframe:
  start: 1983
  end: 1991
description: 'Phase II of the ERP dismantled Ghana''s import-licensing regime, replacing it with FX auction-allocated imports, eliminated most non-tariff barriers, and consolidated tariff schedules into
  a four-band structure. Combined with the unified market exchange rate and amended Customs Excise and Preventive Service procedures, the reforms re-engaged Ghana with World Bank and IMF trade conditionality
  and integrated the country into ECOWAS trade norms.

  '
enacted_by:
- ghana_erp_stabilisation_1983_1991

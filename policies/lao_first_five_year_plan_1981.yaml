# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: lao_first_five_year_plan_1981
status: candidate
title: First Five-Year Plan and Socialist State Investment
countries:
- LAO
timeframe:
  start: 1981
  end: 1985
description: Laos's First Five-Year Plan organised investment, production priorities, and public administration around socialist planning, with heavy reliance on state enterprises, public works, and assistance from Vietnam and the Soviet bloc. The plan aimed to build basic infrastructure and state capacity while keeping allocation under party-state direction.
enacted_by:
- lao_lao_pdr_socialist_planning_1975
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Public investment and aid-financed state projects were the plan's main development instrument.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Plan targets and state enterprises organised production priorities outside competitive markets.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Credit and financial administration were subordinated to plan implementation.
references:
- "World Bank (1995), Lao PDR: Country Economic Memorandum"
- Martin Stuart-Fox (1997), A History of Laos

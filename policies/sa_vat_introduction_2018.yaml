status: candidate
title: VAT introduction and 2020 tripling
countries:
- SAU
timeframe:
  start: 2018
  end: ongoing
  enacted_date: '2018-01-01'
description: '5% Value-Added Tax introduced January 2018 under the GCC VAT framework — Saudi Arabia''s first broad-based consumption tax. Tripled to 15% in July 2020 as part of post-COVID fiscal consolidation
  alongside suspension of the cost-of-living allowance for public-sector workers. Added ~5% of GDP in non-oil revenue capacity; part of the structural diversification away from oil receipts under Vision
  2030.

  '

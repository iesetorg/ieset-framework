policy_id: my_emergency_proclamation_2021
status: candidate
title: Emergency Proclamation 2021
countries:
- MYS
timeframe:
  start: 2020
  end: 2021
description: 'On 12 January 2021, the Yang di-Pertuan Agong proclaimed a nationwide state of emergency under Article 150 of the Federal Constitution at the request of the Muhyiddin Perikatan Nasional government,
  suspending Parliament until 1 August 2021. The proclamation was framed as a public-health response to a pandemic surge but also extended executive ordinance-making power, allowing fiscal-stimulus and
  movement-control ordinances to bypass parliamentary scrutiny during the crisis.

  '
enacted_by:
- malaysia_muhyiddin_pn_2020_2021
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Emergency ordinances enabled cash-transfer programmes (Bantuan Prihatin Rakyat) without parliamentary appropriations cycles.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Ordinance powers permitted PEMERKASA and PEMULIH spending packages outside ordinary budget process.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Coordinated with Bank Negara accommodation including OPR cuts and liquidity facilities under emergency conditions.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Movement-control ordinances under the emergency suppressed market activity and entrenched incumbents in restricted sectors.

policy_id: my_mysejahtera_2020
status: candidate
title: MySejahtera digital contact-tracing + vaccination ID (Malaysia, 2020)
countries:
- MYS
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-04-16'
description: 'Government-mandated mobile application launched 16 April 2020 under the Muhyiddin PN government, jointly developed by the Ministry of Health, National Security Council, MAMPU, and (controversially)
  private vendor Entomo Malaysia. Functions: COVID-19 self-assessment, QR-code location check-in (mandatory for premises access during MCO and PPN phases), close-contact tracing, vaccination certificate
  (post Dec 2020), and digital vaccination passport for reopened interstate and international travel. Peak ~38m registrations (exceeding total population due to multiple accounts). Later controversy 2022
  over proposed transfer of app ownership to a private entity — ultimately retained in government hands. Core surviving digital-ID infrastructure with downstream uses.

  '
enacted_by:
- malaysia_muhyiddin_pn_2020_2021
coalition_label_at_enactment: Perikatan Nasional (Muhyiddin)
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Premises-access and travel conditional on app-held status — state-gated participation in ordinary economic activity during pandemic.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Legal basis for compulsory app use contested; data-governance concerns over ownership transfer proposal flagged by Auditor-General.
references:
- Ministry of Health Malaysia MySejahtera announcement 16 Apr 2020
- Public Accounts Committee / Auditor-General reports on MySejahtera 2022

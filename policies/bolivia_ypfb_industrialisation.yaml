policy_id: bolivia_ypfb_industrialisation
status: candidate
title: Bolivia Ypfb Industrialisation
countries:
- BOL
timeframe:
  start: 2006
  end: 2019
description: 'Bolivia''s YPFB industrialisation policy, launched after the 2006 nationalisation Supreme Decree 28701, refounded Yacimientos Petrolíferos Fiscales Bolivianos as the lead operator across the
  gas value chain and pursued downstream investments (urea-ammonia complex at Bulo Bulo, LNG and separation plants, lithium pilots through YLB) financed by IDH revenue and Treasury transfers. The intended
  effect was to capture more rents inside Bolivia, build domestic industrial capacity, and reduce reliance on foreign operators within the MAS extractivist model.

  '
enacted_by:
- bolivia_mas_extractivist_2006_2019
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Re-monopolisation of upstream and midstream contracts under YPFB tightened sectoral licensing and operator entry.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Treasury and IDH transfers were used to capitalise YPFB's downstream and lithium investment programme.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Hydrocarbon rents captured by YPFB underwrote the broader transfer expansion (Renta Dignidad, Bono Juancito Pinto).
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: State investment in petrochemicals, gas infrastructure and lithium raised primary public spending and SOE balance-sheet exposure.

policy_id: italy_banking_law_1936
status: candidate
title: Italy banking law 1936
countries: [ITA]
timeframe:
  start: 1936
  end: 1936
  enacted_date: "1936-03-12"
description: >
  Royal Decree-Law no. 375 of 12 March 1936 treated the collection of
  savings and the exercise of credit as functions of public interest and
  erected the core architecture of modern Italian banking supervision.
  After the banking collapses of the early 1930s, it tightened public
  authorisation, created stronger supervisory machinery, formalised the
  special status of major public-law credit institutions, and helped lock
  in a segmented, state-directed credit system. The law long outlived the
  fascist regime and became one of the most consequential institutional
  legacies of interwar Italy.
enacted_by:
  - italy_fascist_corporatist_state_1922_1943
axes_moved:
  - axis: regulatory.financial_deregulation
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The law sharply tightened entry, supervision, and public authority over banking and credit intermediation."
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Credit activity was reserved to authorised institutions within a more hierarchical licensing regime."
references:
  - "Regio decreto-legge 12 marzo 1936, n. 375"
  - "Treccani, Impresa bancaria"

policy_id: pl_13th_14th_pension_2019_2022
status: candidate
title: 13Th 14Th Pension 2019 2022
countries:
- POL
timeframe:
  start: 2017
  end: 2023
description: 'Annual supplementary pension payments introduced under PiS-led governments in Poland: the "thirteenth pension" enacted in 2019 (statutorily codified in 2021) and the "fourteenth pension" introduced
  as a means-tested top-up from 2021 and made permanent in 2023. Together the measures raised retiree disposable income, were politically salient ahead of multiple election cycles, and added structurally
  to pension-system outlays financed from the state budget.

  '

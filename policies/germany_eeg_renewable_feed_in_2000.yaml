policy_id: germany_eeg_renewable_feed_in_2000
status: candidate
title: Germany Eeg Renewable Feed In 2000
countries:
- DEU
timeframe:
  start: 1998
  end: 2005
description: 'The Erneuerbare-Energien-Gesetz of April 2000, enacted under the Schröder red-green coalition, established technology-differentiated 20-year guaranteed feed-in tariffs for electricity from
  solar, wind, biomass, and small hydro, with priority grid access and pass-through of costs to retail consumers via an EEG-Umlage surcharge. The law replaced the 1991 Stromeinspeisungsgesetz and became
  the international template for renewable feed-in regimes.

  '

description: 'Bloodless military coup on 19 September 2006 while PM Thaksin was at UN General Assembly in New York. Council for Democratic Reform under Constitutional Monarchy (CDRM, later Council for National
  Security, CNS) led by Army Commander General Sonthi Boonyaratglin suspended 1997 Constitution, dissolved cabinet and Constitutional Court, suspended NCCC and Senate. Abrogated the 1997 People''s Constitution.
  Interim constitution promulgated 1 October 2006; Surayud Chulanont appointed interim PM. 2007 Constitution approved by referendum (57.8% yes) 19 August 2007. December 2007 election saw Thaksin-linked
  PPP win despite proscription of TRT. Proximate triggers: Shin Corp sale, PAD mobilisation, April 2006 annulled election crisis.

  '

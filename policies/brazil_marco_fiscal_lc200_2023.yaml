policy_id: brazil_marco_fiscal_lc200_2023
status: candidate
title: Brazil Marco Fiscal Lc200 2023
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'Lei Complementar 200/2023 (the Novo Arcabouco Fiscal) replaced the 2016 spending cap (EC 95) with a flexible primary-balance rule under the Lula third term and finance minister Fernando Haddad.
  The framework caps real expenditure growth at 70% of revenue growth within a corridor of 0.6%-2.5% and ties exit from negative primary deficits to declining debt-to-GDP, retaining a fiscal anchor while
  freeing room for transfer expansion and re-industrialisation spending.

  '
enacted_by:
- brazil_lula_third_term_2023_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Replacing the EC95 cap freed envelope for Bolsa Familia top-up and minimum-wage real-gain rule.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Real-expenditure growth band of up to 2.5% loosened the prior frozen-cap rule under EC95.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Companion revenue measures shifted incidence onto offshore funds and exclusive funds for the wealthy.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Created room within the rule for Nova Industria PT-led industrial-policy and BNDES disbursements.

policy_id: nicaragua_banking_nationalisation_1979
status: candidate
title: Nicaragua Banking Nationalisation 1979
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'Decree-Law No. 25 of 26 July 1979, issued by the Junta of National Reconstruction within days of the Sandinista victory, nationalised the Nicaraguan banking system and consolidated commercial-bank
  assets and liabilities into the state-owned Sistema Financiero Nacional. The decree replaced the diversified Somoza-era private banking sector with a directed-credit regime channelling finance to agrarian
  reform beneficiaries, state enterprises, and Sandinista priority sectors.

  '
enacted_by:
- nicaragua_sandinista_1979_1990
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Confiscation without market-rate compensation eliminated private ownership claims over commercial-bank assets.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Consolidation under the Sistema Financiero Nacional ended competition among private banks.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Concessional and forgiven loans to cooperatives and state farms operated as quasi-fiscal transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: State-bank loan losses and recapitalisations were absorbed onto the public balance sheet.

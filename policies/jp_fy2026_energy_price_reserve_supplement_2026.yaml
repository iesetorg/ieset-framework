policy_id: jp_fy2026_energy_price_reserve_supplement_2026
status: candidate
title: Japan FY2026 first supplementary budget energy-price reserve
countries:
- JPN
timeframe:
  start: 2026
  end: 2026
  enacted_date: '2026-06-03'
description: 'Japan''s first FY2026 supplementary budget created a JPY3.1tn framework financed by special deficit-financing bonds. It included a JPY100bn priority support local allocation grant, restored
  general contingency reserves after electricity and natural-gas charge assistance, and set a JPY2.5tn reserve fund for responding to the Middle East situation and other international shocks. The MOF overview
  states that the reserve is for urgent expenses required to respond to energy-price effects on Japan''s economy and daily life, including support tailored to local circumstances such as extra-high voltage
  power users and LP gas.

  '

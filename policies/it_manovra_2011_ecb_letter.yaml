description: 'Two emergency fiscal packages — D.L. 98/2011 (€48bn) and D.L. 138/2011 (~€54bn) — adopted by the Berlusconi IV government under mounting bond-market pressure and the 5 August 2011 confidential
  Trichet-Draghi ECB letter demanding structural reform and consolidation in exchange for SMP bond purchases. Measures: additional IRPEF surtax on top incomes, acceleration of pension-age rise for women
  in the private sector, VAT rise 20%→21%, closure of several tax-expenditure items, and public-sector hiring freeze. Despite the packages, BTP-Bund spread continued to widen, precipitating Berlusconi''s
  12 November 2011 resignation.

  '

title: Central African Republic IMF Extended Credit Facility 2023
countries:
- CAF
timeframe:
  start: 2023
  end: 2026
  enacted_date: '2023-04-27'
description: 'The Central African Republic entered a three-year IMF Extended Credit Facility arrangement in April 2023. The programme conditioned concessional financing on domestic-revenue mobilisation,
  stronger public-financial management, control of nonpriority spending, debt transparency, governance measures, and protection of selected social and security-related priority outlays during a fragile
  post-conflict fiscal setting.

  '
scope: national
enacted_by:

  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The ECF framework targets deficit control, arrears prevention, and tighter prioritisation of expenditure.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme benchmarks emphasise budget transparency, debt reporting, and governance safeguards.

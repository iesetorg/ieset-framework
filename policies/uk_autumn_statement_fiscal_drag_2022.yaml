status: candidate
title: UK Autumn Statement 2022 — fiscal drag threshold freeze
countries:
- GBR
timeframe:
  start: 2022
  end: 2028
  enacted_date: '2022-11-17'
description: 'Chancellor Jeremy Hunt''s Autumn Statement 17 November 2022 froze personal income tax thresholds and the National Insurance primary threshold in cash terms to April 2028, and reduced the additional
  rate threshold from £150,000 to £125,140 from April 2023. Extended the Energy Profits Levy to 35% and introduced an Electricity Generator Levy at 45%. Fiscal drag from frozen thresholds is the largest
  stealth tax rise of recent decades — OBR estimated >£40bn / year by 2027-28 and ~4 million additional higher-rate taxpayers by end of freeze. Reversed most of the Truss/Kwarteng mini-budget except the
  NI and stamp-duty changes.

  '

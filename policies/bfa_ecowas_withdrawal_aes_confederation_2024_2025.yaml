policy_id: bfa_ecowas_withdrawal_aes_confederation_2024_2025
status: candidate
title: Burkina Faso ECOWAS withdrawal and AES confederation 2024-2025
countries:
- BFA
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-28'
description: >
  Burkina Faso jointly notified withdrawal from ECOWAS with Mali and Niger in
  January 2024 and deepened the Alliance of Sahel States into a confederation in
  2024. The policy shifted regional alignment away from ECOWAS election,
  sanctions, and market-integration disciplines and toward a security-first
  Sahel bloc built around mutual defence, sovereignty claims, and transition
  government coordination.
enacted_by:
- burkina_faso_mpsr_transition_sovereignty_2022_present
scope: national
coalition_label_at_enactment: MPSR military transition
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Withdrawal from ECOWAS weakened formal regional market-integration commitments, even with transitional exit arrangements.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The move reduced exposure to ECOWAS return-to-constitutional-order enforcement and regional judicial-political discipline.
references:
- ECOWAS statements on the withdrawal of Burkina Faso, Mali, and Niger, 2024-2025.
- Alliance of Sahel States communiques and confederation treaty reporting, 2024.
- Associated Press and Reuters reporting on ECOWAS withdrawal and AES confederation formation.

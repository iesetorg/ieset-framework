policy_id: mus_vat_e_invoicing_regulations_2023
status: candidate
title: Mauritius VAT e-invoicing regulations 2023
countries:
- MUS
timeframe:
  start: 2023
  end: ongoing
description: 'Mauritius introduced VAT e-invoicing and fiscalisation requirements for registered businesses on a phased basis. The reform requires covered operators to issue and transmit electronic invoices
  through approved systems, giving the revenue authority more timely transaction records for VAT compliance, audit selection, and fraud control.

  '

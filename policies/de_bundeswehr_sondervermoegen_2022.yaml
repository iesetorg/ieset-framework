policy_id: de_bundeswehr_sondervermoegen_2022
status: candidate
title: Bundeswehr Sondervermögen EUR 100bn and Zeitenwende defence spending 2022
countries:
- DEU
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-06-03'
description: 'Constitutional amendment (new Art. 87a Abs. 1a GG) creating a EUR 100bn off-balance special-purpose fund (Sondervermögen) for Bundeswehr procurement plus commitment to meet the NATO 2% of
  GDP defence-spending target from 2024. Announced by Chancellor Scholz in the 27 February 2022 Zeitenwende Bundestag speech three days after the Russian invasion; required CDU/CSU support to reach the
  two-thirds constitutional majority. Funded acquisitions include F-35A, P-8A Poseidon, CH-47F Chinook, Patriot replacements, and digitalisation. Historic break with German post-war defence posture.

  '
enacted_by:
- germany_scholz_ampel_2021_2025
coalition_label_at_enactment: SPD-Greens-FDP Ampel (with CDU/CSU constitutional support)

policy_id: th_2017_constitution
status: candidate
title: Thailand 2017 Constitution (junta-drafted)
countries:
- THA
timeframe:
  start: 2017
  enacted_date: '2017-04-06'
description: 'Constitution drafted by the NCPO-appointed Constitution Drafting Committee chaired by Meechai Ruchupan, approved in a referendum 7 August 2016 (61.4% yes, 55% turnout, with pro-charter campaigning
  restricted and junta critics detained), and promulgated 6 April 2017. Key design features engineered political continuity for the junta: (i) a 250-seat Senate entirely appointed by the NCPO for a five-year
  transitional period that voted jointly with the House on the choice of Prime Minister; (ii) a mixed-member apportionment (MMA) electoral system using a single ballot for both constituency and party-list
  seats, mathematically disadvantageous to large parties; (iii) a 20- Year National Strategy binding all future governments; (iv) expanded powers for the Constitutional Court and Election Commission including
  party-dissolution doctrine applied to Future Forward (2020) and Move Forward (2024); (v) PM candidates need not be MPs. After the five- year transitional Senate expired in May 2024 it was replaced by
  a 200-member Senate chosen through an indirect professional-category election system.

  '

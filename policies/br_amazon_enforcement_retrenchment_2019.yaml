policy_id: br_amazon_enforcement_retrenchment_2019
status: candidate
title: Amazon environmental enforcement retrenchment
countries:
- BRA
timeframe:
  start: 2019
  end: 2022
description: 'Administrative and budgetary retrenchment of Amazon environmental enforcement 2019-2022: cuts to IBAMA and ICMBio operational budgets and fine-collection staffing; Environment Minister Ricardo
  Salles''s "passar a boiada" (let the cattle through) deregulation push during COVID distraction; weakened enforcement of CAR (Cadastro Ambiental Rural) obligations; and debated land-regularisation legislation
  (MP 910/2019, PL 2633/2020) that would retroactively legalise certain Amazon land invasions. INPE PRODES deforestation rose from ~7,500 km2 (2018) to ~13,000 km2 (2021), ~60% above the 2018 baseline.

  '

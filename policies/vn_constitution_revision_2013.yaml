policy_id: vn_constitution_revision_2013
status: candidate
title: Vietnam Constitution revision 2013
countries:
- VNM
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2013-11-28'
description: 'National Assembly passed a comprehensive revision of the 1992 Constitution on 28 November 2013 (effective 1 January 2014). The text retained single-party CPV primacy (Article 4) and ''socialist-
  oriented market economy'' framing, formalised the ''state economic sector plays a leading role'' clause, and re-stated that land belongs to ''the entire people'' under state management — closing the door
  on private land ownership and framing the 2013 Land Law revision (also 29 Nov 2013). Expanded human-rights chapter and judicial-review language was written but without creating an independent constitutional
  court. Commonly treated as the doctrinal anchor pre-CPTPP.

  '
enacted_by:
- vietnam_dung_pm_2006_2016
coalition_label_at_enactment: CPV; NA XIII, session 6

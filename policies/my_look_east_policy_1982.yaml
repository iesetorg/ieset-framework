- JPN
- KOR
timeframe:
  start: 1982
  end: 2003
  enacted_date: '1982-02-08'
description: 'Policy launched by Mahathir 8 Feb 1982 orienting Malaysian development model on Japan and South Korea rather than Anglo-American precedents. Components: student-placement programme to Japanese
  universities and firms (>15,000 through 2003), management-style emulation (quality circles, keiretsu-linked procurement), Japanese technical assistance, soft loans from OECF (later JBIC), and flagship
  Proton-Mitsubishi JV.

  '
enacted_by:
- malaysia_mahathir_first_term_1981_1988
coalition_label_at_enactment: Barisan Nasional (Mahathir)

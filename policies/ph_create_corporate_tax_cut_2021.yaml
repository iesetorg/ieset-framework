policy_id: ph_create_corporate_tax_cut_2021
status: candidate
title: 'CREATE: Corporate Recovery and Tax Incentives for Enterprises Act (RA 11534)'
countries:
- PHL
timeframe:
  start: 2020
  enacted_date: '2021-03-26'
description: 'Package 2 of the Comprehensive Tax Reform Program, signed 26 March 2021 with retroactive effect to 1 July 2020. Cut statutory corporate income tax from 30% (the highest in ASEAN) to 25% for
  large corporations and 20% for domestic corporations with taxable income up to ₱5m and assets up to ₱100m. Legislated further 1 ppt annual reduction to 20% by 2027. Rationalised the sprawling system of
  fiscal incentives previously administered by 14 Investment Promotion Agencies (PEZA, BOI, etc.): time-bound income tax holidays (4-7 years) followed by special corporate income tax of 5% of gross income
  or enhanced deductions for registered business enterprises, subject to Strategic Investment Priority Plan targeting and review by the Fiscal Incentives Review Board. COVID-19-framed as a stimulus measure
  reducing the business-tax burden by ~₱1 trillion over 10 years.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban-led supermajority
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: strong
  rationale: Statutory CIT cut from 30% to 25% (large) and 20% (SME) with legislated phase-down to 20% by 2027; the largest single corporate-tax move in recent Philippine history.
  intended: true
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  rationale: Rationalisation of fragmented IPA incentive regimes into a unified framework under the FIRB; transparency and sunset disciplines imposed.
  intended: true
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  rationale: Time-bounded tax holidays and sunset review reduce indefinite incentive entrenchment compared with the prior system.
  intended: true
references:
- Republic Act No. 11534 (CREATE), 26 March 2021
- DOF-BIR Revenue Regulations implementing CREATE, 2021-2022

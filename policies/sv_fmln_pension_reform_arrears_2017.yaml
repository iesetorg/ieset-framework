policy_id: sv_fmln_pension_reform_arrears_2017
status: candidate
title: Fmln Pension Reform Arrears 2017
countries:
- SLV
timeframe:
  start: 2014
  end: 2019
description: 'In September 2017 the Salvadoran legislature passed a pension reform that restructured the FOP (Fideicomiso de Obligaciones Previsionales) trust and adjusted contribution rates and the share
  of accumulated savings managed by AFPs vs. the state. The reform addressed mounting arrears on pension obligations carried since the 1998 privatisation, easing the near-term fiscal financing burden while
  preserving individual capitalisation accounts.

  '

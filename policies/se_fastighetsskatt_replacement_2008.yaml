policy_id: se_fastighetsskatt_replacement_2008
status: candidate
title: Fastighetsskatt replaced with capped municipal fee 2008
countries:
- SWE
timeframe:
  start: 2008
  enacted_date: '2008-01-01'
description: 'State residential property tax (fastighetsskatt) abolished 1 Jan 2008 and replaced with a capped municipal property fee (kommunal fastighetsavgift) — for houses, the lesser of 0.75% of assessed
  value or a cap (SEK 6,000 in 2008, indexed thereafter). Cap dramatically cut effective rate for high-value urban housing stock.

  '
enacted_by:
- sweden_reinfeldt_alliance_2006_2014
coalition_label_at_enactment: Alliansen
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Replaced open-ended percentage tax with fixed cap — reduced effective rate for upper-end housing.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Property-value progressivity replaced with a flat fee above cap threshold.

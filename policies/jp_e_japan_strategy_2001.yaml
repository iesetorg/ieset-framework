policy_id: jp_e_japan_strategy_2001
status: candidate
title: Japan e-Japan Strategy 2001
countries:
- JPN
timeframe:
  start: 2001
  end: 2005
  enacted_date: '2001-01-22'
description: 'e-Japan Strategy adopted 22 January 2001 setting a five-year goal to make Japan the world''s most advanced IT nation by 2005. Key targets: 30 million households with high-speed internet access
  and 10 million with ultra-high-speed fibre access by 2005; mandatory cost-based unbundling of NTT''s local loop; promotion of e-government. Triggered Japan''s broadband boom — ADSL subscriptions rose
  from ~10k (2000) to ~13m (2005); fibre rollout preceded global peers. Cost-based LLU pricing struck down NTT dominance in consumer broadband despite retained market power at fixed-line level.

  '

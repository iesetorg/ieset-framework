status: candidate
title: Ley de Emisión de Activos Digitales (Digital Asset Issuance Law, 2023)
countries:
- SLV
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-01-11'
description: 'The Digital Asset Issuance Law (Ley de Emisión de Activos Digitales), approved 11 Jan 2023 by the Legislative Assembly, establishes the legal regime for crypto-asset issuance, tokenised securities,
  stablecoins, and "Volcano Bonds" — the proposed $1bn sovereign-plus-BTC-backed bond to finance the planned Bitcoin City and mining infrastructure. The law creates the Comisión Nacional de Activos Digitales
  (CNAD) as supervisory agency, defines issuer obligations, and exempts crypto-asset transactions from VAT and capital-gains tax. It extends the Bitcoin Law by creating a structured framework for non-BTC
  crypto issuance and positions El Salvador as a low- regulation crypto hub in Latin America. Volcano Bonds were registered with CNAD in 2024 but issuance was repeatedly deferred.

  '

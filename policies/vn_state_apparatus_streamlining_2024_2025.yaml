policy_id: vn_state_apparatus_streamlining_2024_2025
status: candidate
title: Vietnam Party-state apparatus streamlining 2024-2025
countries:
- VNM
timeframe:
  start: 2024
  end: ongoing
description: 'Tô-Lâm-era administrative restructuring under the slogan ''lean — compact — strong — effective — efficient — efficacious'' (tinh - gọn - mạnh - hiệu năng - hiệu lực - hiệu quả), announced
  late 2024 and accelerated through 2025. Programme consolidates ministries (merger of Planning & Investment with Finance; Information & Communications with Science & Technology; Labour-Invalids-Social
  Affairs substantially absorbed), dissolves several Party-state commissions, and prepares a sub-national consolidation round reducing the number of provincial-level units below the current 63 via province-and-district
  mergers planned for 2025-26. Announced target of 20% reduction in state-payroll headcount and an equivalent cut in Party-organ staffing. Framed as the most ambitious institutional restructuring since
  Đổi Mới and as prerequisite to the XIV Congress (Jan 2026) governance platform.

  '
enacted_by:
- vietnam_to_lam_2024_present
coalition_label_at_enactment: CPV — XIII Congress continuation under Tô Lâm

policy_id: ph_maharlika_sovereign_wealth_fund_2023
status: candidate
title: Maharlika Investment Fund (Philippine sovereign wealth fund)
countries:
- PHL
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-07-18'
description: 'Republic Act No. 11954 established the Maharlika Investment Fund (MIF), the first Philippine sovereign wealth vehicle, administered by the Maharlika Investment Corporation (MIC). Initial capitalisation
  of ₱500 billion (~$9bn) drawn from Landbank and DBP contributions, BSP dividend remittances for the first two years, Philippine Amusement and Gaming Corporation (PAGCOR) share, and national- government
  seed equity. Mandate: invest in foreign and domestic assets including infrastructure, strategic industries, green investments and PPP co-investment. Signed by President Marcos Jr on 18 July 2023 after
  a fast-tracked passage (first-reading to enrolment in ~7 months) that drew opposition from former Finance Secretaries, BSP alumni, and academic economists on governance and opportunity-cost grounds.

  '
enacted_by:
- philippines_marcos_jr_2022_present
coalition_label_at_enactment: Uniteam (PFP/Lakas-CMD supermajority)
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Public-capital vehicle directing state-bank and BSP dividend flows toward strategic-sector equity investment; a new channel for targeted state finance.
  intended: true
- axis: institutional.property_rights
  direction: '0'
  magnitude: weak
  rationale: No expropriation dimension; legal framework is investment-vehicle rather than nationalisation. Governance-safeguard critics flag fiduciary, not expropriation, risk.
  intended: false
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  rationale: Mandatory contribution of BSP dividend surpluses to MIF for an initial period was criticised as a narrow impingement on central-bank operational autonomy. BSP retained supervisory independence.
  intended: false
references:
- Republic Act No. 11954, 'Maharlika Investment Fund Act', 18 July 2023
- Joint statement by former Finance Secretaries and Governors against the MIF, 6 December 2022

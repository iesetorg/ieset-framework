description: 'Solidaritätszuschlaggesetz 24 June 1991 introduced a 7.5% surcharge on income and corporate tax 1991-1992 to finance reunification and Gulf War costs. Reintroduced at 7.5% in 1995, reduced
  to 5.5% from 1998. Partially abolished from 2021 for lower-income taxpayers. Iconic reunification-era fiscal instrument.

  '

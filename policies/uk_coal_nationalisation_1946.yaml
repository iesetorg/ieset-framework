policy_id: uk_coal_nationalisation_1946
status: candidate
title: Coal Nationalisation 1946
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The Coal Industry Nationalisation Act 1946 vested the assets of approximately 800 private colliery companies in the National Coal Board (NCB), establishing a state monopoly over coal mining,
  processing, and wholesale distribution from 1 January 1947. Compensation was paid to former owners via government stock, and the NCB became one of the largest employers in postwar Britain, central to
  Attlee''s programme of public ownership of the commanding heights.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: irq_ipc_nationalisation_1972
status: candidate
title: Iraq Petroleum Company nationalisation 1972
countries: [IRQ]
timeframe: {start: 1972, enacted_date: "1972-06-01"}
description: >
  Iraq nationalised the Iraq Petroleum Company's remaining concessionary
  operations in 1972, transferring control of production and export revenues to
  the state-owned Iraq National Oil Company. The measure became the fiscal and
  ideological foundation for Ba'ath-era development planning during the 1970s
  oil boom.
enacted_by:
  - iraq_baath_oil_statism_1968_1979
axes_moved:
  - axis: institutional.property_rights
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "Foreign concessionary property rights were extinguished and replaced by state ownership."
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Oil production and exports became state-gated through national companies."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Direct oil revenue enabled a major expansion in public expenditure."
references:
  - "Iraq Revolutionary Command Council, Law No. 69 of 1972"
  - "Tripp (2007), A History of Iraq"

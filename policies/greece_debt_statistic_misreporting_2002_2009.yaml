policy_id: greece_debt_statistic_misreporting_2002_2009
status: candidate
title: Greece Debt Statistic Misreporting 2002 2009
countries:
- GRC
timeframe:
  start: 2001
  end: 2010
description: 'Across 2002–2009 successive Greek governments and the National Statistical Service (ESYE) reported general-government deficit figures repeatedly subject to upward Eurostat revision, including
  use of Goldman Sachs cross-currency swap arrangements that masked sovereign debt at euro-adoption. The 2010 acknowledgment of the misreporting, totalling several percentage points of GDP, undermined Greek
  market access and prompted Eurostat''s expanded national-statistics audit powers.

  '
enacted_by:
- greek_fiscal_dominance_post_euro_2001
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Misreporting permitted higher de facto expenditure than would have been politically sustainable.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Concealed deficits accommodated continued pension and welfare-transfer expansion.
- axis: institutional.property_rights
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Statistics manipulation did not directly alter formal property-rights regime.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Eurosystem entry constrained money-financing despite fiscal reporting drift.

policy_id: mexico_banxico_autonomy_1993
status: candidate
title: Mexico Banxico Autonomy 1993
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'A 1993 constitutional amendment to Articles 28, 73, and 123 plus a new Banco de México organic law granted Banxico statutory autonomy with price stability as its primary mandate, prohibited
  direct central-bank financing of the federal government, and created a six-member governing board with staggered terms. The reform aligned Mexico''s monetary regime with peer central-bank-independence
  models and complemented NAFTA accession by importing credible-disinflation institutional commitments.

  '

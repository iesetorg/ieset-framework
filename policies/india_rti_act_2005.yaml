policy_id: india_rti_act_2005
status: candidate
title: India Rti Act 2005
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'The Right to Information Act 2005 created a statutory right for any citizen to request information from public authorities, established Central and State Information Commissions, and imposed
  time-bound disclosure obligations with penalties for non-compliance. While initially passed under UPA-I, its operational scaling occurred during UPA-II, reshaping bureaucratic transparency norms across
  central and state government.

  '
enacted_by:
- india_singh_upa_ii_2009_2014
axes_moved:

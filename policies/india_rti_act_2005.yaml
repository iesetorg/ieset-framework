  rationale: Disclosure of welfare-roll data improved targeting of NREGA and PDS transfers in some states.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Information Commissions and compliance staffing added permanent administrative cost centres.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Improved investor-side transparency on permits and clearances reduced informal trade frictions.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: RTI enabled scrutiny of licensing decisions, raising procedural standards while not altering substantive rules.

policy_id: uk_incomes_policy_social_contract_1975_1978
status: candidate
title: Incomes Policy Social Contract 1975 1978
countries:
- GBR
timeframe:
  start: 1976
  end: 1979
description: 'The Wilson–Callaghan governments'' tripartite "Social Contract" with the TUC, comprising successive pay norms (initially a flat GBP 6 weekly limit in 1975, then 5% in 1976–78) in exchange
  for repeal of Conservative industrial-relations law and expansion of the social wage. The voluntary incomes-policy framework collapsed into the 1978–79 "Winter of Discontent" when public-sector unions
  rejected Callaghan''s proposed 5% ceiling.

  '
enacted_by:
- uk_callaghan_imf_1976
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pay restraint on public-sector wages directly suppressed central and local payroll growth.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Wage norms moderated cost-push inflation, complementing tighter monetary stance under DCE targets.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Incomes policy was Treasury-led; Bank of England operational mandate was unaffected.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Voluntary wage norms operated alongside expanded TUC bargaining rights, leaving structural rules unchanged.

policy_id: lt_euro_adoption_2015
status: candidate
title: Lithuania euro adoption 2015
countries:
- LTU
timeframe:
  start: 2015
  end: ongoing
  enacted_date: '2015-01-01'
description: 'Lithuania adopted the euro on 1 January 2015 after Council Decision 2014/509/EU found that it fulfilled the convergence conditions and abrogated its derogation. The changeover replaced the
  litas, brought Lithuania into the Eurosystem monetary-policy framework, and removed currency-conversion costs with euro-area trading and financial partners.

  '
enacted_by: []
coalition_label_at_enactment: Butkevicius Social Democratic-led coalition
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Monetary-policy discretion shifted from the Bank of Lithuania to the independent ECB/Eurosystem framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Joining the euro area removed currency-conversion costs and exchange-rate risk with euro-area partners.
references:

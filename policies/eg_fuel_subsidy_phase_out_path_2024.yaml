policy_id: eg_fuel_subsidy_phase_out_path_2024
status: candidate
title: Fuel Subsidy Phase Out Path 2024
countries:
- EGY
timeframe:
  start: 2024
  end: ongoing
description: 'As an IMF Extended Fund Facility benchmark, Egypt set out a multi-year roadmap to lift retail prices for diesel, octane-80, and octane-92 to cost-recovery by end-2025, with multiple price
  increases through 2024. The mechanism extends the 2014–19 reform under Sisi''s third term, reducing the subsidy bill, narrowing FX leakage, and freeing fiscal space for targeted transfers (Takaful and
  Karama).

  '
enacted_by:
- egypt_sisi_third_term_2024_present
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Smaller subsidy outlays reduced quasi-fiscal monetary financing pressure on the central bank.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Untargeted fuel-price subsidies — historically a large transfer — are being scheduled to expiry.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Cost-recovery pricing reduces incentives for cross-border fuel smuggling and import distortions.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: EGPC retains monopoly distribution roles even as administered prices converge on import parity.

description: 'Annexed to the Maastricht Treaty as Protocol No. 4, the Statute of the European System of Central Banks and the European Central Bank entered force with the ECB''s establishment on 1 June
  1998. It enshrined price stability as the primary mandate, prohibited monetary financing of governments (Article 123 TFEU), and made the ECB Governing Council operationally independent of national governments
  — a Bundesbank-modelled architecture for the single currency.

  '

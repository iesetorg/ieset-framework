policy_id: uy_bono_crianza_expansion_2025
status: candidate
title: Uruguay Bono Crianza and First-Childhood Transfer Expansion
countries:
- URY
timeframe:
  start: 2025
  end: ongoing
description: 'The Orsi government moved to scale and unify early-childhood transfers through the Bono Crianza and related Asignaciones Familiares-Plan de Equidad architecture. The 2026 Rendicion de Cuentas
  package proposed higher income-tested amounts and a unified transfer system for households with children aged 0 to 3, with the government projecting coverage of more than 50,000 children by 2027 and a
  material reduction in poverty in that age cohort.

  '
enacted_by:
- uruguay_orsi_fa_2025_present
coalition_label_at_enactment: Frente Amplio (MPP-led)
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Per-child nominal transfer roughly doubled and coverage extended for poverty-line households.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Net effect on post-tax-and-transfer distribution is more progressive via targeted child-poverty transfer.
references:

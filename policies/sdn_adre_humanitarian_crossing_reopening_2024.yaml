policy_id: sdn_adre_humanitarian_crossing_reopening_2024
status: candidate
title: Sudan Adre humanitarian crossing reopening 2024
countries:
- SDN
timeframe:
  start: 2024
  end: ongoing
description: >
  Sudanese authorities allowed the Adre border crossing from Chad into Darfur
  to reopen for humanitarian relief in 2024 after sustained UN and diplomatic
  pressure amid famine risk and mass displacement. The decision enabled
  cross-border aid convoys into areas that were difficult to reach through
  Port Sudan-controlled routes and was later extended as a key humanitarian
  access channel during the war.
enacted_by:
- sudan_post_bashir_transition_conflict_state_2019_present
scope: national
coalition_label_at_enactment: Sudan Armed Forces-aligned wartime authorities
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Reopening Adre reduced administrative barriers to cross-border humanitarian imports.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Humanitarian-access authorization made relief movement more rule-bound than ad hoc convoy negotiation.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Although aid was largely donor-financed, the policy expanded permitted in-kind relief reaching civilians.
references:
- UN OCHA and UN Security Council reporting on the Adre crossing reopening and extensions, 2024-2025.
- Associated Press and Reuters reporting on Sudan's Adre humanitarian access decision, 2024.
notes: >
  This is coded as an access policy, not as evidence that humanitarian delivery
  was adequate or politically neutral across front lines.

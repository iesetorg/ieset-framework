policy_id: greece_public_sector_wage_growth_2001_2009
status: candidate
title: Greece Public Sector Wage Growth 2001 2009
countries:
- GRC
timeframe:
  start: 2001
  end: 2010
description: 'Across 2001–2009 Greek public-sector compensation per employee outpaced both productivity growth and euro-area peers, supported by political-business-cycle wage settlements, generous bonuses
  (δώρα Χριστουγέννων/Πάσχα), and expanded special allowances. The cumulative wage drift contributed significantly to the loss of unit-labour-cost competitiveness and the structural-deficit overhang exposed
  during the 2009–2010 statistical revisions.

  '

  rationale: BDL turned monetary policy into quasi-fiscal financing of the sovereign and banks.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Operations subsidised banks and government, indirectly enabling continued spending growth.
- axis: regulatory.financial_deregulation

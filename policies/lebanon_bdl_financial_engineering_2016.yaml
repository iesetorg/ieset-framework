policy_id: lebanon_bdl_financial_engineering_2016
status: candidate
title: Lebanon Bdl Financial Engineering 2016
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'In 2016, Banque du Liban under Governor Riad Salameh launched "financial engineering" operations through which BDL bought sovereign Eurobonds and certificates of deposit from Lebanese commercial
  banks at high yields, swapping them for fresh BDL CDs and providing dollar liquidity. The operations attracted dollar deposits at unsustainable rates and concentrated banking-system exposures on the BDL
  and sovereign, building the structural imbalance that crystallised in the 2019-20 collapse.

  '
enacted_by:
- lebanon_post_war_reconstruction_collapse_1992_2020
axes_moved:
- axis: monetary.central_bank_independence

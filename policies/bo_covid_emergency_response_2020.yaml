description: 'Áñez-administration COVID-19 response: nationwide quarantine decreed March 21, 2020; creation of Bono Familia (BOB 500 per schoolchild), Bono Universal (BOB 500 for adults without formal income),
  and Canasta Familiar food basket. Emergency health-equipment procurement was later subject to corruption scandal (inflated ventilator prices) leading to the resignation and arrest of the health minister.
  GDP contracted 8.7% in 2020, the sharpest recession in decades.


policy_id: bolivia_hydrocarbons_nationalisation_2006
status: candidate
title: Bolivia Hydrocarbons Nationalisation 2006
countries:
- BOL
timeframe:
  start: 2006
  end: 2019
description: 'Supreme Decree 28701 ("Héroes del Chaco"), signed 1 May 2006 by President Evo Morales, declared state ownership of all hydrocarbons at the wellhead and required foreign operators (Petrobras,
  Repsol, Total, BG) to migrate existing contracts to operation/service agreements with state firm YPFB within 180 days. Royalty and tax take rose from roughly 50% to 82% on the largest gas fields, redirecting
  hydrocarbon rents toward the state and social-programme financing.

  '
enacted_by:
- bolivia_mas_extractivist_2006_2019
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory contract migration to YPFB-operator regime brought all upstream activity under state licensing.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State-controlled YPFB subsidised domestic gas pricing for industrial and household users.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct hydrocarbons tax (IDH) revenue funded Bono Juancito Pinto and Renta Dignidad transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Sharp rise in state-take from 50% to 82% expanded fiscal envelope for public investment programmes.

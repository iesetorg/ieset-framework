policy_id: th_14_august_package_1998
status: candidate
title: Thailand 14 August 1998 comprehensive financial-sector package
countries:
- THA
timeframe:
  start: 1998
  end: 1998
  enacted_date: '1998-08-14'
description: 'Comprehensive financial-sector package announced 14 August 1998 by Finance Minister Tarrin Nimmanahaeminda — the centrepiece of Thailand''s crisis-response. Content: (i) Tier- 1 capital support
  scheme with private-capital-first conditionality; (ii) Tier-2 NPL-resolution capital support; (iii) suspension and intervention of seven more finance companies; (iv) loan classification and loss-provisioning
  rules aligned with Basel standards; (v) corporate debt-restructuring mechanism (CDRAC) framework; (vi) bank-ownership rules allowing foreign 100% for 10 years. Replaced earlier ad hoc crisis-management
  with coherent forensic framework. Widely credited with avoiding Japan-style zombie-bank outcomes.

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: Democrat-led coalition
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Loan classification, loss provisioning, ownership reform, CDRAC — supervisory architecture overhaul.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: 100% foreign bank ownership allowed (10-year window); foreign capital inflow to rehabilitate banks.
references:

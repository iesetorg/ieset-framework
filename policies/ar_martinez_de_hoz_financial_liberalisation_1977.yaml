description: 'Ley 21.526/1977 (Ley de Entidades Financieras) liberalised banking entry, ended reserve-requirement ceiling on loan rates, and replaced the 1946 nacionalización del ahorro. Accompanied by
  tariff reductions in stages and the December 1978 "tablita" pre-announced crawling-peg exchange-rate regime as inflation anchor. Produced "la plata dulce" capital-inflow era through early 1981.


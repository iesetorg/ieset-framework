policy_id: us_securities_act_1933
status: candidate
title: Securities Act 1933
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The Securities Act of 27 May 1933, signed by President Roosevelt as part of the First New Deal, required disclosure for primary issuance of securities through registration statements containing
  prospectus information filed with the Federal Trade Commission (later the SEC after 1934), with anti-fraud liability for issuers, underwriters, and signatories. The intended effect was to protect investors
  after the 1929 crash had revealed widespread issuance fraud, restore capital-market confidence, and establish the federal-disclosure regime that complemented the Securities Exchange Act 1934''s secondary-market
  provisions — together forming the foundation of modern US securities regulation.

  '

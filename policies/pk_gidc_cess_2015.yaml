policy_id: pk_gidc_cess_2015
status: candidate
title: Gas Infrastructure Development Cess (GIDC) Act 2015
countries:
- PAK
timeframe:
  start: 2015
  end: 2020
  enacted_date: '2015-05-22'
description: 'GIDC Act 2015 re-enacted a surcharge on natural-gas consumption by industrial and fertiliser sectors intended to finance the Iran- Pakistan and TAPI gas-import pipelines and LNG infrastructure.
  Replaced the 2011 GIDC Ordinance struck down by the Supreme Court in 2014. Ring-fenced for gas-sector capex but became general- revenue-substitute in practice. Subject to extensive litigation; Supreme
  Court 2020 Attock Cement judgment allowed collection of past arrears in 24 monthly instalments. Represents a classic earmarked-surcharge revenue instrument with weak earmark enforcement.

  '

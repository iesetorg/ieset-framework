policy_id: us_social_security_act_1935
status: candidate
title: Social Security Act 1935
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The Social Security Act of 14 August 1935, signed by President Roosevelt, established the national old-age pension insurance system financed by federal payroll taxes (Title II OASI), joint
  federal-state unemployment insurance (Title III), and grant-in-aid programmes for needy families, dependent children (Title IV ADC, later AFDC), and the blind. Coverage initially excluded farm and domestic
  workers but expanded over subsequent decades. The intended effect was to provide automatic income security against the unemployment, disability, and old-age risks starkly revealed by the Great Depression
  — establishing the foundational social-insurance architecture of the modern American state.

  '

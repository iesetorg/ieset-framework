title: Savings & Loan crisis onset (1986-1989)
countries:
- USA
timeframe:
  start: 1986
  end: 1989
description: 'Culmination of the Garn-St. Germain 1982 deregulation, interest-rate volatility, real-estate overbuilding (1986 Tax Reform Act reversal of passive-loss shelters compounded Texas/Southwest
  collapse), and FSLIC insolvency. By 1986 FSLIC''s insurance fund was technically insolvent. Zombie thrifts continued operating via regulatory forbearance (Regulatory Accounting Practices). The crisis
  ultimately cost ~$124B direct taxpayer outlay via FIRREA 1989 cleanup.

  '

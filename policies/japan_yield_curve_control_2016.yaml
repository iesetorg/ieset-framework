policy_id: japan_yield_curve_control_2016
status: candidate
title: Japan Yield Curve Control 2016
countries:
- JPN
timeframe:
  start: 2012
  end: 2020
description: 'In September 2016 the Bank of Japan moved from quantity-based QQE to Yield Curve Control, pegging the 10-year JGB yield around zero while holding the policy rate at -0.1% on excess reserves.
  The framework targeted the shape of the curve rather than purchase volumes, allowing the BOJ to ease financial conditions without unbounded balance-sheet growth and reinforcing the Abenomics commitment
  to maintain reflationary monetary stance.

  '

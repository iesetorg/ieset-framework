policy_id: canada_child_care_10_dollar_day_2021
status: candidate
title: Canada Child Care 10 Dollar Day 2021
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Budget 2021 announced a C$30 billion / 5-year federal commitment to a Canada-Wide Early Learning and Child Care system, with bilateral agreements signed in 2021–2022 with all ten provinces
  and three territories. The objective is to halve average parental fees in regulated child care by end of 2022 and reach an average of C$10/day by 2026. The federal Canada Child Care Act (2024) legislated
  principles of affordability, accessibility, and inclusivity to make the framework durable.

  '

policy_id: th_bibf_launch_1993
status: candidate
title: Thailand Bangkok International Banking Facility launch 1993
countries:
- THA
timeframe:
  start: 1993
  enacted_date: '1993-03-01'
description: 'Bangkok International Banking Facility launched Mar 1993 under Chuan Leekpai government; 46 banks licensed to conduct offshore foreign- currency lending. Designed as regional financial-centre
  initiative but in practice operated primarily as Out-In lending channel — borrowing offshore then lending on-shore in Thailand. Out-In loans grew to exceed $50bn by 1996; short-term USD-denominated borrowing
  fed baht-peg vulnerability culminating in Jul 1997 devaluation.

  '
enacted_by:
- thailand_chuan_leekpai_democrat_1992_1995
coalition_label_at_enactment: Democrat Party-led coalition under PM Chuan

policy_id: my_privatisation_master_plan_1983
status: candidate
title: Privatisation Master Plan (Malaysia 1983)
countries:
- MYS
timeframe:
  start: 1983
  end: 1991
description: 'Privatisation Policy announced 1983 by Mahathir, formalised as Privatisation Master Plan Feb 1991. Early privatisations: Sport Toto 1985, Syarikat Telekom Malaysia corporatisation 1987 (IPO
  1990), Tenaga Nasional corporatisation 1990 (IPO 1992), Malaysia Airlines partial IPO 1985, North-South Expressway PLUS concession 1988. Typically sold to Bumiputera-controlled entities (UEM, Renong)
  at below-market prices — critics cited cronyist allocation.

  '
enacted_by:
- malaysia_mahathir_first_term_1981_1988
coalition_label_at_enactment: Barisan Nasional (Mahathir)

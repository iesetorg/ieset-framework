policy_id: uk_pfi_launch_1992
status: candidate
title: Pfi Launch 1992
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'Chancellor Norman Lamont''s launch of the Private Finance Initiative in his Autumn Statement of 12 November 1992, allowing private consortia to design, build, finance, and operate public assets
  (hospitals, schools, prisons, roads) in exchange for unitary-charge service payments over 25–30 year contracts. PFI moved capital expenditure off the public balance sheet under contemporaneous accounting,
  and was substantially expanded under the post-1997 Labour governments before the 2018 PF2 closure.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Off-balance-sheet capital investment relieved short-run PSBR pressure on monetary financing.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Competitive tendering for design-build-finance-operate contracts opened public-asset markets to private bidders.
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: PFI altered procurement structure rather than personal-tax distribution directly.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: PFI moved capital outlay off-balance-sheet, lowering measured public investment in the short term.

policy_id: botswana_sacu_membership_1969
status: candidate
title: Botswana Sacu Membership 1969
countries:
- BWA
timeframe:
  start: 1966
  end: ongoing
description: 'Botswana''s accession to the renegotiated 1969 Southern African Customs Union agreement (with South Africa, Lesotho and Swaziland) gave it duty-free access to the SACU common market and a
  share of the common revenue pool distributed via a formula favouring smaller members. The 2002 SACU Agreement institutionalised governance, dispute resolution and the revenue formula. The intended effect
  was to lock in trade openness, secure a stable non-mineral revenue stream, and anchor regional economic integration.

  '

description: 'Under Finance Minister Lajos Bokros and central bank governor György Surányi in the MSZP-SZDSZ coalition (socialist-liberal). Response to 1994-95 Hungarian BOP + fiscal crisis after transitional
  fiscal expansion. Measures: 9% one-off currency devaluation + crawling peg, 8% import surcharge (temporary), real-wage reduction via indexation adjustment, public-sector layoffs, higher education tuition
  introduction, family benefit means-testing, acceleration of privatisation. Fiscal deficit reduced from ~9% (1994) to ~3% by 1997. Post-1996 Hungarian growth accelerated. Influential Eastern European consolidation
  template. Coalition-content case: socialist- liberal coalition implementing austerity + market-liberalising reforms.

  '

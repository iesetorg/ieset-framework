policy_id: mli_mining_code_local_content_2023
status: candidate
title: Mali mining code and local-content reform 2023
countries:
- MLI
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-08-29'
description: >
  Mali adopted a new mining code in 2023 to increase state revenue and
  participation from gold and other mineral projects. The reform increased the
  maximum state and Malian-private stake available in mining projects,
  strengthened local-content and subcontracting expectations, and gave the state
  more leverage over project permits, fiscal terms, and strategic mineral
  development.
enacted_by:
- mali_assimi_goita_transition_sovereignty_2020_present
scope: national
coalition_label_at_enactment: Goita transition government
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: The code tightened licensing, participation, and local-content conditions for mining operators.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher mandatory public and domestic participation increased sovereign discretion over existing and future mining assets.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: The reform aimed to raise public mineral revenue and state participation in a strategic sector.
references:

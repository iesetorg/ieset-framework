policy_id: venezuela_central_bank_subordination
status: candidate
title: Venezuela Central Bank Subordination
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'Successive reforms during the Chavez era diluted the autonomy of the Banco Central de Venezuela (BCV), including the 2005 BCV reform allowing transfer of "excess" reserves to FONDEN, the 2009
  Organic Law amendments empowering the executive over reserve management, and continuous appointment of politically aligned governors. The institutional changes opened space for direct central bank financing
  of fiscal deficits and PDVSA operations.

  '
enacted_by:
- venezuela_chavismo_bolivarian_1999_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Politicised reserves enabled discretionary FX allocation that distorted import competition.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Transfer of "excess" BCV reserves to FONDEN reduced legal protections around central bank assets.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory amendments overrode prior 1999 constitutional autonomy provisions for the central bank.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: 2009 Organic Law amendments and FONDEN reserve transfers placed BCV under direct executive control.

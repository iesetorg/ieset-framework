title: Russia — Gaidar shock therapy 1992
countries:
- RUS
timeframe:
  start: 1992
  end: 1993
  enacted_date: '1992-01-02'
description: 'Under acting PM Yegor Gaidar advised by Jeffrey Sachs and Anders Åslund. Price liberalisation (Jan 2 1992, ~90% of consumer prices freed overnight), fiscal tightening attempt (undermined by
  CBR monetary accommodation), unification of exchange rates, trade liberalisation, start of mass privatisation via voucher scheme. Produced sharp inflation (peak ~2500% annualised late 1992) and GDP collapse
  through 1998. Often cited as failed shock therapy; Sachs-Åslund et al argue the fiscal tightening was never actually implemented, so the shock therapy framework isn''t what was tested. Canonical contested
  post-Soviet case. Later Putin-era stabilisation (2000-2008) benefitted from oil-price rebound atop the stabilised macro framework.

  '

policy_id: in_industrial_policy_delicensing_1991
status: candidate
title: India New Industrial Policy — Licensing Abolition 1991
countries:
- IND
timeframe:
  start: 1991
  enacted_date: '1991-07-24'
description: 'Statement on Industrial Policy 24 Jul 1991 ending the licence-raj for all but 18 strategic industries (trimmed further to 6 over time). Removed MRTP Act asset-limit pre-approval requirements
  for large firms; opened FDI up to 51% automatic route in 34 industries; ended public-sector monopoly in most industries (retained only defence, atomic energy, railway transport). The single most consequential
  industrial-regulation reform in Indian independent history.

  '
enacted_by:
- india_narasimha_rao_inc_1991_1996
coalition_label_at_enactment: INC under PM Rao
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Industrial licensing abolished for almost all industries.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: MRTP pre-approval removed; public-sector monopolies dismantled in most sectors.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Reduced discretionary licensing; FDI property rights formalised.

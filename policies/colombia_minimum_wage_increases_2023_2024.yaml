policy_id: colombia_minimum_wage_increases_2023_2024
status: candidate
title: Colombia Minimum Wage Increases 2023 2024
countries:
- COL
timeframe:
  start: 2022
  end: ongoing
description: 'Sequence of large statutory minimum-wage increases under the Petro government: approximately 16% nominal raise for 2023 and 12% for 2024, both above contemporaneous consumer-price inflation.
  Set by presidential decree after failed tripartite Concertación Salarial talks; raised the binding wage floor for formal-sector workers and effectively reset the reference for many non-wage benefits indexed
  to the SMMLV.

  '
enacted_by:
- colombia_petro_2022_present
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher statutory floor compresses the wage distribution, raising effective tax-progressivity at the bottom.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Above-inflation minimum-wage increases raise the cost wedge between gross labour cost and net wage.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Many social-program benefits and minimum-pension thresholds are indexed to SMMLV and rose proportionally.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher wage floor reduces hiring flexibility, especially for low-skilled and informal-sector workers.

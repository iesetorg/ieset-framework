policy_id: id_sby_fuel_subsidy_reform_2005
status: candidate
title: SBY fuel-subsidy price liberalisation 2005
countries:
- IDN
timeframe:
  start: 2005
  end: 2008
  enacted_date: '2005-10-01'
description: 'Raised administered retail prices of subsidised fuels (premium gasoline and kerosene) by an average of 126% on 1 October 2005, after a smaller March 2005 hike, in response to Brent oil moving
  from ~USD 40 to ~USD 60/barrel and fuel subsidies threatening to exceed 3% of GDP. Savings were partly redirected to the BLT unconditional cash-transfer to the bottom-quintile population and to health
  and education block grants. A repeat hike followed in May 2008 when oil reached USD 140.

  '
enacted_by:
- indonesia_sby_demokrat_2004_2014
- indonesia_reformasi_1998_present
coalition_label_at_enactment: Demokrat-led rainbow coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Single largest real cut to energy subsidies in post-1998 Indonesia.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Roughly half of the fiscal space redirected to BLT cash transfers.
references:
- Beaton & Lontoh (2010), 'Lessons Learned from Indonesia's Attempts to Reform Fossil-Fuel Subsidies', IISD
- World Bank Indonesia Economic Quarterly, Dec 2005

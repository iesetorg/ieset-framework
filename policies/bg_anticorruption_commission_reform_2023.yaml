policy_id: bg_anticorruption_commission_reform_2023
status: candidate
title: Bulgaria anti-corruption commission reform 2023
countries:
- BGR
timeframe:
  start: 2023
  end: ongoing
description: 'Bulgaria adopted a 2023 anti-corruption institutional reform that replaced the previous consolidated anti-corruption and asset-forfeiture body with a new anti-corruption commission and a separate
  asset-forfeiture commission. The reform changed appointment, investigation, and case-handling arrangements for high-level corruption cases after repeated EU rule-of-law recommendations.

  '
enacted_by:
- bulgaria_rule_of_law_schengen_push_2023_present
scope: national
coalition_label_at_enactment: Denkov-Gabriel rotation coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Dedicated high-level corruption-investigation capacity and institutional separation are intended to strengthen anti-corruption enforcement.
- axis: institutional.judicial_independence
  direction: mixed
  magnitude: weak
  intended: true
  rationale: The reform created new investigative channels while leaving appointment and prosecutorial-dependence concerns for later implementation.
references:
- Bulgaria Counter-Corruption Act, State Gazette No. 84/2023
- 'European Commission, 2024 Rule of Law Report - Country Chapter Bulgaria: https://commission.europa.eu/publications/2024-rule-law-report-communication-and-country-chapters_en'

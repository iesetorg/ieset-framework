description: 'Bob Hawke (PM 1983-1991) and Paul Keating (Treasurer then PM 1991-1996) under Labor government. Structural-reform sequence: float of AUD (Dec 1983), tariff reductions (from peak 25% to ~5%
  by 1996), financial-sector deregulation with foreign-bank entry (1985), corporate + personal tax reform with dividend imputation (1986-87), Prices and Incomes Accord between ALP and ACTU (wage moderation
  paired with social-wage expansion), independent Reserve Bank target (implicit from 1993, formal 1996 agreement), superannuation guarantee (1992, covered separately), national competition policy with Hilmer
  reforms. Produced post-1992 sustained growth expansion (>28 years of unbroken quarterly GDP growth, 1992-2020). Canonical labor-government implementing market-oriented reform.

  '

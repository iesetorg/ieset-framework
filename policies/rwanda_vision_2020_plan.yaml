description: 'Vision 2020 was Rwanda''s foundational long-term development strategy, formally launched in 2000 by the Ministry of Finance and Economic Planning (MINECOFIN) under the Kagame government. It
  set targets to transform Rwanda into a middle-income knowledge-based economy, anchoring sequenced Economic Development and Poverty Reduction Strategies (EDPRS I and II) with measurable sectoral milestones.

  '

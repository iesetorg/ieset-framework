policy_id: pe_afp_sixth_withdrawal_2022
status: candidate
title: Afp Sixth Withdrawal 2022
countries:
- PER
timeframe:
  start: 2021
  end: 2022
description: 'Sixth congressional authorisation for AFP affiliates in Peru to withdraw funds from their private pension accounts, enacted during the Castillo presidency in 2022. The law continued the COVID-era
  pattern of legislative bypasses of preservation rules, accelerated drawdown of pension assets, and was opposed by the central bank, the SBS supervisor, and the AFP industry on grounds of long-run pension
  adequacy and domestic capital-market depth.

  '
enacted_by:
- peru_castillo_peru_libre_2021_2022
axes_moved:
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: AFP industry structure unchanged; withdrawal mechanic operated within existing private-pension regime.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Withdrawal authorisation did not change the corporate tax base or rates applied to AFP managers.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Released pension balances to households as a quasi-transfer without expanding the budget deficit.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: BCRP independence formally untouched though it publicly opposed the withdrawal sequence.

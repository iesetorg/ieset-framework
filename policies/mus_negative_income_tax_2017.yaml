policy_id: mus_negative_income_tax_2017
status: candidate
title: Mauritius negative income tax scheme 2017
countries:
- MUS
timeframe:
  start: 2017
  end: ongoing
  enacted_date: '2017-07-01'
description: 'Mauritius introduced a negative income tax scheme for low-paid workers, administered through the Mauritius Revenue Authority. The scheme uses wage and income thresholds to pay monthly top-ups
  to eligible employees, expanding in-work support through the tax administration rather than through a separate welfare agency.

  '
enacted_by:
- mauritius_tax_social_admin_modernisation_2017_present
scope: national
coalition_label_at_enactment: MSM-led government
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Monthly top-ups for low-paid employees expand targeted in-work cash support.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Delivery through the tax authority ties eligibility to formal payroll and income records.
references:
- Mauritius Revenue Authority, Negative Income Tax portal.
- Mauritius Finance Act and budget materials establishing the negative income tax, 2017.

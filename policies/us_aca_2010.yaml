policy_id: us_aca_2010
status: candidate
title: Aca 2010
countries:
- USA
timeframe:
  start: 2009
  end: 2012
description: 'The Patient Protection and Affordable Care Act, signed 23 March 2010 by President Obama and amended by the Health Care and Education Reconciliation Act of 30 March 2010, expanded health coverage
  through state-based insurance Marketplaces with refundable premium tax credits (incomes 100-400% of federal poverty), Medicaid expansion (made optional by NFIB v. Sebelius in 2012), an individual mandate,
  employer mandates for firms over 50, and insurance-market rules banning pre-existing-condition denial. The intended effect was to add ~30 million previously uninsured Americans to coverage, slow private
  health-spending growth, and complete the 20th-century-aspiration of near-universal US health insurance.

  '

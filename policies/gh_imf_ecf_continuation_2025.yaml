# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: gh_imf_ecf_continuation_2025
status: candidate
title: Ghana IMF ECF continuation and post-default stabilisation path (2025)
countries:
- GHA
timeframe:
  start: 2025
  end: ongoing
description: >
  Continuation under the Mahama government of Ghana's IMF Extended Credit Facility
  programme and associated post-default reform path. The bundle keeps the primary
  surplus and debt-sustainability targets from the 2023 programme, pursues external
  creditor restructuring after the domestic debt exchange, limits renewed Bank of
  Ghana financing of the budget, and ties disbursements to revenue administration,
  public-finance management, energy-sector arrears, and state-owned-enterprise
  discipline.
enacted_by:
- ghana_mahama_ndc_second_2025_present
coalition_label_at_enactment: NDC Mahama second government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: IMF programme conditionality keeps primary-balance and debt-service targets binding, restraining discretionary spending after the 2022 default.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Programme design restores limits on central-bank financing of the fiscal authority and anchors disinflation around BoG operational discipline.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-finance-management and SOE-arrears conditionality modestly strengthens fiscal governance and auditability.
linked_hypotheses:
- africa_ghana_imf_program_2022_debt_distress
- fiscal_consolidation_credibility_growth
- central_bank_independence_inflation_discipline
references:
- IMF Ghana Extended Credit Facility programme reviews, 2023-2025
- Ghana Ministry of Finance 2025 Budget Statement and Economic Policy
notes: Created to materialise a declared policy on ghana_mahama_ndc_second_2025_present.

policy_id: id_jokowi_vat_hike_2022
status: candidate
title: VAT rate hike from 10% to 11% (UU HPP) 2022
countries:
- IDN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-04-01'
description: 'Article 7 of UU No. 7/2021 on Harmonisation of Tax Regulations (UU HPP, enacted October 2021) raised Indonesia''s standard VAT rate from 10% to 11% effective 1 April 2022, with a further step
  to 12% scheduled by 1 January 2025. Part of a wider post-COVID fiscal-consolidation package that also introduced a carbon tax (delayed), added a 35% top PIT bracket, and rationalised CIT schedules. Rationalised
  zero-rated and exempt-good lists, narrowing the exemption base. Estimated yield ~Rp 60tn annually.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIM+ super-coalition
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: false
  rationale: VAT is broadly regressive; 35% top PIT bracket offsets mildly.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue-side consolidation post-COVID widens fiscal envelope without cutting outlays.

policy_id: cn_soe_grasp_large_let_go_small_1995
status: candidate
title: 'SOE Reform: Grasp the Large, Let Go of the Small (抓大放小) 1995-2001'
countries:
- CHN
timeframe:
  start: 1995
  end: 2001
description: 'State-owned-enterprise restructuring programme formalised at the 15th Party Congress (September 1997) but implemented from 1995 on. Central and provincial governments retained roughly 500-1,000
  large strategic-sector SOEs (energy, telecoms, banking, defence, rail) consolidated into national champions, while tens of thousands of small and medium SOEs were corporatised, leased, merged, sold to
  management, or shut down. Approximately 40 million SOE workers were laid off (xiagang) between 1996 and 2002, with state-sector employment falling from ~113M (1995) to ~73M (2002). The largest industrial
  restructuring of the modern era and the structural precondition for WTO-era manufacturing expansion.

  '
enacted_by:
- china_jiang_era_1989_2002
coalition_label_at_enactment: CCP under Jiang Zemin + Zhu Rongji
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Small-SOE exit opened product markets to private / FIE entry.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  intended: true
  rationale: '''Iron rice bowl'' dismantled; ~40M xiagang layoffs 1996-2002.'
- axis: fiscal.sectoral_subsidy

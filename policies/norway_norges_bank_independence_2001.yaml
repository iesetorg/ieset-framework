policy_id: norway_norges_bank_independence_2001
status: candidate
title: Norway Norges Bank Independence 2001
countries:
- NOR
timeframe:
  start: 2001
  end: ongoing
description: 'Norway''s central-bank reform of 29 March 2001, set in the Royal Decree on inflation targeting and amendments to the Norges Bank Act, gave Norges Bank explicit operational independence to
  set policy rates targeting 2.5% CPI inflation (revised to 2% in 2018), with the Ministry of Finance retaining only ultimate accountability. Combined with the simultaneous handlingsregel fiscal rule, the
  intended effect was to consolidate a credible monetary-fiscal framework distinguishing oil-revenue management from short-run macroeconomic policy.

  '

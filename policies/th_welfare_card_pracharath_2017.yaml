policy_id: th_welfare_card_pracharath_2017
status: candidate
title: Thailand state welfare card (Bat Sawasdikan Haeng Rat) 2017
countries:
- THA
timeframe:
  start: 2017
  enacted_date: '2017-10-01'
description: 'State Welfare Card programme launched 1 October 2017 under the NCPO, delivering means-tested monthly benefits (initially 200-300 baht) to adults earning under 100,000 baht per year, plus utility
  subsidies, free public-transport credits (BMTA, MRT, public bus), and cooking- gas vouchers. Enrolment reached roughly 14.5 million holders by 2020 and became the default delivery rail for later cash
  transfers including COVID relief, senior-citizen top-ups, and the Srettha-era digital-wallet first tranche (September 2024). The card is delivered through Krung Thai Bank and integrates with the PromptPay
  national instant-payment rail.

  '

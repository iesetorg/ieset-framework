policy_id: uy_fonasa_snis_health_reform_2007
status: candidate
title: Uruguay FONASA-SNIS universal health insurance reform
countries:
- URY
timeframe:
  start: 2007
  end: ongoing
  enacted_date: '2007-12-05'
description: 'Ley 18.211 (5 Dec 2007) created Sistema Nacional Integrado de Salud (SNIS) + Fondo Nacional de Salud (FONASA) single-payer pooling mechanism. Financed by progressive payroll contributions
  (3-8% based on income + family), employer contribution 5%, + Treasury transfers. Covers public (ASSE) + private (IAMCs) providers under capitation + incentive contracts. Coverage expanded from ~650k (2008)
  to ~2.6m (2020) — ~75% of population. First universal-coverage framework in LatAm.

  '

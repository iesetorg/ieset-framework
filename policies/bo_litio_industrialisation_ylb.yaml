policy_id: bo_litio_industrialisation_ylb
status: candidate
title: YLB state-led lithium industrialisation (Salar de Uyuni)
countries:
- BOL
timeframe:
  start: 2017
  end: ongoing
description: 'State-monopoly lithium-industrialisation project through Yacimientos de Litio Bolivianos (YLB), created 2017 by Ley 928 with exclusive rights over Bolivia''s salar resources. Initial German
  partnership with ACI Systems (2018) cancelled 2019 after Potosí civic protests. Arce government signed direct-lithium-extraction (DLE) agreements with Chinese consortium CBC (CATL-BRUNP-CMOC, USD 1.4bn,
  Jan 2023) and Russian Uranium One (Jun 2023) to build industrial-scale plants. Industrial-scale battery-grade output had not been achieved by 2024 despite the world''s largest identified lithium resource
  base.

  '
enacted_by:
- bolivia_morales_third_crisis_2014_2019
- bolivia_arce_mas_2020_present
coalition_label_at_enactment: MAS-IPSP
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  rationale: State monopoly on strategic mineral with foreign tech partners only as contractors.
  intended: true
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Large state capital investment in YLB industrial complexes.
  intended: true
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  rationale: ACI Systems contract cancellation; private extraction rights foreclosed.
  intended: true
references:
- Ley 928 (2017) creating YLB
- YLB-CBC agreement announcement January 2023

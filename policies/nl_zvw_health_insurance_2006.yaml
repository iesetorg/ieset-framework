policy_id: nl_zvw_health_insurance_2006
status: candidate
title: Zorgverzekeringswet — universal private health insurance
countries:
- NLD
timeframe:
  start: 2006
  enacted_date: '2006-01-01'
description: 'Zorgverzekeringswet of 16 June 2005, effective 1 January 2006, replaced the dual public/private sickness-fund system with a single mandatory private-insurance model: all residents must purchase
  a basic-package health insurance from a regulated private insurer; risk-equalisation fund compensates insurers for high-risk insureds; income-dependent premium contribution plus nominal premium; low-income
  households receive zorgtoeslag subsidy. Textbook "regulated competition" (Enthoven) model at universal scale.

  '

description: 'Under the Modi third-term government, the Production Linked Incentive scheme continues across its 14 priority sectors with revised disbursement schedules, sector-specific extensions for semiconductors
  and electronics components, and integration with the Bharat Semiconductor Mission. The policy maintains incremental-sales-based incentive payouts and links performance review to value-addition and employment
  metrics.

  '

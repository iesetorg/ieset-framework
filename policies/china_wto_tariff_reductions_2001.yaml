policy_id: china_wto_tariff_reductions_2001
status: candidate
title: China Wto Tariff Reductions 2001
countries:
- CHN
timeframe:
  start: 2001
  end: 2015
description: 'Schedule of bound tariff reductions committed by China upon WTO accession in December 2001, lowering simple-average industrial tariffs from roughly 24% in 1997 to about 9% by 2010, with deeper
  cuts on agricultural and manufactured goods. Implemented through annual tariff schedules issued by the State Council Tariff Commission and binding the autonomous-trade regime to multilateral commitments.

  '
enacted_by:
- china_wto_accession_2001
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Bound tariff cuts of roughly 15 percentage points across industrial goods sharply reduced import barriers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower import prices intensified competitive pressure on protected domestic producers in many sectors.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: WTO bindings constrained discretionary tariff hikes, giving traders predictable contractual entitlements.

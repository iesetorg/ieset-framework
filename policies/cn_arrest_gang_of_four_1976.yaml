description: 'On 6 Oct 1976, one month after Mao''s death, Hua Guofeng with support from Marshal Ye Jianshuai and Wang Dongxing ordered the arrest of the Gang of Four — Jiang Qing, Zhang Chunqiao, Yao Wenyuan,

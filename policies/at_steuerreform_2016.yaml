policy_id: at_steuerreform_2016
status: candidate
title: Steuerreform 2015/2016 tax reform
countries:
- AUT
timeframe:
  start: 2016
  enacted_date: '2016-01-01'
description: 'Tax reform package effective 1 Jan 2016 — restructured PIT from three marginal-rate brackets to seven, lowering entry-rate from 36.5% to 25%, introducing a time-limited 55% top rate above
  EUR 1m (sunset 2020, later extended). Partially financed by bank-secrecy easing for tax administration, higher capital-gains rates on real-estate disposals, and fraud-control measures.

  '

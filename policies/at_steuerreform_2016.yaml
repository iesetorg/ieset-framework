  rationale: New 55% top bracket and lower entry-rate; somewhat progressive.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Capital-gains rate on real-estate disposals raised from 25% to 30%.

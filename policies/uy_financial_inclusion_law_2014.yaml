description: 'Ley 19.210 (29 Apr 2014) mandated wages + pensions + honoraria paid via electronic means; limited cash transactions above set thresholds; VAT rebate on debit/credit card purchases; regulated
  payment-service providers. Gradual phase-in 2014-2017. Bancarisation rate rose from ~40% (2013) to ~65% (2020). Reduced informality + broadened tax-administration visibility.

  '

policy_id: thailand_imf_letter_of_intent_1997
status: candidate
title: Thailand Imf Letter Of Intent 1997
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'In August 1997 Thailand signed the first of several Letters of Intent with the IMF for a 17.2 billion dollar standby credit, committing the Chavalit (and successor Chuan) governments to fiscal
  surplus targets, tight monetary policy, financial-sector restructuring, and removal of capital controls. The conditionality framework drove the 1997-99 reform agenda spanning bank closures, privatisation,
  and central-bank reform.

  '

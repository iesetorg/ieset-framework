policy_id: cn_property_rights_law_2007
status: candidate
title: Property Rights Law 2007
countries:
- CHN
timeframe:
  start: 2002
  end: 2012
description: 'Property Law of the PRC enacted by the 10th NPC in March 2007 under the Hu-Wen leadership. For the first time placed state, collective, and private property on a formally equal footing, codified
  rules on land-use rights, mortgages, and pledges, and provided procedures for enforcement of property claims. Foundational for the post-WTO expansion of private investment and household real-estate wealth.

  '

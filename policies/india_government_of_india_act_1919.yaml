policy_id: india_government_of_india_act_1919
status: candidate
title: Government of India Act 1919 (Montagu-Chelmsford reforms)
countries: [IND]
timeframe:
  start: 1919
  end: 1935
  enacted_date: "1919-12-23"
description: >
  The Government of India Act 1919 implemented the Montagu-Chelmsford
  reforms by creating provincial dyarchy, enlarging central and
  provincial legislatures, widening the limited franchise, and dividing
  provincial subjects into "reserved" and "transferred" departments.
  It marked a significant step beyond the 1909 reforms in formal
  representative government, but core coercive and fiscal powers
  remained under executive and imperial control, and communal
  electorates were retained and expanded.
enacted_by:
  - india_late_raj_constitutional_devolution_1909_1947
axes_moved:
  - axis: institutional.rule_of_law
    direction: mixed
    magnitude: moderate
    intended: true
    rationale: "Dyarchy and larger legislatures increased accountable government at the margin, but imperial override powers and narrow communal franchise kept the constitutional order only partially representative."
references:
  - "Government of India Act 1919"
  - "Metcalf & Metcalf (2012), A Concise History of Modern India"
  - "Chandra et al. (1989), India's Struggle for Independence"

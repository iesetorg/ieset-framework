description: 'Joint tripartite statement by Iran, Saudi Arabia, and China signed in Beijing 10 Mar 2023 restoring diplomatic relations severed since Jan 2016, reopening embassies within two months, and
  reactivating 2001 security and 1998 trade/economic/cultural cooperation agreements. Signalled China''s diplomatic brokerage role in the Gulf and reduced near-term proxy-confrontation risk (Yemen de-escalation).
  Trade and investment follow-through constrained through 2024-2025 by Saudi exposure to US secondary-sanctions regime and by regional escalation including Gaza war and Israel-Iran exchanges.

  '

policy_id: sk_flat_tax_19_percent_2004
status: candidate
title: 19 percent flat tax (PIT/CIT/VAT) 2004
countries:
- SVK
timeframe:
  start: 2004
  enacted_date: '2004-01-01'
description: 'Unified 19% rate across personal income tax (replacing a 5-bracket progressive schedule peaking at 38%), corporate income tax (from 25%), and VAT (top rate 20%->19%, reduced 14%->19%). Designed
  by Finance Minister Ivan Miklos, effective 1 January 2004. Abolished dividend tax, eliminated most exemptions. Paradigmatic flat-tax case study.

  '

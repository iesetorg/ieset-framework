policy_id: sk_corporate_tax_increase_2025
status: candidate
title: Slovakia corporate tax increase 2025
countries:
- SVK
timeframe:
  start: 2025
  end: ongoing
description: 'Slovakia''s 2025 consolidation package raised the corporate income tax burden for larger companies while pairing the change with other revenue measures and selected lower rates for smaller
  businesses. The reform was part of a broader deficit-reduction package that also adjusted indirect taxes and introduced a financial transaction tax.

  '
enacted_by:
- slovakia_fico_fourth_2023_present
scope: national
coalition_label_at_enactment: Smer-SD-Hlas-SNS coalition
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: The main corporate tax rate rose for larger firms, increasing the effective tax burden on covered corporate income.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The revenue package was presented as a consolidation measure to narrow Slovakia's deficit path.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher rates for larger companies and lower treatment for smaller firms make the business-tax schedule more graduated.
references:
- Slovakia 2025 consolidation package and corporate income tax amendments
- Slovak Ministry of Finance, 2025 public-finance consolidation materials

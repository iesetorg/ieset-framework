policy_id: australia_clean_energy_act_2011
status: candidate
title: Australia Clean Energy Act 2011
countries:
- AUS
timeframe:
  start: 2011
  end: 2014
description: 'The Clean Energy Act 2011 enacted under the Gillard Labor government with Greens support introduced Australia''s first national carbon-pricing mechanism, applying a fixed AUD 23/tCO2 charge
  from 1 July 2012 on roughly 350 large emitters, scheduled to transition to a cap-and-trade scheme linked to the EU ETS in 2015. Paired with the Renewable Energy Target expansion and Clean Energy Finance
  Corporation, the package recycled revenue through household compensation and tax cuts.

  '

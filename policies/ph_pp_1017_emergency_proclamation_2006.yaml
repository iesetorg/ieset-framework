description: 'Proclamation 1017 issued 24 February 2006 by President Arroyo declaring state of national emergency citing coup plot (Magdalo-Palparan alleged destabilisation), lifted one week later 3 March
  2006. Executive Order 464 restricted cabinet members'' Senate testimony without presidential permission (separate measure, September 2005). Supreme Court ruling Randolf David v. Arroyo 3 May 2006 partially
  struck PP 1017 — upheld calling-out power to the AFP but struck warrantless search-and-arrest provisions and "takeover" clause of privately-owned businesses as unconstitutional. Daily Tribune raid and
  Gloria Ilagan arrest during the week-long emergency became flashpoints.

  '

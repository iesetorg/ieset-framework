policy_id: vn_us_bilateral_trade_agreement_2000
status: candidate
title: Vietnam-US Bilateral Trade Agreement (BTA, 2000)
countries:
- VNM
timeframe:
  start: 2000
  end: 2001
  enacted_date: '2000-07-13'
description: 'US-Vietnam Bilateral Trade Agreement signed 13 July 2000 in Washington DC by PM Phan Van Khai''s administration and Clinton administration; ratified by both and in effect 10 December 2001.
  Extended MFN status to Vietnam (cutting average US tariff on Vietnamese goods from 40% to 4%), opened Vietnamese market to US services and investment, required IPR protections, transparency commitments.
  Triggered textile/footwear export boom (textile exports to US rose from $50m (2001) to $2.7bn (2005)). Foundation for WTO accession 2007.

  '
enacted_by:
- vietnam_khai_manh_doi_moi_deepening_1997_2006
coalition_label_at_enactment: CPV under Phan Van Khai-Le Kha Phieu then Nong Duc Manh

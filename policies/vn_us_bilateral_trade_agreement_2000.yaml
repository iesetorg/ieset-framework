  intended: true
  rationale: MFN access collapsed average US tariff from 40% to 4%; services and investment chapters.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Services chapter required market access for US banking, insurance, telecoms; IPR regime upgraded.

description: 'Agricultural and Rural Debt Relief Scheme announced Feb 1990 waiving farmer loans up to ₹10,000 to public-sector banks and cooperatives. Total cost estimated ~₹6,000 crore, recognised as a
  precedent for subsequent farm-loan waivers. Contributed to PSB balance-sheet stress and to fiscal deficit trajectory toward the 1991 balance-of-payments crisis.

  '

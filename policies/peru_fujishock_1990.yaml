- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Subsidy removal and emergency consolidation cut primary spending sharply during 1990–1991 stabilisation.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Tariff dispersion was collapsed and quantitative restrictions removed alongside the price-shock package.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Removal of price controls and import barriers exposed sheltered sectors to competitive discipline.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Stabilisation ended monetary financing of the deficit and laid groundwork for a rules-based BCRP regime.

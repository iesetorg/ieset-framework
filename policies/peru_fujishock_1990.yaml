policy_id: peru_fujishock_1990
status: candidate
title: Peru Fujishock 1990
countries:
- PER
timeframe:
  start: 1990
  end: 2000
description: 'The "Fujishock" stabilisation package announced by Finance Minister Juan Carlos Hurtado Miller in August 1990 ended Peru''s hyperinflation through abrupt elimination of price subsidies, sharp
  utility and fuel price corrections, fiscal consolidation, and the unification of the exchange rate. The programme was paired with rapid trade liberalisation and the foundation of an inflation-targeting
  monetary regime that anchored Peru''s later macroeconomic stability.

  '

policy_id: chile_fx_opening_1976
status: candidate
title: Chile Fx Opening 1976
countries:
- CHL
timeframe:
  start: 1975
  end: 1990
description: 'Chile''s foreign-exchange opening, implemented from 1976 through Banco Central decisions and Decreto Ley supplementing the 1975 stabilisation plan, dismantled multiple exchange rates, liberalised
  current-account FX transactions, and from 1979 fixed the peso to the dollar at 39 per USD. Capital-account opening followed in stages. The intended effect was to anchor inflation, integrate Chile with
  global capital, and import price discipline; the 1982 collapse of the peg led to a managed-float regime.

  '

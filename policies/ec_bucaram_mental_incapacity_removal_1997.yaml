description: 'Congreso Nacional voted 44-34 on 6 February 1997 to declare Bucaram mentally incapacitated under Article 100 of the 1979 Constitution, invoked without psychiatric evaluation or due- process
  hearing. Constitutional crisis with three simultaneous claimants to the presidency: Bucaram (disputing removal), Vice-President Rosalía Arteaga, and Congressional President Fabián Alarcón. Military intervention

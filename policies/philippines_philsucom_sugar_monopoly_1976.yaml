policy_id: philippines_philsucom_sugar_monopoly_1976
status: candidate
title: Philippines Philsucom Sugar Monopoly 1976
countries:
- PHL
timeframe:
  start: 1965
  end: 1986
description: 'Establishment of the Philippine Sugar Commission (PHILSUCOM) and its trading arm NASUTRA under Marcos-era presidential decrees, giving the state monopoly control over sugar pricing, milling
  quotas, and exports. The structure, headed by Marcos confidant Roberto Benedicto, transferred sugar-sector rents to crony entities, depressed planter incomes, and contributed to Negros province rural
  distress documented through the 1980s.

  '
enacted_by:
- philippines_marcos_authoritarian_economy_1965_1986
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: PHILSUCOM/NASUTRA monopoly imposed centralised quotas and export licensing across the sugar industry.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Decree-driven monopolisation and crony allocation operated outside ordinary administrative-law constraints.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Forced producer pricing and trading-monopoly margins eroded planters' realised property rents.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Republic Planters Bank and NASUTRA-routed credit operated as state-backed sectoral subsidy to crony millers.

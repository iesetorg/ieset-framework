policy_id: brazil_privatisations_1995_2000
status: candidate
title: Brazil Privatisations 1995 2000
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'Under Cardoso the National Privatisation Programme (PND), administered by BNDES, divested major federal state-owned enterprises in steel (CSN, Usiminas earlier under Collor; final tranches
  under Cardoso), telecoms (Telebras 1998 split into 12 holdings sold for ~R$22 billion), mining (Vale 1997), and electricity. The programme was complemented by a 1995 constitutional amendment ending state
  monopolies in telecoms and oil distribution and was a core leg of Real-Plan-era macro stabilisation by reducing federal contingent liabilities.

  '
enacted_by:
- brazil_real_plan_cardoso_1994_2002
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privatisation receipts retired federal debt, reducing implicit pressure on Banco Central.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Removed soft-budget channels through state-bank lending to federal SOEs that had monetised losses.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Telebras break-up and steel/mining divestitures opened previously monopolised sectors to entry.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removed loss-making SOEs from federal subsidy stream and retired debt with sale proceeds.

description: 'Eswatini adopted a National Development Plan for 2023/24-2027/28 to organize medium-term policy around economic recovery, private-sector development, infrastructure, human capital, food
  security, public-sector effectiveness, and macro-fiscal stability. The plan continues the monarchy-led development-planning model while framing investment and reform priorities after the pandemic shock.

  '

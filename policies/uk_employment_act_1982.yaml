description: 'Second Thatcher-era trade-union legislation under Norman Tebbit. Removed trade unions'' statutory immunity from civil actions for damages arising from unlawful industrial action — exposing
  union funds to sequestration. Tightened definition of a ''trade dispute''. Pivotal in later Miners'' Strike 1984-85 resolution as NUM funds were sequestered under this Act.

  '

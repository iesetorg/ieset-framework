policy_id: bd_rental_power_quick_enhancement_2010
status: candidate
title: Quick Enhancement of Electricity and Energy Supply (Special Provisions) Act 2010
countries:
- BGD
timeframe:
  start: 2010
  enacted_date: '2010-10-11'
description: 'Jatiya Sangsad passed on 11 October 2010 a special-provisions Act permitting no-bid, immunity-from-challenge contracting for power and energy projects, used to award dozens of rental-power
  and quick-rental oil-fired plants on capacity-payment terms. Indemnity provision explicitly barred judicial review of procurement decisions. Repeatedly renewed; became a major source of fiscal cost through
  capacity payments and a marker of the AL regime''s politically-connected energy-sector procurement.

  '
enacted_by:
- bangladesh_hasina_al_2_3_term_2009_2018
- bangladesh_hasina_al_fourth_term_2019_2024
coalition_label_at_enactment: Awami League
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: Capacity payments to idle rental plants exceeded BDT 1tn cumulatively.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  rationale: Indemnity provision barred judicial review of procurement.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  rationale: No-bid procurement suppressed competitive IPP market.

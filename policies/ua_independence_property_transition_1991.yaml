policy_id: ua_independence_property_transition_1991
status: candidate
title: Ukraine independence property-transition legislation 1991
countries: [UKR]
timeframe: {start: 1991, end: 1992}
description: >
  After the 1991 independence referendum, Ukraine began converting Soviet
  state ownership into national legal ownership and adopted early laws on
  property, enterprise activity, and privatisation. The legal shift created
  the formal basis for private and collective property, while administrative
  controls and weak courts left enforcement incomplete.
enacted_by:
  - ukraine_independence_transition_1991_1999
axes_moved:
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, intended: true, rationale: "Private and collective property categories were legally recognised outside the Soviet all-state ownership model."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, intended: true, rationale: "Enterprise activity was partially liberalised, though state allocation and inherited monopolies remained."}
references:
  - "World Bank, Ukraine: Restoring Growth with Equity (1999)"
  - "EBRD transition reports on Ukraine, early 1990s"

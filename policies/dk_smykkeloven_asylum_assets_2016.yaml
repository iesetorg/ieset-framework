policy_id: dk_smykkeloven_asylum_assets_2016
status: candidate
title: Smykkeloven ('jewellery law') — Danish asylum-seeker asset seizure 2016
countries:
- DNK
timeframe:
  start: 2016
  end: ongoing
  enacted_date: '2016-02-03'
description: 'Lov nr. 102 af 3. februar 2016 (L 87), colloquially ''smykkeloven'', authorised Danish police to search and seize assets above DKK 10,000 from asylum seekers to offset the cost of their reception
  and processing, while exempting items of sentimental value including wedding rings. Part of a wider deterrence-oriented package that also extended family-reunification wait times and tightened permanent-
  residence criteria. Drew international criticism but was parliamentary symbol of the Løkke Rasmussen II government''s migration line and prefigured the 2019 paradigmeskift.

  '
enacted_by:
- denmark_lokke_rasmussen_venstre_2015_2019
coalition_label_at_enactment: Venstre single-party minority with Dansk Folkeparti, Liberal Alliance, Konservative, and Socialdemokratiet support

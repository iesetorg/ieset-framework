  rationale: Signalling and financial-deterrence component of the 2015-2016 tightening package.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Authorises asset seizure from a class of persons at border — bounded property-rights carve-out.
references:

description: 'Congreso Constituyente Democrático (CCD) elected November 1992 drafted the 1993 Constitution. Approved by referendum 31 October 1993 with 52.24% Sí / 47.76% No and 28% blank or null. Key changes
  from 1979: re-election of the president allowed (consecutive terms), unicameral 120-seat Congress, market-economy principles (Título III Régimen Económico Art. 58-89), death penalty for treason-at-war,
  reduction of state role in economy.


policy_id: kr_seoul_olympics_preparation_1981_1988
status: candidate
title: 1988 Seoul Olympics preparation (South Korea)
countries:
- KOR
timeframe:
  start: 1981
  end: 1988
  enacted_date: '1981-09-30'
description: 'Seoul awarded 1988 Summer Olympics on 30 Sep 1981 by the IOC at Baden-Baden. Preparation drove infrastructure spending — Olympic Park (Songpa-gu), Subway Lines 3 and 4, Han River clean-up,
  Incheon International Airport planning, road upgrades. Hosted 1986 Asian Games as a dry-run. Used as a legitimacy device for the Chun regime and a forcing function for democratic opening (IOC pressure
  contributed to 1987 transition).

  '

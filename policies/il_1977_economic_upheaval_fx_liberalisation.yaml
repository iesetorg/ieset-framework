  magnitude: moderate
  rationale: Removal of multiple-rate FX system and opening of FX current-account convertibility.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: Residents permitted foreign-currency accounts; capital controls relaxed.

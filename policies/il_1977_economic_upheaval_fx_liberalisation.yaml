policy_id: il_1977_economic_upheaval_fx_liberalisation
status: candidate
title: Israel 1977 Economic Upheaval — FX liberalisation
countries:
- ISR
timeframe:
  start: 1977
  enacted_date: '1977-10-28'
description: 'Finance Minister Simcha Ehrlich''s 28 October 1977 announcement removed the multiple-exchange-rate system, devalued the lira ~43% vs USD, lifted most foreign-exchange controls, and allowed
  residents to hold foreign currency accounts. Designed to launch an open-market model replacing Mapai-era dirigisme. Inflation accelerated and the liberalisation partially unravelled before the 1985 stabilisation.

  '

description: 'El Plan El Salvador Seguro, launched in January 2015 by the Consejo Nacional de Seguridad Ciudadana y Convivencia, set out a multi-pronged anti-gang strategy combining police ''extraordinary
  measures'' in prisons, territorial deployment in 50 priority municipalities, prevention spending, and victim support. Implementation under the Sánchez Cerén government coincided with one of the country''s
  highest-homicide periods and elevated security spending across multiple ministries.

  '

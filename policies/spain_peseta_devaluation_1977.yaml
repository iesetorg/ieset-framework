policy_id: spain_peseta_devaluation_1977
status: candidate
title: Spain Peseta Devaluation 1977
countries:
- ESP
timeframe:
  start: 1977
  end: 1985
description: 'Spain''s 19.84% devaluation of the peseta on 12 July 1977, conducted under the Suarez UCD government, was the centrepiece of the new democracy''s macroeconomic adjustment programme that preceded
  the Pactos de la Moncloa of October 1977. The devaluation was paired with a more flexible managed-float regime and successive Bank of Spain interest-rate hikes. The intended effect was to restore competitiveness
  after the 1973 oil-shock current-account deterioration, anchor Spain''s reintegration into the international monetary system, and create the conditions for the Moncloa consensus on wage moderation, fiscal
  reform, and structural liberalisation.

  '

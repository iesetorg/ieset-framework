policy_id: be_nuclear_phaseout_law_2003
status: candidate
title: Nuclear Phaseout Law 2003
countries:
- BEL
timeframe:
  start: 1999
  end: 2007
description: 'The Loi sur la sortie progressive de l''énergie nucléaire à des fins de production industrielle d''électricité (31 January 2003), adopted under the Verhofstadt I purple coalition with Ecolo/Groen
  participation, prohibited new nuclear-plant construction and limited operating life of existing reactors to 40 years. The seven Doel and Tihange units were scheduled for closure between 2015 and 2025,
  subsequently amended through extension laws as supply-security concerns rose.

  '
enacted_by:
- belgium_verhofstadt_purple_1999_2007

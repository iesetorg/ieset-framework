status: candidate
title: The Gambia Access to Information Act 2021
countries:
- GMB
timeframe:
  start: 2021
  end: ongoing
description: 'The Gambia enacted an Access to Information Act to create a statutory right for citizens and residents to request information from public bodies, with procedures, exemptions, and oversight
  arrangements for disclosure. The measure moved the post-Jammeh transparency agenda from policy statements into a legal framework for administrative accountability.

  '

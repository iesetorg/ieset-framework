status: candidate
title: India IMF Structural Adjustment negotiation initiation 1991
countries:
- IND
timeframe:
  start: 1991
  end: 1991
description: 'India initiated IMF negotiations Jan 1991 under Chandra Shekhar caretaker government amid balance-of-payments crisis; formal Structural Adjustment Standby Arrangement approved Oct 1991 ($2.3bn)
  under Rao-Singh government. Letter of Intent required industrial licensing reform, fiscal consolidation, trade liberalisation, and exchange-rate flexibility — conditions that structured the 1991 economic
  reforms.

  '

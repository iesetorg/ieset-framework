title: Yingluck Amnesty Bill 2013
countries:
- THA
timeframe:
  start: 2011
  end: 2014
description: 'In November 2013 the Yingluck Pheu Thai government''s blanket amnesty bill — passed by the lower house at 4am — sought to wipe political offences from 2004 onward, which would have allowed
  Thaksin Shinawatra to return without serving his 2008 corruption conviction. The bill triggered mass street protests by the PDRC, was rejected by the Senate, and ultimately precipitated the political
  crisis that culminated in the May 2014 coup.

  '

policy_id: my_ekonomi_madani_framework_2023
status: candidate
title: Ekonomi Madani framework (Malaysia, 2023)
countries:
- MYS
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-07-27'
description: 'Anwar Ibrahim government''s flagship economic narrative framework, launched 27 July 2023. ''Madani'' (civil/dignified) frames seven targets over a decade: top-30 global economy by size, top-12
  competitiveness rank, top-25 Human Development Index, labour income share raised from 32% to 45% of GDP, female labour-force participation to 60%, fiscal deficit to 3% of GDP, and top-25 Corruption Perceptions
  Index ranking. Operational pillars: Fiscal Responsibility Act 2023, National Energy Transition Roadmap (NETR, Aug 2023), New Industrial Master Plan 2030 (NIMP 2030, Sep 2023), and the Mid-Term Review
  of the 12th Malaysia Plan.

  '
enacted_by:
- malaysia_anwar_unity_2022_present
coalition_label_at_enactment: Pakatan Harapan + Barisan Nasional Unity Government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Fiscal Responsibility Act 2023 sets statutory medium-term deficit/debt ceilings.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: NETR commits coal phase-out by 2044 and 70% RE capacity target by 2050.
- axis: fiscal.sectoral_subsidy

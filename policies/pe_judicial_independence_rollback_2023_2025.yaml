policy_id: pe_judicial_independence_rollback_2023_2025
status: candidate
title: Judicial Independence Rollback 2023 2025
countries:
- PER
timeframe:
  start: 2022
  end: ongoing
description: 'Sequence of legislative and constitutional-tribunal moves under the Boluarte–congressional alliance (2023–2025) that weakened independent oversight bodies, including changes to the Junta Nacional
  de Justicia, restrictions on prosecutorial autonomy, and reforms affecting electoral and constitutional courts. Domestic civil society and the Inter-American system flagged the package as a measurable
  rollback of judicial independence and rule-of-law guarantees.

  '

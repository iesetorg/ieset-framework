policy_id: sri_lanka_food_stamp_scheme_1979
status: candidate
title: Lanka Food Stamp Scheme 1979
countries:
- LKA
timeframe:
  start: 1977
  end: 1994
description: 'Sri Lanka''s Food Stamp Scheme, introduced in September 1979 under the Jayewardene UNP government, replaced the universal rice-subsidy ration with a means-tested coupon programme entitling
  households below an income threshold to vouchers redeemable for rice, flour, and sugar. The scheme was administered by the Department of Food and complemented by the post-1977 Open Economy liberalisation.
  The intended effect was to compress the regressive universal subsidy bill, target food relief to the poorest 50% of households, free fiscal space for export-led growth, and align social policy with the
  structural-adjustment direction of the Jayewardene reforms.

  '
enacted_by:
- sri_lanka_open_economy_1977
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Replacing universal food subsidy aligned with the Open Economy's removal of import controls on staples.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Phase-out of universal subsidy let private retail compete with state Co-op supply chains.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Means-tested vouchers replaced universal rice ration, contracting aggregate food-transfer expenditure.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Targeted coupons functioned as a sectoral food-subsidy delivery to qualifying households.

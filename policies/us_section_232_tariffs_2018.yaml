policy_id: us_section_232_tariffs_2018
status: candidate
title: Section 232 Tariffs 2018
countries:
- USA
timeframe:
  start: 2018
  end: 2019
description: 'The 2018 Section 232 tariffs, imposed under Presidential Proclamations 9704 and 9705 of 8 March 2018 invoking national-security authority of the Trade Expansion Act of 1962, set 25% steel
  and 10% aluminum tariffs on most foreign-source supplies, alongside ongoing investigations into automotive imports under the same statutory authority. The intended effect was to elevate metals-tariff
  policy out of the conventional WTO disciplines, restore domestic capacity in industries Trump considered strategically critical, and demonstrate aggressive use of executive trade authority in the first
  sustained tariff escalation since the 1980s.

  '

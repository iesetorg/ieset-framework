policy_id: vn_chip_semiconductor_strategy_2023_present
status: candidate
title: Vietnam chip / semiconductor industrial-policy push 2023-present
countries:
- VNM
timeframe:
  start: 2023
  end: ongoing
description: 'Coordinated semiconductor-industrial-policy push triggered by the September 2023 upgrade of the US-Vietnam relationship to a Comprehensive Strategic Partnership, which put semiconductors and
  critical-minerals cooperation at the core of the bilateral agenda. Anchored by Intel''s ~US$1.5bn Ho Chi Minh City assembly-and-test expansion, Amkor''s ~US$1.6bn Bac Ninh advanced-packaging plant (opened
  Oct 2023), Hana Micron''s packaging expansion, and NVIDIA''s Dec 2024 agreement to build an AI R&D centre and acquire VinBrain. Apple continued supply-chain diversification with expanded Foxconn/Luxshare/Goertek
  assembly footprints. Domestic side: Prime- Ministerial Decision 1018/QD-TTg (Sept 2024) approved the National Semiconductor Industry Development Strategy to 2030 targeting 50,000 skilled engineers, ~3
  fabs and a chip-design ecosystem. Read as the primary sectoral-subsidy and industrial-policy commitment of the Tô Lâm era.

  '

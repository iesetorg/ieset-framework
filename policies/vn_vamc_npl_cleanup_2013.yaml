policy_id: vn_vamc_npl_cleanup_2013
status: candidate
title: VAMC and non-performing-loan clean-up 2013
countries:
- VNM
timeframe:
  start: 2013
  end: 2017
  enacted_date: '2013-07-26'
description: 'Decree 53/2013/ND-CP established the Vietnam Asset Management Company (VAMC) under the State Bank of Vietnam as a centralised vehicle to take over non-performing loans from commercial banks
  in exchange for 5-year special bonds, cleaning reported balance sheets following the Dũng-era credit boom and Vinashin/Vinalines distress. NPLs disclosed by the SBV fell on paper from a 2012 peak near
  8-17% (methodology disputed) toward ~2.5% by 2017; in practice the problem was parked rather than resolved until the 2017 Resolution 42 gave VAMC stronger collateral-seizure powers. Part of the broader
  SOE restructuring programme that formed the macro cleanup bridge between the Dũng and Trọng eras.

  '
enacted_by:
- vietnam_dung_pm_2006_2016
- vietnam_trong_era_2011_2024
coalition_label_at_enactment: CPV under Dũng premiership
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: VAMC is a strengthening of financial-sector supervisory architecture; bank reporting and NPL-recognition disciplines tightened.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Resolution 42 (2017) strengthened secured-creditor collateral enforcement.
references:

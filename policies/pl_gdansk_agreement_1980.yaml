title: Polish Gdańsk Agreement — legalisation of Solidarność 1980
countries:
- POL
timeframe:
  start: 1980
  enacted_date: '1980-08-31'
description: 'Agreement signed 31 August 1980 between Lenin Shipyard strike committee (Wałęsa, Gwiazda et al.) and government (Jagielski) ending the 17-day Gdańsk occupation strike. 21 demands granted including
  the right to form independent self-governing trade unions, right to strike, partial freedom of expression, and Sunday masses broadcast. Led to formal Solidarność registration 10 November 1980 — first
  independent trade union in a Warsaw Pact state.

  '

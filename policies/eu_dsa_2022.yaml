description: 'Regulation (EU) 2022/2065 — the Digital Services Act — replaces the e-Commerce Directive''s notice framework with a tiered obligations regime for hosting and online platforms, imposing transparency,
  illegal-content notice-and-action, recommender-system disclosures, and ad-targeting limits. Very Large Online Platforms and Search Engines face systemic-risk assessments, audits, and direct Commission
  supervision financed by a turnover-based supervisory fee.

  '

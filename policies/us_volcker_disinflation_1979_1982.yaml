title: Volcker Disinflation — Federal Reserve 1979-1982
countries:
- USA
timeframe:
  start: 1979
  end: 1982
  enacted_date: '1979-10-06'
description: 'FOMC under Chair Paul Volcker shifted operating procedure to non-borrowed reserves targeting (effectively money-supply targeting briefly). Fed funds rate peaked near 20% mid-1981. CPI inflation
  peaked at 14.8% (March 1980) and fell to ~3% by 1983. Induced the 1980 and 1981-82 recessions (peak-trough unemployment 10.8% late 1982). Demonstrated — per refinement D.1.5 — that ''well-managed fiat
  with central bank independence can restore price stability without a gold standard''. Cornerstone empirical case for inflation- targeting central banking. Political cost was substantial; Reagan supported
  Volcker publicly, insulating him.

  '

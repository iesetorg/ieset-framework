policy_id: jp_social_security_tax_integrated_reform_2012
status: candidate
title: Social Security Tax Integrated Reform 2012
countries:
- JPN
timeframe:
  start: 2011
  end: 2012
description: 'The Integrated Reform of Social Security and Tax, legislated by the Noda DPJ cabinet through a three-party agreement with the LDP and Komeito in August 2012, scheduled the consumption tax
  to rise from 5% to 8% in April 2014 and to 10% in October 2015 (later deferred), with revenues earmarked for pensions, healthcare, long-term care and child-rearing support. It also revised pension benefit
  indexation and tightened earnings-related contributions.

  '

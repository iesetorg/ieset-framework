description: The National Reconstruction Fund Corporation Act 2023 created a A$15 billion government-owned financing vehicle to make loans, guarantees, equity investments, and other financial arrangements
  in priority manufacturing and industrial capability areas, including renewables and low-emissions technologies, medical science, transport, agriculture, resources, defence capability, and enabling capabilities.

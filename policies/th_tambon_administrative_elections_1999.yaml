policy_id: th_tambon_administrative_elections_1999
status: candidate
title: Thailand Tambon Administrative Organization elections (1999)
countries:
- THA
timeframe:
  start: 1999
  end: 2001
  enacted_date: '1999-05-22'
description: 'Tambon Council and Tambon Administrative Organization Act 1994 (revised 1999) under 1997 Constitution mandated direct election of sub-district (tambon) councils from 1999. First nationwide
  TAO elections held 22 May 1999 for ~7,000 sub- districts. Direct tax-raising powers, infrastructure responsibility, local-service delivery devolved to TAO level. Paired with direct election of provincial
  administrative organisations (PAO) from 1997 and municipal-level councils. Fiscal decentralisation framework in Decentralisation Act 1999 required 35% of government revenue to be local within 10 years
  (target modified, but local-share rose from ~5% to ~25% of total).

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: Democrat-led coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Direct-elected sub-district local government with fiscal authority; local accountability.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: false
  rationale: Sub-national spending share rose; aggregate government share little changed.
references:
- Decentralisation Act B.E. 2542 (1999)
- Nagai, Funatsu & Kagoya (2008), 'Local Government in Thailand'

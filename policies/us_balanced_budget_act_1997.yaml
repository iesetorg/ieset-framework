description: 'P.L. 105-33 of 5 August 1997. Combined Medicare provider-payment growth curbs (~$115B five-year), SCHIP creation for children (Title XXI of Social Security Act), capital-gains rate reduction
  to 20% top, and discretionary spending caps. Projected first balanced federal budget since 1969; actual surplus achieved FY1998 ($69B) through FY2001.

  '

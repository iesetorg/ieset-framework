title: Canada-EU Comprehensive Economic and Trade Agreement (CETA)
countries:
- CAN
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2014-09-26'
description: 'Comprehensive free-trade agreement between Canada and the European Union negotiated under the Harper government. Negotiations launched May 2009; agreement in principle reached 18 October 2013;
  text concluded and signed 26 September 2014 in Ottawa; signed as finalised treaty 30 October 2016 under the Trudeau government after legal scrubbing; provisionally applied from 21 September 2017 after
  European Parliament consent February 2017. CETA eliminated tariffs on 98%+ of traded goods at entry into force, opened Canadian sub-federal procurement to EU suppliers, protected geographical indications,
  and established an Investment Court System (replacing conventional ISDS). Excluded cultural-industry carve-outs and dairy supply management (with limited EU cheese quota expansion). Canada''s first major
  trade agreement with a developed-economy bloc other than the US, part of the government''s explicit trade- diversification strategy post-2008.

  '

policy_id: venezuela_bolivar_redenomination_2018
status: candidate
title: Venezuela Bolivar Redenomination 2018
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'In August 2018 Venezuela introduced the Bolivar Soberano, lopping five zeros off the prior bolivar fuerte at a conversion rate of 100,000 to 1, in response to hyperinflation that had reached
  annualised rates above 1,000,000 percent. The redenomination was paired with a notional anchor to the Petro cryptocurrency and a sharp official-rate devaluation. It did not arrest underlying inflation,
  which forced a second redenomination in 2021.

  '

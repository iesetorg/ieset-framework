policy_id: id_pakto_banking_deregulation_1988
status: candidate
title: Indonesia Pakto October 1988 banking deregulation
countries:
- IDN
timeframe:
  start: 1988
  enacted_date: '1988-10-27'
description: 'Paket Oktober (Pakto) 1988 bank-deregulation package 27 Oct 1988 liberalised private bank entry requirements (minimum capital $5m for national banks, $25m for foreign joint ventures), eased
  branch licensing, cut reserve requirements from 15% to 2%, and allowed foreign-exchange operations for non-foreign-exchange banks. Bank count exploded from 111 (1988) to 240 (1996) and contributed to
  1997-98 financial-crisis vulnerability through under-capitalised bank balance sheets.

  '
enacted_by:
- indonesia_suharto_deregulation_paket_1988_1996
coalition_label_at_enactment: New Order Golkar under Suharto
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  intended: true
  rationale: Bank entry requirements slashed; reserve ratios cut; foreign-exchange licensing eased.
references:
- Nasution (1999), 'Recent Issues in the Management of Macroeconomic Policies in Indonesia'
- 'Cole & Slade (1996), Building a Modern Financial System: The Indonesian Experience'

policy_id: cuba_expropriations_1960_1968
status: candidate
title: Cuba Expropriations 1960 1968
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'Beginning with the 1959–60 agrarian-reform laws and culminating in the 1968 Revolutionary Offensive, the Cuban government nationalised foreign oil refineries, sugar mills, banks, large landholdings,
  and ultimately some 58,000 small businesses. Compensation was disputed and largely unpaid for US assets. The expropriations established near-total state ownership of the means of production and remain
  Cuba''s defining institutional rupture.

  '

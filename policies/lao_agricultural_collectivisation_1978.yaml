# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: lao_agricultural_collectivisation_1978
status: candidate
title: Agricultural Collectivisation Campaign
countries:
- LAO
timeframe:
  start: 1978
  end: 1981
description: The LPRP promoted agricultural cooperatives and collective production after 1975, with a stronger collectivisation push from the late 1970s. The campaign sought to pool land, labour, animals, and tools under cooperative management, though implementation varied and resistance led to partial retreat before market-oriented reforms.
enacted_by:
- lao_lao_pdr_socialist_planning_1975
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cooperative pooling reduced household control over land use, tools, and farm output where implemented.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Collective production and procurement weakened independent agricultural markets.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cooperative labour obligations constrained household labour allocation.
references:
- Grant Evans (2002), A Short History of Laos
- Martin Stuart-Fox (1997), A History of Laos
notes: Magnitude is coded moderate because collectivisation was uneven and later partially reversed.

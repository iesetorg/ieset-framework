policy_id: ir_rial_unification_attempt_2018
status: candidate
title: Rouhani rial unification attempt and NIMA FX system
countries:
- IRN
timeframe:
  start: 2018
  end: 2021
  enacted_date: '2018-04-09'
description: 'On 9 Apr 2018 Iran announced unification of official and free-market exchange rates at 42,000 rial/USD, criminalised unauthorised FX transactions, and barred street-bureau trading. The unification
  collapsed within weeks as free-market rates moved to 80,000+ then 140,000+/USD following the 8 May 2018 US JCPOA withdrawal. The CBI then introduced a multi-tier system: the 42,000 rate preserved for
  essential imports (medicine, staples), a NIMA (Integrated Foreign Currency Exchange System) market-determined rate for other imports from Aug 2018, and a parallel free-market rate. Tiered architecture
  generated arbitrage rents and import-licensing distortions.

  '

policy_id: nigeria_privatisation_decree_1988
status: candidate
title: Nigeria Privatisation Decree 1988
countries:
- NGA
timeframe:
  start: 1986
  end: 1993
description: 'The Privatisation and Commercialisation Decree No. 25 of 5 July 1988 created the Technical Committee on Privatisation and Commercialisation (TCPC) and authorised the sale or commercial restructuring
  of more than 100 federal parastatals — including breweries, hotels, banks, and cement firms. By 1993 the TCPC had divested 88 enterprises through public offerings on the Nigerian Stock Exchange and direct
  sales, marking the first systematic state-enterprise rollback in Nigeria.

  '
enacted_by:
- nigeria_buhari_sap_structural_adjustment_1986
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised firms reoriented toward commercial procurement and exports rather than state-controlled trade flows.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Stock-exchange listings and private buyers replaced state-monopoly structures with multi-firm market competition.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Stock-market floats deepened domestic capital-market credit channels alongside SAP-era financial liberalisation.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sales removed perpetual subventions and recapitalisations from the federal budget for divested parastatals.

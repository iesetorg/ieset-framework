policy_id: fr_35h_rollback_fillon_law_2003
status: candidate
title: 35H Rollback Fillon Law 2003
countries:
- FRA
timeframe:
  start: 2002
  end: 2007
description: 'France''s 2003 Fillon law (Loi 2003-47 du 17 janvier 2003) under the Raffarin government rolled back parts of the 1998-2000 35-hour week regime: it relaxed overtime caps, raised the annual
  overtime quota, reduced employer social-contribution exemptions tied to compliance, and unified the SMIC across pre-2000 and post-2000 contracts. The intended effect was to reduce the cost shock of the
  35-hour week on small and medium firms and partially reverse the rigidity introduced by the Aubry laws.

  '
enacted_by:
- france_chirac_ii_presidency_2002_2007
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher overtime quota and lighter compliance regime raised effective labour flexibility.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced employer-contribution offsets cut the implicit transfer to compliant firms.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Companion 2003 law (Sarkozy-led) tightened entry and residence rules, reducing immigration openness.

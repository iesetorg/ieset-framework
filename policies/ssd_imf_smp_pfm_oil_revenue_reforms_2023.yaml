policy_id: ssd_imf_smp_pfm_oil_revenue_reforms_2023
status: candidate
title: South Sudan IMF SMP public-finance and oil-revenue reforms 2023
countries:
- SSD
timeframe:
  start: 2023
  end: ongoing
description: >
  South Sudan used IMF staff-monitored and emergency-financing engagement in
  2023-2024 to anchor public financial management, cash-management,
  non-oil-revenue, salary-payment, and oil-revenue transparency reforms. The
  programme channel sought to reduce arrears and fiscal dominance, improve
  budget execution, and strengthen reporting around oil receipts in a state
  where oil exports dominate public revenue.
enacted_by:
- south_sudan_r_arcss_transitional_government_2018_present
scope: national
coalition_label_at_enactment: Revitalized Transitional Government of National Unity
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Cash-management, arrears-control, and revenue measures constrained discretionary spending beyond available resources.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reducing fiscal dominance and improving cash management support central-bank monetary credibility.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: PFM and oil-revenue transparency benchmarks increased formal budget and reporting controls.
references:
- IMF South Sudan staff-monitored-program and emergency-financing materials, 2023-2024.
- World Bank South Sudan economic monitoring on oil revenue, arrears, and public financial management, 2023-2025.
notes: >
  Public reporting is programme-level rather than a single statute; this is
  coded as a coherent IMF-backed reform bundle with weak implementation
  confidence.

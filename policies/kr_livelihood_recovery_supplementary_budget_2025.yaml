description: 'Early Lee-administration supplementary budget, described by MOEF as a second supplementary budget enacted within the administration''s first 20 days to respond to weak consumption, local-economy
  stress, and sluggish construction. The package centred on livelihood-recovery consumption coupons, public-support loans and guarantees for small business owners, expanded unemployment benefits and National
  Employment Support Programme participation, and sectoral/local support intended to lift domestic demand. Framed as a short-term recovery instrument complementing the longer-horizon AI and advanced-industry
  programme in the 2026 growth strategy.

  '

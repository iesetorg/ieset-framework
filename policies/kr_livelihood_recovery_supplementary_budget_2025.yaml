title: Lee first supplementary budget / livelihood-recovery package 2025 (South Korea)
countries:
- KOR
timeframe:
  start: 2025
  end: 2025
  enacted_date: '2025-07-04'
description: 'First supplementary budget of the Lee administration, approximately KRW 30 trillion, funded by a mix of bond issuance and reallocation. Three main components: (i) universal livelihood-recovery
  coupon (KRW 250,000 per resident, local-currency tokens, 3-month expiry — a demand-stimulus channel via regional retail); (ii) SME and self-employed rescue programmes (interest-subsidy loans, lease- cost
  support, card-fee reductions); (iii) reconstruction spending for 2024-2025 Gyeongbuk and Chungcheong flood damage. Framed as a short-term recovery instrument complementing the longer-horizon AI and advanced-industry
  programme.

  '

policy_id: ph_expanded_vat_law_2005
status: candidate
title: Philippines Expanded VAT Law / Reformed VAT (RA 9337, 2005)
countries:
- PHL
timeframe:
  start: 2005
  end: 2006
  enacted_date: '2005-07-01'
description: 'Republic Act 9337 (Expanded VAT Law, "R-VAT") signed 24 May 2005, effective 1 July 2005 (Supreme Court restraining order lifted September 2005). Removed VAT exemptions on petroleum products,
  electricity, water, medical services, legal and other professional services, works of art. Retained rate at 10% with automatic increase to 12% triggered February 2006 (R.A. 9361 trigger mechanism). Broadened
  tax base significantly; revenue yield ~1% of GDP in first full year. Centrepiece of Arroyo fiscal stabilisation — debt-to-GDP fell from 74% (2004) to 54% (2010). Politically costly due to petrol-price
  pass- through.

  '
enacted_by:
- philippines_arroyo_lakas_2001_2010
coalition_label_at_enactment: Lakas-CMD

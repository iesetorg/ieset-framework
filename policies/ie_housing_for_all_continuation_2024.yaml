- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Vacant-site and residential zoned-land taxes added new property-related corporate liabilities.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: HAP, RAS, and Help-to-Buy supports continued and were expanded in scope.

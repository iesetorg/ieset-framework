policy_id: ie_housing_for_all_continuation_2024
status: candidate
title: Housing For All Continuation 2024
countries:
- IRL
timeframe:
  start: 2022
  end: 2024
description: 'The 2024 continuation of the 2021 Housing for All plan retained its multi-pillar structure — public, social, and affordable supply targets, Help-to-Buy and First Home Scheme demand supports,
  Land Development Agency activation, and planning reform — with revised supply targets to reflect upward population revisions. The continuation channelled higher Exchequer capital allocations into housing
  delivery while extending tax measures supporting renters and buyers.

  '
enacted_by:
- ireland_varadkar_fg_2022_2024
- ireland_harris_fg_2024_present

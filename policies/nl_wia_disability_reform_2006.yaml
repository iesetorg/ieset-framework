policy_id: nl_wia_disability_reform_2006
status: candidate
title: Wia Disability Reform 2006
countries:
- NLD
timeframe:
  start: 2002
  end: 2006
description: 'The Netherlands'' Wet Werk en Inkomen naar Arbeidsvermogen (WIA), enacted under Wet 2005-572 and effective 29 December 2005, replaced the WAO disability-pension regime. WIA splits claimants
  into the WGA (partially disabled — wage-related benefits with strong activation) and IVA (fully and permanently disabled — high benefits). Eligibility requires a 35%+ loss of earning capacity and two
  years of employer-paid sick leave. The intended effect was to sharply reduce the disability case-load, raise activation, and stabilise long-run social-spending dynamics.

  '

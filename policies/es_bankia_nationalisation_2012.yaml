policy_id: es_bankia_nationalisation_2012
status: candidate
title: Bankia Nationalisation 2012
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
description: 'In May 2012 the Rajoy government converted FROB preferred-share holdings in BFA-Bankia into voting equity, taking over the merged former cajas group with a EUR 19bn capital injection after
  restated 2011 losses. The intervention precipitated the EU banking-sector MoU and established Bankia as the central case for restructuring of Spain''s failed savings-bank sector.

  '
enacted_by:
- spain_rajoy_pp_first_2011_2015
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Recapitalisation costs were partially offset by debt-issuance constraints under EU oversight.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Restructuring agreement allowed large-scale ERE redundancies and branch closures at Bankia.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Public ownership and EU restructuring conditions tightened banking governance and oversight.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bondholder write-downs and household losses shifted incidence away from progressive recovery channels.

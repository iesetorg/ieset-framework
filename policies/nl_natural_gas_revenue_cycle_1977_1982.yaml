policy_id: nl_natural_gas_revenue_cycle_1977_1982
status: candidate
title: Netherlands natural-gas revenue cycle — Slochterveld peak (1977-1982)
countries:
- NLD
timeframe:
  start: 1977
  end: 1982
description: 'Peak of Groningen/Slochterveld natural-gas revenue accruing to the Dutch state (FES fund precursor). Revenues fuelled current expenditure rather than capital savings, producing the textbook
  ''Dutch disease'' — real exchange-rate appreciation, manufacturing contraction, transfer-programme expansion that became unsustainable when gas revenue waned. Canonical reference for natural-resource
  governance literature.

  '

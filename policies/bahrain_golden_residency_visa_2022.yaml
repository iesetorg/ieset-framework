policy_id: bahrain_golden_residency_visa_2022
status: candidate
title: Bahrain Golden Residency Visa
countries:
- BHR
timeframe:
  start: 2022
  end: ongoing
description: 'Bahrain created a Golden Residency Visa route providing renewable long-term residence services for qualifying applicants and relatives. The programme made residence more durable for investors,
  property owners, retirees, and high-skilled or high-income residents, adding an immigration-retention tool to Bahrain''s services and investment-diversification strategy.

  '
enacted_by:
- bahrain_hamad_salman_fiscal_diversification_2020_present
scope: national
coalition_label_at_enactment: Al Khalifa monarchy; Crown Prince Salman cabinet
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: The programme provides a long-term renewable residence channel beyond ordinary short-term visas.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Long-term residency improves security of tenure for qualifying expatriate investors and property-linked applicants.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Residency access is intended to attract mobile capital, skilled labour, and business formation.

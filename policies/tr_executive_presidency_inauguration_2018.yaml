description: 'Snap election 24 June 2018 produced Erdoğan 52.59% first-round and an AKP-MHP parliamentary majority; the new executive presidency took effect on Erdoğan''s inauguration 9 July 2018. The Prime
  Minister post was abolished, 16 ministries were restructured, and Presidential Decrees (Cumhurbaşkanlığı Kararnamesi) replaced cabinet regulations as the main executive instrument. Son-in-law Berat Albayrak
  was appointed Treasury & Finance minister, consolidating macroeconomic decision-making within the presidential palace.

  '

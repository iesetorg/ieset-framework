policy_id: mli_transition_charter_revision_2022
status: candidate
title: Mali transition charter revision 2022
countries:
- MLI
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-25'
description: >
  Mali revised its Transition Charter in February 2022 after the military-led
  authorities and regional mediators failed to settle an early election calendar.
  The revision extended the transition, reorganized interim institutions, and
  preserved Colonel Assimi Goita's central role in the transitional presidency
  while the government prepared a new constitutional and security agenda.
enacted_by:
- mali_assimi_goita_transition_sovereignty_2020_present
scope: national
coalition_label_at_enactment: CNSP-backed transition authorities
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The charter revision prolonged non-elected transition rule and delayed a return to normal constitutional elections.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Prolonged military-led transition authority narrowed ordinary checks on executive power.
references:
- Mali Law No. 2022-001 revising the Transition Charter, February 2022.
- ECOWAS and UN reporting on Mali's transition timetable and sanctions dispute, 2022.

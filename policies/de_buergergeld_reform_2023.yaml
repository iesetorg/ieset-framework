policy_id: de_buergergeld_reform_2023
status: candidate
title: Bürgergeld — replacement of Hartz IV with citizen's income 2023
countries:
- DEU
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2022-12-20'
description: 'Replacement of Arbeitslosengeld II / Sozialgeld (Hartz IV) with Bürgergeld effective 1 January 2023: Regelsatz raised to EUR 502 (single adult, then indexed to EUR 563 in 2024), initial two-year
  Karenzzeit relaxing housing-cost and asset checks, moderated activation sanctions (Sanktions- moratorium then graduated reinstatement), expanded training + coaching budgets. Framed by SPD and Greens as
  ending the punitive tone of Hartz IV; by FDP and CDU/CSU critics as reducing work incentives. Key Ampel signature social-policy reform.

  '
enacted_by:
- germany_scholz_ampel_2021_2025
coalition_label_at_enactment: SPD-Greens-FDP Ampel
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Higher baseline Regelsatz + Karenzzeit + expanded coaching budget.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Relaxed sanctions and longer protected period soften the Hartz-era activation regime.
references:

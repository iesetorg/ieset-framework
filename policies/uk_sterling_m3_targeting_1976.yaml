policy_id: uk_sterling_m3_targeting_1976
status: candidate
title: UK adoption of £M3 monetary targeting (1976)
countries:
- GBR
timeframe:
  start: 1976
  end: 1985
description: 'Adoption from July 1976 of publicly-announced £M3 monetary targets as the nominal anchor of UK policy, under Callaghan government and IMF Letter of Intent commitments. Targets announced annually
  in the Budget. The regime was formalised in the Medium-Term Financial Strategy 1980 under Thatcher and effectively abandoned by 1985-86 as velocity shifts rendered aggregates unreliable.

  '
enacted_by:
- uk_callaghan_labour_1976_1979

description: 'Meld. St. 25 (2015-2016) Kraft til endring — Energipolitikken mot 2030 and concurrent petroleum-tax policy white paper reaffirming the ring-fenced 78% combined tax on offshore petroleum income
  (22% ordinary + 56% special tax post-2013 adjustment) alongside the accelerated depreciation / uplift regime. White paper preserves the SDFI (State Direct Financial Interest) framework and the symmetric
  loss-offset structure that makes the special tax broadly neutral at the margin on profitable fields. 2020 temporary uplift enlargement treated separately as COVID-era amendment.


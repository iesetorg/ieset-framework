policy_id: mz_sovereign_wealth_fund_2024
status: candidate
title: Mozambique Sovereign Wealth Fund law 2024
countries:
- MOZ
timeframe:
  start: 2024
  end: ongoing
description: 'Mozambique created a sovereign wealth fund framework to receive and manage future natural-gas revenues, with rules for budget transfers, savings, investment management, disclosure, and Bank
  of Mozambique operational roles. The design was meant to separate part of LNG revenue from annual budget discretion while still allowing a scheduled share to finance development and stabilisation needs.

  '
enacted_by:
- mozambique_frelimo_gas_fiscal_reform_2014_present
scope: national
coalition_label_at_enactment: FRELIMO Nyusi government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Savings and transfer rules limit immediate discretionary spending of future LNG revenues.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Statutory disclosure and fund-governance rules improve auditability of extractive-revenue management.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: A rules-based fund lowers expropriation and arbitrary appropriation risk around gas revenues.
references:

policy_id: nz_fiscal_responsibility_act_1994
status: candidate
title: Fiscal Responsibility Act (1994)
countries:
- NZL
timeframe:
  start: 1994
description: 'Fiscal Responsibility Act 1994 required governments to publish principles of responsible fiscal management — reducing Crown debt to prudent levels, achieving and maintaining operating surpluses
  on average over the economic cycle, maintaining buffers against adverse shocks, and predictable tax rates. Required pre-election fiscal updates and Budget Policy Statements. An international template
  for rule-based fiscal frameworks subsequently adopted by the UK (1998) and others.

  '

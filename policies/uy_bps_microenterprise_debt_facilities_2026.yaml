policy_id: uy_bps_microenterprise_debt_facilities_2026
status: candidate
title: Uruguay BPS Microenterprise Debt Facilities 2026
countries:
- URY
timeframe:
  start: 2026
  end: ongoing
description: 'Parliament approved an Orsi-government special payment-facilities regime for roughly 37,000 firms with arrears to the Banco de Prevision Social. The package targets micro and small enterprises
  and inactive firms, aiming to regularise social-security debts, reactivate business activity, and support employment in affected sectors through revised repayment terms rather than immediate enforcement.

  '
enacted_by:
- uruguay_orsi_fa_2025_present
coalition_label_at_enactment: Frente Amplio (MPP-led, minority congressional position)
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Payment facilities reduce the effective immediate social-security arrears burden on covered firms.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Regularisation lets inactive or indebted micro and small firms re-enter formal activity.

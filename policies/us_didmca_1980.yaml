timeframe:
  start: 1977
  end: 1981
description: 'The Depository Institutions Deregulation and Monetary Control Act of 1980 (Pub. L. 96-221) phased out Regulation Q deposit-rate ceilings, authorized NOW accounts nationwide, expanded thrift
  powers, and extended Fed reserve requirements to all depository institutions. The act is a foundational step in U.S. financial deregulation, reshaping the savings-and-loan industry''s competitive position
  and laying groundwork for the 1980s S&L crisis.

  '

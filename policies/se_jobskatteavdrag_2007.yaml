policy_id: se_jobskatteavdrag_2007
status: candidate
title: Jobskatteavdrag earned-income tax credit 2007
countries:
- SWE
timeframe:
  start: 2007
  enacted_date: '2007-01-01'
description: 'Earned-income tax credit (EITC-analogue) introduced 1 Jan 2007 as the signature "arbetslinjen" (work-line) measure of the Reinfeldt Alliance. Expanded in four successive steps (2007, 2008,
  2009, 2010) and made permanent, substantially increasing take-home pay from employment income relative to transfers. Raised labour-supply incentive for low-to-median earners.

  '
enacted_by:
- sweden_reinfeldt_alliance_2006_2014
coalition_label_at_enactment: Alliansen
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Credit lowered effective PIT for earned income but not for pensions/transfers — flattened average-rate progressivity at the expense of work-transfer differential.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Raised employment incentive via work-transfer wedge.

description: 'Local Government Finance Act 1988 replaced domestic rates with a flat per-adult Community Charge — Scotland from 1 April 1989, England and Wales from 1 April 1990. Flat-rate design (modified
  by rebates) proved deeply unpopular: 31 March 1990 Trafalgar Square riot; mass non-payment. Replaced by Council Tax (Local Government Finance Act 1992) under Major. Widely cited as proximate political
  cause of Thatcher''s November 1990 fall.

  '

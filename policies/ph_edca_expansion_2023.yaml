policy_id: ph_edca_expansion_2023
status: candidate
title: Enhanced Defense Cooperation Agreement site expansion (5 to 9)
countries:
- PHL
timeframe:
  start: 2023
  enacted_date: '2023-04-03'
description: 'Expansion of the US-Philippines Enhanced Defense Cooperation Agreement (originally signed April 2014 under Aquino III and upheld by the Supreme Court in 2016) from five to nine agreed sites,
  announced 3 April 2023. Four new sites added: Naval Base Camilo Osias (Cagayan), Camp Melchor Dela Cruz (Isabela), Balabac Island (Palawan) and Lal-lo Airport (Cagayan) — geographically oriented toward
  the Taiwan Strait, Bashi Channel and West Philippine Sea. US invests in runway, fuel, command-and-control, and humanitarian/disaster-response infrastructure at the sites; Philippines retains sovereignty.
  Institutional pivot away from the Duterte-era public distancing from Washington.

  '
enacted_by:
- philippines_marcos_jr_2022_present
coalition_label_at_enactment: Uniteam (PFP/Lakas-CMD)
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  rationale: Formalisation of treaty-based alliance cooperation within existing legal framework (MDT 1951, VFA 1998, EDCA 2014) restored predictable US access arrangements.
  intended: true
notes: 'Flagged as a foreign/security-policy policy with incidental economic-axis relevance; retained for Marcos Jr doctrine coherence rather than for strong policy-axis movement.

  '
references:
- Joint statement of the Philippines-US 2+2 Ministerial Dialogue, 11 April 2023
- DND-DFA announcement of four new EDCA locations, 3 April 2023

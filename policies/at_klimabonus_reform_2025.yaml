policy_id: at_klimabonus_reform_2025
status: candidate
title: Klimabonus reform 2025 — means-testing restriction
countries:
- AUT
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-01'
description: 'Restructured the Klimabonus per-capita rebate introduced in 2022 from a universal per-capita payment to a means-tested transfer phasing out above an income threshold, part of the OeVP-SPOe-NEOS
  consolidation programme. Regional graduation (categories I-IV) retained but aggregate payout envelope reduced. Reform criticised by Greens and ecological-economics advocates as breaking the canonical
  carbon-price-plus-dividend design; defended by the coalition as fiscal consolidation aligned with EU EDP obligations.

  '
enacted_by:
- austria_stocker_ovp_spo_neos_2025_present
coalition_label_at_enactment: OeVP-SPOe-NEOS
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Means-testing narrows eligibility and reduces aggregate payout envelope.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Means-tested transfer is more progressive in incidence than the universal rebate architecture it replaces; offsetting loss of per-capita-rebate progressivity in combined CO2-price design.
references:
- Klimabonus-Reformgesetz 2025 (BGBl. I Nr. pending)
- Regierungsprogramm 2025-2029 chapter on Klimaschutz und Steuern

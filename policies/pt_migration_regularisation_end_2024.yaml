policy_id: pt_migration_regularisation_end_2024
status: candidate
title: Portugal end of manifestações de interesse regularisation channel 2024
countries:
- PRT
timeframe:
  start: 2024
  enacted_date: '2024-06-04'
description: 'Montenegro AD government terminated the manifestação de interesse regularisation mechanism — a de-facto post-entry path to legal residency used by an estimated 300 000-400 000 migrants under
  the Costa PS governments. Decree-Law approved 3 June 2024 and notified 4 June. Channel kept open only for CPLP (Portuguese-speaking countries) nationals under the 2021 Mobility Agreement; other nationalities
  required to use consular pre-entry visa channels. AIMA (Agência para a Integração, Migrações e Asilo) tasked with triaging the ~400 000 backlog by end-2025 (target not met). Policy sequenced to pre-empt
  Chega parliamentary initiatives on the same topic but drew opposition from BE, PCP, Livre, and parts of PS. Cited by government as response to housing-pressure salience and labour-market absorption capacity;
  cited by critics as policy drift under populist-right parliamentary leverage.

  '
enacted_by:
- portugal_montenegro_ad_2024_present
coalition_label_at_enactment: AD (PSD+CDS-PP+PPM) minority under Chega parliamentary leverage
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: moderate
  rationale: Closure of the principal post-entry regularisation channel narrows the practical migration pathway significantly while retaining CPLP channel; the mass-pathway shift is the material change.
  intended: true
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  rationale: Bringing migration status back under pre-entry consular control arguably strengthens procedural legality of residence status; contested by critics who note AIMA backlog creates lived legal-limbo
    conditions.
  intended: true
references:
- Decreto-Lei terminating manifestações de interesse (3 June 2024)
- AIMA, Relatório de Atividades 2024
- CNAI/CPLP Mobility Agreement (2021) and subsequent protocols

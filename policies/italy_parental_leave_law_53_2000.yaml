policy_id: italy_parental_leave_law_53_2000
status: candidate
title: Italy Parental Leave Law 53 2000
countries:
- ITA
timeframe:
  start: 1998
  end: 2001
description: 'Law 53/2000 transposed the EU Parental Leave Directive into Italian law, extending the right to take paid parental leave to fathers, restructuring family-leave entitlements with up to 11 months
  of joint parental absence (with a non-transferable share for the father), and granting time off for medical and caregiving purposes. The law also funded company-level pilot projects on family-friendly
  working hours through state grants administered by the Equal Opportunities Department.

  '

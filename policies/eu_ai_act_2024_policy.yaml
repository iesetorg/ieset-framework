description: 'Regulation (EU) 2024/1689 — the AI Act — established a horizontal, risk-tiered legal framework for artificial intelligence systems placed on the EU single market, with prohibitions on certain
  practices, conformity assessments and CE-marking for high-risk systems, and dedicated obligations for general-purpose AI models. Enforcement is split between the EU AI Office (for GPAI) and national market-surveillance
  authorities, with phased application beginning in 2025 and a centralised database for high-risk deployments.

  '

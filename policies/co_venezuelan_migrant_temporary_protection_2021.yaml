policy_id: co_venezuelan_migrant_temporary_protection_2021
status: candidate
title: Estatuto Temporal de Protección para Migrantes Venezolanos — ETPMV (Colombia)
countries:
- COL
timeframe:
  start: 2021
  end: 2031
  enacted_date: '2021-03-01'
description: 'Decreto 216 de 1 Mar 2021 created a ten-year Temporary Protection Status for Venezuelan migrants, regularising the status of ~1.8M people — both those already in Colombia and new arrivals
  through 31 Jan 2021. The Permiso por Protección Temporal grants legal residence, labour-market access, healthcare, education, and a path to regular visa. Complemented earlier PEP (Permiso Especial de
  Permanencia) schemes from 2017-2020. One of the most open regularisation responses globally — IOM and UNHCR documented it as a model.

  '
enacted_by:
- colombia_duque_centro_democratico_2018_2022
coalition_label_at_enactment: Centro Democrático

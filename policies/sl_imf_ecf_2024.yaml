policy_id: sl_imf_ecf_2024
status: candidate
title: Sierra Leone IMF Extended Credit Facility 2024
countries:
- SLE
timeframe:
  start: 2024
  end: 2028
  enacted_date: '2024-10-31'
description: 'Sierra Leone requested and entered a 38-month IMF Extended Credit Facility in 2024 to restore macroeconomic stability after high inflation, debt pressure, arrears, and reserve losses. The
  programme anchors fiscal tightening, domestic-revenue mobilization, public financial management, debt management, tighter monetary policy, flexible exchange-rate management, targeted social spending,
  and governance reforms.

  '
enacted_by:
- sierra_leone_bio_human_capital_governance_2018_present
scope: national
coalition_label_at_enactment: SLPP Bio second-term government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The ECF tightens fiscal policy through revenue mobilization, spending efficiency, arrears control, and debt-management benchmarks.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Programme design addresses fiscal dominance, tightens monetary policy, and supports reserve rebuilding.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Governance, anti-corruption, and public-finance benchmarks strengthen auditability and institutional controls.

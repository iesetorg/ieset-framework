policy_id: australia_safeguard_mechanism_2016
status: candidate
title: Australia Safeguard Mechanism 2016
countries:
- AUS
timeframe:
  start: 2011
  end: 2014
description: 'Companion regulatory regime to the Emissions Reduction Fund, in force from 1 July 2016, requiring facilities emitting over 100,000 tCO2-e per year to keep emissions below baseline limits set
  by the Clean Energy Regulator. The 2023 Albanese-government reforms (Safeguard Mechanism (Crediting) Amendment Act 2023) tightened baselines on a declining trajectory and introduced tradeable Safeguard
  Mechanism Credits, giving the framework a quasi-ETS character.

  '
enacted_by:
- australia_abbott_lnp_2013_2015
axes_moved:
- axis: regulatory.environmental_stringency
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Initially generous baselines were tightened in 2023 onto a 4.9% per annum decline trajectory.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Carryover of free-allocation features and offset-flexibility provisions effectively subsidised covered facilities.
- axis: regulatory.energy_supply_security
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Coal-fired generators excluded under sectoral baselines; near-term dispatch effects minimal.
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Tradeable SMCs introduced market-based abatement, preserving inter-facility competition.

policy_id: pk_power_tariff_hikes_2023_2024
status: candidate
title: Power-tariff hikes and circular-debt management (Pakistan, 2023-2024)
countries:
- PAK
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-07-26'
description: 'NEPRA-approved base electricity-tariff increase of roughly 26% in July 2023 plus subsequent quarterly adjustments, fuel-price adjustments, and capacity-payment pass-through. IMF-programme
  structural benchmark to reduce power-sector circular debt (stock ~PKR 2.6tn end-FY23) via cost-recovery pricing. Accompanied by 2024 renegotiation of capacity-payment contracts with several IPPs (including
  some CPEC-era plants) converting take-or-pay obligations to take-and-pay for certain units. Distributional incidence regressive in the short run; protected-consumer slab retained for lowest-usage households.
  Captive-power-plant gas disconnections (Dec 2024-Jan 2025) pushed industrial demand onto the national grid to absorb capacity overhang.

  '
enacted_by:
- pakistan_shehbaz_pmln_coalition_2024_present
coalition_label_at_enactment: Shehbaz-led coalition (first and second terms)

policy_id: brazil_real_launch_1994
status: candidate
title: Brazil Real Launch 1994
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'On 1 July 1994 the new real currency was launched, completing the Real Plan stabilisation sequence developed under finance minister Cardoso. The real replaced the cruzeiro real at a 1:2750
  ratio, with the prior URV indexation phase preventing the typical exchange-shock chaos. The launch was paired with a tight Banco Central monetary stance and a managed quasi-peg against the US dollar that
  ended decades of chronic hyperinflation almost overnight.

  '

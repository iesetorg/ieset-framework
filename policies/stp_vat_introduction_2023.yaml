  end: ongoing
description: 'Sao Tome and Principe introduced a value-added tax in 2023 as a central tax-modernisation measure, replacing narrower consumption-tax arrangements with a broader invoice-credit VAT system.
  The reform was designed to mobilize domestic revenue, improve compliance, and support fiscal consolidation under the country''s IMF-backed macroeconomic programme.

  '

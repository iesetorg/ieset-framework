policy_id: italy_epu_membership_1950
status: candidate
title: Italy Epu Membership 1950
countries:
- ITA
timeframe:
  start: 1950
  end: 1970
description: 'Italy joined the European Payments Union from its September 1950 inception, switching from bilateral trade-clearing arrangements to a multilateral settlement system that allowed European trading
  partners to net surpluses and deficits across the OEEC area, supported by Marshall Plan dollar credit lines. EPU participation is widely credited as a key precondition for the dismantling of postwar quantitative
  import restrictions and the convertibility steps of the late 1950s, ahead of EEC accession.

  '
enacted_by:
- italian_economic_miracle_1950_1970
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Multilateral settlement removed bilateral-clearing constraints on intra-European import licensing.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: EPU obligations supported phased OEEC trade-liberalisation lists across goods categories.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Dollar-pool access via EPU strengthened Banca d'Italia's external-buffer position.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Marshall counterpart funds distributed via EPU framework underwrote sectoral investment grants.

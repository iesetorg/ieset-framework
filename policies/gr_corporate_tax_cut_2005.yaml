policy_id: gr_corporate_tax_cut_2005
status: candidate
title: Corporate Tax Cut 2005
countries:
- GRC
timeframe:
  start: 2004
  end: 2009
description: 'Law 3296/2004 and the Income Tax Code amendments scheduled a phased reduction of Greece''s corporate income tax (φόρος εισοδήματος νομικών προσώπων) from 35% toward 25% over 2005–2007, paired
  with simplified depreciation rules and SME accounting thresholds. The move aligned Greek headline rates more closely with peer EU jurisdictions and was the centrepiece tax measure of the early Karamanlis
  term.

  '

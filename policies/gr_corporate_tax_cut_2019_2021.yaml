policy_id: gr_corporate_tax_cut_2019_2021
status: candidate
title: Greece corporate income tax cut 28% to 22% 2019-2021
countries:
- GRC
timeframe:
  start: 2019
  end: 2021
  enacted_date: '2019-12-06'
description: 'Two-step reduction of the statutory corporate income tax rate from 28% (inherited from SYRIZA-era) to 24% for 2019 income (Law 4646/2019) and to 22% from 2021 onward (Law 4799/2021). Dividend
  withholding tax simultaneously reduced from 10% (2019) to 5% from 2020. Solidarity surtax on incomes suspended for 2020 and 2021 private-sector earners, then abolished from 2023 (Law 5000/2022). Social-security
  contribution rates cut by 3.9pp cumulative 2020-2021 for dependent employment. Stated intent: narrow the tax wedge relative to Bulgaria, Cyprus, Ireland, and attract FDI back to Greece.

  '

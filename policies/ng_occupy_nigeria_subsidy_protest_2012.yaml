title: Occupy Nigeria subsidy-removal protest and rollback
countries:
- NGA
timeframe:
  start: 2012
  end: 2012
  enacted_date: '2012-01-01'
description: 'On 1 January 2012 the Jonathan administration announced full removal of the PMS petrol subsidy, pump price rising from N65 to N141/litre. An eight-day general strike and mass "Occupy Nigeria"
  protests across Lagos, Abuja, Kano and Kaduna, organised by NLC/TUC and civil society coalitions, forced partial rollback to N97/litre on 16 January 2012 — roughly 50% of the announced price increase.
  The House of Representatives'' Farouk Lawan committee subsequently documented large-scale fraud in the subsidy regime (~N1.07 trillion over 2009-2011), implicating marketers. The episode set the template
  for subsequent Nigerian subsidy-removal politics until 2023.

  '

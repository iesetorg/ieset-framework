policy_id: se_pension_reform_1999
status: candidate
title: Swedish pension reform (NDC + premium pension, 1998-1999)
countries:
- SWE
timeframe:
  start: 1999
  end: ongoing
description: Replace the old defined-benefit ATP with a notional-defined-contribution (NDC) first pillar plus a mandatory individual-account funded second pillar (premiepension). Automatic-balancing mechanism
  ensures long-run solvency without political intervention. Market-mechanism forced-saving within the universal welfare system — the D.2.9 Nordic-model architectural feature the framework names explicitly.
  Unlike Anglo-Saxon occupational-pension schemes, participation is mandatory and earnings-linked; unlike the old ATP, balance-sheet risk is borne by contributors rather than the state budget.
enacted_by:
- sweden_persson_sap_1996_2006
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  rationale: Shifted pension liability off the state balance sheet onto earnings-linked NDC + individual accounts. Structural commitment reduced.
- axis: fiscal.tax_capital
  direction: +
  magnitude: moderate
  rationale: Contributions carry the load previously carried by general-revenue tax + payroll tax.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Premiepension plan choice among >700 funds creates retail asset-management competition — an explicit market mechanism inside a state-compulsory scheme.

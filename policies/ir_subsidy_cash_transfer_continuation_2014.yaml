policy_id: ir_subsidy_cash_transfer_continuation_2014
status: candidate
title: Rouhani continuation and partial tightening of Targeted Subsidies cash-transfer
countries:
- IRN
timeframe:
  start: 2014
  end: 2021
  enacted_date: '2014-04-25'
description: 'Continuation of Ahmadinejad-era Targeted Subsidies Reform (2010) with administrative tightening under Rouhani: self-declaration campaign asking wealthier Iranians to forgo the ~455,000-rial
  monthly cash transfer, means- testing pilots, and freezing of the per-capita nominal payment despite inflation. By 2020 the real value of the cash transfer had eroded by ~80% from 2010 levels. Fuel-price
  increments (premium gasoline, diesel) through 2015-2018 partially restored subsidy-reform fiscal space before the Nov 2019 overhaul.

  '
enacted_by:
- iran_rouhani_moderate_2013_2021
coalition_label_at_enactment: Moderation and Development Party-aligned cabinet
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Nominal-freeze cash transfer eroded in real terms by ~80% over 2010-2020.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Incremental fuel-price rises 2015-2018 reduced implicit energy subsidy burden.
references:

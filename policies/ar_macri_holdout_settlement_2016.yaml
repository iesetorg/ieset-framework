policy_id: ar_macri_holdout_settlement_2016
status: candidate
title: Holdout creditor settlement and return to capital markets (Apr 2016)
countries:
- ARG
timeframe:
  start: 2016
  end: 2016
  enacted_date: '2016-04-22'
description: 'Argentina settled with NML Capital and other holdout creditors from the 2001 default for approximately USD 9.3bn, ending the Griesa- injunction blockade that had kept Argentina out of international
  bond markets since the 2014 technical default. Congress repealed the Ley Cerrojo and Ley de Pago Soberano. Argentina issued USD 16.5bn of new sovereign bonds in Apr 2016 — then the largest EM debt issuance
  on record — restoring access to external financing that underwrote the gradualist fiscal strategy.

  '

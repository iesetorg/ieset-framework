policy_id: za_arv_rollout_reversal_2003
status: candidate
title: Public-Sector Antiretroviral Rollout Reversal (South Africa, 2003)
countries:
- ZAF
timeframe:
  start: 2003
  enacted_date: '2003-11-19'
description: 'On 19 November 2003 the South African Cabinet approved the Operational Plan for Comprehensive HIV and AIDS Care, Management and Treatment, reversing the Mbeki-era denialist stance that had
  blocked public-sector antiretroviral provision. Rollout began 2004 and scaled through the 2000s. Chigwedere et al. (2008) estimate ~330,000 excess deaths attributable to the pre-2003 policy delay.

  '
enacted_by:
- southafrica_mbeki_anc_second_term_1999_2008
coalition_label_at_enactment: ANC
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: Public-sector ARV programme funded from general revenue, scaling to largest globally by 2010s.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  rationale: Sustained health-budget increase for ARV procurement and clinic rollout.
references:
- Operational Plan for Comprehensive HIV and AIDS Care (Nov 2003)
- Chigwedere et al. (2008), JAIDS

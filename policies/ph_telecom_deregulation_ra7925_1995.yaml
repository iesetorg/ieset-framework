description: 'RA 7925 Public Telecommunications Policy Act signed 1 Mar 1995 complementing Executive Order 59 (Feb 1993) mandatory interconnection — dismantled PLDT''s monopoly and established competitive
  framework. Paired with landline-and-cellular build-up obligations for new carrier licensees (each entrant required to install 300,000-400,000 lines in underserved regions). Philippine teledensity rose
  from 1.5% (1993) to 9% (2000).

  '

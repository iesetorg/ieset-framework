policy_id: nl_groningen_gas_wind_down_2018_2023
status: candidate
title: Netherlands Groningen gas field production wind-down 2018-2023
countries:
- NLD
timeframe:
  start: 2018
  end: 2023
  enacted_date: '2018-03-29'
description: 'Decision by Minister Eric Wiebes (29 March 2018) to reduce production from the Groningen gas field — Europe''s largest onshore field — to zero by 2030 in response to induced-seismicity earthquake
  damage to over 100,000 homes. Schedule accelerated repeatedly as damage claims grew; final closure 1 October 2023 under Rutte IV. Wind-down exposed Dutch (and European) gas import dependence, materially
  amplifying the 2022 energy crisis. Parliamentary inquiry Commissie van der Lee (February 2023) "Groningers boven gas" documented systemic state failure in weighing earthquake risk against gas revenue.

  '

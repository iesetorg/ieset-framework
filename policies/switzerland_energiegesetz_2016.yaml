policy_id: switzerland_energiegesetz_2016
status: candidate
title: Switzerland Energiegesetz 2016
countries:
- CHE
timeframe:
  start: 2011
  end: ongoing
description: 'The revised Swiss Energiegesetz (Energy Act) of 30 September 2016, approved by referendum in May 2017, codifies the Energy Strategy 2050 by setting renewable-electricity expansion targets,
  energy-efficiency mandates for buildings and appliances, and a feed-in tariff financed by a network surcharge. It also enshrines the prohibition on new nuclear plant construction, replacing Switzerland''s
  nuclear-friendly framework with a renewables-and-efficiency regime.

  '

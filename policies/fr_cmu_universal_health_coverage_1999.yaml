description: 'Loi 99-641 of 27 July 1999 established Couverture Maladie Universelle (CMU) — residence-based basic health coverage filling gaps in the insurance-based Sécurité sociale architecture, plus
  CMU-Complémentaire free supplementary coverage for households below an income threshold. Effective 1 January 2000. Approximately 1.5 million previously uncovered persons gained coverage; CMU-C served
  ~4.7 million.

  '

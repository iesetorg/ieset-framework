description: 'M-2 Motorway, 367 km six-lane controlled-access motorway connecting Lahore to Islamabad, inaugurated 26 November 1997 by PM Nawaz Sharif. Construction by Daewoo Corporation 1992- 1997 under
  BOT concession; total cost ~$1.2bn. First motorway in South Asia. Flagship infrastructure project of Nawaz''s industrial-bourgeois developmental programme. Foundation for later National Highway Authority
  network expansion under Musharraf (M-1 Islamabad-Peshawar 2007) and the CPEC-era M-3/M-4/M-5 build-out 2014-2020. Reduced Lahore-Islamabad travel time from 6 to 4 hours.

  '

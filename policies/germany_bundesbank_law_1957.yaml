title: Germany Bundesbank Law 1957
countries:
- DEU
timeframe:
  start: 1948
  end: 1966
description: 'The Gesetz über die Deutsche Bundesbank of 26 July 1957 consolidated the Bank deutscher Länder and the Land central banks into a single federal central bank with statutory price-stability
  mandate and explicit independence from federal government instruction (§12). The law codified the institutional template that later inspired ECB design and entrenched the West German monetary regime that
  anchored the Wirtschaftswunder.

  '

policy_id: gnb_imf_ecf_2023
status: candidate
title: Guinea-Bissau IMF Extended Credit Facility 2023
countries:
- GNB
timeframe:
  start: 2023
  end: 2026
  enacted_date: '2023-01-30'
description: 'Guinea-Bissau entered a three-year IMF Extended Credit Facility in January 2023 to restore macroeconomic stability after pandemic, food-price, and political shocks. The programme targeted domestic
  revenue mobilisation, wage-bill and expenditure control, arrears clearance, debt sustainability, public financial management, anti-corruption safeguards, and protection of priority social spending.

  '
enacted_by:
- guinea_bissau_embalo_stabilisation_cashew_state_2020_2025
scope: national
coalition_label_at_enactment: Embalo presidency
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The ECF anchors fiscal consolidation through revenue, wage-bill, arrears, and debt-control measures.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: PFM, anti-corruption, and fiscal-transparency benchmarks strengthen rule-bound administration.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The programme works through WAEMU macro constraints and supports reserve and debt-management credibility.
references:

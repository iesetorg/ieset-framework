policy_id: nl_box3_transitional_flat_rate_2024
status: candidate
title: Netherlands Box 3 transitional flat-rate response 2024
countries:
- NLD
timeframe:
  start: 2024
description: 'Schoof cabinet response to the Hoge Raad''s 6 June 2024 rulings (building on the 2021 Kerst-arrest) which found the existing fictitious-yield Box 3 wealth-tax regime unlawful where it exceeded
  real return. Coalition maintained the Overbruggingswet flat-rate bridge and committed to a new real-capital-return Box 3 system from 1 January 2027 (previously scheduled 2025 under Rutte IV). Transitional
  refunds to taxpayers whose fictitious yield exceeded measured actual return.

  '
enacted_by:
- netherlands_schoof_rightwing_2024_present
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: PVV-VVD-NSC-BBB (enacting); carried over from Rutte IV
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Hoge-Raad-forced refunds where fictitious yield exceeded real return reduce effective capital tax; direction is court-driven, not coalition-chosen.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Alignment of tax base with actual return strengthens taxpayer property claims against fictitious assessment.
references:
- Hoge Raad 24 December 2021 (Kerst-arrest); HR 6 June 2024 (ECLI:NL:HR:2024:704 et al.)
- Wet rechtsherstel box 3 2022; Overbruggingswet box 3 2023
- Ministerie van Financien beleidspakket box 3 2024-2025

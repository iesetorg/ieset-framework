description: 'Lubbers I cabinet imposed a 3% nominal cut in public-sector salaries effective 1 January 1984 (Actie 3%) alongside freezing social transfers and minimum wage. Part of Lubbers fiscal consolidation
  targeting deficit reduction. Public-sector unions struck in response but the measure held. Modelled internationally as proof that adjusted nominal wages were politically feasible in a consensus democracy.


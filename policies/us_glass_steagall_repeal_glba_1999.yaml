description: 'The Gramm-Leach-Bliley Act of 1999 (Pub. L. 106-102), also called the Financial Services Modernization Act, repealed sections 20 and 32 of the 1933 Glass-Steagall Act that had prohibited affiliations
  between commercial banks, securities firms, and insurance companies. GLBA authorized financial holding companies to combine these activities under unified ownership, codifying the existing Citicorp-Travelers
  merger structure and accelerating consolidation of U.S. financial services conglomerates.

  '

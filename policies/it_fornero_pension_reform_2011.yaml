policy_id: it_fornero_pension_reform_2011
status: candidate
title: Italy Fornero pension reform (2011)
countries:
- ITA
timeframe:
  start: 2012
  end: 2050
  enacted_date: '2011-12-06'
description: 'Pension reform embedded in D.L. 201/2011 under Labour Minister Elsa Fornero. Key measures: accelerated transition of all workers to the contributions-based (contributivo) calculation from
  2012 prospectively; standard retirement age raised and harmonised to 66y3m men/66y (public) and 62y women private phased to 66y10m by 2018; minimum contribution requirement 42y for men / 41y women for
  ''anzianità''; cost-of-living indexation frozen for pensions 3x minimum and above in 2012-2013. Long-run PV savings estimated at €80bn+. Created ''esodati'' cohort (early-retirees caught by new rules
  without bridging incomes) requiring successive remediation measures.

  '
enacted_by:
- italy_monti_technocratic_2011_2013
coalition_label_at_enactment: Monti technocratic
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Long-run pension outlays trimmed; retirement-age rise and contributivo transition.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Pension-spending trajectory reduced by ~2% GDP by 2040 (Ragioneria Generale projections).
references:

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: lb_deposit_restitution_framework_2025
status: candidate
title: Lebanon deposit-restitution and bank-loss allocation framework (2025)
countries:
- LBN
timeframe:
  start: 2025
  end: ongoing
description: >
  Framework for allocating Lebanon's post-2019 banking losses and defining a
  deposit-restitution path for households and firms. The policy distinguishes
  protected small deposits from larger claims, sets sequencing for bank
  restructuring and possible bail-in or recovery instruments, and attempts to
  turn frozen informal losses into a transparent legal hierarchy that can restore
  property-rights credibility and financial intermediation.
enacted_by:
- lebanon_aoun_salam_reconstruction_2025_present
coalition_label_at_enactment: Aoun-Salam reformist technocratic cabinet
axes_moved:
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: A transparent legal hierarchy for deposits is stronger property-rights protection than indefinite informal haircuts and withdrawal limits.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Axis semantic '+' is tighter financial regulation; bank-resolution and loss-allocation rules harden financial supervision.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Judicially and legislatively defined loss allocation replaces ad hoc bank-by-bank discretion.
linked_hypotheses:
- banking_crisis_cyprus_2013_bailin
- financial_market_depth_productivity
- classical_property_rights_security_fdi_premium_panel
references:
- Lebanese government banking-sector restructuring and depositor framework materials, 2025
- IMF Lebanon financial-sector reform recommendations, 2025
notes: Created to materialise a declared policy on lebanon_aoun_salam_reconstruction_2025_present.

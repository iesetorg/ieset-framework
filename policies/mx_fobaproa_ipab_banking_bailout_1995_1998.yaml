title: FOBAPROA / IPAB banking bailout 1995-1998
countries:
- MEX
timeframe:
  start: 1995
  end: 1998
  enacted_date: '1998-12-21'
description: 'Fondo Bancario de Protección al Ahorro (FOBAPROA) absorbed toxic loans from 12 of 18 Mexican banks during the post-Tequila banking collapse via loan-purchase swaps for non-tradeable government
  IOUs. Cumulative cost reached ~15% GDP (~$65B) by 1998. Ley del Instituto para la Protección al Ahorro Bancario (IPAB) promulgated 19 January 1999 converted FOBAPROA liabilities into explicit public debt.
  Scandal: PRI-PAN deal produced bipartisan blame; Eduardo Fernández (CNBV) testified repeatedly.

  '

policy_id: afg_literacy_womens_reforms_1978
status: candidate
title: Literacy, Education, and Women's Status Reforms
countries:
- AFG
timeframe:
  start: 1978
  end: 1986
description: The PDPA launched mass literacy campaigns, expanded secular schooling, and issued reforms aimed at changing marriage practices and women's social status. These programmes treated education and gender equality as state-led modernisation priorities, though implementation outside cities was uneven and often resisted during the expanding civil war.
enacted_by:
- afg_pdpa_saur_socialist_state_1978
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Literacy and schooling programmes expanded publicly provided social services.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: State education campaigns required budgetary and administrative expansion.
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: Formal legal rights for women expanded, while coercive implementation in some areas undermined procedural legitimacy.
references:
- "Thomas Barfield (2010), Afghanistan: A Cultural and Political History"
- Barnett R. Rubin (2002), The Fragmentation of Afghanistan
notes: Mixed rule-of-law coding reflects the tension between formal rights expansion and coercive revolutionary administration.

title: Bangsamoro Organic Law (RA 11054) establishing BARMM
countries:
- PHL
timeframe:
  start: 2019
  enacted_date: '2018-07-27'
description: 'Signed 27 July 2018 and ratified by plebiscite 21-25 January 2019, the Bangsamoro Organic Law (RA 11054) implemented the 2014 Comprehensive Agreement on the Bangsamoro between the government
  and the Moro Islamic Liberation Front. Created the Bangsamoro Autonomous Region in Muslim Mindanao (BARMM), replacing the former ARMM with expanded fiscal autonomy (automatic appropriations, block grants
  equal to 5% of internal revenue allotment net of IRA, power to tax and levy fees), parliamentary regional government with 80 seats, exclusive and concurrent-competence enumeration, and a transition period
  2019-2022 (extended to 2025) administered by the Bangsamoro Transition Authority. Decommissioning of MILF combatants proceeded in parallel under third-party monitoring. The BARMM''s first regular parliamentary
  elections were repeatedly postponed; held 13 October 2025 under successor administration.

  '

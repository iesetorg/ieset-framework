policy_id: tanzania_arusha_nationalisations_1967
status: candidate
title: Tanzania Arusha Nationalisations 1967
countries:
- TZA
timeframe:
  start: 1967
  end: 1985
description: 'Following the Arusha Declaration of February 1967, the Nyerere government nationalised the commercial banks, large industrial firms, sisal estates, insurance companies, and import-export trade,
  transferring assets to parastatals such as the National Bank of Commerce and the State Trading Corporation. The takeovers operationalised TANU''s policy of socialism and self-reliance, reorganising the
  modern sector under state ownership.

  '
enacted_by:
- tanzania_nyerere_ujamaa_1967_1985
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Conversion of private firms into parastatal monopolies removed competitive market structure.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Confiscation of private commercial assets sharply weakened ownership protections.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Nationalised firms financed expanded social services and rural transfer programmes.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Foreign trade was channelled through state monopoly bodies, restricting trade openness.

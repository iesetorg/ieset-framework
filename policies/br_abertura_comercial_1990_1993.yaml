description: 'Unilateral tariff reduction programme launched under Collor announcement 1990, continued under Itamar. Average nominal tariff 32.2% (1990) → 14.2% (1993). Non-tariff barriers abolished including
  the informatics sector reserve (Lei de Informática 1984 ended 1991-92). Importation licences eliminated. Part of broader structural-reform framework laid out in the Diretrizes Gerais para a Política Industrial
  e de Comércio Exterior (June 1990).


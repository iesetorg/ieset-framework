policy_id: cn_rmb_exchange_rate_reform_2005
status: candidate
title: RMB Managed-Float Reform 2005
countries:
- CHN
timeframe:
  start: 2005
  end: ongoing
  enacted_date: '2005-07-21'
description: 'Ended the decade-long de facto peg at 8.2765 RMB/USD maintained since 1997 and moved to a "managed floating exchange rate regime based on market supply and demand with reference to a basket
  of currencies." Initial 2.1% appreciation on announcement (8.11 RMB/USD); daily trading band initially 0.3%, widened to 0.5% (2007), 1.0% (2012), 2.0% (2014). RMB appreciated cumulatively ~21% against
  USD by July 2008 before re-pegging during the global financial crisis, then resuming controlled appreciation. Major step in RMB internationalisation and in policy-architecture shift from current-account-convertibility-only
  toward partial capital-account management.

  '
enacted_by:
- china_hu_era_2002_2012
coalition_label_at_enactment: CCP under Hu Jintao + Wen Jiabao
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Rule-based currency regime reduced fiscal-dominance of exchange-rate policy.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: false
  rationale: Appreciation partially addressed US-China trade frictions post-WTO accession.
references:
- PBoC announcement, 21 July 2005 — Reform of RMB exchange rate regime
- Lardy (2012), Sustaining China's Economic Growth After the Global Financial Crisis

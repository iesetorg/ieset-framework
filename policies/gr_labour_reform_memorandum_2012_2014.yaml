policy_id: gr_labour_reform_memorandum_2012_2014
status: candidate
title: Greece Memorandum-era labour reform bundle 2012-2014
countries:
- GRC
timeframe:
  start: 2012
  end: 2014
  enacted_date: '2012-02-14'
description: 'Bundle of labour-market reforms executed as Memorandum prior actions from February 2012 (under Papademos) through 2014 (under Samaras). Principal measures: minimum wage cut from €751 to €586
  (22% reduction, €510 for workers under 25, €527 under 22 with apprenticeship exceptions) via Act of Ministerial Council 6/28.02.2012; suspension of automatic extension of sectoral collective agreements
  (extension-erga-omnes only by tripartite decision); elimination of ''after-effect'' (metenergeia) of expired collective agreements beyond three months (Law 4046/2012); reduction of severance payments
  by c.50% (Law 4093/2012); shortened dismissal-notice periods; unilateral-arbitration restriction (court ruling then reinstated it in 2014); acceleration of OECD product-market recommendations in closed
  professions; labour-inspectorate digitalisation. Cumulative effect on unit labour costs was a c.20% cumulative reduction 2010-2014 restoring pre-euro-entry competitiveness on this metric. Social cost:
  unemployment peaked at 27.5% in 2013 (58% youth), long-term unemployment share reached 73%.

  '
enacted_by:
- greece_samaras_nd_pasok_2012_2015
coalition_label_at_enactment: ND + PASOK + DIMAR (initial Papademos prior actions carried forward)

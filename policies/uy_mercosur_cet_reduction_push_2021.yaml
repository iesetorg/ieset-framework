description: 'Uruguayan advocacy within Mercosur (from mid-2021) for a 10-20% cut in the bloc''s Common External Tariff and greater flexibility for member-state bilateral trade agreements with extra-bloc
  partners. The July 2022 Mercosur summit agreed to a partial ~10% CET reduction on selected lines (industrial inputs, IT goods) but rejected broader bilateral flexibility. Uruguay applied parts of the
  reduction unilaterally.


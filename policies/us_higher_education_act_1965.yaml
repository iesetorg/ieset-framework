policy_id: us_higher_education_act_1965
status: candidate
title: Higher Education Act 1965
countries:
- USA
timeframe:
  start: 1964
  end: 1968
description: 'The Higher Education Act of 1965 (Pub. L. 89-329) created federal student-aid programs including what became Pell Grants, the Guaranteed Student Loan program (predecessor to Stafford and FFELP),
  and Educational Opportunity Grants, alongside support for institutional aid to historically Black colleges and universities. The act is the foundational statutory framework for federal involvement in
  U.S. post-secondary education finance and has been periodically reauthorized to expand grant and loan ceilings.

  '

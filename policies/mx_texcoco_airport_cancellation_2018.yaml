title: Cancellation of Texcoco NAIM airport (2018)
countries:
- MEX
timeframe:
  start: 2018
  end: 2019
  enacted_date: '2018-10-29'
description: 'Cancellation of the partially-built Nuevo Aeropuerto Internacional de México (NAIM) in Texcoco following a non-binding public consulta held 25-28 October 2018, announced 29 October before
  AMLO''s inauguration. ~30% completed; cancellation costs estimated ~USD 5bn+ (buyout of fibra bonds, penalties, sunk capex). Replaced by the Felipe Ángeles Airport (AIFA) at the Santa Lucía military base,
  executed by SEDENA.

  '

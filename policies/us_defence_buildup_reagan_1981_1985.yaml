title: Reagan defence buildup (1981-1985)
countries:
- USA
timeframe:
  start: 1981
  end: 1985
description: 'Sustained real increase in US defence outlays from $157bn (FY1981) to $253bn (FY1985) — a ~35% real rise. Defence share of GDP rose from 5.7% to 6.5%. Procurement included MX Peacekeeper ICBM,
  B-1B bomber restoration, Trident II D-5 SLBM, 600-ship Navy programme, and Army Airland Battle doctrine equipment. Funded largely by deficit given ERTA revenue contraction.

  '

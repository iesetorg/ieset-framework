policy_id: india_economic_liberalisation_1991
status: candidate
title: Indian Economic Liberalisation 1991 (Rao-Manmohan reforms)
countries:
- IND
timeframe:
  start: 1991
  end: 1996
  enacted_date: '1991-07-24'
description: 'Response to 1991 balance-of-payments crisis under PM Narasimha Rao and Finance Minister Manmohan Singh. Dismantled the ''Licence Raj'': abolished most industrial licensing (retained for 18
  sectors then progressively reduced), phased out public-sector monopolies in sensitive sectors, reduced peak import tariffs from ~150% to ~65% by 1996, liberalised FDI via automatic-approval route up to
  51%, devalued the rupee ~20%, and initiated banking + capital-market reform. Transformed growth from ''Hindu rate'' of ~3.5% to 6-7% sustained through the 2000s. Landmark policy-content case the framework
  uses for trajectory analysis in an LDC context.

  '

policy_id: saudi_vat_introduction_2018
status: candidate
title: Saudi Vat Introduction 2018
countries:
- SAU
timeframe:
  start: 2016
  end: ongoing
description: 'Saudi Arabia introduced a 5% VAT on 1 January 2018 under the GCC Unified VAT Agreement, then tripled the rate to 15% in July 2020 in response to the COVID-19/oil-price shock. Administered
  by ZATCA (formerly GAZT), it represented the first broad consumption tax in the Kingdom and a structural step toward non-oil fiscal-revenue diversification under Vision 2030.

  '

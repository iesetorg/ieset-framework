policy_id: png_mining_act_1992
status: candidate
title: Papua New Guinea Mining Act 1992
countries: [PNG]
timeframe: {start: 1992, end: ongoing}
description: >
  Papua New Guinea's Mining Act 1992 modernised mining licensing and state
  authority over mineral development after the first post-independence resource
  cycle. The framework structured exploration licences, mining leases, and
  state-landowner-company negotiations for major projects.
enacted_by:
  - papua_new_guinea_independence_resource_state_1975_present
axes_moved:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, intended: true, rationale: "Mining entry and development depend on formal licences and state approvals."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, intended: true, rationale: "The act formalised mining rights while interacting with customary landowner claims."}
references:
  - "Papua New Guinea Mining Act 1992"
  - "World Bank, PNG mining-sector governance reports"

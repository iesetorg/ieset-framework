policy_id: ng_endbadgovernance_protests_response_2024
status: candidate
title: '#EndBadGovernance protests and state response (August 2024)'
countries:
- NGA
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-08-01'
description: 'Ten days of nationwide protests 1-10 August 2024 against cost-of-living pressure, naira depreciation, and subsidy-removal aftershocks, organised under the #EndBadGovernance hashtag and evoking
  the October 2020 #EndSARS movement. Security-force response included live-fire incidents in northern states (Kano, Kaduna, Niger, Katsina), at least 20 deaths reported by Amnesty International, and treason
  charges filed against 76 protesters including minors (dropped November 2024 after public outcry). A partial policy response followed: a temporary 150-day zero-tariff window on food imports (July 2024)
  and enhanced cash-transfer rollout.

  '

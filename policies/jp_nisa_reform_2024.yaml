policy_id: jp_nisa_reform_2024
status: candidate
title: Japan — NISA permanent tax-free investment account reform (2024)
countries:
- JPN
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-01'
description: 'New NISA (Nippon Individual Savings Account) regime effective 1 January 2024 under the 2023 tax reform package, replacing the prior time-limited general NISA and Tsumitate NISA with a permanent,
  expanded single framework. Combines an annual "tsumitate" (accumulation) allowance of ¥1.2m and a "growth" allowance of ¥2.4m, totalling ¥3.6m per year, with a ¥18m lifetime holding cap. Capital gains,
  dividends, and distributions on assets held within NISA accounts are exempt from the standard 20.315% capital-income tax. Positioned as the centrepiece of Kishida''s "Doubling Asset-Based Income Plan"
  (shisan shotoku baizō keikaku), shifting household portfolios from ¥2,000tn+ of mostly cash-and-deposits toward equities. NISA account openings and net equity inflows accelerated sharply in 2024.

  '

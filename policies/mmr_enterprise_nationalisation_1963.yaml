# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mmr_enterprise_nationalisation_1963
status: candidate
title: Enterprise Nationalisation Law and State Takeovers
countries:
- MMR
timeframe:
  start: 1963
  end: 1965
description: The Revolutionary Council used the Enterprise Nationalisation Law and related decrees to transfer banks, wholesale and retail trade, rice mills, transport, mining, manufacturing, and many service businesses into state ownership. The measures displaced much of the private commercial sector and made state corporations the main channel for production, distribution, and credit.
enacted_by:
- mmr_burmese_way_to_socialism_1962
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Large-scale expropriation sharply reduced security of private ownership in commercial and industrial assets.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Nationalised enterprises replaced private firms with state monopolies in major sectors.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Sectoral activity was increasingly authorised through state ownership and administrative allocation.
references:
- Robert H. Taylor (2009), The State in Myanmar
- "David I. Steinberg (2001), Burma: The State of Myanmar"

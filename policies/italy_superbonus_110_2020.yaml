policy_id: italy_superbonus_110_2020
status: candidate
title: Italy Superbonus 110% building-efficiency tax credit 2020
countries:
- ITA
timeframe:
  start: 2020
  end: 2024
  enacted_date: '2020-05-19'
description: 'Tax credit covering 110% of qualifying building energy-efficiency and seismic works (wall insulation, heating replacement, window upgrades, seismic retrofits), introduced under Decreto Rilancio
  (Decreto-legge 34/2020, Law 77/2020) as COVID-era construction stimulus. Structural novelty: cessione del credito mechanism allowed taxpayers to transfer the credit to contractors or banks, effectively
  converting the personal tax allowance into a liquid market-traded fiscal asset. Originally scoped as temporary through end-2021, extended multiple times into 2024 at declining 110→90→70% rates. Ex-post
  fiscal cost escalated from ~€35bn ex-ante estimate to ~€220bn cumulative by 2024 per MEF / Corte dei Conti, reflecting uncapped demand, fraud exposure, and cost inflation in construction inputs. Drove
  construction-sector boom 2021-2023 (construction GVA +40%+ from pre-COVID base) and was a material component of Italy''s 2021-2023 growth surprise above EU-average. Meloni government phased out under
  Decreto-legge 11/2023 (restricting cessione) and Decreto- legge 39/2024 (tightening further).

  '

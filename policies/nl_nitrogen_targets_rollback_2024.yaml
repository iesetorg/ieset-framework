  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Binding 2030 target dropped; farm buyout pressure replaced with voluntary innovation pathway.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: NPLG envelope (~25bn euro) scaled back in 2025 Miljoenennota.

policy_id: nl_nitrogen_targets_rollback_2024
status: candidate
title: Netherlands nitrogen reduction target rollback 2024
countries:
- NLD
timeframe:
  start: 2024
description: 'Schoof coalition agreement scrapped the Rutte-IV legal 2030 50%-reduction target for nitrogen deposition, pushing the binding deadline to 2035 and replacing the farmer-buyout pressure with
  voluntary innovation-based pathways. Reversed key elements of the Nationaal Programma Landelijk Gebied (NPLG). Response to BBB farmer-protest constituency and to the stikstofcrisis construction-permit
  freeze after the 2019 PAS annulment.

  '
enacted_by:
- netherlands_schoof_rightwing_2024_present
coalition_label_at_enactment: PVV-VVD-NSC-BBB
axes_moved:

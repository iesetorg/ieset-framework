policy_id: kr_sejong_relocation_plan_2005
status: candidate
title: Sejong administrative capital relocation plan (2005)
countries:
- KOR
timeframe:
  start: 2005
  end: 2012
  enacted_date: '2005-03-18'
description: 'Special Act on the Establishment of the Administrative City (Sejong) passed 18 March 2005 after Constitutional Court struck down earlier Capital Relocation Special Act (October 2004) on customary-constitution
  grounds (Seoul as capital since 1394). Revised act relocated 12 ministries to Chungcheong region (Sejong City) while keeping Seoul as nominal capital. Paired with Innovation Cities plan dispersing 153
  public agencies to 10 non-capital regions. Construction began 2007; first ministries relocated 2012. Originally designed to reduce capital concentration (Seoul metro 50%+ population).

  '

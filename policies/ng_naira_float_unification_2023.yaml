policy_id: ng_naira_float_unification_2023
status: candidate
title: Naira float and FX window unification
countries:
- NGA
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-06-14'
description: 'On 14 June 2023 the Central Bank of Nigeria collapsed its multiple exchange-rate windows (official, I&E, SMIS, Investors'', BDC) into a single willing-buyer-willing-seller regime at the Investors
  & Exporters window, effectively floating the naira. The official rate moved from ~N460/$ to ~N750/$ on day one and to N1,600+/$ by mid-2024. Complemented by the October 2023 lifting of the 43-item FX
  import ban introduced under Buhari. Intended to end the FX rationing / parallel-market premium that had made Nigeria an outlier in sub-Saharan Africa.

  '
enacted_by:
- nigeria_tinubu_apc_2023_present
coalition_label_at_enactment: APC
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: Ended FX rationing regime; 43-item import-ban list lifted Oct 2023.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  intended: true
  rationale: Willing-buyer-willing-seller replaces administered rate and BDC price controls.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Reduces CBN discretionary FX allocation; aligns with orthodoxy.
references:
- CBN Circular FMD/DIR/PUB/FPC/001/003 (14 June 2023)
- IMF Nigeria 2024 Article IV

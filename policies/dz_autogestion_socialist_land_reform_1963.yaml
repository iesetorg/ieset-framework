# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: dz_autogestion_socialist_land_reform_1963
status: candidate
title: "Autogestion and socialist land reform"
countries: [DZA]
timeframe: {start: 1963, end: 1971}
description: >
  After independence, Algeria placed many abandoned colonial farms and
  enterprises under worker self-management and later state-directed agrarian
  reform. The measures made land and productive assets symbols of national
  sovereignty while shifting major parts of the former settler economy away
  from private ownership into collective, cooperative, or state-supervised
  control.
enacted_by:
  - algeria_fln_socialist_developmental_state_1962_1978
coalition_label_at_enactment: "FLN"
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Colonial private holdings and abandoned enterprises were collectivised or placed under state-supervised management.", intended: true}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Agricultural production and marketing were increasingly channelled through state-recognised structures.", intended: true}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "The state assumed administrative and investment responsibility for a large public agricultural sector.", intended: true}
references:
  - "John Ruedy, Modern Algeria"
  - "Algerian March Decrees on autogestion, 1963"

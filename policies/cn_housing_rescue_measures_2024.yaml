description: 'Package of housing-market support measures rolled out by the State Council and PBOC in 2024, including reductions in mortgage down-payments and rates, removal or relaxation of home-purchase
  restrictions in major cities, and a centrally funded relending facility for state-owned enterprises to acquire unsold inventory. Aimed at stabilising the post-2021 property correction.

  '

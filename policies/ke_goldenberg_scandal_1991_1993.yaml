status: candidate
title: Kenya Goldenberg scandal 1991-1993
countries:
- KEN
timeframe:
  start: 1991
  end: 1993
description: 'Government export-compensation scheme paid 35% bonus on hard-currency gold and diamond exports to Goldenberg International (owned by Kamlesh Pattni in alliance with VP Saitoti and security
  chiefs). Kenya produced negligible gold and no diamonds. Fraudulent claims cost an estimated $600m-$1bn (10%+ of GDP in the period). Depleted Central Bank reserves and produced a sharp currency crisis.
  Emblematic of 1990s Kenyan governance failure.

  '

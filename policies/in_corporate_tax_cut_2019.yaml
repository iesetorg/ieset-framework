policy_id: in_corporate_tax_cut_2019
status: candidate
title: India — Corporate tax cut 30% to 22% (2019)
countries:
- IND
timeframe:
  start: 2019
  enacted_date: '2019-09-20'
description: 'Taxation Laws (Amendment) Ordinance 2019 reduced the base corporate income tax rate for existing domestic companies from 30% to 22% (effective ~25.17% including surcharge and cess) and offered
  a concessional 15% rate (effective ~17.01%) for newly incorporated domestic manufacturing companies commencing operations by 31 March 2023 (extended subsequently). Companies electing the lower rates forgo
  most existing exemptions and incentives (MAT does not apply). Revenue cost was estimated by the Finance Ministry at ~₹1.45 trillion per year at announcement. Stated rationale was restoring investment
  and manufacturing competitiveness with ASEAN and post-TCJA US rates. Announced by Finance Minister Nirmala Sitharaman in Goa ahead of the GST Council meeting.

  '

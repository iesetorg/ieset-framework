description: 'Roh administration committed to build 2 million housing units over five years 1988-1992 in response to severe land-price and housing- cost inflation after 1987 democratisation; five new towns
  built around Seoul (Bundang, Ilsan, Pyeongchon, Jungdong, Sanbon). Successful completion with ~2.7 million units delivered; stabilised housing prices and expanded middle-class homeownership.

  '

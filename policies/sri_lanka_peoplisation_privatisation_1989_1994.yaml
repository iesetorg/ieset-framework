policy_id: sri_lanka_peoplisation_privatisation_1989_1994
status: candidate
title: Lanka Peoplisation Privatisation 1989 1994
countries:
- LKA
timeframe:
  start: 1977
  end: 1994
description: 'The ''peoplisation'' programme launched under President Premadasa from 1989 onward partially privatised state-owned enterprises in plantations, transport, telecoms and manufacturing through
  public share offerings, employee allocations, and trade sales. It was framed as broad-based ownership rather than pure divestiture and ran in parallel with continued open-economy liberalisation, reducing
  the SOE footprint in the Sri Lankan economy through the early 1990s.

  '
enacted_by:
- sri_lanka_open_economy_1977
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised firms operated under a more liberalised import and capital regime.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Divestment of SOE monopolies allowed private entrants and competitive pricing.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sale of loss-making SOEs reduced subsidy obligations to state firms.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Restructuring incentives and continued support to favored sectors retained sectoral subsidy.

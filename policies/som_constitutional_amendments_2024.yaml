policy_id: som_constitutional_amendments_2024
status: candidate
title: Somalia constitutional amendments 2024
countries:
- SOM
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-03-30'
description: >
  Somalia's federal parliament approved amendments to the first chapters of the
  provisional constitution in March 2024, including changes to executive design,
  political-party rules, electoral arrangements, and federal institutional
  architecture. The amendments advanced the federal government's constitutional
  completion agenda but were contested by some federal member-state and
  opposition actors over process and power distribution.
enacted_by:
- somalia_hassan_sheikh_debt_security_statebuilding_2022_present
scope: national
coalition_label_at_enactment: Hassan Sheikh Mohamud federal government
axes_moved:
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: The amendments formalized constitutional rules but remained disputed by key political actors over consensus and federal balance.
- axis: institutional.judicial_independence
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Constitutional completion clarifies institutions, while executive-design changes may concentrate power depending on implementation.
references:
- Federal Parliament of Somalia constitutional-amendment decisions, March 2024.
- UN Assistance Mission in Somalia and international reporting on Somalia's 2024 constitutional amendments.
- Associated Press reporting on Somalia's 2024 constitutional changes and political dispute.
notes: >
  The policy is coded mixed because formal constitutional completion and
  contested federal legitimacy move institutional channels in opposite
  directions.

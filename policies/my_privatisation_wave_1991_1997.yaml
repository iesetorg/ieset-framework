policy_id: my_privatisation_wave_1991_1997
status: candidate
title: Malaysia privatisation wave 1991-1997
countries:
- MYS
timeframe:
  start: 1991
  end: 1997
description: 'Systematic privatisation programme under the Privatisation Master Plan 1991 (PMP) continuing from earlier 1980s experiments — privatised Tenaga Nasional (TNB, 1992 listing), Telekom Malaysia
  (1990 listing), Malaysian Airline System (MAS, 1994), Proton (1992 listing), North-South Expressway (PLUS concession), Port Kelang, and others. Mixed structure — frequent awards to UMNO-linked Bumiputera
  groups (Halim Saad Renong, Tajudin Ramli MAS, Samsudin Abu Hassan) complicating subsequent restructuring.

  '

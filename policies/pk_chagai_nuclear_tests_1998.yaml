policy_id: pk_chagai_nuclear_tests_1998
status: candidate
title: Pakistan Chagai nuclear tests (1998)
countries:
- PAK
timeframe:
  start: 1998
  end: 1998
  enacted_date: '1998-05-28'
description: 'Five underground nuclear detonations at Ras Koh Hills, Chagai district, Balochistan on 28 May 1998 (Chagai-I) followed by a sixth at nearby Kharan on 30 May 1998 (Chagai-II). Response to India''s
  Pokhran-II tests 11-13 May. Declared Pakistan a nuclear- weapon state. Triggered US Pressler Amendment and Glenn Amendment sanctions; Japan, EU suspensions; suspended IMF support. Foreign-currency accounts
  frozen 28 May 1998 to stem capital flight (~$11bn in affected accounts). Sanctions partially lifted 1998-2000, fully lifted after 9/11 pivot in 2001. Established Pakistan-India nuclear dyad and South
  Asian strategic-stability frame.

  '

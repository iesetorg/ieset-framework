policy_id: india_semiconductor_mission_2024_present
status: candidate
title: India Semiconductor Mission 2024 Present
countries:
- IND
timeframe:
  start: 2024
  end: ongoing
description: 'The India Semiconductor Mission scaled subsidies for fab and ATMP (assembly, test, mark, pack) facilities via the Modified Programme for Development of Semiconductors and Display Manufacturing
  Ecosystem, approving multi-billion-dollar capital support to TATA Electronics, Micron Sanand, and others. Implemented through MeitY under the Modi third-term government, it pairs production-linked incentives
  with design-linked support and supply-chain co-investment with foreign partners.

  '
enacted_by:
- india_modi_third_term_2024_present
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Capex-linked tax incentives and customs concessions accrue to capital owners and large corporates.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct fiscal support of up to 50% of project cost for approved fabs and ATMP units.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Programme outlays expanded sectoral spending while crowding some allocations from other capital schemes.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Entry of new fabs and design firms increases domestic supply diversity in a previously import-dependent sector.

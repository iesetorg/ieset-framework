  direction: +
  magnitude: weak
  intended: true
  rationale: Formal titles enabled land-market transactions and collateral pledging by smallholders.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Universal titling regime is the textbook property-rights reform — direct, central effect.
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Standardised tenure but consolidation policies displaced informal smallholder claimants.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Titled land lowered FDI entry barriers and raised investor confidence in property regime.

policy_id: rwanda_land_tenure_regularisation_2008
status: candidate
title: Rwanda Land Tenure Regularisation 2008
countries:
- RWA
timeframe:
  start: 1994
  end: ongoing
description: 'Rwanda''s Land Tenure Regularisation Programme, launched under the 2005 Organic Land Law and rolled out nationally from 2008, systematically demarcated and titled all parcels in the country.
  Implemented by the Rwanda Natural Resources Authority with donor co-financing (DFID), it issued formal leasehold certificates and recorded gender-equal land rights for spouses.

  '
enacted_by:
- rwanda_post_genocide_reconstruction_1994_2020
axes_moved:

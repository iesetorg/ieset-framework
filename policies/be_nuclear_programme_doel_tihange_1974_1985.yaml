policy_id: be_nuclear_programme_doel_tihange_1974_1985
status: candidate
title: Belgium nuclear-power programme — Doel and Tihange commissioning (1974-1985)
countries:
- BEL
timeframe:
  start: 1974
  end: 1985
description: 'Civil-nuclear programme commissioning seven PWR reactors at Doel (1975-1985) and Tihange (1975-1985). At peak provided ~55% of Belgian electricity. State-directed via SYNATOM and Electrabel
  (partly state-owned via SOCIÉTÉ GÉNÉRALE holding). Key infrastructure for energy-supply security post-first-oil-shock. 2003 phase-out law (Di Rupo) later reversed; current phase-out trajectory still disputed.

  '

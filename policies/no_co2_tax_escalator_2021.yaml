policy_id: no_co2_tax_escalator_2021
status: candidate
title: CO2 tax escalator toward NOK 2000/t by 2030
countries:
- NOR
timeframe:
  start: 2021
  end: ongoing
description: 'Multi-year escalator committing Norway''s CO2 tax on non-ETS emissions to rise to approximately NOK 2000/tonne by 2030 (real 2020 kroner), set in the Klimaplan 2021-2030 (Meld. St. 13, 2020-2021)
  under Solberg and carried forward and re-affirmed by the Støre government. Annual budget laws step the rate upward with parallel compensatory measures for fisheries and agriculture. Interacts with the
  EU ETS coverage of petroleum and industry via Norway''s EEA participation.

  '
enacted_by:
- norway_solberg_rightbloc_2013_2021
- norway_store_ap_sp_2021_present
coalition_label_at_enactment: H-V-KrF (2021 origination); AP-Sp (continuation)
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  intended: true
  rationale: Multi-year statutory price-path on non-ETS emissions; explicit NOK 2000/t 2030 target.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  rationale: Incremental tax on business emissions; partial sector compensation outside ETS.
references:
- Meld. St. 13 (2020–2021) Klimaplan for 2021–2030
- Finansdepartementet annual CO2 tax rate schedules 2021-2025

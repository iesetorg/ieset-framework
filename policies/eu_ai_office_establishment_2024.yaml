description: 'Commission Decision C(2024) 390 created the European AI Office within DG CNECT in February 2024 to centrally supervise general-purpose AI models, draft codes of practice, coordinate national
  market-surveillance authorities under the AI Act, and run the AI Pact and scientific advisory panels. The Office consolidates EU-level enforcement of GPAI obligations and serves as the institutional hub
  for AI Act implementation across the bloc.

  '

policy_id: bo_capitalizacion_law_1544_1994
status: candidate
title: Bolivia Capitalización law (Ley 1544) 1994
countries:
- BOL
timeframe:
  start: 1994
  enacted_date: '1994-03-21'
description: 'Ley 1544 of 21 March 1994. Unique Bolivian privatisation model — private strategic investor injected new capital equal to book value of 6 SOEs (YPFB, ENTEL, ENDE, ENFE, LAB, Vinto) in exchange
  for 50% + management control; remaining 50% shares assigned to Collective Capitalisation Fund benefiting all adult citizens ≥21, funding Bonosol universal pension. Widely studied alternative to standard
  privatisation.

  '

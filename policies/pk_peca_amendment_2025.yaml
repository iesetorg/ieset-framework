  enacted_date: '2025-01-29'
description: 'Prevention of Electronic Crimes (Amendment) Act 2025, assented 29 January 2025. Introduced ''Social Media Protection and Regulatory Authority'' (SMPRA) with broad takedown powers; criminalised
  ''fake'' or ''false'' information online with imprisonment up to 3 years and PKR 2m fines; created a dedicated Social Media Protection Tribunal; expanded jurisdiction to apply to non-registered social-media
  platforms. Rolled out amid an ongoing block on X (Twitter) in effect since February 2024 around the general election. Civil-society, journalist-union, and opposition contestation substantial; PFUJ and
  HRCP issued withdrawal demands. Framed by government as counter-disinformation measure; framed by opposition as pre-election speech suppression entrenched in statute.

  '

policy_id: us_medicaid_expansion_2010
status: candidate
title: Medicaid Expansion 2010
countries:
- USA
timeframe:
  start: 2009
  end: 2012
description: 'The Affordable Care Act of 2010 (Pub. L. 111-148) extended Medicaid eligibility to all non-elderly adults at or below 138% of the federal poverty line, with the federal government initially
  funding 100% of the expansion population (later phasing to 90%). Following NFIB v. Sebelius (2012), which made expansion optional for states, adoption proceeded state by state, ultimately covering tens
  of millions of additional low-income adults previously ineligible under traditional categorical Medicaid criteria.

  '

policy_id: kr_imf_standby_1997
status: candidate
title: South Korea IMF Standby Arrangement December 1997
countries:
- KOR
timeframe:
  start: 1997
  enacted_date: '1997-12-03'
description: 'IMF Standby Arrangement signed 3 Dec 1997 for Korea providing $21bn IMF + $10bn IBRD + $4bn ADB + $23.4bn bilateral (G7 ''second line'') totalling $58.4bn — largest IMF package to that point.
  Conditionality: floating exchange rate, inflation targeting, chaebol governance reforms, financial-sector restructuring including closure of 9 merchant banks, labour-market flexibility, capital-account
  opening completion. Crisis-resolution within 4 years; framework reshaped under subsequent Kim Dae-jung government.

  '
enacted_by:
- skorea_kim_young_sam_ds_1993_1998
coalition_label_at_enactment: NKP under President Kim Young-sam (lame-duck)
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  intended: true
  rationale: Chaebol governance and financial-restructuring conditionality.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Labour-market flexibility conditionality under IMF programme.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  intended: true
  rationale: Bank of Korea Act revision 1997 granted statutory independence and inflation-targeting mandate.
references:
- Letter of Intent of the Government of Korea to the IMF, 3 Dec 1997
- 'Koo & Kiser (2001), ''Recovery from a Financial Crisis: The Case of South Korea'''

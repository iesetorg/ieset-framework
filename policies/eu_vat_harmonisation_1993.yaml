timeframe:
  start: 1986
  end: 1993
description: 'In preparation for the abolition of internal customs frontiers on 1 January 1993, the Council adopted Directive 91/680/EEC and Directive 92/77/EEC harmonising VAT rules: a transitional regime
  for intra-Community trade replaced import VAT at internal borders with destination-principle reverse-charge accounting, and a minimum standard rate of 15% with reduced-rate floors was set. The reforms
  allowed the single market to function without fiscal frontiers between member states.

  '
enacted_by:
- eu_single_market_1993
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Removed VAT-frontier compliance friction allowing easier intra-EU competition in goods markets.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Replaced internal-border VAT collection with destination-principle reverse charge for intra-EU trade.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Eliminated fiscal frontier checks complementing free movement of persons within the single market.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Harmonised VAT registration regimes lowered the licensing burden of cross-border traders.

description: 'Seven-question national referendum called by President Lenín Moreno, approved with 64-73% yes votes. Re-imposed two-term limit on all elected offices (reversing Correa''s 2015 amendment allowing
  indefinite re-election), restructured the Consejo de Participación Ciudadana y Control Social into a transitional council with power to re-appoint oversight authorities, barred convicted corruption offenders
  from politics, ended metallic mining in protected areas, and tightened sanctions for sexual crimes against minors.

  '

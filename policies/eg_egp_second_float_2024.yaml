policy_id: eg_egp_second_float_2024
status: candidate
title: EGP second float and 600bp rate hike (March 2024)
countries:
- EGY
timeframe:
  start: 2024
  enacted_date: '2024-03-06'
description: 'On 6 March 2024 the Central Bank of Egypt''s Monetary Policy Committee held an unscheduled meeting and raised policy rates by 600bp (overnight deposit to 27.25%, lending to 28.25%) while simultaneously
  unifying the exchange rate and allowing the Egyptian pound to depreciate from ~30.9 to ~49.5 per USD. The step cleared a multi-billion-dollar parallel-market premium, moved Egypt to a managed-float regime,
  and was coordinated with the Ras El-Hekma cash inflow and the imminent IMF EFF expansion.

  '
enacted_by:
- egypt_sisi_third_term_2024_present
coalition_label_at_enactment: Mostaqbal Watan / Presidency

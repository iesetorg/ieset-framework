policy_id: ie_budget_2024_cost_of_living_package
status: candidate
title: Budget 2024 Cost Of Living Package
countries:
- IRL
timeframe:
  start: 2022
  end: 2024
description: 'Budget 2024, presented in October 2023, combined permanent welfare-rate increases, a personal-tax package, and a one-off "cost-of-living" package of energy credits, double payments, and lump-sum
  supports financed from corporation-tax windfalls. The package was the third successive cost-of- living budget responding to post-pandemic and energy-shock inflation, and channelled part of the surplus
  into the new Future Ireland Fund and Infrastructure, Climate and Nature Fund.

  '

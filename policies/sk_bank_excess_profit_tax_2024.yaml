policy_id: sk_bank_excess_profit_tax_2024
status: candidate
title: Slovakia bank excess-profit tax 2024
countries:
- SVK
timeframe:
  start: 2024
  end: ongoing
description: 'Slovakia imposed a special bank levy from 2024 as part of the Fico government''s fiscal and redistribution package. The levy applies an additional charge to bank profits during the high-interest-rate
  period, with scheduled rate changes over later years, and is designed to raise revenue from financial institutions benefiting from wider interest margins.

  '
enacted_by:
- slovakia_fico_fourth_2023_present
scope: national
coalition_label_at_enactment: Smer-SD-Hlas-SNS coalition
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: The levy raises the effective tax burden on banks above the ordinary corporate income tax.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Sector-specific profit taxation tightens the financial-sector policy environment.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: The package was tied to financing pension and family-transfer commitments.
references:

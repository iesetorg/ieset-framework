policy_id: uae_foreign_ownership_reform_2020
status: candidate
title: Foreign Ownership Reform 2020
countries:
- ARE
timeframe:
  start: 1971
  end: ongoing
description: 'Federal Decree-Law No. 26 of 2020 amended the UAE Commercial Companies Law to abolish the long-standing requirement for 51% Emirati ownership of onshore mainland companies, allowing 100% foreign
  ownership across most economic sectors. The reform unified the foreign-ownership treatment of mainland firms with the long-standing free-zone regime and aimed to attract sustained FDI as part of post-pandemic
  diversification.

  '

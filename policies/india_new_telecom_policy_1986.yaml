  end: 1986
  enacted_date: '1986-04-01'
description: 'Posts & Telegraphs Department restructured 1 Apr 1986 into Mahanagar Telephone Nigam Ltd (MTNL, Delhi and Mumbai) and Videsh Sanchar Nigam Ltd (VSNL, international). Commercial-corporation
  model separated telecom from postal services and opened the way for subsequent private-sector equipment supply and service licensing. C-DOT-designed Rural Automatic Exchanges mass-deployed from 1987.

  '

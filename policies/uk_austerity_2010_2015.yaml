policy_id: uk_austerity_2010_2015
status: candidate
title: Austerity 2010 2015
countries:
- GBR
timeframe:
  start: 2010
  end: 2016
description: 'Cameron–Clegg coalition fiscal consolidation programme launched after the June 2010 Emergency Budget by Chancellor George Osborne, combining real-terms cuts to non-protected departmental budgets,
  public-sector pay restraint, and welfare retrenchment with phased corporate-tax reductions. The Office for Budget Responsibility was created to enforce fiscal mandates, and the programme aimed to eliminate
  the structural deficit while restoring market confidence in UK sovereign debt.

  '

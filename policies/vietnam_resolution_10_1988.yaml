policy_id: vietnam_resolution_10_1988
status: candidate
title: Vietnam Resolution 10 1988
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
description: 'Politburo Resolution 10 of April 1988 ("Khoan 10") devolved agricultural land-use rights to individual peasant households via long-term contracts (initially 15 years), replacing collective-farm
  production teams. Households gained discretion over crop choice and could retain output above contract quotas. The reform converted Vietnam from a rice importer to one of the world''s largest rice exporters
  within a few years and is the agricultural cornerstone of Doi Moi.

  '

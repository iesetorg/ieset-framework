policy_id: id_sby_raw_mineral_export_ban_2014
status: candidate
title: Raw-mineral ore export ban 2014
countries:
- IDN
timeframe:
  start: 2014
  end: ongoing
  enacted_date: '2014-01-12'
description: 'Implementing regulations (PP 1/2014, Permen ESDM 1/2014) under the 2009 Mining Law that banned export of unprocessed mineral ores (nickel, bauxite, copper concentrate, iron ore) effective
  12 January 2014. Copper concentrate received partial exemption via progressive export duties; nickel and bauxite bans were fully effective. Triggered an initial FDI shock and ~USD 5bn hit to mineral export
  revenues, but catalysed domestic smelter construction, especially nickel in Sulawesi (Morowali IMIP, Konawe). Nickel ban was partially relaxed 2017 and reinstated Jan 2020 under Jokowi.

  '
enacted_by:
- indonesia_sby_demokrat_2004_2014
coalition_label_at_enactment: Demokrat-led rainbow coalition
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Outright export ban on key mineral ores.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: De facto subsidy to domestic smelters via below-world-price ore feedstock.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Abrupt effective-date enforcement impaired existing export contracts.
references:
- PP No. 1 Tahun 2014; Permen ESDM No. 1 Tahun 2014
- Patunru (2018), 'Rising Economic Nationalism in Indonesia', Journal of Southeast Asian Economies

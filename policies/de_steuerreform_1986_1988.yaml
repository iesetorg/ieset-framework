description: 'Multi-year tax reform phased through Steuersenkungsgesetz 1986, Steuersenkungserweiterungsgesetz 1988, and Steuerreformgesetz 1990. Cumulatively reduced personal income-tax top rate from 56%
  to 53% (effective 1990), basic rate reductions, smoother rate progression, tax-free threshold increases. Approximately DM40-50bn cumulative relief. Moderate relative to Reagan/Thatcher but significant
  in German context.

  '

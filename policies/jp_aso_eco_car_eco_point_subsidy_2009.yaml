policy_id: jp_aso_eco_car_eco_point_subsidy_2009
status: candidate
title: Aso Eco Car Eco Point Subsidy 2009
countries:
- JPN
timeframe:
  start: 2007
  end: 2009
description: 'The Aso cabinet''s eco-car and eco-point ("eco-points") subsidy programmes, enacted in the 2009 supplementary budgets following the global financial crisis, paid scrappage and purchase incentives
  for fuel-efficient vehicles and energy-efficient appliances/televisions. The schemes combined countercyclical demand support with environmental signalling and pulled forward consumer durable spending
  into the recession period.

  '

  direction: '-'
  magnitude: weak
  intended: true
  rationale: PCA monopoly over copra trading and milling concentrated sectoral control under crony intermediaries.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Decree-based diversion of farmer levies to crony entities later ruled an abuse of statutory authority.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Compulsory levy on coconut farmers without effective beneficiary control eroded rural property claims.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Levy proceeds funded UCPB credit and Cocofed-linked sectoral subsidies during the martial-law period.

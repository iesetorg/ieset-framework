policy_id: philippines_coconut_levy_1973
status: candidate
title: Philippines Coconut Levy 1973
countries:
- PHL
timeframe:
  start: 1965
  end: 1986
description: 'Coconut levy introduced under Marcos-era martial-law decrees beginning in 1973, taxing copra producers ostensibly to capitalise the coconut industry through PCA-sponsored institutions including
  the United Coconut Planters Bank and the consolidated UCPB-Cocofed structure. In practice the proceeds were channelled to Marcos cronies and enterprises, generating decades of recovery litigation and
  Sandiganbayan/Supreme Court rulings on ill-gotten-wealth status into the 2010s.

  '
enacted_by:
- philippines_marcos_authoritarian_economy_1965_1986
axes_moved:

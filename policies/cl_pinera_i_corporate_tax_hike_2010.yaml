description: 'Ley 20.455 (31 Jul 2010) raised Chile''s corporate tax from 17% to 20% temporarily (2011 + 2012), stepping down to 18.5% (2013), 17% (2014). Ley 20.630 (2012 tax reform) made 20% rate permanent.
  Provided ~USD 3bn additional revenue for earthquake reconstruction. Paired with Ley 20.469 mining royalty reform. First corporate tax hike under post-Pinochet centre-right government — doctrinally notable.

  '

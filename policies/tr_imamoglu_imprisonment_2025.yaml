description: 'Istanbul Metropolitan Mayor and CHP presidential candidate Ekrem Imamoğlu was detained 19 March 2025 and formally imprisoned 23 March 2025 on corruption and "terrorism" indictments, one day
  after Istanbul University annulled his undergraduate diploma (a constitutional prerequisite for presidential candidacy). Widely read as pre-emptive exclusion ahead of 2028. Triggered largest protests
  since Gezi; CHP primary proceeded with Imamoğlu as symbolic candidate. Event underscores the divergence between orthodox macro content and authoritarian institutional content of the third-term phase.

  '

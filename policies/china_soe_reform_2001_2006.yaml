policy_id: china_soe_reform_2001_2006
status: candidate
title: China Soe Reform 2001 2006
countries:
- CHN
timeframe:
  start: 2001
  end: 2015
description: 'Post-WTO state-owned enterprise reform package combining SASAC oversight (created 2003), corporatisation of central SOEs into shareholding companies, layoff/exit of loss-making firms, and
  concentration of state capital in strategic sectors. Implemented alongside WTO-accession commitments to reduce state monopoly in tradable sectors and expose remaining SOEs to competitive pressure.

  '
enacted_by:
- china_wto_accession_2001
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Trade-monopoly SOEs were forced to compete with imports under WTO tariff and quota commitments.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: SOE corporatisation and exit of loss-makers expanded entry by private firms in many product markets.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Shareholding-company conversion and asset titling under SASAC clarified state-asset ownership claims.

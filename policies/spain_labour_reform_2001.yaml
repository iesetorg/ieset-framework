policy_id: spain_labour_reform_2001
status: candidate
title: Spain Labour Reform 2001
countries:
- ESP
timeframe:
  start: 1996
  end: 2004
description: 'The Aznar government''s Real Decreto-ley 5/2001 (and Ley 12/2001) modified the Workers'' Statute to ease the use of permanent contracts, reduce employer dismissal-cost differentials, and broaden
  the scope of part-time and temporary contracting. The reform extended the contrato de fomento de empleo with reduced severance liability designed to encourage firm-side hiring on permanent terms.

  '

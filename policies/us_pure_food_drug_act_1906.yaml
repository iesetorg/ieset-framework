# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: us_pure_food_drug_act_1906
status: candidate
title: Pure Food and Drug Act 1906
countries: [USA]
timeframe:
  start: 1906
  end: 1906
  enacted_date: "1906-06-30"
description: >
  The Pure Food and Drug Act of 1906 prohibited interstate commerce in adulterated
  or misbranded food and medicines, required more truthful labelling, and gave the
  federal government a durable enforcement role in consumer-product safety. Paired
  with the Meat Inspection Act, it marked a decisive break from the weak and highly
  fragmented pre-1906 regime in which quality standards depended mostly on state law,
  reputation, or private litigation.
enacted_by:
  - us_progressive_era_reform_consensus_1901_1917
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Federal adulteration and labelling standards raised compliance burdens and national gatekeeping over food and medicine markets."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Uniform federal standards reduced arbitrary variation in interstate enforcement and strengthened predictable legal recourse against fraud."
references:
  - "Pure Food and Drug Act, 34 Stat. 768 (1906)"
  - "U.S. Food and Drug Administration history of the 1906 Act"

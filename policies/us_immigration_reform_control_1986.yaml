title: Immigration Reform and Control Act (IRCA / Simpson-Mazzoli) 1986
countries:
- USA
timeframe:
  start: 1986
  enacted_date: '1986-11-06'
description: 'IRCA (Pub. L. 99-603), signed 6 November 1986. Granted legalisation to ~2.7M unauthorised immigrants who arrived before 1 January 1982; created Special Agricultural Worker programme for ~1.1M
  more. First employer sanctions regime — I-9 form, civil and criminal penalties for knowingly hiring unauthorised workers. Last comprehensive legalisation. Failed to deliver enforcement; unauthorised population
  rebuilt within a decade.

  '

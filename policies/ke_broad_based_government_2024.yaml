policy_id: ke_broad_based_government_2024
status: candidate
title: Broad-based government cabinet reshuffle (Jul-Aug 2024)
countries:
- KEN
timeframe:
  start: 2024
  enacted_date: '2024-07-11'
description: 'Following the Finance Bill 2024 withdrawal, President Ruto on 11 Jul 2024 dismissed all Cabinet Secretaries except the Prime CS and Foreign Affairs CS. Between 19 Jul and 8 Aug 2024 he nominated
  and sworn in a "broad-based government" including four ODM nominees (John Mbadi as Treasury CS, Opiyo Wandayi, Hassan Joho, Wycliffe Oparanya), effectively co-opting the opposition. Deputy President Rigathi
  Gachagua was impeached by the National Assembly (17 Oct 2024) and Senate (Oct 2024), replaced by Kithure Kindiki. Marks the formal end of the Kenya Kwanza single-coalition government and the absorption
  of ODM into the executive without a formal coalition agreement.

  '

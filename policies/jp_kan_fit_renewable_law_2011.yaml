policy_id: jp_kan_fit_renewable_law_2011
status: candidate
title: Japan Feed-in Tariff (FIT) law for renewable electricity 2011
countries:
- JPN
timeframe:
  start: 2011
  end: 2012
  enacted_date: '2011-08-26'
description: 'Act on Special Measures concerning Procurement of Renewable Electricity by Electricity Utilities (Law No. 108 of 2011), passed 26 August 2011 under the Kan cabinet as a condition of his resignation,
  effective 1 July 2012. Required utilities to purchase solar, wind, small hydro, geothermal, and biomass generation at pre-set tariffs guaranteed for 10-20 years. Initial solar tariff of ¥42/kWh was among
  the most generous globally, triggering a large mega-solar installation wave 2012-2015 that made Japan the second-largest solar market. Costs passed through as surcharge on electricity bills, rising from
  ~¥0.2/kWh to ~¥3/kWh by 2020. Core response to Fukushima nuclear-shutdown energy-mix gap.

  '

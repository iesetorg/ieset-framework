policy_id: brazil_fiscal_responsibility_law_2000
status: candidate
title: Brazil Fiscal Responsibility Law 2000
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'The Lei de Responsabilidade Fiscal (Lei Complementar 101/2000), enacted under the Cardoso government, imposed binding limits on personnel spending, public debt, and credit operations across
  federal, state, and municipal levels, and required transparent fiscal targets in each annual budget law (LDO). It cemented the post-Real Plan macro-stabilisation framework alongside inflation targeting
  and the floating exchange rate, and created enforcement penalties including suspension of voluntary federal transfers to non-compliant subnational governments.

  '
enacted_by:
- brazil_real_plan_cardoso_1994_2002
- brazil_real_plan_1994
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removed quasi-fiscal monetary financing pressures from subnational deficits onto the central bank.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Hard fiscal rules reduced political pressure on Banco Central to monetise government liabilities.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Subnational borrowing limits curtailed soft-budget support to state-owned enterprises.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory caps on personnel spending and debt service constrained subnational expenditure growth.

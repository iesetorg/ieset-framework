policy_id: uk_bank_of_england_independence_1997
status: candidate
title: Bank of England operational independence
countries:
- GBR
timeframe:
  start: 1997
  end: 1998
  enacted_date: '1998-06-01'
description: 'Chancellor Gordon Brown announced on 6 May 1997 (four days after Labour''s election victory) that the Bank of England would be granted operational independence to set interest rates to meet
  an inflation target. The Bank of England Act 1998 formalised the Monetary Policy Committee structure, inflation-targeting remit (initially 2.5% RPIX, later 2% CPI), and removed direct government control
  over rate-setting. Government retained responsibility for setting the inflation target; Bank retained operational control over instruments.

  '
enacted_by:
- uk_blair_first_second_term_1997_2005
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: De jure operational independence with inflation-targeting mandate and MPC structure.
  intended: true
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  rationale: Banking supervision transferred to FSA separating prudential from monetary function.
  intended: true
references:
- Bank of England Act 1998

policy_id: rwanda_imihigo_performance_contracts_2006
status: candidate
title: Rwanda Imihigo Performance Contracts 2006
countries:
- RWA
timeframe:
  start: 1994
  end: ongoing
description: 'Imihigo are public performance contracts signed annually between the President and district mayors (and cascading down to sectors and households), drawing on a pre-colonial Rwandan tradition
  of public oath-taking. Formalised in 2006 under the Kagame administration''s decentralisation reforms, the system publishes performance scoring for local government delivery against quantified targets.

  '

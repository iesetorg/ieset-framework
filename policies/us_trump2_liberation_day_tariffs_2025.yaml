policy_id: us_trump2_liberation_day_tariffs_2025
status: candidate
title: '"Liberation Day" reciprocal tariffs 2025'
countries:
- USA
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-04-02'
description: 'Executive Order 14257 invoked the International Emergency Economic Powers Act to impose a 10 percent additional ad valorem duty on most US imports from 5 April 2025 and higher country-specific
  reciprocal tariff rates from 9 April 2025, with exemptions and product treatment set out in the order and its annexes. The order was layered on top of existing Section 232, Section 301, and February 2025
  IEEPA tariff actions, and subsequent presidential actions modified effective rates and pauses while leaving the broad IEEPA-tariff instrument as the policy object.

  '

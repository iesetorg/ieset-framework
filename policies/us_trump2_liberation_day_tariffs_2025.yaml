policy_id: us_trump2_liberation_day_tariffs_2025
status: candidate
title: '''Liberation Day'' reciprocal tariffs 2025'
countries:
- USA
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-04-02'
description: 'Executive Order 14257 invoking the International Emergency Economic Powers Act (IEEPA) to impose a 10% baseline tariff on nearly all US imports effective April 5 2025, plus country-specific
  "reciprocal" tariff surcharges up to 50% calculated from bilateral goods-trade deficits, effective April 9 2025. A 90-day pause for most countries was announced April 9 amid bond-market stress, leaving
  the 10% universal baseline and a sharply escalated US-China line (tariffs spiralled to 145% before a May 2025 Geneva framework lowered bilateral rates pending negotiation). Effective average US tariff
  jumped from ~2.5% to >15%, highest since the 1930s. Legal challenges pending at the Court of International Trade and Federal Circuit questioning IEEPA scope for broad tariff authority. Layered on top
  of Section 232 steel/aluminium, Section 301 China, and February 2025 IEEPA fentanyl/migration tariffs on Canada + Mexico + China.

  '

policy_id: cn_exchange_rate_unification_1994
status: candidate
title: Exchange Rate Unification 1994
countries:
- CHN
timeframe:
  start: 1989
  end: 2002
description: 'January 1994 unification of China''s dual exchange rate system (official and swap- centre rates) into a single managed-float renminbi rate, with the rate effectively devalued from roughly
  5.8 to 8.7 RMB/USD. Combined with foreign-exchange surrender requirements and a centralised interbank market, the reform underpinned the export boom and the run-up to current-account convertibility in
  1996.

  '
enacted_by:
- china_jiang_era_1989_2002
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Single competitive market exchange rate dramatically reduced FX rationing frictions on imports/exports.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Eliminating dual-rate arbitrage disadvantage exposed domestic producers to global price signals.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Export-driven manufacturing growth post-unification absorbed surplus rural labour into private wage employment.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: FX-related fiscal adjustments and central-bank balance-sheet expansion accommodated reform.

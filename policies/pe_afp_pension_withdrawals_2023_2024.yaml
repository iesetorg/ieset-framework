policy_id: pe_afp_pension_withdrawals_2023_2024
status: candidate
title: Afp Pension Withdrawals 2023 2024
countries:
- PER
timeframe:
  start: 2022
  end: ongoing
description: 'Continuation of Peru''s congressional measures permitting members of the private pension system (AFPs) to withdraw portions of their individual retirement accounts in 2023–2024, extending
  a sequence of withdrawal laws begun during the COVID period. The legislation overrode standard preservation rules, rapidly mobilised pension assets into household consumption, and drew warnings from the
  central bank and supervisor about long-run retirement-adequacy and capital-market depth.

  '
enacted_by:
- peru_boluarte_post_castillo_2022_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Forced AFP liquidations marginally reduced concentrated institutional holdings in domestic markets.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Co-enacted Boluarte-era regulatory rollback affecting environmental review tracked alongside withdrawal laws.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Withdrawal laws functioned as a quasi-transfer by releasing pension savings to households without budgetary cost.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: BCRP retained operational independence; congressional measures bypassed but did not directly target it.

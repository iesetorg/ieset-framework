policy_id: canada_cpp_reform_1997
status: candidate
title: Canada Cpp Reform 1997
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'The 1997 CPP reform under the Chretien Liberal government and federal-provincial CPP stewards raised combined contribution rates from 6% to 9.9% over six years, established the CPP Investment
  Board (CPPIB) to manage assets at arm''s length from government in diversified securities, and shifted the plan from pure pay-as-you-go toward partial pre-funding. The reform was a centerpiece of the
  era''s broader fiscal consolidation, securing CPP solvency on a 75-year horizon without benefit cuts.

  '

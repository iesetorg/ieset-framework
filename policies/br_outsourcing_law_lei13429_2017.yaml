title: Lei da Terceirização — Lei 13.429/2017
countries:
- BRA
timeframe:
  start: 2017
  enacted_date: '2017-03-31'
description: 'Lei 13.429/2017 updated the 1974 temporary-labour statute and legalised outsourcing (terceirização) across core activities (atividades-fim) of contracting firms, overturning prior TST jurisprudence
  restricting outsourcing to peripheral activities. Extended maximum temporary-contract duration to 180 days (renewable by 90). Reinforced later by the STF ruling (Aug 2018) recognising broad outsourcing
  constitutionality.

  '

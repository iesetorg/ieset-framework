policy_id: at_arbeitszeitgesetz_12_stunden_tag_2018
status: candidate
title: Arbeitszeitgesetz amendment — 12-hour day / 60-hour week 2018
countries:
- AUT
timeframe:
  start: 2018
  end: ongoing
  enacted_date: '2018-07-05'
description: 'Amendment to the Arbeitszeitgesetz raising the statutory daily maximum working time from 10 to 12 hours and the weekly maximum from 50 to 60 hours under individual voluntary agreement, effective
  1 September 2018. Employees retain a statutory right to refuse overtime beyond 10h/50h without cause. Framed by the OeVP-FPOe coalition as flexibility-enhancing and productivity-oriented; opposed by OeGB
  (trade-union federation) and SPOe as a weakening of collective-agreement protections achieved by statutory fiat. Among the largest Austrian working-time liberalisations since the 1997 Arbeitszeitgesetz
  consolidation.

  '
enacted_by:
- austria_kurz_ovp_2017_2021
coalition_label_at_enactment: OeVP-FPOe
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Statutory daily and weekly maxima raised; overtime threshold raised; shifts the bargaining frontier toward individual over collective agreement.
references:

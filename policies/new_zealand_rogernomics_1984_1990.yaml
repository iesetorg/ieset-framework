title: Rogernomics — New Zealand market reforms 1984-1990
countries:
- NZL
timeframe:
  start: 1984
  end: 1990
  enacted_date: '1984-07-14'
description: 'Architect: Finance Minister Roger Douglas under Labour PM David Lange. Comprehensive market-oriented reform from a left-coalition: (1) floating NZD (1985); (2) elimination of most agricultural
  subsidies (1984-85) — previously among OECD''s most subsidised sectors; (3) corporatisation and privatisation of state enterprises (Telecom NZ, PostBank, Air NZ, electricity SOEs); (4) GST at 10% (1986,
  12.5% 1989, 15% 2010); (5) RBNZ independence + inflation-targeting (1989, world''s first formal IT regime); (6) Employment Contracts Act 1991 under subsequent Nat government. Became reference case for
  Labour/ centre-left governments implementing market reforms. Coalition- content case: Labour implementing pro-market reform aligning with Schröder Agenda 2010 pattern (refinement D.3.1).

  '

description: 'President Umaro Sissoco Embalo dissolved Guinea-Bissau''s National People''s Assembly in December 2023 after armed clashes that he described as an attempted coup. The decree removed the elected
  parliamentary configuration chosen earlier in 2023 and shifted governing authority back toward the presidency pending a new electoral timetable.

  '

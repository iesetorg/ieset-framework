title: Lee corporate-tax and real-estate-tax restoration (South Korea, 2025)
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-12-01'
description: 'Tax-revision bill restoring: (i) top corporate-income-tax rate to 25% (reversing the Yoon 24% cut of January 2023); (ii) Jongbuse comprehensive real-estate holding-tax thresholds and rates
  to their 2021 Moon-era parameters for high-assessed-value and multi-home owners; (iii) reintroduction of the financial-investment-income tax that had been repeatedly deferred then repealed under Yoon;
  (iv) dividend-taxation separation-and-aggregation hybrid. Proposed with the 2026 tax-revision package and scheduled for effect from tax-year 2026.

  '

policy_id: kr_corporate_tax_restoration_2025
status: candidate
title: Lee corporate-tax restoration and capital-tax easing (South Korea, 2025)
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-12-01'
description: 'Lee-government tax package restoring the corporate-tax burden to what MOEF calls a normal level while also using capital-market tax relief to support the Korea-premium agenda. The package
  reversed part of the Yoon-era corporate-tax cut by restoring the headline burden for large corporations, but paired this with a lower separate tax rate for dividend income and a reduced inheritance-tax
  burden intended to encourage corporate value-up and family-business continuity. The policy therefore moves corporate taxation upward while easing some capital-income and inheritance taxation.

  '
enacted_by:
- skorea_lee_jaemyung_dp_2025_present
coalition_label_at_enactment: Democratic Party of Korea (centre-left)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Top rate restored 24% → 25% across brackets.
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Lower separate dividend-tax treatment and inheritance-tax burden reduce capital-owner tax burden at the margin.
references:
- Ministry of Economy and Finance, 2026 Economic Growth Strategy, 22 December 2025
- 2026 tax-revision package, MOEF / National Assembly process, 2025
notes: 'Second-tranche Asia pass revised the capital-tax coding to match the official MOEF growth-strategy description: corporate tax was restored upward, while inheritance/dividend taxation was eased.

  '

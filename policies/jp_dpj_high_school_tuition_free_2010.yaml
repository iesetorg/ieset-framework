description: 'The Hatoyama DPJ government''s High School Tuition Support law, effective April 2010, abolished tuition at public upper-secondary schools and provided equivalent vouchers to students at private
  high schools. Funded from the general account, the scheme was a flagship transfer policy of the DPJ manifesto aimed at lowering household education costs and broadening access to upper secondary education.

  '

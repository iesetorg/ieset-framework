policy_id: ethiopia_state_owned_banking_regime
status: candidate
title: Ethiopia State Owned Banking Regime
countries:
- ETH
timeframe:
  start: 1991
  end: 2018
description: 'Under the EPRDF, Ethiopia retained the Commercial Bank of Ethiopia and Development Bank of Ethiopia as state-owned dominant lenders while excluding foreign banks from market entry. Monetary
  Authority Proclamation 591/2008 and prior banking regulations directed state bank credit toward government priority projects (parks, dams, infrastructure), used reserve and bond requirements to compel
  private banks to finance public investment, and rationed foreign exchange through National Bank allocation.

  '
enacted_by:
- ethiopia_eprdf_developmental_state_1991_2018
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State banks lent at directed terms to priority sectors and absorbed the implicit credit subsidy.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: National Bank rationed FX allocations and directed credit; new bank licences confined to nationals.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Foreign banks barred from entry while state banks intermediated commodity-trade financing.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State maintained majority ownership of dominant banks and could direct private bank balance sheets.

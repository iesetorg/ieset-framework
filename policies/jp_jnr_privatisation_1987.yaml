policy_id: jp_jnr_privatisation_1987
status: candidate
title: Japanese National Railways breakup and privatisation (Japan 1987)
countries:
- JPN
timeframe:
  start: 1987
  end: 1987
  enacted_date: '1987-04-01'
description: 'Japanese National Railways Reform Law (28 Nov 1986) broke JNR into six regional passenger companies (JR East, JR Central, JR West, JR Hokkaido, JR Shikoku, JR Kyushu) plus JR Freight and JR
  Bus, effective 1 Apr 1987. JNR Settlement Corporation absorbed JPY25.5tn of JNR''s accumulated debt. JR East IPO Oct 1993, JR West Oct 1996, JR Central Oct 1997. Retrenchment cut ~200,000 jobs; shinkansen
  and urban services achieved profitability.

  '
enacted_by:
- japan_nakasone_ldp_1982_1987
coalition_label_at_enactment: LDP (Nakasone cabinet)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Regional breakup created performance comparability and inter-area competition.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Ended JNR annual operating losses (~JPY1.5tn p.a.) though JPY25.5tn legacy debt remained public.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: JNR workforce cut from ~280,000 to ~200,000 via early retirement and non-rehire.
references:
- JNR Reform Law (Law No. 87 of 1986)
- Suga (2001), 'Japan National Railways Privatisation', World Bank Discussion Paper

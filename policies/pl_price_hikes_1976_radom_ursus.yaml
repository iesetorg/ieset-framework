policy_id: pl_price_hikes_1976_radom_ursus
status: candidate
title: Polish 1976 food-price hike attempt and Radom/Ursus worker riots
countries:
- POL
timeframe:
  start: 1976
  enacted_date: '1976-06-24'
description: '24 June 1976 Gierek government announced 60-70% increases in food prices to close subsidy gap. Triggered same-day worker riots at Radom and Ursus tractor plant. Government withdrew the increases
  within 24 hours. Repression of protesters catalysed the September 1976 formation of KOR (Workers'' Defence Committee), the proto- opposition that seeded Solidarność.

  '

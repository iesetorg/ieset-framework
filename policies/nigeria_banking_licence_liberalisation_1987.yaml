policy_id: nigeria_banking_licence_liberalisation_1987
status: candidate
title: Nigeria Banking Licence Liberalisation 1987
countries:
- NGA
timeframe:
  start: 1986
  end: 1993
description: 'Under the Babangida-era Structural Adjustment Programme, the Central Bank of Nigeria removed the prior moratorium on new commercial-bank licences in 1987, leading to a rapid expansion in licensed
  institutions from roughly 40 in 1986 to more than 120 by 1992. Liberalisation was paired with deregulation of interest rates and admission of merchant banks, but inadequate prudential supervision produced
  a wave of distressed banks that culminated in the 1995 Nigerian Deposit Insurance Corporation interventions.

  '
enacted_by:
- nigeria_buhari_sap_structural_adjustment_1986
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Eased the path for foreign-bank participation in the Nigerian financial sector under SAP-era reforms.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Tripled the number of commercial banks within five years, intensifying competition for deposits and lending margins.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Combined with interest-rate deregulation, the licensing wave expanded broad-money creation through the new banking sector.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Replaced directed-credit subsidies in banking with market-based capital allocation by newly licensed banks.

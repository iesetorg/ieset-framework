policy_id: dk_efterloen_reform_2011_2012
status: candidate
title: Efterløn reform — Danish early-retirement tightening 2011-2012
countries:
- DNK
timeframe:
  start: 2011
  end: 2023
  enacted_date: '2011-05-13'
description: 'Building on the 2011 Welfare Agreement inherited from the outgoing VK government, legislation implemented under Thorning-Schmidt reduced the maximum duration of voluntary early-retirement
  (efterløn) from 5 to 3 years, tightened qualifying contribution history, accelerated the phased linking of the statutory retirement age to life-expectancy gains, and offered a one-time partial payout
  option for those exiting the scheme. Intended to raise structural labour supply and close the long-run fiscal gap; politically costly for a Social-Democrat-led coalition that had previously defended efterløn.

  '
enacted_by:
- denmark_thorning_socdem_2011_2015
coalition_label_at_enactment: Socialdemokratiet + Radikale Venstre + SF minority, implementing 2011 Welfare Agreement
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Duration cut 5→3 years and tighter qualifying criteria reduce transfer volume.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Effective retirement-age increase raises labour supply among older cohorts.

description: 'El Salvador''s Paquete Escolar provided uniforms, shoes, and school supplies free of charge to pupils in public primary and secondary schools. Continued and expanded under the Sánchez Cerén
  FMLN administration, the programme was funded through the Ministry of Education budget and procured inputs from local cooperatives, combining a household-level transfer with targeted demand support for
  domestic textile and footwear producers.

  '

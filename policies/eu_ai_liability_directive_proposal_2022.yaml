description: 'The September 2022 Commission proposal for an AI Liability Directive (COM(2022) 496) sought to ease the evidentiary burden for victims claiming damages caused by AI systems by introducing
  a rebuttable presumption of causation and disclosure obligations linked to the AI Act''s high-risk categorisation. It was designed to complement the revised Product Liability Directive and apply uniformly
  across member-state tort regimes; the file remained pending, with the Commission later signalling withdrawal in 2025.

  '

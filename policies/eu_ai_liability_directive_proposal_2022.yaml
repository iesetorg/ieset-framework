- eu_gdpr_regulatory_stack_2018
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Disclosure duties tied AI compliance documentation to permission to defend in tort proceedings.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Presumption of causation and disclosure costs raise litigation risk disproportionately for smaller vendors.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-EU AI providers face EU-wide harmonised liability exposure for products placed on the market.

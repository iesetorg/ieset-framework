policy_id: at_oekosoziale_steuerreform_2022
status: candidate
title: Oekosoziale Steuerreform 2022 — national CO2 price with Klimabonus rebate
countries:
- AUT
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-03'
description: 'Austria''s Ecosocial Tax Reform introduced a national CO2 price in sectors outside the EU ETS (transport, heating) at EUR 30/t from 1 October 2022, rising on a pre-announced schedule to EUR
  35 (2023), EUR 45 (2024), EUR 55 (2025). Revenues are returned per-capita through the regionally-graduated Klimabonus (EUR 250-500 depending on public-transport accessibility of the recipient''s municipality).
  Package also reduced the second and third income-tax brackets (30%->20% on the second bracket step-wise, 41%->40%, 48%->47%), raised the Familienbonus to EUR 2,000/child, and committed to a staged Koerperschaftsteuer
  cut 25%->24%->23%. Framed by OeVP and Greens as a textbook carbon-price-plus-dividend design delivering ecological and distributional goals simultaneously.

  '
enacted_by:
- austria_nehammer_ovp_greens_2022_2025
coalition_label_at_enactment: OeVP-Gruene

policy_id: ethiopia_amc_grain_procurement_1976
status: candidate
title: Ethiopia Amc Grain Procurement 1976
countries:
- ETH
timeframe:
  start: 1974
  end: 1991
description: 'The Agricultural Marketing Corporation (AMC), established by Proclamation 105/1976 under the Derg''s revolutionary regime, monopolised grain marketing in Ethiopia by setting procurement quotas
  on peasant associations and state farms at administratively fixed below-market prices, and by controlling inter-regional grain movement. Combined with the 1975 land reform, the intended effect was to
  extract a marketed surplus to feed urban areas and the army, finance industrialisation, and impose socialist control on agricultural markets — at heavy cost to peasant incentives and aggregate food output.

  '
enacted_by:
- ethiopia_derg_1974_1991
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Forced procurement quotas and movement controls eroded peasant property rights over output.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: AMC monopoly suppressed private grain-trading and competitive price formation.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Movement and export controls insulated grain markets from regional and international trade.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: AMC operations and implicit consumption subsidies expanded the parastatal-led public sector.

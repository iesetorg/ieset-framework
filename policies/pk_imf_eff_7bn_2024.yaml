policy_id: pk_imf_eff_7bn_2024
status: candidate
title: IMF Extended Fund Facility — Pakistan $7bn (2024)
countries:
- PAK
timeframe:
  start: 2024
  end: 2027
  enacted_date: '2024-09-25'
description: 'IMF Extended Fund Facility of $7bn over 37 months, approved by the IMF Executive Board on 25 September 2024. Pakistan''s 24th IMF programme. Structural conditionality covers: agriculture-income-
  tax provincial harmonisation (previously exempted under constitutional provincial jurisdiction); SOE divestment via the Sovereign Wealth Fund framework (PIA, DISCOs, gas-utility corporatisation); FX-regime
  interbank functioning and end of informal rationing; power-sector cost-recovery through continued tariff pass-through and captive-power levelling; direct-tax base expansion toward a 13.5% tax-to-GDP target
  over programme horizon. Primary-balance surplus achieved FY24 (first in nearly two decades) supported front-loading of tranches; policy-rate cut cycle tracked disinflation from ~38% peak to ~5% yoy early
  2025.

  '

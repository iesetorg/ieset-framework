policy_id: th_baht_devaluation_1984
status: candidate
title: Baht devaluation and basket-peg shift (Thailand 1984)
countries:
- THA
timeframe:
  start: 1984
  end: 1984
  enacted_date: '1984-11-05'
description: 'On 5 Nov 1984 the Bank of Thailand devalued the baht by 14.8% from THB23/USD to THB27/USD and simultaneously de-pegged from the US dollar to a trade-weighted basket. A smaller 8.7% devaluation
  had been executed 15 Jul 1981. The 1984 move was politically contested — Army Commander General Arthit publicly opposed — but Prem backed Finance Minister Sommai. Competitiveness restored ahead of the
  1985-1995 export take-off.

  '
enacted_by:
- thailand_prem_tinsulanonda_semi_democratic_1980_1988
coalition_label_at_enactment: Prem rotating coalitions

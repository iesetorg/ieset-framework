  enacted_date: '2013-01-22'
description: 'Three-arrow programme launched under Shinzō Abe + BoJ Governor Haruhiko Kuroda: (1) aggressive monetary expansion via QQE (Quantitative and Qualitative Easing, 2013; YCC added 2016), (2) flexible
  fiscal policy with supplementary budgets, (3) structural reforms including TPP-joining, corporate governance reform (JPX400, stewardship code), some labour-market liberalisation, and womenomics. Ended
  deflation (CPI positive from 2013), supported JPY depreciation, and raised equity valuations — but structural-reform third arrow was partial. 2014 consumption-tax hike arguably premature and temporarily
  reversed the fiscal arrow. Extended under Kishida post-Abe.

  '

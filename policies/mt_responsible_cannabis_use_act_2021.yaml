policy_id: mt_responsible_cannabis_use_act_2021
status: candidate
title: Malta responsible cannabis use act 2021
countries:
- MLT
timeframe:
  start: 2021
  end: ongoing
description: 'Malta enacted a responsible-use cannabis framework in 2021 that decriminalised limited adult possession and home cultivation while creating a regulated non-profit association model overseen
  by a dedicated authority. The law moved part of cannabis policy from criminal prohibition into a licensed, harm- reduction regulatory framework.

  '
enacted_by:
- malta_labour_social_regulatory_state_2020_present
scope: national
coalition_label_at_enactment: Abela Labour administration
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory possession limits, home-cultivation rules, and association oversight replaced discretionary criminal enforcement for covered conduct.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: The reform allowed limited legal supply through non-profit associations rather than a complete prohibition.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Legal supply was conditioned on a dedicated licensing and oversight regime for cannabis associations.
references:
- Malta Authority on the Responsible Use of Cannabis Act, 2021
- Malta Authority for the Responsible Use of Cannabis official materials on licensed non-profit associations

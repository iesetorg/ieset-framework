policy_id: fi_family_leave_reform_2022
status: candidate
title: Finland family-leave reform 2022 (Perhevapaauudistus)
countries:
- FIN
timeframe:
  start: 2022
  enacted_date: '2022-08-01'
description: 'Family-leave reform enacted by the Marin government, effective 1 August 2022. Each parent receives an independent entitlement of 160 working days (roughly 6.4 months) of earnings-related parental
  leave, of which up to 63 days may be transferred to the other parent, with a further 9 months of lower flat-rate home-care allowance available. Replaces the previous gendered structure (maternity leave
  105 days + paternity 18 + shared parental 158 days) with a formally gender-neutral framework allowing same-sex couples, single parents and non-birth parents to access equivalent entitlements. Intended
  to raise paternal leave take-up and maternal labour-force participation, aligning Finland more closely with Swedish and Icelandic Nordic dual-earner templates. Implementation cost roughly EUR 100m/year
  in steady state.

  '

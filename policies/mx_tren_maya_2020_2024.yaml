title: Tren Maya inter-city rail project (Mexico)
countries:
- MEX
timeframe:
  start: 2020
  end: 2024
  enacted_date: '2020-06-01'
description: '~1,554 km tourist-and-cargo rail loop across Chiapas, Tabasco, Campeche, Yucatán and Quintana Roo, declared a matter of national security and executed primarily by SEDENA (army) as a civilian
  infrastructure project through Fonatur. Operating segments opened December 2023 through 2024. Cost estimates escalated from MXN 139bn (2019) to MXN 500bn+ (2024). Triggered environmental lawsuits over
  jungle clearance and cenote-zone tracks.

  '

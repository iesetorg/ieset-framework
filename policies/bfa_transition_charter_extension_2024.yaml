policy_id: bfa_transition_charter_extension_2024
status: candidate
title: Burkina Faso transition charter extension 2024
countries:
- BFA
timeframe:
  start: 2024
  end: 2029
  enacted_date: '2024-05-25'
description: >
  Burkina Faso's national consultations amended the transition charter in May
  2024 to extend the military-led transition for five additional years from July
  2024 and allow Captain Ibrahim Traore to contest any eventual presidential
  election. The measure kept the Patriotic Movement for Safeguard and
  Restoration in control of executive transition institutions while framing the
  extension around security and territorial recovery.
enacted_by:
- burkina_faso_mpsr_transition_sovereignty_2022_present
scope: national
coalition_label_at_enactment: MPSR military transition
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The extension delayed return to elected constitutional government and entrenched transition executive authority.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Prolonged military transition rule weakened ordinary constitutional checks relative to an elected institutional order.
references:
- Burkina Faso national consultation materials and amended Transition Charter, May 2024.
- Associated Press reporting on Burkina Faso's May 2024 five-year transition extension.
notes: >
  The coding captures formal political-institutional effects of the charter
  extension, not the security rationale offered by transition authorities.

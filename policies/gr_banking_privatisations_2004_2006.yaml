policy_id: gr_banking_privatisations_2004_2006
status: candidate
title: Banking Privatisations 2004 2006
countries:
- GRC
timeframe:
  start: 2004
  end: 2009
description: 'The Karamanlis ND government accelerated privatisation of state-controlled Greek lenders, including the 2005–2006 sale of Emporiki Bank to Crédit Agricole and Geniki Bank to Société Générale,
  and the placement of additional stakes in National Bank of Greece via the Athens Exchange. The transactions reduced direct state ownership of the banking system and brought foreign strategic investors
  into the sector ahead of the financial crisis.

  '

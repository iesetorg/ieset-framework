policy_id: indonesia_imf_programme_1997
status: candidate
title: Indonesia Imf Programme 1997
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Indonesia entered a Stand-By Arrangement and Extended Fund Facility programme with the IMF in October 1997 totalling roughly USD 43 billion in pledged support, conditioned on bank closures,
  fiscal tightening, monopoly dismantlement (notably clove and plywood boards), trade liberalisation, and central-bank reform. The programme bridged the late Suharto period and the post-1998 Reformasi government,
  providing the conditionality framework for foundational institutional reforms including BI independence.

  '
enacted_by:
- indonesia_reformasi_1998_present
- indonesia_suharto_new_order_1965_1998
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme conditionality directly required statutory central-bank independence (delivered by Law 23/1999).
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Bank closures, IBRA recapitalisation, and prudential reforms reshaped the financial sector.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Dismantlement of clove and plywood marketing boards and import-licence reforms opened key product markets.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: IMF safety-net conditionality required new social-protection transfers to offset adjustment costs.

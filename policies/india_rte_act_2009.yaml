policy_id: india_rte_act_2009
status: candidate
title: India Rte Act 2009
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'The Right of Children to Free and Compulsory Education Act 2009 made elementary education a justiciable fundamental right for children aged 6–14, mandating free schooling, neighbourhood-school
  norms, prescribed pupil-teacher ratios, and a 25% private-school reservation for disadvantaged children. Enacted under the Singh UPA-II government to operationalise the 86th Constitutional Amendment (Article
  21A), it expanded centrally-funded education spending and imposed regulatory mandates on private schools.

  '

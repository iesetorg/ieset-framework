description: 'Capital-markets reform package advanced under the Duque government (Ley 2143 / associated regulatory decrees, 2021), establishing a financial-holding company framework, modernising the regulatory
  perimeter for financial conglomerates, and introducing measures to deepen the local equity and bond markets. Aimed at strengthening supervision while expanding capital-market access for Colombian issuers.

  '

description: 'Announced 6 Jun 1985, the New Textile Policy removed mill-versus- powerloom versus handloom sectoral output reservations, liberalised machinery imports, permitted 100% export-oriented units
  in textiles, and streamlined fibre-pricing. Ended the 1950s reservation-quota regime that had constrained integrated mills.

  '

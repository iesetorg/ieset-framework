policy_id: gr_memorandum_exit_2018
status: candidate
title: Greece Third Memorandum exit and enhanced surveillance 2018
countries:
- GRC
timeframe:
  start: 2018
  end: 2022
  enacted_date: '2018-08-20'
description: 'Formal exit from the Third Economic Adjustment Programme on 20 August 2018, marking the end of eight years of Troika/ESM conditionality. Exit conditions: medium-term debt-relief measures agreed
  at Eurogroup 22 June 2018 (EFSF loan-maturity extension by 10 years, grace-period extension, ANFA/SMP profits return mechanism, €15bn ESM cash buffer to support transition); post- programme enhanced surveillance
  framework under Regulation (EU) 472/2013 with quarterly European Commission compliance reports; primary-surplus commitment of 3.5% of GDP through 2022; reversibility clauses on pension and tax cuts if
  primary-surplus target missed. Enhanced surveillance formally ended 20 August 2022 under the Mitsotakis government. Exit timing was optimised around the scheduled July 2019 parliamentary election but
  coincided with Tsipras''s falling approval and SYRIZA eventually lost the election.

  '

policy_id: venezuela_monetisation_of_deficit_2013_2019
status: candidate
title: Venezuela Monetisation Of Deficit 2013 2019
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'Direct central-bank financing of the Venezuelan fiscal deficit accelerated during 2013-2019 as oil revenues collapsed and external bond markets closed. The BCV provided escalating ad-hoc credit
  to PDVSA and the Treasury, expanded base money several-thousand-fold, and ceased publishing monetary statistics in 2014. The mechanism produced one of the largest peacetime hyperinflations in modern history,
  with monthly rates exceeding 100 percent in 2018.

  '

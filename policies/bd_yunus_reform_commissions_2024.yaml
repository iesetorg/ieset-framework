description: 'On 11 September 2024 the Yunus interim government constituted six reform commissions (Constitution, Electoral System, Judiciary, Police, Public Administration, Anti-Corruption Commission)
  with time-bound mandates to produce white-paper recommendations as input to an all-party dialogue and subsequent election. Commissions delivered interim reports in January-February 2025 covering bicameralism
  proposals, proportional representation options, judicial-appointment reform, and police-service restructuring. Scoring captures institutional direction rather than yet-legislated statutes.

  '

  intended: true
  rationale: Devolution introduced inter-county competition for investment, services and procurement.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Equitable-share and conditional grants institutionalised vertical transfers to 47 counties.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Devolution duplicated administrative layers and lifted aggregate public-sector outlays.
- axis: monetary.central_bank_independence
  direction: +

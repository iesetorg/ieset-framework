policy_id: kenya_2010_constitution_devolution
status: candidate
title: Kenya 2010 Constitution Devolution
countries:
- KEN
timeframe:
  start: 2002
  end: 2013
description: 'Kenya''s 2010 Constitution, ratified by referendum in August 2010, established 47 county governments with directly elected governors and county assemblies, and constitutionally guaranteed
  counties at least 15% of the most recently audited national revenue. The devolution framework restructured fiscal flows, public service delivery (especially health and agriculture) and political competition,
  and was implemented from the 2013 general election under the Kibaki-era Vision 2030 reform agenda.

  '
enacted_by:
- kenya_kibaki_vision_2030_2002_2013
axes_moved:
- axis: regulatory.product_market_competition
  direction: +

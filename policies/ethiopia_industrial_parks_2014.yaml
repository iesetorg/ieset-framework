policy_id: ethiopia_industrial_parks_2014
status: candidate
title: Ethiopia Industrial Parks 2014
countries:
- ETH
timeframe:
  start: 1991
  end: 2018
description: 'Beginning with Bole Lemi I in 2014 and the Industrial Parks Proclamation No. 886/2015, Ethiopia established a network of state-developed industrial parks (Hawassa, Mekelle, Kombolcha, Adama)
  managed by the Industrial Parks Development Corporation. Parks offered tax holidays, duty-free imports, dedicated power and logistics, and one-stop investor services to attract export-oriented apparel
  and light manufacturing FDI as part of the EPRDF''s GTP industrialisation strategy.

  '
enacted_by:
- ethiopia_eprdf_developmental_state_1991_2018
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State financed park infrastructure and offered tax holidays plus subsidised utilities to tenants.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: IPDC controlled park entry, lot allocation, and bundled regulatory approvals via one-stop shops.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Duty-free export channels opened inside parks while import-substitution barriers persisted outside.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Land remained state-owned and leased to investors via revocable IPDC arrangements, not freehold title.

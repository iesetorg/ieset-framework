policy_id: na_welwitschia_fund_2022
status: candidate
title: Namibia Welwitschia sovereign wealth fund 2022
countries:
- NAM
timeframe:
  start: 2022
  end: ongoing
description: 'Namibia launched the Welwitschia Fund as a sovereign wealth fund architecture for saving and investing a portion of resource and fiscal revenues for stabilisation, intergenerational equity,
  and development financing. The fund gives the finance ministry and Bank of Namibia a formal vehicle for moving some windfall revenue into rule-bound portfolio management rather than annual budget consumption.

  '
enacted_by:
- namibia_swapo_green_industrialisation_2020_present
scope: national
coalition_label_at_enactment: SWAPO Geingob government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: A savings fund lowers the share of windfall revenue immediately spent through the annual budget.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A formal fund framework creates governance, reporting, and investment rules for public savings.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Bank of Namibia operational involvement separates part of public-asset management from short-run spending politics.
references:
- Bank of Namibia, Welwitschia Fund official materials.
- Namibia Ministry of Finance, Welwitschia Fund launch statements, 2022.

policy_id: zimbabwe_fast_track_land_reform_2000
status: candidate
title: Zimbabwe Fast Track Land Reform 2000
countries:
- ZWE
timeframe:
  start: 2000
  end: 2009
description: 'The Fast-Track Land Reform Programme launched in 2000 by the Mugabe government authorised the compulsory acquisition without market compensation of approximately 4,500 white-owned commercial
  farms covering most of the productive agricultural land. Acquisitions proceeded under successive constitutional amendments and the Land Acquisition Act, with farms reallocated through A1 small- scale
  and A2 commercial resettlement schemes alongside extensive informal occupations by veterans.

  '
enacted_by:
- zimbabwe_mugabe_land_reform_hyperinflation_2000_2008
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Compulsory acquisition without market compensation directly extinguished freehold title in commercial agriculture.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Constitutional amendments ousted court jurisdiction over acquisitions, validating extra-legal farm invasions.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: RBZ was directed to finance resettlement and 'farm mechanisation' programmes via quasi-fiscal credit creation.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Disrupted commercial farm output collapsed agro-processing supply chains and concentrated allocation by patronage.

policy_id: south_africa_gear_macro_framework_1996
status: candidate
title: South Africa Gear Macro Framework 1996
countries:
- ZAF
timeframe:
  start: 1994
  end: ongoing
description: 'GEAR (Growth, Employment and Redistribution) was the Mandela government''s macro-economic framework released in June 1996 by Finance Minister Trevor Manuel, replacing the looser RDP fiscal
  stance. It set fiscal-deficit targets, exchange-rate liberalisation, tariff reduction, and labour-market flexibility as the path to private-sector-led growth, marking the ANC''s pivot to orthodoxy.

  '
enacted_by:
- south_africa_anc_post_apartheid_1994_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Within tighter envelope, GEAR ringfenced and expanded social-grant entitlements over time.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: GEAR codified inflation-targeting transition and reinforced SARB operational autonomy.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Stated flexibilisation goal partially blocked by parallel labour acts strengthening protections.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Trade liberalisation cut tariff licences but BBBEE/sectoral charters added new permissions.

policy_id: co_tequila_contagion_recession_1996_1998
status: candidate
title: Colombian Tequila contagion and 1998-99 recession preamble
countries:
- COL
timeframe:
  start: 1996
  end: 1998
description: 'Colombia experienced moderate contagion from Mexican 1994-95 Tequila crisis and Asian 1997 crisis. GDP growth decelerated from 5.8% (1995) to 2.1% (1996), 3.4% (1997), 0.6% (1998). Banco de
  la República defended crawling exchange-rate band at cost of high real interest rates (15-20% real). Coffee price collapse 1996-97 compounded external pressure. Fiscal deficit widened 1% → 3.7% GDP. Preceded
  the 1999 GDP contraction of -4.2% (the deepest Colombian recession of the century).

  '

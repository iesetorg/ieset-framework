description: 'Nomos 1386/1983 created OAE as state holding for restructuring or absorbing ''problematic'' private enterprises. Widely used to socialise private losses by state acquisition rather than letting
  market exit occur. Institutional template for sustained state- enterprise expansion. Dismantled 1995 under PASOK Simitis government as part of Maastricht convergence.

  '

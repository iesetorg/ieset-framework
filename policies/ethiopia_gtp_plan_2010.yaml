policy_id: ethiopia_gtp_plan_2010
status: candidate
title: Ethiopia Gtp Plan 2010
countries:
- ETH
timeframe:
  start: 1991
  end: 2018
description: 'The Growth and Transformation Plan (GTP I, 2010-2015; GTP II, 2015-2020) was the EPRDF government''s five-year national development blueprint codifying targets for double-digit GDP growth,
  manufacturing expansion, agricultural commercialisation, and large-scale infrastructure (rail, hydro, industrial parks). Implemented via the Ministry of Finance and Economic Development with sector-specific
  directives, the plan channelled state-bank credit and donor finance toward priority sectors selected by central planners.

  '

  rationale: GTP directed state-bank credit and treasury allocations to priority manufacturing and agribusiness.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Sector ministries gained allocative authority over licences, land leases, and foreign-currency access.
- axis: regulatory.trade_openness
  direction: mixed

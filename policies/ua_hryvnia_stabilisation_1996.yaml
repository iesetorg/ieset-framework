# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ua_hryvnia_stabilisation_1996
status: candidate
title: Ukraine hryvnia monetary stabilisation 1996
countries: [UKR]
timeframe: {start: 1996, end: 1999}
description: >
  Ukraine introduced the hryvnia in September 1996 after the 1992-1993
  hyperinflation and a transitional karbovanets period. The reform was paired
  with tighter monetary management, exchange-rate stabilisation efforts, and
  IMF-supported fiscal and monetary discipline.
enacted_by:
  - ukraine_independence_transition_1991_1999
axes_moved:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, intended: true, rationale: "Stabilisation reduced direct fiscal-monetary accommodation relative to the early transition hyperinflation."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, intended: true, rationale: "Currency reform followed sharp disinflation and tighter base-money growth."}
references:
  - "National Bank of Ukraine, history of the hryvnia"
  - "IMF country reports on Ukraine stabilisation, 1990s"

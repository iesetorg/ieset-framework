policy_id: pry_carbon_credit_market_law_7190_2023
status: candidate
title: Paraguay Carbon Credit Market Law 7190 2023
countries:
- PRY
timeframe:
  start: 2023
  end: ongoing
description: 'Paraguay''s carbon-credit law established a legal framework for creating, registering, transferring, and using carbon credits generated by emissions reduction, avoidance, or removal projects.
  The policy created state recognition for credit ownership and registry procedures, giving voluntary carbon-market projects a formal domestic legal channel.

  '
enacted_by:
- paraguay_pena_colorado_2023_present
coalition_label_at_enactment: Partido Colorado / Honor Colorado-aligned government

  direction: +
  magnitude: weak
  intended: true
  rationale: The law created verified-credit infrastructure for emissions-reduction and removal projects.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Legal recognition of carbon-credit ownership strengthened tradable claims over verified environmental assets.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Projects and credits became subject to registry and authorisation procedures.

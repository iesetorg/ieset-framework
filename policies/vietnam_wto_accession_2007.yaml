policy_id: vietnam_wto_accession_2007
status: candidate
title: Vietnam Wto Accession 2007
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
description: 'Vietnam acceded to the World Trade Organization on January 11, 2007 as its 150th member after an eleven-year negotiation. Accession commitments included tariff bindings on substantially all
  goods, services-sector market opening across telecom, banking, distribution and insurance, TRIPS-compliant intellectual-property reforms, and elimination of trade-distorting subsidies. The treaty cemented
  Vietnam''s transformation into an export-oriented manufacturing economy.

  '

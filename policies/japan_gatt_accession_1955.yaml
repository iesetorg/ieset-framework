policy_id: japan_gatt_accession_1955
status: candidate
title: Japan Gatt Accession 1955
countries:
- JPN
timeframe:
  start: 1952
  end: 1975
description: 'Japan formally acceded to the General Agreement on Tariffs and Trade in September 1955, gaining most-favoured-nation access to OECD markets while securing transitional latitude under Article
  XII to maintain quantitative restrictions on imports for balance-of-payments reasons. Accession anchored the export-led growth strategy by binding tariff schedules abroad while domestic forex controls
  and MITI licensing continued to manage the import side, a deliberate asymmetry sustained through much of the high-growth era.

  '
enacted_by:
- japan_post_war_meti_industrial_policy_1952_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: GATT obligations were managed alongside continued MITI sectoral import licensing under Article XII derogations.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Outbound exports gained MFN access while inbound imports stayed restricted by quotas and forex rationing.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Tariff bindings increased the relative role of subsidies and procurement preferences for chosen sectors.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Trade policy remained subordinated to MITI/MOF growth strategy, constraining BOJ autonomous priorities.

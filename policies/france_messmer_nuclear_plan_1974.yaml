description: 'Government announcement 6 March 1974 (under PM Pierre Messmer, late Pompidou presidency) accelerating French nuclear-power construction in response to the first oil shock. Implementation continued
  under Giscard and Mitterrand. 58 reactors (PWR) ordered 1974-1991; by late 1980s nuclear supplied majority of French electricity. Canonical state-directed energy-security policy executed through EDF and
  the CEA.

  '

description: 'OBRA 1993 (Pub. L. 103-66), signed 10 August 1993. Raised top individual rate 31%→39.6% (two new brackets 36% and 39.6%); corporate rate 34%→35% over $10M; removed Medicare payroll-tax wage
  cap (2.9% uncapped); +4.3¢/gal fuel tax; expanded EITC; subjected up to 85% of Social Security benefits to tax for high-earners. Projected $496B deficit reduction over five years. Passed House 218-216
  (Marjorie Margolies-Mezvinsky decisive); Senate 51-50 (VP Gore tiebreaker). Zero Republican votes.

  '

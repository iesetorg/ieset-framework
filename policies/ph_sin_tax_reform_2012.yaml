policy_id: ph_sin_tax_reform_2012
status: candidate
title: Sin Tax Reform 2012
countries:
- PHL
timeframe:
  start: 2010
  end: 2016
description: 'Republic Act 10351 (Sin Tax Reform Act of 2012) under the Aquino III government restructured and raised excise taxes on tobacco and alcohol, simplified the multi-tier rate system, and indexed
  rates to inflation. The earmarking provisions directed a substantial share of incremental revenues to the Universal Health Care programme through the Department of Health and PhilHealth, financing premium
  subsidies for indigent and informal-sector members.

  '
enacted_by:
- philippines_aquino_iii_2010_2016

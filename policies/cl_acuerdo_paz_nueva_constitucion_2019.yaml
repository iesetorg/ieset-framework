description: 'Cross-party ''Acuerdo por la Paz Social y la Nueva Constitución'' signed in November 2019 in response to the estallido social, agreeing on a constitutional referendum process and elected convention
  to draft a replacement for the 1980 Pinochet-era charter. Set the institutional framework for the 2020 entry plebiscite and the 2021 convention election.

  '

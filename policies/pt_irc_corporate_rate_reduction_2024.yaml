policy_id: pt_irc_corporate_rate_reduction_2024
status: candidate
title: Irc Corporate Rate Reduction 2024
countries:
- PRT
timeframe:
  start: 2024
  end: ongoing
description: 'Portugal''s IRC corporate-tax reduction, announced in the 2025 State Budget proposal by the Montenegro AD government, programmed a multi-year reduction in the standard IRC rate from 21% toward
  15%, beginning with a 1 percentage-point cut in 2025 and accompanied by an enhanced reduced rate for SMEs. The intended effect was to improve Portugal''s investment attractiveness vis-a-vis Ireland and
  the broader EU, ease the cost of capital for SMEs (which dominate the Portuguese business population), and signal a clear pro-investment shift after eight years of PS-led fiscal policy.

  '

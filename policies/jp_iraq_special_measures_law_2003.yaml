description: 'Iraq Reconstruction Special Measures Law passed 26 July 2003 authorising JSDF dispatch to Iraq for humanitarian and reconstruction activities in "non-combat zones." Ground Self- Defense Force
  deployed to Samawah, Muthanna Province (January 2004 - July 2006) — first postwar overseas deployment of Japanese ground forces to a conflict theatre without UN blue-helmet mandate. Air Self-Defense Force
  continued airlift support 2004- 2008. Law expired 31 July 2009 after five-year extension. Constitutional-doctrine stretch widely debated under Article 9.

  '

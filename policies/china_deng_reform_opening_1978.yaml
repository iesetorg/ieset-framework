policy_id: china_deng_reform_opening_1978
status: candidate
title: Reform and Opening (改革开放) — 1978
countries:
- CHN
timeframe:
  start: 1978
  end: 1994
  enacted_date: '1978-12-18'
description: 'Landmark shift from Maoist central-planning autarky to market-oriented development under Deng Xiaoping. Key components: (1) household responsibility system replacing agricultural collectivisation
  (1978-1983); (2) Special Economic Zones (Shenzhen, Zhuhai, Shantou, Xiamen — 1980) for export-oriented FDI; (3) dual-track pricing system transitioning from plan to market (phased through 1990s); (4)
  township-village enterprises as non-state-non-private firms; (5) state-owned-enterprise corporatisation beginning 1984-93; (6) coastal-open-city strategy 1984. Produced 9-10% annual GDP growth 1978-2010.
  Framework treats this as the largest-scale documented liberalisation-then-growth trajectory case.

  '

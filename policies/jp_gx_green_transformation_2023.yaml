policy_id: jp_gx_green_transformation_2023
status: candidate
title: Japan — GX Green Transformation framework and GX Transition Bonds (2023-2024)
countries:
- JPN
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-05-12'
description: 'Green Transformation (GX) policy package anchored by the GX Promotion Act (enacted 12 May 2023) and accompanying GX Decarbonisation Power Supply Act. Commits Japan to ¥150tn of combined public-private
  green investment over ten years, seeded by ¥20tn of GX Transition Bonds (first issuance February 2024 — the world''s first sovereign transition bonds). Establishes a carbon levy on fossil-fuel importers
  from FY2028 and an emissions-trading system phased in from FY2026 (voluntary) with mandatory auction-based allowances for the power sector from FY2033. Complementary nuclear-operation-extension rules
  lift the previous 60-year lifetime cap under certain conditions. Bond repayment is tied to expected future carbon-levy and ETS auction revenue over 20 years.

  '

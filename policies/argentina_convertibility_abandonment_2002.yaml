policy_id: argentina_convertibility_abandonment_2002
status: candidate
title: Argentina Convertibility Abandonment 2002
countries:
- ARG
timeframe:
  start: 2001
  end: 2002
description: 'In January 2002 the Duhalde government enacted Law 25.561 (Ley de Emergencia Pública y Reforma del Régimen Cambiario), abolishing the one-to-one peso-dollar peg established by the 1991 Convertibility
  Law. The peso was first devalued to 1.4 per dollar then floated, and dollar-denominated contracts were forcibly converted to pesos ("pesification"). The measure halted reserve haemorrhage but produced
  a sharp devaluation, banking-system insolvency, and contract-rights disputes.

  '

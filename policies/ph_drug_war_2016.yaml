policy_id: ph_drug_war_2016
status: candidate
title: Philippine 'war on drugs' (Oplan Tokhang / Oplan Double Barrel)
countries:
- PHL
timeframe:
  start: 2016
  end: 2022
  enacted_date: '2016-07-01'
description: 'Anti-narcotics campaign launched upon the inauguration of President Duterte on 30 June 2016, operationally rolled out via PNP Command Memorandum Circular 16-2016 (''Oplan Double Barrel'')
  and neighbourhood-level ''Tokhang'' (knock-and-plead) visitations. Official PDEA statistics record ~6,200 deaths in police anti-drug operations 2016-2022; domestic human-rights organisations, CHR and
  UN OHCHR estimate the total including vigilante killings at 12,000-30,000. A presidential ''kill list'' rhetoric, public rewards and repeated public endorsements created systemic political cover. Institutional
  consequences included the quo-warranto removal of Chief Justice Sereno (May 2018), detention of Senator Leila de Lima (Feb 2017, acquitted 2023-24), withdrawal from the Rome Statute (effective March 2019,
  see separate policy), and franchise denial against ABS-CBN (July 2020). The ICC opened a preliminary examination in 2018 and formal investigation in September 2021, leading to the 11 March 2025 arrest
  of former President Duterte and his transfer to The Hague under the Marcos Jr administration.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban executive-led, PNP under Dela Rosa / Albayalde / Eleazar / Danao
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  rationale: Documented extrajudicial killings under colour of police anti-drug operations, with active political cover; erosion of the presumption of due process in the most visible policy arena of the
    administration.
  intended: false
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: moderate
  rationale: Instrumentalised prosecutions and judicial interventions (Sereno quo warranto, de Lima detention) aligned with the campaign's political needs.
  intended: false
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  rationale: Anecdotal but recurring reports of post-killing property seizure, asset-forfeiture without due process, particularly in low-income barangay operations.
  intended: false

policy_id: france_paid_vacations_law_1936
status: candidate
title: France paid vacations law 1936
countries: [FRA]
timeframe:
  start: 1936
  end: 1936
  enacted_date: "1936-06-20"
description: >
  The Law of 20 June 1936 introduced two weeks of paid annual vacation for
  employees in industry, commerce, liberal professions, domestic service,
  and agriculture. One of the best-known Popular Front reforms, it turned
  paid leisure from a privilege of upper strata into a statutory labour
  entitlement for ordinary wage earners. The cost was borne through the
  employment relationship rather than a cash transfer from the Treasury,
  but the law unmistakably thickened the bundle of mandatory labour
  standards that firms had to respect.
enacted_by:
  - france_popular_front_1936_1938
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "A statutory paid-leave entitlement raised the non-wage obligations attached to employment contracts."
references:
  - "Loi du 20 juin 1936 instituant un conge annuel paye"

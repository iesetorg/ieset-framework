description: '"Tassa per l''Europa" (Legge Finanziaria 662/1996, 23 December 1996) imposed a one-off progressive income surtax for 1997 to bring Italy''s deficit below the 3% Maastricht ceiling. Raised
  approximately ITL 12.5 trillion (0.6% of GDP). Partial rebate paid back in 1999 after successful euro qualification. Symbolically central to the Prodi government''s euro-entry mission.

  '

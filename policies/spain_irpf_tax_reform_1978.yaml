description: 'Ley 44/1978 del Impuesto sobre la Renta de las Personas Físicas, designed by Finance Minister Fernández Ordóñez under the Suárez UCD government following the Pactos de la Moncloa, replaced
  Spain''s pre-democratic schedular tax system with a unified progressive personal income tax. It introduced graduated brackets and a global income concept, becoming the cornerstone of post-Franco fiscal
  modernisation.

  '

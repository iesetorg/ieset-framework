policy_id: pl_bodnar_judicial_restoration_2024
status: candidate
title: Bodnar Judicial Restoration 2024
countries:
- POL
timeframe:
  start: 2023
  end: ongoing
description: 'Judicial-restoration agenda pursued by Justice Minister Adam Bodnar under the Tusk Koalicja government from late 2023, aimed at reversing PiS-era changes to the Constitutional Tribunal, Supreme
  Court, KRS, and prosecutorial structures. The package combined administrative and legislative steps to align Polish judicial governance with EU rule-of-law standards and unblock Recovery and Resilience
  Facility funds frozen under the prior Article 7 procedure.

  '

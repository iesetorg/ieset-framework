title: Sierra Leone Free Quality School Education programme 2018
countries:
- SLE
timeframe:
  start: 2018
  end: ongoing
description: 'Sierra Leone launched the Free Quality School Education programme as the Bio government''s flagship human-capital policy, removing school fees in government and government-assisted basic and
  senior-secondary schools while increasing public financing for teaching, learning materials, school feeding, examinations, and oversight. The measure shifted a large share of schooling costs from households
  to the public budget.

  '

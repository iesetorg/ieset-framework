# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: kwt_public_employment_welfare_distribution_1960s_present
status: candidate
title: Kuwait citizen public employment and welfare distribution compact
countries: [KWT]
timeframe: {start: 1961, end: ongoing}
description: >
  Kuwait built a citizen welfare compact around public-sector employment,
  subsidised utilities and fuel, free education and health care, housing support,
  social allowances, and preference for citizens in state jobs. The compact
  uses oil revenue to distribute income and security through the budget rather
  than through broad taxation.
enacted_by:
  - kuwait_oil_welfare_state_1961_present
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Cash allowances, housing benefits, and in-kind services create a large transfer footprint for citizens."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Public wages, subsidies, health, education, and housing commitments dominate recurrent spending."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Energy, housing, and consumption subsidies are targeted through administered prices and budget support."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Guaranteed public employment and citizen preferences reduce labour-market flexibility for nationals."
references:
  - "Herb (2014), The Wages of Oil"
  - "IMF Article IV Kuwait, labour-market and subsidy reform chapters"

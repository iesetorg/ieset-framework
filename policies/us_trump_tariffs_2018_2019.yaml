description: 'Section 232 tariffs on steel (25%) and aluminum (10%) imports, and Section 301 tariffs on ~$370bn of Chinese imports in four tranches (2018-2019). Retaliation by China, EU, Canada, Mexico
  followed. Most Section 301 tariffs retained under Biden. Empirical literature (Amiti-Redding-Weinstein 2019, Fajgelbaum et al 2020) finds near- full pass-through to US prices, negligible-to-negative employment
  effects in protected sectors, and net welfare loss to US economy. Canonical case of coalition-content mismatch: Republican- implemented state intervention in trade (refinement D.3.1).

  '

description: 'Introduced 16 regional and 1 branch (uniformed services) health- insurance funds (kasy chorych) from 1 January 1999, funded by earmarked payroll contribution (7.5% rising to 9%). Replaced
  with a centralised National Health Fund (NFZ) from 1 April 2003 under SLD government.

  '

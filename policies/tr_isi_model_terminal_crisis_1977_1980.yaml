status: candidate
title: Turkey ISI model terminal crisis 1977-1980
countries:
- TUR
timeframe:
  start: 1977
  end: 1980
description: 'Terminal crisis of Turkey''s import-substitution industrialisation model. Fixed exchange rate, FX shortage, import licensing collapse, chronic goods shortages (electricity, cooking oil, cigarettes),
  inflation ~100% by 1980, political violence 5,000+ dead. Coalition governments (Demirel, Ecevit, Demirel) could not agree on adjustment; three IMF programmes (1978, 1979, 1980) failed pre-implementation.
  Produced both the January 1980 package and the September 1980 coup.

  '

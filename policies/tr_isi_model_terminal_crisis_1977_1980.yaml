  magnitude: strong
  rationale: Deficit monetisation through Central Bank advances; inflation peak ~100%.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  rationale: Import licensing administrative collapse — rationing.
references:

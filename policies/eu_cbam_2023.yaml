description: 'Regulation (EU) 2023/956 — the Carbon Border Adjustment Mechanism — imposes a carbon price on imports of cement, iron and steel, aluminium, fertilisers, electricity, and hydrogen entering
  the EU customs territory, mirroring the EU ETS allowance price. A transitional reporting phase began in October 2023, with full financial obligations from 2026 as free ETS allowances are phased out, intended
  to address carbon leakage by equalising the carbon cost of EU and imported goods.

  '

  end: ongoing
description: 'Mas Barrio is an Orsi-government neighbourhood intervention strategy that combines urban improvements, public-service reinforcement, and coordinated social policy in high-need areas. The first
  implementation was announced for the Corfrisa neighbourhood of Las Piedras, Canelones, with household surveys used to identify local needs before works and service coordination begin.

  '

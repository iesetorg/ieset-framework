description: 'Third NDP announced 1975 allocated ~$35bn capital spending (revised upward to ~$50bn) — largest in African history at the time. Financed by oil-boom revenue. Priorities: Abuja new capital,
  Ajaokuta steel, Delta Steel, Kaduna Refinery II, Warri Refinery, federal highways, universities. Severe absorption bottlenecks (cement port queues 1975-77). Created infrastructure backbone but also the
  template for oil-rent mismanagement.

  '

  direction: +
  magnitude: strong
  intended: true
  rationale: Statutory minimum-livelihood guarantee; first universal (category-blind) poverty floor.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Rights-based framework enforceable through administrative appeal.

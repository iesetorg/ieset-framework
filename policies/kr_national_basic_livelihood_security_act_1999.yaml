policy_id: kr_national_basic_livelihood_security_act_1999
status: candidate
title: Korea National Basic Livelihood Security Act (1999)
countries:
- KOR
timeframe:
  start: 1999
  end: 2000
  enacted_date: '1999-09-07'
description: 'National Basic Livelihood Security Act (국민기초생활보장법) passed 7 September 1999, effective 1 October 2000. Replaced earlier Livelihood Protection Act (1961) that limited support to elderly, disabled,
  and children. NBLSA extended statutory right to minimum livelihood guarantee to all citizens below the poverty line (minimum cost of living standard), irrespective of demographic category, subject to
  work-readiness assessment. First statutory rights-based poverty floor in Korean history. Cash transfers plus housing, medical, and education supplements. Coverage ~1.5m recipients initially; ~1.8m by
  2020. Designed by welfare-academia network including future Roh-era welfare architects.

  '
enacted_by:
- skorea_kim_dae_jung_ds_1998_2003
coalition_label_at_enactment: NCNP / MDP
axes_moved:

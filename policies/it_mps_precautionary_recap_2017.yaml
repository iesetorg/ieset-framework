policy_id: it_mps_precautionary_recap_2017
status: candidate
title: Italy MPS precautionary recapitalisation (2017)
countries:
- ITA
timeframe:
  start: 2017
  end: 2021
  enacted_date: '2017-07-04'
description: 'Precautionary recapitalisation of Banca Monte dei Paschi di Siena under EU BRRD Art. 32(4)(d)(iii): €5.4bn state capital injection (Italian state ultimately ~68% stake) and €4.1bn burden-sharing
  conversion of subordinated debt, with retail-investor compensation scheme. Framework authorisation from EU Commission (5 Jul 2017) under state-aid rules; MPS Restructuring Plan committed to asset disposals,
  cost reductions, and eventual re-privatisation. Part-reprivatised 2021-2023 via secondary offerings as MPS recovered profitability.

  '

description: 'Second-term Blair government committed to matching EU average health spending share of GDP, implemented via NHS capacity expansion (NHS Plan 2000). Public-sector headcount grew substantially.
  Working Tax Credit + Child Tax Credit expanded (2003). Sure Start children''s centres. Large absolute increase in public spending as % of GDP (~37% in 2000 to ~48% in 2009 — partially crisis-driven).
  Critics distinguish pre-crisis deliberate expansion from 2008-2009 automatic-stabiliser + crisis-response component. Forward-referenced policy from uk_blair_brown_fiscal_expansion_2001_2010 movement.

  '

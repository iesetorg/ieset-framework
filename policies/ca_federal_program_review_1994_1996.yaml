description: 'Cabinet-level exercise chaired by Treasury Board President Marcel Massé from February 1994. Every federal programme evaluated against six tests: public-interest, role-of-government, federalism,
  partnership, efficiency, affordability. Fed the 1995 Budget. Cut ~45,000 FTE; eliminated, merged, or privatised dozens of agencies; spun off NAV Canada (1996), transferred ports and airports to local
  authorities.

  '

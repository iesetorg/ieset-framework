# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: singapore_cpf_housing_and_savings_expansion_1968_1984
status: candidate
title: Singapore CPF housing and savings expansion, 1968-1984
countries:
- SGP
timeframe:
  start: 1968
  end: 1984
description: Singapore expanded CPF beyond retirement saving into housing finance from 1968 and
  later medical saving through Medisave in 1984. The result was a compulsory individual-account
  architecture that raised measured savings and asset accumulation while limiting general tax-financed
  transfer expansion.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Compulsory individual accounts substituted for broad tax-financed cash transfers.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: CPF balances are individually attributed claims used for housing, retirement, and
    medical accounts.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Forced saving reduced pressure for a larger pay-as-you-go welfare state.
linked_hypotheses:
- singapore_lky_low_tax_high_savings_market_rules_1970_1990
- singapore_cpf_national_savings_effect
- singapore_cpf_institutional_complementarity
notes: Complements existing CPF policy cards with direct links to the new fiscal-market LKY study.

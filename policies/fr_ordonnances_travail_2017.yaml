description: 'Five ordonnances (n° 2017-1385 à 2017-1389) reforming the French Code du travail: capping unfair-dismissal damages on a seniority grid, expanding primacy of company-level collective agreements
  over branch agreements, merging employee-representative bodies into a single Comité social et économique (CSE), and simplifying economic-dismissal criteria at the national perimeter for multinational
  firms.


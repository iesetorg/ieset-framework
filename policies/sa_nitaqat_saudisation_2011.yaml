policy_id: sa_nitaqat_saudisation_2011
status: candidate
title: Nitaqat Saudisation programme
countries:
- SAU
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-06-11'
description: 'Ministry of Labour colour-band classification (platinum/green/yellow/ red) requiring private firms to meet rising Saudi-national employment quotas or face hiring/visa sanctions, including
  frozen expatriate work permit renewals for red-band firms. Expanded repeatedly through the 2010s and into the 2020s; nominally raised Saudi private employment but also drove documented unemployment of
  expatriates and firm exit in some sectors. Core instrument of the post-Arab-Spring labour-market nationalisation agenda.

  '
enacted_by:
- saudi_abdullah_late_era_2005_2015
- saudi_salman_transition_2015_2017
- saudi_mbs_cp_era_2017_present
coalition_label_at_enactment: Al Saud monarchy; Ministry of Labour
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Sector-specific national-worker quotas backed by visa sanctions constrain private hiring decisions.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Tightened expatriate work-permit renewals in red-band firms.
references:

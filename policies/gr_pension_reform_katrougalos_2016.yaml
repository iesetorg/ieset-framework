policy_id: gr_pension_reform_katrougalos_2016
status: candidate
title: Greece Katrougalos pension unification and cut 2016
countries:
- GRC
timeframe:
  start: 2016
  enacted_date: '2016-05-12'
description: 'Law 4387/2016 (Labour Minister Giorgos Katrougalos) enacting unified pension rules across pre-existing funds. Key measures: creation of EFKA (Unified Social Security Entity) merging multiple
  sectoral funds; ''national pension'' of €384 (20 years contribution floor); ''contributory pension'' component replacing previous replacement-rate schedule with lower implied accrual rates (c.30% cut
  in implied replacement at common career profiles compared with pre-reform); supplementary-pension calculation shifted to notional-defined-contribution logic; self-employed contributions harmonised at
  20% of net income (raised substantially for many professions including lawyers, engineers, doctors); public-sector pension alignment; personal-difference protection for transitional retirees. Passed as
  Third Memorandum prior action with IMF support but European Commission preference for slower timing. Triggered sustained professional-association strikes (notably lawyers'' one-year boycott of courts).
  Subsequent Mitsotakis-era amendments partially reshaped the auxiliary pillar (capitalisation, Law 4826/2021) but retained the Katrougalos unification.

  '

description: 'PM Robert Peel (Conservative) split his party to repeal the tariffs on imported grain enacted 1815. Irish Potato Famine catalysed the reform. Phased tariff reduction through 1849. Marked the
  UK''s transition to unilateral free trade — subsequent Cobden-Chevalier Treaty 1860 extended to European bilateral free trade. Historical landmark of classical-liberal trade policy: the Anti-Corn Law
  League (Cobden, Bright) argued free trade would lower food prices and expand manufacturing. Post-repeal, UK agricultural employment fell but real wages rose, industrial output accelerated. Canonical reference
  case for trade-openness direction.

  '

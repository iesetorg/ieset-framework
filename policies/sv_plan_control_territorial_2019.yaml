policy_id: sv_plan_control_territorial_2019
status: candidate
title: Plan Control Territorial — Bukele's seven-phase security plan (Jun 2019)
countries:
- SLV
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2019-06-20'
description: 'Plan Control Territorial (PCT) is the seven-phase security strategy launched by the Bukele administration on 20 Jun 2019, three weeks into the first term. Phases included territorial recovery
  (Phase I, large-scale deployment of Armed Forces and PNC into mara-controlled neighbourhoods), prison-system hardening (Phase II, gang-segregation across Izalco, Zacatecoluca and others, with the Feb
  2020 "9F crisis" over the $109m security loan), public-space modernisation, youth-employment programming, and the construction of CECOT (Phase VII, operational Jan 2023). PCT preceded and framed the régimen
  de excepción of Mar 2022. Homicide rate declined from 38/100k in 2019 to 19.7/100k in 2020 (pre-régimen) — critics (InSight Crime, El Faro) allege a parallel undisclosed truce between the Bukele administration
  and gang leaderships documented via prison-visitor records and leaked messages, which supporters dispute.

  '

title: Iva Vat Hike 2011
countries:
- PRT
timeframe:
  start: 2011
  end: 2015
description: 'As part of the EU/IMF/ECB Troika adjustment programme, the Passos Coelho government raised Portugal''s standard VAT (IVA) rate to 23% in 2011 and reclassified numerous goods/services into
  higher VAT brackets. Enacted via the State Budget Law amendments, the measure was a core revenue-side pillar of fiscal consolidation aimed at reducing the deficit and meeting bailout targets.

  '

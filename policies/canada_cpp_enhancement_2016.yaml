policy_id: canada_cpp_enhancement_2016
status: candidate
title: Canada Cpp Enhancement 2016
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Following federal-provincial agreement in June 2016, the Canada Pension Plan was enhanced to raise the income-replacement target from 25% to 33% of pensionable earnings, with the Year''s Maximum
  Pensionable Earnings ceiling lifted via a new YAMPE band. Contributions phase in over 2019–2025, raising combined employer-employee CPP rates by about 2 percentage points and broadening the contribution
  base. The reform marked the most significant expansion of Canada''s public pension pillar since CPP''s 1965 establishment.

  '

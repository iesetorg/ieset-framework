description: 'Superannuation Guarantee (SG) Act 1992: mandatory employer contribution to individual superannuation funds of 3% initially, phased to 12% by 2025. Architecturally a third canonical forced-saving
  welfare case alongside Singapore CPF and Chilean AFP. Outcome: Australian superannuation industry now ~$3.7tn, ~160% of GDP — world''s 5th largest pension pool per capita. Genuine growth-compatible forced-
  saving alternative to transfer-based welfare state. D.2.9 / mega-spec references Australian super as canonical architecture.'

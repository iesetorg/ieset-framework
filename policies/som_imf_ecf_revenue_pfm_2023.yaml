policy_id: som_imf_ecf_revenue_pfm_2023
status: candidate
title: Somalia IMF ECF revenue and PFM programme 2023
countries:
- SOM
timeframe:
  start: 2023
  end: ongoing
description: >
  Somalia entered a new IMF Extended Credit Facility-supported programme after
  reaching HIPC Completion Point to preserve macroeconomic stability and deepen
  fiscal institutions. The programme emphasized domestic-revenue mobilization,
  customs and tax administration, expenditure controls, debt management,
  financial-sector supervision, and public financial management across the
  federal government.
enacted_by:
- somalia_hassan_sheikh_debt_security_statebuilding_2022_present
scope: national
coalition_label_at_enactment: Hassan Sheikh Mohamud federal government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme benchmarks constrained spending execution and linked fiscal expansion to revenue and grant financing.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic revenue mobilization broadened formal tax and customs collection capacity, though not primarily through progressive rates.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: PFM, debt, procurement, and financial-supervision benchmarks strengthened rule-bound fiscal administration.
references:
- IMF Somalia Extended Credit Facility approval and staff reports, 2023-2025.
- Somalia Ministry of Finance fiscal-reform and revenue-mobilization materials, 2023-2025.

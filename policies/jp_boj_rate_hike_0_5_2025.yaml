description: 'At its 23-24 January 2025 monetary policy meeting, the Bank of Japan under Governor Kazuo Ueda raised its policy rate from 0.25% to 0.5%, the highest level since 2008. Decision cited on-target
  underlying inflation, the 2025 shuntō wage-settlement trajectory, and the need to continue gradual normalisation after the March and July 2024 moves. PM Ishiba publicly reaffirmed BoJ independence and
  declined to second-guess the decision despite intra-LDP reflationist pressure. Accompanied by ongoing taper of JGB purchases following the July 2024 plan to halve monthly purchases by Q1 2026.

  '

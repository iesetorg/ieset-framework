policy_id: id_east_timor_referendum_1999
status: candidate
title: East Timor independence referendum and MPR recognition (1999)
countries:
- IDN
- TLS
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-08-30'
description: 'UN-supervised popular consultation in East Timor held 30 August 1999 under 5 May 1999 New York Agreement between Indonesia and Portugal. 78.5% of East Timorese voters rejected special- autonomy
  status within Indonesia, implying independence. Result announced 4 September triggered pro-integration militia violence and systematic destruction of infrastructure. INTERFET (Australia- led, 22 nations)
  deployed 20 September 1999 under UN Security Council Resolution 1264. MPR revoked East Timor integration 20 October 1999. UNTAET transitional administration 25 October 1999. Formal independence 20 May
  2002 as Timor-Leste.

  '

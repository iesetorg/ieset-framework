  end: 2017
  enacted_date: '2013-06-12'
description: 'Revenue-raising package implemented under the 2013 IMF EFF programme including: GST rate increase from 16% to 17% (Finance Act 2013); expansion of withholding-tax regime covering banking transactions,
  mobile-phone top-ups, and non-filer differential rates; GIDC gas-infrastructure-development-cess (various iterations 2011-2015 with litigation); increased federal excise on tobacco, cement, and beverages.
  Revenue-to-GDP rose modestly but from a very narrow direct-tax base; distributional incidence weighted toward consumption and indirect channels.

  '

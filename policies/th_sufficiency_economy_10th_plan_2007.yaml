description: 'Thailand''s Tenth National Economic and Social Development Plan (2007-2011), formulated under the post-coup Surayud interim government, codified the King Bhumibol-promoted Sufficiency Economy
  Philosophy as the official planning paradigm. The plan emphasised moderation, self-reliance and resilience over growth-maximising export orientation, guiding ministry budgets, NESDB indicators, and corporate-governance
  signalling for the period.

  '

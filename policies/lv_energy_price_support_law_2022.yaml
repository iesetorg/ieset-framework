policy_id: lv_energy_price_support_law_2022
status: candidate
title: Latvia energy-resource price support law 2022
countries:
- LVA
timeframe:
  start: 2022
  end: 2023
description: 'Latvia adopted temporary support measures during the 2021-2023 energy-price shock to cushion households and firms from exceptional electricity, gas, heat, and fuel-cost increases. The law
  and implementing rules used bill credits, capped or compensated tariff components, and targeted household support while preserving the underlying energy-market contracts for suppliers.

  '
enacted_by:
- latvia_karins_silina_security_state_2022_present
scope: national
coalition_label_at_enactment: Karins-New Unity coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Budget-financed compensation lowered household and business energy bills during the shock.
- axis: regulatory.price_control_intensity
  direction: +
  magnitude: weak
  intended: true
  rationale: Temporary caps and compensated tariff components limited pass-through of market energy prices to covered consumers.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: Emergency support reduced payment stress while Latvia diversified away from Russian energy dependence.
references:
- Latvia Law on Measures to Reduce the Extraordinary Increase in Energy Resource Prices, 2022
- Latvian Ministry of Economics, energy-price support and household compensation materials, 2022-2023

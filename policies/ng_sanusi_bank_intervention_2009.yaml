policy_id: ng_sanusi_bank_intervention_2009
status: candidate
title: Sanusi-led CBN bank intervention and AMCON
countries:
- NGA
timeframe:
  start: 2009
  end: 2011
  enacted_date: '2009-08-14'
description: 'CBN under Governor Lamido Sanusi announced 14 Aug 2009 takeover of five insolvent banks (Afribank, Finbank, Intercontinental, Oceanic, Union Bank) following joint CBN-NDIC stress-test, injected
  ~NGN 620bn liquidity, removed bank CEOs, and supported establishment of Asset Management Corporation of Nigeria (AMCON) in 2010 to resolve toxic assets. Five more institutions placed under intervention
  later.

  '

  enacted_date: '1974-02-21'
description: 'SFRJ 1974 Constitution codified far-reaching confederal decentralisation — six republics plus two autonomous provinces (Vojvodina, Kosovo) each with near-state powers, unanimity rule for federal
  decisions, 8-member rotating collective presidency for post-Tito era, and elaborated self-management structures. The longest constitution in the world at ~400 articles. Its decision- rule rigidities largely
  immobilised the federation after Tito''s 1980 death.

  '

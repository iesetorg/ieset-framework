policy_id: pe_vizcarra_vacancy_nov_2020
status: candidate
title: Vizcarra Vacancy Nov 2020
countries:
- PER
timeframe:
  start: 2018
  end: 2020
description: 'Congressional vacancy of President Martín Vizcarra in November 2020 on grounds of "permanent moral incapacity," which removed the executive amid an active anti-corruption agenda and triggered
  a brief succession crisis culminating in the Manuel Merino interim government and rapid replacement by Francisco Sagasti. The episode shaped Peru''s institutional and rule-of-law trajectory and constrained
  the policy bandwidth of the technocratic governments that followed.

  '

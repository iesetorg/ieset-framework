- peru_vizcarra_2018_2020
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Constitutional Tribunal review of the vacancy reaffirmed procedural rule-of-law boundaries on impeachment.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Independent prosecution of corruption cases continued through the succession alongside Vizcarra's reform legacy.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Successor Sagasti government extended Vizcarra-era pandemic transfer programmes during the political handover.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Continued elevated COVID-era primary spending across the late-2020 succession as transfer programmes ran on.

policy_id: jp_dpj_child_allowance_2010
status: candidate
title: DPJ child allowance kodomo teate 2010
countries:
- JPN
timeframe:
  start: 2010
  end: 2012
  enacted_date: '2010-04-01'
description: 'Universal child allowance (kodomo teate) launched April 2010 by the Hatoyama cabinet as the flagship DPJ 2009 manifesto transfer programme — ¥13,000 per month per child under 15 (planned ¥26,000/month
  for FY2011 but fiscally unsustainable, held at ¥13,000), universal regardless of parental income. Replaced the means-tested jidō teate inherited from LDP governments. Estimated cost ¥2.2tn annually at
  ¥13,000 rate. Rolled back to income-tested jidō teate-style structure under the three-party agreement August 2011 ahead of Noda consumption-tax negotiations; full universality abandoned. Illustrative
  of DPJ''s pay-as-you-go fiscal commitment rhetoric vs implementation reality.

  '
enacted_by:
- japan_hatoyama_dpj_2009_2010
- japan_kan_dpj_2010_2011
coalition_label_at_enactment: DPJ-SDP-PNP / DPJ-PNP

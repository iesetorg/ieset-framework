  direction: +
  magnitude: strong
  rationale: Universal child transfer ~¥2.2tn annual outlay; largest single DPJ manifesto programme.
  intended: true
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: ~0.4% of GDP incremental; offset by abolition of spousal income deduction.
  intended: true

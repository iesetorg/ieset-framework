policy_id: italy_cassa_mezzogiorno_1950
status: candidate
title: Italy Cassa Mezzogiorno 1950
countries:
- ITA
timeframe:
  start: 1950
  end: 1970
description: 'Established by Law 646 of 10 August 1950, the Cassa per il Mezzogiorno was a special-purpose extra-budgetary agency that channelled large public investment into southern Italian regions across
  infrastructure, agriculture, and (after 1957) industrial subsidies for southern factory construction. Operating across the De Gasperi and successor Christian-Democrat governments until its 1984 liquidation,
  the Cassa funded motorways, irrigation, and IRI plant siting, and became a leading example of long-running place-based industrial policy with mixed productivity outcomes and well-documented patronage
  capture.

  '
enacted_by:
- italian_economic_miracle_1950_1970
- italy_dc_patronage_state_1945_1992
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Southern infrastructure investment supported integration into postwar continental supply chains.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Cassa-favoured firms received expedited administrative clearances bypassing standard licensing.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Off-budget financing through dedicated agency reduced direct Treasury pressure on Banca d'Italia.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Capital grants and tax exemptions for southern plant siting were the agency's defining mechanism.

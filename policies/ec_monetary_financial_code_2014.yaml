description: 'Código Orgánico Monetario y Financiero (12 Sep 2014) reorganised financial-sector architecture: Junta de Política y Regulación Monetaria y Financiera (JPRMF) as top regulator, Superintendencia
  de Bancos + Superintendencia de Economía Popular y Solidaria, enabling legislation for electronic money issued via BCE (2015 rollout failed by 2018 repeal), deposit-insurance + liquidity-fund consolidation.
  Centralised executive- branch influence over financial policy.

  '

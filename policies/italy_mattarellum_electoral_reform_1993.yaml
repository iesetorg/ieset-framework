description: 'Following 18 April 1993 referendums, Laws 276/1993 (Senate) and 277/1993 (Chamber) replaced pure proportional representation with a mixed system: 75% single-member plurality, 25% proportional
  with scorporo. Named after Sergio Mattarella (sponsor, later President). Underpinned the 1994 transition to majoritarian coalition politics and the emergence of centre-left/centre-right bipolarism.


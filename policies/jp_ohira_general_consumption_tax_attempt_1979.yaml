policy_id: jp_ohira_general_consumption_tax_attempt_1979
status: candidate
title: Ohira 5% general consumption tax attempt (Japan 1979)
countries:
- JPN
timeframe:
  start: 1979
  end: 1979
description: 'Prime Minister Ohira announced in Jan 1979 a plan for a 5% general consumption tax to begin FY1980, to address rising deficit-bond dependency. After LDP losses in the 7 Oct 1979 general election
  (LDP 44.6% of vote, 248 seats of 511, losing outright majority temporarily), the proposal was withdrawn. Prefigured the 3% consumption tax eventually introduced under Takeshita in April 1989.

  '

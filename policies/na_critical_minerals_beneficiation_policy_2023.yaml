policy_id: na_critical_minerals_beneficiation_policy_2023
status: candidate
title: Namibia critical-minerals beneficiation export policy 2023
countries:
- NAM
timeframe:
  start: 2023
  end: ongoing
description: 'Namibia moved to restrict exports of selected unprocessed critical minerals, including lithium and rare-earth minerals, unless exemptions were granted, with the aim of forcing more domestic
  processing and value addition before export. The policy shifted mining regulation from raw-export permissiveness toward state-gated beneficiation and local industrial development.

  '
enacted_by:
- namibia_swapo_green_industrialisation_2020_present
scope: national
coalition_label_at_enactment: SWAPO Geingob government
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Export restrictions on unprocessed minerals reduce raw-material trade openness.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Exemption and processing requirements increase state gating of mining exports.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Beneficiation rules target domestic processing as an industrial-policy objective for a selected sector.
references:

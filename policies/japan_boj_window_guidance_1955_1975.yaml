policy_id: japan_boj_window_guidance_1955_1975
status: candidate
title: Japan Boj Window Guidance 1955 1975
countries:
- JPN
timeframe:
  start: 1952
  end: 1975
description: 'Bank of Japan "window guidance" (madoguchi shidō) was an informal but binding system of bank-by-bank loan ceilings used through the high-growth era. The BOJ allocated quarterly credit quotas
  to city banks, steering lending toward MITI-priority sectors (steel, shipbuilding, electronics) under the rationing regime that complemented Fiscal Investment and Loan Program (FILP) allocations. The
  mechanism amplified industrial policy by directing scarce credit while suppressing consumer-facing finance.

  '
enacted_by:
- japan_post_war_meti_industrial_policy_1952_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Bank-by-bank credit ceilings effectively licensed which sectors could access loanable funds.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Credit allocation favoured export sectors while restricting forex availability for imports.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Below-market policy lending to priority industries acted as a quasi-fiscal sectoral subsidy.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BOJ operated as an arm of MITI/MOF industrial allocation rather than an independent inflation authority.

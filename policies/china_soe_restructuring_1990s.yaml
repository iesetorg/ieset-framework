policy_id: china_soe_restructuring_1990s
status: candidate
title: China Soe Restructuring 1990S
countries:
- CHN
timeframe:
  start: 1978
  end: 2012
description: 'The ''grasp the large, let go of the small'' (zhuada fangxiao) restructuring programme initiated in the mid-1990s under Zhu Rongji, which retained central control over a set of large strategic
  enterprises while privatising, merging, or closing tens of thousands of small and medium SOEs. The programme triggered roughly 30 million state-sector layoffs and prepared the ground for WTO accession.

  '
enacted_by:
- deng_xiaoping_reforms_1978
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Closure of small SOEs and entry of TVEs and private firms expanded competition across light industry.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Restructured industrial firms became platforms for export-led growth integrating into global supply chains.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Shareholding conversions and management-buyout sales clarified residual claims and disposable assets.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Soft-budget bank lending was partly hardened, but retained sectors continued receiving directed credit support.

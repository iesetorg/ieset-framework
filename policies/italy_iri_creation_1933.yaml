# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: italy_iri_creation_1933
status: candidate
title: Italy IRI creation 1933
countries: [ITA]
timeframe:
  start: 1933
  end: 1943
  enacted_date: "1933-01-23"
description: >
  Royal Decree-Law no. 5 of 23 January 1933 created the Istituto per la
  Ricostruzione Industriale (IRI) as a public-law body to reorganise the
  industrial and financial wreckage left by the banking crisis. What began
  as a rescue mechanism quickly became a durable state-holding structure,
  taking over major bank-owned industrial shareholdings and giving the
  regime a direct instrument for supervising and owning large parts of the
  economy. This was the decisive prehistory of the much larger postwar IRI
  system that survived the fall of fascism.
enacted_by:
  - italy_fascist_corporatist_state_1922_1943
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "IRI concentrated control over major firms and sectors inside a public holding structure under state direction."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "The rescue shifted distressed industry away from competitive private control toward coordinated public ownership."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Crisis-resolution and recapitalisation responsibilities moved onto public institutions and contingent state support."
references:
  - "Regio decreto-legge 23 gennaio 1933, n. 5"
  - "Treccani, IRI"

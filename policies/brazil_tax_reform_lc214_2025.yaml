status: candidate
title: Brazil Tax Reform Implementing Complementary Law 214 2025
countries:
- BRA
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-16'
description: 'Complementary Law 214/2025 implemented the first major statutory layer of Brazil''s EC 132 consumption-tax reform, defining the CBS, IBS, and Imposto Seletivo architecture, transition rules,
  exemptions, special regimes, and cashback mechanisms. The law operationalises the move from overlapping PIS/Cofins, IPI, ICMS, and ISS rules toward a dual value-added tax system with a long transition
  to 2033.

  '

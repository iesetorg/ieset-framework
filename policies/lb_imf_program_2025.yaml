policy_id: lb_imf_program_2025
status: candidate
title: Lebanon IMF-aligned macroeconomic reform programme (2025)
countries:
- LBN
timeframe:
  start: 2025
  end: ongoing
description: >
  IMF-aligned macroeconomic reform programme under the Aoun-Salam government
  after Lebanon's banking, currency, and fiscal collapse. The programme seeks a
  credible fiscal anchor, exchange-rate and monetary normalisation, banking-sector
  restructuring, anti-corruption commitments, electricity-sector reform, and donor
  conditionality sufficient to move from Article IV recommendations toward a
  funded arrangement.
enacted_by:
- lebanon_aoun_salam_reconstruction_2025_present
coalition_label_at_enactment: Aoun-Salam reformist technocratic cabinet
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: IMF-aligned budgeting limits recurrent spending in a collapsed-revenue environment while prioritising arrears and reconstruction.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Programme design requires credible monetary governance, reduced fiscal dominance, and a cleaned-up Banque du Liban balance sheet.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Anti-corruption and public-finance conditions are prerequisites for donor and IMF support.
linked_hypotheses:

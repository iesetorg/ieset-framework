- asia_sri_lanka_default_2022_imf_2023
- central_bank_independence_inflation_discipline
references:
- IMF Lebanon Article IV and staff statements, 2025
- Lebanese government ministerial declaration and economic reform programme, 2025
notes: Created to materialise a declared policy on lebanon_aoun_salam_reconstruction_2025_present.

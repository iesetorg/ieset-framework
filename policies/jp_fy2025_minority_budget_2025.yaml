description: 'FY2025 general-account budget passed by the Diet on 31 March 2025 — the first budget passed by an LDP minority coalition since 2009. The Ishiba government secured Shūgiin passage with Japan
  Innovation Party (Ishin) cooperation in exchange for a free-high-school-tuition expansion, and DPFP cooperation tied to the ''¥1.03m wall'' basic- deduction reform. Total general-account spending was
  around ¥115tn, including continued defence-envelope build-up under the 2022 plan, cost-of-living energy subsidies, regional-revitalisation funding, expanded tuition support, and social-security aging-driven
  increases. Primary deficit remained a recognised concern, but no explicit consolidation target was adopted. Passage demonstrated issue-by- issue legislative cooperation as the operating mode of the minority
  parliament.

  '

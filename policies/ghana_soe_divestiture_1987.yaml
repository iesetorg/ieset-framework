policy_id: ghana_soe_divestiture_1987
status: candidate
title: Ghana Soe Divestiture 1987
countries:
- GHA
timeframe:
  start: 1983
  end: 1991
description: 'Ghana''s State Enterprises Commission and Divestiture Implementation Committee, mandated under PNDC Law 326 in 1993 but operationally launched in 1987 within the ERP framework, began the divestiture
  of more than 200 state enterprises through outright sale, joint venture, lease, and liquidation. The programme rolled back the post-Nkrumah parastatal sector, stripped budget subsidies, and opened mining
  and manufacturing to private and foreign investors.

  '
enacted_by:
- ghana_erp_stabilisation_1983_1991
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised firms operated under tariff and FX rules consistent with reopened external trade.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Sale of monopolistic SOEs introduced private rivals across regulated sectors.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Divestiture removed loss-making SOEs from the budget and ended below-cost subsidy lines.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Smaller SOE financing demand reduced central-bank pressure to monetise government deficits.

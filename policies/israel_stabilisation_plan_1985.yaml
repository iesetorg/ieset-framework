policy_id: israel_stabilisation_plan_1985
status: candidate
title: Israel Stabilisation Plan 1985
countries:
- ISR
timeframe:
  start: 1984
  end: 1986
description: 'Adopted on 1 July 1985 by the Peres-Shamir national-unity government, the Emergency Stabilisation Plan combined a sharp fiscal consolidation, the new-shekel devaluation and peg, a temporary
  wage-price freeze agreed with Histadrut and the manufacturers'' association, and the Bank of Israel "no printing" amendment. Annual inflation fell from above 400% in mid-1985 to roughly 20% within a year
  and to single digits by the late 1990s, providing the textbook example of a heterodox stabilisation programme.

  '

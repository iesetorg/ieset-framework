policy_id: ir_bread_smartcard_subsidy_reform_2022
status: candidate
title: Iran bread/flour subsidy 'economic surgery' and smart-card quotas
countries:
- IRN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-05-09'
description: 'In May 2022 the Raisi government eliminated the preferential 42,000- rial/USD FX subsidy on imported wheat, cooking oil, medicines and other staples, replacing it with NIMA-market-rate imports
  and compensatory cash transfers. Industrial bakery flour prices rose ~500%, retail bread ~300-400%. A bread smart-card ("noon-kart") system rolled out from mid-2022 provided subsidised-price quotas per
  household, with above-quota purchases at market prices. Triggered short-lived protests in Khuzestan and other provinces May 2022. Headline inflation spiked to ~50% YoY peak 2022-2023.

  '
enacted_by:
- iran_raisi_conservative_2021_2024
coalition_label_at_enactment: Principlist-conservative cabinet
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Elimination of preferential FX subsidy for staples; ~500% industrial flour price rise.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Companion cash-transfer top-up and smart-card subsidised quotas.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Staples imports moved from preferential-rate rationing to NIMA-market pricing.

description: 'Mass movement of Pakistani lawyers and civil society mobilising for reinstatement of Chief Justice Iftikhar Muhammad Chaudhry and independence of judiciary. Triggered 9 March 2007 when Musharraf
  filed reference against Chaudhry (seeking dismissal for misconduct). 20 July 2007 Supreme Court reinstated Chaudhry. 3 November 2007 Chaudhry re-dismissed under PCO; Lawyers'' Movement revived. Peak mobilisation
  Long March to Islamabad March 2009 under PPP government of Zardari-Gilani — 16 March 2009 PM Gilani announced Chaudhry''s restoration. Established judicial independence as functioning Pakistani political
  norm; Chaudhry''s subsequent tenure 2009-2013 included suo motu activism on NRO strike-down, Memogate, Asghar Khan case.

  '

policy_id: dk_skattereform_2012
status: candidate
title: Skattereform 2012 — Danish tax reform raising employment deduction
countries:
- DNK
timeframe:
  start: 2012
  end: ongoing
  enacted_date: '2012-06-22'
description: 'The June 2012 tax reform raised the personal allowance and the beskæftigelsesfradrag (employment-income deduction), with phased implementation 2013-2022, offset partly by reduced growth of
  transfer indexation (reguleringsordning) and a series of smaller base-broadening measures including company-car and fringe-benefit adjustments. Objective: raise the after-tax return on work and lift structural
  employment within a revenue-neutral envelope. A Social- Democrat-led coalition delivering a centrist supply-side tax reform with parliamentary support from Venstre and Konservative.

  '
enacted_by:
- denmark_thorning_socdem_2011_2015
coalition_label_at_enactment: Socialdemokratiet + Radikale Venstre + SF, with Venstre and Konservative support
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Personal-allowance and employment-deduction rises; top-rate structure substantially unchanged; overall progressivity little moved.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Partial financing via reguleringsordning adjustment slows transfer growth.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher employment deduction improves participation incentives at the margin.
references:
- Aftale om skattereform (22. juni 2012)
- Lov nr. 921 af 18. september 2012

  rationale: Companion fiscal mix (flat PIT, special-sector taxes) reduced overall progressivity.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Companion 9% corporate rate (2017) directly reduced corporate taxation.
- axis: fiscal.transfer_expansion
  direction: +

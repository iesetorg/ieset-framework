policy_id: hu_mnb_unorthodox_funding_for_growth_2013_2020
status: candidate
title: Mnb Unorthodox Funding For Growth 2013 2020
countries:
- HUN
timeframe:
  start: 2010
  end: 2022
description: 'The Magyar Nemzeti Bank''s Funding for Growth Scheme (Növekedési Hitelprogram), launched in June 2013 by MNB Governor György Matolcsy under the central bank''s macro-prudential mandate, provided
  refinancing to banks at 0% conditional on lending to SMEs at capped 2.5% rates. Multiple phases through 2020 and a pandemic-era NHP Hajrá! variant deployed roughly HUF 4 trillion. Combined with self-financing
  programme (FX-debt conversion 2014-2015), the intended effect was to revive SME credit and reduce balance-sheet vulnerabilities.

  '
enacted_by:
- hungary_orban_2010_2022

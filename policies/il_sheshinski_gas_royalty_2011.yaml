policy_id: il_sheshinski_gas_royalty_2011
status: candidate
title: Sheshinski I natural-gas royalty framework
countries:
- ISR
timeframe:
  start: 2011
  enacted_date: '2011-03-30'
description: 'Sheshinski Committee (chaired by Eytan Sheshinski) reported 3 Jan 2011 and its recommendations were enacted 30 Mar 2011 raising the government share of offshore-gas rents from ~30% to ~52-62%
  via a progressive super-profits levy, following Tamar (2009) and Leviathan (2010) field discoveries. Applied retroactively to active fields.

  '

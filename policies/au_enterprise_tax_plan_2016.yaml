description: 'Enterprise Tax Plan introduced in the May 2016 budget proposed a ten- year glide path cutting the corporate tax rate to 25% for all companies. The Senate passed only the small-business component
  (turnover threshold raised from A$2m to A$10m, then to A$50m by 2018-19, with the rate falling to 25% by 2026-27). The Turnbull government abandoned the large-company component in August 2018 ahead of
  the leadership spill. Partial delivery of a stated market-liberal reform doctrine under Senate and party-room constraint.

  '

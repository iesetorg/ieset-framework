policy_id: ke_mpesa_scaling_regulation_2008_2013
status: candidate
title: M-Pesa scaling and CBK regulatory accommodation
countries:
- KEN
timeframe:
  start: 2008
  end: 2013
description: 'Central Bank of Kenya allowed Safaricom''s M-Pesa mobile-money service (launched Mar 2007) to scale outside banking-act perimeter via letter- of-no-objection framework, later formalised under
  National Payment System Act 2011 and subsidiary regulations 2014. Active customers reached ~17m by 2013; agent network ~65,000. Foundational to Kenya''s financial-inclusion trajectory.

  '
enacted_by:
- kenya_kibaki_grand_coalition_2008_2013
coalition_label_at_enactment: Grand Coalition
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: Non-bank payments provider permitted outside full banking licensing.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Entry of telco-issued mobile money pressured bank-sector pricing.
references:
- National Payment System Act 2011
- CBK FinAccess surveys 2009, 2013

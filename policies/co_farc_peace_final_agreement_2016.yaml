title: FARC Final Peace Agreement — Havana / Teatro Colón (Colombia)
countries:
- COL
timeframe:
  start: 2016
  end: ongoing
  enacted_date: '2016-11-24'
description: 'Final Agreement ending the 52-year armed conflict with the FARC-EP, signed 26 Sep 2016 in Cartagena, narrowly rejected by plebiscite 2 Oct 2016 (50.2% No vs 49.8% Yes on 37% turnout), renegotiated
  with opposition input, and re-signed at Teatro Colón 24 Nov 2016 then ratified by Congress. Six-point agreement: rural reform, political participation, end of conflict (DDR), illicit-drugs substitution,
  victims (creating the JEP transitional-justice system and the Comisión de la Verdad), and implementation mechanisms. Demobilised ~13,000 combatants; FARC converted to the Comunes political party. Implementation
  has been partial and contested through Duque and Petro administrations.

  '

policy_id: portugal_imf_standby_1977_1978
status: candidate
title: Portugal Imf Standby 1977 1978
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portugal''s first IMF Stand-By Arrangement of June 1977 (around SDR 50 million) and the subsequent larger arrangement of June 1978 (about SDR 57 million) supported a balance-of-payments stabilisation
  under the Soares and Mota Pinto governments. Conditionality required escudo devaluation, ceilings on credit growth, public-sector wage moderation, fuel-price increases, and a tighter import-deposit regime.
  The intended effect was to halt the post-1974 external crisis, rebuild reserves, and impose a market-oriented adjustment on the heterodox economic settlement of the revolutionary period.

  '
enacted_by:
- portugal_carnation_revolution_1974_1986
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Import-deposit and exchange-control measures tightened administrative control over external transactions.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme operated within the existing nationalisation regime that constrained private-sector property.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Devaluation favoured exports while import-deposit schemes restricted openness on the import side.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Credit ceilings and wage restraint pulled spending down while IMF financing accommodated a transition path.

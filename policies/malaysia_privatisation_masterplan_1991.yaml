policy_id: malaysia_privatisation_masterplan_1991
status: candidate
title: Malaysia Privatisation Masterplan 1991
countries:
- MYS
timeframe:
  start: 1981
  end: 2003
description: 'The Privatisation Masterplan (PMP), launched in 1991 under the Economic Planning Unit, formalised Malaysia''s programme to transfer state-owned enterprises and public utilities to private
  operators through outright sale, build-operate-transfer concessions, and management buyouts. It covered telecoms (Telekom Malaysia), power (Tenaga Nasional), highways, ports, and HICOM ventures, and was
  paired with Bumiputera equity carve-outs that allocated significant tranches to ethnic-Malay-controlled vehicles.

  '
enacted_by:
- malaysia_mahathir_bumiputera_development_1981_2003
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Concessions and Bumiputera equity carve-outs embedded ongoing transfers within privatisation deals.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Privatised utilities and infrastructure operated under licensed monopolies, mixing exposure to foreign capital with sheltered domestic markets.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Concession contracts and equity allocations preserved heavy state oversight of capital flows around privatised firms.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privatisation produced long-tenor exclusive licences in telecoms, power, water, and toll roads rather than open competition.

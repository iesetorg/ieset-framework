policy_id: ru_war_economy_normalization_2024
status: candidate
title: Russia 2025-2027 federal budget war-economy normalization
countries:
- RUS
timeframe:
  start: 2024
  end: 2027
  enacted_date: '2024-11-30'
description: Federal Law No. 419-FZ on the 2025 federal budget and the 2026-2027 planning period made the post-2022 war-spending regime a multi-year budget baseline rather than a one-year emergency. The
  budget raised national-defence appropriations to a record level for 2025, kept defence and security near two-fifths of federal spending, and paired those outlays with social and industrial payments tied
  to the military procurement chain. The package was enacted after Putin began his fifth presidential term and after Andrei Belousov replaced Sergei Shoigu at the Defence Ministry, aligning fiscal policy
  with a longer war-production horizon.
enacted_by:
- russia_putin_fifth_term_2024_present
coalition_label_at_enactment: United Russia / Putin fifth term
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: The federal budget locked in record defence and security outlays across the 2025-2027 budget window.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Defence-procurement, industrial-capacity, and import-substitution allocations expanded targeted state support to war-linked sectors.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The fiscal package financed a sanctions-adapted import-substitution and Asia-pivot production model rather than reintegration with G7 markets.

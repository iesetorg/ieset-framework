  direction: +
  magnitude: weak
  intended: true
  rationale: Relaxation of fiscal-surplus targets allowed modest deficit widening.
- axis: regulatory.financial_deregulation
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Capital-flow management proposals not implemented; formal capital-account openness preserved.

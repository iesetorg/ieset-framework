policy_id: id_imf_renegotiation_2000
status: candidate
title: Indonesia IMF programme renegotiation under Rizal Ramli (2000)
countries:
- IDN
timeframe:
  start: 2000
  end: 2001
  enacted_date: '2000-09-07'
description: 'Letter of Intent renegotiation under Coordinating Minister for Economy Rizal Ramli (appointed August 2000). Programme stretched IBRA asset-disposal timelines, softened divestiture conditionality,
  and relaxed fiscal-surplus targets. Rizal Ramli also floated capital-flow management proposals never implemented. IMF made loan tranche releases conditional on milestone progress in bank recapitalisation
  and SOE privatisation, producing frequent delays. Relations improved under Megawati''s technocratic Coordinating Minister Dorodjatun Kuntjoro-Jakti (July 2001+), and programme eventually concluded December
  2003.

  '

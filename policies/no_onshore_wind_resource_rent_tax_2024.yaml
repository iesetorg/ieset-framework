policy_id: no_onshore_wind_resource_rent_tax_2024
status: candidate
title: Onshore wind resource-rent tax (grunnrenteskatt landbasert vindkraft)
countries:
- NOR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2023-12-19'
description: 'Grunnrenteskatt on onshore wind power at 25% effective rate on economic rent above a production-volume allowance, stacked on top of the 22% ordinary corporate rate, mirroring the earlier salmon
  rent-tax design. Host municipalities continue to receive production-fee share. Rationale extends the resource-rent-capture principle (petroleum, hydropower, aquaculture) to windfall profits generated
  by Nord Pool price elevation on licensed wind generation. Retroactively applied from 2024 income year after parliamentary passage in December 2023.

  '
enacted_by:
- norway_store_ap_sp_2021_present
coalition_label_at_enactment: AP–Sp minority
axes_moved:
- axis: fiscal.tax_capital
  direction: +
  magnitude: moderate
  intended: true
  rationale: 25% special tax on rents of licensed onshore wind generation.
- axis: regulatory.environmental_stringency
  direction: '0'
  magnitude: weak
  rationale: Pure fiscal capture; generation licensing unchanged.
references:

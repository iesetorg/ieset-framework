policy_id: swz_energy_masterplan_2034_renewables_2018
status: candidate
title: Eswatini Energy Masterplan 2034 renewables framework
countries:
- SWZ
timeframe:
  start: 2018
  end: 2034
description: 'Eswatini adopted an Energy Masterplan to 2034 to guide electricity supply, generation investment, renewable-energy development, grid planning, and energy-security policy. The framework seeks
  to reduce import dependence, expand domestic generation, improve reliability, and create a clearer planning base for independent power and renewable-energy projects.

  '

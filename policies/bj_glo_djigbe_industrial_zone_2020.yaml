policy_id: bj_glo_djigbe_industrial_zone_2020
status: candidate
title: Benin Glo-Djigbe Industrial Zone buildout 2020
countries:
- BEN
timeframe:
  start: 2020
  end: ongoing
description: 'Benin developed the Glo-Djigbe Industrial Zone as a flagship PAG industrial project for agro-processing, textiles, logistics, and export-oriented manufacturing. The zone uses dedicated infrastructure,
  investor services, customs and tax facilitation, and public-private development arrangements to move cotton and agricultural value chains from raw exports toward domestic processing.

  '
enacted_by:
- benin_talon_pag_reform_state_2016_2026
scope: national
coalition_label_at_enactment: Talon reform coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Dedicated infrastructure, fiscal facilitation, and public-private support target selected export-processing sectors.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: The zone is designed around export processing and investor access to regional and global markets.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: One-stop investor services and industrial-zone infrastructure lower entry costs for formal manufacturers inside the zone.

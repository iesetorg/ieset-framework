policy_id: france_ordonnances_travail_2017
status: candidate
title: France Ordonnances Travail 2017
countries:
- FRA
timeframe:
  start: 2017
  end: 2019
description: 'Five executive ordonnances signed by President Macron in September 2017 (and ratified by Parliament in March 2018) overhauled the French Code du travail. Key measures merged employee representation
  bodies into the Comité social et économique, capped industrial-tribunal severance awards, allowed firm-level agreements to derogate from sector deals, and simplified collective dismissal procedures for
  multinationals. Macron framed the package as restoring labour-market flexibility and lowering hiring frictions.

  '

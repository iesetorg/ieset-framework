policy_id: id_rupiah_devaluation_kenaikan_1978
status: candidate
title: Rupiah KENAIKAN devaluation (Indonesia 1978)
countries:
- IDN
timeframe:
  start: 1978
  end: 1978
  enacted_date: '1978-11-15'
description: 'Bank Indonesia devalued the rupiah by 33.6% on 15 Nov 1978 (Rp415/USD to Rp625/USD), known as the KENAIKAN devaluation. Aimed to restore competitiveness of non-oil exports after oil-windfall-driven
  Dutch disease. Accompanied by price controls on essentials and subsidy support to cushion real-wage impact. Set a pattern of stepped devaluation repeated in Mar 1983 and Sep 1986.

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Export-competitiveness restoration; non-oil export push.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Consumption-protection price controls and essential-goods subsidies.
references:

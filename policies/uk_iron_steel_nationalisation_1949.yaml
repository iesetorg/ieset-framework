policy_id: uk_iron_steel_nationalisation_1949
status: candidate
title: Iron Steel Nationalisation 1949
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The Iron and Steel Act 1949 transferred shares in approximately 90 iron and steel companies to the newly created Iron and Steel Corporation of Great Britain, taking effect from 15 February
  1951. The Act was the most contested of Attlee''s nationalisations and was substantially reversed by the Conservative-led Iron and Steel Act 1953, which began returning the industry to private ownership.

  '

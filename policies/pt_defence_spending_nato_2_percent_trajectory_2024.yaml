policy_id: pt_defence_spending_nato_2_percent_trajectory_2024
status: candidate
title: Defence Spending Nato 2 Percent Trajectory 2024
countries:
- PRT
timeframe:
  start: 2024
  end: ongoing
description: 'Portugal''s accelerated NATO defence-spending trajectory, announced by the Montenegro AD government at the July 2024 NATO Washington Summit, committed Lisbon to reach the 2% of GDP defence-spending
  target by 2029 — earlier than the prior 2030 target — through annual increases in the Defence Ministry budget and acquisition of new air, maritime, and land platforms (F-35 selection, KC-390 fleet, frigates).
  The intended effect was to align Portugal with NATO''s burden-sharing pledge, modernise force structure, and signal Atlantic-alliance commitment amid the post-Ukraine European rearmament wave.

  '

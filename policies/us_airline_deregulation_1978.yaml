title: Airline Deregulation Act 1978
countries:
- USA
timeframe:
  start: 1978
  end: 1984
  enacted_date: '1978-10-24'
description: 'Signed by President Carter. Dismantled the Civil Aeronautics Board (CAB), abolished federal route allocation, and ended rate regulation for interstate commercial air travel. CAB wound down
  1978-1984 and dissolved 1985. Produced substantial fare reductions, service expansion to smaller cities via hub-and-spoke, low-cost carrier entry (Southwest scaling nationally, later JetBlue + AirTran),
  and industry-wide output growth. Cited as a canonical successful deregulation case (Morrison-Winston 1995 estimates $15bn annual consumer surplus gain 1990 dollars). Coalition-content case: Democratic
  administration implementing market-oriented reform following Ted Kennedy + Stephen Breyer Senate work.

  '

policy_id: tr_gezi_protest_crackdown_2013
status: candidate
title: Gezi Park protest crackdown (Turkey 2013)
countries:
- TUR
timeframe:
  start: 2013
  end: 2013
  enacted_date: '2013-06-15'
description: 'May-August 2013 protests that began as an environmental sit-in against redevelopment of Gezi Park in Istanbul''s Taksim Square escalated into nationwide anti-government demonstrations with
  ~3.5 million participants across 79 of 81 provinces. Government response: heavy police use of tear gas and water cannon, 11 deaths, thousands injured, internet restrictions, mass prosecutions including
  the later Gezi trial (2022 life sentences against Osman Kavala and others). Marks a rhetorical and operational shift from EU-convergence policing to securitised assembly management and sustained media
  pressure.

  '

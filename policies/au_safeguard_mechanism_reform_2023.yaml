title: Safeguard Mechanism reform — Australia 2023
countries:
- AUS
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-03-30'
description: 'Safeguard Mechanism (Crediting) Amendment Act 2023 reformed the 2016 Safeguard Mechanism by imposing declining emissions baselines on ~215 facilities emitting more than 100,000 tCO2e/year,
  requiring average 4.9% per-year reductions to 2030. Introduces Safeguard Mechanism Credits (SMCs) tradable among covered facilities and with Australian Carbon Credit Units (ACCUs). Operative 1 July 2023.

  '

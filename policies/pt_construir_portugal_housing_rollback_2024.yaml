policy_id: pt_construir_portugal_housing_rollback_2024
status: candidate
title: Construir Portugal Housing Rollback 2024
countries:
- PRT
timeframe:
  start: 2024
  end: ongoing
description: 'The Construir Portugal package of 2024, introduced by the Montenegro AD government under Decree-Law 10/2024 and follow-on measures, rolled back parts of the previous PS "Mais Habitacao" housing
  reform — restoring the Non-Habitual Resident tax regime in modified form, scrapping the additional IMI on local accommodation, easing rent-control bands, and lifting purchase restrictions on short-term
  rentals. The intended effect was to reactivate residential investment supply, restore international capital inflows into housing, and reverse what AD framed as anti-investment measures that had constrained
  construction starts.

  '
enacted_by:
- portugal_montenegro_ad_2024_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Restored NHR-style regime and lower IMI surcharges trimmed effective taxes on housing-linked corporates.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Tax breaks for investors lowered top-end effective rates while housing-specific reliefs aided some renters.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-housing programme top-ups and IFRRU-style refinancing increased committed housing spending.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter housing-linked golden-visa filters and revised NHR cut some immigration channels.

description: 'Botnia (Finnish, later UPM) constructed USD 1.2bn pulp mill in Fray Bentos on Río Uruguay; operational 9 Nov 2007. Argentina objected on trans-border pollution grounds, organised Gualeguaychú
  bridge blockade 2006-2010. Case went to ICJ, judgment 20 Apr 2010 found Uruguay failed procedural notice obligations under Statute of Río Uruguay but plant could operate. Anchor investment of Uruguayan
  forestry-export strategy + free-trade-zone tax regime.

  '

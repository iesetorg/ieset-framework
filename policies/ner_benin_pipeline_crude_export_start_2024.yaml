policy_id: ner_benin_pipeline_crude_export_start_2024
status: candidate
title: Niger-Benin crude export pipeline start 2024
countries:
- NER
timeframe:
  start: 2024
  end: ongoing
description: >
  Niger moved into large-scale crude-oil exporting through the Niger-Benin
  pipeline and related CNPC-backed upstream development in 2024. The export
  regime expanded petroleum production capacity, shifted Niger from a small
  domestic refinery-oriented oil producer toward export revenue dependence, and
  made pipeline security and cross-border logistics central to the state's
  fiscal strategy.
enacted_by:
- niger_cnsp_transition_sovereignty_2023_present
scope: national
coalition_label_at_enactment: CNSP military transition
axes_moved:
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  intended: true
  rationale: Pipeline export infrastructure increased domestic petroleum production capacity and strategic energy revenue options.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Oil-export revenues were expected to finance public spending and state security priorities.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: The pipeline created a new cross-border export channel through Benin despite wider regional-political tensions.
references:
- Niger and CNPC materials on the Niger-Benin pipeline and Agadem oil development.
- IMF and World Bank Niger reporting on oil exports, revenue projections, and macroeconomic risks, 2024-2025.
- Reuters reporting on the 2024 start of crude exports through the Niger-Benin pipeline.
notes: >
  The pipeline also exposed Niger to cross-border disruption with Benin; the
  axis coding captures the formal export-capacity policy, not uninterrupted
  realized flows.

description: 'The Economic Recovery Tax Act (ERTA, Public Law 97-34) cut the top marginal individual income tax rate from 70% to 50% over three years in 25% staged reductions, introduced bracket indexation
  beginning 1985 to end bracket-creep, and enacted the Accelerated Cost Recovery System (ACRS) that compressed depreciation schedules for business capital. The marquee Reagan supply-side tax cut.


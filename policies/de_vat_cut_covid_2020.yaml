policy_id: de_vat_cut_covid_2020
status: candidate
title: Germany temporary VAT cut COVID (19%→16%, reduced 7%→5%)
countries:
- DEU
timeframe:
  start: 2020
  end: 2020
  enacted_date: '2020-07-01'
description: 'Temporary reduction of the standard German VAT rate from 19% to 16% and reduced rate from 7% to 5% from 1 July to 31 December 2020 as part of the €130bn Konjunkturprogramm. Revenue cost ~€20bn.
  Empirical studies found pass-through incomplete for standard-rate goods but significant in durables; car-sector pull-forward effects visible in Q3-Q4 2020 sales.

  '
enacted_by:
- germany_merkel_iv_2017_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: ~€20bn revenue cost; demand support.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: VAT cut modestly progressive given regressive incidence.
references:
- Zweites Corona-Steuerhilfegesetz (Jun 2020)

title: Uruguay abortion decriminalisation — Ley 18.987
countries:
- URY
timeframe:
  start: 2012
  end: ongoing
  enacted_date: '2012-10-22'
description: 'Ley 18.987 (22 Oct 2012) decriminalised first-trimester abortion with five-day reflection period + mandatory counselling; later-term permitted for health or rape. Uruguay first LatAm country
  (excl Cuba) to broadly decriminalise. Abortion included in FONASA-SNIS coverage. Rate stabilised ~10/1000 women 15-44; no measured mortality increase. Preserved conscientious-objection options for providers.

  '

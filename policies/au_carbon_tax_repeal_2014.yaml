description: 'The Clean Energy Act 2011 (in force 1 July 2012) imposed a fixed carbon price of AUD 23/tCO2e on ~500 largest emitters, rising 2.5% real annually, with transition to an emissions-trading scheme
  scheduled for 2015 and a link to the EU ETS planned. Enactment depended on a Labor–Greens–Independents minority agreement after the 2010 election, despite Gillard''s 2010 campaign pledge against a carbon
  tax. The Abbott Coalition campaigned on repeal, won the 2013 election, and passed the Clean Energy Legislation (Carbon Tax Repeal) Act 2014 on 17 July 2014, replacing carbon pricing with the Emissions
  Reduction Fund (reverse-auction subsidy). The Safeguard Mechanism (2016, reformed by Albanese 2023) later re-introduced a baseline- and-credit scheme for large facilities. The framework codes the full
  enactment-and-repeal episode as one movement: the environmental- stringency axis moved + then − within three years, a rare revealed- preference reversal of a price-based climate instrument in a developed
  economy.'

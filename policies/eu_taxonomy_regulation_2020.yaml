timeframe:
  start: 2021
  end: ongoing
description: 'Regulation (EU) 2020/852 — the EU Taxonomy Regulation — establishes a classification system for environmentally sustainable economic activities, requiring disclosure by financial market participants
  and large companies of the share of activities aligned with six environmental objectives subject to technical screening criteria, "do-no-significant-harm" tests, and minimum social safeguards. Delegated
  acts cover climate, water, circular economy, pollution, and biodiversity criteria.

  '

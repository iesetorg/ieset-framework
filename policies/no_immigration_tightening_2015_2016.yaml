policy_id: no_immigration_tightening_2015_2016
status: candidate
title: Asylum and integration tightening package (Integrerings­forliket)
countries:
- NOR
timeframe:
  start: 2015
  end: 2016
  enacted_date: '2015-11-19'
description: 'Cross-party Storting settlement and executive instructions tightening asylum processing following the 2015 European refugee peak, including (i) introduction of temporary residence for unaccompanied
  minors, (ii) stricter family-reunification income thresholds and four-year employment/education requirement, (iii) raised language and civics requirements for permanent residence and citizenship, (iv)
  faster return procedures, and (v) tightened asylum-review guidance via justice ministry instruction GI-03/2016. Integration-forliket and subsequent 2016 white paper (Meld. St. 30, 2015-2016) operationalised
  the framework.

  '

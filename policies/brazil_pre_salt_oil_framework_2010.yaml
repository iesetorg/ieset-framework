policy_id: brazil_pre_salt_oil_framework_2010
status: candidate
title: Brazil Pre Salt Oil Framework 2010
countries:
- BRA
timeframe:
  start: 2003
  end: 2010
description: 'Lei 12351/2010 created Brazil''s "production-sharing" regime for pre-salt offshore oil reserves, replacing the prior concession model for fields in the strategic polygon. Petrobras was designated
  mandatory operator with a minimum 30% equity stake, Pre-Sal Petroleo SA (PPSA) was created to represent the federal government, and a Social Fund was established to capture royalty and profit-oil revenues
  for education, health, and innovation. Companion law 12734/2012 redistributed royalties toward non-producing states.

  '

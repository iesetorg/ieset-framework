description: 'Finance Minister Ruth Richardson''s 30 July 1991 budget cut core benefit rates 10-25% (unemployment, sickness, DPB, invalid''s benefit), abolished the universal family benefit, extended the
  benefit stand-down period, introduced market rents for state housing (phased 1993-1995), and tied housing assistance to a targeted Accommodation Supplement. A watershed rollback of the post-war Beveridge-style
  New Zealand welfare state.

  '

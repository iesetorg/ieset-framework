description: 'Four-question constitutional referendum called by President Martín Vizcarra in response to the Lava Jato / CNM audio scandals. Peruvians approved three of four questions: (1) replaced the
  Consejo Nacional de la Magistratura (CNM) with the Junta Nacional de Justicia (JNJ) via merit-based appointment to reform judicial and prosecutorial nominations; (2) regulated private campaign finance
  of political parties; (3) prohibited immediate re-election of members of Congress; and rejected (4) a bicameral-legislature restoration. The reform package was intended to rebuild institutional credibility
  after systemic corruption exposures. Coded as positive on institutional.rule_of_law and institutional.judicial_independence; macro-fiscal and regulatory axes untouched.

  '

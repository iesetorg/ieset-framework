status: candidate
title: CICE — Crédit d'impôt pour la compétitivité et l'emploi
countries:
- FRA
timeframe:
  start: 2013
  end: 2018
  enacted_date: '2012-12-29'
description: 'Corporate tax credit equal to 4% (2013) rising to 6-7% of the wage bill below 2.5 SMIC, intended to lower employer labour costs and restore French competitiveness after the 2011-2012 Eurozone
  crisis. Annual cost ~€20bn. Converted into a permanent reduction in employer social contributions in 2019 under the Macron presidency. Recommended by the 2012 Gallois report on French competitiveness.

  '

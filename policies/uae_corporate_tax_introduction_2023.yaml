policy_id: uae_corporate_tax_introduction_2023
status: candidate
title: Corporate Tax Introduction 2023
countries:
- ARE
timeframe:
  start: 1971
  end: ongoing
description: 'Federal Decree-Law No. 47 of 2022 introduced the UAE''s first federal corporate income tax, effective for financial years starting on or after 1 June 2023, with a headline 9% rate on profits
  above AED 375,000 and 0% below. The reform aligned the UAE with the OECD/G20 BEPS Pillar Two minimum-tax framework while preserving qualifying free-zone exemptions to retain FDI competitiveness.

  '

policy_id: zw_zig_currency_launch_2024
status: candidate
title: Zimbabwe ZiG currency launch 2024
countries:
- ZWE
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-04-05'
description: 'The Reserve Bank of Zimbabwe launched Zimbabwe Gold, or ZiG, in April 2024 as a new domestic currency backed by official gold and foreign-exchange reserves. The measure converted Zimbabwe-dollar
  balances into ZiG, introduced new notes and coins, and replaced the ZWL as the unit for local-currency pricing and settlement. It was presented as a credibility reset after renewed ZWL inflation and exchange-rate
  collapse.

  '
enacted_by:
- zimbabwe_mnangagwa_zanu_pf_2017_present
scope: national
coalition_label_at_enactment: ZANU-PF Mnangagwa government
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The reserve-backed design was intended to tighten local-money issuance relative to the collapsing ZWL regime.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Another discretionary currency conversion by the RBZ reinforced fiscal-dominance concerns despite the stated backing rule.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Forced conversion of existing ZWL balances changed private monetary claims by administrative order.
references:
- Reserve Bank of Zimbabwe, 2024 Monetary Policy Statement launching Zimbabwe Gold, 5 April 2024.
- Zimbabwe Statutory Instrument and exchange-control materials implementing ZiG conversion and settlement rules, April 2024.
- IMF and World Bank Zimbabwe macroeconomic monitoring on the 2024 ZiG launch and exchange-rate regime.

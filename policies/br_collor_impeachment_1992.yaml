description: 'Following Veja magazine''s May 1992 exposure of the PC Farias influence-peddling scheme benefiting President Collor, Congress opened a parliamentary inquiry (CPI). Chamber of Deputies voted
  441-38 on 29 September 1992 to authorise impeachment trial. Collor resigned 29 December 1992 minutes before the Senate vote; Senate nonetheless voted 76-3 to remove him and disqualified him from holding
  office for 8 years. VP Itamar Franco assumed the presidency.


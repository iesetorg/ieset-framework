description: 'Water Act 1989 privatised ten regional water and sewerage companies in England and Wales via IPO raising approximately £5.2bn. Created Office of Water Services (Ofwat) as independent economic
  regulator with RPI-X price-cap formula. National Rivers Authority took over environmental regulation. Scotland and Northern Ireland retained public ownership.

  '

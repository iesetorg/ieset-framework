policy_id: kr_commercial_bank_denationalisation_1981
status: candidate
title: Commercial bank denationalisation (South Korea 1981)
countries:
- KOR
timeframe:
  start: 1981
  end: 1983
description: 'Divestiture of government-held stakes in the five major commercial banks (Hanil Bank 1981, Korea First Bank 1982, Cho Hung Bank 1982, Bank of Seoul 1982, Commercial Bank of Korea 1983). Shareholding
  caps limited chaebol ownership to 8% per group, with ownership broadly dispersed. Ended the direct state-bank-credit allocation of the Park era; preceded partial interest-rate liberalisation. Re-nationalised
  after 1997-1998 Asian crisis.

  '
enacted_by:
- skorea_chun_doo_hwan_military_1980_1988
coalition_label_at_enactment: Democratic Justice Party (Chun)
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: State-held commercial bank stakes divested; ownership dispersed.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Transfer of state ownership to private shareholders under dispersion rules.
references:
- 'Cho (1989), ''Finance and Development: The Korean Approach'', Oxford Review of Economic Policy'

policy_id: vn_x2_campaign_socialist_transformation_south_1978
status: candidate
title: X-2 campaign and socialist transformation of South Vietnam (1978)
countries:
- VNM
timeframe:
  start: 1978
  end: 1979
  enacted_date: '1978-03-23'
description: 'Campaign launched 23 Mar 1978 nationalising >30,000 private businesses in the South — industry, commerce and private banking — and confiscating the assets of the hoa kieu (ethnic-Chinese merchant)
  community. Currency reform May 1978 unified the North-South dong at a confiscatory conversion ratio. Directly triggered the boat-people exodus: ~250,000 ethnic Chinese left by land/sea through 1979; total
  1.6M refugees through 1980s. Collapsed Southern commercial networks and rice marketing.

  '

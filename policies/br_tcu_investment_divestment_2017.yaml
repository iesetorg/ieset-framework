title: TLP BNDES benchmark rate reform — Lei 13.483/2017
countries:
- BRA
timeframe:
  start: 2017
  enacted_date: '2017-09-21'
description: 'Lei 13.483/2017 replaced the administratively-set TJLP (Taxa de Juros de Longo Prazo) with the TLP (Taxa de Longo Prazo), a market-linked benchmark indexed to 5-year NTN-B real yields plus
  inflation. The change raised BNDES cost-of-funds toward market levels over a five-year phase-in, shrinking the implicit Treasury subsidy to directed credit and reducing the fiscal cost of BNDES operations.
  Part of the Meirelles fiscal-rationalisation agenda.

  '

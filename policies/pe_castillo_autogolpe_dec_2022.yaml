description: 'Hours before a scheduled third impeachment vote, President Pedro Castillo delivered a televised address ordering the dissolution of Congress, establishment of an "exceptional government of
  national emergency," reorganisation of the judiciary and Fiscalía de la Nación, and imposition of a nationwide curfew. Security forces refused to comply, the cabinet resigned en masse, the Fiscalía opened
  a rebellion investigation, and Congress voted 101-6 to remove Castillo under Article 113''s "permanent moral incapacity" clause the same afternoon. Castillo was detained while attempting to reach the
  Mexican embassy and placed in pre-trial detention. Vice-President Dina Boluarte was sworn in. Coded strongly negative on institutional.rule_of_law and institutional.judicial_independence as an extra-constitutional
  attempt to override separation of powers.

  '

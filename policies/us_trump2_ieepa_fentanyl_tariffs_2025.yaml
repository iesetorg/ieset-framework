policy_id: us_trump2_ieepa_fentanyl_tariffs_2025
status: candidate
title: Trump second-term IEEPA fentanyl and border tariffs 2025
countries:
- USA
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-02-01'
description: 'Executive orders issued on 1 February 2025 invoked the International Emergency Economic Powers Act to impose additional duties on imports from Canada, Mexico, and China, framed as a national-emergency
  response to fentanyl trafficking and unlawful migration. The initial orders directed broad ad valorem duties outside ordinary Section 232 and Section 301 trade channels, with later presidential actions
  amending rates, covered goods, and effective dates. This spec captures the 2025 IEEPA tariff instrument rather than later product-specific tariff layers.

  '

description: 'Early in the second Trump administration, executive orders invoked the International Emergency Economic Powers Act (IEEPA) to impose tariffs on imports from Canada, Mexico, and China, framed
  as a national-emergency response to fentanyl trafficking and illegal migration flows. The orders applied broad ad valorem duties beyond the scope of standard Section 232/301 trade authorities, and triggered
  legal challenges over IEEPA''s permissible use as a tariff instrument.

  '

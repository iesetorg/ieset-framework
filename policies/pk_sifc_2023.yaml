policy_id: pk_sifc_2023
status: candidate
title: Special Investment Facilitation Council (SIFC) (2023)
countries:
- PAK
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-06-20'
description: 'Civil-military apex body operationalised 20 June 2023 under the first Shehbaz premiership and continued under the caretaker and second Shehbaz governments. Chaired by the Prime Minister with
  COAS as co-chair; composed of federal ministers, provincial chief ministers, and military leadership. Mandate: single-window FDI facilitation prioritising agriculture, minerals (Reko Diq copper- gold),
  IT and IT-enabled services, energy, and defence-industrial cooperation. Pipeline primarily from GCC (Saudi Arabia, UAE, Qatar, Kuwait), PRC follow-on, and selective Western interest. Institutionally novel
  as an explicit civil-military economic-policy coordinating body; criticised as concentrating investment-policy decisions outside normal cabinet and parliamentary channels.

  '

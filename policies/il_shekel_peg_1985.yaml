title: New Israeli Shekel USD peg July 1985
countries:
- ISR
timeframe:
  start: 1985
  enacted_date: '1985-07-01'
description: 'As part of the July 1985 Economic Stabilization Plan, the new Israeli shekel was fixed at NIS 1.50/USD (later 1.80 band) as the nominal anchor. The hard peg, combined with Bank of Israel''s
  new statutory bar on monetary financing of deficits, broke inflation expectations. Peg remained tight until the 1991 shift toward managed crawl and 2003-4 inflation-targeting float.

  '

policy_id: id_political_parties_law_1999
status: candidate
title: Indonesia political-parties and election laws package (1999)
countries:
- IDN
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-02-01'
description: 'Package of three laws enacted 1 February 1999: Law 2/1999 on Political Parties (ended New Order''s three-party monopoly on PPP-Golkar-PDI, allowed party formation by any 50-founder group meeting
  provincial-branch thresholds), Law 3/1999 on General Elections (party-list proportional representation with district allocation, 500-member DPR), Law 4/1999 on the Composition and Standing of DPR/MPR
  (replaced appointed military-functional blocks). Enabled first free election in 40 years on 7 June 1999 — 48 parties competed, PDI-P won 33.7%, Golkar 22.4%, PKB 12.6%, PPP 10.7%, PAN 7.1%.

  '
enacted_by:
- indonesia_habibie_transition_1998_1999
coalition_label_at_enactment: Golkar successor / Habibie transition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Ended three-party monopoly; first free multi-party election since 1955.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Election Commission framework moved toward independence (full independence under later UU Pemilu 2003).
references:

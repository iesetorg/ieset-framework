policy_id: dk_dagpenge_duration_cut_2010
status: candidate
title: Dagpenge unemployment-benefit duration halved 2010
countries:
- DNK
timeframe:
  start: 2010
  end: 2013
  enacted_date: '2010-06-08'
description: 'Unemployment insurance (dagpenge) maximum benefit duration cut from 4 years to 2 years, qualifying employment-record requirement doubled from 6 to 12 months. Legislated June 2010, phased in
  from 2013. The signature tightening of the Danish "flexicurity" transfer arm during the GFC consolidation. Created a large cohort losing entitlement in 2013 (udfaldsramte), politically costly for the
  outgoing centre-right.

  '

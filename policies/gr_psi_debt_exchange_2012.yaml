policy_id: gr_psi_debt_exchange_2012
status: candidate
title: Greece Private Sector Involvement (PSI) debt exchange 2012
countries:
- GRC
timeframe:
  start: 2012
  enacted_date: '2012-03-09'
description: 'Private-sector involvement debt exchange completed March-April 2012 — at the time the largest sovereign debt restructuring in history. Eligible bonds c.€206bn (Greek-law and foreign-law) exchanged
  for a package of 20 new bonds with staggered maturities 2023-2042, EFSF short-dated notes, GDP-linked warrants, and Payment Notes. Nominal haircut 53.5%; NPV haircut c.75%. Greek-law holders bound by
  retroactive collective-action clauses (Law 4050/2012, 23 February 2012); foreign-law holders exchanged at c.97% take-up over subsequent months. Public-sector official holdings (ECB SMP, ANFA-held national-central-bank
  holdings) were excluded from the haircut — a decision that became permanently contentious. PSI reduced debt-to-GDP by c.€100bn in principal but the concurrent economic contraction left the ratio higher
  at end- 2012 than pre-exchange. Executed formally under the Papademos caretaker government (November 2011-May 2012) but its implementation (creditor litigation, post-exchange follow-through) fell to the
  Samaras coalition and is coded here as Samaras-era policy continuation.

  '
enacted_by:
- greece_samaras_nd_pasok_2012_2015
coalition_label_at_enactment: ND + PASOK + DIMAR (post-implementation); Papademos caretaker at signature

policy_id: cz_super_gross_wage_abolition_2021
status: candidate
title: Czech super-gross-wage abolition 2021
countries:
- CZE
timeframe:
  start: 2021
  enacted_date: '2021-01-01'
description: 'Super-gross-wage concept (15% PIT on wage + employer social-security base) abolished from 1 Jan 2021; replaced with 15% on gross wage with a 23% top bracket above four times average wage.
  Effective PIT for most wage earners fell from ~20.1% combined rate to 15%. Revenue loss estimated CZK 80-100bn/year.

  '
enacted_by:
- czech_republic_babis_ano_first_2017_2021
coalition_label_at_enactment: ANO-CSSD

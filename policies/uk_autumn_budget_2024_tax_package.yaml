policy_id: uk_autumn_budget_2024_tax_package
status: candidate
title: UK Autumn Budget 2024 — tax-raising package
countries:
- GBR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-10-30'
description: 'Chancellor Rachel Reeves''s first Budget, 30 October 2024, the largest tax-raising Budget since 1993 at ~£40bn/year. Employer Class 1 NI rate raised from 13.8% to 15% and secondary threshold
  lowered from £9,100 to £5,000 (from April 2025), ~£25bn/year. Capital gains main rates raised to 18%/24% (aligned with property rates) from 30 October 2024. Inheritance tax extended to unspent pension
  pots (from April 2027) and agricultural / business property relief capped at £1m (from April 2026). Stamp duty surcharge on additional properties raised to 5%. Non-dom regime abolished, replaced by residence-based
  regime. VAT added to private school fees (January 2025). Revised fiscal rule targeted Public Sector Net Financial Liabilities rather than PSND, raising borrowing headroom for investment by ~£50bn.

  '

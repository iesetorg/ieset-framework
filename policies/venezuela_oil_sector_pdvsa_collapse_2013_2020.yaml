title: Venezuela Oil Sector Pdvsa Collapse 2013 2020
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'Venezuela''s crude oil production collapsed from approximately 2.5 million b/d in 2013 to under 500,000 b/d by 2020 as PDVSA underinvested in upstream maintenance, lost technical staff, was
  used as an off-budget treasury, and was hit by US oil-sector sanctions from 2017. Joint-venture partners exited and infrastructure decay compounded under chronic FX shortages. The collapse reflected combined
  effects of politicisation, sanctions, and chronic capex starvation.

  '

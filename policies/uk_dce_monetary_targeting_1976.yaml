  direction: '-'
  magnitude: weak
  intended: true
  rationale: DCE ceilings constrained PSBR financing, forcing public-spending cuts in 1976–77.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Quarterly Sterling M3 and DCE targets disciplined money-supply growth toward stated ranges.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Targets were Treasury-set as IMF performance criteria; Bank operational autonomy unchanged.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: DCE targeting was monetary in nature; labour-market regulation outside its direct scope.

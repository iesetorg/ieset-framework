policy_id: uk_dce_monetary_targeting_1976
status: candidate
title: Dce Monetary Targeting 1976
countries:
- GBR
timeframe:
  start: 1976
  end: 1979
description: 'Adoption of explicit Domestic Credit Expansion (DCE) ceilings under the 1976 IMF Letter of Intent signed by Chancellor Denis Healey, complemented by published Sterling M3 monetary targets.
  The framework imposed quarterly DCE limits as IMF Stand-By Arrangement performance criteria, signalling a decisive shift away from accommodative monetary policy and laying conceptual groundwork for the
  later Medium Term Financial Strategy.

  '
enacted_by:
- uk_callaghan_imf_1976
axes_moved:

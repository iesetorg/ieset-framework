  direction: +
  magnitude: weak
  intended: true
  rationale: Compensation scheme and Lessons Learned Review partially corrected wrongful removals.
- axis: regulatory.immigration_openness
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Specific Windrush-cohort documentation regularised; broader hostile-environment architecture retained.

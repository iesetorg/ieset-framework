policy_id: uk_windrush_scandal_response_2018
status: candidate
title: UK Windrush scandal response and Lessons Learned Review
countries:
- GBR
timeframe:
  start: 2018
  end: 2020
  enacted_date: '2018-04-16'
description: 'Political and policy fallout from the exposure (from late 2017 Guardian reporting) that members of the Windrush generation — Commonwealth citizens who arrived in the UK from the Caribbean
  1948-1973 with legal right to remain — were being wrongly detained, denied services, and deported under the ''hostile environment'' immigration regime established from 2012. Home Secretary Amber Rudd
  resigned 29 April 2018 after misleading Parliament on removal targets; Sajid Javid appointed; Windrush Compensation Scheme launched April 2019 (~£360m envelope, poor take-up); Wendy Williams Lessons Learned
  Review published March 2020 identifying institutional failures in the Home Office.

  '
enacted_by:
- uk_may_conservative_2016_2019
coalition_label_at_enactment: Conservative

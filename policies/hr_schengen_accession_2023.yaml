policy_id: hr_schengen_accession_2023
status: candidate
title: Croatia Schengen accession 2023
countries:
- HRV
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-01-01'
description: 'Council Decision (EU) 2022/2451 applied the Schengen acquis in full to Croatia, lifting checks on persons at internal land and sea borders from 1 January 2023 and at internal air borders from
  26 March 2023. The policy integrated Croatia into the EU border-free travel area while leaving external Schengen border obligations in place.

  '
enacted_by:
- croatia_plenkovic_hdz_eu_integration_2016_present
coalition_label_at_enactment: Plenkovic HDZ-led government with Council of the EU approval
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Internal border checks on persons with Schengen states were lifted for land, sea, and air borders.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing internal border checks reduced travel and transport frictions with Schengen partners.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Full application followed Schengen evaluation of border, police, visa, return, data-protection, and judicial-cooperation conditions.
references:
- 'Council Decision (EU) 2022/2451 on full application of the Schengen acquis in Croatia: https://eur-lex.europa.eu/eli/dec/2022/2451/oj'

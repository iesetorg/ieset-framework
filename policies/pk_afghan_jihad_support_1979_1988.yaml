description: 'Pakistan hosting of >3M Afghan refugees and ISI channelling of US and Saudi assistance (USD2bn Reagan-era covert programme doubled by Saudi matching) to seven mujahideen parties based in Peshawar,
  following Soviet invasion of Afghanistan 27 Dec 1979. Unlocked USD3.2bn US economic/military aid package (1981), debt-rescheduling flexibility, and IMF programme accommodation. Ended with Geneva Accords
  14 Apr 1988 and Soviet withdrawal completed 15 Feb 1989.

  '

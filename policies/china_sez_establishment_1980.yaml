policy_id: china_sez_establishment_1980
status: candidate
title: China Sez Establishment 1980
countries:
- CHN
timeframe:
  start: 1978
  end: 2012
description: 'Establishment of Special Economic Zones (Shenzhen, Zhuhai, Shantou, Xiamen) under the 1980 NPC Standing Committee resolution, creating geographically delimited zones with preferential tax
  treatment, relaxed FDI rules, simplified customs procedures, and experimental land-use regimes. Acted as gradualist test-beds for market-oriented reform under the Deng Xiaoping government.

  '
enacted_by:
- deng_xiaoping_reforms_1978
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: SEZs allowed market-priced goods, foreign-invested firms, and labour mobility outside the plan.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Bonded-zone customs treatment and export-processing rules dramatically lowered cross-border trade frictions.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Land-use leasing and joint-venture statutes gave foreign investors enforceable property claims within zones.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced enterprise income tax rates and customs exemptions functioned as locational subsidies for FDI.

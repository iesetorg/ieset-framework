policy_id: ph_retail_trade_liberalization_act_2000
status: candidate
title: Philippines Retail Trade Liberalization Act 2000 (RA 8762)
countries:
- PHL
timeframe:
  start: 2000
  end: 2000
  enacted_date: '2000-03-07'
description: 'Republic Act 8762 (Retail Trade Liberalization Act) signed 7 March 2000, replaced 1954 Retail Trade Nationalization Act which had reserved retail to Filipinos. Permitted foreign entities to
  engage in retail trade above minimum paid-up capital thresholds (Category A reserved for Filipinos below $2.5m; Categories B, C, D opened at progressively higher thresholds; later revised 2022 to lower
  thresholds). Required reciprocity clause for Category B-D. Enabled Wal-Mart (entered via Vismart), Shoemart expansion, subsequent foreign supermarket entry. Framework refined 2022 under RA 11595.

  '
enacted_by:
- philippines_estrada_lammp_1998_2001
coalition_label_at_enactment: LAMMP coalition

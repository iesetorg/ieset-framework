policy_id: spain_solidarity_wealth_tax_2023
status: candidate
title: Spain Solidarity Wealth Tax 2023
countries:
- ESP
timeframe:
  start: 2018
  end: ongoing
description: 'Spain''s Temporary Solidarity Tax on Large Fortunes, enacted by Law 38/2022 effective for tax years 2022 and 2023 by the Sanchez PSOE-Sumar coalition, levies a federal wealth tax of 1.7% on
  net worth EUR 3-5.34 million, 2.1% from EUR 5.34-10.7 million, and 3.5% above EUR 10.7 million, with a credit for amounts paid under the regional Impuesto sobre el Patrimonio. The intended effect was
  to neutralise the Madrid region''s de facto wealth-tax exemption, raise revenue for cost-of-living packages, and demonstrate progressive-tax commitment within the EU "fair share" debate post-2022 energy
  shock.

  '

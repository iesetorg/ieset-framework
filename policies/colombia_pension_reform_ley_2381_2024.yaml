policy_id: colombia_pension_reform_ley_2381_2024
status: candidate
title: Colombia Pension Reform Ley 2381 2024
countries:
- COL
timeframe:
  start: 2022
  end: ongoing
description: 'Ley 2381 of 2024 enacted by the Petro government, restructuring Colombia''s pension system into four pillars: a non-contributory solidarity pillar, a semi-contributory pillar, a public pay-as-you-go
  pillar (Colpensiones) channelling contributions on the first 2.3 minimum monthly wages, and a complementary individual-savings pillar above that threshold. Aimed to expand coverage and reduce the role
  of private AFPs in the contributory regime.

  '
enacted_by:
- colombia_petro_2022_present
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Solidarity pillar transfers flow to lowest-income elderly, raising the redistributive incidence of pensions.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Channelling first-tranche contributions to public pillar raises long-term explicit fiscal liabilities.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Non-contributory and semi-contributory pillars represent direct expansions of old-age transfer programmes.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Public-pillar dominance reduces formal-sector employer flexibility in choosing pension provider.

- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: IMF conditions required scaling back of selective import licensing and dismantling of certain monopolies.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme implementation occurred within a martial-law regime with weak constitutional accountability.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Devaluation, deposit haircuts, and emergency capital controls weakened predictability of property claims.

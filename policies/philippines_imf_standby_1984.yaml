policy_id: philippines_imf_standby_1984
status: candidate
title: Philippines Imf Standby 1984
countries:
- PHL
timeframe:
  start: 1965
  end: 1986
description: 'IMF Stand-By Arrangement agreed with the Marcos government in late 1984 amid the Philippines'' debt moratorium and balance-of-payments crisis after capital flight following the Aquino assassination.
  The programme imposed sharp fiscal consolidation, peso devaluation and tight monetary policy, and required structural conditions on banking and trade. The macroeconomic shock contributed to a deep 1984–1985
  recession and helped erode the Marcos regime''s economic legitimacy.

  '
enacted_by:
- philippines_marcos_authoritarian_economy_1965_1986

policy_id: italy_iri_state_holding_expansion_1945_1992
status: candidate
title: Italy Iri State Holding Expansion 1945 1992
countries:
- ITA
timeframe:
  start: 1945
  end: 1992
description: 'Originally a 1933 banking-rescue vehicle, the Istituto per la Ricostruzione Industriale (IRI) was retained postwar as a state holding company that grew to control a vast conglomerate spanning
  steel (Finsider/Italsider), shipbuilding (Fincantieri), telecoms (STET/SIP), broadcasting (RAI), banking, motorway concessions and Alitalia. By the 1980s IRI directly employed roughly half a million workers
  and was a central instrument of Christian-Democrat industrial policy and patronage, before its dismantling and privatisation began in 1992.

  '

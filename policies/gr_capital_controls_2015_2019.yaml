policy_id: gr_capital_controls_2015_2019
status: candidate
title: Greece capital controls and bank closure 2015-2019
countries:
- GRC
timeframe:
  start: 2015
  end: 2019
  enacted_date: '2015-06-28'
description: 'Capital-controls regime introduced by Legislative Act of 28 June 2015 following the ECB Governing Council''s decision not to raise the Emergency Liquidity Assistance (ELA) ceiling after PM
  Tsipras called the 5 July referendum. Bank holiday until 20 July 2015 for domestic transactions; ATM withdrawal limit €60 per card per day (later raised to cumulative weekly then monthly limits); cross-border
  transfers to non-residents blocked except for narrow purposes (imports, essentials) via a bank committee review process. Bank deposit flight had been running €1bn per week through June 2015; the controls
  stopped the outflow. The regime was gradually loosened in phases from July 2015 through to full abolition by Law 4624/2019 (1 September 2019) under the outgoing Tsipras government and new Mitsotakis government,
  the last eurozone member to remove capital controls after the 2010s. Bank recapitalisation of the four systemic banks completed December 2015 via HFSF (€13.9bn) with private-sector partial bail-in on
  subordinated instruments (BRRD pre-dating).

  '

policy_id: tanzania_villagisation_1973
status: candidate
title: Tanzania Villagisation 1973
countries:
- TZA
timeframe:
  start: 1967
  end: 1985
description: 'The Operation Vijiji villagisation campaign launched in November 1973 forcibly relocated millions of rural Tanzanians from scattered homesteads into nucleated ujamaa villages over 1973-76.
  Backed by the Villages and Ujamaa Villages Act 1975 it imposed collective production on consolidated plots, redistributed land use, and aimed to ease state delivery of schools, water and clinics — while
  disrupting customary tenure and existing settlement patterns.

  '

- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Adds stronger tenancy, rent-increase, database, and ombudsman obligations to private rental-market operation.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Constrains landlords' ability to recover possession without statutory grounds relative to the previous section 21 regime.

description: The Renters' Rights Act 2025 restructured the private rented sector in England by abolishing section 21 no-fault evictions, moving assured tenancies to a periodic-tenancy model, strengthening
  possession-ground rules and rent-increase procedures, and creating supporting institutions such as a private rented sector database and ombudsman.
enacted_by:
- uk_starmer_labour_2024_present
coalition_label_at_enactment: Labour majority (Starmer)

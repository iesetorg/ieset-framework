policy_id: brazil_urv_transition_1994
status: candidate
title: Brazil Urv Transition 1994
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'The four-month URV transition phase under Cardoso, beginning March 1994, used a virtual unit (Unidade Real de Valor) pegged daily to the US dollar to systematically re-denominate prices, wages,
  and contracts. The mechanism eliminated inertial inflation expectations without freezing prices, and prepared the introduction of the new real currency on 1 July 1994 — a key innovation distinguishing
  the Real Plan from prior failed Brazilian heterodox stabilisations.

  '

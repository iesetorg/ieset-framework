policy_id: singapore_hdb_homeownership_program_1960
status: candidate
title: Singapore HDB homeownership programme, 1960
countries:
- SGP
timeframe:
  start: 1960
  end: ongoing
description: Singapore created the Housing and Development Board in 1960 and later connected public
  housing purchase to CPF savings, producing a distinctive public-land, leasehold homeownership,
  ethnic-integration, and forced-saving housing architecture. This is one of the central LKY-era
  policy pillars but requires dedicated HDB/SingStat data before scoring.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Public housing construction and land assembly expanded state housing provision.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Leasehold homeownership created broad household asset claims, though under state
    land and resale rules.
- axis: fiscal.transfer_expansion
  direction: mixed
  magnitude: weak
  intended: true
  rationale: The architecture subsidised housing access but relied heavily on compulsory individual
    savings rather than pure cash transfers.
linked_hypotheses:

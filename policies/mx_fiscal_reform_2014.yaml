policy_id: mx_fiscal_reform_2014
status: candidate
title: Mexican fiscal / hacendaria reform (2014)
countries:
- MEX
timeframe:
  start: 2014
  end: 2018
  enacted_date: '2013-12-11'
description: 'Tax-code overhaul (Reforma Hacendaria, DOF 11-dic-2013, in force 2014): eliminated IETU and IDE, capped personal-deduction use, raised the top personal income tax bracket from 30% to 35%,
  introduced excises on sugary drinks (IEPS 1 peso/litre) and junk food (8% on high-calorie foods), and homologated border-zone VAT to the national 16% rate. Designed to broaden the non-oil tax base as
  Pemex contributions were expected to decline under the energy reform''s fiscal regime.

  '
enacted_by:
- mexico_pena_nieto_pri_2012_2018
coalition_label_at_enactment: PRI + PRD (PAN opposed VAT homologation)
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: moderate
  intended: true
  rationale: Top PIT raised to 35%; deductions capped; sin-taxes introduced.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Headline 30% held; base broadened via IETU/IDE abolition.

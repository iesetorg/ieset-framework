policy_id: id_jokowi_kpk_law_revision_2019
status: candidate
title: KPK law revision 2019
countries:
- IDN
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2019-09-17'
description: 'UU No. 19/2019 amended the KPK law (UU 30/2002) to place the anti-corruption commission under executive-branch oversight via a Supervisory Board with veto over wiretaps and search/seizure,
  reclassify KPK investigators as civil servants (subject to ASN loyalty requirements), and constrain independent investigative authority. Passed in twelve days through DPR over the largest student protests
  since 1998 (#ReformasiDikorupsi). KPK wiretap-initiated prosecutions and conviction rates fell materially after the revision. Transparency International CPI score for Indonesia fell from 40 (2019) to
  34 (2022).

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIM coalition
axes_moved:
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Executive-appointed Supervisory Board pre-clears investigative actions; ASN reclassification subjects investigators to executive loyalty rules.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Measured fall in CPI and KPK case throughput post-revision.

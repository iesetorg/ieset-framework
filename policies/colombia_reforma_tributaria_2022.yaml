description: 'Ley 2277 of 2022 enacted by the Petro government, projected to raise additional annual revenue equivalent to roughly 1.4% of GDP. Introduced higher personal income-tax rates on top earners,
  a wealth tax, surcharges on hydrocarbons and coal-mining profits, non-deductibility of royalties, taxation of high-occupancy pension benefits, and digital-services VAT extensions. Funded the government''s
  social-spending agenda.

  '

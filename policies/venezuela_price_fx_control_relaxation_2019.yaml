policy_id: venezuela_price_fx_control_relaxation_2019
status: candidate
title: Venezuela Price Fx Control Relaxation 2019
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'In 2018-2019 the Maduro government tacitly relaxed enforcement of price and FX controls, abolished the DICOM-DIPRO multi-tier official rate in favour of a single floating rate, and permitted
  limited dollar-denominated retail transactions. The shift reflected pragmatic accommodation of de facto dollarisation under hyperinflation rather than a formal liberalisation, and FX-allocation institutions
  remained nominally in place.

  '

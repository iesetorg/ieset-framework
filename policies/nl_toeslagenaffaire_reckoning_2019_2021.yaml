policy_id: nl_toeslagenaffaire_reckoning_2019_2021
status: candidate
title: Netherlands Toeslagenaffaire reckoning and Rutte III resignation 2019-2021
countries:
- NLD
timeframe:
  start: 2019
  end: 2021
  enacted_date: '2021-01-15'
description: 'Investigative journalism (Trouw / RTL, September-December 2019), Auditor Dienst Rijk report, Autoriteit Persoonsgegevens finding (July 2020), and the parliamentary inquiry Commissie van Dam
  "Ongekend onrecht" (17 December 2020) documented that the Belastingdienst had systematically clawed back childcare benefits from approximately 26,000 families, disproportionately those with dual nationality
  or non-Dutch-sounding names, using ethnic-profiling risk-selection flags and denying procedural rights. State Secretary Menno Snel resigned 18 December 2019; the Rutte III cabinet resigned collectively
  15 January 2021.

  '

description: 'Regulation (EU) 2016/679 — the General Data Protection Regulation — became applicable on 25 May 2018, replacing Directive 95/46/EC with a directly applicable, harmonised EU framework for processing
  of personal data. It introduces lawful-basis requirements, expanded data-subject rights (access, erasure, portability), Data Protection Officer mandates, breach notification, mandatory DPIAs for high-risk
  processing, and administrative fines up to 4% of global turnover enforced by national DPAs.

  '

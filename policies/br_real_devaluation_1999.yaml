policy_id: br_real_devaluation_1999
status: candidate
title: Real devaluation January 1999
countries:
- BRA
timeframe:
  start: 1999
  enacted_date: '1999-01-15'
description: 'After speculative attack drained reserves $75B→$36B in late 1998, BCB widened crawling band 13 January 1999 under outgoing Francisco Lopes, then moved to full float 15 January 1999 under new
  BCB president Armínio Fraga. Real depreciated R$1.21 → R$2.00 by March. Ended Plano Real''s 1994-1998 soft-peg phase; enabled subsequent inflation-targeting regime adoption.

  '
enacted_by:
- brazil_cardoso_ii_2nd_term_1999_2002
coalition_label_at_enactment: PSDB-PFL-PMDB
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Float + operational BCB autonomy set stage for IT adoption.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: false
  rationale: Pass-through created transient inflation uptick.
references:
- Fraga (2000) Monetary Policy During the Transition to a Floating Exchange Rate

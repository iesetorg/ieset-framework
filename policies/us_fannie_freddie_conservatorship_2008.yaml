policy_id: us_fannie_freddie_conservatorship_2008
status: candidate
title: Fannie Mae and Freddie Mac conservatorship
countries:
- USA
timeframe:
  start: 2008
  enacted_date: '2008-09-07'
description: 'FHFA placed Fannie Mae + Freddie Mac into conservatorship 7 Sep 2008 under Housing and Economic Recovery Act (HERA) of 30 Jul 2008. Treasury provided Senior Preferred Stock Purchase Agreement
  with initial USD 100bn each commitment (raised), common + preferred shareholders effectively wiped. Over 2008-2012 Treasury injected ~USD 187bn; GSEs returned >USD 300bn in dividends. Net worth sweep
  2012 redirected GSE profits to Treasury — contested in Collins v Yellen.

  '

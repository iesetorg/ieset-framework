description: 'The Sánchez government''s COVID-19 fiscal response combined large-scale ERTE (Expediente de Regulación Temporal de Empleo) short-time work subsidies enacted via Real Decreto-ley 8/2020 with
  subsequent NextGenerationEU absorption through the Plan de Recuperación, Transformación y Resiliencia. ERTE protected millions of jobs by socialising temporary wage costs while NGEU funded structural
  investment.

  '

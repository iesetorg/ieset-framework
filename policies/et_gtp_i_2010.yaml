policy_id: et_gtp_i_2010
status: candidate
title: Growth and Transformation Plan I (GTP I)
countries:
- ETH
timeframe:
  start: 2010
  end: 2015
description: 'GTP I was Ethiopia''s first five-year plan under the developmental-state doctrine, adopted by MoFED in Sept 2010 and covering EFY 2003-2007 (2010/11-2014/15 Gregorian). It targeted 11-15%
  annual GDP growth, doubling power generation capacity (from ~2,000 to ~10,000 MW), tripling sugar output, a 5x expansion of the railway network, and major road and telecom rollout. Financing relied on
  domestic resource mobilisation, state-enterprise retained earnings, and external concessional lending, crowding private credit and keeping real interest rates negative.

  '

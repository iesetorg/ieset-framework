description: 'Wet verhoging AOW- en pensioenrichtleeftijd of 12 July 2012 raising the state-pension age from 65 to 67 in one-month annual steps from 2013 (accelerated schedule relative to the earlier Balkenende
  IV proposal), reaching 67 in 2023; subsequently linked to life-expectancy formula from 2024. Passed via the emergency Lenteakkoord/Kunduz-akkoord after Rutte I fell over this exact measure — rare case
  of immediately-post-government-fall cross-aisle legislation.

  '

policy_id: mdg_automatic_fuel_price_adjustment_2024
status: candidate
title: Madagascar automatic fuel price adjustment mechanism 2024
countries:
- MDG
timeframe:
  start: 2024
  end: ongoing
description: 'Madagascar adopted an automatic adjustment mechanism for domestic pump prices to reduce the fiscal cost of keeping retail fuel prices below import-parity levels. The reform was framed in IMF
  programme documents as a way to create fiscal space for priority spending while lowering arrears and quasi-fiscal pressure from fuel-price controls.

  '
enacted_by:
- madagascar_rajoelina_fiscal_climate_reform_2024_present
scope: national
coalition_label_at_enactment: Rajoelina government
axes_moved:
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Automatic adjustment reduces the bindingness of administratively fixed fuel prices.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cost-reflective pump prices reduce fuel subsidy and under-recovery costs.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower arrears and more predictable pricing can improve fuel import financing and availability.
references:
- IMF, Republic of Madagascar 2024 Article IV Consultation and First Review under the ECF and RSF, 2025.
- Government of Madagascar fuel-pricing and budget-policy communications, 2024.

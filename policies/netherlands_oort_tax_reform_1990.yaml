description: 'Belastingherziening Oort, effective 1 January 1990, flattened personal income-tax schedule to three brackets (7.05% / 50% / 60%), merged employee social-insurance contributions into the first
  bracket, broadened the base by limiting deductions, and raised the basic threshold. Substantial simplification of Dutch income-tax architecture; precursor to 2001 Wet IB reform.


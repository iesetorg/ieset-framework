policy_id: id_prabowo_b40_b50_biodiesel_mandate_2025_2026
status: candidate
title: Indonesia Prabowo B40/B50 biodiesel blending mandate
countries:
- IDN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-01'
description: 'Prabowo-era continuation and escalation of Indonesia''s mandatory biodiesel blending programme, with B40 treated as the operating baseline and B50 scheduled for implementation in the second
  half of 2026 after testing and feedstock-readiness work. The Ministry of Energy and Mineral Resources states that the government is preparing raw materials, conducting engine and road tests, and targeting
  B50 implementation once readiness is confirmed. The programme uses domestic palm-oil-based biodiesel blending to reduce diesel-import exposure, support palm-oil producers, and lower headline fossil-fuel
  dependence, while retaining land-use and fiscal-subsidy caveats.

  '
enacted_by:
- indonesia_prabowo_2024_present
coalition_label_at_enactment: Gerindra-led Koalisi Indonesia Maju Plus
axes_moved:
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  intended: true
  rationale: Higher domestic biodiesel blending reduces imported diesel exposure and diversifies the transport-fuel mix.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Mandatory blending and palm-oil-fund support raise targeted support for palm-oil/biofuel producers and distributors.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: The fuel-mix mandate is officially framed as a lower-emission biofuel transition, though land-use effects make the environmental net effect contested.
references:

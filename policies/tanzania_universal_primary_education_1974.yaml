policy_id: tanzania_universal_primary_education_1974
status: candidate
title: Tanzania Universal Primary Education 1974
countries:
- TZA
timeframe:
  start: 1967
  end: 1985
description: 'The Musoma Resolution of 1974 set the target of universal primary education (UPE) in Tanzania by 1977, abolishing primary school fees and rapidly expanding enrolment by mobilising community
  labour to build schools and recruiting large numbers of grade-A teachers. UPE drove gross primary enrolment from below 50 percent to near-universal coverage within a few years, financed through the central
  budget under ujamaa.

  '
enacted_by:
- tanzania_nyerere_ujamaa_1967_1985
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Free state schooling crowded out the small private education sector.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Nationalisation of mission and private schools accompanied UPE rollout.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Free schooling represented a large in-kind transfer to households nationwide.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Embedded in ujamaa autarky, UPE was fiscally bundled with closed-economy controls.

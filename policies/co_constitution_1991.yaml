description: 'Promulgated 4 July 1991 by the Constituent Assembly (Asamblea Nacional Constituyente) with Liberal, AD M-19, Movimiento de Salvación Nacional co-presidency. Replaced the 1886 Constitution.
  Established Corte Constitucional (Art. 239), acción de tutela (Art. 86) for fundamental-rights protection, Defensoría del Pueblo, Fiscalía General de la Nación, autonomous Banco de la República (Art.
  371), direct-democracy mechanisms (referendum, plebiscite, revocatoria del mandato, cabildo abierto), multicultural- nation definition, ban on extradition of nationals (repealed 1997), departmentalisation
  reform.

  '

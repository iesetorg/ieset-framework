description: 'Introduced a mandatory funded defined-contribution second pillar operated by licensed Pension Fund Administration Companies (DSS) effective 1 January 2005, alongside a reformed PAYG first
  pillar. 9% of gross earnings diverted to second pillar for enrolees. Later partially unwound: opening/reopening of exit windows (2008 under Fico), contribution rate cut to 4.25% (2012).

  '

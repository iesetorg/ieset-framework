description: 'Following 30 April 1984 assassination of Justice Minister Rodrigo Lara Bonilla by the Medellín cartel, Betancur invoked the 1979 US-Colombia extradition treaty on 2 May 1984. First extraditions
  (Carlos Lehder 1987, Rafael Cardona Salazar) fueled Medellín cartel war through late 1980s. Supreme Court ruled treaty unenforceable via presidential decree December 1986 (after Palace of Justice destroyed
  case law); constitutional amendment required, completed under 1991 Constitution.


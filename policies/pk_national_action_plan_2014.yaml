  enacted_date: '2014-12-24'
description: 'Twenty-point counter-terrorism policy framework adopted by the All-Parties Conference on 24 December 2014 following the 16 December 2014 Army Public School Peshawar attack. Provisions included:
  lifting the moratorium on executions for terrorism convictions; military courts under the 21st Constitutional Amendment (January 2015-January 2017; extended to January 2019); madrassa registration and
  reform; banned-organisation enforcement against sectarian and proscribed groups; FATA reform precursor measures; NACTA (National Counter Terrorism Authority) operationalisation. Institutional implications
  through military- court jurisdiction over civilians and accelerated-execution regime.

  '

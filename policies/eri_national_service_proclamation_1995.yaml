policy_id: eri_national_service_proclamation_1995
status: candidate
title: Eritrea national service and Warsai Yikealo mobilisation
countries:
- ERI
timeframe:
  start: 1995
  end: ongoing
description: >
  Eritrea's National Service Proclamation No. 82/1995 made national service
  compulsory for adults, formally combining six months of military training
  with twelve months of active service. After the 1998-2000 border war, the
  2002 Warsai Yikealo Development Campaign and emergency mobilisation turned
  the limited service model into an open-ended military and civilian labour
  allocation system, including Grade 12 routing through Sawa military camp and
  state assignment of conscripts into public, military, and development work.
enacted_by:
- eritrea_pfdj_national_service_state_1994_present
scope: national
coalition_label_at_enactment: PFDJ government under Isaias Afwerki
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Indefinite service, coercive enforcement, and weak complaint channels converted a statutory service limit into open-ended state control over citizens.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Conscription and state assignment sharply constrained workers' ability to choose occupations, employers, and locations.
references:
- "Eritrea National Service Proclamation No. 82/1995."
- "Human Rights Watch, They Are Making Us into Slaves, Not Educating Us, 2019: https://www.hrw.org/report/2019/08/09/they-are-making-us-slaves-not-educating-us/how-indefinite-conscription-restricts"
- "UN Human Rights Council, Report of the Commission of Inquiry on Human Rights in Eritrea, A/HRC/29/42, 2015."
notes: >
  Source caveat: the proclamation text is cited as the legal anchor, while
  accessible UN and HRW materials are used for the post-2002 indefinite-service
  implementation pattern and current-rights caveats.

description: 'Iran announced enrichment of uranium to 60% U-235 on 16 Apr 2021 following sabotage at the Natanz facility, the first such step by a non-weapons state. Expanded centrifuge cascades (IR-2m,
  IR-4, IR-6) installed at Natanz and Fordow through 2021-2024. Parliament''s Dec 2020 "Strategic Action Law" mandated suspension of Additional Protocol implementation from 23 Feb 2021, degrading IAEA surveillance
  (including removal of cameras in Jun 2022). By end-2023 IAEA reported Iranian LEU stockpile ~5,500 kg (vs JCPOA 300 kg cap); ~120 kg enriched to 60%. Substantial set-back imposed by Israeli "Rising Lion"
  and US B-2 strikes on Natanz, Fordow, Isfahan Jun 2025.

  '

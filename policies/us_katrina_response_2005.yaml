description: 'Federal response to 29 Aug 2005 Hurricane Katrina (~1,800 deaths, USD 125bn damage). Congress appropriated ~USD 120bn in three supplementals; FEMA housing vouchers + trailers; Gulf Opportunity
  Zone Act (22 Dec 2005, P.L. 109-135) provided accelerated depreciation + tax-exempt bonds + rehab credits for reconstruction. Federal-state coordination failures (FEMA director resignation 12 Sep 2005)
  drove institutional-reform push — Post-Katrina Emergency Management Reform Act 2006.

  '

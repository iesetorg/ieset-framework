policy_id: gr_enfia_property_tax_introduction_2013
status: candidate
title: Greece ENFIA unified property tax introduction 2013
countries:
- GRC
timeframe:
  start: 2013
  enacted_date: '2013-12-31'
description: 'Law 4223/2013 (enacted 31 December 2013, effective 1 January 2014) introducing the Unified Real-Estate Property Tax (ENFIA) as a permanent annual property tax replacing the emergency property
  levy collected through electricity bills from 2011-2013 (the ''haratsi'') and the earlier periodic FAP wealth-tax on high-value holdings. Structure: ''main tax'' per real-estate unit based on location,
  surface area, age, floor and other characteristics, plus a ''supplementary tax'' on total holdings above €300,000 (natural persons) or 5.5‰ flat for legal entities. Initial projected yield c.€2.65bn/year.
  Highly politically salient as the most visible Memorandum-era tax imposition on domestic property-owner households. Subsequent reductions under Mitsotakis from 2019 (see gr_enfia_property_tax_reduction_2019_2024)
  cumulatively cut household ENFIA c.30-50%.

  '

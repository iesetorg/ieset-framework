policy_id: ug_parish_development_model_2022
status: candidate
title: Uganda Parish Development Model rollout 2022
countries:
- UGA
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-26'
description: 'Uganda rolled out the Parish Development Model as a local-development and poverty-reduction programme built around parish-level data, enterprise groups, revolving funds, agricultural extension,
  and financial inclusion. The policy channels public resources directly to small household enterprises and local production groups, seeking to move subsistence households into the money economy through
  credit, inputs, and local planning.

  '

description: 'AB 1279 (2022), the California Climate Crisis Act, codified into state law a binding 2045 economy-wide net-zero greenhouse gas target and an 85% gross emissions reduction below 1990 levels.
  It directs the California Air Resources Board (CARB) to update Scoping Plans consistent with the trajectory and to monitor carbon-removal deployment, locking in the long-term decarbonisation pathway alongside
  AB 32 (2006), SB 32 (2016), and the cap-and-trade and clean-energy programmes.

  '

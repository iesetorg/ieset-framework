policy_id: turkey_islamic_banking_legalisation_1983
status: candidate
title: Turkey Islamic Banking Legalisation 1983
countries:
- TUR
timeframe:
  start: 1983
  end: 1993
description: 'Turkey''s Decree 83/7506 of 16 December 1983, issued by the Ozal government, legalised "Special Finance Houses" (Ozel Finans Kurumlari) operating on Islamic profit-and-loss-sharing principles
  rather than interest, opening the way to firms such as Albaraka Turk and Faisal Finans Kurumu. The institutions were brought fully under Banking Law in 1999 and renamed "participation banks" in 2005.
  The intended effect was to mobilise interest-averse domestic savings and Gulf-region capital, broaden the financial-system base, and politically anchor the new conservative-liberal coalition without abandoning
  the secular banking-law framework.

  '
enacted_by:
- turkey_ozal_market_reforms_1983_1993
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: New SFH licences attracted Gulf-region capital flows, broadening cross-border financial linkages.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: New institutional category expanded permissible bank-like activities outside conventional interest-based banks.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak

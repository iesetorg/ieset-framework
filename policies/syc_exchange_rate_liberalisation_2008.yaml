policy_id: syc_exchange_rate_liberalisation_2008
status: candidate
title: Seychelles exchange-rate liberalisation 2008
countries:
- SYC
timeframe:
  start: 2008
  end: ongoing
description: 'Seychelles floated the rupee and liberalised exchange controls as part of the 2008 IMF-supported macroeconomic reform programme. The reform replaced an administratively controlled exchange-rate
  regime and rationed foreign exchange with market-based price discovery, while monetary policy shifted toward inflation control and reserve rebuilding.

  '
enacted_by:
- seychelles_macro_blue_economy_resilience_2008_present
scope: national
coalition_label_at_enactment: Michel government
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Liberalising exchange controls loosened direct administrative restrictions on foreign-exchange transactions.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: A market-clearing exchange rate reduced foreign-exchange rationing for imports and tourism-linked transactions.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: The reform package shifted monetary policy toward inflation control rather than defending an unsustainable peg.
references:
- IMF, Seychelles 2025 Article IV Consultation staff report, background on 2008 reforms.
- IMF, Seychelles Stand-By Arrangement approval and programme materials, 2008.

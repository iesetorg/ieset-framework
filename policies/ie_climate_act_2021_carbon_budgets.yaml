policy_id: ie_climate_act_2021_carbon_budgets
status: candidate
title: Ireland Climate Action and Low Carbon Development (Amendment) Act 2021
countries:
- IRL
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-07-23'
description: 'Headline climate-policy statute of the Martin rotating coalition, signed 23 July 2021. Binds the state to a 51% reduction in greenhouse-gas emissions by 2030 (vs 2018 baseline) and climate-neutrality
  by 2050, establishes five-year carbon budgets set by the Climate Change Advisory Council and approved by the Oireachtas, creates sectoral emissions ceilings (electricity, transport, built environment,
  industry, agriculture, land use), and strengthens annual Climate Action Plan obligations. Rolling carbon budgets for 2021-2025 and 2026-2030 adopted by government April 2022. Complements a pre-legislated
  carbon-tax trajectory rising €7.50/tCO₂ each year from €26 (2020) to €100 (2030), enacted in Finance Act 2020.

  '
enacted_by:
- ireland_martin_ff_rotating_2020_2022
coalition_label_at_enactment: FF + FG + Green rotating-Taoiseach coalition (Eamon Ryan Climate Minister)
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  intended: true
  rationale: Legally binding 51% by 2030 target + five-year carbon budgets + sectoral ceilings — among the more stringent EU-member climate frameworks.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Sectoral emissions ceilings create an implicit gating regime on high-emissions activities (data centres, agriculture).
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Aggressive decarbonisation trajectory without firm-capacity buildout contributed to tight system-adequacy margins 2021-2023 (EirGrid warnings).

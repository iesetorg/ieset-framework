policy_id: mx_tequila_crisis_rescue_1994_1995
status: candidate
title: Tequila crisis and US-IMF rescue 1994-1995
countries:
- MEX
timeframe:
  start: 1994
  end: 1995
  enacted_date: '1994-12-20'
description: '20 December 1994 Mexican authorities widened the peso-dollar band by 15%, then on 22 December abandoned the crawling peg entirely. Peso fell from 3.46/$ to 7.20/$ by March 1995. Banxico reserves
  collapsed from $29B (February 1994) to $6B (December 1994) after tesobono (dollar-indexed short-term debt) rollovers failed. 31 January 1995 Clinton announced $50B rescue via Exchange Stabilization Fund
  ($20B US), IMF ($17.8B SBA), BIS ($10B), Canada ($1B). 1995 GDP -6.2%; inflation 52%; unemployment doubled.

  '

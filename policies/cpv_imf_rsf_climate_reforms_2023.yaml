  direction: +
  magnitude: moderate
  intended: true
  rationale: RSF reform measures increase climate screening and adaptation requirements in public policy.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: Energy-transition reforms target more resilient domestic generation and lower exposure to imported fuel shocks.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Climate-budgeting and investment-screening measures add formal procedures to public investment management.

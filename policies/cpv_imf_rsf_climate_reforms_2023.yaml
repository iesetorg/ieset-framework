policy_id: cpv_imf_rsf_climate_reforms_2023
status: candidate
title: Cabo Verde IMF RSF climate reforms 2023
countries:
- CPV
timeframe:
  start: 2023
  end: ongoing
description: 'Cabo Verde added an IMF Resilience and Sustainability Facility arrangement to its macroeconomic programme in 2023 to address climate vulnerability and energy-transition risks. The reform
  package links concessional financing to climate-risk management, adaptation planning, renewable-energy transition measures, public-investment screening, and resilient infrastructure policy.

  '

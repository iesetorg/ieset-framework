policy_id: be_notional_interest_deduction_2005
status: candidate
title: Notional interest deduction
countries:
- BEL
timeframe:
  start: 2005
  enacted_date: '2006-01-01'
description: 'Loi of 22 June 2005, effective assessment year 2007 (tax year 2006), introduced a notional-interest deduction ("déduction pour capital à risque") allowing companies to deduct an imputed return
  on their risk capital from taxable income at a rate tied to 10-year OLO bond yields. Designed to reduce the tax preference for debt over equity and attract corporate HQ / coordination centres (phasing
  out the EU- incompatible coordination-centre regime). Effective corporate tax burden for high-equity firms fell sharply; criticised as tax-base erosion enabler.

  '
enacted_by:
- belgium_verhofstadt_purple_1999_2007
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: strong
  rationale: Notional-interest deduction can zero effective corporate tax for high-equity holding structures.
  intended: true
references:
- Loi du 22 juin 2005 (déduction pour capital à risque)

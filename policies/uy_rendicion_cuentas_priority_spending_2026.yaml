status: candidate
title: Uruguay Rendicion de Cuentas Priority Spending Package 2026
countries:
- URY
timeframe:
  start: 2026
  end: ongoing
description: 'The Orsi government prepared the 2026 Rendicion de Cuentas bill with a stated USD 81 million priority envelope for first childhood, public security, education, and support for people living
  on the street. The package was presented by the Council of Ministers in June 2026 for submission to Parliament, keeping the headline fiscal-rule continuity line while redirecting incremental resources
  toward targeted social and security programmes.

  '

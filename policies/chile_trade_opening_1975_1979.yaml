policy_id: chile_trade_opening_1975_1979
status: candidate
title: Chile Trade Opening 1975-1979
countries:
- CHL
timeframe:
  start: 1975
  end: 1990
description: 'Pinochet/Chicago Boys unilateral trade liberalisation programme, dismantling import licensing, prohibitions, and quantitative restrictions and converging the tariff schedule from an average
  of roughly 94% (with a maximum near 750%) in 1973 to a uniform 10% rate by 1979. Chile withdrew from the Andean Pact in 1976 to remove the binding ceiling on its liberalisation pace. The reform implemented
  a non-discretionary, rules-based trade regime as a deliberate departure from ISI industrial policy.

  '
enacted_by:
- pinochet_chicago_boys_1975_1990
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Average effective tariff fell from ~94% (1973) to a uniform 10% (1979) and quantitative restrictions were largely abolished.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Import competition from the uniform tariff dismantled rents in protected ISI sectors and forced exit/restructuring.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Trade opening was paired with capital-account liberalisation that built up external-debt exposure feeding the 1982 crisis.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tariff cuts were executed by military-government decree without congressional or judicial review channels.

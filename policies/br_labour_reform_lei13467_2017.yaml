title: Reforma Trabalhista — Lei 13.467/2017
countries:
- BRA
timeframe:
  start: 2017
  enacted_date: '2017-07-13'
description: 'Lei 13.467/2017 overhauled the 1943 Consolidação das Leis do Trabalho (CLT): introduced intermittent-work contracts, home-office regulation, teletrabalho, expanded part-time and temporary
  contracts, made union dues voluntary (imposto sindical no longer mandatory), established the principle of negociado sobre o legislado (collective bargaining can override selected statutory provisions),
  and tightened labour-court access (loser-pays costs). It was the largest liberalisation of Brazilian labour law in eight decades.

  '

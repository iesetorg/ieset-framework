policy_id: sk_special_prosecutor_abolition_2024
status: candidate
title: Slovakia Special Prosecutor's Office abolition 2024
countries:
- SVK
timeframe:
  start: 2024
  end: ongoing
description: 'Slovakia abolished the Special Prosecutor''s Office in 2024 through a criminal law amendment package, transferring its corruption and serious-crime caseload to regional prosecution offices.
  The change also formed part of a broader criminal-code reform that reduced penalties and limitation periods for some economic crimes before partial constitutional and EU pressure-driven adjustments.

  '
enacted_by:
- slovakia_fico_fourth_2023_present
scope: national
coalition_label_at_enactment: Smer-SD-Hlas-SNS coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Closing the specialised anti-corruption prosecution office weakened a dedicated channel for high-level corruption enforcement.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Prosecutorial restructuring by the governing majority raised concerns about political influence over sensitive corruption cases.

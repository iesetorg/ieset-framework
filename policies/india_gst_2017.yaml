title: India Goods and Services Tax 2017
countries:
- IND
timeframe:
  start: 2017
  enacted_date: '2017-07-01'
description: 'Landmark tax-harmonisation reform under PM Narendra Modi. Replaced ~17 central + state indirect taxes (VAT, central excise, service tax, entry tax, octroi, etc.) with a unified Goods and Services
  Tax with 4 main rates (5/12/18/28%). Destination-based tax with input tax credit chain. Required constitutional amendment + multi- year negotiation with states via GST Council. Short-run disruption (2017-2018
  Q2 GDP slowdown) as supply chains adapted, followed by gradual compliance-base expansion and some formalisation of informal sector. Foundational institutional-quality improvement in Indian tax architecture.

  '

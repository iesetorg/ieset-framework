policy_id: jp_sii_structural_impediments_1990
status: candidate
title: Structural Impediments Initiative concessions 1990
countries:
- JPN
timeframe:
  start: 1989
  end: 1990
  enacted_date: '1990-06-28'
description: 'Bilateral US-Japan Structural Impediments Initiative (SII) final report 28 Jun 1990 committed Japan to reform six structural barriers: savings-investment patterns (¥430 trillion public-works
  commitment over 10 years), land-use reform, distribution (Large-Scale Retail Store Law amendment), exclusionary business practices, keiretsu relationships, and pricing mechanisms. Real implementation
  mixed; Large-Scale Retail Store Law amendments 1990 did ease big-box retail entry.

  '

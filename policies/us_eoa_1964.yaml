description: 'The Economic Opportunity Act of 1964 (Pub. L. 88-452) launched President Johnson''s "War on Poverty," creating the Office of Economic Opportunity to administer Job Corps, VISTA, Head Start,
  Community Action Programs, and adult education initiatives. The act is the institutional anchor of the Great Society anti-poverty agenda, channeling federal funds directly to community-based agencies
  and bypassing state administrative gatekeeping in poverty-program design.

  '

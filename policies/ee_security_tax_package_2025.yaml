policy_id: ee_security_tax_package_2025
status: candidate
title: Estonia security-tax package 2025-2028
countries:
- EST
timeframe:
  start: 2025
  end: ongoing
description: 'Estonia adopted a security-tax and fiscal package to finance higher defence and internal-security needs after Russia''s war against Ukraine. The package raises broad tax revenue through staged
  consumption, personal-income, and corporate-income measures while earmarking the political justification around national security and deficit repair.

  '
enacted_by:
- estonia_kallas_michal_reform_coalition_2021_present
scope: national
coalition_label_at_enactment: Reform Party-led coalition
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: The package raises the corporate tax burden as part of the security-financing mix.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Revenue was linked to sustaining higher defence and internal-security outlays.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Broad consumption-tax elements flatten incidence while income and corporate components increase direct-tax burdens.

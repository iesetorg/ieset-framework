policy_id: cn_private_economy_promotion_law_2025
status: candidate
title: China Private Economy Promotion Law 2025
countries:
- CHN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-04-30'
description: The Law of the People's Republic of China on Promoting the Private Economy was adopted by the Standing Committee of the National People's Congress on 30 April 2025 and took effect on 20 May
  2025. It codifies equal legal status for private economic organizations, fair participation in market competition, use of the national market-access negative list, support for investment and financing,
  protection against unlawful fees, fines, and property apportionment, and regular government reporting on private-economy promotion. The law sits inside Xi-era party leadership of the economy, so it strengthens
  formal guarantees for private firms without reversing broader party-state supervision.

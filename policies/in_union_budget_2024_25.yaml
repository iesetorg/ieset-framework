timeframe:
  start: 2024
  enacted_date: '2024-07-23'
description: 'Finance Minister Nirmala Sitharaman''s Union Budget 2024-25, presented 23 July 2024 after the NDA returned with 293 seats, set a fiscal-deficit target of 4.9% of GDP for 2024-25 (down from
  5.6% in the Interim Budget) on a glide path to 4.5% or below for 2025-26. Capital-expenditure outlay retained at ~₹11.11 trillion (~3.4% of GDP). Personal-income-tax new-regime slabs rationalised — standard
  deduction raised to ₹75,000; short-term capital gains tax raised to 20% (from 15%) and long-term to 12.5% (from 10%) with unified holding-period definitions; angel tax abolished. Customs duties reduced
  on gold, silver, and mobile- phone components; indexation benefit on real estate removed then partially restored on amendment. Employment-linked incentive schemes launched via EPFO linkage. Nine-priority
  framework highlighted: productivity and resilience in agriculture; employment and skilling; inclusive human resource development; manufacturing and services; urban development; energy security; infrastructure;
  innovation R&D; and next-gen reforms. Coalition-partner allocations to Andhra Pradesh (₹15,000 cr Amaravati) and Bihar (road, airport, Nalanda, power projects ~₹26,000 cr) were prominent.

  '

description: 'Second-pillar Otwarte Fundusze Emerytalne (OFE) private pension funds compelled to transfer ~51.5% of assets (PLN 153bn, primarily Polish government bonds) to state ZUS, bonds then cancelled
  — reducing reported general-government debt by ~8.5% of GDP and creating fiscal space within EU debt thresholds. Remaining OFE participation turned opt-in.

  '

title: Ley 2010 de 2019 — Ley de Crecimiento Económico (Colombia)
countries:
- COL
timeframe:
  start: 2019
  end: 2020
  enacted_date: '2019-12-27'
description: 'Re-enactment of the content of Ley 1943 de 2018 (Ley de Financiamiento) after the Constitutional Court struck it down on procedural grounds (sentence C-481 de 2019). Reduced the corporate-income-tax
  rate on a declining path (33% -> 30% by 2022), expanded investment deductions (mega-investment regime, "economía naranja" creative-industries tax exemption, agribusiness exemption), exempted basic-basket
  goods from VAT, introduced VAT-refund for low-income households, created the simple-taxation regime (monotributo SIMPLE) for SMEs, and tightened dividend-tax rules.

  '

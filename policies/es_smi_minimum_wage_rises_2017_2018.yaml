policy_id: es_smi_minimum_wage_rises_2017_2018
status: candidate
title: Smi Minimum Wage Rises 2017 2018
countries:
- ESP
timeframe:
  start: 2016
  end: 2018
description: 'Spain''s Salario Mínimo Interprofesional (SMI), set annually by Royal Decree under Article 27 of the Estatuto de los Trabajadores, was raised by the Rajoy government in 2017 (1.0% to €707.6)
  and 2018 (4.0% to €735.9) following social-partner agreements, after years of post-crisis freezes. The successor Sánchez government raised it to €900 in 2019. The intended effect was to support low-wage
  incomes and reduce in-work poverty after the eurozone-crisis squeeze.

  '

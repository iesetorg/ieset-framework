policy_id: et_birr_float_2024
status: candidate
title: Birr float and FX regime liberalisation
countries:
- ETH
timeframe:
  start: 2024
  enacted_date: '2024-07-29'
description: 'National Bank of Ethiopia Directive FXD/01/2024 (Jul 29 2024) moved the birr from a tightly managed peg to a market-based exchange rate, removed most surrender requirements, allowed banks
  to set rates and charge fees within competitive bands, and permitted foreign-exchange bureaux. The official rate depreciated from ~57 to ~74 per USD on day one and to ~110-120 over the following quarters,
  closing most of the pre-reform parallel premium. Anchor reform of the Jul 29 2024 IMF EFF.

  '
enacted_by:
- ethiopia_abiy_prosperity_2018_present
coalition_label_at_enactment: Prosperity Party
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  rationale: Removed pegged overvaluation and rationing; tightened FX framework under IMF programme.
  intended: true
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  rationale: Market-based FX reduced implicit import tax on tradables.
  intended: true
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: Banks set rates; FX bureaux re-permitted.
  intended: true
references:

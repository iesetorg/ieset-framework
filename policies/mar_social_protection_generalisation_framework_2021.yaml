policy_id: mar_social_protection_generalisation_framework_2021
status: candidate
title: Morocco social-protection generalisation framework 2021
countries:
- MAR
timeframe:
  start: 2021
  end: ongoing
description: 'Morocco''s framework law for generalising social protection set a staged plan to expand compulsory health insurance, family allowances, pension coverage, and unemployment-related protection
  to groups outside the previous formal contributory system. The programme moved social protection from narrower worker-linked schemes toward broader household coverage, with implementation tied to registries,
  financing reforms, and gradual rollout.

  '
coalition_label_at_enactment: Mohammed VI monarchy and Saadeddine Othmani government
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Health coverage, family allowances, pensions, and unemployment protections were expanded toward broad population coverage.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Generalised coverage requires larger recurrent social spending and financing commitments.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Registry and eligibility rules formalise access to social benefits beyond ad hoc programmes.
references:
- Morocco Framework Law No. 09-21 on social protection, 2021
- Royal speeches and government materials on generalising social protection, 2020-2021
- World Bank, Morocco social protection reform and financing materials
notes: No current Morocco movement was added because this one policy alone does not justify a full new movement spec.

description: 'Spain signed the Treaty of Accession to the European Economic Community in Madrid on 12 June 1985, with full membership effective 1 January 1986 alongside Portugal. The accession treaty mandated
  acquis communautaire alignment including IVA (VAT) introduction, customs-union integration, agricultural CAP harmonisation, and free-movement provisions, anchoring Spain''s post-Franco economic modernisation.

  '

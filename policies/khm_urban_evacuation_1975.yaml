# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: khm_urban_evacuation_1975
status: candidate
title: Forced Urban Evacuation and Rural Labour Reallocation
countries:
- KHM
timeframe:
  start: 1975
  end: 1975
description: Immediately after taking power in April 1975, the Khmer Rouge ordered the evacuation of Phnom Penh and other towns and moved urban residents into rural work sites. The policy dismantled urban labour markets, commerce, and administrative life while reallocating people into agricultural production under party-controlled local units.
enacted_by:
- khm_khmer_rouge_democratic_kampuchea_1975
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Labour placement became compulsory through forced relocation and work assignment.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: The evacuation dismantled urban commercial markets and private services.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Population movement and labour allocation were imposed by party coercion outside legal constraint.
references:
- Ben Kiernan (2008), The Pol Pot Regime
- David P. Chandler (1991), The Tragedy of Cambodian History

policy_id: nz_rbnz_inflation_targeting_1989
status: candidate
title: Rbnz Inflation Targeting 1989
countries:
- NZL
timeframe:
  start: 1984
  end: 1993
description: 'New Zealand''s Reserve Bank Act 1989 made price stability the sole statutory objective of the Reserve Bank, with the Governor accountable via a Policy Targets Agreement (initial target 0-2%
  CPI) and a single-decision-maker regime. The world''s first formal inflation-targeting framework, it codified operational independence with clear democratic accountability. The intended effect was to
  break inflationary expectations after the 1980s'' double-digit inflation and to discipline future fiscal-monetary coordination.

  '

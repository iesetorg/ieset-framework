description: 'Regulation (EU) 2019/1150 — the Platform-to-Business (P2B) Regulation — established transparency and fairness rules between online intermediation services and search engines and their business
  users, requiring plain-language T&Cs, advance notice of material changes, disclosure of main parameters determining ranking, internal complaint handling, and access to mediation. It applied from 12 July
  2020 across the EU and represents a precursor to the broader DMA/DSA platform-regulation stack.

  '

policy_id: som_security_pact_atmis_transition_2023
status: candidate
title: Somalia Security Pact and ATMIS transition 2023
countries:
- SOM
timeframe:
  start: 2023
  end: ongoing
description: >
  Somalia and international partners agreed a Security Pact in 2023 to align
  force generation, stabilization, financing, and the transition from the
  African Union Transition Mission in Somalia toward Somali-led security
  responsibility. The framework tied external security support to Somali
  national army development, police and justice capacity, local stabilization,
  and fiscal planning for the security sector.
enacted_by:
- somalia_hassan_sheikh_debt_security_statebuilding_2022_present
scope: national
coalition_label_at_enactment: Hassan Sheikh Mohamud federal government
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Security-sector transition increased planned domestic and partner-financed spending responsibilities.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The pact linked security handover to more formal force-generation, justice, and stabilization institutions.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Security-sector architecture centralized authority over armed-force organization and security-provider recognition.
references:
- Somalia Security Conference and Security Pact materials, December 2023.
- United Nations Security Council and African Union reporting on ATMIS drawdown and Somalia security transition, 2023-2025.

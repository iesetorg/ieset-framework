policy_id: no_corporate_tax_cut_2013_2019
status: candidate
title: Corporate tax reduction 28% → 22% and personal tax cuts
countries:
- NOR
timeframe:
  start: 2014
  end: 2019
description: 'Staged reduction of the Norwegian ordinary corporate income tax rate from 28% (2013) to 27% (2014), 25% (2016), 24% (2017), 23% (2018) and 22% (2019), aligned with OECD peer-group trend and
  formalised in the 2016 cross-party tax settlement (skatteforliket). Parallel reductions to the personal income tax schedule top-bracket structure and adjustments to the wealth-tax (formuesskatt) valuation
  base for working capital. Rationale: improve corporate-investment competitiveness while preserving broad tax base; full ring-fence regime on petroleum income preserved separately.

  '
enacted_by:
- norway_solberg_rightbloc_2013_2021
coalition_label_at_enactment: H-FrP minority, later H-FrP-V-KrF majority
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Six-point rate cut over five budgets; broad-based with limited base-broadening offsets outside the petroleum ring fence.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Personal income tax bracket adjustments and wealth-tax valuation relief reduce effective top-quintile burden.

policy_id: france_isf_ifi_swap_2017
status: candidate
title: France Isf Ifi Swap 2017
countries:
- FRA
timeframe:
  start: 2017
  end: 2019
description: 'Macron''s first finance law (Loi de finances 2018) abolished the Impôt de solidarité sur la fortune (ISF) on most movable wealth and replaced it with the narrower Impôt sur la fortune immobilière
  (IFI), which applies only to real-estate assets above a threshold. Bundled with introduction of the prélèvement forfaitaire unique (PFU) flat tax on capital income, the swap aimed to lower France''s effective
  taxation of mobile capital and discourage tax-driven expatriation.

  '

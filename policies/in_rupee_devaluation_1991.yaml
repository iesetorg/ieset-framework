description: 'Two-step rupee devaluation 1 Jul 1991 (9.5%) and 3 Jul 1991 (10.7%) from ₹21.14/USD toward ₹25.95/USD, followed by Liberalised Exchange Rate Management System (LERMS) Feb 1992 introducing
  dual exchange rate and eventual unification in Mar 1993. Part of the 1991 crisis- response reform package alongside industrial delicensing.

  '

timeframe:
  start: 1999
  end: 2003
  enacted_date: '2003-01-01'
description: 'Finance Act 1999 announced the phased standardisation of Irish corporate tax at 12.5% on trading profits, fully effective 1 January 2003. Replaced the dual system of 10% manufacturing/export
  rate (EU state-aid issue) and higher 24-32% rate on services/trading. The 12.5% headline rate became the defining pillar of Ireland''s FDI-led growth model and a central issue in international tax discussions
  (base-erosion, OECD BEPS, global minimum tax).

  '

policy_id: zimbabwe_price_controls_2007
status: candidate
title: Zimbabwe Price Controls 2007
countries:
- ZWE
timeframe:
  start: 2000
  end: 2009
description: 'In June 2007 the Mugabe government, attempting to suppress hyperinflation politically, ordered an across-the-board halving of retail prices, deployed price-control inspectors to enforce compliance,
  and prosecuted shop owners under Operation Dzikisai Mitengo ("reduce prices"). The policy emptied retail shelves within weeks, accelerated the move to barter and parallel markets, and intensified the
  supply collapse rather than restraining inflation.

  '

description: '"Three S" programme — self-reliance, self-financing, self-management — under PM Messner, deepening partial enterprise autonomy. Failed November 1987 referendum asked for mandate for more radical
  "second stage" reforms; yes-vote of ~44% of eligible voters fell short of 50% threshold, delegitimising further reform. Empirically produced no macroeconomic stabilisation; inflation accelerated through
  1988.

  '

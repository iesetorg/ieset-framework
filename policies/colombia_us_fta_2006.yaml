description: 'Colombia–United States Trade Promotion Agreement (CTPA) signed in November 2006 under the Uribe government, ratified by the U.S. Congress in October 2011, and entering into force May 2012.
  Phased out tariffs on industrial and most agricultural trade, secured U.S. market access for Colombian exports, and locked in investment- protection and intellectual-property commitments aligned with
  U.S. trade-policy templates.

  '

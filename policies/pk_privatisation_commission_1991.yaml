policy_id: pk_privatisation_commission_1991
status: candidate
title: Pakistan Privatisation Commission and bank privatisation 1991-1993
countries:
- PAK
timeframe:
  start: 1991
  end: 1993
description: 'Privatisation Commission established Jan 1991 under PM office by Nawaz Sharif government to reverse Bhutto-era nationalisations. Major transactions: Muslim Commercial Bank (Apr 1991), Allied
  Bank (Sep 1991), 115+ state units privatised 1991-1993 spanning cement, chemicals, engineering, ghee mills, automobiles. Partially privatised additional banks prepared (Habib Bank, United Bank) for later
  completion. Provided template for subsequent waves.

  '

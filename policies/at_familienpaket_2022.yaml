policy_id: at_familienpaket_2022
status: candidate
title: Familienpaket 2022 — Familienbonus Plus raised to EUR 2,000
countries:
- AUT
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-06-23'
description: 'Raised the Familienbonus Plus income-tax credit from EUR 1,500 to EUR 2,000 per child under 18 and from EUR 500 to EUR 650 for children over 18 in education, effective July 2022 with full-year
  retrospective effect. Raised the Kindermehrbetrag (refundable portion for low-income households) from EUR 250 to EUR 450. Part of the broader Teuerungs-Entlastungspaket addressing inflation; framed as
  family-focussed tax relief consistent with long-running OeVP family policy (see Familienbonus Plus 2019 origin under Kurz).

  '
enacted_by:
- austria_nehammer_ovp_greens_2022_2025
coalition_label_at_enactment: OeVP-Gruene
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Expanded refundable Kindermehrbetrag reaches households below the tax-liability threshold, functionally a transfer increase.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Familienbonus Plus as a non-refundable tax credit disproportionately benefits households with positive tax liabilities — flattens effective progressivity for middle-income families with children.
references:
- Teuerungs-Entlastungspaket II (BGBl. I Nr. 93/2022)
- BMF Familienbonus evaluation 2023

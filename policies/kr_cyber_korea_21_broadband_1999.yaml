policy_id: kr_cyber_korea_21_broadband_1999
status: candidate
title: Cyber-Korea 21 broadband-infrastructure programme (1999)
countries:
- KOR
timeframe:
  start: 1999
  end: 2002
  enacted_date: '1999-03-31'
description: 'Cyber-Korea 21 plan announced March 1999 with $11bn investment commitment (public-private blend) across broadband network, digital-content industry, e-commerce infrastructure, and e- government.
  Mandated cost-based local-loop unbundling at KT, competition-facilitation framework for ADSL and cable-modem services. Paired with aggressive apartment-complex density incentives — builders that laid
  fibre achieved higher "cyber- building" certifications. Resulted in Korea becoming world''s highest broadband-penetration country by 2002 (70% of households with >1Mbps access). Foundation for subsequent
  world-leading IT sector.

  '

title: Pakistan 12 October 1999 military coup
countries:
- PAK
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-10-12'
description: 'Military coup 12 October 1999 deposing PM Nawaz Sharif''s elected government. Triggered when Nawaz attempted to dismiss Army Chief General Pervez Musharraf while latter was on flight returning
  from Sri Lanka, and ordered PIA flight PK-805 carrying Musharraf (with 200 passengers) denied landing at Karachi airport. Military units secured PTV, PM residence, and major cities within hours. Musharraf
  landed in Karachi as Chief Executive. Constitution held in abeyance, National Assembly dissolved, Provisional Constitutional Order issued 14 October. Supreme Court''s Zafar Ali Shah v Federation (12 May
  2000) upheld coup under doctrine of necessity with 3-year transition period. Nawaz convicted of hijacking charges (commuted), exiled to Saudi Arabia December 2000.

  '

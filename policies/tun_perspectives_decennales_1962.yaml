# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: tun_perspectives_decennales_1962
status: candidate
title: Tunisia Perspectives Decennales and cooperative planning programme
countries: [TUN]
timeframe: {start: 1962, end: 1969}
description: >
  The 1962 Perspectives Decennales and subsequent development plans under
  Ahmed Ben Salah expanded indicative and administrative planning, cooperative
  agriculture, public enterprise, and state-directed industrial investment. The
  programme attempted to mobilise scarce domestic savings through state
  allocation and cooperative organisation before being curtailed after 1969.
enacted_by:
  - tunisia_bourguiba_state_modernisation_1956_1987
axes_moved:
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Cooperatives and state enterprises displaced private market allocation in agriculture and industry."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Development plans channelled public resources into selected sectors and producer organisations."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Planning expanded public investment and the administrative apparatus of development."
references:
  - "Tunisia, Perspectives Decennales de Developpement 1962-1971"
  - "Waterbury (1970), The Commander of the Faithful: The Moroccan Political Elite, comparative Maghreb planning discussion"
  - "Perkins (2014), A History of Modern Tunisia"

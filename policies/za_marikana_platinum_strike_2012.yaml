policy_id: za_marikana_platinum_strike_2012
status: candidate
title: Marikana Massacre and Platinum Sector Labour Rupture (South Africa, 2012)
countries:
- ZAF
timeframe:
  start: 2012
  enacted_date: '2012-08-16'
description: 'On 16 August 2012 South African Police Service officers shot 34 striking Lonmin platinum miners at Marikana, following a wildcat strike by rock drill operators outside the recognised NUM bargaining
  structure. The event catalysed a structural shift in platinum-sector labour relations toward AMCU, a 2014 five-month platinum-sector strike, and erosion of the tripartite alliance''s labour leg. The Farlam
  Commission (report 2015) found serious failings by SAPS and the mining companies. No single statute was enacted, but subsequent sectoral bargaining regimes and the 2017 National Minimum Wage policy trace
  partly to the rupture.

  '
enacted_by:
- southafrica_zuma_anc_2009_2018
coalition_label_at_enactment: ANC

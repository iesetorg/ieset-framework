policy_id: italy_bassanini_administrative_reform_1997
status: candidate
title: Italy Bassanini Administrative Reform 1997
countries:
- ITA
timeframe:
  start: 1996
  end: 1998
description: 'Laws 59/1997 and 127/1997, drafted by Public Function Minister Franco Bassanini under the Prodi government, devolved administrative responsibilities to regions and municipalities, simplified
  business- startup procedures via "one-stop shops" (sportelli unici), introduced self-certification to replace bureaucratic clearances, and reformed civil-service hiring. The package was widely seen as
  the most ambitious post-war attempt to streamline Italian public administration and reduce regulatory frictions.

  '

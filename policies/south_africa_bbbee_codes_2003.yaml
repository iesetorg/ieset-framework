policy_id: south_africa_bbbee_codes_2003
status: candidate
title: South Africa Bbbee Codes 2003
countries:
- ZAF
timeframe:
  start: 1994
  end: ongoing
description: 'The Broad-Based Black Economic Empowerment Act 53 of 2003 codified scoring requirements (Codes of Good Practice gazetted 2007) measuring firm-level transformation across ownership, management,
  employment equity, skills development, and procurement. Compliance is enforced through public-procurement preference scoring and sectoral charters administered by the Department of Trade, Industry and
  Competition.

  '
enacted_by:
- south_africa_anc_post_apartheid_1994_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Procurement preferencing functions as an off-budget transfer to BBBEE-compliant firms.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Distributional reforms outside SARB mandate kept inflation-targeting framework insulated.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Employment-equity scorecards constrain hiring discretion and shift firm staffing decisions.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Charter-based scoring eased some entry criteria for compliant entrants but raised them for others.

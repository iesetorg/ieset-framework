policy_id: us_bretton_woods_exit_1971
status: candidate
title: Bretton Woods Exit 1971
countries:
- USA
timeframe:
  start: 1971
  end: 1974
description: 'On 15 August 1971 President Nixon announced the suspension of dollar convertibility into gold, alongside a 90-day wage and price freeze and a 10% import surcharge — the package known as the
  "Nixon shock." The unilateral closure of the gold window collapsed the Bretton Woods fixed exchange-rate system; after failed restoration attempts at the December 1971 Smithsonian Agreement, major currencies
  floated by 1973, ushering in the modern fiat-money era of flexible exchange rates.

  '

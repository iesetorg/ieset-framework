title: Airline Deregulation Act 1978
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'The Airline Deregulation Act (Pub. L. 95-504), signed by President Carter in October 1978, phased out the Civil Aeronautics Board''s authority over commercial air-carrier routes and fares,
  transferring market entry, pricing, and exit decisions to airlines themselves. The CAB was sunset by 1985, removing decades of federal cartel-style economic regulation while retaining FAA safety oversight.
  The reform is canonical in U.S. deregulation literature for opening route competition, lowering real airfares, and triggering carrier consolidation.

  '

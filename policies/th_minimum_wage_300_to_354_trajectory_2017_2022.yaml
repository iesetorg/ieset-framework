policy_id: th_minimum_wage_300_to_354_trajectory_2017_2022
status: candidate
title: Thailand minimum wage 300-354 baht trajectory (2017-2022)
countries:
- THA
timeframe:
  start: 2017
  end: 2022
description: 'Stepwise increases in the daily minimum wage under the NCPO and PPRP-led governments, building on the 300-baht national floor introduced under Yingluck Shinawatra in 2012-2013. Tripartite
  National Wage Committee (government-employer-worker) decisions raised the floor to 305-310 baht (January 2017 by province), 308-330 baht (April 2018), 313-336 baht (January 2020), and 328-354 baht (October
  2022). Rates are set by province under a 10-tier schedule rather than by a single national number. The 2020 and 2022 adjustments came below initial tripartite-committee worker-side demands and were held
  down during the COVID shock period.

  '
enacted_by:
- thailand_prayut_junta_pprp_2014_2023
coalition_label_at_enactment: NCPO then PPRP-led coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory floor raised but trajectory moderate relative to inflation.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Wage floor is a regulatory transfer from employers to workers, not a fiscal transfer.
references:

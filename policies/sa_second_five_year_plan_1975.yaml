policy_id: sa_second_five_year_plan_1975
status: candidate
title: Saudi Arabia Second Five-Year Development Plan 1975-1980
countries:
- SAU
timeframe:
  start: 1975
  end: 1980
description: 'The Second Five-Year Plan (1975-80), announced May 1975, programmed ~$142bn of capital spending — a nine-fold increase over the First Plan — financed by the 1973-74 oil-price quadrupling.
  Priorities were physical infrastructure (roads, ports, power, desalination), industrial cities (Jubail east-coast, Yanbu west-coast), health/education expansion, and defense. Absorption bottlenecks (cement,
  labour, ports) generated severe inflation in 1976-77. Plan set the template for Saudi state-capitalist capital-spending cycles.

  '

policy_id: vn_state_economic_groups_soe_expansion_2006_2012
status: candidate
title: Vietnam 'economic groups' SOE expansion (Vinashin / Vinalines era)
countries:
- VNM
timeframe:
  start: 2006
  end: 2013
description: 'Decree 101/2009/ND-CP and a series of Prime-Ministerial decisions established and expanded ''state economic groups'' (tập đoàn kinh tế nhà nước) modelled on Korean chaebol — Vinashin (shipbuilding,
  est. 2006), Vinalines (shipping, restructured 2007), PetroVietnam, EVN, VNPT, Vinacomin, Vinatex and others — receiving directed bank credit, land, cross-guarantees and implicit sovereign backing. The
  programme peaked in 2008-09 then unwound: Vinashin disclosed ~US$4.4bn of unpayable debt in 2010, triggering Fitch/Moody''s downgrades; the Vinalines fraud case broke 2012 with former chairman Dương Chí
  Dũng receiving a death sentence (later commuted). State Bank of Vietnam response included the 2013 VAMC asset-management vehicle and a mandated SOE ''restructuring'' programme slowing rather than reversing
  group expansion.

  '
enacted_by:
- vietnam_dung_pm_2006_2016
- vietnam_trong_era_2011_2024
coalition_label_at_enactment: CPV under Dũng premiership
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Directed credit, cross-guarantees and implicit sovereign support for state economic groups.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Privileged access to credit, land and contracts for groups crowded out private entry in shipbuilding, shipping, telecoms.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Vinashin and Vinalines fraud cases; Transparency International CPI deterioration 2008-2012.
references:

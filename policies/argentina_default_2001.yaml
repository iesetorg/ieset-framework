description: 'Argentina''s sovereign default announced 23 December 2001 by interim President Adolfo Rodríguez Saá, suspending payments on roughly USD 81 billion of public external debt — at the time the
  largest sovereign default on record. Triggered by exhaustion of IMF support and unsustainable Convertibility parity, the default was followed by years of restructuring (2005 and 2010 exchanges) and prolonged
  capital-market exclusion.


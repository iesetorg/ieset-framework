policy_id: portugal_eec_accession_treaty_1985
status: candidate
title: Portugal Eec Accession Treaty 1985
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portugal''s Treaty of Accession to the European Economic Community, signed in Lisbon on 12 June 1985 alongside Spain''s, took effect 1 January 1986 and committed Portugal to phased adoption
  of the customs union, common external tariff, structural funds, common agricultural policy, and free movement of capital and labour over a transition period to 1992-93. Domestic implementation came through
  extensive legislative alignment. The intended effect was to anchor democratic consolidation, force domestic productivity convergence through external competition, and secure EEC structural-fund financing
  for modernisation, marking the formal exit from the Carnation Revolution''s revolutionary phase.

  '
enacted_by:
- portugal_carnation_revolution_1974_1986
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: EEC competition and state-aid rules constrained discretionary domestic licensing of nationalised firms.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Constraint refers to legacy nationalisation regime; accession itself only weakly reset property guarantees.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Customs union opened EEC trade but raised the common external tariff vis-a-vis third countries.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: EEC structural funds added external resources while requiring own-resources contributions.

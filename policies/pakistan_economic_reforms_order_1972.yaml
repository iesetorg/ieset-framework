policy_id: pakistan_economic_reforms_order_1972
status: candidate
title: Pakistan Economic Reforms Order 1972
countries:
- PAK
timeframe:
  start: 1972
  end: 1977
description: 'The Economic Reforms Order 1972, issued by the Bhutto government on 2 January 1972, nationalised 31 large industrial units across ten basic-goods sectors — iron and steel, basic metals, heavy
  engineering, heavy electricals, motor vehicle assembly, tractor plants, heavy and basic chemicals, petrochemicals, cement, and public utilities — without compensation valued at market rates. Management
  was vested in newly created Boards of Industrial Management. The intended effect was to redirect the "commanding heights" of industry to state ownership, redistribute economic power away from concentrated
  business families, and harness scale industries for planned development.

  '

policy_id: cn_austerity_rectification_1988_1991
status: candidate
title: China austerity and rectification programme 1988-1991
countries:
- CHN
timeframe:
  start: 1988
  end: 1991
description: 'Austerity and economic rectification programme launched Sep 1988 under conservative faction (Chen Yun, Yao Yilin, Li Peng) after 1988 price-reform-triggered inflation (18.8% CPI 1988). Credit
  tightening, investment controls, rollback of some price liberalisations, recentralisation of fiscal and planning authority. Targeted ''dual- track economy'' speculators and TVE explosion. Effectively
  paused reform momentum until Deng''s Jan-Feb 1992 Southern Tour.

  '
enacted_by:
- china_tiananmen_austerity_1989_1992
coalition_label_at_enactment: CCP under Li Peng / Jiang Zemin
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Price controls restored for key goods; private-sector/TVE expansion curtailed.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Credit tightening brought inflation from 18.8% (1988) to 3.1% (1990).
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Investment-approval recentralisation.

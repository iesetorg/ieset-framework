  rationale: Central and local subsidies financed insurance premiums for rural enrolees on a per-capita matching basis.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Created a major new in-kind transfer programme covering basic outpatient and inpatient care for rural population.
- axis: regulatory.labour_market_flexibility

policy_id: cn_new_rural_medical_scheme_2003
status: candidate
title: New Rural Medical Scheme 2003
countries:
- CHN
timeframe:
  start: 2002
  end: 2012
description: 'New Cooperative Medical Scheme (NCMS / Xinnonghe) launched in 2003 under the Hu-Wen leadership, providing voluntary subsidised health insurance to rural residents outside the urban-employee
  insurance system. Funded via co-payments from individuals and matched central and local subsidies, the scheme reached over 800 million enrolees by the late 2000s and was later integrated with the Urban
  Resident Basic Medical Insurance.

  '

description: 'Royal Decree M/66 of 6 September 1976 founded Saudi Basic Industries Corporation (SABIC) as a government-owned holding company to develop hydrocarbon-linked heavy industry — petrochemicals,
  fertilisers, metals — anchored in Jubail and Yanbu industrial cities. Initial capitalisation SR 10bn. SABIC became the Gulf''s largest industrial national champion and the template for downstream diversification
  in rentier states.


policy_id: ethiopia_rural_land_nationalisation_1975
status: candidate
title: Ethiopia Rural Land Nationalisation 1975
countries:
- ETH
timeframe:
  start: 1974
  end: 1991
description: 'Proclamation No. 31/1975 (the Public Ownership of Rural Lands Proclamation) abolished private and feudal land tenure across Ethiopia, vested all rural land in the state, and reorganised cultivators
  into peasant associations responsible for redistribution and quota delivery. The reform ended the imperial-era gult and rist tenancy systems and underpinned the Derg''s broader collectivisation drive
  by tying rural households to state-controlled grain procurement.

  '

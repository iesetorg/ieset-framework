description: 'SB 32 (2016), the successor to AB 32, codified a binding statewide target of 40% greenhouse gas reductions below 1990 levels by 2030 and authorised the California Air Resources Board to design
  enforcement mechanisms — primarily through extension of cap-and-trade through 2030 (under AB 398) and an updated Scoping Plan. It locked in California''s mid-decade decarbonisation trajectory after AB
  32''s original 2020 target had been substantially met.

  '

policy_id: tcd_common_framework_debt_treatment_2022
status: candidate
title: Chad G20 Common Framework debt treatment 2022
countries:
- TCD
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-11-11'
description: 'Chad reached a debt-treatment agreement with official and private creditors under the G20 Common Framework in 2022, including arrangements with major oil-linked commercial creditors. The
  treatment aimed to restore debt sustainability through contingency mechanisms and creditor coordination after oil-price and security shocks, supporting IMF-backed fiscal stabilization.

  '
enacted_by:
- chad_deby_transition_fifth_republic_2021_present
scope: national
coalition_label_at_enactment: Transitional government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Debt treatment supports fiscal consolidation by reducing rollover pressure and conditioning fiscal policy on sustainability.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: The creditor agreement formalized repayment and contingency terms rather than relying on ad hoc arrears or unilateral restructuring.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Common Framework coordination increased transparency and rules around public debt management.
references:
- IMF and World Bank, Chad Common Framework debt-treatment statements and debt sustainability analyses, 2022.
- G20 and Paris Club creditor-committee materials on Chad's Common Framework treatment.
notes: 'The treatment delivered limited nominal debt reduction; the coding emphasizes formal creditor coordination and fiscal-risk management.

  '

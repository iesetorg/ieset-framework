  direction: +
  magnitude: strong
  intended: true
  rationale: State-directed investment drive to ~35% GDP at peak.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Substantial turnkey plant imports and hard-currency borrowing from West.
references:

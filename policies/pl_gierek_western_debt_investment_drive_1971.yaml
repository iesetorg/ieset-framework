policy_id: pl_gierek_western_debt_investment_drive_1971
status: candidate
title: Polish Gierek 'big push' Western-debt-financed investment drive 1971-1976
countries:
- POL
timeframe:
  start: 1971
  end: 1976
description: 'Gierek-era doctrine of debt-financed rapid industrial modernisation via Western credits and turnkey plant imports (FSO Polonez Fiat- licensed car, Katowice steel mill, shipyards, petrochemicals).
  External debt grew from ~$1bn (1970) to ~$25bn (1980), making Poland the most indebted COMECON member. Investment share of GDP peaked ~35% in 1975 but export-revenue growth fell far short of debt-service
  obligations after 1979 Volcker real-rate shock.

  '

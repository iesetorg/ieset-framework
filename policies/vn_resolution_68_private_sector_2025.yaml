title: Resolution 68-NQ/TW on private-sector development
countries:
- VNM
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-05-04'
description: 'Politburo Resolution 68-NQ/TW, issued 4 May 2025 under General Secretary Tô Lâm, for the first time declares the private sector ''the most important driver of the national economy'' — a rhetorical
  upgrade from the 2017 Resolution 10''s ''important driver'' formulation and from the constitutional ''leading role of the state sector'' framing. Sets numerical targets: at least 2 million operating enterprises
  and a private-sector share of GDP of 55-58% by 2030, with private-sector contribution to state budget revenue of ~35-40%. Commits to reducing business-condition regulations by at least 30% by 2025, unblocking
  SME access to land and credit, eliminating inspection duplication, and providing legal protections against criminalisation of ''routine'' commercial disputes. Paired with a draft Private-Sector-Development
  Law being prepared for the NA autumn session. Read in IESET terms as the most decisive pro- private-sector doctrinal shift since the 2005 Enterprise Law.

  '

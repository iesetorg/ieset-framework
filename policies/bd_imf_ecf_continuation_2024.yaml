policy_id: bd_imf_ecf_continuation_2024
status: candidate
title: IMF ECF/EFF/RSF programme continuation and augmentation
countries:
- BGD
timeframe:
  start: 2024
  end: ongoing
description: 'The interim government continued the $4.7bn IMF Extended Credit Facility / Extended Fund Facility / Resilience and Sustainability Facility programme approved January 2023 and negotiated an
  augmentation to ~$5.3bn in mid-2024, preserving conditionality on crawling-peg FX liberalisation (May 2024), revenue mobilisation (VAT broadening, income-tax file expansion), subsidy rationalisation (electricity,
  fertiliser), and financial-sector reform.

  '
enacted_by:
- bangladesh_yunus_interim_2024_present
- bangladesh_hasina_al_fourth_term_2019_2024
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  rationale: FX liberalisation and tariff rationalisation under conditionality.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  rationale: Electricity and fertiliser subsidy reduction under programme.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  rationale: Rate-cap removal; move to policy-rate-based framework.
references:
- IMF Country Report 23/66, 24/133 (Bangladesh ECF/EFF/RSF)

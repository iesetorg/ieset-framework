policy_id: se_reduktionsplikt_rollback_2024
status: candidate
title: Biofuel blending mandate (reduktionsplikt) rollback — Sweden 2024
countries:
- SWE
timeframe:
  start: 2024
  enacted_date: '2024-01-01'
description: 'Reduction of the Swedish biofuel blending obligation (reduktionsplikt) for diesel and petrol to the EU minimum (6% for 2024-2026) from the prior escalator schedule that had been set to reach
  30.5% for diesel by 2030. Stated motives: lower pump prices, reduce cost-of-living burden, avoid over-commitment to imported biofuels. Klimatpolitiska rådet assessed the change as making the national
  2030 transport emissions target unreachable.

  '
enacted_by:
- sweden_kristersson_rightbloc_2022_present
coalition_label_at_enactment: M + KD + L cabinet with SD support
axes_moved:
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Blending obligation cut to EU floor; national transport emissions path undone.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pump-price relief acts as an effectively regressive transfer relative to the prior mandate.

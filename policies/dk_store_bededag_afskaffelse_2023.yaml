policy_id: dk_store_bededag_afskaffelse_2023
status: candidate
title: Abolition of Store Bededag (Great Prayer Day) as Danish public holiday 2023
countries:
- DNK
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-02-28'
description: 'Lov nr. 229 af 28. februar 2023 abolished Store Bededag (the fourth Friday after Easter) as a public holiday from 2024 onward, converting it to a regular working day. The stated rationale
  was to raise structural labour supply and generate fiscal revenue equivalent to roughly 0.4% of GDP to help finance the NATO-mandated uplift of Danish defence spending to 2% of GDP. Adopted narrowly over
  strong trade-union opposition (FH general protests) on the argument that historic collective agreements had priced the holiday into wages.

  '
enacted_by:
- denmark_frederiksen_sap_broad_2019_present
coalition_label_at_enactment: Socialdemokratiet + Venstre + Moderaterne (SV+M)
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue raised earmarked for defence-spending uplift to 2% of GDP.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: One additional statutory working day per year raises effective labour supply.
references:

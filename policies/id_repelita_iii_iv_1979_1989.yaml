policy_id: id_repelita_iii_iv_1979_1989
status: candidate
title: Repelita III and IV five-year plans (Indonesia 1979-1989)
countries:
- IDN
timeframe:
  start: 1979
  end: 1989
description: 'Bappenas-drafted five-year development plans — Repelita III (1979-84) and Repelita IV (1984-89). Repelita III emphasised equity, employment and regional balance amid oil-boom windfall; Repelita
  IV pivoted to export diversification and private-sector role after oil-price decline 1982-1986. Implementation included Krakatau Steel, IPTN aircraft (Habibie), Inpres rural public-works and BULOG rice-supply
  operations.

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Heavy-industry SOE build-out (Krakatau, IPTN); BULOG rice subsidies.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Oil-boom-funded development-budget expansion; Inpres rural public works.
- axis: regulatory.trade_openness
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Repelita IV pivoted to export diversification but retained substantial import protection.
references:

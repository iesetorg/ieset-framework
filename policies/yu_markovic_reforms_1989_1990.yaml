description: 'Prime Minister Ante Marković''s shock-therapy package — 18 December 1989 package: currency convertible new dinar (10,000:1 redenomination) pegged to DM, wage freeze, price liberalisation for
  most goods, privatisation law permitting sale of social-ownership enterprises, end of BOAL dismemberment, IMF stand-by. Inflation fell from 1,300% to single digits by mid-1990. But 1990 multi-party republican
  elections brought nationalist governments in Slovenia, Croatia, Bosnia that defied federal fiscal-monetary discipline; programme collapsed by late 1990.

  '

policy_id: ie_anglo_irish_nationalisation_2009
status: candidate
title: Anglo Irish Nationalisation 2009
countries:
- IRL
timeframe:
  start: 2008
  end: 2011
description: 'In January 2009, under the Anglo Irish Bank Corporation Act 2009, the Irish state took Anglo Irish Bank into full public ownership after losses linked to commercial property exposure rendered
  private recapitalisation infeasible. The legislation transferred shares to the Minister for Finance, extinguished prior shareholder rights, and committed multi-billion-euro promissory notes that became
  a major driver of subsequent sovereign-debt strain.

  '
enacted_by:
- ireland_cowen_ff_2008_2011

  rationale: Recapitalisation costs crowded out other expenditure, forcing offsetting cuts in subsequent budgets.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: 'Forced re-regulation: state directly took over a private credit institution and tightened bank supervision.'
- axis: fiscal.transfer_expansion

policy_id: pk_foreign_currency_account_freeze_1998
status: candidate
title: Pakistan foreign-currency account freeze (1998)
countries:
- PAK
timeframe:
  start: 1998
  end: 2001
  enacted_date: '1998-05-28'
description: 'Emergency freeze of all resident and non-resident foreign- currency deposits held in Pakistani banks imposed 28 May 1998 immediately after Chagai nuclear tests. Total affected ~$11bn deposits
  held mostly by overseas Pakistanis in US dollar, UK sterling, yen, German mark accounts. Deposits converted to Pakistani rupees at official exchange rate (markedly below unofficial market rate). Some
  withdrawals permitted in rupees. Later partial restoration of deposits with interest via special bonds 2001-2007 under Musharraf''s Shaukat Aziz. Canonical case of modern emerging-market depositor expropriation;
  destroyed Pakistani banking credibility for decade-plus; overseas- Pakistani remittance flows temporarily redirected to informal hawala channels.

  '
enacted_by:
- pakistan_nawaz_sharif_pmln_ii_1997_1999
coalition_label_at_enactment: PML-N supermajority
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Direct expropriation of ~$11bn foreign-currency deposits; forced rupee conversion at adverse rate.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Emergency capital-control imposition on previously-liberalised FCY accounts.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: SBP credibility on FX obligations broken; reserve-build took years to restore.
references:
- SBP Foreign Exchange Rules and Regulations 1998
- Khan & Khan (2007), 'Assessing the Impact of Nuclear Tests on Pakistan's Economy'

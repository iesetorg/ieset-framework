policy_id: be_dexia_rescue_2008
status: candidate
title: Belgium-France-Luxembourg Dexia rescue (2008; 2011)
countries:
- BEL
- FRA
- LUX
timeframe:
  start: 2008
  end: 2014
  enacted_date: '2008-09-30'
description: 'Joint Belgian-French-Luxembourgish recapitalisation of Dexia Group on 30 September 2008 (~€6.4bn) in response to its wholesale-funding collapse after Lehman. Interbank-funding guarantees of
  €150bn envelope (~€90bn Belgium, ~€55bn France, ~€5bn Luxembourg) issued October 2008. Second resolution October 2011 with nationalisation of Dexia Bank Belgium (renamed Belfius, ~€4bn), followed by orderly
  wind-down of residual group under state guarantees to 2014+. Total Belgian exposure peaked at ~15% of GDP — one of the largest bank rescues relative to national output in Europe.

  '

description: 'Formalised in Act 72/2000 Sb. (effective 1 May 2000), the Czech investment-incentive regime offered 10-year corporate-tax holidays, job-creation subsidies, training grants, and discounted
  land to qualifying greenfield FDI projects. Triggered the Czech automotive- sector FDI boom (Toyota-PSA Kolin 2002, Hyundai Nosovice 2006).

  '

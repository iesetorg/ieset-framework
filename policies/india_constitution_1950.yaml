policy_id: india_constitution_1950
status: candidate
title: Constitution of India 1950
countries: [IND]
timeframe:
  start: 1950
  end: ongoing
  enacted_date: "1950-01-26"
description: >
  The Constitution of India, adopted on 26 November 1949 and brought
  into force on 26 January 1950, created a sovereign democratic
  republic with a parliamentary system, federal division of powers,
  justiciable fundamental rights, Directive Principles, and an
  integrated independent judiciary headed by the Supreme Court. It also
  originally protected property through Articles 19(1)(f) and 31, later
  diluted by amendment in the 1970s. The Constitution supplied the
  durable legal and institutional framework of the Indian state after
  independence.
enacted_by:
  - india_constitutional_founding_mixed_economy_1947_1951
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The Constitution established a comprehensive republican legal order with justiciable rights and a durable parliamentary-federal framework."
  - axis: institutional.judicial_independence
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The Supreme Court and high-court structure gave the judiciary autonomous constitutional-review authority."
  - axis: institutional.property_rights
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The original Constitution protected property as a fundamental right before later amendments weakened that status."
references:
  - "Constitution of India"
  - "Austin (1966), The Indian Constitution: Cornerstone of a Nation"

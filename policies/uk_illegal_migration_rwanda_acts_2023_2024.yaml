policy_id: uk_illegal_migration_rwanda_acts_2023_2024
status: candidate
title: UK Illegal Migration Act 2023 and Safety of Rwanda Act 2024
countries:
- GBR
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-07-20'
description: 'Illegal Migration Act 2023 (Royal Assent 20 July 2023) imposed a duty on the Home Secretary to remove those arriving irregularly and restricted their ability to claim asylum in the UK. Safety
  of Rwanda (Asylum and Immigration) Act 2024 (Royal Assent 25 April 2024) legislatively deemed Rwanda a safe country for asylum processing, responding to the November 2023 Supreme Court ruling in AAA v
  SSHD. Paired with a £500m+ treaty payment to Rwanda. No removal flight took place under Sunak; scheme scrapped by Starmer government in July 2024. Skilled Worker salary threshold raised to £38,700 (April
  2024) and student dependant route closed (January 2024).

  '
enacted_by:
- uk_sunak_conservative_2022_2024
coalition_label_at_enactment: Conservative majority (Sunak)
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Statutory restriction of asylum route, raised skilled-worker salary threshold, student dependant closure.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Legislatively overriding the Supreme Court's factual finding on Rwanda is a contested case of legislative versus judicial primacy; weak-negative coding reflects the scoped nature of the override.

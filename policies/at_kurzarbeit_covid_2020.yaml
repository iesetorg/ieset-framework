# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: at_kurzarbeit_covid_2020
status: candidate
title: COVID-19 Kurzarbeit short-time work scheme 2020-2022
countries:
- AUT
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-03-15'
description: 'Emergency expansion of the Austrian Kurzarbeit short-time work scheme during the COVID-19 pandemic across four successive phases (Phase 1: March-Sep 2020, 80-90% net wage replacement; Phase
  2-4 progressively tapered). At peak in April-May 2020, approximately 1.3 million workers (~30% of dependent employment) were in Kurzarbeit. Administered by AMS with treasury backing; bundled with Haertefall-Fonds
  and Fixkostenzuschuss for firms. Total Kurzarbeit outlays ~EUR 9-10 billion 2020-2022, part of a broader COVID-support envelope of ~EUR 50 billion. Credited with keeping measured unemployment below Eurozone
  crisis levels.

  '
enacted_by:
- austria_kurz_ovp_2017_2021
coalition_label_at_enactment: OeVP-Gruene
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: Emergency transfer envelope ~EUR 50bn over 2020-2022 drove deficit/GDP to >8% in 2020; largest Austrian peacetime discretionary spending.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Wage replacement via AMS-administered transfers; temporary architecture that lapsed with phase-out.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Short-time-work subsidy preserves employment matches; intentional frictional-separation suppression.
references:
- Arbeitsmarktservicegesetz Novelle 2020 (COVID-Kurzarbeit-Richtlinie)
- WIFO evaluation of COVID-Kurzarbeit phases 2021, 2022

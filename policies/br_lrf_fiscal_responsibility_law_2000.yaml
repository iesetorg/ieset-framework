title: Lei de Responsabilidade Fiscal (LC 101/2000)
countries:
- BRA
timeframe:
  start: 2000
  enacted_date: '2000-05-04'
description: 'Lei Complementar 101 of 4 May 2000. Imposed binding fiscal rules on federal, state, municipal governments: personnel expenditure ceilings (50% net current revenue federal, 60% states/municipalities),
  consolidated net debt ceilings, prohibition of new spending in last 180 days of mandate without offsetting revenue, public fiscal reporting (RGF/RREO), intergovernmental debt no-bailout. Flagship fiscal-institutional
  reform of modern Brazil.

  '

policy_id: cuba_dual_currency_1994_2021
status: candidate
title: Cuba Dual Currency 1994 2021
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'In 1994 Cuba legalised circulation of the US dollar alongside the peso cubano and later (2004) replaced the dollar with the convertible peso (CUC), creating a long-running dual-currency regime
  with multiple official exchange rates. The split was used to ring-fence hard-currency earnings from tourism, remittances, and joint ventures while shielding state employment from devaluation. The system
  was unified in the 2021 Tarea Ordenamiento.

  '
enacted_by:
- cuba_post_1959_socialist_economy
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Segmented retail networks (CUC vs. CUP shops) blocked price arbitrage and shielded state suppliers.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Multiple non-market exchange rates muddled the value of contracts and savings, weakening property claims.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Implicit cross-rate taxes on hard-currency earners financed peso-denominated wages and transfers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: SOEs accessed FX at favourable internal rates, an off-budget subsidy to the state-enterprise sector.

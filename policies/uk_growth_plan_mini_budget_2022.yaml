description: 'Chancellor Kwasi Kwarteng''s "Growth Plan" of 23 September 2022, presented without OBR forecast, announced the largest unfunded UK tax cuts since 1972: abolition of the 45p additional rate,
  reversal of planned corporation-tax rise, scrapping of the dividend-tax surcharge, and an Energy Price Guarantee. Gilt yields and sterling spiked, the Bank intervened in long-dated gilt markets to defuse
  LDI-driven contagion, and most measures were reversed within weeks under successor Jeremy Hunt.

  '

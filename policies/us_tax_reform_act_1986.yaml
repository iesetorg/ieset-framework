description: 'Tax Reform Act of 1986 (Pub. L. 99-514), signed 22 October 1986. Cut the top individual rate from 50% to 28% in two steps; cut the corporate rate from 46% to 34%; eliminated passive-loss shelters;
  repealed the investment tax credit; broadened the tax base; raised capital gains rate from 20% to 28%. Designed as revenue-neutral static. Bipartisan — Packwood/Bradley/Gephardt/Kemp/Kasten negotiation
  with Baker-Darman in Treasury.

  '

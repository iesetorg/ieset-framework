policy_id: mx_electricity_industry_law_reform_2021
status: candidate
title: Mexican Ley de la Industria Eléctrica reform — CFE-first dispatch (2021)
countries:
- MEX
timeframe:
  start: 2021
  enacted_date: '2021-03-09'
description: 'Reform to the Ley de la Industria Eléctrica (DOF 9-mar-2021) reordering grid dispatch priority to favour CFE-owned generation (hydro, thermal, combined cycle) over private renewables, revoking
  self-supply permits issued under the 2013 model and enabling CFE review of legacy CEL certificates. Heavily litigated — SCJN in April 2022 struck key provisions by simple-majority but fell short of the
  8-vote supermajority needed to invalidate generally; parallel constitutional reform attempt (2022) failed to clear the 2/3 threshold.

  '

policy_id: uae_jafza_free_zone_1985
status: candidate
title: Jafza Free Zone 1985
countries:
- ARE
timeframe:
  start: 1971
  end: ongoing
description: 'Establishment of the Jebel Ali Free Zone (JAFZA) in Dubai by Emiri decree, providing 100% foreign ownership, full repatriation of capital and profits, multi-decade corporate tax holidays,
  and exemption from import/export duties for businesses operating within the zone. JAFZA became the template for subsequent Gulf free zones and a key driver of Dubai''s transition into a re-export logistics
  hub.

  '

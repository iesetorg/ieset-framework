description: 'Banking Companies (Acquisition and Transfer of Undertakings) Ordinance promulgated 15 Apr 1980 (enacted as Act 1980) nationalised six more banks with deposits above INR 200 crore: Andhra Bank,
  Corporation Bank, New Bank of India, Oriental Bank of Commerce, Punjab & Sind Bank, Vijaya Bank. Extended the 1969 first-wave nationalisation of 14 banks; brought ~91% of Indian commercial banking deposits
  under state ownership.

  '

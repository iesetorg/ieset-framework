policy_id: no_salmon_resource_rent_tax_2023
status: candidate
title: Salmon farming resource-rent tax (grunnrenteskatt havbruk)
countries:
- NOR
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-05-31'
description: 'Grunnrenteskatt on salmon and trout aquaculture at 25% effective rate on economic rent above a production-volume allowance, on top of the ordinary 22% corporate rate. Støre government proposed
  40% in September 2022; the parliamentary compromise in May 2023 settled at 25% with standard deduction and production allowance design refinements. Revenue shared between state and host municipalities
  via the existing havbruksfond distribution mechanism. Rationale: capture site-specific economic rents accruing to licensed sea-pen operators along the Norwegian coast, analogous to petroleum special tax.

  '
enacted_by:
- norway_store_ap_sp_2021_present
coalition_label_at_enactment: AP–Sp minority (SV supply)
axes_moved:
- axis: fiscal.tax_capital
  direction: +
  magnitude: moderate
  intended: true
  rationale: 25% special tax on sector-specific rents raises effective taxation of licensed aquaculture capital.
- axis: fiscal.sectoral_subsidy
  direction: '0'
  magnitude: weak
  rationale: Rent capture rather than net subsidy; production allowance insulates small operators.
references:

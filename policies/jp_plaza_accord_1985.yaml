description: 'Agreement signed 22 Sep 1985 at the Plaza Hotel New York by G5 finance ministers (Japan, US, West Germany, France, UK) to engineer coordinated USD depreciation against yen and DM. USD/JPY
  moved from ¥240 (Sep 1985) to ¥150 (end-1987) — ~40% yen appreciation. BoJ easing to offset yen-shock (discount rate cut from 5% to 2.5% by Feb 1987) fed the 1986-1990 asset bubble.

  '

- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Microcredit-financed handloom and rural enterprise activity expanded informal export-linked subcontracting.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax exemptions and concessional refinance lines effectively subsidised microcredit operations.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Underwrote rural self-employment and informal-sector hiring outside formal labour-law coverage.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Government and donor refinance to Grameen functioned as a quasi-transfer to low-income borrowers.

policy_id: bangladesh_grameen_bank_ordinance_1983
status: candidate
title: Bangladesh Grameen Bank Ordinance 1983
countries:
- BGD
timeframe:
  start: 1982
  end: ongoing
description: 'Grameen Bank Ordinance 1983 (later Grameen Bank Act 2013) chartered Muhammad Yunus''s microfinance pilot as a specialised statutory bank, combining group-liability lending to rural and predominantly
  female borrowers without conventional collateral. The ordinance gave Grameen Bank tax exemptions, borrower-majority ownership, and supervisory autonomy from Bangladesh Bank''s commercial-banking rules;
  it became the institutional template for global microfinance.

  '

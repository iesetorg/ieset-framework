title: Angola incremental oil and gas production incentive decree 2024
countries:
- AGO
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-11-20'
description: 'Angola adopted a presidential decree creating incentives for incremental oil and gas production, aimed at slowing mature-field decline and attracting additional upstream investment. The decree
  fits a resource-sector industrial policy pattern: it changes fiscal and contractual terms for qualifying output so that operators develop marginal barrels and gas that would otherwise be uneconomic under
  the standard regime.

  '

description: 'Hard border closure, managed isolation and quarantine (MIQ), and short sharp level-4 lockdowns pursued an elimination rather than mitigation strategy through 2020-21, delivering one of the
  OECD''s lowest COVID mortality rates. Paired with a NZ$62bn COVID Response and Recovery Fund wage-subsidy + business-support package and an RBNZ Large Scale Asset Purchase + Funding for Lending programme
  that expanded the central bank balance sheet sharply.

  '

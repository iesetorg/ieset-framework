policy_id: ecuador_banking_resolution_1999_2000
status: candidate
title: Ecuador Banking Resolution 1999 2000
countries:
- ECU
timeframe:
  start: 2000
  end: ongoing
description: 'Following the 1999 sucretización-era banking collapse, Ecuador imposed a deposit freeze (feriado bancario, March 1999), created the Agencia de Garantía de Depósitos (AGD) under Law 98-17 to
  intervene and resolve insolvent banks, and ultimately liquidated or absorbed roughly half the banking system. Resolution work continued through dollarisation in early 2000, recapitalising surviving banks
  under tighter prudential supervision.

  '
enacted_by:
- ecuador_dollarisation_2000
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Resolution machinery reduced political pressure on the central bank to act as lender of last resort.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Closure of insolvent banks contracted the broad money supply during resolution.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Legal AGD framework eventually clarified depositor seniority and creditor recovery in failing banks.
- axis: regulatory.financial_deregulation
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Tighter post-crisis supervision combined with state takeovers cut both ways on financial liberalisation.

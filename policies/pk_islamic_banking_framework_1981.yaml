policy_id: pk_islamic_banking_framework_1981
status: candidate
title: Islamic banking / profit-loss-sharing framework (Pakistan 1981)
countries:
- PAK
timeframe:
  start: 1981
  end: 1985
  enacted_date: '1981-01-01'
description: 'State Bank of Pakistan directive Jan 1981 required commercial banks to introduce profit-loss-sharing (PLS) deposit accounts alongside conventional accounts. By Jul 1985 all commercial bank
  funds (except fixed deposits existing before 1985) were to be on an interest-free basis. Banking Companies Ordinance amended 1984 to accommodate new instruments (Musharaka, Modaraba, Murabaha). Implementation
  widely described as ''interest by another name'' — markup-financing dominated.

  '
enacted_by:
- pakistan_zia_ul_haq_military_islamisation_1977_1988
coalition_label_at_enactment: Military government (Zia)

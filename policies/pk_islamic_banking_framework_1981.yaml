  magnitude: moderate
  intended: true
  rationale: Reshaped banking-sector architecture with state-directed PLS instrument requirements — tighter regulation.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Ambiguity over enforceability of interest contracts; later Riba rulings compounded uncertainty.

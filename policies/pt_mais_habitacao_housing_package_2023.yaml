policy_id: pt_mais_habitacao_housing_package_2023
status: candidate
title: Portugal Mais Habitação housing package (Lei 56/2023)
countries:
- PRT
timeframe:
  start: 2023
  enacted_date: '2023-10-06'
description: 'Costa PS-majority government''s omnibus response to Lisbon/Porto housing price pressure. Promulgated by President Marcelo Rebelo de Sousa on 6 October 2023 after initial veto. Key provisions:
  (a) termination of the real-estate track of the Autorização de Residência para Atividade de Investimento (ARI / golden visa); (b) licence freeze on new Alojamento Local (short-term-rental) registrations
  outside low-density interior municipalities; (c) rent-cap formula capping new-lease uplifts at prior-year CPI + 2% where landlord applies above-formula; (d) contested forced-leasing mechanism for vacant
  habitable dwellings in declared urban pressure zones (application scope narrow in practice); (e) VAT reduction on construction of affordable housing; (f) ''Porta 65'' youth rent-subsidy expansion. Partial
  rollback begun under Montenegro government 2024 via Construir Portugal package, which removed the forced-lease article and loosened the rent-cap formula.

  '
enacted_by:
- portugal_costa_ps_2015_2024
coalition_label_at_enactment: PS absolute majority
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  rationale: AL licence freeze, rent-cap formula, and forced-lease mechanism tighten sectoral regulatory grip on housing.
  intended: true
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  rationale: Golden-visa real-estate track ended; other investment channels retained so the cross-border channel is narrowed rather than closed.
  intended: true
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  rationale: Forced-leasing provision and rent-cap formula reduce landlord property control at the margin; contested constitutionally.
  intended: false

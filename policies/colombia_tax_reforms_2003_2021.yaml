description: 'Sequence of Colombian tax reforms across the Uribe-Santos-Duque period, including the 2012, 2014, 2016, 2018, and 2021 laws (''Ley de Inversion Social'' Ley 2155 of 2021). Cumulatively raised
  effective corporate-tax revenue, broadened the VAT base, introduced wealth-tax surcharges, modernised tax administration at DIAN, and aligned cross-border rules with OECD/BEPS standards.

  '

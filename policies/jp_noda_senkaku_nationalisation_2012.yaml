policy_id: jp_noda_senkaku_nationalisation_2012
status: candidate
title: Noda Senkaku Nationalisation 2012
countries:
- JPN
timeframe:
  start: 2011
  end: 2012
description: 'In September 2012 the Noda cabinet purchased three of the five Senkaku/Diaoyu Islands from their private Japanese owner for approximately JPY 2.05 billion, formally placing them under central
  government ownership. The "nationalisation" was framed by Tokyo as defensive against a Tokyo- metropolitan acquisition bid; Beijing responded with widespread anti-Japan protests, customs delays and a
  sustained boycott of Japanese consumer brands that materially affected bilateral trade.

  '

policy_id: sa_grand_mosque_religious_empowerment_1979
status: candidate
title: Post-Grand-Mosque religious establishment empowerment 1979-1980
countries:
- SAU
timeframe:
  start: 1979
  end: 1980
description: 'Response to the 20 November 1979 Grand Mosque seizure by Juhayman al-Otaybi''s followers (514 dead in two-week siege) plus the November 1979 Qatif Shia uprising. Royal Al Saud response sharply
  expanded budgets and authority of religious police (mutawwa / CPVPV), expanded clerical control of girls'' education and media standards, cancelled liberalising reforms (women news presenters, cinema
  openings), and increased international religious-institution funding. The institutional arrangement constrained women''s workforce participation and product- market entry for decades.

  '

policy_id: japan_railway_nationalisation_act_1906
status: candidate
title: Japan Railway Nationalization Act 1906
countries: [JPN]
timeframe:
  start: 1906
description: >
  The Railway Nationalization Act brought the trunk network of major private railways
  under state ownership in 1906-1907, with compensation largely paid in government
  bonds. The measure is central to prewar Japanese state-building: it gave the state
  direct control over core transport infrastructure, improved network coordination for
  freight and mobilisation, and reduced the role of competing private trunk-line firms
  in a sector treated as strategic rather than merely commercial.
enacted_by:
  - japan_prewar_state_building_social_incorporation_1906_1931
coalition_label_at_enactment: "Imperial government under Saionji Kinmochi"
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Control over trunk-rail entry, pricing, and coordination shifted decisively toward the state."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Nationalisation displaced private trunk-line competition with a state-run network."
references:
  - "Railway Nationalization Act (1906)"
  - "Free (2008), Government Railways and the Meiji State"

policy_id: cog_fuel_price_adjustment_2023_2024
status: candidate
title: Republic of Congo fuel-price adjustment 2023-2024
countries:
- COG
timeframe:
  start: 2023
  end: 2024
description: 'The Republic of Congo implemented fuel-price increases under its IMF-supported adjustment programme to reduce costly fuel subsidies and improve fiscal space. The phased price adjustments moved
  pump prices closer to cost-recovery levels while the government tried to protect priority social and investment spending during a debt-stabilisation programme.

  '
enacted_by:
- congo_sassou_forest_fiscal_adjustment_2020_present
scope: national
coalition_label_at_enactment: Sassou Nguesso government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Higher retail fuel prices reduce the fiscal transfer embedded in below-cost fuel sales.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Subsidy reduction supports deficit control and debt sustainability under the ECF.
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Price adjustments loosen the bindingness of administered fuel-price controls.
references:
- IMF, Republic of Congo 2024 Article IV Consultation and ECF review materials on fuel-subsidy reform.
- Government of the Republic of Congo budget and fuel-price adjustment announcements, 2023-2024.
notes: 'Fuel prices remained administered; the coded direction captures reduced subsidy intensity rather than full liberalisation.

  '

policy_id: france_progressive_income_tax_1914
status: candidate
title: France general income tax law 1914
countries: [FRA]
timeframe:
  start: 1914
  end: 1914
  enacted_date: "1914-07-15"
description: >
  The Law of 15 July 1914 created the general income tax that reformers
  around Joseph Caillaux had pursued for years. The new instrument added a
  progressive tax on total household income above the existing schedular
  taxes and gave the French state a more modern direct-revenue base just
  before the First World War. Although wartime finance soon transformed
  the fiscal context, the 1914 statute was the decisive break with a
  system dominated by older indirect and proportional levies and became a
  durable anchor of tax progressivity in French public finance.
enacted_by:
  - france_radical_republican_reform_1901_1914
axes_moved:
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The reform introduced a progressive national income tax on overall household income, materially increasing direct-tax progressivity."
references:
  - "Loi du 15 juillet 1914 portant creation de l'impot general sur le revenu"
  - "Assemblee nationale, Institution de l'impot sur le revenu"

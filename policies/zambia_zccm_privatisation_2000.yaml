policy_id: zambia_zccm_privatisation_2000
status: candidate
title: Zambia Zccm Privatisation 2000
countries:
- ZMB
timeframe:
  start: 1991
  end: 2001
description: 'Zambia Consolidated Copper Mines (ZCCM), the Kaunda-era state mining conglomerate that produced most of the country''s copper, was unbundled and sold to foreign mining houses in March 2000
  after a protracted negotiation. The principal Konkola, Mufulira, and Nchanga assets were transferred via Development Agreements granting tax stability and royalty concessions. The state retained a minority
  stake through ZCCM Investments Holdings, the legacy holding entity.

  '
enacted_by:
- zambia_msunwe_structural_adjustment_1991_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Broke ZCCM's vertically integrated state monopoly into competing private mining houses across the Copperbelt.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: FDI from Anglo American, Glencore, and others reintegrated Zambian copper into global producer networks.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminated chronic ZCCM operating losses requiring treasury subsidy and Bank of Zambia credit lines.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Development Agreements provided contractually enforceable mineral rights with stability clauses.

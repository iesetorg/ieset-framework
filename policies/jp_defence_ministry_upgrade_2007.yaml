policy_id: jp_defence_ministry_upgrade_2007
status: candidate
title: Japan Defence Agency to Ministry upgrade 2007
countries:
- JPN
timeframe:
  start: 2007
  enacted_date: '2007-01-09'
description: 'Upgrade of the Japan Defence Agency (Bōei-chō) to full cabinet-level Ministry of Defence (Bōei-shō) effective 9 January 2007 under Law No. 118 of 2006 during the first Abe cabinet. The change
  elevated the Defence Minister to full cabinet rank equal to other portfolios, expanded authority to submit budget and personnel requests directly to cabinet rather than through the Cabinet Office, and
  formally established overseas missions as a "primary" rather than "ancillary" SDF function. Doctrinally significant as the most material institutional step in Japan''s post-Cold-War normalisation of defence
  posture prior to the 2015 collective-self-defence legislation.

  '

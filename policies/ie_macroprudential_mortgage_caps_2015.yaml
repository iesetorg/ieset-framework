policy_id: ie_macroprudential_mortgage_caps_2015
status: candidate
title: Macroprudential Mortgage Caps 2015
countries:
- IRL
timeframe:
  start: 2011
  end: 2017
description: 'In February 2015 the Central Bank of Ireland introduced binding loan-to-value and loan-to-income mortgage caps under SI 47/2015 (Housing Loan Requirements Regulations), capping LTI at 3.5x
  income and applying tiered LTV limits with defined "allowance" portions for banks. The framework, refined in subsequent annual reviews, reshaped Irish mortgage-credit conditions and is regarded as a textbook
  macroprudential intervention against credit-driven house-price cycles.

  '
enacted_by:
- ireland_kenny_fg_labour_2011_2017
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced mortgage-credit growth limited stamp-duty and VAT receipts that would otherwise have funded extra spend.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Direct quantitative caps on mortgage origination tightened banking regulation versus the pre-crisis baseline.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Regulation operates on borrowers/lenders rather than altering the corporate-tax regime.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  intended: true
  rationale: 'Macroprudential tool: no direct fiscal transfer channel.'

policy_id: india_indian_councils_act_1909
status: candidate
title: Indian Councils Act 1909 (Morley-Minto reforms)
countries: [IND]
timeframe:
  start: 1909
  end: 1919
  enacted_date: "1909-05-25"
description: >
  The Indian Councils Act 1909 expanded the Imperial Legislative Council
  and provincial legislative councils, introduced an elective principle
  into council membership, and widened members' ability to discuss
  budgets and move resolutions. At the same time, executive power
  remained firmly with the Viceroy and governors, and the act
  introduced separate Muslim electorates that institutionalised communal
  representation. It was the first major constitutional reform of
  twentieth-century British India and the base from which later Raj-era
  representative institutions expanded.
enacted_by:
  - india_late_raj_constitutional_devolution_1909_1947
axes_moved:
  - axis: institutional.rule_of_law
    direction: mixed
    magnitude: weak
    intended: true
    rationale: "Elected membership and wider legislative debate modestly broadened representative accountability, but separate electorates and strong executive override limited equal civic treatment."
references:
  - "Indian Councils Act 1909"
  - "Metcalf & Metcalf (2012), A Concise History of Modern India"

policy_id: south_africa_social_grants_expansion_1998
status: candidate
title: South Africa Social Grants Expansion 1998
countries:
- ZAF
timeframe:
  start: 1994
  end: ongoing
description: 'South Africa''s Social Assistance Act 59 of 1992 was extended post-apartheid through the Child Support Grant in 1998, with subsequent age-bracket expansions through 2012. Administered by SASSA
  (from 2006), the means-tested cash-transfer system grew to cover the Old Age Grant, Disability Grant, and CSG reaching roughly a third of the population by the late 2010s.

  '
enacted_by:
- south_africa_anc_post_apartheid_1994_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: CSG and pension expansions are the single largest social-spending build-up of the ANC era.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Grant rule-based indexation kept fiscal-monetary tensions outside discretionary SARB territory.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reservation-wage effect of CSG/OAP marginally reduces effective labour-supply flexibility.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Grant-disbursement contracting (e.g. CPS/Net1) generated sector-specific licensing concerns.

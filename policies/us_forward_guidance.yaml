policy_id: us_forward_guidance
status: candidate
title: Forward Guidance
countries:
- USA
timeframe:
  start: 2008
  end: 2014
description: 'Forward guidance refers to the Federal Reserve''s communication-based monetary easing tool used at the zero lower bound, in which the FOMC publicly committed to keeping the federal funds rate
  near zero — first via "extended period" language (March 2009), then explicit calendar dates (Aug 2011), then state-contingent thresholds tied to unemployment and inflation (Dec 2012, the "Evans rule").
  By shaping expectations of future short rates, forward guidance lowered longer-term yields without additional balance-sheet expansion.

  '

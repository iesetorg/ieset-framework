description: 'Republic Act 7718 amended RA 6957 Build-Operate-Transfer Law broadening PPP scope to more than 18 infrastructure categories including telecommunications, water/sewerage, and social infrastructure.
  Allowed unsolicited proposals with Swiss-challenge procedure. Enabled 1990s Philippine infrastructure boom — IPPs, NAIA Terminal III, MRT-3, power generation. Legacy contracts (take-or-pay power provisions)
  generated later fiscal liability disputes.

  '

status: candidate
title: Eswatini FY2024/25 SACU revenue fiscal adjustment
countries:
- SWZ
timeframe:
  start: 2024
  end: 2025
description: 'Eswatini used the FY2024/25 budget period and elevated Southern African Customs Union transfers to strengthen fiscal balances, reduce arrears, and contain public-debt pressures. The adjustment
  approach emphasized saving part of the temporary customs-revenue windfall, improving cash management, and limiting the procyclical expansion of recurrent spending.

  '

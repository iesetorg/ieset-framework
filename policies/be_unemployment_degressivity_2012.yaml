policy_id: be_unemployment_degressivity_2012
status: candidate
title: Belgium unemployment-benefit degressivity reform (2012)
countries:
- BEL
timeframe:
  start: 2012
  end: 2019
  enacted_date: '2012-07-01'
description: 'Reform steepening the degressivity of Belgian unemployment benefits (Arrêté royal 23 juillet 2012): introducing three additional phases within the second period reducing the replacement rate
  over time, and extending degressivity to cohabiting beneficiaries. Aimed at strengthening re-employment incentives and producing structural budget savings. Controversial within the PS base; moderated
  over subsequent years.

  '

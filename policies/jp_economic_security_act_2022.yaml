policy_id: jp_economic_security_act_2022
status: candidate
title: Japan — Economic Security Promotion Act and chip-sector subsidies (2022)
countries:
- JPN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-05-11'
description: 'Economic Security Promotion Act (Act on Promotion of Ensuring Security by Integrated Implementation of Economic Measures), promulgated 11 May 2022 and phased into force from August 2022 through
  2024. Four pillars: (i) supply-chain resilience for designated "specified critical products" including semiconductors, rare earths, batteries, pharmaceuticals, and advanced materials, with subsidy support
  and government stockpiling; (ii) ex-ante screening of infrastructure operators in 14 critical sectors (telecoms, electricity, finance, water, rail, etc) for foreign-supplied equipment and software; (iii)
  public-private partnership on sensitive emerging technologies with classified programmes; (iv) patent non-disclosure regime for dual-use inventions. Paired with substantial chip-sector subsidy spending
  — ~¥476bn to TSMC Kumamoto Fab 1, additional commitments to Fab 2 and Rapidus (targeting 2nm domestic logic production) and Kioxia/Western Digital memory investment, cumulatively exceeding ¥4tn.

  '

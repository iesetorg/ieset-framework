title: Operação Lava Jato — Petrobras corruption investigation
countries:
- BRA
timeframe:
  start: 2014
  end: 2021
  enacted_date: '2014-03-17'
description: 'Federal Police Operation Car Wash launched 17 Mar 2014 from Curitiba anti-money-laundering probe. Exposed systemic bribery between Petrobras executives, major construction firms (Odebrecht,
  OAS, Andrade Gutierrez, Camargo Corrêa) and political parties (PT, PMDB, PP). Over 2014-2020: ~280 convictions, BRL 4bn+ recovered, Odebrecht plea-bargains exposed cross-LatAm bribery. Key figures: Judge
  Sergio Moro, prosecutor Deltan Dallagnol. Later STF annulments 2021 (Lula convictions vacated on jurisdictional grounds). Reshaped Brazilian + Latin American political economy.

  '

title: Vote of no-confidence removing Imran Khan (2022)
countries:
- PAK
timeframe:
  start: 2022
  end: 2022
  enacted_date: '2022-04-10'
description: 'Successful parliamentary vote of no-confidence passed by the Pakistan National Assembly 174-0 in the early hours of 10 April 2022, removing Prime Minister Imran Khan. First Pakistani prime
  minister removed by constitutional parliamentary mechanism rather than military coup or judicial disqualification. Preceded by Deputy Speaker Qasim Suri''s dismissal of the motion (3 April) which the
  Supreme Court unanimously reversed (7 April) on Article-95 grounds, restoring the Assembly and ordering the vote. Shehbaz Sharif (PML-N) elected Prime Minister 11 April 2022 by the same body. Institutionally
  distinctive as the first executive transition via no-confidence in Pakistani history.

  '

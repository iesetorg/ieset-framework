policy_id: uk_wholesale_market_gas_indexation
status: candidate
title: Wholesale Market Gas Indexation
countries:
- GBR
timeframe:
  start: 2021
  end: ongoing
description: 'The UK''s wholesale-market gas-indexation regime, formalised through Ofgem''s price cap methodology and the merit-order pricing rules of GB electricity and gas markets, links retail energy
  prices and electricity wholesale prices to the marginal cost of natural gas — even when most generation comes from renewables, nuclear, or coal. The intended effect was to maintain established market-design
  principles, but the realised effect during the 2021-2023 European gas shock was to pass through TTF and NBP gas prices into all electricity prices, prompting the Energy Bill Relief Scheme and Energy Price
  Guarantee.

  '
enacted_by:
- uk_energy_cost_regime_2021_2024
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher gas-indexed prices increased the implicit carbon price applied to fossil-fuel users.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reliance on gas-pegged pricing exposed UK consumers to international gas-market shocks.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: EBRS and EPG required large discretionary subsidies to insulate users from indexation pass-through.

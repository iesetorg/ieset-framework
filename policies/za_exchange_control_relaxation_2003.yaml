policy_id: za_exchange_control_relaxation_2003
status: candidate
title: Exchange-Control Relaxation (South Africa, 2003-2008)
countries:
- ZAF
timeframe:
  start: 2003
  end: 2008
description: 'From the 2003 Budget onward National Treasury and SARB progressively relaxed exchange controls for individuals (initial R750,000 foreign investment allowance, raised in subsequent budgets),
  corporates (outward FDI approval thresholds raised), and institutional investors (prudential offshore limits). The reform shifted the control regime from approval-based to prudential-reporting, while
  retaining residual controls.

  '

policy_id: italy_kosovo_participation_1999
status: candidate
title: Italy Kosovo Participation 1999
countries:
- ITA
timeframe:
  start: 1998
  end: 2001
description: 'The D''Alema government supported NATO Operation Allied Force against Yugoslavia from March to June 1999, hosting the bulk of allied air operations from Italian bases (Aviano, Gioia del Colle)
  and contributing combat aircraft, before deploying ground forces to KFOR in Kosovo. As the first major out-of-area NATO combat operation in which Italy played a frontline staging role, participation generated
  supplementary defence outlays, peace-dividend reversals, and refugee-reception spending in the Apulia region.

  '

policy_id: ir_fuel_price_reform_2019
status: candidate
title: Iran Nov 2019 fuel-price tripling and quota reform
countries:
- IRN
timeframe:
  start: 2019
  end: 2019
  enacted_date: '2019-11-15'
description: 'Overnight on 15 Nov 2019 the Rouhani government tripled gasoline prices (from 10,000 to 30,000 rial/litre beyond a 60-litre/month subsidised quota) and announced a redistribution scheme directing
  ~60tn rial of savings to the poorest ~18m households via monthly cash transfers. Announcement triggered nationwide protests across 100+ cities. Security response included nationwide internet shutdown
  (16-22 Nov 2019). Death toll estimates from Amnesty/Reuters ranged from ~300 to ~1,500; thousands arrested. Policy was retained but its legitimacy damage to the Rouhani government was severe.

  '

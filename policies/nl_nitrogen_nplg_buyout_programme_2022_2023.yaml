policy_id: nl_nitrogen_nplg_buyout_programme_2022_2023
status: candidate
title: Netherlands Nationaal Programma Landelijk Gebied (nitrogen buyout programme) 2022-2023
countries:
- NLD
timeframe:
  start: 2022
  end: 2024
description: 'Rutte IV response to the 2019 PAS annulment and the EU Habitats Directive deposition-exceedance obligations. Introduced a legal 50%-by-2030 nitrogen-deposition-reduction target, a EUR ~25bn
  envelope, voluntary and — contested — forced farm buyout schemes (Lbv, Lbv-plus), and provincial "gebiedsprocessen" area plans. Detonated farmer protests, triggered the BBB provincial election surge of
  15 March 2023, and remained partially undelivered at the cabinet''s end; later rolled back by the Schoof coalition.

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  intended: true
  rationale: Binding 2030 50%-reduction target with enforcement through buyout and permit regime.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: EUR ~25bn transitiefonds envelope for farm buyouts and provincial programmes.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Implied threat of forced buyouts (Lbv-plus) raised expropriation concerns even where not used.
references:
- Startnotitie Nationaal Programma Landelijk Gebied 10 June 2022
- Transitiefonds landelijk gebied en natuur (wetsvoorstel; niet tot wet verheven)
- Raad van State 29 May 2019 PAS-uitspraak

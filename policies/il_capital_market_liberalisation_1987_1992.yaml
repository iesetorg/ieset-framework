policy_id: il_capital_market_liberalisation_1987_1992
status: candidate
title: Israeli capital-market liberalisation (1987-1992)
countries:
- ISR
timeframe:
  start: 1987
  end: 1992
description: 'Following the 1985 Stabilisation Plan and the 1983 bank-shares episode, Israel phased in capital-market reforms: progressive unwinding of the 1983 bank-share nationalisation through share
  sales; reduction of earmarked credit allocation; liberalisation of foreign-currency deposit rules for residents; and incremental opening of the current account. Bank of Israel under Frenkel from 1991
  embedded an inflation-targeting framework.

  '

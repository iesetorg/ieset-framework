policy_id: mx_sembrando_vida_2019
status: candidate
title: Sembrando Vida agro-forestry cash transfer (Mexico)
countries:
- MEX
timeframe:
  start: 2019
  end: ongoing
description: 'Agro-forestry programme paying smallholders (~450k beneficiaries, ~1.1m hectares) a monthly stipend (~MXN 6,000) to plant fruit and timber species on their own land in 20 southern and central
  states. Administered by the Secretaría de Bienestar outside the Sagarpa / Sader rural-policy architecture. Included in US-Mexico migration discussions as a rural-retention instrument.

  '

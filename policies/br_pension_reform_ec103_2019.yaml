title: Reforma da Previdência — Constitutional Amendment 103/2019
countries:
- BRA
timeframe:
  start: 2019
  enacted_date: '2019-11-13'
description: 'Emenda Constitucional 103/2019 established minimum retirement ages of 62 (women) and 65 (men) in the general RGPS regime, raised the minimum contribution period, altered the benefit calculation
  formula (100% of average contributions only after 40 years), and harmonised public-sector RPPS rules toward the RGPS baseline with a long transition. Projected fiscal savings ~R$800bn over ten years —
  the largest entitlement reform in Brazilian history by projected savings.

  '

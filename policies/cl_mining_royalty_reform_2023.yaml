policy_id: cl_mining_royalty_reform_2023
status: candidate
title: Royalty Minero — Ley 21.591 copper mining royalty reform (Chile 2023)
countries:
- CHL
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-08-02'
description: 'Boric-era mining-royalty reform (Ley 21.591, enacted 2 August 2023) restructuring the tax regime for large-scale copper producers (>50 000 MT fine copper per year). Replaces the prior Impuesto
  Específico a la Actividad Minera (IEAM) with a two- component regime: a 1% ad-valorem component on copper sales applicable when operating margin is positive, plus a margin- based component with progressive
  brackets up to ~26% on mining margin, capped by a total-effective-burden ceiling relative to corporate tax + royalty combined. Projected incremental revenue ~0.45% of GDP at trend copper prices, with
  ~one third earmarked for municipalities and regional governments via the Fondo Regional para la Productividad y el Desarrollo.

  '

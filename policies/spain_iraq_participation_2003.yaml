description: 'Prime Minister Aznar''s PP government participated in the 2003 US-led coalition in Iraq, deploying Spanish Armed Forces personnel to the multinational Plus Ultra brigade in Diwaniyah. The
  deployment was authorised against majority public opinion, generating fiscal defence-spending obligations and political controversy that contributed to the PP''s defeat in the March 2004 election.

  '

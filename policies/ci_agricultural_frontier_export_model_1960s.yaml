# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ci_agricultural_frontier_export_model_1960s
status: candidate
title: "Agricultural frontier export model"
countries: [CIV]
timeframe: {start: 1960, end: 1993}
description: >
  Cote d'Ivoire promoted cocoa, coffee, timber, and related export agriculture
  by encouraging forest-zone expansion, migrant labour settlement, and producer
  incentives under the slogan that land belonged to those who developed it.
  The strategy generated rapid export growth while embedding unresolved land
  and citizenship tensions into the political economy.
enacted_by:
  - cote_divoire_houphouet_export_developmental_state_1960_1993
coalition_label_at_enactment: "PDCI"
axes_moved:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Growth strategy centred on export agriculture and world-market crop earnings.", intended: true}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "The frontier model depended on migrant labour from within Cote d'Ivoire and neighbouring states.", intended: true}
  - {axis: institutional.property_rights, direction: "mixed", magnitude: moderate, rationale: "Use-based settlement incentives supported production but left formal land claims ambiguous and politically vulnerable.", intended: true}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: moderate, rationale: "Forest-frontier expansion prioritized agricultural conversion over environmental restriction.", intended: true}
references:
  - "Jean-Pierre Chauveau, historical studies of Ivorian land tenure"
  - "Robert Bates, Markets and States in Tropical Africa"

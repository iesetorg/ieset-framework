policy_id: hu_rezsicsokkentes_utility_price_regime_2013_present
status: candidate
title: Rezsicsökkentés — household utility-price cut regime (Hungary, 2013-present)
countries:
- HUN
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2013-01-01'
description: 'Signature Fidesz-branded utility-price regulation reducing household tariffs for natural gas, electricity, and district heating by 10% on 1 January 2013, a further 11% for gas and electricity
  and 10% for district heating on 1 November 2013, and 6.5% for gas in April 2014 — cumulatively ~25% cuts delivered before the 2014 general election. Tariffs frozen thereafter at substantially below-market
  levels, cross-subsidised by state-owned ENKSZ / MVM via industrial tariffs and budgetary support. Delivered through the Hungarian Energy and Public Utility Regulatory Authority (MEKH) under statutory
  authority rather than market-based retail competition (the retail gas/electricity market was effectively re-monopolised around state suppliers). Reform of August 2022 under the inflation and gas-price
  shock narrowed the reduced-tariff entitlement to average-consumption households (~1,729 m³ gas/year; 2,523 kWh electricity/year), with supra-average consumption charged at market-linked prices — first
  material rollback of the regime in a decade.

  '
enacted_by:
- hungary_orban_2010_2022
- hungary_orban_fourth_term_2022_present
coalition_label_at_enactment: Fidesz–KDNP constitutional supermajority (2013 onset under second term)
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Administered household tariffs well below cost-reflective level; re-monopolised retail supply around state-owned MVM/ENKSZ; foreign-owned retailers (RWE, E.ON, GDF) exited or were bought out.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Below-market tariff functions as an in-kind transfer to households; fiscal cost rose sharply in 2022-23 as wholesale gas prices spiked, prompting the August 2022 narrowing.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Below-market retail tariffs reduced household price elasticity and consumption discipline, increasing import-gas demand and Russian-supply exposure through the 2010s.
references:
- Act LIV of 2013 on the reduction of household energy costs
- MEKH tariff decrees 2013-2022
- Government Decree 259/2022 (VII.21.) narrowing the reduced-tariff entitlement
- European Commission — Country Report Hungary, energy-market section, 2019-2023

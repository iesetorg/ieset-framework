# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: lb_bdl_recapitalisation_2025
status: candidate
title: Lebanon Banque du Liban recapitalisation and governance reset (2025)
countries:
- LBN
timeframe:
  start: 2025
  end: ongoing
description: >
  Recapitalisation and governance reset for Banque du Liban after the post-2019
  financial collapse. The policy aims to recognise central-bank losses, rebuild
  credible governance and audit standards, separate fiscal losses from monetary
  operations, and support exchange-rate and banking-sector normalisation as part
  of a wider IMF-aligned restructuring.
enacted_by:
- lebanon_aoun_salam_reconstruction_2025_present
coalition_label_at_enactment: Aoun-Salam reformist technocratic cabinet
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Recapitalisation, loss recognition, and governance repair reduce fiscal dominance over the central bank.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Axis semantic '+' is tighter financial regulation; the package strengthens prudential governance and balance-sheet transparency.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Audits, loss recognition, and depoliticised governance improve accountability in the monetary authority.
linked_hypotheses:
- central_bank_independence_inflation_discipline
- banking_crisis_laeven_valencia_predictors_panel
- financial_market_depth_productivity
references:
- IMF Lebanon Article IV and financial-sector reform recommendations, 2025
- Banque du Liban governance and recapitalisation reform materials, 2025
notes: Created to materialise a declared policy on lebanon_aoun_salam_reconstruction_2025_present.

description: 'Snap presidential election held 7 Feb 1986 pitted Marcos against Cory Aquino-Doy Laurel ticket. COMELEC proclaimed Marcos winner; NAMFREL quick-count showed Aquino ahead; 30 COMELEC tabulators
  walked out citing fraud. Defection of Defense Minister Enrile and AFP Vice Chief Ramos 22 Feb triggered 22-25 Feb EDSA People Power mass civil-disobedience. Marcos airlifted to Hawaii 25 Feb; Corazon
  Aquino sworn in as President.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: by_state_enterprise_retention_1995
status: candidate
title: Belarus state-enterprise retention model
countries: [BLR]
timeframe: {start: 1995, end: ongoing}
description: >
  Belarus retained a large state-owned enterprise sector after independence,
  limiting privatisation and preserving administrative control over major
  industrial employers. The model prioritised employment, output targets, and
  social stability over ownership restructuring and competitive entry.
enacted_by:
  - belarus_lukashenko_state_capitalism_1994_present
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, intended: true, rationale: "Private ownership of strategic industrial assets remained constrained."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, intended: true, rationale: "Dominant state firms and administrative allocation limited competitive entry."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, intended: true, rationale: "State firms received directed support through budgets, banks, and administered inputs."}
references:
  - "EBRD Transition Report, Belarus structural reform indicators"
  - "World Bank Belarus economic updates on SOE sector"

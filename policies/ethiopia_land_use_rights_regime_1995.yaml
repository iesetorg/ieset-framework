policy_id: ethiopia_land_use_rights_regime_1995
status: candidate
title: Ethiopia Land Use Rights Regime 1995
countries:
- ETH
timeframe:
  start: 1991
  end: 2018
description: 'The 1995 Federal Constitution (Article 40) and subsequent Federal Rural Land Administration and Use Proclamations (No. 89/1997 and No. 456/2005) entrenched state ownership of all rural and
  urban land, granting only usufruct (use-rights) leases to households and investors. Regional bureaus administered certifications and lease terms, blocking private freehold sale or mortgage of land while
  permitting long-term commercial leases for plantations, parks, and infrastructure projects under EPRDF planning.

  '
enacted_by:
- ethiopia_eprdf_developmental_state_1991_2018
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Below-market state lease rates effectively subsidised investors granted plantation and park access.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Regional land bureaus controlled allocation, certification, and lease term-setting for all rural land.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Long-term commercial leases attracted FDI agribusiness while restricting market exits and resale.
- axis: institutional.property_rights
  direction: '-'

policy_id: ph_abs_cbn_franchise_denial_2020
status: candidate
title: ABS-CBN broadcast franchise denial
countries:
- PHL
timeframe:
  start: 2020
  enacted_date: '2020-07-10'
description: 'On 10 July 2020, the House of Representatives Committee on Legislative Franchises voted 70-11 to deny the renewal of the 25-year legislative franchise of ABS-CBN Corporation, the country''s
  largest private broadcaster. The expiry on 4 May 2020 and the NTC''s subsequent cease-and-desist order had already forced ABS-CBN off free-to-air television and nationwide radio during the first COVID
  lockdown. President Duterte had publicly campaigned against the renewal from 2017 onward, citing grievances from the 2016 campaign. Regulatory-vehicle effect: loss of licence to operate free-to-air frequencies,
  forcing a business model pivot to cable, digital and content-syndication only; ~11,000 employees separated or redeployed. The Marcos Jr administration has signalled openness to restoring the franchise,
  with bills refiled in the 19th and 20th Congresses but not yet enacted.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban-led House supermajority
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  rationale: Denial of a renewed legislative franchise, paired with NTC cease-and-desist, represented a discretionary state action against the largest media licensee, chilling competitive entry and renewal
    expectations across the sector.
  intended: true
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  rationale: Effective expropriation of a going concern's statutory operating licence on political grounds; asset write-downs and workforce separations without compensation.
  intended: false
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  rationale: Selective legislative and regulatory action against a politically targeted licensee undermines equal treatment principle.
  intended: false
references:

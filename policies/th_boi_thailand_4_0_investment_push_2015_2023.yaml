policy_id: th_boi_thailand_4_0_investment_push_2015_2023
status: candidate
title: Thailand 4.0 and BOI investment-incentive push (2015-2023)
countries:
- THA
timeframe:
  start: 2015
  end: 2023
description: 'Overarching industrial-upgrade narrative introduced by Deputy PM Somkid Jatusripitak from 2015 and formalised under the "Thailand 4.0" branding in 2016. The policy bundle modernised Board
  of Investment (BOI) incentives to prioritise ten targeted S-curve industries: next-generation automotive (including EVs), smart electronics, affluent medical and wellness tourism, agriculture and biotechnology,
  food for the future, robotics, aviation and logistics, biofuels and biochemicals, digital, and medical hub. Post-2017 BOI reform aligned incentives with the EEC Act and introduced merit-based additional
  tax holidays for R&D spending and advanced technology transfer. Complementary programmes included EV-3.0 (2022) and EV-3.5 (2023) packages offering per-vehicle subsidies (up to 150,000 baht) plus excise-tax
  cuts for OEM plants meeting local-production conditions.

  '

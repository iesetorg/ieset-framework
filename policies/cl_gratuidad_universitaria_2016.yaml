policy_id: cl_gratuidad_universitaria_2016
status: candidate
title: Gratuidad en Educación Superior — tuition-free tertiary (Chile 2016-2018)
countries:
- CHL
timeframe:
  start: 2016
  end: ongoing
  enacted_date: '2018-05-29'
description: 'Bachelet II flagship tertiary-education reform. Introduced in the 2016 budget law (Ley de Presupuestos 20.882) as a transitory annual funding mechanism and consolidated by Ley 21.091 of May
  2018. Fully funds tuition for students from the lowest income deciles (initially lowest 50%, subsequently extended) at accredited universities and CFT/IP institutions that accept regulated fee schedules
  and operate without profit motive at the university level. Implementation required fee-ceiling negotiation, institutional accreditation gates, and shifts in financing away from the prior CAE state-guaranteed
  student-loan model. Budget cost has risen materially through 2018-2025 and the coverage ceiling (deciles 1-6 at universities) has been a recurring budget-process contest under both Piñera II and Boric.

  '
enacted_by:
- chile_bachelet_ii_nm_2014_2018
coalition_label_at_enactment: Nueva Mayoría (PS-DC-PPD-PC-PRSD)
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Public financing of tertiary tuition for lower-income deciles; transfer footprint widened by ~0.5% of GDP at full phase-in.
- axis: fiscal.spending_level

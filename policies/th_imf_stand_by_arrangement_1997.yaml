policy_id: th_imf_stand_by_arrangement_1997
status: candidate
title: Thailand IMF Stand-By Arrangement (1997)
countries:
- THA
timeframe:
  start: 1997
  end: 2000
  enacted_date: '1997-08-20'
description: 'IMF Stand-By Arrangement approved 20 August 1997, total package $17.2bn ($4bn IMF, $4bn World Bank, $1.2bn ADB, $8bn bilateral including Japan $4bn). Programme conditions: monetary tightening
  (repo rate to 20%+), fiscal surplus 1% of GDP in first year (later relaxed Q4 1997 after deeper contraction), closure of 56 insolvent finance companies, recapitalisation framework, supervisory strengthening,
  bank-foreign-ownership liberalisation. Signed under Chavalit government, largely implemented under Chuan II government from November 1997. Programme completed June 2000.

  '
enacted_by:
- thailand_chavalit_nap_1996_1997
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: NAP coalition / Democrat-led coalition
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Repo rate to 20%+ under conditions; defensive tightening into crisis.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Fiscal-surplus targets initial; later relaxed as contraction deepened.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Bank and finance-company supervisory overhaul; Basel capital standards enforced.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Bank foreign-ownership cap raised to 100% for 10 years (Alien Business Law amendments).
references:
- IMF Thailand Stand-By Arrangement, 20 August 1997
- Lindgren, Balino et al (1999), 'Financial Sector Crisis and Restructuring'

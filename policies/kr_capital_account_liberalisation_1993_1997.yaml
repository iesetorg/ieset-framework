policy_id: kr_capital_account_liberalisation_1993_1997
status: candidate
title: South Korea capital-account liberalisation 1993-1997
countries:
- KOR
timeframe:
  start: 1993
  end: 1997
description: 'Sequence of capital-account liberalisation measures under Kim Young- sam''s segyehwa (globalisation) agenda including permissive short- term foreign-currency borrowing by 30 merchant banks,
  FDI inflow liberalisation, stock-market opening to foreign investors (25% cap raised from 10%), and bond-market opening. Short-term external debt rose from $40bn (1993) to $97bn (Sep 1997) against $21bn
  forex reserves by Nov 1997 — direct mechanism of the Dec 1997 crisis.

  '

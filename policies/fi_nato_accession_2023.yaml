policy_id: fi_nato_accession_2023
status: candidate
title: Finland NATO accession 2023
countries:
- FIN
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2023-04-04'
description: 'Finland''s accession to the North Atlantic Treaty Organisation, ending 75 years of military non-alignment that followed the 1948 Finno-Soviet Agreement of Friendship, Cooperation and Mutual
  Assistance. Application submitted jointly with Sweden on 18 May 2022, nine weeks after the Russian invasion of Ukraine. Ratified by the Eduskunta 1 March 2023 (184-7); accession instruments deposited
  in Washington 4 April 2023 making Finland the 31st Ally. Extended NATO''s direct land border with Russia by 1,340 km. Complemented by a bilateral Defence Cooperation Agreement with the United States signed
  18 December 2023, authorising US access to 15 Finnish military sites. Policy initiated under the Marin government and completed under the Orpo government with very broad cross-party consensus; public
  support for NATO membership shifted from 20-30 percent pre-invasion to 75-80 percent by April 2022.

  '
enacted_by:
- finland_marin_rainbow_2019_2023
- finland_orpo_rightbloc_2023_present
coalition_label_at_enactment: Initiated under SDP-led Marin rainbow coalition; completed under Kokoomus-Finns-RKP-KD Orpo coalition
axes_moved:
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  rationale: Accession accompanied termination of Russian energy-import dependence (gas, electricity, nuclear fuel) and locked in Western supply integration.

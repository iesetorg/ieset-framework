policy_id: sdn_exchange_rate_unification_2021
status: candidate
title: Sudan exchange-rate unification 2021
countries:
- SDN
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-02-21'
description: >
  Sudan's transitional government and central bank unified the official exchange
  rate with the market rate in February 2021 as part of the IMF-monitored reform
  programme and HIPC debt-relief path. The measure devalued the official rate,
  reduced multiple-rate arbitrage, aimed to restore remittance and export flows
  to formal channels, and paired exchange reform with subsidy and fiscal
  adjustment measures.
enacted_by:
- sudan_post_bashir_transition_conflict_state_2019_present
scope: national
coalition_label_at_enactment: Civilian-military transitional government
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Unification reduced multiple-rate rents that distorted import allocation and market entry.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: A market-clearing exchange rate aimed to shift trade, remittances, and exports back into formal channels.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The reform supported IMF-monitored macro policy and reduced quasi-fiscal exchange-rate distortions.
references:
- Central Bank of Sudan and Ministry of Finance announcements on exchange-rate unification, February 2021.
- IMF and World Bank materials on Sudan's Staff-Monitored Program and HIPC decision point, 2021.
- Reuters and Associated Press reporting on Sudan's February 2021 exchange-rate unification.
notes: >
  The later coup and war severely disrupted the reform environment; this entry
  captures the 2021 policy action and its intended institutional channel.

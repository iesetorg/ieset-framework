# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: cd_gecamines_resource_state_1967
status: candidate
title: "Gecamines resource-state consolidation"
countries: [COD]
timeframe: {start: 1967, end: 1997}
description: >
  Mobutu's government nationalised the Union Miniere du Haut-Katanga legacy and
  built Gecamines into the state-controlled core of Zaire's copper-cobalt
  economy. The mining company became a fiscal, patronage, and foreign-exchange
  pillar of the regime, concentrating strategic resource allocation in the
  presidency and public enterprise system.
enacted_by:
  - zaire_mobutu_mpr_1965_1997
coalition_label_at_enactment: "MPR"
axes_moved:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Strategic mining was concentrated in a state enterprise with politically controlled access.", intended: true}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Mining rents became a major source of public and quasi-public spending.", intended: true}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Foreign mining ownership was displaced by state control.", intended: true}
references:
  - "Crawford Young and Thomas Turner, The Rise and Decline of the Zairian State"
  - "World Bank, Zaire mining-sector historical reports"

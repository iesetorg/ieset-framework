  end: 2024
  enacted_date: '2025-04-11'
description: 'Law N° 32301 (published 11 April 2025, approved in Congress in final form late 2024) amends the statute of the Agencia Peruana de Cooperación Internacional (APCI) to expand state oversight
  of non-governmental organisations receiving international cooperation funds. Key provisions: mandatory APCI registration and prior approval for all international- funded activities, broad grounds for
  cancellation of registration, prohibitions on using international cooperation resources for strategic litigation against the Peruvian state, expanded sanctions with fines up to 500 UIT, reporting obligations
  on expenditures. Critics (IACHR, UN Special Rapporteurs, Coordinadora Nacional de Derechos Humanos) argued the law restricts civic space and targets human-rights, environmental, and anti-corruption NGOs
  investigating executive conduct. Coded negative on institutional.rule_of_law via civil-society-oversight curtailment.

  '

policy_id: belgium_tihange1_extension_2015
status: candidate
title: Belgium Tihange1 Extension 2015
countries:
- BEL
timeframe:
  start: 2003
  end: ongoing
description: 'Loi du 18 décembre 2013 (effective 2015) extending the operating life of the Tihange 1 reactor by ten years to 2025, paired with a parallel 2015 extension for Doel 1 and Doel 2. The Michel
  I government negotiated a EUR 700 million flat fee with operator Electrabel for the rente nucléaire, and required reinvestment in safety upgrades. The amendment partially walked back the 2003 phase-out
  timetable while preserving its end-state schedule.

  '

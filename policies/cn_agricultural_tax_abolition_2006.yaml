description: 'Abolition of China''s agricultural tax effective 1 January 2006 by NPC Standing Committee resolution under the Hu-Wen leadership, ending a national tax dating to imperial-era statecraft and
  replacing rural fiscal extraction with central transfers. Companion measures included abolishing miscellaneous local levies and increasing direct grain-producer subsidies, aiming to narrow urban-rural
  income gaps.

  '

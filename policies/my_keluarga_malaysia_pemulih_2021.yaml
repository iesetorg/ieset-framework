description: 'RM150bn National People''s Well-Being and Economic Recovery Package (PEMULIH), announced 28 Jun 2021 under Muhyiddin and extended under Ismail Sabri''s ''Keluarga Malaysia'' framing. Components
  included Bantuan Keluarga Malaysia cash transfers (RM4.6bn direct outlay to ~9.3m households), wage-subsidy extension, SME financing moratorium continuation, EPF i-Citra withdrawal authorisation (Jul-Dec
  2021, ~RM30bn drawn), bulk-electricity rebates, and RM10bn new direct fiscal injection. Last of the six pandemic-response packages totalling ~RM530bn gross / ~RM83bn direct outlay across 2020-2021.

  '

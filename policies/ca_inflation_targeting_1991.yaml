description: 'Joint Statement of the Government of Canada and the Bank of Canada on Inflation-Control Targets (26 February 1991) under Governor John Crow and Finance Minister Michael Wilson. Established
  first numerical inflation-control targets in G7 — 3% by end-1992, 2.5% by mid-1994, 2% by end-1995 (measured as 12-month CPI). Renewed every 5 years since at 2% midpoint, 1-3% band. Canada and New Zealand
  (1990) were the first two IT adopters globally.

  '

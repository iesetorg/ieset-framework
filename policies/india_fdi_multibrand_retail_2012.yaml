policy_id: india_fdi_multibrand_retail_2012
status: candidate
title: India Fdi Multibrand Retail 2012
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'In September 2012 the Singh government opened multi-brand retail to up to 51% foreign direct investment, subject to state-level opt-in, minimum-investment thresholds, sourcing requirements,
  and back-end-infrastructure conditions. The notified Press Note 5 (2012) under FEMA implemented the change after a delayed earlier attempt; uptake remained limited as several states declined to opt in.

  '
enacted_by:
- india_singh_upa_ii_2009_2014
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Anticipated cold-chain and back-end investment was framed as supporting farmer income transfer.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Required state co-investment in back-end logistics infrastructure as a condition of approvals.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Raised allowed FDI in multi-brand retail from 0% to 51%, easing capital-account restrictions for the sector.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Liberalised entry but added sourcing, city-tier, and minimum-investment conditions.

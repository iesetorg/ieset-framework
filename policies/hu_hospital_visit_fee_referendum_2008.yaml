policy_id: hu_hospital_visit_fee_referendum_2008
status: candidate
title: Hospital Visit Fee Referendum 2008
countries:
- HUN
timeframe:
  start: 2004
  end: 2010
description: 'The 9 March 2008 Hungarian referendum, organised after a Fidesz-led signature drive under the Constitution and Act III of 1998 on referenda, abolished by 84% the HUF 300 hospital visit fee,
  the daily hospital fee, and university tuition fees that had been introduced under the Gyurcsány government''s 2006 austerity. Binding turnout was achieved (50.5%). The intended effect, from the opposition''s
  perspective, was to reverse user-pay reforms and reassert universal-access principles in health and education.

  '

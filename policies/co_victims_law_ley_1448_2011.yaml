description: 'Ley 1448 de 2011 (10 Jun 2011) — Víctimas + Restitución de Tierras — established comprehensive transitional-justice programme for ~8m registered conflict victims. Reparation + land-restitution
  tribunal system, creation of Unidad de Víctimas + Unidad de Restitución de Tierras, truth + administrative-reparations process. Programme extended to 2031 by Ley 2078/2021. Cost through 2023 ~COP 140trn
  (~USD 30bn).

  '

description: 'Michel coalition corporate-tax reform legislated December 2017: phased reduction of the statutory corporate-tax rate from 33.99% to 25% by 2020 (29% + 2% contribution in 2018-2019 then 25%
  from 2020); reduced SME rate to 20% on first €100k taxable profit; base-broadening via minimum tax-base rules for offsets, tightening notional-interest-deduction (ACE) parameters, and tightened CFC/exit-tax
  rules. Accompanied by EU anti-avoidance directive transposition.

  '

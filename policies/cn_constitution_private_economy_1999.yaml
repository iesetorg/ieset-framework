policy_id: cn_constitution_private_economy_1999
status: candidate
title: Constitution Private Economy 1999
countries:
- CHN
timeframe:
  start: 1989
  end: 2002
description: 'March 1999 amendment to the PRC Constitution recognising the private economy as an ''important component'' of the socialist market economy (replacing ''complement'' language) and committing
  the state to protect lawful rights of private firms. Adopted by the Ninth NPC, it constitutionalised the post-1992 expansion of the non-state sector under the Jiang-Zhu leadership.

  '
enacted_by:
- china_jiang_era_1989_2002

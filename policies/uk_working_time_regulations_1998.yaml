policy_id: uk_working_time_regulations_1998
status: candidate
title: Working Time Regulations 1998
countries:
- GBR
timeframe:
  start: 1997
  end: 2005
description: 'The Working Time Regulations 1998, made under the European Communities Act 1972 and effective 1 October 1998, transposed the EU Working Time Directive (93/104/EC) into UK law. The regulations
  established a 48-hour weekly working limit (with individual opt-out), 11 hours daily rest, weekly rest periods, paid annual leave (rising to 5.6 weeks), and special protections for night workers. The
  intended effect was to align Britain''s previously unregulated working-hours regime with EU social-policy minima, after the Blair government dropped John Major''s UK opt-out from the Social Chapter via
  the 1997 Treaty of Amsterdam.

  '
enacted_by:
- uk_blair_first_second_term_1997_2005
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Regulations were enacted alongside the Bank of England Act 1998 inflation-targeting framework.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: 48-hour cap, daily rest, and paid-leave entitlements reduced employer scheduling flexibility.
- axis: fiscal.transfer_expansion

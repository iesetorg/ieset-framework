title: Vietnam Land Law — long-term land-use rights 1993
countries:
- VNM
timeframe:
  start: 1993
  enacted_date: '1993-07-14'
description: 'Land Law 1993 passed 14 Jul 1993 granted farming households long-term land-use rights (20 years for annual crops, 50 years for perennial crops) with certificates, and specified five rights:
  exchange, transfer, lease, inheritance, and mortgage. While land itself remained ''collectively owned by the entire people'' under CPV doctrine, de facto created transferable land-use rights with near-
  ownership characteristics. Foundational for Vietnam''s agrarian productivity growth.

  '

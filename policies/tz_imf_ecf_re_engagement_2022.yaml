policy_id: tz_imf_ecf_re_engagement_2022
status: candidate
title: Tanzania IMF Extended Credit Facility re-engagement 2022
countries:
- TZA
timeframe:
  start: 2022
  end: 2026
  enacted_date: '2022-07-18'
description: 'Tanzania entered a 40-month IMF Extended Credit Facility arrangement in July 2022, marking a return to programmatic IMF engagement after the Magufuli-era rupture over fiscal transparency and
  pandemic management. The programme supported fiscal consolidation, domestic-revenue mobilisation, public financial-management reforms, social-spending floors, and exchange-rate and monetary-policy credibility
  under the Bank of Tanzania.

  '
enacted_by:
- tanzania_suluhu_ccm_2021_present
scope: national
coalition_label_at_enactment: CCM Suluhu government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The ECF anchored fiscal consolidation and controls on lower-priority expenditure while preserving social-spending floors.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Programme conditionality strengthened anti-inflation credibility and reduced fiscal dominance over monetary operations.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-financial-management and fiscal-transparency benchmarks made budget execution more auditable.
references:
- 'IMF, Tanzania: Request for a 40-Month Arrangement Under the Extended Credit Facility, 2022.'
- IMF press release, Executive Board approval of Tanzania ECF arrangement, 2022-07-18.

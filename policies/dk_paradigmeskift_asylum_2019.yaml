policy_id: dk_paradigmeskift_asylum_2019
status: candidate
title: Paradigmeskift — Danish asylum temporary-protection pivot 2019
countries:
- DNK
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2019-02-21'
description: 'Lov nr. 174 af 27. februar 2019 (''paradigmeskift'') recast Danish asylum from an integration frame to a temporary-protection frame: residence permits defaulted to shorter terms subject to
  repeal when origin-country conditions allowed return, family reunification tightened, and the stated government objective shifted to zero spontaneous asylum seekers. Enacted under the outgoing Venstre-led
  VLAK government with Dansk Folkeparti''s decisive support but retained and extended without reversal by the incoming Frederiksen Social-Democrat government from June 2019.

  '

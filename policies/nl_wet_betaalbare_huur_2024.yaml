policy_id: nl_wet_betaalbare_huur_2024
status: candidate
title: Wet Betaalbare Huur — Netherlands mid-market rent regulation 2024
countries:
- NLD
timeframe:
  start: 2024
  enacted_date: '2024-07-01'
description: 'Extended the woningwaarderingsstelsel (points-based rent-setting) from the social-housing segment (<EUR 879 rent) into the mid-market segment up to ~187 points (approximately EUR 1,123 per
  month). Estimated ~300,000 existing mid-market rentals subject to rent rollback to the regulated points-based ceiling. Enacted in caretaker phase by Rutte IV (Hugo de Jonge, Volkshuisvesting); partially
  rolled back for newbuild by the Schoof coalition.

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie (caretaker)
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Rent-regulation coverage extended to mid-market segment previously free-market.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Forced mid-contract rent reductions for existing free-market tenancies raised expropriation concerns among landlord associations.

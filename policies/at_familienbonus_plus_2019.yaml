policy_id: at_familienbonus_plus_2019
status: candidate
title: Familienbonus Plus — EUR 1,500 per child income-tax credit 2019
countries:
- AUT
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2018-07-04'
description: 'Introduced the Familienbonus Plus income-tax credit of EUR 1,500 per child under 18 (EUR 500 per child in education 18-24), offsetting income-tax liability, effective 1 January 2019. Refundable
  portion (Kindermehrbetrag) of EUR 250 for low-income households. Replaced the previous Kinderfreibetrag and childcare-expenses deduction with a simpler and larger credit. Framed as the signature OeVP
  family-policy enactment of the Kurz I period and retained across successor governments (expanded in 2022 Familienpaket).

  '
enacted_by:
- austria_kurz_ovp_2017_2021
coalition_label_at_enactment: OeVP-FPOe
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-refundable tax credit disproportionately benefits households with positive tax liabilities, mildly flattening effective rates for middle-income families.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Refundable Kindermehrbetrag component functions as a transfer to households below the tax-liability threshold.
references:
- Jahressteuergesetz 2018 (BGBl. I Nr. 62/2018)
- BMF Familienbonus implementation guidance 2019

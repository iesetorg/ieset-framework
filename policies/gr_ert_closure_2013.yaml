policy_id: gr_ert_closure_2013
status: candidate
title: Greece ERT public broadcaster sudden closure 2013
countries:
- GRC
timeframe:
  start: 2013
  end: 2015
  enacted_date: '2013-06-11'
description: 'Sudden shutdown of Hellenic Broadcasting Corporation (ERT) on 11 June 2013 via a Joint Ministerial Legislative Act by Finance Minister Stournaras and government-spokesman Kedikoglou, citing
  Memorandum public-employment reduction and opacity of ERT operations. Approximately 2,656 staff laid off; radio and TV signals switched off overnight. Employees continued unauthorised transmission from
  the Agia Paraskevi studios for several weeks. Council of State ruled the shutdown partly illegal but permitted a replacement entity (NERIT, Nea Elliniki Radiophonia Internet Tileorasi) launched May 2014
  with a smaller headcount. Politically the closure precipitated DIMAR (Democratic Left) exit from the governing coalition on 21 June 2013, reducing it to a two-party ND-PASOK government. ERT was formally
  restored by Law 4324/2015 under the incoming Tsipras government, re-employing prior staff.

  '

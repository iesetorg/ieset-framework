# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: tun_code_personal_status_1956
status: candidate
title: Tunisia Code of Personal Status 1956
countries: [TUN]
timeframe: {start: 1956, enacted_date: "1956-08-13"}
description: >
  The Code of Personal Status abolished polygamy, required civil divorce through
  courts, introduced minimum marriage protections, and placed family law under
  a modernising state legal framework shortly after independence. It became the
  central social-reform anchor of Bourguiba's state-building project and
  distinguished Tunisia from many regional personal-status regimes.
enacted_by:
  - tunisia_bourguiba_state_modernisation_1956_1987
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Codified family status in national legislation and shifted divorce into formal courts."
  - axis: institutional.property_rights
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Improved women's legal standing within household and inheritance-related economic life, though inheritance law was not fully equalised."
references:
  - "Republic of Tunisia, Code du Statut Personnel, 13 August 1956"
  - "Charrad (2001), States and Women's Rights"

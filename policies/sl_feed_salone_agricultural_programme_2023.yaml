title: Sierra Leone Feed Salone agricultural programme 2023
countries:
- SLE
timeframe:
  start: 2023
  end: ongoing
description: 'Feed Salone made food security and agricultural transformation a flagship national programme after the 2023 election cycle. The policy directs public coordination, concessional finance, input
  support, mechanization, value-chain development, and market access toward rice, livestock, fisheries, and other food systems with the stated aim of lowering food-import dependence and raising rural productivity.

  '

policy_id: new_zealand_climate_commission_2019
status: candidate
title: Zealand Climate Commission 2019
countries:
- NZL
timeframe:
  start: 2019
  end: ongoing
description: 'He Pou a Rangi — the New Zealand Climate Change Commission — was established as an independent Crown entity by the Climate Change Response (Zero Carbon) Amendment Act 2019. Its statutory mandate
  is to set five-year carbon-budget recommendations to government, monitor adaptation planning, advise on ETS unit-supply settings, and provide annual progress assessments against the 2050 net-zero target
  and the methane-reduction targets specified in the Act.

  '
enacted_by:
- newzealand_ardern_labour_2017_2023
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory budget-setting and progress-monitoring functions provide a ratchet mechanism for tightening climate policy.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Commission advice flows into sector-specific licensing and consenting under the ETS, RMA, and energy regulators.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Recommendations on transition support shape budget-line subsidies for low-emission technology and adaptation grants.
- axis: regulatory.energy_supply_security
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Commission has advisory not directive role in energy security; net first-order effect on supply security is neutral.

description: 'Pezeshkian government authorised indirect Iran-US nuclear talks via Omani mediation, first round 12 Apr 2025 in Muscat followed by rounds in Rome and Muscat through May 2025, led by Foreign
  Minister Abbas Araghchi and US envoy Steve Witkoff. Talks suspended by Israeli "Rising Lion" strikes 13 Jun 2025 and US B-2 operation against Fordow/Natanz/Isfahan 22 Jun 2025. Restarted post-ceasefire
  (24 Jun 2025) focused on post-strike verification and a narrow uranium-cap framework rather than JCPOA-style comprehensive deal. No binding agreement reached through 2025.

  '

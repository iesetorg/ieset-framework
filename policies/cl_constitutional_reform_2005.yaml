description: 'Ley 20.050 of 26 August 2005. Removed authoritarian enclaves from Pinochet-era 1980 constitution: eliminated senadores designados and senadores vitalicios; restored full presidential authority
  over military commanders-in-chief; subordinated COSENA National Security Council to advisory role; shortened presidential term 6→4 years (non-consecutive); 58 articles modified. Lagos signed declaring
  "fully democratic constitution."

  '

policy_id: be_copernic_administrative_reform_2000
status: candidate
title: Copernic Administrative Reform 2000
countries:
- BEL
timeframe:
  start: 1999
  end: 2007
description: 'The "Copernic" reform launched in 2000 by the Verhofstadt I government under Minister Luc van den Bossche restructured the Belgian federal civil service: ministries were reorganised into Federal
  Public Services (FPS) and Programmatory Public Services (PPS), management mandates replaced permanent secretary-general posts, and HR practices were modernised. The aim was to professionalise delivery,
  depoliticise senior appointments, and improve citizen-facing services.

  '

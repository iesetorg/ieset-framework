title: UK Employment Rights Bill 2024
countries:
- GBR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-10-10'
description: 'Introduced to Parliament 10 October 2024, the most substantial employment-law package in a generation. Day-one protection against unfair dismissal (removing the 2-year qualifying period) subject
  to a statutory probation period; ban on exploitative zero-hours contracts with right to guaranteed hours reflecting regular hours worked; restrictions on fire-and-rehire; sectoral collective bargaining
  framework starting with adult social care (Adult Social Care Negotiating Body); simpler trade union recognition and repeal of most of the Strikes (Minimum Service Levels) Act 2023 and Trade Union Act
  2016; strengthened flexible working, parental leave, and statutory sick pay from day one. Most provisions to commence during 2025-2026.

  '

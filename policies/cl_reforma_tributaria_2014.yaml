policy_id: cl_reforma_tributaria_2014
status: candidate
title: Reforma Tributaria — Ley 20.780 (Chile 2014)
countries:
- CHL
timeframe:
  start: 2014
  end: 2020
  enacted_date: '2014-09-29'
description: 'Bachelet II flagship tax reform (Ley 20.780 Sept 2014; simplified by Ley 20.899 Feb 2016). Raised headline corporate tax from 20% progressively to 25% (Régimen Atribuido) and 27% (Régimen
  Semi- Integrado) and introduced a dual semi-integration regime taxing distributed dividends at shareholder level. Introduced green-taxes (CO2 + local-pollutant emissions charges on stationary sources,
  first in Latin America), alcohol/tobacco tier changes, and anti- elusion general rule (NGA). Declared revenue target ~3% of GDP to finance the education + social reform programme; actual yield ran below
  projection through 2016-2018 and motivated the 2020 Modernización Tributaria re-integration under Piñera II.

  '
enacted_by:
- chile_bachelet_ii_nm_2014_2018
coalition_label_at_enactment: Nueva Mayoría (PS-DC-PPD-PC-PRSD)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: Headline rate raised from 20% to 25%/27% phased over 2014-2018.
- axis: fiscal.tax_capital
  direction: +
  magnitude: moderate
  intended: true
  rationale: Semi-integration taxes distributed dividends at shareholder level with 65% credit for corporate tax paid.
- axis: regulatory.environmental_stringency

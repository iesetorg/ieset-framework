description: 'Agreement ("Atomkonsens") of 14 June 2000 between the Schröder Red- Green government and German nuclear utilities to phase out nuclear power: per-reactor residual-electricity quotas allocated,
  no new- build, implicit end-of-life ~2022. Codified in the Atomgesetz amendment of 26 April 2002. (Merkel extended and then reversed course 2010-2011.)

  '

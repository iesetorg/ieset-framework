policy_id: cy_commercial_admiralty_court_2022
status: candidate
title: Cyprus Commercial Court and Admiralty Court reform 2022
countries:
- CYP
timeframe:
  start: 2022
  end: ongoing
description: 'Cyprus enacted legislation creating specialised Commercial Court and Admiralty Court jurisdiction for higher-value commercial disputes and maritime cases. The reform moved selected business
  and admiralty litigation out of the ordinary civil-court queue, with the stated aim of reducing delay, improving judicial specialisation, and strengthening Cyprus as a venue for commercial dispute resolution.

  '
enacted_by:
- cyprus_justice_labour_reform_2022_present
scope: national
coalition_label_at_enactment: Anastasiades Democratic Rally administration
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Specialist courts are intended to improve contract-enforcement speed and predictability for commercial and maritime disputes.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Faster, specialised adjudication strengthens enforceability of commercial claims and secured maritime interests.
references:
- Cyprus Commercial Court and Admiralty Court legislation, enacted 2022
- European Commission, 2024 Rule of Law Report - Country Chapter Cyprus

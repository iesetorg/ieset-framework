policy_id: jp_boj_rate_normalisation_2006_2007
status: candidate
title: Bank of Japan ZIRP exit and rate normalisation 2006-2007
countries:
- JPN
timeframe:
  start: 2006
  end: 2007
  enacted_date: '2006-07-14'
description: 'Bank of Japan under Governor Toshihiko Fukui exited quantitative easing March 2006 and raised policy rate from 0% to 0.25% on 14 July 2006, then to 0.50% on 21 February 2007 — the first policy-rate
  hike cycle after six years of zero-interest-rate policy. Decision rested on judgement that deflation had ended on a sustained basis (core-core CPI turning mildly positive) and that housing/asset markets
  required incremental normalisation. With hindsight the hikes proved premature — deflation returned 2009 — and the episode is frequently cited (including by Abe II / Kuroda in 2013) as justification for
  the subsequent QQE commitment.

  '

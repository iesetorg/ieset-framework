policy_id: my_1mdb_scandal_2009_2018
status: candidate
title: Malaysia 1MDB sovereign-wealth-fund fraud 2009-2018
countries:
- MYS
timeframe:
  start: 2009
  end: 2020
  enacted_date: '2009-07-27'
description: '1Malaysia Development Berhad (1MDB), established 27 July 2009 under Finance Minister / PM Najib Razak as strategic development fund, became vehicle for one of the largest kleptocracy frauds
  on record. US Department of Justice estimated ~$4.5bn misappropriated via joint ventures with PetroSaudi (2009), Aabar Investments bond transactions (2012-2013), and TIA/subsidiaries, with proceeds traced
  to Jho Low, Najib''s personal accounts (RM 2.6bn deposited via Tanore Finance Corp, initially claimed as "Saudi royal donation"), Hollywood film financing (Red Granite — Wolf of Wall Street etc.), luxury
  real estate in New York, LA, London, and Riza Aziz''s luxury-asset purchases. Led to Goldman Sachs criminal DPA ($3.9bn settlement), arrests of Malaysian officials, Najib 2020 conviction on SRC International
  abuse-of-power charges, Federal Court affirmation 2022, 12-year sentence. Canonical modern-era sovereign-wealth-fund-fraud case.

  '

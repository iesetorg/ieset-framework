description: 'After Israeli "Rising Lion" air campaign 13-24 Jun 2025 against Iranian nuclear sites, missile production, air defence, and senior IRGC/military leadership, and US B-2 strike on Fordow, Natanz,
  and Isfahan 22 Jun 2025, a US-brokered ceasefire came into effect 24 Jun 2025. Iranian retaliatory strikes on Israel and on Al Udeid US base in Qatar preceded ceasefire. Iranian nuclear programme substantially
  degraded (IAEA reporting of weeks-to-months setback at Natanz, longer at Fordow). Rial depreciated past 1,000,000/USD during campaign peak. Ceasefire held through end-2025 with residual low-intensity
  exchanges. Reopened space for indirect nuclear talks (see ir_nuclear_talks_reopening_oman_2025).

  '

policy_id: eg_morsi_sukuk_law_2013
status: candidate
title: Morsi Sukuk Law 2013
countries:
- EGY
timeframe:
  start: 2012
  end: 2013
description: 'In May 2013, the Morsi government promulgated the Sovereign Sukuk Law, providing a domestic legal framework for sharia-compliant securitisation backed by usufruct rights over public assets.
  Designed to broaden financing options after IMF talks stalled, the law drew opposition from al-Azhar, the judiciary, and secular parties over land-alienation risks; it was never fully implemented before
  the regime''s July 2013 collapse.

  '

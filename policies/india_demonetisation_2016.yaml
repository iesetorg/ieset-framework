policy_id: india_demonetisation_2016
status: candidate
title: India Demonetisation 2016
countries:
- IND
timeframe:
  start: 2016
  end: 2017
description: 'On 8 November 2016 Prime Minister Modi announced, by RBI notification under the Reserve Bank of India Act 1934, that all INR 500 and INR 1000 banknotes would cease to be legal tender at midnight,
  replaced over weeks via deposit- swap windows. The action was framed as targeting black money, counterfeit currency, and terror financing; in practice it triggered a sharp short-run liquidity contraction
  and accelerated digital-payments adoption.

  '

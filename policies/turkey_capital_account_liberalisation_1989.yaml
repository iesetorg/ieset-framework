policy_id: turkey_capital_account_liberalisation_1989
status: candidate
title: Turkey Capital Account Liberalisation 1989
countries:
- TUR
timeframe:
  start: 1983
  end: 1993
description: 'Turkey''s Decree 32 of 11 August 1989, issued by the Ozal government under the Law on the Protection of the Value of Turkish Currency, lifted the principal restrictions on capital movements
  — permitting Turkish residents to hold foreign currency, foreigners to hold lira assets, and full convertibility for current and capital transactions on the basis of declared ceilings. The intended effect
  was to complete Turkey''s transition from the import-substitution era, unlock external financing for the post-1980 export-led model, and prepare the ground for the 1990s'' integration into international
  capital markets — even at the cost of greater external-shock exposure.

  '

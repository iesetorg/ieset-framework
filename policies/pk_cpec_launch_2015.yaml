policy_id: pk_cpec_launch_2015
status: candidate
title: China-Pakistan Economic Corridor — Phase 1 launch (2015)
countries:
- PAK
timeframe:
  start: 2015
  end: 2020
  enacted_date: '2015-04-20'
description: 'China-Pakistan Economic Corridor framework signed during Xi Jinping''s Islamabad visit on 20 April 2015, initial envelope $46bn later expanded to ~$62bn. Phase 1 front-loaded on energy generation
  (Sahiwal coal 1,320MW, Port Qasim coal 1,320MW, Karot hydro, Thar coal mine-mouth projects, LNG regasification terminals), road infrastructure (Karakoram Highway Phase II, Multan-Sukkur motorway M-5),
  and Gwadar port / free-zone development. IPP tariffs guaranteed via sovereign take-or-pay capacity-payment contracts; financing mix of Chinese policy-bank concessional debt and Chinese-equity IPPs with
  sovereign guarantees. Resolved the 12-18h/day load-shedding that had constrained Pakistani industrial output for a decade; subsequently generated capacity-overhang and circular-debt issues from 2019 onward.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: my_mco_movement_control_order_2020
status: candidate
title: Mco Movement Control Order 2020
countries:
- MYS
timeframe:
  start: 2020
  end: 2021
description: 'Effective 18 March 2020, Malaysia''s Movement Control Order (MCO) was issued under the Prevention and Control of Infectious Diseases Act 1988 and the Police Act 1967, closing borders, schools,
  mosques, and non-essential businesses, and restricting interstate travel. The order was renewed and recalibrated through a sequence of phases (CMCO, RMCO, MCO 2.0/3.0) and was paired with PRIHATIN, PENJANA,
  and subsequent stimulus packages to absorb the resulting shock to household incomes and SME cash flow.

  '
enacted_by:
- malaysia_muhyiddin_pn_2020_2021
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: MCO-induced income loss triggered Bantuan Prihatin Nasional and wage-subsidy cash transfers to households and SMEs.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: PRIHATIN and follow-on stimulus packages totalling roughly RM 305 billion were authorised to offset MCO-driven contraction.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Bank Negara cut the OPR and offered loan-moratorium and special funds for MCO-affected SMEs alongside the order.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory closures and essential-services lists narrowed market participation and entrenched incumbent online retailers.
linked_hypotheses_inferred:
- unfunded_fiscal_expansion_above_zlb_bond_market_response
- universal_transfer_programmes_labour_force_participation_decline
- fiscal_multipliers_zlb_higher_than_normal_regime
- japan_stagnation_wellbeing_outcomes
- soviet_union_central_planning_gdp_collapse_1989_1991
- abenomics_monetary_fiscal_coordination_effect
- price_controls_shortage_effect
- fiscal_multipliers_state_dependent

policy_id: pk_zarb_e_azb_2014
status: candidate
title: Operation Zarb-e-Azb — North Waziristan counter-terrorism (2014)
countries:
- PAK
timeframe:
  start: 2014
  end: 2017
  enacted_date: '2014-06-15'
description: 'Pakistan Armed Forces joint counter-terrorism operation launched 15 June 2014 in North Waziristan Agency following the Jinnah International Airport Karachi attack. Cleared sanctuary of Tehrik-i-Taliban
  Pakistan (TTP), East Turkestan Islamic Movement (ETIM), Islamic Movement of Uzbekistan, Haqqani-adjacent and foreign-fighter networks. ~1 million civilians temporarily displaced; substantial reduction
  in TTP attack tempo within Pakistan in subsequent years. Followed by the 16 December 2014 Army Public School Peshawar attack and the National Action Plan (Dec 2014) which added civilian counter-terrorism
  components including military courts under the 21st Amendment and mass executions following lifted moratorium. Institutional and rule-of-law implications flagged through military-court jurisdiction over
  civilians.

  '
enacted_by:
- pakistan_nawaz_sharif_pmln_iii_2013_2017
coalition_label_at_enactment: PML-N government + military leadership (COAS Raheel Sharif)
axes_moved:

policy_id: my_capital_gains_tax_2024
status: candidate
title: Capital Gains Tax on unlisted share disposals (Malaysia, 2024)
countries:
- MYS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-01'
description: 'First broad-based capital-gains tax in Malaysian history, enacted via the Finance (No. 2) Act 2023 and effective 1 January 2024 (with a transitional exemption window to 29 February 2024).
  Applies to disposal of unlisted Malaysian company shares by companies, LLPs, trust bodies and cooperatives — at 10% of net gain or 2% of gross disposal value for pre-2024-acquired shares (taxpayer election);
  non-listed foreign shares taxed on remittance basis. Listed-share disposals remain exempt. Intended as a structural revenue base broadening measure; part of the Madani fiscal consolidation.

  '
enacted_by:
- malaysia_anwar_unity_2022_present
coalition_label_at_enactment: Pakatan Harapan + Barisan Nasional Unity Government

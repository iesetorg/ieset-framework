policy_id: id_jokowi_omnibus_job_creation_2020
status: candidate
title: Omnibus Law on Job Creation (UU Cipta Kerja) 2020
countries:
- IDN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-11-02'
description: 'UU No. 11/2020 (re-enacted as Perppu 2/2022 and UU 6/2023 after a 2021 Constitutional Court ruling of conditional unconstitutionality) revised 79 statutes simultaneously to simplify business
  licensing, ease foreign-investment entry (revised Negative Investment List to Positive Investment List), weaken severance obligations and minimum- wage rigidity, narrow outsourcing restrictions, and streamline
  environmental impact assessment. The largest single deregulatory package in post-Reformasi Indonesia. Bundled creation of the OSS single-window licensing system and tax incentives. Generated the largest
  street protests of Jokowi''s second term.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
- indonesia_reformasi_1998_present
coalition_label_at_enactment: PDI-P-led KIM+ super-coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  intended: true
  rationale: Reduced severance cap, new minimum-wage formula tied to GDP/inflation, expanded fixed-term and outsourcing scope.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: OSS single-window, Positive Investment List, consolidated business licensing.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Narrowed AMDAL scope and public-participation requirements.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: 2021 MK ruling of conditional unconstitutionality; re-enactment by Perppu in 2022 bypassed normal legislative process.

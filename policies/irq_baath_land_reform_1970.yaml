# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: irq_baath_land_reform_1970
status: candidate
title: Iraq Ba'ath land reform 1970
countries: [IRQ]
timeframe: {start: 1970, end: 1975}
description: >
  The Ba'ath government renewed and deepened republican land reform through
  ceilings on holdings, redistribution, tenancy changes, and state support for
  cooperative and public agricultural organisation. The programme was meant to
  weaken landlord power and integrate the countryside into the party-state's
  development project.
enacted_by:
  - iraq_baath_oil_statism_1968_1979
axes_moved:
  - axis: institutional.property_rights
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Holding ceilings and redistribution reduced large landowners' security of title."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Cooperative organisation and state procurement reduced market allocation in agriculture."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Credit, inputs, and administrative support were targeted to the restructured rural sector."
references:
  - "Farouk-Sluglett and Sluglett (2001), Iraq Since 1958"
  - "Batatu (1978), The Old Social Classes and the Revolutionary Movements of Iraq"

description: 'The four Nigerian Tax Reform Bills (Nigeria Tax Bill, Nigeria Tax Administration Bill, Nigeria Revenue Service Bill, Joint Revenue Board Bill) drafted by the Presidential Committee on Fiscal
  Policy and Tax Reforms chaired by Taiwo Oyedele, submitted to the National Assembly 3 October 2024. Consolidates 62 overlapping federal-state-local taxes, raises PIT exemption threshold, introduces progressive
  top PIT rate, phases VAT from 7.5% toward 10%, and reallocates VAT sharing more heavily to consumption states. Passed after contested 2024-2025 NASS debate, opposed by northern governors on the VAT derivation
  formula.

  '

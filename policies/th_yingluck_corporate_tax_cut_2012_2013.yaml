description: 'Phased reduction of Thailand''s standard corporate-income-tax rate from 30% to 23% (tax year 2012) and to 20% (tax years 2013-2014, subsequently extended) via Royal Decree No. 530 of 20 December
  2011 under the Yingluck government. SME rate structure also lowered. Intended to improve regional competitiveness vs ASEAN peers (Singapore 17%, Malaysia 25%). Implemented alongside minimum-wage hike
  creating a supply-side-plus-demand-side policy mix; corporate-tax cut became the most durable element of the Yingluck programme, retained under subsequent Prayut junta.

  '

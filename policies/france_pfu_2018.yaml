policy_id: france_pfu_2018
status: candidate
title: France Pfu 2018
countries:
- FRA
timeframe:
  start: 2017
  end: 2019
description: 'The Prélèvement forfaitaire unique (PFU), introduced in the 2018 finance law, applied a flat 30% levy (12.8% income tax plus 17.2% social contributions) on dividend, interest, and capital-gains
  income, replacing the prior progressive schedule that could exceed 60% at the margin. The flat tax aimed to simplify capital taxation and align France''s effective rate on portfolio income with peer European
  jurisdictions, reducing dispersion across asset classes.

  '

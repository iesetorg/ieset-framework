  enacted_date: '2016-12-15'
description: 'Emenda Constitucional 95/2016 (PEC 241/55) froze Brazilian federal primary spending in real terms (indexed to IPCA) for 20 fiscal years starting 2017. Exceptions required new constitutional
  amendment or triggered sanctions on discretionary spending. The rule bound the Union budget (not states / municipalities) and applied across all powers. It was the most contractionary constitutional fiscal
  rule enacted by a major economy in the 2010s. PEC 95 was effectively retired in 2023 by Lula III''s Novo Arcabouço Fiscal (LC 200/2023).

  '

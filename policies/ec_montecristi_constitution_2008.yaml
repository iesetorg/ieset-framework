description: 'New constitution drafted by Asamblea Constituyente de Montecristi, approved by referendum 28 Sep 2008 (63.9% Yes), promulgated 20 Oct 2008. Introduced buen vivir / sumak kawsay as framework-goal,
  rights of nature, expanded economic-sector strategic state role, Plurinational- Intercultural State recognition, indefinite re-election later added via 2015 amendment (then reversed by 2018 referendum).
  Dissolved 2008 Congress; new National Assembly elected Apr 2009.


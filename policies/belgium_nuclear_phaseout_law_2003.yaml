policy_id: belgium_nuclear_phaseout_law_2003
status: candidate
title: Belgium Nuclear Phaseout Law 2003
countries:
- BEL
timeframe:
  start: 2003
  end: ongoing
description: 'The Loi du 31 janvier 2003 sur la sortie progressive de l''énergie nucléaire prohibited new industrial nuclear capacity in Belgium and imposed a 40-year operating-life cap on each existing
  reactor, scheduling Doel 1-4 and Tihange 1-3 closures from 2015 to 2025. Adopted by the Verhofstadt purple coalition under Energy Minister Olivier Deleuze (Ecolo), the framework set the legal baseline
  for two decades of subsequent extension and reversal debates.

  '

status: candidate
title: Malaysia Bantuan Rakyat 1Malaysia (BR1M) cash transfer 2012-2018
countries:
- MYS
timeframe:
  start: 2012
  end: 2018
  enacted_date: '2012-01-01'
description: 'Bantuan Rakyat 1Malaysia (BR1M) cash-transfer programme launched January 2012 under Najib BN government. Initial transfer of RM 500 to households earning below RM 3,000/month; expanded over
  2013-2018 to multi-tier structure (RM 1,200 for households RM 3,000-4,000; RM 450 for single adults RM 2,000-3,000). Peak coverage ~7m households, ~RM 6.3bn annual outlay. Politically central to Najib''s
  2013 election campaign (narrow BN popular-vote loss but seat-count win). Continued by Pakatan Harapan post-2018 under renamed Bantuan Sara Hidup (BSH), then Bantuan Tunai Rahmah (BTR) under later governments
  — durability beyond Najib era illustrates one-way-ratchet of cash-transfer programmes.

  '
enacted_by:
- malaysia_najib_bn_2009_2018
coalition_label_at_enactment: Barisan Nasional (UMNO-led)

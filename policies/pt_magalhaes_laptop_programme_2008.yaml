policy_id: pt_magalhaes_laptop_programme_2008
status: candidate
title: Magalhaes Laptop Programme 2008
countries:
- PRT
timeframe:
  start: 2005
  end: 2008
description: 'The Magalhães programme, launched under the Sócrates government''s e-Escola/e.escolinha digital-inclusion initiative, distributed subsidised "Magalhães" laptops (a Classmate PC variant produced
  by Intel/JP Sá Couto) to primary-school pupils. Funded via a public-private model with operator-subsidised pricing, it aimed to raise digital literacy and ICT exposure across Portuguese households.

  '

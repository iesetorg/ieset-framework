title: Bank of Japan Quantitative Easing (2001-2006)
countries:
- JPN
timeframe:
  start: 2001
  end: 2006
  enacted_date: '2001-03-19'
description: 'Bank of Japan launched Quantitative Easing on 19 March 2001 — world''s first unconventional monetary regime at scale. Policy board shifted operating target from uncollateralised overnight
  call rate to outstanding current-account balances held at the BoJ, initially targeted at ¥5tn, raised through 2004 to ¥30-35tn. Paired with forward-guidance commitment to maintain QE until CPI ex-fresh-food
  became stably non-negative. Also expanded JGB outright purchases and included ABS/ABCP purchases. Lifted on 9 March 2006 when core CPI condition was declared met; overnight target raised to 0.25% on 14
  July 2006.

  '

description: 'Federal Decree-Law No. 8 of 2017 introduced a 5% Value-Added Tax effective 1 January 2018, implementing the GCC-wide VAT framework agreement. Administered by the Federal Tax Authority, the
  broad-based consumption tax applied to most goods and services with limited exemptions for healthcare, education, and certain financial services, diversifying federal revenue away from hydrocarbon proceeds.

  '

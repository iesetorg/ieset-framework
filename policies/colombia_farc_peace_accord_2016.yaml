policy_id: colombia_farc_peace_accord_2016
status: candidate
title: Colombia Farc Peace Accord 2016
countries:
- COL
timeframe:
  start: 2002
  end: 2022
description: 'Final Agreement signed in November 2016 between the Colombian government under President Juan Manuel Santos and the FARC-EP, formally ending more than five decades of armed conflict. Established
  a transitional-justice system (JEP), rural-development and crop-substitution programmes, political participation rules for demobilised combatants, and a victim-reparation regime, ratified by Congress
  after the October 2016 plebiscite rejection.

  '

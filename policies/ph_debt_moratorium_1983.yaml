description: 'Central Bank of the Philippines declared a 90-day moratorium on external debt service payments 17 Oct 1983 following capital flight after the Aquino assassination (21 Aug 1983). External debt
  ~USD24.4bn. Rollover negotiations with IMF-chaired steering committee produced USD2.8bn new money and restructuring 1985. GDP contracted 7.0% 1984 and 6.8% 1985.

  '

policy_id: nl_box3_rechtsherstel_overbrugging_2022_2023
status: candidate
title: Netherlands Box 3 Wet rechtsherstel + Overbruggingswet 2022-2023
countries:
- NLD
timeframe:
  start: 2022
  end: 2024
description: 'Rutte IV response to the Hoge Raad Kerst-arrest of 24 December 2021, which found the fictitious-yield Box 3 wealth-tax regime unlawful where it exceeded real return. Wet rechtsherstel box
  3 (2022) provided refunds for 2017-2022 assessment years where notional yield exceeded category-based deemed yield; Overbruggingswet box 3 (2023-2026) replaced the fictitious system with a categorical
  deemed-return bridge (savings, other assets, debts). Committed to a real-capital-return regime from 2027 (originally 2025, deferred).

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Refund mechanism reduced Box 3 liabilities for low-return assets (savings heavy) relative to prior regime.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Court-forced alignment of tax base with actual return strengthened taxpayer property claims.
references:
- Hoge Raad 24 December 2021 ECLI:NL:HR:2021:1963 (Kerst-arrest)
- Wet rechtsherstel box 3 (Stb. 2022, 533)
- Overbruggingswet box 3 (Stb. 2022, 530)

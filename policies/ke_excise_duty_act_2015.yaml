description: 'Repealed the 1979 Customs and Excise Act and consolidated excise taxation on alcohol, tobacco, motor vehicles, mobile-money transfer fees, and financial-transaction fees. Introduced inflation-indexation
  of specific excise rates and established a standalone excise regime — central to Jubilee-era revenue mobilisation and the basis for subsequent annual adjustments.

  '

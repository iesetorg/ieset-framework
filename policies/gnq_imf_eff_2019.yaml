  enacted_date: '2019-12-18'
description: 'Equatorial Guinea entered a three-year IMF Extended Fund Facility in December 2019 after a prolonged hydrocarbon-revenue downturn. The programme sought fiscal adjustment, domestic revenue
  mobilisation, public-financial-management improvements, arrears and debt control, financial-sector repair, and governance reforms including anti-corruption and hydrocarbon-transparency commitments.

  '

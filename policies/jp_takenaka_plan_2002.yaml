policy_id: jp_takenaka_plan_2002
status: candidate
title: Takenaka Plan / Program for Financial Revival (2002)
countries:
- JPN
timeframe:
  start: 2002
  end: 2005
  enacted_date: '2002-10-30'
description: 'Program for Financial Revival announced 30 October 2002 by Financial Services Minister Heizō Takenaka. Set binding target of halving major-bank NPL ratio from 8.4% (March 2002) to 4.3% by
  FY2004; introduced Discounted Cash Flow method for asset valuation, tightened deferred-tax-asset eligibility in Tier-1 capital, and established forensic asset-quality inspection. Forced Resona Bank into
  effective nationalisation via ¥2tn capital injection (June 2003) after DTA tightening exposed capital shortfall. Accelerated UFJ-Mitsubishi Tokyo Financial Group merger (October 2005). NPL ratio fell
  to 2.9% by March 2005.

  '

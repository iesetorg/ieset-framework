description: 'Extension and deepening of Sadat''s 1974 Infitah (Law 43) via additional free zones (Port Said, Suez, Alexandria), expanded joint-venture banking (Faisal Islamic Bank 1977, first Islamic bank
  in Egypt), and a commercial exchange-rate window running alongside the official rate. Drew Gulf-capital investment and a wave of returning émigré entrepreneurs. Did not dismantle the large public-sector
  core.

  '

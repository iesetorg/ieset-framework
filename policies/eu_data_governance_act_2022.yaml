description: 'Regulation (EU) 2022/868 — the Data Governance Act — sets EU-wide rules on the re-use of protected public-sector data, registers and supervises data intermediation services and "data altruism"
  organisations, and establishes the European Data Innovation Board. It complements the GDPR by enabling controlled, neutral data sharing across sectors and member states under a harmonised governance framework,
  with national competent bodies overseeing intermediaries.

  '

  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic monetary easing supported bumiputera-favoured firms during crisis through directed credit.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Current-account openness preserved while capital-account openness was reduced — net mixed.
- axis: regulatory.financial_deregulation

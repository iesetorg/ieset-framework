policy_id: malaysia_capital_controls_1998
status: candidate
title: Malaysia Capital Controls 1998
countries:
- MYS
timeframe:
  start: 1981
  end: 2003
description: 'Malaysia''s 1 September 1998 capital controls, imposed by Prime Minister Mahathir during the Asian Financial Crisis under exchange-control regulations and Bank Negara directives, fixed the
  ringgit at 3.80/USD, banned offshore ringgit trading, imposed a 12-month repatriation lock-up on foreign portfolio capital, and centralised import payments. The intended effect was to break the speculative
  attack on the ringgit, restore monetary autonomy for cutting interest rates and reflating, and preserve the bumiputera-led growth model without IMF conditionality.

  '
enacted_by:
- malaysia_mahathir_bumiputera_development_1981_2003
axes_moved:

status: candidate
title: BoJ bubble-era easing and abrupt tightening 1987-1991
countries:
- JPN
timeframe:
  start: 1987
  end: 1991
description: 'Bank of Japan cut the official discount rate to a post-war low of 2.5% Feb 1987 and held it there through May 1989, partly under Plaza- Accord pressure to support US rebalancing; Governor
  Mieno tightening from Dec 1989 raised rates to 6.0% by Aug 1990. The sustained easing fed Nikkei 225 to 38,915 peak Dec 1989 and land-price bubble; subsequent tightening punctured asset markets, triggering
  three- decades deflation-adjacent stagnation.

  '

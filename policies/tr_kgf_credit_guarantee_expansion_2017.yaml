policy_id: tr_kgf_credit_guarantee_expansion_2017
status: candidate
title: Credit Guarantee Fund (KGF) expansion (Turkey 2017)
countries:
- TUR
timeframe:
  start: 2017
  end: 2017
  enacted_date: '2017-03-10'
description: 'Treasury backed expansion of the Credit Guarantee Fund from a TRY 20bn cap to TRY 250bn in Q1 2017, deployed to re-accelerate credit after the Jul-2016 coup attempt and associated capital-flight
  shock. Banks extended ~TRY 200bn of KGF-guaranteed loans to SMEs in 2017 alone; loan growth spiked above 20% y/y. Booked off-balance-sheet as contingent liabilities. Credited with a 2017 GDP rebound to
  7.5% but left the sovereign with large contingent fiscal exposure and a lira overhang that contributed to the 2018 crisis.

  '
enacted_by:
- turkey_erdogan_akp_supermajority_2011_2018
coalition_label_at_enactment: AKP

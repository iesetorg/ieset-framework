policy_id: my_border_reopening_2022
status: candidate
title: Full international border reopening + RCEP entry (Malaysia, 2022)
countries:
- MYS
timeframe:
  start: 2022
  end: 2022
  enacted_date: '2022-04-01'
description: 'Full reopening of Malaysian international borders 1 April 2022, ending the MCO-era quarantine-plus-VTL transitional regime. Foreign tourist entry resumed without quarantine for vaccinated
  travellers; labour-import channels for plantation, construction, manufacturing and services reopened subject to Memorandum of Understanding with source countries. Regional Comprehensive Economic Partnership
  (RCEP) entered into force for Malaysia 18 March 2022 following parliamentary ratification — largest free-trade agreement by GDP Malaysia is party to, covering ~30% of world GDP.

  '
enacted_by:
- malaysia_ismail_sabri_umno_2021_2022
coalition_label_at_enactment: Barisan Nasional-led government (Ismail Sabri)
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: RCEP entry into force for Malaysia; border reopening restores pre-pandemic trade/services flow.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Labour-import MoUs resumed with Indonesia, Bangladesh, Nepal, others; tourist entry normalised.
references:
- National Recovery Council announcement 8 Mar 2022
- RCEP notification of Malaysia's completed ratification, ASEAN Secretariat, Jan 2022

description: 'OeNB monetary-policy doctrine from 1976 pegging the Austrian schilling at ~1:7 to the Deutschmark, imposing German monetary discipline on a fiscally expansionary Kreisky government. Architect:
  Stephan Koren. The peg maintained low inflation alongside verstaatlichte-Industrie subsidy through the "Austro-Keynesian" period and survived until euro adoption.

  '

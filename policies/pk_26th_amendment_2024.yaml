title: 26th Constitutional Amendment — judicial restructuring (Pakistan, 2024)
countries:
- PAK
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-10-21'
description: 'Constitution (Twenty-Sixth Amendment) Act 2024, assented 21 October 2024. Key provisions: Chief Justice of Pakistan selection moved from seniority principle to a 12-member Special Parliamentary
  Committee with two-thirds-majority requirement; Constitutional Bench established within the Supreme Court to hear constitutional petitions, with members nominated by the Judicial Commission now majority
  non-judicial; three-year fixed term for the Chief Justice; Article 175A Judicial Commission reconstituted with increased parliamentary representation. Most significant court-related constitutional change
  since the 18th Amendment 2010. Passed in National Assembly 225-12 and Senate 65-4. Contested by bar associations, PTI, and several retired judges as a political intervention in judicial composition.

  '

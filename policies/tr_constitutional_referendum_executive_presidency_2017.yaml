description: 'Referendum of 16 April 2017 approved (51.41% Yes, 48.59% No) 18 constitutional amendments abolishing the office of Prime Minister, merging executive authority in the Presidency, allowing presidential
  party affiliation, restructuring the Hâkimler ve Savcılar Kurulu (HSK) with majority appointed by President and Parliament, and empowering the President to issue decrees with the force of law. Operative
  from the 24 June 2018 snap election. OSCE/ODIHR observed an "uneven playing field" under ongoing OHAL, and the Supreme Electoral Council accepted unstamped ballots at count time — a contested procedural
  change.

  '

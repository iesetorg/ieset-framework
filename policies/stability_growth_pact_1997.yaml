description: 'Adopted at the Amsterdam European Council in June 1997 and operationalised by Council Regulations 1466/97 and 1467/97, the Stability and Growth Pact translated Maastricht''s 3% deficit and
  60% debt reference values into a permanent surveillance and excessive-deficit procedure for euro-area members. It bound participating states to medium-term budget plans and sanction-backed correction
  paths, institutionalising fiscal discipline alongside ECB monetary independence.

  '

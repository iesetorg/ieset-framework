policy_id: ng_phcn_power_privatisation_2013
status: candidate
title: PHCN unbundling and privatisation (power-sector reform)
countries:
- NGA
timeframe:
  start: 2010
  end: 2013
  enacted_date: '2013-11-01'
description: 'Completion on 1 November 2013 of the unbundling and privatisation of Power Holding Company of Nigeria (PHCN) into 6 generation companies (GenCos) and 11 distribution companies (DisCos) under
  the EPSR Act 2005 framework, following competitive bids managed by the Bureau of Public Enterprises. Federal government retained the transmission company (TCN) under a management contract. Largest privatisation
  in Nigerian history since the 1988 SAP-era programme. Outcome has been contested: nameplate capacity stagnated around 4-5 GW on grid, tariff battles with NERC ongoing.

  '
enacted_by:
- nigeria_jonathan_pdp_2010_2015
coalition_label_at_enactment: PDP
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Vertically-integrated state monopoly split into competitive GenCos and DisCos.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Transfer of state assets to private operators via competitive auction.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: PHCN operating losses removed from federal recurrent spending.
references:

policy_id: cog_forest_code_2020
status: candidate
title: Republic of Congo Forest Code 2020
countries:
- COG
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-07-08'
description: 'The Republic of Congo adopted Law No. 33-2020 establishing a new Forest Code. The code updated concession, legality, sustainable-management, community participation, conservation, and control
  provisions for the forestry sector, giving the state a revised legal basis for managing forest exploitation and environmental obligations.

  '
scope: national
enacted_by:
- congo_sassou_forest_fiscal_adjustment_2020_present
coalition_label_at_enactment: Sassou Nguesso government
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: The code strengthens forest-management, conservation, and legality requirements for timber exploitation.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Revised concession and control provisions tighten state gating of forestry operations.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Community participation and benefit provisions clarify claims around forest-resource governance.
references:
- Republic of Congo, Law No. 33-2020 of 8 July 2020 establishing the Forest Code.
- FAOLEX, Republic of Congo Forest Code legal record, 2020.
notes: 'FAOLEX is used as a legal-source fallback because public national access to the official text is uneven.

  '

status: candidate
title: Oman VAT introduction
countries:
- OMN
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2020-10-12'
description: 'Royal Decree 121/2020 issued Oman''s Value Added Tax Law, with the tax taking effect after the 180-day implementation period in April 2021. The law created a GCC-style VAT on goods and services
  at each stage of production and distribution, broadening non-oil revenue after the fiscal stress of the oil-price shock.

  '

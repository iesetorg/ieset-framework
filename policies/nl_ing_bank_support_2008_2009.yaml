policy_id: nl_ing_bank_support_2008_2009
status: candidate
title: Netherlands ING capital injection + Alt-A back-up facility
countries:
- NLD
timeframe:
  start: 2008
  end: 2014
  enacted_date: '2008-10-19'
description: 'Dutch state €10bn core-tier-1 securities injection into ING Group on 19 October 2008 (non-voting preference-like instruments at 8.5% coupon), followed by €22bn ''Alt-A back-up facility'' on
  ING''s ~$30bn US residential mortgage-backed-securities portfolio (Jan 2009) transferring 80% of economic risk to the Dutch state in exchange for fee. Capital repaid in tranches 2009-2014 with effective
  IRR ~12.7% to the state. EU Commission conditionality required break-up of insurance business (NN Group demerger) and disposal of retail operations in several countries.

  '
enacted_by:
- netherlands_balkenende_iii_iv_2006_2010
coalition_label_at_enactment: CDA-PvdA-ChristenUnie

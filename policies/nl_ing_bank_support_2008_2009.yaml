  rationale: Capital injection plus risk-transfer facility; EU-mandated insurance divestment.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: €10bn + €22bn envelope (state contingent exposure).
references:

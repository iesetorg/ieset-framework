title: Japan expressway-corporation privatisation (2005)
countries:
- JPN
timeframe:
  start: 2005
  end: 2005
  enacted_date: '2005-10-01'
description: 'Four-way split of Japan Highway Public Corporation (JH) and related entities effective 1 October 2005. Created six successor companies (East, Central, West NEXCO; Hanshin Expressway; Metropolitan
  Expressway; Honshu-Shikoku Bridge) and a Japan Expressway Holding and Debt Repayment Agency that retained the ~¥40tn infrastructure asset and legacy debt. Ended the JH''s role as a central venue of LDP
  patronage construction politics; toll rates placed under corporate rather than political control, though subsequent governments partly reversed toll pricing discipline.

  '

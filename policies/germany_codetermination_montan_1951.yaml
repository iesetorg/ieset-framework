policy_id: germany_codetermination_montan_1951
status: candidate
title: Germany Codetermination Montan 1951
countries:
- DEU
timeframe:
  start: 1948
  end: 1966
description: 'The Montan-Mitbestimmungsgesetz of 21 May 1951 mandated parity codetermination on supervisory boards of coal, iron, and steel companies above 1,000 employees, requiring equal representation
  of shareholder and worker delegates plus a labour director (Arbeitsdirektor) on the management board. Negotiated as a political settlement after threatened DGB strike action, it became the template for
  later Mitbestimmung legislation extending workplace voice across the broader West German economy.

  '

  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Input-tax credit eliminated cascading excise burden on manufacturers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Equalised tax treatment between vertically integrated and specialised producers.

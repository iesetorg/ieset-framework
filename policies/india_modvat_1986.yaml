policy_id: india_modvat_1986
status: candidate
title: Modified Value-Added Tax (MODVAT) (India 1986)
countries:
- IND
timeframe:
  start: 1986
  end: 2004
  enacted_date: '1986-03-01'
description: 'Introduced in the Union Budget 1986-87 (announced 28 Feb 1986, effective 1 Mar 1986) under Finance Minister V.P. Singh. Allowed credit for excise duty paid on inputs used in manufacture, eliminating
  cascading under the Central Excise regime. Applied initially to 37 chapter-headings of the tariff schedule, expanded through 1990s. Replaced by CENVAT 2000, subsumed under GST 2017.

  '

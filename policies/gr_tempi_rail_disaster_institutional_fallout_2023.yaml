policy_id: gr_tempi_rail_disaster_institutional_fallout_2023
status: candidate
title: Greece Tempi rail disaster institutional fallout 2023-2025
countries:
- GRC
timeframe:
  start: 2023
  enacted_date: '2023-02-28'
description: 'Head-on collision between Hellenic Train passenger service IC62 and a freight train near Tempi on the Athens-Thessaloniki line, 28 February 2023, killing 57 (primarily students returning from
  Carnival). The local stationmaster at Larissa had routed the passenger train onto the wrong track; the automated ETCS signalling system (for which EU contracts dated back to 2014) was non- operational
  on the line. Institutional fallout included: resignation of Transport Minister Kostas Karamanlis (nephew of former PM) 1 March 2023; nationalisation of rolling-stock safety audit; 2023 supplementary budget
  for rail-signalling contracts; Hellenic Parliament cross-party preliminary inquiry committee 2023-2024; criminal proceedings against stationmasters and Hellenic Train executives; protest mobilisations
  peaking February 2024 (one-year anniversary, largest demonstrations since 2011-2012); OLYE (train drivers'' union) rolling strike actions. European Public Prosecutor''s Office investigation into misuse
  of EU rail-safety funds opened 2024. Coded as institutional-fallout policy because it produced no statute reversing the Mitsotakis programme, but altered public-trust baseline and remains a live political
  issue through 2025.

  '

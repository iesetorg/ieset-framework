  end: 1988
  enacted_date: '1986-08-06'
description: 'Loi n° 86-793 du 2 juillet 1986 and Loi n° 86-912 du 6 août 1986 authorised privatisation of 65 companies. Major IPOs 1986-88 included Saint-Gobain (November 1986), Paribas (January 1987),
  Société Générale (June 1987), Compagnie Générale d''Electricité (May 1987), TF1 (July 1987, first major broadcast-privatisation in Europe), Suez (October 1987). Mitterrand-Chirac cohabitation reversed
  a substantial part of the 1982 nationalisations. Programme paused after October 1987 market crash; remaining companies privatised by later governments 1993+.

  '

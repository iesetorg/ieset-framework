policy_id: vn_cptpp_entry_2019
status: candidate
title: Vietnam CPTPP entry 2019
countries:
- VNM
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2019-01-14'
description: 'Comprehensive and Progressive Agreement for Trans-Pacific Partnership (CPTPP), the revived 11-member successor to TPP after US withdrawal, entered into force for Vietnam on 14 January 2019
  following National Assembly ratification on 12 November 2018 with 469 of 469 delegates voting yes. Bound Vietnam to high-standard disciplines on SOE competitive neutrality, government procurement transparency,
  digital trade, labour (including independent worker organisations subject to phase-in), IP, and investor-state arbitration. Tariff elimination covered ~66% of Vietnam''s exports to CPTPP partners immediately
  and ~86% by year 3. Primary market-access gains: Canada, Mexico, Peru (no pre-existing bilateral FTAs).

  '

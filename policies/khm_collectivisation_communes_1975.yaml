# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: khm_collectivisation_communes_1975
status: candidate
title: Agricultural Collectivisation and Communes
countries:
- KHM
timeframe:
  start: 1975
  end: 1979
description: Democratic Kampuchea reorganised rural production around collectivised agricultural cooperatives, communal eating, state procurement targets, and work brigades. Land, tools, harvests, and labour were placed under party-controlled collective administration, with rice production and irrigation treated as central national mobilisation goals.
enacted_by:
- khm_khmer_rouge_democratic_kampuchea_1975
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Land and farm output were collectivised, removing private control over agricultural property.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Commune allocation and procurement targets replaced agricultural markets.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: State mobilisation of irrigation and collective production made public command allocation central despite limited formal budgets.
references:
- Ben Kiernan (2008), The Pol Pot Regime
- Michael Vickery (1984), Cambodia 1975-1982

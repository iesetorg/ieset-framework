policy_id: italy_public_sector_pension_expansion_1965_1992
status: candidate
title: Italy Public Sector Pension Expansion 1965 1992
countries:
- ITA
timeframe:
  start: 1945
  end: 1992
description: 'Successive Christian-Democrat governments expanded Italy''s public-sector pension system through Law 903/1965 and especially the 1973 "baby pensions" reforms allowing public employees to retire
  after as little as 14 years 6 months 1 day of service (15 years for women with children), with seniority pensions payable independent of age. Final-salary defined-benefit formulas combined with low retirement
  ages drove pension expenditure from below 5% of GDP in 1960 to roughly 14% by 1992, requiring the Amato and Dini reforms to begin retrenchment.

  '

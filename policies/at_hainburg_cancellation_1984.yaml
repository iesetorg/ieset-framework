policy_id: at_hainburg_cancellation_1984
status: candidate
title: Austrian Hainburg Au hydropower project cancellation 1984
countries:
- AUT
timeframe:
  start: 1984
  enacted_date: '1984-12-21'
description: 'Cancellation of planned Danube hydropower plant at Hainburg following mass occupation of the Au wetlands by environmentalists, students, and public figures (including Konrad Lorenz and Günther
  Nenning) in December 1984. Court injunction then construction moratorium. The Hainburg site became the Donau-Auen National Park in 1996. Foundational moment of Austrian environmental movement and precursor
  to Green-party entry to parliament in 1986.

  '
enacted_by:
- austria_sinowatz_spo_1983_1986

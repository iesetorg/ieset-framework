  direction: +
  magnitude: strong
  intended: true
  rationale: Flagship infrastructure project cancelled on environmental grounds.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Planned hydropower capacity not built.

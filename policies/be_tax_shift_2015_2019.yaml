policy_id: be_tax_shift_2015_2019
status: candidate
title: Belgium Tax Shift (2015-2019)
countries:
- BEL
timeframe:
  start: 2015
  end: 2020
  enacted_date: '2015-07-23'
description: 'Phased tax-shift package legislated 23 July 2015 by the Michel Suédoise coalition: progressive reduction of employer social-security contributions from 32.4% to 25% for most workers by 2018;
  selected IPP personal-income- tax cuts (broadening of second bracket, increased ''quotité exemptée''); offsetting increases in VAT on electricity (6%→21% from Sep 2015), excise duties (alcohol, tobacco,
  sugar-sweetened drinks), and raised withholding on capital income from 25% to 27% then 30%. Net labour-cost reduction ~€5bn/year at steady state.

  '

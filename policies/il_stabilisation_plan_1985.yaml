policy_id: il_stabilisation_plan_1985
status: candidate
title: Israeli Economic Stabilization Plan (July 1985)
countries:
- ISR
timeframe:
  start: 1985
  end: 1991
description: 'Heterodox-orthodox package enacted 1 July 1985 to break triple-digit inflation (peaking ~450% annualised in early 1985) that had followed the 1977 liberalisation, Lebanon war spending, and
  wage-price indexation dynamics. Four coordinated instruments. (1) Fiscal: deep cut in the budget deficit — roughly 7.5 percentage points of GDP over the first year — via subsidy cuts and public-sector
  wage freeze. (2) Exchange rate: sharp devaluation then peg of the new shekel to the US dollar, subsequently to a basket, underpinned by a US emergency aid package ($1.5bn) and stand-by arrangement logic.
  (3) Incomes policy: tripartite agreement freezing wages and a temporary price freeze to break indexation inertia. (4) Monetary: end of automatic central-bank financing of the deficit, codified in the
  1985 "no-printing-of-money" law amendment. Plan is a canonical case for the orthodox proposition that high-inflation stabilisation requires credible fiscal anchor plus nominal anchor together; the wage
  freeze is the heterodox element often cited by structuralist authors. Inflation dropped to ~20% within a year and single digits by the 1990s; no output collapse.'

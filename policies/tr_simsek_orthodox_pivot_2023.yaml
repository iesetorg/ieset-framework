description: 'Post-runoff cabinet appointed 4 Jun 2023: Mehmet Şimşek as Treasury & Finance minister, Hafize Gaye Erkan as CBRT governor. Programme announced as a return to "rational-basis" policy: CBRT
  policy rate lifted from 8.5% to 50% over 11 months, KKM unwind, FX reserve rebuild (gross reserves from USD 98bn May-2023 to ~USD 160bn Q1-2025), fiscal consolidation targets in the 2024 Medium-Term Programme,
  and targeted subsidy tightening. Orthodoxy reaffirmed under successor governor Fatih Karahan (Feb 2024-). Credit ratings upgraded by all three majors in 2024.

  '

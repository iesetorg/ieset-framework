policy_id: my_ringgit_capital_controls_1998
status: candidate
title: Malaysia ringgit capital controls and peg 1998
countries:
- MYS
timeframe:
  start: 1998
  end: 2005
  enacted_date: '1998-09-01'
description: 'Capital-account controls imposed 1 Sep 1998 including ringgit peg at RM 3.80/USD, ban on offshore ringgit trading, 12-month exit restrictions on foreign portfolio holdings (later converted
  to levy regime). Announced alongside Anwar Ibrahim''s dismissal as DPM/FM (2 Sep 1998). Broke with IMF orthodoxy; ex-post research (Kaplan & Rodrik 2001) argued controls gave Malaysia room for counter-cyclical
  monetary policy and faster recovery than IMF-programme neighbours; peg lifted Jul 2005.

  '
enacted_by:
- malaysia_mahathir_wawasan_2020_era_1991_1998
coalition_label_at_enactment: Barisan Nasional under PM Mahathir
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Capital-account controls and ringgit peg — reversed prior liberalisation.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Bank Negara subordinated to Mahathir crisis-management; governor sacked.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: moderate
  intended: true
  rationale: Capital controls enabled counter-cyclical easing.
references:

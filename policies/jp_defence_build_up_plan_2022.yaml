policy_id: jp_defence_build_up_plan_2022
status: candidate
title: Japan — three documents and defence build-up to 2% GDP (2022)
countries:
- JPN
timeframe:
  start: 2022
  end: 2027
  enacted_date: '2022-12-16'
description: 'Cabinet decision of 16 December 2022 adopting the revised National Security Strategy, the National Defence Strategy, and the Defence Build-up Plan (the "three security documents"). Commits
  Japan to raising defence-related spending to 2% of GDP by fiscal year 2027 — roughly doubling from the historical ~1% ceiling — within a five-year envelope of approximately ¥43tn. Introduces counterstrike
  (hangeki) capability, Tomahawk purchases, standoff missile programmes, munitions- stockpile build-up, and cyber / space domain investment. Partly funded through a package of tobacco, corporate, and income
  surtaxes (with a special reconstruction-surtax reallocation) plus non-tax revenue measures, though the full revenue stream was not locked in at adoption. Marks the most substantial revision of Japanese
  defence posture since the 1976 1%-of-GDP self-imposed ceiling.

  '

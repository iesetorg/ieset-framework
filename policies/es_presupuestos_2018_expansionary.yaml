timeframe:
  start: 2016
  end: 2018
description: 'Law 6/2018 of 3 July, the Presupuestos Generales del Estado for 2018, was passed with PNV support after months of negotiation, lifting pensions in line with CPI, raising the SMI, partially
  reversing PIT-rate creep on lower brackets, and increasing capital transfers to Catalonia and the Basque Country. The expansionary tilt within the Stability and Growth Pact framework set the stage for
  the no-confidence transition.

  '

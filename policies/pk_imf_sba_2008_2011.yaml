policy_id: pk_imf_sba_2008_2011
status: candidate
title: Imf Sba 2008 2011
countries:
- PAK
timeframe:
  start: 2008
  end: 2013
description: 'IMF Stand-By Arrangement agreed with Pakistan in November 2008 in response to the balance-of-payments crisis driven by the global commodity shock and capital outflows. The programme of about
  USD 7.6 billion required fiscal consolidation, monetary tightening, removal of subsidies, and tariff rationalisation. Implementation slippage on tax and energy reforms caused the programme to lapse before
  completion in 2011, foreshadowing recurring IMF engagement.

  '

description: 'Centre for Development of Telematics established 25 Aug 1984 as an autonomous R&D society under the Department of Telecommunications, led by Sam Pitroda (adviser to PM Rajiv Gandhi). Developed
  indigenous digital switching technology (Rural Automatic Exchange, Main Automatic Exchange) enabling rapid 1986-1995 rural telephony expansion from ~1M lines to ~15M lines.

  '

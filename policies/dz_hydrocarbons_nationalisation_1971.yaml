# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: dz_hydrocarbons_nationalisation_1971
status: candidate
title: "Hydrocarbons nationalisation"
countries: [DZA]
timeframe: {start: 1971}
description: >
  In 1971 Algeria nationalised majority control over French and other foreign
  hydrocarbon interests, expanding Sonatrach's command of oil and gas
  production, transport, and export revenues. The policy made energy rents the
  fiscal base for the FLN developmental state and a central instrument of
  post-colonial economic sovereignty.
enacted_by:
  - algeria_fln_socialist_developmental_state_1962_1978
coalition_label_at_enactment: "FLN"
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Foreign concession rights were expropriated or converted into Algerian state-majority control.", intended: true}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Hydrocarbon entry and operation became tightly state-controlled through Sonatrach.", intended: true}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Hydrocarbon rents financed expanded state investment and public-sector development.", intended: true}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Domestic control over oil and gas increased sovereign command of energy supply and export policy.", intended: true}
references:
  - "Sonatrach, company history of the 24 February 1971 nationalisation"
  - "IMF and World Bank historical summaries on Algeria's hydrocarbon sector"

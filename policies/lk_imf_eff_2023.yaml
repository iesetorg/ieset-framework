description: 'IMF Executive Board approval on 20 March 2023 of a 48-month Extended Fund Facility of SDR 2.286bn (~$2.9bn) for Sri Lanka, conditional on the official-creditor committee''s financing assurances
  secured via the Paris Club + China + India coordination of Jan-Mar 2023. Programme conditionality: primary-balance surplus target of 2.3% of GDP by 2025; VAT hike from 15% to 18% (effective Jan 2024);
  SOE restructuring (CEB electricity tariff cost-recovery reform, CPC pricing formula, SriLankan Airlines divestment track); Central Bank of Sri Lanka Act of Sep 2023 enshrining operational independence
  and prohibiting monetary financing; anti-corruption diagnostic and a new Anti-Corruption Act. Programme continued across the Wickremesinghe-Dissanayake transition with 3rd review completed under Dissanayake
  in Feb 2025.

  '

policy_id: ca_carbon_tax_consumer_cancellation_2025
status: candidate
title: Canada — Consumer fuel-charge cancellation of federal carbon price (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-14'
description: 'First executive act of the Carney government. On 14 March 2025 an Order in Council set the federal fuel-charge rate to zero effective 1 April 2025, ending the consumer-facing portion of the
  federal carbon-pricing backstop under the Greenhouse Gas Pollution Pricing Act (GGPPA) without repealing the Act itself. The fuel charge had applied to gasoline, diesel, natural gas, and propane in provinces
  that did not meet the federal benchmark. The Canada Carbon Rebate (formerly Climate Action Incentive Payment) final quarterly payment was issued April 2025 and then discontinued. The industrial portion
  of the federal price — the Output-Based Pricing System (OBPS) for large emitters — was retained, as were provincial industrial carbon pricing systems. Stated rationale: political and cost-of-living response
  while preserving industrial carbon pricing and investment- tax-credit architecture for low-carbon technology.

  '

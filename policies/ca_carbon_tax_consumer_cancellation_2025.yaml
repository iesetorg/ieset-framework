policy_id: ca_carbon_tax_consumer_cancellation_2025
status: candidate
title: Canada — Consumer fuel-charge cancellation of federal carbon price (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-14'
description: 'The first executive act of the Carney government set the federal consumer-facing fuel-charge rate to zero effective 1 April 2025, ending household fuel-charge collection under the Greenhouse
  Gas Pollution Pricing Act without repealing the Act. The fuel charge had applied to gasoline, diesel, natural gas, and propane in provinces that did not meet the federal benchmark. The Canada Carbon Rebate
  final quarterly payment was issued in April 2025 and then discontinued. The industrial Output-Based Pricing System for large emitters was retained, as were provincial industrial carbon-pricing systems.

  '

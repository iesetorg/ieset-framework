policy_id: ghana_cocobod_reform_1984
status: candidate
title: Ghana Cocobod Reform 1984
countries:
- GHA
timeframe:
  start: 1983
  end: 1991
description: 'Beginning in 1984 the ERP overhauled the Ghana Cocoa Marketing Board (Cocobod), retrenching tens of thousands of staff, raising the official producer price for farmgate cocoa toward export-parity
  levels, divesting subsidiary plantations, and unbundling internal-purchasing functions to licensed private buyers. The reform aimed to reverse the dramatic 1970s collapse in cocoa output and restore Ghana''s
  position in world cocoa markets.

  '
enacted_by:
- ghana_erp_stabilisation_1983_1991
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Producer prices realigned with world prices via the unified exchange rate raised export incentives.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Licensed buying companies introduced competition into formerly monopolised internal cocoa marketing.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Cocobod headcount cuts and divestitures lowered public payroll and cocoa-sector subsidies.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform reduced central-bank financing of Cocobod losses, freeing monetary discipline.

policy_id: es_sareb_bad_bank_2012
status: candidate
title: Sareb Bad Bank 2012
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
description: 'SAREB (Sociedad de Gestión de Activos procedentes de la Reestructuración Bancaria) was created in November 2012 under Real Decreto-Ley 24/2012 and Real Decreto 1559/2012 as Spain''s bad bank.
  It absorbed roughly €50bn of toxic real-estate assets from rescued cajas (Bankia, Catalunya Banc, Novagalicia and others) at deep haircuts, financed via state-guaranteed bonds. Forming part of the EU/ESM
  €100bn financial-assistance memorandum, the intended effect was to clean bank balance sheets, restore credit flows, and orderly wind down the property overhang.

  '
enacted_by:
- spain_rajoy_pp_first_2011_2015
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Crystallised contingent-liability losses but constrained discretionary spending under MoU conditionality.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion-period labour reforms accompanied the bank cleanup, raising flexibility.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Stricter capital requirements and supervisory consolidation reduced regulatory laxity.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Public-finance burden of bank rescues fell on general taxation; progressivity slightly reduced.

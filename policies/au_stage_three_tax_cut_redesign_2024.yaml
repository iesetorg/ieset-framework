description: 'Treasury Laws Amendment (Cost of Living Tax Cuts) Act 2024 redesigned the legislated Stage-3 personal income tax package (originally enacted 2018 under Turnbull and scheduled for 1 July 2024).
  The redesign restored the 37% bracket, cut the 19% rate to 16% and the 32.5% rate to 30%, and lowered the threshold at which the 45% top rate applies. Net effect: redistribution of relief from the top
  decile toward lower and middle earners relative to the legislated path. Labor had committed in 2022 to deliver Stage-3 unchanged; the February 2024 redesign is a revealed- preference reversal.

  '

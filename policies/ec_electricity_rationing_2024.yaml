title: Ecuador Electricity Rationing and Emergency Generation 2024
countries:
- ECU
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-04-15'
description: 'Rolling power cuts of up to 14 hours per day from April through December 2024, driven by historic drought reducing output at Paute, Mazar, and Coca Codo Sinclair hydro plants, under- investment
  in thermal backup, and delayed Colombian imports. Response included emergency contracting of thermal barges and rental generators under Decreto 317 and related resolutions, tariff adjustments, and accelerated
  permits. Estimated GDP impact 1.5-2.0 percentage points.

  '

status: candidate
title: Djibouti IMF ECF fiscal and debt reforms 2024
countries:
- DJI
timeframe:
  start: 2024
  end: ongoing
description: 'Djibouti entered an IMF Extended Credit Facility-supported programme in 2024 to address debt vulnerabilities, arrears, weak revenue mobilisation, and fiscal risks from state-owned enterprises.
  The programme prioritizes tax exemptions review, stronger tax and customs administration, medium-term debt management, public-financial-management controls, and better targeted social protection.

  '

policy_id: ve_banking_crisis_fogade_1994
status: candidate
title: Venezuelan 1994 banking crisis and FOGADE intervention
countries:
- VEN
timeframe:
  start: 1994
  end: 1995
  enacted_date: '1994-01-13'
description: 'Banco Latino failed 13 January 1994 just weeks before Caldera''s inauguration; run spread to 17 additional institutions through 1994 (Banco de Maracaibo, Venezuela, Consolidado, Metropolitano,
  etc.). Fondo de Garantía de Depósitos y Protección Bancaria (FOGADE) and Banco Central assistance reached ~Bs 1.3 trillion (~13-15% GDP, ~$11B) by end-1994. 1995-96 restructuring via Fondo de Crédito
  Garantizado; foreign banks acquired several failed institutions.

  '

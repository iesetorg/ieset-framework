policy_id: italy_euro_entry_1999
status: candidate
title: Italy Euro Entry 1999
countries:
- ITA
timeframe:
  start: 1999
  end: ongoing
description: 'Italy adopted the euro at irrevocable conversion rates on 1 January 1999, with euro banknotes and coins entering circulation on 1 January 2002, transferring monetary-policy authority to the
  ECB and locking in the lira at 1936.27 per euro. Without accompanying structural reforms to product and labour markets or to the persistent regional dualism, euro entry stabilised borrowing costs in the
  early 2000s but exposed Italy to relative-unit-labour-cost drift versus core-EMU partners through the next two decades.

  '
enacted_by:
- italy_euro_entry_non_reform_1999
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: ECB membership delegated price-stability mandate to a fully independent supranational authority.
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Euro entry alone did not alter Italian product-market regulation absent companion reforms.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: National labour-market institutions remained unchanged at the time of monetary union.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Convergence-driven interest-cost savings created near-term fiscal space that sustained primary outlays.

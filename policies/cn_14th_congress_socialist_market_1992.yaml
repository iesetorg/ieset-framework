title: 14th Party Congress 'socialist market economy' adoption 1992
countries:
- CHN
timeframe:
  start: 1992
  enacted_date: '1992-10-12'
description: '14th National Congress of the CCP (12-18 Oct 1992) formally adopted ''establishing a socialist market economic system'' as the goal of economic reform — the first Chinese doctrinal endorsement
  of ''market economy'' language. Paved the way for SOE reform, stock-exchange development, tax-sharing reform 1994, and WTO accession trajectory. Also consolidated Jiang Zemin''s leadership and elevated
  Zhu Rongji to Politburo Standing Committee (Vice Premier responsibilities).

  '

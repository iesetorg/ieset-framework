policy_id: ca_economic_action_plan_2009
status: candidate
title: Canada — Economic Action Plan 2009 stimulus package
countries:
- CAN
timeframe:
  start: 2009
  end: 2011
  enacted_date: '2009-01-27'
description: 'Canada''s response to the 2008-2009 global financial crisis, announced in Budget 2009 (27 January 2009). The Economic Action Plan provided roughly C$47B of federal stimulus over two years
  (plus ~C$15B from provinces), equivalent to about 2.5% of GDP. Measures included Infrastructure Stimulus Fund and Building Canada Fund top-ups (roads, transit, water, broadband), a Home Renovation Tax
  Credit (HRTC) in 2009 only, accelerated capital cost allowance for manufacturing equipment, Knowledge Infrastructure Program for universities and colleges, expanded Employment Insurance benefit duration
  and Working While on Claim pilots, targeted support for the auto sector (C$13.7B joint federal-Ontario bailout of GM and Chrysler), and the Home Buyers'' Plan withdrawal limit increase. Deficit widened
  to C$55.6B in fiscal 2009-10 before declining. Federal debt-to-GDP rose from 28.2% (2007-08) to 33.4% (2011-12).

  '

description: 'In January 2023 the national authorities of Germany, the Netherlands, Denmark, Sweden, and Norway jointly submitted a REACH Annex XV restriction dossier to ECHA proposing a broad restriction
  on the manufacture, placing on the market, and use of per- and polyfluoroalkyl substances (PFAS) across thousands of compounds. The dossier offers full ban and limited-derogation options and is one of
  the largest restriction proposals ever filed under REACH, undergoing ECHA RAC and SEAC opinions.

  '

policy_id: th_thai_rak_thai_dissolution_2007
status: candidate
title: Thai Rak Thai Dissolution 2007
countries:
- THA
timeframe:
  start: 2006
  end: 2008
description: 'In May 2007 Thailand''s Constitutional Tribunal — convened under the post-coup interim charter — dissolved the Thai Rak Thai (TRT) party founded by Thaksin Shinawatra and barred 111 of its
  executive members from politics for five years for electoral fraud connected to the 2006 election. The ruling formalised the rollback of TRT''s legislative dominance and shaped the post-coup constitutional
  order under the Surayud government.

  '

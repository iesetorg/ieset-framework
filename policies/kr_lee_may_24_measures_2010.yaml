policy_id: kr_lee_may_24_measures_2010
status: candidate
title: Lee May 24 Measures 2010
countries:
- KOR
timeframe:
  start: 2008
  end: 2013
description: 'In response to the March 2010 Cheonan sinking, the Lee government''s "May 24 Measures" suspended most inter-Korean trade and economic exchanges, banned new South Korean investment in the North,
  closed coastal waters to North Korean shipping and ended cultural exchanges, while preserving the Kaesong Industrial Complex. The sanctions framework reshaped the inter-Korean economic relationship through
  the remainder of the Lee and Park administrations.

  '

description: 'Ley del Impuesto Empresarial a Tasa Única published 1 Oct 2007, effective 1 Jan 2008. 16.5% flat alternative-minimum tax on corporate cash-flow base (2008), rising to 17% (2009), 17.5% (2010-2013).
  Creditable against ISR corporate income tax. Aim: broaden corporate tax base + capture informal-economy firms underreporting ISR. Revenue ~MXN 50bn/year incremental. Abrogated 1 Jan 2014 under Peña Nieto
  hacienda reform which raised top personal + capital income rates instead.

  '

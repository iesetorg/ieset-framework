policy_id: id_rice_self_sufficiency_1984
status: candidate
title: Rice self-sufficiency (Indonesia 1984)
countries:
- IDN
timeframe:
  start: 1984
  end: 1984
description: 'Indonesia achieved rice self-sufficiency in 1984 via the Bimas mass- extension programme (high-yielding varieties IR36/IR64, fertiliser subsidies, credit), BULOG procurement-and-floor-price
  system, and Inmas intensification. FAO award presented to Suharto Nov 1985. National rice output rose from 16.3Mt (1975) to 25.8Mt (1984). Self-sufficiency eroded late 1980s but remained a Suharto legitimacy
  pillar.

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Fertiliser subsidies, BULOG floor prices, credit support.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: BULOG monopoly on rice import and buffer-stock operations.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BULOG import monopoly shielded domestic rice price.
references:
- FAO (1985), Medal for Rice Self-Sufficiency — Indonesia
- Timmer (1996), 'Does BULOG Stabilise Rice Prices?' Bulletin of Indonesian Economic Studies

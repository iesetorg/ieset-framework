status: candidate
title: Thailand Shin Corp sale to Temasek (2006)
countries:
- THA
timeframe:
  start: 2006
  end: 2006
  enacted_date: '2006-01-23'
description: 'Sale of Shin Corporation (Thaksin family telecom holding company, parent of AIS mobile operator) to Singapore''s Temasek Holdings on 23 January 2006 for Bt 73.3bn (~$1.9bn). Structured via
  offshore vehicles Ample Rich Investment (BVI) and subsequent transfers to avoid Thai capital-gains tax; transaction tax-free. Triggered yellow-shirt People''s Alliance for Democracy (PAD) street protests
  against Thaksin corruption and national-security concerns over foreign ownership of telecom. Constitutional Court retroactively ruled (post-2006 coup Assets Examination Committee findings) the sale violated
  foreign-business-ownership rules on Shin''s Shin Satellite subsidiary (holding strategic satellite concessions). Proximate cause of political crisis culminating in 19 September 2006 military coup.

  '

  direction: +
  magnitude: moderate
  intended: true
  rationale: NEP-aligned Bumiputera trust-fund and FELDA expansion.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Free Trade Zone programme for electronics export.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: NEP 30%-equity requirement raised licensing hurdle for non-Bumi investors.

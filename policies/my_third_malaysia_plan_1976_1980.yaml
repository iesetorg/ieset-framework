policy_id: my_third_malaysia_plan_1976_1980
status: candidate
title: Third Malaysia Plan (1976-1980)
countries:
- MYS
timeframe:
  start: 1976
  end: 1980
description: 'Economic Planning Unit plan covering 1976-1980 under NEP Phase I. Targeted 8.6% GDP growth (achieved ~8%); pursued 30% Bumiputera corporate-equity target through state trust agencies PNB/ASN,
  FELDA land-settlement schemes, and increased public-sector employment of Bumiputera. Electronics FTZs in Penang / Johor / Selangor began substantial output.

  '
enacted_by:
- malaysia_hussein_onn_1976_1981
coalition_label_at_enactment: Barisan Nasional (Hussein Onn)

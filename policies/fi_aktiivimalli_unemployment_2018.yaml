policy_id: fi_aktiivimalli_unemployment_2018
status: candidate
title: Aktiivimalli Unemployment 2018
countries:
- FIN
timeframe:
  start: 2015
  end: 2019
description: 'The aktiivimalli ("activation model"), in force from January 2018 to end-2019, conditioned full unemployment-benefit payments on jobseekers meeting work or training thresholds during a 65-day
  reference window, cutting payments by roughly 4.65% for those who did not. Enacted by the Sipilä centre-right government, it tied benefit access to active labour-market measures and was repealed in 2020
  under the Marin government following political backlash and mixed evaluation evidence.

  '

policy_id: pk_federal_shariat_court_1980
status: candidate
title: Federal Shariat Court establishment (Pakistan 1980)
countries:
- PAK
timeframe:
  start: 1980
  end: 1980
  enacted_date: '1980-05-26'
description: 'Constitution (Amendment) Order 1980 (P.O. No. 1 of 1980), 26 May 1980, established the Federal Shariat Court with jurisdiction to examine whether any law is repugnant to the Injunctions of
  Islam. Three-judge bench, appeals to the Shariat Appellate Bench of the Supreme Court. Rulings include famous Riba (interest) judgment (1991, 1999) eventually reversed in procedural terms 2002.

  '
enacted_by:

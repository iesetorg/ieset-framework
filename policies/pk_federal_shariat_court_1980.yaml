  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Created parallel Shariat jurisdiction; ordinary courts constrained from reviewing laws in scope of FSC.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Added legal-uncertainty layer; laws liable to repugnancy challenge for decades.

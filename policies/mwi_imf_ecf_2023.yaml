policy_id: mwi_imf_ecf_2023
status: candidate
title: Malawi IMF Extended Credit Facility arrangement 2023
countries:
- MWI
timeframe:
  start: 2023
  end: 2025
  enacted_date: '2023-11-15'
description: 'Malawi entered a 48-month IMF Extended Credit Facility arrangement in 2023 to anchor macroeconomic stabilisation after balance-of-payments stress, debt distress, weather shocks, and foreign-exchange
  shortages. The programme sought fiscal consolidation, domestic revenue mobilisation, debt restructuring, reserve rebuilding, and stronger public-financial management, but it was cancelled in 2025 after
  no programme review was completed.

  '
enacted_by:
- malawi_cost_reflective_macro_stabilisation_2012_present
scope: national
coalition_label_at_enactment: Malawi Congress Party Chakwera government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The arrangement conditioned support on deficit reduction, tighter budget execution, and reduced arrears.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reserve rebuilding and exchange-rate correction were intended to reduce fiscal dominance over monetary and FX policy.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-financial-management and debt-transparency conditions aimed to improve fiscal governance.
references:
- IMF, Malawi 2025 Article IV Consultation staff report and press release, 2025.
- IMF, Malawi request for an arrangement under the Extended Credit Facility, 2023.
notes: 'Conflict- and crisis-aware coding: this captures the formal programme and its intended policy content, while the description records that implementation did not reach a completed review before cancellation.

  '

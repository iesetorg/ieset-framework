description: '14 November 1993 agreement between Menem (PJ) and Alfonsín (UCR) at Quinta de Olivos, enabling 1994 Constituent Convention. Ley 24.309 (Ley de Necesidad de Reforma) set agenda. Reforms promulgated
  22 August 1994: presidential re-election permitted (one additional term), term shortened from 6 to 4 years, ballotage introduced, creation of Jefe de Gabinete, Council of the Magistracy, autonomous Buenos
  Aires city, Defensor del Pueblo, international human-rights treaties constitutionalised.

  '

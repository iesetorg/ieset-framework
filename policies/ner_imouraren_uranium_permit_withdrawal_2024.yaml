policy_id: ner_imouraren_uranium_permit_withdrawal_2024
status: candidate
title: Niger Imouraren uranium permit withdrawal 2024
countries:
- NER
timeframe:
  start: 2024
  end: ongoing
description: >
  Niger withdrew the operating permit for Orano's large Imouraren uranium
  project in 2024 after the post-coup authorities pressed for faster resource
  development and greater sovereign control over strategic uranium assets. The
  decision formed part of a broader resource-nationalist posture toward foreign
  mining operators and the uranium sector.
enacted_by:
- niger_cnsp_transition_sovereignty_2023_present
scope: national
coalition_label_at_enactment: CNSP military transition
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Revoking a major uranium permit increased state discretion over licensing and project timing.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Permit withdrawal heightened expropriation and contract-security risk for foreign mining investors.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: The stated resource-sovereignty objective was to bring strategic uranium assets under more direct national control.
references:
- Niger government and mining-ministry materials on the Imouraren permit decision, 2024.
- Orano public statements on Niger's withdrawal of the Imouraren permit, 2024.
- Reuters reporting on Niger's 2024 uranium permit withdrawal.

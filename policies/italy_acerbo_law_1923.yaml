policy_id: italy_acerbo_law_1923
status: candidate
title: Italy Acerbo Law 1923
countries: [ITA]
timeframe:
  start: 1923
  end: 1923
  enacted_date: "1923-11-18"
description: >
  Law no. 2444 of 18 November 1923, known as the Acerbo Law, replaced the
  existing proportional electoral rules with a system awarding two-thirds
  of Chamber seats to the largest list provided it crossed a relatively
  low vote threshold. Mussolini's government used the reform to convert an
  unstable parliamentary position into a durable authoritarian majority in
  the 1924 election. The law is a central institutional marker of the
  transition from postwar parliamentary pluralism to fascist domination.
enacted_by:
  - italy_fascist_corporatist_state_1922_1943
axes_moved:
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "The seat bonus law structurally weakened competitive representation and facilitated one-party domination of parliament."
references:
  - "Legge 18 novembre 1923, n. 2444"

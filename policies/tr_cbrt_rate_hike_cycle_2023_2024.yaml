description: 'Between Jun 2023 and Mar 2024, CBRT lifted the one-week repo policy rate from 8.5% to 50% (cumulative 4,150bp) across nine meetings — the steepest EM hiking cycle on record outside hyperinflation
  regimes. Rate held at 50% Mar-Aug 2024 under Karahan. Disinflation path: CPI peaked at 75.5% May-2024, fell to ~49% Dec-2024 and ~42% Mar-2025. Cautious cut cycle began Dec 2024 (−250bp to 47.5%). Cycle
  is the operational core of the Şimşek orthodox pivot.

  '

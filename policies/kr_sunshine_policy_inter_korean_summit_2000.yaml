description: 'Sunshine Policy (햇볕정책) engagement doctrine launched by Kim Dae-jung inauguration February 1998. Core principles: no tolerance for armed provocation, no intent to absorb the North, active pursuit
  of cooperation. First-ever inter-Korean summit held Pyongyang 13-15 June 2000 between Kim Dae-jung and Kim Jong-il; 15 June Joint Declaration signed. Operational cooperation: Mt Kumgang tourism opened
  November 1998 (Hyundai Asan), Kaesong Industrial Complex groundwork agreement August 2000 (operational from 2003), family-reunion meetings, railway reconnection plans. Kim Dae-jung awarded Nobel Peace
  Prize 2000. Post-summit "Hyundai slush-fund" scandal alleged $500m transfer from Hyundai to North Korea via illegal channels.

  '

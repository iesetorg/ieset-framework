policy_id: rw_kigali_financial_centre_buildout
status: candidate
title: Kigali International Financial Centre buildout
countries:
- RWA
timeframe:
  start: 2020
  end: ongoing
description: 'Rwanda built out the Kigali International Financial Centre as a financial services and investment-holding hub, combining Rwanda Finance Limited, investment-promotion services, tax and company-law
  facilitation, fintech and fund structures, and international partnership branding. The policy aims to expand cross-border financial intermediation and high-value services exports from Kigali.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: germany_tariff_act_1902
status: candidate
title: Germany Tariff Act 1902 (Buelow tariff)
countries: [DEU]
timeframe:
  start: 1902
description: >
  The 1902 tariff law raised duties on grain and a wide range of industrial goods,
  hardening the protectionist settlement that linked Junker agriculture with Ruhr
  heavy industry. It is commonly treated as the key fiscal-regulatory bargain of late
  Wilhelmine political economy: preserve domestic producers against foreign competition,
  stabilise elite coalition politics, and accept higher food and input costs as the
  price of social and political cohesion inside the empire.
enacted_by:
  - germany_imperial_tariff_social_insurance_state_1902_1914
coalition_label_at_enactment: "Imperial government under Chancellor Bernhard von Buelow"
axes_moved:
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Raised tariff protection on grain and industrial goods, making the imperial economy less open to import competition."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Tariff shelter reduced competitive pressure on incumbent agrarian and heavy-industrial interests."
references:
  - "Tarifgesetz of 1902"
  - "Gerschenkron (1943), Bread and Democracy in Germany"

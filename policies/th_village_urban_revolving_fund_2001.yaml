policy_id: th_village_urban_revolving_fund_2001
status: candidate
title: Thailand Village and Urban Revolving Fund (2001)
countries:
- THA
timeframe:
  start: 2001
  end: 2004
  enacted_date: '2001-04-18'
description: 'Village and Urban Revolving Fund Project launched under Thaksin April 2001 providing Bt 1m (~$25,000) revolving- credit capital to each of ~74,000 villages and ~4,500 urban communities (total
  ~Bt 78bn initial endowment). Village committee of 15 elected members administered loans to village households at locally-determined interest rates (~6-12% p.a.). One of largest single-stroke microfinance
  programmes globally. By 2010 cumulative Bt 650bn of microloan flows. Kaboski & Townsend (2011, 2012) estimated positive consumption effects and positive but modest investment effects. Defaults rose but
  repayment rates ~90% maintained through 2005.

  '
enacted_by:
- thailand_thaksin_trt_2001_2006
coalition_label_at_enactment: Thai Rak Thai
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Bt 78bn initial endowment distributed as revolving microloans to ~78,500 villages/communities.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Decentralised credit intermediation outside conventional banking supervision.
references:
- Cabinet Resolution on Village and Urban Revolving Fund, 18 April 2001
- Kaboski & Townsend (2011), 'A Structural Evaluation of a Large-Scale Quasi-Experimental Microfinance Initiative'

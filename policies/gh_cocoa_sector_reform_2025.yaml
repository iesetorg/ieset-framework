policy_id: gh_cocoa_sector_reform_2025
status: candidate
title: Ghana cocoa-sector stabilisation and COCOBOD reform package (2025)
countries:
- GHA
timeframe:
  start: 2025
  end: ongoing
description: >
  Cocoa-sector reform package responding to Ghana's production, smuggling, and
  arrears crisis after several weak crop years. The bundle targets farmer-price
  credibility, disease and rehabilitation programmes, COCOBOD balance-sheet repair,
  anti-smuggling enforcement, and more predictable procurement and export financing
  so that official cocoa purchases recover without treating the marketing-board
  model as costless.
enacted_by:
- ghana_mahama_ndc_second_2025_present
coalition_label_at_enactment: NDC Mahama second government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Farmgate support, rehabilitation, extension, and COCOBOD balance-sheet repair are targeted agricultural-sector support.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Anti-smuggling enforcement and procurement-finance cleanup improve formal-market compliance and auditability.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Cocoa marketing remains state-gated through official purchasing and export channels while reforms tighten compliance.
linked_hypotheses:
- state_monopoly_export_commodity_price_duty
- agricultural_productivity_poverty_reduction_panel
- export_openness_agricultural_diversification
references:
- Ghana COCOBOD 2025 sector reform and crop-season announcements
- Ghana Ministry of Finance 2025 Budget Statement and Economic Policy
notes: Created to materialise a declared policy on ghana_mahama_ndc_second_2025_present.

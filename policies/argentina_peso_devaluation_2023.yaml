policy_id: argentina_peso_devaluation_2023
status: candidate
title: Argentina Peso Devaluation 2023
countries:
- ARG
timeframe:
  start: 2023
  end: ongoing
description: 'Discrete devaluation of the official peso from roughly 365 to 800 per US dollar on 13 December 2023, a few days into the Milei administration, executed by BCRA Communication "A" alongside
  an initial 2% monthly crawling-peg target. The realignment closed most of the gap with the parallel rate, repriced Treasury revenue from export duties, and reset relative prices — but produced a one-off
  inflation spike above 25% in December 2023.

  '
enacted_by:
- milei_shock_therapy_argentina_2023
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Inflation eroded peso-denominated outlays in real terms, reducing primary spending in GDP terms.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Realignment of relative prices removed implicit subsidies to importers under the prior multiple-rate regime.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Closing of FX gap reduced parallel-market premium and incentivised export liquidation through official channels.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Real-wage compression from devaluation accelerated nominal-to-real adjustment without statutory action.

title: Padma Bridge self-financing decision (post-World-Bank withdrawal)
countries:
- BGD
timeframe:
  start: 2012
  enacted_date: '2012-07-09'
description: 'After the World Bank cancelled its $1.2bn IDA credit on 29 June 2012 citing corruption concerns, the Hasina cabinet on 9 July 2012 decided to finance the Padma Bridge entirely from domestic
  resources (supplemented by a toll-collection revenue model). The decision redirected fiscal space away from other capex and became a signature nationalist-developmentalist marker for the AL regime.

  '

policy_id: id_fdi_deregulation_1994
status: candidate
title: Indonesia FDI ownership liberalisation 1994
countries:
- IDN
timeframe:
  start: 1994
  enacted_date: '1994-06-02'
description: 'Government Regulation PP 20/1994 issued 2 Jun 1994 eliminated most foreign-ownership restrictions on FDI in Indonesia — allowing 100% foreign ownership in most sectors, removing minimum-capital
  requirements for many investments, and extending automatic-approval eligibility. One of the most significant FDI-regime liberalisations in Southeast Asia at that point; drove FDI inflows from $1.8bn (1990)
  to $6.2bn (1996).

  '
enacted_by:
- indonesia_suharto_deregulation_paket_1988_1996
coalition_label_at_enactment: New Order Golkar under Suharto
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: FDI ownership caps removed in most sectors; automatic-approval extended.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Foreign-investor property rights strengthened via 100% ownership rule.

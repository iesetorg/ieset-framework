policy_id: mz_imf_ecf_2022
status: candidate
title: Mozambique IMF Extended Credit Facility 2022
countries:
- MOZ
timeframe:
  start: 2022
  end: 2025
  enacted_date: '2022-05-09'
description: 'Mozambique entered a three-year IMF Extended Credit Facility in 2022 after the hidden-debt scandal and pandemic shock, using the programme to anchor fiscal consolidation, VAT and revenue administration
  changes, public wage-bill control, debt transparency, governance reforms, and monetary-policy credibility. The arrangement restored concessional programme financing after years without an IMF-supported
  programme.

  '

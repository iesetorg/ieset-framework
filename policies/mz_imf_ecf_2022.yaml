- mozambique_frelimo_gas_fiscal_reform_2014_present
scope: national
coalition_label_at_enactment: FRELIMO Nyusi government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Programme targets restrained deficits, wage-bill pressure, and arrears while protecting priority social spending.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The arrangement supported anti-inflation credibility and exchange-rate flexibility under the Banco de Mocambique.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Debt transparency, anti-corruption, and public-financial-management benchmarks responded to hidden-debt governance failures.

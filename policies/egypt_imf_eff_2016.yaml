policy_id: egypt_imf_eff_2016
status: candidate
title: Egypt Imf Eff 2016
countries:
- EGY
timeframe:
  start: 2016
  end: ongoing
description: 'Approved on 11 November 2016, Egypt''s three-year Extended Fund Facility provided about USD 12bn conditional on currency flotation, VAT introduction at 13% (rising to 14%), fuel-subsidy cuts,
  primary-balance targets, civil-service-wage restraint, and SOE-governance reform. The programme delivered all eight reviews by 2019 and is widely cited as the framing intervention of Egypt''s post-2016
  austerity phase.

  '

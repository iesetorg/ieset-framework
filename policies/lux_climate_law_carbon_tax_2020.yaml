description: 'Luxembourg''s climate law of 15 December 2020 set a national framework for emissions reduction and climate governance, followed by a carbon-pricing measure applied from 2021 to fossil fuels
  outside the EU ETS. The bundle combined statutory climate targets, planning obligations, and carbon-tax price signals for transport and heating fuels.

  '

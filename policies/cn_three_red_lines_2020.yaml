policy_id: cn_three_red_lines_2020
status: candidate
title: Property-Developer 'Three Red Lines' Framework 2020
countries:
- CHN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-08-20'
description: 'Prudential framework imposed by the PBoC and Ministry of Housing and Urban-Rural Development restricting property developers'' debt growth based on three balance-sheet thresholds: (1) liabilities-to-assets
  ex-prereceivables ≤ 70%; (2) net-debt-to-equity ≤ 100%; (3) cash-to- short-term-debt ≥ 1x. Developers breaching all three ("red") could not increase interest-bearing liabilities; those breaching two ("orange"),
  one ("yellow"), or zero ("green") faced graduated caps. Precipitated the Evergrande default (December 2021), Country Garden distress (2023), and the 2022-2024 property-sector contraction with new-home
  starts down ~60% peak-to-trough and property-sector share of GDP contracting from ~25-29% (broad measure, Rogoff-Yang 2021) toward high-teens. Structural deleveraging with no systemic-banking bailout;
  2024 housing-rescue measures (white list, relending facility, mortgage-rate cuts) represent cyclical relief rather than reversal of the framework.

  '

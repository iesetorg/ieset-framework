description: '27 Feb 2010 Mw 8.8 Maule earthquake + tsunami caused ~525 deaths + USD 30bn damage (~17% GDP). Piñera administration reconstruction programme financed via mix of temporary tax hikes (corporate
  rate 17%→20% 2011-12 Ley 20.455 Jul 2010, specific mining royalty reform Ley 20.469), redirected budget lines, bond issuance + reserve-fund drawdowns. Ley 20.551 mining closures law followed. By 2014
  housing-reconstruction targets ~90% complete.

  '

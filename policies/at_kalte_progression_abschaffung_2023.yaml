policy_id: at_kalte_progression_abschaffung_2023
status: candidate
title: Abolition of kalte Progression (bracket creep) 2023
countries:
- AUT
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2022-10-20'
description: 'Austria abolished cold progression (kalte Progression — the silent tax rise as nominal-wage inflation pushes taxpayers into higher brackets that were not inflation-indexed) effective 1 January
  2023. Two-thirds of the annual inflation adjustment now applies automatically to all income-tax bracket thresholds (and to family-related tax credits); the remaining one-third is allocated by annual government
  decision. Ends a structural feature of the Austrian income-tax system that had been criticised across the ideological spectrum for decades as a non-legislated revenue windfall.

  '
enacted_by:
- austria_nehammer_ovp_greens_2022_2025
coalition_label_at_enactment: OeVP-Gruene
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Eliminates the inflation-driven upward creep of effective rates, a structural reduction in revenue-yielding progressivity over time.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Closes an implicit-tax loophole where real tax increases occurred without legislative vote; strengthens rule-based fiscal policy.
references:
- Teuerungs-Entlastungspaket III (BGBl. I Nr. 194/2022)
- IHS / WIFO analyses of kalte-Progression revenue effect pre-2023

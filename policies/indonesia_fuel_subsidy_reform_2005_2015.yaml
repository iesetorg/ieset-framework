policy_id: indonesia_fuel_subsidy_reform_2005_2015
status: candidate
title: Indonesia Fuel Subsidy Reform 2005 2015
countries:
- IDN
timeframe:
  start: 1998
  end: ongoing
description: 'Successive Indonesian governments raised regulated retail fuel prices in 2005, 2008, 2013, and 2014–15 to reduce the budgetary cost of generalised fuel subsidies, which had reached approximately
  20% of central-government spending. The Jokowi government''s January 2015 decision to scrap subsidies on premium gasoline and cap diesel subsidies represented the most decisive break, paired with expansion
  of cash-transfer compensation through the BLSM and PKH programmes.

  '
enacted_by:
- indonesia_reformasi_1998_present
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced fiscal pressure shielded BI from informal pressure to monetise commodity-price shocks.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Subsidy removal aligned with broader market-pricing discipline favoured by financial-sector reformers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher retail prices opened space for non-Pertamina fuel retailers to compete on equal footing.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Compensatory cash-transfer programmes (BLSM, PKH) expanded targeted social assistance.

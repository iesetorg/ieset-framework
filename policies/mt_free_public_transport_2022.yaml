policy_id: mt_free_public_transport_2022
status: candidate
title: Malta free public transport for residents 2022
countries:
- MLT
timeframe:
  start: 2022
  end: ongoing
description: 'Malta made scheduled bus public transport free at the point of use for holders of personalised Tallinja cards from October 2022. The policy replaced fare revenue for eligible resident users
  with budget support to the transport system, aiming to lower commuting costs, shift trips away from private cars, and reduce congestion and emissions.

  '

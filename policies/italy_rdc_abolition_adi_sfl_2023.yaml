policy_id: italy_rdc_abolition_adi_sfl_2023
status: candidate
title: Italy Reddito di Cittadinanza abolition and replacement with ADI + SFL 2023
countries:
- ITA
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-05-04'
description: 'Decreto Lavoro (DL 48/2023, Law 85/2023) and 2023 Budget Law (Law 197/2022) abolished Reddito di Cittadinanza from 1 January 2024 and replaced it with two narrower schemes. Assegno di Inclusione
  (ADI): means-tested, restricted to households with at least one member under 18, over 60, disabled, or in a care role — monthly payments up to €500 + €280 housing, ISEE ≤ €9,360, similar benefit architecture
  but narrower gate. Supporto per la Formazione e il Lavoro (SFL): €350/month for up to 12 months for working-age members not eligible for ADI, conditional on active participation in training / work-activation
  pathway. Effect: coverage compressed from ~1.3m RdC households (peak) to ~737k ADI households by end 2024 plus ~117k SFL beneficiaries (INPS figures). Ex-ante budgeted savings ~€2bn per year vs RdC baseline.
  Interim period May-August 2023 saw RdC terminations for ''occupabili'' (working-age non-dependant) households generating political controversy.

  '

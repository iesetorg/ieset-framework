policy_id: ir_targeted_subsidies_reform_2010
status: candidate
title: Targeted Subsidies Reform Law (hedfmandi-yarane-ha)
countries:
- IRN
timeframe:
  start: 2010
  enacted_date: '2010-12-19'
description: 'Landmark subsidy-reform law ratified 5 Jan 2010; Phase 1 implemented 19 Dec 2010 raising domestic petrol prices ~4x, diesel ~9x, and electricity/water 2-5x toward import-parity levels while
  launching universal cash transfers (~IRR 455,000/month per capita initial, roughly $45 at then-FX) to ~73m of Iran''s ~75m population via newly opened bank accounts. Phase 2 (2014) stalled under Rouhani.

  '
enacted_by:
- iran_ahmadinejad_principlist_2005_2013
- iran_rouhani_moderate_2013_2021
coalition_label_at_enactment: Principlist government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  rationale: Fuel/electricity/water price subsidies removed toward import parity.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  rationale: Universal per-capita cash transfers to ~97% of population.
references:
- 'Salehi-Isfahani (2014), ''Iran''s Subsidy Reform: From Promise to Disappointment'''
- IMF Article IV Iran 2011

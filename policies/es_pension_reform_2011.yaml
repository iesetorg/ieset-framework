policy_id: es_pension_reform_2011
status: candidate
title: Pension Reform 2011
countries:
- ESP
timeframe:
  start: 2008
  end: 2011
description: 'Law 27/2011 on pensions, agreed in the Toledo Pact and the Acuerdo Social y Económico, raised the legal retirement age from 65 to 67 (phased to 2027), extended the contribution period for
  full pensions from 35 to 37 years, and lengthened the calculation base from 15 to 25 years. It anchored Zapatero II''s medium-term consolidation strategy ahead of EU surveillance.

  '
enacted_by:
- spain_zapatero_ii_psoe_2008_2011

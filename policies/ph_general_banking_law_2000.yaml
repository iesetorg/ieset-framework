title: Philippines General Banking Law 2000 (RA 8791)
countries:
- PHL
timeframe:
  start: 2000
  end: 2000
  enacted_date: '2000-05-23'
description: 'Republic Act 8791 (General Banking Law of 2000) signed 23 May 2000, modernised 1948 General Banking Act. Raised foreign-bank ownership limit for existing domestic banks from 40% to 100% with
  ceilings on net domestic branches; permitted universal- banking activities for qualified institutions; adopted Basel capital-adequacy framework; strengthened BSP prudential authority. Paired with E-Commerce
  Act (RA 8792) for electronic documents and signatures. Foundation for BSP''s subsequent 1997-2008 banking-consolidation programme.

  '

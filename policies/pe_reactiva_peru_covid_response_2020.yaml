policy_id: pe_reactiva_peru_covid_response_2020
status: candidate
title: Reactiva Peru Covid Response 2020
countries:
- PER
timeframe:
  start: 2018
  end: 2020
description: 'Reactiva Peru, the flagship credit-guarantee programme of the 2020 COVID response under the Vizcarra government, channelled state-backed liquidity to firms via the banking system and BCRP
  repo operations. The programme was among the largest emerging-market private-credit support schemes relative to GDP, intended to preserve payroll and supplier chains during the lockdown shock. Subsequent
  reviews flagged targeting weaknesses including allocations to non-formal beneficiaries.

  '
enacted_by:
- peru_vizcarra_2018_2020
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme operated through statutory MEF/BCRP rules with audit trails on guarantee allocations.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Co-enacted with broader Vizcarra anti-corruption agenda governing emergency procurement and credit oversight.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: State guarantees on private bank lending acted as a contingent transfer to firms preserving payrolls.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Guarantee programme materially raised contingent fiscal liabilities and realised spending on defaults.

title: India Sarva Shiksha Abhiyan — universal elementary education (2001)
countries:
- IND
timeframe:
  start: 2001
  end: 2018
  enacted_date: '2001-11-15'
description: 'Sarva Shiksha Abhiyan (SSA) flagship universal-elementary- education programme launched 2001. Target: universal access and retention for children 6-14 by 2010. Centre-state cost sharing 85:15
  initially, shifted to 65:35 by 2006. Combined with 86th Constitutional Amendment (December 2002) making free-and-compulsory-elementary-education a fundamental right under Article 21A. Scaled to 1.6m schools
  by peak. Right to Education Act 2009 operationalised the Article 21A right. Merged into Samagra Shiksha 2018.

  '

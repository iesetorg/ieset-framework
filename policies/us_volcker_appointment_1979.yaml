policy_id: us_volcker_appointment_1979
status: candidate
title: Volcker Appointment 1979
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'In August 1979 President Carter nominated Paul Volcker as Federal Reserve Chair, who almost immediately launched a regime change in monetary policy targeting non-borrowed reserves and tolerating
  sharp interest-rate volatility to break double-digit inflation. The October 6, 1979 shift in operating procedures pushed the federal funds rate above 19 percent in 1981 and triggered a deep recession
  that culminated in disinflation by mid-1980s.

  '

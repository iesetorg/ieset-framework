policy_id: france_eec_accession_rome_treaty_1957
status: candidate
title: France Eec Accession Rome Treaty 1957
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'France''s accession to the European Economic Community via the 1957 Treaty of Rome committed Paris to a customs union, common external tariff, and progressive elimination of internal trade
  barriers among the original six member states. Ratification embedded French agriculture, industry, and services into a supranational regulatory and subsidy framework (later the CAP) and locked in tariff
  liberalisation alongside continued sectoral planning at home.

  '
enacted_by:
- france_trente_glorieuses_indicative_planning_1945_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Common Market rules layered EEC sectoral regulation on top of French national licensing regimes.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Treaty foreshadowed Common Agricultural Policy transfers and pooled industrial support schemes.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Customs union and intra-EEC tariff dismantlement materially opened French trade with partners.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: French contributions to Community budget and CAP added a new fiscal commitment line.

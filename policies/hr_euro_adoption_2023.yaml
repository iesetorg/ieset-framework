status: candidate
title: Croatia euro adoption 2023
countries:
- HRV
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-01-01'
description: 'Croatia adopted the euro on 1 January 2023 after Council Decision 2022/1211 concluded that it fulfilled the convergence conditions and abrogated its derogation. The changeover replaced the
  kuna, moved Croatian monetary policy into the Eurosystem framework, and removed exchange-rate conversion frictions with euro-area trade, tourism, and financial partners.

  '

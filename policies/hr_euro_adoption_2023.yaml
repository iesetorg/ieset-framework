- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Monetary-policy discretion moved from the Croatian National Bank to the independent ECB/Eurosystem framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Euro adoption eliminated currency-conversion costs and exchange-rate risk with euro-area partners.
references:

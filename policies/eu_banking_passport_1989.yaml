timeframe:
  start: 1986
  end: 1993
description: 'The Second Banking Coordination Directive (89/646/EEC) established the EU "single banking licence" (banking passport), allowing credit institutions authorised in any member state to provide
  services and open branches across the EU on the basis of home-country authorisation and supervision. Combined with the 1988 capital-movements directive, it operationalised free movement of financial services
  in the run-up to the 1992 single-market completion deadline.

  '
enacted_by:
- eu_single_market_1993
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Cross-border banking competition opened as banks could service all member states from a single licence.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Removed national authorisation requirements for banking services trade across member-state borders.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Branch establishment freedom enabled posting of bank staff and managers across member states.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Replaced 12 separate national authorisations with mutually-recognised home-country licence.

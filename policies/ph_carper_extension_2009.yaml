policy_id: ph_carper_extension_2009
status: candidate
title: Philippines CARPER agrarian-reform extension (2009)
countries:
- PHL
timeframe:
  start: 2009
  end: 2014
  enacted_date: '2009-08-07'
description: 'Republic Act 9700 (Comprehensive Agrarian Reform Program Extension with Reforms, CARPER) signed 7 August 2009 extending the 1988 Comprehensive Agrarian Reform Program (CARP, RA 6657) by five
  years (to June 2014) with funding commitment of PHP 150bn. CARP originally launched under Cory Aquino redistributed ~5.3m hectares (target 10.3m); CARPER added ~1m ha. Strengthened compulsory-acquisition
  procedures against large landholdings, reinstated five-year protection against land-conversion, expanded support services (credit, irrigation). Programme formally expired 2014 after CARPER''s five-year
  extension; residual distribution continued administratively.

  '

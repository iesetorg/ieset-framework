  enacted_date: '2017-06-25'
description: 'D.L. 99/2017 (25 Jun 2017) ordering compulsory administrative liquidation of Banca Popolare di Vicenza and Veneto Banca, transferring the performing perimeter to Intesa Sanpaolo for €1 symbolic
  consideration with up to €5.4bn in state capital support plus ~€12bn in state guarantees on the non-performing perimeter — executed via the national insolvency framework rather than the EU BRRD single-resolution
  mechanism (SRM declared them ''not in the public interest'' for SRB resolution). Politically controversial in juxtaposition to the BRRD-style MPS recap the previous week.

  '

policy_id: brazil_minimum_wage_policy_2003_2010
status: candidate
title: Brazil Minimum Wage Policy 2003 2010
countries:
- BRA
timeframe:
  start: 2003
  end: 2010
description: 'Across the Lula presidency, the federal minimum wage (salario minimo) was increased annually well above CPI, roughly doubling in real terms between 2003 and 2010. The policy was eventually
  formalised in 2011 (Lei 12382) as a valorisation rule indexing annual real adjustments to lagged GDP growth plus prior-year inflation. Because federal pensions, INSS benefits, and many social transfers
  are statutorily linked to the minimum wage, the policy operated simultaneously as wage floor and social-spending escalator.

  '
enacted_by:
- brazil_lula_da_silva_bolsa_familia_2003_2010
axes_moved:
- axis: fiscal.transfer_expansion

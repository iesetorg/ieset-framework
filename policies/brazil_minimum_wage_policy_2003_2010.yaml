  intended: true
  rationale: INSS pensions and BPC benefits indexed to the minimum wage rose mechanically with each adjustment.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Real-wage gains compressed bottom-decile earnings ratios and lifted formal-sector low-wage workers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Indexation of pensions to the minimum wage escalated mandatory federal social-security spending.
- axis: monetary.central_bank_independence

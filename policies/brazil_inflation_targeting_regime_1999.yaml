policy_id: brazil_inflation_targeting_regime_1999
status: candidate
title: Brazil Inflation Targeting Regime 1999
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'After the January 1999 devaluation broke the crawling-peg anchor of the 1994 Real Plan, Decree 3088 formalised a Banco Central do Brasil inflation-targeting regime built on numerical CPI targets
  set by the Conselho Monetario Nacional, Copom-driven Selic-rate decisions, and an open-letter accountability mechanism. The regime became the monetary leg of Brazil''s post-Real macro tripod alongside
  the fiscal-responsibility law and the floating exchange rate.

  '
enacted_by:
- brazil_real_plan_1994
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Numerical CPI target plus open-letter rule formalised Banco Central operational autonomy.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher real Selic rates raised fiscal cost of slippage, forcing complementary spending discipline.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced inflation indexation removed price-distorting markup and contracting frictions.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Stable inflation expectations supported the floating exchange rate and continued tariff opening.

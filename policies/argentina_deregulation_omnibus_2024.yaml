policy_id: argentina_deregulation_omnibus_2024
status: candidate
title: Argentina Deregulation Omnibus 2024
countries:
- ARG
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2024-07-08'
description: 'The "Bases" omnibus law (Ley Bases y Puntos de Partida para la Libertad de los Argentinos, Law 27.742) submitted by the Milei administration in late 2023 and enacted in July 2024 consolidated
  wide-ranging deregulation: delegated emergency powers, repeal or modification of rent-control and supply-management statutes, simplification of business registration, privatisation authorisations, labour-law
  amendments, and the Regimen de Incentivo para Grandes Inversiones (RIGI). The package complemented DNU 70/2023 and aimed to dismantle multiple layers of economic intervention.

  '
enacted_by:
- milei_shock_therapy_argentina_2023
coalition_label_at_enactment: La Libertad Avanza with PRO, UCR, Hacemos Coalicion Federal, and provincial legislative support
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privatisation authorisations and subsidy reform reduced state outlays and contingent liabilities.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Repeal of rent control, supply-management laws, and licensing barriers expanded market entry.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: RIGI investment regime offered tax/FX guarantees attracting capital flows and tradeable-sector activity.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Labour-chapter amendments extended trial periods and reduced employer severance exposure.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: RIGI lowered effective tax burdens for qualifying large investments through tax, customs, and foreign-exchange stability.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: RIGI created targeted tax and customs incentives for large projects in eligible investment sectors.

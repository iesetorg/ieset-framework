policy_id: argentina_deregulation_omnibus_2024
status: candidate
title: Argentina Deregulation Omnibus 2024
countries:
- ARG
timeframe:
  start: 2023
  end: ongoing
description: 'The "Bases" omnibus law (Ley Bases y Puntos de Partida) submitted by the Milei administration in late 2023 and enacted in mid-2024 (Law 27.742) consolidated wide-ranging deregulation: repeal
  of rent-control and supply-management statutes, simplification of business registration, privatisation authorisations, and an investment-incentive regime (RIGI). The package complemented DNU 70/2023 and
  aimed to dismantle decades of economic intervention.

  '

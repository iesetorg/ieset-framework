  intended: true
  rationale: Legal end-date for coal electricity by 2038; auctions accelerating closures.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: €40bn structural-aid to coal regions; operator compensation.
- axis: regulatory.energy_supply_security

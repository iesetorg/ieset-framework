policy_id: de_kohleausstieg_2020
status: candidate
title: Germany Kohleausstieg (coal phase-out law, 2020)
countries:
- DEU
timeframe:
  start: 2020
  end: 2038
  enacted_date: '2020-07-03'
description: 'Kohleverstromungsbeendigungsgesetz (KVBG) scheduling the phase-out of coal-fired electricity generation by 2038 (with option to bring forward to 2035), adopted alongside the Strukturstärkungsgesetz
  providing €40bn in structural-adjustment aid to lignite regions (Lausitz, Rheinisches Revier, Mitteldeutschland). Compensation payments to operators up to €4.35bn negotiated. Target subsequently reaffirmed
  / accelerated to ''ideally 2030'' in 2021 coalition agreement.

  '
enacted_by:
- germany_merkel_iv_2017_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition

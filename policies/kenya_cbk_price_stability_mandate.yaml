policy_id: kenya_cbk_price_stability_mandate
status: candidate
title: Kenya Cbk Price Stability Mandate
countries:
- KEN
timeframe:
  start: 2002
  end: 2013
description: 'Reforms to the Central Bank of Kenya Act and the 2010 Constitution defined price stability as the CBK''s primary objective and reinforced the bank''s operational independence from the Treasury,
  including limits on direct lending to government and explicit governor-tenure protections. Combined with the introduction of an indicative inflation target and a Monetary Policy Committee, the framework
  anchored macroeconomic policy through the Vision 2030 era.

  '

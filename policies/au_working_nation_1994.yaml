description: 'White Paper released 4 May 1994 targeting long-term unemployment (above 11% in 1992) via an active-labour-market-programme "Job Compact" — a 6-to-12-month subsidised-placement guarantee for
  unemployed 18 months+; intensive case management; and training allowances. Programme cost A$6.5bn over four years. Major component wound back under Howard Coalition from 1996.

  '

policy_id: hu_flat_pit_2011
status: candidate
title: Flat personal-income-tax reform (Hungary, 2011)
countries:
- HUN
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-01-01'
description: 'Replacement of Hungary''s prior progressive personal-income-tax schedule (17% and 32% brackets) with a single flat 16% rate applied to a ''super-gross'' base (gross income plus a 27% employer-social-
  contribution adjustment) from 1 January 2011, simplified to the standard gross base by 2013. Rate cut to 15% from 1 January 2016 and maintained thereafter — the EU''s joint-lowest flat PIT alongside Bulgaria.
  Coupled with expansion of the family-tax allowance (családi kedvezmény) providing per-child deductions (higher for three-or-more-child families), the ''under-30 mother'' lifetime PIT exemption from January
  2023, the ''young under-25'' PIT exemption from January 2022, and the permanent PIT exemption for mothers of four or more children from January 2020. Progressive content of the system delivered through
  targeted family-status allowances rather than rate structure.

  '
enacted_by:
- hungary_orban_2010_2022
- hungary_orban_fourth_term_2022_present
coalition_label_at_enactment: Fidesz–KDNP second-term two-thirds majority
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Flat 16% (then 15%) rate replaced prior two-bracket schedule; progressivity moved into family-status allowances rather than rate design.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Family-tax allowance expansion and subsequent under-30 mother + mothers-of-four PIT exemptions function as large targeted transfers through the tax code.

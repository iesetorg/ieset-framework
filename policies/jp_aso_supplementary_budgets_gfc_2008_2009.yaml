description: 'Three supplementary budgets passed between October 2008 and May 2009 under the Asō cabinet totalling approximately ¥26 trillion of fiscal stimulus — the first life-support package (¥26.9tn
  headline, ~¥2tn real new spending, October 2008), a second package (¥27tn headline including loan guarantees, December 2008), and the largest — FY2009 first supplementary — passed May 2009 at ¥14.7tn
  real new spending (roughly 3% of GDP). Components included the ¥12,000 per resident teigaku kyūfukin cash handout, eco-car and eco-point subsidies for consumer durables, SME credit-guarantee expansion,
  employment adjustment subsidies (koyō chōsei josei-kin), and public-works frontloading. Japan''s 2009 output still contracted 5.4% but rebounded sharply in 2010.

  '

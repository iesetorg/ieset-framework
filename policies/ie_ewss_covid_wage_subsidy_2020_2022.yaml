policy_id: ie_ewss_covid_wage_subsidy_2020_2022
status: candidate
title: Ireland Employment Wage Subsidy Scheme (EWSS) and Pandemic Unemployment Payment (PUP), 2020-2022
countries:
- IRL
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-08-01'
description: 'Combined pandemic income-support architecture operated by Revenue and the Department of Social Protection. The Pandemic Unemployment Payment (PUP) launched 16 March 2020 at €203/week, peaking
  at €350/week, with ~600,000 recipients at peak. Replacing the Temporary Wage Subsidy Scheme on 1 September 2020, the Employment Wage Subsidy Scheme (EWSS) paid employers flat per-head subsidies (€151.50
  / €203 / €300 / €350 per eligible employee) plus PRSI relief for firms with ≥30% turnover decline, with tapering through 2021 and final closure 30 April 2022. Combined direct pandemic supports totalled
  ~€16bn across EWSS (€7.8bn), PUP (€9.1bn), and related schemes. Deficit 2020 reached €19bn (~9% GDP), funded by record NTMA issuance at near-zero rates.

  '
enacted_by:
- ireland_martin_ff_rotating_2020_2022
coalition_label_at_enactment: FF + FG + Green rotating-Taoiseach coalition (Martin Taoiseach; Donohoe Finance)

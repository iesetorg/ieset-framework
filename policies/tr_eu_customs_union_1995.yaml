description: 'EU-Turkey Association Council Decision 1/95, signed 6 March 1995 and entering into force 1 January 1996, established a customs union covering industrial goods and processed agricultural products
  (excluding primary agriculture, services, and public procurement). Turkey adopted the EU Common External Tariff and aligned on commercial policy, competition law, and IP protection. At the time it was

description: 'At the October 2011 Eurozone summit, leaders agreed in principle to a second EUR 130 billion programme for Greece coupled with a voluntary 50% private-creditor haircut, contingent on additional
  Greek fiscal measures. The political agreement was destabilised by Papandreou''s brief proposal of a referendum and led to his resignation, paving the way for the technocratic Papademos government to
  implement the formal programme.

  '

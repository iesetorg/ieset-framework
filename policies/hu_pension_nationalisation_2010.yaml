policy_id: hu_pension_nationalisation_2010
status: candidate
title: Pension Nationalisation 2010
countries:
- HUN
timeframe:
  start: 2010
  end: 2022
description: 'Hungary''s 2010 pension nationalisation, enacted by 2010. évi C. törvény and accompanying Act CLIV/2010, effectively forced participants in the second-pillar mandatory private pension funds
  (introduced in 1998) to transfer their accumulated assets — about HUF 3,000bn (10% of GDP) — back to the state pillar by January 2011, on pain of losing future state-pension entitlements. The intended
  effect was to capture private-pension assets to lower headline public debt and finance Orbán''s first-term fiscal expansion.

  '
enacted_by:
- hungary_orban_2010_2022
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Nationalised assets used alongside flat PIT, reducing overall progressivity.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Companion sectoral and corporate-tax reform reduced effective corporate burdens.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Asset confiscation moved liabilities back to PAYG, modestly altering implicit transfer obligations.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Recovered assets cross-financed family-policy and mortgage support sectoral subsidies.

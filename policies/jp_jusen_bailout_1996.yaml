policy_id: jp_jusen_bailout_1996
status: candidate
title: Japan jusen housing-loan companies bailout 1996
countries:
- JPN
timeframe:
  start: 1996
  enacted_date: '1996-06-21'
description: '¥685 billion taxpayer contribution approved Jun 1996 toward resolving seven bankrupt jusen (housing-loan) companies with combined ¥6.4 trillion losses. Structured through the Deposit Insurance
  Law amendment and the Housing Loan Administration Corporation. Political backlash against direct fiscal bailout of financial firms shaped the later 1998 Financial Function Stabilization Act and delayed
  deeper bank-sector resolution until 1998-99 crisis.

  '

description: 'In June 2008 the Samak government''s Foreign Minister Noppadon Pattama signed a joint communiqué supporting Cambodia''s UNESCO World Heritage application for Preah Vihear temple. The Constitutional
  Court ruled the act unconstitutional for lacking parliamentary approval, forcing the minister''s resignation and igniting a Thai-Cambodian border standoff that destabilised the PPP government and amplified
  PAD protests against the cabinet.


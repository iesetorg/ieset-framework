policy_id: no_pension_reform_2011
status: candidate
title: Pensjonsreformen — pension reform with life-expectancy adjustment
countries:
- NOR
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-01-01'
description: 'Structural reform of the Norwegian statutory pension system (folketrygden) phased in from 1 January 2011, with core features (i) life-expectancy adjustment (levealdersjustering) of pension
  benefits, (ii) flexible retirement between ages 62 and 75 with actuarially fair adjustment, (iii) earnings-related accrual across all working years (alleårsregel) rather than best 20 of 40, (iv) indexation
  of pensions in payment to wage growth minus 0.75 points, and (v) reforms to the private-sector AFP early-retirement scheme into a lifelong supplement. Rationale: re-gear defined- benefit pillar toward
  longevity sustainability while preserving retirement-age flexibility; broad cross-party backing.

  '
enacted_by:
- norway_stoltenberg_ii_redgreen_2005_2013
coalition_label_at_enactment: AP–SV–Sp red-green majority; cross-party Storting support
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Life-expectancy adjustment is a statutory rule binding future benefit outlays to demographic realisation, substituting automatic adjustment for discretionary re-legislation.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Long-run pension outlay trajectory reduced relative to pre-reform counterfactual via longevity adjustment.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Flexible retirement 62-75 with actuarial neutrality removes kinked labour-supply disincentive at statutory age.
references:

policy_id: uk_clean_power_2030_action_plan_2024
status: candidate
title: Clean Power 2030 Action Plan - United Kingdom 2024
countries:
- GBR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-13'
description: >
  The Clean Power 2030 Action Plan set out the Starmer government's delivery
  programme for a predominantly clean electricity system by 2030, including
  grid connection reform, planning and consenting acceleration, renewables
  deployment, flexible capacity, low-carbon dispatchable power, and
  coordination with Great British Energy and Contracts for Difference
  allocation rounds.

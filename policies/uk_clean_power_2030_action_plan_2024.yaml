  direction: +
  magnitude: strong
  intended: true
  rationale: Operationalises a 2030 clean-power target through grid, planning, renewables, and low-carbon flexibility measures.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  intended: true
  rationale: Stated aim is to reduce exposure to fossil-fuel price shocks by expanding domestic clean generation and system flexibility.

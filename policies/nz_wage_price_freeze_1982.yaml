title: New Zealand comprehensive wage-price-rent-interest freeze 1982-1984
countries:
- NZL
timeframe:
  start: 1982
  end: 1984
  enacted_date: '1982-06-22'
description: 'Stabilisation of Remuneration Act June 1982 froze wages, prices, rents, dividends, and interest rates. Extended in 1983 and early 1984 until lifted under the incoming Lange government. Temporary
  inflation relief (~4% 1983) but produced severe distortions in relative prices and pent-up adjustment that unwound sharply post-1984. Most ambitious wage-price freeze attempted in a developed democracy
  in the post-war period.

  '

policy_id: dk_labour_market_reform_flexicurity_1994
status: candidate
title: Danish labour-market reform — flexicurity foundation 1994-1998
countries:
- DNK
timeframe:
  start: 1994
  end: 1998
  enacted_date: '1994-01-01'
description: 'Arbejdsmarkedsreform I (1994), II (1995), and III (1998) introduced right-and-duty activation, individual action plans, and rotation/education-leave schemes alongside preserved generous unemployment
  benefits. Foundation of the "flexicurity" model combining flexible hiring/firing with security through income support and active labour-market policy.

  '
enacted_by:
- denmark_nyrup_rasmussen_socdem_1993_2001
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Activation requirements tightened; benefit duration shortened from 8 to 4 years over series.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Active labour-market programmes expanded even as passive-benefit tail shortened.
references:
- Lov nr. 434 af 30. juni 1993 om arbejdsmarkedsuddannelser
- Madsen, P.K. (2004) The Danish model of flexicurity

policy_id: eg_imf_eff_3bn_2022
status: candidate
title: Imf Eff 3Bn 2022
countries:
- EGY
timeframe:
  start: 2018
  end: 2024
description: 'Approved by the IMF Board in December 2022, Egypt''s 46-month Extended Fund Facility provided about USD 3bn (later augmented in March 2024 to USD 8bn) against commitments to a permanently
  flexible exchange rate, primary-surplus fiscal targets, state-ownership reform, and divestment of military-affiliated firms. Disbursements were tied to phased reviews and complemented by EU and World
  Bank financing.

  '
enacted_by:
- egypt_sisi_second_term_2018_2024
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme financing accommodated higher gross spending while consolidating the primary balance.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme conditionality required scaled-up Takaful/Karama transfers to cushion subsidy reform.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: SOE-divestment timelines proved slow in practice, leaving incumbents shielded during the programme.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme delivery proceeded under unchanged executive dominance over courts and the public prosecutor.

status: candidate
title: Botswana Debswana Joint Venture 1969
countries:
- BWA
timeframe:
  start: 1966
  end: ongoing
description: 'The Debswana joint venture, founded in 1969 between the Government of Botswana and De Beers, is a 50/50 partnership operating the country''s diamond mines (Orapa, Letlhakane, Jwaneng, Damtshaa).
  Under successive sales agreements and the 2011 marketing agreement, Botswana captures the bulk of profits via tax, royalty, and dividend channels and progressively moved aggregating, sorting, and sales
  activity onshore. The intended effect was credible commitment to property rights with the state as co-owner, while channelling diamond rents through transparent fiscal mechanisms.

  '

policy_id: id_paket_juni_banking_dereg_1983
status: candidate
title: Paket Juni banking deregulation (Indonesia 1983)
countries:
- IDN
timeframe:
  start: 1983
  end: 1983
  enacted_date: '1983-06-01'
description: 'Bank Indonesia reform package 1 Jun 1983 (''Paket Juni''): state-bank credit ceilings lifted, interest-rate controls on state-bank deposits and loans removed, Bank Indonesia rediscount facilities
  liberalised, selective-credit instruments phased out. First major banking deregulation in New Order; precursor to PAKTO Oct 1988 that opened new private-bank licensing.

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  intended: true
  rationale: State-bank credit ceilings and interest-rate controls lifted — first major banking reform.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Interest-rate liberalisation reduced financial-repression rents.
references:
- Nasution (1983), Financial Institutions and Policies in Indonesia
- 'Cole & Slade (1996), Building a Modern Financial System: The Indonesian Experience'

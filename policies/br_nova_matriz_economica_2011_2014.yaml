policy_id: br_nova_matriz_economica_2011_2014
status: candidate
title: Nova Matriz Econômica — Dilma heterodox policy mix
countries:
- BRA
timeframe:
  start: 2011
  end: 2014
  enacted_date: '2011-08-02'
description: '"New Economic Matrix" (Mantega) — heterodox combination: below-neutral real interest rates via Selic cut cycle 2011-2013 (peak 12.5% to 7.25% Oct 2012), administered-price suppression (electricity
  MP 579 Sep 2012, Petrobras fuel-price freeze), credit-cycle push via BNDES + Caixa + BB, IPI auto-sector holidays 2011-2014, Plano Brasil Maior industrial-policy package Aug 2011 (tax exemptions, local-content
  rules, desoneração da folha payroll-tax relief for 56 sectors). Framework abandoned 2015 under Joaquim Levy orthodox adjustment.

  '

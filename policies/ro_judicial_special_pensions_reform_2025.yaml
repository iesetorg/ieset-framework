# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ro_judicial_special_pensions_reform_2025
status: candidate
title: Romania judicial and special-pensions reform (2025)
countries:
- ROU
timeframe:
  start: 2025
  end: ongoing
description: >
  Reform of Romania's judicial and other special-pension regimes, linked to
  fiscal consolidation and EU Recovery and Resilience Facility milestones. The
  policy seeks to narrow exceptional retirement privileges, raise effective
  retirement ages or contribution links, and make pension treatment less
  segmented while preserving constitutional protections for judicial
  independence after earlier reform attempts were challenged.
enacted_by:
- romania_dan_bolojan_reformist_2025_present
coalition_label_at_enactment: Dan-Bolojan reform coalition
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reducing privileged special-pension outlays narrows a transfer entitlement category.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Lower long-run pension commitments contribute to the consolidation path.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: RRF-compatible design attempts to reform judicial pensions through transparent general rules rather than ad hoc executive pressure.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Equalising exceptional pension treatment and satisfying EU rule-of-law milestones improves legal predictability.
linked_hypotheses:
- judicial_independence_growth_persistence
- rule_of_law_institutional_growth
- public_pension_generosity_elderly_poverty_fiscal_tradeoff
references:
- Romania Recovery and Resilience Facility milestones on special pensions
- Romanian government 2025 pension reform materials
notes: Created to materialise a declared policy on romania_dan_bolojan_reformist_2025_present.

policy_id: vn_khoan_10_agriculture_1988
status: candidate
title: Vietnam Khoán 10 household contract system in agriculture 1988
countries:
- VNM
timeframe:
  start: 1988
  enacted_date: '1988-04-05'
description: 'Politburo Resolution No. 10 (Nghị quyết 10, ''Khoán 10'') issued 5 Apr 1988 restored land-use rights to rural households under 15-year contracts, de facto decollectivising Vietnamese agriculture
  after decades of cooperative farming. Households kept output above quota; cooperatives reduced to service-provision role. Triggered rapid rice-output growth — Vietnam moved from rice-importer to world''s
  third-largest exporter within five years.

  '

policy_id: bg_nationalisation_law_1947
status: candidate
title: Bulgaria nationalisation law 1947
countries: [BGR]
timeframe: {start: 1947, end: 1948}
description: >
  Bulgaria's communist government nationalised banks, mines, factories, and
  large industrial and commercial enterprises in the late 1940s. The policy
  transferred the commanding heights of the economy to state ownership and
  formed the institutional base for central planning.
enacted_by:
  - bulgaria_communist_state_building_1944_1989
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, intended: true, rationale: "Large-scale expropriation removed private control of major productive assets."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, intended: true, rationale: "State ownership displaced competitive enterprise operation."}
references:
  - "Library of Congress Country Study: Bulgaria, communist consolidation"
  - "Crampton (2007), Bulgaria"

policy_id: india_aadhaar_rollout_2010_present
status: candidate
title: India Aadhaar Rollout 2010 Present
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'Aadhaar, launched by the Unique Identification Authority of India (UIDAI) under the UPA-II government from 2010 and placed on statutory footing by the Aadhaar Act 2016, issued biometric-linked
  unique identification numbers to over a billion residents. The system became the backbone of Direct Benefit Transfer (DBT) reforms across LPG subsidies, MGNREGA payments, food entitlements, and banking-correspondent
  rails (JAM trinity).

  '
enacted_by:
- india_singh_upa_ii_2009_2014
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Enabled large-scale DBT rollouts that broadened reach of cash, fuel, and food transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: UIDAI infrastructure plus DBT plumbing represented sizeable new central-government capex/opex.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Underpinned KYC and digital-payments stack that lowered cost-of-entry for international fintech firms.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Legitimised new licensing regimes (Aadhaar-enabled banking) while tightening data-use rules after the 2018 Supreme Court ruling.

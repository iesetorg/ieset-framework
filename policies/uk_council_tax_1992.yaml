policy_id: uk_council_tax_1992
status: candidate
title: Council Tax 1992
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'The Local Government Finance Act 1992 introduced the Council Tax in Great Britain from April 1993, replacing the politically toxic Community Charge ("poll tax") with a property-value banded
  charge combined with a personal-element discount for single-occupant households. The hybrid design retained some local fiscal autonomy for billing authorities while restoring the broad principle that
  local taxes should reflect property values.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Resolution of the poll-tax fiscal crisis reduced fiscal-monetary cross-pressure on Bank operations.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Property-banded local tax avoided distortions to labour-market participation that the poll tax created.
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Banded property tax was modestly regressive across deciles but neutralised the worst poll-tax effects.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter local-authority capping under the 1992 Act constrained council expenditure growth.

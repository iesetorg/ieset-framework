title: Doe Creation 1977
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'The Department of Energy Organization Act of 1977 (Pub. L. 95-91) consolidated the Federal Energy Administration, the Energy Research and Development Administration, the Federal Power Commission''s
  successors, and several other energy programs into a new cabinet-level Department of Energy. Created in the aftermath of the 1973 oil shock, DOE took on responsibility for nuclear weapons stockpile, energy
  R&D, and federal regulation of interstate electricity and natural-gas markets via FERC.

  '

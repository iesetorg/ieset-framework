policy_id: us_estate_tax_phaseout_2001
status: candidate
title: Estate Tax Phaseout 2001
countries:
- USA
timeframe:
  start: 2001
  end: 2003
description: 'EGTRRA 2001 (Pub. L. 107-16) phased down the federal estate tax over a decade by progressively raising the unified credit exemption from $675,000 to $3.5 million by 2009 and lowering the top
  rate from 55% to 45%, with full repeal scheduled for 2010 followed by an automatic sunset back to pre-2001 parameters in 2011. The Tax Relief Act of 2010 ultimately preserved a permanent estate tax with
  higher exemptions, ending the planned phase-out trajectory.

  '
enacted_by:
- us_bush_43_first_term_broad_2001_2005
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Estate tax falls almost entirely on top wealth holders, so phase-out reduced effective progressivity.
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Direct cut of a wealth-transfer tax shifted capital taxation downward toward zero.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Estate tax operates at the individual level; corporate rate unchanged by this provision.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue loss flowed into deficits without offsetting program cuts, expanding net fiscal stance.

policy_id: yem_social_fund_for_development_1997
status: candidate
title: Yemen Social Fund for Development 1997
countries:
- YEM
timeframe:
  start: 1997
  end: ongoing
description: 'Yemen established the Social Fund for Development as a semi-autonomous poverty-reduction and community-project institution to cushion adjustment and finance local infrastructure, education,
  health, water, microfinance, and labour-intensive works. Backed by the government and donors, the fund became one of Yemen''s main social-protection and service-delivery channels before and during later
  conflict.

  '
enacted_by:
- yemen_saleh_gpc_unification_adjustment_1990_2011
coalition_label_at_enactment: Saleh-era GPC government with donor support
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: The fund expanded poverty-targeted grants, community services, and labour-intensive public works.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Donor and budget resources were channelled into additional local social and infrastructure spending.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A semi-autonomous project institution created more rule-bound delivery channels than ordinary patronage allocation.
references:
- Yemen Social Fund for Development founding law and institutional history
- World Bank, Yemen Social Fund for Development project documents
- Yemen Social Fund for Development annual reports
notes: The fund's continued humanitarian role after 2014 does not imply unified current national governance.

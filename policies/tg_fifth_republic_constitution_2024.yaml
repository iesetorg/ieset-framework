policy_id: tg_fifth_republic_constitution_2024
status: candidate
title: Togo Fifth Republic constitution 2024
countries:
- TGO
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-05-06'
description: 'Togo''s 2024 Fifth Republic constitution replaced the direct presidential model with a parliamentary system centered on a council-president chosen by the National Assembly majority, while
  creating a separate head-of-state presidency. The reform changed executive selection and tenure mechanics after the 2024 legislative election and substantially redesigned national political accountability.

  '
enacted_by:
- togo_gnassingbe_roadmap_reform_state_2020_present
scope: national
coalition_label_at_enactment: UNIR Gnassingbe government
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Executive authority moved from direct presidential election to parliamentary majority selection, reducing direct electoral constraint on the dominant governing bloc.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Concentrating executive selection within the parliamentary majority can weaken checks around appointments and institutional oversight.
references:

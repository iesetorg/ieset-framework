policy_id: korea_land_reform_1949_1961
status: candidate
title: Korea Land Reform 1949 1961
countries:
- KOR
timeframe:
  start: 1961
  end: 1979
description: 'South Korea''s Agricultural Land Reform Act of 1949, implemented from 1950 and substantially completed by the early 1950s with later adjustments through the early 1960s, capped private landholdings
  at 3 chongbo (about 3 hectares) and redistributed expropriated tenant-cultivated land to former tenants in exchange for state bonds compensating prior landlords. The reform broke the colonial-era landlord
  class, created broad-based smallholder ownership, and is treated as a foundational pre-condition for the Park-era industrial policy that followed.

  '
enacted_by:
- park_chung_hee_industrial_policy_1961_1979

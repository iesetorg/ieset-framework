policy_id: brazil_bolsa_familia_2_relaunch_2023
status: candidate
title: Brazil Bolsa Familia 2 Relaunch 2023
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'The 2023 Bolsa Família relaunch, enacted via Medida Provisória 1.164 (later Lei 14.601/2023), restored and expanded the conditional cash-transfer programme renamed by the Bolsonaro government
  as Auxílio Brasil. Lula''s third administration set a R$600 minimum benefit plus per-child top-ups, restored conditionality on school attendance and child health, and re-tightened means testing. The intended
  effect is poverty reduction via a more generous, demographically targeted CCT integrated with the Cadastro Único registry.

  '
enacted_by:
- brazil_lula_third_term_2023_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher floor benefit and per-child supplements directly expanded household cash transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme costs of about 1.5% of GDP raised the federal social-spending baseline.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Targeted transfers improved post-fiscal progressivity even though financing mix is mixed.
- axis: fiscal.sectoral_subsidy

title: South Korea Labour Standards Act revision 1996
countries:
- KOR
timeframe:
  start: 1996
  enacted_date: '1996-12-26'
description: 'Kim Young-sam government pushed Labour Standards Act revision and Trade Union and Labor Relations Adjustment Act through National Assembly 26 Dec 1996 in pre-dawn ruling-party-only vote; provisions
  eased layoff restrictions and expanded flexible-hours. Triggered largest general strike in Korean history Jan 1997 (~200,000 workers); revised in milder form Mar 1997; comprehensive labour-flexibility
  package later adopted under IMF programme 1998.

  '

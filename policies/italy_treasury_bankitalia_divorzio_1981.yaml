  end: 1981
  enacted_date: '1981-02-12'
description: 'Letter of 12 February 1981 from Treasury Minister Beniamino Andreatta to Banca d''Italia Governor Carlo Azeglio Ciampi ending Banca d''Italia''s obligation to purchase unsold government paper
  at Treasury auctions. Converted Banca d''Italia from residual buyer into effective independent monetary authority. Canonical European early-1980s central-bank independence reform. Preceded formal statutory
  independence by over a decade.

  '

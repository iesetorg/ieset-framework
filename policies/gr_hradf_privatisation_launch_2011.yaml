status: candidate
title: Hradf Privatisation Launch 2011
countries:
- GRC
timeframe:
  start: 2009
  end: 2011
description: 'Law 3986/2011 created the Hellenic Republic Asset Development Fund (TAIPED/HRADF) as the privatisation vehicle to which Greece transferred state-owned property and equity stakes (port concessions,
  ΔΕΠΑ/ΔΕΣΦΑ gas, OPAP, real estate) for monetisation under MoU programmes. The fund operated at arm''s length from ministries with international advisor support to deliver privatisation receipts targeted
  by the Troika.

  '

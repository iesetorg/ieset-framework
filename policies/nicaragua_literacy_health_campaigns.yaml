policy_id: nicaragua_literacy_health_campaigns
status: candidate
title: Nicaragua Literacy Health Campaigns
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'The 1980 Cruzada Nacional de Alfabetización deployed nearly 100,000 volunteer brigadistas across rural Nicaragua, cutting illiteracy from roughly 50 percent to under 13 percent in five months
  and earning a UNESCO award. Parallel Jornadas Populares de Salud campaigns rolled out mass vaccination, malaria control, and primary-health-clinic networks under the Ministry of Health, expanding state
  social-service delivery dramatically while displacing private practitioners.

  '

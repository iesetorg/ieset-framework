policy_id: hu_sovereignty_protection_office_2023
status: candidate
title: Sovereignty Protection Office 2023
countries:
- HUN
timeframe:
  start: 2022
  end: ongoing
description: 'Act LXXXVIII of 2023 created the Sovereignty Protection Office (Szuverenitásvédelmi Hivatal), a state authority empowered to investigate and report on foreign funding of political and civic
  activity in Hungary. The Office is funded from the central budget and operates alongside criminal-law amendments penalising the use of foreign resources to influence elections, with implications for the
  NGO sector and government communications spending.

  '

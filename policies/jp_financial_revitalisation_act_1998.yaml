policy_id: jp_financial_revitalisation_act_1998
status: candidate
title: Japan Financial Revitalisation Act 1998
countries:
- JPN
timeframe:
  start: 1998
  end: 1998
  enacted_date: '1998-10-16'
description: 'Financial Revitalisation Act passed 16 October 1998 creating the Financial Reconstruction Commission (FRC, active until January 2001), the Resolution and Collection Corporation (RCC), and
  the framework for bank nationalisation and capital injection. Expanded public-fund capacity to ¥60tn. Immediately used to nationalise the Long-Term Credit Bank of Japan (23 October 1998) and Nippon Credit
  Bank (13 December 1998). March 1999 ¥7.5tn capital injection into 15 major banks. Shifted bank-support regime from 1998 blanket model to asset-quality-conditioned framework.

  '

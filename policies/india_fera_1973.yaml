policy_id: india_fera_1973
status: candidate
title: India Fera 1973
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'The Foreign Exchange Regulation Act 1973 (FERA) tightened India''s exchange- control regime, capping foreign equity in Indian companies generally at 40% with stricter reviews above that threshold,
  and treating most cross-border transactions as prohibited unless specifically permitted by RBI. FERA forced several multinationals (notably Coca-Cola and IBM) to exit and remained the binding legal regime
  until replaced by the more liberal FEMA 1999.

  '

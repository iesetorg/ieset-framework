policy_id: canada_boc_inflation_targeting_1991
status: candidate
title: Canada Boc Inflation Targeting 1991
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'In February 1991 the Bank of Canada and the federal Department of Finance jointly announced an inflation-targeting regime — initially a transition to a 2% mid-point of a 1-3% band by 1995
  — becoming the second major central bank after New Zealand to adopt explicit numerical targets. The framework is renewed on a five-year cycle with the federal government and has anchored Bank of Canada
  operating procedure ever since, alongside floating exchange rate and fiscal-rule discipline under successive Conservative and Liberal governments.

  '

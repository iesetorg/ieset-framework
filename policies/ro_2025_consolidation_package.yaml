  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Expenditure controls and deficit correction reduce the general-government spending path relative to the 2024 baseline.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: EU EDP surveillance and budget-execution controls modestly strengthen rules-based fiscal governance.

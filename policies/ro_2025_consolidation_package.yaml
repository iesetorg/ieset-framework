policy_id: ro_2025_consolidation_package
status: candidate
title: Romania 2025 fiscal consolidation package under EU deficit pressure
countries:
- ROU
timeframe:
  start: 2025
  end: ongoing
description: >
  Emergency fiscal consolidation package for Romania after the 2024 deficit
  breach and EU excessive-deficit pressure. The package combines revenue
  measures, spending restraint, public-sector wage and hiring controls, subsidy
  rationalisation, and tighter budget execution to move the deficit back toward
  the EU fiscal path while trying to preserve defence and Recovery and
  Resilience Facility investment commitments.

description: 'Law on Foreign Investment in Vietnam promulgated 29 Dec 1987 — the first among reforming socialist states; permitted three investment vehicles (business cooperation contracts, joint ventures
  up to 30 years, 100% foreign-owned enterprises), guaranteed against nationalisation, provided preferential tax rates (10-25% CIT). Foundation of Vietnamese FDI regime; amended multiple times 1990, 1992,
  1996 progressively liberalising.


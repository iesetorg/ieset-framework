description: 'Greece''s NGEU Recovery and Resilience Plan ''Greece 2.0'', submitted April 2021 and approved by ECOFIN 13 July 2021 (Implementing Decision). Initial envelope €30.5bn (€17.77bn grants + €12.7bn
  loans); August 2023 REPowerEU top-up and loan uptake raised total to c.€36bn. 106 investments + 68 reforms across four pillars (green transition, digital transformation, employment/skills/ cohesion, private
  investment). Notable reform milestones: insolvency law consolidation; out-of-court workout; simplification of business-licensing; active-labour-market-policy overhaul (DYPA, formerly OAED); justice digitalisation;
  capital-markets development. Disbursement tranches: prefinancing August 2021, first tranche April 2022, second October 2022, third December 2023, fourth April 2024. As of end-2024 Greece was among the
  top-three EU members on milestone achievement and disbursement pace.

  '

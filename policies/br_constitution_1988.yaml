description: 'Promulgated 5 October 1988 by Constituent Assembly led by Ulysses Guimarães. "Citizen Constitution" — universalised rights framework: SUS Sistema Único de Saúde (Art. 196), mandatory social-security
  indexation (Art. 201), minimum pension ≥ minimum wage, earmarked health/education shares of federal revenue (Art. 212 at least 18%; EC 29/2000 extended health), Ministério Público autonomy (Art. 127),
  strong public-sector employment protections. Structural fiscal rigidity time-bomb paired with landmark civil-rights expansion.

  '

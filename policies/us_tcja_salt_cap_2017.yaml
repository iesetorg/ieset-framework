policy_id: us_tcja_salt_cap_2017
status: candidate
title: Tcja Salt Cap 2017
countries:
- USA
timeframe:
  start: 2017
  end: 2025
description: 'The Tax Cuts and Jobs Act (TCJA) of 2017 capped the federal itemised deduction for state and local taxes (SALT) at $10,000 per return, encompassing combined property, income, and sales taxes.
  The cap raised effective federal tax burdens on high-income filers in high-tax jurisdictions and partially offset revenue loss from broader bracket cuts. The provision was structured as a temporary 2018-2025
  measure consistent with reconciliation budget rules.

  '

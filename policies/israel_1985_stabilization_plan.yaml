description: 'Under Finance Minister Yitzhak Modai (Likud-Labour unity government) with advice from Stanley Fischer + Michael Bruno + Jeffrey Sachs. Response to Israel''s 1984-85 near-hyperinflation (peak
  450% annualised). Measures: (1) immediate fiscal adjustment (-8pp GDP), (2) shekel devaluation + temporary peg, (3) wage-price freeze under social contract (Histadrut union agreement), (4) end of central-
  bank financing of fiscal deficits, (5) IMF-advised ceiling on USD denomination in domestic contracts. Inflation fell from 450% to ~20% within 18 months and single digits by early 1990s. Influential template
  for subsequent Latin American stabilisation (Plano Real 1994 explicitly studied it). Canonical orthodox-stabilisation success case.

  '

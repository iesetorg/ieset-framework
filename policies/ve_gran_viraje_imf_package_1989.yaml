description: 'Paquete Económico announced 16 February 1989 by Planning Minister Miguel Rodríguez with IMF Letter of Intent. Unified exchange rate (Bs 14.5/$ → Bs 36/$ floating); removed price controls on
  all but 18 basic goods; liberalised interest rates; tariff reduction programme (average 35% → 10% by 1992); fuel-price rise ~100%; public-transport fare hike (trigger of Caracazo); privatisation framework.
  $4.5B IMF Extended Fund Facility.

  '

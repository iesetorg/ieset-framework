description: 'AB 32 (2006), the California Global Warming Solutions Act signed by Governor Schwarzenegger, authorised the California Air Resources Board (CARB) to set a binding 2020 cap on greenhouse-gas
  emissions equal to 1990 levels and to design enforcement instruments. CARB used this authority to develop the Scoping Plan, the cap-and-trade programme, the Low Carbon Fuel Standard, and vehicle-emissions
  rules — making AB 32 the foundational statute of the California climate regulatory regime.

  '

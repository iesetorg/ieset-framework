policy_id: id_sby_mining_law_2009
status: candidate
title: Indonesia Mining Law (UU Minerba) 2009
countries:
- IDN
timeframe:
  start: 2009
  end: ongoing
  enacted_date: '2009-01-12'
description: 'UU No. 4/2009 on Mineral and Coal Mining replaced the 1967 Contract-of- Work regime with an IUP (mining business licence) system, asserted stronger state control over extraction, and introduced
  a statutory obligation to process and refine minerals domestically within five years (Art. 102-103, 170). This downstreaming mandate was the legal basis for the subsequent Jan 2014 raw-mineral export
  ban. Also shifted licence- issuance authority partly to regional governments and mandated divestment schedules for foreign operators.

  '
enacted_by:
- indonesia_sby_demokrat_2004_2014
coalition_label_at_enactment: Demokrat-led rainbow coalition
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Downstreaming mandate foreshadowed raw-ore export bans; protectionist in mineral-value-chain terms.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Conversion of Contract-of-Work to IUP reduced contract sanctity for incumbent foreign operators (Freeport, Newmont).
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Stricter IUP regime and mandatory downstream processing tighten sectoral licensing.
references:

description: 'Four Presidential Ordinances promulgated 10 Feb 1979 by Zia under Article 89 of the 1973 Constitution criminalising extra-marital sex (zina), false accusation (qazf), theft, and alcohol /
  narcotics consumption under Islamic hadd punishments. Separate evidentiary standards for hadd (requiring four Muslim adult male witnesses) and tazir (discretionary) punishments. Substantially amended
  by the Women''s Protection Act 2006 under Musharraf.

  '

policy_id: ie_bank_guarantee_2008
status: candidate
title: Bank Guarantee 2008
countries:
- IRL
timeframe:
  start: 2008
  end: 2011
description: 'On 30 September 2008 the Irish government issued the Credit Institutions (Financial Support) Scheme, a blanket two-year guarantee covering some EUR 440 billion of liabilities of six domestic
  banks. The Credit Institutions (Financial Support) Act 2008 placed the sovereign behind senior, dated subordinated, and asset-covered obligations, transforming private banking losses into a contingent
  state liability that crystallised through subsequent recapitalisations.

  '
enacted_by:
- ireland_cowen_ff_2008_2011
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Crystallised guarantee costs eventually displaced primary expenditure during austerity rounds.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Guarantee imposed binding state oversight on participating banks, reversing the prior light-touch posture.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Contingent banking liabilities pre-empted fiscal space for transfer-programme growth.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Senior bondholder protection plus subsequent shareholder dilution shifted the loss-allocation regime by statute.

policy_id: irq_iraq_development_fund_2023
status: candidate
title: Iraq Development Fund 2023
countries:
- IRQ
timeframe:
  start: 2023
  end: ongoing
description: 'Iraq launched the Iraq Development Fund as a state-backed vehicle to finance and co-finance private-sector and strategic development projects, including industrial, housing, SME, infrastructure,
  and job-creation initiatives. The fund is part of the Sudani government''s attempt to convert oil-financed fiscal capacity into domestic investment and private-sector development rather than relying only
  on recurrent public payroll spending.

  '
coalition_label_at_enactment: Mohammed Shia al-Sudani government and Coordination Framework-backed cabinet
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: The fund directs state-backed financing to selected sectors and project classes.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Oil-financed public resources are channelled into additional development-fund commitments.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Private-sector co-financing and SME windows are intended to broaden entry beyond state payroll channels.
references:
- Iraq Council of Ministers and Prime Minister's Office materials on the Iraq Development Fund, 2023
- Iraq Development Fund official programme materials
- World Bank and IMF reporting on Iraq private-sector development and oil-funded fiscal expansion
notes: No current Iraq movement was added because this single policy does not yet provide a three-policy movement anchor.

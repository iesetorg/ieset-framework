policy_id: my_fuel_subsidy_rationalisation_managed_float_2014
status: candidate
title: Fuel Subsidy Rationalisation Managed Float 2014
countries:
- MYS
timeframe:
  start: 2009
  end: 2018
description: 'In December 2014 the Najib government abolished fixed retail-pump fuel subsidies for RON95 petrol and diesel, replacing them with a managed-float price-setting mechanism that adjusts pump
  prices monthly (later weekly) based on global crude prices. The reform was timed to coincide with the global oil-price collapse, which masked the immediate household impact, and was paired with expanded
  BR1M cash transfers for lower-income households as a compensatory channel.

  '
enacted_by:
- malaysia_najib_bn_2009_2018
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Subsidy removal fell on a regressive base (fuel-intensive households), reducing the implicit progressivity of net fiscal transfers.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: BR1M cash transfers were scaled up specifically to compensate B40 households for the loss of subsidised fuel.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Core mechanism — eliminated standing fuel subsidies and shifted retail prices to a managed-float reference formula.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pricing-formula opacity and discretionary smoothing left the managed float vulnerable to political price-setting in election windows.

policy_id: th_imf_programme_implementation_1997_2000
status: candidate
title: Thailand IMF programme implementation under Chuan II (1997-2000)
countries:
- THA
timeframe:
  start: 1997
  end: 2000
  enacted_date: '1997-11-25'
description: 'Implementation of successive IMF Letters of Intent (Nos 2-8) under Chuan II Democrat government. Adjustment phases: initial over-tightening 1997-Q3 (fiscal surplus 1% target, high real rates)
  reversed Q4 1997 - Q1 1998 after IMF acknowledged excessive contraction (GDP -10.5% in 1998); shift to stimulus- accommodative phase 1998-2000. Policy milestones: Omnibus Financial Sector Restructuring
  Package (August 1998), bank- recapitalisation framework, foreign-bank acquisitions allowed 100% for 10 years (Alien Business Law amendments), bankruptcy and foreclosure-law modernisation 1999-2000, introduction
  of consolidated supervision at BoT. Programme formally completed June 2000.

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: Democrat-led coalition
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: moderate
  intended: true
  rationale: Rate-cut cycle 1998-2000 after initial 1997 tightening; programme relaxation of deficit targets.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Consolidated supervision, Basel capital, bankruptcy modernisation regime.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Foreign-bank 100% ownership; bankruptcy law creditor-rights alignment to international practice.
references:

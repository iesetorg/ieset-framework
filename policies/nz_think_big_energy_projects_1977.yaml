policy_id: nz_think_big_energy_projects_1977
status: candidate
title: New Zealand 'Think Big' energy projects 1977-1984
countries:
- NZL
timeframe:
  start: 1977
  end: 1984
description: 'Muldoon government programme of large state-led energy and industrial projects — Motunui synthetic-fuel plant, Marsden Point oil-refinery expansion, Clyde Dam, NZ Steel Glenbrook expansion,
  Methanex methanol plant, Think Big cement — financed by overseas borrowing to target oil-shock energy self-sufficiency. Public debt rose from ~42% to ~65% of GDP. Most projects proved uneconomic and were
  loss-making by the 1984 FX crisis; privatised at deep discount under Rogernomics.

  '

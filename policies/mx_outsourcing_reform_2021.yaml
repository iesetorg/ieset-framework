policy_id: mx_outsourcing_reform_2021
status: candidate
title: Mexican outsourcing / subcontratación reform (2021)
countries:
- MEX
timeframe:
  start: 2021
  enacted_date: '2021-04-23'
description: 'Reform to the LFT and tax/social-security codes (DOF 23-abr-2021) prohibiting the subcontracting of a company''s core activities, permitting only "specialised services" under a registered
  REPSE padron, and reforming profit-sharing (PTU) caps. Shut down the bulk of Mexico''s insourcing / tax-optimisation industry; reclassified ~2.7m outsourced workers onto direct payrolls.

  '

title: Abu Dhabi $20bn Dubai bailout
countries:
- ARE
timeframe:
  start: 2009
  enacted_date: '2009-12-14'
description: 'In response to Dubai World''s November 2009 standstill request on $26bn of debt, Abu Dhabi provided $20bn of support to the Dubai government in two tranches (March 2009 central-bank-intermediated
  bond purchase plus a December 2009 direct $10bn tranche that covered Nakheel sukuk repayment). Crystallised the federal cross-subsidy relationship and shifted relative power to Abu Dhabi.

  '

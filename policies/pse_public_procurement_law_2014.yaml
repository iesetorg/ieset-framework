policy_id: pse_public_procurement_law_2014
status: candidate
title: Palestine Public Procurement Law 2014
countries:
- PSE
timeframe:
  start: 2014
  end: ongoing
description: 'The 2014 public procurement law created a unified legal framework for PA purchasing, including competitive tendering rules, standard procedures, review channels, and a High Council for Public
  Procurement Policies. The reform sought to replace fragmented ministry-level procurement practices with a more transparent system for public contracts in PA-administered areas.

  '
enacted_by:
- palestinian_authority_limited_self_government_1994_present
coalition_label_at_enactment: Palestinian Authority technocratic public-finance reform
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A unified procurement statute and review channels made contract award rules more formal and reviewable.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Competitive tendering and standard procedures lowered discretion in access to public contracts.
references:
- Palestine Public Procurement Law No. 8 of 2014
- Palestine High Council for Public Procurement Policies materials
- World Bank, West Bank and Gaza public procurement reform assessments
notes: Territorial and fiscal constraints limit implementation outside PA-administered procurement systems.

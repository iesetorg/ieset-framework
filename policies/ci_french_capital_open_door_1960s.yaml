# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ci_french_capital_open_door_1960s
status: candidate
title: "Open door to French capital and expertise"
countries: [CIV]
timeframe: {start: 1960, end: 1993}
description: >
  The Houphouet-Boigny government maintained unusually close economic ties with
  France, welcoming French firms, advisers, finance, and commercial networks in
  agriculture, infrastructure, and services. This policy orientation contrasted
  with post-independence nationalisation strategies elsewhere and made external
  capital part of the regime's development bargain.
enacted_by:
  - cote_divoire_houphouet_export_developmental_state_1960_1993
coalition_label_at_enactment: "PDCI"
axes_moved:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "French firms, finance, and commercial networks remained central to the economy.", intended: true}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "The regime signalled protection for foreign investors relative to nationalisation models.", intended: true}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Foreign participation widened private provision in selected sectors, though under a dominant-party state.", intended: true}
references:
  - "Aristide Zolberg, One-Party Government in the Ivory Coast"
  - "World Bank, Cote d'Ivoire country economic memoranda"

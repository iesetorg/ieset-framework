description: 'Fiscal Structural Reform Act of November 1997 establishing binding deficit-reduction targets for central and sub-national budgets, with a headline goal of reducing the general-government deficit-to-GDP
  ratio to 3% by FY2003. Suspended May 1998 after Asian crisis forced Obuchi administration into supplementary- budget stimulus. The binding caps constrained FY1998 general- account public-works spending
  by 7%; later repealed December 1998.

  '

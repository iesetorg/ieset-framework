  rationale: QMV unlocked harmonisation directives that opened nationally protected product and services markets.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Codified the 1992 deadline for free movement of goods, services, and capital across the EEC.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Anchored free movement of persons within the internal market in primary EEC treaty law.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Triggered mutual recognition of national authorisations across member states under harmonised rules.

description: 'The Single European Act, signed in 1986 and entering into force on 1 July 1987, was the first major revision of the EEC treaties since 1957. It set a binding deadline of 31 December 1992 for
  completing the internal market with free movement of goods, services, capital, and persons, replaced unanimity with qualified-majority voting on most single-market measures, and constitutionalised the
  broader programme set out in the 1985 Cockfield White Paper (COM(85) 310).

  '

status: candidate
title: Japan — LDP slush-fund scandal response and faction dissolution (2024)
countries:
- JPN
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-01-19'
description: 'Response to the December 2023 LDP political-funds scandal in which the Abe, Nikai, and Kishida factions were found to have failed to report kickbacks from fundraising-ticket sales over multiple
  years. Tokyo District Special Investigation Department indicted several lawmakers and staff. PM Kishida announced the dissolution of the Kōchi-kai (Kishida) faction on 19 January 2024; the Seiwa Seisaku
  Kenkyūkai (Abe) and Shisuikai (Nikai) factions also dissolved. LDP internal disciplinary measures were applied to 39 lawmakers including suspension of party membership for the most senior implicated figures.
  Political Funds Control Act revisions were passed in June 2024 tightening disclosure thresholds, banning lawmaker-owned fundraising parties above certain sizes, and introducing third-party audit requirements;
  critics argued the revisions were narrower than opposition-proposed reforms.

  '

description: 'Electricity Act 1989 restructured the Central Electricity Generating Board into National Grid (transmission), National Power and PowerGen (generation), Nuclear Electric (retained public),
  and 12 Regional Electricity Companies (distribution). RECs floated December 1990; generators floated March 1991. Office of Electricity Regulation (Offer) created with RPI-X price cap. Foundation of UK
  electricity-market liberalisation.


policy_id: italy_ina_life_insurance_monopoly_1912
status: candidate
title: Italy INA life-insurance monopoly 1912
countries: [ITA]
timeframe:
  start: 1912
  end: 1912
  enacted_date: "1912-04-04"
description: >
  Law no. 305 of 4 April 1912 created the Istituto Nazionale delle
  Assicurazioni (INA) and reserved new life-insurance business to the new
  state institute after a transition period. Giolittian reformers argued
  that life insurance and annuity savings had a quasi-public character and
  should be used to mobilise long-term national savings under public
  supervision. The measure was therefore both a financial-sector
  intervention and an early example of liberal Italy using monopoly status
  in a strategic market to pursue state-building goals.
enacted_by:
  - italy_giolittian_liberal_reformism_1901_1914
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "New life-insurance activity was reserved to a state institute, sharply tightening entry and licensing conditions."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "The reform displaced open competition in new life-insurance business with a public monopoly structure."
references:
  - "Legge 4 aprile 1912, n. 305"

policy_id: th_casino_entertainment_complex_bill_2025
status: candidate
title: Casino Entertainment Complex Bill 2025
countries:
- THA
timeframe:
  start: 2024
  end: ongoing
description: 'The Entertainment Complex Bill advanced by the Pheu Thai-led Paetongtarn government proposes to legalise integrated resort casinos within designated entertainment complexes for the first time
  in Thailand, subject to licensing, gross-gaming revenue tax, and Thai-citizen entry rules. Drafted by the Ministry of Finance, the bill targets foreign tourism receipts and reframes the previous prohibition
  under the 1935 Gambling Act.

  '

policy_id: ca_build_canada_homes_2025
status: candidate
title: Canada — Build Canada Homes programme (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-06-19'
description: 'Housing package announced in the Carney 2025 platform, given a statutory basis through the Build Canada Homes Act, and launched as a federal agency in September 2025. Core elements include
  creating Build Canada Homes as a federal housing developer and financier for affordable and middle-class homes, using public lands and factory-built housing procurement, providing low-cost financing for
  affordable and prefabricated housing builders, and coordinating with the Canada Public Land Bank. The wider package also included first-time-buyer GST relief for newly built homes and incentives for municipalities
  to reduce development charges and streamline approvals.

  '

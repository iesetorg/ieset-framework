policy_id: ca_build_canada_homes_2025
status: candidate
title: Canada — Build Canada Homes programme (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-05-01'
description: 'Housing package announced in the Carney 2025 election platform and advanced through post-election machinery-of-government changes. Core elements: (i) creation of Build Canada Homes (BCH),
  a federal Crown agency to act as developer for affordable and mid-market housing on federal land, with an announced initial envelope of C$25B in low-cost financing for builders of prefabricated and modular
  homes and C$10B in low-cost financing for affordable-housing builders; (ii) elimination of the Goods and Services Tax (GST) on newly built homes up to C$1M purchased by first-time buyers, with phased
  relief up to C$1.5M; (iii) acceleration of the Canada Public Land Bank to release federal surplus lands for housing; (iv) incentives for municipalities to cut development charges and to streamline zoning
  approvals; (v) industrial-strategy support for Canadian prefab/modular housing manufacturing capacity. Builds on the Trudeau-era Housing Accelerator Fund and continues elevated federal role in housing
  supply after its withdrawal in the 1990s.

  '

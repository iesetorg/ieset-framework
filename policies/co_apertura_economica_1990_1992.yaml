policy_id: co_apertura_economica_1990_1992
status: candidate
title: Colombian Apertura Económica 1990-1992
countries:
- COL
timeframe:
  start: 1990
  end: 1992
description: 'Gaviria administration''s accelerated trade and FX liberalisation. Average nominal tariff reduced from 43.7% (1990) to 11.7% (1992); tariff ceiling from 100% to 20%; import-licences eliminated
  (prior licence-requirement for 61% of tariff lines → near-zero). Ley 9 of 1991 (Régimen Cambiario) liberalised foreign-exchange regime, permitted private FX holding, removed capital-account controls.
  DRI (Departamento de Régimen Internacional de Capital y Comercio Exterior) restructured; Ministerio de Comercio Exterior created.

  '

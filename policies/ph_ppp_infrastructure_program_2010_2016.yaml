policy_id: ph_ppp_infrastructure_program_2010_2016
status: candidate
title: Ppp Infrastructure Program 2010 2016
countries:
- PHL
timeframe:
  start: 2010
  end: 2016
description: 'Public-private partnership programme of the Aquino III government, run through the PPP Center under the existing BOT Law framework, to procure tollroads, airports, water and rail concessions
  through competitive bidding. The strategy used regulated private capital to address chronic infrastructure underinvestment without breaching fiscal rules; in practice rollout was slower than targeted,
  but it established Philippine PPP institutions and project pipelines that endured beyond the administration.

  '

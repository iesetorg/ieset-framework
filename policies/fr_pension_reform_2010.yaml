policy_id: fr_pension_reform_2010
status: candidate
title: Woerth pension reform — legal age 60 → 62
countries:
- FRA
timeframe:
  start: 2010
  enacted_date: '2010-11-09'
description: 'Loi n° 2010-1330 du 9 novembre 2010 portant réforme des retraites. Raised the legal retirement age from 60 to 62 (phased to 2018) and the full-rate age from 65 to 67, tightened contribution-period
  requirements, and made incremental changes to special regimes. Enacted amid nationwide strikes and protests; became a core frame for the 2023 Macron-era extension to age 64.

  '

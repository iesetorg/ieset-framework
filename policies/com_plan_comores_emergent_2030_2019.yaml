policy_id: com_plan_comores_emergent_2030_2019
status: candidate
title: Plan Comores Emergent 2030
countries:
- COM
timeframe:
  start: 2019
  end: 2030
description: 'The Union of the Comoros adopted the Plan Comores Emergent as its long-term development strategy for achieving emerging-economy status by 2030. The plan organizes public investment and reform
  around infrastructure, tourism, agriculture, fisheries, blue-economy assets, energy supply, human capital, and an improved business environment for private investment.

  '

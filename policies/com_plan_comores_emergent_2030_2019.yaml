  direction: +
  magnitude: moderate
  intended: true
  rationale: The plan commits the state to a multi-year public-investment and development-project pipeline.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: It prioritizes selected sectors such as tourism, fisheries, agriculture, energy, and infrastructure.

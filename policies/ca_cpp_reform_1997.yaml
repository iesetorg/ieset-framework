description: 'Bill C-2 enacted 18 December 1997. Accelerated combined employer+ employee contribution rate from 6.0% to 9.9% of pensionable earnings (phased 1997-2003). Created Canada Pension Plan Investment
  Board (CPPIB) as arm''s-length investment manager — key architectural shift from federal-government-held Consolidated Revenue Fund. Ensured 75-year actuarial sustainability.


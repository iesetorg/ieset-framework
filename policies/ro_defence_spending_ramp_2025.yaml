policy_id: ro_defence_spending_ramp_2025
status: candidate
title: Romania defence-spending ramp after the Ukraine-security shock (2025)
countries:
- ROU
timeframe:
  start: 2025
  end: ongoing
description: >
  Increase in Romania's defence-spending path toward and above NATO benchmark
  levels in response to the Ukraine war, Black Sea exposure, and alliance
  commitments. The policy protects military procurement, readiness, air defence,
  and border-security outlays even while the wider budget is consolidated, making
  it a composition shift within fiscal policy rather than a market-regulation or
  energy-security intervention.
enacted_by:
- romania_dan_bolojan_reformist_2025_present
coalition_label_at_enactment: Dan-Bolojan reform coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Defence appropriations and procurement are raised relative to the pre-war and 2024 baseline.
linked_hypotheses:
- public_spending_composition_growth
- capacity_tax_revenue_public_goods_threshold
- capacity_government_consumption_vs_investment_composition
references:
- Romanian government 2025 defence budget materials
- NATO defence expenditure reports for Romania, 2025
notes: Created to materialise a declared policy on romania_dan_bolojan_reformist_2025_present.

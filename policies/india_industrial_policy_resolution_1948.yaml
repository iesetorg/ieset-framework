policy_id: india_industrial_policy_resolution_1948
status: candidate
title: India Industrial Policy Resolution 1948
countries: [IND]
timeframe:
  start: 1948
  end: 1956
  enacted_date: "1948-04-06"
description: >
  The Industrial Policy Resolution of 6 April 1948 was the first
  industrial-policy statement of independent India. It divided industry
  into four categories: exclusive state monopolies, key industries in
  which the state would take the lead in new investment, sectors open to
  private enterprise but subject to licensing and regulation, and a
  residual private field. The resolution committed India to a mixed
  economy with public-sector leadership in the commanding heights while
  preserving a large but supervised private sector pending fuller plan-
  based industrialisation.
enacted_by:
  - india_constitutional_founding_mixed_economy_1947_1951
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The resolution formalised state classification and supervisory control over strategic and regulated industries."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "It committed the state to direct investment in monopoly and key-industry sectors."
references:

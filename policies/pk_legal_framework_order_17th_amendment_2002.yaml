description: 'Chief Executive''s Order 24/2002 ("Legal Framework Order") promulgated 21 August 2002, amending Constitution prior to October 2002 elections. Content: restored Article 58(2)(b) presidential-dismissal
  power (repealed by 13th Amendment 1997); added National Security Council with military chiefs as statutory members; graduate-degree requirement for MPs; Musharraf''s continued Army Chief role alongside
  presidency. 17th Amendment Act passed December 2003 by 2/3 parliamentary majority (PML-Q plus MMA) incorporated most LFO provisions. Struck down / superseded by 18th Amendment 2010 under PPP-led Zardari
  government.

  '

policy_id: kr_chaebol_reform_five_plus_three_1998
status: candidate
title: Korea chaebol reform — Five Plus Three Principles (1998)
countries:
- KOR
timeframe:
  start: 1998
  end: 2001
  enacted_date: '1998-01-13'
description: '"Five Principles" agreed between President-elect Kim Dae-jung and top-five chaebol chairmen 13 January 1998: (i) transparency in corporate management including consolidated financial statements,
  (ii) prohibition of cross-debt payment guarantees, (iii) improved capital structure (debt-to-equity ratio to 200% by end-1999), (iv) focus on core business with "Big Deal" business swaps, (v) responsibility
  of controlling shareholders/managers. "Plus Three" added August 1999: restriction on circular equity holdings, bar on unfair intra-group transactions, prevention of concentrated ownership in non-bank
  financial institutions. Big Deals: Hyundai Electronics-LG Semicon semiconductor swap, Samsung Motors-Renault, Daewoo Motors (-> GM). Daewoo Group dissolved August 1999 after $70bn debt disclosure.

  '
enacted_by:
- skorea_kim_dae_jung_ds_1998_2003
coalition_label_at_enactment: NCNP-DJP coalition

title: Anti-Hopping Law — Constitution (Amendment) (No. 3) Act 2022
countries:
- MYS
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-10-05'
description: 'Constitutional amendment adding Article 49A creating automatic vacation of a Dewan Rakyat seat when a member resigns from or is expelled by the party on whose ticket they were elected, requiring
  a by-election. Negotiated under the September 2021 Memorandum of Understanding on Transformation and Political Stability between Ismail Sabri''s UMNO-BN government and the Pakatan Harapan opposition;
  passed with the required two-thirds supermajority by 209 votes to 11 on 28 July 2022 and gazetted 5 October 2022. Structural response to the ''Sheraton Move'' (Feb 2020) that toppled the PH government
  via intra-legislative defection and enabled the Muhyiddin PN administration.

  '

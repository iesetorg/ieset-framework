policy_id: colombia_paz_total_2022
status: candidate
title: Colombia Paz Total 2022
countries:
- COL
timeframe:
  start: 2022
  end: ongoing
description: '''Paz Total'' (Total Peace) policy launched by the Petro government via Ley 2272 of 2022, expanding the legal framework for parallel negotiations with multiple illegal armed groups, including
  the ELN guerrilla, FARC dissident factions, and organised criminal structures (Clan del Golfo, urban gangs). Aimed at extending the 2016 peace logic across remaining armed conflict actors through political
  and judicial mechanisms.

  '

  direction: +
  magnitude: weak
  intended: true
  rationale: Companion 2022 reforma tributaria provided the progressive funding base for peace-related spending.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Petro fiscal package raised effective corporate-tax rates partly earmarked for peace-implementation programmes.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Demobilisation and rural-development components expanded transfers to former-combatant and conflict-affected groups.
- axis: regulatory.labour_market_flexibility
  direction: '-'

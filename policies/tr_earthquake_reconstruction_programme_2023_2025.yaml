title: Earthquake reconstruction programme (Turkey 2023-2025)
countries:
- TUR
timeframe:
  start: 2023
  end: 2025
  enacted_date: '2023-03-01'
description: 'Multi-year reconstruction programme targeting 319,000 housing units and associated infrastructure across 11 earthquake-affected provinces, executed through TOKİ and the Ministry of Environment
  and Urbanisation. By Q1 2025, ~200,000 units had been delivered per government figures. Programme budget cumulatively exceeds TRY 1.5trn. Creates a persistent tension with the Şimşek-era fiscal consolidation
  target by keeping capital-spending impulse positive even as current spending is squeezed.

  '

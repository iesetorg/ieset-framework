policy_id: de_co2_bepreisung_2021
status: candidate
title: Germany national CO2 pricing for buildings and transport (BEHG)
countries:
- DEU
timeframe:
  start: 2021
  end: 2026
  enacted_date: '2021-01-01'
description: 'Brennstoffemissionshandelsgesetz (BEHG, 2019) introducing a national emissions trading system for heating and transport fuels outside the EU ETS. Launched 1 January 2021 at €25/t CO2, scheduled
  to rise to €55/t by 2025 then move to an auction-based corridor (€55-€65/t) in 2026. Revenue used for EEG-Umlage reduction and Klimageld promise (implementation delayed). One of the first national sectoral
  ETS schemes in Europe.

  '
enacted_by:
- germany_merkel_iv_2017_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: Extended carbon pricing to ~40% of emissions outside EU ETS.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Carbon charges regressive in incidence; Klimageld rebate delayed.

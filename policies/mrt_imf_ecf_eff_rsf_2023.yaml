policy_id: mrt_imf_ecf_eff_rsf_2023
status: candidate
title: Mauritania IMF ECF, EFF, and RSF arrangements 2023
countries:
- MRT
timeframe:
  start: 2023
  end: 2026
  enacted_date: '2023-01-25'
description: 'Mauritania entered IMF-supported Extended Credit Facility, Extended Fund Facility, and Resilience and Sustainability Facility arrangements in January 2023. The programme linked financing to
  fiscal consolidation, domestic revenue mobilisation, social-spending protection, monetary and exchange-rate policy strengthening, governance reforms, and climate-resilience measures under the RSF window.

  '
scope: national
enacted_by:
- mauritania_ghazouani_social_green_reform_2019_present
coalition_label_at_enactment: Ghazouani government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The programme targets debt sustainability and deficit control while protecting priority social spending.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Monetary and exchange-rate policy strengthening reduces fiscal dominance and improves macro policy credibility.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: The RSF component ties part of the arrangement to climate-resilience policy reforms.
references:

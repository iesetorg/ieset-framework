timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-07-08'
scope: supranational
description: 'Bolivia deposited its instrument of ratification for the Protocol of Accession to Mercosur on 8 July 2024, completing the formal step for entry as a full State Party after the protocol''s
  entry-into-force period. The accession obliges Bolivia to adopt the Mercosur acquis and integrate into the bloc''s trade and institutional rules over the transition schedule. The active full-member set
  covered here is Bolivia, Argentina, Brazil, Paraguay, and Uruguay; Venezuela is not treated as active because Mercosur suspended it under the Ushuaia Protocol decision of 5 August 2017.

  '

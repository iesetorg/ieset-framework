  rationale: Full accession commits Bolivia to integrate with Mercosur internal-market and external-tariff rules.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Accession binds Bolivia to Mercosur's treaty institutions and democratic-clause framework.

policy_id: italy_product_market_regulation_persistence
status: candidate
title: Italy Product Market Regulation Persistence
countries:
- ITA
timeframe:
  start: 1999
  end: ongoing
description: 'Across the post-euro entry period, Italian product-market regulation remained restrictive relative to comparator economies on OECD PMR indicators, with persistent retail-licensing controls
  (the 1998 Bersani decree''s effects partially rolled back), professional-services entry caps, restricted shop-opening hours, and concession-driven local public services. Successive Bersani I (2006), Monti,
  Renzi and Letta liberalisations chipped at specific sectors, but Italy stayed in the upper third of OECD PMR rankings through the late 2010s, contributing to weak productivity growth.

  '
enacted_by:
- italy_euro_entry_non_reform_1999
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Euro-area inflation discipline magnified the cost of unreformed product-market rents on competitiveness.
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Marginal sectoral liberalisations roughly offset by new licence regimes left aggregate score broadly flat.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: PMR persistence reduced spillover gains from atypical-contract labour reforms.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Weak productivity growth raised primary-spending-to-GDP ratio absent denominator effect.

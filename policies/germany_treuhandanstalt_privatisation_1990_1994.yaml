description: 'Treuhandgesetz 17 June 1990 (GDR Volkskammer) created Treuhandanstalt to privatise/restructure/liquidate ~14,000 GDR state enterprises employing ~4.1 million people. Operation closed end 1994:
  ~6,500 privatised, ~3,700 returned to prior owners or municipalities, ~3,700 liquidated. Total financial deficit ~DM270bn. Rohwedder assassinated 1991 by RAF; Breuel succeeded. Foundational episode of
  east-German deindustrialisation.

  '

policy_id: us_bush_43_tax_cuts_egtrra_jgtrra_2001_2003
status: candidate
title: Bush 43 tax cuts (EGTRRA 2001 + JGTRRA 2003)
countries:
- USA
timeframe:
  start: 2001
  end: 2003
description: 'Sequenced supply-side tax programme enacted under budget reconciliation with sunset provisions. The Economic Growth and Tax Relief Reconciliation Act 2001 (EGTRRA) cut all statutory individual
  income-tax rates (top rate 39.6% to 35%), created a new 10% bottom bracket, doubled the child tax credit to $1,000, phased out the estate tax through 2010, and expanded IRA/401(k) limits. The Jobs and
  Growth Tax Relief Reconciliation Act 2003 (JGTRRA) accelerated the 2001 rate cuts, cut the long-term capital gains rate to 15%, and reduced the top dividend rate to 15% (from ordinary-income treatment).
  Stated case: boost investment, move toward consumption-tax treatment of capital income, and return budget surpluses to households. Ten- year revenue cost roughly $1.7T (EGTRRA) + $350B (JGTRRA) on CBO
  scoring; combined with post-9/11 defence and Medicare Part D spending, converted the inherited surplus into structural deficit by mid-decade.'

policy_id: india_national_education_policy_2020
status: candidate
title: India National Education Policy 2020
countries:
- IND
timeframe:
  start: 2014
  end: 2024
description: 'The National Education Policy 2020 set out a comprehensive overhaul of schooling and higher education: a 5+3+3+4 schooling structure, mother-tongue medium until grade 5, multi-disciplinary
  higher-education institutions consolidated under a Higher Education Commission of India, multiple-entry degree options, and a target of raising public education spending toward 6% of GDP. Implementation
  runs through state and central rule-making over a multi-year horizon.

  '

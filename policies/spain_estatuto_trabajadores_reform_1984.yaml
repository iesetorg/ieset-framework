description: 'Ley 32/1984 de 2 agosto reformed the 1980 Estatuto de los Trabajadores to permit fixed-term contracts without just cause. Introduced the two-tier Spanish labour market with heavily-protected
  permanent contracts and flexible temporary ones. Temporary share rose from ~15% (1984) to ~35% (1990s). Canonical case of ''reform at the margin'' generating dualism without overall EPL reduction.

  '

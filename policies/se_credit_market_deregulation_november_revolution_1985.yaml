description: 'Riksbank sequence of measures culminating 21 November 1985 removing quantitative lending ceilings on commercial banks, leaving only liquidity-ratio regulation. Combined with earlier 1983-1985
  relaxations, this dismantled Sweden''s post-war selective-credit regime. Credit/GDP ratio roughly doubled over subsequent four years, seeding the early-1990s banking crisis.

  '

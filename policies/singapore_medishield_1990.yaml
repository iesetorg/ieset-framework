description: 'MediShield was introduced in July 1990 as the second pillar of Singapore''s "3M" healthcare framework, providing catastrophic-illness insurance funded by Medisave-paid premiums. Restructured
  into MediShield Life in 2015 with universal lifetime coverage for citizens and PRs, it is administered by the Central Provident Fund Board with risk-pooled coverage for major hospitalisation costs.

  '

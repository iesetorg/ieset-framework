policy_id: cy_euro_adoption_2008
status: candidate
title: Cyprus euro adoption 2008
countries:
- CYP
timeframe:
  start: 2008
  end: ongoing
  enacted_date: '2008-01-01'
description: 'Cyprus adopted the euro on 1 January 2008 after Council Decision 2007/503/EC concluded that it fulfilled the convergence conditions for single-currency entry. The changeover replaced the Cyprus
  pound with the euro, moved monetary policy into the Eurosystem, and reduced exchange-rate frictions with euro-area trade, tourism, and financial partners.

  '
enacted_by: []
coalition_label_at_enactment: Papadopoulos DIKO-led government
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Domestic monetary discretion moved to the independent ECB/Eurosystem framework after convergence approval.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: A common currency lowered transaction costs and currency-risk barriers with euro-area partners.
references:

description: 'Under Sobotka, minimum wage raised annually: CZK 8,000 (2013) to CZK 8,500 (Aug 2013), CZK 9,200 (2015), CZK 9,900 (2016), CZK 11,000 (2017) — roughly +37.5% cumulatively. Bite ratio vs median
  wage rose from ~33% to ~40%.


policy_id: lebanon_lbp_peg_1997
status: candidate
title: Lebanon Lbp Peg 1997
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'From late 1997 the Banque du Liban formally pegged the Lebanese pound to the US dollar at approximately LBP 1,507.5/USD within a narrow band, anchoring inflation and supporting confidence
  in the post-civil-war banking system. Maintaining the peg required permanent absorption of dollar inflows through high-yield local-currency Treasury bills and, from the mid-2010s, increasingly exotic
  BDL operations — a regime that broke under the 2019 liquidity crisis.

  '
enacted_by:
- lebanon_post_war_reconstruction_collapse_1992_2020
axes_moved:
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Peg subordinated monetary policy to fiscal financing needs and political imperatives.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Fixed exchange rate enabled large foreign-currency borrowing that funded persistent deficits.
- axis: regulatory.financial_deregulation
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Open capital account and high deposit rates coexisted with concentrated banking-sector regulation.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BDL discretionary operations to defend the peg lacked transparent statutory grounding.

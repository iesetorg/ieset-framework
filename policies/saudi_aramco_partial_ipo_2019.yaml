policy_id: saudi_aramco_partial_ipo_2019
status: candidate
title: Saudi Aramco Partial Ipo 2019
countries:
- SAU
timeframe:
  start: 2016
  end: ongoing
description: 'Saudi Aramco listed approximately 1.5% of its shares on the Tadawul exchange in December 2019, the largest IPO in history at the time, with proceeds channelled to the Public Investment Fund
  (PIF) as a Vision 2030 diversification anchor. The float was preceded by tax-regime changes (royalty-and-tax conversion to a hybrid concession) and corporate-governance reforms aligning Aramco with listed-company
  disclosure standards.

  '

timeframe:
  start: 2021
  end: ongoing
description: 'The 2025 Commission "Omnibus" simplification package (announced February 2025) bundles amendments to the CSRD, CSDDD, EU Taxonomy, and CBAM intended to reduce reporting burdens, raise SME-protection
  thresholds, delay phased applications, and narrow value-chain due-diligence scope. Negotiated under the "stop-the-clock" approach to defer obligations while substantive amendments are agreed, the package
  is intended to ease compliance costs for in-scope corporates.

  '

  rationale: Despite simplification, retains backbone of CSRD/CSDDD/Taxonomy environmental disclosure regime.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Reporting and due-diligence supervision remain with national authorities under amended thresholds.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced scope eases SME burden but compliance fixed costs persist for the larger in-scope set.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-EU groups remain captured by amended in-scope thresholds for EU-market activity.

policy_id: hu_100_steps_fiscal_expansion_2005
status: candidate
title: 100 Steps Fiscal Expansion 2005
countries:
- HUN
timeframe:
  start: 2004
  end: 2010
description: 'Prime Minister Ferenc Gyurcsány''s "100 Steps" (Száz lépés) programme, announced in mid-2005, packaged one-off public-sector wage and pension increases, family-tax-allowance expansions, and
  selected infrastructure outlays in the run-up to the 2006 election. The expansionary mix sharply widened the Hungarian general-government deficit, pushing it above 9% of GDP by 2006 and seeding the 2008–2009
  IMF/EU support programme.

  '

title: Vietnam Us Bta 2001
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
description: 'The US-Vietnam Bilateral Trade Agreement, signed July 2000 and entering into force December 2001, granted Vietnam Normal Trade Relations status with the United States and committed Hanoi to
  a schedule of market-opening, intellectual-property, services, and investor-protection reforms modelled on WTO accession requirements. The agreement triggered a surge in Vietnamese exports to the US and
  laid the groundwork for full WTO membership in 2007.

  '

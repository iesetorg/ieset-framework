policy_id: pl_500_plus_child_benefit_2016
status: candidate
title: Rodzina 500+ universal child benefit (Poland, 2016)
countries:
- POL
timeframe:
  start: 2016
  end: ongoing
  enacted_date: '2016-04-01'
description: 'Rodzina 500+ — universal child cash-transfer programme enacted by the Szydło PiS government. Original design (2016-2019): 500 zł/month per second-and-subsequent child unconditionally, plus
  means-tested payment for first child below ~800 zł/person household income threshold. Expanded July 2019 to universal coverage from first child, raising programme cost to ~1.7% of GDP. Indexed to 800
  zł from January 2024 under a law passed by PiS in mid-2023 ahead of the election. Largest single-programme cash-transfer expansion in post-1989 Poland; approximately 6.5m children covered in early years,
  rising to ~6.7m post-2019.

  '
enacted_by:
- poland_szydlo_pis_2015_2017
- poland_morawiecki_pis_2017_2023
coalition_label_at_enactment: PiS (national-conservative) single-party majority
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Creation of a ~1.4-1.7% of GDP recurring household transfer where none existed; headline programme of the PiS transfer architecture.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Adds ~1.4-1.7% of GDP to primary spending; partially offset by reduced means-tested supports and informal-sector take-up effects.

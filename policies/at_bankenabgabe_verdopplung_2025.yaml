policy_id: at_bankenabgabe_verdopplung_2025
status: candidate
title: Doubling of Austrian bank levy (Stabilitaetsabgabe) 2025
countries:
- AUT
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-06-20'
description: 'Approximately doubled the Austrian bank levy (Stabilitaetsabgabe) from 2025 as part of the consolidation package, alongside retention of the temporary excess-profits levy on energy companies
  (Energiekrisenbeitrag extension). SPOe-demanded element of the three-party coalition bargain, framed as windfall-contribution from banks that had benefited from the 2022-2024 ECB rate-hike cycle. Targeted
  yield ~EUR 500m annually.

  '
enacted_by:
- austria_stocker_ovp_spo_neos_2025_present
coalition_label_at_enactment: OeVP-SPOe-NEOS
axes_moved:
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Levy on bank balance sheets and fee income raises the effective tax burden on financial-sector capital.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: false
  rationale: Higher levy burden is a mild tightening of financial-sector policy posture; intended as revenue rather than prudential instrument.
references:
- Stabilitaetsabgabegesetz Novelle 2025
- OeNB Financial Stability Report 2025 (on levy incidence)

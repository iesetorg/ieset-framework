policy_id: si_renewable_energy_siting_act_2023
status: candidate
title: Slovenia renewable-energy siting act 2023
countries:
- SVN
timeframe:
  start: 2023
  end: ongoing
description: 'Slovenia adopted legislation to accelerate the siting and deployment of electricity-generation facilities using renewable energy sources. The act identifies priority areas, streamlines planning
  and permitting steps, and coordinates environmental and spatial-planning requirements so that solar, wind, and related renewable projects can be approved more predictably.

  '
enacted_by:
- slovenia_golob_social_green_reform_2022_present
scope: national
coalition_label_at_enactment: Golob Freedom Movement-Social Democrats-Left coalition
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: The law strengthens the renewable-energy deployment mandate and supports decarbonisation of electricity supply.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Streamlined planning and permitting lower licensing barriers for qualifying renewable-energy projects.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic renewable generation reduces import exposure and diversifies electricity supply.

description: 'Carless Days Scheme July 1979 - May 1980 required private motorists to nominate one day per week on which their vehicle could not be driven, enforced by coloured windscreen stickers. Response
  to second oil shock. Widely evaded via dual-vehicle households and forged stickers. Symbolic of Muldoon-era administrative response to external shocks.


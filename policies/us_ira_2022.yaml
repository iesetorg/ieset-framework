description: 'The Inflation Reduction Act of 2022 (Pub. L. 117-169) authorized roughly $369 billion in clean-energy and climate spending, including production and investment tax credits for wind, solar,
  batteries, electric vehicles, hydrogen, and carbon capture, with domestic-content and assembled-in-North-America conditions. The law also imposed a 15% corporate alternative minimum tax on book income,
  a 1% excise on stock buybacks, and authorized Medicare drug-price negotiation, becoming the largest U.S. climate-policy package to date.

  '

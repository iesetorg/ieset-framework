policy_id: esh_moroccan_autonomy_initiative_2007
status: candidate
title: Moroccan autonomy initiative for the Sahara region
countries:
  - ESH
timeframe:
  start: 2007
  end: ongoing
  enacted_date: '2007-04-11'
description: >
  Morocco transmitted to the UN Security Council a proposal for negotiating an
  autonomy statute for the Sahara region. The initiative proposed regional
  legislative, executive, judicial, budgetary, taxation, development, and
  resource-revenue powers for a Sahara autonomous region while reserving defence,
  external relations, currency, and core sovereignty attributes to the Moroccan
  state, and contemplated submission of an agreed statute to the populations
  concerned in a referendum. It is coded here only as a Moroccan proposal and
  administrative policy surface affecting Western Sahara, not as an implemented
  final-status settlement.
scope: subnational
enacted_by:
  - western_sahara_contested_status_self_determination_process_1991_present
coalition_label_at_enactment: "Moroccan government proposal submitted to the United Nations"
axes_moved:
  - axis: institutional.rule_of_law
    direction: mixed
    magnitude: weak
    intended: true
    rationale: "The initiative proposed elected regional institutions and courts, but within a Moroccan sovereignty claim and without resolving the UN-supervised final-status dispute."
  - axis: fiscal.spending_level
    direction: +
    magnitude: weak
    intended: true
    rationale: "The proposal envisaged autonomous regional financial resources, budget authority, and development funding for the proposed region, though it was not itself a completed spending program."
references:
  - "United Nations Security Council document S/2007/206, Moroccan initiative for negotiating an autonomy statute for the Sahara region, 13 April 2007, https://docs.un.org/en/S/2007/206"
  - "Security Council Report mirror of S/2007/206, https://www.securitycouncilreport.org/atf/cf/%7B65BFCF9B-6D27-4E9C-8CD3-CF6E4FF96FF9%7D/MINURSO%20S2007%20206.pdf"
notes: "This file records the autonomy initiative as a proposal/policy surface affecting a contested-status territory. It does not imply endorsement of Morocco's sovereignty claim or any resolved final status."

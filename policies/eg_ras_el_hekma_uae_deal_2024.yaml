description: 'Egypt and the UAE''s ADQ signed a development agreement on 23 February 2024 granting a consortium led by ADQ the rights to develop the 170-square-km Ras El-Hekma peninsula on Egypt''s north-western
  Mediterranean coast. Headline value $35bn — $24bn new cash for development plus $11bn via conversion of existing Emirati deposits at the Central Bank of Egypt into Egyptian-pound investments. Provided
  the external-financing cushion that enabled the subsequent EGP devaluation and IMF programme expansion in March 2024.

  '

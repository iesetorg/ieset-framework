policy_id: italy_lira_erm_exit_1992
status: candidate
title: Italy lira ERM exit September 1992
countries:
- ITA
timeframe:
  start: 1992
  end: 1992
  enacted_date: '1992-09-17'
description: 'After intensive BdI reserve losses and failed joint intervention with Bundesbank, Italy announced lira withdrawal from the ERM on 17 September 1992 alongside sterling. Lira depreciated ~20%
  against DM over the following months. Re-entered ERM at devalued parity in November 1996. The episode is the proximate cause of Italy''s export-led recovery through 1993-95 and of Bank of Italy''s subsequent
  emphasis on its newly-formalised independence.

  '

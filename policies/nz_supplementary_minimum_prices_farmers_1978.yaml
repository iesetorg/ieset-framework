policy_id: nz_supplementary_minimum_prices_farmers_1978
status: candidate
title: New Zealand Supplementary Minimum Prices for farmers 1978-1984
countries:
- NZL
timeframe:
  start: 1978
  end: 1984
description: 'Supplementary Minimum Prices (SMPs) introduced 1978 guaranteed minimum floor prices to sheep and beef farmers above Producer Board export returns; deficiency payments covered gap. By 1984
  SMPs contributed ~40% of average sheep-farmer income. Fiscal cost peaked near NZ$700m/year. Removed under Rogernomics 1984-85, producing the deepest farm-sector shock in OECD history.

  '

description: 'Violent Crime Control and Law Enforcement Act (Pub. L. 103-322), signed 13 September 1994. Largest crime bill in US history — ~$30B authorisation; funded ~100,000 additional police officers
  under the COPS programme; expanded federal death penalty to ~60 offences; Title XI imposed 10-year ban on manufacture for civilian use of 19 named semi-automatic "assault weapons" and large-capacity magazines
  >10 rounds (sunset 13 September 2004). Violence Against Women Act included as Title IV.

  '

policy_id: es_rdl_20_2012_austerity
status: candidate
title: Rdl 20 2012 Austerity
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
description: 'Spain''s Real Decreto-Ley 20/2012 (13 July 2012), enacted by the first Rajoy government during the eurozone crisis, was a sweeping fiscal-adjustment package: VAT raised from 18 to 21%, cuts
  to civil-service pay (including suppression of the Christmas bonus), reduction of unemployment benefits after the sixth month, and curtailed public investment. Bundled with banking-sector measures, it
  targeted a fiscal saving of about €56bn over 2012-2014. The intended effect was to restore market access and meet EU/IMF/ECB conditionality.

  '
enacted_by:
- spain_rajoy_pp_first_2011_2015

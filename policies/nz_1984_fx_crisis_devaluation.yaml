description: 'Pre-election currency crisis July 1984 — reserves collapsed on capital flight; 20% devaluation required. Outgoing PM Muldoon initially refused to implement the devaluation recommended by incoming
  Lange government; three-day constitutional standoff resolved with devaluation and power transfer. Triggered Rogernomics reform programme. Foundational crisis for modern NZ political-economy narrative.

  '

description: 'Package Leyes 29788-29790 (28 Sep 2011) reformed Peruvian mining fiscal regime: new royalty on operating margin sliding-scale 1-12% (replacing sales-based royalty), Impuesto Especial a la
  Minería (IEM) 2-8.4% on operating margin for firms without tax-stability contracts, Gravamen Especial a la Minería (GEM) similar sliding-scale for firms with tax- stability contracts (voluntary alternative).
  Captured ~PEN 9bn (~USD 3bn) 2011-2014 from commodity windfall.

  '

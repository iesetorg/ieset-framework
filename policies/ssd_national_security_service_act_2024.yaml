policy_id: ssd_national_security_service_act_2024
status: candidate
title: South Sudan National Security Service Act 2024
countries:
- SSD
timeframe:
  start: 2024
  end: ongoing
description: >
  South Sudan enacted amendments to the National Security Service legal
  framework in 2024 while civil society and international observers warned that
  the law preserved broad detention and security-service powers. The statute
  became a central governance issue before the postponed transition election,
  because it affected arrest authority, political space, and civilian oversight
  of security agencies.
enacted_by:
- south_sudan_r_arcss_transitional_government_2018_present
scope: national
coalition_label_at_enactment: Revitalized Transitional Government of National Unity
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Broad security-service detention powers weakened due-process protections and political-space guarantees.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Security detention authority reduced effective judicial control over arrests and pre-trial liberty.
references:
- South Sudan National Security Service amendment materials and official enactment reporting, 2024.
- United Nations, Amnesty International, Human Rights Watch, Associated Press, and Reuters reporting on the 2024 security law.
notes: >
  The file codes the legal authority and rights concerns; it does not rely on
  disputed incident-level enforcement claims.

policy_id: jp_trinity_reform_local_finance_2003
status: candidate
title: Japan 'Trinity Reform' of local finance (2003-2006)
countries:
- JPN
timeframe:
  start: 2003
  end: 2006
  enacted_date: '2003-06-27'
description: '"Trinity Reform" of central-local fiscal relations adopted 27 June 2003 in Basic Policy for Economic and Fiscal Management: three pillars of (i) ¥3tn tax-revenue transfer from central to local
  governments (personal income tax to local resident tax); (ii) ¥4.7tn reduction in earmarked central subsidies to local governments; (iii) reform of Local Allocation Tax formula. Designed to reduce local-government
  fiscal dependence on central earmarks, increase own-source revenue share, and tighten LAT transfers.

  '
enacted_by:
- japan_koizumi_ldp_2001_2006
coalition_label_at_enactment: LDP-Komeito
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Earmarked subsidies cut ¥4.7tn; LAT transfers tightened.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Shifted local-government funding toward own-source revenue, strengthening fiscal responsibility.
references:

policy_id: germany_reich_insurance_code_1911
status: candidate
title: Germany Reich Insurance Code 1911
countries: [DEU]
timeframe:
  start: 1911
description: >
  The Reich Insurance Code (Reichsversicherungsordnung) codified and rationalised the
  fragmented Bismarckian system of compulsory sickness, accident, and invalidity
  insurance for industrial workers. Rather than inventing social insurance from scratch,
  it consolidated earlier legislation into a single imperial framework, standardised
  administration, and entrenched the principle that social protection for core wage
  earners should be organised through compulsory contributory institutions rather than
  poor relief alone.
enacted_by:
  - germany_imperial_tariff_social_insurance_state_1902_1914
coalition_label_at_enactment: "Imperial government under Chancellor Theobald von Bethmann Hollweg"
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Consolidated compulsory social-insurance entitlements for workers across sickness, accident, and invalidity risks."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "The code thickened payroll administration and employer obligations within the formal labour market."
references:
  - "Reichsversicherungsordnung (1911)"
  - "Rimlinger (1971), Welfare Policy and Industrialization in Europe, America, and Russia"

description: 'As part of Thailand''s first 2009 fiscal stimulus response to the Global Financial Crisis, the Abhisit Democrat government issued one-off cheques of 2,000 baht to social-security members and
  low-income state employees earning under 15,000 baht per month. Disbursement through the Social Security Office and payroll channels was intended to deliver an immediate consumption boost amid collapsing
  export demand.

  '

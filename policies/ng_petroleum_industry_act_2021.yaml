policy_id: ng_petroleum_industry_act_2021
status: candidate
title: Petroleum Industry Act 2021
countries:
- NGA
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-08-16'
description: 'The Petroleum Industry Act signed 16 August 2021 after 20 years of drafts (originally tabled 2008) rewrote Nigerian upstream, midstream and downstream oil-and-gas law. Converted NNPC into
  a commercial limited- liability company (NNPC Limited) subject to the Companies and Allied Matters Act, created the Nigerian Upstream Petroleum Regulatory Commission (NUPRC) and the Nigerian Midstream
  and Downstream Petroleum Regulatory Authority (NMDPRA), introduced a new fiscal regime (hydrocarbon tax plus CIT replacing the PPT), and established a 3% host-community development trust fund.

  '

- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Pro-entry obligations on gatekeepers offset by concentrated regulatory burden on a small set of incumbents.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Gatekeeper designation by the Commission triggers binding ex-ante conduct rules per CPS.
- axis: regulatory.trade_openness

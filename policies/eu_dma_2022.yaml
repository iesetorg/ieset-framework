description: 'Regulation (EU) 2022/1925 — the Digital Markets Act — designates large online platforms providing core platform services as "gatekeepers" and imposes ex-ante behavioural obligations including
  interoperability, prohibitions on self-preferencing, restrictions on tying and combining personal data across services, and limits on most-favoured-nation clauses. Enforced by the Commission with fines
  up to 10% of global turnover and possible structural remedies for systematic non-compliance.

  '

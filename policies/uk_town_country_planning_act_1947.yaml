policy_id: uk_town_country_planning_act_1947
status: candidate
title: Town Country Planning Act 1947
countries:
- GBR
timeframe:
  start: 1945
  end: 1951
description: 'The Town and Country Planning Act 1947, enacted by the Attlee government and effective 1 July 1948, nationalised development rights — requiring planning permission from local authorities for
  any change of land use — and introduced a 100% development charge on land-value uplift (later abolished). It empowered counties and county boroughs to prepare statutory development plans binding on subsequent
  decisions. The intended effect was to embed comprehensive land-use planning in the post-war reconstruction state, channel building according to Greater London Plan and New Towns priorities, and capture
  private windfall from public planning decisions.

  '

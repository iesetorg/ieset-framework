policy_id: png_independence_constitution_1975
status: candidate
title: Papua New Guinea independence constitution 1975
countries: [PNG]
timeframe: {start: 1975, end: ongoing}
description: >
  Papua New Guinea's 1975 independence constitution created a parliamentary
  democracy, recognised customary land tenure, and established national and
  provincial institutions for a highly diverse postcolonial state. The
  settlement shaped later resource governance and decentralisation conflicts.
enacted_by:
  - papua_new_guinea_independence_resource_state_1975_present
axes_moved:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, intended: true, rationale: "The constitution established democratic courts, parliament, and rights protections."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, intended: true, rationale: "Customary tenure was recognised, but formal state capacity over land administration remained limited."}
references:
  - "Papua New Guinea Constitution 1975"
  - "World Bank, PNG land and governance reports"

title: Padma Multipurpose Bridge — self-financed infrastructure mega-project
countries:
- BGD
timeframe:
  start: 2014
  end: 2022
  enacted_date: '2022-06-25'
description: 'The 6.15-km Padma road-rail bridge opened 25 June 2022 after the 2012 withdrawal of World Bank financing over corruption allegations led the Hasina government to self-finance construction
  from domestic resources. Estimated cost ~$3.6bn; projected GDP-growth contribution ~1.2-1.5 percentage points through integrating the south-west with Dhaka. Symbolic centrepiece of Vision 2041 developmentalism.

  '

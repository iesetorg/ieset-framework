title: Growth and Transformation Plan II (GTP II)
countries:
- ETH
timeframe:
  start: 2015
  end: 2020
description: 'GTP II (EFY 2008-2012, 2015/16-2019/20 Gregorian) targeted 11% annual GDP growth and a structural shift from agriculture-led to manufacturing-led growth, doubling the share of manufacturing
  in GDP and pushing industrial-park construction in Hawassa, Bole Lemi, Mekelle, Kombolcha, and Adama. Continued state dominance in telecoms, banking, power, logistics. External-debt service pressure and
  FX scarcity intensified 2017-2018.

  '

policy_id: pse_basic_law_2002_2003
status: candidate
title: Palestinian Basic Law and 2003 amendment
countries:
- PSE
timeframe:
  start: 2002
  end: ongoing
  enacted_date: '2002-05-29'
description: 'The Palestinian Basic Law, signed in 2002 and amended in 2003, set out the PA''s interim constitutional framework, including rights provisions, separation of powers, the Palestinian Legislative
  Council, judicial guarantees, and the creation of a prime-ministerial office. It formalised internal governance rules for PA-administered areas while remaining subordinate to the unresolved final-status
  process and later constrained by executive decrees and the West Bank/Gaza split.

  '
enacted_by:
- palestinian_authority_limited_self_government_1994_present
coalition_label_at_enactment: PLO/Fatah-led Palestinian Authority under Yasser Arafat
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The Basic Law codified rights, legislative authority, and executive responsibilities for PA institutions.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: It recognised judicial independence and court guarantees, though later decree rule and territorial division limited practical constraint.
references:
- Palestinian Basic Law, signed 29 May 2002
- Palestinian Amended Basic Law, 18 March 2003
- International Institute for Democracy and Electoral Assistance, Palestine Basic Law materials
notes: Coded as limited PA institutionalisation, not as a complete sovereign constitution.

policy_id: tun_education_health_expansion_1958_1970s
status: candidate
title: Tunisia state-led education and health expansion
countries: [TUN]
timeframe: {start: 1958, end: 1979}
description: >
  Early independence governments expanded public schooling, teacher training,
  Arabic-French national curricula, primary health services, vaccination, and
  family-planning infrastructure. These programmes made human-capital formation
  a core state responsibility and tied social modernisation to budgetary and
  administrative expansion.
enacted_by:
  - tunisia_bourguiba_state_modernisation_1956_1987
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Education and health absorbed a rising share of ordinary public expenditure."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Publicly provided social services expanded in-kind welfare even without a large cash-transfer state."
references:
  - "World Bank (1980), Tunisia: Country Economic Memorandum"
  - "Alexander (2010), Tunisia: Stability and Reform in the Modern Maghreb"

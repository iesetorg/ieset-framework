policy_id: thailand_village_fund_2001
status: candidate
title: Thailand Village Fund 2001
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'Launched by the Thaksin Thai Rak Thai government in 2001, the Village and Urban Community Fund programme provided every Thai village and urban community with a one-million-baht revolving credit
  endowment, governed by elected local committees and channelled through the Government Savings Bank and Bank for Agriculture and Agricultural Cooperatives. The scheme rapidly expanded rural microcredit
  access and became a flagship Thaksinomics policy.

  '
enacted_by:
- thailand_asian_crisis_and_recovery_1997_2001
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme created a parallel community-managed credit channel outside formal banking.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Operated alongside, not via, BOT, leaving central-bank independence intact.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: One-time capitalisation of roughly 80 billion baht raised aggregate fiscal outlay.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Endowment effectively transferred liquidity to rural households via cheap credit.

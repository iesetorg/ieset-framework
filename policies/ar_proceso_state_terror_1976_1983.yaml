description: 'Junta of 24 March 1976 established clandestine detention centres (ESMA, Campo de Mayo, La Perla, Club Atlético, El Olimpo; ~340 documented), "Task Group" organisation within each service,
  systematic torture, and "transfer" disappearances including flights over the Río de la Plata. CONADEP documented ~9,000 cases; human-rights organisations estimate ~30,000. Grandmothers of Plaza de Mayo
  continue to identify ~130 stolen children through present.


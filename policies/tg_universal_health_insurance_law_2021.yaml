policy_id: tg_universal_health_insurance_law_2021
status: candidate
title: Togo universal health insurance law 2021
countries:
- TGO
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-10-12'
description: 'Togo''s National Assembly adopted legislation instituting assurance maladie universelle, extending the right to health-insurance coverage beyond formal public-sector schemes toward all residents.
  The law created the legal basis for progressive coverage expansion, risk pooling, solidarity financing, and implementing regulations for a managing body, including groups previously outside formal insurance.

  '

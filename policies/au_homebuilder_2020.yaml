description: 'HomeBuilder provided A$25,000 (later A$15,000) grants to owner-occupiers building a new home or undertaking substantial renovations, administered through state revenue offices under a National
  Partnership Agreement. Targeted at supporting the residential construction sector through the COVID-19 downturn. Final program cost ~A$2.5bn; credited with stimulating a detached-housing construction
  pipeline that contributed to subsequent 2021-22 building-cost inflation.

  '

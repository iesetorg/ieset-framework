policy_id: argentina_import_sedi_sira_replacement_2023
status: candidate
title: Argentina SEDI Import Licensing Replacement 2023
countries:
- ARG
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-12-26'
description: 'The Milei government replaced the prior SIRA discretionary import-approval regime with the Sistema Estadistico de Importaciones (SEDI), shifting import administration toward an ex ante statistical
  declaration and risk-control process. The change removed a central rationing mechanism used under the Fernandez/Massa dollar-scarcity regime, although access to foreign exchange for payment still depended
  on BCRA rules during the transition.

  '
enacted_by:
- milei_shock_therapy_argentina_2023
coalition_label_at_enactment: La Libertad Avanza executive with emergency economic delegation
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Replacing SIRA with SEDI reduced discretionary pre-import licensing barriers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Easier import declaration increased competitive pressure on domestic incumbents, conditional on FX access.
references:
- AFIP / Secretaria de Comercio, Resolucion General Conjunta 5466/2023, Sistema Estadistico de Importaciones, Boletin Oficial, 2023-12-26
- Banco Central de la Republica Argentina, import-payment communications for the 2023-2024 transition

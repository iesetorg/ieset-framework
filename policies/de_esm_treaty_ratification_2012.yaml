description: 'German ratification of the Treaty establishing the European Stability Mechanism (signed Feb 2012, effective Sep 2012) creating a permanent €500bn intergovernmental lending facility replacing
  the temporary EFSF. Challenged at the Federal Constitutional Court; ruling of 12 September 2012 permitted ratification subject to conditions (German liability capped at €190bn, Bundestag information rights
  preserved). Enabled the Spanish banking-sector programme, Cypriot programme, and subsequently Third Greek Memorandum financing.

  '

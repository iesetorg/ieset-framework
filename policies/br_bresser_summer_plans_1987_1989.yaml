description: 'Plano Bresser (June 1987) under Finance Minister Luiz Bresser- Pereira — 90-day price-wage freeze, 9.5% maxi-devaluation, URP wage-adjustment mechanism; failed by end-1987. Plano Verão (Summer
  Plan) 15 January 1989 under Maílson da Nóbrega — replaced cruzado with cruzado novo at 1,000:1, new price freeze, devaluation; collapsed within months into hyperinflation peaking 84% monthly March 1990.


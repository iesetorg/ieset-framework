title: Broad-Based Black Economic Empowerment Act (South Africa, 2003)
countries:
- ZAF
timeframe:
  start: 2003
  enacted_date: '2004-01-09'
description: 'The Broad-Based Black Economic Empowerment Act 53 of 2003, enacted under the Mbeki administration, created a statutory framework for racial economic redress via generic and sectoral Codes
  of Good Practice (finalised 2007) scoring firms on ownership, management control, skills development, enterprise development, and socio-economic development. B-BBEE scorecards gate public-sector procurement
  and licensed-sector participation. Amended 2013 to add penalties for fronting.

  '

timeframe:
  start: 1991
  enacted_date: '1991-05-15'
description: 'Employment Contracts Act 1991, effective 15 May 1991, replaced the Arbitration Court award system with individual and collective employment contracts freely negotiated between employer and
  employee. Ended compulsory-unionism provisions of the 1987 Labour Relations Act. Union density fell from ~50% (1990) to ~22% (1995) and collective- agreement coverage fell from ~70% to under 30%.

  '

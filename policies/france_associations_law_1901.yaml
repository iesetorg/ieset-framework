policy_id: france_associations_law_1901
status: candidate
title: France Law of Association 1901
countries: [FRA]
timeframe:
  start: 1901
  end: 1901
  enacted_date: "1901-07-01"
description: >
  The Law of 1 July 1901 established a general legal framework for private
  associations in France, allowing most non-profit groups to form freely
  upon declaration while subjecting religious congregations to separate
  state authorisation. In the political economy of the early Third
  Republic it was a foundational republican state-building measure:
  voluntary organisations, educational leagues, mutual-aid circles, and
  civic associations gained predictable legal personality inside a more
  secular and uniform public-law order.
enacted_by:
  - france_radical_republican_reform_1901_1914
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The law generalised a declarative legal regime for civic association and regularised the conditions under which groups could operate."
references:
  - "Loi du 1er juillet 1901 relative au contrat d'association"

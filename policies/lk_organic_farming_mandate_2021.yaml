policy_id: lk_organic_farming_mandate_2021
status: candidate
title: Overnight synthetic-fertiliser import ban / organic farming mandate (Sri Lanka 2021)
countries:
- LKA
timeframe:
  start: 2021
  end: 2022
  enacted_date: '2021-05-06'
description: 'Gazetted ban on import of chemical fertilisers, agrochemicals and pesticides announced 29 April 2021 and effective May 2021, framed as a pivot to 100% organic agriculture. Imposed mid-cropping
  cycle without substitution capacity in organic inputs. Rice yields fell an estimated 20% in the 2021/22 Maha season; domestic rice self-sufficiency reversed, tea export earnings (largest forex earner)
  hit, and emergency $200mn compensation package announced Nov 2021. Partial rollback from Oct-Nov 2021; formally reversed in Q1 2022. Widely identified as a proximate trigger of the forex and food-price
  spiral feeding the Aragalaya protests.

  '
enacted_by:
- srilanka_gotabaya_rajapaksa_slpp_2019_2022
coalition_label_at_enactment: Sri Lanka Podujana Peramuna (SLPP)

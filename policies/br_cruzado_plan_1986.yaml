description: 'Decreto-Lei 2.283 of 28 February 1986 and complementary measures under Finance Minister Dílson Funaro, designed by Bresser, Arida, Lara-Resende, Lopes, Nakano. Price-and-wage freeze; indexation
  abolished; cruzado replaced cruzeiro at 1,000:1. Monthly inflation fell from 15% to near-zero in March-April 1986. Consumption boom; PMDB swept 15 November 1986 midterms. Demand exceeded supply; shortages;
  cattle-hoarding. Plano Cruzado II (November 1986, post-election) raised prices — inflation returned, hit ~80% monthly by early 1987.

  '

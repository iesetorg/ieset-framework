policy_id: vietnam_enterprise_law_1999
status: candidate
title: Vietnam Enterprise Law 1999
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
description: 'The Enterprise Law passed in June 1999 (effective January 2000) replaced the prior fragmented business registration regime, simplifying private-sector incorporation, eliminating most of the
  approximately 150 sectoral business licences, and establishing standardised limited-liability and shareholding company forms. The reform is widely credited with triggering rapid private SME formation
  in the early 2000s and was an inflection point in Doi Moi-era institutional reform.

  '

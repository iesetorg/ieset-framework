description: 'E3+3 (UK, FR, DE + US, CN, RU) + Iran agreement signed 14 Jul 2015 Vienna. Iran capped enriched uranium at 3.67% + 300kg LEU stockpile for 10-15 years, reduced centrifuges from ~19,000 to

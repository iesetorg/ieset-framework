title: UK Article 50 notification of withdrawal from EU
countries:
- GBR
timeframe:
  start: 2017
  end: 2020
  enacted_date: '2017-03-29'
description: 'Formal notification by HM Government under Article 50 TEU of the UK''s intention to withdraw from the European Union, delivered to President of the European Council Donald Tusk on 29 March
  2017 after the European Union (Notification of Withdrawal) Act 2017 authorised the Prime Minister to serve notice following the Miller Supreme Court judgment of January 2017. Opened a two-year negotiation
  window extended twice before withdrawal on 31 January 2020.

  '

  rationale: Tariffs and quotas were cut and export-incentive regime opened the trade account.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Initial controls retained over banking, with formal liberalisation deferred to mid-1980s.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Price decontrol and reduced subsidies allowed competitive pricing in domestic markets.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Export tax rebates and public-investment infrastructure raised state outlays.

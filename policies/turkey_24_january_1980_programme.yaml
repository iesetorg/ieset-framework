policy_id: turkey_24_january_1980_programme
status: candidate
title: Turkey 24 January 1980 Programme
countries:
- TUR
timeframe:
  start: 1983
  end: 1993
description: 'Designed by Turgut Özal under prime minister Demirel and reinforced after the September 1980 military coup, the 24 January 1980 stabilisation and structural-adjustment programme abandoned
  Turkey''s import-substitution model. It devalued the lira, decontrolled most prices, eliminated many tariff and quota controls, introduced export incentives, and liberalised foreign-investment rules —
  laying the foundation for the export-led growth strategy that defined the Özal era.

  '

policy_id: uk_public_sector_employment_growth_2001_2010
status: candidate
title: Public Sector Employment Growth 2001 2010
countries:
- GBR
timeframe:
  start: 2001
  end: 2010
description: 'The UK''s public-sector employment expansion of 2001-2010, driven by Spending Review settlements under successive Blair-Brown governments, raised public-sector headcount from around 5.2 million
  to a 2009 peak of approximately 6.05 million, with most growth in the NHS (Wanless Review-driven spending), education (school-workforce reform, teaching-assistant recruitment), and Sure Start early-years
  provision. The intended effect was to translate the post-1999 fiscal-rule-compatible expansion into front-line capacity, deliver Public Service Agreement targets on waiting times and literacy, and rebuild
  service quality after the 1990s'' real-terms freeze.

  '

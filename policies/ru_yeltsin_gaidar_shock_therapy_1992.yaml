timeframe:
  start: 1992
  end: 1993
description: 'Boris Yeltsin''s reform government with acting prime minister Yegor Gaidar and a team including Anatoly Chubais and Andrei Nechaev launching shock therapy on 2 January 1992. Components: liberalisation
  of about 90% of consumer prices and 80% of producer prices in a single decree, removal of most internal restrictions on trade, sharp cuts to defence and enterprise subsidies, opening to imports under
  a low uniform tariff, partial unification of the rouble exchange rate, and the legal foundation for the voucher mass-privatisation programme that ran from October 1992 to mid-1994 distributing 148 million
  privatisation cheques. Stated case: collapse the Soviet command-economy price structure to expose true scarcities, transfer ownership rapidly out of state hands to make reforms politically irreversible,
  and integrate Russia into the world trading system before reformers could be outmanoeuvred by the Supreme Soviet and industrial-lobby opposition.'

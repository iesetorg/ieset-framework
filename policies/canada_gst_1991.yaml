timeframe:
  start: 1984
  end: 2006
description: 'Canada''s Goods and Services Tax (GST), enacted as the Excise Tax Act amendment of 1990 and implemented on 1 January 1991, replaced the hidden 13.5% Manufacturers'' Sales Tax with a transparent
  7% federal value-added tax on most goods and services, with input-tax credits for businesses. Designed under the Mulroney government and harmonised later with provincial sales taxes in some provinces,
  the intended effect was to remove cascading taxation, broaden the consumption-tax base, and improve the international competitiveness of Canadian exports.

  '

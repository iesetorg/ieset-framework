policy_id: us_natural_gas_policy_act_1978
status: candidate
title: Natural Gas Policy Act 1978
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'The Natural Gas Policy Act of 1978 (Pub. L. 95-621) began phased decontrol of wellhead natural-gas prices, replacing federal price ceilings on interstate gas with a complex multi-tier pricing
  schedule that allowed new-gas prices to rise to market levels by the late 1980s. Part of the Carter National Energy Plan, NGPA is the legislative vehicle that ended decades of FPC/FERC price suppression
  responsible for chronic gas shortages, and was followed by full decontrol in the Natural Gas Wellhead Decontrol Act of 1989.

  '

policy_id: indonesia_bimas_green_revolution_1970s
status: candidate
title: Indonesia Bimas Green Revolution 1970S
countries:
- IDN
timeframe:
  start: 1966
  end: 1998
description: 'The Bimas (Bimbingan Massal) programme delivered subsidised fertiliser, high-yielding rice seed varieties, and credit packages to smallholders through Bulog procurement and BRI rural-bank
  channels under the Suharto New Order. Combined with irrigation expansion and pesticide subsidies, the programme drove Indonesia''s transition to rice self-sufficiency by 1984 (recognised by the FAO) before
  the country returned to net-importer status in the 1990s.

  '
enacted_by:
- indonesia_suharto_new_order_1965_1998
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Large fertiliser, seed, and credit subsidies channelled to rice-growing smallholders.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Bulog procurement insulated domestic rice prices from world markets while inputs remained imported.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Subsidy administration involved patronage networks and discretionary allocation under New Order.
- axis: institutional.property_rights
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Programme stabilised smallholder titles in rice areas while concentrating leverage with state agencies.

policy_id: in_fiscal_drift_pre_1991_crisis
status: candidate
title: India pre-1991-crisis fiscal drift
countries:
- IND
timeframe:
  start: 1988
  end: 1991
description: 'Cumulative fiscal drift across late 1980s — central government gross fiscal deficit reached 8.4% of GDP in 1990-91, combined public-sector deficit ~10%, external debt $70bn (max for the period),
  forex reserves fell to $1.2bn by Jun 1991 (two weeks'' imports). Combination of subsidised fuel, food, fertiliser; loan waivers; wage hikes; plus Gulf-War oil-price shock 1990 triggered the balance-of-payments
  crisis that forced 1991 reforms.

  '

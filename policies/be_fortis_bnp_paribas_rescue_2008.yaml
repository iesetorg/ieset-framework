policy_id: be_fortis_bnp_paribas_rescue_2008
status: candidate
title: Belgium Fortis rescue and BNP-Paribas transfer (2008)
countries:
- BEL
timeframe:
  start: 2008
  end: 2009
  enacted_date: '2008-09-28'
description: 'Belgian state acquisition of 49.93% of Fortis Bank Belgium on 28 September 2008 (~€4.7bn), followed by full acquisition of the Belgian banking operations on 5 October 2008 and transfer of
  75% to BNP Paribas in exchange for BNP Paribas shares (completing May 2009 after Brussels Court of Appeal reversal and shareholder-vote sequence). Combined Belgian state commitments in Fortis dossier
  ~€13.5bn plus contingent guarantees. The ''Fortis-gate'' episode — apparent executive pressure on the Brussels Court of Appeal — triggered PM Leterme''s first resignation in December 2008.

  '

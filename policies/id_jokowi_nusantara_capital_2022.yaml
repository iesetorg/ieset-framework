policy_id: id_jokowi_nusantara_capital_2022
status: candidate
title: Nusantara new national capital law 2022
countries:
- IDN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-15'
description: 'UU No. 3/2022 on the Ibu Kota Negara (as amended by UU 21/2023) authorised relocation of Indonesia''s capital from Jakarta to a greenfield site in North Penajam Paser, East Kalimantan, branded
  Nusantara. Budget envelope ~USD 35bn (~20% state, ~80% private/PPP) over 20+ years. Established IKN Authority as a special-autonomy body reporting directly to the president. First government-building
  phase inaugurated for Indonesian Independence Day 17 August 2024; full migration of central-government offices targeted 2028-2045. Sovereign- commitment device locking successor governments into continued
  build- out.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIM+ super-coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Multi-decade capital-build-out commitment, ~USD 7bn direct state contribution envelope.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Tax holidays up to 30 years and land-rights concessions for private investors in IKN.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: IKN Authority bypasses standard provincial/regional governance and land-acquisition procedures.
references:

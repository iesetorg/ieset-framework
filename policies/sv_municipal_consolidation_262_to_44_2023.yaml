policy_id: sv_municipal_consolidation_262_to_44_2023
status: candidate
title: Municipal consolidation from 262 to 44 municipalities (2023)
countries:
- SLV
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-06-01'
description: 'The Ley Especial para la Reestructuración Municipal, approved in Jun 2023 by the Nuevas Ideas supermajority and effective May 2024 after the Mar 2024 municipal elections, consolidated El Salvador''s
  262 municipalities into 44 larger units grouped by department and population. The reform absorbed ~200 existing mayoralties into the new consolidated structures and was framed as an efficiency measure
  reducing duplicated bureaucracy; critics argued it eliminated opposition strongholds and centralised territorial control under Nuevas Ideas, which won 43 of 44 new mayoralties on Mar 3 2024. The reform
  redirected municipal fiscal transfers (FODES) and personnel budgets toward the consolidated units.

  '

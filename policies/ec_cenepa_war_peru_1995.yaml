title: Cenepa War — Ecuador-Peru border conflict January-February 1995
countries:
- ECU
- PER
timeframe:
  start: 1995
  enacted_date: '1995-01-26'
description: 'Armed clash between Ecuador and Peru in the Alto Cenepa valley from 26 January 1995. Contest over the ~78-km disputed stretch left undemarcated by the 1942 Rio de Janeiro Protocol. Ecuador
  held the positions; Peruvian forces suffered higher casualties at Tiwintza, Base Sur, Cueva de los Tayos. Ceasefire 17 February 1995 through the four Rio Protocol guarantor states (Argentina, Brazil,
  Chile, US). Itamaraty Peace Declaration 28 October 1998 (under Mahuad/Fujimori) finalised border. Boosted Ecuadorian military prestige and briefly Durán Ballén''s popularity.

  '

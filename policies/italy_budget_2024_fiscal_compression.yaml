policy_id: italy_budget_2024_fiscal_compression
status: candidate
title: Italy 2024 Budget Law — fiscal convergence compression
countries:
- ITA
timeframe:
  start: 2024
  enacted_date: '2023-12-30'
description: '2024 Budget Law (Law 213/2023) setting a headline deficit path of 4.3% of GDP (from 5.3% in 2023) with primary surplus convergence trajectory, in anticipation of the revised EU Stability and
  Growth Pact (in force April 2024). Key measures: IRPEF bracket simplification from four to three brackets with merging of 23%/25% brackets (up to €28,000); permanent reduction of payroll-tax wedge (cuneo
  fiscale) for low-to-middle-income employees ~€7bn/year; pension indexation compression for higher-bracket pensions (full indexation preserved for pensions up to 4x minimum, compressed above); public-sector
  contract renewal envelope funded; healthcare spending nominal increase below inflation (real-terms compression). Contentious elements: partial freeze of local-government indexation; reduction of Superbonus
  forward cost (with separate DL 39/2024 tightening transfer mechanics). First Italian budget under the new EU fiscal framework''s Medium-Term Fiscal-Structural Plan (approved October 2024) committing to
  7-year adjustment path with net-expenditure ceiling.

  '

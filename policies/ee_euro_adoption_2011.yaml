policy_id: ee_euro_adoption_2011
status: candidate
title: Estonia euro adoption 2011
countries:
- EST
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-01-01'
description: 'Estonia adopted the euro on 1 January 2011 after Council Decision 2010/416/EU found that it fulfilled the convergence conditions and abrogated its derogation. The changeover replaced the kroon,
  which had operated under a currency-board style peg, with direct Eurosystem membership and eliminated residual exchange-rate conversion costs with euro-area partners.

  '
enacted_by: []
coalition_label_at_enactment: Ansip Reform-led coalition
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: moderate
  intended: true
  rationale: Estonia moved from a hard peg/currency-board regime into the ECB/Eurosystem monetary-policy framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Euro adoption removed remaining conversion costs and currency-risk frictions with euro-area partners.
references:

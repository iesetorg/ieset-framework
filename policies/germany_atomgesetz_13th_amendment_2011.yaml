policy_id: germany_atomgesetz_13th_amendment_2011
status: candidate
title: Germany Atomgesetz 13Th Amendment 2011
countries:
- DEU
timeframe:
  start: 2011
  end: 2022
description: 'The Dreizehntes Gesetz zur Änderung des Atomgesetzes, enacted in August 2011 in response to Fukushima, reversed the 2010 lifetime extension and ordered the immediate decommissioning of the
  eight oldest German nuclear reactors with phased shutdowns of the remaining nine plants by end-2022. The amendment cemented the Energiewende framework, terminated nuclear baseload generation, and triggered
  subsequent challenges by operators (E.ON, RWE, Vattenfall) before the Federal Constitutional Court.

  '
enacted_by:
- germany_merkel_nuclear_phaseout_2011
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Phase-out timetable codified in statute the most stringent industrial-shutdown rule in the energy code.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Operating licences for named reactors were administratively withdrawn on staggered cut-off dates.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removal of nuclear baseload before equivalent firm capacity reduced supply security headroom.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Decommissioning created public liability and renewable substitution subsidies under the EEG.

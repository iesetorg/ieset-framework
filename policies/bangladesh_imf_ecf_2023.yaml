title: Bangladesh Imf Ecf 2023
countries:
- BGD
timeframe:
  start: 1982
  end: ongoing
description: 'Combined Extended Credit Facility / Extended Fund Facility / Resilience and Sustainability Facility programme of approximately USD 4.7 billion approved by the IMF Executive Board in January
  2023 to rebuild reserves and modernise revenue, exchange-rate, and financial-sector frameworks. Conditionality required moves to a market-determined exchange rate, tax base widening, NPL recognition,
  and fiscal subsidy reform — relevant to the apparel-export model through FX and energy-pricing rules.

  '

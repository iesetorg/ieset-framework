policy_id: br_electricity_tariff_forcing_mp579_2012
status: candidate
title: MP 579 electricity tariff forcing (forced concession renewal)
countries:
- BRA
timeframe:
  start: 2012
  enacted_date: '2012-09-11'
description: 'Medida Provisória 579/2012 (11 Sep 2012, converted Lei 12.783/2013) forced early-renewal of electricity generation + transmission + distribution concessions (~20% of installed capacity) in
  exchange for tariff cuts of ~20% — politically timed for 2013 rate reductions. Utility companies lost ~BRL 70bn in market capitalisation in weeks post-announcement. Led to generator-distributor contract
  stress during 2013-2015 drought, forced Treasury capitalisation of CDE (Conta de Desenvolvimento Energético), tariff realism reversal 2015 under Levy.

  '

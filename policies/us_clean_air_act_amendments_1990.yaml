policy_id: us_clean_air_act_amendments_1990
status: candidate
title: Clean Air Act Amendments 1990 (Acid Rain SO2 cap-and-trade)
countries:
- USA
timeframe:
  start: 1990
  enacted_date: '1990-11-15'
description: 'CAA Amendments 1990 (Pub. L. 101-549), signed 15 November 1990. Title IV established the Acid Rain Program — the world''s first large-scale cap-and-trade regime, targeting SO2 from 263 coal-fired
  power plants with 10M ton reduction from 1980 levels by 2010; NOx standards for mobile and stationary sources; Title V operating-permit regime; ozone/air-toxics/CFC-phaseout provisions. By 2010 SO2 emissions
  fell 67% vs 1980 baseline at ~$3B/year compliance cost (vs ex-ante $7.5B/year estimate).

  '

description: 'RA 8180 Oil Industry Deregulation Act 28 Mar 1996 removed price controls and opened domestic petroleum downstream market to new entrants. Supreme Court struck down RA 8180 Nov 1997 on constitutional
  grounds (equal-protection violations). RA 8479 Feb 1998 replaced it with revised deregulation framework that survived review and remains the governing framework.

  '

policy_id: uk_greenbelt_protection_sustained
status: candidate
title: Greenbelt Protection Sustained
countries:
- GBR
timeframe:
  start: 1990
  end: ongoing
description: 'Successive UK governments have maintained statutory Green Belt protections around major conurbations through the National Planning Policy Framework, which presumes against new construction
  in designated Green Belt land except in very special circumstances. Originally designed under the Town and Country Planning Act framework to prevent urban sprawl, sustained protection materially restricts
  greenfield housing supply on the urban fringe of London and other cities.

  '
enacted_by:
- uk_planning_restriction_regime
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: NPPF presumption against development in Green Belt requires very special circumstances test for permission.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Suppressed greenfield supply elevates entry costs for housebuilders and entrenches incumbent landbanks.

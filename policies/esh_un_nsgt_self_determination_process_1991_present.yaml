policy_id: esh_un_nsgt_self_determination_process_1991_present
status: candidate
title: UN Non-Self-Governing Territory self-determination treatment
countries:
  - ESH
timeframe:
  start: 1991
  end: ongoing
description: >
  During the 1991-present settlement-plan period, UN decolonization and Security
  Council processes continued to treat Western Sahara as a Non-Self-Governing
  Territory and as a self-determination question rather than as an ordinary
  sovereign-state policy case. This policy spec captures the procedural status
  treatment, Special Committee/decolonization listing, Secretary-General and
  Personal Envoy tracks, and negotiated political-process framing that operate
  alongside MINURSO without resolving final sovereignty.
scope: supranational
enacted_by:
  - western_sahara_contested_status_self_determination_process_1991_present
coalition_label_at_enactment: "United Nations decolonization and Security Council process"
axes_moved:
  - axis: institutional.rule_of_law
    direction: +
    magnitude: weak
    intended: true
    rationale: "UN decolonization listing and self-determination process preserve procedural legal status for Western Sahara while final status remains contested."
references:
  - "United Nations, Decolonization: Western Sahara profile, https://www.un.org/dppa/decolonization/en/nsgt/western-sahara"
  - "United Nations General Assembly Resolution 1514 (XV), Declaration on the Granting of Independence to Colonial Countries and Peoples, https://docs.un.org/en/A/RES/1514(XV)"
  - "United Nations Security Council and Secretary-General reporting on Western Sahara and MINURSO political-process renewals"
notes: "The 1991 start date scopes this spec to the current MINURSO-era settlement process; Western Sahara's UN decolonization treatment predates 1991. Coding is neutral on sovereignty and final status."

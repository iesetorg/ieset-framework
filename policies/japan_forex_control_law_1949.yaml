policy_id: japan_forex_control_law_1949
status: candidate
title: Japan Forex Control Law 1949
countries:
- JPN
timeframe:
  start: 1952
  end: 1975
description: 'The Foreign Exchange and Foreign Trade Control Law (Law No. 228 of 1949) created a comprehensive regime of capital and current-account controls that channelled all foreign exchange through
  the Bank of Japan and licensed import allocations through MITI. It became a core tool of post-war industrial policy: foreign technology licensing, raw-materials imports, and outward FDI all required government
  approval, allowing the state to ration scarce foreign exchange toward priority sectors during the high-growth era.

  '
enacted_by:
- japan_post_war_meti_industrial_policy_1952_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: All forex transactions required MITI/MOF licences, embedding sectoral allocation in trade flows.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Restricted imports of consumer/finished goods while permitting tech and raw-material imports for priority sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Preferential allocation of scarce forex amounted to an implicit subsidy for export industries.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BOJ administered exchange controls under MOF direction, subordinating monetary to industrial-policy goals.

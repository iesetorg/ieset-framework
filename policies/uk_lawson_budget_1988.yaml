title: UK Lawson Budget 1988 — top rate 60→40%, basic 25%
countries:
- GBR
timeframe:
  start: 1988
  end: 1988
  enacted_date: '1988-03-15'
description: 'Chancellor Nigel Lawson''s March 1988 Budget abolished higher-rate bands between 40% and 60%, cutting the top marginal income-tax rate from 60% to 40% and the basic rate from 27% to 25%. Capital
  Gains Tax was aligned with income tax rates with indexation relief. Dividend imputation system adjusted. Widely regarded as the high-water mark of UK supply-side income-tax policy and a catalyst for the
  ''Lawson Boom'' demand surge.

  '

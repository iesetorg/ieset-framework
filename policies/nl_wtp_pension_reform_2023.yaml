policy_id: nl_wtp_pension_reform_2023
status: candidate
title: Wet toekomst pensioenen — Netherlands DB-to-DC pension reform 2023
countries:
- NLD
timeframe:
  start: 2023
  end: 2028
  enacted_date: '2023-07-01'
description: 'Largest Dutch pension reform in decades. Converted the second-pillar occupational system — Europe''s largest at ~EUR 1.5 trillion in assets — from defined-benefit collective contracts with
  nominal-benefit promises to individual defined-contribution schemes (solidaire or flexible premie-overeenkomst). Funds transition accrued entitlements by end-2027 / mid-2028 via "invaren". Eliminates
  dekkingsgraad (coverage-ratio) cuts and promises more transparent individual pots while shifting investment risk onto participants. Passed Tweede Kamer 22 December 2022, Eerste Kamer 30 May 2023.

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie
axes_moved:
- axis: institutional.property_rights
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Collective DB claims converted to individual DC accounts; coded as measured-neutral because litigation on 'invaren' is ongoing and the net direction on property rights is contested.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Moved from nominal-guarantee DB regulation to lifecycle DC framework with broader investment-mandate latitude.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  rationale: Fiscal footprint explicitly unchanged; reform is architectural not transfer-size.
references:
- Wet toekomst pensioenen (Stb. 2023, 216)
- Pensioenakkoord sociale partners 5 June 2019
- DNB / AFM toezichtkaders Wtp 2023-2028

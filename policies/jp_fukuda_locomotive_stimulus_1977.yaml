policy_id: jp_fukuda_locomotive_stimulus_1977
status: candidate
title: Fukuda 'locomotive theory' fiscal stimulus (Japan 1977)
countries:
- JPN
timeframe:
  start: 1977
  end: 1978
  enacted_date: '1977-05-08'
description: 'Commitment at the Bonn G7 summit (7-8 May 1977) to a 7% real GDP growth target for Japan, operationalised via a FY1977 supplementary budget and a FY1978 general-account budget that raised
  deficit-bond issuance to ~34% of the general account — among the highest post-war levels. Aimed to share the reflationary burden of the post-oil-shock global economy with West Germany and the US. Outcome:
  Japan recorded ~5.2% growth 1978 but fell short of the 7% pledge.

  '

description: 'Syntagma tis Ellados adopted 11 June 1975 after the 1974 referendum abolished the monarchy. Established parliamentary republic with elected president having residual powers; amended 1986 to
  reduce presidential authority, 2001, 2008, and 2019. Codified property rights alongside Article 106 allowing state-enterprise role in national economy. Core institutional foundation of the Metapolitefsi.

  '

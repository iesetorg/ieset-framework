policy_id: uk_nimby_public_inquiry_regime
status: candidate
title: Nimby Public Inquiry Regime
countries:
- GBR
timeframe:
  start: 1990
  end: ongoing
description: 'The UK system of statutory rights to object to and demand public inquiries on planning applications and Nationally Significant Infrastructure Projects, conducted by Planning Inspectors under
  the Town and Country Planning Act and the Planning Act 2008. The regime affords adjacent landowners and neighbourhood groups extensive procedural rights, materially extending project lead times and adding
  litigation exposure to housing and infrastructure delivery.

  '

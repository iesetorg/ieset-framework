  intended: true
  rationale: Statutory rights to public inquiry create a multi-year licensing veto-point on major development.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: High legal-process costs raise minimum scale for development proposers and entrench incumbents.

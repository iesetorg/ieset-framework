policy_id: uk_subsidy_control_act_2022
status: candidate
title: UK Subsidy Control Act 2022
countries:
- GBR
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-04-28'
description: 'Received Royal Assent 28 April 2022 and came into force 4 January 2023, replacing EU State Aid rules with a UK-specific subsidy regime. Shifted from prior EU-style ex-ante Commission notification
  to an ex-post principles-based regime: public authorities self-assess subsidies against seven Subsidy Control Principles, with Competition and Markets Authority (Subsidy Advice Unit) oversight and Competition
  Appeal Tribunal review. Lowered administrative friction for low-value and regional-aid subsidies; created ''Subsidy of Particular Interest'' and ''Subsidy of Interest'' higher-scrutiny tiers.

  '
enacted_by:
- uk_johnson_conservative_2019_2022
coalition_label_at_enactment: Conservative majority (Johnson)
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower administrative friction for public-authority subsidies; broader discretion for ministers.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Looser ex-ante subsidy discipline than prior EU regime, with unproven ex-post enforcement.

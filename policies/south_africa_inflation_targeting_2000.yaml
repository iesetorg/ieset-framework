policy_id: south_africa_inflation_targeting_2000
status: candidate
title: South Africa Inflation Targeting 2000
countries:
- ZAF
timeframe:
  start: 1994
  end: ongoing
description: 'South Africa formally adopted inflation targeting in February 2000 following the Mboweni-era SARB framework reform, replacing the previous eclectic monetary framework with a 3-6% CPI target
  band. Implemented through the SARB Act and Monetary Policy Committee structure, it anchored inflation expectations and gave the Reserve Bank operational independence over the repo rate.

  '
enacted_by:
- south_africa_anc_post_apartheid_1994_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Macro stability under IT enabled sustained social-grant expansion within fiscal envelope.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: IT framework is the canonical institutionalisation of central-bank operational autonomy.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: IT-induced rate stability does not address labour-market rigidity per se; held flexibility constant.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Monetary regime largely orthogonal to sectoral licensing; mixed effect via financial-sector rules.

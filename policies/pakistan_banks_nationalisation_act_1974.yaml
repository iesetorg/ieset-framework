policy_id: pakistan_banks_nationalisation_act_1974
status: candidate
title: Pakistan Banks Nationalisation Act 1974
countries:
- PAK
timeframe:
  start: 1972
  end: 1977
description: 'Pakistan''s Banks (Nationalisation) Act 1974, promulgated by the Bhutto government on 1 January 1974, transferred ownership of all 14 domestic scheduled commercial banks to the federal government,
  consolidating them into five state-owned banks under a Pakistan Banking Council. Foreign banks were exempted. The intended effect was to redirect credit allocation towards public-sector industries and
  rural beneficiaries, end "twenty-two families" concentrated control of finance, and give the state direct command over loan-pricing and credit-rationing in support of the planned economy.

  '

policy_id: bo_dollar_peg_defence_2023_2024
status: candidate
title: Bolivia dollar-peg defence and gold-reserve monetisation (2023-2024)
countries:
- BOL
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-05-05'
description: 'Defence of the USD/BOB 6.96 fixed peg (in place since 2011) as BCB net international reserves fell below USD 2bn in early 2023, roughly a third of 2014 peak levels, driven by gas-export decline
  and import dependence. Ley 1503 of May 5, 2023 authorised the central bank to monetise gold reserves, permitting sale of gold holdings to obtain usable foreign exchange. Parallel-market dollar premium
  opened to 30-50% through 2023- 2024; FX rationing at banks effectively restricted imports, contributing to the 2024 fuel-shortage crisis as YPFB could not obtain dollars to pay for imported diesel and
  gasoline. No formal devaluation announced.

  '
enacted_by:
- bolivia_arce_mas_2020_present
coalition_label_at_enactment: MAS-IPSP (Arcista)
axes_moved:
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: strong
  rationale: BCB reserves subordinated to peg defence and fiscal financing needs.
  intended: true
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  rationale: FX rationing functioned as de facto import restriction.
  intended: false
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: Peg + fuel subsidy combination sustained at mounting fiscal/reserve cost.
  intended: true
references:
- Ley 1503 (2023) sobre reservas de oro
- BCB Reportes de Política Monetaria 2023-2024
- IMF Article IV Bolivia 2023

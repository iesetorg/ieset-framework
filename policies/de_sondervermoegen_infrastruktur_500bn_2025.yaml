policy_id: de_sondervermoegen_infrastruktur_500bn_2025
status: candidate
title: Sondervermögen Infrastruktur und Klimaneutralität EUR 500bn 2025
countries:
- DEU
timeframe:
  start: 2025
  end: 2037
  enacted_date: '2025-03-18'
description: 'Constitutional amendment (18 March 2025) passed by the outgoing Bundestag with CDU/CSU + SPD + Green support, creating a EUR 500bn off-balance special-purpose fund over twelve years for federal
  and Länder infrastructure investment, of which EUR 100bn earmarked for climate-neutrality measures (Green coalition condition) and EUR 100bn for Länder-level capex. Complements the concurrent constitutional
  carve-out exempting defence spending above 1% of GDP from the debt brake. Largest single debt-financed investment commitment in post- war German fiscal history.

  '
enacted_by:
- germany_merz_2025_present
coalition_label_at_enactment: CDU/CSU-SPD (with Green constitutional support)
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: EUR 500bn/12y equals ~3.4% of GDP/y additional borrowing capacity, off the ordinary Schuldenbremse envelope.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Climate-earmarked portion flows to sector-specific decarbonisation programmes.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Repeated resort to Sondervermögen off-balance instruments weakens the constitutional fiscal anchor established in 2009.
references:

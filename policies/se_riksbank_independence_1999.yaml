policy_id: se_riksbank_independence_1999
status: candidate
title: Riksbank independence constitutional reform 1999
countries:
- SWE
timeframe:
  start: 1999
  enacted_date: '1999-01-01'
description: 'Amended the Riksbank Act (1988:1385) and Instrument of Government to establish the Riksbank as a constitutionally independent central bank with a statutory price-stability objective, a six-member
  Executive Board, and prohibition of government instructions. Completed the alignment to Maastricht ESCB-style independence norms without Sweden having joined the euro. Effective 1 January 1999.

  '

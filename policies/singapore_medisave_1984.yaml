description: 'Medisave was launched in April 1984 as the first pillar of Singapore''s "3M" healthcare financing system, carving a dedicated medical savings account out of the existing CPF contribution framework.
  Workers contribute a percentage of monthly wages to individual Medisave accounts used to pay for hospitalisation, selected outpatient services, and approved insurance premiums.

  '

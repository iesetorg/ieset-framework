policy_id: nl_stricter_migration_code_2004_2006
status: candidate
title: Stricter Migration Code 2004 2006
countries:
- NLD
timeframe:
  start: 2002
  end: 2006
description: 'Under the Balkenende II/III coalitions, the Netherlands tightened its migration regime through the 2004 Vreemdelingenwet implementation, the Wet inburgering buitenland (Civic Integration Abroad
  Act, 2006) introducing pre-arrival language and civic-knowledge tests for non-EEA family migrants, and Minister Verdonk''s enforcement-oriented application of immigration law. Income thresholds for family
  reunification were raised and removal procedures for failed asylum-seekers expanded.

  '
enacted_by:
- netherlands_balkenende_cda_2002_2006
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Tighter family-reunification income tests channelled migration toward higher-skill economic flows that adjust labour supply more flexibly.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Core mechanism — pre-arrival civic-integration tests and higher income thresholds reduced family-migration inflow.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced low-skill migration intensified competition for services-sector labour, indirectly raising market efficiency pressures.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Stricter qualifying conditions and shorter benefit windows for new arrivals lowered welfare-roll growth.

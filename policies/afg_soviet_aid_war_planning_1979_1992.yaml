# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: afg_soviet_aid_war_planning_1979_1992
status: candidate
title: Soviet-Aid State Planning and War Economy
countries:
- AFG
timeframe:
  start: 1979
  end: 1992
description: After Soviet intervention, the PDPA state relied on Soviet finance, advisers, military supplies, administered prices, state enterprises, and public employment to sustain a wartime governing economy. Resource allocation increasingly served regime survival, security forces, urban provisioning, and plan-linked public-sector activity.
enacted_by:
- afg_pdpa_saur_socialist_state_1978
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: Soviet-backed military and public-sector spending became central to the state economy.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: State enterprises, administered prices, and war procurement crowded out normal competitive allocation.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Monetary and credit policy were subordinated to fiscal, planning, and war-finance needs.
references:
- Barnett R. Rubin (2002), The Fragmentation of Afghanistan
- Olivier Roy (1990), Islam and Resistance in Afghanistan

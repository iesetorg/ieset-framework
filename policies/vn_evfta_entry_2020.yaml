policy_id: vn_evfta_entry_2020
status: candidate
title: EU-Vietnam Free Trade Agreement (EVFTA) entry 2020
countries:
- VNM
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-08-01'
description: 'EVFTA entered into force on 1 August 2020 after National Assembly ratification on 8 June 2020 (457 of 457 delegates voting yes) and European Parliament consent on 12 February 2020. Eliminates
  ~71% of EU tariffs on Vietnamese exports at entry and phases out ~99% over 7-10 years; Vietnam eliminates ~65% on EU exports at entry, ~99% over 10 years. Paired with an Investment Protection Agreement
  (EVIPA, separate ratification track) providing investor-state dispute settlement via a standing tribunal. EVFTA includes the first- generation EU chapters on labour rights, environment, SOE discipline
  and public procurement binding Vietnam. Together with CPTPP, the two high-standard FTAs anchor Trọng-era trade-integration doctrine.

  '

policy_id: nicaragua_1988_stabilisation
status: candidate
title: Nicaragua 1988 Stabilisation
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'In February 1988 the Sandinista government issued a sweeping currency reform and stabilisation package to confront hyperinflation, replacing the córdoba with a new córdoba (1000:1), unifying
  the multiple exchange-rate regime, and devaluing sharply. A second adjustment in mid-1988 added wage- and price-control changes and fiscal restraint, but the war with the Contras and continuing US trade
  embargo undermined the disinflation effort and inflation accelerated to four-figure rates by 1989.

  '

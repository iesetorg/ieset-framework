  direction: '-'
  magnitude: weak
  intended: true
  rationale: Emergency exchange controls and import-licensing reactivation accompanied the devaluation episodes.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Devaluation, default declaration and emergency controls were imposed by executive action with limited oversight.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Capital controls and conversion restrictions impaired protection of foreign-currency claims and deposits.
- axis: fiscal.sectoral_subsidy

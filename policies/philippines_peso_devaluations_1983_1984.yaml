policy_id: philippines_peso_devaluations_1983_1984
status: candidate
title: Philippines Peso Devaluations 1983 1984
countries:
- PHL
timeframe:
  start: 1965
  end: 1986
description: 'Sequence of large peso devaluations executed by the Central Bank of the Philippines in 1983 and 1984 amid the debt crisis triggered by the Aquino assassination, capital flight, and external-debt
  moratorium. The peso lost roughly half its dollar value across the episode, fuelling inflation, collapsing real incomes, and forcing the Marcos government into the 1984 IMF Stand-By and a deep contractionary
  adjustment.

  '

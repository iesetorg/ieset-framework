title: Greece Third Economic Adjustment Programme (Third Memorandum) 2015
countries:
- GRC
timeframe:
  start: 2015
  end: 2018
  enacted_date: '2015-08-19'
description: 'Third Economic Adjustment Programme for Greece signed 19 August 2015 via the European Stability Mechanism (ESM Financial Assistance Facility Agreement), €86bn envelope over three years. Preceded
  by the 5 July 2015 referendum in which 61.3% voted ''Oxi'' (No) to the Eurogroup proposals, bank closure and capital controls from 28 June, and the 13 July 2015 Euro Summit agreement under which PM Tsipras
  accepted harsher terms than the rejected package. Prior-actions omnibus passed as Law 4336/2015 (14 August 2015) including VAT harmonisation (23% standard rate extended to restaurants, hotels raised to
  13% then later), pension cuts (early-retirement thresholds tightened, supplementary-pension freeze), primary-surplus target trajectory culminating at 3.5% of GDP 2018-2022, automatic spending cuts if
  targets missed, privatisation fund restructured as Hellenic Corporation of Assets and Participations (HCAP, Law 4389/2016), household primary- residence protection narrowed, bank recapitalisation via
  HFSF €25bn under ESM direct lending, legislative timetable for product-market reforms (OECD toolkit III). Greece exited the programme 20 August 2018 into post-programme enhanced surveillance.

  '

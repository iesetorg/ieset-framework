description: 'Klimatlagen (SFS 2017:720) entering force 1 January 2018, establishing the statutory framework for Swedish climate policy with a net-zero target by 2045 and binding intermediate targets for
  2030 and 2040. Created Klimatpolitiska rådet (Climate Policy Council) as independent assessor, and required annual climate-plan reports from government.


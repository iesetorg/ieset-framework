timeframe:
  start: 2007
  end: ongoing
description: 'Regulation (EC) No 1272/2008 (the CLP Regulation) implemented the UN Globally Harmonised System of Classification and Labelling within the EU, replacing earlier substance and preparation directives
  with a single regime requiring suppliers to classify hazards, label packaging, and notify the C&L Inventory at the European Chemicals Agency. CLP operates alongside REACH as the principal hazard-communication
  layer of the EU chemicals regime.

  '
enacted_by:
- eu_reach_chemicals_2007
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory hazard classification and labelling tighten chemicals safety obligations across the EU.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Suppliers must register classifications with ECHA and meet labelling rules to place products on market.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Compliance and reformulation costs scale with product breadth, disadvantaging smaller producers.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Importers must restate hazard classifications to EU CLP standards even when GHS-compliant elsewhere.

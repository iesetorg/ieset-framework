policy_id: th_energy_price_caps_2023_2024
status: candidate
title: Thailand energy price caps — electricity, diesel, LPG (2023-2024)
countries:
- THA
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-09-13'
description: 'Cabinet-approved price caps on electricity, diesel, and LPG announced 13 September 2023 as one of the first decisions of the Srettha government. Household electricity Ft (fuel tariff adjustment)
  held down by directive to EGAT and distribution utilities (MEA, PEA); retail diesel capped at 30 baht per litre via excise-tax cut and the Oil Fund buffering; LPG household-cylinder price held at 423
  baht / 15kg cylinder. Arrangements extended in tranches through 2024 at fiscal cost to the Oil Fund (in persistent deficit during the period) and to EGAT''s accumulated receivables.

  '

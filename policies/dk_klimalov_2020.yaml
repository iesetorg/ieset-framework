policy_id: dk_klimalov_2020
status: candidate
title: Danish Climate Act 2020 (Klimaloven — 70% by 2030)
countries:
- DNK
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-06-26'
description: 'Lov nr. 965 af 26. juni 2020 binds Denmark to reduce greenhouse-gas emissions by 70% by 2030 relative to 1990 and to reach climate neutrality by 2050, with biennial climate programmes, an
  advisory Klimaråd, and a statutory requirement that each climate minister table action plans to close the projected gap. Operationalised through sector agreements on transport, industry (CO2-afgift 2022-2023),
  energy, and agriculture, and a 2020 decision to end new oil and gas licensing rounds in the Danish North Sea with a 2050 production cut-off.

  '

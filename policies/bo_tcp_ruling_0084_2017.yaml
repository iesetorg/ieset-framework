title: TCP Ruling 0084/2017 authorising indefinite re-election
countries:
- BOL
timeframe:
  start: 2017
  enacted_date: '2017-11-28'
description: 'Plurinational Constitutional Tribunal ruling of November 28, 2017 declaring that term-limit provisions in the 2009 Constitution and Electoral Regime Law were inapplicable to Evo Morales because
  they violated his political rights under the American Convention on Human Rights Article 23. The ruling effectively overturned the February 2016 referendum result and cleared Morales to run for a fourth
  consecutive term in 2019. Widely criticised by Venice Commission and IACHR jurisprudence (subsequent 2021 opinion OC-28/21 rejected the human-rights framing of term limits).

  '

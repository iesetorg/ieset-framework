description: 'Cumulative COVID emergency fiscal package enacted through a sequence of decreti-legge under Conte II: Cura Italia (DL 18/2020, March 2020, ~€25bn); Decreto Liquidità (DL 23/2020, April 2020,
  state guarantees on bank lending up to €400bn envelope); Decreto Rilancio (DL 34/2020, May 2020, ~€55bn including Superbonus); Decreto Agosto (~€25bn); Decreto Ristori quartet (October-November 2020,
  ~€20bn); 2021 continuation (Decreto Sostegni March 2021, ~€32bn; Decreto Sostegni-bis May 2021, ~€40bn). Additional deficit relative to pre-COVID baseline exceeded €180bn 2020-2021. Key instruments: Cassa
  Integrazione Guadagni extension to all employees (not just industrial), one-off bonuses for self-employed (€600 then €1,000), moratorium on evictions, tax-payment deferrals, SME credit guarantees through
  Fondo di Garanzia and SACE. EU Stability Pact general escape clause activated March 2020; deficit rose from 1.5% (2019) to 9.5% (2020), debt/GDP from 134.1% to 154.9%. Institutional innovation: heavy
  use of DPCM (Decreto del Presidente del Consiglio dei Ministri) and decreti-legge created later Constitutional Court review on powers balance.

  '

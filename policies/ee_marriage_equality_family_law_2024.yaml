policy_id: ee_marriage_equality_family_law_2024
status: candidate
title: Estonia marriage-equality and family-law amendments 2024
countries:
- EST
timeframe:
  start: 2024
  end: ongoing
description: 'Estonia amended family-law legislation so that two adults may marry regardless of sex from 2024, while also updating registered-partnership and parentage rules. The reform converted an incomplete
  partnership framework into equal marriage access and clarified the family-law status, inheritance, and parental rights of same-sex couples.

  '
enacted_by:
- estonia_kallas_michal_reform_coalition_2021_present
scope: national
coalition_label_at_enactment: Kallas Reform Party-led coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Equal access to civil marriage and clearer partnership implementation strengthened equal treatment before family law.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Marriage and parentage recognition improved inheritance, property, and family-status security for affected households.
references:
- Estonia Family Law Act and related implementing amendments adopted by the Riigikogu in 2023, effective 2024
- Estonian government and Riigikogu materials on marriage equality and registered-partnership implementation

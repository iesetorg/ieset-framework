- eu_green_deal_2020
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory ESRS disclosures expose climate, biodiversity, and pollution impacts to capital markets.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Issuers must obtain assured ESRS-compliant reports as a condition of regulatory and listing compliance.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reporting fixed costs and assurance fees disadvantage smaller listed and in-scope firms.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-EU groups with significant EU turnover are pulled into ESRS reporting and assurance regime.

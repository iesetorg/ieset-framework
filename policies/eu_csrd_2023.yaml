description: 'Directive (EU) 2022/2464 — the Corporate Sustainability Reporting Directive (CSRD) — replaces and expands the 2014 NFRD, requiring large EU companies and listed SMEs (and qualifying non-EU
  groups) to publish detailed sustainability disclosures aligned with European Sustainability Reporting Standards (ESRS) drafted by EFRAG. Reports cover double-materiality, climate transition plans, workforce,
  and value-chain impacts, subject to mandatory third-party limited assurance.

  '

policy_id: uk_nhs_internal_market_1990
status: candidate
title: UK NHS internal market (NHS and Community Care Act 1990)
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
  enacted_date: '1990-06-29'
description: 'NHS and Community Care Act 1990, following 1989 ''Working for Patients'' white paper, introduced a purchaser/provider split in the NHS. District Health Authorities became purchasers; NHS Trusts
  became semi-autonomous providers; GP fundholding introduced April 1991. Created quasi-market disciplines without privatising delivery. Labour abolished the formal internal market in 1997 but retained
  many architectural elements.

  '
enacted_by:
- uk_thatcher_third_term_1987_1990
coalition_label_at_enactment: Conservative (Thatcher III)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Purchaser/provider split introduced competition proxies into tax-financed healthcare.
- axis: fiscal.spending_level
  direction: '0'
  rationale: Administrative restructuring rather than spending-share change.

policy_id: jp_kan_tohoku_reconstruction_supplementary_budgets_2011
status: candidate
title: Kan Tohoku Reconstruction Supplementary Budgets 2011
countries:
- JPN
timeframe:
  start: 2010
  end: 2011
description: 'Following the March 2011 Tōhoku earthquake, tsunami and Fukushima Daiichi disaster, the Kan cabinet enacted three supplementary budgets and a special-account reconstruction framework totalling
  tens of trillions of yen for relief, infrastructure rebuilding and TEPCO support. Funding was raised through reconstruction bonds, asset sales and special income/corporate tax surcharges legislated to
  amortise the package over the following decades.

  '

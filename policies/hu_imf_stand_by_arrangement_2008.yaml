policy_id: hu_imf_stand_by_arrangement_2008
status: candidate
title: EU/IMF/World Bank stand-by arrangement and Bajnai adjustment package (Hungary, 2008-2010)
countries:
- HUN
timeframe:
  start: 2008
  end: 2010
  enacted_date: '2008-11-06'
description: 'International rescue package agreed 28 October 2008 and approved by the IMF Board 6 November 2008 — the first IMF stand-by arrangement in an EU member state after the euro-area sovereign-debt
  stress began. Combined €20bn envelope: IMF Stand-By Arrangement of €12.5bn (SDR 10.5bn, exceptional access ~1,015% of quota), EU balance-of- payments facility €6.5bn, and World Bank €1bn. Triggered by
  Hungary''s exposure to FX-denominated household and corporate debt (~60% of household mortgages in Swiss franc), collapsing forint, and funding difficulties at major banks. Conditionality included deficit
  reduction to 3.8% of GDP in 2009, freeze of the 13th-month pension and public- sector wage, public-sector wage-bill cuts, VAT increase from 20% to 25% (from 1 July 2009), PIT rate cuts paired with base
  broadening, corporate tax cut from 20% to 19%, and labour-market measures. Bajnai government delivered the adjustment April 2009–May 2010; deficit closed to 4.6% of GDP in 2009 and 4.5% in 2010. Fidesz
  government in 2010 exited the arrangement before full disbursement, repaying early and shifting onto heterodox financing (bank levy, pension-fund nationalisation).

  '
enacted_by:

policy_id: ca_corporate_tax_cut_22_to_15_2007_2012
status: candidate
title: Canada — Federal general corporate income tax reduction (2007-2012)
countries:
- CAN
timeframe:
  start: 2007
  end: 2012
  enacted_date: '2007-10-30'
description: 'Through the 2007 Economic Statement and Budget 2008, the Harper government legislated a pre-scheduled reduction in the federal general corporate income tax rate from 22.12% (including the
  1.12% corporate surtax eliminated in 2008) down a fixed annual path to 15% effective 1 January 2012: 19.5% in 2008, 19% in 2009, 18% in 2010, 16.5% in 2011, 15% in 2012. Provincial combined rates put
  the typical all-in Canadian corporate rate in the low-to-mid twenties — among the lower rates in the G7 and below the US federal rate at the time (35% until TCJA 2017). Stated rationale was competitiveness
  and investment incentive. Revenue cost estimated by Finance Canada in the range of C$6-7B/year at full phase-in relative to the 2006 baseline.

  '

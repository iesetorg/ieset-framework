policy_id: es_constitutional_amendment_art_135_2011
status: candidate
title: Constitutional Amendment Art 135 2011
countries:
- ESP
timeframe:
  start: 2008
  end: 2011
description: 'An expedited September 2011 PSOE-PP amendment rewrote Article 135 of the Spanish Constitution to enshrine budgetary stability, give debt-service "absolute priority" in payment, and require
  primary-balance and debt-ceiling rules consistent with EU treaties. Parliament passed the amendment in roughly two weeks at the height of the eurozone crisis without a referendum.

  '
enacted_by:
- spain_zapatero_ii_psoe_2008_2011
axes_moved:
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Constitutional debt-service priority compressed primary spending while protecting interest payments.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Hard fiscal-rule ceilings made discretionary transfer expansion legally harder to sustain.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The amendment internalised eurozone fiscal-discipline frameworks, tightening market-facing rules.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Fiscal-rule pressure drove subsequent labour reforms aimed at internal devaluation.

policy_id: uk_local_authority_planning_discretion
status: candidate
title: Local Authority Planning Discretion
countries:
- GBR
timeframe:
  start: 1990
  end: ongoing
description: 'The discretionary case-by-case grant of planning permission by local authorities under the Town and Country Planning Act framework, where development proposals are evaluated against local
  plans by planning committees of elected councillors with broad discretion. The system contrasts with rule-based zoning regimes and concentrates approval authority in politically responsive bodies subject
  to neighbourhood objections, materially constraining UK housing supply elasticity.

  '
enacted_by:
- uk_planning_restriction_regime
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Discretionary committee grants under TCPA framework constitute a sectoral licensing regime for development.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary uncertainty raises sunk costs that disproportionately exclude smaller housebuilders.

description: 'President Ghulam Ishaq Khan dismissed PM Benazir Bhutto government 6 Aug 1990 under Article 58(2)(b) (inserted by 8th Constitutional Amendment 1985) citing corruption and maladministration.
  First of four civilian-government dismissals under 8th Amendment (Bhutto 1990, Sharif 1993, Bhutto 1996, Sharif 1999 non-8th-Amendment coup). Established presidential-military tutelary power that shaped
  1990s Pakistan politics.

  '

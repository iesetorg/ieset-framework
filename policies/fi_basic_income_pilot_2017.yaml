policy_id: fi_basic_income_pilot_2017
status: candidate
title: Basic Income Pilot 2017
countries:
- FIN
timeframe:
  start: 2015
  end: 2019
description: 'Finland''s basic-income pilot, launched 1 January 2017 by the Sipilä centrist government under Act 1528/2016 and run by Kela, paid €560 per month tax-free to 2,000 randomly selected unemployed
  individuals aged 25-58 for two years, replacing existing means-tested benefits. The randomised design aimed to test labour-supply, well-being and bureaucratic-burden effects. The intended effect was to
  gather rigorous evidence on whether unconditional cash could improve activation and reduce administrative friction in the Nordic welfare model.

  '
enacted_by:
- finland_sipila_centrist_2015_2019
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pilot was a small-scale, time-limited substitution for existing benefits, with negligible aggregate spending change.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pilot replaced rather than added to transfers; modest reduction in conditionality at the margin.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing benefit withdrawal cliffs lowered effective marginal taxes and frictions for participants.
- axis: fiscal.tax_corporate

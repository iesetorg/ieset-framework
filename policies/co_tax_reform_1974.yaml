description: 'Emergency-powers tax reform under Art 122 state of economic emergency. Integrated corporate and personal taxation to eliminate double taxation, broadened the base (agriculture brought in via
  presumptive income), strengthened wealth tax, introduced indexation, and modernised enforcement. Revenue gain ~2.5% GDP. Considered the most comprehensive Colombian tax reform before the 1990 Gaviria
  reform.

  '

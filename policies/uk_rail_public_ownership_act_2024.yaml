policy_id: uk_rail_public_ownership_act_2024
status: candidate
title: UK Passenger Railway Services (Public Ownership) Act 2024
countries:
- GBR
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-11-28'
description: 'Received Royal Assent 28 November 2024. Requires passenger rail services in England, Wales and Scotland to be operated by publicly-owned operators as existing franchise contracts expire (2025-2027),
  ending the 30-year private franchising model established by the Railways Act 1993. Transition managed by the Department for Transport''s Operator of Last Resort; subsequent Railways Bill 2025 establishes
  Great British Railways (GBR) as the integrated ''guiding mind'' operator-infrastructure body. Precedes broader rail nationalisation programme.

  '
enacted_by:
- uk_starmer_labour_2024_present
coalition_label_at_enactment: Labour majority (Starmer)
axes_moved:

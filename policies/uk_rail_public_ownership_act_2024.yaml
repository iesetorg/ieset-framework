  intended: true
  rationale: Eliminates private-operator franchising regime; state becomes sole operator class for passenger rail.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Removes operator-level competitive tendering in passenger rail.

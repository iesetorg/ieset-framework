policy_id: tz_eacop_construction_continuation
status: candidate
title: Tanzania EACOP construction continuation
countries:
- TZA
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-02-01'
description: 'Tanzania continued host-government support for the East African Crude Oil Pipeline after the 2022 final investment decision for the Lake Albert oil development and cross-border export pipeline.
  The policy maintained land, permitting, tax, and right-of-way support for a strategic petroleum corridor from Uganda to the Tanzanian coast, tying Tanzania''s infrastructure policy to regional hydrocarbon
  export capacity.

  '

policy_id: kr_park_thaad_deployment_2016
status: candidate
title: Park Thaad Deployment 2016
countries:
- KOR
timeframe:
  start: 2013
  end: 2017
description: 'In July 2016 the Park Geun-hye administration formally agreed to deploy a US Terminal High Altitude Area Defense (THAAD) battery at Seongju, citing the North Korean missile threat. Beijing
  responded with informal "THAAD retaliation" measures targeting Korean tourism, entertainment exports and Lotte Group''s China operations, materially affecting bilateral economic flows and re-pricing the
  geopolitical risk premium for Korean firms in China.

  '

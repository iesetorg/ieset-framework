policy_id: uk_tax_credits_wftc_ctc_1999_2003
status: candidate
title: Tax Credits Wftc Ctc 1999 2003
countries:
- GBR
timeframe:
  start: 1997
  end: 2005
description: 'The Working Families'' Tax Credit (introduced October 1999, replacing Family Credit) and Children''s Tax Credit (introduced April 2001), and the unified Child Tax Credit / Working Tax Credit
  framework under the Tax Credits Act 2002 — implemented from April 2003 — together built the New Labour in-work support architecture. Refundable through HMRC, with means-tested taper and child-element
  components. The intended effect was to "make work pay" at the bottom of the earnings distribution, raise lone-parent labour-force participation, and progress toward the March 1999 Blair commitment to
  abolish child poverty within a generation.

  '
enacted_by:
- uk_blair_first_second_term_1997_2005
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme operated alongside the Bank of England Act 1998 inflation-targeting regime.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Means-tested taper introduced an effective marginal tax wedge mildly distorting work incentives.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: WFTC and CTC together became a multi-billion-pound annual transfer to working families.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Refundable element scored as expenditure-side outlay raised the spending ratio.

description: 'Royal decree (September 2017, effective June 2018) ended the decades-long prohibition on women driving, integrated into the broader guardian-system liberalisation under Vision 2030. Part of
  package that also expanded female employment across retail, hospitality and government, contributing to female labour-force participation rising from ~17% (2016) to ~35% (2023). Preceded detention of
  the very women''s-rights activists who had campaigned for the change.

  '

policy_id: vn_gfc_stimulus_package_2009
status: candidate
title: Vietnam global-financial-crisis stimulus 2009
countries:
- VNM
timeframe:
  start: 2009
  end: 2010
description: 'Response to the 2008-09 global financial crisis combined a fiscal package announced by PM Dũng in December 2008 of roughly US$8bn (about 8% of GDP on an expansion basis), anchored on a 4%
  interest- rate subsidy scheme for working-capital loans, VAT and corporate- income-tax deferrals, and state infrastructure acceleration. State Bank of Vietnam cut the policy rate from 14% to 7% and allowed
  aggregate credit growth of ~37.5% in 2009. The package supported a 2009 GDP-growth outcome of 5.4% but re-ignited inflation (peaking above 23% in mid-2008 and again ~19% in 2011), asset-price overheating
  in property and equities, and the VND exchange-rate pressure that required successive 2010-2011 devaluations.

  '

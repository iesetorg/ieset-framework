policy_id: cr_army_abolition_1948
status: candidate
title: Costa Rica army abolition 1948
countries: [CRI]
timeframe: {start: 1948, end: ongoing}
description: >
  Costa Rica abolished its standing army after the 1948 civil war, embedding
  demilitarisation in the 1949 constitution. The policy redirected state
  capacity toward civilian administration, education, and social services and
  became a core institution of the Second Republic.
enacted_by:
  - costa_rica_second_republic_welfare_democracy_1948_1978
axes_moved:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, intended: true, rationale: "Military spending fell structurally, while civilian public-service spending expanded."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, intended: true, rationale: "Civilian constitutional control replaced standing military intervention risk."}
references:
  - "Costa Rica Constitution of 1949"
  - "Booth (2008), Costa Rica: Quest for Democracy"

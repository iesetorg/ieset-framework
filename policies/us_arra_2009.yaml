title: Arra 2009
countries:
- USA
timeframe:
  start: 2009
  end: 2012
description: 'The American Recovery and Reinvestment Act of 2009 (Pub. L. 111-5) authorized roughly $787 billion (later revised to ~$831 billion) in tax cuts, transfer expansions, state aid, and direct
  federal spending on infrastructure, education, health IT, and clean-energy programs. Enacted in the trough of the financial crisis, ARRA combined demand-side fiscal stimulus with targeted industrial-policy
  outlays, and is the largest discretionary U.S. countercyclical fiscal package since the New Deal.

  '

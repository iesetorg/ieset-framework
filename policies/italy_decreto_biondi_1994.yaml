description: 'D.L. 13 July 1994 n. 440 (Justice Minister Alfredo Biondi, FI) sought to restrict pre-trial detention (custodia cautelare) for corruption, fraud and tax offences. Interpreted by Mani Pulite
  magistrates as blocking Tangentopoli prosecutions. Intense public/magistracy opposition; Lega Nord withdrew support; decree not converted and effectively withdrawn. Early signal of Berlusconismo-judiciary
  conflict.

  '

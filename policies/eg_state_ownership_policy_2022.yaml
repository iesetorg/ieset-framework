policy_id: eg_state_ownership_policy_2022
status: candidate
title: State Ownership Policy 2022
countries:
- EGY
timeframe:
  start: 2018
  end: 2024
description: 'Issued in late 2022 alongside the IMF EFF, Egypt''s State Ownership Policy classified sectors into "exit," "stay neutral," and "remain/expand" categories, committing to private participation
  in over 30 sectors and full state withdrawal from agriculture, dairy, and selected manufacturing. Implementation rested on the Sovereign Fund of Egypt as divestment vehicle and remained slower than IMF
  benchmarks anticipated.

  '

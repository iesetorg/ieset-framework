policy_id: italy_bank_privatisations_1993_1994
status: candidate
title: Italy bank privatisations 1993-1994
countries:
- ITA
timeframe:
  start: 1993
  end: 1994
description: 'Following Amato Law 218/1990 converting IRI banking assets into SpA, first major privatisations proceeded: Credito Italiano December 1993 (IPO ~LIT1,800bn), Banca Commerciale Italiana February
  1994 (IPO ~LIT2,900bn), IMI November 1994, INA November 1994 (banca- assicurazione). Marked the transition from IRI-mediated state banking to private capital-market-listed banking.

  '
enacted_by:
- italy_tangentopoli_transition_1992_1994
coalition_label_at_enactment: Mixed — Amato then Ciampi
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Ended IRI state ownership of major banks; introduced foreign competition.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  rationale: Concurrent Testo Unico Bancario 1993 modernised prudential framework ('-' on our axis is 'more deregulation' per semantics — actually '+' direction is competition-friendly; here the privatisation
    increased competitive market structure without weakening prudential rules).

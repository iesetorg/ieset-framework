policy_id: de_fluechtlingspolitik_wir_schaffen_das_2015
status: candidate
title: 2015 refugee intake and integration framework ('Wir schaffen das')
countries:
- DEU
timeframe:
  start: 2015
  end: 2017
  enacted_date: '2015-09-04'
description: 'Decision not to close the German border to asylum-seekers transiting the Balkan route in late summer 2015, resulting in approximately 890,000 asylum applications in 2015 and a further ~720,000
  in 2016. Subsequent legislative response: Asylpaket I (Oct 2015), Asylpaket II (Mar 2016) and Integrationsgesetz (Aug 2016) combining expanded processing capacity, safe-country-of-origin expansions, accelerated
  deportation of rejected claims, and labour-market access + integration- course requirements for recognised refugees. Defining political event of the Merkel third term; identified by most observers as
  the primary catalyst for AfD''s 2017 Bundestag entry.

  '
enacted_by:
- germany_merkel_broad_2005_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: De facto open-border posture during peak 2015-16 flow; recognition-rate spike.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Bund-Länder settlement increased federal transfers to Länder for integration and housing.
references:
- Asylpaket I (Asylverfahrensbeschleunigungsgesetz, 2015)
- Asylpaket II (2016)
- Integrationsgesetz (BGBl. I 2016, 1939)

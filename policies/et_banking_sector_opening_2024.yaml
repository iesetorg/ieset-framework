policy_id: et_banking_sector_opening_2024
status: candidate
title: Banking sector opening to foreign entrants
countries:
- ETH
timeframe:
  start: 2024
  enacted_date: '2024-12-17'
description: 'Banking Business Proclamation No. 1360/2024, ratified by the House of Peoples'' Representatives Dec 17 2024, permits foreign banks to operate in Ethiopia via subsidiaries, branches, or representative
  offices, and raises the foreign-ownership cap in Ethiopian banks to 49%. Ends a 50-year closure of the banking sector that had been a core plank of EPRDF developmental-state policy; complements telecoms
  opening and FX liberalisation under the IMF EFF.

  '
enacted_by:
- ethiopia_abiy_prosperity_2018_present
coalition_label_at_enactment: Prosperity Party
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: strong
  rationale: Foreign bank entry permitted after five-decade closure.
  intended: true
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  rationale: Removed nationality restriction on banking licences.
  intended: true
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Enables entry competition against incumbent state and private domestic banks.
  intended: true
references:
- Federal Negarit Gazeta, Banking Business Proclamation 1360/2024
- National Bank of Ethiopia (2024), press release on banking proclamation

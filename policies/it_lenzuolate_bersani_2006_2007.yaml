policy_id: it_lenzuolate_bersani_2006_2007
status: candidate
title: Italy Bersani liberalisation decrees ('lenzuolate')
countries:
- ITA
timeframe:
  start: 2006
  end: 2007
  enacted_date: '2006-07-04'
description: 'Three decree-laws by Economic Development Minister Pier Luigi Bersani under the Prodi II government — D.L. 223/2006 (4 July 2006), D.L. 7/2007 (Jan 2007) and D.L. 73/2007 (Jun 2007) — collectively
  known as the ''lenzuolate'' (''bed-sheets'' for their breadth). Measures included: abolition of minimum fees for lawyers and accountants, relaxation of pharmacy-opening rules permitting non-prescription
  drug sales in supermarkets, taxi-licence liberalisation (ultimately partly watered down), free bank-account switching, ban on early-termination penalties on mobile phone / broadband contracts, insurance-broker
  exclusive-dealing bans, and barber/hairdresser opening-hour deregulation.

  '
enacted_by:
- italy_prodi_ii_centre_left_2006_2008

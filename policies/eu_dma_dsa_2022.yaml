description: 'Twin regulatory stack governing the largest online platforms. DMA (Regulation 2022/1925, effective 2 May 2023, with six designated gatekeepers from September 2023: Alphabet, Amazon, Apple,
  ByteDance, Meta, Microsoft; later Booking) imposes ex-ante obligations on core platform services: interoperability mandates, self-preferencing bans, data-portability requirements, anti-tying rules. DSA
  (Regulation 2022/2065, fully applicable 17 February 2024) imposes content- moderation, algorithmic-transparency, and systemic-risk-audit obligations on Very Large Online Platforms and Search Engines.
  Penalty ceilings: 10% of global turnover (DMA) and 6% (DSA). Framework codes this as mixed-direction on product-market competition: the interoperability and anti-self-preferencing rules are pro-entrant
  if enforced as designed, while compliance-cost fixed-costs and gatekeeper-designation thresholds raise barriers elsewhere.'

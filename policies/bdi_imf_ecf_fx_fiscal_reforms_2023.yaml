policy_id: bdi_imf_ecf_fx_fiscal_reforms_2023
status: candidate
title: Burundi IMF-supported foreign-exchange and fiscal reforms 2023
countries:
- BDI
timeframe:
  start: 2023
  end: ongoing
description: 'Burundi entered an IMF-supported Extended Credit Facility reform programme in 2023 after years of reserve losses, foreign-exchange shortages, high inflation, and debt stress. The programme
  backs fiscal consolidation, revenue mobilisation, public-financial-management improvements, steps toward exchange-rate unification and foreign-exchange market functioning, and measures to restore
  monetary and external stability.

  '
enacted_by:
- burundi_ndayishimiye_recovery_reform_state_2020_present
scope: national
coalition_label_at_enactment: CNDD-FDD Ndayishimiye government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The ECF framework targets deficit reduction, stronger revenue collection, expenditure control, and arrears management.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Exchange-market reform and tighter monetary management reduce reliance on administrative foreign-exchange rationing and fiscal dominance.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-financial-management and governance benchmarks increase auditability of budget and foreign-exchange operations.
references:
- IMF, Burundi 2025 Article IV Consultation and reviews under the Extended Credit Facility.
- IMF, Burundi Extended Credit Facility approval and programme materials, 2023.

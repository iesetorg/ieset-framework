policy_id: bo_imf_rfi_cancellation_2020
status: candidate
title: Arce government return of Áñez-era IMF RFI loan (2021)
countries:
- BOL
timeframe:
  start: 2021
  enacted_date: '2021-02-17'
description: 'Incoming Arce government returned the USD 327m IMF Rapid Financing Instrument contracted by the Áñez administration in April 2020, paying USD 351.5m including accrued interest and commissions.
  The government argued the loan had not obtained required Legislative Assembly authorisation and therefore was unconstitutional, and framed the return as sovereignty-protecting. Technical effect was a
  reduction of BCB net reserves at precisely the point external buffers were needed.

  '

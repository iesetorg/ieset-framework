policy_id: ph_rice_tariffication_2019
status: candidate
title: Rice Tariffication Act (RA 11203)
countries:
- PHL
timeframe:
  start: 2019
  enacted_date: '2019-02-14'
description: 'Replaced the National Food Authority''s quantitative restriction monopoly on rice imports with a 35% tariff (for ASEAN-origin rice; 50% MFN bound) allowing private-sector importation under
  SPS licensing. Signed 14 February 2019, effective 5 March 2019. Closed a long-standing WTO quantitative restriction that the Philippines had been required to eliminate since 2017. Created the Rice Competitiveness
  Enhancement Fund (RCEF), earmarking the first ₱10bn of annual tariff revenue for farm mechanisation (PhilMech), certified-seed distribution (PhilRice), credit (Landbank/DBP) and extension (ATI) over six
  years. NFA stripped of regulatory powers and retained only as a buffer-stock agency. Initial impact: domestic rice retail prices fell 6-12% within twelve months, farmgate palay prices fell sharply in
  2019 triggering political backlash and subsidy top-ups.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban-led supermajority
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  rationale: Conversion of a long-standing QR monopoly into a bound 35% tariff substantially liberalised rice trade, the most protected agricultural commodity.
  intended: true
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Private importers and millers entered a sector previously gatekept by NFA allocation; entry barriers fell materially.
  intended: true
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  rationale: RCEF earmarked ₱10bn/yr in tariff revenue to domestic rice-sector productivity investments (offset to liberalisation).
  intended: true
references:
- Republic Act No. 11203 (Rice Tariffication Act), 14 February 2019
- World Bank, 'Transforming Philippine Agriculture', 2020

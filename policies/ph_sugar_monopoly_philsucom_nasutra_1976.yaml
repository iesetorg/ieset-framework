description: 'Philippine Sugar Commission (PHILSUCOM) established PD 1971 May 1976 and National Sugar Trading Corporation (NASUTRA) created 1977 as sole exporter of Philippine sugar, under Roberto Benedicto.
  Paid producers far below export prices, diverting rent to Benedicto- controlled accounts and Republic Planters Bank. Negros collapse 1984-1986 famine followed loss of US sugar quota. PCGG sequestered
  1986.

  '

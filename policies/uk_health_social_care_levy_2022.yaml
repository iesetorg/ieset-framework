policy_id: uk_health_social_care_levy_2022
status: candidate
title: UK Health and Social Care Levy 2022
countries:
- GBR
timeframe:
  start: 2022
  end: 2022
  enacted_date: '2022-04-06'
description: 'A 1.25 percentage point rise in Class 1, 1A, 1B and Class 4 National Insurance Contributions from 6 April 2022, together with a matching 1.25pp dividend tax rise, intended from April 2023
  to become a hypothecated ''Health and Social Care Levy'' raising ~£12-13bn/year for NHS backlog clearance and a new adult social-care cap (£86,000 lifetime limit on personal care costs). The NI rise took
  effect 6 April 2022; it was reversed by the Truss/Kwarteng mini-budget 23 September 2022 and the reversal stood under Sunak. Social-care cap was delayed to October 2025 and ultimately abandoned.

  '
enacted_by:
- uk_johnson_conservative_2019_2022
coalition_label_at_enactment: Conservative majority (Johnson)
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: false
  rationale: NI base is regressive relative to income tax (flat rate above threshold, excluded pensioners/landlords).
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Earmarked ~£12-13bn/year for NHS and social care during its short life.

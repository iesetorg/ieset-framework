policy_id: dk_folkeskolereform_2013
status: candidate
title: Folkeskolereform 2013 — Danish public-school reform + teacher-lockout working-time settlement
countries:
- DNK
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2013-12-26'
description: 'Lov nr. 1640 af 26. december 2013 lengthened the Danish public-school (folkeskole) day, increased compulsory instruction hours, embedded physical-activity and ''understøttende undervisning''
  time, and tightened national educational objectives. Preceded by a four-week nationwide teacher lockout (April 2013) that ended via statutory intervention (Lov nr. 409 af 26. april 2013) replacing the
  collective agreement on teacher working time with a regime giving school management more flexibility to allocate preparation vs instruction hours. Politically framed as educational modernisation; union-side
  framed as a forced re-regulation of working time.

  '
enacted_by:
- denmark_thorning_socdem_2011_2015
coalition_label_at_enactment: Socialdemokratiet + Radikale Venstre + SF with Venstre and Dansk Folkeparti support
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Lov 409 replaced agreement-based teacher working-time rules with a management-flexibility regime.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Longer school day increased staffing and facility-utilisation cost net of reallocation.
references:

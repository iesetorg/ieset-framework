- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Blanket fuel subsidy replaced with means-tested cash transfer; annual saving ~RM4bn on diesel alone.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Budi Madani cash subsidy RM200/month targets qualifying individuals via PADU database.

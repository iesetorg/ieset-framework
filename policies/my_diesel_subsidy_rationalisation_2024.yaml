policy_id: my_diesel_subsidy_rationalisation_2024
status: candidate
title: Diesel subsidy rationalisation — Peninsular Malaysia (Jun 2024)
countries:
- MYS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-06-10'
description: 'From 10 June 2024 the Anwar government ended blanket retail diesel subsidy in Peninsular Malaysia: pump price for unsubsidised users rose from RM2.15 to RM3.35/litre (float to managed float
  near market). Targeted access preserved via Budi Madani cash subsidy of RM200/month for eligible private-vehicle owners, fleet cards for qualifying logistics/agriculture, and preserved price for Sabah/Sarawak.
  Annual subsidy bill projected to fall RM4bn. First major fuel-subsidy reform since 2014 managed-float under Najib. RON95 petrol subsidy reform — larger and more politically sensitive — remained pending
  into 2025-26.

  '
enacted_by:
- malaysia_anwar_unity_2022_present
coalition_label_at_enactment: Pakatan Harapan + Barisan Nasional Unity Government

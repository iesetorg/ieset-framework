policy_id: botswana_sustainable_budget_index_1994
status: candidate
title: Botswana Sustainable Budget Index 1994
countries:
- BWA
timeframe:
  start: 1966
  end: ongoing
description: 'The Sustainable Budget Index (SBI), introduced in Botswana''s 1994 budget framework, is a fiscal rule that requires recurrent (consumption) spending to be fully covered by non-mineral revenue,
  restricting mineral revenues to investment in physical and human capital. Operationalised through Ministry of Finance budget guidelines and the National Development Plans, it disciplines current spending
  against transient resource rents and is a key institutional pillar of Botswana''s escape from the resource curse.

  '

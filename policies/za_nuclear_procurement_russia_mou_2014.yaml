title: Russian Nuclear Procurement MOU (South Africa, 2014)
countries:
- ZAF
timeframe:
  start: 2014
  end: 2017
  enacted_date: '2014-09-22'
description: 'The Zuma administration signed a bilateral nuclear-cooperation MOU with Russia (Rosatom) in September 2014 for a proposed 9.6GW fleet of nuclear reactors. Earthlife Africa and SAFCEI challenged
  the procurement in court; the Western Cape High Court set aside the intergovernmental agreements and Section 34 determinations in April 2017 as unconstitutional and unlawful. The episode is treated by
  the Zondo Commission as emblematic of state-capture-era procurement irregularities.

  '

policy_id: ar_griesa_pari_passu_default_2014
status: candidate
title: Argentina Griesa pari passu selective default
countries:
- ARG
timeframe:
  start: 2014
  enacted_date: '2014-07-30'
description: 'SDNY Judge Thomas Griesa''s pari passu ruling (Feb 2012, affirmed 2d Cir Oct 2012, SCOTUS cert denied 16 Jun 2014) required Argentina to pay holdout creditors (NML Capital et al) pro rata
  with restructured-bond holders. Argentina refused + deposited BNY Mellon trustee payment blocked; entered selective default 30 Jul 2014. BNY Mellon unable to distribute funds. Default resolved Apr 2016
  under Macri via Ley 27.249 settlement paying holdouts ~USD 9.3bn.

  '
enacted_by:
- argentina_cfk_pj_2007_2015
coalition_label_at_enactment: FPV

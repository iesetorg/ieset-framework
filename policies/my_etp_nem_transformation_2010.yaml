policy_id: my_etp_nem_transformation_2010
status: candidate
title: Etp Nem Transformation 2010
countries:
- MYS
timeframe:
  start: 2009
  end: 2018
description: 'Najib''s New Economic Model (NEM) and Economic Transformation Programme (ETP), unveiled in March and October 2010, defined the framework for moving Malaysia to high-income status by 2020 through
  12 National Key Economic Areas, market-friendly reforms, and gradual rollback of Bumiputera quotas. It was operationalised through PEMANDU''s delivery-unit model with KPI-driven sector roadmaps in oil
  & gas, palm oil, financial services, electronics, and Greater Kuala Lumpur infrastructure.

  '
enacted_by:
- malaysia_najib_bn_2009_2018
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: NEM proposed broadening the tax base via consumption taxation (later GST 2015), shifting incidence away from progressive income taxes.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: ETP paired structural reform with BR1M cash-transfer expansion to compensate lower-income households for subsidy unwinds.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: NEM committed to phased subsidy rationalisation across fuel, electricity, and selected commodities.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: PEMANDU bypassed traditional ministerial accountability, and ETP-era governance failures (1MDB) eroded institutional checks.

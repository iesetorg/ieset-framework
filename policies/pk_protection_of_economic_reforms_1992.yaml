title: Pakistan Protection of Economic Reforms Act 1992
countries:
- PAK
timeframe:
  start: 1992
  enacted_date: '1992-07-17'
description: 'Protection of Economic Reforms Act 1992 signed 17 Jul 1992 granted foreign-currency account holders property-rights guarantees (including right to transfer funds abroad) and committed future
  governments not to reverse economic reforms. Drove large repatriation of Pakistani expatriate savings into foreign-currency accounts; later controversial when foreign-currency accounts were frozen in
  May 1998 during nuclear-test sanctions period.

  '

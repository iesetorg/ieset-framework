policy_id: pe_bono_universal_covid_2020
status: candidate
title: Bono Universal Covid 2020
countries:
- PER
timeframe:
  start: 2018
  end: 2020
description: 'Bono Universal Familiar, an emergency cash-transfer programme launched by the Vizcarra government in 2020 to mitigate the household-income shock from Peru''s COVID-19 lockdown. Delivered through
  MIDIS using SISFOH targeting expanded to roughly universal coverage of vulnerable households, with payments intended to sustain consumption during the most stringent quarantine in Latin America. The programme
  scaled up the country''s transfer infrastructure beyond Juntos and Pension 65.

  '

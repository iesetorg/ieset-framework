policy_id: egypt_trade_tariff_reform_2004
status: candidate
title: Egypt Trade Tariff Reform 2004
countries:
- EGY
timeframe:
  start: 1991
  end: 2011
description: 'In September 2004 the Nazif government slashed average customs tariffs from roughly 14% to 9%, cut tariff bands from 27 to 6, and eliminated 12% of nuisance fees and inspection charges via
  Presidential Decree 300/2004. The reform aligned Egypt''s external regime with WTO commitments and the EU Association Agreement, and was a precursor to the QIZ protocol with Israel and the US.

  '

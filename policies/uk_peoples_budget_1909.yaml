# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: uk_peoples_budget_1909
status: candidate
title: People's Budget 1909-1910
countries: [GBR]
timeframe:
  start: 1909
  end: 1910
  enacted_date: "1910-04-29"
description: >
  David Lloyd George's People's Budget proposed and then secured a major expansion
  of direct taxation to fund social reform and naval expenditure, including higher
  super-tax rates on top incomes, stronger death duties, and new land-value taxation.
  Beyond its fiscal content, the budget triggered a constitutional confrontation with
  the House of Lords and helped normalize the idea that welfare-state expansion should
  be financed by explicitly progressive national taxation rather than relying mainly on
  tariffs or flat indirect levies.
enacted_by:
  - uk_new_liberalism_1906_1914
axes_moved:
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The budget raised top-end direct-tax burdens and used progressive taxation to finance new state functions."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "It financed a larger state footprint and made that expansion fiscally durable."
references:
  - "Finance (1909-10) Act 1910"
  - "Daunton (2002), Just Taxes"

policy_id: canada_martin_fiscal_consolidation_1995
status: candidate
title: Canada — Paul Martin Fiscal Consolidation 1995-1998
countries:
- CAN
timeframe:
  start: 1995
  end: 1998
  enacted_date: '1995-02-27'
description: 'Finance Minister Paul Martin''s 1995 budget launched Canada''s fiscal turnaround. Federal program spending cut ~19% in real terms over three years (from 16.8% of GDP to 11.3%). Measures: civil-service
  downsizing (45k positions), Canada Health and Social Transfer block grant replacing cost-sharing (reducing federal health transfer to provinces), Crown-corporation privatisations (CN Rail 1995, NAV CANADA
  1996), unemployment insurance → Employment Insurance reform with reduced benefit duration + stricter eligibility, Canada Pension Plan sustainability reform 1997 (higher contributions, CPP Investment Board
  established). Federal debt-to-GDP ratio peaked around 68% in 1995-96 and fell below 30% by 2008. Canonical developed-country fiscal consolidation success.

  '

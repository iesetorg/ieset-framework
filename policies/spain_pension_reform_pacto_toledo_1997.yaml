description: 'Implementing the 1995 Pacto de Toledo cross-party accord, Ley 24/1997 de Consolidación y Racionalización del Sistema de Seguridad Social raised contribution years used for pension base calculation
  from 8 to 15 (phased), introduced graduated accrual, tightened early- retirement access. First major Spanish pension consolidation; model for later 2011 and 2013 reforms.

  '

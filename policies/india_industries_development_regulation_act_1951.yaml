policy_id: india_industries_development_regulation_act_1951
status: candidate
title: India Industries Development Regulation Act 1951
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'The Industries (Development and Regulation) Act 1951 (IDRA) gave the Union government the statutory power to license new industrial undertakings, expansions, and product introductions across
  scheduled industries, and to investigate or take over mismanaged units. Together with the IPR 1956, IDRA was the legal foundation for India''s industrial-licensing system, requiring central approval for
  nearly all manufacturing investment.

  '
enacted_by:
- india_swadeshi_economic_nationalism_pre_1991
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutorily required central licensing for new and expanded industrial investments.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Domestic licensing dovetailed with import-substitution tariffs and FX rationing to insulate firms.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Required state administrative apparatus and PSU expansion to fill licensed-but-unfilled segments.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bound bank credit to industrial-licence approvals through priority-sector norms.

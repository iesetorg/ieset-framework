title: Expropriation Act (South Africa, 2025)
countries:
- ZAF
timeframe:
  start: 2025
  enacted_date: '2025-01-23'
description: 'President Ramaphosa signed the Expropriation Act on 23 January 2025, replacing the 1975 apartheid-era statute and setting a procedural framework for expropriation of property in the public
  interest with just and equitable compensation. The Act permits nil-compensation in limited and narrowly circumscribed circumstances (e.g. abandoned land, purely speculative holdings, state-held land)
  subject to judicial oversight. The DA, now inside the GNU coalition, filed a legal challenge.

  '

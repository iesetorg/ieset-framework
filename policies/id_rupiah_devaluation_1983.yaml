policy_id: id_rupiah_devaluation_1983
status: candidate
title: Rupiah devaluation March 1983 (Indonesia)
countries:
- IDN
timeframe:
  start: 1983
  end: 1983
  enacted_date: '1983-03-30'
description: 'Bank Indonesia devalued the rupiah by 27.6% on 30 Mar 1983 (Rp702/USD to Rp970/USD — effective adjustment from managed basket), ahead of the oil-price-decline impact. Part of a wider stabilisation
  package that suspended several large state-enterprise projects (including Krakatau and some Habibie-era high-tech projects) and opened Paket-Juni banking deregulation.

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Competitiveness restoration ahead of oil-price decline.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: State-enterprise project suspensions accompanying devaluation.

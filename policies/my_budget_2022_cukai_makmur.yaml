policy_id: my_budget_2022_cukai_makmur
status: candidate
title: Budget 2022 + Cukai Makmur prosperity tax (Malaysia, 2022)
countries:
- MYS
timeframe:
  start: 2022
  end: 2022
  enacted_date: '2021-10-29'
description: 'RM332.5bn Belanjawan 2022 — largest in Malaysian history at the time — tabled 29 Oct 2021 by Finance Minister Tengku Zafrul under Ismail Sabri''s UMNO-BN caretaker government; ~5.8%-of-GDP
  deficit. Headline revenue measure: Cukai Makmur (''prosperity tax''), a one-off 33% corporate income tax rate on chargeable profits above RM100m for Year of Assessment 2022 only (24% below the threshold),
  raising ~RM3-4bn. Other measures: extension of wage-subsidy programmes, Bantuan Keluarga Malaysia RM8bn cash envelope, removal of foreign-source-income tax exemption (subsequently deferred for individuals),
  and reopening fiscal support across aviation and tourism. Primary criticism from business community and credit analysts: ad-hoc one-off tax signalled tax-policy instability.

  '

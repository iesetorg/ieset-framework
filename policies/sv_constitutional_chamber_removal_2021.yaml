policy_id: sv_constitutional_chamber_removal_2021
status: candidate
title: Overnight removal of Constitutional Chamber magistrates and Attorney General (1 May 2021)
countries:
- SLV
timeframe:
  start: 2021
  end: 2021
  enacted_date: '2021-05-01'
description: 'On 1 May 2021, the first day of the newly seated Legislative Assembly — which Nuevas Ideas had won 56/84 in the Feb 28 2021 mid-term — the supermajority voted in a single session to remove
  the five magistrates of the Sala de lo Constitucional of the Supreme Court (Carlos Sánchez, Aldo Cáder, Marina Marenco, Carlos Avilés, Óscar Pineda) and the Attorney General Raúl Melara, installing replacement
  appointees aligned with the executive. The procedural grounds invoked (Article 186 of the Constitution) are contested by OAS, European Union, and US State Department statements as violating the two-thirds
  supermajority and substantive-cause requirements. The replacement Constitutional Chamber issued the 3 Sep 2021 Sentencia 1-2021 authorising presidential re-election despite Articles 152 and 248 bans (see
  sv_sentencia_reeleccion_2021).

  '

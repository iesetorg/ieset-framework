description: 'Technical Committee on Privatisation and Commercialisation (TCPC) from 1988 under Hamza Zayyad restructured 111 enterprises — 55 fully privatised (cement, hotels, insurance, vehicle assembly),
  the rest commercialised. Pipeline paused under Abacha and resumed as BPE under Obasanjo 1999. Proceeds modest (~$400m), but the programme established the Nigerian privatisation template.

  '

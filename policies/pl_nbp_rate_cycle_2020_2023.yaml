policy_id: pl_nbp_rate_cycle_2020_2023
status: candidate
title: Nbp Rate Cycle 2020 2023
countries:
- POL
timeframe:
  start: 2017
  end: 2023
description: 'Narodowy Bank Polski (NBP) interest-rate cycle from the COVID rate cuts of March 2020, through delayed tightening starting October 2021, the late-2022 peak at 6.75 percent, and the politically
  controversial September–October 2023 cuts ahead of the parliamentary election. Conducted under Governor Adam Glapiński, the cycle drew criticism from the European Central Bank and IMF and shaped Poland''s
  disinflation path through 2023–2024.

  '

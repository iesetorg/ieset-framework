title: CICIES termination — end of OAS anti-corruption agreement (Jun 2021)
countries:
- SLV
timeframe:
  start: 2021
  end: 2021
  enacted_date: '2021-06-04'
description: 'On 4 Jun 2021, the Bukele government terminated the Comisión Internacional Contra la Impunidad en El Salvador (CICIES), the anti-corruption agreement signed Sep 2019 with the Organization
  of American States and modelled on CICIG Guatemala. The trigger was CICIES''s 2021 investigation into pandemic-procurement irregularities and alleged misuse of public funds by officials in the Bukele
  administration; the government cited the appointment of a former FMLN lawyer to OAS staff roles as its reason for unilateral termination. CICIES had been producing active case files on at least 12 government
  officials; those files transferred to the Fiscalía General — which, following the 1 May 2021 removal of Attorney General Melara, no longer pursued them. Human rights and anti-corruption observers (WOLA,
  Transparency International) mark the termination as a significant institutional-quality regression.

  '

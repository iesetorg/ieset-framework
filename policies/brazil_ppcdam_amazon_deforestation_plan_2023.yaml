title: Brazil PPCDAm Amazon Deforestation Action Plan 2023
countries:
- BRA
timeframe:
  start: 2023
  end: 2027
  enacted_date: '2023-06-05'
description: 'The Lula third-term government relaunched the Action Plan for Prevention and Control of Deforestation in the Legal Amazon (PPCDAm) for 2023-2027. The plan restored an interministerial enforcement
  architecture combining IBAMA and ICMBio inspections, embargoes, environmental fines, protected-area and land-management actions, illegal-mining and logging controls, and credit and supply-chain measures
  aimed at reducing illegal deforestation.

  '

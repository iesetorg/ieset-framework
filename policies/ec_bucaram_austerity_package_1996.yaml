title: Bucaram austerity shock package (late 1996)
countries:
- ECU
timeframe:
  start: 1996
  end: 1997
description: 'Weeks after inauguration on 10 August 1996, Abdalá Bucaram''s government — advised informally by Argentine economist Domingo Cavallo — announced sharp subsidy cuts: electricity tariffs +245%,
  gasoline +80%, cooking-gas subsidy partially removed, water and telephone adjustments. Contradicted campaign promise to support "la fuerza de los pobres." Inflation spiked; public outrage built through
  January 1997, triggering Paro Cívico Nacional February 1997.

  '

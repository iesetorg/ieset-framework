policy_id: ee_motor_vehicle_tax_2025
status: candidate
title: Estonia motor vehicle tax 2025
countries:
- EST
timeframe:
  start: 2025
  end: ongoing
description: 'Estonia introduced a motor vehicle tax from 2025, combining an annual tax liability for registered vehicles with a registration fee for first registration or ownership changes. The tax base
  uses vehicle attributes such as emissions, mass, age, and engine type, creating a new recurring charge on car ownership while steering households and firms toward lower-emission vehicles.

  '
enacted_by:
- estonia_kallas_michal_reform_coalition_2021_present
scope: national
coalition_label_at_enactment: Reform Party-led coalition
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: Emissions- and vehicle-characteristics-based charges increase the regulatory cost of higher-emitting vehicles.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The new revenue source was part of a broader fiscal-repair package intended to narrow the deficit path.

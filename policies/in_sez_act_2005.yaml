policy_id: in_sez_act_2005
status: candidate
title: India Special Economic Zones Act 2005
countries:
- IND
timeframe:
  start: 2005
  end: 2005
  enacted_date: '2005-06-23'
description: 'SEZ Act enacted 23 June 2005, effective February 2006, replaced earlier 2000 EOU/EPZ policy framework. Created enclave-based duty-free manufacturing and services zones with 15-year income-
  tax holiday (100% for first 5 years, 50% for next 10), customs and excise exemptions, single-window clearance, simplified labour law enforcement. Drafted under Vajpayee NDA (2000 policy) and enacted under
  UPA-I. By March 2012 ~143 operational SEZs; exports from SEZs grew from Rs 22k crore (2005-06) to Rs 3.15 lakh crore (2011-12). Later restricted under 2011 Minimum Alternate Tax on SEZs.

  '

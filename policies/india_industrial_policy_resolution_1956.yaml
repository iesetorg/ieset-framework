policy_id: india_industrial_policy_resolution_1956
status: candidate
title: India Industrial Policy Resolution 1956
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'The Industrial Policy Resolution 1956 codified the "socialist pattern of society" framework, classifying industries into three schedules: Schedule A reserved for the public sector (heavy industry,
  atomic energy, defence, rail), Schedule B for state-led with private participation, and Schedule C open to the private sector under licensing. The IPR 1956 became the organising blueprint for India''s
  licence-permit-quota raj until 1991.

  '
enacted_by:
- india_swadeshi_economic_nationalism_pre_1991
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Created the three-schedule sectoral-reservation system at the heart of industrial licensing.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Insulated reserved sectors from FDI/imports through tariffs, quotas, and FERA-style controls.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandated extensive public-sector industrial expenditure under the "commanding heights" doctrine.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Aligned credit allocation with planned-investment priorities through directed-credit norms.

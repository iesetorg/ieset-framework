description: 'Ley 1607 de 2012 (26 Dec 2012) reduced statutory corporate rate 33% → 25% while creating CREE (Impuesto sobre la Renta para la Equidad) at 9% with earmark for SENA, ICBF, health — partially
  replacing payroll contributions to these agencies (13.5% payroll-tax cut). Aim: formalisation via lower hiring cost + broader corporate-base revenue. CREE later integrated into corporate rate (Ley 1819/2016).

  '

policy_id: ir_jcpoa_nuclear_deal_2015
status: candidate
title: Joint Comprehensive Plan of Action (Iran nuclear deal)
countries:
- IRN
timeframe:
  start: 2015
  end: 2018
  enacted_date: '2015-07-14'
description: 'Multilateral agreement between Iran and P5+1 (US, UK, France, Russia, China, Germany) plus EU, signed in Vienna 14 Jul 2015 and endorsed by UNSCR 2231. Iran capped uranium enrichment at 3.67%,
  reduced LEU stockpile to 300 kg, mothballed two-thirds of centrifuges, and accepted expanded IAEA Additional Protocol inspections. In exchange, UN nuclear-related sanctions, EU oil and banking sanctions,
  and US secondary sanctions were suspended on implementation day 16 Jan 2016, unfreezing ~$100bn in blocked assets, reopening oil exports (rising to ~2.5m bpd by 2017), and restoring SWIFT access for major
  Iranian banks. US withdrew from the agreement 8 May 2018 and reimposed secondary sanctions in two tranches (Aug and Nov 2018).

  '

description: 'Workplace Relations Amendment (Work Choices) Act 2005 assented 14 December 2005; operative 27 March 2006. Used corporations power to create national IR system covering 85% of private-sector
  employees. Expanded Australian Workplace Agreements (AWAs), removed no- disadvantage test, exempted businesses <100 employees from unfair- dismissal protection. Triggered ACTU ''Your Rights at Work''
  campaign; repealed 2009 by Rudd Labor Fair Work Act.


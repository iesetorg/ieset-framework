policy_id: in_right_to_information_act_2005
status: candidate
title: India Right to Information Act 2005
countries:
- IND
timeframe:
  start: 2005
  end: 2005
  enacted_date: '2005-10-12'
description: 'Right to Information Act enacted 15 June 2005, effective 12 October 2005. Created statutory right of Indian citizens to request information from public authorities (central, state, local);
  30-day response mandate; Central and State Information Commissions as appellate bodies. Covered all public authorities receiving government funding including NGOs. Built on Tamil Nadu (1997) and Rajasthan
  (2000) state-level precursors, the Supreme Court''s 1982 S.P. Gupta judgment, and Mazdoor Kisan Shakti Sangathan (MKSS) jan sunwai public-hearing movement from 1994. 2019 amendment weakened Information
  Commissioner autonomy.

  '
enacted_by:
- india_manmohan_singh_upa_i_2004_2009
coalition_label_at_enactment: INC-led UPA-I
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong

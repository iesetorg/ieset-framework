description: 'After the September 2021 coup, Guinea''s CNRD authorities issued a transition charter defining interim institutions, the role of the transition president, the National Transitional Council, transitional
  executive authority, and a process for drafting a new constitution and returning to constitutional order. It replaced the elected constitutional framework during the transition period.

  '

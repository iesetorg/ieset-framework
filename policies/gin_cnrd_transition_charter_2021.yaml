  intended: true
  rationale: The charter created formal interim institutions and a constitutional timetable while suspending elected constitutional authority.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Executive transition authorities held overriding power over the interim constitutional order.
references:

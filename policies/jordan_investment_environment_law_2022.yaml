description: 'Jordan enacted Investment Environment Law No. 21 of 2022 to consolidate and update the investor regime supporting the Economic Modernisation Vision. The law reorganised investment services,
  incentives, and investor guarantees around a more unified investment environment, aiming to reduce administrative friction and improve foreign and domestic investor treatment.

  '

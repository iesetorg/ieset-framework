policy_id: jp_2050_carbon_neutral_pledge_2020
status: candidate
title: Japan — 2050 net-zero pledge and 2030 -46% target (2020)
countries:
- JPN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-10-26'
description: 'Prime Minister Suga''s policy speech to the 203rd extraordinary session of the Diet on 26 October 2020 committing Japan to net-zero greenhouse gas emissions by 2050, upgrading the prior Abe-era
  80%-by-2050 framing to a formal carbon-neutral target. The pledge was followed in April 2021 by an interim 2030 target of a 46% emissions cut from 2013 levels (with a stretch 50% ambition), replacing
  the previous 26% target. Codified in the 2021 revision to the Act on Promotion of Global Warming Countermeasures. The trajectory was operationalised through METI''s Green Growth Strategy (December 2020)
  and the Sixth Strategic Energy Plan (October 2021).

  '
enacted_by:
- japan_suga_ldp_2020_2021
coalition_label_at_enactment: LDP-Komeito (Suga administration)
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: Formal 2050 net-zero plus 2030 -46% target raises the de jure emissions trajectory relative to prior 80%-by-2050 framing.
- axis: regulatory.energy_supply_security
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Trajectory is technology-neutral and includes nuclear restart + hydrogen + CCS, so supply-security effect is ambiguous at pledge stage.
references:

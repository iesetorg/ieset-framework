description: 'Loi n° 2015-990 du 6 août 2015. Expanded permitted Sunday and evening retail opening in designated tourist zones, liberalised intercity coach services (creating the "cars Macron" market),
  partially deregulated regulated professions (notaires, huissiers) via tariff reform and increased entry, reformed Prud''hommes labour-court procedure, and simplified plans de sauvegarde de l''emploi.
  Enacted via Article 49.3.

  '

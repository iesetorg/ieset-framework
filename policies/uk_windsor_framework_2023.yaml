policy_id: uk_windsor_framework_2023
status: candidate
title: UK-EU Windsor Framework 2023
countries:
- GBR
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-02-27'
description: 'Announced 27 February 2023 by Prime Minister Sunak and Commission President von der Leyen, the Windsor Framework amended the Northern Ireland Protocol: created green/red lane customs channels
  at GB-NI ports (green lane for goods staying in NI), addressed VAT and excise differentials, Stormont Brake giving NI Assembly mechanism to object to new EU single-market rules applying in NI, and resolved
  medicines-regulation divergence. Largely ended the 2021-2023 institutional stand-off on NI Protocol and restored routine UK-EU working, though DUP remained outside the Executive until January 2024.

  '

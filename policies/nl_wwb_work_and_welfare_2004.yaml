description: 'Law of 9 October 2003 (Wet Werk en Bijstand), effective 1 January 2004, replaced the 1965 Algemene Bijstandswet. Devolved welfare administration to municipalities with block-grant funding
  (retaining savings from lower caseloads); strengthened work-first activation conditionality; tightened means-testing. Part of Balkenende welfare- reform package.

  '

title: Korea Comprehensive Real Estate Holding Tax (Jonghap Budongsan-se, 2005)
countries:
- KOR
timeframe:
  start: 2005
  end: 2008
  enacted_date: '2005-08-31'
description: 'Comprehensive Real Estate Holding Tax (종합부동산세) introduced 31 August 2005 as a central-government tax targeting multi- property owners and owners of high-value single properties. Two brackets:
  housing valued above KRW 900m (later lowered to 600m), and multi-parcel landholders. Rates 1-3% on assessed value. Intended to cool Seoul-metropolitan real-estate boom via holding-cost escalation. Paired
  with transaction-tax and capital-gains tightening for multi-home owners (~60% effective rate for 3-plus-home owners). Scope partially rolled back 2008 under Lee Myung-bak as Constitutional Court ruled
  household- aggregated assessment unconstitutional.

  '

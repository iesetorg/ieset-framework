title: Italy ICI primary-residence property-tax abolition (2008)
countries:
- ITA
timeframe:
  start: 2008
  end: 2012
  enacted_date: '2008-05-27'
description: 'Abolition of the Imposta Comunale sugli Immobili (ICI) on primary residences legislated via D.L. 93/2008 (27 May 2008) by the Berlusconi IV government — a flagship PdL-Lega Nord campaign promise.
  Cost to municipalities ~€3bn/year in lost revenue, partially compensated by state transfers. Reversed in essence by the Monti-era IMU (2011) which reinstated property taxation including primary residences;
  IMU on primary residences then abolished again under Letta/Renzi (2013-2014).

  '

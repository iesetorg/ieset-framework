policy_id: bo_arce_fuel_subsidy_maintenance_2020
status: candidate
title: Arce universal fuel-subsidy maintenance (Bolivia, 2020-)
countries:
- BOL
timeframe:
  start: 2020
  end: ongoing
description: 'Continuation of Bolivia''s universal fuel subsidy regime — pump prices for gasoline, diesel, and LPG frozen since 2005 at roughly half international prices — as an explicit political commitment
  of the Arce administration after the 2010 "gasolinazo" precedent taught the MAS that subsidy removal was politically lethal. By 2023-2024 subsidy cost reached roughly USD 2-3 billion per year and required
  hard-currency imports of refined fuel that YPFB struggled to obtain as reserves depleted, producing recurring pump queues and shortages through 2024.

  '
enacted_by:
- bolivia_arce_mas_2020_present
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: Universal fuel price subsidy sustained at rising fiscal and FX cost.
  intended: true
references:
- YPFB annual reports 2020-2024
- Fundación Jubileo analyses of subsidy fiscal cost

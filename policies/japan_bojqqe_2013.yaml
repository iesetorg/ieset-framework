title: Japan Bojqqe 2013
countries:
- JPN
timeframe:
  start: 2012
  end: 2020
description: 'Bank of Japan Quantitative and Qualitative Easing (QQE), launched April 2013 under Governor Kuroda as the monetary first arrow of Abenomics, committed the BOJ to doubling the monetary base
  via large-scale JGB purchases and ETF/J-REIT acquisitions to achieve a 2% price stability target. The programme was extended with negative rates (2016) and yield-curve control, marking a regime break
  from prior incremental easing toward an open-ended commitment to reflate the Japanese economy.

  '

title: Ley 100 de 1993 — Colombian pensions and health reform
countries:
- COL
timeframe:
  start: 1993
  enacted_date: '1993-12-23'
description: 'Ley 100 of 23 December 1993. Pension system reformed into a mixed two-pillar structure: Régimen de Prima Media (RPM, public PAYG via Colpensiones) and Régimen de Ahorro Individual con Solidaridad
  (RAIS, individual-account AFPs). Health system reformed into Sistema General de Seguridad Social en Salud (SGSSS) with EPS (private insurers), IPS (providers), and Regime Contributivo / Subsidiado covering
  contributors and non-contributors. Universalised coverage over subsequent two decades; heavily influenced by Chilean AFP and Colombian Fedesarrollo inputs.

  '

policy_id: se_nuclear_new_build_framework_2023
status: candidate
title: Swedish nuclear new-build framework and credit guarantees (2023-2024)
countries:
- SWE
timeframe:
  start: 2023
  end: ongoing
description: 'Legislative and regulatory framework enabling new nuclear reactor construction, reversing the pre-2022 phase-out posture. Includes removal of the two-reactor cap (from 1 January 2024), permission
  for new sites beyond the three historical locations, and a credit-guarantee financing model (Finansieringsmodell för ny kärnkraft) providing state loan guarantees up to 400 billion SEK. Target: 2500 MW
  new capacity by 2035 and major expansion by 2045.

  '
enacted_by:
- sweden_kristersson_rightbloc_2022_present
coalition_label_at_enactment: M + KD + L cabinet with SD support

policy_id: mexico_solidaridad_program
status: candidate
title: Mexico Solidaridad Program
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Programa Nacional de Solidaridad (PRONASOL), launched by Salinas in December 1988, channelled federal funds to community-level infrastructure, basic services, and anti-poverty programmes through
  community committees that proposed and matched investments. Largely financed from privatisation receipts, it provided a politically visible counterweight to the structural-adjustment package while preceding
  the later Progresa/Oportunidades cash-transfer regime.

  '

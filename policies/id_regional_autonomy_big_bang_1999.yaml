policy_id: id_regional_autonomy_big_bang_1999
status: candidate
title: Indonesia Regional Autonomy 'Big Bang' (Laws 22/1999 and 25/1999)
countries:
- IDN
timeframe:
  start: 1999
  end: 2001
  enacted_date: '1999-05-07'
description: 'Law 22/1999 on Regional Government and Law 25/1999 on Fiscal Balance between Centre and Regions enacted 7 May 1999, effective 1 January 2001. Devolved most administrative and fiscal powers
  to district (kabupaten/kota) rather than provincial level — skipping the province to reduce secession risk. Districts gained authority over ~11 sectors including education, health, agriculture, public
  works. Fiscal equalisation via General Allocation Fund (DAU, ~25% of domestic revenues) plus natural- resource revenue sharing. Proportion of government spending at sub-national level rose from 17% (2000)
  to 30%+ (2003). Largest single-step decentralisation reform of a large state in the modern period.

  '
enacted_by:
- indonesia_habibie_transition_1998_1999
coalition_label_at_enactment: Golkar successor / Habibie transition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Scale of devolution unprecedented; reorganised fiscal and administrative authority across ~400 districts.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: false
  rationale: Sub-national spending share rose ~13 ppts; aggregate general-government share also rose slightly.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: DAU equalisation formula smoothed district fiscal capacity.
references:
- Law 22/1999 on Regional Government
- Law 25/1999 on Fiscal Balance between Centre and Regions
- Lewis (2003), 'Local Government Borrowing and Repayment in Indonesia'

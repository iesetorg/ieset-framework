description: 'Decree-law 1/2012 (''Cresci Italia'') under the Monti government: liberalisation across petrol-station retailing, professional-services minimum tariffs (lawyers, notaries, architects), pharmacy
  licensing expansion (+5,000 new pharmacies), insurance-contract transparency, separation of Snam from Eni (gas-sector unbundling), and launch of the Authority for Transport Regulation. Complemented by
  ''Semplifica Italia'' (D.L. 5/2012) administrative-simplification measures.

  '

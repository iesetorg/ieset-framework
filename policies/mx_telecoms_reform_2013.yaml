policy_id: mx_telecoms_reform_2013
status: candidate
title: Mexican telecoms reform and creation of IFT (2013)
countries:
- MEX
timeframe:
  start: 2013
  end: 2014
  enacted_date: '2013-06-11'
description: 'Constitutional reform (DOF 11-jun-2013) creating the Instituto Federal de Telecomunicaciones (IFT) as an autonomous constitutional regulator, with power to declare "preponderant" economic
  agents in telecoms and broadcasting and to impose asymmetric obligations on them. Secondary law (Ley Federal de Telecomunicaciones y Radiodifusión, 2014) forced Telmex / América Móvil and Televisa to
  share infrastructure, eliminated long- distance charges, and opened new TV concessions.

  '

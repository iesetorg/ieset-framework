policy_id: th_ptt_partial_privatisation_2001
status: candidate
title: Thailand PTT partial privatisation (2001)
countries:
- THA
timeframe:
  start: 2001
  end: 2001
  enacted_date: '2001-10-01'
description: 'Petroleum Authority of Thailand corporatised under State Enterprise Corporatisation Act 1999 and listed on Stock Exchange of Thailand on 1 October 2001 (ticker: PTT). IPO of 25% stake raised
  ~Bt 32.3bn — largest Thai IPO to date. Government retained ~68% stake. Under "Master Plan for State Enterprise Reform" 1998 developed by Chuan II; executed under early Thaksin government (January 2001
  inauguration). Later PEA (electricity) and TOT (telecoms) privatisations stalled post-2003; PTT remained the flagship successful Thai privatisation. Administrative-court challenge to PTT corporatisation
  settled 2007 on partial asset-restoration.

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
- thailand_thaksin_trt_2001_2006
coalition_label_at_enactment: Democrat / Thai Rak Thai transition
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Corporatisation reduced state-ministerial control; SET listing imposed disclosure regime.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Partial listing introduced capital-market discipline; full competition limited by retained 68% state stake.
references:

status: candidate
title: Move Forward Dissolution 2024
countries:
- THA
timeframe:
  start: 2024
  end: ongoing
description: 'In August 2024 Thailand''s Constitutional Court dissolved the Move Forward Party — the popular-vote winner of the 2023 election — and barred its executive committee for 10 years for proposing
  to amend the lese-majeste law. The ruling reshaped parliament during the early Paetongtarn Pheu Thai government and demonstrated the continuing weight of judicial review over political competition, with
  consequences for policy continuity and investor confidence.

  '

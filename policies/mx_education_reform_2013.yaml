policy_id: mx_education_reform_2013
status: candidate
title: Mexican education reform — INEE and teacher-service law (2013)
countries:
- MEX
timeframe:
  start: 2013
  end: 2019
  enacted_date: '2013-02-26'
description: 'Constitutional reform (DOF 26-feb-2013) granting autonomous status to the Instituto Nacional para la Evaluación de la Educación (INEE) and creating the Servicio Profesional Docente (LGSPD,
  2013) which introduced standardised teacher entry, promotion and evaluation across basic and upper-secondary education. Aimed to reduce union control of teacher appointments (SNTE / CNTE) and to condition
  tenure on performance evaluation. Repealed and replaced by AMLO''s reform of May 2019.

  '

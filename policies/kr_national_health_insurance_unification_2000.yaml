policy_id: kr_national_health_insurance_unification_2000
status: candidate
title: Korea National Health Insurance unification (2000)
countries:
- KOR
timeframe:
  start: 2000
  end: 2003
  enacted_date: '2000-07-01'
description: 'National Health Insurance Act enacted 1999, effective 1 July 2000, merging 139 separate occupational and regional health- insurance societies into a single-payer National Health Insurance
  Corporation (NHIC). Self-employed and rural regional pools (Medical Insurance Management Corporation) had been structurally underfunded under earlier multi-pool regime; unification cross-subsidised rural/self-employed
  from urban wage-earner pools. Financial integration completed July 2003 after transition. By 2003 covered ~97% of population (remaining via Medical Aid for very poor). Replaced Bismarckian multi-pool
  architecture with British-style single-payer while retaining private-provider delivery.

  '
enacted_by:
- skorea_kim_dae_jung_ds_1998_2003
coalition_label_at_enactment: NCNP / MDP
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Single-payer unification cross-subsidised rural/self-employed from wage-earner pools.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: false
  rationale: 139 insurance societies consolidated into single NHIC regulator-payer.
references:

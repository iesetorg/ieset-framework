description: 'Bono de Desarrollo Humano cash-transfer (created 2003) expanded under Correa I: monthly benefit raised from USD 15 (2006) to USD 30 (2007) to USD 50 (2013), coverage ~1.2m households + ~600k
  elderly + disabled beneficiaries, Crédito de Desarrollo Humano micro-credit facility (2007), conditionalities on school + health attendance. Largest single cash- transfer programme in Ecuador; ~1% GDP
  budget.

  '

policy_id: us_base_broadening_1986
status: candidate
title: Base Broadening 1986
countries:
- USA
timeframe:
  start: 1981
  end: 1986
description: 'The base-broadening pillar of the Tax Reform Act of 1986 (Pub. L. 99-514) eliminated or curtailed numerous deductions, credits, and shelters — including investment tax credit repeal, passive-loss
  limitations, and tighter depreciation rules — to fund sharply lower statutory rates while keeping the package roughly revenue-neutral. The reform compressed individual brackets to two main rates, cut
  the top corporate rate from 46% to 34%, and is the canonical reference for revenue-neutral base-broadening rate-cutting reform.

  '

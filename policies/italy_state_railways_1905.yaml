policy_id: italy_state_railways_1905
status: candidate
title: Italy State Railways nationalisation 1905
countries: [ITA]
timeframe:
  start: 1905
  end: 1905
  enacted_date: "1905-04-22"
description: >
  Law no. 137 of 22 April 1905 approved state operation of the main
  railway networks not left to private concessionaires and launched the
  Ferrovie dello Stato from 1 July 1905. The Giolittian state took over a
  strategic infrastructure system that private operators had underinvested
  in and made railway management a central national administrative task.
  The reform was important both economically and institutionally: it tied
  industrial modernisation to public control of transport and marked one
  of liberal Italy's clearest decisions to place a key network industry
  under direct state operation.
enacted_by:
  - italy_giolittian_liberal_reformism_1901_1914
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Rail operation moved under a state-run network with public control over routes, tariffs, and management."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "The reform replaced fragmented private-network management with direct state operation of the core system."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The Treasury accepted larger direct capital and operating responsibilities for a strategic transport network."
references:
  - "Legge 22 aprile 1905, n. 137, che approva i provvedimenti per l'esercizio di Stato delle ferrovie"
  - "Britannica, Italy transportation and telecommunications"

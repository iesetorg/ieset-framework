policy_id: kr_park_japan_comfort_women_agreement_2015
status: candidate
title: Japan-Korea 'comfort women' final-and-irreversible agreement 2015
countries:
- KOR
- JPN
timeframe:
  start: 2015
  end: 2018
  enacted_date: '2015-12-28'
description: 'Joint press announcement by Foreign Ministers Yun Byung-se (Korea) and Fumio Kishida (Japan) on 28 December 2015 declaring a "final and irreversible" resolution to the wartime military-sexual-slavery
  ("comfort women") issue. Included Prime Minister Abe''s apology of "deepest remorse" conveyed via Kishida, a ¥1bn (~$9m) Japanese government contribution to a Korean-administered Reconciliation and Healing
  Foundation for surviving victims (46 living at time of agreement), and mutual commitment to "refrain from accusing or criticising each other" in the international community. Controversial domestically
  in Korea for bilateral nature excluding victim participation; Moon Jae-in administration dissolved the Reconciliation Foundation November 2018 while noting the agreement itself was not formally revoked.

  '

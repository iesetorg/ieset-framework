policy_id: kwt_parliament_suspension_constitution_articles_2024
status: candidate
title: Kuwait National Assembly suspension and constitutional-article freeze 2024
countries:
- KWT
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-05-10'
description: 'Emir Mishal dissolved Kuwait''s National Assembly in May 2024 and suspended several constitutional articles governing parliamentary elections and legislative powers for a stated period of
  up to four years, with executive lawmaking to proceed by decree. The measure ended the immediate elected assembly-government impasse but reduced the parliamentary bargaining channel that had been central
  to Kuwait''s constitutional monarchy model.

  '

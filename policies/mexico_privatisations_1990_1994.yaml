policy_id: mexico_privatisations_1990_1994
status: candidate
title: Mexico Privatisations 1990 1994
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Between 1990 and 1994 the Salinas administration sold off more than 250 state-owned enterprises, including Telmex (1990), the 18 reprivatised commercial banks (1991-1992), steel mills, the
  national airline, sugar mills, mining concessions, and toll-road concessions. The programme — managed by the Secretaría de Hacienda''s Comité de Desincorporación — generated proceeds used for debt retirement
  and the Solidaridad social-spending fund, and shrank federal-government direct economic activity sharply.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Sales prepared major sectors for cross-border ownership and competition under NAFTA's investment chapter.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Auctions and concessions ended state monopolies in telecoms, banking, steel, and transport, creating space for private rivalry.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Transferred ownership of formerly state-held enterprises to private shareholders with constitutional and contractual protections.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatisation receipts retired public debt, reducing fiscal pressure on Banxico and supporting subsequent autonomy reform.

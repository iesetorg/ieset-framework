policy_id: vn_land_law_2003
status: candidate
title: Vietnam Land Law 2003
countries:
- VNM
timeframe:
  start: 2003
  end: 2004
  enacted_date: '2004-07-01'
description: 'Land Law 13/2003/QH11 passed 26 November 2003, effective 1 July 2004. State formally retained ultimate ownership of all land (Article 17, 1992 Constitution) but extended use-right (land- use
  rights certificate, LURC) terms to 50 years for annual crops and 70 years for perennial crops; permitted transfer, mortgage, lease, inheritance, and capital-contribution of agricultural-land use rights.
  Enabled mortgages for investment purposes. Compulsory-acquisition and compensation procedures specified (though later-documented abuses persisted). Closest Vietnam had come to private land title pre-2013
  revision.

  '
enacted_by:
- vietnam_khai_manh_doi_moi_deepening_1997_2006
coalition_label_at_enactment: CPV
axes_moved:
- axis: institutional.property_rights
  direction: +
  magnitude: strong
  intended: true
  rationale: Extended use-right terms and added transfer/mortgage rights — de facto private land-use property right.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Mortgageable land-use right enabled bank collateralisation of agricultural land.
references:

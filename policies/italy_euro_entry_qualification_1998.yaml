policy_id: italy_euro_entry_qualification_1998
status: candidate
title: Italy Euro Entry Qualification 1998
countries:
- ITA
timeframe:
  start: 1996
  end: 1998
description: 'Under Prime Minister Romano Prodi, Italy executed a multi-year fiscal adjustment to meet the Maastricht convergence criteria, including the 1997 "Eurotax" temporary income surcharge, the Dini
  pension reform implementation, and Treasury-driven spending control, cutting the general-government deficit from roughly 7% of GDP in 1995 to 2.7% in 1997. The May 1998 European Council confirmation that
  Italy qualified for first-wave euro adoption was framed domestically as the central reward for the Olive Tree coalition''s austerity package.

  '

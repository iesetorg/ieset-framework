policy_id: ec_manabi_earthquake_response_2016
status: candidate
title: 2016 Pedernales-Manabí earthquake response
countries:
- ECU
timeframe:
  start: 2016
  enacted_date: '2016-04-20'
description: '16 Apr 2016 Mw 7.8 Pedernales-Manabí earthquake (673 deaths, USD 3.3bn damage). Ley Orgánica de Solidaridad 20 May 2016 introduced "contribuciones solidarias": VAT raised from 12% to 14% for
  one year, one-time 0.9% wealth tax on USD 1m+ assets, one-month-wage contributions from salaries over USD 1,000, one-time utility contribution from firms. Raised ~USD 1.5bn for reconstruction. Under dollarization
  constraint monetary response was absent; fiscal + tax-hike channel dominated.

  '
enacted_by:
- ecuador_correa_alianza_pais_ii_2013_2017
coalition_label_at_enactment: Alianza PAIS
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  rationale: Wealth-tax + high-wage contributions progressive; VAT hike regressive offset.
  intended: true
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  rationale: Reconstruction outlays financed via solidarity taxes.
  intended: true
references:

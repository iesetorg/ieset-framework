title: Ecuador Tax Reforms 2007 2014
countries:
- ECU
timeframe:
  start: 2007
  end: 2017
description: 'A series of laws under Correa — the 2007 Ley Reformatoria para la Equidad Tributaria, the 2009 windfall-rents amendment, and 2014 incentive-package adjustments — expanded the SRI''s enforcement
  powers, raised top marginal personal income-tax rates, introduced an outflow tax (ISD) on capital exports, and imposed surtaxes on bank assets and foreign-controlled mining/oil rents. Tax-to-GDP rose
  materially over the period.

  '

title: Spain Labour Reform Rdl 32 2021
countries:
- ESP
timeframe:
  start: 2018
  end: ongoing
description: 'Real Decreto-ley 32/2021 reformed Spain''s labour market under the Sánchez-Díaz coalition, partially repealing the 2012 Rajoy-era flexibilisation. It restricted temporary contracts (contratos
  temporales), reinforced sectoral collective-agreement primacy over firm-level deals, and introduced the new fixed-discontinuous permanent contract for seasonal work. Negotiated tripartitely with unions
  and employers (CEOE).

  '

policy_id: mus_global_business_tax_reform_2018
status: candidate
title: Mauritius global business tax reform 2018
countries:
- MUS
timeframe:
  start: 2018
  end: ongoing
description: 'Mauritius reworked its global-business tax regime after international transparency and base-erosion pressure, replacing the deemed foreign tax credit and legacy offshore company treatment
  with a partial-exemption system tied to substance and activity conditions. The reform raised compliance requirements for cross-border financial and holding-company structures while preserving a preferential,
  rules-based international business platform.

  '
enacted_by:
- mauritius_tax_social_admin_modernisation_2017_present
scope: national
coalition_label_at_enactment: MSM-led government
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Abolishing the deemed foreign tax credit and legacy offshore exemptions increased effective taxation for some global-business income.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Substance and activity conditions tightened regulation of offshore financial and holding-company structures.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: The reform moved preferential treatment into a more transparent statutory partial-exemption framework.
references:
- Mauritius Revenue Authority, Finance Act 2018 implementation materials.
- Mauritius Revenue Authority, corporate taxation and partial exemption regime guidance.

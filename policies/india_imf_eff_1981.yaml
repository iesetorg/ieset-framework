policy_id: india_imf_eff_1981
status: candidate
title: India IMF Extended Fund Facility (India 1981)
countries:
- IND
timeframe:
  start: 1981
  end: 1984
  enacted_date: '1981-11-09'
description: 'SDR 5bn Extended Fund Facility approved 9 Nov 1981 — at the time the largest IMF arrangement in history. Conditionality included fiscal consolidation, export promotion, partial import liberalisation,
  and exchange-rate management. India drew SDR 3.9bn and exited early 1984 without drawing the final tranche. Produced modest reform content (textile machinery imports liberalised; Abid-Hussain committee-based
  trade-policy review) but most conditionality softly implemented.

  '

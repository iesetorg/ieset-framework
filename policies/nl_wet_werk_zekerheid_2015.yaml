policy_id: nl_wet_werk_zekerheid_2015
status: candidate
title: Netherlands Wet werk en zekerheid (flex-security law)
countries:
- NLD
timeframe:
  start: 2015
  end: 2020
  enacted_date: '2015-07-01'
description: 'Wet werk en zekerheid (WWZ) introducing dual labour-market reform in phases: capping chain-of-fixed-term contracts at 3 contracts / 2 years (from 3 contracts / 3 years), statutory ''transition
  allowance'' (transitievergoeding) replacing kantonrechtersformule severance (systematically lower), mandatory judicial consent for dismissal on economic/long-sickness grounds, and WW (unemployment-insurance)
  duration reduction from 38 to 24 months phased 2016-2019. Flex-secure bargain between VVD (flex workers covered) and PvdA (temp-contract chain tightened).

  '
enacted_by:
- netherlands_rutte_ii_vvd_pvda_2012_2017
coalition_label_at_enactment: VVD-PvdA
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Severance costs reduced; dismissal-grounds rules recalibrated; WW duration cut.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: WW duration cut 38→24 months; transition allowance lower than prior severance formula.
references:

description: 'Introduced Japan''s first value-added-type consumption tax at 3% on virtually all goods and services, enacted under PM Takeshita''s Consumption Tax Law (Law No. 108 of 1988). Intended to broaden
  the indirect-tax base and address demographic-driven social-security funding; politically toxic — contributed to LDP Upper-House defeat Jul 1989 and Takeshita resignation over Recruit scandal. Base broadening
  continued with rate steps to 5% (1997), 8% (2014), 10% (2019).

  '

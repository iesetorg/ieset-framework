title: New Economic Policy — Decree 21060 (Bolivia stabilisation 1985)
countries:
- BOL
timeframe:
  start: 1985
  enacted_date: '1985-08-29'
description: 'Signed by President Víctor Paz Estenssoro under advice from Jeffrey Sachs. Shock-therapy programme ending Bolivia''s 1984-1985 hyper- inflation (peak ~60,000% annualised, Hanke-Krus catalogued
  episode). Measures: (1) immediate peso devaluation + unified exchange rate, (2) price liberalisation, (3) fiscal adjustment via wage freeze + tax reform, (4) trade liberalisation, (5) central-bank independence
  restoration. Inflation collapsed from 24,000% (1985) to ~15% (1987). Bolivian stabilisation became an early template for Eastern European shock-therapy programmes 1989-1991 (Sachs advising Polish and
  Russian governments drew on this experience).

  '

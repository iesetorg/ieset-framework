policy_id: hu_bajnai_crisis_package_2009
status: candidate
title: Bajnai Crisis Package 2009
countries:
- HUN
timeframe:
  start: 2004
  end: 2010
description: 'The April 2009 Bajnai government, taking office mid-IMF/EU programme, enacted an emergency fiscal package freezing 13th-month public-sector pay, suspending the 13th pension, raising the standard
  VAT rate from 20% to 25%, scaling back family allowances, and accelerating retirement-age increases. The package was designed to restore programme compliance after the 2008 stand-by arrangement and stabilise
  the forint.

  '

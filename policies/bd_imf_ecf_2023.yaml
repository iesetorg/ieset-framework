policy_id: bd_imf_ecf_2023
status: candidate
title: IMF $4.7bn ECF/EFF/RSF programme
countries:
- BGD
timeframe:
  start: 2023
  enacted_date: '2023-01-30'
description: 'IMF Executive Board approved on 30 January 2023 a 42-month combined Extended Credit Facility / Extended Fund Facility (~$3.3bn) plus Resilience and Sustainability Facility (~$1.4bn), total
  ~$4.7bn, against a backdrop of the forex crisis that saw gross reserves fall from $48bn (August 2021) toward $20bn. Conditionality covers revenue mobilisation (tax-GDP +0.5pp annually), subsidy rationalisation
  (electricity, fertiliser, fuel), crawling-peg FX regime, policy-rate framework, and NPL recognition.

  '

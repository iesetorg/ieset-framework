  enacted_date: '2024-04-01'
description: 'Partial legalisation of cannabis effective 1 April 2024: personal possession of up to 25g, cultivation of up to three plants for personal use, and regulated non-commercial Anbauvereinigungen
  (cannabis social clubs) of up to 500 members from 1 July 2024. Commercial retail pilot phase deferred. Core Ampel social-liberal reform; SPD-Greens-FDP Koalitionsvertrag commitment. One of the Ampel''s
  few uncontested internal consensus items.

  '

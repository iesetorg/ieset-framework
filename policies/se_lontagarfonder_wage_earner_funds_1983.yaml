description: 'Diluted implementation of the Meidner plan: five regional wage-earner funds funded by a 20% levy on excess corporate profits plus a supplementary payroll tax, empowered to hold up to 8% of
  any listed firm''s equity, with union-appointed boards exercising voting rights. Target ceiling ~14bn SEK. Dismantled by Bildt''s centre-right government in 1991.

  '

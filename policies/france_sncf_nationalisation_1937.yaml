# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: france_sncf_nationalisation_1937
status: candidate
title: France SNCF nationalisation 1937
countries: [FRA]
timeframe:
  start: 1937
  end: 1938
  enacted_date: "1937-08-31"
description: >
  The decree-law of 31 August 1937 reorganised the railway regime and
  cleared the way for the creation of the Societe nationale des chemins de
  fer francais (SNCF), which began operating on 1 January 1938 as the
  dominant national railway operator. The state responded to the financial
  weakness and fragmentation of the major railway companies by fusing the
  network into a single state-backed enterprise with coordinated tariffs,
  investment, and management. The measure was a classic strategic-network
  nationalisation rather than a general socialisation of industry.
enacted_by:
  - france_popular_front_1936_1938
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Railway entry and operation were concentrated inside a single state-backed network structure."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "The reform replaced competing or parallel railway companies with a unified national operator."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The state assumed a larger direct balance-sheet and coordination role in a deficit-prone strategic transport sector."
references:
  - "Decret-loi du 31 aout 1937 portant reorganisation du regime des chemins de fer"
  - "Archives SNCF, Convention du 31 aout 1937"

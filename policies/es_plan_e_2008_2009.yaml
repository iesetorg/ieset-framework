description: 'Zapatero II government''s fiscal-stimulus package branded ''Plan Español para el Estímulo de la Economía y el Empleo'': (i) €400 IRPF rebate per taxpayer (~€6bn); (ii) Fondo Estatal de Inversión
  Local (Nov 2008) €8bn for municipal public works on short timescales; (iii) Fondo Especial del Estado para la Dinamización de la Economía y el Empleo €3bn sectoral measures (auto scrappage, R&D, environmental
  infrastructure); (iv) SME credit-support ICO lines. Total ~€50bn headline package (2008-2009) — ~5% of GDP — drove deficit from -4.4% (2008) to -11.3% GDP (2009). Classic discretionary Keynesian response;
  subsequently criticised as having diluted fiscal buffer ahead of the sovereign crisis.

  '

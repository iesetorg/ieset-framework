title: Russian GKO default and rouble devaluation 1998
countries:
- RUS
timeframe:
  start: 1998
  enacted_date: '1998-08-17'
description: 'On 17 August 1998 the Russian government defaulted on domestic GKO/OFZ debt, imposed a 90-day moratorium on private foreign-currency obligations, and widened the rouble corridor — effectively
  devaluing the rouble (from ~6 to ~21 RUB/USD by September). CBR reserves had been depleted under a pegged-corridor regime during the Asian-crisis contagion and falling oil prices.

  '

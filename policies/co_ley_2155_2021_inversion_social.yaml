  enacted_date: '2021-09-14'
description: 'Replacement tax-reform package negotiated with Congress after the Solidaridad Sostenible bill''s withdrawal. Raised the corporate income tax rate from 31% to 35% effective 2022 (reversing
  the Ley 2010 downward path), extended the PAEF payroll-support subsidy, made the Ingreso Solidario transfer permanent, introduced a three-day VAT-exempt consumption days programme, and tightened tax enforcement.
  Targeted revenue ~1.2% of GDP — about half the Solidaridad Sostenible target — and avoided any expansion of the PIT base into the middle class.

  '

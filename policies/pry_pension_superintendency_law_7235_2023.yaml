policy_id: pry_pension_superintendency_law_7235_2023
status: candidate
title: Paraguay Pension Superintendency Law 7235 2023
countries:
- PRY
timeframe:
  start: 2023
  end: ongoing
description: 'Law 7235 created a Superintendencia de Jubilaciones y Pensiones to supervise Paraguay''s fragmented retirement and pension funds. The statute assigned the new authority powers over information
  reporting, risk monitoring, governance standards, inspections, and sanctions, while leaving the underlying pension benefit regimes and separate funds in place.

  '

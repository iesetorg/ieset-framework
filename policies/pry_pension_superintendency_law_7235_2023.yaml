- paraguay_pena_colorado_2023_present
coalition_label_at_enactment: Partido Colorado / Honor Colorado-aligned government
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: The law tightened financial-sector oversight of pension funds through a dedicated supervisor.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Common reporting, inspection, and sanction channels increased formal accountability across funds.

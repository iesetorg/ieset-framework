policy_id: india_reserve_bank_of_india_act_1934
status: candidate
title: Reserve Bank of India Act 1934
countries: [IND]
timeframe:
  start: 1934
  end: 1949
  enacted_date: "1934-03-06"
description: >
  The Reserve Bank of India Act 1934 constituted the Reserve Bank of
  India as a national central bank, with operations commencing on 1
  April 1935. It concentrated note issue, reserve management, banker-
  to-government functions, and scheduled-bank reserve requirements in a
  single institution rather than leaving them to fragmented treasury and
  commercial-bank arrangements. The bank initially operated as a
  shareholders' institution until nationalisation in 1949, but the act
  created the enduring central-bank architecture of modern India.
enacted_by:
  - india_late_raj_constitutional_devolution_1909_1947
axes_moved:
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The act created a standing central monetary authority separate from day-to-day treasury administration."
  - axis: regulatory.financial_deregulation
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Reserve requirements, note issue, and bank regulation were centralised under a dedicated national authority."
references:
  - "Reserve Bank of India Act 1934"
  - "Reserve Bank of India - About Us / Establishment"
  - "RBI, History of the Reserve Bank of India, vol. 1"

policy_id: mexico_telmex_privatisation_1990
status: candidate
title: Mexico Telmex Privatisation 1990
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'In December 1990 the Salinas government sold its controlling stake in Teléfonos de México (Telmex) to a consortium led by Grupo Carso (Carlos Slim), Southwestern Bell, and France Télécom for
  roughly USD 1.76 billion. The concession granted six years of fixed-line monopoly with mandated network-build targets and price-cap regulation, and became the template for subsequent Salinas privatisations
  and the structural concentration that defined Mexican telecoms for decades.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Brought foreign strategic partners (Southwestern Bell, France Télécom) into Mexican telecoms ahead of NAFTA's services chapter.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Ended state-owned monopoly in telecoms, though concession granted Telmex protection through 1996 long-distance opening.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Sale converted state-held telecoms infrastructure into private equity with concession-contract guarantees.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Sale proceeds retired public debt, lowering fiscal pressure on Banxico ahead of autonomy reform.

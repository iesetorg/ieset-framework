policy_id: uk_labour_exchanges_act_1909
status: candidate
title: Labour Exchanges Act 1909
countries: [GBR]
timeframe:
  start: 1909
  end: 1909
  enacted_date: "1909-09-20"
description: >
  The Labour Exchanges Act created a national system of public employment exchanges
  intended to reduce frictions in job matching, especially among casual and unstable
  urban labour markets. While modest compared with later welfare institutions, it
  signalled that unemployment and labour-market coordination were legitimate national
  administrative problems rather than matters left entirely to local charity, private
  agencies, or the residual Poor Law system.
enacted_by:
  - uk_new_liberalism_1906_1914
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Public labour exchanges aimed to speed matching and reduce search frictions across fragmented labour markets."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The reform modestly expanded national administrative spending on labour-market coordination."
references:
  - "Labour Exchanges Act 1909"

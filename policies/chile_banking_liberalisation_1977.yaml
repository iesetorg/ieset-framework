policy_id: chile_banking_liberalisation_1977
status: candidate
title: Chile Banking Liberalisation 1977
countries:
- CHL
timeframe:
  start: 1975
  end: 1990
description: 'Chile''s banking liberalisation, codified in the General Banking Law amendments of 1975-1977 under the Chicago Boys-led Pinochet economic team, lifted interest-rate ceilings, ended directed
  credit, allowed re-privatisation of banks nationalised under Allende, and removed quantitative credit controls. Capital-account liberalisation and reduced reserve requirements followed. The intended effect
  was to reallocate credit through market prices; the resulting boom contributed to the 1982 banking crisis that triggered re-regulation under the 1986 Ley General de Bancos.

  '

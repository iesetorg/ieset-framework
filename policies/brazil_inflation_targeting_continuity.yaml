policy_id: brazil_inflation_targeting_continuity
status: candidate
title: Brazil Inflation Targeting Continuity
countries:
- BRA
timeframe:
  start: 2003
  end: 2010
description: 'The Lula government''s 2003 "Letter to the Brazilian People" pledged continuity of the inflation-targeting regime, fiscal-responsibility rules, and floating exchange rate inherited from Cardoso,
  despite PT-base pressure for monetary loosening. Banco Central president Henrique Meirelles maintained the Copom rate framework and announced annual CPI targets, anchoring expectations through the commodity
  boom and delivering sustained disinflation alongside the social-transfer expansion.

  '
enacted_by:
- brazil_lula_da_silva_bolsa_familia_2003_2010
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Stable monetary regime created fiscal space for parallel social-transfer expansion under PT.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower inflation reduced regressive seigniorage tax that historically hit informal-sector workers hardest.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Maintained primary-surplus targets while accommodating moderate spending growth on social programmes.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Preserved de facto operational independence under Meirelles without formal statutory upgrade.

  intended: true
  rationale: Statutory securities regulator; demutualised electronic exchange enabled capital-market deepening.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Enforceable investor-protection and market-conduct framework.

policy_id: in_sebi_act_1992
status: candidate
title: India SEBI Act — statutory securities regulator 1992
countries:
- IND
timeframe:
  start: 1992
  enacted_date: '1992-04-04'
description: 'Securities and Exchange Board of India Act 1992 (in force 30 Jan 1992, retrospective to 12 Apr 1988) granted SEBI statutory powers to regulate stock exchanges, mutual funds, and market intermediaries.
  Followed the Harshad Mehta 1992 securities scam exposing systemic banking-stock-market fraud. NSE (National Stock Exchange) commenced operations Jun 1994 as electronic demutualised exchange challenging
  BSE; investor-protection and disclosure regime matured across the decade.

  '
enacted_by:
- india_narasimha_rao_inc_1991_1996
coalition_label_at_enactment: INC under FM Singh

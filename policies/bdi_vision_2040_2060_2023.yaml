policy_id: bdi_vision_2040_2060_2023
status: candidate
title: Burundi Vision 2040 and 2060 development strategy 2023
countries:
- BDI
timeframe:
  start: 2023
  end: ongoing
description: 'Burundi adopted a long-term Vision 2040/2060 development framework that sets the government objective of becoming an emerging economy by 2040 and a developed economy by 2060. The strategy
  reorients planning around infrastructure, agriculture productivity, private-sector development, industrialisation, human capital, and state-led mobilisation of domestic and external finance.

  '
enacted_by:
- burundi_ndayishimiye_recovery_reform_state_2020_present
scope: national
coalition_label_at_enactment: CNDD-FDD Ndayishimiye government
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: The vision creates a long-term public-investment and development-planning envelope across infrastructure and human capital.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: The framework directs state coordination toward selected growth sectors including agriculture, industry, and infrastructure.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Private-sector development and investment-climate objectives are explicit parts of the development vision.
references:

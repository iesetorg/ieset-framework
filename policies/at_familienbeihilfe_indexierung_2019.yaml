policy_id: at_familienbeihilfe_indexierung_2019
status: candidate
title: Familienbeihilfe indexation for children abroad 2019 (CJEU-struck 2022)
countries:
- AUT
timeframe:
  start: 2019
  end: 2022
  enacted_date: '2018-10-24'
description: 'Indexed the Austrian Familienbeihilfe (family allowance) and Familienbonus Plus credits to the cost of living of the recipient child''s country of residence when paid to EU/EEA cross-border
  workers whose children lived abroad. Reduced payments to workers with children in lower-cost-of-living Member States (notably Hungary, Slovakia, Romania). The European Commission referred Austria to the
  CJEU in May 2020; Judgment C-328/20 of 16 June 2022 held the indexation discriminatory under Regulation 883/2004 and Article 45 TFEU. Austria repealed the indexation with effect from July 2022 and paid
  back-arrears.

  '
enacted_by:
- austria_kurz_ovp_2017_2021
coalition_label_at_enactment: OeVP-FPOe
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Symbolically and materially differentiated treatment of EU-mobile workers; part of the Kurz-era migration-restrictionist posture.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Measure was subsequently found in breach of EU law by the CJEU; the legislative design proceeded over Commission legal warnings, weakening rule-of-law compliance.
references:
- Bundesgesetz ueber die Indexierung der Familienbeihilfe (BGBl. I Nr. 83/2018)
- CJEU Judgment C-328/20 European Commission v Republic of Austria, 16 June 2022

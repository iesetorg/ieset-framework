policy_id: my_epf_i_withdrawal_schemes_2020_2021
status: candidate
title: Epf I Withdrawal Schemes 2020 2021
countries:
- MYS
timeframe:
  start: 2020
  end: 2021
description: 'Beginning with i-Lestari (April 2020) and followed by i-Sinar (December 2020) and i-Citra (July 2021), Malaysia''s Employees Provident Fund (EPF) permitted members to withdraw a portion of
  their retirement savings to cushion pandemic-era income losses. Withdrawals collectively exceeded RM 100 billion across the schemes, providing liquidity to households without expanding the federal-government
  deficit but depleting long-run retirement balances for many lower-income members.

  '
enacted_by:
- malaysia_muhyiddin_pn_2020_2021
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Acted as a quasi-transfer by releasing pre-funded retirement balances directly to households facing pandemic income loss.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Boosted aggregate household disbursements without raising general-government outlays, instead drawing on EPF savings stocks.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Withdrawals injected liquidity into deposit and consumption channels, complementing Bank Negara's accommodative stance.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Pandemic-era market closures left fewer outlets for the released liquidity, concentrating spending in essential-goods incumbents.

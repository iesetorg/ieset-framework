title: Greek deficit statistical revision 2004
countries:
- GRC
timeframe:
  start: 2004
  enacted_date: '2004-09-22'
description: 'Following the March 2004 change of government, new National Statistical Service and Ministry of Finance leadership revised Greek deficit figures for 1997-2003: 2003 deficit re-reported from
  1.7% to 4.6% of GDP (later revised again to 7.8%+); earlier years also raised above 3%. Eurostat Notification of 22 September 2004 confirmed the revision. Excessive Deficit Procedure opened 5 July 2004.
  Raised credibility problems that compounded into the 2009- 2010 debt-crisis trigger.

  '

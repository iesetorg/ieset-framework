policy_id: pt_iva_rise_2002
status: candidate
title: Iva Rise 2002
countries:
- PRT
timeframe:
  start: 2002
  end: 2004
description: 'Portugal''s standard VAT (IVA) rate rise from 17% to 19%, enacted in the 2002 State Budget (Lei 16-A/2002) by the Barroso PSD-CDS government, was a centrepiece of the post-2002 EU excessive-deficit-procedure
  response after Portugal exceeded the 3%-of-GDP Stability and Growth Pact ceiling. The reduced rates were left untouched. The intended effect was to deliver immediate revenue to compress the deficit, signal
  commitment to EU fiscal discipline, and shift the tax mix from direct toward indirect taxation as part of a broader market-oriented adjustment.

  '
enacted_by:
- portugal_barroso_psd_2002_2004
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: VAT hike was paired with companion labour-market reforms easing dismissal procedures.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: VAT revenue used to compress the headline deficit rather than to finance new spending.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Indirect-tax hike fell relatively harder on lower-income consumption baskets, lowering progressivity.

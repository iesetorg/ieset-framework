title: Peru Servir civil-service reform
countries:
- PER
timeframe:
  start: 2013
  enacted_date: '2013-07-04'
description: 'Ley 30057 Ley del Servicio Civil (4 Jul 2013) overhauled Peruvian civil service by introducing a merit-based single regime replacing fragmented 276/728/CAS contracting regimes, performance-based
  pay, career ladder, mandatory evaluations, migration optional. Implementation gradual — by 2023 only ~6% of public workforce had migrated. Political resistance from unions + successor administrations
  slowed adoption.

  '

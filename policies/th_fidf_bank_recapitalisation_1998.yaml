policy_id: th_fidf_bank_recapitalisation_1998
status: candidate
title: Thailand FIDF bank recapitalisation programme (1998)
countries:
- THA
timeframe:
  start: 1998
  end: 2000
  enacted_date: '1998-08-14'
description: 'Financial Institutions Development Fund (FIDF) bank-support programme anchored on "14 August Package" (14 August 1998): Tier-1 capital support (up to ~Bt 300bn) subject to banks raising private
  capital first on 2:1 public:private leverage; Tier-2 support for NPL resolution via new preferred-share issue. Two state banks (Krung Thai, BankThai) and one intervened bank (First Bangkok City) received
  direct capital injection; five private commercial banks (Bangkok Bank, Thai Farmers, Siam Commercial, Bank of Ayudhya, Thai Military) raised private capital to avoid heavy public injection. FIDF ultimately
  issued ~Bt 1.4tn of support bonds absorbed into public debt; debt- service burden constrained subsequent fiscal space for a decade.

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: Democrat-led coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: FIDF bond stock ~Bt 1.4tn ~25% of GDP absorbed bank-sector losses.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Conditional-injection framework tied to Basel capital compliance and supervisory reform.
references:
- BoT '14 August Package' Announcement, 14 August 1998
- Lindgren et al (1999), IMF 'Financial Sector Crisis and Restructuring'

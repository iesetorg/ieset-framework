  enacted_date: '2003-08-13'
description: 'Law 24/2003 on Constitutional Court enacted 13 August 2003 pursuant to Third Amendment. Established Mahkamah Konstitusi with nine justices (3 each appointed by President, DPR, Supreme Court)
  serving 5-year renewable terms. Jurisdiction: judicial review of statutes against Constitution, dispute resolution between state institutions, dissolution of political parties, election disputes, impeachment
  opinions. First nine justices inaugurated 16 August 2003. MK subsequently played central role in election disputes (including 2004, 2009, 2014, 2019 presidential election challenges) and landmark judicial-
  review decisions (Electricity Law 2004, judicial-review expansion).

  '

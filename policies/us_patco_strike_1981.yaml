policy_id: us_patco_strike_1981
status: candidate
title: PATCO strike firings and union decertification (1981)
countries:
- USA
timeframe:
  start: 1981
  end: 1981
  enacted_date: '1981-08-05'
description: 'On 3 August 1981, ~13,000 members of the Professional Air Traffic Controllers Organization (PATCO) struck in violation of federal statute 5 USC 7311. President Reagan issued a 48-hour ultimatum;
  11,345 non-returning controllers were dismissed on 5 August 1981, barred from federal re-employment (lifted 1993), and PATCO was decertified by the Federal Labor Relations Authority on 22 October 1981.
  The episode established a private-sector union-replacement norm for the Reagan era.

  '

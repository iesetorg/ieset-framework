description: 'President Estrada declared "all-out-war" policy against MILF (Moro Islamic Liberation Front) in March 2000 after Kauswagan and Narciso Ramos ambush incidents. AFP offensive captured MILF main
  base Camp Abubakar on 9 July 2000 (Maguindanao). Collapsed Ramos-era peace-process gains (1997 General Agreement on Cease of Hostilities). ~930,000 displaced per OCHA estimates. Renewed ceasefire negotiations
  under Arroyo June 2001; full Comprehensive Agreement on Bangsamoro signed March 2014 under Aquino III.

  '

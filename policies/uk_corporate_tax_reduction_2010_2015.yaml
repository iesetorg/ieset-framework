description: 'Phased reduction of the UK main rate of Corporation Tax from 28% (2010) toward 20% by 2015, legislated in successive Coalition Finance Acts under Chancellor George Osborne. The cuts were paired
  with broader base reforms (capital allowances, controlled foreign company rules) and intended to improve UK competitiveness for inward investment alongside the broader fiscal-consolidation programme.


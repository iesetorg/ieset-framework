policy_id: es_labour_reform_2012
status: candidate
title: Labour Reform 2012
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
description: 'Royal Decree-Law 3/2012, ratified as Law 3/2012, deregulated Spanish labour markets by giving firm-level agreements primacy over sector deals, ending the automatic ultraactividad of expired
  collective contracts, simplifying objective dismissal grounds, cutting unfair-dismissal severance from 45 to 33 days per year of service (capped at 24 months), and broadening grounds for unilateral wage
  and condition adjustments.

  '
enacted_by:
- spain_rajoy_pp_first_2011_2015
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Easier dismissal lowered firms' provisioning for severance, indirectly reducing public-sector liability.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Headline severance cuts and firm-level bargaining primacy substantially raised hiring/firing flexibility.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reform proceeded under EU/IMF surveillance with tighter linkage of bank funding to labour-cost adjustment.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Wage compression weighted heavily on lower-tenure workers, reducing the tax base's progressivity.

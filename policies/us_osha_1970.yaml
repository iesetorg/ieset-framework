policy_id: us_osha_1970
status: candidate
title: Osha 1970
countries:
- USA
timeframe:
  start: 1971
  end: 1974
description: 'The Occupational Safety and Health Act of 29 December 1970, signed by President Nixon, created the Occupational Safety and Health Administration within the Department of Labor and the research-arm
  National Institute for Occupational Safety and Health (NIOSH). OSHA was empowered to promulgate national workplace-safety standards, conduct inspections (with worker complaint rights), issue citations,
  and impose civil penalties. The intended effect was to address rising workplace-injury rates, federalise worker-safety enforcement long delegated to states, and consolidate the regulatory dimension of
  the Nixon-era expansion of the federal administrative state alongside EPA, NHTSA, and CPSC.

  '

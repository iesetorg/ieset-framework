policy_id: vn_soe_equitisation_programme_2000_2006
status: candidate
title: Vietnam SOE equitisation programme (2000-2006)
countries:
- VNM
timeframe:
  start: 2000
  end: 2006
  enacted_date: '2004-11-16'
description: 'Equitisation (cổ phần hóa) programme for SOEs scaled under Khai-Manh. Decree 64/2002/ND-CP and subsequent Decree 187/2004/ND-CP established framework for converting 100%-state enterprises
  into joint-stock companies with mixed ownership (state, employee, external investor). By end-2006 ~2,900 enterprises equitised (up from ~200 end-2000), concentrated in smaller SOEs initially. Flagship
  IPOs: Vinamilk (dairy, 2005), Bao Minh Insurance (2004), Sacombank (2006). State Capital Investment Corporation (SCIC) established 2005 to manage retained state stakes. Larger SOEs (EVN, Vinashin, PetroVietnam)
  mostly untouched until later.

  '
enacted_by:
- vietnam_khai_manh_doi_moi_deepening_1997_2006
coalition_label_at_enactment: CPV
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: ~2,900 SOEs equitised; opened smaller-SOE sectors to private and mixed ownership.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced direct-budget support obligations to equitised entities.
references:
- Decree 187/2004/ND-CP on Equitisation
- Sjoholm (2006), 'State Owned Enterprises and Equitisation in Vietnam'

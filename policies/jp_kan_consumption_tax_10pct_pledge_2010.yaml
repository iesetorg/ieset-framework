status: candidate
title: Kan Consumption Tax 10Pct Pledge 2010
countries:
- JPN
timeframe:
  start: 2010
  end: 2011
description: 'Prime Minister Naoto Kan''s June-July 2010 pledge to raise the consumption tax from 5% to 10% by the mid-2010s reframed Japan''s fiscal-consolidation debate ahead of the July upper-house election.
  The proposal, motivated by mounting public-debt and social-security financing pressures, was widely blamed for DPJ election losses but became the political seed for the 2012 Integrated Social Security
  and Tax Reform that legislated the increase.

  '

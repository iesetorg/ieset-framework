policy_id: nl_fortis_abn_amro_nationalisation_2008
status: candidate
title: Netherlands Fortis/ABN-AMRO nationalisation (2008)
countries:
- NLD
timeframe:
  start: 2008
  end: 2015
  enacted_date: '2008-10-03'
description: 'Dutch state acquisition on 3 October 2008 of Fortis Bank Nederland (Holding) and the Dutch portions of ABN AMRO for €16.8bn in a Belgo-Dutch-Luxembourg weekend rescue that followed Fortis''s
  collapse. Combined with further funding, total state commitment in the Fortis/ABN dossier reached ~€27bn. Merger of ABN AMRO + Fortis Nederland completed Jul 2010 under 100% state ownership; partial re-privatisation
  via IPO Nov 2015 (23% float). One of the largest bank nationalisations in European history relative to GDP.

  '

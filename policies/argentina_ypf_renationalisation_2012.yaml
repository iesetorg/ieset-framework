policy_id: argentina_ypf_renationalisation_2012
status: candidate
title: Argentina Ypf Renationalisation 2012
countries:
- ARG
timeframe:
  start: 2003
  end: 2015
description: 'Law 26.741 (May 2012) declared hydrocarbons self-sufficiency a public-interest objective and expropriated 51% of YPF S.A. shares from Spain''s Repsol. The state took operational control of
  Argentina''s largest oil and gas company; compensation was settled in 2014 through USD 5 billion in sovereign bonds following arbitration. The measure aimed to reverse falling production and reorient
  upstream investment, including the development of Vaca Muerta shale.

  '
enacted_by:
- kirchner_fernandez_expansionary_2003_2015
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: USD 5 billion in compensation bonds added directly to the public-debt stock.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: State-controlled YPF assumed implicit obligation to subsidise gas prices for industrial users and households.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State acquisition of dominant operator concentrated upstream market control and chilled foreign entry.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCRA reserves were drawn on for YPF dollar settlements, eroding monetary buffer space.

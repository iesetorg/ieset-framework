description: 'Bondevik I centre-coalition minority government fell 9 March 2000 on a cabinet-confidence question over emission-permit conditions for natural-gas-fired power plants (Kaarstoe, Kollsnes).
  The government insisted on strict CCS-compatible emissions caps; Storting majority (AP-H-FrP) rejected. Jens Stoltenberg (AP) formed the successor government.

  '

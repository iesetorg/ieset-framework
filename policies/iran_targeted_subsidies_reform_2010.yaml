policy_id: iran_targeted_subsidies_reform_2010
status: candidate
title: Iran Targeted Subsidies Reform 2010
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'Enacted under President Ahmadinejad in December 2010, the Targeted Subsidies Reform Law sharply raised administered prices for petrol, diesel, natural gas, electricity and bread toward import
  parity, and redistributed roughly half of the savings as monthly cash transfers to nearly the entire population through bank deposits. The reform initially cut energy intensity but cash-transfer real
  value was rapidly eroded by sanctions-driven inflation, and successor administrations reinstated partial price controls and dual-rate FX subsidies.

  '

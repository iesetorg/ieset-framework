policy_id: ethiopia_villagisation_programme_1985
status: candidate
title: Ethiopia Villagisation Programme 1985
countries:
- ETH
timeframe:
  start: 1974
  end: 1991
description: 'Launched in 1985 alongside the Derg''s broader resettlement campaigns, the villagisation programme forcibly relocated several million rural Ethiopians from dispersed homesteads into planned
  collective villages to ease state delivery of services and tighten central control over agricultural production. Coordinated by the National Villagisation Coordinating Committee, the campaign supplemented
  compulsory grain quotas to the Agricultural Marketing Corporation and was widely associated with mid-1980s famine impacts.

  '
enacted_by:
- ethiopia_derg_1974_1991
axes_moved:

  direction: '-'
  magnitude: weak
  intended: true
  rationale: Households were compelled to abandon farmsteads and relocate, severing customary land claims.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Collective villages funnelled production through state procurement, replacing private rural markets.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Forced grain quotas to AMC monopolised agricultural surplus and squeezed private trade flows.
- axis: fiscal.spending_level

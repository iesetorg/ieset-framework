description: 'Barco administration''s war against the Medellín Cartel and Los Extraditables (Pablo Escobar''s extradition-resistance coalition). Extradition Treaty with the US invoked repeatedly after 1979
  treaty restored 1984. Wave of assassinations and bombings: Guillermo Cano (El Espectador editor, December 1986), Attorney General Carlos Mauro Hoyos (January 1988), Luis Carlos Galán (Liberal presidential
  candidate, August 1989), Avianca Flight 203 bomb (27 November 1989, 107 dead), DAS building bomb (6 December 1989). Extradition Treaty struck down by Supreme Court June 1987 restored through decrees until
  1991 constituent assembly banned extradition of nationals (reversed 1997).

  '

description: 'Togo created the Tinga fund by decree as a financing mechanism for universal electricity access. The fund provides repayable subsidies and connection facilitation for low-income households,
  complementing other electrification initiatives and supporting the national objective of reliable and affordable electricity access for all citizens by 2030.

  '

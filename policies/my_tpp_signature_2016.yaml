policy_id: my_tpp_signature_2016
status: candidate
title: Tpp Signature 2016
countries:
- MYS
timeframe:
  start: 2009
  end: 2018
description: 'Malaysia signed the Trans-Pacific Partnership in Auckland on 4 February 2016 alongside 11 other Pacific-rim economies, committing to deep tariff cuts, IP enforcement, state-owned-enterprise
  disciplines, and procurement liberalisation. Following US withdrawal in January 2017, Malaysia participated in the renegotiated CPTPP framework but did not ratify domestically before the 2018 change of
  government, leaving its commitments suspended in practice during this movement.

  '
enacted_by:
- malaysia_najib_bn_2009_2018
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tariff elimination commitments shifted federal revenue toward consumption and excise taxation rather than progressive trade taxes.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Adjustment-assistance commitments and Bumiputera carve-outs implied targeted compensatory transfers under TPP terms.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: SOE disciplines and procurement-non-discrimination obligations constrained directed-subsidy use for state-linked firms.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Failure to ratify after signature signalled selective treaty compliance and weakened external-discipline credibility.

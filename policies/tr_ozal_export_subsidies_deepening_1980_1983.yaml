description: 'Under Özal as Deputy PM for Economic Affairs in the Ulusu government, export subsidies expanded via tax rebates, preferential export credit, and corporate-tax exemptions for exporters; managed
  daily devaluations kept the real exchange rate competitive. Exports rose from $2.9bn (1980) to $5.7bn (1983). Established the export-led growth template used through 1989.

  '

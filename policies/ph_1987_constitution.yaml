description: 'Constitution ratified by plebiscite 2 Feb 1987 (76.4% Yes). Restored bicameral Congress (Senate + House of Representatives), presidential single six-year term without re-election, independent
  judiciary, Constitutional Commissions (CSC, COA, COMELEC), Commission on Human Rights, and Ombudsman. Banned US military bases absent treaty concurrence by Senate. Embedded economic nationalism clauses
  (60/40 ownership in natural resources and public utilities).

  '

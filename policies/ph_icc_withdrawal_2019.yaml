policy_id: ph_icc_withdrawal_2019
status: candidate
title: Philippine withdrawal from the Rome Statute (ICC)
countries:
- PHL
timeframe:
  start: 2019
  enacted_date: '2019-03-17'
description: 'On 14 March 2018, President Duterte notified the UN Secretary- General of Philippine withdrawal from the Rome Statute of the International Criminal Court, in direct response to the Prosecutor''s
  opening of a preliminary examination into the drug war the preceding month. The withdrawal took effect on 17 March 2019. The Supreme Court sustained the withdrawal as within presidential prerogative in
  Pangilinan v. Cayetano (16 March 2021), though noting that ICC jurisdiction over crimes committed during Philippine membership is preserved. The ICC proceeded on that basis, opening a formal investigation
  in September 2021; Pre-Trial Chamber I authorised the investigation on 26 January 2023, and former President Duterte was arrested in Manila and transferred to The Hague on 11-12 March 2025 under the Marcos
  Jr administration.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban executive
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  rationale: Withdrawal from a treaty-based external accountability mechanism specifically to obstruct investigation of official state conduct weakens the architecture of horizontal-plus-vertical accountability.
  intended: false
- axis: institutional.judicial_independence
  direction: '0'
  magnitude: weak
  rationale: Domestic judicial review of the withdrawal ran its course through the Supreme Court; the process itself did not move domestic judicial-independence indices.
  intended: false
references:
- UN Secretary-General, Depositary Notification C.N.138.2018.TREATIES-XVIII.10, 16 March 2018
- Supreme Court of the Philippines, Pangilinan v. Cayetano, G.R. No. 238875, 16 March 2021
- ICC Pre-Trial Chamber I, authorisation of investigation, 26 January 2023

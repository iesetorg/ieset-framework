policy_id: nl_euthanasia_law_2002
status: candidate
title: Euthanasia Law 2002
countries:
- NLD
timeframe:
  start: 1998
  end: 2002
description: 'The Termination of Life on Request and Assisted Suicide (Review Procedures) Act, adopted in April 2001 and effective 1 April 2002, made the Netherlands the first country to legalise euthanasia
  and physician-assisted suicide under strictly defined conditions including unbearable suffering, voluntary request, and review by regional review committees. The law codified prior tolerated medical practice
  under the Penal Code and was a defining social reform of the second Kok purple coalition.

  '

policy_id: za_eskom_debt_relief_2023
status: candidate
title: Eskom Debt-Relief Arrangement (South Africa, 2023)
countries:
- ZAF
timeframe:
  start: 2023
  enacted_date: '2023-02-22'
description: 'National Treasury announced a R254bn debt-relief package for Eskom in the February 2023 Budget, to be implemented over 2023/24-2025/26 via capital injections and debt take-overs, conditional
  on Eskom executing operational reforms (unbundling into Generation, Transmission, Distribution), spending freezes outside maintenance, and ceasing new borrowing. The arrangement shifted balance-sheet
  risk from the SOE to the sovereign to stabilise electricity supply and halt the Eskom-fiscal doom loop.

  '

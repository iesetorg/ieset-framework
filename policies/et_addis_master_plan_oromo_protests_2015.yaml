policy_id: et_addis_master_plan_oromo_protests_2015
status: candidate
title: Addis Ababa Master Plan withdrawal and Oromo protests
countries:
- ETH
timeframe:
  start: 2015
  end: 2016
description: 'The Addis Ababa and Surrounding Oromia Integrated Development Plan (Apr 2014) proposed extending Addis Ababa administration into surrounding Oromia farmland. Oromo protests erupted Apr 2014
  and resurged massively Nov 2015; the government withdrew the Master Plan Jan 12 2016. Protests nonetheless continued and escalated nationwide through 2016-2018, directly producing the 2016 and 2018 states
  of emergency and Hailemariam''s resignation.

  '

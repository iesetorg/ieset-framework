policy_id: us_voting_rights_act_1965
status: candidate
title: Voting Rights Act 1965
countries:
- USA
timeframe:
  start: 1964
  end: 1968
description: 'The Voting Rights Act of 1965 prohibited racially discriminatory voting practices, banned literacy tests in covered jurisdictions, and instituted federal preclearance under Section 5 for voting-rule
  changes in jurisdictions with histories of discrimination. Enforced by the Department of Justice and supported by federal voting examiners, it dramatically expanded Black voter registration in the South
  and reshaped southern political economy through the late twentieth century.

  '

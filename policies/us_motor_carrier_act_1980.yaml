policy_id: us_motor_carrier_act_1980
status: candidate
title: Motor Carrier Act 1980
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'The Motor Carrier Act of 1980 (Pub. L. 96-296) substantially deregulated the U.S. trucking industry, easing Interstate Commerce Commission entry restrictions, expanding rate-discounting flexibility,
  and limiting collective rate-making by trucking-industry rate bureaus. Together with the 1980 Staggers Rail Act, it formed the core surface-transportation deregulation package of the late Carter administration,
  leading to lower freight rates, expanded carrier entry, and eventual sunset of the ICC in 1995.

  '

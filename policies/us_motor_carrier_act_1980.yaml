  intended: true
  rationale: Eased ICC entry barriers and ended cartel-style rate bureaus, opening trucking competition.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Substantially curtailed ICC certificate-of-convenience-and-necessity licensing requirements.
- axis: regulatory.financial_deregulation
  direction: '-'

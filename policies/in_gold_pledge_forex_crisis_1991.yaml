policy_id: in_gold_pledge_forex_crisis_1991
status: candidate
title: India gold pledge against balance-of-payments collapse 1991
countries:
- IND
timeframe:
  start: 1991
  enacted_date: '1991-05-21'
description: 'Reserve Bank of India pledged 46.91 tonnes of gold to the Bank of England and Union Bank of Switzerland May-Jul 1991 to secure $405m hard-currency loan amid collapsing foreign-exchange reserves
  (~$1.2bn, two weeks'' imports). Politically wrenching signal of sovereign distress; prerequisite to IMF Standby Arrangement Oct 1991 for $2.3bn that anchored Rao-Singh reforms.

  '

description: 'Consent solicitation on ten external bond series totalling roughly USD 17.4bn, closed 31 Aug 2020 with 98% participation. New bonds maturing 2030-2040 with step-up coupons averaging ~5.3%,
  capital haircut of ~9% NPV and substantial cash-flow relief (~USD 16bn over ten years). Accompanied by a new USD 6.5bn IMF EFF (Sep 2020).


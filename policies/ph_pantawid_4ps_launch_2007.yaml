policy_id: ph_pantawid_4ps_launch_2007
status: candidate
title: Philippines Pantawid Pamilyang Pilipino Program (4Ps) launch (2007)
countries:
- PHL
timeframe:
  start: 2007
  end: ongoing
  enacted_date: '2008-02-04'
description: 'Pantawid Pamilyang Pilipino Program (4Ps) conditional-cash- transfer scheme piloted 2007 in six municipalities, formally launched February 2008 under DSWD. Modelled on Mexico''s Oportunidades/Prospera
  and Brazil''s Bolsa Família. Monthly cash grants to poor households with children 0-14 years (expanded to 18 under Aquino III). Conditionalities: ≥85% school attendance, ≥85% pre/postnatal and wellness
  visits, anti- parasitic deworming. Scaled from ~700k households (2010) to 4.4m households (2015) under Aquino III. Institutionalised by RA 11310 (Aquino III, 2019). Single largest anti-poverty programme
  in Philippine history; Orbeta & Paqueo (2016) documented school-attendance and health-visit compliance effects.

  '

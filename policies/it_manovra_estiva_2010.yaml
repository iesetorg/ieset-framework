title: Italy 2010 Manovra Estiva (€25bn consolidation)
countries:
- ITA
timeframe:
  start: 2010
  end: 2012
  enacted_date: '2010-05-31'
description: 'D.L. 78/2010 under Finance Minister Tremonti: ~€25bn fiscal consolidation over 2011-2012 responding to the Greek crisis contagion. Main channels: three-year public-sector pay freeze; cut in
  central-government transfers to regions and local authorities (~€14bn); additional contributions from ''grandi contribuenti'' (firms >€300m revenue); curtailment of cost-of-living pension indexation for
  mid-higher tranches; rationalisation of tax agencies. First of three escalating fiscal packages under Berlusconi IV.

  '

title: Uruguay Pension Reform — Ley 20.130 (2023)
countries:
- URY
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-05-02'
description: 'Parametric pension reform Ley 20.130 enacted 2 May 2023: minimum retirement age raised from 60 to 65 over a 15-year transition, BPS (public-PAYG) replacement-rate and accrual-rate tightening,
  preservation of AFAP individual-account pillar with adjusted contribution split, and a new non-contributory supplement floor. Targeted at long-run BPS solvency given Uruguay''s ageing demographics. A
  27 October 2024 plebiscite pushed by PIT-CNT to constitutionally reverse the reform and lower retirement age failed (~60-40 No).

  '

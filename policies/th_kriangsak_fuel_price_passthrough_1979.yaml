policy_id: th_kriangsak_fuel_price_passthrough_1979
status: candidate
title: Kriangsak fuel-price pass-through (Thailand 1979)
countries:
- THA
timeframe:
  start: 1979
  end: 1980
description: 'In response to second oil shock 1979, Kriangsak government passed through retail fuel-price increases in stages across 1979-1980, raising gasoline and diesel prices by ~60-70%. Triggered parliamentary
  no-confidence motion Feb 1980 that Kriangsak lost, leading to his resignation. Reduced fuel-subsidy burden but at acute political cost.

  '

policy_id: syc_fiscal_consolidation_debt_restructuring_2008
status: candidate
title: Seychelles fiscal consolidation and debt restructuring 2008
countries:
- SYC
timeframe:
  start: 2008
  end: 2015
description: 'Seychelles paired its 2008 IMF-supported stabilisation programme with large fiscal consolidation and public-debt restructuring after a sovereign debt crisis. The programme cut the primary
  deficit, restructured external debt, improved budget controls, and placed debt reduction at the centre of macroeconomic policy during the post-crisis recovery.

  '
enacted_by:
- seychelles_macro_blue_economy_resilience_2008_present
scope: national
coalition_label_at_enactment: Michel government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
  intended: true
  rationale: The stabilisation programme required large expenditure restraint and primary-balance adjustment after default.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Debt restructuring and budget-control reforms made fiscal obligations more transparent and rules-bound.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Fiscal consolidation reduced pressure for monetary financing and supported reserve rebuilding.
references:
- IMF, Seychelles Stand-By Arrangement and debt-restructuring programme materials, 2008-2015.
- IMF, Seychelles 2025 Article IV Consultation staff report, long-run reform background.

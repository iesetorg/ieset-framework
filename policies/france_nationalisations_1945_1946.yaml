policy_id: france_nationalisations_1945_1946
status: candidate
title: France Nationalisations 1945 1946
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'France''s post-Liberation provisional government nationalised core sectors of the economy in 1945–1946, including coal mines (loi du 17 mai 1946), electricity and gas (loi du 8 avril 1946
  creating EDF and GDF), the Banque de France and four major deposit banks, Renault, and Air France. The wave brought roughly a fifth of the productive economy under state ownership and provided the institutional
  substrate for subsequent indicative planning and credit allocation.

  '

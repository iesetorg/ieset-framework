timeframe:
  start: 1995
  enacted_date: '1995-04-15'
description: 'Following Mexico''s December 1994 devaluation, Argentina suffered contagion deposit run: ~$8B outflow Dec 1994-May 1995; 18% deposit contraction; banking-system consolidation from ~200 to
  ~130 banks. 15 April 1995 IMF $2.4B EFF augmentation; BCRA used reserves to defend convertibility peg; GDP contracted 2.8% (1995) before rebounding 5.5% (1996). First major currency-board stress test.

  '

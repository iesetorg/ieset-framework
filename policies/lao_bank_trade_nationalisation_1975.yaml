# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: lao_bank_trade_nationalisation_1975
status: candidate
title: Bank, Trade, and Enterprise Nationalisation
countries:
- LAO
timeframe:
  start: 1975
  end: 1977
description: The new Lao PDR state brought banking, external trade, larger enterprises, and key distribution channels under public ownership or direct administrative control. These measures helped the LPRP replace the former mixed wartime economy with a socialist state sector and reduced the role of private finance and commerce.
enacted_by:
- lao_lao_pdr_socialist_planning_1975
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Private capital and commercial assets in banking and trade were transferred to state control.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: State enterprises and public trading bodies displaced private competitors in major channels.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: External trade was increasingly routed through state monopoly or licensing arrangements.
references:
- Martin Stuart-Fox (1997), A History of Laos
- "World Bank (1995), Lao PDR: Country Economic Memorandum"

description: 'Native Title Act 1993 (Cth) established the Native Title Tribunal and a statutory framework for recognising Indigenous Australians'' traditional rights to land and waters, following the High
  Court''s Mabo v Queensland (No 2) decision (3 June 1992) which overturned the terra nullius doctrine. Set validation rules for past pastoral leases and mining titles, future-act procedures, and a land
  fund for dispossessed groups.


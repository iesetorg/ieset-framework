policy_id: indonesia_trade_liberalisation_packages_1986_1996
status: candidate
title: Indonesia Trade Liberalisation Packages 1986 1996
countries:
- IDN
timeframe:
  start: 1966
  end: 1998
description: 'In response to the mid-1980s oil-price collapse, the Suharto government enacted successive deregulation packages (PAKMEI 1986, PAKTO 1988, PAKDES 1988, and follow-ups through 1996) that converted
  import licences into tariffs, set up bonded zones, allowed foreign-bank entry, eased export-procedure rules, and pruned non-tariff barriers. The packages were drafted by the Berkeley-Mafia technocrats
  and underpinned the export-led manufacturing boom that lasted until the 1997 crisis.

  '

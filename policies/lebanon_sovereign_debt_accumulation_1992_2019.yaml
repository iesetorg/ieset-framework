  rationale: BdL's quasi-fiscal financing of the Treasury and peg defence eroded effective central-bank independence.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Recurrent reconstruction and patronage outlays sustained primary spending well above tax capacity.
- axis: regulatory.financial_deregulation

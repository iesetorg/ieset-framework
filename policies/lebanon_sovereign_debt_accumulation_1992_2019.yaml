policy_id: lebanon_sovereign_debt_accumulation_1992_2019
status: candidate
title: Lebanon Sovereign Debt Accumulation 1992 2019
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'Lebanon''s sovereign-debt accumulation between 1992 and 2019 reflected successive governments'' financing of Hariri-era reconstruction and large public-sector wage bills with high-coupon LBP-denominated
  treasury bills sold to commercial banks at heavily positive real rates, anchored by Banque du Liban''s de-facto USD peg. By 2019 public debt exceeded 150% of GDP. The ''financial engineering'' operations
  of 2016 onwards rolled deposits into BdL at unsustainable spreads. The intended effect was political-coalition stability through patronage and the peg; the system collapsed in 2019.

  '
enacted_by:
- lebanon_post_war_reconstruction_collapse_1992_2020

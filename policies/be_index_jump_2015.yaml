policy_id: be_index_jump_2015
status: candidate
title: Belgium one-time 'index jump' (2015)
countries:
- BEL
timeframe:
  start: 2015
  end: 2016
  enacted_date: '2015-04-28'
description: 'One-off suspension (''saut d''index'' / ''indexsprong'') of the automatic wage-price-indexation mechanism in Belgium in 2015, freezing one 2% indexation cycle across private-sector wages,
  public-sector salaries, and social benefits. Cumulative wage-bill saving estimated ~€2.6bn/year at steady state. Part of the Michel coalition''s competitiveness agenda alongside the Tax Shift. Controversial
  break with the postwar Belgian indexation compact.

  '
enacted_by:
- belgium_michel_mr_coalition_2014_2019
coalition_label_at_enactment: MR + N-VA + CD&V + Open Vld
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Broke automatic wage-indexation chain for one cycle; structural competitiveness effect.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Social-benefit indexation frozen for the cycle.
references:
- Loi du 23 avril 2015 concernant la promotion de l'emploi (saut d'index)

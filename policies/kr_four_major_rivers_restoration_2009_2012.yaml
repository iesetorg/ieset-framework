policy_id: kr_four_major_rivers_restoration_2009_2012
status: candidate
title: Four Major Rivers Restoration 2009 2012
countries:
- KOR
timeframe:
  start: 2008
  end: 2013
description: 'The Four Major Rivers Restoration Project, launched by the Lee Myung-bak administration in late 2008 and largely completed by 2012, dredged and embanked the Han, Nakdong, Geum and Yeongsan
  river systems, building 16 weirs and reservoir structures and around 1,700 km of riverside bicycle paths. Promoted as flood control, water security and a Green New Deal stimulus, the project''s environmental
  costs and procurement irregularities prompted later audits and partial reversals.

  '

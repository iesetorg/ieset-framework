policy_id: gin_simandou_framework_agreement_2022
status: candidate
title: Guinea Simandou framework agreement 2022
countries:
- GIN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-03-25'
description: 'Guinea and the Simandou project partners agreed a framework for developing the Simandou iron-ore blocks together with shared rail and port infrastructure through the Compagnie du TransGuineen.
  The arrangement tied mine development to a trans-Guinean corridor, state participation, timetable obligations, and infrastructure governance intended to turn the deposit into an export and logistics platform.

  '
enacted_by:
- guinea_cnrd_transition_resource_state_2021_present
scope: national
coalition_label_at_enactment: National Committee of Reconciliation and Development
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: The state coordinated project-specific rail, port, and mining infrastructure around a strategic iron-ore corridor.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: The corridor is designed to unlock large-scale iron-ore exports and integrate Guinea into global steel supply chains.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: The framework clarified project, infrastructure, and state-participation rights for the Simandou development.
references:
- Government of Guinea and Simandou project partners, Simandou framework agreement and Compagnie du TransGuineen materials, 2022.
- World Bank and IMF reporting on Guinea's mining-sector and infrastructure-led growth prospects.
notes: 'Private-company sources supplement public institutional reporting because the commercial framework is only partly available through government channels.

  '

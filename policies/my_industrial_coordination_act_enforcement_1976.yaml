policy_id: my_industrial_coordination_act_enforcement_1976
status: candidate
title: Industrial Coordination Act 1975 — enforcement intensification (Malaysia 1976)
countries:
- MYS
timeframe:
  start: 1976
  end: 1985
description: 'Industrial Coordination Act 1975 (ICA) required all manufacturing establishments above a shareholders'' funds threshold to obtain a manufacturing licence with Bumiputera equity and employment
  conditions. Enforcement intensified under Hussein Onn from 1976, sharply dampening non-Bumiputera private investment. Threshold progressively raised (RM0.25m to RM2.5m by 1985) in response to investor
  complaints.

  '
enacted_by:
- malaysia_hussein_onn_1976_1981
coalition_label_at_enactment: Barisan Nasional (Hussein Onn)
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: ICA licensing introduced Bumiputera equity and employment conditions on manufacturing entry.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Entry barriers raised especially for non-Bumi domestic investors.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Compelled equity restructuring for licence renewal.
references:

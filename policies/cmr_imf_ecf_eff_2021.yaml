policy_id: cmr_imf_ecf_eff_2021
status: candidate
title: Cameroon IMF ECF and EFF arrangements 2021
countries:
- CMR
timeframe:
  start: 2021
  end: 2025
  enacted_date: '2021-07-29'
description: 'Cameroon entered blended IMF Extended Credit Facility and Extended Fund Facility arrangements in July 2021. The programme supported post-pandemic stabilisation through fiscal consolidation,
  non-oil revenue mobilisation, public-financial-management reforms, control of fuel-subsidy and SOE risks, debt-management improvements, and governance commitments tied to budget and procurement transparency.

  '
scope: national
enacted_by:
- cameroon_biya_decentralisation_fiscal_continuity_2018_present
coalition_label_at_enactment: Biya government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Programme targets restrain deficits and recurrent fiscal risks while protecting selected priority spending.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The programme treats fuel-subsidy risk and SOE transfers as fiscal pressures to be contained.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-financial-management, procurement, and debt-reporting benchmarks strengthen rule-bound fiscal administration.
references:
- IMF, Cameroon and the IMF country page, ECF/EFF arrangements approved 2021.
- IMF, Cameroon 2021 Article IV Consultation and requests for ECF and EFF arrangements.
notes: 'National programme publication was supplemented with IMF documents because the actionable conditionality is stated most clearly in the IMF materials.

  '

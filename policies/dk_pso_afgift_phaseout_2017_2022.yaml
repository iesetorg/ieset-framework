policy_id: dk_pso_afgift_phaseout_2017_2022
status: candidate
title: PSO-afgift phase-out — Danish renewable-energy financing reform 2017-2022
countries:
- DNK
timeframe:
  start: 2017
  end: 2022
  enacted_date: '2016-11-17'
description: 'The November 2016 PSO-aftale and subsequent legislation phased out the Public Service Obligation (PSO) charge on electricity consumers — which had financed renewable-energy support — over
  2017-2022, moving financing of renewable subsidies onto the general state budget. The reform responded to an EU-law challenge that the PSO levy was incompatible with free movement of electricity within
  the single market and was pitched as improving Danish business-electricity competitiveness. Fiscally neutral by design but institutionally significant: shifted renewable support from a ring-fenced consumer
  levy to general taxation and thereby politicised its annual quantum.

  '

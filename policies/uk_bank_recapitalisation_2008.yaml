policy_id: uk_bank_recapitalisation_2008
status: candidate
title: UK £50bn bank-recapitalisation scheme (RBS, HBOS-Lloyds)
countries:
- GBR
timeframe:
  start: 2008
  end: 2015
  enacted_date: '2008-10-08'
description: 'HM Treasury £50bn core-capital support scheme announced 8 October 2008, purchasing preference shares and ordinary shares in Royal Bank of Scotland (~58% initial, rising to ~82% after second
  injection Nov 2009) and the newly-merged Lloyds-HBOS (~43%); total commitments combined with Asset Protection Scheme, Credit Guarantee Scheme, and Special Liquidity Scheme reached ~£1.162tn in aggregate
  peak exposure. First recapitalisation of major global banks using public common equity; template for subsequent US TARP and euro-area responses.

  '

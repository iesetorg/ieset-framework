description: 'Conditional €78bn bailout package from EU-ECB-IMF (''Troika'') following Portugal''s 2010-2011 sovereign-debt stress. Conditionality: fiscal consolidation (VAT hike, public wages frozen, pension
  freeze), structural reforms (labour market liberalisation, judicial reforms, product-market liberalisation including professional services), banking-sector recapitalisation. Exited programme May 2014
  without precautionary facility — contrasting Greek trajectory. Post-exit GDP recovered to pre-crisis levels by 2018. Canonical EU-peripheral conditional-bailout case distinguishing from Greek outcome.

  '

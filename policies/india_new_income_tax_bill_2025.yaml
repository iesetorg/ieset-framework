policy_id: india_new_income_tax_bill_2025
status: candidate
title: India Income-tax Act 2025 direct-tax codification
countries:
- IND
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-08-21'
description: 'The Income-tax Act 2025, originating as the Income Tax Bill 2025 under the Modi third-term government, replaces and recodifies the Income-tax Act 1961. It consolidates direct-tax law, reorganises
  provisions around the new concessional tax regime, rationalises deductions and definitions, and modernises compliance, assessment, and dispute-management language. The reform is positioned by the government
  as a plain-language codification and simplification exercise rather than a standalone rate-cut statute, but it hardens the post-2020 shift toward a lower-deduction, lower-rate personal-tax regime.

  '

title: India New Income Tax Bill 2025
countries:
- IND
timeframe:
  start: 2024
  end: ongoing
description: 'The Income Tax Bill 2025, presented under the Modi third-term government, proposes to consolidate and simplify direct-tax law in replacement of the Income-tax Act 1961, restructuring the slab
  regime to reinforce the optional concessional "new tax regime," rationalising deductions, and modernising compliance and assessment provisions. The Bill is positioned as the largest direct-tax codification
  effort in six decades.

  '

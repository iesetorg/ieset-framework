  intended: true
  rationale: The reform framework emphasises expenditure control, arrears management, and public-investment prioritisation.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: IMF monitoring identifies fuel and electricity subsidies as fiscal risks to be contained.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Debt transparency, mining-revenue governance, and PFM controls increase formal fiscal accountability.

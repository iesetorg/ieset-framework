title: Guinea IMF staff-monitored reform programme 2024
countries:
- GIN
timeframe:
  start: 2024
  end: 2025
description: 'Guinea''s authorities used the 2024 IMF staff-monitored reform framework and Article IV process to anchor public-finance reforms during the transition. The package focused on domestic revenue
  mobilisation, expenditure control, arrears clearance, public-investment management, debt transparency, fuel and electricity subsidy risks, and governance of mining-related fiscal receipts.

  '

policy_id: belgium_nuclear_repeal_2025
status: candidate
title: Belgium Nuclear Repeal 2025
countries:
- BEL
timeframe:
  start: 2003
  end: ongoing
description: 'Legislative reversal of the 2003 nuclear phase-out announced by the De Wever government in early 2025, removing the statutory ban on new industrial nuclear capacity and the 40-year operating-life
  ceiling. The repeal opens a path for life extensions beyond 2035 and for new reactor projects (including SMRs) to receive licences from FANC, ending the 22-year framework that limited nuclear to phased
  decommissioning.

  '

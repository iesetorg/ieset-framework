description: 'After the unilateral Catalan independence declaration of 27 October 2017, the Rajoy government invoked Article 155 of the 1978 Constitution for the first time, with Senate authorisation, dissolving
  the Generalitat, dismissing President Puigdemont and his cabinet, taking direct control of regional ministries and the Mossos d''Esquadra, and calling 21 December regional elections. Direct rule lasted
  until June 2018.

  '

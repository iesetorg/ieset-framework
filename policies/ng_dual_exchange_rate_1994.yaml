description: 'Abacha''s 1994 budget re-pegged the naira at 22/USD as the official rate while the parallel/autonomous-market rate drifted to 80+/USD. The repeg partially reversed Babangida-era SFEM unification,
  reintroducing rent-allocation opportunities via access to official-rate FX. The distortion compressed non-oil exports and subsidised import-dependent elite sectors.

  '

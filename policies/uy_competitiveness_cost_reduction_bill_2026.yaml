policy_id: uy_competitiveness_cost_reduction_bill_2026
status: candidate
title: Uruguay Competitiveness and Cost Reduction Bill 2026
countries:
- URY
timeframe:
  start: 2026
  end: ongoing
description: 'The Orsi executive presented a Competitiveness and Cost of Living Reduction bill of more than 240 articles for parliamentary submission in June 2026. The proposal bundles maximum response
  deadlines and positive administrative silence, unified registries, customs self-dispatch, electronic notarisation, longer sanitary-registration validity, multiple-importer facilitation, stronger competition-agency
  autonomy, free management tools for micro and small firms, fintech sandboxes, crowdfunding tax incentives, and selected industrial-park and IRAE-exemption changes.

  '
enacted_by:
- uruguay_orsi_fa_2025_present
coalition_label_at_enactment: Frente Amplio (MPP-led, minority congressional position)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Multiple-importer facilitation, antitrust autonomy, and reduced licensing frictions lower entry barriers.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Customs self-dispatch and export-support measures reduce trade-administration costs.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The proposal expands selected IRAE incentive amounts and terms for qualifying projects.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Response deadlines, positive silence, and unified registries increase procedural predictability.

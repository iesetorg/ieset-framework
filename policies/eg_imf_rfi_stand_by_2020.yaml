  rationale: External financing accommodated emergency COVID outlays without crowding out other expenditure.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme conditionality preserved Takaful/Karama scale-up through the pandemic shock.
- axis: regulatory.product_market_competition

policy_id: eg_imf_rfi_stand_by_2020
status: candidate
title: Imf Rfi Stand By 2020
countries:
- EGY
timeframe:
  start: 2018
  end: 2024
description: 'In response to the COVID-19 shock, Egypt accessed roughly USD 2.8bn under the IMF''s Rapid Financing Instrument in May 2020, then signed a 12-month Stand-By Arrangement of about USD 5.2bn
  in June 2020. The package supported balance-of-payments needs from tourism collapse and portfolio outflows while requiring continued primary-balance discipline and structural-reform preservation under
  Sisi''s second term.

  '
enacted_by:
- egypt_sisi_second_term_2018_2024

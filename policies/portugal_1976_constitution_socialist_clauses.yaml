policy_id: portugal_1976_constitution_socialist_clauses
status: candidate
title: Portugal 1976 Constitution Socialist Clauses
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Article-level provisions of Portugal''s 1976 constitution committing the state to a transition to socialism, codifying the irreversibility of the Carnation Revolution-era nationalisations
  and agrarian reforms, and making collective ownership a constitutional principle. The clauses constrained subsequent reform until the 1982 and 1989 constitutional revisions removed most socialist commitments
  to enable EEC accession and market-economy alignment.

  '
enacted_by:
- portugal_carnation_revolution_1974_1986

  intended: true
  rationale: Constitutional irreversibility clauses entrenched state monopolies in nationalised sectors.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Constitutional protection of nationalisations and agrarian collectivisation weakened private-property guarantees.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Initial socialist clauses constrained openness; later constitutional revision enabled EEC accession.
- axis: fiscal.spending_level
  direction: mixed

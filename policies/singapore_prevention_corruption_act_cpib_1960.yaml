policy_id: singapore_prevention_corruption_act_cpib_1960
status: candidate
title: Singapore Prevention of Corruption Act and CPIB strengthening, 1960
countries:
- SGP
timeframe:
  start: 1960
  end: ongoing
description: The Prevention of Corruption Act 1960 strengthened Singapore's anti-corruption powers
  and, under Lee Kuan Yew's government, was paired with an empowered Corrupt Practices Investigation
  Bureau, high civil-service discipline, and prosecution credibility. The policy content moved
  institutional enforcement rather than redistribution or macro demand management.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Anti-corruption investigation and prosecution powers strengthened predictable public
    integrity enforcement.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Credible prosecution and court enforcement were part of the anti-corruption architecture,
    though the broader political system remains contested.
linked_hypotheses:
- singapore_lky_rule_of_law_government_effectiveness_legacy_1996_2024
notes: Legacy WGI evidence is post-1996 and should not be treated as direct causal proof of the
  1960 act.

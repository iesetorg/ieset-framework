policy_id: br_auxilio_brasil_2021
status: candidate
title: Auxílio Brasil — replacement of Bolsa Família
countries:
- BRA
timeframe:
  start: 2021
  end: 2022
  enacted_date: '2021-12-07'
description: 'Medida Provisória 1.061/2021, converted into Lei 14.284/2021, replaced Bolsa Família with Auxílio Brasil, raising the floor benefit to R$400 (later R$600 via PEC Kamikaze / EC 123/2022 in
  election-year 2022). Weakened some of the conditionality-monitoring architecture of Bolsa Família (school attendance / health checks) and expanded targeted top-ups (nutritional, sports, rural). Programme
  was rebranded back to Bolsa Família by Lula III in 2023.

  '
enacted_by:
- brazil_bolsonaro_pl_2019_2022
coalition_label_at_enactment: PL with Centrão partners under Bolsonaro
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  rationale: Floor raised from R$190 (Bolsa Família late 2021) to R$400 then R$600; coverage expanded.
  intended: true
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: PEC Kamikaze (EC 123/2022) breached Teto de Gastos to finance election-year benefit increases.
  intended: true
references:
- Lei 14.284/2021
- Emenda Constitucional 123/2022 (PEC Kamikaze)

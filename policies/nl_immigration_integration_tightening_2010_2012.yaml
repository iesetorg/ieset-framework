description: 'Package of PVV-influenced measures in the Rutte I gedoogakkoord and implementing regulations: tightening of naturalisation requirements (integration-exam fees raised, passage minimums tightened),
  family-reunion income thresholds increased, asylum-procedure acceleration, partial restoration of ''Wet Inburgering'' obligations to newcomers as private obligation (2013 implementation), and proposed
  face-covering ban (legislated later under Rutte III 2018).

  '

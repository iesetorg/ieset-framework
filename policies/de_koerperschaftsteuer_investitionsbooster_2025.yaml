policy_id: de_koerperschaftsteuer_investitionsbooster_2025
status: candidate
title: Corporate tax reduction and Investitionsbooster (accelerated depreciation) 2025
countries:
- DEU
timeframe:
  start: 2025
  end: 2032
  enacted_date: '2025-07-11'
description: 'Steuerliches Investitionssofortprogramm enacted summer 2025: phased reduction of the Körperschaftsteuer (corporate income tax) rate from 15% to 10% between 2028 and 2032 (adding to unchanged
  ~14% municipal Gewerbesteuer), degressive declining-balance depreciation of up to 30% per year for movable capital assets acquired 2025-2027, expanded research-allowance (Forschungszulage), and a super-depreciation
  for e-vehicle business fleets. Stated aim is to restore capex competitiveness relative to US (IRA + TCJA regime) and EU peers. First major supply-side tax package of the Merz era.

  '
enacted_by:
- germany_merz_2025_present
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition

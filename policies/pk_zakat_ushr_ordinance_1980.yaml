status: candidate
title: Zakat and Ushr Ordinance (Pakistan 1980)
countries:
- PAK
timeframe:
  start: 1980
  end: 1980
  enacted_date: '1980-06-20'
description: 'Zakat and Ushr Ordinance of 20 Jun 1980 (enacted as Act 1980) mandated annual 2.5% zakat deduction on bank balances (saving accounts, fixed deposits etc.) of Sunni Muslims above nisab threshold,
  collected centrally by the Central Zakat Council and disbursed through local committees to mustahiqeen. Ushr on agricultural produce at 5% introduced from Mar 1983. Shia exemption after 1980 protests.

  '

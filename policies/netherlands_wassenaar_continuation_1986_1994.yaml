status: candidate
title: Netherlands Wassenaar wage-moderation continuation 1986-1994
countries:
- NLD
timeframe:
  start: 1986
  end: 1994
description: 'Extension of the 1982 Wassenaar-accord wage-moderation framework through the Lubbers II and III terms via tripartite Stichting van de Arbeid recommendations and STAR accords. Real-wage restraint
  sustained in exchange for work-time reduction and employment growth. Underpinned the ''Dutch miracle'' employment expansion cited in 1997 OECD reviews.

  '

description: 'The Chemicals Strategy for Sustainability (COM(2020) 667), part of the European Green Deal, set an agenda for revising the REACH regulation, expanding restrictions on substances of concern
  (PFAS, endocrine disruptors), tightening hazard classifications under CLP, and adopting a "one-substance, one-assessment" framework. It directs subsequent legislative proposals administered by the European
  Chemicals Agency (ECHA) and the Commission to phase out the most harmful chemicals from consumer use.

  '

  end: 2007
  enacted_date: '2001-05-01'
description: 'McCreevy Finance Act 2001 introduced Special Savings Incentive Accounts: state added €1 for every €4 saved (25% grant) up to €254/month for five years, tax-free at maturity. Over 1.1 million
  Irish adults opened SSIAs — ~40% of adult population. Matured 2006-2007 injecting ~€16bn into Irish economy at peak of the housing boom. Widely criticised as pro-cyclical stimulus at the peak of the bubble.

  '

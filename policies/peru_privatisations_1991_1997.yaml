policy_id: peru_privatisations_1991_1997
status: candidate
title: Peru Privatisations 1991 1997
countries:
- PER
timeframe:
  start: 1990
  end: 2000
description: 'Programme of state-owned-enterprise privatisations under the Fujimori administration between 1991 and 1997, conducted by the COPRI privatisation commission and covering telecommunications
  (CPT/ENTEL to Telefónica), electricity, mining (Hierro Perú, Cerro Verde), banking, and other sectors. The process generated material privatisation receipts, restructured network industries, and deepened
  Peru''s market-economy turn following the 1990 Fujishock stabilisation.

  '
enacted_by:
- peru_fujimori_stabilisation_1990_2000
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removal of loss-making SOEs from the public balance sheet reduced subsidies and operating outlays.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: SOE divestment opened the economy to foreign strategic investors particularly in telecoms and mining.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: SOE privatisation introduced new sectoral regulators (Osiptel, Osinerg) and competitive market structures.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatisation receipts and reduced SOE losses removed quasi-fiscal pressure on the central bank.

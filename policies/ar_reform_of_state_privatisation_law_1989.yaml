description: 'Ley 23.696 (Reforma del Estado, 17 August 1989) and Ley 23.697 (Emergencia Económica, 1 September 1989). Declared emergency authority to privatise state enterprises, suspend industrial- promotion
  subsidies, and transform the public sector. Triggered privatisations of ENTel (telecoms, 1990), Aerolíneas Argentinas (1990), YPF (partial 1993 IPO for $3B — largest LatAm IPO to that date), Gas del Estado
  (1992), SEGBA electric (1992), railways (1992-93), and Obras Sanitarias (1993). Proceeds ~$18B 1990-94.

  '

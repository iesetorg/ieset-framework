policy_id: germany_hartz_reforms_2003_2005
status: candidate
title: Hartz I-IV labour market reforms 2003-2005
countries:
- DEU
timeframe:
  start: 2003
  end: 2005
  enacted_date: '2005-01-01'
description: 'Four-stage restructuring of German unemployment insurance + labour- market activation. Hartz I-II (2003) created temporary-agency liberalisation + mini-jobs. Hartz III (2004) restructured
  the Federal Employment Office. Hartz IV (2005) merged long-term unemployment benefit with means-tested social assistance at a reduced flat rate, with work-activation requirements. Named after commission
  chair Peter Hartz (VW HR chief). Credited by most empirical post-hoc analyses with the 2005-2015 German labour- market outperformance vs European peers. Refinement D.3.1 canonical case: market-oriented
  reform implemented by centre-left SPD-Green coalition.

  '
enacted_by:
- germany_schroder_red_green_1998_2005
coalition_label_at_enactment: SPD-Green (centre-left)
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  intended: true
  rationale: Temp-agency deregulation + mini-jobs + reduced long-term unemployment benefit duration.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Hartz IV flat-rate reduced prior earnings-linked unemployment generosity.

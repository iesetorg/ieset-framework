description: 'Medifund was established in 1993 as the third pillar of Singapore''s "3M" healthcare financing framework (alongside Medisave and MediShield). Funded by a government endowment whose investment
  income covers hospital bills for citizens who exhaust other means, it is administered by hospital-level Medifund Committees as a discretionary safety-net rather than an entitlement programme.

  '

description: 'National Reconciliation Ordinance (NRO) promulgated 5 October 2007 by President Musharraf. Granted blanket amnesty withdrawing corruption and criminal cases against politicians, bureaucrats,
  and businessmen filed 1986-1999. ~8,000 individuals benefited; ~3,478 cases closed including those against Benazir Bhutto, Asif Ali Zardari, Altaf Hussain. Designed to enable Bhutto''s return from exile
  (which she did 18 October 2007) and engineer a Musharraf-Bhutto power-sharing arrangement pre- election. Struck down by reinstated Supreme Court in Dr Mobashir Hassan v Federation 16 December 2009 (under
  post-Lawyers''- Movement CJ Iftikhar Chaudhry), voiding all closures.

  '

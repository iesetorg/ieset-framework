policy_id: uk_imf_standby_1976
status: candidate
title: Imf Standby 1976
countries:
- GBR
timeframe:
  start: 1976
  end: 1979
description: 'The Callaghan government''s December 1976 Stand-By Arrangement with the IMF, providing a USD 3.9bn facility against sterling-crisis pressures and conditional on quantitative ceilings on Domestic
  Credit Expansion, the PSBR, and Sterling M3 growth. The Letter of Intent committed the Treasury to public-spending cuts and tighter monetary control, marking the canonical pivot in UK macro policy from
  Keynesian demand management toward monetary discipline.

  '
enacted_by:
- uk_callaghan_imf_1976
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: PSBR ceilings under the Letter of Intent forced GBP 2.5bn of spending cuts in the December 1976 mini-budget.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sterling M3 and DCE quantitative limits formalised tighter Bank of England operating stance.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Conditionality bound the Treasury, leaving Bank's existing operational subordination unchanged.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: IMF programme focused on macro aggregates; labour-market structural reform was not part of conditionality.

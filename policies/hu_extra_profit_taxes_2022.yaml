policy_id: hu_extra_profit_taxes_2022
status: candidate
title: Extra-profit sectoral taxes (Hungary, 2022)
countries:
- HUN
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-06-04'
description: 'Package of sector-specific ''extra-profit'' taxes imposed by Government Decree 197/2022 (VI.4.) in early June 2022 and subsequently renewed and expanded. Targeted banks, insurers, energy producers
  and suppliers, retail chains, telecoms, airlines, and pharmaceutical firms with turnover- or volume-based levies calibrated to capture inflation- and war-era windfalls; rates and bases varied by sector
  (e.g. credit- institution levy on net interest and fee income; 31% mining-royalty surcharge for hydrocarbon producers; retail turnover levy tiered to ~4.5%; airline passenger fee of 3,900-9,750 HUF per
  passenger). Enacted under special legal order (veszélyhelyzet / state of danger) allowing government decree without parliamentary vote; renewed for 2023 and 2024 with adjustments, partially phased down
  for banks in 2024 against government-bond holdings.

  '
enacted_by:
- hungary_orban_fourth_term_2022_present
coalition_label_at_enactment: Fidesz–KDNP fourth-term supermajority
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: strong
  intended: true
  rationale: Layered sector-specific levies on top of 9% headline corporate rate; effective burden on affected sectors materially higher.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Turnover-based levies on retail and telecom sectors with foreign-owned incumbents raise entry barriers and incentivise ownership consolidation toward state-aligned buyers.
references:
- Government Decree 197/2022 (VI.4.) on extra-profit taxes and subsequent amending decrees 496/2022, 206/2023

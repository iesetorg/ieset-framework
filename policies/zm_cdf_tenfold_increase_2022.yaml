policy_id: zm_cdf_tenfold_increase_2022
status: candidate
title: Zambia Constituency Development Fund tenfold increase 2022
countries:
- ZMB
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-01-01'
description: 'Zambia''s 2022 budget sharply increased annual Constituency Development Fund allocations, moving CDF from a small local-grant line into a central instrument for constituency-level infrastructure,
  school bursaries, skills grants, and community projects. The reform decentralised part of the public investment and social-support budget to local committees while retaining national rules for eligible
  spending, procurement, and reporting.

  '
enacted_by:
- zambia_hichilema_upnd_2021_present
scope: national
coalition_label_at_enactment: UPND Hichilema government
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: The allocation increase materially expanded constituency-level public spending and local capital grants.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Bursaries, skills grants, and community support under CDF expanded near-cash and in-kind local benefits.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Moving local projects into a statutory fund with published eligible uses and reporting rules made discretionary local spending more auditable.
references:
- Zambia Ministry of Finance and National Planning, 2022 Budget Address and CDF allocation materials.
- Zambia Constituency Development Fund guidelines and decentralisation circulars, 2022-2024.
- Local Government Association of Zambia and Ministry of Local Government CDF implementation materials, 2022-2024.

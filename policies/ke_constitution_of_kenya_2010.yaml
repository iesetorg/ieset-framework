description: 'New constitution promulgated 27 Aug 2010 after 68.6% Yes in 4 Aug 2010 referendum. Established 47 county devolved government, expanded Bill of Rights, created Supreme Court, Judicial Service
  Commission, and independent offices (Auditor-General, Controller of Budget, Ethics and Anti-Corruption Commission, NGEC, NPS). Ended imperial presidency model with reduced executive discretion.

  '

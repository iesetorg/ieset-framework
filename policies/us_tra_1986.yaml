title: Tra 1986
countries:
- USA
timeframe:
  start: 1981
  end: 1986
description: 'The Tax Reform Act of 1986 collapsed the federal individual income tax bracket structure to two rates (15 and 28 percent), broadened the base by curtailing tax shelters and passive-loss deductions,
  lowered the top corporate rate from 46 to 34 percent, and equalised treatment of ordinary and capital gains income. Designed as a revenue-neutral simplification, it was the signature bipartisan tax reform
  of the Reagan era and was preceded by the 1981 ERTA rate cuts.

  '

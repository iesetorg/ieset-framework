policy_id: et_telecoms_liberalisation_2021
status: candidate
title: Telecoms liberalisation (Safaricom licence, Ethio Telecom partial IPO)
countries:
- ETH
timeframe:
  start: 2021
  end: 2024
  enacted_date: '2021-05-22'
description: 'Ethiopian Communications Authority awarded the Global Partnership for Ethiopia consortium (Safaricom, Vodacom, Vodafone, Sumitomo, CDC) a nationwide telecoms licence for $850m on May 22 2021;
  commercial launch Oct 6 2022. A second licence round for a mobile-money provider followed 2022; Safaricom M-PESA launched Aug 2023. Ethio Telecom partial IPO opened to retail investors Oct 2024 selling
  10% to Ethiopian citizens via the new Ethiopian Securities Exchange pipeline. Ends six decades of Ethio Telecom monopoly.

  '

policy_id: uae_dirham_peg_1997
status: candidate
title: Dirham Peg 1997
countries:
- ARE
timeframe:
  start: 1971
  end: ongoing
description: 'Formal pegging of the UAE dirham to the US dollar at AED 3.6725 per USD by the UAE Central Bank, consolidating a de facto peg that had operated since the dirham''s 1973 introduction. The fixed-rate
  regime imports US monetary policy via the impossible-trinity logic, anchoring inflation expectations and providing exchange-rate certainty for the oil-export economy and dollar-denominated trade flows.

  '
enacted_by:
- uae_emirate_state_capitalism_1971_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Stable peg removes FX uncertainty as a barrier to foreign entrants in tradable sectors.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Dollar peg eliminates currency risk for the dollar-invoiced oil and re-export trade hub.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Peg-anchored macro stability complemented the no-tax fiscal regime in attracting headquarters capital.
- axis: monetary.central_bank_independence
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Hard peg subordinates UAE monetary policy to the Federal Reserve, sacrificing autonomy for credibility.

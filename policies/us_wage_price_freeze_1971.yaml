policy_id: us_wage_price_freeze_1971
status: candidate
title: Wage Price Freeze 1971
countries:
- USA
timeframe:
  start: 1971
  end: 1974
description: 'On August 15, 1971 President Nixon, invoking authority under the Economic Stabilization Act of 1970, imposed a 90-day freeze on wages and prices, suspended dollar convertibility into gold,
  and applied a 10 percent import surcharge. The freeze (Phase I) was followed by Phases II-IV with graduated decontrol through April 1974, administered through the Cost of Living Council and Pay and Price
  Commissions. The package responded to mounting inflation and balance-of-payments stress.

  '

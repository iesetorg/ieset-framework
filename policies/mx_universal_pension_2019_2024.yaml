policy_id: mx_universal_pension_2019_2024
status: candidate
title: Universal non-contributory pension for over-65s (Mexico)
countries:
- MEX
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2020-05-08'
description: 'Pensión para el Bienestar de las Personas Adultas Mayores — universal, non-contributory cash transfer to all adults over 65 (lowered from 68 in 2022), constitutionalised via reform to Art.
  4 (DOF 8-may-2020). Starting benefit ~MXN 1,275/bimester in 2019; doubled and re-doubled across the term to ~MXN 6,000/bimester by 2024. Sheinbaum extended a companion programme to women 60-64 in 2025.
  Architecturally distinct from the contributory IMSS / ISSSTE pensions, which continue alongside.

  '

policy_id: th_agriculture_debt_moratorium_2000
status: candidate
title: Thailand small-farmer debt moratorium (2000-2001)
countries:
- THA
timeframe:
  start: 2000
  end: 2001
  enacted_date: '2000-10-26'
description: 'Small-farmer debt moratorium adopted October 2000 by Chuan II cabinet in response to rural distress post-1997 crisis. Bank for Agriculture and Agricultural Cooperatives (BAAC) extended 3-year
  suspension of debt service (principal + interest) for farmers with loans below Bt 100,000 meeting hardship criteria; interest-rate subsidy component. ~2.3m small farmers covered; programme continued under
  Thaksin who expanded it into the 2001 Farmers'' Debt Moratorium. Precursor to Thaksin-era rural- populist programmes; helped set the political stage for January 2001 TRT landslide.

  '
enacted_by:
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: Democrat-led coalition
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Interest-and-principal suspension plus subsidy to ~2.3m small-farmer households.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: BAAC credit-subsidy fiscal cost ~Bt 10bn over three-year period.
references:
- Cabinet Resolution on BAAC Debt Moratorium, 26 October 2000
- BAAC Annual Reports 2000-2003

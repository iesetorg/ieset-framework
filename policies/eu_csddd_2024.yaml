description: 'Directive (EU) 2024/1760 — the Corporate Sustainability Due Diligence Directive (CSDDD) — requires large EU and qualifying non-EU companies to identify, prevent, and mitigate adverse human
  rights and environmental impacts across their chains of activity, adopt climate transition plans aligned with 1.5C, and faces civil liability for failures. Member states must transpose by 2026 with phased
  application by company size, enforced by national supervisory authorities.

  '

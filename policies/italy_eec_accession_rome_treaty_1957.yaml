policy_id: italy_eec_accession_rome_treaty_1957
status: candidate
title: Italy Eec Accession Rome Treaty 1957
countries:
- ITA
timeframe:
  start: 1950
  end: 1970
description: 'As one of the six founding members of the European Economic Community, Italy signed the 25 March 1957 Treaty of Rome, which created a customs union with phased internal-tariff elimination,
  a common external tariff, the Common Agricultural Policy, and free movement of goods, workers, capital and services. EEC accession integrated northern Italian manufacturers into a much larger continental
  market and is widely credited as a structural driver of the 1958–63 acceleration phase of the Italian economic miracle.

  '
enacted_by:
- italian_economic_miracle_1950_1970
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Customs-union membership eliminated bilateral tariff barriers with the largest continental partners.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: EEC harmonisation pruned national licensing schemes inconsistent with single-market rules.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: External-sector discipline embedded in EEC obligations strengthened the lira's anchoring framework.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Common Agricultural Policy transfers became a major sectoral support to Italian farming.

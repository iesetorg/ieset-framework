title: New Computer Policy (India 1984)
countries:
- IND
timeframe:
  start: 1984
  end: 1984
  enacted_date: '1984-11-19'
description: 'Announced 19 Nov 1984 (Indira-approved, Rajiv-Gandhi-championed), the New Computer Policy delicensed computer manufacturing, reduced import tariffs on components, removed MRTP Act restrictions
  on large firms entering computing, and allowed 100% export-oriented units. Opened the Indian domestic computer industry to competition and foreign technology; precursor to the New Telecom Policy 1986
  and 1991 liberalisation.

  '

description: 'Snowy 2.0 pumped-hydro expansion to the Snowy Mountains Scheme, a 2,000 MW / 350 GWh project announced 16 March 2017 by the Turnbull government. Funded through Snowy Hydro Limited following
  Commonwealth buyout of NSW and Victorian state shares (completed 2018) at A$6.2bn. Project subsequently ran over budget and schedule (revised cost estimate ~A$12bn, commissioning deferred to 2028-29).
  Represents recapitalisation of a state enterprise for long-duration storage, ahead of the NEG withdrawal.

  '

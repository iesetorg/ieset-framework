policy_id: italy_telecom_italia_ownership_defense_1999
status: candidate
title: Italy Telecom Italia Ownership Defense 1999
countries:
- ITA
timeframe:
  start: 1998
  end: 2001
description: 'When Olivetti launched a hostile tender offer for the recently privatised Telecom Italia in February 1999, the D''Alema government and Banca d''Italia played an active backstage role in shaping
  outcomes — first through the failed defensive merger with Deutsche Telekom (the "Galileo" project) and ultimately accepting the Olivetti–Roberto Colaninno takeover via debt-financed acquisition. The episode
  highlighted Italy''s ad-hoc treatment of large privatised firms'' ownership and influenced subsequent regulation of cross- shareholding and golden-share regimes.

  '
enacted_by:
- italy_dalema_amato_centre_left_1998_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Hostile-takeover acceptance signalled openness to ownership change in privatised industries.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Highly leveraged acquisition produced interest-deduction tax effects favouring high-net-worth shareholders.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Precedent led to subsequent state-supported corporate restructurings with implicit subsidy effects.

policy_id: ie_bailout_exit_2013
status: candidate
title: Bailout Exit 2013
countries:
- IRL
timeframe:
  start: 2011
  end: 2017
description: 'In December 2013 Ireland exited the EU/IMF/ECB Programme of Financial Support without precautionary credit-line backstop, becoming the first euro-area programme country to do so. The exit
  was achieved after meeting the programme''s fiscal-consolidation, structural-reform, and bank-recapitalisation conditions while preserving the 12.5% corporate tax rate, and was followed by sovereign market
  re-entry on improving spreads.

  '

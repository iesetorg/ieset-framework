description: 'Treasury Laws Amendment (Personal Income Tax Plan) Act 2018 legislated a seven-year three-stage personal income tax package: Stage 1 targeted low- and middle-income tax offset (LMITO); Stage
  2 bracket-threshold rises from 1 July 2022; Stage 3 removal of the 37% bracket and flat 30% rate from A$45k to A$200k scheduled for 1 July 2024. Stage 2 and Stage 3 were subsequently accelerated (October
  2020 budget) and Stage 3 redesigned by Labor (February 2024) before commencement.

  '

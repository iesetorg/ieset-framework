policy_id: argentina_cepo_cambiario_2011_2015
status: candidate
title: Argentina Cepo Cambiario 2011 2015
countries:
- ARG
timeframe:
  start: 2003
  end: 2015
description: 'Foreign-exchange controls imposed by the Fernández de Kirchner government beginning in October 2011 through AFIP and BCRA resolutions, restricting access to dollars for savings, imports, and
  travel. Mechanism combined administrative pre-approval of dollar purchases, import-licence rationing, and a widening gap between official and parallel ("blue") exchange rates. Intended to defend reserves
  and the managed peso peg amid capital flight; produced large parallel-market premia and import bottlenecks.

  '
enacted_by:
- kirchner_fernandez_expansionary_2003_2015
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Multiple-rate FX regime created quasi-fiscal subsidies through BCRA differential dollar sales.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Implicit transfer to importers and authorised firms via access to subsidised official-rate dollars.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary import licensing (DJAI) and FX rationing distorted entry and competition across sectors.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCRA reserve management subordinated to political FX rationing; institutional autonomy eroded.

policy_id: ng_electricity_act_2023
status: candidate
title: Electricity Act 2023 (state-level power market decentralisation)
countries:
- NGA
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-06-09'
description: 'The Electricity Act signed 9 June 2023 repealed the 2005 EPSR Act and operationalised the 2022 constitutional amendment permitting states to license generation, transmission, and distribution
  within their borders. Enabled Lagos, Edo, Ondo, Enugu and others to take over intrastate regulation from NERC. Complemented April 2024 by the move to cost- reflective tariffs for Band A urban consumers
  (~20% of customers, ~40% of demand), ending cross-subsidy from generation companies.

  '
enacted_by:
- nigeria_tinubu_apc_2023_present
coalition_label_at_enactment: APC
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: State-level market entry breaks NERC/DisCo monopsony structure.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Band A cost-reflective tariff ends cross-subsidy; Federation-level subsidy residue only.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Multi-tier licensing framework across federal and state.

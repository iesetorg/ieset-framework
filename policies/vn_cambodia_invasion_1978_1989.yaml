description: 'Vietnamese People''s Army invasion of Democratic Kampuchea on 25 Dec 1978 overthrew the Khmer Rouge regime by 7 Jan 1979, installing the People''s Republic of Kampuchea under Heng Samrin.
  Occupation force peaked at ~180,000 troops. Provoked 17 Feb-16 Mar 1979 Chinese ''punitive war'' along Vietnam''s northern border. International sanctions and US/ASEAN/China-backed Khmer Rouge coalition-of-exile
  sustained conflict until Vietnamese withdrawal Sep 1989. Absorbed ~20% of national budget through the 1980s.

  '

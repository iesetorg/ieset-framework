policy_id: lk_soe_reform_act_2024
status: candidate
title: State-Owned Enterprise restructuring framework (Sri Lanka 2023-2024)
countries:
- LKA
timeframe:
  start: 2023
  end: 2024
description: 'Restructuring framework for Sri Lanka''s 52 strategic SOEs under the IMF EFF. Establishes a SOE Restructuring Unit under the Ministry of Finance; mandates cost-recovery electricity tariffs
  (CEB tariff hikes Aug 2022, Feb 2023, Jul 2023) and fuel pricing formula (CPC); initiates divestment of SriLankan Airlines, Hotels Corporation, and selected non-strategic SOEs. Partially paused / reframed
  under the Dissanayake NPP government from late 2024 toward "public-wealth optimisation" with restructuring-over- divestment emphasis.

  '
enacted_by:
- srilanka_wickremesinghe_unp_2022_2024
- srilanka_dissanayake_npp_2024_present
coalition_label_at_enactment: UNP minority

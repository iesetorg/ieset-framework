  intended: true
  rationale: Divestment pipeline + cost-recovery tariffs reduce entry barriers.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cost-recovery pricing reduces cross-subsidy burden.

policy_id: denmark_flexicurity_1994
status: candidate
title: Danish flexicurity labour-market reform 1993-1994
countries:
- DNK
timeframe:
  start: 1993
  end: 1999
  enacted_date: '1994-01-01'
description: 'Under PM Poul Nyrup Rasmussen (Social Democrats) + Labour Minister Jytte Andersen, Denmark formalised the ''flexicurity'' model: weak employment-protection law (easy firing) combined with
  generous unemployment insurance (up to 90% wage replacement short-run, eventually reduced) and active labour-market policy (ALMP — training + activation + job-matching services). Denmark''s approach became
  the canonical contrast to continental EU employment- protection-heavy models. Refinement D.2.9 explicitly cites Denmark pioneering flexicurity as a Nordic labour-market- flexibility feature distinguishing
  it from France / Italy.

  '

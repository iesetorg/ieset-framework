policy_id: malaysia_look_east_policy_1981
status: candidate
title: Malaysia Look East Policy 1981
countries:
- MYS
timeframe:
  start: 1981
  end: 2003
description: 'Announced by Mahathir shortly after taking office in 1981, the Look East Policy reoriented Malaysia''s industrial development model toward Japanese and South Korean templates — emphasising
  work ethic, in-house training, keiretsu/chaebol-style conglomerates, and government-business coordination. Operationally it manifested through training scholarships in Japan and Korea, technology-transfer
  joint ventures, and the alignment of HICOM heavy-industry projects with East Asian developmental practice.

  '

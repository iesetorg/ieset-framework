title: CBN naira redesign and cash-swap demonetisation
countries:
- NGA
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2022-10-26'
description: 'CBN announced on 26 October 2022 the redesign of N200, N500 and N1,000 notes and withdrawal of legacy notes by a 31 January 2023 deadline (later extended). Combined with a N100,000/week individual
  cash-withdrawal cap. Implementation during the February 2023 presidential election campaign created acute cash scarcity, queues at ATMs, and riots; Supreme Court ruled in March 2023 that legacy notes
  remained legal tender until end-2023. Widely alleged to have been politically motivated against the APC presidential campaign''s reliance on cash mobilisation.

  '

policy_id: portugal_agrarian_reform_1975
status: candidate
title: Portugal Agrarian Reform 1975
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portuguese agrarian reform of 1975 carried out under the post-revolutionary provisional governments, which expropriated large estates concentrated in the Alentejo region and reorganised them
  into cooperatives and collective production units. The reform was driven by Decree-Law 406-A/75 and subsequent decrees; from the late 1970s land was progressively returned to former owners under the 1977
  Lei Barreto and through the 1980s as the constitutional framework was revised.

  '
enacted_by:
- portugal_carnation_revolution_1974_1986
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: State direction of cooperatives via the IRA and Ministry of Agriculture imposed centralised sectoral controls.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mass expropriation of Alentejo latifundia without market-rate compensation reduced private-property security.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Cooperatives operated under preferential domestic procurement before EEC accession opened agriculture to imports.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Subsidy support to cooperatives raised agricultural outlays while restitution unwound spending later.

  rationale: Statutory governance of the fund within the central bank reinforced rules-based reserve management.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Clear ring-fencing of long-term assets and well-defined claims supported credibility with investors.
- axis: fiscal.spending_level

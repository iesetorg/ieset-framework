policy_id: botswana_pula_fund
status: candidate
title: Botswana Pula Fund
countries:
- BWA
timeframe:
  start: 1966
  end: ongoing
description: 'The Pula Fund, established in 1994 and managed by the Bank of Botswana, is the country''s long-term sovereign wealth fund holding the share of foreign exchange reserves judged surplus to short-term
  import-cover needs. Invested abroad in equities, fixed-income and alternatives under a conservative mandate set with the Ministry of Finance, it sterilises mineral inflows, smooths real-exchange-rate
  appreciation, and saves a portion of finite diamond rents for future generations within Botswana''s broader fiscal-rule framework.

  '
enacted_by:
- botswana_sacu_diamond_institutional_success_1966_present

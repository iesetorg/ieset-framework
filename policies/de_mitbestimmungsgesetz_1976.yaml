timeframe:
  start: 1976
  end: 1976
  enacted_date: '1976-05-04'
description: 'Extended parity co-determination on supervisory boards to all companies with more than 2000 employees. Shareholders and employees each elect half the supervisory board, with the chair (shareholder-
  side) holding a tie-breaking vote. Consolidated post-war German industrial-relations model. Constitutional Court upheld the law in 1979 (BVerfGE 50, 290). Canonical institutional feature of the German
  variety of capitalism.

  '

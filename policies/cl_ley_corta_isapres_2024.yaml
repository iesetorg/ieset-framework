policy_id: cl_ley_corta_isapres_2024
status: candidate
title: Ley Corta Isapres 2024
countries:
- CHL
timeframe:
  start: 2022
  end: ongoing
description: '''Ley corta de isapres'' enacted in 2024 in response to a 2022 Supreme Court ruling voiding the risk-rating tables of private health insurers (isapres), establishing a multi-year repayment
  schedule for over-charged premiums and a transitional regulatory framework for the sector. Aimed to prevent insurer insolvency while implementing the court''s equalisation ruling under the Boric government.

  '
enacted_by:
- chile_boric_ad_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Repayment-fund design imposed an effective levy on insurer surplus to cover premium refunds.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Premium rebalancing favoured older/higher-risk insureds while raising rates on younger cohorts.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandated repayments to overcharged affiliates functioned as a quasi-transfer programme.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter isapres regulation limited employer-paid health coverage flexibility in compensation packages.

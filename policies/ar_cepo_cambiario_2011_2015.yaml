policy_id: ar_cepo_cambiario_2011_2015
status: candidate
title: Cepo cambiario — FX controls regime
countries:
- ARG
timeframe:
  start: 2011
  end: 2015
  enacted_date: '2011-10-28'
description: '28 Oct 2011 AFIP + BCRA introduced FX-purchase-approval regime ("cepo"): individuals required AFIP validation of fiscal capacity to buy USD, limits on savings + travel + imports, DJAI import-declaration
  regime Feb 2012, DJAS services. Parallel "dólar blue" market emerged with spread peaking ~80% (Sep 2014) vs official rate. Reserves fell from USD 52bn (Jan 2011) to USD 25bn (Dec 2015). Lifted Dec 2015
  under Macri as first major act, reimposed Sep 2019 then expanded by Alberto Fernández.

  '

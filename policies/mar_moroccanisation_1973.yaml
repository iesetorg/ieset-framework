# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mar_moroccanisation_1973
status: candidate
title: Morocco Moroccanisation law 1973
countries: [MAR]
timeframe: {start: 1973, enacted_date: "1973-03-02"}
description: >
  The 1973 Moroccanisation programme required majority Moroccan ownership in a
  range of commercial, industrial, and service activities formerly dominated by
  foreign owners. In practice it transferred assets toward politically
  connected domestic groups and reinforced palace-mediated allocation in the
  mixed economy.
enacted_by:
  - morocco_hassan_ii_monarchy_mixed_economy_1956_1999
axes_moved:
  - axis: institutional.property_rights
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Compulsory ownership transfer increased foreign-investor expropriation and discretion risk."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Asset transfer favoured approved domestic owners rather than open entry."
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Economic nationalism reduced openness to foreign participation in affected sectors."
references:
  - "Law No. 1-73-210 on Moroccanisation, 2 March 1973"
  - "Waterbury (1975), 'Endemic and Planned Corruption in a Monarchical Regime'"

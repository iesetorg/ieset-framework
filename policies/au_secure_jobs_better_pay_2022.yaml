description: 'Fair Work Legislation Amendment (Secure Jobs, Better Pay) Act 2022 restored multi-employer bargaining streams (single-interest, supported, cooperative), expanded the Fair Work Commission''s
  arbitration powers over intractable disputes, prohibited pay secrecy clauses, narrowed the statutory definition of casual employment, and introduced flexible-work and anti-sexual-harassment obligations.
  Largest Fair Work Act amendment since 2009.


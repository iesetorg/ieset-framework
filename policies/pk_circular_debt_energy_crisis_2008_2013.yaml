policy_id: pk_circular_debt_energy_crisis_2008_2013
status: candidate
title: Circular Debt Energy Crisis 2008 2013
countries:
- PAK
timeframe:
  start: 2008
  end: 2013
description: 'Pakistan''s energy-sector "circular debt" crisis under the PPP-led Gilani–Zardari government (2008–2013), in which under-recovery of tariffs, theft, and unpaid government bills accumulated
  as cross-claims among IPPs, distribution companies, and state oil and gas suppliers. The crisis produced chronic load-shedding, repeated treasury bailouts to clear debt stock, and a binding constraint
  on output that shaped the subsequent IMF programme and Sharif-era reforms.

  '
enacted_by:
- pakistan_gilani_zardari_ppp_2008_2013
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: NEPRA tariff determinations and Supreme Court oversight of subsidy mechanisms strengthened formal-rule discipline.
- axis: institutional.property_rights
  direction: '0'
  magnitude: weak
  intended: true
  rationale: IPP contracts honoured in headline terms but recurring late payment created de facto receivable haircuts.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Tariff Differential Subsidy and recurrent debt-clearance settlements operated as large transfers to power sector.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Repeated bailouts to retire arrears swelled total federal outlays and crowded out other spending.

policy_id: us_securities_exchange_act_1934
status: candidate
title: Securities Exchange Act 1934
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The Securities Exchange Act of 6 June 1934, signed by President Roosevelt, established the Securities and Exchange Commission, regulated secondary-market trading on national exchanges, required
  periodic disclosure (10-K, 10-Q, 8-K), governed proxy solicitation, prohibited manipulative practices (Section 9, later Rule 10b-5), and gave the SEC oversight of broker-dealers and self-regulatory organisations.
  The intended effect was to complement the 1933 Act''s primary-market disclosure with continuous secondary-market regulation, restore investor confidence shattered by the 1929 crash, and provide federal
  oversight of US securities markets that became the foundation of post-war American capital-market dominance.

  '

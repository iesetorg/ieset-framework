title: Japan Political Reform Four Laws 1994
countries:
- JPN
timeframe:
  start: 1994
  enacted_date: '1994-01-29'
description: 'Four-law package passed 29 Jan 1994 under the Hosokawa coalition overhauling Japan''s electoral system. Replaced House of Representatives multi-member single-non-transferable-vote (SNTV) districts
  with mixed single-member-district + proportional- representation system (300 SMD + 200 PR). Also amended Political Funds Control Law and Public Office Election Law, and introduced Political Parties Subsidies
  Law providing state party funding. Aimed at reducing intra-party faction competition and money-politics; seen as structurally enabling post-1994 party realignments.

  '

policy_id: es_eu_banking_mou_bailout_2012
status: candidate
title: Eu Banking Mou Bailout 2012
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
description: 'Signed in July 2012, the Memorandum of Understanding between Spain and Eurogroup creditors made up to EUR 100bn of ESM/EFSF funds available for bank recapitalisation, conditional on a triage
  of cajas (Group 1–4), creation of the Sareb bad bank, burden-sharing with junior bondholders, and adoption of EU-aligned banking-supervision rules. Spain ultimately drew about EUR 41bn.

  '
enacted_by:
- spain_rajoy_pp_first_2011_2015
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: MoU conditionality reinforced the broader austerity envelope on non-bank-resolution spending.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Restructured banks shed staff at scale, complementing the 2012 labour reform's flexibility push.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: MoU forced tighter capital, governance, and Banco de España supervisory powers over surviving banks.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Retail-investor losses on preferentes and subordinated debt fell heavily on middle-income households.

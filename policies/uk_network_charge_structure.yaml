policy_id: uk_network_charge_structure
status: candidate
title: Network Charge Structure
countries:
- GBR
timeframe:
  start: 2021
  end: ongoing
description: 'The UK''s electricity transmission and distribution charging methodology, set under Ofgem''s RIIO price controls, recovers regulated network revenue plus environmental and social levies (including
  renewables obligation, contracts-for-difference, capacity market, and energy-bill support) through Use of System charges. The structure loads decarbonisation policy costs onto retail electricity bills,
  raising effective consumer prices independent of wholesale gas dynamics.

  '
enacted_by:
- uk_energy_cost_regime_2021_2024
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Network charges fund renewables obligation and CfD payments, raising effective carbon-policy cost on consumers.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Charge structure prioritises renewables levies over capacity-payment differentials for firm dispatchable supply.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Use-of-system charges recover billions in renewables-support obligations as quasi-fiscal subsidies.

policy_id: venezuela_price_controls_food_2003
status: candidate
title: Venezuela Price Controls Food 2003
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'In February 2003 the Chavez government imposed price controls on a basic basket of essential goods including flour, milk, sugar, oil, and meat, alongside the FX-control regime. Enforcement
  was administered by INDEPABIS (later SUNDDE), which conducted inspections and could fine or expropriate non-compliant retailers. The regime expanded over time to additional goods and contributed to chronic
  shortages, smuggling, and parallel pricing.

  '

policy_id: venezuela_price_controls_food_2003
status: candidate
title: Venezuela Price Controls Food 2003
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'In February 2003 the Chavez government imposed price controls on a basic basket of essential goods including flour, milk, sugar, oil, and meat, alongside the FX-control regime. Enforcement
  was administered by INDEPABIS (later SUNDDE), which conducted inspections and could fine or expropriate non-compliant retailers. The regime expanded over time to additional goods and contributed to chronic
  shortages, smuggling, and parallel pricing.

  '
enacted_by:
- venezuela_chavismo_bolivarian_1999_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Below-market controls drove producer exits, smuggling to neighbours, and chronic shortages of staples.
- axis: regulatory.price_control_intensity
  direction: +
  magnitude: strong
  intended: true
  rationale: Broad statutory essential-goods price controls with SUNDDE/INDEPABIS enforcement, inspections, fines, forced sales, and expanding controlled baskets.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: SUNDDE inspections empowered confiscation, fines, and forced sale at non-remunerative prices.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary enforcement and escalating criminal penalties under "economic war" decrees overrode commercial law.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Suppressed CPI dynamics complicated BCV inflation-targeting capacity and statistical independence.
evaluation_design:
  design_features:
  - controlled_vs_uncontrolled_categories
  - border_comparison
  - high_frequency_event_study
  - welfare_accounting
  - distributional_decomposition
  - quality_margin
  - leakage_substitution
  regulated_units:
  - controlled staple-food basket
  - retailers subject to INDEPABIS/SUNDDE enforcement
  exempt_or_uncontrolled_units:
  - non-controlled food substitutes
  - informal and parallel-market sellers
  - cross-border resale channels
  comparison_markets:
  - controlled staples vs uncapped substitutes
  - Venezuela border regions vs interior markets
  - Colombia border resale channels
  event_dates:
  - 2003-02 price controls imposed
  - 2011 Ley de Costos y Precios Justos
  - 2014 Ley Orgánica de Precios Justos enforcement expansion
  second_order_outcomes:
  - controlled-staple stockouts
  - official vs parallel price premia
  - producer exits and imports
  - smuggling and border leakage
  - enforcement actions, fines, confiscations, and forced sales
  - quality or product-size deterioration
  distributional_groups:
  - covered urban consumers
  - consumers without rationed access
  - producers and retailers
  - informal intermediaries
  - enforcement targets
  known_data_gaps:
  - consistent monthly controlled-basket shelf availability
  - category-level official vs parallel prices
  - enforcement action microdata
  notes: 'National CPI is not enough here. The policy requires controlled-vs- uncontrolled category and border-leakage measurement to separate first- order price suppression from scarcity, informalization,
    and quality loss.

    '

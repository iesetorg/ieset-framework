timeframe:
  start: 2009
  end: 2011
description: 'The May 2010 Memorandum of Understanding signed between Greece, the European Commission, the ECB, and the IMF (Troika) committed Greece to roughly EUR 110 billion in conditional loans against
  an austerity programme of public-sector wage and pension cuts, VAT rate increases to 23%, structural labour-market reforms, and accelerated privatisations. It was the first sovereign euro-area bailout
  and benchmark for subsequent peripheral programmes.

  '

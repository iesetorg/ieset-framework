policy_id: mx_autonomous_bodies_abolition_2024
status: candidate
title: Mexican simplificación orgánica — abolition of autonomous regulators (2024)
countries:
- MEX
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-20'
description: 'Constitutional "simplificacion organica" reform abolishing seven constitutionally autonomous bodies: INAI for transparency and data protection, Cofece for competition, IFT for telecoms and
  broadcasting, CRE for energy regulation, CNH for hydrocarbons, Coneval for social-policy evaluation, and Mejoredu for education evaluation. Their functions were reassigned to executive-branch ministries
  or successor administrative units, including economy, energy, anti-corruption, welfare, and education institutions, under the government''s administrative-simplification frame.

  '

policy_id: mx_autonomous_bodies_abolition_2024
status: candidate
title: Mexican simplificación orgánica — abolition of autonomous regulators (2024)
countries:
- MEX
timeframe:
  start: 2024
  enacted_date: '2024-12-20'
description: 'Constitutional reform package abolishing seven constitutionally autonomous bodies: INAI (transparency), Cofece (competition), IFT (telecoms and broadcasting regulator), CRE (energy regulator),
  CNH (hydrocarbons), Coneval (social-policy evaluation) and Mejoredu (education evaluation). Their functions absorbed into line ministries (Economía for competition and telecoms, Energía for CRE/CNH, Anticorrupción
  for INAI, Bienestar for Coneval, SEP for Mejoredu). Signalled as "administrative simplification" by the government.

  '
enacted_by:
- mexico_sheinbaum_morena_2024_present
coalition_label_at_enactment: Morena + PT + PVEM (constitutional supermajority)
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Independent regulatory agencies replaced by executive-line ministries.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Cofece and IFT autonomy replaced by Economía-internal unit.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Energy regulator (CRE, CNH) autonomy replaced by Sener-internal unit.

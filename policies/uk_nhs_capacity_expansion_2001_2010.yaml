policy_id: uk_nhs_capacity_expansion_2001_2010
status: candidate
title: Nhs Capacity Expansion 2001 2010
countries:
- GBR
timeframe:
  start: 2001
  end: 2010
description: 'The Blair–Brown government''s sustained NHS capacity programme delivered through the 2000 NHS Plan, the 2002 Wanless Review, and the 2004 Agenda for Change pay reform. Real-terms NHS spending
  grew at approximately 7% per annum across 2001–2010, financing new district general hospitals (often via PFI), expanded medical workforce numbers, reduced waiting times, and the introduction of NICE technology
  appraisals to manage cost-effectiveness.

  '

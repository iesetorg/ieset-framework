timeframe:
  start: 1964
  end: 1968
description: 'The Elementary and Secondary Education Act of 1965 (Pub. L. 89-10, ESEA) established Title I federal funding for high-poverty schools, library and instructional materials assistance, and educational
  research and training initiatives. The act represented the largest federal entry into K-12 schooling in U.S. history at the time, conditioning aid on civil-rights compliance and creating the framework
  for ongoing federal involvement in public education through subsequent reauthorizations including No Child Left Behind and ESSA.

  '

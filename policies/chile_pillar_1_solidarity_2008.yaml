policy_id: chile_pillar_1_solidarity_2008
status: candidate
title: Chile Pillar 1 Solidarity 2008
countries:
- CHL
timeframe:
  start: 1981
  end: ongoing
description: 'Bachelet-era pension reform enacted by Ley 20.255 (March 2008) creating a non-contributory solidarity pillar on top of the 1981 AFP individual-account system. Established the Pensión Básica
  Solidaria (PBS) for the poorest 60% lacking AFP coverage and the Aporte Previsional Solidario (APS) topping up low AFP balances, both financed from general revenue. The reform preserved the privatised
  contributory pillar while adding a general-revenue floor against poverty in old age.

  '
enacted_by: []
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reform preserves AFP forced-saving as primary pillar; PBS/APS additions are means-tested rather than universal expansions.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: General-revenue financing of PBS/APS shifts incidence partly onto capital via the existing tax base.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform introduces a default-AFP tender mechanism for new contributors, sharpening price competition among administrators.

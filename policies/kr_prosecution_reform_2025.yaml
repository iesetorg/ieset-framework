policy_id: kr_prosecution_reform_2025
status: candidate
title: Lee prosecution-service reform revival (South Korea, 2025)
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-09-01'
description: 'Revival and extension of the Moon-era prosecution-service reform agenda: (i) further narrowing of prosecutors'' direct-investigation jurisdiction beyond the already-reduced six categories;
  (ii) empowerment of the Corruption Investigation Office for High-Ranking Officials (CIO / Gongsucheo) with expanded case-handover authority; (iii) partial restoration of the prosecution-police realignment;
  (iv) a proposed standalone "Serious Crime Investigation Agency" separate from the Supreme Prosecutor''s Office. Politically motivated in part by the martial-law aftermath and prosecutorial-service investigations
  of DP figures including Lee himself.

  '
enacted_by:
- skorea_lee_jaemyung_dp_2025_present
coalition_label_at_enactment: Democratic Party of Korea (centre-left)
axes_moved:
- axis: institutional.judicial_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Pro-independence framing (CIO empowerment) vs. critic framing that ruling-coalition reshaping of prosecutorial structure erodes independence. Coded mixed pending empirical tracking.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Democratic-restoration framing post-martial-law; Constitutional Court removal reaffirmed rule-of-law baseline.
references:
- Prosecutors' Office Act amendment bill 2025
- Constitutional Court Decision 2024Hun-Na8, 4 April 2025
notes: 'Mixed-direction coding on judicial_independence axis — first-class caveat given framework commitment to not smoothing over contested content. v1.1 should reassess once empirical indicators (WGI,
  V-Dem) update through the 2027 cycle.

  '

  direction: +
  magnitude: moderate
  intended: true
  rationale: Education and technical-training expansion required public spending and institutional
    capacity.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Skills formation improved labour-market adaptability rather than employment protection
    rigidity.

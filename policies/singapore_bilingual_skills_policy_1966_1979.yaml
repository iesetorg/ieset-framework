policy_id: singapore_bilingual_skills_policy_1966_1979
status: candidate
title: Singapore bilingual and skills-upgrading policy, 1966-1979
countries:
- SGP
timeframe:
  start: 1966
  end: 1979
description: Singapore's education policy from the late 1960s through the 1979 education reforms
  expanded English-plus-mother-tongue bilingual schooling, technical education, streaming, and
  workforce skills formation. The policy aimed to make a small labour force usable by multinational
  manufacturing and services while preserving social cohesion.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew

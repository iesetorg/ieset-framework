description: 'The Republic of Congo entered a three-year IMF Extended Credit Facility in January 2022 after debt and oil-price shocks. The programme focused on restoring debt sustainability, raising non-oil
  revenue, improving expenditure control, strengthening public-financial management, increasing transparency in oil and debt operations, and advancing governance and anti-corruption reforms.

  '

policy_id: ie_national_development_plan_2000_2013
status: candidate
title: National Development Plan 2000 2013
countries:
- IRL
timeframe:
  start: 1997
  end: 2008
description: 'The 2000-2006 and 2007-2013 National Development Plans were multi-annual capital-investment frameworks committing tens of billions of euros to transport, housing, education, health, and regional
  development, partly financed by EU Structural and Cohesion Funds. The NDPs translated Celtic Tiger surpluses into infrastructure and human-capital outlays and were managed alongside the National Spatial
  Strategy.

  '

policy_id: id_prabowo_tni_law_revision_2025
status: candidate
title: TNI Law revision expanding military civilian roles 2025
countries:
- IDN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-20'
description: 'Revision of UU No. 34/2004 on the Indonesian National Military (TNI) passed by the DPR on 20 March 2025. Expanded from 10 to 14 the civilian ministries and agencies in which active-duty officers
  may serve without resignation/retirement (including attorney-general''s office, disaster- management, border management, maritime security), raised the officer retirement age, and broadened ''military
  operations other than war'' (OMSP) scope. Passed in ~two weeks; triggered student protests citing dwifungsi (dual-function) historical parallels to the New Order. Represents the clearest formal rollback
  of post-1998 military-reform demilitarisation of civilian governance.

  '
enacted_by:
- indonesia_prabowo_2024_present
coalition_label_at_enactment: Gerindra-led Koalisi Indonesia Maju Plus
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Active-duty military presence in civilian ministries weakens civilian control and merit-based administration.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Expanded military postings include roles adjacent to the justice system (AG's office, border management).

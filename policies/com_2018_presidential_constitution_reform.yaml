policy_id: com_2018_presidential_constitution_reform
status: candidate
title: Comoros 2018 presidential constitution reform
countries:
- COM
timeframe:
  start: 2018
  end: ongoing
description: 'Comoros adopted constitutional changes after the 2018 referendum that reworked the rotating-island presidency and allowed the incumbent president to seek consecutive terms. The reform shifted
  the balance of the Union presidency toward stronger presidential continuity and reduced the binding force of the previous one-term island-rotation constraint.

  '
enacted_by:
- comoros_azali_pce_fiscal_consolidation_2016_present
scope: national
coalition_label_at_enactment: Azali government
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The reform weakened the previous rotation constraint and concentrated executive continuity around the presidency.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: The broader constitutional package reduced institutional checks around a more centralized executive structure.
references:
- Union of the Comoros Constitution as amended after the July 2018 referendum.
- IMF, Union of the Comoros Article IV materials describing institutional and governance context.

description: 'France joined the European Monetary System on 13 March 1979 under the Giscard-Schmidt joint initiative. Committed franc to ±2.25% band around central ECU rate. First major European commitment
  to mutual monetary discipline post-Bretton Woods. Tested by the three 1981-83 franc crises; Mitterrand''s decision to remain in EMS (March 1983) confirmed its status as a binding constraint.

  '

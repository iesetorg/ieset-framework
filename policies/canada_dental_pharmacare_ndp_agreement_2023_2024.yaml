title: Canada Dental Pharmacare Ndp Agreement 2023 2024
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Under the 2022 Liberal–NDP Supply and Confidence Agreement, the Trudeau government legislated the Canadian Dental Care Plan (rolling out 2023–2025 to cover Canadians without dental insurance
  and household income under C$90k) and the first phase of national pharmacare via Bill C-64 in 2024, initially funding diabetes medications and contraception. Both programmes are administered as federal
  coverage layered over provincial health systems and represent the largest expansion of federal health-coverage since medicare consolidation.

  '

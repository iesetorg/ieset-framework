policy_id: brazil_real_introduction_1994
status: candidate
title: Brazil Real Introduction 1994
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'On 1 July 1994, Provisional Measure 542 introduced the new currency, the real, replacing the cruzeiro real at a 1:2750 ratio after the URV indexation phase. The real was launched with a quasi-pegged
  band against the US dollar, a sharp tightening of monetary policy, and high real interest rates, ending the chronic hyperinflation of the prior decade. The currency switch was the operational centerpiece
  of finance minister Cardoso''s stabilisation programme.

  '

policy_id: cuba_tarea_ordenamiento_2021
status: candidate
title: Cuba Tarea Ordenamiento 2021
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'Effective 1 January 2021, the Tarea Ordenamiento abolished the convertible peso (CUC), unified the exchange rate at 24 CUP per USD, raised state-sector wages and pensions in nominal terms,
  and trimmed state-price subsidies on utilities and basic goods. The unification triggered sharp inflation and parallel-market dollarisation, prompting partial re-introduction of MLC hard-currency shops
  and recurrent corrective devaluations.

  '
enacted_by:
- cuba_post_1959_socialist_economy
axes_moved:

  direction: '-'
  magnitude: weak
  intended: true
  rationale: New MLC shops and price administration kept retail competition heavily segmented.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Price-shock erosion of peso savings amounted to a confiscatory transfer from peso holders.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Compensatory wage and pension uplifts to absorb the unified-rate price shock expanded transfers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: SOEs received continuing budget support and FX rationing despite the official rate unification.

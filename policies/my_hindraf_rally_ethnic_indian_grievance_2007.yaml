  end: 2009
  enacted_date: '2007-11-25'
description: 'Hindu Rights Action Force (Hindraf) mass rally 25 November 2007 in Kuala Lumpur, estimated ~30,000-50,000 ethnic-Indian participants (one of largest Malaysian street protests in 20 years).
  Grievance: economic and political marginalisation of Indian Malaysians (7% of population) under NEP framework, temple demolitions, indentured-labour plantation legacy. Police responded with tear gas and
  water cannons; 5 leaders arrested under Internal Security Act (ISA) December 2007 and detained without trial. ISA detentions contributed to March 2008 electoral swing. ISA detentions released under Najib
  in April-May 2009 as part of his initial reform gesture. ISA itself repealed 2012, replaced by SOSMA.

  '

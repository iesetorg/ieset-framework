title: Lesotho financial inclusion strategy II 2024
countries:
- LSO
timeframe:
  start: 2024
  end: ongoing
description: 'Lesotho advanced a second financial-sector and financial-inclusion strategy to broaden access to formal finance for households and small firms. The strategy emphasizes digital financial
  services, credit infrastructure, consumer protection, MSME finance, and a stronger regulatory architecture for inclusive private-sector development.

  '

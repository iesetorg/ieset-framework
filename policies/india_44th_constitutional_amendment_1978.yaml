policy_id: india_44th_constitutional_amendment_1978
status: candidate
title: 44th Constitutional Amendment — post-Emergency restoration (India 1978)
countries:
- IND
timeframe:
  start: 1978
  end: 1979
  enacted_date: '1978-12-30'
description: 'Enacted 30 Dec 1978, the 44th Amendment rolled back the Emergency-era 42nd Amendment (1976). Removed the right to property from Part III Fundamental Rights (Article 31 repealed, inserted as
  Article 300A ordinary constitutional right); required a written cabinet recommendation for Emergency declaration; restricted preventive detention; restored judicial review; guaranteed that Articles 20
  and 21 cannot be suspended even during Emergency.

  '
enacted_by:
- india_janata_desai_1977_1979
coalition_label_at_enactment: Janata Party
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Restored fundamental-rights baseline; required cabinet approval for Emergency.
- axis: institutional.judicial_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Judicial review restored against Parliamentary amendment.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Property moved from fundamental right (Article 31) to ordinary constitutional right (300A).
references:
- Constitution (Forty-Fourth Amendment) Act 1978

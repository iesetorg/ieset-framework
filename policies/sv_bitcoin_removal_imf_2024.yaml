policy_id: sv_bitcoin_removal_imf_2024
status: candidate
title: Bitcoin removal from legal-tender status — IMF EFF condition (Dec 2024)
countries:
- SLV
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-12-18'
description: 'As a precondition of the $1.4 billion IMF Extended Fund Facility approved 18 Dec 2024 (40-month programme), El Salvador committed to amend the Bitcoin Law to remove BTC from legal- tender
  status, eliminate compulsory merchant acceptance, restrict public-sector BTC purchases, and wind down the Chivo state-wallet operation while leaving voluntary crypto use lawful. The amendment to the Bitcoin
  Law was enacted by the Legislative Assembly on 29 Jan 2025. The Digital Asset Issuance Law 2023 and the Bitcoin Office tokenisation plans continue to operate, with BTC optional for commerce and continued
  small public-sector BTC accumulation per published Bitcoin Office wallet disclosures. Total EFF package alongside IADB and World Bank complementary loans sums to ~$3.5bn.

  '

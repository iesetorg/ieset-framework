status: candidate
title: Moon-era nuclear phase-out posture (South Korea, 2017-2022)
countries:
- KOR
timeframe:
  start: 2017
  end: 2022
  enacted_date: '2017-06-19'
description: 'Declared nuclear phase-out (탈원전) policy: (i) permanent closure of Kori Unit 1 June 2017, early retirement of Wolsong Unit 1 2018; (ii) suspension then resumed construction of Shin Kori 5/6
  following a citizens'' deliberative referendum (October 2017); (iii) formal stoppage of new-build plans (Shin Hanul 3/4 construction halted); (iv) 8th and 9th Basic Electricity Plans cutting long-run
  nuclear share from ~30% to ~23% by 2034 while scaling renewables to ~30%; (v) 2050 carbon-neutrality pledge October 2020 without nuclear expansion.

  '

policy_id: nl_housing_market_reform_2013
status: candidate
title: Netherlands housing-market reform (Rutte II 2013)
countries:
- NLD
timeframe:
  start: 2013
  end: 2031
  enacted_date: '2013-01-01'
description: 'Housing-market reform package agreed in the VVD-PvdA Bruggen Slaan coalition agreement and subsequent Housing Accord (Feb 2013): mortgage-interest deduction (Hypotheekrenteaftrek) reduced
  by 0.5pp annually from 2014 for highest tax-bracket, annuity-repayment requirement for new loans to qualify, maximum loan-to-value ratio declining 1pp/year from 106% to 100% by 2018, and a verhuurderheffing
  tax on social-rental-sector landlords starting €1.7bn/year rising to €2.5bn/year to fund reform transition. Aimed at reducing structural housing-market distortions flagged by IMF/OECD.

  '
enacted_by:
- netherlands_rutte_ii_vvd_pvda_2012_2017
coalition_label_at_enactment: VVD-PvdA

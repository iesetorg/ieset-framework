description: 'Published 2 February 2022, the Levelling Up the United Kingdom White Paper set twelve ''missions'' targeting regional convergence in living standards, R&D spend, transport connectivity, digital
  infrastructure, skills, health, well-being, pride-in-place, housing, crime, local leadership, and education by 2030. Created the £4.8bn Levelling Up Fund (three rounds), UK Shared Prosperity Fund (£2.6bn
  replacing EU structural funds), Towns Fund, freeports programme (8 freeports from 2021), and expanded devolution deals (combined authorities, directly-elected mayors). Followed by the Levelling-up and
  Regeneration Act 2023 codifying planning changes and environmental outcomes reports.

  '

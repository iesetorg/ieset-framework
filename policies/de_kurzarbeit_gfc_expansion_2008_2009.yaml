policy_id: de_kurzarbeit_gfc_expansion_2008_2009
status: candidate
title: Germany Kurzarbeit expansion during GFC
countries:
- DEU
timeframe:
  start: 2008
  end: 2010
  enacted_date: '2009-02-05'
description: 'Expansion of the short-time-work (Kurzarbeit) regime during the 2008-2009 GFC: maximum duration extended from 6 to 18 then 24 months; employer SSC reimbursement raised to 50% after 6 months
  then 100% during further-training periods; qualification requirements relaxed; simplified application process. Take-up peaked at ~1.5m workers (May 2009) — roughly 4% of workforce — concentrated in manufacturing
  and export sectors. Credited with limiting Germany''s unemployment rise to ~0.4pp while GDP fell 5.7% in 2009 (US unemployment rose ~5pp on a 2.5% GDP fall).

  '
enacted_by:
- germany_merkel_i_grand_coalition_2005_2009
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Expanded state subsidy for hours-reduction attached to employment retention.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Wage-bill subsidy disproportionately benefited manufacturing/auto.
references:

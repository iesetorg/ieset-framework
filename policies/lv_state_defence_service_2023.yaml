policy_id: lv_state_defence_service_2023
status: candidate
title: Latvia State Defence Service Law 2023
countries:
- LVA
timeframe:
  start: 2023
  end: ongoing
description: 'Latvia reintroduced compulsory state defence service after Russia''s full-scale invasion of Ukraine shifted the regional security environment. The law phases in mandatory service for eligible
  Latvian citizens, offers military and alternative civil-service tracks, and is paired with higher defence expenditure and recruitment capacity for the National Armed Forces.

  '
enacted_by:
- latvia_karins_silina_security_state_2022_present
scope: national
coalition_label_at_enactment: Karins-New Unity coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Conscription infrastructure, training, allowances, and force expansion add recurring defence outlays.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory service constrains labour-market availability for covered cohorts during service periods.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The law codifies service obligations, exemptions, alternative service, and enforcement through a statutory process.

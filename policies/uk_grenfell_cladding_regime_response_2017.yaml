policy_id: uk_grenfell_cladding_regime_response_2017
status: candidate
title: UK Grenfell Tower fire response and building-safety reform
countries:
- GBR
timeframe:
  start: 2017
  end: 2022
  enacted_date: '2017-06-14'
description: 'Policy response to the Grenfell Tower fire of 14 June 2017 in which 72 people died in a west-London residential tower clad in combustible aluminium-composite panels (ACM). Initial actions:
  Public Inquiry established by PM May (Aug 2017, Moore-Bick chair); Independent Review of Building Regulations and Fire Safety by Dame Judith Hackitt (final report May 2018). Subsequent legislation (Building
  Safety Act 2022, Fire Safety Act 2021) overhauled building-safety regulatory regime; ACM-cladding remediation fund started at £200m, escalating to £5bn+ under later governments.

  '
enacted_by:
- uk_may_conservative_2016_2019
coalition_label_at_enactment: Conservative

policy_id: sv_bond_buyback_2023
status: candidate
title: Sovereign bond buyback and liability-management operations (2022-2023)
countries:
- SLV
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2022-07-18'
description: 'In response to a Jan 2022 spike in sovereign-yield spreads (10Y Salvadoran eurobonds > 24%) and Moody''s / S&P / Fitch downgrades tied to Bitcoin-adoption fiscal-sustainability concerns, the
  Ministerio de Hacienda executed two tender offers (Sep 2022 and Apr 2023) to buy back upcoming Jan 2023 and Jan 2025 maturities at below-par prices funded by multilateral CABEI loans and domestic debt.
  The operations retired ~$650m of external debt at discount, eliminated the imminent-default narrative, and compressed spreads back to mid-high-yield range by mid-2023. Combined with the 2023 tax reform
  and 2023 Article IV engagement, the operations set the stage for the Dec 2024 IMF EFF. Debt-to-GDP peaked ~85% in 2020 on COVID fiscal response and declined toward ~75% by end-2024.

  '
enacted_by:
- elsalvador_bukele_first_term_2019_2024
coalition_label_at_enactment: Nuevas Ideas
axes_moved:

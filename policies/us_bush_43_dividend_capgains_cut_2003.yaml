policy_id: us_bush_43_dividend_capgains_cut_2003
status: candidate
title: Bush 43 Dividend Capgains Cut 2003
countries:
- USA
timeframe:
  start: 2001
  end: 2003
description: 'The Jobs and Growth Tax Relief Reconciliation Act of 2003 (Pub. L. 108-27, JGTRRA) cut the top long-term capital-gains rate from 20% to 15% and applied the same 15% preferential rate to qualified
  dividend income, reducing the historical double-tax disadvantage on equity payouts. The measure also accelerated the EGTRRA 2001 individual rate cuts and expanded bonus depreciation, comprising the second
  leg of the Bush 43 tax-cut program.

  '

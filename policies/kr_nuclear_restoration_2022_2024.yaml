policy_id: kr_nuclear_restoration_2022_2024
status: candidate
title: Yoon nuclear restoration programme (South Korea, 2022-2024)
countries:
- KOR
timeframe:
  start: 2022
  end: 2024
  enacted_date: '2023-01-12'
description: 'Reversal of the Moon-era nuclear phase-out across three channels: (i) 10th Basic Plan for Electricity Supply and Demand (12 January 2023) setting ~35% nuclear share in 2036 generation (vs.
  the 9th plan target of ~23% in 2034); (ii) resumed construction of Shin Hanul Units 3 and 4 (environmental approval reissued 2023, construction re-started 2024); (iii) life-extension applications for
  ageing reactors (Kori 2/3/4, Hanbit 1/2) lodged with NSSC, first approvals in 2024; (iv) export-oriented Barakah-style nuclear partnerships pushed with Poland, Czechia, Saudi Arabia.

  '
enacted_by:
- skorea_yoon_ppp_2022_2025
coalition_label_at_enactment: People Power Party (conservative)
axes_moved:
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: strong
  intended: true
  rationale: Reinstatement of large-reactor new-build plus reactor life-extension raises baseload supply security.
- axis: regulatory.environmental_stringency
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Nuclear restoration is low-carbon; carbon-neutrality date preserved but coal/gas transition pace softened.
references:
- 10th Basic Plan for Electricity Supply and Demand, MOTIE 12 January 2023
- Nuclear Safety and Security Commission resolutions 2024 on Kori and Hanbit life-extension

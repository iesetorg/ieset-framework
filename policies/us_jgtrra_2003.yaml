title: Jgtrra 2003
countries:
- USA
timeframe:
  start: 2001
  end: 2003
description: 'The Jobs and Growth Tax Relief Reconciliation Act of 2003 (Pub. L. 108-27) accelerated EGTRRA''s individual income-tax rate cuts so they took effect immediately rather than phasing in by 2006,
  cut the long-term capital-gains rate to 15% and applied that same rate to qualified dividends, raised the AMT exemption, expanded section 179 small-business expensing, and authorized 50% bonus depreciation
  through 2004. The act constituted the second major Bush-era tax-cut package.

  '

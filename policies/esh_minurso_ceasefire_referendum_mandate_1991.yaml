policy_id: esh_minurso_ceasefire_referendum_mandate_1991
status: candidate
title: MINURSO ceasefire-and-referendum mandate
countries:
  - ESH
timeframe:
  start: 1991
  end: ongoing
  enacted_date: '1991-04-29'
description: >
  Security Council Resolution 690 (1991) established MINURSO in accordance with
  the settlement proposals accepted by Morocco and Frente Polisario, creating a
  UN mission for the ceasefire and for preparation of a referendum in which the
  people of Western Sahara would choose between independence and integration
  with Morocco. The referendum has not produced a final-status settlement, but
  the mission and mandate-renewal process remain an international policy
  structure affecting the territory.
scope: supranational
enacted_by:
  - western_sahara_contested_status_self_determination_process_1991_present
coalition_label_at_enactment: "United Nations Security Council settlement-plan mandate"
axes_moved:
  - axis: institutional.rule_of_law
    direction: +
    magnitude: weak
    intended: true
    rationale: "The mandate created an internationally supervised ceasefire, voter-identification, and referendum-preparation framework for a contested-status territory."
references:
  - "United Nations Peacekeeping, MINURSO fact sheet, https://peacekeeping.un.org/en/mission/minurso"
  - "United Nations Security Council Resolution 690 (1991), S/RES/690(1991), 29 April 1991, https://docs.un.org/en/S/RES/690(1991)"
  - "United Nations Security Council latest MINURSO mandate-renewal documents, including S/RES/2797(2025), https://docs.un.org/en/S/RES/2797(2025)"
notes: "Coded as a UN-supervised ceasefire/self-determination mechanism, not as recognition of Moroccan sovereignty, Sahrawi sovereignty, or a resolved final status."

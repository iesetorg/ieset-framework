policy_id: ao_fuel_subsidy_phaseout_2023
status: candidate
title: Angola fuel-subsidy phase-out 2023
countries:
- AGO
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-06-02'
description: 'The Lourenco government began a phased withdrawal of broad fuel subsidies in June 2023, starting with gasoline price increases and a stated plan to extend the adjustment across petroleum products
  while using targeted mitigation for transport and vulnerable groups. The reform reduced a large implicit fiscal transfer to fuel consumers and shifted more of the import and refining cost into retail
  prices.

  '
enacted_by:
- angola_lourenco_mpla_2017_present
scope: national
coalition_label_at_enactment: MPLA Lourenco government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  intended: true
  rationale: The policy directly reduces generalized petroleum-price subsidies.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Lower fuel-subsidy outlays reduce pressure on the budget and oil-revenue transfers.
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Retail fuel prices become less administratively suppressed as subsidies are withdrawn.

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: us_16th_amendment_income_tax_1913
status: candidate
title: 16th Amendment and federal income tax 1913
countries: [USA]
timeframe:
  start: 1913
  end: 1913
  enacted_date: "1913-10-03"
description: >
  Ratification of the 16th Amendment in February 1913 removed the constitutional
  barrier to unapportioned federal taxes on income, and the Revenue Act of 1913
  translated that power into a permanent graduated federal income tax. The initial
  schedule was modest by later standards, but it created an entirely new fiscal base
  for the federal state and shifted revenue capacity away from heavy dependence on
  tariffs and excises toward a more explicitly progressive direct-tax instrument.
enacted_by:
  - us_progressive_era_reform_consensus_1901_1917
axes_moved:
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The reform created a graduated federal income tax and shifted the revenue system in a more progressive direction than tariff finance."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The new revenue base expanded the long-run fiscal capacity of the federal government even before later wartime rate increases."
references:
  - "Sixteenth Amendment to the United States Constitution (1913)"
  - "Revenue Act of 1913, 38 Stat. 114"

policy_id: ie_statutory_sick_pay_act_2022
status: candidate
title: Statutory Sick Pay Act 2022
countries:
- IRL
timeframe:
  start: 2020
  end: 2022
description: 'The Sick Leave Act 2022 introduced employer-paid statutory sick pay for the first time in Ireland, phased in from January 2023 with three days at 70% of pay (up to a daily cap), rising stepwise
  to ten days. The Act aligned Ireland with most other EU member states on minimum sick-pay protection and shifted part of the income-replacement cost from the social-insurance system to employers.

  '
enacted_by:
- ireland_martin_ff_rotating_2020_2022
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-sector employers absorb statutory sick-pay obligations within the wage bill.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory sick pay creates a new mandated income-replacement entitlement for employees.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandates a non-wage labour cost equivalent to a small effective payroll tax on employers.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Aligns labour-standards regime with the broader EU social-and-environmental standards trajectory.

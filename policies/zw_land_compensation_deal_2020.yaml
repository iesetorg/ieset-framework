policy_id: zw_land_compensation_deal_2020
status: candidate
title: Zimbabwe Global Compensation Deed for former farm owners 2020
countries:
- ZWE
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-07-29'
description: 'Zimbabwe signed the Global Compensation Deed with representatives of former commercial farm owners in July 2020, committing to compensate them for improvements on farms acquired under land
  reform while leaving ownership of the land itself with the state. The agreement created a multi-year financing obligation and was used by the Mnangagwa government to signal partial settlement of long-running
  property-rights disputes from the fast-track land reform era.

  '
enacted_by:
- zimbabwe_mnangagwa_zanu_pf_2017_present
scope: national
coalition_label_at_enactment: ZANU-PF Mnangagwa government
axes_moved:
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Compensation for farm improvements partially recognised dispossessed owners' property claims after uncompensated acquisition.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A formal deed and payment framework moved part of the land dispute from ad hoc politics into a documented settlement process.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: The compensation commitment created a large multi-year fiscal obligation.
references:
- Government of Zimbabwe and former farm-owner representatives, Global Compensation Deed, 29 July 2020.
- Zimbabwe Ministry of Finance statements on financing and implementation of the Global Compensation Deed, 2020-2024.
- IMF Zimbabwe staff reports discussing land compensation and arrears-clearance dialogue, 2020-2024.

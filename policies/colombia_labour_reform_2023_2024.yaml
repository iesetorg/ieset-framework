description: 'Petro government''s labour-reform bill introduced in 2023 proposing to lengthen daytime hours (cutting evening surcharges'' baseline), restrict outsourcing and apprenticeship contracts, expand
  collective-bargaining rights, and require open-ended contracts as default. Stalled in initial form in 2023 but advanced in revised form in subsequent congressional sessions, aiming to formalise labour
  relations and rebalance employer-worker bargaining.

  '

  direction: +
  magnitude: weak
  intended: true
  rationale: Codified independent ethics review and exclusion procedures strengthen predictable governance of public capital.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Transparent, published criteria and procedural review insulate allocation decisions from ad-hoc political intervention.

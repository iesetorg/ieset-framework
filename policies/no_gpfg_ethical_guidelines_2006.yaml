policy_id: no_gpfg_ethical_guidelines_2006
status: candidate
title: GPFG ethical guidelines and responsible-investment mandate
countries:
- NOR
timeframe:
  start: 2006
  end: ongoing
  enacted_date: '2006-01-01'
description: 'Operationalisation of ethical guidelines for the Government Pension Fund Global following the 2003 Graver committee (NOU 2003:22), including establishment of the independent Ethics Council
  (Etikkrådet), exclusion list criteria (producers of specific weapons categories, tobacco from 2010, coal from 2016), and an active-ownership mandate. 2008-2010 revisions (including NOU 2008:14 / Meld.
  St. 10, 2008-2009) strengthened responsible- investment expectations and formalised observation/exclusion procedures. Reinforces institutional independence of GPFG governance.

  '
enacted_by:
- norway_stoltenberg_ii_redgreen_2005_2013
coalition_label_at_enactment: AP–SV–Sp red-green majority
axes_moved:

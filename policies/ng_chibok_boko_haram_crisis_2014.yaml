description: 'Boko Haram abducted 276 schoolgirls from the Government Secondary School in Chibok, Borno State on the night of 14-15 April 2014. Sparked the global #BringBackOurGirls campaign and intensified
  scrutiny of federal counter-insurgency failure. Followed the May 2013 state-of-emergency proclamation in Borno, Yobe and Adamawa, Boko Haram''s 2014 declaration of an Islamic caliphate over parts of north-east
  Nigeria, and coordinated attacks displacing over 1.5 million people. A Multinational Joint Task Force with Chad, Niger and Cameroon reactivated early 2015 pushed back territorial control, but Chibok became
  the defining campaign liability of the 2015 election lost by Jonathan.

  '

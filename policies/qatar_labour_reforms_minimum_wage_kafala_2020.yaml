policy_id: qatar_labour_reforms_minimum_wage_kafala_2020
status: candidate
title: Qatar minimum wage and job-mobility labour reforms
countries:
- QAT
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-08-30'
description: 'Qatar enacted paired labour reforms in 2020 that established a non-discriminatory monthly minimum wage and removed the No Objection Certificate requirement for many migrant workers changing
  jobs. The package shifted the kafala-era employment relationship toward written job mobility and wage-floor rules, while preserving state and employer controls over work permits and enforcement.

  '
enacted_by:
- qatar_tamim_labour_lng_diversification_2020_present
scope: national
coalition_label_at_enactment: Al Thani monarchy; Tamim appointed government
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: Ending the NOC requirement increased worker mobility, while the statutory wage floor reduced wage-setting flexibility.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Published job-change and minimum-wage rules made migrant employment contracts more enforceable than sponsor discretion alone.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Easier in-country job changing reduced the exit-and-reentry cost of remaining in Qatar's labour market.
references:
- 'Qatar Ministry of Labour legislation page: https://www.mol.gov.qa/ar/ministry/Pages/Laws.aspx'
- 'International Labour Organization, Qatar labour reform releases, 2020-2021: https://www.ilo.org/'
notes: Coded as mixed on labour flexibility because wage-floor tightening and job-mobility liberalisation move opposite subchannels.

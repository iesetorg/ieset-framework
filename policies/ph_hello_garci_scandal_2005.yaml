description: '"Hello Garci" tapes — wiretapped phone conversations released 6 June 2005 allegedly between President Arroyo and COMELEC Commissioner Virgilio Garcillano during May 2004 presidential election,
  discussing margin of victory over Fernando Poe Jr. Triggered cabinet "Hyatt 10" resignation 8 July 2005, impeachment complaints September 2005 killed in House Committee on Justice. Arroyo''s public apology
  "I am sorry" 27 June 2005 admitted "lapse in judgment" contacting a COMELEC commissioner. Second impeachment complaint August 2006 also killed in committee. Supreme Court''s Neri v. Senate (2008) decision
  on executive-privilege invocation during Senate hearings protected Arroyo''s communications.

  '

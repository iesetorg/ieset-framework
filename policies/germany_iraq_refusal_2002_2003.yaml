status: candidate
title: Germany Iraq Refusal 2002 2003
countries:
- DEU
timeframe:
  start: 1998
  end: 2005
description: 'Chancellor Schröder''s August 2002 declaration that Germany would not participate in a US-led Iraq war, reaffirmed during the 2002 Bundestag election and through the March 2003 invasion period,
  anchored a distinctive German foreign-economic posture and avoided defence-spending escalation. The refusal cooled US bilateral relations, bolstered the Franco-German axis around the Common Foreign and
  Security Policy, and constrained the SPD-Greens fiscal envelope amid concurrent Agenda 2010 reforms.

  '

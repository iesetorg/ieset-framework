policy_id: sv_chivo_wallet_2021
status: candidate
title: Chivo wallet launch with $30 per-adult Bitcoin buy-in (Sep 2021)
countries:
- SLV
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-09-07'
description: 'Chivo is the state-sponsored custodial wallet launched 7 Sep 2021 concurrent with Bitcoin Law entry into force. The Chivo incentive programme credited each adult Salvadoran who registered
  with a national ID $30 in BTC equivalent, funded from the $150m BANDESAL trust. Chivo also enabled zero-fee remittance channel from US senders via partner corridors. By end-2021 approximately 4 million
  Salvadorans had downloaded Chivo (population ~6.3m) but active-use rates declined sharply in 2022-2023 per BID Working Paper 1381 (Alvarez, Argente, Van Patten 2022) and NBER 30901: 20% used Chivo after
  the initial $30 spend, and only ~2% of remittances flowed through BTC rails. Chivo Point ATMs were rolled out nationally. Operational issues (identity-theft fraud, customer-service failures, repeated
  KYC rebuilds) drew sustained press and auditor criticism.

  '
enacted_by:
- elsalvador_bukele_first_term_2019_2024
coalition_label_at_enactment: Nuevas Ideas

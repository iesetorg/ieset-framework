policy_id: lebanon_solidere_1994
status: candidate
title: Lebanon Solidere 1994
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'Solidere (Société Libanaise pour le Développement et la Reconstruction du Centre-ville de Beyrouth), incorporated in 1994 under Law 117/1991 and championed by Prime Minister Rafik Hariri,
  was a private joint-stock company empowered to expropriate, redevelop and operate Beirut''s Central District. Original property owners received Solidere shares in exchange for their land rights, concentrating
  reconstruction proceeds in a single vehicle while shaping post-war political-economy dynamics around real estate and finance.

  '

policy_id: germany_renten_riester_pension_2001
status: candidate
title: Renten-Riester pension reform
countries:
- DEU
timeframe:
  start: 2001
  enacted_date: '2001-06-29'
description: 'Altersvermögensgesetz of 26 June 2001 and Altersvermögensergänzungsgesetz restructured German pensions to reduce public PAYG replacement ratios and introduce state-subsidised voluntary funded
  second-pillar Riester pensions. Riester-Rente products (bank, insurance, investment fund variants) received matching grants and tax relief up to a contribution cap. Part of gradual transition away from
  monolithic PAYG model toward multi-pillar architecture.

  '
enacted_by:
- germany_schroder_red_green_1998_2005
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  rationale: Public PAYG replacement rate reduced and partially shifted to funded individual savings.
  intended: true
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  rationale: State matching grants and tax relief for certified Riester products.
  intended: true
references:
- Altersvermögensgesetz vom 26. Juni 2001

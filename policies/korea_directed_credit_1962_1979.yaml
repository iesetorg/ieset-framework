policy_id: korea_directed_credit_1962_1979
status: candidate
title: Korea Directed Credit 1962 1979
countries:
- KOR
timeframe:
  start: 1961
  end: 1979
description: 'Under the Park Chung-hee era the South Korean state nationalised the commercial banks (1961) and directed credit through the Bank of Korea, the Korea Development Bank and policy lenders to
  chaebol firms operating in priority export sectors. Subsidised "policy loans," foreign-loan guarantees and sectoral interest-rate ceilings allocated below-market finance to favoured industries, integrating
  banking into the Five-Year Economic Development Plans.

  '
enacted_by:
- park_chung_hee_industrial_policy_1961_1979
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Allocation of bank credit functioned as de facto licensing for entry into priority sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Below-market policy loans and guarantees provided large quasi-fiscal subsidies to chaebol.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Cheap credit underwrote export expansion while protecting nascent import-competing producers.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary credit allocation under authoritarian rule weakened rule-based finance norms.

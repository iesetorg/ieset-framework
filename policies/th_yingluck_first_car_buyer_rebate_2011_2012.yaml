title: Yingluck First Car Buyer Rebate 2011 2012
countries:
- THA
timeframe:
  start: 2011
  end: 2014
description: 'Launched in October 2011 and continuing through 2012, the Yingluck government''s first-time car buyer scheme refunded up to 100,000 baht in excise tax on small cars (engines up to 1,500cc)
  for qualifying first-time buyers, conditional on a five-year holding period. The programme stimulated domestic auto sales sharply but produced post-scheme demand collapse and a large bad-debt overhang
  for auto financiers.

  '

description: 'Regulation (EU) 2021/1119 — the European Climate Law — codifies the Union''s binding objective of net-zero greenhouse gas emissions by 2050 and an interim 55% net reduction below 1990 levels
  by 2030. It establishes a European Scientific Advisory Board on Climate Change, requires the Commission to align all EU legislation with the trajectory, and underpins the Fit-for-55 package implementing
  the target across ETS, transport, buildings, and renewable-energy regulation.

  '

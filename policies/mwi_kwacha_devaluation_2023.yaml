policy_id: mwi_kwacha_devaluation_2023
status: candidate
title: Malawi kwacha exchange-rate realignment 2023
countries:
- MWI
timeframe:
  start: 2023
  end: 2024
description: 'Malawi implemented a large official kwacha exchange-rate adjustment in November 2023 as part of its effort to reduce the gap between the official and parallel foreign-exchange markets. The
  measure was intended to improve FX allocation, rebuild reserves, and support import availability, but later policy slippage and renewed fixing of the official rate limited the durability of the realignment.

  '
enacted_by:
- malawi_cost_reflective_macro_stabilisation_2012_present
scope: national
coalition_label_at_enactment: Malawi Congress Party Chakwera government
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Allowing a discrete official-rate adjustment reduced, for a time, administrative suppression of the exchange rate.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Narrowing the official-parallel FX gap was intended to ease import rationing and external-payment bottlenecks.
references:
- IMF, Malawi 2025 Article IV Consultation staff report and press release, 2025.
- Reserve Bank of Malawi exchange-rate and foreign-exchange market communications, 2023-2024.
notes: 'The policy is coded as a limited realignment rather than a durable liberalised exchange-rate regime because subsequent implementation reversed part of the intended flexibility.

  '

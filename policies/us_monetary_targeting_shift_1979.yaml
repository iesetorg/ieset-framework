policy_id: us_monetary_targeting_shift_1979
status: candidate
title: Monetary Targeting Shift 1979
countries:
- USA
timeframe:
  start: 1979
  end: 1982
description: 'At the October 6, 1979 "Saturday Night Special" FOMC meeting, Chair Paul Volcker announced a shift from federal-funds-rate targeting to non-borrowed-reserves targeting, allowing short rates
  to fluctuate substantially in service of controlling money-aggregate growth. The operating-procedure change tightened M1 and M2 growth, drove the federal funds rate above 19% in 1981, and signaled a credible
  commitment to wringing inflation out of the economy regardless of short-term rate volatility.

  '

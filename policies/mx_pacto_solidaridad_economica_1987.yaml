description: 'Heterodox social pact between government, labour (CTM), business (CCE), and agriculture (CNC). Froze minimum wages, key prices, and exchange rate after an initial devaluation; accompanied
  fiscal consolidation and monetary tightening. CPI fell from 159% (1987) to 52% (1988) and 19% (1989). Template for subsequent PECE pacts under Salinas.


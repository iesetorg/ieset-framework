policy_id: jp_us_tariff_response_2025
status: candidate
title: Japan — response to US reciprocal tariffs and July-August 2025 trade understanding
countries:
- JPN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-22'
description: 'Japanese response to the April 2025 US reciprocal-tariff announcement (24% headline rate on Japanese imports, 25% on autos, 25% on steel and aluminium). Japan pursued negotiation rather than
  immediate retaliation, with chief negotiator Ryosei Akazawa making multiple trips to Washington between April and July 2025. A US-Japan trade understanding announced 22 July 2025 and operationalised from
  early August set an effective 15% tariff level on Japanese imports and 15% on autos (down from 25%), paired with a framework for up to $550bn in Japanese investment commitments in US strategic sectors
  (semiconductors, pharmaceuticals, critical minerals, shipbuilding). Japan did not impose counter-tariffs. Domestic Japanese response included a cost-of-living supplementary package with energy subsidies
  and SME support for tariff-exposed exporters.

  '
enacted_by:
- japan_ishiba_ldp_2024_present
coalition_label_at_enactment: LDP-Komeito minority (Ishiba administration)
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Accepted 15% effective tariff level on Japanese exports to US — lower than 24% threat but above pre-2025 MFN baseline. Japan did not retaliate.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic SME tariff-exposure support and energy-subsidy renewal in accompanying supplementary budget.

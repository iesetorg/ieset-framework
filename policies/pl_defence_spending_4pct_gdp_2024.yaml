policy_id: pl_defence_spending_4pct_gdp_2024
status: candidate
title: Defence Spending 4Pct Gdp 2024
countries:
- POL
timeframe:
  start: 2023
  end: ongoing
description: 'Continuation under the Tusk Koalicja government of Poland''s defence-spending escalation toward and above 4 percent of GDP in 2024, building on the 2022 Homeland Defence Act and major equipment
  acquisitions including K2 tanks, K9 howitzers, F-35s, and HIMARS. Funded partly through the Armed Forces Support Fund, Poland became NATO''s largest defence-spender by GDP share, with material effects
  on industrial demand and budget composition.

  '
enacted_by:
- poland_tusk_koalicja_2023_present
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Defence-procurement contracts flowed to domestic and allied suppliers as large industrial transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Defence outlays rose to roughly 4 percent of GDP, the highest share in NATO during 2024.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Co-enacted with Tusk-era restoration of environmental review processes and EU climate-rule alignment.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Major equipment imports from US and South Korean suppliers deepened cross-border defence-industrial trade.

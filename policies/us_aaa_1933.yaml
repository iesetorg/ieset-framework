policy_id: us_aaa_1933
status: candidate
title: Aaa 1933
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The Agricultural Adjustment Act of 12 May 1933, signed by President Roosevelt as part of the First New Deal, sought to raise farm prices by paying farmers to reduce planted acreage and livestock
  production for seven major commodities, financed by a processing tax on first-stage food processors. After the Supreme Court struck down the processing tax in United States v. Butler (1936), the program
  was reconstituted under the Soil Conservation and Domestic Allotment Act 1936 and the Agricultural Adjustment Act 1938. The intended effect was to restore farm parity prices to their 1909-1914 ratio,
  halt rural-finance collapse, and provide political support from the agricultural states.

  '

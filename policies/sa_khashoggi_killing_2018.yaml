description: 'Killing of journalist Jamal Khashoggi at the Saudi consulate in Istanbul by a 15-member team linked to the Saudi state. US ODNI (2021) assessed Crown Prince MBS approved the operation. Eight
  defendants convicted in Saudi courts in closed-door proceedings; no senior officials held accountable. Triggered short-term foreign-capital hesitation (FII 2018 boycotts), US Congressional JASTA/arms-sale
  friction, and UK/Germany arms-export pauses — most reversed by 2022 under energy-price pressure.

  '

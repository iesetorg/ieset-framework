title: Laar government flat-tax + currency-board reform (Estonia, 1992-1995)
countries:
- EST
timeframe:
  start: 1994
  end: 1995
description: 'Mart Laar''s Pro Patria-led government implementing the 1994 flat-tax reform: replacement of the Soviet-era progressive personal-income schedule with a single 26% rate on personal income applied
  alongside a uniform corporate-income rate, with a generous standard deduction and few surviving allowances. Paired with the 1992 currency-board kroon (pegged to the Deutschmark with full reserve backing),
  zero-rated import tariffs, mass voucher and direct-sale privatisation through the Estonian Privatisation Agency on the Treuhand model, and a balanced budget rule. Stated case: deliver a transparent, low-distortion
  tax system that an emerging post-Soviet administration could actually enforce, signal a clean break from the Soviet fiscal state, and align Estonia institutionally with northern European market economies
  in preparation for EU and NATO accession.'

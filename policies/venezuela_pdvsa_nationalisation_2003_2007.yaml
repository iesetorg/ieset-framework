title: PDVSA autonomy loss + upstream nationalisation 2003-2007
countries:
- VEN
timeframe:
  start: 2003
  end: 2007
  enacted_date: '2003-02-01'
description: 'Following the 2002-2003 PDVSA strike, President Hugo Chávez dismissed ~18,000 PDVSA technical staff (approximately half the workforce). Subsequent 2006-2007 nationalisation of Orinoco Belt
  heavy-oil joint ventures (ExxonMobil and ConocoPhillips exited rather than accept majority Venezuelan state control; Chevron, BP, Statoil, Total stayed under new terms). PDVSA revenue progressively diverted
  to government social missions via parallel budget mechanisms, reducing maintenance capex. Production trajectory: peak ~3.5 mbpd pre-2002 → ~0.4 mbpd by 2020. Canonical case of resource-extractor nationalisation
  with technocratic-autonomy loss, per the `resource_extractor_nationalisation_reduces_output` hypothesis.

  '

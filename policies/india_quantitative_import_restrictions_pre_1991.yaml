policy_id: india_quantitative_import_restrictions_pre_1991
status: candidate
title: India Quantitative Import Restrictions Pre 1991
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'From the 1950s through 1991, India operated an import-substitution industrialisation regime under the Imports and Exports (Control) Act 1947 and successive Foreign Trade Policy notifications,
  with an extensive system of quantitative restrictions, canalised imports through state trading corporations, and the "Negative List" requiring case-by-case licences for most consumer-good and intermediate-good
  imports. The QR system was largely dismantled following the 1991 reforms and the WTO obligations of 2001.

  '
enacted_by:
- india_swadeshi_economic_nationalism_pre_1991
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Required granular item-level import licences administered by the DGFT.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Quantitative ceilings and state-trading canalisation closed off broad swathes of the import basket.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Sustained the case for state trading corporations and PSU-led import substitution.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tied trade-finance availability to licence-permit-quota approvals.

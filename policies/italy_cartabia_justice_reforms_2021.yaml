policy_id: italy_cartabia_justice_reforms_2021
status: candidate
title: Italy Cartabia civil and penal procedure reforms 2021
countries:
- ITA
timeframe:
  start: 2021
  end: 2022
  enacted_date: '2021-09-27'
description: 'Package of procedural-law reforms under Justice Minister Marta Cartabia, PNRR milestone-linked. Penal procedure reform (Law 134/2021, delega; implementing decree-law 150/2022): introduced
  improcedibilità per superamento dei termini — dismissal of appeal proceedings when time limits exceeded; restructured plea bargaining and alternative resolution pathways; expanded restorative justice;
  targeted 25% reduction in penal proceeding duration by mid-2026. Civil procedure reform (Law 206/2021, delega; implementing decree 149/2022): digitalised filings, streamlined first-instance rules, enforced
  mandatory mediation in expanded caseload, targeted 40% reduction in civil proceeding duration. Companion CSM reform (Law 71/2022) adjusted judicial governance — electoral system for CSM (Consiglio Superiore
  della Magistratura), disciplinary rules, time-between-roles. PNRR milestone M1C1-37 specifically tracks civil-case backlog reduction; failure triggers disbursement suspension risk.

  '

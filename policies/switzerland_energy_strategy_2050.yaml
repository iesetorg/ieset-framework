policy_id: switzerland_energy_strategy_2050
status: candidate
title: Switzerland Energy Strategy 2050
countries:
- CHE
timeframe:
  start: 2011
  end: ongoing
description: 'Energiestrategie 2050 is the Swiss Federal Council''s long-term framework adopted after Fukushima and approved by referendum in May 2017, setting binding targets for electricity-demand reduction,
  per-capita energy use, and renewable generation expansion. It frames implementation by the Energiegesetz, building-efficiency programmes, and CO2 Act revisions, while phasing out new nuclear builds and
  reorienting research and infrastructure planning.

  '

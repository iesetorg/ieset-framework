policy_id: bangladesh_new_industrial_policy_1982
status: candidate
title: Bangladesh New Industrial Policy 1982
countries:
- BGD
timeframe:
  start: 1982
  end: ongoing
description: 'The New Industrial Policy 1982 issued by the Ershad government broke from earlier post-independence nationalisation by privatising 33 jute and textile mills, removing investment ceilings on
  private enterprise, and restoring the Dhaka Stock Exchange. The framework introduced bonded-warehouse and back-to-back LC facilities for export-oriented manufacturing and reoriented industrial strategy
  toward private and FDI-driven growth, particularly in ready-made garments.

  '

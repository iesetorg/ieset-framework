description: 'Mauritania and the European Union concluded the 2021-2026 protocol implementing their Sustainable Fisheries Partnership Agreement. The protocol defined EU vessel access, fishing categories,
  licence and quota conditions, scientific and monitoring rules, sectoral support, and conservation-oriented cooperation for Mauritanian waters.

  '

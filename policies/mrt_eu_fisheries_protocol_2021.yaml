  direction: +
  magnitude: moderate
  intended: true
  rationale: The protocol sets access categories, licences, quotas, and monitoring conditions for foreign vessels.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: The agreement includes scientific, conservation, and sustainable-management conditions for fisheries access.
references:
- European Union, Protocol implementing the Sustainable Fisheries Partnership Agreement between the EU and Mauritania, 2021-2026.
- Council of the European Union decision and protocol materials for the Mauritania-EU fisheries agreement, 2021.
notes: 'The agreement is supranational but coded to Mauritania because the regulated resource access and sectoral support apply to Mauritanian waters.

  '

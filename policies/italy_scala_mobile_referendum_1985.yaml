description: 'Abrogative referendum 9-10 June 1985 called by PCI sought to repeal the 1984 Decreto San Valentino. 54.3% voted NO (retained the Craxi government decree); 45.7% voted YES. Canonical defeat
  for PCI as flagship policy campaign. Cemented labour-market-flexibility move; Confindustria and pentapartito parties all campaigned No. Scala mobile was fully abolished in 1992 (Amato protocol).


policy_id: south_africa_labour_relations_act_1995
status: candidate
title: South Africa Labour Relations Act 1995
countries:
- ZAF
timeframe:
  start: 1994
  end: ongoing
description: 'The Labour Relations Act 66 of 1995 codified the post-apartheid labour-relations framework under the Mandela government, establishing the Commission for Conciliation, Mediation and Arbitration
  (CCMA), bargaining councils, and protections against unfair dismissal. It enshrined collective bargaining, union recognition rights, and worker participation forums.

  '

description: 'Pablo Escobar surrendered 19 June 1991 to the Gaviria government under the Sometimiento a la Justicia framework in exchange for non-extradition guaranteed by the 1991 Constitution. Held at
  the custom-built La Catedral prison in Envigado. Escaped 22 July 1992 after the government attempted to transfer him; 16-month manhunt led by the Bloque de Búsqueda (Colombian police + DEA + Search Bloc)
  with US special-operations support, pressured also by Los Pepes vigilante group. Escobar killed on a Medellín rooftop 2 December 1993. Medellín Cartel collapsed.

  '

policy_id: indonesia_balanced_budget_rule_1967_1997
status: candidate
title: Indonesia Balanced Budget Rule 1967 1997
countries:
- IDN
timeframe:
  start: 1966
  end: 1998
description: 'Suharto''s New Order regime adopted a constitutional-style balanced-budget rule from 1967, prohibiting domestic monetary financing of fiscal deficits and requiring any shortfall to be matched
  by external concessional borrowing. Operated through Bappenas and the Ministry of Finance, the rule anchored macroeconomic stability across three decades and was widely cited as a key institutional discipline
  underpinning Indonesia''s high-growth period.

  '

policy_id: mx_minimum_wage_doubling_2018_2024
status: candidate
title: Mexican minimum-wage doubling (2018-2024)
countries:
- MEX
timeframe:
  start: 2018
  end: 2024
description: 'Sustained above-inflation increases to the national minimum wage by the tripartite CONASAMI under AMLO: from MXN 88.36/day at the start of 2018 to MXN 248.93/day national rate (MXN 374.89/day
  in the Frontier Free Zone) at the start of 2024 — approximately doubling in real terms. Not a single statute but an annual fijación, with continuity into Sheinbaum''s term (MXN 278.80/day national by
  2025). Decoupled from unidad de medida y actualización (UMA) in 2016 to prevent knock-on transfer costs.

  '

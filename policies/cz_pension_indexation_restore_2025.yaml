# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: cz_pension_indexation_restore_2025
status: candidate
title: Czech restoration of pension indexation rules (2025)
countries:
- CZE
timeframe:
  start: 2025
  end: ongoing
description: >
  Restoration or softening of pension-indexation rules after the previous
  government's pension and consolidation changes. The policy raises the automatic
  transfer path for pensioners relative to the 2023-2024 reform baseline, trading
  stronger elderly-income protection and political predictability against a
  larger long-run pension outlay and weaker fiscal consolidation.
enacted_by:
- czech_republic_babis_ano_second_2025_present
coalition_label_at_enactment: ANO 2011, SPD, and Motorists for Themselves coalition
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Restored indexation increases automatic pension transfers relative to the prior-law path.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher pension transfers increase general-government expenditure over the medium term.
linked_hypotheses:
- public_pension_generosity_elderly_poverty_fiscal_tradeoff
- public_pension_unfunded_liability_crowd_out
- transfer_expansion_work_incentive_long_run
references:
- Czech government programme statement and 2025 pension pledges
- Czech Ministry of Labour and Social Affairs pension-indexation materials, 2025
notes: Created to materialise a declared policy on czech_republic_babis_ano_second_2025_present.

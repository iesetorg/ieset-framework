policy_id: gr_deficit_revision_2009_2010
status: candidate
title: Deficit Revision 2009 2010
countries:
- GRC
timeframe:
  start: 2009
  end: 2011
description: 'After the October 2009 PASOK election, the new Papandreou government revised reported 2009 general-government deficit from approximately 6% of GDP to over 12%, eventually settling near 15.4%
  after Eurostat audit. The disclosure exposed years of statistical misreporting under the Karamanlis government, triggered Greek bond-yield spikes, ratings downgrades, and led directly to the May 2010
  Memorandum of Understanding with the EU/IMF.

  '

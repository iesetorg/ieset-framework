policy_id: france_monnet_plan_1947
status: candidate
title: France Monnet Plan 1947
countries:
- FRA
timeframe:
  start: 1945
  end: 1975
description: 'The first Plan de modernisation et d''équipement, drafted under Jean Monnet and adopted by the French cabinet in January 1947, set 1947–1953 quantitative output and investment targets for
  six basic sectors (coal, electricity, steel, cement, agricultural machinery, transport). It paired Marshall Aid counterpart funds with public credit through the Crédit National to recapitalise war-damaged
  industry and entrench the indicative-planning template that subsequent CGP plans extended.

  '
enacted_by:
- france_trente_glorieuses_indicative_planning_1945_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Plan disciplined investment authorisations and import licences within the six priority sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Marshall counterpart funds and Crédit National loans channelled subsidised capital to plan sectors.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Plan was conditioned on Marshall Plan reciprocal trade-liberalisation commitments via OEEC.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Reconstruction investment programme materially raised public capital expenditure.

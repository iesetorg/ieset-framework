policy_id: gh_e_levy_repeal_2025
status: candidate
title: Ghana repeal of the electronic transactions levy (2025)
countries:
- GHA
timeframe:
  start: 2025
  end: ongoing
description: >
  Repeal of Ghana's Electronic Transfer Levy as part of the 2025 tax-policy
  reset promised by the incoming NDC government. The change removes a broad
  charge on mobile-money and other digital transfers that had been politically
  salient since 2022, reducing the tax wedge on formal digital payments while
  forcing the fiscal programme to recover revenue through other base-broadening,
  compliance, and expenditure measures.
enacted_by:
- ghana_mahama_ndc_second_2025_present
coalition_label_at_enactment: NDC Mahama second government
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing a transaction levy on low-value digital payments reduces a regressive tax wedge relative to income- or profit-based revenue instruments.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Lowering digital-payment frictions supports mobile-money use and formal small-business transactions at the margin.
linked_hypotheses:
- cash_transaction_tax_digital_monitoring
- tax_simplicity_disposable_income_growth
- capacity_tax_administration_social_spending_poverty_elasticity
references:
- Ghana Ministry of Finance 2025 Budget Statement and Economic Policy
- Ghana Revenue Authority guidance on Electronic Transfer Levy repeal
notes: Created to materialise a declared policy on ghana_mahama_ndc_second_2025_present.

policy_id: ie_property_incentive_reliefs_1998_2006
status: candidate
title: Property Incentive Reliefs 1998 2006
countries:
- IRL
timeframe:
  start: 1997
  end: 2008
description: 'Successive Finance Acts from 1998 onwards layered tax incentives for property development, including Section 23/Section 50 rental reliefs, urban and rural renewal schemes, hotel and student
  accommodation reliefs, and Living-City and Living-over-the-Shop measures. The reliefs subsidised property investment during the Celtic Tiger property boom; many were retrospectively criticised by the
  2009 Commission on Taxation as procyclical tax expenditures.

  '
enacted_by:
- ireland_ahern_ff_1997_2008
axes_moved:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reliefs reduced effective corporate tax for property-investing companies and partnerships.
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Capital allowances and Section 23 write-offs lowered effective taxation of capital income.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax expenditures effectively channelled budgetary support to property development, growing total state-provided resources.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Some reliefs targeted student accommodation and rural renewal areas, complementing in-kind transfers.

policy_id: mexico_article_27_ejido_reform_1992
status: candidate
title: Mexico Article 27 Ejido Reform 1992
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'The 1992 amendment to Article 27 of the Mexican Constitution, together with the new Agrarian Law, ended the post-revolutionary land-distribution mandate and allowed ejido members to title,
  lease, sell, or use as collateral their parcels — opening communal lands to market transactions and corporate partnerships for the first time since 1917. The reform was a precondition for NAFTA agricultural
  integration and aimed to raise rural productivity through clearer property rights.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Aligned land tenure with NAFTA's agricultural opening by enabling private contracting on ejido land.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Allowed corporate and external investors to enter agricultural markets previously closed to ejido land transactions.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Constitutional amendment converted communal usufruct rights into transferable, mortgageable individual titles via PROCEDE certification.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion reforms within the Salinas package strengthened Banxico's autonomy alongside agrarian property reform.

policy_id: ph_k12_basic_education_2013
status: candidate
title: K12 Basic Education 2013
countries:
- PHL
timeframe:
  start: 2010
  end: 2016
description: 'Republic Act 10533 (Enhanced Basic Education Act of 2013) under the Aquino III government extended Philippine basic education from ten to thirteen years, adding mandatory kindergarten and
  Senior High School (Grades 11–12) and aligning the system with global K-12 norms. The reform reorganised curricula and senior-cycle tracks, expanded DepEd capacity through new schools and teachers, and
  was financed by a sustained increase in the education budget share.

  '

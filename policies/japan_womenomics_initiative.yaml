policy_id: japan_womenomics_initiative
status: candidate
title: Japan Womenomics Initiative
countries:
- JPN
timeframe:
  start: 2012
  end: 2020
description: 'The Abe government''s "Womenomics" agenda, launched as part of the 2013 Japan Revitalization Strategy, set targets to lift female labour-force participation and raise women in management toward
  30% of leadership positions, backed by expanded daycare capacity, parental leave reforms, and corporate disclosure requirements under the 2015 Act on Promotion of Women''s Participation. It addressed
  Japan''s demographic-driven labour-supply gap as a structural complement to the first two arrows of Abenomics.

  '

description: 'President''s Task Force on National Health Care Reform led by Hillary Clinton drafted the 1,342-page Health Security Act introduced November 1993. Proposed employer mandate, managed competition
  via regional Health Alliances, universal coverage by 1998, price controls on premiums, prescription-drug coverage under Medicare. Opposed by Harry and Louise ads, Health Insurance Association of America,
  and Senator Moynihan''s Finance Committee strategy. Senator Mitchell pronounced the bill dead 26 September 1994 without floor vote. Contributed to Republican sweep November 1994 midterms (+54 House /
  +8 Senate seats).

  '

title: Canada Carbon Pricing Ghgppa 2018
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'The Greenhouse Gas Pollution Pricing Act (GGPPA), enacted in 2018, established a federal "backstop" carbon-pricing framework that imposes a fuel charge and an Output-Based Pricing System (OBPS)
  on emissions-intensive trade-exposed industries in any province whose own carbon-pricing regime falls below a federal benchmark. The fuel charge began at C$20/tCO2e in 2019 and rose to C$80/t by 2024
  with a scheduled C$170/t by 2030; the SCC upheld the act''s constitutionality in 2021 (References re GGPPA).

  '

policy_id: france_church_state_separation_1905
status: candidate
title: France separation of Church and State 1905
countries: [FRA]
timeframe:
  start: 1905
  end: 1905
  enacted_date: "1905-12-09"
description: >
  The Law of 9 December 1905 ended the Napoleonic Concordat regime,
  guaranteed freedom of conscience and worship subject to public order,
  and stopped the republic from recognising or salariedly funding any
  religion. Although remembered above all as the founding text of French
  laicite, it was also a major institutional settlement: the state moved
  toward a single secular public-law framework rather than confessional
  administration, while church property and worship were reorganised
  through legally defined association and building rules.
enacted_by:
  - france_radical_republican_reform_1901_1914
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The law standardised a secular legal order in which the state treated religions through uniform public rules rather than privileged confessional bargains."
references:
  - "Loi du 9 decembre 1905 concernant la separation des Eglises et de l'Etat"
  - "Assemblee nationale, La loi du 9 decembre 1905"

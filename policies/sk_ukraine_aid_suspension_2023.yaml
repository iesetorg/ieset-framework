status: candidate
title: Slovakia state military-aid suspension for Ukraine 2023
countries:
- SVK
timeframe:
  start: 2023
  end: ongoing
description: 'Slovakia''s fourth Fico government stopped new state donations of military equipment from Slovak army stocks to Ukraine after taking office in 2023, while leaving commercial arms sales and
  non-military assistance channels available. The policy reversed the prior government''s state-donation posture and made future military transfers subject to the new coalition''s restrictive line on Ukraine
  aid.

  '

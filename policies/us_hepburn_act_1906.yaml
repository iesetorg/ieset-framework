policy_id: us_hepburn_act_1906
status: candidate
title: Hepburn Act 1906
countries: [USA]
timeframe:
  start: 1906
  end: 1906
  enacted_date: "1906-06-29"
description: >
  The Hepburn Act sharply expanded the Interstate Commerce Commission's authority
  over railroad rates and practices, extending regulation to pipelines, terminals,
  sleeping-car companies, and ferries connected to interstate commerce. The reform
  let the ICC set maximum rates and inspect carrier accounts, converting an earlier
  and weaker oversight regime into something much closer to public-utility regulation
  for the country's core transport network.
enacted_by:
  - us_progressive_era_reform_consensus_1901_1917
axes_moved:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The ICC gained stronger supervisory and quasi-rate-setting authority over a nationally strategic network industry."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "The act constrained pricing freedom through stronger rate regulation even while aiming to curb monopoly abuses."
references:
  - "Hepburn Act, 34 Stat. 584 (1906)"
  - "Kolko (1965), Railroads and Regulation"

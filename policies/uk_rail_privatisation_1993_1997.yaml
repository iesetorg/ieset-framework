policy_id: uk_rail_privatisation_1993_1997
status: candidate
title: Rail Privatisation 1993 1997
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'The UK''s Railways Act 1993, enacted by the Major Conservative government, broke up British Rail by 1 April 1997 into a track-and-infrastructure operator (Railtrack, listed 1996), 25 train-operating
  franchises tendered for fixed terms, three rolling-stock leasing companies (ROSCOs), freight operators, and a Strategic Rail Authority. The intended effect was to introduce private capital and competitive
  pressure into Britain''s nationalised railway, transfer financial risk to private operators, and reduce direct public-sector subsidy — completing the privatisation programme begun with Telecom (1984)
  and energy utilities (1986-91).

  '
enacted_by:
- uk_major_post_thatcher_1990_1997

policy_id: hr_labour_act_amendments_2023
status: candidate
title: Croatia Labour Act amendments 2023
countries:
- HRV
timeframe:
  start: 2023
  end: ongoing
description: 'Croatia amended the Labour Act from 2023 to update employment rules on fixed term contracts, remote work, platform-mediated work, work-life balance, additional work for another employer, and
  employee information rights. The package tightened parts of employment protection while formalising new work arrangements that had expanded during and after the pandemic.

  '
enacted_by:
- croatia_plenkovic_hdz_eu_integration_2016_present
scope: national
coalition_label_at_enactment: Plenkovic HDZ-led coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: Limits on fixed-term use and stronger worker rights tightened protection, while remote and additional-work rules clarified flexible arrangements.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Codified written-information, remote-work, and platform-work obligations made employment status and enforcement more predictable.
references:
- Croatia Act on Amendments to the Labour Act, Official Gazette Narodne novine 151/2022, in force from 1 January 2023
- Croatian Ministry of Labour and Pension System explanatory materials on the 2023 Labour Act amendments

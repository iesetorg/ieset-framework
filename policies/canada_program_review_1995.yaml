policy_id: canada_program_review_1995
status: candidate
title: Canada Program Review 1995
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'The 1995 Program Review, led by the Chrétien-Martin Liberal government and announced in the February 1995 Budget, applied six tests (public interest, role of government, federalism, partnership,
  efficiency, affordability) across all federal departments to identify spending reductions of roughly 19% over three years. Implemented through Treasury Board guidelines and successive Estimates, it cut
  transfers to provinces, defence, and program spending. The intended effect was to stabilise federal debt-to-GDP and restore fiscal credibility after the early-1990s deficit crisis.

  '

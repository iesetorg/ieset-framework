policy_id: turkey_post_2016_institutional_consolidation
status: candidate
title: Turkey Post 2016 Institutional Consolidation
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
description: 'Turkey''s post-2016 institutional consolidation, anchored in the State of Emergency Decrees (KHK) following the 15 July 2016 coup attempt and the 2017 constitutional referendum that introduced
  the executive presidency, dismissed approximately 130,000 public-sector employees, restructured the judiciary (HSK reform), and concentrated regulatory and central-bank appointments under the Presidency.
  The intended effect was to insulate the executive against further coup risk, fuse legislative-executive power, and centralise economic-policy decision-making — at the cost of internationally observable
  declines in rule-of-law and central-bank-independence indicators.

  '
enacted_by:
- turkey_erdogan_akp_2002_present

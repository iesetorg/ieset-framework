description: Lower marginal tax rates, broaden tax base, simplify brackets, index to inflation. ERTA 1981 cut top marginal rate from 70% to 50%; TRA 1986 cut it further to 28% while eliminating many tax
  shelters. Deficit expanded as cuts were not matched by spending cuts; supply-side claim that cuts would pay for themselves through growth was partially but not fully borne out.

policy_id: ec_imf_eff_2019
status: candidate
title: Ecuador IMF Extended Fund Facility 2019
countries:
- ECU
timeframe:
  start: 2019
  enacted_date: '2019-03-11'
description: 'Three-year USD 4.209bn Extended Fund Facility approved by the IMF Executive Board on 11 March 2019, part of a USD 10.2bn multilateral package (IDB, World Bank, CAF, AFD). Programme targeted
  a 5pp-of-GDP fiscal adjustment over three years through public-payroll reduction, fuel-subsidy reform, VAT base broadening, and central-bank balance- sheet restructuring to re-impose reserve-backing.
  Suspended after the Oct 2019 unrest and superseded by a new EFF in Sep 2020.

  '
enacted_by:
- ecuador_moreno_2017_2021
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  rationale: Primary-balance path required capex compression and payroll restraint.
  intended: true
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  rationale: Programme conditionality required reserve-backing of BCE liabilities and unwinding of quasi-fiscal lending.
  intended: true

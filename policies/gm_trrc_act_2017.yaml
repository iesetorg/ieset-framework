policy_id: gm_trrc_act_2017
status: candidate
title: The Gambia Truth, Reconciliation and Reparations Commission Act 2017
countries:
- GMB
timeframe:
  start: 2017
  end: 2021
description: 'The Gambia enacted the Truth, Reconciliation and Reparations Commission Act after the end of Yahya Jammeh''s rule to investigate human-rights violations, establish an official record, identify
  victims and perpetrators, recommend reparations, and support institutional reforms. The commission became the central transitional-justice mechanism of the early Barrow period.

  '
enacted_by:
- gambia_barrow_democratic_transition_reform_2017_present
scope: national
coalition_label_at_enactment: Barrow transition coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: The TRRC created a formal accountability and victim-recognition process after authoritarian rule.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Its recommendations created a record and reform agenda for later prosecutorial and judicial action.

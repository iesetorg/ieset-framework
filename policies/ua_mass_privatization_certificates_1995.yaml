policy_id: ua_mass_privatization_certificates_1995
status: candidate
title: Ukraine mass privatisation certificate programme 1995
countries: [UKR]
timeframe: {start: 1995, end: 1999}
description: >
  Ukraine's mid-1990s mass privatisation programme distributed privatisation
  certificates and transferred many medium and large enterprises out of direct
  state ownership. The mechanism broadened formal private ownership but often
  entrenched insider managers and emerging financial-industrial groups rather
  than creating dispersed competitive ownership.
enacted_by:
  - ukraine_independence_transition_1991_1999
axes_moved:
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, intended: true, rationale: "State assets moved into private hands, but insider capture and weak minority protections limited effective property-right security."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, intended: true, rationale: "Ownership pluralisation reduced direct state production but did not reliably break inherited monopolies."}
references:
  - "Åslund (2009), How Ukraine Became a Market Economy and Democracy"
  - "EBRD Transition Report, Ukraine privatisation coverage"

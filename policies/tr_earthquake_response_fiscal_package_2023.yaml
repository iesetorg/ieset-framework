description: 'Magnitude 7.8 + 7.5 earthquakes struck south-east Turkey 6 February 2023, killing over 50,000 and affecting 11 provinces. Three-month OHAL declared 8 Feb 2023; additional earthquake tax ("deprem
  vergisi") levied via Law 7440 (12 Mar 2023) including corporate one-off and special-consumption surcharges estimated to raise ~TRY 130bn. Central government pledged TRY 1trn reconstruction envelope across
  2023-2024. Public-works and housing scale-up via TOKİ for 319,000 units. Programme bridges the 2018-2023 and 2023-present movement phases and is co-executed post-election.

  '

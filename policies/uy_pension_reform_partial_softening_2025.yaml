status: candidate
title: Uruguay Pension Reform Partial Softening (2025)
countries:
- URY
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-01'
description: 'The Orsi government partially softened the inherited Ley 20.130 pension settlement through targeted improvements for low-benefit retirees rather than wholesale repeal of the 2023 parametric
  reform. BPS described an additional 2 percent increase from July 2025 and a further 1 percent from July 2026 for about 115,000 minimum-income retirees and pensioners, on top of the ordinary inflation-linked
  adjustment, while the government preserved the core retirement-age transition and AFAP/BPS architecture after the October 2024 repeal plebiscite failed.

  '

policy_id: nicaragua_foreign_trade_monopoly
status: candidate
title: Nicaragua Foreign Trade Monopoly
countries:
- NIC
timeframe:
  start: 1979
  end: 1990
description: 'Beginning in 1979 the Sandinista government progressively centralised foreign trade through state enterprises — ENABAS for grain, ENAL for cotton, ENCAR for meat, and ENICAFE for coffee —
  that held exclusive export-procurement and import-allocation rights for major commodities. The Ministry of Foreign Trade (MICE) coordinated licensing, foreign-exchange allocation, and pricing, displacing
  the private export-trading houses that had dominated under the Somoza era.

  '
enacted_by:
- nicaragua_sandinista_1979_1990
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Removal of private export licences extinguished property rights of trading houses over their established commercial channels.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State export-import monopolies eliminated competition among intermediaries in cotton, coffee, meat, and grain.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Below-market procurement prices for export crops and subsidised consumer imports operated as cross-household transfers.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: State-trading-enterprise losses and FX subsidies pushed sustained outlays onto the public balance sheet.

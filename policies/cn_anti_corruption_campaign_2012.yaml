policy_id: cn_anti_corruption_campaign_2012
status: candidate
title: Anti Corruption Campaign 2012
countries:
- CHN
timeframe:
  start: 2012
  end: ongoing
description: 'Sweeping anti-corruption campaign launched in late 2012 under Xi Jinping, run by the Central Commission for Discipline Inspection (CCDI) and from 2018 the National Supervisory Commission.
  Targeted both ''tigers'' (senior officials) and ''flies'' (low-level cadres), investigating millions of officials and consolidating Xi''s political authority while disciplining factions across party,
  military, and SOE hierarchies.

  '
enacted_by:
- china_xi_era_2012_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Concentrated political risk discouraged risk-taking and entrenched politically connected SOE incumbents.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: CCDI investigations chilled discretionary licensing decisions, slowing approvals in many sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Movement-aligned industrial-policy spending grew as the campaign reasserted central control.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter discipline on cross-border activity and FX channels reduced effective trade-finance openness.

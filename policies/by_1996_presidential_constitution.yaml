# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: by_1996_presidential_constitution
status: candidate
title: Belarus 1996 presidential constitutional consolidation
countries: [BLR]
timeframe: {start: 1996, end: ongoing}
description: >
  Belarus's 1996 constitutional referendum expanded presidential powers,
  extended Alexander Lukashenko's term, and weakened parliamentary and judicial
  constraints. The reform consolidated executive control over policy, courts,
  appointments, and state administration.
enacted_by:
  - belarus_lukashenko_state_capitalism_1994_present
axes_moved:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, intended: true, rationale: "Executive authority expanded at the expense of legislative and constitutional checks."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, intended: true, rationale: "Judicial and constitutional oversight became more subordinated to the presidency."}
references:
  - "OSCE reports on Belarus constitutional referendum 1996"
  - "Freedom House, Belarus country reports"

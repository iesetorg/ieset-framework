policy_id: china_household_responsibility_1978
status: candidate
title: China Household Responsibility System 1978
countries:
- CHN
timeframe:
  start: 1978
  end: 2012
description: 'Bottom-up rural decollectivisation that began informally in 1978 in Xiaogang village, Anhui, and was endorsed and generalised by the 1982 Central Committee Document No. 1. The household responsibility
  system replaced commune-based collective production with long-term household contracts over land, requiring delivery of a fixed quota to the state at procurement prices and allowing households to retain
  residual output for sale on rural markets. By 1984, ~98% of farm households operated under the system; agricultural output, productivity, and rural incomes rose sharply through the early 1980s.

  '
enacted_by:
- deng_xiaoping_reforms_1978
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Above-quota output sold on rural markets at unregulated prices reintroduced competitive farm-gate price signals.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Surplus rural labour and food output enabled the parallel coastal export-zone strategy of the early reform period.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Long-term household contracts (initially 15y, later 30y) created de facto use rights and residual claimancy without formal title.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: 1979 procurement-price increase (~20%) and reduced grain quotas raised the implicit fiscal transfer to the rural sector.

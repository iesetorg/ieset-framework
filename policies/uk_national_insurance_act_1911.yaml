# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: uk_national_insurance_act_1911
status: candidate
title: National Insurance Act 1911
countries: [GBR]
timeframe:
  start: 1911
  end: 1911
  enacted_date: "1911-12-16"
description: >
  The National Insurance Act created contributory national insurance against sickness
  and certain forms of unemployment for large sections of the British workforce, financed
  by worker, employer, and state contributions. It combined cash benefits, panel-doctor
  coverage, and a national administrative apparatus for social insurance. The act did not
  create a universal welfare state, but it established the core principle that labour-market
  insecurity should be pooled through a national scheme rather than left to charity, mutualism,
  or post hoc poor relief.
enacted_by:
  - uk_new_liberalism_1906_1914
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The act created a durable social-insurance transfer mechanism covering sickness and unemployment risks."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Tripartite contributions and administration expanded the state's direct role in funding and running income-security programmes."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Contributory insurance thickened payroll administration and formalized labour-market participation rules relative to a less structured pre-1911 regime."
references:
  - "National Insurance Act 1911"
  - "Gilbert (1966), The Evolution of National Insurance in Great Britain"

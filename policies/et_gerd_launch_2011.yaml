policy_id: et_gerd_launch_2011
status: candidate
title: Grand Ethiopian Renaissance Dam launch
countries:
- ETH
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-04-02'
description: 'On April 2 2011 Meles Zenawi laid the foundation stone for the Grand Ethiopian Renaissance Dam (GERD) on the Blue Nile near the Sudanese border, launching Africa''s largest hydropower project
  at ~6,000-6,450 MW installed capacity and $4-5bn cost, financed primarily through domestic bond sales, state-enterprise contributions, and the national budget rather than external lenders. Construction
  executed by Salini Impregilo; Metals and Engineering Corporation (METEC) took electromechanical works until replaced after delays. First power generated Feb 2022; reservoir fillings 2020-2023 triggered
  diplomatic disputes with Egypt and Sudan.

  '

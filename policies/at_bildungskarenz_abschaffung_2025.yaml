policy_id: at_bildungskarenz_abschaffung_2025
status: candidate
title: Abolition of Bildungskarenz paid education leave 2025
countries:
- AUT
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-28'
description: 'Abolished the Bildungskarenz — a statutory entitlement to paid education leave funded via unemployment-insurance-linked Weiterbildungsgeld — effective April 2025, with transitional provisions
  for existing entitlements. Framed as an active-labour-market policy reform closing a scheme with documented deadweight effects (evaluations had found substantial use among workers already planning parental
  leave or job transitions) and delivering expenditure savings of roughly EUR 350m annually. Replaced by a narrower, means-tested Weiterbildungsfoerderung for documented skill-gap qualifications.

  '
enacted_by:
- austria_stocker_ovp_spo_neos_2025_present
coalition_label_at_enactment: OeVP-SPOe-NEOS
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Raises effective labour supply by removing a paid leave entitlement widely evaluated as carrying deadweight.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Savings ~EUR 350m/yr; replacement programme narrower in scope.
references:

policy_id: bo_imf_rfi_loan_2020
status: candidate
title: IMF Rapid Financing Instrument USD 327m loan to Bolivia (2020)
countries:
- BOL
timeframe:
  start: 2020
  enacted_date: '2020-04-17'
description: 'Áñez administration contracted a USD 327 million Rapid Financing Instrument from the IMF on April 17, 2020 to address the COVID-19 balance- of-payments shock, Bolivia''s first IMF financing
  arrangement in many years. The incoming Arce government in February 2021 returned the funds (USD 351.5m including interest) declaring the loan unconstitutional on grounds it had not been approved by the
  Legislative Assembly. The repayment coincided with initial reserve depletion that would later become the dollar crisis.

  '

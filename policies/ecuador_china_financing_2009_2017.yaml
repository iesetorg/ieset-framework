policy_id: ecuador_china_financing_2009_2017
status: candidate
title: Ecuador China Financing 2009 2017
countries:
- ECU
timeframe:
  start: 2007
  end: 2017
description: 'Locked out of capital markets after the 2008 default, Correa''s government turned to the China Development Bank and CHEXIM for a series of oil-collateralised loans, project finance, and pre-paid
  sales agreements. Lending financed hydro projects (Coca Codo Sinclair, Sopladora), refineries, and budget gaps, with repayment in barrels of crude. Total Chinese exposure exceeded USD 17bn by 2017, embedding
  long-tenor commodity-linked obligations into Ecuador''s fiscal stance.

  '
enacted_by:
- ecuador_correa_21st_century_socialism_2007_2017
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Chinese loan disbursements directly funded a higher path of public-investment outlays.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Oil-pre-sale clauses functioned as forward corporate take from Petroecuador's revenue stream.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Lending crowded out budget cuts and sustained social-transfer expansion through the commodity bust.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Loan-tied procurement rules privileged Chinese contractors in licensing of major infrastructure projects.

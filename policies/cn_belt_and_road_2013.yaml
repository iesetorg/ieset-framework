policy_id: cn_belt_and_road_2013
status: candidate
title: Belt And Road 2013
countries:
- CHN
timeframe:
  start: 2012
  end: ongoing
description: 'Belt and Road Initiative (BRI) announced by Xi Jinping in 2013, comprising the Silk Road Economic Belt (overland) and the 21st-century Maritime Silk Road. Funded via the Silk Road Fund (2014),
  Asian Infrastructure Investment Bank (2016), and state-bank lending, the programme channelled state-directed credit into infrastructure in over 140 partner countries, expanding China''s overseas industrial-policy
  and geo-economic footprint.

  '
enacted_by:
- china_xi_era_2012_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Channeled overseas projects to Chinese SOEs on directed-credit terms, advantaging state incumbents.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BRI projects often required preferential licensing and procurement carve-outs for Chinese contractors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State-bank lending at concessional rates functioned as cross-border subsidy to construction and energy firms.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bilateral procurement and standards bundling tied trade flows to political relationships rather than open markets.

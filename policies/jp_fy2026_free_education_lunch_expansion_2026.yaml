policy_id: jp_fy2026_free_education_lunch_expansion_2026
status: candidate
title: Japan FY2026 tuition-free education and school-lunch expansion
countries:
- JPN
timeframe:
  start: 2026
  end: ongoing
  enacted_date: '2025-12-26'
description: 'The FY2026 budget added a central-and-local government envelope of about JPY0.7tn for the realisation of so-called tuition-free education, covering high school tuition and elementary-school
  lunches. It also kept the broader Children and Child-Rearing acceleration plan on track toward JPY3.6tn by FY2028, including childcare benefit conversion and contribution exemptions for freelancers during
  child-rearing. The policy expands in-kind and near-cash household support in a low-fertility context while being embedded in the administration''s broader fiscal-discipline narrative.

  '

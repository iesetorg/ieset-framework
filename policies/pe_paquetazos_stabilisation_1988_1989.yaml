  end: 1989
description: '"Paquetazo" of September 1988 (Abel Salinas) devalued inti 85%, raised fuel prices 400%, and doubled transport fares. Further "paquetazo" November 1988 and March 1989. Produced July 1988 riots.
  GDP fell -8.3% (1988), -11.7% (1989). Stabilisation failed; hyperinflation accelerated into mid-1990 handover.

  '

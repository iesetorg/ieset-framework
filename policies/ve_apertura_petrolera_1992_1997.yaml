policy_id: ve_apertura_petrolera_1992_1997
status: candidate
title: Venezuelan Apertura Petrolera 1992-1997
countries:
- VEN
timeframe:
  start: 1992
  end: 1997
description: 'PDVSA-led programme for commercial opening of the petroleum sector via association contracts with foreign majors, authorised by Congress through Article 5 of the Ley que Reserva al Estado
  la Industria y el Comercio de los Hidrocarburos (1975 as interpreted). Three waves: marginal fields (1992-93); Orinoco Heavy Oil Belt strategic associations (Cerro Negro with Exxon, Hamaca with ChevronTexaco+Phillips+PDVSA,
  Petrozuata with Conoco, Sincor with Total+Statoil — 1993-1997); and risk-profit exploration contracts (1996). PDVSA output target 6 MBD by 2007. Reversed by Chávez''s 2007 migración renacionalisation.

  '

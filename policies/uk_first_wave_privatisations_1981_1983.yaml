description: 'British Aerospace (February 1981, £150m), Cable & Wireless (October 1981, £224m), Amersham International (February 1982, £71m), Britoil (November 1982, £549m), Associated British Ports (February
  1983, £46m). Collectively about £1bn of disposals. Set precedent for later mass privatisations (BT 1984, British Gas 1986). First-wave was small-scale relative to the second-wave utilities.

  '

policy_id: ar_indec_intervention_2007_2014
status: candidate
title: INDEC statistical intervention — CPI understatement
countries:
- ARG
timeframe:
  start: 2007
  end: 2014
  enacted_date: '2007-01-29'
description: 'From 29 Jan 2007 Kirchner-appointed officials intervened INDEC (national statistics office) replacing technical staff. Official CPI began systematic under-reporting vs private-consultant estimates
  (gap widened to ~10-20pp/year 2010-2013). IMF censured Argentina Feb 2013 — first ever motion of censure for data misreporting under Art IV. 2014 IPCNu launch partially corrected methodology. Triggered
  CER-indexed-bond litigation + cost ~USD 8bn in underpaid coupons.

  '

policy_id: id_jokowi_tax_amnesty_2016
status: candidate
title: Indonesia tax amnesty 2016
countries:
- IDN
timeframe:
  start: 2016
  end: 2017
  enacted_date: '2016-07-01'
description: 'UU No. 11/2016 on Tax Amnesty ran 1 July 2016 - 31 March 2017, offering concessional tariffs (2%-10%) on disclosed previously- undeclared domestic and offshore assets in exchange for tax forgiveness
  and legal immunity. Declared assets totalled ~Rp 4,866 trillion (~39% of GDP), the largest amnesty by disclosed-asset share in modern history. Repatriated assets ~Rp 147tn; amnesty revenue ~Rp 135tn (~USD
  10bn). Followed by AEOI information exchange commencement 2018 and the Omnibus Tax Law 2021.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIH coalition
axes_moved:
- axis: fiscal.tax_capital
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Concessional amnesty rates lowered effective tax on offshore capital, trading forgiveness for disclosure.
- axis: institutional.rule_of_law
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Amnesty of past tax evasion offset by broader integration of previously off-books assets into the tax net — net neutral.

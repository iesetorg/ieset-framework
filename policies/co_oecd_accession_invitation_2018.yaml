policy_id: co_oecd_accession_invitation_2018
status: candidate
title: OECD accession invitation — Colombia (2018)
countries:
- COL
timeframe:
  start: 2013
  end: 2020
  enacted_date: '2018-05-25'
description: 'Completion of the 2013-initiated OECD accession process: the OECD Council invited Colombia to become a member on 25 May 2018 after seven-year review by 23 technical committees. The roadmap
  drove domestic regulatory reforms across competition policy, corporate governance, trade, anti-corruption (Ley 1778 de 2016), chemicals, labour statistics, and tax transparency. Formal accession completed
  28 Apr 2020 under Duque, making Colombia the 37th OECD member and the third Latin American one after Mexico and Chile.

  '

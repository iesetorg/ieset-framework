description: 'President Boakai issued Executive Order No. 131 to establish an Office of War and Economic Crimes Court as a preparatory institution for implementing accountability recommendations from Liberia''s
  civil-war and corruption legacy. The office is tasked with developing the legal, diplomatic, budgetary, and operational path toward a court process for war crimes and economic crimes.

  '

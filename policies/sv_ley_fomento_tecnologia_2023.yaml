description: 'Approved 12 Apr 2023 by the Nuevas Ideas-led Legislative Assembly, the Ley de Fomento a la Innovación y Manufactura de Tecnologías de la Información y Comunicación establishes a 15-year fiscal-incentive
  regime for tech-sector investment: full exemption from corporate income tax, municipal taxes on activos, import duties on technology goods, and capital-gains tax on qualifying tech-company shares. Targeted
  activities include software development, hardware manufacturing, cybersecurity, AI, nano- and biotech, robotics, IoT, and data-centre operation. The law pairs with the Digital Asset Issuance Law 2023,
  the Bitcoin Office treasury programme, and the broader 2023 tax reform to position El Salvador as a low-tax tech-investment hub.

  '

title: Future Made in Australia industrial policy — 2024
countries:
- AUS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-05-14'
description: 'Announced in the May 2024 Budget and enacted via the Future Made in Australia Act 2024, the package commits ~A$22.7bn over a decade to production tax credits for critical minerals processing
  and renewable hydrogen, plus co-investment in green-metals, quantum (including a A$940m equity stake in PsiQuantum), and solar-panel manufacturing. A "National Interest Framework" directs spending to
  sectors judged to intersect economic resilience or net-zero transition. Explicitly modelled on the US Inflation Reduction Act.

  '

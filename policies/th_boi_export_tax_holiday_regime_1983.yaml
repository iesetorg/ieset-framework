policy_id: th_boi_export_tax_holiday_regime_1983
status: candidate
title: BOI export-oriented tax-holiday regime expansion (Thailand 1983)
countries:
- THA
timeframe:
  start: 1983
  end: 1987
description: 'Board of Investment Promotion Act revisions 1983-1987 expanded tax-holiday regime for export-oriented manufacturing: 3-8 year corporate-income-tax holidays, machinery-import duty exemptions,
  raw-material-import duty exemptions for export production, and double-deduction for export-promotion expenses. Drove FDI surge post-1985 (Japanese electronics and auto relocation after Plaza Accord).

  '

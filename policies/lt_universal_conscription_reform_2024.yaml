policy_id: lt_universal_conscription_reform_2024
status: candidate
title: Lithuania conscription-system reform 2024
countries:
- LTU
timeframe:
  start: 2024
  end: ongoing
description: 'Lithuania amended its military-conscription framework in 2024 to broaden and regularise national service obligations for young citizens, with staged implementation through later cohorts. The
  reform changed eligibility, deferment, service-length, and training arrangements in order to increase reserve readiness and adapt the armed forces to the regional security shock.

  '
enacted_by:
- lithuania_simonyte_paluckas_defence_social_reform_2024_present
scope: national
coalition_label_at_enactment: Simonyte Homeland Union-led coalition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Broader service requires training, administration, equipment, and reserve-management spending.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory service constrains labour-market availability for covered cohorts during service and training periods.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory eligibility, deferment, and service rules make defence obligations more predictable.
references:
- Republic of Lithuania amendments to military conscription legislation, adopted 2024
- Lithuanian Ministry of National Defence materials on conscription-system reform

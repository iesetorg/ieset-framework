description: 'After 2013, the Egyptian Armed Forces broadened their commercial footprint through entities such as the National Service Projects Organization, the Arab Organization for Industrialization,
  and the National Authority for Tunnels. Direct contracting on the New Administrative Capital, food processing, cement, and infrastructure was complemented by tax exemptions, customs privileges, and exemptions
  from public-procurement law, structurally shielding military-affiliated firms.

  '

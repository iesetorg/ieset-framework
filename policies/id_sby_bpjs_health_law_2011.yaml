policy_id: id_sby_bpjs_health_law_2011
status: candidate
title: BPJS Kesehatan universal health insurance law 2011
countries:
- IDN
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-10-25'
description: 'UU No. 24/2011 establishing BPJS Kesehatan (Social Security Administrative Body for Health) as the single-payer vehicle for universal health coverage, consolidating Askes (civil servants),
  Jamsostek (formal-sector workers), Jamkesmas (poor) and other schemes. Operational launch 1 January 2014 targeting universal coverage by 2019. Enrolment reached ~230m (~83% of population) by end-2020.
  Financed by contributions for formal workers and government-paid premiums (PBI) for ~96m poor/near-poor. The flagship social-policy reform of the SBY era.

  '

policy_id: uk_council_house_right_to_buy_1980
status: candidate
title: Council House Right To Buy 1980
countries:
- GBR
timeframe:
  start: 1979
  end: 1990
description: 'The Housing Act 1980 introduced the statutory Right to Buy, granting eligible secure council tenants in England, Wales, and Scotland the legal right to purchase their council homes at large
  discounts proportional to length of tenancy. Around 1.5 million dwellings transferred from local-authority to owner-occupation across the 1980s, transforming the UK tenure structure and reducing the social
  housing stock available for re-letting.

  '
enacted_by:
- thatcherism
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Owner-occupation share rose, though tied capital reduced labour mobility on net for ex-tenants.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatisation of housing stock injected secondary-market trading where local-authority allocation had dominated.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mass mortgage lending to former tenants entrenched bank exposure to UK residential property cycle.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory discounts of 33–50% off market value transferred public asset value to incumbent tenants.

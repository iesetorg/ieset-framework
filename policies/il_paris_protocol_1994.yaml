description: 'The Protocol on Economic Relations between Israel and the PLO, signed in Paris 29 April 1994, established a customs envelope between Israel and Palestinian territories: common external tariff,
  Israeli collection of VAT and import duties on behalf of the PA, labour flows from PA into Israel, and shared banking arrangements. The customs-union structure (not free-trade area) tied PA economic performance
  tightly to Israeli decisions on border closures.

  '

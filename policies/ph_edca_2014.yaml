description: 'Enhanced Defense Cooperation Agreement signed by the Aquino III government and the United States in 2014, granting US forces rotational access to designated Armed Forces of the Philippines
  bases for joint training, prepositioning, and humanitarian-response purposes. The agreement complemented the Mutual Defense Treaty against the backdrop of South China Sea tensions and was upheld by the
  Philippine Supreme Court in 2016.

  '

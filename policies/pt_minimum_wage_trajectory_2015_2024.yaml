policy_id: pt_minimum_wage_trajectory_2015_2024
status: candidate
title: Portugal statutory minimum wage (RMMG) trajectory 2015-2024
countries:
- PRT
timeframe:
  start: 2015
  end: 2024
  enacted_date: '2016-01-01'
description: 'Sequenced annual increases in the Retribuição Mínima Mensal Garantida (national minimum wage) negotiated within Concertação Social and enacted by annual decree-law. €505 (2015) → €530 (2016)
  → €557 (2017) → €580 (2018) → €600 (2019) → €635 (2020) → €665 (2021) → €705 (2022) → €760 (2023) → €820 (2024). Cumulative nominal increase of 62% across the Costa period. Accompanied by partial employer
  social- contribution relief for firms below 2.5× RMMG cover threshold. Policy was flagship of geringonça social dimension and was continued across PS-majority phase.

  '
enacted_by:
- portugal_costa_ps_2015_2024
coalition_label_at_enactment: PS with parliamentary support of BE/PCP/PEV 2015-2019; PS minority 2019-2022; PS absolute majority 2022-2024
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  rationale: Rising minimum-wage floor compresses the lower tail of the wage distribution and reduces effective hiring flexibility at the bottom, though at levels where bite is moderate.
  intended: false
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  rationale: Compensation-transfer expansion via the wage floor; indirect fiscal effect through tax revenue and social-contribution base.
  intended: true
references:
- Decreto-Lei sequence setting annual RMMG (2015-2023)
- Banco de Portugal, Boletim Económico, Recuadros on minimum wage (multiple)
- Conselho das Finanças Públicas, wage-floor impact notes

policy_id: japan_factory_act_1911_1916
status: candidate
title: Japan Factory Act 1911 (effective 1916)
countries: [JPN]
timeframe:
  start: 1911
description: >
  Japan's first national Factory Act was enacted in 1911 and came into force in 1916
  after a long delay and dilution. It introduced limited restrictions on child labour,
  night work by women and minors, and some inspection authority in larger factories.
  The law was narrow by later standards, but it marked the first durable break from the
  assumption that the industrial labour market could be left almost entirely to employer
  discretion in the export-oriented textile and light-manufacturing economy.
enacted_by:
  - japan_prewar_state_building_social_incorporation_1906_1931
coalition_label_at_enactment: "Imperial government under Saionji Kinmochi"
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "The act imposed modest national limits on working conditions for women and minors in covered factories."
references:
  - "Factory Act (1911; effective 1916)"
  - "Hunter (2003), Women and the Labour Market in Japan's Industrialising Economy"

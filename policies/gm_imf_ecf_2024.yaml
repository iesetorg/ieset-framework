description: 'The Gambia entered a new IMF Extended Credit Facility arrangement in January 2024 after the 2023 Article IV consultation. The programme aims to strengthen recovery, reduce debt vulnerabilities,
  address inflation and foreign-exchange pressures, build fiscal and external buffers, improve revenue administration and public financial management, and support governance and business-climate reforms.

  '

title: Martin Budget 1995 — Canadian deficit slaying
countries:
- CAN
timeframe:
  start: 1995
  enacted_date: '1995-02-27'
description: 'Finance Minister Paul Martin''s Budget of 27 February 1995. Programme spending cut 19% real over three years; federal public service reduced by ~45,000 FTE (~14%); major departmental restructuring
  (Canadian International Development Agency, Transport, Defence); announced Canada Health and Social Transfer consolidating Established Programs Financing and Canada Assistance Plan. Federal deficit 5.3%
  GDP (FY1994-95) → surplus FY1997-98, earliest G7 balanced budget. Catalyst: January 1995 Wall Street Journal editorial calling Canada "an honorary member of the Third World" and peso-like bond-market
  sentiment.

  '

policy_id: brazil_inflation_targeting_1999
status: candidate
title: Brazil Inflation Targeting 1999
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'Decree 3088/1999 formally adopted an inflation-targeting regime at the Banco Central do Brasil following the January 1999 collapse of the crawling-peg exchange rate. The framework set numerical
  CPI targets approved by the Conselho Monetario Nacional, with the Copom committee setting the Selic policy rate to meet them and an open letter requirement when targets were missed — anchoring the post-Real
  macro tripod alongside fiscal targets and a floating real.

  '
enacted_by:
- brazil_real_plan_cardoso_1994_2002
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Selic-rate rule tightened policy whenever forecast inflation exceeded the announced target.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Numerical target plus open-letter accountability codified de facto Banco Central operational autonomy.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower inflation expectations reduced indexation rents and price-setting frictions.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Higher real interest rates raised the cost of fiscal slippage, disciplining headline spending.

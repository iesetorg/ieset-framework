# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: bg_agricultural_collectivisation_1946_1958
status: candidate
title: Bulgaria agricultural collectivisation 1946-1958
countries: [BGR]
timeframe: {start: 1946, end: 1958}
description: >
  Bulgaria collectivised agriculture through cooperatives and state farms after
  the communist takeover, using pressure on private farmers and state-directed
  procurement to replace family farming with collective production. The process
  was substantially completed by the late 1950s.
enacted_by:
  - bulgaria_communist_state_building_1944_1989
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, intended: true, rationale: "Private agricultural ownership and control were replaced by collective and state farms."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, intended: true, rationale: "Procurement and plan targets replaced market allocation in agriculture."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, intended: true, rationale: "State support and administered input-output prices channelled resources to collective agriculture."}
references:
  - "Library of Congress Country Study: Bulgaria, collectivisation"
  - "Crampton (2007), Bulgaria"

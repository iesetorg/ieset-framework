  magnitude: moderate
  intended: true
  rationale: The ECF framework targets deficit reduction, arrears clearance, and power-sector fiscal-risk control.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme safeguards and monetary-policy commitments reduce fiscal dominance and support the currency peg.
- axis: institutional.rule_of_law

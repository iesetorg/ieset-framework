policy_id: stp_imf_ecf_fiscal_reform_2023
status: candidate
title: Sao Tome and Principe IMF ECF fiscal reform 2023
countries:
- STP
timeframe:
  start: 2023
  end: ongoing
description: 'Sao Tome and Principe entered an IMF-supported Extended Credit Facility reform programme in 2023 to address fiscal imbalances, arrears, inflation, weak reserves, and power-sector losses.
  The programme emphasizes revenue mobilisation, expenditure control, arrears clearance, public-financial-management improvements, central-bank safeguards, and energy-sector financial repair.

  '

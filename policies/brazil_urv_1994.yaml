policy_id: brazil_urv_1994
status: candidate
title: Brazil Urv 1994
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'In March 1994 finance minister Cardoso introduced the Unidade Real de Valor (URV), a virtual reference unit pegged to the US dollar that all prices, wages, and contracts were progressively
  re-denominated into during a four-month transition. By forcing simultaneous voluntary re-indexation, the URV stripped inertial inflation expectations out of the price system without shock measures, paving
  the way for the launch of the new real currency on 1 July 1994.

  '

description: 'Revised Bank of Japan Act (Law No. 89 of 1997) effective 1 April 1998 replacing the 1942 wartime law under which MoF had de facto control. Established formal operational independence of the
  BoJ, made the Governor removable only for cause, created the nine- member Policy Board with majority-voting procedure, and required price-stability mandate. Transition governor Masaru Hayami took office
  20 March 1998 as first governor under the new framework.

  '

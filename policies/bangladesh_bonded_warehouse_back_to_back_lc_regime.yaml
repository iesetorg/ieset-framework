policy_id: bangladesh_bonded_warehouse_back_to_back_lc_regime
status: candidate
title: Bangladesh Bonded Warehouse Back To Back Lc Regime
countries:
- BGD
timeframe:
  start: 1982
  end: ongoing
description: 'Customs and trade-finance regime introduced in the early 1980s under the New Industrial Policy that gave bona fide RMG exporters duty-free imported inputs through bonded warehouses, paired
  with back-to-back letters of credit allowing master export LCs to be used as collateral for input imports. Administered by the National Board of Revenue and Bangladesh Bank, the framework removed working-capital
  and tariff frictions and became the operational core of the garment-export model.

  '
enacted_by:
- bangladesh_garments_export_industrial_policy_1980s_present
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Duty-free input imports for export-oriented RMG firms eliminated tariff drag along the supply chain.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Bonded-warehouse duty exemption operates as an implicit fiscal subsidy to the export sector.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Trade-finance scale-up underpinned rapid hiring under permissive sectoral labour regulation.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Cash-incentive top-ups paid through banks against export receipts complemented the LC regime.

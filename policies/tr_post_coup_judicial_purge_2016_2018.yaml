title: Post-coup judicial purge (Turkey 2016-2018)
countries:
- TUR
timeframe:
  start: 2016
  end: 2018
  enacted_date: '2016-07-16'
description: 'Starting 16 July 2016, ~4,500 judges and prosecutors (approximately 30% of the judicial corps) were dismissed via HSK decisions and KHK decrees on alleged FETÖ membership grounds. The Constitutional
  Court lost two members by dismissal. Criminal cases against ~160,000 suspects were initiated 2016-2018. Compensation Commission established to review dismissals was criticised by ECtHR in Köksal v. Turkey
  (2017) as an inadequate domestic remedy.

  '

policy_id: pt_iraq_azores_summit_2003
status: candidate
title: Iraq Azores Summit 2003
countries:
- PRT
timeframe:
  start: 2002
  end: 2004
description: 'The Azores Summit of 16 March 2003, hosted at Lajes Airbase by Portuguese Prime Minister Jose Manuel Barroso, brought together US President Bush, UK PM Blair, and Spanish PM Aznar to issue
  a final ultimatum to Iraq before the invasion. Portugal subsequently provided basing rights, refuelling support, and a small military medical contingent. The intended effect was to anchor Portugal in
  the US-led "coalition of the willing", signal Atlantic alignment over EU consensus, and entrench Barroso''s PSD government''s foreign-policy orientation alongside its domestic austerity programme.

  '

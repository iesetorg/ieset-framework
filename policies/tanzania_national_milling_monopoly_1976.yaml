policy_id: tanzania_national_milling_monopoly_1976
status: candidate
title: Tanzania National Milling Monopoly 1976
countries:
- TZA
timeframe:
  start: 1967
  end: 1985
description: 'In 1976 the Tanzanian government granted the National Milling Corporation a statutory monopoly on the milling and distribution of staple grains, replacing private and cooperative millers.
  NMC procured maize and other cereals at panterritorial pan-seasonal prices through the National Agricultural Marketing Board and channelled output through state retail networks, completing the centralised
  food-supply architecture under ujamaa.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ao_nationalisations_state_economy_1976
status: candidate
title: "Post-independence nationalisations and state economy"
countries: [AGO]
timeframe: {start: 1976, end: 1987}
description: >
  After independence, the MPLA nationalised banks, major firms, abandoned
  Portuguese assets, and large segments of urban and productive property while
  organising the economy around state enterprises and central plans. The policy
  established a socialist ownership structure under conditions of civil war and
  rapid settler departure.
enacted_by:
  - angola_mpla_socialist_oil_state_1975_1991
coalition_label_at_enactment: "MPLA"
axes_moved:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Private and expatriate-owned assets were transferred into state ownership or control.", intended: true}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "State enterprises and planning replaced competitive private allocation across major sectors.", intended: true}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "The state assumed direct responsibility for production, employment, and wartime mobilisation.", intended: true}
references:
  - "Tony Hodges, Angola: Anatomy of an Oil State"
  - "IMF, Angola: Recent Economic Developments, transition background"

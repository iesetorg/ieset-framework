description: 'Ley 50 (Ley de Modernización del Estado, Privatizaciones y Prestación de Servicios Públicos por parte de la Iniciativa Privada) of 31 December 1993. Created Consejo Nacional de Modernización
  del Estado (CONAM) with authority over state- enterprise restructuring, privatisation, and public-service concessions. Targeted electricity (INECEL), telecoms (EMETEL), water, and port concessions. Implementation
  hampered by Supreme Court constitutional challenges and union opposition. November 1995 consulta popular referendum rejected key modernisation questions (~60% No).

  '

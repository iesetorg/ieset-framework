description: 'Forsraspakken 2.0 ("Spring Package 2.0") reduced the top marginal PIT rate from 63% to 56% by abolishing the 6% middle-bracket tax, raised the top-bracket threshold, and broadened the base
  (pension-contribution cap reductions and limits on deductibility of interest on mortgage debt, phased 2012-2019). Partially financed by green-tax shifts.

  '

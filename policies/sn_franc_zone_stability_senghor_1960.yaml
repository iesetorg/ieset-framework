# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: sn_franc_zone_stability_senghor_1960
status: candidate
title: "Franc-zone monetary stability"
countries: [SEN]
timeframe: {start: 1960, end: 1980}
description: >
  Senegal remained inside the West African CFA franc monetary arrangements
  after independence, accepting a fixed parity and regional central-banking
  framework tied to France. For the Senghor state this provided convertibility,
  low-inflation discipline, and continued financial links, while limiting
  national discretion over monetary finance and exchange-rate policy.
enacted_by:
  - senegal_senghor_socialist_democracy_1960_1980
coalition_label_at_enactment: "UPS / Socialist Party"
axes_moved:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Regional franc-zone rules constrained direct national executive control over money creation.", intended: true}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "The fixed-parity arrangement limited discretionary monetary expansion relative to sovereign fiat finance.", intended: true}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Convertibility and French financial links supported external commercial integration.", intended: true}
references:
  - "IMF historical material on the CFA franc zone"
  - "World Bank, Senegal macroeconomic historical summaries"

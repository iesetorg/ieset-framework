description: 'The Tennessee Valley Authority Act of 1933 created a federally owned corporation to develop the Tennessee River basin through public hydroelectric generation, flood control, navigation improvement,
  fertiliser manufacturing, and rural electrification. Operating across seven southern states, TVA combined direct federal investment with regional development planning and was a flagship New Deal experiment
  in public power and regional industrial policy.

  '

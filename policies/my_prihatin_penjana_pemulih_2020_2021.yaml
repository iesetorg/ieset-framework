policy_id: my_prihatin_penjana_pemulih_2020_2021
status: candidate
title: PRIHATIN + PENJANA + PEMERKASA pandemic stimulus packages (Malaysia, 2020-2021)
countries:
- MYS
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-03-27'
description: 'Sequence of six COVID-19 economic packages announced by the Muhyiddin PN government: PRIHATIN Rakyat (27 Mar 2020, RM250bn gross / RM25bn direct), PRIHATIN SME+ (6 Apr 2020, RM10bn), PENJANA
  (5 Jun 2020, RM35bn), KITA PRIHATIN (23 Sep 2020, RM10bn), PERMAI (18 Jan 2021, RM15bn), PEMERKASA (17 Mar 2021, RM20bn) and PEMERKASA+ (31 May 2021, RM40bn). Total ~RM380bn gross / ~RM83bn direct fiscal
  outlay across Mar 2020 - Jul 2021 inclusive of subsequent PEMULIH. Cash-transfer architecture (Bantuan Prihatin Nasional, Bantuan Prihatin Rakyat) reached ~11m households. Wage-subsidy programme (PSU)
  covered ~2.7m workers at peak. Tax deferrals, moratorium on SME loans, electricity rebates, and i-Sinar EPF emergency withdrawal scheme (Jan 2021) rounded out the package set.

  '

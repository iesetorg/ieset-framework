description: 'Jyllands-Posten published 12 cartoons depicting the Prophet Muhammad on 30 September 2005. After escalation via diplomatic complaints, ambassador-recall by several OIC states, boycotts, and
  the burning of Danish embassies in Damascus and Beirut (Feb 2006), the crisis became a defining episode of Fogh Rasmussen''s tenure. The government refused to apologise on press-freedom grounds.

  '

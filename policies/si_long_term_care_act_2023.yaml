policy_id: si_long_term_care_act_2023
status: candidate
title: Slovenia Long-Term Care Act 2023
countries:
- SVN
timeframe:
  start: 2023
  end: ongoing
description: 'Slovenia adopted a new long-term care framework in 2023 to phase in universal rights to home care, institutional care, caregiver support, and cash benefits for people needing sustained assistance.
  The reform created a new benefit and assessment architecture and set a staged implementation path supported by a dedicated long-term care contribution.

  '

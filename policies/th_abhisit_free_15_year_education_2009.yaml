policy_id: th_abhisit_free_15_year_education_2009
status: candidate
title: Abhisit Free 15 Year Education 2009
countries:
- THA
timeframe:
  start: 2008
  end: 2011
description: 'Launched in 2009, Thailand''s 15-year free education programme covered tuition, textbooks, school uniforms, supplies, and student-activity fees from kindergarten through upper secondary in
  public institutions. Administered by the Ministry of Education and channelled through schools, the programme expanded the government''s commitment beyond the constitutional 12-year minimum and reduced
  household direct schooling costs across all income groups.

  '

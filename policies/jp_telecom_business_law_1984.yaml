description: 'Law No. 86 of 1984, effective 1 Apr 1985, ended the NTT telecom service monopoly and created a two-tier licensing regime: Type I facilities-based carriers (DDI, Japan Telecom, Teleway Japan
  licensed 1987) and Type II resellers/VANs. Companion law to the NTT Corporation Act. Produced competitive long-distance market by 1990 and mobile market opening 1992.

  '

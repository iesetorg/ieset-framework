policy_id: fi_sote_wellbeing_services_2023
status: candidate
title: Finland social and health services reform (sote-uudistus), 2023
countries:
- FIN
timeframe:
  start: 2023
  enacted_date: '2023-01-01'
description: 'Structural reform of Finnish health, social and rescue services (sosiaali- ja terveydenhuollon uudistus). Legal framework enacted under the Marin government in June 2021 (HE 241/2020 and related
  acts); services transferred from ~300 municipalities to 21 newly created regional wellbeing-services counties (hyvinvointialueet) plus the City of Helsinki and HUS hospital district on 1 January 2023.
  Each wellbeing-services county has a directly elected council (first elections January 2022) but is centrally funded from state transfers rather than with own-source taxation powers. Aimed at reducing
  municipal fiscal fragmentation, narrowing regional inequalities in access, and containing long-run cost growth driven by population ageing. Implementation and financing sustainability continued under
  the Orpo government, which tightened efficiency requirements and permitted county-level consolidation of hospital networks. Three previous governments (Kiviniemi, Katainen/Stubb, Sipilä) had attempted
  and failed to pass comparable reforms.

  '

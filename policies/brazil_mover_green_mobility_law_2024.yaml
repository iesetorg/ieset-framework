  rationale: The programme grants tax credits and industrial incentives to eligible automotive and mobility investments.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eligible firms receive tax credits that reduce the effective corporate tax burden on qualifying projects.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  intended: true
  rationale: Incentives are conditioned on energy-efficiency and lifecycle-emissions requirements for vehicles.

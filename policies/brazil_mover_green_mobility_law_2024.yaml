description: 'Law 14.902/2024 created the Mover green-mobility and innovation programme, replacing the Rota 2030 automotive framework. The programme ties automotive tax credits and industrial incentives
  to research and development, vehicle energy-efficiency and lifecycle-emissions criteria, supply-chain innovation, and lower-carbon mobility technologies.

  '

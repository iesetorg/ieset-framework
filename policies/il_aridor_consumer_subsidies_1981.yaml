description: 'Finance Minister Yoram Aridor''s pre-election 1981 programme sharply expanded consumer subsidies (TVs, washing machines, cars), cut tariffs on imported durables, and held nominal exchange-rate
  appreciation below inflation. Short-term disinflation contributed to the 1981 electoral victory but accelerated current-account deficit and financing needs that fed the 1983 bank-shares crash.

  '

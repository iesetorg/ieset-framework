policy_id: in_bharat_nirman_programme_2005
status: candidate
title: India Bharat Nirman rural-infrastructure programme (2005-2012)
countries:
- IND
timeframe:
  start: 2005
  end: 2012
  enacted_date: '2005-12-16'
description: 'Bharat Nirman rural-infrastructure programme launched December 2005 covering six components: rural roads (PMGSY), rural housing (IAY), rural water supply, rural electrification (RGGVY), irrigation
  (AIBP), and rural telecommunications (BharatNet precursor). Phase-I 2005-09 Rs 1.74 lakh crore, Phase-II 2009-12. Phase-I targets: 67,000 km rural roads, 60,000 villages electrified, 1,000 MW grid capacity
  added, 1.46 crore rural houses, 10m hectares additional irrigation, village-level internet coverage. Most components over-delivered infrastructure targets; service- quality gaps persisted.

  '

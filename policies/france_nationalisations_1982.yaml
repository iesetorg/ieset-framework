title: France — nationalisations of banks and industry (February 1982)
countries:
- FRA
timeframe:
  start: 1982
  end: 1982
  enacted_date: '1982-02-11'
description: 'Loi n° 82-155 du 11 février 1982 nationalised 5 industrial groups (CGE, Rhône-Poulenc, Saint-Gobain, Péchiney-Ugine-Kuhlmann, Thomson), 39 banks with more than 1bn francs in deposits, and
  2 financial holding companies (Paribas, Suez). Compensated ex officio bond- settlement. Political symbol of the Common Programme of the Left. Constitutional Council (Décision 81-132 DC, 16 January 1982)
  upheld law but strengthened compensation framework. Partial reversal under Chirac cohabitation 1986-1988 via privatisation law.

  '

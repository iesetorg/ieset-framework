policy_id: at_pv_anlagen_vat_2024
status: candidate
title: Zero VAT on residential PV systems up to 35 kWp 2024
countries:
- AUT
timeframe:
  start: 2024
  end: 2025
  enacted_date: '2023-12-21'
description: 'Applied a zero VAT rate to the supply, import and installation of photovoltaic modules up to 35 kWp on residential and public-interest buildings, effective 1 January 2024 (sunset end 2025
  pending review). Replaced the prior Investitionsfoerderung subsidy route that had been chronically oversubscribed with an at-point-of-sale price reduction. Transposed under the EU VAT Directive''s 2022
  amendment allowing zero rates for specified green goods.

  '
enacted_by:
- austria_nehammer_ovp_greens_2022_2025
coalition_label_at_enactment: OeVP-Gruene
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: VAT zero-rating is economically equivalent to a subsidy on residential PV; replaces oversubscribed grant programme.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Accelerates residential PV buildout aligned with EAG 2030 targets.

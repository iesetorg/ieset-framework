policy_id: de_corona_sondervermoegen_2020
status: candidate
title: COVID-19 fiscal response — Nachtragshaushalte and Kurzarbeit expansion 2020-2021
countries:
- DEU
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-03-25'
description: 'Emergency invocation of the debt-brake exception clause (Art. 115 Abs. 2 GG, ''außergewöhnliche Notsituation'') to finance ~EUR 470bn in federal support across 2020-2021: Nachtragshaushalte
  March and July 2020, the EUR 600bn Wirtschaftsstabilisierungsfonds guarantees, expanded Kurzarbeitergeld (short-time work) reaching ~6 million workers at peak, Überbrückungshilfen for businesses, and
  VAT rate cut (July-December 2020). Also participated in the EU Next Generation EU / SURE joint- borrowing framework — the precedent-setting shared-debt instrument Merkel had previously opposed. Final
  major fiscal intervention of the Merkel era; set the template the Ampel extended after 2022.

  '
enacted_by:
- germany_merkel_broad_2005_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition

description: 'Iraq Zaytun Division (자이툰 부대) dispatch approved by National Assembly 13 February 2004; deployed 3,600 troops to Erbil, Kurdistan Region August 2004-December 2008. Third-largest coalition contingent
  after US and UK at peak. Civil-engineering and humanitarian role, no combat mission. Triggered progressive opposition (Uri Party internal revolt, anti-dispatch protests); associated with June 2004 Kim
  Sun-il execution by Iraqi militants 24 June 2004 in Baghdad. Withdrawn completed December 2008 under Lee Myung-bak.

  '

description: 'Core programmatic commitment of Perú Libre''s Ideario y Programa: replace the 1993 Fujimori Constitution with a new charter drafted by an elected Constituent Assembly, including nationalisation
  of strategic sectors, plurinational-state framing, and expanded economic rights. The executive sent multiple referendum-authorising bills to Congress through 2021-2022 (including the April 2022 PL 1704/2021-PE)
  seeking to convene an assembly. All proposals were rejected or shelved by a right-dominated Congress. No constituent process advanced; the 1993 Constitution''s institutional architecture (BCRP autonomy,
  fiscal rules, property-rights regime) remained unchanged. Coded as null execution of a stated doctrinal intent; relevant to tracking the programme-to- enactment gap under coalition constraints.

  '

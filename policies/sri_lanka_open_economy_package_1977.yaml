status: candidate
title: Lanka Open Economy Package 1977
countries:
- LKA
timeframe:
  start: 1977
  end: 1994
description: 'The 1977 open-economy package enacted under President J.R. Jayewardene''s UNP government dismantled Sri Lanka''s preceding import-substitution regime through tariff cuts, exchange-rate unification
  and devaluation, removal of import licensing, and partial decontrol of consumer goods. Coupled with the parallel EPZ Act it shifted Sri Lanka toward export-led growth, IMF-supported stabilisation, and
  reduced universal food-subsidy outlays in favor of targeted incentives.

  '

description: 'FIRREA (Pub. L. 101-73), signed 9 August 1989. Abolished FSLIC and FHLBB; created Office of Thrift Supervision; Resolution Trust Corporation to resolve failed thrifts (resolved 747 institutions
  1989-1995); recapitalised FDIC-BIF; raised capital requirements for thrifts; restricted junk-bond holdings and direct real-estate investments. Direct taxpayer cost ~$124B by completion 1995.

  '

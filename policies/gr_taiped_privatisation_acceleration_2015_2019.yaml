policy_id: gr_taiped_privatisation_acceleration_2015_2019
status: candidate
title: Greece TAIPED/HCAP privatisation acceleration 2015-2019
countries:
- GRC
timeframe:
  start: 2015
  end: 2019
  enacted_date: '2016-08-25'
description: 'Privatisation programme executed by the SYRIZA-ANEL coalition despite its 2014-2015 stated opposition to the predecessor TAIPED pipeline. Third Memorandum prior actions mandated completion
  of pending deals and consolidation under the new Hellenic Corporation of Assets and Participations (HCAP, Law 4389/2016). Transactions closed under Tsipras: Piraeus Port Authority (OLP) majority stake
  to COSCO Shipping (August 2016, €368.5m upfront + mandatory investments); 14 regional airports concession to Fraport-Slentel (operational handover April 2017, €1.23bn upfront); Trainose (rail passenger
  and freight operator) to Ferrovie dello Stato Italiane (September 2017, €45m); Desfa (gas transmission operator) eventually closed to Senfluga consortium in December 2018 (€535m). Hellinikon (former Athens
  airport site) development contract, originally signed 2014 under Samaras, was ratified and proceeded. HCAP structure placed TAIPED, ETAD (real estate) and public- sector portfolio companies (incl. PPC,
  EYDAP, EYATH, OASA, ELTA) under a unified holding with 99-year mandate.

  '

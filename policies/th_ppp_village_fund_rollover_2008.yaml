policy_id: th_ppp_village_fund_rollover_2008
status: candidate
title: Ppp Village Fund Rollover 2008
countries:
- THA
timeframe:
  start: 2008
  end: 2008
description: 'Under the Samak and Somchai PPP governments in 2008, Thailand''s Village and Urban Community Fund scheme — the 1-million-baht rotating credit endowments first launched under Thaksin in 2001
  — was recapitalised with additional rollover top-ups and second-round disbursements through the Village Fund Office. The continuation reaffirmed PPP''s Thaksin-era populist credit programmes and channelled
  new microcredit liquidity to rural villages.

  '
enacted_by:
- thailand_samak_somchai_ppp_2008

  rationale: Charges were intended to move water capex off-balance-sheet by self-funding through usage charges.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Established Irish Water as a new sectoral regulator-and-utility, tightening the institutional regime.
- axis: fiscal.tax_corporate

policy_id: ie_water_charges_introduction_suspension_2014_2016
status: candidate
title: Water Charges Introduction Suspension 2014 2016
countries:
- IRL
timeframe:
  start: 2011
  end: 2017
description: 'Domestic water charges, introduced under the Water Services Act 2013 and administered through the new utility Irish Water, came into effect in 2014 with metering and a household charge intended
  to monetise water use as an MoU commitment. Mass non-payment and protests prompted the 2016 government to suspend charges and ultimately abolish them under the Water Services Act 2017, redirecting funding
  back to the Exchequer.

  '
enacted_by:
- ireland_kenny_fg_labour_2011_2017

  rationale: COB-negotiated salary floors imposed binding sectoral wage rules with formal labour-inspection enforcement.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-sector wage-bill increases functioned as implicit fiscal subsidy to formal employment.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandated second-aguinaldo bonuses transferred income to formal-sector workers when GDP > 4.5%.
- axis: fiscal.spending_level
  direction: +

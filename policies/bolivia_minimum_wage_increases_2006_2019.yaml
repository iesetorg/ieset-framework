policy_id: bolivia_minimum_wage_increases_2006_2019
status: candidate
title: Bolivia Minimum Wage Increases 2006 2019
countries:
- BOL
timeframe:
  start: 2006
  end: 2019
description: 'Annual administrative-decree increases to the salario mínimo nacional under the Morales government, rising from roughly 500 bolivianos in 2005 to 2,122 bolivianos by 2019, an over four-fold
  nominal increase. Set each year by Supreme Decree negotiated with the COB labour confederation, the increases were paired with a "second-aguinaldo" mandatory year-end bonus when GDP growth exceeded 4.5%,
  lifting formal-sector wage floors substantially in real terms.

  '

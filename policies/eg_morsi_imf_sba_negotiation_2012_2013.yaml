description: 'Negotiations during 2012–13 envisaged a USD 4.8bn Stand-By Arrangement to plug Egypt''s widening external gap, conditional on subsidy reform, sales-tax broadening, and exchange-rate flexibility.
  The Morsi government repeatedly delayed politically costly conditions through the constitutional crisis, the deal was never finalised, and the package effectively lapsed before the July 2013 ouster.

  '

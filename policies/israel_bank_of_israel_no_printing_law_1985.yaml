policy_id: israel_bank_of_israel_no_printing_law_1985
status: candidate
title: Israel Bank Of Israel No Printing Law 1985
countries:
- ISR
timeframe:
  start: 1985
  end: 1991
description: 'As a core component of the July 1985 Stabilisation Plan, the Knesset amended the Bank of Israel Law to prohibit the central bank from extending direct credit to the government, ending the
  practice of monetary financing of fiscal deficits that had fuelled the prior triple-digit inflation. The "no-printing" rule forced the Treasury onto bond markets and broke the wage-price-deficit spiral
  by removing the automatic accommodation channel that had previously absorbed shocks.

  '
enacted_by:
- israel_peres_national_unity_1984_1986
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Loss of seigniorage financing forced the Treasury to internalise spending limits via bond markets.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory ban on Treasury credit removed the principal channel of political pressure on policy.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eliminating deficit monetisation cut the dominant source of base-money growth.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Disinflation reduced indexation distortions while bank-credit rationing initially favoured incumbents.

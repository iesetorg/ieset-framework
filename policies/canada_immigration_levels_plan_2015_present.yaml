policy_id: canada_immigration_levels_plan_2015_present
status: candidate
title: Canada Immigration Levels Plan 2015 Present
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Canada''s annual Immigration Levels Plan, tabled by Immigration, Refugees and Citizenship Canada under section 94 of the Immigration and Refugee Protection Act (IRPA, 2001), sets multi-year
  admissions targets across economic, family and humanitarian streams. From 2015 the Trudeau Liberal government raised targets sharply, reaching about 500,000 permanent residents per year by 2025 alongside
  large temporary-resident inflows. The intended effect is to expand the labour force, stabilise demographics, and underpin housing, services and tax bases.

  '

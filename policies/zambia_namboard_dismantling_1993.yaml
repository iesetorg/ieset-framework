policy_id: zambia_namboard_dismantling_1993
status: candidate
title: Zambia Namboard Dismantling 1993
countries:
- ZMB
timeframe:
  start: 1991
  end: 2001
description: 'The Chiluba government completed the dismantling of NAMBOARD (the National Agricultural Marketing Board) and its successor monopolies in 1993, ending the state''s monopsony purchase of maize
  and fertiliser distribution. Private traders were licensed to buy crops directly from smallholders, the maize-meal subsidy was withdrawn, and the Food Reserve Agency was reorganised as a strategic reserve
  rather than a price-stabilisation buyer.

  '
enacted_by:
- zambia_msunwe_structural_adjustment_1991_2001
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Private traders entered maize purchase and fertiliser distribution after end of NAMBOARD monopsony.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Removed parastatal control of agricultural imports and exports, allowing private grain trade flows.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Withdrawn maize-meal subsidy and parastatal recurrent losses cut major drain on Zambian fisc.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Smallholders gained right to sell to highest bidder rather than mandated NAMBOARD-set prices.

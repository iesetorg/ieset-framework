  rationale: A regional stabilization mission was intended to protect constitutional institutions from violent disruption.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Security stabilization added mission and coordination costs, even if much support was externally financed.
references:

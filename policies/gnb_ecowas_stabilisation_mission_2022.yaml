description: 'After the February 2022 attack around Guinea-Bissau''s government palace, the authorities accepted an ECOWAS Stabilisation Support Mission to help protect institutions and deter further military
  disruption. The deployment renewed a regional security guarantee around the presidency and state institutions in a country with repeated coup attempts and military intervention in politics.

  '

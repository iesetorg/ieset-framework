policy_id: india_companies_act_2013
status: candidate
title: India Companies Act 2013
countries:
- IND
timeframe:
  start: 2009
  end: 2014
description: 'The Companies Act 2013 replaced the 1956 Act and modernised Indian corporate law, introducing a statutory mandate for "2% Corporate Social Responsibility (CSR)" spending by qualifying firms,
  mandatory women directors, class-action rights, fast-track mergers, and the National Company Law Tribunal framework. The Act recalibrated the corporate-governance regime alongside accelerated ease-of-doing-business
  reforms.

  '
enacted_by:
- india_singh_upa_ii_2009_2014
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandated 2% CSR spend by large firms acts as a privately funded transfer flow to qualifying programmes.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Established NCLT and SFIO infrastructure as new public-sector institutional spending lines.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Modernised cross-border-merger and offshore-listing provisions that reduced friction for foreign capital.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Added compliance burdens (CSR, related-party rules) while easing some structural-corporate processes.

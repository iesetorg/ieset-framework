policy_id: se_las_employment_protection_reform_2019_2022
status: candidate
title: LAS employment-protection reform (Sweden 2019-2022)
countries:
- SWE
timeframe:
  start: 2019
  end: 2022
  enacted_date: '2022-10-01'
description: 'Reform of the Lag (1982:80) om anställningsskydd (LAS) negotiated under the January Agreement and enacted October 2022 (trade-union-driven main-agreement variant adopted). Expanded employer
  exemptions from the last-in-first-out rule (from two to three employees exempted in layoffs), broadened objective grounds for dismissal, and created a state-backed transition-support framework (omställningsstudiestöd)
  for mid-career workers. Counterpart: enhanced transition financing and study support for laid-off workers.

  '
enacted_by:
- sweden_lofven_sap_2014_2021
coalition_label_at_enactment: SAP + MP minority under January Agreement
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Loosened last-in-first-out exemptions and objective-grounds threshold for dismissal.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Transition-study support fund adds mid-career retraining entitlement.

policy_id: portugal_industrial_nationalisations_1975
status: candidate
title: Portugal Industrial Nationalisations 1975
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portugal''s industrial nationalisations of 1975, enacted by a series of decree-laws across the electricity (Decree-Law 205-G/75), oil refining, steel, cement, brewing, tobacco, transport,
  and telecommunications sectors, transferred dominant private firms — including the holdings of the CUF, Champalimaud, and Espirito Santo groups — to state ownership. Public enterprises were placed under
  sectoral coordinating ministries. The intended effect was to break concentrated private industrial power, channel basic-industry surpluses to state planning, and entrench the revolutionary settlement
  that the 1976 Constitution would later codify as "irreversible".

  '

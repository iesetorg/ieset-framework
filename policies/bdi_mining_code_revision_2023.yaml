policy_id: bdi_mining_code_revision_2023
status: candidate
title: Burundi mining code revision 2023
countries:
- BDI
timeframe:
  start: 2023
  end: ongoing
description: 'Burundi revised its mining code in 2023 to reset the legal framework for exploration, licensing, production, and state participation in the extractive sector. The revision increased formal
  government control over mining rights and revenue terms while attempting to reopen a sector that had faced suspensions, contract renegotiation, and weak transparency.

  '
enacted_by:
- burundi_ndayishimiye_recovery_reform_state_2020_present
scope: national
coalition_label_at_enactment: CNDD-FDD Ndayishimiye government
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: The code makes mining activity more dependent on formal permits, state approval, and revised concession conditions.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Resource-law changes increase the state's claim on mining rents through fiscal and participation terms.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Reopening and renegotiating concessions under a more discretionary code weakens predictability for mining investors.
references:
- Republic of Burundi, Law revising the Mining Code, 2023.
- IMF, Burundi Article IV and Extended Credit Facility materials discussing mining-sector governance and revenue mobilisation.

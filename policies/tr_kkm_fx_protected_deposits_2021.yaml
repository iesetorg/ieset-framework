policy_id: tr_kkm_fx_protected_deposits_2021
status: candidate
title: KKM FX-protected deposit scheme (Turkey 2021)
countries:
- TUR
timeframe:
  start: 2021
  end: 2023
  enacted_date: '2021-12-20'
description: 'Kur Korumalı Mevduat (KKM) scheme announced 20 December 2021 as the lira hit 17/USD intraday. Lira-denominated deposits that outperformed CBRT policy rate but underperformed USD return were
  topped up by Treasury (and later CBRT) to match USD return. Peak holdings TRY 3.4trn (~USD 120bn) by mid-2023, ~25% of total deposits. Fiscal cost estimated at TRY 700bn-1trn cumulative to 2023. Scheme
  put sovereign on the hook for FX risk — textbook implicit-FX-subsidy at scale. Unwind programme began under Şimşek from June 2023 with stepped disincentive parameters.

  '
enacted_by:
- turkey_erdogan_presidential_system_2018_2023
- turkey_erdogan_third_presidential_2023_present
coalition_label_at_enactment: AKP + MHP

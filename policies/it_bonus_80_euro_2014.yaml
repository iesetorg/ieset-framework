  direction: +
  magnitude: moderate
  intended: true
  rationale: ~€10bn/year targeted transfer to ~10m low-middle earners.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Structure roughly flat across eligibility band; mildly progressive via taper.

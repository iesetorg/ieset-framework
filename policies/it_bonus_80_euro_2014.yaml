policy_id: it_bonus_80_euro_2014
status: candidate
title: Italy Bonus 80 euro monthly transfer
countries:
- ITA
timeframe:
  start: 2014
  end: 2022
  enacted_date: '2014-04-24'
description: 'Renzi government monthly IRPEF bonus of €80/month for employees with gross annual income €8,000-€24,000 (taper to €26,000), introduced via D.L. 66/2014. ~10m beneficiaries, annual fiscal cost
  ~€10bn. Structured as a non-refundable IRPEF tax credit. Subsequently expanded (2020 to €100/month) and eventually absorbed into the 2022 IRPEF bracket reform under Draghi government.

  '

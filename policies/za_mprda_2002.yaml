description: 'The MPRDA 2002 vested custodianship of all mineral and petroleum resources in the state, replacing the prior private mineral-rights regime with a state-issued prospecting and mining-rights
  system subject to HDSA (Historically Disadvantaged South Africans) empowerment and social and labour plans. Implemented from May 2004, it is the structural foundation of the subsequent Mining Charters.


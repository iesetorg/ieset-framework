policy_id: india_bank_nationalisation_1969
status: candidate
title: India Bank Nationalisation 1969
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'Under the Banking Companies (Acquisition and Transfer of Undertakings) Ordinance and Act 1969, the Indira Gandhi government nationalised the fourteen largest private commercial banks, with
  another six added in 1980, bringing roughly 80% of bank deposits under public ownership. The nationalisation embedded directed-credit norms, branch-expansion targets in rural and priority sectors, and
  statutory liquidity ratios that channelled household savings to the state.

  '
enacted_by:
- india_swadeshi_economic_nationalism_pre_1991
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Direct entry restrictions and branch-licensing controls accompanied state ownership.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Insulated banking from foreign capital and reinforced exchange-control orientation.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-sector banks' lending mandates effectively crowded in state-directed expenditure on priority sectors.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sweeping reversal of private-banking norms toward state-owned, statutorily directed credit.

  end: ongoing
  enacted_date: '2025-07-15'
description: 'Commercial Code reform under the Lee government, implemented through amendments in July and December 2025 and framed by MOEF as part of Korea-premium capital-market reform. The package expanded
  directors'' duty of loyalty toward shareholders, strengthened minority-shareholder protection, tightened unfair-trading sanctions, and complemented corporate-governance disclosure, delisting, short-selling,
  and treasury-stock reforms. A recurring Democratic Party priority since the mid-2010s, it is aimed at reducing the so-called "Korea discount" in equity valuations.

  '

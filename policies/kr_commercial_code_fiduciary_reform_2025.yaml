policy_id: kr_commercial_code_fiduciary_reform_2025
status: candidate
title: Lee commercial-code fiduciary-duty reform (South Korea, 2025)
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-15'
description: 'Commercial Code amendment extending directors'' fiduciary duty from the company-only standard to a general-shareholders standard (i.e. duty of loyalty toward minority as well as controlling
  shareholders), plus mandatory cumulative voting for firms above an asset threshold, lowered thresholds for multiple-derivative-actions, and an enlarged scope for shareholder information-access rights.
  A recurring DP priority since the mid-2010s that was repeatedly blocked under Park, Moon (stalled in committee), and Yoon (vetoed). Targeted at the so-called "Korea discount" in equity valuations.

  '

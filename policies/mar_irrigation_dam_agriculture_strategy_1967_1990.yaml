# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mar_irrigation_dam_agriculture_strategy_1967_1990
status: candidate
title: Morocco dam and irrigated-agriculture strategy
countries: [MAR]
timeframe: {start: 1967, end: 1990}
description: >
  Hassan II's agricultural strategy prioritised large dams, irrigated perimeters,
  agricultural credit, and state-guided rural infrastructure. The programme
  aimed to secure food supply, support export agriculture, and bind rural
  constituencies to the monarchy through visible development spending.
enacted_by:
  - morocco_hassan_ii_monarchy_mixed_economy_1956_1999
axes_moved:
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Public capital, credit, and infrastructure were targeted to irrigated agriculture."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Dam construction and irrigation networks raised development capital expenditure."
  - axis: regulatory.energy_supply_security
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Large dams added hydropower and water-storage resilience, though agriculture was the main objective."
references:
  - "World Bank (1995), Kingdom of Morocco: Country Economic Memorandum"
  - "Swearingen (1987), Moroccan Mirages: Agrarian Dreams and Deceptions"

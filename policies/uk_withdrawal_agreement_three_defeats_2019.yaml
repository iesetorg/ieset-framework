description: 'Three consecutive House of Commons defeats of Prime Minister Theresa May''s EU Withdrawal Agreement: 15 January 2019 (230-vote margin, largest government defeat on a whipped division in UK
  parliamentary history); 12 March 2019 (149-vote margin); 29 March 2019 (58-vote margin, WA-only vote on the day originally scheduled for exit). Resulted in two Article-50 extensions (to 12 April then
  31 October 2019), May''s resignation as Conservative leader (7 June 2019), and the Boris Johnson leadership succession who renegotiated the Northern Ireland Protocol.

  '

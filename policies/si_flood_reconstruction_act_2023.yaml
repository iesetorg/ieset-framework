  direction: +
  magnitude: moderate
  intended: true
  rationale: Reconstruction, infrastructure repair, and municipal support raised public spending over the baseline.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Household, housing, and local-support measures expanded disaster-related public transfers and in-kind support.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A statutory reconstruction framework clarified eligibility, financing, and implementation responsibilities after the disaster.

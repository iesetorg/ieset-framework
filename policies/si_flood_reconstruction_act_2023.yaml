policy_id: si_flood_reconstruction_act_2023
status: candidate
title: Slovenia flood reconstruction and development act 2023
countries:
- SVN
timeframe:
  start: 2023
  end: ongoing
description: 'Slovenia adopted a reconstruction and development financing framework after the August 2023 floods and landslides. The act created a multi-year channel for reconstruction, public-infrastructure
  repair, housing and municipal support, and dedicated financing measures, turning emergency relief into a longer reconstruction programme.

  '
enacted_by:
- slovenia_golob_social_green_reform_2022_present
scope: national
coalition_label_at_enactment: Golob Freedom Movement-Social Democrats-Left coalition
axes_moved:

policy_id: de_soffin_bank_stabilisation_2008
status: candidate
title: Germany SoFFin Financial Market Stabilisation Fund (€480bn)
countries:
- DEU
timeframe:
  start: 2008
  end: 2015
  enacted_date: '2008-10-17'
description: 'Finanzmarktstabilisierungsgesetz (FMStG) of 17 October 2008 established the Sonderfonds Finanzmarktstabilisierung (SoFFin) with a €480bn envelope (€400bn guarantees, €80bn recapitalisation/risk-assumption).
  Used to recapitalise Commerzbank (€18.2bn state equity, 25% + 1 share), Hypo Real Estate (fully nationalised 2009), Aareal Bank, WestLB, and others; issued ~€174bn in interbank guarantees at peak. Complemented
  by the Bad-Bank Act of July 2009 permitting SPV structures to absorb toxic assets.

  '
enacted_by:
- germany_merkel_i_grand_coalition_2005_2009
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Large-scale state recapitalisation and Commerzbank/HRE nationalisation.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: €480bn envelope; actual net fiscal cost smaller but debt-to-GDP lifted.

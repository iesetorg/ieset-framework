title: Citizenship reform — Staatsangehörigkeitsgesetz amendment 2024
countries:
- DEU
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-06-27'
description: 'Amendment to the Staatsangehörigkeitsgesetz reducing residency requirement for naturalisation from 8 years to 5 (or 3 for ''outstanding integration''), permitting dual citizenship without
  restriction, and simplifying citizenship transmission to children of foreign-born residents. Ampel coalition commitment framed as closing the gap between long-resident foreign population (~14% of total)
  and German citizenship pathways.

  '

policy_id: bg_whistleblower_protection_act_2023
status: candidate
title: Bulgaria whistleblower protection act 2023
countries:
- BGR
timeframe:
  start: 2023
  end: ongoing
description: 'Bulgaria enacted a whistleblower-protection framework in 2023 to transpose the EU Whistleblower Directive. The law created internal and external reporting channels for breaches of Bulgarian
  and EU law, assigned oversight roles to the personal data protection authority, and prohibited retaliation against people who report or publicly disclose covered wrongdoing.

  '
enacted_by:
- bulgaria_rule_of_law_schengen_push_2023_present
scope: national
coalition_label_at_enactment: Donev caretaker government and National Assembly
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Protected reporting channels and anti-retaliation rules strengthen detection and enforcement of legal breaches.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Independent external reporting and redress rights reduce reliance on hierarchical workplace channels for protected disclosures.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Covered employers face compliance duties for internal channels, recordkeeping, and follow-up.
references:
- Bulgaria Protection of Persons Reporting or Publicly Disclosing Information on Breaches Act, State Gazette No. 11/2023
- Directive (EU) 2019/1937 on protection of persons who report breaches of Union law

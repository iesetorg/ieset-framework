policy_id: il_pension_age_reform_2021
status: candidate
title: Israel female retirement-age rise 62→65 (2021)
countries:
- ISR
timeframe:
  start: 2022
  end: 2032
  enacted_date: '2021-11-04'
description: 'Component of the 2021 Arrangements Law gradually raising the statutory retirement age for women from 62 to 65 over an 11-year phased schedule (4-month increments starting 2022). Male retirement
  age remained at 67. Framed as labour-supply and pension-sustainability reform and as gender- equalisation at the upper end. Partially offset by temporary unemployment- benefit bridges for affected cohorts.

  '
enacted_by:

  rationale: Labour supply expansion via later statutory exit; reduces involuntary-retirement rigidity.
  intended: true
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  rationale: Long-run National Insurance Institute pension liability reduced.
  intended: true

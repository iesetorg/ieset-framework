policy_id: turkey_export_promotion_regime_1980_1988
status: candidate
title: Turkey Export Promotion Regime 1980 1988
countries:
- TUR
timeframe:
  start: 1983
  end: 1993
description: 'Turkey''s export promotion regime, codified in successive decrees from 24 January 1980 (Ozal''s Stabilisation Programme) and consolidated under Decree 84/8861 of 1984, replaced the import-substitution
  model with aggressive export incentives — duty drawbacks, tax rebates, preferential export credits via the Turk Eximbank (1987), retention of FX earnings, and lira competitiveness via crawling-peg devaluation.
  The intended effect was to lift exports'' share of GDP from under 5% to over 10% within a decade, anchor the post-1980 outward-oriented growth model, and end the chronic balance-of-payments crises of
  the 1970s.

  '
enacted_by:
- turkey_ozal_market_reforms_1983_1993
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Crawling-peg lira and duty drawbacks materially raised export and import linkages with world markets.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Eximbank-style preferential credit replaced administered allocation with market-priced trade finance.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Export-orientation forced manufacturers to compete on world quality and price benchmarks.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax rebates and preferential-credit subsidies raised the public-sector cost of the regime.

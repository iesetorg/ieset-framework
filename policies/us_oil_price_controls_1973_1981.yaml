  enacted_date: '1973-08-17'
description: 'Two-tier oil price ceiling (old oil vs new oil) administered under the Emergency Petroleum Allocation Act 1973, extended via Energy Policy and Conservation Act 1975. Combined with gasoline
  allocation rules produced the canonical US-energy shortage episodes: 1973-74 OPEC-overlaid queues at service stations, 1979 Iranian-revolution- overlaid gasoline lines. Natural gas price controls (since
  1954 Phillips decision) extended into wellhead pricing via NGPA 1978. Carter initiated phased decontrol 1979; Reagan accelerated to full decontrol January 1981 — within weeks, physical shortages ended
  though prices rose temporarily. Canonical multi-decade clear-failure case supporting `price_controls_produce_shortages_and_quality_degradation`.

  '

policy_id: th_bot_reserve_depletion_1996_1997
status: candidate
title: Thailand BoT reserve depletion in Baht defence (1996-1997)
countries:
- THA
timeframe:
  start: 1996
  end: 1997
  enacted_date: '1997-05-14'
description: 'Bank of Thailand defended the basket-pegged Baht against speculative attacks from late 1996 through 2 July 1997 float. Gross reserves fell from ~$39bn (end-1996) to ~$32bn (end-May 1997),
  but BoT also accumulated ~$23bn of forward-swap commitments that depleted usable reserves to near-zero at peak defence 14-15 May 1997. Two-tier Baht market imposed 15 May 1997 to segregate domestic and
  offshore rates and penalise speculation — dismantled January 1998. Reserve-position disclosure failures during defence period contributed to post- crisis governance reform; BoT Governor Rerngchai personally
  held civilly liable 2003. Nukul Commission Report (1998) published comprehensive post-mortem of BoT decision-making.

  '
enacted_by:
- thailand_chavalit_nap_1996_1997
coalition_label_at_enactment: NAP coalition / BoT independent management
axes_moved:

description: 'European Council agreement of 21 July 2020 on a €750bn recovery instrument (Next Generation EU) with €390bn in grants and €360bn in loans, financed by joint EU debt issuance for the first
  time at material scale. Negotiated over a four-day Brussels summit; the Merkel-Macron Meseberg proposal (May 2020) broke the political log-jam with the ''frugal four'' (NLD, AUT, SWE, DNK). Disbursed
  via the Recovery and Resilience Facility against national plans 2021-2026.

  '

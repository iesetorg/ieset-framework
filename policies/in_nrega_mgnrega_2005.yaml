policy_id: in_nrega_mgnrega_2005
status: candidate
title: India NREGA / MGNREGA rural employment guarantee (2005)
countries:
- IND
timeframe:
  start: 2005
  end: ongoing
  enacted_date: '2005-09-07'
description: 'National Rural Employment Guarantee Act enacted 7 September 2005 (renamed MGNREGA in 2009). Created statutory right to 100 days of unskilled manual wage labour per rural household per financial
  year, with unemployment allowance if work not provided within 15 days of demand. Work and wage records maintained via job cards; wages paid through bank/post-office accounts to reduce leakage. Phased
  rollout: 200 districts Feb 2006, 330 districts Apr 2007, all rural districts Apr 2008. Peak workdays ~2.8bn per year; active workers ~50m households. Largest workfare programme in the world by enrolment.
  Self-targeting via below-market minimum-wage level; Imbert & Papp (2015) documented general-equilibrium wage effects.

  '
enacted_by:
- india_manmohan_singh_upa_i_2004_2009
coalition_label_at_enactment: INC-led UPA-I
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Statutory right to 100 days workfare at minimum wage; largest workfare programme globally.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Programme spend ~Rs 39k crore/year at peak ~0.4% of GDP.
- axis: regulatory.labour_market_flexibility

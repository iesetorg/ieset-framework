policy_id: india_government_of_india_act_1935
status: candidate
title: Government of India Act 1935
countries: [IND]
timeframe:
  start: 1935
  end: 1950
  enacted_date: "1935-08-02"
description: >
  The Government of India Act 1935 replaced dyarchy in the provinces
  with provincial autonomy, expanded the electorate, created federal,
  provincial, and concurrent legislative lists, and established the
  Federal Court and public-service commissions. Its proposed all-India
  federation with princely states never fully came into force, and the
  Governor-General and provincial governors retained extensive
  "safeguard" powers over finance, defence, and constitutional
  emergencies. Even so, it became the decisive constitutional frame of
  late colonial India and the legal template that carried through to
  independence until the Constitution of 1950.
enacted_by:
  - india_late_raj_constitutional_devolution_1909_1947
axes_moved:
  - axis: institutional.rule_of_law
    direction: mixed
    magnitude: moderate
    intended: true
    rationale: "Provincial autonomy and a more explicit federal constitutional structure broadened accountable government, but sweeping reserve powers and communal-representation safeguards constrained the gain."
  - axis: institutional.judicial_independence
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The Federal Court created a formal constitutional adjudication channel above provincial politics."
references:
  - "Government of India Act 1935"
  - "Metcalf & Metcalf (2012), A Concise History of Modern India"
  - "Muldoon (2016), Empire, Politics and the Creation of the 1935 India Act"

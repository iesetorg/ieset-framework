policy_id: ethiopia_bank_industry_nationalisation_1975
status: candidate
title: Ethiopia Bank Industry Nationalisation 1975
countries:
- ETH
timeframe:
  start: 1974
  end: 1991
description: 'Following the Derg''s 1974 seizure of power, Proclamation No. 26/1975 nationalised commercial banks, insurance companies, and major industrial enterprises, transferring private ownership to
  the state. The package consolidated finance and large-scale manufacturing under central planning organs and eliminated foreign and domestic private equity stakes, aligning Ethiopia with a Soviet-style
  command economy through the late 1980s.

  '

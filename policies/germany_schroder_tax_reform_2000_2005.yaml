title: Germany Schroder Tax Reform 2000 2005
countries:
- DEU
timeframe:
  start: 1998
  end: 2005
description: 'The Steuerreform 2000 (Steuersenkungsgesetz) and follow-on 2003–2005 schedule cut Germany''s headline corporate income-tax rate from 40/30% (retained/distributed) to a uniform 25%, lowered
  top marginal personal income-tax rates from 53% toward 42%, and exempted intercorporate share-disposal capital gains to incentivise unwinding the cross-shareholdings of "Deutschland AG." The package was
  the centrepiece of Schröder''s pro-investment supply-side turn.

  '

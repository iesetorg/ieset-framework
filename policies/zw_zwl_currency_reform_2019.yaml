policy_id: zw_zwl_currency_reform_2019
status: candidate
title: Zimbabwe ZWL currency reform 2019
countries:
- ZWE
timeframe:
  start: 2019
  end: 2024
  enacted_date: '2019-06-24'
description: 'Zimbabwe reintroduced a domestic currency in 2019 by separating RTGS balances from foreign currency, renaming the local unit the Zimbabwe dollar, and then making it the sole legal tender for
  most domestic transactions through Statutory Instrument 142 of 2019. The reform ended the full multi-currency regime and restored the Reserve Bank of Zimbabwe''s capacity to issue local money, amid continuing
  fiscal pressure and exchange-rate controls.

  '
enacted_by:
- zimbabwe_mnangagwa_zanu_pf_2017_present
scope: national
coalition_label_at_enactment: ZANU-PF Mnangagwa government
axes_moved:
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Reintroducing a domestic currency under fiscal stress restored RBZ issuance discretion in a fiscally dominated setting.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: moderate
  intended: false
  rationale: The local-currency regime enabled renewed monetary expansion and exchange-rate depreciation after dollarisation had constrained issuance.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Administrative redenomination and legal-tender restrictions changed the value and enforceability of private currency claims.
references:
- Zimbabwe Statutory Instrument 33 of 2019 on RTGS dollar recognition.
- Zimbabwe Statutory Instrument 142 of 2019, Reserve Bank of Zimbabwe (Legal Tender) Regulations, 2019.
- Reserve Bank of Zimbabwe monetary policy statements on the 2019 currency reforms.

description: 'Stylised-fact policy entry: CPI inflation fell from 16.5% (1983) to 4.7% (1987) under combined effects of (a) divorzio 1981 ending monetary financing, (b) scala mobile reform 1983-85, (c)
  EMS discipline with realignments, (d) oil-price softening from 1986. Banca d''Italia under Ciampi executed disinflation using reserve requirements and bond-market intervention; short-term real rates high
  through the period.

  '

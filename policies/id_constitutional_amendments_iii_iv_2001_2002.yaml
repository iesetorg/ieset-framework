policy_id: id_constitutional_amendments_iii_iv_2001_2002
status: candidate
title: Indonesia Constitutional Amendments III (2001) and IV (2002)
countries:
- IDN
timeframe:
  start: 2001
  end: 2002
  enacted_date: '2002-08-10'
description: 'Third Amendment to 1945 Constitution passed 9 November 2001 introduced direct presidential election, Constitutional Court (Mahkamah Konstitusi), Judicial Commission, Corruption Eradication
  Commission mandate, impeachment procedure with MK role. Fourth Amendment passed 10 August 2002 completed restructuring — abolished appointed military-functional blocks in MPR, added second-round direct
  presidential runoff, converted DPD (Regional Representative Council) into elected second chamber, made executive no longer responsible to MPR (separation of powers). Together with First and Second Amendments
  (1999- 2000) transformed 1945 Constitution from consolidated-executive framework into separation-of-powers constitutional democracy.

  '

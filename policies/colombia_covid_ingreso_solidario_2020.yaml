description: 'Ingreso Solidario emergency cash-transfer programme created by Decreto 518 of 2020 under the Duque government, providing unconditional monthly transfers to roughly three million informal-sector
  and otherwise uncovered low-income households during the COVID-19 pandemic. Targeted via SISBEN and other administrative registries using digital-payment platforms; later partially institutionalised as
  a permanent Renta Ciudadana foundation.

  '

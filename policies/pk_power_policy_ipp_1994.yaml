title: Pakistan 1994 Power Policy — Independent Power Producers framework
countries:
- PAK
timeframe:
  start: 1994
  enacted_date: '1994-03-22'
description: 'Power Policy announced 22 Mar 1994 under PM Benazir Bhutto created Independent Power Producer (IPP) framework with standardised Power Purchase Agreements (PPAs), government take-or-pay guarantees
  at fixed USD-indexed tariffs, and WAPDA/KESC off-take obligations. Hubco 1,292 MW commissioned 1997 as flagship; total commitments exceeded $5bn. Most ambitious power-sector opening in developing world
  at the time; legacy take-or-pay obligations became contingent liabilities and later renegotiation pressure point under 1998 Musharraf era.

  '

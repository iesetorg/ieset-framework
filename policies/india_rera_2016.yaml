description: 'The Real Estate (Regulation and Development) Act 2016 (RERA) created state-level real-estate regulators, mandatory project registration, escrow-style ring-fencing of 70% of buyer payments
  to project use, time-bound delivery commitments, and standardised buyer rights. The Act recalibrated the developer-buyer information-asymmetry regime and was implemented via state RERA notifications from
  2017 onwards.

  '

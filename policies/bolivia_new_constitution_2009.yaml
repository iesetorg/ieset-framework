policy_id: bolivia_new_constitution_2009
status: candidate
title: Bolivia New Constitution 2009
countries:
- BOL
timeframe:
  start: 2006
  end: 2019
description: 'The Constitución Política del Estado adopted by referendum on 25 January 2009 refounded Bolivia as a "plurinational state," recognised 36 indigenous nationalities, declared natural resources
  inalienable state property, established a directive role for the state in the economy, and expanded justiciable social rights. Companion enabling legislation reorganised territorial autonomies and created
  the Tribunal Constitucional Plurinacional and the Tribunal Agroambiental.

  '

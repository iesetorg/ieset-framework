description: 'The Abe-I cabinet revised Japan''s 1947 Fundamental Law of Education in December 2006, the first full revision since occupation, adding objectives such as fostering "love of country and home
  region," public-spiritedness and respect for tradition, and recasting education-board governance. The revision underpinned subsequent curriculum and school-administration changes and was a flagship conservative-priority
  law of the first Abe government.

  '

policy_id: ie_nama_2009
status: candidate
title: Nama 2009
countries:
- IRL
timeframe:
  start: 2008
  end: 2011
description: 'The National Asset Management Agency Act 2009 established NAMA as a state asset-management vehicle that acquired some EUR 74 billion of land and development loans from participating banks
  at deep discounts in exchange for state-guaranteed bonds. NAMA was designed to repair bank balance sheets, work out distressed property assets through orderly disposal, and quarantine the property losses
  from ongoing credit provision.

  '

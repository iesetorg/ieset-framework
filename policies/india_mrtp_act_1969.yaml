policy_id: india_mrtp_act_1969
status: candidate
title: India Mrtp Act 1969
countries:
- IND
timeframe:
  start: 1951
  end: 1991
description: 'The Monopolies and Restrictive Trade Practices Act 1969 introduced asset- threshold-based size restrictions for Indian companies and required prior central approval for expansion, mergers,
  or new undertakings by "MRTP companies." Combined with industrial licensing, MRTP entrenched a small- scale-reservation ethos and was the principal anti-bigness statute until it was replaced by the more
  competition-oriented Competition Act 2002.

  '
enacted_by:
- india_swadeshi_economic_nationalism_pre_1991
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Layered prior-approval requirements for large-firm expansion and capacity addition.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Restricted scale-up by MNCs and large business houses, reinforcing import-substitution closures.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Required new MRTP Commission and administrative apparatus financed by the central budget.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reinforced bank credit-rationing toward small-scale and priority sectors.

policy_id: th_30_baht_universal_healthcare_2001
status: candidate
title: Thailand 30-baht universal healthcare scheme (2001)
countries:
- THA
timeframe:
  start: 2001
  end: 2002
  enacted_date: '2002-11-18'
description: 'Universal Coverage Scheme (UCS, "30-baht scheme") launched as Thaksin-era flagship in pilot form April 2001, nationwide October 2001, and statutorily established under National Health Security
  Act B.E. 2545 (promulgated 18 November 2002). Provided universal access to primary and secondary healthcare at flat 30-baht (~$0.75) copayment per episode (copay abolished 2006, reinstated 2012). Covered
  ~47m Thais who had been without Civil Servants Medical Benefits Scheme or Social Security Scheme coverage. Financed via general taxation with per-capita capitation payment to NHSO-contracted providers
  (~Bt 2,895/year per enrollee by 2010). Later widely validated empirically (Gruber et al (2014); Limwattananon et al (2015)) as reducing catastrophic health expenditure.

  '
enacted_by:
- thailand_thaksin_trt_2001_2006
coalition_label_at_enactment: Thai Rak Thai
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Universal healthcare access to 47m previously uncovered Thais via capitation-funded scheme.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Health spending rose from 3.3% GDP (2000) to 4.1% (2006); universal-coverage cost ~1.5-2% GDP.
- axis: regulatory.sectoral_licensing
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Provider-purchasing separation via NHSO established but provider-side market structure unchanged.
references:
- National Health Security Act B.E. 2545 (2002)
- 'Gruber, Hendren & Townsend (2014), ''The Great Equalizer: Health Care Access and Infant Mortality in Thailand'''
- Limwattananon et al (2015), 'Universal coverage with supply-side reform in Thailand'

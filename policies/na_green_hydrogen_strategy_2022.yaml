policy_id: na_green_hydrogen_strategy_2022
status: candidate
title: Namibia Green Hydrogen and Derivatives Strategy 2022
countries:
- NAM
timeframe:
  start: 2022
  end: ongoing
description: 'Namibia adopted a green hydrogen and derivatives strategy to develop renewable power, hydrogen, ammonia, synthetic-fuel, port, and industrial-zone capacity around export-oriented projects.
  The strategy uses state coordination, concessioning, infrastructure planning, and international climate-finance partnerships to turn renewable resource endowments into a new industrial and export cluster.

  '

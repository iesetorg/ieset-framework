policy_id: be_regularisation_migrants_2000
status: candidate
title: Regularisation Migrants 2000
countries:
- BEL
timeframe:
  start: 1999
  end: 2007
description: 'Loi du 22 décembre 1999 establishing a one-off regularisation procedure for irregular migrants resident in Belgium, processing some 32,000 applications and granting residence to roughly 50,000
  individuals. The campaign opened 10 January-31 January 2000 and was administered by an ad hoc commission, with criteria including long residence, family ties, prolonged asylum proceedings, and humanitarian
  grounds.

  '
enacted_by:
- belgium_verhofstadt_purple_1999_2007
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bringing previously informal residents into the labour-tax base broadened payroll-tax incidence.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: 'Indirect: regularised workforce reduced employer reliance on undeclared labour and associated penalties.'
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Newly regularised residents gained access to mainstream social services, raising programme outlays.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: 'Direct policy effect: legalised tens of thousands of irregular migrants by statute.'

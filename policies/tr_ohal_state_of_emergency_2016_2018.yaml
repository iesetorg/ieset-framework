policy_id: tr_ohal_state_of_emergency_2016_2018
status: candidate
title: OHAL state of emergency and KHK decree-law rule (Turkey 2016-2018)
countries:
- TUR
timeframe:
  start: 2016
  end: 2018
  enacted_date: '2016-07-21'
description: 'Following the 15 July 2016 coup attempt, the government declared OHAL (state of emergency) on 21 July 2016 and governed by KHK decree-law for 21 months until formal termination 19 July 2018.
  Under OHAL, the executive issued 32 KHK decrees dismissing approximately 125,000-150,000 public-sector employees, closing ~1,500 associations, foundations and media outlets, and placing ~600 firms under
  TMSF (Savings Deposit Insurance Fund) trusteeship. KHK measures enjoyed retrospective legal cover via statute and were exempted from Constitutional Court review per Art. 148.

  '

policy_id: mexico_banxico_autonomy_1994
status: candidate
title: Mexico Banxico Autonomy 1994
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Banxico''s autonomy reform — initiated by the 1993 constitutional amendment to Articles 28, 73, and 123 — entered full force on 1 April 1994 under the new Ley del Banco de México. The statute
  established price stability as the primary objective, prohibited direct central-bank financing of federal-government deficits, and operationalised an independent governing board. The institutional shift
  coincided with NAFTA''s coming into effect on 1 January 1994.

  '

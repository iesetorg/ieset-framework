policy_id: ng_agric_transformation_ewallet_2012
status: candidate
title: Agricultural Transformation Agenda (Growth Enhancement Support e-wallet)
countries:
- NGA
timeframe:
  start: 2011
  end: 2015
  enacted_date: '2012-01-09'
description: 'Agricultural Transformation Agenda launched under Minister Akinwumi Adesina in 2011-2012, replacing the historical fertiliser-subsidy distribution (captured by middlemen) with the Growth Enhancement
  Support Scheme (GESS) e-wallet delivering subsidised inputs directly to farmers via mobile-phone vouchers redeemable at registered agro-dealers. ~14 million farmers enrolled by 2015. Widely praised as
  a distribution- reform template (exported to other African countries); wound down after 2015 under the Anchor Borrowers'' Programme.

  '
enacted_by:
- nigeria_jonathan_pdp_2010_2015
coalition_label_at_enactment: PDP
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Reformed delivery mechanism of pre-existing fertiliser subsidy; volume roughly constant.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Opened input distribution to private agro-dealers; broke government-monopoly channel.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Reduced rent-capture by middlemen; auditable transfer trail via mobile ID.
references:
- Federal Ministry of Agriculture — ATA Mid-term Review 2013
- IFPRI evaluations of GESS 2013-2015

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: japan_health_insurance_act_1922_1927
status: candidate
title: Japan Health Insurance Act 1922 (effective 1927)
countries: [JPN]
timeframe:
  start: 1922
description: >
  The Health Insurance Act created compulsory sickness insurance for a large share of
  manual workers, funded through employer and employee contributions and implemented
  from 1927. Coverage remained partial and urban-industrial rather than universal, but
  the law established a durable social-insurance principle in Japan: wage earners in
  modern industry would be protected against illness through mandatory pooled schemes
  rather than relying only on household savings, employer discretion, or charitable aid.
enacted_by:
  - japan_prewar_state_building_social_incorporation_1906_1931
coalition_label_at_enactment: "Imperial government under Kato Tomosaburo; implemented under later party cabinets"
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "Compulsory sickness insurance expanded contributory social protection for covered workers and their dependents."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "Payroll-linked insurance contributions and eligibility rules further formalised the industrial employment relationship."
references:
  - "Health Insurance Act (1922)"
  - "Campbell (1992), How Policies Change: The Japanese Government and the Aging Society"

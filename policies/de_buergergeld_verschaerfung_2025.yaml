policy_id: de_buergergeld_verschaerfung_2025
status: candidate
title: Bürgergeld tightening — sanctions restoration and activation re-binding 2025
countries:
- DEU
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-10-01'
description: 'Partial rollback of the 2023 Ampel Bürgergeld reform: restoration of stronger sanctions for refusal of reasonable job offers (up to 30% Regelsatz reduction), shortening of the Karenzzeit for
  housing-cost and asset checks from two years to six months, re-introduction of stricter activation requirements, and rebranding toward a ''neue Grundsicherung'' framework. Coalition compromise retaining
  the 2023 Regelsatz baseline (SPD condition) while re-tightening the incentive architecture (CDU/CSU condition).

  '
enacted_by:
- germany_merz_2025_present
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Sharper activation sanctions and shorter protected period re-impose the Hartz-era activation logic.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tighter sanctions reduce expected transfer drawdown at the margin; baseline Regelsatz unchanged.
references:

policy_id: lv_euro_adoption_2014
status: candidate
title: Latvia euro adoption 2014
countries:
- LVA
timeframe:
  start: 2014
  end: ongoing
  enacted_date: '2014-01-01'
description: 'Latvia adopted the euro on 1 January 2014 after Council Decision 2013/387/EU found that it fulfilled the convergence conditions for joining the euro area. The changeover replaced the lats,
  moved monetary policy into the Eurosystem, and reduced transaction-cost and exchange-rate barriers with Latvia''s euro-area trading and investment partners.

  '
enacted_by: []
coalition_label_at_enactment: Dombrovskis Unity-Reform Party-National Alliance coalition
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Domestic monetary-policy discretion moved to the independent ECB/Eurosystem framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Euro adoption eliminated currency-conversion costs and exchange-rate risk against euro-area partners.
references:
- 'Council Decision 2013/387/EU on adoption by Latvia of the euro on 1 January 2014: https://eur-lex.europa.eu/eli/dec/2013/387/oj'

policy_id: uk_end_of_free_movement_2021
status: candidate
title: End Of Free Movement 2021
countries:
- GBR
timeframe:
  start: 2016
  end: 2020
description: 'The Immigration and Social Security Co-ordination (EU Withdrawal) Act 2020 ended EU free movement to the UK from 1 January 2021, replacing it with a domestic points-based immigration system
  administered by the Home Office. EU/EEA nationals lost automatic rights to live, work, or study in the UK and became subject to skill-level, salary, and English-language thresholds previously applied
  to non-EU arrivals.

  '

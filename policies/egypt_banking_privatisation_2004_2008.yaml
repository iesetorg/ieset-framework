policy_id: egypt_banking_privatisation_2004_2008
status: candidate
title: Egypt Banking Privatisation 2004 2008
countries:
- EGY
timeframe:
  start: 1991
  end: 2011
description: 'Under the Nazif "businessman cabinet," Egypt sold the Bank of Alexandria (one of four state banks) to Italy''s Sanpaolo IMI in 2006 and divested public stakes in joint-venture banks while
  consolidating the smaller domestic sector. The programme was complemented by tougher prudential rules under Central Bank Governor Farouk El-Okdah and aimed to lift credit allocation efficiency before
  the post-crisis policy reversal under Mubarak''s late era.

  '

policy_id: korea_imf_reforms_1998
status: candidate
title: South Korea IMF Programme + structural reforms 1997-1998
countries:
- KOR
timeframe:
  start: 1997
  end: 1999
  enacted_date: '1997-12-03'
description: 'Response to 1997 Asian Financial Crisis. IMF Stand-By Arrangement of $58bn (largest to that date). Conditionality: chaebol reform (cross- guarantees unwound, debt-equity limits, minority-shareholder
  rights), financial-sector restructuring (bank consolidation, FSS/FSC established as consolidated regulator), labour-market liberalisation (redundancy reform), capital-account liberalisation. Under President
  Kim Dae-jung (elected Dec 1997). Korean economy contracted sharply 1998 (-5.5% GDP) but recovered rapidly, with structural reforms establishing more market-oriented institutional architecture. Shaped
  subsequent Korean trajectory to developed- economy status.

  '

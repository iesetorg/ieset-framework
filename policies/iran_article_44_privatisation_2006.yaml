policy_id: iran_article_44_privatisation_2006
status: candidate
title: Iran Article 44 Privatisation 2006
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'In 2006 Supreme Leader Khamenei reinterpreted Article 44 of the Islamic Republic constitution to permit divestment of up to 80% of large state enterprises previously reserved for public ownership,
  triggering a wave of share offerings via the Tehran Stock Exchange and the Justice Shares (Sahām-e Edālat) free distribution to lower-income citizens. In practice most divested assets passed to bonyads,
  parastatals and IRGC-linked holdings rather than open private investors, concentrating ownership rather than dispersing it.

  '
enacted_by:
- iran_revolution_islamic_economy_1979_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Asset transfers to parastatals and IRGC-linked holdings entrenched concentrated market structures.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Justice Shares free distribution functioned as a one-off equity transfer to lower-income households.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privatised firms remained insulated from foreign-investor entry by sanctions and ownership caps.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discretionary buyer selection and politically-driven asset valuation weakened impartial-property guarantees.

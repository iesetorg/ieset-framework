policy_id: pl_public_media_restructure_2023_2024
status: candidate
title: Public Media Restructure 2023 2024
countries:
- POL
timeframe:
  start: 2023
  end: ongoing
description: 'Restructuring of Polish state media (TVP, Polskie Radio and PAP) initiated by the Tusk Koalicja government in December 2023 through ministerial resolutions placing the entities into liquidation
  pending parliamentary reform of the National Media Council. The transition replaced PiS-era managers, recapitalised the broadcasters via state subsidy, and aimed to restore editorial pluralism after years
  of partisan capture under the prior administration.

  '

  enacted_date: '1994-01-01'
description: 'Tri-country free-trade agreement eliminating most tariffs between Mexico, USA, and Canada over 15 years, with additional provisions on IP, investment, and dispute settlement. Mexican entry
  was the landmark reform: locked in Salinas-era liberalisation, shifted Mexican trade dependence to US markets, drove maquiladora industrialisation in northern Mexican states. Controversial on US side
  for manufacturing displacement; empirical estimates (Autor-Dorn-Hanson 2013 on the China Shock extension) distinguish NAFTA effects from subsequent China WTO-accession effects. Replaced by USMCA 2020
  under Trump renegotiation. Canonical trade- liberalisation case for Latin American catch-up hypotheses.

  '

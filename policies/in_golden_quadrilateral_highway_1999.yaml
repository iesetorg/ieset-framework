policy_id: in_golden_quadrilateral_highway_1999
status: candidate
title: India Golden Quadrilateral / National Highways Development Project (1999)
countries:
- IND
timeframe:
  start: 1999
  end: 2012
  enacted_date: '1999-01-06'
description: 'National Highways Development Project (NHDP) launched 1999 under Vajpayee administration. Phase I ("Golden Quadrilateral," 5,846 km) connected Delhi-Mumbai-Chennai-Kolkata with four-to-six-lane
  expressways, substantially completed 2004-2006. Phase II (7,300 km) covered North-South (Srinagar-Kanyakumari) and East-West (Porbandar-Silchar) corridors. Financed primarily through cess on petrol and
  diesel (~Rs 2/litre earmarked) and toll-backed bonds via National Highways Authority of India. Total programme spend ~Rs 540bn (Phase I-II). Empirically linked by Ghani et al (2016) to non-nodal-city
  manufacturing firm growth.

  '
enacted_by:
- india_vajpayee_nda_1998_2004
- india_manmohan_singh_upa_i_2004_2009
coalition_label_at_enactment: BJP-led NDA / INC-led UPA-I

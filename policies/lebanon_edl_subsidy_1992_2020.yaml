policy_id: lebanon_edl_subsidy_1992_2020
status: candidate
title: Lebanon Edl Subsidy 1992 2020
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'Throughout the post-civil-war period the Lebanese state subsidised Électricité du Liban (EDL), the loss-making public power utility, through Treasury transfers covering fuel-import shortfalls
  and operating deficits. With tariffs frozen at 1996 levels and chronic supply rationing despite budgeted reform plans, cumulative EDL transfers became one of the largest single contributors to Lebanon''s
  public-debt trajectory across 1992-2020.

  '

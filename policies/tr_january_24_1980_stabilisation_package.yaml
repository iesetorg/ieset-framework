policy_id: tr_january_24_1980_stabilisation_package
status: candidate
title: Turkey 24 January 1980 Stabilization Package
countries:
- TUR
timeframe:
  start: 1980
  enacted_date: '1980-01-24'
description: 'Stabilisation and structural adjustment package designed by Turgut Özal as Undersecretary and announced 24 January 1980 under Demirel''s minority AP government. Content: 48.6% devaluation
  of the lira, removal of most price controls on manufactured goods, interest-rate liberalisation (July 1980), generous export subsidies, reduction of SEE transfers, and the first meaningful trade opening
  in Turkey''s ISI era. Deepened and consolidated under Evren military rule (1980-83) and Özal''s ANAP (from November 1983).

  '

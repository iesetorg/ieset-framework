status: candidate
title: Ecuador Internal Armed Conflict Declaration (Plan Fénix)
countries:
- ECU
timeframe:
  start: 2024
  enacted_date: '2024-01-09'
description: 'Decreto Ejecutivo 111 of 9 Jan 2024 declared a state of internal armed conflict and designated 22 organised-crime groups (Los Choneros, Los Lobos, Tiguerones, etc.) as terrorist organisations
  and non-state belligerents, authorising the Armed Forces to conduct sustained street operations jointly with the National Police. Issued the day after the armed takeover of TC Televisión studios in Guayaquil.
  Framed as the "Plan Fénix" / Phoenix Plan security doctrine. Underpinned by prior and parallel states of emergency.

  '

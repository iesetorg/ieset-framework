description: 'Finance Minister Netanyahu''s May-June 2003 ''Emergency Economic Plan'' (enacted via Arrangements Law): income-tax phased cuts (top rate 60% → 49% by 2010), corporate tax 36% → 25%, capital
  gains tax cuts, pension system conversion to funded defined-contribution, child-allowance cuts (universal reduction especially for large families), unemployment benefit tightening, NIS 1bn public-sector
  wage freeze, privatisation acceleration (Bezeq, Bank Leumi, Bank Discount). Largest peacetime Israeli economic restructuring since 1985 stabilisation.

  '

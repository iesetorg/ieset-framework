description: 'Constitutional amendment package agreed at Meech Lake conference 30 April 1987 by Mulroney and all 10 premiers to secure Quebec''s endorsement of the 1982 Constitution. Recognised Quebec as
  a "distinct society," gave provinces input on Supreme Court and Senate appointments, required unanimity for further changes. Required ratification by all provincial legislatures within three years. Failed
  22 June 1990 deadline — Manitoba MLA Elijah Harper (Oji-Cree) held the Assembly open blocking unanimous consent; Newfoundland Premier Wells declined to schedule a vote. Triggered Bloc Québécois formation
  (Lucien Bouchard) and 1995 referendum.

  '

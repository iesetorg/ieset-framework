policy_id: vn_eu_vietnam_fta_ratification_2020
status: candidate
title: Eu Vietnam Fta Ratification 2020
countries:
- VNM
timeframe:
  start: 2016
  end: 2021
description: 'The EU-Vietnam Free Trade Agreement (EVFTA) was ratified in 2020 and entered into force on August 1, 2020. It eliminated approximately 99 percent of customs duties on goods over 7-10 year
  phaseouts, opened public procurement, and committed Vietnam to ILO core labour standards and enforceable trade-and-sustainable-development provisions. A parallel investment protection agreement (EVIPA)
  was signed but required individual EU member-state ratification.

  '
enacted_by:
- vietnam_phuc_pm_2016_2021

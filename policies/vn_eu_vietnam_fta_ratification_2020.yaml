  direction: +
  magnitude: weak
  intended: true
  rationale: Eliminated approximately 99 percent of bilateral tariffs over 7-10 year phaseouts including textiles and footwear.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: ILO labour-rights commitments and enforceable sustainability chapter constrained policy backsliding.
- axis: regulatory.product_market_competition
  direction: +

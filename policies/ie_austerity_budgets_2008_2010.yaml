description: 'Between the emergency budget of October 2008 and Budget 2011, the Cowen government enacted a sequence of fiscal-consolidation measures totalling more than EUR 20 billion in expenditure cuts
  and tax increases — including public- sector pay reductions, the Pension-Related Deduction, capital-spending freezes, and welfare-rate cuts — to stabilise a deficit that had widened sharply with the collapse
  of property-related revenues.

  '

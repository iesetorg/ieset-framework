description: 'Federal Goods and Services Tax of 7% effective 1 January 1991 under Excise Tax Act amendments (Bill C-62). Replaced the 13.5% Manufacturers'' Sales Tax — a hidden production-stage tax that
  cascaded and disadvantaged exports. Designed as a destination- based broad-base VAT with input-credit mechanism. Mulroney invoked Section 26 of the Constitution Act, 1867 to appoint eight additional senators
  to secure passage. Politically toxic (PC collapse 1993) but economically orthodox.

  '

description: 'Amendment No. 3 to Basic Law: The Judiciary passed 64–0 on 24 July 2023 (opposition walked out) barring courts from reviewing the reasonableness of decisions by cabinet ministers and the government.
  First statute of the broader Levin judicial overhaul to be enacted. Struck down on 1 January 2024 by an expanded 15-justice Supreme Court panel: 12–3 holding the Court has power to review Basic Laws,
  8–7 on merits that the amendment caused extreme harm to core democratic character. Landmark constitutional ruling in Israeli history.

  '

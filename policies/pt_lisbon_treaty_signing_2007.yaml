description: 'Portugal signed the Treaty of Lisbon on 13 December 2007 during its EU Council Presidency, with the Sócrates government hosting the signing ceremony in the Jerónimos Monastery. The treaty
  amended the TEU and TFEU, strengthened the EU single market governance and qualified-majority voting, and constrained domestic fiscal/regulatory autonomy in exchange for deeper EU coordination.

  '

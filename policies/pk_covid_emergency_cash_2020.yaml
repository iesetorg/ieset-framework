policy_id: pk_covid_emergency_cash_2020
status: candidate
title: Ehsaas COVID Emergency Cash (Pakistan, 2020)
countries:
- PAK
timeframe:
  start: 2020
  end: 2020
  enacted_date: '2020-04-01'
description: 'Emergency cash-transfer programme launched April 2020 under the Ehsaas umbrella in response to COVID lockdown income shocks. Disbursed PKR 12,000 to approximately 15 million households (~PKR
  203bn total) via SMS-registration and NADRA biometric eligibility checks at branchless-banking points. Largest single cash-transfer rollout in Pakistan''s history. Complemented by SBP Temporary Economic
  Refinance Facility and Rozgar wage-support scheme for formal-sector employers. Targeted-lockdown policy framework kept partial-economy operation through the first pandemic wave.

  '

policy_id: ghana_civil_service_rationalisation_1987
status: candidate
title: Ghana Civil Service Rationalisation 1987
countries:
- GHA
timeframe:
  start: 1983
  end: 1991
description: 'Phase II of Ghana''s Economic Recovery Programme launched a Civil Service Reform Programme in 1987 that retrenched roughly 50,000 public-sector workers between 1987 and 1991, redeployed remaining
  staff, consolidated ministerial structures, and introduced merit-based pay scales. World Bank and ODA technical assistance financed severance and retraining packages alongside the SAP-conditioned wage-bill
  compression.

  '
enacted_by:
- ghana_erp_stabilisation_1983_1991
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Reform reduced bureaucratic chokepoints in customs and trade-licensing administration.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Smaller ministerial footprint reduced rent-extraction opportunities in regulated sectors.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mass retrenchment directly compressed the public-sector wage bill, the largest budget line.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Lower wage-bill financing pressure reduced central-bank monetisation demands from Treasury.

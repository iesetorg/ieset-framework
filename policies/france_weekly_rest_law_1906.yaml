policy_id: france_weekly_rest_law_1906
status: candidate
title: France weekly rest law 1906
countries: [FRA]
timeframe:
  start: 1906
  end: 1906
  enacted_date: "1906-07-13"
description: >
  The Law of 13 July 1906 established a compulsory weekly rest period for
  employees and workers, ordinarily concentrated on Sunday but with sector
  exemptions and administrative derogations. The reform did not create a
  modern welfare state on its own, yet it marked an early national labour
  standard imposed on commerce and industry across the republic. It made
  working-time protection a routine object of public regulation rather
  than a matter left wholly to contract or local custom.
enacted_by:
  - france_radical_republican_reform_1901_1914
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    intended: true
    rationale: "A mandatory weekly rest day tightened baseline labour standards and reduced employers' discretion over weekly scheduling."
references:
  - "Loi du 13 juillet 1906 etablissant le repos hebdomadaire"

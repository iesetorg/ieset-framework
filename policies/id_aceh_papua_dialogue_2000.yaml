  end: 2001
  enacted_date: '2000-05-12'
description: 'Humanitarian Pause agreement between Indonesia and GAM (Free Aceh Movement) signed 12 May 2000 in Geneva under HDC mediation — first formal dialogue since 1976 insurgency onset. Ran May 2000
  - January 2001; produced modest violence reduction. Papua: Papuan Congress II held 29 May - 4 June 2000 under Wahid administration with formal support, called for independence dialogue. Special-autonomy
  frameworks subsequently enacted — Law 18/2001 on Special Autonomy for Aceh, Law 21/2001 on Special Autonomy for Papua. Second-round Aceh peace process collapsed under Megawati''s military operations 2003;
  definitive settlement under SBY via Helsinki MoU 2005.

  '

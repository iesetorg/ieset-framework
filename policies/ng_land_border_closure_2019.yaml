policy_id: ng_land_border_closure_2019
status: candidate
title: Nigeria land-border closure (Operation Swift Response)
countries:
- NGA
timeframe:
  start: 2019
  end: 2020
  enacted_date: '2019-08-20'
description: 'On 20 August 2019 Nigeria partially closed its land borders with Benin, Niger, Chad and Cameroon under Operation Swift Response, formalised into a total land-border closure for goods by October
  2019. Stated rationale: stopping rice and petrol smuggling. Effect: cross-border ECOWAS trade collapsed, food inflation accelerated from ~13% to >17% by early 2020, contributed to 2020 recession in coordination
  with COVID. Partial reopening December 2020, full reopening mid-2021. Occurred one month after Nigeria signed the AfCFTA, visibly contradicting its free-trade commitments.

  '

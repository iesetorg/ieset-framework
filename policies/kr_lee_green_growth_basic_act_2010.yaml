timeframe:
  start: 2010
  enacted_date: '2010-01-14'
description: 'Low Carbon Green Growth Basic Act (Law No. 9931, 14 January 2010), signature legislation of Lee Myung-bak''s National Strategy for Green Growth. Established the Presidential Committee on Green
  Growth, required 5-year National Green Growth Strategies, set the legal basis for emissions-trading (enabling separate ETS Act enacted 2012, operational 2015), greenhouse-gas reduction targets, green-industry
  R&D, and green-financing mechanisms. Positioned Korea as early OECD mover on mandatory mid-term emissions-reduction targets (30% below BAU by 2020 voluntary pledge Copenhagen 2009).

  '

  direction: +
  magnitude: moderate
  intended: true
  rationale: Bond proceeds were earmarked for marine conservation, protected-area management, and sustainable fisheries governance.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: The structure channels concessional financing and grants toward blue-economy firms and fisheries management.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The bond tied public financing to defined use-of-proceeds and reporting commitments.

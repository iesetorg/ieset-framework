policy_id: syc_sovereign_blue_bond_2018
status: candidate
title: Seychelles sovereign blue bond 2018
countries:
- SYC
timeframe:
  start: 2018
  end: ongoing
description: 'Seychelles issued the world''s first sovereign blue bond in 2018, using a World Bank-supported structure to raise finance for sustainable fisheries, marine conservation, and blue-economy investment.
  The instrument linked public borrowing and donor-backed guarantees to marine protected-area management, fisheries governance, and grants or loans for ocean-linked businesses.

  '

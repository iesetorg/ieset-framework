policy_id: vn_covid_early_containment_border_closure_2020
status: candidate
title: Vietnam early COVID-19 containment and border closure 2020
countries:
- VNM
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-02-01'
description: 'Early and aggressive COVID-19 containment under Phúc PM — border with China effectively closed 1 February 2020 (among earliest in region), comprehensive contact tracing with military-run centralised
  quarantine facilities, mandatory 14-day quarantine for all arrivals, localised lockdowns of specific communes rather than national lockdown. Kept recorded cases in triple digits through most of 2020;
  fatalities under 50 by end-2020. 2020 GDP grew +2.9%, one of very few positive-growth economies globally that year. Strategy broke down with Delta variant 2021 (nationwide lockdowns Ho Chi Minh City from
  July 2021) but the 2020 episode is the canonical pragmatic-early-containment case in comparative COVID analysis.

  '
enacted_by:
- vietnam_phuc_pm_2016_2021
coalition_label_at_enactment: Communist Party of Vietnam

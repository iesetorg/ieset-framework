policy_id: gab_transition_charter_2023
status: candidate
title: Gabon transition charter 2023
countries:
- GAB
timeframe:
  start: 2023
  end: 2025
description: 'After the August 2023 military takeover, Gabon''s transition authorities issued a transition charter to organise interim institutions, identify the president of the transition, structure transitional
  legislative and executive bodies, and set the legal frame for a return-to-constitutional-order process. The charter replaced ordinary elected constitutional operation during the transition period.

  '
scope: national
enacted_by:

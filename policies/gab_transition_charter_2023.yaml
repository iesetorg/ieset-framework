coalition_label_at_enactment: Committee for the Transition and Restoration of Institutions
axes_moved:
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: The charter created a formal transition framework while suspending normal elected constitutional authority.
references:
- Republic of Gabon, Transition Charter published after the 2023 change of power.
- African Union Peace and Security Council communiques on Gabon's 2023 transition.
notes: 'National publication access is uneven; AU transition documentation is used as an external official source for the institutional context.

  '

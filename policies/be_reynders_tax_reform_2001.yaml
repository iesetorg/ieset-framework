policy_id: be_reynders_tax_reform_2001
status: candidate
title: Reynders Tax Reform 2001
countries:
- BEL
timeframe:
  start: 1999
  end: 2007
description: 'Personal income tax reform adopted in 2001 under Finance Minister Didier Reynders (Verhofstadt I government), phased in from 2002 to 2006. Reduced the number of statutory brackets from seven
  to five, abolished the two highest marginal rates (52.5% and 55%), introduced a refundable employment tax credit, and partly de-indexed family quotients. Aimed to restore work incentives and converge
  Belgian rates toward neighbouring countries'' levels.

  '

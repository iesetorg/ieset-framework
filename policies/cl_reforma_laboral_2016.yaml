policy_id: cl_reforma_laboral_2016
status: candidate
title: Reforma Laboral 2016
countries:
- CHL
timeframe:
  start: 2014
  end: 2018
description: 'Ley 20.940 de Modernización del Sistema de Relaciones Laborales enacted in 2016 under the second Bachelet government. Strengthened collective bargaining by establishing union-only representation
  in negotiations, banning replacement of striking workers, and extending bargaining rights, while introducing a new inter-firm bargaining option. Aimed to rebalance labour relations in favour of collective
  workers'' rights.

  '
enacted_by:
- chile_bachelet_ii_nm_2014_2018
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Replacement-worker prohibition raises labour costs and indirectly affects corporate net taxable income.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Stronger collective bargaining is expected to compress wage distributions, raising tax progressivity indirectly.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Aligned package included expanded employer-funded benefits and severance entitlements.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Implementation required additional Dirección del Trabajo enforcement and mediation budget.

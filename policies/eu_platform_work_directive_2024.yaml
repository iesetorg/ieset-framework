scope: supranational
description: 'Directive (EU) 2024/2831 established EU-wide minimum rules for improving working conditions in platform work. It requires national systems for correctly determining employment status, adds
  transparency and human-oversight duties for automated monitoring and decision-making, and creates redress, anti-retaliation, and enforcement provisions for people performing platform work.

  '

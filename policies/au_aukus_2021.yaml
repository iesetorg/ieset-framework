policy_id: au_aukus_2021
status: candidate
title: AUKUS trilateral security pact — 2021
countries:
- AUS
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-09-15'
description: 'Trilateral security partnership between Australia, the United Kingdom, and the United States announced 15 September 2021. Pillar 1 commits Australia to acquire conventionally armed, nuclear-powered
  submarines (Virginia-class from the early 2030s, then SSN-AUKUS jointly built with the UK). Pillar 2 covers advanced-capability cooperation across quantum, AI, cyber, and hypersonics. Optimal Pathway
  announced 14 March 2023 with life-of-program cost estimate of A$268-368bn. Cancelled the A$90bn French Attack-class conventional-submarine contract.

  '

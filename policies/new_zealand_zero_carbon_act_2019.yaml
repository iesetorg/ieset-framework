policy_id: new_zealand_zero_carbon_act_2019
status: candidate
title: Zealand Zero Carbon Act 2019
countries:
- NZL
timeframe:
  start: 2019
  end: ongoing
description: 'The Climate Change Response (Zero Carbon) Amendment Act 2019 set legally binding targets for net-zero long-lived greenhouse gases by 2050 and a separate biogenic-methane reduction trajectory
  of 24-47 percent below 2017 levels by 2050. It introduced statutory five-year emissions budgets and adaptation plans and created the independent Climate Change Commission to advise on budget settings
  and monitor government performance against the targets.

  '

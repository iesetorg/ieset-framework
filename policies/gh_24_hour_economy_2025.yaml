policy_id: gh_24_hour_economy_2025
status: candidate
title: Ghana 24-hour economy industrial and service-hours programme (2025)
countries:
- GHA
timeframe:
  start: 2025
  end: ongoing
description: >
  Flagship NDC programme to expand round-the-clock production and services through
  targeted support for manufacturing, agro-processing, logistics, security, and
  public infrastructure needed for multiple-shift operation. The policy is best
  coded as a developmental industrial-policy bundle: it uses coordination,
  credit and infrastructure support, and labour-market scheduling changes to raise
  capacity utilisation and employment without abandoning the IMF fiscal envelope.
enacted_by:
- ghana_mahama_ndc_second_2025_present
coalition_label_at_enactment: NDC Mahama second government
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Targeted support to selected sectors and enabling infrastructure is a sectoral industrial-policy intervention.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Programme implementation requires public coordination and infrastructure outlays, though bounded by IMF consolidation targets.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Multiple-shift and extended-hours operation requires more flexible scheduling rules and workplace arrangements.
linked_hypotheses:
- industrial_policy_governance_capacity_conditionality
- infrastructure_gap_state_investment_high_return
- public_spending_composition_growth
references:
- NDC 2024 manifesto and 24-hour economy programme documents
- Ghana Ministry of Finance 2025 Budget Statement and Economic Policy
notes: Created to materialise a declared policy on ghana_mahama_ndc_second_2025_present.

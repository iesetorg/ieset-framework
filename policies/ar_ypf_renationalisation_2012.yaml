title: YPF renationalisation — 51% expropriation of Repsol stake
countries:
- ARG
timeframe:
  start: 2012
  enacted_date: '2012-05-04'
description: 'Ley 26.741 (4 May 2012) declared hydrocarbons self-sufficiency of national public interest and expropriated 51% of YPF''s Class D shares held by Repsol. Federal government received 51% (26.03%
  national executive, 24.99% federated provinces). Repsol sought ICSID arbitration; settlement Feb 2014 awarded USD 5bn in sovereign bonds. 2014 Vaca Muerta-targeting hydrocarbons-law amendment (Ley 27.007)
  followed. Set precedent for sovereign expropriation treatment in investor-state arbitration.

  '

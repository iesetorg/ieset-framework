  enacted_date: '2000-04-10'
description: 'Royal Decree M/1 of 10 April 2000 replaced the 1979 law and established SAGIA (Saudi Arabian General Investment Authority) as one-stop agency. Permitted 100% foreign ownership in sanctioned
  sectors, reduced corporate tax on foreign entities to 20%, and bound property rights for foreign investors. First major post-Fahd-stroke economic-opening legislation under de facto Abdullah leadership.

  '

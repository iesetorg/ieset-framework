policy_id: lebanon_default_march_2020
status: candidate
title: Lebanon Default March 2020
countries:
- LBN
timeframe:
  start: 1992
  end: 2020
description: 'On 7 March 2020 Prime Minister Hassan Diab announced that Lebanon would not service the USD 1.2 billion Eurobond maturing 9 March, the country''s first sovereign default in modern history.
  The announcement cited the dollar liquidity squeeze, depleted reserves and need to preserve foreign exchange for essential imports, and triggered cross-default clauses on the remaining roughly USD 30
  billion of foreign-currency public debt and a long restructuring process.

  '

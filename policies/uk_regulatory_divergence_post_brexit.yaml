policy_id: uk_regulatory_divergence_post_brexit
status: candidate
title: Regulatory Divergence Post Brexit
countries:
- GBR
timeframe:
  start: 2016
  end: 2020
description: 'The UK''s post-Brexit regulatory-divergence programme, framed by the European Union (Withdrawal) Act 2018 and the Retained EU Law (Revocation and Reform) Act 2023, established the legal machinery
  for the UK to depart from inherited EU rules across financial services (Edinburgh Reforms), agriculture, chemicals (UK REACH), data protection, and product safety. The intended effect was to allow tailored
  UK-specific regulation, capture potential growth dividends from divergence, and signal regulatory sovereignty — even at the cost of border friction in goods trade with the EU and a reduction in deep regulatory
  market access.

  '

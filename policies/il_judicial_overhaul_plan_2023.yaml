policy_id: il_judicial_overhaul_plan_2023
status: candidate
title: Israel judicial overhaul plan (Levin–Rothman) 2023
countries:
- ISR
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-01-04'
description: 'Comprehensive plan unveiled 4 January 2023 by Justice Minister Yariv Levin and Constitution Committee chair Simcha Rothman to restructure the judiciary. Four core elements: (i) override clause
  permitting a 61-MK Knesset majority to re-enact statutes struck down by the Supreme Court; (ii) political control of the Judicial Selection Committee via coalition majority; (iii) elimination of the ''reasonableness''
  standard of judicial review over executive decisions; (iv) conversion of ministerial legal advisors from professional appointees to political ones. Triggered the largest protest movement in Israeli history
  (Kaplanist demonstrations), reservist refusals, and shekel / TA-125 capital-flight signals.

  '

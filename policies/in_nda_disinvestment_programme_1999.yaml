policy_id: in_nda_disinvestment_programme_1999
status: candidate
title: NDA strategic-disinvestment programme (1999-2004)
countries:
- IND
timeframe:
  start: 1999
  end: 2004
  enacted_date: '1999-12-10'
description: 'Department of Disinvestment created December 1999 (upgraded to Ministry of Disinvestment 2001) under Arun Shourie. Shifted from prior minority-stake sales to full strategic sale of CPSEs:
  Modern Food Industries (74% to Hindustan Lever, 2000), BALCO (51% to Sterlite, 2001), Hindustan Zinc (26% to Sterlite, 2002 and 2003), VSNL (25% to Tata Group, 2002), Maruti Udyog (reduce to minority,
  2003), IPCL (26% to Reliance, 2002), HTL, Paradeep Phosphates. Raised ~Rs 17,500 crore 1999-2004. Programme halted under UPA-I (2004) which reverted to minority-stake-sale model.

  '
enacted_by:
- india_vajpayee_nda_1998_2004
coalition_label_at_enactment: BJP-led NDA
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Strategic sales opened telecom, aluminium, zinc, petrochemical sectors to private-sector competition.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reduced ongoing CPSE-subsidy obligations.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Established rules-based competitive-bid privatisation process.
references:
- Department of Disinvestment Annual Reports 1999-2004
- Mohan (2002), 'Towards a Restructuring of the Indian Financial System'

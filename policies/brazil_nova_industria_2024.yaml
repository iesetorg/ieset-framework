policy_id: brazil_nova_industria_2024
status: candidate
title: Brazil Nova Industria 2024
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'Nova Industria Brasil, launched in January 2024 by the Lula third-term government, is a multi-year industrial-policy strategy organised around six "missions" (food security, health-care complex,
  bioeconomy, digital transformation, energy transition, defence/sovereignty). It mobilises BNDES credit lines, FINEP grants, Embrapii innovation co-funding, and tax-credit instruments — explicitly reviving
  developmentalist tooling that had been suspended after the 2014 commodity bust and the 2016 EC95 spending cap.

  '

policy_id: uk_miners_strike_resolution_1984_1985
status: candidate
title: UK Miners' Strike 1984-1985 resolution
countries:
- GBR
timeframe:
  start: 1984
  end: 1985
description: 'National Coal Board pit-closure programme announced March 1984 triggered year-long NUM strike (5 March 1984 - 3 March 1985). Government prepared coal stocks through 1983, used 1982 and 1984
  union-law architecture to sequester NUM funds, retained police mobility across force areas. Strike ended without a return-to-work agreement. Pivotal symbolic defeat for British organised labour; enabled
  subsequent coal-industry restructuring and 1994 privatisation.

  '

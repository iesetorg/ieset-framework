policy_id: norway_gpfg_investment_mandate
status: candidate
title: Norway Gpfg Investment Mandate
countries:
- NOR
timeframe:
  start: 2001
  end: ongoing
description: 'Norway''s Government Pension Fund Global (GPFG) investment mandate, set out in the Government Pension Fund Act of 2005 and Ministry of Finance regulations, instructs Norges Bank Investment
  Management to invest oil-revenue surpluses in foreign equities (70%), fixed income (~27.5%), and real estate (~2.5%) under a passive-tilt benchmark with strict ethical exclusions managed by the Council
  on Ethics. The intended effect is to convert a finite oil endowment into a permanent diversified financial endowment for future generations.

  '

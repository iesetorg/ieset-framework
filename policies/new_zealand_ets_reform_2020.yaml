policy_id: new_zealand_ets_reform_2020
status: candidate
title: Zealand Ets Reform 2020
countries:
- NZL
timeframe:
  start: 2019
  end: ongoing
description: 'The Climate Change Response (Emissions Trading Reform) Amendment Act 2020 overhauled New Zealand''s Emissions Trading Scheme by introducing an absolute unit cap aligned with carbon budgets,
  a price-stability cost-containment reserve and floor price, auctioning of NZUs (replacing free allocation through 2020), and tighter forestry accounting under averaging. The reform converted the ETS from
  a non-binding intensity instrument into a quantity-binding scheme consistent with the Zero Carbon Act framework.

  '
enacted_by:
- newzealand_ardern_labour_2017_2023
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Imposed an absolute, declining unit cap and price floor that bind compliance behaviour for the first time.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Tightened participant registration, surrender, and forestry-averaging rules across covered sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Auction revenue and industrial-allocation reform reshaped fiscal flows to emissions-intensive trade-exposed firms.
- axis: regulatory.energy_supply_security
  direction: '0'
  magnitude: weak
  intended: true
  rationale: ETS reform did not directly alter generation adequacy or fuel-import dependence in the near term.

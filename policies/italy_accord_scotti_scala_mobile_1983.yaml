description: 'Tripartite agreement 22 January 1983 between government, Confindustria, and CGIL-CISL-UIL unions under Labour Minister Vincenzo Scotti. Reduced scala mobile wage indexation by 3 points (each
  point = ~6,800 lire/month per percentage of CPI). First significant erosion of automatic wage-indexation system introduced 1975. Set stage for 1984 Decreto San Valentino.


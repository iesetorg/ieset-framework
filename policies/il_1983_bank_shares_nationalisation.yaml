policy_id: il_1983_bank_shares_nationalisation
status: candidate
title: Israeli bank-shares nationalisation arrangement October 1983
countries:
- ISR
timeframe:
  start: 1983
  enacted_date: '1983-10-09'
description: 'Finance Ministry and Bank of Israel arrangement following the 6 October 1983 bank-shares collapse guaranteed bank-share values in USD-linked government bonds redeemable after 5-6 years. Effectively
  nationalised the big four banks. Short-run benefit: prevented run on the banking system. Cost: $7bn fiscal liability and decade-long re-regulation.

  '

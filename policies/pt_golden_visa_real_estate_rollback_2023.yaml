policy_id: pt_golden_visa_real_estate_rollback_2023
status: candidate
title: Golden Visa Real Estate Rollback 2023
countries:
- PRT
timeframe:
  start: 2015
  end: 2024
description: 'Portugal''s "Mais Habitacao" law of October 2023 (Lei 56/2023), enacted by the Costa PS government, removed real-estate purchases as a qualifying investment for the Autorizacao de Residencia
  para Investimento (golden visa) introduced in 2012, retaining the visa only for investment in fund-of-funds, scientific research, cultural support, or job creation. The intended effect was to cool Lisbon
  and Porto housing prices, redirect foreign capital away from property speculation, defuse a politically salient affordability crisis, and rebalance the immigration-investment programme toward productive
  uses.

  '
enacted_by:
- portugal_costa_ps_2015_2024
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion Mais Habitacao programme allocated state spending on social-rental supply.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Rent-subsidy and porta-65 components added new transfer flows to renters.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing investor-friendly real-estate visa tilted effective tax incidence less toward wealthy non-residents.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Companion housing measures included rent caps that reduced flexibility in housing-tied labour mobility.

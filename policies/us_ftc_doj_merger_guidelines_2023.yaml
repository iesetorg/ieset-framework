policy_id: us_ftc_doj_merger_guidelines_2023
status: candidate
title: Ftc Doj Merger Guidelines 2023
countries:
- USA
timeframe:
  start: 2021
  end: 2025
description: 'In December 2023 the FTC and DOJ Antitrust Division jointly issued new Merger Guidelines superseding the 2010 Horizontal Merger Guidelines and 2020 Vertical Merger Guidelines, tightening market
  concentration thresholds, increasing scrutiny of vertical and conglomerate combinations, and giving greater weight to labor-market and platform-dynamics theories of harm. Drafted under FTC Chair Lina
  Khan and Assistant AG Jonathan Kanter, the guidelines marked a structural shift toward more skeptical enforcement.

  '

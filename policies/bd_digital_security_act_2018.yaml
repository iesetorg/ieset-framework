  enacted_date: '2018-10-08'
description: 'Jatiya Sangsad passed the Digital Security Act on 19 September 2018 (assented 8 October 2018), superseding the narrower ICT Act §57. Criminalised a wide range of online speech (defamation,
  "hurting religious sentiment", "spreading propaganda against the Liberation War") with non-bailable offences and ten-plus-year sentences. Thousands of cases filed 2018-2023, including against journalists
  and opposition figures. Replaced by Cyber Security Act 2023.

  '

policy_id: indonesia_inpres_rural_development
status: candidate
title: Indonesia Inpres Rural Development
countries:
- IDN
timeframe:
  start: 1966
  end: 1998
description: 'Suharto-era Inpres (Instruksi Presiden) grants channelled oil-revenue earnings into earmarked rural development outlays — primary schools (Inpres SD), village-level health centres (Puskesmas),
  district roads, and irrigation works — bypassing line ministries and flowing directly to local administrations. The programme funded large-scale primary-schooling expansion (61,000+ schools built 1973–78,
  the basis for Duflo''s wage-return studies) and was central to New Order rural-stability strategy.

  '
enacted_by:
- indonesia_suharto_new_order_1965_1998
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Oil-rent allocations to rural infrastructure constituted large sectoral capital subsidy.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Rural development boosted tradable-goods supply while preserving rice import controls.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Programme allocations were politicised through New Order patronage networks.
- axis: institutional.property_rights
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Public capital investment improved rural asset values while land-tenure formalisation lagged.

policy_id: mx_federal_labour_law_reform_2012
status: candidate
title: Mexico Federal Labour Law reform (Reforma Laboral 2012)
countries:
- MEX
timeframe:
  start: 2012
  enacted_date: '2012-11-30'
description: 'Reform to Ley Federal del Trabajo published 30 Nov 2012 (end of Calderón sexenio, passed in cooperation with PRI-incoming Peña Nieto). Introduced trial-period contracts (up to 30 days), initial-training
  contracts (up to 180 days), hourly pay, part-time work, seasonal contracts, outsourcing framework (later tightened by AMLO 2021). Capped severance back-pay at 12 months. Largest labour reform since 1970.

  '

policy_id: us_glass_steagall_banking_act_1933
status: candidate
title: Glass Steagall Banking Act 1933
countries:
- USA
timeframe:
  start: 1933
  end: 1999
description: 'The Banking Act of 1933 (Pub. L. 73-66, "Glass-Steagall") legally separated commercial deposit-taking from investment banking by prohibiting Fed-member banks from affiliating with securities
  firms, established the FDIC for deposit insurance, expanded the Federal Reserve''s authority over speculative bank lending, and imposed Regulation Q ceilings on deposit interest. The structural separation
  of commercial and investment banking remained the defining feature of U.S. financial architecture until partial repeal by the 1999 Gramm-Leach-Bliley Act.

  '

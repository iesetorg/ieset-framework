  enacted_date: '2023-08-14'
description: 'Under Economy "super-minister" Sergio Massa, Argentina executed a series of discrete official-peso devaluations against a backdrop of accelerating inflation and an unprecedented multi-rate
  FX regime (oficial, MEP, CCL, blue, dólar soja, dólar Qatar, dólar turista, dólar tarjeta, dólar Coldplay). Key step: ~22% post-PASO devaluation on 14 Aug 2023 from ~287 to ~350 ARS/USD agreed with the
  IMF, followed by a fixed nominal peg to Oct 2023 election while CCL gap exploded past 200%. Parallel emission of new interventionist instruments (Bopreal planning, import-permit SIRA system replacing
  SIMI in Oct 2022) rationed FX access.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: afg_land_reform_decree_8_1978
status: candidate
title: Decree No. 8 Land Reform and Debt Cancellation
countries:
- AFG
timeframe:
  start: 1978
  end: 1979
description: The PDPA issued Decree No. 8 to limit landholdings, cancel certain peasant debts, and redistribute land from landlords and religious endowments to landless and smallholding peasants. Implementation was coercive, administratively weak, and politically explosive, but it was a central revolutionary economic reform.
enacted_by:
- afg_pdpa_saur_socialist_state_1978
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: true
  rationale: The decree expropriated and redistributed land while cancelling private debt claims.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Redistribution transferred land and debt relief toward poorer rural households.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Coercive decree implementation weakened predictable legal process and local dispute settlement.
references:
- Barnett R. Rubin (2002), The Fragmentation of Afghanistan
- Olivier Roy (1990), Islam and Resistance in Afghanistan

policy_id: zimbabwe_multi_currency_2009
status: candidate
title: Zimbabwe Multi Currency 2009
countries:
- ZWE
timeframe:
  start: 2000
  end: 2009
description: 'In February 2009, the Government of National Unity formalised a multi-currency regime that effectively dollarised the Zimbabwean economy after the abandonment of the Zimbabwe dollar amid record
  hyperinflation. The US dollar, South African rand, Botswana pula, and other regional currencies became legal tender for tax payment, government salaries, and private transactions. The Reserve Bank of
  Zimbabwe lost its currency-issue function and operated thereafter as a banking-supervision and reserve-management entity.

  '
enacted_by:
- zimbabwe_mugabe_land_reform_hyperinflation_2000_2008
axes_moved:
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory conversion of pre-2009 Zimbabwe-dollar bank deposits at confiscatory rates extinguished savers' claims.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Ad-hoc regime adoption without enabling legislation left contract-redenomination disputes unresolved in courts.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: De facto dollarisation eliminated RBZ's discretion over money creation, ending any independent policy stance.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Cash-only USD environment and credit collapse favoured incumbent firms with existing dollar working capital.

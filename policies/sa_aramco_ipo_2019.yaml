  direction: '-'
  magnitude: weak
  intended: true
  rationale: Partial listing brought Aramco under Tadawul disclosure regime; state retained overwhelming control.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: IPO proceeds cycled into PIF for sector-targeted industrial investments.

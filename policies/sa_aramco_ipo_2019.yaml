policy_id: sa_aramco_ipo_2019
status: candidate
title: Saudi Aramco partial IPO
countries:
- SAU
timeframe:
  start: 2019
  enacted_date: '2019-12-11'
description: 'Listing of ~1.5% of Saudi Aramco on the Tadawul exchange in December 2019, raising ~$25.6bn at the largest IPO in history. Valuation of ~$1.7tn fell short of the $2tn target first floated
  in 2016. Proceeds were transferred to PIF as seed for its international diversification programme. Follow-on 0.64% secondary placement in June 2024 raised a further ~$12bn. State retained ~90%+ control.

  '

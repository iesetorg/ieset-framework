policy_id: canada_nafta_accession_1994
status: candidate
title: Canada Nafta Accession 1994
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'Canada''s accession to the North American Free Trade Agreement (NAFTA), implemented from 1 January 1994 under the NAFTA Implementation Act 1993, extended the 1989 Canada-US FTA into a trilateral
  pact with Mexico. It eliminated most tariffs and codified rules of origin, dispute settlement and investor protections (Chapter 11). The intended effect was to deepen integration with the United States,
  expand market access, and lock in market-oriented reforms; the agreement was succeeded by CUSMA in 2020.

  '

policy_id: pe_pension_65_2011
status: candidate
title: Pensión 65 non-contributory pension programme
countries:
- PER
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-10-19'
description: 'Decreto Supremo 081-2011-PCM (19 Oct 2011) created Programa Nacional de Asistencia Solidaria Pensión 65 — non-contributory cash transfer of PEN 125/month to adults aged 65+ in extreme poverty.
  Coverage expanded from ~40,000 (2011) to ~545,000 (2016). Complemented contributory SNP + private AFP pension systems which had low coverage of informal workers. First major non-contributory pension pillar
  in Peruvian social policy.

  '

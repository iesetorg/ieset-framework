policy_id: id_ibra_bca_indosat_divestment_2002
status: candidate
title: Indonesia IBRA BCA and Indosat strategic-asset divestments (2002)
countries:
- IDN
timeframe:
  start: 2002
  end: 2002
  enacted_date: '2002-03-14'
description: 'Two flagship divestments under Megawati''s IBRA phase-out plan: (i) Bank Central Asia (BCA) — 51% stake sold to Farallon Capital-Djarum Group consortium 14 March 2002 for ~Rp 5.3tn; (ii) Indosat
  — 41.9% government stake sold to Singapore Technologies Telemedia (Temasek) 15 December 2002 for Rp 5.6tn (~$627m), politically controversial as sale of national telecom incumbent to Singapore state-linked
  buyer. KPPU (Fair Business Competition Commission) later ruled 2007 that Temasek held anti-competitive cross-ownership in Indosat and Telkomsel; Temasek divested Indosat stake to Qatar Telecom 2008. Broader
  IBRA divestment programme including Bank Niaga (to CIMB Malaysia 2002), Bank Danamon (to Asia Financial Temasek 2003), Bank Permata (to Standard Chartered-Astra 2004).

  '
enacted_by:
- indonesia_megawati_pdip_2001_2004
coalition_label_at_enactment: PDI-P coalition
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Foreign-acquisition of major banks and telecom incumbent increased cross-border competition.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Foreign strategic-acquisition of BCA, Indosat, Bank Niaga et al.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Divestment proceeds applied to bond-stock reduction, lowered ongoing SOE-subsidy footprint.

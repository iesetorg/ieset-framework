policy_id: ie_corporate_tax_beps_defence_2013_2017
status: candidate
title: Corporate Tax Beps Defence 2013 2017
countries:
- IRL
timeframe:
  start: 2011
  end: 2017
description: 'During the OECD/G20 BEPS process the Kenny coalition defended Ireland''s 12.5% headline corporate rate while aligning domestic legislation with the new international standards: phasing out
  the "Double Irish" residency loophole in Finance Act 2014, introducing country-by-country reporting, and adopting the Knowledge Development Box at 6.25% under Finance Act 2015. The package preserved Ireland''s
  competitive tax brand while reducing exposure to BEPS- related sanctions.

  '

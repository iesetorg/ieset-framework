policy_id: ie_apple_tax_state_aid_compliance_2024
status: candidate
title: Apple state-aid case compliance — €14.1bn Exchequer receipt (2024)
countries:
- IRL
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-09-10'
description: 'Court of Justice of the European Union final ruling in Case C-465/20 P Commission v Ireland and Apple (10 September 2024), setting aside the General Court''s 2020 judgment and confirming the
  European Commission''s 2016 finding that two Irish tax rulings (1991 and 2007) granted Apple unlawful state aid. Ireland, which had argued against the Commission in lockstep with Apple across eight years
  of litigation, was required to collect the escrowed sum (~€14.1bn principal plus accumulated interest, ~€1.7bn in custodied assets returned to the Exchequer on top of pre-released tranches). Government
  commitment: receipts to be allocated to the Future Ireland Fund and the Infrastructure, Climate and Nature Fund rather than current expenditure — in practice, however, Budget 2025 absorbed part of the
  fiscal space created.

  '
enacted_by:
- ireland_harris_fg_2024_present
coalition_label_at_enactment: FF + FG + Green rotating-Taoiseach coalition (Harris Taoiseach)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: false
  rationale: Collection of €14.1bn historical tax arrears against Ireland's institutional preference; de facto corporate-tax ratchet even if one-off.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: false
  rationale: CJEU ruling reinforced EU-law primacy in domestic tax administration and the binding nature of state-aid discipline.
references:

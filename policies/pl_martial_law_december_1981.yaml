description: 'Decree imposing martial law (stan wojenny) in Poland 13 December 1981. Suspended Solidarność, ~10,000 internments, curfew, phone-line cuts, military checkpoints, suspension of weekend newspapers.
  Nine miners killed at Wujek colliery 16 December 1981. Solidarność formally delegalised October 1982. Martial law formally suspended 31 December 1982, lifted 22 July 1983. Sanctions from US and Western
  Europe.


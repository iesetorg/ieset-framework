policy_id: egypt_egp_second_float_2024
status: candidate
title: Egypt Egp Second Float 2024
countries:
- EGY
timeframe:
  start: 2016
  end: ongoing
description: 'On 6 March 2024 the Central Bank of Egypt let the EGP move from roughly 30 to over 50 per USD, raising overnight rates by 600 bp and committing to a freely traded exchange rate as part of
  the augmented IMF EFF and the Ras El Hekma deal. The action eliminated the multi-year parallel-market premium and re-anchored monetary policy after years of soft-peg defence with capital controls.

  '

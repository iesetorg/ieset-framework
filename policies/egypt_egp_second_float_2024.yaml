  intended: true
  rationale: Lower implicit FX subsidies to importers translated into reduced quasi-fiscal transfers.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Devaluation lifted EGP debt-service costs even as primary spending consolidated.
- axis: monetary.monetary_expansion_direction

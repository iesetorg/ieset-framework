policy_id: de_mindestlohn_2014
status: candidate
title: German statutory minimum wage (Mindestlohngesetz) 2014-2015
countries:
- DEU
timeframe:
  start: 2014
  end: ongoing
  enacted_date: '2014-08-11'
description: 'Federal statutory minimum wage introduced at EUR 8.50/hour effective 1 January 2015 under the second Merkel Grand Coalition, ending Germany''s historic reliance on sector-by-sector collective
  bargaining for wage floors. Indexed adjustments via Mindestlohnkommission (raised to EUR 9.35 by 2020). A Merkel-era concession to SPD coalition partner that partially offset Hartz-era wage flexibility
  at the bottom of the distribution.

  '
enacted_by:
- germany_merkel_broad_2005_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Binding wage floor across sectors reduces bottom-tail flexibility that Hartz II mini-jobs had expanded.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Partial Aufstocker reduction at margins; not a direct transfer instrument.

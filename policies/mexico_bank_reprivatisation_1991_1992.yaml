policy_id: mexico_bank_reprivatisation_1991_1992
status: candidate
title: Mexico Bank Reprivatisation 1991 1992
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Following the 1990 constitutional reform reversing the 1982 López Portillo bank nationalisation, the Salinas administration auctioned 18 commercial banks to private investors between June
  1991 and July 1992. Sales were managed by the Comité de Desincorporación Bancaria and raised roughly USD 12 billion, ending state ownership of the commercial banking system and integrating Mexican banks
  into a deregulated financial-services regime that preceded NAFTA and the 1995 tequila-crisis interventions.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Reprivatisation prepared the banking sector for cross-border ownership liberalisation under NAFTA's financial-services chapter.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Multiple private bidders re-entered commercial banking, ending the post-1982 state-owned banking monopoly structure.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Transferred bank ownership rights from the state to private shareholders via constitutional amendment and auction.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised bank balance sheets reduced fiscal-monetary entanglement and supported subsequent Banxico autonomy reforms.

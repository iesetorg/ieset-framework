description: 'Under Correa''s Plan Nacional para el Buen Vivir, public investment rose from roughly 4% to over 14% of GDP at peak (2013), funding hydro generation (Coca Codo Sinclair, Sopladora, Mazar),
  highways, hospitals, the Yachay knowledge city, and refurbished schools and clinics. Funding came from oil rents, Chinese loans, and domestic state-bank lending; the programme defined the Citizens'' Revolution''s
  macroeconomic stance and broke down with the 2014 oil-price collapse.

  '

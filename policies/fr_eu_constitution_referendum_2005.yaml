policy_id: fr_eu_constitution_referendum_2005
status: candidate
title: Eu Constitution Referendum 2005
countries:
- FRA
timeframe:
  start: 2002
  end: 2007
description: 'The 29 May 2005 French referendum on the Treaty Establishing a Constitution for Europe, organised under Article 11 of the French Constitution, rejected the treaty by 54.7% to 45.3% on a 69%
  turnout. The ''No'' result halted ratification across the EU and forced renegotiation into the Lisbon Treaty (2007). The intended effect of the referendum was to legitimise deeper EU institutional integration;
  its failure constrained Chirac''s domestic agenda and reshaped Europe''s institutional path.

  '
enacted_by:
- france_chirac_ii_presidency_2002_2007

policy_id: ph_epira_power_sector_reform_2001
status: candidate
title: Philippines Electric Power Industry Reform Act (EPIRA, 2001)
countries:
- PHL
timeframe:
  start: 2001
  end: 2006
  enacted_date: '2001-06-08'
description: 'Republic Act 9136 (EPIRA) signed 8 June 2001 by Arroyo, drafting substantially completed under Estrada. Restructured electricity sector: unbundled National Power Corporation (NPC) into generation
  (to be privatised), transmission (National Transmission Corporation, NTC, privatised to NGCP 2008), distribution (retained local utilities), system-operator (NGCP). Established Wholesale Electricity Spot
  Market (WESM) launched 26 June 2006 in Luzon. Created Energy Regulatory Commission (ERC) as quasi-judicial regulator. PSALM established to manage NPC debt and privatisation proceeds. Partial cross- ownership
  limits imposed between generation and distribution.

  '
enacted_by:
- philippines_estrada_lammp_1998_2001
- philippines_arroyo_lakas_2001_2010

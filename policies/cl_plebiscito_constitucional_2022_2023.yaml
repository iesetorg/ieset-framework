policy_id: cl_plebiscito_constitucional_2022_2023
status: candidate
title: Plebiscito Constitucional 2022 2023
countries:
- CHL
timeframe:
  start: 2022
  end: ongoing
description: 'Sequence of two constitutional exit plebiscites: the September 2022 referendum rejecting (62-38) the Constitutional Convention''s draft, and the December 2023 referendum rejecting (55-45)
  the Constitutional Council''s revised draft. Both votes preserved the 1980 constitution (with prior amendments), ending the post-2019 replacement process under the Boric government.

  '
enacted_by:
- chile_boric_ad_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Convention drafts proposed expanded taxing powers; rejection cancelled those potential tax increases.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Drafts contemplated more progressive levies; rejection mixed effect on baseline tax-progressivity trajectory.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Rejected drafts proposed constitutionalising broader social-rights entitlements with implicit transfer expansion.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: First draft included strengthened collective-bargaining rights that would have lowered labour flexibility.

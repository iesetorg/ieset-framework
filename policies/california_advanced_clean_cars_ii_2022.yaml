policy_id: california_advanced_clean_cars_ii_2022
status: candidate
title: California Advanced Clean Cars Ii 2022
countries:
- USA
timeframe:
  start: 2006
  end: ongoing
description: 'Adopted by CARB in August 2022 under AB 32 authority and a federal Clean Air Act Section 209 waiver, the Advanced Clean Cars II rule sets a binding zero-emission vehicle (ZEV) sales mandate
  rising from 35% of new light-duty vehicles in model year 2026 to 100% by 2035, with declining exhaust-emission limits on remaining ICE sales and durability/warranty requirements. It is the vehicle-side
  counterpart to SB 100 in the electricity sector and has been adopted in whole or part by more than a dozen "Section 177" states.

  '

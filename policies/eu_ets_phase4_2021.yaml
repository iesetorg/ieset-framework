  rationale: Tighter cap, higher reduction factor, and ETS2 expansion raise the effective EU carbon price.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Maritime ETS coverage and CBAM linkage extend EU carbon costs to international trade flows.
- axis: fiscal.sectoral_subsidy

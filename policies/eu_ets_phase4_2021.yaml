  rationale: Innovation Fund and Modernisation Fund recycle auction revenues into clean-tech deployment grants.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: New sectors (maritime, buildings, road) brought under MRV and emissions-allowance compliance regimes.

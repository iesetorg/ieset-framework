description: 'Phase 4 of the EU Emissions Trading System (2021-2030), implemented by Directive (EU) 2018/410 and later strengthened by the Fit-for-55 revision (Directive (EU) 2023/959), accelerated the
  linear reduction factor on the cap, expanded the Market Stability Reserve, extended ETS to maritime shipping, and created a separate ETS2 for buildings and road transport. The Innovation Fund and Modernisation
  Fund were enlarged through auction revenues to finance decarbonisation projects.

  '

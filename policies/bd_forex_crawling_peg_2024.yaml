policy_id: bd_forex_crawling_peg_2024
status: candidate
title: Crawling-peg exchange-rate regime
countries:
- BGD
timeframe:
  start: 2024
  enacted_date: '2024-05-08'
description: 'Bangladesh Bank on 8 May 2024 introduced a crawling-peg regime with a mid-rate of BDT 117/USD and a ±1% band (later widened), abandoning the de-facto fixed rate that had driven the 2022-2024
  forex crisis as reserves halved. Combined with the simultaneous removal of the lending- rate cap (SMART formula discontinued) and adoption of a policy-rate framework.

  '
enacted_by:
- bangladesh_hasina_al_fourth_term_2019_2024
coalition_label_at_enactment: Awami League
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  rationale: Price-based FX allocation replaces administrative rationing.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  rationale: Rate cap removal; policy-rate transmission restored.
references:
- Bangladesh Bank monetary-policy statement, May 2024
- IMF Bangladesh ECF second review (June 2024)

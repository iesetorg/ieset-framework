policy_id: jp_mobile_carrier_price_reform_2020
status: candidate
title: Japan — mobile-carrier price reform (2020-2021)
countries:
- JPN
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-10-27'
description: 'Government-led pressure on the NTT Docomo / KDDI / SoftBank mobile- carrier oligopoly initiated under PM Suga. The MIC (Ministry of Internal Affairs and Communications) published the Action
  Plan for Mobile Market Competition on 27 October 2020, paired with public statements by Suga and MIC Minister Takeda demanding mid-tier plan price cuts. All three incumbent carriers responded by launching
  new online-only brands (ahamo, povo, LINEMO) at monthly prices roughly 40% below the prior mid-tier rates, effective March 2021. Reinforced by Act revisions enabling easier SIM unlocking and number portability.
  Consumer price index mobile-communications sub-index fell sharply through 2021 and contributed negatively to headline CPI.

  '
enacted_by:
- japan_suga_ldp_2020_2021
coalition_label_at_enactment: LDP-Komeito (Suga administration)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Forced oligopoly pricing discipline and lowered switching friction; three incumbents launched sub-brands 40% below prior pricing.
- axis: regulatory.sectoral_licensing
  direction: '0'
  magnitude: weak
  intended: false
  rationale: Spectrum-licence architecture unchanged; action worked through MIC pressure and number-portability rules rather than new entry.
references:

policy_id: cy_national_minimum_wage_2023
status: candidate
title: Cyprus national minimum wage order 2023
countries:
- CYP
timeframe:
  start: 2023
  end: ongoing
description: 'Cyprus introduced a statutory national minimum monthly wage from 1 January 2023 for employees not already covered by specified sectoral wage orders or collective arrangements. The order set
  a lower entry wage for the first six months of employment and a higher monthly floor thereafter, then became the base for later indexed reviews by the labour ministry and social partners.

  '
enacted_by:
- cyprus_justice_labour_reform_2022_present
scope: national
coalition_label_at_enactment: Anastasiades Democratic Rally administration
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: A national statutory wage floor reduced low-wage contract flexibility outside already-covered sectors.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  intended: false
  rationale: The wage floor redistributed through employer wage costs rather than a direct budget transfer.
references:
- Cyprus Minimum Wage Order 2022, Official Gazette of the Republic of Cyprus, effective 1 January 2023
- Cyprus Department of Labour Relations, national minimum wage information notices

policy_id: fr_france_euro_entry_1999_2002
status: candidate
title: France Euro Entry 1999 2002
countries:
- FRA
timeframe:
  start: 1997
  end: 2002
description: 'France''s adoption of the euro proceeded in two stages: irrevocable parity-locking on 1 January 1999 under EC Regulation 1103/97 and 974/98, followed by physical introduction of euro notes
  and coins on 1 January 2002 alongside withdrawal of the franc. Under the Maastricht convergence criteria France committed to inflation, deficit, debt, and exchange-rate disciplines. The intended effect
  was to remove FX risk vis-à-vis main trading partners, lock in low inflation via ECB policy, and embed France in deeper European integration.

  '

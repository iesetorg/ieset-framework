policy_id: australia_emissions_reduction_fund_2014
status: candidate
title: Australia Emissions Reduction Fund 2014
countries:
- AUS
timeframe:
  start: 2011
  end: 2014
description: 'Emissions Reduction Fund established under the Carbon Farming Initiative Amendment Act 2014 by the Abbott LNP government, replacing the repealed carbon-pricing mechanism. The fund pays for
  verified emissions-reduction projects through reverse auctions administered by the Clean Energy Regulator, using Australian Carbon Credit Units. Allocated AUD 2.55 billion at inception and forming the
  central element of the "Direct Action Plan."

  '

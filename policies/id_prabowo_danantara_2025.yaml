policy_id: id_prabowo_danantara_2025
status: candidate
title: Danantara sovereign wealth vehicle 2025
countries:
- IDN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-02-24'
description: 'Daya Anagata Nusantara (Danantara Indonesia), launched 24 February 2025 under UU No. 1/2025 amending the SOE Law (UU 19/2003), is a sovereign investment vehicle consolidating equity stakes
  in Indonesia''s major state-owned enterprises — Pertamina (oil), PLN (power), Telkom, Mandiri, BRI, BNI, and Mining Industry Indonesia (MIND ID). Target AUM ~USD 900bn, staged across the largest SOEs
  first. Sits outside the finance ministry and outside BPK standard audit scope; reports directly to the president. Merges INA (Indonesia Investment Authority, 2021) into the new structure. Modelled rhetorically
  on Temasek and Khazanah.

  '
enacted_by:
- indonesia_prabowo_2024_present
coalition_label_at_enactment: Gerindra-led Koalisi Indonesia Maju Plus
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Consolidates strategic-sector SOE control under a single investor-of-last-resort entity, tightening state gating of strategic sectors.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Audit and oversight carve-out from BPK standard scope; direct-to-president reporting reduces legislative and civil-service accountability.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Off-balance-sheet equity injections widen the consolidated public-sector footprint beyond headline budget.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Larger state capital block in strategic sectors raises expropriation tail risk for minority private partners.
references:
- UU No. 1 Tahun 2025 (amending UU No. 19 Tahun 2003 tentang BUMN)
- IMF Indonesia Article IV 2025 Staff Report
- 'Lowy Institute (2025), ''Danantara: Indonesia''s Sovereign Leviathan'''

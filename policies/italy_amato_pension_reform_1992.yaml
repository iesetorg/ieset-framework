policy_id: italy_amato_pension_reform_1992
status: candidate
title: Italy Amato pension reform 1992 (D.Lgs 503/1992)
countries:
- ITA
timeframe:
  start: 1992
  end: 1992
  enacted_date: '1992-12-30'
description: 'Legge delega 421/1992 and D.Lgs 503/1992 (30 December 1992) raised statutory retirement ages (60→65 men, 55→60 women over 10 years), extended contribution years for minimum pension 15→20,
  shifted indexation to prices only (from wages+prices), reformed public-sector pension rules. First structural Italian pension reform; laid ground for 1995 Dini notional-defined-contribution reform.

  '
enacted_by:
- italy_tangentopoli_transition_1992_1994
coalition_label_at_enactment: PSI-DC-PSDI-PLI (Amato I)

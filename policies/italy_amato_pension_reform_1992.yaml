  direction: '-'
  magnitude: moderate
  rationale: Raised ages, switched to price indexation — reduced long-run pension liability.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  rationale: Long-run pension spending trajectory reduced.

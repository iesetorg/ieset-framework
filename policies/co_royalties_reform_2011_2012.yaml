description: 'Acto Legislativo 05/2011 (18 Jul 2011) + Ley 1530 de 2012 (17 May 2012) created Sistema General de Regalías — redistributed mining + hydrocarbons royalty revenue from producer-regions only
  to all departments + municipalities via regional-compensation + science-tech + savings-fund (FONPET / FAE) windows. Contested by producer-region governors (Casanare, Meta). Stabilised through 2019 Acto
  Legislativo 05 reform restoring higher share to producers.

  '

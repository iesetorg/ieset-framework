description: 'Four CBRT governors served in four years: Murat Çetinkaya dismissed by Presidential Decree 6 July 2019 for refusing to cut rates; Murat Uysal removed 7 November 2020 after a rate-hiking reversal;
  Naci Ağbal dismissed 20 March 2021 two days after hiking by 200bp to 19%; Şahap Kavcıoğlu installed to deliver the rate-cut cycle that halved the policy rate while CPI accelerated. Pattern codified the
  principle that CBRT governors could be replaced overnight for policy disagreement, collapsing de facto independence.

  '

policy_id: turkey_soe_privatisation_programme_2003_2013
status: candidate
title: Turkey Soe Privatisation Programme 2003 2013
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
description: 'Sustained AKP-era privatisation programme run via the Privatisation Administration (Özelleştirme İdaresi Başkanlığı) under Law No. 4046, divesting state stakes in Türk Telekom, Tüpraş, Erdemir,
  Petkim, electricity distribution grids, sugar plants, and toll roads/bridges. Block sales, IPOs, and concessions generated tens of billions in proceeds and shifted control of large network industries
  to private and often AKP-aligned holding groups.

  '
enacted_by:
- turkey_erdogan_akp_2002_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Block sales of Türk Telekom, Tüpraş, and Erdemir opened previously state-monopolised sectors to private competition.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Privatisation proceeds funded fiscal expansion that complicated CBRT policy autonomy under AKP pressure.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: One-off privatisation proceeds buffered the budget while ongoing transfer spending continued to rise.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tender awards favoured politically aligned holding groups, eroding procurement transparency norms.

policy_id: bangladesh_epz_act_1980
status: candidate
title: Bangladesh Epz Act 1980
countries:
- BGD
timeframe:
  start: 1982
  end: ongoing
description: 'The Bangladesh Export Processing Zones Authority Act 1980 created BEPZA, the statutory body empowered to designate, regulate, and operate dedicated export-oriented industrial enclaves beginning
  with the Chittagong EPZ in 1983. Firms inside the zones receive duty-free imports, tax holidays, and one-stop investor services; standard labour-law restrictions on union activity were modified inside
  the zones, anchoring the early FDI base for ready-made-garment expansion.

  '

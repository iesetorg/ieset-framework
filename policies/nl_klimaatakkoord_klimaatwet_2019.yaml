title: Netherlands Klimaatakkoord + Klimaatwet 2019
countries:
- NLD
timeframe:
  start: 2019
  enacted_date: '2019-06-28'
description: 'Sectoral climate agreement (Klimaatakkoord, 28 June 2019) between government, industry, agriculture, buildings, mobility, and electricity sectors specifying CO2 reduction measures, plus the
  Klimaatwet (2019) codifying binding targets of 49% by 2030 and 95% by 2050 relative to 1990. Introduced CO2 levy on industry, SDE++ sustainable-energy production subsidy framework, heat-pump subsidies,
  and electric-vehicle tax incentives. Anchored Dutch alignment with EU Green Deal.

  '
enacted_by:
- netherlands_rutte_iii_2017_2022
coalition_label_at_enactment: VVD-CDA-D66-ChristenUnie
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  intended: true
  rationale: Binding 49%/2030 and 95%/2050 statutory targets with sectoral enforcement.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: SDE++ framework became largest Dutch sectoral subsidy programme; heat-pump and EV incentives layered on.
- axis: fiscal.tax_corporate

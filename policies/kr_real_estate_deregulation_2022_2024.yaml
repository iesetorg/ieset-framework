policy_id: kr_real_estate_deregulation_2022_2024
status: candidate
title: Yoon real-estate deregulation packages (South Korea, 2022-2024)
countries:
- KOR
timeframe:
  start: 2022
  end: 2024
  enacted_date: '2022-12-21'
description: 'Sustained unwinding of Moon-era tightening: (i) designation removal for most "speculative overheated" zones (Gangnam-3 retained as exception); (ii) loan-to-value cap easing from 40% back toward
  70% for first-home buyers; (iii) rollback of multi-home acquisition-tax surcharges; (iv) Jongbuse (comprehensive real-estate tax) cut including threshold rise from KRW 600m to 900m for individuals (12m
  for married couples joint-ownership), rate reductions for multi-home owners; (v) reconstruction-permit liberalisation including safety- assessment criterion easing; (vi) capital-gains-tax holding-period
  carveouts.

  '
enacted_by:
- skorea_yoon_ppp_2022_2025
coalition_label_at_enactment: People Power Party (conservative)

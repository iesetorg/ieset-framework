  rationale: Jongbuse threshold raised and rates cut, multi-home surcharges rolled back.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Reconstruction-permit liberalisation and LTV easing reduce entry / rebuild friction.

title: Belgium energy-crisis response (1974-1976)
countries:
- BEL
timeframe:
  start: 1974
  end: 1976
description: 'First oil-shock response under Tindemans I: gradual consumer-price pass-through with partial subsidy buffer; speed-limit imposition (100 km/h motorways, 90 elsewhere) from late 1973; fuel-saving
  campaigns; acceleration of planned civil-nuclear programme (Doel 2-3 and Tihange 1-2 commissioned 1975-82). Combined with wage indexation maintained full pass-through of energy prices into wage-price
  spiral characteristic of Belgium 1970s.

  '

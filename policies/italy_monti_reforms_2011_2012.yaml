description: 'Technocratic government under PM Mario Monti following Berlusconi resignation mid-sovereign-debt crisis. Key measures: Fornero pension reform (raised retirement age + shifted to notional defined
  contribution), introduction of IMU property tax, VAT rate increase, liberalisation of professions + shop hours, banking-sector strengthening. Constrained by political unsustainability — Monti''s successor
  Letta + Renzi governments continued some elements (Jobs Act 2014-2015) but others were partially reversed. Demonstrated the limits of technocratic reform in persistently low-growth equilibrium without
  broader coalition rebalancing.

  '

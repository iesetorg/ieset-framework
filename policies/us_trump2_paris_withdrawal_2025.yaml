policy_id: us_trump2_paris_withdrawal_2025
status: candidate
title: Paris Agreement withdrawal and climate-rule rollback 2025
countries:
- USA
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-20'
description: 'Executive Order ''Putting America First in International Environmental Agreements'' announcing US withdrawal from the Paris Agreement (second withdrawal following the 2017-2020 first-term
  precedent); instruction to UN Secretary-General filed January 27 2025 with one-year effective delay per Article 28. Accompanied by ''Unleashing American Energy'' EO revoking Biden climate EOs, directing
  EPA review of the endangerment finding and vehicle-GHG, power-plant GHG, and methane rules; withdrawal from OECD global-minimum-tax Pillar Two implementation; rescission of IRA implementation guidance;
  expanded federal oil, gas, and LNG-export permitting. Subsequent EPA proposed reconsiderations and rescissions throughout Q2-Q3 2025.

  '

policy_id: mrt_tekavoul_social_registry_expansion_2020_2024
status: candidate
title: Mauritania Tekavoul social-registry cash-transfer expansion 2020-2024
countries:
- MRT
timeframe:
  start: 2020
  end: ongoing
description: 'Mauritania expanded the Tekavoul cash-transfer programme and national social registry to target poor and vulnerable households with regular transfers, shock-response payments, and accompanying
  social-promotion measures. The expansion made the registry and Tekavoul programme core tools of the Ghazouani government''s social compact and poverty-response architecture.

  '
enacted_by:
- mauritania_ghazouani_social_green_reform_2019_present
scope: national
coalition_label_at_enactment: Ghazouani government
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Tekavoul expands targeted cash transfers and shock-response support to poor households.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Scaling the registry and payment systems increases social-protection programme spending.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A national registry improves rules-based targeting and auditability of social transfers.
references:
- World Bank, Mauritania social safety net system and Tekavoul project materials, 2020-2024.
- Government of Mauritania, Taazour and social-registry programme materials.
notes: 'External financing and government implementation are closely intertwined; this file codes the national programme expansion rather than any single donor project.

  '

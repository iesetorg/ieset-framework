policy_id: se_shipbuilding_nationalisation_1977
status: candidate
title: Swedish shipbuilding consolidation into Svenska Varv 1977
countries:
- SWE
timeframe:
  start: 1977
  end: 1986
description: 'Merger of major Swedish shipyards (Götaverken, Uddevallavarvet, Eriksberg, Kockums) into state holding Svenska Varv AB by the Fälldin centre-right government during the global shipbuilding
  crisis. Absorbed accumulating losses, maintained employment in west-coast industrial regions, and ran accumulated deficits of multiple billions SEK through the 1980s before final wind-down.

  '
enacted_by:
- sweden_falldin_centre_coalition_1976_1982
coalition_label_at_enactment: Fälldin I centre-right non-socialist coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Direct absorption of shipyard losses on state balance sheet.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: State ownership crowded out market-discipline exit.
references:
- Proposition 1977/78:80 — Varvsindustrin
- Lindbeck (1997), The Swedish Experiment

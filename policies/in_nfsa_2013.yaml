policy_id: in_nfsa_2013
status: candidate
title: India — National Food Security Act (2013)
countries:
- IND
timeframe:
  start: 2013
  enacted_date: '2013-09-10'
description: 'The National Food Security Act 2013 entitles up to 75% of rural and 50% of urban population — ~813 million people — to subsidised foodgrains through the Public Distribution System at ₹3/kg
  rice, ₹2/kg wheat, ₹1/kg coarse grains (priority households 5 kg/person/ month; Antyodaya Anna Yojana households 35 kg/household/month). Converts what was an executive-scheme entitlement under the Targeted
  PDS into a statutory right, with pregnant women and lactating mothers entitled to ₹6,000 maternity benefit and children 6m-14y entitled to free meals via ICDS and mid-day meal scheme. Implementation tied
  to Aadhaar biometric authentication at fair-price-shop ePoS devices from 2016 onwards; ''One Nation One Ration Card'' portability rolled out 2019-2022. During COVID-19 the Pradhan Mantri Garib Kalyan
  Anna Yojana (Apr 2020 onwards) added free 5 kg/person/month on top of NFSA entitlement.

  '
enacted_by:
- india_singh_upa_ii_2009_2014
coalition_label_at_enactment: INC-led UPA-II
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: Universalised right to subsidised food for ~67% of population — largest food-security programme globally by coverage.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Food subsidy bill from ~₹72,000 cr 2012-13 to ~₹2.1 lakh cr 2022-23 (post-PMGKAY addition).
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Converts discretionary scheme entitlement to statutory right with grievance-redress mechanism.

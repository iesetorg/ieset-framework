title: September 1985 currency reform and hyperinflation (Vietnam)
countries:
- VNM
timeframe:
  start: 1985
  end: 1986
  enacted_date: '1985-09-14'
description: 'Currency reform of 14 Sep 1985 denominated the dong 10:1 and imposed household cash-conversion limits, wiping out savings. Simultaneous price-and-wage-reform liberalisation intended to shift
  from plan prices to state-set market prices miscarried catastrophically — inflation accelerated from ~25% (1984) to ~92% (1985) to ~487% (1986) to ~775% peak 1988. Crisis precedent for CPV 6th Congress
  Dec 1986 launching Doi Moi.

  '

description: 'Ley Orgánica de Comunicación (25 Jun 2013) created Superintendencia de Información y Comunicación (SUPERCOM) + Consejo de Regulación. Frequency redistribution (33% public, 33% private, 34%
  community), right-of-reply + "linchamiento mediático" doctrine + professional-journalism licensing requirements. Used to levy fines + corrections on El Universo + other outlets. IACHR + press-freedom
  groups criticised. Substantially repealed by Moreno government Feb 2019 (Ley Orgánica Reformatoria LOC).

  '

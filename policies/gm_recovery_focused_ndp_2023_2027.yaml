description: 'The Gambia adopted a recovery-focused national development plan for 2023-2027 to guide the post-pandemic and post-transition investment agenda. The plan emphasizes green recovery, private-sector-led
  growth, agriculture, tourism, infrastructure, human capital, governance reforms, and social inclusion while serving as the medium-term coordination frame for public spending and partner support.

  '

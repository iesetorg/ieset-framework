policy_id: uk_net_zero_transition_2019_2050
status: candidate
title: Net Zero Transition 2019 2050
countries:
- GBR
timeframe:
  start: 2021
  end: ongoing
description: 'The UK''s legally binding 2050 net-zero greenhouse gas target, enshrined in the Climate Change Act 2008 (2050 Target Amendment) Order 2019, the world''s first such legislation among major
  economies. Implementation extends through carbon budgets administered by the Climate Change Committee, sectoral pathways for power, transport, buildings, and industry, contracts-for-difference auctions
  for renewables, and the post-2026 phase-out of new internal-combustion-engine car sales.

  '

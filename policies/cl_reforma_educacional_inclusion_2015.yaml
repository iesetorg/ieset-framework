policy_id: cl_reforma_educacional_inclusion_2015
status: candidate
title: Reforma Educacional Inclusion 2015
countries:
- CHL
timeframe:
  start: 2014
  end: 2018
description: 'Ley 20.845 de Inclusión Escolar (Ley de Inclusión) enacted in June 2015 under the second Bachelet government. Phased out shared-financing copayments in publicly subsidised schools, banned
  for-profit operation by voucher schools, and prohibited selective admissions, replacing them with a centralised lottery-based assignment system. Aimed at reducing socio-economic segregation in Chile''s
  voucher school system.

  '
enacted_by:
- chile_bachelet_ii_nm_2014_2018
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: For-profit ban and reinvestment requirement for subsidised operators raised effective tax burden.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Companion 2014 tax reform funded the inclusion package via more progressive corporate taxation.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Replacement of family copayments with state subsidy effectively transferred costs to public budget.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Phasing out copayments increased Ministry of Education subsidy outlays per voucher seat.

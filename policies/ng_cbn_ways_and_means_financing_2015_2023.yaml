policy_id: ng_cbn_ways_and_means_financing_2015_2023
status: candidate
title: CBN Ways-and-Means overdraft monetary financing
countries:
- NGA
timeframe:
  start: 2015
  end: 2023
  enacted_date: '2015-06-01'
description: 'Under the Emefiele CBN (2014-2023), Ways-and-Means advances to the Federal Government — notionally capped at 5% of prior-year revenue under the CBN Act — accumulated to approximately N22.7
  trillion by end-2022, with peak stock breaching the statutory limit by multiples. Functionally equivalent to monetary financing of fiscal deficits. Securitised into a 40-year 9% bond in mid-2023 as a
  condition of Tinubu-era reset. The cumulative monetary financing is widely cited as the principal structural driver of naira weakness and 2022-2024 inflation.

  '
enacted_by:
- nigeria_buhari_apc_civilian_2015_2023
coalition_label_at_enactment: APC
axes_moved:
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Sustained breach of statutory W&M cap; CBN operated as federal-deficit financier.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: strong
  intended: true
  rationale: Base-money creation via W&M funded deficits 2015-2023.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: false
  rationale: Off-budget access to central-bank credit loosened fiscal constraint.

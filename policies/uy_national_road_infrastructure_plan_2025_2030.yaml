description: 'Uruguay''s MTOP road plan for the Orsi quinquennium keeps more than 70 contracts active for route and bridge works, with a reported investment envelope above USD 2.0 billion through direct
  ministry resources, the Corporacion Vial del Uruguay, public-private partnership financing, and private capital. Early works on Route 6 were presented as part of a wider strategy to connect productive
  and tourism corridors and improve access to Montevideo, Canelones, ports, and consumption centres.

  '

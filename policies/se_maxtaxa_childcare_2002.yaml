  direction: +
  magnitude: moderate
  intended: true
  rationale: State-funded fee cap constitutes implicit transfer to families with children.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Reduced marginal cost of second-earner employment.

policy_id: se_maxtaxa_childcare_2002
status: candidate
title: Maxtaxa childcare fee cap 2002
countries:
- SWE
timeframe:
  start: 2002
  enacted_date: '2002-01-01'
description: 'Introduced a nation-wide ceiling on municipal childcare fees (maxtaxa) limiting parents'' out-of-pocket fees to a percentage of household income subject to a capped absolute amount, funded
  by state grants to municipalities. Effective 1 January 2002. Substantially reduced marginal labour-force-participation costs for dual-earner families.

  '

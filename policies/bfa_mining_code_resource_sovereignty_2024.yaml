policy_id: bfa_mining_code_resource_sovereignty_2024
status: candidate
title: Burkina Faso mining code resource-sovereignty reform 2024
countries:
- BFA
timeframe:
  start: 2024
  end: ongoing
description: >
  Burkina Faso adopted a revised mining-code framework in 2024 as part of a
  wider resource-sovereignty agenda for the gold sector. The package increased
  state control and domestic-content expectations around mining projects,
  strengthened fiscal capture from gold and strategic minerals, and accompanied
  the build-out of state mining company capacity for permits, local processing,
  and public participation in mining assets.
enacted_by:
- burkina_faso_mpsr_transition_sovereignty_2022_present
scope: national
coalition_label_at_enactment: MPSR military transition
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: The revised code tightened state gating, local-content requirements, and public participation in mining projects.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Expanded state participation and permit leverage increased sovereign discretion over mining assets.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher public mining participation and revenue-capture ambitions increased the state's fiscal role in the sector.
references:
- Burkina Faso Council of Ministers and transitional legislature materials on the 2024 mining-code reform.
- IMF and World Bank reporting on Burkina Faso gold-sector revenue, state participation, and fiscal reforms, 2024-2025.
- Reuters and UNCTAD investment-policy reporting on Burkina Faso mining-code and state-mining-company measures, 2024-2025.

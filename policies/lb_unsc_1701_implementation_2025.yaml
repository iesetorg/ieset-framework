policy_id: lb_unsc_1701_implementation_2025
status: candidate
title: Lebanon UNSC Resolution 1701 implementation and state-authority extension (2025)
countries:
- LBN
timeframe:
  start: 2025
  end: ongoing
description: >
  Implementation drive for UN Security Council Resolution 1701 after the
  Israel-Hezbollah war ceasefire, centred on extending Lebanese state authority
  in the south, strengthening Lebanese Armed Forces deployment, coordinating with
  UNIFIL, and reducing the scope for parallel armed and financial infrastructure.
  In economic coding the policy is primarily an institutional state-capacity and
  rule-of-law intervention rather than a fiscal or trade reform.
enacted_by:
- lebanon_aoun_salam_reconstruction_2025_present
coalition_label_at_enactment: Aoun-Salam reformist technocratic cabinet
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Extending formal state authority and reducing parallel armed governance strengthens equal enforcement of public law.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Improved security and formal control reduce expropriation, intimidation, and reconstruction-risk premia for residents and investors.
linked_hypotheses:
- rule_of_law_institutional_growth
- classical_property_rights_security_fdi_premium_panel
- rule_of_law_market_reform_complementarity
references:
- UN Security Council Resolution 1701 implementation reporting, 2025
- Lebanese government ministerial declaration and security-sector commitments, 2025
notes: Created to materialise a declared policy on lebanon_aoun_salam_reconstruction_2025_present.

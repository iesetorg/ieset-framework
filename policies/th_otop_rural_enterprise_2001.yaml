policy_id: th_otop_rural_enterprise_2001
status: candidate
title: Thailand One Tambon One Product (OTOP, 2001)
countries:
- THA
timeframe:
  start: 2001
  end: 2006
  enacted_date: '2001-10-15'
description: 'One Tambon One Product programme launched October 2001, modelled on Japan''s Oita Prefecture Oyama-cho Isson-ippin (1979) and PM Morihiko Hiramatsu''s OVOP concept. Each of ~7,000 sub-districts
  designated a flagship product (textiles, food, crafts, herbal) for development support including marketing (OTOP Cities nationwide exhibitions), packaging design (5-star certification scheme), export
  facilitation, microfinance access via Bt 1m Village Revolving Fund. Reached ~30,000 registered OTOP products; annual sales peaked ~Bt 70bn. Programme continued under subsequent governments with varying
  intensity.

  '
enacted_by:
- thailand_thaksin_trt_2001_2006
coalition_label_at_enactment: Thai Rak Thai
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Rural-enterprise marketing and certification support; linked to Village Fund microfinance.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: OTOP certification lowered market-entry barriers for rural producers.
references:
- OTOP Thailand Promotion Committee documents 2001-2006
- Natsuda, Igusa, Wiboonpongse & Thoburn (2012), 'One Village One Product - rural development strategy in Asia'

description: 'Executive Order 11615 imposed a 90-day wage, price, and rent freeze, followed by four phases (II-IV) of controls with progressive liberalisation. Combined with closure of the gold window (ending
  Bretton Woods convertibility) and 10% import surcharge. Initial stabilisation produced a political-cycle benefit for Nixon''s 1972 re-election. Post-freeze, inflation accelerated substantially (12.3%
  by 1974) and produced shortages in controlled goods, especially beef and oil products. Phase IV ended April 1974 with most controls expired. Canonical evidence for `price_controls_produce_shortages_and_quality_degradation`.

  '

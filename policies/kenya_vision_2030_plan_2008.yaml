title: Kenya Vision 2030 Plan 2008
countries:
- KEN
timeframe:
  start: 2002
  end: 2013
description: 'Kenya Vision 2030, launched in June 2008 as the country''s long-term development blueprint to transform Kenya into a "newly industrialising middle-income country," set out economic, social
  and political pillars implemented through five-year Medium Term Plans. The plan prioritised infrastructure (Lamu port-rail-pipeline corridor, energy generation, ICT), tourism, manufacturing, agriculture
  and BPO, and was administered by the Vision 2030 Delivery Secretariat.

  '

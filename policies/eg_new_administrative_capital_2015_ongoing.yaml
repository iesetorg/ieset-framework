policy_id: eg_new_administrative_capital_2015_ongoing
status: candidate
title: New Administrative Capital mega-project
countries:
- EGY
timeframe:
  start: 2015
  end: ongoing
description: 'Flagship off-budget mega-project launched March 2015, covering ~714 square km east of Cairo. Developed by Administrative Capital for Urban Development (ACUD), owned 51% by the Armed Forces
  Land Projects Agency and 49% by the New Urban Communities Authority. Phased inauguration of government district 2021-2024 with partial ministry relocation; features include the "Iconic Tower" (tallest
  in Africa), the central business district financed with Chinese CSCEC EPC, and residential districts aimed at ~6.5m eventual population. Financed via land sales, Gulf partners, and state-bank lending
  rather than the central-government budget.

  '
enacted_by:
- egypt_sisi_second_term_2018_2024
- egypt_sisi_austerity_2016_present
coalition_label_at_enactment: Presidency / Armed Forces
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Large off-budget capex via state-linked SPV; adds to consolidated public-sector demand even if outside central-government accounts.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  rationale: Military-linked master developer; exclusive land-monetisation rights.
references:

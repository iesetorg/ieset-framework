policy_id: si_euro_adoption_2007
status: candidate
title: Slovenia euro adoption 2007
countries:
- SVN
timeframe:
  start: 2007
  end: ongoing
  enacted_date: '2007-01-01'
description: 'Slovenia adopted the euro on 1 January 2007 after Council Decision 2006/495/EC found that it fulfilled the convergence conditions and abrogated its derogation. The changeover replaced the
  tolar with the euro, moved Slovenian monetary policy into the Eurosystem, and removed exchange-rate conversion costs with euro-area trading partners.

  '
enacted_by: []
coalition_label_at_enactment: SDS-NSi-SLS-DeSUS coalition (Jansa I)
axes_moved:
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: strong
  intended: true
  rationale: Monetary-policy discretion moved from the Bank of Slovenia to the independent ECB/Eurosystem framework.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Euro adoption removed exchange-rate conversion costs and currency risk against euro-area partners.
references:

title: Colombia Free Trade Zones Law 1004 2005
countries:
- COL
timeframe:
  start: 2002
  end: 2010
description: 'Ley 1004 of 2005 under the Uribe government, restructuring Colombia''s free-trade zone (zona franca) regime to comply with WTO rules on prohibited export subsidies. Introduced a single 15%
  corporate-income-tax rate for zone users, simplified customs procedures, and authorised single-enterprise free-trade zones, attracting major manufacturing and service investments through the late 2000s.

  '
enacted_by:
- colombia_uribe_security_market_reforms_2002_2010

description: 'Presidential Decree 889 of 31 August 1995 authorised auctions in which banks loaned the government money against shares in 12 flagship natural-resource companies (Yukos, Sibneft, Norilsk Nickel,
  Lukoil, Surgutneftegas). Loans unrepaid by 1996, transferring control to oligarch insiders at fractions of market value.

  '

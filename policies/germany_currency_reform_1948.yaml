policy_id: germany_currency_reform_1948
status: candidate
title: Germany Currency Reform 1948
countries:
- DEU
timeframe:
  start: 1948
  end: 1966
description: 'The 20 June 1948 currency reform replaced the heavily inflated Reichsmark with the Deutsche Mark in the three Western occupation zones, allotting each citizen a 60 DM Kopfgeld and converting
  most accounts at punitive ratios (initially 10:1, partially revised). Designed by the Sonderstelle Geld und Kredit under Allied direction with Ludwig Erhard''s parallel deregulation of price controls,
  the reform broke the suppressed inflation, eliminated barter, and ignited the Wirtschaftswunder.

  '
enacted_by:
- germany_wirtschaftswunder_erhard_1948_1966

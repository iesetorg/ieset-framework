- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Created the Bank deutscher Länder, an autonomous issuer that was statutorily insulated from political direction.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Erhard's coincident price-decontrol decree restored competitive market price formation.
- axis: regulatory.trade_openness
  direction: +

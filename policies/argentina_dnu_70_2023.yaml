description: 'Decree of Necessity and Urgency 70/2023, signed by President Javier Milei on 20 December 2023, amended or repealed roughly 300 statutes in a single instrument — abolishing rent-control and
  shelf-life laws, deregulating supplies and pharmacy ownership, modernising the contract-of-work regime, and authorising privatisations. Issued under Article 99(3) of the Constitution, it set the deregulation
  framework while the Bases law moved through Congress.

  '

policy_id: fr_retraites_2014
status: candidate
title: Touraine pension reform — contribution-period lengthening
countries:
- FRA
timeframe:
  start: 2014
  enacted_date: '2014-01-20'
description: 'Loi n° 2014-40 du 20 janvier 2014 garantissant l''avenir et la justice du système de retraites. Extended the required contribution period for a full-rate pension from 41.5 years to 43 years,
  phased by one quarter every three years from the 1973 generation to the 1980 generation, while leaving the legal retirement age at 62 (Sarkozy 2010 level). Introduced pénibilité (arduous-work) accounts.

  '

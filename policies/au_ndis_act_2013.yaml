description: 'National Disability Insurance Scheme Act 2013 (21 Mar 2013) created individual-entitlement framework for Australians under 65 with permanent disability. Launch trials from 1 Jul 2013 in four
  sites; national roll- out from 1 Jul 2016 completed 2020. Annual cost scaled to ~A$35bn+ by 2022-23, funded partly via Medicare Levy increase and general revenue.

  '

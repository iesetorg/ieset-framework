policy_id: nl_working_time_reduction_1982_1985
status: candidate
title: Netherlands working-time reduction 40 → 38 hours (1982-1985)
countries:
- NLD
timeframe:
  start: 1982
  end: 1985
description: 'Post-Wassenaar bargaining at sectoral level reduced standard working week from 40 to approximately 38 hours 1983-1985 across most industries. Part-time employment also expanded rapidly. The
  Netherlands developed one of OECD''s highest part-time shares as consequence. Combined with wage moderation, enabled employment growth absent real wage pressure.

  '

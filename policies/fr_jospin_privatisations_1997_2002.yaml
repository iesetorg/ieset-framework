policy_id: fr_jospin_privatisations_1997_2002
status: candidate
title: Jospin Privatisations 1997 2002
countries:
- FRA
timeframe:
  start: 1997
  end: 2002
description: 'Despite Socialist control of government, the Jospin Plural Left coalition (1997-2002) privatised more state assets in value terms than any previous administration: Thomson Multimedia, France
  Télécom (partial floats from 1997), Aerospatiale-Matra (merged into EADS, 2000), Crédit Lyonnais (1999), and Air France stakes. Operations proceeded under finance-ministry decrees and parliamentary authorisation
  under the 1986 privatisation framework. The intended effect was fiscal proceeds, capital-market deepening, and European industrial consolidation — within a coalition formally committed to social objectives.

  '

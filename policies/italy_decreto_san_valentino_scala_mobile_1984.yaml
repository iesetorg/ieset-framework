  enacted_date: '1984-02-14'
description: 'Decreto-legge 14 febbraio 1984 n. 10 (converted into Law 219/1984) under Craxi government suspended three scala-mobile points. Historic decision because CGIL (PCI-linked) broke with CISL and
  UIL; PCI promoted abrogative referendum which failed June 1985. Marks the effective end of Italy''s automatic-indexation regime. Pivotal moment for the PSI-PCI split and for Italian disinflation through
  the late 1980s.

  '

policy_id: pk_imf_sba_3bn_2023
status: candidate
title: IMF Stand-By Arrangement — Pakistan $3bn (2023)
countries:
- PAK
timeframe:
  start: 2023
  end: 2024
  enacted_date: '2023-07-12'
description: 'IMF Stand-By Arrangement of $3bn over 9 months, approved 12 July 2023 by the IMF Executive Board under near-default conditions with FX reserves below two weeks of import cover. Negotiated
  by the first Shehbaz Sharif premiership (Apr 2022 - Aug 2023) and implemented across the caretaker Kakar government (Aug 2023 - Mar 2024) and second Shehbaz term. Conditionality: FY24 budget revenue and
  primary-balance floors, FX-interbank functioning restoration, Saudi + UAE + Chinese bilateral rollovers as financing assurances, power-tariff determination implementation. Bridged to the $7bn EFF September
  2024. Largest single short-duration SBA in Pakistani programme history.

  '

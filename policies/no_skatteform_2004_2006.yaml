policy_id: no_skatteform_2004_2006
status: candidate
title: Norwegian tax reform 2004-2006 (Skatteform/aksjonaermodellen)
countries:
- NOR
timeframe:
  start: 2004
  end: 2006
description: 'Comprehensive tax reform based on NOU 2003:9 (Skauge Report): reduced top marginal income-tax rates, implemented the aksjonaermodellen (shareholder model / rate-of-return allowance, RRA) that
  exempts the risk-free return on share capital from dividend tax, and aligned capital and labour marginal rates to reduce income-shifting incentives previously embedded in the 1992 dual-income system.

  '

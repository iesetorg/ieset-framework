policy_id: pe_mining_tax_regime_proposal_2021_2022
status: candidate
title: Mining Tax Regime Proposal 2021 2022
countries:
- PER
timeframe:
  start: 2021
  end: 2022
description: 'Proposal advanced by the Castillo government in 2021–2022 to overhaul Peru''s mining tax regime, including higher royalties and a windfall-style levy aimed at capturing more rent during the
  copper price upswing. The package was opposed by the mining industry and never fully enacted as Castillo''s congressional minority and political instability culminated in his December 2022 vacancy; signalling
  effects on investor expectations were nonetheless material.

  '
enacted_by:
- peru_castillo_peru_libre_2021_2022
axes_moved:
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Proposal targeted fiscal terms not market structure; competition rules in mining unchanged.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Proposed but largely unenacted higher royalty/windfall levy on mining left headline corporate tax static.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Intended use of additional rent capture was redistributive transfers to mining-region populations.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Mining-tax proposal addressed fiscal channels only; BCRP independence not in scope.

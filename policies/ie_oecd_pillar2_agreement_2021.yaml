policy_id: ie_oecd_pillar2_agreement_2021
status: candidate
title: Oecd Pillar2 Agreement 2021
countries:
- IRL
timeframe:
  start: 2020
  end: 2022
description: 'In October 2021 Ireland joined the OECD/G20 Inclusive Framework agreement on a global minimum effective corporate tax rate of 15% for in-scope multinationals (Pillar Two), and a partial reallocation
  of taxing rights for the largest groups (Pillar One). Joining the agreement required raising Ireland''s effective minimum rate above 12.5% for affected companies, a structural break with two decades of
  low-rate competition strategy.

  '

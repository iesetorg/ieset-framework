policy_id: lk_rajapaksa_tax_cuts_2019
status: candidate
title: Gotabaya Rajapaksa tax cut package (Sri Lanka 2019)
countries:
- LKA
timeframe:
  start: 2019
  end: 2022
  enacted_date: '2019-12-01'
description: 'Campaign-pledge tax package announced within weeks of Gotabaya Rajapaksa''s November 2019 presidential victory: VAT cut from 15% to 8%, abolition of the 2% Nation Building Tax, abolition of
  the Pay-As-You-Earn (PAYE) income tax, withholding-tax removal on interest, higher VAT-registration threshold (Rs 12mn to Rs 300mn/qtr), and corporate-tax rate reductions. Revenue collapse of ~2-3% of
  GDP (tax-to-GDP falling from ~12% to ~8.3% by 2021), among the sharpest peacetime revenue drops on IMF record, driving successive sovereign rating downgrades from Fitch/Moody''s/S&P through 2020-2021
  and narrowing market access ahead of the April 2022 default.

  '
enacted_by:
- srilanka_gotabaya_rajapaksa_slpp_2019_2022
coalition_label_at_enactment: Sri Lanka Podujana Peramuna (SLPP)
axes_moved:

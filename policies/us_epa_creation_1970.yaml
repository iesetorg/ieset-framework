timeframe:
  start: 1971
  end: 1974
description: 'President Nixon established the Environmental Protection Agency in December 1970 by Reorganization Plan No. 3, consolidating air, water, pesticide, radiation, and solid-waste regulatory functions
  previously dispersed across multiple federal agencies. EPA was charged with implementing landmark statutes including the Clean Air Act amendments of 1970, the Clean Water Act of 1972, and later TSCA,
  RCRA, CERCLA, and Endangered Species Act enforcement, becoming the cornerstone of modern U.S. environmental regulation.

  '

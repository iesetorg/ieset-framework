policy_id: vn_wto_accession_preparation_2001_2007
status: candidate
title: Vietnam WTO accession preparation and entry (2001-2007)
countries:
- VNM
timeframe:
  start: 2001
  end: 2007
  enacted_date: '2007-01-11'
description: 'WTO accession process initiated with working party formation 1995; bilateral-market-access negotiations concluded under Khai-Manh 2001-2006. Key bilaterals: US deal finalised May 2006 (permanent
  MFN/NTR granted by US Congress December 2006), EU concluded October 2004, China October 2004, Japan December 2005. Protocol of Accession signed 7 November 2006; National Assembly ratified 28 November
  2006; formal WTO membership 11 January 2007. Commitments included tariff reductions (average simple MFN tariff from 17.4% to 13.4%), full goods trading rights for foreign firms, services chapter (telecoms,
  banking, insurance, distribution), IPR enforcement, subsidies disciplines.

  '
enacted_by:
- vietnam_khai_manh_doi_moi_deepening_1997_2006
coalition_label_at_enactment: CPV
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: MFN tariff reductions; services market access; subsidies disciplines; full trading rights for foreign firms.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Services chapter opened telecoms, banking, distribution to foreign competition.
references:
- Protocol of Accession of the Socialist Republic of Vietnam to the WTO, 7 November 2006
- 'Abbott, Bentzen & Tarp (2009), ''Trade and Development: Lessons from Vietnam''s Past Trade Agreements'''

title: Venezuela Expropriations 2007 2015
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'During 2007-2015 the Chavez and Maduro governments nationalised a wide range of strategic and consumer-facing sectors, including telecoms (CANTV), electricity (Electricidad de Caracas), cement,
  steel (Sidor), oil-service contractors, agribusiness, and large retailers. Many takeovers were effected via decree under enabling laws (Ley Habilitante) with disputed compensation, prompting ICSID arbitration
  claims. The wave shifted productive capacity into politically managed enterprises.

  '

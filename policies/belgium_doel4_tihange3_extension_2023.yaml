policy_id: belgium_doel4_tihange3_extension_2023
status: candidate
title: Belgium Doel4 Tihange3 Extension 2023
countries:
- BEL
timeframe:
  start: 2003
  end: ongoing
description: 'Agreement signed 29 June 2023 between the De Croo federal government and operator Engie Electrabel to extend the operating life of Doel 4 and Tihange 3 reactors by ten years to 2035, partially
  reversing the 2003 phase-out timetable in response to the post-2022 European energy crisis. A joint-venture vehicle BE-NUC was established to share equity and dispatch revenue, with the state capping
  decommissioning-fund liabilities at EUR 15 billion.

  '
enacted_by:
- belgium_nuclear_phaseout_2003_2025
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Extension required revised licence conditions including new safety upgrades and waste-management terms.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: FANC re-licensing process and the BE-NUC JV imposed expanded sectoral oversight on operations.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Extension partially reversed the supply-security drag of phase-out by retaining 2 GW of dispatchable nuclear capacity.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: EUR 15 billion liability cap on decommissioning-fund obligations transferred residual risk to the state.

title: National Competition Policy (1995)
countries:
- AUS
timeframe:
  start: 1995
  enacted_date: '1995-04-11'
description: 'Following the 1993 Hilmer Report, COAG signed the Competition Principles Agreement 11 April 1995 committing the Commonwealth, States, and Territories to extend the Trade Practices Act to state-owned
  businesses and unincorporated sectors, apply competitive-neutrality principles to government businesses, separate utility natural-monopoly network elements from contestable services, and conduct legislative
  reviews of anti-competitive restrictions. Competition-payment transfers from Commonwealth to States incentivised compliance.

  '

policy_id: dk_ghetto_parallelsamfund_2018_2021
status: candidate
title: Danish parallelsamfund / 'ghetto' legislation 2018-2021
countries:
- DNK
timeframe:
  start: 2018
  end: ongoing
  enacted_date: '2018-05-17'
description: 'The May 2018 Parallelsamfundsaftalen ("Et Danmark uden parallelsamfund") and the subsequent legislative package created a statutory ghettoliste (classification of residential areas exceeding
  thresholds on ''non- Western'' residents, unemployment, education, income, and crime), imposed mandatory daycare from age one for children in those areas, established doubled-sentencing zones (''skærpet
  straf''-zoner), and required dispersed-housing targets — including demolition and reallocation of public-housing units. Enacted under the Løkke Rasmussen VLAK government; in 2021 the Frederiksen government
  renamed the categories from ''ghetto'' to ''parallelsamfund'' / ''omdannelsesområder'' without softening the substantive requirements.

  '
enacted_by:
- denmark_lokke_rasmussen_venstre_2015_2019
- denmark_frederiksen_sap_broad_2019_present
coalition_label_at_enactment: VLAK (Venstre, Liberal Alliance, Konservative) with Socialdemokratiet and Dansk Folkeparti support

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: syr_agrarian_reform_consolidation_1963_1970
status: candidate
title: Syria Ba'ath agrarian reform consolidation
countries: [SYR]
timeframe: {start: 1963, end: 1970}
description: >
  The Ba'ath regime tightened landholding ceilings, redistributed land, expanded
  peasant unions and cooperatives, and increased state involvement in input,
  credit, and procurement systems. The reforms aimed to break old landed
  elites and make the rural economy dependent on party-state institutions.
enacted_by:
  - syria_baath_assad_statist_regime_1963_2000
axes_moved:
  - axis: institutional.property_rights
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Land ceilings and redistribution weakened prior large-owner rights."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Cooperatives and state procurement limited independent rural markets."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "State credit, inputs, and support were targeted to politically organised agriculture."
references:
  - "Hinnebusch (1989), Peasant and Bureaucracy in Ba'thist Syria"
  - "Perthes (1995), The Political Economy of Syria Under Asad"

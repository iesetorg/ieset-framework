title: Thailand 20-Year National Strategy 2018-2037
countries:
- THA
timeframe:
  start: 2018
  end: 2037
  enacted_date: '2018-10-13'
description: '20-Year National Strategy Act BE 2560 (2017) and the 2018-2037 strategy document gazetted 13 October 2018 under the NCPO. The strategy binds all future governments to six strategic pillars
  (national security, competitiveness enhancement, human-capital development, social equality, green growth, and public-sector rebalancing), with 23 sub- plans. A government that fails to implement the
  strategy can be referred by the Senate to the Constitutional Court and to the National Anti-Corruption Commission. The strategy was drafted by the National Economic and Social Development Council (NESDC)
  under the supervision of a National Strategy Committee chaired by the Prime Minister.

  '

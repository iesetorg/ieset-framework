policy_id: bj_party_system_electoral_reforms_2018_2019
status: candidate
title: Benin party-system and electoral-code reforms 2018-2019
countries:
- BEN
timeframe:
  start: 2018
  end: ongoing
description: 'Benin adopted a new party charter and electoral-code changes that raised organisational and financial requirements for political parties, introduced stricter ballot-access rules, and reshaped
  legislative competition before the 2019 election. The reforms consolidated the party system on paper but also excluded or deterred major opposition forces from effective participation.

  '
enacted_by:
- benin_talon_pag_reform_state_2016_2026
scope: national
coalition_label_at_enactment: Talon reform coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Ballot-access and party-registration thresholds reduced practical political contestation and equal access to representation.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Enforcement of electoral eligibility rules placed politically salient disputes in institutions seen by opposition actors as executive-aligned.

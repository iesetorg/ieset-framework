policy_id: ng_sap_sfem_1986
status: candidate
title: Nigerian SAP and Second-Tier Foreign Exchange Market (1986)
countries:
- NGA
timeframe:
  start: 1986
  enacted_date: '1986-09-26'
description: 'Structural Adjustment Programme July 1986, with the Second-Tier Foreign Exchange Market (SFEM) launched 26 September 1986 as the centrepiece. SFEM floated a second exchange rate alongside
  the fixed official rate, with the naira devaluing from ~1.1/USD (Sep 1986) to ~4/USD (Dec 1986) and ~8/USD by 1987. Accompanied by tariff cuts, trade-licence abolition, SOE privatisation pipeline, and
  banking-sector liberalisation.

  '

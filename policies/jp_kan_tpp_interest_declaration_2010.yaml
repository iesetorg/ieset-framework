policy_id: jp_kan_tpp_interest_declaration_2010
status: candidate
title: Kan Tpp Interest Declaration 2010
countries:
- JPN
timeframe:
  start: 2010
  end: 2011
description: 'In November 2010, Prime Minister Kan announced at the Yokohama APEC Summit that Japan would begin consultations toward joining the Trans-Pacific Partnership negotiations, framed around the
  New Growth Strategy and an "Opening Country" agenda. The interest declaration broke the prior LDP-era reticence on multilateral high-standard FTAs and triggered intense domestic agriculture-protection
  debates that ran through subsequent governments.

  '

description: 'Chad entered a new IMF Extended Credit Facility in December 2024 after the political transition and earlier debt-treatment process. The arrangement supports fiscal consolidation, non-oil revenue
  mobilisation, public-financial management, control of wage and subsidy pressures, debt transparency, and governance reforms while seeking to preserve priority poverty-reducing spending.

  '

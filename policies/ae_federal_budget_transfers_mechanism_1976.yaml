policy_id: ae_federal_budget_transfers_mechanism_1976
status: candidate
title: UAE federal-emirate budget transfers mechanism 1976+
countries:
- ARE
timeframe:
  start: 1976
  end: ongoing
description: 'Institutionalisation of the federal budget from 1976 onwards — Abu Dhabi emirate-level oil rent financed ~90% of federal expenditure (military, education, health, infrastructure) on behalf
  of the seven emirates. Federal transfers smoothed resource disparity between oil-rich (Abu Dhabi) and oil-poor (Ras al Khaimah, Fujairah) emirates. The informal but durable fiscal compact sustained the
  federation.

  '
enacted_by:
- uae_zayed_consolidation_1976_1990

  direction: +
  magnitude: strong
  rationale: Federal spending footprint financed by emirate-level oil rent.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: Cross-emirate fiscal transfers to poorer emirates.
references:
- UAE Federal Budget 1976 and successive annual budgets

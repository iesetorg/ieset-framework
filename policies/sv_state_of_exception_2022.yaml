status: candidate
title: Régimen de excepción — continuous state of exception (Decreto 333, 27 Mar 2022)
countries:
- SLV
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-03-27'
description: 'Declared 27 Mar 2022 by the Legislative Assembly at Bukele''s request (Decreto Legislativo N° 333) following the 26-30 Mar 2022 gang massacre of 87 civilians over a weekend — the deadliest
  spate of homicides in El Salvador''s post-civil-war history. The decree suspended constitutional guarantees in Articles 7 (free association), 12 (arrest rights — due-process within 72 hours of detention),
  13 (habeas corpus), and 24 (private-communications inviolability). The régimen has been renewed monthly without interruption since Apr 2022. Under the régimen, ~85,000 alleged gang-affiliates have been
  detained by Jun 2024 (state figures) — roughly 1.3% of the population and ~7.5% of working-age men. Human Rights Watch, Cristosal, Amnesty International, and the UN Office of the High Commissioner for
  Human Rights document mass arbitrary detention, ~300+ deaths in state custody, torture allegations, and wholesale denial of judicial review. MS-13 and Barrio 18 organisational capacity was substantially
  degraded; homicide rate fell from 17.6/100k (2021) to 2.4/100k (2023).

  '

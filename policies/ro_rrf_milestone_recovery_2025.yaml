# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ro_rrf_milestone_recovery_2025
status: candidate
title: Romania RRF milestone recovery and reform-compliance drive (2025)
countries:
- ROU
timeframe:
  start: 2025
  end: ongoing
description: >
  Programme to recover delayed EU Recovery and Resilience Facility milestones and
  payment requests by accelerating fiscal, pension, governance, procurement, and
  investment commitments. The policy links EU funding access to domestic reforms,
  turns RRF disbursement into a governance constraint, and supports public
  investment while subjecting that spending to EU milestone conditionality.
enacted_by:
- romania_dan_bolojan_reformist_2025_present
coalition_label_at_enactment: Dan-Bolojan reform coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Milestone compliance ties funding to procurement, governance, pension, and anti-corruption reforms.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: RRF milestones include safeguards around judicial reform and special-pension changes.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Unblocked RRF resources finance public investment, though conditionality constrains recurrent spending.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: EU single-market and RRF compliance reduce institutional frictions with EU partners at the margin.
linked_hypotheses:
- rule_of_law_institutional_growth
- judicial_independence_growth_persistence
- rule_of_law_market_reform_complementarity
references:
- European Commission Romania Recovery and Resilience Facility implementation reports, 2025
- Romanian government RRF milestone recovery programme materials
notes: Created to materialise a declared policy on romania_dan_bolojan_reformist_2025_present.

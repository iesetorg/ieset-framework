# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: india_planning_commission_establishment_1950
status: candidate
title: Planning Commission establishment (India 1950)
countries: [IND]
timeframe:
  start: 1950
  end: 2014
  enacted_date: "1950-03-15"
description: >
  A Union cabinet resolution of 15 March 1950 created the Planning
  Commission to assess national resources, formulate Five-Year Plans,
  recommend investment priorities, and coordinate development strategy
  between the centre and states. Though not a constitutional body, it
  became the principal institutional nerve centre for plan-based public
  investment and the policy logic later associated with India's
  developmental and licensing state until its replacement by NITI Aayog
  in 2015.
enacted_by:
  - india_constitutional_founding_mixed_economy_1947_1951
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The commission institutionalised central planning over public investment and development expenditure."
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Plan targets and allocation priorities strengthened state gatekeeping over industrial expansion ahead of the full licence-raj apparatus."
references:
  - "Cabinet Resolution establishing the Planning Commission, 15 March 1950"
  - "Planning Commission of India - historical note"
  - "Panagariya (2024), The Nehru-Era Economic History and Thought and Their Lasting Impact"

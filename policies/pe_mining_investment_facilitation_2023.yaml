policy_id: pe_mining_investment_facilitation_2023
status: candidate
title: Mining Investment Facilitation 2023
countries:
- PER
timeframe:
  start: 2022
  end: ongoing
description: 'Boluarte-era package of decrees and ministerial resolutions in 2023 designed to accelerate mining permitting and unblock stalled large-scale projects after the social conflict shocks of 2022–2023.
  Measures shortened environmental and social-license review timelines, established fast-track windows for prior consultation, and signalled a return to investment-facilitation policy after the more redistribution-oriented
  Castillo period.

  '
enacted_by:
- peru_boluarte_post_castillo_2022_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Faster permitting lowered entry barriers and accelerated market entry for new mining projects.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Compressed EIA timelines and consultation simplifications reduced effective environmental review depth.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Anticipated canon-minero royalty redistribution to communities and regions accompanied facilitation measures.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Mining facilitation operated through executive decree without affecting BCRP statutory autonomy.

policy_id: pk_7th_nfc_award_2009
status: candidate
title: Pakistan 7th National Finance Commission Award 2009
countries:
- PAK
timeframe:
  start: 2010
  enacted_date: '2009-12-30'
description: '7th National Finance Commission Award signed 30 December 2009 at Gwadar, effective FY2010-11 through FY2014-15 (extended several times in absence of an 8th Award). Raised provincial share
  of the divisible federal resource pool from 47.5% to 57.5% (first year) moving toward 58% by FY2014-15. Introduced multi-criteria horizontal distribution formula replacing pure population: population
  (82%), poverty/backwardness (10.3%), revenue generation/collection (5%), inverse population density (2.7%). Recognised Khyber Pakhtunkhwa 1% war-on-terror cost share. Politically historic as consensus
  award reached after 12-year NFC deadlock. Combined with 18th Amendment to produce a substantial federal-to-provincial fiscal shift that structurally widened federal primary-deficit pressure.

  '

policy_id: australia_super_choice_2005
status: candidate
title: Australia Super Choice 2005
countries:
- AUS
timeframe:
  start: 1992
  end: ongoing
description: 'Superannuation Legislation Amendment (Choice of Superannuation Funds) Act 2004, in force from 1 July 2005 under the Howard government, extended employee right-of-choice over their default
  superannuation fund. The reform broke union-coalition default arrangements over Award funds, introduced portability requirements, and increased competitive pressure across the retail and industry-fund
  segments of the SG-driven retirement-savings system.

  '
enacted_by:
- australia_keating_alp_1991_1996
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Member choice and consolidation reduced fees, increasing private balances and easing pension liability.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher net retirement balances lifted the base for the 15% concessional super-earnings tax.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Member choice opened default-fund market to competition, eroding closed-shop Award arrangements.

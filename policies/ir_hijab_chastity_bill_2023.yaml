description: 'Majles passed the Hijab and Chastity Bill on a three-year trial basis 20 Sep 2023 in closed session, escalating penalties for non-compliance with hijab rules to include fines up to ~USD 8,500,
  travel bans, business-licence revocation for non-enforcing merchants, internet- service restriction, and prison terms for "organised" non-compliance. Guardian Council review and implementation suspended
  repeatedly under Pezeshkian government 2024-2025 amid political contestation. Passed in the wake of the Women-Life-Freedom protests following Mahsa Amini''s death in custody 16 Sep 2022.

  '

description: 'Fiscal-accounting practice 2012-2014 whereby Treasury delayed mandatory reimbursements to Caixa Econômica Federal, Banco do Brasil, BNDES, FGTS, FAT for programme expenditures (Bolsa Família,
  subsidised credit, PIS- Pasep) — effectively short-term borrowing from controlled banks outside Lei de Responsabilidade Fiscal. TCU Acórdão 1.464/2015 ruled practice illegal and rejected Dilma''s 2014
  accounts (6 Oct 2015), furnishing formal ground for impeachment. Cumulative delayed stock ~BRL 40-60bn.

  '

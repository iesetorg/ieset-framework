description: 'The Reduction of Deficit and Limitation of Budgetary Expenditure Law, 1992 set a declining annual ceiling on the central-government deficit (from 6.2% of GDP in 1992 to 2.2% by 1995). It institutionalised
  fiscal discipline post-1985-stabilisation and constrained Rabin-era spending choices within a rule-based framework.

  '

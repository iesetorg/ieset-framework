policy_id: iran_nationalisations_1979_1982
status: candidate
title: Iran Nationalisations 1979 1982
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'In June 1979 the Revolutionary Council nationalised all private banks and insurance companies, followed by the August 1979 Law for the Protection and Development of Iranian Industries which
  transferred large manufacturing firms — typically those owned by the 51 families closest to the deposed monarchy — to state ownership. Article 44 of the 1979 constitution then codified state, cooperative
  and private sectors as separate spheres, with heavy industry, foreign trade, banking and major utilities reserved to public ownership.

  '

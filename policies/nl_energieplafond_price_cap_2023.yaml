policy_id: nl_energieplafond_price_cap_2023
status: candidate
title: Netherlands energieplafond (energy price cap) 2023
countries:
- NLD
timeframe:
  start: 2023
  end: 2023
  enacted_date: '2023-01-01'
description: 'One-year consumer energy price cap introduced in response to the 2022 Russia-gas-shock. Capped gas at EUR 1.45/m3 up to 1,200 m3, electricity at EUR 0.40/kWh up to 2,900 kWh; state reimbursed
  suppliers for the gap against market price. Gross cost around EUR 5bn. Paired with windfall levy on fossil producers (cijns verhoging + solidariteitsheffing implementing the EU Council Regulation 2022/1854).

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Administrative price cap on consumer energy contracts for one year.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Gross subsidy ~EUR 5bn channelled via suppliers to household consumers.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Windfall levy on fossil-producer profits above reference margin.
references:

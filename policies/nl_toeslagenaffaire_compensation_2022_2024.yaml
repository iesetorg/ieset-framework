policy_id: nl_toeslagenaffaire_compensation_2022_2024
status: candidate
title: Netherlands Toeslagenaffaire compensation programme 2022-2024
countries:
- NLD
timeframe:
  start: 2022
  end: ongoing
description: 'Rutte IV compensation programme for the childcare-benefit scandal. The Uitvoeringsorganisatie Herstel Toeslagen (UHT) paid an initial EUR 30,000 per qualifying family plus case-by-case compensation
  for material and immaterial damages, debt remission, and a separate scheme for affected children. ~62,000 households registered; envelope grew to well above EUR 5bn. Execution was slow — by 2024 a majority
  of integral assessments remained incomplete, prompting multiple parliamentary debates and NSC demands in 2024 coalition negotiations.

  '
enacted_by:
- netherlands_rutte_iv_2022_2024
coalition_label_at_enactment: VVD-D66-CDA-ChristenUnie
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Compensation envelope above EUR 5bn in targeted one-off transfers.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: State acknowledgement and restoration after documented ethnic-profiling and procedural-rights violations by tax administration.

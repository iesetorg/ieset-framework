policy_id: eg_hayah_karima_2019
status: candidate
title: Decent Life ('Hayah Karima') rural-development programme
countries:
- EGY
timeframe:
  start: 2019
  end: ongoing
description: 'Multi-year rural-upgrading programme launched January 2019 and formalised as a presidential initiative July 2019, targeting ~4,500 villages housing ~58m inhabitants. Covers drinking water,
  sewerage, housing replacement of informal units, schools, health units, natural-gas connections, and roads. Headline budget ~700bn EGP over the first phase (2021-2024), executed primarily by Armed Forces
  Engineering Authority contractors and state agencies, with financing from state banks, the Long Live Egypt Fund, and IFI co-financing (World Bank, AIIB, AfDB).

  '
enacted_by:
- egypt_sisi_second_term_2018_2024
coalition_label_at_enactment: Presidency / Mostaqbal Watan
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Large rural infrastructure capex; on- and off-budget blend.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  rationale: In-kind transfers via upgraded utilities; not cash-transfer proper.
references:

description: 'Contrat première embauche (CPE) under Loi 2006-396 of 31 March 2006 created a first-employment contract for under-26s in firms with 20+ employees featuring a two-year "consolidation period"
  during which dismissal without cause was permitted. Triggered nationwide protests March-April 2006 (1-3 million demonstrators at peaks). Chirac promulgated the law but announced 10 April 2006 that its
  key CPE article would be replaced — effectively withdrawn. Substituted with a youth-employment aid scheme.

  '

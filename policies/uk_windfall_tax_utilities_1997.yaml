policy_id: uk_windfall_tax_utilities_1997
status: candidate
title: Windfall tax on privatised utilities
countries:
- GBR
timeframe:
  start: 1997
  enacted_date: '1997-07-02'
description: 'One-off 23% tax on the difference between privatisation value and market value of privatised utilities (water, electricity, BT, BAA, Railtrack). Raised approximately £5.2bn. Proceeds earmarked
  for the New Deal welfare-to-work programme. Legally a one-off charge not a permanent tax; designed to recoup value from Thatcher-era privatisations seen as under-priced.

  '

description: 'Construction of the 340,000 bpd Olmeca refinery at Dos Bocas, Paraíso, Tabasco — AMLO''s home state. Announced May 2019, executed directly by the Energy Ministry after private-EPC bids were
  rejected as too expensive. Final cost ~USD 17-20bn against initial USD 8bn budget; inauguration July 2022 with mechanical completion stretched into 2024. Central to the "energy sovereignty" frame — domestic
  refining to reduce gasoline imports from the US Gulf Coast.


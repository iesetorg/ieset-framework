policy_id: th_finance_company_suspensions_1997
status: candidate
title: Thailand finance-company suspensions (1997)
countries:
- THA
timeframe:
  start: 1997
  end: 1997
  enacted_date: '1997-06-27'
description: 'Sequence of finance-company suspensions: 16 finance companies suspended 27 June 1997 (ahead of Baht float) as boards placed under direction of BoT; 42 additional suspended 5 August 1997 bringing
  total to 58 of 91 (63%) — most of the Thai non-bank finance sector. Finance One (Thailand''s largest) had collapsed earlier 27 May 1997. Financial Sector Restructuring Authority (FRA) established October
  1997 to manage disposal of suspended- institution assets; over 1998 FRA auctioned ~Bt 800bn of loan assets. Bank-of-Thailand-Financial Institution Development Fund (FIDF) ultimately absorbed losses via
  bond issuance ~Bt 1.4tn.

  '
enacted_by:
- thailand_chavalit_nap_1996_1997
- thailand_chuan_ii_democrat_1997_2001
coalition_label_at_enactment: NAP / Democrat coalition
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Mass suspension of finance companies; FRA auction-disposal framework tightened sectoral supervision.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: FIDF bond absorption ~Bt 1.4tn crystallised as public debt.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Shareholder wipeouts and depositor haircuts in suspended finance companies.

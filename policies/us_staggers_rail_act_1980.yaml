policy_id: us_staggers_rail_act_1980
status: candidate
title: Staggers Rail Act 1980
countries:
- USA
timeframe:
  start: 1977
  end: 1981
description: 'The Staggers Rail Act of 14 October 1980, signed by President Carter, partially deregulated the US freight-rail industry by removing collective ratemaking, allowing confidential contract rates,
  giving the Interstate Commerce Commission narrower authority to suspend rates, and easing line abandonment and merger procedures. The intended effect was to revive the financially distressed freight-rail
  industry — bankruptcy of Penn Central in 1970 had triggered the Conrail reorganisation — by allowing market-determined rates and route restructuring, while preserving oversight where carriers held market
  dominance. The Act capped a series of late-1970s deregulation laws (airlines 1978, trucking 1980, banks 1980).

  '

policy_id: ca_middle_bracket_tax_cut_2025
status: candidate
title: Canada — Lowest personal income tax bracket rate cut 15% to 14% (2025)
countries:
- CAN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-01'
description: 'Carney government campaign commitment and post-election measure reducing the lowest federal personal income tax bracket rate from 15% to 14% effective 1 July 2025, with full-year implementation
  from 2026. The bracket covers taxable income up to roughly C$57,375 (indexed). Because all filers benefit on the first dollar of taxable income above the basic personal amount, the absolute dollar benefit
  is largest in mid-to-upper brackets in dollar terms but proportionally largest for lower-income filers. Department of Finance estimated cost at roughly C$6B per year at full phase-in. Non-refundable tax
  credits tied to the lowest bracket rate (e.g. basic personal amount, age credit) were unchanged, preserving the credit value calculation separately.

  '

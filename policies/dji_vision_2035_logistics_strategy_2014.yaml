policy_id: dji_vision_2035_logistics_strategy_2014
status: candidate
title: Djibouti Vision 2035 logistics strategy 2014
countries:
- DJI
timeframe:
  start: 2014
  end: 2035
description: 'Djibouti adopted Vision Djibouti 2035 as the long-term strategy for using its Red Sea location, ports, railway links, logistics platforms, and free-zone infrastructure as the core of national
  development. The strategy backed a large state-led investment cycle in ports, the Ethiopia-Djibouti railway corridor, transport facilities, and trade-services infrastructure.

  '
enacted_by:
- djibouti_guelleh_vision2035_logistics_state_2014_present
scope: national
coalition_label_at_enactment: UMP Guelleh government
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: Vision 2035 justified a large public and public-enterprise infrastructure investment pipeline.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: State finance and guarantees were concentrated in logistics, port, rail, and trade-service sectors.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: The strategy expanded trade corridors, re-export platforms, and free-zone-linked logistics capacity.
references:

policy_id: france_matignon_agreements_1936
status: candidate
title: France Matignon Agreements 1936
countries: [FRA]
timeframe:
  start: 1936
  end: 1936
  enacted_date: "1936-06-07"
description: >
  The Matignon Agreements, concluded on the night of 7-8 June 1936 under
  Leon Blum's arbitration, converted the strike wave that followed the
  Popular Front victory into a national labour settlement. Employers
  recognised trade-union rights, accepted elected worker delegates,
  committed to collective-bargaining agreements, and granted substantial
  wage increases while the CGT urged a return to work. The accords did not
  abolish capitalism or nationalise industry, but they decisively changed
  the legal and bargaining position of organised labour in the French
  workplace.
enacted_by:
  - france_popular_front_1936_1938
axes_moved:
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Collective bargaining, worker delegates, and recognised union rights reduced employer discretion in labour relations."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The agreement formalised nationwide rules for representation and dispute settlement instead of leaving the strike settlement informal."
references:
  - "Accords Matignon, 7 juin 1936"
  - "Larousse, accords Matignon (7 juin 1936)"

policy_id: uk_vat_cut_gfc_2008_2009
status: candidate
title: UK temporary VAT cut 17.5% to 15%
countries:
- GBR
timeframe:
  start: 2008
  end: 2010
  enacted_date: '2008-12-01'
description: 'Temporary reduction of the standard rate of VAT from 17.5% to 15% from 1 December 2008 to 31 December 2009 announced in the Pre-Budget Report of 24 November 2008 as part of the Brown-Darling
  fiscal stimulus package. Cost to the Exchequer ~£12.4bn over 13 months; followed by return to 17.5% and then rise to 20% under the coalition in January 2011. A rare case of a controlled consumption-tax-rate
  experiment in a developed economy during recession.

  '
enacted_by:
- uk_brown_labour_2007_2010
coalition_label_at_enactment: Labour
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Temporary consumption-tax cut of ~£12bn, ~0.8% GDP.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: VAT is regressive; a cut is modestly progressive in incidence.
references:
- HM Treasury Pre-Budget Report, 24 Nov 2008
- IFS, The temporary cut in the rate of VAT (2010)

policy_id: pse_monetary_authority_banking_framework_1997_2010
status: candidate
title: Palestine Monetary Authority and banking-law framework 1997-2010
countries:
- PSE
timeframe:
  start: 1997
  end: ongoing
description: 'The Palestine Monetary Authority law and later banking legislation created a central-bank-like regulator for banks, payments, reserves, licensing, and prudential supervision, even though the
  PA does not issue its own national currency. The framework gave the PMA a rule-bound role in financial-sector oversight and payment-system development under the constraints of Israeli shekel use, dollar
  and dinar circulation, and non-sovereign monetary policy.

  '
enacted_by:
- palestinian_authority_limited_self_government_1994_present
coalition_label_at_enactment: Palestinian Authority financial-sector institution-building
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The PMA gained autonomous supervisory and payment-system functions but no currency-issuance power.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  intended: true
  rationale: Axis semantic '+' is tighter financial regulation; banking law and PMA rules strengthened prudential supervision.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Licensing and supervision were moved into a statutory financial-regulatory framework.
references:
- Palestine Monetary Authority Law No. 2 of 1997
- Palestine Banking Law No. 9 of 2010
- IMF and World Bank West Bank and Gaza financial-sector assessments
notes: The policy is financial-regulatory institution-building under monetary non-sovereignty.

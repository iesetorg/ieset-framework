policy_id: colombia_oil_gas_exploration_moratorium_2022
status: candidate
title: Colombia Oil Gas Exploration Moratorium 2022
countries:
- COL
timeframe:
  start: 2022
  end: ongoing
description: 'Petro-government policy decision announced in 2022-23 to halt issuance of new oil and gas exploration contracts and not renew suspended ones, while honouring existing concessions. Implemented
  administratively through the National Hydrocarbons Agency (ANH) under the energy-transition agenda; aimed at decoupling Colombia''s fiscal and export base from fossil-fuel extraction over the medium term.

  '

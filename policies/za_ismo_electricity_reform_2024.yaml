policy_id: za_ismo_electricity_reform_2024
status: candidate
title: Electricity Regulation Amendment Act / Independent System and Market Operator (South Africa, 2024)
countries:
- ZAF
timeframe:
  start: 2024
  enacted_date: '2024-08-16'
description: 'The Electricity Regulation Amendment Act, signed August 2024, establishes a competitive electricity market in South Africa with an Independent Transmission System and Market Operator separated
  from Eskom, open access to the grid, and a trading platform enabling bilateral power-purchase agreements. Together with the July 2022 removal of the embedded-generation licensing threshold and the separate
  incorporation of the National Transmission Company South Africa (NTCSA, licensed 2023), the reform unbundles the vertically-integrated Eskom monopoly.

  '
enacted_by:
- southafrica_ramaphosa_anc_2018_present
coalition_label_at_enactment: ANC (pre-GNU)
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  rationale: Vertical unbundling, open-access trading, licensing threshold scrapped.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Creates wholesale electricity market with multiple generators and traders.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  rationale: Private generation unlocked; grid access formalised.

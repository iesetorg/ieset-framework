policy_id: canada_cusfta_1988
status: candidate
title: Canada Cusfta 1988
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'The Canada–United States Free Trade Agreement (CUSFTA), signed in October 1987 by Mulroney and Reagan and entered into force on 1 January 1989, eliminated tariffs on most bilateral trade over
  a ten-year phase-in, established a Chapter 19 binational dispute-settlement panel, and addressed services and investment rules. Politically validated by the 1988 federal election ("free-trade election"),
  CUSFTA became the template for NAFTA in 1994 and was the foundational policy of Canada''s late-20th-century market-liberal turn.

  '

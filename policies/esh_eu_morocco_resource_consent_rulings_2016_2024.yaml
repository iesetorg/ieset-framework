policy_id: esh_eu_morocco_resource_consent_rulings_2016_2024
status: candidate
title: EU-Morocco Western Sahara consent and resource-treatment rulings
countries:
  - ESH
timeframe:
  start: 2016
  end: ongoing
description: >
  The Court of Justice of the European Union developed a line of Western
  Sahara-related rulings on EU-Morocco agreements, agricultural origin, fisheries,
  and resource treatment. The rulings treated Western Sahara as distinct from
  Morocco for the relevant EU-law questions, required consent of the people of
  Western Sahara for agreements applying to the territory or adjacent waters, and
  required Western Sahara rather than Morocco to be used as the origin indication
  for covered agricultural goods harvested there. This is coded narrowly as
  external legal/economic treatment of Western Sahara resources and trade, not as
  a sovereignty determination.
scope: supranational
enacted_by:
  - western_sahara_contested_status_self_determination_process_1991_present
coalition_label_at_enactment: "European Union institutions and Court of Justice of the European Union"
axes_moved:
  - axis: institutional.rule_of_law
    direction: +
    magnitude: moderate
    intended: true
    rationale: "CJEU rulings imposed distinct-status, consent, and origin-labelling legal constraints on EU treatment of Western Sahara goods, waters, and resources."
  - axis: regulatory.trade_openness
    direction: mixed
    magnitude: moderate
    intended: true
    rationale: "EU-Morocco agreements attempted preferential market/resource access, while the rulings annulled or constrained application to Western Sahara absent legally sufficient consent and treatment."
  - axis: regulatory.sectoral_licensing
    direction: +
    magnitude: weak
    intended: true
    rationale: "Fisheries and agricultural-resource access became subject to additional consent, benefit, and origin conditions rather than ordinary Morocco agreement coverage."
references:
  - "Court of Justice of the European Union, Press Release No 146/16, Council v Front Polisario, C-104/16 P, 21 December 2016"
  - "Court of Justice of the European Union, Press Release No 21/18, Western Sahara Campaign UK, C-266/16, 27 February 2018"
  - "Court of Justice of the European Union, Press Release No 170/24, Joined Cases C-778/21 P, C-798/21 P, C-779/21 P and C-799/21 P, 4 October 2024, https://curia.europa.eu/jcms/upload/docs/application/pdf/2024-10/cp240170en.pdf"
  - "Court of Justice of the European Union, Press Release No 169/24, Confédération paysanne, C-399/22, 4 October 2024, https://curia.europa.eu/jcms/upload/docs/application/pdf/2024-10/cp240169en.pdf"
notes: "External legal/economic treatment only. The coding does not take a position on sovereignty, representation, or final status."

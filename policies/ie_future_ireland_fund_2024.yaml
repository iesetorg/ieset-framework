policy_id: ie_future_ireland_fund_2024
status: candidate
title: Future Ireland Fund 2024
countries:
- IRL
timeframe:
  start: 2022
  end: 2024
description: 'Established by the Future Ireland Fund and Infrastructure, Climate and Nature Fund Act 2024, the Future Ireland Fund is a sovereign wealth-style vehicle managed by the NTMA, capitalised by
  transfers calibrated against windfall corporation-tax receipts. Its purpose is to pre-fund anticipated demographic and climate-related expenditure pressures in the 2030s rather than spend current surpluses
  through the budget cycle.

  '
enacted_by:
- ireland_varadkar_fg_2022_2024
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory pre-funding contributions count as general-government expenditure flows.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Capitalisation explicitly indexed to windfall corporation-tax receipts under Pillar Two.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Designed to lock in financing for future ageing-related transfers (pensions, long-term care).
- axis: regulatory.labour_market_flexibility
  direction: '-'

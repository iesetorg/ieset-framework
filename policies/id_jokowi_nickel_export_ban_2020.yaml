policy_id: id_jokowi_nickel_export_ban_2020
status: candidate
title: Jokowi nickel ore export ban 2020
countries:
- IDN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-01-01'
description: 'Permen ESDM 11/2019 brought forward the nickel-ore export ban to 1 January 2020, two years ahead of the 2022 schedule set in the 2017 partial-relaxation regulation. Triggered a WTO dispute
  (EU v Indonesia, DS592, Indonesia lost at panel stage Dec 2022), drove Chinese stainless-steel and EV-battery groups (Tsingshan, CATL, Huayou) to build ~USD 30bn of smelter and HPAL capacity in Morowali,
  Weda Bay, and Konawe, and lifted Indonesia''s share of global refined-nickel supply from ~23% (2019) to ~52% (2023). Extended by bauxite export ban June 2023 and copper-concentrate restrictions.

  '
enacted_by:
- indonesia_jokowi_pdip_2014_2024
coalition_label_at_enactment: PDI-P-led KIM+ super-coalition
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Outright ban on nickel-ore export.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: Below-world-price ore feedstock is a de facto subsidy to domestic smelter operators, plus tax holidays for smelter FDI.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: Licensing gating of smelter construction and ore offtake.
references:
- Permen ESDM No. 11 Tahun 2019
- WTO DS592 Panel Report, 30 November 2022
- IEA (2024), 'Global Critical Minerals Outlook'

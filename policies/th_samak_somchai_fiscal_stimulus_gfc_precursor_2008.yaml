title: Samak Somchai Fiscal Stimulus Gfc Precursor 2008
countries:
- THA
timeframe:
  start: 2008
  end: 2008
description: 'Faced with surging oil and food prices and the leading edge of the Global Financial Crisis, the Samak and Somchai PPP governments rolled out cost-of-living relief measures in mid-to-late 2008
  including six-month diesel-tax cuts, free public transport and tap-water schemes for low-income households, and excise rebates. The package preceded the larger Abhisit-era fiscal stimulus and was financed
  via supplementary budget reallocations.

  '

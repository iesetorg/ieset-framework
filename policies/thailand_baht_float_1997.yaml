policy_id: thailand_baht_float_1997
status: candidate
title: Thailand Baht Float 1997
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'On 2 July 1997 the Bank of Thailand abandoned the de facto US dollar peg and adopted a managed-float exchange rate after exhausting reserves defending the basket peg against speculative attack.
  The baht depreciated by roughly 50 percent within months, exposing dollar-denominated foreign liabilities of Thai banks and corporates and triggering the Asian Financial Crisis. The float marked the starting
  point of Thailand''s IMF programme and structural reform agenda.

  '
enacted_by:
- thailand_asian_crisis_and_recovery_1997_2001
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Float reorganised exchange-rate regulation toward market-determined pricing.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Move severed BOT's peg-defense burden, enabling autonomous monetary policy.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Crisis triggered emergency spending and bank-recapitalisation outlays.
- axis: fiscal.transfer_expansion
  direction: +

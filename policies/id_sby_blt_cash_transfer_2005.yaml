policy_id: id_sby_blt_cash_transfer_2005
status: candidate
title: Bantuan Langsung Tunai (BLT) unconditional cash transfer 2005
countries:
- IDN
timeframe:
  start: 2005
  end: 2009
  enacted_date: '2005-10-01'
description: 'Direct unconditional cash transfer programme paying ~Rp 100,000/month to the poorest ~19 million households (~35% of the population) as a compensatory mechanism for the October 2005 fuel-price
  hike. Administered through Indonesia''s postal network using targeting lists assembled by BPS. Repeated for the 2008 fuel hike. Provided the architectural template for the later PKH conditional cash transfer
  and BPJS Kesehatan health insurance.

  '
enacted_by:
- indonesia_sby_demokrat_2004_2014
- indonesia_reformasi_1998_present
coalition_label_at_enactment: Demokrat-led rainbow coalition
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: First nationwide near-universal cash-transfer programme in Indonesia, ~0.7% of GDP at peak.
references:
- 'Bazzi, Sumarto & Suryahadi (2015), ''It''s All in the Timing: Cash Transfers and Consumption Smoothing in a Developing Country'', JDE'
- 'Alatas et al. (2012), ''Targeting the Poor: Evidence from a Field Experiment in Indonesia'', AER'

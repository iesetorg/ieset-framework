policy_id: pt_irs_jovem_expansion_2024
status: candidate
title: Portugal IRS Jovem expansion (OE2025)
countries:
- PRT
timeframe:
  start: 2024
  enacted_date: '2024-12-30'
description: 'Montenegro AD government''s headline fiscal content in the 2025 State Budget (Lei 45/2024, approved by Assembleia da República on 29 November 2024 with PS abstention). Expanded the IRS Jovem
  youth income-tax relief introduced by Costa''s OE2024: full exemption in the first year of labour income after eligibility, followed by a progressively tapering relief (75% → 50% → 25%) across years 2-10,
  with eligibility extended up to age 35. Intended to address youth emigration and housing-affordability pressure. Combined with middle-bracket IRS rate reductions in the main schedule. Budget-cost estimate
  ~€645m on 2025 basis; revenue offsets limited to growth-feedback assumptions.

  '
enacted_by:
- portugal_montenegro_ad_2024_present
coalition_label_at_enactment: AD (PSD+CDS-PP+PPM) minority with PS abstention
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  rationale: Age-targeted exemption adds progressivity at the bottom of the earnings distribution for the under-35 cohort; middle-bracket rate cuts partially offset by flattening the mid-schedule.
  intended: true
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  rationale: Revenue-forgone relief treated as tax expenditure in Portuguese fiscal accounting; increases structural revenue loss ~0.2% GDP.
  intended: false
references:
- Lei 45/2024, 30 December 2024 (Orçamento do Estado para 2025)
- Conselho das Finanças Públicas, Análise do OE2025
- Autoridade Tributária, IRS Jovem technical note

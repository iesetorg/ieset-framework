description: 'Italy''s Recovery and Resilience Plan under NGEU, €191.5bn envelope (€68.9bn grants + €122.6bn loans) — the largest national allocation across the EU — plus €30.6bn from the complementary
  Fondo Complementare funded by national resources. Six missions: (1) digitalisation, innovation, competitiveness and culture (€40.3bn); (2) green revolution and ecological transition (€59.5bn); (3) infrastructure
  for sustainable mobility (€25.4bn); (4) education and research (€30.9bn); (5) inclusion and cohesion (€19.9bn); (6) health (€15.6bn). Disbursement milestone-linked: 527 original milestones and targets
  (revised to 621 after 2023 renegotiation under Meloni adding REPowerEU chapter). EU Council approved July 2021; six instalments disbursed 2022-2025 totalling ~€122bn by Q1 2025. Institutional structure:
  central cabina di regia at Palazzo Chigi; Corte dei Conti audit role; Unità di Missione in each ministry. Implementation bottleneck: local capacity (comuni, province) underdelivering against schedule;
  construction-input inflation 2022-2023 forced re-costing.

  '

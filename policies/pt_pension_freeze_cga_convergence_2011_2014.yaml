description: 'Under Troika adjustment, the Passos Coelho government froze pension revaluation and accelerated convergence of the public-sector Caixa Geral de Aposentações (CGA) regime with the general Segurança
  Social system. Enacted via successive State Budget Laws (OE 2012-2014) and special contributions (CES) on higher pensions, the package targeted the long-run actuarial gap and short-term primary deficit.

  '

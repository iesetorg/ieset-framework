policy_id: singapore_edb_export_industrialisation_1961
status: candidate
title: Singapore EDB export industrialisation, 1961
countries:
- SGP
timeframe:
  start: 1961
  end: 1990
description: Singapore created the Economic Development Board in 1961 to coordinate industrial
  estates, investment promotion, tax incentives, skills support, and multinational manufacturing
  attraction. Under Lee Kuan Yew's government after independence, the EDB became the central institution
  for export-oriented industrialisation rather than import-substitution autarky.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: EDB strategy intentionally courted export manufacturers and foreign investors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Tax incentives, industrial estates, and targeted promotion supported selected sectors.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Foreign-investor guarantees and commercial-law credibility strengthened investment
    security.

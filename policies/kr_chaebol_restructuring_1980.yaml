policy_id: kr_chaebol_restructuring_1980
status: candidate
title: Chaebol heavy-industry restructuring (South Korea 1980)
countries:
- KOR
timeframe:
  start: 1980
  end: 1982
description: 'Industrial restructuring programme August 1980 consolidated overlapping chaebol investments in heavy and chemical industries — automobile industry halved (Hyundai and Kia/Daewoo only), power-generation
  equipment allocated to Hyundai, heavy electrical to Samsung, naval diesel engines to Ssangyong, copper-smelting to LG. Rationalised the HCI-Drive overcapacity inherited from late Park era; reinforced
  chaebol dominance with state-approved sectoral allocation.

  '
enacted_by:
- skorea_chun_doo_hwan_military_1980_1988
coalition_label_at_enactment: Military Emergency Committee / DJP
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: State-directed sectoral reallocation among chaebol groups.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Distressed-industry financing and policy-loan concentration to rationalised producers.
references:
- Chang (1994), The Political Economy of Industrial Policy
- Kim (1997), Big Business, Strong State

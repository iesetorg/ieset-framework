description: 'Sequential public-offering privatisations: British Telecom (Nov 1984, £3.9bn), British Gas (Dec 1986, ''Tell Sid'' campaign), BAA (1987), British Steel (1988), Water Authorities England+Wales
  (1989), Regional Electricity + National Grid (1990). Created shareholder- democracy narrative (BT shareholder count rose from ~100k to >2m). Industry-specific regulators (Oftel → Ofcom, Ofgas → Ofgem,
  Ofwat) preserved some competition-policy architecture. Canonical Thatcher-era industrial reform sequence.

  '

policy_id: netherlands_wao_disability_reform_tba_1993
status: candidate
title: Netherlands WAO disability-benefit reform (TBA Act 1993)
countries:
- NLD
timeframe:
  start: 1993
  end: 1993
  enacted_date: '1993-08-01'
description: 'Terugdringing Beroep op de Arbeidsongeschiktheidsverzekering Act effective 1 August 1993 tightened access to the WAO disability benefit (then ~900,000 claimants on population ~15m), reduced
  benefit duration and amount for new claimants, introduced age-graded benefit steps, tightened medical review. Triggered 1991 mass demonstrations; caused PvdA electoral rupture 1994. Foundational Dutch
  welfare-rebalancing measure.

  '

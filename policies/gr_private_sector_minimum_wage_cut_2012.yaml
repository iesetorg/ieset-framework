policy_id: gr_private_sector_minimum_wage_cut_2012
status: candidate
title: Private Sector Minimum Wage Cut 2012
countries:
- GRC
timeframe:
  start: 2011
  end: 2012
description: 'Act 4046/2012, signed under the Papademos technocratic government as part of the second Memorandum, cut the statutory private-sector minimum wage by 22% (and 32% for workers under 25), suspended
  its national general collective agreement (EGSSE) automatic indexation, and shifted wage setting toward firm-level bargaining. The reform was the most controversial single labour-cost adjustment of the
  Greek programme.

  '

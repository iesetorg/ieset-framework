title: Personal Responsibility and Work Opportunity Reconciliation Act (PRWORA) 1996
countries:
- USA
timeframe:
  start: 1996
  enacted_date: '1996-08-22'
description: 'Replaced Aid to Families with Dependent Children (AFDC) entitlement with Temporary Assistance for Needy Families (TANF) block grants. Imposed federal 5-year lifetime limit, work requirements
  (20-30 hrs/week), and gave states substantial discretion in programme design. Signed by Democratic president with Republican Congress — a canonical "policy-content not coalition" case per refinement D.3.1.

  '

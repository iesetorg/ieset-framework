  rationale: Lifetime limits + work requirements reduced long-term transfer commitment.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  intended: true
  rationale: Work requirements pushed welfare recipients into low-wage labour market.

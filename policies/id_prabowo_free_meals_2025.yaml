policy_id: id_prabowo_free_meals_2025
status: candidate
title: Makan Bergizi Gratis (free nutritious-meal programme) 2025
countries:
- IDN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-06'
description: 'Prabowo''s flagship campaign commitment, launched 6 January 2025 by the newly-created National Nutrition Agency (Badan Gizi Nasional). Targets universal free meals for ~83 million beneficiaries
  — schoolchildren from pre-school to senior high, pregnant women, and lactating mothers — at full rollout 2029. Year-one (2025) budget ~Rp 71 trillion for ~19.5m beneficiaries; steady-state rollout costed
  at ~Rp 450 trillion/year (~2% of GDP). Delivered through ~30,000 Satuan Pelayanan Pemenuhan Gizi kitchens using local supply chains. Largest new in-kind transfer programme in Indonesian fiscal history.

  '
enacted_by:

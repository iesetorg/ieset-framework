policy_id: caf_political_agreement_peace_reconciliation_2019
status: candidate
title: Central African Republic peace and reconciliation agreement 2019
countries:
- CAF
timeframe:
  start: 2019
  end: ongoing
  enacted_date: '2019-02-06'
description: 'The Political Agreement for Peace and Reconciliation in the Central African Republic committed the government and armed groups to ceasefire obligations, disarmament and reintegration, mixed
  special security units, decentralised consultation mechanisms, and follow-up bodies supported by the African Union and United Nations. It was a formal conflict-governance settlement rather than a macroeconomic
  reform.

  '
scope: national
enacted_by:
- central_african_republic_touadera_security_fiscal_state_2019_present
coalition_label_at_enactment: Touadera government and signatory armed groups
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: The agreement moved armed-group conflict into monitored political, security-sector, and accountability mechanisms.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Stabilisation and disarmament commitments were intended to reduce coercive predation over local communities and assets.
references:
- African Union and United Nations, Political Agreement for Peace and Reconciliation in the Central African Republic, 2019.
- United Nations Security Council reporting on implementation of the 2019 Central African Republic peace agreement.
notes: 'This is coded as an institutional settlement; implementation strength and battlefield compliance remain separate empirical questions.

  '

policy_id: france_csg_creation_1991
status: candidate
title: France Contribution Sociale Généralisée (CSG) creation
countries:
- FRA
timeframe:
  start: 1991
  end: 1991
  enacted_date: '1990-12-29'
description: 'Loi de finances 29 December 1990 created CSG, effective 1 February 1991, at initial 1.1% flat rate on all household income including capital and replacement income. Broadened the base of social-protection
  financing beyond wage contributions for the first time. Subsequently expanded repeatedly (rate at 7.5% on activity income by 1998). Foundational reform of French welfare finance.

  '

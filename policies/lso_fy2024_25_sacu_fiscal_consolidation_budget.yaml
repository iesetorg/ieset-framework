policy_id: lso_fy2024_25_sacu_fiscal_consolidation_budget
status: candidate
title: Lesotho FY2024/25 SACU fiscal consolidation budget
countries:
- LSO
timeframe:
  start: 2024
  end: 2025
description: 'Lesotho used the FY2024/25 budget to turn high Southern African Customs Union receipts into fiscal repair rather than a permanent expenditure increase. The budget framework emphasized an
  overall surplus, debt reduction, expenditure restraint, arrears control, and work toward fiscal rules and buffers to manage volatile customs-union revenue.

  '

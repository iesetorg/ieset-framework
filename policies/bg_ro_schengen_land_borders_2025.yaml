policy_id: bg_ro_schengen_land_borders_2025
status: candidate
title: Bulgaria-Romania Schengen land-border accession 2025
countries:
- BGR
- ROU
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-01'
description: 'The Council decided in December 2024 to remove checks on persons at the internal land borders with and between Bulgaria and Romania from 1 January 2025, completing the staged Schengen accession
  that had already lifted air and maritime internal border controls in March 2024. The policy reduced remaining internal mobility frictions while keeping Schengen external-border obligations applicable.

  '
enacted_by: []
coalition_label_at_enactment: Council of the EU decision with Bulgarian and Romanian governments
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Remaining internal land-border checks on persons with and between Bulgaria and Romania were lifted.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Removing land-border checks lowered cross-border road-transport and passenger-travel frictions.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The decision rested on Schengen evaluation and continued acquis-compliance obligations.
references:

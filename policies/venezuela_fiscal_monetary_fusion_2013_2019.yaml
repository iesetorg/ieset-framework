policy_id: venezuela_fiscal_monetary_fusion_2013_2019
status: candidate
title: Venezuela Fiscal Monetary Fusion 2013 2019
countries:
- VEN
timeframe:
  start: 2013
  end: ongoing
description: 'From 2013 onwards under the Maduro government, the Banco Central de Venezuela became the de facto primary financier of the consolidated public sector, including direct credit to PDVSA and
  ad-hoc transfers to off-budget funds. With oil revenues collapsing and external market access cut off by sanctions, money issuance and the fiscal deficit became operationally fused, driving hyperinflation
  that peaked in 2018-2019.

  '

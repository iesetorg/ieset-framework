  direction: '-'
  magnitude: weak
  intended: true
  rationale: BCV operated as fiscal agent of the Treasury and PDVSA with no operational autonomy on credit issuance.
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct BCV financing of fiscal deficits drove base-money growth into hyperinflationary territory by 2018.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Hyperinflation distorted relative prices and forced gradual de facto dollarisation of competitive segments.
- axis: institutional.rule_of_law

title: Canada — Anti-terrorism Act 2015 (Bill C-51)
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
  enacted_date: '2015-06-18'
description: 'Omnibus national-security legislation introduced January 2015 in response to the October 2014 Parliament Hill and Saint-Jean-sur- Richelieu attacks. Royal Assent 18 June 2015. The Act: (i)
  expanded CSIS''s mandate from intelligence collection to include disruption activities ("threat reduction measures") with judicial authorisation; (ii) created the Security of Canada Information Sharing
  Act permitting broad information sharing across 17 federal institutions for national-security purposes; (iii) created the Secure Air Travel Act formalising the no-fly list; (iv) broadened Criminal Code
  offences around advocating or promoting terrorism and lowered the threshold for preventive arrest and recognisance with conditions. Subsequently substantially amended by Bill C-59 (National Security Act,
  2017) under the Trudeau government, which created the National Security and Intelligence Review Agency (NSIRA) and narrowed several C-51 provisions.

  '

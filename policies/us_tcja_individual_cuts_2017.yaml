policy_id: us_tcja_individual_cuts_2017
status: candidate
title: Tcja Individual Cuts 2017
countries:
- USA
timeframe:
  start: 2017
  end: 2025
description: 'The individual-side provisions of the Tax Cuts and Jobs Act (TCJA) of 2017 reduced statutory marginal tax rates across most brackets, nearly doubled the standard deduction, expanded the child
  tax credit, and constrained itemised deductions. Most individual provisions were enacted with a scheduled sunset at end of 2025 to fit reconciliation rules. The package also created the Section 199A pass-through
  deduction and adjusted the alternative minimum tax thresholds.

  '

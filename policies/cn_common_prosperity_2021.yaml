policy_id: cn_common_prosperity_2021
status: candidate
title: Common Prosperity (共同富裕) Programme 2021
countries:
- CHN
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-08-17'
description: 'Redistributive-frame policy programme launched at the 10th meeting of the CCP Central Committee for Financial and Economic Affairs on 17 August 2021. Content: (i) "third distribution" — moral
  encouragement / pressure on large private firms and high-net-worth individuals to make charitable donations (Tencent pledged RMB100bn; Alibaba RMB100bn); (ii) tax-enforcement escalation on the entertainment
  sector (Zheng Shuang RMB299m fine August 2021; Viya RMB1.34bn fine December 2021); (iii) regional rebalancing with Zhejiang designated demonstration zone; (iv) property-sector and education-tutoring crackdowns
  repositioned as distributional measures. Announced in the same window as the platform / fintech crackdown and "double reduction" education policy. Rhetorical intensity moderated from early-2022 after
  the property downturn and the start of zero-COVID economic stress, but the programme remains formally active and framing persists in Xi-era policy documents.

  '
enacted_by:
- china_xi_era_2012_present
coalition_label_at_enactment: CCP under Xi Jinping
axes_moved:

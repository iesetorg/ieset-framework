policy_id: th_land_bridge_project_2023
status: candidate
title: Thailand Chumphon-Ranong Land Bridge project (2023-)
countries:
- THA
timeframe:
  start: 2023
  end: ongoing
description: 'Mega-project concept promoted by the Srettha and Paetongtarn governments for a ~1 trillion baht multi-modal corridor linking deep-sea ports at Chumphon (Gulf of Thailand) and Ranong (Andaman
  Sea) by road, rail, and oil pipeline, enabling bypass of the Malacca Strait. Masterplan approved in principle by cabinet 16 October 2023 with Office of Transport and Traffic Policy and Planning (OTP)
  coordinating. Financing concept is concession-based public-private partnership with a single concessionaire for both ports and the connecting corridor. Environmental and community opposition has been
  vocal in Ranong; the enabling Southern Economic Corridor Act remains under drafting.

  '

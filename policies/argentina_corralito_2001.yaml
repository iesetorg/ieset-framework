description: 'Decree 1570/2001, signed by Economy Minister Cavallo on 1 December 2001, restricted weekly cash withdrawals from bank accounts to 250 pesos/dollars and barred most cross-border transfers —
  the "corralito" — to halt a deposit run threatening Convertibility. The freeze precipitated street protests that forced President De la Rúa''s resignation, and was extended into a longer-term "corralón"
  deposit reprogramming under Duhalde.

  '

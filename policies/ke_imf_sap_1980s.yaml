  end: 1989
description: 'Three structural adjustment loans (SAL I 1980, SAL II 1982, SAL III 1986) plus IMF stand-bys conditional on maize-marketing deregulation (limited), import-licensing reduction, public-sector
  wage restraint, and parastatal reform. Partial compliance: reform-announced reform-reversed pattern typical of 1980s African SAPs. Substantial external financing without durable structural change.

  '

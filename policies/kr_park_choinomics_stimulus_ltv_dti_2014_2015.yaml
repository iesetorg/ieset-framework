policy_id: kr_park_choinomics_stimulus_ltv_dti_2014_2015
status: candidate
title: Choinomics fiscal stimulus + LTV/DTI deregulation 2014-2015
countries:
- KOR
timeframe:
  start: 2014
  end: 2016
  enacted_date: '2014-08-01'
description: '"Choinomics" programme under Deputy Prime Minister and Finance Minister Choi Kyung-hwan (appointed July 2014) — three-arrow package of expansionary fiscal, accommodative monetary, and housing-market
  revitalisation. Fiscal: supplementary budgets KRW 11.8tn (2015) and KRW 11tn (2016); Monetary coordination: BOK cut policy rate from 2.50% to 1.25% across 2014-2016; Housing: loan-to-value ceiling raised
  uniformly to 70% (from 50-60% by region) and debt-to-income ceiling loosened from 50% to 60% (August 2014). Household debt / GDP rose from ~76% to ~95% 2014-2018. Contributed to 2015 GDP growth of 2.8%
  (vs regional slowdown) but set up financial-stability pressures later noted by successor Moon administration.

  '

  enacted_date: '2000-04-11'
description: 'September 1999 concession of Cochabamba municipal water system to Aguas del Tunari (Bechtel-led Intl Water Ltd + Abengoa) under Ley 2029. Tariff hikes up to 50-100% triggered mass protests
  Jan-April 2000. Martial law 8 April; 17-year-old Víctor Hugo Daza killed; contract rescinded 11 April 2000. Bechtel later sued Bolivia at ICSID (AAA Case No. ARB/02/3) — settled for token $0.30 in 2006
  under Morales.

  '

description: 'Joint EU-Turkey Statement of 18 March 2016 substantially negotiated by Chancellor Merkel and PM Davutoğlu: Turkey to take back all irregular migrants crossing to Greek islands; ''one-for-one''
  Syrian resettlement from Turkey to EU; €6bn Facility for Refugees in Turkey (€3bn + €3bn); visa-liberalisation roadmap; accession-talks reopening. Aegean arrivals fell from ~850k in 2015 to ~175k in 2016
  and ~42k in 2017. Legal status of the instrument contested (EU General Court ruled in 2017 it was not an EU act).

  '

policy_id: estonia_flat_tax_1994
status: candidate
title: Estonian flat-tax reform 1994
countries:
- EST
timeframe:
  start: 1994
  enacted_date: '1994-01-01'
description: 'Under PM Mart Laar, Estonia introduced Europe''s first flat personal income tax at 26% (subsequently reduced to 20% by 2015). Eliminated nearly all deductions. Combined with corporate tax
  reform (only distributed profits taxed from 2000), free-trade regime with most countries, and aggressive digitisation of government services. Served as template for subsequent Eastern European flat-tax
  adoption: Lithuania 1994, Latvia 1995, Russia 2001, Slovakia 2004, Romania 2005, Ukraine 2004, Georgia 2005. Estonia''s GDP per capita grew from ~25% of EU average (1994) to >75% (2019). Showcase for
  small-open-economy flat-tax advocates; outcomes are plausibly a joint effect of flat tax + EU accession + digitisation.

  '

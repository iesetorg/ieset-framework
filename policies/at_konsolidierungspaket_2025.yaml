policy_id: at_konsolidierungspaket_2025
status: candidate
title: Fiscal consolidation package 2025 under EU EDP
countries:
- AUT
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-06-20'
description: 'Multi-year consolidation package adopted under the EU excessive-deficit procedure opened against Austria in June 2025 following a 2024 deficit of ~4.7% of GDP. Measures include staged expenditure
  cuts across ministries, extension of the top income-tax bracket (Spitzensteuersatz 55% for income above EUR 1m) beyond its 2025 sunset, tightened pension indexation, staffing freezes in federal administration,
  and subsidy- programme rationalisation (Bildungskarenz abolition, phased Klimabonus restructuring). Targets deficit under 3% of GDP by end of the legislative period.

  '
enacted_by:
- austria_stocker_ovp_spo_neos_2025_present
coalition_label_at_enactment: OeVP-SPOe-NEOS
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Targeted reduction of deficit from ~4.7% toward <3% of GDP via expenditure restraint.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Extension of EUR 1m Spitzensteuersatz bracket beyond sunset; modest top-end progressivity retention.
references:

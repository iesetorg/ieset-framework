  intended: true
  rationale: Direct fuel and electricity subsidies — large household transfers — were materially compressed.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Subsidy savings were partly redeployed to social-protection and capex, leaving total spending mixed.

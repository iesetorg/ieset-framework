policy_id: egypt_energy_subsidy_reform_2014_2019
status: candidate
title: Egypt Energy Subsidy Reform 2014 2019
countries:
- EGY
timeframe:
  start: 2016
  end: ongoing
description: 'Beginning in July 2014 and accelerated under the 2016 IMF EFF, Egypt cut petroleum-product subsidies in successive steps, lifted electricity tariffs on a multi-year schedule, and adjusted
  natural-gas prices toward cost-recovery. By 2019 fuel subsidies had fallen from over 6% of GDP to under 2%, freeing budgetary space for cash-transfer expansion (Takaful and Karama) and capex.

  '
enacted_by:
- egypt_sisi_austerity_2016_present

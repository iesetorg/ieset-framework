policy_id: portugal_imf_standby_1983_1985
status: candidate
title: Portugal Imf Standby 1983 1985
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portugal''s second IMF Stand-By Arrangement of October 1983 (around SDR 445 million), agreed by the Bloco Central coalition under Mario Soares, addressed a renewed balance-of-payments crisis
  after the early-1980s oil shock. Conditionality required escudo crawling-peg devaluation, fiscal retrenchment, real-wage moderation, removal of consumer subsidies, and reform of price controls. The intended
  effect was to compress domestic absorption, restore external balance ahead of EEC accession, and complete the transition from the revolutionary economic settlement to a market-oriented framework consistent
  with European integration.

  '

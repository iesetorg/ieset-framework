# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: irq_oil_boom_development_plan_1976_1980
status: candidate
title: Iraq oil-boom national development plan 1976-1980
countries: [IRQ]
timeframe: {start: 1976, end: 1980}
description: >
  The 1976-1980 development plan channelled post-nationalisation oil revenues
  into heavy industry, infrastructure, education, health, housing, and public
  employment. It consolidated a state-led growth model in which the Ba'ath
  party used petroleum income to expand both welfare provision and centralised
  economic control.
enacted_by:
  - iraq_baath_oil_statism_1968_1979
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Oil revenues financed a large public investment and service-expansion programme."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "Plan allocations prioritised state industry, infrastructure, and selected productive sectors."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    intended: true
    rationale: "Public enterprises and plan targets dominated formal investment decisions."
references:
  - "Republic of Iraq, National Development Plan 1976-1980"
  - "Tripp (2007), A History of Iraq"

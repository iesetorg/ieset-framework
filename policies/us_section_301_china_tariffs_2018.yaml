policy_id: us_section_301_china_tariffs_2018
status: candidate
title: Section 301 China Tariffs 2018
countries:
- USA
timeframe:
  start: 2018
  end: 2019
description: 'The 2018 Section 301 China tariffs, imposed by USTR after the March 2018 finding under the Trade Act of 1974 that China engaged in unreasonable IP-related practices, applied 25% tariffs in
  three rounds — List 1 (USD 34 billion, July 2018), List 2 (USD 16 billion, August 2018), List 3 (USD 200 billion at 10% rising to 25%, September 2018-May 2019) — covering most US imports from China. China
  retaliated proportionally. The intended effect was to coerce changes in Chinese IP and industrial-policy practices, eventually settling in the January 2020 Phase One agreement on agricultural and energy
  purchase commitments.

  '

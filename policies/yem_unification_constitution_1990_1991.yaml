policy_id: yem_unification_constitution_1990_1991
status: candidate
title: Yemen unification and multiparty constitution 1990-1991
countries:
- YEM
timeframe:
  start: 1990
  end: 1994
  enacted_date: '1990-05-22'
description: 'The 1990 unification agreement and 1991 constitution merged the Yemen Arab Republic and People''s Democratic Republic of Yemen into the Republic of Yemen, created national executive and legislative
  institutions, recognised political pluralism, and set a transitional power-sharing framework. The arrangement opened formal multiparty politics but was later narrowed by the 1994 civil war and the concentration
  of authority around the Saleh presidency.

  '
enacted_by:
- yemen_saleh_gpc_unification_adjustment_1990_2011
coalition_label_at_enactment: GPC-YSP unity settlement under Ali Abdullah Saleh and southern partners
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Unification created a national constitutional and multiparty legal framework.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: The constitution recognised courts and legal guarantees, though enforcement remained politically constrained.
references:
- Agreement on the Establishment of the Republic of Yemen, 22 May 1990
- Republic of Yemen Constitution, approved by referendum in 1991
- UN Peacemaker and constitutional archive materials on Yemen unification
notes: The positive rule-of-law coding is limited to formal institution creation, not later regime practice.

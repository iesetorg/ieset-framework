title: Blazing Furnace Anti Corruption Escalation 2016 2021
countries:
- VNM
timeframe:
  start: 2016
  end: 2021
description: 'General Secretary Nguyen Phu Trong''s "Blazing Furnace" (Dot Lo) anti-corruption campaign escalated from 2016, prosecuting senior Communist Party officials, SOE executives, and provincial
  leaders, including former politburo members. The campaign was administered through the Central Steering Committee on Anti-Corruption and led to high-profile convictions in PetroVietnam, banking, and infrastructure
  cases, while consolidating party-led oversight over the state apparatus.

  '

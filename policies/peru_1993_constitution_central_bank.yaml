policy_id: peru_1993_constitution_central_bank
status: candidate
title: Peru 1993 Constitution Central Bank
countries:
- PER
timeframe:
  start: 1990
  end: 2000
description: 'Articles of Peru''s 1993 constitution that constitutionally entrenched Banco Central de Reserva del Perú (BCRP) independence and gave it a single objective of preserving monetary stability.
  The framework prohibited central bank financing of the treasury, formalised independent governance and removal protections for board members, and provided the institutional anchor for the inflation- targeting
  regime that locked in the Fujishock disinflation through the 1990s and 2000s.

  '
enacted_by:
- peru_fujimori_stabilisation_1990_2000
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Prohibition on central bank financing tightened the soft budget constraint and restrained spending.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: 1993 charter reinforced market-economy clauses underpinning the contemporaneous tariff and capital-account opening.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Constitutional commitments to private initiative and pluralistic markets supported the broader pro-competition reforms.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Constitutional articles entrenched BCRP autonomy and a single price-stability mandate at the highest legal tier.

policy_id: japan_income_doubling_plan_1960
status: candidate
title: Japan Income Doubling Plan 1960
countries:
- JPN
timeframe:
  start: 1952
  end: 1975
description: 'The National Income Doubling Plan, adopted by the Ikeda cabinet in December 1960, set an explicit target of doubling real national income within ten years through public investment in infrastructure,
  education and heavy industry coordinated by the Economic Planning Agency and MITI. The plan consolidated the high-growth model — export-led manufacturing supported by FILP financing, preferential credit,
  and rising household savings — and was largely overachieved by the late 1960s.

  '

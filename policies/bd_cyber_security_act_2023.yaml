  enacted_date: '2023-09-18'
description: 'Jatiya Sangsad passed the Cyber Security Act 2023 on 13 September 2023, assented 18 September 2023, replacing the Digital Security Act 2018. Reduced certain penalties and made some offences
  bailable but retained the core speech-criminalisation architecture (sections on defamation, "spreading propaganda", religious sentiment, law-and-order). Widely criticised by UN OHCHR and press-freedom
  groups as DSA in new packaging.

  '

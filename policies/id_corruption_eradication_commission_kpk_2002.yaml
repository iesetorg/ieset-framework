policy_id: id_corruption_eradication_commission_kpk_2002
status: candidate
title: Indonesia Corruption Eradication Commission (KPK) Law (2002)
countries:
- IDN
timeframe:
  start: 2002
  end: 2003
  enacted_date: '2002-12-27'
description: 'Law 30/2002 on Corruption Eradication Commission enacted 27 December 2002, effective December 2003 with first commissioners appointed. KPK armed with investigative, prosecutorial, and preventive
  powers over corruption involving state losses exceeding Rp 1bn or high-profile officials. Key design features: five-commissioner collegial structure, budget independence, wiretap authority, non-renewable
  4-year terms, subordinate Corruption Court (Pengadilan Tipikor). Conviction rate ~100% at original Tipikor 2004-2011; flagship cases included ministers, speaker, BI deputy governors. Powers curtailed
  by 2019 revision (Law 19/2019) under Jokowi.

  '
enacted_by:
- indonesia_megawati_pdip_2001_2004
coalition_label_at_enactment: PDI-P coalition

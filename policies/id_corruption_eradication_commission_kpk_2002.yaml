  intended: true
  rationale: Independent anti-corruption agency with prosecutorial, investigative and preventive powers.
- axis: institutional.judicial_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Separate Tipikor adjudication track insulated corruption trials from general judiciary.

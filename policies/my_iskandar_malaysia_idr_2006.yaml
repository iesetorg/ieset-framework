  direction: +
  magnitude: moderate
  intended: true
  rationale: IDR tax incentives (10-year income-tax exemption for qualifying activities), infrastructure capex, corridor-development subsidies.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Foreign-equity relaxations in designated zones.

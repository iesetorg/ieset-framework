policy_id: my_iskandar_malaysia_idr_2006
status: candidate
title: Malaysia Iskandar Malaysia (Iskandar Development Region, 2006)
countries:
- MYS
timeframe:
  start: 2006
  end: 2025
  enacted_date: '2006-11-04'
description: 'Iskandar Development Region (renamed Iskandar Malaysia 2008) launched 4 November 2006 under Ninth Malaysia Plan. 2,217 km² special economic development zone in southern Johor across Johor
  Bahru, Kulai, Pontian and Kota Tinggi, strategically adjacent to Singapore. Five pillars: financial services, creative industries, education, health, logistics. Iskandar Regional Development Authority
  (IRDA) established as coordinator under PM''s Department. Target: 3x population (2025) and 5x GDP vs 2005 baseline. Significant inbound FDI from Singapore and China, flagship projects Legoland Malaysia
  (2012) and Pinewood Iskandar Malaysia Studios. Real-estate boom 2010-2014 followed by oversupply 2015-2018.

  '
enacted_by:
- malaysia_abdullah_badawi_umno_2003_2009
coalition_label_at_enactment: Barisan Nasional (UMNO-led)
axes_moved:

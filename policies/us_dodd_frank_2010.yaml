title: Dodd-Frank Wall Street Reform and Consumer Protection Act 2010
countries:
- USA
timeframe:
  start: 2010
  enacted_date: '2010-07-21'
description: 'Post-crisis financial regulation: created the Consumer Financial Protection Bureau (CFPB), the Financial Stability Oversight Council, the Volcker Rule (proprietary trading restrictions on
  deposit- insured banks), stricter capital + liquidity requirements, enhanced prudential standards for systemically important institutions, orderly liquidation authority, and OTC derivatives clearing requirements.
  Partial re-regulation of the 1999 Gramm-Leach-Bliley era. Materially tightened financial regulation; critics argue compliance costs disproportionately burdened community banks. 2018 Economic Growth, Regulatory
  Relief, and Consumer Protection Act softened some provisions for smaller banks.

  '

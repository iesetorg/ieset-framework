description: 'New Universities Act (Yliopistolaki 558/2009, effective 1 Jan 2010) reconstituted Finnish universities as legal persons (public corporations or foundations) outside the state-agency structure,
  giving them independent capacity to hold property, enter contracts, and hire staff outside civil-service rules. Aalto University formed as the flagship foundation-form merger of three Helsinki institutions.

  '

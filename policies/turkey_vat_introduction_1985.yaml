policy_id: turkey_vat_introduction_1985
status: candidate
title: Turkey Vat Introduction 1985
countries:
- TUR
timeframe:
  start: 1983
  end: 1993
description: 'Turkey''s introduction of Value-Added Tax under Law No. 3065 (effective 1 January 1985) replaced an array of fragmented production and consumption levies with a single broad-based VAT, anchoring
  the Özal fiscal modernisation. The reform broadened the indirect tax base, improved compliance through invoice matching, and helped finance the transition from import-substitution to outward-oriented
  growth.

  '
enacted_by:
- turkey_ozal_market_reforms_1983_1993
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: VAT's border-adjustability replaced cascading turnover taxes, supporting export competitiveness under Özal liberalisation.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Invoice-matching VAT compliance imposed new bookkeeping rules on firms, lightly tightening regulatory record-keeping.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Replacing cascading sales taxes with broad-based VAT removed distortions favouring vertically integrated incumbents.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Broadened indirect tax base provided revenue capacity that funded expanded Özal-era investment outlays.

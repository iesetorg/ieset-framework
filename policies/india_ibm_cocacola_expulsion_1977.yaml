policy_id: india_ibm_cocacola_expulsion_1977
status: candidate
title: IBM and Coca-Cola expulsion under FERA 1973 (India 1977)
countries:
- IND
timeframe:
  start: 1977
  end: 1978
description: 'Under Janata government enforcement of the Foreign Exchange Regulation Act 1973 — which required foreign companies to dilute equity to 40% Indian ownership — IBM and Coca-Cola rejected dilution
  and withdrew from India in 1977-1978. Domestic substitutes (CMC for IBM service contracts; Double Seven, Campa Cola, Thums Up for Coca-Cola) expanded to fill the gap. Cemented swadeshi-economic-nationalism
  trajectory until 1991.

  '
enacted_by:
- india_janata_desai_1977_1979
coalition_label_at_enactment: Janata Party
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: FERA 40% equity-dilution enforcement treated as quasi-trade barrier for foreign firms.
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Compelled foreign equity dilution amounted to partial expropriation under law.
- axis: regulatory.product_market_competition

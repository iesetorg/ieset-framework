policy_id: yem_economic_financial_administrative_reform_program_1995
status: candidate
title: Yemen Economic, Financial and Administrative Reform Program 1995
countries:
- YEM
timeframe:
  start: 1995
  end: 1999
description: 'Yemen''s 1995 Economic, Financial and Administrative Reform Program, backed by the IMF and World Bank after the post-unification fiscal crisis, devalued and unified exchange-rate arrangements,
  reduced budget deficits, cut generalized subsidies, liberalised trade and prices, and began tax and civil-service reforms. The programme was designed to stabilise the rial and public finances after war,
  oil-revenue volatility, and inherited dual economic systems.

  '
enacted_by:
- yemen_saleh_gpc_unification_adjustment_1990_2011
coalition_label_at_enactment: GPC-led Saleh government with IMF and World Bank support
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The programme reduced generalized subsidies and public-enterprise support.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Fiscal consolidation and deficit reduction were core programme targets.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Trade and price liberalisation reduced administrative restrictions relative to the pre-reform system.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Exchange-rate unification and stabilisation were paired with tighter monetary policy to slow depreciation and inflation.
references:
- IMF, Yemen Article IV and ESAF/EFF materials on the 1995 reform programme
- World Bank, Yemen economic reform and adjustment documents, mid-1990s
- Yemen Ministry of Planning and International Cooperation reform programme materials
notes: The reform package is coded as macro-stabilisation and liberalisation; later implementation and distributional backlash are separate outcome questions.

policy_id: uk_trade_cooperation_agreement_2020
status: candidate
title: Trade Cooperation Agreement 2020
countries:
- GBR
timeframe:
  start: 2016
  end: 2020
description: 'The EU-UK Trade and Cooperation Agreement (TCA), signed on 24 December 2020 and provisionally applied from 1 January 2021, established a zero-tariff zero-quota goods trade regime between the
  parties subject to rules of origin, but excluded the single market in services, ended freedom of movement, and imposed full customs and SPS checks on goods. The intended effect was to deliver a hard Brexit
  while avoiding tariff-driven supply chain disruption, secure UK regulatory autonomy, and conclude the negotiating phase ahead of the end of the transition period — at the cost of reduced services-trade
  access and recurrent border-friction frictions.

  '

policy_id: jp_ntt_privatisation_1985
status: candidate
title: NTT privatisation (Japan 1985)
countries:
- JPN
timeframe:
  start: 1985
  end: 1987
  enacted_date: '1985-04-01'
description: 'Nippon Telegraph and Telephone Public Corporation restructured into NTT Corporation under the NTT Corporation Act (enacted 25 Dec 1984, effective 1 Apr 1985). Initial 100% government shareholding
  reduced through public offerings Feb 1987, Nov 1987 and Oct 1988, raising ~JPY10tn — among the largest privatisations in history to that date. Paired with the Telecommunications Business Law 1 Apr 1985
  opening the long-distance market to Type I and Type II carriers (DDI, Japan Telecom, Teleway Japan from 1987).

  '
enacted_by:
- japan_nakasone_ldp_1982_1987
coalition_label_at_enactment: LDP (Nakasone cabinet)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: End of NTT telecom monopoly; Type I/II carrier market opening.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  intended: true
  rationale: Transfer from public-corporation legal form to shareholder ownership.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Share offerings generated ~JPY10tn for general revenue 1987-1988; off-budget transfer.
references:
- NTT Corporation Act (Law No. 85 of 1984)
- Telecommunications Business Law (Law No. 86 of 1984)
- Vogel (1996), Freer Markets, More Rules

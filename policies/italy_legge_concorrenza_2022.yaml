policy_id: italy_legge_concorrenza_2022
status: candidate
title: Italy Annual Competition Law 2022 (Legge annuale concorrenza)
countries:
- ITA
timeframe:
  start: 2022
  enacted_date: '2022-08-05'
description: 'First annual competition law (Law 118/2022) in more than five years, required by 2009 statute but long deferred. PNRR milestone-linked under mission M1C1. Key provisions: (i) local public
  services (transport, water, waste) moved toward competitive tendering as default, with motivation-requirement for in-house awards; (ii) port and airport concessions reformed; (iii) beach concessions (concessioni
  balneari) — Bolkestein-compliance entered in statute with extension to end-2023 and tender obligation thereafter, though subsequent extensions deferred actual tendering; (iv) taxi and NCC licence framework
  adjusted; (v) professional services licensing simplified; (vi) SME-friendly procurement adjustments; (vii) AGCM (competition authority) powers enhanced on market-investigation and merger thresholds. Contested
  elements: beach-concession reform faced coastal-lobby resistance and was repeatedly deferred by successor Meloni government; local-services tendering progress uneven across regions.

  '
enacted_by:
- italy_draghi_national_unity_2021_2022
coalition_label_at_enactment: National unity (Draghi)
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Competitive-tendering default for local public services; AGCM power expansion; professional-services licensing simplification.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Port, airport, beach (partial), taxi licensing framework moved toward tender-based allocation.

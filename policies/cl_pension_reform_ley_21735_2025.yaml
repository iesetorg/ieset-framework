policy_id: cl_pension_reform_ley_21735_2025
status: candidate
title: Pension Reform Ley 21735 2025
countries:
- CHL
timeframe:
  start: 2022
  end: ongoing
description: 'Ley 21.735 enacted in early 2025 under the Boric government, the first major reform of Chile''s pillar-based pension system since 2008. Increased employer contributions by 7 percentage points
  (phased in), with portions allocated to individual capitalisation, a social-insurance loan-and-rebate component, and contributions financing higher minimum pensions through the Pensión Garantizada Universal.

  '
enacted_by:
- chile_boric_ad_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher mandated employer pension contribution acts as a payroll-side levy on labour costs.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Solidarity component redistributes from higher-earning to lower-earning contributors via cross-subsidy.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher floor under Pensión Garantizada Universal expanded retirement-income transfers to seniors.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Increased employer payroll wedge reduces hiring flexibility, especially for marginal workers.

policy_id: italy_iraq_participation_2003
status: candidate
title: Italy Iraq Participation 2003
countries:
- ITA
timeframe:
  start: 2001
  end: 2006
description: 'Italy joined the post-invasion stabilisation phase of the Iraq operation, deploying around 3,200 troops to the Multi-National Division South-East under Operation Antica Babilonia from mid-2003
  through 2006, with parliamentary authorisation aligned to the Berlusconi II–III governments'' Atlanticist orientation. The mission generated multi-year defence-budget supplements, reconstruction-contract
  opportunities for Italian firms, and significant domestic political controversy that fed into broader fiscal and labour- policy debates of the period.

  '
enacted_by:
- italy_berlusconi_ii_iii_2001_2006
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Concurrent Biagi-law labour reforms benefited from coalition cohesion the deployment helped sustain.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Security-framed politics around the deployment hardened concurrent Bossi-Fini immigration restrictions.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Defence-cost financing through deficit channels rather than progressive tax raised distributional impact.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reconstruction contracts and defence procurement supported corporate-tax base via larger contractor flows.

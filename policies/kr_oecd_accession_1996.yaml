policy_id: kr_oecd_accession_1996
status: candidate
title: South Korea OECD accession 1996
countries:
- KOR
timeframe:
  start: 1996
  enacted_date: '1996-12-12'
description: 'South Korea became 29th OECD member on 12 Dec 1996 after accession negotiations from 1995. Commitments included capital-account liberalisation (particularly short-term foreign-currency borrowing
  by merchant banks), insurance-sector opening, and financial-regulation modernisation. Accession timing accelerated capital-account opening that fed into 1997 crisis dynamics.

  '
enacted_by:
- skorea_kim_young_sam_ds_1993_1998
coalition_label_at_enactment: New Korea Party under President Kim Young-sam

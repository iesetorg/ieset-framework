  direction: +
  magnitude: strong
  intended: true
  rationale: OECD Code of Liberalisation commitments accelerated capital-account opening.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Services and investment market-access commitments.
references:

policy_id: ar_fernandez_precios_cuidados_justos_2019
status: candidate
title: Precios Cuidados / Precios Justos price-control regimes (2019-2023)
countries:
- ARG
timeframe:
  start: 2019
  end: 2023
  enacted_date: '2019-12-16'
description: 'Expanded and intensified administered-price programmes covering consumer staples, supermarket baskets and later (Nov 2022) a ~2,000-SKU Precios Justos scheme with mandated monthly price increase
  caps (typically ~4% in a context of ~6-8% monthly headline inflation). Enforced via Secretaría de Comercio Interior fines and supply-chain negotiations with large retailers and manufacturers. Accompanied
  by rent-control reinforcement (Ley 27.551, 2020) and utility-tariff freezes reversing the Macri-era sincere-pricing trajectory.

  '

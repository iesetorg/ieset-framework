policy_id: com_imf_ecf_fiscal_governance_2023
status: candidate
title: Comoros IMF ECF fiscal governance programme 2023
countries:
- COM
timeframe:
  start: 2023
  end: ongoing
description: 'Comoros entered an IMF Extended Credit Facility programme in 2023 to restore fiscal and external stability after weak revenue collection, debt pressure, and repeated shocks. The programme
  emphasizes domestic revenue mobilisation, tax and customs administration, public-financial-management controls, debt management, state-owned-enterprise oversight, and better targeted social spending.

  '
enacted_by:
- comoros_azali_pce_fiscal_consolidation_2016_present
scope: national
coalition_label_at_enactment: Azali government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The programme tightens deficit and debt paths through revenue and expenditure controls.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax and customs administration reforms raise the effective collection effort on firms and trade.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Public-financial-management, procurement, debt, and SOE oversight measures strengthen rule-bound fiscal administration.
references:
- IMF Country Report, Union of the Comoros 2025 Article IV Consultation and Fifth Review under the Extended Credit Facility, 2026.
- IMF, Union of the Comoros Extended Credit Facility approval and review materials, 2023-2026.

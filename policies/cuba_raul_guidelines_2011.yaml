policy_id: cuba_raul_guidelines_2011
status: candidate
title: Cuba Raul Guidelines 2011
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'The 2011 Lineamientos de la Política Económica y Social, ratified by the VI Congress of the Communist Party under Raúl Castro, set out 313 guidelines to "update" the Cuban model. Headline
  measures included expanded cuentapropismo categories, cooperative formation outside agriculture, layoffs from bloated state payrolls, gradual subsidy trimming, and exploration of currency unification.
  The guidelines remained the explicit reform programme through the late 2010s.

  '

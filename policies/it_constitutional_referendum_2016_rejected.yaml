  enacted_date: '2016-12-04'
description: 'Confirmatory referendum on the Renzi-Boschi constitutional-reform law (already approved by Parliament below the two-thirds threshold) on 4 December 2016. Proposed: transforming the Senate
  into a 95-member indirectly-elected body of regional/municipal representatives (Senato delle autonomie), ending bicameralismo paritario; redistribution of Title V competences away from Regions to the
  state; abolition of CNEL (National Council for Economics and Labour). Rejected 59.1% NO / 40.9% YES with 65.5% turnout. Renzi resigned within hours, paving the way for Gentiloni. Considered a pivotal
  moment in European-centrist retrenchment ahead of the 2017 French and German elections.

  '

policy_id: brazil_privatisations_1995_2002
status: candidate
title: Brazil Privatisations 1995 2002
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
description: 'Brazil''s National Privatisation Programme (PND), administered by BNDES through the Cardoso years, divested federal SOEs across telecoms (Telebras 1998), mining (Vale 1997), steel, electricity,
  and banking. A 1995 constitutional amendment ended state monopolies in telecoms and oil distribution and cleared the way for sectoral concession laws. The programme generated tens of billions of dollars
  in receipts that were applied to debt retirement, complementing inflation-targeting and fiscal-rule components of the post-Real macroeconomic framework.

  '
enacted_by:
- brazil_real_plan_1994
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Removed soft-budget channels through state-bank lending to federal SOEs that had monetised losses.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sale receipts retired federal debt and removed loss-making SOEs from the subsidy stream.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Telebras break-up and steel/mining divestitures opened previously monopolised sectors to entry.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: New private operators in telecoms and mining were better positioned to integrate into export markets.

policy_id: uk_tax_credits_expansion
status: candidate
title: Tax Credits Expansion
countries:
- GBR
timeframe:
  start: 2001
  end: 2010
description: 'The UK''s tax-credits expansion of 2001-2010, anchored in the Tax Credits Act 2002, replaced Working Families Tax Credit with the more generous Child Tax Credit and Working Tax Credit and
  raised real awards substantially through successive Budgets, with HMRC administering refundable credits to families with children, low-paid workers, and disabled adults. The intended effect was to "make
  work pay", entrench in-work support, halve child poverty by 2010 (Blair pledge of 1999), and shift the British welfare model from contingency benefits toward an Earned-Income-Tax-Credit-style in-work
  transfer system.

  '
enacted_by:
- uk_blair_first_second_term_1997_2005
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Refundable credits rose to over GBP 25 billion annually by 2009, raising structural spending.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Tax credits became the largest single transfer programme to households of working age.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Tax credits operated within the FSMA-regulated financial services regime of the era.

policy_id: jp_1_03m_wall_basic_deduction_reform_2025
status: candidate
title: Japan — '¥1.03m wall' basic-deduction reform (FY2025 tax package)
countries:
- JPN
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-31'
description: 'Part of the FY2025 tax reform package passed as a condition of DPFP (Democratic Party for the People) cooperation with the LDP-Komeito minority on the FY2025 budget. Raises the income-tax
  basic deduction and employment-income deduction from the prior combined ¥1.03m level toward a higher threshold (approximately ¥1.23m in the enacted compromise, short of the DPFP''s proposed ¥1.78m), addressing
  the so-called "¥1.03m wall" that incentivised part-time workers — mostly spouses and students — to cap their earnings to avoid triggering income tax and dependent-deduction loss. First meaningful increase
  to the basic deduction since 1995. Paired with partial indexation of future thresholds.

  '
enacted_by:
- japan_ishiba_ldp_2024_present
coalition_label_at_enactment: LDP-Komeito minority + DPFP cooperation
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher basic deduction reduces tax liability disproportionately for low-earning workers (part-timers, students, spouses).
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Higher earnings threshold removes a kink in labour supply for secondary earners and part-time workers.
references:

description: 'In December 2008 Thailand''s Constitutional Court ordered the dissolution of the People''s Power Party (PPP) and two coalition partners on electoral fraud grounds and banned their leadership
  for five years, ending the Somchai government and triggering the formation of the Abhisit-led Democrat coalition. The ruling capped a year of political turmoil and PAD protests, illustrating the post-2006
  pattern of judicial unwinding of Thaksin-aligned electoral majorities.

  '

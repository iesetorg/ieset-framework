policy_id: mx_energy_reform_2013
status: candidate
title: Mexican energy reform — opening of Pemex upstream (2013)
countries:
- MEX
timeframe:
  start: 2013
  end: 2018
  enacted_date: '2013-12-20'
description: 'Constitutional amendments to Arts. 25, 27 and 28 (DOF 20-dic-2013) ending Pemex''s 75-year upstream monopoly. Permitted licensing, production-sharing and profit-sharing contracts for hydrocarbons;
  created CNH and strengthened CRE as autonomous technical regulators; Pemex and CFE reclassified as Empresas Productivas del Estado. Secondary laws (Ley de Hidrocarburos, Ley de la Industria Eléctrica)
  August 2014 operationalised farm-outs and Rondas 1-3 auctions of upstream blocks 2015-2018.

  '

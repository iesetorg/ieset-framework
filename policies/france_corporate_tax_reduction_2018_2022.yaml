policy_id: france_corporate_tax_reduction_2018_2022
status: candidate
title: France Corporate Tax Reduction 2018 2022
countries:
- FRA
timeframe:
  start: 2017
  end: 2019
description: 'France''s corporate-tax reduction trajectory, legislated in the 2018 Finance Act and continued through 2019-2022 under the Macron government, reduced the standard impôt sur les sociétés (IS)
  headline rate from 33.3% to 25% by 2022 in stepped reductions. Companion measures included flat 30% prélèvement forfaitaire unique (PFU) on capital income from 2018 and abolition of the wealth tax (ISF),
  replaced by the IFI on real estate. The intended effect was to align French corporate taxation with EU averages and improve investment incentives.

  '

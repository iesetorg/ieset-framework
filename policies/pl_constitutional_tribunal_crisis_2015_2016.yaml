policy_id: pl_constitutional_tribunal_crisis_2015_2016
status: candidate
title: Constitutional Tribunal Crisis 2015 2016
countries:
- POL
timeframe:
  start: 2015
  end: 2017
description: 'Constitutional Tribunal crisis triggered by the Szydło PiS government in late 2015 and 2016, including the appointment of new judges to seats already filled, refusal to publish certain Tribunal
  rulings, and amendments altering the Tribunal''s quorum and decision-making rules. The episode placed Poland under the European Commission''s Article 7 rule-of-law procedure and shaped the trajectory
  of subsequent PiS judicial reforms through 2023.

  '

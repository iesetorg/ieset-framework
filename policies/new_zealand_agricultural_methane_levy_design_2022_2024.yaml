policy_id: new_zealand_agricultural_methane_levy_design_2022_2024
status: candidate
title: Zealand Agricultural Methane Levy Design 2022 2024
countries:
- NZL
timeframe:
  start: 2019
  end: ongoing
description: 'New Zealand designed an on-farm pricing mechanism for biogenic methane (and N2O) under the He Waka Eke Noa partnership and successor government proposals between 2022 and 2024 — making NZ
  the first country to attempt agricultural greenhouse-gas pricing. Successive iterations included split-gas levies, collective vs farm-level reporting, and revenue recycling for emission-reduction technology,
  but political and farm-sector opposition delayed and ultimately reshaped implementation.

  '
enacted_by:
- newzealand_ardern_labour_2017_2023
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: First-ever statutory pricing of on-farm biogenic methane raised the marginal cost of pastoral GHG emissions.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Per-farm reporting, registration, and methodology approvals introduced licensing-style obligations on producers.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Levy revenue was earmarked for R&D grants and on-farm mitigation technology subsidies.
- axis: regulatory.energy_supply_security
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Agricultural methane pricing operates outside the energy sector and has neutral first-order effect on supply security.

description: 'Monopolies and Restrictive Trade Practices Act amendment 1991 removed the ₹100 crore asset-limit pre-approval requirement for expansion, amalgamation, and new undertakings by MRTP companies.
  Freed large corporate houses from double regulatory gateway on top of industrial licensing; anti-competition arm retained (later replaced by Competition Act 2002).

  '

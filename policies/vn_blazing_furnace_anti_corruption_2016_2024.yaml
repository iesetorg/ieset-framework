policy_id: vn_blazing_furnace_anti_corruption_2016_2024
status: candidate
title: Blazing Furnace (đốt lò) anti-corruption campaign
countries:
- VNM
timeframe:
  start: 2016
  end: ongoing
description: 'Party-discipline programme launched by General Secretary Nguyễn Phú Trọng after the XII Congress (January 2016) and intensified 2018 onward, named in his metaphor that ''the furnace is hot,
  so even wet wood will burn''. Operationalised through the Central Commission for Inspection (CCI), the Central Steering Committee on Anti-Corruption and Party Cell Building (chaired by the General Secretary),
  and the Ministry of Public Security. Key cases: the Trịnh Xuân Thanh / PVN case (2017); Đinh La Thăng Politburo-member conviction (2018); Việt Á COVID-19 test-kit scandal (2021-22); FLC and Tân Hoàng
  Minh bond- market fraud prosecutions (2022); Vạn Thịnh Phát / SCB case (2023- 24), Vietnam''s largest-ever corporate fraud with principal Trương Mỹ Lan sentenced to death in April 2024. Politburo-level
  resignations accelerated in 2023-24 including State Presidents Phúc (Jan 2023) and Thưởng (Mar 2024) and NA Chair Huệ (May 2024). Continued under successor Tô Lâm.

  '

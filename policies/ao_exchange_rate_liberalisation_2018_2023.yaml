policy_id: ao_exchange_rate_liberalisation_2018_2023
status: candidate
title: Angola exchange-rate liberalisation and FX-market normalisation 2018-2023
countries:
- AGO
timeframe:
  start: 2018
  end: ongoing
description: 'Angola moved away from the administratively defended kwanza exchange-rate regime used during the oil-price shock and shifted toward a more flexible exchange-rate framework, including BNA reforms
  to foreign-exchange auctions, bank access to FX, and later market-clearing adjustments in 2023. The policy reduced the official-parallel market wedge and made external adjustment more visible in domestic
  prices rather than rationed through administrative access.

  '
enacted_by:
- angola_lourenco_mpla_2017_present
scope: national
coalition_label_at_enactment: MPLA Lourenco government
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: A more flexible exchange-rate regime gives the BNA more operational room than an administratively defended peg.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: FX-market normalisation reduces rationing and import-payment frictions for firms and investors.
references:
- 'IMF, Angola: 2024 Article IV Consultation, Country Report No. 25/61.'
- Banco Nacional de Angola exchange-rate and foreign-exchange market communications, 2018-2023.
notes: Primary legal circulars should be pinned in a later hardening pass; this tranche relies mainly on IMF and BNA programme descriptions.

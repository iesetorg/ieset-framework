policy_id: co_minimum_wage_above_inflation_2014_2018
status: candidate
title: Minimum wage increases above inflation — Santos II (Colombia)
countries:
- COL
timeframe:
  start: 2014
  end: 2018
description: 'Pattern of annual minimum-wage decree increases under Santos II that ran consistently above measured inflation: +4.5% (2015), +7.0% (2016), +7.0% (2017), +5.9% (2018), while CPI averaged ~4-5%
  over the period and fell toward 3% by 2018. Raises were decreed by the Mesa de Concertación or by direct presidential decree when tripartite talks failed. Combined with formal-sector payroll-contribution
  structure, decisions shaped informality margin in the labour market.

  '
enacted_by:
- colombia_santos_ii_2014_2018
coalition_label_at_enactment: Unidad Nacional

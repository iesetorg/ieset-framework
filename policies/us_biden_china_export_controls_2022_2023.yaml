policy_id: us_biden_china_export_controls_2022_2023
status: candidate
title: Biden China Export Controls 2022 2023
countries:
- USA
timeframe:
  start: 2021
  end: 2025
description: 'In October 2022 the Bureau of Industry and Security imposed sweeping export controls on advanced semiconductors, chip-design software, and the equipment used to manufacture leading-node logic
  and memory chips destined for China, with expansions through 2023 to close routing loopholes. The rules cover U.S. persons, U.S.-origin goods, and items produced abroad with U.S. technology under the
  Foreign Direct Product rule, marking the most aggressive American technology-export restriction since the Cold War.

  '

policy_id: lby_exchange_rate_unification_2021
status: candidate
title: Libya exchange-rate unification and devaluation 2021
countries:
- LBY
timeframe:
  start: 2021
  end: ongoing
description: 'The Central Bank of Libya unified the official exchange rate around a sharply devalued dinar rate in 2021, replacing multiple official and preferential exchange rates that had generated arbitrage,
  import distortions, and fiscal leakage. The reform was one of the few countrywide economic measures that could operate through the payment system despite continued division among political and armed authorities.

  '
enacted_by:
- libya_fragmented_institutions_central_bank_rent_management_2014_present
coalition_label_at_enactment: Central Bank of Libya board decision under divided national institutions
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Unifying rates narrowed privileged access to cheap foreign exchange and reduced arbitrage rents in imports.
- axis: monetary.monetary_expansion_direction
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: The official devaluation raised local-currency proceeds from oil dollars while rate unification tightened access to subsidised foreign exchange.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: A single published rate was more rule-bound than discretionary multiple-rate allocation.
references:
- Central Bank of Libya board decision on unified exchange rate, 2020-2021
- IMF, Libya Article IV consultation reports discussing the 2021 exchange-rate unification
- World Bank, Libya Economic Monitor coverage of the 2021 exchange-rate reform
notes: The policy did not end fiscal fragmentation or parallel institutional claims.

description: 'Great British Energy Bill introduced 25 July 2024 and received Royal Assent as the Great British Energy Act 2025; initial capitalisation £8.3bn over the Parliament, headquartered in Aberdeen.
  GB Energy is a publicly-owned operational energy company tasked with co-investing in clean power generation (offshore wind, solar, onshore wind after consent restoration), local power plan, and supply-chain
  acceleration. Complementary reinstatement of onshore wind consenting (NPPF update September 2024), Clean Power 2030 mission target, and expanded Contracts for Difference allocation rounds.

  '

policy_id: jp_takaichi_economic_security_screening_2026
status: candidate
title: Japan Takaichi economic-security screening and strategic-field roadmap
countries:
- JPN
timeframe:
  start: 2026
  end: ongoing
  enacted_date: '2026-02-20'
description: 'Prime Minister Takaichi''s February 2026 policy speech directed the government to formulate a new growth strategy for 17 strategic fields, provide support through budget, tax, regulatory,
  and standards measures, and build a CFIUS-like framework to examine inbound investment for national security implications. The same speech linked these tools to domestic procurement, strategic industries,
  resilience to crises, supply-chain risk, technology leakage, and land-use safeguards. Coded as a candidate policy framework because the measures were announced as an operating agenda for the current Cabinet
  rather than as a single statute.

  '
enacted_by:
- japan_takaichi_ldp_2025_present
coalition_label_at_enactment: Takaichi LDP-led government
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  intended: true
  rationale: CFIUS-like inbound-investment review and strategic-field controls increase state gating in security-sensitive sectors.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: The 17-field roadmap is explicitly tied to budget, tax, and public-procurement support.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Targeted investment screening and technology-leakage controls narrow capital and technology openness in national-security sectors.

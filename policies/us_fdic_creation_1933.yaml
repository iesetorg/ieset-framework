title: Fdic Creation 1933
countries:
- USA
timeframe:
  start: 1933
  end: 1999
description: 'The Banking Act of 1933 (Glass-Steagall Act) established the Federal Deposit Insurance Corporation, which began operations in January 1934 with a temporary $2,500 deposit guarantee, raised
  to $5,000 later that year. By insuring commercial bank deposits, FDIC ended the bank-run dynamics that drove thousands of failures in 1930-33 and is widely credited with restoring depositor confidence
  and largely eliminating panic-driven runs on insured institutions for half a century.

  '

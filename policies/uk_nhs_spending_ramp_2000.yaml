policy_id: uk_nhs_spending_ramp_2000
status: candidate
title: Nhs Spending Ramp 2000
countries:
- GBR
timeframe:
  start: 1997
  end: 2005
description: 'Prime Minister Tony Blair''s January 2000 commitment to raise UK health spending toward the EU average, formalised in the 2000 NHS Plan and 2002 Wanless Review and funded partly by the April
  2003 National Insurance rise. The decade-long real-terms NHS budget growth ramp aimed to cut waiting times, expand workforce and capacity, and modernise the service after sustained underinvestment in
  the 1980s and 1990s.

  '
enacted_by:
- uk_blair_first_second_term_1997_2005
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Funded via NI rise and OBR-style fiscal rules respected MPC independence under the 1998 Act.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Agenda for Change pay framework and consultant contract centralised NHS pay structures.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Major real-terms increase in the universal health-care in-kind transfer raised social-wage value.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: NHS budget rose from c.5% to c.8% of GDP across the decade, the largest sustained UK spending ramp.

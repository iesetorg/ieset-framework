policy_id: ph_train_tax_reform_2017
status: candidate
title: 'TRAIN: Tax Reform for Acceleration and Inclusion (RA 10963)'
countries:
- PHL
timeframe:
  start: 2018
  enacted_date: '2017-12-19'
description: 'Package 1 of the Comprehensive Tax Reform Program, signed 19 December 2017 and effective 1 January 2018. Personal income tax: zero-bracket raised to ₱250,000 annual income; top marginal rate
  retained at 35% above ₱8m; compression and flattening of middle brackets cutting take-home tax burden for most wage-earners. To finance the PIT cut, TRAIN broadened the VAT base by removing dozens of
  exemptions; raised excise on petroleum products in three tranches (₱2.50/l in 2018, ₱2.00/l in 2019, ₱1.50/l in 2020); imposed a sugar-sweetened-beverage tax (₱6/l for caloric sweeteners, ₱12/l for high-fructose
  corn syrup); raised excise on automobiles, tobacco, mineral products, cosmetic procedures and documentary stamps. Revenue earmarking: 70% for Build Build Build infrastructure, 30% for social mitigation
  (unconditional cash transfer to bottom 10m households ₱200-300/month 2018-20).

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban-led supermajority
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: moderate
  rationale: PIT schedule became sharply more progressive at the low end via the ₱250k zero-bracket and middle-bracket cuts; offset in net-incidence terms by VAT-base broadening and fuel excises.
  intended: true
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  rationale: Documentary stamp tax doubled; estate and donor's taxes simplified to 6%; marginal upward adjustment of several capital-adjacent rates.
  intended: true
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Earmarked financing channelled into Build Build Build public-investment programme, supporting sustained rise in infra spending share of GDP.
  intended: true
references:
- Republic Act No. 10963 (TRAIN), 19 December 2017
- DOF, TRAIN Implementation Reports 2018-2021

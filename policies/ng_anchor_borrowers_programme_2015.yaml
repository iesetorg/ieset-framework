  enacted_date: '2015-11-17'
description: 'Launched by CBN Governor Emefiele and President Buhari on 17 November 2015 in Kebbi State, the Anchor Borrowers'' Programme provided subsidised single- digit-interest agricultural credit (initially
  9%) to smallholder farmers linked to anchor processors, with a focus on rice, maize, wheat and cotton. Emblematic "rice pyramid" PR event staged in Abuja January 2022 claiming self-sufficiency. By 2023
  CBN had disbursed ~N1.1 trillion with repayment rates below 50% per later audits; programme effectively wound down under the Cardoso CBN.

  '

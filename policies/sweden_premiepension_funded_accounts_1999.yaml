policy_id: sweden_premiepension_funded_accounts_1999
status: candidate
title: Sweden Premiepension Funded Accounts 1999
countries:
- SWE
timeframe:
  start: 1999
  end: ongoing
description: 'The Premiepension is the funded defined-contribution tier of Sweden''s reformed pension system, introduced alongside the NDC scheme in 1999. A 2.5 percent slice of pensionable earnings is
  paid into individual accounts that participants invest across hundreds of approved mutual funds via the Pensionsmyndigheten platform, introducing private capital-market participation into mandatory retirement
  saving for the entire workforce.

  '
enacted_by:
- sweden_persson_sap_1996_2006
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Funded accounts shift retirement income from PAYG transfers to individual returns.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory 2.5 percent contribution channels savings into capital markets via tax-style levy.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Open fund-platform model created competition among hundreds of fund managers.

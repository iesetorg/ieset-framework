policy_id: italy_windfall_tax_energy_2022
status: candidate
title: Italy windfall tax on energy producers 2022
countries:
- ITA
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2022-03-21'
description: 'Temporary solidarity contribution on energy producers and traders introduced under Decreto Aiuti (DL 21/2022) at 10% of VAT-ledger value-added differential between October 2021-March 2022
  vs October 2020-March 2021, raised to 25% by Decreto Aiuti-bis (DL 115/2022, Law 142/2022) with extended reference period. Yield materially below ex-ante estimate (~€10bn projected, ~€2.8bn collected)
  due to base disputes and Constitutional Court rulings (sentenza 111/2024 partially struck the retroactive base). Proceeds ring-fenced for household and SME energy-bill relief (bonus sociale extension,
  VAT reduction on gas). 2023 windfall levy on residual energy super-profits (Law 197/2022 Budget) continued the framework at a different base with €2.5bn collected. Analytically overlaps with EU Council
  Regulation 2022/1854 (temporary solidarity contribution at EU level); Italy pre-dated and then partially conformed.

  '
enacted_by:
- italy_draghi_national_unity_2021_2022
coalition_label_at_enactment: National unity (Draghi)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: 10%→25% temporary solidarity contribution on energy-sector value-added differential; ~€2.8bn collected.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Ring-fenced use for bonus sociale extension and household energy-bill relief.

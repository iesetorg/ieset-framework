policy_id: pl_800_plus_child_benefit_2024
status: candidate
title: 800+ child benefit indexation (Poland, 2024)
countries:
- POL
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-01'
description: 'Indexation of the Rodzina 500+ programme from 500 zł to 800 zł per child per month, effective 1 January 2024. The amendment was enacted by the outgoing Morawiecki PiS government (legislation
  passed mid-2023, ahead of the October 2023 election), preserving the transfer''s universal-from-first-child design introduced 2019. Implementation fell to the incoming Tusk KO-led coalition, which had
  committed during the 2023 campaign to retaining the expanded architecture rather than unwinding it. Programme cost rose from ~1.4% of GDP (pre-indexation) to ~2.1% of GDP on the new 800 zł base.

  '
enacted_by:
- poland_morawiecki_pis_2017_2023
- poland_tusk_koalicja_2023_present
coalition_label_at_enactment: Enacted by PiS mid-2023; delivered under Tusk KO-led coalition from Jan 2024

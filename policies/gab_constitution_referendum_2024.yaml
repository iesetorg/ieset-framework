description: 'Gabon adopted a new constitution after the November 2024 referendum during the CTRI transition. The text re-established a civilian constitutional framework, defined the presidential system and
  eligibility rules, reorganised executive and legislative institutions, and set the legal basis for the transition from military rule to elections in 2025.

  '

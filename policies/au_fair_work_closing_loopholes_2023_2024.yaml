  end: ongoing
  enacted_date: '2024-02-26'
description: The Fair Work Legislation Amendment (Closing Loopholes) Act 2023 and Closing Loopholes No. 2 Act 2024 amended the Fair Work framework to regulate labour-hire "same job, same pay" orders, redefine
  casual employment and employee status tests, add minimum standards for some employee-like platform workers and regulated road transport contractors, and strengthen protections around wage theft, discrimination,
  and delegates' rights.

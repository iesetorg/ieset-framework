policy_id: in_ibc_2016
status: candidate
title: India — Insolvency and Bankruptcy Code 2016
countries:
- IND
timeframe:
  start: 2016
  enacted_date: '2016-05-28'
description: 'The Insolvency and Bankruptcy Code 2016 consolidated India''s fragmented insolvency laws (Companies Act, SICA, SARFAESI, DRT) into a single creditor-driven resolution framework administered
  by the National Company Law Tribunal (NCLT) with 180-day (plus 90-day extension) resolution timelines. Established the Insolvency and Bankruptcy Board of India (IBBI), insolvency-professional licensing,
  and information utilities. For the first time in Indian corporate law, creditors — not promoters — control the resolution process once a Corporate Insolvency Resolution Process is admitted. RBI''s June
  2017 reference of 12 large NPA accounts (~25% of system NPAs) to NCLT materialised the regime. Recovery rates under IBC ran ~32% on admitted claims in the first years — low in absolute terms but materially
  above the prior DRT/SARFAESI baseline. Amendments in 2018, 2019, 2020 (COVID suspension), 2021 (pre-pack for MSMEs) iterated the framework.

  '

description: 'Under international pressure Japan contributed a total of $13bn financial support to the US-led Gulf War coalition without sending troops due to Article 9 constitutional restrictions — the
  ''cheque- book diplomacy'' episode. Funded through special taxes and two supplementary budgets. Triggered the post-war reconsideration that led to the 1992 International Peace Cooperation Law allowing
  JSDF participation in UN PKOs.

  '

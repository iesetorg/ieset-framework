policy_id: ner_transition_charter_five_year_timeline_2025
status: candidate
title: Niger five-year transition charter 2025
countries:
- NER
timeframe:
  start: 2025
  end: 2030
description: >
  Niger's post-coup authorities adopted a transition charter and five-year
  transition timetable after national consultations in 2025, keeping General
  Abdourahamane Tiani as head of state and setting a military-led path for
  political normalization. The charter formalized transitional institutions
  while delaying a return to elected civilian constitutional government.
enacted_by:
- niger_cnsp_transition_sovereignty_2023_present
scope: national
coalition_label_at_enactment: CNSP military transition
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The five-year timetable prolonged military-led transition authority before elected constitutional rule.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Concentrated transition executive authority weakened ordinary constitutional checks.
references:
- Niger national consultations and transition-charter reporting, 2025.
- Associated Press and Reuters reporting on Niger's 2025 transition timeline under General Tiani.
notes: >
  The entry codes the formal transition timetable. It does not assess the
  representativeness of the national consultations.

policy_id: sweden_school_voucher_1992
status: candidate
title: Swedish School Voucher reform (Friskolereformen) 1992
countries:
- SWE
timeframe:
  start: 1992
  enacted_date: '1992-07-01'
description: 'Under Bildt centre-right coalition, Sweden introduced one of the most liberal school-choice regimes in the OECD. Publicly-funded vouchers follow the student to state or independent ''friskolor''
  of parental choice, with state-equivalent per-pupil funding and no tuition permitted. Both non-profit and for-profit independent schools qualify. Created large private-sector education market within a
  publicly-funded system — refinement D.2.9 explicitly cites this as ''market mechanisms within state-funded systems''. Empirically contested: some studies find marginal test-score gains; others attribute
  PISA decline 2000-2015 partly to segregation effects of choice system. Canonical worked example of welfare-architecture reform without welfare-state rollback.

  '
enacted_by:
- sweden_bildt_centre_right_1991_1994
coalition_label_at_enactment: Moderaterna-led centre-right coalition

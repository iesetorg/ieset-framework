title: Brazilian hyperinflation escalation 1989-1990
countries:
- BRA
timeframe:
  start: 1989
  end: 1990
description: 'Following the collapse of successive heterodox plans under Sarney, Brazilian CPI reached 1,972% in 1989 (annualised Dec-on-Dec) and peaked at 84.3% monthly in March 1990 — the highest monthly
  rate of Brazil''s hyperinflation era. Widespread use of BTNF fiscal indexation for all contracts; daily repricing; overnight market concentrated M4. Transition crisis: Collor inherited the 80% March monthly
  rate and responded with the Plano Collor asset freeze.

  '

policy_id: portugal_bank_nationalisations_1975
status: candidate
title: Portugal Bank Nationalisations 1975
countries:
- PRT
timeframe:
  start: 1974
  end: 1986
description: 'Portugal''s bank nationalisations, executed by Decree-Law 132-A/75 of 14 March 1975 in the wake of a failed counter-revolutionary attempt, transferred all domestically owned commercial banks
  (apart from foreign branches and small savings banks) to the state. The decree was followed by analogous nationalisations of insurance companies and basic-industry firms. The intended effect was to put
  the financial "commanding heights" under state control during the Carnation Revolution''s ongoing-revolution phase, channel credit toward state industrial plans, and consolidate the gains of the 25 April
  leftward turn before the 1976 democratic constitution.

  '
enacted_by:
- portugal_carnation_revolution_1974_1986
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: State monopoly in domestic banking imposed a strict licensing barrier on private re-entry.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Compulsory expropriation of bank shareholders sharply weakened private-property guarantees.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Capital controls on nationalised banks reduced openness even as later EEC alignment partly reversed it.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: weak
  intended: true
  rationale: State assumed bank balance sheets and losses, raising contingent liabilities not always booked as spending.

policy_id: ie_promissory_note_restructuring_2013
status: candidate
title: Promissory Note Restructuring 2013
countries:
- IRL
timeframe:
  start: 2011
  end: 2017
description: 'In February 2013 the government wound up the Irish Bank Resolution Corporation (former Anglo Irish/INBS) and replaced the EUR 28 billion promissory notes with long-dated Irish government bonds,
  exchanged through the Central Bank''s ELA portfolio. The Promissory Notes Act 2013 and accompanying liquidations legislation extended the average maturity from c.7-8 years to over 30 years, reducing near-term
  debt-service pressure while maintaining ECB monetary- financing constraints.

  '
enacted_by:
- ireland_kenny_fg_labour_2011_2017
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Lower near-term interest costs, but headline expenditure ceilings remained binding under MoU.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: IBRC liquidation transferred residual loan books to NAMA under the bank-resolution regime.
- axis: fiscal.tax_corporate
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Restructuring acted via debt management; corporate-tax regime untouched.
- axis: fiscal.transfer_expansion
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Debt-side action; transfer programmes were neither expanded nor cut by this measure.

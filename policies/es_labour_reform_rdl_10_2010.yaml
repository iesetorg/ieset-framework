policy_id: es_labour_reform_rdl_10_2010
status: candidate
title: Labour Reform Rdl 10 2010
countries:
- ESP
timeframe:
  start: 2008
  end: 2011
description: 'Royal Decree-Law 10/2010, later upgraded to Law 35/2010, broadened the use of the cheaper "fair dismissal" track (with 20 days of severance per year of service), refined economic causes for
  dismissal, restricted chained temporary contracting, and granted firms easier opt-out from sector collective bargaining. The reform was Zapatero''s primary structural concession after the May 2010 austerity
  turn.

  '

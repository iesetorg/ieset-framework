policy_id: uk_full_expensing_capital_allowance_2023
status: candidate
title: UK permanent full expensing for plant and machinery (2023)
countries:
- GBR
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-04-01'
description: 'Introduced in the Spring Budget 15 March 2023 and made permanent in the Autumn Statement 22 November 2023: 100% first-year allowance for qualifying main-rate plant and machinery expenditure
  and 50% first-year allowance for special-rate assets. Replaced the 130% super-deduction which expired 31 March 2023. Designed as a supply-side offset to the 25% corporation tax rise and to shift UK to
  one of the most generous capital-allowance regimes in OECD. OBR estimated it raises business investment long-run.

  '
enacted_by:
- uk_sunak_conservative_2022_2024
coalition_label_at_enactment: Conservative majority (Sunak)
axes_moved:

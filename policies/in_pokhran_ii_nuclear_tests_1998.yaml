policy_id: in_pokhran_ii_nuclear_tests_1998
status: candidate
title: India Pokhran-II nuclear tests and weaponised-state declaration (1998)
countries:
- IND
timeframe:
  start: 1998
  end: 1998
  enacted_date: '1998-05-11'
description: 'Five underground nuclear detonations at Pokhran, Rajasthan on 11 and 13 May 1998 (codename Operation Shakti): one fission, one thermonuclear, three sub-kiloton. India formally declared itself
  a nuclear-weapon state. Triggered US Glenn Amendment sanctions (barring non-humanitarian aid, cutting military cooperation), Japan ODA freeze (~¥100bn/year), multilateral lending restrictions. Pakistan
  responded with Chagai-I/II 28/30 May 1998. India-US Jaswant-Talbott dialogue 1998-2000 began normalisation; most sanctions rolled back late 1998, fully lifted post-9/11.

  '

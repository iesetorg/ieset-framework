policy_id: hu_price_caps_fuel_food_2021_2023
status: candidate
title: Administrative price caps on fuel, staple foods, and retail mortgages (Hungary, 2021-2023)
countries:
- HUN
timeframe:
  start: 2021
  end: 2023
  enacted_date: '2021-11-11'
description: 'Suite of administrative price controls introduced in response to inflation. Fuel price cap at 480 HUF/L for 95-octane petrol and diesel from 15 November 2021, originally three months, extended
  repeatedly through 2022 and removed 6 December 2022 after MOL reported supply failures and rationing emerged at rural stations. Staple-food price cap from 1 February 2022 fixing six basic items (sugar,
  wheat flour, sunflower oil, pork leg, chicken breast, 2.8% UHT milk) at mid-October 2021 levels, expanded in 2022 to add eggs and potatoes; lifted 1 August 2023. Retail mortgage interest-rate cap from
  January 2022 freezing floating-rate household mortgages at October 2021 reference rates, extended repeatedly. SME loan-rate cap from November 2022. Mandatory retailer discount regime (''kötelező akciózás'')
  from 1 June 2023 requiring large retailers to offer designated staples at a 10% discount to a four-week reference price.

  '
enacted_by:
- hungary_orban_fourth_term_2022_present
coalition_label_at_enactment: Fidesz–KDNP fourth-term supermajority
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Direct administrative price setting across fuel, staple food, and household credit markets; signature instrument of the 2022-23 inflation response.
- axis: regulatory.price_control_intensity
  direction: +
  magnitude: strong
  intended: true
  rationale: Binding statutory caps on retail fuel, staple foods, and household credit prices with repeated extensions.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: false
  rationale: Compensation payments to MOL for below-market fuel supply; fiscal leakage via below-market-rate interest subsidy to mortgage holders.

status: candidate
title: Retirement-age reform 62 → 64 (Borne government)
countries:
- FRA
timeframe:
  start: 2023
  enacted_date: '2023-04-14'
description: 'Loi n° 2023-270 du 14 avril 2023 de financement rectificative de la sécurité sociale — raised the legal retirement age from 62 to 64 (phased by four months per generation to 2030) and accelerated
  the contribution-period schedule toward 43 years (loi Touraine). Enacted via Article 49.3 after Senate approval, amid the largest protest mobilisations in France since 2010; Conseil constitutionnel upheld
  the core measure 14 April 2023.

  '

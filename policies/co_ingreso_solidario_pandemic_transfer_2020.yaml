policy_id: co_ingreso_solidario_pandemic_transfer_2020
status: candidate
title: Ingreso Solidario pandemic cash transfer (Colombia)
countries:
- COL
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-03-28'
description: 'Unconditional cash-transfer programme created by Decreto 518 de 2020 at the onset of the COVID-19 pandemic, targeting ~3M poor and vulnerable households not covered by Familias en Acción,
  Jóvenes en Acción, Colombia Mayor, or Devolución de IVA. Initial monthly amount COP 160,000. Extended repeatedly through 2021 and made permanent under Ley 2155 de 2021 with amount scheduling tied to poverty-line
  indexation. Funded via the FOME emergency fund and general-budget appropriations; largest peacetime expansion of Colombia''s social-transfer footprint.

  '
enacted_by:
- colombia_duque_centro_democratico_2018_2022
coalition_label_at_enactment: Centro Democrático
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: ~3M households newly covered; made permanent 2021.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Pandemic fiscal impulse; deficit peaked 7.8% GDP 2020.
references:
- Decreto 518 de 2020
- Ley 2155 de 2021 art. 5
- DNP Ingreso Solidario evaluaciones 2021-2022

description: 'Ley 6/1998, de 13 de abril, sobre Régimen del Suelo y Valoraciones reversed presumption of planning: classified all land as urbanisable unless specifically protected. Aimed to increase housing
  supply by liberalising land availability. Constitutional-court partial annulment 2001. Widely cited in ex-post analyses of the 2001-2007 Spanish housing-construction boom.

  '

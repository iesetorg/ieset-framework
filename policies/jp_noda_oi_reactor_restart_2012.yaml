policy_id: jp_noda_oi_reactor_restart_2012
status: candidate
title: Noda Oi Reactor Restart 2012
countries:
- JPN
timeframe:
  start: 2011
  end: 2012
description: 'In June 2012 the Noda cabinet authorised the restart of Ōi Nuclear Power Plant Units 3 and 4 in Fukui Prefecture, the first reactor restart following the post-Fukushima nationwide shutdown.
  The decision rested on interim safety assessments and supply-shortage projections by METI and was implemented with the consent of Fukui Prefecture and Ōi Town, ahead of the new Nuclear Regulation Authority''s
  establishment that September.

  '

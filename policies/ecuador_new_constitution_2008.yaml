policy_id: ecuador_new_constitution_2008
status: candidate
title: Ecuador New Constitution 2008
countries:
- ECU
timeframe:
  start: 2007
  end: 2017
description: 'Drafted by the Montecristi Constituent Assembly and approved by referendum in September 2008, Ecuador''s twentieth constitution declared the country a "social state of rights and justice,"
  recognised buen vivir / sumak kawsay and Pachamama as guiding principles, expanded socio-economic rights, and reasserted state ownership of strategic sectors (oil, minerals, telecoms, water). It restructured
  the executive''s tools and limited central-bank autonomy.

  '

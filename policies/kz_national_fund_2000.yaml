# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: kz_national_fund_2000
status: candidate
title: Kazakhstan National Fund oil-revenue rule 2000
countries: [KAZ]
timeframe: {start: 2000, end: ongoing}
description: >
  Kazakhstan created the National Fund in 2000 to save and stabilise oil
  revenues, buffering the budget from commodity-price volatility and supporting
  intergenerational saving. Transfers from the fund later became a major fiscal
  management tool as well as a source of development financing.
enacted_by:
  - kazakhstan_nazarbayev_resource_state_1991_2019
axes_moved:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, intended: true, rationale: "The fund constrained direct boom spending but also institutionalised oil transfers into the budget."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, intended: true, rationale: "Sterilising resource inflows reduced some pressure for monetary accommodation."}
references:
  - "IMF, Kazakhstan Selected Issues on National Fund rules"
  - "World Bank, Kazakhstan oil revenue management analysis"

description: 'Planning Commission plan covering FY1980-81 to FY1984-85 under Indira Gandhi. Targeted 5.2% GDP growth (achieved 5.7%), emphasised poverty-reduction via IRDP (Integrated Rural Development
  Programme 1980), NREP (National Rural Employment Programme 1980), Minimum Needs Programme. Moderate technological upgrading in cement, textile machinery. First plan to use explicit macroeconomic modelling.

  '

policy_id: china_trading_rights_liberalisation
status: candidate
title: China Trading Rights Liberalisation
countries:
- CHN
timeframe:
  start: 2001
  end: 2015
description: 'Phased extension of the right to import and export goods to all Chinese enterprises and (within three years) foreign-invested firms, eliminating the prior monopoly of designated state foreign-trade
  corporations. Implemented through the 2004 amended Foreign Trade Law as a core WTO-accession commitment, opening the trading channel to direct private and foreign participation.

  '
enacted_by:
- china_wto_accession_2001
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct trading rights for all firms removed administrative gatekeeping by state foreign-trade corporations.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Private and foreign firms could now compete directly in domestic distribution of imports and exports.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Statutory recognition of trading-right registrations created an enforceable commercial entitlement.

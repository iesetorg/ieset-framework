policy_id: ie_national_childrens_hospital_overrun
status: candidate
title: National Childrens Hospital Overrun
countries:
- IRL
timeframe:
  start: 2024
  end: ongoing
description: 'The New Children''s Hospital project, sanctioned in the late 2010s and built on the St James''s campus in Dublin, escalated from an initial sub-EUR 1 billion estimate to multi-billion-euro
  completion costs by 2024 amid scope changes, contractor disputes, and delivery delays. The successive Exchequer top-ups illustrate cost-overrun dynamics in major Irish capital projects and feed ongoing
  parliamentary committee oversight.

  '
enacted_by:
- ireland_harris_fg_2024_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Cost overruns absorbed receipts from the broad corporate-tax base supporting the capital plan.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Successive Exchequer supplementaries added to the capital-spending envelope.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Hospital expansion supports later in-kind health-service entitlements for paediatric care.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sectoral employment orders for construction wages bound the contractor cost base.

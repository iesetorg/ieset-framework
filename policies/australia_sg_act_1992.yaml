policy_id: australia_sg_act_1992
status: candidate
title: Australia Sg Act 1992
countries:
- AUS
timeframe:
  start: 1992
  end: ongoing
description: 'The Superannuation Guarantee (Administration) Act 1992 introduced compulsory employer contributions to retirement-saving accounts on behalf of employees, beginning at 3% of ordinary-time earnings
  and progressively rising to 12% by 2025. Administered by the ATO with non-compliance enforced through the Superannuation Guarantee Charge, the regime built one of the world''s largest defined-contribution
  pension pools, exceeding AUD 3 trillion under management.

  '
enacted_by:
- australia_keating_alp_1991_1996
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory private retirement saving displaced reliance on the means-tested public Age Pension.
- axis: fiscal.tax_capital
  direction: +
  magnitude: weak
  intended: true
  rationale: Concessional 15% tax on super earnings created a new dedicated capital-tax revenue stream.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Created a competitive industry of retail and industry funds vying for member contributions.

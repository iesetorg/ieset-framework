policy_id: nl_dividend_tax_abolition_uturn_2018
status: candidate
title: Netherlands dividend tax abolition plan and u-turn 2017-2018
countries:
- NLD
timeframe:
  start: 2017
  end: 2018
description: 'Rutte III coalition agreement (October 2017) proposed to abolish the 15% dividend withholding tax at a budget cost of ~EUR 1.9bn per year, framed as defending multinational headquarters location.
  After heavy criticism and Unilever''s October 2018 decision to consolidate in London regardless, the cabinet withdrew the measure and redirected the fiscal envelope to corporate-rate reductions and a
  Wet bronbelasting 2021 on low-tax-jurisdiction outflows.

  '
enacted_by:

description: 'The National Minimum Wage Act No. 9 of 2018, negotiated at NEDLAC under the Ramaphosa-led Deputy Presidency from 2015-2017 and signed into law in November 2018 to take effect 1 January 2019,
  introduced a statutory minimum wage of R20/hour (with lower tiers for farmworkers R18, domestic workers R15, EPWP R11). It capped sectoral-determination divergence and set an annual review mechanism.


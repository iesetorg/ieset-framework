policy_id: mexico_brady_plan_1989
status: candidate
title: Mexico Brady Plan 1989
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Mexico became the first country to restructure under the Brady Plan, exchanging roughly USD 48 billion of commercial-bank claims in 1989-1990 for collateralised "Brady bonds" with principal
  and interest guarantees backed by US Treasury zero-coupon securities. The deal reduced effective debt-service burdens, restored Mexico''s access to international capital markets, and was a precondition
  for the subsequent Salinas privatisation, trade-liberalisation, and NAFTA reform programme.

  '
enacted_by:
- mexico_salinas_nafta_neoliberal_1988_1994
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Restored capital-market access and IMF/World-Bank conditionality bound Mexico to ongoing trade liberalisation commitments.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Lowered debt servicing freed fiscal space for the privatisation drive that opened state-monopoly sectors to private bidders.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Brady bonds with US-Treasury collateral reaffirmed sovereign creditor rights and restored Mexico's contract reputation.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Resolution of the debt overhang was a prerequisite for ending Banxico's role as fiscal financier and for the 1993-1994 autonomy reform.

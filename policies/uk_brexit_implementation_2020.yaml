policy_id: uk_brexit_implementation_2020
status: candidate
title: UK Brexit implementation — EU-UK Trade and Cooperation Agreement 2020
countries:
- GBR
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-12-24'
description: 'Post-referendum-2016 withdrawal. UK formally left EU 31 January 2020; Transition Period ended 31 December 2020; TCA in force 1 January 2021. Created new trade friction with EU (customs checks,
  rules-of-origin certification, divergent regulatory surveillance) despite zero-tariff/zero-quota provision. Controlled end of free movement of labour. Empirical estimates (Bank of England, OBR, LSE CEP)
  find substantial goods-trade reduction and measurable GDP-per-capita shortfall vs counterfactual (~4-5% by 2024). Services trade less affected but financial-services single-market access curtailed. Canonical
  large-scale deliberate trade-closure case in developed economy.

  '
enacted_by:
- uk_brexit_2016_2020
coalition_label_at_enactment: Conservative majority (Johnson) — negotiated TCA

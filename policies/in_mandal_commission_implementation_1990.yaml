title: India Mandal Commission OBC reservations implementation 1990
countries:
- IND
timeframe:
  start: 1990
  enacted_date: '1990-08-07'
description: 'PM V.P. Singh announced 7 Aug 1990 implementation of 1980 Mandal Commission recommendations providing 27% reservation in central- government jobs for Other Backward Classes, on top of existing
  22.5% SC/ST reservations. Triggered violent anti-Mandal protests and self- immolations; Supreme Court in Indra Sawhney (1992) upheld 27% OBC quota subject to creamy-layer exclusion and 50% total reservation
  ceiling. Durable institutional reshaping of Indian public-service affirmative action.

  '

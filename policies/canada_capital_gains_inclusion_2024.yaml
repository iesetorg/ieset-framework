policy_id: canada_capital_gains_inclusion_2024
status: candidate
title: Canada Capital Gains Inclusion 2024
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Budget 2024 announced an increase in the capital-gains inclusion rate from 50% to 66.67% for corporations and trusts and for individuals on annual realised gains above C$250,000, effective
  25 June 2024. Originally tabled as part of finance minister Chrystia Freeland''s housing-affordability and "tax fairness" package, the measure was ultimately not enacted before the early 2025 parliamentary
  prorogation and has been deferred under the subsequent Liberal leadership transition.

  '

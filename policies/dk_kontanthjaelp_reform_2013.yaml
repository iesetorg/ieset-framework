  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Lower uddannelseshjælp tier and joint means-testing reduce transfer volume.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Education requirement and nytteindsats strengthen activation pressure.

policy_id: dk_kontanthjaelp_reform_2013
status: candidate
title: Kontanthjælpsreform 2013 — Danish youth cash-assistance reform
countries:
- DNK
timeframe:
  start: 2013
  end: ongoing
  enacted_date: '2013-06-28'
description: 'The 2013 Kontanthjælpsreform (L 223) restructured the Danish cash- assistance regime: recipients under 30 without an education were moved from kontanthjælp to a lower uddannelseshjælp level
  with an education requirement; cohabiting partners became jointly means-tested for benefit eligibility; a nytteindsats activation duty was introduced. Stated objective: shift younger unemployed recipients
  onto education tracks and raise labour-supply incentives within the flexicurity framework. Combined with the 2013 førtidspension-fleksjob reform to redirect younger disability-pension claimants to active
  tracks.

  '
enacted_by:
- denmark_thorning_socdem_2011_2015
coalition_label_at_enactment: Socialdemokratiet + Radikale Venstre + SF with Venstre, Liberal Alliance and Konservative support
axes_moved:

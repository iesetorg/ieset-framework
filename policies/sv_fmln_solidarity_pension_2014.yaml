policy_id: sv_fmln_solidarity_pension_2014
status: candidate
title: Fmln Solidarity Pension 2014
countries:
- SLV
timeframe:
  start: 2014
  end: 2019
description: 'The Pensión Básica Universal / Programa de Pensión Solidaria provided a non-contributory monthly cash transfer to elderly Salvadorans aged 70+ in poor rural municipalities lacking contributory
  coverage. Continued under the Sánchez Cerén FMLN government, the programme was administered through Fondo de Inversión Social para el Desarrollo Local and modeled on similar Latin American social pension
  schemes targeting old-age poverty.

  '

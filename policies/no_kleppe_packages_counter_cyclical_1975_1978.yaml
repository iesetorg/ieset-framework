status: candidate
title: Norwegian Kleppe-pakker counter-cyclical packages 1975-1978
countries:
- NOR
timeframe:
  start: 1975
  end: 1978
description: 'Series of counter-cyclical fiscal-and-subsidy packages designed by Finance Minister Per Kleppe to bridge Norway through the post-1973 downturn pending North Sea oil revenues. Combined direct
  subsidies to exposed industries, price-support schemes, employment programmes, and income-tax cuts, producing among the largest fiscal deficits in OECD during 1976-1977 and a current-account deficit near
  14% of GDP (1977). Succeeded in smoothing the cycle but proved unsustainable, leading to the September 1978 wage-price freeze.

  '

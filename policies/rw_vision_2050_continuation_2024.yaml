policy_id: rw_vision_2050_continuation_2024
status: candidate
title: Rwanda Vision 2050 continuation under NST2
countries:
- RWA
timeframe:
  start: 2024
  end: 2029
description: 'Rwanda continued Vision 2050 through the second National Strategy for Transformation cycle, keeping high-income convergence, urbanisation, services exports, agricultural productivity, and
  human-capital targets as the organising frame for Kagame''s 2024-2029 term. The strategy functions as a medium-term planning instrument with quantified delivery targets across ministries and districts
  rather than a single budget appropriation.

  '

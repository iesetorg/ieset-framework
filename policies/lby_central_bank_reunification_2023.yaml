policy_id: lby_central_bank_reunification_2023
status: candidate
title: Libya Central Bank reunification process 2023
countries:
- LBY
timeframe:
  start: 2023
  end: ongoing
description: 'The Central Bank of Libya announced steps to reunify its Tripoli and eastern branches after years of parallel balance sheets, competing fiscal claims, and duplicated monetary operations. The
  process aimed to restore a single sovereign monetary institution, consolidate accounts, improve transparency, and support countrywide payment and budget operations while wider political authority remained
  divided.

  '
enacted_by:
- libya_fragmented_institutions_central_bank_rent_management_2014_present
coalition_label_at_enactment: Central Bank of Libya reunification process under fragmented national authorities
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Reunifying branches and balance sheets strengthens technocratic central-bank authority relative to rival fiscal centres.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Axis semantic '+' is tighter financial regulation; a unified CBL improves supervision and payment-system governance.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Single-institution accounting is more rule-bound than parallel monetary authorities.
references:
- Central Bank of Libya, announcement on reunification process, 2023
- IMF, Libya Article IV consultation reports, 2023-2024
- World Bank Libya Economic Monitor, institutional fragmentation and central-bank reunification coverage
notes: Reunification is coded as a partial institutional process, not as settlement of Libya's rival-government dispute.

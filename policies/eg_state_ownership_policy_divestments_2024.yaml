policy_id: eg_state_ownership_policy_divestments_2024
status: candidate
title: State Ownership Policy Divestments 2024
countries:
- EGY
timeframe:
  start: 2024
  end: ongoing
description: 'Building on the 2022 State Ownership Policy and the augmented IMF EFF, the 2024 divestment cycle accelerated stake sales, including the headline ADQ-led USD 35bn Ras El Hekma deal and partial
  offerings in fertiliser, hotels, and financial services. Proceeds were used to retire central-bank dollar overdrafts and build FX reserves under Sisi''s third term.

  '
enacted_by:
- egypt_sisi_third_term_2024_present
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: FX inflows from divestments enabled CBE to unwind overdraft monetisation of the budget.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Discipline imposed by EFF reviews and divestment-funded buffers narrowed untargeted transfer growth.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Foreign equity participation in divested firms exposed protected sectors to international competition.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Strategic exclusions kept military and security-linked enterprises off the divestment slate.

status: candidate
title: Trump Deregulation Executive Orders 2017 2021
countries:
- USA
timeframe:
  start: 2017
  end: 2021
description: 'A series of executive orders during the first Trump administration imposed a "two-out, one-in" regulatory budget (EO 13771), required federal agencies to identify rules for repeal, and rolled
  back Obama-era regulations on environmental, labour, and financial domains. Notable rescissions included Clean Power Plan, methane rules, and joint-employer guidance. Agencies were directed to reduce
  regulatory burdens and curtail rule output.

  '

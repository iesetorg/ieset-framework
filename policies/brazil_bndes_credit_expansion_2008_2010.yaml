policy_id: brazil_bndes_credit_expansion_2008_2010
status: candidate
title: Brazil Bndes Credit Expansion 2008 2010
countries:
- BRA
timeframe:
  start: 2003
  end: 2010
description: 'Between 2008 and 2010 Brazil''s federal development bank BNDES expanded directed credit to large industrial groups, leveraging Treasury capitalisation under successive Provisional Measures
  and Lei 12.249/2010, in response to the global financial crisis. Subsidised TJLP-rate lending was concentrated in oil & gas, meatpacking, infrastructure and pulp, often via ''national champion'' equity
  stakes through BNDESPar. The intended effect was countercyclical credit support during the GFC, embedded in the Lula-era industrial policy framework.

  '
enacted_by:
- brazil_lula_da_silva_bolsa_familia_2003_2010
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Subsidy implicit in below-market TJLP lending operated as an industrial-policy transfer to corporates.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Implicit subsidy concentrated benefits in large champions; transparency-channel progressivity was modestly enhanced via mandates.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Large Treasury capital injections to BNDES expanded the consolidated public-sector financial footprint.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Use of Treasury rather than BCB instruments preserved formal independence of the central bank.

description: 'Under Decree 158/1983 the Cámara Federal tried the nine junta members in public proceedings 22 April - 9 December 1985 using CONADEP evidence. Videla and Massera received life sentences; Viola,
  Lambruschini, Agosti received shorter terms; Galtieri, Anaya, Lami Dozo, Graffigna were acquitted. First trial of a military junta by a civilian court in Latin America. Sentences reduced by 1989-90 Menem
  pardons; re-tried after 2003 nullity declarations.


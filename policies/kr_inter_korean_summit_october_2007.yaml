description: 'Second inter-Korean summit Pyongyang 2-4 October 2007 between Roh Moo-hyun and Kim Jong-il. 10.4 Declaration (Declaration on the Development of Inter-Korean Relations and Peace and Prosperity)
  signed 4 October 2007. Content: Kaesong Industrial Complex expansion, NLL-area joint fishing zone (contested), railway-shipping connectivity, replacement of 1953 Armistice with permanent peace regime
  (four-party framework), Hyundai Mt Kumgang tourism scale-up. Short implementation window — Lee Myung-bak (Grand National Party) elected December 2007 reversed Sunshine framework. Roh administration 2013
  declassification controversy alleged Roh offered to relinquish Northern Limit Line NLL claim.

  '

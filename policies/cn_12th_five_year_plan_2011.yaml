description: 'China''s 12th Five-Year Plan (2011-2015) approved at the National People''s Congress in March 2011 under the Hu-Wen leadership. Set targets shifting growth from export- and investment-led
  toward consumption-led, raised minimum wages, expanded social insurance coverage, designated seven Strategic Emerging Industries for industrial- policy support, and embedded environmental targets including
  a binding carbon-intensity reduction goal.

  '

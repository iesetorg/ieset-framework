policy_id: ke_affordable_housing_levy_2023
status: candidate
title: Affordable Housing Levy and Affordable Housing Act (2023-2024)
countries:
- KEN
timeframe:
  start: 2023
  enacted_date: '2024-03-19'
description: '1.5% payroll levy on gross salary matched by a 1.5% employer contribution, introduced via the Finance Act 2023 (Jul 2023 effective date). Ruled unconstitutional on 28 Nov 2023 by the High
  Court for lack of legal framework and discrimination between formal and informal sectors. Reinstated by the standalone Affordable Housing Act 2024 (assented 19 Mar 2024) which extended the levy to all
  income earners (including informal sector) and established the Affordable Housing Board. Funds earmarked for the 250k-unit-per-annum Affordable Housing Programme. A flagship but heavily contested pillar
  of the Ruto fiscal/industrial programme.

  '
enacted_by:
- kenya_ruto_uda_2022_present
coalition_label_at_enactment: Kenya Kwanza
axes_moved:

policy_id: uae_difc_adgm_financial_zones_2004_2015
status: candidate
title: Difc Adgm Financial Zones 2004 2015
countries:
- ARE
timeframe:
  start: 1971
  end: ongoing
description: 'Establishment of the Dubai International Financial Centre (DIFC, 2004) and Abu Dhabi Global Market (ADGM, 2015) as financial free zones with independent common-law jurisdictions, dedicated
  regulators (DFSA, FSRA), and English-language commercial courts. The zones offered tax exemptions, 100% foreign ownership, and English common-law contract enforcement to attract global banks, asset managers,
  and fintechs to the region.

  '
enacted_by:
- uae_emirate_state_capitalism_1971_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: DIFC/ADGM common-law jurisdictions opened financial-services market to foreign banks and asset managers.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: 100% foreign ownership and tax exemptions in the zones lowered barriers to cross-border financial trade.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Zero-tax guarantees in DIFC/ADGM created a dedicated low-tax regime for licensed financial entities.
- axis: monetary.central_bank_independence
  direction: mixed
  magnitude: weak
  intended: true
  rationale: DFSA/FSRA operate independently of UAE Central Bank, fragmenting prudential supervisory authority.

policy_id: us_medicare_1965
status: candidate
title: Medicare 1965
countries:
- USA
timeframe:
  start: 1964
  end: 1968
description: 'Medicare was established by Title XVIII of the Social Security Amendments of 1965 (Pub. L. 89-97) as a federal social-insurance program providing hospital insurance (Part A) and supplementary
  medical insurance (Part B) for Americans aged 65 and older. Funded primarily through dedicated payroll taxes (FICA-HI) and beneficiary premiums, the program was administered by the Social Security Administration
  and later by HCFA/CMS, becoming the largest single federal health-finance commitment.

  '

policy_id: japan_oecd_accession_1964
status: candidate
title: Japan Oecd Accession 1964
countries:
- JPN
timeframe:
  start: 1952
  end: 1975
description: 'Japan joined the OECD in April 1964, accepting the Code of Liberalisation of Capital Movements and the Code of Liberalisation of Current Invisible Operations on a phased basis. Membership
  obliged Japan to dismantle parts of the 1949 Foreign Exchange Control Law''s restrictions on capital inflows, FDI and invisibles, although MITI/MOF retained extensive screening tools well into the 1970s.
  Accession is treated historically as the formal endpoint of Japan''s reconstruction-era controlled-economy posture.

  '
enacted_by:
- japan_post_war_meti_industrial_policy_1952_1975
axes_moved:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: Capital-account liberalisation triggered protective sectoral screens to manage incoming FDI.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Liberalised invisibles and capital movements while goods trade remained partly managed.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Government countered new openness with industry-specific subsidies and consolidation policies.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: BOJ continued to operate under MOF instruction with limited operational independence.

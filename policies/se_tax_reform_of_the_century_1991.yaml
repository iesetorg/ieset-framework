description: 'Feldt''s century reform cut top marginal income-tax rate from ~80% to 50%, introduced flat 30% capital-income tax, broadened the VAT base, and cut corporate rate to 30%. Largest tax reform
  of the Swedish postwar era; implemented 1991.

  '

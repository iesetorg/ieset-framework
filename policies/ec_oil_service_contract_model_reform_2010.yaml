policy_id: ec_oil_service_contract_model_reform_2010
status: candidate
title: Ecuador oil contract migration from production-sharing to service model
countries:
- ECU
timeframe:
  start: 2010
  enacted_date: '2010-07-27'
description: 'Ley Reformatoria a la Ley de Hidrocarburos (27 Jul 2010) + associated regulation required renegotiation of existing production-sharing contracts into service-contract model. Private operators
  paid flat per-barrel service fee; state (Petroecuador) became owner of all produced crude. Petrobras + CNPC + others renegotiated; Perenco + City Oriente + others exited, triggering ICSID arbitrations
  (Perenco award 2019 USD 449m, Oxy award 2012 USD 1.77bn).

  '
enacted_by:
- ecuador_correa_alianza_pais_i_2007_2013
coalition_label_at_enactment: Alianza PAIS
axes_moved:

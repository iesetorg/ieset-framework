  direction: '-'
  magnitude: moderate
  rationale: Forced contract renegotiation + expropriation exits triggered multiple ICSID awards.
  intended: true
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  rationale: Sector regulator + state-operator control deepened.
  intended: true
references:

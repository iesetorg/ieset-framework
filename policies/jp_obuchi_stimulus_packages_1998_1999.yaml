policy_id: jp_obuchi_stimulus_packages_1998_1999
status: candidate
title: Obuchi-era supplementary stimulus packages 1998-1999
countries:
- JPN
timeframe:
  start: 1998
  end: 1999
  enacted_date: '1998-11-16'
description: 'Sequence of fiscal-stimulus supplementary budgets under PM Obuchi: ¥16.7tn Comprehensive Economic Package (April 1998, transitional from Hashimoto), ¥23.9tn Emergency Economic Package (November
  1998), and ¥18tn "Year of the Golden Pig" supplementary budget (November 1999) of which ¥6.5tn was "real water" public works. Combined real-water fiscal impulse ~7% of GDP. Debt-to-GDP rose from ~100%
  (1997) to ~135% (2000). Funded through construction- bond issuance and extension of underwriting by BoJ secondary- market purchases.

  '

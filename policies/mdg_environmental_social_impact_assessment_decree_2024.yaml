description: 'Madagascar issued a new decree on environmental and social impact assessments under its climate and investment reform agenda. The measure updated project appraisal requirements so public and
  private investments would face clearer screening, mitigation, and consultation obligations before approval, especially for infrastructure and natural-resource projects.

  '

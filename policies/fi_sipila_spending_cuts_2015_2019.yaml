policy_id: fi_sipila_spending_cuts_2015_2019
status: candidate
title: Sipila Spending Cuts 2015 2019
countries:
- FIN
timeframe:
  start: 2015
  end: 2019
description: 'Prime Minister Juha Sipilä''s centrist coalition (2015-2019) implemented €4bn of consolidation, including the ''Competitiveness Pact'' (Kiky-sopimus, 2016) which cut public-sector holiday
  pay, lengthened working hours unpaid by 24 hours per year, and shifted social-security contributions from employers to employees. Companion spending cuts targeted education, R&D and unemployment benefits,
  with corporate tax held at 20%. The intended effect was to reduce unit labour costs, restore export competitiveness after the 2008-2014 slump, and meet EU fiscal targets.

  '

policy_id: ar_fernandez_ife_covid_transfer_2020
status: candidate
title: Ingreso Familiar de Emergencia (IFE) COVID transfer (2020)
countries:
- ARG
timeframe:
  start: 2020
  end: 2020
  enacted_date: '2020-03-24'
description: 'Emergency cash transfer of ARS 10,000 per household paid in three instalments during 2020 to informal workers, monotributistas of lowest categories, domestic workers and unemployed. Reached
  ~9 million beneficiaries (~20% of population). Financed entirely by BCRA monetary emission. Complemented by ATP wage subsidy for formal employers, price-freeze extensions and rent-eviction moratorium.
  IFE was discontinued late 2020 but seeded a permanent expansion in downstream transfer programmes (Tarjeta Alimentar, Potenciar Trabajo).

  '

policy_id: ru_progressive_tax_reform_2025
status: candidate
title: Russia 2025 progressive income-tax and profit-tax reform
countries:
- RUS
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2024-07-12'
description: Federal Law No. 176-FZ amended the Russian Tax Code for 2025 by replacing the mostly flat personal income tax structure with a broader progressive schedule and raising the corporate profit-tax
  rate from 20 percent to 25 percent. The personal income schedule kept 13 percent for lower taxable income, retained a 15 percent band above the previous high-income threshold, and added higher 18, 20,
  and 22 percent rates for upper brackets. The law also adjusted mineral extraction, simplified-tax, and excise provisions to raise revenue for the fifth-term budget while the war-economy spending baseline
  expanded.
enacted_by:
- russia_putin_fifth_term_2024_present
coalition_label_at_enactment: United Russia / Putin fifth term
axes_moved:
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: strong
  intended: true
  rationale: The reform introduced additional upper personal-income-tax brackets up to 22 percent.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: The corporate profit-tax rate rose from 20 percent to 25 percent from 2025.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenue increases were part of financing a larger fifth-term federal spending baseline.
references:

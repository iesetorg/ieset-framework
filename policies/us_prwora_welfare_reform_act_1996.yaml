description: 'End welfare as an entitlement; replace AFDC with block-granted TANF with work requirements + time limits. Expanded EITC (1993, 1996) as work-incentivising transfer. The D.3.1 canonical case
  of a Democratic coalition enacting market- oriented welfare reform. Outcome: labour force participation rose, child poverty fell until 2008 crisis.'

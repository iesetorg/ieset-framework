policy_id: it_youth_guarantee_implementation_2013
status: candidate
title: Italy Youth Guarantee implementation
countries:
- ITA
timeframe:
  start: 2013
  end: 2016
  enacted_date: '2014-05-01'
description: 'National implementation of the EU Youth Guarantee (Council Recommendation Apr 2013) under the Letta government and continued under Renzi. Targeted NEET 15-29 cohort offering employment, apprenticeship,
  training or continued-education place within 4 months of unemployment registration. Italian programme budget €1.5bn (EU + national) for 2014-2015; extensive regional heterogeneity in implementation. Assessed
  by OECD/EC as moderately effective on north-centre activations, weaker in southern regions.

  '

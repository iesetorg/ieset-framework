policy_id: cn_platform_crackdown_2020
status: candidate
title: Platform Crackdown 2020
countries:
- CHN
timeframe:
  start: 2012
  end: ongoing
description: 'Regulatory campaign launched in late 2020 against China''s large internet platforms, beginning with the suspension of the Ant Group IPO and including antitrust action against Alibaba (record
  fine 2021), data-security review of Didi, restrictions on edtech and gaming hours, and broader ''common prosperity'' enforcement. Conducted by SAMR, CAC, and other agencies; reshaped the operating environment
  for the technology sector.

  '
enacted_by:
- china_xi_era_2012_present
axes_moved:

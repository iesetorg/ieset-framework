  direction: '-'
  magnitude: weak
  intended: true
  rationale: Ad-hoc enforcement chilled platform investment and made entry/expansion politically risky.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Cybersecurity reviews and data-export licensing dramatically increased pre-launch friction.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: State-favoured 'hard tech' sectors received industrial-policy support diverted from platform sector.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Data-localisation and cross-border-listing restrictions reduced openness of digital trade and capital.

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: de_mietpreisbremse_2015
status: candidate
title: Germany Mietpreisbremse rent-cap law (2015)
countries:
- DEU
timeframe:
  start: 2015
  end: 2025
  enacted_date: '2015-06-01'
description: 'Mietrechtsnovellierungsgesetz of 1 June 2015 enabling Länder to designate ''tight housing markets'' in which new rental contracts cannot exceed the local reference rent by more than 10%, with
  exceptions for new builds and first-rentals after substantial modernisation. Extended multiple times (2019, 2020, 2025). Targeted Berlin, Munich, Hamburg, and other conurbations.

  '
enacted_by:
- germany_merkel_iii_2013_2017
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Rent ceiling reduces landlord-side pricing flexibility; empirical evidence on supply effect mixed.
- axis: regulatory.housing_rent_control
  direction: +
  magnitude: moderate
  intended: true
  rationale: New rental contracts in designated tight markets capped at 10% above local reference rent, with new-build and modernization exemptions.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Indirect transfer from landlords to tenants in designated markets.
evaluation_design:
  design_features:
  - controlled_vs_uncontrolled_units
  - adjacent_market_comparison
  - high_frequency_event_study
  - triple_difference
  - welfare_accounting
  - distributional_decomposition
  - leakage_substitution
  regulated_units:
  - new rental contracts in Länder-designated tight housing markets
  - renewal or reletting contracts covered by the 10%-above-reference cap
  exempt_or_uncontrolled_units:
  - first rentals in new construction
  - substantially modernized units
  - non-designated local markets
  comparison_markets:
  - treated tight markets vs non-designated German cities
  - regulated existing units vs exempt newbuild/modernized units
  - Berlin, Munich, Hamburg and other treated conurbations vs donor cities
  event_dates:
  - 2015-06-01 Mietpreisbremse effective
  - 2019 amendment
  - 2020 extension
  - 2025 extension
  second_order_outcomes:
  - regulated vs exempt rent growth
  - new-build permits and completions
  - rental listings and vacancy duration
  - modernization, condo conversion, and furnished-rental leakage
  - tenant mobility and incumbent-vs-entrant incidence
  distributional_groups:
  - incumbent tenants
  - new renters
  - uncovered renters
  - landlords and developers
  - future households
  known_data_gaps:
  - unit-level regulated/exempt classification
  - listings linked to exemption status
  - city-level mobility and quality/maintenance measures
  notes: 'The statutory new-build and modernization exemptions make this a natural triple-difference candidate: treated city vs donor city, regulated vs exempt units, before vs after 2015.

    '
references:
- Mietrechtsnovellierungsgesetz (Apr 2015)
- DIW Wochenbericht 22/2018 on Mietpreisbremse effects

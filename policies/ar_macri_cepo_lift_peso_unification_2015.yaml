  enacted_date: '2015-12-17'
description: 'One week after inauguration, the Macri government lifted the cepo cambiario capital-account restrictions in force since 2011, allowing free purchase of foreign currency and unifying the official
  and parallel exchange rates. The peso depreciated ~40% against the dollar (from ~9.8 to ~13.9 ARS/USD). BCRA Communications "A" 5850 and subsequent reversed the quantitative FX access limits and deposit-remittance
  restrictions on firms and individuals.

  '

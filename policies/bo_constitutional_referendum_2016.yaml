  enacted_date: '2016-02-21'
description: 'Referendum held February 21, 2016 asking voters whether to amend Article 168 of the 2009 Constitution to allow continuous re-election of the President and Vice-President. The "No" side won
  51.3% to 48.7% with high turnout, preserving the two-consecutive-term limit. MAS initially accepted the result but by 2017 had pursued a Constitutional Court ruling that effectively reversed it. The date
  "21F" became a civic rallying symbol for the subsequent 2019 opposition protests.

  '

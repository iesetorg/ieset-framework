policy_id: uk_vat_private_school_fees_2025
status: candidate
title: UK VAT on private school fees 2025
countries:
- GBR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-01-01'
description: 'From 1 January 2025, 20% VAT applies to private-school education and boarding services — ending a long-standing exemption. Business rates charitable relief (80%) removed from private schools
  in England from April 2025. Announced in Labour''s 2024 manifesto and enacted in Finance Act 2024-25; HMG estimated ~£1.5-1.7bn/year additional revenue earmarked for recruitment of 6,500 state-school
  teachers. Challenged in the High Court (Education Not Taxation and others); upheld June 2025. Empirical fee pass-through and enrolment response still being measured.

  '

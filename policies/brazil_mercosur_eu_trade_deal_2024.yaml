policy_id: brazil_mercosur_eu_trade_deal_2024
status: candidate
title: Brazil Mercosur Eu Trade Deal 2024
countries:
- BRA
timeframe:
  start: 2023
  end: ongoing
description: 'In December 2024 the Mercosur–EU Association Agreement was politically concluded after 25 years of negotiation, covering Brazil, Argentina, Paraguay, Uruguay, and the European Union. It commits
  to removing tariffs on roughly 90% of bilateral trade over 10–15 years, opens EU agricultural quotas for South American beef, poultry, sugar, and ethanol, and includes Paris Agreement and deforestation
  side-letters. The deal still requires ratification across EU member states and remains a Lula third term external-economic centerpiece.

  '

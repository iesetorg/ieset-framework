# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mar_administrative_agrarian_consolidation_1956_1969
status: candidate
title: Morocco administrative and agrarian consolidation after independence
countries: [MAR]
timeframe: {start: 1956, end: 1969}
description: >
  After independence, the monarchy rebuilt central administration, integrated
  former protectorate institutions, managed recovery of colonial land, and used
  provincial governance and rural notable networks to stabilise the countryside.
  The policy bundle strengthened palace-centred territorial control while
  leaving a mixed property regime in agriculture and commerce.
enacted_by:
  - morocco_hassan_ii_monarchy_mixed_economy_1956_1999
axes_moved:
  - axis: institutional.rule_of_law
    direction: "mixed"
    magnitude: weak
    intended: true
    rationale: "Formal national administration expanded, but executive discretion remained central to political and land allocation decisions."
  - axis: institutional.property_rights
    direction: "mixed"
    magnitude: weak
    intended: true
    rationale: "Private property was preserved, while colonial-land recovery and discretionary redistribution created uneven tenure security."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "Administrative integration and rural development widened the state's ordinary and capital spending role."
references:
  - "Waterbury (1970), The Commander of the Faithful"
  - "Pennell (2000), Morocco Since 1830"

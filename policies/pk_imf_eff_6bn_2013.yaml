title: IMF Extended Fund Facility — Pakistan $6.64bn (2013)
countries:
- PAK
timeframe:
  start: 2013
  end: 2016
  enacted_date: '2013-09-04'
description: 'IMF Extended Fund Facility of $6.64bn over 36 months, approved by the IMF Executive Board on 4 September 2013 at the start of the Nawaz Sharif PML-N third term. Programme pulled FX reserves
  from under two weeks of import cover to roughly five months, pushed fiscal deficit from 8.2% to 4.6% of GDP over the programme horizon, and anchored disinflation from ~8% to ~4%. Revenue measures were
  led by GST rate widening and administrative withholding expansion rather than direct-tax base broadening. Programme concluded in September 2016 after eleven successful reviews.

  '

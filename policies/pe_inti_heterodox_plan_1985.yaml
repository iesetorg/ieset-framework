description: 'Replaced sol with inti at 1 to 1,000 (1 August 1985). Froze prices, wages, exchange rate (initial 12% devaluation then fixed at 13.95 I/USD), introduced multiple-exchange-rate system (MUC
  official plus financial), interest-rate controls, and expansionary fiscal stance. GDP rebound 9.7% (1986), 6.9% (1987) via capacity utilisation. Began unravelling late 1987 as reserves depleted.


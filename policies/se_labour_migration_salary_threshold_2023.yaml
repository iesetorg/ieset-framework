policy_id: se_labour_migration_salary_threshold_2023
status: candidate
title: Labour migration median-wage salary threshold (Sweden 2023)
countries:
- SWE
timeframe:
  start: 2023
  enacted_date: '2023-11-01'
description: 'Effective 1 November 2023 the minimum salary for non-EU labour migration permits raised to 80% of the Swedish median wage (approx 27,360 SEK/month at introduction), with announced trajectory
  to 100% of median. Designed to eliminate low-wage labour migration streams, reduce sectoral reliance on non-EU labour in restaurants, cleaning, and berry-picking, and steer recruitment toward qualified
  roles.

  '
enacted_by:
- sweden_kristersson_rightbloc_2022_present
coalition_label_at_enactment: M + KD + L cabinet with SD support (Tido)
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Sharp salary-floor restriction on non-EU labour permits.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Reduced low-wage labour supply in affected sectors.

title: Japan Central Government Reorganisation Reform 2001
countries:
- JPN
timeframe:
  start: 2001
  end: 2001
  enacted_date: '2001-01-06'
description: 'Central Government Reform effective 6 January 2001 consolidating 22 ministries and agencies into 12 ministries (plus Cabinet Office). Strengthened Cabinet Office with Council on Economic and
  Fiscal Policy (CEFP), Council for Science and Technology Policy, and Gender Equality Bureau. Created Ministry of Land, Infrastructure and Transport (MLIT), Ministry of Education, Culture, Sports, Science
  and Technology (MEXT), and Ministry of Economy, Trade and Industry (METI, ex-MITI). Designed to strengthen political leadership over administrative ministries ahead of the Koizumi-era reform push.

  '

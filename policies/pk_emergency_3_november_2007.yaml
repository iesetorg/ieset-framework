title: Pakistan 3 November 2007 emergency / PCO and judicial purge
countries:
- PAK
timeframe:
  start: 2007
  end: 2008
  enacted_date: '2007-11-03'
description: 'Provisional Constitutional Order (PCO) and Proclamation of Emergency issued 3 November 2007 by Musharraf (as Army Chief rather than President). Suspended Constitution, required judges to take
  fresh oath under PCO. Chief Justice Iftikhar Chaudhry and ~60 senior judges refused PCO oath; detained in their residences. Deployment motivated by expectation that Supreme Court would rule Musharraf''s
  October 2007 presidential election invalid. Free media suspended; Article 19 constitutional rights suspended. Benazir Bhutto''s return from exile 18 October 2007 triggered Karachi bombing same day killing
  139; second assassination attempt on Bhutto 27 December 2007 succeeded. Emergency lifted 15 December 2007 after successor-CJ Abdul Hameed Dogar appointed. February 2008 elections defeated PML-Q (54/272)
  as PPP (119) and PML-N (91) formed coalition government; Supreme Court judges reinstated under Zardari 2009 after Lawyers'' Movement.

  '

policy_id: br_eletrobras_privatisation_lei14182_2021
status: candidate
title: Eletrobras privatisation — Lei 14.182/2021
countries:
- BRA
timeframe:
  start: 2021
  end: 2022
  enacted_date: '2021-07-13'
description: 'Lei 14.182/2021 authorised the privatisation of Centrais Elétricas Brasileiras S.A. (Eletrobras) via capital-increase (follow-on offering) diluting the federal stake from ~60% to ~45%. The
  share offering was executed in June 2022, raising ~R$33.7bn and making Eletrobras a corporation with no controlling shareholder (golden share preserved for the Union). Conditions attached included mandatory
  thermal-plant contracting and river-basin revitalisation funds — the latter criticised by orthodox analysts as jabutis raising transaction cost.

  '
enacted_by:
- brazil_bolsonaro_pl_2019_2022
coalition_label_at_enactment: PL with Centrão partners under Bolsonaro

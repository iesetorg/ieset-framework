  rationale: HICOM heavy-industry build-out (Perwaja, Proton, Kedah Cement).
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Public-sector deficit rose to ~15% GDP 1982-1983 financing flagship projects.

policy_id: my_fourth_malaysia_plan_1981_1985
status: candidate
title: Fourth Malaysia Plan (1981-1985)
countries:
- MYS
timeframe:
  start: 1981
  end: 1985
description: 'EPU plan covering 1981-1985 under NEP Phase II. Heavy-industrialisation drive through HICOM (Perwaja Steel, Kedah Cement, Proton). GDP growth ~5.2% annual, below 7.6% target. Commodity-price
  collapse 1985 (rubber, palm oil, tin) drove 1986 recession; plan shortfall forced 1985 mid-term review and New Economic Policy recalibration toward investment-incentive regime (Promotion of Investments
  Act 1986).

  '
enacted_by:

description: 'Rise of the German standard VAT (Umsatzsteuer/Mehrwertsteuer) rate from 16% to 19% as of 1 January 2007, legislated by the Merkel I CDU/CSU-SPD coalition. Part of the revenue package financing
  a modest unemployment- insurance contribution cut (6.5%→4.2%) and contributing ~€24bn/year to federal budget, instrumental in bringing Germany back within the EU 3%-of-GDP deficit limit ahead of the 2008
  crisis.

  '

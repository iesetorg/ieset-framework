policy_id: nl_covid_fiscal_response_now_tvl_2020_2022
status: candidate
title: Netherlands COVID-19 fiscal response (NOW / TVL / tax deferral) 2020-2022
countries:
- NLD
timeframe:
  start: 2020
  end: 2022
description: 'Largest Dutch peacetime fiscal intervention. NOW (Tijdelijke Noodmaatregel Overbrugging Werkgelegenheid) wage-subsidy programme across six tranches; TOGS/TVL sector grants for fixed-cost relief;
  BMKB-C credit guarantees; comprehensive tax deferral (belastinguitstel) for affected businesses that at peak exceeded EUR 20bn. Total gross measures ~EUR 80bn. Debt/GDP rose from ~48% (2019) to ~54% (2021);
  labour-market scarring kept notably limited relative to 2008-09.

  '
enacted_by:
- netherlands_rutte_iii_2017_2022
coalition_label_at_enactment: VVD-CDA-D66-ChristenUnie (including caretaker phase 2021)
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: EUR ~80bn gross fiscal measures; structural deficit opened 2020-2021 before normalisation.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  intended: true
  rationale: NOW wage subsidies and TVL sector grants as large one-off targeted transfers.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: false
  rationale: NOW conditionality discouraged dismissals, temporarily reducing hire-and-fire margin.
references:
- NOW-regeling 1-6 (Ministerie van SZW, 2020-2022)
- TVL-regeling (RVO, 2020-2022)
- Belastinguitstel coronamaatregelen 2020-2022

description: 'The Costa government created the SNS Direção Executiva (Executive Directorate) in 2022 as a centralised governance body for Portugal''s Serviço Nacional de Saúde, separating operational management
  from the Ministry of Health. Enacted via Decree-Law and the new SNS Statute, it consolidated regional health authorities under unified executive coordination to address service-delivery fragmentation.

  '

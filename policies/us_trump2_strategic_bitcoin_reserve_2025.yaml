status: candidate
title: Trump2 Strategic Bitcoin Reserve 2025
countries:
- USA
timeframe:
  start: 2025
  end: ongoing
description: 'An executive order in March 2025 established a Strategic Bitcoin Reserve and a separate Digital Asset Stockpile to be funded with bitcoin and other digital assets seized by federal law enforcement,
  with a directive that the government not sell holdings. Treasury and Commerce were tasked with developing budget-neutral acquisition strategies. The order positioned cryptocurrency as a sovereign reserve
  asset alongside traditional reserves.

  '

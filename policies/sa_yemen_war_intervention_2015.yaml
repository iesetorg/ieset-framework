status: candidate
title: Yemen war coalition intervention
countries:
- SAU
timeframe:
  start: 2015
  end: ongoing
  enacted_date: '2015-03-26'
description: 'Launch of Operation Decisive Storm March 2015, a Saudi-led coalition military intervention against Houthi forces in Yemen following their seizure of Sanaa. Architected by then-Defence Minister
  MBS. Drove sustained defence-spending elevation (Saudi military spending peaked near 12-13% of GDP in 2015-2016), contributed to the fiscal deficit of 2015-2016, and locked in a long-run security burden.
  De-escalation UN-brokered truce from April 2022; Saudi-Houthi direct talks ongoing through 2023-2024.

  '

  direction: +
  magnitude: strong
  intended: true
  rationale: Guidance-fund apparatus + IC Big Fund + NEV subsidies + directed state-bank credit.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Strategic-sector gating of foreign entry coupled with domestic champion promotion.
- axis: regulatory.trade_openness

policy_id: cn_made_in_china_2025_2015
status: candidate
title: Made in China 2025 (中国制造2025)
countries:
- CHN
timeframe:
  start: 2015
  end: ongoing
  enacted_date: '2015-05-08'
description: 'State Council industrial-policy plan setting indigenous-innovation and domestic-content targets across ten strategic sectors: next- generation IT, robotics, aerospace, maritime equipment,
  advanced rail transport, NEVs, power equipment, agricultural machinery, new materials, and biomedicine. Deployed through state-bank directed credit, government guidance funds (政府引导基金, aggregate ~RMB 10trn
  by 2020), tax preferences, mandatory technology-transfer expectations, and procurement preference. Central trigger of the 2018+ US-China technology-policy confrontation and the framing template later
  rebranded as "new quality productive forces" (2023-). The plan''s public-facing naming was downplayed after 2018 but core programmatic content (IC Big Fund, NEV subsidies, sectoral guidance funds) continued
  and in several sectors accelerated.

  '
enacted_by:
- china_xi_era_2012_present
coalition_label_at_enactment: CCP under Xi Jinping + Li Keqiang
axes_moved:

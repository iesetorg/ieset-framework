description: 'Annual CPI accelerated from 200% (1988) to ~1,300% (1989) as the Mikulić government monetised enterprise losses and republican central-bank outposts issued unbacked dinar credits to favoured
  enterprises. One of the five largest hyperinflations of the post- war period. Ended by Marković''s January 1990 programme: currency reset (10,000:1 redenomination), DM peg, wage freeze, and price liberalisation.

  '

policy_id: us_auto_bailout_gm_chrysler_2009
status: candidate
title: GM + Chrysler managed bankruptcies and federal rescue
countries:
- USA
timeframe:
  start: 2009
  enacted_date: '2009-06-01'
description: 'Treasury deployed ~USD 80bn from TARP to General Motors + Chrysler. Chrysler Chapter 11 filed 30 Apr 2009, emerged 10 Jun 2009 with Fiat alliance. GM Chapter 11 filed 1 Jun 2009, emerged 10
  Jul 2009 with US Treasury holding 60.8% equity. Contentious senior-creditor treatment (UAW VEBA benefited over bondholders). Treasury divested final GM stake Dec 2013 at ~USD 10.5bn net loss. Preserved
  ~1m supply-chain jobs per Treasury estimates.

  '

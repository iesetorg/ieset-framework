title: Irish Corporate Tax reduction programme 1987-2003
countries:
- IRL
timeframe:
  start: 1987
  end: 2003
  enacted_date: '1987-10-01'
description: 'Sequential reductions in Irish corporate tax from 50% (1987) to 12.5% unified rate (2003), alongside IDA Ireland active investment- attraction programme. Combined with EU single-market access
  (1993), native English-language workforce, and educated pool from 1980s-90s expansion of Irish higher education. Result: massive FDI accumulation, especially in pharmaceuticals, IT, and financial services.
  GDP per capita surged from well below EU average 1987 to among highest globally by 2010s. Critics note: (a) GDP measure distorted by profit-routing of US multinationals (GNI* now preferred by Irish CSO),
  (b) distributional benefits to native workforce contested, (c) tax-base erosion for partner EU states.

  '

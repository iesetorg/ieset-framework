policy_id: argentina_pension_renationalisation_2008
status: candidate
title: Argentina Pension Renationalisation 2008
countries:
- ARG
timeframe:
  start: 2003
  end: 2015
description: 'Law 26.425 (December 2008) abolished the AFJP private pension system created by the 1993 Menem reform and transferred all individual capitalisation accounts and their financial assets to the
  state pay-as-you-go regime administered by ANSES. The state thereby absorbed roughly USD 30 billion in equities and bonds, gaining a strategic equity stake in major listed firms and a significant new
  flow of contributions.

  '
enacted_by:
- kirchner_fernandez_expansionary_2003_2015
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: ANSES absorbed AFJP liabilities and benefit obligations, expanding state pension outlays.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Universalised PAYG access widened the population entitled to state pension transfers.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State directly acquired equity stakes in large listed firms, distorting corporate-governance markets.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: weak
  intended: true
  rationale: ANSES holdings became a captive financing pool for Treasury borrowing, complementing BCRA monetisation.

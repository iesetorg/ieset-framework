title: Greece ENFIA property-tax cumulative reduction 2019-2024
countries:
- GRC
timeframe:
  start: 2019
  end: 2024
  enacted_date: '2022-04-08'
description: 'Sequential reductions of the Unified Real-Estate Property Tax (ENFIA, introduced under the Samaras government in Law 4223/2013) executed across the Mitsotakis terms. Cumulative cut c.30-50%
  depending on property category via: 22% cut for 2019 owners of primary residence up to €60k value; 8% further cut for 2020-2021; the 2022 reform (Law 4916/2022) rebased ENFIA on updated ''objective values''
  for property tax, simplified the coefficient grid, shifted supplementary tax onto legal-entity holdings, and delivered average 13% household cut with larger cuts for middle-value properties; further targeted
  relief 2023-2024 for earthquake-affected areas and for insured properties (50% reduction 2024 if natural-disaster insurance held).

  '

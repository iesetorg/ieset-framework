status: candidate
title: Economic Recovery Tax Act 1981 + Tax Reform Act 1986
countries:
- USA
timeframe:
  start: 1981
  end: 1986
  enacted_date: '1981-08-13'
description: 'Two-stage supply-side tax reform. ERTA 1981 cut top marginal individual income tax from 70% to 50% (phased), introduced accelerated depreciation, and indexed brackets. TRA 1986 further cut
  the top rate to 28%, broadened the base by eliminating many deductions, and reduced corporate rate from 46% to 34%. Accompanied by Volcker disinflation and substantial regulatory retrenchment. Credited
  by proponents with the 1983-1989 recovery and sustained subsequent growth; critics attribute outcomes more to monetary normalisation post-Volcker.

  '

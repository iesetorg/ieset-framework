title: Greece Hatzidakis labour-flexibility law 4808/2021
countries:
- GRC
timeframe:
  start: 2021
  enacted_date: '2021-06-16'
description: 'Law 4808/2021 (Hatzidakis labour reform) introducing: digital work- card with real-time arrival/departure registration; time-account arrangements permitting up to 10-hour workdays averaged
  down within six-month reference periods; voluntary overtime hours raised to 150 per year; simplified individual-redundancy procedure; fast-track union-election digital platform; Istanbul Convention ratification
  translation on workplace harassment; right-to-disconnect for telework; digital-signature employment contracts. Enacted against strong union (GSEE) opposition but passed with ND majority. Framed by the
  government as aligning Greek labour regulation with EU median after the Memorandum-era reforms had been partially unwound under Tsipras (Law 4611/2019 pre-election partial restoration of dismissal ''just
  cause'' requirement).

  '

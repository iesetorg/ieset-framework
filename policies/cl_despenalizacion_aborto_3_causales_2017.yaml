description: 'Ley 21.030 enacted in September 2017 under the second Bachelet government, partially decriminalising abortion in three circumstances: risk to the woman''s life, fatal foetal pathology, and
  pregnancy resulting from rape. Replaced Chile''s prior absolute prohibition (in force since 1989) and set out a public-health protocol for terminations in the public hospital system.

  '

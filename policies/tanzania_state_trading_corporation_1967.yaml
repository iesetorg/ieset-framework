policy_id: tanzania_state_trading_corporation_1967
status: candidate
title: Tanzania State Trading Corporation 1967
countries:
- TZA
timeframe:
  start: 1967
  end: 1985
description: 'The State Trading Corporation (STC) was created in 1967 immediately after the Arusha Declaration to take over wholesale import-export trade from foreign private firms. STC operated as a public
  monopoly purchasing imports for distribution through cooperative and state retail networks and channelling export receipts to the Treasury, becoming the principal foreign-trade vehicle of the ujamaa economy
  until restructured in the 1980s.

  '
enacted_by:
- tanzania_nyerere_ujamaa_1967_1985
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: STC monopoly displaced private wholesale traders from the import-export market.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Foreign and Asian-owned trading houses were nationalised into the state corporation.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Trading surpluses funded social spending and parastatal cross-subsidies.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Centralisation channelled trade through one state buyer, restricting open commerce.

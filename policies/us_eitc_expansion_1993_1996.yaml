policy_id: us_eitc_expansion_1993_1996
status: candidate
title: Eitc Expansion 1993 1996
countries:
- USA
timeframe:
  start: 1996
  end: 2001
description: 'The Earned Income Tax Credit was substantially expanded in OBRA-1993 — phasing in a higher three-or-more-children credit, raising the maximum credit, and lowering the phase-in earnings required
  — and was preserved through the 1996 welfare-reform debate as the principal work-conditioned income support for low-wage households. Together with the 1996 PRWORA shift to TANF, the expanded EITC restructured
  the U.S. anti-poverty system around employment-conditioned tax credits rather than open-ended cash assistance.

  '

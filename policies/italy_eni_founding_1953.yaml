policy_id: italy_eni_founding_1953
status: candidate
title: Italy Eni Founding 1953
countries:
- ITA
timeframe:
  start: 1950
  end: 1970
description: 'Law 136 of 10 February 1953 established Ente Nazionale Idrocarburi (ENI) as a state holding company consolidating AGIP and other public hydrocarbon assets, with a statutory monopoly on Po
  Valley natural-gas exploration and an explicit mandate to secure Italian energy independence. Under founder Enrico Mattei, ENI pursued aggressive overseas oil-supply contracts on terms more generous to
  host countries than the "Seven Sisters" majors and built downstream petrochemical and service-station networks.

  '
enacted_by:
- italian_economic_miracle_1950_1970
- italy_dc_patronage_state_1945_1992
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: ENI's overseas crude contracts diversified Italian import sources beyond Anglo-American majors.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Statutory monopoly on Po Valley exploration replaced multi-firm concessionary licensing.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: State-financed oil supply reduced FX-balance shocks that had pressured monetary policy.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Public capital injections and below-market financing functioned as ongoing energy-sector subsidies.

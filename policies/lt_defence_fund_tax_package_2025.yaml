policy_id: lt_defence_fund_tax_package_2025
status: candidate
title: Lithuania Defence Fund tax package 2025
countries:
- LTU
timeframe:
  start: 2025
  end: ongoing
description: 'Lithuania created a Defence Fund financing package to support a higher defence-spending path after the Ukraine security shock. The package combines additional tax and contribution measures,
  including higher corporate and selected excise or sectoral revenue streams, with a dedicated fiscal channel for defence capability and readiness investment.

  '
enacted_by:
- lithuania_simonyte_paluckas_defence_social_reform_2024_present
scope: national
coalition_label_at_enactment: Simonyte Homeland Union-led coalition
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: The Defence Fund package increases the corporate-income tax burden as part of national-defence financing.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Dedicated revenue supports a higher defence-spending path and military capability investment.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Corporate and sectoral elements raise some progressive incidence, while excise and broad-based elements are less progressive.
references:
- Republic of Lithuania Defence Fund legislation and related 2025 tax amendments
- Lithuanian Ministry of Finance materials on Defence Fund financing measures

title: California Sb253 Sb261 2023
countries:
- USA
timeframe:
  start: 2006
  end: ongoing
description: 'SB 253 (Climate Corporate Data Accountability Act) and SB 261 (Climate-Related Financial Risk Act), signed in October 2023, require US-organised companies doing business in California with
  revenues above defined thresholds to disclose Scope 1, 2, and 3 GHG emissions (SB 253, $1B threshold) and climate-related financial risks consistent with the TCFD framework (SB 261, $500M threshold).
  CARB is responsible for implementing rules; the regime represents the first US sub-national mandatory climate disclosure regime.

  '

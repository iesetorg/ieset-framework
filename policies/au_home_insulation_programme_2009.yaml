description: 'A$2.45bn component of the Feb 2009 Nation Building and Jobs Plan subsidising residential ceiling insulation retrofits, implemented from 1 Jul 2009. Rapid rollout induced safety failures leading
  to four installer deaths and ~200 house fires. Programme terminated 19 Feb 2010; 2014 Royal Commission found administrative and regulatory failures.

  '

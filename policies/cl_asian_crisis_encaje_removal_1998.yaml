policy_id: cl_asian_crisis_encaje_removal_1998
status: candidate
title: Asian crisis response and encaje removal 1998
countries:
- CHL
timeframe:
  start: 1997
  end: 1998
  enacted_date: '1998-09-17'
description: 'Following Asian-crisis contagion, Banco Central de Chile hiked real reference rate above 8%, widened exchange-rate band, and intervened in FX market to defend the peso. Encaje reserve requirement
  reduced from 30% to 10% in June 1998, then to 0% on 17 September 1998. 1999 GDP -0.4% — Chile''s first recession since democratic transition. Episode ended the crawling-band regime; full float adopted
  September 1999.

  '

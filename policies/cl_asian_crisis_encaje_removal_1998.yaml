  direction: +
  magnitude: weak
  intended: true
  rationale: Encaje rolled back to 0%.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: Transition to full float and inflation-targeting.
references:

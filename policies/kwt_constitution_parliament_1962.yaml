# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: kwt_constitution_parliament_1962
status: candidate
title: Kuwait Constitution and National Assembly 1962
countries: [KWT]
timeframe: {start: 1962, enacted_date: "1962-11-11"}
description: >
  Kuwait's 1962 constitution created an elected National Assembly with powers
  over legislation, budgets, and ministerial questioning while preserving the
  Al Sabah emirate and cabinet-led executive. The arrangement institutionalised
  parliamentary bargaining over the oil-welfare state more deeply than in most
  Gulf monarchies.
enacted_by:
  - kuwait_oil_welfare_state_1961_present
axes_moved:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "A written constitution and elected assembly created formal constraints and budget oversight."
  - axis: institutional.judicial_independence
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The constitutional framework formalised courts and legal procedures, though executive authority remained strong."
references:
  - "Constitution of the State of Kuwait, 11 November 1962"
  - "Crystal (1995), Oil and Politics in the Gulf"

policy_id: kr_inheritance_tax_reform_attempt_2024
status: candidate
title: Yoon inheritance-tax reform attempt 2024 (South Korea)
countries:
- KOR
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-07-25'
description: 'Yoon administration tax-reform package announced 25 July 2024 proposing (i) cut of the top inheritance-tax rate from 50% to 40%; (ii) raise of the lowest bracket threshold from KRW 100m to
  200m; (iii) shift from the decedent-based (estate-based) inheritance-tax regime to an inheritor-based regime; (iv) repeal of the chaebol-control-premium surcharge (20% on major-shareholder inheritance).
  Passed the cabinet but blocked by the DP-majority National Assembly; not enacted. Included in the policy corpus because it represents Yoon-era content posture regardless of passage, and because most of
  these items reappear in rival form under Lee.

  '
enacted_by:
- skorea_yoon_ppp_2022_2025
coalition_label_at_enactment: People Power Party (conservative)

  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Would cut top inheritance rate 50% → 40% and repeal 20% chaebol control-premium surcharge. Not enacted; coded as attempted direction.
references:
- 2024 Tax Revision Bill (MOEF announcement, 25 July 2024)
notes: 'Proposal status at time of coding: cabinet-approved, rejected by National Assembly. Counted as a Yoon-era policy stance rather than an enacted change. Directional axis coding reflects what would

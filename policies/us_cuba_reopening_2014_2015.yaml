description: 'Obama + Castro announced diplomatic normalisation 17 Dec 2014. Embassies reopened Jul 2015 (Havana) + Aug 2015 (Washington). OFAC + BIS regulatory easing: expanded general-licence travel (12
  categories), remittance limits raised, telecoms + agricultural-exports carve-outs, credit-card use allowed. Cuba removed from State Sponsors of Terrorism list May 2015. Trump-era Jun 2017 NSPM-5 partially
  rolled back travel + Cuban-military- entity transactions.

  '

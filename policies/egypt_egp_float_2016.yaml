policy_id: egypt_egp_float_2016
status: candidate
title: Egypt Egp Float 2016
countries:
- EGY
timeframe:
  start: 2016
  end: ongoing
description: 'On 3 November 2016, the Central Bank of Egypt freed the Egyptian pound, devaluing it from 8.88 to roughly 13–18 EGP/USD as a prior action under the IMF''s USD 12bn Extended Fund Facility.
  The CBE simultaneously raised the overnight deposit rate by 300 bp and abolished priority FX allocation, ending two decades of de-facto crawling pegs. Inflation spiked above 30% before receding by 2018.

  '

title: Plano Real — Brazil monetary stabilisation 1994
countries:
- BRA
timeframe:
  start: 1994
  enacted_date: '1994-07-01'
description: 'Architect: Finance Minister Fernando Henrique Cardoso under President Itamar Franco (Cardoso subsequently elected president 1994, 1998). Three-stage anti-inflation programme: (1) fiscal adjustment
  via Plano de Ação Imediata (1993); (2) URV (Unit of Real Value) as indexed accounting unit de-indexing prices from past inflation; (3) Real launched July 1994 at 1:1 to URV. Ended Brazilian hyper- inflation
  (2,477% in 1993) within months. Anchored by semi-fixed exchange-rate crawling peg through 1998, then floating after 1999 currency crisis. One of the most successful ends-to- hyperinflation on record —
  textbook combination of fiscal adjustment + credible monetary rule + nominal anchor.

  '

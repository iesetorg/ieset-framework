policy_id: cuba_cuentapropismo_1993
status: candidate
title: Cuba Cuentapropismo 1993
countries:
- CUB
timeframe:
  start: 1959
  end: ongoing
description: 'Following the post-Soviet "Special Period" collapse, Cuba issued Decreto-Ley 141 (1993) legalising cuentapropismo — limited self-employment in roughly 100 occupations including paladares,
  taxi drivers, and tradespeople. The reform reopened narrow private-sector activity inside an otherwise state-dominated economy, was tightened and re-expanded several times, and was substantially broadened
  under Raúl Castro''s lineamientos after 2010.

  '
enacted_by:
- cuba_post_1959_socialist_economy
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Self-employment was permitted only in a closed positive list with licensing caps that constrained competition.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Private titles remained restricted with no full ownership of means of production beyond small trades.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Licensing fees and special social-security contributions extended the transfer/levy net to self-employed earners.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Tolerated inputs and ration-card overlap kept implicit subsidies flowing to the licensed micro-private sector.

policy_id: jp_big_bang_financial_reform_1996
status: candidate
title: Japanese Big Bang financial-system reform 1996-2001
countries:
- JPN
timeframe:
  start: 1996
  end: 2001
  enacted_date: '1996-11-11'
description: 'Anglo-Saxon-template financial-sector liberalisation programme announced by PM Hashimoto on 11 November 1996, phased to April 2001. Removed the Article 65 Glass-Steagall-equivalent separation
  between banking, securities, and insurance; revised the Foreign Exchange and Foreign Trade Law effective 1 April 1998 abolishing prior-notification requirements for outward investment; liberalised brokerage
  commissions (fully deregulated October 1999); opened securities-settlement, OTC derivatives, and investment-trust distribution to banks; established holding- company structures for financial groups; created
  Financial Supervisory Agency (June 1998) spun off from MoF.

  '
enacted_by:
- japan_hashimoto_ldp_1996_1998
coalition_label_at_enactment: LDP-SDP-Sakigake / LDP
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Semantic '-' = looser regulation; Big Bang collapsed Article 65 separation and freed commissions.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Forex Law revision removed prior-notification on outward investment.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Cross-sector entry allowed between banking, securities, insurance.
references:
- Financial System Reform Act, June 1998
- Revised Foreign Exchange and Foreign Trade Law, effective 1 April 1998
- Hoshi & Kashyap (2001), 'Corporate Financing and Governance in Japan'

policy_id: cy_supreme_courts_reform_2023
status: candidate
title: Cyprus supreme-court and appeals reform 2023
countries:
- CYP
timeframe:
  start: 2023
  end: ongoing
description: 'Cyprus implemented a higher-court restructuring in 2023 that separated the former Supreme Court functions into a Supreme Constitutional Court, a Supreme Court, and a Court of Appeal. The package
  changed appellate routing and constitutional-review capacity in order to address case backlogs, clarify court jurisdiction, and increase the institutional capacity of the judiciary.

  '
enacted_by:
- cyprus_justice_labour_reform_2022_present
scope: national
coalition_label_at_enactment: Anastasiades-Christodoulides reform continuity
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Clearer appellate routes and dedicated supreme courts strengthen case handling and legal predictability.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: A more differentiated court structure increases judicial capacity outside direct executive administration.

policy_id: sdn_juba_peace_agreement_2020
status: candidate
title: Sudan Juba Peace Agreement 2020
countries:
- SDN
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-10-03'
description: >
  Sudan's transitional authorities and several armed movements signed the Juba
  Peace Agreement in October 2020, creating political, security, wealth-sharing,
  land, and transitional-justice tracks for Darfur, the Two Areas, and other
  conflict-affected constituencies. The agreement was incorporated into Sudan's
  transition framework and allocated seats and implementation roles to signatory
  movements, though many provisions remained incomplete before and after the
  2021 coup and 2023 war.
enacted_by:
- sudan_post_bashir_transition_conflict_state_2019_present
scope: national
coalition_label_at_enactment: Civilian-military transitional government
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: The agreement created a formal legal-political settlement and implementation tracks for armed-conflict claims.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Wealth-sharing and reconstruction commitments expanded promised public transfers to conflict-affected regions.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Land and compensation tracks aimed to regularize displaced-community claims and conflict-era property disputes.
references:
- Juba Peace Agreement for Peace in Sudan, signed 3 October 2020.
- UN Integrated Transition Assistance Mission in Sudan and African Union reporting on Juba Peace Agreement implementation.
notes: >
  Implementation has been partial and disrupted by renewed war. The coding
  reflects the formal agreement and policy commitments, not full delivery.

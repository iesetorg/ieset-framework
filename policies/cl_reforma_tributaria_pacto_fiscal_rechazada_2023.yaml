status: candidate
title: Reforma Tributaria Pacto Fiscal Rechazada 2023
countries:
- CHL
timeframe:
  start: 2022
  end: ongoing
description: 'Boric government''s ''Pacto Fiscal'' tax-reform bill rejected by the Chilean Chamber of Deputies in March 2023. The original package proposed a wealth tax, higher marginal personal-income
  rates, mining royalty increases, and tighter elite-income rules to fund expanded social spending. The defeat forced the government to redesign the package and split it into smaller follow-on bills.

  '
enacted_by:
- chile_boric_ad_2022_present
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  intended: true
  rationale: Proposed mining royalty hikes and tighter integration would have raised effective corporate-tax burden.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Wealth-tax and high-income surcharge proposals targeted top income brackets but were rejected in legislature.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Revenues were earmarked for transfer-program expansion that subsequently had to be scaled back.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Movement-level labour-rights agenda continued; this defeat slowed but did not halt that track.

policy_id: jp_financial_stabilisation_package_1998
status: candidate
title: Japan ¥30tn financial-stabilisation package (February 1998)
countries:
- JPN
timeframe:
  start: 1998
  end: 1998
  enacted_date: '1998-02-16'
description: '¥30tn financial-stabilisation framework enacted February 1998 following November 1997 failures of Hokkaido Takushoku Bank and Yamaichi Securities. Split into ¥17tn of blanket deposit- protection
  guarantees through Deposit Insurance Corporation and ¥13tn of public-fund capacity for emergency bank recapitalisation via preferred-share subscription. First round of capital injection March 1998 to
  21 banks (¥1.8tn) was small and uniform, criticised as inadequate; replaced by October 1998 Financial Revitalisation Act framework offering larger and more conditional injections.

  '

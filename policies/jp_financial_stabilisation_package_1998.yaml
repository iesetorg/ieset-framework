  direction: +
  magnitude: moderate
  intended: true
  rationale: Public-fund capacity for bank recapitalisation created explicit sectoral support.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Blanket deposit protection and public-fund conditionality extended supervisory reach.

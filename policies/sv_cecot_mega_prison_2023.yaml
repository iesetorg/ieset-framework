policy_id: sv_cecot_mega_prison_2023
status: candidate
title: CECOT Centro de Confinamiento del Terrorismo (opened Jan 2023)
countries:
- SLV
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-01-31'
description: 'CECOT is the 166-hectare maximum-security prison complex in Tecoluca (San Vicente department) inaugurated 31 Jan 2023 and operational since 24 Feb 2023. Designed for 40,000 inmates in eight
  pavilions with 32 cells each (roughly 100 inmates per cell), it is the largest prison in the Americas and a centrepiece of Plan Control Territorial Phase VII. CECOT holds alleged MS-13 and Barrio 18 members
  detained under the régimen de excepción; detainees are kept incommunicado with minimal outside communication, no family visits, and limited judicial review. Government staging (head-shaven mass transfers
  filmed for state media) became a defining image of Bukele-era security policy. CPI and CPT raised repeated concerns about conditions; Cristosal documented 300+ in-custody deaths across the prison system
  through 2024. Nominal construction cost $115m.

  '

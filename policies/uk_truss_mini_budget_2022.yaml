description: Unfunded tax cuts (~£45bn) combined with large energy-price cap spending, without OBR forecast. Markets repriced gilts within days; pension-fund LDI collapse required BoE intervention. Most
  measures reversed within weeks; Truss resigned 49 days after taking office. The framework codes this as a market-oriented policy package (tax cuts + supply-side framing) whose execution failed at implementation
  because of fiscal credibility loss, not because the content itself was economically unreasonable. A genuine case for distinguishing POLICY from PROCESS.

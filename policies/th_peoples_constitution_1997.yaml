description: 'Constitution of the Kingdom of Thailand B.E. 2540 (1997) promulgated 11 October 1997 — the 16th Thai constitution and widely styled "People''s Constitution" as first drafted with substantial
  civil-society consultation (Constitution Drafting Assembly of 99 members). Established: Constitutional Court (independent constitutional review), National Counter Corruption Commission (NCCC), Election
  Commission of Thailand (ECT), National Human Rights Commission, Ombudsman, Official Information Commission. Added: direct-election of Senate (200 members, non-partisan), mixed-member MP system with party-list
  component (100 MPs), decentralisation mandate. Abrogated entirely by 2006 coup; partly restored in 2007 charter; fully superseded by 2017 charter.

  '

policy_id: sa_ritz_carlton_detentions_2017
status: candidate
title: Ritz-Carlton anti-corruption detentions
countries:
- SAU
timeframe:
  start: 2017
  end: 2018
  enacted_date: '2017-11-04'
description: 'Mass detention of ~200 princes, ministers and businessmen at the Ritz-Carlton Riyadh under a newly-formed anti-corruption committee chaired by Crown Prince Mohammed bin Salman. Detentions
  bypassed formal judicial process; settlements reportedly returned over SAR 400bn in assets to the state. Consolidated executive power under CP, removed rival princelings (including Prince Alwaleed bin
  Talal) from independent commercial bases, and sent a strong coercive signal to elites.

  '

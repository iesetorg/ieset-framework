  rationale: Extra-judicial detentions under ad-hoc royal committee, no formal charge sheets or trials.
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Coerced asset transfers from detained businessmen to state; signalled expropriation risk to Saudi business class.
- axis: institutional.rule_of_law
  direction: '-'

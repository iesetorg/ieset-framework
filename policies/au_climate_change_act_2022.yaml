title: Climate Change Act 2022 - Australia
countries:
- AUS
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-09-13'
description: >
  The Climate Change Act 2022 put Australia's greenhouse-gas emissions
  reduction targets of 43 percent below 2005 levels by 2030 and net zero by
  2050 into Commonwealth law. It also requires annual climate change
  statements to Parliament, Climate Change Authority advice to the minister,
  and target-setting machinery for future Nationally Determined
  Contributions under the Paris Agreement framework.

status: candidate
title: Eu Imf Ecb Bailout 2010
countries:
- IRL
timeframe:
  start: 2008
  end: 2011
description: 'In November 2010 Ireland entered an EUR 85 billion three-year financial- assistance programme jointly funded by the EFSF/EFSM, IMF Extended Fund Facility, and bilateral loans, conditioned
  on a Memorandum of Understanding setting fiscal-consolidation targets, bank deleveraging, and structural-reform milestones. The Programme institutionalised austerity budgets, the National Recovery Plan
  2011-2014, and accelerated bank-balance-sheet repair through PCAR/PLAR stress tests.

  '

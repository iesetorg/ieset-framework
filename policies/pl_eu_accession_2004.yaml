  direction: +
  magnitude: strong
  intended: true
  rationale: Single-Market accession removed intra-EU tariff and NTB barriers.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: Free-movement rights (with transitional restrictions in most EU-15).
- axis: institutional.rule_of_law
  direction: +

policy_id: pl_eu_accession_2004
status: candidate
title: Polish EU accession 2004
countries:
- POL
timeframe:
  start: 2004
  enacted_date: '2004-05-01'
description: 'Poland acceded to the European Union on 1 May 2004 as part of the largest single enlargement (A8 + 2). Triggered Single-Market entry, CAP access, and migration to the UK/IE/SE labour markets
  (transitional restrictions elsewhere). Referendum 7-8 June 2003 passed 77.45% YES.

  '

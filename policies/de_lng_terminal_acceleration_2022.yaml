  direction: +
  magnitude: strong
  intended: true
  rationale: FSRU deployment + storage mandates diversified gas supply away from Russian pipeline.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Emergency suspension of standard environmental-review timetables for LNG infrastructure.
- axis: fiscal.sectoral_subsidy

policy_id: de_lng_terminal_acceleration_2022
status: candidate
title: LNG terminal acceleration law (LNG-Beschleunigungsgesetz) 2022
countries:
- DEU
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-05-24'
description: 'Fast-track permitting framework suspending standard environmental- assessment timetables to enable deployment of five state-chartered Floating Storage and Regasification Units (FSRUs) at Wilhelmshaven,
  Brunsbüttel, Lubmin, Stade, and Mukran between late 2022 and 2024, plus onshore LNG terminal development. Funded via the Economic Stability Fund; combined with a 90%-by-1-November-2022 gas-storage mandate
  and the Russian-pipeline-gas replacement programme. Considered the Ampel''s most operationally successful policy execution: gas-supply continuity through winter 2022-23 without rationing despite Nord
  Stream 1 curtailment from June 2022 and sabotage in September 2022.

  '
enacted_by:
- germany_scholz_ampel_2021_2025
coalition_label_at_enactment: SPD-Greens-FDP Ampel
axes_moved:

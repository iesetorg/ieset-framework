policy_id: netherlands_zorgverzekering_2006
status: candidate
title: Zorgverzekeringswet — Netherlands mandatory private health insurance 2006
countries:
- NLD
timeframe:
  start: 2006
  enacted_date: '2006-01-01'
description: 'Replaced dual-track Dutch healthcare financing (mandatory sickness funds for lower-income + private insurance for higher-income) with a universal mandatory private health insurance market.
  All residents must purchase a basic package from a regulated insurer. Insurers must accept all applicants (community rating); premiums are flat per insurer; risk-equalisation fund redistributes from low-risk
  to high-risk enrolees. Means-tested subsidy (zorgtoeslag) for lower- income households. Competing insurers offer supplementary coverage. Canonical market-respecting-mixed healthcare architecture. Refinement
  D.2.10 cites Netherlands as a country with less captured political economy implementing market-respecting healthcare reform.

  '
enacted_by:
- netherlands_balkenende_cda_2002_2006
coalition_label_at_enactment: CDA-VVD-D66 centre-right/liberal coalition

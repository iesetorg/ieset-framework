policy_id: ke_sgr_phase1_2017
status: candidate
title: Standard Gauge Railway Phase 1 Mombasa-Nairobi (opened May 2017)
countries:
- KEN
timeframe:
  start: 2014
  end: 2017
  enacted_date: '2017-05-31'
description: 'USD 3.2bn Chinese-financed (Exim Bank of China, ~90% loan) standard-gauge railway from Mombasa port to Nairobi ICD, constructed by China Road and Bridge Corporation on EPC basis, opened by
  President Kenyatta on 31 May 2017. Phase 2A Nairobi-Naivasha (USD 1.5bn) opened Oct 2019. A cargo directive required all Mombasa containers to move by SGR to Nairobi ICD, challenged in court and partially
  reversed. Flagship Jubilee-era infrastructure project and primary driver of Kenya''s debt accumulation with China.

  '
enacted_by:
- kenya_kenyatta_jubilee_2013_2022
coalition_label_at_enactment: Jubilee Alliance
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: ~USD 4.7bn cumulative; debt-financed capex added several percentage points to debt/GDP.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Cargo directive functioned as implicit rail subsidy via freight-mode mandate.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Cargo directive disadvantaged road hauliers until partially reversed by courts.
references:

policy_id: italy_tremonti_tax_bonuses_2001_2003
status: candidate
title: Italy Tremonti Tax Bonuses 2001 2003
countries:
- ITA
timeframe:
  start: 2001
  end: 2006
description: 'Under Finance Minister Giulio Tremonti, the Berlusconi II government enacted "Tremonti-bis" (Law 383/2001), which deducted from corporate-tax base 50% of the difference between a year''s investment
  in new capital goods and the prior five-year average, and a parallel two-year personal-income bonus for capital purchases by self-employed taxpayers. The relief was extended via "Tremonti-ter" in 2009
  and forms a recurring template of investment-tax incentives in Italian fiscal policy, with Treasury revenue costs and contested productivity effects.

  '

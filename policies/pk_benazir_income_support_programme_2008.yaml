policy_id: pk_benazir_income_support_programme_2008
status: candidate
title: Benazir Income Support Programme (BISP) 2008
countries:
- PAK
timeframe:
  start: 2008
  end: 2024
  enacted_date: '2008-07-08'
description: 'Benazir Income Support Programme launched July 2008 by the Gilani-Zardari PPP government as Pakistan''s first national unconditional cash transfer. Initial PKR 1,000/month to eligible female
  household heads (expanded multiple times subsequently — PKR 7,000-8,500/quarter by 2020s). Poverty targeting via proxy means test (National Socio-Economic Registry, NSER surveys 2010-11 and 2020-22).
  Budget rose from PKR 34bn (FY2009) to PKR 400bn+ (FY2023). Supported by DFID, World Bank, ADB technical assistance. One of few durable policy institutions that survived PPP-PML-N-PTI transitions; PTI
  briefly rebranded as "Ehsaas" (2019) but BISP original name restored under PML-N coalition 2022. Largest unconditional cash transfer in South Asia by coverage.

  '

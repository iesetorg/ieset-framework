policy_id: switzerland_nuclear_new_build_ban_2017
status: candidate
title: Switzerland Nuclear New Build Ban 2017
countries:
- CHE
timeframe:
  start: 2011
  end: ongoing
description: 'As part of the May 2017 referendum on the revised Energiegesetz, Swiss voters approved a permanent ban on the construction of new nuclear power plants while allowing existing reactors to continue
  operating until the end of their licensed lifetimes. The amendment to the Kernenergiegesetz removed the option of building replacement reactors and committed Switzerland to a renewables and efficiency
  pathway under Energy Strategy 2050.

  '

policy_id: japan_corporate_governance_code_2015
status: candidate
title: Japan Corporate Governance Code 2015
countries:
- JPN
timeframe:
  start: 2012
  end: 2020
description: 'Japan''s Corporate Governance Code, finalised by the Financial Services Agency and Tokyo Stock Exchange in June 2015 as part of Abenomics'' third arrow, established a comply-or-explain regime
  for listed companies covering shareholder rights, board composition (including independent directors), capital efficiency disclosures, and engagement with institutional investors. Paired with the 2014
  Stewardship Code, it aimed to lift returns on equity, unwind cross-shareholdings, and improve capital allocation discipline.

  '

description: 'SB 100 (2018), the 100 Percent Clean Energy Act, raised California''s Renewables Portfolio Standard to 60% by 2030 and set a binding policy target that 100% of retail electricity sales come
  from zero-carbon resources by 2045. The CPUC, CEC, and CARB are required to achieve the target through Integrated Resource Planning, RPS procurement, and Scoping Plan updates, making it the centerpiece
  of California''s electric-sector decarbonisation framework.

  '

policy_id: france_workers_peasants_pensions_1910
status: candidate
title: France workers' and peasants' pensions 1910
countries: [FRA]
timeframe:
  start: 1910
  end: 1910
  enacted_date: "1910-04-05"
description: >
  The Law of 5 April 1910 on workers' and peasants' pensions created the
  first nationwide old-age pension architecture for lower-income wage
  earners and rural workers in France. The scheme relied on compulsory
  worker and employer contributions with a state supplement and originally
  targeted pension receipt at age 65. Contemporary critics attacked the
  late retirement age and capitalised design, but the law nevertheless
  established the principle that old-age security for ordinary workers was
  a legitimate function of the national state rather than poor relief or
  voluntary mutualism alone.
enacted_by:
  - france_radical_republican_reform_1901_1914
axes_moved:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    intended: true
    rationale: "The law created a standing national old-age pension mechanism for low-paid workers and rural earners."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The state accepted direct matching and administrative costs for a new permanent pension scheme."
references:
  - "Loi du 5 avril 1910 sur les retraites ouvrieres et paysannes"

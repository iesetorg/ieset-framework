  magnitude: weak
  intended: true
  rationale: Core mechanism — phased elimination of tariffs and quotas across goods, services, and investment between Mexico, the US, and Canada.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Opened Mexican markets to US and Canadian competitors and forced restructuring of formerly protected domestic industries.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: Chapter 11 investor-state dispute settlement and IP-protection commitments hardened cross-border investor rights.
- axis: monetary.central_bank_independence
  direction: +

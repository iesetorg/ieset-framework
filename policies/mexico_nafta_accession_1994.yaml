policy_id: mexico_nafta_accession_1994
status: candidate
title: Mexico Nafta Accession 1994
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
description: 'Mexico''s accession to the North American Free Trade Agreement, signed 17 December 1992 and entering into force 1 January 1994, established progressive tariff elimination, investor-state dispute
  settlement via Chapter 11, harmonised rules of origin, and side accords on labour and environment with Canada and the United States. NAFTA locked Mexico''s trade-liberalisation programme into an international
  treaty and triggered structural shifts in agriculture, manufacturing, and services investment.

  '

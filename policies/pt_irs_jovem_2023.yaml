policy_id: pt_irs_jovem_2023
status: candidate
title: Irs Jovem 2023
countries:
- PRT
timeframe:
  start: 2015
  end: 2024
description: 'IRS Jovem, expanded by the Costa PS government in the 2023 State Budget (Lei 24-D/2022) and further enlarged in 2024, provides graduated personal-income-tax exemptions to workers aged up to
  26-30 (depending on education level) for their first ten years of employment, with full exemption in year one decaying to a partial exemption thereafter. The intended effect was to retain young Portuguese
  graduates at home against north-European emigration pressure, raise their disposable income early in careers, and address the demographic and emigration dimension of Portugal''s labour-supply problem.

  '
enacted_by:
- portugal_costa_ps_2015_2024
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Foregone IRS revenue raises the structural deficit equivalently to direct spending.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Targeted IRS exemption functions as an in-tax transfer to young workers.
- axis: fiscal.tax_progressivity
  direction: +

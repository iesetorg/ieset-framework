policy_id: kr_universal_basic_income_youth_dividend_2025
status: candidate
title: Lee youth-dividend and basic-income pilot scale-up (South Korea, 2025)
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-07-01'
description: 'Federal scale-up of basic-income-style cash-transfer experiments that Lee Jae-myung piloted as Seongnam mayor and Gyeonggi governor. First- year instrument: a youth dividend (청년배당) of KRW
  1 million/year to residents aged 24 (expanded from Gyeonggi''s pilot to nationwide), plus a broader universal livelihood-recovery coupon of KRW 250,000 per resident paid in local-currency tokens with
  3-month expiry (supplementary budget July 2025). Stated trajectory toward a national basic-income floor pilot in 2027.

  '
enacted_by:
- skorea_lee_jaemyung_dp_2025_present
coalition_label_at_enactment: Democratic Party of Korea (centre-left)
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  intended: true
  rationale: Universal coupon + youth dividend expand transfer footprint substantially versus Yoon-era baseline.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Incremental general-spending level lift via supplementary-budget channel.
references:

policy_id: pk_13th_14th_amendments_1997
status: candidate
title: Pakistan 13th and 14th Constitutional Amendments (1997)
countries:
- PAK
timeframe:
  start: 1997
  end: 1997
  enacted_date: '1997-07-03'
description: '13th Amendment to Constitution of Pakistan passed 1 April 1997 repealing Article 58(2)(b) which since Zia-ul-Haq''s 8th Amendment (1985) had empowered the President to dismiss the Prime Minister
  and dissolve National Assembly at discretion. Strengthened premier''s hand vis-à-vis presidency. 14th Amendment passed 3 July 1997 introduced anti-defection provisions binding MNAs to party whip on votes,
  with disqualification for defection. Both passed with PML-N''s 2/3 majority. Reversed under General Musharraf''s Legal Framework Order 2002 (17th Amendment, restoring 58(2)(b)). 13th Amendment later re-enacted
  under 18th Amendment (2010) permanently removing presidential dismissal power.

  '
enacted_by:
- pakistan_nawaz_sharif_pmln_ii_1997_1999
coalition_label_at_enactment: PML-N supermajority
axes_moved:
- axis: institutional.rule_of_law
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Balance-of-powers shift from president to premier; anti-defection provision mixed — reduces MP-voter accountability in favour of party-whip control.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Strengthened premier's office facilitated November 1997 Supreme Court crisis.

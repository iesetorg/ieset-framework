policy_id: th_yingluck_rice_pledging_scheme_2011_2014
status: candidate
title: Thailand rice-pledging scheme 2011-2014
countries:
- THA
timeframe:
  start: 2011
  end: 2014
  enacted_date: '2011-10-01'
description: 'Revived and expanded rice-pledging scheme (จำนำข้าว) under Yingluck Shinawatra''s Pheu Thai government, guaranteeing farmers THB 15,000 per tonne of white paddy rice (20,000 for Hom Mali jasmine)
  — approximately 40-50% above prevailing global price. Government purchased via BAAC and warehoused through Ministry of Commerce. Intended to withhold Thai supply (Thailand was world''s largest exporter)
  to drive up global price; instead India and Vietnam captured market share. Stockpile accumulated to ~18m tonnes by 2014 with substantial physical loss, corruption in warehousing and government-to-government
  export "deals", fiscal losses estimated THB 500-700bn (~USD 15-20bn). Yingluck later convicted 2017 (five years, in absentia) for negligence over the scheme. Canonical price-support-policy failure case.

  '
enacted_by:

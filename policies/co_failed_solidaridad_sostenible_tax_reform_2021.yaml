description: 'Tax-reform bill proposed by Finance Minister Alberto Carrasquilla on 15 Apr 2021 that would have lowered the PIT filing threshold (widening the income- tax base into the middle class), extended
  VAT to previously-exempt goods including public utilities, gasoline, and funerary services, and raised revenue by ~2% of GDP to finance pandemic social programmes and preserve investment grade. Triggered
  the paro nacional starting 28 Apr 2021. Bill withdrawn 2 May 2021; Carrasquilla resigned 3 May 2021. Protests continued through June with ESMAD confrontations and over 40 civilian deaths per Defensoría
  del Pueblo data. S&P downgraded Colombia to BB+ on 19 May 2021. Replaced by the narrower Ley 2155 de 2021 (Inversión Social).

  '

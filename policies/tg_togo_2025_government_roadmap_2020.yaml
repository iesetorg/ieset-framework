title: Togo 2025 government roadmap 2020
countries:
- TGO
timeframe:
  start: 2020
  end: 2025
  enacted_date: '2020-10-12'
description: 'Togo adopted the Feuille de route gouvernementale Togo 2025 as the five-year strategic reference for the post-2020 executive. The roadmap replaced the pandemic-disrupted 2018-2022 development
  plan and organized government action around social inclusion and peace, job creation through economic strengths, state modernization, 10 ambitions, 42 priority projects and reforms, and a large public
  and private investment envelope.

  '

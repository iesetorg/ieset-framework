description: 'Loi n° 2016-1088 du 8 août 2016 relative au travail. Established primacy of enterprise-level collective agreements over branch agreements on working-time matters, clarified economic grounds
  for dismissal, and created the Compte personnel d''activité. Enacted via Article 49.3 amid sustained "nuit debout" protests and union opposition, widening PS internal split ("frondeurs").


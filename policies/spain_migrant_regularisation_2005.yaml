policy_id: spain_migrant_regularisation_2005
status: candidate
title: Spain Migrant Regularisation 2005
countries:
- ESP
timeframe:
  start: 2004
  end: 2008
description: 'The Zapatero government''s 2005 normalización de extranjeros, implemented through Real Decreto 2393/2004 and a three-month application window in early 2005, regularised the legal status of
  approximately 570,000 undocumented migrants who could prove an existing employment contract and minimum residency. It was the largest single regularisation in EU history and triggered formal labour-market
  integration.

  '

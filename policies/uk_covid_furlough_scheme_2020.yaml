policy_id: uk_covid_furlough_scheme_2020
status: candidate
title: UK COVID-19 Coronavirus Job Retention Scheme (furlough) 2020-2021
countries:
- GBR
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-03-20'
description: 'The Coronavirus Job Retention Scheme announced 20 March 2020 paid 80% of furloughed workers'' wages up to £2,500/month, extended through September 2021. Peak take-up 8.9 million jobs (May
  2020); total cost ~£70 billion. Accompanied by Self-Employment Income Support Scheme (£28bn), Bounce Back Loans (£47bn) and CBILS (£26bn). Pushed public-sector borrowing to ~15% of GDP in 2020-21 — peacetime
  record — and public debt above 100% of GDP for the first time since 1961. Wide cross-party support at the time; subsequent Public Accounts Committee findings on fraud and error in BBLS.

  '

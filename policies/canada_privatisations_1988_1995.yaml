policy_id: canada_privatisations_1988_1995
status: candidate
title: Canada Privatisations 1988 1995
countries:
- CAN
timeframe:
  start: 1984
  end: 2006
description: 'Between 1988 and 1995 the Mulroney and early Chrétien governments privatised major federal Crown corporations including Air Canada (1988-89), Petro-Canada (1991-95), Canadian National Railways
  (1995, through the CN Commercialization Act), and Teleglobe Canada. Sales took the form of public share offerings and full divestitures, generating Treasury proceeds and reducing the federal balance sheet.
  The intended effect was to subject the firms to capital-market discipline and shrink the SOE footprint of the federal state.

  '

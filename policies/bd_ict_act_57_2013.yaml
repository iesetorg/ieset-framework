description: 'Amendment to the Information and Communication Technology Act 2006 passed 6 October 2013 made Section 57 speech offences (publishing "false", "obscene", or "defamatory" material online, or
  material that "tends to deprave" or "hurt religious sentiment") non-bailable with minimum-seven-year and up-to-fourteen-year sentences. Became the principal tool for prosecuting journalists and activists
  before being nominally replaced by the Digital Security Act 2018.

  '

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: ci_cocoa_coffee_export_board_caistab_1960
status: candidate
title: "CAISTAB cocoa and coffee price stabilization"
countries: [CIV]
timeframe: {start: 1960, end: 1993}
description: >
  Cote d'Ivoire used the Caisse de Stabilisation, or CAISTAB, to regulate cocoa
  and coffee marketing, set producer prices, and stabilize export-crop revenues.
  The institution helped make cocoa and coffee the fiscal and political centre
  of the Houphouet-Boigny growth model, mediating between farmers, exporters,
  and the state.
enacted_by:
  - cote_divoire_houphouet_export_developmental_state_1960_1993
coalition_label_at_enactment: "PDCI"
axes_moved:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Stabilized producer prices and crop finance channelled support and rents through export agriculture.", intended: true}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Official marketing rules structured access to the cocoa and coffee export system.", intended: true}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "The institution supported an export-oriented agricultural model rather than import-substitution autarky.", intended: true}
references:
  - "Robert Bates, Markets and States in Tropical Africa"
  - "World Bank, Cote d'Ivoire agricultural-sector reports"

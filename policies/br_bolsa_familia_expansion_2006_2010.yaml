description: 'Bolsa Família scaled from ~8.7m families (2006) to ~12.7m families (2010). Per-child benefit added for under-15s (2008), adolescent-benefit 16-17 (2008), benefício variável vinculado à gestante
  (2011). Programme budget rose from ~BRL 7.5bn (2006) to ~BRL 14bn (2010). Coverage ~one-quarter of Brazilian population. Contributed to extreme-poverty rate fall from ~10% (2003) to ~4% (2014). Consolidated
  under Lei 10.836/2004 framework.

  '

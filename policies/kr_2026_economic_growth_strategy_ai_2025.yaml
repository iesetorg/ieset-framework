policy_id: kr_2026_economic_growth_strategy_ai_2025
status: candidate
title: South Korea 2026 economic growth strategy and AI-first industrial package
countries:
- KOR
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-12-22'
description: 'The Lee government''s 2026 Economic Growth Strategy set a medium-term objective of returning potential growth to the 3 percent range by 2030 through private-and-public investment in artificial
  intelligence and advanced industries. MOEF framed the programme around an AI transformation "big push", a public-private AI fund, an AI transformation voucher for SMEs, a target of 3.2 million GPUs by
  2030, expansion of policy lending through KDB, IBK and the Korea Credit Guarantee Fund, faster permitting and infrastructure for advanced-industry clusters, bio/defence/semiconductor support, and regulatory
  reforms for new industries.

  '

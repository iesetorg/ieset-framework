  enacted_date: '2006-12-27'
description: '2007 Finanziaria (Law 296/2006) under the Prodi II government and Finance Minister Padoa-Schioppa. ~€35bn gross consolidation mixing revenue measures (IRPEF bracket restructuring with more
  progressive top band, strengthened property taxation on housing and capital income), closure-of-loopholes, and selective spending cuts. Aggressive crackdown on tax evasion (studi di settore reform, electronic
  tracing of payments over €100) produced a ~€19bn revenue over-performance. Combined with favourable cyclical conditions, the deficit fell from 4.4% (2006) to 1.5% GDP (2007).

  '

description: 'Constitution promulgated 22 Dec 1978 under Kriangsak government. Provided for an elected House of Representatives (347 seats) and an appointed Senate (225 seats); Senate could participate
  in no-confidence votes alongside House; Prime Minister could be non-MP. Created the ''semi-democratic'' framework that underpinned Prem Tinsulanonda''s unelected-premiership 1980-1988.

  '

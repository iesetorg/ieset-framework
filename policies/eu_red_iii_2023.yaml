description: 'Directive (EU) 2023/2413 — the third Renewable Energy Directive (RED III) — raised the EU binding renewable-energy target to at least 42.5% of final energy consumption by 2030 (with a 45%
  indicative ambition), mandated transport, industry, heating, and buildings sub-targets, and introduced fast-track permitting "renewables acceleration areas" with shorter consenting deadlines. It also
  tightens biofuels sustainability rules and recognises low-carbon hydrogen toward targets.

  '

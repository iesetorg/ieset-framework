description: 'National Assembly impeached President Roh Moo-hyun on 12 March 2004 (193 votes to 2 in mostly-boycotted Grand National Party + MDP session) on charges of violating Election Law neutrality
  (supporting Uri Party pre-election) and incompetence related to economic management and corruption allegations against aides. Prime Minister Goh Kun served as acting president 12 March - 14 May 2004.
  Constitutional Court ruled 14 May 2004 that while Roh''s election-law violation was technically proven, it was not grave enough to warrant removal; impeachment dismissed and Roh resumed duties. Uri Party
  won April 2004 National Assembly election 152/299 seats in backlash against impeachment. Episode established Constitutional Court''s final-arbiter role on presidential impeachment.

  '

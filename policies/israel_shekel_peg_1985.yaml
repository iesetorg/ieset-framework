policy_id: israel_shekel_peg_1985
status: candidate
title: Israel Shekel Peg 1985
countries:
- ISR
timeframe:
  start: 1985
  end: 1991
description: 'As the nominal anchor of the July 1985 stabilisation, Israel devalued the new shekel by approximately 19% against the US dollar and then fixed it at NIS 1.5 per USD with a commitment to defend
  the parity through Bank of Israel intervention. The peg replaced Israel''s prior crawling-band regime and provided the credible external benchmark needed to reset wage and price expectations after years
  of three-digit inflation; the band was widened in 1989 and gradually transitioned to inflation targeting through the 1990s.

  '

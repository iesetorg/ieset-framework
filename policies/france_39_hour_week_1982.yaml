description: 'Ordonnance du 16 janvier 1982 reduced legal working week from 40 to 39 hours without pay cut; separate ordonnance established 5th week of paid annual leave. Core Common Programme commitment.
  Subsequent 1998-2000 Aubry laws moved to 35 hours. Labour-hour reduction combined with retirement-at-60 and minimum-wage rises formed the centrepiece social reforms retained through rigueur pivot.

  '

policy_id: kr_park_creative_economy_centres_2014
status: candidate
title: Park Creative Economy Centres 2014
countries:
- KOR
timeframe:
  start: 2013
  end: 2017
description: 'The Park Geun-hye administration''s Centres for Creative Economy and Innovation, rolled out from 2014, established 18 regional innovation hubs each paired with a chaebol partner (Samsung,
  LG, Hyundai, etc.) to support start-ups, SMEs and technology commercialisation. Funded jointly by central and provincial governments and the partner conglomerates, the centres were the operational arm
  of Park''s Creative Economy strategy aimed at knowledge-intensive growth.

  '

description: 'Federal Reserve Quantitative Easing 2 (QE2), announced 3 November 2010 by the FOMC, comprised USD 600 billion in additional purchases of long-term Treasury securities at a pace of about USD
  75 billion per month through mid-2011, plus reinvestment of MBS principal payments. The intended effect was to lower long-term real interest rates after recovery had stalled and core inflation was running
  below the 2% objective, support employment growth, and signal sustained accommodation. QE2 became politically controversial — it was the subject of a public open letter from 23 economists warning of risks
  — but materially compressed term premia.

  '

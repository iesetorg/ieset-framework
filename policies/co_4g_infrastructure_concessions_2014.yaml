title: 4G road-infrastructure concessions programme (Colombia)
countries:
- COL
timeframe:
  start: 2014
  end: 2022
description: 'Fourth-generation (4G) road-concession programme structured under Ley 1508 de 2012 APP framework and the ANI agency: ~30 projects, ~8,000 km, committed investment ~USD 25bn using availability-payment
  PPP contracts. Launched under Santos 2013-2015, most concessions awarded 2014-2016. The programme had fiscal-contingent-liabilities implications managed through FONTUR/FDN and suffered execution issues
  from the Odebrecht scandal (Ruta del Sol II termination, 2017) before continuing under Duque as "5G" refinement.

  '

description: 'Extension and wind-down of Swedish pandemic-era fiscal support under the Andersson government — short-time work subsidy (korttidspermittering) extended into 2022, firm-liquidity (omstallningsstöd)
  programme continued, sick-pay compensation rules eased, and targeted support for culture and events sectors. Fiscal-framework surplus target formally relaxed for the extension period.

  '

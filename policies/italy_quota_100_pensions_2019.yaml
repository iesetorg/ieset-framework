policy_id: italy_quota_100_pensions_2019
status: candidate
title: Italy Quota 100 early-retirement pension exit 2019
countries:
- ITA
timeframe:
  start: 2019
  end: 2021
  enacted_date: '2019-01-28'
description: 'Temporary early-exit pathway allowing retirement for workers reaching a sum of 100 between age (minimum 62) and years of contributions (minimum 38). Introduced via Decreto-legge 4/2019 (Law
  26/2019) as a partial rollback of the 2011 Fornero pension reform''s tightened age thresholds. Enacted for three years (2019-2021) with subsequent transitions through Quota 102 (2022, 64+38) and Quota
  103 (2023+, 62+41). INPS recorded ~450,000 Quota 100 retirements 2019-2021 against an ex-ante estimate of ~1m, with lower than expected take-up partly due to pension-level penalties and public-sector
  career-age profiles. Actuarial cost estimated €20bn over the three-year window with persistent stock-effect thereafter.

  '
enacted_by:
- italy_conte_m5s_governments_2018_2021
coalition_label_at_enactment: M5S–Lega (Conte I)

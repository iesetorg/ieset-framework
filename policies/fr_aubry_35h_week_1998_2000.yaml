policy_id: fr_aubry_35h_week_1998_2000
status: candidate
title: Lois Aubry — 35-hour statutory working week
countries:
- FRA
timeframe:
  start: 1998
  end: 2000
  enacted_date: '2000-01-19'
description: 'Lois Aubry I (13 June 1998) and II (19 January 2000) reduced the legal working week from 39 to 35 hours. Aubry I framework encouraged collective-bargaining negotiations at firm and sector
  level; Aubry II generalised 35h for firms of 20+ employees from 1 January 2000 and for smaller firms 2002. State subsidies partly offset employer costs via reductions in social-security contributions
  on low wages. Overtime rules tightened; annualised hours permitted. Intended to share work and reduce unemployment.

  '
enacted_by:
- france_jospin_ps_cohabitation_1997_2002

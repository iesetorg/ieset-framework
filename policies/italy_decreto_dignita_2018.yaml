policy_id: italy_decreto_dignita_2018
status: candidate
title: Italy Decreto Dignità labour and gambling package 2018
countries:
- ITA
timeframe:
  start: 2018
  enacted_date: '2018-07-13'
description: 'Decreto-legge 87/2018 (Law 96/2018) reversing selective elements of the Jobs Act 2014-2015. Key measures: maximum duration of fixed-term contracts cut from 36 to 24 months; renewal permitted
  only twice (was four); after 12 months a ''causale'' (specific justification) becomes mandatory; contribution surcharge on renewals raised 0.5pp per renewal; unjust-dismissal indemnity doubled (minimum
  from 4 to 6 monthly salaries, maximum from 24 to 36); gambling advertising ban on TV, radio, press, and internet; tightened relocation-aid clawback for firms receiving state aid. Advocates (M5S labour
  minister Di Maio) framed as anti-precariat; critics argued administrative friction would reduce hiring at the margin. INPS data 2019-2020 showed a shift from fixed-term toward permanent contracts but
  in the context of cooling labour demand (pre-COVID).

  '

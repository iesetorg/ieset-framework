policy_id: eg_1977_bread_riots_subsidy_retention
status: candidate
title: Egypt 1977 bread riots and subsidy retention
countries:
- EGY
timeframe:
  start: 1977
  enacted_date: '1977-01-18'
description: 'Government announcement 17 January 1977 of IMF-recommended cuts to bread, flour, rice, sugar, and cooking-gas subsidies triggered nationwide riots 18-19 January (''intifada al-khubz''). 800+
  deaths. Subsidy cuts reversed within 48 hours. Established the political third-rail status of consumer subsidies in Egypt for decades and made subsequent adjustment programmes structurally timid.

  '

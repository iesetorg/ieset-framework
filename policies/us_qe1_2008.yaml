description: 'Federal Reserve Quantitative Easing 1 (QE1), announced 25 November 2008 and expanded 18 March 2009, comprised large-scale asset purchases (LSAP) of approximately USD 1.25 trillion in agency-MBS,
  USD 175 billion in agency debt, and USD 300 billion in Treasury securities under FOMC authority. The intended effect was to repair the impaired mortgage-finance market post-Lehman, compress long-term
  Treasury and MBS yields, support housing-market recovery, and provide monetary stimulus once the federal funds rate had reached the zero lower bound — establishing unconventional monetary policy as a
  mainstream Fed tool.

  '

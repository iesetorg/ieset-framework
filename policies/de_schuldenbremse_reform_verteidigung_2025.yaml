policy_id: de_schuldenbremse_reform_verteidigung_2025
status: candidate
title: Debt brake reform — defence carve-out above 1% of GDP 2025
countries:
- DEU
timeframe:
  start: 2025
  end: ongoing
  enacted_date: '2025-03-18'
description: 'Constitutional amendment (Art. 109, 115 GG) exempting federal defence, civil-protection, intelligence-service, and support-for-Ukraine outlays above 1% of GDP from the structural-deficit limit
  of the Schuldenbremse. Passed 18 March 2025 alongside the EUR 500bn infrastructure Sondervermögen by the outgoing 20th Bundestag (where the two-thirds majority still existed) rather than the newly elected
  21st Bundestag (where AfD + Linke blocking minority would have foreclosed it). Coded as the most consequential fiscal-rule change since the 2009 debt brake itself.

  '
enacted_by:
- germany_merz_2025_present
coalition_label_at_enactment: Pre-coalition outgoing-Bundestag vote; ratified by incoming CDU/CSU-SPD
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  intended: true
  rationale: Uncapped defence + civil-protection spending above 1% of GDP effectively removes the binding constraint for security outlays.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: false
  rationale: Substantially loosens the constitutional fiscal rule; proponents argue the 2009 brake was calibrated to a pre-Zeitenwende threat environment.

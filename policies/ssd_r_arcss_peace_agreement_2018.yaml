policy_id: ssd_r_arcss_peace_agreement_2018
status: candidate
title: South Sudan revitalized peace agreement 2018
countries:
- SSD
timeframe:
  start: 2018
  end: ongoing
  enacted_date: '2018-09-12'
description: >
  South Sudan's parties signed the Revitalized Agreement on the Resolution of
  the Conflict in the Republic of South Sudan in September 2018. The agreement
  recreated a transitional unity government, set security arrangements,
  power-sharing offices, transitional justice and constitutional processes, and
  an election pathway intended to end the civil war and restore national
  institutions.

  direction: +
  magnitude: weak
  intended: true
  rationale: The agreement established a formal transition, constitutional, and peace-implementation framework after civil war.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Security arrangements, implementation bodies, and reconstruction commitments expanded transition spending needs.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Transitional justice and constitutional commitments aimed to rebuild legal accountability institutions.
references:
- Revitalized Agreement on the Resolution of the Conflict in the Republic of South Sudan, 12 September 2018.
- IGAD, Reconstituted Joint Monitoring and Evaluation Commission, and UNMISS reporting on R-ARCSS implementation.
notes: >
  The agreement's implementation has been slow and repeatedly extended; the
  coding reflects the formal peace framework.

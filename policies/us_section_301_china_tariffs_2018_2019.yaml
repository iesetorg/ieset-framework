policy_id: us_section_301_china_tariffs_2018_2019
status: candidate
title: Section 301 China Tariffs 2018 2019
countries:
- USA
timeframe:
  start: 2017
  end: 2021
description: 'The Trump administration''s Section 301 China tariffs of 2018-2019, imposed by USTR under the Trade Act of 1974 in response to the March 2018 unreasonable-IP-practices finding, applied 25%
  tariffs in successive lists totalling roughly USD 350 billion in China-source imports. Phase One trade deal of 15 January 2020 paused further escalation in exchange for Chinese commitments to USD 200
  billion in additional purchases of US goods and services through 2021. The intended effect was to coerce structural Chinese economic policy changes, redress the bilateral trade imbalance, and reinforce
  the broader Trump first-term reorientation of US-China economic relations.

  '

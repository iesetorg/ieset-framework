policy_id: id_bank_indonesia_independence_1999
status: candidate
title: Indonesia Bank Indonesia Independence Law (23/1999)
countries:
- IDN
timeframe:
  start: 1999
  end: 1999
  enacted_date: '1999-05-17'
description: 'Law 23/1999 on Bank Indonesia enacted 17 May 1999 establishing formal de jure central-bank independence from the Ministry of Finance. Governor fixed 5-year term removable only for cause, Board
  of Governors with staggered terms, price-stability mandate as single objective, prohibition on government financing. Ended the New Order arrangement under which BI was a subordinate arm of MoF. Bank-supervisory
  function initially retained by BI (later transferred to OJK under Law 21/2011, effective 2014).

  '
enacted_by:
- indonesia_habibie_transition_1998_1999
coalition_label_at_enactment: Golkar successor / Habibie transition
axes_moved:

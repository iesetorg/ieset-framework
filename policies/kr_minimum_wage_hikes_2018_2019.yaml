policy_id: kr_minimum_wage_hikes_2018_2019
status: candidate
title: Moon-era minimum-wage escalation 2018-2019 (South Korea)
countries:
- KOR
timeframe:
  start: 2018
  end: 2019
  enacted_date: '2017-07-15'
description: 'Minimum Wage Commission determinations raised the statutory minimum wage 16.4% for 2018 (KRW 6,470 → 7,530/hour) and a further 10.9% for 2019 (→ KRW 8,350/hour) — the two largest consecutive
  annual hikes in Korean history, versus the long-run average of ~7%. A partial job-stability fund (KRW 3 trillion in 2018) subsidised SME payroll. After SME backlash the commission pulled increases back
  to 2.87% (2020), 1.5% (2021), 5.05% (2022). Core plank of the "income-led growth" doctrine pushing toward Moon''s campaign target of KRW 10,000/hour.

  '
enacted_by:
- skorea_moon_dp_2017_2022
coalition_label_at_enactment: Democratic Party of Korea (centre-left)
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: 29% cumulative minimum-wage rise in two years raised the floor sharply relative to median wage.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: false
  rationale: Job-stability fund SME subsidy introduced as compensation — unintended transfer footprint.
references:

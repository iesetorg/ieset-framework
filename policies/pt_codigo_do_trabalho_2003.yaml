description: 'Lei 99/2003 of 27 August 2003 introduced the first unified Código do Trabalho, consolidating fragmented labour legislation into a single code. Eased certain dismissal procedures, regularised
  temporary contracts, revised collective-bargaining framework with greater prominence to firm-level agreements. Replaced under Lei 7/2009 by Sócrates government but set the reformed template.


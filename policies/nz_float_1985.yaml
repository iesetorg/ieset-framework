policy_id: nz_float_1985
status: candidate
title: Float 1985
countries:
- NZL
timeframe:
  start: 1984
  end: 1993
description: 'New Zealand floated the New Zealand dollar on 4 March 1985 by Reserve Bank decision under the Reserve Bank of New Zealand Act 1964 (as amended), with Finance Minister Roger Douglas and Governor
  Spencer Russell ending the prior crawling peg. Combined with abolition of exchange controls in 1984, the intended effect was to restore monetary autonomy, expose the economy to traded-goods discipline,
  and enable the subsequent inflation-targeting framework that became formal under the 1989 RBNZ Act.

  '

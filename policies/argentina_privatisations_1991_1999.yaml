policy_id: argentina_privatisations_1991_1999
status: candidate
title: Argentina Privatisations 1991 1999
countries:
- ARG
timeframe:
  start: 1991
  end: 2001
description: 'Wave of privatisations and concessions enacted under the Menem administration following Law 23.696 (State Reform) and Law 23.697 (Economic Emergency) of 1989, accelerating during 1991-1999.
  Transferred ENTel (telecoms), YPF (oil), Aerolíneas Argentinas, Gas del Estado, SEGBA (electricity), Ferrocarriles Argentinos, water utilities, and the social-security pillar (AFJP). Generated one-off
  proceeds, supported the Convertibility fiscal adjustment, and produced sectoral regulators.

  '
enacted_by:
- menem_convertibility_argentina_1991_2001
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatisation receipts reduced fiscal pressure on BCRA and reinforced Convertibility's hard-money rule.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised firms operated under more competitive procurement and supplier-import regimes.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Sectoral regulators (CNT, ENRE, ENARGAS) and unbundling expanded contestable market segments.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: One-off proceeds funded ongoing primary spending and severance for displaced SOE workers.

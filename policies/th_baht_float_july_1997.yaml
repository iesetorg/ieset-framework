  magnitude: strong
  intended: false
  rationale: Post-float rate hike to 20%+ under IMF conditions; pro-cyclical tightening into contracting demand.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Post-float supervisory tightening and finance-company suspensions initiated crisis-response framework.

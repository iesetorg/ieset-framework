policy_id: th_baht_float_july_1997
status: candidate
title: Thailand Baht float (2 July 1997)
countries:
- THA
timeframe:
  start: 1997
  end: 1997
  enacted_date: '1997-07-02'
description: 'Bank of Thailand announced adoption of managed-float exchange- rate regime on 2 July 1997 after exhausting ~$23bn of reserves (plus ~$24bn forward-swap commitments) in defence of the basket-
  pegged Baht from January 1997. Immediate Baht depreciation from 24.8/USD to 28-30/USD first day; to 56/USD by January 1998. Formally triggered the Asian financial crisis; Indonesia rupiah and other regional
  currencies followed. BoT Governor Rerngchai Marakanond resigned 28 July 1997. Chuan II government (from November 1997) negotiated broader IMF programme conditionality. Managed-float regime maintained
  through 2000s.

  '
enacted_by:
- thailand_chavalit_nap_1996_1997
coalition_label_at_enactment: New Aspiration Party-led coalition
axes_moved:
- axis: monetary.monetary_expansion_direction

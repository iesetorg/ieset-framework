policy_id: uk_erm_entry_and_ejection_1990_1992
status: candidate
title: Erm Entry And Ejection 1990 1992
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'UK entry into the European Exchange Rate Mechanism on 8 October 1990 at central rate DM 2.95/£, used as a counter-inflation anchor under Chancellor John Major. The peg collapsed on Black Wednesday
  (16 September 1992) when speculative attacks forced sterling out of the ERM despite emergency rate hikes from 10% to 15% and large-scale Bank of England intervention. The episode discredited the fixed-rate
  framework and paved the way for inflation targeting in 1992.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: ERM exit precipitated 1992 inflation-target framework, increasing Bank's de facto policy authority.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Post-ERM sterling depreciation restored UK tradable-sector competitiveness vis-à-vis ERM peers.
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: ERM regime was a monetary peg; direct distributional effects on personal taxes were minimal.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Post-ejection consolidation programme limited PSBR growth to restore market confidence.

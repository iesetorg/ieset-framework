description: 'Period of Finnish industrial-policy continuity around Nokia''s global mobile-phone market leadership (peaking at ~40% global handset share in 2007). Tekes R&D-subsidy expansion, university-reform
  groundwork, continued low CIT of 26% and favourable R&D tax environment. A cluster case that shaped Finnish export composition and productivity stats through the end of Nokia dominance in 2008-2012.

  '

description: 'Athens 2004 Summer Olympics delivered 13-29 August 2004. Budget at bid time ~€4.6bn; final direct cost approximately €9-11bn (excluding security and some infrastructure), with separately-
  counted security spending ~€1bn. Infrastructure investments included Athens Metro expansion, Attiki Odos motorway, tram network, new international airport (opened 2001), and Olympic venues. Post- games
  venue under-utilisation widely noted. Contributed materially to the 2004 revision of Greek deficit statistics.

  '

policy_id: th_visa_free_tourism_expansion_2023
status: candidate
title: Thailand visa-free tourism expansion (2023-2024)
countries:
- THA
timeframe:
  start: 2023
  enacted_date: '2023-09-25'
description: 'Cabinet-level expansion of visa-exemption arrangements under the Srettha government to stimulate tourism arrivals. Temporary visa exemptions granted to Chinese and Kazakh nationals from 25
  September 2023 (later extended and made permanent bilaterally with China from 1 March 2024), to Indian and Taiwanese nationals from 10 November 2023, and to Russian nationals with extended 90-day stays.
  Visa-on- arrival fees waived or extended for multiple additional nationalities. Electronic Travel Authorisation (ETA) announced for rollout 2025. Tourist-arrival numbers recovered to ~35m in 2024 (vs
  2019 peak ~39.9m).

  '
enacted_by:
- thailand_srettha_pheu_thai_2023_2024
- thailand_paetongtarn_pheu_thai_2024_present
coalition_label_at_enactment: Pheu Thai-led coalition

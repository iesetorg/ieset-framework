  direction: +
  magnitude: weak
  intended: true
  rationale: Service-trade openness via tourism liberalisation.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Short-stay visitor regime materially loosened for key source markets.
references:

policy_id: tr_banker_scandal_financial_deregulation_1982
status: candidate
title: Turkey Banker scandal and financial re-regulation 1982
countries:
- TUR
timeframe:
  start: 1982
description: 'Collapse of ''banker'' (unlicensed deposit-taker) Kastelli and related entities mid-1982 following July 1980 interest-rate liberalisation and aggressive retail deposit-taking at very high
  rates. Several major commercial banks (Istanbul Bankasi, Hisarbank) were taken over by the Central Bank. Prompted Özal''s temporary removal as Deputy PM (July 1982) and tightening of banking regulation,
  partially reversing the 1980 liberalisation.

  '

policy_id: lux_free_public_transport_2020
status: candidate
title: Luxembourg nationwide free public transport 2020
countries:
- LUX
timeframe:
  start: 2020
  end: ongoing
  enacted_date: '2020-03-01'
description: 'Luxembourg made standard-class public transport free nationwide from 1 March 2020 across trains, trams, and buses, while keeping first-class rail and some cross-border services outside the
  free-fare rule. The policy shifted operating cost recovery away from passenger fares and toward general public financing, with stated mobility, congestion, and environmental objectives.

  '
enacted_by:
- luxembourg_eu_integrated_social_market_governance_2008_present
coalition_label_at_enactment: Bettel II DP-LSAP-Greens coalition
axes_moved:
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  intended: true
  rationale: Passenger fares for standard public transport were replaced by tax-financed operating support.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: The state assumed farebox revenue previously paid by users, modestly increasing the public spending footprint.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: The measure was part of a mobility shift intended to reduce car dependence, congestion, and transport emissions.

policy_id: tz_julius_nyerere_hydropower_commissioning
status: candidate
title: Julius Nyerere Hydropower Project commissioning
countries:
- TZA
timeframe:
  start: 2024
  end: ongoing
description: 'Tanzania moved the Julius Nyerere Hydropower Project from construction toward grid commissioning, adding large state-backed hydropower capacity to the electricity system. The project continued
  an earlier CCM megaproject but under Suluhu it became part of the current supply-security and industrial-power agenda, with TANESCO integrating staged turbine commissioning into national generation planning.

  '
enacted_by:
- tanzania_suluhu_ccm_2021_present
scope: national
coalition_label_at_enactment: CCM Suluhu government

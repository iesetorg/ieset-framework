  rationale: Commissioning a multi-gigawatt hydropower project materially expands domestic firm-power capacity.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: The state financed and coordinated a targeted electricity-generation megaproject.
- axis: regulatory.environmental_stringency

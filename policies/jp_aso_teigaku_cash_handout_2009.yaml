policy_id: jp_aso_teigaku_cash_handout_2009
status: candidate
title: Aso Teigaku Cash Handout 2009
countries:
- JPN
timeframe:
  start: 2007
  end: 2009
description: 'The Teigaku Kyufukin (fixed-amount stimulus benefit) was a one-off universal cash payment of JPY 12,000 per resident (JPY 20,000 for under-18s and over-65s) distributed in spring 2009 under
  the second Aso supplementary budget. It was financed from general accounts as countercyclical demand support during the post-Lehman recession, with disbursement administered through municipalities.

  '

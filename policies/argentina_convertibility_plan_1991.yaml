policy_id: argentina_convertibility_plan_1991
status: candidate
title: Convertibility Plan (Plan Cavallo) — Argentina 1991-2002
countries:
- ARG
timeframe:
  start: 1991
  end: 2002
  enacted_date: '1991-04-01'
description: 'Architect: Finance Minister Domingo Cavallo under President Carlos Menem. Pegged the Argentine peso 1:1 to the USD via statutory currency-board- like rule requiring each peso in circulation
  to be backed by USD in central bank reserves. Broke the 1989-90 Argentine hyperinflation (peak monthly inflation >200%). Companion measures: privatisation of state enterprises (YPF, Entel, Aerolíneas),
  trade liberalisation, deregulation. Growth boom 1991-1998 followed by severe recession 1998-2001, ending in crisis and convertibility collapse December 2001. Canonical case of successful short-run stabilisation
  and long-run accumulation of real-exchange-rate imbalance that the peg itself made impossible to correct without rupture.

  '

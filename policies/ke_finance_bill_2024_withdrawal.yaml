description: 'The Finance Bill 2024 proposed a 2.5% motor-vehicle tax, 16% VAT on bread, eco-levy on sanitary products and electronics, and excise on mobile-money transfers — projected to raise KES 346bn.
  Sparked leaderless Gen-Z "Occupy Parliament" protests from 18 Jun 2024 that on 25 Jun 2024 breached Parliament after it passed the third reading; at least 60 protesters were killed across subsequent Saba
  Saba (7 Jul 2024) and later protest waves per KNCHR. On 26 Jun 2024 Ruto declined to assent and returned the bill; on 11 Jul 2024 he dismissed almost the entire cabinet, forming the "broad-based government"
  with ODM representation in Aug 2024. The episode collapsed the IMF programme''s revenue anchor and forced renegotiation of targets in the 9th review.

  '

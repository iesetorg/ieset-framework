description: 'In June 2017 President Trump announced US withdrawal from the Paris Agreement on climate change, citing perceived asymmetric burdens on the US economy. The formal withdrawal under Article
  28 of the agreement took effect on November 4, 2020. The decision halted US participation in the Nationally Determined Contribution architecture and signalled broader rollback of federal climate-related
  rulemaking.

  '

description: 'Excise on sugar-sweetened beverages and separate levy on disposable tableware, both introduced through the 2021 Arrangements Law. Sugary- drinks tax modelled on UK SDIL; disposable-plastics
  levy raised prices roughly fourfold. Both measures repealed by the incoming Netanyahu VI government in 2023, making the episode a natural short-window policy experiment.

  '

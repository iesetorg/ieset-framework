policy_id: venezuela_pdvsa_politicisation_2002
status: candidate
title: Venezuela Pdvsa Politicisation 2002
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'Following the 2002-2003 PDVSA general strike, the Chavez government dismissed approximately 18,000 PDVSA employees—around half the workforce—including senior technical and managerial staff.
  The state oil company was restructured as a politically loyal organisation, used as a vehicle for direct social-mission financing (Misiones), and increasingly diverted from upstream reinvestment. The
  purge marked the inflection point for the long-run technical decline of PDVSA.

  '

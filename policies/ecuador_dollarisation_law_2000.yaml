- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Abolition of domestic-currency issuance removed political control over monetary policy.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Loss of sucre printing capacity sharply contracted the discretionary money-supply path.
- axis: institutional.property_rights
  direction: +
  magnitude: weak
  intended: true
  rationale: USD-denominated contracts eliminated devaluation risk on savings and long-tenor obligations.
- axis: regulatory.financial_deregulation
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Trole I freed FX dealings while imposing tighter prudential rules on a now-foreign-currency banking system.

policy_id: ecuador_dollarisation_law_2000
status: candidate
title: Ecuador Dollarisation Law 2000
countries:
- ECU
timeframe:
  start: 2000
  end: ongoing
description: 'Ley para la Transformación Económica del Ecuador (Trole I) of March 2000 fixed the sucre at 25,000 per US dollar, mandated conversion of all balance-sheet items to USD, and eliminated the
  central bank''s authority to issue base money. The law followed President Mahuad''s January 2000 announcement and a hyperinflation/banking-crisis collapse, anchoring monetary policy through outright greenback
  adoption.

  '

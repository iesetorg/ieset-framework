description: '30-month Extended Fund Facility replacing the 2018 SBA, totalling ~USD 44bn in SDR-equivalent disbursements designed to roll over obligations to the Fund itself rather than provide new financing.
  Fiscal targets: primary deficit 2.5% (2022), 1.9% (2023), 0.9% (2024); BCRA financing of Treasury capped at 1% of GDP in 2022; accumulate USD 5bn reserves in 2022. Program ratified by Congress via Ley
  27.668. CFK publicly opposed the deal driving the Jul 2022 Guzmán resignation. Targets were repeatedly missed and waived through 2022-2023; Massa renegotiated reserve targets mid-2023 after severe drought-induced
  export collapse.

  '

policy_id: iran_bonyad_parastatal_system
status: candidate
title: Iran Bonyad Parastatal System
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'Following the 1979 revolution, large foundations (bonyads) inherited assets nationalised from the Pahlavi monarchy and aligned families, evolving into vast parastatal conglomerates such as
  the Bonyad Mostazafan (Foundation of the Oppressed) and Astan Quds Razavi. Reporting directly to the Supreme Leader rather than the cabinet, bonyads operate across manufacturing, agribusiness, real estate
  and finance with preferential foreign-exchange access, tax exemptions, and partial budget opacity, controlling an estimated 20–30% of non-oil GDP.

  '
enacted_by:
- iran_revolution_islamic_economy_1979_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bonyad scale and preferential treatment crowded out private competitors across multiple sectors.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Bonyad welfare programmes for war veterans and the poor functioned as off-budget transfer channels.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Bonyad-linked import licences distorted trade-policy implementation in favour of insider firms.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Asset transfers without compensation and limited judicial review weakened formal-property norms.

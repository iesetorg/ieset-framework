policy_id: ar_macri_tax_reform_2017
status: candidate
title: Comprehensive tax reform (Ley 27.430, Dec 2017)
countries:
- ARG
timeframe:
  start: 2017
  end: 2019
  enacted_date: '2017-12-29'
description: 'Ley 27.430 enacted a multi-year corporate-tax-rate schedule reducing the CIT rate from 35% to 30% (2018-2019) and 25% (2020+), introduced a dividend withholding, cut employer social contributions
  on low-wage labour, modernised transfer-pricing rules, established a fiscal consensus with provinces rolling back the distorting gross-receipts (ingresos brutos) tax, and expanded the scope of personal-income-tax
  exemptions. Portions were subsequently suspended or reversed under the 2019 emergency law and the Fernández administration.

  '

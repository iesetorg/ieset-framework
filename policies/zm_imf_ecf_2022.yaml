policy_id: zm_imf_ecf_2022
status: candidate
title: Zambia IMF Extended Credit Facility programme 2022
countries:
- ZMB
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-08-31'
description: 'Zambia entered an IMF Extended Credit Facility programme after the 2020 sovereign default, using the arrangement to anchor debt restructuring, fiscal consolidation, revenue administration,
  arrears clearance, and monetary policy credibility. The programme constrained discretionary spending while protecting selected social spending and tied disbursements to reforms in public financial management,
  debt transparency, and state-owned enterprise oversight.

  '
enacted_by:
- zambia_hichilema_upnd_2021_present
scope: national
coalition_label_at_enactment: UPND Hichilema government
axes_moved:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Programme targets and arrears controls restrain discretionary spending after default.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  intended: true
  rationale: The ECF supports anti-inflation credibility and reduced fiscal dominance over the Bank of Zambia.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Debt transparency and public-finance conditions improve fiscal governance and auditability.
references:
- IMF Executive Board approval of Zambia Extended Credit Facility, 31 August 2022.
- Zambia Ministry of Finance and National Planning, IMF programme and budget statements, 2022-2024.

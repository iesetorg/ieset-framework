policy_id: iran_usury_free_banking_law_1983
status: candidate
title: Iran Usury Free Banking Law 1983
countries:
- IRN
timeframe:
  start: 1979
  end: ongoing
description: 'The Law for Usury (Riba)-Free Banking 1983 converted Iran''s banking system to Islamic-finance principles, prohibiting interest-based lending and requiring banks to operate via profit-sharing
  (mudaraba), partnership (musharaka), instalment-sale, and rental contracts. The Central Bank of Iran retained authority to set "expected profit rates" that effectively functioned as administered interest
  rates, reshaping credit allocation across the post-revolutionary economy.

  '
enacted_by:
- iran_revolution_islamic_economy_1979_present
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Mandatory contractual templates limited financial-product differentiation across banks.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Sub-market mandated profit rates on certain loans operated as implicit subsidies to favoured borrowers.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Foreign-bank participation became practically impossible under sharia-compliance and licensing rules.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Profit-rate ceilings periodically imposed losses on depositors and creditors during inflation surges.

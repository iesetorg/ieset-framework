policy_id: chile_soe_privatisations_1975_1989
status: candidate
title: Chile SOE Privatisations 1975-1989
countries:
- CHL
timeframe:
  start: 1975
  end: 1990
description: 'Two-wave privatisation programme under the Pinochet military government, executed by the Chicago Boys economic team via CORFO. The first wave (1975-1979) returned to private hands the firms
  expropriated under Allende''s 1971-1973 nationalisations; the second wave (1985-1989), following the 1982-1983 banking crisis, divested CAP, ENDESA, CTC, Soquimich and other large state holdings via stock-issuance
  and sometimes state-financed worker/employee shareholding schemes. The state-share of GDP declined materially; copper (CODELCO) was retained.

  '
enacted_by:
- pinochet_chicago_boys_1975_1990
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Privatised firms faced the parallel uniform-tariff regime, exposing them to import competition and embedding openness.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Transfer of large industrial holdings to private operators dismantled the SOE-monopoly market structure inherited from the Allende era.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Second-wave (1985-89) divestiture used state-financed share purchases via reformed banks, deepening the regulated financial-system linkage.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sales were executed under a non-democratic regime via discretionary CORFO procedures with limited contestability.

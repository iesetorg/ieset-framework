title: Usmca 2020
countries:
- USA
timeframe:
  start: 2017
  end: 2021
description: 'The United States-Mexico-Canada Agreement (USMCA) entered into force on July 1, 2020, replacing NAFTA. It tightened automotive rules of origin (75 percent regional value content), introduced
  a labour-value-content threshold tied to a $16/hour wage floor, strengthened labour and environmental enforcement chapters, and added digital trade and intellectual property provisions. A 16-year sunset
  clause subjects the agreement to periodic review.

  '

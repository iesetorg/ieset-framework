policy_id: pk_9_11_pivot_nato_alliance_2001
status: candidate
title: Pakistan 9/11 pivot and US counter-terror alliance (2001)
countries:
- PAK
timeframe:
  start: 2001
  end: 2008
  enacted_date: '2001-09-19'
description: 'Pakistan''s strategic pivot 19 September 2001 agreeing to seven US demands following 9/11: airspace/logistical access, border- control cooperation, intelligence sharing, public condemnation
  of terror, halt to Taliban support, block fund flows, enable Operation Enduring Freedom. Reversed decade-long official support for Afghan Taliban. Sanctions lifted progressively from October 2001 (Pressler,
  Glenn Amendment, democracy-related), $3bn debt rescheduling, $1.5bn F-16 sale restored (eventually delivered 2008). Pakistan designated Major Non-NATO Ally 2004. Received ~$33bn US aid 2001-2017 including
  Coalition Support Funds. Domestically controversial — triggered TTP insurgency response from 2002 onward with major operations in FATA.

  '

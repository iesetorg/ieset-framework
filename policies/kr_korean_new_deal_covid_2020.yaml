policy_id: kr_korean_new_deal_covid_2020
status: candidate
title: Korean New Deal and COVID fiscal response (South Korea, 2020)
countries:
- KOR
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-07-14'
description: 'Announced 14 July 2020 as a KRW 160 trillion (~8% of 2020 GDP) package through 2025 across Digital New Deal (data, AI, 5G infrastructure), Green New Deal (renewable capacity, green mobility,
  building retrofit), and Safety-Net Strengthening (employment insurance expansion, basic livelihood security). Accompanied by four supplementary budgets in 2020 totalling ~KRW 67 trillion including universal
  emergency disaster relief payments (KRW 1 million/household first round, subsequently targeted). General government debt/GDP rose from 38% (end-2019) to ~48% (end-2022).

  '

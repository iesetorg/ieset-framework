policy_id: ph_build_build_build_2017_2022
status: candidate
title: '''Build Build Build'' infrastructure programme'
countries:
- PHL
timeframe:
  start: 2017
  end: 2022
  enacted_date: '2017-04-18'
description: 'Flagship public-infrastructure programme announced April 2017 under the Duterte administration, targeting public infrastructure spending of 5-7% of GDP (against historic ~2-3%). Initial pipeline
  of 75 flagship projects (later expanded to ~119 and then to the Infrastructure Flagship Projects list of 224 worth ~₱9 trillion) spanning rail (Metro Manila Subway, PNR North-South Commuter Rail, Mindanao
  Railway phase 1), urban mass transit (MRT-7, LRT-1 Cavite extension), inter-island connectivity (Cebu-Cordova Link Expressway, Panguil Bay Bridge), regional airports (Bicol, Clark expansion, Bulacan New
  Manila Intl Airport), flood control, and irrigation. Financing mix shifted from pure PPP (Aquino-era) to a hybrid model drawing heavily on Japanese ODA (JICA), Chinese Exim-bank ODA, World Bank, ADB,
  and General Appropriations Act funded lines. Actual disbursement 2017-22 was below the announced target but infra spending share of GDP did rise to ~5%, an historic high.

  '
enacted_by:
- philippines_duterte_2016_2022
coalition_label_at_enactment: PDP-Laban-led supermajority
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: Public infrastructure capex rose to historic highs of ~5% of GDP, supported by TRAIN revenue and debt financing; largest fiscal-expansion channel of the Duterte period outside COVID.
  intended: true
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Targeted state investment in transport, irrigation, flood control and regional airports represents a large directed public-capital programme.
  intended: true

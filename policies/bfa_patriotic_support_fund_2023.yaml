policy_id: bfa_patriotic_support_fund_2023
status: candidate
title: Burkina Faso Patriotic Support Fund 2023
countries:
- BFA
timeframe:
  start: 2023
  end: ongoing
description: >
  Burkina Faso created and funded the Fonds de soutien patriotique to finance
  the security and territorial-recovery effort, including support for Volunteers
  for the Defence of the Homeland and related emergency spending. The fund used
  earmarked levies and voluntary contributions on top of ordinary budget
  channels, making the counterinsurgency effort a dedicated fiscal instrument
  rather than only a line-item security appropriation.
enacted_by:
- burkina_faso_mpsr_transition_sovereignty_2022_present
scope: national
coalition_label_at_enactment: MPSR military transition
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: The fund expanded earmarked security and emergency expenditure outside ordinary peacetime budgeting.
- axis: fiscal.tax_progressivity
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Earmarked levies broadened revenue collection, but incidence varied across consumption, telecoms, and voluntary channels.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Dedicated extra-budgetary security financing reduced transparency relative to normal budget scrutiny.
references:
- Burkina Faso Ministry of Economy and Finance and government materials on the Fonds de soutien patriotique, 2023-2024.
- IMF Burkina Faso programme and Article IV reporting on security-related fiscal pressures and earmarked support funds, 2023-2024.
notes: >
  Public reporting on fund execution is incomplete; the entry codes the formal
  fiscal instrument and earmarked-security purpose.

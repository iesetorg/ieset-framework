policy_id: italy_labour_market_dualism_persistence_1990s_2010s
status: candidate
title: Italy Labour Market Dualism Persistence 1990S 2010S
countries:
- ITA
timeframe:
  start: 1999
  end: ongoing
description: 'Sequential reforms — the 1997 Treu Package, the 2003 Biagi law, and the 2014–15 Jobs Act — liberalised fixed-term, agency-temp and project-based contracts at the margin while leaving Article
  18 dismissal protections for permanent contracts largely intact until 2015, producing a sharply dual labour market with high turnover among under-35 workers and stable insiders. Combined with euro entry
  without companion unit-labour-cost reform, the dualism trapped young Italians in low-tenure employment and depressed productivity-enhancing reallocation.

  '
enacted_by:
- italy_euro_entry_non_reform_1999
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: ECB inflation anchor magnified competitiveness costs of unreformed labour-market core.
- axis: regulatory.product_market_competition
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Dualism left product-market competition broadly unchanged through the period.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Marginal liberalisation of atypical contracts coexisted with intact insider protections — net effect ambiguous.
- axis: fiscal.spending_level

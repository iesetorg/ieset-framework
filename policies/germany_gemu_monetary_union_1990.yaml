status: candidate
title: German Economic, Monetary and Social Union (GEMU) 1 July 1990
countries:
- DEU
timeframe:
  start: 1990
  end: 1990
  enacted_date: '1990-07-01'
description: 'Staatsvertrag of 18 May 1990 established German Economic, Monetary and Social Union from 1 July 1990. DDM converted to DM at 1:1 for wages, salaries, pensions and savings up to 4000 DDM (2000
  DDM for under-15s, 6000 for over-60s); higher savings at 2:1. FRG social, fiscal, and economic order extended to GDR. Political choice against Bundesbank advice (market rate ~4:1) with major consequences
  for east-German competitiveness.

  '

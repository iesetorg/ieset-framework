  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Governance standardisation of cooperative banks; EU BRRD bail-in applied.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: SpA conversion eased M&A and consolidation.

policy_id: it_popolari_banking_reform_2015
status: candidate
title: Italy banche popolari reform + first BRRD bail-in (2015)
countries:
- ITA
timeframe:
  start: 2015
  end: 2017
  enacted_date: '2015-01-20'
description: 'Decree-law 3/2015 under the Renzi government obliging banche popolari (cooperative banks) with assets >€8bn to convert to joint-stock companies (SpA) within 18 months, ending the ''one-shareholder-one-vote''
  rule and easing consolidation. Affected UBI, Popolare di Milano, Banco Popolare, BPER, Popolare di Vicenza, Veneto Banca, Popolare di Sondrio, Popolare dell''Emilia-Romagna, Creval, Popolare di Bari.
  Followed by the 22 Nov 2015 resolution of Banca Etruria + Banca Marche + CariChieti + CariFerrara under the BRRD framework — the first major Italian bail-in of subordinated bondholders, with retail holders
  losing ~€700m in aggregate, becoming a sustained political and reputational issue.

  '
enacted_by:
- italy_renzi_pd_2014_2016
coalition_label_at_enactment: PD + NCD + SC
axes_moved:

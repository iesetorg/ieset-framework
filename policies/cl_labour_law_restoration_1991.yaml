description: 'Ley 19.049 (1991) and subsequent 1990s reforms partially restored collective-bargaining rights narrowed under the 1979 Plan Laboral of José Piñera. Restored firm-level bargaining and strike
  rights; sectoral bargaining remained prohibited; recognition of union federations facilitated. Minimum-wage adjustments above inflation during the Aylwin term. Much narrower than pre-1973 regime; the
  Pinochet-era Plan Laboral architecture largely survived.

  '

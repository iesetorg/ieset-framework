title: Medicaid 1965
countries:
- USA
timeframe:
  start: 1964
  end: 1968
description: 'Medicaid was created by Title XIX of the Social Security Amendments of 1965 (Pub. L. 89-97) as a joint federal-state program providing health coverage for low-income individuals and families,
  with federal matching funds (FMAP) tied to state per-capita income. Each state administers its own program within federal rules, covering mandatory populations including children, pregnant women, the
  elderly poor, and persons with disabilities. The program has expanded repeatedly, reaching tens of millions of enrollees.

  '

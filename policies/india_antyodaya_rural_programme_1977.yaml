  enacted_date: '1977-10-02'
description: 'Rajasthan-originated antyodaya (''rise of the last person'') programme targeted subsidised ration-card transfers and employment support to the poorest 5 households per village, launched by
  BLD/Janata state governments (Rajasthan, UP, Bihar) from 1977. Precursor strand for later targeted rural programmes (Integrated Rural Development Programme 1980 under Indira) and conceptually related
  to 2000-era Antyodaya Anna Yojana.

  '

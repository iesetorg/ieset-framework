policy_id: germany_energiewende_2011
status: candidate
title: Energiewende — post-Fukushima nuclear phase-out + renewable-energy acceleration
countries:
- DEU
timeframe:
  start: 2011
  end: ongoing
  enacted_date: '2011-06-30'
description: 'Following the Fukushima accident in March 2011, the Merkel government reversed its 2010 extension of nuclear plant lifetimes, legislated the phase-out of all German nuclear generation by 2022,
  and accelerated the Erneuerbare-Energien-Gesetz (EEG) feed-in-tariff framework for renewables. The package was extended under subsequent coalitions (Grand Coalition 2013, Grand Coalition 2018, Ampel 2021)
  with further environmental stringency (coal phase-out targets, 2030/2045 climate-neutrality) and — jointly — deepening dependence on pipeline gas imports. The 2022 Russian gas crisis surfaced the supply-security
  implications explicitly.

  '
enacted_by:
- germany_merkel_ii_cdu_fdp_2009_2013
- germany_scholz_ampel_2021_2025
coalition_label_at_enactment: CDU/CSU–FDP (2011); CDU/CSU–SPD (2013, 2018); SPD–Greens–FDP (2021)
axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  intended: true
  rationale: Nuclear phase-out + EEG feed-in tariffs + coal phase-out targets substantially tightened the environmental regulatory regime.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Permits, mandates, and sectoral allocations proliferated around generation, grid, and storage.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  intended: true
  rationale: EEG subsidies financed by a surcharge on retail electricity bills; additional direct subsidies for grid and offshore wind.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Nuclear capacity was removed before equivalent firm generation was in place; gas-import dependence deepened — unintended on the stated goals but structurally implied by the policy mix.

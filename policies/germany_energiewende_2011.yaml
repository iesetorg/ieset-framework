notes: 'Energiewende is explicitly called out in mega-spec §J.1.4 and §J.2.3 as a calibration case for channel-separated intervention measurement: the regulatory-channel effects are large and measurable,
  the fiscal-channel effects are meaningful but secondary. The intended_vs_unintended distinction on supply security is the analytically important feature.

  '

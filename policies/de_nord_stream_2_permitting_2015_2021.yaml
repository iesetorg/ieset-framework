policy_id: de_nord_stream_2_permitting_2015_2021
status: candidate
title: Nord Stream 2 pipeline permitting and political defence 2015-2021
countries:
- DEU
timeframe:
  start: 2015
  end: 2021
  enacted_date: '2018-03-27'
description: 'German federal and state-level permitting approvals for Nord Stream 2 doubling direct Russian-pipeline-gas import capacity to ~110 bcm/year, maintained across US sanctions (CAATSA 2017, PEESA
  2019/2020) and EU member-state objections until certification was suspended by BNetzA in Nov 2021 and the pipeline was permanently halted by Chancellor Scholz on 22 Feb 2022. Coded as a Merkel-era policy
  because the permitting stack and political defence of the project (framed by successive governments as a private commercial matter) spanned 2015-2021. Explosion in the Baltic Sea September 2022 rendered
  the supply-security question moot but the policy trajectory is the textbook case of revealed dependence on a single adversarial supplier.

  '
enacted_by:
- germany_merkel_broad_2005_2021
coalition_label_at_enactment: CDU/CSU-SPD Grand Coalition (2013-2017, 2018-2021)
axes_moved:
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  intended: false
  rationale: Doubled concentration on a single politically unreliable pipeline supplier; displaced diversification options.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Permitting approvals streamlined pipeline investment over environmental and geopolitical objections.
references:

policy_id: pl_coal_energy_transition_stance_2017_2023
status: candidate
title: Coal Energy Transition Stance 2017 2023
countries:
- POL
timeframe:
  start: 2017
  end: 2023
description: 'Cumulative stance of the Morawiecki PiS government on Poland''s coal-heavy energy mix between 2017 and 2023, including the 2020 social-contract delaying mine closures to 2049, support for
  state miner Polska Grupa Górnicza, opposition to faster EU ETS tightening, and the postponement of ambitious climate-neutrality commitments. The trajectory preserved domestic coal employment but raised
  structural emissions exposure during the EU Fit-for-55 period.

  '
enacted_by:
- poland_morawiecki_pis_2017_2023
axes_moved:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Coal subsidies and severance commitments financed transfers to mining-region workers and households.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Direct support to state coal companies and 2022 energy-shield measures expanded total budget outlays.
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  intended: true
  rationale: Subsidised retail prices and capped tariffs disproportionately benefited lower-income consumers.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: weak
  intended: true
  rationale: State control over PGG and PGE was deepened, narrowing space for independent generation entrants.

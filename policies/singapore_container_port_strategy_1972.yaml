policy_id: singapore_container_port_strategy_1972
status: candidate
title: Singapore container port strategy, 1972
countries:
- SGP
timeframe:
  start: 1972
  end: 1990
description: Singapore opened the Tanjong Pagar container terminal in 1972 and used port corporatisation,
  logistics investment, and customs/transport coordination to deepen its role as a high-throughput
  trade hub. The policy bundle reinforced the LKY-era choice to build a globally connected port-state
  economy.
coalition_label_at_enactment: People's Action Party government under Lee Kuan Yew
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  intended: true
  rationale: Container-port investment lowered trade frictions and expanded logistics openness.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Port efficiency improved contestability for export/import-linked firms.

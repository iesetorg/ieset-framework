title: Brazil Pe-de-Meia School Savings Programme 2024
countries:
- BRA
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-16'
description: 'Law 14.818/2024 created Pe-de-Meia, an education-linked savings and cash incentive for low-income public high-school students. The programme pays enrolment, attendance, grade-completion, and
  ENEM participation incentives through student accounts, with the stated goal of reducing dropout and supporting completion among students registered in CadUnico households.

  '

description: '27 February 1989 spontaneous urban revolt beginning in Guarenas (Caracas metropolitan periphery) triggered by ~30% bus-fare increase following the Paquete Económico fuel-price rise. Rioting,
  looting, and working-class mobilisation spread to Caracas by afternoon and to major cities. Constitutional guarantees suspended; army and National Guard deployed. Official death toll 276; investigations
  (including 1990 exhumations at La Peste cemetery) and Inter-American Court (El Caracazo v. Venezuela, 2002) suggest >1,000 deaths. Consensus rupture of the Punto Fijo political system.

  '

policy_id: us_chips_act_2022
status: candidate
title: CHIPS and Science Act 2022
countries:
- USA
timeframe:
  start: 2022
  end: 2027
  enacted_date: '2022-08-09'
description: '$52.7 billion in direct semiconductor manufacturing, R&D, and workforce subsidies (including $39bn for fab construction administered by Commerce, $11bn for R&D, $2bn for legacy-chip investment),
  a 25% advanced- manufacturing investment tax credit, and ~$200bn in authorised (largely unappropriated) science funding for NSF, DOE, NIST, and regional tech hubs. Bipartisan passage (Senate 64-33, House
  243-187-1). Explicitly framed as industrial policy to reshore leading-edge chip fabrication and reduce dependence on Taiwan + Korea, with China-investment "guardrails" restricting recipients from expanding
  advanced-node capacity in countries of concern for 10 years. Led by Commerce under Raimondo; major announced awards include Intel (Arizona, Ohio), TSMC (Arizona), Samsung (Texas), Micron (New York). Companion
  to IRA + IIJA in the Biden industrial-policy stack.

  '

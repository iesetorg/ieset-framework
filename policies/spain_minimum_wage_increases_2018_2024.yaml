description: 'The Sánchez government raised the Salario Mínimo Interprofesional (SMI) sharply via successive Royal Decrees beginning RDL 28/2018, lifting the minimum wage from €735.90 in 2018 toward €1,134
  monthly by 2024. Increases were guided by Comisión Asesora SMI recommendations targeting 60% of median wage in line with EU Adequate Minimum Wage Directive thresholds.

  '

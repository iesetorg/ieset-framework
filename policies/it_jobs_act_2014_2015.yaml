policy_id: it_jobs_act_2014_2015
status: candidate
title: Italy Jobs Act (Law 183/2014 + delegated decrees)
countries:
- ITA
timeframe:
  start: 2014
  end: 2016
  enacted_date: '2014-12-10'
description: 'Renzi government''s flagship labour-market reform: enabling Law 183/2014 and eight delegated decrees (D.lgs. 22-23/2015, 81/2015, 148/2015, 149-151/2015). For new hires, Article 18 reinstatement
  on unfair dismissal replaced by graduated indemnity (''tutele crescenti'', 2-24 monthly wages); reduction in contract typologies (from 45 to 6 forms); new NASpI unified unemployment insurance; streamlined
  supervisory Ispettorato; voucher simplification; parental-leave and work-life-balance reforms. Combined with a three-year temporary SSC exemption (2015 hires, ~€8k/yr for 3y) producing ~800k additional
  permanent contracts 2015-2016. Empirical evaluations mixed on net employment effect once SSC exemption expired.

  '
enacted_by:
- italy_renzi_pd_2014_2016
coalition_label_at_enactment: PD + NCD + SC + UdC
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  intended: true
  rationale: Reinstatement remedy abolished for new hires; contract-typology simplification.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: NASpI unified unemployment insurance expanded coverage and duration.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Three-year SSC exemption ~€18bn fiscal cost 2015-2018.
references:

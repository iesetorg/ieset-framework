policy_id: in_sixth_pay_commission_2008
status: candidate
title: India Sixth Central Pay Commission implementation (2008)
countries:
- IND
timeframe:
  start: 2008
  end: 2009
  enacted_date: '2008-08-29'
description: 'Sixth Central Pay Commission report submitted March 2008, implemented effective 1 January 2006 (retrospective). Delivered ~40% salary increase for ~4.5 million central-government employees
  and ~3.5 million pensioners. Pay bands and grade-pay structure replaced prior pay scales. Arrears of ~Rs 17,800 crore disbursed across fiscal years 2008-09 and 2009-10. State governments followed with
  their own pay-commission pass-through rounds, amplifying overall fiscal impact. Contributed to the demand impulse carrying India through the 2008-09 global crisis period; widely cited contributing factor
  to subsequent CPI pressure.

  '
enacted_by:
- india_manmohan_singh_upa_i_2004_2009
coalition_label_at_enactment: INC-led UPA-I
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: ~40% public-sector salary uplift with retrospective arrears; raised current-expenditure share of GDP.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: false
  rationale: Pensioner uplift extended defined-benefit transfer obligation.

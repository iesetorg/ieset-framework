policy_id: indonesia_pma_foreign_investment_law_1967
status: candidate
title: Indonesia Pma Foreign Investment Law 1967
countries:
- IDN
timeframe:
  start: 1966
  end: 1998
description: 'Law No. 1/1967 on Foreign Investment (Penanaman Modal Asing) opened Indonesia to foreign direct investment after the Sukarno-era nationalisations, offering tax holidays, profit-repatriation
  guarantees, and protection from arbitrary expropriation under a Berkeley-Mafia-designed framework. Paired with Law No. 6/1968 on domestic investment, it formed the legal foundation of New Order economic
  openness and underpinned subsequent oil-, manufacturing-, and resource-sector investment inflows.

  '

policy_id: th_surayud_capital_controls_dec_2006
status: candidate
title: Thailand 30% Unremunerated Reserve Requirement on short-term inflows December 2006
countries:
- THA
timeframe:
  start: 2006
  end: 2008
  enacted_date: '2006-12-18'
description: 'Bank of Thailand introduced 30% unremunerated reserve requirement (URR) on short-term foreign-currency inflows on 18 December 2006, effective 19 December 2006, to stem rapid appreciation of
  the baht. Stock Exchange of Thailand fell 14.84% the following day, largest single-day drop in history. BoT partially reversed the measure for equity-market inflows within 24 hours; URR on other inflows
  persisted until 3 March 2008. Wiped out ~THB 820bn market cap and triggered capital-outflow and foreign-investor-confidence damage that persisted beyond the formal measure. Canonical example of capital-controls
  attempt under the Surayud military-interim government.

  '
enacted_by:
- thailand_surayud_interim_2006_2008
coalition_label_at_enactment: CNS-appointed interim cabinet
axes_moved:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  rationale: Short-term capital-flow restriction; signalling effect larger than direct friction.
  intended: true
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  rationale: Sudden policy shift with retroactive application elements damaged investor confidence.
  intended: false

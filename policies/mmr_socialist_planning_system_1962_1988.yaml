# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: mmr_socialist_planning_system_1962_1988
status: candidate
title: Socialist Planning and Military Economic Administration
countries:
- MMR
timeframe:
  start: 1962
  end: 1988
description: The Burmese Way to Socialism organised economic management through central plans, state procurement, public enterprise targets, administrative prices, and military-party supervision. Planning priorities emphasised self-sufficiency, state-led industrialisation, and political control over allocation rather than market signals or private investment.
enacted_by:
- mmr_burmese_way_to_socialism_1962
axes_moved:
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Administrative planning and public enterprise targets substituted for market competition.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Credit and monetary administration were subordinated to state planning priorities.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  intended: true
  rationale: Public enterprise and state administrative budgets became central instruments of economic allocation.
references:
- Maung Maung (1969), Burma and General Ne Win
- Robert H. Taylor (2009), The State in Myanmar

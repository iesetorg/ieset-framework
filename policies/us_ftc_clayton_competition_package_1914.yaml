# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: us_ftc_clayton_competition_package_1914
status: candidate
title: FTC and Clayton competition package 1914
countries: [USA]
timeframe:
  start: 1914
  end: 1914
  enacted_date: "1914-10-15"
description: >
  The Federal Trade Commission Act and the Clayton Antitrust Act of 1914 updated and
  operationalised U.S. anti-monopoly law after the broad but often uncertain Sherman
  framework. The package created the FTC as a standing administrative competition body,
  prohibited specific anti-competitive practices such as certain tying and exclusive-
  dealing arrangements, and narrowed judicial acceptance of mergers and interlocking
  directorates that entrenched concentration in national markets.
enacted_by:
  - us_progressive_era_reform_consensus_1901_1917
axes_moved:
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: strong
    intended: true
    rationale: "The package was explicitly designed to lower anti-competitive barriers and make market structure more contestable through standing federal enforcement."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "A permanent competition agency and clearer statutory prohibitions made enforcement more regular and less discretionary than ad hoc Sherman-era litigation alone."
references:
  - "Federal Trade Commission Act, 38 Stat. 717 (1914)"
  - "Clayton Antitrust Act, 38 Stat. 730 (1914)"

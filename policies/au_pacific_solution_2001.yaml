description: 'Migration Amendment (Excision from Migration Zone) Act 2001 and companion bills assented 27 September 2001 — excised Christmas Island, Ashmore and Cartier, and Cocos (Keeling) Islands from
  migration zone; established offshore processing on Nauru and Manus (PNG). Triggered by 26 August 2001 MV Tampa incident. Ended 2008 by Rudd; reinstated under Rudd 2012 and Abbott 2013.

  '

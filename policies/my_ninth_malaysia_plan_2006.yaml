description: '9th Malaysia Plan announced by PM Abdullah Badawi on 31 March 2006 under National Mission framework. Development expenditure RM 200bn over five years (up from RM 170bn in 8MP). Five thrusts:
  (i) higher value-added economy, (ii) human-capital development, (iii) addressing persistent socio-economic inequalities (NEP continuity), (iv) quality of life, (v) government-delivery reform. Launched
  five regional economic corridors: Iskandar (Johor), Northern Corridor (Kedah/Perlis/ Penang), East Coast Economic Region, Sabah Development Corridor, Sarawak Corridor of Renewable Energy. Delivery below
  targets on manufacturing-value-added and government- reform components; mega-project approach criticised for cost overruns. Global financial crisis 2008-09 led to RM 67bn stimulus package supplementary
  plans.

  '

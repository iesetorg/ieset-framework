policy_id: th_telecom_concessions_framework_1991_1992
status: candidate
title: Thailand telecom concessions framework 1991-1992
countries:
- THA
timeframe:
  start: 1991
  end: 1992
description: 'Anand interim government established telecommunications concession framework under which TelecomAsia (landlines Bangkok), Thai Telephone & Telecom (TT&T, provincial landlines), UCOM/DTAC (cellular)
  and AIS (cellular) operated as private concessionaires of state carriers TOT and CAT. Generated rapid network expansion (Thailand teledensity from 3% to 12% by 2000) but left behind a dual-structure concession
  regime that complicated subsequent convergence regulation.

  '
enacted_by:
- thailand_anand_panyarachun_technocrat_1991_1992
coalition_label_at_enactment: Technocratic interim under PM Anand
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  intended: true
  rationale: Private-sector telecom concessions; market opened beyond state monopolies.
references:

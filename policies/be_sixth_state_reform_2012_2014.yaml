description: 'Major federal-devolution package legislated 2012-2014 under the Di Rupo government: splitting of the Brussels-Halle-Vilvoorde judicial and electoral district (implementation of 2010 Cour Constitutionnelle
  ruling); transfer of ~€20bn in competences to Regions and Communities (family allowances, parts of labour-market activation, justice/law-enforcement components, parts of health-care and elderly-care,
  tax-autonomy expansion); Senate reform to indirectly-elected body; constitutional-court ''bijzondere wet'' implementing legislation. Hailed as the unlock to a decade of Belgian communitarian stalemate.

  '

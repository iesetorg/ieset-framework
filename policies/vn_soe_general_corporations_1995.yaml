description: 'Law on State-Owned Enterprises promulgated 20 Apr 1995 restructured SOE sector; Decision 90/TTg and 91/TTg created ''General Corporations'' (Tổng công ty 90 and 91) conglomerating SOEs into
  18 Tong Cong Ty 91 (centrally-managed, chaebol-style) and 74 Tong Cong Ty 90 (line-ministry-managed). Mixed results — consolidated state industrial base but formalised SOE protection; equitisation pilots
  also begun from 1992.

  '

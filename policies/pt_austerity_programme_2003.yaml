description: '2003 Stability and Growth Programme responded to Portugal''s 2001 4.4% deficit (first EU Excessive Deficit Procedure case) with civil- service wage and recruitment freezes, VAT rate increase
  (17% to 19% in June 2002), one-off revenue measures (privatisation and tax amnesty), and delayed investment programmes. Deficit reduced below 3% in 2002-2003 but growth weakened; Portugal reverted to
  excessive deficit later decade.


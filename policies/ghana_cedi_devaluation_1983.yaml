policy_id: ghana_cedi_devaluation_1983
status: candidate
title: Ghana Cedi Devaluation 1983
countries:
- GHA
timeframe:
  start: 1983
  end: 1991
description: 'Under Rawlings'' April 1983 Economic Recovery Programme, Ghana devalued the cedi by roughly 90% against the dollar via a sequence of administrative steps that culminated in a unified market-clearing
  rate by 1986–1988 through Bank of Ghana auction windows. The move closed the parallel-market gap, restored exporter incentives in cocoa and gold, and was the cornerstone IMF/World Bank conditionality
  of the ERP.

  '
enacted_by:
- ghana_erp_stabilisation_1983_1991
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Realistic exchange rate ended import licensing rents and reopened formal trade channels.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Eliminating parallel-market arbitrage rents restored competitive trader entry conditions.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Devaluation made domestic-currency import outlays more costly, forcing fiscal retrenchment.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Auction-rate regime gave Bank of Ghana a market-based instrument independent of fiscal needs.

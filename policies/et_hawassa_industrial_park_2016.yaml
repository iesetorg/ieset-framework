policy_id: et_hawassa_industrial_park_2016
status: candidate
title: Hawassa Industrial Park inauguration
countries:
- ETH
timeframe:
  start: 2016
  enacted_date: '2016-07-13'
description: 'Hawassa Industrial Park, inaugurated July 13 2016, was the flagship of Ethiopia''s apparel-and-textile export strategy under GTP II. Built by China Civil Engineering Construction Corp. in
  9 months; 52 factory sheds; anchored by PVH Corp., Arvind, Raymond, Indochine. Peak employment reached ~25,000-30,000 jobs at wages of ~$26-40/month, drawing debate on living-wage adequacy. Ethiopia''s
  AGOA eligibility (suspended under Biden Jan 2022 over Tigray) was central to the model.

  '

description: 'Jabatan Telekom Malaysia (Department of Telecommunications) corporatised 1 Jan 1987 as Syarikat Telekom Malaysia Sdn Bhd (STM). IPO and KLSE listing Nov 1990. Combined with Telecommunications
  Act 1988 introducing a licensing regime. Mobile-network licence granted to Celcom (Technology Resources Industries, TRI) 1988 — duopoly structure initially. First large-scale Malaysian privatisation by
  market value.

  '

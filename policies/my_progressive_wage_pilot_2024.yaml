  intended: true
  rationale: Government wage-ladder co-subsidy of RM200-300/month per participating worker.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Structured wage-progression incentive embeds a state-designed pay ladder even if voluntary at pilot stage.

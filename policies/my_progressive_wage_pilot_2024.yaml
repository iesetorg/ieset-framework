policy_id: my_progressive_wage_pilot_2024
status: candidate
title: Progressive Wage Policy pilot (Malaysia, 2024)
countries:
- MYS
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-06-01'
description: 'Pilot programme under the Ministry of Economy (led by Rafizi Ramli) launched June 2024 — voluntary wage-ladder architecture for participating employers of Malaysian workers earning RM1,500-RM4,999,
  with government providing RM200-RM300/month per worker as co-subsidy during pilot phase. Modelled on Singapore''s Progressive Wage Model but opt-in rather than sectoral-mandatory. Phase 1 pilot covered
  ~1,000 firms; national scale-up targeted for 2025. Complements statutory minimum wage increase to RM1,700/month effective 1 February 2025.

  '
enacted_by:
- malaysia_anwar_unity_2022_present
coalition_label_at_enactment: Pakatan Harapan + Barisan Nasional Unity Government

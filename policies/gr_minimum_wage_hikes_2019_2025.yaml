policy_id: gr_minimum_wage_hikes_2019_2025
status: candidate
title: Greece minimum wage hikes 2019-2025 (€650 to €880)
countries:
- GRC
timeframe:
  start: 2019
  end: 2025
  enacted_date: '2019-01-28'
description: 'Sequence of statutory minimum-wage increases executed partly by the outgoing Tsipras government (first rise to €650 gross, effective 1 February 2019 under Joint Ministerial Decision 4241/127/2019,
  reversing the 22% Memorandum-era cut and abolishing the sub-minimum for under-25s) and then by the Mitsotakis government through Law 4826/2021 and subsequent annual reviews: €663 (Jan 2022), €713 (May
  2022), €780 (Apr 2023), €830 (Apr 2024), €880 (Apr 2025 — announced January 2025). Cumulative nominal increase 35% 2019-2025; real increase moderated by 2021-2023 inflation peak. Adjustment procedure
  institutionalised in Law 4826/2021 with committee involving social partners, KEPE, INE-GSEE, IOBE, Bank of Greece.

  '
enacted_by:
- greece_tsipras_syriza_2015_2019
- greece_mitsotakis_nd_2019_present
coalition_label_at_enactment: SYRIZA (initial 2019 rise); New Democracy (subsequent rises 2022-2025)
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: Statutory floor raised cumulatively 35% nominal 2019-2025 after the 2012 Memorandum cut; sub-minimum for under-25s abolished 2019.
- axis: fiscal.transfer_expansion

policy_id: turkey_cbrt_political_pressure_2013_2023
status: candidate
title: Turkey Cbrt Political Pressure 2013 2023
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
description: 'Turkey''s de facto erosion of central-bank independence between 2013 and 2023, formalised through Presidential Decree 73 of 2019 (transferring CBRT governor appointment power to the Presidency)
  and the dismissal of four governors in five years (Cetinkaya 2019, Uysal 2020, Agbal 2021, Kavcioglu 2023), aligned monetary policy with President Erdogan''s heterodox view that high interest rates cause
  inflation. The intended effect (as articulated by the executive) was to deliver below-zero real rates to stimulate credit growth and exports; the realised effect was double-digit lira depreciation and
  inflation peaking above 80% in 2022.

  '

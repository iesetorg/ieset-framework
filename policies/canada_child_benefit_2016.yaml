policy_id: canada_child_benefit_2016
status: candidate
title: Canada Child Benefit 2016
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'The Canada Child Benefit, introduced in Budget 2016 by the new Trudeau Liberal government, replaced the prior Universal Child Care Benefit and Canada Child Tax Benefit with a single income-tested
  monthly transfer paying up to C$6,400/year per child under 6 (lower for older children) and phasing out across upper income deciles. CRA delivers the benefit on a tax-free basis, and it is widely credited
  with material reductions in the LIM after-tax child-poverty rate by 2018.

  '

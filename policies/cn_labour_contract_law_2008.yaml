policy_id: cn_labour_contract_law_2008
status: candidate
title: Labour Contract Law 2008
countries:
- CHN
timeframe:
  start: 2002
  end: 2012
description: 'Labour Contract Law of the PRC effective 1 January 2008 under the Hu-Wen leadership, mandating written employment contracts, restricting fixed-term contracts (with open-ended contracts after
  two renewals), constraining termination grounds and notice/severance, and tightening rules on dispatched workers. Aimed to formalise employment and improve labour-rights enforcement.

  '

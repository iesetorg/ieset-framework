policy_id: thailand_inflation_targeting_2000
status: candidate
title: Thailand Inflation Targeting 2000
countries:
- THA
timeframe:
  start: 1997
  end: 2006
description: 'In May 2000 the Bank of Thailand formally adopted inflation targeting as its monetary-policy framework, replacing the post-1997 monetary-aggregate approach. The Monetary Policy Committee was
  empowered to set the 14-day repurchase rate to keep core inflation within an announced target band, with formal codification later in the Bank of Thailand Act 2008. The framework supported post-crisis
  nominal stability under the floating-baht regime.

  '
enacted_by:
- thailand_asian_crisis_and_recovery_1997_2001
axes_moved:
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Transparent rate setting under inflation targeting reduced administrative credit controls.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Establishment of the MPC granted operational autonomy over policy-rate decisions.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Stable monetary anchor enabled larger discretionary fiscal expansion in the 2000s.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Predictable inflation environment reduced inflation tax on real-value transfers.

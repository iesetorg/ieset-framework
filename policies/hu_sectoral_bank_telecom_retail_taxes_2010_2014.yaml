policy_id: hu_sectoral_bank_telecom_retail_taxes_2010_2014
status: candidate
title: Sectoral Bank Telecom Retail Taxes 2010 2014
countries:
- HUN
timeframe:
  start: 2010
  end: 2022
description: 'Beginning in 2010 the Orbán government legislated a series of "crisis" sectoral surtaxes targeted at banks, telecommunications operators, energy utilities, and large retailers (Acts XCIV/2010
  and successors), originally framed as temporary but progressively institutionalised through 2014 and beyond. The levies were pitched as making "foreign multinationals" contribute to fiscal consolidation
  while protecting households from austerity, and the proceeds funded transfer programmes such as the utility-cost cuts (rezsicsökkentés).

  '
enacted_by:
- hungary_orban_2010_2022
axes_moved:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sectoral revenues funded household tax cuts and supported the flat personal income tax adopted in parallel.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Headline corporate rate stayed low and was later cut to 9%, with the burden shifted to sectoral surtaxes.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Receipts financed family allowance increases and utility-cost-cut transfers to households.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Domestic incumbents and SMEs received exemptions and effective subsidies versus taxed multinationals.

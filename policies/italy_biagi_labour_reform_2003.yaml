policy_id: italy_biagi_labour_reform_2003
status: candidate
title: Biagi labour reform
countries:
- ITA
timeframe:
  start: 2003
  enacted_date: '2003-09-10'
description: 'Legge Delega 30/2003 (14 February 2003) and Decreto Legislativo 276/2003 of 10 September 2003 implementing the labour-market reform proposed by Marco Biagi (assassinated by Red Brigades 19
  March 2002). Introduced staff-leasing ("somministrazione"), project-based work ("lavoro a progetto" replacing co.co.co.), occasional-accessory work, part-time flexibility, apprenticeship reform, and private
  placement agencies. Did not touch Article 18 firing-protection (withdrawn after 2003 strikes and 2003 Article 18 referendum failed).

  '

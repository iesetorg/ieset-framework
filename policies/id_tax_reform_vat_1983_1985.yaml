policy_id: id_tax_reform_vat_1983_1985
status: candidate
title: Indonesia tax reform and VAT introduction (1983-1985)
countries:
- IDN
timeframe:
  start: 1983
  end: 1985
  enacted_date: '1983-12-31'
description: 'Comprehensive tax-law overhaul enacted Dec 1983: new Income Tax Law (UU 7/1983), VAT Law (UU 8/1983) with 10% rate effective 1 Apr 1985, General Provisions on Taxation (UU 6/1983), Land and
  Building Tax (UU 12/1985). Replaced colonial-era and 1950s ordinances with a modern self-assessment regime. Harvard Institute for International Development advisory support (Malcolm Gillis). Tax/GDP ratio
  (non-oil) rose from ~5% (1983) to ~11% (1990).

  '
enacted_by:
- indonesia_suharto_oil_boom_1976_1985
coalition_label_at_enactment: Golkar (Suharto)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: Modern corporate-income-tax code; non-oil tax/GDP ratio more than doubled.
- axis: fiscal.spending_level
  direction: '0'
  magnitude: weak
  intended: true
  rationale: Revenue-diversification; reduced oil-rent dependence without net spending change.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Codified tax law replacing discretionary colonial-era ordinances.
references:
- 'Gillis (1985), ''Micro and Macroeconomics of Tax Reform: Indonesia'', Journal of Development Economics'
- UU 6/1983, UU 7/1983, UU 8/1983 and UU 12/1985

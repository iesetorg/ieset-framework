description: 'Law of 26 April 1985 extended permissible fixed-term contracts to 18 months without just-cause requirement (previously 6 months) and relaxed procedural EPL for small firms. Modest first step
  toward labour-market flexibilisation under Kohl government. Subsequent reforms 1996 and Hartz IV 2003-05 went substantially further.

  '

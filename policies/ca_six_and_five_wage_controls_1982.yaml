description: 'The Public Sector Compensation Restraint Act (Bill C-124) capped federal public-sector wage increases at 6% (1982-83) and 5% (1983-84), suspended collective bargaining for federal employees,
  and signalled to provinces and the private sector. Federal inflation was ~11% at enactment; the programme was central to the Bank of Canada''s disinflation backdrop.

  '

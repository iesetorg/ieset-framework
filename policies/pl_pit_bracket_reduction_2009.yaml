description: 'PIT bracket structure simplified from three (19%, 30%, 40%) to two (18%, 32%) effective 1 Jan 2009 (legislated under preceding PiS-led government 2006, took effect under Tusk). Accompanied
  by increased child tax credit and unchanged tax-free threshold. Narrowed effective progressivity at mid-incomes.

  '

policy_id: id_military_civilian_supremacy_reforms_2000
status: candidate
title: Indonesia civil-military relations reforms (2000-2004)
countries:
- IDN
timeframe:
  start: 2000
  end: 2004
  enacted_date: '2000-08-18'
description: 'Sequence of civil-military reforms initiated under Habibie, deepened under Wahid-Megawati. TNI/POLRI separated 1 April 1999 (Inpres 2/1999). August 2000 MPR decree (TAP MPR VII/2000) formally
  ended dwifungsi doctrine and confined TNI to defence role. Civilian Defence Minister Juwono Sudarsono (Wahid era). Police (POLRI) placed under President directly, not MoD. Law 34/2004 on TNI clarified
  professional military''s defence-only role. Military faction in DPR progressively phased out by 2004. Remaining gaps: business-ownership and territorial-command structure.

  '
enacted_by:
- indonesia_wahid_reformasi_1999_2001
- indonesia_megawati_pdip_2001_2004
coalition_label_at_enactment: Poros Tengah / Megawati coalition
axes_moved:
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  intended: true
  rationale: Ended dwifungsi; civilian supremacy principle institutionalised; military-block phase-out from legislature.
- axis: institutional.judicial_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Military jurisdiction narrowed; limited progress on civilian courts for soldier-against-civilian offences.
references:
- TAP MPR VII/2000 on the Role of TNI and POLRI
- Law 34/2004 on TNI
- Mietzner (2009), 'Military Politics, Islam, and the State in Indonesia'

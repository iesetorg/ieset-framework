policy_id: cn_housing_commercialisation_1998
status: candidate
title: Housing Commercialisation 1998
countries:
- CHN
timeframe:
  start: 1989
  end: 2002
description: 'State Council Document No. 23 (1998) ending the work-unit (danwei) housing allocation system, privatising existing public housing to occupants at concessional prices, and creating a market-based
  system of commodity housing finance under the Zhu Rongji government. Catalysed the development of a private mortgage market and is identified as the foundation of China''s subsequent residential property
  cycle.

  '
enacted_by:
- china_jiang_era_1989_2002
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Real-estate market opening attracted FDI into property development and construction-materials trade.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Market-priced commodity housing replaced administrative allocation, enabling competing developers to enter.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Decoupling housing from work-unit allocation made job-changing and rural-urban migration much easier.
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  intended: true
  rationale: Local-government land-sale revenue and subsidised mortgage lending channels expanded markedly.

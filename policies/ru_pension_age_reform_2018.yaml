description: 'Announced by PM Medvedev 14 June 2018 (during football World Cup): retirement age rise for men 60 -> 65 (by 2028) and women 55 -> 63 (by 2034). After mass protests, Putin announced modifications
  29 Aug 2018 softening women''s target to 60 (by 2028) and adding family- benefit offsets. Law 350-FZ signed 3 Oct 2018. First Russian pension- age rise since Soviet-era settings.

  '

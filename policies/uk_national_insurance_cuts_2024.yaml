policy_id: uk_national_insurance_cuts_2024
status: candidate
title: UK National Insurance rate cuts 2024
countries:
- GBR
timeframe:
  start: 2024
  end: 2024
  enacted_date: '2024-01-06'
description: 'Two successive cuts to employee Class 1 National Insurance: from 12% to 10% on 6 January 2024 (Autumn Statement 2023) and from 10% to 8% on 6 April 2024 (Spring Budget 2024). Combined annual
  cost ~£20bn. Self-employed Class 4 NI rate cut from 9% to 6% and Class 2 NI abolished. Framed as a supply-side cut to tax on work, though largely offset by the ongoing freeze of income-tax thresholds
  (fiscal drag). Pensioners and landlords did not benefit (NI not charged on pension or rental income).

  '

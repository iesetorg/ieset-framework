policy_id: lk_sovereign_default_2022
status: candidate
title: Sri Lanka pre-emptive external-debt default (April 2022)
countries:
- LKA
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2022-04-12'
description: 'On 12 April 2022 the Central Bank of Sri Lanka and Ministry of Finance announced a pre-emptive suspension of payments on all external commercial, bilateral and multilateral debt (excluding
  ADB/WB/AIIB) — Sri Lanka''s first sovereign default. Triggered by terminal forex depletion (usable reserves below $50mn by April), compounded by the 2019 tax cuts'' revenue loss, the 2021 fertiliser shock,
  COVID tourism collapse, and refusal to approach the IMF earlier. Initiated the external debt restructuring that subsequently framed the March 2023 IMF Extended Fund Facility.

  '

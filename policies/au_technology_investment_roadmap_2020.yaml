title: Technology Investment Roadmap — Australia 2020
countries:
- AUS
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-09-22'
description: 'Low-Emissions Technology Statement and Technology Investment Roadmap released September 2020 by Energy Minister Angus Taylor. Set stretch cost targets for clean hydrogen (<A$2/kg), energy
  storage, low-emissions steel and aluminium, CCS, and soil carbon; A$20bn of Commonwealth investment via ARENA, CEFC and the Clean Energy Regulator over the decade to 2030, aimed at leveraging A$80bn in
  private co-investment. Substituted technology co-funding for an economy-wide carbon price. Net-zero-by-2050 commitment formalised October 2021 ahead of COP26, without an updated 2030 target or price instrument.

  '

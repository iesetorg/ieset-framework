policy_id: it_tremonti_ter_2009
status: candidate
title: Italy Tremonti-ter accelerated-depreciation incentive
countries:
- ITA
timeframe:
  start: 2009
  end: 2010
  enacted_date: '2009-07-01'
description: 'Third iteration of the Tremonti-style capex incentive (D.L. 78/2009): firms deducting 50% of the cost of machinery investment (Ateco codes ''divisione 28'' and specified equipment) from taxable
  base for the period July 2009-June 2010 as a counter-cyclical supply-side measure during the GFC. Budget cost estimated €0.7bn in 2010 and €1.5bn in 2011. Followed earlier Tremonti-bis (2001-2002) and
  Tremonti-quater structures.

  '

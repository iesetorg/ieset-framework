description: 'Housing Australia Future Fund Act 2023 established a A$10bn off-budget investment vehicle managed by the Future Fund Board of Guardians, with annual earnings (capped at A$500m/year) directed
  to finance 30,000 social and affordable dwellings over five years through Housing Australia. Passed after protracted Senate negotiation with the Greens, who secured a A$3bn direct-grants top-up to states
  and territories.


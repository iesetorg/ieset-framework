# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: sn_groundnut_marketing_board_1960s
status: candidate
title: "Groundnut marketing-board system"
countries: [SEN]
timeframe: {start: 1960, end: 1980}
description: >
  Senegal's early post-independence governments managed the groundnut economy
  through state-backed marketing, cooperatives, producer-price policy, and
  crop-finance institutions. The system made the main export crop a fiscal and
  developmental instrument, supporting rural organisation while also extracting
  and reallocating rents through public agencies.
enacted_by:
  - senegal_senghor_socialist_democracy_1960_1980
coalition_label_at_enactment: "UPS / Socialist Party"
axes_moved:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Producer prices, crop finance, and stabilization mechanisms channelled fiscal support through the groundnut sector.", intended: true}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Marketing boards and cooperatives shaped authorised channels for crop commercialization.", intended: true}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State marketing reduced private competitive intermediation in the key export crop.", intended: true}
references:
  - "Catherine Boone, Merchant Capital and the Roots of State Power in Senegal"
  - "World Bank, Senegal agricultural-sector historical reports"

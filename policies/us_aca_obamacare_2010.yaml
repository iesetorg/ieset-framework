description: 'Patient Protection and Affordable Care Act (P.L. 111-148) signed 23 Mar 2010. Individual mandate (penalty zeroed 2019 via TCJA), employer mandate, guaranteed issue + community rating, essential
  health benefits, Medicaid expansion to 138% FPL (optional after NFIB v Sebelius 2012), federal + state exchanges with premium tax credits. Expanded insurance coverage by ~20m by 2016; uninsured rate fell
  from ~16% to ~9%. Net fiscal cost CBO estimate ~USD 1.8trn 2016-2025 before TCJA changes.

  '

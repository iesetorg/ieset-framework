policy_id: eg_morsi_2012_constitution_referendum
status: candidate
title: Morsi 2012 Constitution Referendum
countries:
- EGY
timeframe:
  start: 2012
  end: 2013
description: 'After President Morsi''s November 2012 constitutional declaration shielding presidential decrees from judicial review, a hastily drafted constitution was passed by referendum in December 2012
  with about 64% approval on roughly 33% turnout. The text codified an enhanced role for sharia principles, expanded executive authority, and constrained judicial review — triggering large protests and
  ultimately preceding the July 2013 ouster.

  '

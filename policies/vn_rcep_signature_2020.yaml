policy_id: vn_rcep_signature_2020
status: candidate
title: Rcep Signature 2020
countries:
- VNM
timeframe:
  start: 2016
  end: 2021
description: 'Vietnam signed the Regional Comprehensive Economic Partnership (RCEP) in November 2020 alongside the other ASEAN-10 members plus China, Japan, South Korea, Australia, and New Zealand. The
  agreement entered into force on 1 January 2022 and consolidated overlapping ASEAN-plus-one FTAs under common rules of origin, expanded e-commerce and IP chapters, and graduated tariff cuts on approximately
  90 percent of intra-bloc goods trade over twenty years.

  '
enacted_by:
- vietnam_phuc_pm_2016_2021
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  intended: true
  rationale: Unified rules-of-origin across ASEAN-plus-five lowered cumulation barriers and broadened tariff cuts.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Bloc-wide IP and dispute-settlement chapters added enforceable commitments beyond pre-existing FTAs.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: E-commerce, services, and investment chapters expanded contestability across the bloc's largest economies.
- axis: fiscal.spending_level
  direction: '0'

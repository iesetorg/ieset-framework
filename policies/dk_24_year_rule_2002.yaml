title: 24-year rule and attachment requirement (Udlaendingeloven 2002)
countries:
- DNK
timeframe:
  start: 2002
  enacted_date: '2002-07-01'
description: 'Amendments to Udlaendingeloven requiring both spouses to be at least 24 years old for family reunification, plus an ''attachment requirement'' that the couple''s combined ties be stronger
  to Denmark than to any other country. Also introduced a 7-year permanent-residence threshold and benefit restrictions (starthjaelp) for new arrivals.

  '

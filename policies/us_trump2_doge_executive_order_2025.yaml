description: 'Executive Order 14158 re-designating the US Digital Service as the US DOGE Service and establishing a White House DOGE office with an 18-month task-force sunset (to July 2026). Initially led
  by Elon Musk (special government employee until exit May 2025) with stated ambition to cut ~$2T in outlays; revised downward to the low hundreds of billions as the effort encountered statutory and judicial
  constraints on impoundment, RIFs, and agency reorganisations. DOGE initiatives included targeted probationary-employee terminations across agencies, USAID scope narrowing, GSA real-estate disposals, Schedule
  F re- expansion for policy-influencing positions, and rapid access-push into agency payment and personnel systems. Multiple federal-court injunctions in spring 2025 constrained several moves; subsequent
  congressional rescissions codified a subset.

  '

description: 'OBRA 1990 (Pub. L. 101-508), signed 5 November 1990. Raised top individual marginal rate 28%→31%; 10% luxury excise (boats, jewelry, planes); +5¢/gal motor fuel tax; AMT expanded; Medicare
  payroll-tax wage cap raised. Budget Enforcement Act Title XIII created PAYGO scorekeeping and discretionary spending caps through FY1995. Projected $496B deficit reduction over five years. Violated Bush''s
  1988 "read my lips: no new taxes" pledge; Gingrich-led House Republicans split from the President.


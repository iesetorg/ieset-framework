title: Swiss Federal Health Insurance Act (KVG/LAMal, 1994)
countries:
- CHE
timeframe:
  start: 1994
  end: 1996
description: 'Swiss Federal Council and parliament enacting the Krankenversicherungsgesetz (KVG / LAMal), passed in March 1994 and approved in the December 1994 referendum, taking effect 1 January 1996.
  Architecture: universal individual mandate to purchase basic health insurance from approved private non-profit sickness funds (Krankenkassen); a federally defined uniform statutory benefit basket; community-rated
  nominal premiums within each canton-age band, prohibiting risk-rating; guaranteed acceptance and no medical underwriting on the basic plan; canton-administered means-tested premium subsidies (Prämienverbilligung)
  for lower-income households; and supplementary insurance markets left openly competitive. Stated case: replace the patchwork of voluntary cantonal arrangements with universal coverage on a regulated competitive-insurer
  model, contain cost growth through plan choice and managed-care options while preserving solidarity through community rating and subsidies, and create a transparent product-market for basic insurance.'

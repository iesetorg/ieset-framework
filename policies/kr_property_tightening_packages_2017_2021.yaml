policy_id: kr_property_tightening_packages_2017_2021
status: candidate
title: Moon-era real-estate tightening packages (South Korea, 2017-2021)
countries:
- KOR
timeframe:
  start: 2017
  end: 2021
  enacted_date: '2017-08-02'
description: 'Cumulative bundle of 20+ real-estate demand-side tightening measures: (i) designation of Seoul and adjacent districts as "speculative overheated zones" (August 2017) imposing LTV/DTI caps;
  (ii) multi-home acquisition-tax surcharges (up to 12%); (iii) successive hikes to the Jongbuse comprehensive real-estate holding tax on high-assessed-value and multi-home owners; (iv) capital-gains-tax
  rate increases and holding-period extensions; (v) the July 2020 Housing Lease Protection Act revision introducing a "2+2" year tenancy and capping renewal rent increases at 5%; (vi) reconstruction-permit
  and mortgage-product restrictions. Package coincided with ~90% Seoul apartment-price rise 2017-2021.

  '

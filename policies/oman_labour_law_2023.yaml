policy_id: oman_labour_law_2023
status: candidate
title: Oman Labour Law 2023
countries:
- OMN
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-07-25'
description: 'Royal Decree 53/2023 replaced Oman''s 2003 labour law with a new labour code. The statute defines remote work, part-time and temporary work, collective dispute mechanisms, forced-labour and
  passport-retention prohibitions, Omanisation planning duties, economic-dismissal rules, and sanctions for labour-law violations.

  '
enacted_by:
- oman_haitham_fiscal_state_modernisation_2020_present
scope: national
coalition_label_at_enactment: Sultan Haitham appointed government
axes_moved:
- axis: regulatory.labour_market_flexibility
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: The law recognises remote, part-time, temporary, and economic-dismissal channels while also adding worker protections, grievance procedures, and Omanisation obligations.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  intended: true
  rationale: Detailed statutory procedures for disputes, payroll rights, and sanctions make labour-market enforcement more rule-based.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Work by non-Omanis remains conditioned on ministry licensing and Omanisation replacement rules.

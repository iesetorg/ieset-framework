title: Qe3 2012
countries:
- USA
timeframe:
  start: 2008
  end: 2014
description: 'Federal Reserve Quantitative Easing 3 (QE3), announced 13 September 2012 by the FOMC and expanded 12 December 2012, was an open-ended large-scale asset-purchase programme of USD 40 billion
  per month in agency-MBS plus USD 45 billion per month in long-term Treasuries beginning January 2013. Purchases continued until tapered between December 2013 and October 2014. The intended effect was
  to commit to sustained accommodation contingent on labour-market improvement (the "Evans rule" formalised in December 2012), eliminate uncertainty about the exit timing, and complete the Bernanke-era
  unconventional-monetary-policy framework.

  '

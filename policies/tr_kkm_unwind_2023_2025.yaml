policy_id: tr_kkm_unwind_2023_2025
status: candidate
title: KKM FX-protected deposit unwind (Turkey 2023-2025)
countries:
- TUR
timeframe:
  start: 2023
  end: 2025
  enacted_date: '2023-08-20'
description: 'From August 2023 the CBRT and BDDK introduced stepped parameters to disincentivise KKM rollover: reduced remuneration ceilings, higher required-reserve ratios on KKM balances, and conversion
  targets to standard TRY deposits. KKM stock fell from TRY 3.4trn peak (mid-2023) to below TRY 1trn by Q1 2025 — a reduction of ~USD 90bn in sovereign contingent FX exposure. Programme tightly coordinated
  with the rate-hike cycle to lift real TRY deposit returns above KKM-equivalents.

  '
enacted_by:
- turkey_erdogan_third_presidential_2023_present
coalition_label_at_enactment: AKP + MHP

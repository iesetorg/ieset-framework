title: Indonesia anti-terror Perpu package (2002)
countries:
- IDN
timeframe:
  start: 2002
  end: 2003
  enacted_date: '2002-10-18'
description: 'Government Regulations in Lieu of Law (Perpu) 1/2002 and 2/2002 enacted 18 October 2002 following Bali bombings 12 October 2002 (202 dead in Kuta attack by Jemaah Islamiyah). Perpu 1/2002
  established anti-terror legal framework: terror offence definitions, special-court procedures, evidence rules (witness anonymity), extended pre-trial detention. Perpu 2/2002 made the framework retroactively
  applicable to Bali bombings (later struck down by MK 23 July 2004 in Masykur Abdul Kadir case on non-retroactivity principle). Parliament converted Perpu 1/2002 into Law 15/2003. Densus 88 (Detachment
  88) counter-terror unit formed 2003 under POLRI.

  '

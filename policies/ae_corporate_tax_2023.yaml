description: 'Federal Decree-Law No. 47 of 2022 introduced a 9% federal corporate tax on business profits above AED 375,000, effective for financial years starting on or after 1 June 2023. Qualifying free-zone
  income retains 0% treatment. The reform moves the UAE from a zero federal corporate-tax baseline to a modest OECD-compatible rate aligned with the Pillar Two global minimum discussion.


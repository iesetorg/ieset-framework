description: 'Ley 12/2023 por el Derecho a la Vivienda, Spain''s first national housing-rights statute since the democratic transition, was enacted in May 2023 by the Sánchez-Díaz coalition. It introduced
  rent caps in declared "stressed market zones," tax surcharges on large-portfolio landlords with vacant properties, and reservation quotas of social housing in new developments.

  '

title: Flsa 1938
countries:
- USA
timeframe:
  start: 1933
  end: 1939
description: 'The Fair Labor Standards Act of 1938 (Pub. L. 75-718) established the federal minimum wage initially at 25 cents per hour, capped the standard workweek at 40 hours with overtime pay at time-and-a-half,
  prohibited oppressive child labor, and set recordkeeping and enforcement obligations on covered employers. Upheld by the Supreme Court in United States v. Darby (1941), FLSA is the foundational federal
  labor-standards statute and the legal vehicle for subsequent minimum-wage adjustments.

  '

description: 'Perusahaan Otomobil Nasional (Proton) launched the Proton Saga (Mitsubishi Lancer-based) on 9 Jul 1985 as Malaysia''s national car. Proton enjoyed preferential excise-duty (20% vs ~300% on
  imports), component-localisation schedules, and near-exclusive national-car status. Market share ~50%+ through the 1990s. Emblematic Mahathir heavy-industrial project.

  '

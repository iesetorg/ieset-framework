policy_id: mx_oil_boom_external_borrowing_1978_1982
status: candidate
title: Oil-boom external borrowing (Mexico, 1978-1982)
countries:
- MEX
timeframe:
  start: 1978
  end: 1982
description: 'Cumulative external-debt accumulation from USD 27bn (1977) to USD 86bn (1982) largely via syndicated petrodollar loans. Public-sector external debt rose to ~USD 59bn; private USD 22bn. Bet
  that oil-price trajectory and Pemex output expansion would service growing debt. Volcker rate shock plus oil-price softening 1981 broke the strategy, producing the August 1982 moratorium.

  '

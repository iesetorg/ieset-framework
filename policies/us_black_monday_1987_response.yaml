policy_id: us_black_monday_1987_response
status: candidate
title: Black Monday 1987 and Greenspan liquidity response
countries:
- USA
timeframe:
  start: 1987
  enacted_date: '1987-10-19'
description: '19 October 1987 Dow Jones fell 22.6% in a single session, largest one-day percentage decline on record. Greenspan (two months into chairmanship) issued one-sentence statement 20 October pledging
  liquidity; Fed open-market desk flooded banks with reserves and pressured bank lending to brokers. Established the "Greenspan put" precedent of Fed rescue of financial markets. Brady Commission report
  (January 1988) catalogued portfolio-insurance and program-trading propagation; SEC circuit-breakers introduced 1988.

  '
enacted_by:
- us_reagan_second_term_1985_1989
axes_moved:
- axis: monetary.monetary_expansion_direction
  direction: +
  magnitude: weak
  intended: true
  rationale: Short-run liquidity injection; rates rose back in 1988.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  intended: true
  rationale: SEC circuit-breakers.
references:
- Brady Commission Report, January 1988
- Carlson (2007), A Brief History of the 1987 Stock Market Crash

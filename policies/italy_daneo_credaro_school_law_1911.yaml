policy_id: italy_daneo_credaro_school_law_1911
status: candidate
title: Italy Daneo-Credaro school law 1911
countries: [ITA]
timeframe:
  start: 1911
  end: 1911
  enacted_date: "1911-06-04"
description: >
  Law no. 487 of 4 June 1911, commonly known as the Daneo-Credaro law,
  transferred much elementary-school responsibility away from weak
  municipalities toward provincial and central structures, increased state
  financing, and expanded the administrative machinery of public primary
  education. In liberal Italy's uneven territorial setting, the measure
  was a state-capacity reform as much as an education reform: it aimed to
  reduce local inequality in schooling provision and to make elementary
  education a more uniform national responsibility.
enacted_by:
  - italy_giolittian_liberal_reformism_1901_1914
axes_moved:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The state accepted broader financing and administrative obligations for elementary schooling."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    intended: true
    rationale: "The law extended more uniform public administration and national standards across a previously uneven local service."
references:

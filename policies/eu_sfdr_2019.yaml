description: 'Regulation (EU) 2019/2088 — the Sustainable Finance Disclosure Regulation (SFDR) — requires asset managers, insurers, and pension providers operating in the EU to disclose how they integrate
  sustainability risks and adverse impacts into investment decisions and to label financial products by sustainability features (Article 8 light-green and Article 9 dark-green funds). Detailed disclosure
  technical standards (RTS) developed with the ESAs apply from 2023.

  '

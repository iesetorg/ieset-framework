axes_moved:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: weak
  intended: true
  rationale: Mandatory ESG and adverse-impact disclosures embed sustainability risk management in EU finance.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: weak
  intended: true
  rationale: National competent authorities supervise SFDR compliance under existing financial sector licences.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Reporting fixed costs and Article 8/9 product overhead disadvantage smaller asset managers.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Non-EU funds marketing to EU investors must produce SFDR-aligned disclosures.

# yaml-language-server: $schema=../schemas/policy.schema.json
policy_id: japan_gold_standard_restoration_1930
status: candidate
title: Japan gold-standard restoration 1930
countries: [JPN]
timeframe:
  start: 1930
  end: 1931
description: >
  Finance Minister Inoue Junnosuke and the Hamaguchi cabinet restored gold convertibility
  in January 1930 at the prewar parity after more than a decade of suspension. Because
  the yen returned at an overvalued rate into a worsening world slump, the decision
  imposed a strongly deflationary adjustment through falling prices, tighter credit, and
  export stress. Gold outflows and recession forced abandonment of the policy in late
  1931, making it one of the clearest prewar Japanese cases of orthodox monetary
  contraction worsening an external downturn.
enacted_by:
  - japan_prewar_state_building_social_incorporation_1906_1931
coalition_label_at_enactment: "Minseito cabinet under Hamaguchi Osachi"
axes_moved:
  - axis: monetary.monetary_expansion_direction
    direction: "-"
    magnitude: strong
    intended: true
    rationale: "Returning to gold at the old parity forced deflationary monetary adjustment and tighter external discipline."
references:
  - "Gold embargo lifted and yen restored to gold parity, January 1930"
  - "Metzler (2006), Lever of Empire"

policy_id: jp_consumption_tax_hike_1997
status: candidate
title: Japan consumption tax hike from 3% to 5% (1997)
countries:
- JPN
timeframe:
  start: 1997
  end: 1997
  enacted_date: '1997-04-01'
description: 'Raised the national consumption tax from 3% to 5% on 1 April 1997 under legislation passed in 1994 with implementation scheduled for 1997. Combined with scheduled end of special income-tax
  cut and higher social-insurance premiums, the April 1997 fiscal drag was ~¥9tn. Widely cited as the single trigger tipping Japan back into recession alongside the Asian financial crisis; household consumption
  dropped 5% q/q in Q2 1997. Became canonical example of pro-cyclical fiscal tightening in balance- sheet-recession conditions.

  '
enacted_by:
- japan_hashimoto_ldp_1996_1998
coalition_label_at_enactment: LDP-SDP-Sakigake
axes_moved:

  intended: false
  rationale: Consumption-tax expansion shifts burden toward regressive indirect tax.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Fiscal consolidation headline goal; primary balance improved briefly before Asian crisis reversal.

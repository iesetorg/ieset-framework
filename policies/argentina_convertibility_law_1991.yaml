policy_id: argentina_convertibility_law_1991
status: candidate
title: Argentina Convertibility Law 1991
countries:
- ARG
timeframe:
  start: 1991
  end: 2001
description: 'Law 23.928 (Ley de Convertibilidad), enacted under Menem and Economy Minister Domingo Cavallo, established a one-to-one fixed parity between the peso and the US dollar and required that BCRA
  monetary base be fully backed by gold and foreign-currency reserves. The currency-board-style arrangement was paired with privatisation, deregulation, and trade opening. Hyperinflation collapsed within
  months; the regime held until the 2001-02 crisis.

  '

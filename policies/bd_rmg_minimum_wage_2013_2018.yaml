policy_id: bd_rmg_minimum_wage_2013_2018
status: candidate
title: RMG minimum-wage revisions (2013 and 2018)
countries:
- BGD
timeframe:
  start: 2013
  end: 2018
description: 'Two Minimum Wages Board awards for the ready-made garments sector: December 2013 raised the monthly minimum from BDT 3,000 to BDT 5,300 (77% nominal increase) post-Rana Plaza; September 2018
  raised it to BDT 8,000 (51% nominal). Both triggered worker protest over grade-structure compression. Followed by a further revision to BDT 12,500 in November 2023 under the fourth term.

  '

policy_id: jp_postal_privatisation_2005
status: candidate
title: Japan Postal Privatisation Act 2005
countries:
- JPN
timeframe:
  start: 2005
  end: 2017
  enacted_date: '2005-10-14'
description: 'Postal Privatisation Act passed 14 October 2005 after PM Koizumi called a snap general election in August 2005 following Upper House rejection. Split Japan Post (which held ~¥350tn in postal
  savings and life insurance — the world''s largest single financial institution by deposits) into four successor entities: mail delivery (Japan Post Service), postal savings bank (Japan Post Bank), postal
  insurance (Japan Post Insurance), and counter- services network (Japan Post Network). Phased privatisation 2007-2017 with government retaining at least 1/3 stake in holding company. Designed to end below-market-rate
  lending of postal savings to government-affiliated public corporations (FILP second budget), open banking/insurance markets to competition.

  '
enacted_by:
- japan_koizumi_ldp_2001_2006
coalition_label_at_enactment: LDP-Komeito
axes_moved:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  intended: true
  rationale: Opened postal savings/insurance to private-sector competition; dismantled FILP funding channel.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  intended: true
  rationale: Japan Post monopoly broken; four-way split opened entry.
- axis: fiscal.sectoral_subsidy

policy_id: ar_macri_imf_stand_by_2018
status: candidate
title: IMF Stand-By Arrangement (Jun 2018, expanded Sep 2018)
countries:
- ARG
timeframe:
  start: 2018
  end: 2019
  enacted_date: '2018-06-20'
description: 'Following the April-May 2018 sudden stop (peso from ~20 to ~28 ARS/USD, BCRA reserves bleeding), Argentina secured a three-year Stand-By Arrangement with the IMF for USD 50bn — the largest
  in IMF history at the time — signed 20 Jun 2018. Program targeted primary balance by 2020 via accelerated fiscal consolidation and a BCRA monetary-base freeze under new governor Sandleris. In Sep 2018
  the program was expanded to USD 57bn with front-loaded disbursements after continued peso collapse (to ~40 ARS/USD). Argentina drew ~USD 44bn before the program collapsed politically after the Aug 2019
  PASO.

  '

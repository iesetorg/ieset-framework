policy_id: pk_pia_privatisation_2024
status: candidate
title: Pakistan International Airlines privatisation attempt (2024)
countries:
- PAK
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-10-31'
description: 'Privatisation Commission attempted sale of 51-100% of Pakistan International Airlines through a competitive bidding process culminating 31 October 2024. Liabilities carved into a separate
  holding company prior to bid. Only one bidder (Blue World City consortium) submitted an offer of PKR 10bn against a reference price of PKR 85bn; privatisation attempt deemed failed. Restructured bidding
  process planned for 2025 with revised parameters. Flagship IMF-EFF structural benchmark on SOE divestment; first major Pakistani airline-privatisation attempt since the 2006 partial-sale failure.

  '

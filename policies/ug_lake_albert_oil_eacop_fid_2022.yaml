description: 'Uganda and project partners reached final investment decision on the Lake Albert oil development, covering the Tilenga and Kingfisher upstream projects and the export-pipeline route needed
  to commercialise production. The decision moved Uganda from discovery and negotiation into implementation of a national petroleum export project, with associated infrastructure, fiscal terms, land-access
  arrangements, and cross-border logistics.

  '

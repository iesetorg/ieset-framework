policy_id: us_tanf_block_grants
status: candidate
title: Tanf Block Grants
countries:
- USA
timeframe:
  start: 1996
  end: 2001
description: 'The Personal Responsibility and Work Opportunity Reconciliation Act (PRWORA) of 1996 replaced the open-ended Aid to Families with Dependent Children (AFDC) entitlement with the Temporary Assistance
  for Needy Families (TANF) block grant. Federal funds were capped at a fixed annual amount and devolved to states, which gained discretion to set eligibility, work requirements, and a five-year lifetime
  limit on cash assistance. The intent was to convert welfare into a work-conditioned, time-limited transfer system.

  '
enacted_by:
- us_clinton_first_term_1993_1997
axes_moved:
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Capped federal cash assistance, ended AFDC entitlement, and imposed five-year lifetime limit on benefits.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  intended: true
  rationale: Work requirements and time limits pushed welfare recipients into low-wage labour market participation.

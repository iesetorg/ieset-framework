title: California Cap And Trade 2012
countries:
- USA
timeframe:
  start: 2006
  end: ongoing
description: 'California''s economy-wide cap-and-trade programme, designed by CARB under AB 32 authority and launched on 1 January 2013 with the first auction in late 2012, established a declining annual
  cap on covered greenhouse-gas emissions and quarterly allowance auctions linked to Quebec under the Western Climate Initiative. Compliance was extended to power generation and large industry in 2013 and
  to fuel distributors in 2015, with auction proceeds flowing to the state''s Greenhouse Gas Reduction Fund.

  '

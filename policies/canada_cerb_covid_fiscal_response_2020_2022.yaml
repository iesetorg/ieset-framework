title: Canada Cerb Covid Fiscal Response 2020 2022
countries:
- CAN
timeframe:
  start: 2015
  end: ongoing
description: 'Canada''s COVID-19 fiscal response, anchored by the Canada Emergency Response Benefit (CERB), the Canada Emergency Wage Subsidy (CEWS), and the Canada Emergency Business Account (CEBA), delivered
  about C$2,000/month to displaced workers, up to 75% wage subsidies to qualifying employers, and forgivable loans to small businesses through 2020–2022. The cumulative federal envelope peaked at roughly
  15% of GDP in deficit terms in 2020-21, the largest peacetime fiscal expansion in Canadian history.

  '

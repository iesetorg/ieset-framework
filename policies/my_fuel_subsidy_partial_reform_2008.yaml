policy_id: my_fuel_subsidy_partial_reform_2008
status: candidate
title: Malaysia fuel-subsidy partial reform (2008)
countries:
- MYS
timeframe:
  start: 2008
  end: 2008
  enacted_date: '2008-06-04'
description: 'Fuel subsidy reduction 4 June 2008 — premium RON97 petrol raised 78 sen from RM 1.92 to RM 2.70/litre (41% increase), diesel up RM 1.00 to RM 2.58/litre (63% increase). Designed to address
  ballooning subsidy bill amid Brent crude ~$130/barrel oil spike. Cash-rebate scheme introduced for small-vehicle owners to offset burden. Triggered nationwide protest, inflation jumped to 8.4% in July
  2008 (14-year high). Prices partially reversed August-September 2008 as global oil fell; subsidy bill resumed growing. Structural subsidy-reform deferred to Najib era TPM framework 2010-2014 and full
  managed- float 2014.

  '
enacted_by:
- malaysia_abdullah_badawi_umno_2003_2009
coalition_label_at_enactment: Barisan Nasional (UMNO-led)

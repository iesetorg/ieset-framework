  rationale: Fuel-subsidy cut intended; largely reversed within months but demonstrated political cost.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  intended: true
  rationale: Vehicle-owner cash-rebate scheme as partial compensation.
references:

policy_id: ph_coconut_levy_cojuangco_1973_1986
status: candidate
title: Coconut Industry Investment Fund levy (Philippines 1973-1986)
countries:
- PHL
timeframe:
  start: 1973
  end: 1986
  enacted_date: '1973-08-20'
description: 'Series of presidential decrees (PD 276 1973, PD 1468 1978) imposed a levy on coconut farmers collected into the Coconut Industry Development Fund, managed by United Coconut Planters Bank (UCPB)
  under Eduardo Cojuangco and the Coconut Industry Investment Fund (CIIF). Funds used to acquire 14 oil mills (UNICOM) and shares in San Miguel Corporation. PCGG sequestered assets in 1986; Supreme Court
  ruled coco-levy funds public in trust for farmers (2001, 2012 Cocofed cases).

  '

title: IMF Extended Fund Facility — Pakistan $6bn (2019)
countries:
- PAK
timeframe:
  start: 2019
  end: 2023
  enacted_date: '2019-07-03'
description: 'IMF Extended Fund Facility of $6bn (later augmented to $6.5bn) over 39 months, approved by the IMF Executive Board on 3 July 2019. Programme triggered ~30% PKR devaluation, policy-rate peak
  13.25%, electricity and gas tariff hikes, primary-balance targeting, State Bank of Pakistan operational-independence upgrade (structural benchmark realised via SBP Amendment Act 2022), and revenue-to-
  GDP target with FBR documentation push. Programme suspended 2020 COVID, resumed, repeatedly renegotiated, concluded June 2023 with a final-tranche combined review. SBP FX reserves, macro disinflation,
  and current-account adjustment followed programme trajectory with persistent external-financing fragility.

  '

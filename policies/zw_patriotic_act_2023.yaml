policy_id: zw_patriotic_act_2023
status: candidate
title: Zimbabwe Patriotic Act 2023
countries:
- ZWE
timeframe:
  start: 2023
  end: ongoing
description: 'Zimbabwe enacted the Criminal Law (Codification and Reform) Amendment Act, widely called the Patriotic Act, in 2023. The law created offences for conduct framed as wilfully injuring Zimbabwe''s
  sovereignty and national interest, including some forms of engagement with foreign governments around sanctions or intervention. It expanded criminal exposure for opposition, civic, and diaspora political
  activity in the run-up to and aftermath of the 2023 elections.

  '
enacted_by:
- zimbabwe_mnangagwa_zanu_pf_2017_present
scope: national
coalition_label_at_enactment: ZANU-PF Mnangagwa government
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  intended: true
  rationale: Broadly framed national-interest offences increased arbitrary-enforcement risk against opposition and civil-society actors.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Politically salient speech and association offences increase pressure on courts and prosecutors in opposition-related cases.

title: Finland Climate Act (Ilmastolaki 423/2022)
countries:
- FIN
timeframe:
  start: 2022
  enacted_date: '2022-07-01'
description: 'Revised Climate Act (Ilmastolaki 423/2022) enacted under the Marin government, replacing the 2015 climate framework. Legislated Finland''s 2035 carbon-neutrality target into primary law —
  among the most ambitious headline targets in the OECD — with binding interim reduction milestones of 60% by 2030, 80% by 2040, and 90-95% by 2050 relative to 1990 baseline. Extended coverage beyond the
  burden-sharing (non-ETS) sector to include the LULUCF land-use sector, committed the government to prepare a medium-term climate plan each electoral cycle, and strengthened parliamentary reporting. Accompanied
  by accelerated peat-energy phase-out and scaled-up wind and nuclear permitting. Targets retained but implementation timelines partially softened under the Orpo successor government.

  '

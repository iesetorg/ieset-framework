title: Banco Central Autonomy — Lei Complementar 179/2021
countries:
- BRA
timeframe:
  start: 2021
  enacted_date: '2021-02-24'
description: 'Lei Complementar 179/2021 granted the Banco Central do Brasil statutory operational autonomy with fixed-term mandates for the Governor and Directors (4 years, staggered and desynchronised
  from the presidential cycle). It codified the BCB''s price-stability primary objective with secondary objectives of employment and financial stability, and removed the President''s power to dismiss BCB
  leadership at will. The first test came under Lula III (2023-2024) when incoming executive preferences for lower rates did not produce statutory change.

  '

title: Swedish Covid-19 short-time work subsidy (korttidspermittering) 2020
countries:
- SWE
timeframe:
  start: 2020
  end: 2022
  enacted_date: '2020-03-16'
description: 'Short-time work subsidy scheme enacted 16 March 2020 under Tillväxtverket, allowing firms to reduce working hours by 20, 40, 60 or 80 percent with the state covering the majority of the wage
  shortfall. Combined with omställningsstöd firm-liquidity programme, sick-pay compensation changes, and culture/events sector packages. Swedish Covid fiscal response was moderate by EU standards, paired
  with a no-general- lockdown public-health posture under FHM.

  '

description: 'Regulation (EU) 2023/2854 — the Data Act — establishes harmonised rules on access to and use of data generated by connected products and related services, requiring manufacturers to share
  user-generated data with users and authorised third parties, regulating cloud-switching obligations, and creating business-to-government data-sharing duties in exceptional need. Provisions on smart contracts
  and international data transfers are also included; enforcement is by national competent authorities.

  '

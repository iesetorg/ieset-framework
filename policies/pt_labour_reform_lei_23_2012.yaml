policy_id: pt_labour_reform_lei_23_2012
status: candidate
title: Portugal Labour Code Reform (Lei 23/2012)
countries:
- PRT
timeframe:
  start: 2012
  enacted_date: '2012-06-25'
description: 'Under Troika conditionality, Passos Coelho PSD-CDS government amended the Código do Trabalho via Lei 23/2012. Severance for permanent contracts reduced from 30 days/year (already cut from
  45 in 2011) to 20 days/year, with multi-step subsequent cuts toward 12 days; overtime premia halved (50%→25% first hour, 75%→37.5% thereafter); four annual leave days removed; collective-agreement extension
  (portarias de extensão) subjected to 50%-representation threshold — causing coverage to fall sharply 2012-2015; individual and collective dismissal procedures eased. Tribunal Constitucional struck a narrow
  set of provisions but upheld the main architecture.

  '
enacted_by:
- portugal_passos_coelho_psd_cds_2011_2015
coalition_label_at_enactment: PSD-CDS-PP coalition (centre-right)

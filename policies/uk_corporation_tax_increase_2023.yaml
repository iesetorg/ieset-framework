description: 'Implementation on 1 April 2023 of the corporation tax rise announced in the March 2021 Budget: main rate from 19% to 25% on profits above £250,000, with a 19% small-profits rate on profits
  below £50,000 and marginal relief between. First headline corporation tax rise in UK post-war history; reversed more than a decade of Conservative cuts (from 28% at 2010 entry to 19% at 2017). Confirmed
  as going ahead in Hunt''s November 2022 Autumn Statement after the Truss/Kwarteng reversal proposal was abandoned.

  '

policy_id: ie_oecd_pillar2_corporate_tax_2024
status: candidate
title: Ireland OECD Pillar 2 15% minimum effective corporate tax (QDMTT, IIR, UTPR)
countries:
- IRL
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2023-12-18'
description: 'Transposition of the OECD/G20 Inclusive Framework Pillar 2 global minimum tax into Irish law via Finance (No.2) Act 2023 (signed 18 December 2023, effective from fiscal years beginning on
  or after 31 December 2023 — in practice calendar-year 2024 onward). Introduces a Qualifying Domestic Minimum Top-up Tax (QDMTT), an Income Inclusion Rule (IIR), and an Undertaxed Profits Rule (UTPR) to
  ensure that multinational groups with consolidated revenues above €750m pay an effective tax rate of at least 15% on Irish-booked profits. Companies below the threshold continue to face the 12.5% headline
  rate preserved since 2003. Ireland had previously signed the Inclusive Framework statement on 7 October 2021 after holding out until ''around'' language secured 15% as a hard floor rather than higher.

  '
enacted_by:
- ireland_harris_fg_2024_present
- ireland_varadkar_fg_2022_2024
coalition_label_at_enactment: FF + FG + Green rotating-Taoiseach coalition (Varadkar as Taoiseach at signing)
axes_moved:
- axis: fiscal.tax_corporate
  direction: +
  magnitude: moderate
  intended: true
  rationale: 15% effective minimum for in-scope MNCs raises the corporate-tax burden above the 12.5% headline that defined the Irish FDI model since 2003.
references:

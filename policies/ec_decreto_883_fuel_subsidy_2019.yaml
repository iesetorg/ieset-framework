description: 'Executive decree issued 1 Oct 2019 eliminating gasoline (extra, ecopaís) and diesel price subsidies, liberalising retail prices in line with the IMF EFF. Triggered 12 days of indigenous-led
  protests (CONAIE), transport strikes, a brief relocation of the government to Guayaquil, and at least 11 deaths. Repealed via Decreto 894 on 14 Oct 2019 after CONAIE-government dialogue; a successor "focalisation"
  mechanism was negotiated but implementation delayed.

  '

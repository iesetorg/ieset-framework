  end: 2029
description: 'Liberia adopted the ARREST Agenda for Inclusive Development as the Boakai government''s five-year national development plan. The agenda organizes policy around agriculture, roads, rule of
  law, education, sanitation, and tourism, with a stated objective of preserving macroeconomic stability while mobilizing public investment and external resources to close infrastructure and service gaps.

  '

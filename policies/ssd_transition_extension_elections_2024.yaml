policy_id: ssd_transition_extension_elections_2024
status: candidate
title: South Sudan transition extension and election postponement 2024
countries:
- SSD
timeframe:
  start: 2024
  end: 2026
description: >
  South Sudan's transitional parties extended the R-ARCSS transition by two
  years in 2024 and postponed the planned national elections to December 2026.
  The extension was justified by incomplete security arrangements,
  constitution-making, census, and election preparations, but it also kept the
  unelected unity government in office and delayed the first post-independence
  national election.
enacted_by:
- south_sudan_r_arcss_transitional_government_2018_present
scope: national
coalition_label_at_enactment: Revitalized Transitional Government of National Unity parties
axes_moved:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  intended: true
  rationale: The extension delayed electoral accountability and prolonged transitional power-sharing.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Repeated political extensions weakened the credibility of constitutional and electoral deadlines.
references:
- South Sudan transitional-party agreement and government announcements on the 2024 extension.
- IGAD, RJMEC, UNMISS, Associated Press, and Reuters reporting on the postponement of elections to December 2026.
notes: >
  The coding recognizes logistical constraints cited by the parties but scores
  the institutional effect of delaying elections.

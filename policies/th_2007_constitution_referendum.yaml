policy_id: th_2007_constitution_referendum
status: candidate
title: Thailand 2007 Constitution and referendum
countries:
- THA
timeframe:
  start: 2007
  enacted_date: '2007-08-19'
description: 'Post-coup constitution drafted by a Constitution Drafting Assembly appointed by the Council for National Security and approved by referendum 19 August 2007 (58% yes, 42% no, turnout 57.6%).
  Reduced elected lower-house to 480 seats (introducing 80 party-list seats allocated by eight-province constituencies), made Senate half-appointed half-elected (74 appointed by independent-body selection
  committee, 76 elected), strengthened independent bodies (EC, NACC, Constitutional Court, Auditor-General) relative to elected politicians, and established tight political-party dissolution triggers used
  against PPP and later Pheu Thai proxies. Replaced by 2017 constitution after 2014 coup; framework for 2007-2014 political-conflict cycle.

  '

policy_id: us_tcja_corporate_tax_cut_2017
status: candidate
title: Tcja Corporate Tax Cut 2017
countries:
- USA
timeframe:
  start: 2017
  end: 2025
description: 'The Tax Cuts and Jobs Act (TCJA) of 2017 permanently reduced the federal corporate income tax rate from 35 percent to 21 percent and shifted the United States toward a partial territorial
  system for foreign earnings, with a one-time deemed repatriation tax on accumulated offshore profits. Additional provisions included full expensing of short-lived capital, GILTI/BEAT international guardrails,
  and a deduction for pass-through business income. The stated aim was to raise domestic investment and reduce profit shifting.

  '

  enacted_date: '1978-11-03'
description: 'Treaty of Friendship and Cooperation signed Moscow 3 Nov 1978 providing mutual security consultation, Soviet military access to Cam Ranh Bay (former US base), and CMEA integration from 29
  Jun 1978. Generated ~USD1-3bn/year Soviet bloc aid through the 1980s, financing the Cambodia occupation and buffering central-planning inefficiencies. Treaty lapsed 1991 on USSR collapse — crisis trigger
  for Doi Moi acceleration.

  '

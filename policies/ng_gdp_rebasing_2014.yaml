policy_id: ng_gdp_rebasing_2014
status: candidate
title: Nigeria GDP rebasing to 2010 base year
countries:
- NGA
timeframe:
  start: 2014
  end: 2014
  enacted_date: '2014-04-06'
description: 'The National Bureau of Statistics under Statistician-General Yemi Kale released on 6 April 2014 the rebased GDP series using 2010 as base year (replacing the 1990 base), recalculating Nigerian
  nominal GDP upward by approximately 89% to $509bn for 2013. Nigeria overtook South Africa as Africa''s largest economy, revealed telecoms, entertainment (Nollywood), and services as dominant sectors.
  Triggered IMF/World Bank reclassification of Nigeria''s debt ratios and tax-to-GDP ratios (latter fell to ~6%). Statistical — not a policy shift per se — but institutionally consequential for subsequent
  fiscal and monetary analysis.

  '
enacted_by:
- nigeria_jonathan_pdp_2010_2015
coalition_label_at_enactment: PDP

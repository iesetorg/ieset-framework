policy_id: uk_points_based_immigration_2021
status: candidate
title: UK post-Brexit points-based immigration system 2021
countries:
- GBR
timeframe:
  start: 2021
  end: ongoing
  enacted_date: '2021-01-01'
description: 'Ended EU free movement of labour on 1 January 2021 and replaced it with a single global points-based system. Skilled Worker route required a job offer at RQF-3 level, salary thresholds (initially
  £25,600 / going rate), English language and sponsor licence. Abolished the resident-labour-market test and lowered the skill threshold from RQF-6. Created Health and Care Worker visa (2020), Graduate
  route (2021), and Hong Kong BN(O) route (January 2021). Net migration paradoxically rose to record levels (~906k year to June 2023) as non-EU flows expanded to offset EU reduction.

  '
enacted_by:
- uk_johnson_conservative_2019_2022
coalition_label_at_enactment: Conservative majority (Johnson)
axes_moved:
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  intended: true
  rationale: End of EU free movement; formal policy intent was reduced immigration, even though aggregate flows rose.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  intended: false
  rationale: Sector shortages (hospitality, agriculture, HGV drivers) post-EU-worker withdrawal.

policy_id: pt_iva_rise_2005
status: candidate
title: Iva Rise 2005
countries:
- PRT
timeframe:
  start: 2005
  end: 2008
description: 'Portugal''s standard VAT (IVA) rate rise from 19% to 21%, enacted by the Socrates PS government in Decree-Law 192/2005 of 7 November 2005, was the headline measure in the corrective EU excessive-deficit
  programme that followed the 2005 reclassification of the deficit at 6.8% of GDP. The intended effect was to deliver an immediate ~0.7% of GDP in revenue, demonstrate the new socialist government''s commitment
  to Stability and Growth Pact targets, and underwrite the wider Programa de Estabilidade e Crescimento public-administration consolidation programme.

  '

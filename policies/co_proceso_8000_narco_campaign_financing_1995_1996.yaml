description: 'Investigation opened 1995 by Fiscalía (Chief Prosecutor Alfonso Valdivieso) into ~$6M in Cali Cartel funds channelled to Samper''s 1994 campaign via treasurer Santiago Medina and campaign
  manager Fernando Botero Zea. "Narcocassettes" tapes; multiple cabinet members and legislators prosecuted; Medina and Botero convicted. Chamber of Representatives voted 111-43 on 12 June 1996 to close
  the case against Samper personally. US decertified Colombia as narcotics-cooperation partner 1 March 1996; Samper''s US visa revoked July 1996. Most severe LatAm democratic campaign-finance scandal pre-Lava
  Jato.

  '

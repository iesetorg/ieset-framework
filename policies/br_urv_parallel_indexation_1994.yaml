title: URV — Unidade Real de Valor parallel indexation (March-June 1994)
countries:
- BRA
timeframe:
  start: 1994
  enacted_date: '1994-03-01'
description: 'Medida Provisória 434/1994 introduced the Unidade Real de Valor as a parallel unit of account from 1 March 1994 (value set daily by BCB, pegged to USD). Prices, wages, and rents progressively
  re-denominated in URV while cruzeiro real remained as means of payment. On 1 July 1994 URV became the new real (1 URV = 1 real = $1; cruzeiro real retired at 2,750:1). Theoretical innovation: coordinate
  de-indexation without price freeze, avoiding heterodox-plan failure mode.

  '

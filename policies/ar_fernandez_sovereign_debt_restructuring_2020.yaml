description: 'Economy Minister Martín Guzmán led a restructuring of approximately USD 65bn of foreign-law bonds, reaching final agreement with the Ad Hoc, Exchange and Argentina Creditor Committees at ~54.8
  cents on the dollar NPV (exit yield 10%). Accepted participation 93.5%, rising to 99% with collective-action clauses. Concurrent restructuring of ~USD 42bn of local-law dollar bonds on equivalent terms.
  Deal cleared near-term maturities but did not prevent the country returning to distress within 18 months.

  '

policy_id: in_waqf_amendment_act_2025
status: candidate
title: India — Waqf (Amendment) Act 2025
countries:
- IND
timeframe:
  start: 2025
  enacted_date: '2025-04-08'
description: 'The Waqf (Amendment) Act 2025, passed by Parliament 3-4 April 2025 and receiving Presidential assent 5 April 2025 (notified 8 April), amends the Waqf Act 1995. Key changes: renames the Act
  to the Unified Waqf Management, Empowerment, Efficiency and Development Act; requires that creators of waqf be practising Muslims for at least five years and legal owners of the property; removes ''waqf
  by user'' going forward; mandates inclusion of non-Muslim and Muslim-woman members on Central Waqf Council and State Waqf Boards; transfers dispute-adjudication powers partly to designated revenue officers
  / courts from Waqf Tribunals; strengthens survey and registration requirements with defined digital portal. Challenged before the Supreme Court (multiple petitions filed April 2025); SC indicated status-quo
  on specified provisions pending constitutional-bench hearing. Coalition context: passed with JD(U) and TDP support after Joint Parliamentary Committee deliberations Aug 2024-Jan 2025.

  '
enacted_by:
- india_modi_third_term_2024_present
coalition_label_at_enactment: BJP-led NDA (Modi third term)
axes_moved:
- axis: institutional.property_rights
  direction: mixed
  magnitude: moderate
  intended: true
  rationale: Tighter registration and definition regime for waqf property (pro-formalisation); removal of 'waqf by user' and retroactive questions opposite direction for existing claims.
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: weak
  intended: true
  rationale: Unified digital registration strengthens record-keeping; constitutional challenge before SC pending on religious-autonomy and equal-treatment grounds.

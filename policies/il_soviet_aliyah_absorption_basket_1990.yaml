policy_id: il_soviet_aliyah_absorption_basket_1990
status: candidate
title: Soviet-Jewish aliyah absorption basket (1990)
countries:
- ISR
timeframe:
  start: 1990
  end: 1992
description: 'From 1989 Israel received roughly 400,000 Soviet-Jewish immigrants in three years, raising the population ~8%. The 1990 "absorption basket" replaced in-kind absorption-centre housing with
  direct cash grants (initially ~$2,500 per family) plus mortgage subsidies, language-training vouchers, and professional-retraining allowances. The switch to cash grants was an early-1990s neoliberal-style
  direct-transfer innovation in Israeli social policy.

  '
enacted_by:
- israel_shamir_likud_second_1988_1992
axes_moved:
- axis: regulatory.immigration_openness
  direction: +
  magnitude: strong
  rationale: Mass-scale Law of Return implementation absorbed ~8% population increase in two years.
  intended: true
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: Direct cash absorption grants; mortgage subsidies; large transitional fiscal transfer.
  intended: true

policy_id: sv_bitcoin_legal_tender_2021
status: candidate
title: Bitcoin Law — BTC as legal tender alongside the US dollar (Decreto 57, 2021)
countries:
- SLV
timeframe:
  start: 2021
  end: 2024
  enacted_date: '2021-06-09'
description: 'The Ley Bitcoin (Decreto Legislativo N° 57, approved 9 Jun 2021 by the Nuevas Ideas supermajority, effective 7 Sep 2021) made El Salvador the first country to adopt Bitcoin as legal tender
  alongside the US dollar (dollarised since 2001). The law obliged most merchants to accept BTC, exempted BTC transactions from capital-gains taxation, created a $150 million BANDESAL trust fund to guarantee
  automatic BTC-to-USD conversion for merchants, mandated BCR and Superintendencia del Sistema Financiero to publish implementing regulations, and established the regulatory scaffolding for the Chivo state
  wallet. Status as legal tender was formally removed in Dec 2024 under the IMF Extended Fund Facility condition (see sv_bitcoin_removal_imf_2024) while BTC retained optional-use status.

  '
enacted_by:

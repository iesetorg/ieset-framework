description: 'As mandated by the Troika Memorandum of Understanding, the Passos Coelho government cut nominal wages for civil servants and froze public-sector hiring. Implemented through successive State
  Budget Laws (OE 2012, 2013, 2014) using progressive cuts on higher salary brackets and CES special contributions, the package targeted the wage-bill share of primary expenditure.

  '

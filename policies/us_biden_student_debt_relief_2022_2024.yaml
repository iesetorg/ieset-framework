policy_id: us_biden_student_debt_relief_2022_2024
status: candidate
title: Biden Student Debt Relief 2022 2024
countries:
- USA
timeframe:
  start: 2021
  end: 2025
description: 'The Biden administration pursued multiple federal student-loan relief actions, beginning with a 2022 HEROES Act-based blanket cancellation that the Supreme Court struck down in Biden v. Nebraska
  (2023), followed by targeted forgiveness through the SAVE income-driven repayment plan, Public Service Loan Forgiveness fixes, and borrower-defense discharges. Repayment pauses initially imposed during
  COVID were extended into 2023, with successive narrower relief tranches estimated to discharge over $150 billion in federal student debt.

  '

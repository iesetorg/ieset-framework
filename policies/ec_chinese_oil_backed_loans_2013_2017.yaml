description: 'Sequence of oil-backed credit facilities from China Development Bank + China ExImBank to Ecuador 2009-2017, escalating during Correa II to cumulative ~USD 15-19bn (most oil-backed via future-delivery
  contracts). Financed Coca-Codo-Sinclair hydro, Refinería del Pacífico (never completed), PAC-era infrastructure. Obligated significant future oil exports at discounted prices. Combined with post-default
  market lockout shaped financing mix.

  '

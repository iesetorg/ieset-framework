policy_id: sa_riyal_peg_formalisation_1986
status: candidate
title: Saudi riyal USD peg formalisation 1986
countries:
- SAU
timeframe:
  start: 1986
  enacted_date: '1986-06-01'
description: 'SAMA formalised the Saudi riyal''s peg to the US dollar at SAR 3.75/USD effective June 1986, following the collapse of the SDR-basket arrangement as oil prices crashed below $10/bbl. The peg
  has been held continuously since, anchored by SAMA reserves and GCC policy coordination. Became the de facto Gulf-region monetary anchor and the framework constraint on subsequent Saudi fiscal policy.

  '
enacted_by:
- saudi_fahd_early_era_1982_1995
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  rationale: Formalised rule-based anchor — though SAMA remained sub-royal authority.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: moderate
  rationale: Peg discipline bound domestic monetary expansion to US monetary stance.
references:
- SAMA Circular No. 22, June 1986

policy_id: nz_tariff_reduction_1984_1996
status: candidate
title: Tariff Reduction 1984 1996
countries:
- NZL
timeframe:
  start: 1984
  end: 1993
description: 'New Zealand''s unilateral tariff reduction programme between 1984 and 1996, announced by Finance Minister Roger Douglas and continued under successor governments, dismantled the import licensing/tariff
  regime that had peaked above 25% effective protection in some sectors. Through successive Customs Tariff amendments, average tariffs fell to single digits by 1996, with most remaining tariffs phased out
  under CER and APEC commitments. The intended effect was to expose domestic industry to global price discipline, raise consumer welfare, and end the post-war import-substitution regime in favour of an
  open-economy growth model.

  '

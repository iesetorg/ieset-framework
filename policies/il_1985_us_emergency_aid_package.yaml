policy_id: il_1985_us_emergency_aid_package
status: candidate
title: US emergency aid package 1985 conditional on Israeli stabilisation
countries:
- ISR
timeframe:
  start: 1985
description: '$1.5bn US emergency aid (split $750m FY1985 + $750m FY1986) released conditional on the Israeli government implementing the Stabilization Plan (fiscal cut, wage freeze, peg, subsidy removal).
  Provided FX backing for the new peg and political cover for austerity measures. Institutional template — external conditional aid as stabilisation catalyst — replicated later in EE transitions and EMs.

  '

description: 'Brazilian crisis response late-2008 onwards: IPI industrial-tax cuts for autos + white goods + construction (Dec 2008 onwards), Minha Casa Minha Vida housing programme (Mar 2009, 1m units
  target + subsidised FGTS mortgages), BNDES Treasury-lending expansion ~BRL 180bn capital injection 2009-2010 enabling TJLP-subsidised credit at below-market rates, Banco Central reserve-requirement releases
  + Selic cut from 13.75% (Jan 2009) to 8.75% (Jul 2009). GDP contracted -0.1% 2009 then +7.5% 2010.

  '

description: 'Comprehensive US health-insurance reform. Key elements: individual mandate (since repealed 2019), guaranteed issue + community rating on individual market, Medicaid expansion (optional for
  states post- NFIB v. Sebelius 2012), state-level health exchanges with income- linked subsidies, employer mandate for firms >50 FTE, minimum essential benefits, dependent coverage to age 26, closing Medicare
  Part D doughnut hole. Reduced US uninsured rate from ~16% (2010) to ~9% (2016). Didn''t substantially reduce US healthcare cost-as-%-GDP. Refinement D.2.10 cites US-OECD cost-effectiveness gap as persistent
  despite ACA.

  '

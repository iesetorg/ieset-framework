policy_id: uk_british_coal_privatisation_1994
status: candidate
title: British Coal Privatisation 1994
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
description: 'The Coal Industry Act 1994 wound up the state-owned British Coal Corporation, transferred its operating assets to a new Coal Authority for licensing, and sold the active deep and opencast
  mines via regional trade-sale auctions completed in December 1994. The privatisation completed the long-running break-up of the nationalised industry, ended Treasury subsidies for loss-making pits, and
  concluded the post-1984 strike industrial restructuring.

  '
enacted_by:
- uk_major_post_thatcher_1990_1997
axes_moved:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  intended: true
  rationale: Removing coal subsidies reduced fiscal-monetary cross-pressure on Bank of England operations.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  intended: true
  rationale: Trade-sale auctions of regional mining assets ended the British Coal monopoly on UK production.
- axis: fiscal.tax_progressivity
  direction: '0'
  magnitude: weak
  intended: true
  rationale: The asset sale was distributionally neutral, neither raising nor lowering personal tax progressivity.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Termination of Treasury operating subsidies and one-off sale proceeds reduced net public outlays.

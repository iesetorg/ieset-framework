status: candidate
title: Reserve Bank Act 1989 operational implementation (1990-1997)
countries:
- NZL
timeframe:
  start: 1990
  end: 1997
description: 'The Reserve Bank of New Zealand Act 1989 (Labour) established price stability as the single statutory objective and introduced Policy Targets Agreements between the Governor and Treasurer.
  Full operational implementation and the first stabilisation of CPI inflation inside the 0-2% PTA band fell to the Bolger National government and Governor Don Brash (from 1988). The Act became the first-in-world
  explicit inflation- targeting central-bank statute.

  '

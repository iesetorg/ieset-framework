  intended: true
  rationale: Second-pillar pension contributions expanded; TFR-to-funds accelerated.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: weak
  intended: true
  rationale: Occupational-pension fund sector materially expanded.

policy_id: it_tfr_pension_fund_reform_2007
status: candidate
title: Italy TFR pension-fund reform (2007)
countries:
- ITA
timeframe:
  start: 2007
  end: 2007
  enacted_date: '2007-01-01'
description: 'From 1 January 2007 private-sector employees had a six-month window to elect whether their TFR (Trattamento di Fine Rapporto, accrued severance indemnity ~6.91% of annual gross wage) should
  continue to accrue with the employer or be redirected to a complementary pension fund; silent consent directed the flow to pension funds. Implemented via the 2007 Finanziaria and D.lgs. 252/2005. Accelerated
  second-pillar pension accumulation in Italy and created a liquidity shock to SMEs that was partially offset by a Treasury-financed guarantee fund.

  '
enacted_by:
- italy_prodi_ii_centre_left_2006_2008
coalition_label_at_enactment: L'Unione centre-left

policy_id: sa_government_development_bonds_1988
status: candidate
title: Saudi Government Development Bonds 1988
countries:
- SAU
timeframe:
  start: 1988
description: 'Introduction of Government Development Bonds (GDBs) in 1988 to finance persistent fiscal deficits caused by oil-price collapse and Gulf War costs without monetary financing. Sold to domestic
  banks and SAMA, established a shallow domestic government-debt market. Circumvented sharia prohibitions via deferred-payment structures. Allowed Fahd-era deficits to be financed without breaking the 3.75
  peg.

  '
enacted_by:
- saudi_fahd_early_era_1982_1995
axes_moved:
- axis: fiscal.spending_level
  direction: +
  magnitude: weak
  rationale: Enabled sustained deficit spending without peg break or monetary financing.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  rationale: Separation of fiscal deficit from direct monetary financing.
references:
- SAMA Annual Report 1988

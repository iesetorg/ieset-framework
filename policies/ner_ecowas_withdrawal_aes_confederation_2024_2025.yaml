policy_id: ner_ecowas_withdrawal_aes_confederation_2024_2025
status: candidate
title: Niger ECOWAS withdrawal and AES confederation 2024-2025
countries:
- NER
timeframe:
  start: 2024
  end: ongoing
  enacted_date: '2024-01-28'
description: >
  Niger joined Mali and Burkina Faso in announcing withdrawal from ECOWAS in
  January 2024 and then joined the Alliance of Sahel States confederation. The
  policy moved Niger away from ECOWAS sanctions, market-integration rules, and
  return-to-constitutional-order pressure after the 2023 coup, while embedding
  the CNSP in a new security-centered Sahel bloc.
enacted_by:
- niger_cnsp_transition_sovereignty_2023_present
scope: national
coalition_label_at_enactment: CNSP military transition
axes_moved:
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: weak
  intended: true
  rationale: Withdrawal from ECOWAS weakened formal commitments to regional market integration and free movement.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: weak
  intended: true
  rationale: The decision reduced regional institutional pressure for a short return-to-elections timetable.
references:
- ECOWAS statements on the withdrawal of Burkina Faso, Mali, and Niger, 2024-2025.
- Alliance of Sahel States communiques and confederation treaty reporting, 2024.
- Associated Press and Reuters reporting on Niger's ECOWAS withdrawal and AES membership.

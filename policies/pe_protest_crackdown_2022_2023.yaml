policy_id: pe_protest_crackdown_2022_2023
status: candidate
title: Boluarte government protest crackdown (Peru Dec 2022 - Mar 2023)
countries:
- PER
timeframe:
  start: 2022
  end: 2023
  enacted_date: '2022-12-14'
description: 'Following Pedro Castillo''s impeachment (7 Dec 2022) and Dina Boluarte''s assumption of the presidency, mass protests erupted across southern highland departments (Ayacucho, Apurímac, Puno,
  Junín, Arequipa, Cusco) demanding Boluarte''s resignation, early elections, Congress dissolution, and a constituent assembly. The Boluarte government declared a national emergency on 14 December 2022,
  deployed the Peruvian National Police and Armed Forces, and suspended constitutional rights in multiple departments. IACHR and UN-OHCHR documented approximately 49 protest-related civilian deaths by early
  2023 (with a further ~12 deaths over 2023), firearms use against demonstrators, extrajudicial conduct at Ayacucho 15 Dec 2022 and Juliaca 9 Jan 2023, and disproportionate force. Prosecutorial accountability
  was minimal; Boluarte and senior ministers were named in Fiscalía investigations. Coded as strong negative on rule-of-law and judicial-independence channels.

  '

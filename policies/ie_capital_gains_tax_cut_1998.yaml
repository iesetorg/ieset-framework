policy_id: ie_capital_gains_tax_cut_1998
status: candidate
title: Capital Gains Tax Cut 1998
countries:
- IRL
timeframe:
  start: 1997
  end: 2008
description: 'Charlie McCreevy''s first budget as Minister for Finance halved Ireland''s capital-gains tax headline rate from 40% to 20% effective from December 1997, legislated in the Finance Act 1998.
  The cut was credited with sharply increasing realisations and CGT receipts during the late-1990s expansion and formed part of a broader low-rate, broad-base tax strategy that accompanied the Celtic Tiger
  growth phase.

  '

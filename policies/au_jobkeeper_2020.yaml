policy_id: au_jobkeeper_2020
status: candidate
title: JobKeeper wage subsidy — Australia 2020-21
countries:
- AUS
timeframe:
  start: 2020
  end: 2021
  enacted_date: '2020-04-08'
description: 'Coronavirus Economic Response Package (JobKeeper Payments) Act 2020 established a flat A$1,500/fortnight wage subsidy (later tiered) paid via employers to retain staff during COVID-19 shutdowns.
  Operative 30 March 2020 - 28 March 2021. Final cost ~A$89bn, covering ~3.8m workers at peak — the largest single fiscal program in Australian history. Paired with a Coronavirus Supplement roughly doubling
  the JobSeeker unemployment payment March-September 2020 then tapered.

  '

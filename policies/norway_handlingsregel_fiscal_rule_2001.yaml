policy_id: norway_handlingsregel_fiscal_rule_2001
status: candidate
title: Handlingsregelen — Norway fiscal-rule 2001
countries:
- NOR
timeframe:
  start: 2001
  end: ongoing
  enacted_date: '2001-03-29'
description: 'Parliamentary fiscal rule tying government-deficit financing to the expected real return on the Government Pension Fund Global (GPFG /SPU). Initially set at 4% (later revised to 3% in 2017
  reflecting lower return expectations). Created long-run commitment device preserving GPFG real capital and preventing fiscal accommodation of petroleum-revenue volatility. Refinements D.2.9 + D.2.10 repeatedly
  cite this as the institutional mechanism distinguishing Norway from other resource-rich economies — both within the Nordic cluster and globally against PDVSA / YPF counterexamples.

  '

  direction: '-'
  magnitude: weak
  intended: true
  rationale: Sterilisation partially offset FX-inflow liquidity.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  intended: true
  rationale: Retención cafetera financed FNC sectoral support.

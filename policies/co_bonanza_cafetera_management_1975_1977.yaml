policy_id: co_bonanza_cafetera_management_1975_1977
status: candidate
title: Bonanza cafetera macro management (Colombia, 1975-1977)
countries:
- COL
timeframe:
  start: 1975
  end: 1978
description: 'Following the July 1975 Brazilian coffee-frost, New York "C" coffee prices rose from ~USD 0.65 to ~USD 3.20/lb (April 1977). Colombia''s Federación Nacional de Cafeteros-Fondo Nacional del
  Café (parafiscal framework) sterilised windfall revenue via the retención cafetera levy and domestic coffee-price stabilisation. Banco de la República issued stabilisation bonds (BONO-OEL) to absorb foreign-exchange
  inflow. Inflation rose from 17% to 28% despite sterilisation.

  '
enacted_by:
- colombia_lopez_michelsen_1974_1978
axes_moved:

policy_id: nl_wao_disability_expansion_1978_1982
status: candidate
title: Netherlands WAO disability scheme caseload expansion (1978-1982)
countries:
- NLD
timeframe:
  start: 1978
  end: 1982
description: 'WAO (Wet op de arbeidsongeschiktheidsverzekering) disability-pension caseload rose from ~400,000 (1978) to ~700,000 (1982) during the recessions. Used as de facto early-retirement and restructuring-
  exit route with generous earnings-linked replacement rates. Tightening reforms waited until 1986-87 and more substantively 1993.

  '
enacted_by:
- netherlands_van_agt_cda_1977_1982
coalition_label_at_enactment: CDA-VVD then CDA-PvdA
axes_moved:

  direction: +
  magnitude: strong
  rationale: Caseload nearly doubled; earnings-linked benefits.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  rationale: Disability route shielded low-productivity workers from market adjustment.

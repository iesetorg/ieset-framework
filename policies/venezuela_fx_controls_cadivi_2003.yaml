  direction: '-'
  magnitude: weak
  intended: true
  rationale: CADIVI dollar rationing favoured politically connected importers and distorted competitive market entry.
- axis: institutional.property_rights
  direction: '-'
  magnitude: weak
  intended: true
  rationale: FX controls limited capital mobility and effectively expropriated value through forced official-rate conversions.
- axis: institutional.rule_of_law

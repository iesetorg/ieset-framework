policy_id: venezuela_fx_controls_cadivi_2003
status: candidate
title: Venezuela Fx Controls Cadivi 2003
countries:
- VEN
timeframe:
  start: 1999
  end: ongoing
description: 'In February 2003 the Chavez government imposed comprehensive foreign exchange controls and established CADIVI (Comision de Administracion de Divisas) to allocate dollars at official rates
  to importers, students, and travellers. Designed to stop capital flight after the 2002-2003 general strike, it created a parallel exchange-rate market and successive administrative bodies (CENCOEX, SIMADI,
  DIPRO/DICOM) that persisted as the FX-rationing apparatus through 2018.

  '

title: Indonesia Wahid impeachment (2001)
countries:
- IDN
timeframe:
  start: 2001
  end: 2001
  enacted_date: '2001-07-23'
description: 'MPR Special Session 21-23 July 2001 removed President Abdurrahman Wahid from office. Triggered by allegations of involvement in "Buloggate" Rp 35bn and "Bruneigate" $2m scandals involving
  presidential aides; MPR passed Memorandums I (1 February 2001) and II (30 April 2001) charging breach of duty. On 23 July 2001 Wahid issued decree dissolving MPR and suspending Golkar/PDI-P — military
  refused to implement; MPR immediately voted 591-0 (with walkouts) to impeach; Vice President Megawati sworn in as President 23 July 2001. First constitutional-route presidential removal in Indonesian
  history.

  '

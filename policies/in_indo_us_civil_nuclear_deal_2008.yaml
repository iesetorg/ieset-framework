policy_id: in_indo_us_civil_nuclear_deal_2008
status: candidate
title: India-US Civil Nuclear Cooperation Agreement (2008)
countries:
- IND
timeframe:
  start: 2008
  end: 2008
  enacted_date: '2008-10-10'
description: '123 Agreement between India and US signed 10 October 2008, operationalising the July 2005 joint statement. Provided for bilateral civil-nuclear trade with India as a non-NPT nuclear weapons
  state. Required India to separate civil and military nuclear programmes (14 of 22 reactors placed under IAEA safeguards), IAEA India-Specific Safeguards Agreement (2 Feb 2009), NSG waiver (6 Sep 2008).
  Triggered Left-Front walkout from UPA coalition July 2008 and confidence vote Singh government survived 275-256 on 22 July 2008. Opened multilateral civil-nuclear market access for India.

  '
enacted_by:
- india_manmohan_singh_upa_i_2004_2009
coalition_label_at_enactment: INC-led UPA-I (post-Left-Front walkout)
axes_moved:
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  intended: true
  rationale: Lifted bilateral and multilateral civil-nuclear trade restrictions on India.
- axis: institutional.rule_of_law
  direction: +
  magnitude: weak
  intended: true
  rationale: Civil-military programme separation brought nuclear governance into IAEA safeguards framework.
references:
- 123 Agreement for Cooperation between India and US, 10 October 2008
- NSG Statement on Civil Nuclear Cooperation with India, 6 September 2008
- Tellis (2006), 'Atoms for War? US-Indian Civilian Nuclear Cooperation and India's Nuclear Arsenal'

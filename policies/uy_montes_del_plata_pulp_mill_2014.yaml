description: 'Montes del Plata USD 2.3bn pulp mill at Punta Pereira (Stora Enso + Arauco JV) operational 19 Jun 2014 — largest single FDI in Uruguayan history at time. Anchored second leg of forestry-pulp-export
  cluster after Botnia/ UPM Fray Bentos 2007. Free-trade-zone regime preserved. Set up later UPM-2 project (Paso de los Toros, operational 2023). Together forestry exports grew from ~USD 300m (2005) to
  ~USD 2bn (2015).

  '

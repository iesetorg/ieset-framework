# yaml-language-server: $schema=schemas/axes.schema.json
#
# Canonical policy-axis taxonomy. Every policy/movement references axis ids
# from this file. Directions are policy-content semantic (+/-), not normative.
# Per Invariant 4, fiscal and regulatory channels are tracked independently.

version: 1

axes:

  # ---- fiscal ----
  - id: fiscal.tax_progressivity
    channel: fiscal
    description: >
      Progressivity of the personal income tax schedule, including top marginal
      rates, bracket spread, and targeted credits (EITC-equivalents).
    direction_semantics:
      "+": "more progressive (higher top rates, wider spread, larger targeted credits)"
      "-": "less progressive (flatter rates, compression, smaller credits)"
    source_publishers: [oecd, fraser_efw, heritage_ief]
    typical_proxies: ["OECD revenue statistics top marginal rate", "Fraser EFW area 1b"]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, fiscal_or_enforcement_cost, macro_feedback, net_welfare, distributional_incidence]
      preferred_designs: [eligible_vs_ineligible_groups, phase_in_or_threshold_comparison, high_frequency_event_study, welfare_accounting, distributional_decomposition]
      canonical_outcomes:
        - after-tax income by income group
        - taxable-income elasticity and avoidance
        - labour supply, migration, and realization timing
        - revenue raised net of enforcement and avoidance
        - poverty, inequality, and growth feedbacks
      notes: >
        Tax progressivity tests must separate mechanical distributional gains
        from behavioral avoidance, migration, realization timing, and revenue
        feedback.

  - id: fiscal.tax_corporate
    channel: fiscal
    description: >
      Statutory and effective corporate tax rates, treatment of depreciation,
      and international competitiveness.
    direction_semantics:
      "+": "higher corporate tax burden"
      "-": "lower corporate tax burden"
    source_publishers: [oecd, fraser_efw]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, dynamic_investment_response, market_structure_response, macro_feedback, distributional_incidence]
      preferred_designs: [phase_in_or_threshold_comparison, adjacent_market_comparison, high_frequency_event_study, welfare_accounting, dynamic_investment_followup]
      canonical_outcomes:
        - effective tax rates and revenue
        - investment, capital stock, and profit shifting
        - firm entry, exit, and location
        - wages and consumer prices
        - incidence by workers, shareholders, consumers, and taxpayers
      notes: >
        Corporate tax tests should not stop at statutory rates or revenue; the
        second-order channels are investment, profit shifting, location, and
        incidence.

  - id: fiscal.tax_capital
    channel: fiscal
    description: >
      Taxation of capital income (dividends, capital gains, inheritance,
      wealth). Distinct from corporate rate.
    direction_semantics:
      "+": "higher capital income tax"
      "-": "lower capital income tax"
    source_publishers: [oecd]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, dynamic_investment_response, macro_feedback, net_welfare, distributional_incidence]
      preferred_designs: [eligible_vs_ineligible_groups, phase_in_or_threshold_comparison, high_frequency_event_study, welfare_accounting, dynamic_investment_followup]
      canonical_outcomes:
        - capital gains, dividends, inheritance, or wealth-tax revenue
        - realization timing and lock-in
        - saving, investment, and portfolio reallocation
        - migration and asset shifting
        - incidence by wealth, age, and income group

  - id: fiscal.transfer_expansion
    channel: fiscal
    description: >
      Size of cash and near-cash transfer programmes (unemployment benefits,
      means-tested assistance, universal child benefits). Architecturally
      distinct from forced-saving schemes — see condition welfare_architecture.
    direction_semantics:
      "+": "larger transfer footprint"
      "-": "smaller transfer footprint"
    source_publishers: [oecd, world_bank_wdi]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, fiscal_or_enforcement_cost, macro_feedback, net_welfare, distributional_incidence]
      preferred_designs: [eligible_vs_ineligible_groups, phase_in_or_threshold_comparison, high_frequency_event_study, welfare_accounting, distributional_decomposition]
      canonical_outcomes:
        - benefit take-up and poverty reduction
        - employment, hours, formality, and earnings progression
        - fertility, schooling, health, or childcare responses where relevant
        - fiscal cost and benefit cliffs
        - incidence by eligible, ineligible, low-income, and future cohorts
      notes: >
        Transfer tests must separate first-order income support from labour,
        family, fiscal, and eligibility-margin responses.

  - id: fiscal.spending_level
    channel: fiscal
    description: >
      General government spending as share of GDP, excluding transfers already
      captured under fiscal.transfer_expansion to avoid double-counting.
    direction_semantics:
      "+": "higher spending share"
      "-": "lower spending share"
    source_publishers: [oecd, imf, world_bank_wdi]
    second_order_measurement:
      required_layers: [first_order_policy_effect, implementation_capacity, fiscal_or_enforcement_cost, macro_feedback, net_welfare, distributional_incidence]
      preferred_designs: [treated_vs_untreated_units, mechanism_channel_decomposition, high_frequency_event_study, welfare_accounting, spillover_tracking]
      canonical_outcomes:
        - service outputs and public-capital formation
        - deficits, debt service, and tax feedback
        - crowd-in or crowd-out of private investment
        - productivity, employment, and inflation feedback
        - incidence by beneficiary group and taxpayer group

  - id: fiscal.sectoral_subsidy
    channel: fiscal
    description: >
      Targeted industrial and sectoral subsidies (renewable energy, chip
      manufacturing, agriculture, green hydrogen, etc).
    direction_semantics:
      "+": "expanded sectoral subsidies"
      "-": "reduced sectoral subsidies"
    source_publishers: [oecd]
    second_order_measurement:
      required_layers:
        - second_order_supply_response
        - allocation_distortion
        - leakage_or_substitution
        - fiscal_or_enforcement_cost
        - net_welfare
        - distributional_incidence
      preferred_designs:
        - controlled_vs_uncontrolled_categories
        - high_frequency_event_study
        - welfare_accounting
        - distributional_decomposition
      canonical_outcomes:
        - subsidy outlays and arrears
        - investment and capacity additions
        - shortages or rationing where subsidies suppress pass-through
        - producer entry and exit
        - consumer incidence by income group
      notes: >
        Price-suppressing subsidies should not be scored only on headline
        consumer-price relief; fiscal cost, supply response, investment, and
        rationing/leakage must be separated.

  # ---- regulatory ----
  - id: regulatory.labour_market_flexibility
    channel: regulatory
    description: >
      Ease of hiring/firing, collective-bargaining scope, minimum wage
      rigidity, temporary/permanent contract regulation.
    direction_semantics:
      "+": "more flexible (easier hiring/firing, less rigid bargaining)"
      "-": "less flexible (stronger employment protection)"
    source_publishers: [oecd, fraser_efw]
    typical_proxies: ["OECD EPL index", "Fraser EFW area 5c"]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, market_structure_response, quality_margin, net_welfare, distributional_incidence]
      preferred_designs: [eligible_vs_ineligible_groups, phase_in_or_threshold_comparison, high_frequency_event_study, distributional_decomposition, dynamic_investment_followup]
      canonical_outcomes:
        - employment, unemployment, and hours
        - wages, earnings volatility, and job quality
        - firm entry, vacancy posting, and hiring duration
        - informality, dualism, and contract substitution
        - incidence by youth, low-skill, incumbent, and entrant workers

  - id: regulatory.product_market_competition
    channel: regulatory
    description: >
      Product-market regulation, entry barriers, licensing burdens,
      network-industry regulation, price controls.
    direction_semantics:
      "+": "more competition-friendly (lower entry barriers)"
      "-": "more restrictive regulation, higher entry barriers"
    source_publishers: [oecd_pmr, fraser_efw]
    typical_proxies: ["OECD PMR aggregate", "Fraser EFW area 5b"]
    second_order_measurement:
      required_layers:
        - second_order_supply_response
        - allocation_distortion
        - quality_margin
        - leakage_or_substitution
        - net_welfare
      preferred_designs:
        - controlled_vs_uncontrolled_categories
        - adjacent_market_comparison
        - high_frequency_event_study
        - triple_difference
        - welfare_accounting
      canonical_outcomes:
        - product availability or stockouts
        - entry and exit rates
        - output, investment, and capacity
        - quality-adjusted prices
        - search, queue, or rationing costs
      notes: >
        Broad PMR panels are screeners only for price-control claims. A
        dispositive claim needs unit/category-level controlled vs uncontrolled
        outcomes or a clearly justified adjacent-market design.

  - id: regulatory.price_control_intensity
    channel: regulatory
    description: >
      Statutory or administrative ceilings, freezes, margin caps, or mandated
      below-cost pass-through rules for goods and services outside housing.
      This axis separates direct price ceilings from general product-market
      entry regulation.
    direction_semantics:
      "+": "more binding or broader price controls"
      "-": "weaker, narrower, or removed price controls"
    source_publishers: [fraser_efw, heritage_ief, world_bank_wdi]
    typical_proxies:
      - Fraser EFW price-controls subcomponent
      - Heritage monetary freedom price-control penalty
      - constructed product/category event panels
    second_order_measurement:
      required_layers:
        - first_order_price_or_transfer
        - second_order_supply_response
        - allocation_distortion
        - leakage_or_substitution
        - quality_margin
        - fiscal_or_enforcement_cost
        - net_welfare
        - distributional_incidence
      preferred_designs:
        - controlled_vs_uncontrolled_categories
        - border_comparison
        - high_frequency_event_study
        - triple_difference
        - welfare_accounting
        - distributional_decomposition
      canonical_outcomes:
        - controlled-price gap relative to uncontrolled substitutes
        - stockouts and queue time
        - inventories and producer output
        - black-market or parallel-market premium
        - quality degradation or package-size shrinkage
        - fiscal subsidy and enforcement cost
        - incidence for covered consumers, uncovered consumers, producers, and future consumers
      notes: >
        A clean test must acknowledge any first-order consumer transfer and
        then separately measure whether supply, availability, quality,
        leakage, and net welfare deteriorate.

  - id: regulatory.housing_rent_control
    channel: regulatory
    description: >
      Rent ceilings, rent freezes, renewal caps, eviction restrictions tied to
      regulated rent contracts, and exemption rules for new construction or
      small landlords.
    direction_semantics:
      "+": "more binding or broader rent control"
      "-": "weaker, narrower, or removed rent control"
    source_publishers: [oecd, eurostat, world_bank_wdi]
    typical_proxies:
      - constructed city or metro rent-control event panel
      - OECD housing rent-regulation indicators
      - Eurostat tenant cost and building-permit series
    second_order_measurement:
      required_layers:
        - first_order_price_or_transfer
        - second_order_supply_response
        - allocation_distortion
        - leakage_or_substitution
        - quality_margin
        - net_welfare
        - distributional_incidence
      preferred_designs:
        - controlled_vs_uncontrolled_units
        - adjacent_market_comparison
        - high_frequency_event_study
        - triple_difference
        - welfare_accounting
        - distributional_decomposition
      canonical_outcomes:
        - regulated vs exempt rents
        - permits, completions, and rental-listing counts
        - rental-to-owner conversion, condo conversion, demolitions, and short-term rental leakage
        - tenant mobility and mismatch
        - vacancy, queue, and time-to-lease measures
        - maintenance complaints, code violations, and repair spending
        - incidence for incumbent tenants, entrants, uncovered renters, landlords, and future cohorts
      notes: >
        National panels are screeners only. Dispositive rent-control tests need
        city/metro or unit-level treatment/exemption variation and must
        separate incumbent gains from entrant/future-cohort costs.

  - id: regulatory.environmental_stringency
    channel: regulatory
    description: >
      Environmental regulation stringency — emissions caps, standards,
      phase-out mandates, carbon pricing, renewable portfolio standards.
    direction_semantics:
      "+": "more stringent environmental rules"
      "-": "less stringent environmental rules"
    source_publishers: [oecd]
    typical_proxies: ["OECD Environmental Policy Stringency Index"]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, dynamic_investment_response, externality_or_spillover, macro_feedback, distributional_incidence]
      preferred_designs: [treated_vs_untreated_units, adjacent_market_comparison, high_frequency_event_study, welfare_accounting, spillover_tracking, dynamic_investment_followup]
      canonical_outcomes:
        - emissions, pollution exposure, and health benefits
        - energy prices and reliability
        - firm relocation, leakage, and competitiveness
        - green investment and innovation
        - incidence by household income, region, and sector

  - id: regulatory.financial_deregulation
    channel: regulatory
    description: >
      Financial-sector regulation — banking separation, capital requirements,
      cross-border activity rules, derivatives oversight.
    direction_semantics:
      "+": "tighter financial regulation"
      "-": "looser financial regulation"
    source_publishers: [fraser_efw, heritage_ief]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, market_structure_response, macro_feedback, externality_or_spillover, distributional_incidence]
      preferred_designs: [phase_in_or_threshold_comparison, high_frequency_event_study, mechanism_channel_decomposition, spillover_tracking, dynamic_investment_followup]
      canonical_outcomes:
        - credit quantity, spreads, and risk pricing
        - bank capital, leverage, and maturity mismatch
        - asset prices, defaults, and crisis probability
        - access to finance by firm size and household income
        - fiscal backstop and systemic-risk externalities

  - id: regulatory.immigration_openness
    channel: regulatory
    description: >
      Immigration policy openness — work visas, family reunification,
      asylum processing, border enforcement posture.
    direction_semantics:
      "+": "more open (easier legal immigration, broader asylum)"
      "-": "more restrictive (lower caps, tighter enforcement)"
    source_publishers: [vdem, oecd]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, externality_or_spillover, fiscal_or_enforcement_cost, macro_feedback, distributional_incidence]
      preferred_designs: [eligible_vs_ineligible_groups, adjacent_market_comparison, high_frequency_event_study, welfare_accounting, distributional_decomposition, spillover_tracking]
      canonical_outcomes:
        - migrant inflows by skill, status, and origin
        - native wages and employment by skill group
        - fiscal contribution and public-service load
        - housing, schooling, and local congestion
        - integration, crime, entrepreneurship, and innovation

  - id: regulatory.trade_openness
    channel: regulatory
    description: >
      Trade policy openness — tariffs, non-tariff barriers, FTAs,
      industrial protection.
    direction_semantics:
      "+": "more open trade"
      "-": "more protectionist"
    source_publishers: [fraser_efw, heritage_ief, world_bank_wdi]
    typical_proxies: ["Fraser EFW area 4", "World Bank tariff rate"]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, market_structure_response, externality_or_spillover, net_welfare, distributional_incidence]
      preferred_designs: [treated_vs_untreated_units, adjacent_market_comparison, high_frequency_event_study, welfare_accounting, distributional_decomposition, spillover_tracking]
      canonical_outcomes:
        - prices, import variety, and consumer surplus
        - export growth, productivity, and firm upgrading
        - worker displacement and regional adjustment
        - supply-chain resilience and strategic dependence
        - incidence by consumers, workers, firms, and regions

  - id: regulatory.sectoral_licensing
    channel: regulatory
    description: >
      Sector-specific licensing regimes, concentration / quota allocation,
      state-controlled entry (energy, telecoms, healthcare, banking).
    direction_semantics:
      "+": "tighter sectoral licensing / more state gating"
      "-": "looser licensing, more open entry"
    source_publishers: [oecd_pmr]
    second_order_measurement:
      required_layers:
        - second_order_supply_response
        - allocation_distortion
        - quality_margin
        - distributional_incidence
      preferred_designs:
        - controlled_vs_uncontrolled_categories
        - adjacent_market_comparison
        - high_frequency_event_study
        - distributional_decomposition
      canonical_outcomes:
        - entry, exit, and firm formation
        - capacity and service availability
        - queue time and waitlists
        - quality-adjusted prices
        - consumer incidence by income or geography

  - id: regulatory.energy_supply_security
    channel: regulatory
    description: >
      Policy posture toward energy supply security — domestic production
      capacity, import diversification, strategic reserves, nuclear stance,
      fossil-fuel mix discipline.
    direction_semantics:
      "+": "higher supply-security posture (diversified, strategic reserves)"
      "-": "lower supply-security posture (single-supplier dependence, early phase-outs)"
    source_publishers: [oecd, imf]
    second_order_measurement:
      required_layers:
        - second_order_supply_response
        - allocation_distortion
        - fiscal_or_enforcement_cost
        - net_welfare
        - distributional_incidence
      preferred_designs:
        - border_comparison
        - high_frequency_event_study
        - welfare_accounting
        - distributional_decomposition
      canonical_outcomes:
        - outage frequency, load shedding, and station stockouts
        - inventories and reserve margins
        - energy-sector investment
        - subsidy arrears and fiscal burden
        - industrial relocation or demand destruction
    notes: >
      Often moves jointly but not identically with regulatory.environmental_stringency.
      Germany Energiewende is the canonical case of a policy strong-positive on
      environmental stringency and strong-negative on supply security.

  # ---- monetary ----
  - id: monetary.central_bank_independence
    channel: monetary
    description: >
      De jure and de facto independence of the central bank from fiscal
      authority. Per D.1.5 scope, one of the framework's defensible
      monetary positions.
    direction_semantics:
      "+": "greater independence (legal, operational, personnel)"
      "-": "lower independence (fiscal dominance, politicised appointments)"
    source_publishers: [imf]
    typical_proxies: ["CBI indices (Garriga 2016 updates)"]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, macro_feedback, fiscal_or_enforcement_cost, externality_or_spillover, distributional_incidence]
      preferred_designs: [high_frequency_event_study, mechanism_channel_decomposition, welfare_accounting, spillover_tracking]
      canonical_outcomes:
        - inflation expectations and realized inflation
        - policy credibility and risk premia
        - fiscal dominance and debt monetization
        - unemployment and output stabilization
        - incidence by borrowers, savers, wage earners, and taxpayers

  - id: monetary.monetary_expansion_direction
    channel: monetary
    description: >
      Direction of monetary-base expansion decisions relative to trend.
      Separate from fiscal.transfer_expansion even when correlated.
    direction_semantics:
      "+": "expansionary (balance sheet, rates lower than Taylor)"
      "-": "contractionary (balance sheet shrink, rates above Taylor)"
    source_publishers: [fred, bis]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, market_structure_response, macro_feedback, externality_or_spillover, distributional_incidence]
      preferred_designs: [high_frequency_event_study, mechanism_channel_decomposition, welfare_accounting, spillover_tracking, dynamic_investment_followup]
      canonical_outcomes:
        - output, employment, and inflation
        - credit growth, asset prices, and leverage
        - exchange rates and capital flows
        - bank profitability and risk-taking
        - incidence by debtors, savers, renters, owners, and wage earners

  # ---- institutional ----
  - id: institutional.rule_of_law
    channel: institutional
    description: >
      Rule of law as institutional substrate — contract enforcement, judicial
      independence, equal treatment before the law. Upstream of most other
      axes.
    direction_semantics:
      "+": "stronger rule of law"
      "-": "weaker rule of law"
    source_publishers: [wgi, wjp_rol, vdem]
    second_order_measurement:
      required_layers: [first_order_policy_effect, implementation_capacity, behavioral_response, dynamic_investment_response, externality_or_spillover, distributional_incidence]
      preferred_designs: [treated_vs_untreated_units, high_frequency_event_study, mechanism_channel_decomposition, spillover_tracking, dynamic_investment_followup]
      canonical_outcomes:
        - contract enforcement and judicial delay
        - investment, firm entry, and credit access
        - corruption, violence, and arbitrary enforcement
        - state capacity and service delivery
        - incidence by firms, households, minorities, and opposition groups

  - id: institutional.property_rights
    channel: institutional
    description: >
      Security of private property rights — formal recognition, expropriation
      risk, titling systems.
    direction_semantics:
      "+": "stronger property rights"
      "-": "weaker property rights"
    source_publishers: [fraser_efw, heritage_ief, wgi]
    second_order_measurement:
      required_layers: [first_order_policy_effect, behavioral_response, dynamic_investment_response, market_structure_response, macro_feedback, distributional_incidence]
      preferred_designs: [treated_vs_untreated_units, adjacent_market_comparison, high_frequency_event_study, welfare_accounting, dynamic_investment_followup]
      canonical_outcomes:
        - expropriation risk and compensation
        - investment, collateral, and credit depth
        - land or asset productivity
        - informal tenure and disputes
        - incidence by owners, tenants, workers, and future entrants

  - id: institutional.judicial_independence
    channel: institutional
    description: >
      Independence of the judiciary from executive and legislative
      encroachment. Specifically captures court-packing, selective
      prosecution, judicial reshuffles.
    direction_semantics:
      "+": "stronger judicial independence"
      "-": "weaker judicial independence"
    source_publishers: [vdem, wgi, wjp_rol]
    second_order_measurement:
      required_layers: [first_order_policy_effect, implementation_capacity, behavioral_response, externality_or_spillover, macro_feedback, distributional_incidence]
      preferred_designs: [high_frequency_event_study, mechanism_channel_decomposition, spillover_tracking, distributional_decomposition]
      canonical_outcomes:
        - case outcomes, delay, and reversal rates
        - executive constraint and corruption enforcement
        - investor confidence and credit spreads
        - civil liberties and selective prosecution
        - incidence by opposition groups, firms, minorities, and ordinary litigants

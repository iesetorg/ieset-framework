# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: sao_tome_trovoada_fiscal_energy_modernisation_2022_present
status: candidate
name: Sao Tome Trovoada fiscal energy modernisation 2022-present
countries: [STP]
timeframe:
  start: 2022
  end: ongoing
coalition: Independent Democratic Action government
leaders:
  - "Patrice Trovoada (Prime Minister, 2022-)"
  - "Americo Ramos (Minister of Finance, Commerce and Blue Economy)"
doctrine: >
  Sao Tome and Principe's current ADI-led programme links IMF-backed fiscal
  stabilisation, tax-modernisation, and energy-sector reform to a small-island
  resilience agenda. The movement is coded around formal VAT, ECF, and
  renewable-energy measures rather than speculative offshore oil or broad
  political positioning.
policies:
  - stp_vat_introduction_2023
  - stp_imf_ecf_fiscal_reform_2023
  - stp_renewable_energy_action_plan_2022
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "VAT and IMF revenue measures broaden the effective tax base."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "ECF measures target deficit control, arrears reduction, and energy-sector fiscal risk."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Renewable-energy planning increases climate and energy-transition commitments."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Energy action planning and ECF power-sector reforms target more reliable domestic supply."}
references:
  - "IMF, Democratic Republic of Sao Tome and Principe 2025 Article IV Consultation and ECF materials."
  - "Government of Sao Tome and Principe, VAT and energy-transition policy materials."
  - "UNIDO and Government of Sao Tome and Principe, National Renewable Energy Action Plan."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_conte_m5s_governments_2018_2021
status: candidate
name: "Italy Conte I and II governments — populist heterodox cycle"
countries: [ITA]
timeframe:
  start: 2018
  end: 2021
  enacted_date: "2018-06-01"
coalition: "Conte I (June 2018–Sept 2019): M5S–Lega 'contract government'. Conte II (Sept 2019–Feb 2021): M5S–PD–LeU–Italia Viva."
leaders:
  - "Giuseppe Conte (PM, independent technocrat fronting both coalitions)"
  - "Luigi Di Maio (M5S leader, Deputy PM and Labour Minister, Conte I)"
  - "Matteo Salvini (Lega leader, Deputy PM and Interior Minister, Conte I)"
  - "Nicola Zingaretti (PD secretary, Conte II partner)"
  - "Roberto Gualtieri (Economy Minister, Conte II)"
  - "Giovanni Tria (Economy Minister, Conte I — technocrat)"
doctrine: >
  Populist heterodox economic programme bolted together from two partner
  platforms: M5S's universal-income ambition (Reddito di Cittadinanza) and
  Lega's flat-tax / pension-relaxation programme (Quota 100). The stated
  case was that a decade of post-crisis austerity and EU-orthodox fiscal
  discipline under Monti, Letta, Renzi, and Gentiloni had produced a
  low-growth, low-dignity equilibrium that required demand-side redress
  combined with tax relief for self-employed and small-business voters.
  On the left-right axis the first government sat right-populist (Lega-led
  on immigration, Decreti Sicurezza 2018-2019) while economically
  heterodox; the second government pivoted centre-left on institutional
  tone (PD partner, dropped Decreti Sicurezza) while preserving the
  headline spending commitments. Key policies with dates: Decreto Dignità
  limiting temporary-contract renewals (July 2018); Reddito di
  Cittadinanza + Quota 100 pension early-exit package (Decreto-legge
  4/2019, January 2019); Decreti Sicurezza (Sept 2018, June 2019,
  repealed late 2020); Superbonus 110% energy-efficiency tax credit
  (Decreto Rilancio May 2020); COVID emergency decrees 2020-2021
  (Cura Italia, Rilancio, Ristori — ~€180bn+ in additional deficit
  spending, suspension of EU Stability Pact applied). Popularity:
  M5S won 32.7% of Camera vote in March 2018 (227 seats) and Lega
  17.4% (125 seats) — together the bulk of the 630-seat chamber;
  Conte personal approval peaked above 60% during spring-2020 COVID
  first wave. May 2019 European elections inverted the coalition —
  Lega 34.3%, M5S 17.1% — triggering Salvini's failed August 2019
  no-confidence gambit. 2020 regional elections were mixed (PD held
  Campania and Puglia; centre-right took Marche). Coherence judgement:
  the programme is internally incoherent (demand expansion plus
  contract-rigidity plus tax relief plus EU deficit brinkmanship) and
  coded as a populist heterodox cycle rather than a single doctrine.
policies:
  - italy_decreto_dignita_2018
  - italy_reddito_di_cittadinanza_2019
  - italy_quota_100_pensions_2019
  - italy_superbonus_110_2020
  - italy_covid_emergency_fiscal_2020_2021
axes_summary:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    rationale: "Reddito di Cittadinanza (income-support floor, peak ~1.3m households) + Quota 100 pension early-exit + COVID transfers 2020-2021."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Deficit widened from 2.4% (2018) to 9.5% (2020) under COVID emergency decrees; structural deficit widened pre-COVID via RdC + Quota 100."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    rationale: "Decreto Dignità tightened temporary-contract renewal limits and raised penalties for unjust dismissal — partial rollback of Jobs Act 2014."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: strong
    rationale: "Superbonus 110% building-efficiency tax credit drove construction sector boom 2020-2023 with large ex-post fiscal cost."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: moderate
    rationale: "Decreti Sicurezza 2018-2019 under Conte I tightened asylum and NGO-rescue rules; Conte II partially reversed in late 2020."
outcome_hypotheses:
  - cash_transfer_poverty_effects
  - fiscal_deficit_growth_effects
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Demand-support framing during depressed-output period."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Conte II phase; RdC is an income floor in social-democratic idiom."}
  - {position_id: austrian, alignment: opposed}
references:
  - "Decreto-legge 87/2018 (Decreto Dignità)"
  - "Decreto-legge 4/2019 (Reddito di Cittadinanza, Quota 100)"
  - "Decreto-legge 34/2020 (Decreto Rilancio — Superbonus 110%)"
  - "Banca d'Italia Relazione Annuale 2019, 2020, 2021"
  - "IMF Article IV Italy 2019, 2020, 2021"
notes: >
  Conte I and Conte II are treated as a single analytical movement
  because (a) the headline fiscal policies (RdC, Quota 100, Superbonus)
  persisted across both; (b) Conte remained PM across the transition;
  (c) coalition rebalancing from Lega to PD changed institutional tone
  more than policy content. Separate from italy_monti_reforms_2011_2012
  and italy_draghi_national_unity_2021_2022 which code different content.

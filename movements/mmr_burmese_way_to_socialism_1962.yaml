# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mmr_burmese_way_to_socialism_1962
status: candidate
name: Burmese Way to Socialism
countries:
- MMR
timeframe:
  start: 1962
  end: 1988
coalition: Revolutionary Council and Burma Socialist Programme Party
leaders:
- Ne Win
doctrine: The Revolutionary Council and later the Burma Socialist Programme Party sought to build a self-reliant socialist state after the 1962 coup, combining military rule, one-party organisation, state ownership of major enterprises, import-substitution, and central planning to protect national unity and insulate Burma from foreign economic and political influence.
policies:
- mmr_enterprise_nationalisation_1963
- mmr_state_trade_monopoly_1964
- mmr_socialist_planning_system_1962_1988
axes_summary:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  rationale: Sweeping nationalisations transferred banks, trade, industry, and services into state ownership.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  rationale: The regime pursued autarkic import substitution and state control over foreign trade.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  rationale: State enterprise monopolies and planning sharply reduced private competition.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  rationale: Entry and allocation across major sectors were gated through state ownership and administrative plans.
references:
- Robert H. Taylor (2009), The State in Myanmar
- "David I. Steinberg (2001), Burma: The State of Myanmar"
- Maung Maung (1969), Burma and General Ne Win
notes: Uses Myanmar's current ISO3 code MMR for the historical Burmese state.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thatcherism
status: candidate
name: Thatcherism
countries:
- GBR
timeframe:
  start: 1979
  end: 1990
coalition: UK Conservative Party
leaders:
- Margaret Thatcher (Prime Minister)
- Nigel Lawson (Chancellor 1983–1989)
- Geoffrey Howe (Chancellor 1979–1983)
doctrine: 'Market-liberal supply-side programme focused on privatisation of state-owned industries,
  reduction of trade-union power, financial deregulation (Big Bang 1986), monetary discipline
  to break stagflation, and tax reform favouring capital and high earners. Proponents framed the
  programme as reversing post-war consensus drift toward corporatism and restoring market mechanisms
  as the primary allocator. Note: per D.3.1, NHS real spending grew under Thatcher — the movement
  did not dismantle universal healthcare, and the framework records this accurately rather than
  assuming Conservative = all privatisation.

  '
policies:
- uk_council_house_right_to_buy_1980
- uk_trade_union_act_1984
- uk_big_bang_financial_deregulation_1986
- uk_privatisations_british_telecom_1984
- uk_privatisations_british_gas_1986
- uk_income_tax_cuts_1988
- uk_poll_tax_community_charge_1989
- uk_miners_strike_resolution_1984_1985
axes_summary:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  rationale: Sequence of Trade Union Acts 1980–1990 curtailed strike immunities, closed shop,
    and secondary-action scope.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Privatisation of utilities combined with competition regulators (Oftel, Ofgas, Ofwat)
    opened previously state-monopolised sectors.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  rationale: Big Bang 1986 removed fixed commissions and segregation of member firms; attracted
    foreign banks to London.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: strong
  rationale: Top marginal rate cut from 83% (1979) to 40% (1988). Basic rate 33% → 25%.
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: moderate
  rationale: Corporate rate cut from 52% to 35% during the period.
- axis: monetary.central_bank_independence
  direction: '0'
  rationale: BoE formal independence came later (1997). Monetary policy was executed via Treasury
    guidance but with explicit inflation-targeting discipline from 1990.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  rationale: Right to Buy extended property ownership to council tenants; privatisation widened
    retail share ownership.
outcome_hypotheses:
- uk_productivity_growth_1979_1997
- uk_inequality_trajectory_1979_1997
- uk_financial_sector_share_gdp_1986_onwards
predecessor_movements: []
successor_movements: []
position_alignments:
- position_id: austrian
  alignment: partially_aligned
  notes: Monetary discipline + privatisation + labour-market liberalisation align with Austrian
    priors; fiscal expansion during Falklands era and retention of NHS do not.
steelman: movements/steelman/thatcherism.md
disclosure: 'Author prior is market-liberal; Thatcherism is cited in mega-spec Part J as a paradigmatic
  successful market-oriented movement. Framework must avoid uncritical coding — the steelman file
  handles contested outcomes (inequality, deindustrialisation regional impact, poll tax failure).

  '
references:
- Hansard, Budget statements 1979–1989
- Trade Union Act 1984 (UK)
- Financial Services Act 1986 (UK)
notes: 'Thatcherism is useful as a calibration case for three reasons: (1) multi-axis strong movement
  makes axes_summary semantics concrete; (2) NHS spending growth illustrates the D.3.1 content-over-label
  rule; (3) the movement spans Conservative governments but the coding changes materially around
  1990 when Thatcher departed — a reminder that movements are not identical to party tenure.

  '

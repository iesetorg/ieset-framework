  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "DP World ports globalisation; Emirates airline global hub; low tariffs."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Abu Dhabi $20bn Dubai bailout 2009; 2011 welfare/wage package for nationals."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "2011 Emirati salary increases and housing-debt forgiveness as Arab Spring response."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "DIFC common-law court regime strengthens investor protections onshore."}
outcome_hypotheses: [rentier_state_non_oil_development, free_zone_diversification_effectiveness]
predecessor_movements: [uae_emirate_state_capitalism_1971_present]

movement_id: japan_kishida_ldp_2021_2024
status: candidate
name: "Kishida LDP — 'new form of capitalism' (Atarashii Shihon-shugi)"
countries: [JPN]
timeframe: {start: 2021, end: 2024, enacted_date: "2021-10-04"}
coalition: "LDP-Komeito (Kishida administration, Kōchi-kai faction)"
leaders:
  - "Fumio Kishida (PM, 4 Oct 2021 - 1 Oct 2024)"
  - "Shun'ichi Suzuki (Finance)"
  - "Yasutoshi Nishimura → Ken Saitō (METI)"
  - "Haruhiko Kuroda → Kazuo Ueda (BoJ Governor, transition April 2023)"
doctrine: >
  'New form of capitalism' (新しい資本主義 / Atarashii Shihon-shugi) positioned
  as an LDP-moderate (Kōchi-kai faction) rebalancing of Abenomics — the
  stated virtuous cycle of growth plus distribution, emphasising wage rises,
  household investment, and IRA-style green and economic-security industrial
  policy on top of continued monetary accommodation. Left-right axis: LDP
  centre-right but fiscally activist and redistributive by Western standards
  — core content reads as moderate statist-developmentalist rather than
  classical-liberal. Key policy content: (i) Bank of Japan yield-curve-
  control exit under new Governor Kazuo Ueda, culminating in the March
  2024 lift of negative interest rate policy (first rate hike since 2007)
  and formal end of YCC, followed by the July 2024 hike to 0.25%;
  (ii) NISA reform effective January 2024 — permanent tax-free individual
  investment account with annual limits raised to ¥3.6m and lifetime cap
  ¥18m, framed as shift "from savings to investment" for households;
  (iii) three-year defence build-up plan adopted December 2022 in the
  National Security Strategy, committing to roughly doubling defence
  spending to 2% of GDP by fiscal 2027 with ¥43tn envelope, funded in
  part by tobacco, corporate, and reconstruction surtaxes;
  (iv) Green Transformation (GX) policy framework with ¥20tn of GX
  Transition Bonds issued from February 2024 to seed a ¥150tn public-
  private green-investment plan, plus carbon-pricing surcharge on fossil-
  fuel importers (from 2028) and emissions-trading system from 2026;
  (v) economic-security legislation (May 2022) covering critical supply
  chains, infrastructure screening, patent secrecy, and chip-sector
  subsidies to TSMC Kumamoto and Rapidus; (vi) repeated deferrals of any
  consumption-tax hike, plus one-off income-tax and resident-tax rebate
  of ¥40,000 per person enacted June 2024; (vii) LDP slush-fund scandal
  response — dissolution of the Abe, Nikai, and Kishida factions in
  January 2024 and a party-discipline purge. Popularity trajectory:
  approval ~60% at inauguration, fell below 30% through 2023-24 on
  inflation and slush-fund scandal; Kishida declined to contest the
  September 2024 LDP leadership. Coherence line: post-Abe LDP moderate
  redistribution plus security-hawk defence doubling plus monetary-
  normalisation handover — 'distribution + defence + normalisation'.
policies:
  - jp_boj_ycc_exit_2024
  - jp_nisa_reform_2024
  - jp_defence_build_up_plan_2022
  - jp_gx_green_transformation_2023
  - jp_economic_security_act_2022
  - jp_ldp_slush_fund_purge_2024
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "March 2024 exit from negative rates and end of YCC; July 2024 hike to 0.25%; first contractionary move since 2007."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Defence build-up to 2% GDP by 2027 (~¥43tn envelope); GX bond-funded public investment; repeated supplementary budgets above ¥30tn."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "¥20tn GX Transition Bonds, chip-sector subsidies to TSMC Kumamoto Fab 1 and Rapidus; economic-security subsidies for critical supply chains."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "Permanent NISA reform from January 2024 — tax-free household investment allowance raised to ¥3.6m/year, ¥18m lifetime cap."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "GX framework commits to fossil-fuel importer surcharge (from 2028) and emissions trading (from 2026)."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "No major trade reorientation; economic-security screening adds targeted friction but baseline FTA/IPEF posture maintained."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Slush-fund scandal purge and faction dissolutions January 2024 framed as party-discipline restoration."}
outcome_hypotheses:
  - unconventional_monetary_policy_effectiveness
predecessor_movements:
  - japan_suga_ldp_2020_2021
  - abenomics_2012_2020
successor_movements:
  - japan_ishiba_ldp_2024_present
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Monetary-normalisation handover alongside active fiscal stabilisation."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "'New form of capitalism' wage-and-distribution framing plus cash rebates."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Economic-security and industrial-policy package treats supply-chain resilience as measurable policy target."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "NISA expansion welcomed; sectoral subsidy scale-up opposed."}
  - {position_id: austrian, alignment: opposed, notes: "Defence + GX + supplementary-budget spend viewed as fiscal expansion with monetary handover still accommodative."}
references:
  - "Cabinet Decision — National Security Strategy, 16 December 2022"
  - "Cabinet Decision — Mid-Term Defence Program, 16 December 2022"
  - "Act on Strengthening Economic Security, May 2022"
  - "GX Promotion Act, May 2023; GX Transition Bond first issuance February 2024"
  - "BoJ Monetary Policy Decisions — 19 March 2024, 31 July 2024"
  - "FSA — NISA reform effective 1 January 2024"
  - "LDP faction dissolutions — January 2024"
notes: >
  Coded as distinct movement from Abenomics because (i) monetary stance
  pivots contractionary under Ueda, (ii) defence doubling and GX framework
  are doctrinally new, and (iii) 'new form of capitalism' framing marks
  an LDP-moderate redistributive tilt. Status candidate pending post-
  2024 outcome data on BoJ normalisation path and defence-envelope
  execution.

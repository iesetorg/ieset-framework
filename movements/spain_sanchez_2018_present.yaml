notes: >
  Coded as one continuing movement despite the 2020 coalition reconfiguration
  (PSOE-Podemos) and 2023 reshuffle (PSOE-Sumar) because the doctrinal
  content is continuous. Monetary axis is exogenous (ECB) — Spain's
  fiscal-tax-regulatory content drives the coding. The Ley Orgánica 10/2022
  ("solo sí es sí") is coded here as movement content because the
  hypothesis spain_reported_sexual_assault_rate_definition_controlled tests
  its measurement-regime effects on reported-crime series, which is a
  framework-critical definitional discontinuity rather than a value-laden
  claim about the law's merits.

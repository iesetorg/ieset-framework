movement_id: spain_sanchez_2018_present
status: candidate
name: "Sánchez-era PSOE-led progressive governance (Spain)"
countries: [ESP]
timeframe: {start: 2018, end: ongoing, enacted_date: "2018-06-01"}
coalition: "PSOE minority 2018-2020 (post no-confidence-vote removal of Rajoy/PP, 1 June 2018); PSOE-Unidas Podemos coalition 2020-2023; PSOE-Sumar coalition with parliamentary support of Junts/ERC/PNV/EH Bildu/BNG from November 2023"
leaders:
  - "Pedro Sánchez (Prime Minister, 2018-)"
  - "Nadia Calviño (Economy Minister 2018-2023; then EIB President)"
  - "María Jesús Montero (Finance Minister 2018-; Deputy PM from 2024)"
  - "Yolanda Díaz (Labour Minister from 2020; Deputy PM; Sumar leader)"
  - "Irene Montero (Equality Minister 2020-2023, Unidas Podemos; architect of Ley Orgánica 10/2022)"
doctrine: >
  Progressive coalition programme installed after the June 2018 no-confidence
  vote that removed the Rajoy PP government. Core content: (i) 2021 labour
  reform (Real Decreto-ley 32/2021) reducing prevalence of temporary
  contracts, restricting fixed-term hiring to narrowly-defined circumstances,
  and strengthening sectoral collective agreements over company-level
  derogations — designed to address Spain's chronic dualism; (ii) pension
  reform (Ley 21/2021 and Real Decreto-ley 2/2023) re-linking annual
  revaluation to CPI and introducing the Intergenerational Equity Mechanism
  via payroll-contribution surcharge; (iii) statutory minimum wage (SMI)
  increases from €736/month (2018) to €1,134/month (2024), a ~54%
  cumulative nominal increase; (iv) windfall/extraordinary taxes on banks
  and energy companies 2022-2023; temporary solidarity wealth tax on large
  fortunes 2023; (v) Ley 12/2023 por el derecho a la vivienda (May 2023
  housing law) enabling regional rent caps in declared stressed zones;
  (vi) Ley Orgánica 10/2022 de garantía integral de la libertad sexual
  ("solo sí es sí") restructuring sexual-offence law around consent,
  merging the former aggression/abuse distinction, and broadening what
  counts as sexual assault — accompanied by transitional sentencing
  anomalies that triggered a partial legislative correction in 2023;
  (vii) COVID-19 ERTE furlough scheme 2020-2022 and NextGenerationEU
  Recovery and Resilience Plan disbursements; (viii) 2024 amnesty law
  (Ley Orgánica 1/2024) for actors in the 2017 Catalan independence
  process, politically central but economically secondary.
policies:
  - spain_labour_reform_rdl_32_2021
  - spain_pension_revaluation_cpi_link_2021_2023
  - spain_minimum_wage_increases_2018_2024
  - spain_windfall_taxes_banks_energy_2022_2023
  - spain_solidarity_wealth_tax_2023
  - spain_housing_law_12_2023
  - spain_ley_organica_10_2022_consent_law
  - spain_erte_ngeu_covid_fiscal_2020_2022
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "mixed", rationale: "2021 reform reduced temporary-contract prevalence (addressing dualism) but extended sectoral-agreement primacy and tightened firing margins; direction is genuinely mixed rather than a single sign."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Pension revaluation restored, minimum living income (IMV 2020) launched, ERTE scheme, NGEU disbursements."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "Solidarity wealth tax 2023, windfall taxes on banks and energy, closing of tax-planning margins on SICAVs."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Expenditure share of GDP stepped up via COVID response and NGEU-financed investment; structural deficit reduced post-2022 but level elevated."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Climate Law 2021 (Ley 7/2021), 2030 NECP, phased coal closure, NGEU green conditionality."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No material PMR liberalisation or re-regulation; housing law adds entry restrictions in declared stressed zones but scope is regional-optional."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "ECB-bound; Banco de España operational independence unchanged. Monetary channel exogenous to this movement."}

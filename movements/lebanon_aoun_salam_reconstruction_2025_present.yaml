# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: lebanon_aoun_salam_reconstruction_2025_present
status: candidate
name: "Aoun-Salam post-war reconstruction government 2025-present"
countries: [LBN]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-01-09"}
coalition: "Reformist technocratic cabinet outside the traditional sectarian-elite consensus; backed by international donors"
leaders:
  - "Joseph Aoun (President, Jan 2025-, former LAF commander, ended 2-year presidential vacancy)"
  - "Nawaf Salam (Prime Minister, Feb 2025-, former ICJ president)"
  - "Yassin Jaber (Finance Minister)"
  - "Karim Souaid (BdL Governor from 2025)"
doctrine: >
  Government formed after the Israel-Hezbollah war ceasefire
  (Nov 2024) and end of the two-year presidential vacancy.
  Programme: IMF Article IV-aligned economic reform —
  recapitalisation of Banque du Liban, deposit-restitution
  framework for the post-2019 banking collapse, electricity-
  sector restructuring, anti-corruption institutional reform,
  full implementation of UNSC Resolution 1701 with extension
  of state authority to the south, weakening of Hezbollah's
  parallel financial and security infrastructure (post-war
  diminished). Donor conditionality tied to anti-corruption
  benchmarks. Currency unification (parallel-rate gap
  collapsed during 2024-2025 hyperinflation phase) attempted
  via lira-dollarisation accommodation.
policies:
  - lb_imf_program_2025
  - lb_bdl_recapitalisation_2025
  - lb_deposit_restitution_framework_2025
  - lb_unsc_1701_implementation_2025
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-corruption appointments; judicial reform; reduced parallel-armed-actor influence."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "BdL recapitalisation and depoliticised governance restored."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Post-collapse fiscal capacity remains constrained; reform-oriented budgeting under IMF conditionality."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Donor-aligned regulatory normalisation; gradual lifting of capital-account restrictions."}
predecessor_movements: [lebanon_post_war_reconstruction_collapse_1992_2020]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Technocratic cabinet outside the sectarian-elite consensus; IMF Article IV-aligned reform; donor-conditionality framework."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "BdL recapitalisation + rules-based monetary reset + deposit-restitution framework."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Anti-corruption institutional reform; gradual capital-account reopening; weakening of parallel security and financial structures."}
references:
  - "Lebanese presidential election Jan 2025"
  - "Cabinet of Nawaf Salam ministerial declaration Feb 2025"
notes: "Stub authored to close 2026 atlas-coverage gap for LBN."

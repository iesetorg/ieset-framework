movement_id: norway_bondevik_ii_centre_right_2001_2005
status: candidate
name: "Bondevik II KrF-H-V centre-right coalition 2001-2005"
countries: [NOR]
timeframe: {start: 2001, end: 2005, enacted_date: "2001-10-19"}
coalition: "KrF-Hoeyre-Venstre minority, FrP-tolerated"
leaders:
  - "Kjell Magne Bondevik (Prime Minister, KrF, 2001-2005)"
  - "Per-Kristian Foss (Finance Minister, Hoeyre, 2001-2005)"
doctrine: >
  Centre-right reform coalition under Bondevik (KrF) with Hoeyre as the
  economic driver. Economic school: Norwegian market-liberal/ordoliberal
  — adoption of the handlingsregelen fiscal rule (March 2001, expected
  real return on Petroleum Fund set at 4%, later reduced to 3%), the
  2004-2006 tax reform lowering top marginal rates and introducing the
  aksjonaermodellen (shareholder model / RRA). Left-right axis: centre-
  right. Dated policies: handlingsregelen adoption (March 2001, crossed
  Bondevik-I's gas-power principle in a sense by consolidating oil-
  revenue use), 2004 tax reform commission (Skauge Report), pension
  reform agreement (Stortingsmelding 12 2004-2005). Popularity: won 2001
  election but lost 2005 decisively to Stoltenberg's red-green coalition.
  Coherence: moderate — KrF and Hoeyre differed on abortion/cultural
  policy but coalesced on the handlingsregelen and tax reform.
policies:
  - no_handlingsregelen_fiscal_rule_2001
  - no_skatteform_2004_2006
  - no_pension_reform_white_paper_2004
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "2004-2006 tax reform lowered top marginal rates on labour and capital."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "Aksjonaermodellen reduced double-taxation of dividends above a risk-free rate."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: moderate, rationale: "Handlingsregelen constrained oil-revenue spending to expected real return."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Fiscal-rule constitutionalisation via handlingsregelen."}

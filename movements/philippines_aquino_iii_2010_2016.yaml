# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: philippines_aquino_iii_2010_2016
status: candidate
name: "Philippines Aquino III Daang Matuwid"
countries: [PHL]
timeframe: {start: 2010, end: 2016, enacted_date: "2010-06-30"}
coalition: "Liberal Party-led coalition with NP, LDP, NPC allies; 'Daang Matuwid' ('Straight Path') governance brand"
leaders: ["Benigno 'Noynoy' Aquino III (President, 2010-16)", "Jejomar Binay (VP, 2010-16, opposition-leaning)", "Cesar Purisima (Finance)", "Florencio Abad (Budget)", "Arsenio Balisacan (NEDA)", "Leila de Lima (Justice)"]
doctrine: >
  Liberal-reformist good-governance programme branded 'Daang Matuwid'
  (Straight Path): corruption reduction as the animating theory of
  growth, coupled with inflation-targeting macro stability, PPP-led
  infrastructure delivery, and targeted social-protection expansion.
  Signature fiscal moves: the Sin Tax Reform Act (RA 10351, Dec 2012)
  raising and simplifying tobacco and alcohol excises with proceeds
  earmarked for UHC/PhilHealth indigent coverage; the Enhanced Basic
  Education (K-to-12) Act (RA 10533, May 2013) adding Grades 11-12
  plus kindergarten; and sustained expansion of the 4Ps Pantawid
  Pamilyang Pilipino Program conditional cash transfer (from ~1m to
  ~4.4m household beneficiaries). Institutional agenda: impeachment
  of Chief Justice Corona (May 2012) on SALN grounds, DAP/PDAF
  disallowance episodes, Commission on Audit activism. Foreign and
  security policy re-anchored on the US alliance (EDCA, Apr 2014)
  and an international arbitration challenge to China's nine-dash
  line (filed Jan 2013, won at the PCA under successor in July 2016).
  Macro record: average 6.2% GDP growth 2010-2015, first sovereign
  investment-grade ratings 2013, current-account surpluses, the
  'rising tiger' period.
policies: [ph_sin_tax_reform_2012, ph_k12_basic_education_2013, ph_pantawid_4ps_expansion_2010_2016, ph_ppp_infrastructure_program_2010_2016, ph_edca_2014]
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "4Ps CCT caseload quadrupled to 4.4m households; Social Pension for indigent seniors launched under RA 9994."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Sin Tax Reform (RA 10351) raised regressively-borne but health-targeted excises and earmarked revenue to PhilHealth indigent coverage."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Budget share on education and health rose substantially; DAP/PDAF episodes reflected activist fiscal management (and triggered SC rulings)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Philippine Competition Act (RA 10667, July 2015) established the Philippine Competition Commission — first general-purpose antitrust regulator."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Impeachment and conviction of CJ Corona (May 2012); prosecution of senators Estrada/Revilla/Enrile on plunder charges in the PDAF scandal."}
  - {axis: institutional.judicial_independence, direction: "mixed", magnitude: weak, rationale: "Corona impeachment removed an executive-aligned CJ via constitutional process; DAP and PDAF SC rulings demonstrated active judicial constraint on the executive."}
outcome_hypotheses: [corruption_control_growth_relationship, conditional_cash_transfer_poverty_reduction]
position_alignments:
  - {position_id: institutionalism, alignment: aligned, notes: "Classic good-governance theory-of-change: anti-corruption and horizontal-accountability reforms as the upstream engine of growth and investment."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Macro orthodoxy, PPP model, first antitrust regulator — yes; transfer expansion and retained FDI/constitutional caps — no."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Relied more on PPPs and ODA than on a directed industrial policy; closer to a Washington-consensus-plus model than to the East Asian activist state."}
notes: >
  Electoral mandate: 15.2 million votes (42.1% plurality) in the 2010
  election against Estrada 26.3%, Villar 15.4%, Teodoro 11.3%. 15th
  and 16th Congresses were Liberal-led coalitions with working
  majorities — ~110 LP House seats plus 150+ allied, and 4-6 LP
  senators within a working Senate majority of ~15-17. Pulse Asia
  net satisfaction ran +30 to +60 through most of the term. Succession
  handover to Duterte (June 2016) came after Mar Roxas, Aquino's
  anointed successor, placed second with 23.5%.
references:
  - "RA 10351 (Sin Tax Reform Act), 20 December 2012"
  - "RA 10533 (Enhanced Basic Education Act, K-to-12), 15 May 2013"
  - "RA 10667 (Philippine Competition Act), 21 July 2015"
  - "RA 10931 (Universal Access to Quality Tertiary Education — free tuition in SUCs, enacted under successor but Aquino-era groundwork)"
  - "COMELEC, 2010 National Elections Official Canvass"
  - "Enhanced Defense Cooperation Agreement (EDCA), 28 April 2014"

  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Direct-sale privatisation to politically-loyal insiders undermined property-rights predictability."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Foreign investors largely excluded; insider buyouts reduced competitive pressure."}

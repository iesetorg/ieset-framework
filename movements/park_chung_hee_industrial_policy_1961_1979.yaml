movement_id: park_chung_hee_industrial_policy_1961_1979
status: candidate
name: Park Chung-hee heavy-industrial drive (South Korea)
countries:
- KOR
timeframe:
  start: 1961
  end: 1979
coalition: Military-civilian authoritarian regime under Park
leaders:
- Park Chung-hee (President)
- Economic Planning Board bureaucracy
doctrine: 'State-directed export-oriented industrialisation with explicit sectoral targeting (steel,
  shipbuilding, electronics, petrochemicals), Heavy & Chemical Industry Drive from 1973. Directed
  credit via state banks to chaebol conglomerates conditional on export performance. Rapid land
  reform, universal education investment, labour repression. Outcome: ~8-10% annualised GDP growth
  1962-1979; transformed agrarian economy to industrial one within a generation. Canonical developmentalist-
  state success case (Amsden, Chang), contested on attribution between policy and sequencing.

  '
policies:
- korea_hcidrive_1973
- korea_directed_credit_1962_1979
- korea_export_subsidy_regime_1965_1979
- korea_land_reform_1949_1961
- korea_park_hci_1973
axes_summary:
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  rationale: Explicit government direction of investment sectoral allocation.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
- axis: regulatory.trade_openness
  direction: mixed
  rationale: Import-protection on some sectors + export subsidies; tariff reduction on inputs
    to export sectors.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: moderate
  rationale: Authoritarian regime with suppression of labour and political dissent.
outcome_hypotheses:

position_alignments:
- position_id: social_democratic
  alignment: aligned
  notes: Rights-based entitlement architecture — MGNREGA, NFSA, RTE — is the defining content.
- position_id: developmentalism
  alignment: partially_aligned
- position_id: classical_liberal
  alignment: opposed
  notes: Fiscal expansion + entitlement expansion + retrospective taxation run opposite to classical-liberal
    prescriptions.
- position_id: ordoliberal
  alignment: partially_aligned
  notes: FRBM discipline breached; rule-based architecture mixed.
references:

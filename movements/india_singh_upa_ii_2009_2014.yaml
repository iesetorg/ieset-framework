axes_summary:
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  rationale: MGNREGA scale-up, NFSA entitling 67% of population to subsidised food, RTE free schooling
    — largest rights-based entitlement expansion in Indian history.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Post-GFC stimulus took fiscal deficit to ~6.5% of GDP 2009-10; central expenditure
    as share of GDP rose through UPA-II.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  rationale: Multi-brand retail FDI liberalised Sep 2012; ASEAN-India FTA services and investment
    agreement Sep 2014 negotiated.
- axis: regulatory.sectoral_licensing
  direction: mixed
  magnitude: weak
  rationale: 2G allocation controversies; Telecom Regulatory Authority and court-ordered spectrum-auction
    re-allocation in 2012 — procedural tightening.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  rationale: RTI operationalisation, Lokpal and Lokayuktas Act 2013 passed after Anna Hazare agitation,
    judicial intervention on Coalgate and 2G strengthened accountability.
- axis: institutional.property_rights
  direction: mixed
  magnitude: moderate
  rationale: LARR 2013 raised compensation and consent thresholds (pro-landholder); retrospective
    tax amendment in Vodafone case (Finance Act 2012) opposite direction on investor property-rights
    perception.
- axis: regulatory.product_market_competition
  direction: mixed
  magnitude: weak
  rationale: Competition Commission of India operationalised from 2009; multi-brand retail FDI
    eased; LARR procedural load on infra/industrial acquisition offset.
outcome_hypotheses:
- developmentalist_state_growth_performance
successor_movements:

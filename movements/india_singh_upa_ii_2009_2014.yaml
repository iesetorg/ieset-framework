movement_id: india_singh_upa_ii_2009_2014
status: candidate
name: Singh UPA-II — rights-based entitlement expansion (India)
countries:
- IND
timeframe:
  start: 2009
  end: 2014
  enacted_date: '2009-05-22'
coalition: 'INC-led UPA: INC + DMK (until 2013) + NCP + Trinamool (until 2012) + RLD + National
  Conference, with Left Front outside support ended 2008'
leaders:
- Manmohan Singh (Prime Minister, 2004-2014; UPA-II from May 2009)
- Pranab Mukherjee (Finance Minister 2009-2012, then President of India)
- P. Chidambaram (Finance Minister 2012-2014, Home earlier)
- Sonia Gandhi (INC President, National Advisory Council chair)
- Montek Singh Ahluwalia (Planning Commission Deputy Chairman)
- D. Subbarao / Raghuram Rajan (RBI Governors)
doctrine: 'Congress-led INC+UPA ''inclusive growth'' doctrine operationalised via rights-based
  entitlements, continuing the 2004-2009 UPA-I template under second-term mandate. Economic school:
  centre-left Keynesian-social-democratic with National Advisory Council (chaired by Sonia Gandhi)
  as parallel policy forge pushing rights-based legislation. Key policy content: (i) Mahatma Gandhi
  National Rural Employment Guarantee Act (MGNREGA, enacted Sep 2005 under UPA-I, scaled nationwide
  2008 and expanded under UPA-II) guaranteeing 100 days/year of rural wage labour per household;
  (ii) Right to Information Act 2005 (UPA-I continuation) operationalised through UPA-II; (iii)
  Right of Children to Free and Compulsory Education Act 2009 (RTE, effective 1 Apr 2010) making
  schooling a fundamental right for 6-14 year olds; (iv) National Food Security Act 2013 (Sep
  2013) entitling ~67% of population to subsidised foodgrains (5 kg/person/month at ₹1-3/kg);
  (v) Aadhaar unique-ID rollout from 2010 via UIDAI under Nandan Nilekani — foundational for later
  DBT architecture; (vi) Direct Benefit Transfer programme launched Jan 2013 for LPG and scholarships;
  (vii) fuel-price deregulation — petrol decontrolled Jun 2010, diesel partial decontrol Jan 2013;
  (viii) FDI liberalisation in multi-brand retail (Sep 2012) after Trinamool withdrawal; (ix)
  Land Acquisition, Rehabilitation and Resettlement Act 2013 (LARR, Sep 2013) replacing the 1894
  Act with consent-and-SIA requirements; (x) Companies Act 2013 modernising corporate governance,
  including CSR 2% spend mandate; (xi) post- GFC fiscal stimulus 2008-2010 (excise cuts, service-tax
  cuts, counter-cyclical spending) producing fiscal deficit ~6.5% GDP in 2009-10 and later consolidation
  effort; (xii) GST constitutional amendment introduced 2011 but blocked by opposition — carried
  over to Modi period. Governance-side stress: 2G spectrum scam (2008 allocation, CAG report 2010),
  Commonwealth Games 2010, Coalgate coal-block allocation scam (CAG 2012) — produced policy paralysis
  perception and rupee crisis Aug 2013 (INR 68.85/USD intraday). Economically centre-left; socially
  broadly secular-liberal. Popularity: 2009 general election INC 28.6% / 206 seats, UPA 262 (strong
  second-term mandate, best INC performance since 1991); 2014 INC collapse to 19.3% / 44 seats.
  Approval of Singh declined from ~62% 2009 to ~37% 2013 per pollsters amid corruption cases and
  taper-tantrum macro stress. Coherence line: rights-based entitlement expansion + unique-ID digital-rails
  foundation + post-GFC counter-cyclical stimulus, undermined in second half by governance scandals
  and external-sector stress.

  '

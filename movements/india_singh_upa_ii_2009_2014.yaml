notes: 'Counterpart to the pre-2014 phase of the Singh government. UPA-I (2004-2009) is left for
  a separate movement record; this file covers UPA-II where the rights-based entitlement agenda
  matured and where the second-term governance stress played out. MGNREGA and RTI were enacted
  under UPA-I but scaled / operationalised under UPA-II, and are retained in policies here for
  completeness — a policy may be enacted_by multiple movements per schema.


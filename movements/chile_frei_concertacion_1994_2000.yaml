movement_id: chile_frei_concertacion_1994_2000
status: candidate
name: "Frei Ruiz-Tagle Concertación — trade-integration, Asian-crisis test"
countries: [CHL]
timeframe: {start: 1994, end: 2000, enacted_date: "1994-03-11"}
coalition: "Concertación de Partidos por la Democracia (PDC-PS-PPD-PRSD)"
leaders:
  - "Eduardo Frei Ruiz-Tagle (President 1994-2000)"
  - "Eduardo Aninat (Hacienda)"
  - "Carlos Massad / Carlos Massad Abud (BCCh Governor)"
  - "Juan Villarzú (SEGPRES)"
doctrine: >
  Second Concertación administration that extended the
  growth-with-equity framework while navigating the
  Asian-crisis contagion and deepening trade integration.
  Four doctrinal pillars: (a) Multilateral trade integration
  — Canada FTA 1996, Mercosur association agreement 1996,
  Mexico FTA 1998; MERCOSUR-CAN framework; negotiations with
  US, EU, Korea launched; APEC membership deepened
  (Santiago summit 2004 planning). (b) Asian-crisis response
  — capital inflow surge 1995-97; crisis contagion late
  1997; Banco Central raised reference rate to 8.5% real
  and widened exchange-rate band; 1999 GDP -0.4% (Chile's
  first recession since transition); encaje reduced to 0%
  June 1998, formally abolished September 1998 after
  sudden-stop damage. (c) Infrastructure concessions —
  Ley de Concesiones activated at scale: airports, highways
  (Ruta 5 Panamericana tender 1996), ports; private capital
  in public infrastructure. (d) Judicial and security reform
  — Reforma Procesal Penal initiated (nationwide rollout
  2000-2005 under Lagos); Ministerio Público established;
  Pinochet arrest in London October 1998 tested
  civil-military relations. Stated school: CEPAL
  neo-structuralist + open-economy integration + gradualist
  institutional reform. Left-right: centre-left social;
  centre-right macro; trade-openness priority. Popularity:
  December 1993 won 57.98% first-round; approval 60-65%
  through 1997 before Asian crisis; ~40% at exit; January
  2000 Concertación's Lagos narrowly won runoff 51.31% vs
  Lavín 48.69% — first close post-transition result.
  Coherence: trade encaje framework and fiscal activism for
  multilateral market access and infrastructure concession
  build-out; Asian crisis revealed framework limits.
policies:
  - cl_canada_mexico_mercosur_fta_1996_1998
  - cl_asian_crisis_encaje_removal_1998
  - cl_concessions_law_infrastructure_1996
  - cl_reforma_procesal_penal_initiation_1997
  - cl_pinochet_london_arrest_1998
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Canada, Mexico, Mercosur FTAs; APEC deepening."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Encaje formally abolished September 1998 after sudden stop."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Infrastructure concessions brought private capital into transport."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Reforma Procesal Penal created Ministerio Público."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Pinochet London arrest forced civil-military rebalancing."}
outcome_hypotheses: [encaje_capital_controls_volatility_effect, fta_trade_diversion_chile_case]
predecessor_movements: [chile_aylwin_concertacion_1990_1994]

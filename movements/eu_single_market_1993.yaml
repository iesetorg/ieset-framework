# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eu_single_market_1993
status: candidate
name: "EU Single Market programme (1992 Project)"
countries: [DEU, FRA, ITA, ESP, NLD, BEL, IRL, GBR, DNK, GRC, PRT]
timeframe: {start: 1986, end: 1993, enacted_date: "1993-01-01"}
coalition: "European Commission (Delors) + member state consensus via Single European Act 1986"
leaders: ["Jacques Delors (EC President)", "Arthur Cockfield (Commissioner responsible for the White Paper)"]
doctrine: >
  Cockfield White Paper 1985 → Single European Act 1986 → completion of
  internal market by end-1992 with free movement of goods, services,
  capital, and people. ~300 legislative measures harmonised across
  standards, VAT, financial-services passporting, public procurement
  opening. Historically-significant market-liberalising project jointly
  authored across ideological spectrum — Delors (socialist) + Thatcher
  (conservative) supported simultaneously for different reasons. D.3.1
  canonical cross-spectrum market-oriented content: the framework should
  credit regardless of coalition labels.
policies: [eu_single_european_act_1986, eu_banking_passport_1989, eu_vat_harmonisation_1993, eu_services_directive_2006]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Removal of internal frictions on goods + services + capital movement."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Intra-EU trade opening was the primary content."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: strong, rationale: "Free movement of workers across EU member states."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Harmonised standards reduced national-level sector-specific licensing."}
outcome_hypotheses: [eu_single_market_growth_effect]
position_alignments:
  - {position_id: chicago_monetarist, alignment: aligned}
  - {position_id: ordoliberal, alignment: aligned}
references:
  - "Cecchini Report (1988) 'The Economics of 1992'"
  - "Single European Act (1986)"
  - "Delors White Paper (1985)"
  - "Campos-Coricelli (2015), 'Why did Britain join the EU?'"

movement_id: mexico_lopez_portillo_pri_1976_1982
status: candidate
name: "López Portillo PRI — oil boom to 1982 debt-crisis bank nationalisation"
countries: [MEX]
timeframe: {start: 1976, end: 1982, enacted_date: "1976-12-01"}
coalition: "Partido Revolucionario Institucional (PRI) — single-party hegemony"
leaders:
  - "José López Portillo (President 1976-1982)"
  - "Julio Rodolfo Moctezuma Cid (Hacienda 1976-1977)"
  - "David Ibarra Muñoz (Hacienda 1977-1982)"
  - "Jesús Silva Herzog Flores (Hacienda 1982)"
  - "Miguel de la Madrid (Planning / Budget)"
  - "Jorge Díaz Serrano (Pemex director 1976-1981)"
doctrine: >
  Statist-developmentalist PRI programme dominated by the Cantarell oil
  discovery and its subsequent fiscal mismanagement. Four phases: (1)
  1976-1977 IMF stand-by stabilisation after the August 1976 peso
  devaluation (first in 22 years), inherited from Echeverría; (2)
  1978-1981 oil boom — proven reserves rose from 6.3 to 72 billion
  barrels; Pemex output doubled; oil rose from 15% to 75% of export
  revenue; "administering abundance" became the doctrinal slogan; (3)
  massive fiscal expansion via external borrowing — public-sector deficit
  rose to 14.1% of GDP (1981); external debt rose from USD 20bn (1976)
  to USD 86bn (1982); Global Development Plan and Industrial Development
  Plan (1979) financed via petrodollar recycling; (4) 1982 crisis and
  bank nationalisation — February 1982 40% devaluation, August 1982
  moratorium on foreign debt service ("Mexican Weekend") triggering the
  Latin American debt crisis, and the 1 September 1982 decree
  nationalising the private banking system and imposing exchange
  controls. Stated school: Mexican developmentalism + oil-rent
  redistributive populism. Left-right axis: statist-left on economic
  content, authoritarian-corporatist on political content within PRI
  hegemony. Popularity / legitimacy: López Portillo ran unopposed in 1976
  (100% of valid votes cast, 62% turnout) — the last such PRI single-
  candidate election before 1977 political reform introduced opposition
  party registration; 1979 midterms PRI retained Chamber majority with
  ~70% seats. Coherence line: trade fiscal discipline and private-sector
  autonomy for oil-rent-financed accelerated industrialisation — a bet
  that failed when Fed Volcker shock plus oil-price softening collapsed
  external financing in 1982.
policies:
  - mx_bank_nationalisation_decree_1982
  - mx_1982_peso_devaluation_moratorium
  - mx_global_development_plan_1980
  - mx_cantarell_pemex_expansion_1976_1981
  - mx_oil_boom_external_borrowing_1978_1982
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public-sector deficit peaked 14.1% of GDP 1981."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Industrial Development Plan 1979 subsidised state-owned heavy industry."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "September 1982 bank nationalisation is the maximal financial-regulatory tightening."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Expropriation of private banks without negotiated compensation framework."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Exchange controls imposed 1982; import licensing regime kept."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Pemex monopoly reinforced; state sector expanded to >1,100 SOEs by 1982."}
outcome_hypotheses: [resource_curse_effect, debt_crisis_liability_dollarisation]
successor_movements: [mexico_de_la_madrid_pri_1982_1988]
position_alignments:

disclosure: >
  Venezuelan collapse is the closest thing to a natural experiment in
  modern economic history for the framework's D.2 conditions_favoring_markets
  entries. Literature consensus is strong; the framework coding reflects
  that. Author prior is ~0.97 that framework will detect a large negative
  effect on GDP per capita PPP relative to Latin American comparators.

references:
  - "Kronick (2019), 'The Collapse of Venezuela's Economy'"
  - "Rodriguez-Pardo IMF WP 2018 on Venezuela hyperinflation"
  - "WGI Venezuela series, 1996-2022"
  - "IMF Article IV Venezuela (final 2004 before lapse)"

notes: >
  Treatment date 1999 is Chávez's inauguration. Institutional-quality
  decline is gradual 1999-2004, steepens after PDVSA strike 2002-2003,
  and accelerates sharply after oil-price collapse 2014-2016.

  Framework-validation case: if v1 can't detect this negative effect,
  the framework is broken. Expected result: enormous negative treatment
  effect (multiple log-points of GDP per capita) with clean pre-trends.

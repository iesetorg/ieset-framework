# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: venezuela_chavismo_bolivarian_1999_present
status: candidate
name: "Chavismo / Bolivarian Revolution (Venezuela)"

countries: [VEN]

timeframe:
  start: 1999
  end: ongoing
  enacted_date: "1999-02-02"

coalition: "MVR → PSUV (United Socialist Party of Venezuela)"

leaders:
  - "Hugo Chávez (President 1999–2013)"
  - "Nicolás Maduro (President 2013–present)"

doctrine: >
  Self-described "socialism of the 21st century" combining nationalisation
  of strategic industries (oil via PDVSA 2002 politicisation, steel,
  cement, telecoms, agriculture), price controls on food and consumer
  goods, foreign exchange controls (CADIVI 2003+), expropriation of
  private firms and farms, dismantling of judicial and central bank
  independence, and monetisation of fiscal deficits once oil revenues
  declined. Policy content spans nearly every framework axis in the
  direction of state control and market replacement. Outcome: the
  sharpest peacetime economic collapse of a non-warring oil-exporter in
  the modern record — GDP per capita down more than 70% from 2013 peak,
  hyperinflation 2017–2019, ~7 million emigrants (>20% of population).

policies:
  - venezuela_pdvsa_politicisation_2002
  - venezuela_price_controls_food_2003
  - venezuela_fx_controls_cadivi_2003
  - venezuela_expropriations_2007_2015
  - venezuela_central_bank_subordination
  - venezuela_monetisation_of_deficit_2013_2019

axes_summary:
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: strong
    rationale: "Mass nationalisations; price controls; import-license distortions; private-sector share of GDP collapsed."
  - axis: regulatory.price_control_intensity
    direction: "+"
    magnitude: strong
    rationale: "Food and consumer-goods price controls expanded from 2003 onward with INDEPABIS/SUNDDE enforcement, parallel markets, and chronic shortages."
  - axis: institutional.property_rights
    direction: "-"
    magnitude: strong
    rationale: "Expropriations without compensation; judiciary politicised; contract enforcement unreliable."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: strong
    rationale: "Venezuela's WGI rule of law dropped from ~-0.5 (1996) to ~-2.0 by 2020 (WGI scale range ~-2.5 to +2.5)."
  - axis: monetary.central_bank_independence
    direction: "-"
    magnitude: strong
    rationale: "Direct financing of fiscal deficit; reserve requirements relaxed; central bank leadership replaced repeatedly."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Oil revenues spent + borrowed against; misiones (social programs) expanded with no structural revenue base."
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: strong
    rationale: "FX controls amounted to import rationing; export diversification reversed."


# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: brazil_bolsonaro_pl_2019_2022
status: candidate
name: "Bolsonaro government — right-populist with liberal economic team (Brazil)"
countries: [BRA]
timeframe:
  start: 2019
  end: 2022
  enacted_date: "2019-01-01"
coalition: "PSL (2019) then PL (from 2021) with Centrão partners (PP, Republicanos, PL, PSD) plus military-cadre appointments"
leaders:
  - "Jair Bolsonaro (President 2019-2022, PSL then PL)"
  - "Paulo Guedes (Economy Minister 2019-2022, Chicago-trained)"
  - "Roberto Campos Neto (Central Bank Governor 2019-2024)"
  - "Hamilton Mourão (Vice-President, retired general)"
  - "Ricardo Salles (Environment Minister 2019-2021)"
  - "Tereza Cristina (Agriculture Minister 2019-2022)"
doctrine: >
  Right-populist government pairing culture-war / law-and-order /
  anti-establishment framing with a Chicago-trained liberal-orthodox
  economic team under Paulo Guedes ("super-ministry" merging Finance,
  Planning, and Industry). Core economic output: (i) pension reform
  (Emenda Constitucional 103, Nov 2019) raising minimum retirement ages
  (62 women / 65 men) with long transition — largest entitlement cut
  in Brazilian history by projected fiscal savings (~R$800bn over 10y);
  (ii) central-bank independence statute (Lei Complementar 179/2021,
  24 Feb 2021) granting the BCB fixed-term mandates de-synchronised
  from presidential cycles; (iii) Eletrobras privatisation (Lei
  14182/2021, capital-increase executed Jun 2022) diluting federal
  stake to ~45%; (iv) emergency COVID cash transfer (Auxílio
  Emergencial, Apr 2020) at R$600/month reaching ~68m recipients —
  the largest expansion of Brazilian cash transfer in absolute and
  per-capita terms; (v) Auxílio Brasil (Dec 2021) replacing Bolsa
  Família with higher floor but conditionality weakened; (vi) auto
  and white-goods IPI cuts (2020, 2022) and fuel tax cuts ahead of
  2022 election; (vii) regulatory retrenchment on Amazon enforcement
  — IBAMA/ICMBio budgets cut, deforestation rose ~60% vs 2018
  baseline (PRODES). COVID response was characterised by executive
  minimisation (presidential opposition to lockdowns and later to
  vaccination rollout) while subnational governors ran containment;
  the federal government did pass one of the world's largest
  emergency-transfer programmes in parallel. Popularity: 55.1% second
  round 2018, ~30-40% approval band through term, 49.1% second-round
  2022 (lost to Lula 50.9%). Câmara seat share — PL became the
  largest party in 2022 (99 seats) despite losing the presidency,
  evidencing down-ballot bolsonarismo durability. Coherence line:
  economic team orthodoxy sat in genuine tension with populist
  election-year fiscal loosening (2022 IPI/fuel cuts, Auxílio Brasil
  floor raise, PEC Kamikaze) and with environmental/institutional
  deregulation that orthodox economists generally opposed.
policies:
  - br_pension_reform_ec103_2019
  - br_bcb_independence_lc179_2021
  - br_eletrobras_privatisation_lei14182_2021
  - br_auxilio_emergencial_covid_2020
  - br_auxilio_brasil_2021
  - br_amazon_enforcement_retrenchment_2019
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: moderate
    rationale: "EC 103 pension reform cuts long-run mandatory spending; Teto de Gastos preserved for most of term but breached via PEC Kamikaze in election-year 2022."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    rationale: "Auxílio Emergencial 2020 (R$600, ~68m recipients) and Auxílio Brasil floor R$400-600 — largest cash-transfer expansion in Brazilian history."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: moderate
    rationale: "Eletrobras privatisation, Economic Freedom Law (Lei 13874/2019), Marco Legal do Saneamento (Lei 14026/2020) expanded private-sector roles."
  - axis: regulatory.environmental_stringency
    direction: "-"
    magnitude: strong
    rationale: "IBAMA/ICMBio enforcement budgets cut; PRODES deforestation rose ~60% vs 2018; land-grab legislation debated."
  - axis: regulatory.labour_market_flexibility
    direction: "+"
    magnitude: weak
    rationale: "Extended 2017 reform through MP 905/927 COVID-era labour flexibilities and Carteira Verde-Amarela programme."
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: strong
    rationale: "LC 179/2021 granted BCB statutory independence with fixed-term Governor/Directors mandates."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: moderate
    rationale: "Executive attacks on electoral authority (TSE) and Supreme Court; V-Dem liberal democracy index declines 2019-2022."
outcome_hypotheses:
  - pension_reform_fiscal_sustainability_effect
  - central_bank_independence_inflation_effect
  - cash_transfer_poverty_effects
  - environmental_enforcement_deforestation_link
predecessor_movements:
  - brazil_temer_mdb_2016_2018
successor_movements:
  - brazil_lula_third_term_2023_present
position_alignments:
  - {position_id: neoliberal, alignment: partially_aligned, notes: "Guedes wing aligned; election-year fiscal loosening and protectionist auto-industry measures diverge."}
  - {position_id: right_populism, alignment: aligned}
  - {position_id: libertarian, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: opposed}
  - {position_id: green_political_economy, alignment: opposed}
disclosure: >
  Invariant 3 applied: the movement is coded on policy content. Bolsonaro's
  personal politics (COVID denialism, institutional brinkmanship, January
  2023 Brasília riot by supporters post-term) are informational context;
  the policy-axis coding captures the orthodox-liberal economic-team
  output alongside the populist deviations rather than reading off party
  label.
references:
  - "Emenda Constitucional 103/2019 (Reforma da Previdência)"
  - "Lei Complementar 179/2021 (Autonomia do Banco Central)"
  - "Lei 14.182/2021 (Eletrobras)"
  - "Lei 13.982/2020 (Auxílio Emergencial)"
  - "IMF Article IV Brazil 2019, 2020, 2021, 2022"
  - "INPE PRODES deforestation series 2019-2022"
notes: >
  Tension between Guedes-wing orthodoxy and Bolsonaro-wing populism is
  a defining feature. Election-year 2022 saw the clearest deviation
  (PEC Kamikaze breaching the spending cap). The movement's successor
  Lula III replaced Teto de Gastos but preserved BCB independence and
  did not reverse pension reform — evidence of partial institutional
  lock-in of the orthodox-wing output.

  - "DNP (1979), Plan de Integración Nacional 1979-1982"
  - "Amnesty International (1980), Colombia Report"
  - "Ocampo (1994), Historia Económica de Colombia"
notes: "Bridges López Michelsen to Conservative Betancur (1982-86)."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mozambique_frelimo_gas_fiscal_reform_2014_present
status: candidate
name: Mozambique FRELIMO gas and fiscal reform regime 2014-present
countries: [MOZ]
timeframe:
  start: 2014
  end: ongoing
coalition: Frente de Libertacao de Mocambique (FRELIMO)
leaders:
  - "Armando Guebuza (President, FRELIMO, to 2015)"
  - "Filipe Nyusi (President, FRELIMO, 2015-2025)"
  - "Daniel Chapo (President, FRELIMO, 2025-)"
doctrine: >
  FRELIMO's gas-era economic regime combined special investment terms for the
  Rovuma LNG projects, post-hidden-debt fiscal repair through IMF re-engagement,
  and a sovereign-fund framework for future natural-gas revenues. The governing
  line presents the programme as resource-led reconstruction, fiscal
  transparency, and infrastructure development while keeping extractive rents
  under central executive management.
policies:
  - mz_rovuma_lng_special_regime_2014
  - mz_imf_ecf_2022
  - mz_sovereign_wealth_fund_2024
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Rovuma LNG investment terms and IMF re-engagement reopened large external financing and investor channels."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "IMF programme and sovereign-fund rules restrain parts of discretionary fiscal use of resource revenues."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "LNG special regime and project infrastructure target a strategic extractive sector."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Fiscal transparency and sovereign-fund rules partially repair hidden-debt-era governance failures."}
references:
  - "Mozambique Law No. 25/2014, special legal and contractual regime for Rovuma Basin LNG projects."
  - "IMF Mozambique Extended Credit Facility programme materials, 2022-2025."
  - "Mozambique Sovereign Wealth Fund law and Bank of Mozambique implementation materials, 2024."

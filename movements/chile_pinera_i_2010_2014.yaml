movement_id: chile_pinera_i_2010_2014
status: candidate
name: "Piñera I — earthquake rebuilding, CAE, 2011 student protests"
countries: [CHL]
timeframe: {start: 2010, end: 2014, enacted_date: "2010-03-11"}
coalition: "Coalición por el Cambio (RN + UDI centre-right)"
leaders:
  - "Sebastián Piñera (President 2010-2014)"
  - "Felipe Larraín (Finance 2010-2014)"
  - "José De Gregorio (BCCh 2007-2011)"
  - "Rodrigo Vergara (BCCh 2011-2016)"
doctrine: >
  Piñera I was Chile's first elected centre-right government post-Pinochet,
  governing under immediate earthquake-reconstruction pressure. (a)
  Economic school: centre-right market-liberal with higher-tax +
  regulatory-lite orientation — 27 Feb 2010 Maule earthquake (MM 8.8)
  reconstruction package (temporary corporate tax hike from 17% to 20%
  2011-2012, Ley 20.455 Jul 2010), consolidation of CAE state-guaranteed
  student-loan regime (inherited 2006 Bachelet), Pension Solidarity Pillar
  rollout continuation, public-hospital concessions, SII modernisation,
  copper-royalty reform (Ley 20.469 Oct 2010). (b) Left-right: centre-right;
  market-liberal but with counter-cyclical reconstruction spending and
  corporate-tax hike on stream. (c) Dated policies: earthquake reconstruction
  2010, post-quake corporate tax rise Ley 20.455, royalty reform Oct 2010,
  Ley 20.562 (HidroAysén controversy), 2011 winter student mass protests
  demanding CAE reform + free tertiary, 7% Isapre-surplus Court ruling
  response, 2012 tax reform Ley 20.630 (raised corporate to 20% permanent,
  tuition-tax-credits for middle class). (d) Popularity: won Jan 2010
  runoff 51.6% vs Frei; approval bounced to 63% post-Chile-33 mine rescue
  Oct 2010, fell into 20s-30s during 2011 student protests; Coalición
  lost Nov 2013 runoff to Bachelet II 62-38%. (e) Coherence: moderate —
  earthquake reconstruction dominated first two years; student-movement
  demands captured second half and forced tax-reform pivot that undercut
  pure-liberal doctrine.
policies:
  - cl_pinera_i_earthquake_reconstruction_2010
  - cl_pinera_i_corporate_tax_hike_2010
  - cl_cae_student_loan_consolidation_2010_2012
  - cl_pinera_i_copper_royalty_reform_2010
  - cl_pinera_i_tax_reform_2012

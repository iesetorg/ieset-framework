  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Creative Economy chaebol-coordination is industrial-policy, not market-process."}
  - {position_id: empirical_pragmatist, alignment: opposed, notes: "Late-term governance failure illustrates informal-adviser risks."}
references:
  - "Constitutional Court Decision 2016헌나1, 10 March 2017 (impeachment confirmation)"
  - "Japan-Korea Comfort Women Agreement, 28 December 2015 (joint press announcement)"
  - "BOK Monetary Policy Reports 2013-2017"
  - "National Assembly impeachment motion, 9 December 2016"
notes: >
  Park movement is a coherent doctrine in its first three years (Creative
  Economy + Choinomics) disrupted by Sewol ferry sinking political toll
  (April 2014), MERS outbreak (2015), and terminally by the Choi scandal
  from late 2016.

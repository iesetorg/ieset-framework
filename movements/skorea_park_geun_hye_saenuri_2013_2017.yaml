movement_id: skorea_park_geun_hye_saenuri_2013_2017
status: candidate
name: "Park Geun-hye Saenuri — Creative Economy and impeachment"
countries: [KOR]
timeframe: {start: 2013, end: 2017, enacted_date: "2013-02-25"}
coalition: "Saenuri Party / Liberty Korea Party (Park Geun-hye administration, impeached)"
leaders:
  - "Park Geun-hye (President, 25 Feb 2013 - 10 Mar 2017, impeached and removed)"
  - "Hyun Oh-seok / Choi Kyung-hwan / Yoo Il-ho (Deputy PM / Finance)"
  - "Kim Choong-soo / Lee Ju-yeol (BOK Governor)"
  - "Choi Soon-sil (informal adviser, centre of scandal)"
doctrine: >
  Park Geun-hye Creative Economy corporate-family-legacy conservative doctrine —
  daughter of Park Chung-hee framed her administration around "Creative
  Economy" (창조경제) as the third growth model after her father's heavy-chemical
  industrialisation: fusion of ICT/science with traditional industry via 17
  regional Centers for Creative Economy and Innovation co-sponsored by
  chaebol anchor firms, plus "474 vision" (4% growth, 70% employment, $40k
  GDP/capita). "Choinomics" under Deputy PM Choi Kyung-hwan (2014-2015)
  pivoted toward Keynesian demand stimulus: BOK policy-rate cuts from 2.50%
  to 1.25%, expansionary supplementary budget of KRW 11.8tn (2015), DTI/LTV
  real-estate deregulation to unleash household borrowing, pushing household
  debt/GDP to record levels. Signature foreign-policy moves: Japan-Korea
  "comfort women" final-and-irreversible agreement (28 December 2015, $9m
  yen fund for 46 surviving women) which collapsed politically under
  successor Moon; THAAD deployment decision (July 2016) provoking Chinese
  economic retaliation (tour ban, Lotte retail punishment, K-pop
  restrictions). Administration unravelled October 2016 with revelations
  of Choi Soon-sil's non-official influence and K-Sports/Mir foundation
  extortion of chaebol. Impeachment motion passed National Assembly 9
  December 2016 (234-56); Constitutional Court upheld 10 March 2017 (8-0);
  snap election May 2017 won by Moon Jae-in. Popularity collapsed from 42%
  to 4% in the final month. Coherence line: Creative Economy chaebol-
  coordination + Choinomics monetary-fiscal expansion + comfort-women and
  THAAD foreign-policy realignment, destroyed by corruption scandal.
policies:
  - kr_park_creative_economy_centres_2014
  - kr_park_choinomics_stimulus_ltv_dti_2014_2015
  - kr_park_japan_comfort_women_agreement_2015
  - kr_park_thaad_deployment_2016
  - kr_park_public_sector_performance_wage_2016
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "BOK rate cuts 2.50 → 1.25 (2014-2016); QE-style purchases not used."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "2015 supplementary KRW 11.8tn + 2016 KRW 11tn; household-debt-backed consumption stimulus."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "DTI/LTV ceilings raised 2014; mortgage expansion; household-debt/GDP +20 pp."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "Creative Economy Innovation Centres co-sponsored with chaebol."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Choi Soon-sil influence peddling and K-Sports/Mir extortion → impeachment and removal."}
predecessor_movements:

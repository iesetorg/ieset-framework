# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bulgaria_communist_state_building_1944_1989
status: candidate
name: "Bulgarian communist state-building and planning (1944-1989)"
countries: [BGR]
timeframe: {start: 1944, end: 1989}
coalition: "Bulgarian Communist Party / Fatherland Front"
leaders:
  - "Georgi Dimitrov"
  - "Valko Chervenkov"
  - "Todor Zhivkov"
doctrine: >
  Soviet-aligned communist state-building movement that abolished the monarchy,
  nationalised banks and industry, collectivised agriculture, and organised the
  economy through central plans under one-party rule. The model expanded heavy
  industry, education, and social services while suppressing private property,
  political competition, and independent price signals.
policies:
  - bg_nationalisation_law_1947
  - bg_agricultural_collectivisation_1946_1958
  - bg_soviet_style_planning_1947_1989
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Nationalisation and collectivisation displaced private ownership across industry, banking, and agriculture."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Central planning replaced competitive entry and market prices."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Universal social provision and subsidised goods expanded under the socialist state."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "One-party rule subordinated courts and administration to party direction."}
position_alignments:
  - {position_id: marxist_leninist, alignment: aligned}
  - {position_id: market_socialist, alignment: opposed}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Crampton (2007), Bulgaria"
  - "Library of Congress Country Study: Bulgaria"
  - "Maddison Project and PWT long-run Bulgaria series for outcomes"
notes: "The 1989-1997 transition and currency-board period should be represented as a separate movement."

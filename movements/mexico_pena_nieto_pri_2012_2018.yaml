movement_id: mexico_pena_nieto_pri_2012_2018
status: candidate
name: "Peña Nieto PRI modernising-neoliberal + Pacto por México reforms"
countries: [MEX]
timeframe: {start: 2012, end: 2018}
coalition: "PRI (with PVEM) governing via the cross-partisan Pacto por México signed Dec 2012 with PAN and PRD — explicit negotiated reform agenda"
leaders:
  - "Enrique Peña Nieto (President 2012-2018)"
  - "Luis Videgaray (Finance Minister 2012-2016, Foreign Minister 2017-2018)"
  - "Pedro Joaquín Coldwell (Energy Minister 2012-2018)"
  - "Ildefonso Guajardo (Economy / NAFTA renegotiation 2017-2018)"
  - "Agustín Carstens (Banco de México Governor 2010-2017)"
  - "Aurelio Nuño (Education Minister 2015-2017)"
doctrine: >
  Modernising-neoliberal return of the PRI under a technocratic-reformist
  leadership team that used the cross-party Pacto por México (signed 2
  December 2012 with PAN and PRD) to push through the largest bundle of
  structural reforms since the Salinas era. Economic school: Mexican
  market-liberal with institutionalist framing — open Pemex to private
  upstream capital, force competition in telecoms, formalise an
  evaluation-based teaching career, broaden the tax base. Sits clearly
  centre-right on the economic axis; pairs liberalisation with an active
  legalistic-institutionalist build-out of new regulators (IFT, CNH,
  CRE with expanded mandate, SAT modernisation). Signature policies
  include: (i) energy reform Dec 2013 (constitutional Arts. 25, 27, 28)
  ending Pemex's 75-year upstream monopoly and creating farm-out /
  licensing rounds, with secondary laws Aug 2014; (ii) telecoms reform
  Jun 2013 creating the IFT as constitutional regulator and forcing
  asymmetric obligations on "preponderant" players (América Móvil /
  Televisa); (iii) education reform Feb 2013 creating INEE teacher
  evaluation and service law; (iv) fiscal / hacendaria reform Oct 2013
  (effective 2014) eliminating IETU/IDE, capping deductions, raising
  top PIT to 35%, introducing junk-food/sugary-drink excises and
  homologating VAT at the border; (v) financial reform 2014; (vi)
  political-electoral reform 2014 (INE replacing IFE, re-election of
  legislators). Popularity trajectory: won July 2012 with 38.2% plurality,
  PRI+PVEM held ~251 Cámara seats (lower house majority via alliance);
  approval peaked mid-2013 around ~50%, collapsed to 12-25% after
  Ayotzinapa (Sep 2014), Casa Blanca (Nov 2014) and 2017 gasolinazo;
  ended 2018 among the least popular presidents on record, with the PRI
  reduced to third place and 14% of the vote that year. Coherence line:
  reformist content was materially liberalising on regulated sectors
  (energy, telecoms, labour-adjacent education) and pro-competition in
  product markets; the movement's legitimacy was hollowed by corruption
  scandals and security failures, producing the backlash that carried
  AMLO to power in 2018.
policies:
  - mx_energy_reform_2013
  - mx_telecoms_reform_2013
  - mx_education_reform_2013
  - mx_fiscal_reform_2014
  - mx_financial_reform_2014
  - mx_political_electoral_reform_2014
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Energy upstream opened to private capital; IFT forced asymmetric obligations on Telmex/Televisa; regulator-led pro-competition push."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Constitutional amendment permits licensing, production-sharing and profit-sharing contracts for hydrocarbons; farm-outs and Rondas 1-3 executed 2015-2018."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Reserves-replacement trajectory improved via Ronda auctions + deepwater Trion JV; gas-market liberalisation expanded import optionality."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "2014 reform raised PIT top rate from 30% to 35%, capped deductions, introduced sugary-drink and junk-food excises."}
  - {axis: fiscal.tax_corporate, direction: "0", magnitude: weak, rationale: "ISR headline rate held at 30% but base-broadened; IETU/IDE abolished, net burden modestly up."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Ley Federal del Trabajo reform (Nov 2012, inherited from Calderón but enacted during PN transition) introduced hourly contracts, outsourcing rules, reduced firing costs."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "Adversarial criminal-procedure transition completed 2016 nationally; counterbalanced by executive capture allegations in specific cases."}
outcome_hypotheses:
  - trade_liberalisation_growth_effect
  - privatisation_productivity_effect
predecessor_movements:
  - mexico_salinas_nafta_neoliberal_1988_1994
successor_movements:
  - mexico_amlo_morena_2018_2024
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Energy + telecoms liberalisation content."}
  - {position_id: ordoliberal, alignment: aligned, notes: "Explicit competition-regulator build-out (IFT as constitutional body)."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Formal institutional upgrades; legitimacy eroded by corruption scandals."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Reform content defensible; political execution undermined durability."}
references:
  - "Pacto por México (2 diciembre 2012)"
  - "DOF 20-dic-2013 reforma energética (Arts. 25, 27, 28 CPEUM)"
  - "Ley de Hidrocarburos (11-ago-2014) y Ley de la Industria Eléctrica (11-ago-2014)"
  - "Reforma de telecomunicaciones DOF 11-jun-2013; Ley Federal de Telecomunicaciones y Radiodifusión 2014"
  - "Reforma educativa DOF 26-feb-2013; LGSPD 2013"
  - "Reforma hacendaria DOF 11-dic-2013 (vigencia 2014)"
  - "Banxico Informe Trimestral 2012-2018"
  - "IMF Article IV Mexico 2013-2018"
notes: >
  Pacto por México is analytically important: the reforms required PRI +
  PAN + PRD negotiation because constitutional change needs 2/3 majority.
  The cross-party pact explains why the content is coherently market-
  liberal despite the PRI label — PAN (centre-right) provided content
  alignment, PRD (centre-left) extracted the political-electoral reform
  in exchange. Invariant 3 applies: content, not party label.

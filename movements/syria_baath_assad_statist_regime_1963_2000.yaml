# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: syria_baath_assad_statist_regime_1963_2000
status: candidate
name: "Syria Ba'ath-Assad statist regime"
countries: [SYR]
timeframe: {start: 1963, end: 2000}
coalition: "Arab Socialist Ba'ath Party and Assad-led military-security state"
leaders:
  - "Salah Jadid (de facto leader 1966-1970)"
  - "Hafez al-Assad (President 1971-2000)"
doctrine: >
  Syria's Ba'athist governing regime fused Arab socialism, land reform, public
  ownership, five-year planning, and a security-centred one-party state. The
  post-1970 Assad order moderated some radical economic measures but preserved
  the commanding role of public enterprises, administered prices, agricultural
  policy, and party-state control as the basis for national development and
  political stability.
policies:
  - syr_baath_nationalisations_1965
  - syr_agrarian_reform_consolidation_1963_1970
  - syr_public_sector_five_year_planning_1971_1980
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Nationalisations and agrarian ceilings reduced private asset security in industry, finance, and land."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Public enterprises, administered prices, and licensing limited competition across major sectors."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "State planning expanded public investment, public employment, and subsidised services."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Planning directed resources to state industry, agriculture, and strategic infrastructure."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Emergency law, party supremacy, and security courts weakened legal constraints on executive power."}
references:
  - "Hinnebusch (2001), Syria: Revolution from Above"
  - "Perthes (1995), The Political Economy of Syria Under Asad"
  - "Seale (1988), Asad: The Struggle for the Middle East"
notes: "The 1963-1970 radical Ba'ath and post-1970 Assad phases differ in intensity; they are grouped here because the public-sector planning regime persisted."

axes_summary:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Bolsa Família floor raised to R$600/month per family plus child bonuses; Pe-de-Meia adds education-linked student savings transfers."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    rationale: "New framework permits real-spending growth 0.6-2.5%/yr above the prior cap-based contraction path."
  - axis: fiscal.tax_progressivity
    direction: "mixed"
    magnitude: weak
    rationale: "VAT unification is distributionally near-neutral; proposed IRPF reform (top-rate / dividend-taxation) pending 2025+."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    rationale: "Nova Indústria Brasil, BNDES credit expansion, Mover green-mobility tax credits, and Fuel of the Future sector support; mission-oriented industrial policy return."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: moderate
    rationale: "PPCDAm enforcement revival, the SBCE carbon-market law, and Fuel of the Future fuel mandates increased federal climate and deforestation controls."
  - axis: regulatory.trade_openness
    direction: "+"
    magnitude: weak
    rationale: "Mercosur-EU deal signed 2024 pending EU ratification; tariff rationalisation modest; import substitution rhetoric on semiconductors partially offsetting."
  - axis: regulatory.product_market_competition
    direction: "mixed"
    magnitude: weak
    rationale: "EC 132 and LC 214 VAT unification simplify compliance (pro-competition); sectoral interventions (Petrobras pricing, utility re-regulation) push the other way."
  - axis: monetary.central_bank_independence
    direction: "mixed"
    magnitude: weak
    rationale: "BCB statutory independence (LC 179/2021) preserved; public pressure from executive on rate path did not produce statutory change."

movement_id: brazil_lula_third_term_2023_present
status: candidate
name: "Lula third term — Marco Fiscal, industrial policy return (Brazil)"
countries: [BRA]
timeframe:
  start: 2023
  end: ongoing
  enacted_date: "2023-01-01"
coalition: "PT-led Federação Brasil da Esperança (PT + PCdoB + PV) plus Centrão partners (MDB, PSD, União Brasil, Republicanos) and PSB"
leaders:
  - "Luiz Inácio Lula da Silva (President 2023-present, third non-consecutive term)"
  - "Fernando Haddad (Finance Minister 2023-present)"
  - "Simone Tebet (Planning Minister 2023-present)"
  - "Geraldo Alckmin (Vice-President and Industry Minister)"
  - "Roberto Campos Neto (Central Bank Governor, holdover from Bolsonaro until 2024)"
  - "Gabriel Galípolo (Central Bank Governor from 2025)"
doctrine: >
  Return of the Workers' Party (PT) to federal government with a
  structurally different programme from the 2003-2010 tripod era:
  (i) a new fiscal framework (Novo Arcabouço Fiscal, Lei Complementar
  200/2023) replacing the Teto de Gastos (2016 constitutional
  spending cap) with a real-spending growth rule of 0.6%-2.5% per
  year bounded by a primary-balance target band; (ii) a VAT-unification
  tax reform (EC 132/2023) replacing ICMS/ISS/PIS/Cofins/IPI with a
  dual CBS+IBS structure with transition through 2033; (iii) Bolsa
  Família re-expansion from the Bolsonaro-era Auxílio Brasil, with
  higher floors and restored conditionalities; (iv) Nova Indústria
  Brasil (January 2024) — industrial-policy package with BNDES
  concessional credit, green-transition prioritisation, mission-
  oriented targets in health, agro, defence, and semiconductors;
  (v) Mercosur-EU trade deal signed December 2024 after two decades
  of negotiation; (vi) energy transition framing with preserved
  Petrobras role and revived Eletrobras/strategic-sector intervention
  rhetoric. Coalition management differs sharply from 2003-2010:
  PT holds fewer congressional seats, Centrão control of the budget
  via emendas is institutionalised (post-2019 Orçamento Secreto
  legacy), and fiscal credibility contests with financial markets
  produced real-rate tightening 2024-2025. Internal PT economic
  heterogeneity (Haddad market-respecting wing vs Guido Mantega /
  developmentalist wing) is observable in public policy debates.
  Early outcomes: GDP growth ~3% 2023, ~3.4% 2024 (above consensus);
  unemployment at historic lows ~6.2% by late 2024; BCB real rate
  held tight; fiscal-framework credibility disputed with markets
  testing primary-balance trajectory.
policies:
  - brazil_marco_fiscal_lc200_2023
  - brazil_tax_reform_ec132_2023
  - brazil_tax_reform_lc214_2025
  - brazil_bolsa_familia_2_relaunch_2023
  - brazil_pe_de_meia_school_savings_2024
  - brazil_nova_industria_2024
  - brazil_ppcdam_amazon_deforestation_plan_2023
  - brazil_mover_green_mobility_law_2024
  - brazil_sbce_carbon_market_law_2024
  - brazil_fuel_of_future_law_2024
  - brazil_mercosur_eu_trade_deal_2024

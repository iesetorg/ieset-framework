disclosure: >
  Only ~2 years of data at time of spec drafting (2023 and 2024
  complete; 2025 in progress). Pre-registration locks the coding so
  a v1.1 run at later dates is meaningful. Internal PT heterogeneity
  (Haddad vs older-developmentalist wings) is noted; framework codes
  policy content, not intra-party politics.
references:
  - "Lei Complementar 200/2023 (Novo Arcabouço Fiscal)"
  - "Emenda Constitucional 132/2023 (Reforma Tributária)"
  - "Lei Complementar 214/2025 (tax reform implementation)"
  - "Plano Nova Indústria Brasil (Jan 2024)"
  - "Lei 14.818/2024 (Pe-de-Meia)"
  - "Lei 14.993/2024 (Combustivel do Futuro)"
  - "IMF Article IV Brazil 2024"
  - "Banco Central do Brasil Relatório de Inflação 2024"
notes: >
  Analytically distinct from Lula 2003-2010: (a) different fiscal
  architecture — spending cap replaced, not continued tripod; (b)
  different coalition composition — Centrão control of budget emendas
  is structurally new; (c) different external conditions — no
  commodity super-cycle tailwind; (d) industrial policy return is
  materially larger than 2003-2010's BNDES expansion. Separate
  movement record preserves Invariant-3 (content-coding not party-
  label coding) — PT is the same party; policy content differs.

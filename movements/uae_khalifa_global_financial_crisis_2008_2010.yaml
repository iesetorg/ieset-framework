movement_id: uae_khalifa_global_financial_crisis_2008_2010
status: candidate
name: "UAE GFC response and Dubai debt bailout (Khalifa era)"
countries: [ARE]
timeframe:
  start: 2008
  end: 2010
coalition: "Federal monarchy under President Sheikh Khalifa bin Zayed (Abu Dhabi); Dubai ruler Sheikh Mohammed bin Rashid; Abu Dhabi/Dubai emirate-level coordination"
leaders:
  - "Sheikh Khalifa bin Zayed Al Nahyan (President UAE 2004-2022, Emir of Abu Dhabi)"
  - "Sheikh Mohammed bin Rashid Al Maktoum (PM and Ruler of Dubai)"
  - "Sheikh Mohammed bin Zayed (Abu Dhabi Crown Prince)"
  - "Sultan bin Saeed Al Mansouri (Minister of Economy)"
  - "Sultan Nasser Al Suwaidi (CB Governor 1991-2014)"
doctrine: >
  Emirate-level federal-rescue doctrine — when Dubai World's 25 Nov 2009
  debt-standstill request on ~$26bn of obligations threatened a regional
  credit rupture, Abu Dhabi injected $10bn via Central Bank bond purchase
  Feb 2009 and a further $10bn through ADIA-backed channels in Dec 2009,
  with the dirham's AED-USD peg at 3.6725 defended through the shock.
  Economic school: rentier-federal-backstop crisis management with
  conservative monetary defence of the peg; not a doctrinal liberalisation
  or austerity package — a one-off federal rescue of an over-leveraged
  emirate. Left-right: monarchy; economically liberal-offshore in Dubai
  free-zones, state-capitalist in Abu Dhabi SWF architecture. Dated
  policies: Dubai World standstill 25 Nov 2009; Abu Dhabi $10bn bond
  purchase 22 Feb 2009; further $10bn 14 Dec 2009; DIFC regulatory
  tightening 2009-2010; Tamweel/Amlak mortgage-lender merger process.
  Popularity proxies (no elections): no major protest mobilisation, FDI
  resumed modestly from 2011, tourism continued. Coherence: tight — a
  single-purpose federal stabilisation with explicit peg defence and
  explicit cross-emirate transfer — but revealed the fragility of Dubai's
  property-cycle model and locked in Abu Dhabi's senior-creditor position.
policies:
  - ae_abu_dhabi_dubai_bailout_2009
  - ae_aed_peg_defence_2008_2010
  - ae_difc_crisis_regulation_2009
axes_summary:

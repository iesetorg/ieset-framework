  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "DIFC and federal banking supervision tightened post-crisis."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "CB acted at federal-political direction to purchase emirate-level bonds; peg defence maintained."}

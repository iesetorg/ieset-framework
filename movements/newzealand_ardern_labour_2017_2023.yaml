# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: newzealand_ardern_labour_2017_2023
status: candidate
name: "Ardern Labour — progressive transformation + COVID elimination (NZ 2017-2023)"
countries: [NZL]
timeframe: {start: 2017, end: 2023}
coalition: "Labour-NZ First-Greens (2017-2020); Labour majority (2020-2023)"
leaders: ["Jacinda Ardern (PM)", "Grant Robertson (Finance)", "Winston Peters (NZF, 2017-20)", "James Shaw (Greens)"]
doctrine: >
  Progressive-Labour programme styled as "transformational" — framed around
  a wellbeing economics paradigm (Wellbeing Budget 2019 replacing pure-GDP
  fiscal targeting), ambitious social-housing build (KiwiBuild 2017, which
  underdelivered against its 100k-home target), binding net-zero
  legislation (Zero Carbon Act 2019), Child Poverty Reduction Act 2018,
  and a Māori-co-governance turn (Māori Health Authority, Three Waters
  reform). Monetary-policy framework broadened to include employment
  mandate (2018). COVID-19 elimination strategy from March 2020 produced
  one of the OECD's lowest mortality rates but also a sharp fiscal and
  monetary expansion and 2020-23 house-price surge. A proposed capital
  gains tax was ruled out in 2019 under NZ First pressure. Labour won a
  single-party majority in 2020 (65/120 seats, first under MMP). Approval
  collapsed through 2022-23 amid inflation, housing, and crime salience;
  Ardern resigned January 2023. Coherence line: progressive-wellbeing
  framing constrained by coalition veto (no CGT) and reversed wholesale
  by the successor coalition.
policies:
  - nz_zero_carbon_act_2019
  - nz_child_poverty_reduction_act_2018
  - nz_kiwibuild_2017
  - nz_wellbeing_budget_2019
  - nz_covid_elimination_2020
  - nz_three_waters_reform_2022
  - nz_fair_pay_agreements_2022
  - nz_smokefree_generation_2022
  - nz_maori_health_authority_2022
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Zero Carbon Act 2019 binding 2050 net-zero + emissions budgets."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Child poverty package, Working for Families top-ups, COVID wage subsidy."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID fiscal response + Wellbeing Budget expansions."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Fair Pay Agreements 2022 reintroduced sector-wide bargaining."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "RBNZ LSAP and FLP 2020-22 alongside employment-mandate remit."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: weak, rationale: "Three Waters centralised water utility assets."}
position_alignments:
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: opposed}
successor_movements: [newzealand_hipkins_labour_2023, newzealand_luxon_coalition_2023_present]
references:
  - "NZ Treasury Wellbeing Budget documents 2019-2023"
  - "Zero Carbon Amendment Act 2019"

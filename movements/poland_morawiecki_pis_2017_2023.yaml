notes: >
  Coded as distinct movement from Szydło 2015-2017 for clean decomposition
  of the 2015-2023 PiS era into founding and consolidation phases, though
  policy content is continuous. October 2023 Sejm election ended the
  movement — Morawiecki's post-election attempt to form a government
  failed December 2023 and Tusk took office 13 December 2023.

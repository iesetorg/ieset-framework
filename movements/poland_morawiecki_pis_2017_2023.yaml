  - "European Commission — Recovery and Resilience Plan assessment, Poland (June 2022); milestone deadlock 2022-2023"
  - "NBP Inflation Reports 2020-2023; MPC minutes"
  - "13th / 14th pension legislation — Dz.U. 2019 poz. 2474; Dz.U. 2022 poz. 1358"

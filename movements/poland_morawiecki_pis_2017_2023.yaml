movement_id: poland_morawiecki_pis_2017_2023
status: candidate
name: "Morawiecki PiS government — consolidated national-conservative governance (Poland)"
countries: [POL]
timeframe: {start: 2017, end: 2023, enacted_date: "2017-12-11"}
coalition: "Zjednoczona Prawica (United Right) — PiS with Solidarna Polska (Ziobro) and Porozumienie (Gowin, until 2021); renewed Sejm majority 2019 with 235 seats (43.6% vote); reduced to 194 seats in Oct 2023 losing governing majority"
leaders:
  - "Mateusz Morawiecki (Prime Minister, 2017-2023)"
  - "Jarosław Kaczyński (PiS chairman; Deputy PM 2020-2022 for security portfolio)"
  - "Andrzej Duda (President, re-elected July 2020, 51.0% second round)"
  - "Zbigniew Ziobro (Justice Minister + Prosecutor-General; judicial reform lead)"
  - "Adam Glapiński (NBP Governor from 2016, reappointed 2022)"
  - "Tadeusz Kościński / Magdalena Rzeczkowska (Finance Ministers sequentially)"
doctrine: >
  Consolidation and escalation phase of the national-conservative
  redistributive-populist programme inaugurated under Szydło. Economic
  school: state-capitalist interventionism with expanded household
  transfers, active industrial policy (particularly energy, defence,
  repolonisation of banking), loose fiscal-monetary mix during 2020-22,
  and culturally-right institutional restructuring — economically
  interventionist-left on transfer and state-footprint axes while
  culturally right on family, migration, and judicial posture. Content:
  (i) 13th pension enacted 2019, 14th pension made permanent 2022 —
  extending transfer footprint into retirees; (ii) Polski Ład (New
  Order) tax reform January 2022 raising the PIT-free threshold to
  30,000 zł, lowering first-bracket rate from 17% to 12%, and
  restructuring health-insurance contributions — chaotic rollout forced
  mid-year corrections July 2022; (iii) escalating judicial reforms —
  Supreme Court retirement law 2017, National Council of the Judiciary
  restructure 2018, Disciplinary Chamber established then contested,
  2019 'muzzle law', culminating in multiple CJEU rulings and ~360bn
  euro of RRF funds frozen until rule-of-law milestones met;
  (iv) energy policy sustaining coal-mining subsidies (PPW Program
  2021-2030), nuclear-plant plans, partial LNG pivot, with gas-storage
  buildout after 2022 invasion of Ukraine; (v) COVID-era anti-crisis
  shields (Tarcza Antykryzysowa) 2020-21 — large discretionary fiscal
  response; (vi) NBP rate-cut cycle to 0.10% in May 2020 followed by
  hiking cycle to 6.75% by September 2022 as inflation peaked at 18.4%
  February 2023; (vii) front-line role in Ukraine response from
  February 2022, defence spending legislated at 3% then 4% of GDP.
  Popularity: 43.6% vote share 2019 Sejm with renewed majority;
  presidential re-election July 2020; EP elections 2019 won with 45.4%;
  local-government elections 2018 mixed (PiS strongest in villages,
  opposition in big cities); Sejm lost October 2023 despite being
  largest single party (35.4%) — opposition parties combined for
  workable majority. Coherence judgement: internally coherent doctrine
  executed at scale, but institutional conflict with EU and persistent
  high inflation through 2022-23 eroded the urban-educated share of the
  coalition enough to lose government.
policies:
  - pl_500_plus_child_benefit_2016
  - pl_13th_14th_pension_2019_2022
  - pl_polski_lad_tax_reform_2022
  - pl_judicial_reforms_supreme_court_krs_2017_2020
  - pl_coal_energy_transition_stance_2017_2023
  - pl_nbp_rate_cycle_2020_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "13th/14th pensions + continued 500+ + 2024 800+ announcement; transfer share stepped up further from Szydło baseline."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID shields, defence spending legislated at 3%→4% of GDP, energy subsidy envelope; general government spending rose to ~47% of GDP by 2023."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Polski Ład raised PIT-free threshold to 30k zł and cut first-bracket rate 17%→12%; net effect progressive at low incomes."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "Repolonisation of banking (Pekao, PKP Cargo stakes), state-champion energy mergers (Orlen-Lotos-PGNiG 2022), continued sector gating."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Baltic Pipe commissioning 2022, Świnoujście LNG expansion, nuclear programme initiation, gas-storage buildout; supply-security posture strengthened, especially post-Feb 2022."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: weak, rationale: "Coal-subsidy extension and delayed mine closures; partially offset by EU-ETS exposure. Net weak negative vs EU baseline."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Glapiński reappointment 2022 controversial; alignment with government fiscal stance during 2020 cuts criticised by former MPC members; formal independence intact, de facto reduced."}
  - {axis: monetary.monetary_expansion_direction, direction: mixed, magnitude: moderate, rationale: "Strong expansionary 2020-21 (rates to 0.10%, QE), strong contractionary 2021-22 (hikes to 6.75%); net-mixed over movement period."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Supreme Court retirement law 2017, KRS restructure 2018, Disciplinary Chamber, muzzle law 2019; CJEU infringement judgments 2019-2023; RRF funds frozen on rule-of-law grounds."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "EU Article 7 procedure active throughout; WJP Rule of Law Index scores declined 2017-2023."}
outcome_hypotheses:
  - welfare_expansion_sustainable_under_growth
  - eu_conditionality_disciplines_backsliding
  - judicial_capture_reduces_fdi
position_alignments:

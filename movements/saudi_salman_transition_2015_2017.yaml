# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: saudi_salman_transition_2015_2017
status: candidate
name: "Salman accession and MBS rise 2015-2017"
countries: [SAU]
timeframe: {start: 2015, end: 2017}
coalition: "Al Saud monarchy; transition from Abdullah to Salman faction; Mohammed bin Nayef then MBS as Crown Prince"
leaders:
  - "King Salman bin Abdulaziz (accession Jan 23 2015)"
  - "Mohammed bin Nayef (Crown Prince Apr 2015 – Jun 2017)"
  - "Mohammed bin Salman (Defence Minister Jan 2015; Deputy CP Apr 2015; Crown Prince Jun 21 2017)"
  - "Mohammed Al-Jadaan (Finance Minister from Nov 2016)"
doctrine: >
  Transitional two-and-a-half-year period bridging Abdullah's cautious
  welfare-monarchy and the full MBS consolidation. Economic school:
  early-Salman security consolidation plus Vision announcement —
  orthodox fiscal adjustment to the 2014-2016 oil-price collapse (draw
  on ~$250bn of FX reserves, first sovereign USD Eurobond Oct 2016,
  austerity round of public-sector allowance cuts Sep 2016 later
  partially reversed Apr 2017), combined with the Apr 2016 unveiling of
  Vision 2030 and the Jun 2016 National Transformation Programme as a
  forward-looking diversification doctrine. Foreign policy pivot toward
  assertive security posture: Operation Decisive Storm launched Mar 26
  2015 with MBS as Defence Minister; deepened Sunni-coalition framing
  against Iran. Political economy: replacement of Crown Prince Muqrin
  (Apr 2015) and later Mohammed bin Nayef (Jun 2017) completed
  succession-line concentration onto Salman's direct descendants.
  Left-right: absolute monarchy, conservative-nationalist on
  identity/security and early-reformist on economic diversification;
  cautious social reform (women in Shura Council 2013 already in place;
  no driving-ban lift yet). Popularity proxies (no elections): fiscal
  buffer drawn ~$250bn; sovereign borrowing re-initiated; protest
  incidence low; no survey data specifically segmented to this sub-era.
  Coherence: transitional — incoherent on some axes (Vision 2030
  announced while Yemen war ramping defence spending) but unified under
  the emerging MBS chain of command.
policies:
  - sa_yemen_war_intervention_2015
  - sa_vision_2030_launch_2016
  - sa_nitaqat_saudisation_2011
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence spending jump from Yemen war sustained elevated spending share even as non-defence austerity began."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Vision 2030 committed PIF-led industrial programme; early subsidy reform cut in the opposite direction."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Continued Nitaqat tightening; female-employment liberalisation not yet enacted."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: weak, rationale: "Succession reshuffles and centralisation on Salman line laid the ground for later Ritz-Carlton episode."}
outcome_hypotheses: [resource_diversification_programme_effectiveness]
successor_movements: [saudi_mbs_cp_era_2017_present, saudi_vision_2030_2016_present]
predecessor_movements: [saudi_abdullah_late_era_2005_2015]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Vision 2030 launch is a developmentalist programme ex ante."}
references:
  - "Royal Orders January 2015 (accession), April 2015 (MBN CP, MBS DCP), June 2017 (MBS CP)"
  - "IMF Article IV Saudi Arabia 2016"
notes: "Short transitional movement; overlaps Vision 2030 origin and MBS-era seeds."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: latvia_karins_silina_security_state_2022_present
status: candidate
name: "Latvia Karins-Silina security and resilience state 2022-present"
countries: [LVA]
timeframe: {start: 2022, end: ongoing}
coalition: "New Unity-led governments under Krisjanis Karins and Evika Silina"
leaders:
  - "Krisjanis Karins (Prime Minister, 2019-2023)"
  - "Evika Silina (Prime Minister, 2023-present)"
doctrine: >
  Latvia's current policy cycle is organised around security resilience after
  the Ukraine shock, energy-price protection, and EU-aligned rights and safety
  commitments. The government reintroduced state defence service, used temporary
  fiscal support to cushion energy-price spikes while diversifying away from
  Russian energy dependence, and ratified the Istanbul Convention to strengthen
  domestic-violence prevention and victim protection.
policies:
  - lv_energy_price_support_law_2022
  - lv_state_defence_service_2023
  - lv_istanbul_convention_ratification_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Energy compensation, defence-service buildout, and Istanbul Convention implementation add public spending."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "State defence service constrains covered cohorts during service periods."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: weak, rationale: "Energy-shock measures were paired with diversification away from Russian supply exposure."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Statutory defence-service rules and Istanbul Convention obligations strengthen predictable state obligations."}
references:
  - "Latvian Ministry of Defence, National Defence Service: https://www.mod.gov.lv/en/national-defence-service"
  - "Council of Europe Treaty Office materials on Latvia and the Istanbul Convention."

notes: >
  Case study in the distance between stated doctrine (Perú Libre
  ideario) and enacted content under coalition and institutional
  constraints. Relevant to hypotheses about left-populist
  programme attenuation in office. Castillo post-impeachment
  faces ongoing criminal trial for rebellion.

movement_id: peru_castillo_peru_libre_2021_2022
status: candidate
name: "Castillo — Perú Libre rural-left government (Peru)"
countries: [PER]
timeframe:
  start: 2021
  end: 2022
  enacted_date: "2021-07-28"
coalition: "Perú Libre (Vladimir Cerrón's Marxist-Leninist rural-left party) — nominal legislative base of 37/130 seats — with fragmented support from Juntos por el Perú and conditional Acción Popular / Alianza para el Progreso votes. Castillo broke with Cerrón early; five successive cabinets reflected collapsing coalition coherence."
leaders:
  - "Pedro Castillo (President 2021-2022)"
  - "Pedro Francke (Economy Minister 2021-2022, heterodox-keynesian)"
  - "Óscar Graham (Economy Minister 2022, caretaker)"
  - "Kurt Burneo (Economy Minister 2022)"
  - "Guido Bellido (Prime Minister 2021, Perú Libre hardliner)"
  - "Mirtha Vásquez / Aníbal Torres / Betssy Chávez (later Prime Ministers)"
doctrine: >
  Rural-left Marxist-Leninist Perú Libre programme on paper
  (Ideario y Programa — nationalisation of strategic sectors,
  constituent assembly to replace the 1993 Fujimori Constitution,
  gas pricing for domestic use, mining windfall taxation) versus
  pragmatic moderation once in office. Castillo, a rural primary-
  school teacher and Sutep union leader elected narrowly over
  Keiko Fujimori in the June 2021 runoff, ran on "no more poor
  people in a rich country" redistribution and regional
  devolution. Once installed, Finance Minister Pedro Francke
  preserved BCRP independence, the open capital account, and the
  fiscal-rule framework; no nationalisations executed; no
  constituent-assembly bill passed Congress. The failed
  constitutional process — repeatedly rejected by a hostile
  right-dominated Congress — became the defining political
  impasse. Governing chaos: five prime ministers, ~80 minister
  rotations in 17 months, multiple corruption investigations
  (Bruno Pacheco, Karelim López, Juan Silva). On Dec 7 2022,
  hours before a third impeachment vote, Castillo delivered a
  televised message dissolving Congress, declaring a "government
  of exception," and ordering judicial reorganisation — an
  attempted self-coup that failed within hours as security
  forces refused to comply, the cabinet resigned en masse, and
  Congress impeached and detained him the same day. IESET
  codes the Castillo period as high-doctrinal-intent, low-
  execution: rhetorical left programme, minimal enacted market-
  content movement, acute institutional-process failure
  culminating in the autogolpe attempt.
policies:
  - pe_castillo_constituent_assembly_process_2021_2022
  - pe_mining_tax_regime_proposal_2021_2022
  - pe_castillo_autogolpe_dec_2022
  - pe_afp_sixth_withdrawal_2022
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "Rhetorical nationalisation intent not enacted; sectoral licensing regime unchanged in substance."}
  - {axis: fiscal.tax_corporate, direction: "0", magnitude: weak, rationale: "Proposed mining windfall taxes did not pass Congress; effective corporate tax burden unchanged."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Sixth AFP withdrawal (May 2022) and targeted rural subsidies; modest cash-transfer expansion under FISE / Pensión 65."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BCRP autonomy preserved; Velarde reappointed. Policy intent was mixed but execution null."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Corruption probes against inner circle; Dec 7 2022 attempted dissolution of Congress was an extra-constitutional act."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Attempted reorganisation of Fiscalía and judiciary in the Dec 7 message; executive pressure on prosecutors throughout."}
outcome_hypotheses:

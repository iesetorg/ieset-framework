  - {position_id: ordoliberal, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: opposed}
references:
  - "Tidoavtalet — Overenskommelse för Sverige (14 October 2022)"
  - "Prop. 2022/23:1 — Budgetproposition"
  - "NATO Accession Protocol for Sweden, ratified March 2024"
  - "SOU 2023:24 — Nuclear new-build framework"
  - "Klimatpolitiska rådet årsrapport 2024"
  - "Migrationsverket statistik 2023-2024; Prop. 2023/24:41 labour-migration threshold"
notes: >
  First Swedish government where SD is a formally documented supporting
  party via the Tidö Agreement — a structural break in post-war Swedish
  coalition practice. Popularity: 2022 Riksdag result gave the four-party
  bloc 176/349 seats (M 68, SD 73, KD 19, L 16); SD became second-largest
  party. Novus/Demoskop polling through 2024-25 shows SAP leading but the
  bloc competitive; EU 2024 elections returned SD at ~13% (below Riksdag
  share) and M at ~17%, with Greens and S gaining. Coherence judgement:
  coherent on economic-liberal + energy-security + defence content;
  internally strained on L vs SD axis — the liberal party's base
  repeatedly challenges Tidö cooperation, a latent fracture point.

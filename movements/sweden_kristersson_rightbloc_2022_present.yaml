movement_id: sweden_kristersson_rightbloc_2022_present
status: candidate
name: "Kristersson centre-right bloc with Sweden Democrats (Tidö agreement)"
countries: [SWE]
timeframe: {start: 2022, end: ongoing, enacted_date: "2022-10-18"}
coalition: "Moderaterna (M) + Kristdemokraterna (KD) + Liberalerna (L) minority cabinet with Sweden Democrats (SD) parliamentary support via the Tidö Agreement"
leaders:
  - "Ulf Kristersson (Prime Minister, 2022-)"
  - "Elisabeth Svantesson (Finance Minister, M)"
  - "Ebba Busch (Energy/Industry Minister, KD)"
  - "Johan Pehrson (L leader)"
  - "Jimmie Akesson (SD leader, Tidö support party)"
doctrine: >
  Liberal-conservative fiscal-orthodox alliance on a centre-right to right
  axis, reshaped by the Tidö Agreement (October 2022) in which the Sweden
  Democrats exchanged confidence-and-supply for co-determined policy on
  migration, crime, and energy. Economic content: (i) conventional
  fiscal-framework discipline (overskottsmal / surplus target, retained
  fiscal rules) combined with supply-side tax cuts — värnskatt abolition
  had already landed 2020 but the coalition continued lowering income tax
  on work, raised ROT/RUT household-services deduction ceilings, and cut
  fuel/diesel excise (reduktionsplikt rollback 2024); (ii) restrictive
  migration turn — labour-migration salary threshold raised to median wage
  November 2023, tightened asylum, return-migration incentive schemes; (iii)
  law-and-order expansion — visitation zones, expanded wiretap and
  anonymous-witness legislation, prison capacity buildout; (iv) energy
  re-pivot — explicit nuclear new-build mandate, credit-guarantee scheme
  for SMR and large reactors (Finansieringsmodell 2024), roll-back of
  pre-2022 phase-out posture, electricity-price crisis support
  (elprisstöd) autumn 2022 and 2023; (v) NATO accession secured (joined
  March 7 2024) and historic defence-budget ramp to 2% of GDP met 2024,
  trajectory to 2.6% announced 2024. Proponents frame the package as
  restoring order, energy adequacy, and fiscal credibility; critics frame
  it as the first formal mainstreaming of SD influence and a partial break
  with Swedish consensus liberalism on migration and civil-liberties.
policies:
  - se_tido_agreement_2022
  - se_nato_accession_2024
  - se_electricity_price_support_2022
  - se_labour_migration_salary_threshold_2023
  - se_nuclear_new_build_framework_2023
  - se_reduktionsplikt_rollback_2024
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Continued work-tax cuts, raised RUT/ROT ceilings, no reversal of 2020 värnskatt abolition."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence ramp to 2% GDP 2024 with announced trajectory to 2.6%; electricity-price support packages 2022-23."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Labour-migration salary threshold raised to median wage Nov 2023; tightened asylum and family reunification; return-incentive programme."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: strong, rationale: "Explicit new-build nuclear mandate, credit guarantees for reactors, reduktionsplikt biofuel mandate cut back."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: moderate, rationale: "Biofuel blending mandate cut January 2024; climate plan 2023 criticised by Klimatpolitiska rådet as insufficient for 2030 target."}
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: weak, rationale: "Expanded police/surveillance powers framed as strengthening order; critics note civil-liberties erosion on anonymous witnesses and visitation zones."}
outcome_hypotheses:
  - nordic_outcome_persistence_decomposition_v3
position_alignments:

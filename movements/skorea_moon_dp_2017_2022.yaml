position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Wage-led growth is a post-Keynesian / Kaleckian trope; empirical payoff was contested."}
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: opposed}
references:
  - "Minimum Wage Act revisions, Minimum Wage Commission determinations 2018, 2019"
  - "Labour Standards Act amendment — 52-hour work week (2018, Act No. 15513)"
  - "Housing Lease Protection Act revision July 2020 (2+2 year + 5% cap)"
  - "Comprehensive Real Estate Holding Tax Act (Jongbuse) successive amendments 2018-2020"
  - "Panmunjom Declaration 27 April 2018; Pyongyang Joint Declaration 19 September 2018"
  - "Korean New Deal Plan, 14 July 2020 (MOEF + MOTIE)"
  - "OECD Economic Surveys: Korea 2018, 2020"
notes: >
  Approval trajectory: entered at ~84% post-impeachment of Park; sustained
  60%+ through 2018 summit diplomacy; declined to ~40s by late 2020 on
  property-price anger and Cho Kuk scandal; ended ~42% at handover.
  April 2020 legislative supermajority (180/300) enabled the second
  half of the minimum-wage / property / prosecutor-reform agenda even
  as executive approval fell.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: skorea_moon_dp_2017_2022
status: candidate
name: "Moon Jae-in income-led growth government (South Korea)"
countries: [KOR]
timeframe:
  start: 2017
  end: 2022
  enacted_date: "2017-05-10"
coalition: "Democratic Party of Korea (Deobureo Minjudang) — won April 2020 legislative supermajority (180/300 seats) with allied Platform Party"
leaders:
  - "Moon Jae-in (President 2017-2022)"
  - "Kim Dong-yeon (Finance Minister 2017-2018)"
  - "Hong Nam-ki (Finance Minister 2018-2022)"
  - "Jang Ha-sung (Policy Chief of Staff, architect of income-led growth)"
doctrine: >
  Centre-left Democratic Party government elected after the impeachment
  of Park Geun-hye, organised around a self-described "income-led growth"
  (소득주도성장) doctrine that aimed to shift the Korean macro model from
  chaebol-led export primacy toward wage-led domestic demand. Core content:
  (i) rapid statutory minimum-wage escalation (16.4% increase January 2018
  to KRW 7,530, followed by 10.9% January 2019 to KRW 8,350 — the two
  largest consecutive annual hikes in Korean history, before a deliberate
  pullback to ~2-3% in 2020-2022 after SME backlash); (ii) 52-hour maximum
  work-week phased from July 2018 for firms with 300+ employees, extended
  to smaller firms through 2021; (iii) public-sector hiring expansion
  targeting 810,000 additional public jobs over the term; (iv) property-
  market tightening across 20+ packages (comprehensive capital-gains tax,
  acquisition-tax surcharges on multi-home owners, loan-to-value caps for
  Seoul, and the July 2020 lease-law revision extending tenancy to four
  years and capping renewal rent increases at 5%) which coincided with a
  ~90% Seoul apartment-price surge 2017-2021; (v) inter-Korean engagement
  — three Moon-Kim summits 2018, Panmunjom Declaration, Pyongyang
  Declaration, which stalled after the 2019 Hanoi summit breakdown; (vi)
  nuclear phase-out posture (stopped Shin Kori 5/6 suspension referendum
  in 2017 ultimately resumed construction; legislated no new plants and
  life-extension rejections) paired with renewable expansion and the 2050
  carbon-neutrality pledge; (vii) COVID-19 response — disaster relief
  cash transfers, Korean New Deal (KRW 160 trillion) announced 2020.
  Proponents frame the package as a correction of chaebol-skewed growth
  and social-safety-net catch-up; critics frame it as wage-cost shock to
  SMEs, property-price fuel, and nuclear policy incoherence.
policies:
  - kr_minimum_wage_hikes_2018_2019
  - kr_52_hour_work_week_2018
  - kr_property_tightening_packages_2017_2021
  - kr_nuclear_phaseout_posture_2017_2022
  - kr_inter_korean_engagement_2018_2019
  - kr_korean_new_deal_covid_2020
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Minimum-wage escalation 29% cumulative 2018-2019; 52-hour cap restricts overtime; public-sector hiring formalisation."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Youth allowance, child allowance introduced 2018, basic pension expansion, COVID cash transfers."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "General government spending share rose from ~32% to ~37% of GDP; Korean New Deal programme."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "Multi-home capital-gains surcharges, comprehensive real-estate tax (Jongbuse) expansion, acquisition-tax surcharges."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "2050 carbon-neutrality pledge, renewable portfolio standard, emissions trading scheme tightening."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: moderate, rationale: "Nuclear phase-out posture — cancelled new-build plans and shortened operating licences, partially reversed later."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: weak, rationale: "2019-2021 prosecution-service reform (Gongsucheo / CIO) + confrontation with Prosecutor-General Yoon Suk-yeol; contested."}
outcome_hypotheses:
  - skorea_income_led_growth_wage_employment_tradeoff
  - skorea_property_price_response_to_demand_side_tightening
predecessor_movements:
  - park_chung_hee_industrial_policy_1961_1979
successor_movements:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: angola_lourenco_mpla_2017_present
status: candidate
name: "Lourenco MPLA reform and oil-stabilisation government 2017-present"
countries: [AGO]
timeframe: {start: 2017, end: ongoing, enacted_date: "2017-09-26"}
coalition: "MPLA"
leaders:
  - "Joao Lourenco (President, MPLA, September 2017-)"
  - "Vera Daves de Sousa (Finance Minister, 2019-)"
  - "Jose de Lima Massano (BNA Governor 2017-2023; Minister of State for Economic Coordination 2023-)"
  - "Manuel Tiago Dias (BNA Governor, 2023-)"
doctrine: >
  Lourenco's government kept MPLA dominance but shifted economic management away
  from the late dos Santos oil-rent model toward IMF-supported stabilisation,
  exchange-rate adjustment, selective privatisation, and renewed upstream oil
  incentives. The programme combines fiscal consolidation and fuel-subsidy
  reduction with state-led resource-sector development and anti-corruption
  rhetoric directed at legacy patronage networks.
policies:
  - ao_exchange_rate_liberalisation_2018_2023
  - ao_fuel_subsidy_phaseout_2023
  - ao_oil_gas_incremental_production_decree_2024
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "BNA exchange-rate and monetary reforms reduced direct exchange-rate suppression and fiscal dominance pressures."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Fuel-subsidy phase-out reduces broad petroleum price support, partly offset by targeted oil-production incentives."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Incremental oil and gas production incentives seek to slow field decline and preserve export-energy capacity."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "More flexible FX allocation and external-sector normalisation reduce import and investor frictions."}
predecessor_movements: [angola_mpla_socialist_oil_state_1975_1991]
references:
  - "IMF, Angola: 2024 Article IV Consultation, Country Report No. 25/61."
  - "Banco Nacional de Angola exchange-rate and monetary-policy communications, 2018-2023."
  - "Government of Angola fuel-price reform announcements, June 2023."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: germany_merz_2025_present
status: candidate
name: "Merz CDU/CSU-SPD grand coalition 2025-present"
countries: [DEU]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-05-06"}
coalition: "CDU/CSU-SPD Grand Coalition (GroKo)"
leaders:
  - "Friedrich Merz (Chancellor, CDU)"
  - "Lars Klingbeil (Vice-Chancellor + Finance Minister, SPD)"
  - "Katherina Reiche (Economy Minister, CDU)"
  - "Boris Pistorius (Defence Minister, SPD — held over from Ampel)"
doctrine: >
  Return to ordoliberal Christian-democratic mainstream under a CDU leader
  explicitly positioned to Merkel's right on economic and migration policy,
  governing with an SPD junior partner that accepted a historic debt-brake
  relaxation as the price of coalition. The doctrine fuses supply-side
  corporate-tax reduction (Investitionsbooster Körperschaftsteuer cut path
  to 10% corporate + 15% solidarity-surcharge-inclusive by 2032), Bürgergeld
  tightening back toward stricter activation, migration-control
  prioritisation (permanent internal-border checks extended, accelerated
  deportation framework), and — simultaneously — a €500bn Sondervermögen
  Infrastruktur und Klimaneutralität (constitutional amendment passed by
  the outgoing Bundestag 18 March 2025 with Green support) plus an
  effectively unlimited defence-spending carve-out from the debt brake for
  Bundeswehr and NATO-eligible outlays above 1% of GDP. The governing
  arithmetic was forced by the AfD reaching 20.8% in the February 2025
  election, which foreclosed a CDU-FDP or CDU-Green majority and made
  SPD the only available partner. Merz's signature doctrinal claim: that
  Germany's growth stagnation 2022-2024 is supply-side (energy, regulation,
  demography, capex deferral) rather than demand-side, requiring corporate
  relief, infrastructure catch-up, and labour-market re-tightening, and
  that the era of Schwarze Null was an investment mistake rather than a
  fiscal virtue. Coherence judgement: internally tensioned between
  supply-side tax-cutting and SPD-bargained transfer preservation, with
  credibility resting on whether the €500bn Sondervermögen reaches
  productive capex rather than current consumption — too early to
  evaluate (coded ~5 months into tenure).
policies:
  - de_sondervermoegen_infrastruktur_500bn_2025
  - de_schuldenbremse_reform_verteidigung_2025
  - de_koerperschaftsteuer_investitionsbooster_2025
  - de_buergergeld_verschaerfung_2025
  - de_grenzkontrollen_migrationswende_2025
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "€500bn infrastructure Sondervermögen over 12 years + uncapped defence above 1% GDP; decisively breaks Schwarze Null era."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: strong, rationale: "Corporate-tax phased cut (Körperschaftsteuer 15% → 10% by 2032) + accelerated depreciation (Investitionsbooster) for 2025-27 investments."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Bürgergeld sanctions restored and partial baseline rollback; partially offset by SPD-demanded Kindergeld preservation."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Reversal of Ampel Bürgergeld sanctions-relaxation; Aktivrente model for working pensioners."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Permanent internal-border checks, accelerated deportation framework, tightened family reunification for subsidiary-protected."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Continued LNG buildout + new gas-fired backup capacity tenders; nuclear reversal floated but not legislated."}
  - {axis: fiscal.sectoral_subsidy, direction: "0", magnitude: weak, rationale: "Industrial electricity price cap proposed but scoped down; chip-subsidy continuity but no new major packages in first months."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Brandmauer-controversy Jan 2025 (AfD tactical coordination on migration vote) raised norms questions but no institutional change."}
outcome_hypotheses:
  - debt_brake_growth_underinvestment_tradeoff
  - corporate_tax_cut_investment_elasticity
  - german_export_model_sustainability
predecessor_movements: [germany_scholz_ampel_2021_2025]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "CDU/CSU's Sozialmarktwirtschaft DNA — rules-based fiscal architecture (debt-brake constitutional core retained even with Sondervermögen carve-outs), independent Bundesbank/ECB tradition, market-conforming social policy. Merz personally is the most ordoliberal CDU leader since Erhard."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Bürgergeld tightening, supply-side corporate-tax direction, immigration restriction framed as labour-market disciplining, anti-Industriepolitik scepticism — classical-liberal lean within the Sozialmarktwirtschaft frame."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Supply-side diagnosis of stagnation + €500bn debt-financed capex Sondervermögen is evidence-weighted — but secondary to the ordoliberal identity."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "SPD junior in coalition: accepts infrastructure Sondervermögen and defence spending, defends Mindestlohn ratchet and Mütterrente; contests Bürgergeld-tightening and migration restriction."}
  - {position_id: ecological, alignment: opposed, notes: "Heating-Act rollback, combustion-engine pivot, anti-Wärmepumpe-mandate posture; Green support for the constitutional amendment was transactional climate earmark only."}
references:
  - "Koalitionsvertrag CDU/CSU-SPD 'Verantwortung für Deutschland' (2025)"
  - "Grundgesetzänderung Art. 109, 115 + Art. 143h (Sondervermögen Infrastruktur + Verteidigungs-Ausnahme, 18 March 2025)"
  - "Bundestagswahl 2025 amtliches Endergebnis (Bundeswahlleiterin)"
  - "Jahresgutachten 2024/25 Sachverständigenrat (supply-side diagnosis)"
notes: >
  Bundestag seat share at formation (Feb 2025 election): CDU/CSU 28.5%
  (208 seats), SPD 16.4% (120) — total 328/630 = 52.1%, thinnest governing
  majority of any post-war grand coalition. Approval trajectory: Merz
  personal approval entered office at ~40%, softened to mid-30s by
  summer 2025 amid Brandmauer controversy and Sondervermögen debate;
  coalition satisfaction in Politbarometer ~42% late 2025. State-election
  shifts: North Rhine-Westphalia and Rheinland-Pfalz Landtag polls show
  AfD approaching 20% in western Länder; BSW consolidation uncertain;
  Linke revival post-2025 at 8.8% complicates left-flank dynamics.
  AfD 20.8% second-place in Feb 2025 is the defining political constraint
  shaping coalition options. Coded as ongoing; revisit 2026 after first
  full fiscal year.

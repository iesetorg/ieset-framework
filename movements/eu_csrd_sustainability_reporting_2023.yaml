# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eu_csrd_sustainability_reporting_2023
status: candidate
name: "EU Corporate Sustainability Reporting Directive and due-diligence stack"
scope: supranational
countries: [DEU, FRA, ITA, ESP, NLD, BEL, POL, SWE, IRL, AUT]
timeframe: {start: 2021, end: ongoing, enacted_date: "2022-12-14"}
coalition: "European Commission + Parliament + Council"
leaders: ["Mairead McGuinness (Financial Services Commissioner)", "Didier Reynders (Justice Commissioner)"]
doctrine: >
  Overhaul of EU non-financial reporting. CSRD (Directive 2022/2464,
  in force 5 January 2023) replaces the 2014 NFRD, extending mandatory
  sustainability reporting to ~50,000 firms (from ~11,700) under the
  European Sustainability Reporting Standards (ESRS) drafted by EFRAG
  and adopted by delegated act in July 2023. Double-materiality
  principle: disclosure of both financial-material and impact-material
  sustainability information. Companion instruments: Taxonomy Regulation
  2020/852 (green-activity classification), SFDR 2019/2088 (financial-
  product disclosure), CSDDD / CS3D (Corporate Sustainability Due
  Diligence Directive, adopted 2024, covering value-chain human-rights
  and environmental duties). The Commission's February 2025 Omnibus
  Simplification proposal scaled back CSRD scope and CSDDD thresholds
  in response to competitiveness concerns (Draghi and Letta reports);
  the movement is coded through the original enacted stack with the
  2025 retrenchment noted.
policies: [eu_csrd_2023, eu_taxonomy_regulation_2020, eu_sfdr_2019, eu_csddd_2024, eu_omnibus_simplification_2025]
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Disclosure is not a command-and-control instrument but sets a de facto stringency floor through capital-market and procurement channels."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Assurance requirement and ESRS compliance architecture function as a reporting-licensing regime across covered firms."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Fixed compliance cost (EFRAG estimate 150-500k first-year per firm; Commission Impact Assessment higher for mid-caps) disproportionate for smaller firms and non-EU subsidiaries."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Third-country parent coverage and CSDDD value-chain duties impose extraterritorial compliance requirements on non-EU suppliers."}
outcome_hypotheses: [csrd_compliance_cost_mid_cap, eu_competitiveness_reporting_drag]
position_alignments:
  - {position_id: eco_socialist, alignment: aligned}
  - {position_id: ordoliberal, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "Directive (EU) 2022/2464 (CSRD)"
  - "Commission Delegated Regulation (EU) 2023/2772 (ESRS Set 1)"
  - "Directive (EU) 2024/1760 (CSDDD / CS3D)"
  - "Commission Omnibus Simplification Package, 26 February 2025"
  - "Draghi Report (September 2024); Letta Report (April 2024)"
notes: >
  The 2025 Omnibus scale-back is itself framework-relevant: it is an
  explicit revealed-preference admission that the original compliance
  perimeter imposed disproportionate costs on mid-cap firms. Coding
  the movement requires both truths.

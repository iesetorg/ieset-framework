# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mexico_sheinbaum_morena_2024_present
status: candidate
name: "Sheinbaum Morena continuity + judicial-reform consolidation"
countries: [MEX]
timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-10-01"
coalition: "Sigamos Haciendo Historia — Morena + PT + PVEM — with qualified supermajority in the Cámara de Diputados and working supermajority in the Senado"
leaders:
  - "Claudia Sheinbaum Pardo (President from 1 October 2024)"
  - "Rogelio Ramírez de la O (Finance Minister, continuing from AMLO)"
  - "Edgar Amador Zamora (Finance Minister from 2025)"
  - "Marcelo Ebrard (Economy Minister / USMCA review)"
  - "Luz Elena González (Energy Minister from 2024)"
  - "Victoria Rodríguez Ceja (Banxico Governor)"
  - "Ernestina Godoy (Fiscalía General / Consejería Jurídica)"
doctrine: >
  Continuity heterodox-populist Morena government following AMLO, with
  Sheinbaum adding a technocratic-scientific framing (she is a former
  energy engineer and Mexico City head of government). Economic school:
  AMLO-continuation — fiscal austerity rhetoric, social-transfer
  programmes preserved and expanded, state primacy in energy, but with
  more orthodox communication to markets and a personal willingness
  to speak to private investors that AMLO avoided. Sits on the centre-
  left on the economic axis with a pronounced statist tilt on
  institutional variables. The signature event of the first months was
  the judicial reform package passed between 4-15 September 2024 (by
  the outgoing legislature, enacted the day before Sheinbaum's
  inauguration and carried forward as the governing programme):
  constitutional amendment making all federal judges — including the
  Ministers of the Suprema Corte — subject to popular election, with
  the first extraordinary election held 1 June 2025 renewing the
  Supreme Court and a large share of the federal bench; reduction of
  the SCJN from 11 to 9 Ministers; creation of a Tribunal de
  Disciplina Judicial. Companion constitutional changes passed Oct-Dec
  2024: (i) abolition of seven autonomous bodies including INAI
  (transparency), Cofece (competition), IFT (telecoms regulator), CRE
  (energy regulator) — their functions absorbed by line ministries;
  (ii) elevation of the National Guard to armed-forces control
  (constitutional); (iii) constitutionalisation of social programmes
  (pensions, scholarships) to restrict future reversal. Fiscal / energy
  continuity: Plan México industrial strategy launched Jan 2025 with
  nearshoring framing; Pemex financial support continued; CFE-priority
  dispatch preserved; minimum wage pathway continued; universal pension
  indexed. Popularity: Sheinbaum won 2 June 2024 with 59.75% of valid
  votes (~35.9m votes, widest margin in modern Mexican history);
  Morena+PT+PVEM took ~364 of 500 Cámara seats (qualified
  supermajority) and 83 of 128 Senate seats (working super-majority
  with a single additional vote); Sheinbaum approval has held 65-80%
  across 2024-2025 per most trackers, briefly rising after her
  measured public handling of the Trump-era tariff threats and USMCA
  review preparations. Coherence line: the economic-content direction
  is continuity with AMLO (state primacy in energy, social-transfer
  expansion, fiscal orthodoxy on aggregates), while the institutional
  direction is materially more interventionist — the judicial and
  autonomous-bodies reforms structurally reshape Mexican separation
  of powers in ways AMLO advocated but could not pass without the
  2024 supermajority. Framework implication: scoring institutional.
  judicial_independence and institutional.rule_of_law strongly negative
  is load-bearing for this movement.
policies:
  - mx_judicial_reform_2024
  - mx_autonomous_bodies_abolition_2024
  - mx_national_guard_sedena_2024
  - mx_supreme_court_election_2025
  - mx_plan_mexico_2025
  - mx_universal_pension_2019_2024
axes_summary:
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "All federal judges including SCJN Ministers subject to popular election; SCJN reduced from 11 to 9; first election 1 June 2025."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Abolition of INAI, Cofece, IFT, CRE, four other autonomous bodies; functions absorbed into executive ministries."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Regulatory predictability reduced by abolition of independent sector regulators + elected judiciary."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Cofece's enforcement role transferred to executive; IFT telecoms-regulator role ended; continuity of CFE-priority dispatch."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "Continuity of AMLO-era energy model; no new Rondas; Plan México selective industrial targeting."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Constitutionalised social programmes (pension, Becas Benito Juárez, Sembrando Vida); new expansions to women 60-64."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "2025 budget raised deficit target; Pemex support continued; energy-ministry absorption of regulators."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Minimum-wage trajectory continued; 40-hour working week reform under discussion."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Banxico autonomy formally preserved; cooperative executive-CB tone."}
outcome_hypotheses:
  - cash_transfer_poverty_effects
  - privatisation_productivity_effect
predecessor_movements:
  - mexico_amlo_morena_2018_2024
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Plan México industrial strategy; state primacy in energy."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Transfer expansion + minimum-wage trajectory preserved."}
  - {position_id: institutionalism, alignment: opposed, notes: "Institutional direction is materially negative — elected judges, autonomous bodies abolished."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Continuity of AMLO's energy model + institutional retrenchment."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Macro aggregates stable; institutional experiment unprecedented — outcome evidence still emerging."}
disclosure: >
  Only ~6 months of data at drafting (Oct 2024 - Apr 2026 roughly).
  Locked here for pre-registration; a v1.1 revisit in 2027 and 2029
  is the plan. The 1 June 2025 judicial election is a first-of-kind
  event and its downstream effects on judicial-output measures
  (case disposition, constitutional review rates, investor-state
  arbitration outcomes) should be tracked as outcome evidence.
references:
  - "Reforma constitucional en materia del Poder Judicial (DOF 15-sep-2024)"
  - "Reforma constitucional simplificación orgánica / organismos autónomos (DOF dic-2024)"
  - "Reforma constitucional Guardia Nacional (DOF 2024)"
  - "Elección extraordinaria del Poder Judicial 1-jun-2025 (INE)"
  - "Plan México 2030 (13-ene-2025)"
  - "Banxico Informes Trimestrales 2024-2025"
  - "IMF Article IV Mexico 2025"
notes: >
  Separate movement record from AMLO preserves content coding: energy
  and social-transfer content is continuity; institutional content is
  a step-change (the judicial reform is structural and without modern
  precedent in OECD-adjacent economies). Evaluating the two movements
  as one would mask that institutional step-change.

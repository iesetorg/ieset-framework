# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: abenomics_2012_2020
status: candidate
name: "Abenomics — three arrows"
countries: [JPN]
timeframe: {start: 2012, end: 2020}
coalition: "LDP-Komeito (Abe administration)"
leaders: ["Shinzō Abe (PM)", "Haruhiko Kuroda (BoJ Governor 2013-2023)", "Taro Aso (Finance)"]
doctrine: >
  Three-arrow package: (1) aggressive monetary easing via BoJ QQE (2%
  inflation target, yield curve control from 2016); (2) flexible fiscal
  policy (consumption tax hikes + countercyclical spending); (3) structural
  reforms (corporate governance, labour participation, TPP). Ended 20-year
  deflation-stagnation era; yen depreciated ~40% boosting export
  competitiveness; corporate profit margins improved; inflation reached 2%
  target briefly but not persistently.
policies: [japan_bojqqe_2013, japan_yield_curve_control_2016, japan_corporate_governance_code_2015, japan_womenomics_initiative]
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "BoJ balance sheet from ~30% GDP (2012) to ~130% GDP (2021)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Corporate governance code + stewardship code."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Womenomics raised female labour participation."}
outcome_hypotheses: [unconventional_monetary_policy_effectiveness]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: mmt, alignment: partially_aligned}
steelman: movements/steelman/abenomics_2012_2020.md
references:
  - "Hausman-Wieland (2014), 'Abenomics: An Update' Brookings"
  - "BoJ Policy Board decisions 2013-2020"

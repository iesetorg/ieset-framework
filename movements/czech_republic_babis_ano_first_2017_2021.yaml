movement_id: czech_republic_babis_ano_first_2017_2021
status: candidate
name: "Babis ANO-CSSD minority with KSCM tolerance 2017-2021"
countries: [CZE]
timeframe: {start: 2017, end: 2021, enacted_date: "2017-12-13"}
coalition: "ANO-CSSD minority with KSCM confidence-and-supply (from June 2018)"
leaders:
  - "Andrej Babis (Prime Minister, ANO, 2017-2021)"
  - "Alena Schillerova (Finance Minister, ANO, 2017-2021)"
doctrine: >
  First Babis premiership — an oligarch-populist centrist technocratic
  project by Europe's largest-agribusiness and chemicals owner (Agrofert).
  Economic school: Czech anti-establishment technocratic-populist with
  strong fiscal-transfer and tax-optimisation-compliance agenda — pension
  supplements and valorisation above statutory minimum, single tax-form
  filing (Formular 25), abolition of super-gross-wage (Jan 2021, 15%/23%
  PIT brackets replacing combined 20.1% effective rate), Covid-19
  subsidies (Antivirus wage-subsidy, compensation bonus, crisis-aid
  programmes). Stork-Nest / Capi hnizdo EU-subsidy misappropriation case
  (charged Sep 2017 and Apr 2019; European Parliament 2020 report on
  conflict of interest confirming Babis retained de-facto control of
  Agrofert via trust-fund loophole). Left-right axis: populist-centrist
  with transfer-expansionary social tilt. Dated policies: super-gross-
  wage abolition Jan 2021, Antivirus wage-subsidy Mar 2020, pension
  valorisation hikes 2018-2020, digital-services tax proposal (shelved).
  Popularity: high through Covid; lost Oct 2021 election narrowly to
  SPOLU coalition. Coherence: moderate — personalist discipline under
  conflict-of-interest cloud.
policies:
  - cz_super_gross_wage_abolition_2021
  - cz_antivirus_wage_subsidy_2020
  - cz_pension_valorisation_hikes_2018_2020
  - cz_capi_hnizdo_subsidy_case_2017_2021
  - cz_eet_electronic_revenue_2016
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Super-gross-wage abolition cut effective top PIT rates; flat-ish 15%/23% structure."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Pension valorisation, Antivirus and compensation bonuses, generous Covid fiscal response."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "2020 deficit -5.8% of GDP; substantial Covid expenditure."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Capi hnizdo case and documented conflict-of-interest on EU subsidies."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Agrofert-benefiting agricultural and EU-subsidy allocations; Antivirus sectoral support."}

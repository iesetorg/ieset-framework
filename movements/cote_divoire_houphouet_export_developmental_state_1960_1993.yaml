# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: cote_divoire_houphouet_export_developmental_state_1960_1993
status: candidate
name: "Houphouet-Boigny export-developmental cocoa state"
countries: [CIV]
timeframe: {start: 1960, end: 1993}
coalition: "Parti Democratique de la Cote d'Ivoire (PDCI)"
leaders:
  - "Felix Houphouet-Boigny"
doctrine: >
  Houphouet-Boigny's post-independence governing model pursued rapid growth
  through agricultural exports, political stability, openness to French capital
  and expertise, and state coordination of cocoa and coffee rents. Rather than
  socialist rupture, the regime used a pro-investment external orientation and
  producer incentives to expand the forest frontier and make Cote d'Ivoire a
  leading West African export economy.
policies:
  - ci_cocoa_coffee_export_board_caistab_1960
  - ci_french_capital_open_door_1960s
  - ci_agricultural_frontier_export_model_1960s
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "The regime kept close French commercial links and oriented growth around export crops."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "Agricultural expansion relied on regional migrant labour and permissive settlement practices."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "CAISTAB and crop-pricing institutions stabilized and redirected cocoa and coffee rents."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Export-crop marketing was state-coordinated through official boards and price mechanisms."}
  - {axis: institutional.property_rights, direction: "mixed", magnitude: moderate, rationale: "Commercial farming incentives strengthened use rights for expansion but left land tenure and migrant claims politically fragile."}
position_alignments:
- position_id: developmentalism
  alignment: aligned
  notes: Export agriculture, marketing-board coordination, infrastructure, and state-led growth strategy fit a classic postcolonial developmental-state model.
- position_id: classical_liberal
  alignment: partially_aligned
  notes: The model kept private farming incentives, export orientation, and openness to French capital, but relied heavily on state coordination and one-party patronage.
- position_id: institutionalism
  alignment: partially_aligned
  notes: Administrative continuity and policy coordination were central, though one-party rule and patronage limited rule-bound institutional quality.

references:
  - "Robert Bates, Markets and States in Tropical Africa"
  - "World Bank, The East Asian Miracle, comparative discussion of Cote d'Ivoire"
  - "Jean-Pierre Chauveau, historical work on Ivorian land and cocoa institutions"
notes: "End date uses Houphouet-Boigny's death in 1993 as the boundary for the founding export-developmental settlement."

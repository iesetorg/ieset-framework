movement_id: argentina_cfk_pj_2007_2015
status: candidate
name: "Cristina Fernández de Kirchner — YPF renationalisation, cepo, INDEC"
countries: [ARG]
timeframe: {start: 2007, end: 2015, enacted_date: "2007-12-10"}
coalition: "Frente para la Victoria (FPV, PJ-Kirchnerist)"
leaders:
  - "Cristina Fernández de Kirchner (President 2007-2015)"
  - "Amado Boudou (Economía 2009-2011; VP 2011-2015)"
  - "Axel Kicillof (Economía 2013-2015)"
  - "Martín Redrado (BCRA to Jan 2010)"
  - "Mercedes Marcó del Pont (BCRA 2010-2013)"
doctrine: >
  CFK's two terms deepened Kirchnerist heterodoxy into open confrontation
  with orthodox macro frameworks. (a) Economic school: neo-Peronist
  heterodox + resource-nationalist + anti-orthodoxy — YPF renationalisation
  Apr 2012 (51% expropriation of Repsol stake, Ley 26.741), private-pension
  nationalisation Nov 2008 (SIPA absorbed AFJPs $30bn), INDEC statistical
  intervention from Jan 2007 understating inflation (distorted CPI until
  IPCNu 2014 overhaul), dólar blue / cepo cambiario Oct 2011 FX controls,
  BCRA reserve draws to fund primary deficit (2010 onward), utility-tariff
  freeze + energy subsidies, paritarias wage-bargaining cycle pushing real-
  wage indexation. (b) Left-right: centre-left to left; statist-populist.
  (c) Dated policies: AFJP nationalisation Nov 2008, Resolución 125 export-
  tax conflict (defeated Senate Jul 2008), INDEC intervention 2007-2014,
  YPF expropriation Apr 2012, cepo Oct 2011, 2014 Griesa pari passu
  default (Jul 2014), peso devaluation Jan 2014 (24%), Ley Antiterrorista
  2011, media law Ley 26.522 Oct 2009. (d) Popularity: won 2007 first round
  45.3%; re-elected Oct 2011 54.1% (largest margin since return to
  democracy); approval collapsed to ~30% after Jan 2014 devaluation +
  Nisman case Jan 2015; FPV lost Nov 2015 runoff to Macri. (e) Coherence:
  ideologically tight Kirchnerist platform — YPF + AFJP + media + INDEC
  formed a coherent statist-populist programme with high political cost
  (2013 midterm FPV -10pp) and BOP crisis trajectory (reserves USD 52bn
  2010 to USD 25bn Dec 2015).
policies:
  - ar_ypf_renationalisation_2012
  - ar_afjp_nationalisation_2008
  - ar_indec_intervention_2007_2014
  - ar_cepo_cambiario_2011_2015
  - ar_griesa_pari_passu_default_2014

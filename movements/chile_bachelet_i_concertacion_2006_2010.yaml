# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: chile_bachelet_i_concertacion_2006_2010
status: candidate
name: "Bachelet I Concertación — pension reform, Transantiago troubles, copper stabilisation"
countries: [CHL]
timeframe: {start: 2006, end: 2010, enacted_date: "2006-03-11"}
coalition: "Concertación de Partidos por la Democracia"
leaders:
  - "Michelle Bachelet (President 2006-2010; PS)"
  - "Andrés Velasco (Hacienda)"
  - "José De Gregorio (BCCh 2007-2011)"
  - "Paulina Veloso / René Cortázar (cabinet)"
doctrine: >
  Social-democratic Concertación fourth term managing Transantiago
  crisis, enacting pension-reform solidarity pillar, and navigating
  global financial crisis with structural-surplus fiscal space. Five
  doctrinal pillars: (a) Pension reform Ley 20.255 of 17 March 2008 —
  added Pilar Solidario (PBS basic solidarity pension + APS solidarity
  contribution) to Chile's 1981 AFP system; coverage for never-
  contributing elderly + top-up for low-contributors; redefined
  contested AFP architecture without replacing it. (b) Transantiago
  crisis 10 February 2007 — Santiago metropolitan transit reform
  launched poorly; service chaos; approval dropped to 35% by mid-
  2007; protracted fixes through 2009. (c) Fondo de Estabilización
  Económica y Social (FEES, Ley 20.128 of 30 September 2006) —
  structural-balance rule institutionalised; copper windfalls saved;
  accumulated ~$20B by 2008 — funded 2009 countercyclical response.
  (d) Countercyclical fiscal stimulus 2009 — $4B package (Jan 2009),
  Temporary Employment Subsidy; GDP -1.6% 2009 vs OECD deeper
  contractions. (e) Institutional firsts — first female president;
  cabinet parity; student movement (pingüinos, April-June 2006)
  forcing LGE education law Ley 20.370 (12 Sep 2009); Vía Bachelet
  Plan AUGE expansion to 69 conditions. Stated school: social-
  democratic + Concertación third way + countercyclical fiscal.
  Left-right: centre-left. Popularity: Jan 2006 runoff 53.5% vs
  Piñera 46.5%; approval U-shaped, trough ~35% mid-2007, recovered
  to 78% end-of-term (highest in modern Chile); Dec 2009 runoff
  Piñera (Coalición) 51.6% vs Frei (Concertación) 48.4% — ending
  20-year Concertación hold. Coherence: trade pure-AFP market
  signalling and immediate Transantiago credibility for pension-
  solidarity architecture, crisis-resilient fiscal rule, and highest
  end-of-term approval in modern history.
policies:
  - cl_pension_reform_pilar_solidario_2008
  - cl_transantiago_launch_crisis_2007
  - cl_fees_stabilisation_fund_2006
  - cl_countercyclical_stimulus_2009
  - cl_lge_education_law_2009
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pilar Solidario added tax-financed pension layer over AFP."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "2009 countercyclical package funded from FEES savings."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BCCh maintained operational autonomy; structural-balance framework cooperated."}
  - {axis: regulatory.sectoral_licensing, direction: "0", magnitude: weak, rationale: "Transantiago concession framework; no decisive product-market shift."}
outcome_hypotheses: [solidarity_pillar_coverage_effect, sovereign_wealth_countercyclical_effect]
predecessor_movements: [chile_lagos_concertacion_2000_2006]
successor_movements: [chile_pinera_ii_2018_2022]
position_alignments:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_de_la_rua_alianza_1999_2001
status: candidate
name: "De la Rúa Alianza UCR-FREPASO — corralito, convertibility collapse, resignation"
countries: [ARG]
timeframe: {start: 1999, end: 2001, enacted_date: "1999-12-10"}
coalition: "Alianza por el Trabajo, la Justicia y la Educación (UCR + FREPASO)"
leaders:
  - "Fernando de la Rúa (President Dec 1999 - Dec 2001)"
  - "Carlos 'Chacho' Álvarez (Vice President 1999-2000; resigned)"
  - "José Luis Machinea / Ricardo López Murphy / Domingo Cavallo (Economía)"
  - "Pedro Pou (BCRA until April 2001)"
doctrine: >
  Centre-left coalition inheriting fragile convertibility + recession,
  collapsing into banking crisis and forced resignation. Five doctrinal
  pillars: (a) Fiscal-austerity recession management — Machinea impuestazo
  Dec 1999 tax package; López Murphy 18-day finance ministry (March 2001)
  proposed deeper university + spending cuts; provoked cabinet split.
  (b) Cavallo megacanje June 2001 — $29.5B debt swap extending maturities
  at ~15% yields; Ley de Déficit Cero (Ley 25.453, 30 Jul 2001) cut
  public-sector wages/pensions 13%. (c) Senate bribery scandal Aug 2000 —
  accusations of coima payments for labour-reform vote; VP Álvarez
  resigned 6 Oct 2000 rupturing coalition. (d) Corralito 3 Dec 2001 —
  Decreto 1570/2001 froze bank withdrawals at $250/week; triggered
  19-20 December cacerolazo mass protests; 27 deaths nationwide; IMF
  refused further disbursement 5 December. (e) Resignation 20 December
  2001 — De la Rúa resigned by helicopter; Ramón Puerta (Senate) + Adolfo
  Rodríguez Saá (23-30 Dec, declared default on $95B) + Eduardo Camaño +
  Eduardo Duhalde rotation completed within 12 days. Stated school:
  social-democratic fiscal consolidation under currency-board constraint.
  Left-right: centre to centre-left rhetorically, orthodox operationally.
  Popularity: October 1999 first-round 48.4% vs Duhalde 38.1%; approval
  crashed to ~20% by mid-2001; 14 Oct 2001 midterms Alianza ~23%, Peronist
  ~37%, 20%+ blank/void votes (voto bronca). Coherence: trade Alianza
  unity and social-democratic programme for orthodox-under-duress
  convertibility defence that ruptured coalition, collapsed deposits,
  and triggered regime exit.
policies:
  - ar_machinea_impuestazo_1999
  - ar_blindaje_imf_2000
  - ar_megacanje_debt_swap_2001
  - ar_deficit_zero_law_2001
  - ar_corralito_2001
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Déficit Zero 13% wage+pension cut; prior cuts across 2000-2001."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Corralito froze deposits; bank-contract breach."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Pou dismissed April 2001; currency-board defence crumbled."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Senate bribery scandal; VP resignation; mass unrest and forced presidential exit."}
outcome_hypotheses: [currency_board_exit_dynamics, austerity_political_economy]
predecessor_movements: [argentina_menem_second_term_1995_1999]

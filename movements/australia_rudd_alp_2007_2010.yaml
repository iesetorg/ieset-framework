# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: australia_rudd_alp_2007_2010
status: candidate
name: "Rudd ALP government (Australia)"
countries: [AUS]
timeframe:
  start: 2007
  end: 2010
  enacted_date: "2007-12-03"
coalition: "Australian Labor Party (ALP) majority government, ending 11 years of Howard Coalition"
leaders:
  - "Kevin Rudd (Prime Minister 3 Dec 2007 - 24 Jun 2010)"
  - "Wayne Swan (Treasurer)"
  - "Julia Gillard (Deputy PM)"
  - "Glenn Stevens (RBA Governor)"
  - "Ken Henry (Treasury Secretary)"
doctrine: >
  ALP Keynesian GFC-response with progressive-taxation-reform ambition and
  climate-policy pivot. Economic school: textbook Keynesian counter-cyclical
  stimulus (hailed by IMF) with tax-system reform push — Economic Security
  Strategy A$10.4bn Oct 2008 (cash payments to pensioners, families, first-
  home-buyer boost doubled); Nation Building and Jobs Plan A$42bn Feb 2009
  (BER school halls, Home Insulation Programme, cash handouts); bank deposit
  and wholesale funding guarantees 12 Oct 2008; Henry Tax Review commissioned
  May 2008, reported 2 May 2010; Resource Super Profits Tax announced 2 May
  2010 (40% RSPT on mining windfall) triggering mining-industry backlash and
  contributing to Rudd's leadership ouster 24 Jun 2010. Dated policies:
  Kyoto ratification 3 Dec 2007 (first act); Apology to the Stolen
  Generations 13 Feb 2008; CPRS (Carbon Pollution Reduction Scheme)
  introduced May 2009 and shelved Apr 2010; NBN announced 7 Apr 2009; Home
  Insulation scheme Feb 2009 - Feb 2010 (4 deaths, programme terminated).
  Left-right: centre-left, economically orthodox-Keynesian with progressive
  distributional tilt. Popularity: 2007 election 52.7% 2PP; Rudd approval
  peaked 73% 2009 then collapsed Q2 2010 over CPRS-shelving, HIP deaths,
  and RSPT backlash; Gillard challenged and won leadership 24 Jun 2010.
  Coherence: GFC stimulus pillar coherent and well-executed; climate
  and mining-tax pillars politically fatal mid-term pivots.
policies:
  - au_gfc_stimulus_package_2008_2009
  - au_home_insulation_programme_2009
  - au_henry_tax_review_2010
  - au_resource_super_profits_tax_2010
  - au_bank_guarantee_2008
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "GFC fiscal stimulus A$52bn+ across 2008-2009 packages, deficit 4.2% GDP 2009-10."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Direct cash handouts to pensioners, families, FHB boost doubled."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Home Insulation, BER school halls, green-car-innovation fund, clean-energy programmes."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Bank deposit and wholesale funding guarantees; APRA oversight retained."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "RSPT proposed 40% super-profits levy on mining (largely repealed/replaced under Gillard)."}
outcome_hypotheses: [fiscal_stimulus_effectiveness_in_gfc, mining_super_profits_tax_effect]
predecessor_movements: [australia_howard_coalition_1996_2007]
successor_movements: [australia_gillard_alp_2010_2013]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Counter-cyclical fiscal stimulus hailed as textbook Keynesian response."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "NBN national-champion infrastructure push; mining-rent capture attempt."}
references:
  - "Australian Treasury Updated Economic and Fiscal Outlook (Feb 2009)"
  - "Henry Review of Australia's Future Tax System (May 2010)"
  - "Royal Commission into the Home Insulation Program (2014)"
notes: "Rudd replaced by Gillard 24 Jun 2010; policy continuity on stimulus but mining-tax revised to MRRT under Gillard."

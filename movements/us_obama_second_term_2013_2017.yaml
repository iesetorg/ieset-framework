movement_id: us_obama_second_term_2013_2017
status: candidate
name: "Obama second term — JCPOA, Paris, TPP, Cuba opening"
countries: [USA]
timeframe: {start: 2013, end: 2017, enacted_date: "2013-01-20"}
coalition: "Democratic (divided government; GOP Senate from 2015)"
leaders:
  - "Barack Obama (President 2009-2017)"
  - "Joe Biden (VP)"
  - "Jack Lew (Treasury 2013-2017)"
  - "John Kerry (Secretary of State 2013-2017)"
  - "Janet Yellen (Fed Chair from Feb 2014)"
doctrine: >
  Obama II was an executive-action and international-agreement presidency
  with minimal domestic legislative throughput under divided government.
  (a) Economic school: rules-based liberal-internationalism abroad
  (JCPOA, Paris, TPP) + progressive-regulatory stance at home (Clean Power
  Plan, overtime rule, net-neutrality Title II reclassification Feb 2015).
  (b) Left-right: centre-left / progressive-liberal, but practically
  constrained by McConnell Senate. (c) Dated policies: Iran nuclear
  JCPOA (14 Jul 2015), Cuba diplomatic reopening (17 Dec 2014, embassy
  reopened 20 Jul 2015), Paris Agreement signed (22 Apr 2016, entered into
  force Nov 2016), TPP signed (4 Feb 2016, not ratified), Clean Power Plan
  proposed Jun 2014 / finalised Aug 2015 (stayed by SCOTUS Feb 2016),
  marriage equality via Obergefell Jun 2015 (judicial), DAPA executive
  action (blocked by courts 2016), Dodd-Frank implementation continued, oil
  export ban lifted Dec 2015. (d) Popularity: re-elected 2012 51.1%;
  approval bottomed 40-42% 2014 midterms ("historic losses" in Senate);
  rose to mid-50s by 2016 exit. (e) Coherence: moderate — international
  agreements formed a coherent post-unipolar liberal-order pivot; domestic
  executive-action strategy vulnerable to successor reversal (Trump I
  withdrew TPP, JCPOA, Paris; Clean Power Plan replaced).
policies:
  - us_iran_jcpoa_2015
  - us_paris_agreement_signature_2016
  - us_tpp_signature_2016
  - us_cuba_reopening_2014_2015
  - us_clean_power_plan_2015
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Clean Power Plan, Paris Agreement, methane rules, CAFE tightening."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "TPP signed; KORUS deepening; Cuba trade limited thaw; oil export ban lifted."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "No major domestic ownership shifts; executive actions contested."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Net-neutrality Title II; overtime rule (enjoined); FCC spectrum actions."}
outcome_hypotheses: [trade_liberalisation_manufacturing_effect, nuclear_deal_sanctions_reversal]
predecessor_movements: [us_obama_first_term_2009_2013]
successor_movements: [us_trump_first_term_broad_2017_2021]
position_alignments:

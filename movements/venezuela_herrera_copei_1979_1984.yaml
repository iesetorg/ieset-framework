# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: venezuela_herrera_copei_1979_1984
status: candidate
name: "Herrera Campins COPEI — counter-shock, 'Viernes Negro' devaluation"
countries: [VEN]
timeframe: {start: 1979, end: 1984, enacted_date: "1979-03-12"}
coalition: "Comité de Organización Política Electoral Independiente (COPEI) — Christian-democratic"
leaders:
  - "Luis Herrera Campins (President 1979-1984)"
  - "Luis Ugueto Arismendi (Finance 1979-1981)"
  - "Arturo Sosa Abascal (Finance 1982-1984)"
  - "Leopoldo Díaz Bruzual (BCV Governor 1981-1983)"
doctrine: >
  COPEI government confronted the reversal of the oil boom, terminal debt
  build-up, and the end of the Puntofijo-era fixed-exchange-rate regime.
  Four doctrinal pillars: (1) "Venezuela Turned Over to Debt" — Herrera
  Campins inherited ~USD 22bn external debt and public enterprises in
  deficit; 1979-1980 second oil shock briefly cushioned fiscal;
  1981-1982 oil price weakened; (2) November 1982 "Recadi" exchange-
  control build-up anticipation — capital flight accelerated under
  2.15 Bs/USD fixed rate regime in place since 1964; (3) "Viernes
  Negro" (18 February 1983) — BCV ended the 18-year fixed-rate
  regime, introduced three-tier exchange rate system (RECADI for
  essentials at 4.30, priority at 6.00, free market floated), and
  defaulted on short-term debt-service with nominal maturity
  extension; inflation rose from 10% to 18%; GDP fell -5.6% (1983);
  (4) attempted industrial-diversification continuation under
  "VI Plan de la Nación" (1981-85) — Ciudad Guayana expansion,
  Caracas metro system commissioning (1983), and highway network
  continuation despite fiscal retrenchment. Stated school: COPEI
  Christian-democratic social-market tradition + late-stage
  Puntofijo developmentalism. Left-right axis: centre-right on
  economic content; centre on social content. Popularity /
  legitimacy: December 1978 election Herrera won 46.6% vs AD's
  Piñerúa 43.3% (closest margin in AD-COPEI alternation);
  December 1983 succession AD's Jaime Lusinchi won 56.7% vs
  COPEI's Rafael Caldera 34.5% — COPEI punished for Viernes Negro.
  Coherence line: defend the Puntofijo fixed-rate developmentalist
  model until currency-and-debt pressure forced the exchange-rate
  abandonment that inaugurated Venezuela's two-decade unravelling.
policies:
  - ve_viernes_negro_fx_regime_collapse_1983
  - ve_recadi_multiple_exchange_rates_1983
  - ve_caracas_metro_commissioning_1983
  - ve_vi_plan_1981_1985
  - ve_external_debt_moratorium_1983
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "RECADI multi-tier exchange controls; capital-account restrictions imposed February 1983."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "BCV politicised during Viernes Negro; fiscal-dominance pressure."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "VI Plan sustained public investment despite oil softening; deficit ~5% GDP."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Import licensing regime tightened via RECADI priority tiers."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Multi-tier FX created expropriation by stealth via rationed-rate-allocation."}
outcome_hypotheses: [fixed_exchange_rate_collapse_channel, resource_curse_effect]
predecessor_movements: [venezuela_perez_first_term_1974_1979]
position_alignments:
  - {position_id: social_liberal, alignment: partially_aligned, notes: "COPEI Christian-democratic social-market variant."}
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: chicago_monetarism, alignment: opposed}
references:
  - "BCV, Decisión sobre régimen cambiario, 18 February 1983"
  - "VI Plan de la Nación 1981-1985, CORDIPLAN"
  - "Hausmann-Rodríguez eds. (2013), Venezuela Before Chávez, ch. 2"
  - "Karl (1997), The Paradox of Plenty: Oil Booms and Petro-States"
notes: "Viernes Negro 18 Feb 1983 is the macroeconomic hinge event. Precedes Lusinchi (AD, 1984-89) and second-term Pérez (1989-93)."

movement_id: bolivia_mesa_2003_2005
status: candidate
name: "Mesa transitional — Hydrocarbons Law 2005, referendum, pre-MAS vacuum"
countries: [BOL]
timeframe: {start: 2003, end: 2005, enacted_date: "2003-10-17"}
coalition: "Sin partido (technocratic; ex-VP succeeding Sánchez de Lozada)"
leaders:
  - "Carlos Mesa Gisbert (President 17 Oct 2003 - 9 June 2005)"
  - "Juan Ignacio Siles del Valle / Horst Grebe López (Hacienda)"
  - "Eduardo Rodríguez Veltzé (Chief Justice; successor transitional)"
doctrine: >
  Caretaker non-partisan government navigating post-Gas-War
  legitimacy vacuum via hydrocarbon-referendum democracy and
  eventual forced resignation. Five doctrinal pillars: (a)
  Hydrocarbon referendum 18 July 2004 — five-question
  consultation; ~92% yes to repealing 1996 Goni-era hydrocarbons
  law, recovery of ownership at wellhead, OPEP/Mercosur positioning,
  Pacific-gas-for-sea reintroduction, mixed-economy YPFB. (b)
  Hydrocarbons Law Ley 3058 of 17 May 2005 — increased royalty +
  tax on gas fields to 50% (IDH 32% + royalty 18%); forced migration
  of existing contracts within 180 days; watershed pre-MAS
  resource-nationalism step. (c) Sucre-autonomía + El Alto counter-
  mobilisation — Mesa governed without party; Santa Cruz autonomy
  movement strengthened; El Alto + COB + cocaleros (Morales) pressed
  for full nationalisation. (d) Forced resignation 9 June 2005 —
  after renewed blockades May-June 2005, Mesa submitted resignation
  to Congress; Eduardo Rodríguez Veltzé (Chief Justice of Supreme
  Court) sworn in as transitional president per succession rules
  (Senate + Chamber presidents declined); early elections called.
  (e) Early election 18 December 2005 — Evo Morales (MAS) won
  first-round majority 53.7% (first Bolivian president elected
  outright since 1978; first indigenous president). Stated school:
  technocratic centrist + moderate resource-nationalist. Left-right:
  centre; pragmatic. Popularity: early approval ~70% (relief after
  Goni exit); declined to ~35-40% amid 2005 blockades; no electoral
  mandate. Coherence: trade political-party insulation and resolved
  Goni-legitimacy for hydrocarbons-referendum + Ley 3058 royalty
  restoration — bridging to Morales-MAS full nationalisation
  (May 2006 Decreto Supremo 28701 Héroes del Chaco).
policies:
  - bo_hydrocarbon_referendum_2004
  - bo_hydrocarbons_law_3058_2005
  - bo_mesa_resignation_2005
  - bo_rodriguez_veltze_transitional_2005

movement_id: ireland_cowen_ff_2008_2011
status: candidate
name: "Cowen Fianna Fáil GFC-and-bailout government 2008-2011"
countries: [IRL]
timeframe: {start: 2008, end: 2011, enacted_date: "2008-05-07"}
coalition: "Fianna Fáil + Greens + PDs (to 2009) / Fianna Fáil + Greens + independents"
leaders:
  - "Brian Cowen (PM 'Taoiseach')"
  - "Brian Lenihan Jr (Finance Minister)"
  - "Mary Coughlan (Tánaiste)"
doctrine: >
  Fianna Fáil-led government inheriting the post-Celtic-Tiger bust, defined
  by the blanket Irish-banking guarantee (29 Sep 2008) and the EU/IMF
  bailout (Nov 2010). Economic school: centre-right-clientelist FF with
  radical fiscal-emergency pivot. Signature actions: blanket state guarantee
  of Irish-domiciled banks' liabilities (~€440bn, 2.5x GDP), Anglo Irish
  Bank nationalisation (Jan 2009 — ultimate cost ~€30bn), NAMA National
  Asset Management Agency (Apr 2009) absorbing €74bn face-value land-and-
  development loans at €31.8bn; successive austerity budgets (Oct 2008
  emergency budget, Apr 2009 supplementary budget, Dec 2009 budget, Dec 2010
  budget — cumulatively ~€20bn / 12% GDP); public-sector pay cuts 5-15%;
  pension levy on public servants; widened PRSI/income-levy structure; VAT
  21→21.5% then back to 21%. EU/IMF/ECB 'troika' Memorandum (Nov 28 2010,
  €85bn package); bank-sector recapitalisation €34bn under PCAR stress test.
  Left-right: centre-right, post-crisis consolidation. Popularity: FF
  collapsed from 41.6% (2007) to 17.4% (2011 general election — worst result
  since founding 1926); coalition dissolved Jan 2011. Coherence: moderate
  — guarantee was decisive but mis-priced the solvency problem underneath.
policies:
  - ie_bank_guarantee_2008
  - ie_anglo_irish_nationalisation_2009
  - ie_nama_2009
  - ie_eu_imf_ecb_bailout_2010
  - ie_austerity_budgets_2008_2010

  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: strong, rationale: "Welfare cuts, pension levy; child-benefit / social-welfare rates reduced."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "NAMA transfer valuations disputed; subordinated-bond burden-sharing imposed."}

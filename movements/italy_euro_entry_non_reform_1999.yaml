# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_euro_entry_non_reform_1999
status: candidate
name: "Italy euro entry at preserved institutional structure"

countries: [ITA]

timeframe:
  start: 1999
  end: ongoing

coalition: "D'Alema centre-left (1998-2000) for entry; subsequent governments' non-reform"

leaders:
  - "Massimo D'Alema (PM)"
  - "Carlo Azeglio Ciampi (Treasury, previously governor Banca d'Italia)"
  - "Subsequent Berlusconi / Prodi / Letta / Renzi / Conte governments that declined structural reform"

doctrine: >
  Lock Italy into monetary union as a political commitment to European
  integration. The stated economic case was that euro entry would import
  Bundesbank monetary credibility, reduce borrowing costs, and force
  structural reform through loss of devaluation. The framework codes this
  as a movement not because of the entry itself (a single event) but
  because of the *absence* of the expected structural reforms over the
  subsequent two decades — product-market rigidity, judicial slowness,
  public-sector employment entrenchment, and labour-market dualism
  persisted despite the stated rationale for entry.

  This is a content-over-coalition case in the opposite direction from
  Schröder: a sequence of Italian governments of varying colours each
  declined to enact the reforms the euro-entry argument had promised.

policies:
  - italy_euro_entry_1999
  - italy_labour_market_dualism_persistence_1990s_2010s
  - italy_product_market_regulation_persistence

axes_summary:
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: strong
    rationale: "ECB replaces Banca d'Italia monetary function; credible low-inflation anchor acquired."

  - axis: regulatory.product_market_competition
    direction: "0"
    magnitude: weak
    rationale: "OECD PMR scores show little net change across the 1998-2018 period."

  - axis: regulatory.labour_market_flexibility
    direction: "0"
    magnitude: weak
    rationale: "Persistent dual labour market: rigid insider contracts + temporary outsider contracts. Biagi 2003 and Jobs Act 2014 partial reforms did not close the dualism."

  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    rationale: "Public debt / GDP drifted from ~110% at entry toward 130%+ by 2020."

outcome_hypotheses:
  - nordic_outcome_persistence_decomposition_v3
  - structural_reform_absence_and_post_euro_stagnation

position_alignments:
  - position_id: austrian
    alignment: partially_aligned
    notes: "Euro-entry without corresponding structural adjustment is exactly the case Austrian critics of monetary union highlight — fiscal dominance through monetary union with reduced adjustment tools."

steelman: movements/steelman/italy_euro_entry_non_reform_1999.md

disclosure: >
  Italian stagnation is contested. Some read it as euro-zone design
  failure (peripheral countries imported German monetary stance without
  German productivity institutions); others as Italian-specific
  political-economy capture; others as demographic / regional
  heterogeneity. Framework's position per D.2.9 / D.3.1 is that
  policy-content coding reveals the absence of structural reform as
  the load-bearing feature, separate from euro-zone macroeconomic
  effects.

references:
  - "Trattato di Maastricht (ratified 1992, euro-area entry 1 Jan 1999)"
  - "OECD Economic Surveys, Italy, 1999-2023"
  - "Bugamelli et al. (Banca d'Italia Occasional Papers) on productivity stagnation"

notes: >
  Treatment date 1999 is euro-area accession. The movement's distinctive
  feature is the 2-decade absence of reform that followed, not the entry
  event itself.

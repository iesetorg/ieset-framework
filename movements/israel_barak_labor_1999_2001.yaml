movement_id: israel_barak_labor_1999_2001
status: candidate
name: "Barak One Israel — Camp David II, Lebanon withdrawal, failed grand-bargain peace push"
countries: [ISR]
timeframe: {start: 1999, end: 2001}
coalition: "One Israel (Labor+Meimad+Gesher) with Shas, Meretz, NRP, Yisrael BaAliyah, United Torah Judaism (coalition collapsed mid-2000)"
leaders:
  - "Ehud Barak (Prime Minister 6 July 1999 - 7 March 2001)"
  - "Avraham Shochat (Finance Minister 1999-2001)"
  - "David Klein (Bank of Israel Governor 2000-2005)"
doctrine: >
  Economic school: Labor-pragmatic continuation of 1990s liberalisation
  with social-democratic redistribution emphasis, but overshadowed by
  security-diplomatic push. Left-right axis: centre-left — pro-Oslo
  maximalist strategy, pro-market on financial reform, mild welfare
  expansion. Dated policies: unilateral IDF withdrawal from southern
  Lebanon 24 May 2000 ending 18-year occupation; Camp David Summit II
  11-25 July 2000 (Clinton-brokered, collapsed on Temple Mount and
  refugee return); Second Intifada erupted 28 September 2000 following
  Sharon Temple Mount visit; continued capital-market liberalisation
  and pension-system reform preparation; BoI rate cuts 2000-2001 as
  global dotcom cycle turned. Popularity: massive May 1999 direct-PM
  victory over Netanyahu (56%-44%) but coalition collapsed July 2000
  on peace terms; lost February 2001 direct-PM election to Sharon
  (62%-38%). Coherence: low — attempt to front-load peace deal
  exhausted political capital before domestic agenda landed.
policies:
  - il_south_lebanon_withdrawal_2000
  - il_camp_david_ii_summit_2000
  - il_second_intifada_response_2000_2001
  - il_barak_capital_markets_continuation_1999_2001

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malaysia_mahathir_wawasan_2020_era_1991_1998
status: candidate
name: "Mahathir Wawasan 2020 Vision and Asian-crisis response (Malaysia)"
countries: [MYS]
timeframe: {start: 1991, end: 1998}
coalition: "Barisan Nasional (UMNO-dominated)"
leaders:
  - "Mahathir Mohamad (PM 1981-2003)"
  - "Anwar Ibrahim (Finance Minister 1991-1998, Deputy PM 1993-1998)"
  - "Daim Zainuddin (Special Adviser; earlier Finance Minister)"
doctrine: >
  Mahathir Wawasan 2020 (Vision 2020) doctrine announced 28 Feb 1991 —
  fully-developed-nation status by 2020 via manufacturing-export-led
  growth, Bumiputera commercial-middle-class creation, and mega-
  project modernisation. Economic school: developmentalist-
  authoritarian with infrastructure mega-project overlay and ringgit-
  nationalism; diverged sharply from Washington Consensus during 1997
  crisis via capital controls. Dated policies: Wawasan 2020 speech 28
  Feb 1991; Putrajaya new administrative capital (construction from
  1995); Kuala Lumpur International Airport (opened Jun 1998); KLIA2
  Multimedia Super Corridor (MSC) announcement 1996; Petronas Twin
  Towers completion Apr 1996; Bakun hydro dam Sarawak; Second
  Industrial Master Plan 1996-2005; 1997 Asian crisis response —
  initial IMF-style cuts reversed, Anwar-Mahathir rift Sep 1998, Anwar
  sacked 2 Sep 1998 and jailed, capital controls imposed 1 Sep 1998
  pegging ringgit at 3.80 RM/USD; Bank Negara ringgit defence (lost
  $10bn+ 1992-1994 on pound/ringgit speculation); privatisation wave
  1991-1997 TNB, Telekom, MAS, Proton. Left-right: developmentalist
  authoritarian-right with ethno-populist overlay; Bumiputera
  affirmative-action framework NEP successor. Popularity: BN supermajorities
  Apr 1995 general election 65.2% / 162 of 192 seats; Mahathir approval
  high pre-Anwar rift; Reformasi demonstrations from Sep 1998.
  Coherence: high ex ante — Wawasan 2020, mega-projects, privatisation,
  industrial policy all internally aligned; capital controls 1998
  broke with IMF orthodoxy and ultimately worked (IMF later
  acknowledged) but split UMNO leadership.
policies:
  - my_wawasan_2020_announcement_1991
  - my_msc_multimedia_corridor_1996
  - my_ringgit_capital_controls_1998
  - my_privatisation_wave_1991_1997
  - my_putrajaya_capital_project_1995
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Mega-project spending — Putrajaya, KLIA, MSC, Bakun, Twin Towers."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Privatisation wave TNB/Telekom/MAS/Proton — though often to UMNO-linked groups."}
  - {axis: regulatory.financial_deregulation, direction: mixed, magnitude: strong, rationale: "Pre-1997 liberalisation strong; 1998 capital controls reversed direction dramatically."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Bank Negara subordinated to Mahathir agenda during 1997-98 crisis response; governor sacked."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, rationale: "Privatisation expanded formal property; capital controls and crony-connected deals contested."}
predecessor_movements:

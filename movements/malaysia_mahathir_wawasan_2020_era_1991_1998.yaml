  - malaysia_mahathir_bumiputera_development_1981_2003
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Jomo K.S. (2003), M Way: Mahathir's Economic Legacy"
  - "Kaplan & Rodrik (2001), 'Did the Malaysian Capital Controls Work?' NBER"
  - "Wawasan 2020 Speech, Mahathir Mohamad, 28 Feb 1991"
notes: "Deep-history tranche 2. Spans Vision 2020 to capital-controls pivot."

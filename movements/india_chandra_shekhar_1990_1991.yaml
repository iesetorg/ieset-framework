movement_id: india_chandra_shekhar_1990_1991
status: candidate
name: "Chandra Shekhar Samajwadi Janata Party minority (India)"
countries: [IND]
timeframe: {start: 1990, end: 1991}
coalition: "Samajwadi Janata Party (Rashtriya) minority with Congress outside support"
leaders:
  - "Chandra Shekhar (PM Nov 1990-Jun 1991)"
  - "Yashwant Sinha (Finance Minister)"
  - "Devi Lal (Deputy PM)"
doctrine: >
  Caretaker minority of 64 Janata Dal defectors (SJP-R) sustained by
  Congress outside support — pre-reform crisis management doctrine.
  Economic school: reactive crisis-management amid collapsing foreign
  reserves; ideologically-heterodox Young Turk socialist strand at odds
  with approaching IMF conditionality. Dated policies: Emergency gold
  pledge to Bank of England and Union Bank of Switzerland May-Jul 1991
  — 46.91 tonnes pledged against $405m loan; IMF Structural Adjustment
  approach initiated Jan 1991; Finance Bill 1991 (interim vote-on-
  account Mar 1991 after Congress withdrew support, election called);
  foreign-reserves fell to $1.2bn / two weeks' imports Jun 1991.
  Left-right: nominally centre-left socialist strand; economic policy
  forced rightward by crisis. Popularity: never won general election;
  Congress withdrew support Mar 1991 over Haryana surveillance
  allegations; general election May-Jun 1991 held during Rajiv Gandhi
  assassination 21 May 1991 — INC 36.5% / 232 largest single party.
  Coherence: very low — a caretaker without mandate managing the worst
  balance-of-payments crisis of independence-era India; laid
  groundwork for Rao-Singh reforms by making IMF path unavoidable.
policies:
  - in_gold_pledge_forex_crisis_1991
  - in_imf_standby_negotiation_initial_1991
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Gold pledge and forex emergency signalled severity of institutional failure; but laid path for subsequent RBI reform."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Caretaker interim budget; no structural fiscal change before collapse."}
predecessor_movements:

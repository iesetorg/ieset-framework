movement_id: netherlands_rutte_iv_2022_2024
status: candidate
name: "Rutte IV coalition (Netherlands, VVD-D66-CDA-CU)"

countries: [NLD]

timeframe:
  start: 2022
  end: 2024
  enacted_date: "2022-01-10"

coalition: "VVD-D66-CDA-ChristenUnie four-party coalition; formed after record 299-day formation following 17 March 2021 election; collapsed 7 July 2023 over asylum family-reunification dispute, ran caretaker to 2 July 2024"

leaders:
  - "Mark Rutte (Prime Minister, VVD; fourth and final term, October 2010 - July 2024)"
  - "Sigrid Kaag (Finance Minister, D66; stepped down January 2024)"
  - "Wopke Hoekstra (Foreign Affairs, CDA; later EU Climate Commissioner)"
  - "Carola Schouten (Deputy PM, ChristenUnie)"
  - "Rob Jetten (Climate and Energy Minister, D66)"
  - "Christianne van der Wal (Nature and Nitrogen Minister, VVD)"

doctrine: >
  Liberal-centrist Rutte-era orthodoxy under climate and housing stress —
  a continuation of the VVD-D66 fiscally conservative / socially liberal
  consensus but now forced to address the three crises the previous three
  Rutte cabinets had deferred: the nitrogen (stikstof) rulings, the
  Toeslagenaffaire childcare-benefit scandal, and the housing shortage.
  Centre of gravity: centre / centre-right on fiscal, centre on
  regulatory, pro-EU, pro-climate. Signature content: (i) 25bn-euro
  National Rural Area Programme (NPLG) and farm buyout funds in response
  to the May 2019 Raad van State Programma Aanpak Stikstof (PAS)
  annulment, with a 2030 50% nitrogen-reduction target; (ii) Wet
  toekomst pensioenen (Wtp) enacted 30 May 2023, the largest Dutch
  pension reform in decades — converting the second-pillar occupational
  system from defined-benefit collective contracts to individual
  defined-contribution "solidarity" or "flexible" premium schemes with
  transition by 2028; (iii) Box-3 wealth-tax remediation after the Hoge
  Raad's December 2021 Kerst-arrest declared the fictitious-yield system
  unlawful — Wet rechtsherstel box 3 (2022) and Overbruggingswet 2023
  with a promised real-return system; (iv) Toeslagenaffaire compensation
  programme (UHT, 30,000-euro + case-by-case) after the 2020-2021
  Kamerondervragingscommissie reckoning; Rutte III collapsed over this
  January 2021, Rutte IV executed the payout; (v) record energy-price
  interventions 2022-2023 — energieplafond (price cap, January-December
  2023), windfall levy on fossil producers, 23bn-euro Klimaatfonds;
  (vi) housing — Nationale Woon- en Bouwagenda targeting 900,000 homes
  by 2030, Wet Betaalbare Huur mid-market rent regulation enacted July
  2024; (vii) record increase in asylum reception pressure drove the
  July 2023 coalition collapse over family-reunification caps. Entered
  with 78/150 seats; VVD won again but D66 halved, CDA collapsed; the
  coalition never recovered the popularity of Rutte III's early phase.
  Approval dropped below 20% by mid-2023. Provincial elections 15 March
  2023 saw BBB (farmer party) win the most seats in Eerste Kamer,
  functionally breaking the government's upper-house majority. Coherence:
  moderate — the pension-reform and Toeslagenaffaire remediation were
  genuinely executed; the nitrogen, housing, and asylum programmes were
  enacted on paper but delivered sluggishly.

policies:
  - nl_wtp_pension_reform_2023
  - nl_toeslagenaffaire_compensation_2022_2024
  - nl_nitrogen_nplg_buyout_programme_2022_2023
  - nl_box3_rechtsherstel_overbrugging_2022_2023
  - nl_energieplafond_price_cap_2023
  - nl_wet_betaalbare_huur_2024

axes_summary:
  - axis: institutional.property_rights
    direction: "mixed"
    magnitude: moderate
    rationale: "Wtp pension reform moves accrued DB claims to individual DC accounts; contested on property-rights grounds. Box-3 Hoge Raad rulings strengthen taxpayer property claims."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    rationale: "Toeslagenaffaire compensation (~5bn euro), energieplafond (~5bn euro gross), energy allowance, Klimaatfonds."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: strong
    rationale: "25bn-euro NPLG nitrogen programme, 2030 50% reduction target, Klimaatfonds 23bn-euro, Klimaatwet tightening."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    rationale: "Energy crisis + climate + nitrogen pushed spending above Rutte-III baseline; Stability-and-Growth Pact headroom consumed."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: moderate
    rationale: "Wet Betaalbare Huur extended rent regulation to mid-market segment; energy price cap imposed sectoral control."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: weak
    rationale: "Coalition collapsed over proposed family-reunification restriction; even without enactment the directional signal was restrictionist."

outcome_hypotheses:
  - nl_dc_pension_transition_volatility
  - nl_nitrogen_programme_farm_exit

position_alignments:
  - {position_id: social_democratic, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Toeslagenaffaire and Box-3 remediation are accountability responses, not ideological."}
  - {position_id: austrian, alignment: opposed}

disclosure: >
  Rutte's fourth and final cabinet; Rutte himself now NATO Secretary-General.
  Coded content covers enacted and announced programme; 7 July 2023 fall was
  over migration but the government remained in caretaker office another
  year, during which Wet Betaalbare Huur and Wtp continued to be
  implemented.


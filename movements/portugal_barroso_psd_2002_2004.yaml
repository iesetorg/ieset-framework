# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_barroso_psd_2002_2004
status: candidate
name: "Durão Barroso PSD-CDS centre-right government"
countries: [PRT]
timeframe: {start: 2002, end: 2004}
coalition: "PSD + CDS-PP (centre-right)"
leaders:
  - "José Manuel Durão Barroso (PM)"
  - "Manuela Ferreira Leite (Finance)"
  - "Paulo Portas (Defence, CDS-PP)"
doctrine: >
  Economic school: Portuguese PSD reform-liberal Euro-orthodoxy —
  austerity-and-competitiveness response to 2001 inherited 4.4% deficit
  (breaching Maastricht 3%). Left-right axis: centre-right. Dated
  policies: "Programa de Estabilidade e Crescimento" March 2003
  implementing austerity; Lei de Estabilidade Orçamental (Law 91/2001)
  operationalisation; IVA VAT rate increased from 17% to 19% June 2002
  and from 19% to 21% June 2005 (successor-government continuation);
  civil-service wage freeze 2002-2004; public-sector recruitment freeze;
  parte variável nas pensões temporary discipline; labour code
  recodification Código do Trabalho 27 August 2003 (Lei 99/2003) —
  integrated labour-law unification; education reform; private-sector
  modernisation of SOEs; Azores Summit 16 March 2003 Iraq alignment
  (with Aznar, Blair, Bush); Barroso resigned 6 July 2004 to become
  European Commission President. Popularity: 2002 election PSD 40.2%
  won after Guterres resignation; coalition stable but austerity
  unpopular; succeeded by short-lived Santana Lopes caretaker
  government. Coherence: high — clear Euro-orthodoxy reform mission.
policies:
  - pt_codigo_do_trabalho_2003
  - pt_iva_rise_2002
  - pt_austerity_programme_2003
  - pt_iraq_azores_summit_2003
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Código do Trabalho 2003 consolidated and eased certain dismissal procedures."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Wage/recruitment freeze; austerity consolidation."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "VAT-led revenue mix (from 17% to 19%) is mildly regressive."}
predecessor_movements: [portugal_guterres_ps_1995_2002]
successor_movements: [portugal_socrates_ps_first_2005_2008]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Lei n.º 99/2003 (Código do Trabalho)"
  - "Programa de Estabilidade e Crescimento 2003-2006"
notes: "Short but consequential — labour-code recodification and austerity shaped subsequent cycle."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_petro_2022_present
status: candidate
name: "Petro government — first left-wing Colombian presidency (Colombia)"
countries: [COL]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: "2022-08-07"
coalition: "Pacto Histórico (Colombia Humana + MAIS + UP + PCC + Polo + dissident liberals) with early legislative support from Partido Liberal and Partido Conservador that eroded through 2023-2024"
leaders:
  - "Gustavo Petro (President 2022-2026)"
  - "José Antonio Ocampo (Finance Minister 2022-2023)"
  - "Ricardo Bonilla (Finance Minister 2023-2024)"
  - "Diego Guevara (Finance Minister 2024-2025)"
  - "Germán Umaña / Luis Carlos Reyes (Trade and Commerce)"
  - "Irene Vélez (Minerals and Energy 2022-2023)"
  - "Andrés Camacho (Minerals and Energy from 2023)"
doctrine: >
  First left-wing Colombian presidency in modern history. The self-
  described "economía de la vida" (economy of life) doctrine combines:
  (i) redistributive tax reform (Ley 2277 of 2022 / Reforma Tributaria)
  raising ~1.3% of GDP in additional revenue via higher top-bracket
  income tax, wealth tax, dividend taxation, extractive-sector windfall
  taxes, and sugary-drinks excise; (ii) pension reform (Ley 2381 of
  2024) establishing a pillar-based system with expanded solidarity
  pillar and contribution floor channeled through Colpensiones, later
  suspended by the Constitutional Court in 2025 over procedural
  grounds; (iii) labour reform (multiple drafts 2022-2024, partial
  advance) re-expanding overtime premiums and formalisation
  mandates; (iv) health-sector reform (archived then rewritten,
  contested — shifting gatekeeping away from private EPSs toward
  ADRES direct administration); (v) energy-transition posture —
  declared cessation of new oil-and-gas exploration contracts
  (August 2022 administrative posture), preserved existing
  contracts, producing an ongoing contest between fiscal dependence
  on hydrocarbons (~40% of exports, ~20% of fiscal revenue) and
  climate doctrine; (vi) security-policy pivot toward "paz total"
  (total peace) multilateral negotiations with ELN, dissident FARC
  factions, and gaitanista / Clan del Golfo groups, with contested
  ceasefires and rising homicide rates in some departments.
  Coalition dynamics: Pacto Histórico is a minority in Congress;
  after 2023 Centro Democrático-Conservador-Liberal opposition
  consolidated, major reforms faced reduced passage rate; 2024
  cabinet reshuffles reflected this constraint. Early outcomes:
  2023 GDP growth 0.7%, 2024 ~1.7% (below LatAm average); peso
  depreciated against USD into 2024 then rebounded; inflation
  rose to 13.3% in March 2023 then declined to ~5.2% by end-2024;
  FDI patterns mixed. Public order has deteriorated in some
  regions per peace-process spoilers.
policies:
  - colombia_reforma_tributaria_2022
  - colombia_pension_reform_ley_2381_2024
  - colombia_labour_reform_2023_2024
  - colombia_health_reform_proposal_2023_2024
  - colombia_oil_gas_exploration_moratorium_2022
  - colombia_paz_total_2022
  - colombia_minimum_wage_increases_2023_2024
axes_summary:
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: moderate
    rationale: "Top-bracket rates raised; wealth tax reinstated; dividend taxation restructured."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Extractive-sector windfall taxes added; surtaxes on financial sector retained."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Renta Ciudadana replaced Familias en Acción + Colombia Mayor expansion; pension solidarity pillar widens transfers if implemented."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    rationale: "Labour reform restores weekend/night overtime premiums; reduces fixed-term contract use."
  - axis: regulatory.energy_supply_security
    direction: "-"
    magnitude: moderate
    rationale: "No new oil-gas exploration contracts; reserve-replacement ratio threatened beyond ~2030 per Ecopetrol disclosures."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: moderate
    rationale: "Energy-transition administrative posture; moratorium on new fossil exploration."
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: weak
    rationale: "Health reform attempts to centralise gatekeeping via ADRES; partially blocked."
  - axis: institutional.rule_of_law
    direction: "mixed"
    magnitude: weak
    rationale: "Paz total produced uneven territorial control; Constitutional Court remains active check on executive overreach."
outcome_hypotheses:
  - petro_reform_package_economic_trajectory_2022_present
predecessor_movements:
  - colombia_uribe_santos_duque_market_continuity_2002_2022
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: eco_socialist, alignment: partially_aligned, notes: "Energy-transition doctrine aligns with eco-socialist framing; fiscal dependence on hydrocarbons constrains implementation."}
  - {position_id: marxian, alignment: partially_aligned}
steelman: movements/steelman/colombia_petro_2022_present.md
disclosure: >
  Only ~2 years of data at time of spec drafting (Aug 2022 to
  Apr 2026). Pre-registration locks the spec so a v1.1 run at
  the 2027 endpoint is meaningful. Framework codes policy content;
  judgments on effectiveness remain premature and that is explicit.
  Author prior on the specific outcome hypothesis is mid-range
  (0.55) rather than high, reflecting genuine uncertainty.
references:
  - "Ley 2277 de 2022 (Reforma Tributaria)"
  - "Ley 2381 de 2024 (Reforma Pensional) — suspended 2025"
  - "DNP Plan Nacional de Desarrollo 'Colombia Potencia Mundial de la Vida' 2022-2026"
  - "IMF Article IV Colombia 2023, 2024"
  - "Ministerio de Minas y Energía — Política Energética 2022"
notes: >
  Distinct from the 2002-2022 market-continuity era (Uribe / Santos /
  Duque) coded as a separate predecessor movement. Petro content-
  coding positive on redistributive and environmental-stringency
  axes, negative on labour-flexibility and energy-supply-security.
  Early-assessment caveats are first-class; the v1 specification
  commits to the coding regardless of subsequent political turnover.

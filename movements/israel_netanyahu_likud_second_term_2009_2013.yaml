movement_id: israel_netanyahu_likud_second_term_2009_2013
status: candidate
name: "Netanyahu II Likud government (Israel)"
countries: [ISR]
timeframe:
  start: 2009
  end: 2013
  enacted_date: "2009-03-31"
coalition: "Likud-led coalition with Yisrael Beiteinu, Labor (until 2011), Shas, Habayit Hayehudi, Independence; Netanyahu second premiership"
leaders:
  - "Benjamin Netanyahu (Prime Minister 31 Mar 2009 - 18 Mar 2013)"
  - "Yuval Steinitz (Finance Minister)"
  - "Stanley Fischer (Bank of Israel Governor until Jun 2013)"
  - "Avigdor Lieberman (Foreign Minister)"
  - "Ehud Barak (Defence Minister)"
doctrine: >
  Likud market-liberal continuation of Netanyahu-2003 stabilisation with
  macroeconomic orthodoxy, CBI-centered stabilisation, and gas-resource
  institutionalisation. Economic school: market-liberal-continuity —
  Fischer-led CBI ran 2009-2011 rate-hike cycle, 2010 Bank of Israel Law
  enacted, Sheshinski-I natural-gas royalty framework enacted Mar 2011
  after Leviathan (2010) and Tamar (2009) discoveries, and Trajtenberg
  Committee response to Summer 2011 Cottage-Cheese/Rothschild tent protests
  recommended tax-progressivity tweaks and childcare expansion. Dated
  policies: Bank of Israel Law enacted 12 Mar 2010; Sheshinski gas royalty
  law enacted 30 Mar 2011; Trajtenberg Committee report 26 Sep 2011; 2011
  social-justice protests peaked ~450,000 demonstrators 3 Sep 2011. Plus
  Operation Pillar of Defense Gaza Nov 2012. Left-right: centre-right,
  economically market-liberal with progressive-response concessions;
  security hawkish, Iran-deal-opposition pre-JCPOA. Popularity: 2009
  election Likud 27/120 seats but formed coalition; 2013 election (22 Jan
  2013) Likud-Beiteinu 31 seats vs Yesh Atid 19 (surprise), returning
  Netanyahu for a third term. Coherence: high on economic-continuity pillar,
  strained by 2011 protest-driven mid-course tax concessions and
  Trajtenberg implementation gaps.
policies:
  - il_bank_of_israel_law_2010
  - il_sheshinski_gas_royalty_2011
  - il_trajtenberg_committee_2011
  - il_cottage_cheese_tax_response_2011
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Bank of Israel Law 2010 codified operational independence, dual mandate, monetary committee."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Trajtenberg package raised top marginal rates and capital-gains rate modestly post-2011 protests."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Sheshinski raised government share of gas rents from ~30% to ~52-62%."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "2012 Concentration Committee (Ben-Haim) recommendations on pyramidal ownership."}
outcome_hypotheses: [resource_taxation_and_growth]
predecessor_movements: [israel_olmert_kadima_2006_2009]
successor_movements: [israel_netanyahu_likud_third_fourth_term_2013_2019]
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Continuation of Netanyahu-2003 liberal reform programme; CBI-anchor macro orthodoxy."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Fischer-led inflation-targeting regime institutionalised."}
references:
  - "Bank of Israel Law 5770-2010"
  - "Trajtenberg Committee Report (Sep 2011)"
  - "Sheshinski Committee Report (Jan 2011)"
  - "Israel CBS elections data 2009, 2013"
notes: "Olmert-Netanyahu II transition was continuity on macro-policy; Fischer served both governments."

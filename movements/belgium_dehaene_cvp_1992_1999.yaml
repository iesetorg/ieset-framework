movement_id: belgium_dehaene_cvp_1992_1999
status: candidate
name: 'Dehaene Christian-democrat/socialist coalition: Global Plan and EMU convergence'
countries:
- BEL
timeframe:
  start: 1992
  end: 1999
coalition: CVP/PSC-SP/PS (Dehaene I, 1992-1995) and (Dehaene II, 1995-1999)
leaders:
- Jean-Luc Dehaene (PM)
- Philippe Maystadt (Finance Minister, PSC)
- Herman Van Rompuy (Budget Minister, CVP)
- Alfons Verplaetse (NBB Governor)
doctrine: 'Two consecutive Dehaene governments delivered Belgium''s EMU convergence against a
  debt/GDP peak near 138% (1993) — requiring the largest sustained consolidation in Belgian post-war
  history — while managing the final steps of the federal-state transition. Economic school: Rhineland/Bismarckian
  Christian-democrat welfare conservation combined with ordoliberal EMU discipline and concertative
  wage-norms. Left-right axis: centre. Key content: (i) Global Plan ''Plan Global pour l''Emploi,
  la Compétitivité et la Sécurité sociale'' November 1993 — tripartite package freezing real wages,
  cutting employer social contributions for low-wage hiring, indirect-tax increases, family-benefit
  means-testing; (ii) Wage Norm Law 26 July 1996 — statutory formula bounding Belgian wage growth
  to neighbour trio (DE/FR/NL) averages, institutionalising competitiveness discipline; (iii)
  Franc fort belgian anchor to DM sustained through 1993 EMS crisis; (iv) Fourth state reform
  1993 finalised via Saint-Michel agreements — Belgium constitutionally federal 17 February 1994;
  (v) NBB independence finalised ahead of ESCB integration; (vi) Debt trajectory: debt/GDP from
  137.9% (1993) to 113.6% (1999); primary surplus averaged ~6% GDP; (vii) Maastricht convergence
  — deficit from 7.4% (1992) to 0.7% (1999); (viii) Sabena privatisation attempts (SAir stake
  1995); (ix) Belgacom partial privatisation 1996 (sold to ADSB consortium); (x) Dioxin crisis
  May-June 1999 — contamination scandal that broke Dehaene II''s electoral chances; (xi) Euro
  conversion rate set 1998. Popularity: 1991 election CVP 16.7%, PS 13.6% (Dehaene built coalition
  with SP); 1995 elections coalition retained majority (Dehaene II); June 1999 dioxin-crisis election
  CVP collapsed — first Verhofstadt VLD-led ''purple'' coalition ended 41 years of uninterrupted
  CVP/PSC governance. Coherence: very high — Global Plan + Wage Norm + debt consolidation + federal
  reform + EMU entry comprised a tightly- coupled agenda that delivered the Maastricht criteria
  despite a starting position many observers judged impossible.

  '
policies:

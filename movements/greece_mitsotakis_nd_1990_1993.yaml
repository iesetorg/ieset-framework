movement_id: greece_mitsotakis_nd_1990_1993
status: candidate
name: "Mitsotakis Sr. ND: stabilisation, privatisations, austerity programme"
countries: [GRC]
timeframe: {start: 1990, end: 1993}
coalition: "Nea Dimokratia majority (152/300 seats)"
leaders:
  - "Konstantinos Mitsotakis (PM)"
  - "Ioannis Palaiokrassas (Finance Minister 1990-1992)"
  - "Stefanos Manos (National Economy Minister 1992-1993)"
  - "Efthymios Christodoulou (Bank of Greece Governor from 1992)"
doctrine: >
  First stable ND government after 1989-1990 electoral deadlocks, tasked
  with correcting the 1988-1989 fiscal/inflation explosion inherited
  from Papandreou I. Economic school: classical-liberal / ordoliberal
  with supply-side-moderate reformism — Manos the most programmatic
  Greek liberal of the era. Left-right axis: centre-right. Key content:
  (i) Stabilisation Programme 1991-1993 — targeted inflation fall from
  ~20% (1990) to below 10% (achieved 1994 under successor); (ii) VAT
  increase to 18% 1992; excise rationalisation; (iii) Privatisation
  programme Law 2000/1991 — Heracles Cement sold to Calcestruzzi 1992,
  Athens Bus preparation, AGET, Olympic Airways restructuring attempts,
  Public Petroleum Corporation (ELDA) privatisation preparation;
  (iv) Bank of Greece reforms preparing independence (full independence
  Law 2548/1997 under Simitis); (v) Deregulation of drachma and
  currency restrictions; financial-sector licensing opened; (vi) Social
  security contribution reforms and first talk of pension parametric
  adjustments; (vii) OTE partial flotation prep (delayed to 1996);
  (viii) Labour code reforms decree-law 1264/1982 partially amended;
  (ix) Macedonia naming dispute mobilised through 1991-1993 — antagonised
  relations with Skopje; (x) Single Market 1993 preparation and
  implementation. Popularity: April 1990 ND 46.9% / 150 seats (just
  short — supplemented by one MP from DIANA); public-sector strikes
  1991-1992 over austerity; Samaras (Foreign Minister 1989-1992)
  resigned over Macedonia, founded Politiki Anoixi September 1993
  splitting ND majority; October 1993 election PASOK 46.9% / 170 seats
  landslide, ND 39.3% / 111 seats. Coherence: moderate — stabilisation
  aims clear but implementation often partial; Manos reformism more
  ambitious than government majority/political-capital permitted;
  privatisations often delayed or small-scale; subsequent Simitis-era
  reforms completed some Manos-era unfinished business.
policies:

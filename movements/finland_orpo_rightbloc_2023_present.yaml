movement_id: finland_orpo_rightbloc_2023_present
status: candidate
name: "Orpo centre-right four-party government (Finland, 2023-present)"
countries: [FIN]
timeframe: {start: 2023, end: ongoing, enacted_date: "2023-06-20"}
coalition: "Kansallinen Kokoomus (NCP) - Perussuomalaiset (Finns Party) - Kristillisdemokraatit (KD) - Ruotsalainen kansanpuolue (RKP/SFP), formed 20 June 2023 following the April 2023 Eduskunta election"
leaders:
  - "Petteri Orpo (Prime Minister, Kokoomus leader, 2023-)"
  - "Riikka Purra (Finance Minister and Finns Party leader, 2023-)"
  - "Anna-Maja Henriksson (Education Minister, RKP leader, 2023-2024)"
  - "Sari Essayah (Minister of Agriculture and Forestry, KD leader)"
  - "Antti Häkkänen (Defence Minister, Kokoomus)"
doctrine: >
  Centre-right fiscal-consolidation cabinet combining Kokoomus's liberal-
  conservative market orientation with Finns Party migration restrictionism,
  Christian Democrat social conservatism, and RKP's pro-business Swedish-
  speaking liberal wing. Stated doctrine: close Finland's structural deficit
  via a ~EUR 9 billion consolidation package over the 2023-2027 term
  (roughly half spending cuts, half revenue measures), reform labour-market
  rules to raise employment rate toward 80 percent, and tighten migration
  and integration policy. Key measures: phased cuts to unemployment and
  housing benefits (2024), restrictions on industrial action (local
  bargaining expansion, narrower political-strike rights), labour market
  reform package enacted 2024, residence-permit and citizenship tightening
  2024-2025, finalisation of the sote-uudistus social and health-care
  regional wellbeing-services reform inherited from Marin, completion of
  Finland's NATO accession (ratified 4 April 2023) and signing of the
  defence cooperation agreement with the United States (2023). Left-right
  axis: centre-right to right, with a populist-right partner driving
  migration and cultural policy. Seat share: Kokoomus 48, Finns 46, RKP 9,
  KD 5 — 108/200. Orpo approval fell from roughly 40 percent at formation
  toward mid-20s by late 2024 amid austerity and Finns Party racism
  scandals; in the January/February 2024 presidential election the
  Kokoomus-affiliated Alexander Stubb defeated Green-backed Pekka Haavisto
  51.6-48.4 in the second round, preserving the centre-right coalition's
  institutional position. Coherence judgement: ideologically coherent on
  fiscal consolidation and migration restriction, strained on EU/climate
  policy where Kokoomus-RKP europeanism collides with Finns Party
  euroscepticism.
policies:
  - fi_nato_accession_2023
  - fi_orpo_fiscal_consolidation_2023
  - fi_labour_market_reform_2024
  - fi_sote_wellbeing_services_2023
  - fi_immigration_tightening_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "EUR ~9bn multi-year consolidation, benefit cuts, headcount freezes; structural deficit reduction targeted 2024-2027."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Unemployment benefit tapering, housing benefit cuts, adult education allowance abolition 2024."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Local bargaining expansion, narrower political strike rights, easier dismissal on personal grounds."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Residence-permit income thresholds raised, citizenship residency extended from 5 to 8 years, asylum border procedures tightened."}
  - {axis: regulatory.environmental_stringency, direction: "0", magnitude: weak, rationale: "2022 Climate Act targets retained but implementation timelines softened; no major rollback or tightening."}
  - {axis: institutional.rule_of_law, direction: "0", rationale: "No material change; Nordic baseline preserved despite political controversies over Finns Party ministerial statements."}

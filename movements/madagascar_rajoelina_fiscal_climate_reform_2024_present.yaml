# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: madagascar_rajoelina_fiscal_climate_reform_2024_present
status: candidate
name: Madagascar fiscal and climate reform programme 2024-present
countries: [MDG]
timeframe:
  start: 2024
  end: ongoing
coalition: Rajoelina government
leaders:
  - "Andry Rajoelina (President, 2024-)"
  - "Christian Ntsay (Prime Minister, 2018-2024)"
  - "Ntsay and successor governments under Rajoelina's second elected term"
doctrine: >
  Madagascar's 2024 reform programme presents IMF re-engagement, fiscal
  consolidation, energy-subsidy reduction, and climate-resilience regulation as
  the basis for restoring macroeconomic stability while protecting priority
  investment. The regime is coded narrowly around enacted or programme-backed
  fiscal, fuel-pricing, and environmental-assessment measures rather than as a
  broad claim about nationwide implementation capacity.
policies:
  - mdg_imf_ecf_rsf_2024
  - mdg_automatic_fuel_price_adjustment_2024
  - mdg_environmental_social_impact_assessment_decree_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "ECF fiscal targets and reduced fuel under-recoveries restrain subsidy-driven spending pressure."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Automatic fuel-price adjustment lowers petroleum subsidy exposure."}
  - {axis: regulatory.price_control_intensity, direction: "-", magnitude: moderate, rationale: "Fuel pump prices move toward formula-based adjustment rather than discretionary ceilings."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "RSF-linked climate reforms and ESIA rules increase project-screening stringency."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Programme governance, public-financial-management, and ESIA procedures add rule-bound administrative requirements."}
references:
  - "IMF, Republic of Madagascar 2024 Article IV Consultation and First Review under the ECF and RSF, 2025."
  - "Government of Madagascar fuel-pricing and environmental-assessment policy materials, 2024."
notes: >
  Weak-publication-state source posture: the movement relies heavily on IMF
  programme documentation and should be treated as a formal-policy regime, not a
  claim that implementation was uniform across the country.

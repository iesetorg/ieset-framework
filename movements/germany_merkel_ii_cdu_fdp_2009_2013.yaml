movement_id: germany_merkel_ii_cdu_fdp_2009_2013
status: candidate
name: Merkel II CDU/CSU-FDP centre-right coalition 2009-2013
countries:
- DEU
timeframe:
  start: 2009
  end: 2013
  enacted_date: '2009-10-28'
coalition: CDU/CSU (239) + FDP (93) Black-Yellow
leaders:
- Angela Merkel (Chancellor)
- Wolfgang Schäuble (Finance Minister)
- Guido Westerwelle (FDP, Foreign/Vice-Chancellor)
doctrine: 'Only Merkel term with a clean centre-right majority, dominated by the Eurozone sovereign-debt
  crisis. Doctrine: ordoliberal conditionality — bilateral and ESFS/EFSF/ESM support for Greece-Ireland-Portugal-Spain-Cyprus
  contingent on austerity and structural reform, rules-based euro-area governance (Fiscal Compact
  2012, Six-Pack, ESM Treaty Sep 2012). Defining domestic pivot was the Atomausstieg decision
  (Jun 2011 post-Fukushima) reversing an earlier 2010 lifetime-extension — the Energiewende acceleration
  anchoring coalition greenflation. Also: Sparpaket austerity package (Jun 2010 €80bn over 4 years),
  FDP-pushed tax simplification (Wachstumsbeschleunigungsgesetz 2009), and explicit rejection
  of federal minimum wage (deferred to Merkel III). Left-right: centre-right, fiscally orthodox.
  Popularity: CDU/CSU 33.8% vote 2009, rising to 41.5% in 2013 on Merkel personal brand; FDP collapsed
  from 14.6% to 4.8% (below 5% threshold, expelled from Bundestag). Coherence: high on rules-based
  euro-area management; incoherent on energy policy (simultaneous nuclear exit and coal-dependency
  prolongation).

  '

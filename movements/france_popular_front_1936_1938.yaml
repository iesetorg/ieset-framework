# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: france_popular_front_1936_1938
status: candidate
name: "Popular Front social reform and railway nationalisation (France)"
countries: [FRA]
timeframe: {start: 1936, end: 1938}
coalition: "SFIO-Radical governments under Leon Blum and Camille Chautemps with Communist parliamentary support"
leaders:
  - "Leon Blum (Prime Minister 1936-1937, 1938)"
  - "Camille Chautemps (Prime Minister 1937-1938)"
  - "Vincent Auriol (Finance Minister 1936-1937)"
  - "Roger Salengro (Interior Minister, Matignon mediator)"
doctrine: >
  The Popular Front answered the depression and the May-June 1936 strike
  wave with a program of labour pacification, purchasing-power recovery,
  and selective state coordination rather than wholesale socialisation.
  Its own logic was that republican democracy could be stabilised only by
  recognising trade-union legitimacy, converting plant occupations into
  collective bargaining, shortening hours without cutting weekly pay,
  guaranteeing paid annual leave, and rescuing the fragmented railway
  system through national coordination. The movement's signature package
  therefore combined the Matignon labour compromise, the two-week paid
  vacation law, the forty-hour week, and the 1937-1938 creation of SNCF.
policies:
  - france_matignon_agreements_1936
  - france_paid_vacations_law_1936
  - france_40_hour_week_1936
  - france_sncf_nationalisation_1937
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: strong, rationale: "Matignon, paid leave, and the 40-hour week materially thickened labour standards and bargaining obligations."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "The regime translated mass strike pressure into formal collective-bargaining and worker-representation rules rather than extra-legal settlement."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Railway nationalisation consolidated a strategic network under a state-backed concessionary structure."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: weak, rationale: "SNCF reduced private inter-line competition in favour of a single coordinated national operator."}
position_alignments:
- position_id: democratic_socialist
  alignment: aligned
  notes: SFIO-led labor reform, collective bargaining, paid leave, and strategic nationalisation fit a democratic socialist reform program inside parliamentary democracy.
- position_id: social_democratic
  alignment: aligned
  notes: The Matignon agreements and welfare-labor reforms expanded worker protection without abolishing electoral politics or the market economy.
- position_id: marxian
  alignment: partially_aligned
  notes: Communist support and class-conflict framing were important, but the government pursued negotiated reforms rather than a Marxist command economy.
- position_id: market_socialist
  alignment: partially_aligned
  notes: Railway nationalisation and public coordination overlapped with market-socialist tools, while most production remained privately owned.

references:
  - "Accords Matignon, 7 juin 1936"
  - "Loi du 20 juin 1936 instituant un conge annuel paye"
  - "Loi du 21 juin 1936 instituant la semaine de 40 heures"
  - "Decret-loi du 31 aout 1937 portant reorganisation du regime des chemins de fer"
  - "Jackson (1988), The Popular Front in France"
notes: "Historical backfill anchor for interwar France. Distinct from the post-1945 dirigiste movement: the Popular Front's core content was labour-law reform plus selective strategic nationalisation under Third Republic institutions."

movement_id: srilanka_gotabaya_rajapaksa_slpp_2019_2022
status: candidate
name: "Gotabaya Rajapaksa SLPP — Vistas of Prosperity (Sri Lanka)"
countries: [LKA]
timeframe:
  start: 2019
  end: 2022
  enacted_date: "2019-11-18"
coalition: "Sri Lanka Podujana Peramuna (SLPP) — 145/225 seats at Aug 2020 parliamentary landslide; 6.9m votes / 52.3% presidential Nov 2019"
leaders:
  - "Gotabaya Rajapaksa (President 18 Nov 2019 - 14 Jul 2022, resigned)"
  - "Mahinda Rajapaksa (PM 2019-2022, resigned 9 May 2022)"
  - "Basil Rajapaksa (Finance Minister 2021-2022)"
  - "Ajith Nivard Cabraal (CBSL Governor 2021-2022)"
  - "P. B. Jayasundera (Presidential Secretary)"
doctrine: >
  Right-populist Sinhala-Buddhist nationalist governance combining
  technocratic-military framing ('Viyathmaga' professionals, former
  officers in cabinet) with retail tax-cut populism. Core policy
  content: (i) November-December 2019 tax package — VAT 15%->8%,
  PAYE abolition, NBT abolition, WHT removal, VAT-threshold hike —
  collapsing tax-to-GDP from ~12% to ~8.3% by 2021; (ii) 29 Apr
  2021 gazetted ban on chemical fertiliser and agrochemical imports
  forcing overnight organic-farming pivot mid-cropping cycle,
  producing ~20% rice yield loss and tea-export hit; (iii) CBSL
  monetary financing of fiscal deficit and forex-rate defence
  through 2020-2021 that exhausted reserves; (iv) 12 April 2022
  pre-emptive suspension of external-debt service — first sovereign
  default in Sri Lankan history; (v) 20A constitutional amendment
  (Oct 2020) reversing the 19A independence-commissions architecture
  and re-concentrating executive power; (vi) Port City Colombo
  Economic Commission Act (2021) creating a special legal zone with
  its own regulator. Coherence line: nationalist mandate + revenue-
  collapsing tax populism + abrupt regulatory shock in agriculture
  + delayed IMF engagement -> terminal forex crisis -> Aragalaya.
  Popularity: 2019 presidential 52.3% / 6.9m votes; Aug 2020
  parliamentary 145/225 SLPP seats plus allies approaching
  two-thirds; approval collapsed through Q1 2022 under 40%+ CPI
  inflation, queue lines for fuel/cooking-gas/medicines, and daily
  12-hour blackouts; 9 July 2022 Presidential Secretariat/Palace
  storming by Aragalaya protesters; Gotabaya fled to Maldives then
  Singapore and formally resigned 14 July 2022 — first Sri Lankan
  president removed by popular uprising.
policies:
  - lk_rajapaksa_tax_cuts_2019
  - lk_organic_farming_mandate_2021
  - lk_sovereign_default_2022
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: strong, rationale: "PAYE abolition + VAT halving + threshold hike."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: strong, rationale: "Corporate-rate cuts 2019."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Deficit widened via revenue loss and fertiliser-compensation package."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Fertiliser and agrochemical import ban 2021."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "Agriculture-input mandate."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "CBSL deficit monetisation 2020-2022 and forex-rate defence."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Unilateral external-debt suspension Apr 2022."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "20A amendment reversed independent-commissions architecture."}
outcome_hypotheses:

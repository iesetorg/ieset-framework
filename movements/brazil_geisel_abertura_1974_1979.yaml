movement_id: brazil_geisel_abertura_1974_1979
status: candidate
name: "Geisel military — II PND developmentalism + abertura"
countries: [BRA]
timeframe: {start: 1974, end: 1979, enacted_date: "1974-03-15"}
coalition: "Military regime (ARENA front party); Castelo-Branco 'Sorbonne' technocratic faction"
leaders:
  - "Ernesto Geisel (President, General 1974-1979)"
  - "Mário Henrique Simonsen (Finance 1974-1979)"
  - "João Paulo dos Reis Velloso (Planning 1974-1979)"
  - "Shigeaki Ueki (Mines and Energy 1974-1979)"
  - "Golbery do Couto e Silva (Casa Civil)"
doctrine: >
  Developmentalist response to the 1973 oil shock combined with controlled
  political liberalisation ("distensão" becoming "abertura"). Four
  doctrinal pillars: (1) Second National Development Plan (II PND,
  September 1974) — a USD ~150bn heavy-industry, energy, and infrastructure
  programme financed by external petrodollar borrowing; state enterprises
  Eletrobras, Petrobras, CSN, Siderbrás, and the BNDES as directing
  financier; import-substitution deepened into capital goods and
  intermediate inputs; (2) energy substitution — Proálcool programme
  (November 1975) mandating sugar-ethanol fuel; Itaipu binational
  hydro-dam construction (1975-1984); Brazil-West Germany nuclear
  agreement (June 1975) for eight reactors; Petrobras-risk-contract law
  (1975) opened E&P to foreign partners after 1973 oil shock; (3)
  controlled political liberalisation — "distensão" 1974 midterms allowed
  MDB opposition gains (16 of 22 Senate seats); 1977 "April Package"
  reversed via indirect senators; 1978 Amnesty Law signed under Geisel
  successor; AI-5 expired December 1978; (4) macro aggregate — growth
  remained 7-8%/year 1974-1977 (late "Brazilian miracle") but external
  debt rose from USD 17bn (1974) to USD 49bn (1979), inflation stuck near
  40% by end of term, and the BOP vulnerability that detonated 1981-82
  was seeded in this period. Stated school: national-developmentalist
  planning + state-enterprise expansion. Left-right axis: authoritarian-
  right on political content, statist-developmentalist-centre on
  economic content. Popularity / legitimacy: no direct election —
  indirect electoral college; 1974 ARENA-MDB legislative election MDB
  won 14.7M votes to ARENA's 10.9M, signalling erosion of regime
  legitimacy despite "miracle" growth. Coherence line: trade short-
  term BOP discipline for infrastructure + heavy industry capacity
  that would later support democratic Brazil's industrial base.
policies:
  - br_ii_pnd_1974
  - br_proalcool_1975
  - br_nuclear_accord_germany_1975
  - br_amnesty_law_1979
  - br_petrobras_risk_contracts_1975
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "II PND heavy-industry and Proálcool subsidy programme."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public-sector investment share of GDP peaked ~12%."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "SOE expansion; Itaipu Binacional; nuclear monopoly."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Deepened ISI into capital goods; import-licence regime extended."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Gradual distensão; AI-5 expiry December 1978; 1979 Amnesty Law."}
outcome_hypotheses: [developmentalist_state_growth_performance, external_debt_crisis_channel]
successor_movements: [brazil_figueiredo_final_military_1979_1985]
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: chicago_monetarism, alignment: opposed}
references:
  - "II Plano Nacional de Desenvolvimento 1975-1979, Lei 6151/74"
  - "Decreto 76.593/1975 (Proálcool)"
  - "Acordo Nuclear Brasil-República Federal da Alemanha, 27 June 1975"
  - "Lei da Anistia 6683/1979"
  - "Baer (2008), The Brazilian Economy, ch. 5-6"
  - "Skidmore (1988), The Politics of Military Rule in Brazil 1964-1985"
notes: "Bridges 1964-73 'miracle' era to Figueiredo final military phase."

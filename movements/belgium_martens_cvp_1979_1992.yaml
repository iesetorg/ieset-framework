movement_id: belgium_martens_cvp_1979_1992
status: candidate
name: 'Martens CVP-led coalitions (Belgium): devaluation, indexation adjustment, federalisation'
countries:
- BEL
timeframe:
  start: 1979
  end: 1992
coalition: 'Multiple coalitions 1979-1992 — most durable: CVP/PSC-PRL/PVV Martens V-VI (1981-1988);
  later CVP/PSC-PS/SP (Martens VIII-IX 1988-1992)'
leaders:
- Wilfried Martens (PM with interruption, 3 April 1979 - 7 March 1992)
- Jean Gol (Justice + Institutional Reform, PRL 1981-1988)
- Guy Verhofstadt (Budget, PVV 1985-1988)
- Mark Eyskens (Finance Minister 1980-81, PM briefly 1981)
- Philippe Maystadt (Finance Minister 1988-1995, PSC)
doctrine: 'Long Martens cycle spanning pro-market centre-right adjustment (1981-1988 with Gol-Verhofstadt
  liberals) and federalising centre-left-inclusive coalitions (1988-1992). Economic school: Christian-democratic
  CVP/PSC with PRL/PVV neoclassical-liberal overlay 1981-88 — the period of Belgium''s franc devaluation
  and budget consolidation; then PS/SP social-democratic reintegration 1988-1992 for constitutional
  reform. Left-right axis: centre-right 1981-1988, centre-left 1988-1992; the one movement spans
  both because Martens''s continuity and the gradual federalisation programme are the connecting
  thread. Key content: (i) 21-22 February 1982 franc devaluation (8.5% against EMS parity grid)
  under Martens V combined with (ii) wage-index freeze / ''sauts d''index'' (three jumps skipped
  1982-1984); (iii) ''special powers'' laws 1982-1985 enabling decree-based budget consolidation;
  (iv) public-enterprise restructuring — Sabena restructuring agreements, SNCB restructuring,
  coal-mine closures (last Kempen mine closed 1992); (v) federal-state reform: three-stage federalisation
  1980 (communities), 1988 (regional competences), 1993 (constitutional revision declaring Belgium
  ''federal state''); (vi) 1985 Heizel stadium disaster institutional-response; (vii) Agusta-Dassault
  scandal 1989-1996 implicating PS and SP; (viii) public-debt trajectory: debt/GDP 69% (1978)
  → 135% (1993) — stabilisation effort bent but did not reverse trajectory; (ix) Tobback-Cools
  migration reform; (x) 2 August 1989 Maastricht- preparation constitutional reforms. Popularity:
  1978 election CVP dominant; 1981 election CVP 19.7% (split legacy; pre-Flemish-split CVP had
  been ~30%); 1985 election CVP 21.3% PRL 9.4% PVV 10.7%; 1987 CVP 19.5%; 1991 black Sunday saw
  Vlaams Blok rise to 6.6%; coalition exhaustion brought Dehaene March 1992. Coherence: the long
  Martens era held the federation together through the transition from unitary to federal state
  while enacting substantial but incomplete fiscal adjustment; coherence frayed across coalitions
  but the Martens-CVP anchor was real.

  '

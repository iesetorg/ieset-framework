movement_id: egypt_sadat_infitah_1976_1981
status: candidate
name: "Sadat Infitah — Open Door opening, Camp David, bread riots, assassination"
countries: [EGY]
timeframe: {start: 1976, end: 1981}
coalition: "National Democratic Party (NDP, founded 1978 from ASU right wing)"
leaders:
  - "Anwar Sadat (President 1970-1981, assassinated 6 October 1981)"
  - "Mamdouh Salem (PM 1975-1978)"
  - "Mustafa Khalil (PM 1978-1980)"
  - "Abdel Aziz Hegazi (Deputy PM for Economic Affairs)"
doctrine: >
  Sadat-era Infitah (الانفتاح — 'Opening') reversed Nasserist Arab socialism
  toward a mixed economy with foreign investment, private-sector revival,
  and Western/Gulf capital inflows. Economic school: partial liberalisation
  under authoritarian presidentialism — Law 43 of 1974 (Foreign Investment
  and Free Zones) extended through the 1976-81 period; multiple-exchange-rate
  regime with a commercial rate more favourable to exporters; subsidised
  consumer goods retained. Left-right axis: shift from Nasserist left toward
  centre-right market opening while keeping authoritarian political
  structure. Popularity / legitimacy: January 1977 'bread riots' (IMF-
  recommended subsidy cuts triggered nationwide unrest, 800+ deaths,
  subsidies restored within 48 hours) were the single largest domestic
  rupture; November 1977 Jerusalem visit and March 1979 Egypt-Israel
  Peace Treaty produced Arab League expulsion, US annual aid ($1.3bn
  military + $815m economic from 1979), and substantial domestic-
  Islamist backlash culminating in Sadat's October 1981 assassination.
  Coherence: content direction clear (open to capital, ally with US,
  peace with Israel) but fiscal-political sustainability fragile —
  subsidy cuts impossible without regime risk.
policies:
  - eg_infitah_deepening_1976_1981
  - eg_camp_david_treaty_economic_effects_1979
  - eg_1977_bread_riots_subsidy_retention
  - eg_us_aid_package_institutionalisation_1979
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Infitah Law 43 deepening; commercial-rate exchange window; free zones expanded."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Re-entry of foreign banks and joint-venture Egyptian banks."}
  - {axis: fiscal.sectoral_subsidy, direction: "0", magnitude: moderate, rationale: "Bread riots forced subsidy retention — attempted cut reversed within 48 hours."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Private-sector re-entry in some industries; SOE core preserved."}

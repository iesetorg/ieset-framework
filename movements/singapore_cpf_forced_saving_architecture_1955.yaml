# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: singapore_cpf_forced_saving_architecture_1955
status: candidate
name: "Singapore CPF + MediShield forced-saving welfare architecture"
countries: [SGP]
timeframe: {start: 1955, end: ongoing}
coalition: "PAP (People's Action Party) continuous from 1959"
leaders: ["Lee Kuan Yew (founding PM)", "Goh Chok Tong", "Lee Hsien Loong", "Khaw Boon Wan (health reforms)"]
doctrine: >
  Central Provident Fund (1955) + MediShield (1984) + 3M framework
  (MediSave 1984, MediShield 1990, MediFund 1993) constitute a
  distinctive welfare architecture: mandatory individual savings
  accounts + catastrophic-coverage insurance + safety net. Produces
  higher retirement adequacy and lower healthcare costs (as % GDP)
  than transfer-based universal welfare systems while retaining
  universal coverage. Cited in mega-spec D.2.9 and D.2.10 as the
  canonical alternative to Nordic transfer-based welfare, and in
  US healthcare context (D.2.10) as the market-respecting reform
  US political economy has been unable to implement.
policies: [singapore_cpf_1955, singapore_medisave_1984, singapore_medishield_1990, singapore_medifund_1993]
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: strong, rationale: "Transfers are substantially replaced by forced savings."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Hospital/clinic competition retained within regulated framework; provider fee transparency."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Individual CPF accounts are effectively private property."}
outcome_hypotheses: [welfare_architecture_comparative_effectiveness, us_healthcare_underperformance_political_economy_not_market_failure]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: chicago_monetarist, alignment: partially_aligned}
references:
  - "Asher (2002), 'Social Security Reform in Singapore'"
  - "Phua (2017), 'Singapore's healthcare system'"
  - "CPF Board annual reports"

  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Accelerating inflation to ~1,300% 1989 from monetisation of republican-enterprise losses."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Marković 1989-1990 private-enterprise liberalisation; BOAL structure formally dismantled."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "1988-1989 'anti-bureaucratic revolution' violated constitutional process; 14th SKJ Congress walkout dissolved federal party."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "IMF-conditioned trade liberalisation; Marković's currency convertibility 1990."}

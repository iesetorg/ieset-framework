# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: netherlands_kok_ii_purple_1998_2002
status: candidate
name: "Kok II Purple coalition: poldermodel peak"
countries: [NLD]
timeframe: {start: 1998, end: 2002}
coalition: "PvdA + VVD + D66 (Paars II — 'second Purple')"
leaders:
  - "Wim Kok (PM, PvdA)"
  - "Gerrit Zalm (Finance, VVD)"
  - "Annemarie Jorritsma (Economic Affairs, VVD)"
  - "Els Borst (Health, D66)"
doctrine: >
  Economic school: Dutch Third Way / poldermodel — consensus-based
  tripartite corporatism combined with deregulation, privatisation
  and budget discipline; aligned with Blair-Schröder modernising
  centre-left. Left-right axis: centre. Dated policies: Income Tax Act
  2001 (Wet IB 2001) major reform from 1 January 2001 replacing 1964
  code with box-system (box 1 labour/home, box 2 substantial holding,
  box 3 notional 4% capital-income tax); same-sex marriage world-first
  Law 26672 of 21 December 2000 (effective 1 April 2001); termination-
  of-life-on-request euthanasia law Wet TLV April 2001 (effective 2002);
  Kok II budget surpluses 1999-2001; multinationals' fiscal ruling
  practice continued; KPN partial privatisations; Schiphol expansion;
  VUT/early-retirement phase-out push; healthcare reform preparation;
  Fortuyn assassinated 6 May 2002 shortly before election; 9 August 2002
  Srebrenica report → Kok II resigned April 2002. Popularity: 1998
  election PvdA peak 29.0% + VVD 24.7%; Fortuyn shock 2002 LPF 17%
  collapsed Purple vote. Coherence: high through 1999-2001, collapsed
  2002 under Fortuyn-immigration backlash.
policies:
  - nl_income_tax_act_2001
  - nl_same_sex_marriage_2001
  - nl_euthanasia_law_2002
  - nl_kok_budget_surplus_1998_2001
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "0", magnitude: weak, rationale: "IB 2001 restructured base but overall progressivity ~flat; box 3 notional-yield substitute for capital gains tax."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Wet Flexibiliteit en Zekerheid 1999 consolidated temporary-work flexibility."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Budget surpluses 1999-2001; spending share stable."}
predecessor_movements: [netherlands_kok_purple_1994_2002]
successor_movements: [netherlands_balkenende_cda_2002_2006]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Poldermodel archetype of evidence-based consensus reform."}
references:
  - "Wet IB 2001"
  - "Wet openstelling huwelijk, Staatsblad 2001, 9"
  - "Wet toetsing levensbeëindiging op verzoek en hulp bij zelfdoding, 2001"
notes: "Narrower term-level split from existing netherlands_kok_purple_1994_2002 umbrella."

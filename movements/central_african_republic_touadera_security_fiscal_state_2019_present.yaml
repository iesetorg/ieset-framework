# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: central_african_republic_touadera_security_fiscal_state_2019_present
status: candidate
name: "Touadera security-alignment and fiscal state 2019-present"
countries: [CAF]
timeframe: {start: 2019, end: ongoing, enacted_date: "2019-02-06"}
coalition: "Faustin-Archange Touadera government and United Hearts Movement"
leaders:
  - "Faustin-Archange Touadera (President, 2016-present)"
  - "Felix Moloua (Prime Minister, 2022-present)"
doctrine: >
  Touadera's second-term governing project pairs a peace-and-security settlement
  with fiscal stabilization and a constitutional reset in a conflict-affected
  state. It seeks to rebuild central authority through security arrangements,
  donor-backed public-finance discipline, and new constitutional institutions.
policies:
  - caf_political_agreement_peace_reconciliation_2019
  - caf_imf_ecf_2023
  - caf_constitutional_referendum_seventh_republic_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "The peace agreement and ECF strengthen formal governance, while the 2023 constitution reset presidential-term constraints."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The ECF emphasizes deficit control, arrears prevention, and expenditure prioritization."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Peace-agreement stabilization seeks to reduce armed predation over local communities and assets."}
references:
  - "African Union and United Nations, Political Agreement for Peace and Reconciliation in the Central African Republic, 2019."
  - "IMF, Central African Republic 2023 Article IV and ECF materials."
  - "International and UN reporting on the Central African Republic 2023 constitutional referendum."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: south_sudan_r_arcss_transitional_government_2018_present
status: candidate
name: South Sudan R-ARCSS transitional unity government
countries: [SSD]
timeframe:
  start: 2018
  end: ongoing
  enacted_date: '2018-09-12'
coalition: Revitalized Transitional Government of National Unity
leaders:
  - "Salva Kiir Mayardit (President)"
  - "Riek Machar (First Vice President)"
  - "R-ARCSS signatory parties and transitional institutions"
doctrine: >
  South Sudan's R-ARCSS transitional regime is built around ending civil war
  through power sharing, security arrangements, constitutional drafting,
  public-finance stabilization, and eventual elections. In practice the
  governing coalition has repeatedly extended the transition while using donor
  and IMF engagement to improve public-finance controls in an oil-dependent
  state.
policies:
  - ssd_r_arcss_peace_agreement_2018
  - ssd_imf_smp_pfm_oil_revenue_reforms_2023
  - ssd_national_security_service_act_2024
  - ssd_transition_extension_elections_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: moderate, rationale: "The peace agreement and PFM reforms created formal transition controls, while the security law and election postponement weakened due process and electoral accountability."}
  - {axis: fiscal.spending_level, direction: "mixed", magnitude: weak, rationale: "Peace implementation raised spending needs, while IMF-backed cash-management reforms constrained arrears and discretionary spending."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "PFM and cash-management reforms aimed to reduce fiscal dominance over monetary policy."}
  - {axis: institutional.judicial_independence, direction: "mixed", magnitude: weak, rationale: "Transitional justice commitments pointed toward stronger legal institutions, but security-service powers and repeated extensions weakened checks."}
references:
  - "R-ARCSS agreement text, IGAD/RJMEC monitoring, and UNMISS implementation reporting."
  - "IMF and World Bank South Sudan public-finance and oil-revenue reform reporting, 2023-2025."
  - "UN, Associated Press, Reuters, and rights-organization reporting on the 2024 National Security Service law and election postponement."
notes: >
  The movement is a fragile transition coding. Implementation capacity,
  security-sector integration, and oil-revenue transparency remain major caveats.

movement_id: peru_humala_gana_peru_2011_2016
status: candidate
name: "Ollanta Humala — moderate-left shift, mining royalty, Conga"
countries: [PER]
timeframe: {start: 2011, end: 2016, enacted_date: "2011-07-28"}
coalition: "Gana Perú (Partido Nacionalista Peruano + allies)"
leaders:
  - "Ollanta Humala (President 2011-2016)"
  - "Luis Miguel Castilla (Finance 2011-2014)"
  - "Alonso Segura (Finance 2014-2016)"
  - "Julio Velarde (BCRP Governor)"
doctrine: >
  Humala governed as a moderate-left pragmatist despite 2006 radical-
  Chavista origins — what Peruvians called the "Lula route" vs the
  "Chávez route". (a) Economic school: pragmatic centre-left /
  developmentalist-lite — retained BCRP inflation-targeting + fiscal-rule
  framework, expanded cash-transfer programmes (Pensión 65 Oct 2011,
  Beca 18 Jan 2012, Juntos expansion), renegotiated mining tax regime
  (new mining royalty law + Impuesto Especial a la Minería + Gravamen
  Especial a la Minería, Leyes 29788-29790 Sep 2011, capturing ~USD 3bn
  over 2011-2014 from commodity windfall), inherited Alianza-del-Pacífico
  (founded Jun 2012), civil-service reform (Servir law 2013), public-sector
  wage reform. (b) Left-right: centre-left, governed from pragmatic centre.
  (c) Dated policies: mining royalty reform Sep 2011, Pensión 65 Oct 2011,
  Conga mining-project conflict Cajamarca Nov 2011 (protests + state of
  emergency, project suspended), Servir civil-service law Jul 2013, labour
  formalisation measures, Pacific Alliance treaty Feb 2014, 2014 Ley del
  Servicio Civil, Odebrecht-era infrastructure contracts (later ODB
  Lava-Jato criminal cases). (d) Popularity: won Jun 2011 runoff 51.4%
  vs Keiko Fujimori; approval peaked ~60% late 2011, fell to ~15-25% by
  2015 on corruption + Conga legitimacy loss; did not run for re-election
  (constitutional); Gana Perú dissolved post-2016. (e) Coherence:
  moderate — pragmatic-centre governance contradicted campaign-era "Gran
  Transformación" radical platform; commodity-boom fiscal space masked
  growth-model brittleness when copper prices cracked 2014-2015.
policies:
  - pe_mining_royalty_reform_2011
  - pe_pension_65_2011
  - pe_conga_mining_conflict_2011_2012
  - pe_servir_civil_service_law_2013
  - pe_pacific_alliance_accession_2012_2014
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "New mining-sector royalty + IEM + GEM raised effective mining tax burden."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Pensión 65, Beca 18, Juntos scale-up; conditional cash transfers expanded."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Pacific Alliance accession; continued USA-Peru FTA implementation."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Servir law institutionalised merit; offset by Odebrecht-era contract irregularities later surfaced."}
outcome_hypotheses: [commodity_royalty_fiscal_effect, moderate_left_policy_continuity]
predecessor_movements: [peru_garcia_apra_second_2006_2011]
successor_movements: [peru_ppk_2016_2018]
position_alignments:

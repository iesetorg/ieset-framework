movement_id: nigeria_obasanjo_pdp_civilian_1999_2007
status: candidate
name: Obasanjo PDP civilian return — NEEDS reform, Paris Club debt relief, telecom privatisation
countries:
- NGA
timeframe:
  start: 1999
  end: 2007
coalition: People's Democratic Party (PDP) — Obasanjo two-term civilian presidency
leaders:
- Olusegun Obasanjo (President 29 May 1999 - 29 May 2007)
- Ngozi Okonjo-Iweala (Finance Minister 2003-2006)
- Charles Soludo (CBN Governor 2004-2009)
- Nasir el-Rufai (Bureau of Public Enterprises / FCT Minister)
doctrine: 'Economic school: liberal-market democratic return with IMF/World-Bank- aligned reform
  agenda — NEEDS (National Economic Empowerment and Development Strategy) July 2004, inflation-targeting
  CBN, aggressive privatisation, bank consolidation. Left-right axis: centre-right in African
  developmental frame — pro-market but with substantial state direction via NNPC, stabilisation-fund
  mechanics (Excess Crude Account), anti-corruption EFCC. Dated policies: GSM telecom licensing
  auction January 2001 (MTN, Econet Wireless, Globacom); Paris Club debt-relief deal 20 October
  2005 — $18bn forgiveness on $30bn stock, buy-back of remaining $12bn; CBN bank consolidation
  December 2004 (minimum capital N25bn, banks reduced from 89 to 25 by July 2005); NEEDS programme
  July 2004; Excess Crude Account established 2004; Economic and Financial Crimes Commission (EFCC)
  established April 2003; Niger Delta militancy (MEND) intensified 2005-2006. Popularity: elected
  1999 (62.8%) and 2003 (61.9%); 2006 third-term amendment defeated in Senate 16 May 2006 (blocked
  to 3/5 supermajority). Coherence: high on reform agenda — the 2003-2007 window is the most institutionally
  ambitious in Nigerian post-independence history despite implementation gaps.

  '

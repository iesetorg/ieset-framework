movement_id: china_hu_era_2002_2012
status: candidate
name: "Hu Jintao / Wen Jiabao era — harmonious society, WTO-boom, stimulus"
countries: [CHN]
timeframe: {start: 2002, end: 2012, enacted_date: "2002-11-15"}
coalition: "CCP under Hu Jintao (General Secretary 2002-2012, President 2003-2013)"
leaders:
  - "Hu Jintao (General Secretary, CCP, 2002-2012)"
  - "Wen Jiabao (Premier, 2003-2013)"
  - "Zhou Xiaochuan (PBoC Governor 2002-2018)"
  - "Xie Xuren (Finance Minister 2007-2013)"
doctrine: >
  Hu-Wen "harmonious society" (和谐社会) + "scientific development concept"
  — a statist-reformist settlement layering distributional corrections and
  rural-urban rebalancing on top of Jiang-Zhu market reforms, while
  deploying counter-cyclical fiscal power through the global financial
  crisis. School: developmentalist state-capitalism with a social-policy
  tilt, informed by neo-left intellectual critique of 1990s dislocation.
  Left-right axis: within the CCP spectrum this is the statist-reformist /
  redistributive pole — not populist, not anti-market, but self-consciously
  rebalancing toward inland provinces, rural households, and wage-share
  concerns. Core policy content: (i) abolition of the agricultural tax
  (农业税, phased 2004-2006, fully abolished 1 January 2006 after 2,600
  years); (ii) New Rural Cooperative Medical Scheme (新农合, launched
  2003, near-universal by 2010) and Minimum Living Guarantee (dibao,
  rural rollout 2007); (iii) 2005 RMB exchange-rate reform ending the
  de facto peg, managed-float crawl against a basket (RMB appreciated
  ~21% vs USD 2005-2008); (iv) 2006 Property Rights Law equalising
  protection of private and state property; (v) 2008 Labour Contract
  Law strengthening written contracts, severance, and non-fixed-term
  conversion at 10-year tenure; (vi) four-trillion-yuan stimulus (四万亿,
  November 2008, ~12.5% of 2008 GDP over 2009-2010) channelled through
  local-government financing vehicles and SOE investment, driving credit
  to GDP from ~120% to ~170% by 2012; (vii) 2009-2010 "going out" OFDI
  acceleration, state-bank-led overseas resource acquisitions;
  (viii) 12th Five-Year Plan (2011-2015) emphasising strategic emerging
  industries and "indigenous innovation." Popularity / legitimacy: NPC
  confirmation near-unanimous (Hu presidential re-election 2008 received
  2,956 yes / 3 no / 5 abstain); plenum outcomes delivered without
  visible split; protest / unrest incidence rose sharply — "mass
  incidents" reported from ~58k/year (2003) to ~180k/year (late 2000s,
  Sun Liping estimate), concentrated on land-requisition, labour, and
  environmental grievances; stated-survey approval (Pew / Horizon /
  Asian Barometer) of central government remained in the 80-90% band.
  Coherence line: retain WTO-era growth trajectory while redistributing
  toward rural/inland and deploying balance-sheet counter-cyclicality,
  accepting a credit-intensity step-change as the cost.
policies:
  - cn_agricultural_tax_abolition_2006
  - cn_new_rural_medical_scheme_2003
  - cn_rmb_exchange_rate_reform_2005
  - cn_property_rights_law_2007
  - cn_labour_contract_law_2008
  - cn_four_trillion_stimulus_2008
  - cn_12th_five_year_plan_2011
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Four-trillion-yuan stimulus ~12.5% GDP 2009-2010; rural health + dibao expansion; infrastructure surge."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Agricultural-tax abolition, new rural cooperative medical scheme, dibao rural rollout."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "2008 Labour Contract Law raised severance, written-contract, and long-tenure conversion obligations."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "2007 Property Rights Law equalised private/state property protection."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Credit-to-GDP ~120% (2008) to ~170% (2012); LGFV and SOE loan surge."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "WTO-accession commitments implemented; inbound FDI and export share kept expanding through 2008."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Strategic emerging industries (12th FYP) + stimulus-era directed credit through state banks."}
outcome_hypotheses:
  - china_wto_growth_effect
  - developmentalist_state_growth_performance
  - fiscal_consolidation_growth_effect
predecessor_movements: [china_jiang_era_1989_2002, china_wto_accession_2001]
successor_movements: [china_xi_era_2012_present]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "State-bank-led counter-cyclical stimulus + strategic industrial policy."}
  - {position_id: market_socialist, alignment: aligned, notes: "Distributional correction within market-reform trajectory."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Rural health scheme, dibao, agricultural-tax abolition are social-democratic in content."}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Four-trillion stimulus is a textbook balance-sheet counter-cyclical response."}
  - {position_id: chicago_monetarism, alignment: opposed, notes: "Credit-intensity step-change and LGFV expansion are outside rule-based-monetary comfort zone."}
references:
  - "16th Party Congress Report, November 2002 — Hu Jintao accedes as General Secretary"
  - "State Council Decision, 29 Dec 2005 — abolition of agricultural tax effective 1 Jan 2006"
  - "Property Rights Law of the PRC, 16 March 2007"
  - "Labour Contract Law of the PRC, 29 June 2007 (effective 1 Jan 2008)"
  - "State Council, 9 November 2008 — four-trillion-yuan stimulus announcement"
  - "PBoC, 21 July 2005 — RMB managed-float reform announcement"
  - "12th Five-Year Plan, March 2011"
  - "Naughton (2007, 2018), The Chinese Economy"
  - "Lardy (2014), Markets over Mao"
notes: >
  Bridge era between Jiang-Zhu market-transition consolidation and the
  Xi-era reassertion of state + security. Four-trillion stimulus is the
  structurally-defining policy — it preserved growth but seeded the
  local-government-debt and property-sector leverage that dominates
  later-era policy.

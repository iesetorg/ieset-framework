movement_id: newzealand_clark_labour_1999_2008
status: candidate
name: "Clark Labour three terms — KiwiBank, Working for Families, Civil Union, anti-nuclear foreign policy"
countries: [NZL]
timeframe: {start: 1999, end: 2008}
coalition: "Labour-led coalitions (Labour-Alliance 1999-2002, Labour-Progressive 2002-2005, Labour-Progressive-NZ First-UF support 2005-2008)"
leaders:
  - "Helen Clark (Prime Minister 5 December 1999 - 19 November 2008)"
  - "Michael Cullen (Finance Minister 1999-2008)"
  - "Alan Bollard (RBNZ Governor 2002-2012)"
doctrine: >
  Economic school: 'third way' social-democratic consolidation — partial
  reversal of Rogernomics-Ruth Richardson radicalism while retaining
  inflation-targeting, open-trade framework, and fiscal prudence
  (Cullen 'Super Fund'). Left-right axis: centre-left — pro-redistribution
  via Working for Families, pro-public-sector (KiwiBank, Kiwibank re-
  nationalisation of ACC work account, NZ Railways buyback 2004, Air
  New Zealand 2001 bailout), socially liberal (Civil Union Act 2004,
  prostitution decriminalisation 2003, foreshore and seabed 2004).
  Dated policies: Accident Insurance Amendment Act 1999 renationalising
  ACC work account; KiwiBank established 2002 as state-owned retail
  bank via NZ Post; Air NZ bailout + 82% stake October 2001; New
  Zealand Superannuation Fund ('Cullen Fund') established 2001;
  Working for Families package announced Budget 2004 (in-work tax
  credit, family tax credit expansion); Civil Union Act 2004 (recognition
  of same-sex unions); Prostitution Reform Act 2003; NZ-China FTA
  signed 7 April 2008 (first by a developed country with China);
  anti-nuclear stance maintained and Iraq War non-participation 2003.
  Popularity: three consecutive wins (1999, 2002, 2005); lost November
  2008 to Key National (45% to 34% party vote). Coherence: high — the
  defining 'third way' government of NZ's 21st century.
policies:
  - nz_kiwibank_establishment_2002
  - nz_acc_renationalisation_1999
  - nz_nz_superannuation_fund_2001
  - nz_working_for_families_2004
  - nz_civil_union_act_2004
  - nz_china_fta_2008

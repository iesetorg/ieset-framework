  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "ACC work account renationalisation reversed private-competition experiment."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "NZ-China FTA 2008 first developed-country deal with China."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Foreshore and Seabed Act 2004 vested title in Crown — reversed 2011."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Sustained operating surplus used to fund NZ Super Fund and social-spending increases."}

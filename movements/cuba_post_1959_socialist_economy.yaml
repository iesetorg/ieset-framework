# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: cuba_post_1959_socialist_economy
status: candidate
name: "Cuban post-1959 socialist economy"
countries: [CUB]
timeframe: {start: 1959, end: ongoing}
coalition: "Partido Comunista de Cuba (sole legal party from 1965)"
leaders:
  - "Fidel Castro (1959-2008)"
  - "Raúl Castro (2008-2018)"
  - "Miguel Díaz-Canel (2018-present)"
doctrine: >
  Self-described Marxist-Leninist revolutionary project beginning with the
  1959 overthrow of Batista and consolidating after the 1960 expropriations
  of US and later domestic enterprises, the 1961 declaration of socialist
  character, and the 1968 Revolutionary Offensive that nationalised
  essentially all remaining small private commerce. Core content: central
  planning through JUCEPLAN, universal state provision of health and
  education, rationing of basic consumption via the libreta, single-party
  political system, and sustained dependence on external patrons —
  Soviet subsidies and preferential trade 1962-1991, then Venezuelan oil
  under ALBA from roughly 2000. Limited openings (self-employment
  cuentapropismo 1993, dual-currency 1994, Raúl's Guidelines 2011,
  Mariel special zone 2014, 2019 constitution, currency unification
  Tarea Ordenamiento 2021, expanded MSME law 2021) did not alter the
  underlying state-owned, centrally-planned character. Outcomes are
  highly bimodal: human-development indicators (life expectancy, literacy,
  infant mortality) converged with or exceeded upper-middle-income
  norms, while GDP per capita stagnated relative to Latin American
  comparators, the 1990-1994 Special Period produced a roughly 35%
  GDP contraction after Soviet subsidy withdrawal, and chronic shortages
  and emigration pressure persist.
policies:
  - cuba_expropriations_1960_1968
  - cuba_central_planning_juceplan
  - cuba_libreta_rationing_1962
  - cuba_cuentapropismo_1993
  - cuba_dual_currency_1994_2021
  - cuba_raul_guidelines_2011
  - cuba_tarea_ordenamiento_2021
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "State monopoly over nearly all production and distribution; private sector share minimal across the period."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Expropriations without compensation 1960-1968; private productive property effectively prohibited for decades."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Universal provision of health, education, subsidised housing and food; one of the highest social-spending shares in Latin America."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "State enterprises run with soft budget constraints; heavy subsidies to agriculture, transport, energy."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "State monopoly on foreign trade; CMEA integration until 1991; US embargo constraint throughout."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Monetary policy subordinated to plan; multiple currencies historically used to ration FX."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Single-party system; no independent judiciary; restricted civil and political rights."}
outcome_hypotheses:
  - centrally_planned_economy_growth_gap
  - external_subsidy_dependence_and_collapse
position_alignments:
  - {position_id: marxist_leninist, alignment: aligned}
  - {position_id: marxian, alignment: partially_aligned}
  - {position_id: democratic_socialist, alignment: opposed, notes: "Cuban model rejects political pluralism central to democratic-socialist tradition."}
references:
  - "Mesa-Lago (2000), Market, Socialist, and Mixed Economies: Comparative Policy and Performance — Chile, Cuba, Costa Rica"
  - "Pérez-López (2003), Cuba's Second Economy and the Market Transition, ASCE"
  - "Vidal & Pérez Villanueva (2014), Miradas a la Economía Cubana"
  - "ECLAC Estudio Económico de Cuba, various years"
notes: >
  Long ongoing movement coded holistically; framework should treat
  major sub-periods (1959-1968 expropriation phase, 1972-1990 CMEA
  integration, 1990-1994 Special Period, 2008-2018 Raúl reforms,
  2021- Tarea Ordenamiento) as distinct policy events that roll up
  into this movement. US embargo is a separate confounder coded at
  the policy level where relevant.

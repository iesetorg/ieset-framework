# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_trump_tariffs_2018_2019
status: candidate
name: "Trump trade war tariffs"
countries: [USA]
timeframe: {start: 2018, end: 2019}
coalition: "Republican (Trump) — over objections of Republican free-trade traditionalists"
leaders: ["Donald Trump", "Robert Lighthizer (USTR)", "Peter Navarro (trade advisor)"]
doctrine: >
  Section 232 (steel, aluminium), Section 301 (China) tariffs + renegotiated
  NAFTA → USMCA. Framework D.3.1 calls this out as a canonical case of
  state-intervention-under-Republican-coalition: should NOT be coded as
  "market-oriented" because the policy content (trade restriction +
  industrial policy) is state-interventionist. Right-implemented state
  intervention is still state intervention per Invariant 3.
policies: [us_section_232_tariffs_2018, us_section_301_china_tariffs_2018, us_usmca_2020]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Average US tariff on imports from China rose from ~3% to ~19%."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Tariff revenue offset via farm bailouts to soybean growers hit by retaliation."}
outcome_hypotheses: [trade_protection_output_effects]
position_alignments:
  - {position_id: developmentalist, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
  - {position_id: chicago_monetarist, alignment: opposed}
steelman: movements/steelman/us_trump_tariffs_2018_2019.md
references:
  - "USTR Section 301 reports 2018"
  - "Amiti-Redding-Weinstein (2019) 'The Impact of the 2018 Trade War'"
notes: "Explicitly cited in D.3.1 as content-over-coalition: Republican = free market is the error this case corrects."

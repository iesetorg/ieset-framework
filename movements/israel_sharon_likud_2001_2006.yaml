movement_id: israel_sharon_likud_2001_2006
status: candidate
name: Sharon Likud/Kadima — Second Intifada containment, Netanyahu 2003 reform, Gaza disengagement,
  Kadima breakaway
countries:
- ISR
timeframe:
  start: 2001
  end: 2006
coalition: Likud-led national unity then narrow coalition; Kadima founded November 2005
leaders:
- Ariel Sharon (Prime Minister 7 March 2001 - 14 April 2006)
- Benjamin Netanyahu (Finance Minister 28 February 2003 - 9 August 2005)
- Silvan Shalom (Finance Minister 2001-2003)
- David Klein / Stanley Fischer (Bank of Israel Governors)
doctrine: 'Economic school: security-conservative Likud paired with Netanyahu-led supply-side
  shock reform 2003-2005 (tax cuts, pension reform, welfare cuts, ports reform) — arguably the
  largest peacetime Israeli economic restructuring since 1985. Left-right axis: right on security
  + right on economics, with later pragmatic territorial move (Gaza disengagement August 2005)
  splitting Likud into Kadima. Dated policies: Operation Defensive Shield 29 March - 10 May 2002;
  West Bank security barrier construction from June 2002; Netanyahu Emergency Economic Plan (Arrangements
  Law 2003) May 2003 — income tax cuts, pension system conversion to contribution-based, child
  allowance cuts, public-sector wage freeze, Bezeq controlling stake sale; Gaza disengagement
  Knesset vote 25 October 2004, executed August-September 2005 (evacuated 21 Gaza + 4 West Bank
  settlements); Kadima founded 21 November 2005. Popularity: landslide January 2003 election (Likud
  37 seats); survived Gaza disengagement vote; stroke 4 January 2006 incapacitated Sharon. Coherence:
  high during 2003-2005 reform window; fractured party politics in final year.

  '

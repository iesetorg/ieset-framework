# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_shehbaz_pmln_coalition_2024_present
status: candidate
name: "Shehbaz Sharif PML-N+PPP coalition — IMF stabilisation and SIFC (Pakistan)"
countries: [PAK]
timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-03-04"
coalition: "PML-N + PPP + MQM-P + PML-Q + IPP + BAP post-election coalition (Feb 2024); same broad PDM composition (minus PTI-dissidents) that held the first Shehbaz premiership Apr 2022 - Aug 2023"
leaders:
  - "Shehbaz Sharif (Prime Minister 4 Mar 2024-present; first term 11 Apr 2022 - 14 Aug 2023)"
  - "Muhammad Aurangzeb (Finance Minister Mar 2024-, ex-HBL CEO)"
  - "Ishaq Dar (Deputy PM and Foreign Minister; Finance Minister 2022-2023 in first Shehbaz term)"
  - "Asif Ali Zardari (President, PPP co-chair, Mar 2024-)"
  - "Bilawal Bhutto Zardari (PPP chair, foreign-affairs role)"
  - "Jameel Ahmad (Governor State Bank of Pakistan, Aug 2022-)"
  - "Gen Syed Asim Munir (COAS Nov 2022-, SIFC apex-committee member)"
doctrine: >
  Centre-right business-establishment-orthodoxy return under a
  PML-N + PPP coalition, explicitly continuation-and-deepening of
  the first Shehbaz premiership (Apr 2022 - Aug 2023) that had
  negotiated a $3bn IMF Stand-By Arrangement in July 2023 under
  near-default conditions (FX reserves below 2 weeks import cover).
  After the Feb 2024 general election — contested as the least
  legitimate in Pakistan's polling history, with PTI barred from
  its electoral symbol and ballot-rigging allegations from losing
  camps — the new government pursued (i) $7bn IMF Extended Fund
  Facility 37-month (Sep 2024), the 24th IMF programme in Pakistan's
  history, with fifth tranche-linked structural conditionality on
  tax-base expansion, agriculture-income-tax provincial harmonisation,
  SOE divestment, and FX-regime credibility; (ii) the Special
  Investment Facilitation Council (SIFC, operationalised June 2023,
  civil-military joint apex body) to fast-track GCC (Saudi, UAE,
  Qatari, Kuwaiti) investment in agriculture, minerals (Reko Diq),
  IT, and energy, positioned as sovereign-wealth-style FDI
  facilitation; (iii) power-tariff hikes 2023-2024 resolving
  capacity-payment circular-debt arrears (base tariff up ~26% Jul
  2023 then incremental adjustments, passthrough of capacity
  charges to consumers); (iv) PIA privatisation first attempt
  Oct 2024 (single bid of PKR 10bn against PKR 85bn floor, failed)
  with a second attempt structured FY25-26; (v) GIDC gas-cess
  restructuring and captive-power-plant gas disconnections to push
  industrial demand onto the national grid; (vi) BISP continuation
  and modest expansion back from Ehsaas branding; (vii) institutional
  tightening — Peca e-crimes amendment Jan 2025 (criminalising
  'false information'), social-media bans (X/Twitter from Feb 2024),
  26th Constitutional Amendment Oct 2024 restructuring Supreme Court
  appointments and creating a Constitutional Bench, the most
  significant court-related change since 2010. Coherence line:
  IMF-led stabilisation + power-sector cost-recovery + SIFC-channelled
  FDI + CPEC revival under overt military-establishment partnership,
  operating under contested electoral legitimacy and intense PTI-
  street opposition. Popularity: Feb 2024 NA seat composition —
  PTI-backed independents (registered as SIC bloc) 93 / 265
  directly-contested seats, PML-N 75, PPP 54, MQM-P 17; reserved-
  seats dispute escalated to Supreme Court. Approval of the coalition
  is contested, PTI claims majoritarian mandate denied; government
  frames itself as the constitutional winner.
policies:
  - pk_imf_eff_7bn_2024
  - pk_imf_sba_3bn_2023
  - pk_power_tariff_hikes_2023_2024
  - pk_pia_privatisation_2024
  - pk_sifc_2023
  - pk_26th_amendment_2024
  - pk_peca_amendment_2025
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: moderate
    rationale: "Primary-balance surplus targets under IMF EFF 2024; FY24 primary surplus ~0.9% GDP, first in nearly two decades."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: weak
    rationale: "Agriculture-income-tax provincial harmonisation (IMF benchmark); retailer documentation restarted; direct-tax share rising modestly from a narrow base."
  - axis: fiscal.sectoral_subsidy
    direction: "-"
    magnitude: moderate
    rationale: "Power-sector cross-subsidy rationalisation via tariff hikes; captive-power gas pricing removed; fertiliser/wheat support schemes trimmed."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: weak
    rationale: "PIA privatisation attempts and SOE divestment framework under Sovereign Wealth Fund Act 2023; execution partial."
  - axis: regulatory.energy_supply_security
    direction: "mixed"
    magnitude: weak
    rationale: "Capacity-payment renegotiation with IPPs ongoing; cost-recovery improved; end-user affordability strained."
  - axis: monetary.central_bank_independence
    direction: "0"
    magnitude: weak
    rationale: "SBP Amendment Act 2022 framework preserved; policy rate cut sequence 2024 tracking disinflation from ~38% peak to ~5% yoy by early 2025."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: moderate
    rationale: "26th Amendment restructured Supreme Court appointments + Constitutional Bench creation; Peca amendment criminalised speech categories; X/Twitter ban; election-legitimacy contestation."
  - axis: institutional.judicial_independence
    direction: "-"
    magnitude: moderate
    rationale: "26th Amendment (Oct 2024) moved chief-justice selection from seniority to parliamentary special committee; Constitutional Bench composition executive-influenced."
outcome_hypotheses:
  - imf_stabilisation_program_effects
  - central_bank_independence_inflation_effects
  - judicial_independence_growth_effects
predecessor_movements:
  - pakistan_khan_pti_2018_2022
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "IMF-programme orthodoxy + privatisation + subsidy rationalisation; opposed on speech/judicial-appointment dimensions."}
  - {position_id: new_keynesian, alignment: aligned, notes: "Orthodox stabilisation with SBP inflation-targeting framework preserved."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "SIFC is explicitly state-coordinated FDI facilitation; CPEC Phase 2 continuation."}
  - {position_id: social_democratic, alignment: opposed, notes: "Power-tariff cost-recovery passes regressively; Peca speech restrictions oppose liberal-left position."}
references:
  - "IMF Extended Fund Facility for Pakistan, 25 Sep 2024 ($7bn, 37-month)"
  - "IMF Stand-By Arrangement for Pakistan, Jul 2023 ($3bn, 9-month)"
  - "Sovereign Wealth Fund Act 2023 (Pakistan)"
  - "Pakistan Constitution (Twenty-Sixth Amendment) Act 2024, Oct 2024"
  - "Prevention of Electronic Crimes (Amendment) Act 2025 (Peca)"
  - "Election Commission of Pakistan general election results 8 Feb 2024"
  - "State Bank of Pakistan Monetary Policy Statements 2024-2025"
  - "Special Investment Facilitation Council charter (Jun 2023)"
notes: >
  Movement entry covers both the first Shehbaz premiership
  (Apr 2022 - Aug 2023, post-PTI ouster) and the second / current
  term (Mar 2024 - present) as continuous doctrinal programme under
  the same coalition composition and same military-establishment
  posture. The caretaker Anwaar-ul-Haq Kakar government (Aug 2023 -
  Mar 2024) conducted the election and SIFC operationalisation; its
  content is substantively continuous with this movement and coded
  here. Election-legitimacy dispute and 26th Amendment judicial
  restructuring are flagged on institutional axes.

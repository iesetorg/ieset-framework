movement_id: italy_letta_pd_pdl_2013_2014
status: candidate
name: "Letta PD-PdL Grand Coalition 2013-2014"
countries: [ITA]
timeframe: {start: 2013, end: 2014, enacted_date: "2013-04-28"}
coalition: "PD + PdL/NCD + SC + UdC Grand Coalition (after Feb 2013 hung parliament)"
leaders:
  - "Enrico Letta (PM)"
  - "Fabrizio Saccomanni (Finance Minister)"
  - "Angelino Alfano (NCD, Interior)"
doctrine: >
  Short-lived PD-PdL Grand Coalition formed 60 days after the Feb 2013 hung
  parliament produced three roughly equal blocs (PD-centre-left, PdL-centre-right,
  M5S 25%). Economic school: continuity of Monti orthodox consolidation with
  modest demand-side concessions to PdL. Signature actions: IMU primary-residence
  abolition (key PdL campaign promise, mid-2013), replacing it with TASI service
  tax 2014; 'Decreto del Fare' (D.L. 69/2013) simplification; limited labour
  reform on fixed-term contracts; EU Youth Guarantee implementation; ECOFIN
  commitment to structural budget balance by 2016. Berlusconi expelled from
  Senate (Nov 2013) after Mediaset tax-fraud conviction, PdL split into NCD
  (Alfano, staying in coalition) and Forza Italia (Berlusconi, returning to
  opposition). Letta's 'Destinazione Italia' plan laid out but largely unimplemented
  before Matteo Renzi's PD internal-primary victory (Dec 2013) and Feb 2014
  leadership 'rottamazione' removed Letta via PD direzione vote (#enricostaisereno).
  Left-right: centrist consensus. Popularity: Letta personal ~42% approval steady;
  coalition weakened by PdL split. Coherence: low — inherited hung-parliament
  constraint, internal veto players, predictable cartel-instability.
policies:
  - it_imu_abolition_tasi_introduction_2013_2014
  - it_decreto_del_fare_2013
  - it_youth_guarantee_implementation_2013

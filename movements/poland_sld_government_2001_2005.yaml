movement_id: poland_sld_government_2001_2005
status: candidate
name: "Miller/Belka SLD-UP-PSL EU-accession government 2001-2005"
countries: [POL]
timeframe: {start: 2001, end: 2005, enacted_date: "2001-10-19"}
coalition: "SLD-UP-PSL (Miller 2001-2003); SLD-UP minority (Miller to May 2004); SLD-UP minority (Belka May 2004-Oct 2005)"
leaders:
  - "Leszek Miller (Prime Minister, SLD, 2001-2004)"
  - "Marek Belka (Prime Minister, SLD-technocratic, 2004-2005)"
  - "Grzegorz Kolodko (Finance Minister, 2002-2003)"
  - "Andrzej Raczko (Finance Minister, 2003-2004)"
doctrine: >
  Post-communist SLD return — governed by crisis management and EU
  accession diplomacy. Economic school: Polish third-way social democratic
  with EU-conditional reformism; Hausner plan (2003) attempted fiscal
  consolidation against SLD backbench resistance (Hausner rebellion).
  Left-right axis: centre-left. Dated policies: EU Accession Treaty
  signing (Athens 16 April 2003), EU membership referendum 7-8 June 2003
  (77.45% YES, 58.85% turnout), EU accession 1 May 2004, Hausner plan
  consolidation (2003-2004, partially enacted), Rywin affair (Dec 2002
  -Jan 2003, triggered SLD collapse). Popularity: SLD won 2001 election
  with 41.0%, collapsed to 11.3% in 2005. Coherence: low — Rywin affair,
  SLD splits (SdPl Borowski 2004), Miller resignation day after EU
  accession (2 May 2004). Belka technocratic caretaker for final
  18 months.
policies:
  - pl_eu_accession_2004
  - pl_hausner_plan_2003
  - pl_rywin_affair_2003
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "EU accession 1 May 2004 — single-market entry, tariff removal, free movement of labour (initially transitional)."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Acquis communautaire adoption; however Rywin affair revealed governance weaknesses."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Hausner plan partially consolidated transfer spending."}

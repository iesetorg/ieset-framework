# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malaysia_mahathir_first_term_1981_1988
status: candidate
name: "Mahathir early era — Look East + heavy industry (Malaysia)"
countries: [MYS]
timeframe: {start: 1981, end: 1988}
coalition: "Barisan Nasional (UMNO-led) under Mahathir Mohamad"
leaders:
  - "Mahathir Mohamad (PM 1981-2003; first term phase 1981-1988)"
  - "Musa Hitam (Deputy PM 1981-1986)"
  - "Daim Zainuddin (Finance Minister 1984-1991)"
  - "Razaleigh Hamzah (Finance Minister 1976-1984)"
doctrine: >
  Mahathir Look East Policy + heavy-industrial drive — first phase of
  the long 1981-2003 era. Economic school: ethno-developmentalist
  state-led heavy industrialisation emulating Japan/Korea models
  explicitly rather than Anglo-American ones. Dated actions: Look East
  Policy launch Feb 1982; Proton Saga launch 9 Jul 1985 via HICOM-
  Mitsubishi JV; Perwaja Steel 1982 at Terengganu; Bank Negara forex
  speculation losses 1986 and 1992 (~MYR30bn losses cumulative);
  Privatisation Master Plan 1983 onward (Syarikat Telekom Malaysia 1987,
  Tenaga Nasional 1990 precursors); Bumiputera-focused ASN/PNB trust-
  fund expansion; Official Secrets Act amendment 1986; 1986 recession
  (GDP -1.1%) + crude-oil/tin/palm-oil collapse forced New Economic
  Plan adjustment; Operation Lalang Oct 1987 detaining 106 opposition
  figures under ISA; UMNO constitutional crisis 1987-1988 — Team A
  (Mahathir) vs Team B (Razaleigh), UMNO declared illegal Feb 1988,
  reformed as UMNO Baru; Lord President Salleh Abas dismissed Aug 1988
  (judicial crisis). Left-right: centre-right ethno-developmentalist,
  socially conservative-nationalist. Popularity: Apr 1982 general
  election BN 60.5% / 132 of 154 seats; Aug 1986 BN 55.8% / 148 of 177
  seats amid recession; 1990 election 70.6% seat share despite Team-B
  Semangat 46 split. Coherence: high — Look East + Proton + Privatisation
  + NEP mutually reinforcing; judicial-crisis/ISA repression tightly
  coupled to intra-UMNO power consolidation.
policies:
  - my_look_east_policy_1982
  - my_proton_saga_launch_1985
  - my_privatisation_master_plan_1983
  - my_telekom_malaysia_corporatisation_1987
  - my_operation_lalang_1987
  - my_judicial_crisis_1988
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "HICOM/Proton/Perwaja heavy-industrial subsidy regime — flagship Look East content."}
  - {axis: regulatory.product_market_competition, direction: "mixed", magnitude: moderate, rationale: "Privatisation Master Plan opened select sectors; Bumiputera-equity requirements offset on others."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "1988 judicial crisis — Lord President Salleh Abas dismissed, Supreme Court reshuffled."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Operation Lalang ISA detentions; Official Secrets Act tightened 1986."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "FTZ expansion continued; electronics export base consolidated during 1986-1988 turnaround."}
  - {axis: monetary.monetary_expansion_direction, direction: "0", magnitude: weak, rationale: "Bank Negara forex speculation losses aside, policy nominally tight during recession."}
predecessor_movements:

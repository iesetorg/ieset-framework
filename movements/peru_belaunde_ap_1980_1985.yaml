# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: peru_belaunde_ap_1980_1985
status: candidate
name: "Belaúnde Terry AP second term — democratic transition, debt crisis"
countries: [PER]
timeframe: {start: 1980, end: 1985, enacted_date: "1980-07-28"}
coalition: "Acción Popular (AP) + Partido Popular Cristiano (PPC)"
leaders:
  - "Fernando Belaúnde Terry (President 1980-1985; previously 1963-1968)"
  - "Manuel Ulloa Elías (Prime Minister / Economy 1980-1982)"
  - "Carlos Rodríguez Pastor (Economy 1983-1984)"
  - "Richard Webb (BCR President 1980-1985)"
doctrine: >
  Democratic restoration after twelve years of Morales Bermúdez / Velasco
  military rule. Four doctrinal pillars: (1) constitutional return — 1979
  Constituent Assembly Constitution took effect 28 July 1980 under
  Belaúnde who had been deposed in October 1968; universal suffrage
  (incl. illiterates); (2) partial market opening after Velasco statism —
  tariff reform lowering peaks, selective privatisation, expansion of
  informal-sector formalisation, and encouragement of foreign investment
  in mining and hydrocarbons; (3) debt-crisis absorption — 1982-1983
  Mexican-default contagion + 1982-83 El Niño flooding (GDP -12% 1983 in
  northern departments) + collapse of commodity prices produced a severe
  recession; external debt rose to ~USD 13.5bn, inflation reached 125%
  (1984); IMF Extended Fund Facility negotiated but missed targets; (4)
  internal security deterioration — Sendero Luminoso (Shining Path)
  declared "people's war" 17 May 1980 (burning ballot boxes in
  Chuschi, Ayacucho); emergency zones declared 1981; Ayacucho placed
  under military command December 1982; MRTA formed 1984; mass human-
  rights violations under military counter-insurgency (Uchuraccay 1983,
  Accomarca 1985). Stated school: Belaúndismo centrist-reformist AP
  tradition + selective Washington-Consensus opening. Left-right axis:
  centre-right economic content, liberal-democratic institutional
  content, hampered by commodity shock and insurgency. Popularity /
  legitimacy: May 1980 election Belaúnde won 45.4% vs Villarán APRA
  27.4%, Barrantes IU 17.1%; by 1985 AP collapsed to 6.3% (Javier
  Alva Orlandini) as APRA's García swept with 53.1%. Coherence line:
  restore constitutional and market-oriented normalisation while
  absorbing the accumulated liability of Velasco-era statism and the
  onset of Sendero insurgency.
policies:
  - pe_constitution_1979_implementation_1980
  - pe_tariff_reform_1980_1984
  - pe_imf_eff_1982_1984
  - pe_emergency_zones_sendero_1981_1985
  - pe_mining_hydrocarbons_fdi_opening_1981
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Tariff peaks reduced; import licensing eased post-Velasco."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Selective privatisation; foreign-investment opening in mining / hydrocarbons."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Fiscal deficit widened to ~7% GDP under 1982-83 recession."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Return to civilian rule under 1979 Constitution."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: weak, rationale: "Emergency zones 1981+ suspended civilian jurisdiction in parts of Ayacucho / Apurímac / Huancavelica."}
outcome_hypotheses: [debt_crisis_liability_dollarisation, commodity_terms_of_trade_shock]
successor_movements: [peru_garcia_apra_first_1985_1990]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
references:
  - "Constitución Política del Perú 1979 (vigente 28 July 1980)"
  - "Thorp-Bertram (1978/1985), Peru 1890-1977: Growth and Policy in an Open Economy"
  - "Crabtree (1992), Peru Under Garcia: An Opportunity Lost"
  - "Comisión de la Verdad y Reconciliación (2003), Informe Final, vol. III"
notes: "Transitional — connects to peru_garcia_apra_first_1985_1990 and later peru_fujimori_stabilisation_1990_2000."

axes_summary:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  rationale: Flexicurity reforms 1994/1995/1998 tightened availability requirements while preserving
    generous benefits — flexicurity model canonised.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  rationale: Activation + rotation + education-leave expanded active programmes; passive benefits
    held.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  rationale: Maastricht-convergence fiscal consolidation brought deficit below 3% by 1997.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  rationale: 1993 Whitsun package cut top marginal rates while broadening base and widening capital-income
    definition.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  rationale: Edinburgh-Agreement ratification of Maastricht 1993 embedded Denmark in single market.
- axis: monetary.central_bank_independence
  direction: '0'
  magnitude: weak
  rationale: Nationalbank remained pegged to D-Mark then euro via ERM-II; structure unchanged.

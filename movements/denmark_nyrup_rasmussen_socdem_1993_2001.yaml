movement_id: denmark_nyrup_rasmussen_socdem_1993_2001
status: candidate
name: Nyrup Rasmussen Social Democrat-led coalitions — active labour market and Maastricht settlement
  1993-2001
countries:
- DNK
timeframe:
  start: 1993
  end: 2001
coalition: Socialdemokratiet-led four-party centre-left coalition (with Radikale Venstre, Centrum-Demokraterne,
  Kristeligt Folkeparti until 1996, then three-party)
leaders:
- Poul Nyrup Rasmussen (Prime Minister 1993-2001)
- Mogens Lykketoft (Finance Minister 1993-2000)
- Pia Gjellerup (Finance Minister 2000-2001)
- Marianne Jelved (Economy Minister, Radikale Venstre)
doctrine: 'Nyrup Rasmussen took power January 1993 after the Tamilsagen brought down Schlüter,
  forming the first SD-led government in a decade. Economic school: modernised Nordic social-democracy
  — active labour-market policy (ALMP) in the "flexicurity" tradition, Maastricht-compliant fiscal
  orthodoxy, and pro-EU integration except on currency and defence. Left-right axis: centre-left
  on labour-market and transfers, centre on fiscal discipline and structural reform. Core policy
  content: (i) 1994 labour-market reform (Arbejdsmarkedsreform I) introducing right-and-duty activation,
  rotation schemes (jobrotation), and education- leave — foundation of modern flexicurity with
  Reform II 1995 and III 1998 tightening activation; (ii) "early retirement" (efterløn) reform
  1998 (DA/LO agreement 1998, law 1999) tightening conditions after huge political backlash; (iii)
  1993 "kickstart" countercyclical fiscal stimulus bringing unemployment down from 12% to below
  5% by 2001; (iv) 1993 Edinburgh-Agreement Maastricht re- referendum 18 May 1993 (56.7% yes after
  four Danish opt-outs — euro, defence, citizenship, JHA); (v) 1996 large personal- tax and capital-income
  reform (pinsepakken / Whitsun package); (vi) pension-settlement architecture including ATP reforms
  and occupational-pension universalisation. 2000 euro-membership referendum lost 53.2% no — euro
  opt-out held. Popularity: SD 34.6% 1994, 35.9% 1998; narrow 1998 re-election with help from
  SF/Enhedslisten; lost 2001 to Fogh Rasmussen on immigration and efterløn-backlash grounds. Coherence:
  very high — the flexicurity model crystallised in this era and became a durable Danish brand.

  '

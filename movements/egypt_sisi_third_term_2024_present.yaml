movement_id: egypt_sisi_third_term_2024_present
status: candidate
name: "Sisi third term — Ras El-Hekma shock, second EGP float, IMF expansion"
countries: [EGY]
timeframe: {start: 2024, end: ongoing}
coalition: "Presidency under Abdel Fattah el-Sisi; Mostaqbal Watan-dominated parliament; Armed Forces economic apparatus"
leaders:
  - "Abdel Fattah el-Sisi (President, re-elected Dec 2023 with 89.6% on ~66.8% official turnout)"
  - "Mostafa Madbouly (Prime Minister)"
  - "Hassan Abdalla (Acting CBE Governor)"
  - "Ahmed Kouchouk (Finance Minister, July 2024–)"
doctrine: >
  Third-term continuity of military-sovereign-directed capitalism fused with
  an accelerated foreign-capital reliance strategy. The governing line frames
  Egypt as a geo-strategic recipient of Gulf capital: the Feb 23 2024
  Ras El-Hekma agreement with the UAE's ADQ ($35bn headline, $24bn cash plus
  $11bn converted deposits) provided the external cushion for the March 6 2024
  one-off EGP devaluation (from ~30.9 to ~49.5/USD) and 600bp policy-rate hike,
  which in turn unlocked the IMF EFF expansion from $3bn to $8bn on
  March 29 2024 plus paralleled EU ($7.4bn) and World Bank ($6bn) packages.
  Doctrine positions the Armed Forces Engineering Authority, NSPO, and
  affiliated holdings as the legitimate backbone of mega-infrastructure
  (New Administrative Capital phases, Hayah Karima rural upgrading, Suez
  corridor) while nominally committing to the 2022 State-Ownership Policy
  privatisation pipeline. Left-right placement: authoritarian nationalist-
  military with orthodox FX/fiscal content and heterodox product-market
  content. Coherence: the era's logic is that external rent (Gulf FDI + IFI
  lending) substitutes for private-investment-led tradables growth while the
  security-state retains commanding-heights control.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_obuchi_mori_ldp_1998_2001
status: candidate
name: "Obuchi-Mori LDP — fiscal-stimulus lost-decade response (1998-2001)"
countries: [JPN]
timeframe:
  start: 1998
  end: 2001
  enacted_date: "1998-07-30"
coalition: "LDP-Liberal-Komeito 'Jiyu-Ko' coalition, then LDP-Komeito-Conservative under Mori"
leaders:
  - "Keizō Obuchi (PM 30 Jul 1998 - 5 Apr 2000, died in office)"
  - "Yoshirō Mori (PM 5 Apr 2000 - 26 Apr 2001)"
  - "Kiichi Miyazawa (Finance, returning elder)"
  - "Masaru Hayami (BoJ Governor)"
doctrine: >
  LDP fiscal-activist Keynesian — Obuchi styled himself the "world's
  number-one debtor prime minister" and explicitly reversed
  Hashimoto's fiscal consolidation. Economic school: old-LDP
  developmental-state Keynesianism with public-works-heavy
  supplementary budgets — centre-right on social issues but
  fiscally expansionary. Key policy content: (i) ¥16.7tn Comprehensive
  Economic Stimulus Package April 1998 (initiated under Hashimoto,
  deployed under Obuchi); (ii) ¥23.9tn Emergency Economic Package
  November 1998; (iii) ¥18tn "Year of the Golden Pig" supplementary
  budget November 1999 (¥6.5tn real-water public works); (iv) Financial
  Revitalisation Act October 1998 creating the Resolution and
  Collection Corporation and Financial Reconstruction Commission,
  Long-Term Credit Bank of Japan nationalised October 1998, Nippon
  Credit Bank December 1998; (v) Zero-Interest-Rate Policy launched
  12 February 1999 under BoJ Governor Hayami (lifted August 2000,
  reinstated with QE March 2001); (vi) ¥11tn Emergency Economic
  Package Mori administration November 2000; (vii) e-Japan Strategy
  January 2001 — national broadband and IT plan; (viii) Ministry
  reorganisation January 2001 collapsed 22 ministries into 12.
  Popularity: Obuchi personally popular before stroke; Mori collapsed
  to ~9% approval after the Ehime Maru incident and gaffes, resigned
  April 2001. Coherence line: discretionary Keynesian fiscal push
  plus ZIRP plus bank nationalisation — the high-water mark of
  Japanese fiscal-monetary expansion before the Koizumi pivot.
policies:
  - jp_obuchi_stimulus_packages_1998_1999
  - jp_financial_revitalisation_act_1998
  - jp_zero_interest_rate_policy_1999
  - jp_central_government_reform_2001
  - jp_e_japan_strategy_2001
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Successive supplementary budgets ¥16.7tn + ¥23.9tn + ¥18tn + ¥11tn pushed public debt past 130% of GDP."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "ZIRP from February 1999; QE launched March 2001 under Hayami; world's first modern ZIRP regime."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Long-Term Credit Bank and Nippon Credit Bank nationalised; RCC and FRC created to recapitalise banking system."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "e-Japan Strategy 2001 mandated telecoms competition for broadband; Central Government Reform consolidated ministries."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Bank nationalisations via FRC framework rules-based; no major institutional shift."}
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "ZIRP and discretionary stimulus textbook response to liquidity trap."}
  - {position_id: post_keynesian, alignment: aligned, notes: "Direct fiscal-expansion Keynesianism."}
  - {position_id: austrian, alignment: opposed, notes: "Zombification-by-bailout and ZIRP both flagged as malinvestment-inducing."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Debt trajectory and bank nationalisations departed from Big Bang liberal posture."}
references:
  - "Financial Revitalisation Act, October 1998"
  - "BoJ Monetary Policy Meeting Minutes, 12 February 1999 (ZIRP introduction)"
  - "Cabinet Office, Comprehensive Economic Package documents 1998-2000"
  - "Ito & Mishkin (2006), 'Two Decades of Japanese Monetary Policy'"
notes: >
  Combined Obuchi+Mori movement because Mori cabinet continued the
  same fiscal+ZIRP doctrine with only personnel changes; coherence
  preserved by bridging Hayami BoJ and LDP-Komeito coalition.

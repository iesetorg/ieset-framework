movement_id: turkey_yilmaz_ecevit_coalitions_1997_2002
status: candidate
name: "Yılmaz ANAP and Ecevit DSP coalitions — 2001 banking crisis, Derviş $16bn programme, Copenhagen criteria preparation"
countries: [TUR]
timeframe: {start: 1997, end: 2002}
coalition: "ANAP-DSP-DTP (1997-1999); DSP-MHP-ANAP (1999-2002)"
leaders:
  - "Mesut Yılmaz (Prime Minister 30 June 1997 - 11 January 1999)"
  - "Bülent Ecevit (Prime Minister 28 May 1999 - 18 November 2002)"
  - "Kemal Derviş (Minister of State for Economy 2 March 2001 - 11 August 2002)"
  - "Süreyya Serdengeçti (Central Bank Governor from March 2001)"
doctrine: >
  Economic school: reform-in-crisis — secular-centrist coalition government
  forced into deep IMF-led programme following November 2000 and February
  2001 banking/currency twin crisis. Left-right axis: centrist-pragmatic,
  pro-EU, technocratic-reformist after Derviş arrival March 2001. Dated
  policies: 17 August 1999 Marmara earthquake emergency response;
  November 2000 liquidity crisis in banking sector (Demirbank collapse);
  19-22 February 2001 currency attack — lira devalued 40%, rate spike;
  Derviş 15-point "Transition to Strong Economy Programme" 14 April 2001;
  $16bn IMF Standby (SDR 12.8bn new money, total SDR 19bn); Banking
  Regulation and Supervision Agency (BDDK) strengthened 1999-2001;
  Central Bank independence law April 2001 banning public-sector lending;
  Copenhagen criteria alignment — constitutional amendments October 2001
  (34 articles), EU candidate status confirmed Helsinki December 1999.
  Popularity: collapse in November 2002 election (DSP ~1%, ANAP ~5%, MHP
  ~8% — all below 10% threshold). Coherence: moderate — Derviş programme
  was coherent and delivered disinflation trajectory, but coalition
  politics fractured.
policies:
  - tr_2001_banking_currency_crisis
  - tr_dervis_transition_programme_2001
  - tr_central_bank_independence_2001
  - tr_bddk_establishment_1999
  - tr_eu_candidate_constitutional_amendments_2001

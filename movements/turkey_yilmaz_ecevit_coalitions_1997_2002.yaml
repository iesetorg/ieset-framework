  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "BDDK established 1999, strengthened 2001; banking recapitalisation and rationalisation."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "IMF-programme primary-surplus targets 6.5% of GNP."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "EU accession-alignment process begun post-Helsinki 1999."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "October 2001 constitutional amendments aligned with Copenhagen criteria."}

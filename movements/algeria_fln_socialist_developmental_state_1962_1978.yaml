# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: algeria_fln_socialist_developmental_state_1962_1978
status: candidate
name: "FLN socialist-developmental state"
countries: [DZA]
timeframe: {start: 1962, end: 1978}
coalition: "Front de Liberation Nationale (FLN) single-party state"
leaders:
  - "Ahmed Ben Bella"
  - "Houari Boumediene"
doctrine: >
  Algeria's post-independence FLN state sought to convert anti-colonial
  sovereignty into economic sovereignty through socialist planning, state
  control of land and industry, and command over hydrocarbon rents. The regime
  treated nationalisation, heavy-industry investment, and state-led agrarian
  transformation as instruments for building a non-aligned developmental state
  after the French colonial economy.
policies:
  - dz_autogestion_socialist_land_reform_1963
  - dz_industrialising_industries_strategy_1967
  - dz_hydrocarbons_nationalisation_1971
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Autogestion and nationalisation shifted major assets from private and foreign ownership into state or worker-managed control."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "State planning and industrial investment raised the public-sector command over investment and expenditure."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Heavy industry and state enterprises received directed public investment and protected financing."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Hydrocarbons and strategic industries were brought under state monopoly or state-gated entry."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Import-substitution planning reduced openness relative to a liberal trade regime."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Heavy-industry planning, import substitution, state investment banks, and hydrocarbon rent mobilisation make this a classic post-colonial developmental-state case."}
  - {position_id: marxian, alignment: partially_aligned, notes: "Anti-colonial socialism, autogestion, and public ownership used socialist class and sovereignty arguments without becoming a fully Leninist command economy."}
  - {position_id: marxist_leninist, alignment: partially_aligned, notes: "Single-party socialist state and nationalisation align partly with Marxist-Leninist governance, but non-alignment and developmental nationalism were stronger than orthodox Soviet-style party planning."}
  - {position_id: market_socialist, alignment: partially_aligned, notes: "Worker-management/autogestion elements fit market-socialist rhetoric in the early post-independence phase, though state planning and hydrocarbon nationalisation dominated."}
references:
  - "John Ruedy, Modern Algeria: The Origins and Development of a Nation"
  - "IMF, Algeria: Recent Economic Developments, historical background sections"
  - "Sonatrach historical materials on the 1971 hydrocarbon nationalisation"
notes: "End date uses Boumediene's death in 1978 as the boundary for this coherent founding socialist-developmental phase."

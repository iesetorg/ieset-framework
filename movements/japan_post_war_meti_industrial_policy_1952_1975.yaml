# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_post_war_meti_industrial_policy_1952_1975
status: candidate
name: "Japan MITI-led industrial policy and high-growth era"
countries: [JPN]
timeframe: {start: 1952, end: 1975}
coalition: "Liberal Democratic Party (LDP) dominance from 1955; 1955 System"
leaders:
  - "Hayato Ikeda (PM 1960-1964; Income Doubling Plan)"
  - "Eisaku Satō (PM 1964-1972)"
  - "Kakuei Tanaka (PM 1972-1974)"
  - "MITI vice-ministers (Shigeru Sahashi and successors)"
  - "Bank of Japan governors under MoF window guidance"
doctrine: >
  Developmental-state industrial policy combining selective credit
  allocation, import protection during learning phase, and export
  promotion, coordinated primarily through the Ministry of International
  Trade and Industry (MITI, founded 1949) and the Ministry of Finance.
  Post-San Francisco Treaty 1952 sovereignty restored; Dodge Line 1949
  had already imposed fiscal discipline and 360-yen peg. Foreign Exchange
  and Foreign Trade Control Law (1949) gave MITI foreign-exchange
  allocation leverage over imports and technology licensing. Keiretsu
  groups (Mitsubishi, Mitsui, Sumitomo, Fuyo, Sanwa, Dai-Ichi Kangyo)
  reorganised around main banks. Bank of Japan window guidance channelled
  credit to priority sectors (steel, shipbuilding, autos, electronics,
  petrochemicals). Ikeda's Income Doubling Plan (1960) targeted doubling
  nominal GNP in a decade — achieved in seven years. Savings-driven
  investment (household saving ~20% of disposable income) financed
  high capital formation. GATT accession 1955; OECD entry 1964 began
  formal liberalisation; capital account opening was gradual into the
  1970s. 1971 Nixon shock and 1973 oil shock ended the high-growth phase;
  by 1975 the model was shifting toward private-sector-led innovation.
policies:
  - japan_forex_control_law_1949
  - japan_income_doubling_plan_1960
  - japan_boj_window_guidance_1955_1975
  - japan_gatt_accession_1955
  - japan_oecd_accession_1964
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "MITI administrative guidance, foreign-exchange allocation, entry controls in priority sectors."}
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: moderate, rationale: "Import protection on priority sectors during catch-up; GATT 1955 and OECD 1964 progressively opened trade."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "JDB/JEXIM directed lending and tax preferences to priority industries."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "BoJ operated under MoF direction; formal independence not until 1998."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Segmented banking, interest-rate controls, directed credit within main-bank system."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Canonical developmental-state case alongside Korea and Taiwan."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Main-bank keiretsu governance as an institutional substitute for arm's-length capital markets."}
  - {position_id: austrian, alignment: opposed}
references:
  - "Johnson (1982), MITI and the Japanese Miracle"
  - "Hamada & Horiuchi (1987), 'The Political Economy of the Financial Market'"
  - "Okazaki & Okuno-Fujiwara eds. (1999), The Japanese Economic System and its Historical Origins"
  - "Foreign Exchange and Foreign Trade Control Law, Law No. 228 of 1949"
notes: "Pre-1996 sample extension. End date 1975 chosen to separate from post-oil-shock adjustment and 1985 Plaza Accord era."

movement_id: newzealand_shipley_national_1997_1999
status: candidate
name: "Shipley National — first female NZ PM, brief transitional government under MMP"
countries: [NZL]
timeframe: {start: 1997, end: 1999}
coalition: "National Party with NZ First (until August 1998), then minority National with various support partners"
leaders:
  - "Jenny Shipley (Prime Minister 8 December 1997 - 10 December 1999)"
  - "Bill Birch (Finance Minister 1996-1999)"
  - "Don Brash (Reserve Bank Governor 1988-2002)"
doctrine: >
  Economic school: continuation of Bolger-era post-1980s reform
  consolidation under MMP (mixed-member proportional) constraints —
  cautious extension of market-liberal programme with Accident
  Compensation Corporation (ACC) competition experiment, further
  state-enterprise reform, and Asia-crisis cushioning. Left-right
  axis: centre-right — pro-market by New Zealand 1990s standards but
  constrained by MMP coalition politics. Dated policies: Accident
  Insurance Act 1998 (opened ACC work accounts to competition from
  1 July 1999 — reversed by Labour 2000); welfare reform continuation
  under Code of Social and Family Responsibility February 1998; NZ
  First coalition breakdown 14 August 1998 over Wellington Airport
  sale; Asian crisis response — loose-fiscal cushioning but
  Brash-led RBNZ maintained tight monetary stance (official cash rate
  introduced 17 March 1999 replacing Monetary Conditions Index).
  Popularity: internal-party leadership challenge replaced Bolger;
  lost November 1999 election to Clark Labour (39% to 31% party vote).
  Coherence: moderate — final months of the post-1984 market-liberal
  era in New Zealand.
policies:
  - nz_accident_insurance_act_1998
  - nz_official_cash_rate_introduction_1999
  - nz_wellington_airport_sale_1998
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "ACC workplace insurance opened to private competition."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Official Cash Rate mechanism replaced MCI — cleaner operational independence."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Continuation of Code of Social and Family Responsibility conditionality signals."}
predecessor_movements: [newzealand_bolger_national_1990_1997]
successor_movements: [newzealand_clark_labour_1999_2008]

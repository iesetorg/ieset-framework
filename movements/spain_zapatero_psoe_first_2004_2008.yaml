movement_id: spain_zapatero_psoe_first_2004_2008
status: candidate
name: 'Zapatero PSOE first term: social-liberal progressivism'
countries:
- ESP
timeframe:
  start: 2004
  end: 2008
coalition: PSOE minority with external support from IU, ERC, CiU, PNV, BNG
leaders:
- José Luis Rodríguez Zapatero (PM)
- Pedro Solbes (Economy and Finance)
- Jesús Caldera (Labour)
- María Teresa Fernández de la Vega (First Vice-PM)
doctrine: 'Economic school: Spanish social-liberal progressivism — kept Aznar fiscal orthodoxy
  and labour architecture while unwinding foreign- policy alignment and driving social-legislation
  revolution amid historic housing boom. Left-right axis: centre-left on social and foreign policy;
  centrist on macro-fiscal. Dated policies: immediate Iraq withdrawal April-May 2004; same-sex
  marriage Ley 13/2005 of 1 July 2005 (Spain among first in world); Historical Memory Law (Ley
  52/2007) 26 December 2007; regularisation of undocumented immigrants February-May 2005 (~550,000
  legalised); gender-equality law Ley Orgánica 3/2007; gender-violence law Ley Orgánica 1/2004;
  minimum wage rises 5-8% pa; dependency-care law Ley 39/2006 (SAAD); educational law LOE 2006;
  expanded public pension and social spending; housing boom continued (mortgage credit doubled
  2004-2008); reinforcement of Pacto de Toledo 2006; tax reform 2006 cutting IRPEF top rates modestly;
  corporate rate 35% → 30% (2008); catalán statute reform approved 2006; Plan E counter-cyclical
  bridging into second term 2008. Popularity: 2004 PSOE 42.6% (narrow win after 11-M and Iraq);
  2008 PSOE 43.9% (re-elected on housing boom peak, before crisis). Coherence: high on social-progressive
  delivery; macro fragile — pro-cyclical on a housing bubble concealed by surpluses.

  '

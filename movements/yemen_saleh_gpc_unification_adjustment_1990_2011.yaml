# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: yemen_saleh_gpc_unification_adjustment_1990_2011
status: candidate
name: "Yemen Saleh-GPC unification and adjustment state"
countries: [YEM]
timeframe: {start: 1990, end: 2011, enacted_date: "1990-05-22"}
coalition: "General People's Congress presidency with Yemeni Socialist Party participation after unification, then GPC-dominant governments after the 1994 civil war"
leaders:
  - "Ali Abdullah Saleh (President of unified Yemen 1990-2012)"
  - "Haider Abu Bakr al-Attas (Prime Minister 1990-1994)"
  - "Abdul Karim al-Iryani (Prime Minister 1998-2001; senior GPC reform figure)"
doctrine: >
  The Saleh-era unified state combined formal multiparty constitutional
  institutions with presidential patronage, oil-rent distribution, tribal and
  military bargaining, and periodic donor-backed economic reform. Its governing
  claim was that unification and a national constitution would consolidate the
  former northern and southern systems, while IMF- and World Bank-backed
  stabilisation, subsidy reform, and the Social Fund for Development would
  preserve basic services and poverty relief during adjustment.
policies:
  - yem_unification_constitution_1990_1991
  - yem_economic_financial_administrative_reform_program_1995
  - yem_social_fund_for_development_1997
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "Unification created formal constitutional and electoral institutions, while presidential patronage and the post-1994 concentration of power weakened equal constraint."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "The 1995 adjustment programme liberalised trade and exchange arrangements relative to the dual pre-reform system."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Adjustment reduced generalized subsidies, especially fuel and public-enterprise support."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "The Social Fund for Development expanded targeted social and community-project spending."}
references:
  - "Agreement on the Establishment of the Republic of Yemen, 22 May 1990"
  - "Republic of Yemen Constitution, 1991"
  - "IMF and World Bank materials on Yemen's 1995 Economic, Financial and Administrative Reform Program"
  - "Yemen Social Fund for Development founding materials and World Bank project documents"
notes: "This historical movement avoids implying current unified control during Yemen's post-2014 fragmented wartime governance."

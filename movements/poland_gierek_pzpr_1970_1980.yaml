movement_id: poland_gierek_pzpr_1970_1980
status: candidate
name: "Gierek PZPR — debt-financed consumer socialism, ending in Solidarność rupture"
countries: [POL]
timeframe: {start: 1970, end: 1980}
coalition: "Polska Zjednoczona Partia Robotnicza (PZPR) — one-party communist state"
leaders:
  - "Edward Gierek (First Secretary PZPR 1970-1980)"
  - "Piotr Jaroszewicz (Chairman Council of Ministers 1970-1980)"
  - "Stanisław Kania (succeeded Gierek September 1980)"
doctrine: >
  Post-Gomułka Polish party-state that took power after the December
  1970 Baltic-coast worker revolt (Gdynia-Szczecin shootings). School:
  import-substitution-plus-import of Western technology, financed by
  hard-currency Eurodollar borrowing — a specifically Gierek variant
  of late-Soviet-bloc "market socialism" retaining full central
  planning but opening to Western credit markets. Left-right axis:
  far-left / one-party communist on formal axis; internally
  technocratic-modernising faction versus orthodox-planners. Core
  policy content: (i) massive 1971-1975 investment drive financed by
  Western loans — external debt grew from ~$1bn (1970) to ~$17bn
  (1975) to ~$25bn by 1980, imports of turnkey plants (FSO Polonez
  Fiat-licensed car, Katowice steelworks, shipyards); (ii) 1976 price
  reform attempt (June 1976 food-price rises 60%+) triggered Radom and
  Ursus worker riots and withdrawal within 24 hours; (iii) 1977
  formation of KOR (Committee for Workers' Defence) — first organised
  opposition; (iv) 1978 John Paul II election; (v) July 1980 renewed
  price hikes triggered August 1980 Gdańsk shipyard strike and Lenin
  Shipyard occupation under Lech Wałęsa, ending in Gdańsk Agreement
  31 August 1980 legalising Solidarność independent trade union; Gierek
  replaced 5 September 1980. Popularity signals (one-party): PZPR
  membership peaked ~3.1M (1978); 1976 Sejm "elections" delivered 99%
  approval for Front of National Unity; meaningful measure is protest
  incidence — 1970, 1976, 1980 waves of worker revolt directly caused
  leadership changes; Solidarność membership reached ~10M by end 1980.
  Coherence: low — the debt-financed consumer strategy was coherent
  as ambition but ran into Western real-interest shock 1979 and
  absence of exportable output, leaving Poland insolvent by 1981.
policies:
  - pl_gierek_western_debt_investment_drive_1971
  - pl_price_hikes_1976_radom_ursus
  - pl_gdansk_agreement_1980

movement_id: russia_putin_first_term_2000_2004
status: candidate
name: "Putin first term vertical-of-power and 13% flat tax 2000-2004"
countries: [RUS]
timeframe: {start: 2000, end: 2004, enacted_date: "2000-05-07"}
coalition: "Putin presidential administration; Kasyanov government"
leaders:
  - "Vladimir Putin (President, 2000-2004)"
  - "Mikhail Kasyanov (Prime Minister, 2000-2004)"
  - "Alexei Kudrin (Finance Minister, 2000-2004)"
  - "German Gref (Economic Development Minister)"
doctrine: >
  Putin I state-capitalist vertical-of-power + oil boom — economic
  school: 'Gref Programme' economic-liberal reforms (13% flat PIT
  effective 1 Jan 2001, unified social tax, Land Code 2001, new Tax Code)
  combined with re-centralisation of power ('vertikal vlasti'): federal
  districts (May 2000, seven districts with presidential envoys),
  Federation Council reform (Aug 2000, regional bosses replaced by
  appointed senators), Yukos affair (Khodorkovsky arrest 25 Oct 2003,
  Yukos tax-bill and dismantling). Left-right axis: economically centre-
  right reform, institutionally authoritarian-restorationist. Dated
  policies: 13% flat PIT (Jan 2001), Tax Code chapters 21-25 (2000-2002),
  Land Code (Oct 2001), Kursk submarine disaster (Aug 2000), Nord-Ost
  theatre siege (Oct 2002), second Chechen war consolidation, Yukos
  Khodorkovsky arrest (Oct 2003), Beslan school siege (1-3 Sep 2004,
  triggering the 2004 sub-national reform). Popularity: won 2000 and
  2004 (71.3%). Coherence: high — central Kremlin discipline.
policies:
  - ru_flat_tax_13_percent_2001
  - ru_federal_districts_2000
  - ru_yukos_affair_2003
  - ru_kursk_disaster_2000
  - ru_beslan_school_siege_2004
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: strong, rationale: "13% flat PIT replacing progressive 12%/20%/30% schedule effective 1 Jan 2001."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "CIT cut to 24% (2002), broadened base."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Yukos prosecution, federal-districts recentralisation, FC reform undermined judicial independence and federal checks."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Yukos bankruptcy and Yuganskneftegaz auction (Dec 2004) demonstrated state-capitalist expropriation of politically-disfavoured owners."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Oil-boom fiscal expansion moderated by Kudrin Stabilisation Fund (2004)."}

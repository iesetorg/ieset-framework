movement_id: russia_medvedev_presidency_2008_2012
status: candidate
name: "Medvedev presidency tandem with Putin-PM 2008-2012"
countries: [RUS]
timeframe: {start: 2008, end: 2012, enacted_date: "2008-05-07"}
coalition: "United Russia; Medvedev presidency with Putin as Prime Minister"
leaders:
  - "Dmitry Medvedev (President, 2008-2012)"
  - "Vladimir Putin (Prime Minister, 2008-2012)"
  - "Alexei Kudrin (Finance Minister, until Sep 2011)"
  - "Arkady Dvorkovich (Presidential economic aide)"
doctrine: >
  Medvedev presidency under Putin's prime-ministerial tandem ("castling").
  Economic school: Russian 'modernisation-theatre' rhetoric (innovation,
  Skolkovo technology park 2010, four i's — institutions-infrastructure-
  innovation-investment) under sustained state-capitalist continuity.
  Georgian Five-Day War Aug 2008 (recognition of South Ossetia and
  Abkhazia), GFC response including Reserve-Fund drawdown (fell from
  USD 142bn Feb 2009 to USD 25bn Jan 2011), rouble devaluation managed
  via gradual band widening, VEB bank-support packages, presidential-term
  extension from 4 to 6 years (Nov 2008 constitutional amendment, effect
  from 2012). Libya UNSC abstention Mar 2011 (later criticised by Putin
  as 'crusade'), WTO accession signed Dec 2011. Kudrin resignation Sep
  2011 over defence-spending dispute with Medvedev. Dec 2011 Bolotnaya
  protests after Duma elections fraud. Left-right axis: state-capitalist
  institutional centrism with modernisation liberal overlay. Popularity:
  moderate; real power remained with Putin. Coherence: high within
  tandem discipline; modernisation agenda largely symbolic.
policies:
  - ru_presidential_term_extension_2008
  - ru_georgia_war_2008
  - ru_skolkovo_innovation_2010
  - ru_gfc_reserve_fund_drawdown_2008_2009
  - ru_wto_accession_2011_2012
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Presidential-term extension 4->6 years; 2011 Duma election fraud; Khodorkovsky second trial."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "GFC stimulus and Reserve-Fund drawdown; 2009 GDP -7.8% triggered large counter-cyclical package."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "VEB bailouts, AvtoVAZ support, Skolkovo innovation subsidies."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "WTO accession negotiated to completion (Dec 2011 signed, Aug 2012 effective)."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Khodorkovsky second trial (Dec 2010) and continued property-rights uncertainty in 'strategic' sectors."}

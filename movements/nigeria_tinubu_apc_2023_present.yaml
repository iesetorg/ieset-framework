# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: nigeria_tinubu_apc_2023_present
status: candidate
name: "Tinubu APC Tinubuomics reform era"
countries: [NGA]
timeframe: {start: 2023, end: ongoing}
coalition: "All Progressives Congress (APC). Presidential election 25 Feb 2023: Tinubu 36.61% plurality (8.79m votes) — contested; Atiku (PDP) 29.07%, Obi (LP) 25.40%. National Assembly: APC 179/360 House seats, 59/109 Senate seats (largest bloc, governing with allies)."
leaders: ["Bola Ahmed Tinubu (President, sworn in 29 May 2023)", "Kashim Shettima (VP)", "Wale Edun (Finance / Coordinating Minister of the Economy)", "Olayemi Cardoso (CBN Governor from 22 Sep 2023)", "Zacch Adedeji (FIRS Chair; Tax Reform Committee)"]
doctrine: >
  Tinubuomics is a reformist-market shock-therapy programme announced on Day 1
  with the inaugural line "subsidy is gone" (29 May 2023) removing the PMS
  petrol subsidy, followed by the 14 June 2023 naira float / unification of
  multiple CBN windows into the willing-buyer-willing-seller I&E window.
  Centre-right in Nigerian terms: supply-side liberalisation, FX liberalisation,
  CBN orthodoxy restoration under Olayemi Cardoso (appointed Sep 2023, replacing
  Emefiele-era heterodoxy and Ways-and-Means overdraft financing), Nigerian Tax
  Reform Bills submitted 2024 (broadening VAT, rationalising 62 overlapping
  taxes, raising VAT sharing to states), and Dangote Refinery commencing
  operations January 2024 reshaping downstream oil. The stabilisation cost has
  been severe: headline inflation rose from ~22% at inauguration to peak 34.2%
  (June 2024), naira depreciated from ~N460/$ to N1600+/$, cost-of-living
  pressure triggered the August 2024 #EndBadGovernance protests (echoing
  #EndSARS October 2020 memory) and sporadic 2025 unrest. Coherence line:
  "Renewed Hope" — front-load the painful subsidy + FX reforms the previous
  four administrations deferred, accept the stagflationary transition, and
  rebuild on stabilised macro foundations. Popularity has eroded markedly from
  the thin 2023 plurality mandate.
policies:
  - ng_fuel_subsidy_removal_2023
  - ng_naira_float_unification_2023
  - ng_cbn_cardoso_orthodoxy_2023
  - ng_tax_reform_bills_2024
  - ng_student_loan_act_2023
  - ng_endbadgovernance_protests_response_2024
  - ng_electricity_act_2023
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: strong, rationale: "PMS petrol subsidy removed 29 May 2023; electricity tariff Band A cost-reflective 2024."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Cardoso CBN ended Ways-and-Means financing, restored orthodox MPC; policy rate raised to 27.5%."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Naira unification ended parallel-market rationing; 43-item FX ban list lifted Oct 2023."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "FX willing-buyer-willing-seller regime; BDC reform; bank recapitalisation 2024."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Tax Reform Bills 2024 raise PIT exemption, progressive bands; VAT sharing reallocated to consumption states."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Electricity Act 2023 decentralised power to states; Dangote refinery breaks NNPC downstream monopoly."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Crackdown on #EndBadGovernance protests Aug 2024; treason charges against minors."}
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned, notes: "Subsidy removal + FX unification + CBN orthodoxy is textbook stabilisation."}
  - {position_id: institutionalism, alignment: partially_aligned}
predecessor_movements: [nigeria_buhari_apc_civilian_2015_2023]
references:

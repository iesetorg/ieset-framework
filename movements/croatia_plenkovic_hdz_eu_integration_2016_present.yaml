# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: croatia_plenkovic_hdz_eu_integration_2016_present
status: candidate
name: "Croatia Plenkovic HDZ EU-integration reform 2016-present"
countries: [HRV]
timeframe: {start: 2016, end: ongoing}
coalition: "HDZ-led governments under Andrej Plenkovic"
leaders:
  - "Andrej Plenkovic (Prime Minister, 2016-present)"
doctrine: >
  Croatia's Plenkovic-era governing programme has emphasised deep EU
  integration, macro-institutional convergence, and incremental labour-market
  modernisation. The visible recent policy cluster is Croatia's entry into the
  euro area and Schengen zone in 2023, alongside Labour Act amendments covering
  fixed-term contracts, remote work, platform work, and employee information
  rights.
policies:
  - hr_euro_adoption_2023
  - hr_schengen_accession_2023
  - hr_labour_act_amendments_2023
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Euro adoption and Schengen accession reduced currency, travel, and transport frictions with EU partners."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "Full Schengen application lifted internal border checks on persons."}
  - {axis: regulatory.labour_market_flexibility, direction: mixed, magnitude: moderate, rationale: "Labour Act amendments tightened fixed-term rules while formalising remote and additional work."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "EU convergence and codified labour rules strengthened predictable legal obligations."}
references:
  - "Council Decision (EU) 2022/1211 on adoption by Croatia of the euro."
  - "Council Decision (EU) 2022/2451 on full application of the Schengen acquis in Croatia."
  - "Croatia Labour Act amendments, Official Gazette 151/2022."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_lbj_great_society_1964_1968
status: candidate
name: "LBJ Great Society + War on Poverty"
countries: [USA]
timeframe: {start: 1964, end: 1968}
coalition: "Democratic (LBJ + 89th Congress super-majorities after 1964 landslide)"
leaders:
  - "Lyndon B. Johnson (President)"
  - "Hubert Humphrey (VP)"
  - "Sargent Shriver (OEO Director)"
  - "Wilbur Cohen (HEW)"
  - "Wilbur Mills (House Ways & Means)"
doctrine: >
  Ambitious domestic agenda pairing civil-rights enforcement with an expansion
  of federal transfer programmes and human-capital investment. The Economic
  Opportunity Act 1964 created the Office of Economic Opportunity (OEO) and
  Community Action, Job Corps, Head Start, and VISTA. The Social Security
  Amendments of 1965 created Medicare (Title XVIII) and Medicaid (Title XIX),
  the largest health-insurance expansions in US history until the ACA. The
  Elementary and Secondary Education Act 1965 (ESEA) and Higher Education Act
  1965 established the federal role in K-12 funding (Title I) and student
  aid. The Voting Rights Act 1965 and Civil Rights Act 1964 were enforced as
  companions to the economic agenda. Stated case: use sustained growth
  dividends to abolish poverty, close racial gaps in access, and build a
  permanent federal role in health, education, and anti-discrimination
  enforcement. Fiscal cost of simultaneous Vietnam escalation + Great Society
  contributed to late-1960s inflation pressures.
policies:
  - us_medicare_1965
  - us_medicaid_1965
  - us_eoa_1964
  - us_esea_1965
  - us_higher_education_act_1965
  - us_voting_rights_act_1965
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Medicare + Medicaid + means-tested anti-poverty programmes constitute the largest transfer expansion since the New Deal."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Non-defence federal spending share rose ~3 points of GDP 1964-1968."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Federal K-12 (ESEA Title I), higher-education aid, housing."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "VRA 1965 federal preclearance mechanism materially expanded enforcement of equal treatment."}
outcome_hypotheses: [transfer_programme_poverty_reduction_effect, public_health_insurance_coverage_effect]
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: institutionalism, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Pragmatic stance depends on which programme — Medicare/Medicaid expanded coverage effectively; CAP / Job Corps outcomes mixed."}
  - {position_id: austrian, alignment: opposed}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Social Security Amendments of 1965 (Public Law 89-97) — Medicare + Medicaid"
  - "Economic Opportunity Act 1964 (Public Law 88-452)"
  - "Elementary and Secondary Education Act 1965 (Public Law 89-10)"
  - "Voting Rights Act 1965 (Public Law 89-110)"
  - "Higher Education Act 1965 (Public Law 89-329)"
  - "Bailey & Danziger eds. (2013), Legacies of the War on Poverty"

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malta_labour_social_regulatory_state_2020_present
status: candidate
name: "Malta Labour social-regulatory state 2020-present"
countries: [MLT]
timeframe: {start: 2020, end: ongoing}
coalition: "Labour Party governments under Joseph Muscat and Robert Abela"
leaders:
  - "Joseph Muscat (Prime Minister to January 2020)"
  - "Robert Abela (Prime Minister, 2020-present)"
doctrine: >
  Malta's recent Labour policy cluster mixes social affordability measures,
  housing-market regulation, and permissive-but-licensed social regulation.
  The government regulated private residential leases, created a limited legal
  cannabis framework, and made public bus transport free for resident card
  holders, using fiscal support and licensing to shape household costs,
  mobility, and previously prohibited conduct.
policies:
  - mt_private_residential_leases_act_2020
  - mt_responsible_cannabis_use_act_2021
  - mt_free_public_transport_2022
axes_summary:
  - {axis: regulatory.housing_rent_control, direction: "+", magnitude: moderate, rationale: "Private Residential Leases Act added registration, duration, renewal, and rent-increase rules."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Free bus travel replaces user fares with public support to the transport operator."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Free public transport encourages modal shift away from private cars."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Cannabis and lease reforms moved discretionary or informal practices into statutory frameworks."}
references:
  - "Malta Private Residential Leases Act, Chapter 604."
  - "Malta Public Transport, Free Travel scheme: https://www.publictransport.com.mt/en/free-travel"
  - "Malta Authority on the Responsible Use of Cannabis Act, 2021."

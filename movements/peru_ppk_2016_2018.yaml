movement_id: peru_ppk_2016_2018
status: candidate
name: "Pedro Pablo Kuczynski (PPK) — technocratic centre-right, OECD path, Odebrecht resignation"
countries: [PER]
timeframe: {start: 2016, end: 2018, enacted_date: "2016-07-28"}
coalition: "Peruanos por el Kambio (minority; Fujimorist-dominated Congress)"
leaders:
  - "Pedro Pablo Kuczynski (President 2016-Mar 2018)"
  - "Alfredo Thorne (Finance 2016-2017)"
  - "Fernando Zavala (Finance 2017, PM 2016-2017)"
  - "Claudia Cooper (Finance 2017-2018)"
doctrine: >
  PPK's abbreviated presidency was a technocratic centre-right project
  aiming at OECD accession + formalisation, defeated by Odebrecht-era
  congressional warfare. (a) Economic school: centre-right market-liberal
  + technocratic + OECD-accession-aligned — lowered VAT stated ambition
  (never enacted), simplified business regulation (Decreto de Urgencia
  creation packages), earthquake + coastal El Niño reconstruction
  Jan-Mar 2017 (ARCC Authority created Apr 2017), Odebrecht plea-bargain
  fallout investigation + first-ever presidential impeachment proceedings.
  (b) Left-right: centre-right; market-liberal, pro-investment, OECD path.
  (c) Dated policies: Reconstrucción con Cambios ARCC Apr 2017, legislative-
  decree package Dec 2016 (Decretos Legislativos 1278-1360), Kenji-pardon-
  Alberto-Fujimori Dec 2017 (Humanitarian pardon of Alberto Fujimori),
  congressional impeachment motion Dec 2017 (survived 78-8), Odebrecht
  payment disclosures, second impeachment motion March 2018 PPK resigned
  21 Mar 2018 before vote. (d) Popularity: won Jun 2016 runoff by 0.24%
  (50.12%) vs Keiko Fujimori; approval peaked ~60% early, collapsed to
  ~19% by Mar 2018 on Fujimori-pardon + Odebrecht disclosures; Vizcarra
  (VP) assumed presidency 23 Mar 2018. (e) Coherence: low — minority
  government, hostile Fujimorist Congress, and PPK's own Odebrecht
  advisory-payment history made any structural reform impossible;
  earthquake reconstruction + Fujimori-pardon dominated substantive
  governance.
policies:

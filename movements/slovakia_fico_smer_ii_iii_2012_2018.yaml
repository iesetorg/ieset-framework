movement_id: slovakia_fico_smer_ii_iii_2012_2018
status: candidate
name: "Fico Smer II and III 2012-2018"
countries: [SVK]
timeframe: {start: 2012, end: 2018, enacted_date: "2012-04-04"}
coalition: "Smer-SD single-party majority (2012-2016); Smer-SD, SNS, Most-Hid (2016-2018)"
leaders:
  - "Robert Fico (Prime Minister, Smer-SD, 2012-2018)"
  - "Peter Kazimir (Finance Minister)"
  - "Robert Kalinak (Interior Minister)"
doctrine: >
  Fico's second and third governments — social-democratic-nationalist
  with flat-tax reversal and later tripartite nationalist coalition.
  Economic school: Slovak social-democratic redistribution with national-
  champion orientation — flat tax abolished Jan 2013 (PIT 19% -> 19%/25%
  above threshold, CIT 19% -> 23% then 22% 2014 -> 21% 2017); restored
  bank levy (2012), health-insurance unitary-system attempt (blocked),
  bonus-year pension cap, minimum-wage ramp. Third term (2016-2018)
  added SNS nationalist and Most-Hid minority-Hungarian partners;
  tainted by Jan Kuciak and Martina Kusnirova murder 21 Feb 2018 —
  investigative journalist probing Italian 'Ndrangheta-Smer links and
  VAT-fraud cases. Mass protests ('For a Decent Slovakia') forced Fico's
  resignation 15 Mar 2018, replaced by Pellegrini. Left-right axis:
  centre-left economically, culturally-conservative-nationalist. Dated
  policies: flat-tax abolition 2013, bank levy 2012, Kuciak assassination
  Feb 2018. Popularity: high through most of tenure then collapsed.
  Coherence: moderate-to-high until 2018 crisis.
policies:
  - sk_flat_tax_abolition_2013
  - sk_bank_levy_2012
  - sk_kuciak_assassination_2018
  - sk_minimum_wage_ramp_2012_2018
  - sk_second_pillar_voluntarisation_2012
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Flat tax abolished 2013; added top PIT and CIT brackets."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "CIT rose 19% -> 23% 2013, then eased to 22%, later 21% — still net above 2012."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Minimum-wage ramp, 13th pension, social transfers expanded."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Bank levy and unitary-insurance attempts tightened sectoral supervision."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Kuciak murder and post-2018 investigations exposed organised-crime penetration of state organs."}

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: gambia_barrow_democratic_transition_reform_2017_present
status: candidate
name: "Barrow democratic-transition and recovery reform 2017-present"
countries: [GMB]
timeframe: {start: 2017, end: ongoing, enacted_date: "2017-01-19"}
coalition: "Adama Barrow transition coalition and National People's Party government"
leaders:
  - "Adama Barrow (President, 2017-present)"
  - "Muhammed B. S. Jallow (Vice President)"
  - "Seedy Keita (Minister of Finance and Economic Affairs)"
doctrine: >
  Barrow's post-Jammeh governments pursued a democratic-transition agenda built
  around truth-seeking, access to information, institutional repair, and
  macroeconomic recovery. The programme links transitional-justice and
  transparency statutes with a recovery-focused development plan and IMF-backed
  debt, revenue, and public-finance reforms.
policies:
  - gm_trrc_act_2017
  - gm_access_to_information_act_2021
  - gm_recovery_focused_ndp_2023_2027
  - gm_imf_ecf_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "TRRC and access-to-information statutes formalize accountability and public transparency after authoritarian rule."}
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "The recovery plan expands priority investment while the ECF disciplines deficits and debt vulnerabilities."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "The recovery plan targets agriculture, tourism, green recovery, and social sectors for coordinated support."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "The ECF supports foreign-exchange, inflation, and reserve-management credibility."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "The ECF and recovery plan include business-environment and private-sector-led growth reforms."}
references:
  - "Government of The Gambia, Truth, Reconciliation and Reparations Commission Act, 2017."
  - "Government of The Gambia, Access to Information Act, 2021."
  - "IMF Country Report No. 2024/015, The Gambia 2023 Article IV and ECF request."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: netherlands_rutte_iii_2017_2022
status: candidate
name: "Rutte III coalition (Netherlands, VVD-CDA-D66-CU)"

countries: [NLD]

timeframe:
  start: 2017
  end: 2022
  enacted_date: "2017-10-26"

coalition: "VVD-CDA-D66-ChristenUnie four-party coalition; formed after record-at-the-time 225-day formation; resigned January 2021 over Toeslagenaffaire but continued caretaker through COVID; succeeded by Rutte IV 10 January 2022"

leaders:
  - "Mark Rutte (Prime Minister, VVD; third term)"
  - "Wopke Hoekstra (Finance Minister, CDA)"
  - "Kajsa Ollongren (Deputy PM, D66)"
  - "Carola Schouten (Agriculture, Nature and Food Quality Minister, ChristenUnie)"
  - "Eric Wiebes (Economic Affairs and Climate, VVD; resigned January 2021)"
  - "Menno Snel (State Secretary Finance, D66; resigned December 2019 over Toeslagenaffaire)"

doctrine: >
  VVD liberal-orthodoxy fused with CDA Christian-democratic fiscal
  conservatism, D66 social-liberal reformism, and ChristenUnie
  confessional-centrism — the canonical Rutte-era "middenkabinet"
  governing from the centre-right on fiscal and centre on social
  policy. Self-described vehicle of the 2017 "Vertrouwen in de
  toekomst" accord: cut corporate tax, invest modestly in climate and
  defence, keep the budget balanced under the Zalm-norm
  trend-expenditure framework. Key content: (i) signature political
  blunder — the 2017-2018 plan to abolish the 15% dividend withholding
  tax (dividendbelasting), ostensibly for multinational
  competitiveness, abandoned October 2018 after Unilever relocated its
  headquarters anyway; (ii) corporate income tax cuts (Wet
  bronbelasting 2021 and rate reductions from 25% to 25.8% top /
  introduction of 15% SME bracket raised to EUR 395,000); (iii)
  Klimaatakkoord 28 June 2019 — sectoral CO2 reduction agreements
  with industry, buildings, mobility, agriculture, electricity, with
  Klimaatwet 2019 codifying a 49% by 2030 / 95% by 2050 target;
  (iv) stikstofcrisis 29 May 2019: Raad van State annulled the
  Programma Aanpak Stikstof (PAS) under the EU Habitats Directive,
  freezing ~18,000 construction and farm permits overnight and
  triggering farmer tractor protests on 1 October 2019; partial
  speed-limit-to-100kph and BBB-precursor responses through 2020-2021;
  (v) COVID-19 fiscal response — NOW wage subsidy (March 2020
  onwards), TOGS/TVL sector grants, tax deferral — totalling roughly
  EUR 80bn gross, the largest Dutch peacetime fiscal intervention;
  (vi) Toeslagenaffaire (childcare benefits scandal) — the December
  2019 Trouw/RTL investigations and the December 2020 parliamentary
  inquiry "Ongekend onrecht" found the Belastingdienst had
  systematically and discriminatorily clawed back childcare benefits
  from ~26,000 families based on ethnic-profiling flagging; the
  cabinet resigned 15 January 2021 but continued caretaker; (vii)
  Groningen gas field production wind-down accelerated (decision 2018
  to end production by 2022 after earthquake damage), ultimately
  closed in October 2023. Entered with 76/150 seats (bare majority);
  after March 2021 election VVD won 34 seats but D66 surged to 24 and
  CDA collapsed to 15 on its Hugo de Jonge-vs-Pieter Omtzigt internal
  schism. Approval stayed relatively stable through 2018-2020,
  rallied during COVID, then eroded on Toeslagenaffaire and the
  record-long formation. Coherence: moderate — the fiscal and climate
  content held together, but the stikstofcrisis was the state losing
  control of an externality it had tried to paper over for a decade,
  and the Toeslagenaffaire was a rule-of-law failure inside the
  tax administration itself.

policies:
  - nl_dividend_tax_abolition_uturn_2018
  - nl_klimaatakkoord_klimaatwet_2019
  - nl_stikstofcrisis_pas_annulment_response_2019_2021
  - nl_covid_fiscal_response_now_tvl_2020_2022
  - nl_toeslagenaffaire_reckoning_2019_2021
  - nl_groningen_gas_wind_down_2018_2023

axes_summary:
  - axis: fiscal.tax_corporate
    direction: "-"
    magnitude: moderate
    rationale: "Corporate rate reductions and SME bracket extension; dividend-tax abolition attempt reversed but intent was directional."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: strong
    rationale: "Klimaatakkoord 2019 + Klimaatwet 2019 codified 49%/2030 target; forced partial response to PAS annulment."
  - axis: regulatory.energy_supply_security
    direction: "-"
    magnitude: moderate
    rationale: "Groningen gas field production wind-down 2018-2023 removed largest domestic gas source; onset of import dependence pre-dated 2022 crisis."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "COVID response EUR ~80bn gross; debt/GDP rose from ~48% (2019) to ~54% (2021)."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: moderate
    rationale: "Toeslagenaffaire documented systematic ethnic-profiling and denial of procedural rights by the tax administration; cabinet resignation acknowledged institutional failure."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    rationale: "Wet arbeidsmarkt in balans (2020) slightly tightened flex/zzp boundaries."

outcome_hypotheses:
  - nl_corporate_tax_cut_investment_effect
  - nl_covid_fiscal_response_employment_effect

position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: austrian, alignment: partially_aligned, notes: "Fiscal side aligned; climate and sectoral spend not."}
  - {position_id: social_democratic, alignment: opposed}

references:
  - "Regeerakkoord 'Vertrouwen in de toekomst' 10 October 2017"
  - "Klimaatakkoord 28 June 2019 and Klimaatwet (Stb. 2019, 253)"
  - "Raad van State 29 May 2019 PAS-uitspraak (ECLI:NL:RVS:2019:1603)"
  - "Parlementaire ondervragingscommissie Kinderopvangtoeslag 'Ongekend onrecht' 17 December 2020"
  - "Wet bronbelasting 2021 (Stb. 2019, 513)"
  - "NOW/TVL COVID package, Ministerie van SZW / EZK 2020-2022"
  - "Groningen gasproductie besluit 2018 (Ministerie van EZK)"

notes: >
  Coded as a single movement because Rutte III governed as fully-empowered
  cabinet 2017-2021 and as caretaker 2021-2022; the January 2021 resignation
  over Toeslagenaffaire is the movement's defining coherence event and is
  therefore coded inside this movement rather than split out.

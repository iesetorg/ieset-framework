movement_id: germany_merkel_nuclear_phaseout_2011
status: candidate
name: Merkel post-Fukushima nuclear phase-out pivot
countries:
- DEU
timeframe:
  start: 2011
  end: 2022
  enacted_date: '2011-06-30'
coalition: CDU/CSU–FDP
leaders:
- Angela Merkel (Chancellor)
- Norbert Röttgen (Environment Minister)
- Philipp Rösler (Economy Minister)
doctrine: 'Following the Fukushima Daiichi accident on 11 March 2011, the Merkel government reversed
  its own 2010 decision to extend nuclear plant lifetimes (Laufzeitverlängerung) and legislated
  an accelerated phase-out of all 17 German nuclear reactors by end-2022 via the 13th Atomgesetz
  amendment (30 June 2011). Eight reactors were shut within months; the final three (Isar 2, Emsland,
  Neckarwestheim 2) closed 15 April 2023 after a short crisis-extension. The pivot was framed
  as a democratic response to public risk-acceptance shifts and as the accelerator for the broader
  Energiewende. This movement is distinct from the Energiewende policy-content movement: it codes
  the specific 2011 political decision to withdraw baseload nuclear capacity, not the full renewable-subsidy
  and climate-target stack that followed.

  '
policies:
- germany_energiewende_2011
- germany_atomgesetz_13th_amendment_2011
- germany_ethik_kommission_sichere_energieversorgung_2011
axes_summary:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  rationale: Legally binding nuclear phase-out and accelerated renewable mandate.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: strong
  rationale: State-mandated shutdown timetable; licensing regime tightened across generation.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  rationale: Withdrawal of firm baseload before replacement capacity was in place; deepened pipeline-gas
    dependence surfaced by 2022 crisis.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: EEG surcharge and grid-investment subsidies expanded to absorb the renewable ramp.
outcome_hypotheses:
- energiewende_synthetic_control_vs_nuclear_peers
- supply_security_cost_of_single_supplier_dependence
predecessor_movements: []
successor_movements:
- germany_scholz_ampel_2021_2025
position_alignments:
- position_id: eco_socialist
  alignment: aligned
- position_id: austrian
  alignment: opposed
  notes: Argues the phase-out destroyed option value on cheap baseload.
- position_id: empirical_pragmatist
  alignment: partially_aligned
  notes: Supports decarbonisation goal; disputes the timing and supply-security trade-off.
references:
- Dreizehntes Gesetz zur Änderung des Atomgesetzes (BGBl. I 2011, 1704)
- Ethik-Kommission Sichere Energieversorgung, Abschlussbericht (Mai 2011)
- BMWi monitoring reports on Energiewende implementation
notes: 'Coded distinctly from the broader Energiewende because the decision mechanism (executive
  pivot in response to a foreign nuclear accident, ratified by a CDU/CSU–FDP Bundestag majority)
  is politically identifiable and reversible in principle, whereas subsequent climate- neutrality
  commitments are durable across governing coalitions.

  '

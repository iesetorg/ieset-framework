# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: iran_ahmadinejad_principlist_2005_2013
status: candidate
name: "Ahmadinejad principlist populist government (Iran)"
countries: [IRN]
timeframe:
  start: 2005
  end: 2013
  enacted_date: "2005-08-03"
coalition: "Principlist (osulgara) conservative populist bloc under Supreme Leader Khamenei; Alliance of Builders of Islamic Iran (Abadgaran) majles base; later Deviant-Current split 2011-2013"
leaders:
  - "Mahmoud Ahmadinejad (President 3 Aug 2005 - 3 Aug 2013)"
  - "Mohammad Reza Rahimi (First Vice President 2009-2013)"
  - "Shamseddin Hosseini (Minister of Economy 2008-2013)"
  - "Mahmoud Bahmani (CBI Governor 2008-2013)"
  - "Esfandiar Rahim Mashaei (Chief of Staff, Deviant Current figure)"
doctrine: >
  Populist oil-redistribution and subsidy-reform cash-transfer programme
  executed amid escalating nuclear-sanctions crisis. Economic school:
  populist-redistributive within clerical-theocratic system — Mehr housing
  programme (~2 million units target), province-visit cash disbursements,
  and the landmark Targeted Subsidies Reform Law of 5 Jan 2010 phased-in
  from 19 Dec 2010 (hedfmandi-yarane-ha) removing price subsidies on fuel,
  electricity, water, and bread while replacing them with per-capita cash
  transfers to ~80% of households. Dated policies: Targeted Subsidies Reform
  Law ratified 5 Jan 2010, Phase 1 enacted 19 Dec 2010; UNSCR 1929 additional
  sanctions 9 Jun 2010; EU oil embargo Jul 2012; SWIFT disconnection Mar
  2012; rial collapse from ~11,000/USD (2010) to ~35,000/USD black market
  by late 2012; Green Movement protests after disputed 12 Jun 2009 election.
  Left-right: populist-right on religious/nationalist identity, populist-
  redistributive on economic axes; nuclear-escalationist on foreign policy.
  Popularity: 62.6% second-round 2005 vs Rafsanjani; disputed 62.6% 2009
  triggering Green Movement; late-term approval collapsed after 2012 rial
  crash and factional break with Larijani brothers / Khamenei-aligned
  principlists. Coherence: economic-populist pillar coherent and bold
  (subsidy-reform is textbook liberalisation packaged as redistribution)
  but foreign-policy sanctions-endurance posture undercut macroeconomic
  stability; rial collapse and 2012 hyperinflationary acceleration
  overwhelmed cash-transfer offset.
policies:
  - ir_targeted_subsidies_reform_2010
  - ir_mehr_housing_programme_2007
  - ir_nuclear_escalation_sanctions_2006_2012
  - ir_rial_collapse_2012
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: strong, rationale: "Targeted Subsidies Reform removed ~$100bn/yr price subsidies; replaced with targeted cash."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Universal cash transfers reached ~73m recipients at ~$45/month per capita initial payments."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "UNSCR 1929, EU oil embargo, SWIFT disconnection progressively cut external trade."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Politicised CBI direction; reserve mismanagement preceding 2012 rial collapse."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Expanded IRGC and bonyad parastatal role in import licensing and privatisation auctions."}
outcome_hypotheses: [sanctions_effect_on_growth, subsidy_cash_transfer_swap_effectiveness]
predecessor_movements: [iran_khatami_reformist_1997_2005]
successor_movements: [iran_rouhani_moderate_2013_2021]
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Subsidy-reform price-liberalisation is textbook classical-liberal structural reform packaged as populism."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Mehr housing and provincial-investment drive; oil-revenue redistribution logic."}
references:
  - "IMF Article IV Iran 2010, 2011"
  - "Salehi-Isfahani (2014), 'Iran's Subsidy Reform: From Promise to Disappointment'"
  - "UNSCR 1737, 1747, 1803, 1929 sanctions documents"
notes: "Subsidy-reform law retained in name under Rouhani but cash-transfer real value eroded by 2013 inflation; axis-direction on subsidy retains '-' for initial shock."

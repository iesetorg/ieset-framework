# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thailand_chuan_ii_democrat_1997_2001
status: candidate
name: "Chuan Leekpai II Democrat — IMF-programme-implementation government (1997-2001)"
countries: [THA]
timeframe:
  start: 1997
  end: 2001
  enacted_date: "1997-11-09"
coalition: "Democrat Party (Prachatipat)-led with Chart Thai, Social Action, Seritham, Ekkaparb — formed after Chavalit coalition collapse"
leaders:
  - "Chuan Leekpai (PM 9 Nov 1997 - 17 Feb 2001)"
  - "Tarrin Nimmanahaeminda (Finance)"
  - "Supachai Panitchpakdi (Deputy PM for economy, later WTO DG)"
  - "Chaiyawat Wibulswasdi → M. R. Chatu Mongol Sonakul → Prasarn Trairatvorakul (BoT Governor)"
doctrine: >
  Democrat Party IMF-programme-implementation technocratic
  government — Chuan's second premiership coincided with deepest
  IMF-conditioned adjustment. Economic school: liberal-orthodox
  crisis-management closely aligned to IMF/World Bank Washington
  Consensus, with Tarrin Nimmanahaeminda as lead architect of
  banking restructuring. Centre-right liberal reformist, cosmopolitan
  technocratic, constitutionalist. Key policy content: (i) IMF
  programme implementation — Letter of Intent rounds 2-8,
  fiscal-surplus targets, bank-sector recapitalisation; (ii)
  Financial Institutions Development Fund (FIDF) bank-support
  programme ~Rp 1.4tn baht bond issuance ultimately borne by
  public debt; (iii) August 1998 "14 August Package" — Tier-1 and
  Tier-2 conditional capital injection scheme encouraging private
  recapitalisation first; (iv) Krung Thai Bank nationalisation,
  First Bangkok City Bank merger, Thai Farmers' Bank private
  recapitalisation; (v) Capital-account management reforms —
  two-tier Baht market dismantled January 1998 (imposed by BoT
  May 1997); (vi) Social Security Act expansion and elderly-
  allowance programme expansion; (vii) Tambon Administrative
  Organizations (TAO) reform — first directly elected local-
  government tier from 1999; (viii) Agriculture Debt Moratorium
  2000 for small farmers; (ix) 2000 Senate election — first
  fully elected Senate under 1997 Constitution; (x) "Master Plan
  for State Enterprise Reform" 1998 — privatisation framework
  with PTT (partial) and PEA (delayed) as flagships. Popularity:
  formed government November 1997 after Chavalit resignation
  (without election); 2001 January election lost to Thaksin's
  Thai Rak Thai (TRT 248/500 vs Democrat 128/500) — canonical
  backlash against IMF-conditioned adjustment.
policies:
  - th_imf_programme_implementation_1997_2000
  - th_fidf_bank_recapitalisation_1998
  - th_14_august_package_1998
  - th_tambon_administrative_elections_1999
  - th_ptt_partial_privatisation_2001
  - th_agriculture_debt_moratorium_2000
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "FIDF recapitalisation, BoT supervision tightened, Basel capital ratios enforced across recapitalised banks."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "IMF-conditioned fiscal consolidation 1997-98; reversed toward stimulus after Q4 1998 programme revision."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "After initial IMF-conditioned tightening, rate-cutting cycle from 1999; Baht stabilised into managed-float."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "State-enterprise reform plan and PTT partial privatisation launched sectoral opening."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "WTO commitments fulfilled; ASEAN Free Trade Area (AFTA) implementation."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "1997 Constitution implemented — TAO elections 1999, Senate election March 2000, NCCC cases against former ministers."}
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "IMF-orthodoxy, state-enterprise reform, constitutional implementation all squarely liberal-reformist."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "14-August Package's conditional-capital-injection design was forensic and evidence-driven."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Pro-cyclical early-programme tightening treated as canonical policy error."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Social-security expansion welcomed; adjustment distributional costs opposed."}
references:
  - "IMF Thailand Letters of Intent 1997-2000"
  - "BoT Annual Reports 1998-2000"
  - "1997 Constitution implementation acts — TAO 1999, Senate Election 2000"
  - "Wade (1998), 'From 'Miracle' to 'Cronyism''"
notes: >
  Chuan II remembered domestically for distributional pain of IMF
  adjustment (driving 2001 TRT landslide) and internationally for
  Tarrin-designed bank-recapitalisation framework that avoided mass
  nationalisation.

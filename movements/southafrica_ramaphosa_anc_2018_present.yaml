movement_id: southafrica_ramaphosa_anc_2018_present
status: candidate
name: "Ramaphosa ANC/GNU presidency (South Africa, 2018-present)"
countries: [ZAF]
timeframe: {start: 2018, end: "ongoing"}
coalition: "ANC 2018-2024; Government of National Unity (ANC+DA+IFP+others) from 14 June 2024"
leaders: ["Cyril Ramaphosa (President, Feb 2018-)", "Tito Mboweni (Finance 2018-2021)", "Enoch Godongwana (Finance 2021-)", "Paul Mashatile (Deputy President 2023-)"]
doctrine: >
  Ramaphosa assumed the presidency in February 2018 after the ANC recalled Jacob
  Zuma, positioning the administration as reformist-orthodox: restoring fiscal
  credibility, remediating the Zuma-era state-capture damage documented by the
  Zondo Commission (2018-2022), and catalysing private investment via the
  presidential investment conferences and "Operation Vulindlela" structural
  reform unit. Economic school is pragmatic centrist: macro continuity with the
  Mboweni-Godongwana Treasury, SARB independence preserved, combined with an
  energy-reform RECIPE — Eskom unbundling into Generation/Transmission/
  Distribution (NTCSA licensed 2023), embedded-generation licensing threshold
  scrapped (July 2022), the Eskom R254bn debt-relief package (Feb 2023), and
  the Electricity Regulation Amendment and Independent System and Market
  Operator framework (2024) to liberalise the grid. On the redistribution axis
  the doctrine tilts social-democratic: NHI Bill signed 15 May 2024,
  Two-Pot Retirement system live 1 Sep 2024, Social Relief of Distress grant
  extended. After the ANC dropped to 40.18% in the 29 May 2024 election, the
  GNU formed on 14 June 2024 brought the centre-right DA into cabinet,
  shifting the coalition's centre of gravity rightward on macroeconomic and
  property-rights questions while the Expropriation Act (signed Jan 2025, with
  compensation) and the Budget 2025 VAT episode exposed intra-coalition
  friction. ANC vote-share trajectory: 62.15% (2014) → 57.50% (2019) → 40.18%
  (2024); presidential approval tracked load-shedding intensity, recovering
  sharply in 2024 as blackouts eased. Coherence line: orthodox-macro +
  structural-reform + expanded-transfer — internally consistent reformism,
  now constrained and moderated by GNU coalition arithmetic.
policies:
  - za_eskom_debt_relief_2023
  - za_nhi_bill_2024
  - za_two_pot_retirement_2024
  - za_ismo_electricity_reform_2024
  - za_expropriation_act_2025

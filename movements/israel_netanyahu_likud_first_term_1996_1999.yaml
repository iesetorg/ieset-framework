movement_id: israel_netanyahu_likud_first_term_1996_1999
status: candidate
name: "Netanyahu Likud I — supply-side pivot, Wye River stall, Oslo slowdown"
countries: [ISR]
timeframe: {start: 1996, end: 1999}
coalition: "Likud-led coalition with Shas, NRP, Yisrael BaAliyah"
leaders:
  - "Benjamin Netanyahu (Prime Minister 18 June 1996 - 6 July 1999)"
  - "Dan Meridor (Finance Minister 1996-1997)"
  - "Yaakov Neeman (Finance Minister 1997-1998)"
  - "Jacob Frenkel (Bank of Israel Governor 1991-2000)"
doctrine: >
  Economic school: supply-side Likud — shift from Rabin-Peres Oslo-era
  state+peace-dividend assumption toward Anglo-American liberal-market
  framing (tax cuts, privatisation, deregulation). Left-right axis:
  centre-right — pro-market on domestic reform, hawkish on Oslo
  implementation (slowdown on withdrawals but signed Hebron Protocol
  January 1997 and Wye River Memorandum 23 October 1998). Dated
  policies: privatisation acceleration of Bezeq, Bank Leumi tranches,
  and El Al preparation; Hebron Protocol 17 January 1997 (80% of
  Hebron to PA); Wye River Memorandum 23 October 1998 (further West
  Bank withdrawals, largely unimplemented); Bank of Israel maintained
  tight monetary stance under Frenkel (base rate 13-14% early 1996,
  moderated to 11% by 1999). Popularity: narrow May 1996 direct-PM
  victory over Peres (50.5% to 49.5%); coalition fractured mid-1999
  over Wye implementation; lost May 1999 election to Barak (56%-44%).
  Coherence: moderate — supply-side economic frame coexisted with
  security hawkishness but coalition politics blocked full agenda.
policies:
  - il_hebron_protocol_1997
  - il_wye_river_memorandum_1998
  - il_bezeq_partial_privatisation_1997
  - il_netanyahu_i_income_tax_cuts_1997_1999

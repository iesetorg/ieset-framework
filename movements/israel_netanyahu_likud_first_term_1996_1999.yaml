  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Frenkel-led BoI maintained disinflation credibility."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "No major institutional shift — Oslo framework legally preserved."}

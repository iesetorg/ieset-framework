movement_id: finland_kiviniemi_centre_2010_2011
status: candidate
name: "Kiviniemi Centre-led caretaker 2010-2011"
countries: [FIN]
timeframe: {start: 2010, end: 2011, enacted_date: "2010-06-22"}
coalition: "Keskusta-Kokoomus-RKP-Vihreät (same as Vanhanen II)"
leaders:
  - "Mari Kiviniemi (Prime Minister, Keskusta, 2010-2011)"
  - "Jyrki Katainen (Finance Minister, Kokoomus)"
doctrine: >
  Brief transitional premiership after Vanhanen resigned over Centre
  election-funding scandal. Economic school: inherited Vanhanen II
  programme; no distinctive doctrinal shift. Managed implementation of
  already-legislated 2010 VAT rise and tabled first Greek EFSF contribution
  debates. Left-right: centre-right. Dated policies: EFSF first-programme
  Finnish guarantees (ratified June 2010 and subsequently), VAT rate
  increase implementation (1 July 2010), preparation of spring 2011
  election. Popularity: low from inception; Centre finished fourth in
  Apr 2011 election (vote share 15.8%, down 7.3pp — the Centre's worst
  result since universal suffrage). Coherence: low — caretaker mode into
  a losing campaign amid Perussuomalaiset "Finns Party" populist surge.
policies:
  - fi_efsf_finnish_guarantees_2010
  - fi_vat_rise_2010
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "EFSF/bailout contingent liabilities raised committed fiscal footprint."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "EFSF guarantees part of eurozone crisis-management architecture."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Caretaker transition orderly; institutional continuity preserved."}

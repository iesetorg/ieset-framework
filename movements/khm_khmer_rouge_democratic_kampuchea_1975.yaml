# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: khm_khmer_rouge_democratic_kampuchea_1975
status: candidate
name: Khmer Rouge Democratic Kampuchea
countries:
- KHM
timeframe:
  start: 1975
  end: 1979
coalition: Communist Party of Kampuchea
leaders:
- Pol Pot
- Nuon Chea
- Khieu Samphan
doctrine: The Communist Party of Kampuchea sought a radical agrarian socialist transformation after taking Phnom Penh in 1975, aiming to abolish markets, money, private property, and urban social structures while organising production through collectivised rural communes under central party command.
policies:
- khm_urban_evacuation_1975
- khm_collectivisation_communes_1975
- khm_money_market_abolition_1975
axes_summary:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  rationale: Private land, homes, commercial assets, and personal economic rights were effectively abolished.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  rationale: Markets and private enterprise were eliminated in favour of command allocation.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  rationale: Labour allocation was coerced through communes and work brigades rather than voluntary employment.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  rationale: The regime pursued extreme isolation, with foreign economic links limited to tightly controlled state channels.
references:
- Ben Kiernan (2008), The Pol Pot Regime
- David P. Chandler (1991), The Tragedy of Cambodian History
- Michael Vickery (1984), Cambodia 1975-1982
notes: Policy coding describes institutional and economic measures, not the broader mass violence except where it directly structured labour and property allocation.

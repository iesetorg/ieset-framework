# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: skorea_roh_tae_woo_djp_1988_1993
status: candidate
name: "Roh Tae-woo Democratic Justice Party — Nordpolitik transition (South Korea)"
countries: [KOR]
timeframe: {start: 1988, end: 1993}
coalition: "Democratic Justice Party then Democratic Liberal Party after 1990 three-party merger"
leaders:
  - "Roh Tae-woo (President 1988-1993)"
  - "Kim Jong-pil (DLP co-founder)"
  - "Cho Soon (Deputy PM / Economic Planning Board 1988-1990)"
  - "Lee Seung-yoon (EPB 1990-1992)"
doctrine: >
  Roh Tae-woo post-authoritarian transitional doctrine — first directly-
  elected president after 1987 democratisation; Nordpolitik foreign-
  policy opening to USSR/China/North Korea; domestic chaebol-centred
  growth with early democratisation frictions. Economic school: state-
  developmentalist continuation with selective liberalisation; wages
  rose sharply after 1987 labour liberalisation. Dated policies:
  1988 Seoul Olympics 17 Sep-2 Oct 1988 (legitimacy anchor); Sixth
  Five-Year Plan continuation; three-party merger 22 Jan 1990 forming
  Democratic Liberal Party (DJP + Kim Young-sam RDP + Kim Jong-pil
  NDRP) on Japanese-LDP model creating conservative super-majority;
  Nordpolitik — USSR relations normalised 30 Sep 1990, China 24 Aug
  1992, North-South Basic Agreement 13 Dec 1991, Joint Declaration on
  Denuclearization 20 Jan 1992; housing 2-million-unit construction
  plan 1988-1992; real-name financial transactions debate (implemented
  later by Kim Young-sam); wage growth 18-21% annually 1988-1991
  post-democratisation labour liberalisation. Left-right: centre-right
  conservative; democratisation concessions reduced authoritarian
  scaffolding. Popularity: Dec 1987 election Roh 36.6% (three-way
  split with Kim Young-sam 28.0% and Kim Dae-jung 27.0%); Apr 1988
  National Assembly DJP 34.0% / 125 seats (lost majority); post-1990
  merger DLP supermajority. Coherence: moderate — Nordpolitik coherent
  foreign-policy doctrine; domestic economic policy reactive to
  democratisation-driven wage/land-price surges; chaebol governance
  reforms stalled.
policies:
  - kr_three_party_merger_dlp_1990
  - kr_nordpolitik_1988_1992
  - kr_two_million_housing_1988
  - kr_wage_labour_liberalisation_post_1987
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Post-1987 constitutional democratisation consolidation; first civilian peaceful transfer after direct election."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Post-1987 Labour Union Law liberalisation; unionisation surge; wage growth 18-21% annually."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Two-million housing programme + Olympics infrastructure."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Nordpolitik opened USSR/China trade; import liberalisation continued but slow."}
predecessor_movements:

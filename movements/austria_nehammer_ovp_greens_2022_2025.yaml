# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: austria_nehammer_ovp_greens_2022_2025
status: candidate
name: "Nehammer OeVP-Greens coalition 2022-2025"
countries: [AUT]
timeframe: {start: 2022, end: 2025, enacted_date: "2021-12-06"}
coalition: "OeVP-Gruene (continuation of Kurz II coalition under new OeVP leadership)"
leaders:
  - "Karl Nehammer (Chancellor, OeVP)"
  - "Werner Kogler (Vice-Chancellor + Minister for Arts/Culture, Gruene)"
  - "Magnus Brunner (Finance Minister, OeVP, to 2024)"
  - "Leonore Gewessler (Climate Action Minister, Gruene)"
doctrine: >
  Continuation of the 2019 Kurz-Kogler OeVP-Greens pairing under new OeVP
  leadership after Kurz's December 2021 resignation, fusing OeVP centre-right
  fiscal orthodoxy and migration restrictionism with the Greens' climate
  agenda — a 'turquoise-green' doctrine that proponents framed as proof the
  European centre-right could govern productively with the Greens. Operated
  under extreme exogenous shock: the February 2022 Russian invasion triggered
  an energy-price crisis for which Austria was acutely exposed given ~80%
  Russian gas dependence, forcing a large emergency-subsidy footprint
  (Stromkostenbremse, Energiekostenzuschuss) alongside the pre-planned
  structural reform package. Core enactments: Oekosoziale Steuerreform 2022
  introducing a national CO2 price (EUR 30/t from Oct 2022, escalating) with
  a per-capita redistributive Klimabonus; staged corporate-tax cut from 25%
  to 24% (2023) then 23% (2024); abolition of kalte Progression in 2023
  (automatic bracket-indexing ending the 'secret tax hike'); family package
  2022 (Familienbonus raised to EUR 2,000, Mehrkindzuschlag); PV-Anlagen VAT
  abolition 2024 (zero-rate VAT on residential solar up to 35kWp); renewable
  expansion law (EAG). Collapsed after the September 2024 Nationalrat
  election delivered FPOe first place and no viable continuation majority.
  Coherence judgement: operationally competent on CO2-pricing-plus-rebate
  and kalte Progression — both long-advocated structural reforms finally
  delivered — but fiscally undisciplined under energy-shock pressure, leaving
  a ~4.7% of GDP deficit and EDP liability for the successor.
policies:
  - at_oekosoziale_steuerreform_2022
  - at_klimabonus_2022
  - at_familienpaket_2022
  - at_kalte_progression_abschaffung_2023
  - at_koerperschaftsteuer_senkung_2022_2024
  - at_pv_anlagen_vat_2024
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Koerperschaftsteuer 25% -> 24% (2023) -> 23% (2024); lowest Austrian rate in Second Republic history."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Kalte Progression abolition (automatic bracket indexation) removes inflation-driven upward creep of effective rates; middle-bracket cuts within Oekosoziale package."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Klimabonus per-capita rebate (EUR 250-500 depending on region), Familienbonus raised, energy-cost-brake subsidies."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Stromkostenbremse and Energiekostenzuschuss pushed spending/GDP to ~52%; deficit reached ~4.7% of GDP in 2024 triggering EU EDP."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "National CO2 price from 2022 (EUR 30/t, escalating), Erneuerbaren-Ausbau-Gesetz targets, PV zero-VAT."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Gas-storage mandates, diversification away from Gazprom long-term contracts, Italy/Germany interconnector prioritisation — from a very low supply-security base."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: weak, rationale: "Continued OeVP-line asylum-restriction posture, Schengen-veto diplomacy against Bulgaria/Romania (2022-23); offset partly by Rot-Weiss-Rot-Karte skilled-migration liberalisation 2022."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "PV/wind subsidies under EAG; hydrogen strategy seed funding; heat-pump replacement bonus."}
outcome_hypotheses:
  - carbon_price_plus_rebate_distributional_effect
  - bracket_creep_abolition_fiscal_drift_effect
  - energy_shock_subsidy_deficit_tradeoff
predecessor_movements: [austria_kurz_ovp_2017_2021]
successor_movements: [austria_stocker_ovp_spo_neos_2025_present]
position_alignments:
  - {position_id: ecological, alignment: aligned, notes: "CO2-price-plus-rebate architecture is textbook ecological-economics design."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Credits CO2 price and kalte Progression reform; critical of subsidy drift and EDP outcome."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Corporate rate cut and bracket indexation applauded; deficit trajectory criticised."}
references:
  - "Oekosoziale Steuerreformgesetz 2022 (BGBl. I Nr. 10/2022)"
  - "Bundesgesetz ueber die Abschaffung der kalten Progression (BGBl. I Nr. 194/2022)"
  - "Erneuerbaren-Ausbau-Gesetz (EAG, BGBl. I Nr. 150/2021)"
  - "BMF Budget 2024 and EU Council EDP opening decision June 2025"
notes: >
  Nationalrat seat distribution at formation (Dec 2021): OeVP 71 (37.5% at
  2019 election), Gruene 26 (13.9%) — total 97/183 = 53.0%. Nehammer approval
  peaked ~45% in mid-2022 after energy-crisis response; fell to ~25-30% by
  2024 amid inflation backlash. Forschungsgruppe / Market polls through 2023-24
  showed FPOe steadily ahead at 28-32%. Final Sep 2024 election: FPOe 28.8%
  (first place, +12.7pp), OeVP 26.3% (-11.2pp, worst OeVP result in
  Second Republic), SPOe 21.1%, Greens 8.2% (-5.7pp). Key leadership
  transition: Kurz resigned 9 Dec 2021 amid Inseraten-Affaere corruption
  probe; Schallenberg caretaker chancellor Oct-Dec 2021; Nehammer took office
  6 Dec 2021. The coalition survived the Ibiza-era successor instability
  that had toppled Kurz I.

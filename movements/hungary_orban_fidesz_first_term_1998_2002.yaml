status: candidate
name: "Orban FIDESZ first term centrist-reformer 1998-2002"
countries: [HUN]
timeframe: {start: 1998, end: 2002, enacted_date: "1998-07-08"}
coalition: "FIDESZ-MPP with FKGP (Smallholders) and MDF (Democratic Forum)"
leaders:
  - "Viktor Orban (Prime Minister, FIDESZ, 1998-2002)"
  - "Zsigmond Jarai (Finance Minister, FIDESZ, 1998-2000)"
  - "Mihaly Varga (Finance Minister, FIDESZ, 2001-2002)"
  - "Jozsef Torgyan (Agriculture Minister/FKGP leader)"
doctrine: >
  Orban FIDESZ first term — early-Orban centre-right governance before
  the post-2010 illiberal turn. Economic school: Hungarian centre-right
  market-reformist with national-liberal youth-party provenance (FIDESZ
  originally founded 1988 as a liberal-youth party, moved to centre-
  right in mid-1990s). Left-right axis: centre-right, culturally
  national. Dated policies: OTP Bank privatisation completion, household
  subsidy housing scheme (lakastamogatas 2000), NATO accession
  (12 March 1999, with Poland and Czech Republic), EU accession
  negotiations continuation, Status Law on ethnic Hungarians abroad
  (June 2001, Act LXII of 2001). Popularity: lost 2002 election to MSZP
  by 1.1pp on the party-list vote despite governing reasonably well on
  macro. Coherence: moderate — FKGP split repeatedly, Torgyan removed
  from cabinet Feb 2001. Orban later (post-2010) reframed this period
  but at the time governed within relatively ordinary centre-right
  parameters, with state intervention in infrastructure and family
  housing but no assault on checks and balances.
policies:

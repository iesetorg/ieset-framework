movement_id: netherlands_lubbers_cda_1982_1989
status: candidate
name: 'Lubbers I-II CDA cabinets (Netherlands): Wassenaar and the no-nonsense adjustment'
countries:
- NLD
timeframe:
  start: 1982
  end: 1989
coalition: CDA-VVD Christian-democrat + conservative-liberal
leaders:
- Ruud Lubbers (PM, 4 November 1982 - 7 November 1989 first two cabinets)
- Onno Ruding (Finance Minister 1982-1989)
- Jan van Aardenne (Economic Affairs 1982-1986)
- Rudolf de Korte (Economic Affairs 1986-1989)
- Wil Albeda (architect of Wassenaar from SER side)
- Wim Kok (FNV Chair signing Wassenaar) / Chris van Veen (VNO)
doctrine: 'No-nonsense ordoliberal-Christian-democrat adjustment that reset Dutch labour-capital
  bargaining and arrested fiscal drift. Economic school: centre-right Christian-democrat CDA with
  VVD liberal partner; closest continental parallel to Thatcher/Kohl early supply-side consolidation,
  but executed via consensus tripartite bargaining (the ''polder model'' architecture). Left-right
  axis: centre-right; more fiscally disciplined than Van Agt but softer than Thatcher — retained
  welfare universality while restraining indexation. Key content: (i) Akkoord van Wassenaar, 24
  November 1982 — tripartite STAR agreement trading wage moderation for working-time reduction
  (de facto 36-hour week path); the canonical European ''responsible unions'' template; (ii) public-sector
  pay cut 3% January 1984 (Actie 3%), minimum wage and social benefits frozen or cut; (iii) WIR
  investment-credit abolished 1988 (reversing Van Agt expansion); (iv) Lubbers I deficit reduction:
  public-sector deficit 7.4% (1982) → 5.1% (1986); (v) WAO / WW disability and unemployment reforms
  — system reviews 1986-87 tightening eligibility; (vi) no-cure, no-pay privatisation of PTT Nederland
  (1989); (vii) Oosterschelde and Deltaplan completion 1986; (viii) labour market flexibilisation
  modest — part-time employment expansion the principal mechanism; (ix) continued EEC integration
  (Single European Act 1986, preparation for EMU at Hanover Council 1988). Popularity: 1982 election
  CDA 29.4% VVD 23.1%; 1986 election CDA 34.6% (gain) VVD 17.4% — clear vindication of Lubbers
  I policy; 1989 election CDA 35.3% — highest postwar share, leading to Lubbers III CDA-PvdA.
  Coherence: canonical consensus-based adjustment model; Wassenaar working-time-for- wage-moderation
  trade plus public-sector discipline produced the celebrated ''Dutch miracle'' of the late 1980s-90s
  (employment growth with inflation under control) — and became a continental-European reference
  model.

  '
policies:
- nl_wassenaar_agreement_1982
- nl_public_sector_pay_cut_1984
- nl_wir_abolition_1988
- nl_ptt_privatisation_1989
- nl_wao_ww_eligibility_tightening_1986_1987

movement_id: indonesia_suharto_new_order_1965_1998
status: candidate
name: "Indonesia Suharto New Order"
countries: [IDN]
timeframe: {start: 1966, end: 1998}
coalition: "Golkar-military 'New Order' authoritarian regime"
leaders: ["Suharto (President 1967-1998)", "Widjojo Nitisastro and the 'Berkeley Mafia' economic team", "B. J. Habibie (technology/industrial portfolio)"]
doctrine: >
  Authoritarian developmentalist regime that followed the 1965-66 mass
  killings and displacement of Sukarno. Economic management delegated
  to the US-trained 'Berkeley Mafia' technocrats, who stabilised
  hyperinflation (1966-1970), re-opened to Western aid and FDI (PMA
  Law 1967), and ran orthodox fiscal balance with a 'balanced budget'
  rule financed by oil rents and concessional lending. Oil windfalls
  (1973, 1979) funded rural development (BIMAS, INPRES), rice self-
  sufficiency (1984), universal primary education, and family planning.
  A statist Habibie-led heavy-industry drive from the 1980s (IPTN
  aircraft, Krakatau Steel) coexisted with trade liberalisation
  packages from 1986. Crony capitalism around the Suharto family and
  conglomerates deepened from the 1990s. The regime collapsed in the
  1997-98 Asian financial crisis amid capital flight, a 85% rupiah
  depreciation, and an IMF programme that Suharto partially repudiated.
policies: [indonesia_pma_foreign_investment_law_1967, indonesia_balanced_budget_rule_1967_1997, indonesia_bimas_green_revolution_1970s, indonesia_inpres_rural_development, indonesia_trade_liberalisation_packages_1986_1996, indonesia_imf_programme_1997]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Oil-funded rural development, input subsidies, strategic-industry support."}
  - {axis: regulatory.trade_openness, direction: "mixed", rationale: "High protection for strategic industries coexisted with export-promotion reforms (1986 Paket) and tariff reductions in the 1990s."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Authoritarian rule, politicised courts, suppression of dissent and organised labour."}
  - {axis: institutional.property_rights, direction: "mixed", rationale: "Formal property protection for favoured conglomerates; insecurity and expropriation risk for outsiders, especially ethnic-Chinese business and rural smallholders."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "1988 PAKTO banking deregulation opened bank licensing; prudential oversight lagged and fed the 1997 crisis."}
outcome_hypotheses: [developmentalist_state_growth_performance, currency_crisis_capital_flight_dynamic]
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Berkeley Mafia orthodox macro stabilisation + balanced-budget rule; industrial policy and crony allocation inconsistent."}
  - {position_id: institutionalism, alignment: opposed, notes: "Weak institutions and crony allocation are the standard institutionalist critique."}
references:
  - "Hill (2000), 'The Indonesian Economy' (Cambridge)"
  - "Robison (1986), 'Indonesia: The Rise of Capital'"
  - "Basri & Hill (2004), 'Ideas, Interests and Oil Prices: The Political Economy of Trade Reform during Soeharto's Indonesia', World Economy"

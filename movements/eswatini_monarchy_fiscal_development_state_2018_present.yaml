# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eswatini_monarchy_fiscal_development_state_2018_present
status: candidate
name: Eswatini monarchy fiscal development state 2018-present
countries: [SWZ]
timeframe:
  start: 2018
  end: ongoing
coalition: Tinkhundla monarchy government
leaders:
  - "King Mswati III"
  - "Cleopas Dlamini (Prime Minister, 2021-2023)"
  - "Russell Dlamini (Prime Minister, 2023-)"
  - "Neal Rijkenberg (Minister of Finance)"
doctrine: >
  Eswatini's current policy regime combines monarchy-led development planning
  with fiscal adjustment around volatile SACU revenues and a push to strengthen
  domestic energy supply. The movement is coded through national development,
  budget-consolidation, and energy-masterplan policies rather than the broader
  constitutional order alone.
policies:
  - swz_energy_masterplan_2034_renewables_2018
  - swz_national_development_plan_2023_2028
  - swz_fy2024_25_sacu_revenue_fiscal_adjustment
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "Development and energy plans raise investment needs while SACU-revenue budgets target consolidation and arrears control."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Energy and development planning channel state support to selected infrastructure and industrial priorities."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "The energy masterplan and development plan target more reliable domestic generation."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Fiscal adjustment and medium-term planning strengthen formal budget discipline within the existing political structure."}
references:
  - "IMF, Kingdom of Eswatini 2025 Article IV Consultation."
  - "Government of Eswatini, National Development Plan 2023/24-2027/28."
  - "Government of Eswatini, Energy Masterplan 2034."

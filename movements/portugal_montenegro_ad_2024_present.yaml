# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_montenegro_ad_2024_present
status: candidate
name: "Montenegro AD minority government under Chega leverage (Portugal 2024-present)"
countries: [PRT]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-04-02"}
coalition: "AD (Aliança Democrática: PSD + CDS-PP + PPM) minority government with 80 of 230 Assembleia seats after 10 March 2024 election; dependent vote-by-vote on abstention or support from Chega (50 seats) or PS (78 seats)"
leaders:
  - "Luís Montenegro (PSD leader; Prime Minister from 2 April 2024)"
  - "Joaquim Miranda Sarmento (Finance Minister 2024-)"
  - "Nuno Melo (CDS-PP leader, Defence Minister)"
  - "Paulo Rangel (Foreign Affairs Minister)"
  - "Pedro Duarte (Minister of Parliamentary Affairs, chief negotiator with Chega/PS)"
doctrine: >
  Centre-right AD coalition installed after the 10 March 2024 snap
  election triggered by Costa's resignation. Economic school: centre-
  right AD liberalism (PSD liberal-conservative + CDS Christian-
  democratic + PPM) — lower-tax, supply-side, pro-investment, EU-
  mainstream — constrained by a fragmented Assembleia in which the
  Chega populist right (1.1% in 2019 → 7.2% in 2022 → 18.1% in 2024)
  holds 50 seats and sets the agenda by refusing systematic
  abstention. Left-right axis: centre-right executive operating
  under structural populist-right leverage; outcomes depend on
  whether any given bill is passed with Chega support (migration,
  security) or PS abstention (budget, EU files). Core content so far:
  (a) IRS reform continuation — OE2024 (inherited) kept IRS Jovem
  and Montenegro's OE2025 widened it (tax-free first year for under-
  35s, progressive relief through age 35) and trimmed middle-bracket
  rates; (b) corporate IRC cut trajectory — statutory rate reduced
  from 21% toward 17% over multi-year path (contested by PS/Chega);
  (c) civil-service and security-forces pay rises to defuse PSP/GNR
  2024 dispute; (d) housing — partial rollback of Mais Habitação
  (Lei 56/2023) coercive measures (forced-lease article, rent-cap
  tightening) via Construir Portugal package; retention of AL licence
  freeze; VAT on construction of affordable housing cut to 6%;
  (e) golden-visa regime — retained post-2023 scope (excluding
  real-estate track) with emphasis on scientific / investment-fund
  channels; (f) migration tightening under Chega pressure —
  manifestações de interesse regularisation channel ended June 2024,
  CPLP mobility agreement narrowed, Agência para a Integração,
  Migrações e Asilo (AIMA) backlog reform; (g) SNS capacity package
  and private-sector triage pilots; (h) EU posture — continued
  NextGenerationEU PRR execution with 2026 deadline pressure and
  active defence-spending scaling toward 2% NATO target. Popularity:
  AD coalition 28.8% in March 2024 (versus PS 28.0% — a 0.8-point
  win); Chega 18.1% the story of the cycle. European Parliament
  June 2024: AD 31.1% (first), PS 32.1% (second — a reversal),
  Chega 9.8% (under-performed vs national vote). 2025 autárquicas
  (local elections): PS retained Lisboa and Porto; AD strong in
  north and interior; Chega built first municipal footholds.
  Approval volatile — Montenegro net-positive at installation,
  eroded through 2025 on cost-of-living and immigration salience.
  Coherence judgement: programmatically coherent centre-right
  agenda executed under unprecedented parliamentary leverage from
  the populist right, making the movement's coding as much about
  what Chega allows through as what AD proposes.
policies:
  - pt_irc_corporate_rate_reduction_2024
  - pt_irs_jovem_expansion_2024
  - pt_construir_portugal_housing_rollback_2024
  - pt_migration_regularisation_end_2024
  - pt_defence_spending_nato_2_percent_trajectory_2024
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "IRC statutory rate reduction from 21% toward 17% multi-year path; SME surcharge reductions."}
  - {axis: fiscal.tax_progressivity, direction: "mixed", rationale: "IRS Jovem expansion adds age-targeted progressivity at the bottom but middle-bracket rate cuts flatten the overall schedule — direction genuinely mixed."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Civil-service and security-forces pay rises plus defence scaling toward 2% NATO target; partially offset by PRR under-execution."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: moderate, rationale: "End of manifestações de interesse regularisation channel (June 2024), tightened CPLP-mobility scope, AIMA throughput reforms under Chega pressure."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Partial rollback of Agenda do Trabalho Digno provisions proposed; enacted scope modest under minority constraints."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "Construir Portugal removed forced-lease article and loosened rent-cap formula for new leases; net easing of housing-sector licensing constraints relative to Costa-era package."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No headline PMR programme enacted; minority constraints limit scope."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Institutional norms intact; Chega parliamentary conduct tested rules-of-procedure but no structural erosion."}
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "EU fiscal-rule compliance posture plus supply-side tax content."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Minority-government bargaining forces empirical case-by-case policy assembly."}
  - {position_id: social_democratic, alignment: opposed}
  - {position_id: democratic_socialist, alignment: opposed}
predecessor_movements:
  - portugal_costa_ps_2015_2024
references:
  - "Programa do XXIV Governo Constitucional (Abril 2024)"
  - "Orçamento do Estado 2025 (Lei 45/2024)"
  - "Decreto-Lei on AIMA restructuring and manifestações-de-interesse termination (June 2024)"
  - "Construir Portugal housing package (2024-2025)"
  - "Banco de Portugal, Boletim Económico (2024-2026)"
  - "Comissão Nacional de Eleições, Resultados Legislativas 10 March 2024"
  - "Comissão Nacional de Eleições, Resultados Europeias 9 June 2024"
notes: >
  Movement coded as active from 2 April 2024 (Montenegro investidura).
  Distinctive feature for IESET purposes: the movement's effective
  policy space is bounded by Chega's parliamentary leverage, making
  this a canonical case of centre-right doctrine operating under a
  populist-right agenda-setting constraint — relevant to hypotheses
  on minority-government policy drift and populist-right leverage
  effects on incumbent-right programmes.

  - {position_id: developmentalist, alignment: partially_aligned, notes: "Chaebol-favourable nuclear-industrial reinvestment fits developmental-state framing on the regulatory-energy axis."}
  - {position_id: social_democratic, alignment: opposed}
references:
  - "Corporate Tax Act amendment December 2022 (rate cut effective January 2023)"
  - "10th Basic Plan for Electricity Supply and Demand January 2023 (nuclear ~35% target)"
  - "Washington Declaration, 26 April 2023 (ROK-US)"
  - "Camp David Principles / Spirit / Commitment, 18 August 2023 (US-Japan-ROK trilateral)"
  - "Martial Law Proclamation No. 1, 3 December 2024; National Assembly Resolution overturning same night"
  - "National Assembly Impeachment Motion adopted 204-85, 14 December 2024"
  - "Constitutional Court Ruling 2024Hun-Na8, 4 April 2025 (8-0 removal)"
  - "Central Election Commission results, 3 June 2025 early presidential election"
notes: >
  Popularity: entered at ~52% approval May 2022, fell below 30% within
  six months on First Lady controversies and minority-assembly
  confrontation, oscillated 20-35% through 2023-2024; April 2024
  legislative election catastrophic for PPP (108 seats) enabling the
  DP-led obstruction Yoon cited as rationale for martial law. Approval
  collapsed to ~11% after Dec 3 2024 declaration. Constitutional Court
  removal 8-0 on all grounds — the second successful presidential
  impeachment in Korean history (Park Geun-hye 2017 being the first).

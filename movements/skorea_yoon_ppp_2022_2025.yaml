movement_id: skorea_yoon_ppp_2022_2025
status: candidate
name: "Yoon Suk-yeol conservative deregulation government (South Korea)"
countries: [KOR]
timeframe:
  start: 2022
  end: 2025
  enacted_date: "2022-05-10"
coalition: "People Power Party (Gukmin-ui Him) — minority in the 300-seat National Assembly throughout the presidency (115 seats post-April 2024 election, against Democratic Party 175)"
leaders:
  - "Yoon Suk-yeol (President 2022-2025, impeached 14 December 2024, removed 4 April 2025)"
  - "Choo Kyung-ho (Finance Minister / Deputy PM 2022-2023)"
  - "Choi Sang-mok (Finance Minister 2024-2025, Acting President Dec 2024-Apr 2025)"
  - "Han Duck-soo (Prime Minister, Acting President briefly Dec 2024)"
  - "Han Dong-hoon (Justice Minister then PPP leader)"
doctrine: >
  Conservative People Power Party government organised around deregulation,
  chaebol-favourable tax policy, nuclear restoration, a sharp tilt toward
  the US-Japan-Korea trilateral, and a combative posture toward the
  Democratic Party-controlled National Assembly that ultimately produced
  the December 2024 martial-law declaration. Core content: (i) statutory
  corporate-tax cut from 25% to 24% effective January 2023 (top bracket;
  paired with bracket restructuring and headline-rate reductions across
  lower tiers); (ii) inheritance-and-gift-tax reform attempt 2024 proposing
  a cut of the top inheritance rate from 50% to 40% and shift from
  decedent-based to inheritor-based taxation (blocked by the DP-majority
  assembly); (iii) nuclear restoration — reversal of Moon phase-out,
  resumption of Shin Hanul 3/4 construction, extension of existing plant
  lifespans, target raising nuclear share of generation to ~35% by 2036;
  (iv) real-estate deregulation including loan-to-value cap easing,
  reconstruction-permit liberalisation, rollback of multi-home
  acquisition-tax surcharges, Jongbuse (comprehensive real-estate tax)
  cuts; (v) Yoon-Biden summit (May 2022, Washington Declaration on
  extended deterrence April 2023), Camp David trilateral with Japan and
  US August 2023 — strongest US alignment in a generation; (vi)
  minimum-wage moderation (2.5% 2023, 2.5% 2024, 1.7% 2025 — the
  lowest consecutive hikes since the early 2000s); (vii) weekly-working-
  hour reform attempt 2023 proposing up to 69-hour weeks (withdrawn
  after youth backlash); (viii) medical school admission quota expansion
  of 2,000 seats provoking the 2024 resident-doctors strike; (ix)
  December 3 2024 emergency martial-law declaration citing "anti-state
  forces" within the DP-controlled assembly, overturned by unanimous
  National Assembly vote within three hours, followed by impeachment
  motion 14 December 2024 (204-85) and Constitutional Court unanimous
  removal 4 April 2025. Early election held 3 June 2025 won by DP's
  Lee Jae-myung. Proponents framed the agenda as unwinding Moon-era
  rigidities and restoring chaebol-led growth; critics framed it as
  regressive tax cuts, confrontation-politics escalation, and the
  gravest democratic-backsliding episode since 1987.
policies:
  - kr_corporate_tax_cut_2023
  - kr_inheritance_tax_reform_attempt_2024
  - kr_nuclear_restoration_2022_2024
  - kr_real_estate_deregulation_2022_2024
  - kr_yoon_biden_washington_declaration_2023
  - kr_martial_law_declaration_december_2024
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Headline corporate rate cut 25% → 24% at top bracket January 2023; bracket restructuring across lower tiers."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "Multi-home acquisition surcharges rolled back, Jongbuse comprehensive real-estate tax cut 2022-2023, financial-investment income tax repeatedly deferred then repealed."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Minimum-wage moderation to sub-3% hikes; 69-hour week proposed but withdrawn; partial easing of union-bargaining support."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: strong, rationale: "Nuclear restoration — Shin Hanul 3/4 resumed, plant lifespan extensions, ~35% nuclear share target 2036."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: weak, rationale: "ETS allowance looser, renewable targets trimmed relative to Moon 2050 roadmap; carbon-neutrality date preserved."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Reconstruction-permit liberalisation; medical-school quota expansion; some sectoral licensing loosened."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "December 3 2024 martial-law declaration — Constitutional Court ruled 4 April 2025 (unanimous 8-0) that it violated constitutional martial-law conditions."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Confrontation with opposition-appointed prosecutors, contested appointments at Constitutional Court and Supreme Prosecutor's Office."}
outcome_hypotheses:
  - skorea_corporate_tax_cut_investment_response
  - martial_law_democratic_backsliding_episode
predecessor_movements:

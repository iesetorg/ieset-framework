# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ecuador_noboa_adn_2023_present
status: candidate
name: "Noboa ADN security-first reformist (Ecuador)"
countries: [ECU]
timeframe: {start: 2023, end: ongoing}
coalition: "Acción Democrática Nacional (ADN)"
leaders:
  - "Daniel Noboa (President Nov 2023 – )"
  - "Verónica Abad (Vice-President, later sidelined)"
  - "Sariha Moya / Juan Carlos Vega (Finance)"
doctrine: >
  Centrist-liberal dollarisation-anchored security-first reformist
  program by a young business-family heir (Corporación Noboa, banana
  conglomerate). Noboa won the Oct 2023 early-election runoff against
  Luisa González with 51.83%, completing the Moreno-Lasso term, and
  was re-elected Apr 2025 with 55.62% on a full four-year term. Core
  content: (a) Plan Fénix / Phoenix Plan, a militarised internal-
  security doctrine — Decreto Ejecutivo 111 of 9 Jan 2024 declared a
  "conflicto armado interno" after the TV-studio takeover in Guayaquil
  and designated 22 criminal groups as terrorist organisations,
  authorising Armed Forces street operations; (b) Ley Orgánica para
  Combatir la Economía Criminal (Dec 2023) expanding asset forfeiture
  and financial-intelligence powers; (c) Apr 2024 referendum (11
  questions) — security and extradition questions passed, labour-
  flexibility and casino questions failed; (d) fiscal — VAT rose from
  12% to 15% (Mar 2024), fuel-subsidy reforms partly implemented;
  (e) electricity rationing through 2024 (up to 14-hour daily outages)
  from hydro drought plus under-investment, with emergency
  thermal-generation contracting; (f) USA alignment — bilateral
  security cooperation, asylum of VP Abad to Turkey as ambassador,
  debated military-bases constitutional question. Coherent as
  security-shock-therapy-plus-fiscal-tightening under dollarisation,
  with labour and deep-regulatory liberalisation politically blocked
  by the 2024 referendum result.
policies:
  - ec_ley_economia_criminal_2023
  - ec_conflicto_armado_interno_2024
  - ec_vat_hike_12_to_15_2024
  - ec_referendum_abr_2024
  - ec_electricity_rationing_2024
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "VAT hike is regressive in incidence; income-tax schedule broadly unchanged."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Security and defence outlays rose; transfer spending broadly steady."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Partial fuel-subsidy adjustment (extra, super) during 2024."}
  - {axis: regulatory.sectoral_licensing, direction: "0", magnitude: weak, rationale: "Emergency thermal-generation contracts accelerated; no systemic reform."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Stated goal of restoring state monopoly on violence; prosecutorial tools expanded; homicide rate fell sharply in 2024 from 2023 peak."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Cross-cutting: Constitutional Court upheld most executive decrees; Mexico embassy raid Apr 2024 strained institutional norms."}
outcome_hypotheses:
  - state_capacity_security_growth
  - dollarised_fiscal_consolidation
position_alignments:

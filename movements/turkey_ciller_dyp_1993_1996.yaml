movement_id: turkey_ciller_dyp_1993_1996
status: candidate
name: "Çiller DYP — 1994 currency crisis, EU customs union, Erbakan coalition"
countries: [TUR]
timeframe: {start: 1993, end: 1996}
coalition: "True Path Party (DYP) with SHP/CHP junior partner; from 1996 DYP-Refah coalition"
leaders:
  - "Tansu Çiller (Prime Minister June 1993 - March 1996; first female Turkish PM)"
  - "Süleyman Demirel (President from May 1993)"
  - "Ismet Attila and successive Finance Ministers"
  - "Yaman Törüner (Central Bank Governor 1995-1996)"
doctrine: >
  Economic school: liberal-coalition customs-union doctrine inheriting Özal's
  unfinished fiscal agenda. Left-right axis: centre-right on rhetoric
  (privatisation, EU integration, capital-market opening continued) but
  fiscal-loose in practice — the December 1993-January 1994 currency crisis
  was precipitated by treasury-bill-auction cancellation and central-bank
  monetisation of the deficit, with the lira losing ~50% against the dollar
  and the IMF April 1994 "5 April Measures" stabilisation package imposing
  VAT surcharges, SOE-price hikes, wage freezes, and IMF standby.
  Dated policies: 5 April 1994 stabilisation package; EU Customs Union
  Decision 1/95 (signed 6 March 1995, in force 1 January 1996) — the deepest
  non-member EU customs tie at that time, covering industrial goods but
  excluding agriculture; continued SOE privatisation (slow in practice,
  blocked by Constitutional Court rulings); coalition with Necmettin
  Erbakan's Refah Partisi June 1996. Popularity: DYP took 27% in 1991 (Özal
  era) and fell to 19% in December 1995 Refah-first result (21.4%),
  triggering the Refah-DYP coalition under Erbakan as PM. Coherence: low —
  pro-EU customs-union signature is a major institutional win but the 1994
  crisis, populist pre-election spending, and coalition incoherence with
  Refah's Islamist platform undercut the liberal track, setting up the
  1997 "post-modern coup" and the larger 2001 crisis.
policies:
  - tr_1994_stabilisation_package
  - tr_eu_customs_union_1995
  - tr_privatisation_programme_1993_1996
  - tr_dyp_refah_coalition_1996
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "EU Customs Union 1/95 integrated industrial tariffs with the EU; Turkey's deepest non-member tie."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Pre-election populist spending drove the 1993 deficit and 1994 crisis."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Central-bank deficit monetisation in late 1993 precipitated currency collapse; inflation ~106% in 1994."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Axis semantic '-' = looser regulation: capital-account openness maintained; ISE continued to deepen."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "EU accession-adjacent legal harmonisation under customs union."}

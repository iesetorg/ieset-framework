movement_id: thailand_kriangsak_military_1977_1980
status: candidate
name: "Kriangsak Chamanan military-technocratic government (Thailand)"
countries: [THA]
timeframe: {start: 1977, end: 1980}
coalition: "Military-appointed government, Kriangsak-led after 20 Oct 1977 coup"
leaders:
  - "Kriangsak Chamanan (PM 1977-1980)"
  - "Boonchu Rojanastien (Deputy PM, economic affairs)"
  - "Amnuay Viravan (Commerce/Finance Minister)"
  - "Bhichai Rattakul (Foreign Minister)"
doctrine: >
  Kriangsak military-technocratic transitional doctrine bridging the 1976-
  1977 hard-right Thanin junta and the 1980-1988 Prem semi-democratic
  compromise. Economic school: developmentalist-technocratic with
  pragmatic market orientation and opening to China/Indochina amid
  post-1975 regional re-alignment; fiscal stress from second oil shock
  1979. Dated actions: 20 Oct 1977 coup replacing Thanin Kraivichien;
  1978 Constitution promulgated 22 Dec 1978 (semi-democratic, appointed
  Senate); Thai-Chinese Trade Agreement 1978; oil-price shock response
  1979-1980 via fuel-price pass-through + fiscal deficit widening;
  Fourth National Economic and Social Development Plan (1977-1981)
  emphasising rural poverty reduction; opening diplomatic relations
  with Vietnam/China balancing; refugee absorption from Cambodia/Laos/
  Vietnam (>500,000 by 1979); Amnesty Oct 1978 for 1976 Thammasat
  massacre participants (controversial political settlement); Feb 1980
  Kriangsak resignation amid parliament no-confidence over fuel-price
  hikes. Left-right: centre-right technocratic-military. Popularity:
  22 Apr 1979 parliamentary election under 1978 Constitution — no
  dominant party, Kriangsak continued via parliamentary support;
  resigned Feb 1980 when coalition eroded. Coherence: moderate —
  technocratic consistency in macro/trade but transitional political
  legitimacy and premature resignation.
policies:
  - th_1978_constitution
  - th_fourth_nesdp_1977_1981
  - th_china_trade_agreement_1978
  - th_kriangsak_fuel_price_passthrough_1979
axes_summary:

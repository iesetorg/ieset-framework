  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Opening to China + post-war regional trade normalisation."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "1978 Constitution semi-democratic step up from Thanin hard-authoritarian 1976-1977."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Fuel-price pass-through reduced consumption subsidy under 1979 shock."}

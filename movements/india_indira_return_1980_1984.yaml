movement_id: india_indira_return_1980_1984
status: candidate
name: "Indira Gandhi return — INC(I) statist consolidation (India)"
countries: [IND]
timeframe: {start: 1980, end: 1984}
coalition: "Indian National Congress (Indira) — INC(I)"
leaders:
  - "Indira Gandhi (PM 1980-1984, assassinated 31 Oct 1984)"
  - "R. Venkataraman (Finance Minister 1980-1982)"
  - "Pranab Mukherjee (Finance Minister 1982-1984)"
  - "Manmohan Singh (RBI Governor 1982-1985)"
doctrine: >
  INC(I) socialist-statist restoration after Janata collapse, tilting
  gradually toward technocratic reform. Economic school: Indira Gandhi
  Congress socialist-statist with late-term technocratic concessions —
  licence-raj retained, bank nationalisation (1969, 1980) consolidated,
  but sixth five-year plan 1980-1985 raised productivity emphasis, first
  IMF Extended Fund Facility drawn Nov 1981 (SDR 5bn, largest to date),
  computer industry partial delicensing 1984 (New Computer Policy Nov
  1984, Rajiv Gandhi-driven within Indira cabinet), textile policy 1985
  precursor under Abid Hussain drafting. Nationalised 6 more banks Apr
  1980. Operation Blue Star 1-10 Jun 1984 stormed Harmandir Sahib
  (Golden Temple, Amritsar) against Bhindranwale's Sikh militants,
  producing >400 deaths and Indira's assassination by Sikh bodyguards
  31 Oct 1984, triggering anti-Sikh pogroms 31 Oct-3 Nov. Left-right:
  centre-left statist, socially syncretic. Popularity: Jan 1980 general
  election INC(I) 42.7% / 353 seats (strong majority restoration); state
  elections mixed through 1983 with Andhra/Karnataka losses; approval
  eroded by inflation (~12%) and communal tensions. Coherence:
  moderate — socialist-statist core with incremental technocratic
  liberalisation seeds; coherence fractured by Punjab crisis dominating
  the final year.
policies:
  - india_imf_eff_1981
  - india_bank_nationalisation_second_wave_1980
  - india_new_computer_policy_1984
  - india_operation_blue_star_1984
  - india_sixth_five_year_plan_1980_1985
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Central-government spending share rose; IMF EFF financed stabilisation while plan spending continued."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "New Computer Policy Nov 1984 eased import licences and de-licensed computer manufacturing — precursor to Rajiv telecom/electronics opening."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Additional bank nationalisations Apr 1980 deepened state banking dominance."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Operation Blue Star, post-assassination pogroms, Punjab president's rule 1983-1985 eroded rule-of-law baseline."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "Tariff reductions marginal; FERA retained."}
predecessor_movements:

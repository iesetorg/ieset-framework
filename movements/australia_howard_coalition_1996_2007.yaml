  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Family Tax Benefits, private-health rebate, baby bonus 2004 — 'middle-class welfare' expansion."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "WorkChoices Act 2005 extended individual contracts and removed unfair-dismissal protection for SMEs."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Telstra privatisation; continued National Competition Policy."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: moderate, rationale: "Pacific Solution off-shore processing and TPV regime."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "AUSFTA 2005 and multiple bilateral FTAs."}

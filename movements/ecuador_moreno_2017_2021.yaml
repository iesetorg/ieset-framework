movement_id: ecuador_moreno_2017_2021
status: candidate
name: "Moreno post-Correa normalisation (Ecuador)"
countries: [ECU]
timeframe: {start: 2017, end: 2021}
coalition: "Alianza PAIS (pre-split) / post-correista independents"
leaders:
  - "Lenín Moreno (President 2017-2021)"
  - "Richard Martínez (Finance 2018-2020)"
doctrine: >
  Pragmatic-liberal post-Correa normalisation inside the binding constraint
  of dollarisation. Elected in Apr 2017 as Correa's designated successor
  on the Alianza PAIS ticket with 51.16% in the runoff, Moreno broke
  publicly with Correa within months and used the Feb 2018 referendum
  (seven questions, all approved 64-73%) to bar indefinite presidential
  re-election, restructure the Consejo de Participación Ciudadana, and
  re-open the judicial and electoral appointments that Correísmo had
  consolidated. Economic doctrine pivoted to IMF re-engagement: an
  Extended Fund Facility of USD 4.2bn was signed in Mar 2019, with a
  larger USD 6.5bn EFF in Sep 2020 after the pandemic shock. The Oct
  2019 attempt to eliminate fuel subsidies via Decreto 883 triggered
  12 days of indigenous-led riots (CONAIE) and was reversed; fiscal
  consolidation continued through public-payroll cuts, a 2020 external
  debt restructuring (~USD 17.4bn), and renewed trade engagement
  (Pacific Alliance associate, FTA talks). Institutional tone was
  de-concentration relative to Correísmo. Popularity collapsed after
  Oct 2019 and pandemic management — exit approval in single digits —
  and the movement did not carry a successor in 2021 (Arauz defeated
  in runoff by Lasso). Coherent as a post-populist IMF-anchored
  correction rather than a doctrinal program.
policies:
  - ec_referendum_feb_2018
  - ec_imf_eff_2019
  - ec_decreto_883_fuel_subsidy_2019
  - ec_debt_restructuring_2020
  - ec_imf_eff_2020
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "IMF-anchored consolidation; public-payroll cuts and capex compression from 2019."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Fuel-subsidy cut attempted Oct 2019 via Decreto 883, reversed after protests; later partial adjustments."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Pacific Alliance associate process; rollback of Correa-era safeguards."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "2018 referendum restructured CPCCS and re-opened judicial council appointments Correa had consolidated."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "IMF programme re-imposed reserve-backing rules on BCE balance sheet."}
outcome_hypotheses:
  - fiscal_consolidation_under_fixed_exchange_regime
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: chicago_monetarism, alignment: aligned}
predecessor_movements:
  - ecuador_correa_21st_century_socialism_2007_2017
successor_movements:
  - ecuador_lasso_creo_2021_2023
references:
  - "IMF Country Report 19/79 (Ecuador EFF 2019)"
  - "IMF Country Report 20/286 (Ecuador EFF 2020)"
  - "Consejo Nacional Electoral — Consulta Popular 2018 resultados"
notes: >
  Useful case of abrupt doctrinal reversal within the same coalition
  label — tests Invariant 3 (policy-content over party label).

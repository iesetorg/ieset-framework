movement_id: hungary_antall_mdf_1990_1994
status: candidate
name: "Antall-Boross MDF conservative government — gradualist transition 1990-1994"
countries: [HUN]
timeframe: {start: 1990, end: 1994}
coalition: "Magyar Demokrata Fórum (MDF) + Független Kisgazdapárt (FKGP) + Kereszténydemokrata Néppárt (KDNP) three-party centre-right national-conservative coalition"
leaders:
  - "József Antall (Prime Minister, May 1990-December 1993, died in office)"
  - "Péter Boross (Prime Minister, December 1993-July 1994)"
  - "Mihály Kupa (Finance Minister 1990-1993)"
  - "Iván Szabó (Finance Minister 1993-1994)"
  - "Péter Ákos Bod (National Bank president 1991-1994)"
doctrine: >
  Antall's MDF-led coalition was Hungary's first post-1990
  democratically elected government — Christian-national-
  conservative in rhetoric but gradualist-reformist in
  economic substance. Economic school: gradualist
  transition — rejection of Polish-style shock therapy in
  favour of incremental liberalisation, privatisation by
  sale, and social-shock absorption. Left-right axis: centre-
  right, with national-conservative cultural content and
  moderate liberal-economic content. Core policy content:
  (i) rejection of shock therapy in favour of gradualism —
  "soft-landing" strategy that left inflation high (~25%
  1991-1993) and unemployment rising 1→12% 1990-1993;
  (ii) 1991 State Property Agency (ÁVÜ) launched case-by-case
  privatisation rather than mass voucher scheme — Hungary
  became magnet for foreign strategic investors (Matáv,
  Tungsram/GE, Suzuki); (iii) 1991 Compensation Act
  (Kárpótlás) issuing compensation vouchers to victims of
  communist expropriation — partial restitution instead of
  full return; (iv) 1991 bankruptcy law (Act XLIX of 1991)
  imposing hard budgets and triggering 1992-1993 insolvency
  wave; (v) 1992-1993 bank-consolidation programme
  recapitalising Budapest Bank, MHB, K&H etc. at huge
  fiscal cost; (vi) 1991 Europe Agreement signed;
  (vii) 1993 Hungarian citizenship law and national-
  minority-protection framework. Macro: GDP fell ~18%
  cumulatively 1990-1993, trade with COMECON collapsed;
  recovery began 1994. Popularity: MDF 24.7% 1990; collapsed
  to 11.7% in 1994 on economic shock and Antall's death.
  Coherence: medium — gradualism preserved social stability
  but prolonged inflation and deferred restructuring,
  forcing the 1995 Bokros package under the successor.
policies:
  - hu_gradualist_privatisation_avu_1991
  - hu_compensation_act_karpotlas_1991
  - hu_bankruptcy_law_1991
  - hu_bank_consolidation_programme_1992_1993
  - hu_europe_agreement_1991

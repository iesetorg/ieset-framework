  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Compensation Act, privatisation programme, and Europe Agreement embedded property regime."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Bank-consolidation packages and compensation costs raised fiscal footprint."}

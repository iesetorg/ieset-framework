movement_id: liberia_boakai_arrest_governance_stabilisation_2024_present
status: candidate
name: "Boakai ARREST governance and stabilization agenda 2024-present"
countries: [LBR]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-01-22"}
coalition: "Unity Party-led Rescue Mission government"
leaders:
  - "Joseph Nyuma Boakai (President, 2024-present)"
  - "Jeremiah Koung (Vice President)"
  - "Boima S. Kamara (Minister of Finance and Development Planning)"
doctrine: >
  Boakai's government framed the transition from the Weah administration as a
  rescue and repair agenda built around agriculture, roads, rule of law,
  education, sanitation, and tourism. The policy bundle pairs the ARREST Agenda
  for Inclusive Development with IMF-backed fiscal stabilization and a
  transitional-justice push through an executive office for war and economic
  crimes court preparation.
policies:
  - lr_arrest_agenda_inclusive_development_2025_2029
  - lr_imf_ecf_2024
  - lr_war_economic_crimes_court_office_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "ARREST raises priority investment ambitions while the ECF constrains recurrent spending and debt risks."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "The development plan targets agriculture, roads, education, sanitation, and tourism as priority sectors."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "The war-crimes court office and IMF governance benchmarks strengthen legal accountability and public-finance controls."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "The ECF supports macroeconomic discipline and reduced fiscal dominance."}
references:
  - "Government of Liberia, ARREST Agenda for Inclusive Development 2025-2029."
  - "IMF Country Report No. 2025/290, Liberia 2025 Article IV and second ECF review."
  - "Executive Mansion of Liberia, Executive Order No. 131 establishing the Office of War and Economic Crimes Court, 2024."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: china_wto_accession_2001
status: candidate
name: "China WTO accession"
countries: [CHN]
timeframe: {start: 2001, end: 2015, enacted_date: "2001-12-11"}
coalition: "CCP under Jiang Zemin + Zhu Rongji premiership"
leaders: ["Jiang Zemin", "Zhu Rongji", "Long Yongtu (chief negotiator)"]
doctrine: >
  Commit to tariff reductions, market access, IP protection, and trading-
  rights reforms in exchange for MFN access to WTO member markets. Locked
  in reform commitments with international credibility. Outcome:
  unprecedented export-led growth, manufacturing-sector expansion, and
  structural transformation of global supply chains. Also produced the
  "China shock" documented by Autor-Dorn-Hanson (2013, 2016) on US
  manufacturing employment.
policies: [china_wto_tariff_reductions_2001, china_soe_reform_2001_2006, china_trading_rights_liberalisation]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Average MFN tariff from 15.3% (2001) to 9.4% (2010)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Service sector partial opening; IP protection formalised."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate}
outcome_hypotheses: [china_wto_growth_effect, developmentalist_state_growth_performance]
position_alignments:
  - {position_id: chicago_monetarist, alignment: partially_aligned}
  - {position_id: developmentalist, alignment: aligned}
steelman: movements/steelman/china_wto_accession_2001.md
references:
  - "China Protocol of Accession to WTO, 10 Nov 2001"
  - "Autor-Dorn-Hanson (2013) 'The China Syndrome' AER"
  - "Brandt-Rawski (2008), China's Great Economic Transformation"

movement_id: russia_putin_second_term_2004_2008
status: candidate
name: "Putin second term state capitalism consolidation 2004-2008"
countries: [RUS]
timeframe: {start: 2004, end: 2008, enacted_date: "2004-05-07"}
coalition: "Putin presidential administration; Fradkov (2004-2007) then Zubkov (2007-2008) government; Medvedev tandem prep"
leaders:
  - "Vladimir Putin (President, 2004-2008)"
  - "Mikhail Fradkov (Prime Minister, 2004-2007)"
  - "Viktor Zubkov (Prime Minister, 2007-2008)"
  - "Alexei Kudrin (Finance Minister)"
  - "Dmitry Medvedev (First Deputy PM from 2005)"
doctrine: >
  Putin II state-capitalist consolidation — oil-boom-funded state-sector
  reassertion (Rosneft absorption of Yuganskneftegaz from Yukos 2004-5,
  Gazprom-Sibneft acquisition 2005), formation of 'national champion'
  state corporations (Rosatom, Rostec, Olimpstroi — 2007), and the
  Beslan-triggered abolition of direct gubernatorial elections (Dec
  2004). Economic school: Russian state-capitalist resource-nationalist
  with fiscal-conservative stabilisation fund (Kudrin). Left-right
  axis: economically centrist-state-interventionist with selective
  liberalism, institutionally authoritarian. Dated policies: gubernatorial
  election abolition (Dec 2004 Law 159-FZ), Yuganskneftegaz auction
  (19 Dec 2004), Stabilisation Fund split into Reserve Fund and National
  Wealth Fund (1 Feb 2008), National Priority Projects (launched Sep
  2005), Sochi 2014 winning bid (4 Jul 2007), Munich speech (10 Feb
  2007), Medvedev anointed successor (Dec 2007 nomination). Popularity:
  approval >70% throughout. Coherence: very high — tight Kremlin
  discipline, tandem succession preparation.
policies:
  - ru_gubernatorial_election_abolition_2004
  - ru_rosneft_yuganskneftegaz_2004
  - ru_national_priority_projects_2005
  - ru_stabilisation_fund_split_2008
  - ru_medvedev_tandem_prep_2007_2008
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Direct gubernatorial elections abolished; further centralisation of federal power."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Yukos-trial precedent and continued politicised enforcement."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "National Priority Projects (health, education, housing, agriculture) and state-corporation subsidies."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Oil-boom spending surge 2005-2008, partially sterilised via Stabilisation Fund."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Strategic-sectors law (2008) tightened foreign investment in 42 'strategic' industries."}

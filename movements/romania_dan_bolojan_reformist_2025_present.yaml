# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: romania_dan_bolojan_reformist_2025_present
status: candidate
name: "Dan-Bolojan reformist consolidation 2025-present"
countries: [ROU]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-05-26"}
coalition: "PNL + USR + UDMR centre-right reform coalition; PSD in opposition after 2025 break"
leaders:
  - "Nicușor Dan (President, independent reformist, May 2025-, defeated AUR's Simion in run-off)"
  - "Ilie Bolojan (Prime Minister, PNL, June 2025-)"
  - "Alexandru Nazare (Finance Minister, 2025-)"
  - "Mugur Isărescu (BNR Governor, long-tenured)"
doctrine: >
  Government formed after the cancelled-then-rerun 2024-2025
  presidential election in which constitutional court annulled
  the November 2024 first round on disinformation/foreign-
  interference grounds; rerun May 2025 with Nicușor Dan
  defeating George Simion (AUR). Bolojan PM after PSD-PNL
  rotation broke down. Programme: emergency fiscal
  consolidation (deficit reached ~8% of GDP under PSD-PNL
  rotation in 2024); EU excessive-deficit-procedure compliance;
  pension and judicial-special-pension reform; anti-corruption
  rebuild after years of PSD-driven dilution; defence-spending
  ramp toward 2.5%+ of GDP given Ukraine border exposure;
  RRF (NextGenerationEU) milestone reactivation after delays.
  Sharp confrontation with AUR populist-right opposition.
policies:
  - ro_2025_consolidation_package
  - ro_judicial_special_pensions_reform_2025
  - ro_defence_spending_ramp_2025
  - ro_rrf_milestone_recovery_2025
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "EU EDP-anchored consolidation; deficit target trajectory toward 3% by 2027."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-corruption rebuild; judicial reform; reversal of 2017-2019 dilution legacy."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Deeper EU integration; RRF reform compliance; Schengen full-accession path."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Constitutional Court asserted independent power against foreign-interference-tainted election; judicial-special-pension reform reinforces accountability."}
predecessor_movements: [romania_iliescu_fsn_1990_1996]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "EU-EDP-anchored consolidation; rules-based fiscal discipline; defence-spending ramp toward NATO commitment; RRF reform compliance."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Anti-corruption rebuild; judicial-special-pension reform; constitutional-court independence asserted."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Sharp consolidation reducing structural deficit; rules-based monetary discipline through BNR continuity."}
references:
  - "Romanian Constitutional Court ruling annulling Nov 2024 election"
  - "Romanian 2025 presidential election rerun"
  - "Bolojan government investiture June 2025"
notes: "Stub authored to close 2026 atlas-coverage gap for ROU. Multiple intermediate movements (Constantinescu, Iliescu-II, Băsescu, Iohannis) remain unauthored."

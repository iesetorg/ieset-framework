# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: seychelles_macro_blue_economy_resilience_2008_present
status: candidate
name: Seychelles macro-stabilisation and blue-economy resilience 2008-present
countries: [SYC]
timeframe:
  start: 2008
  end: ongoing
coalition: Seychelles post-crisis governing administrations
leaders:
  - "James Michel (President, 2004-2016)"
  - "Danny Faure (President, 2016-2020)"
  - "Wavel Ramkalawan (President, 2020-)"
doctrine: >
  Seychelles' post-2008 policy regime links small-island macro-stabilisation to
  ocean-based resilience. The core sequence floated the currency, restructured
  public debt, restored fiscal credibility, and later used blue-finance
  instruments to fund marine conservation and sustainable fisheries. The
  movement is framed as a cross-administration policy regime rather than a
  party label.
policies:
  - syc_exchange_rate_liberalisation_2008
  - syc_fiscal_consolidation_debt_restructuring_2008
  - syc_sovereign_blue_bond_2018
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Exchange-control liberalisation loosened direct foreign-exchange transaction controls."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "A market-clearing rupee reduced FX rationing for trade and tourism transactions."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Post-default consolidation and debt restructuring placed primary-balance repair at the centre of policy."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Blue-bond commitments funded marine conservation and sustainable fisheries governance."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Debt restructuring and use-of-proceeds commitments increased fiscal and environmental reporting discipline."}
references:
  - "IMF Seychelles Stand-By Arrangement and Article IV materials, 2008-2025."
  - "World Bank, Seychelles launches world's first sovereign blue bond, 2018."

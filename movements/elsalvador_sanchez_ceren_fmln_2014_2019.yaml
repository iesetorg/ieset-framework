  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Debt-to-GDP rose toward 70%; pension debt accumulation."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Contested 2012-2014 gang truce collapse correlated with record homicides; extrajudicial-killing allegations investigated post-term."}
  - {axis: monetary.monetary_expansion_direction, direction: "0", magnitude: weak, rationale: "Dollarised; no independent monetary policy."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No major structural product-market reforms."}
outcome_hypotheses:

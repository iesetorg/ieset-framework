movement_id: turkey_evren_military_1980_1983
status: candidate
name: "Evren military government — coup consolidation, Özal stabilisation continuation"
countries: [TUR]
timeframe: {start: 1980, end: 1983, enacted_date: "1980-09-12"}
coalition: "National Security Council (military junta)"
leaders:
  - "General Kenan Evren (Chief of General Staff, Head of State)"
  - "Bülent Ulusu (PM 1980-1983, retired admiral)"
  - "Turgut Özal (Deputy PM for Economic Affairs 1980-1982 — continued January 24 package)"
doctrine: >
  Military junta following the 12 September 1980 coup; suspended parliament,
  banned parties, and executed the 1982 Constitution. Economic school:
  authoritarian-led market liberalisation — Özal's retention as economic
  chief preserved and deepened the January 1980 package (export subsidies,
  managed devaluation, financial-sector liberalisation, SEE restructuring)
  while the junta suppressed trade-union activity and held wage growth
  below inflation. Left-right axis: far-right authoritarian politically;
  right-market economically with substantial state-economic-enterprise
  footprint retained. Popularity: no elections 1980-83; 1982 constitutional
  referendum 91.4% yes under controlled conditions; November 1983 election
  was managed (only three junta-approved parties permitted) and
  unexpectedly delivered Özal's ANAP a majority — ending direct military
  rule. Coherence: internally coherent — pair authoritarian
  depoliticisation with market opening to lock in reforms that coalitions
  could not. This is the canonical bureaucratic-authoritarian
  liberalisation pattern (Turkey 1980 alongside Korea-Park, Chile-Pinochet).
policies:
  - tr_1982_constitution_authoritarian_lock_in
  - tr_ozal_export_subsidies_deepening_1980_1983
  - tr_trade_union_suppression_martial_law_1980
  - tr_banker_scandal_financial_deregulation_1982
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "Martial-law suspension of strikes and collective bargaining sharply weakened labour side of contract."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Deepened January 1980 package — export subsidies and managed real depreciation."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "1980-82 interest-rate liberalisation (reversed after 1982 Banker scandal)."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "1982 Constitution entrenched military tutelage; parties and press constrained."}
predecessor_movements: [turkey_pre_coup_instability_1975_1980]

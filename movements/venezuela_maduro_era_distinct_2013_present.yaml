# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: venezuela_maduro_era_distinct_2013_present
status: candidate
name: "Maduro-era Venezuela (distinct from Chávez era)"
countries: [VEN]
timeframe:
  start: 2013
  end: ongoing
  enacted_date: "2013-04-19"
coalition: "PSUV + GPP (Gran Polo Patriótico); post-2020 ad hoc coalition with bolivariano security bloc"
leaders:
  - "Nicolás Maduro (President 2013-present)"
  - "Rafael Ramírez (PDVSA/oil, 2004-2014)"
  - "Tareck El Aissami (Vice President / Industry / Oil, various 2017-2023)"
  - "Delcy Rodríguez (Vice President 2018-present)"
doctrine: >
  Continuation of the Chavista project under drastically different
  macroeconomic conditions: the 2014-2016 oil-price crash removed the
  commodity rent base on which 1999-2013 redistribution and import-
  substitution depended, and the regime's response was monetary-fiscal
  fusion (BCV financing of PDVSA and the non-oil deficit), exchange-rate
  regime multiplication (CADIVI, SICAD, SIMADI, DICOM, DIPRO), and
  eventual hyperinflation 2017-2019 meeting the Cagan threshold
  (monthly inflation >= 50%). Distinct content from the Chávez era
  includes: the Petro cryptocurrency launch 2018 (effectively abandoned),
  three currency redenominations (bolívar fuerte 2008 preceded; bolívar
  soberano 2018; bolívar digital 2021), de facto partial dollarisation
  after 2019 as bolívar use collapsed, post-2019 relaxation of price
  and FX controls as a survival measure, oil-output collapse from
  ~2.4 mb/d in 2013 to ~0.4 mb/d 2020 (recovering partially by 2024),
  escalating US sanctions (SDN 2017 on officials, PDVSA designation
  2019, secondary sanctions on tanker operators), and mass emigration
  of ~7-8 million people (>=25% of population) by 2024 per UNHCR/R4V
  platform estimates. 2024 election contested with opposition (María
  Corina Machado/Edmundo González) claiming victory against official
  CNE results; regime retained power. Outcome: cumulative real GDP
  decline of >70% from the 2013 peak, one of the largest non-wartime
  peacetime contractions in the modern record.
policies:
  - venezuela_petro_cryptocurrency_2018
  - venezuela_bolivar_redenomination_2018
  - venezuela_bolivar_redenomination_2021
  - venezuela_de_facto_dollarisation_2019
  - venezuela_oil_sector_pdvsa_collapse_2013_2020
  - venezuela_fiscal_monetary_fusion_2013_2019
  - venezuela_price_fx_control_relaxation_2019
axes_summary:
  - axis: monetary.central_bank_independence
    direction: "-"
    magnitude: strong
    rationale: "BCV direct financing of PDVSA and fiscal deficit from 2013; reserve cover collapsed; multiple BCV presidents during 2013-2019."
  - axis: monetary.monetary_expansion_direction
    direction: "+"
    magnitude: strong
    rationale: "Cagan-threshold hyperinflation 2017-2019; base-money growth of orders of magnitude."
  - axis: regulatory.product_market_competition
    direction: "mixed"
    magnitude: moderate
    rationale: "Continued price controls pre-2019; post-2019 de facto relaxation as shortages forced acceptance of parallel markets."
  - axis: institutional.rule_of_law
    direction: "-"
    magnitude: strong
    rationale: "2017 Supreme Court dissolution of National Assembly prerogatives; 2019 parallel government episode; 2024 election dispute."
  - axis: institutional.property_rights
    direction: "-"
    magnitude: strong
    rationale: "Post-2013 expropriation wave continued; post-2019 informal property-rights erosion as state capacity collapsed."
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: strong
    rationale: "FX rationing functioned as import restriction; sanctions regime from 2017 further restricted trade access."
  - axis: fiscal.spending_level
    direction: "mixed"
    magnitude: moderate
    rationale: "Nominal spending surged via monetisation; real spending on public goods collapsed as the tax base and oil rents both evaporated."
outcome_hypotheses:
  - maduro_era_venezuelan_collapse_decomposition_2013_2023
  - hyperinflation_requires_fiscal_dominance
  - venezuela_chavismo_framework_validation
predecessor_movements:
  - venezuela_chavismo_bolivarian_1999_present
position_alignments:
  - {position_id: marxist_leninist, alignment: partially_aligned, notes: "Self-described heir to the Bolivarian project; actual policy became more survival-oriented than ideologically coherent after 2017."}
  - {position_id: austrian, alignment: opposed}
  - {position_id: chicago_monetarism, alignment: opposed}
steelman: movements/steelman/venezuela_maduro_era_distinct_2013_present.md
disclosure: >
  The Maduro era is coded as a distinct movement from the Chávez era
  (1999-2013) because the policy content, macroeconomic constraints,
  and outcome drivers differ substantively: oil price crash, hyper-
  inflation, sanctions, mass emigration. The distinction is analytical,
  not exculpatory of either era. Framework-validation expectation is
  that the Maduro-era marginal treatment effect (2013-2023) is large
  and negative even after controlling for oil-price exogeneity, via
  the monetary-fiscal-fusion and institutional-collapse channels.
references:
  - "Hanke & Krus (2020), World Hyperinflation Table — Venezuela 2016-2019 episode"
  - "Rodriguez (2024), 'Sanctions and the Venezuelan economy', CEPR"
  - "R4V Regional Inter-Agency Coordination Platform — Venezuelan migration estimates"
  - "US Treasury OFAC Venezuela-related sanctions chronology"
  - "IMF staff notes on Venezuela (Article IV lapsed post-2004)"
notes: >
  The split from venezuela_chavismo_bolivarian_1999_present is
  deliberate: that movement codes the 1999-2013 Chávez era (plus an
  umbrella label extending to the present for legacy continuity), while
  this movement carries the distinct Maduro-era content (2013 onwards).
  The maduro_era_venezuelan_collapse_decomposition_2013_2023 hypothesis
  attempts to attribute share of the collapse to (a) oil-price shock,
  (b) monetary-fiscal fusion, (c) sanctions, (d) political destabilisation.

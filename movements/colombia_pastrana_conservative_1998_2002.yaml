movement_id: colombia_pastrana_conservative_1998_2002
status: candidate
name: "Pastrana Conservative — Caguán peace attempt, Plan Colombia, recession"
countries: [COL]
timeframe: {start: 1998, end: 2002, enacted_date: "1998-08-07"}
coalition: "Partido Conservador Colombiano (Gran Alianza por el Cambio)"
leaders:
  - "Andrés Pastrana Arango (President 1998-2002)"
  - "Juan Camilo Restrepo / Juan Manuel Santos (Hacienda)"
  - "Miguel Urrutia (BanRep Governor until 2005)"
  - "Víctor Ricardo (High Commissioner for Peace)"
doctrine: >
  Conservative peace-first government whose defining pillars were
  failed FARC negotiations and US-aligned counter-narcotics rearmament.
  Five doctrinal pillars: (a) Zona de Distensión del Caguán —
  demilitarised zone of 42,000 km² (5 southern municipalities;
  San Vicente del Caguán base) granted 7 Nov 1998; peace talks opened
  7 January 1999 (empty chair / silla vacía incident — FARC Tirofijo
  absent); talks formally broken 20 February 2002 after FARC hijacked
  commercial flight to kidnap Senator Jorge Gechem. (b) Plan Colombia
  — unveiled July 1999, US approved $1.3B initial package July 2000
  (Clinton-Pastrana); total 2000-2006 ~$4.7B US funding; air-mobile
  counter-narcotics brigades, aerial fumigation; architecture that
  Uribe would fully operationalise. (c) Recession 1998-1999 — deepest
  since 1930s; GDP -0.6% (1998), -4.2% (1999), +2.9% (2000); coffee
  price collapse + Asia/Russia/Brazil contagion; unemployment reached
  20% (2000); first IMF extended standby in 30 years signed December
  1999 ($2.7B). (d) Constitutional fiscal reforms — Ley 617 of 2000
  (territorial fiscal discipline), Ley 715 of 2001 (education-health
  transfers formula), Law 546 UVR housing reform 1999 after 1998
  mortgage collapse. (e) Military modernisation — Plan Colombia
  vehicle for doubling defence spending; helicopter force multiplier;
  set stage for 2002+ territorial rollback. Stated school: Conservative
  peace-liberalism + US-alignment + fiscal-orthodox continuity.
  Left-right: centre-right. Popularity: 21 June 1998 runoff Pastrana
  50.3% vs Horacio Serpa 46.5%; approval collapsed with Caguán
  failure to ~20% end-of-term; May 2002 first round Uribe won 53%
  directly on anti-Caguán mandate. Coherence: trade diplomatic
  gamble + territorial concession for exposed-FARC credibility
  failure + Plan-Colombia counterinsurgency architecture +
  institutional fiscal-reform continuity — total political cost
  enormous but infrastructural bequest substantial for Uribe.
policies:
  - co_zona_distension_caguan_1998_2002
  - co_plan_colombia_2000
  - co_upac_to_uvr_mortgage_reform_1999
  - co_ley_617_territorial_fiscal_discipline_2000
  - co_imf_extended_fund_facility_1999
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Caguán concession + failure eroded state-sovereignty principle."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence spending doubled; recession widened deficit before reforms."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Law 617 imposed territorial fiscal discipline late-term."}
  - {axis: regulatory.financial_deregulation, direction: "0", magnitude: weak, rationale: "UPAC-to-UVR reform stabilised mortgage market without major liberalisation."}
outcome_hypotheses: [peace_negotiation_without_military_leverage, plan_colombia_counterinsurgency_effect]
predecessor_movements: [colombia_samper_liberal_1994_1998]
successor_movements: [colombia_uribe_security_market_reforms_2002_2010]
position_alignments:

movement_id: hungary_nemeth_transition_1988_1990
status: candidate
name: "Németh MSZMP/MSZP transitional reform government — negotiated transition 1988-1990"
countries: [HUN]
timeframe: {start: 1988, end: 1990}
coalition: "Hungarian Socialist Workers' Party (MSZMP; renamed MSZP in October 1989) — reform-communist transitional government"
leaders:
  - "Miklós Németh (Prime Minister, November 1988-May 1990)"
  - "Rezső Nyers (MSZP chairman)"
  - "Imre Pozsgay (State Minister, reform faction)"
  - "György Surányi (Hungarian National Bank president)"
  - "László Békesi (Finance Minister)"
doctrine: >
  Németh's government oversaw the negotiated 1989 transition —
  the Opposition Round Table (Ellenzéki Kerekasztal), legal
  reforms, and the first multi-party elections of March-April
  1990. Economic school: late-goulash reform-communism
  pivoting to market-transition with gradualist-neoliberal
  content, building on the 1968 New Economic Mechanism legacy
  and 1980s debt stress. Left-right axis: technocratic centre,
  reform-communist on party label but market-oriented on
  content. Core policy content: (i) May 1989 opening of the
  Hungarian-Austrian border — the first physical breach of
  the Iron Curtain, catalysing the East German exodus;
  (ii) October 1989 constitutional amendment converting the
  People's Republic into the Republic of Hungary, legalising
  multi-party democracy; (iii) 1988-1989 tax reform introducing
  personal income tax, VAT (ÁFA), and social-security
  framework — the architecture of the market-economy fiscal
  system; (iv) Company Law (Act VI of 1988) and Foreign
  Investment Law (Act XXIV of 1988) legalising joint-ventures
  and foreign ownership; (v) 1989 two-tier banking system
  formalisation (Hungarian National Bank + commercial banks
  separation started 1987); (vi) 1990 bankruptcy law
  preparation and small-privatisation groundwork; (vii) IMF
  standby programme maintained. Popularity: first free
  elections March-April 1990 won by MDF (Antall); Németh's
  MSZP scored 10.9% — transitional government delivered clean
  handover. Coherence: very high — one of the cleanest
  negotiated-transition cases, producing market-economy
  institutional architecture ahead of the opposition's
  election victory.
policies:
  - hu_company_law_vi_1988
  - hu_foreign_investment_law_1988
  - hu_personal_income_tax_vat_reform_1988
  - hu_constitution_amendment_republic_1989
  - hu_two_tier_banking_1987_1989

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: belarus_lukashenko_state_capitalism_1994_present
status: candidate
name: "Lukashenko state-capitalist continuity (Belarus, 1994-present)"
countries: [BLR]
timeframe: {start: 1994, end: ongoing}
coalition: "Lukashenko presidential regime"
leaders:
  - "Alexander Lukashenko"
doctrine: >
  Post-Soviet continuity model that deliberately avoided large-scale market
  shock therapy, preserved dominant state ownership in industry and banking,
  relied on administrative price, wage, and credit controls, and integrated
  heavily with Russia for energy, finance, and export markets. The movement
  prioritised employment preservation and executive control over competitive
  restructuring and independent institutions.
policies:
  - by_1996_presidential_constitution
  - by_state_enterprise_retention_1995
  - by_admin_price_credit_controls_1994_2015
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "The 1996 constitutional turn concentrated executive authority and weakened checks."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Large state ownership and executive discretion limited private control of productive assets."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "State enterprises, administered prices, and directed credit constrained market competition."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Directed lending and fiscal-industrial priorities frequently dominated monetary policy."}
position_alignments:
  - {position_id: marxist_leninist, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "EBRD Transition Report, Belarus country chapters"
  - "IMF Belarus Article IV reports"
  - "Wilson (2021), Belarus: The Last European Dictatorship"
notes: "The post-2020 sanctions and Russia-dependence phase can be split later."

movement_id: ethiopia_hailemariam_eprdf_2012_2018
status: candidate
name: "Hailemariam EPRDF continuity (Ethiopia, post-Meles caretaker)"
countries: [ETH]
timeframe: {start: 2012, end: 2018}
coalition: "EPRDF (SEPDM-led premiership inside TPLF-dominated coalition)"
leaders: ["Hailemariam Desalegn (PM 2012-2018)"]
doctrine: >
  Hailemariam assumed the premiership as caretaker after Meles Zenawi's
  death in Aug 2012 and was charged with executing the developmental-state
  template without the architect. Economic school: EPRDF developmental
  continuity — the second Growth and Transformation Plan (GTP II 2015-2020)
  extended the state-led public-investment strategy, the Grand Ethiopian
  Renaissance Dam construction accelerated, industrial parks (Hawassa 2016,
  Bole Lemi) pursued labour-intensive export manufacturing, and Ethio
  Telecom and the state banking regime remained closed to foreign
  competition. Left-right: centrist-developmentalist continuity of the
  TPLF-origin coalition. Key policies with dates: GTP II launched 2015;
  Hawassa Industrial Park inaugurated Jul 2016; state of emergency Oct 2016
  and again Feb 2018; Grand Renaissance Dam bond campaign continued.
  Popularity: mass Oromo protests from late 2015 (response to Addis Ababa
  Master Plan) spread to Amhara 2016; an estimated 500-1,000 killed;
  internet shutdowns; the crisis culminated in Hailemariam's resignation
  Feb 15 2018 — a rare voluntary departure under protest pressure in
  African politics. Coherence: continuity at the policy level but growing
  incoherence between developmental-state economic doctrine and rising
  ethnic-federal political strain; the model delivered growth but could
  not absorb youth-employment and land-rights grievances.
policies: [et_gtp_ii_2015, et_hawassa_industrial_park_2016, et_state_of_emergency_2016, et_addis_master_plan_oromo_protests_2015]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "GTP II and industrial-park subsidies continued."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Telecoms and banking remained closed."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "2016 and 2018 states of emergency; mass detentions."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public investment share sustained near record highs."}
outcome_hypotheses: [developmentalist_state_growth_performance]
predecessor_movements: [ethiopia_meles_late_era_2005_2012]
successor_movements: [ethiopia_abiy_prosperity_2018_present]
position_alignments:

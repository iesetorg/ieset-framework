# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thailand_paetongtarn_pheu_thai_2024_present
status: candidate
name: "Paetongtarn Shinawatra — Pheu Thai-led coalition (2024-present)"
countries: [THA]
timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-08-16"
coalition: "Pheu Thai-led coalition continuation after the Constitutional Court's 14 Aug 2024 removal of Srettha Thavisin — Pheu Thai + Bhumjaithai + United Thai Nation + Chartthaipattana + minor parties; PPRP removed from coalition Aug 2024, reducing security-consensus footprint"
leaders:
  - "Paetongtarn Shinawatra (PM from 16 August 2024, Thaksin's youngest daughter)"
  - "Phumtham Wechayachai (Deputy PM, Defence)"
  - "Anutin Charnvirakul (Deputy PM, Interior, Bhumjaithai leader)"
  - "Pichai Chunhavajira (Finance Minister)"
  - "Julapun Amornvivat (Deputy Finance Minister)"
  - "Maris Sangiampongsa (Foreign Minister)"
  - "Sethaput Suthiwartnarueput (BoT Governor through 2024, succeeded Sep 2025)"
doctrine: >
  Pheu Thai populist-Thaksinist continuation under the Shinawatra-
  family restoration — Paetongtarn, Thaksin's youngest daughter,
  installed as PM on 16 August 2024 after the Constitutional Court
  removed Srettha (14 Aug 2024) and dissolved the first-placed Move
  Forward Party (7 Aug 2024, on Article 112 amendment grounds), with
  Move Forward's 151/500 seats reconstituting as the People's Party.
  Economic school: Thaksinism mark III — continuity of the 10,000-
  baht digital-wallet programme (first tranche to vulnerable groups
  Sep 2024, phase 2 to elderly Jan 2025, remaining phases recalibrated
  through 2025), minimum-wage push toward the 400-baht national floor,
  casino-entertainment-complex bill tabled for cabinet and legislative
  consideration 2025 (legalising integrated resorts to attract FDI
  and tourism spend), land-bridge Chumphon-Ranong mega-project
  continued in procurement framing, Financial Hub bill. Monetary
  stance: repeated public pressure on BoT to cut rates; the Oct 2024
  rate cut and subsequent 2025 cuts partially followed; Sep 2025
  change of Governor. Monarchy-accommodation preserved: no move to
  amend Article 112, Thaksin's post-return legal status managed
  through existing channels. Sits economically centre-left populist,
  pragmatic-business on industrial policy (casino, land bridge,
  semiconductor-cluster pitches), and institutionally accommodating
  to the 2017-constitution framework (appointed Senate replaced in
  May 2024 by an indirect-election 200-member Senate, no structural
  reform). Popularity / seats: coalition controls roughly 314 of
  500 House seats post-August 2024 reshuffle; Paetongtarn approval
  started ~40% (NIDA poll Sep 2024), slumped to ~30% by early 2025
  amid digital-wallet delays and Thai-Cambodia border incidents,
  recovering partially with casino-bill and minimum-wage delivery.
  People's Party (ex-Move-Forward) leads preferred-PM polling for
  most of 2025, setting up the next election as a referendum on
  Thaksinism vs reformism.
policies:
  - th_digital_wallet_10k_baht_2024
  - th_casino_entertainment_complex_bill_2025
  - th_minimum_wage_400_baht_trajectory_2024
  - th_financial_hub_bill_2025
  - th_land_bridge_project_2023
  - th_move_forward_dissolution_2024
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Digital-wallet phased rollout 2024-2025 — first tranche 145bn baht to 14.5m welfare-card holders Sep 2024; elderly phase Jan 2025."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Digital wallet funded via supplementary budget and FY25 expenditure; public-debt-to-GDP on rising trajectory but ceiling 70% observed."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "Land bridge, financial hub, semiconductor-cluster targeting through BOI continuation."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "400-baht national minimum-wage trajectory extended across sectors in 2024-2025."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Casino-entertainment-complex bill 2025 opens a new legalised sector with integrated-resort licensing regime; financial-hub bill offers special regulatory treatment."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Visa-free tourism continued; EU FTA negotiations advanced; ASEAN digital-economy engagement."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Move Forward dissolution 7 Aug 2024 and Srettha removal 14 Aug 2024 entrench Constitutional Court veto; no reform of the court's composition rules."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Continued lèse-majesté prosecutions; ex-Move-Forward executives banned from politics for 10 years; no amendment of Article 112."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: weak, rationale: "Public pressure from PM and Finance Minister for rate cuts; Sep 2025 BoT Governor succession; formal independence preserved but political signalling heavier than pre-2023."}
outcome_hypotheses:
  - cash_transfer_poverty_effects
  - minimum_wage_employment_effect
  - structural_reform_absence_and_post_euro_stagnation
predecessor_movements:
  - thailand_srettha_pheu_thai_2023_2024
  - thailand_prayut_junta_pprp_2014_2023
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Casino-resort, land-bridge, financial-hub state-directed growth bets."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Digital wallet + minimum wage; institutional accommodation to 2017 framework limits alignment."}
  - {position_id: post_keynesian, alignment: aligned, notes: "Demand-stimulus rationale for digital wallet; PM pressure for monetary easing."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Transfer scale, sectoral picks, and institutional direction all opposed to classical-liberal baseline."}
  - {position_id: institutionalism, alignment: opposed, notes: "Move Forward dissolution and Srettha-removal precedents not contested by the coalition."}
disclosure: >
  Only ~8 months of data at drafting (Aug 2024 - Apr 2026 roughly).
  Digital-wallet outcomes (consumption multiplier, inflation pass-
  through, poverty-rate effect) and casino-bill enactment path are
  live. Expect v1.1 revisit in 2026-2027.
references:
  - "Bank of Thailand Monetary Policy Report 2024-2025"
  - "Royal Thai Government Gazette, digital-wallet cabinet resolutions 2024-2025"
  - "Constitutional Court ruling 7 Aug 2024 (Move Forward Party dissolution)"
  - "Constitutional Court ruling 14 Aug 2024 (Srettha Thavisin ethics case)"
  - "Casino and Entertainment Complex draft bill 2025 (Thai cabinet version)"
  - "NIDA public-opinion polls 2024-2025"
  - "Phongpaichit & Baker (2024), 'Thailand after the 2023 election'"
notes: >
  Separate movement record from Srettha preserves the distinction
  between the technocrat-outsider framing (Srettha) and Shinawatra-
  family restoration framing (Paetongtarn) even though coalition and
  programme are continuous. Digital-wallet policy is shared across
  both movements via the enacted_by list. Move Forward dissolution
  is coded as a policy because it is a constitutional-court act
  that reshapes the political-party landscape, even though the
  coalition did not initiate the petition.

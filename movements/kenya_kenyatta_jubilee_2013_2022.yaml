# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kenya_kenyatta_jubilee_2013_2022
status: candidate
name: "Kenyatta Jubilee developmentalist era (Kenya)"
countries: [KEN]
timeframe: {start: 2013, end: 2022}
coalition: "TNA/URP Jubilee Alliance (2013), Jubilee Party (2017); post-handshake broad coalition with ODM from 2018"
leaders: ["Uhuru Kenyatta (President)", "William Ruto (Deputy President)", "Henry Rotich (Treasury CS 2013-2019)", "Ukur Yatani (Treasury CS 2020-2022)", "Patrick Njoroge (CBK Governor 2015-2023)", "Raila Odinga (post-handshake partner 2018-)"]
doctrine: >
  The Jubilee government (TNA/URP alliance 2013, merged as Jubilee Party 2017)
  pursued a developmentalist-infrastructure agenda financed largely through
  Chinese concessional and commercial borrowing, epitomised by the Standard
  Gauge Railway (Mombasa-Nairobi Phase 1 opened 31 May 2017, Nairobi-Naivasha
  Phase 2A opened Oct 2019). Economic doctrine mixed Kibaki-era Vision 2030
  continuity with the Big Four Agenda (food security, universal healthcare,
  affordable housing, manufacturing) announced Dec 2017. Kenyatta won 50.07%
  in Mar 2013 and 54.2% in Aug 2017 — the latter annulled by the Supreme
  Court on 1 Sep 2017 and re-run on 26 Oct 2017 (boycotted by Raila, 98.26%
  share on ~39% turnout). The Mar 2018 "handshake" with Raila ended opposition
  street action and produced the Building Bridges Initiative (BBI, Mar 2021)
  to amend the constitution; BBI was struck down by the High Court (May 2021)
  and Court of Appeal (Aug 2021). Public debt rose from ~44% of GDP (2013) to
  ~68% (2022); IMF EFF/ECF re-entered in Apr 2021 after COVID. Governance
  indicators were mixed — infrastructure delivery and financial-sector deepening
  coexisted with procurement scandals (NYS, SGR cost overruns) and a widening
  Kenyatta-Ruto rift that culminated in Kenyatta backing Raila in 2022.
policies:
  - ke_sgr_phase1_2017
  - ke_big_four_agenda_2017
  - ke_handshake_bbi_2018
  - ke_imf_eff_ecf_2021
  - ke_excise_duty_act_2015
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "SGR, Lapsset, road programme, Big Four spending; debt-to-GDP up ~24 pp."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Manufacturing, housing and UHC industrial-policy pillars under Big Four."}
  - {axis: regulatory.product_market_competition, direction: "0", rationale: "Mixed — SGR cargo-directive favoured rail over road hauliers; financial-sector competition otherwise preserved."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Supreme Court annulment of Aug 2017 election upheld; BBI struck down by judiciary despite executive backing."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "NHIF expansion, Inua Jamii cash transfers scaled modestly."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Explicit infrastructure-led developmental-state framing; SGR as flagship."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Mixed instruments but debt trajectory became a standalone risk."}
references:

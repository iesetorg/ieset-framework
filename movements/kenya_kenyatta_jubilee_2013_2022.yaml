  - "Supreme Court of Kenya, Presidential Petition No. 1 of 2017 (Sep 2017)"
  - "High Court of Kenya, BBI Judgment (May 2021); Court of Appeal (Aug 2021)"
  - "IMF (2021), 38-month EFF/ECF Staff Report, Kenya"
  - "World Bank Kenya Economic Update, 2013-2022"

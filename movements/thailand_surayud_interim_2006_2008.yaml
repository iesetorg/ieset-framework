# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thailand_surayud_interim_2006_2008
status: candidate
name: "Surayud military-interim government post-September 2006 coup"
countries: [THA]
timeframe: {start: 2006, end: 2008, enacted_date: "2006-10-01"}
coalition: "Council for National Security (CNS) appointed interim cabinet under Surayud Chulanont"
leaders:
  - "Surayud Chulanont (PM, 1 Oct 2006 - 29 Jan 2008)"
  - "Council for National Security / General Sonthi Boonyaratglin"
  - "Chalongphob Sussangkarn (Finance)"
  - "Tarisa Watanagase (BoT Governor)"
doctrine: >
  Post-coup royalist-technocratic stabilisation doctrine — interim cabinet
  appointed by the Council for National Security (CNS) after the 19
  September 2006 coup that ousted Thaksin Shinawatra while he was at the
  UN General Assembly. Programme combined three vectors: (1) undo selected
  Thaksin-era commercialism — withdrawal of the Shin Corp / Temasek
  capital-gains tax exemption, reversal of some SOE privatisations, halting
  of Thaksin's mega-projects pending review; (2) institutional restructuring —
  sufficiency-economy philosophy (เศรษฐกิจพอเพียง, the late King Bhumibol's
  framework) elevated as official planning doctrine in the 10th National
  Economic and Social Development Plan, 2007 Constitution (approved by
  referendum 19 August 2007) introducing stronger independent-body
  constraints on elected politicians; (3) a controversial 19 December
  2006 capital-controls episode (30% unremunerated reserve requirement on
  short-term inflows) that crashed the SET by 15% in one day before being
  partially reversed next day. Counter-insurgency deepening in the
  Muslim-majority South. Thaksin's Thai Rak Thai party dissolved May 2007
  by Constitutional Tribunal; 111 executives banned 5 years. December 2007
  election won by PPP (Thaksin proxy); transition to Samak government
  January 2008. Coherence line: royalist-technocratic reset plus
  sufficiency-economy doctrine, market-economy partially preserved but
  capital-controls misstep signalled governance instability.
policies:
  - th_surayud_capital_controls_dec_2006
  - th_2007_constitution_referendum
  - th_sufficiency_economy_10th_plan_2007
  - th_thai_rak_thai_dissolution_2007
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "30% URR short-term-inflow capital-controls Dec 2006; partially reversed within weeks but chilled FDI."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Coup reset of constitution; Thai Rak Thai dissolution; junta-appointed interim cabinet."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Shin-Corp tax-exemption review; privatisation reversals injected policy uncertainty."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "Thaksin-era FTA pipeline paused; no new major trade agreements."}
predecessor_movements:
  - thailand_thaksin_trt_2001_2006
successor_movements:
  - thailand_samak_somchai_ppp_2008
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Sufficiency-economy doctrine as formal planning frame; capital-controls episode reads as technocratic miscalculation."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Capital-controls and privatisation reversals inconsistent with market-liberal doctrine."}
references:
  - "Constitution of the Kingdom of Thailand (Interim) 2006; 2007 Constitution referendum 19 August 2007"
  - "BoT Press Release on 30% Unremunerated Reserve Requirement, 18 December 2006"
  - "Constitutional Tribunal dissolution of Thai Rak Thai, 30 May 2007"
notes: >
  Interim 16-month cabinet; coded as distinct movement because it implements
  a post-coup doctrinal agenda (sufficiency-economy, new constitution,
  capital controls) separable from the elected Thaksin regime that preceded
  it and the PPP governments that followed.

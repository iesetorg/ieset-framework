movement_id: poland_pis_kaczynski_first_2005_2007
status: candidate
name: "PiS Marcinkiewicz/Kaczynski Fourth Republic government 2005-2007"
countries: [POL]
timeframe: {start: 2005, end: 2007, enacted_date: "2005-10-31"}
coalition: "PiS minority then PiS-Samoobrona-LPR (May 2006 - Aug 2007)"
leaders:
  - "Kazimierz Marcinkiewicz (Prime Minister, PiS, Oct 2005-Jul 2006)"
  - "Jaroslaw Kaczynski (Prime Minister, PiS, Jul 2006-Nov 2007)"
  - "Lech Kaczynski (President, PiS, 2005-2010)"
  - "Zyta Gilowska (Finance Minister, PiS, 2006-2007)"
doctrine: >
  PiS-led 'Fourth Republic' (IV RP) project — twin-Kaczynski governance
  combining social-conservative cultural policy, lustration, and a mildly
  redistributive fiscal line with the CBA anti-corruption agency. Economic
  school: Polish national-conservative economic-interventionist with
  targeted transfers; Gilowska tax package (2007) cut disability
  contribution and reduced effective labour tax. Left-right axis: right
  on cultural/institutional axes, centrist-interventionist on economic
  axes. Dated policies: CBA Central Anticorruption Bureau established
  (9 June 2006, effective 24 July 2006), lustration law (Oct 2006, partially
  struck down by Constitutional Tribunal May 2007), 800+ family transfer
  precursor becikowe (one-off 1000 zl childbirth payment, Nov 2005 / from
  Jan 2006), PIT/KRUS disability-contribution cut (2007). Popularity:
  PiS won 2005 (26.99%) and 2007 (32.11% — yet lost to PO). Coherence:
  moderate — coalition with Samoobrona (Lepper) and LPR (Giertych) strained.
  Collapsed in autumn 2007 on taped-briefings scandal around Lepper.
policies:
  - pl_cba_anticorruption_bureau_2006
  - pl_lustration_law_2006
  - pl_becikowe_childbirth_grant_2006
  - pl_disability_contribution_cut_2007
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "CBA +institutional capacity; lustration law partially struck down — mixed net."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Becikowe childbirth grant, family benefit indexation."}
  - {axis: fiscal.tax_progressivity, direction: "0", magnitude: weak, rationale: "Disability-contribution cut reduced labour-tax burden; PIT scale shift to 18/32 enacted under successor PO government."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: weak, rationale: "Lustration enforcement contested by Constitutional Tribunal; precursor to later PiS judicial clashes."}

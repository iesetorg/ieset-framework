references:
  - "Magyarország Alaptörvénye (Fundamental Law of Hungary) 25 April 2011; amendments 1-4 (2012-2013)"
  - "European Parliament A8-0250/2018 (Sargentini Report)"
  - "CJEU C-286/12 (judges' retirement age); C-78/18 (NGO transparency law); C-66/18 (CEU/lex CEU)"
  - "Act CXXX of 2010 on financial institutions (bank levy); Act CIII of 2014 (advertising tax)"
  - "MNB Inflation Reports and Funding for Growth Scheme official documentation 2013-2020"
  - "Országgyűlés general election official results 2010, 2014, 2018 (NVI)"
notes: >
  Spans Fidesz second and third terms (2010-2014, 2014-2018) plus the third-
  term extension into 2018-2022. Policy content is continuous and best
  coded as a single consolidation period; fourth-term 2022+ coded separately
  because of the decree-based extra-profit tax regime and acute price-
  control expansion under the 2022-23 inflation shock.

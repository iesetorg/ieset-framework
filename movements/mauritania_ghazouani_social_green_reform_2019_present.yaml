# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mauritania_ghazouani_social_green_reform_2019_present
status: candidate
name: "Ghazouani social compact and green-reform programme 2019-present"
countries: [MRT]
timeframe: {start: 2019, end: ongoing, enacted_date: "2019-08-01"}
coalition: "El Insaf/UPR presidential majority"
leaders:
  - "Mohamed Ould Ghazouani (President, 2019-present)"
  - "Mohamed Ould Bilal (Prime Minister, 2020-2024)"
  - "Mokhtar Ould Diay (Prime Minister, 2024-present)"
doctrine: >
  Ghazouani's governing programme links social stabilization, fisheries and
  mining-resource management, macro-fiscal discipline, and climate resilience.
  It combines targeted cash transfers and a social registry with EU fisheries
  licensing, IMF ECF/EFF/RSF reforms, and a resource-sector diversification
  agenda around minerals, energy, and climate finance.
policies:
  - mrt_eu_fisheries_protocol_2021
  - mrt_tekavoul_social_registry_expansion_2020_2024
  - mrt_imf_ecf_eff_rsf_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Tekavoul and the social registry expand targeted cash-transfer coverage for poor households."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The IMF arrangements target debt sustainability and fiscal consolidation while protecting priority spending."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "The EU fisheries protocol and RSF component include sustainability and climate-resilience conditions."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "The fisheries protocol licenses and quotas foreign-vessel access to Mauritanian waters."}
references:
  - "World Bank, Mauritania social safety net and Tekavoul project materials."
  - "European Union, Mauritania-EU Sustainable Fisheries Partnership Agreement protocol 2021-2026."
  - "IMF, Mauritania ECF/EFF/RSF and Article IV materials."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bolivia_mas_extractivist_2006_2019
status: candidate
name: "MAS extractivist-redistributive model (Bolivia)"
countries: [BOL]
timeframe: {start: 2006, end: 2019}
coalition: "Movimiento al Socialismo (MAS-IPSP) with rural indigenous and union base"
leaders:
  - "Evo Morales (President 2006-2019)"
  - "Álvaro García Linera (Vice-President 2006-2019)"
  - "Luis Arce (Economy & Finance Minister 2006-2017)"
doctrine: >
  Self-described "Andean-Amazonian capitalism" and "communitarian socialism":
  nationalisation of hydrocarbons via Supreme Decree 28701 of May 2006,
  which raised the state's share of gas revenues sharply and brought YPFB
  into a majority-ownership position in upstream contracts; re-founding
  of the state in the 2009 Plurinational Constitution recognising
  indigenous autonomy; expansion of cash-transfer programmes (Bono
  Juancito Pinto 2006, Renta Dignidad 2008, Bono Juana Azurduy 2009);
  real minimum-wage increases; and large public investment in roads,
  gas infrastructure, and state-led industrialisation attempts in
  lithium, urea, and iron. Macroeconomic management was, in contrast,
  relatively orthodox by regional left-populist standards: a managed
  currency peg, fiscal surpluses through 2013, and reserve accumulation
  from the gas boom. After the 2014-2015 commodity-price decline
  deficits widened, reserves drew down, and the model became increasingly
  dependent on financing the peg. Term-limit controversy after the 2016
  referendum and disputed 2019 election ended the period. Framework
  records both the material gains — poverty headcount roughly halved,
  strong growth — and the later vulnerabilities of a peg-plus-deficit
  configuration after the commodity cycle turned.
policies:
  - bolivia_hydrocarbons_nationalisation_2006
  - bolivia_new_constitution_2009
  - bolivia_renta_dignidad_2008
  - bolivia_minimum_wage_increases_2006_2019
  - bolivia_ypfb_industrialisation
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "State-majority contracts in hydrocarbons; expanded licensing discretion for strategic sectors."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Fuel subsidies maintained; state investment in loss-making industrial ventures."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "New universal old-age transfer Renta Dignidad; school and maternal conditional transfers."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public investment share of GDP rose to among the highest in Latin America."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Contract renegotiation in hydrocarbons; later expropriations in electricity (2010-2012) and mining."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "BCB lending to public enterprises expanded; peg management dominated policy."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Dismissal restrictions tightened; real minimum wage roughly doubled."}
outcome_hypotheses:
  - commodity_boom_redistribution_sustainability
  - resource_nationalism_investment_effects
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: democratic_socialist, alignment: partially_aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Decreto Supremo 28701 (2006) — Héroes del Chaco"
  - "Constitución Política del Estado Plurinacional de Bolivia (2009)"
  - "Weisbrot et al. (2009), Bolivia: The Economy During the Morales Administration, CEPR"
  - "IMF Article IV Bolivia 2015, 2018"
  - "Arce (2015), El Modelo Económico Social Comunitario Productivo"
notes: >
  Distinguishable from Venezuelan Chavismo in that macroeconomic
  orthodoxy (peg credibility, reserve accumulation, fiscal surpluses
  through 2013) was maintained for most of the period. The peg-plus-
  deficit vulnerability after 2014 is the stress test the framework
  should pick up in post-2019 outcomes.

movement_id: russia_putin_fifth_term_2024_present
status: candidate
name: "Putin fifth term entrenched war economy 2024-present"
countries: [RUS]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-05-07"}
coalition: "United Russia; Putin presidency with Mishustin PM"
leaders:
  - "Vladimir Putin (President, May 2024-present; term constitutionally permitted to 2030, with reset option to 2036)"
  - "Mikhail Mishustin (Prime Minister, continuing)"
  - "Andrei Belousov (Defence Minister, May 2024-present, replaced Shoigu)"
  - "Elvira Nabiullina (CBR Chair, continuing)"
doctrine: >
  Putin fifth term — entrenchment of the war-economy state-capitalism
  established post-2022. Continuity government with one notable
  reshuffle: Belousov (an economist, not a soldier) installed as
  Defence Minister to manage the budgetary scale of the war as a
  permanent fiscal regime, signalling defence spending at ~6-7% of
  GDP and ~30-40% of federal expenditure as the new normal. CBR
  policy rate held high (16-21% range through 2024-2025) to contain
  war-spending inflation. Continued mass nationalisation/discount
  buyout of exiting foreign assets; deepening capital controls;
  energy-export pivot to India and China at sustained discount;
  expanded sanctions-evasion infrastructure (parallel imports,
  rouble-yuan settlement, BRICS+ payment rails). Domestic repression
  intensified — Navalny death Feb 2024, expanded foreign-agent regime,
  Memorial criminalisation extended. Demographic strain from war
  casualties and emigration is now a binding constraint on labour
  supply, pushing wages up and feeding inflation. The regime
  treats this as a multi-year-to-decade configuration rather than a
  temporary emergency.
policies:
  - ru_belousov_defence_ministry_2024
  - ru_war_economy_normalization_2024
  - ru_cbr_high_rate_regime_2024
  - ru_foreign_assets_nationalisation_continuation
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Repression deepened post-Navalny; foreign-agent regime expanded; war censorship entrenched."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Defence ~30-40% of federal spending normalised as multi-year regime, not emergency."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Sanctions regime hardening; G7 trade severed; Asia-pivot at structural discount."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "CBR retains technical independence; high-rate policy held against political pressure."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Foreign-owned assets nationalised at deep discount; expropriation now codified procedure."}
predecessor_movements: [russia_putin_fourth_term_2018_2024]
position_alignments:
  - {position_id: marxist_leninist, alignment: partially_aligned, notes: "Authoritarian state-capitalist war economy with FSB-organised political control; planning-element resource allocation but private property and markets retained — Soviet-successor-state texture without ideological communism."}
  - {position_id: developmentalism, alignment: aligned, notes: "Far-right civilisational nationalism, anti-Western, traditional-values, ethno-religious mobilisation, war-economy industrial mobilisation."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Mass nationalisation of foreign-owned assets; rule-of-law collapse; capital controls; press repression — opposed on every classical-liberal axis."}
  - {position_id: austrian, alignment: opposed, notes: "Discretionary expropriation regime; sustained fiscal expansion; capital-account closure — opposed on every Austrian axis."}

movement_id: nixon_ford_carter_energy_regulation_1973_1981
status: candidate
name: Cross-administration US energy-regulation regime 1973-1981
countries:
- USA
timeframe:
  start: 1973
  end: 1981
doctrine: 'Cross-administration energy-price-control regime extending from the Nixon Phase II/III
  controls through the Emergency Petroleum Allocation Act of 1973, the Energy Policy and Conservation
  Act of 1975, and the Carter-era Energy Department reorganisation under the Department of Energy
  Organization Act 1977. The framework set "old oil", "new oil", and stripper-well price tiers,
  mandated allocation of crude and refined product through the FEA entitlements programme, and
  imposed gasoline price ceilings administered through state-level rationing during shortage periods,
  with phased decontrol authorised by EPCA and completed by Carter''s 1979 executive order alongside
  the Crude Oil Windfall Profit Tax of 1980. Stated case: shield US consumers and downstream industries
  from OPEC-driven world-price increases, redistribute rents away from domestic producers of pre-shock
  crude, and use allocation rules to prevent regional supply imbalances during the 1973-74 and
  1979 disruptions.

  '

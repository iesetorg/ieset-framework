movement_id: newzealand_hipkins_labour_2023
status: candidate
name: "Hipkins Labour — transitional caretaker (NZ Jan-Nov 2023)"
countries: [NZL]
timeframe: {start: 2023, end: 2023}
coalition: "Labour majority (single-party)"
leaders: ["Chris Hipkins (PM)", "Grant Robertson (Finance)"]
doctrine: >
  A ten-month caretaker Labour government formed after Ardern's January
  2023 resignation, operating in a high-inflation, cost-of-living,
  post-COVID political environment with elections due October 2023.
  Hipkins executed a "policy bonfire" — deferring or cancelling several
  Ardern-era projects judged electorally toxic (TVNZ-RNZ merger scrapped,
  biofuels mandate cancelled, income insurance scheme paused, social
  insurance levy shelved) while preserving the Zero Carbon framework,
  Fair Pay Agreements, Three Waters (rebranded "Affordable Water
  Reforms"), and the Māori Health Authority. Budget 2023 was fiscally
  tighter than Wellbeing Budgets 2019-2022. Labour lost the October 2023
  election (27% party vote, 34/123 seats), its worst result since 1990.
  Coherence line: a short retrenchment-within-continuity government —
  trimming ambition without repudiating the doctrine, unable to reset
  voter perception on inflation, housing, and crime.
policies:
  - nz_policy_bonfire_2023
  - nz_budget_2023_hipkins
  - nz_three_waters_rebrand_2023

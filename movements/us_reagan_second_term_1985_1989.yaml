movement_id: us_reagan_second_term_1985_1989
status: candidate
name: "Reagan second term — TRA 1986, Cold War endgame, S&L, Black Monday"
countries: [USA]
timeframe: {start: 1985, end: 1989, enacted_date: "1985-01-20"}
coalition: "Republican Party (Reagan White House; divided Congress after 1986)"
leaders:
  - "Ronald Reagan (President 1981-1989)"
  - "James Baker (Treasury 1985-1988)"
  - "Nicholas Brady (Treasury 1988-1989)"
  - "Paul Volcker / Alan Greenspan (Fed Chair; Greenspan from August 1987)"
  - "Donald Regan (Chief of Staff 1985-1987)"
doctrine: >
  Second-term consolidation of the Reagan programme with four doctrinal
  pillars: (a) tax-base broadening orthodoxy — the Tax Reform Act of
  1986 (signed 22 October 1986) cut the top individual rate 50%→28%,
  cut the corporate rate 46%→34%, and eliminated dozens of shelters
  including passive-loss rules; bipartisan product of Bradley-Gephardt
  and Kemp-Kasten drafts negotiated by Baker-Darman with Rostenkowski
  and Packwood. (b) Cold War endgame and supply-side defence —
  Strategic Defence Initiative continued; Reykjavik (October 1986) and
  INF Treaty (December 1987) with Gorbachev; defence spending peaked
  ~6.2% GDP in FY1986. (c) Financial deregulation inheritance
  metastasised — Garn-St. Germain era thrifts (1982 framework)
  generated the Savings and Loan crisis; FSLIC insolvent by 1986-87;
  FIRREA cleanup pushed to Bush 41. (d) Crisis shocks — Black Monday
  19 October 1987 Dow -22.6% one day; Iran-Contra revelations
  (November 1986) eroded executive authority. Stated economic school:
  supply-side Lafferism + Chicago-monetarist Fed backstop (Volcker
  disinflation already achieved). Left-right: centre-right economic,
  hawkish foreign policy, socially conservative. Popularity: November
  1984 won 49 states, 58.8% popular vote vs Mondale; Gallup approval
  peaked 68% (May 1986) then fell to 43% post-Iran-Contra (February
  1987) before rebounding to 63% at exit (December 1988); 1986
  midterms lost Senate (Democrats 55-45). Coherence: trade near-term
  revenue loss and deficit drift (FY1986 deficit 5.0% GDP) for rate
  cuts, base-broadening, supply-side capital-formation, and a
  negotiated Cold War windup.
policies:
  - us_tax_reform_act_1986
  - us_inf_treaty_1987
  - us_sl_crisis_onset_1986_1989
  - us_black_monday_1987_response
  - us_immigration_reform_control_1986
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: strong, rationale: "Top rate 50%→28% under TRA 1986 is the largest peacetime rate cut at the top."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Statutory rate 46%→34% with base broadening; static revenue roughly neutral."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "S&L-era deregulation generated insolvency before FIRREA 1989 cleanup."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence buildup at ~6% GDP sustained through INF; civilian caps."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "Simpson-Mazzoli IRCA 1986 legalised ~2.7M while adding employer sanctions."}
outcome_hypotheses: [tax_rate_cut_growth_effect, sl_crisis_deregulation_causation]
predecessor_movements: [us_reagan_first_term_broad_1981_1985]
successor_movements: [us_bush_41_republican_1989_1993]
position_alignments:

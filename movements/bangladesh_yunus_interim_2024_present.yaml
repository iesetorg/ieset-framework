# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bangladesh_yunus_interim_2024_present
status: candidate
name: "Yunus interim government post-July Revolution"
countries: [BGD]
timeframe: {start: 2024, end: ongoing}
coalition: "Non-party technocratic caretaker cabinet installed after student-led July Revolution ousted Sheikh Hasina (5 Aug 2024); sworn in 8 Aug 2024"
leaders: ["Muhammad Yunus (Chief Adviser)", "Nahid Islam (student-leader adviser)", "Asif Nazrul (Law Adviser)", "Salehuddin Ahmed (Finance Adviser)"]
doctrine: >
  Microfinance-pioneer Nobel laureate technocratic interim cabinet explicitly
  framed as a rebuilding mission after the July Revolution of August 2024
  toppled Sheikh Hasina's fifteen-year Awami League rule. The doctrine
  combines institutional restoration (judicial independence, Election
  Commission reform, dismantling Digital Security Act / Cyber Security Act
  machinery) with macro stabilisation under the ongoing IMF $4.7bn Extended
  Credit Facility (January 2023) programme inherited from the prior
  government. Positioned ideologically as technocratic-liberal — market-
  friendly, foreign-investor-reassuring, rights-restorative — while
  distancing from both AL developmentalism and BNP clientelism. Stated
  priorities include constitutional-reform consultations, banking-sector
  clean-up after the forex crisis of 2022-2024, ICT Tribunal reforms,
  education-system overhaul, and preparing credible elections. Popular
  legitimacy rests on mass July-August mobilisation and roughly 1,400
  documented protest casualties rather than a Jatiya Sangsad seat share.
  Coherence line: "Second Republic" restoration through neutral technocracy.
policies:
  - bd_yunus_reform_commissions_2024
  - bd_cyber_security_act_repeal_2024
  - bd_bank_sector_cleanup_2024
  - bd_imf_ecf_continuation_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Reform commissions on judiciary, police, constitution, anti-corruption."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "High Court appointments review; ICT Tribunal restructuring."}
  - {axis: regulatory.financial_deregulation, direction: "0", magnitude: weak, rationale: "Bank clean-up under Bangladesh Bank governor change; tighter supervision not deregulation."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "IMF ECF continuation preserves tariff-rationalisation and FX-liberalisation trajectory."}
position_alignments:
  - {position_id: institutionalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Macro orthodoxy under IMF conditions; not a market-fundamentalist programme."}
predecessor_movements: [bangladesh_hasina_al_fourth_term_2019_2024]
references:
  - "IMF Country Report 23/66 (Bangladesh ECF/EFF/RSF, January 2023)"
  - "UN OHCHR Fact-Finding Report on Bangladesh (February 2025)"
  - "Bangladesh Interim Government Reform Commission white papers (2024-2025)"

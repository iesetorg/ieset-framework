  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Minimum-wage and housing-package proposals."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Negotiated EUR 1,500 sectoral minimum wage tightened lower tier."}

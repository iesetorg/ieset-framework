movement_id: austria_kern_spo_2016_2017
status: candidate
name: "Kern SPOe-OeVP grand coalition 2016-2017"
countries: [AUT]
timeframe: {start: 2016, end: 2017, enacted_date: "2016-05-17"}
coalition: "SPOe-OeVP (continued)"
leaders:
  - "Christian Kern (Chancellor, SPOe, 2016-2017)"
  - "Reinhold Mitterlehner (Vice-Chancellor, OeVP, until May 2017)"
  - "Sebastian Kurz (Foreign Minister / OeVP chair from May 2017)"
doctrine: >
  Short-lived modernising SPOe leadership after Faymann's resignation.
  Economic school: Austrian social-democratic modernisation (OeBB-CEO
  background) — Plan A speech (Jan 2017) setting out investment,
  digitalisation and minimum-wage proposals. Signature achievements:
  Beschaeftigungsbonus (employment bonus subsidy July 2017), minimum
  wage EUR 1,500 negotiated 2017 via sectoral collective agreements,
  housing package. Kurz toppled Mitterlehner May 2017, triggering snap
  election October 2017 which OeVP-Kurz won. Left-right axis: centre-left.
  Dated policies: Plan A Jan 2017, Beschaeftigungsbonus July 2017.
  Popularity: personal approval high, SPOe electoral result Oct 2017
  however was 26.9% (second). Coherence: low — coalition paralysed by
  Kurz manoeuvring against Kern.
policies:
  - at_beschaeftigungsbonus_2017
  - at_plan_a_investment_package_2017

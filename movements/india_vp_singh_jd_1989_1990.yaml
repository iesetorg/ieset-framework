movement_id: india_vp_singh_jd_1989_1990
status: candidate
name: "V.P. Singh Janata Dal National Front minority (India)"
countries: [IND]
timeframe: {start: 1989, end: 1990}
coalition: "National Front (Janata Dal led) minority with BJP + Left outside support"
leaders:
  - "V.P. Singh (PM Dec 1989-Nov 1990)"
  - "Devi Lal (Deputy PM)"
  - "Madhu Dandavate (Finance Minister)"
  - "I.K. Gujral (External Affairs)"
doctrine: >
  V.P. Singh anti-corruption Janata Dal doctrine — socially-
  redistributive OBC-reservation politics within licence-raj economic
  frame, anti-Bofors anti-Congress platform. Economic school:
  developmentalist-redistributionist centre-left; fiscal drift with
  structural-crisis seeds that exploded mid-1991. Dated policies:
  Mandal Commission implementation announcement 7 Aug 1990 (27%
  reservation for Other Backward Classes in central government jobs
  per 1980 Mandal Report recommendations); loan waivers for farmers up
  to ₹10,000 Feb 1990 (Agricultural and Rural Debt Relief Scheme);
  petroleum/fertilizer subsidy drift; Advani's Rath Yatra Sep 1990
  triggering withdrawal of BJP support Oct 1990 over arrest at Samastipur.
  Left-right: centre-left with caste-redistributionist edge; economic
  policy-continuity with Rajiv-era drift rather than liberalisation.
  Popularity: Nov 1989 general election JD 17.8% / 143 seats, NF 142
  + outside support from BJP 85 + Left 52; Lok Sabha confidence vote
  lost 7 Nov 1990 after BJP withdrawal over Ayodhya. Coherence: low —
  Mandal announcement fractured coalition (Devi Lal vs V.P. Singh),
  BJP withdrawal over Ayodhya triggered Mandir-vs-Mandal polarisation
  that dominated 1990s politics.
policies:
  - in_mandal_commission_implementation_1990
  - in_farm_loan_waiver_1990
  - in_fiscal_drift_pre_1991_crisis
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Mandal reservations formalised caste-based affirmative action in central services; anti-defection/anti-corruption rhetoric but political instability."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Loan waivers + farm/fuel subsidies expanded transfer footprint ahead of BoP crisis."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Fiscal deficit drifted to 8.4% GDP 1990-91 — direct trigger of 1991 crisis."}

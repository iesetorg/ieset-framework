  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Voucher completion entrenched private ownership; weak corporate governance later exposed."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "ČNB independence law 1993 and 1997 float created autonomous inflation-targeting framework."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Klaus emphasised balanced budgets; deficit ~1-2% of GDP until 1997."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Capital-account liberalisation and bank privatisation (partial) advanced."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "OECD accession 1995, CEFTA founder, EU-association operational."}

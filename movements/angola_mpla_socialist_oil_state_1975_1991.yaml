# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: angola_mpla_socialist_oil_state_1975_1991
status: candidate
name: "MPLA socialist oil-war state"
countries: [AGO]
timeframe: {start: 1975, end: 1991}
coalition: "Movimento Popular de Libertacao de Angola (MPLA)"
leaders:
  - "Agostinho Neto"
  - "Jose Eduardo dos Santos"
doctrine: >
  The MPLA's first post-independence governing project joined Marxist-Leninist
  state-building, wartime centralisation, and reliance on offshore oil rents.
  It nationalised large parts of the colonial economy, used Sonangol and foreign
  operators to keep petroleum revenues flowing, and later moved toward market
  mechanisms as fiscal pressure and the end of the Cold War made the command
  model harder to sustain.
policies:
  - ao_nationalisations_state_economy_1976
  - ao_sonangol_oil_enclave_1976
  - ao_market_transition_reforms_1987_1991
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Early nationalisations and state ownership displaced private and expatriate ownership across major sectors."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Civil-war mobilisation and state-enterprise dominance expanded the fiscal role of the state."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Oil and strategic sectors operated through state control and concession gating."}
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: moderate, rationale: "Command-economy controls reduced openness early, while late-1980s reforms partially reopened market channels."}
  - {axis: regulatory.product_market_competition, direction: "mixed", magnitude: moderate, rationale: "Nationalisation suppressed competition, followed by partial liberalising reforms before the 1991 transition."}
position_alignments:
  - {position_id: marxist_leninist, alignment: aligned, notes: "The MPLA explicitly adopted Marxism-Leninism, single-party rule, nationalisations, and Soviet/Cuban-backed wartime state-building in this phase."}
  - {position_id: marxian, alignment: partially_aligned, notes: "Anti-colonial class and liberation framing aligned with Marxian analysis, while oil rents and civil-war survival shaped the actual political economy."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "State ownership, Sonangol, and infrastructure ambitions overlap with developmentalist state-building, but wartime command allocation and oil-enclave dependence dominate."}
references:
  - "Tony Hodges, Angola: Anatomy of an Oil State"
  - "Christine Messiant, Angola: the Challenge of Statehood"
  - "IMF, Angola country background papers on transition from central planning"
notes: "End date uses the 1991 Bicesse and constitutional transition boundary; the later MPLA oil state deserves a separate movement."

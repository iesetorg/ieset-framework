# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_cavaco_silva_psd_1985_1995
status: candidate
name: "Cavaco Silva PSD: IMF exit, EEC entry, liberalisations and privatisations"
countries: [PRT]
timeframe: {start: 1985, end: 1995}
coalition: "PSD minority (1985-1987) then PSD absolute majorities (1987-1991, 1991-1995)"
leaders:
  - "Aníbal Cavaco Silva (PM)"
  - "Miguel Cadilhe (Finance Minister 1985-1990)"
  - "Jorge Braga de Macedo (Finance Minister 1991-1993)"
  - "Eduardo Catroga (Finance Minister 1993-1995)"
  - "Mário Soares (President 1986-1996)"
doctrine: >
  Decade-defining PSD hegemony combining EEC accession (1986), IMF exit,
  constitutional revisions opening the way to privatisations, financial
  liberalisation, ESCUdo stabilisation and EMU convergence preparation.
  Economic school: classical-liberal / social-market with Rhineland
  accents — PSD defined itself as reformist centre-right combining
  market-opening with social-protection preservation. Left-right axis:
  centre-right. Key content: (i) EEC accession 1 January 1986 and
  structural-funds inflow; (ii) Constitutional Revision 1989 dropped
  socialist 'irreversibility' clause on nationalisations, enabling
  privatisation; Framework Law 11/90 for Privatisations;
  (iii) Privatisations 1989-1995 — Unicer beer 1989, Banco Totta & Açores
  1989, Banco Português do Atlântico 1990, Portugal Telecom preparation
  (1995 onwards), Petrogal, EDP preparation, Cimpor, tobacco Tabaqueira
  — ~30% of state enterprise divested; (iv) Auto-estradas / Brisa
  concession expansions as pioneer PPP tollways;
  (v) Escudo ERM entry 6 April 1992 at 6% band; devaluations November
  1992 and May 1993 (total -6.5% vs DM); (vi) Banco de Portugal partial
  independence Law 5/98 (later) — 1995 term had Carta preparing
  central-bank statute reform; (vii) VAT introduction 1986 on EEC entry
  at 17% standard; (viii) Labour code 1989 Código do Trabalho revision
  (Decree-Law 64-A/89); (ix) Infrastructure push — Vasco da Gama bridge
  construction 1995, Porto/Lisbon metro expansions; (x) Structural Funds
  first (CCS I 1989-1993) and second (CCS II 1994-1999) frameworks.
  Popularity: 1985 PSD 29.9% minority; 1987 PSD 50.2% / 148 seats
  (first absolute majority in post-Carnation democracy); 1991 PSD 50.6%
  / 135 seats (re-election); 1995 PSD 34.0% / 88 seats — lost to PS
  (Guterres 43.8% / 112 seats). Cavaco Silva ran for President 1996
  and lost to Sampaio, later elected President 2006. Coherence: very
  high — EEC structural-funds convergence + privatisation + ERM entry
  + infrastructure cohered into a single 'modernisation' doctrine
  credited with doubling Portuguese real GDP in a decade.
policies:
  - portugal_eec_accession_1986
  - portugal_vat_introduction_1986
  - portugal_constitutional_revision_privatisation_1989
  - portugal_privatisations_framework_1990_1995
  - portugal_escudo_erm_entry_1992
  - portugal_labour_code_revision_1989
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Privatisations 1989-95 plus EEC-driven market-opening."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "EEC accession 1986 — free trade, structural funds."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Structural Funds inflow (CCS I and II) financed large sectoral investment."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "ERM entry + ESCB preparation; full independence finalised post-term."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Structural-funds-supported investment raised spending share modestly."}
predecessor_movements: [portugal_carnation_revolution_1974_1986]

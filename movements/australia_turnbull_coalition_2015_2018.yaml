movement_id: australia_turnbull_coalition_2015_2018
status: candidate
name: "Turnbull Liberal-National Coalition — small-l liberal reformer constrained 2015-2018"
countries: [AUS]
timeframe: {start: 2015, end: 2018, enacted_date: "2015-09-15"}
coalition: "Liberal Party of Australia - Nationals Coalition (Turnbull ministry, from 15 September 2015 after leadership spill against Tony Abbott)"
leaders:
  - "Malcolm Turnbull (Prime Minister, 15 Sep 2015 - 24 Aug 2018)"
  - "Scott Morrison (Treasurer)"
  - "Mathias Cormann (Finance)"
  - "Julie Bishop (Foreign Affairs)"
  - "Philip Lowe (RBA Governor, from September 2016)"
doctrine: >
  Liberal small-l progressive reformer brand — innovation, agility, and
  market-liberal economic reform — constrained throughout by the Coalition's
  socially-conservative wing and by a one-seat majority after the July 2016
  double-dissolution election. Left-right axis: centre-right on economics
  with a moderate-liberal cultural frame, the most openly centrist
  Coalition leadership of the post-Howard period; governed from a narrower
  policy space than either the doctrine or Turnbull's prior reputation
  implied. Key policy content: (i) Enterprise Tax Plan — ten-year corporate-
  tax-cut glide path to 25% for all companies, introduced 2016; Senate
  passed only the small-business (turnover <A$50m) component May 2017,
  full package abandoned August 2018 ahead of the leadership spill;
  (ii) Snowy 2.0 pumped-hydro expansion approved in principle March 2017
  and funded through Snowy Hydro Limited recapitalisation; (iii) National
  Energy Guarantee developed through 2017-18 as a reliability-plus-emissions
  mechanism for the NEM, withdrawn August 2018 and triggering the
  leadership spill that removed Turnbull; (iv) same-sex marriage postal
  survey held September-November 2017 (61.6% Yes) leading to Marriage
  Amendment (Definition and Religious Freedoms) Act 8 December 2017;
  (v) Royal Commission into Misconduct in the Banking, Superannuation and
  Financial Services Industry established 14 December 2017 after Coalition
  party-room reversal, reporting under successor Morrison government
  February 2019; (vi) Personal Income Tax Plan May 2018 budget — legislated
  the seven-year Stage-1/2/3 tax cut package that Labor later partly
  undid; (vii) Medium- and Long-Term Population Plan maintaining high
  permanent migration (~190,000/year); (viii) National Disability Insurance
  Scheme rollout continued; (ix) Western Sydney Airport approved May 2017;
  (x) foreign-political-donation and foreign-influence transparency
  legislation enacted June-December 2018. Popularity trajectory: Turnbull
  entered with ~60% preferred-PM rating; Coalition won July 2016 double-
  dissolution election 76/150 seats (one-seat majority) on 42.0% primary;
  lost 38 consecutive Newspolls (the threshold Turnbull himself had used to
  challenge Abbott); removed in Liberal-party spill 24 August 2018 by
  Scott Morrison after Peter Dutton challenge. Coherence line: centre-right
  reformer throttled by party-room conservatives and a one-seat Senate
  arithmetic — "market-liberal rhetoric, incremental delivery".
policies:
  - au_enterprise_tax_plan_2016
  - au_snowy_2_0_approval_2017
  - au_same_sex_marriage_postal_survey_2017
  - au_banking_royal_commission_2017
  - au_personal_income_tax_plan_2018
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Small-business component of Enterprise Tax Plan passed May 2017 (turnover <A$50m to 25%); full 10-year glide path blocked in Senate."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Personal Income Tax Plan legislated Stage-1/2/3 cuts flattening the income-tax schedule through 2024-25."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "Snowy 2.0 pumped-hydro recapitalisation of Snowy Hydro Limited; no broader industrial-policy turn."}
  - {axis: regulatory.environmental_stringency, direction: "0", magnitude: weak, rationale: "NEG developed but withdrawn August 2018; Paris target of 26-28% by 2030 formalised but without binding domestic mechanism."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Banking Royal Commission established December 2017 after Coalition party-room reversal; bank major-bank levy introduced May 2017."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Foreign-donation and foreign-influence transparency legislation passed June-December 2018; same-sex marriage recognised via statute December 2017."}
  - {axis: regulatory.immigration_openness, direction: "0", magnitude: weak, rationale: "Permanent-migration ceiling held at 190,000; 457 skilled-visa replaced by stricter TSS visa 2018."}
successor_movements:
  - australia_morrison_coalition_2018_2022
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Corporate-tax-cut glide path and personal tax cuts welcomed; delivery throttled by Senate and conservative wing."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "NEG design widely cited as evidence-led NEM reliability-plus-emissions architecture."}
  - {position_id: social_democratic, alignment: opposed}
  - {position_id: austrian, alignment: partially_aligned, notes: "Deregulatory tax-cut direction welcomed; Snowy 2.0 recapitalisation criticised as state-enterprise expansion."}
references:

  - "Marriage Amendment (Definition and Religious Freedoms) Act 2017"
  - "Letters Patent — Royal Commission into Misconduct in the Banking, Superannuation and Financial Services Industry, 14 December 2017"
  - "Treasury Laws Amendment (Personal Income Tax Plan) Act 2018"
  - "Snowy 2.0 Feasibility Study — Snowy Hydro Limited, December 2017"
notes: >
  Canonical case of a stated small-l liberal reform doctrine throttled
  by party-room veto points; useful for hypotheses on intra-coalition
  veto-player effects on delivery.

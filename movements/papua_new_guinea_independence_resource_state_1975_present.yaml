# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: papua_new_guinea_independence_resource_state_1975_present
status: candidate
name: "Papua New Guinea independence resource-state governance (1975-present)"
countries: [PNG]
timeframe: {start: 1975, end: ongoing}
coalition: "Post-independence parliamentary governments"
leaders:
  - "Michael Somare"
  - "Julius Chan"
  - "Peter O'Neill"
  - "James Marape"
doctrine: >
  Post-independence parliamentary resource-state model in which a fragmented
  party system, provincial autonomy, customary land tenure, and large mining,
  petroleum, and LNG projects shape state capacity. The movement combines
  democratic constitutional continuity with weak administrative reach, negotiated
  resource concessions, landowner-benefit systems, and recurring fiscal exposure
  to commodity cycles.
policies:
  - png_independence_constitution_1975
  - png_mining_act_1992
  - png_lng_project_agreement_2008
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Constitutional democracy persisted, but enforcement and administrative capacity are uneven."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, rationale: "Customary land rights are recognised, while resource projects depend on complex state-landowner-company bargains."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Mining, petroleum, and LNG development proceed through negotiated licences and project agreements."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "Resource deals include tax concessions, infrastructure commitments, and benefit-sharing arrangements."}
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "World Bank, Papua New Guinea economic updates"
  - "IMF Papua New Guinea Article IV reports"
  - "PNG Constitution 1975"
notes: "Bougainville crisis, fiscal-resource cycles, and LNG boom can be split into narrower movements later."

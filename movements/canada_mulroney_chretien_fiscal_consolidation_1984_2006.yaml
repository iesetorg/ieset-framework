# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: canada_mulroney_chretien_fiscal_consolidation_1984_2006
status: candidate
name: "Canada Mulroney-Chrétien fiscal consolidation + trade opening"
countries: [CAN]
timeframe: {start: 1984, end: 2006}
coalition: "Progressive Conservative (Mulroney 1984-1993) then Liberal (Chrétien 1993-2003, Martin 2003-2006)"
leaders:
  - "Brian Mulroney (PM 1984-1993)"
  - "Michael Wilson (Finance 1984-1991)"
  - "Jean Chrétien (PM 1993-2003)"
  - "Paul Martin (Finance 1993-2002, PM 2003-2006)"
  - "David Dodge (Finance DM, later BoC Governor 2001-2008)"
doctrine: >
  Cross-party multi-decade consolidation with two phases. Mulroney phase
  (1984-1993): Canada-US Free Trade Agreement 1988 (CUSFTA), replaced by
  NAFTA effective 1 January 1994; replacement of the Manufacturers' Sales
  Tax with the federal Goods and Services Tax (GST) at 7% in January 1991;
  partial privatisation of Air Canada (1988-89), Petro-Canada (1991+), and
  CN Rail (1995 under Chrétien); Bank of Canada inflation-targeting regime
  adopted February 1991 (1-3% range, then 1-3% midpoint 2%). Chrétien-
  Martin phase (1993-2006): structural fiscal consolidation in response to
  the 1995 Wall Street Journal 'honorary member of the Third World' moment
  and near-downgrade; Program Review 1994-95 cut federal programme spending
  from 16% to 12% of GDP over four years; Canada Health and Social Transfer
  block grant reform 1996; CPP sustainability reform 1997-98 pre-funding
  contributions; federal budget balanced 1997-98 and in surplus every year
  through 2007-08. Stated case: restore fiscal credibility, integrate with
  US market, price-stability mandate. Canada outperformed G7 growth and
  debt/GDP trajectories 1997-2007.
policies:
  - canada_cusfta_1988
  - canada_nafta_accession_1994
  - canada_gst_1991
  - canada_boc_inflation_targeting_1991
  - canada_program_review_1995
  - canada_cpp_reform_1997
  - canada_privatisations_1988_1995
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Program Review cut programme spending ~4 points of GDP 1994-1998; sustained surpluses through 2007."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "CUSFTA 1988 + NAFTA 1994 structurally bound Canadian economy to US."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Crown-corporation privatisations (Air Canada, Petro-Canada, CN Rail)."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Formal inflation-targeting regime from 1991; Bank of Canada operational independence codified."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Shift from manufacturers' tax + income tax reliance toward GST consumption base."}
outcome_hypotheses: [fiscal_consolidation_growth_effect, inflation_targeting_regime_credibility]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Rule-based macro framework (inflation target + fiscal anchor)."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Chrétien-Martin consolidation executed with evidence-based programme review; widely studied case."}
  - {position_id: chicago_monetarism, alignment: partially_aligned}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Inflation-targeting framework congruent with NK monetary thinking."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Sustained primary surpluses and transfer cuts at odds with functional finance view."}
references:
  - "Canada-United States Free Trade Agreement 1988"
  - "North American Free Trade Agreement 1994"
  - "Excise Tax Act — GST provisions (1990 amendment), effective 1 Jan 1991"
  - "Bank of Canada / Government of Canada Joint Statement on Inflation-Control Targets, 26 Feb 1991"
  - "Canada Budget 1995 (Martin) — Program Review"
  - "Canada Pension Plan Amendment 1997"
  - "Kneebone & McKenzie (1999) 'Canadian Fiscal Adjustments' IMF WP"
  - "Ragan & Watson eds. (2004), Is the Debt War Over?"

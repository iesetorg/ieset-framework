doctrine: >
  Medgyessy MSZP-SZDSZ 100-day-package government — launched with a
  large public-sector pay rise (50% for state employees), pension
  supplement (13th-month pension), and housing-loan subsidy expansion,
  engineered around the EU-accession referendum. Economic school:
  Hungarian expansionary social democratic — countercyclical fiscal
  expansion colliding with Maastricht convergence targets, starting the
  fiscal-deficit trajectory that would force the 2006-2009 austerity.
  Left-right axis: centre-left. Dated policies: 100-day package
  (June-Aug 2002), EU accession referendum (12 April 2003, 83.76% YES
  on 45.62% turnout), EU accession 1 May 2004, D-209 agent scandal (June
  2002, revealed Medgyessy's III/II counter-intelligence past).
  Popularity: won 2002 election 42.05% but approval collapsed; Medgyessy
  resigned 25 Aug 2004 under SZDSZ pressure, replaced by Gyurcsany.
  Coherence: low — D-209 scandal plus expansionary fiscal clash with
  SZDSZ liberal partner.

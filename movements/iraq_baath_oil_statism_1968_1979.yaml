# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: iraq_baath_oil_statism_1968_1979
status: candidate
name: "Iraq Ba'ath oil-nationalisation and statist development"
countries: [IRQ]
timeframe: {start: 1968, end: 1979}
coalition: "Arab Socialist Ba'ath Party government under Ahmed Hassan al-Bakr and Saddam Hussein"
leaders:
  - "Ahmed Hassan al-Bakr (President 1968-1979)"
  - "Saddam Hussein (Vice Chairman of the Revolutionary Command Council; President from 1979)"
doctrine: >
  The Iraqi Ba'ath regime that took power in 1968 built a centralised Arab
  socialist state around oil sovereignty, land reform, public-sector industry,
  mass education, and party-security control. Its governing claim was that
  nationalisation and planning would convert petroleum rents into independent
  development and social mobility while subordinating private capital and
  political pluralism to the revolutionary state.
policies:
  - irq_ipc_nationalisation_1972
  - irq_baath_land_reform_1970
  - irq_oil_boom_development_plan_1976_1980
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Oil nationalisation and land redistribution sharply increased state claims over assets."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "State enterprises and planning dominated oil, industry, and much of formal economic activity."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Oil revenue financed large public investment, education, health, and public employment expansion."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Development plans directed oil rents into selected heavy industry, infrastructure, and agriculture."}
position_alignments:
- position_id: developmentalism
  alignment: aligned
  notes: Oil nationalisation funded state plans, public investment, education, health, and industrial development under a state-led growth model.
- position_id: marxian
  alignment: partially_aligned
  notes: Ba'athist Arab socialism used anti-capitalist and class-inflected language, but it was nationalist and party-statist rather than orthodox Marxism.
- position_id: marxist_leninist
  alignment: partially_aligned
  notes: Single-party rule, planning, and public ownership overlap with Marxist-Leninist state forms, though Ba'ath ideology was Arab nationalist rather than Leninist.

references:
  - "Tripp (2007), A History of Iraq"
  - "Batatu (1978), The Old Social Classes and the Revolutionary Movements of Iraq"
  - "Farouk-Sluglett and Sluglett (2001), Iraq Since 1958"
notes: "This record ends before the Iran-Iraq War because wartime command mobilisation after 1980 deserves a separate policy-regime treatment."

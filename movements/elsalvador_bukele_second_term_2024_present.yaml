# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: elsalvador_bukele_second_term_2024_present
status: candidate
name: "Bukele second-term Nuevas Ideas consolidation (El Salvador)"
countries: [SLV]
timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-06-01"
coalition: "Nuevas Ideas supermajority (56/60 Legislative Assembly seats after Feb 2024 election) plus GANA and PCN minor allies; Constitutional Chamber and Attorney General aligned with executive after May 2021 purge."
leaders:
  - "Nayib Bukele (President, second term 2024-present)"
  - "Félix Ulloa (Vice President)"
  - "Jerson Posada (Finance Minister)"
  - "Alejandro Zelaya (Finance Minister early 2024)"
  - "Douglas Rodríguez (BCR Governor)"
  - "Gustavo Villatoro (Security Minister)"
  - "Héctor Gustavo Villatoro (Justice & Public Security)"
  - "Alejandro Gutman / Stacy Herbert (Bitcoin Office / National Bitcoin Office)"
doctrine: >
  Nuevas Ideas millennial-authoritarian reformist populism fusing
  aggressive crime-crackdown (continuous state-of-exception since
  Mar 27 2022, CECOT mega-prison operational since Jan 2023,
  ~85,000 alleged gang-affiliates detained under régimen de
  excepción) with a bitcoin-libertarian monetary identity (Bitcoin
  Law 2021 retained on the books after formal removal from
  legal-tender status under the IMF Extended Fund Facility
  condition in Dec 2024, Digital Asset Issuance Law 2023, Bitcoin
  Office stacking treasury sats), fiscal-tightening via the 2023
  bond-buyback / liability-management operations and 2023 tax-
  reform lowering personal and corporate burdens while broadening
  the base, and institutional capture via the Sep 3 2021
  Constitutional Chamber self-re-election ruling bypassing the
  term-limit ban, the May 1 2021 overnight removal of the
  Constitutional Chamber magistrates and Attorney General Raúl
  Melara, and the Jun 2021 termination of the CICIES anti-
  corruption agreement with the OAS. Ideologically heterodox: the
  movement is right-authoritarian on rule-of-law, security, and
  migration but statist-libertarian on money (sovereign bitcoin
  adoption, low-regulation crypto hub ambitions) and pragmatic-
  orthodox on fiscal consolidation and IMF engagement. The Feb
  4 2024 runoff produced 84.65% for Bukele personally and 56/60
  seats for Nuevas Ideas on a homicide-rate collapse from 103/100k
  (2015) to 2.4/100k (2023) — among the lowest in the Americas —
  that the coalition attributes to Plan Control Territorial,
  régimen de excepción, and CECOT. Approval polling 80-90%
  sustained (CID Gallup, LPG Datos, Francisco Gavidia 2022-2025).
  The IESET coding separates genuine market-and-security-content
  reforms from the institutional-quality deterioration on rule-of-
  law, judicial independence, and press freedom, per Invariant 3.
  Dec 2024 IMF $1.4bn Extended Fund Facility conditioned on
  Bitcoin-legal-tender removal, public-sector bitcoin-purchase
  constraints, and fiscal primary-balance targets.
policies:
  - sv_state_of_exception_2022
  - sv_cecot_mega_prison_2023
  - sv_bitcoin_legal_tender_2021
  - sv_bitcoin_removal_imf_2024
  - sv_digital_asset_issuance_law_2023
  - sv_tax_reform_2023
  - sv_bond_buyback_2023
  - sv_municipal_consolidation_262_to_44_2023
  - sv_ley_fomento_tecnologia_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "State-of-exception continuous monthly renewal since Mar 2022 suspending due-process guarantees; ~85,000 administrative detentions; press and civil-society harassment."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Constitutional Chamber self-re-election ruling Sep 3 2021 bypassing term-limit ban; prior May 1 2021 overnight magistrate removal."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "2023 tax-reform package lowered corporate and personal income tax burdens while broadening base."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "IMF EFF-conditioned primary-balance targets; bond buyback reduced debt service."}
  - {axis: monetary.monetary_expansion_direction, direction: "0", magnitude: weak, rationale: "Dollarised economy since 2001; Bitcoin legal tender 2021-2024 was parallel currency, not a supply expansion; removed from legal tender Dec 2024 under IMF condition."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Digital Asset Issuance Law 2023 creates permissive crypto-issuance regime; Bitcoin Office and Ley de Fomento a la Tecnología de Información incentives."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Tech-incentive regime and FDI-promotion measures lowered entry barriers for select sectors."}
outcome_hypotheses:
  - bukele_mass_incarceration_homicide_impact_2019_2024
  - bitcoin_legal_tender_remittance_adoption_2021_2024
  - bukele_fiscal_trajectory_tax_cuts_imf_2019_2024
  - bukele_fdi_gdp_investment_climate_2019_2024
predecessor_movements:
  - elsalvador_bukele_first_term_2019_2024
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Pro-market fiscal and tech content; opposed on rule-of-law and due-process grounds."}
  - {position_id: institutionalism, alignment: opposed, notes: "Democratic-backsliding and term-limit-bypass heavily criticised."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Bitcoin-monetary content aligned; statist security apparatus opposed."}
references:
  - "TSE El Salvador Resultados Elecciones 2024"
  - "IMF Country Report No. 25/XX Extended Fund Facility (Dec 2024)"
  - "Decreto Legislativo N° 333 Régimen de Excepción (27 Mar 2022)"
  - "Ley Bitcoin Decreto N° 57 (9 Jun 2021)"
  - "Ley de Emisión de Activos Digitales (Digital Asset Issuance Law 2023)"
  - "Ley de Fomento a la Innovación y Manufactura de Tecnologías de Información (2023)"
  - "Sala de lo Constitucional Sentencia 1-2021 (3 Sep 2021)"
  - "CID Gallup, LPG Datos approval series 2022-2025"
notes: >
  Ongoing movement; framework updates codings as 2025-2026 EFF
  review outcomes, homicide series persistence, and FDI trajectory
  materialise. Coding separates security-and-fiscal content from
  institutional-quality deterioration per Invariant 3.

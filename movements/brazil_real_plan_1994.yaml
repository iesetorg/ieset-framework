# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: brazil_real_plan_1994
status: candidate
name: "Plano Real stabilisation and Cardoso reforms (Brazil)"
countries: [BRA]
timeframe: {start: 1993, end: 2002}
coalition: "Itamar Franco transition → PSDB under Cardoso with PFL coalition"
leaders:
  - "Fernando Henrique Cardoso (Finance Minister 1993-1994, President 1995-2002)"
  - "Pedro Malan (Finance Minister 1995-2002)"
  - "Gustavo Franco (Central Bank President 1997-1999)"
  - "Armínio Fraga (Central Bank President 1999-2002)"
doctrine: >
  Three-stage stabilisation program designed to end the chronic high
  inflation that had persisted since the 1980s (peaking above 2,400%
  annual in 1993). Stage one was fiscal: the Emergency Social Fund and
  de-earmarking to achieve a plausible primary balance. Stage two was
  the Unidade Real de Valor (URV) from March 1994, a parallel accounting
  unit that re-synchronised relative prices without triggering an
  inflationary burst. Stage three was the introduction of the real as
  legal tender on 1 July 1994 at a 1:1 anchor to the dollar with a
  crawling band. Supporting reforms included large-scale privatisations
  (Telebrás 1998, steel, electricity distribution), the 1995
  constitutional amendments permitting foreign participation in
  telecoms, mining and oil, pension reform 1998, and the 2000 Fiscal
  Responsibility Law imposing hard budget constraints on sub-national
  governments. The 1998-1999 external crisis forced abandonment of the
  crawling peg and adoption of inflation targeting plus a floating
  exchange rate from January 1999, which became the durable
  macroeconomic framework. Inflation fell from triple digits to single
  digits within a year and remained contained. The stabilisation
  succeeded where multiple 1980s heterodox plans (Cruzado, Bresser,
  Verão, Collor I and II) had failed.
policies:
  - brazil_urv_1994
  - brazil_real_introduction_1994
  - brazil_privatisations_1995_2002
  - brazil_fiscal_responsibility_law_2000
  - brazil_inflation_targeting_regime_1999
  - brazil_telecom_reform_1995_1998
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Inflation-targeting regime from 1999 with operational autonomy; URV and real design insulated monetary anchor."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Fiscal Responsibility Law 2000 bound sub-nationals; primary surplus discipline entrenched."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Large-scale privatisation of telecoms, electricity, mining (CVRD 1997); constitutional amendments opened sectors."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Continuation of Collor-era tariff reduction; Mercosur deepening."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Proer/Proes bank resolution programmes restructured the banking system and opened to foreign entry."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Fiscal Responsibility Law and contract-enforcement reforms strengthened predictable rules."}
outcome_hypotheses:
  - hyperinflation_requires_fiscal_dominance
  - exchange_rate_regime_choice_and_crisis_vulnerability
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Inflation-targeting plus floating from 1999 is a canonical implementation."}
  - {position_id: chicago_monetarism, alignment: partially_aligned}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Fiscal Responsibility Law as rule-based constraint."}
references:
  - "Lei Complementar 101/2000 (Lei de Responsabilidade Fiscal)"
  - "Bacha (2003), Brazil's Plano Real: A View from the Inside"
  - "Franco (1995), O Plano Real e Outros Ensaios"
  - "IMF Article IV Brazil 1996, 1999, 2001"
notes: >
  Includes both the 1994 stabilisation (Itamar/Cardoso as Finance
  Minister) and the Cardoso presidency reforms through 2002 because
  the programme is continuous. 1999 regime switch from peg to float
  is the principal structural break within the period.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: philippines_marcos_jr_2022_present
status: candidate
name: "Philippines Marcos Jr restoration (Bongbong)"
countries: [PHL]
timeframe: {start: 2022, end: ongoing, enacted_date: "2022-06-30"}
coalition: "Uniteam / Partido Federal ng Pilipinas + Lakas-CMD + allied blocs (with Sara Duterte-Carpio VP until mid-2024 rift)"
leaders: ["Ferdinand 'Bongbong' Marcos Jr. (President, 2022-)", "Sara Duterte-Carpio (VP, 2022-; impeached Feb 2025)", "Benjamin Diokno / Ralph Recto (Finance)", "Enrique Manalo / Theresa Lazaro (Foreign Affairs)"]
doctrine: >
  Pragmatic centre-right Marcos restoration presenting itself as a
  continuity-plus-competence project. Economic programme is broadly
  market-oriented macro-orthodoxy — inflation targeting under BSP
  Governor Remolona, fiscal consolidation via a Medium-Term Fiscal
  Framework, and continued Duterte-era CREATE corporate tax schedule
  — paired with an activist state in infrastructure and industrial
  policy through the Maharlika Investment Fund (sovereign wealth
  vehicle enacted July 2023, capitalised ₱500bn / ~$9bn from
  Landbank, DBP and BSP dividends) and a "Build Better More" infra
  pipeline largely continuing Duterte's "Build Build Build". On
  foreign policy the administration has sharply re-anchored to the US
  alliance — expanded Enhanced Defence Cooperation Agreement sites
  from 5 to 9 (Apr 2023), trilateral Japan-US-Philippines summit
  (Apr 2024), and a harder public line on the West Philippine Sea
  against PRC grey-zone operations — while preserving trade ties
  (RCEP ratification Feb 2023, Luzon Economic Corridor announced
  Apr 2024). Domestically the restoration is contested: ICC probe
  into the Duterte drug war proceeded (Duterte Sr. arrested Mar 2025
  and transferred to The Hague), the Marcos-Duterte alliance
  fractured, and the May 2025 midterms produced a split Senate.
policies: [ph_maharlika_sovereign_wealth_fund_2023, ph_rcep_ratification_2023, ph_luzon_economic_corridor_2024, ph_edca_expansion_2023]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Maharlika vehicle channels public capital into infrastructure and strategic sectors; continuation of Build Better More pipeline."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "RCEP ratification Feb 2023 after long Senate hold; continued tariff schedules under CREATE; Luzon Economic Corridor as G7-backed investment channel."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No major liberalisation beyond inherited Public Services Act amendments; sectoral FDI caps further eased only at margins."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Cooperation with ICC probe (transfer of Duterte Sr. Mar 2025) and restored posture of prosecutorial independence, though selective; Quiboloy prosecution pursued."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: weak, rationale: "Nuclear revival studies (Bataan NPP recommissioning review), LNG import terminals, renewable-energy FDI cap lift carried forward from 2022."}
notes: >
  Voter mandate: 31.6 million votes (58.8%) in the May 2022 election,
  the largest plurality since the 1986 restoration of democracy —
  with running mate Sara Duterte-Carpio winning the vice presidency
  on 61.5%. Uniteam commanded both chambers of the 19th Congress
  (House supermajority ~85%+ via PFP/Lakas/NPC/NUP bloc; Senate ~17
  of 24 aligned). Approval tracked by Pulse Asia ran 65-80% through
  2023-24, softening to high-50s by early 2025 amid Duterte rift and
  impeachment of VP Sara. May 2025 midterms returned a more divided
  Senate (Marcos-bloc ~6 new, Duterte-bloc ~5, opposition ~1).
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Macro orthodoxy and trade openness yes; Maharlika fund and dynastic governance no."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Maharlika + Build Better More echo a directed-investment template, without the East Asian performance-discipline apparatus."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Restored formal cooperation with the ICC and the bureaucracy, but dynastic capture and 1986-era unresolved plunder cases constrain the claim."}
references:

  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Aligned on trade/privatisation; opposed to asset freeze."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Impeachment process validated institutional capacity."}
references:

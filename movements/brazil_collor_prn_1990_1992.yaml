movement_id: brazil_collor_prn_1990_1992
status: candidate
name: "Collor PRN — Plano Collor, liberalisation, impeachment"
countries: [BRA]
timeframe: {start: 1990, end: 1992, enacted_date: "1990-03-15"}
coalition: "Partido da Reconstrução Nacional (PRN) — first directly elected president since 1960"
leaders:
  - "Fernando Collor de Mello (President 1990-1992, impeached)"
  - "Zélia Cardoso de Mello (Economia 1990-1991)"
  - "Marcílio Marques Moreira (Economia 1991-1992)"
  - "Ibrahim Eris (BCB)"
doctrine: >
  First post-transition directly-elected administration that
  combined radical monetary shock with Brazil's initial
  liberalisation episode. Five doctrinal pillars: (a) Plano
  Collor I (16 March 1990) — blocked 80% of private-sector
  financial assets (~$100B, ~30% M4) in 18-month frozen cruzado
  accounts at Banco Central, replaced cruzado novo with cruzeiro
  at 1:1, wage-price controls, monetary monoexpansion reversed;
  highest-confiscation orthodox-heterodox hybrid in democratic
  Latin American history. (b) Plano Collor II (January 1991) —
  renewed freeze after first plan unravelled. (c) Abertura
  Comercial — unilateral tariff reduction from average ~32.2%
  (1990) to ~14.2% (1993); abolition of non-tariff barriers;
  end of informatics-sector reserve; creation of Programa
  Nacional de Desestatização (PND) — first privatisations of
  Usiminas (October 1991) and others. (d) Mercosur founding —
  Treaty of Asunción 26 March 1991 with Argentina, Paraguay,
  Uruguay. (e) Corruption crisis — PC Farias scheme exposed
  May 1992; impeachment vote Chamber 441-38 on 29 September
  1992; Collor resigned 29 December 1992 minutes before Senate
  trial; Senate removed and disqualified him for 8 years.
  Stated school: Washington-Consensus liberalisation + neo-populist
  anti-establishment appeal. Left-right: centre-right economic,
  populist-moralist campaign posture ("caçador de marajás").
  Popularity: December 1989 runoff 53% vs Lula 47% (first
  universal-suffrage presidential vote since 1960); approval
  collapsed from ~70% at inauguration to <10% by impeachment;
  PRN held <5% congressional seats meaning the doctrine lacked
  legislative base. Coherence: trade savings-confiscation
  political capital and impeachment survival for liberalisation
  framework (Mercosur, abertura, PND) that outlasted him under
  Itamar-FHC.
policies:
  - br_plano_collor_asset_freeze_1990
  - br_abertura_comercial_1990_1993
  - br_pnd_privatisation_1990
  - br_mercosur_treaty_asuncion_1991
  - br_collor_impeachment_1992
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Average tariff 32%→14%; NTBs abolished; informatics reserve ended."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "PND launched with Usiminas sale; Mercosur."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Plano Collor I asset freeze is the sharpest financial-rights abrogation by a democratic LatAm government."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Asset freeze reduced private financial-property security."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Constitutional impeachment worked as designed; peaceful removal."}
outcome_hypotheses: [asset_freeze_stabilisation_cost, trade_liberalisation_productivity_effect]
predecessor_movements: [brazil_sarney_pmdb_1985_1990]
successor_movements: [brazil_itamar_pmdb_1992_1995]
position_alignments:

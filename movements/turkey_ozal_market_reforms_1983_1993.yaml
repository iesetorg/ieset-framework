movement_id: turkey_ozal_market_reforms_1983_1993
status: candidate
name: "Özal market liberalisation (Turkey)"
countries: [TUR]
timeframe: {start: 1983, end: 1993}
coalition: "Motherland Party (ANAP)"
leaders:
  - "Turgut Özal (PM 1983-1989, President 1989-1993)"
doctrine: >
  Break from the import-substituting, statist, multiple-exchange-rate regime
  that had produced the 1977-1980 balance-of-payments crisis. The 24 January
  1980 stabilisation programme — designed by Özal as Demirel's deputy PM and
  continued under the 1980-1983 military government — unified the exchange
  rate, liberalised import licensing, and introduced positive real interest
  rates. From 1983 under ANAP the programme widened: export subsidies and
  tax rebates, current-account convertibility (1984), capital-account
  liberalisation (1989 Decree 32), creation of the Istanbul Stock Exchange
  (1986), VAT introduction (1985), legalisation of interest-free (Islamic)
  "special finance houses" (1983), and reduction of state-enterprise
  dominance. Fiscal discipline was weaker than the monetary reforms suggested:
  populist spending ahead of 1987 and 1991 elections produced recurring
  inflation (60-70% range) and set up the 1994 crisis under Çiller. Outcome:
  structural trade orientation shifted from import-substitution to
  export-led, with exports rising from ~4% of GDP in 1980 to ~14% by 1993.
policies:
  - turkey_24_january_1980_programme
  - turkey_export_promotion_regime_1980_1988
  - turkey_capital_account_liberalisation_1989
  - turkey_vat_introduction_1985
  - turkey_islamic_banking_legalisation_1983
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Unified FX, import licensing dismantled, export-incentive regime; trade/GDP roughly doubled."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Capital account opening 1989 + ISE creation + Islamic banking legalisation. Note axis semantic: '-' = looser regulation, the direction of this movement."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "SOE share reduced; entry easier; privatisation programme slow in practice."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Pre-election fiscal cycles; public-sector borrowing requirement remained high despite VAT revenues."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Persistent 60-70% inflation through the period; central bank financed deficit."}
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Trade and FX liberalisation aligned; fiscal/monetary discipline did not follow through."}
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Export-promotion pattern with subsidy incentives resembles East Asian template."}
references:
  - "Öniş (2004), 'Turgut Özal and his Economic Legacy', Middle Eastern Studies 40(4)"
  - "Aricanli & Rodrik (1990), 'An Overview of Turkey's Experience with Economic Liberalization and Structural Adjustment'"
  - "Celasun & Rodrik (1989), 'Debt, Adjustment, and Growth: Turkey'"
notes: "Pre-1996 sample extension. 1994 crisis attributable to continued fiscal slippage post-Özal; boundary case of half-completed reform."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: greece_karamanlis_nd_1974_1980
status: candidate
name: "Karamanlis New Democracy (Greece): Metapolitefsi stabilisation and EEC accession"
countries: [GRC]
timeframe: {start: 1974, end: 1980}
coalition: "Nea Dimokratia (ND) majority"
leaders:
  - "Konstantinos Karamanlis (PM, 24 July 1974 - 10 May 1980; President 1980-1985)"
  - "Ioannis Boutos (Finance)"
  - "Xenophon Zolotas (Bank of Greece Governor 1944-1945, 1955-1967, 1974-1981)"
  - "Konstantinos Mitsotakis (Economics 1978-1980)"
doctrine: >
  Christian-democratic-conservative stabilisation of the Greek post-junta
  democracy combined with EEC-accession-driven economic-institutional
  modernisation. Economic school: conservative-centre-right ND emerged
  from Karamanlis's ERE tradition (1956-1963 premierships) — closer to
  Christian-democratic European mainstream than to Anglo-American supply-
  side; dirigiste elements in industrial policy retained. Left-right
  axis: centre-right, with strong European-orientation commitments;
  economically more moderate than PASOK-critique would later suggest.
  Content: (i) 1974 legalisation of KKE (Communist Party) and political
  liberalisation; (ii) 1975 Constitution (11 June 1975) — parliamentary
  republic with strong presidency; (iii) 1974 referendum abolished
  monarchy (69.2% republic); (iv) EEC accession negotiations opened
  1975, Treaty of Accession signed 28 May 1979, entry 1 January 1981;
  (v) 1975-1976 banking and securities reforms — Hellenic Capital
  Market Committee foundation preparation; (vi) 1975 Article 106
  constitutional framework legitimising state-enterprise expansion
  alongside private property; (vii) Olympic Airways, DEH (electricity),
  OTE (telecoms) state monopolies consolidated; (viii) NATO re-entry
  (Greece had withdrawn military command after 1974 Cyprus crisis) —
  full reintegration 1980; (ix) 1975 labour-law framework; (x) Karamanlis
  elevated to presidency 1980 (indirect election) allowing Rallis
  transition. Popularity: 17 November 1974 election ND 54.4% (220 of
  300 seats) — landslide; 20 November 1977 election ND 41.8% (171 of
  300 seats) — retained majority with 'Centre Union' and PASOK rising
  as main alternative. Coherence: programme was coherent — democratic
  consolidation + EEC anchoring + modernisation of banking and trade
  institutions — and institutionally durable (1975 Constitution still
  in force with amendments); the movement completed Metapolitefsi and
  handed the baton to Rallis's 1980-81 caretaker, then PASOK.
policies:
  - greece_1975_constitution
  - greece_eec_accession_negotiation_1975_1979
  - greece_kke_legalisation_1974
  - greece_nato_reintegration_1974_1980
  - greece_state_enterprise_consolidation_1975
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "1975 Constitution + legalisation of KKE + democratic consolidation post-junta."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "EEC accession negotiations and 1981 entry commitment."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State monopolies DEH, OTE, Olympic consolidated."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Public-sector expansion under recovery from junta-era compressed state; debt still low."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Constitutional Court equivalent (Συμβούλιο της Επικρατείας reinforced)."}
successor_movements: [greece_papandreou_pasok_1981_1989]

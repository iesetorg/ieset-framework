# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: brazil_real_plan_cardoso_1994_2002
status: candidate
name: Brazil Plano Real + Cardoso stabilisation
countries:
- BRA
timeframe:
  start: 1993
  end: 2002
coalition: PSDB-led coalition; plan designed 1993 under Itamar Franco, executed under Cardoso
  presidency 1995-2002
leaders:
- Fernando Henrique Cardoso (Finance Minister 1993-1994, President 1995-2002)
- Pedro Malan (Finance Minister 1995-2002)
- Gustavo Franco (Central Bank President 1997-1999)
- Armínio Fraga (Central Bank President 1999-2002)
- Edmar Bacha, Pérsio Arida, André Lara Resende, Winston Fritsch (plan architects)
doctrine: 'Three-stage stabilisation defeating hyperinflation (IPCA above 2,500% in 1993). Stage
  1 — fiscal adjustment via Fundo Social de Emergência (1993). Stage 2 — introduction of the Unidade
  Real de Valor (URV) from 1 March 1994, a parallel unit of account fully indexed to the dollar,
  converting prices and contracts from cruzeiro real while leaving currency issuance unchanged.
  Stage 3 — on 1 July 1994 the URV was converted 1:1 into a new currency, the real (BRL), launched
  initially at ~1:1 with the USD on a managed crawling band. Exchange-rate-as-anchor regime ran
  1994-early 1999 until the January 1999 devaluation forced transition to a floating regime with
  formal inflation-targeting from June 1999 (initial target 8% +/-2%). Structural reforms: large
  privatisations 1995-2000 (Telebrás 1998, Vale 1997, Eletropaulo, CSN); Fiscal Responsibility
  Law 2000 (Lei Complementar 101) binding all levels of government to debt ceilings and primary-surplus
  rules; 1998 constitutional amendment on social-security indexation. Stated case: end forty years
  of chronic + hyper-inflation via unit-of-account reform + rule-based macro anchors without the
  kind of hard peg that had failed in the Southern Cone.

  '
policies:
- brazil_urv_transition_1994
- brazil_real_launch_1994
- brazil_inflation_targeting_1999
- brazil_privatisations_1995_2000
- brazil_fiscal_responsibility_law_2000
- brazil_plano_real_1994
axes_summary:
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  rationale: Broke hyperinflation via credibility shift; subsequent IT regime tightened further
    1999-2002.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: Inflation-targeting mandate from 1999; de facto operational independence strengthened
    under Fraga.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Large-scale privatisation of telecom, mining, steel, electricity distribution.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  rationale: Fiscal Responsibility Law 2000 bound sub-national debt and enforced primary surpluses.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  rationale: Mercosur deepening 1994-1998; tariff reductions continued from Collor era.
outcome_hypotheses:
- hyperinflation_requires_fiscal_dominance
- exchange_rate_anchor_to_inflation_targeting_transition
position_alignments:
- position_id: chicago_monetarism
  alignment: aligned
  notes: Rule-based anti-inflation framework with explicit credibility mechanism.
- position_id: ordoliberal
  alignment: aligned
  notes: Fiscal Responsibility Law is a canonical ordoliberal rule-based fiscal constitution.
- position_id: new_keynesian
  alignment: aligned
  notes: Inflation-targeting framework from 1999 is textbook NK.
- position_id: institutionalism
  alignment: aligned
  notes: Movement is institution-construction heavy — CB mandate, LRF, regulatory agencies.
- position_id: post_keynesian
  alignment: partially_aligned
  notes: URV unit-of-account reform echoes structuralist inertial-inflation literature (Bacha,
    Arida, Lara Resende were chronic-inflation theorists).
references:
- Medida Provisória 434/1994 (URV creation)
- Lei 9.069/1995 (Plano Real statutory basis)
- Decreto 3.088/1999 — inflation-targeting regime
- Lei Complementar 101/2000 — Lei de Responsabilidade Fiscal
- 'Bacha (1998) ''O Plano Real: uma avaliação'''
- Giambiagi & Além (2008), Finanças Públicas — Ch. on Real Plan

notes: >
  First LDP minority government since 2009. Coded as distinct movement
  from Kishida because (i) loss of Shūgiin majority fundamentally changes
  the legislative-production function, (ii) Ishiba's Seihō-kai fiscal-
  conservative and regional-revitalisation emphasis is doctrinally
  distinct from Kishida Kōchi-kai 'new capitalism', and (iii) the
  post-April-2025 tariff-response period defines the administration's
  foreign-economic posture. Status candidate; ongoing.

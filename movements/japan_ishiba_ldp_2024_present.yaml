movement_id: japan_ishiba_ldp_2024_present
status: candidate
name: "Ishiba LDP-Komeito minority government"
countries: [JPN]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-10-01"}
coalition: "LDP-Komeito minority government (Seihō-kai / fiscal-conservative LDP faction leader)"
leaders:

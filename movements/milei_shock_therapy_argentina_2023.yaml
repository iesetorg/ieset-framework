doctrine: 'Self-described Austrian-libertarian programme: zero-deficit fiscal consolidation via
  spending cuts (~30% real cut year-1), emergency decree deregulation package (DNU 70/2023), peso
  devaluation 54% on inauguration, attempted dollarisation framework (not yet implemented), labour-market
  flexibility reform, import-license elimination, rent- control and other price-controls repeal.
  Early outcomes: inflation from ~25% m/m late 2023 to ~2-3% m/m mid-2024; fiscal surplus achieved;
  severe recession + poverty spike 2024H1 followed by growth recovery 2024H2+; peso-gap closing
  but official rate still overvalued vs CCL through 2024.

  '

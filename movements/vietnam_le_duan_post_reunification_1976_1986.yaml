movement_id: vietnam_le_duan_post_reunification_1976_1986
status: candidate
name: "Le Duan post-reunification socialist reconstruction (Vietnam)"
countries: [VNM]
timeframe: {start: 1976, end: 1986}
coalition: "Communist Party of Vietnam (CPV), Le Duan as General Secretary"
leaders:
  - "Le Duan (CPV General Secretary 1960-1986)"
  - "Pham Van Dong (Prime Minister)"
  - "Truong Chinh (CPV General Secretary Jul-Dec 1986)"
  - "Nguyen Van Linh (Ho Chi Minh City Party Secretary, later GenSec)"
doctrine: >
  Le Duan socialist-orthodox reconstruction doctrine — North Vietnam's
  central-planning model extended to the reunified country after April
  1975. Economic school: Soviet-aligned Marxist-Leninist central
  planning, CMEA-integrated; high-extraction agricultural collectivisation
  + rapid socialist transformation of the South. Dated actions: 2 Jul
  1976 formal reunification as SRV; March 1978 'X-2 campaign' nationalising
  >30,000 Southern private businesses and confiscating hoa kieu (ethnic-
  Chinese merchant) assets — triggered the boat-people exodus and
  ~250,000 ethnic Chinese expelled; May 1978 currency reform unifying
  dong; 3 Nov 1978 Treaty of Friendship with USSR — effective CMEA
  integration; 25 Dec 1978 Vietnam invaded Cambodia, occupying until
  1989, sustaining war-economy mobilisation; 17 Feb-16 Mar 1979 Sino-
  Vietnamese border war; Sep 1979 6th Central Committee Plenum — partial
  'fence-breaking' production contracts recognising household plots;
  Jan 1981 Directive 100-CT/TW 'khoan san pham' agricultural product-
  contract system; 1978-1980 famine years; Sep 1985 disastrous
  currency reform (10:1 denomination) triggered hyperinflation to
  ~700% by 1986; 6th Party Congress 18 Dec 1986 post-Le-Duan death (Jul
  1986) launched Doi Moi. Left-right: far-left orthodox-Marxist.
  Popularity: no electoral signal — single-party National Assembly
  elections run at ~99% turnout with CPV-vetted candidates. Coherence:
  high doctrine-internal coherence failing catastrophically in practice
  — hyperinflation, famine, boat-people exodus, and CMEA dependency
  forced the Doi Moi reset.
policies:
  - vn_x2_campaign_socialist_transformation_south_1978
  - vn_ussr_friendship_treaty_cmea_1978
  - vn_cambodia_invasion_1978_1989
  - vn_directive_100_khoan_1981
  - vn_currency_reform_hyperinflation_1985
  - vn_reunification_1976
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "X-2 campaign 1978 nationalised Southern private sector; state-trading monopoly restored."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "CMEA-locked, minimal non-bloc trade; US embargo continuous post-1975."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Private property eliminated in South; hoa kieu assets confiscated."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "War-economy mobilisation during Cambodia occupation; state footprint expanded via nationalisation."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Sep 1985 currency reform monetised fiscal deficits; hyperinflation ~700% by 1986."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Re-education camps, migration controls, suppression of Southern professional classes."}
successor_movements:

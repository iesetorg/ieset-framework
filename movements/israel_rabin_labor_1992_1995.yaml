movement_id: israel_rabin_labor_1992_1995
status: candidate
name: "Rabin Labor government — Oslo Accords and economic-peace doctrine"
countries: [ISR]
timeframe: {start: 1992, end: 1995, enacted_date: "1993-09-13"}
coalition: "Labour-Meretz coalition with outside Arab-party support; from 1993 Shas initially in then out"
leaders:
  - "Yitzhak Rabin (Prime Minister July 1992 - November 1995; assassinated 4 November 1995)"
  - "Shimon Peres (Foreign Minister; PM from November 1995)"
  - "Avraham Shochat (Finance Minister 1992-1996)"
  - "Jacob Frenkel (Bank of Israel Governor)"
doctrine: >
  Economic school: labour-social-democratic with explicit "economic peace"
  doctrine — the premise that a negotiated settlement with the PLO (Oslo I
  Declaration of Principles Sep 1993, Oslo II Interim Agreement Sep 1995)
  would unlock regional-market access, foreign investment, and a peace
  dividend that would raise long-run Israeli growth. Left-right axis:
  centre-left — continued 1985-plan macro discipline (Frenkel inflation-target
  anchor, budget deficit ceilings legislated 1992 Deficit Reduction Law) but
  expansion of welfare-state and child-allowance transfers, signature of
  Paris Protocol April 1994 establishing Israel-PA customs envelope, and
  Jordan peace treaty 26 October 1994. Dated policies: Oslo I
  Washington-signed 13 Sep 1993; Paris Protocol 29 April 1994; Jordan peace
  treaty 26 Oct 1994; Oslo II Taba-signed 28 Sep 1995; 1992 Deficit Reduction
  Law; partial privatisation continued (Bezeq, Bank Hapoalim shares).
  Popularity / vote share: June 1992 Knesset — Labour 44, Meretz 12 = 56
  plus outside Arab-party support; polling after Oslo I divided roughly
  50/50; Rabin assassinated by right-wing extremist Yigal Amir 4 Nov 1995
  following Kings of Israel Square rally. Coherence: high on its own terms —
  Oslo framework, macro discipline, and welfare-state signalling aligned;
  the assassination cut short empirical testing of the economic-peace
  hypothesis.
policies:
  - il_oslo_i_declaration_1993
  - il_paris_protocol_1994
  - il_jordan_peace_treaty_1994
  - il_deficit_reduction_law_1992
  - il_oslo_ii_interim_agreement_1995
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Paris Protocol established customs-envelope legal framework; Oslo created PA institutions."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Paris Protocol customs union with PA; broader liberalisation trajectory continued."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "1992 Deficit Reduction Law capped deficit path; transfers expanded within ceiling."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Child-allowance and pensioner-income-support expansions."}

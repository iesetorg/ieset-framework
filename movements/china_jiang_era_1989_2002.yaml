movement_id: china_jiang_era_1989_2002
status: candidate
name: "Jiang Zemin / Zhu Rongji era — market transition, SOE restructuring, WTO entry"
countries: [CHN]
timeframe: {start: 1989, end: 2002, enacted_date: "1992-10-12"}
coalition: "CCP under Jiang Zemin (General Secretary 1989-2002, President 1993-2003)"
leaders:
  - "Jiang Zemin (General Secretary, CCP, 1989-2002)"
  - "Li Peng (Premier 1987-1998)"
  - "Zhu Rongji (Vice-Premier 1993-1998, Premier 1998-2003 — architect of tax, SOE, and WTO reforms)"
  - "Long Yongtu (chief WTO negotiator)"
  - "Dai Xianglong (PBoC Governor 1995-2002)"
doctrine: >
  Jiang-Zhu market-transition programme consolidating Deng's "reform and
  opening" into a rule-based, centrally-financed state-capitalist model.
  School: developmentalist / market-socialist hybrid explicitly codified
  as "socialist market economy" at the 14th Party Congress (October 1992)
  following Deng's Southern Tour earlier that year. Left-right axis: within
  the CCP one-party system this is the statist-reformist pole — pro-market
  on product, labour, and trade margins but retaining CCP political monopoly
  and state ownership of "commanding heights." Core policy content: (i) the
  1994 tax-sharing reform (分税制) recentralising revenue to Beijing and
  rebuilding fiscal capacity (central share of revenue rose from ~22% in
  1993 to ~55% by 1995); (ii) "grasp the large, let go of the small" (抓大
  放小, 1995-2001) corporatising and privatising tens of thousands of
  small/medium SOEs while concentrating large SOEs into national champions
  (~40M SOE layoffs 1996-2002); (iii) 1994 unified exchange rate (official
  + swap-market rates merged at 8.7 RMB/USD) and current-account
  convertibility (1996); (iv) 1995 People's Bank of China Law formalising
  PBoC as quasi-independent central bank; (v) 1998 commercial-bank
  recapitalisation and housing-commercialisation reform ending work-unit
  housing; (vi) 1999 constitutional amendment recognising private economy
  as "important component"; (vii) WTO accession 11 December 2001 after
  15-year negotiation, binding tariff cuts from ~15% average to ~9% by
  2010, trading-rights liberalisation, and services opening. Popularity /
  legitimacy signals (CCP has no vote share): National People's Congress
  confirmation votes near-unanimous (Jiang presidential re-election 1998
  received 2,882 yes / 36 no / 29 abstain out of 2,947); plenum outcomes
  delivered the reform package without visible faction split; protest
  incidence — 1989 Tiananmen shock is the movement's founding trauma,
  1999 Falun Gong crackdown + rising but still-contained "mass incidents"
  (~10k/year late 1990s per Sun Liping). Coherence line: rebuild central
  fiscal capacity, restructure SOEs, lock in external liberalisation via
  WTO — a disciplined reform-consolidation arc.
policies:
  - cn_tax_sharing_reform_1994
  - cn_exchange_rate_unification_1994
  - cn_soe_grasp_large_let_go_small_1995
  - cn_pboc_law_1995
  - cn_housing_commercialisation_1998
  - cn_constitution_private_economy_1999
  - china_wto_accession_2001
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "WTO accession Dec 2001 bound tariff reductions and services-sector opening."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "SOE restructuring released ~40M workers to private/FIE sector; private economy constitutionally recognised 1999."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "'Iron rice bowl' dismantled via SOE layoffs 1996-2002; housing de-coupled from work unit 1998."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "1994 tax-sharing reform rebuilt central-government fiscal capacity from ~22% to ~55% revenue share."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "1999 constitutional amendment; 1995 PBoC Law; WTO TRIPS commitments."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "1995 PBoC Law formalised central bank mandate though subordinate to State Council."}
  - {axis: fiscal.sectoral_subsidy, direction: "mixed", magnitude: moderate, rationale: "Small-SOE subsidies withdrawn; strategic-sector national-champion consolidation retained directed credit."}
outcome_hypotheses:
  - developmentalist_state_growth_performance
  - china_wto_growth_effect
predecessor_movements: [deng_xiaoping_reforms_1978]
successor_movements: [china_hu_era_2002_2012]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "State-directed restructuring sequenced with external liberalisation — canonical developmentalist template."}
  - {position_id: market_socialist, alignment: aligned, notes: "Explicit 'socialist market economy' doctrine codified 1992."}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Price liberalisation and SOE privatisation on supply side; central-bank law approximates rule-based monetary framework."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Tax-sharing + PBoC Law + WTO bindings built rule-based institutions within a one-party state."}
references:
  - "14th Party Congress Report, October 1992 — 'socialist market economy'"
  - "Decision on Tax-Sharing System, State Council, 1993 (effective 1 Jan 1994)"
  - "15th Party Congress Report, September 1997 — 'grasp the large, let go of the small'"
  - "People's Bank of China Law, 18 March 1995"
  - "China Protocol of Accession to WTO, 10 November 2001 / effective 11 December 2001"
  - "Naughton (2007), The Chinese Economy: Transitions and Growth"
  - "Brandt-Rawski (2008), China's Great Economic Transformation"
  - "Lardy (2002), Integrating China into the Global Economy"
notes: >
  Overlaps Deng 1978 movement at the front end — 1992 Southern Tour is the
  restart signal after the 1989-1991 retrenchment. Movement closes with the
  2002-2003 leadership transition to Hu Jintao / Wen Jiabao. WTO accession
  is double-listed under this movement and the standalone china_wto_accession_2001
  movement to preserve the existing content-type.

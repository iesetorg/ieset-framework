movement_id: bolivia_sanchez_de_lozada_ii_2002_2003
status: candidate
name: "Sánchez de Lozada II — Gas War, impuestazo 2003, forced resignation"
countries: [BOL]
timeframe: {start: 2002, end: 2003, enacted_date: "2002-08-06"}
coalition: "MNR + MIR + UCS (narrow Congressional selection)"
leaders:
  - "Gonzalo Sánchez de Lozada 'Goni' (President Aug 2002 - 17 Oct 2003)"
  - "Carlos Mesa Gisbert (Vice President; successor)"
  - "Javier Comboni / Viviana Caro (Hacienda)"
  - "Yerko Kukoc / Jorge Alvarado Rivas (Gobierno)"
doctrine: >
  Short-lived second term capsized by natural-gas-export controversy +
  fiscal-package protests. Five doctrinal pillars: (a) Gas-export-
  through-Chile plan — $1.3B Pacific LNG consortium (Repsol-BG-
  Panamerican) proposed routing gas through Chilean port; tapped
  into Bolivian maritime-grievance memory vs Chile (War of the
  Pacific 1879-1884); opposed by wide left+indigenous+nationalist
  coalition. (b) February 2003 impuestazo — IMF-approved personal-
  income tax package proposed 12.5% on higher salaries to close 8.5%
  deficit; sparked 12-13 February 2003 police mutiny + army clash
  in Plaza Murillo; ~33 deaths; tax package withdrawn. (c)
  Gas War (Guerra del Gas) September-October 2003 — El Alto + La
  Paz mobilisations organised by COB, neighbourhood councils,
  cocaleros; blockades; 17 September Warisata killings; 12 October
  El Alto massacre (~67 deaths total); ~400+ injured. (d)
  Resignation 17 October 2003 — Goni fled to Miami; Carlos Mesa
  Gisbert (VP) assumed; later Goni indicted in Bolivia and faced
  US civil liability (Mamani v. Sánchez de Lozada 2018 jury
  verdict $10M, overturned on appeal). (e) Rupture of 1985-2003
  MNR governance cycle — marked end of Paz-Estenssoro-to-Goni
  neoliberal pacted-democracy era. Stated school: Washington-
  Consensus orthodoxy with fiscal-rule focus; crisis management.
  Left-right: economic right; politically centre coalition.
  Popularity: 30 June 2002 first round 22.5% vs Morales 20.9%;
  won Congressional selection; approval collapsed to ~10% by
  Sept 2003; forced resignation. Coherence: trade democratic-
  pacted MNR governance credibility for gas-export fiscal-
  rationality + impuestazo deficit-closing — at terminal cost of
  regime collapse and 67 deaths, crystallising MAS-led indigenous-
  leftist counter-mobilisation.
policies:
  - bo_gas_war_2003
  - bo_impuestazo_february_2003
  - bo_pacific_lng_chile_route_controversy_2002_2003
  - bo_sanchez_de_lozada_resignation_2003
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Impuestazo attempted progressive IRPF; withdrawn after 33 deaths."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "Gas-export concession proposed but not executed."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "67+ deaths in state-protester violence; forced presidential resignation."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Deficit-closing attempt failed; baseline unchanged."}
outcome_hypotheses: [natural_resource_export_contention, fiscal_consolidation_political_limit]

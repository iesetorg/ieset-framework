# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: djibouti_guelleh_vision2035_logistics_state_2014_present
status: candidate
name: Djibouti Guelleh Vision 2035 logistics state 2014-present
countries: [DJI]
timeframe:
  start: 2014
  end: ongoing
coalition: Union for the Presidential Majority
leaders:
  - "Ismail Omar Guelleh (President, 1999-)"
  - "Abdoulkader Kamil Mohamed (Prime Minister, 2013-2024)"
  - "Ilyas Moussa Dawaleh (Minister of Economy and Finance)"
doctrine: >
  Djibouti's current policy regime uses Vision Djibouti 2035 to turn its port,
  rail, free-zone, and basing geography into a logistics-led development model.
  The same regime now pairs state-led infrastructure and public-enterprise
  strategy with IMF-backed fiscal, debt, and SOE reforms after a debt buildup
  tied to earlier mega-projects.
policies:
  - dji_vision_2035_logistics_strategy_2014
  - dji_imf_ecf_fiscal_debt_reforms_2024
  - dji_soe_governance_dividend_decree_2025
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: strong, rationale: "Vision 2035 infrastructure raised public investment while the ECF and SOE reforms restrain debt and fiscal risk."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "The logistics strategy concentrates state support in ports, rail, free zones, and transport corridors."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Port, free-zone, and corridor investments increase trade facilitation and re-export capacity."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "PFM, debt, and SOE governance reforms increase reporting and fiscal oversight requirements."}
references:
  - "Government of Djibouti, Vision Djibouti 2035."
  - "IMF, Djibouti 2024 Article IV Consultation and request for an Extended Credit Facility, 2025."

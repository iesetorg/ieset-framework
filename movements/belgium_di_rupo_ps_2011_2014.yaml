movement_id: belgium_di_rupo_ps_2011_2014
status: candidate
name: "Di Rupo PS-led six-party coalition 2011-2014"
countries: [BEL]
timeframe: {start: 2011, end: 2014, enacted_date: "2011-12-06"}
coalition: "PS + MR + cdH + CD&V + sp.a + Open Vld (six-party 'tripartite plus')"
leaders:
  - "Elio Di Rupo (PM, PS; first francophone PM since 1979)"
  - "Steven Vanackere / Koen Geens (CD&V, successive Finance)"
  - "Johan Vande Lanotte (sp.a, Economy Minister)"
doctrine: >
  Formed after world-record 541-day post-Jun-2010-election formation crisis,
  breaking on Sixth State Reform (Sixième Réforme de l'État / Zesde
  Staatshervorming) splitting Brussels-Halle-Vilvoorde and transferring
  ~€20bn in competences (family allowances, labour-market policy, part of
  health care) to the Régions/Communautés. Economic school: centre-left
  PS-led, but fiscally constrained by bond-market pressure (10y yield peaked
  ~5.8% Nov 2011 before Di Rupo formation closed spread). Signature actions:
  Sixth State Reform (Jul 2014 enabling law); pension-access reforms (early-
  retirement age from 60 to 62, career length 35→40 years); unemployment-
  insurance degressivity reform 2012; corporate-tax notional-interest-deduction
  reform; €11.3bn austerity package (Budget 2012); Dexia restructuring
  (Oct 2011 Belfius nationalisation €4bn); Arco cooperative savers episode.
  Left-right: centre-left-led centrist. Popularity: PS vote ~26% (francophone),
  declined in 2014 election; N-VA surge in Flanders (32.4% Flemish vote 2014)
  ended the coalition. Coherence: high institutionally for Belgium (delivered
  Sixth State Reform that had blocked politics for a decade).
policies:
  - be_sixth_state_reform_2012_2014
  - be_pension_early_retirement_reform_2012
  - be_unemployment_degressivity_2012
  - be_belfius_nationalisation_2011
axes_summary:
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Sixth State Reform was federalising-devolving rather than separation-of-powers change."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Early-retirement age rise, unemployment degressivity tightening."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "€11.3bn consolidation package 2012; deficit below 3% GDP by 2014."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Belfius state ownership; Dexia Group wind-down."}

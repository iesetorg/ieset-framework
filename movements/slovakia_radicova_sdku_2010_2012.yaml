movement_id: slovakia_radicova_sdku_2010_2012
status: candidate
name: "Radicova SDKU-DS centre-right coalition 2010-2012"
countries: [SVK]
timeframe: {start: 2010, end: 2012, enacted_date: "2010-07-08"}
coalition: "SDKU-DS, SaS, KDH, Most-Hid"
leaders:
  - "Iveta Radicova (Prime Minister, SDKU-DS, 2010-2012)"
  - "Ivan Miklos (Finance Minister, SDKU-DS)"
  - "Richard Sulik (NR SR Speaker, SaS)"
doctrine: >
  Four-party centre-right coalition succeeding Fico I, first Slovak female
  premier. Economic school: Slovak liberal-conservative reformism under
  Miklos (architect of the 2004 flat tax) — GFC-era fiscal consolidation,
  VAT hike 19% -> 20% (temporary, made permanent), PIT flat-tax defence,
  OFE second-pillar voluntarisation, anti-corruption open-contracts
  register. Coalition collapsed Oct 2011 when SaS refused EFSF/eurozone
  bailout expansion (European Financial Stability Facility guarantee cap
  from EUR 440bn to EUR 780bn); confidence vote linked to ratification,
  lost 11 Oct 2011, snap election Mar 2012 won by Fico-Smer. Left-right
  axis: centre-right. Dated policies: VAT 20% hike 2011, open-contracts
  transparency law Jan 2011 (Zakon c. 546/2010), EFSF vote Oct 2011.
  Popularity: declined after VAT hike and austerity; lost 2012. Coherence:
  low — four parties, SaS ideological break on eurozone bailouts.
policies:
  - sk_open_contracts_transparency_2011
  - sk_vat_20_percent_2011
  - sk_efsf_vote_collapse_2011

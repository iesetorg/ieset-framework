  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Open-contracts register and public-procurement transparency strengthened anti-corruption institutions."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "EFSF cap expansion ratified; bailout architecture consolidated despite coalition collapse."}

movement_id: sweden_reinfeldt_alliance_2006_2014
status: candidate
name: "Reinfeldt Moderate-led Alliance 2006-2014"
countries: [SWE]
timeframe: {start: 2006, end: 2014, enacted_date: "2006-10-06"}
coalition: "Alliansen (Moderaterna, Folkpartiet, Centerpartiet, Kristdemokraterna)"
leaders:
  - "Fredrik Reinfeldt (Prime Minister, Moderaterna, 2006-2014)"
  - "Anders Borg (Finance Minister, 2006-2014)"
  - "Maud Olofsson (Deputy PM, Centerpartiet)"
  - "Jan Bjoerklund (Education, Folkpartiet)"
doctrine: >
  Reinfeldt arbetslinjen ("work-line") supply-side rebrand of the Moderates
  as 'Nya Moderaterna' — a centre-right programme built around making work
  pay through the jordskattereduktion (jobskatteavdrag) earned-income tax
  credit, combined with abolition of capital-taxation icons of the Swedish
  model: inheritance and gift tax abolished January 2005 (legislated under
  Persson but consolidated under Reinfeldt), wealth tax (foermoegenhetsskatt)
  abolished January 2007, and property-tax (fastighetsskatt) replaced by
  a capped municipal fee in 2008. Corporate-tax rate cut from 28% to 26.3%
  (2009) then to 22% (2013). Economic school: supply-side centre-right
  social liberalism inside the Swedish model; retained near-universal
  services but sharpened work incentives. Left-right: centre-right.
  Popularity: re-elected 2010 (first Moderate re-election ever), lost 2014
  to SAP-led bloc. Coherence: high — four-party Alliansen held tight
  through two full terms with shared programmatic platform.
policies:
  - se_jobskatteavdrag_2007
  - se_formogenhetsskatt_abolition_2007
  - se_fastighetsskatt_replacement_2008
  - se_rut_rot_deductions_2007
  - se_bolagsskatt_22_percent_2013
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Jobskatteavdrag flattened effective PIT; wealth & inheritance tax abolition reduced capital-tax progressivity."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "CIT cut 28% -> 26.3% (2009) -> 22% (2013)."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: strong, rationale: "Wealth tax abolished 2007, inheritance/gift tax abolished Jan 2005, property tax capped 2008."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Lower unemployment-benefit replacement rates and stricter a-kassa rules tightened work incentives."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Sickness/unemployment benefit tightening partially offset by tax credits."}

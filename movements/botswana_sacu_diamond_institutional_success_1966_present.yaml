  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Secure property rights, independent judiciary, contract enforcement."}
  - {axis: fiscal.spending_level, direction: "mixed", rationale: "Countercyclical discipline via Sustainable Budget Index; rent saved rather than spent."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "SACU membership maintains open trade with the region."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Bank of Botswana operational independence; reserve accumulation rather than fiscal financing."}
outcome_hypotheses: [institutional_quality_growth_channel, resource_curse_mediation]
position_alignments:

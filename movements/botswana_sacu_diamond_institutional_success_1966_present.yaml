movement_id: botswana_sacu_diamond_institutional_success_1966_present
status: candidate
name: "Botswana diamond-rent institutional management (BDP governments)"
countries: [BWA]
timeframe: {start: 1966, end: "ongoing"}
coalition: "Botswana Democratic Party (BDP) governments, continuous"
leaders: ["Seretse Khama (President 1966-1980)", "Ketumile Masire (1980-1998)", "Festus Mogae (1998-2008)", "Ian Khama (2008-2018)"]
doctrine: >
  From independence in 1966, Botswana managed the rents from diamond discovery
  (Orapa 1967, Jwaneng 1982) through an explicit public-investment and
  fiscal-rule framework rather than consumption booms. The Debswana 50/50
  joint venture with De Beers (renegotiated repeatedly in the government's
  favour) channelled royalties and dividends into the consolidated fund.
  National Development Plans (NDP I through NDP 11) and the Sustainable
  Budget Index (from 1994) required that recurrent non-mineral spending be
  financed from non-mineral revenue, with mineral rents earmarked for
  investment. Bank of Botswana accumulated sizeable foreign-exchange reserves
  (Pula Fund). Rule of law, independent judiciary, and low measured corruption
  (Transparency International rankings consistently among the best in Africa)
  coexisted with continuous electoral dominance by the BDP. SACU membership
  (1910 predecessor, 1969 agreement, 2002 revision) maintained open trade
  with South Africa and a shared external tariff. GDP per capita rose from
  ~$70 in 1966 to upper-middle-income status by the 2010s — the single
  longest sustained growth episode in post-independence Africa. The case
  is centrally cited in Acemoglu-Johnson-Robinson (2003) as evidence that
  inclusive institutions, not resource endowments, drive long-run outcomes.
policies: [botswana_debswana_joint_venture_1969, botswana_sustainable_budget_index_1994, botswana_pula_fund, botswana_national_development_plans, botswana_sacu_membership_1969]
axes_summary:

movement_id: nigeria_buhari_sap_structural_adjustment_1986
status: candidate
name: "Nigeria Structural Adjustment Programme (Babangida SAP)"
countries: [NGA]
timeframe: {start: 1986, end: 1993}
coalition: "Military government under Ibrahim Babangida, following Buhari regime"
leaders: ["Ibrahim Babangida (Head of State 1985-1993)", "Kalu Idika Kalu (Finance Minister)", "Olu Falae (Secretary to the Government)"]
doctrine: >
  After the 1981-1985 oil-price collapse pushed Nigeria into balance-of-payments
  crisis, the Buhari regime (1984-1985) attempted orthodox adjustment without
  formal IMF agreement, using import licensing and austerity. After Babangida's
  1985 coup, a national debate rejected an explicit IMF loan but the government
  nonetheless implemented an IMF-designed Structural Adjustment Programme from
  July 1986: establishment of a Second-Tier Foreign Exchange Market (SFEM)
  with substantial naira depreciation, abolition of import licensing and
  commodity marketing boards (cocoa, palm oil, groundnut), liberalisation of
  banking entry, tariff rationalisation, and commercialisation / privatisation
  of selected state-owned enterprises under the Technical Committee on
  Privatisation and Commercialisation (1988). Petroleum subsidies were reduced
  but not eliminated. Inflation spiked, the naira depreciated sharply,
  manufacturing employment contracted, and the welfare effects were widely
  contested; the programme is commonly cited as the archetype of a Washington-
  Consensus adjustment that failed to generate sustained growth in a rentier
  oil economy without complementary institutional reform. The SAP era ended
  politically with the annulled 1993 election and transition to Abacha.
policies: [nigeria_sfem_exchange_rate_1986, nigeria_commodity_board_abolition_1986, nigeria_privatisation_decree_1988, nigeria_banking_licence_liberalisation_1987, nigeria_tariff_reform_1988]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Import licensing abolished; commodity boards dismantled; tariffs rationalised."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Banking entry liberalisation; SOE commercialisation."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Fiscal dominance persisted; CBN financed deficits during SAP, driving inflation."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Commodity-board export subsidies ended; petroleum subsidies trimmed not abolished."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Military-decree governance; annulment of 1993 election."}
outcome_hypotheses: [structural_adjustment_growth_effect]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Orthodox trade and FX liberalisation paired with unreformed fiscal-dominance regime."}
references:
  - "Olukoshi (ed., 1993), The Politics of Structural Adjustment in Nigeria"
  - "World Bank (1994), Adjustment in Africa, Nigeria case chapter"
  - "IMF (1987), Nigeria Recent Economic Developments"
  - "Bevan-Collier-Gunning (1999), Nigeria and Indonesia: The Political Economy of Poverty, Equity, and Growth"
  - "Lewis (2007), Growing Apart: Oil, Politics, and Economic Change in Indonesia and Nigeria"

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_starmer_labour_2024_present
status: candidate
name: "Starmer Labour government (UK)"

countries: [GBR]

timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-07-05"

coalition: "Labour majority (411 seats on 33.7% vote share — largest UK seat majority since 1997, lowest vote share for a majority in modern era)"

leaders:
  - "Keir Starmer (PM, July 2024 – )"
  - "Rachel Reeves (Chancellor, July 2024 – )"
  - "Angela Rayner (Deputy PM & Housing Secretary)"
  - "Ed Miliband (Energy Secretary)"

doctrine: >
  Draws from Blairite Third Way social-democracy updated with a
  'securonomics' / modern supply-side framing (Reeves), emphasising
  growth-through-investment, active industrial policy, and repair of
  public services — an explicit departure from New Labour's deference
  to footloose finance and from Corbyn-era redistributive socialism.
  Positioned on the centre-left — fiscally rules-bound (revised fiscal
  rule targeting net financial debt rather than PSND; debt must fall as
  share of GDP in fifth year), regulatorily activist on planning and
  workers' rights, green-industrial in sectoral policy. Key measures:
  Budget 30 October 2024 (employer NI rate up 1.2pp to 15% and threshold
  lowered; capital gains rate increases; inheritance tax extended to
  pensions and agricultural property; £40bn tax-raising package with
  £70bn additional spending); Employment Rights Bill 2024-25 (day-one
  unfair-dismissal rights, ban on exploitative zero-hours contracts,
  fire-and-rehire restrictions); Great British Energy founding
  legislation; National Planning Policy Framework revision December
  2024 (mandatory housing targets restored, grey-belt release); Renters'
  Rights Bill; nationalisation of passenger rail via Passenger Railway
  Services (Public Ownership) Act 2024; VAT on private school fees from
  1 January 2025. Entered with 33.7% vote share (lowest winning share
  in modern era); approval declined sharply in first six months
  (winter-fuel payment withdrawal, farmer protests, Partygate-echo
  scandals), with net approval turning negative by November 2024 and
  Labour polling at or below Reform UK through early 2026. Programme is
  mostly internally coherent on supply-side/planning but fractured on
  the fiscal side — rules-based restraint colliding with the spending
  demands of the 'change' mandate.

policies:
  - uk_autumn_budget_2024_tax_package
  - uk_employment_rights_bill_2024
  - uk_great_british_energy_act_2024
  - uk_planning_housing_target_revision_2024
  - uk_rail_public_ownership_act_2024
  - uk_vat_private_school_fees_2025

axes_summary:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Budget 2024 added ~£70bn/year spending; revised fiscal rule targeting net financial debt expanded borrowing headroom for investment."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: moderate
    rationale: "Capital-gains rises, IHT extension, VAT on private school fees are progressive in incidence."
  - axis: fiscal.tax_capital
    direction: "+"
    magnitude: moderate
    rationale: "CGT rate increases and IHT extensions to pensions/agricultural property."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: strong
    rationale: "Day-one unfair-dismissal rights, zero-hours restrictions, fire-and-rehire curbs, sectoral bargaining in adult social care."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: moderate
    rationale: "GB Energy, reinstated onshore wind consenting, clean-power-by-2030 framework."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: moderate
    rationale: "NPPF revision restoring mandatory housing targets and grey-belt release lowers planning-side entry barriers in housebuilding."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    rationale: "Great British Energy capitalisation, National Wealth Fund, expanded industrial strategy spending envelopes."

position_alignments:

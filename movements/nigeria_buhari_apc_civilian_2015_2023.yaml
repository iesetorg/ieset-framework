movement_id: nigeria_buhari_apc_civilian_2015_2023
status: candidate
name: "Buhari APC civilian era (heterodox FX + protectionism)"
countries: [NGA]
timeframe: {start: 2015, end: 2023}
coalition: "All Progressives Congress (APC); first opposition defeat of an incumbent in Nigerian history (Jonathan/PDP). 2015 election: Buhari 53.96% (15.4m) vs Jonathan 44.96%. 2019 re-election: Buhari 55.60% (15.2m) vs Atiku 41.22%. APC NASS majority throughout both terms."
leaders: ["Muhammadu Buhari (President 29 May 2015 - 29 May 2023)", "Yemi Osinbajo (VP)", "Godwin Emefiele (CBN Governor, held over from Jonathan, to June 2023)", "Zainab Ahmed (Finance 2018-2023)", "Kemi Adeosun (Finance 2015-2018)"]
doctrine: >
  Buhari's civilian second-coming was a heterodox nationalist-statist programme
  distinct from both his 1984 military austerity and his APC market-liberal
  coalition partners. Core elements: fixed or tightly-managed naira peg
  defended via a multiple-exchange-rate regime (official, NAFEX/I&E,
  Investors', SMIS, parallel) under CBN governor Emefiele; 43-item FX import
  ban (2015) to force domestic substitution; land-border closure August 2019 -
  December 2020 ostensibly against rice smuggling; rice-pyramid and Anchor
  Borrowers' Programme agricultural populism; Petroleum Industry Act finally
  signed August 2021 after 20 years of drafts, restructuring NNPC to NNPCL.
  The 2016-2017 recession (first in 25 years, triggered by 2014 oil-price
  collapse + FX rationing choking imports) was answered with expansionary
  fiscal policy + CBN Ways-and-Means overdraft financing breaching statutory
  limits by multiples. COVID response April 2020 included IMF Rapid Financing
  Instrument $3.4bn (largest RFI globally at that point), temporary fuel-
  subsidy removal reversed within weeks. #EndSARS protests 20 October 2020
  against SARS police unit culminated in the Lekki tollgate shooting,
  becoming the defining civic-trust rupture of the era. An eight-month
  ASUU university strike Feb-Oct 2022 closed federal universities. Left-right
  placement is incoherent: nationalist-protectionist on trade, statist-
  interventionist on FX and credit, socially conservative, fiscally loose.
  Coherence line: "Change / Next Level" — security, anti-corruption, and
  food self-sufficiency through managed markets.
policies:
  - ng_fx_43_item_ban_2015

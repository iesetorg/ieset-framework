  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Lekki tollgate shooting Oct 2020; DSS defiance of court orders on detainees."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "CBN directed lending (LDR 65% minimum); cashless/naira-redesign demonetisation Jan 2023."}

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_fascist_corporatist_state_1922_1943
status: candidate
name: "Fascist corporatist state and state-directed capitalism (Italy)"
countries: [ITA]
timeframe: {start: 1922, end: 1943}
coalition: "Partito Nazionale Fascista regime under Mussolini, moving from coalition premiership to one-party dictatorship"
leaders:
  - "Benito Mussolini (Head of Government 1922-1943)"
  - "Giacomo Acerbo (electoral-law architect)"
  - "Giuseppe Bottai (corporatist theorist and labour-law drafter)"
  - "Alberto Beneduce (IRI architect)"
  - "Giuseppe Volpi and later fascist finance ministers"
doctrine: >
  Italian fascism replaced competitive parliamentary government with an
  authoritarian corporatist state that claimed to reconcile labour and
  capital under national command while preserving private property where
  it served regime goals. In practice the regime fused electoral
  manipulation, suppression of free labour conflict, corporative labour
  law, and widening state direction over banking and heavy industry. After
  the banking and industrial crises of the early 1930s, it also created a
  large public-holding apparatus rather than allowing wholesale market
  liquidation. The movement's signature institutional anchors were the
  Acerbo electoral law, the Carta del Lavoro, the creation of IRI in 1933,
  and the 1936 banking law that treated credit as a public function.
policies:
  - italy_acerbo_law_1923
  - italy_carta_del_lavoro_1927
  - italy_iri_creation_1933
  - italy_banking_law_1936
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Electoral engineering and dictatorship hollowed out competitive constitutional government."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: strong, rationale: "Corporatist labour law abolished free strikes and autonomous bargaining in favour of state-controlled syndicates."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "IRI and the 1936 banking framework expanded state authorisation and public control across finance and industry."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "The 1936 banking law sharply tightened financial regulation and reserved credit intermediation to authorised institutions."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State holdings and corporative ordering reduced competitive market structure in strategic sectors."}
references:
  - "Legge 18 novembre 1923, n. 2444"
  - "Carta del Lavoro, 21 aprile 1927"
  - "Regio decreto-legge 23 gennaio 1933, n. 5"
  - "Regio decreto-legge 12 marzo 1936, n. 375"
  - "Treccani, IRI"
  - "Treccani, Carta del lavoro"
notes: "Historical backfill anchor for interwar Italy. Distinct from the later DC-era mixed economy: much postwar state holding inherited institutions first built or expanded under the fascist regime."

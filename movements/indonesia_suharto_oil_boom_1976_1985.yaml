movement_id: indonesia_suharto_oil_boom_1976_1985
status: candidate
name: "Suharto New Order oil-boom + Pertamina crisis + Pancasila economy (Indonesia)"
countries: [IDN]
timeframe: {start: 1976, end: 1985}
coalition: "Golongan Karya (Golkar) under Suharto, ABRI-backed"
leaders:
  - "Suharto (President, New Order)"
  - "Widjojo Nitisastro (Bappenas Chair, Berkeley Mafia)"
  - "Ali Wardhana (Finance Minister 1968-1983)"
  - "Radius Prawiro (Finance Minister 1983-1988)"
  - "Ibnu Sutowo (Pertamina head until 1976)"
doctrine: >
  New Order middle-phase Suharto doctrine blending Berkeley-Mafia
  macroeconomic orthodoxy with rising resource-nationalist overlay under
  'Pancasila economy' rhetoric. Economic school: developmentalist Berkeley-
  Mafia technocracy managing the 1974-1981 oil-boom rents and partial
  import-substitution drift. Dated actions: Pertamina debt crisis Feb
  1975 — USD10.5bn debt bailout finalised 1976; 15 Nov 1978 'KENAIKAN'
  rupiah devaluation -33.6% (Rp415 to Rp625/USD) prompting consumption-
  protection price controls; 30 Mar 1983 devaluation -27.6% (Rp625 to
  Rp970/USD) post-oil-price decline; PAKTO 27 Oct 1988 deregulation
  pipeline groundwork laid 1983 banking reform (BI rediscount rates
  liberalised, state-bank lending ceilings lifted 1 Jun 1983); tax
  reform Dec 1983 (VAT 10% from 1 Apr 1985, new Income Tax Law, Property
  Tax Law) — first modern tax code, doubled tax/GDP ratio within 5
  years; Repelita III (1979-1984) and IV (1984-1989) five-year plans;
  rice self-sufficiency achieved 1984 via BULOG + Bimas programmes;
  Garuda-Harapan-Kita flag-project, Krakatau Steel, IPTN aircraft under
  Habibie high-tech push. Left-right: centre-right authoritarian with
  technocratic macro core. Popularity: 1977 election Golkar 62.1%; 1982
  Golkar 64.3%; 1987 Golkar 73.1% (controlled elections, no meaningful
  opposition). Coherence: high — macro discipline, tax reform, export
  diversification from oil dependency via Paket Juni 1983 banking
  dereg, all mutually reinforcing despite resource-nationalist rhetoric.
policies:
  - id_pertamina_debt_bailout_1976
  - id_rupiah_devaluation_kenaikan_1978
  - id_rupiah_devaluation_1983
  - id_paket_juni_banking_dereg_1983
  - id_tax_reform_vat_1983_1985
  - id_repelita_iii_iv_1979_1989
  - id_rice_self_sufficiency_1984
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Paket Juni 1 Jun 1983 lifted state-bank credit ceilings and liberalised BI rediscount rates — first major banking reform."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "1983 tax reform introduced modern corporate-income code and VAT from 1985, doubling tax/GDP."}
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: weak, rationale: "Devaluations export-supportive; import-substitution drift on strategic sectors."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Oil-boom-funded BULOG rice subsidies, fuel subsidies, heavy-industry SOE expansion (Krakatau, IPTN)."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Authoritarian controls continuous; PAKTO-era reforms not accompanied by political opening."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "Stabilisation discipline post-1983 devaluation; BI reined credit."}

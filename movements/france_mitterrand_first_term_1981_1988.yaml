  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "39-hour week + retirement age 60 + 5-week leave retained even post-rigueur."}
  - {axis: fiscal.tax_capital, direction: "mixed", rationale: "ISF introduced 1981 (IGF); abolished 1986 cohabitation; reintroduced as ISF 1988."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "Franc-fort discipline from March 1983 imposed disinflation."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "MATIF + COB reforms + exchange-control phase-out 1986-1990."}
predecessor_movements: [france_giscard_udf_1974_1981, mitterrand_nationalisations_1981_1983]
successor_movements: [france_mitterrand_second_term_1988_1995]
position_alignments:

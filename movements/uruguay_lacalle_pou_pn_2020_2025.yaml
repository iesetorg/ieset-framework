position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Fiscal-rule and pension parametric reform pitched as evidence-driven sustainability fix."}
  - {position_id: social_democratic, alignment: opposed, notes: "Public-sector unions and FA campaigned against LUC via 2022 referendum."}
references:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uruguay_lacalle_pou_pn_2020_2025
status: candidate
name: "Lacalle Pou Coalición Multicolor — centre-right structural reform 2020-2025"
countries: [URY]
timeframe: {start: 2020, end: 2025, enacted_date: "2020-03-01"}
coalition: "Coalición Multicolor — Partido Nacional + Partido Colorado + Cabildo Abierto + Partido Independiente + Partido de la Gente"
leaders:
  - "Luis Lacalle Pou (President, sworn 1 March 2020)"
  - "Beatriz Argimón (Vice-President)"
  - "Azucena Arbeleche (Economy and Finance)"
  - "Diego Labat (Central Bank President)"
  - "Guido Manini Ríos (Cabildo Abierto leader, Senate)"
doctrine: >
  Partido Nacional led multi-party coalition centre-right structural-reform
  presidency: stated doctrine of "liberalismo responsable" combining
  rollback of Frente Amplio statism, fiscal-rule-anchored consolidation,
  pension-system reform, and an external-opening push (FTA with China,
  Mercosur external-tariff-reduction advocacy). Left-right axis: centre-right
  across all channels — less labour-market rigidity, trimmer state
  enterprise footprint, partial deregulation, but preserving universal
  health (SNIS) and social-transfer floors. Key policy content:
  (i) Ley de Urgente Consideración (Ley 19.889, LUC) enacted 9 July 2020
  — 476 articles rewriting policing, education governance, SOE rules,
  housing eviction, and financial inclusion; partial referendum
  27 March 2022 rejected the repeal of 135 contested articles (50.0% vs
  48.9%); (ii) pension reform Ley 20.130 enacted 2 May 2023 — retirement
  age raised from 60 to 65 over 15 years, BPS parametric tightening,
  AFAP pillar preserved; (iii) "libertad responsable" COVID response
  — no hard lockdown, targeted transfers, fiscal deficit peaked ~5.8%
  2020 and returned to ~3.3% by 2024; (iv) FTA with China exploratory
  feasibility study concluded mid-2022, formal talks 2022-23 blocked
  by Mercosur common-external-tariff constraint; (v) Mercosur CET
  reduction push 2021-22 (partial unilateral reductions); (vi)
  fiscal-rule framework operationalised via Rendición de Cuentas
  and structural-balance targets; (vii) Antel / Ancap / UTE efficiency
  reviews without privatisation. Popularity: Lacalle Pou won runoff
  50.8% November 2019; Coalición Multicolor held ~56/99 Diputados and
  17/30 Senadores; personal approval sustained ~50s throughout term
  (unusually high for Uruguayan president); FA won 2024 presidential
  election but PN retained strong congressional bloc. Coherence line:
  "coalition discipline plus structural reform plus external opening"
  — Uruguay's first sustained centre-right governance in 15 years.
policies:
  - uy_luc_ley_urgente_consideracion_2020
  - uy_pension_reform_2023
  - uy_fta_china_exploration_2022_2023
  - uy_mercosur_cet_reduction_push_2021
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "LUC eased some collective-bargaining and eviction rules; pension reform lengthens working life."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Fiscal-rule framework and deficit consolidation from pandemic peak back to ~3.3% GDP by 2024."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Pension reform tightens future benefit accruals; COVID transfers were targeted and time-limited."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "FTA-China exploration and unilateral CET reduction push — intent clear, execution partial."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "LUC opened fuel-pricing band, loosened some SOE monopolies at the margin."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "LUC policing and procedural reforms; fiscal-rule institutionalised."}
predecessor_movements:

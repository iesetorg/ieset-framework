movement_id: skorea_roh_moo_hyun_uri_2003_2008
status: candidate
name: "Roh Moo-hyun — Uri-led participatory reform plus KORUS FTA (2003-2008)"
countries: [KOR]
timeframe:
  start: 2003
  end: 2008
  enacted_date: "2003-02-25"
coalition: "Millennium Democratic Party then Uri Party (split November 2003) — 'Participatory Government' coalition"
leaders:
  - "Roh Moo-hyun (President 25 Feb 2003 - 25 Feb 2008, impeached 12 Mar 2004, reinstated 14 May 2004)"
  - "Kim Jin-pyo → Han Duck-soo → Kwon O-kyu (Finance-Economy)"
  - "Lee Hun-jai (Deputy PM for economy)"
  - "Park Seung → Lee Seong-tae (BoK Governor)"
doctrine: >
  Roh Moo-hyun participatory-reformist centre-left plus KORUS FTA
  liberal-trade pivot — the "people's lawyer" president's self-
  styled "Participatory Government" (Chamyeo Jeongbu) combined
  regional-balance redistribution, property-tax tightening against
  real-estate speculation, Sunshine-continuity engagement with the
  North, and a pragmatic liberal trade pivot most visible in the
  June 2007 signing of KORUS FTA. Economic school: hybrid progressive
  social policy plus classical-liberal trade stance — heterodox
  within the Korean left, alienating much of Uri Party on KORUS and
  Iraq deployment. Key policy content: (i) impeachment by National
  Assembly 12 March 2004 over electoral-neutrality violation,
  reinstated by Constitutional Court 14 May 2004 (opposition GNP
  and MDP backed impeachment); (ii) Uri Party April 2004 general
  election landslide 152/299 seats, first progressive legislative
  majority in ROK history; (iii) KORUS FTA signed 30 June 2007
  (ratified 2011 under Lee Myung-bak); (iv) comprehensive property-
  tax "Jonghap Budongsansae" August 2005 targeting multi-home owners,
  capital-gains tax hardened; (v) Sejong administrative capital
  relocation plan 2004-05 to Chungcheong (Constitutional Court struck
  Capital-Relocation Special Act October 2004; revised version
  passed 2005); (vi) Iraq Zaytun Division dispatch 2004 — third-
  largest troop contribution after US/UK, triggered progressive
  revolt; (vii) October 2007 inter-Korean summit with Kim Jong-il
  extending Sunshine engagement; (viii) Participatory regional-
  balance policy and Innovation Cities dispersing 153 public agencies;
  (ix) Real-estate-market surge despite property-tax tightening
  became the signature failure. Popularity: 2002 election won 48.9%
  vs Lee Hoi-chang 46.6%; approval collapsed to ~10-20% by 2006-07
  on real-estate prices and KORUS opposition from own base; Uri
  Party dissolved into Democratic Party February 2008. Coherence
  line: progressive social policy + KORUS/Iraq liberal-trade-and-
  alliance pivot + Sunshine-continuity — the internal contradictions
  that broke Uri Party.
policies:
  - kr_korus_fta_signing_2007
  - kr_comprehensive_property_tax_2005
  - kr_roh_impeachment_and_reinstatement_2004
  - kr_sejong_relocation_plan_2005

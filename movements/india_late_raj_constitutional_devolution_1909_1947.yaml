movement_id: india_late_raj_constitutional_devolution_1909_1947
status: candidate
name: "Late Raj constitutional devolution and state-building (India)"
countries: [IND]
timeframe: {start: 1909, end: 1947}
coalition: "British Raj under Westminster sovereignty, with reform concessions shaped by Indian National Congress, Muslim League, and provincial-elite pressure"
leaders:
  - "Lord Minto II (Viceroy 1905-1910)"
  - "Edwin Montagu (Secretary of State for India 1917-1922)"
  - "Lord Chelmsford (Viceroy 1916-1921)"
  - "Lord Linlithgow (Viceroy 1936-1943)"
doctrine: >
  Late-colonial reform in India combined imperial control with gradual
  concessionary devolution. Proponents argued that representative
  institutions, provincial responsibility, a central bank, and codified
  constitutional machinery could prepare India for eventual self-
  government while preserving order, minority safeguards, and the unity
  of an all-India administrative state. In practice the sequence ran
  from the Morley-Minto reforms (1909) through dyarchy under the
  Government of India Act 1919 to the larger but still tightly hedged
  provincial-autonomy and federal blueprint of the 1935 Act. The era
  also built durable state institutions such as the Reserve Bank of
  India. Nationalists treated these concessions as inadequate, but many
  of the constitutional and monetary-administrative structures carried
  forward into independence.
policies:
  - india_indian_councils_act_1909
  - india_government_of_india_act_1919
  - india_reserve_bank_of_india_act_1934
  - india_government_of_india_act_1935
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Successive acts widened representative institutions and codified provincial authority, but retained viceroy/governor override powers and communal electorates."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "The 1935 Act's Federal Court and more formal constitutional division of powers modestly strengthened judicial arbitration."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Reserve Bank of India Act 1934 created a standing central bank separate from direct treasury administration."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "RBI creation formalised reserve management and banking oversight under a national monetary authority."}
successor_movements:
  - india_constitutional_founding_mixed_economy_1947_1951
position_alignments:
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Core logic was institution-building through gradual constitutional and monetary state formation, albeit within colonial hierarchy."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Incremental representative government and legal codification moved toward liberal institutions, but franchise remained narrow and executive override remained strong."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "All-India administrative and monetary integration later became usable by the developmental state after independence."}
references:
  - "Indian Councils Act 1909"
  - "Government of India Act 1919"
  - "Reserve Bank of India Act 1934"
  - "Government of India Act 1935"
  - "Metcalf & Metcalf (2012), A Concise History of Modern India"
  - "RBI, History of the Reserve Bank of India, vol. 1"
notes: "Historical backfill anchor moving India coverage from 1951 toward the start of the 20th century via late-colonial constitutional and monetary institution-building."

movement_id: nicaragua_ortega_fsln_consolidation_2007_present
status: candidate
name: "Ortega-Murillo FSLN consolidation 2007-present"
countries: [NIC]
timeframe: {start: 2007, end: ongoing, enacted_date: "2007-01-10"}
coalition: "Frente Sandinista de Liberación Nacional (FSLN) — Ortega-Murillo personalist faction"
leaders:
  - "Daniel Ortega (President, FSLN, Jan 2007-present; co-president from 2025 reform)"
  - "Rosario Murillo (Vice President 2017-2025; co-President from 2025 constitutional reform)"
  - "Iván Acosta Montalván (Finance Minister, long-tenured)"
  - "Ovidio Reyes Ramírez (BCN President)"
doctrine: >
  Ortega's return to power in 2007 evolved from heterodox-left
  populist into entrenched authoritarian personalism after the
  2018 protest crackdown (300+ killed). Programme: heterodox
  macro orthodoxy paired with personalist political control —
  pegged córdoba via crawling band, IMF-aligned macroeconomic
  framework retained; commercial-bank sector functional;
  CAFTA-DR membership preserved. Politically: 2014 constitutional
  amendments removing term limits; 2018 protests crushed; 2021
  pre-election arrests of all credible opposition candidates;
  Catholic Church repression; mass denaturalisation and exile
  of dissidents (300+ stripped of citizenship 2023);
  Feb 2025 constitutional reform formalising Murillo as
  co-president, extending presidential term to six years,
  consolidating "national unity" structures. International
  isolation deepened: OAS withdrawal Nov 2023; sanctions from US
  and EU.
policies:
  - ni_2014_constitutional_term_limit_removal
  - ni_2018_protest_repression
  - ni_2021_opposition_arrests
  - ni_oas_withdrawal_2023
  - ni_2025_co_presidency_constitutional_reform
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Term limits removed; opposition imprisoned; mass denaturalisation; co-presidency constitutional reform."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Courts subordinated to FSLN executive; opposition prosecutions arbitrary; constitutional reform centralised power."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "CAFTA-DR retained despite political confrontation; trade flows resilient."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Macroeconomic orthodoxy preserved alongside political authoritarianism."}
predecessor_movements: [nicaragua_sandinista_1979_1990]
position_alignments:

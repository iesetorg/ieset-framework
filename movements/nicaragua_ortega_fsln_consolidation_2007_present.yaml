  - {position_id: national_conservative, alignment: partially_aligned, notes: "Anti-Western, anti-Catholic-Church repression + ethnic-nationalist mobilisation against opposition."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Term-limit removal; opposition imprisonment; mass denaturalisation; courts subordinated; press repression — opposed on every classical-liberal axis."}

movement_id: ireland_haughey_return_1987_1992
status: candidate
name: 'Haughey return: Tallaght Strategy, PNR, IFSC, Celtic Tiger foundations'
countries:
- IRL
timeframe:
  start: 1987
  end: 1992
coalition: FF minority (1987-1989); FF-PD coalition (1989-1992)
leaders:
- Charles Haughey (Taoiseach)
- Ray MacSharry (Finance Minister 1987-1989, later EU Agriculture Commissioner)
- Albert Reynolds (Finance Minister 1988-1991)
- Bertie Ahern (Finance Minister 1991-1994)
- Desmond O'Malley (PD Leader, from 1989 Tánaiste-adjacent role)
- Alan Dukes (FG Leader — Tallaght Strategy support)
doctrine: 'Decisive break with 1977-1987 debt crisis: Haughey converted from 1977-manifesto populism
  to crisis austerity, delivering the fiscal consolidation that under Dukes''s ''Tallaght Strategy''
  (2 September 1987) received cross-party support — the foundational Celtic Tiger political economy.
  Economic school: classical-liberal / social-partnership hybrid — supply-side tax reform combined
  with tripartite-negotiated social partnership. Left-right axis: centre-right with tripartite-
  corporatist institutional form. Key content: (i) MacSharry-Haughey expenditure cuts 1987-1989
  — primary expenditure cut ~5% GDP in two years; Exchequer Borrowing Requirement down from 12.8%
  (1986) to 2.1% (1989); (ii) Programme for National Recovery (PNR) 9 October 1987 — first tripartite
  social-partnership agreement covering wage restraint 1988-1990; (iii) Corporate tax low-rate
  preservation (10% IFSC rate; manufacturing at 10%); (iv) IFSC Foundation 1987 — Dublin International
  Financial Services Centre established with 10% corporation tax rate; (v) 1988 Tax Amnesty raised
  ~IR£500m; (vi) Capital Gains Tax reform 1988; (vii) Social Welfare Act 1989 consolidation; (viii)
  ERM membership sustained; (ix) 1990 PESP (Programme for Economic and Social Progress); (x) Goodman
  crisis and Beef Tribunal investigations May 1991 onwards; (xi) Mary Robinson elected President
  November 1990 — first woman President (Robinson an opposition-backed candidate, symbolic rather
  than economic); (xii) BSE preliminary concerns; (xiii) Currency crisis September 1992 would
  fall under successor Reynolds. Popularity: 1987 election FF 44.1% / 81 seats (minority); 1989
  snap election FF 44.1% / 77 seats, coalition with PD; Haughey faced FF internal challenges November
  1991 and resigned 11 February 1992 over phone-tapping scandal revelations; succeeded by Reynolds.
  Coherence: high — Tallaght Strategy + MacSharry cuts + PNR + IFSC + low-corporate-tax commitment
  together constitute the Celtic Tiger foundational policy mix.

  '

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: chile_bachelet_ii_nm_2014_2018
status: candidate
name: "Bachelet II — Nueva Mayoría reformist wave (Chile 2014-2018)"
countries: [CHL]
timeframe:
  start: 2014
  end: 2018
  enacted_date: "2014-03-11"
coalition: "Nueva Mayoría (PS + PPD + DC + PRSD + PC + MAS + IC) — first post-1990 coalition to formally include the Partido Comunista alongside the Christian Democrats"
leaders:
  - "Michelle Bachelet (President 2014-2018, second non-consecutive term)"
  - "Alberto Arenas (Finance Minister 2014-2015)"
  - "Rodrigo Valdés (Finance Minister 2015-2017)"
  - "Nicolás Eyzaguirre (Finance Minister 2017-2018, previously Education Minister 2014-2015)"
  - "Adriana Delpiano (Education Minister from 2016)"
  - "Ximena Rincón (Labour Minister 2014-2016)"
doctrine: >
  Centre-left Nueva Mayoría coalition (Socialists, Christian Democrats,
  Communists, PPD, Radicals) elected on a "structural reform" platform
  framed around three "transformative" pillars: tax reform to finance
  social spending, education reform ending for-profit and co-pay schooling
  and introducing gratuidad (tuition-free tertiary), and a new
  constitution to replace the 1980 Pinochet-era charter. Self-described
  as the end of the Concertación gradualist model and a social-democratic
  turn to correct the inequality legacy of the Chicago Boys' market
  architecture. Key enacted policies: Reforma Tributaria (Ley 20.780,
  September 2014) raising corporate tax from 20% to 27% and introducing
  the semi-integrated / attributed-income regimes; education reform
  (Ley de Inclusión Escolar 20.845, 2015; Ley de Gratuidad 21.091,
  enacted 2018) phasing in free tertiary tuition for lower-income
  deciles; labour reform (Ley 20.940, 2016) strengthening unions and
  collective bargaining; pension reform adding a second solidarity
  pillar (Pilar Solidario expansion 2016) and raising employer
  contributions; abortion decriminalisation on three grounds (Ley
  21.030, September 2017). The constitutional process (bases
  ciudadanas 2016; presidential draft April 2018) was handed to
  the incoming Piñera II government unpassed. Nueva Mayoría held
  67/120 Cámara seats (2014-2018, 55.8%) and 21/38 Senado seats;
  Bachelet's approval fell from ~54% at inauguration to the 20s
  in 2016 amid the Caval influence-peddling scandal and recovered
  modestly to the mid-30s by end of term. Coherence: ambitious
  redistributive reform package partially enacted, with tax-reform
  revenue yield below target, education reform implementation
  disputes, and constitutional replacement punted to a later cycle.
policies:
  - cl_reforma_tributaria_2014
  - cl_reforma_laboral_2016
  - cl_gratuidad_universitaria_2016
  - cl_reforma_pensional_pilar_solidario_2016
  - cl_despenalizacion_aborto_3_causales_2017
  - cl_reforma_educacional_inclusion_2015
axes_summary:
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Reforma Tributaria raised corporate rate from 20% to 25%/27% under the attributed and semi-integrated regimes."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: weak
    rationale: "Top personal rate lowered from 40% to 35% but dividend integration regime raised effective progressive burden on high-income shareholders."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Pilar Solidario expansion and gratuidad tuition transfers widened the fiscal transfer footprint."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: moderate
    rationale: "Social spending expansion financed partly by tax reform; total general-government spending rose ~2pp of GDP across the term."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    rationale: "Reforma Laboral strengthened union monopoly on bargaining, extended protections, restricted replacement of strikers."
  - axis: regulatory.sectoral_licensing
    direction: "-"
    magnitude: moderate
    rationale: "Ley de Inclusión Escolar phased out for-profit operation and selective admissions in state-subsidised schools; gratuidad conditioned accreditation."
outcome_hypotheses:
  - welfare_architecture_comparative_effectiveness
predecessor_movements:
  - pinochet_chicago_boys_1975_1990
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Reform ambition exceeded administrative implementation capacity in several files (education, tax)."}
references:
  - "Ley 20.780 (Reforma Tributaria, 2014) + Ley 20.899 (Simplificación, 2016)"
  - "Ley 20.845 Inclusión Escolar (2015)"
  - "Ley 21.091 Gratuidad en Educación Superior (2018)"
  - "Ley 20.940 Modernización de Relaciones Laborales (2016)"
  - "Ley 21.030 Despenalización de la Interrupción Voluntaria del Embarazo (2017)"
  - "Centro de Estudios Públicos — Encuesta CEP 2014-2018 approval series"
  - "IMF Article IV Chile 2015, 2017"
notes: >
  Distinct movement record from Bachelet I (2006-2010) which ran a
  narrower Concertación coalition and whose flagship file was the
  2008 AFP Pilar Solidario introduction. Nueva Mayoría (2014-2018)
  is coded as a reformist wave with moderate-positive moves on
  fiscal and licensing axes and moderate-negative move on labour
  flexibility. Constitutional replacement project handed to
  successor unpassed — Invariant-3 content-coding does not penalise
  this as it reflects coalition arithmetic, not intent.

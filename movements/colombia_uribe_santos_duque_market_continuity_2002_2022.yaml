movement_id: colombia_uribe_santos_duque_market_continuity_2002_2022
status: candidate
name: "Colombia market-continuity era — Uribe / Santos / Duque (2002-2022)"
countries: [COL]
timeframe:
  start: 2002
  end: 2022
  enacted_date: "2002-08-07"
coalition: "Sequence of centre-right coalitions: Primero Colombia / Partido de la U (Uribe); Partido de la U + Liberal + Conservador + Cambio Radical (Santos I-II); Centro Democrático (Duque)"
leaders:
  - "Álvaro Uribe Vélez (President 2002-2010)"
  - "Juan Manuel Santos (President 2010-2018)"
  - "Iván Duque Márquez (President 2018-2022)"
  - "Mauricio Cárdenas, Alberto Carrasquilla, José Manuel Restrepo (Finance Ministers, various terms)"
doctrine: >
  Twenty-year continuity of broadly market-friendly macroeconomic
  management with variations in emphasis: Uribe 2002-2010 paired
  Democratic Security (FARC containment, paramilitary demobilisation)
  with US FTA negotiation, pension reform, and fiscal consolidation;
  Santos 2010-2018 sustained investment-grade macro alongside FARC
  peace agreement 2016 (Acuerdo Final de La Habana), OECD accession
  process, pension and tax parametric reforms, and the Pacific
  Alliance trade bloc; Duque 2018-2022 advanced capital-market
  modernisation (Holding Financiero / "Ley de Valores"), continued
  FTA implementation, managed the COVID fiscal response (~8% of
  GDP emergency spending) via "Ingreso Solidario" transfers, and
  attempted tax reform 2021 (Ley 2155 after the Ley 2010 reform
  of 2019 was partially reversed by the 2021 social protest cycle).
  Common threads: inflation-targeting Banco de la República (full
  statutory independence since 1991 Constitution); floating exchange
  rate with managed intervention; hydrocarbons-dependent fiscal base
  (~25% of exports over the period); gradual trade-openness
  expansion (US FTA 2012; EU 2013; Pacific Alliance 2012; Korea
  2016); corporate tax rate reductions in phases. Outcomes: real GDP
  per capita grew from ~USD 4,800 (2002) to ~USD 6,700 (2019, PPP
  constant 2017); homicide rate fell from ~70 to ~25 per 100,000;
  FARC demobilisation 2016-2017; 2021 social protests (paro
  nacional) signalled political exhaustion of the continuity
  coalition. Contested elements: paramilitary-linked extrajudicial
  killings ("falsos positivos"), implementation gaps in the peace
  accord's rural-reform chapter, distributional tensions culminating
  in 2019 and 2021 protests, environmental consequences of extractive
  expansion. This 20-year block is the before-Petro baseline.
policies:
  - colombia_democratic_security_2002
  - colombia_us_fta_2006
  - colombia_pacific_alliance_2012
  - colombia_farc_peace_accord_2016
  - colombia_tax_reforms_2003_2021
  - colombia_pension_reform_law_797_2003
  - colombia_oecd_accession_2018
  - colombia_covid_ingreso_solidario_2020
  - colombia_capital_markets_holding_financiero_2021
axes_summary:
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: moderate
    rationale: "Homicide and kidnapping rates fell; territorial state presence rose; Constitutional Court and Banco de la República retained independence."
  - axis: regulatory.trade_openness
    direction: "+"
    magnitude: moderate
    rationale: "US FTA 2012; EU 2013; Pacific Alliance 2012; Korea 2016; tariff rationalisation."
  - axis: fiscal.tax_corporate
    direction: "-"
    magnitude: moderate
    rationale: "Gradual statutory rate reductions across the period; free-trade zones lowered effective rate for qualifying firms."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    rationale: "Defence and social-transfer expansion plus 2020 COVID surge; primary balance held roughly stable ex-crisis."
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: moderate
    rationale: "1991 Constitution-era central bank statutory independence preserved and deepened via inflation-targeting track record."
  - axis: regulatory.labour_market_flexibility
    direction: "mixed"
    magnitude: weak
    rationale: "2002 labour reform extended working hours definition; 2010-2018 minimum-wage rises compressed distribution; 2021 overtime-premium restoration partially undone before Petro."
  - axis: regulatory.energy_supply_security
    direction: "+"
    magnitude: moderate
    rationale: "Hydrocarbons exploration contracting active; reserve replacement ratio maintained until ~2018."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: weak
    rationale: "Familias en Acción (Uribe) / Más Familias en Acción / Ingreso Solidario (COVID) — modest permanent expansion."
outcome_hypotheses:
  - petro_reform_package_economic_trajectory_2022_present
  - trade_liberalisation_growth_effect
successor_movements:
  - colombia_petro_2022_present
position_alignments:
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: institutionalism, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Acuerdo Final de La Habana (2016)"
  - "Ley 1607 de 2012; Ley 1819 de 2016; Ley 2010 de 2019"
  - "OECD Economic Survey Colombia 2019, 2022"
  - "Banco de la República Informe de Estabilidad Financiera (various)"
  - "IMF Article IV Colombia 2018, 2021"
notes: >
  Aggregated across three administrations because policy content on
  the framework axes is broadly continuous. Invariant-3 content coding
  justifies grouping despite party turnover — the 2002-2022 economic
  framework is coherent enough to be one movement. Distinct sub-phases
  (Uribe 2002-2010, Santos 2010-2018, Duque 2018-2022) can be split in
  v1.1 if cross-period heterogeneity is material.

  Baseline for the Petro comparison: this is the 20-year pre-treatment
  trend against which Petro-era deviations are assessed.

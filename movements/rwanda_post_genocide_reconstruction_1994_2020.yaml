movement_id: rwanda_post_genocide_reconstruction_1994_2020
status: candidate
name: Rwanda post-genocide developmental reconstruction (Kagame)
countries:
- RWA
timeframe:
  start: 1994
  end: 2020
coalition: RPF government under Paul Kagame
leaders:
- Paul Kagame (VP 1994-2000, President 2000-)
- Donald Kaberuka (Finance Minister 1997-2005)
doctrine: 'After the 1994 genocide the RPF-led government pursued a self-styled developmental state combining
  tight political control with business-friendly administrative reforms. Vision 2020 (2000) and later
  Vision 2050 set middle-income targets via services, ICT, tourism, and agricultural modernisation. Investment
  in Rwanda Development Board (2008) consolidated regulatory services into a single window — Rwanda rose
  rapidly in the World Bank Doing Business rankings (from outside the top-150 to the top-40 by 2019).
  Land tenure regularisation (2008-2013) titled ~10M parcels; performance contracts (imihigo) pushed accountability
  down to district level; community health insurance (mutuelles de santé) achieved broad coverage. Growth
  averaged ~7-8% p.a. 2000-2019 from a low base. The regime simultaneously tightened media controls, restricted
  opposition activity, and extended presidential term limits (2015 constitutional amendment). The case
  is widely cited as evidence that administrative capacity and state-led coordination can substitute for
  liberal-democratic openness in early-stage catch-up growth — and contested for the same reason.

  '
policies:
- rwanda_rdb_one_stop_shop_2008
- rwanda_land_tenure_regularisation_2008
- rwanda_vision_2020_plan
- rwanda_mutuelles_de_sante_1999
- rwanda_imihigo_performance_contracts_2006
axes_summary:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: RDB consolidation, licensing streamlining, tax administration reform.
- axis: institutional.property_rights
  direction: +
  magnitude: strong
  rationale: Systematic land registration; ~10M parcels titled 2008-2013.
- axis: institutional.rule_of_law
  direction: mixed
  rationale: Contract enforcement and bureaucratic delivery improved sharply; political and press freedoms
    constrained.
- axis: regulatory.trade_openness
  direction: +
  magnitude: moderate
  rationale: EAC customs union 2009; COMESA tariff reductions.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Crop Intensification Programme, state-backed ICT and tourism clusters.
outcome_hypotheses:

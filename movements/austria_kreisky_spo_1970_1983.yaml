movement_id: austria_kreisky_spo_1970_1983
status: candidate
name: "Kreisky SPÖ era — Austro-Keynesian corporatism and hard-schilling peg"
countries: [AUT]
timeframe: {start: 1970, end: 1983}
coalition: "SPÖ minority 1970-1971, then SPÖ absolute majority 1971-1983"
leaders:
  - "Bruno Kreisky (Federal Chancellor 1970-1983; SPÖ)"
  - "Hannes Androsch (Finance Minister 1970-1981)"
  - "Stephan Koren (OeNB Governor 1978-1988, architect of the hard-schilling peg)"
  - "Anton Benya (ÖGB trade-union president — social-partnership counterpart)"
doctrine: >
  The defining Austrian social-democratic era — 13 years of single-
  party SPÖ majority government, the only one in post-war Austrian
  history. School: Austro-Keynesian corporatism — combining Keynesian
  demand management, institutionalised "Sozialpartnerschaft" (ÖGB-
  WKÖ-AK-Präsidentenkonferenz tripartism), and from 1976 the
  "Hartwährungspolitik" (hard-currency peg to the Deutschmark).
  Left-right axis: centre-left / classical European social democracy;
  further left than Schlüter's Denmark on public ownership and
  transfer expansion, but converged on hard-currency discipline after
  1976. Core policy content: (i) 1972 family law reform; (ii) 1975
  "Arbeitsverfassungsgesetz" strengthening works councils;
  (iii) expansion of verstaatlichte Industrie — ÖIAG nationalised
  industrial conglomerate (steel VOEST, chemicals Chemie Linz, oil
  OMV) as counter-cyclical employment shock absorber running
  persistent deficits that became crisis-prone by early 1980s;
  (iv) 1976 OeNB shift to pegging the schilling 1:7 to the DM,
  imposing external discipline even as fiscal stance remained
  expansionary; (v) 1978 Zwentendorf nuclear-plant referendum lost
  50.5%-49.5% — ended Austrian nuclear programme; (vi) "Austro-
  Keynesianism" term coined internally to describe the mix; Austria
  ran growth above OECD average with low inflation 1975-1982.
  Popularity signals: 1971 election SPÖ 50.0% absolute majority;
  1975 50.4%; 1979 51.0% (peak); 1983 47.7% — first majority loss,
  Kreisky resigned, succeeded by Sinowatz in SPÖ-FPÖ coalition.
  Coherence: high — internationally celebrated as the "Austrian
  miracle"; by early 1980s verstaatlichte-Industrie losses and fiscal
  strain exposed the model's limits, leading to the 1985-1993
  privatisation programme under successors.
policies:
  - at_hartwaehrungspolitik_1976
  - at_zwentendorf_referendum_1978
  - at_arbeitsverfassungsgesetz_1975
  - at_voest_state_industry_expansion_1970s

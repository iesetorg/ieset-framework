movement_id: australia_keating_alp_1991_1996
status: candidate
name: "Keating ALP — Working Nation, Mabo, superannuation, 'recession we had to have'"
countries: [AUS]
timeframe: {start: 1991, end: 1996}
coalition: "Australian Labor Party (ALP) majority government"
leaders:
  - "Paul Keating (Prime Minister 20 December 1991 - 11 March 1996)"
  - "John Dawkins (Treasurer 1991-1993)"
  - "Ralph Willis (Treasurer 1993-1996)"
  - "Bernie Fraser (RBA Governor 1989-1996)"
doctrine: >
  Economic school: microeconomic-reform ALP — continuation of Hawke-Keating
  financial and trade liberalisation with a stronger institutional turn on
  competition, retirement incomes, and native title. Left-right axis:
  centre-left — pro-market on competition, trade, and central-bank
  professionalisation but interventionist on active labour-market programmes
  (Working Nation 1994), mandatory superannuation expansion, and Indigenous
  land rights. Dated policies: Superannuation Guarantee Charge Act 1992
  (from July 1992, phased 3%->9%); Mabo v Queensland (No 2) High Court
  decision 3 June 1992 and Native Title Act 1993; Working Nation White
  Paper 4 May 1994 (active labour-market programmes, training guarantee);
  National Competition Policy / Hilmer Report implementation from 1995
  (Competition Principles Agreement 11 April 1995); RBA-Treasurer inflation-
  targeting statement 1993-96 (formalised by Costello 1996); "recession we
  had to have" 1990-91 (unemployment peak 11.2% Dec 1992). Popularity: March
  1993 federal election ALP won 51.4% 2PP over Hewson's Coalition ("Fightback!"
  GST package rejected); March 1996 federal election lost heavily to
  Howard's Coalition (53.6% 2PP to Coalition). Coherence: high on its own
  terms — the pro-competition + pro-universal-retirement-savings +
  native-title reform bundle defined the 1990s Australian model.
policies:
  - au_superannuation_guarantee_1992_expansion
  - au_native_title_act_1993
  - au_working_nation_1994
  - au_national_competition_policy_1995
  - au_rba_inflation_target_1993
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "National Competition Policy extended competition law to state-owned businesses and utilities."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Enterprise bargaining embedded in Industrial Relations Reform Act 1993; Working Nation targeted long-term unemployed."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Mandatory superannuation expansion is the signature universal-retirement-savings programme of the era."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Native Title Act 1993 formalised Indigenous land-rights following Mabo."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Informal inflation-targeting from 1993 set up formal independence under Costello 1996."}

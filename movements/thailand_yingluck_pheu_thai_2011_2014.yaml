  - {position_id: classical_liberal, alignment: opposed, notes: "Rice-pledging and first-car rebate are canonical market-distorting subsidy programmes."}
references:
  - "National Rice Policy Committee records 2011-2014 on rice-pledging stockpile"
  - "Constitutional Court removal of Yingluck Shinawatra, 7 May 2014"
  - "Auditor-General and NACC reports on rice-pledging losses"
  - "May 2014 NCPO coup announcement, 22 May 2014"
notes: >
  Yingluck movement is coherent Pheu Thai / Thaksinomics-continuation
  doctrine materially expanded beyond the 2001-2006 Thaksin original;
  terminated by a combination of judicial removal and military coup.

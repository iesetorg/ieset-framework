movement_id: thailand_yingluck_pheu_thai_2011_2014
status: candidate
name: "Yingluck Pheu Thai — rice-pledging and amnesty-bill coup"
countries: [THA]
timeframe: {start: 2011, end: 2014, enacted_date: "2011-08-05"}
coalition: "Pheu Thai Party-led coalition (Yingluck Shinawatra, Thaksin's sister)"
leaders:
  - "Yingluck Shinawatra (PM, 5 Aug 2011 - 7 May 2014, removed by Constitutional Court)"
  - "Kittiratt Na-Ranong (Deputy PM / Finance)"
  - "Prasarn Trairatvorakul (BoT Governor)"
  - "Niwatthamrong Boonsongpaisan (caretaker PM, 7 May - 22 May 2014)"
doctrine: >
  Pheu Thai Thaksinomics 2.0 populist-redistributive doctrine — won July
  2011 election with 265 of 500 seats on signature promises: (1) rice-
  pledging scheme (จำนำข้าว) guaranteeing farmers THB 15,000/tonne white
  rice (40-50% above world prices) via government purchase; designed to
  withhold supply and drive global price up, but accumulated ~18 million
  tonnes of unsold stockpiles, corruption in disbursement, and estimated
  fiscal losses THB 500-700bn; (2) minimum-wage hike to THB 300/day
  nationwide (April 2012); (3) first-car-buyer tax rebate (2011-2012)
  boosting 2012-2013 auto demand then crashing it; (4) corporate-tax
  reduction 30% → 23% → 20% (phased 2012-2013); (5) THB 2tn infrastructure
  loan bill for high-speed rail and water-management, struck down by
  Constitutional Court March 2014. November 2011 historic floods displaced
  ~13m people, tested administrative capacity. Crisis trigger was the
  "blanket amnesty bill" November 2013 which would have cleared Thaksin's
  2008 corruption convictions, sparking PDRC (People's Democratic Reform
  Committee, Suthep Thaugsuban) "Bangkok Shutdown" occupations. Yingluck
  dissolved parliament December 2013, February 2014 snap election
  disrupted, Constitutional Court removed her 7 May 2014 over 2011 NSC
  personnel transfer. 22 May 2014 military coup under General Prayut
  ended caretaker government. Coherence line: Thaksinomics rural-populist
  redistribution + corporate-tax-competitive doctrine, destroyed by
  amnesty-bill overreach and military intervention.
policies:
  - th_yingluck_rice_pledging_scheme_2011_2014
  - th_yingluck_minimum_wage_300_baht_2012
  - th_yingluck_first_car_buyer_rebate_2011_2012
  - th_yingluck_corporate_tax_cut_2012_2013
  - th_yingluck_amnesty_bill_2013
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Rice-pledging scheme fiscal losses THB 500-700bn; auto rebate distortion."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Corporate-tax rate 30% → 20% phased 2012-2013."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Nationwide THB 300/day minimum wage, significant in low-wage provinces."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Rice guarantee, first-car rebate, flood-relief transfers."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Amnesty-bill overreach + Constitutional-Court removal + May 2014 coup."}
predecessor_movements:

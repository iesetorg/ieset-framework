  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Federal capital spending pared through low-oil years; transfers sustained."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Dirham peg credibility built; formalised fully in 1997."}

movement_id: uae_zayed_oil_price_collapse_response_1985_1995
status: candidate
name: "Zayed oil-glut response — Abu Dhabi transfers, Dubai trade pivot"
countries: [ARE]
timeframe: {start: 1985, end: 1995}
coalition: "UAE federal state; Al Nahyan (Abu Dhabi) and Al Maktoum (Dubai) ruling families"
leaders:
  - "Sheikh Zayed bin Sultan Al Nahyan (President of UAE; Ruler of Abu Dhabi)"
  - "Sheikh Rashid bin Saeed Al Maktoum (Ruler of Dubai until 1990) and Sheikh Maktoum bin Rashid (from 1990)"
  - "Sheikh Mohammed bin Rashid Al Maktoum (Dubai Crown Prince / diversification driver)"
doctrine: >
  Economic school: rentier-federalism with twin tracks — Abu Dhabi's cautious
  oil-financed stabilisation versus Dubai's trade-and-services diversification.
  The 1986 OPEC price collapse (Brent below $10) cut UAE oil revenues by
  roughly two-thirds and forced Abu Dhabi to draw down ADIA surpluses to keep
  federal budget transfers flowing to poorer emirates under the 1976 federal
  finance mechanism. Left-right axis: right-of-centre on fiscal/regulatory
  posture for Dubai (expansion of Jebel Ali Free Zone capacity, Emirates
  airline launched 1985, Dubai Ports Authority consolidated, Dubai Shopping
  Festival from 1996) while Abu Dhabi remained statist via ADNOC and ADIA.
  Dated policies: federal budget transfers mechanism held 1985-95 despite
  revenue fall; Emirates airline launch Oct 1985; Jebel Ali expansion late
  1980s; Dubai Creek trade corridor deepening; ADIA diversification away
  from oil-linked assets; pegged dirham held at 3.6725/USD from 1997 (de
  facto earlier). Popularity: no vote share; Zayed's personal legitimacy and
  the federal bargain held; Sheikh Rashid's death 1990 transferred day-to-day
  Dubai rule without succession rupture. Coherence: high — the dual-track
  (oil-rent stabilisation + trade-diversification) response to 1986 set the
  template for 2000s mega-projects.
policies:
  - ae_emirates_airline_launch_1985
  - ae_jebel_ali_expansion_1985_1995
  - ae_adia_diversification_1980s

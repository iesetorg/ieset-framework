doctrine: 'Obama I stitched together a progressive-liberal crisis-Keynesian programme with a centrist
  regulatory architecture. (a) Economic school: crisis-era fiscal stimulus (ARRA USD 831bn Feb
  2009), stress-test-driven bank stabilisation (SCAP May 2009), managed auto bankruptcies (GM+Chrysler
  May-Jul 2009), near-universal health insurance via individual mandate + subsidies + Medicaid
  expansion (ACA signed 23 Mar 2010, "Obamacare"), financial re-regulation (Dodd-Frank signed
  21 Jul 2010: CFPB, Volcker Rule, Title II OLA, derivatives clearing), and a TPP-style rules-based
  trade push (KORUS FTA Oct 2011; TPP negotiations accelerated). (b) Left-right: centre-left /
  progressive-liberal domestically, continuity on national security (surge in Afghanistan Dec
  2009, drone programme expansion, Bin Laden raid May 2011). (c) Dated policies: ARRA Feb 2009,
  Cash-for-Clunkers Jul 2009, ACA Mar 2010, Dodd-Frank Jul 2010, DREAM executive action DACA Jun
  2012, Bush tax-cut extension Dec 2010, Budget Control Act Aug 2011 (debt-ceiling sequester).
  (d) Popularity: won 2008 general 52.9% / 365 EVs; approval 60s early 2009, fell into 40s by
  2010 midterms ("shellacking" — Dems lost 63 House seats); re-elected 2012 51.1% / 332 EVs. (e)
  Coherence: moderate — stimulus + ACA + Dodd-Frank ideologically aligned; trade/tech/surveillance
  stance created intra- coalition tension with progressive base.

  '

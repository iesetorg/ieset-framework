# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thailand_chavalit_nap_1996_1997
status: candidate
name: "Chavalit Yongchaiyudh NAP — Baht-float crisis-triggering government (1996-1997)"
countries: [THA]
timeframe:
  start: 1996
  end: 1997
  enacted_date: "1996-11-25"
coalition: "New Aspiration Party (NAP)-led six-party coalition with Chart Pattana, Social Action Party, Prachakorn Thai, Muan Chon, Seritham"
leaders:
  - "Gen. Chavalit Yongchaiyudh (PM 25 Nov 1996 - 9 Nov 1997)"
  - "Amnuay Viravan → Thanong Bidaya (Finance, Thanong from August 1997)"
  - "Rerngchai Marakanond (BoT Governor until resignation July 1997)"
  - "Chaiyawat Wibulswasdi (BoT Governor from July 1997)"
doctrine: >
  NAP-led coalition inheriting the last phase of the pre-crisis
  Thai-boom bubble — Chavalit, a former army Commander-in-Chief,
  took office in November 1996 as the boom was already inflecting
  downward. Economic school: statist-developmentalist with weak
  doctrinal coherence — coalition-government instability left
  macro policy to BoT and Finance Ministry, which defended the
  Baht peg to a USD-dominated basket past the point of reserve
  exhaustion. Centre-right on military-defence, populist on
  agricultural support, status-quo on the Baht-peg architecture
  until forced off. Key policy content: (i) defence of the
  managed-Baht peg January-July 1997 — BoT spent ~$23bn reserves,
  swap agreements committing further; (ii) Finance One collapse
  June 1997 — first major finance-company failure, triggering
  confidence cascade; (iii) BoT Governor Rerngchai Marakanond
  forced resignation 28 July 1997 (eventually personally liable
  civil judgment 2003); (iv) Baht float 2 July 1997 — the decision
  that formally began the Asian financial crisis; Baht fell from
  ~25/USD to 56/USD by January 1998; (v) 58 finance companies
  suspended June-August 1997; (vi) IMF Stand-By Arrangement
  20 August 1997 — $17.2bn package (Thailand-first, before
  Indonesia and Korea); (vii) 16th Constitution ("People's
  Constitution") promulgated 11 October 1997 under Chavalit —
  reformist charter introducing National Human Rights Commission,
  Constitutional Court, Anti-Corruption Commission, proportional-
  representation party-list element; (viii) Chavalit resigned
  9 November 1997 after coalition collapse. Popularity: November
  1996 election NAP 125/393 seats (largest single party), fell
  to single-digit approval by August 1997 Baht-crisis depth.
  Coherence line: failed Baht-peg defence into IMF bailout, with
  1997 constitutional promulgation as the one durable legacy.
policies:
  - th_baht_float_july_1997
  - th_imf_stand_by_arrangement_1997
  - th_peoples_constitution_1997
  - th_finance_company_suspensions_1997
  - th_bot_reserve_depletion_1996_1997
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "58 finance-company suspensions and IMF programme tightened prudential regime; FIDF created as bank-support vehicle."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "IMF-conditioned rate hike to 20%+ after float; tight money layered on collapsing private-sector demand."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "1997 People's Constitution established Constitutional Court, National Human Rights Commission, NCCC — the reformist charter."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Constitutional Court established under 1997 Constitution; Charter also created Election Commission and Ombudsman."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "IMF LoI committed to further trade liberalisation; capital-account restrictions temporary."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Finance-company suspensions wiped depositor/shareholder claims in short window; blanket guarantee partly offsetting."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "IMF-orthodoxy conditions implemented; 1997 Constitution extended liberal-constitutional architecture."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Pro-cyclical rate hike under IMF conditions flagged as canonical counterexample."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Malinvestment-and-liquidation phase consistent with Austrian business-cycle prediction."}
references:
  - "IMF Thailand Letter of Intent, 14 August 1997"
  - "Constitution of the Kingdom of Thailand, 11 October 1997"
  - "Bank of Thailand Annual Report 1997"
  - "Pempel (ed.) (1999), 'The Politics of the Asian Economic Crisis'"
notes: >
  Short but historically pivotal movement. 1997 People's Constitution
  is the durable legacy; Baht-float is the global-finance event.

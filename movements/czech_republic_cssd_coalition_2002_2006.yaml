status: candidate
name: "Spidla / Gross / Paroubek CSSD-KDU-US coalition 2002-2006"
countries: [CZE]
timeframe: {start: 2002, end: 2006, enacted_date: "2002-07-15"}
coalition: "CSSD-KDU-CSL-US-DEU (three-party, social-democrats with Christian-democrats and US-DEU liberals)"
leaders:
  - "Vladimir Spidla (Prime Minister, CSSD, 2002-2004)"
  - "Stanislav Gross (Prime Minister, CSSD, 2004-2005)"
  - "Jiri Paroubek (Prime Minister, CSSD, 2005-2006)"
  - "Bohuslav Sobotka (Finance Minister, CSSD, 2002-2006)"
doctrine: >
  Three-PM CSSD-led coalition spanning EU accession — economic school:
  Czech centre-left EU-convergence with modest deficit-management
  discipline, a 2003 public-finance reform (smaller-than-Hungary adjustment
  to hit Maastricht convergence trajectory), EU accession 1 May 2004.
  Left-right axis: centre-left. Dated policies: EU accession 1 May 2004,
  Spidla public finance reform package (July 2003 — VAT unification to
  19%, payroll/social adjustments), Klaus elected President by Parliament
  (28 Feb 2003, after Havel two-term end), Gross resignation (April
  2005, apartment-financing scandal), Paroubek stabilisation and 2006
  election deadlock (100-100 seats — led to Topolanek). Popularity:
  CSSD won 2002 (30.2%); lost 2006. Coherence: low — serial PM
  replacements, Gross scandal, thin three-party majority (101/200).
policies:
  - cz_eu_accession_2004
  - cz_spidla_public_finance_reform_2003
  - cz_klaus_president_election_2003
  - cz_gross_apartment_scandal_2005

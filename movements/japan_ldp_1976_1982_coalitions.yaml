# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_ldp_1976_1982_coalitions
status: candidate
name: "Japan LDP Fukuda-Ohira-Suzuki interregnum 1976-1982"
countries: [JPN]
timeframe: {start: 1976, end: 1982}
coalition: "LDP (Liberal Democratic Party) single-party governments"
leaders:
  - "Takeo Fukuda (PM 1976-1978)"
  - "Masayoshi Ohira (PM 1978-1980, died in office)"
  - "Zenko Suzuki (PM 1980-1982)"
doctrine: >
  Late-developmentalist LDP centre-right managerialism between the 1973
  oil shock and the Nakasone turn. Economic school: convoy-capitalism MITI
  industrial guidance + fiscal consolidation instincts contested by
  recessionary pressures. Fukuda pushed 'locomotive theory' at 1977 Bonn
  G7 committing Japan to 7% growth, expanded deficit-bond issuance, and
  signed the 1978 Japan-China Treaty of Peace and Friendship. Ohira
  attempted a 5% general consumption tax 1979 — withdrew after LDP
  setback in Oct 1979 general election (248/511 seats, lost majority
  temporarily). Suzuki pursued 'administrative reform' via Doko Rincho
  second provisional commission 1981, preparing the JNR/NTT/JT
  privatisation pipeline inherited by Nakasone. Second oil shock 1979
  absorbed via export surge — trade frictions with US intensified,
  leading to 1981 voluntary export restraints on autos. Left-right:
  centre-right catch-all, fiscally cautious but stimulus-prone under
  pressure; socially conservative. Popularity: Fukuda 1976 election LDP
  41.8% / 249 seats (first post-Lockheed-scandal vote, minority but
  independents joined); Ohira 1979 LDP 44.6% / 248; Ohira-Masayoshi
  double election June 1980 LDP 47.9% / 284 seats (sympathy surge after
  Ohira death). Coherence: transitional phase — reactive stimulus under
  oil-shock and US pressure, laying groundwork for Nakasone administrative
  reform.
policies:
  - jp_fukuda_locomotive_stimulus_1977
  - jp_ohira_general_consumption_tax_attempt_1979
  - jp_suzuki_doko_rincho_admin_reform_1981
  - jp_auto_voluntary_export_restraint_1981
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Deficit-bond issuance rose sharply post-1975; general-account deficit ratio peaked ~35% in FY1979."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "VER on autos 1981 onward; managed-trade response to US/EC pressure."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "MITI sectoral adjustment assistance continued; structurally-depressed industries law 1978."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No meaningful competition reform; Doko Rincho set stage for later privatisations."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: new_keynesian, alignment: partially_aligned}
successor_movements:
  - japan_nakasone_ldp_1982_1987
references:
  - "Kosai (1997), 'The Postwar Japanese Economy 1945-1995'"
  - "MOF Budget Statistics, Heisei era"
  - "Bonn G7 Declaration, 7-8 May 1977"
notes: "Deep-history tranche 1 (1976-1985)."

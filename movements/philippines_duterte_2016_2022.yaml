# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: philippines_duterte_2016_2022
status: candidate
name: "Philippines Duterte PDP-Laban era"
countries: [PHL]
timeframe: {start: 2016, end: 2022, enacted_date: "2016-06-30"}
coalition: "PDP-Laban-led supermajority coalition with Nacionalista, NPC, NUP, Lakas-CMD and most LP defectors"
leaders: ["Rodrigo Roa Duterte (President, 2016-22)", "Leni Robredo (VP, 2016-22, opposition)", "Carlos Dominguez III (Finance)", "Ernesto Pernia / Karl Chua (NEDA)", "Salvador Panelo / Menardo Guevarra (Justice)", "Ronald dela Rosa (PNP)"]
doctrine: >
  Right-populist security-first project fusing a punitive anti-drug
  campaign and strong-man rhetoric with technocratic macro-fiscal
  management and heavy public-infrastructure spending. Core pillars
  were (1) the 'war on drugs' from July 2016 — tens of thousands of
  killings documented by domestic and UN sources — pursued under
  presidential political cover and accompanied by institutional
  moves against critics (ABS-CBN franchise denial July 2020, ouster
  of CJ Sereno May 2018 via quo warranto, Ressa/Rappler cases,
  withdrawal from the Rome Statute / ICC effective March 2019);
  (2) an 'independent foreign policy' publicly distancing Manila
  from Washington and courting Beijing and Moscow, while in practice
  the Mutual Defense Treaty and VFA were retained after wobble;
  (3) a Dominguez-led macro-economic programme delivering the
  TRAIN personal-income-tax reform (RA 10963, Dec 2017), the CREATE
  corporate-tax-cut and incentives rationalisation (RA 11534, Mar
  2021, cutting CIT from 30% to 25%/20%), rice tariffication (RA
  11203, Feb 2019) replacing NFA import monopoly with 35% tariffs,
  and the ₱8-9 trillion 'Build Build Build' infrastructure pipeline
  targeting 5-7% of GDP in public investment; (4) the Bangsamoro
  Organic Law (RA 11054, July 2018) implementing the 2014
  Comprehensive Agreement on the Bangsamoro and creating the BARMM.
  COVID response combined strict militarised lockdowns (one of the
  longest in the world) with the Bayanihan I/II fiscal packages.
policies: [ph_train_tax_reform_2017, ph_create_corporate_tax_cut_2021, ph_build_build_build_2017_2022, ph_rice_tariffication_2019, ph_bangsamoro_organic_law_2018, ph_drug_war_2016, ph_icc_withdrawal_2019, ph_abs_cbn_franchise_denial_2020]
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: strong, rationale: "CREATE Act cut CIT from 30% (highest in ASEAN) to 25% for large firms and 20% for SMEs, effective July 2020 retroactively; phase-down to 20% by 2027."}
  - {axis: fiscal.tax_progressivity, direction: "mixed", magnitude: moderate, rationale: "TRAIN raised the PIT zero-bracket to ₱250k and cut middle brackets (progressive bite) but financed this with regressive VAT-base broadening and excise hikes on fuel, sugar-sweetened beverages, tobacco."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Build Build Build targeted public infra spending at 5-7% of GDP vs. historic ~2-3%; general government spending share rose materially, compounded by COVID Bayanihan packages."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Rice tariffication (RA 11203) replaced the NFA quantitative-restriction monopoly with a 35% ASEAN-bound tariff, importable by the private sector."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "ABS-CBN franchise denial July 2020; intensified use of SEC, BIR and NTC against critics; directed bank/telecom licensing pressure."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Documented extrajudicial killings under the drug war; withdrawal from the Rome Statute; Ressa prosecutions; Sereno quo-warranto ouster."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Quo-warranto removal of sitting Chief Justice Sereno (May 2018); court-packing via normal attrition during the term."}
outcome_hypotheses: [corporate_tax_cut_investment_response, infrastructure_spending_growth_multiplier]
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "CREATE corporate-tax cut and rice tariffication are textbook supply-side liberalisation; the institutional axis moves sharply the other way."}
  - {position_id: developmentalism, alignment: aligned, notes: "Build Build Build matches a classic East Asian public-capital-deepening play, backed by ODA from Japan and China."}
  - {position_id: institutionalism, alignment: opposed, notes: "Sustained erosion of horizontal-accountability institutions (ICC exit, franchise denial, extrajudicial violence) is the principal institutionalist critique."}
notes: >
  Electoral mandate: 16.6 million votes (39.0% plurality) in the 2016
  election, against Roxas 23.5%, Poe 21.4%, Binay 12.7%, Santiago 3.4%.
  VP race won by Robredo (LP) by ~260k votes. 17th and 18th Congresses
  were de facto Duterte supermajorities after mass LP defections — by
  2019 PDP-Laban, PFP and allies held ~270 of 304 House seats and 17+
  of 24 Senate seats. Pulse Asia/SWS net satisfaction ran +50 to +79
  throughout most of the term — historically the highest sustained
  rating of any post-1986 Philippine president.
references:
  - "RA 10963 (TRAIN), 19 December 2017"
  - "RA 11534 (CREATE), 26 March 2021"
  - "RA 11203 (Rice Tariffication Act), 14 February 2019"
  - "RA 11054 (Bangsamoro Organic Law), 27 July 2018"
  - "UN OHCHR Report on the Philippines, A/HRC/44/22, June 2020"
  - "COMELEC, 2016 National Elections Official Canvass"

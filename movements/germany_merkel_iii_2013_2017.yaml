movement_id: germany_merkel_iii_2013_2017
status: candidate
name: "Merkel III CDU/CSU-SPD Grand Coalition 2013-2017"
countries: [DEU]
timeframe: {start: 2013, end: 2017, enacted_date: "2013-12-17"}
coalition: "CDU/CSU (311) + SPD (193) GroKo II"
leaders:
  - "Angela Merkel (Chancellor)"
  - "Wolfgang Schäuble (Finance Minister)"
  - "Sigmar Gabriel / Andrea Nahles (SPD senior ministers)"
doctrine: >
  Second Grand Coalition delivering the 'asymmetric demobilisation' synthesis —
  Merkel absorbing SPD social priorities (federal statutory minimum wage €8.50
  from Jan 2015, Mütterrente, Rente mit 63 early-retirement option) while
  maintaining balanced budgets (Schwarze Null 2014-2017, 4 consecutive surpluses).
  Defining episode: Sep 2015 decision not to close the southern border, admitting
  ~1 million Syrian/Iraqi refugees ('Wir schaffen das') — triggered AfD rise,
  Easter-weekend border reinstatement with Austria, and the EU-Turkey Statement
  (Mar 2016 €6bn). Also: third Greek Memorandum (Jul 2015), Paris Agreement
  (Dec 2015), Mietpreisbremse rent cap (2015), digital-single-market progress
  under Günther Oettinger. Left-right: centrist with visible left drift on social
  policy. Popularity: CDU/CSU 41.5% (2013), 32.9% (2017 — historic low, 171 days
  to form next GroKo); AfD entered Bundestag with 12.6%. Coherence: high on
  aggregate management; the 2015 migration decision split the coalition's
  Bavarian CSU partner and reshaped party system.
policies:
  - de_mindestlohn_2014
  - de_fluechtlingspolitik_wir_schaffen_das_2015
  - de_mietpreisbremse_2015
  - de_eu_turkey_statement_2016
  - de_paris_agreement_ratification_2016
axes_summary:

  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Mütterrente, Rente mit 63; real social-spending rise."}
  - {axis: regulatory.housing_rent_control, direction: "+", magnitude: moderate, rationale: "Mietpreisbremse 2015 capped new contracts in designated tight markets while exempting newbuild and substantial modernisation."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: strong, rationale: "2015 open-border decision; ~1m asylum applications processed."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Schwarze Null maintained 2014-2017; federal surpluses 0.2-1.2% GDP."}

notes: >
  Coded as single movement spanning Gyurcsány 2004-2009 and Bajnai 2009-2010
  because Bajnai was an MSZP-backed technocratic expert government continuing
  the MSZP parliamentary mandate after SZDSZ withdrawal. 2002-2004 Medgyessy
  MSZP-SZDSZ government not included — it belongs to a distinct pre-accession
  period and could be a separate movement if backfilled.

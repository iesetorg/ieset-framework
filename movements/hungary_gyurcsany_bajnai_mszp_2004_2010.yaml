  - {axis: fiscal.transfer_expansion, direction: "mixed", magnitude: moderate, rationale: "Expanded 2004-2006 (13th pension, 13th public-sector wage, housing subsidies); then frozen/cut under Bajnai crisis package 2009."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Solidarity surtax introduced 2006, top marginal rate effectively raised; simplified to 18/36 two-rate schedule 2006."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Bajnai 2009 reforms eased dismissal rules and reduced sick-pay entitlements on crisis-management grounds."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "MNB operating under inflation-targeting framework adopted 2001; EU accession May 2004 reinforced de jure independence; Simor appointment 2007 without political conflict until late-decade Orbán attacks."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "Emergency rate hike to 11.5% October 2008 defending the forint during IMF-programme negotiations; fiscal dominance avoided."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Post-1989 Constitutional Court and ombudsman architecture intact; no major institutional restructuring; baseline for later Orbán-era coding."}

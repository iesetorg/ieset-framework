movement_id: hungary_gyurcsany_bajnai_mszp_2004_2010
status: candidate
name: "Gyurcsány–Bajnai MSZP-SZDSZ era — post-communist social-democracy and IMF stand-by (Hungary)"
countries: [HUN]
timeframe: {start: 2004, end: 2010, enacted_date: "2004-09-29"}
coalition: "MSZP (Hungarian Socialist Party) in coalition with the liberal SZDSZ (Alliance of Free Democrats) 2004-2008; MSZP minority from April 2008 after SZDSZ withdrawal; Bajnai technocratic 'expert government' April 2009-May 2010 with MSZP parliamentary support."
leaders:
  - "Ferenc Gyurcsány (Prime Minister September 2004 – April 2009)"
  - "Gordon Bajnai (Prime Minister April 2009 – May 2010; previously Minister of National Development)"
  - "László Sólyom (President 2005-2010, non-partisan Constitutional Court founding judge)"
  - "János Veres, Péter Oszkó (Finance Ministers in sequence)"
  - "András Simor (MNB Governor from March 2007)"
  - "János Kóka, Gábor Fodor (SZDSZ leaders during coalition)"
doctrine: >
  Post-communist social-democratic governance confronting the outer limit
  of expansionary fiscal policy and then the 2008 global financial crisis.
  Economic school (Gyurcsány 2004-2006): social-democratic fiscal expansion
  with pre-election spending spree — '100 steps' programme, 13th-month
  pension and public-sector wage, minimum-wage tax-free bracket, housing
  subsidies — pushing deficit to 9.3% of GDP in 2006 (Eurostat revised),
  the largest in the EU. Post-2006 election reckoning: the leaked
  Balatonőszöd private party speech (May 2006, aired 17 September 2006)
  in which Gyurcsány told MSZP MPs 'we lied in the morning, we lied in
  the evening' about the fiscal position triggered the September 2006
  Budapest riots, then forced the 'convergence programme' — VAT hike
  from 20% to 25% (later partially reversed), personal-income tax
  restructuring toward two-rate 18%/36% schedule, introduction of a
  solidarity surtax, gas and electricity subsidy cuts, limited healthcare
  co-payments (visit fee and hospital daily fee, both repealed by March
  2008 SZDSZ-backed referendum that broke the coalition). Economic
  school (Bajnai 2009-2010): orthodox crisis-management technocracy —
  EU/IMF/World Bank €20bn stand-by arrangement signed 6 November 2008
  (the first IMF programme in an EU member state post-accession); crisis
  package March 2009 included freezing the 13th-month pension and 13th
  public-sector wage, cutting the public-sector wage bill, raising VAT
  from 20% to 25% (July 2009), cutting the corporate rate from 20% to 19%
  with a simultaneous 10% small-business rate, and launching labour-market
  reforms. Left-right axis: MSZP was post-communist social-democratic
  (LIBE/PES family) with SZDSZ providing the liberal wing on institutional
  and market questions; the Bajnai interregnum was technocratic-centrist
  on a crisis mandate, with no popular election. Institutional content:
  rule-of-law framework intact under Sólyom presidency and pre-2011
  Constitutional Court; media and judicial architecture unchanged from
  post-1989 baseline. Popularity: MSZP-SZDSZ won April 2006 election
  with 43.2% list vote (186/386 seats combined) — the only ruling
  government re-elected in post-1990 Hungary until Orbán's streak;
  collapsed after Balatonőszöd leak (MSZP polling fell from 40%+ to mid-
  teens); 2009 EP election MSZP 17.4% (crushed by Fidesz 56.4%);
  April 2010 general election MSZP reduced to 19.3% list vote and 59
  seats, Fidesz won 52.7% and a two-thirds constitutional majority.
  Coherence judgement: the 2004-2006 expansion was electorally coherent
  (re-elected 2006) but fiscally unsustainable; the 2006-2010 adjustment
  was fiscally coherent but politically catastrophic, and the combination
  of the Balatonőszöd scandal with the 2008-09 recession destroyed the
  governing coalition and cleared the way for Orbán's two-thirds victory
  and the constitutional overhaul that followed.
policies:
  - hu_100_steps_fiscal_expansion_2005
  - hu_convergence_programme_vat_hike_2006
  - hu_imf_stand_by_arrangement_2008
  - hu_bajnai_crisis_package_2009
  - hu_hospital_visit_fee_referendum_2008
axes_summary:

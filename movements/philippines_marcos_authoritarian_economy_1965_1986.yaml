movement_id: philippines_marcos_authoritarian_economy_1965_1986
status: candidate
name: "Philippines Marcos authoritarian economy"
countries: [PHL]
timeframe: {start: 1965, end: 1986}
coalition: "Nacionalista Party then martial-law personalist regime (from 1972)"
leaders: ["Ferdinand E. Marcos (President 1965-86)", "Cesar Virata (Finance / PM)", "Imelda Marcos (Human Settlements)", "Roberto Benedicto and Eduardo Cojuangco (favoured cronies)"]
doctrine: >
  Authoritarian developmentalist project that degenerated into
  kleptocracy. Early Marcos years (1965-72) continued import-
  substitution industrialisation behind tariffs and the peso peg.
  Martial law (21 Sept 1972) centralised economic control, created
  state marketing monopolies for sugar (PHILSUCOM) and coconut
  (UCPB / coconut levy), launched debt-financed 'eleven major
  industrial projects' (KKK) and Metro Manila beautification, and
  directed bank credit to cronies. World Bank and IMF lending
  financed balance-of-payments deficits through the late 1970s. A
  1981 corporate-debt crisis (Dewey Dee flight), 1983 Aquino
  assassination, and 1984-85 balance-of-payments crisis produced
  two peso devaluations (1983, 1984), IMF standby arrangements,
  and severe contraction (GDP -7% in both 1984 and 1985). The
  regime ended in the February 1986 EDSA People Power uprising
  leaving $28bn external debt, documented plunder estimated at
  $5-10bn, and a decade of lost growth — a canonical failure case
  of authoritarian developmentalism without institutional constraint.
policies: [philippines_martial_law_economic_decrees_1972, philippines_coconut_levy_1973, philippines_philsucom_sugar_monopoly_1976, philippines_imf_standby_1984, philippines_peso_devaluations_1983_1984]
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "State marketing monopolies, licensing captured by cronies, restriction of entry in sugar, coconut, banking, media."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Martial law, suspension of habeas corpus, selective use of the judiciary, extrajudicial repression."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Sequestration of political opponents' enterprises; takeovers transferred to cronies."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Debt-financed 'behest loans' and large industrial projects directed to favoured firms."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "High effective protection for ISI sectors; partial liberalisation under 1980 World Bank SAL reversed in the 1984 crisis."}
outcome_hypotheses: [developmentalist_state_growth_performance, currency_crisis_capital_flight_dynamic]
position_alignments:
  - {position_id: developmentalism, alignment: opposed, notes: "Cited as the standard cautionary case — the developmental-state template without effective bureaucratic insulation or performance discipline."}
  - {position_id: institutionalism, alignment: opposed, notes: "Canonical illustration of extractive institutions sensu Acemoglu-Robinson."}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Boyce (1993), 'The Political Economy of Growth and Impoverishment in the Marcos Era'"
  - "De Dios et al. (1984), 'An Analysis of the Philippine Economic Crisis' (UP School of Economics white paper)"
  - "World Bank (1987), 'Philippines: A Framework for Economic Recovery'"

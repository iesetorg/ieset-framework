movement_id: ireland_bruton_rainbow_1994_1997
status: candidate
name: 'Bruton Rainbow Coalition: Celtic Tiger takeoff'
countries:
- IRL
timeframe:
  start: 1994
  end: 1997
coalition: FG-Labour-Democratic Left ('Rainbow Coalition')
leaders:
- John Bruton (Taoiseach, FG)
- Dick Spring (Tánaiste, Labour)
- Ruairi Quinn (Finance Minister, Labour)
- Proinsias De Rossa (Democratic Left leader, Social Welfare Minister)
doctrine: 'First post-war Irish government formed without election, replacing FF-Labour via internal
  realignment December 1994. Presided over the statistical take-off of the ''Celtic Tiger'' (GDP
  growth averaging ~9% 1995-1997). Economic school: social-partnership continuation with FG centrism,
  Labour-DL welfare emphasis, and continued low-corporate- tax/FDI orientation. Left-right axis:
  centre. Key content: (i) Budget 1996-1997 combined tax-threshold rises with mild consolidation;
  (ii) Divorce Referendum 24 November 1995 passed 50.3%-49.7% — foundational social-liberalisation;
  (iii) PCW continuation and Partnership 2000 framework preparation (signed 1997 under Ahern);
  (iv) Continued IFSC growth; (v) OECD Jobs Strategy adoption 1996; (vi) European Cohesion Fund
  II allocation processed; (vii) Telecom Éireann partial privatisation preparation (sale 1999
  under Ahern); (viii) Northern Ireland — 1995 Framework Documents; Mitchell Principles; Bruton''s
  unionist-friendlier framing than Reynolds but continued peace-process support; (ix) Child Benefit
  increases; (x) Residential Property Tax abolition Budget 1997; (xi) Commercial- property capital-gains
  adjustment; (xii) Capital Gains Tax reduction Budget 1997 from 40% to 26% (key Quinn measure);
  (xiii) Currency: punt re-pegged within ERM 15% band; preparation for euro; (xiv) Employment
  rose 1995-1997 by ~150,000 (~13% of total employment). Popularity: 1994 Rainbow formed without
  election; November 1995 Divorce Referendum passed 50.3%-49.7%; 6 June 1997 general election
  FG 27.9% / 54 seats, Labour 10.4% / 17 seats, DL 2.5% / 4 seats — lost to FF-PD (FF 39.3%);
  Bertie Ahern became Taoiseach. Coherence: high — rainbow combination preserved social-partnership
  + low-CT + fiscal discipline while advancing social liberalisation. Celtic Tiger statistical
  take-off occurred on this term.

  '

  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "TyEL earnings-related pension expansion; universal daycare right 1985 law."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Continued EFTA integration while maintaining USSR clearing trade."}

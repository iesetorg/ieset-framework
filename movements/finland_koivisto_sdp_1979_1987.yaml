movement_id: finland_koivisto_sdp_1979_1987
status: candidate
name: "Koivisto-Sorsa SDP era — consensus corporatism under Finlandisation"
countries: [FIN]
timeframe: {start: 1979, end: 1987}
coalition: "SDP-led broad coalitions (SDP + Keskusta Centre + SKDL / LKP in various combinations)"
leaders:
  - "Mauno Koivisto (Prime Minister 1979-1982; President 1982-1994 — first SDP president)"
  - "Kalevi Sorsa (Prime Minister 1982-1987; SDP leader, had also held premiership 1972-1975, 1977-1979)"
  - "Urho Kekkonen (President until October 1981)"
  - "Ahti Karjalainen (Finance/Foreign Minister, Keskusta)"
doctrine: >
  Finnish consensus-corporatist social-democratic era spanning the
  Kekkonen-to-Koivisto presidential transition. School: Nordic
  consensus corporatism within the unique constraints of
  "Finlandisation" — balancing Soviet bilateral clearing trade (~20%
  of Finnish trade) with Nordic-EFTA integration. Left-right axis:
  centre-left / social-democratic consensus, with Centre Party and at
  points SKDL (communists) inside government. Core policy content:
  (i) Koivisto's 1979 tax-reform bill; (ii) after Kekkonen's October
  1981 resignation on health grounds, Koivisto's January 1982
  presidential election (43% first round, won 2nd round) marking the
  first normal political alternation since 1956; (iii) 1984 "markka"
  12% devaluation within currency-basket regime; (iv) Sorsa
  governments maintained incomes-policy "TUPO" central wage
  agreements; (v) gradual financial liberalisation 1986 — abolition
  of average-lending-rate regulation and capital-control relaxation
  that later drove the late-1980s casino-economy boom; (vi) expansion
  of universal earnings-related pension (TyEL) and daycare rights;
  (vii) continued USSR clearing-trade relationship (five-year
  bilateral protocols). Popularity signals: 1979 eduskunta SDP 23.9%;
  1983 26.7%; 1987 24.1% — SDP led every parliament in this period;
  Koivisto's 1982 presidential win a decisive 43% first-round share.
  Coherence: high — the Koivisto-Sorsa era is the canonical "Finnish
  consensus" model; its 1986 financial deregulation was the hidden
  seed of the 1990-1993 depression.
policies:
  - fi_markka_devaluation_1984
  - fi_financial_liberalisation_1986
  - fi_tupo_incomes_policy_1977_onwards
axes_summary:

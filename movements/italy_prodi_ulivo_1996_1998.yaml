# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_prodi_ulivo_1996_1998
status: candidate
name: "Prodi I Ulivo centre-left: Euro qualification"
countries: [ITA]
timeframe: {start: 1996, end: 1998}
coalition: "Ulivo (PDS + PPI + RI + FdV) with external support from Rifondazione Comunista"
leaders:
  - "Romano Prodi (PM)"
  - "Carlo Azeglio Ciampi (Treasury and Budget)"
  - "Vincenzo Visco (Finance)"
  - "Walter Veltroni (Vice-PM)"
doctrine: >
  Economic school: centre-left Euro-ordoliberalism — delivered Italy's
  Maastricht convergence through one-off taxes, spending discipline,
  and pension reform continuation from Dini 1995. Left-right axis:
  centre-left. Dated policies: "Eurotassa" (Europe tax) one-off income
  surtax 1996 for Maastricht 3% deficit compliance (partial rebate
  1999); Dini pension reform law 335/1995 continuation and implementation
  pathway; Treu Law (Legge 196/1997) 24 June 1997 introducing interinale
  temporary agency work; Bassanini administrative reforms 1997
  (Legge 59/1997, Legge 127/1997) decentralisation and federalismo
  amministrativo; Visco 1997 dual income tax (DIT) introducing reduced
  rate on new equity finance; Italy admitted to EMU founder group
  May 1998; fiscal deficit from 7.1% (1996) to 2.7% (1997). Lost
  Rifondazione Comunista support October 1998 over 1999 budget and
  fell. Popularity: 1996 election Ulivo 43.4% vs Polo 42.1%;
  approval sustained through Euro qualification; fell autumn 1998.
  Coherence: high for its narrow mission (Euro entry); broader
  economic-reform agenda (market-liberalising) succeeded in labour
  and admin domains.
policies:
  - italy_eurotassa_1996
  - italy_dini_pension_implementation_1996_1998
  - italy_treu_law_labour_flexibility_1997
  - italy_bassanini_administrative_reform_1997
  - italy_euro_entry_qualification_1998
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Deficit 7.1% → 2.7% GDP 1996-1997; interest spending ratio peaked and inflected."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Italy qualified for EMU founder group May 1998; Bank of Italy fully independent 1992 continued."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Treu Law 1997 introduced temporary agency work and part-time flexibility."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Eurotassa one-off progressive surtax."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Bassanini administrative simplification reduced entry frictions."}
predecessor_movements: [italy_tangentopoli_transition_1992_1994, italy_berlusconi_first_1994_1995]
successor_movements: [italy_dalema_amato_centre_left_1998_2001]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Euro convergence project aligned with rule-based fiscal framework."}
  - {position_id: empirical_pragmatist, alignment: aligned}
references:
  - "Legge 24 giugno 1997 n. 196 (Treu)"
  - "Leggi Bassanini 59/1997 e 127/1997"
  - "Decisione Consiglio UE 3 maggio 1998 sull'ingresso nell'euro"
notes: "Short-lived but pivotal government — delivered euro qualification."

movement_id: nigeria_obasanjo_military_first_1976_1979
status: candidate
name: "Obasanjo military (first) — indigenisation, oil-rent spending, transition to civilian rule"
countries: [NGA]
timeframe: {start: 1976, end: 1979}
coalition: "Supreme Military Council"
leaders:
  - "General Olusegun Obasanjo (Head of State 1976-1979)"
  - "Brigadier Shehu Musa Yar'Adua (Chief of Staff, Supreme HQ)"
doctrine: >
  Obasanjo's first (military) administration succeeded the assassinated
  Murtala Mohammed in February 1976 and delivered (a) the Second Nigerian
  Indigenisation Decree 1977, (b) the land-use reform of 1978 (Land Use
  Act), (c) the new FCT at Abuja (1976 decree), and (d) a managed transition
  to civilian rule via the 1979 constitution and October 1979 handover.
  Economic school: statist-developmentalist under oil-rent financing —
  Third National Development Plan (1975-80) was the largest in African
  history at launch ($35bn), heavy on infrastructure, SOEs, and imported
  plant. Left-right axis: military-authoritarian politically; mixed
  economic content with nationalist-leftward indigenisation offset by
  foreign-contractor-led infrastructure. Popularity / legitimacy: no
  elections; the movement's legitimacy rested on (a) completing Murtala's
  anti-corruption purge (10,000 civil servants dismissed), and (b)
  delivering civilian handover on schedule — arguably the only African
  coup regime to voluntarily cede power during this period. Coherence:
  high — stated goals of purge, indigenisation, land reform, new capital,
  and transition were all delivered though at escalating fiscal cost.
policies:
  - ng_second_indigenisation_decree_1977
  - ng_land_use_act_1978
  - ng_third_national_development_plan_1975_1980
  - ng_1979_constitution_civilian_transition
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Indigenisation Decree 1977 reserved sectors for Nigerian ownership — restricted foreign entry."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Third Plan doubled previous capital spending levels on oil rent."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Land Use Act 1978 vested all land in state governors — ended freehold traditions in most regions."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "1979 Constitution drafted and promulgated; civilian transition delivered on schedule."}

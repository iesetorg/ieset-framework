# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eu_gdpr_regulatory_stack_2018
status: candidate
name: "EU General Data Protection Regulation and data-protection regulatory stack"
scope: supranational
countries: [DEU, FRA, ITA, ESP, NLD, BEL, POL, SWE, IRL, AUT]
timeframe: {start: 2016, end: ongoing, enacted_date: "2018-05-25"}
coalition: "European Parliament + Council (rapporteur Jan Philipp Albrecht, Greens)"
leaders: ["Věra Jourová (Justice Commissioner)", "Jan Philipp Albrecht (MEP rapporteur)"]
doctrine: >
  Harmonised EU-wide data-protection framework replacing the 1995 Data
  Protection Directive. Core instruments: GDPR (Regulation 2016/679,
  applicable 25 May 2018), ePrivacy Directive revisions, Data
  Governance Act 2022, Data Act 2023. Stated goals: fundamental-rights
  grounding for personal-data control, one-stop-shop enforcement via
  national DPAs coordinated by the EDPB, extraterritorial application
  to any processor targeting EU residents. Penalty ceiling of 4% of
  global turnover. Framework codes this as a mixed-direction movement:
  data-subject protections strengthen one dimension of consumer welfare,
  while compliance architecture imposes fixed costs that disproportionately
  burden small and mid-sized firms and that empirically raised measured
  concentration in ad-tech and hosting markets post-2018.
policies: [eu_gdpr_2018, eu_eprivacy_directive_2002_amended, eu_data_governance_act_2022, eu_data_act_2023]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "mixed", magnitude: moderate, rationale: "Stated pro-user intent; observed outcome includes a compliance moat benefiting incumbents in ad-tech and hosting (Johnson/Shriver/Du 2023; Peukert et al. 2022)."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "DPO appointment, DPIA, records-of-processing, and breach-notification obligations function as de facto licensing burden on data-processing activity."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Adequacy-decision regime restricts cross-border data flows absent matching standards (Schrems II invalidated Privacy Shield 2020)."}
outcome_hypotheses: [gdpr_compliance_cost_smb_exit, gdpr_adtech_concentration_effect]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Rule-based framework for a contested market with consumer externalities."}
  - {position_id: austrian, alignment: opposed, notes: "Argues the regulation creates barriers to entry and disproportionately favours incumbents."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "Regulation (EU) 2016/679 (GDPR)"
  - "Johnson, Shriver, Du (2023) 'Consumer Privacy Choice in Online Advertising', Marketing Science"
  - "Peukert, Bechtold, Batikas, Kretschmer (2022) 'Regulatory Spillovers and Data Governance'"
  - "CJEU C-311/18 (Schrems II)"
notes: >
  Honest coding: the framework accepts both the stated fundamental-rights
  rationale and the empirical concentration evidence. Both are policy
  content. Rationale text records the mechanism rather than a normative
  judgement.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: tunisia_bourguiba_state_modernisation_1956_1987
status: candidate
name: "Tunisia Bourguiba state-modernisation model"
countries: [TUN]
timeframe: {start: 1956, end: 1987}
coalition: "Neo-Destour/Socialist Destourian Party state under Habib Bourguiba"
leaders:
  - "Habib Bourguiba (Prime Minister 1956-1957; President 1957-1987)"
  - "Ahmed Ben Salah (Planning and Finance Minister 1961-1969)"
doctrine: >
  Bourguiba's post-independence project presented the Tunisian state as the
  main engine of national modernisation: personal-status reform, secularising
  nation-building, mass education and health provision, and a planning state
  that initially used cooperatives and public investment before a partial
  liberal turn in the 1970s. The governing movement sought to build a unified
  national administration and citizenry while concentrating authority in the
  presidency and the ruling Destourian party.
policies:
  - tun_code_personal_status_1956
  - tun_perspectives_decennales_1962
  - tun_education_health_expansion_1958_1970s
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Planning and cooperative structures increased state allocation and reduced private entry in several sectors during the 1960s."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Education, health, and development planning expanded the public spending footprint from the early independence baseline."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "State plans directed investment and support toward cooperatives, public enterprises, and priority development sectors."}
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "Family-law codification strengthened formal legal status for women, while one-party presidential rule weakened political contestability."}
references:
  - "Perkins (2014), A History of Modern Tunisia"
  - "Moore (1965), Politics in North Africa"
  - "Alexander (2010), Tunisia: Stability and Reform in the Modern Maghreb"
notes: "The 1970s turn under Hedi Nouira partially liberalised the economic model, but the movement is coded around the durable Bourguiba state-modernisation regime."

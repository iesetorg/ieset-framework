# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: nigeria_jonathan_pdp_2010_2015
status: candidate
name: "Jonathan PDP oil-boom centrist era"
countries: [NGA]
timeframe: {start: 2010, end: 2015}
coalition: "Peoples Democratic Party (PDP). Jonathan ascended from VP on death of President Umaru Yar'Adua 5 May 2010; completed Yar'Adua term, then won 2011 election with 58.89% (22.5m votes) vs Buhari (CPC) 32.0%. PDP NASS supermajority until 2013 defections formed APC. Lost 2015 to Buhari 44.96%-53.96% — first incumbent loss in Nigerian history."
leaders: ["Goodluck Jonathan (President 6 May 2010 - 29 May 2015)", "Namadi Sambo (VP from 2010)", "Ngozi Okonjo-Iweala (Finance / Coordinating Minister of the Economy 2011-2015)", "Lamido Sanusi (CBN Governor to Feb 2014, suspended)", "Godwin Emefiele (CBN Governor from June 2014)", "Diezani Alison-Madueke (Petroleum Minister)"]
doctrine: >
  Jonathan's PDP era was a centrist pro-business oil-boom fiscal expansion
  riding Brent at $100+ for most of the term, collapsing to ~$50 only in the
  final six months. Okonjo-Iweala as Coordinating Minister pursued technocratic
  modernisation: Sovereign Wealth Fund (NSIA) established 2011 to replace the
  ECA; power-sector privatisation unbundling PHCN into GenCos and DisCos
  completed November 2013; Nigerian Mortgage Refinance Company; electronic
  wallet agri-input distribution under Akinwumi Adesina. The 1 January 2012
  attempted petrol-subsidy removal (pump price N65 to N141) triggered the
  Occupy Nigeria / Jan-2012-subsidy-protest general strike, partially rolled
  back to N97 within two weeks — the era's defining reform failure. April 2014
  GDP rebasing (Statistician-General Yemi Kale) recalculated Nigerian GDP
  upward 89% using 2010 base year, making Nigeria Africa's largest economy
  ahead of South Africa. Boko Haram insurgency expanded catastrophically:
  state-of-emergency in Borno/Yobe/Adamawa May 2013; Chibok schoolgirls
  abduction 14-15 April 2014 (276 girls) became a global #BringBackOurGirls
  crisis and a core 2015 campaign liability. CBN governor Sanusi was
  suspended Feb 2014 after alleging $20bn unremitted from NNPC to Federation
  Account. Left-right: moderate-centrist; pro-market on privatisation and
  FDI but expansive on fuel subsidy and recurrent spending. Coherence line:
  "Transformation Agenda" — technocratic growth + infrastructure +
  privatisation within a fragile security and patronage settlement.
policies:
  - ng_phcn_power_privatisation_2013
  - ng_sovereign_wealth_fund_nsia_2011
  - ng_occupy_nigeria_subsidy_protest_2012
  - ng_gdp_rebasing_2014
  - ng_chibok_boko_haram_crisis_2014
  - ng_agric_transformation_ewallet_2012
  - ng_pension_reform_act_2014
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Oil-boom recurrent-spending expansion; ECA drawdown; 2014-15 fiscal gap on oil-price collapse."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "PMS fuel subsidy doubled 2010-2011; Jan-2012 removal attempt rolled back under Occupy Nigeria pressure."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "PHCN unbundling and privatisation 2013 — largest privatisation since SAP."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Sanusi-era AMCON bank resolution; cashless Nigeria pilot 2012."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Sanusi suspended Feb 2014 after NNPC whistle-blowing; executive pressure on CBN."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Boko Haram territorial control; Chibok Apr 2014; extrajudicial responses by security forces."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Pension Reform Act 2014; Nigerian Mortgage Refinance Company."}
position_alignments:
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Technocratic reform stream (Okonjo-Iweala, Sanusi) paired with patronage politics."}
  - {position_id: developmentalism, alignment: partially_aligned}
successor_movements: [nigeria_buhari_apc_civilian_2015_2023]

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: burundi_ndayishimiye_recovery_reform_state_2020_present
status: candidate
name: Burundi Ndayishimiye recovery reform state 2020-present
countries: [BDI]
timeframe:
  start: 2020
  end: ongoing
coalition: CNDD-FDD government
leaders:
  - "Evariste Ndayishimiye (President, 2020-)"
  - "Gervais Ndirakobuca (Prime Minister, 2022-2025)"
  - "Nestor Ntahontuye (Minister of Finance, Budget and Economic Planning)"
doctrine: >
  Burundi's post-2020 governing programme presents economic recovery,
  macro-stabilisation, domestic-resource mobilisation, and the Vision 2040/2060
  development frame as the route out of prolonged isolation and foreign-exchange
  scarcity. The policy cluster combines IMF-supported exchange-rate and fiscal
  reform, tighter state stewardship of mining, and a long-horizon
  infrastructure and private-sector development strategy.
policies:
  - bdi_imf_ecf_fx_fiscal_reforms_2023
  - bdi_mining_code_revision_2023
  - bdi_vision_2040_2060_2023
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "IMF-supported adjustment restrains deficits while the 2040/2060 vision expands public investment ambitions."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "The programme and mining-law revision raise emphasis on domestic revenue and resource-sector take."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Mining reform increases formal licensing and state oversight of extractive activity."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Foreign-exchange and monetary reforms reduce direct administrative rationing and fiscal dominance pressures."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Greater discretionary state control in mining weakens investor certainty on extractive concessions."}
references:
  - "IMF, Burundi 2025 Article IV Consultation and reviews under the Extended Credit Facility."
  - "IMF press release and country materials on the 2023 Burundi Extended Credit Facility."
  - "Republic of Burundi, Vision Burundi Pays Emergent en 2040 et Developpe en 2060."
  - "Republic of Burundi, 2023 revision of the Mining Code."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: zambia_msunwe_structural_adjustment_1991_2001
status: candidate
name: "Zambia MMD structural adjustment and copper privatisation (Chiluba)"
countries: [ZMB]
timeframe: {start: 1991, end: 2001}
coalition: "Movement for Multi-party Democracy (MMD) under Frederick Chiluba"
leaders: ["Frederick Chiluba (President 1991-2002)", "Ronald Penza (Finance Minister)", "Edith Nawakwi (Finance Minister 1998-1999)"]
doctrine: >
  After the 1991 multiparty transition ended 27 years of Kaunda / UNIP
  one-party rule and its state-socialist economic model, the MMD government
  adopted an accelerated IMF / World Bank structural adjustment programme.
  Price controls were abolished in 1991-1992; the kwacha was liberalised and
  foreign exchange controls removed 1992-1994; the maize subsidy and
  parastatal National Agricultural Marketing Board were dismantled; and the
  Zambia Privatisation Agency (established 1992) oversaw the divestiture of
  more than 250 state-owned enterprises. The politically and economically
  decisive step was the privatisation of the copper-mining conglomerate ZCCM,
  completed in 2000 under substantial pressure from the IMF/HIPC process,
  splitting the mines into concessions awarded to Anglo American, Glencore,
  and other investors on development-agreement terms later widely criticised
  as too generous to investors. Zambia reached the HIPC completion point in
  2005. Macro outcomes across the Chiluba decade were poor: GDP per capita
  stagnated or fell, formal-sector employment contracted, and social
  indicators deteriorated during the 1990s before the post-2004 copper-price
  boom lifted growth. A canonical case of orthodox adjustment applied to a
  single-commodity rentier economy.
policies: [zambia_price_control_abolition_1991, zambia_kwacha_liberalisation_1992, zambia_zccm_privatisation_2000, zambia_namboard_dismantling_1993, zambia_privatisation_agency_1992]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Price-control abolition and SOE divestiture opened product markets."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Tariff reductions, FX liberalisation, import-licensing end."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: strong, rationale: "Maize subsidy and fertiliser-board subsidies eliminated."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Large-scale privatisation with contractual development agreements; formal secure title for investors."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Copper development agreements granted extended tax and royalty concessions."}
outcome_hypotheses: [structural_adjustment_growth_effect]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned, notes: "Full orthodox liberalisation + privatisation package."}
references:
  - "World Bank (2002), Zambia Country Assistance Evaluation"
  - "IMF Article IV consultations, Zambia, 1992-2004"
  - "Craig (2001), 'Putting Privatisation into Practice: the case of Zambia Consolidated Copper Mines'"
  - "Fraser-Lungu (2007), For Whom the Windfalls? Winners and Losers in the Privatisation of Zambia's Copper Mines"
  - "Rakner (2003), Political and Economic Liberalisation in Zambia 1991-2001"
notes: "Movement filename retains the 'msunwe' token from the drafting spec; intended subject is the MMD / Chiluba reform decade."

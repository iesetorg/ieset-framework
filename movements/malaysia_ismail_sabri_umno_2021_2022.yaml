# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malaysia_ismail_sabri_umno_2021_2022
status: candidate
name: "Ismail Sabri UMNO-BN caretaker government (Malaysia, 2021-2022)"
countries: [MYS]
timeframe: {start: 2021, end: 2022, enacted_date: "2021-08-21"}
coalition: "Barisan Nasional (UMNO-led) + Perikatan Nasional supply-and-confidence; 'Keluarga Malaysia' administration"
leaders:
  - "Ismail Sabri Yaakob (Prime Minister, UMNO/BN)"
  - "Tengku Zafrul Aziz (Finance Minister, non-partisan technocrat appointed by UMNO)"
  - "Ahmad Zahid Hamidi (UMNO president, external)"
  - "Khairy Jamaluddin (Health Minister, UMNO — vaccine rollout continuity)"
doctrine: >
  UMNO-restored technocratic COVID-exit caretaker administration formed after
  Muhyiddin Yassin lost his parliamentary majority and resigned 16 August 2021;
  the Yang di-Pertuan Agong appointed Ismail Sabri (UMNO vice-president,
  previously Muhyiddin's Deputy PM) as the ninth PM on 21 August 2021,
  explicitly to restore political stability, complete the National Recovery
  Plan COVID exit, and schedule the general election the UMNO grassroots
  was pressuring for. The doctrine — framed as 'Keluarga Malaysia' (Malaysian
  Family) — continued Muhyiddin's pandemic fiscal stance (Bantuan Prihatin
  Rakyat cash transfers, iPay-Later / PEMULIH stimulus extensions, moratorium
  architecture) while pivoting to growth-normalisation: full economic
  reopening from Oct 2021, borders reopened 1 April 2022, RM332bn Budget 2022
  (largest in Malaysian history, 5.8%-of-GDP deficit), one-off prosperity tax
  (Cukai Makmur) at 33% on corporate profits above RM100m for YA2022 only,
  and structural moves including the historic Anti-Hopping Law
  (Constitutional Amendment passed July 2022, implemented Oct 2022) negotiated
  with PH opposition in the MoU on Transformation and Political Stability
  (Sep 2021). Coherence judgement: competent pandemic-to-reopening handoff
  and one-off revenue boost; undermined institutionally by UMNO president
  Zahid Hamidi pressuring an early dissolution (Oct 2022) amid monsoon
  flooding — a decision Ismail Sabri endorsed under party pressure that
  ultimately destroyed BN's seat count (30/222) and precipitated the hung
  parliament of GE15.
policies:
  - my_keluarga_malaysia_pemulih_2021
  - my_budget_2022_cukai_makmur
  - my_anti_hopping_law_2022
  - my_border_reopening_2022
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "PEMULIH package extensions (Aug 2021 RM150bn), Bantuan Keluarga Malaysia cash transfers, wage-subsidy continuation."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Budget 2022 RM332bn — largest in Malaysian history; 5.8%-of-GDP deficit; pandemic exit carry-over."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "Cukai Makmur one-off 33% prosperity tax on corporate profits above RM100m (YA2022 only); limited structural effect."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Full border reopening 1 Apr 2022; resumption of labour-import channels; ratification of Regional Comprehensive Economic Partnership (RCEP) effective Mar 2022."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-Hopping Law negotiated Sep 2021 MoU with PH and passed July 2022 — reduces structural incentive for Sheraton-Move-style defections."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Minimum wage raised from RM1,200 to RM1,500 effective 1 May 2022 (Employment (Amendment) Act)."}
outcome_hypotheses:
  - one_off_windfall_tax_investment_effect
  - pandemic_exit_stimulus_growth_recovery
  - anti_defection_law_government_stability_effect
predecessor_movements: [malaysia_muhyiddin_pn_2020_2021]
successor_movements: [malaysia_anwar_unity_2022_present]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Pandemic-exit calibration broadly competent; Cukai Makmur is an empirically defensible one-off."}
  - {position_id: ordoliberal, alignment: opposed, notes: "Deficit stance and Budget 2022 size criticised; Cukai Makmur criticised as ad-hoc tax-policy instability."}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Belanjawan 2022 (Ministry of Finance Malaysia, Oct 2021)"
  - "Memorandum of Understanding on Transformation and Political Stability, PH-Govt, 13 Sep 2021"
  - "Constitution (Amendment) (No. 3) Act 2022 (Anti-Hopping Law)"
  - "Finance Act 2021 (Cukai Makmur provisions)"
notes: >
  Dewan Rakyat at formation (Aug 2021, 222 seats, carried over from GE14
  2018): BN 42 (UMNO 38, MCA 2, MIC 1, PBRS 1), Bersatu 31, PAS 18,
  PKR 38, DAP 42, Amanah 11, GPS 18, Warisan 8, STAR 1, PBS 1, independent/
  others. Ismail Sabri won the PM confidence vote 15 Dec 2021 (114 ayes).
  The governing bloc combined BN + Bersatu + PAS + GPS ~ 115, with PH
  supply-and-confidence under the Sep 2021 MoU. Ismail Sabri approval per
  Merdeka Center: ~69% Dec 2021 post-appointment, declining to ~52% mid-2022.
  Parliament dissolved 10 Oct 2022 at UMNO president's push; GE15 held
  19 Nov 2022 produced BN collapse to 30 seats — worst result in party
  history — and the hung parliament that forced the unity-government solution.

  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Workers' councils in BOALs made employment adjustments procedurally complex."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Non-aligned policy combined East, West, and NAM trade; special EEC trade relationship 1970."}

movement_id: portugal_guterres_ps_1995_2002
status: candidate
name: 'Guterres PS: Third-Way modernisation, euro entry'
countries:
- PRT
timeframe:
  start: 1995
  end: 2002
coalition: PS (minority, often reliant on ad-hoc PCP or PSD support)
leaders:
- António Guterres (PM)
- António Sousa Franco (Finance Minister 1995-1999)
- Joaquim Pina Moura (Finance Minister 1999-2001)
- Vítor Constâncio (Banco de Portugal Governor 1985-1994, then 2000-2010)
doctrine: 'Third-Way social-democratic modernisation combining euro entry, selective privatisations,
  education and social-investment expansion, and the Expo ''98 / Vasco da Gama modernisation drive.
  Economic school: Third-Way social-democratic with pro-EMU posture and social-inclusion emphasis
  (''Estado Social moderno''). Left-right axis: centre-left. Key content: (i) Euro entry 1 January
  1999 — Portugal qualified May 1998 with deficit at 2.5%; (ii) RMG (Rendimento Mínimo Garantido)
  Law 19-A/96 of 29 June 1996 — Portugal''s first minimum-income guarantee; (iii) Privatisations
  continued — Portugal Telecom tranches 1995-2000, EDP 1997-onwards, BPSM 1995, Brisa 1997, Cimpor
  1996-2002; (iv) Expo ''98 Lisbon World Exposition (22 May - 30 September 1998) with Vasco da
  Gama bridge 29 March 1998; (v) Education reform — autonomy and curriculum changes, new pre-school
  network (Rede Nacional de Educação Pré-Escolar); (vi) Banco de Portugal full independence Law
  5/98 of 31 January 1998; (vii) Schengen entry March 1995; (viii) East-Timor international mobilisation
  1999 culminating in UN intervention (Guterres diplomatic priority); (ix) Public debt reduced
  from 64% (1995) to 53% (2000); (x) AE/SCUT shadow-toll motorway expansion; (xi) Housing-investment
  programmes expanded; (xii) Labour code revisions preparation (Código do Trabalho completed under
  Santana Lopes 2003). Popularity: 1995 PS 43.8% / 112 seats (just short of majority); 1999 PS
  44.1% / 115 seats (equal seats, missed majority by 1); 2001 municipal losses precipitated resignation
  December 2001 (''political swamp'' speech); March 2002 election PSD Durão Barroso 40.2% / PS
  37.8%. Coherence: high over 1995-2000 — euro entry + privatisation continuation + RMG + Expo
  ''98 infrastructure formed a coherent Third-Way package; second term lost coherence under fiscal
  strain.

  '

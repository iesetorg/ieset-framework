movement_id: uk_callaghan_imf_1976
status: candidate
name: "UK Callaghan IMF loan and end of post-war consensus"
countries: [GBR]
timeframe: {start: 1976, end: 1979}
coalition: "Labour minority government; Lib-Lab pact from March 1977"
leaders:
  - "James Callaghan (PM, from April 1976)"
  - "Denis Healey (Chancellor)"
  - "Harold Lever (adviser)"
doctrine: >
  Forced pivot from Keynesian demand management to monetary-target plus
  expenditure control in response to sterling crisis. After the 1975
  inflation peak (~24% headline RPI) and successive sterling slides,
  the government sought a $3.9bn IMF standby in September 1976 — the
  largest IMF drawing to that date. Letter of Intent (15 December 1976)
  committed the UK to Domestic Credit Expansion targets (£9bn 1976/77,
  £7.7bn 1977/78), PSBR ceiling of £8.7bn 1977/78 falling to £8.6bn
  1978/79, and £2.5bn cumulative public-expenditure cuts over two years.
  Callaghan's September 1976 Labour Conference speech ('you cannot now,
  if you ever could, spend your way out of a recession... by cutting
  taxes and boosting Government spending') signalled the doctrinal shift.
  Sterling stabilised; DCE and M3 targets met; but the 1978-79 Winter of
  Discontent (public-sector pay cap breaking under union pressure) ended
  the government. In framework terms the movement marks the end of the
  1945 post-war consensus: the tools of fiscal stabilisation were
  subordinated to external balance and price stability.
policies:
  - uk_imf_standby_1976
  - uk_dce_monetary_targeting_1976
  - uk_public_expenditure_white_paper_1976
  - uk_incomes_policy_social_contract_1975_1978
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "£2.5bn public expenditure cuts 1977/78 and 1978/79 under IMF Letter of Intent."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "DCE ceilings and M3 targets tightened; Bank Rate raised to defend sterling."}
  - {axis: monetary.central_bank_independence, direction: "0", rationale: "BoE remained formally under Treasury; IMF conditionality acted as external discipline rather than institutional independence."}
  - {axis: regulatory.labour_market_flexibility, direction: "0", rationale: "Social Contract incomes policy continued; no structural labour-market liberalisation (that awaited 1980)."}
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Reluctant adjustment under external constraint; doctrinal shift by necessity."}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Keynesian coalition implementing monetarist-adjacent targets under crisis."}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Monetary targeting adopted before Thatcher; often under-credited in standard narratives."}
references:
  - "UK Letter of Intent to IMF, 15 December 1976"
  - "Callaghan, Speech to Labour Party Conference, Blackpool, 28 September 1976"
  - "Burk & Cairncross (1992), 'Goodbye, Great Britain': The 1976 IMF Crisis"
  - "Hansard, Healey statements September-December 1976"
notes: "Pre-1996 sample extension. Coded as a distinct movement from Thatcherism: monetary-target adoption preceded the 1979 election, but labour-market and privatisation content did not."

name: Lee Kuan Yew + PAP founding-era Singapore (1955-1990)
countries:
- SGP
timeframe:
  start: 1955
  end: 1990
doctrine: 'Lee Kuan Yew and the People''s Action Party building Singapore''s social-insurance
  and savings architecture from the late-colonial period through full sovereignty. The Central
  Provident Fund, established under the 1953 ordinance and operational from July 1955, mandates
  joint employer-employee contributions to individual fully-funded accounts (initial combined
  rate 10%, scaling to peak rates above 40% in the 1980s), used progressively for retirement,
  housing-purchase under HDB, and later medical (Medisave) and tertiary-education uses. Stated
  case: replace tax-financed pay-as-you-go social spending with forced individual saving in defined-contribution
  accounts, contain the size of the central budget and transfer state, and align retirement, housing
  and health financing with personal-asset accumulation rather than open-ended entitlement, providing
  the third canonical forced-saving welfare model alongside Chilean AFP and Australian Superannuation.

  '

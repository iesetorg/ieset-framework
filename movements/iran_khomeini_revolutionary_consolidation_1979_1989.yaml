movement_id: iran_khomeini_revolutionary_consolidation_1979_1989
status: candidate
name: "Khomeini revolutionary consolidation — Islamic Republic founding, nationalisations, war economy"
countries: [IRN]
timeframe: {start: 1979, end: 1989}
coalition: "Islamic Republic Party (1979-87); Supreme Leader system under Khomeini"
leaders:
  - "Ayatollah Ruhollah Khomeini (Supreme Leader 1979-1989)"
  - "Abolhassan Banisadr (President 1980-1981, impeached)"
  - "Mir-Hossein Mousavi (Prime Minister 1981-1989 — war-economy architect)"
  - "Ali Khamenei (President 1981-1989)"
doctrine: >
  Founding decade of the Islamic Republic: constitution (December 1979)
  establishing velayat-e faqih, bank and insurance nationalisations
  (June 1979), large-industry nationalisations (July 1979), land-tenancy
  reform, oil-industry takeover and Western-asset freeze, and the
  Iran-Iraq War (September 1980 - August 1988) under full wartime
  command economy. Economic school: Islamic populism / revolutionary
  state capitalism — bonyads (religious foundations) absorbed Pahlavi-era
  conglomerate assets, rationing, subsidised consumer goods, and an
  import-substitution posture under war-enforced autarky. Left-right
  axis: redistributionist-left on economic content (nationalisation,
  welfare), clerical-right on social policy, anti-imperialist on
  external alignment — a distinctive ideological compound that does not
  map cleanly. Popularity / legitimacy: March 1979 referendum 98.2%
  yes to Islamic Republic; December 1979 constitutional referendum
  ~99% yes; 1980 and 1984 Majlis elections under controlled conditions
  consolidated IRP / clerical faction. Coherence: war exigency imposed
  strong internal discipline despite severe factional divides (statist
  Mousavi wing vs market/bazaar right wing); nationalisation programme
  remains largely intact today.
policies:
  - ir_1979_islamic_republic_constitution
  - ir_1979_bank_insurance_nationalisation
  - ir_1979_large_industry_nationalisation
  - ir_iran_iraq_war_economy_1980_1988
  - ir_bonyad_foundation_system_1979
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Bank and large-industry nationalisation eliminated private ownership in regulated sectors."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "War-imposed import licensing, FX controls, US sanctions from November 1979."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Wartime fiscal expansion combined with oil revenue collapse; large subsidy regime."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Expropriation of Pahlavi-associated assets and foreign firms; bonyads absorbed expropriated capital."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Revolutionary courts, 1988 prison executions; dual clerical-parliamentary structure."}
predecessor_movements: [iran_shah_pahlavi_late_era_1976_1979]
successor_movements: [iran_revolution_islamic_economy_1979_present]

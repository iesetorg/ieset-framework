# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_menem_first_term_1989_1995
status: candidate
name: "Menem PJ first term — Convertibility launch, privatisation, Pacto de Olivos"
countries: [ARG]
timeframe: {start: 1989, end: 1995, enacted_date: "1989-07-08"}
coalition: "Partido Justicialista (Peronist) — hyperinflation-emergency mandate"
leaders:
  - "Carlos Menem (President 1989-1999)"
  - "Miguel Ángel Roig / Néstor Rapanelli / Erman González / Domingo Cavallo (Economía; Cavallo from January 1991)"
  - "Roque Fernández (BCRA)"
  - "Eduardo Duhalde (Vice President then Buenos Aires Governor)"
doctrine: >
  Peronist volte-face into Washington-Consensus shock therapy under
  hyperinflation pressure. Five doctrinal pillars: (a) Convertibility
  Plan — Ley 23.928 of 27 March 1991 pegged 1 austral/peso to 1 US
  dollar, prohibited monetary financing of the fiscal deficit, and
  required 100% reserve backing; monthly inflation 196% (March 1990)
  → <1% (1995). (b) Reform of the State Law 23.696 (1989) and
  Economic Emergency Law 23.697 (1989) enabled mass privatisation:
  ENTel (telecoms, 1990), Aerolíneas, YPF (1993 IPO), Gas del
  Estado, Segba, state railways; over 60 major enterprises
  privatised, generating $18B proceeds. (c) Pacto de Olivos
  (November 1993) with Alfonsín — constitutional reform 1994
  allowing presidential re-election for one further term (enabling
  Menem 1995-99); reduced term from 6 to 4 years. (d) External
  integration — Mercosur co-founder (Treaty of Asunción 1991);
  Brady Plan debt restructuring 1993. (e) Pardons (Indultos, 1989
  and 1990) to ~277 military officers and Montoneros leaders ended
  Alfonsín's accountability path. Stated school: Chicago-monetarism
  + Washington Consensus + Peronist mobilisation-capacity.
  Left-right: economic right; populist-Peronist in style; socially
  conservative-Catholic. Popularity: May 1989 runoff 47.5% vs
  UCR's Angeloz 32.5% in hyperinflation-forced early transfer;
  after convertibility, midterms 1991 PJ 40.2%, 1993 PJ 42.3%;
  May 1995 re-elected first-round 49.9% vs FREPASO's Bordón 29.3%.
  Coherence: trade Peronist statist economic tradition,
  accountability path, and monetary sovereignty for
  hyperinflation-ending currency board, state-enterprise sale
  proceeds, and constitutional re-electability.
policies:
  - argentina_convertibility_plan_1991
  - ar_reform_of_state_privatisation_law_1989
  - ar_pacto_olivos_constitutional_reform_1994
  - ar_brady_plan_debt_restructuring_1993
  - ar_military_pardons_1989_1990
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Currency board rule-bound — BCRA forfeited discretionary policy; arguably strong on rule-independence from politics but surrendered policy capacity."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "Hyperinflation ended; inflation <5% from 1993."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "60+ major privatisations, mass deregulation 1991 Omnibus Decree 2284."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Unilateral tariff cuts; Mercosur; Brady reintegration."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Pardons of junta members; Supreme Court packed 5→9 (1990); Pacto de Olivos controversial."}
outcome_hypotheses: [currency_board_credibility_gain, hyperinflation_end_growth_effect]
predecessor_movements: [argentina_alfonsin_ucr_1983_1989]
successor_movements: [menem_convertibility_argentina_1991_2001]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: austrian, alignment: partially_aligned}
  - {position_id: post_keynesian, alignment: opposed}
references:

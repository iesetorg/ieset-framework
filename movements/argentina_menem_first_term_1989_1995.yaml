  - "Ley 23.696 (Reforma del Estado)"
  - "Ley 24.430 (Constitutional reform 1994)"
  - "Cavallo-Cottani (1997), Argentina's Convertibility Plan"
notes: "Pairs with umbrella menem_convertibility_argentina_1991_2001; this movement isolates the 1989-1995 term distinctly."

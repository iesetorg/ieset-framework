movement_id: china_tiananmen_austerity_1989_1992
status: candidate
name: "Tiananmen austerity and Deng's Southern Tour reset (China)"
countries: [CHN]
timeframe: {start: 1989, end: 1992}
coalition: "CCP under Li Peng (Premier) / Jiang Zemin (General Secretary from Jun 1989)"
leaders:
  - "Li Peng (Premier 1987-1998)"
  - "Jiang Zemin (General Secretary from 24 Jun 1989)"
  - "Chen Yun (elder, conservative planner)"
  - "Yao Yilin (Vice Premier, austerity architect)"
  - "Deng Xiaoping (paramount leader, Southern Tour Jan-Feb 1992)"
doctrine: >
  Post-Tiananmen retrenchment doctrine followed by Deng's Southern-
  Tour reset. Economic school: planned-economy conservatives (Chen
  Yun, Yao Yilin, Li Peng) regained agenda 1989-1991 emphasising
  'birdcage economy' price controls, SOE priority, and credit
  austerity after 1988 price-reform inflation (18.8% CPI 1988); Deng's
  Jan-Feb 1992 Southern Tour to Shenzhen/Zhuhai/Shanghai reset the
  line toward 'socialist market economy' codified at 14th Party
  Congress Oct 1992. Dated policies: Austerity and rectification
  programme Sep 1988-1991 (credit tightening, investment controls,
  price rollbacks); Tiananmen martial law 20 May 1989, clearance 4 Jun
  1989; Zhao Ziyang removed as General Secretary 24 Jun 1989;
  Shanghai Pudong New Area establishment Apr 1990; Deng's Southern
  Tour 18 Jan-21 Feb 1992; 14th Party Congress 12-18 Oct 1992
  adopting 'socialist market economy' as goal; Company Law drafting
  1992-1993. Left-right: planner-conservative CCP 1989-1991, pragmatic
  reform-accelerationist 1992. Popularity: regime-survival mode —
  1989 legitimacy crisis; 1992 Southern Tour restored reformist
  momentum, GDP 14.2% 1992, 13.9% 1993. Coherence: mixed — austerity
  was internally coherent; Southern Tour reset broke the conservative
  line decisively but produced overheating.
policies:
  - cn_austerity_rectification_1988_1991
  - cn_tiananmen_martial_law_1989
  - cn_shanghai_pudong_1990
  - cn_deng_southern_tour_1992
  - cn_14th_congress_socialist_market_1992
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: mixed, magnitude: moderate, rationale: "Credit austerity 1988-1991 tightened controls; Pudong opening and 1992 reset reversed direction sharply."}
  - {axis: regulatory.product_market_competition, direction: mixed, magnitude: moderate, rationale: "Price controls restored 1989-1990; 1992 Southern Tour reopened private-sector and SEZ expansion."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Tiananmen crackdown signalled limits of political liberalisation; purge of reformist faction."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Pudong SEZ + 14th Congress opening-up deepening; FDI tripled 1992-1993."}
  - {axis: monetary.monetary_expansion_direction, direction: mixed, magnitude: moderate, rationale: "Tight 1988-1991, very loose 1992-1993 driving 24% inflation peak 1994."}

movement_id: thailand_prem_tinsulanonda_semi_democratic_1980_1988
status: candidate
name: "Prem Tinsulanonda semi-democratic technocracy (Thailand)"
countries: [THA]
timeframe: {start: 1980, end: 1988}
coalition: "Rotating civilian-party coalitions under Prem as unelected PM, military/palace-backed"
leaders:
  - "Prem Tinsulanonda (PM 1980-1988, General)"
  - "Sommai Hoontrakul (Finance Minister)"
  - "Nukul Prachuabmoh (Bank of Thailand Governor)"
  - "Snoh Unakul (NESDB Secretary-General)"
doctrine: >
  Prem 'semi-democracy' doctrine — eight-year stable unelected-premier
  regime operating within 1978 Constitution's appointed-Senate
  architecture, legitimised by palace support and rotating civilian-
  party cabinets. Economic school: orthodox macroeconomic stabilisation
  + export-led industrialisation transition, World-Bank / IMF-aligned
  technocracy. Dated actions: survived 1 Apr 1981 'Young Turks' coup
  attempt and 9 Sep 1985 coup attempt; Fifth National Economic and
  Social Development Plan (1982-1986) and Sixth Plan (1987-1991)
  pivoting from import substitution to export promotion; baht
  devaluation 15 Jul 1981 (-8.7%) and 5 Nov 1984 (-14.8% after
  de-pegging basket); Board of Investment export-tax-holiday regime
  expansion 1983-1987; Eastern Seaboard Development Programme launched
  1982 with JBIC financing; oil-price windfall 1985-1987 and yen
  appreciation post-Plaza drove Japanese FDI surge 1986-1990; Chuan
  Leekpai Democrat/ Chart Thai / Social Action rotating cabinets;
  defeat of communist insurgency via Order 66/2523 amnesty; peaceful
  transition to elected Chatichai Choonhavan Aug 1988 after Prem
  declined fourth premiership. Left-right: centre-right palace-military-
  technocratic. Popularity: 1983 parliamentary election Social Action
  Party largest (92 seats of 324); 1986 Democrat Party largest (100
  seats); 1988 Chart Thai largest (87 seats) — coalition arithmetic
  placed Prem as premier each time. Coherence: high — macro stability
  (inflation averaged ~3% 1983-1988), export take-off (manufacturing
  exports overtook agriculture 1985), investment boom all reinforced.
policies:
  - th_fifth_nesdp_1982_1986
  - th_sixth_nesdp_1987_1991
  - th_baht_devaluation_1984
  - th_eastern_seaboard_programme_1982
  - th_boi_export_tax_holiday_regime_1983
  - th_order_66_2523_counterinsurgency_amnesty_1980
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Shift from import substitution to export promotion; BOI tax-holiday regime attracted FDI."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Eastern Seaboard Development petrochemical/port infrastructure; selective investment promotion."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "Bank of Thailand disciplined; inflation ~3% average; 1984 devaluation restored competitiveness."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Partial interest-rate liberalisation 1989 groundwork; BIBF prepared late-term."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Eight years of constitutional continuity; peaceful 1988 transition."}
predecessor_movements:

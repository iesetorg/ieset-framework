# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: australia_morrison_coalition_2018_2022
status: candidate
name: "Morrison Liberal-National Coalition — pro-business plus COVID fiscal 2018-2022"
countries: [AUS]
timeframe: {start: 2018, end: 2022, enacted_date: "2018-08-24"}
coalition: "Liberal Party of Australia - Nationals Coalition (Morrison ministry, from 24 August 2018; elected in own right 18 May 2019)"
leaders:
  - "Scott Morrison (Prime Minister, 24 Aug 2018 - 23 May 2022)"
  - "Josh Frydenberg (Treasurer)"
  - "Mathias Cormann → Simon Birmingham (Finance)"
  - "Angus Taylor (Energy and Emissions Reduction)"
  - "Philip Lowe (RBA Governor)"
doctrine: >
  Liberal-National centre-right pro-business and fiscal-consolidation
  platform that was forced into the largest peacetime fiscal expansion in
  Australian history by COVID-19, combined with a sharply elevated strategic
  posture toward China culminating in AUKUS. Left-right axis: centre-right
  with a suburban-aspirational marketing frame ("quiet Australians"), socially
  conservative on religious-freedom legislation but pragmatic on fiscal
  policy once the pandemic hit. Key policy content: (i) JobKeeper wage
  subsidy enacted 8 April 2020 at ~A$90bn, the largest single fiscal program
  in Australian history, paying flat-rate wage support to firms with
  turnover falls of 30%+, operative through 28 March 2021; (ii) JobSeeker
  Coronavirus Supplement doubling unemployment payments March-September 2020
  then tapered; (iii) HomeBuilder grant June 2020 — A$25,000 new-build and
  substantial-renovation grants, stimulating residential construction;
  (iv) Stage-2 and legislated Stage-3 personal tax cuts brought forward in
  October 2020 budget; (v) 2019 budget-surplus framing ("back in black")
  abandoned when pandemic hit, delivering successive deficits of A$134bn
  (2019-20) and A$213bn (2020-21); (vi) AUKUS trilateral security pact
  announced 15 September 2021 with conventionally armed nuclear-powered
  submarine pathway, cancelling the A$90bn French Attack-class contract;
  (vii) Religious Discrimination Bill withdrawn February 2022 after
  Coalition moderates crossed the floor; (viii) Technology Investment
  Roadmap October 2020 — low-emissions technology focus, avoiding
  economy-wide carbon price, with net-zero-by-2050 commitment adopted
  October 2021 ahead of COP26; (ix) major-bank levy maintained and
  banking Royal Commission response implementing 54 of 76 Hayne
  recommendations; (x) hard international border closure March 2020 -
  February 2022, including extended domestic internal-border closures.
  Popularity trajectory: won May 2019 election 77/151 seats on 41.4%
  primary against Shorten's higher-tax platform (the "miracle" win);
  approval peaked ~65% mid-2020 on COVID response, collapsed through
  2021-22 on vaccine-rollout delays, bushfire response, and internal
  Coalition division; defeated 21 May 2022, Coalition reduced to 58
  seats with six "teal" independents unseating Liberal moderates in
  blue-ribbon urban seats. Coherence line: pro-business fiscal-
  consolidation rhetoric plus emergency Keynesian pandemic response
  plus strategic-pivot AUKUS — "crisis-era Coalition pragmatism".
policies:
  - au_jobkeeper_2020
  - au_homebuilder_2020
  - au_aukus_2021
  - au_technology_investment_roadmap_2020
  - au_religious_discrimination_bill_2022
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "JobKeeper + JobSeeker supplement + HomeBuilder pushed deficit to A$213bn (2020-21), largest peacetime fiscal expansion."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Coronavirus Supplement roughly doubled unemployment payments March-September 2020; JobKeeper pass-through to workers."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Stage-2 and Stage-3 cuts brought forward in October 2020 budget flattened the income-tax schedule."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "HomeBuilder construction grant; Technology Investment Roadmap co-funding of low-emissions tech."}
  - {axis: regulatory.environmental_stringency, direction: "0", magnitude: weak, rationale: "Net-zero-by-2050 adopted October 2021 but without interim legislated target or price instrument; Safeguard Mechanism baselines held flat."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "China trade tensions (barley, wine, coal tariffs from Beijing) and hard pandemic border closure, partially offset by UK and India FTAs."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Hayne Royal Commission response implemented 54/76 recommendations; multi-ministry appointments revealed post-office framed by successor government as rule-of-law concern."}
predecessor_movements:
  - australia_turnbull_coalition_2015_2018
successor_movements:
  - australia_albanese_alp_2022_present
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Pro-business Stage-3 tax cuts welcomed; scale of pandemic fiscal expansion opposed."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "JobKeeper widely cited as textbook demand-side stabiliser in a pandemic."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed, notes: "Scale of transfer and wage-subsidy expansion viewed as moral-hazard and malinvestment-inducing."}
references:
  - "Coronavirus Economic Response Package (JobKeeper Payments) Act 2020"
  - "HomeBuilder Grant — Treasury Fact Sheet, June 2020"
  - "Joint Leaders Statement — AUKUS, 15 September 2021"
  - "Australia's Long-Term Emissions Reduction Plan, October 2021"
  - "Treasury Laws Amendment (A Tax Plan for the COVID-19 Economic Recovery) Act 2020"
notes: >
  Coded as distinct from Turnbull Coalition because (i) suburban-
  aspirational framing replaced small-l-liberal reformism, (ii) COVID
  fiscal response dominates the axis profile, and (iii) AUKUS is a
  first-order strategic pivot absent pre-2021.

movement_id: finland_katainen_six_party_2011_2014
status: candidate
name: "Katainen Kokoomus-led six-party coalition 2011-2014"
countries: [FIN]
timeframe: {start: 2011, end: 2014, enacted_date: "2011-06-22"}
coalition: "Kokoomus-SDP-Vihreät-Vasemmistoliitto-RKP-Kristillisdemokraatit (sateenkaarihallitus)"
leaders:
  - "Jyrki Katainen (Prime Minister, Kokoomus, 2011-2014)"
  - "Jutta Urpilainen (Finance Minister, SDP)"
  - "Paavo Arhinmaeki (Culture/Sport Minister, Vasemmistoliitto, until Mar 2014)"
doctrine: >
  The sateenkaarihallitus ("rainbow government") — an unprecedented
  six-party coalition spanning NCP to Left Alliance, formed after the
  2011 Perussuomalaiset shock and the Portuguese bailout dispute.
  Economic school: Nordic consolidation consensus under eurozone stress —
  corporate-tax cut from 24.5% to 20% (2014), repeated fiscal-adjustment
  packages, rejection of eurobonds, Finnish collateral demand on second
  Greek programme (Oct 2011). Structural policies: public-sector
  productivity programme, 'kuntauudistus' municipal merger reform
  (largely stalled), pension reform negotiations. Left-right: centrist
  grand-coalition with centre-right economic tilt. Dated policies:
  Greek-collateral agreement 2011, CIT cut 20% effective 1 Jan 2014,
  Vasemmistoliitto exit Mar 2014 over austerity. Katainen left June 2014
  for EU Commission Vice-Presidency; Stubb replaced him. Popularity:
  declining; SDP lost votes. Coherence: moderate, strained by wide
  ideological span.
policies:
  - fi_greek_collateral_agreement_2011
  - fi_cit_20_percent_2014
  - fi_municipal_merger_reform_2012
  - fi_universities_reform_2009

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: nicaragua_sandinista_1979_1990
status: candidate
name: "Sandinista revolutionary government (Nicaragua, first period)"
countries: [NIC]
timeframe: {start: 1979, end: 1990}
coalition: "Frente Sandinista de Liberación Nacional (FSLN)"
leaders:
  - "Daniel Ortega (Junta coordinator 1979-1985, President 1985-1990)"
  - "Jaime Wheelock (Minister of Agrarian Reform)"
  - "Henry Ruiz (Planning Minister)"
doctrine: >
  Revolutionary mixed-economy programme following the July 1979 overthrow
  of Somoza. Core content: expropriation of Somoza-family holdings and
  conversion into the Area of Public Property (APP), comprising roughly
  a quarter to a third of GDP; 1981 and 1986 agrarian-reform laws that
  transferred land to cooperatives and individual peasants; nationalisation
  of the banking system, foreign trade, and insurance; literacy and health
  campaigns; price controls on basic consumption goods; and a managed
  córdoba with progressively wider multiple exchange rates. The 1987
  Constitution formalised a mixed economy with recognised private,
  cooperative, and state sectors. External environment was dominated by
  the US-backed Contra war from 1981, the 1985 US trade embargo, and
  the withdrawal of US and multilateral financing. Defence spending rose
  above 20% of GDP; the fiscal deficit was monetised and inflation
  accelerated to hyperinflation levels peaking above 13,000% in 1988.
  The 1988 February and June stabilisation packages cut the deficit
  sharply but could not contain inflation in the Contra-war context.
  The movement ended electorally in February 1990 with the UNO
  victory under Violeta Chamorro. Framework records both the
  redistributive and social-service achievements (literacy, health-post
  expansion, land redistribution) and the macroeconomic collapse
  attributable to the combined effect of war, embargo, and fiscal
  dominance.
policies:
  - nicaragua_somoza_expropriations_1979
  - nicaragua_banking_nationalisation_1979
  - nicaragua_agrarian_reform_1981_1986
  - nicaragua_literacy_health_campaigns
  - nicaragua_foreign_trade_monopoly
  - nicaragua_1988_stabilisation
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Expropriation of Somoza holdings and subsequent land and firm takings; contested title situation persisted after 1990."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "APP state sector, foreign-trade monopoly, and price controls replaced large shares of private activity."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Large expansion of public health, literacy, and basic-goods subsidies."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Defence plus social spending pushed expenditure well above revenue capacity."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Direct monetisation of deficit; multiple exchange rates; hyperinflation by 1988."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "State monopoly on foreign trade; partially exogenous contribution from US embargo 1985-1990."}
outcome_hypotheses:
  - hyperinflation_requires_fiscal_dominance
  - war_economy_and_external_embargo_confounder
position_alignments:
  - {position_id: marxist_leninist, alignment: partially_aligned, notes: "FSLN self-identified as revolutionary and drew on Marxist analysis but formally preserved a mixed economy."}
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: democratic_socialist, alignment: partially_aligned}
references:
  - "Colburn (1990), Managing the Commanding Heights: Nicaragua's State Enterprises"
  - "Spoor (1994), Issues of State and Market: From Interventionism to Deregulation of Food Markets in Nicaragua"
  - "Ocampo (1991), Collapse and (Incomplete) Stabilization of the Nicaraguan Economy, NBER"
  - "Constitución Política de Nicaragua (1987)"
notes: >
  War and embargo are major exogenous confounders that any outcome
  analysis must address — effects cannot be attributed to the
  policy programme alone. Post-1990 Chamorro stabilisation and
  Ortega's return from 2007 are candidates for separate movement
  coding and not combined here.

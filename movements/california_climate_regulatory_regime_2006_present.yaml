movement_id: california_climate_regulatory_regime_2006_present
status: candidate
name: "California climate regulatory regime: AB 32 through SB 100 and SB 253"
countries: [USA]
scope: subnational
timeframe: {start: 2006, end: ongoing, enacted_date: "2006-09-27"}
coalition: "California Democratic legislative majority with early bipartisan signing (Schwarzenegger)"
leaders: ["Arnold Schwarzenegger (Governor 2003-2011)", "Jerry Brown (Governor 2011-2019)", "Gavin Newsom (Governor 2019-present)", "Mary Nichols (CARB Chair)", "Fran Pavley (AB 32 author)"]
doctrine: >
  Sub-national regulatory laboratory assembling a durable climate stack:
  AB 32 Global Warming Solutions Act (2006, 1990-level emissions target
  by 2020); SB 375 (2008, regional transport-land-use planning); AB 398
  (2017, cap-and-trade extension to 2030); SB 32 (2016, 40% below 1990
  by 2030); SB 100 (2018, 100% zero-carbon electricity by 2045);
  AB 1279 (2022, statewide carbon neutrality by 2045); Advanced Clean
  Cars II (2022, ZEV-only new vehicle sales by 2035, CARB waiver);
  SB 253 and SB 261 (2023, climate disclosure on large firms doing
  business in CA). Cap-and-trade is linked with Québec via WCI.
  California exercises Clean Air Act §209 waivers to set vehicle
  standards stricter than federal, adopted by ~17 other states — a
  genuine laboratory-of-federalism channel. Revocation and restoration
  of the CAA waiver across federal administrations (Trump I revoked
  2019; Biden restored 2022; Trump II moving to revoke again in 2025)
  is a live institutional contest over sub-national regulatory authority.
policies: [california_ab32_2006, california_sb100_2018, california_sb32_2016, california_cap_and_trade_2012, california_ab1279_2022, california_advanced_clean_cars_ii_2022, california_sb253_sb261_2023]
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Most stringent sub-national climate regime in the US; legally binding economy-wide targets plus sector mandates."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Cap-and-trade allocation, ZEV credit regime, disclosure rules function as sectoral licensing architecture."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Auction proceeds earmarked for climate investments via Greenhouse Gas Reduction Fund; EV rebates and grid-investment subsidies."}
  - {axis: regulatory.energy_supply_security, direction: "mixed", magnitude: moderate, rationale: "SB 100 grid transition has surfaced supply-reliability stress (August 2020 rolling blackouts, Diablo Canyon extension reversal 2022) — honestly coded as mixed rather than purely negative."}
outcome_hypotheses: [california_emissions_per_gdp_trajectory, california_industrial_electricity_price_vs_neighbors, sub_national_regulatory_lab_waiver_mechanism]
predecessor_movements: []
successor_movements: []
position_alignments:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: togo_gnassingbe_roadmap_reform_state_2020_present
status: candidate
name: "Gnassingbe Togo 2025 roadmap reform state 2020-present"
countries: [TGO]
timeframe: {start: 2020, end: ongoing, enacted_date: "2020-10-12"}
coalition: "Union pour la Republique (UNIR)"
leaders:
  - "Faure Essozimna Gnassingbe (President, then Council President)"
  - "Victoire Tomegah-Dogbe (Prime Minister, 2020-2025)"
  - "Sani Yaya (Minister of Economy and Finance)"
doctrine: >
  The UNIR governing bloc organized the post-2020 term around the Togo 2025
  roadmap: social inclusion, job creation, infrastructure modernization, and
  security-state continuity. The programme combines targeted social insurance
  and energy-access measures with roadmap investment coordination and a 2024
  constitutional redesign that shifts executive authority into a parliamentary
  Fifth Republic.
policies:
  - tg_togo_2025_government_roadmap_2020
  - tg_universal_health_insurance_law_2021
  - tg_tinga_electricity_access_fund_2021
  - tg_fifth_republic_constitution_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "The roadmap and social programmes require large public and public-private investment envelopes."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Universal health insurance and subsidized electricity access broaden household support."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Roadmap projects and Tinga channel targeted support to priority infrastructure and energy access."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: weak, rationale: "Electricity-access policy expands grid connection and reliability objectives."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "The Fifth Republic constitution centralizes national executive authority through a parliamentary council-president model."}
references:
  - "Republique Togolaise, Feuille de route gouvernementale Togo 2025."
  - "IMF Country Report No. 2024/299, Togo 2024 Article IV Consultation."
  - "Journal Officiel de la Republique Togolaise, Constitution de la Ve Republique, 2024."

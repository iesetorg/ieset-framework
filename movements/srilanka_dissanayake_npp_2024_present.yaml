# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: srilanka_dissanayake_npp_2024_present
status: candidate
name: "Dissanayake NPP — post-Aragalaya governance reset (Sri Lanka)"
countries: [LKA]
timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-09-23"
coalition: "National People's Power (NPP) — JVP-led alliance; parliamentary landslide 159/225 seats / 61.6% on 14 Nov 2024 (two-thirds super-majority); presidential 42.3% first-preference Sep 2024 won on second-preference redistribution"
leaders:
  - "Anura Kumara Dissanayake (President from 23 Sep 2024; JVP leader)"
  - "Harini Amarasuriya (Prime Minister from 24 Sep 2024)"
  - "Anil Jayantha Fernando (Deputy Minister of Finance)"
  - "Vijitha Herath (Foreign Minister)"
  - "Nandalal Weerasinghe (CBSL Governor, continuity)"
doctrine: >
  JVP/NPP left-populist reformist governing — first Marxist-rooted
  leadership in Sri Lankan history taking office via the ballot box
  after the Aragalaya delegitimised the two-party UNP/SLPP duopoly.
  Core policy content: (i) IMF EFF programme continuation with
  distributional reframing — 3rd review completed Feb 2025,
  primary-balance targets retained but wealth-tax debate,
  PAYE-threshold widening, and targeted Aswesuma cash-transfer
  expansion changed the composition of adjustment; (ii) 99-point
  anti-corruption platform — Anti-Corruption Act No. 9 of 2023
  operationalisation, CIABOC expansion, asset-declaration and
  beneficial-ownership registry, Proceeds of Crime Bill; (iii)
  SOE reform reframed from straight divestment toward 'public-wealth
  optimisation' — CEB and CPC retained in public ownership with
  corporatisation track, SriLankan Airlines restructuring-over-sale
  pivot; (iv) electricity-tariff reductions (Jan 2025) and fuel
  price-formula adjustments as disinflation flowed through; (v)
  foreign-policy non-alignment — balancing India (ETCA track),
  China (Hambantota operational status), and US/EU preference-
  scheme maintenance; (vi) cabinet of academics and first-time
  legislators, Amarasuriya as only the third female PM. Coherence
  line: Marxist-descent party operating within post-crisis IMF
  envelope, substituting distributional composition and anti-
  corruption institutional build-out for headline programme
  rupture. Popularity: Sep 2024 presidential 42.3% first-round
  (won on preferential count, 55.9% after redistribution); Nov 2024
  parliamentary 159/225 — largest single-party mandate since 1977;
  approval mid-60s in early-2025 IHP polling even as tariff reforms
  bit.
policies:
  - lk_imf_eff_2023
  - lk_npp_anti_corruption_platform_2024
  - lk_soe_reform_act_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "EFF primary-surplus targeting maintained; modest loosening at edges."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Aswesuma coverage expansion + PAYE-threshold widening."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Wealth-tax debate + threshold rebalancing shifts burden upward."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "SOE divestment pipeline paused in favour of corporatisation; limited net change."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Fuel and electricity formula adjustments continued with modest reductions."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-Corruption Act operationalisation + CIABOC strengthening + procurement digitisation."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "CBSL Act 2023 maintained; Governor continuity."}
outcome_hypotheses:
  - imf_stabilisation_program_effects
  - cash_transfer_poverty_effects
predecessor_movements:
  - srilanka_wickremesinghe_unp_2022_2024
position_alignments:
  - {position_id: democratic_socialist, alignment: aligned, notes: "Distributional reframing + anti-corruption + public-ownership retention."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Transfer expansion + progressivity shift within orthodox macro envelope."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "IMF programme continuity + independent CBSL maintained."}
references:
  - "NPP Manifesto 'A Thriving Nation, A Beautiful Life' (2024)"
  - "Election Commission of Sri Lanka — Presidential 21 Sep 2024 and Parliamentary 14 Nov 2024 results"
  - "IMF Country Report 25/XX — 3rd EFF Review (Feb 2025)"
notes: >
  Institutionally distinctive: first JVP-descent executive following
  two insurgencies (1971, 1987-89) the party itself led — and
  entering office via ballot-box landslide rather than street
  mobilisation. Coding under 'democratic_socialist' alignment
  rather than revolutionary-left given programmatic acceptance of
  IMF envelope and multi-party electoral competition.

movement_id: colombia_betancur_conservative_1982_1986
status: candidate
name: "Betancur Conservative — peace talks, Palace of Justice, cartel war"
countries: [COL]
timeframe: {start: 1982, end: 1986, enacted_date: "1982-08-07"}
coalition: "Partido Conservador Colombiano + 'Movimiento Nacional'"
leaders:
  - "Belisario Betancur Cuartas (President 1982-1986)"
  - "Edgar Gutiérrez Castro (Finance 1982-1984)"
  - "Roberto Junguito Bonnet (Finance 1984-1985)"
  - "Hugo Palacios Mejía (Finance 1985-1986)"
  - "Vicente Díaz Granados (Planning)"
doctrine: >
  Conservative government operating amid regional debt crisis, escalating
  cartel-violence, and attempted guerrilla peace negotiation. Four
  doctrinal pillars: (1) debt-crisis fiscal adjustment without IMF
  programme — the "Colombian Exception"; 1983-1985 voluntary fiscal
  consolidation cut public-sector deficit from 7.5% to 2.5% of GDP,
  maxi-devaluation of peso 1984-1985, and a quasi-IMF monitoring
  arrangement short of formal letter of intent preserved international
  creditor access without debt restructuring; (2) peace dialogue —
  Ley 35 de 1982 amnesty for political crimes; March 1984 Uribe
  Accord with FARC (truce to 1987); May 1984 ceasefire with M-19,
  EPL, ADO; Unión Patriótica (UP) founded 1985 as FARC civilian
  arm — later subjected to paramilitary extermination; (3) Palace
  of Justice siege — 6-7 November 1985 M-19 takeover of the
  Colombian Supreme Court killed 98 people including 11 of 25 magistrates;
  army retook building; Betancur's peace strategy collapsed; (4)
  Armero tragedy — 13 November 1985 Nevado del Ruiz eruption buried
  Armero town (~25,000 deaths); exposed civil-protection weakness.
  Escalating war with Pablo Escobar's Medellín cartel (Justice
  Minister Rodrigo Lara assassinated April 1984 led to US
  extradition-treaty activation). Stated school: Conservative
  moderate-reformist tradition + social-Catholic peace theology.
  Left-right axis: centre-right economic content, reconciliation-
  centre-left security posture. Popularity / legitimacy: May 1982
  election Betancur won 46.8% with Liberal vote split between
  López Michelsen (41.0%) and Galán's Nuevo Liberalismo (10.9%) —
  the first Conservative since 1946 when Liberals divided. Coherence
  line: trade IMF-programme orthodoxy and guerrilla-suppression for
  sovereign debt-management autonomy and political-negotiation peace
  strategy — peace strategy broke November 1985.
policies:
  - co_voluntary_fiscal_adjustment_colombian_exception_1984_1985
  - co_uribe_accord_farc_1984
  - co_amnesty_ley_35_1982
  - co_palace_of_justice_siege_1985
  - co_us_extradition_treaty_activation_1984
axes_summary:

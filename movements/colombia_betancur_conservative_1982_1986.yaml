  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "1982-83 import-licensing tightened; reversed 1985-86."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "Post-1984 maxi-devaluation and crawling peg acceleration."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Amnesty + peace process attempted; collapsed after Palace of Justice."}

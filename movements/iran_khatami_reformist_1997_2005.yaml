movement_id: iran_khatami_reformist_1997_2005
status: candidate
name: Khatami Reformist era — civil-society opening, Article 44 privatisation debate, Axis of
  Evil response, nuclear disclosure
countries:
- IRN
timeframe:
  start: 1997
  end: 2005
coalition: Dovom-e Khordad (2nd of Khordad) reformist front — Participation Front, Mojahedin of
  Islamic Revolution Organisation
leaders:
- Mohammad Khatami (President 3 August 1997 - 3 August 2005)
- Hossein Namazi / Tahmasb Mazaheri (Ministers of Economy)
- Mohsen Nourbakhsh (Central Bank Governor 1994-2003)
doctrine: 'Economic school: reformist liberalisation under conservative institutional resistance
  — attempted re-opening to FDI, privatisation under Article 44 principles, gradual exchange-rate
  unification. Left- right axis: centre-left in Islamic-Republic frame — civil-society liberalism,
  dialogue-of-civilisations foreign policy, moderate on economy. Dated policies: exchange-rate
  unification achieved 21 March 2002 (TSE single rate replacing multiple-rate system); Foreign
  Investment Promotion and Protection Act (FIPPA) passed 4 May 2002; buy-back oil contracts expansion
  (Total/Elf, Eni, Statoil 1995-2004); 18 Tir student protests 8 July 1999 (Tehran university
  raid); G.W. Bush "Axis of Evil" State of the Union 29 January 2002; NCRI disclosure of Natanz
  enrichment and Arak heavy-water plants August 2002 (nuclear programme exposed); Tehran Declaration
  with UK/France/Germany 21 October 2003 (voluntary IAEA Additional Protocol, enrichment suspension);
  Third Five-Year Development Plan 2000-2004 (privatisation targets, tax reform). Popularity:
  69.6% May 1997 landslide election; 77.1% re-election June 2001 on 67% turnout; 2004 Majlis disqualifications
  by Guardian Council and 2005 Ahmadinejad victory ended reform cycle. Coherence: moderate — presidential
  agenda blocked on multiple fronts by Guardian Council and Supreme Leader institutional power.

  '

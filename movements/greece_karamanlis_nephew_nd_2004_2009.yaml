movement_id: greece_karamanlis_nephew_nd_2004_2009
status: candidate
name: "Kostas Karamanlis ND centre-right government"
countries: [GRC]
timeframe: {start: 2004, end: 2009}
coalition: "ND (Nea Dimokratia)"
leaders:
  - "Kostas Karamanlis (PM)"
  - "Giorgos Alogoskoufis (Finance 2004-2009)"
  - "Dora Bakoyannis (Foreign 2006-2009)"
doctrine: >
  Economic school: nominal centre-right Euro-orthodoxy mixed with
  distributive clientelism; reform rhetoric outpaced delivery.
  Left-right axis: centre-right. Dated policies: Athens Olympics
  13-29 August 2004 delivery (with cost overrun from ~€4.6bn budget
  to ~€9-11bn); "statistical revision" October 2004 revealing prior
  Simitis-era deficit misreporting (2003 deficit revised from 1.7%
  to 4.6%) — Excessive Deficit Procedure 5 July 2004; public-sector
  wage increases 2005-2007; 2005 corporate tax cut from 35% to 25%;
  2006 pension system minor adjustments; tax amnesty 2004; banking
  sector partial privatisations (Emporiki sold to Crédit Agricole
  2006, Geniki to Société Générale 2004); 2007 re-election on
  wildfires amid August 2007 fire emergency; global-financial-
  crisis response 2008-2009; Piraeus Port partial concession to
  COSCO 2008; pension reform attempt 2008 (Lei Petralia) sparked
  strikes; state-bailout of local banks 2008 €28bn capital package;
  Siemens bribery scandal surfaced; deficit widened to ~15.6% by
  2009 (later revised) as fiscal deterioration accelerated.
  Popularity: 2004 ND 45.4% (landslide over PASOK); 2007 ND 41.8%
  (narrow); 2009 snap-election defeat ND 33.5% vs PASOK 43.9%.
  Coherence: low — reform rhetoric, fiscal deterioration,
  distributive clientelism, scandal accumulation. Post-2009 debt
  statistics revision triggered Greek debt crisis under successor.
policies:
  - gr_athens_olympics_2004
  - gr_statistical_revision_deficit_2004
  - gr_corporate_tax_cut_2005
  - gr_banking_privatisations_2004_2006
  - gr_pension_reform_petralia_2008
  - gr_cosco_piraeus_concession_2008
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Corporate tax rate 35% → 25% in staged reform 2005-2007."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Deficit widened from 4.6% (2003 revised) toward 15%+ (2009); Olympics cost overrun; pre-election transfers."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Siemens scandal and statistical-revision issues flagged governance weakness that later cascaded."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Banking privatisations; Piraeus Port concession."}
predecessor_movements: [greece_simitis_pasok_1996_2004]
successor_movements: [greece_samaras_nd_pasok_2012_2015]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: opposed, notes: "Fiscal deterioration and statistical credibility loss."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Tax cuts and partial privatisations."}
references:
  - "Eurostat EDP Notification October 2004"
  - "Nomos 3655/2008 (Petralia)"
notes: "The pre-crisis fiscal deterioration of 2007-2009 is causally upstream of the 2010 Greek debt crisis."

movement_id: kenya_moi_kanu_1978_2002
status: candidate
name: "Moi KANU era — Nyayoism, one-party state, IMF-SAP, belated liberalisation"
countries: [KEN]
timeframe: {start: 1978, end: 2002}
coalition: "KANU (Kenya African National Union) — de jure one-party from 1982, multiparty from 1992"
leaders:
  - "Daniel arap Moi (President 1978-2002)"
  - "Mwai Kibaki (Vice President 1978-1988, later 2002 successor)"
  - "Professor George Saitoti (Vice President / Finance Minister, multiple terms)"
doctrine: >
  Moi's KANU era (August 1978 - December 2002) dominated Kenya for 24 years,
  evolving through four phases: (i) 1978-82 'fuata nyayo' (follow in the
  footsteps) continuation of Kenyatta developmentalist mixed economy;
  (ii) 1982 constitutional amendment making KANU the sole legal party
  (de jure one-party state) following August 1982 attempted air-force
  coup; (iii) 1980s IMF Structural Adjustment (three SAL tranches 1980,
  1982, 1986) — maize-marketing deregulation, import-licensing cuts,
  fiscal consolidation; (iv) 1990s belated political liberalisation
  forced by donor pressure (Section 2A repealed December 1991, multiparty
  elections 1992, 1997, both won by Moi on split opposition). Economic
  school: patronage-authoritarian statism with intermittent IMF-imposed
  liberalisation. Left-right axis: authoritarian-centrist economically;
  politically right-authoritarian. Popularity / legitimacy: 1979
  single-party election (KANU 88% turnout), 1983 snap election post-coup
  cemented control; 1992 multiparty election KANU 36.4% presidential
  (split opposition); 1997 36.1%; 2002 succession election KANU lost
  to NARC with Kibaki (62%). Coherence: politically coherent
  (power-retention logic) but economically incoherent — SAP partial
  compliance, Goldenberg scandal (~$600m-$1bn) and chronic governance
  failure produced stagnation.
policies:
  - ke_section_2a_one_party_amendment_1982
  - ke_imf_sap_1980s
  - ke_nyayo_tea_zones_1986
  - ke_goldenberg_scandal_1991_1993
  - ke_multiparty_restoration_1991
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "SAP era import-licensing cut; coffee/tea marketing reforms."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Partial maize marketing liberalisation 1980s; state procurement retained."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "SAP-era cuts to parastatal subsidies; offset by politically-driven rent-allocation."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "1982 one-party amendment, detention without trial, Goldenberg-level corruption."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Land allocation politicised; ethnic clashes 1991-92 / 1997 displaced thousands."}

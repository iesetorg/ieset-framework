movement_id: peel_conservative_split_1846
status: candidate
name: Peel ministry + Corn Law repeal (UK 1841-1846)
countries:
- GBR
timeframe:
  start: 1846
  end: 1849
doctrine: 'Sir Robert Peel''s Conservative ministry, joined by the Whig opposition under Lord
  John Russell and free-trade campaigners Richard Cobden and John Bright of the Anti-Corn Law
  League, carrying the Importation Act 1846 to repeal the Corn Laws against the bulk of Peel''s
  own party. Provisions: phased reduction of duties on imported wheat over three years to a nominal
  1 shilling per quarter from February 1849, alongside companion reductions in tariffs on a wide
  schedule of agricultural and manufactured goods. Stated case: relieve the Irish Famine and British
  urban living costs by removing the protective grain tariff that had been in place since 1815,
  align fiscal and trade policy with classical political economy as articulated by Smith and Ricardo,
  and entrench free trade as the orienting principle of British commercial policy at the cost
  of splitting the Conservative party between Peelites and Protectionists.

  '
axes_summary:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  rationale: 'derived from 1 child policy: uk_corn_law_repeal_1846'
policies:
- uk_corn_law_repeal_1846
position_alignments:
- position_id: classical_liberal
  alignment: aligned
  notes: Corn Law repeal directly advanced free trade, lower tariffs, consumer welfare, and classical political economy arguments from Smith and Ricardo.
- position_id: austrian
  alignment: partially_aligned
  notes: The anti-protectionist free-trade logic aligns with later Austrian market-liberal conclusions, though the movement predates that school.
- position_id: ordoliberal
  alignment: partially_aligned
  notes: Repeal reduced privileged protection and moved toward rule-governed open competition, but it was not an ordoliberal constitutional program.
coalition: Conservative (Peelite faction) — Sir Robert Peel's second ministry. Corn Laws repeal
  split the party between Peelites (free-trade Conservatives, who later merged into the Liberal
  Party) and the protectionist majority that became the modern Conservative Party.
leaders:
- Sir Robert Peel (Prime Minister 1841-1846)
- William Ewart Gladstone (President of the Board of Trade 1843-1845, then Colonial Secretary;
  later Liberal PM)
- Sir James Graham (Home Secretary 1841-1846)
- Henry Goulburn (Chancellor of the Exchequer 1841-1846)

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: gabon_ctri_transition_institutional_reset_2023_present
status: candidate
name: "Gabon CTRI transition and institutional reset 2023-present"
countries: [GAB]
timeframe: {start: 2023, end: ongoing, enacted_date: "2023-08-30"}
coalition: "Committee for the Transition and Restoration of Institutions (CTRI)"
leaders:
  - "Brice Clotaire Oligui Nguema (transition president and president, 2023-present)"
  - "Raymond Ndong Sima (transition prime minister, 2023-2025)"
doctrine: >
  Gabon's CTRI framed the 2023 takeover as an institutional restoration after
  contested elections and long Bongo-family rule. Its transition programme
  created interim institutions, organized a national dialogue and constitutional
  referendum, and shifted fiscal governance toward greater state control and
  transparency over natural-resource and public-investment decisions.
policies:
  - gab_transition_charter_2023
  - gab_constitution_referendum_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "The charter and constitution created a transition-to-civilian framework while originating from a military takeover."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "The 2024 constitutional frame restored civilian constitutional institutions and formal checks after the transition period."}
references:
  - "Republic of Gabon, 2023 Transition Charter and 2024 constitutional referendum materials."
  - "African Union Peace and Security Council communiques on Gabon's transition."
  - "IMF, Gabon 2024 Article IV Consultation materials."

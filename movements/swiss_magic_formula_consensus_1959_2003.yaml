movement_id: swiss_magic_formula_consensus_1959_2003
status: candidate
name: Swiss Zauberformel consensus — 2-2-2-1 Federal Council stability era
countries:
- CHE
timeframe:
  start: 1959
  end: 2003
coalition: Zauberformel / magic formula — FDP 2 + CVP 2 + SP 2 + SVP 1 seats on seven-member Federal
  Council
leaders:
- Rotating Federal Councillors — no single PM; Federal President rotates annually among the seven
  Councillors
- 'Notable Councillors in period: Kurt Furgler (CVP), Willi Ritschard (SP), Georges-André Chevallaz
  (FDP), Pierre Aubert (SP), Leon Schlumpf (SVP), Otto Stich (SP, Finance 1986-1995)'
- Fritz Leutwiler (SNB President 1974-1984), Markus Lusser, Hans Meyer — SNB presidents during
  period
doctrine: 'Unique Swiss executive model — the 1959 "Zauberformel" distributed Federal Council
  seats 2 Christian-democrats (CVP) + 2 Free- democrats (FDP) + 2 Social-democrats (SP) + 1 Swiss
  People''s Party (SVP) until the 2003 reshuffle elevated SVP to two seats. School: Swiss "Konkordanzdemokratie"
  — direct-democratic consensus corporatism with exceptionally strong federalism (cantonal fiscal
  sovereignty), frequent referenda, and independent central bank (SNB) pursuing hard-Swiss-franc
  doctrine. Left-right axis: pragmatic centrist aggregate — the Council as a body sits near centre
  because it internalises left and right simultaneously; each Councillor runs their department
  with considerable autonomy. Key policy / structural features 1976-1985 subset: (i) annual Federal
  President rotation (ceremonial, "primus inter pares" among seven Councillors); (ii) referendum-driven
  economic policy — 1977 VAT (Mehrwertsteuer) proposal rejected, 1979 environmental article accepted,
  1982 prices-circulars-tariffs surveillance referendum accepted; (iii) 1978 SNB floating-franc
  unorthodox monetary targeting after breaking with the German-Mark ceiling; (iv) 1985 unemployment-
  insurance law mandatory; (v) exceptional 1970s-80s stability — growth below OECD average but
  inflation near zero, current-account surplus, and lowest post-war unemployment. Popularity signals:
  each Councillor re-elected by joint parliament with near-unanimous margins; federal turnout
  in referenda 30-50% is structurally lower because of frequency (3-4 rounds per year). Coherence:
  very high institutionally — Zauberformel was the most durable Western European government-formation
  rule of the 20th century; the consensus model insulated Switzerland from both Keynesian overshoot
  and monetarist austerity shocks.

  '

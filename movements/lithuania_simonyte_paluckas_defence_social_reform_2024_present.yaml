# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: lithuania_simonyte_paluckas_defence_social_reform_2024_present
status: candidate
name: "Lithuania defence financing and pension-choice reform 2024-present"
countries: [LTU]
timeframe: {start: 2024, end: ongoing}
coalition: "Simonyte Homeland Union-led government followed by Paluckas Social Democratic-led coalition"
leaders:
  - "Ingrida Simonyte (Prime Minister, 2020-2024)"
  - "Gintautas Paluckas (Prime Minister, 2024-present)"
doctrine: >
  Lithuania's recent reform cycle is dominated by the defence-financing and
  manpower response to Russia's war against Ukraine, combined with social-policy
  adjustment in the funded pension pillar. The package broadens national
  service obligations, raises dedicated defence revenue, and gives pension
  savers more exit and pause rights while preserving incentives to save.
policies:
  - lt_universal_conscription_reform_2024
  - lt_defence_fund_tax_package_2025
  - lt_second_pillar_pension_reform_2026
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence Fund financing and broader conscription support higher defence spending and reserve capacity."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "The Defence Fund package raises corporate tax burden to fund security needs."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Broader conscription constrains labour availability for covered cohorts."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Second-pillar reform loosens mandatory private-pension lock-in and gives participants more choice."}
references:
  - "Lithuanian Ministry of National Defence materials on conscription-system reform."
  - "Lithuanian Ministry of Finance materials on Defence Fund financing measures."

movement_id: deng_xiaoping_reforms_1978
status: candidate
name: Deng Xiaoping Reform and Opening
countries:
- CHN
timeframe:
  start: 1978
  end: 2012
coalition: CCP under Deng Xiaoping, then successors Jiang Zemin + Hu Jintao
leaders:
- Deng Xiaoping
- Zhu Rongji (premier 1998-2003, architect of SOE restructuring + WTO accession)
- Jiang Zemin
- Hu Jintao
doctrine: 'Phased market reforms while retaining CCP political monopoly. Rural household responsibility
  system 1978-1983; SEZs from 1980 (Shenzhen, Zhuhai); private enterprise legalisation mid-1980s;
  Zhu Rongji SOE restructuring + tax reform 1990s; WTO accession 2001. Outcome: ~10% annualised
  GDP growth 1980-2010; lifted ~800M out of poverty. Canonical counter-example to "Washington
  Consensus reform is only path to growth" — China liberalised idiosyncratically + sequentially,
  with state ownership retained in strategic sectors.

  '

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ireland_varadkar_fg_2022_2024
status: candidate
name: "Varadkar second FG-led term (Ireland, 2022-2024)"

countries: [IRL]

timeframe:
  start: 2022
  end: 2024
  enacted_date: "2022-12-17"

coalition: "Fianna Fáil + Fine Gael + Green Party rotating-Taoiseach coalition (Programme for Government, Our Shared Future, 27 June 2020); Varadkar rotated back into Taoiseach office 17 December 2022"

leaders:
  - "Leo Varadkar (Taoiseach, Fine Gael, December 2022 – April 2024)"
  - "Micheál Martin (Tánaiste + Foreign Affairs, Fianna Fáil)"
  - "Eamon Ryan (Environment, Climate and Communications, Greens)"
  - "Michael McGrath (Finance Minister, FF)"
  - "Paschal Donohoe (Public Expenditure, FG; Eurogroup President)"

doctrine: >
  Fine Gael-led second-rotation phase of the three-party coalition, continuing
  the pro-business centre-right MNC-FDI growth model with moderate
  social-liberal drift and EU-institutionalist posture, fused with Fianna Fáil
  housing delivery and Green climate programme. Positioned on the centre-right
  on economics (corporate-tax defence, pro-FDI, fiscal-rules adherence) and
  centre-left on social policy (follow-through on 2018 abortion referendum,
  hate-speech bill, pension and sick-pay expansion). Operated under the
  windfall corporation-tax surge that took exchequer receipts from €12bn
  (2020) to ~€24bn (2023), absorbed via the new Future Ireland Fund +
  Infrastructure, Climate and Nature Fund (Future Ireland Fund and
  Infrastructure, Climate and Nature Fund Act 2024). Key measures under
  Varadkar's second term: Budget 2023 (27 September 2022) €11bn cost-of-living
  + winter-energy package; Temporary Business Energy Support Scheme (TBESS);
  Housing for All revised targets and the Residential Zoned Land Tax;
  Finance (No.2) Act 2023 enacting OECD Pillar 2 15% minimum effective
  corporate tax from 1 January 2024; retention of hospitality 9% VAT
  temporarily (extended to Aug 2023 then returned to 13.5% Sep 2023);
  referenda on family and care (8 March 2024) — both defeated by ~67%/74%
  margins — a clear public rebuke that accelerated Varadkar's exit. Popularity:
  Fine Gael polled 18-22% through 2023; Varadkar personal approval ~35-40%
  declining to ~30% by early 2024; local and European election defeats loomed,
  and he resigned unexpectedly on 20 March 2024 citing "personal and
  political" reasons. Coherence judgement: internally coherent pro-MNC +
  rules-based-fiscal + social-liberal programme, operationally competent on
  windfall management but politically exhausted by housing crisis, referendum
  rebuke, and rising anti-immigration street protests (Dublin riot 23 November
  2023).

policies:
  - ie_oecd_pillar2_corporate_tax_2024
  - ie_housing_for_all_continuation_2024
  - ie_tbess_energy_subsidy_2022_2023
  - ie_future_ireland_fund_2024
  - ie_budget_2024_cost_of_living_package

axes_summary:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Core expenditure 6-7% growth; €11bn Budget 2023 package; TBESS + one-off cost-of-living payments recurring through 2023-24."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Finance (No.2) Act 2023 Pillar 2 QDMTT effective 1 January 2024; 12.5% headline preserved for smaller firms — net upward movement on large MNCs."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Energy credits, double-week welfare bonuses, working-family payment increases; statutory sick pay rollout (3→5 days, trajectory to 10); pension auto-enrolment legislated (2024 Act)."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    rationale: "Minimum wage €10.50 (2022) → €11.30 (2023) → €12.70 (Jan 2024); Low Pay Commission living-wage glide path adopted; sick-pay expansion."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: moderate
    rationale: "Climate Action Plan 2023 sectoral emissions ceilings; carbon-tax trajectory €48.50/t (2023) on path to €100/t; Green-led retrofit programme."
  - axis: regulatory.immigration_openness
    direction: "0"
    magnitude: weak
    rationale: "Critical-skills list widened; Ukrainian temporary protection continued; but accommodation system strained and protests prompted incremental asylum-processing tightening late 2023."

outcome_hypotheses:
  - corporate_tax_base_erosion_vs_base_broadening_oecd_pillar2
  - housing_supply_response_to_demand_side_transfers

predecessor_movements:
  - ireland_martin_ff_rotating_2020_2022
successor_movements:
  - ireland_harris_fg_2024_present

position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Transfer expansion + sick-pay + min-wage align; corporate-tax model does not."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Low corporate-tax legacy defended, but spending ratchet opposed."}
  - {position_id: eco_socialist, alignment: partially_aligned, notes: "Green-led climate plan delivered, but LNG / data-centre tensions unresolved."}

references:
  - "Programme for Government — Our Shared Future, 27 June 2020"
  - "Finance (No.2) Act 2023 (OECD Pillar 2 QDMTT)"
  - "Budget 2023 (27 September 2022); Budget 2024 (10 October 2023)"
  - "Future Ireland Fund and Infrastructure, Climate and Nature Fund Act 2024"
  - "Thirty-ninth and Fortieth Amendments referenda (Family and Care, 8 March 2024) — both defeated"

notes: >
  Dáil composition entering Varadkar's second rotation (Dec 2022): FF 37,
  FG 35, Greens 12 (84/160). Fine Gael 18-22% in Irish Times/Ipsos polls
  through 2023. Referendum defeats 8 March 2024: Family amendment rejected
  67.7% No; Care amendment rejected 73.9% No — the heaviest defeat of
  government-backed referenda in Irish history. Dublin riot 23 November
  2023 after Parnell Square stabbing exposed accommodation-system strain.
  Varadkar resigned 20 March 2024; succeeded by Simon Harris 9 April 2024.
  Programme best coded as centrist windfall-management with modest
  continuation of the post-2020 social-liberal drift.

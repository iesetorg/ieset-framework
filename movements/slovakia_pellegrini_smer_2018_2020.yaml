countries: [SVK]
timeframe: {start: 2018, end: 2020, enacted_date: "2018-03-22"}
coalition: "Smer-SD, SNS, Most-Hid (continued from Fico III)"
leaders:
  - "Peter Pellegrini (Prime Minister, Smer-SD, 2018-2020)"
  - "Peter Kazimir (Finance Minister 2018; then Ladislav Kamenicky from 2019)"
doctrine: >
  Post-Kuciak continuation government after Fico's forced resignation.
  Economic school: Smer-SD social-democratic transfer-expansion with
  damage-control institutional cleanup — 13th pension introduced Dec
  2019, minimum-wage continuing ramp, health-insurance unitary-system
  repackaged, reductions in VAT on foodstuffs, free rail travel for
  students/pensioners. Kuciak investigation progressed (Kocner
  indictments); justice-ministry reshuffle. Left-right axis: centre-left.
  Dated policies: 13th pension law 2019, foodstuff VAT cut to 10%
  Jan 2020. Popularity: Pellegrini personally popular but Smer lost
  Feb 2020 election to OLaNO-led anti-corruption coalition (Smer 18.3%,
  OLaNO 25.0%). Coherence: moderate — coalition held but lost public
  trust post-Kuciak.

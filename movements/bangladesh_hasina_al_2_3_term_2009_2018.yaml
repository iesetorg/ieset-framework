# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bangladesh_hasina_al_2_3_term_2009_2018
status: candidate
name: "Hasina Awami League second and third terms"
countries: [BGD]
timeframe: {start: 2009, end: 2018}
coalition: "Awami League-led Grand Alliance (Mohajote). 2008 election AL 230/300 landslide; 2014 BNP-boycotted election AL 234/300."
leaders: ["Sheikh Hasina (PM)", "Abul Maal Abdul Muhith (Finance)", "Dipu Moni (Foreign)", "Tofail Ahmed (Commerce)"]
doctrine: >
  Consolidation of Awami League dominance through a bundle of RMG export
  growth, rising remittance inflows, GDP-growth take-off to a sustained
  6-7% trajectory, and the "Digital Bangladesh" ICT-services push, paired
  with progressive tightening of political space via the Digital Security
  Act 2018 and disputed elections. Coherence line: developmentalism plus
  electoral dominance-with-institutional-capture. Economic strategy
  emphasised power-sector expansion (rental-power programme, Rampal coal),
  BIMSTEC / SAARC regional connectivity, export cash incentives, and
  social-safety-net scale-up (Vulnerable Group Development, old-age
  allowance, stipends). The Rana Plaza collapse in April 2013 triggered
  the Bangladesh Accord / Alliance factory-safety response and a Labour
  Act amendment in 2013. The 1971 International Crimes Tribunal (ICT)
  prosecutions became a core legitimacy instrument and a driver of
  opposition polarisation. Elections: 2008 free-and-fair AL landslide
  under caretaker; 2014 BNP-boycotted (AL 234/300 direct; turnout 40%);
  2018 "midnight election" (AL+allies 288/300, credibility widely
  contested). Set the institutional and macro scaffolding for the
  fourth-term consolidation that followed.
policies:
  - bd_digital_security_act_2018
  - bd_rana_plaza_labour_act_amendment_2013
  - bd_rmg_minimum_wage_2013_2018
  - bd_rental_power_quick_enhancement_2010
  - bd_ict_act_57_2013
  - bd_padma_bridge_self_financing_2012
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "ADP scale-up; power-sector capex."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Rental-power capacity payments; RMG cash incentives."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Safety-net scale-up (VGD, old-age, stipends) from low base."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "2013 Labour Act amendment expanded union rights post-Rana Plaza."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "ICT Act §57 and Digital Security Act 2018 criminalised online speech; disappearances rose."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Tariff rationalisation; LDC-graduation preparation."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Macro-institutional capacity grew; political-institutional quality declined."}
successor_movements: [bangladesh_hasina_al_fourth_term_2019_2024]
references:
  - "World Bank Bangladesh Development Update (various, 2010-2018)"
  - "ILO Better Work Bangladesh evaluations post-Rana Plaza"
  - "Riaz (2019), 'Voting in a Hybrid Regime: Explaining the 2018 Bangladeshi Election'"

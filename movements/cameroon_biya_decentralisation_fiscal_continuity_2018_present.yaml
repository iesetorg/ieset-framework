# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: cameroon_biya_decentralisation_fiscal_continuity_2018_present
status: candidate
name: "Biya decentralisation and fiscal-continuity programme 2018-present"
countries: [CMR]
timeframe: {start: 2018, end: ongoing, enacted_date: "2018-11-06"}
coalition: "Cameroon People's Democratic Movement (RDPC/CPDM)"
leaders:
  - "Paul Biya (President, 1982-present)"
  - "Joseph Dion Ngute (Prime Minister, 2019-present)"
doctrine: >
  Biya's post-2018 continuity programme has used limited decentralisation,
  Anglophone-region special status, and IMF-supported fiscal adjustment to
  preserve central-state stability while managing conflict, subsidy costs, and
  public-debt risks. It favors gradual institutional codification over broad
  political liberalization.
policies:
  - cmr_decentralisation_special_status_law_2019
  - cmr_imf_ecf_eff_2021
  - cmr_fuel_subsidy_price_adjustments_2023_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "The decentralisation code and IMF governance benchmarks codify formal administrative and fiscal rules."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The IMF programme and fuel-price adjustments reduce deficit and subsidy pressures."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Fuel-price increases lower the implicit fiscal subsidy to refined-fuel consumption."}
references:
  - "Republic of Cameroon, Law No. 2019/024 establishing the General Code of Regional and Local Authorities."
  - "IMF, Cameroon ECF/EFF and Article IV consultation materials, 2021-2026."

movement_id: italy_gentiloni_pd_2016_2018
status: candidate
name: "Gentiloni PD caretaker-continuity government 2016-2018"
countries: [ITA]
timeframe: {start: 2016, end: 2018, enacted_date: "2016-12-12"}
coalition: "PD + NCD + SC + AP (Renzi coalition minus Renzi himself)"
leaders:
  - "Paolo Gentiloni (PM)"
  - "Pier Carlo Padoan (Finance Minister, continuing)"
  - "Marco Minniti (Interior, migration)"
doctrine: >
  Continuity caretaker-reform PD government after Renzi resignation following
  Dec 2016 referendum defeat. Economic school: centre-left continuity of Renzi
  agenda with banking-sector clean-up emphasis. Signature actions: Monte dei
  Paschi di Siena precautionary recapitalisation (D.L. 237/2016, €20bn envelope,
  EU precautionary recap approved Jul 2017); Banca Popolare di Vicenza + Veneto
  Banca compulsory administrative liquidation (Jun 2017, transfer of good bank
  to Intesa Sanpaolo for €1 symbolic with €5.4bn state support); Minniti
  migration reforms and Libya-coast-guard co-operation sharply reducing central-
  Mediterranean arrivals from mid-2017; 'Rosatellum' electoral law (L. 165/2017)
  mixed proportional-majoritarian; incentives for ITA Industria 4.0 capex
  supersede/iperammortamento; 'APE' pension flexibility. Left-right:
  centre-left managerial. Popularity: Gentiloni personal approval ~45-55%
  (higher than Renzi); PD still fell to 18.8% in Mar 2018 vote vs M5S 32.7%
  and centre-right 37% (Lega 17.4% > FI 14.0%). Coherence: high managerial
  coherence; strategic limits — bought time but did not reverse M5S/Lega
  ascendancy triggered by the Renzi referendum and 2014-2017 migration wave.
policies:
  - it_mps_precautionary_recap_2017
  - it_veneto_banks_resolution_2017
  - it_rosatellum_electoral_law_2017
  - it_minniti_libya_migration_2017
axes_summary:

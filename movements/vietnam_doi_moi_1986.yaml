movement_id: vietnam_doi_moi_1986
status: candidate
name: Vietnam Đổi Mới (Renovation)
countries:
- VNM
timeframe:
  start: 1986
  end: ongoing
coalition: Communist Party of Vietnam (VI Congress, 1986, onward)
leaders:
- Nguyễn Văn Linh (General Secretary, 1986-91)
- Đỗ Mười
- Võ Văn Kiệt (PM)
- Phan Văn Khải (PM, WTO-era)
doctrine: 'Partial market-oriented reform programme adopted at the VI Party Congress (December
  1986) in response to stagnation, shortages, and hyperinflation following post-1975 collectivisation.
  Retains single- party political monopoly and state ownership of commanding heights while decollectivising
  agriculture (Resolution 10, 1988), legalising private enterprise, liberalising prices, unifying
  the exchange rate, and opening to trade and FDI. Subsequent reforms include SOE equitisation
  from the mid-1990s, bilateral trade agreement with the US (2001), WTO accession (2007), and
  CPTPP entry (2018). Outcome: sustained ~6-7% annualised GDP growth 1990-2019, poverty headcount
  from ~60% (1990) to under 5% (2020). Commonly paired with China''s 1978 reforms as a non-Washington-Consensus
  developmentalist reform path retaining party-state direction of strategic sectors.

  '
policies:
- vietnam_resolution_10_1988
- vietnam_enterprise_law_1999
- vietnam_soe_equitisation_1992_present
- vietnam_us_bta_2001
- vietnam_wto_accession_2007
- vietnam_doi_moi_1986
axes_summary:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Private enterprise legalised; price controls dismantled; entry barriers lowered.
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  rationale: Tariff reductions, US BTA, WTO accession, CPTPP.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  rationale: Land-use rights formalised (Land Law 1993); firm property recognised — though land
    ultimately remains state-owned.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: State-directed credit and SOE support retained in strategic sectors.
outcome_hypotheses:
- developmentalist_state_growth_performance
position_alignments:
- position_id: developmentalism
  alignment: aligned
- position_id: chicago_monetarism
  alignment: partially_aligned
  notes: Price liberalisation and trade opening consistent with orthodox prescriptions; retention
    of SOEs and directed credit inconsistent.
- position_id: market_socialist
  alignment: partially_aligned
references:
- 'Van Arkadie & Mallon (2003), ''Viet Nam: A Transition Tiger?'''
- 'Rama (2008), ''Making Difficult Choices: Vietnam in Transition'' (World Bank)'

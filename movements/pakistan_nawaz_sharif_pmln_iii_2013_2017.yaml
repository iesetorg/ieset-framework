# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_nawaz_sharif_pmln_iii_2013_2017
status: candidate
name: "Nawaz Sharif PML-N third term — CPEC launch and IMF stabilisation (Pakistan)"
countries: [PAK]
timeframe:
  start: 2013
  end: 2017
  enacted_date: "2013-06-05"
coalition: "Pakistan Muslim League-Nawaz (PML-N) single-party majority government, 190/342 National Assembly seats; military establishment partnership under COAS Raheel Sharif (2013-2016)"
leaders:
  - "Nawaz Sharif (Prime Minister 2013-2017, third non-consecutive term, ousted by Supreme Court 28 Jul 2017)"
  - "Ishaq Dar (Finance Minister 2013-2017)"
  - "Shahid Khaqan Abbasi (Petroleum Minister 2013-2017, PM Aug 2017-May 2018 after Sharif's disqualification)"
  - "Ahsan Iqbal (Planning and Development / CPEC lead minister)"
  - "Gen Raheel Sharif (COAS 2013-2016, Zarb-e-Azb architect)"
  - "Gen Qamar Javed Bajwa (COAS from Nov 2016)"
doctrine: >
  Centre-right business-establishment-orthodoxy programme from a
  Punjab-based industrial-mercantile party returning to power after
  a 2008-2013 PPP interregnum, combining (i) IMF-led macro-
  stabilisation — the $6.64bn Extended Fund Facility (Sep 2013) that
  pulled foreign reserves from under 2 weeks of import cover to ~5
  months, disinflation from ~8% to ~4%, and fiscal-deficit narrowing
  from 8.2% to 4.6% of GDP via GST rate widening and administrative
  measures; (ii) the flagship China-Pakistan Economic Corridor
  ($46bn initial envelope announced April 2015, later expanded to
  ~$62bn), front-loaded on energy (coal-fired Sahiwal, Port Qasim,
  LNG regasification terminals, hydro) to resolve the 12-18h/day
  load-shedding that had constrained industrial output for a decade;
  (iii) a reconciliation-then-rupture relationship with the military
  establishment, close coordination during Operation Zarb-e-Azb
  (Jun 2014-), the North Waziristan counter-terrorism operation
  displacing ~1m civilians and substantially reducing TTP operational
  tempo, but civil-military tensions over Dawn Leaks 2016 and the
  Panama Papers reference. Secondary policy content: GIDC gas-
  infrastructure-development-cess litigation, power-sector circular-
  debt management, Metro Bus / Orange Line Lahore urban transit,
  National Action Plan on terrorism (Dec 2014), Benazir Income
  Support Programme continuation from the PPP era without structural
  redesign. Coherence line: stabilisation + infrastructure + security
  under military partnership, ended by Supreme Court disqualification
  on 28 July 2017 (Panama Papers verdict) rather than electoral
  defeat. Popularity: 2013 election 32.8% vote / 166 directly-elected
  NA seats (majority with reserved seats); approval strong in Punjab
  through 2015, eroded 2016-17 under Panama Papers and Dawn Leaks
  controversies.
policies:
  - pk_imf_eff_6bn_2013
  - pk_cpec_launch_2015
  - pk_zarb_e_azb_2014
  - pk_national_action_plan_2014
  - pk_gst_widening_2013_2017
  - pk_gidc_cess_2015
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: moderate
    rationale: "Fiscal deficit narrowed from 8.2% to 4.6% of GDP 2013-2016 under IMF-EFF discipline before relaxation 2017."
  - axis: fiscal.tax_progressivity
    direction: "-"
    magnitude: weak
    rationale: "Revenue-raising led by GST widening and withholding taxes rather than direct-tax base expansion; net distributional effect regressive at the margin."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    rationale: "CPEC energy projects subsidised via sovereign guarantees, capacity payments, and upfront IPP tariffs."
  - axis: regulatory.trade_openness
    direction: "+"
    magnitude: weak
    rationale: "China-Pakistan FTA Phase 2 negotiations advanced; trade orientation eastward rather than tariff liberalisation overall."
  - axis: regulatory.energy_supply_security
    direction: "+"
    magnitude: strong
    rationale: "Generation capacity added ~10GW 2013-2018 via CPEC coal, LNG regasification, hydro; load-shedding substantially reduced by 2017."
  - axis: institutional.rule_of_law
    direction: "mixed"
    magnitude: weak
    rationale: "Zarb-e-Azb restored state writ in FATA; Panama Papers verdict removed a sitting PM by Supreme Court order, contested as politicised."
  - axis: institutional.judicial_independence
    direction: "mixed"
    magnitude: weak
    rationale: "Supreme Court asserted authority in Panama Papers; framing contested by PML-N as military-judicial alignment."
outcome_hypotheses:
  - imf_stabilisation_program_effects
  - infrastructure_investment_growth_effect
predecessor_movements:
  - pakistan_bhutto_nationalisations_1972_1977
successor_movements:
  - pakistan_khan_pti_2018_2022
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Pro-business orientation, IMF-programme adherence, privatisation rhetoric; undermined by dynastic patronage and administrative-state protectionism."}
  - {position_id: developmentalism, alignment: aligned, notes: "CPEC energy and infrastructure front-loading is classic state-directed infrastructure push."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Orthodox fiscal-monetary stabilisation under IMF conditionality."}
  - {position_id: democratic_socialist, alignment: opposed}
references:
  - "IMF Extended Fund Facility for Pakistan, 4 Sep 2013 ($6.64bn, 36-month)"
  - "CPEC framework, signed 20 Apr 2015 Beijing"
  - "Panama Papers case — Supreme Court of Pakistan judgment 28 Jul 2017 (Imran Ahmad Khan Niazi v Nawaz Sharif)"
  - "State Bank of Pakistan Annual Reports 2013-2017"
  - "Election Commission of Pakistan general election results 2013"
  - "National Action Plan (Dec 2014)"
notes: >
  Third non-consecutive Nawaz Sharif term. Earlier terms (1990-93,
  1997-99) coded separately if/when materialised. Ouster by judicial
  disqualification rather than parliamentary or electoral mechanism
  is institutionally distinctive and flagged on institutional axes.
  Successor Abbasi premiership (Aug 2017-May 2018) treated as
  continuity of this movement rather than separate coding.

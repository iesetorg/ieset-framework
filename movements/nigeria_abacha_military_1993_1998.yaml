movement_id: nigeria_abacha_military_1993_1998
status: candidate
name: "Abacha military — kleptocratic dirigisme, Ogoni Nine, sanctions and debt talks"
countries: [NGA]
timeframe: {start: 1993, end: 1998}
coalition: "Provisional Ruling Council (PRC) military government"
leaders:
  - "Sani Abacha (Head of State 17 November 1993 - 8 June 1998)"
  - "Anthony Ani (Finance Minister)"
  - "Paul Ogwuma (CBN Governor)"
doctrine: >
  Economic school: kleptocratic military dirigisme — partial reversal of
  Babangida-era SAP toward exchange-rate re-regulation and fiscal-populist
  adjustments coexisting with large-scale elite theft (Abacha family
  extractions later documented at $2-5bn across Swiss, Jersey, and Liechtenstein
  accounts). Left-right axis: mixed-statist — the 1994 budget re-pegged the
  naira at 22/USD (while parallel rate drifted to 80+), reintroduced import
  restrictions, and cut debt-service payments; but continued partial
  privatisation pipeline and oil-sector deregulation pilots. Dated policies:
  1994 dual-exchange-rate repeg; Vision 2010 plan (announced 1996);
  Ogoni Nine — Ken Saro-Wiwa and eight others hanged 10 November 1995
  triggering Commonwealth suspension and intensified sanctions; "SAP 2"
  partial liberalisation 1995-1997 (autonomous FX market, tariff adjustments);
  Paris Club arrears accumulation and debt-relief talks; Petroleum Trust
  Fund established 1994 under Buhari chairmanship. Popularity: no vote
  share; PRC military government; 1998 death (8 June) followed by
  Abubakar-led transition and 1999 democratic return. Coherence: low —
  partial re-regulation plus kleptocratic extraction plus human-rights
  reversal represented the canonical failure mode of military-dirigist
  resource-curse governance. GDP growth ~2-3%/yr despite oil revenues.
policies:
  - ng_dual_exchange_rate_1994
  - ng_ogoni_nine_execution_1995
  - ng_sap2_partial_liberalisation_1995_1997
  - ng_vision_2010_plan_1996
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Import restrictions reintroduced; parallel FX market penalised imports."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Dual exchange rate re-regulated FX market from SAP-era unification."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Ogoni Nine execution, Commonwealth suspension, systematic kleptocracy."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Elite predation on state assets documented in subsequent asset-recovery cases."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "PTF and Vision 2010 spending; debt service arrears accumulated."}

movement_id: lebanon_post_war_reconstruction_collapse_1992_2020
status: candidate
name: "Lebanon post-war reconstruction, pegged-currency regime, and 2019-2020 collapse"
countries: [LBN]
timeframe: {start: 1992, end: 2020}
coalition: "Successive consociational governments under the Taif Agreement; Hariri-led reconstruction bloc; Amal-Hezbollah-FPM blocs in later years"
leaders:
  - "Rafik Hariri (PM 1992-1998, 2000-2004)"
  - "Fouad Siniora (Finance Minister 1992-1998; PM 2005-2009)"
  - "Riad Salameh (Banque du Liban Governor 1993-2023)"
  - "Najib Mikati (PM multiple terms)"
  - "Saad Hariri (PM 2009-2011, 2016-2020)"
doctrine: >
  Post-civil-war reconstruction programme launched under PM Rafik Hariri
  centred on: (1) Solidere — 1994 law creating a joint-stock company with
  expropriation powers to rebuild Beirut Central District, financed by
  compulsory share issuance to pre-war property holders plus sales to new
  investors; (2) a de facto Lebanese pound peg to the US dollar at ~1507.5
  established from 1997, supported by high domestic interest rates and
  remittance-driven inflows; (3) large sovereign borrowing — public debt
  rose from ~50% of GDP in 1993 to >150% by 2006, among the world's highest;
  (4) a heavily bank-centric financial system whose balance sheet was
  dominated by claims on sovereign and on Banque du Liban; (5) extensive
  use by Banque du Liban from 2016 of "financial engineering" operations
  paying above-market rates to domestic banks for dollar inflows, effectively
  a Ponzi-adjacent structure to defend the peg without fiscal adjustment;
  (6) chronic electricity-sector losses at Electricité du Liban absorbed by
  the budget; (7) governance by sectarian quota under Taif, producing
  cabinet paralysis and blocked IMF-type structural reform repeatedly
  attempted (Paris I 2001, Paris II 2002, Paris III 2007, CEDRE 2018).
  The model collapsed in October 2019: protests triggered by a WhatsApp tax,
  bank runs, informal capital controls, sovereign default March 2020, and
  a currency collapse exceeding 95% against the dollar by 2023. IMF staff
  assessed 2020 output loss at ~25% — one of the sharpest non-war peacetime
  contractions on record.
policies:
  - lebanon_solidere_1994
  - lebanon_lbp_peg_1997
  - lebanon_sovereign_debt_accumulation_1992_2019
  - lebanon_bdl_financial_engineering_2016
  - lebanon_edl_subsidy_1992_2020
  - lebanon_default_march_2020
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "BdL became fiscal agent of record via financial-engineering operations; statutory independence undermined by the Ponzi-adjacent structure."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Debt-financed reconstruction plus chronic EdL losses and public-payroll growth; no sustained primary surplus."}
  - {axis: regulatory.financial_deregulation, direction: "mixed", rationale: "De jure Basel-compliant banking supervision; de facto captured by concentrated sovereign-credit exposure."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Sectarian quota governance blocked accountability; Beirut port explosion 2020 investigation repeatedly obstructed."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Highly concentrated sectors (telecoms duopoly, import cartels); entry barriers persistent."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Post-2019 informal capital controls (no statutory law) effectively expropriated dollar depositors; Solidere model itself had earlier raised expropriation concerns."}
outcome_hypotheses: [fixed_peg_without_fiscal_anchor_collapse_risk, rentier_financial_system_collapse]
position_alignments:
  - {position_id: chicago_monetarism, alignment: opposed, notes: "Peg without fiscal anchor is the canonical counter-case to the orthodox prescription."}
  - {position_id: developmentalism, alignment: opposed, notes: "Lacks developmentalist state-capacity substrate despite surface state-directed reconstruction."}
  - {position_id: institutionalism, alignment: aligned, notes: "Institutionalist reading — consociational quota system as veto-point structure blocking reform — fits the collapse narrative well."}
references:
  - "Gaspard (2004), A Political Economy of Lebanon 1948-2002"
  - "Chaaban (2016), 'I've Got the Power: Mapping Connections between Lebanon's Banking Sector and the Ruling Class'"
  - "IMF Article IV Lebanon, 2018, 2019; Lebanon Article IV 2023 staff consultation"
  - "World Bank (2021), 'Lebanon Economic Monitor: Lebanon Sinking'"
  - "Alvarez-Plata & Rutkowski (2020), Lebanon financial-engineering analyses"
notes: "Canonical failure case of a fixed-peg regime without fiscal-institutional anchor; complementary to the Israel 1985 success case and Argentina Convertibility failure."

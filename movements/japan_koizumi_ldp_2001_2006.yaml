# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_koizumi_ldp_2001_2006
status: candidate
name: "Koizumi LDP — supply-side structural reform and postal privatisation (2001-2006)"
countries: [JPN]
timeframe:
  start: 2001
  end: 2006
  enacted_date: "2001-04-26"
coalition: "LDP-Komeito-Conservative (later LDP-Komeito)"
leaders:
  - "Jun'ichirō Koizumi (PM 26 Apr 2001 - 26 Sep 2006)"
  - "Heizō Takenaka (Economic and Fiscal Policy, then Financial Services)"
  - "Sadakazu Tanigaki (Finance)"
  - "Masaru Hayami → Toshihiko Fukui (BoJ Governor, March 2003)"
doctrine: >
  LDP-reformist supply-side plus Takenaka financial reform — Koizumi
  campaigned on "structural reform without sanctuaries" and "no
  recovery without reform," explicitly breaking with Obuchi-Mori
  fiscal activism. Economic school: Anglo-Saxon-influenced supply-
  side liberalisation plus aggressive NPL resolution, inside a
  still-Keynesian BoJ QE monetary frame. Centre-right LDP but
  reform-hawk against old LDP zoku politicians and Tanaka faction.
  Key policy content: (i) Takenaka Plan October 2002 — bank NPL
  disposal programme forcing Resona Bank nationalisation June 2003
  and UFJ-Mitsubishi Tokyo merger 2005, NPL ratio fell from 8.4%
  (2002) to 2.9% (2005); (ii) BoJ Quantitative Easing under Fukui
  expanded reserve target from ¥5tn to ¥30-35tn by 2004, lifted
  March 2006; (iii) Postal Privatisation Law October 2005 splitting
  Japan Post into four successor companies (mail, savings, insurance,
  counter services) phased 2007-2017 — the signature reform, triggered
  August 2005 snap election after Upper House rejection; (iv) Iraq
  Special Measures Law July 2003 authorising SDF humanitarian
  dispatch to Samawah (non-combat role, 2004-2006); (v) road-related
  special-account and four expressway-corporation privatisation
  October 2005; (vi) trinity reform 2003-2006 — ¥4tn local-government
  tax transfer plus subsidy cuts; (vii) Yasukuni visits annually
  2001-2006 strained China and Korea relations. Popularity: sustained
  ~45-70% approval, LDP landslide in September 2005 snap election
  (296/480 seats) on postal privatisation mandate; handed off to Abe
  September 2006. Coherence line: supply-side structural reform plus
  QE accommodation plus banking clean-up — the cleanest doctrinal
  pivot away from Obuchi-Mori fiscal activism.
policies:
  - jp_takenaka_plan_2002
  - jp_postal_privatisation_2005
  - jp_boj_quantitative_easing_2001_2006
  - jp_iraq_special_measures_law_2003
  - jp_trinity_reform_local_finance_2003
  - jp_expressway_privatisation_2005
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Takenaka Plan forced NPL disposal and opened banking to M&A; Resona nationalisation reset capital rules."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Postal privatisation and expressway-corporation breakup opened state-controlled sectors to competition."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Trinity reform cut central subsidies; public-works budget trimmed vs Obuchi peak."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "BoJ QE expanded reserve target to ¥30-35tn (2004); first unconventional monetary regime at scale."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Snap-election route for postal privatisation asserted majoritarian-reform mandate over LDP factional veto."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Japan Post four-way split reduced state gating of postal-finance entry."}
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Postal and expressway privatisation are textbook liberal moves."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Takenaka bank-clean-up via forensic asset inspection and conditional capital injection."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "QE welcomed; structural-reform-first framing contested."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Supply-side reform applauded; QE malinvestment concern opposed."}
references:
  - "Postal Service Privatisation Act, October 2005"
  - "Cabinet Office, 'Program for Financial Revival' (Takenaka Plan), October 2002"
  - "BoJ Monetary Policy Meetings 2001-2006"
  - "Mulgan (2002), 'Japan's Failed Revolution: Koizumi and the Politics of Economic Reform'"
notes: >
  Koizumi's postal privatisation is treated as the signature reform
  despite staggered 2007-2017 implementation; subsequent reversals
  under Hatoyama captured in a separate policy block when created.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: zaire_mobutu_mpr_1965_1997
status: candidate
name: "Mobutu MPR resource-state authoritarianism"
countries: [COD]
timeframe: {start: 1965, end: 1997}
coalition: "Mouvement Populaire de la Revolution (MPR) single-party regime"
leaders:
  - "Mobutu Sese Seko"
doctrine: >
  Mobutu's Zairean state presented itself as a nationalist, anti-fragmentation
  project that would restore order after the Congo crisis, assert authenticity
  against colonial dependence, and use mineral wealth to finance national
  development. In practice its governing programme combined presidential
  centralisation, politicised ownership transfers, state control of the copper
  complex, and repeated monetary and fiscal improvisation under a patronage
  regime.
policies:
  - cd_gecamines_resource_state_1967
  - cd_zairianisation_1973
  - cd_monetary_fiscal_instability_1970s_1990s
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Zairianisation and discretionary reversals weakened secure ownership and contract expectations."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Personalist executive rule and politicised economic allocation displaced predictable legal administration."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Mining and strategic rents were concentrated through state enterprises and presidential allocation."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Fiscal dominance and repeated currency disorder undermined independent monetary management."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Late-regime monetisation and currency reforms were associated with very high inflation."}
references:
  - "Crawford Young and Thomas Turner, The Rise and Decline of the Zairian State"
  - "Janet MacGaffey, Entrepreneurs and Parasites"
  - "IMF country reports on Zaire/Democratic Republic of the Congo, historical summaries"
notes: "The movement spans the Mobutu regime; individual policy anchors mark distinct phases within the same governing settlement."

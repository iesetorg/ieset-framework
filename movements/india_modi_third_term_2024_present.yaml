doctrine: 'Continuation of the Hindutva-economic-nationalism doctrine from the 2014-2024 period
  but now under genuine coalition constraint after the BJP fell from 303 (2019) to 240 seats in
  the 543-seat Lok Sabha on 4 June 2024 — NDA total 293 — forcing reliance on TDP and JD(U) to
  govern. Economic school: supply-side manufacturing-push (PLI scheme continuation, semiconductor
  incentives, defence-indigenisation), welfare-transfer digitisation (JAM-trinity-based DBT, Ayushman
  Bharat expansion to all 70+), fiscal-consolidation path (FY26 deficit target ~4.4% of GDP),
  and infrastructure-capex continuity (~₹11.11 trillion capex in Union Budget 2024-25 and FY26).
  Economically right-of-centre (market-friendly on corporate, FDI, trade facilitation) combined
  with culturally hard-right cultural-legislation continuation — Waqf (Amendment) Act 2025 (Apr
  2025) restructuring Muslim religious- endowment boards, Uniform Civil Code push in Uttarakhand
  (enforced Jan 2025), One Nation One Election constitutional amendment bills tabled Dec 2024.
  Key first-year policies: New Income Tax Bill 2025 (simplified replacement for 1961 Act), Union
  Budget 2024-25 with personal income tax rationalisation under new regime, continued Vande Bharat
  / bullet-train / expressway capex, stake-sale programme for public-sector enterprises slowed
  by coalition politics. Popularity: BJP 36.6% vote share / 240 seats in 2024 (down from 37.4%
  / 303 in 2019); NDA aggregate ~46% / 293 seats; INDIA bloc 234 seats (INC up to 99 from 52).
  Modi approval remained net-positive through 2024-2025 (Morning Consult tracker ~55-60% approve)
  but below 2019 peak. State elections mixed: BJP won Haryana Oct 2024, Maharashtra Nov 2024,
  Delhi Feb 2025; lost Jharkhand Nov 2024. Coherence line: supply-side manufacturing + welfare-transfer
  digital rails + cultural-legislation push, now coalition-constrained so land / labour / farm
  reform is effectively off the table for the term.

  '

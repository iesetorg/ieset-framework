axes_summary:
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: weak
  rationale: New regime rationalisation lowers effective rates for middle brackets; standard deduction
    raised; old-regime progressivity preserved as optional.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: PLI scheme continuation across 14 sectors, India Semiconductor Mission second-phase
    approval, shipbuilding / component-manufacturing incentives.
- axis: fiscal.spending_level
  direction: mixed
  magnitude: moderate
  rationale: Capex held high (~3.4% of GDP) but fiscal-deficit glide path to 4.4% in FY26 keeps
    aggregate spending growth restrained.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: weak
  rationale: Ease-of-doing-business and compliance-reduction drives continue; Jan Vishwas 2.0
    decriminalisation bill tabled 2024.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: weak
  rationale: UK FTA signed May 2025; EU FTA talks ongoing; targeted tariff hikes on electronics
    and steel components offset.
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  rationale: Coalition constraint strengthens parliamentary checks relative to 2019-2024 majority;
    Waqf Amendment and UCC litigation ongoing.
- axis: institutional.judicial_independence
  direction: mixed
  magnitude: weak
  rationale: Collegium vs NJAC tension continues; no statutory change; executive-judicial friction
    over appointments publicly visible.

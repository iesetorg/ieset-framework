# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_progressive_era_reform_consensus_1901_1917
status: candidate
name: "US Progressive Era reform consensus"
countries: [USA]
timeframe: {start: 1901, end: 1917}
coalition: "Republican progressives under Roosevelt and Taft, followed by Wilsonian Democrats sharing administrative-state reform goals"
leaders:
  - "Theodore Roosevelt (President 1901-1909)"
  - "William Howard Taft (President 1909-1913)"
  - "Woodrow Wilson (President 1913-1921; prewar Progressive phase through 1917)"
  - "Robert M. La Follette (Progressive Republican organiser)"
  - "Louis Brandeis (anti-monopoly reform advocate; Supreme Court from 1916)"
doctrine: >
  The Progressive Era reform consensus aimed to replace late-Gilded-Age patronage,
  railroad concentration, financial fragility, and weak consumer protection with a
  more capable federal state. Across Roosevelt, Taft, and Wilson, the common thread
  was not party continuity but administrative reform: stronger federal oversight of
  rail and food/drug markets, anti-monopoly enforcement, a modern central-bank and
  payments architecture, and a new fiscal base through the federal income tax. The
  proponent case was that industrial capitalism had outgrown the 19th-century state,
  so competition and liberty now required public rules, expert administration, and
  national coordinating institutions rather than laissez-faire abstention.
policies:
  - us_pure_food_drug_act_1906
  - us_hepburn_act_1906
  - us_federal_reserve_act_1913
  - us_16th_amendment_income_tax_1913
  - us_ftc_clayton_competition_package_1914
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Food/drug standards and railroad/public-utility style oversight expanded federal gatekeeping over previously looser markets."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "FTC + Clayton package strengthened anti-monopoly enforcement even as some sectoral regulation became more rule-bound."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Federal Reserve creation regularised reserve management and crisis response relative to the fragmented National Banking era."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Federal Reserve System created a more autonomous monetary authority than ad hoc Treasury-centered crisis management, though independence remained partial."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: strong, rationale: "The 16th Amendment and 1913 income tax created a durable progressive federal-revenue instrument."}
references:
  - "Pure Food and Drug Act, 34 Stat. 768 (1906)"
  - "Hepburn Act, 34 Stat. 584 (1906)"
  - "Federal Reserve Act, 38 Stat. 251 (1913)"
  - "Sixteenth Amendment to the United States Constitution (ratified 1913)"
  - "Federal Trade Commission Act, 38 Stat. 717 (1914)"
  - "Clayton Antitrust Act, 38 Stat. 730 (1914)"
  - "Hofstadter (1955), The Age of Reform"
  - "Wiebe (1967), The Search for Order, 1877-1920"
notes: "Historical backfill anchor for the United States, moving atlas coverage from 1933 back to the start of the 20th century with a coherent administrative-state reform era rather than isolated statutes."

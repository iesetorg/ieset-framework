# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: india_constitutional_founding_mixed_economy_1947_1951
status: candidate
name: "Congress founding consensus - Constitution and mixed economy (India)"
countries: [IND]
timeframe: {start: 1947, end: 1951}
coalition: "Indian National Congress-dominated Interim Government, Constituent Assembly, and provisional Union government"
leaders:
  - "Jawaharlal Nehru (Prime Minister)"
  - "Vallabhbhai Patel (Deputy Prime Minister and Home Minister)"
  - "B. R. Ambedkar (Law Minister; Drafting Committee chair)"
  - "John Matthai (Finance Minister 1949-1950)"
doctrine: >
  The founding consensus of the Indian republic combined parliamentary
  constitutionalism with a planned mixed economy. Its proponents argued
  that a poor, partition-scarred, newly independent federation needed a
  strong constitutional centre, universal citizenship, an independent
  judiciary, and a state capable of directing industrialisation through
  planning and public-sector leadership while still leaving room for a
  private sector. The 1948 Industrial Policy Resolution, the 1950
  Constitution, and the Planning Commission institutionalised the basic
  architecture that later matured into the License Raj and Five-Year
  Plan order.
policies:
  - india_industrial_policy_resolution_1948
  - india_constitution_1950
  - india_planning_commission_establishment_1950
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "The Constitution created a durable republican legal order with justiciable fundamental rights and a parliamentary federal structure."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: strong, rationale: "The new Supreme Court and constitutional-review architecture gave the judiciary a strong autonomous role."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Industrial Policy Resolution 1948 and planning institutions established the template for state gatekeeping over strategic industry."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Planning Commission creation and public-sector developmental commitments increased the state's role in allocating investment."}
predecessor_movements:
  - india_late_raj_constitutional_devolution_1909_1947
successor_movements:
  - india_swadeshi_economic_nationalism_pre_1991
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Commitment to social citizenship and planned development overlapped with social-democratic state-building, though within a poorer postcolonial setting."}
  - {position_id: democratic_socialist, alignment: partially_aligned, notes: "Commanding-heights language and planning logic pointed toward democratic socialism without abolishing the private sector."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Strong constitutional protections aligned with liberalism; planning and industrial controls did not."}
references:
  - "Government of India Resolution on Industrial Policy, 6 April 1948"
  - "Constitution of India (adopted 26 November 1949; commenced 26 January 1950)"
  - "Cabinet Resolution establishing the Planning Commission, 15 March 1950"
  - "Austin (1966), The Indian Constitution: Cornerstone of a Nation"
  - "Panagariya (2024), The Nehru-Era Economic History and Thought and Their Lasting Impact"
notes: "Bridge movement linking independence-era constitution making to the longer pre-1991 developmental state."

movement_id: czech_republic_fischer_caretaker_2009_2010
status: candidate
name: "Fischer technocratic caretaker 2009-2010"
countries: [CZE]
timeframe: {start: 2009, end: 2010, enacted_date: "2009-05-08"}
coalition: "Technocratic caretaker after Topolanek loss of confidence Mar 2009"
leaders:
  - "Jan Fischer (Prime Minister, non-partisan technocrat, 2009-2010)"
  - "Eduard Janota (Finance Minister)"
doctrine: >
  Technocratic caretaker government installed to complete the Czech EU
  Council Presidency and shepherd a 2010 GFC consolidation package ("Janota
  package" / uesporny balicek) following the March 2009 fall of Topolanek
  on the confidence vote. Economic school: Czech technocratic budget-
  triage — mid-year 2009 fiscal package combining VAT/excise rate rises,
  PIT-base broadening, and expenditure cuts to arrest deficit blow-out
  (2009 deficit -5.5% of GDP). Left-right axis: neutral/technocratic.
  Dated policies: Janota package (uesporny balicek) Oct 2009, Lisbon
  Treaty ratification instruments Nov 2009 (Klaus signed 3 Nov 2009),
  H1N1 flu response. Popularity: high approval owing to non-partisan
  framing. Coherence: high — clear mandate, disciplined cabinet.
policies:
  - cz_janota_austerity_package_2009
  - cz_lisbon_treaty_ratification_2009
axes_summary:

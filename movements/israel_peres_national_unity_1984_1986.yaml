movement_id: israel_peres_national_unity_1984_1986
status: candidate
name: Peres National Unity government — July 1985 Stabilization Plan
countries:
- ISR
timeframe:
  start: 1984
  end: 1986
coalition: National Unity government (Labour + Likud + smaller parties) — rotation agreement
leaders:
- Shimon Peres (Prime Minister September 1984 - October 1986)
- Yitzhak Shamir (Foreign Minister, Prime Minister-designate under rotation)
- Yitzhak Modai (Finance Minister 1984-1986 — Likud)
- Michael Bruno (Bank of Israel Governor from 1986, principal stabilisation architect)
- Stanley Fischer (US Treasury adviser to plan)
doctrine: 'Peres-led National Unity government executed the July 1985 Economic Stabilization Plan
  — a textbook heterodox stabilisation combining hard nominal anchor (fixed exchange rate at 1.5
  NIS/USD), sharp fiscal consolidation (~7 percentage points of GDP deficit reduction), wage-price
  freeze coordinated with Histadrut, removal of subsidies, and a $1.5bn US emergency aid tranche
  contingent on the plan. Economic school: shekel-anchor heterodox stabilisation (Bruno-Fischer
  model) — broke inflation from 450% (annualised mid-1985) to ~20% by 1986 and sub-20% by 1987.
  Left-right axis: centrist cross-party compact; economically disinflationist and deregulatory-on-margin
  while preserving welfare core. Popularity: 1984 election produced Labour 44 / Likud 41 — rotation
  deal prevented either from ruling alone; stabilisation plan succeeded politically because both
  major parties owned it. Coherence: extremely high — sequencing (monetary anchor + fiscal cut
  + incomes policy + external aid) is the canonical stabilisation bundle.

  '
policies:
- il_stabilisation_plan_1985
- il_shekel_peg_1985
- il_1985_us_emergency_aid_package
- il_1985_indexation_reform
- israel_1985_stabilization_plan
axes_summary:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
  rationale: Deficit reduction of roughly 7 percentage points of GDP 1985-86.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  rationale: Removal of consumer subsidies — bread, fuel, transport — was central to the plan.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  rationale: Anchor regime + 1985 amendment barring Bank of Israel monetary financing of government
    deficits.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: strong
  rationale: Inflation fell from 450% to ~20% within 18 months.

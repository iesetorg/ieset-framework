# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_megawati_pdip_2001_2004
status: candidate
name: "Megawati Sukarnoputri — PDI-P-led secular-nationalist stabilisation (2001-2004)"
countries: [IDN]
timeframe:
  start: 2001
  end: 2004
  enacted_date: "2001-07-23"
coalition: "PDI-P with Golkar, PPP, PKB support — 'National Unity' cabinet formed after Gus Dur impeachment"
leaders:
  - "Megawati Sukarnoputri (President 23 Jul 2001 - 20 Oct 2004)"
  - "Hamzah Haz (VP, PPP leader)"
  - "Dorodjatun Kuntjoro-Jakti (Coordinating Minister for Economy)"
  - "Boediono (Finance from 2001)"
  - "Syahril Sabirin → Burhanuddin Abdullah (BI Governor, 2003)"
doctrine: >
  PDI-P secular-nationalist stabilisation plus IMF-exit and
  decentralisation implementation — Megawati, daughter of founding
  president Sukarno, framed her presidency as stabilising reformasi
  after Gus Dur's turbulence. Economic school: technocratic orthodox
  post-crisis stabilisation with centre-left nationalist overlay.
  Centre-left on economic distribution in rhetoric, centre-right
  on macro management and FDI openness in practice. Key policy
  content: (i) Bank Central Asia (BCA) divestment February 2002
  and Bank Niaga sale — IBRA asset-disposal programme; (ii) IMF
  programme exit December 2003 (Extended Fund Facility concluded,
  ~$9bn drawn); (iii) first direct presidential election amendment
  — Constitutional amendments III and IV 2001-2002 adding direct
  presidential election, Constitutional Court (Law 24/2003), KPK
  (Corruption Eradication Commission, Law 30/2002), Judicial
  Commission; (iv) Bali bombings 12 October 2002 — 202 dead,
  triggered anti-terror Perpu 1/2002 and 2/2002 enabling Detachment
  88 counter-terror unit; (v) decentralisation implementation under
  Law 22/1999 from January 2001 — 350+ districts gaining direct
  spending authority; (vi) sale of Indosat to STT/Temasek 2002
  (controversial strategic-asset sale); (vii) inflation stabilised
  from 12% (2001) to 6% (2004), rupiah from Rp 12,000/USD to Rp
  8,500/USD; (viii) 5.1% GDP growth 2004 — recovery path. Popularity:
  MPR selected her after Gus Dur impeachment (591 to 0); 2004
  direct election lost to SBY second round 39.4% vs 60.6%. Coherence
  line: stabilisation-and-institution-building — completed the
  reformasi constitutional architecture (direct election, MK, KPK)
  while managing IMF-exit macro.
policies:
  - id_constitutional_amendments_iii_iv_2001_2002
  - id_corruption_eradication_commission_kpk_2002
  - id_constitutional_court_law_2003
  - id_anti_terror_perpu_2002
  - id_imf_programme_exit_2003
  - id_ibra_bca_indosat_divestment_2002
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Constitutional Court, KPK, Judicial Commission all constituted under this government — canonical rule-of-law institution build."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: strong, rationale: "Constitutional Court Law 24/2003 established separate constitutional-review jurisdiction."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "IBRA disposal programme continued; BI consolidated supervisory role; prudential ratios tightened."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Indosat sale to Temasek, BCA to Farallon/Djarum; FDI opening continued; IMF-exit did not revert market opening."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Primary surplus maintained; debt-to-GDP fell from 77% to 56% 2001-2004."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "BI independence held against fiscal-dominance pressures; governor transition 2003 orderly."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "IBRA divestitures regularised ownership; direct presidential election amendment added democratic accountability."}
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "IMF-exit, strategic-asset disposal, and institutional-rule-of-law build core to classical-liberal agenda."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "KPK and Constitutional Court as measurable institution builds."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Indosat sale contested within nationalist-developmentalist strand of PDI-P."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Decentralisation extended social-service devolution; strategic-asset disposal contested."}
references:
  - "Law 30/2002 on KPK"
  - "Law 24/2003 on Constitutional Court"
  - "MPR Constitutional Amendments III (2001) and IV (2002)"
  - "IMF Country Report Indonesia 2004"
  - "Aspinall & Fealy (2003), 'Local Power and Politics in Indonesia'"
notes: >
  Megawati era is the constitutional-architecture build — the
  institutions enacted under her (MK, KPK, direct election)
  structurally defined subsequent governments' operating environment.

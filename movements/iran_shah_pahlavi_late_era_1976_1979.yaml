movement_id: iran_shah_pahlavi_late_era_1976_1979
status: candidate
name: "Shah late era — oil-boom overstretch, inflation, revolution"
countries: [IRN]
timeframe: {start: 1976, end: 1979}
coalition: "Imperial government (Rastakhiz Party one-party system from 1975)"
leaders:
  - "Mohammad Reza Pahlavi (Shah of Iran, 1941-1979)"
  - "Amir-Abbas Hoveyda (PM 1965-1977)"
  - "Jamshid Amouzegar (PM 1977-1978)"
  - "Shapour Bakhtiar (PM January-February 1979)"
doctrine: >
  Late-Pahlavi doctrine was oil-rent-financed forced modernisation —
  massive industrial investment, military spending, land reform continuation,
  and cultural Westernisation under imperial authoritarianism. Economic
  school: state-capitalist push modernisation — Fifth Plan (1973-78) nearly
  doubled post oil-shock, imported European and American plant at a pace
  outstripping absorption capacity, and generated runaway inflation (>25%
  by 1977). Amouzegar's 1977 'anti-inflation' austerity cut construction
  spending and bankrupted bazaar merchants, broadening the anti-Shah
  coalition. Left-right axis: right-authoritarian politically, statist-
  developmentalist economically; simultaneously anti-traditional (on family
  law, dress code) and pro-capital-accumulation. Popularity / legitimacy:
  1975 Rastakhiz mandatory one-party system ended even nominal pluralism;
  1977 Carter human-rights pressure forced a limited opening; by late 1977
  mass protests began, 1978 Black Friday and Cinema Rex fire galvanised
  opposition, and the Shah fled 16 January 1979 with Khomeini returning
  1 February. Coherence: low at the end — the forced-modernisation arc
  collided with clerical, bazaar, and intellectual opposition producing
  revolution.
policies:
  - ir_fifth_plan_doubling_1974_1978
  - ir_amouzegar_anti_inflation_austerity_1977
  - ir_rastakhiz_one_party_1975
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Post-1973 oil-shock plan doubling pushed public spending to ~40%+ of GDP."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Inflation exceeded 25% in 1977; oil-rent recycling overshot absorption."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Bazaar price-control crackdowns 1975-77 disrupted traditional mercantile networks."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "1975 Rastakhiz mandatory single party; SAVAK repression."}

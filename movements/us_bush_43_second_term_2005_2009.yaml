# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_bush_43_second_term_2005_2009
status: candidate
name: "Bush 43 second term — Katrina, Iraq surge, GFC+TARP"
countries: [USA]
timeframe: {start: 2005, end: 2009, enacted_date: "2005-01-20"}
coalition: "Republican (White House); split Congress post-2006 midterms"
leaders:
  - "George W. Bush (President 2005-2009)"
  - "Dick Cheney (VP)"
  - "Henry Paulson (Treasury 2006-2009)"
  - "Ben Bernanke (Fed Chair from Feb 2006)"
  - "David Petraeus (Iraq surge commander 2007)"
doctrine: >
  Bush 43's second term is remembered for three shocks that overwhelmed
  the "compassionate conservative" / ownership-society domestic agenda.
  (a) Economic school: supply-side tax cuts + deregulatory stance inherited
  from first term, pivoting in late 2008 to ad hoc financial-stabilisation
  statism under Paulson/Bernanke — TARP USD 700bn (Oct 2008), conservatorship
  of Fannie/Freddie (Sep 2008), Bear Stearns rescue via JPM (Mar 2008), AIG
  USD 85bn bridge (Sep 2008), but Lehman bankruptcy (15 Sep 2008) marked the
  point of no return. (b) Left-right: centre-right / right domestically;
  hawkish-interventionist on foreign policy (Iraq surge Jan 2007 +30k troops).
  (c) Dated policies: Katrina response Aug-Sep 2005, Deficit Reduction Act
  Feb 2006, Pension Protection Act Aug 2006, Iraq surge Jan 2007, Economic
  Stimulus Act Feb 2008 (rebates), HERA Jul 2008, TARP Oct 2008, auto
  bailout Dec 2008. (d) Popularity: won 2004 re-election 50.7% / 286 EVs;
  approval 50s early 2005, collapsed after Katrina + Iraq deterioration,
  floor ~25% by late 2008 — among lowest exit approvals on record. (e)
  Coherence: low — second term traded domestic reform ambition (Social
  Security privatisation failed early 2005, immigration reform failed 2007)
  for crisis management; revealed content pivoted from tax-cut continuity
  to the largest federal balance-sheet intervention since the New Deal.
policies:
  - us_katrina_response_2005
  - us_iraq_surge_2007
  - us_tarp_2008
  - us_bear_stearns_jpm_rescue_2008
  - us_fannie_freddie_conservatorship_2008
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "TARP + Iraq war + stimulus rebates; deficit to ~10% GDP FY2009."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Emergency interventions reversed prior deregulatory direction; Fannie/Freddie nationalised."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "GSE shareholders wiped; AIG dilution; political reallocation of losses."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Fed balance sheet expansion via emergency facilities Sep-Dec 2008 (TAF, PDCF, CPFF)."}
outcome_hypotheses: [financial_crisis_response_depth_of_recession, war_fiscal_cost_post_2008]
predecessor_movements: [us_bush_43_first_term_broad_2001_2005]
successor_movements: [us_obama_first_term_2009_2013]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Tax cuts aligned; TARP opposed by many on free-market right."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "TARP + Bernanke Fed aligned with crisis-Keynesian instrument set."}
  - {position_id: austrian, alignment: opposed, notes: "Opposed TARP + bailouts as moral hazard + malinvestment-preserving."}
references:
  - "Paulson (2010), On the Brink"
  - "Bernanke (2015), The Courage to Act"
  - "Financial Crisis Inquiry Commission Report (2011)"
notes: "Narrows broad us_bush_43_first_term_broad_2001_2005 to second term; GFC centre of gravity."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eu_reach_chemicals_2007
status: candidate
name: "EU REACH chemicals regulation and ECHA architecture"
scope: supranational
countries: [DEU, FRA, ITA, ESP, NLD, BEL, POL, SWE, IRL, AUT]
timeframe: {start: 2007, end: ongoing, enacted_date: "2006-12-18"}
coalition: "European Commission + Parliament + Council (Barroso I Commission)"
leaders: ["Günter Verheugen (Industry Commissioner)", "Stavros Dimas (Environment Commissioner)"]
doctrine: >
  Regulation (EC) 1907/2006 (REACH: Registration, Evaluation,
  Authorisation and Restriction of Chemicals) entered force 1 June 2007,
  replacing ~40 prior directives with a unified framework requiring
  manufacturers and importers to register substances produced or
  imported above 1 t/yr, with evaluation and authorisation duties for
  substances of very high concern (SVHC). Administered by the European
  Chemicals Agency (ECHA) in Helsinki. Staged registration deadlines
  2010/2013/2018 covered ~23,000 substances. Companion regulations:
  CLP (Classification, Labelling and Packaging, Regulation 1272/2008);
  PFAS restriction proposal 2023 (in ECHA committee process 2024-2025).
  Framework codes REACH as a strong sectoral-licensing movement with
  documented compliance-cost and offshoring implications: ex-post
  Commission and academic evaluations find benefits on human-health
  and environmental endpoints alongside measurable fixed-cost burden
  on SMEs (Commission REACH Review 2018; Becker et al. 2011 ex-ante;
  Koch and Ashford 2006). Third-country registration via Only
  Representatives created extraterritorial reach.
policies: [eu_reach_regulation_2007, eu_clp_regulation_2008, eu_pfas_restriction_proposal_2023, eu_chemicals_strategy_for_sustainability_2020]
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Largest chemicals-regulation overhaul in any major jurisdiction; shifts the burden of proof onto industry."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Registration / authorisation / restriction architecture is a full sectoral licensing regime."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Fixed per-substance registration cost (ECHA median c. €20k-€30k plus dossier assembly; much higher for higher tonnage bands) disproportionate for SMEs; some substance discontinuation documented."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Third-country producers require EU-based Only Representative; compliance cost on imports."}
outcome_hypotheses: [reach_compliance_cost_sme_exit, reach_innovation_substitution_effect, eu_chemicals_sector_investment_outflow]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned}
  - {position_id: eco_socialist, alignment: aligned}
  - {position_id: austrian, alignment: opposed}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "Regulation (EC) No 1907/2006 (REACH)"
  - "Regulation (EC) No 1272/2008 (CLP)"
  - "European Commission REACH Review, COM(2018) 116 final"
  - "ECHA PFAS restriction proposal (January 2023)"
notes: >
  REACH is the longest-running comparable EU compliance-cost natural
  experiment: data on registration volumes, SME exits, and substance
  substitution run from 2010 through 2018 deadlines. Useful calibration
  case for CSRD and AI Act compliance-cost hypotheses.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: lao_lao_pdr_socialist_planning_1975
status: candidate
name: Lao PDR Socialist Planning
countries:
- LAO
timeframe:
  start: 1975
  end: 1986
coalition: Lao People's Revolutionary Party
leaders:
- Kaysone Phomvihane
- Souphanouvong
doctrine: After the 1975 proclamation of the Lao People's Democratic Republic, the LPRP sought to consolidate one-party socialist rule, nationalise or control major economic activity, collectivise agriculture where feasible, and coordinate development through state planning and socialist-bloc assistance before the later New Economic Mechanism shifted policy toward markets.
policies:
- lao_bank_trade_nationalisation_1975
- lao_agricultural_collectivisation_1978
- lao_first_five_year_plan_1981
axes_summary:
- axis: institutional.property_rights
  direction: '-'
  magnitude: moderate
  rationale: Nationalisation and collectivisation weakened private control over capital and land use.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: strong
  rationale: State enterprises, procurement, and plans displaced private market allocation in major channels.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  rationale: Foreign trade was channelled through state controls and socialist-bloc relations.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Public planning, state enterprises, and aid-financed investment expanded the state's allocation role.
references:
- Martin Stuart-Fox (1997), A History of Laos
- Grant Evans (2002), A Short History of Laos
- "World Bank (1995), Lao PDR: Country Economic Memorandum"
notes: Ends at 1986 to separate the planning period from the New Economic Mechanism market reforms.

doctrine: 'Victor Paz Estenssoro''s MNR-led pact-of-democracy government (with Jeffrey Sachs as
  advisor) attacking hyperinflation through Decreto Supremo 21060 of August 1985: immediate unification
  and floatation of the boliviano exchange rate, removal of price controls, deep cuts to fuel
  and food subsidies, suspension of foreign debt service pending renegotiation, central-bank prohibition
  on financing the fiscal deficit, freeze and decentralisation of state mining enterprise COMIBOL,
  lifting of import tariff exemptions in favour of a uniform low tariff, and elimination of multiple
  exchange rates. Stated case: orthodox shock stabilisation to break inflation expectations, restore
  monetary credibility, dismantle the corporatist state-mining and price-control apparatus inherited
  from the 1952 revolution, and reopen Bolivia to international trade and capital.

  '

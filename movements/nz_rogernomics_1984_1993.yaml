movement_id: nz_rogernomics_1984_1993
status: candidate
name: Rogernomics + Ruthanasia (New Zealand radical liberalisation)
countries:
- NZL
timeframe:
  start: 1984
  end: 1993
coalition: Fourth Labour Government (1984-90) + National Government (1990-93)
leaders:
- David Lange (Labour PM)
- Roger Douglas (Labour Finance)
- Ruth Richardson (National Finance)
- Bill Birch
doctrine: 'One of the most thoroughgoing market-liberal reform programmes in any developed democracy.
  Removed agricultural subsidies, floated dollar, cut tariffs 40% → <10%, privatised SOEs (Telecom,
  airlines, postal bank, coal mine, BNZ), corporatised remaining public enterprises under SOE
  Act 1986, introduced zero-inflation-target legislation for Reserve Bank (1989) — world-first
  inflation-targeting central bank — Fiscal Responsibility Act (1994), Employment Contracts Act
  1991 decoupling from national awards. Enacted by Labour coalition (left-wing label) then continued
  by National. D.3.1 strong content-over-coalition case.

  '

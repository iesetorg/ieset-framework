movement_id: nigeria_babangida_military_1985_1993
status: candidate
name: "Babangida military — SAP-imposed neoliberalism, annulled June 12 1993 election"
countries: [NGA]
timeframe: {start: 1985, end: 1993}
coalition: "Armed Forces Ruling Council (AFRC) military government"
leaders:
  - "Ibrahim Babangida (Head of State 27 August 1985 - 26 August 1993)"
  - "Kalu Idika Kalu (Finance Minister 1985-1990)"
  - "Olu Falae (SFEM architect; Finance Minister later)"
  - "Chu Okongwu (Finance/Budget at various points)"
doctrine: >
  Economic school: SAP-imposed neoliberalism. Babangida rejected an IMF loan
  in 1986 after a "national debate", then implemented a World-Bank-designed
  Structural Adjustment Programme with substantially the same content —
  Second-Tier Foreign Exchange Market (SFEM, Sep 1986) that devalued the
  naira from ~1.1/USD to ~4/USD by year-end; trade liberalisation (abolished
  most import licences, cut tariffs); commodity-marketing-board
  abolition (1986) freeing cocoa and palm-oil prices; SOE privatisation
  (Technical Committee on Privatisation and Commercialisation from 1988);
  agricultural liberalisation. Left-right axis: strongly right of centre on
  content though delivered by military fiat, not liberal politics. Dated
  policies: SAP / SFEM Sep 1986; marketing-board abolition 1986;
  privatisation programme 1988-1993; Nigerian Deposit Insurance Corporation
  1988; 12 June 1993 presidential election won by MKO Abiola (SDP); election
  annulled by Babangida 23 June 1993; "stepped aside" 26 August 1993 handing
  to Interim National Government under Shonekan. Popularity: no legitimate
  mandate — military government; June 1993 annulment catastrophically
  destroyed what limited legitimacy remained and triggered pro-democracy
  mobilisation. Coherence: low — the structural-adjustment content was
  internally coherent but discredited by corruption (the Gulf War windfall
  of $12.4bn allegedly diverted per Okigbo Report 1994) and by the June 12
  annulment.
policies:
  - ng_sap_sfem_1986
  - ng_marketing_boards_abolition_1986
  - ng_privatisation_programme_1988_1993
  - ng_june_12_1993_election_annulment
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "SFEM devaluation, import-licence abolition, tariff cuts opened trade from closed ISI base."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Marketing-board abolition and SOE privatisation increased market entry sharply."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Axis semantic '-' = looser regulation: bank licensing liberalised; 100+ new banks; instability followed."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Input and commodity subsidies cut under SAP."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "June 12 1993 annulment of free election destroyed democratic legitimacy."}

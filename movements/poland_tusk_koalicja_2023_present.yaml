# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: poland_tusk_koalicja_2023_present
status: candidate
name: "Tusk KO-led centrist coalition — pro-EU rule-of-law restoration (Poland)"
countries: [POL]
timeframe: {start: 2023, end: ongoing, enacted_date: "2023-12-13"}
coalition: "Three-party coalition: Koalicja Obywatelska (KO, centre-liberal, led by Tusk's Platforma Obywatelska), Trzecia Droga (Third Way — Polska 2050 of Hołownia + PSL agrarian-centrist), and Lewica (the Left). Joint Sejm majority of 248/460 seats on Oct 2023 results (KO 157, TD 65, Lewica 26)"
leaders:
  - "Donald Tusk (Prime Minister, 2023-; previously PM 2007-2014 and European Council President 2014-2019)"
  - "Szymon Hołownia (Sejm Marshal 2023-2024 under rotation agreement; Polska 2050 leader)"
  - "Władysław Kosiniak-Kamysz (Deputy PM + Defence Minister; PSL leader)"
  - "Włodzimierz Czarzasty / Katarzyna Kotula (Lewica coalition principals)"
  - "Andrzej Domański (Finance Minister)"
  - "Adam Bodnar (Justice Minister + Prosecutor-General, former Ombudsman)"
  - "Andrzej Duda (President, PiS-aligned, in office until August 2025; veto role)"
  - "Karol Nawrocki (President from August 2025, PiS-backed, narrowly elected June 2025 — continuing cohabitation constraint)"
doctrine: >
  Centre-liberal pro-EU rule-of-law-restoration programme formed
  specifically to unseat PiS while preserving most of the social-transfer
  architecture the outgoing movement installed. Economic school:
  market-liberal and pro-European integrationist on regulatory posture
  and judicial independence, but explicitly redistribution-preserving
  on household transfers — KO campaigned on NOT removing 500+/800+,
  13th/14th pensions, and the Polski Ład PIT threshold. Content:
  (i) child benefit increased from 500 zł to 800 zł per child from
  January 2024 — enacted under PiS in 2023 but implemented under Tusk;
  (ii) unblocking of EU Recovery and Resilience Facility funds
  (~60bn euro envelope) achieved February 2024 on restoration of
  judicial-independence milestones — first tranche received April 2024;
  (iii) judicial reform programme under Justice Minister Adam Bodnar —
  separating Prosecutor-General from Justice Minister role (bill
  pending), KRS reconstitution, handling of 'neo-judges' appointed
  under PiS — complicated by presidential vetoes from Duda and from
  August 2025 Nawrocki; (iv) public-media restructuring December 2023
  (takeover of TVP, Polskie Radio, PAP via liquidation procedure —
  contested on legal form); (v) abortion-law liberalisation attempt —
  multiple bills 2024 on decriminalisation and 12-week access —
  blocked in coalition by PSL caveats and presidential veto;
  (vi) defence spending sustained at ~4.2% of GDP 2024, highest in
  NATO; continued large arms procurement (Korean K2 tanks, K9 howitzers,
  US HIMARS, Patriot). Popularity: entered office with ~50% coalition
  approval; EP elections June 2024 KO narrowly beat PiS (37.1% to
  36.2%) but below polling expectations; local elections April 2024
  PiS led marginally in voivodeship vote but KO held major cities;
  presidential election June 2025 lost by KO candidate Rafał
  Trzaskowski to Nawrocki (49.1% to 50.9%) — coalition-approval
  dropped below 40% by late 2025 under inflation fatigue and
  presidential-cohabitation gridlock. Coherence judgement: coherent
  on EU-integration and rule-of-law restoration axis but internally
  strained on cultural issues (abortion, LGBT rights), with
  implementation constrained by executive-vs-presidency veto dynamic
  through at least end of presidential term.
policies:
  - pl_800_plus_child_benefit_2024
  - pl_rrf_unblocking_rule_of_law_milestones_2024
  - pl_bodnar_judicial_restoration_2024
  - pl_public_media_restructure_2023_2024
  - pl_defence_spending_4pct_gdp_2024
axes_summary:

  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence spending sustained at NATO-leading ~4.2% of GDP 2024; general-government spending share held."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Partial alignment with EU Green Deal and ETS compliance; offshore-wind permit acceleration; no explicit coal-exit acceleration."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Restored EU single-market posture; RRF unblocked; agricultural-import controversy with Ukraine managed via quotas rather than closure."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Continued LNG/nuclear/Baltic Pipe strategy; Korean-reactor + Westinghouse nuclear plans progressed."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Executive-branch rhetoric affirmed NBP independence; attempted State Tribunal proceedings against Glapiński stalled in Sejm on coalition-internal split and constitutional-process concerns."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "RRF milestones judged met by Commission Feb 2024; Bodnar reforms opening KRS + Disciplinary successor + neo-judges process, though presidential veto binds final legislation."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Article 7 procedure closed May 2024; WJP scores stabilising."}
outcome_hypotheses:

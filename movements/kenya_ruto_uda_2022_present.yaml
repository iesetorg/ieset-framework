# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kenya_ruto_uda_2022_present
status: candidate
name: "Ruto UDA 'hustler-nation' government (Kenya)"
countries: [KEN]
timeframe: {start: 2022, end: ongoing, enacted_date: "2022-09-13"}
coalition: "Kenya Kwanza (UDA-led); broad-based government with Raila Odinga's ODM from Jul 2024"
leaders: ["William Ruto (President)", "Rigathi Gachagua (Deputy President 2022-Oct 2024, impeached)", "Kithure Kindiki (Deputy President from Nov 2024)", "Njuguna Ndung'u (Treasury CS 2022-Jul 2024)", "John Mbadi (Treasury CS from Aug 2024)", "Kamau Thugge (CBK Governor from Jun 2023)"]
doctrine: >
  The UDA "hustler-nation" platform combined Pentecostal-conservative social
  framing with a bottom-up economic narrative favouring MSMEs and agricultural
  producers over what Ruto called "dynasty" rentier capital. In office the
  fiscal programme turned sharply towards revenue mobilisation: the Finance
  Act 2023 (assented 26 Jun 2023) raised the top PAYE band to 35%, doubled
  VAT on petroleum to 16%, and introduced the 1.5% Affordable Housing Levy
  (Jul 2023, ruled unconstitutional Nov 2023, reinstated by Affordable Housing
  Act Mar 2024). The IMF EFF/ECF programme inherited from 2021 was repeatedly
  augmented; the 9th review concluded Oct 2024 and the programme closed early
  in 2025. Ruto won 50.49% in Aug 2022 against Raila's 48.85%, upheld by the
  Supreme Court. Gen-Z "Occupy Parliament" protests against the Finance Bill
  2024 culminated in parliament being stormed on 25 Jun 2024; Ruto withdrew
  the bill on 26 Jun 2024, dismissed most of cabinet on 11 Jul 2024, and
  formed a broad-based government incorporating ODM ministers. The Adani
  Group JKIA lease and Ketraco transmission deals were cancelled in Sep-Nov
  2024 after US indictments of Gautam Adani. Approval ratings fell from
  ~60% at inauguration to ~30% by end-2024 (TIFA polling).
policies:
  - ke_finance_act_2023
  - ke_affordable_housing_levy_2023
  - ke_finance_bill_2024_withdrawal
  - ke_broad_based_government_2024
  - ke_adani_jkia_cancellation_2024
  - ke_imf_eff_ecf_2021
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "35% top PAYE band added; but housing levy and SHIF are flat/regressive on net."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Affordable-housing programme and expanded social health insurance; offset by IMF-driven primary-balance tightening."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Fuel subsidy scrapped Sep 2022; fertiliser subsidy retained but narrowed."}
  - {axis: regulatory.product_market_competition, direction: "0", rationale: "Adani/JKIA cancellation removed concession, returned to status quo ante."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Abductions of protesters documented Jun-Dec 2024 (KNCHR); police response to Gen-Z protests criticised."}
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Revenue-first fiscal consolidation with pragmatic reversals under protest pressure."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Affordable-housing levy is state-led housing industrial policy financed by payroll tax."}
references:

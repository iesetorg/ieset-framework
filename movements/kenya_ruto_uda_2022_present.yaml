  - "Affordable Housing Act 2024 (Kenya), assented 19 Mar 2024"
  - "High Court of Kenya, Petition E181 of 2023 (housing levy ruling, Nov 2023)"
  - "IMF Kenya 9th EFF/ECF Review Staff Report (Oct 2024)"
  - "KNCHR (2024), Gen-Z Protest Monitoring Reports, Jun-Dec 2024"

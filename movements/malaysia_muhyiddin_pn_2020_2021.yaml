# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malaysia_muhyiddin_pn_2020_2021
status: candidate
name: "Muhyiddin Perikatan Nasional pandemic government (Malaysia, 2020-2021)"
countries: [MYS]
timeframe: {start: 2020, end: 2021, enacted_date: "2020-03-01"}
coalition: "Perikatan Nasional (Bersatu + PAS) with BN and GPS confidence-and-supply; formed via the 'Sheraton Move'"
leaders:
  - "Muhyiddin Yassin (Prime Minister, Bersatu)"
  - "Tengku Zafrul Aziz (Finance Minister, non-partisan technocrat)"
  - "Azmin Ali (Senior Minister for Economy, Bersatu)"
  - "Ismail Sabri Yaakob (Senior Minister for Security / Defence, UMNO; later DPM)"
  - "Hamzah Zainudin (Home Minister, Bersatu)"
doctrine: >
  Perikatan Nasional (PN) Bersatu + PAS + UMNO pandemic-response administration
  formed 1 Mar 2020 after the 'Sheraton Move' collapsed the Pakatan Harapan
  government — Muhyiddin's Bersatu faction and defecting PKR MPs under Azmin
  Ali allied with UMNO-BN and PAS to appoint Muhyiddin as seventh PM on a
  fragile ~113/222 majority that was never tested by a floor vote. Operational
  doctrine was COVID-19 emergency management: introduction of the MySejahtera
  digital contact-tracing and later vaccination-certificate app (April 2020);
  six fiscal packages totalling ~RM530bn (PRIHATIN RM250bn Mar 2020, PRIHATIN
  SME+ RM10bn, PENJANA RM35bn Jun 2020, KITA PRIHATIN RM10bn, PERMAI RM15bn,
  PEMERKASA RM20bn, PEMERKASA+ RM40bn, PEMULIH RM150bn Jul 2021); the Movement
  Control Order (MCO) lockdown regime (Mar-May 2020 MCO 1.0, Jan-Feb 2021 MCO
  2.0, Jun-Aug 2021 Full Lockdown); and — after losing UMNO's confidence in
  early 2021 — the Proclamation of Emergency 12 Jan 2021 (suspending Parliament
  until Aug 2021) purportedly on pandemic grounds but functionally shielding
  the PM from a confidence vote. Cash-transfer architecture (Bantuan Prihatin
  Nasional / Rakyat) reached ~11m households; EPF i-Lestari / i-Sinar / i-Citra
  withdrawal schemes allowed members to draw down ~RM145bn of retirement
  savings — a controversial emergency measure. Coherence judgement:
  credible initial pandemic fiscal-and-monetary response; digital-ID/tracing
  rollout exceptionally fast; institutionally damaged by the Emergency
  Proclamation and by the Sheraton Move origin itself, which vacated the
  2018 electoral mandate without a poll.
policies:
  - my_mysejahtera_2020
  - my_prihatin_penjana_pemulih_2020_2021
  - my_emergency_proclamation_2021
  - my_epf_i_withdrawal_schemes_2020_2021
  - my_mco_movement_control_order_2020
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "PRIHATIN + PEMULIH cash transfers (BPN/BPR) reached ~11m households; wage-subsidy programme covered ~2.7m workers; EPF hardship withdrawals ~RM145bn."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Six packages totalling ~RM530bn (gross) or ~RM83bn direct fiscal injection over 2020-21; 2020 deficit 6.2% of GDP, 2021 6.4%."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "BNM OPR cut 125bp to 1.75% (Jan-Jul 2020, record low); statutory reserve requirement cut; bond-market support facilities."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: weak, rationale: "MCO-era business-operation restrictions, sector-by-sector whitelisting under National Security Council SOPs."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Proclamation of Emergency 12 Jan 2021 suspended Parliament Jan-Aug 2021, blocking confidence-vote challenge; Emergency Ordinances issued by executive fiat."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Court operations continued; no direct court-packing, but Emergency Ordinance immunity provisions contested."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "MySejahtera check-in mandate and vaccination-certificate requirements for premises access (2021)."}
outcome_hypotheses:
  - pandemic_fiscal_stimulus_growth_effect
  - emergency_powers_institutional_damage
  - forced_retirement_drawdown_long_run_welfare
successor_movements: [malaysia_ismail_sabri_umno_2021_2022]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Pandemic fiscal-monetary stance defensible; EPF i-Lestari long-run retirement damage and Emergency-Proclamation misuse are the negatives."}
  - {position_id: ordoliberal, alignment: opposed, notes: "Deficit escalation and EPF drawdown criticised as eroding forced-saving pillar."}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Temporary Measures for Reducing the Impact of Coronavirus Disease 2019 (COVID-19) Act 2020 (Act 829)"
  - "Proclamation of Emergency 12 January 2021 and Emergency (Essential Powers) Ordinance 2021"
  - "Economic Stimulus Package announcements PRIHATIN (27 Mar 2020), PENJANA (5 Jun 2020), PEMULIH (28 Jun 2021)"
  - "BNM Annual Report 2020, 2021"
notes: >
  Dewan Rakyat at formation (Mar 2020, 222 seats from GE14 2018):
  Pakatan Harapan (PH) had won 113 in 2018 (PKR 47 incl. Azmin faction,
  DAP 42, Amanah 11, Bersatu 13); the Sheraton Move (23-29 Feb 2020) split
  Bersatu + Azmin's 11 PKR MPs out of PH and allied with UMNO 39, PAS 18,
  GPS 18, others — giving Muhyiddin a claimed ~113-115 majority that was
  never floor-tested. Confidence eroded through 2021 as UMNO's Court
  Cluster (Zahid, Najib) pushed for UMNO-led government; 8 UMNO MPs
  including Ahmad Zahid withdrew support 7 Jul 2021, and Muhyiddin
  resigned 16 Aug 2021 having conceded in a 13 Aug speech that he had
  lost the majority. Merdeka Center approval: ~69% Aug 2020 (pandemic
  rally-round effect), ~42% Jul 2021 (Delta wave + Emergency backlash).
  The PN government produced no general-election test — dissolution and
  GE14-to-GE15 gap extended from 2018 to Nov 2022. Core institutional
  legacy: MySejahtera digital-ID infrastructure (~38m registrations peak)
  and the EPF drawdown that left ~6.1m members with under RM10,000 in
  retirement balance by end-2021.

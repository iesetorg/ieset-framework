# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: israel_netanyahu_likud_fifth_term_2020_2021
status: candidate
name: "Netanyahu V emergency unity government (Israel)"
countries: [ISR]
timeframe:
  start: 2020
  end: 2021
  enacted_date: "2020-05-17"
coalition: "Likud-Blue White rotation-agreement unity government with Gantz as designated alternate-PM; Shas, UTJ, Labor-Gesher-Meretz, Derech Eretz"
leaders:
  - "Benjamin Netanyahu (Prime Minister 17 May 2020 - 13 Jun 2021)"
  - "Benny Gantz (Alternate PM and Defence Minister)"
  - "Israel Katz (Finance Minister)"
  - "Yuli Edelstein / Yuval Steinitz (ministers)"
  - "Amir Yaron (BoI Governor)"
doctrine: >
  COVID-emergency unity government running large fiscal stimulus, vaccination
  sprint, and Abraham Accords normalisation. Economic school: emergency
  Keynesian expansion layered over Likud market-liberal base — ~NIS 200bn
  COVID package (unemployment grants, business-closure compensation, one-off
  citizen payments), BoI QE programme, NIS strength-driven FX interventions.
  Dated policies: Abraham Accords UAE 13 Aug 2020, Bahrain 11 Sep 2020,
  Sudan Oct 2020, Morocco 10 Dec 2020; Pfizer vaccination-data-for-supply
  deal Jan 2021 making Israel world-leading vaccination rate by Mar 2021;
  COVID economic plan NIS 103bn (March 2020), expansions through 2020-2021.
  Left-right: unity government — economic-centre emergency stimulus,
  Netanyahu-right security/diplomacy lead. Popularity: Netanyahu approval
  spiked on vaccine rollout then fell; 2021 Mar 23 election produced no
  majority, leading to Bennett-Lapid change-coalition Jun 2021. Coherence:
  low — rotation agreement broke down repeatedly over budget approval
  (no 2020 or 2021 state budget passed), triggering fourth election within
  two years.
policies:
  - il_covid_emergency_package_2020
  - il_abraham_accords_israel_2020
  - il_vaccine_data_deal_2021
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Emergency COVID package ~NIS 200bn pushed deficit to ~11.6% 2020."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "One-off citizen grants, furlough extension, business closure compensation."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Abraham Accords normalised trade/tourism with UAE, Bahrain, Morocco, Sudan."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "BoI first QE bond purchases announced 23 Mar 2020."}
outcome_hypotheses: [covid_fiscal_response_effectiveness]
predecessor_movements: [israel_netanyahu_likud_third_fourth_term_2013_2019]
successor_movements: [israel_bennett_change_coalition_2021_2022]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Emergency fiscal-monetary co-expansion."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Abraham Accords opened trade/investment channels; domestic market-liberal continuity."}
references:
  - "Abraham Accords Declaration (13 Sep 2020)"
  - "Bank of Israel COVID monetary-policy reports 2020-2021"
  - "Israel Ministry of Finance COVID package documentation"
notes: "Rotation agreement failed twice over budget; movement bracketed Netanyahu V tenure until Jun 2021 handover."

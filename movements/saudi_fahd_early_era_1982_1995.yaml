movement_id: saudi_fahd_early_era_1982_1995
status: candidate
name: "King Fahd early era — oil-glut adjustment, riyal peg, Gulf War financing"
countries: [SAU]
timeframe: {start: 1982, end: 1995}
coalition: "Al Saud; King Fahd as first 'Custodian of the Two Holy Mosques' (title adopted 1986)"
leaders:
  - "King Fahd bin Abdulaziz (1982-2005)"
  - "Crown Prince Abdullah bin Abdulaziz"
  - "Hisham Nazer (Oil Minister from 1986 replacing Yamani)"
  - "Hamad Al-Sayari (SAMA Governor from 1983)"
doctrine: >
  Fahd's early-reign doctrine shifted from Khalid-era boom-spending to a
  defensive fiscal-and-monetary consolidation forced by the 1986 oil glut
  (Brent below $10) and the cost of the 1990-91 Gulf War. Economic school:
  conservative rentier-state management — pegged riyal (3.75/USD formalised
  June 1986) anchored by SAMA reserves, deficit financing via government
  development bonds from 1988, phased subsidy rationalisation, and a pause
  on mega-project spending. Left-right axis: right-of-centre on fiscal
  discipline (cut capital spending roughly in half 1983-87) but strongly
  statist on sectoral subsidy, Saudisation, and clerical-alliance social
  policy. Popularity / legitimacy signals: no vote share; adoption of
  'Custodian of Two Holy Mosques' title (1986) and large Gulf-War-era
  subsidies to citizens ($4bn one-off bonuses 1990-91) signalled regime
  anxiety; 1992 Basic Law of Governance and Consultative Council (Shura)
  establishment responded to post-Gulf-War petitions from both liberal and
  Sahwa clerics. Coherence: held the peg and fiscal accounts together
  through two oil downturns and a major war — a disciplined defensive
  programme, though at the cost of postponing structural diversification.
policies:
  - sa_riyal_peg_formalisation_1986
  - sa_government_development_bonds_1988
  - sa_basic_law_shura_1992
  - sa_gulf_war_citizen_bonus_1991
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "SAMA professionalisation and peg discipline post-1986."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Capital-spending retrenchment 1983-87 after oil-price collapse."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Incremental trimming of consumer and industrial subsidies, without removing them."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "1992 Basic Law of Governance codified succession and governance rules formally."}

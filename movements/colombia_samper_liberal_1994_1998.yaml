# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_samper_liberal_1994_1998
status: candidate
name: "Samper Liberal — Proceso 8000, Tequila contagion, apertura backlash"
countries: [COL]
timeframe: {start: 1994, end: 1998, enacted_date: "1994-08-07"}
coalition: "Partido Liberal"
leaders:
  - "Ernesto Samper Pizano (President 1994-1998)"
  - "Guillermo Perry / José Antonio Ocampo (Hacienda)"
  - "Miguel Urrutia (BanRep Governor)"
  - "Horacio Serpa (Interior)"
doctrine: >
  Liberal administration whose mandate was crippled by the
  Proceso 8000 Cali-Cartel financing scandal and defined by
  apertura-backlash social-investment pivot. Five doctrinal
  pillars: (a) Proceso 8000 — investigation opened 1995 into
  Cali Cartel ~$6M financing of the 1994 Samper campaign via
  campaign manager Fernando Botero Zea and treasurer Santiago
  Medina; Samper cleared by Chamber 111-43 on 12 June 1996
  under Liberal majority; US decertified Colombia 1996-1997;
  Samper's US visa revoked; pariah-diplomacy period. (b) Salto
  Social plan (Plan de Desarrollo) — social-investment
  increase to ~10% GDP; subsidies expanded; minimum wage rose
  substantially; partial rollback of apertura rhetoric. (c)
  Defeat of Cali Cartel — Rodríguez Orejuela brothers captured
  June-August 1995; Cartel dismantled but "cartelitos"
  proliferated. (d) FARC escalation and Pastrana preamble —
  FARC took Las Delicias base August 1996; military crisis; set
  up Andrés Pastrana's 1998 peace-process mandate. (e)
  Tequila-contagion recession 1996-1998 — GDP growth 2.1%
  (1996), 3.4% (1997), 0.6% (1998); coffee price collapse;
  fiscal deficit widened 1% GDP (1994) → 3.7% (1998); BanRep
  defended crawling band at cost of high real rates. Stated
  school: Liberal-populist / social-liberal; rhetorically
  apertura-critical but structurally continuous. Left-right:
  centre-left by Colombian standards. Popularity: June 1994
  runoff 50.6% vs Pastrana 48.5%; approval collapsed to
  ~25-30% during 1995-96 Proceso 8000; 1998 Pastrana
  (Conservative) won runoff 50.3% vs Serpa 46.5% breaking
  Liberal four-term hold. Coherence: trade international
  legitimacy and apertura credibility for Cali Cartel
  dismantling, social-investment expansion, and governing
  survival — the last of which succeeded narrowly but at
  significant institutional cost.
policies:
  - co_proceso_8000_narco_campaign_financing_1995_1996
  - co_salto_social_plan_1995_1998
  - co_cali_cartel_dismantling_1995
  - co_tequila_contagion_recession_1996_1998
  - co_us_decertification_1996_1997
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Proceso 8000 exposed narco penetration of presidential campaign; Chamber acquittal controversial."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Salto Social social investment raised to ~10% GDP."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Deficit widened 1%→3.7% GDP across the term."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Cali Cartel dismantled through prosecutions."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "Apertura rhetorically paused but structurally preserved."}
outcome_hypotheses: [narco_campaign_finance_institutional_effect, apertura_backlash_social_investment_effect]
predecessor_movements: [colombia_gaviria_liberal_apertura_1990_1994]
successor_movements: []
position_alignments:
  - {position_id: social_liberal, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:

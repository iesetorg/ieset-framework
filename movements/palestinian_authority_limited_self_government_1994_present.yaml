# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: palestinian_authority_limited_self_government_1994_present
status: candidate
name: "Palestinian Authority limited self-government and institution-building"
countries: [PSE]
timeframe: {start: 1994, end: ongoing}
coalition: "PLO/Fatah-led Palestinian Authority, Palestinian Legislative Council when seated, donor-backed ministries, and territorially fragmented administration after the 2007 Gaza split"
leaders:
  - "Yasser Arafat (President of the Palestinian Authority 1994-2004)"
  - "Mahmoud Abbas (President of the Palestinian Authority 2005-present)"
  - "Salam Fayyad (Finance Minister and Prime Minister in state-building reform period)"
doctrine: >
  The Palestinian Authority governing regime created under the Oslo framework
  built limited civil, fiscal, financial, and legal institutions under
  non-sovereign conditions. Its policy claim was that ministries, a basic-law
  framework, public-finance rules, regulated banking, and donor-backed
  procurement systems could support state-building even while final-status
  issues, Israeli control over borders and clearance revenues, settlement
  expansion, and the post-2007 West Bank/Gaza split constrained unified policy
  control.
policies:
  - pse_basic_law_2002_2003
  - pse_monetary_authority_banking_framework_1997_2010
  - pse_public_procurement_law_2014
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Basic-law, procurement, and financial-regulatory institutions formalised parts of PA administration despite limited sovereignty and fragmented territorial control."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "The Basic Law recognised courts and separation-of-powers principles, but executive rule by decree and the Gaza split limited the effective constraint."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "The PMA gained bank-supervision and monetary-authority functions without issuing a national currency."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Banking-law and PMA-supervision reforms tightened prudential regulation."}
references:
  - "Palestinian Basic Law, 2002, as amended 2003"
  - "Palestine Monetary Authority Law No. 2 of 1997; Banking Law No. 9 of 2010"
  - "Palestine Public Procurement Law No. 8 of 2014"
  - "World Bank, West Bank and Gaza public financial management and procurement assessments"
notes: "This movement is intentionally coded as limited self-government, not as unified sovereign national policy control over all Palestinian territory."

movement_id: austria_gusenbauer_spo_ovp_2007_2008
status: candidate
name: "Gusenbauer SPOe-OeVP grand coalition 2007-2008"
countries: [AUT]
timeframe: {start: 2007, end: 2008, enacted_date: "2007-01-11"}
coalition: "SPOe-OeVP grand coalition"
leaders:
  - "Alfred Gusenbauer (Chancellor, SPOe, 2007-2008)"
  - "Wilhelm Molterer (Vice-Chancellor and Finance Minister, OeVP)"
doctrine: >
  Short-lived SPOe-led grand coalition formed after Gusenbauer's narrow
  2006 election win over Schuessel. Economic school: Austrian social-
  democratic centrist with OeVP Finance Ministry restraint — Studiengebuehren
  (tuition fees) abolished Sep 2008, Pflegegeld care-allowance expansion,
  minimum-income reform blueprint (Mindestsicherung) agreed in principle,
  Bawag-PSK rescue aftermath, Eurofighter partial-descope deal (fewer
  aircraft). Left-right axis: centrist with left-tilt on education and
  care; restrained by OeVP finance veto. Dated policies: tuition-fee
  abolition (Sep 2008), Mindestsicherung framework 2008. Popularity:
  Gusenbauer unpopular within SPOe; replaced by Faymann as SPOe chair
  Aug 2008, coalition collapsed early July 2008 leading to snap Sep 2008
  election. Coherence: low — chronic intra-coalition stalemate.
policies:
  - at_studiengebuehren_abolition_2008
  - at_mindestsicherung_framework_2008
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pflegegeld expansion and Mindestsicherung framework."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Tuition-fee abolition and care-allowance increase raised expenditure."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No major PMR shift; OeVP finance veto stalled substantive reform."}

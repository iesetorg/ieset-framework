  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "SOE pilot privatisations and bonyad-competition expansion; depth limited."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Inflation ran 25-50% range; reconstruction finance monetised."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Public investment surge under FYPs; deficit pressured."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "No net change — clerical constraint bounded any formal institutional change."}

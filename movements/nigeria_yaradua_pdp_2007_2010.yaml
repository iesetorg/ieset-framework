# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: nigeria_yaradua_pdp_2007_2010
status: candidate
name: "Yar'Adua PDP civilian government (Nigeria)"
countries: [NGA]
timeframe:
  start: 2007
  end: 2010
  enacted_date: "2007-05-29"
coalition: "People's Democratic Party (PDP) civilian government; Yar'Adua-Jonathan ticket"
leaders:
  - "Umaru Musa Yar'Adua (President 29 May 2007 - 5 May 2010)"
  - "Goodluck Jonathan (Vice President, Acting President from 9 Feb 2010)"
  - "Shamsuddeen Usman (Finance Minister 2007-2009) / Mansur Muhtar (2009-2010)"
  - "Chukwuma Soludo (CBN Governor until May 2009)"
  - "Lamido Sanusi (CBN Governor from Jun 2009)"
doctrine: >
  PDP institutional-reform civilian programme advancing the 7-Point Agenda
  and Niger Delta amnesty, interrupted by Yar'Adua's incapacitation from
  Nov 2009 and death 5 May 2010. Economic school: reformist-developmentalist
  with post-GFC banking-sector rescue — 7-Point Agenda (power, food,
  transportation, Niger Delta, land reform, education, security); Niger
  Delta Presidential Amnesty Programme launched 25 Jun 2009 with ~30,000
  militant combatants surrendering arms by Oct 2009, restoring oil output
  from ~1.1mb/d trough to ~2.1mb/d; Sanusi-led CBN 10-bank stress-test and
  takeover of five insolvent banks 14 Aug 2009 with AMCON resolution
  architecture established 2010; Doctrine-of-Necessity parliamentary
  resolution 9 Feb 2010 transferring powers to Jonathan. Dated policies:
  Niger Delta amnesty 25 Jun 2009; CBN bank intervention Aug 2009; AMCON
  Act signed Jul 2010 (under Jonathan). Left-right: centre-left
  developmentalist with orthodox banking reform layer. Popularity:
  2007 election widely regarded as flawed (~70% Yar'Adua reported);
  domestic legitimacy recovered via anti-corruption rhetoric and Niger
  Delta breakthrough; afflicted by health-crisis succession ambiguity.
  Coherence: strong on Niger Delta and banking pillars; weak on broader
  7-Point Agenda implementation; succession confusion damaged institutional
  coherence.
policies:
  - ng_niger_delta_amnesty_2009
  - ng_sanusi_bank_intervention_2009
  - ng_doctrine_of_necessity_2010
  - ng_seven_point_agenda_2007
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Sanusi-led supervisory tightening, forced takeovers of insolvent banks, AMCON resolution framework."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Doctrine-of-Necessity precedent constitutional-political resolution; EFCC continued from Obasanjo."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Niger Delta amnesty programme created ongoing training/stipend commitments."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "No significant tariff regime change."}
outcome_hypotheses: [banking_reform_effect_on_credit_growth, conflict_resolution_growth_effect]
predecessor_movements: [nigeria_obasanjo_pdp_civilian_1999_2007]
successor_movements: [nigeria_jonathan_pdp_2010_2015]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "7-Point Agenda infrastructure and Niger Delta state-stabilisation."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Sanusi supervisory tightening and AMCON bad-bank architecture."}
references:
  - "CBN Annual Report 2009, 2010"
  - "Asset Management Corporation of Nigeria Act 2010"
  - "International Crisis Group (2010), 'The Niger Delta amnesty'"
notes: "Movement end marked by Yar'Adua's 5 May 2010 death; Jonathan completed term and won 2011 election under separate movement."

movement_id: bangladesh_garments_export_industrial_policy_1980s_present
status: candidate
name: "Bangladesh ready-made garments export strategy"
countries: [BGD]
timeframe: {start: 1982, end: ongoing}
coalition: "Successive civilian and caretaker governments (Ershad, BNP, Awami League) — continuity of export-orientation across ruling coalitions"
leaders: ["Hussain Muhammad Ershad (early RMG policies)", "M. Saifur Rahman (Finance, BNP)", "Sheikh Hasina (PM)", "Fazle Hasan Abed (BRAC)", "Muhammad Yunus (Grameen Bank)"]
doctrine: >
  Export-led industrialisation anchored in the ready-made garments
  (RMG) sector and complemented by microfinance and remittance
  inflows. 1982 New Industrial Policy removed restrictions on
  foreign investment, created export-processing zones (BEPZA 1983),
  a back-to-back letter-of-credit system, and a bonded-warehouse
  facility enabling duty-free import of fabric against garment
  export contracts. The regime benefited from the 1974-2004 Multi-
  Fibre Arrangement quota system that steered textile-sourcing
  investment toward quota-unfilled countries. By 2023 RMG was
  ~85% of merchandise exports and ~11% of GDP; manufacturing
  employment (4m+ women) transformed female labour-force participation.
  Parallel microfinance (Grameen 1983, BRAC) delivered scaled rural
  credit. Periodic IMF and World Bank structural-adjustment
  programmes (1986, 1990, 2003, 2023) layered on trade-account
  liberalisation and financial reform. The model combines
  developmentalist export-pipeline architecture with conventional
  SAP-era macroeconomic management.
policies: [bangladesh_new_industrial_policy_1982, bangladesh_epz_act_1980, bangladesh_bonded_warehouse_back_to_back_lc_regime, bangladesh_grameen_bank_ordinance_1983, bangladesh_imf_ecf_2023]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "EPZ duty-free imports for export production, progressive tariff reduction, QR removal under SAPs."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Cash incentives for RMG exports, subsidised export credit, tax holidays in EPZs."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Weak enforcement of labour standards, limited union penetration in EPZs (challenged post-Rana Plaza 2013)."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Limited formal transfers; microfinance acts as a substitute risk-smoothing channel."}
outcome_hypotheses: [developmentalist_state_growth_performance]
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Trade opening and macro discipline consistent with orthodox prescriptions; targeted subsidies and EPZ carve-outs inconsistent."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "MFA-era sector-specific quota rents created early industry; later productivity gains reflect genuine capability accumulation."}
references:
  - "Mostafa & Klepper (2018), 'Industrial Development Through Tacit Knowledge Seeding', Management Science"
  - "Rhee (1990), 'The Catalyst Model of Development: Lessons from Bangladesh's Success with Garment Exports' (World Bank)"
  - "Heintz, Kabeer & Mahmud (2018), 'Cultural norms, economic incentives and women's labour market behaviour: empirical insights from Bangladesh'"

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_takaichi_ldp_2025_present
status: candidate
name: "Takaichi LDP government and Second Takaichi Cabinet"
countries: [JPN]
timeframe:
  start: 2025
  end: ongoing
coalition: "LDP-led government; Second Takaichi Cabinet current as of 18 February 2026"
leaders:
  - "Sanae Takaichi (Prime Minister)"
  - "Kimi Onoda (Minister for Economic Security)"
  - "Koichiro Gemba (Minister of Finance)"
doctrine: >
  Takaichi-era LDP governing programme centred on what the Prime Minister
  describes as "responsible proactive public finances": a high initial
  FY2026 budget with defence, child policy, semiconductor, GX, science,
  and economic-security allocations, combined with a stated primary-balance
  and bond-issuance discipline. The February 2026 policy speech frames the
  administration around crisis-management investment, a new growth strategy
  for 17 strategic fields, a CFIUS-like inbound-investment review system,
  nuclear-and-renewable energy security, and stronger control of critical
  supply chains. The governing content is therefore conservative-industrial:
  large targeted public investment and national-security screening, partial
  household relief through education and energy measures, and continued
  defence build-up, offset by explicit concern about fiscal sustainability.
policies:
  - jp_fy2026_initial_budget_strategic_investment_2026
  - jp_fy2026_free_education_lunch_expansion_2026
  - jp_fy2026_energy_price_reserve_supplement_2026
  - jp_takaichi_economic_security_screening_2026
  - jp_takaichi_social_security_cost_sharing_2026
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "FY2026 total budget rises to JPY122.3tn, with defence, child policy, GX, semiconductor, science, and contingency increases."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Semiconductor support, GX upfront investment, critical-products funding, and energy-price support expand targeted public support."}
  - {axis: fiscal.transfer_expansion, direction: "mixed", magnitude: weak, rationale: "Free education, school lunches, and livelihood-assistance top-ups expand household support while medical cost-sharing reforms restrain benefits."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "CFIUS-like investment review and critical-supply-chain controls tighten state gating in security-sensitive sectors."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Inbound-investment and supply-chain review are security-targeted rather than broad protectionism, but narrow openness at the margin."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Maximum use of nuclear and renewables, LNG-source diversification, and electricity/gas price reserves strengthen supply-security posture."}
predecessor_movements:
  - japan_ishiba_ldp_2024_present
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Strategic public-private investment, semiconductors, GX, critical products, and economic-security screening are mission-oriented industrial policy."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "The fiscal rhetoric stresses bond and primary-balance discipline, but the policy mix remains subsidy-heavy."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Sectoral subsidies, investment screening, and crisis-management industrial policy are not market-neutral."}
references:
  - "Prime Minister's Office of Japan, Second Takaichi Cabinet inaugurated, 18 February 2026: https://japan.kantei.go.jp/index.html"
  - "Prime Minister's Office of Japan, Policy Speech by Prime Minister Takaichi to the 217th Session of the Diet, 20 February 2026: https://japan.kantei.go.jp/105/statement/202602/20shiseihoshin.html"
  - "Ministry of Finance Japan, Highlights of the FY2026 Draft Budget, 26 December 2025: https://www.mof.go.jp/english/policy/budget/budget/fy2026/01.pdf"
  - "Ministry of Finance Japan, Overview of the Supplementary Budget for FY2026, 3 June 2026: https://www.mof.go.jp/english/policy/budget/budget/fy2026/03.pdf"
notes: >
  Created in the second-tranche Asia pass because the first Lane B pass
  found that official Kantei pages no longer showed Ishiba as current.
  Start year is 2025 because the FY2026 draft budget was approved under
  the Takaichi administration before the Second Takaichi Cabinet page
  dated 18 February 2026; exact first-cabinet date should be refined if
  a stable Kantei archive page is added later.

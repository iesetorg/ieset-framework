# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mali_assimi_goita_transition_sovereignty_2020_present
status: candidate
name: Mali Goita transition and sovereignty government
countries: [MLI]
timeframe:
  start: 2020
  end: ongoing
coalition: CNSP-backed military transition authorities
leaders:
  - "Assimi Goita (Transition President, 2021-present)"
  - "Choguel Kokalla Maiga (Prime Minister, 2021-2024)"
  - "Abdoulaye Maiga (Prime Minister, 2024-present)"
doctrine: >
  Mali's post-2020 transition regime presents itself as a sovereignty,
  security, and institutional-refoundation project. Its programme combines
  extended military-led transition authority, a new constitutional order,
  resource-nationalist mining reform, and regional realignment away from
  ECOWAS toward the Alliance of Sahel States.
policies:
  - mli_transition_charter_revision_2022
  - mli_constitution_fourth_republic_2023
  - mli_mining_code_local_content_2023
  - mli_ecowas_withdrawal_aes_confederation_2024_2025
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: moderate, rationale: "The constitution created a new formal order, while transition extensions and ECOWAS withdrawal delayed and weakened external return-to-election constraints."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "The 2023 mining code tightened state gating and local-content terms in the minerals sector."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Higher state and domestic participation raised sovereign discretion over mining assets."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "ECOWAS withdrawal narrowed Mali's formal regional integration commitments."}
references:
  - "Mali transition charter revision, 2022; Constitution of the Fourth Republic, 2023."
  - "Mali Mining Code, Law No. 2023-040."
  - "ECOWAS and Alliance of Sahel States statements on regional realignment, 2024-2025."
  - "IMF, UN, Reuters, and Associated Press reporting on Mali's transition, mining code, and regional withdrawal."
notes: >
  The movement covers formal instruments of the transition regime. It does not
  code battlefield outcomes or public support for the authorities.


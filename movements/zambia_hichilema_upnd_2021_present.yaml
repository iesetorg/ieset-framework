# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: zambia_hichilema_upnd_2021_present
status: candidate
name: "Hichilema UPND reformist government 2021-present"
countries: [ZMB]
timeframe: {start: 2021, end: ongoing, enacted_date: "2021-08-24"}
coalition: "United Party for National Development (UPND) — centre-right business-reformist"
leaders:
  - "Hakainde Hichilema (President, UPND, Aug 2021-, business-magnate-turned-politician, won on 6th attempt)"
  - "Mutale Nalumango (Vice President)"
  - "Situmbeko Musokotwane (Finance Minister, 2021-)"
  - "Denny Kalyalya (BoZ Governor, reinstated 2021 after PF dismissal)"
doctrine: >
  Hichilema's UPND ousted PF's Lungu in 2021 amid sovereign-
  default and macro crisis. Programme: IMF Extended Credit
  Facility (signed Aug 2022, $1.3bn), G20 Common Framework
  debt restructuring (memorandum-of-understanding with
  bilateral creditors June 2023, eurobond exchange June 2024),
  Bank of Zambia governor reinstated and modernised, free
  basic education, decentralised constituency-development-fund
  (CDF) tenfold increase. Mining-sector reform: scrapped
  punitive non-deductible mineral-royalty regime, attracted
  fresh investment in copper (KCM and Mopani control disputes
  resolved, First Quantum Cobre Panama loss redirecting
  capital). Major infrastructure: Lobito Corridor partnership
  with Angola/DRC/US for critical-minerals export route.
  2024-2025 power-rationing crisis from drought and Kariba
  dam levels — emergency solar/import response. Some erosion
  of civic space critique on opposition harassment 2024-2025.
policies:
  - zm_imf_ecf_2022
  - zm_g20_common_framework_debt_restructuring_2023_2024
  - zm_mineral_royalty_regime_reform_2022
  - zm_lobito_corridor_partnership
  - zm_cdf_tenfold_increase_2022
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Kalyalya reinstated; BoZ modernisation; IMF ECF compliance."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Post-default consolidation under IMF ECF; primary-balance recovery."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Mining-sector reform attracted fresh FDI; Lobito Corridor opens new export channel."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Anti-corruption push and judicial reform; partial backslide on opposition harassment."}
predecessor_movements: [zambia_msunwe_structural_adjustment_1991_2001]
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Mining-sector reform; mineral-royalty regime liberalisation; central-bank governance restored; FDI re-engagement."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "IMF ECF programme + G20 Common Framework debt restructuring + rules-based primary-surplus recovery."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Free basic education + tenfold-CDF decentralisation + transfer expansion to rural districts."}
references:
  - "Zambia IMF ECF 2022, multiple reviews"
  - "Zambia G20 Common Framework MoU June 2023; Eurobond restructuring 2024"
  - "Zambian 2021 presidential election results"
notes: "Stub authored to close 2026 atlas-coverage gap for ZMB. Intermediate movements (Mwanawasa, Banda, Sata, Lungu) remain unauthored."

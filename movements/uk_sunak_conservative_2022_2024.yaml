# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_sunak_conservative_2022_2024
status: candidate
name: "Sunak Conservative government (UK)"

countries: [GBR]

timeframe:
  start: 2022
  end: 2024
  enacted_date: "2022-10-25"

coalition: "Conservative majority (inherited from 2019 Johnson mandate; no fresh electoral mandate)"

leaders:
  - "Rishi Sunak (PM, October 2022 – July 2024)"
  - "Jeremy Hunt (Chancellor, October 2022 – July 2024)"

doctrine: >
  Drew from orthodox fiscal-conservative Treasury-brain doctrine fused
  with a supply-side National Insurance-cut agenda, acting as a
  credibility restoration project after the Truss mini-budget shock.
  Positioned on the centre-right — fiscally orthodox (OBR-respecting),
  monetarily conventional, socially conservative, with a harder line on
  immigration and legal-activism than Johnson. Key measures: Autumn
  Statement 17 November 2022 (windfall Energy Profits Levy extended and
  raised to 35%, personal allowance and thresholds frozen producing
  fiscal drag); Spring Budget 15 March 2023 confirming corporation tax
  rise to 25% from April 2023 and full expensing of plant-and-machinery;
  two cuts to employee National Insurance (12% → 10% January 2024; 10%
  → 8% April 2024); Illegal Migration Act 2023 and Safety of Rwanda Act
  2024; Online Safety Act 2023; mortgage-interest relief period during
  Bank Rate rise cycle; Windsor Framework February 2023 settling
  Northern Ireland Protocol. Entered via intra-party leadership (no
  popular vote); Conservatives polled 23-28% through 2023-24 and lost
  the July 2024 general election with 23.7% vote share — worst
  Conservative result in modern era. Programme cohered internally as
  an orthodoxy-plus-tax-cut package but was politically stranded by
  inherited cost-of-living damage and coalition fatigue.

policies:
  - uk_autumn_statement_fiscal_drag_2022
  - uk_corporation_tax_increase_2023
  - uk_full_expensing_capital_allowance_2023
  - uk_national_insurance_cuts_2024
  - uk_illegal_migration_rwanda_acts_2023_2024
  - uk_windsor_framework_2023

axes_summary:
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: moderate
    rationale: "Frozen thresholds produced significant fiscal drag; offsetting NI cuts fell on employees, not pensioners/landlords."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: strong
    rationale: "19% → 25% main rate from April 2023; largest corporate tax rise in a generation."
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: weak
    rationale: "Energy Price Guarantee tapered; real-terms departmental settlements tight post-2024/25."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: moderate
    rationale: "Rwanda scheme, raised salary threshold for skilled worker visas (April 2024), student dependant curbs."
  - axis: monetary.central_bank_independence
    direction: "0"
    rationale: "Maintained BoE independence and inflation-target regime; explicit restoration of OBR role post-Truss."

position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: austrian, alignment: partially_aligned}

disclosure: >
  The Sunak government is short (20 months) and programme-interrupted —
  codes as a credibility-restoration episode rather than a programmatic
  administration. Much of its 'content' is Treasury orthodoxy reasserting
  itself after the 2022 market shock.

references:
  - "Autumn Statement November 2022 (HM Treasury)"
  - "Spring Budget March 2023 (HM Treasury)"
  - "National Insurance Contributions (Reduction in Rates) Act 2023"
  - "Illegal Migration Act 2023; Safety of Rwanda (Asylum and Immigration) Act 2024"
  - "Windsor Framework (UK-EU) February 2023"

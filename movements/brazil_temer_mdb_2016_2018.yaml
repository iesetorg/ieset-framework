# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: brazil_temer_mdb_2016_2018
status: candidate
name: "Temer MDB government — orthodox fiscal adjustment post-Dilma (Brazil)"
countries: [BRA]
timeframe:
  start: 2016
  end: 2018
  enacted_date: "2016-08-31"
coalition: "PMDB/MDB-led centre-right coalition (PMDB, PSDB, DEM, PP, PR, PSD, PTB) following Dilma Rousseff impeachment August 2016"
leaders:
  - "Michel Temer (President 2016-2018, PMDB/MDB)"
  - "Henrique Meirelles (Finance Minister 2016-2018, prior BCB Governor 2003-2010)"
  - "Ilan Goldfajn (Central Bank Governor 2016-2019)"
  - "Eliseu Padilha (Chief of Staff)"
  - "Moreira Franco (Secretariat-General)"
doctrine: >
  Orthodox centre-right fiscal reformer government that assumed office after
  Dilma Rousseff's impeachment (Senate vote 31 Aug 2016) and pursued an
  aggressive liberalising agenda despite Temer's rock-bottom ~7% approval
  rating. Economic team led by Henrique Meirelles (ex-BCB Governor) framed
  the programme as restoring fiscal credibility after the 2014-2016 Nova
  Matriz Econômica collapse: the signature measure was PEC 241/55 — the
  Teto de Gastos (Constitutional Amendment 95, Dec 2016) freezing real
  federal primary spending for 20 years. Labour liberalisation followed
  (Lei 13467/2017, 11 Jul 2017) introducing intermittent contracts,
  negotiated-over-legislated collective bargaining, and making union dues
  voluntary; the outsourcing law (Lei 13429, Mar 2017) legalised
  third-party contracting across core activities. A proposed pension
  reform (PEC 287) failed to pass after the JBS-recording corruption
  scandal destroyed Temer's congressional support in mid-2017. Microsoft-
  and-chainsaw politics: economically orthodox, politically transactional
  with Centrão, deeply unpopular. Câmara seat share of the Temer
  coalition peaked around 60% (PMDB 66 + PSDB 54 + DEM 29 + PP 47 + others
  ~ 300+ of 513), yet public legitimacy collapsed — Temer never ran in
  2018 and MDB's presidential candidate Meirelles got 1.2% in the first
  round. Framework codes policy content, not popularity — the 2016-2018
  output is a clear liberal-orthodox swing bracketed by two very different
  governments (Dilma PT, Bolsonaro PL).
policies:
  - br_teto_de_gastos_pec95_2016
  - br_labour_reform_lei13467_2017
  - br_outsourcing_law_lei13429_2017
  - br_tcu_investment_divestment_2017
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: strong
    rationale: "PEC 95 / Teto de Gastos froze federal primary spending in real terms for 20 years — one of the most contractionary constitutional rules internationally."
  - axis: regulatory.labour_market_flexibility
    direction: "+"
    magnitude: strong
    rationale: "Lei 13467/2017 and Lei 13429/2017 expanded flexible contracts, made union dues voluntary, and legalised wide-scope outsourcing."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: weak
    rationale: "Privatisation signals (Eletrobras announced 2017, BR Distribuidora partial) and concession programme; execution mostly deferred to successors."
  - axis: fiscal.sectoral_subsidy
    direction: "-"
    magnitude: weak
    rationale: "TLP replacing TJLP (Lei 13483/2017) raised BNDES cost-of-funds toward market rates, shrinking subsidised credit envelope."
outcome_hypotheses:
  - spending_cap_fiscal_consolidation_effect
  - labour_market_flexibility_employment_effect
predecessor_movements: []
successor_movements:
  - brazil_bolsonaro_pl_2019_2022
position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Constitutional fiscal rule resembles ordoliberal rule-based constraint."}
  - {position_id: new_keynesian, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: opposed}
disclosure: >
  Temer's 7% approval and the post-JBS corruption context complicate
  political interpretation but do not change policy-content coding under
  Invariant 3. PEC 95 was later repealed/replaced by Lula III's Novo
  Arcabouço Fiscal (LC 200/2023), which this framework codes as a distinct
  movement.
references:
  - "Emenda Constitucional 95/2016 (Teto de Gastos)"
  - "Lei 13.467/2017 (Reforma Trabalhista)"
  - "Lei 13.429/2017 (Terceirização)"
  - "IMF Article IV Brazil 2017, 2018"
notes: >
  Short two-and-a-half-year government but policy-dense. The Teto de
  Gastos is the single biggest constitutional fiscal rule enacted in
  Brazilian democratic history and the most salient legacy.

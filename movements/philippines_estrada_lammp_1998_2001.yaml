# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: philippines_estrada_lammp_1998_2001
status: candidate
name: "Joseph Estrada LAMMP — populist-nationalist interrupted presidency (1998-2001)"
countries: [PHL]
timeframe:
  start: 1998
  end: 2001
  enacted_date: "1998-06-30"
coalition: "Laban ng Makabayang Masang Pilipino (LAMMP) — LDP, NPC, PMP coalition; Gloria Macapagal Arroyo (Lakas) as VP in split-ticket mandate"
leaders:
  - "Joseph 'Erap' Estrada (President 30 Jun 1998 - 20 Jan 2001, EDSA II ouster)"
  - "Gloria Macapagal Arroyo (VP, opposition)"
  - "Edgardo Espiritu → Jose Pardo (Finance)"
  - "Rafael Buenaventura (BSP Governor)"
doctrine: >
  LAMMP populist-nationalist — Estrada's "Erap para sa Mahirap" (Erap
  for the Poor) campaign won a landslide 39.9% plurality on a
  populist-pro-poor platform, positioned as outsider-populist against
  the Ramos-Arroyo technocratic-liberal lineage. Economic school:
  populist-nationalist with constituency-based distribution rhetoric
  but technocratic economic cabinet continuity (Espiritu, later
  Pardo) — weak coherence between rhetoric and cabinet content.
  Centre-left on distribution rhetoric, business-as-usual on macro.
  Key policy content: (i) Bangko Sentral ng Pilipinas inflation-
  targeting framework adopted January 2002 (groundwork under Estrada);
  (ii) Electric Power Industry Reform Act (EPIRA) passed June 2001
  by Arroyo but largely drafted under Estrada; (iii) Mindanao all-
  out-war March-July 2000 against MILF — captured Camp Abubakar
  July 2000, collapsed Ramos-era peace process; (iv) Retail Trade
  Liberalization Act 2000 (RA 8762) opening retail sector to foreign
  firms above threshold capitalisation; (v) General Banking Law
  2000 (RA 8791) modernising banking regulation and raising foreign
  ownership limits; (vi) "Jueteng-gate" scandal October 2000 —
  Ilocos governor Chavit Singson accused Estrada of receiving PHP
  545m jueteng (illegal numbers game) payoffs plus PHP 130m tobacco-
  excise kickback; (vii) House impeachment vote November 2000,
  Senate trial January 2001 — opened 20 December 2000, collapsed
  on 16 January 2001 after 11-10 vote against opening the "second
  envelope" of bank records; (viii) EDSA II 16-20 January 2001 —
  4-day street protests, military and cabinet withdrew support,
  Supreme Court declared office vacant, Arroyo sworn in 20 January
  2001. Popularity: May 1998 election 39.9% (10.7m votes) vs
  Lim 15.9% — one of the largest plurality mandates in Philippine
  history; approval collapsed to ~20% by late 2000 on jueteng
  scandal. Coherence line: populist-nationalist rhetoric on a
  technocratic-liberal economic continuity base, ended by scandal-
  driven extra-constitutional transition.
policies:
  - ph_retail_trade_liberalization_act_2000
  - ph_general_banking_law_2000
  - ph_mindanao_all_out_war_2000
  - ph_estrada_impeachment_edsa_ii_2001
  - ph_epira_power_sector_reform_2001
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Retail Trade Liberalization Act 2000 opened retail sector to qualified foreign entrants; GATS commitments advanced."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "General Banking Law 2000 modernised prudential regime; foreign ownership limits raised."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "EPIRA framework (passed mid-2001) unbundled NPC generation-transmission-distribution, opened IPP market."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Senate trial collapse and EDSA II extra-constitutional succession left precedent for non-electoral presidential removal."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Supreme Court's Estrada v. Desierto ruling affirmed Arroyo succession but on contested constitutional grounds."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Pro-poor housing ('Erap para sa mahirap') and socialised housing expansions; fiscal deficit rose from 1.9% to 4% of GDP."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Retail and banking liberalisation welcomed; jueteng scandal and rent-seeking opposed."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Pro-poor framing present; programmatic delivery limited."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "EPIRA and banking reform sit within technocratic state-reform tradition."}
references:
  - "RA 8762 Retail Trade Liberalization Act 2000"
  - "RA 8791 General Banking Law 2000"
  - "Supreme Court, Estrada v. Desierto, 2 March 2001"
  - "Hutchcroft & Rocamora (2003), 'Strong Demands and Weak Institutions'"
notes: >
  EDSA II succession remains constitutionally contested; Estrada's
  later 2007 plunder conviction (pardoned by Arroyo October 2007)
  separate outcome-hypothesis track when created.

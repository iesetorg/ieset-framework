movement_id: hungary_horn_mszp_1994_1998
status: candidate
name: Horn MSZP-SZDSZ coalition — Bokros package shock orthodoxy under socialist banner 1994-1998
countries:
- HUN
timeframe:
  start: 1994
  end: 1998
coalition: Magyar Szocialista Párt (MSZP, post-communist) + Szabad Demokraták Szövetsége (SZDSZ,
  liberal) — two-thirds constitutional majority
leaders:
- Gyula Horn (Prime Minister, July 1994-July 1998)
- Lajos Bokros (Finance Minister, March 1995-February 1996)
- Péter Medgyessy (Finance Minister, February 1996-1998)
- György Surányi (National Bank president, returned 1995)
- Iván Pető (SZDSZ leader)
doctrine: 'Horn''s MSZP-SZDSZ coalition, despite being built on the post- communist vote, executed
  the most orthodox reform package of any post-1989 Central-European government — the 12 March
  1995 Bokros package. Economic school: Bokros-package orthodoxy under socialist banner — Washington-Consensus
  stabilisation with devaluation, fiscal austerity, and accelerated privatisation, rejecting the
  gradualism of the Antall era. Left-right axis: centre-left on label, centre- right on content;
  canonical case of Invariant 3 (party label diverges from policy content). Core policy content:
  (i) Bokros package 12 March 1995 — ~10% surcharge on imports (later withdrawn), 9% one-off devaluation
  + 1.9%/month crawling peg, ~5% GDP fiscal consolidation, cuts to maternity allowances, university
  tuition, public-sector wages, pension indexation; (ii) accelerated privatisation — APV Rt (successor
  to ÁVÜ) sold Matáv, MOL, energy companies, banks to strategic foreign investors 1995-1997, Hungary
  became #1 per-capita FDI recipient in the region; (iii) 1997 pension reform (Act LXXX of 1997)
  introducing mandatory second-pillar private pensions alongside PAYG; (iv) 1996-1997 health-care
  reform (family-doctor system, health-insurance separation); (v) 1997 EU-accession negotiations
  opened; NATO invitation July 1997 accepted; (vi) 1996 Act XXVI on spatial planning and regional
  policy. Macro: GDP grew 4-5% 1996-1998, inflation fell from 28% to 10%, current-account deficit
  stabilised. Popularity: MSZP 33.0% 1994 with 54% of seats; lost 1998 to Orbán''s Fidesz on Bokros-backlash
  and corruption narratives — MSZP 32.9% but lost second round. Coherence: very high — the Bokros
  package delivered the structural break that Antall had deferred; the foreign-strategic-investor
  privatisation model became Hungary''s growth engine into the 2000s.

  '

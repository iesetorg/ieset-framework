# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_ldp_bubble_era_1987_1993
status: candidate
name: "LDP bubble-era governance — Takeshita to Miyazawa (Japan)"
countries: [JPN]
timeframe: {start: 1987, end: 1993}
coalition: "LDP single-party governments"
leaders:
  - "Noboru Takeshita (PM 1987-1989)"
  - "Sosuke Uno (PM Jun-Aug 1989)"
  - "Toshiki Kaifu (PM 1989-1991)"
  - "Kiichi Miyazawa (PM 1991-1993)"
  - "Yasushi Mieno (BoJ Governor from Dec 1989)"
doctrine: >
  LDP bubble-era governance — reactive-monetary-easing LDP doctrine that
  absorbed the Plaza Accord yen shock through sustained BoJ easing then
  lurched into abrupt tightening. Economic school: convoy-capitalism
  developmentalism with post-Plaza monetary accommodation; consumption
  tax introduction as fiscal-structure modernisation. Dated policies:
  Consumption tax 3% introduction 1 Apr 1989 (Takeshita); BoJ discount
  rate cut to 2.5% Feb 1987 sustained through May 1989; Mieno
  tightening Dec 1989 to 6.0% by Aug 1990 puncturing asset bubble;
  Large-Scale Retail Store Law amendments 1990 under SII (Structural
  Impediments Initiative) with US; Political Reform Act 1993 (Jan 1994
  Hosokawa passage actually) — reform pressure from 1988 Recruit
  scandal onward; Gulf War ¥13bn contribution 1991. Left-right:
  centre-right LDP mainstream, market-liberalising on distribution and
  trade, statist on land-tax and keiretsu protection. Popularity:
  Takeshita approval collapsed Recruit scandal 1988-1989 (<10%); Uno
  Jul 1989 Upper House election LDP lost majority first time (27.3%);
  Kaifu recovered on Gulf crisis; Miyazawa Feb 1993 Sagawa Kyubin
  scandal + LDP split Jun 1993 Jul 1993 general election LDP 36.6% /
  223 seats — lost majority, ended 38-year LDP rule. Coherence: low —
  reform signals (consumption tax, SII concessions) undermined by
  Recruit/Sagawa scandals and inconsistent monetary policy that
  inflated then burst the Nikkei/land bubble.
policies:
  - jp_consumption_tax_3pct_1989
  - jp_boj_bubble_easing_tightening_1987_1991
  - jp_sii_structural_impediments_1990
  - jp_gulf_war_contribution_1991
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Consumption tax replaced narrower indirect taxes; broadened base."}
  - {axis: monetary.monetary_expansion_direction, direction: mixed, magnitude: strong, rationale: "Aggressive easing 1987-1989 then aggressive tightening 1989-1991 — bubble inflation and puncture."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "SII concessions — Large-Scale Retail Store Law amendments, keiretsu transparency asks."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "SII market-access commitments; beef/citrus liberalisation 1988 agreed."}
predecessor_movements:
  - japan_nakasone_ldp_1982_1987
successor_movements:
  - japan_non_ldp_interlude_1993_1994
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Werner (2003), Princes of the Yen"
  - "Wood (1992), The Bubble Economy"
  - "Bayoumi (2001), 'The Morning After: Explaining the Slowdown in Japanese Growth in the 1990s' JIE"
notes: "Deep-history tranche 2."

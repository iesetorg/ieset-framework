movement_id: ethiopia_meles_late_era_2005_2012
status: candidate
name: "Meles Zenawi late era (Ethiopia, post-2005 crackdown through GERD launch)"
countries: [ETH]
timeframe: {start: 2005, end: 2012}
coalition: "EPRDF (TPLF-dominated); ruling party post-2005 consolidation"
leaders: ["Meles Zenawi (PM 1995-2012, died Aug 2012)"]
doctrine: >
  The late Meles era crystallised Ethiopia's "democratic developmental state"
  doctrine. Economic school: developmental-state ADLI (Agricultural
  Development-Led Industrialisation) agriculture-first plus state-led
  industrialisation, large hydropower and infrastructure push (Grand
  Ethiopian Renaissance Dam announced and launched Apr 2011), telecoms and
  banking closed to foreign competition, and the first five-year Growth and
  Transformation Plan (GTP I 2010-2015). Politically, left-right: TPLF's
  Marxist-Leninist origins had already moved to a post-socialist developmental
  synthesis; Meles's 2006 essay "African Development: Dead Ends and New
  Beginnings" is the canonical manifesto. The disputed May 2005 election
  and subsequent crackdown (CUD leaders jailed; 193 killed in June/November
  protests) marked a decisive turn to single-party dominance codified in
  the 2009 Charities and Societies Proclamation and 2009 Anti-Terrorism
  Proclamation. Popularity: no competitive tests after 2005; the 2010
  election returned 99.6% of seats to EPRDF — a signal of closure, not
  consent. Coherence: internally consistent developmental-authoritarian
  package — growth delivered (~10% official) at the cost of political
  pluralism and FX/debt tensions that would surface under successors.
policies: [et_gerd_launch_2011, et_gtp_i_2010, et_anti_terrorism_proclamation_2009, et_charities_societies_proclamation_2009, et_adli_doctrine_consolidation_2005]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "State-directed public investment in power (GERD), transport, fertiliser."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Telecoms and banking closed to foreign entry; pervasive licensing."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "2005 crackdown; 2009 Anti-Terrorism and CSO proclamations narrowed civic space."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public investment share rose to among highest in SSA."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Land retained in state ownership; use-rights regime continued."}
outcome_hypotheses: [developmentalist_state_growth_performance]
predecessor_movements: [ethiopia_eprdf_developmental_state_1991_2018]
successor_movements: [ethiopia_hailemariam_eprdf_2012_2018]
position_alignments:

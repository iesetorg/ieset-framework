movement_id: finland_marin_rainbow_2019_2023
status: candidate
name: "Marin SDP-led five-party rainbow coalition (Finland, 2019-2023)"
countries: [FIN]
timeframe: {start: 2019, end: 2023, enacted_date: "2019-12-10"}
coalition: "Suomen Sosialidemokraattinen Puolue (SDP) - Keskusta (Centre) - Vihreä liitto (Greens) - Vasemmistoliitto (Left Alliance) - Ruotsalainen kansanpuolue (RKP), formed under Antti Rinne 6 June 2019; Sanna Marin took over 10 December 2019 after the postal-strike crisis ended Rinne's premiership"
leaders:
  - "Sanna Marin (Prime Minister, SDP, 2019-2023)"
  - "Antti Rinne (PM June-December 2019, SDP)"
  - "Annika Saarikko (Finance Minister 2021-2023, Centre leader)"
  - "Matti Vanhanen (Finance Minister 2020-2021, Centre)"
  - "Maria Ohisalo (Interior Minister and Environment Minister, Greens leader)"
  - "Li Andersson (Education Minister, Left Alliance leader)"
  - "Pekka Haavisto (Foreign Minister, Greens, 2019-2023)"
doctrine: >
  SDP-led progressive rainbow coalition combining social-democratic welfare
  expansion, Green climate ambition, Left Alliance redistributive goals,
  and Centre-party rural representation with RKP's Swedish-speaking
  liberal wing. Stated doctrine: expand welfare and education, strengthen
  climate commitments (carbon-neutral by 2035), and defend Nordic welfare
  architecture against demographic pressure. Core policy content:
  (i) Climate Act of 2022 (Ilmastolaki 423/2022) legislating the 2035
  carbon-neutrality target and interim 2030/2040/2050 milestones; (ii)
  family-leave reform enacted 2022 (effective August 2022) providing
  each parent 160 days of earnings-related leave with 63 transferable,
  aligning Finland with Nordic dual-earner templates; (iii) sote-uudistus
  social and health-care reform of June 2021 (HE 241/2020) creating 21
  regional wellbeing-services counties that took over health, social and
  rescue services from municipalities on 1 January 2023 — the largest
  Finnish administrative reform in decades, pursued unsuccessfully by
  three previous governments; (iv) compulsory education extension to age
  18 with free upper-secondary materials (Oppivelvollisuuslaki 1214/2020,
  effective August 2021); (v) COVID-19 response including border
  closures, state of emergency under the Emergency Powers Act, and
  expansion of public debt from roughly 59 percent to 73 percent of GDP
  2019-2021; (vi) historic Finland-Sweden joint NATO application of May
  2022 following the Russian invasion of Ukraine, with Finland formally
  joining 4 April 2023 — a decisive break from the post-1948 policy of
  military non-alignment. Left-right axis: centre-left to left, most
  progressive Finnish government in a generation. Seat share at
  formation: SDP 40, Centre 31, Greens 20, Left 16, RKP 9 — 116/200.
  Marin personally polled strongly (approval peaking above 70 percent in
  early COVID period) but her government was defeated in April 2023 as
  Kokoomus overtook SDP and Finns Party placed second. Coherence
  judgement: strong coherence on climate, welfare and foreign-policy
  pivot to NATO; intra-coalition tension between Centre fiscal
  conservatism and Greens/Left spending preferences resolved largely in
  favour of expansion under COVID cover.
policies:
  - fi_climate_act_2022
  - fi_family_leave_reform_2022
  - fi_sote_wellbeing_services_2023
  - fi_compulsory_education_extension_2021
  - fi_nato_application_2022

movement_id: sweden_bildt_centre_right_1991_1994
status: candidate
name: Bildt four-party centre-right coalition — crisis management and systemic shift 1991-1994
countries:
- SWE
timeframe:
  start: 1991
  end: 1994
coalition: Moderaterna + Folkpartiet (Liberals) + Centerpartiet + Kristdemokraterna four-party
  minority coalition; tolerated by Ny Demokrati populists 1991-1994
leaders:
- Carl Bildt (Prime Minister, Moderate leader)
- Anne Wibble (Finance Minister, Folkpartiet)
- Olof Johansson (Centerpartiet leader, Environment)
- Bengt Westerberg (Folkpartiet leader, Social Affairs)
doctrine: 'First Moderate-led government since 1930 and the first four-party centre-right coalition
  in Swedish history. Economic school: market-liberal "systemic shift" (systemskifte) agenda in
  the Thatcher-Reagan family, forced to govern during the 1990-1993 banking crisis and currency-defence
  catastrophe. Left-right axis: centre-right, the most pro-market Swedish government since the
  1930s. Core policy content: (i) 1992 banking crisis resolution — blanket guarantee of bank debt,
  Bankstödsnämnden "bad bank" (Securum) for Nordbanken and Gota Bank, among the first modern systemic
  bank rescues internationally; (ii) 1992 "crisis packages" with SAP fiscal consolidation and
  EMU-convergence-style structural reforms; (iii) November 1992 failed defence of krona peg (500%
  overnight rate) → free float 19 November 1992; (iv) voucher-style school choice reform 1992
  (friskolereformen); (v) EU membership negotiations completed January 1994 and approved in November
  1994 referendum (52.3% yes); (vi) pension reform blueprint agreed cross-party in 1994 (five-party
  working group) laying groundwork for the 1998 NDC pension system. Popularity: 1991 election
  39.5% for the four parties combined; lost 1994 to SAP with 7.9pp swing as crisis management
  backlash and Ny Demokrati implosion dominated. Coherence: high doctrinally but execution was
  dominated by crisis management; the major structural reforms (EU, pensions, bank resolution)
  became the durable legacy, transcending the immediate political defeat.

  '

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ecuador_dollarisation_2000
status: candidate
name: "Ecuador official dollarisation"
countries: [ECU]
timeframe: {start: 2000, end: ongoing}
coalition: "Government of Jamil Mahuad (Democracia Popular) — sustained across successor governments"
leaders:
  - "Jamil Mahuad (President, announced dollarisation Jan 2000)"
  - "Gustavo Noboa (President, completed transition)"
doctrine: >
  Emergency response to a twin banking and currency crisis in 1998-1999 in
  which the sucre lost roughly two-thirds of its value against the US dollar
  and a banking holiday wiped out depositor confidence. The government
  announced on 9 January 2000 a fixed conversion of 25,000 sucres per US
  dollar, full substitution of the sucre by the dollar as legal tender,
  and the surrender of any independent domestic monetary policy. The
  doctrine was that only a credible, externally-anchored monetary regime
  could end chronic inflation, restore bank deposits, and force fiscal
  discipline — at the cost of permanently losing a lender-of-last-resort
  function and the ability to devalue in response to real shocks. In
  practice inflation fell from triple digits in 1999-2000 to single digits
  by 2004, remittance inflows and high oil prices stabilised the external
  account, and the regime survived multiple later presidents — including
  Correa — who campaigned against it but did not repeal it.
policies:
  - ecuador_dollarisation_law_2000
  - ecuador_banking_resolution_1999_2000
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Full dollarisation removes discretionary monetary policy entirely; strongest possible constraint on seigniorage financing."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "No domestic monetary base creation possible outside of dollar inflows."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Deposit values stabilised in hard currency after the banking resolution; contracts re-denominated with a rule-based conversion."}
  - {axis: regulatory.financial_deregulation, direction: "mixed", magnitude: moderate, rationale: "Banking resolution tightened prudential supervision post-crisis even as the monetary regime opened the system to dollar funding."}
outcome_hypotheses:
  - exchange_rate_regime_choice_and_crisis_vulnerability
  - hyperinflation_requires_fiscal_dominance
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned, notes: "Rule-based, externally-anchored money."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Removes state control over money but by adopting another state's fiat, not a commodity anchor."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Surrenders monetary sovereignty and counter-cyclical tools."}
references:
  - "Beckerman & Solimano eds. (2002), Crisis and Dollarization in Ecuador, World Bank"
  - "IMF Article IV Ecuador, 2003 and 2006 consultations"
  - "Jácome (2004), The Late 1990s Financial Crisis in Ecuador, IMF WP/04/12"
notes: >
  Framework codes both the disinflation success (fact) and the loss of
  monetary policy instruments (fact). Subsequent correísta fiscal expansion
  2007-2017 operated against this binding monetary constraint and is
  coded separately.

movement_id: vietnam_to_lam_2024_present
status: candidate
name: "Tô Lâm era (Vietnam)"
countries: [VNM]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-08-03"}
coalition: "Communist Party of Vietnam (XIII Congress continuation, XIV Congress preparation)"
leaders:
  - "Tô Lâm (State President May-Oct 2024; General Secretary from 3 Aug 2024)"
  - "Phạm Minh Chính (Prime Minister)"
  - "Lương Cường (State President from Oct 2024)"
  - "Trần Thanh Mẫn (National Assembly Chair from May 2024)"
doctrine: >
  Elevation of the former Minister of Public Security to General
  Secretary on 3 August 2024 following Trọng's death (19 July 2024)
  produced a government that continues the Blazing Furnace anti-
  corruption line with distinctly heavier security-apparatus weight,
  while simultaneously pushing a self-styled "New Era of National
  Rise" modernisation agenda centred on (a) radical streamlining of
  the Party-state machine — the most ambitious administrative
  restructuring since Đổi Mới, with multiple ministries and Party
  organs merged and provincial-unit consolidation announced 2024-25;
  (b) Resolution 68-NQ/TW (May 2025) naming the private sector as
  "the most important driver of the national economy" with targets
  for two million enterprises by 2030; (c) a high-priority chip-and-
  semiconductor strategy leveraging the September 2023 US-Vietnam
  comprehensive strategic partnership upgrade, anchored by Intel's
  Ho Chi Minh City assembly-and-test site, NVIDIA's 2024 R&D
  commitment and Apple's supply-chain diversification out of China;
  and (d) continued CPTPP/EVFTA implementation alongside preparation
  for the XIV Party Congress (January 2026). The Politburo expanded
  from 14 (post-resignations low) to around 15 seats during 2024-25
  as replacements were seated. On a left-right reading, Tô Lâm is
  best coded statist-right with a simultaneous reformist component
  on state-capacity and private-sector legal status — more pro-
  business in rhetoric than the Trọng era, but markedly more
  security-state-centric in implementation.
policies:
  - vn_blazing_furnace_anti_corruption_2016_2024
  - vn_state_apparatus_streamlining_2024_2025
  - vn_resolution_68_private_sector_2025
  - vn_chip_semiconductor_strategy_2023_present
  - vn_land_law_revision_2024
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Chip/semiconductor workforce and R&D incentives, National Semiconductor Strategy (Sept 2024), targeted tax breaks for Intel/Amkor/Hana Micron assembly lines."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Resolution 68 recognises private sector as primary growth driver; Land Law 2024 broadens land-use rights for non-state actors."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Continued CPTPP/EVFTA implementation and US comprehensive strategic partnership (Sept 2023) deepens trade-and-investment corridor."}
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "Anti-corruption prosecutions continue at pace, but with the Public-Security-led discipline arm dominant; judicial-review channel not strengthened."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: weak, rationale: "Centralisation of Party and security control over personnel; independent judicial initiative remains absent."}
outcome_hypotheses:
  - developmentalist_state_growth_performance
  - industrial_policy_chip_localisation_returns
predecessor_movements: [vietnam_trong_era_2011_2024]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Chip-industrial-policy push fits the East Asian developmentalist template."}
  - {position_id: market_socialist, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Private-sector-recognition and trade-opening components orthodox-consistent; sectoral-subsidy chip strategy is not."}
references:
  - "Le Hong Hiep (2024), 'To Lam's Ascent and the Future of Vietnam's Anti-Corruption Campaign', ISEAS Perspective"
  - "Giang Nguyen (2025), 'Vietnam's Resolution 68 and the Private Sector Turn', Fulcrum"
  - "US White House (Sept 2023), US-Vietnam Comprehensive Strategic Partnership joint statement"
  - "World Bank, Taking Stock (Vietnam) April 2025"
  - "IMF Article IV Vietnam 2024"
notes: >
  Single-party — no vote share. Popularity / legitimacy signals: Tô
  Lâm's election as General Secretary on 3 Aug 2024 was unanimous
  in the Central Committee; Politburo rebuild from 14 back toward
  15 seats; XIV Congress delegate selection 2025 is the key
  forward-looking signal. FDI commitments for 2024 ran ~US$38bn
  (registered) with semiconductor and electronics the leading
  sectors; NA ratification votes on reorganisation bills above 95%
  yes.

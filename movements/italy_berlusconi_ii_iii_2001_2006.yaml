# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_berlusconi_ii_iii_2001_2006
status: candidate
name: "Berlusconi II and III: Casa delle Libertà"
countries: [ITA]
timeframe: {start: 2001, end: 2006}
coalition: "Forza Italia + Alleanza Nazionale + Lega Nord + UDC (Casa delle Libertà)"
leaders:
  - "Silvio Berlusconi (PM)"
  - "Giulio Tremonti (Finance)"
  - "Gianfranco Fini (Foreign)"
  - "Roberto Maroni (Labour)"
  - "Umberto Bossi (Reforms)"
doctrine: >
  Economic school: populist centre-right liberalism with protective
  social conservatism — "Dubai-of-the-Med" growth promises combined
  with tax cuts, immigration restriction and labour flexibilisation,
  but limited structural reform delivery. Left-right axis: centre-right
  to right. Dated policies: Bossi-Fini immigration law (Legge 189/2002)
  30 July 2002 tightening entry, work-visa linkage and expulsions;
  Biagi labour reform (Legge 30/2003) 14 February 2003 and Decreto
  Legislativo 276/2003 introducing project-based contracts and
  staff-leasing; Tremonti fiscal-bonus investment depreciation 2001;
  IRPEF cut 2003-2005 (two-bracket reform partial implementation);
  Maroni pension reform 2004 (Legge 243/2004) raising old-age age
  to 60-65 from 2008; Iraq war Italian participation from 2003;
  Article 18 referendum on firing protection June 2003 (quorum not
  met); fiscal condoni (tax amnesties) 2002-2003; "Contratto con gli
  italiani" May 2001 campaign pledge five points; fall of Berlusconi
  II April 2005 after regional election losses; Berlusconi III May
  2005-May 2006 short continuation. Popularity: 2001 election CdL 45.4%
  House landslide; approval eroded through term; 2006 election lost
  narrowly to Unione Prodi. Coherence: moderate — strong ideological
  message, weaker delivery; fiscal deficits widened; growth stagnated
  (2001-2006 average Italian GDP growth ~0.8%).
policies:
  - italy_bossi_fini_immigration_2002
  - italy_biagi_labour_reform_2003
  - italy_maroni_pension_reform_2004
  - italy_tremonti_tax_bonuses_2001_2003
  - italy_iraq_participation_2003
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "Biagi law expanded atypical contract forms and introduced staff leasing."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Bossi-Fini tightened residence, expulsions and work-visa linkage."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "IRPEF bracket reform; top-rate reduction attempt."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Tremonti investment-deduction bonuses."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Maroni pension reform lifted retirement age."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Fiscal condoni amnesties and personal-legal laws raised rule-of-law concerns."}
predecessor_movements: [italy_dalema_amato_centre_left_1998_2001]
successor_movements: []
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Tax cuts and labour flexibilisation; but weak on spending discipline."}
  - {position_id: empirical_pragmatist, alignment: opposed, notes: "Delivery gap between promises and outcomes."}
references:
  - "Legge 30 luglio 2002 n. 189 (Bossi-Fini)"
  - "Legge 14 febbraio 2003 n. 30 (Biagi)"
  - "Legge 23 agosto 2004 n. 243 (Maroni pension)"
notes: "Distinct from Berlusconi I (1994) and Berlusconi IV (2008-2011) — longest single Italian post-war government."

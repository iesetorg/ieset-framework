movement_id: italy_berlusconi_first_1994_1995
status: candidate
name: 'Berlusconi I: Forza Italia-Lega-AN coalition'
countries:
- ITA
timeframe:
  start: 1994
  end: 1995
coalition: Forza Italia + Lega Nord + Alleanza Nazionale (Polo delle Libertà/Polo del Buon Governo)
leaders:
- Silvio Berlusconi (PM 10 May 1994 - 17 January 1995)
- Giulio Tremonti (Finance Minister)
- Umberto Bossi (Lega Nord leader, coalition partner)
- Gianfranco Fini (AN leader, coalition partner)
- Lamberto Dini (Treasury Minister, later successor PM)
doctrine: 'First Berlusconi government was the inaugural post-First Republic majoritarian-system
  coalition, short-lived but doctrinally significant. Economic school: supply-side-right with
  anti-tax-and-anti-union rhetoric (Tremonti-Berlusconi line); coalition partner Lega brought
  regional federalist priors; AN (post-MSI) brought statist-nationalist tilt — tensions visible
  from start. Left-right axis: right, first post-war centre-right government excluding PCI-successor
  forces entirely. Key content: (i) Pacchetto Tremonti 1994 — investment tax relief for capital
  expenditure and R&D; (ii) Decreto Biondi (Luglio 1994) on custodia cautelare — attempted reform
  of pre-trial detention, withdrawn after magistrates and Lega opposition; (iii) Dini-drafted
  pension reform package proposed — triggered CGIL-CISL-UIL 12 November 1994 general strike (~3
  million marchers Rome) — withdrawn; (iv) Privatisation continuation — IMI partial 1994, INA
  November 1994, IRI-Stet restructuring; (v) Legge finanziaria 1995 passed September 1994 with
  controversy; (vi) Diplomatic alignment with Clinton and with Kohl-France on EU; (vii) Napoli
  G7 July 1994. Popularity: March 1994 election Polo delle Libertà coalition 42.9% / 366/630 seats
  — Berlusconi''s Forza Italia polled 21% eight months after founding; approval collapsed after
  pension-reform crisis November 1994; Bossi withdrew Lega December 1994; government fell 22 December
  1994 no-confidence motion, Berlusconi resigned 17 January 1995; succeeded by Dini technocratic
  government. Coherence: low — doctrinally incompatible coalition (liberal FI + federalist Lega
  + statist-nationalist AN) could not sustain pension/custody reform under union+judicial pressure.
  Historical importance: introduced Berlusconismo as durable Italian political pole.

  '
policies:

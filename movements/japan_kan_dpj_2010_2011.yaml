  - {position_id: classical_liberal, alignment: partially_aligned, notes: "TPP pivot welcomed; nuclear retreat and FIT tariff less so."}
references:
  - "Act on Special Measures concerning Procurement of Renewable Energy (FIT law), Law No. 108 of 2011"
  - "Cabinet Office — FY2011 supplementary budgets 1 and 2"
  - "Government Accident Investigation Committee on Fukushima Daiichi, interim report Dec 2011"
notes: >
  Kan's doctrinal contribution is separable from Hatoyama's because the
  consumption-tax-finance pivot, the FIT/anti-nuclear turn, and TPP interest
  are all distinctly Kan-cabinet moves. Fukushima crisis management is the
  defining external shock.

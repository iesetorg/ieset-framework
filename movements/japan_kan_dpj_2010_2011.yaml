movement_id: japan_kan_dpj_2010_2011
status: candidate
name: "Kan DPJ — Tōhoku/Fukushima crisis cabinet"
countries: [JPN]
timeframe: {start: 2010, end: 2011, enacted_date: "2010-06-08"}
coalition: "DPJ-PNP coalition (Kan Naoto cabinet)"
leaders:
  - "Naoto Kan (PM, 8 Jun 2010 - 2 Sep 2011)"
  - "Yoshihiko Noda (Finance)"
  - "Yukio Edano (Chief Cabinet Secretary during Fukushima)"
  - "Masaaki Shirakawa (BoJ Governor)"
doctrine: >
  DPJ Kan doctrinal pivot — from Hatoyama's debt-funded transfer expansion
  toward a consumption-tax-funded fiscal-consolidation line ("strong economy,
  strong finances, strong social security"). Kan floated a 10% consumption-tax
  hike pledge days before the July 2010 Upper House election — DPJ lost
  badly, restoring twisted-Diet dynamics. Programme recovered around three
  vectors: (1) New Growth Strategy (June 2010) naming green innovation, health,
  and Asia as priority sectors; (2) TPP interest declaration (October 2010)
  — formal DPJ reversal on trade liberalisation; (3) post-11 March 2011
  crisis response to the magnitude-9.0 Tōhoku earthquake, tsunami, and
  Fukushima Daiichi meltdowns — evacuation of 160,000+ residents, SPEEDI
  dissemination controversy, first supplementary budget FY2011 ¥4tn (May 2011)
  and second supplementary ¥2tn (July 2011) for reconstruction. Kan announced
  Japan would review its nuclear programme, forced Hamaoka plant shutdown
  (May 2011), and pushed a feed-in tariff (FIT) law for renewables (enacted
  August 2011). Coherence line: DPJ Kan consumption-tax orthodoxy plus green
  restart plus Fukushima crisis management. Popularity ended ~18%; Kan
  resigned September 2011 after securing FIT passage and second supplementary
  budget.
policies:
  - jp_kan_fit_renewable_law_2011
  - jp_kan_tohoku_reconstruction_supplementary_budgets_2011
  - jp_kan_consumption_tax_10pct_pledge_2010
  - jp_kan_new_growth_strategy_2010
  - jp_kan_tpp_interest_declaration_2010
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "FIT law for renewables enacted August 2011; forced Hamaoka shutdown."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: strong, rationale: "Post-Fukushima rolling nuclear shutdowns; 54 reactors → <5 operational within a year."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Reconstruction supplementary budgets plus structural deficit continuing."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "TPP interest declaration October 2010 reversed prior DPJ stance; negotiation entry still years away."}
predecessor_movements:

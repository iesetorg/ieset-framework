# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: costa_rica_second_republic_welfare_democracy_1948_1978
status: candidate
name: "Costa Rican Second Republic welfare-democracy settlement (1948-1978)"
countries: [CRI]
timeframe: {start: 1948, end: 1978}
coalition: "Liberationist Second Republic settlement"
leaders:
  - "José Figueres Ferrer"
  - "Daniel Oduber Quirós"
doctrine: >
  Post-civil-war settlement that abolished the standing army, nationalised the
  banks, expanded social insurance and education, and built a stable electoral
  democracy around a welfare-developmentalist state. The movement redirected
  fiscal capacity from the military toward health, education, and social
  services while retaining a private export economy.
policies:
  - cr_army_abolition_1948
  - cr_bank_nationalisation_1948
  - cr_social_security_expansion_1961_1973
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Military abolition freed resources for civilian public services and education."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Social security, health, and education provision expanded across the Second Republic."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "The 1949 constitutional settlement entrenched civilian electoral institutions."}
  - {axis: regulatory.product_market_competition, direction: mixed, magnitude: moderate, rationale: "Private export activity continued, while bank nationalisation increased state financial control."}
position_alignments:
  - {position_id: social_democratic, alignment: partially_aligned}
  - {position_id: democratic_socialist, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: aligned}
references:
  - "Booth (2008), Costa Rica: Quest for Democracy"
  - "Mesa-Lago, social security and welfare-state studies on Costa Rica"
  - "Costa Rica Constitution of 1949"
notes: "This movement supplies the missing CRI historical floor and links naturally to existing Costa Rica wellbeing-throughput hypotheses."

movement_id: france_jospin_ps_cohabitation_1997_2002
status: candidate
name: Jospin PS gauche plurielle cohabitation government
countries:
- FRA
timeframe:
  start: 1997
  end: 2002
coalition: Gauche plurielle — PS + PCF + Verts + MDC + PRG (cohabitation with Chirac)
leaders:
- Lionel Jospin (PM)
- Dominique Strauss-Kahn (Finance 1997-1999)
- Laurent Fabius (Finance 2000-2002)
- Martine Aubry (Employment and Solidarity)
doctrine: 'Economic school: modernising French social democracy — redistributive supply-side mixed
  with strong state role; took France into the euro while enacting 35-hour week and expansive
  social legislation. Left-right axis: centre-left. Dated policies: 35-hour-week Aubry laws —
  Loi Aubry I 13 June 1998 (framework) and Loi Aubry II 19 January 2000 (implementation); Couverture
  Maladie Universelle (CMU) July 1999; PACS civil-union 15 November 1999; Loi Guigou on presumption
  of innocence June 2000; privatisations (Thomson-CSF, France Télécom partial, Air France partial,
  Crédit Lyonnais 1999, Aerospatiale-Matra merger) — PS enacted more privatisation value than
  any prior French government; euro entry 1 January 1999 (scriptural) / 1 January 2002 (notes
  and coins); DSK then Fabius delivered disciplined deficits; loi relative à l''épargne salariale
  February 2001; parité gender- parity law 2000; corporate-tax surcharge phased out; unemployment
  benefits UNEDIC reform 2000. Popularity: 1997 legislative snap election Jospin victory 42.1%
  PS+allies vote; cohabitation approval strong through 1999; 2002 presidential first round shock
  elimination (Jospin 16.2%, Le Pen 16.9%, Chirac 19.9%). Coherence: moderate — traditional-left
  flagships (35h, CMU, PACS) coexisted with centrist euro-entry and privatisations programme.

  '
policies:
- fr_aubry_35h_week_1998_2000
- fr_cmu_universal_health_coverage_1999
- fr_pacs_civil_union_1999
- fr_jospin_privatisations_1997_2002
- fr_france_euro_entry_1999_2002
- france_35_hour_week_2000
axes_summary:
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  rationale: 35-hour statutory working week is among strongest post-1980 European regulatory increases
    in workweek rigidity.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: CMU universal health access expansion; child and family transfers.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Major privatisations programme delivered (Thomson, France Télécom partial, Air France
    partial, Crédit Lyonnais).
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: Euro changeover delegated monetary policy to ECB from 1999.
- axis: fiscal.spending_level
  direction: '0'
  magnitude: weak
  rationale: Spending ~52% GDP flat; deficit fell from 3.3% (1997) to 1.5% (2001).
predecessor_movements:
- france_chirac_presidency_first_1995_2002
successor_movements:
- france_chirac_ii_presidency_2002_2007
position_alignments:
- position_id: empirical_pragmatist
  alignment: partially_aligned
  notes: Privatisations + euro entry alongside 35h / CMU — hybrid coding.
references:
- Loi n° 98-461 du 13 juin 1998 d'orientation et d'incitation relative à la réduction du temps
  de travail
- Loi n° 2000-37 du 19 janvier 2000 relative à la réduction négociée du temps de travail
- Loi n° 99-641 du 27 juillet 1999 portant création d'une couverture maladie universelle
notes: Cohabitation produced mixed left-right content; classic case of coalition label diverging
  from policy content.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: sierra_leone_bio_human_capital_governance_2018_present
status: candidate
name: "Bio human-capital and governance programme 2018-present"
countries: [SLE]
timeframe: {start: 2018, end: ongoing, enacted_date: "2018-04-04"}
coalition: "Sierra Leone People's Party (SLPP)"
leaders:
  - "Julius Maada Bio (President, 2018-present)"
  - "David Moinina Sengeh (education and chief-minister roles)"
  - "Sheku Ahmed Fantamadi Bangura (Minister of Finance)"
doctrine: >
  Bio's SLPP governments framed national development around human capital,
  food security, gender inclusion, and macro-fiscal stabilization. The governing
  programme paired flagship education and agriculture initiatives with gender
  equality legislation and IMF-backed public-finance discipline under the
  National Development Plan 2024-2030.
policies:
  - sl_free_quality_school_education_2018
  - sl_gewe_act_2022
  - sl_feed_salone_agricultural_programme_2023
  - sl_imf_ecf_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Free education and Feed Salone expand public-service and programme spending in human capital and agriculture."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Fee abolition and school-support measures reduce household education costs."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Feed Salone directs credit, inputs, and public coordination to agriculture and food systems."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Gender-equality legislation and IMF governance benchmarks formalize rights and public-finance controls."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "The 2024 ECF supports lower fiscal dominance and tighter monetary-policy credibility."}
references:
  - "Government of Sierra Leone, National Development Plan 2024-2030."
  - "IMF Country Report No. 2024/321, Sierra Leone 2024 Article IV and 38-month ECF request."
  - "Government and Parliament of Sierra Leone materials on free education, GEWE Act, and Feed Salone."

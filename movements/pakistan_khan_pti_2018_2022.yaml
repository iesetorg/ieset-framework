# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_khan_pti_2018_2022
status: candidate
name: "Imran Khan PTI — Naya Pakistan / Ehsaas (Pakistan)"
countries: [PAK]
timeframe:
  start: 2018
  end: 2022
  enacted_date: "2018-08-18"
coalition: "Pakistan Tehreek-e-Insaf (PTI)-led coalition with MQM-P, PML-Q, BAP, GDA; confidence-and-supply arrangements; 149/272 NA seats at formation; military-establishment initial backing"
leaders:
  - "Imran Khan (Prime Minister 18 Aug 2018 - 10 Apr 2022, ousted by vote of no-confidence)"
  - "Asad Umar (Finance Minister 2018-2019)"
  - "Abdul Hafeez Shaikh (Finance Adviser/Minister 2019-2021)"
  - "Shaukat Tarin (Finance Minister 2021-2022)"
  - "Reza Baqir (Governor State Bank of Pakistan, 2019-2022)"
  - "Sania Nishtar (Special Assistant, Ehsaas Programme)"
  - "Gen Qamar Javed Bajwa (COAS 2016-2022)"
doctrine: >
  Populist anti-corruption reformist programme — state-welfare
  expansion branded Ehsaas alongside attempted tax-net expansion,
  constrained by a front-loaded balance-of-payments crisis and an
  initial military-establishment reconciliation that ruptured in
  2021-22. Core policy content: (i) IMF Extended Fund Facility
  $6bn 39-month July 2019, triggering ~30% PKR devaluation, policy-
  rate peak 13.25%, electricity and gas tariff hikes, and primary-
  balance targeting; (ii) Ehsaas programme (March 2019) — umbrella
  poverty-alleviation architecture consolidating BISP under new
  branding, Ehsaas Kafaalat (women cash transfers, eventually
  ~PKR 14,000/qtr for ~8m households), Ehsaas Emergency Cash during
  COVID (PKR 203bn to ~15m households, largest single cash-transfer
  rollout in Pakistan's history); (iii) COVID response: targeted
  rather than full lockdown, SBP's 'Temporary Economic Refinance
  Facility' and 'Rozgar' wage-support schemes, construction-sector
  fiscal package April 2020 with tax amnesty; (iv) Naya Pakistan
  Housing low-cost mortgage markup subsidy programme; (v) FBR
  point-of-sale integration, Track-and-Trace system for tobacco/
  cement/sugar/fertiliser, retailer documentation push; (vi) CPEC
  Phase 2 pivot from energy toward Special Economic Zones (Rashakai
  SEZ inauguration 2021) and ML-1 railway upgrade financing
  negotiations; (vii) Single National Curriculum education
  standardisation; (viii) foreign-policy tilt — Saudi / UAE
  recalibration, refusal of US overflight for Afghanistan
  operations, overt China alignment; (ix) end-stage policy shift
  after early 2022 rupture with military leadership — unbudgeted
  fuel and electricity subsidies (Feb-Mar 2022) suspending the IMF
  programme. Ousted 10 Apr 2022 by no-confidence vote, the first
  Pakistani PM removed by parliamentary vote rather than judicial
  or military intervention. Coherence line: anti-corruption populist
  doctrine + welfare-state expansion + initial military-establishment
  partnership, with macro-crisis management constraints and terminal
  civil-military rupture. Popularity: 2018 election PTI 31.8% / 149
  NA seats; approval strong 2018-2020 then eroding under inflation;
  post-ouster PTI rallies drew historically large crowds; PTI-backed
  independents won 93/265 directly-contested NA seats in Feb 2024
  despite party being barred from its cricket-bat symbol.
policies:
  - pk_imf_eff_6bn_2019
  - pk_ehsaas_programme_2019
  - pk_covid_emergency_cash_2020
  - pk_naya_pakistan_housing_2019
  - pk_fbr_track_and_trace_2020
  - pk_no_confidence_vote_2022
axes_summary:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Ehsaas Kafaalat expansion + COVID Emergency Cash (~PKR 203bn to ~15m households) expanded cash-transfer footprint significantly."
  - axis: fiscal.spending_level
    direction: "mixed"
    magnitude: moderate
    rationale: "IMF-programme consolidation FY20-FY21 offset by COVID response FY20 and end-stage unfunded fuel subsidy Feb-Mar 2022."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: weak
    rationale: "FBR documentation push, POS integration, tax-net expansion rhetoric; direct-tax share modestly up but base narrow."
  - axis: fiscal.sectoral_subsidy
    direction: "mixed"
    magnitude: weak
    rationale: "Construction package with tax amnesty (Apr 2020) expanded; pre-ouster fuel/electricity subsidy reintroduced."
  - axis: regulatory.product_market_competition
    direction: "0"
    magnitude: weak
    rationale: "SOE reform largely stalled; PIA/Steel Mills privatisation did not proceed."
  - axis: regulatory.energy_supply_security
    direction: "0"
    magnitude: weak
    rationale: "Capacity overhang from CPEC Phase 1 continued; circular-debt growth resumed."
  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: moderate
    rationale: "State Bank of Pakistan Amendment Act 2022 (passed Jan 2022) enhanced SBP autonomy, price-stability primary mandate, prohibition on direct government lending — an IMF structural benchmark."
  - axis: institutional.rule_of_law
    direction: "mixed"
    magnitude: weak
    rationale: "Anti-corruption NAB activity intensified against opposition figures; reciprocal politicisation contested."
outcome_hypotheses:
  - imf_stabilisation_program_effects
  - cash_transfer_poverty_effects
  - central_bank_independence_inflation_effects
predecessor_movements:
  - pakistan_nawaz_sharif_pmln_iii_2013_2017
successor_movements:
  - pakistan_shehbaz_pmln_coalition_2024_present
position_alignments:
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Ehsaas architecture is explicit expansion of cash-transfer welfare state."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "IMF-programme orthodoxy + SBP independence upgrade."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Tax-net expansion and FBR documentation push, offset by construction amnesty and end-stage fuel subsidy."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "SEZ-oriented CPEC Phase 2 pivot."}
references:
  - "IMF Extended Fund Facility for Pakistan, 3 Jul 2019 ($6bn, 39-month)"
  - "State Bank of Pakistan Amendment Act 2022 (Jan 2022)"
  - "Ehsaas Programme framework (Mar 2019)"
  - "Election Commission of Pakistan general election results 2018"
  - "National Assembly of Pakistan — vote of no-confidence 10 Apr 2022"
  - "World Bank Ehsaas Emergency Cash programme review (2021)"
notes: >
  First PM in Pakistani history removed by parliamentary vote of
  no-confidence rather than coup or judicial disqualification —
  institutionally distinctive. End-stage (Feb-Apr 2022) fuel-
  subsidy decision is in tension with the preceding IMF-programme
  discipline and coded as mixed rather than split. PTI's
  post-ouster electoral performance via independents in Feb 2024
  (93/265 directly-contested NA seats) is captured under the
  successor Shehbaz movement entry.

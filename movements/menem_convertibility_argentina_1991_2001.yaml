# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: menem_convertibility_argentina_1991_2001
status: candidate
name: Menem Convertibility Plan + liberalisations
countries:
- ARG
timeframe:
  start: 1991
  end: 2001
  enacted_date: '1991-04-01'
coalition: Peronist Justicialist Party under Menem with Domingo Cavallo as Economy Minister
leaders:
- Carlos Menem (President)
- Domingo Cavallo (Economy 1991-1996, 2001)
doctrine: '1-to-1 peso-dollar currency board (Convertibility Law, Apr 1991) + large- scale privatisations
  + trade opening + labour-market liberalisation. Ended 1980s hyperinflation quickly + produced
  growth 1991-1998 + attracted capital inflows. Unsustainable real appreciation accumulated; rigid
  exchange rate left no adjustment tool for 1999 Brazil devaluation + 1999-2001 external shocks.
  Ended in 2001-2002 collapse: sovereign default, corralito banking freeze, exchange rate collapse
  to ~3 pesos/USD. Canonical case of a market-oriented programme that achieved short-run goals
  but failed from exchange-rate-regime rigidity.

  '
policies:
- argentina_convertibility_law_1991
- argentina_privatisations_1991_1999
- argentina_trade_opening_1991_1995
- argentina_convertibility_plan_1991
axes_summary:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: Currency board removes discretion.
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Extensive privatisation of utilities, YPF, telecom, transport.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Provincial overspend + structural deficit grew despite privatisation revenue.
outcome_hypotheses:
- exchange_rate_regime_choice_and_crisis_vulnerability
position_alignments:
- position_id: chicago_monetarism
  alignment: partially_aligned
- position_id: austrian
  alignment: partially_aligned
  notes: Rule-based money appealing; rigidity failure case.
references:
- 'Cavallo (2001), Convertibility: Lessons from Argentina'
- Blustein (2005), And the Money Kept Rolling In (and Out)

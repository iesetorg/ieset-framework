movement_id: us_obama_ara_2009_recovery
status: candidate
name: "Obama ARRA + Dodd-Frank + ACA"
countries: [USA]
timeframe: {start: 2009, end: 2012}
coalition: "Democratic (Obama + 111th Congress Democratic majorities; ACA passed via reconciliation after loss of 60-seat Senate)"
leaders:
  - "Barack Obama (President)"
  - "Timothy Geithner (Treasury)"
  - "Lawrence Summers (NEC)"
  - "Christina Romer (CEA)"
  - "Nancy Pelosi (Speaker)"
  - "Harry Reid (Senate Majority Leader)"
  - "Barney Frank (House Financial Services)"
  - "Chris Dodd (Senate Banking)"
doctrine: >
  Crisis-response triad enacted over the first term. The American Recovery
  and Reinvestment Act 2009 (ARRA) deployed $787bn (later scored ~$831bn)
  combining tax credits (Making Work Pay, AOTC), aid to state/local
  governments (FMAP boost, State Fiscal Stabilization Fund), safety-net
  expansion (UI extension, SNAP), and direct investment (infrastructure,
  Recovery Act loan guarantees for clean energy under Section 1705). The
  Dodd-Frank Wall Street Reform and Consumer Protection Act 2010 created the
  Consumer Financial Protection Bureau (CFPB), the Financial Stability
  Oversight Council (FSOC), new OLA resolution authority, Volcker Rule
  constraints on proprietary trading, derivatives central clearing, and
  stress-testing (DFAST/CCAR). The Patient Protection and Affordable Care
  Act 2010 (ACA) created state/federal insurance exchanges with premium
  subsidies, the individual mandate (since zeroed out 2017), guaranteed
  issue + community rating, and Medicaid expansion (later Roberts-limited
  in NFIB v. Sebelius 2012). Stated case: fiscal stimulus during ZLB
  liquidity trap, re-regulation of financial sector to prevent repeat
  crisis, and near-universal health coverage.
policies:
  - us_arra_2009
  - us_dodd_frank_2010
  - us_aca_2010
  - us_medicaid_expansion_2010
  - us_cfpb_creation_2010
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "ARRA $831bn + ACA subsidies + Medicaid expansion."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "ACA premium tax credits + Medicaid expansion; UI/SNAP extensions in ARRA."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Dodd-Frank is the tightest financial-regulation move since Glass-Steagall."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "EPA endangerment finding enforcement, CAFE standards 2012, Section 1705 clean-energy loans."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "ARRA clean-energy grants/loans, Advanced Technology Vehicle Manufacturing."}
outcome_hypotheses: [fiscal_multiplier_at_zero_lower_bound, dodd_frank_systemic_risk_reduction, health_coverage_expansion_access_outcomes]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Textbook NK ZLB prescription + macro-prudential frame."}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Agreed stimulus direction; judged magnitude too small."}
  - {position_id: social_democratic, alignment: aligned, notes: "ACA substantially expanded universal-coverage architecture."}
  - {position_id: institutionalism, alignment: aligned, notes: "Dodd-Frank institutional scaffolding — CFPB, FSOC, OLA."}
  - {position_id: austrian, alignment: opposed}
  - {position_id: classical_liberal, alignment: opposed}

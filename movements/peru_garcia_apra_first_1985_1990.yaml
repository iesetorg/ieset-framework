movement_id: peru_garcia_apra_first_1985_1990
status: candidate
name: "García APRA first term — heterodox shock, debt-service limit, hyperinflation"
countries: [PER]
timeframe: {start: 1985, end: 1990, enacted_date: "1985-07-28"}
coalition: "Alianza Popular Revolucionaria Americana (APRA)"
leaders:
  - "Alan García Pérez (President 1985-1990)"
  - "Luis Alva Castro (Prime Minister / Economy 1985-1987)"
  - "Gustavo Saberbein (Economy 1987-1988)"
  - "Abel Salinas (Economy 1988-1989)"
  - "César Vásquez (Economy 1989-1990)"
doctrine: >
  Heterodox-populist APRA programme — first APRA presidency 60 years after
  party founding. Four doctrinal pillars: (1) debt-service limitation —
  García's inaugural speech capped foreign-debt service at 10% of export
  earnings, confronting the IMF; Peru declared "ineligible" by IMF in
  August 1986; external arrears accumulated; (2) heterodox shock —
  August 1985 inti replaced the sol at 1 to 1,000; price-wage freezes,
  multiple exchange rates, interest-rate controls, and expansionary
  fiscal stimulus; real GDP grew 9.7% (1986) and 6.9% (1987) via
  capacity utilisation recovery; (3) July 1987 bank nationalisation
  announcement — García announced nationalisation of the ten largest
  private banks on Independence Day; proposal triggered mass
  constitutional challenge, the Vargas Llosa-led Movimiento Libertad
  opposition, and by October 1987 was effectively defeated in the
  courts; marked turning point in middle-class support; (4)
  hyperinflation and collapse — 1988-1990 terminal crisis: GDP fell
  -8.3% (1988), -11.7% (1989); CPI peaked at 7,650% (1990); "paquetazos"
  shock-adjustment packages September 1988 and March 1989 failed to
  stabilise; international reserves exhausted; Sendero Luminoso expanded
  control over MRTA and narco-trafficking corridors. Stated school:
  APRA heterodox-structuralism + CEPAL-origins developmentalism +
  populist redistribution. Left-right axis: centre-left economic
  content with anti-imperialist foreign-debt posture. Popularity /
  legitimacy: April 1985 election García won 53.1% (first round, second
  round waived when Barrantes declined), the largest APRA margin ever;
  1989 municipal elections APRA collapsed; April-June 1990 succession
  Fujimori defeated Vargas Llosa 56.5% vs 33.9% — García handed power
  28 July 1990 amid hyperinflation. Coherence line: trade creditor-
  community access and macro stabilisation for redistributive expansion
  and anti-imperialist assertion — a case study of populist
  inconsistency identified by Dornbusch-Edwards (1991) as the canonical
  "macroeconomics of populism" failure mode.
policies:
  - pe_debt_service_limit_1985
  - pe_inti_heterodox_plan_1985
  - pe_bank_nationalisation_announcement_1987
  - pe_paquetazos_stabilisation_1988_1989
  - pe_hyperinflation_1988_1990
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Heterodox expansion 1985-87; public-sector deficit peaked ~11% GDP 1988."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Price subsidies; public-employment expansion; wage hikes."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Exchange controls, interest-rate controls, attempted bank nationalisation."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "1987 bank-nationalisation announcement signalled expropriation intent; court-blocked but chilling effect."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Multiple exchange rates; import-licensing regime extended."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "BCR financed fiscal deficit; reserve exhaustion 1988-90."}
outcome_hypotheses: [populist_macroeconomic_failure_mode, hyperinflation_requires_fiscal_dominance]
predecessor_movements: [peru_belaunde_ap_1980_1985]
successor_movements: [peru_fujimori_stabilisation_1990_2000]
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Heterodox wage-price programme; debt-service limitation."}
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: opposed}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "García inaugural address, 28 July 1985"
  - "Ley de Estatización de la Banca, Ley 24723/1987 (judicially blocked)"
  - "Dornbusch-Edwards eds. (1991), The Macroeconomics of Populism in Latin America — García case study"
  - "Crabtree (1992), Peru Under Garcia: An Opportunity Lost"
  - "Paredes-Sachs eds. (1991), Peru's Path to Recovery"
notes: "Canonical Dornbusch-Edwards populism case. García returned 2006-2011 in orthodox second term."

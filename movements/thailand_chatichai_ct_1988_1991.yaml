movement_id: thailand_chatichai_ct_1988_1991
status: candidate
name: "Chatichai Choonhavan Chart Thai — battlefields-to-marketplaces (Thailand)"
countries: [THA]
timeframe: {start: 1988, end: 1991}
coalition: "Chart Thai-led multiparty coalition"
leaders:
  - "Chatichai Choonhavan (PM Aug 1988-Feb 1991, Chart Thai)"
  - "Pramual Sabhavasu (Finance Minister)"
  - "Subin Pinkhayan (Commerce Minister)"
doctrine: >
  Chatichai 'turning battlefields into marketplaces' doctrine —
  regional opening to Indochina (Vietnam, Laos, Cambodia, Burma) and
  construction-boom growth. Economic school: elected-civilian
  developmentalist with Indochina-opening foreign-economic strand;
  Thailand as regional trade/finance hub. Dated policies: Bangkok
  International Banking Facility (BIBF) proposal developed 1989-1991
  (launched 1993); Sixth National Economic and Social Development Plan
  1987-1991 acceleration; Eastern Seaboard Development Programme
  continuing Prem-era industrial policy; proposals for Bangkok Mass
  Transit; Vietnam-Thailand and Laos-Thailand trade normalisation;
  boom GDP 13.2% (1988), 12.2% (1989), 11.2% (1990); arms-procurement
  scandals and 'buffet-cabinet' corruption narratives. Left-right:
  centre-right elected-civilian coalition; economic policy market-
  opening but patronage-heavy. Popularity: Jul 1988 House of
  Representatives Chart Thai led 87 seats as largest single party in
  coalition; 23 Feb 1991 overthrown by National Peace-Keeping Council
  (NPKC) coup led by General Sunthorn/Suchinda. Coherence: moderate —
  Indochina opening coherent strategic doctrine but domestic
  patronage-fuelled governance triggered military intervention; boom
  inflated land/stock bubble that contributed to 1997 crisis
  preconditions.
policies:
  - th_indochina_trade_opening_1988_1991
  - th_sixth_5yr_plan_acceleration_1988
  - th_bibf_planning_1989_1991
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Indochina trade normalisation with Vietnam/Laos/Cambodia opening."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "BIBF design groundwork 1989-1991 (launched 1993)."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Infrastructure push — Eastern Seaboard, Bangkok mass-transit planning."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Military coup Feb 1991 ended democratic trajectory; institutional-stability failure."}
predecessor_movements:
  - thailand_prem_tinsulanonda_semi_democratic_1980_1988
successor_movements:
  - thailand_anand_panyarachun_technocrat_1991_1992
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Phongpaichit & Baker (1995), Thailand: Economy and Politics"
  - "Hewison (1993), 'Of Regimes, State and Pluralities: Thai Politics Enters the 1990s'"
notes: "Deep-history tranche 2. Ended by 1991 coup."

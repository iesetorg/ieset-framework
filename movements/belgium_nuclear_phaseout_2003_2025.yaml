movement_id: belgium_nuclear_phaseout_2003_2025
status: candidate
name: Belgium nuclear phase-out law and successive extensions
countries:
- BEL
timeframe:
  start: 2003
  end: 2025
  enacted_date: '2003-01-31'
coalition: Verhofstadt I liberal-socialist-green coalition (enactment); successive coalitions (amendments)
leaders:
- Guy Verhofstadt (Prime Minister 1999-2008)
- Olivier Deleuze (Energy State Secretary, Ecolo)
- Alexander De Croo (Prime Minister 2020-2025)
- Tinne Van der Straeten (Energy Minister, Groen)
doctrine: 'Loi du 31 janvier 2003 sur la sortie progressive de l''énergie nucléaire legislated closure
  of Belgium''s seven reactors (Doel 1-4, Tihange 1-3) after 40 years of operation, ending nuclear generation
  around 2025. Repeatedly amended: 2013 (Tihange 1 life-extension to 2025), 2015 (Doel 1 and Doel 2 extensions),
  2022 De Croo government decision to extend Doel 4 and Tihange 3 by 10 years to 2035 in response to the
  Russian gas crisis and supply-security pressures (formal agreement with Engie signed 13 December 2023,
  ratified 2024), and the May 2025 legislation repealing the 2003 phase-out law outright under the De
  Wever government. Belgium is the canonical case of a democratic phase-out commitment repeatedly walked
  back as supply-security realities bound: the framework codes the enacted direction honestly but records
  the revealed-preference reversal.

  '
policies:
- belgium_nuclear_phaseout_law_2003
- belgium_tihange1_extension_2015
- belgium_doel4_tihange3_extension_2023
- belgium_nuclear_repeal_2025
axes_summary:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  rationale: Phase-out of zero-carbon baseload paradoxically lowers stringency on carbon terms but raised
    environmental-rule stringency as intended by enactors; coded net-positive on stated intent.
- axis: regulatory.sectoral_licensing
  direction: +
  magnitude: moderate
  rationale: Statutory shutdown calendar and operator-specific licensing for each reactor.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  rationale: Belgium imports roughly half its electricity in peak periods; reliance on French nuclear
    and gas backfill deepened; 2022-2025 extensions and 2025 repeal are explicit admissions of this trajectory.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: weak
  rationale: Capacity Remuneration Mechanism (CRM) auctions since 2021 subsidise gas-fired replacement
    capacity.
outcome_hypotheses:
- belgium_electricity_import_dependence
- nuclear_phaseout_vs_peers_wholesale_price
position_alignments:
- position_id: eco_socialist
  alignment: aligned
- position_id: austrian
  alignment: opposed
- position_id: empirical_pragmatist
  alignment: opposed
  notes: Revealed-preference reversals across 2015/2022/2025 amendments support the supply-security critique.
references:
- Loi du 31 janvier 2003 sur la sortie progressive de l'énergie nucléaire (Moniteur belge, 28 février
  2003)
- Accord Engie-État belge sur la prolongation Doel 4 / Tihange 3 (13 décembre 2023)
- Loi abrogeant la sortie du nucléaire (Moniteur belge, mai 2025)
- Elia reports on Belgian system adequacy 2021-2024
notes: 'Included as a peer case to Germany: the same policy content with a smaller grid and deeper import
  exposure sharpened the supply-security trade-off and produced an earlier political reversal.

  '

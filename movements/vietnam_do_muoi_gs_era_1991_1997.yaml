# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: vietnam_do_muoi_gs_era_1991_1997
status: candidate
name: "Đỗ Mười General Secretary era — reform consolidation (Vietnam)"
countries: [VNM]
timeframe: {start: 1991, end: 1997}
coalition: "Communist Party of Vietnam under General Secretary Đỗ Mười"
leaders:
  - "Đỗ Mười (General Secretary 1991-1997)"
  - "Võ Văn Kiệt (Prime Minister 1991-1997)"
  - "Phan Văn Khải (Deputy PM / PM from 1997)"
doctrine: >
  Đỗ Mười era — reform-consolidation doctrine at 7th Congress Jun 1991
  deepening market transition after CMEA collapse, normalising
  international relations. Economic school: 'socialist-oriented market
  economy' consolidation; pragmatic market-Leninism. Dated policies:
  7th Party Congress Jun 1991; Constitution of 1992 (15 Apr 1992)
  recognising multi-sector economy and private-property rights;
  Cambodia normalisation Paris Peace Accords 23 Oct 1991; China-Vietnam
  normalisation Nov 1991 Beijing Summit; US trade embargo lifted 3 Feb
  1994; ASEAN accession 28 Jul 1995; US-Vietnam diplomatic
  normalisation 11 Jul 1995; State-Owned Enterprise (SOE) Law 1995
  creating General Corporations; Land Law 1993 granting long-term
  land-use-rights certificates; 8th Party Congress Jun 1996;
  acceleration of SOE reform and equitisation pilots 1992-1996. Left-
  right: Leninist-market pragmatic — economic policy market-opening;
  political monopoly of CPV unchanged. Popularity: Party-controlled
  electoral/plebiscitary politics; growth 8-9% annually 1992-1997
  anchored regime legitimacy. Coherence: high — constitutional
  modernisation, land law, SOE reform, international normalisation
  (ASEAN, US, China) all reinforced the market-opening direction;
  trajectory interrupted by 1997 Asian crisis affecting Vietnam
  mildly compared to neighbours.
policies:
  - vn_1992_constitution_market_recognition
  - vn_land_law_1993
  - vn_asean_accession_1995
  - vn_us_normalisation_1995
  - vn_soe_general_corporations_1995
axes_summary:
  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "1992 Constitution + 1993 Land Law established long-term land-use rights certificates."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "US embargo lift 1994, ASEAN accession 1995, US normalisation 1995."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "SOE reform pilots + private-sector expansion formalised."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "1992 Constitution formalised multi-sector economy and some legal-rights framework."}
predecessor_movements:
  - vietnam_linh_doi_moi_implementation_1986_1991
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Fforde (2007), Vietnamese State Industry and the Political Economy of Commercial Renaissance"
  - "Riedel & Turley (1999), 'The Politics and Economics of Transition to an Open Market Economy in Viet Nam'"
notes: "Deep-history tranche 2. Consolidation of Đổi Mới."

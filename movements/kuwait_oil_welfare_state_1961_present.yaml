# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kuwait_oil_welfare_state_1961_present
status: candidate
name: "Kuwait oil-welfare state and sovereign wealth model"
countries: [KWT]
timeframe: {start: 1961, end: ongoing}
coalition: "Al Sabah monarchy, elected National Assembly bargains, and oil-funded public sector"
leaders:
  - "Abdullah Al-Salem Al-Sabah (Emir 1950-1965)"
  - "Jaber Al-Ahmad Al-Sabah (Emir 1977-2006)"
  - "Saad Al-Abdullah Al-Salem Al-Sabah and later Al Sabah emirs"
doctrine: >
  Kuwait's post-independence governing regime converted oil rents into a
  citizen welfare state, public employment compact, and large sovereign wealth
  savings architecture. The model combined parliamentary bargaining and ruling
  family executive authority with free health and education, housing support,
  subsidies, guaranteed public-sector jobs for citizens, and intergenerational
  investment through the Kuwait Investment Authority and the Future Generations
  Fund.
policies:
  - kwt_constitution_parliament_1962
  - kwt_general_reserve_future_generations_funds_1976
  - kwt_public_employment_welfare_distribution_1960s_present
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Citizen benefits, housing support, subsidies, and public employment form the core distributive compact."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Oil revenue supports large recurrent spending and public-sector wage commitments."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Energy, housing, and consumption subsidies are central to the oil-welfare architecture."}
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "The 1962 constitution and elected assembly created real institutional bargaining, while executive suspensions and citizenship exclusions limited full constraint."}
references:
  - "Crystal (1995), Oil and Politics in the Gulf"
  - "Herb (2014), The Wages of Oil"
  - "Kuwait Investment Authority, historical overview of the Future Generations Fund"
notes: "The welfare compact is ongoing, but oil-price cycles and National Assembly disputes periodically alter benefit and savings rules."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_prabowo_2024_present
status: candidate
name: "Indonesia Prabowo Gerindra-led coalition"
countries: [IDN]
timeframe: {start: 2024, end: ongoing}
coalition: "Koalisi Indonesia Maju — Gerindra-led super-majority (Gerindra, Golkar, Demokrat, PAN, PSI, PKB, Nasdem; PDI-P excluded at formation)"
leaders: ["Prabowo Subianto (President from 20 Oct 2024)", "Gibran Rakabuming Raka (VP, Jokowi's son)", "Sri Mulyani Indrawati (Finance, continued)", "Rosan Roeslani (Danantara CEO-designate)", "Bahlil Lahadalia (Energy / downstream)", "Zulkifli Hasan (Food)"]
doctrine: >
  Populist-nationalist economic-statism that folds Jokowi's
  downstreaming-and-infrastructure programme into a larger state-
  capitalist consolidation. Flagship on the demand side is the
  Makan Bergizi Gratis (free nutritious-meal) programme launched
  Jan 2025, targeting ~83 million schoolchildren and pregnant women
  at an advertised run-rate ~Rp 450 trillion/year (~2% of GDP at
  full rollout). Flagship on the supply side is Danantara (Daya
  Anagata Nusantara, Feb 2025) — a sovereign-wealth vehicle
  consolidating state-owned-enterprise equity (Pertamina, PLN,
  Mandiri, BRI, BNI, Telkom) outside the finance ministry and
  outside standard audit scope, targeting USD 900bn in assets
  under management. Resource-nationalist continuity: nickel
  downstreaming, bauxite ban enforcement, push for a 'nickel OPEC'.
  Fiscal posture: VAT raised to 12% on luxury categories Jan 2025
  (partial rollback from an originally planned universal hike),
  deficit ceiling 3% stretched with off-balance-sheet Danantara
  financing. Institutional posture: coalition holds ~81% of DPR
  seats, PDI-P squeezed into opposition; military-civic roles
  expanded via TNI law revision March 2025. Energy/resource nationalism
  also extends into the biodiesel mandate, with B40 running as the baseline
  blend and B50 scheduled for second-half 2026 implementation. Coherence: low — free
  lunches and macro-orthodox VAT hike pull against each other;
  Danantara and Sri Mulyani's budget discipline in visible
  tension.
policies: [id_prabowo_free_meals_2025, id_prabowo_danantara_2025, id_prabowo_vat_hike_12pct_2025, id_prabowo_tni_law_revision_2025, id_prabowo_b40_b50_biodiesel_mandate_2025_2026]
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Free-meals programme is the largest single in-kind transfer expansion in Indonesian fiscal history."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "MBG + Danantara equity injections + infrastructure continuity lift spending share."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Danantara consolidates SOE ownership and investment decisions outside line-ministry gating; net effect is tighter state gating over strategic sectors."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Continuity and extension of nickel / bauxite / copper export bans; push for cartel-like nickel coordination."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "TNI law revision 2025 expanded military roles in civilian administration; Danantara audit carve-out."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "VAT hike to 12% on luxury categories (originally universal) is regressive at the margin, offset by targeted goods exemption."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "B40/B50 biodiesel mandate increases domestic biofuel blending and reduces diesel-import exposure."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Higher biodiesel blending is framed as a lower-emission fuel-mix intervention, despite palm-oil land-use caveats."}
outcome_hypotheses: [sovereign_wealth_fund_state_capitalism_effects, universal_in_kind_transfer_child_development]
position_alignments:
- position_id: developmentalism
  alignment: aligned
- position_id: chicago_monetarism
  alignment: opposed
- position_id: institutionalism
  alignment: opposed
predecessor_movements: [indonesia_jokowi_pdip_2014_2024]
references:
  - "Aspinall & Mietzner (2024), 'Indonesia's 2024 Election: Dynastic Democracy', Journal of Democracy"
  - "IMF Indonesia Article IV 2025"
  - "Lowy Institute (2025), 'Prabowo's First Hundred Days'"
  - "Ministry of Energy and Mineral Resources, B50 Biodiesel to be Implemented in 2nd Semester 2026, 28 June 2026: https://www.esdm.go.id/en/media-center/news-archives/b50-biodiesel-to-be-implemented-in-2nd-semester-2026"
notes: |
  Electoral: Prabowo-Gibran won 58.6% first round, 14 Feb 2024 (absolute majority
  avoided runoff). Coalition commands ~81% of DPR seats — largest single-president
  coalition share since Reformasi.

movement_id: uruguay_orsi_fa_2025_present
status: candidate
name: "Orsi Frente Amplio — MPP return with fiscal-rule continuity 2025-present"
countries: [URY]
timeframe: {start: 2025, end: "ongoing", enacted_date: "2025-03-01"}
coalition: "Frente Amplio (FA) — MPP-led, without own majority in either chamber"
leaders:
  - "Yamandú Orsi (President, sworn 1 March 2025)"
  - "Carolina Cosse (Vice-President)"
  - "Gabriel Oddone (Economy and Finance)"
  - "José Mujica (MPP elder, d. May 2025)"
doctrine: >
  Frente Amplio centre-left MPP (Movimiento de Participacion Popular,
  Mujica's party) return after the 2020-2025 centre-right interlude.
  Stated doctrine: fiscal-rule continuity, selective social-transfer
  expansion, cost-of-living relief through regulatory simplification, and
  coalition discipline in a chamber where FA lacks its own majority
  (Diputados 48/99, Senado 16/31 including VP). Left-right axis:
  centre-left on distribution, centrist on macro - explicit commitment to
  keep the structural-balance rule and BCU inflation-targeting framework
  inherited from Lacalle Pou / Astori tradition. Key early policy content:
  (i) pension-reform response through targeted minimum-benefit increases
  rather than wholesale repeal after the October 2024 plebiscite failed;
  (ii) targeted transfer expansion for first childhood via Bono Crianza
  and a unified 0-to-3 transfer architecture; (iii) a Rendicion de Cuentas
  priority envelope for childhood, security, education, and homelessness;
  (iv) roads, neighbourhood intervention, housing-title regularisation,
  and microenterprise debt facilities; (v) a competitiveness and cost
  reduction bill built around administrative simplification, import
  facilitation, competition policy, and Mipyme support. Coherence line:
  "continuity plus selective redistribution plus lower operating costs" -
  a deliberately non-rupturist FA return consistent with Orsi's campaign
  tone.
policies:
  - uy_pension_reform_partial_softening_2025
  - uy_bono_crianza_expansion_2025
  - uy_rendicion_cuentas_priority_spending_2026
  - uy_national_road_infrastructure_plan_2025_2030
  - uy_mas_barrio_integrated_intervention_2026
  - uy_competitiveness_cost_reduction_bill_2026
  - uy_housing_title_regularisation_2026
  - uy_bps_microenterprise_debt_facilities_2026
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Bono Crianza/first-childhood transfer scaling, minimum-pension top-ups, Mas Barrio services, and homelessness support."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Rendicion priority envelope and roads/neighbourhood spending expand selected programmes while fiscal-rule continuity constrains aggregate growth."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "BPS facilities and competitiveness-bill incentives reduce covered firm arrears and selected IRAE burdens."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Competitiveness bill lowers registration, licensing, importer, antitrust, and Mipyme compliance frictions."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Customs self-dispatch, export-support measures, and road-corridor investment lower trade frictions."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Housing-title regularisation converts pending administrative claims into formal escrituras."}

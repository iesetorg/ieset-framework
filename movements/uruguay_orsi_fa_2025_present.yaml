movement_id: uruguay_orsi_fa_2025_present
status: candidate
name: "Orsi Frente Amplio — MPP return with fiscal-rule continuity 2025-present"
countries: [URY]
timeframe: {start: 2025, end: "ongoing", enacted_date: "2025-03-01"}
coalition: "Frente Amplio (FA) — MPP-led, without own majority in either chamber"
leaders:
  - "Yamandú Orsi (President, sworn 1 March 2025)"
  - "Carolina Cosse (Vice-President)"
  - "Gabriel Oddone (Economy and Finance)"
  - "José Mujica (MPP elder, d. May 2025)"
doctrine: >
  Frente Amplio centre-left MPP (Movimiento de Participación Popular,
  Mujica's party) return after the 2020-2025 centre-right interlude.
  Stated doctrine: fiscal-rule continuity, selective social-transfer
  expansion, climate-agenda reinvigoration, and coalition discipline in
  a chamber where FA lacks its own majority (Diputados 48/99, Senado
  16/31 including VP). Left-right axis: centre-left on distribution
  and climate, centrist on macro — explicit commitment to keep the
  structural-balance rule and BCU inflation-targeting framework inherited
  from Lacalle Pou / Astori tradition. Key early policy content:
  (i) pension-reform response — partial softening (reversing some Ley
  20.130 accrual-rate changes) rather than wholesale repeal given PIT-CNT
  and Cabildo Abierto-led plebiscite of October 2024 had failed 60-40;
  (ii) climate and energy transition Plan Nacional de Hidrógeno Verde
  operationalisation; (iii) targeted transfer expansion for child
  poverty (Bono Crianza scaling); (iv) housing plan expansion; (v)
  Mercosur-EU agreement advocacy post-December 2024 signature; (vi)
  continuation of Lacalle Pou fiscal-rule architecture. Popularity:
  Orsi won runoff 49.8% (vs Álvaro Delgado 45.9%) 24 November 2024;
  honeymoon approval ~55% through early 2025; MPP-Comunistas-Socialistas
  internal factional balance constrains reform velocity. Coherence line:
  "continuity plus climate plus selective redistribution" — a deliberately
  non-rupturist FA return consistent with Orsi's campaign tone.
policies:
  - uy_pension_reform_partial_softening_2025
  - uy_bono_crianza_expansion_2025
axes_summary:

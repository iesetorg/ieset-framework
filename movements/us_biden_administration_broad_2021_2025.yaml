axes_summary:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: ARP + IIJA + IRA + CHIPS combined gross outlays + authorisations on the order of
    $5T over horizon; federal primary spending share elevated post-pandemic.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: Expanded CTC 2021, UI top-ups, ACA subsidy extension, SNAP; several provisions allowed
    to expire.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: IRA + CHIPS are the largest US industrial-policy move since WWII.
- axis: fiscal.tax_corporate
  direction: +
  magnitude: weak
  rationale: IRA corporate AMT + stock-buyback excise; no broad rate reversal of TCJA.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  rationale: IRA + EPA rules (methane, vehicle tailpipe, power-plant GHG), SEC climate disclosure
    rule, Paris re-entry.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: moderate
  rationale: Retention + expansion of Trump tariffs, IRA domestic-sourcing, semiconductor export
    controls.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  rationale: Heightened merger-review stringency, FTC non-compete ban (later enjoined), Big-Tech
    cases — a regulatory-activism posture that tightens entry terms even where pro-competition
    in intent.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: moderate
  rationale: NLRB Cemex + joint-employer rules, Labor Dept overtime rule, pro-union procurement.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: weak
  rationale: Basel III endgame proposal, SEC climate + private-fund rules; mostly unfinished at
    end of term.

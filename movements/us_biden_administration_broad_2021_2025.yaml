doctrine: 'Bidenomics: industrial-policy-driven, labour-empowering, antitrust-activist, fiscally
  expansionary progressive liberalism, self-described as "middle-out and bottom-up" growth and
  later framed by Jake Sullivan as a "new Washington consensus" explicitly rejecting Washington-consensus
  trade liberalism. Left- of-centre in left-right terms, though constrained by a 50-50 Senate
  and divided post-2023. Core content: (i) American Rescue Plan March 2021 ($1.9T pandemic fiscal
  package with expanded Child Tax Credit, $1,400 checks, state-local aid, UI top-ups); (ii) Infrastructure
  Investment and Jobs Act November 2021 ($1.2T bipartisan physical-infrastructure bill); (iii)
  CHIPS and Science Act August 2022 ($52B direct semiconductor manufacturing subsidies + $200B
  authorised R&D); (iv) Inflation Reduction Act August 2022 (~$369B climate/energy tax credits,
  Medicare drug-price negotiation, corporate 15% book-minimum tax, 1% stock-buyback excise); (v)
  antitrust activism under Khan + Kanter (2023 FTC-DOJ Merger Guidelines, FTC non-compete ban
  rule, Microsoft-Activision and JetBlue-Spirit challenges, Big Tech cases); (vi) labour-empowering
  NLRB under Abruzzo GC (Cemex bargaining-order doctrine, joint-employer rule, expanded remedies);
  (vii) student-debt relief (Aug 2022 blanket plan struck down by SCOTUS in Biden v. Nebraska
  June 2023; then SAVE plan + targeted PSLF forgiveness delivering ~$183B cancellation by end
  of term); (viii) continuation and intensification of Trump-era China tariffs + expanded export
  controls on advanced semiconductors (Oct 2022 and 2023 BIS rules); (ix) Ukraine military + economic
  aid packages. Popularity: Biden won 2020 with 51.3% of the popular vote; approval entered at
  ~55% Jan 2021, fell below 50% by August 2021 (Afghanistan withdrawal + Delta wave) and remained
  in the high-30s-to-low-40s range for most of the term; Democrats outperformed expectations in
  the 2022 midterms (held Senate 51-49, narrow House loss), lost the 2024 general election after
  Biden''s late July 2024 withdrawal in favour of Harris (47.8% popular vote). Coherence line:
  a coherent post-neoliberal industrial-policy and labour-power package, internally tensioned
  between fiscal expansion and inflation management (2021-2023 CPI peak 9.1%) and between climate
  subsidy and trade- protection channels.

  '

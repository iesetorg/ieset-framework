# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_habibie_transition_1998_1999
status: candidate
name: "B. J. Habibie transitional presidency — reformasi opening and East Timor referendum (1998-1999)"
countries: [IDN]
timeframe:
  start: 1998
  end: 1999
  enacted_date: "1998-05-21"
coalition: "Golkar successor government — MPR-confirmed transitional presidency, no fresh mandate"
leaders:
  - "B. J. Habibie (President 21 May 1998 - 20 Oct 1999)"
  - "Ginandjar Kartasasmita (Coordinating Minister for Economy)"
  - "Bambang Subianto → Marie Muhammad → Bambang Subianto (Finance)"
  - "Syahril Sabirin (BI Governor)"
doctrine: >
  Habibie transitional reformasi opening — a German-trained engineer
  inherited the presidency from Suharto on 21 May 1998 after May
  1998 riots, rupiah collapse, and the IMF bailout. Economic school:
  technocratic crisis-management inside IMF conditionality, plus a
  political-liberalisation agenda to secure legitimacy. Centre-right
  reformist on political opening, continuity-plus on IMF-led
  restructuring of banking and the real economy. Key policy content:
  (i) Press freedom Law 40/1999 September 1999 — ending New Order
  licensing; (ii) political-parties Law 2/1999, Law 3/1999 general
  elections, Law 4/1999 legislature — enabling first free election
  7 June 1999; (iii) East Timor referendum 30 August 1999 — 78.5%
  vote for independence, 20 October 1999 MPR recognition; triggered
  militia violence and INTERFET deployment; (iv) Bank Indonesia
  independence Law 23/1999 (effective May 1999) creating de jure
  central-bank autonomy from finance ministry; (v) IBRA (Indonesian
  Bank Restructuring Agency) consolidation — nationalised and
  closed dozens of banks, manages ~Rp 650tn NPL portfolio;
  (vi) Regional autonomy Law 22/1999 and Law 25/1999 (effective
  2001) — "big-bang decentralisation" devolving fiscal and
  administrative powers to district level; (vii) BPPN-managed
  bank recapitalisation schemes funded by ~Rp 650tn government
  bonds placed in banks. Popularity: never won a direct mandate;
  MPR rejected his accountability speech 19 October 1999 and he
  withdrew from presidential contest. Coherence line: transitional
  reformasi — political-liberalisation and institutional foundation-
  laying (BI independence, decentralisation, East Timor settlement)
  under IMF-conditioned banking clean-up.
policies:
  - id_press_freedom_law_1999
  - id_political_parties_law_1999
  - id_east_timor_referendum_1999
  - id_bank_indonesia_independence_1999
  - id_regional_autonomy_big_bang_1999
  - id_ibra_bank_restructuring_1998
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Press freedom, political parties, legislative law cluster ended New Order suppression; East Timor referendum honoured."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Law 23/1999 established formal BI independence from Finance Ministry."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "IBRA bank nationalisations and Suharto-family-business unwinding created near-term expropriation risk perception; blanket deposit guarantee partly offsetting."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "BPPN/IBRA supervisory regime and bank-licensing tightening under IMF programme."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Recapitalisation bonds ~Rp 650tn issued, bank-sector bailout cost peaked ~50% of GDP."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Dismantling of Suharto-era BPPC clove and APEGTI monopolies under IMF LoI."}
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Political opening and dismantling of New Order monopolies."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Decentralisation big-bang treated as measurable institutional experiment."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Democratic opening welcomed; bailout distributional costs contested."}
references:
  - "Law 23/1999 on Bank Indonesia"
  - "Law 22/1999 and Law 25/1999 on Regional Government and Fiscal Balance"
  - "IMF Letter of Intent with Indonesia, January 1998 and supplemental"
  - "Aspinall (2005), 'Opposing Suharto: Compromise, Resistance, and Regime Change in Indonesia'"
notes: >
  Habibie explicitly coded as "transition" because his foundational
  reforms (BI independence, decentralisation, referendum) were
  institutional-architecture rather than programmatic; legitimacy
  vested in MPR confirmation rather than popular vote.

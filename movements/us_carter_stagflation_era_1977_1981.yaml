# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_carter_stagflation_era_1977_1981
status: candidate
name: Carter deregulation + stagflation-era adjustments
countries:
- USA
timeframe:
  start: 1977
  end: 1981
coalition: Democratic (Carter) + Democratic-majority Congress; heterogeneous policy mix
leaders:
- Jimmy Carter (President)
- Alfred Kahn (CAB chair; inflation czar 1978-80)
- Charles Schultze (CEA)
- W. Michael Blumenthal (Treasury 1977-79)
- G. William Miller (Treasury 1979-81, Fed Chair 1978-79)
- Paul Volcker (Fed Chair from Aug 1979, appointed by Carter)
doctrine: 'Mixed-direction programme dominated by three strands: (1) sectoral deregulation — Airline
  Deregulation Act 1978 (ADA) dissolved CAB route / fare control, the Motor Carrier Act 1980 (MCA)
  and Staggers Rail Act 1980 freed trucking and rail, the Natural Gas Policy Act 1978 began price
  decontrol, and the Depository Institutions Deregulation and Monetary Control Act 1980 (DIDMCA)
  phased out Regulation Q deposit-rate ceilings; (2) energy policy — creation of the Department
  of Energy (1977), the National Energy Act 1978, the Energy Security Act 1980 with synthetic-fuels
  programme, and a windfall-profits tax 1980; (3) monetary response to stagflation — appointment
  of Paul Volcker as Fed Chair (Aug 1979) and tolerance of the ensuing rate shock. Stated case:
  attack 1970s stagflation by removing regulatory rents that amplified cost pressures and restoring
  monetary credibility. Political cost high — the 1980 election broke on inflation (13.5% CPI)
  and the Iran hostage crisis.

  '
policies:
- us_airline_deregulation_act_1978
- us_motor_carrier_act_1980
- us_staggers_rail_act_1980
- us_natural_gas_policy_act_1978
- us_didmca_1980
- us_doe_creation_1977
- us_volcker_appointment_1979
- us_airline_deregulation_1978
axes_summary:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: ADA + MCA + Staggers collectively ended fifty-year-old network-industry cartelisation.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: strong
  rationale: Dissolution of CAB; ICC authority narrowed; Reg Q phased out.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: moderate
  rationale: DIDMCA 1980 removed interest-rate ceilings — looser financial regulation by axis
    semantics.
- axis: monetary.monetary_expansion_direction
  direction: '-'
  magnitude: moderate
  rationale: Volcker appointment + initial October 1979 reserves-targeting shift.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: moderate
  rationale: Strategic Petroleum Reserve build, synthetic fuels programme, DOE coordination.
outcome_hypotheses:
- deregulation_productivity_growth_effect
- stagflation_policy_response_effectiveness
position_alignments:
- position_id: empirical_pragmatist
  alignment: aligned
  notes: Issue-by-issue deregulation decisions, many since vindicated in IO literature.
- position_id: chicago_monetarism
  alignment: partially_aligned
  notes: Kahn + Schultze were economist technocrats; Volcker appointment central.
- position_id: classical_liberal
  alignment: partially_aligned
- position_id: post_keynesian
  alignment: partially_aligned
  notes: Windfall-profits tax + energy programme are demand-management-adjacent; deregulation
    is not.
references:
- Airline Deregulation Act 1978 (Public Law 95-504)
- Motor Carrier Act 1980 (Public Law 96-296)
- Staggers Rail Act 1980 (Public Law 96-448)
- Natural Gas Policy Act 1978 (Public Law 95-621)
- Depository Institutions Deregulation and Monetary Control Act 1980 (Public Law 96-221)
- Department of Energy Organization Act 1977 (Public Law 95-91)
- Crandall (1991), After the Breakup
- 'Morgan (2009), Deregulation: What Went Right, What Went Wrong'

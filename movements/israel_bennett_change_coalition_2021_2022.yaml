# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: israel_bennett_change_coalition_2021_2022
status: candidate
name: "Bennett–Lapid 'Change Coalition' 2021–2022"
countries: [ISR]
timeframe: {start: 2021, end: 2022, enacted_date: "2021-06-13"}
coalition: "Yamina + Yesh Atid + Blue-White + Labor + Meretz + New Hope + Yisrael Beiteinu + Ra'am"
leaders:
  - "Naftali Bennett (PM, Yamina, 13 Jun 2021 – 1 Jul 2022)"
  - "Yair Lapid (Alternate PM & Foreign Minister, Yesh Atid)"
  - "Avigdor Liberman (Finance Minister, Yisrael Beiteinu)"
  - "Mansour Abbas (Ra'am — first Arab-Islamist party in an Israeli coalition)"
doctrine: >
  Eight-party 'change coalition' spanning the widest ideological range in
  Israeli parliamentary history — right (Yamina, New Hope, Yisrael Beiteinu),
  centre (Yesh Atid, Blue-White), left (Labor, Meretz) and Ra'am (United Arab
  List, first Arab-Islamist party ever in an Israeli government). Broke
  Benjamin Netanyahu's continuous 12-year run (2009–2021). Economic posture:
  centrist-liberal reformist under Finance Minister Avigdor Liberman — core
  content was the Arrangements Law package attached to the November 2021
  budget (Israel's first passed budget since 2018) that raised the statutory
  retirement age for women from 62 to 65 gradually, cut red tape on imports
  ("what's good for Europe is good for Israel" parallel-import standards
  reform), reformed agricultural tariffs, and advanced kashrut liberalisation.
  Fiscal stance: let the pandemic-era 1pp VAT cut expire back to 17%, shrank
  the cyclical deficit sharply (FY2022 deficit 0.6% of GDP on strong
  post-COVID rebound), raised the sugary-drinks and disposable-ware taxes.
  Left-right: centrist-technocratic coalition held together by opposition to
  Netanyahu rather than a unified economic doctrine; Meretz / Labor pulled
  transfer and climate policy leftward, Liberman / New Hope pulled regulatory
  and fiscal policy rightward. Coalition collapsed June 2022 when right-wing
  defections (Idit Silman, Nir Orbach) cost it a majority; Knesset dissolved
  30 June 2022. Seats: 61-59 razor majority. Approval: Bennett peaked ~45%
  early, fell to ~25% by collapse. Coherence line: 'anti-Netanyahu
  technocratic centrism with first-ever Arab coalition partner — reform by
  narrow consensus'.
policies:
  - il_arrangements_law_2021
  - il_pension_age_reform_2021
  - il_parallel_imports_reform_2021
  - il_vat_cut_nonrenewal_2021
  - il_sugary_drinks_tax_2021

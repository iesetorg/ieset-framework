movement_id: peru_toledo_pp_2001_2006
status: candidate
name: "Toledo Perú Posible — democratic restoration, US FTA, mining-boom orthodoxy"
countries: [PER]
timeframe: {start: 2001, end: 2006, enacted_date: "2001-07-28"}
coalition: "Perú Posible (with Frente Independiente Moralizador)"
leaders:
  - "Alejandro Toledo Manrique (President 2001-2006)"
  - "Pedro Pablo Kuczynski / Jaime Quijandría (Economía y Finanzas)"
  - "Javier Silva Ruete (BCRP 2003-2006)"
  - "Raúl Diez Canseco (Vice President until 2004)"
doctrine: >
  Post-Fujimori democratic-restoration government combining orthodox
  macro continuation with rule-of-law reconstruction. Five doctrinal
  pillars: (a) Democratic restoration — followed Paniagua transitional
  government (22 Nov 2000 - 28 July 2001); Truth and Reconciliation
  Commission (Comisión de la Verdad y Reconciliación, 4 June 2001 -
  28 Aug 2003) documented internal conflict 1980-2000 with ~69,000
  deaths; institutional-accountability watershed. (b) Chile-style
  fiscal orthodoxy — Law of Fiscal Prudence and Transparency (Ley
  27.245, modified 2003); inflation targeting 2.5% +/-1% adopted Jan
  2002; BCRP operational autonomy maintained; debt/GDP fell 46%
  (2001) → 33% (2006). (c) US-Peru FTA negotiated — signed 12 April
  2006 (Bush-Toledo final days); Congress approved June 2006; US
  ratified December 2007; entered into force 1 February 2009
  (Bush-García transition). (d) Mining-boom growth — copper, gold,
  zinc prices rose; GDP growth 0.2% (2001), 5.0% (2002), 4.0% (2003),
  5.0% (2004), 6.8% (2005), 7.7% (2006); Antamina, Yanacocha
  expansions. (e) Camisea gas 2004 — 9 Aug 2004 Camisea fields
  inauguration; Pluspetrol-led consortium; reduced LNG import
  dependency. Stated school: liberal-democratic + Washington-Consensus
  continuity + indigenous-identity politics. Left-right: centre;
  economic orthodoxy with rule-of-law reconstruction. Popularity:
  3 June 2001 runoff Toledo 53.1% vs Alan García (APRA) 46.9%;
  approval fell rapidly to ~10-15% 2003-2005 amid nepotism
  allegations, Eliane Karp controversies, strikes; 4 June 2006
  runoff Alan García 52.6% vs Ollanta Humala 47.4%. Coherence:
  trade Fujimori-era autogolpe institutional debris for accountability
  commission, macro-orthodoxy continuation, trade-treaty
  pre-commitment, and mining-boom fiscal windfall — at cost of
  personal-popularity collapse from scandals.
policies:
  - pe_truth_reconciliation_commission_2001_2003
  - pe_us_fta_negotiation_2004_2006
  - pe_fiscal_prudence_law_amendment_2003
  - pe_camisea_gas_project_2004
  - pe_inflation_targeting_adoption_2002
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "CVR documented conflict; Fujimori extradition processes proceeded."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "IT regime + operational autonomy entrenched."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "US-Peru FTA concluded; regional treaty web extended."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Fiscal-rule continuity; debt-to-GDP fell 13pp."}
outcome_hypotheses: [truth_commission_institutional_effect, fta_mining_growth_linkage]
predecessor_movements: [peru_fujimori_stabilisation_1990_2000]
successor_movements: [peru_garcia_apra_second_2006_2011]
position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: social_liberal, alignment: partially_aligned}
references:
  - "CVR Final Report 2003"
  - "US-Peru Trade Promotion Agreement 2006"
  - "Ley 27.245 (Fiscal Prudence & Transparency)"
notes: "Paniagua transitional government 2000-2001 treated as predecessor within this file's scope."

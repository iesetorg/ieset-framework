# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eu_green_deal_2020
status: candidate
name: "EU Green Deal + Fit for 55 climate regulatory stack"
scope: supranational
countries: [DEU, FRA, ITA, ESP, NLD, BEL, POL, SWE, IRL, AUT]
timeframe: {start: 2019, end: ongoing, enacted_date: "2019-12-11"}
coalition: "European Commission (von der Leyen) + Parliament + Council"
leaders: ["Ursula von der Leyen (EC President)", "Frans Timmermans (Green Deal VP 2019-2023)"]
doctrine: >
  Climate-neutrality by 2050 legal commitment + 55% emissions reduction
  by 2030 (Fit for 55 package). Core instruments: EU ETS extension to
  road + buildings (ETS2, 2027), Carbon Border Adjustment Mechanism
  (CBAM, 2023/26 phased), Renewable Energy Directive RED III, Energy
  Efficiency Directive, Industrial Emissions Directive revisions,
  Sustainable Finance (CSRD 2023, Taxonomy Regulation). Also associated:
  Green Deal Industrial Plan 2023 (responding to US IRA) + Net-Zero
  Industry Act 2024. Framework codes as strong-stringency + mixed
  industrial-policy content; links to green_transition_cost hypothesis.
policies: [eu_climate_neutrality_law_2021, eu_ets_phase4_2021, eu_cbam_2023, eu_csrd_2023, eu_taxonomy_regulation_2020, eu_red_iii_2023, eu_net_zero_industry_act_2024]
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Most ambitious environmental regulatory stack globally."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "CBAM imposes carbon-based border measures on imports."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "State-aid relaxation + Green Deal Industrial Plan subsidies."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate}
outcome_hypotheses: [green_transition_cost_trajectory_electricity_prices, eu_regulatory_burden_productivity_drag]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "European Green Deal COM(2019) 640"
  - "European Climate Law (Regulation 2021/1119)"
  - "Fit for 55 legislative package (2021-2023)"

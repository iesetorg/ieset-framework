movement_id: canada_harper_conservative_2006_2015
status: candidate
name: "Harper-era Conservative government (Canada)"
countries: [CAN]
timeframe: {start: 2006, end: 2015, enacted_date: "2006-02-06"}
coalition: "Conservative Party of Canada — minority 2006-2008, minority 2008-2011, majority 2011-2015"
leaders:
  - "Stephen Harper (Prime Minister, 2006-2015)"
  - "Jim Flaherty (Finance Minister, 2006-2014)"
  - "Joe Oliver (Finance Minister, 2014-2015)"
  - "Tony Clement (Treasury Board President, 2011-2015)"
  - "Ed Fast (International Trade Minister, 2011-2015)"
doctrine: >
  Pragmatic-conservative supply-side programme combining consumption-tax cuts,
  corporate-tax competitiveness, resource-sector support, and post-crisis
  fiscal consolidation, with a counter-cyclical Keynesian interlude in
  2008-2010. Economically right-of-centre — closer to a Canadian Chicago/
  supply-side blend than classical Red Tory — though socially moderate.
  Core policy content: (i) GST reduction from 7% to 6% (July 2006) then to
  5% (January 2008); (ii) Tax-Free Savings Account (TFSA) introduced in
  Budget 2008, effective January 2009, with contribution room raised to
  $10,000 in Budget 2015; (iii) federal general corporate income tax rate
  cut on a pre-legislated schedule from 22.12% (2007) to 15% by January
  2012; (iv) Economic Action Plan 2009 — roughly $47B two-year stimulus
  package of infrastructure, housing, EI extensions and targeted tax
  measures in response to the global financial crisis, producing a $55.6B
  deficit in 2009-10; (v) post-2010 fiscal consolidation via the Strategic
  and Operating Review and Budget 2012 cuts returning the federal budget
  to surplus in 2015; (vi) Canada-EU Comprehensive Economic and Trade
  Agreement (CETA) concluded in principle October 2013 and signed
  September 2014, plus Trans-Pacific Partnership text concluded October
  2015; (vii) resource-sector expansion stance — Keystone XL advocacy,
  Northern Gateway approval (2014), omnibus environmental-assessment
  streamlining in Bills C-38 and C-45 (2012); (viii) Bill C-51 Anti-
  Terrorism Act 2015 expanding CSIS disruption powers and information-
  sharing; (ix) withdrawal from the Kyoto Protocol December 2011. Proponents
  frame the package as broad-based tax relief, trade diversification, and
  fiscal return-to-balance; critics frame it as environmental deregulation,
  civil-liberties drift, and under-investment in public goods. Popularity:
  2006 election 36.3% / 124 seats (40%), 2008 37.7% / 143 seats (46%),
  2011 majority 39.6% / 166 seats (54%); 2015 lost with 31.9% / 99 seats.
  Coherence line: supply-side tax competitiveness + trade opening + fiscal
  anchor, with a single explicit counter-cyclical deviation during 2009-10.
policies:
  - ca_gst_cut_7_to_5_2006_2008
  - ca_tfsa_2009
  - ca_corporate_tax_cut_22_to_15_2007_2012
  - ca_economic_action_plan_2009
  - ca_ceta_2014
  - ca_bill_c51_anti_terrorism_2015
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "TFSA shelter, GST cuts, and income-splitting for families shifted burden toward consumption and away from income/capital at the margin."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "TFSA shelters capital income; dividend tax credit gross-up changes; pension-income splitting."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: strong, rationale: "General federal corporate rate cut 22.12% → 15% over 2007-2012 on a legislated schedule."}
  - {axis: fiscal.spending_level, direction: "mixed", magnitude: moderate, rationale: "Strong counter-cyclical expansion 2009-2010 (Economic Action Plan ~$47B) then explicit consolidation 2011-2015 returning to surplus."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "CETA concluded-in-principle 2013 / signed 2014; TPP text October 2015; Canada-Korea FTA 2014."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: strong, rationale: "Kyoto withdrawal Dec 2011; omnibus Bills C-38/C-45 2012 narrowed environmental-assessment regime; no federal carbon price."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Resource-sector support — Northern Gateway approval, Keystone XL advocacy, LNG export-licence expansion."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Inflation-target framework preserved; Mark Carney appointed 2008, Stephen Poloz 2013 via standard process; no framework change."}
outcome_hypotheses:
  - fiscal_consolidation_growth_effect
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Supply-side tax competitiveness and inflation-target continuity."}
  - {position_id: classical_liberal, alignment: aligned, notes: "Broad-based tax relief, trade opening, reduced regulatory footprint in resource sector."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Rule-based fiscal anchor post-2010 and monetary-framework continuity; weaker on environmental rule-setting."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Counter-cyclical 2009-10 Action Plan congruent with textbook response."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Post-2010 consolidation and corporate-rate cuts at odds with functional-finance view."}
  - {position_id: eco_socialist, alignment: opposed}
references:
  - "Budget 2006 (Flaherty) — GST reduction to 6%"
  - "Budget 2007 — GST reduction to 5% effective 1 Jan 2008"
  - "Budget 2008 — Tax-Free Savings Account introduction"
  - "Budget 2009 — Canada's Economic Action Plan"
  - "Budget 2012 — Strategic and Operating Review; Jobs, Growth and Long-Term Prosperity Act (Bill C-38)"
  - "Canada-EU Comprehensive Economic and Trade Agreement (CETA), text October 2013 / signed 26 Sep 2014"
  - "Anti-terrorism Act, 2015 (Bill C-51), Royal Assent 18 Jun 2015"
  - "Elections Canada results 2006, 2008, 2011, 2015"
  - "Department of Finance Canada Fiscal Reference Tables"
notes: >
  Single movement spanning three Parliaments with continuous doctrinal
  content. Economic Action Plan 2009-2010 is an explicit counter-cyclical
  deviation from the otherwise consolidation-oriented programme and is
  flagged as mixed on fiscal.spending_level rather than split into two
  movements. Bill C-51 is included because it had measurable institutional
  effects, though it is orthogonal to the economic axes.

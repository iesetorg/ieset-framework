# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: venezuela_perez_second_term_1989_1993
status: candidate
name: "Pérez AD second term — Gran Viraje, Caracazo, Chávez coups, impeachment"
countries: [VEN]
timeframe: {start: 1989, end: 1993, enacted_date: "1989-02-02"}
coalition: "Acción Democrática (AD) — end of Pacto de Punto Fijo era"
leaders:
  - "Carlos Andrés Pérez (President 1974-1979, 1989-1993 impeached)"
  - "Miguel Rodríguez (Cordiplan)"
  - "Moisés Naím (Fomento / Industry)"
  - "Pedro Tinoco (BCV)"
doctrine: >
  AD second-term technocratic reversal — the "Gran Viraje" (The
  Great Turn) away from state-led rentier populism toward
  Washington-Consensus liberalisation, catastrophically
  mistimed against popular expectations. Five doctrinal
  pillars: (a) Paquete Económico (Package) February 1989 — IMF
  Letter of Intent; unified exchange rate (Bs 14.5/$→Bs 36/$);
  fuel-price increase ~100%; deregulation of interest rates and
  prices; tariff reduction. (b) Caracazo — 27 February 1989
  urban-transport fare rise triggered four-day riots in
  Caracas; military repression; official death toll 276,
  historians estimate >1,000; the signal rupture of the Punto
  Fijo consensus. (c) Chávez coup attempts — 4 February 1992
  MBR-200 golpe led by Lt. Col. Hugo Chávez; failed; Chávez's
  televised surrender speech ("por ahora") made him a national
  figure; 27 November 1992 second coup by Navy/Air Force also
  failed. (d) Impeachment — Supreme Court authorised trial
  May 1993 on charges of misusing ~Bs 250M from the Partida
  Secreta; Congress suspended Pérez 21 May 1993; interim
  President Ramón Velásquez. (e) Privatisation and
  liberalisation — CANTV (telecoms) privatised 1991 for $1.9B;
  VIASA (airline); banking reforms. Stated school:
  Washington-Consensus + AD-technocratic reformism. Left-right:
  economic right turn; AD historically centre-left. Popularity:
  December 1988 Pérez re-elected 52.9% on nostalgia for 1970s
  oil-boom presidency; approval collapsed post-Caracazo to
  ~20%; 1992 coup attempts polled broad public sympathy;
  December 1993 Caldera (Convergencia) won presidency 30.5% —
  breaking AD/COPEI duopoly. Coherence: trade Punto-Fijo
  populist continuity for structural reform that failed to
  survive the distributional backlash.
policies:
  - ve_gran_viraje_imf_package_1989
  - ve_caracazo_february_1989
  - ve_chavez_coup_attempts_1992
  - ve_perez_impeachment_1993
  - ve_cantv_viasa_privatisation_1991
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Unilateral tariff reduction; IMF-conditioned liberalisation."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Interest-rate and price deregulation; CANTV privatisation."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: strong, rationale: "Fuel-price subsidy reduction triggered the Caracazo."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Caracazo repression, two attempted coups, executive impeachment."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BCV procedural changes; formal autonomy deferred to 1999 constitution."}
outcome_hypotheses: [shock_adjustment_political_backlash_effect, rentier_state_reform_impossibility]
predecessor_movements: [venezuela_perez_first_term_1974_1979]
successor_movements: [venezuela_caldera_convergencia_1994_1999]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: institutionalism, alignment: opposed, notes: "Pacto de Punto Fijo dissolved under the package."}
references:
  - "IMF Letter of Intent, February 1989 (Venezuela)"
  - "López Maya (1999), Lucha Popular, Democracia, Neoliberalismo"
  - "Naím (1993), Paper Tigers and Minotaurs"
notes: "Caracazo-to-Chávez arc originates here; sets up the 1998 Chávez electoral victory."

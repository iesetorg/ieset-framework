# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: vietnam_khai_manh_doi_moi_deepening_1997_2006
status: candidate
name: "Phan Văn Khải PM plus Nông Đức Mạnh CPV General Secretary — Đổi Mới deepening and WTO-track opening (1997-2006)"
countries: [VNM]
timeframe:
  start: 1997
  end: 2006
  enacted_date: "1997-09-25"
coalition: "Communist Party of Vietnam (CPV) single-party government"
leaders:
  - "Phan Văn Khải (PM 25 Sep 1997 - 27 Jun 2006)"
  - "Nông Đức Mạnh (CPV General Secretary 22 Apr 2001 - 19 Jan 2011)"
  - "Trần Đức Lương (President 24 Sep 1997 - 27 Jun 2006)"
  - "Nguyễn Tấn Dũng (First Deputy PM, transitioning to PM)"
  - "Lê Đức Thúy (SBV Governor)"
doctrine: >
  CPV Đổi Mới-deepening reformist continuity — Khải-Mạnh period
  extended the market-transition programme launched in 1986 through
  a phase of aggressive trade integration and state-enterprise
  equitisation inside single-party CPV structures. Economic school:
  CPV state-led market socialism with liberal trade integration,
  centre-right relative to Maoist baseline, centre-left relative
  to neoliberal orthodoxy. Key policy content: (i) Asian Crisis
  response 1997-1999 — dong devaluation in steps (7% cumulative,
  restrained vs ASEAN peers), capital controls maintained; (ii) US
  Bilateral Trade Agreement signed 13 July 2000, in effect December
  2001 — most-favoured-nation US market access triggering textile/
  footwear export boom; (iii) Enterprise Law 1999 (effective
  January 2000) — first consolidated commercial-company code
  enabling private-sector incorporation in hours rather than months,
  triggered 160,000+ new firm registrations 2000-2005; (iv) Land
  Law 2003 extending use-right term to 50 years and permitting
  transfer/mortgage of agricultural-land use rights; (v) Equitisation
  (cổ phần hóa) of SOEs accelerated — from ~200 enterprises end-2000
  to ~2,900 by end-2005, Vinamilk and Bao Viet among flagship IPOs;
  (vi) WTO accession 11 January 2007 (preparatory agreements
  completed under Khải-Mạnh); (vii) Hanoi Stock Exchange launched
  July 2000; Ho Chi Minh Stock Exchange moved from Centre to Exchange
  status 2007; (viii) FDI inflows rose from $2.7bn (2000) to $10.2bn
  (2006) with Intel's $1bn Saigon-Hi-Tech-Park plant announced 2006.
  Popularity: not directly elected; internal CPV Congress IX (April
  2001) confirmed Mạnh, Congress X (April 2006) transitioned to
  Dũng-Triết-Mạnh II. Coherence line: export-led integration and
  private-sector legalisation within CPV single-party framework —
  Vietnam's "China-lite" transition path.
policies:
  - vn_us_bilateral_trade_agreement_2000
  - vn_enterprise_law_1999
  - vn_land_law_2003
  - vn_soe_equitisation_programme_2000_2006
  - vn_wto_accession_preparation_2001_2007
  - vn_stock_exchange_launch_2000
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "US BTA 2000 and WTO accession preparation opened US and multilateral markets; tariff schedule restructured."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Enterprise Law 1999 collapsed incorporation barriers; equitisation programme opened SOE sectors."}
  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Land Law 2003 extended use-right term to 50 years with transfer/mortgage rights — closest Vietnam has come to private land title."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Equitisation reduced direct SOE-budget support; state-bank directed lending continued."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Stock exchanges launched; capital-market framework Law on Securities 2006."}
  - {axis: monetary.monetary_expansion_direction, direction: "0", magnitude: weak, rationale: "Dong managed-float regime maintained with restrained devaluation during Asian crisis."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Trade and private-sector liberalisation welcomed; single-party framework opposed."}
  - {position_id: developmentalism, alignment: aligned, notes: "Export-led FDI-anchored growth model canonical East Asian developmental-state template."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Enterprise Law and Land Law are measurable institutional experiments on registration and tenure."}
references:
  - "US-Vietnam Bilateral Trade Agreement, 13 July 2000"
  - "Enterprise Law 13/1999/QH10"
  - "Land Law 13/2003/QH11"
  - "Government Decree 187/2004/ND-CP on SOE equitisation"
  - "IMF Article IV Vietnam 2005-2006"
notes: >
  Combined Khải-Mạnh movement because PM and CPV General Secretary
  co-defined the reform tempo through CPV Politburo collective
  leadership; treating them as one movement preserves the doctrinal
  coherence of the US-BTA-to-WTO-accession arc.

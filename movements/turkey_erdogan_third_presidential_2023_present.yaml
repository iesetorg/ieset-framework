# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: turkey_erdogan_third_presidential_2023_present
status: candidate
name: "Erdoğan third presidential term — Şimşek orthodox pivot (Turkey 2023-present)"
countries: [TUR]
timeframe: {start: 2023, end: ongoing, enacted_date: "2023-06-03"}
coalition: "Cumhur İttifakı (AKP + MHP + smaller partners); third Erdoğan presidential term"
leaders:
  - "Recep Tayyip Erdoğan (President, third term from 3 Jun 2023)"
  - "Mehmet Şimşek (Treasury & Finance from 4 Jun 2023)"
  - "Hafize Gaye Erkan (CBRT Governor Jun 2023 - Feb 2024)"
  - "Fatih Karahan (CBRT Governor from 3 Feb 2024)"
doctrine: >
  Partial orthodox pivot within an otherwise continuous authoritarian
  executive presidency. Economic school: AKP orthodox pivot under
  Şimşek — rate hikes from 8.5% to 50%, commitment to rational-basis
  (Taylor-compatible) disinflation, FX-reserve rebuild, withdrawal of
  KKM flows, partial subsidy and transfer cuts, and a successful
  credit-rating upgrade cycle (S&P to BB- Nov 2024, Moody's to B1
  Jul 2024, Fitch to BB- Sep 2024). Disinflation from CPI 75.5%
  (May 2024) to ~42% (Mar 2025); policy rate held at 50% Mar-Aug 2024
  before cautious cuts began Dec 2024. Left-right: the wrapper remains
  Islamic-conservative / economic-nationalist / authoritarian, but
  monetary content reverses the prior phase. Key events: May 14 first-round
  presidential election and May 28 runoff (Erdoğan 52.18%), Şimşek pivot
  Jun 2023, Erkan appointment Jun 9 2023, rate-hike cycle Jun 2023-Mar 2024
  (8.5% → 50%), 31 March 2024 local elections (CHP Imamoğlu re-elected
  Istanbul 51.1%; AKP nationwide 35.6% for first-ever second place in
  popular-vote — CHP 37.8%), Erkan resignation Feb 2024, Karahan rate hold,
  Imamoğlu imprisonment 23 Mar 2025 (pre-trial detention on corruption
  and terrorism charges, widely read as pre-emptive exclusion from 2028
  ballot). Popularity: Erdoğan 52.18% in 2023 runoff; AKP 35.6% in 2024
  local elections, approval under 40% by Q1 2025 on continued
  cost-of-living strain. Coherence: credible monetary-orthodoxy bloc
  ring-fenced inside a tightening authoritarian shell — the central
  tension of the phase.
policies:
  - tr_simsek_orthodox_pivot_2023
  - tr_cbrt_rate_hike_cycle_2023_2024
  - tr_kkm_unwind_2023_2025
  - tr_imamoglu_imprisonment_2025
  - tr_earthquake_reconstruction_programme_2023_2025
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "De facto operational autonomy restored Jun 2023; Karahan held 50% against political pressure through 2024."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "Policy rate 8.5% → 50%, real rates turned positive in H2 2024."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "KKM flows withdrawn and targeted subsidies pared; partly offset by earthquake reconstruction spend."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "BDDK unwound some of the 2021-23 micromanagement regime."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Imamoğlu pre-trial detention Mar 2025; Constitutional Court rulings defied by lower courts 2023-2024."}
outcome_hypotheses:
  - central_bank_independence_and_inflation_anchoring
predecessor_movements: [turkey_erdogan_presidential_system_2018_2023]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Monetary bloc aligned; fiscal and institutional wrappers not."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Rule-of-law trajectory post-Mar-2025 decisive."}
references:
  - "IMF Article IV Turkey 2024"
  - "CBRT Inflation Report 2024-IV"
  - "Moody's sovereign rating action Turkey Jul 2024"
notes: "Phase coherence requires separate coding of monetary (+) vs institutional (-) content."

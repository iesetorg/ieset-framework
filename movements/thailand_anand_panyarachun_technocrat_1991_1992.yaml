movement_id: thailand_anand_panyarachun_technocrat_1991_1992
status: candidate
name: "Anand Panyarachun technocratic interim governments (Thailand)"
countries: [THA]
timeframe: {start: 1991, end: 1992}
coalition: "Technocratic appointed cabinet under NPKC then post-Black-May caretaker"
leaders:
  - "Anand Panyarachun (PM Mar 1991-Apr 1992 and Jun-Sep 1992)"
  - "Suthee Singsaneh (Finance Minister)"
  - "Amaret Sila-on (Industry Minister)"
doctrine: >
  Anand Panyarachun technocratic reformist interim doctrine — appointed
  civilian-technocrat cabinet after Feb 1991 coup removing Chatichai,
  then second interim after Black May 1992 suppression. Economic
  school: Washington-Consensus-adjacent Thai-technocrat programme —
  VAT introduction, telecom/financial liberalisation, state-enterprise
  privatisation. Dated policies: Value Added Tax introduction 1 Jan
  1992 at 7% replacing older business tax; privatisation push —
  Telephone Organization of Thailand corporatisation proposals, Port
  Authority of Thailand reforms; telecom concession framework —
  TelecomAsia and UCOM mobile licences; SEC Act (1992) establishing
  Securities and Exchange Commission of Thailand; Investment Promotion
  Act amendments 1991; lifting of political and capital controls;
  Black May 17-20 May 1992 military suppression of anti-Suchinda
  protests (~50 deaths, many disappeared) triggered royal intervention
  and return of Anand. Left-right: centre-right technocratic reformist
  — explicitly non-ideological but substantively market-liberal.
  Popularity: unelected interim cabinets; Anand personally popular
  for integrity and reform substance; Sep 1992 election saw Chuan
  Leekpai Democrat Party-led coalition. Coherence: high for economic-
  policy content (VAT, SEC, telecom, privatisation all pointed same
  direction); the institutional legitimacy was coup-installed then
  post-crisis caretaker — externally-imposed coherence.
policies:
  - th_vat_introduction_1992
  - th_sec_act_1992
  - th_telecom_concessions_framework_1991_1992
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "VAT 7% broadened indirect tax base; replaced business tax."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "SEC Act 1992 established statutory securities regulator; capital-market modernisation."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Telecom concession framework + state-enterprise corporatisation proposals."}
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Coup-installed interim reduced democratic legitimacy; Black May crisis and royal mediation reset toward elections."}
predecessor_movements:
  - thailand_chatichai_ct_1988_1991
successor_movements:
  - thailand_chuan_leekpai_democrat_1992_1995
position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Handley (2006), The King Never Smiles"
  - "Phongpaichit & Baker (2002), Thailand: Economy and Politics 2nd ed."
  - "Muscat (1994), The Fifth Tiger: A Study of Thai Development Policy"
notes: "Deep-history tranche 2. Two technocratic interims book-ending Black May 1992."

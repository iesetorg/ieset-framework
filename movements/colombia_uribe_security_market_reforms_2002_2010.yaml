# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_uribe_security_market_reforms_2002_2010
status: candidate
name: "Uribe democratic security and market-friendly reforms (Colombia)"
countries: [COL]
timeframe: {start: 2002, end: 2010}
coalition: "Primero Colombia / Partido de la U — centre-right coalition"
leaders:
  - "Álvaro Uribe Vélez (President 2002-2010)"
  - "Alberto Carrasquilla (Finance Minister 2003-2007)"
  - "Oscar Iván Zuluaga (Finance Minister 2007-2010)"
doctrine: >
  Two-track programme combining the Democratic Security Policy (military
  expansion against FARC and paramilitary demobilisation via the 2005
  Justice and Peace Law) with an investor-friendly economic framework:
  the 2003 pension reform raising contribution periods, the 2005 and 2006
  tax reforms extending the corporate base while creating investment
  deductions and free-trade-zone regimes, negotiation of the US-Colombia
  Trade Promotion Agreement (signed 2006, ratified by Colombia 2007),
  and fiscal consolidation that stabilised the public debt path after
  the 1999 recession. The doctrine paired restoration of the state's
  monopoly on violence — a precondition for investment — with orthodox
  macroeconomic management and gradual trade and capital-account opening.
  Outcomes: homicide rate fell roughly in half, FDI inflows rose sharply,
  GDP growth averaged ~4.5% per year, and Colombia reached investment-
  grade rating in 2011. Contested elements include extrajudicial-
  killings ("falsos positivos") by the military, DAS intelligence abuses,
  and distributional consequences of rural security operations.
policies:
  - colombia_democratic_security_2002
  - colombia_tax_reforms_2003_2006
  - colombia_pension_reform_law_797_2003
  - colombia_us_fta_2006
  - colombia_free_trade_zones_law_1004_2005
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Territorial state presence expanded; homicide and kidnapping rates fell substantially."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Security gains raised effective protection of rural property; formal titling programmes expanded."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "US FTA signed 2006; bilateral agreements with Chile, EFTA, Canada; tariff rationalisation."}
  - {axis: fiscal.tax_corporate, direction: "mixed", magnitude: moderate, rationale: "Headline rate raised in part, but free-trade-zone and investment deductions lowered effective rate for qualifying firms."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence and security spending rose sharply; social transfers (Familias en Acción) expanded."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "Free-trade zones and investment-contract regime reduced discretionary licensing for qualifying projects."}
outcome_hypotheses:
  - security_investment_complementarity
  - trade_agreement_growth_effects
position_alignments:
  - {position_id: new_keynesian, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: aligned, notes: "State-capacity rebuild as precondition for market functioning."}
references:
  - "Gaviria (2010), Uribenomics and Beyond, CEDE WP"
  - "IMF Article IV Colombia 2004, 2007, 2010"
  - "Ley 797 de 2003; Ley 1004 de 2005"
  - "Human Rights Watch (2010), Paramilitaries' Heirs"
notes: >
  Security and market axes both move positive; institutional-quality
  axis is net positive but with documented costs. Successor Santos
  government (2010-2018) inherited macroeconomic framework but pivoted
  to FARC peace negotiations; coded separately if added later.

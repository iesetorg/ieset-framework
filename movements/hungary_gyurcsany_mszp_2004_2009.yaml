movement_id: hungary_gyurcsany_mszp_2004_2009
status: candidate
name: "Gyurcsany MSZP-SZDSZ reform and austerity 2004-2009"
countries: [HUN]
timeframe: {start: 2004, end: 2009, enacted_date: "2004-09-29"}
coalition: "MSZP-SZDSZ (to May 2008); MSZP minority (2008-2009)"
leaders:
  - "Ferenc Gyurcsany (Prime Minister, MSZP, 2004-2009)"
  - "Janos Veres (Finance Minister, MSZP, 2005-2008)"
  - "Janos Kiraly / Ferenc Oszko (Finance Minister, 2008-2009)"
doctrine: >
  Gyurcsany MSZP-SZDSZ government — economic-school: post-accession
  Hungarian third-way social democracy attempting simultaneous welfare-
  state maintenance and deficit reduction. Launched the June 2006 'New
  Balance' austerity programme (VAT 20%->25% return, energy price
  liberalisation, healthcare visit fees) after winning the April 2006
  election, then was destabilised by the September 2006 Balatonoszod
  leak of his closed-party-speech ("we lied morning, noon, and night,"
  aired 17 Sep 2006) triggering weeks of Budapest riots including the
  23 October 2006 storming of MTV. Left-right axis: centre-left with
  austerity pragmatism. Dated policies: New Balance (Uj Egyensuly)
  austerity June 2006, Balatonoszod leak 17 Sep 2006, MTV siege 18 Sep
  2006, 2008 social-referendum (9 Mar 2008, NO to visit fees, tuition
  fees, daily-hospital fees — triggered SZDSZ coalition exit May 2008),
  IMF-EU-World Bank rescue package (28 Oct 2008, USD 25.1bn — Hungary
  the first EU member-state to request post-2008-crisis IMF support).
  Popularity: collapsed after Balatonoszod; Gyurcsany resigned 14 April
  2009. Coherence: low — scandal-destabilised.
policies:
  - hu_uj_egyensuly_new_balance_2006
  - hu_balatonoszod_leak_2006
  - hu_social_referendum_2008
  - hu_imf_eu_rescue_2008

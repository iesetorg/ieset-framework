  - {position_id: classical_liberal, alignment: opposed, notes: "Cash-handout and durable-goods subsidy criticised as low-multiplier."}
references:
  - "Cabinet Office — Supplementary Budgets FY2008 / FY2009"
  - "Shirakawa memoirs, Bank of Japan rate-cut record Oct-Dec 2008"

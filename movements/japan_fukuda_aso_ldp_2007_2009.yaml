movement_id: japan_fukuda_aso_ldp_2007_2009
status: candidate
name: "Fukuda-Asō late LDP — GFC crisis response cabinets"
countries: [JPN]
timeframe: {start: 2007, end: 2009, enacted_date: "2007-09-26"}
coalition: "LDP-Komeito (Fukuda Yasuo cabinet 2007-2008; Asō Tarō cabinet 2008-2009)"
leaders:
  - "Yasuo Fukuda (PM, 26 Sep 2007 - 24 Sep 2008)"
  - "Tarō Asō (PM, 24 Sep 2008 - 16 Sep 2009)"
  - "Fukushiro Nukaga / Bunmei Ibuki / Shōichi Nakagawa / Kaoru Yosano (Finance, rotating)"
  - "Masaaki Shirakawa (BoJ Governor, from April 2008)"
doctrine: >
  Late-LDP crisis-management doctrine — two transitional cabinets (Fukuda,
  Asō) governing a twisted Diet (LDP-Komeito lost Upper House July 2007, DPJ
  control) and a collapsing global economy. Fukuda pursued a consensual
  centre-right line (G8 Hokkaidō-Tōyako summit July 2008 emphasised climate
  and food prices) but resigned September 2008 citing inability to govern
  the split Diet. Asō took over weeks before Lehman and became Japan's
  GFC-response PM: three supplementary budgets totalling ~¥26tn fiscal
  stimulus, ¥12,000 per resident cash handout (teigakukyūfukin, announced
  November 2008, distributed 2009), eco-car and eco-point subsidies for
  white goods and vehicles, and major SME credit-guarantee expansion via
  JFC/Shōkō-Chūkin. BoJ cut policy rate from 0.50% to 0.30% (October 2008)
  then 0.10% (December 2008), restarted JGB/commercial-paper outright
  purchases. Exports collapsed 40%+ peak-to-trough, 2009 GDP contracted
  ~5.4%. Popularity of both cabinets bled out; LDP lost the August 2009
  Shūgiin election by landslide (DPJ 308 seats vs LDP 119), ending 54 years
  of near-continuous LDP rule. Coherence line: reactive Keynesian stimulus
  grafted onto tired LDP coalition, outvoted by DPJ regime-change wave.
policies:
  - jp_aso_teigaku_cash_handout_2009
  - jp_aso_eco_car_eco_point_subsidy_2009
  - jp_aso_supplementary_budgets_gfc_2008_2009
  - jp_boj_gfc_rate_cuts_jgb_purchases_2008_2009
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Three supplementary budgets ~¥26tn GFC stimulus pushed spending/GDP from ~36% to ~42%."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "¥12,000 per resident cash handout; SME credit guarantees expanded dramatically."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Eco-car / eco-point durable-goods subsidies; JFC crisis lending."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "BoJ cuts 0.50 → 0.10, JGB/CP outright purchases restarted."}
predecessor_movements:

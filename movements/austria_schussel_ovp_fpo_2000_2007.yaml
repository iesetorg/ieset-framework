movement_id: austria_schussel_ovp_fpo_2000_2007
status: candidate
name: "Schuessel OeVP-FPOe/BZOe coalition 2000-2007"
countries: [AUT]
timeframe: {start: 2000, end: 2007, enacted_date: "2000-02-04"}
coalition: "OeVP-FPOe (2000-2005); OeVP-BZOe (after Apr 2005 Haider split)"
leaders:
  - "Wolfgang Schuessel (Chancellor, OeVP, 2000-2007)"
  - "Susanne Riess-Passer (Vice-Chancellor, FPOe, 2000-2003)"
  - "Karl-Heinz Grasser (Finance Minister, FPOe then independent, 2000-2007)"
  - "Joerg Haider (FPOe then BZOe Governor of Carinthia)"
doctrine: >
  First OeVP-FPOe coalition — the formation triggered the EU-14 Article
  7-precursor sanctions (Feb-Sep 2000) and a programme of pension reform,
  corporate tax cuts, and Eurofighter procurement. Economic school:
  Austrian centre-right ordoliberal with right-populist flank — pension
  reform 2003 (Pensionssicherungsgesetz) raising effective retirement
  age and reducing generosity, corporate-tax rate cut from 34% to 25%
  (Steuerreform 2005), Eurofighter Typhoon purchase (2 July 2002 Cabinet
  decision, 18 aircraft for ~EUR 1.96bn). Left-right axis: centre-right
  with right-populist partner. Dated policies: EU-14 sanctions Feb-Sep
  2000 ("Weise men" report), Knittelfeld FPOe implosion (Sep 2002),
  snap election Nov 2002 (OeVP 42.3% strongest since 1966, FPOe collapse
  to 10%), pension reform 2003, KoeSt reduction 2005, BZOe split April
  2005 (Haider), 2006 election lost to SPOe-Gusenbauer. Popularity:
  2002 landslide then slow decline. Coherence: high-to-moderate — FPOe
  internal instability (Knittelfeld, Haider split) forced recomposition.
policies:
  - at_eu_14_sanctions_2000
  - at_pensionssicherungsgesetz_2003
  - at_koest_25_percent_2005
  - at_eurofighter_procurement_2002
  - at_bzoe_split_2005

movement_id: czech_republic_topolanek_ods_2006_2009
status: candidate
name: "Topolanek ODS-KDU-Greens centre-right flat-tax 2006-2009"
countries: [CZE]
timeframe: {start: 2006, end: 2009, enacted_date: "2007-01-09"}
coalition: "ODS-KDU-CSL-Strana Zelenych (after 7-month formation deadlock from 2006 election)"
leaders:
  - "Mirek Topolanek (Prime Minister, ODS, 2006-2009)"
  - "Miroslav Kalousek (Finance Minister, KDU-CSL, 2007-2009)"
  - "Martin Bursik (Environment Minister, Greens deputy PM)"
doctrine: >
  Topolanek ODS-led centre-right coalition after 2006 election deadlock
  (100-100 seats CSSD-ODS bloc). Economic school: Czech market-liberal
  ODS — 15% flat personal income tax (effective 2008, with 'super-gross'
  base), corporate tax cut to 19% (phased to 2010), VAT reduced-rate
  raised 5%->9%. Left-right axis: centre-right. Dated policies: flat
  tax effective 1 Jan 2008, public-finance reform Act 2007, US missile-
  defence radar agreement (signed 8 July 2008, never ratified), Lisbon
  Treaty ratification (May 2009), government fell 24 March 2009 on
  no-confidence vote (101 CSSD+defectors) during Czech EU Council
  Presidency — unprecedented. Popularity: ODS won 2006 (35.4%), lost
  2010. Coherence: moderate but thin — fell mid-EU-presidency.
policies:
  - cz_flat_tax_15_percent_2008
  - cz_corporate_tax_cut_2008_2010
  - cz_missile_defence_agreement_2008
  - cz_lisbon_treaty_ratification_2009

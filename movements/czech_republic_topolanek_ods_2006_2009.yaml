  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Lisbon Treaty ratification, EU-presidency hosting."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Public-finance reform 2007 modest consolidation."}

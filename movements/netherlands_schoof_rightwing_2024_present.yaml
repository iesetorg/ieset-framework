# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: netherlands_schoof_rightwing_2024_present
status: candidate
name: "Schoof right-wing cabinet (Netherlands, PVV-VVD-NSC-BBB)"

countries: [NLD]

timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-07-02"

coalition: "PVV-VVD-NSC-BBB four-party coalition under extraparliamentary PM Dick Schoof; programme negotiated as 'Hoofdlijnenakkoord' (main-lines agreement) 16 May 2024"

leaders:
  - "Dick Schoof (Prime Minister, July 2024 - present; non-party technocrat, ex-NCTV/AIVD)"
  - "Geert Wilders (PVV leader, coalition architect; not PM by agreement)"
  - "Dilan Yesilgoz (VVD leader)"
  - "Pieter Omtzigt (NSC founder; resigned Feb 2025 from leadership)"
  - "Caroline van der Plas (BBB leader, farmer-protest party)"
  - "Fleur Agema (PVV, Health Minister)"
  - "Marjolein Faber (PVV, Asylum and Migration Minister)"
  - "Eelco Heinen (VVD, Finance Minister)"

doctrine: >
  Right-populist restrictionist (Wilders PVV) fused with liberal-conservative
  VVD, Christian-communitarian NSC fragment, and farmer-agrarian BBB, under a
  non-party technocratic PM — the first Dutch cabinet where the largest party
  (PVV, 23.5% vote / 37 seats Nov 2023) is openly anti-Islam and
  Euro-restrictionist but was kept from the premiership by the other three
  partners. Centre of gravity sits notably right of Rutte-era liberal
  orthodoxy on migration, culture, and nitrogen/farm regulation, while
  remaining fiscally conventional by Dutch standards (golden-rule framework
  intact; no Milei-style rupture). Signature content: (i) asylum "emergency"
  package — declaration of a "migration crisis", reintroduction of internal
  Schengen border checks December 2024, strictest-ever asylum bill (Asiel-
  noodmaatregelenwet) pushed through 2024-2025 despite NSC resistance;
  (ii) rollback of the Rutte-IV nitrogen buyout/reduction programme, halving
  of 2030 nitrogen-reduction targets, restoration of farmer-friendly PAS-
  successor framing; (iii) partial response to Supreme-Court Box-3 wealth-tax
  rulings (Kerst-arrest 2021 + June 2024 rulings) via a transitional flat-
  rate system and a promised real-capital-return Box 3 regime from 2027;
  (iv) continuation of the Wtp (Wet toekomst pensioenen) DB-to-DC pension
  transition enacted under Rutte IV, 2023; (v) housing: VVD-led deregulation
  of the Wet Betaalbare Huur mid-market rent cap, relaxation of "woningbouw-
  impuls" construction subsidies, and a stated 100,000 homes/year target;
  (vi) EU posture: tough renegotiation rhetoric on EU migration/asylum pact
  while remaining inside Eurozone discipline. Tweede Kamer seat share
  81/150 (54%). Approval has been weak — PVV polling around 20-22%, NSC
  collapse to sub-5% post-Omtzigt resignation February 2025, BBB collapse
  from its 2023 provincial surge. Coherence: low — the four-way marriage
  holds on migration and farm-nitrogen rollback but fractures on Ukraine,
  climate, and rule-of-law questions, with the extraparliamentary PM
  absorbing political friction rather than resolving it.

policies:
  - nl_asylum_emergency_law_2024
  - nl_nitrogen_targets_rollback_2024
  - nl_box3_transitional_flat_rate_2024
  - nl_housing_market_deregulation_2024

axes_summary:
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: strong
    rationale: "Strictest-ever asylum package; internal Schengen checks reintroduced; family-reunification and labour-migration tightening."
  - axis: regulatory.environmental_stringency
    direction: "-"
    magnitude: moderate
    rationale: "Halving of 2030 nitrogen-reduction target; rollback of Rutte-IV farm buyout programme."
  - axis: fiscal.tax_capital
    direction: "mixed"
    magnitude: moderate
    rationale: "Transitional flat-rate Box 3 response to Hoge Raad rulings; real-return regime deferred to 2027."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: weak
    rationale: "VVD-led partial deregulation of Wet Betaalbare Huur mid-market rent cap; marginal easing of construction permitting."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    rationale: "Coalition agreement raised defence and asylum-enforcement spending; partly offset by sectoral cuts."

position_alignments:
  - {position_id: national_conservative, alignment: aligned, notes: "PVV-led coalition: tightest asylum regime in Dutch postwar history, statutory immigration cap, sovereigntist EU posture, nitrogen-rule rollback for farmers — full national-conservative bundle."}
  - {position_id: empirical_pragmatist, alignment: opposed, notes: "Migration-restriction content is ideologically driven rather than empirically calibrated; nitrogen-rule rollback against scientific consensus."}
  - {position_id: social_democratic, alignment: opposed, notes: "Squeeze on welfare for non-EU migrants; reduced redistribution component."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Housing-supply liberalisation and Box-3 real-return direction; market-leaning on tax mix."}

disclosure: >
  Cabinet still in office; programme only partly legislated. Coded from
  coalition agreement (Hoofdlijnenakkoord, 16 May 2024), 2024 Miljoenennota,
  and first-year legislative actions. Content may shift materially if the
  coalition fractures (plausible given NSC/BBB collapse in polls).

references:
  - "Hoofdlijnenakkoord PVV-VVD-NSC-BBB, 16 May 2024"
  - "Regeerprogramma kabinet Schoof, 13 September 2024"
  - "Miljoenennota 2025 (Ministerie van Financien)"
  - "Hoge Raad arresten Box 3: HR 24 December 2021 (Kerst-arrest); HR 6 June 2024"
  - "Asiel-noodmaatregelenwet (tabled 2024, in parliamentary process)"
  - "Tweede Kamer election results 22 November 2023 (Kiesraad)"

notes: >
  Flagged as early candidate with explicit uncertainty. Invariant 3 reminder:
  the coalition carries the PVV label but the policy-content coding weights
  migration and nitrogen content, which is where the durable movement
  exists. If the cabinet falls early, split into an enacted-only subset.

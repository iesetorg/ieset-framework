# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_sby_demokrat_2004_2014
status: candidate
name: "Indonesia SBY Demokrat era"
countries: [IDN]
timeframe: {start: 2004, end: 2014}
coalition: "Partai Demokrat-led broad rainbow coalition (Demokrat, Golkar, PKS, PAN, PPP, PKB)"
leaders: ["Susilo Bambang Yudhoyono (President 2004-2014)", "Jusuf Kalla (VP 2004-2009)", "Boediono (VP 2009-2014, ex-BI Governor)", "Sri Mulyani Indrawati (Finance 2005-2010)", "Chatib Basri (Finance 2013-2014)"]
doctrine: >
  Centrist-orthodox macroeconomic-discipline platform paired with
  commodity-boom-financed universalist welfare expansion and a
  self-described 'Bali democracy' posture on political freedoms.
  Economic management under Sri Mulyani and Boediono targeted
  investment-grade status (S&P / Fitch upgrade 2011, Moody's 2012),
  debt-to-GDP falling from ~56% (2004) to ~24% (2014), and inflation
  anchoring through a strengthened Bank Indonesia. Flagship reforms
  included the October 2005 fuel-subsidy price liberalisation (cash
  compensation via BLT) repeated in 2008 and 2013, BPJS Kesehatan
  universal health insurance law (Oct 2011, launched Jan 2014),
  direct regional-head elections, and deepening decentralisation
  transfers. Growth averaged ~5.8% on a commodity supercycle; the
  coalition broke over the 2013 Bank Century bailout probe and a
  late-term protectionist turn (2009 Mining Law, raw-mineral export
  ban announced 2012, in force Jan 2014). Coherence: moderate —
  macro-orthodox core, populist-fiscal surface, and reform fatigue
  by the second term.
policies: [id_sby_fuel_subsidy_reform_2005, id_sby_blt_cash_transfer_2005, id_sby_bpjs_health_law_2011, id_sby_mining_law_2009, id_sby_raw_mineral_export_ban_2014]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Fuel-subsidy price liberalisation 2005/2008/2013 reduced implicit energy subsidy, partially redirected to cash transfers."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "BLT direct cash transfers, PKH conditional cash transfer expansion, Jamkesmas scaled up and folded into BPJS Kesehatan 2014."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Formal inflation-targeting framework entrenched; Bank Indonesia independence preserved; OJK carve-out of supervision in 2011."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "2009 Mining Law and 2014 raw-mineral export ban introduced downstream-processing protection."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "KPK empowered, constitutional court consolidated; rule-of-law gains uneven."}
outcome_hypotheses: [commodity_boom_fiscal_discipline, cash_transfer_poverty_effects]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Macro-orthodox core and inflation-targeting."}
  - {position_id: institutionalism, alignment: partially_aligned}
predecessor_movements: [indonesia_reformasi_1998_present]
successor_movements: [indonesia_jokowi_pdip_2014_2024]
references:
  - "Aspinall, Mietzner & Tomsa eds. (2015), 'The Yudhoyono Presidency: Indonesia's Decade of Stability and Stagnation'"
  - "Basri & Rahardja (2010), 'Mild Crisis, Half-Hearted Fiscal Stimulus: Indonesia during the GFC'"
  - "World Bank Indonesia Economic Quarterly 2004-2014"
notes: |
  Electoral: SBY won 60.6% first round in 2009 and 33.6% in 2004 (winning the runoff).
  Demokrat DPR seat share: 10.3% (2004) rising to 26.4% (2009), collapsing to 10.2% (2014).

movement_id: russia_putin_fourth_term_2018_2024
status: candidate
name: "Putin fourth term full-scale Ukraine invasion and war economy 2018-2024"
countries: [RUS]
timeframe: {start: 2018, end: 2024, enacted_date: "2018-05-07"}
coalition: "United Russia; Putin presidency with Mishustin PM from Jan 2020"
leaders:
  - "Vladimir Putin (President, 2018-2024)"
  - "Dmitry Medvedev (Prime Minister, to Jan 2020)"
  - "Mikhail Mishustin (Prime Minister, from Jan 2020)"
  - "Anton Siluanov (Finance Minister); Elvira Nabiullina (CBR Chair)"
doctrine: >
  Putin fourth term — constitutional entrenchment, Covid response, and
  the full-scale Ukraine invasion. Economic school: Russian war-economy
  state-capitalism — 2020 constitutional amendments (resetting Putin's
  term-clock, allowing presidency until 2036), Covid-era digital-ruble
  pilots, VAT rise 18%->20% (2019), full-scale invasion of Ukraine 24
  Feb 2022, emergency CBR rate hike to 20% and capital controls (rouble
  stabilised after initial collapse), SWIFT disconnection for major
  banks, foreign-reserves freeze of ~USD 300bn, partial mobilisation
  Sep 2022, Wagner Prigozhin mutiny June 2023, budget shift to ~40%
  of spending on defence-and-security by 2024, sovereign-default event
  June 2022 on foreign-currency debt. Left-right axis: far-right
  authoritarian state-capitalist war economy. Dated policies: 2020
  constitutional reset (1 July 2020 plebiscite), full-scale invasion
  24 Feb 2022, mobilisation 21 Sep 2022, Prigozhin mutiny 23-24 June
  2023, Navalny death in custody 16 Feb 2024. Popularity: official >80%
  throughout; independent polls constrained. Coherence: high through
  repression; Prigozhin mutiny briefly revealed fractures.
policies:
  - ru_constitutional_amendments_2020
  - ru_vat_rise_2019
  - ru_ukraine_full_scale_invasion_2022
  - ru_capital_controls_war_2022
  - ru_partial_mobilisation_2022
  - ru_prigozhin_mutiny_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "2020 term-reset amendments; mass political prosecutions; Navalny and others killed in custody."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "War-economy expansion; defence-and-security ~40% of 2024 federal budget."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Post-2022 economic isolation from G7 economies; energy-export pivot to Asia at discount."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "CBR preserved technical independence (emergency rate 20% Feb 2022, 16% Dec 2023) despite political pressure."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Mass nationalisation of exiting foreign-owned assets; expropriation regime formalised."}

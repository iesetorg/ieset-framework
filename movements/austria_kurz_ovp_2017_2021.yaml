  - {position_id: social_democratic, alignment: opposed, notes: "12-hour day and Familienbeihilfe indexation attacked as anti-worker and anti-EU-worker."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "Arbeitszeitgesetz-Novelle 2018 (BGBl. I Nr. 53/2018)"
  - "Familienbonus-Plus-Einfuehrung (BGBl. I Nr. 62/2018)"
  - "Ibiza-Video publication 17 May 2019 (Spiegel/Sueddeutsche Zeitung)"
  - "CJEU C-328/20 Commission v Austria (family benefits indexation struck down, 16 June 2022)"
  - "Regierungsprogramm 2020-2024 (OeVP-Gruene, 2 January 2020)"
notes: >
  Nationalrat seat distribution at OeVP-FPOe formation (Dec 2017): OeVP 62
  (31.5%), FPOe 51 (26.0%) — total 113/183 = 61.7%. After Sep 2019 snap
  election (triggered by Ibiza): OeVP 71 (37.5%, +6pp, strongest OeVP result
  since 2002), Gruene 26 (13.9%, returning after 2017 ejection), FPOe 31
  (16.2%, -9.8pp). Kurz personal approval peaked >60% in 2018 (pre-Ibiza)
  and again in mid-2020 during COVID; fell sharply from Oct 2021. Kurz
  resigned as Chancellor 9 Oct 2021 after Staatsanwaltschaft raids over
  the Inseraten-Affaere (alleged state-funded favourable polling in OeVP
  press); Schallenberg served as caretaker Chancellor Oct-Dec 2021 before
  Nehammer took over. The OeVP coalition persisted continuously from 2017
  through 2025 across three Chancellors (Kurz, Schallenberg, Nehammer),
  but the coalition partner changed (FPOe -> Gruene) in 2020. This
  movement entry bounds the Kurz-personalist phase; Nehammer's
  continuation is treated as a successor movement.

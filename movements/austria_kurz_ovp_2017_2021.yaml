movement_id: austria_kurz_ovp_2017_2021
status: candidate
name: "Kurz OeVP-FPOe then OeVP-Greens 2017-2021"
countries: [AUT]
timeframe: {start: 2017, end: 2021, enacted_date: "2017-12-18"}
coalition: "OeVP-FPOe (Dec 2017 - May 2019); caretaker (2019-2020); OeVP-Gruene (Jan 2020 - Dec 2021)"
leaders:
  - "Sebastian Kurz (Chancellor, OeVP, 2017-2019 and 2020-2021)"
  - "Heinz-Christian Strache (Vice-Chancellor, FPOe, to May 2019)"
  - "Werner Kogler (Vice-Chancellor, Gruene, from Jan 2020)"
  - "Hartwig Loeger (Finance Minister, OeVP, 2017-2019)"
  - "Gernot Bluemel (Finance Minister, OeVP, 2020-2021)"
doctrine: >
  OeVP migration-restrictionist centre-right doctrine under Sebastian Kurz's
  personalised takeover of the OeVP (the 'turquoise' rebrand from 2017),
  first as the senior partner in an OeVP-FPOe right-populist coalition
  prioritising migration tightening, family-transfer expansion, and a
  working-time liberalisation, then — after the May 2019 Ibiza-Video
  collapse of Strache and the FPOe — reconstituted in January 2020 as an
  OeVP-Greens 'turquoise-green' coalition combining OeVP migration and
  fiscal lines with Greens climate agenda. Left-right axis: centre-right
  with a right-populist flank in phase 1, shifting to centre-right with
  ecological modernisation in phase 2. Core phase-1 enactments: 12-Stunden-
  Tag liberalisation of the Arbeitszeitgesetz (September 2018, raising daily
  max to 12h and weekly max to 60h by individual voluntary agreement),
  Familienbonus Plus (EUR 1,500 per child income-tax credit from 2019),
  Indexierung of the Familienbeihilfe for children living abroad (2019,
  later struck down by CJEU 2022), tightening of Section 58c asylum law
  and border-control rhetoric ('Balkanroute schliessen'). Phase 2 under
  Greens: COVID-19 response (Kurzarbeit Phase 1-4, hardship fund, Corona-
  Hilfspaket totalling ~EUR 50bn by end-2021), first CO2-price legislation
  programmed for 2022, Oekostromgesetz reforms. Phase 1 collapsed on the
  17 May 2019 Ibiza-Video publication; phase 2 ended with Kurz's
  9 October 2021 resignation under Inseraten-Affaere prosecutorial pressure.
  Coherence judgement: the phase-1 OeVP-FPOe coalition executed its
  stated programme with unusual discipline for a 16-month term; phase 2
  was crisis-dominated; across both, Kurz's personalist style was a
  distinctive institutional feature of this movement.
policies:
  - at_arbeitszeitgesetz_12_stunden_tag_2018
  - at_familienbonus_plus_2019
  - at_familienbeihilfe_indexierung_2019
  - at_kurzarbeit_covid_2020
  - at_asylgesetz_novellen_2017_2018
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "12-Stunden-Tag / 60-Stunden-Woche amendment raised statutory daily and weekly maxima under voluntary agreement — largest Arbeitszeitgesetz liberalisation since 1997."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Familienbonus Plus EUR 1,500/child tax credit and bracket adjustments reduced effective middle-income rates; no top-rate movement."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Familienbonus Plus and COVID Kurzarbeit Phase 1-4 pushed transfers/GDP sharply upward 2020-2021, though from a tax-credit architecture (Phase 1)."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Section 58c asylum tightening, 'Balkanroute' stance, Familienbeihilfe indexation (later CJEU-struck), mandatory German and values courses."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID emergency spending (Kurzarbeit, hardship fund, Corona-Hilfspaket ~EUR 50bn) dominated phase 2; phase 1 was approximately fiscally neutral."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Phase-2-only: first national CO2 price drafted for 2022 implementation (realised under Nehammer), Oekostromgesetz amendments, coal-exit finalised."}
outcome_hypotheses:
  - working_time_liberalisation_hours_worked_effect
  - migration_tightening_labour_market_impact
  - covid_kurzarbeit_employment_preservation
predecessor_movements: []
successor_movements: [austria_nehammer_ovp_greens_2022_2025]
position_alignments:

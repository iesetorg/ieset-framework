  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "24-year rule, attachment requirement, benefit restrictions on non-EU spouses."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Strukturreformen rationalised municipal and regional administration."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Tax freeze combined with modest welfare spending rise yielded pro-cyclical mid-decade expansion."}

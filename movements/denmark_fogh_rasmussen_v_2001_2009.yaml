movement_id: denmark_fogh_rasmussen_v_2001_2009
status: candidate
name: "Fogh Rasmussen V-KF tax-freeze Liberal 2001-2009"
countries: [DNK]
timeframe: {start: 2001, end: 2009, enacted_date: "2001-11-27"}
coalition: "Venstre-Konservative minority with Dansk Folkeparti parliamentary support"
leaders:
  - "Anders Fogh Rasmussen (Prime Minister, Venstre, 2001-2009)"
  - "Thor Pedersen (Finance Minister, Venstre, 2001-2007)"
  - "Lars Loekke Rasmussen (Finance Minister, Venstre, 2007-2009)"
  - "Pia Kjaersgaard (Leader of DF, parliamentary support)"
doctrine: >
  Fogh Rasmussen tax-freeze Liberal Venstre doctrine — a discipline-
  through-precommitment model combining an unconditional skattestop (tax
  freeze, Nov 2001) with stricter migration policy sourced from Dansk
  Folkeparti. Economic school: Danish liberal-market with welfare-
  preservation rhetoric — the tax freeze bound all direct/indirect rates
  nominally and froze real-estate tax in kroner. Left-right axis: centre-
  right. Dated policies: skattestop (from 2002 budget), 24-year rule
  marriage-migration tightening (2002), forlig labour-market tightening,
  2004 EU eastward enlargement (Copenhagen criteria legacy, Denmark
  president of Council at Laeken 2001), structural reform of municipalities
  (Strukturreformen 1 January 2007 — 271 to 98 municipalities), Muhammad
  cartoons crisis (Jyllands-Posten 30 Sep 2005, embassy burnings Feb 2006
  in Damascus/Beirut). Popularity: won 2001, 2005, 2007 elections. Fogh
  stepped down April 2009 to become NATO Secretary General. Coherence:
  high — personally disciplined, DF tolerated without ministerial seats.
policies:
  - dk_skattestop_2002
  - dk_24_year_rule_2002
  - dk_strukturreformen_2007
  - dk_muhammad_cartoons_crisis_2005_2006
axes_summary:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: slovenia_golob_social_green_reform_2022_present
status: candidate
name: "Slovenia Golob social-green reform 2022-present"
countries: [SVN]
timeframe: {start: 2022, end: ongoing}
coalition: "Freedom Movement + Social Democrats + Left coalition"
leaders:
  - "Robert Golob (Prime Minister, 2022-present)"
doctrine: >
  Slovenia's Golob government combined welfare-state expansion, climate and
  energy permitting reform, and large post-disaster reconstruction after the
  2023 floods. The current movement is defined by a new long-term-care
  entitlement architecture, a statutory reconstruction-finance framework, and
  faster siting rules for renewable electricity generation.
policies:
  - si_long_term_care_act_2023
  - si_flood_reconstruction_act_2023
  - si_renewable_energy_siting_act_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Long-term-care rights and flood household support expand transfer and in-kind social support."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Care implementation and post-flood reconstruction raise public spending."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Renewable-energy siting legislation supports faster decarbonisation of electricity supply."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "Renewable project planning and permitting were streamlined for qualifying facilities."}
references:
  - "Government of Slovenia, Long-term care policy materials: https://www.gov.si/en/policies/health/long-term-care/"
  - "Slovenia Reconstruction, Development and Provision of Financial Resources Act, 2023."
  - "Slovenia renewable-energy siting legislation, 2023."

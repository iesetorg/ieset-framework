movement_id: russia_putin_third_term_2012_2018
status: candidate
name: "Putin third term Crimea annexation and oil-revenue consolidation 2012-2018"
countries: [RUS]
timeframe: {start: 2012, end: 2018, enacted_date: "2012-05-07"}
coalition: "United Russia; Putin presidency, Medvedev as PM"
leaders:
  - "Vladimir Putin (President, 2012-2018)"
  - "Dmitry Medvedev (Prime Minister, 2012-2018)"
  - "Anton Siluanov (Finance Minister from 2011)"
  - "Sergei Shoigu (Defence Minister from Nov 2012)"
doctrine: >
  Putin third term — state-capitalist annexation and oil-revenue
  consolidation. Economic school: Russian resource-nationalist authoritarian
  state-capitalism — 'May decrees' 2012 (high-wage-growth targets for
  public-sector workers, defence and social spending increases), Crimean
  annexation Mar 2014, Donbas war launch 2014, Syrian intervention from
  Sep 2015, Central Bank float of rouble Nov 2014 and emergency rate
  hike to 17% Dec 2014, counter-sanction food-import ban Aug 2014,
  fiscal-rule recommitment post-2016 oil-price collapse, pension-age
  rise announcement June 2018 (men 60->65 by 2028, women 55->63 by
  2034 — heavily watered down to 60 after protests). 2018 Novichok
  Salisbury attack (Mar 2018). Left-right axis: state-capitalist
  authoritarian with right-nationalist ideology overlay. Dated policies:
  Crimea annexation Mar 2014 (18 Mar treaty), sanctions (US Mar 2014
  EO 13660 et seq.; EU Jul-Sep 2014 sectoral), Syria entry 30 Sep 2015,
  CBR floating regime Nov 2014, pension-age reform announcement June
  2018. Popularity: 80%+ after Crimea ('Crimean consensus'), eroded by
  pension-age reform. Coherence: very high — tight executive discipline,
  expanded siloviki influence.

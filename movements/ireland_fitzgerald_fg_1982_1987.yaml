movement_id: ireland_fitzgerald_fg_1982_1987
status: candidate
name: 'FitzGerald Fine Gael-Labour coalition (Ireland): fiscal consolidation attempt, social-liberal
  reform'
countries:
- IRL
timeframe:
  start: 1982
  end: 1987
coalition: Fine Gael + Labour
leaders:
- Garret FitzGerald (Taoiseach, 14 December 1982 - 10 March 1987)
- Alan Dukes (Finance 1982-1986)
- John Bruton (Finance 1986-1987)
- Dick Spring (Labour Tánaiste + Environment 1982-1987)
- Peter Barry (Foreign Affairs — Anglo-Irish Agreement)
doctrine: 'Fine Gael-Labour centrist-reformist coalition attempting fiscal consolidation and social-liberal
  modernisation of Catholic-nationalist institutional framework. Economic school: Fine Gael social-democratic-
  pluralist wing under FitzGerald combined with Labour Party left-Keynesian constraint — not a
  unified school but a negotiated centre-left technocratic coalition; compared to Thatcher the
  consolidation content was similar in direction but far weaker in magnitude. Left-right axis:
  centre-left; fiscally consolidating but socially more liberal than Haughey, and explicitly pluralist
  on Northern Ireland. Content: (i) emergency Budget 1983 — PAYE tax increases, social-welfare
  uprating limits; (ii) National Economic Plan ''Building on Reality'' October 1984 — ambitious
  deficit reduction (PSBR target -8% of GNP by 1987), partially met; (iii) debt service crisis
  as interest rates peaked — debt/GNP reached 116% in 1987 despite consolidation efforts; (iv)
  1983 Contraception Act (partial liberalisation); (v) 1983 Eighth Amendment (pro-life constitutional
  amendment passed 66.9% despite government division); (vi) 1986 divorce referendum (defeated
  63.5% No despite FitzGerald''s Yes campaign); (vii) Anglo-Irish Agreement 15 November 1985 with
  Thatcher — consultative role on Northern Ireland; (viii) Industrial Development Authority (IDA)
  expanded FDI targeting — foundation for 1990s Celtic Tiger; (ix) Finance Act 1981 10% manufacturing
  corporate tax extended to IFSC 1987 (Haughey delivered IFSC formally 1987+ but FitzGerald government
  initiated); (x) emigration surged to ~30k-40k/year 1982-1987; unemployment peaked 17% 1986.
  Popularity: November 1982 election FG 39.2% Labour 9.4% (clear mandate); slumped in 1985 by-elections;
  Labour withdrew 20 January 1987 after failure to agree on budget; February 1987 election FG
  27.1% (-12pp) Labour 6.4% — Haughey FF returned. Coherence: coalition had coherent consolidation
  direction but could not deliver adequate magnitude under coalition constraints; the social-liberal
  content (divorce, contraception) split FG and Labour from rural conservative constituencies;
  fiscal-discipline work set up the platform for Haughey''s 1987 MacSharry-led PNR corporatist
  adjustment that actually broke the debt spiral.

  '

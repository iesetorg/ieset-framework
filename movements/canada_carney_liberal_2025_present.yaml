  - "Order in Council setting fuel-charge rate to zero, effective 1 April 2025"
  - "Canada Gazette — countermeasure tariff orders, March-April 2025"
  - "Department of Finance Canada — middle-bracket rate cut announcement (May 2025)"
  - "Elections Canada — 45th general election, 28 April 2025"
  - "Build Canada Homes programme announcement (2025)"
  - "Immigration Levels Plan 2025-2027"
notes: >
  Movement coded as distinct from canada_trudeau_2015_present because the
  leadership transition is associated with material doctrinal content
  change on the consumer carbon charge, capital-gains inclusion, and
  immigration levels — not merely a leadership reshuffle. Status is
  candidate pending post-election legislative output through the 45th
  Parliament. Movement ongoing; axes_summary reflects content as of
  April 2026 coding window.

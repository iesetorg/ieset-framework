movement_id: canada_carney_liberal_2025_present
status: candidate
name: "Carney-era Liberal government (Canada)"
countries: [CAN]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-03-14"}
coalition: "Liberal Party of Canada — minority government, elected 28 April 2025"
leaders:
  - "Mark Carney (Prime Minister, 14 March 2025-)"
  - "François-Philippe Champagne (Finance Minister, March 2025-)"
  - "Mélanie Joly (Foreign Affairs Minister)"
  - "Dominic LeBlanc (Minister for Canada-US Trade)"
doctrine: >
  Pragmatic liberal-centrist programme under a former central banker
  (Bank of Canada 2008-2013, Bank of England 2013-2020, UN climate
  finance envoy). Positioned centre to centre-left — meaningfully to
  the right of the late-Trudeau-era Liberal programme on carbon pricing,
  immigration levels, and capital-cost treatment, while retaining
  climate-pragmatist and social-infrastructure commitments. Core
  policy content: (i) consumer-facing fuel-charge portion of the federal
  carbon price reduced to zero effective 1 April 2025 (signed as first
  act in office 14 March 2025), while the industrial output-based
  pricing system (OBPS) and large-emitter backstop are retained;
  (ii) countermeasure tariffs on ~C$155B of US imports, phased from
  March 2025 in response to US tariffs of 25% on Canadian goods and
  10% on energy products, with subsequent auto-sector tariffs;
  (iii) cancellation of the planned increase in the capital-gains
  inclusion rate from 50% to 66.67% (Budget 2024 measure deferred
  then withdrawn); (iv) middle-bracket personal income tax cut from
  15% to 14% effective 1 July 2025; (v) "Build Canada" housing
  programme including Build Canada Homes federal developer, GST
  rebate for first-time buyers on homes up to $1M, streamlined
  permitting and prefab-housing support; (vi) accelerated capital
  cost allowance and investment-incentive measures to respond to
  US tariff shock; (vii) reduced permanent-resident admission targets
  and tightened temporary-resident caps continuing the late-Trudeau
  adjustment; (viii) defence-spending acceleration toward NATO 2% of
  GDP target, brought forward to fiscal year 2025-26; (ix) continued
  industrial OBPS carbon pricing + critical-minerals and clean-energy
  subsidy continuation. Popularity: 2025 election 43.7% popular vote
  and 169 of 343 seats (49.3%; three short of majority); leadership
  race March 2025 won with 85.9% of Liberal members. Proponents
  frame the package as central-bank credibility meeting trade-war
  pragmatism — drop the politically salient consumer carbon charge,
  preserve industrial carbon pricing, cut middle taxes, build housing,
  retaliate proportionately on US tariffs. Critics frame it as
  climate retreat, fiscal expansion disguised as tax relief, and
  status-quo Liberal continuity. Coherence line: BoE/BoC credibility
  anchor + trade-war response + climate-pragmatist rebalancing.
policies:
  - ca_carbon_tax_consumer_cancellation_2025
  - ca_us_retaliatory_tariffs_2025
  - ca_capital_gains_inclusion_cancellation_2025
  - ca_middle_bracket_tax_cut_2025
  - ca_build_canada_homes_2025
  - ca_immigration_levels_reduction_2025
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Middle-bracket rate cut 15% → 14% from 1 July 2025; capital-gains inclusion rise cancelled."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "Planned 50% → 66.67% capital-gains inclusion rate increase deferred and then withdrawn; accelerated capital-cost allowance."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence acceleration to NATO 2% target pulled forward; Build Canada Homes federal developer; industrial-policy countermeasures."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Continued clean-tech and critical-minerals subsidies; auto-sector and steel/aluminium support in response to US tariffs."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Retaliatory tariffs on ~C$155B of US imports in response to US 25% tariff shock — movement is counter-protectionist in stated intent but measurable effect on the axis is protectionist."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: moderate, rationale: "Consumer-facing fuel-charge carbon price removed 1 April 2025 while industrial OBPS retained — net reduction in environmental-pricing stringency on households."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: moderate, rationale: "Lower permanent-resident admission targets and tighter temporary-resident caps continued from the 2024 Trudeau-era adjustment."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "No framework change; PM is a former BoC/BoE governor and has publicly reaffirmed BoC independence."}
outcome_hypotheses:
  - canada_gdp_per_capita_stagnation_post_2015
predecessor_movements:
  - canada_trudeau_2015_present
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Technocratic-centrist; central-bank-credibility signalling; retain industrial carbon pricing while dropping politically salient consumer portion."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Inflation-target continuity plus middle-class tax cut and targeted counter-cyclical spending."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Rule-based monetary framework preserved; fiscal rules less anchored."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Carries Trudeau-era transfer programmes (CCB, $10/day childcare, dental) forward; retreats on consumer carbon price."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Capital-gains inclusion rollback and middle-bracket cut welcomed; retaliatory tariffs opposed."}
  - {position_id: austrian, alignment: opposed}
  - {position_id: eco_socialist, alignment: opposed, notes: "Consumer carbon-price removal viewed as climate retreat."}
references:

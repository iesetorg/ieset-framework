# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_socrates_ps_first_2005_2008
status: candidate
name: "Sócrates PS first majority government"
countries: [PRT]
timeframe: {start: 2005, end: 2008}
coalition: "PS absolute majority"
leaders:
  - "José Sócrates (PM)"
  - "Fernando Teixeira dos Santos (Finance)"
  - "Luís Amado (Foreign)"
doctrine: >
  Economic school: centre-left Euro-orthodoxy — continued austerity
  under socialist banner ("austerity of left") combined with
  modernisation and technology push. Left-right axis: centre-left
  politically, centrist on macro-fiscal. Dated policies: IVA rate
  raised from 19% to 21% July 2005 continuation; public-administration
  reorganisation PRACE 2006; Novas Oportunidades programme for adult
  education 2005; Magalhães laptop initiative 2008 — one laptop per
  primary student; Treaty of Lisbon drafted and signed under Portuguese
  EU presidency December 2007; high-speed-rail commitments (later
  cancelled); public-pension reform 2007 introducing sustainability
  factor tying pensions to life expectancy; General Civil-Service
  Law (Lei 12-A/2008) harmonising public-employment regimes;
  corporate tax SME rate cuts 2006; new motorway concessions; Faria
  e Castro anti-corruption statute preparation. Popularity: 2005
  election PS 45.0% absolute majority — first PS majority ever;
  approval tested by education strikes 2007-2008; re-elected with
  smaller plurality 2009. Coherence: high — clear "austerity-and-
  modernisation" package delivered against pushback.
policies:
  - pt_iva_rise_2005
  - pt_pension_sustainability_factor_2007
  - pt_magalhaes_laptop_programme_2008
  - pt_novas_oportunidades_adult_ed_2005
  - pt_lisbon_treaty_signing_2007
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Deficit from 6.1% (2005) to 3.2% (2007)."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Pension sustainability factor ties benefits to life expectancy."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "VAT-heavy revenue mix."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "PRACE administrative reorganisation."}
predecessor_movements: [portugal_barroso_psd_2002_2004]
successor_movements: [portugal_passos_coelho_psd_cds_2011_2015]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: ordoliberal, alignment: partially_aligned}
references:
  - "Lei n.º 4/2007 (Bases gerais do sistema de segurança social)"
  - "Tratado de Lisboa, 13 dezembro 2007"
notes: "First-term only; second-term 2009-2011 crisis-austerity and Troika bailout distinct phase."

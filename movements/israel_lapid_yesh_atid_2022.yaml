movement_id: israel_lapid_yesh_atid_2022
status: candidate
name: "Lapid caretaker government 2022"
countries: [ISR]
timeframe: {start: 2022, end: 2022, enacted_date: "2022-07-01"}
coalition: "Yesh Atid-led caretaker of the dissolving 'change coalition'"
leaders:
  - "Yair Lapid (PM, 1 Jul – 29 Dec 2022, under rotation clause)"
  - "Avigdor Liberman (Finance Minister, holdover)"
  - "Benny Gantz (Defence, Blue-White)"
doctrine: >
  Six-month centrist caretaker government formed under the Bennett-Lapid
  rotation clause after the 'change coalition' lost its Knesset majority
  (June 2022). Lapid became PM on 1 July 2022 and led through the 1 November
  2022 election to the transfer of power on 29 December 2022. Economic
  doctrine: continuity rather than new agenda — maintained the Bennett-era
  Arrangements Law implementation, FY2022 budget execution, and Bank of
  Israel tightening cycle (BoI raised policy rate from 0.1% April 2022 to
  3.25% by November 2022). Signature foreign-policy act: Israel-Lebanon
  maritime border agreement signed 27 October 2022, unlocking Karish gas-
  field production and future Qana field revenue-sharing — coded as
  regulatory.energy_supply_security positive. Centrist liberal economic
  orientation (Yesh Atid): pro-market, secular, middle-class-oriented;
  Lapid's 2013 finance-ministry tenure set the pattern. No major new
  legislation given caretaker status and imminent election. Popularity:
  Yesh Atid grew from 17 to 24 Knesset seats at the November 2022 election
  but the anti-Netanyahu bloc lost the arithmetic (64-56 in favour of
  Likud + religious-right partners). Approval ~35% at handover. Coherence
  line: 'centrist liberal caretaker — execute, don't legislate; lock in
  the Lebanon maritime deal'.
policies:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: congo_sassou_forest_fiscal_adjustment_2020_present
status: candidate
name: "Sassou forest governance and fiscal adjustment 2020-present"
countries: [COG]
timeframe: {start: 2020, end: ongoing, enacted_date: "2020-07-08"}
coalition: "Congolese Labour Party (PCT) and presidential majority"
leaders:
  - "Denis Sassou Nguesso (President, 1997-present)"
  - "Anatole Collinet Makosso (Prime Minister, 2021-present)"
doctrine: >
  The Republic of Congo's current governing programme combines oil-debt
  stabilization, IMF-backed public-finance control, and forest-sector regulation
  under Sassou Nguesso's long-running presidential system. The policy package
  seeks to preserve fiscal solvency while using state licensing to manage
  natural-resource rents and environmental obligations.
policies:
  - cog_forest_code_2020
  - cog_imf_ecf_2022
  - cog_fuel_price_adjustment_2023_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The ECF and fuel-price reforms target deficit, debt, and subsidy pressures."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "The 2020 Forest Code strengthens forest-management and conservation obligations."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Forest concessions and fuel-price administration keep strategic sectors under state gating."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "IMF governance and debt-transparency benchmarks add formal fiscal-accountability requirements."}
references:
  - "Republic of Congo, Law No. 33-2020 establishing the Forest Code."
  - "IMF, Republic of Congo Extended Credit Facility and 2024 Article IV materials."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: iran_rouhani_moderate_2013_2021
status: candidate
name: "Rouhani moderate-reformist government (Iran)"
countries: [IRN]
timeframe:
  start: 2013
  end: 2021
  enacted_date: "2013-08-03"
coalition: "Moderation and Development Party with reformist backing (Khatami-aligned); moderate-technocratic government under Supreme Leader Khamenei; Majles composition shifted from principlist-dominated (2012-2016) to List of Hope reformist-moderate plurality (2016-2020), returning to principlist dominance after 2020 disqualifications"
leaders:
  - "Hassan Rouhani (President 3 Aug 2013 - 3 Aug 2021)"
  - "Mohammad Javad Zarif (Foreign Minister 2013-2021, chief JCPOA negotiator)"
  - "Ali Tayyebnia (Minister of Economy 2013-2017)"
  - "Valiollah Seif (CBI Governor 2013-2018)"
  - "Abdolnaser Hemmati (CBI Governor 2018-2021)"
  - "Eshaq Jahangiri (First Vice President 2013-2021)"
doctrine: >
  Moderate-reformist JCPOA sanctions-relief gambit inside the clerical-theocratic
  system: technocratic macroeconomic stabilisation, nuclear-diplomacy reopening,
  and incremental subsidy-rationalisation under Supreme-Leader constraint. Core
  programme — (i) Joint Comprehensive Plan of Action signed 14 Jul 2015, UNSCR
  2231, implementation-day 16 Jan 2016, unfreezing ~$100bn in blocked assets
  and reopening oil exports and SWIFT access; (ii) disinflation from ~40% YoY
  in 2013 to ~9% by 2016 via CBI tightening and fiscal discipline, followed by
  reversal after US withdrawal from JCPOA on 8 May 2018 re-imposing maximum-
  pressure sanctions and restoring Nov 2018 oil-export sanctions; (iii) 2019
  fuel-price tripling (15 Nov 2019) and quota reform triggering nationwide
  protests with 200-1500 estimated deaths in security crackdown; (iv) Quds
  Force commander Qassem Soleimani killed by US strike 3 Jan 2020; (v) COVID
  shock Feb 2020 onward and rial collapse from ~32,000/USD (2017 free-market)
  to ~250,000/USD by 2021; (vi) OPEC+ participation constrained by US
  sanctions; (vii) Abraham Accords Israel-UAE normalisation Sep 2020 framed
  Iran as regional isolate. Left-right within Iranian clerical-theocratic
  system: coded as moderate-reformist vs principlist-conservative — opening
  FX channel, FATF legislation push (CFT bill stalled at Expediency Council),
  and limited price-liberalisation represent the liberal pole within the
  system. Popularity: Rouhani won 50.7% first-round 2013 and 57.1% 2017
  against Raisi. List of Hope coalition swept all 30 Tehran Majles seats
  Feb 2016. Approval collapsed after Nov 2019 fuel protests and rial crash;
  2020 Majles elections produced principlist landslide (~221/290 seats) on
  ~42% turnout, the lowest post-revolution. Coherence line: diplomacy-first
  stabilisation strategy fatally dependent on external JCPOA durability,
  leaving the government unable to defend domestic subsidy rationalisation
  once maximum-pressure sanctions returned.
policies:
  - ir_jcpoa_nuclear_deal_2015
  - ir_subsidy_cash_transfer_continuation_2014
  - ir_rial_unification_attempt_2018
  - ir_fuel_price_reform_2019
axes_summary:
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: moderate, rationale: "JCPOA 2016-2018 reopened oil exports and SWIFT; US withdrawal May 2018 and full secondary sanctions Nov 2018 reversed gains."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Nov 2019 fuel-price tripling and quota; partial continuation of Targeted Subsidies Reform cash-transfer architecture."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Disinflation 2013-2016 via CBI tightening; reversed by sanctions-driven monetisation 2018-2021."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "FATF/CFT legislation pushed by cabinet; stalled at Expediency Council; limited FX-channel liberalisation before 2018."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "No structural change to bonyad/IRGC parastatal architecture."}
outcome_hypotheses: [sanctions_effect_on_growth, rentier_state_non_oil_development]
predecessor_movements: [iran_revolution_islamic_economy_1979_present]
successor_movements: [iran_raisi_conservative_2021_2024]
position_alignments:
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Technocratic disinflation and rules-based CBI tightening 2013-2016."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Fuel-price liberalisation attempt 2019; FATF compliance push; limited within clerical-theocratic system."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "State-oil-revenue-led investment retained; sanctions-relief framed as industrial reopening."}
references:
  - "JCPOA final text (14 Jul 2015); UN Security Council Resolution 2231"
  - "IMF Article IV Iran (2018)"
  - "Salehi-Isfahani (2020), 'Iran's 2019 Protests'"
  - "Iranian Ministry of Interior election results 2013, 2017"
notes: "Sanctions regime change (JCPOA 2016, US withdrawal May 2018, secondary sanctions Nov 2018) is the dominant exogenous driver; axes_summary must be interpreted against sanctions covariate per Invariant on exogenous shocks."

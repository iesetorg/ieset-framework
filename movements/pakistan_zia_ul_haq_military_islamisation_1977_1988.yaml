# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_zia_ul_haq_military_islamisation_1977_1988
status: candidate
name: "Zia ul-Haq Islamisation + denationalisation military era (Pakistan)"
countries: [PAK]
timeframe: {start: 1977, end: 1988}
coalition: "Military government under General Zia; Muslim League factions civilian-cover from 1985"
leaders:
  - "Muhammad Zia-ul-Haq (CMLA, President 1977-1988, died 17 Aug 1988)"
  - "Muhammad Khan Junejo (PM 1985-1988)"
  - "Ghulam Ishaq Khan (Finance Minister, later President)"
  - "Mahbub ul Haq (Planning Minister 1982-1988)"
doctrine: >
  Zia Islamisation + denationalisation military doctrine. Economic school:
  rightward turn from Bhutto socialism — partial denationalisation,
  agriculture-led growth, private-sector encouragement, combined with
  US/Saudi/Chinese external alignment through Afghan jihad support.
  Dated actions: 5 Jul 1977 Operation Fair Play coup overthrowing
  Bhutto; Bhutto executed 4 Apr 1979; Hudood Ordinances promulgated
  10 Feb 1979 (zina, hadd offences); Zakat and Ushr Ordinance 20 Jun
  1980; Federal Shariat Court established 1980; denationalisation —
  cotton ginning and rice husking 1977, small industrial units 1978,
  cement partially 1979 (partial rollback of Bhutto 1972-1976 mass
  nationalisations); Soviet invasion of Afghanistan Dec 1979 triggered
  US-Saudi-aligned Afghan jihad; IMF Extended Fund Facility 1980-1983
  (SDR 1.27bn); Sixth Five-Year Plan (1983-1988); Interest-free Islamic
  banking framework Jan 1981 (profit-loss sharing); rupee devalued and
  managed-float from Jan 1982; IJI Islami Jamhoori Ittehad alliance
  formation 1988; non-party basis 1985 partial civilian elections
  producing Junejo as PM; Junejo dismissed 29 May 1988; Zia killed
  in C-130 crash 17 Aug 1988 with US Ambassador Raphel. Left-right:
  hard-right authoritarian-Islamist + market-liberal economic pivot.
  Popularity: no meaningful democratic signal — 19 Dec 1984 Islamisation
  referendum claimed 97.8% Yes (boycotted, ~10% turnout actual); Feb
  1985 non-party elections produced civilian parliament under military
  framework. Coherence: moderate — denationalisation and Islamisation
  ran parallel but pointed different directions on regulatory / social
  axes; external coherence via Afghan-jihad rent flows subsidising
  macro stability.
policies:
  - pk_hudood_ordinances_1979
  - pk_zakat_ushr_ordinance_1980
  - pk_federal_shariat_court_1980
  - pk_denationalisation_partial_1977_1982
  - pk_islamic_banking_framework_1981
  - pk_afghan_jihad_support_1979_1988
  - pk_imf_eff_1980_1983
  - pk_sixth_five_year_plan_1983_1988
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Denationalisation of ginning, rice husking, cement, small industrial units partially reversed Bhutto's 1972-1976 nationalisations."}
  - {axis: regulatory.financial_deregulation, direction: "mixed", magnitude: weak, rationale: "Islamic-banking profit-loss-sharing framework 1981 reshaped rather than liberalised finance."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Zakat-Ushr mandatory charity transfer created new fiscal-religious welfare rail."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Military rule, martial-law courts, Bhutto execution, Hudood hadd punishments."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Federal Shariat Court parallel jurisdiction; provisional constitutional orders."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Import liberalisation under Sixth Plan; tariff schedule rationalised modestly."}
predecessor_movements:
  - pakistan_bhutto_nationalisations_1972_1977
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Denationalisation component."}
  - {position_id: political_islam, alignment: aligned}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Hussain (1999), Pakistan: Problems of Governance"
  - "Burki (1991), Pakistan under the Military: Eleven Years of Zia ul-Haq"
  - "SBP Annual Reports 1977-1988"
notes: "Deep-history tranche 1. Successor movement to Bhutto nationalisations."

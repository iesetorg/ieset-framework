# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: greece_tsipras_syriza_2015_2019
status: candidate
name: "Greece Tsipras SYRIZA-led coalition 2015-2019"
countries: [GRC]
timeframe:
  start: 2015
  end: 2019
  enacted_date: "2015-01-26"
coalition: "SYRIZA (Coalition of the Radical Left) + ANEL (Independent Greeks, right-populist) — bound by anti-memorandum pledge"
leaders:
  - "Alexis Tsipras (PM, SYRIZA leader)"
  - "Yanis Varoufakis (Finance Minister Jan-July 2015 — resigned post-referendum)"
  - "Euclid Tsakalotos (Finance Minister July 2015-2019)"
  - "Panos Kammenos (Defence Minister, ANEL leader — exited January 2019 over Prespa Agreement)"
  - "Giorgos Katrougalos (Labour Minister 2015-2017 — pension reform architect)"
doctrine: >
  Radical-left SYRIZA platform transformed by the July 2015 capitulation
  into a memorandum-executing centre-left coalition. Original stated
  doctrine (January 2015 'Thessaloniki Programme'): reverse the 2010-2014
  Troika adjustment — restore minimum wage to €751, reinstate collective
  bargaining, cancel ENFIA property tax, recapitalise banks without
  bail-in, secure debt relief, and renegotiate the Memorandum. On the
  left-right axis the founding stance was far-left / radical-left on
  economic and institutional dimensions; after the July 2015 bank-
  closure / capital-controls / referendum cycle and the Third Memorandum
  signature the executed programme was centre-left / Memorandum-
  compliant, making SYRIZA 2015-2019 the most economically-right left-
  wing government in modern Greek history on policy content. Key
  policies with dates: January-June 2015 'five-month standoff'
  negotiation with the Eurogroup under Varoufakis; 28 June 2015 bank
  closure and capital controls (remained in some form until September
  2019); 5 July 2015 referendum on Eurogroup proposals ('Oxi' / No
  won 61.3%); within days Tsipras accepted harsher terms; 13 July
  2015 Euro Summit agreement; Third Economic Adjustment Programme
  (Third Memorandum) signed 19 August 2015 (€86bn, three years),
  including full implementation of pending prior actions; snap
  September 2015 election re-legitimised SYRIZA-ANEL on executing
  (not opposing) the Memorandum; pension reform May 2016
  (Katrougalos, Law 4387/2016 — unified pension rules, national
  pension €384, replacement rates cut, contributions raised for self-
  employed); income tax reform 2016 raising top marginal rate to 45%
  and introducing a 22% entry bracket; solidarity surtax maintained
  and raised; privatisation acceleration under TAIPED (Piraeus port
  to COSCO majority stake 2016, 14 regional airports to Fraport
  operational 2017, Trainose to FS Italiane 2017, Hellinikon
  concession contract 2014 ratified and proceeded); primary-surplus
  target 3.5% of GDP 2018-2022 (beaten in practice 2016-2018);
  Third Memorandum exit 20 August 2018 with post-programme
  enhanced surveillance; household primary residence protection
  ('Katseli law' extension); Prespa Agreement with North Macedonia
  12 June 2018, ratified January 2019 (triggered ANEL exit). ENFIA
  was cut in stages rather than abolished. Popularity: January 2015
  election SYRIZA 36.3% (149/300 Vouli seats), ANEL 4.8% (13 seats),
  coalition 162/300; September 2015 re-election SYRIZA 35.5% (145
  seats), ANEL 3.7% (10), coalition 155/300. EU 2019 elections
  SYRIZA 23.8% (second), triggered snap July 2019 election SYRIZA
  31.5% (86 seats), losing to ND. Tsipras approval peaked around
  referendum week (~60%) then declined through 2016-2019 as Memorandum
  implementation bit; average ~25-35% by 2018-2019. Coherence
  judgement: the movement is internally incoherent — stated far-left
  platform versus executed centre-left / Memorandum-compliant policy.
  The framework codes on content (Invariant 3): executed content sits
  centre-left with strong institutional-rule-of-law-preserving bias
  despite radical-left branding.
policies:
  - gr_third_memorandum_2015
  - gr_pension_reform_katrougalos_2016
  - gr_taiped_privatisation_acceleration_2015_2019
  - gr_capital_controls_2015_2019
  - gr_memorandum_exit_2018
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: strong
    rationale: "Third Memorandum primary-surplus path 3.5% of GDP (2018-2022 target, achieved 2016-2018); spending cuts + revenue measures €13bn over 2015-2018."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: moderate
    rationale: "Top PIT raised to 45%, solidarity surtax raised, self-employed contributions increased — executed despite anti-austerity branding."
  - axis: fiscal.transfer_expansion
    direction: "-"
    magnitude: moderate
    rationale: "Katrougalos pension reform 2016 cut replacement rates; auxiliary-pension sustainability clause; partially offset by Social Solidarity Income (KEA) rollout."
  - axis: regulatory.labour_market_flexibility
    direction: "0"
    magnitude: weak
    rationale: "Minimum wage freeze through 2018 under Memorandum; partial restoration of collective bargaining mid-term but executed slowly; programme-mandated reforms preserved."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: moderate
    rationale: "TAIPED privatisations accelerated under Memorandum (Piraeus, airports, Trainose); OECD toolkit implementation."
  - axis: institutional.rule_of_law
    direction: "0"
    magnitude: weak
    rationale: "Bank bail-in executed within eurozone framework; capital controls imposed under pressure but orderly; institutional rupture avoided despite referendum brinkmanship."
  - axis: monetary.central_bank_independence
    direction: "0"
    rationale: "ECB ELA brinkmanship June-July 2015 tested but did not breach Bank of Greece independence."
outcome_hypotheses:
  - structural_reform_absence_and_post_euro_stagnation
  - hyperinflation_requires_fiscal_dominance
predecessor_movements:
  - greece_samaras_nd_pasok_2012_2015
successor_movements:
  - greece_mitsotakis_nd_2019_present
position_alignments:
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Executed programme sits centre-left; KEA anti-poverty transfer and progressive PIT moves align; Memorandum implementation diverges from stated platform."}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Original anti-austerity platform aligned; post-capitulation execution diverged."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Third Memorandum execution unexpectedly rule-compliant; 3.5% primary-surplus achievement consistent with ordoliberal convergence logic."}
  - {position_id: austrian, alignment: opposed, notes: "Capital controls and bank bail-in read as property-rights infringement under Austrian lens."}
references:
  - "Third Economic Adjustment Programme for Greece (ESM, 19 August 2015)"
  - "Law 4387/2016 (Katrougalos pension unification)"
  - "Law 4336/2015 (prior-actions omnibus post-referendum)"
  - "Bank of Greece Annual Reports 2015, 2016, 2017, 2018"
  - "European Commission compliance reports under Third Programme 2015-2018"
  - "IMF Article IV consultations 2016, 2017 (non-disbursing)"
notes: >
  Framework flags this as the canonical Invariant-3 case for Greece —
  party-label (radical-left SYRIZA) versus policy-content (Memorandum-
  executing centre-left) divergence is sharper than in any other
  European case coded. The January-July 2015 negotiation phase and
  the August 2015 onward execution phase are treated as a single
  movement because the PM, coalition, and ministerial continuity
  persist across the structural break. ANEL exit in January 2019
  over Prespa is a late-term event, not a coalition successor.

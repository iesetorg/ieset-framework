# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: taiwan_lai_dpp_2024_present
status: candidate
name: "Lai Ching-te DPP government 2024-present"
countries: [TWN]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-05-20"}
coalition: "Democratic Progressive Party (DPP) — minority government with KMT-led legislature (KMT + TPP majority)"
leaders:
  - "Lai Ching-te / William Lai (President, DPP, May 2024-)"
  - "Hsiao Bi-khim (Vice President)"
  - "Cho Jung-tai (Premier)"
  - "Yang Chin-long (CBC Governor)"
  - "Liu Chin-ching (Finance Minister)"
doctrine: >
  Lai's DPP retained the presidency in Jan 2024 but lost
  legislative majority — KMT and TPP combined hold a working
  majority, producing constant inter-branch confrontation.
  Programme: cross-strait posture continuity from Tsai-era
  ("status quo with PRC bullying as the change"); semiconductor-
  industrial-policy continuation (TSMC global expansion,
  domestic R&D incentives, defence-industry build-up); energy
  transition with phase-out-of-nuclear policy challenged by
  KMT-LY referendum; defence-spending ramp toward ~3% of GDP;
  asymmetric-defence procurement (drones, anti-ship missiles,
  manpads). Major confrontation: KMT-LY budget cuts to
  executive defence and intelligence lines (early 2025);
  recall campaigns 2025. Trump-administration tariff and
  reshoring pressure on TSMC complicates industrial policy.
  Continued PRC grey-zone military pressure (large-scale drills
  May 2024, Oct 2024).
policies:
  - tw_semiconductor_industrial_policy_continuation
  - tw_defence_spending_ramp_2024
  - tw_asymmetric_defence_procurement
  - tw_energy_transition_nuclear_phaseout
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "TSMC/semiconductor R&D incentives + defence-industry build-out."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Defence-spending ramp; offset by KMT-LY budget cuts on executive lines."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Active multi-party competition; vibrant civic space; recall and referendum mechanisms exercised."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Active CPTPP application; preserved bilateral trade agreements; TSMC global supply-chain integration."}
predecessor_movements: [taiwan_kmt_developmentalism_1961_2000]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "DPP technocratic continuity from Tsai era; evidence-led semiconductor and energy industrial policy; rules-based macro framework."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Continued universal-NHI strengthening; long-term-care financing; housing-affordability programme."}
  - {position_id: developmentalist, alignment: partially_aligned, notes: "TSMC/semiconductor-industrial-policy + defence-industry build-out + asymmetric-defence procurement reflect East-Asian developmentalist toolkit."}
references:
  - "Taiwan 2024 presidential and legislative election results"
  - "Lai inaugural address May 2024"
notes: "Stub authored to close 2026 atlas-coverage gap for TWN. Earlier modern-Taiwan movements (Lee Teng-hui, Chen Shui-bian, Ma Ying-jeou, Tsai Ing-wen) remain unauthored."

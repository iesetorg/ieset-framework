movement_id: nigeria_buhari_military_1983_1985
status: candidate
name: "Buhari military government — War Against Indiscipline, austerity, IMF rejection"
countries: [NGA]
timeframe: {start: 1983, end: 1985, enacted_date: "1983-12-31"}
coalition: "Supreme Military Council"
leaders:
  - "Major General Muhammadu Buhari (Head of State 1983-1985)"
  - "Major General Tunde Idiagbon (Chief of Staff, Supreme HQ)"
  - "Onaolapo Soleye (Finance Minister 1984-1985)"
doctrine: >
  Buhari-Idiagbon junta executed an austerity-plus-discipline programme
  without IMF structural adjustment. Economic school: autarkic austerity
  — maintained Shagari's import licensing, tightened further, rejected
  IMF conditionality on fuel-subsidy cut / devaluation / trade liberalisation
  (public 1985 referendum-style debate), replaced 'Naira' banknotes
  (April 1984) to strand capital flight, and launched 'War Against
  Indiscipline' mass-mobilisation campaign. Left-right axis: military-
  authoritarian politically, economic-nationalist/statist economically
  (fundamentally at odds with simultaneous Reagan-Thatcher deregulation).
  Popularity / legitimacy: no elections; initial public support for
  anti-corruption purge (500+ politicians tried, some sentenced to
  100+ years); popularity eroded by austerity severity, Decree 4 press
  restrictions, and 1984 counter-trade exchanges with Soviet bloc.
  Coherence: high ideologically but unsustainable — refusing IMF
  meant refusing FX and worsening import starvation; Babangida's
  27 August 1985 palace coup ended the programme. Successor SAP
  (1986) already covered in nigeria_buhari_sap_structural_adjustment_1986.
policies:
  - ng_naira_currency_change_1984
  - ng_war_against_indiscipline_1984
  - ng_imf_loan_rejection_1985
  - ng_decree_4_press_restrictions_1984
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Tightened import licensing; rejected IMF-recommended liberalisation."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Austerity — sharp cuts in recurrent spending, wage freezes, capital retrenchment."}
  - {axis: fiscal.sectoral_subsidy, direction: "0", magnitude: moderate, rationale: "Refused IMF demand to cut fuel subsidy; retained consumer subsidies."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Decree 2 (indefinite detention), Decree 4 (press), tribunal retrospective sentences."}
predecessor_movements: [nigeria_shagari_second_republic_1979_1983]
successor_movements: [nigeria_buhari_sap_structural_adjustment_1986]

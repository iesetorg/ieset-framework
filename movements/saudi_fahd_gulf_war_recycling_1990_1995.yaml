movement_id: saudi_fahd_gulf_war_recycling_1990_1995
status: candidate
name: "Fahd Gulf-War fiscal recycling and 1994 budget reform"
countries: [SAU]
timeframe: {start: 1990, end: 1995}
coalition: "Al Saud monarchy; US-coalition security partnership"
leaders:
  - "King Fahd bin Abdulaziz"
  - "Crown Prince Abdullah bin Abdulaziz"
  - "Ibrahim Al-Assaf (Finance Minister from 1996; precursors under Aba Al-Khail)"
  - "Hamad Al-Sayari (SAMA Governor)"
doctrine: >
  Economic school: defensive rentier-state crisis management. The 1990-91
  Gulf War cost Saudi Arabia roughly $55bn directly (paid to the US-led
  coalition, plus domestic mobilisation and one-off citizen bonuses), forcing
  the drawdown of SAMA foreign reserves from ~$25bn (1990) to ~$7bn (1993)
  and the issuance of new government development bonds to domestic banks
  and pension funds. Left-right axis: right-of-centre on fiscal consolidation
  (the January 1994 budget announced the first nominal spending cut in a
  decade, with a ~20% capital-spending reduction and first-ever explicit
  revenue-diversification targets) but statist on subsidy and the
  still-pegged riyal (3.75/USD held throughout). Dated policies: Gulf-War
  coalition contributions 1990-91; one-off citizen bonus ($4bn) 1990-91;
  SAMA reserve drawdown 1991-93; 1994 austerity budget; 1992 Basic Law of
  Governance and Shura Council response to Sahwa clerical and liberal
  petitions. Popularity / legitimacy: no elections; Sahwa "Memorandum of
  Advice" 1992 and 1990 women-drivers protest signalled strain; Fahd's 1995
  stroke transferred effective rule to Abdullah. Coherence: moderate — peg
  and sovereign solvency preserved, but the underlying fiscal breakeven
  oil-price moved higher, deferring structural reform to the 2000s.
policies:
  - sa_gulf_war_coalition_contribution_1990_1991
  - sa_sama_reserve_drawdown_1991_1993
  - sa_1994_austerity_budget
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "1994 budget cut nominal spending for first time in a decade; capital spending pared further."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: weak, rationale: "Incremental utility- and fuel-price adjustments from 1994."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "SAMA held the peg throughout; no regime change but reserves exhausted."}

movement_id: zimbabwe_mugabe_land_reform_hyperinflation_2000_2008
status: candidate
name: "Mugabe land reform + hyperinflation (Zimbabwe)"
countries: [ZWE]
timeframe: {start: 2000, end: 2009}
coalition: "ZANU-PF under Robert Mugabe"
leaders: ["Robert Mugabe (President)", "Gideon Gono (RBZ Governor 2003-2013)"]
doctrine: >
  Fast-track land reform from 2000 confiscated commercial farms
  (historically owned by white Zimbabweans), redistributing to
  politically-connected beneficiaries without compensation or
  productivity support. Commercial agriculture collapsed; foreign
  exchange earnings fell; RBZ financed fiscal deficits via money
  printing. Result: hyperinflation peaking ~89.7 sextillion percent
  y/y in November 2008 (Hanke-Krus), currency abandonment Jan 2009.
  One of the cleanest modern hyperinflation episodes validating the
  D.1.5 fiscal-dominance-necessary-condition claim. Linked to
  hyperinflation_requires_fiscal_dominance as a primary test case.
policies: [zimbabwe_fast_track_land_reform_2000, zimbabwe_rbz_fiscal_financing_2003_2009, zimbabwe_price_controls_2007, zimbabwe_multi_currency_2009]
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Confiscation without compensation; judicial overrides."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "RBZ directly financed fiscal deficit at governor-cabinet level."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Price controls + FX controls + commercial-farm collapse."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong}
outcome_hypotheses: [hyperinflation_requires_fiscal_dominance]
position_alignments:
  - {position_id: austrian, alignment: aligned, notes: "Textbook fiscal-dominance hyperinflation."}
references:
  - "Hanke-Krus (2013), 'World Hyperinflations' table"
  - "Reserve Bank of Zimbabwe annual reports 2003-2009"
  - "Coomer-Gstraunthaler (2011) 'The Hyperinflation in Zimbabwe'"

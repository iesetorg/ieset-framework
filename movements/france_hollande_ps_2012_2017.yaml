movement_id: france_hollande_ps_2012_2017
status: candidate
name: "Hollande PS presidency — social-democratic fiscal orthodoxy (France)"
countries: [FRA]
timeframe: {start: 2012, end: 2017, enacted_date: "2012-05-15"}
coalition: "Parti Socialiste-led majority with EELV (Greens) and PRG; Assemblée nationale PS+allies 314/577 from June 2012; declining parliamentary cohesion ('frondeurs') from 2014"
leaders:
  - "François Hollande (President 2012-2017)"
  - "Jean-Marc Ayrault (PM 2012-2014)"
  - "Manuel Valls (PM 2014-2016)"
  - "Bernard Cazeneuve (PM 2016-2017)"
  - "Pierre Moscovici (Economy/Finance 2012-2014)"
  - "Michel Sapin (Finance 2014-2017)"
  - "Emmanuel Macron (Economy Minister 2014-2016)"
doctrine: >
  Social-democratic Parti Socialiste presidency that campaigned on a
  left-redistributive platform ("Le changement, c'est maintenant"; 60
  engagements including 75% top-bracket surtax on incomes above €1m,
  separation of retail and investment banking, 60,000 new teachers,
  same-sex marriage) but pivoted to fiscal orthodoxy and supply-side
  adjustment under Eurozone constraints from mid-2013. Left-right axis:
  centre-left, with a clear centrist-technocratic drift across the
  mandate. Signature policies: exceptional 75% tax on very high incomes
  2013-2014 (struck down once, redesigned, expired 2015); same-sex
  marriage "Mariage pour tous" (loi Taubira, 17 May 2013); CICE tax
  credit for competitiveness and employment from January 2013 (tax credit
  on wages below 2.5 SMIC, ~€20bn/yr); Pacte de responsabilité 2014
  (further employer-contribution cuts); loi Macron August 2015
  (Sunday/evening retail opening, deregulation of regulated professions,
  intercity-bus liberalisation, Article 49.3); loi Travail (El Khomri)
  July 2016 (enterprise-level bargaining primacy, dismissal-economic
  criteria clarified, Article 49.3 again, nuit-debout protests); ANI 2013
  and retraites reform 2014 (contribution-period lengthening). Popularity
  trajectory: 1st-round 28.6% / 2nd-round 51.6% May 2012 vs Sarkozy; PS
  legislative victory June 2012 (~280 seats + allies to 314); approval
  collapsed from ~55% at inauguration to ~20% by late 2013, hitting a
  record ~13-15% low in late 2016 (Ifop); Hollande declined to seek
  re-election December 2016, the first incumbent to do so in the Fifth
  Republic; PS primary produced Benoît Hamon who won 6.4% in 2017 1st
  round, precipitating the PS collapse. Coherence judgement: mandate
  content flipped mid-course from redistributive social-democracy to
  competitiveness-supply-side under Eurozone discipline, producing
  doctrinal incoherence that hollowed the PS base and prefigured the
  2017 centrist realignment.
policies:
  - fr_75pc_top_bracket_2013
  - fr_cice_tax_credit_2013
  - fr_pacte_responsabilite_2014
  - fr_loi_macron_2015
  - fr_loi_travail_el_khomri_2016
  - fr_retraites_2014
  - fr_mariage_pour_tous_2013
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Exceptional 75% top-bracket surtax 2013-2014; additional high-income surtaxes; new 45% bracket (2012)."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "CICE wage-based tax credit + Pacte de responsabilité lowered effective employer tax-and-social wedge."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Loi Macron 2015 + loi Travail 2016 opened enterprise-level bargaining and eased dismissal rules — partial reversal of PS labour posture."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Loi Macron 2015 intercity-bus liberalisation, regulated-professions reform, Sunday opening."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Post-2014 Pacte de stabilité targeted deficit reduction; spending/GDP roughly stable at high level."}
outcome_hypotheses: [schroder_style_reform_effectiveness, austerity_growth_drag_eurozone]
predecessor_movements: [france_sarkozy_ump_2007_2012]
successor_movements: [france_macron_presidency_2017_present]
position_alignments:

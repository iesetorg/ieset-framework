movement_id: uruguay_mujica_fa_2010_2015
status: candidate
name: "José 'Pepe' Mujica — FA continuity, cannabis legal market, same-sex marriage, UPM-1"
countries: [URY]
timeframe: {start: 2010, end: 2015, enacted_date: "2010-03-01"}
coalition: "Frente Amplio"
leaders:
  - "José Mujica (President 2010-2015)"
  - "Fernando Lorenzo (Economy 2010-2013)"
  - "Mario Bergara (Economy 2013-2015)"
  - "Alberto Graña (BCU 2013-2015)"
doctrine: >
  Mujica's presidency continued Frente Amplio social-liberal economics
  while unlocking a cluster of personal-autonomy institutional reforms.
  (a) Economic school: social-liberal developmentalist continuation — kept
  Astori framework, expanded foreign direct investment (UPM Botnia mill
  operating + Montes del Plata 2014), kept IRPF + FONASA on rails,
  continued infrastructure modernisation. (b) Left-right: centre-left,
  libertarian on personal-autonomy axis. (c) Dated policies: same-sex
  marriage Ley 19.075 Apr 2013 (Uruguay second in LatAm after Argentina),
  abortion decriminalisation Ley 18.987 Oct 2012, cannabis legal market
  Ley 19.172 Dec 2013 (Uruguay first country globally to fully legalise
  and state-regulate recreational cannabis), Plan Ceibal/OLPC continuity,
  Montes del Plata pulp mill (UPM-1 operated + second UPM considered),
  Ley de Inclusión Financiera Ley 19.210 May 2014, migration openness push.
  (d) Popularity: won Nov 2009 runoff 54.6%; approval consistently 60s
  through term; FA retained power in Nov 2014 runoff with Vázquez II
  elected successor 56.6%. (e) Coherence: high — macro continuity +
  personal-autonomy reforms formed coherent social-liberal package;
  cannabis legalisation is globally singular institutional innovation
  placing Uruguay at the front of drug-policy reform.
policies:
  - uy_cannabis_legal_market_2013
  - uy_same_sex_marriage_law_2013
  - uy_abortion_decriminalisation_2012
  - uy_financial_inclusion_law_2014
  - uy_montes_del_plata_pulp_mill_2014
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Cannabis legal market created new regulated commercial supply chain."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "New regulatory architecture for cannabis + financial inclusion reporting."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Marriage + abortion + cannabis reforms clarified legal status + reduced criminal grey zone."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "FONASA + child-allowance continuation + mild expansion."}
outcome_hypotheses: [drug_legalisation_market_outcomes, social_liberal_institutional_package]
predecessor_movements: [uruguay_vazquez_i_fa_2005_2010]
successor_movements: [uruguay_vazquez_ii_fa_2015_2020]
position_alignments:

movement_id: bolivia_sanchez_de_lozada_mnr_1993_1997
status: candidate
name: "Sánchez de Lozada I MNR — Capitalización, Participación Popular, Pension reform"
countries: [BOL]
timeframe: {start: 1993, end: 1997, enacted_date: "1993-08-06"}
coalition: "MNR + MBL + UCS + MRTKL (Víctor Hugo Cárdenas VP — first indigenous VP)"
leaders:
  - "Gonzalo Sánchez de Lozada 'Goni' (President 1993-1997)"
  - "Víctor Hugo Cárdenas (Vice President; MRTKL)"
  - "Fernando Campero Prudencio / Juan Carlos Requena (Hacienda)"
  - "Alfonso Revollo (Capitalización minister)"
doctrine: >
  Reform-package presidency fusing heterodox-privatisation ('capitalisation')
  with decentralisation and multicultural-constitutional opening. Five
  doctrinal pillars: (a) Capitalización Ley 1544 of 21 March 1994 —
  unique model privatising 6 largest SOEs (YPFB hydrocarbons, ENTEL
  telecoms, ENDE electricity, ENFE railways, LAB aviation, Vinto
  smelter) via joint-ventures where private strategic investor
  injected capital equal to book value in exchange for 50% +
  management control; remaining 50% assigned to Collective
  Capitalisation Fund benefiting adult citizens ≥21 — funding Bonosol
  universal pension (later). (b) Ley de Participación Popular 1551
  of 20 April 1994 — created 311 municipal governments, transferred
  20% of national tax revenue (coparticipación) to municipalities
  by population, recognised indigenous Original Community Territorial
  entities (TCOs); watershed decentralisation. (c) Pension reform
  Ley 1732 of 29 November 1996 — replaced PAYG with fully-funded
  individual-accounts system; two private AFP managers; Bonosol
  universal flat pension ($248/year) funded by Capitalización
  dividends. (d) Constitutional reform 1994 — recognised Bolivia
  as "multiethnic and pluricultural", introduced Defensor del Pueblo,
  Tribunal Constitucional; Cárdenas as first indigenous VP of any
  Americas country. (e) Ley INRA 1715 of 1996 — land reform creating
  INRA institute, TCO registrations; contested by cocalero + land-
  movement actors. Stated school: Washington-Consensus privatisation
  + decentralisation-multiculturalism + pension-privatisation.
  Left-right: economic right, social reformist. Popularity: June
  1993 first round 35.6% (confirmed by Congress); approval declined
  through term; 1 June 1997 election Banzer (ADN) 22.3% first-round
  winner (Congress selection) — MNR fell to 18.2%. Coherence: trade
  direct-state control of largest SOEs for capitalised investment
  inflows, decentralised municipalities, and multicultural
  constitutional text — a high-institutional-density reform burst
  whose distributional failure seeded later cocalero-led backlash.
policies:

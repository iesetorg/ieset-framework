movement_id: southafrica_zuma_anc_2009_2018
status: candidate
name: "Zuma ANC presidency (South Africa, 2009-2018)"
countries: [ZAF]
timeframe: {start: 2009, end: 2018}
coalition: "African National Congress (Zuma faction; tripartite alliance with SACP and COSATU, fraying post-2012)"
leaders: ["Jacob Zuma (President, May 2009-Feb 2018)", "Pravin Gordhan (Finance 2009-2014, 2015-2017)", "Nhlanhla Nene (Finance 2014-Dec 2015)", "Des van Rooyen ('weekend special' Dec 2015)", "Malusi Gigaba (Finance 2017-2018)"]
doctrine: >
  The Zuma administration fused nominal ANC centre-left social-democratic
  language with an increasingly heterodox-populist state-capture practice:
  National Democratic Revolution rhetoric and "radical economic
  transformation" slogans from 2015 coexisted with systematic SOE capture
  documented by the Zondo Commission — Gupta-family influence over
  appointments at Eskom, Transnet, Denel, SAA, SARS and the state broadcaster.
  Economic school: formally ANC broad-church centre-left; content was
  patronage-heterodox with Africanist redistributive framing. Key episodes:
  Marikana massacre 16 August 2012; Nkandla security-upgrade scandal (Public
  Protector report 2014; Constitutional Court ruling 31 March 2016 that Zuma
  violated the Constitution); Nenegate 9 December 2015 (Nene fired, van Rooyen
  appointed then replaced with Gordhan after rand/bond crash); cabinet
  reshuffle 31 March 2017 firing Gordhan; S&P and Fitch downgrades to junk in
  April 2017; Moody's downgrade 2017. Macro orthodoxy persisted at Treasury
  and SARB (inflation targeting, floating rand) but was repeatedly attacked.
  Load-shedding began December 2007 and intensified from 2014. ANC popularity:
  65.90% (2009) → 62.15% (2014) National Assembly seat share; presidential
  approval collapsed through 2016-2017; municipal elections August 2016 lost
  Joburg, Tshwane, Nelson Mandela Bay metros. Recalled by ANC NEC
  13 February 2018; resigned 14 February 2018. Coherence line: centre-left
  party branding + patronage-heterodox practice + preserved (but besieged)
  macro institutions — genuinely mixed, but the institutional-damage channel
  dominates the policy-content reading.

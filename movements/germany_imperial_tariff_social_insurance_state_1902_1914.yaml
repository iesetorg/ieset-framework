# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: germany_imperial_tariff_social_insurance_state_1902_1914
status: candidate
name: "Imperial Germany tariff-social-insurance state"
countries: [DEU]
timeframe: {start: 1902, end: 1914}
coalition: "Imperial governments under Kaiser Wilhelm II, chiefly Buelow and Bethmann Hollweg, backed by shifting Conservative, Centre, and National Liberal blocs"
leaders:
  - "Bernhard von Buelow (Chancellor 1900-1909)"
  - "Theobald von Bethmann Hollweg (Chancellor 1909-1917)"
  - "Kaiser Wilhelm II"
  - "Arthur von Posadowsky-Wehner (Interior Office, social-policy steward through 1907)"
doctrine: >
  Wilhelmine Germany after the 1902 tariff settlement fused agrarian and heavy-
  industrial protection with the mature Bismarckian social-insurance architecture
  inside an authoritarian constitutional monarchy. The state did not pursue laissez-
  faire: it used tariffs to hold together the "marriage of iron and rye," maintained
  compulsory contributory welfare institutions for workers and salaried employees,
  and expanded military capacity through the 1913 army bill financed in part by a
  one-off levy on wealth. The movement's own logic was integrative rather than
  democratic: manage class conflict in a rapidly industrialising empire through
  protection, administrative social insurance, and state capacity, without conceding
  parliamentary control of the executive.
policies:
  - germany_tariff_act_1902
  - germany_reich_insurance_code_1911
  - germany_employee_insurance_act_1911
  - germany_wehrbeitrag_army_bill_1913
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "The 1902 tariff raised grain and industrial duties, preserving a protectionist settlement for agriculture and heavy industry."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "The 1911 social-insurance laws consolidated and widened compulsory sickness, accident, invalidity, and salaried-employee coverage."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Compulsory insurance obligations and codified worker protections thickened the employment relationship relative to a less structured labour market."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "The 1913 army bill materially expanded peacetime military spending and state procurement."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: weak, rationale: "The 1913 Wehrbeitrag financed military expansion partly through a one-off levy on larger fortunes."}
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Tariff shelter, coordinated industrial interests, and administrative state capacity fit a late-industrial catch-up logic even without later export-discipline features."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "The rules-based insurance architecture prefigures later German institutionalism, but the cartel-prone protectionist settlement cuts against later ordoliberal competition doctrine."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Tariff protection, compulsory social insurance, and large state-directed military spending all depart from a classical-liberal baseline."}
references:
  - "Tarifgesetz of 1902 (Buelow tariff)"
  - "Reichsversicherungsordnung (1911)"
  - "Versicherungsgesetz fuer Angestellte (1911)"
  - "Wehrbeitragsgesetz and Army Bill (1913)"
  - "Wehler (1995), Deutsche Gesellschaftsgeschichte, vol. 3"
  - "Retallack (2008), Imperial Germany 1871-1918"
notes: "Historical backfill anchor moving Germany's authored movement coverage back into the early 1900s via a small set of high-legitimacy pre-1914 policy pillars."

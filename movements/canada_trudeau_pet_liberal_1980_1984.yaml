movement_id: canada_trudeau_pet_liberal_1980_1984
status: candidate
name: "Trudeau (Pierre) Liberal restoration — NEP, Patriation, Charter"
countries: [CAN]
timeframe: {start: 1980, end: 1984, enacted_date: "1980-03-03"}
coalition: "Liberal Party of Canada (majority government)"
leaders:
  - "Pierre Elliott Trudeau (Prime Minister 1980-1984)"
  - "Allan MacEachen (Finance 1980-1982)"
  - "Marc Lalonde (Energy 1980-1982, Finance 1982-1984)"
  - "Jean Chrétien (Justice 1980-1982)"
  - "Gerald Bouey (Bank of Canada Governor)"
doctrine: >
  Interventionist-nationalist Liberal programme after the 1980 defeat of
  Joe Clark's minority PC government. Three doctrinal pillars: (1) energy
  economic nationalism — National Energy Program (October 1980) imposed
  federal pricing, a Petroleum and Gas Revenue Tax, Canadianisation
  incentives targeting 50% Canadian ownership of oil and gas by 1990,
  and expanded Petro-Canada; a direct confrontation with Alberta that
  provoked the 1981 Energy Pricing Agreement after acute Alberta output
  cuts; (2) constitutional patriation — Constitution Act 1982 (proclaimed
  17 April 1982) brought the BNA Act home from Westminster and embedded
  the Canadian Charter of Rights and Freedoms, with the notwithstanding-
  clause compromise that secured eight provincial premiers' assent
  (Quebec dissented); (3) stagflation-era macro — MacEachen's
  November 1981 budget (tax-shelter attack) was withdrawn under
  business pressure; Six-and-Five wage/price controls programme
  (June 1982) limited federal compensation and signalled incomes policy;
  Bank of Canada tracked Volcker with bank rate peaking at 20.78%
  (August 1981) and the 1981-82 recession was severe (GDP -3.2%,
  unemployment peak 13% Dec 1982). Stated school: Keynesian-nationalist
  social liberalism with constitutional-liberal rights charter. Left-
  right axis: centre-left on economic content (state oil ownership,
  regional redistribution), liberal-progressive on rights (Charter),
  centralising on federalism. Popularity / legitimacy: February 1980
  election restored majority with 44.3% vote and 147/282 seats; PC
  dropped to 32.5%. Trudeau announced resignation February 1984;
  Turner succeeded June 1984 and lost September 1984 landslide to
  Mulroney (PC won 50% vote, 211 seats). Coherence line: trade market
  allocation of energy rents and federal-provincial comity for national-
  champion oil sector + constitutional sovereignty + bilingual
  institutional settlement.
policies:
  - ca_national_energy_program_1980
  - ca_constitution_act_patriation_1982
  - ca_charter_rights_freedoms_1982
  - ca_six_and_five_wage_controls_1982
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "NEP federal pricing, Canadianisation rules, Petro-Canada expansion."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "NEP Canadianisation incentives and drilling grants."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "FIRA-tightened screening; energy-export tax provisions."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Charter of Rights constitutionalised equal-treatment and limitation-of-power norms."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Federal deficit widened in 1981-82 recession to ~6% GDP."}
outcome_hypotheses: [resource_nationalism_growth_effect, rights_charter_institutional_effect]
successor_movements: [canada_mulroney_pc_first_1984_1988]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Energy-sector developmentalism via Petro-Canada."}
  - {position_id: classical_liberal, alignment: opposed, notes: "NEP-era resource nationalism contested by classical liberals and Alberta."}
references:
  - "National Energy Program, Energy, Mines and Resources Canada (October 1980)"
  - "Constitution Act 1982, Schedule B — Canadian Charter of Rights and Freedoms"
  - "Department of Finance Canada, Budget of the Government of Canada, November 12 1981"
  - "Bothwell-Drummond-English (1989), Canada Since 1945"
  - "Doern-Toner (1985), The Politics of Energy: The Development and Implementation of the NEP"
notes: >
  Precedes existing canada_mulroney_chretien_fiscal_consolidation_1984_2006
  (a broad multi-decade fiscal movement). This movement covers the
  distinct 1980-84 PET restoration period that predates that consolidation.

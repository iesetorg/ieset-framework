movement_id: czech_republic_sobotka_cssd_2014_2017
status: candidate
name: "Sobotka CSSD-ANO-KDU-CSL coalition 2014-2017"
countries: [CZE]
timeframe: {start: 2014, end: 2017, enacted_date: "2014-01-29"}
coalition: "CSSD-ANO-KDU-CSL"
leaders:
  - "Bohuslav Sobotka (Prime Minister, CSSD, 2014-2017)"
  - "Andrej Babis (Deputy PM and Finance Minister, ANO, 2014-2017)"
  - "Pavel Belobradek (Deputy PM, KDU-CSL)"
doctrine: >
  Sobotka CSSD-led tripartite coalition after the 2013 snap election.
  Economic school: Czech social-democratic redistribution with ANO
  technocratic-revenue-compliance tilt — Babis-era Elektronicka evidence
  trzeb ("EET" electronic revenue registration for cash transactions)
  rolled out Dec 2016-Mar 2017, reclaimed reduced VAT rate (2nd reduced
  10% from Jan 2015 on books, pharmaceuticals, infant food), raised
  minimum wage (CZK 8,000 -> 11,000 across tenure), restored cap-free
  child tax credit stacking, second-pillar pension abolition 2016.
  Super-gross-wage discussion continued. Left-right axis: centre-left
  (CSSD chancellery) with centre/anti-system ANO finance ministry.
  Dated policies: EET Act 112/2016 Sb., 2nd reduced VAT rate 2015,
  second-pillar abolition 2016, Hate-Acts defence, child-allowance
  expansions. Popularity: CSSD collapsed in Oct 2017 election (7.3%);
  ANO won 29.6%. Coherence: moderate — persistent CSSD-ANO tensions,
  Babis briefly dismissed May 2017 over tax-optimisation probe.
policies:
  - cz_eet_electronic_revenue_2016
  - cz_second_reduced_vat_2015
  - cz_second_pillar_abolition_2016
  - cz_minimum_wage_rises_2014_2017
  - cz_child_tax_credit_expansion_2015
axes_summary:

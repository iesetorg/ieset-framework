  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "EET broadened base on cash-economy; second reduced VAT rate on essentials."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "EET mandated POS registration for hospitality, retail, services."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Benefit and wage-floor increases; EU-fund absorption strong."}

movement_id: netherlands_balkenende_cda_2002_2006
status: candidate
name: Balkenende I and II CDA-led centre-right
countries:
- NLD
timeframe:
  start: 2002
  end: 2006
coalition: CDA + LPF + VVD (Balkenende I, July 2002-Oct 2002); CDA + VVD + D66 (Balkenende II,
  2003-2006)
leaders:
- Jan Peter Balkenende (PM, CDA)
- Gerrit Zalm (Finance, VVD)
- Rita Verdonk (Immigration and Integration, VVD)
- Hans Hoogervorst (Health)
doctrine: 'Economic school: post-Purple centre-right normative turn — restored CDA Christian-democratic
  frame with tighter immigration and welfare discipline, VVD-led market reform in healthcare.
  Left-right axis: centre-right. Dated policies: Fortuyn assassinated 6 May 2002 (pre-government);
  stricter migration code — Vreemdelingenwet 2000 enforcement tightening; Wet Werk en Bijstand
  (WWB) 1 January 2004 replacing ABW, devolving welfare to municipalities with stricter work-first
  conditionality; Zorgverzekeringswet (ZVW) health-insurance reform 2 January 2006 — universal-mandate
  private-competition system (first OECD model of its kind); WIA disability reform replacing WAO
  2006; VUT early-retirement phase-out; civic-integration exams for residence permits 2006; referendum
  rejection of EU Constitution Treaty 61.5% No on 1 June 2005; pension cap debate preparation;
  fiscal discipline with Zalm norm restoration. Popularity: Balkenende I collapsed October 2002
  after LPF internal splits; snap election January 2003 CDA 28.6% narrowly; Balkenende II coalition
  stable through 2006 despite strike wave 2004 against WAO/WIA reforms. Coherence: high in reform
  mission (welfare-to-work, private health insurance) but slowed by coalition tensions.

  '
policies:
- nl_wwb_work_and_welfare_2004
- nl_zvw_health_insurance_2006
- nl_wia_disability_reform_2006
- nl_stricter_migration_code_2004_2006
- nl_eu_constitution_referendum_2005
- netherlands_zorgverzekering_2006
axes_summary:
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: moderate
  rationale: WWB work-first activation; WIA tightened disability gate.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  rationale: Vreemdelingenwet tightening; mandatory civic-integration exams abroad.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: ZVW created regulated private-insurer competition in health — major product-market-competition
    increase in healthcare.
- axis: fiscal.transfer_expansion
  direction: '-'
  magnitude: moderate
  rationale: WWB / WIA tightened welfare and disability transfers.
predecessor_movements:
- netherlands_kok_ii_purple_1998_2002
successor_movements: []
position_alignments:
- position_id: ordoliberal
  alignment: aligned
  notes: ZVW is textbook regulated-competition model.
- position_id: classical_liberal
  alignment: partially_aligned
references:

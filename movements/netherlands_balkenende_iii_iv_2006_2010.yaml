status: candidate
name: "Balkenende III-IV CDA-led GFC-era governments 2006-2010"
countries: [NLD]
timeframe: {start: 2006, end: 2010, enacted_date: "2006-07-07"}
coalition: "Balkenende III CDA+VVD minority (Jul 2006-Feb 2007); Balkenende IV CDA+PvdA+CU (Feb 2007-Feb 2010)"
leaders:
  - "Jan Peter Balkenende (PM, CDA)"
  - "Wouter Bos (PvdA, Finance Minister from 2007)"
  - "Gerrit Zalm (VVD, Finance in Balkenende III)"
doctrine: >
  Late-Balkenende period spanning two governments: a short CDA-VVD interim
  (III) and the centre-grand-coalition CDA-PvdA-ChristenUnie (IV). Economic
  school: Dutch-Polder fiscal orthodoxy meeting GFC pragmatism. Signature
  actions: phased abolition of own-risk healthcare cap within 2006 Zvw roll-
  out; mortgage-interest deduction left untouched; ING Group €10bn core-tier
  1 securities (Oct 2008) and additional €22bn Alt-A back-up facility
  (Jan 2009); Fortis/ABN-Amro Benelux carve-out and nationalisation
  (Oct 2008, €16.8bn for Dutch part); €6bn fiscal stimulus (Mar 2009) with
  investment front-loading and labour-saving work-sharing (deeltijd-WW);
  raising state-pension AOW age from 65 to 67 proposed in 2009-10 (legislated
  under Rutte I). Balkenende IV fell Feb 2010 on Uruzgan-Afghanistan
  extension dispute between CDA and PvdA. Left-right: centrist Christian-
  democrat with social-democratic partner. Popularity: CDA 26.5% (2006),
  13.6% (2010 — halved), fatal decline trajectory; PvdA also lost seats.
  Coherence: moderate — solid GFC response, but cultural-immigration-integration
  debate (Wilders PVV rise) and Afghanistan split undermined durability.

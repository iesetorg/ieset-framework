movement_id: germany_merkel_iv_2017_2021
status: candidate
name: "Merkel IV CDU/CSU-SPD Grand Coalition 2018-2021"
countries: [DEU]
timeframe: {start: 2018, end: 2021, enacted_date: "2018-03-14"}
coalition: "CDU/CSU (246) + SPD (153) GroKo III (formed after failed Jamaica talks)"
leaders:
  - "Angela Merkel (Chancellor, final term)"
  - "Olaf Scholz (SPD, Finance Minister and Vice-Chancellor)"
  - "Peter Altmaier (Economy Minister)"
doctrine: >
  Transitional final Merkel term — delayed 171 days by failed CDU/CSU-FDP-Greens
  'Jamaica' talks — defined by COVID-19 response and Next Generation EU
  negotiation. Economic school: ordoliberal fiscal orthodoxy suspended under
  emergency clause (Notlage, Art. 115 GG) allowing debt-brake derogation for
  2020-21. Signature measures: Corona-Sondervermögen / KfW credit lines
  (Mar 2020 €1.2tn envelope), Kurzarbeit re-expansion, VAT cut (Jul-Dec 2020
  19%→16%), €130bn stimulus package (Jun 2020), and decisive role in NGEU
  agreement (Jul 2020 €750bn) with Macron — the first joint EU debt issuance.
  Domestically: CO2-Bepreisung launched Jan 2021 (€25/t), coal-exit law (2020,
  Kohleausstieg by 2038), and Nord Stream 2 completion (pipeline finished
  Sep 2021, never certified). Left-right: centrist, visibly shifted toward
  state activism under COVID. Popularity: CDU/CSU 32.9% (2017 election that
  produced this government), collapsed to 24.1% in 2021 post-Merkel. Coherence:
  moderate — energy strategy (Russia-gas + coal-exit + nuclear-exit) increasingly
  visibly contradictory in the run-up to Feb 2022.
policies:
  - de_corona_sondervermoegen_2020
  - de_ngeu_agreement_2020
  - de_vat_cut_covid_2020
  - de_kohleausstieg_2020
  - de_co2_bepreisung_2021
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID emergency debt brake suspension; deficit 4.3% (2020), 3.6% (2021)."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "National ETS launch, Kohleausstieg schedule, Klimaschutzgesetz revisions."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: moderate, rationale: "Nord Stream 2 completion despite US-Ukraine opposition; coal-exit without nuclear-exit reversal."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "KfW SME liquidity, Lufthansa €9bn bailout, Konjunkturprogramm 2020."}

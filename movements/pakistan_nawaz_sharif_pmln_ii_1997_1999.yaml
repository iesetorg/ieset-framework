# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_nawaz_sharif_pmln_ii_1997_1999
status: candidate
name: "Nawaz Sharif PML-N II — heavy-mandate premiership, nuclear tests and Kargil (1997-1999)"
countries: [PAK]
timeframe:
  start: 1997
  end: 1999
  enacted_date: "1997-02-17"
coalition: "Pakistan Muslim League (Nawaz) — 2/3 majority 137/207 in February 1997 election"
leaders:
  - "Nawaz Sharif (PM 17 Feb 1997 - 12 Oct 1999 coup)"
  - "Sartaj Aziz (Finance, then Foreign Affairs)"
  - "Muhammad Ishaq Dar (Finance from August 1998)"
  - "Muhammad Yaqub → Muhammad Ishrat Hussain (SBP Governor, December 1999)"
doctrine: >
  PML-N industrial-bourgeois centre-right conservative — Nawaz's
  two-thirds majority in February 1997 enabled unprecedented
  concentration of premier's powers via constitutional amendments.
  Economic school: Punjabi industrialist-bourgeois pro-business
  conservatism with import-substitution residuals plus privatisation
  continuation; centre-right socially conservative Islamist-leaning.
  Key policy content: (i) 13th Amendment April 1997 — removing
  presidential 58(2)(b) dismissal power restored premier's
  dominance; (ii) 14th Amendment July 1997 — anti-defection clause
  binding MPs to party whip; (iii) Supreme Court-premier clash
  November 1997 — PML workers stormed Supreme Court; Chief Justice
  Sajjad Ali Shah removed December 1997; (iv) Motorway M-2 Lahore-
  Islamabad opening November 1997 — 367 km mega-project; (v)
  Pokhran-II Indian nuclear tests 11-13 May 1998 triggered Pakistan's
  Chagai-I and Chagai-II nuclear tests 28 and 30 May 1998 — US and
  multilateral sanctions; foreign-currency accounts frozen (~$11bn);
  (vi) Economic Reform Order 1998 and balance-of-payments crisis
  August 1998; (vii) Kargil War May-July 1999 — Pakistan Army
  incursions at Line of Control without civilian-government
  clearance; Nawaz-Musharraf rift; (viii) military coup 12 October
  1999 — General Pervez Musharraf overthrew Nawaz after cabinet
  attempted to dismiss him; Nawaz jailed, exiled to Saudi Arabia
  December 2000. Popularity: February 1997 election PML-N 137/207
  seats (heavy mandate); approval eroded on nuclear-sanctions
  economic crisis and post-Kargil debacle; coup widely accepted
  domestically. Coherence line: constitutional-amendment premiership-
  strengthening plus nuclear-weapon state declaration plus Kargil
  adventurism under weak civil-military coordination — the template
  of civilian-elite concentration that provoked military counter-
  balance.
policies:
  - pk_13th_14th_amendments_1997
  - pk_chagai_nuclear_tests_1998
  - pk_kargil_war_1999
  - pk_foreign_currency_account_freeze_1998
  - pk_motorway_m2_lahore_islamabad_1997
  - pk_1999_military_coup
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "November 1997 Supreme Court attack by PML workers and Chief Justice removal established premier-over-judiciary precedent; 1999 coup broke constitutional chain."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Direct PML-worker storming of Supreme Court in contempt case; Chief Justice removed via internal reference manipulation."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "May 1998 foreign-currency-account freeze expropriated ~$11bn depositor holdings; later partially restored in rupee terms at adverse rate."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Motorway M-2 and public-works push raised capital budget; nuclear-sanctions fiscal crisis forced adjustments late term."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Post-nuclear-tests international isolation; sanctions regime constricted market access."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: weak, rationale: "Forex account freeze broke SBP policy credibility; reserve depletion forced discretionary restrictions."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Privatisation agenda formally preserved; forex-account freeze and Supreme Court attack squarely opposed."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Motorway and cement-industry support are developmental-state content."}
  - {position_id: austrian, alignment: opposed, notes: "Forex expropriation is canonical Austrian counterexample to sound-money property rights."}
references:
  - "13th Amendment Act 1997 (Pakistan Constitution)"
  - "Chagai-I test records 28 May 1998; SBP Annual Report 1998-99"
  - "Nawaz Sharif Pre-Coup Televised Address, 12 October 1999"
  - "Rizvi (2000), 'Military, State and Society in Pakistan'"
notes: >
  Nawaz Sharif's three non-consecutive terms separately code-able;
  this movement covers his second. 1999 coup transitions to
  Musharraf movement.

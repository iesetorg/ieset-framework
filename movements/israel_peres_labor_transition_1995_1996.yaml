movement_id: israel_peres_labor_transition_1995_1996
status: candidate
name: "Peres Labor transition — post-assassination continuation, 1996 election loss"
countries: [ISR]
timeframe: {start: 1995, end: 1996}
coalition: "Labour-Meretz coalition continued from Rabin government"
leaders:
  - "Shimon Peres (Prime Minister November 1995 - June 1996)"
  - "Avraham Shochat (Finance Minister)"
  - "Jacob Frenkel (Bank of Israel Governor)"
doctrine: >
  Economic school: continuation of Rabin's economic-peace framework under
  Peres's more technocratic-Europeanist variant ("New Middle East" thesis —
  regional economic integration, Mediterranean corridors, high-tech
  clusters). Left-right axis: centre-left — maintained Oslo trajectory,
  advanced the 1995 Cairo Economic Conference follow-ups, and continued
  macro-discipline under the 1992 Deficit Reduction Law. Dated policies:
  Operation Grapes of Wrath (South Lebanon, April 1996) fiscal cost;
  February-March 1996 Hamas bus-bombing wave shifting public opinion right;
  partial privatisation of Bezeq, banks continued; sustained inflation-
  target anchor under Frenkel. Popularity: 29 May 1996 first direct PM
  election — Netanyahu 50.5%, Peres 49.5% — narrow Likud-right victory
  largely attributed to the February-March 1996 bombings and the Grapes of
  Wrath Qana incident; Labour still won the concurrent Knesset list vote.
  Coherence: moderate — the economic-peace thesis did not survive the
  bombing wave's effect on median-voter security preferences; the transition
  movement is scored for completeness of the 1988-96 sequence.
policies:
  - il_grapes_of_wrath_south_lebanon_1996
  - il_privatisation_continuation_1995_1996
  - il_oslo_ii_implementation_1995_1996

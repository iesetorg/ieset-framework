movement_id: brazil_itamar_pmdb_1992_1995
status: candidate
name: "Itamar PMDB — Plano Real birth under FHC Finance"
countries: [BRA]
timeframe: {start: 1992, end: 1995, enacted_date: "1992-12-29"}
coalition: "PMDB-led broad coalition (post-impeachment)"
leaders:
  - "Itamar Franco (President 1992-1995)"
  - "Fernando Henrique Cardoso (Exterior then Fazenda 1993-1994)"
  - "Edmar Bacha, Pérsio Arida, André Lara Resende, Gustavo Franco, Winston Fritsch, Pedro Malan (FHC economic team)"
  - "Rubens Ricupero (Fazenda briefly 1994)"
doctrine: >
  Transitional PMDB government whose defining act was handing
  the Finance Ministry to FHC, whose team designed and launched
  the Plano Real — ending Brazil's 30-year high-inflation era.
  Four doctrinal pillars: (a) Plano Real design — Unidade Real
  de Valor (URV) introduced March 1994 as a parallel unit of
  account indexed to the dollar; prices progressively
  re-denominated in URV; on 1 July 1994 URV converted to the
  new real at 1 URV = 1 real = $1, with cruzeiro real retired
  at 2,750:1. Monthly inflation fell from 50% (June 1994) to
  ~2% (December 1994). (b) Programa de Ação Imediata (PAI, May
  1993) — fiscal prerequisites: Fundo Social de Emergência
  (FSE) de-earmarked 20% of federal revenue from the 1988
  Constitution's rigidities (1994). (c) Privatisation deepening
  — CSN (steel, April 1993), Embraer (December 1994),
  petrochemicals continuation under the PND inherited from
  Collor. (d) Constitutional renegotiation groundwork — the
  revision window under the 1988 Constitution Article 3 of the
  ADCT opened October 1993 but produced few amendments beyond
  the FSE. Stated school: Washington-Consensus-compatible
  stabilisation via novel de-indexation mechanism; PUC-Rio
  monetarist-structuralist synthesis. Left-right: centre to
  centre-right economic; Itamar himself populist-nationalist
  but deferred to FHC team. Popularity: Itamar inherited
  ~30% approval at the Collor transition; rose to ~45-50%
  post-Plano Real; Plano Real success catapulted FHC to win
  October 1994 presidential election first-round 54.3% vs
  Lula 27%, and gave FHC a governing mandate that Itamar
  himself could not convert. Coherence: trade PMDB patronage
  politics and Itamar's populist instincts for a technocratic
  stabilisation team that delivered the decade's single most
  consequential Brazilian policy — ending hyperinflation.
policies:
  - brazil_plano_real_1994
  - br_urv_parallel_indexation_1994
  - br_fundo_social_emergencia_1994
  - br_pnd_deepening_1993_1994
  - br_csn_embraer_privatisation_1993_1994
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "Plano Real ended 30 years of inflation above 20%/year; 1994 CPI 2,075% → 1995 66% → 1996 16%."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "De-facto autonomy and URV-based nominal anchor; formal autonomy deferred to 2021."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "PND deepening — CSN, Embraer, petrochemicals."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "FSE de-earmarked 20% federal revenue; structural rigidities persisted."}
outcome_hypotheses: [plano_real_de_indexation_mechanism, end_of_high_inflation_growth_effect]
predecessor_movements: [brazil_collor_prn_1990_1992]
successor_movements: [brazil_real_plan_cardoso_1994_2002]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "PUC-Rio team drew on both structuralist and monetarist elements."}
references:
  - "Medida Provisória 434/1994 (URV)"
  - "Lei 9.069/1995 (Plano Real)"
  - "Bacha (1997), Plano Real: Uma Segunda Avaliação"
notes: "Plano Real birthed under Itamar but largely credited to FHC; paired with existing brazil_real_plan_1994 policy and brazil_real_plan_cardoso_1994_2002 successor movement."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: eritrea_pfdj_national_service_state_1994_present
status: candidate
name: Eritrea PFDJ national-service state 1994-present
countries: [ERI]
timeframe:
  start: 1994
  end: ongoing
coalition: People's Front for Democracy and Justice government
leaders:
- "Isaias Afwerki (President, 1993-present)"
doctrine: >
  Eritrea's PFDJ governing model presents national service, disciplined
  self-reliance, and security mobilisation as the basis for sovereignty after
  the independence war and the Ethiopia border conflict. In policy terms the
  movement is defined by compulsory national service, a command-style labour
  allocation system, episodic opening through the 2018 Ethiopia peace process,
  and renewed military mobilisation around the Tigray war.
policies:
- eri_national_service_proclamation_1995
- et_eritrea_peace_2018
- et_tigray_war_2020
axes_summary:
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  rationale: Indefinite conscription and wartime mobilisation weakened predictable limits on state coercion.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: strong
  rationale: National service constrained occupational choice and assigned labour into military, public, and development work.
- axis: regulatory.trade_openness
  direction: +
  magnitude: weak
  rationale: The 2018 Ethiopia peace agreement briefly reopened diplomatic, transport, and border channels.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Security mobilisation and the Tigray war raised military resource demands relative to normal peacetime administration.
references:
- "Eritrea National Service Proclamation No. 82/1995."
- "Human Rights Watch, They Are Making Us into Slaves, Not Educating Us, 2019: https://www.hrw.org/report/2019/08/09/they-are-making-us-slaves-not-educating-us/how-indefinite-conscription-restricts"
- "Joint Declaration of Peace and Friendship between Eritrea and Ethiopia, Asmara, 9 July 2018."
- "UN OHCHR/Ethiopian Human Rights Commission Joint Investigation Team report on Tigray, 2021."
notes: >
  This movement is coded as a governing policy regime rather than as a broad
  endorsement of the PFDJ label. The policy set is intentionally narrow because
  Eritrean official publication and implementation data are limited.

movement_id: russia_yeltsin_second_term_1996_1999
status: candidate
name: "Yeltsin second term GKO default and oligarch era 1996-1999"
countries: [RUS]
timeframe: {start: 1996, end: 1999, enacted_date: "1996-07-03"}
coalition: "Yeltsin presidential administration; rotating PMs (Chernomyrdin, Kiriyenko, Primakov, Stepashin, Putin)"
leaders:
  - "Boris Yeltsin (President, 1996-1999)"
  - "Viktor Chernomyrdin (Prime Minister to Mar 1998)"
  - "Sergei Kiriyenko (Prime Minister Mar-Aug 1998)"
  - "Yevgeny Primakov (Prime Minister Sep 1998-May 1999)"
  - "Sergei Stepashin (Prime Minister May-Aug 1999)"
  - "Vladimir Putin (Prime Minister from Aug 1999)"
  - "Anatoly Chubais (First Deputy PM / Presidential CoS, privatisation architect)"
doctrine: >
  Yeltsin late-term economic school: distressed transition-economy
  market-liberalism with oligarch-clientelism — loans-for-shares
  privatisation consequences, IMF programmes, Asian-crisis contagion,
  GKO pyramid, culminating in the 17 August 1998 GKO default, rouble
  devaluation, and debt moratorium. Left-right axis: formally centre-
  right market-reform, actually factional. Dated policies: post-election
  IMF Extended Fund Facility (March 1996 onwards), 1997 'seven bankers'
  (semibankirshchina) public declaration, Asian-contagion pressure on
  rouble peg (corridor) late 1997, 17 Aug 1998 triple default and
  devaluation, Primakov stabilisation Sep 1998-May 1999, NATO bombing
  of Yugoslavia crisis (Mar-Jun 1999), Yeltsin 31 Dec 1999 resignation
  handing Putin the presidency. Popularity: Yeltsin's approval
  collapsed into single digits by 1998-99. Coherence: low — serial PM
  replacements, oligarch infighting, constitutional crisis risk averted.
policies:
  - ru_gko_default_1998
  - ru_loans_for_shares_aftermath_1996
  - ru_primakov_stabilisation_1998_1999
  - ru_yeltsin_resignation_1999

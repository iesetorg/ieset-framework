- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
  rationale: Subsidy elimination cut ~15% of GDP of SOE transfers.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: strong
  rationale: Categorical elimination of SOE subsidy régime.
- axis: institutional.property_rights
  direction: +
  magnitude: strong
  rationale: 1990 privatisation law + Ministry of Ownership Transformations institutionalised
    private-property regime.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  rationale: NBP moved toward rules-based zloty anchor and hard-money regime.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_noda_dpj_2011_2012
status: candidate
name: "Noda DPJ — consumption-tax hike framework and DPJ collapse"
countries: [JPN]
timeframe: {start: 2011, end: 2012, enacted_date: "2011-09-02"}
coalition: "DPJ-PNP coalition (Noda Yoshihiko cabinet)"
leaders:
  - "Yoshihiko Noda (PM, 2 Sep 2011 - 26 Dec 2012)"
  - "Jun Azumi / Kōriki Jōjima (Finance)"
  - "Masaaki Shirakawa (BoJ Governor)"
doctrine: >
  DPJ Noda consumption-tax-orthodoxy doctrine — Noda, a Finance-ministry-aligned
  fiscal conservative, staked the DPJ on the "Social Security and Tax Integrated
  Reform" (shakai-hoshō zei ittai kaikaku) passed August 2012 with LDP and
  Komeito support: consumption tax to rise from 5% to 8% (April 2014) and
  then 10% (October 2015), earmarked for social-security financing. The
  three-party agreement came with a commitment to call a snap election "in
  the near future." Other vectors: TPP negotiation-entry declaration
  (November 2011), Senkaku islands nationalisation (September 2012) which
  triggered the Chinese anti-Japanese protests and effective boycott of
  Japanese goods, reactor restart approval for Ōi units 3 and 4 (July 2012,
  first restarts post-Fukushima amid mass protest). Noda dissolved the
  Shūgiin 16 November 2012; the 16 December 2012 election was a landslide
  for Abe-led LDP (294 seats + Komeito 31) vs DPJ collapsing to 57. DPJ
  effectively never recovered as a governing party. Coherence line: DPJ
  Noda fiscal-orthodoxy consumption-tax-plus-social-security bargain, TPP
  pivot, nuclear restart — all institutionalised before electoral wipeout.
policies:
  - jp_noda_consumption_tax_8_10_law_2012
  - jp_noda_tpp_negotiation_entry_2011
  - jp_noda_senkaku_nationalisation_2012
  - jp_noda_oi_reactor_restart_2012
  - jp_social_security_tax_integrated_reform_2012
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Integrated reform earmarks new revenue to expand social-security spending; not a spending cut."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Consumption-tax hike shifts burden toward regressive base broadening."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Corporate-tax rate cut from 30% to 25.5% (effective 2012) in parallel package."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Formal TPP negotiation-entry declaration November 2011 committed Japan to subsequent entry."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: weak, rationale: "Ōi reactor restarts partially reversed post-Fukushima shutdown posture."}
predecessor_movements:
  - japan_kan_dpj_2010_2011
successor_movements:
  - abenomics_2012_2020
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Consumption-tax orthodoxy + corporate-tax cut + TPP commitment."}
  - {position_id: new_keynesian, alignment: opposed, notes: "Consumption-tax hike criticised for dampening demand; 2014 recession confirmed fear."}
references:
  - "Act on Partial Revision of Consumption Tax Law etc., Law No. 68 of 2012 (10 August 2012)"
  - "Three-party agreement DPJ-LDP-Komeito, 15 June 2012"
  - "2012 Shūgiin general election results (16 December 2012)"
notes: >
  The Noda consumption-tax framework is the institutional inheritance Abe
  then executed in 2014 (5→8%) and 2019 (8→10%), making this the
  doctrinally-central DPJ movement despite the political collapse.

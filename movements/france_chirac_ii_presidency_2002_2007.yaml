# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: france_chirac_ii_presidency_2002_2007
status: candidate
name: "Chirac second presidency: Raffarin-Villepin"
countries: [FRA]
timeframe: {start: 2002, end: 2007}
coalition: "UMP (RPR successor) — Chirac presidency with Raffarin then Villepin PMs"
leaders:
  - "Jacques Chirac (President)"
  - "Jean-Pierre Raffarin (PM 2002-2005)"
  - "Dominique de Villepin (PM 2005-2007)"
  - "Nicolas Sarkozy (Interior; later Finance)"
doctrine: >
  Economic school: Gaullist centre-right étatiste liberalism — cautious
  liberalisation under a Gaullist protective umbrella with no fundamental
  break from the French social model. Left-right axis: centre-right
  politically, mixed economically. Dated policies: Fillon pension reform
  August 2003 (raising required contribution years in public sector toward
  private parity); 35-hour-week partial rollback via 2003 Loi Fillon on
  working time authorising overtime relaxations; CPE "Contrat première
  embauche" March 2006 proposal (withdrawn April 2006 after protests);
  constitutional referendum May 2005 on EU Constitutional Treaty (rejected
  54.7% No); banlieue riots October-November 2005 → état d'urgence;
  CNE "Contrat nouvelles embauches" 2005 for small firms. Popularity:
  2002 Chirac re-elected 82% vs Le Pen in second round (anti-Le Pen
  vote); UMP legislatives 2002 strong; Raffarin approval collapsed
  after 2003 pension reform strikes; Villepin approval collapsed
  after CPE withdrawal. Coherence: low — reform attempts repeatedly
  withdrawn or diluted under street pressure; 2005 riots and EU-
  referendum No vote punctured mandate.
policies:
  - fr_fillon_pension_reform_2003
  - fr_35h_rollback_fillon_law_2003
  - fr_cpe_withdrawn_2006
  - fr_cne_small_firm_contract_2005
  - fr_eu_constitution_referendum_2005
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "35-hour overtime relaxation and CNE partial liberalisation; CPE withdrawn."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Fillon pension reform raised contribution years — mild transfer compression."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: weak, rationale: "Sarkozy interior-ministry policing tightening; post-riot posture."}
predecessor_movements: [france_chirac_presidency_first_1995_2002]
successor_movements: [france_sarkozy_ump_2007_2012]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "Loi n° 2003-775 du 21 août 2003 portant réforme des retraites"
  - "Loi n° 2003-47 du 17 janvier 2003 relative aux salaires, au temps de travail et au développement de l'emploi"
notes: "Chirac II distinguished from Chirac I by Raffarin/Villepin reform-and-retreat cycle and 2005 No vote."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: germany_schmidt_spd_fdp_1974_1982
status: candidate
name: "Schmidt SPD-FDP coalition (FRG): Modell Deutschland and oil-shock pragmatism"
countries: [DEU]
timeframe: {start: 1974, end: 1982}
coalition: "SPD-FDP social-liberal coalition"
leaders:
  - "Helmut Schmidt (Chancellor, 16 May 1974 - 1 October 1982)"
  - "Hans-Dietrich Genscher (FDP, Foreign Minister + Vice-Chancellor)"
  - "Hans Matthöfer (Finance Minister 1978-1982)"
  - "Hans Apel (Finance Minister 1974-1978)"
  - "Karl Otto Pöhl (Bundesbank President from 1980)"
  - "Otmar Emminger (Bundesbank President 1977-1979)"
doctrine: >
  Pragmatic Social-Democratic-ordoliberal Keynesianism — "Modell Deutschland"
  as Schmidt's 1976 electoral slogan. Economic school: social-market
  economy (soziale Marktwirtschaft) with Keynesian demand-management
  overlays and strict monetary conservatism delegated to an operationally-
  independent Bundesbank. Left-right axis: centre-left relative to Kohl's
  successor coalition but well to the right of Mitterrand 1981 —
  Schmidt-Apel-Matthöfer team prioritised price stability, external
  balance, and sectoral Mitbestimmung over expansionary redistribution.
  Key content: (i) 1975 counter-cyclical investment programme in
  response to oil shock (Zukunftsinvestitionsprogramm); (ii)
  Mitbestimmungsgesetz 1976 — parity co-determination on supervisory
  boards of firms >2000 employees; (iii) Betriebsrentengesetz 1974 on
  occupational pensions; (iv) locomotive strategy 1978 Bonn G7 Summit —
  Schmidt committed to fiscal stimulus as part of coordinated reflation;
  (v) EMS founding 13 March 1979 jointly with Giscard — Germany as
  monetary anchor; (vi) second oil-shock response 1979-1981 — tax
  increases rather than expansion; (vii) NATO double-track decision
  December 1979 and Pershing II/cruise missile stationing divided SPD
  internally 1980-1982; (viii) Operation Wende — FDP under Genscher/
  Lambsdorff published the Lambsdorff-Papier (9 September 1982) calling
  for supply-side turn, breaking with SPD; (ix) constructive vote of
  no-confidence 1 October 1982 replaced Schmidt with Kohl. Popularity:
  1976 Bundestag election: SPD 42.6%, CDU/CSU 48.6%, FDP 7.9% —
  SPD-FDP retained majority; 1980 election SPD 42.9% (highest ever),
  CDU/CSU 44.5%, FDP 10.6%; personal Schmidt ratings consistently
  highest of any Chancellor in the period; internal SPD split on
  missile deployment + public-debt concerns eroded coalition. Coherence:
  the movement's strength was Schmidt's willingness to run Bundesbank-
  aligned monetary policy despite SPD base pressures, combined with
  retention of social-market institutions; it fractured on NATO
  deployment and FDP realignment, not on economic performance.
policies:
  - de_zukunftsinvestitionsprogramm_1975
  - de_mitbestimmungsgesetz_1976
  - de_ems_founding_1979
  - de_bonn_g7_locomotive_1978
  - de_betriebsrentengesetz_1974
  - de_lambsdorff_papier_1982
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Mitbestimmungsgesetz 1976 parity co-determination; occupational-pension protection strengthened."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Bundesbank asserted monetary targeting from 1974 over Treasury preferences; EMS anchored."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "1975 Zukunftsinvestitionsprogramm + Bonn G7 locomotive fiscal stimulus 1978."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pension reform 1974, housing allowance indexation; Kindergeld increases."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "EMS + continued GATT commitment + European-level trade opening."}
successor_movements: [germany_kohl_early_cdu_1982_1987]
position_alignments:
  - {position_id: social_democratic, alignment: aligned, notes: "Canonical West European social-democratic governance of the period."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Bundesbank monetary order + sectoral competition policy consistent with ordoliberal priors."}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "1975 and 1978 stimulus; not 1979-82 tightening phase."}
references:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_planning_restriction_regime
status: candidate
name: "UK planning-restriction regime persistence"

countries: [GBR]

timeframe:
  start: 1990
  end: ongoing

coalition: "Cross-party consensus (Conservative, Labour, LibDem) across successive governments"

doctrine: >
  Town and Country Planning Act 1947 established local-authority discretion
  over development and set the foundation for greenbelt protection. Every
  subsequent government has retained the framework and added to it.
  Cumulative effect: sustained supply restriction in high-productivity
  southeast housing markets, producing the most severe housing-affordability
  gap among OECD advanced economies and — by extension — suppressed labour
  mobility, household savings going to housing rather than productive
  capital, and a regressive wealth-transfer from young renters to older
  homeowners. The framework codes this as a movement because the policy-
  content (restrictive land use) is continuous across political coalitions.

policies:
  - uk_greenbelt_protection_sustained
  - uk_local_authority_planning_discretion
  - uk_nimby_public_inquiry_regime

axes_summary:
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: strong
    rationale: "Extreme regulatory friction on residential and commercial development, compounding over decades."
  - axis: regulatory.product_market_competition
    direction: "-"
    magnitude: strong
    rationale: "Housing supply restriction weakens labour-market mobility and distorts capital allocation toward land rents."


movement_id: poland_tusk_po_first_2007_2014
status: candidate
name: "Tusk PO-PSL coalition 2007-2014"
countries: [POL]
timeframe: {start: 2007, end: 2014, enacted_date: "2007-11-16"}
coalition: "Platforma Obywatelska (PO) with Polskie Stronnictwo Ludowe (PSL)"
leaders:
  - "Donald Tusk (Prime Minister, PO, 2007-2014)"
  - "Jacek Rostowski (Finance Minister, 2007-2013)"
  - "Waldemar Pawlak (Deputy PM and Economy Minister, PSL)"
  - "Radoslaw Sikorski (Foreign Minister)"
doctrine: >
  The "green-island" PO-PSL government — Poland uniquely avoided GDP
  contraction through the 2009 Great Recession. Economic school:
  Polish pragmatic centre-right (Christian-democratic liberal), GFC-
  resilient macro-management (prudential FX-mortgage supervision 2006-8,
  floating zloty buffer, IMF Flexible Credit Line May 2009), Euro-
  convergence rhetoric dialled back after 2012, pragmatic EU-fund
  absorption (largest net recipient in the period). Controversial pension
  reform: OFE private-pillar assets transferred to ZUS state pillar (Feb
  2014, ~PLN 153bn) reducing reported public debt. Retirement-age
  increase to 67 legislated 2012 (both sexes, phased). Left-right axis:
  centre-right/centrist-liberal. Dated policies: Euro 2012 infrastructure
  build, retirement-age rise law May 2012, OFE overhaul Dec 2013-Feb
  2014, shale-gas concessions boom then bust. Popularity: two-term
  re-elected (2011), declining thereafter; Tusk left Sep 2014 for
  European Council Presidency. Coherence: high within PO-PSL bloc.
policies:
  - pl_retirement_age_67_2012
  - pl_ofe_transfer_2014
  - pl_imf_flexible_credit_line_2009
  - pl_euro_2012_infrastructure
  - pl_pit_bracket_reduction_2009
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Retirement-age rise to 67 reduces long-run pension liability; OFE transfer is fiscal book reclassification."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "PIT brackets reduced from three (19/30/40) to two (18/32) effective 2009."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Euro 2012 infrastructure spending and EU-fund absorption lifted public-investment share."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Deepened EU single-market integration; resisted Eurozone accession but pro-trade posture."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "OFE pillar-shift raised questions about savers' property rights over mandated contributions."}

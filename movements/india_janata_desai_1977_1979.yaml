movement_id: india_janata_desai_1977_1979
status: candidate
name: "Janata Party Desai government post-Emergency (India)"
countries: [IND]
timeframe: {start: 1977, end: 1979}
coalition: "Janata Party (merger of Congress(O), Jana Sangh, BLD, SP, CFD)"
leaders:
  - "Morarji Desai (PM, 1977-1979)"
  - "Charan Singh (Deputy PM, Home/Finance; PM Jul 1979-Jan 1980 caretaker)"
  - "H.M. Patel (Finance Minister 1977-1979)"
  - "Jayaprakash Narayan (movement figurehead, outside government)"
doctrine: >
  Post-Emergency Janata Party 'total revolution' broad coalition
  blending Gandhian-swadeshi rural-primacy with centre-right liberal
  constitutionalism. Economic school: Gandhian agrarianism (Charan
  Singh khadi/village-industries strand) + mildly liberal
  anti-monopoly policy; 44th Constitutional Amendment Dec 1978
  repealed the Emergency's authoritarian powers, restoring fundamental
  rights protections and shortening detention; IBM and Coca-Cola expelled
  1977 under FERA 1973 (40% foreign equity ceiling enforcement);
  Janata restored press freedom and disbanded MISA preventive detention.
  Fiscal 1977-78 budget cut excise on essentials, raised rural
  credit allocation, and launched rural antyodaya programmes. Left-right:
  ideologically incoherent catch-all — Gandhian socialists + Hindu
  nationalists + Congress(O) liberals — united by anti-Indira purpose.
  Popularity: March 1977 general election Janata 41.3% / 295 seats (first
  non-Congress majority at Union level), INC 34.5% / 154 seats (Indira
  defeated in Rae Bareli). Government fell Jul 1979 over RSS-membership
  dispute (Jana Sangh members' dual-loyalty), Charan Singh broke away.
  Coherence: very low — collapsed in 27 months over faction and
  ideology; consolidated constitutional restoration but little durable
  economic content.
policies:
  - india_44th_constitutional_amendment_1978
  - india_ibm_cocacola_expulsion_1977
  - india_antyodaya_rural_programme_1977

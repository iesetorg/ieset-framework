# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: senegal_senghor_socialist_democracy_1960_1980
status: candidate
name: "Senghor socialist-democratic developmental state"
countries: [SEN]
timeframe: {start: 1960, end: 1980}
coalition: "Union Progressiste Senegalaise / Parti Socialiste"
leaders:
  - "Leopold Sedar Senghor"
  - "Mamadou Dia"
  - "Abdou Diouf"
doctrine: >
  Senghor's post-independence state advanced a moderate African socialism that
  paired electoral and administrative continuity with planning, cooperative
  rural institutions, and close monetary and aid ties to France. The project
  sought developmental transformation without revolutionary rupture, using the
  peanut economy, public investment plans, and CFA-franc stability as its core
  governing instruments.
policies:
  - sn_groundnut_marketing_board_1960s
  - sn_four_year_development_plans_1961
  - sn_franc_zone_stability_senghor_1960
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Groundnut marketing and producer-price systems channelled support and extraction through a state-managed crop economy."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Development planning and state agencies expanded public investment and administrative reach."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Marketing boards and cooperatives gated agricultural commercialization."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "CFA-franc arrangements imported a rules-bound monetary anchor relative to discretionary national monetary finance."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Franc-zone and French commercial links preserved external openness for a small export economy."}
references:
  - "Sheldon Gellar, Senegal: An African Nation Between Islam and the West"
  - "Catherine Boone, Merchant Capital and the Roots of State Power in Senegal"
  - "World Bank, Senegal economic memoranda, historical sections"
notes: "The movement treats Senghorism as a broad governing settlement; Mamadou Dia's 1962 removal narrowed but did not end the planning-oriented project."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: slovakia_fico_fourth_2023_present
status: candidate
name: "Fico fourth government Smer-SD + Hlas + SNS 2023-present"
countries: [SVK]
timeframe: {start: 2023, end: ongoing, enacted_date: "2023-10-25"}
coalition: "Smer-SD (social-conservative left-populist) + Hlas (Smer splinter) + SNS (national)"
leaders:
  - "Robert Fico (Prime Minister, Smer-SD, Oct 2023-present)"
  - "Peter Pellegrini (President, June 2024-, formerly Hlas leader)"
  - "Ladislav Kamenický (Finance Minister)"
doctrine: >
  Fico's fourth premiership — populist-left on economic policy,
  socially conservative, EU-sceptic on Ukraine military aid.
  Major files: stopping Slovak weapons donations to Ukraine
  (continuing commercial sales privately routed); excess-profits
  taxes on banks and energy retained and expanded; criminal-code
  reforms reducing penalties for white-collar crime (partly
  reversed under EU and constitutional-court pressure);
  abolition of Special Prosecutor's Office (April 2024);
  consolidation package 2024-2025 raising VAT and corporate
  tax to fund higher pension and family transfers. Survived
  May 2024 assassination attempt; institutional confrontation
  with President Pellegrini's predecessor Čaputová ended on her
  exit. EU disciplinary procedures over rule-of-law backsliding.
policies:
  - sk_special_prosecutor_abolition_2024
  - sk_bank_excess_profit_tax_2024
  - sk_corporate_tax_increase_2025
  - sk_ukraine_aid_suspension_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Special Prosecutor abolished; criminal-code reform softened white-collar penalties; EU Article 7 concerns."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Pension and family-transfer expansion; deficit ~5-6% of GDP."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "Corporate-tax rise 2025 and bank-windfall tax both raise effective corporate rate."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "EU and eurozone membership unchanged; rhetoric more reserved on Ukraine support."}
predecessor_movements: [slovakia_pellegrini_smer_2018_2020]
position_alignments:
  - {position_id: national_conservative, alignment: aligned, notes: "Populist-left-on-economics, socially-conservative, EU-sceptic on Ukraine military aid; Smer-SD + Hlas + SNS coalition."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Pension and family-transfer expansion; bank and energy windfall taxes funding redistribution."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Special Prosecutor abolition; criminal-code reforms softening white-collar penalties; rule-of-law backsliding."}
references:
  - "Slovak parliamentary election Sept 2023 results"
  - "Special Prosecutor's Office abolition law April 2024"
notes: "Stub authored to close 2026 atlas-coverage gap for SVK."

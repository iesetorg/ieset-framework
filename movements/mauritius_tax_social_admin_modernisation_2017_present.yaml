# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mauritius_tax_social_admin_modernisation_2017_present
status: candidate
name: Mauritius tax and social-administration modernisation 2017-present
countries: [MUS]
timeframe:
  start: 2017
  end: ongoing
coalition: MSM-led governments
leaders:
  - "Pravind Jugnauth (Prime Minister, 2017-2024)"
  - "Navin Ramgoolam (Prime Minister, 2024-)"
doctrine: >
  Mauritius' late-2010s and early-2020s administrative reform sequence combined
  targeted in-work transfers for low-paid employees, tighter international tax
  rules for the global-business sector, and digital VAT compliance. The common
  policy thread is a small-island financial centre using the revenue authority
  to broaden social support, defend tax-base credibility, and modernise
  compliance systems.
policies:
  - mus_negative_income_tax_2017
  - mus_global_business_tax_reform_2018
  - mus_vat_e_invoicing_regulations_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Negative income tax expanded in-work cash support through the tax system."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "Global-business reform raised effective taxation and substance requirements for some offshore income."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Cross-border business rules became more compliance-heavy and substance-based."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Tax administration, eligibility records, and e-invoicing improve rule-bound collection and benefit delivery."}
references:
  - "Mauritius Revenue Authority, Negative Income Tax, global-business tax, and VAT e-invoicing materials."
  - "Mauritius Finance Act 2018 and VAT e-Invoicing Regulations 2023."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ukraine_independence_transition_1991_1999
status: candidate
name: "Ukraine independence and early market transition (1991-1999)"
countries: [UKR]
timeframe: {start: 1991, end: 1999}
coalition: "Kravchuk and early Kuchma administrations"
leaders:
  - "Leonid Kravchuk"
  - "Leonid Kuchma"
doctrine: >
  Post-Soviet state-building movement that converted the Ukrainian SSR into an
  independent republic, attempted price and ownership liberalisation under
  severe output collapse, and then moved toward monetary stabilisation after
  hyperinflation. The programme combined sovereignty-building, voucher and
  insider privatisation, partial trade reorientation, constitutional settlement,
  and introduction of the hryvnia under IMF-supported stabilisation.
policies:
  - ua_independence_property_transition_1991
  - ua_mass_privatization_certificates_1995
  - ua_hryvnia_stabilisation_1996
axes_summary:
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, rationale: "Formal private-property transition and privatisation advanced, but insider control and weak enforcement limited security."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Price liberalisation and enterprise privatisation opened many markets, while oligarchic concentration constrained competition."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "The 1996 hryvnia reform and stabilisation reduced fiscal-monetary dominance relative to 1992-1993 hyperinflation."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Independence moved trade policy out of the Soviet planning system, though Russian dependence remained large."}
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: partially_aligned}
references:
  - "World Bank, Ukraine: Restoring Growth with Equity (1999)"
  - "IMF, Ukraine transition and stabilisation country reports, 1990s"
  - "Åslund (2009), How Ukraine Became a Market Economy and Democracy"
notes: "Early transition period is intentionally separated from post-Orange and post-Maidan reform waves."

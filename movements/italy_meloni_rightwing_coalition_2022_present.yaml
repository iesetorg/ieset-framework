# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_meloni_rightwing_coalition_2022_present
status: candidate
name: "Italy Meloni centre-right coalition (FdI–Lega–FI) 2022-present"
countries: [ITA]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: "2022-10-22"
coalition: "Fratelli d'Italia (FdI) + Lega + Forza Italia + Noi Moderati"
leaders:
  - "Giorgia Meloni (PM, FdI leader — first woman PM of Italy)"
  - "Giancarlo Giorgetti (Economy Minister, Lega)"
  - "Matteo Salvini (Infrastructure Minister and Deputy PM, Lega)"
  - "Antonio Tajani (Foreign Minister and Deputy PM, FI — took FI leadership after Berlusconi's death June 2023)"
  - "Raffaele Fitto (EU Affairs Minister to 2024, then EU Commissioner)"
  - "Ignazio La Russa (Senate President, FdI)"
doctrine: >
  National-conservative governance with EU-orthodox fiscal discipline
  and protectionist industrial preference. Stated programme: reverse
  the M5S heterodox welfare architecture (abolish Reddito di
  Cittadinanza as universal floor, replace with two narrower
  work-conditional schemes), honour PNRR milestones to secure NGEU
  disbursements while renegotiating lagging lines, reduce tax wedge
  on middle incomes via IRPEF bracket compression, extend the
  self-employed flat-tax (regime forfettario) threshold from €65k to
  €85k (from January 2023), run moderate deficits converging to EU
  targets, and prioritise sovereigntist themes on migration, family
  policy, and cultural institutions. On the left-right axis the
  coalition sits national-conservative / centre-right-populist — the
  most economically-right Italian government of the post-2018
  cycle on tax architecture and welfare conditionality, while
  interventionist on industrial and banking policy. Key policies with
  dates: 2023 Budget Law (Dec 2022) raising flat-tax threshold +
  reducing RdC coverage; Decreto Lavoro (May 2023) formally
  abolishing RdC from 1 Jan 2024 and replacing it with Assegno di
  Inclusione (means-tested, family-with-dependants) + Supporto
  Formazione e Lavoro (work-activation); extra-profits tax on bank
  net interest margins announced 7 August 2023 (Decreto Asset, Law
  136/2023 as amended — 40% levy, later allowed banks to divert to
  reserves); Budget 2024 fiscal compression holding deficit path to
  4.3% with cuts to Superbonus and pension indexation adjustments;
  Superbonus phase-out Decreto-legge 39/2024 (February 2024)
  tightening credit-transfer mechanics; premiership reform bill
  ('premierato', under parliamentary debate 2024-2025); justice
  reform separating judges' and prosecutors' careers (Nordio reforms,
  under parliamentary passage). Popularity: 2022 general election —
  FdI 26.0% (119/400 Camera seats), Lega 8.8% (66 — aggregate),
  FI 8.1%, coalition total 43.8% with 237/400 Camera seats (majority
  under Rosatellum mixed system). FdI overtook PD in all major polls
  from October 2022 and held ~28-30% through 2024. European elections
  June 2024: FdI 28.8% (first party, +2.8pp vs 2022), Lega 9.0%, FI
  9.6% — coalition stable; opposition fragmented (PD 24.1%, M5S
  9.9%, AVS 6.8%). 2023 regional elections: centre-right won Lazio
  and Lombardia; 2024 split (centre-right Basilicata and Liguria;
  centre-left Sardegna, Umbria, Emilia-Romagna). Approval of PM
  Meloni has held 40-48% range 2023-2025, unusual longevity for an
  Italian PM. Coherence judgement: more internally coherent than
  Conte but less than Draghi; the EU-orthodoxy / protectionist-
  interventionism tension (bank levy, energy golden powers, Pirelli /
  Unicredit postures) is the defining policy-content ambiguity.
policies:
  - italy_rdc_abolition_adi_sfl_2023
  - italy_flat_tax_forfettario_extension_2023
  - italy_bank_extra_profits_tax_2023
  - italy_budget_2024_fiscal_compression
  - italy_superbonus_phaseout_2024
  - italy_pnrr_2021
axes_summary:
  - axis: fiscal.transfer_expansion
    direction: "-"
    magnitude: moderate
    rationale: "RdC abolition replaced by narrower Assegno di Inclusione + SFL; coverage reduced from ~1.3m households to ~0.7m."
  - axis: fiscal.tax_progressivity
    direction: "-"
    magnitude: moderate
    rationale: "Flat-tax forfettario threshold raised to €85k; IRPEF bracket compression from four to three brackets (2024); top-rate entry point unchanged."
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: weak
    rationale: "Deficit path held to EU convergence trajectory post-2024 under new Stability Pact; Superbonus phase-out reduces forward off-budget cost."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: weak
    rationale: "Bank extra-profits tax 2023 (softened via reserve-allocation option); energy windfall surcharge continued."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: moderate
    rationale: "Piantedosi decree (Law 15/2023), Albania protocol (November 2023), tightened NGO-rescue and detention rules."
  - axis: regulatory.sectoral_licensing
    direction: "+"
    magnitude: weak
    rationale: "Expanded use of golden-power reviews over energy, telecoms, banking M&A (Unicredit-Commerzbank, BPM, TIM network)."
  - axis: regulatory.product_market_competition
    direction: "0"
    magnitude: weak
    rationale: "PNRR competition milestones kept on paper; beach-concession (Bolkestein) reform repeatedly deferred."
  - axis: regulatory.energy_supply_security
    direction: "+"
    magnitude: moderate
    rationale: "Accelerated Russia-gas exit begun under Draghi; Mattei Plan Africa partnerships 2024; LNG infrastructure expanded."
outcome_hypotheses:
  - structural_reform_absence_and_post_euro_stagnation
  - cash_transfer_poverty_effects
predecessor_movements:
  - italy_draghi_national_unity_2021_2022
position_alignments:
  - {position_id: national_conservative, alignment: aligned, notes: "FdI-led coalition is the textbook European national-conservative case: traditionalist social policy, migration restriction, golden-power expansion to ring-fence strategic sectors, sovereigntist rhetoric paired with sectoral industrial intervention (Stellantis, TIM, Ilva)."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "EU fiscal-convergence commitment under Giorgetti Treasury; PNRR milestone compliance — real but secondary to the national-conservative content."}
  - {position_id: austrian, alignment: opposed, notes: "Bank windfall levy + golden-power expansion move against property-rights predictability and against open-economy presumptions."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Immigration restriction, civil-society pressure on judiciary and press, sovereigntist trade posture — opposed on liberal-international dimensions."}
references:
  - "Legge di Bilancio 2023 (Law 197/2022)"
  - "Decreto Lavoro (Decreto-legge 48/2023) abolishing Reddito di Cittadinanza"
  - "Decreto Asset (Decreto-legge 104/2023, Law 136/2023) — bank extra-profits levy"
  - "Legge di Bilancio 2024 (Law 213/2023)"
  - "Decreto-legge 39/2024 (Superbonus limitation)"
  - "Banca d'Italia Relazione Annuale 2023, 2024"
  - "European Commission PNRR Italy assessments 2023, 2024"
notes: >
  Longest-serving post-war Italian PM in realistic reach as of coding
  date (18 months since October 2022 with polling-stable coalition).
  Analytical tension for the framework: FdI is the successor party of
  MSI-AN (post-fascist heritage) but the governing economic programme
  is coded on policy content per Invariant 3, not on party lineage.
  Coalition partners Lega (regionalist / right-populist) and FI
  (liberal-conservative) moderate the programme's national-
  conservative tilt on economic dimensions.

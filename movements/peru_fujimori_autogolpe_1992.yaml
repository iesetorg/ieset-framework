# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: peru_fujimori_autogolpe_1992
status: candidate
name: "Fujimori autogolpe — 5 April 1992 self-coup and constitutional rupture"
countries: [PER]
timeframe: {start: 1992, end: 1993, enacted_date: "1992-04-05"}
coalition: "Cambio 90 + military + SIN intelligence apparatus"
leaders:
  - "Alberto Fujimori (President 1990-2000)"
  - "Vladimiro Montesinos (SIN de facto head)"
  - "Nicolás Hermoza Ríos (Comandante General del Ejército)"
  - "Jorge Camet Dickmann (Economía after Boloña)"
doctrine: >
  Executive self-coup dissolving Congress and intervening in the
  judiciary, legitimised ex-post by a Constituent Congress and a
  new 1993 Constitution. Four doctrinal pillars: (a) 5 April
  1992 autogolpe — President Fujimori, backed by Armed Forces
  joint command, dissolved Congress, suspended the 1979
  Constitution, intervened the Supreme Court and Public
  Ministry, arrested opposition leaders (Alan García fled);
  justified as necessary to prosecute Sendero Luminoso and
  MRTA and overcome congressional obstruction of structural
  adjustment. (b) Sendero counter-terrorism breakthrough —
  Abimael Guzmán captured 12 September 1992 by GEIN special
  intelligence unit; DINCOTE operations; military tribunals for
  terrorism under Decreto Ley 25.475 (1992). (c) CCD
  Constituent Congress elections (22 November 1992) — Cambio
  90-Nueva Mayoría won 44 of 80 seats; OAS-monitored amid
  boycott by APRA and AP; drafted 1993 Constitution approved
  31 October 1993 referendum 52.24% Yes / 47.76% No. (d)
  Continuation of Boloña stabilisation shock — "Fujishock" of
  8 August 1990 had removed subsidies and freed prices under
  emergency law; CCD period consolidated tariff reduction, SOE
  privatisation acceleration (CENTROMIN, Electrolima). Stated
  justification: anti-terrorist and anti-inflation emergency
  trumping democratic procedure. Left-right: economic right,
  authoritarian-populist. Popularity: Fujimori elected June
  1990 runoff 62.5% vs Vargas Llosa 37.5%; immediately after
  autogolpe IMASEN polls showed 71-82% support; Guzmán capture
  boosted support further; international isolation brief —
  OAS Santiago Commitment 1991 invoked but US/Japan aid
  quickly resumed after CCD elections. Coherence: trade
  constitutional order, congressional checks, and
  judicial-independence for terrorism-victory, macro
  stabilisation completion, and constitutional re-foundation
  enabling 1995 re-election.
policies:
  - pe_autogolpe_5_april_1992
  - pe_capture_of_guzman_sendero_1992
  - pe_1993_constitution_referendum
  - pe_decreto_ley_25475_terrorism_1992
  - pe_ccd_constituyente_elections_1992
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Congress dissolved, Supreme Court intervened, military tribunals for civilians."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Judicial purge; military jurisdiction over terrorism."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Sendero defeat restored de-facto state authority in much of highland Peru."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Privatisation acceleration under CCD."}
outcome_hypotheses: [autogolpe_counterinsurgency_effect, constitutional_rupture_institutional_trajectory]
predecessor_movements: [peru_fujimori_stabilisation_1990_2000]
successor_movements: [peru_fujimori_stabilisation_1990_2000]
position_alignments:

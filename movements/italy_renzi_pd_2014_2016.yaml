movement_id: italy_renzi_pd_2014_2016
status: candidate
name: "Renzi PD reformist government 2014-2016"
countries: [ITA]
timeframe: {start: 2014, end: 2016, enacted_date: "2014-02-22"}
coalition: "PD + NCD + SC + UdC + Ala ('Patto del Nazareno' with Berlusconi-FI exclusive support)"
leaders:
  - "Matteo Renzi (PM, PD secretary)"
  - "Pier Carlo Padoan (Finance Minister)"
  - "Giuliano Poletti (Labour Minister)"
doctrine: >
  Reformist centre-left PD government elected internally via PD primaries, sworn
  in at 39 — youngest PM in Italian history. Economic school: centre-left
  supply-side modernisation ('rottamazione'/scrap-the-old) combining labour-market
  deregulation with demand-side €80/month IRPEF bonus and targeted tax cuts.
  Signature policies: Jobs Act (L. 183/2014 delegating law + D.lgs. 23/2015)
  replacing Art. 18 reinstatement with graduated tutele crescenti indemnity for
  new hires; 'Bonus 80 euro' monthly transfer to ~10m low-middle earners
  (May 2014); banking reform converting popolari >€8bn assets into SpA
  (Jan 2015), Banca Etruria + 3 small banks resolution Nov 2015 (first BRRD
  bail-in); stability-pact flexibility negotiations with EU Commission;
  constitutional referendum (Dec 4 2016) reducing Senate powers and
  regional-concurrent competences — rejected 59.1% NO / 40.9% YES with
  65.5% turnout. Renzi resigned within hours. Left-right: centre-left,
  pro-business modernising. Popularity: PD won 2014 EP election 40.8% (highest
  ever for Italian centre-left); declined through 2016, referendum defeat
  catalysed M5S/Lega ascendancy. Coherence: moderately high programmatically
  but underestimated referendum political risk.
policies:
  - it_jobs_act_2014_2015
  - it_bonus_80_euro_2014
  - it_popolari_banking_reform_2015
  - it_constitutional_referendum_2016_rejected
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "Jobs Act abolished reinstatement remedy for new hires; unified unemployment insurance NASpI."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Bonus 80 euro ~€10bn/year to low-middle earners."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Popolari conversion to SpA; banking resolution framework tightened."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Constitutional referendum would have streamlined legislative process but was defeated."}

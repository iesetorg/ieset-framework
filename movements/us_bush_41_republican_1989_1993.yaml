movement_id: us_bush_41_republican_1989_1993
status: candidate
name: "Bush 41 Republican — 1990 budget deal, Gulf War, ADA, FIRREA"
countries: [USA]
timeframe: {start: 1989, end: 1993, enacted_date: "1989-01-20"}
coalition: "Republican White House with Democratic Congress"
leaders:

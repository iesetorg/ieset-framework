# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_jokowi_pdip_2014_2024
status: candidate
name: "Indonesia Jokowi PDI-P era"
countries: [IDN]
timeframe: {start: 2014, end: 2024}
coalition: "PDI-P-led broad coalition (PDI-P, Nasdem, PKB, Hanura, PPP; Golkar and PAN joining from 2016; Gerindra co-opted from 2019)"
leaders: ["Joko Widodo (President 2014-2024)", "Jusuf Kalla (VP 2014-2019)", "Ma'ruf Amin (VP 2019-2024)", "Sri Mulyani Indrawati (Finance 2016-2024)", "Luhut Binsar Pandjaitan (Coordinating Minister / downstream policy)", "Bahlil Lahadalia (Investment / Energy)"]
doctrine: >
  Developmentalist infrastructure-push presidency combining public-
  works acceleration, resource-downstreaming nationalism, and a
  progressive consolidation of executive power. First-term flagship
  was an unprecedented infrastructure build-out (toll roads, MRT
  Jakarta, Trans-Sumatra, Trans-Papua, Patimban port) financed by
  fuel-subsidy cuts Nov 2014 and the tax amnesty of 2016. Second-
  term pivoted harder: the Omnibus Law on Job Creation (UU Cipta
  Kerja, enacted 5 Oct 2020) cut labour protections and streamlined
  licensing, the nickel export ban (Jan 2020) drove a downstream
  smelter boom and FDI from Chinese stainless-steel and EV-battery
  groups, and the Nusantara new-capital law (Feb 2022) committed
  Indonesia to relocating the capital to East Kalimantan. A VAT
  hike 10%→11% took effect April 2022. Institutional moves included
  the Sept 2019 KPK law revision weakening the anti-corruption
  commission, a Constitutional-Court decision (Oct 2023) clearing
  Jokowi's son Gibran to run as VP with Prabowo, and PDI-P co-option
  of former rivals. Coherence: moderate — developmentalist and
  nationalist-industrial in policy content, illiberal on
  institutions, and orthodox on headline fiscal.
policies: [id_jokowi_fuel_subsidy_cut_2014, id_jokowi_tax_amnesty_2016, id_jokowi_nickel_export_ban_2020, id_jokowi_omnibus_job_creation_2020, id_jokowi_kpk_law_revision_2019, id_jokowi_nusantara_capital_2022, id_jokowi_vat_hike_2022]
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Nov 2014 fuel subsidy cut redeployed to infrastructure; later offset by 2022 fuel-price interventions."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: strong, rationale: "Omnibus Law on Job Creation 2020 loosened severance, minimum-wage formula, and outsourcing limits."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Nickel export ban 2020, bauxite ban 2023, copper-concentrate downstreaming push."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "OSS licensing single-window and Omnibus Law entry-barrier reductions."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "KPK law revision 2019 added supervisory board and civil-servant status; 2023 MK decision seen as dynastic intervention."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Omnibus Tax Law 2021 reduced CIT 25%→22% (scheduled 20% deferred); tax amnesty 2016 broadened base."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Infrastructure spending share rose; COVID stimulus 2020-2021 lifted spending / deficits."}
outcome_hypotheses: [resource_downstreaming_industrial_policy, infrastructure_push_growth_effects, omnibus_labour_reform_employment]
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: opposed, notes: "KPK weakening, dynastic constitutional engineering."}
predecessor_movements: [indonesia_sby_demokrat_2004_2014]
successor_movements: [indonesia_prabowo_2024_present]
references:
  - "Warburton & Aspinall (2019), 'Explaining Indonesia's Democratic Regression', Critical Asian Studies"
  - "Patunru & Rahardja (2015), 'Trade Protectionism in Indonesia', Lowy Institute"
  - "World Bank Indonesia Economic Prospects, various 2014-2024"
notes: |
  Electoral: Jokowi 53.2% (2014), 55.5% (2019). PDI-P DPR seat share: 19.5% (2014),
  22.3% (2019); coalition commanded >75% of DPR by end of second term after
  Gerindra's 2019 cabinet entry.

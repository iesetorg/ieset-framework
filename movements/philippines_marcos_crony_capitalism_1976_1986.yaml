movement_id: philippines_marcos_crony_capitalism_1976_1986
status: candidate
name: "Marcos late-martial-law crony capitalism (Philippines)"
countries: [PHL]
timeframe: {start: 1976, end: 1986}
coalition: "Kilusang Bagong Lipunan (KBL) under Ferdinand Marcos, martial law until 1981"
leaders:
  - "Ferdinand Marcos (President)"
  - "Cesar Virata (Finance Minister, Prime Minister 1981-1986)"
  - "Jaime Laya (Central Bank Governor 1981-1984)"
  - "Roberto Benedicto (sugar monopoly)"
  - "Eduardo Cojuangco (coconut monopoly)"
doctrine: >
  Late-Marcos authoritarian crony capitalism — post-1972 martial-law
  regime entering its debt-financed decline phase. Economic school:
  developmentalist rhetoric + IMF programme orthodoxy superimposed on
  extractive crony-monopoly allocation. Dated policies: coconut-industry
  levy (Cojuangco-led UNICOM / COCOFED) 1973-1986; sugar monopoly
  PHILSUCOM/NASUTRA under Benedicto from 1976; 11 IMF standby arrangements
  1975-1985; 'eleven major industrial projects' (petrochemicals, copper
  smelter, nuclear plant) announced 1979; Bataan Nuclear Power Plant
  completed 1984 (never operated); martial law formally lifted 17 Jan
  1981, replaced by Amendment No. 6 effectively continuing rule; Cesar
  Virata technocrat premiership Jul 1981 attempting orthodox
  stabilisation; Benigno Aquino assassination 21 Aug 1983 triggered
  capital flight, 39% peso devaluation Oct 1983, debt-service moratorium
  Oct 1983 (USD24.4bn external debt). Snap election 7 Feb 1986 stolen;
  EDSA People Power Revolution 22-25 Feb 1986 ousted Marcos to Hawaii.
  Left-right: right-authoritarian, rhetorically developmentalist.
  Popularity: 1978 IBP election KBL ~85%; 1981 presidential 'election'
  Marcos 88% (boycotted); 1986 snap election Marcos claimed victory
  over Cory Aquino — NAMFREL count showed Aquino leading, COMELEC
  walk-out. Coherence: very low — technocrat stabilisation under Virata
  fought against crony-monopoly allocation, macroeconomic collapse
  1983-1986 (GDP -7% 1984, -3.5% 1985).
policies:
  - ph_coconut_levy_cojuangco_1973_1986
  - ph_sugar_monopoly_philsucom_nasutra_1976
  - ph_11_major_industrial_projects_1979
  - ph_bataan_nuclear_plant_1984
  - ph_debt_moratorium_1983
  - ph_martial_law_lifting_amendment_6_1981
  - ph_snap_election_edsa_1986
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "Sugar/coconut monopolies granted to cronies; licensing weaponised against non-aligned firms — strong-negative on competition direction of this axis."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Sequestration of opposition businesses; selective expropriation under PDs."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Eleven Major Projects + Bataan Nuclear + crony-firm bailouts 1981-1984."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Martial law (1972-1981) and Amendment No. 6 continuation; Aquino assassination."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "IMF tariff-reform conditionality partially implemented, offset by non-tariff allocation."}
successor_movements:

movement_id: spain_gonzalez_psoe_first_1982_1989
status: candidate
name: 'González PSOE first and second governments (Spain): industrial reconversion, EEC entry,
  modernisation'
countries:
- ESP
timeframe:
  start: 1982
  end: 1989
coalition: PSOE absolute majority — González I (1982-86), González II (1986-89)
leaders:
- Felipe González (PM, 2 December 1982 - 5 May 1996)
- Alfonso Guerra (Deputy PM, PSOE organisational chief)
- Miguel Boyer (Economy Minister 1982-1985)
- Carlos Solchaga (Industry 1982-1985, then Economy 1985-1993)
- Mariano Rubio (Banco de España Governor 1984-1992)
doctrine: 'PSOE reformist Socialism converging to the European social-democratic mainstream —
  Boyer-Solchaga technocratic governance delivering the structural adjustment the UCD transition
  era could not. Economic school: PSOE reformist Socialism (post-1979 Suresnes-abandonment of
  Marxist labels at 28th Congress 1979) — pragmatic European-style social-democracy with modernising
  industrial policy and strong pro-Europe orientation; closer to Delors/Mitterrand post-rigueur
  than to pre-1980s Southern European Socialism. Left-right axis: centre-left, executing centrist
  macro-adjustment with social policy expansion (universal healthcare, education) — a canonical
  social-democratic European-integration package. Key content: (i) peseta devaluation December
  1982 (8%) on taking office; (ii) expropriation of Rumasa holding 23 February 1983 (contested
  technocratic intervention); (iii) industrial reconversion / reconversión industrial 1983-1986
  — Ley 27/1984 de 26 julio — closing steel, shipbuilding, white-goods capacity with generous
  redundancy provisions; (iv) Estatuto de los Trabajadores 1984 reform (Ley 32/1984) introducing
  fixed-term contracts without just-cause — creating two-tier labour market; (v) Ley Orgánica
  del Derecho a la Educación (LODE) 1985 education reform; (vi) NATO referendum 12 March 1986
  — González won ''Yes'' (52.5%) despite earlier PSOE opposition, canonical pivot-to-mainstream
  move; (vii) EEC accession treaty entry 1 January 1986 (negotiated 1985); (viii) Ley General
  de Sanidad 14/1986 universal healthcare; (ix) banking deregulation and liberalisation continued
  — financial- services reform; (x) bank-merger wave 1988 (Banco Bilbao + Banco Vizcaya = BBV);
  (xi) 14-D general strike 14 December 1988 — UGT (historically PSOE-aligned) joined CCOO against
  ''Plan de Empleo Juvenil'' labour reform, forcing government retreat. Popularity: 1982 election
  PSOE 48.1% (202 seats, landslide) — largest postwar Spanish majority; 1986 election PSOE 44.1%
  (184 seats) — retained absolute majority; 14-D general strike 1988 was a significant rupture
  with traditional labour base. Coherence: programme was remarkably coherent through 1982-1987
  (industrial reconversion + EEC entry + universal healthcare formed a modernisation package);
  1988 strike and subsequent retreat on youth-employment plan mark where government-labour alignment
  broke; third-term González 1989+ dealt with GAL scandal revelations and corruption that ultimately
  ended the cycle in 1996.

  '

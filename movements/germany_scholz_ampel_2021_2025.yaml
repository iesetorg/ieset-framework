doctrine: 'Three-party fusion attempting to reconcile SPD demand-side social policy, Green supply-side
  decarbonisation and industrial-policy activism, and FDP supply-side liberalism and fiscal orthodoxy
  — a coalition whose internal contradictions dominated its output. Doctrine best read as "Green-tinged
  demand-side SPD plus supply-side FDP fusion under debt-brake constraint," forced into regime-break
  spending by the February 2022 Russian invasion of Ukraine via the €100bn Bundeswehr Sondervermögen
  (constitutional amendment June 2022), the €200bn Wirtschaftlicher Abwehrschirm energy shock
  response (Oct 2022, "Doppelwumms"), and emergency LNG-terminal buildout. Core domestic package:
  Bürgergeld reform of Hartz IV with higher baseline + relaxed sanctions (Jan 2023), Heizungsgesetz
  mandating 65%-renewable share for new heating systems (GEG amendment, watered down in Bundestag
  summer 2023), minimum wage to €12 (Oct 2022), Kindergeld expansion and failed Kindergrundsicherung
  consolidation, citizenship reform liberalising dual citizenship and shortening residency (Jun
  2024), Cannabis legalisation (Apr 2024), Wachstumschancengesetz tax relief (Mar 2024). Collapsed
  6 Nov 2024 after Scholz dismissed Lindner over Bundeswehr supplementary budget + debt-brake
  dispute; snap election 23 Feb 2025. Coherence judgement: doctrinally incoherent, operationally
  crisis-competent on gas supply, electorally punished — the coalition''s three parties collectively
  lost ~20 percentage points of first-vote share between 2021 and 2025.

  '

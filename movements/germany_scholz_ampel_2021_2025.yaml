notes: 'Bundestag seat share at formation (Nov 2021): SPD 25.7% (206 seats), Greens 14.8% (118),
  FDP 11.5% (92) — total 416/736 = 56.5%. Approval trajectory: Scholz personal approval peaked
  ~60% in early 2022 after Zeitenwende speech (27 Feb 2022); declined to ~20% by late 2024, among
  the lowest of any sitting Chancellor in Forschungsgruppe Wahlen series. State-election shifts:
  SPD lost Niedersachsen traditional dominance margins; Greens collapsed from 2022 peak in Bayern/Hessen
  2023; FDP fell below 5% threshold in every Landtag election of 2023-24; AfD first-place in Thüringen
  Sep 2024 (32.8%) and Saxony/Brandenburg near-parity; BSW emerged mid-2024. Snap Feb 2025 result:
  SPD 16.4%, Greens 11.6%, FDP 4.3% (ausgeschieden). Considered a failed coalition electorally
  by most observers while crediting Zeitenwende execution on defence and gas supply.

  '

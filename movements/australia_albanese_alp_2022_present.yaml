status: candidate
name: "Albanese Labor — cautious-progressive restoration 2022-present"
countries: [AUS]
timeframe: {start: 2022, end: "ongoing", enacted_date: "2022-05-23"}
coalition: "Australian Labor Party (ALP) — majority government from May 2022, re-elected May 2025"

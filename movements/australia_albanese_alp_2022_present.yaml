  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "National Reconstruction Fund A$15bn vehicle plus Future Made in Australia ~A$22.7bn decade envelope for green and strategic industry."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Cheaper Child Care subsidy expansion, energy-bill relief, and HAFF social housing pipeline."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Two consecutive budget surpluses 2022-23 and 2023-24 held aggregate spend-to-GDP broadly flat despite new programs."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Climate Change Act legislated 43% 2030 target; Safeguard Mechanism reform reintroduced declining baselines on 215 facilities."}

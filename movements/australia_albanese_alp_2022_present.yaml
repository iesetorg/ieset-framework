doctrine: >
  ALP centre-left cautious-progressive restoration: the stated doctrine is
  "responsible" economic management paired with targeted industrial policy,
  a selective rebuild of the welfare and care economy, and a climate-policy
  re-engagement after the decade of Coalition government. Left-right axis:
  centre-left on distribution and climate, centrist on fiscal aggregates
  (two consecutive budget surpluses 2022-23 and 2023-24) and on border
  policy and AUKUS continuity; deliberately less ambitious than Rudd-Gillard
  era Labor in order to hold outer-suburban and Western Australian seats.
  Key policy content: (i) Stage-3 personal income tax cut redesign enacted
  February 2024 (effective 1 July 2024) — redistributed the legislated
  flat-bracket cut toward lower and middle earners, a revealed-preference
  reversal of a 2019 Coalition commitment Labor had supported in opposition;
  (ii) Housing Australia Future Fund Act assented September 2023, a
  $10bn off-budget investment vehicle to fund 30,000 social and affordable
  dwellings over five years; (iii) Future Made in Australia Act 2024
  (Budget May 2024) — ~A$22.7bn over a decade for green-metals, critical-
  minerals, quantum, and hydrogen production tax credits, an explicit
  industrial-policy turn modelled on the US IRA; (iv) Voice to Parliament
  constitutional referendum held 14 October 2023 and defeated 60-40, a
  decisive institutional setback; (v) Safeguard Mechanism reform (assented
  March 2023, effective 1 July 2023) re-introducing declining baselines on
  ~215 large-emitter facilities; (vi) 43% 2030 emissions target legislated
  in Climate Change Act 2022; (vii) Fair Work Legislation Amendment
  (Secure Jobs, Better Pay) Act December 2022 restoring multi-employer
  bargaining; (viii) AUKUS Pillar 1 nuclear-submarine pathway confirmed
  March 2023 with A$368bn life-of-program cost estimate; (ix) cost-of-
  living energy-bill relief and expanded childcare subsidy July 2023;
  (x) National Anti-Corruption Commission operational July 2023. Popularity
  trajectory: elected May 2022 with 77/151 House seats on 32.6% primary
  (lowest winning ALP primary on record); post-Voice approval fell from
  ~55% to low-40s through 2024; re-elected 3 May 2025 with expanded
  majority (~94 seats) on a Dutton-Coalition collapse rather than
  enthusiasm. Coherence line: cautious-progressive redistribution plus
  IRA-style industrial policy plus AUKUS continuity — "responsible
  re-engagement, not transformation".

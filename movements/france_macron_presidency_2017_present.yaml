movement_id: france_macron_presidency_2017_present
status: candidate
name: "Macron presidency — liberal-progressive Macronism (France)"
countries: [FRA]
timeframe: {start: 2017, end: ongoing, enacted_date: "2017-05-14"}
coalition: "La République en Marche / Renaissance — presidential majority 2017-2022 (with MoDem/Agir/Horizons), relative plurality without absolute majority from June 2022; successive governments under PMs Philippe, Castex, Borne, Attal, Barnier, Bayrou"
leaders:
  - "Emmanuel Macron (President, 2017-)"
  - "Édouard Philippe (PM 2017-2020)"
  - "Jean Castex (PM 2020-2022)"
  - "Élisabeth Borne (PM 2022-2024)"
  - "Gabriel Attal (PM Jan-Sep 2024)"
  - "Bruno Le Maire (Economy/Finance 2017-2024)"
doctrine: >
  Liberal-progressive Macronism — a self-styled "en même temps" centrism
  combining supply-side reform, European federalist ambition, and selective
  social liberalism, positioning rhetorically as neither left nor right but
  empirically centre to centre-right on economics and centre-left on social
  issues (EU integration, climate rhetoric). Signature content: Ordonnances
  Travail 2017 (Code du travail liberalisation, company-level bargaining);
  ISF → IFI wealth-tax narrowing to real estate 2018; PFU flat tax on
  capital income at 30% from 2018; corporate tax phased 33.3% → 25% by
  2022; PACTE law 2019 (business growth, privatisation of ADP authorised
  but blocked, FDJ privatisation 2019); pension reform 2020 (suspended
  by COVID) then re-attempted as 2023 reform raising retirement age 62 →
  64 (Article 49.3, enacted April 2023 amid mass protests); energy-price
  shield and "quoi qu'il en coûte" fiscal response to COVID and to the
  2022 Ukraine-war energy shock; sustained Ukraine military support, NATO
  re-engagement, France 2030 industrial-policy envelope (€54bn for green
  tech, nuclear EPR2 relaunch, semiconductors). Left-right axis: centre
  with a clear centre-right tilt on fiscal/regulatory content. Popularity:
  1st-round 24.0% / 2nd-round 66.1% in 2017 vs Le Pen; 1st-round 27.8% /
  2nd-round 58.5% in 2022 vs Le Pen; approval oscillated from ~62% post-
  election 2017 to ~23% at gilets-jaunes trough (Dec 2018), recovering to
  ~40% mid-2020, falling again to sub-30% by mid-2023 post-pensions; June
  2022 legislative election cost the absolute majority (245/577 seats),
  and the snap June-July 2024 dissolution following RN EU-election victory
  produced a hung Assemblée (ENSEMBLE ~166 seats, RN-led bloc ~142, NFP
  ~180). Coherence judgement: doctrinally consistent supply-side-with-
  European-solidarity programme whose reform cadence outran its democratic
  coalition, converting a 2017 realignment mandate into a fragmented
  minority presidency.
policies:
  - fr_ordonnances_travail_2017
  - fr_pfu_flat_tax_2018
  - fr_isf_ifi_2018
  - fr_corporate_tax_cut_2018_2022

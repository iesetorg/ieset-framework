  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "ISF → IFI narrowing; PFU flat rate."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Phased 33.3% → 25% statutory rate by 2022."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "France 2030 €54bn industrial envelope; EPR2 nuclear relaunch; energy-price shield 2022-2023."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID 'quoi qu'il en coûte' 2020-2021 and 2022-2023 energy shield pushed spending/GDP and debt/GDP up."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "PACTE law loosened firm-size thresholds; FDJ privatisation; ADP privatisation legislated but blocked by referendum threat."}

movement_id: belgium_michel_mr_coalition_2014_2019
status: candidate
name: "Michel MR-led Suédoise centre-right coalition 2014-2019"
countries: [BEL]
timeframe: {start: 2014, end: 2019, enacted_date: "2014-10-11"}
coalition: "MR + N-VA + CD&V + Open Vld ('Suédoise' — yellow+blue, first without francophone socialists since 1988)"
leaders:
  - "Charles Michel (PM, MR; francophone in N-VA-dominated coalition)"
  - "Johan Van Overtveldt (N-VA, Finance Minister)"
  - "Kris Peeters (CD&V, Economy and Employment)"
doctrine: >
  First federal government in a generation excluding French-speaking socialists
  (PS/cdH) — 'Suédoise' centre-right coalition with flemish-nationalist N-VA
  as largest party. Economic school: centre-right supply-side with Flemish-
  nationalist partner accepting N-VA tempering of communitarian demands in
  exchange for labour-market and tax-shift reform. Signature actions: Tax Shift
  (2015-2019) progressively cutting employer SSCs from 32.4% to 25% and raising
  consumption/environmental taxes and capital-income taxation; pension-age rise
  to 67 by 2030; 'index jump' (indexsprong) freezing wage-indexation for one
  cycle (Apr 2015); statutory pension-age to 67 legislated 2015; CETA
  ratification nearly blocked by Wallonia (Oct 2016 — Paul Magnette's veto
  eventually withdrawn); corporate-tax rate cut from 33.99% to 25% phased
  2018-2020. N-VA exited Dec 2018 over Marrakech migration compact; Michel
  resigned Dec 2018, governed as caretaker until May 2019 election.
  Left-right: centre-right. Popularity: N-VA 32.4% Flemish vote 2014; 2019
  election N-VA lost ground to far-right Vlaams Belang (18.5%); coalition
  unable to re-form. Coherence: moderate-high on economic programme; broke
  on migration and identity politics.
policies:
  - be_tax_shift_2015_2019
  - be_index_jump_2015
  - be_corporate_tax_reform_2017_2020
  - be_pension_age_rise_67_2015
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Corporate rate 33.99% → 25% phased 2018-2020; SME rate to 20% on first €100k."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Index jump, flexi-jobs expansion, employer-SSC cuts."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Pension age 65→67; unemployment activation tightened."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "CETA ratified after Wallonia accommodation."}

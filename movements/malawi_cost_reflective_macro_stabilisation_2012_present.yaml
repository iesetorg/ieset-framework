# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malawi_cost_reflective_macro_stabilisation_2012_present
status: candidate
name: Malawi cost-reflective macro-stabilisation reform 2012-present
countries: [MWI]
timeframe:
  start: 2012
  end: ongoing
coalition: Successive Malawi governments, including the Chakwera MCP reform phase
leaders:
- "Joyce Banda (President, 2012-2014)"
- "Peter Mutharika (President, 2014-2020)"
- "Lazarus Chakwera (President, 2020-present)"
doctrine: >
  Malawi's recent macro-stabilisation reform sequence links cost-reflective
  fuel pricing, fiscal-governance repair, exchange-rate adjustment, and IMF
  programme conditionality. The common policy thread is an attempt by
  successive governments, especially under the Chakwera administration after
  2020, to reduce implicit subsidies, foreign-exchange rationing, arrears, and
  weak budget controls while preserving essential import availability.
policies:
- mwi_automatic_fuel_pricing_mechanism_2012
- mwi_public_finance_management_act_2022
- mwi_imf_ecf_2023
- mwi_kwacha_devaluation_2023
axes_summary:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  rationale: PFM controls and IMF programme targets sought deficit, arrears, and budget-execution discipline.
- axis: fiscal.sectoral_subsidy
  direction: '-'
  magnitude: moderate
  rationale: Formula-based fuel pricing reduces implicit petroleum subsidies when applied.
- axis: regulatory.price_control_intensity
  direction: '-'
  magnitude: moderate
  rationale: Automatic fuel-price pass-through weakens discretionary below-cost pump-price suppression.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: weak
  rationale: Exchange-rate realignment and reserve-rebuilding commitments aimed to reduce fiscal and administrative dominance over FX policy.
- axis: institutional.rule_of_law
  direction: +
  magnitude: moderate
  rationale: PFM law, debt transparency, and programme reporting added rule-bound fiscal procedures.
references:
- "Malawi Energy Regulatory Authority, automatic fuel pricing mechanism materials."
- "MalawiLII, Public Finance Management Act, 2022: https://malawilii.org/akn/mw/act/2022/4/eng@2022-03-31"
- "IMF, Malawi request for an arrangement under the Extended Credit Facility, 2023."
- "IMF, Malawi 2025 Article IV Consultation staff report and press release, 2025."
notes: >
  This is a cross-administration policy-regime movement. It should not be read
  as claiming continuous implementation of full fuel-price pass-through or
  sustained exchange-rate flexibility.

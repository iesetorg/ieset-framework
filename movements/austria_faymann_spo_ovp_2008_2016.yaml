status: candidate
name: "Faymann SPOe-OeVP grand coalition 2008-2016"
countries: [AUT]
timeframe: {start: 2008, end: 2016, enacted_date: "2008-12-02"}
coalition: "SPOe-OeVP grand coalition (two terms)"
leaders:
  - "Werner Faymann (Chancellor, SPOe, 2008-2016)"
  - "Josef Proell (Vice-Chancellor and Finance Minister, OeVP, 2008-2011)"
  - "Michael Spindelegger (Vice-Chancellor, OeVP, 2011-2014)"
  - "Reinhold Mitterlehner (Vice-Chancellor, OeVP, 2014-2016)"
doctrine: >
  Longest-serving Austrian grand-coalition of the 2000s-2010s, covering
  GFC response, European debt crisis, banking-sector bailouts (Hypo Alpe
  Adria nationalisation Dec 2009, BayernLB subsidiary), and the 2015
  refugee crisis. Economic school: Austrian grand-coalition Proporz
  consensus with Keynesian counter-cyclical 2009 tax reform, moderate
  consolidation 2011-2013, bank-stabilisation orthodoxy. Left-right:
  centrist — SPOe chancellery, OeVP finance, stalemate on reform.
  Dated policies: Steuerreform 2009 (PIT cuts), Hypo Alpe Adria
  nationalisation Dec 2009 and HETA bad-bank creation Oct 2014,
  Finanztransaktionssteuer push at EU level, pension-age alignment for
  women (phased 2024-2033 legislated 2010), 2015-2016 refugee reception
  (est. 90,000 asylum claims 2015), Steuerreform 2016 (PIT bracket
  restructure, top rate 55%). Popularity: eroded through both terms;
  Faymann resigned 9 May 2016 after Hofer's FPOe near-victory in
  presidential first round. Coherence: moderate — long tenure but
  programmatically conservative.

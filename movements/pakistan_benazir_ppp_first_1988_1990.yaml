  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Shafqat (1997), Civil-Military Relations in Pakistan: From Zulfikar Ali Bhutto to Benazir Bhutto"
  - "Husain (1999), Pakistan: The Economy of an Elitist State"
notes: "Deep-history tranche 2. First of four dismissed civilian governments 1988-1999."

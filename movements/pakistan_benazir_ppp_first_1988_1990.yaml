# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_benazir_ppp_first_1988_1990
status: candidate
name: "Benazir Bhutto PPP first term (Pakistan)"
countries: [PAK]
timeframe: {start: 1988, end: 1990}
coalition: "Pakistan Peoples Party-led minority; IJI in opposition"
leaders:
  - "Benazir Bhutto (PM Dec 1988-Aug 1990)"
  - "V.A. Jafarey (Finance Minister)"
  - "Ghulam Ishaq Khan (President)"
doctrine: >
  First post-Zia civilian doctrine — PPP inheriting father's socialist
  legacy but constrained by Ishaq Khan presidency, 8th Amendment
  powers, and powerful IJI opposition. Economic school: centre-left
  Bhuttoist rhetoric diluted toward status-quo liberalisation gently
  begun; IMF programme continuity. Dated policies: IMF Structural
  Adjustment arrangement Dec 1988; some deregulation continuation from
  Zia-era Mahbub ul Haq reforms; Benazir Income Support Programme
  precursors; Shariat appellate-bench continuation; Afghan-war
  Mujahideen-support drawdown post-Soviet withdrawal Feb 1989;
  Kashmir insurgency escalation 1989; dismissed by President Ghulam
  Ishaq Khan under 8th-Amendment Art 58(2)(b) on 6 Aug 1990 citing
  corruption and maladministration. Left-right: centre-left PPP
  rhetoric with liberal-technocratic economic stance; constrained by
  'troika' of President-PM-Army. Popularity: Nov 1988 general election
  PPP 38.5% / 93 seats of 207 (short of majority, minority government);
  dismissed 6 Aug 1990 after ~20 months. Coherence: low — divided
  authority between President and PM under 8th Amendment + Army
  dominance prevented coherent economic doctrine; mostly continuation
  of Zia-era IMF reform track.
policies:
  - pk_imf_saf_1988
  - pk_8th_amendment_dismissal_precedent_1990
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "IMF conditionality modest fiscal tightening."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "8th Amendment Art 58(2)(b) dismissal established precedent of presidential removal of elected PM."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "Modest continuation of industrial-licensing liberalisation."}
predecessor_movements:

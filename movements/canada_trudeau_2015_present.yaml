# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: canada_trudeau_2015_present
status: candidate
name: "Trudeau-era Liberal progressive governance (Canada)"
countries: [CAN]
timeframe: {start: 2015, end: ongoing, enacted_date: "2015-11-04"}
coalition: "Liberal Party — majority 2015-2019, minority 2019-2021, minority with NDP supply-and-confidence agreement 2022-2024 (terminated September 2024)"
leaders:
  - "Justin Trudeau (Prime Minister, 2015-)"
  - "Chrystia Freeland (Deputy PM 2019-2024; Finance Minister 2020-2024)"
  - "Bill Morneau (Finance Minister 2015-2020)"
  - "Jagmeet Singh (NDP leader, supply-and-confidence partner 2022-2024)"
doctrine: >
  Self-described progressive programme emphasising redistribution, climate
  action, social-infrastructure buildout, and expansionary immigration. Core
  policy content: (i) top-bracket personal income tax introduced at $200k+
  (2016) and middle-bracket rate cut; (ii) Canada Child Benefit 2016
  consolidating and expanding prior child-transfer programmes; (iii) federal
  carbon-pricing backstop (Greenhouse Gas Pollution Pricing Act 2018) and
  escalator schedule to $170/t by 2030; (iv) Canada Pension Plan enhancement
  2016 phased from 2019 raising replacement rate from 25% to 33% of pensionable
  earnings; (v) $10-a-day early-learning and child-care agreements with
  provinces from 2021; (vi) immigration-level plan raising permanent-resident
  admissions from ~260k/year (2015) to 465k (2023) plus large temporary-
  resident growth (students, TFW), with partial pullback announced 2024;
  (vii) 2024 federal budget increasing capital-gains inclusion rate from 50%
  to 66.67% above $250k annual threshold for individuals and on all corporate
  gains (partially reversed / deferred in 2025 political churn); (viii)
  Canada Emergency Response Benefit and expanded fiscal response during
  COVID-19 2020-2022; (ix) dental care and pharmacare Bills C-64/C-70
  negotiated under the NDP supply agreement. Proponents frame the package
  as rebuilding the middle class, pricing externalities, and modernising
  social infrastructure; critics frame it as fiscal drift, per-capita
  stagnation, and productivity underinvestment.
policies:
  - canada_carbon_pricing_ghgppa_2018
  - canada_child_benefit_2016
  - canada_cpp_enhancement_2016
  - canada_child_care_10_dollar_day_2021
  - canada_capital_gains_inclusion_2024
  - canada_immigration_levels_plan_2015_present
  - canada_cerb_covid_fiscal_response_2020_2022
  - canada_dental_pharmacare_ndp_agreement_2023_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Federal program spending share of GDP stepped up on housing, childcare, defence, and COVID; deficits sustained post-pandemic."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "CCB, CPP enhancement, $10/day childcare, dental, CERB — explicit transfer-footprint expansion."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "New 33% top bracket at $200k+ (2016); middle-bracket cut; CCB means-tested."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "2024 capital-gains inclusion rate increase 50% → 66.67% above thresholds (subsequently contested / deferred)."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Federal carbon price backstop, Clean Fuel Regulations, methane rules, oil-and-gas emissions cap proposals."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: strong, rationale: "Permanent-resident admissions ~80% increase 2015-2023; temporary-resident growth much larger. Note: 2024-2025 pullback announced but not yet materially delivered at time of coding."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "No material change to Bank of Canada independence; 2021 mandate renewal maintained inflation-target regime with dual-mandate language added."}
outcome_hypotheses:
  - canada_gdp_per_capita_stagnation_post_2015
  - canada_real_disposable_income_post_2015
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "Greenhouse Gas Pollution Pricing Act (S.C. 2018, c. 12, s. 186)"
  - "Budget 2024 (Department of Finance Canada) — capital gains inclusion rate"
  - "Canada Pension Plan enhancement legislation 2016 (Bill C-26)"
  - "Immigration Levels Plan 2023-2025; 2024 revision"
  - "Liberal-NDP Supply-and-Confidence Agreement, March 2022 (terminated September 2024)"
  - "Bank of Canada 2021 Monetary Policy Framework Renewal"
  - "RBC Economics and Bank of Canada speeches on Canadian productivity gap (Rogers 2024)"
notes: >
  Coded as a single continuing movement 2015-present because the doctrinal
  content is continuous across majority (2015-19) and minority (2019-present)
  phases. Framework treats 2024-25 capital-gains inclusion change as enacted
  movement content even though political churn around the May 2024 motion
  has created implementation uncertainty. v2 should split if the post-2024
  leadership transition changes content direction materially.

movement_id: italy_prodi_ii_centre_left_2006_2008
status: candidate
name: "Prodi II Unione centre-left coalition 2006-2008"
countries: [ITA]
timeframe: {start: 2006, end: 2008, enacted_date: "2006-05-17"}
coalition: "L'Unione (Ulivo+PRC+PdCI+Italia dei Valori+UDEUR+others, 9-party alliance)"
leaders:
  - "Romano Prodi (PM)"
  - "Tommaso Padoa-Schioppa (Finance Minister)"
  - "Pier Luigi Bersani (Economic Development)"
doctrine: >
  Second Prodi government — a thin 9-party Unione coalition elected with the
  slimmest post-war Senate margin (158-156). Economic school: centre-left
  deficit-reduction and Bersani liberalisations targeting product-market
  rents. Signature actions: 2007 Finanziaria tightening deficit from 4.4%
  to 1.5% GDP in one year (boosted by one-off EU Treaty-of-Prüm-linked
  receipts); three 'lenzuolate' Bersani decree-laws (Dec 2006, Jan 2007,
  Jun 2007) liberalising pharmacy, taxi, insurance, bank-account switching,
  notary, and legal professions; TFR severance-pay reform directing stocks
  to pension funds; Padoa-Schioppa crackdown on tax evasion adding
  €19bn revenue. Left-right: centre-left with liberal-technocratic accent.
  Popularity: Ulivo 49.8% vote in 2006 general vs Berlusconi's 49.7% — the
  closest post-war Italian result; coalition approval collapsed under internal
  strains (Afghanistan vote, Pecoraro Scanio waste crisis in Campania).
  Coherence: low — the 9-party coalition included reformist PD-predecessors,
  hard-left PRC/PdCI, and centrist UDEUR with incompatible preferences;
  fell Jan 2008 on Mastella UDEUR exit. Early elections Apr 2008 returned
  Berlusconi's PdL.
policies:
  - it_lenzuolate_bersani_2006_2007
  - it_finanziaria_2007_tightening
  - it_tfr_pension_fund_reform_2007
  - it_padoa_schioppa_tax_compliance_2007
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Bersani decrees opened pharmacy, taxi, professional-services entry; bank-switching fee cap."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Deficit 4.4%→1.5% GDP via one-off revenues and spending restraint."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "TFR pension redirection; modest low-wage tax reliefs."}

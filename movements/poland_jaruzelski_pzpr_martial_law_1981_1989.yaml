movement_id: poland_jaruzelski_pzpr_martial_law_1981_1989
status: candidate
name: "Jaruzelski martial-law PZPR — WRON, price reform, Round Table"
countries: [POL]
timeframe: {start: 1981, end: 1989}
coalition: "PZPR + Military Council of National Salvation (WRON, Wojskowa Rada Ocalenia Narodowego)"
leaders:
  - "Wojciech Jaruzelski (Prime Minister Feb 1981-Nov 1985, First Secretary PZPR Oct 1981-Jul 1989, Chairman of State Council 1985-1989, President 1989-1990)"
  - "Czesław Kiszczak (Interior Minister 1981-1990)"
  - "Zbigniew Messner (Prime Minister 1985-1988)"
  - "Mieczysław Rakowski (Prime Minister 1988-1989)"
doctrine: >
  Polish military-led communist regime that imposed martial law
  ("stan wojenny") 13 December 1981 against Solidarność, then spent
  eight years attempting partial economic reform within the
  communist framework before capitulating at the 1989 Round Table.
  School: authoritarian-socialist crisis management — martial-law
  coercion married to tentative enterprise-reform economics ("second
  stage of economic reform" 1982, deeper 1987 plan). Left-right axis:
  far-left / one-party communist with explicit military-authoritarian
  addition; internally the PZPR's pragmatist wing pursued partial
  marketisation. Core policy content: (i) martial law 13 December
  1981 — Solidarność suspended and delegalised October 1982, ~10,000
  internments, Wujek coal-mine massacre 16 December 1981 (9 miners
  killed); (ii) 1982 Reform Package I — partial enterprise autonomy,
  currency zloty devaluations (~50% February 1982 price shock);
  (iii) 1983 amnesty and lifting of martial law 22 July 1983;
  (iv) 1985 Messner government continued austere "three S" programme
  (samodzielność, samofinansowanie, samorządność — self-reliance,
  self-financing, self-management); (v) November 1987 referendum on
  "second stage" radical reform lost (only ~44% yes of eligibles, did
  not meet 50% threshold) — first referendum defeat of regime;
  (vi) 1988 August Solidarność strike wave forced regime to Round
  Table negotiations February-April 1989 legalising Solidarność 17
  April 1989; (vii) 4 June 1989 partially-free elections — Solidarność
  won all contested Sejm seats and 99/100 Senate seats; Jaruzelski
  elected President by one vote, Mazowiecki became first non-communist
  PM September 1989. Popularity signals: massive protest waves 1982,
  1988; 1987 referendum defeat; 1989 election devastating for PZPR;
  Solidarność legal membership rebounded after April 1989. Coherence:
  low — the incoherent attempt to stabilise with coercion and reform
  simultaneously; empirically the end-game of Soviet-bloc communism.
policies:
  - pl_martial_law_december_1981
  - pl_zloty_devaluation_price_reform_1982
  - pl_three_s_reform_1986
  - pl_round_table_agreement_1989

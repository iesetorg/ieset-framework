movement_id: uk_blair_first_second_term_1997_2005
status: candidate
name: Blair New Labour first and second terms
countries:
- GBR
timeframe:
  start: 1997
  end: 2005
coalition: Labour (New Labour)
leaders:
- Tony Blair (PM)
- Gordon Brown (Chancellor)
- John Prescott (Deputy PM)
- Peter Mandelson (Business/Cabinet)
doctrine: 'Economic school: Blair/Brown Third Way stealth-orthodoxy — accepted Thatcherite supply-side
  frame (privatisation retained, Bank of England operational independence granted May 1997, Golden
  Rule fiscal framework, flexible labour market) combined with targeted redistribution and large
  public-service investment post-2000. Left-right axis: centre-left on spending and tax-credits,
  centre-right on labour markets and macro policy. Dated policies: Bank of England Act 1998 granting
  independence (act 1 June 1998, operational from 6 May 1997 announcement), windfall tax on privatised
  utilities 1997, Sure Start programme 1998, National Minimum Wage Act 1998 (in force April 1999),
  Working Families Tax Credit 1999 → Working/Child Tax Credits 2003, Working Time Regulations
  1998 (EU Directive transposition), NHS Plan 2000 with spending rising from 5.2% to ~7.5% of
  GDP, Iraq invasion March 2003, Higher Education Act 2004 variable tuition fees. Popularity:
  1997 landslide 418 seats / 43.2%; 2001 413 / 40.7%; 2005 reduced but still majority 355 / 35.2%
  after Iraq backlash. Coherence: high in first term (Third Way reconciliation); strained in second
  term by Iraq and internal Blair-Brown tension.

  '
policies:
- uk_bank_of_england_independence_1997

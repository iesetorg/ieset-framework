axes_summary:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: Bank of England Act 1998 granted operational independence for interest-rate setting.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  rationale: NMW introduction and Working Time Directive transposition narrowed flexibility at
    the margin; broader EPL architecture left intact.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: WFTC/CTC tax-credit expansion; Sure Start; pension credit 2003.
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: NHS spending share rose from ~5.2% to ~7.5% of GDP; general gov spend from 36% (1999)
    toward 40%+ (2005).
- axis: fiscal.tax_progressivity
  direction: +
  magnitude: weak
  rationale: Tax-credit expansion raised effective progressivity at the bottom; top rate held
    at 40%.

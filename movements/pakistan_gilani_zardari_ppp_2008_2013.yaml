  - "7th NFC Award, 30 December 2009"
  - "Supreme Court of Pakistan, Gilani contempt-of-court disqualification, 26 April / 19 June 2012"
  - "IMF SBA reviews 2008-2011 (Country Report Pakistan series)"
notes: >
  Gilani and Ashraf PMs combined into one movement under Zardari
  presidency because the doctrinal programme is single-track PPP;
  short Ashraf tenure (9 months) executed no distinct agenda beyond
  Gilani inheritance.

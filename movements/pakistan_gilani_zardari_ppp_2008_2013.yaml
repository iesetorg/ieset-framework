  - {position_id: classical_liberal, alignment: opposed, notes: "Fiscal-dominance over monetary policy + energy-sector circular debt illustrate failure modes."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "BISP cash-transfer design evidence-based; not scaled to macro stabilisation."}
references:

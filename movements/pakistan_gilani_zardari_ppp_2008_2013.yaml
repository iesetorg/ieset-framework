movement_id: pakistan_gilani_zardari_ppp_2008_2013
status: candidate
name: "Gilani-Zardari PPP — 18th Amendment, NFC Award, energy-crisis cabinet"
countries: [PAK]
timeframe: {start: 2008, end: 2013, enacted_date: "2008-03-25"}
coalition: "PPP-led coalition (with ANP, MQM, JUI-F at various points); Yousaf Raza Gilani PM, then Raja Pervaiz Ashraf; Asif Ali Zardari President"
leaders:
  - "Asif Ali Zardari (President, 9 Sep 2008 - 9 Sep 2013, Benazir Bhutto widower)"
  - "Yousaf Raza Gilani (PM, 25 Mar 2008 - 19 Jun 2012, disqualified by Supreme Court)"
  - "Raja Pervaiz Ashraf (PM, 22 Jun 2012 - 24 Mar 2013)"
  - "Shaukat Tarin / Abdul Hafeez Shaikh (Finance)"
  - "Shahid Hafiz Kardar / Yaseen Anwar (SBP Governor)"
doctrine: >
  PPP constitutional-reform plus energy-crisis-ridden democratic-restoration
  doctrine — first full civilian government after nine years of Musharraf
  military rule. Programme on paper combined three major institutional
  achievements: (1) 18th Constitutional Amendment (April 2010) devolved
  substantial powers from federation to provinces, abolished the Concurrent
  List, removed presidential dissolution powers (Article 58(2)(b) repeal),
  renamed NWFP to Khyber Pakhtunkhwa, and restored parliamentary supremacy;
  (2) 7th National Finance Commission Award (December 2009) raised
  provincial share of divisible federal pool from 47.5% to 57.5%, first
  multi-criteria formula beyond pure population-based distribution; (3)
  Benazir Income Support Programme (BISP) launched 2008, becoming Pakistan's
  first national unconditional cash transfer. Macro execution disastrous:
  structural energy shortages grew to 18+ hours daily loadshedding in 2012,
  circular-debt crisis paralysed power sector, IMF SBA November 2008 $7.6bn
  (raised to $11.3bn) abandoned 2011 over reform non-compliance, fiscal
  deficit 6-8% of GDP persistent, inflation 10-14%, rupee depreciation,
  memo-gate scandal, Kerry-Lugar-Berman conditionality friction, OBL raid
  May 2011 civilian-military strain, Gilani disqualified by Supreme Court
  June 2012 for refusing to write to Swiss authorities re Zardari cases.
  Despite all this, first elected government to complete full constitutional
  five-year term — May 2013 election handed power peacefully to PML-N.
  Coherence line: historic democratic-transition institutional reforms
  (18A, NFC, BISP) amid severe energy-crisis economic mismanagement.
policies:
  - pk_18th_constitutional_amendment_2010
  - pk_7th_nfc_award_2009
  - pk_benazir_income_support_programme_2008
  - pk_imf_sba_2008_2011
  - pk_circular_debt_energy_crisis_2008_2013
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "18th Amendment restored parliamentary supremacy, removed presidential dissolution power; first civilian-to-civilian democratic transfer at term end."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "Devolution strengthened sub-national governance; macro instability offset."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "BISP national UCT reached ~5.4m households by 2013."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Provincial spending expanded post-7th NFC; federal deficit 6-8% GDP persistent."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: strong, rationale: "Circular debt + loadshedding 18+ hrs/day 2012; industrial output damaged."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: weak, rationale: "SBP governor Kardar resigned 2011 citing fiscal-dominance pressure."}
predecessor_movements:
  - pakistan_musharraf_military_1999_2008
successor_movements:

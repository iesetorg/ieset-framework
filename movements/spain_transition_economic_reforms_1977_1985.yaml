# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: spain_transition_economic_reforms_1977_1985
status: candidate
name: "Spain democratic transition economic reforms"
countries: [ESP]
timeframe: {start: 1977, end: 1985}
coalition: "UCD (Suárez, Calvo-Sotelo) 1977-1982; PSOE (González) from October 1982"
leaders:
  - "Adolfo Suárez (PM 1976-1981, UCD)"
  - "Enrique Fuentes Quintana (Deputy PM for Economic Affairs 1977, architect of Moncloa)"
  - "Leopoldo Calvo-Sotelo (PM 1981-1982)"
  - "Felipe González (PM from 1982, PSOE)"
  - "Miguel Boyer (Economy Minister 1982-1985)"
  - "Carlos Solchaga (Industry then Economy Minister)"
doctrine: >
  Stabilisation, structural adjustment, and European integration under
  the first post-Franco democratic governments. Moncloa Pacts (25 October
  1977) cross-party social and economic agreement: 20% peseta devaluation
  (July 1977, preceding), wage moderation indexed to expected rather than
  past inflation, monetary targeting, tax reform (Ley 50/1977 introducing
  personal income tax IRPF under Fuentes Quintana and Fernández Ordóñez),
  fiscal consolidation commitments, and labour-relations reform groundwork
  leading to the 1978 Workers' Statute (Estatuto de los Trabajadores,
  Ley 8/1980). 1978 Constitution codified property rights and a
  decentralised autonomous-community structure. PSOE 1982-1985 phase
  pursued industrial reconversion (reconversión industrial of steel,
  shipbuilding, white goods) under Solchaga, peseta devaluations
  (December 1982, then within 1983), disinflation, and Banco de España
  operational reforms. EEC accession treaty signed 12 June 1985,
  effective 1 January 1986; parallel NATO membership (entry 1982,
  referendum confirmation 1986). Programme framed by proponents as
  reconciling democratic consolidation with price stability, opening to
  Europe, and industrial modernisation.
policies:
  - spain_moncloa_pacts_1977
  - spain_irpf_tax_reform_1978
  - spain_peseta_devaluation_1977
  - spain_workers_statute_1980
  - spain_industrial_reconversion_1983_1985
  - spain_eec_accession_treaty_1985
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: strong, rationale: "Ley 50/1977 introduced modern progressive IRPF; replacement of prior schedular system."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Industrial reconversion reduced state-protected capacity; EEC accession preparation required competition-policy alignment."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Peseta devaluations and EEC accession treaty 1985 for 1986 entry; tariff harmonisation commitments."}
  - {axis: regulatory.labour_market_flexibility, direction: "mixed", rationale: "Workers' Statute 1980 codified dismissal protections but also enabled fixed-term contracts from 1984 (Ley 32/1984) — two-tier labour market emerges."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "1978 Constitution and Tribunal Constitucional established rule-of-law substrate post-Francoist regime."}
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Cross-party technocratic stabilisation under democratic transition pressure."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "PSOE 1982-1985 phase; reforms are market-opening but within Western European social-democratic frame."}
  - {position_id: ordoliberal, alignment: partially_aligned}
references:
  - "Pactos de la Moncloa, 25 October 1977"
  - "Ley 50/1977 (IRPF)"
  - "Ley 8/1980 (Estatuto de los Trabajadores)"
  - "Treaty of Accession, Spain and Portugal to the EEC, signed 12 June 1985"
  - "Fuentes Quintana ed. (1999), Economía y economistas españoles"
  - "Maravall (1993), 'Politics and Policy: Economic Reforms in Southern Europe'"
notes: "Pre-1996 sample extension. Spans UCD and early PSOE deliberately: the transition programme is coded as one continuing movement because economic content is continuous across the 1982 government change."

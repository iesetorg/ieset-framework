# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bolivia_arce_mas_2020_present
status: candidate
name: "Arce MAS model-preservation and dollar crisis (Bolivia)"
countries: [BOL]
timeframe: {start: 2020, end: ongoing}
coalition: "MAS-IPSP (Arcista faction after 2023-24 split with Evista faction)"
leaders:
  - "Luis Arce (President 2020-present)"
  - "David Choquehuanca (Vice-President)"
  - "Marcelo Montenegro (Economy & Finance Minister)"
doctrine: >
  Return of the Morales-era finance minister and self-described architect of
  the "Modelo Económico Social Comunitario Productivo" to the presidency on
  a platform of restoring the pre-2019 growth-with-redistribution formula:
  maintain the fixed exchange-rate peg (USD/BOB 6.96 since 2011), preserve
  universal fuel subsidies, continue cash transfers, and finance state-led
  industrialisation of lithium (YLB, contracts with Chinese CBC and Russian
  Uranium One signed 2023) and urea. The model began cracking in 2022-2023
  as BCB net international reserves fell below USD 2bn, gas export revenues
  collapsed with reserve depletion, and a parallel dollar market emerged at
  30-50% premium. The June 2023 debt-ceiling fight and 2024 fuel-import
  shortages (queues at pumps, subsidy bill ~USD 3bn/yr) exposed the peg-plus-
  deficit vulnerability. Politically, the MAS split between Arce and Morales
  hardened in 2024 — Morales barred from running — and a short-lived military
  uprising led by General Zúñiga occurred June 26 2024. Arce entered 2025
  with single-digit approval and fuel crisis unresolved.
policies:
  - bo_litio_industrialisation_ylb
  - bo_arce_fuel_subsidy_maintenance_2020
  - bo_dollar_peg_defence_2023_2024
  - bo_imf_rfi_cancellation_2020
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Universal fuel subsidy maintained despite fiscal cost and dollar scarcity."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Bono contra el Hambre 2020; pre-existing bonos maintained and indexed."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "BCB reserves drawn to defend peg; gold monetisation law 2023 authorised reserve sales."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "YLB state monopoly on lithium with Chinese/Russian technology partners."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "FX rationing operated as de facto import restriction in 2023-2024."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "MAS internal split contested via judicial decisions on party registration; Morales barred from 2025 race."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
predecessor_movements:
  - bolivia_anez_interim_2019_2020
  - bolivia_mas_extractivist_2006_2019
references:
  - "BCB Memoria Institucional 2020-2023"
  - "IMF Article IV Bolivia 2023"
  - "Ley 1503 (2023) monetisation of gold reserves"
  - "Zúñiga military uprising, June 26 2024 reporting"
notes: >
  Arce won 2020 with 55.1% first round. The framework should pick up the
  peg-plus-deficit stress test forecast under the 2006-2019 umbrella entry.

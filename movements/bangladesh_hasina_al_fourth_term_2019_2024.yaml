# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bangladesh_hasina_al_fourth_term_2019_2024
status: candidate
name: "Hasina Awami League fourth term"
countries: [BGD]
timeframe: {start: 2019, end: 2024}
coalition: "Awami League (AL) with Jatiya Party as token parliamentary opposition; 14-Party Alliance. 2018 election 288/300 AL+allies; 2024 boycotted election 222/300 direct AL (AL+independents-close-to-AL ~289/350 of total house including reserved seats)."
leaders: ["Sheikh Hasina (PM)", "A. H. M. Mustafa Kamal (Finance)", "Salman F. Rahman (PM adviser)", "Obaidul Quader (AL General Secretary)"]
doctrine: >
  Hasina one-party-dominant developmentalism combining infrastructure mega-
  projects (Padma Bridge opening June 2022, Rooppur Nuclear Power Plant,
  Dhaka Metro Rail Line 6 December 2022, Matarbari deep-sea port, Karnaphuli
  tunnel), RMG export-led growth, digital-Bangladesh service-economy push,
  and authoritarian consolidation via the Digital Security Act 2018 (replaced
  by the Cyber Security Act 2023 in name only). Coherence line: "Vision
  2041 / Smart Bangladesh" middle-income-by-design through state-directed
  investment while compressing civic space. Economically nominally centre-
  left (state-led, subsidy-heavy) but operationally authoritarian-
  developmentalist with crony concentration in banking and power. The term
  ran through the COVID shock, a severe forex crisis of 2022-2024
  (reserves falling from $48bn to under $20bn net), acceptance of an IMF
  $4.7bn ECF/EFF/RSF in January 2023, and the January 2024 boycotted
  election (AL + friendly independents 289/350 seats; turnout disputed).
  Popularity eroded through 2023-2024 quota-reform protests culminating in
  the July Revolution that ended the movement on 5 August 2024.
policies:
  - bd_padma_bridge_2022
  - bd_cyber_security_act_2023
  - bd_imf_ecf_2023
  - bd_rooppur_nuclear_2017
  - bd_dhaka_metro_line6_2022
  - bd_forex_crawling_peg_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Mega-project capex cycle; Annual Development Programme ~6-7% of GDP."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Energy/fertiliser/RMG cash incentives; rental-power capacity payments."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "DSA/CSA prosecutions; enforced disappearances documented by UN OHCHR."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Executive pressure on judiciary; CJ Sinha forced resignation precedent."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "IMF-ECF tariff rationalisation and FX crawling-peg from May 2024."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Bangladesh Bank under finance-ministry direction; interest-rate cap 2020-2023."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: institutionalism, alignment: opposed, notes: "Erosion of checks-and-balances inconsistent with institutionalist priors."}
predecessor_movements: [bangladesh_hasina_al_2_3_term_2009_2018]
successor_movements: [bangladesh_yunus_interim_2024_present]
references:

movement_id: greece_simitis_pasok_1996_2004
status: candidate
name: 'Simitis PASOK ''modernisation'': euro entry, Athens Olympics 2004'
countries:
- GRC
timeframe:
  start: 1996
  end: 2004
coalition: 'PASOK majority (1996-2000: 162 seats; 2000-2004: 158 seats)'
leaders:
- Costas Simitis (PM)
- Yannos Papantoniou (National Economy Minister 1994-2001)
- Nikos Christodoulakis (Economy/Finance Minister 2001-2004)
- Lucas Papademos (Bank of Greece Governor 1994-2002, later PM 2011-12)
doctrine: 'Self-styled ''modernisation'' (εκσυγχρονισμός) programme: explicit convergence with
  EU mainstream across macro policy, infrastructure, and institutional design. Economic school:
  Third Way social- democratic with strong ordoliberal macro discipline. Left-right axis: centre-left.
  Key content: (i) Euro qualification and entry 1 January 2001 (one year late) — drachma central
  rate fixed 340.75/euro; Papademos chaired; (ii) Bank of Greece independence Law 2548/1997 of
  2 December 1997; (iii) Privatisations accelerated — OTE partial 1996 and 1998 tranches; DEH/PPC
  partial 2001; Olympic Airways restructuring; Emporiki Bank 1999; (iv) Pension reform attempt
  2001 Reppas bill — withdrawn after strikes; Giannitsis reform 2001-2002 partial; (v) Athens
  2004 Olympics (hosting won 1997, Games 13-29 August 2004) — major infrastructure: new airport
  Eleftherios Venizelos opened March 2001, Athens metro expansions, Attiki Odos 65km motorway,
  proastiakos suburban rail; (vi) Pyrgos/Ionia reforms of public administration 1998-2002; (vii)
  EU structural funds CSF II continuation and CSF III 2000-2006 (~€22bn); (viii) Tax reforms Law
  2459/1997 real-estate tax; (ix) Currency — drachma devalued 14% within ERM 16 March 1998 in
  convergence run-in; (x) Stability-and-Growth programme commitments with later-revealed statistical
  issues (Eurostat revisions 2004-05 under successor Karamanlis); (xi) 2001 Constitutional Revision
  on judicial-independence provisions; (xii) OASA Athens public-transport reform. Popularity:
  September 1996 PASOK 41.5% / 162 seats; April 2000 PASOK 43.8% / 158 seats (narrow victory over
  ND 42.7%); March 2004 ND 45.4% / 165 seats landslide win under Karamanlis ended 11 years PASOK
  rule. Coherence: high — euro + infrastructure modernisation + central-bank independence + privatisation
  cohered as a single ''catch-up'' programme; later-revealed statistical inaccuracies in Eurostat
  submissions compromised the record.

  '

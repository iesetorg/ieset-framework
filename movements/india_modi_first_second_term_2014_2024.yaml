axes_summary:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: strong
  rationale: Corporate tax cut from 30% to 22% (15% for new manufacturing) in Sep 2019 — one of
    the largest corporate-rate cuts in Indian history.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: strong
  rationale: PLI scheme outlay ~₹1.97 trillion across 14 sectors; electronics, pharma, auto, semiconductors,
    solar, food-processing.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: PM-KISAN cash transfer, Ayushman Bharat health cover for 500m, PMAY housing, PMGKY
    free foodgrains during COVID.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: GST unified national market; IBC creditor-driven resolution; Jan Vishwas decriminalisation;
    FDI liberalisation in defence, retail, insurance.
- axis: regulatory.trade_openness
  direction: mixed
  magnitude: moderate
  rationale: Exited RCEP Nov 2019; raised tariffs on electronics and select imports; offset by
    signed FTAs with UAE (2022) and Australia (2022).
- axis: institutional.rule_of_law
  direction: mixed
  magnitude: moderate
  rationale: IBC and GST strengthened rule-based economic architecture; ED/IT investigative-agency
    use against opposition and CAA/UAPA amendments pulled the other way.
- axis: institutional.property_rights
  direction: mixed
  magnitude: weak
  rationale: RERA strengthened homebuyer protections; demonetisation arbitrary legal-tender voiding
    and retro-tax settlements moved the opposite way.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: weak
  rationale: Executive-judiciary tension over collegium appointments; electoral bonds scheme struck
    down by Supreme Court Feb 2024.

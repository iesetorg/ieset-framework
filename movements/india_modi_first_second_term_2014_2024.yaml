doctrine: 'Hindutva-economic-nationalism combined with supply-side market reform and welfare-transfer
  digitisation. Economic school: (i) supply-side manufacturing push — Make in India (Sep 2014),
  corporate tax cut from 30% to 22% (22% for existing / 15% for new manufacturing) via Taxation
  Laws (Amendment) Ordinance 20 Sep 2019, Production-Linked Incentive (PLI) scheme launched March
  / October 2020 across 14 sectors (~₹1.97 trillion outlay); (ii) welfare- transfer digitisation
  via JAM trinity (Jan Dhan bank accounts from Aug 2014, Aadhaar universal ID, Mobile) enabling
  Direct Benefit Transfer for LPG subsidy, MGNREGA wages, PM-KISAN (₹6000/yr cash to farmers from
  Feb 2019), Ayushman Bharat health insurance (PM-JAY launched 23 Sep 2018 covering 500m people
  up to ₹5 lakh); (iii) indirect-tax unification via Goods and Services Tax (Constitutional 101st
  Amendment 2016, GST live 1 Jul 2017) replacing ~17 central+state levies; (iv) insolvency reform
  via Insolvency and Bankruptcy Code (28 May 2016) creating National Company Law Tribunal creditor-driven
  resolution; (v) demonetisation 8 Nov 2016 overnight voiding of ₹500 and ₹1000 notes (86% of
  cash in circulation) with stated aims of black-money / counterfeiting / digitisation; (vi) infrastructure-capex
  push — national highway construction doubled, Vande Bharat trains, Bharatmala + Sagarmala, Gati
  Shakti 2021 integrated infra plan; (vii) real-estate regulation via RERA (2016) and REIT enabling;
  (viii) cultural-legislation agenda hardening in the second term — abrogation of Article 370
  of the Constitution re Jammu & Kashmir (5 Aug 2019), Citizenship Amendment Act (11 Dec 2019)
  fast-tracking citizenship for non- Muslim refugees from three neighbours, Ram Janmabhoomi temple
  consecration (Jan 2024), National Education Policy 2020 restructuring schooling and higher education;
  (ix) farm-laws package (three Acts passed Sep 2020) liberalising agricultural marketing — repealed
  Nov 2021 after year-long farmer protests at Delhi borders; (x) Digital India platform build
  (UPI, DigiLocker, CoWIN, ONDC) with UPI scaling from near-zero 2016 to ~14 billion monthly transactions
  by 2024. Economically right-of-centre on corporate, FDI, trade facilitation; culturally hard-right
  on religious-identity legislation. Popularity: 2014 31.0% vote / 282 BJP seats (NDA 336); 2019
  37.4% vote / 303 BJP seats (NDA 353) — strongest consecutive BJP mandate in history. Modi approval
  consistently 55-70% across tenure per multiple trackers. Coherence line: digital-rails welfare
  + supply-side corporate competitiveness + majoritarian cultural legislation delivered via absolute
  parliamentary majority.

  '

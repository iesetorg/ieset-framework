movement_id: turkey_erdogan_presidential_system_2018_2023
status: candidate
name: "Erdoğan presidential-system era (Turkey 2018-2023)"
countries: [TUR]
timeframe: {start: 2018, end: 2023, enacted_date: "2018-06-24"}
coalition: "Cumhur İttifakı — AKP + MHP (Nationalist Action); post-2018 executive presidency"
leaders:
  - "Recep Tayyip Erdoğan (executive President from 24 Jun 2018)"
  - "Berat Albayrak (Treasury & Finance 2018-Nov 2020)"
  - "Lütfi Elvan (Treasury & Finance 2020-2021)"
  - "Nureddin Nebati (Treasury & Finance 2021-2023)"
  - "CBRT governors: Çetinkaya, Uysal, Ağbal, Kavcıoğlu (four in four years)"
doctrine: >
  Full heterodox "Erdoğanomics" phase under the newly-inaugurated executive
  presidency. Economic school: explicit rejection of Taylor-rule monetary
  policy — the claim that high policy rates CAUSE inflation (reverse
  causality), operationalised by cutting CBRT rates from 19% (Sep 2021) to
  8.5% (Feb 2023) while inflation accelerated from ~19% to a peak of 85.5%
  (Oct 2022). Governor Naci Ağbal was dismissed 20 Mar 2021 after a single
  rate hike; his replacement Şahap Kavcıoğlu delivered the cut cycle.
  Lira collapsed from ~4.5/USD (Aug 2018 crisis on Brunson tensions) to
  ~27/USD (May 2023) — cumulative depreciation above 80%. FX-protected
  deposit scheme (KKM, Kur Korumalı Mevduat) introduced 20 Dec 2021
  transferred currency risk to the sovereign balance sheet. Left-right:
  economic-nationalist, increasingly-authoritarian, Islamic-conservative;
  alliance with MHP deepened securitised nationalism. Key events: executive
  presidency Jun 24 2018, Aug 2018 lira crisis (Brunson sanctions), Mar 2019
  local elections (CHP took Istanbul + Ankara; Istanbul re-run Jun 2019
  Imamoğlu won 54%), Covid shock 2020, KKM Dec 2021, 85% CPI Oct 2022,
  Kahramanmaraş earthquake 6 Feb 2023 (>50,000 dead), presidential election
  May 14 + runoff May 28 2023 (Erdoğan 52.18% vs Kılıçdaroğlu 47.82%),
  post-election Şimşek pivot Jun 2023. Popularity: Erdoğan 52.6% in 2018
  first round, 52.18% 2023 runoff; AKP Meclis seats 295 (2018) and 267
  (2023) of 600. Coherence: presidential-system consolidation plus
  unorthodox monetary experiment, ended (partially) only at the 2023
  ballot box and subsequent orthodoxy pivot.
policies:
  - tr_executive_presidency_inauguration_2018
  - tr_lira_crisis_brunson_2018
  - tr_kkm_fx_protected_deposits_2021
  - tr_cbrt_governor_dismissals_2019_2021
  - tr_earthquake_response_fiscal_package_2023
  - turkey_erdogan_low_rate_heterodoxy_2021_2023
axes_summary:

  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Rate cuts during 85% CPI are deeply expansionary vs Taylor."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "BDDK macroprudential micromanagement and FX-access restrictions tightened case-by-case."}

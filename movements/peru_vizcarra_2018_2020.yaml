  - {position_id: institutionalism, alignment: aligned, notes: "Anti-corruption referendum, JNJ reform, confrontation with captured Congress aligned with institutional-quality doctrine."}
references:
  - "JNE / ONPE, Referéndum Nacional 9 diciembre 2018 resultados"
  - "Decreto Supremo N° 165-2019-PCM (congressional dissolution decree)"
  - "Tribunal Constitucional Expediente 0006-2019-CC (validity of dissolution)"
  - "Decreto Legislativo N° 1455 (Reactiva Perú) 2020"
  - "Decreto de Urgencia 027-2020 (Bono Universal)"
  - "IMF Article IV Peru 2019"
notes: >
  Popularity peaked at ~79% approval in early 2019 post-
  referendum (IEP); eroded to ~39% at time of vacancy (IEP Nov
  2020). The November 2020 vacancy under "permanent moral
  incapacity" triggered days of mass protest (two civilian
  deaths under the Merino interim presidency) and forced
  Merino's resignation after five days in favour of Francisco
  Sagasti as caretaker. Coherence: anti-corruption intent
  executed partially despite coalition absence; macro framework
  stable throughout.

movement_id: peru_vizcarra_2018_2020
status: candidate
name: "Vizcarra — anti-corruption reformer (Peru)"
countries: [PER]
timeframe:
  start: 2018
  end: 2020
  enacted_date: "2018-03-23"
coalition: "Peruanos por el Kambio (PPK) as vice-president, then governing as independent after formally leaving the party in September 2018. Minority executive (PPK shrunk to ~5 seats) operating against a Fuerza Popular (fujimorista) majority in the 2016-2019 Congress; post-dissolution 2020-2021 Congress was fragmented (nine parties, no dominant bloc)."
leaders:
  - "Martín Vizcarra (President 2018-2020)"
  - "César Villanueva / Salvador del Solar / Vicente Zeballos / Walter Martos (rotating Prime Ministers)"
  - "David Tuesta / Carlos Oliva / María Antonieta Alva (Economy Ministers)"
doctrine: >
  Pragmatic liberal-centrist anti-corruption reformer facing
  sustained congressional obstruction. Vizcarra inherited the
  presidency in March 2018 after Pedro Pablo Kuczynski's
  resignation amid Odebrecht and vote-buying revelations, and
  governed without a party. Core doctrine: preserve the 1993-
  Constitution macro framework (BCRP independence, fiscal rules,
  trade openness, FTA network, Alianza del Pacífico
  commitments); push a targeted institutional-reform package
  against systemic corruption exposed by Lava Jato, including a
  four-question anti-corruption referendum (9 December 2018)
  that reformed the CNM into the Junta Nacional de Justicia,
  reintroduced bicameralism (rejected), banned immediate
  re-election of legislators, and regulated private campaign
  finance. Escalating executive-legislative conflict: two
  confidence votes invoking the "cuestión de confianza"
  mechanism of Art. 134; on 30 September 2019 Vizcarra
  dissolved Congress citing de-facto denial of confidence after
  fujimorista obstruction of Constitutional Tribunal
  appointments — a constitutionally contested but ultimately
  upheld move, producing snap elections in January 2020. Covid
  response (March 2020 onward) included one of the earliest and
  longest regional lockdowns plus the Reactiva Perú credit-
  guarantee programme (~8% of GDP) and cash transfers (Bono
  Universal). On 9 November 2020 the newly-elected Congress
  vacated Vizcarra via the "permanent moral incapacity" clause
  over construction-kickback allegations from his tenure as
  Moquegua regional governor — a highly contested use of the
  vacancy mechanism. IESET codes Vizcarra as neutral-to-
  positive on rule-of-law (anti-corruption referendum, JNJ
  reform) and neutral on market-content (macro continuity, no
  substantive liberalisation or re-regulation).
policies:
  - pe_anti_corruption_referendum_2018
  - pe_congressional_dissolution_2019
  - pe_reactiva_peru_covid_response_2020
  - pe_bono_universal_covid_2020
  - pe_vizcarra_vacancy_nov_2020
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "2018 anti-corruption referendum; Lava Jato prosecutions advanced; JNJ replaced compromised CNM."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "CNM-to-JNJ reform reduced partisan capture of judicial appointments; Constitutional Tribunal appointment process contested."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Bono Universal, Bono 600, Bono Yo Me Quedo en Casa — emergency Covid cash transfers; Reactiva Perú credit-guarantee fiscal footprint."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Covid response expanded general government spending; deficit widened to ~8.9% of GDP in 2020 before consolidation resumed."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "Macro continuity; FTA network and Alianza del Pacífico preserved; no material tariff changes."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BCRP autonomy preserved; policy response coordinated but not politicised."}
outcome_hypotheses:
  - anti_corruption_referendum_rule_of_law_effect
predecessor_movements:

  - "Dáil Éireann Debates, Budget 1981"
  - "NESC Report 89 (1990), A Strategy for the Nineties"
  - "Honohan & Walsh (2002), 'Catching Up with the Leaders: The Irish Hare'"
notes: "Pre-1996 sample extension. Canonical small-open-economy populist-expansion case study preceding the PNR 1987 corporatist adjustment."

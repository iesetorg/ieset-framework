# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: india_manmohan_singh_upa_i_2004_2009
status: candidate
name: "Manmohan Singh UPA-I — rights-based welfare plus liberalisation continuity (2004-2009)"
countries: [IND]
timeframe:
  start: 2004
  end: 2009
  enacted_date: "2004-05-22"
coalition: "United Progressive Alliance I — INC-led, with external Left Front support (CPI-M, CPI, RSP, AIFB) until July 2008 nuclear-deal walkout; RJD, DMK, NCP internal"
leaders:
  - "Manmohan Singh (PM 22 May 2004 - 22 May 2009)"
  - "Sonia Gandhi (INC President, National Advisory Council chair)"
  - "P. Chidambaram (Finance)"
  - "Pranab Mukherjee (External Affairs, then Finance 2009)"
  - "Y. V. Reddy → D. Subbarao (RBI Governor, September 2008)"
doctrine: >
  INC-led centre-left rights-based welfare plus 1991-lineage
  liberalisation continuity — Singh, architect of the 1991 reform,
  preserved pro-market macro framing while Sonia Gandhi's NAC drove
  rights-based entitlement expansions. Economic school: hybrid
  social-democratic rights framework on top of liberal-orthodox
  macro — fiscal deficit targets softened during 2008 global crisis.
  Centre-left on distribution, centre-right on trade and finance,
  strategic-autonomy on foreign policy (US nuclear deal included).
  Key policy content: (i) NREGA / MGNREGA 2005 — 100-day rural
  employment guarantee, largest workfare programme in the world
  by enrolment; (ii) Right to Information Act October 2005 —
  statutory transparency right extending to all central and state
  bodies; (iii) SEZ Act June 2005 enabling duty-free manufacturing
  zones; (iv) Indo-US Civil Nuclear Agreement signed October 2008
  after Left-Front walkout and IAEA+NSG clearances; (v) Bharat
  Nirman infrastructure push 2005 — rural roads, irrigation,
  drinking water, housing; (vi) Forest Rights Act 2006 recognising
  adivasi land claims; (vii) Sixth Pay Commission implemented 2008-
  09 — 40% public-sector salary uplift; (viii) 2008 global crisis
  response: ¥1.86tn fiscal stimulus (~3.5% GDP) across three tranches
  plus RBI rate cuts from 9% to 4.75%; (ix) sustained 8-9% GDP
  growth 2004-2008, slowed to 6.7% (2008-09). Popularity: 2004
  UPA 218/543 seats plus Left Front 59; 2009 UPA re-elected 262/543
  with INC alone up to 206 — the rare incumbent-returning mandate.
  Coherence line: rights-based welfare expansion plus macroprudential
  continuity plus strategic-opening to US — the doctrine UPA-II would
  then stretch to breaking point on inflation and scandals.
policies:
  - in_nrega_mgnrega_2005
  - in_right_to_information_act_2005
  - in_sez_act_2005
  - in_indo_us_civil_nuclear_deal_2008
  - in_bharat_nirman_programme_2005
  - in_sixth_pay_commission_2008
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "NREGA created statutory 100-day rural workfare right; scaled to ~50m households by 2009."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "2008 crisis stimulus ~3.5% GDP; Sixth Pay Commission 40% salary uplift; Bharat Nirman infra."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "RTI Act 2005 created enforceable transparency right across all levels of government."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "SEZ Act duty-free manufacturing; tariff rationalisation continued; FDI caps eased in telecoms, aviation."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Forest Rights Act 2006 formalised adivasi title — a property-rights extension to marginalised claimants."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "RBI policy repo cut from 9% (July 2008) to 4.75% (April 2009) during global crisis."}
position_alignments:
  - {position_id: social_democratic, alignment: aligned, notes: "NREGA and RTI are flagship social-democratic rights-based policies."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "NREGA self-selection design treats anti-poverty as measurable targeting problem."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "1991-era macro liberalism preserved; NREGA entitlement opposed on efficiency grounds."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Bharat Nirman and SEZ infra continuity."}
references:
  - "National Rural Employment Guarantee Act 2005"
  - "Right to Information Act 2005"
  - "SEZ Act 2005"
  - "Indo-US 123 Agreement, October 2008"
  - "RBI Annual Report 2008-09"
notes: >
  UPA-I treated as distinct from UPA-II because (i) Left Front
  external support structurally present until July 2008, (ii) pre-
  crisis growth regime vs post-crisis stagflation-and-scandal era,
  (iii) signature policies (NREGA, RTI, nuclear deal) concentrated
  in this term.

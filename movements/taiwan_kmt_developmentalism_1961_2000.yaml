movement_id: taiwan_kmt_developmentalism_1961_2000
status: candidate
name: KMT developmentalist Taiwan (Chiang Ching-kuo + Lee Teng-hui era, 1961-2000)
countries:
- TWN
timeframe:
  start: 1973
  end: 1987
doctrine: 'KMT government under premier Chiang Ching-kuo and economic minister K.T. Li directing
  upgrading of Taiwan''s industrial base through public-research-led entry into electronics. The
  Industrial Technology Research Institute (ITRI) was founded in 1973 as a state-affiliated applied-research
  organisation; technology-licensing agreements with RCA from 1976 transferred IC fabrication
  know-how, leading to the 1980 spin-out of United Microelectronics Corporation and the 1987 spin-out
  of Taiwan Semiconductor Manufacturing Company (TSMC) as a dedicated-foundry pioneer. Companion
  measures included the 1980 Hsinchu Science-based Industrial Park with tax holidays and customs
  preferences, returnee-engineer recruitment from Silicon Valley, and development-bank credit
  for capital-intensive fabrication investments. Stated case: build indigenous capability in strategic
  high-technology sectors via state-funded R&D and pilot production rather than blanket protection,
  then spin viable units to the private sector to scale and compete internationally.

  '

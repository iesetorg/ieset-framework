movement_id: greece_papandreou_pasok_iii_2009_2011
status: candidate
name: "Papandreou PASOK crisis-and-first-Memoranda government 2009-2011"
countries: [GRC]
timeframe: {start: 2009, end: 2011, enacted_date: "2009-10-06"}
coalition: "PASOK majority (160/300)"
leaders:
  - "George Papandreou (PM)"
  - "George Papaconstantinou / Evangelos Venizelos (successive Finance Ministers)"
doctrine: >
  PASOK government whose first action — revising the 2009 budget deficit from
  Karamanlis-government 6% estimate to 12.7% (eventually 15.4%) on Eurostat
  reconciliation — ignited the Greek and euro-area sovereign crisis.
  Economic school: forced centre-left austerity under EU-IMF-ECB troika
  Memoranda. Signature actions: First Memorandum (May 2010 €110bn, fiscal
  measures ~16% GDP) — VAT 19%→23%, minimum-wage freeze then cut,
  public-sector headcount freeze, reduction of 13th/14th-month salaries for
  civil servants, pension-age rise to 65 equalised across sexes, collective-
  bargaining decentralisation; Medium-Term Fiscal Strategy (Jun 2011)
  adding €28bn consolidation; Second Memorandum Oct-Dec 2011 envelope
  (finalised Feb 2012 with €130bn + PSI); wide privatisation programme
  HRADF launched. Oct 2011 Cannes-eve referendum announcement on the
  Second Memorandum — withdrawn within days under EU pressure, precipitating
  Papandreou's resignation (Nov 2011) and the Papademos national-unity
  government. Left-right: centre-left PASOK with forced orthodox-consolidation
  stance. Popularity: PASOK 43.9% / 160 seats Oct 2009, collapsed to 13.2%
  in May 2012; Papandreou personal approval fell from ~60% to <15%.
  Coherence: moderate — ambitious measures enacted, but referendum proposal
  and public-sector implementation capacity undermined the programme.
policies:

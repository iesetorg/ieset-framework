  - "Referendum abrogativo del 9-10 giugno 1985"
  - "Craxi, intervento al XLIV Congresso PSI, Verona 1984"
  - "Colarizi (2022), Storia politica della Repubblica"
notes: "Pre-1996 sample extension. The San Valentino / 1985 referendum is the canonical labour-market-flexibility data point for Italy in the 1980s."

movement_id: italy_craxi_psi_1983_1987
status: candidate
name: "Craxi PSI-led pentapartito governments (Italy)"
countries: [ITA]
timeframe: {start: 1983, end: 1987}
coalition: "PSI-DC-PSDI-PRI-PLI pentapartito; Craxi first non-Communist non-DC PM"
leaders:
  - "Bettino Craxi (PM, 4 August 1983 - 17 April 1987)"
  - "Giuliano Amato (Treasury undersecretary)"
  - "Giovanni Goria (Budget Minister, later PM 1987)"
  - "Carlo Azeglio Ciampi (Banca d'Italia Governor)"
  - "Gianni De Michelis (Labour Minister)"
doctrine: >
  Socialist-led reformist-modernising phase of the pentapartito, more
  market-friendly on micro policy than PCI alternative but fiscally
  expansive. Economic school: Italian Socialist reformism (revisionist
  PSI under Craxi since 1976 Midas hotel congress) converging on
  Anglo-French social-democratic mainstream; stylistically closer to
  Mitterrand-post-rigueur than to DC patronage. Left-right axis: centre-
  left on social policy and partytocracy reform rhetoric, centre on
  economic policy, well to the right of PCI alternative. Key content:
  (i) Decreto di San Valentino 14 February 1984 — suspended three
  scala-mobile points (the remaining erosion of wage indexation
  accord-Scotti had initiated), confirmed via 9 June 1985 referendum
  (54.3% in favour of decree — PCI lost a flagship campaign);
  (ii) first MIBTel-era financial-market reforms; (iii) disinflation
  from 16.5% (1983) to 4.7% (1987) under Ciampi-Banca d'Italia working
  with divorzio mandate; (iv) public debt trajectory continued upward
  — debt/GDP 70% (1983) → 91% (1987); (v) Concordato Nuovo 18 February
  1984 revising 1929 Lateran Pacts; (vi) Dini-Amato reform of the
  banking sector preparation (Amato Law 1990 later); (vii) Achille
  Lauro hijacking crisis October 1985 (Sigonella confrontation with
  US) — Craxi asserted Italian sovereignty; (viii) pension indexation
  rises through the period; (ix) IRI partial restructuring under Prodi
  (1982-1989) began — Alfa Romeo sold to Fiat 1986. Popularity:
  1983 election PSI 11.4% (gain) DC 32.9% (loss); Craxi governed
  1,059 days — longest postwar Italian PM tenure until Berlusconi;
  May 1985 referendum 54.3% confirmed decree; 1987 election PSI
  14.3% (major PSI gain) DC 34.3%; subsequent coalition breakdowns
  ended Craxi PM-ship but PSI continued in coalition. Coherence:
  programme largely coherent around wage-indexation reform +
  disinflation + partial state-sector restructuring; however,
  expanding public debt and growing corruption (Tangentopoli would
  unravel the system 1992-94, with Craxi fleeing to Hammamet in
  1994) left an institutionally corrosive legacy obscured at the
  time by macroeconomic stabilisation successes.
policies:
  - italy_decreto_san_valentino_scala_mobile_1984
  - italy_scala_mobile_referendum_1985
  - italy_disinflation_1983_1987
  - italy_alfa_romeo_sale_to_fiat_1986
  - italy_pension_indexation_1985
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Decreto San Valentino 1984 + 1985 referendum cut scala-mobile automatic indexation."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "Disinflation 16.5→4.7% under Ciampi + post-divorzio monetary discipline."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Debt/GDP 70→91% in four years; sustained primary deficits."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "IRI restructuring under Prodi; Alfa Romeo sale."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pension indexation and public-sector payroll continued to grow."}
predecessor_movements: [italy_andreotti_forlani_dc_1976_1983]
successor_movements: [italy_dc_patronage_state_1945_1992]
position_alignments:
  - {position_id: social_democratic, alignment: partially_aligned, notes: "PSI revisionist wing; comparable to Mitterrand post-rigueur."}
  - {position_id: institutionalism, alignment: opposed, notes: "Informal party-financing system being built in parallel that Mani Pulite exposed."}
references:

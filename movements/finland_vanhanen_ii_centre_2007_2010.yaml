movement_id: finland_vanhanen_ii_centre_2007_2010
status: candidate
name: "Vanhanen II Centre-led coalition 2007-2010"
countries: [FIN]
timeframe: {start: 2007, end: 2010, enacted_date: "2007-04-19"}
coalition: "Keskusta-Kokoomus-RKP-Vihreät (Centre-NCP-Swedish People-Greens)"
leaders:
  - "Matti Vanhanen (Prime Minister, Keskusta, 2007-2010)"
  - "Jyrki Katainen (Finance Minister, Kokoomus)"
  - "Mauri Pekkarinen (Economy Minister, Keskusta)"
doctrine: >
  Vanhanen II was a Centre-NCP four-party coalition that governed through
  the 2008 global financial crisis and the sharpest one-year Finnish GDP
  contraction (-8.3% 2009). Economic school: Finnish pragmatic centre-right
  crisis-response — counter-cyclical 2009 stimulus (tax cuts, accelerated
  infrastructure), corporate-tax cut from 26% to 22% contemplated then
  deferred, pension reform pre-work, first major VAT rate rise (July 2010:
  standard 22% -> 23%). Campus-shooting-era 'inner security' programme.
  Also launched Kainuu regional administration experiment and universities
  reform 2009 (Yliopistolaki — made universities legal persons outside
  state agency). Left-right: centre-right. Dated policies: universities
  reform (Law 558/2009), stimulus package 2009, VAT rise July 2010.
  Popularity: Centre collapsed 15% in 2011 election after Vanhanen
  resigned June 2010 over election-funding scandal. Coherence: moderate —
  four parties held through the crisis but Centre lost leadership.
policies:
  - fi_universities_reform_2009
  - fi_stimulus_package_2009
  - fi_vat_rise_2010
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "2009 counter-cyclical stimulus raised spending share through GFC."}

  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Universities reform carved academic institutions out of state agency structure."}
  - {axis: regulatory.labour_market_flexibility, direction: "0", magnitude: weak, rationale: "No major labour-market reform; unemployment rose cyclically."}

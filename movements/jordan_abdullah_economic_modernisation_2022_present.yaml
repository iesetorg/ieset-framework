# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: jordan_abdullah_economic_modernisation_2022_present
status: candidate
name: "Jordan Abdullah II economic modernisation agenda"
countries: [JOR]
timeframe: {start: 2022, end: ongoing}
coalition: "Hashemite monarchy with appointed governments under Bisher Khasawneh and Jafar Hassan"
leaders:
  - "Abdullah II ibn Al Hussein (King)"
  - "Bisher Khasawneh (Prime Minister, 2020-2024)"
  - "Jafar Hassan (Prime Minister, 2024-present)"
  - "Zeina Toukan (Minister of Planning and International Cooperation)"
doctrine: >
  Jordan's current reform agenda is palace-led economic modernisation rather
  than a party programme. It bundles a 2022-2033 growth and competitiveness
  vision, investment-environment legislation, and IMF-supported fiscal
  consolidation around the goal of raising employment, private investment,
  exports, and administrative capacity while maintaining the dinar peg and
  social stability in a resource-constrained monarchy.
policies:
  - jordan_economic_modernisation_vision_2022
  - jordan_investment_environment_law_2022
  - jordan_imf_eff_2024
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Vision and investment-law measures target private-sector entry, investor services, and competitiveness."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Economic Modernisation Vision channels initiatives through sector drivers and public-private investment programmes."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "The 2024 IMF programme anchors gradual fiscal consolidation while protecting targeted social spending."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Investment and IMF governance commitments strengthen rule-bound investor and public-finance processes."}
references:
  - "Economic Modernisation Vision official portal: https://www.jordanvision.jo/en"
  - "IMF press release, Jordan Extended Fund Facility approved, 10 Jan 2024: https://www.imf.org/en/News/Articles/2024/01/10/pr2410-jordan-imf-exec-board-approves-eff-arrangement"
  - "Jordan Ministry of Investment, Investment Environment Law No. 21 of 2022: https://www.moin.gov.jo/"
notes: "First Lane D tranche movement for zero-coverage JOR; kept at palace/government programme level to avoid party-label overclaiming."

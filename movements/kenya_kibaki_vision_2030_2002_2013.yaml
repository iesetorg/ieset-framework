movement_id: kenya_kibaki_vision_2030_2002_2013
status: candidate
name: "Kibaki-era economic recovery and Vision 2030 (Kenya)"
countries: [KEN]
timeframe: {start: 2002, end: 2013}
coalition: "NARC then PNU / Grand Coalition governments under Mwai Kibaki"
leaders: ["Mwai Kibaki (President)", "David Mwiraria (Finance Minister 2003-2005)", "Amos Kimunya", "Uhuru Kenyatta (Finance Minister 2009-2012)", "Njuguna Ndung'u (CBK Governor 2007-2015)"]
doctrine: >
  The 2002 NARC victory ended 24 years of KANU rule and initiated the
  Economic Recovery Strategy for Wealth and Employment Creation (2003-2007),
  followed by Vision 2030 (launched 2008) targeting middle-income status by
  2030 through infrastructure investment, ICT and financial-sector deepening,
  and anchor sectors (agriculture, manufacturing, tourism, BPO). Free primary
  education was introduced in January 2003 with rapid enrolment gains.
  Telecoms liberalisation enabled the Safaricom M-Pesa launch (2007) which
  became the global benchmark for mobile money. The Central Bank of Kenya
  moved to inflation-targeting-light with an explicit price-stability mandate
  and the 2015 CBK Act amendments later formalising independence. Fiscal
  policy moved from donor dependence towards domestic revenue mobilisation
  (VAT reform, Kenya Revenue Authority modernisation). The 2010 Constitution
  devolved significant fiscal authority to 47 counties from 2013. Growth
  averaged ~4-5% p.a. across the period (with a dip during the 2007-2008
  post-election crisis). Governance indicators were mixed: ICC-linked
  post-election violence and corruption scandals (Anglo-Leasing) coexisted
  with real improvements in macro management and service delivery.
policies: [kenya_free_primary_education_2003, kenya_vision_2030_plan_2008, kenya_mpesa_regulatory_accommodation_2007, kenya_2010_constitution_devolution, kenya_cbk_price_stability_mandate]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Telecoms liberalisation enabling M-Pesa; entry reforms in banking and insurance."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Free primary education and later Hunger Safety Net Programme; small absolute footprint."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Infrastructure push (roads, electrification, later SGR planning)."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "CBK operational independence strengthened; price-stability mandate."}
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "2010 Constitution strengthened rights and devolution; post-election violence and corruption scandals pulled other way."}
outcome_hypotheses: [institutional_quality_growth_channel]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Mixed-instrument, gradualist reform style characteristic of Kibaki technocracy."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Vision 2030 is explicitly developmental-state-framed, though with more market content than Ethiopia's."}
references:
  - "Government of Kenya (2007), Kenya Vision 2030"
  - "World Bank (2013), Kenya Economic Update, successive editions"
  - "IMF Article IV consultations, Kenya, 2003-2013"
  - "Jack-Suri (2014), 'Risk Sharing and Transactions Costs: Evidence from Kenya's Mobile Money Revolution', AER"
  - "Cheeseman-Lynch-Willis (2016), 'Decentralisation in Kenya: the governance of governors'"

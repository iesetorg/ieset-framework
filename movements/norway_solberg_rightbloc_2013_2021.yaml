# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: norway_solberg_rightbloc_2013_2021
status: candidate
name: "Solberg Conservative-led centre-right government (Norway)"
countries: [NOR]
timeframe:
  start: 2013
  end: 2021
  enacted_date: "2013-10-16"

coalition: "Høyre (H) + Fremskrittspartiet (FrP) minority 2013-2018; expanded to include Venstre (V) 2018 and Kristelig Folkeparti (KrF) 2019 as four-party majority; reverted to H-V-KrF minority after FrP walkout January 2020; H-led minority through September 2021"
leaders:
  - "Erna Solberg (Statsminister / Prime Minister, Høyre)"
  - "Siv Jensen (Finance Minister, FrP, 2013-2020)"
  - "Jan Tore Sanner (Finance Minister, Høyre, 2020-2021)"
  - "Trine Skei Grande / Guri Melby (Venstre leaders)"
  - "Knut Arild Hareide / Kjell Ingolf Ropstad (KrF leaders)"

doctrine: >
  (a) Centre-right Høyre-led project: modest tax cuts (personal and
  corporate), partial privatisation and competition-in-public-services
  agenda, tightened immigration and integration regime, and a pragmatic
  climate package that preserved the petroleum tax regime while raising
  CO2 pricing and expanding offshore wind licensing. Solberg explicitly
  defended the handlingsregel spending rule; the 2017 white paper
  revised the real-return assumption down from 4% to 3% to reflect
  lower global yields. (b) Left-right axis — centre-right on taxation
  and labour-market rules, strongly restrictive on immigration
  (particularly after 2015 refugee peak), institutionally continuous on
  fiscal rule and sovereign-wealth-fund governance. FrP pulled the
  package toward tax cuts and migration restriction; Venstre and KrF
  pulled it toward climate and family policy. (c) Key policy content:
  staged corporate tax cuts from 28% (2013) to 22% (2019) and a
  parallel personal tax reduction (skatteforliket 2016); 2015-2016
  integration agreement (Integrerings­forliket) and Instruks
  GI-03/2016 tightening asylum review and family reunification
  thresholds; Meld. St. 2 (2016-2017) revising the handlingsregel
  phasing rate downward; 2016 white paper on petroleum tax
  (Meld. St. 25, 2015-2016) and 2020 temporary uplift lifting
  COVID-era investment allowances; 2017 pension reform carry-through;
  large COVID-19 fiscal response 2020-2021 (~NOK 130bn incremental).
  (d) Popularity — Høyre+FrP+V+KrF won 96/169 Storting seats in 2013;
  the right-bloc renewed in 2017 with 88 seats and governed via
  deal-making through 2021; Solberg's personal approval stayed
  competitive through 2019 but the bloc lost decisively in September
  2021 (right bloc 68 seats, left bloc 100). Local-election retention
  in 2015 was weak (H ~23%, FrP ~9%) and worse in 2019 (H ~20%).
  (e) Coherence: internally coherent centre-right tax-cut +
  immigration-tightening + fiscal-rule-preservation bundle, slightly
  diluted by 2018-2019 four-party expansion and fractured by FrP's
  January 2020 departure over IS-return handling.

policies:
  - no_corporate_tax_cut_2013_2019
  - no_immigration_tightening_2015_2016
  - no_handlingsregel_3pct_white_paper_2017
  - no_petroleum_tax_white_paper_2016
  - no_covid_fiscal_response_2020_2021

axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Staged corporate rate cut 28% → 22% between 2013 and 2019, parallel to broader OECD trend and 2016 cross-party tax settlement."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Personal income tax reductions via 2016 skatteforliket; wealth-tax (formuesskatt) valuation adjustments favoured business capital."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Post-2015 tightening of asylum review, family reunification income tests, and integration/language requirements via 2015-2016 Integrerings­forliket."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Handlingsregel discipline preserved; 2017 white paper revised real-return assumption 4% → 3%; temporary COVID-era deviation treated as shock response."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "CO2 tax raised through the period; offshore wind concession framework established (Utsira Nord / Sørlige Nordsjø II 2020)."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "2016 petroleum tax white paper preserved SDFI / ring-fence regime; no material change to GPFG mandate."}

predecessor_movements:
  - norway_stoltenberg_ii_redgreen_2005_2013
successor_movements:
  - norway_store_ap_sp_2021_present

position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}

references:
  - "Sundvolden-erklæringen (Sundvolden platform), October 2013"
  - "Jeløya platform 2018; Granavolden platform January 2019"
  - "Meld. St. 4 (2017–2018) — revised handlingsregel phasing rate 4% → 3%"
  - "Meld. St. 25 (2015–2016) — Kraft til endring (petroleum tax white paper)"
  - "Integrerings­forliket 2015; GI-03/2016 tightening asylum review"
  - "Skatteforliket / Stortingets skatteforlik 2016"
  - "Statistics Norway — 2013, 2017, 2021 Storting elections; 2015, 2019 local elections"

notes: >
  Coded as one movement across two Storting periods because the
  doctrinal content is continuous (tax cut + immigration tightening +
  fiscal-rule preservation) even as coalition composition shifted with
  V (2018) and KrF (2019) adding and FrP (2020) exiting. 2020-2021
  COVID fiscal response treated as shock-response policy, not
  doctrinal re-direction.

movement_id: sri_lanka_open_economy_1977
status: candidate
name: "Sri Lanka 1977 Open Economy reforms"
countries: [LKA]
timeframe: {start: 1977, end: 1994}
coalition: "United National Party (UNP) government under J. R. Jayewardene"
leaders: ["J. R. Jayewardene (PM then Executive President)", "Ronnie de Mel (Finance 1977-88)", "Ranasinghe Premadasa (PM, later President)"]
doctrine: >
  Sharp reversal of the 1956-1977 import-substitution / welfare-state
  period under the SLFP-led United Front. The 1977 November budget
  unified the dual exchange rate and devalued the rupee by ~45%,
  dismantled most quantitative import restrictions, replaced price
  controls on food with a targeted food-stamp scheme (replacing the
  universal rice ration), cut tariffs, and launched the Greater
  Colombo Economic Commission to run Sri Lanka's first export-
  processing zones (1978). Capital-account liberalisation followed
  (non-resident foreign-currency accounts 1978), as did privatisation
  starting in the mid-1980s under Premadasa (Peoplisation programme).
  The package was sequenced alongside the accelerated Mahaweli
  irrigation programme and heavy public investment funded by
  concessional lending. Growth accelerated from ~2.9% (1970-77) to
  ~5.5% (1977-83) before deteriorating during the 26-year civil war
  (from 1983), which absorbed fiscal capacity and interacted with
  external shocks. Sri Lanka is the canonical early South-Asian
  liberalisation — predating India's 1991 reforms by fourteen years.
policies: [sri_lanka_open_economy_package_1977, sri_lanka_food_stamp_scheme_1979, sri_lanka_gcec_epz_act_1978, sri_lanka_peoplisation_privatisation_1989_1994]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Unified exchange rate, QR removal, tariff reduction, export-processing zones."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Price controls removed; entry liberalised; partial privatisation."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Universal rice ration replaced with targeted food stamps; eroded in real terms through the 1980s."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Accelerated Mahaweli irrigation investment and EPZ incentives."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "FDI openness and the 1978 Constitution's property-rights framing reduced expropriation risk relative to the prior period."}
outcome_hypotheses: [structural_reform_absence_and_post_euro_stagnation, developmentalist_state_growth_performance]
position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: democratic_socialist, alignment: opposed}
references:

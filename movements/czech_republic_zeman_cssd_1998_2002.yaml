movement_id: czech_republic_zeman_cssd_1998_2002
status: candidate
name: "Zeman CSSD opposition-agreement minority 1998-2002"
countries: [CZE]
timeframe: {start: 1998, end: 2002, enacted_date: "1998-07-22"}
coalition: "CSSD single-party minority supported by ODS 'Opposition Agreement' (Smlouva o toleranci)"
leaders:
  - "Milos Zeman (Prime Minister, CSSD, 1998-2002)"
  - "Vaclav Klaus (ODS leader, Chamber Speaker — opposition-agreement partner)"
  - "Pavel Mertlik (Finance Minister, CSSD, 1999-2001)"
  - "Jiri Rusnok (Finance Minister, CSSD, 2001-2002)"
doctrine: >
  Zeman CSSD government under the unique 'Opposition Agreement' —
  CSSD governed as a single-party minority with ODS tolerance (abstentions
  on no-confidence, shared parliamentary posts), a post-1998-election
  innovation controversial for reducing parliamentary pluralism. Economic
  school: Czech centre-left pragmatic with EU-accession convergence —
  bank privatisation completion (KB, CS, IPB), Konsolidacni agentura
  bad-bank consolidation, NATO accession (12 March 1999). Left-right
  axis: centre-left. Dated policies: IPB crisis and CSOB takeover
  (June 2000), NATO accession 12 Mar 1999, Investment Incentives Act
  1998 (FDI boom, automotive sector), major commercial-bank privatisations
  (KB to SocGen 2001, CS to Erste 2000). Popularity: CSSD won 1998
  (32.3%) and a narrow 2002 (30.2%, but Zeman did not stand again).
  Coherence: moderate — unprecedented coalition mechanics held together
  via direct Zeman-Klaus bargaining.

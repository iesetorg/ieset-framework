# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_dalema_amato_centre_left_1998_2001
status: candidate
name: "D'Alema / Amato centre-left continuation governments"
countries: [ITA]
timeframe: {start: 1998, end: 2001}
coalition: "DS + PPI + RI + FdV + UDR (D'Alema) then broader Ulivo (Amato II)"
leaders:
  - "Massimo D'Alema (PM Oct 1998-April 2000)"
  - "Giuliano Amato (PM April 2000-June 2001)"
  - "Giuliano Amato / Vincenzo Visco (Treasury/Finance)"
doctrine: >
  Economic school: centre-left continuation — post-Prodi stewardship of
  early-euro period with privatisations, labour reform, and fiscal
  discipline. Left-right axis: centre-left. Dated policies: ENEL
  partial IPO November 1999 (largest IPO in European history at the
  time); Telecom Italia privatisation completion and defence of
  ownership; Kosovo war Italian participation March-June 1999;
  Legge 53/2000 parental leave; Amato 2000 income-tax cuts (IRPEF
  bracket reshaping); Visco pension reform attempts; law 328/2000
  framework law on social assistance; Law 388/2000 welfare measures;
  Amato withdrew D'Alema-era attempted labour reform after RC and
  CGIL opposition; Jubilee year 2000 infrastructure push; peseta/lira
  / euro-coin preparation; TUPS unified tax statute 2000. Popularity:
  D'Alema took office without election; coalition wobbled; Amato II
  technocratic bridge to 2001 election. Coherence: moderate — reform
  fatigue and internal DS/Margherita tension; centre-left lost 2001
  election to Berlusconi House of Liberties.
policies:
  - italy_enel_ipo_1999
  - italy_amato_irpef_reform_2000
  - italy_kosovo_participation_1999
  - italy_telecom_italia_ownership_defense_1999
  - italy_parental_leave_law_53_2000
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "ENEL IPO and continued privatisation programme."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Amato 2000 IRPEF bracket reshaping modestly reduced progressivity at middle."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Law 53/2000 parental leave; law 328/2000 social assistance framework."}
predecessor_movements: [italy_prodi_ulivo_1996_1998]
successor_movements: [italy_berlusconi_ii_iii_2001_2006]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
references:
  - "Legge 8 marzo 2000 n. 53 (congedi parentali)"
  - "Legge quadro 328/2000 servizi sociali"
notes: "Bridge between Prodi I and Berlusconi II; two technocratic centre-left cabinets."

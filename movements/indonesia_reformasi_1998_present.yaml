movement_id: indonesia_reformasi_1998_present
status: candidate
name: "Indonesia Reformasi"
countries: [IDN]
timeframe: {start: 1998, end: ongoing}
coalition: "Post-Suharto multiparty democratic governments (Habibie, Wahid, Megawati, SBY, Jokowi)"
leaders: ["B. J. Habibie (transitional)", "Abdurrahman Wahid", "Megawati Sukarnoputri", "Susilo Bambang Yudhoyono", "Joko Widodo", "Sri Mulyani Indrawati (Finance)"]
doctrine: >
  Democratic transition and economic restructuring following the
  1997-98 Asian crisis and Suharto's resignation. Core elements: a
  fifty-billion-dollar IMF programme (1997-2003) conditioning bank
  recapitalisation, closure of insolvent banks, and removal of
  subsidies and monopolies; constitutional amendments (1999-2002)
  establishing direct presidential elections, a Constitutional Court,
  and central-bank independence (Bank Indonesia Law 1999); big-bang
  fiscal and administrative decentralisation to districts (Laws 22
  and 25 of 1999, from 2001); deposit insurance and prudential reform
  (LPS 2004); and later the Omnibus Law on Job Creation (2020) under
  Jokowi aimed at simplifying investment licensing. Reformasi is the
  canonical 'third-wave democratisation plus structural adjustment'
  case in Southeast Asia: growth returned to ~5% annualised, debt-to-
  GDP fell from ~90% (2000) to ~30% (2012), though commodity-cycle
  exposure and distributive conflicts persist.
policies: [indonesia_imf_programme_1997, indonesia_bank_indonesia_independence_1999, indonesia_decentralisation_laws_1999, indonesia_lps_deposit_insurance_2004, indonesia_fuel_subsidy_reform_2005_2015, indonesia_omnibus_job_creation_law_2020]
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "1999 Bank Indonesia Law gave statutory independence and price-stability mandate."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Tighter prudential regulation, deposit insurance, and supervisory consolidation (OJK 2011)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Omnibus Law and licensing reform reduced entry barriers; KPPU competition authority created 1999."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Conditional cash transfers (PKH) and national health insurance (JKN, 2014) expanded; fuel subsidies redirected to targeted transfers."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: moderate, rationale: "Constitutional Court established 2003; mixed progress on lower-court integrity."}
outcome_hypotheses: [structural_reform_absence_and_post_euro_stagnation, currency_crisis_capital_flight_dynamic]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: institutionalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned}
references:
  - "Aspinall & Fealy eds. (2003), 'Local Power and Politics in Indonesia'"
  - "Basri (2018), 'Twenty Years After the Asian Financial Crisis' (Brookings)"
  - "IMF Country Reports, Indonesia 1998-2020"

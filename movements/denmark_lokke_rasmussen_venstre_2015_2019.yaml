  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: opposed}
references:
  - "Lov nr. 102 af 3. februar 2016 ('smykkeloven', L 87)"
  - "Lov om integrationsydelse (2015); contanthjælpsloft (2016)"
  - "Parallelsamfundsaftalen (maj 2018)"
  - "Aftale om afskaffelse af PSO-afgiften (november 2016); lov 2017-2022 udfasning"
  - "Regeringens 2025-plan (januar 2017)"

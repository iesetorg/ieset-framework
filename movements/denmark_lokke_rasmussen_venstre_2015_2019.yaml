  - "Europa-Parlamentsvalg 2019 (Danmarks Statistik)"
notes: >
  Two sub-governments — Løkke Rasmussen II (pure Venstre minority) and
  Løkke Rasmussen III (VLAK) — coded as one movement because the
  doctrinal content and parliamentary arithmetic (DF as decisive
  confidence partner) are continuous. The 2015-2019 period is the
  tightening-migration-plus-fiscal-rule-adherence benchmark against
  which the 2019- Frederiksen movement's migration continuity (not
  reversal) is read.

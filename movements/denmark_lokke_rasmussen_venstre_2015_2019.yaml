movement_id: denmark_lokke_rasmussen_venstre_2015_2019
status: candidate
name: "Løkke Rasmussen Venstre-led liberal-conservative minority governance (Denmark, 2015-2019)"
countries: [DNK]
timeframe: {start: 2015, end: 2019, enacted_date: "2015-06-28"}
coalition: "Lars Løkke Rasmussen II (June 2015-Nov 2016): single-party Venstre minority (34 seats of 179) on confidence-and-supply from Dansk Folkeparti, Liberal Alliance, and Konservative. Løkke Rasmussen III (Nov 2016-June 2019): VLAK minority — Venstre + Liberal Alliance + Konservative — still reliant on DF confidence-and-supply."
leaders:
  - "Lars Løkke Rasmussen (Statsminister 2015-2019, Venstre)"
  - "Claus Hjort Frederiksen (Finance Minister 2015-2016; Defence Minister 2016-2019, Venstre)"
  - "Kristian Jensen (Foreign Minister 2015-2016; Finance Minister 2016-2019, Venstre)"
  - "Inger Støjberg (Immigration and Integration Minister 2015-2019, Venstre — architect of the L 87 'jewellery law' and the 2018 ghetto package)"
  - "Kristian Thulesen Dahl (Dansk Folkeparti leader; decisive parliamentary support, migration veto player)"
  - "Anders Samuelsen (Foreign Minister 2016-2019, Liberal Alliance)"
doctrine: >
  A Venstre-led liberal-conservative governing project combining fiscal
  discipline and modest supply-side reform with a decisive rightward
  tightening on migration and integration, executed from a narrow
  parliamentary base. Economic line: liberal-conservative orthodoxy —
  adherence to the EU Fiscal Compact, structural-balance framework of the
  Budgetlov (inherited from Thorning-Schmidt, 2012), and the 2025 Plan
  (January 2017 update) targeting structural balance by 2025, financed
  partly by a gradual increase in statutory retirement age under the 2011
  welfare agreement and by integration-benefit (integrationsydelse, 2015)
  and contanthjælpsloft (cash-benefit ceiling, 2016) curbs on transfers to
  newly arrived recipients. Key policies with dates: reintroduction of
  border controls at the Danish-German frontier in January 2016 in
  response to 2015 migration flows; Lov om ændring af udlændingeloven
  (L 87, "smykkeloven" / jewellery law, 26 January 2016) authorising
  seizure of asylum-seeker assets above a threshold; the integrations-
  ydelse reducing cash benefits for recent arrivals to c.45% of standard
  levels; the 2018 parallelsamfund / "ghettoliste" package imposing
  mandatory daycare, doubled sentencing zones, and dispersed-housing
  requirements in designated areas; the 2018 PSO-afgift phase-out
  reforming renewable-energy financing from a consumer levy to general
  taxation following EU-law concerns; a 2018 bank- and top-income-focused
  tax package; the rejection of a proposed national super-hospital PPP
  model; and foreign-policy continuity on EU and NATO. Popularity
  trajectory: Venstre took 19.5% at the 18 June 2015 general election
  (34 seats, historic low for a party forming government) while DF
  surged to 21.1% (37 seats, its best-ever result) — the "blue bloc"
  won 90 of 179 seats; at the 26 May 2019 European Parliament election
  Venstre recovered to 23.5% (4 MEPs) while DF collapsed to 10.8% (1
  MEP); at the 5 June 2019 general election Venstre rose to 23.4% (43
  seats) but the blue bloc lost its majority, triggering Frederiksen's
  mandate. Coherence judgement: fiscally coherent and migration-
  tightening, but governance constrained throughout by DF veto-player
  dynamics and a 34-seat Venstre floor — the doctrine was visibly
  harder to execute than the 2001-2011 Fogh/Løkke I era.
policies:
  - dk_smykkeloven_asylum_assets_2016
  - dk_integrationsydelse_contanthjaelpsloft_2015_2016
  - dk_ghetto_parallelsamfund_2018_2021
  - dk_pso_afgift_phaseout_2017_2022
  - dk_2025_plan_structural_balance_2017
axes_summary:
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "L 87 jewellery law 2016, border-control reintroduction 2016, ghetto package 2018, integrationsydelse cut."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Integrationsydelse (2015) and contanthjælpsloft (2016) tightened cash benefits for recent arrivals and cash-benefit recipients; broader welfare envelope preserved."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "2025 Plan structural-balance target and adherence to the Budgetlov delivered moderate expenditure restraint in a high-baseline Nordic state."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "2018 tax package reduced top-bracket incidence modestly; capital/pension tax sweeteners."}
  - {axis: regulatory.labour_market_flexibility, direction: "0", magnitude: weak, rationale: "Flexicurity preserved; no structural re-regulation or further liberalisation."}
  - {axis: regulatory.environmental_stringency, direction: "0", magnitude: weak, rationale: "PSO-afgift phase-out was a financing reform more than a stringency change; new energy agreement 2018 maintained renewables trajectory."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "ERM-II peg regime and Nationalbanken independence unchanged; monetary channel exogenous."}
outcome_hypotheses:
  - restrictive_asylum_policy_effect_on_inflows
  - fiscal_rule_adherence_growth_tradeoff
predecessor_movements: [denmark_thorning_socdem_2011_2015]
successor_movements: [denmark_frederiksen_sap_broad_2019_present]
position_alignments:

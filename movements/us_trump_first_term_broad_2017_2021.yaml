doctrine: 'First-term Trump: Republican supply-side tax + deregulation orthodoxy fused with tariff-mercantilism
  and restrictionist immigration, sitting uneasily alongside legacy Chamber-of-Commerce Republicanism
  until the 2018 tariff escalation displaced it. Right-of-centre with populist- nationalist overlay.
  Core content: (i) Tax Cuts and Jobs Act December 2017 (35% → 21% corporate, territorial taxation,
  individual-bracket cuts sunset 2025, SALT cap, QBI pass-through, ~$1.5T 10-year score); (ii)
  deregulation surge (Congressional Review Act rollbacks 2017, Trump "2-for-1" Executive Order
  13771, Clean Power Plan repeal, WOTUS narrowing, vehicle-GHG rollback, regulatory budget caps,
  drilling lease expansions); (iii) Section 232 steel + aluminium tariffs March 2018; (iv) Section
  301 China tariffs 2018-2019 escalating to ~$370B of imports at rates to 25%, culminating in
  the Phase One deal January 2020; (v) USMCA (signed Nov 30 2018, entered into force July 1 2020)
  replacing NAFTA with tighter auto rules-of-origin and labour provisions; (vi) Paris Agreement
  withdrawal (notice June 2017, effective November 2020); (vii) judicial remaking — Gorsuch 2017,
  Kavanaugh 2018, Barrett 2020 confirmations plus 54 circuit-court judges; (viii) immigration
  restriction executive actions — travel ban 2017 (upheld Trump v. Hawaii 2018), Remain-in-Mexico
  2019, public-charge rule, asylum restrictions, border-wall funding fights; (ix) CARES Act March
  2020 and follow-on COVID fiscal response — $2.2T CARES + PPP + supplemental UI + December 2020
  $900B relief — one of the largest peacetime fiscal expansions in US history, with Fed balance-sheet
  support. Popularity: Trump lost the 2016 popular vote (46.1% vs Clinton 48.2%) but won the Electoral
  College; approval oscillated 35- 46% for most of the term, never crossing 50% in the RCP average;
  Republicans lost the House in 2018 midterms (net -40 seats), held Senate; Trump lost the 2020
  popular vote 46.8% vs Biden 51.3%. Coherence line: TCJA + deregulation form a coherent supply-side
  package, the tariff + immigration content is coherent economic- nationalism, COVID response
  is pragmatic emergency Keynesianism — three different doctrinal registers held together by the
  person of Trump rather than a unified economic school.

  '

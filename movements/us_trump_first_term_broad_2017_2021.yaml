axes_summary:
- axis: fiscal.tax_corporate
  direction: '-'
  magnitude: strong
  rationale: Corporate rate 35% → 21% is largest cut since 1986 Tax Reform Act.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  rationale: Top individual bracket 39.6% → 37% with SALT cap partial offset; pass-through deduction
    skewed high-income.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Regulatory-freeze and 2-for-1 EO, CRA rollbacks, OIRA-enforced rulemaking reductions.
- axis: regulatory.environmental_stringency
  direction: '-'
  magnitude: strong
  rationale: Clean Power Plan repeal, WOTUS narrowing, vehicle-GHG standards rollback, Paris withdrawal,
    drilling expansions.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: Economic Growth, Regulatory Relief, and Consumer Protection Act 2018 softening Dodd-Frank;
    CFPB scope reductions.
- axis: regulatory.trade_openness
  direction: '-'
  magnitude: strong
  rationale: Average US tariff on China rose from ~3% to ~19%; steel/aluminum Section 232; USMCA
    tighter rules-of-origin.
- axis: regulatory.immigration_openness
  direction: '-'
  magnitude: strong
  rationale: Travel ban, Remain-in-Mexico, public-charge, asylum restrictions, refugee-ceiling
    cut from 110k to 15k.
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: CARES + CAA + supplemental COVID response drove FY2020 deficit to ~15% of GDP; non-COVID
    base spending also grew.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Farm bailouts offsetting China-retaliation impacts; PPP; fossil-fuel leasing incentives.
- axis: institutional.judicial_independence
  direction: '0'
  magnitude: weak
  rationale: Nominated and confirmed 3 SCOTUS justices and 54 circuit judges through normal Senate
    process; rhetoric against judges did not translate into structural institutional change in
    the first term.

movement_id: czechoslovakia_calfa_civic_forum_1989_1992
status: candidate
name: "Čalfa Government of National Understanding and Klaus Federal Finance — Czechoslovak transition 1989-1992"
countries: [CSK]
timeframe: {start: 1989, end: 1992}
coalition: "Government of National Understanding (Čalfa) — Občanské fórum (OF, Czech) + Verejnosť proti násiliu (VPN, Slovak) + KSČ reformers + KDU + DS"
leaders:
  - "Marián Čalfa (Federal Prime Minister, December 1989-July 1992)"
  - "Václav Klaus (Federal Finance Minister 1989-1992; architect of voucher privatisation)"
  - "Václav Havel (President of Czechoslovakia, 1989-1992)"
  - "Vladimír Dlouhý (Federal Economy Minister 1989-1992)"
  - "Vladimír Mečiar (Slovak PM 1990-1991; led HZDS after 1991 break)"
doctrine: >
  The Čalfa-led Government of National Understanding executed
  Czechoslovakia's Velvet Revolution transition — fastest and
  most coherent in the bloc after Poland — before dissolving
  into the Velvet Divorce. Economic school: Klausian Thatcher-
  Hayek-Friedmanite market liberalism with voucher-privatisation
  innovation, against a Slovak counter-current favouring
  gradualism and industrial protection. Left-right axis:
  centre-right on federal economic policy; the East-West
  cleavage within the federation was itself the coherence
  challenge. Core policy content: (i) 1 January 1991 price
  liberalisation, internal koruna convertibility, small
  devaluation, hard-budget enforcement — Klaus shock-therapy
  "lite" (smoother than Poland due to lower inflation
  overhang); (ii) 1990 small privatisation law (Act 427/1990)
  — auctions of retail/service units; (iii) 1991 large
  privatisation law (Act 92/1991) launching voucher
  privatisation — every adult citizen offered 1,000-point
  voucher book for 1,000 Kčs to bid on SOE shares; first wave
  1992 privatised ~1,500 enterprises; (iv) 1991 restitution
  law (Act 87/1991) returning property seized after February
  1948; (v) 1991 commercial code (Act 513/1991) reviving
  pre-1948 business-law framework; (vi) 1990-1992 trade
  reorientation — COMECON collapsed, Germany became top
  partner; (vii) ČSSR dissolution agreed July-November 1992
  between Klaus (ODS) and Mečiar (HZDS) after 1992 Czech and
  Slovak elections; 1 January 1993 Velvet Divorce. Popularity:
  OF + VPN won 1990 elections decisively (OF 53%, VPN 33%);
  1992 elections split the federation (ODS 30% in Czech lands,
  HZDS 37% in Slovakia). Coherence: high within Czech lands
  under Klaus's federal-finance direction; low across the
  federation.
policies:
  - cs_price_liberalisation_1991
  - cs_small_privatisation_law_1990
  - cs_large_privatisation_voucher_1991
  - cs_restitution_law_1991
  - cs_commercial_code_1991

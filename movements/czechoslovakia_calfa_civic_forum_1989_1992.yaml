  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Restitution and privatisation laws re-established private property from 1948 baseline."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Internal convertibility, tariff reform, reorientation from COMECON to EU."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Subsidy elimination and fiscal consolidation 1990-1992; deficit maintained near balance."}

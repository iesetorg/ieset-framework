movement_id: ecuador_bucaram_pre_1996_1997
status: candidate
name: "Bucaram PRE — El Loco populism, mental-incapacity removal"
countries: [ECU]
timeframe: {start: 1996, end: 1997, enacted_date: "1996-08-10"}
coalition: "Partido Roldosista Ecuatoriano (PRE) — right-populist"
leaders:
  - "Abdalá Bucaram Ortiz 'El Loco' (President 6 August 1996 – 6 February 1997)"
  - "Pablo Concha / Pablo Better (Finanzas, two ministers)"
  - "Domingo Cavallo (informal convertibility adviser)"
doctrine: >
  Six-month right-populist PRE episode combining campaign
  anti-oligarchy rhetoric, convertibility gambit, and
  unprecedented policy chaos, ended by congressional
  mental-incapacity removal. Five doctrinal pillars: (a)
  Campaign populism — "la fuerza de los pobres" slogan;
  promised 200,000 homes, doubled pensions, cut cooking-gas
  price; mass rally showmanship. (b) Austerity shock —
  within days of inauguration raised electricity prices
  +245%, gasoline +80%, fuel-subsidy removal; social outrage;
  March 1997 Paro Cívico Nacional general strike. (c)
  Convertibility flirtation — Cavallo consulted; bill to
  establish dollar-peso parity drafted; never passed. (d)
  Corruption and nepotism — son Jacobo Bucaram appointed
  customs-related position; brother Adolfo appointed Social
  Welfare Minister; "mochila escolar" backpack fiasco; Panama
  exfiltration of funds allegations. (e) Destitución —
  Congress declared Bucaram mentally unfit 6 February 1997
  by 44-34 vote invoking Article 100 of the Constitution
  without psychiatric evaluation; constitutional crisis with
  three claimants (Bucaram, VP Rosalía Arteaga, Congress
  President Fabián Alarcón) resolved when military backed
  Alarcón as interim; Bucaram fled to Panama. Stated school:
  right-populist heterodoxy; convertibility-curious on advice
  from Cavallo. Left-right: populist-right rhetorically;
  economic content right with social posturing. Popularity:
  July 1996 runoff 54.5% vs Nebot 45.5%; approval collapsed
  to ~15% by January 1997; Paro Cívico mobilised ~2 million.
  Coherence: the coherence is inconsistency — campaign
  promises, austerity execution, convertibility flirtation,
  and family corruption combined into the first post-1979
  sitting-president removal, foreshadowing Mahuad 2000 and
  Gutiérrez 2005.
policies:
  - ec_bucaram_austerity_package_1996
  - ec_bucaram_convertibility_proposal_1996
  - ec_paro_civico_nacional_1997
  - ec_bucaram_mental_incapacity_removal_1997
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: strong, rationale: "Electricity +245%, gasoline +80%, gas-subsidy removal within weeks."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Article 100 mental-incapacity removal without psychiatric evaluation set institutional precedent."}

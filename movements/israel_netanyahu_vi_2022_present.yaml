doctrine: >
  Most right-wing, most religious coalition in Israeli history. Likud right
  plus religious-Zionist bloc (Religious Zionism, Otzma Yehudit, Noam) plus
  ultra-Orthodox (Shas, UTJ); 64 of 120 Knesset seats, with Likud alone
  holding 32. Three-pillared economic-institutional doctrine. (1) Judicial
  overhaul — plan unveiled 4 January 2023 by Justice Minister Yariv Levin:
  override clause allowing 61-MK Knesset majority to overturn Supreme Court
  rulings, political control of judicial-appointment panel, curbs on the
  'reasonableness' standard; the reasonableness-clause repeal passed 24 July
  2023 before being struck down by the Supreme Court 15-to-1 on 1 January
  2024. Triggered the largest sustained protest movement in Israeli history
  — the 'Kaplanist' weekly demonstrations on Kaplan Street drew 100,000–
  500,000 for 39+ consecutive weeks, reservist refusals, tech-sector capital
  flight, and credit-outlook downgrades. (2) Settlement expansion and
  Finance-Ministry control over West Bank civil administration under the
  Smotrich coalition agreement, diverting Palestinian Authority clearance
  revenues. (3) War economy after the Hamas attack of 7 October 2023
  (~1,200 Israelis killed, 250+ hostages taken) — Operation Swords of Iron
  in Gaza with prolonged multi-front escalation (Hezbollah exchanges,
  Houthi shipping attacks, Iran direct strike April 2024 and October 2024).
  Massive fiscal expansion: war-related supplementary budgets pushed the
  2024 deficit target to 6.6% of GDP, defence spending up roughly 40%, with
  conscript-reservist output drag. Credit-rating downgrades: Moody's
  Feb 2024 (A1 from A2 → Aa3 cut to A2), S&P Apr 2024 and Oct 2024 (A+
  → A → A-), Moody's Sep 2024 (A2 → Baa1 two-notch cut). Haredi-draft
  question split the coalition (Supreme Court ruling June 2024 required
  ultra-Orthodox conscription, UTJ/Shas demanded exemption law). Left-
  right axis: strongly right on security, institutional, and religious-
  state dimensions; fiscally expansionary in wartime (not classical-
  liberal small-state). Popularity: Netanyahu approval collapsed from ~46%
  pre-Oct 7 to ~30% through 2024; Likud polling 18–22 seats mid-2024;
  rallied partially on Nasrallah killing Sep 2024 and Iran strikes.
  Coherence line: 'right-religious judicial overhaul plus war-economy
  fiscal expansion plus settlement entrenchment — institutional
  consolidation and emergency spending'.

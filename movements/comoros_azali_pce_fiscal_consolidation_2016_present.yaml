# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: comoros_azali_pce_fiscal_consolidation_2016_present
status: candidate
name: Comoros Azali PCE fiscal consolidation 2016-present
countries: [COM]
timeframe:
  start: 2016
  end: ongoing
coalition: Convention for the Renewal of the Comoros-led government
leaders:
  - "Azali Assoumani (President, 2016-)"
  - "Mze Abdou Mohamed Chanfiou (Minister of Finance, Budget and Banking Sector)"
doctrine: >
  The Azali governing regime combines presidential institutional consolidation
  with the Plan Comores Emergent development strategy and IMF-supported fiscal
  repair. Its policy programme centralises executive authority, seeks
  infrastructure-led emergence by 2030, and uses revenue administration,
  debt-management, and state-owned-enterprise reforms to finance a small-island
  growth agenda.
policies:
  - com_2018_presidential_constitution_reform
  - com_plan_comores_emergent_2030_2019
  - com_imf_ecf_fiscal_governance_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "The 2018 constitutional redesign centralised presidential authority while IMF reforms add fiscal-governance controls."}
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "The emergence plan raises investment ambitions while the ECF restrains deficits and debt risks."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "ECF tax-administration measures increase domestic-revenue mobilisation."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "The emergence plan channels state attention to selected infrastructure, tourism, blue-economy, and energy priorities."}
references:
  - "IMF Country Report, Union of the Comoros 2025 Article IV Consultation and Fifth Review under the Extended Credit Facility, 2026."
  - "Union of the Comoros, Plan Comores Emergent 2030."
  - "Union of the Comoros Constitution as amended after the 2018 referendum."

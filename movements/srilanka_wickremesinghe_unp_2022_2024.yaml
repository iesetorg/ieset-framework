# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: srilanka_wickremesinghe_unp_2022_2024
status: candidate
name: "Wickremesinghe UNP transitional — IMF crisis executor (Sri Lanka)"
countries: [LKA]
timeframe:
  start: 2022
  end: 2024
  enacted_date: "2022-07-20"
coalition: "UNP single-seat president; elected by Parliament 134/223 on 20 Jul 2022 with SLPP parliamentary backing; no UNP parliamentary bloc of its own"
leaders:
  - "Ranil Wickremesinghe (President 21 Jul 2022 - 23 Sep 2024)"
  - "Nandalal Weerasinghe (CBSL Governor from Apr 2022)"
  - "Mahinda Siriwardana (Treasury Secretary)"
  - "Shehan Semasinghe (State Minister of Finance)"
doctrine: >
  UNP technocratic IMF-bailout executor appointed by Parliament in
  the aftermath of the July 2022 Aragalaya to manage the crisis
  without an electoral mandate of his own. Core policy content:
  (i) IMF Extended Fund Facility $2.9bn / 48-month, Executive Board
  approval 20 Mar 2023, with 2.3% of GDP primary-surplus target by
  2025; (ii) VAT hike 15%->18% effective 1 Jan 2024 plus
  VAT-threshold compression and reinstatement of PAYE — reversing
  the 2019 Gotabaya cuts; (iii) Central Bank of Sri Lanka Act
  No. 16 of 2023 codifying operational independence, flexible
  inflation targeting, and a statutory prohibition on monetary
  financing; (iv) SOE restructuring framework — CEB cost-recovery
  electricity tariffs (Aug 2022, Feb 2023, Jul 2023), CPC fuel
  pricing formula, SriLankan Airlines divestment track; (v)
  external-debt restructuring closer — Official Creditor Committee
  MoU Nov 2023 (Paris Club + India + China Exim via separate
  track), bondholder restructuring agreement-in-principle Jul 2024,
  exit from default Dec 2024 (technically completed under
  Dissanayake); (vi) Anti-Terrorism Bill (contested) and public-
  assembly restrictions against Aragalaya remnants. Coherence
  line: orthodox IMF-stabilisation + independent-CBSL architecture +
  distributional adjustment via VAT + SOE cost-recovery + debt
  restructuring completion — economically orthodox but politically
  delegitimised by appointment-without-mandate and heavy-handed
  policing. Popularity: parliamentary vote 134/223 on 20 Jul 2022;
  approval never broke 20% in Sep-Nov 2023 IHP polling; 2024
  presidential race finish 17.3% third place — rejected at ballot
  box despite macro stabilisation.
policies:
  - lk_sovereign_default_2022
  - lk_imf_eff_2023
  - lk_cbsl_act_2023
  - lk_soe_reform_act_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "EFF primary-surplus targeting drove expenditure restraint."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: strong, rationale: "VAT hike + PAYE reinstatement + threshold compression."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "CEB and CPC cost-recovery pricing reduced cross-subsidy."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "SOE divestment pipeline + cost-recovery tariffs."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "CBSL Act 2023 codifies independence + monetary-financing prohibition."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Debt restructuring completed rather than extended unilateral suspension."}
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: weak, rationale: "Anti-corruption legislation vs. contested Anti-Terrorism Bill and assembly restrictions."}
outcome_hypotheses:
  - imf_stabilisation_program_effects
  - central_bank_independence_inflation_effects
predecessor_movements:
  - srilanka_gotabaya_rajapaksa_slpp_2019_2022
successor_movements:
  - srilanka_dissanayake_npp_2024_present
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Orthodox IMF-stabilisation + CBSL independence upgrade."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "VAT broadening + SOE divestment track."}
  - {position_id: social_democratic, alignment: opposed, notes: "Regressive VAT burden and assembly restrictions."}
references:
  - "IMF Country Report 23/116 — Sri Lanka EFF request (Mar 2023)"
  - "Central Bank of Sri Lanka Act No. 16 of 2023"
  - "Official Creditor Committee MoU, 29 Nov 2023"
notes: >
  Institutionally distinctive: elected by parliament to fill
  presidential vacancy under Article 40 of the Constitution, not
  by popular vote — producing strong policy continuity on IMF
  track but weak political legitimacy.

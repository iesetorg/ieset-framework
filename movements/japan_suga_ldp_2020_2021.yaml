# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_suga_ldp_2020_2021
status: candidate
name: "Suga LDP transitional government"
countries: [JPN]
timeframe: {start: 2020, end: 2021, enacted_date: "2020-09-16"}
coalition: "LDP-Komeito (Suga administration, single-term transitional)"
leaders:
  - "Yoshihide Suga (PM, 16 Sep 2020 - 4 Oct 2021)"
  - "Taro Aso (Finance)"
  - "Takuya Hirai (first Digital Minister, from Sep 2021)"
  - "Haruhiko Kuroda (BoJ Governor, continuing)"
doctrine: >
  Transitional LDP-Komeito continuation of the Abenomics macro stance
  (BoJ QQE + YCC unchanged, fiscal flexibility via large COVID supplementary
  budgets) but pivoting the structural-reform arrow toward three operational
  priorities: (1) digital modernisation — creation of the Digital Agency
  (Dejitaru-chō) on 1 September 2021 to consolidate fragmented ministerial
  IT and push My-Number integration; (2) 2050 carbon-neutral pledge
  announced October 2020 in the Diet, with a 2030 46% emissions-cut target
  (from 2013 baseline) and the Green Growth Strategy published December
  2020 identifying 14 priority industries and a ¥2tn Green Innovation Fund;
  (3) consumer-facing deregulation of concentrated oligopolies, most
  visibly the mobile-carrier price reductions extracted from NTT Docomo,
  KDDI, and SoftBank in 2020-21 (roughly 40% drop in mid-tier plans).
  Coalition position is standard LDP centre-right — fiscally activist by
  Western benchmarks, socially conservative, security-realist — but the
  Suga period is defined by crisis management (COVID, Tokyo Olympics) more
  than a distinctive economic doctrine. Popularity collapsed from ~65%
  at inauguration to below 30% by late summer 2021 amid pandemic and
  Olympics handling; Suga withdrew from the LDP leadership race and did
  not contest; the October 2021 Shūgiin election under successor Kishida
  preserved the LDP-Komeito majority (LDP 261 of 465 seats, Komeito 32).
  Coherence line: Abenomics-macro continuity plus digital + green +
  consumer-regulatory deregulation, cut short by pandemic politics.
policies:
  - jp_digital_agency_2021
  - jp_2050_carbon_neutral_pledge_2020
  - jp_green_growth_strategy_2020
  - jp_mobile_carrier_price_reform_2020
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "BoJ QQE + YCC continuation unchanged through the Suga period; balance sheet expansion sustained."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Multiple COVID supplementary budgets totalling over ¥70tn in 2020-21; general government spending/GDP peaked above 45%."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "2050 net-zero pledge + 2030 -46% target + Green Growth Strategy set tighter trajectory than prior Abe-era 80% by 2050 framing."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Mobile-carrier price regulation forced 30-40% price reductions across NTT Docomo, KDDI, SoftBank; MIC pressure on oligopoly pricing."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "¥2tn Green Innovation Fund seeded December 2020 across 14 priority industries."}
predecessor_movements:
  - abenomics_2012_2020
successor_movements:
  - japan_kishida_ldp_2021_2024
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Continued QQE/YCC plus large fiscal response."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Digital Agency and mobile-carrier consumer deregulation are technocratic-pragmatist moves."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Mobile-carrier competition push welcomed; price-pressure mechanism less so."}
references:
  - "Cabinet Secretariat — establishment of the Digital Agency, Act No. 36 of 2021"
  - "Suga speech to the 203rd Diet, 26 October 2020 (2050 carbon-neutral pledge)"
  - "METI — Green Growth Strategy, December 2020 (revised June 2021)"
  - "MIC — Action Plan for Mobile Market Competition (October 2020)"
  - "NHK / Jiji approval-rating series, September 2020 - September 2021"
notes: >
  Coded as distinct transitional movement rather than a sub-phase of
  Abenomics because (i) the digital-agency and carbon-neutral pledges are
  doctrinally new, (ii) the mobile-carrier price-reform regulatory posture
  is specific to Suga, and (iii) the political coalition is the same LDP-
  Komeito vehicle but run by a non-faction-leader PM with a single-term
  mandate. Axes_summary reflects only the Suga-era incremental movement,
  not the full Abe-era monetary stance it inherited.

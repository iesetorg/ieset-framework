movement_id: israel_begin_likud_1977_1983
status: candidate
name: "Begin Likud — economic liberalisation attempt, inflation spiral, settlement expansion"
countries: [ISR]
timeframe: {start: 1977, end: 1983}
coalition: "Likud-led coalition (Likud, NRP, Agudat Yisrael) — 'Mahapach' (upheaval) government"
leaders:
  - "Menachem Begin (Prime Minister 1977-1983)"
  - "Simcha Ehrlich (Finance Minister 1977-1979 — architect of 1977 economic liberalisation)"
  - "Yigal Hurvitz (Finance Minister 1979-1981)"
  - "Yoram Aridor (Finance Minister 1981-1983 — 'correct economics' consumer-subsidy populism)"
doctrine: >
  Begin's 1977 'Mahapach' broke 29 years of Mapai/Labour rule and launched
  the first serious liberalisation attempt in Israel's state-led economy.
  Economic school: Ehrlich's October 1977 economic upheaval removed foreign
  exchange controls, devalued the lira ~43%, ended multiple exchange rates,
  and shifted toward an open market model — right-wing on the classic
  left-right axis relative to Labour's corporatist social democracy. Program
  quickly unravelled: inflation ran 50% in 1978, 110% by 1979, 130% by 1980;
  Camp David Accords (1978) brought a US aid boost but Sinai withdrawal
  cost; Lebanon war (June 1982) imposed fiscal strain. Aridor's 1981-82
  'correct economics' stabilised the shekel nominally via consumer subsidies
  and import liberalisation just before the 1981 elections — electoral bump
  (Likud held 48 seats) but accelerated the imbalances that produced the
  1983 bank-shares crash. Popularity: 1977 election 43 seats (Likud),
  1981 re-election 48 seats. Coherence: ideologically coherent (liberalisation
  + settlements + peace with Egypt + hawk on Lebanon) but fiscally incoherent —
  simultaneous defence spending, settlement subsidies, consumer subsidies,
  and tax cuts produced runaway inflation.
policies:
  - il_1977_economic_upheaval_fx_liberalisation
  - il_camp_david_accords_1978
  - il_aridor_consumer_subsidies_1981
  - il_1983_bank_shares_crisis
  - il_west_bank_settlement_expansion_likud_1977
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "1977 FX liberalisation ended multiple exchange rates, removed capital controls temporarily."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Partial capital-account opening 1977; reversed after 1983 banking crisis."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Inflation reached 400%+ by 1984 on cumulative monetary financing of deficits."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Simultaneous defence, settlement, and consumer-subsidy spending expanded deficit sharply."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Settlement subsidies and Aridor consumer subsidies expanded targeted spending."}

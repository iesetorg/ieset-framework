# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: saudi_vision_2030_2016_present
status: candidate
name: "Saudi Vision 2030 diversification programme"
countries: [SAU]
timeframe: {start: 2016, end: ongoing}
coalition: "Al Saud monarchy under Crown Prince Mohammed bin Salman; Council of Economic and Development Affairs"
leaders:
  - "King Salman bin Abdulaziz"
  - "Mohammed bin Salman (Crown Prince, Chair of CEDA, Chair of PIF)"
  - "Mohammed Al-Jadaan (Finance Minister 2016-present)"
  - "Yasir Al-Rumayyan (PIF Governor)"
doctrine: >
  National transformation programme announced April 2016 targeting reduced
  oil-revenue dependence, expanded non-oil private-sector share, labour-force
  participation increases (notably for women), and development of giga-
  projects (NEOM, Qiddiya, Red Sea, Diriyah). Instruments include: (1) fiscal
  reform — introduction of a 5% VAT in 2018 raised to 15% in 2020, expatriate
  levy, excise taxes on tobacco and sugary drinks; (2) subsidy reform —
  gradual fuel, electricity, and water tariff increases from 2015-2018; (3)
  the Public Investment Fund (PIF) scaled from ~$150bn to a targeted $2tn
  by 2030 as the primary state-capitalist investment vehicle, funded by
  Aramco stake transfers and the 2019 partial IPO (~1.5% sold); (4)
  regulatory reform — lifting of driving ban (2018), Guardian System
  reform (2019), labour-reform package allowing most expatriates to change
  employer without sponsor consent (2021); (5) entertainment-sector opening
  (cinemas, concerts, tourism visa 2019). Fiscal posture is pro-cyclical with
  oil: surpluses at high prices (2022), deficits at low (2016, 2020, 2023).
  Foreign policy and security dimensions (Yemen war, Khashoggi killing,
  Qatar blockade 2017-2021) are outside framework scope but relevant to
  institutional coding.
policies:
  - saudi_vat_introduction_2018
  - saudi_energy_subsidy_reform_2015_2021
  - saudi_pif_expansion_2016_present
  - saudi_aramco_partial_ipo_2019
  - saudi_labour_market_reforms_2019_2021
  - saudi_women_workforce_reforms_2017_2021
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "mixed", rationale: "Reduction of consumer energy subsidies alongside large new industrial subsidy flows through PIF into domestic sectors."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: moderate, rationale: "Energy subsidy cuts; partial offset via Citizen Account direct transfers for lower-income Saudis."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Entertainment/tourism sector openings, FDI licensing reforms, but state capitalism footprint via PIF expanded simultaneously."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "2021 reforms ended much of the kafala sponsor-transfer restriction; female labour participation rose from ~17% to ~35% 2016-2023."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Centralisation of power under CP, 2017 'Ritz-Carlton' anti-corruption detentions bypassed formal due process."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Tourist visa regime; selective FDI liberalisation under National Investment Strategy 2021."}
outcome_hypotheses: [resource_diversification_programme_effectiveness]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Explicit state-directed diversification with sovereign-wealth vehicle as planner-investor."}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "VAT and subsidy reform fiscally orthodox; PIF footprint not."}
  - {position_id: classical_liberal, alignment: partially_aligned}
references:
  - "Kingdom of Saudi Arabia (2016), 'Vision 2030' and National Transformation Programme documents"
  - "IMF Article IV Saudi Arabia, 2018, 2020, 2023"
  - "Hertog (2019), 'Challenges to the Saudi distributional state'"
  - "Alshahrani (2021), 'Women's Economic Participation in Saudi Arabia'"
notes: "Identification challenge: oil-price cycle is the dominant macro driver; treatment-effect estimation needs Gulf comparator group (UAE, Qatar, Kuwait) with oil-price as covariate."

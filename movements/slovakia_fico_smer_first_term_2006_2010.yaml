name: "Fico Smer first-term euro-adoption social democracy 2006-2010"
countries: [SVK]
timeframe: {start: 2006, end: 2010, enacted_date: "2006-07-04"}
coalition: "Smer-SD - SNS - LS-HZDS"
leaders:
  - "Robert Fico (Prime Minister, Smer-SD, 2006-2010)"
  - "Jan Pociatek (Finance Minister, Smer, 2006-2010)"
  - "Jan Slota (SNS leader, coalition partner)"
  - "Vladimir Meciar (HZDS leader, coalition partner)"
doctrine: >
  Fico Smer first-term — populist-left reversal of parts of the Dzurinda
  agenda but retention of the flat tax and euro-adoption path.
  Economic school: Slovak social-populist — abolished healthcare user-
  fees (Sep 2006), renationalised elements of health insurance (public
  insurer monopoly path, partially), introduced 13th and 14th-month
  pension indexation tweaks, but kept 19% flat tax through most of the
  term. Left-right axis: centre-left with national-populist coalition
  partners (SNS, HZDS). Dated policies: euro adoption 1 January 2009
  (ERM-II entered Nov 2005, conversion rate 30.126 SKK/EUR set July
  2008), healthcare user-fee abolition 1 September 2006, global financial
  crisis response (scrappage scheme, employment subsidies 2009).
  Popularity: Smer became dominant party (29.1% 2006, 34.8% 2010 but
  lost coalition math). Coherence: moderate — SNS/HZDS drag but Fico
  personally dominant.
policies:
  - sk_euro_adoption_2009
  - sk_healthcare_user_fee_abolition_2006
  - sk_crisis_scrappage_scheme_2009
axes_summary:

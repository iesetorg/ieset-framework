# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: oman_haitham_fiscal_state_modernisation_2020_present
status: candidate
name: "Oman Haitham fiscal and state modernisation"
countries: [OMN]
timeframe: {start: 2020, enacted_date: "2020-01-11", end: ongoing}
coalition: "Sultan Haitham bin Tariq's monarchy and appointed cabinet"
leaders:
  - "Haitham bin Tariq Al Said (Sultan)"
  - "Sayyid Theyazin bin Haitham Al Said (Crown Prince)"
  - "Sultan bin Salim Al Habsi (Minister of Finance)"
doctrine: >
  Sultan Haitham's governing programme has paired continuity in Oman's
  consensus-monarchical foreign policy with a domestic reset built around
  Vision 2040, fiscal consolidation after the 2014-2020 oil-price shock, and
  institutional codification. The core package includes VAT introduction,
  unified social-protection financing, and a rewritten labour code that
  formalises Omanisation, remote work, grievance procedures, and migrant-worker
  protections.
policies:
  - oman_vat_introduction_2021
  - oman_social_protection_law_2023
  - oman_labour_law_2023
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "VAT introduced broad consumption taxation from a low non-oil revenue base."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Social Protection Law consolidated old-age, disability, maternity, childhood, unemployment, and insurance branches."}
  - {axis: regulatory.labour_market_flexibility, direction: "mixed", magnitude: moderate, rationale: "The new labour law added worker protections and Omanisation duties while also recognising remote work and economic termination rules."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Codified labour and social-insurance entitlements made enforcement more rule-based."}
references:
  - "Royal Decree 121/2020 issuing the VAT Law: https://qanoon.om/p/2020/rd2020121/"
  - "Royal Decree 52/2023 issuing the Social Protection Law: https://qanoon.om/p/2023/rd2023052/"
  - "Royal Decree 53/2023 issuing the Labour Law: https://qanoon.om/p/2023/rd2023053/"
notes: "First Lane D tranche movement for sparse OMN coverage; kept to legal reforms with primary decree texts."

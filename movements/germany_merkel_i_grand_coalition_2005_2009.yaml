movement_id: germany_merkel_i_grand_coalition_2005_2009
status: candidate
name: "Merkel I CDU/CSU-SPD Grand Coalition 2005-2009"
countries: [DEU]
timeframe: {start: 2005, end: 2009, enacted_date: "2005-11-22"}
coalition: "CDU/CSU (226) + SPD (222) Grand Coalition, 'GroKo I'"
leaders:
  - "Angela Merkel (Chancellor)"
  - "Peer Steinbrück (SPD, Finance Minister)"
  - "Frank-Walter Steinmeier (SPD, Foreign/Vice-Chancellor)"
doctrine: >
  First-term Merkel stewardship between two shocks: inheriting the Schröder
  Agenda-2010 reforms and responding to the 2008-09 global financial crisis.
  Economic school: ordoliberal-CDU fiscal-rules orientation softened by SPD
  partner and crisis Keynesianism. Defining episodes: VAT rise from 16% to
  19% (Jan 2007) part-financing corporate-tax reform; Konjunkturpaket I
  (Nov 2008 €50bn) and Konjunkturpaket II (Jan 2009 €50bn) car-scrappage
  bonus (Abwrackprämie), infrastructure, and a Kurzarbeit work-sharing
  expansion credited with limiting unemployment rise; Financial Market
  Stabilisation Fund / SoFFin (Oct 2008 €480bn envelope) recapitalising
  Hypo Real Estate and Commerzbank; Bad-Bank Act (Jul 2009). Constitutional
  debt brake (Schuldenbremse) enshrined in Grundgesetz Art. 109/115 (2009).
  Left-right: centrist ordoliberal-corporatist. Popularity: CDU/CSU 35.2%
  (2005 vote); lost Landtage in North Rhine-Westphalia, Hessen; 2009 federal
  election CDU/CSU 33.8%, SPD collapsed to 23.0% (historic low). Coherence:
  high — disciplined crisis response within ordoliberal fiscal constraints.
policies:
  - de_vat_rise_19_2007
  - de_konjunkturpakete_i_ii_2008_2009
  - de_soffin_bank_stabilisation_2008
  - de_kurzarbeit_gfc_expansion_2008_2009
  - de_schuldenbremse_2009
axes_summary:

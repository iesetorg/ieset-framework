  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "2008 Unternehmensteuerreform: federal corporate rate 25% to 15% (statutory total ~30%)."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "ECB rates cut from 4.25% to 1.00% Oct 2008-May 2009; Germany passive recipient."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Bad-Bank Act, SoFFin recapitalisations tightened state role in finance."}

movement_id: czech_republic_necas_ods_2010_2013
status: candidate
name: "Necas ODS-TOP09-VV austerity coalition 2010-2013"
countries: [CZE]
timeframe: {start: 2010, end: 2013, enacted_date: "2010-07-13"}
coalition: "ODS-TOP09-Veci verejne (later LIDEM)"
leaders:
  - "Petr Necas (Prime Minister, ODS, 2010-2013)"
  - "Miroslav Kalousek (Finance Minister, TOP09)"
  - "Karel Schwarzenberg (Foreign Minister, TOP09)"
doctrine: >
  Necas ODS-led "budget-responsibility" coalition — the principal Czech
  austerity episode of the euro debt crisis. Economic school: Czech
  centre-right orthodox consolidation (Kalousek-TOP09 fiscal orthodoxy) —
  VAT rate convergence (reduced rate 10% -> 14% -> 15%, standard 20% ->
  21%), pension-age rise law Sep 2011 (no cap, 1-2 months/year), super-
  gross-wage retention, second-pillar pension funds launched Jan 2013
  (voluntary opt-in). Church-restitution act Nov 2012 (CZK 59bn financial
  compensation over 30 years plus property return). Left-right axis:
  centre-right. Dated policies: budget-responsibility package 2011, VAT
  unification 2012, pension-age uncapped 2011, church restitution Nov
  2012. Corruption: Nagyova-chief-of-staff surveillance scandal June
  2013 brought Necas down. Popularity: severely eroded by austerity
  unpopularity and corruption cases. Coherence: low — VV split, LIDEM
  breakaway, internal ODS factionalism.
policies:
  - cz_vat_unification_2012_2013
  - cz_pension_age_uncap_2011
  - cz_church_restitution_2012
  - cz_second_pillar_pensions_2013
  - cz_super_gross_wage_reform_2013

  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Ley 1473 fiscal-rule structural-deficit path anchored public finances."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "US FTA + EU FTA + Pacific Alliance founding."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Victims Law + restitución de tierras set property-restitution process + transitional-justice architecture."}
outcome_hypotheses: [peace_process_economic_dividend, fiscal_rule_commitment_credibility]

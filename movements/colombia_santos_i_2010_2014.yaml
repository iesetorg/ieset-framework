movement_id: colombia_santos_i_2010_2014
status: candidate
name: "Juan Manuel Santos first term — FARC talks, Ley de Víctimas, OECD path"
countries: [COL]
timeframe: {start: 2010, end: 2014, enacted_date: "2010-08-07"}
coalition: "Unidad Nacional (Partido de la U + Liberales + Cambio Radical + Conservadores)"
leaders:
  - "Juan Manuel Santos (President 2010-2018)"
  - "Juan Carlos Echeverry (Finance 2010-2012)"
  - "Mauricio Cárdenas (Finance 2012-2018)"
  - "José Darío Uribe (Banco de la República)"
doctrine: >
  Santos I pivoted Colombian governance from Uribe-era securitisation to a
  peace-negotiation + institutional-reform agenda. (a) Economic school:
  centre-right liberal-institutionalist + OECD-aspirant — fiscal-rule law
  Ley 1473 Jul 2011, royalties reform constitutional amendment Acto
  Legislativo 05/2011 + Ley 1530/2012 redistributing extractive royalties
  from producer-regions to national system, tax reform Ley 1607 Dec 2012
  (CREE replacing payroll contributions, formalisation push), FTA with
  USA effective May 2012 + EU Aug 2013, Alianza del Pacífico founding
  Jun 2012, Ley 1448 Jun 2011 Víctimas + Restitución de Tierras.
  (b) Left-right: centre-right, less securitarian than Uribe, more
  multilateralist; internal party tension with Uribista right. (c) Dated
  policies: Ley 1448 Victims Law 10 Jun 2011, Ley 1473 fiscal rule 5 Jul
  2011, royalties reform Acto Legislativo 05/2011 Jul 2011, US FTA
  implementation May 2012, tax reform Ley 1607 Dec 2012, FARC peace
  talks launched Oct 2012 Havana. (d) Popularity: won Jun 2010 runoff
  69.1%; approval slid from mid-60s to 20s by 2014 (Uribe-Santos
  rupture 2012, agrarian strike Aug 2013); narrowly re-elected Jun
  2014 runoff 50.9% on peace-process continuity mandate. (e)
  Coherence: high at policy level — fiscal-rule + royalties + tax reform +
  victims law + FTAs formed a consistent institutional-reform set; peace
  negotiations politically divided former coalition.
policies:
  - co_victims_law_ley_1448_2011
  - co_fiscal_rule_ley_1473_2011
  - co_royalties_reform_2011_2012
  - co_tax_reform_ley_1607_2012
  - co_farc_peace_talks_launch_2012
axes_summary:

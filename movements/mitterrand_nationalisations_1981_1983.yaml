# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: mitterrand_nationalisations_1981_1983
status: candidate
name: "Mitterrand nationalisation + expansionary programme (France)"
countries: [FRA]
timeframe: {start: 1981, end: 1983}
coalition: "Socialist Party (PS) with Communist Party (PCF) support, post-May 1981 landslide"
leaders: ["François Mitterrand (President)", "Pierre Mauroy (PM)", "Jacques Delors (Economy from 1983)"]
doctrine: >
  Common Programme of the Left: nationalisation of 5 industrial groups
  + 39 banks + 2 financial companies (1982), 39-hour work week, 5-week
  paid vacation, retirement at 60, minimum wage 10% rise, employment
  guarantees, fiscal expansion. Encountered three franc crises (Oct 1981,
  Jun 1982, Mar 1983) as domestic expansion collided with German-
  anchored EMS + US Volcker rates. Mar 1983 "tournant de la rigueur" —
  Mitterrand chose to stay in EMS rather than exit, pivoted to austerity
  + market-oriented policies. The 1981-1983 movement and the 1983+
  correction are two distinct movements; this entry covers the
  expansionary phase.
policies: [france_nationalisations_1982, france_39_hour_week_1982, france_retirement_60_1981, france_minimum_wage_rise_1981]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Massive nationalisation sweep."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: strong, rationale: "39-hour week + retirement age reduction."}
outcome_hypotheses: [expansionary_populism_and_currency_crisis]
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "Loi n° 82-155 du 11 février 1982 de nationalisation"
  - "Hall (1986), Governing the Economy"
  - "Sachs-Wyplosz (1986), 'The Economic Consequences of President Mitterrand'"
notes: "Pre-1996 sample extension. The 1983 tournant de la rigueur is a separate movement (france_mitterrand_austerity_tournant_1983); ordering matters for content coding per D.3.1."

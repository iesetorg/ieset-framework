movement_id: india_rajiv_gandhi_congress_1984_1989
status: candidate
name: "Rajiv Gandhi Congress — technocratic early liberalisation (India)"
countries: [IND]
timeframe: {start: 1984, end: 1989}
coalition: "Indian National Congress (Indira) — INC(I), Rajiv-led"
leaders:
  - "Rajiv Gandhi (PM, 1984-1989)"
  - "V.P. Singh (Finance Minister 1984-1987; Defence Minister, resigned 1987 over Bofors)"
  - "R. Venkataraman (President from 1987)"
  - "Abid Hussain (Commerce Secretary, architect of trade-policy shift)"
  - "Sam Pitroda (telecom/technology adviser, C-DOT)"
doctrine: >
  Technocratic-modernising Congress(I) doctrine — 'computer boys'
  liberalisation while retaining licence-raj scaffolding. Economic
  school: developmentalist-modernising centre-left with early supply-
  side concessions. Dated policies: Long-Term Fiscal Policy Dec 1985
  (first formal medium-term fiscal framework); New Textile Policy Jun
  1985 liberalising mill-versus-powerloom rules; broadband delicensing
  of industries (Modified Value-Added Tax MODVAT 1986, cascading-tax
  relief); New Telecom Policy 1986 and C-DOT (Centre for Development of
  Telematics) establishment Aug 1984 under Sam Pitroda; import
  liberalisation — OGL (Open General Licence) list expanded; 60th
  Constitutional Amendment 1985 anti-defection law (Tenth Schedule);
  Punjab Accord Jul 1985 with Akali Dal and Assam Accord Aug 1985
  attempting communal de-escalation; Shah Bano case and Muslim Women
  (Protection of Rights on Divorce) Act 1986 reversal; Bofors artillery
  scandal 1987 onward. Left-right: centre-left Congress mainstream with
  liberalising technocratic overlay. Popularity: Dec 1984 general
  election INC(I) 48.1% / 414 seats — largest mandate in Indian history,
  sympathy-surge after Indira's assassination; Nov 1989 general election
  INC 39.5% / 197 seats — lost, Bofors + Mandal politics + V.P. Singh
  defection. Coherence: moderate — genuine early liberalisation signals
  (MODVAT, textile, telecom, import OGL) vs. Shah Bano and Bofors
  undermining the reform narrative; durable legacy via telecom/C-DOT
  and MODVAT architecture that persisted through 1991 reforms.
policies:
  - india_long_term_fiscal_policy_1985
  - india_modvat_1986
  - india_new_telecom_policy_1986
  - india_cdot_establishment_1984
  - india_new_textile_policy_1985
  - india_anti_defection_10th_schedule_1985
  - india_muslim_women_act_shahbano_reversal_1986
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "MODVAT 1986 reduced cascading excise; corporate-tax schedule simplified modestly."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "OGL import list expansion, textile mill-rule liberalisation, computer/telecom delicensing."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "OGL expansion; tariffs still high but structure simplified under LTFP."}
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: moderate, rationale: "Anti-defection 10th Schedule strengthened party-discipline floor; Shah Bano reversal weakened uniform civil-code trajectory; Bofors opacity reinforced erosion."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Entry liberalisation in telecom equipment and textiles; licence-raj core retained."}
predecessor_movements:
  - india_indira_return_1980_1984
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: aligned}
references:
  - "Ahluwalia (2002), 'Economic Reforms in India Since 1991' JEP"
  - "Long-Term Fiscal Policy, Government of India, Dec 1985"
  - "Election Commission of India — 8th and 9th Lok Sabha results"
notes: "Deep-history tranche 1. Bridge movement to 1991 liberalisation."

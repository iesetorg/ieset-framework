movement_id: argentina_proceso_military_junta_1976_1983
status: candidate
name: "Proceso de Reorganización Nacional — military junta (Videla-Galtieri-Bignone)"
countries: [ARG]
timeframe: {start: 1976, end: 1983, enacted_date: "1976-03-24"}
coalition: "Military junta (Army, Navy, Air Force) — successive presidents"
leaders:
  - "Jorge Rafael Videla (Army General; President 1976-1981)"
  - "Roberto Viola (President Mar-Dec 1981)"
  - "Leopoldo Galtieri (President 1981-1982)"
  - "Reynaldo Bignone (President 1982-1983)"
  - "José Alfredo Martínez de Hoz (Economy 1976-1981) — 'the Chicago-affinity financial-liberaliser'"
  - "Roberto Alemann (Economy 1981-1982)"
  - "Jorge Wehbe (Economy 1982-1983)"
doctrine: >
  Military junta that deposed Isabel Perón 24 March 1976 and ran the
  "Proceso de Reorganización Nacional" until handover to Alfonsín in
  December 1983. Two parallel content streams: (1) state terror — the
  "dirty war" disappeared ~30,000 people (CONADEP 1984 count ~9,000
  documented, human-rights organisations ~30,000) via clandestine
  detention centres (ESMA, Campo de Mayo, La Perla), torture, and
  "vuelos de la muerte"; (2) Martínez de Hoz economic programme 1976-1981
  — financial liberalisation (1977 banking reform, "la plata dulce"
  capital inflow era), tariff reduction in stages, state-enterprise
  privatisation attempts, and the "tablita" crawling-peg pre-announced
  devaluation regime (December 1978) used as an inflation-targeting
  instrument. The tablita collapsed March 1981 (40% devaluation) as
  real-exchange-rate appreciation and external debt (USD 7bn 1976 →
  USD 45bn 1983) made the peg untenable. April 1982 Malvinas/Falklands
  War — Galtieri's junta invaded 2 April, surrendered 14 June; defeat
  accelerated transition. 1982 bank-regulation reversal nationalised
  private-debt FX losses via "seguro de cambio". Stated school:
  national-security-state political doctrine + Martínez-de-Hoz
  orthodox-monetarism economic doctrine within an authoritarian frame.
  Left-right axis: authoritarian-right on political content; market-
  liberal-in-form economic content (1976-1981) shifting to statist-
  rescue (1982-83). Popularity / legitimacy: no elections during the
  Proceso; 1983 self-amnesty law (Ley 22.924) declared void by Alfonsín
  Dec 1983; Malvinas defeat broke junta legitimacy. Coherence line:
  trade democratic legitimacy and human rights for what proponents
  framed as anti-communist national-reorganisation — a historical
  test case in which state-terror institutional-quality negatives
  coexisted with selective market-liberal economic content per
  Invariant 3.
policies:
  - ar_proceso_state_terror_1976_1983
  - ar_martinez_de_hoz_financial_liberalisation_1977
  - ar_tablita_cambiaria_1978_1981
  - ar_malvinas_war_1982
  - ar_seguro_de_cambio_1982
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "1977 banking reform widened entry and rate-setting; reversed 1982 via seguro de cambio nationalisation of FX losses."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Tariff reductions 1976-1981; reversed after 1981 crisis."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "State-terror clandestine detention; 1983 self-amnesty."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Military Courts parallel to civilian; judges purged; Supreme Court replaced."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Mixed — formal rights preserved but expropriations of dissident property; 1982 seguro de cambio socialised private debt losses."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Military spending expanded; SOE deficits bled into fiscal."}
outcome_hypotheses: [market_reform_growth_effect_authoritarian_vs_democratic, state_terror_institutional_legacy]
successor_movements: [argentina_alfonsin_ucr_1983_1989]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Martínez de Hoz monetary framework drew on Chicago traditions but institutional frame is disqualifying."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Economic liberalisation content present; authoritarian political content opposed."}
  - {position_id: institutionalism, alignment: opposed, notes: "State-terror apparatus destroyed rule-of-law substrate."}
references:
  - "CONADEP Nunca Más Report 1984"
  - "Ley 22.924/1983 (self-amnesty, void under Alfonsín Ley 23.040/1983)"
  - "Rapoport (2000), Historia Económica, Política y Social de la Argentina"
  - "Canitrot (1980), La disciplina como objetivo de la política económica"
  - "Malvinas/Falklands — UN SC Resolutions 502 (April 1982), 505 (May 1982)"
notes: >
  Combines Videla / Viola / Galtieri / Bignone presidencies within the
  single junta institutional frame. Companion to subsequent
  argentina_alfonsin_ucr_1983_1989 and later
  menem_convertibility_argentina_1991_2001.

movement_id: kenya_kibaki_narc_first_2002_2007
status: candidate
name: "Kibaki NARC first term — growth takeoff, Anglo-Leasing scandal, 2005 referendum NO, 2007 post-election violence"
countries: [KEN]
timeframe: {start: 2002, end: 2007}
coalition: "National Rainbow Coalition (NARC) — multi-ethnic anti-KANU front that fractured post-2005"
leaders:
  - "Mwai Kibaki (President 30 December 2002 - 9 April 2013; first term to December 2007)"
  - "David Mwiraria / Amos Kimunya (Finance Ministers)"
  - "Andrew Mullei / Njuguna Ndung'u (CBK Governors)"
  - "Raila Odinga (LDP, former NARC ally, led ODM opposition from 2005)"
doctrine: >
  Economic school: liberal-market growth agenda — post-Moi KANU
  dismantling, free primary education, anti-corruption rhetoric,
  East African Community revival, infrastructure public investment.
  Left-right axis: centre-right with social-service expansion — pro-
  market on regulation, trade, telecom liberalisation but substantial
  education/health spending. Dated policies: Free Primary Education
  policy announced January 2003 (enrolment +1.3m first year); Economic
  Recovery Strategy for Wealth and Employment Creation 2003-2007
  (launched June 2003); mobile money ecosystem (M-Pesa March 2007);
  East African Community Customs Union Protocol 2 March 2004 (in force
  1 January 2005); Anglo-Leasing fictitious-contracts scandal exposed
  2004-2006 ($770m security contracts); Constitution of Kenya
  Referendum 21 November 2005 — "Wako Draft" defeated 58%-42%, NARC
  fractured; December 2007 election disputed, 1200+ killed in post-
  election violence Dec 2007-Feb 2008. Popularity: 62.2% December
  2002 election (ended 24 years of KANU-Moi); narrow disputed win
  December 2007 (46% official vs Odinga 44%). Coherence: moderate —
  strong growth 2003-2007 (real GDP 2.9% → 7.0%) but coalition
  fragmentation and post-election violence ended era.
policies:
  - ke_free_primary_education_2003
  - ke_economic_recovery_strategy_2003
  - ke_eac_customs_union_2005
  - ke_anglo_leasing_scandal_2004
  - ke_constitutional_referendum_2005
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Free primary education and constituency-development funding expanded public provision."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "EAC Customs Union bound tariffs and phased intra-EAC duty-free trade."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "Telecom liberalisation enabled Safaricom M-Pesa launch 2007; banking deregulation."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Anglo-Leasing + 2007 disputed election exposed fragility."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Constitutional process contested; 2005 referendum preserved status-quo structures."}

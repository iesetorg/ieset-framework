# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_costa_ps_2015_2024
status: candidate
name: "Costa PS geringonça and majority: post-austerity recovery with EU fiscal compliance (Portugal 2015-2024)"
countries: [PRT]
timeframe: {start: 2015, end: 2024, enacted_date: "2015-11-26"}
coalition: "PS minority 2015-2019 supported by BE, PCP, PEV (the 'geringonça' confidence-and-supply accords signed November 2015); PS minority 2019-2022; PS absolute majority 2022-2024 (120 of 230 seats)"
leaders:
  - "António Costa (PS, Prime Minister November 2015 - April 2024)"
  - "Mário Centeno (Finance Minister 2015-2020, Eurogroup President 2018-2020; then Banco de Portugal Governor)"
  - "João Leão (Finance Minister 2020-2022)"
  - "Fernando Medina (Finance Minister 2022-2024)"
  - "Pedro Nuno Santos (Infrastructure & Housing Minister 2019-2022; PS leader from December 2023)"
doctrine: >
  PS-led centre-left governance installed when Costa, after PS placed
  second in October 2015, negotiated the geringonça confidence-and-supply
  accords with Bloco de Esquerda, PCP, and PEV — the first time the
  Portuguese radical left backed a governing PS. Economic school:
  post-austerity recovery path within EU fiscal rules (SGP / 3% deficit
  ceiling) — what Costa called 'virar a página da austeridade' while
  publicly committing to Eurogroup targets. Left-right axis: centre-left
  (social-democratic PS) with external radical-left parliamentary
  support 2015-2019, then a pure PS configuration. Core content:
  (a) reversal of Troika-era public-wage and pension cuts (State Budget
  2016 LEI 7-A/2016 phased restoration, completed 2018); (b) minimum
  wage trajectory from €505 (2015) to €820 (2024) — a 62% cumulative
  nominal rise, with tripartite Concertação Social accords; (c) IRS
  reform 2023 (OE2024) creating IRS Jovem with progressive relief for
  under-35 earners and trimming middle-bracket rates; (d) corporate
  tax schedule largely unchanged at 21% but surcharges adjusted;
  (e) 'Mais Habitação' housing package (Lei 56/2023, October 2023):
  golden-visa programme for real-estate terminated February 2023 and
  formally ended by the law; forced leasing of vacant dwellings in
  urban pressure zones (contested); short-term-rental (AL) licence
  freeze outside low-density interior; rent-cap formula for new leases;
  (f) right-to-housing constitutional debate intensified 2022-2023 amid
  price pressure in Lisbon/Porto and 60 000+ Digital Nomad arrivals;
  (g) NextGenerationEU PRR (Plano de Recuperação e Resiliência) €16.6bn
  grants + €5.4bn loans, execution chronically behind schedule; (h)
  SNS reform — creation of Direção Executiva 2022, public-sector hiring
  push, ongoing capacity strain; (i) TAP recapitalisation and
  partial-privatisation process (unresolved at Costa's resignation).
  Popularity: PS won 2015 (32.3% and 86 seats, government formed via
  geringonça), 2019 (36.3%, 108 seats), and 2022 absolute majority
  (41.4%, 120 seats) — the first PS majority since 2005. 2019 European
  elections: PS 33.4% (first place). 2024 European elections held
  after Costa's resignation: PS lost to AD 31.1% vs 32.1%.
  Approval eroded through 2023 amid housing, inflation, and the
  Operação Influencer prosecutorial probe that triggered Costa's
  resignation 7 November 2023 (he was later not indicted — the PGR
  acknowledged February 2024 a transcription error in the search warrant).
  Coherence judgement: doctrinally coherent post-austerity recovery
  that delivered hospital-to-Brussels fiscal respectability (primary
  surpluses from 2017, 2023 budget surplus of 1.2% GDP) but under-
  delivered on the housing and public-services capacity problems that
  ultimately cost it the 2024 election.
policies:
  - pt_public_wage_pension_reversal_2016_2018
  - pt_minimum_wage_trajectory_2015_2024
  - pt_mais_habitacao_housing_package_2023
  - pt_golden_visa_real_estate_rollback_2023
  - pt_irs_jovem_2023
  - pt_prr_ngeu_implementation_2021_2026
  - pt_sns_direcao_executiva_2022
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Wage and pension reversals plus SNS hiring lifted expenditure share; EU fiscal targets met via revenue growth and interest-cost decline more than expenditure restraint."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pension extraordinary updates 2017-2023, Complemento Solidário para Idosos uprating, prestação social para a inclusão (PSI) rollout."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "IRS Jovem 2023 plus de-compression of middle brackets; overall modestly more progressive than Passos Coelho schedule."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Agenda do Trabalho Digno (Lei 13/2023) tightened fixed-term and platform-work rules; a modest partial reversal of 2012 flexibilisation."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No headline PMR programme; some housing-market restrictions offset by digital-economy liberalisations — net near-zero."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Mais Habitação introduced AL licence freeze and rent-cap formula in housing sector; partial rollback of Passos-era sectoral opening in one sub-sector."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: weak, rationale: "Golden-visa real-estate track rolled back 2023; offset by expedited CPLP-mobility visas and Digital Nomad visa 2022 — direction negative on the high-profile RRE strand but not across the board."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Institutions operated normally; Operação Influencer episode exposed procedural weakness (transcription error in search warrant) but did not trigger structural erosion."}
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Demand-side wage and transfer recovery within EU fiscal-rule constraints."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Primary-surplus commitment and SGP compliance."}
  - {position_id: democratic_socialist, alignment: partially_aligned, notes: "BE/PCP external support 2015-2019 parliamentary phase only."}
predecessor_movements:
  - portugal_passos_coelho_psd_cds_2011_2015
successor_movements:
  - portugal_montenegro_ad_2024_present
references:
  - "Acordos de confiança e supporte parlamentar PS-BE, PS-PCP, PS-PEV (November 2015)"
  - "Lei 56/2023 (Mais Habitação)"
  - "Lei 13/2023 (Agenda do Trabalho Digno)"
  - "Orçamento do Estado 2024 (Lei 82/2023) — IRS Jovem"
  - "Decreto Regulamentar 2/2023 (ending golden-visa ARI real-estate track)"
  - "Banco de Portugal, Boletim Económico (various, 2016-2024)"
  - "Conselho das Finanças Públicas, Evolução Orçamental (2017-2023)"
  - "European Commission, Country Report Portugal (2016-2024)"
notes: >
  Coded as one continuing movement across the 2015-2019 geringonça,
  2019-2022 PS-minority, and 2022-2024 PS-majority configurations
  because the doctrinal line (post-austerity recovery within EU rules)
  is continuous. Monetary channel is exogenous (ECB). Costa's
  resignation (7 Nov 2023) and the subsequent non-indictment
  (PGR clarification Feb 2024) are political events outside the
  economic-content coding.

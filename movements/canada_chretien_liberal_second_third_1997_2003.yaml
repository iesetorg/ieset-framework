movement_id: canada_chretien_liberal_second_third_1997_2003
status: candidate
name: "Chrétien Liberal II+III — surplus, Clarity Act, Iraq refusal"
countries: [CAN]
timeframe: {start: 1997, end: 2003, enacted_date: "1997-06-02"}
coalition: "Liberal Party majority (1997, 2000)"
leaders:
  - "Jean Chrétien (Prime Minister 1993-2003)"
  - "Paul Martin (Finance 1993-2002)"
  - "John Manley (Finance 2002-2003; Deputy PM)"
  - "Stéphane Dion (Intergovernmental Affairs — Clarity Act architect)"
doctrine: >
  Liberal centrist fiscal-surplus + national-unity federalism operating
  in the post-1995 referendum aftermath. Five doctrinal pillars:
  (a) Surplus era — budget balance achieved FY1997-98; net federal
  debt-to-GDP 68% (1996) → 45% (2003); tax cuts in Feb 2000 ($58B
  five-year package including basic-rate reduction) as surplus allowed;
  EI premium reductions. (b) Clarity Act (Bill C-20, 29 June 2000) —
  response to 1998 Reference re Secession of Quebec; required clear
  question + clear majority for secession negotiations to begin. (c)
  Iraq refusal — 17 March 2003 Chrétien announced in Commons Canada
  would not join US-led invasion without UN Security Council
  authorisation; broke with Bush/Blair. (d) Marijuana decriminalisation
  proposal 2003 — Bill C-38 (died on Order Paper); same-sex marriage
  litigation in provinces pre-setting 2005 federal legislation. (e)
  Kyoto ratification (17 Dec 2002) + CPP reform 1997 (employer+employee
  contribution phase-up; CPP Investment Board arm's-length created).
  Stated school: Liberal-centrist fiscal-consolidation + pan-Canadian
  federalism + multilateralist foreign policy. Left-right: centre;
  fiscally conservative, socially progressive. Popularity: 1997
  election 38.5% 155 seats (bare majority); 2000 election 40.8% 172
  seats; approval >50% through most of second term; sponsorship-
  scandal revelations from 2002 eroded position; Chrétien announced
  retirement Aug 2002, stepped down 12 Dec 2003. Coherence: trade
  Trudeau-era deficit tradition and Quebec-ambiguity tolerance for
  permanent surplus institutional practice, clear secession rule,
  and independent multilateralist posture — at the cost of sponsorship-
  scandal accumulation and eventual Martin-Chrétien rift.
policies:
  - ca_clarity_act_2000
  - ca_cpp_reform_1997
  - ca_february_2000_tax_cut
  - ca_kyoto_ratification_2002
  - ca_iraq_war_refusal_2003
axes_summary:

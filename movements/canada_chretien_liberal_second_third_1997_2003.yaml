  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Feb 2000 package cut basic and middle rates."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Kyoto ratified Dec 2002."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Clarity Act codified Secession Reference test."}
outcome_hypotheses: [fiscal_consolidation_growth_effect, federalism_clarity_institutional_effect]

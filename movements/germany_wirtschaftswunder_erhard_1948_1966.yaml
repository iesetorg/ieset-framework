# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: germany_wirtschaftswunder_erhard_1948_1966
status: candidate
name: "Wirtschaftswunder and Erhard Social Market Economy (West Germany)"
countries: [DEU]
timeframe: {start: 1948, end: 1966}
coalition: "CDU/CSU-led governments, FDP coalition partner; Bizone then Federal Republic from 1949"
leaders:
  - "Ludwig Erhard (Economics Minister 1949-1963, Chancellor 1963-1966)"
  - "Konrad Adenauer (Chancellor 1949-1963)"
  - "Alfred Müller-Armack (State Secretary, coined 'Soziale Marktwirtschaft')"
  - "Wilhelm Röpke, Walter Eucken (Freiburg School intellectual architects)"
doctrine: >
  Ordoliberal Soziale Marktwirtschaft: the state sets and enforces a
  competitive rule-of-law framework (Ordnungspolitik) within which markets
  allocate, complemented by a non-discretionary social safety net. Core
  events: currency reform 20 June 1948 replacing Reichsmark with Deutsche
  Mark under Bizonal Economic Council; simultaneous abolition of price
  controls and rationing on most consumer goods under Leitsätze-Gesetz,
  against Allied advice. Marshall Plan inflows 1948-1952 supported
  reconstruction. GATT accession 1951; ECSC 1951; Treaty of Rome 1957.
  Bundesbank Law 1957 codified central bank independence with price
  stability mandate. Codetermination (Montan-Mitbestimmung 1951,
  Betriebsverfassungsgesetz 1952) embedded labour in firm governance.
  Competition law (Gesetz gegen Wettbewerbsbeschränkungen 1957) against
  Adenauer's initial resistance established the Bundeskartellamt. Outcome:
  ~8% annual growth 1950-1960, full employment by late 1950s, DM as anchor
  currency.
policies:
  - germany_currency_reform_1948
  - germany_price_liberalisation_1948
  - germany_bundesbank_law_1957
  - germany_gwb_competition_law_1957
  - germany_codetermination_montan_1951
  - germany_eec_accession_1957
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Bundesbankgesetz 1957 codified independence with explicit price-stability mandate; became archetype."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "GWB 1957 and Bundeskartellamt; general price liberalisation 1948."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "GATT 1951, ECSC 1951, EEC 1957."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Codetermination and works councils embedded labour voice; not 'rigid' in a hire/fire sense but reduced unilateral managerial discretion."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Basic Law 1949, constitutional court, Ordnungspolitik framework."}
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Canonical ordoliberal movement; Erhard-Eucken-Röpke-Müller-Armack lineage."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
references:
  - "Erhard, Wohlstand für Alle (1957)"
  - "Eucken, Grundsätze der Wirtschaftspolitik (1952)"
  - "Bundesbankgesetz, 26. Juli 1957"
  - "Gesetz gegen Wettbewerbsbeschränkungen, 27. Juli 1957"
  - "Giersch, Paqué & Schmieding (1992), The Fading Miracle"
notes: "Pre-1996 sample extension. Canonical ordoliberal case. Large Keynesian fiscal policy role is limited; the fiscal side is modest, the institutional/monetary/regulatory side is the content."

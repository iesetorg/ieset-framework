# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ghana_mahama_ndc_second_2025_present
status: candidate
name: "Mahama NDC second government 2025-present"
countries: [GHA]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-01-07"}
coalition: "National Democratic Congress (NDC) — social-democratic; supermajority Parliament"
leaders:
  - "John Dramani Mahama (President, NDC, Jan 2025-)"
  - "Naana Jane Opoku-Agyemang (Vice President)"
  - "Cassiel Ato Forson (Finance Minister)"
  - "Johnson Asiama (Bank of Ghana Governor)"
doctrine: >
  Mahama returned to office after 2024 landslide against the NPP,
  inheriting an IMF Extended Credit Facility programme (signed
  May 2023 after the 2022 sovereign default and domestic-debt
  exchange). Programme: continuation of IMF reform path —
  fiscal consolidation, expenditure rationalisation, scrapped
  COVID-levy and "e-levy" digital-transaction tax, "24-hour
  economy" industrial-policy initiative, gold-for-oil and
  gold-purchase programmes from BoG to support reserves,
  flagship "big-push" infrastructure spending tempered by IMF
  primary-surplus targets. Cocoa-sector reform after multi-year
  smuggling and production crisis. Continued post-default
  external-debt restructuring under G20 Common Framework.
policies:
  - gh_imf_ecf_continuation_2025
  - gh_e_levy_repeal_2025
  - gh_24_hour_economy_2025
  - gh_cocoa_sector_reform_2025
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "IMF-anchored consolidation; primary-surplus targets binding."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "E-levy (regressive transactional) and COVID-levy scrapped; base-broadening shifts mix toward progressive sources."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Post-default BoG financing rules restored under IMF programme."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "24-hour economy industrial-policy push; cocoa-sector intervention."}
predecessor_movements: [ghana_erp_stabilisation_1983_1991]
position_alignments:
  - {position_id: social_democratic, alignment: aligned, notes: "NDC traditional social-democratic-pragmatic framework; e-levy/COVID-levy repeal shifts tax-mix toward progressive sources; expanded development spending."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "24-hour economy industrial policy + cocoa-sector intervention + flagship infrastructure push."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "IMF ECF programme continuation; primary-surplus targets; central-bank-financing rules restored."}
references:
  - "Ghana 2024 presidential election results"
  - "IMF ECF Ghana, Fifth Review 2025"
notes: "Stub authored to close 2026 atlas-coverage gap for GHA. Multiple intermediate movements (Rawlings post-1991, Kufuor, Mills, Mahama-I, Akufo-Addo) remain unauthored."

movement_id: netherlands_kok_purple_1994_2002
status: candidate
name: 'Kok ''paarse'' purple coalition: poldermodel and Third-Way Dutch model'
countries:
- NLD
timeframe:
  start: 1994
  end: 2002
coalition: PvdA-VVD-D66 ('paars' / purple) — first post-war coalition without CDA
leaders:
- Wim Kok (PM; PvdA)
- Gerrit Zalm (Finance Minister, VVD)
- Hans Dijkstal (Interior, VVD; Deputy PM I)
- Els Borst (Health, D66; Deputy PM II)
- Ad Melkert (Social Affairs, PvdA)
doctrine: 'First post-war Dutch coalition without Christian-democrats combined labour-market flexibilisation,
  welfare rationalisation, privatisation, and activating-social-policy under the ''poldermodel''
  brand. Economic school: Third Way social-democratic with Dutch consensus institutions — tripartite
  Stichting van de Arbeid and SER — the canonical Anglo- European ''Dutch model'' cited globally
  1996-1999. Left-right axis: centre (cross-aisle). Key content: (i) Flexibility and Security
  Act (Flexwet) 1 January 1999 — balancing flex-contract rules with employment protection, canonical
  ''flexicurity'' template; (ii) WAZ/WAJONG fragmentation of the disability system and Poortwachter
  gatekeeper approach; (iii) Zalm-norm fiscal rule from 1994 — multi-year real- expenditure ceilings
  with revenue-windfall rules; (iv) ABP and public-pension partial privatisation; (v) Privatisations
  continued — KPN float 1994, PostNL spin-off, NS Railways corporatisation 1995, electricity sector
  liberalisation 1998 Energy Act; (vi) Dutch ''Jobs Machine'' — employment rate rose from 55%
  (1994) to 64% (2001); (vii) Kinderopvang and part-time-work promotion; (viii) Euro entry 1 January
  1999 at ƒ2.20371 conversion; (ix) WVO Education reform and secondary-curriculum ''studiehuis'';
  (x) Schiphol capacity expansion and Randstad logistics investment; (xi) Schengen full implementation
  March 1995. Popularity: 1994 election PvdA 24.0% / VVD 19.9% / D66 15.5% coalition 59.4%; 1998
  election PvdA 29.0% / VVD 24.7% / D66 9.0% coalition 62.7% — Kok II continuation; 2002 Fortuyn
  assassination 9 May and subsequent LPF surge ended purple — PvdA collapsed to 15.1%. Coherence:
  high over 1994-1998, strong in early Kok II, then eroded by 2001 Srebrenica report and 2002
  Fortuyn populist wave. Left a durable Dutch-model template cited internationally.

  '
policies:

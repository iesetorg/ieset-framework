# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: lesotho_matekane_coalition_fiscal_reform_2022_present
status: candidate
name: Lesotho Matekane coalition fiscal reform 2022-present
countries: [LSO]
timeframe:
  start: 2022
  end: ongoing
coalition: Revolution for Prosperity-led coalition
leaders:
  - "Sam Matekane (Prime Minister, 2022-)"
  - "Retselisitsoe Matlanyane (Minister of Finance and Development Planning)"
doctrine: >
  Lesotho's post-2022 coalition agenda is framed around restoring fiscal
  credibility, reducing dependence on volatile SACU revenue, keeping the
  Highlands water-transfer programme moving, and improving private-sector
  access to finance. The movement is coded narrowly around budget, water
  infrastructure, and financial-inclusion measures where official and IMF
  documentation provides a clear policy basis.
policies:
  - lso_highlands_water_project_phase_ii_2023
  - lso_fy2024_25_sacu_fiscal_consolidation_budget
  - lso_financial_inclusion_strategy_ii_2024
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "The Highlands project expands infrastructure investment while the FY2024/25 budget aimed to save SACU windfalls and restrain spending."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Water-transfer infrastructure concentrates state resources in a strategic export and hydropower-linked sector."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Financial-sector and inclusion strategies broaden access to formal finance and digital channels."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Budget discipline and financial-sector strategies add formal fiscal and regulatory frameworks."}
references:
  - "IMF, Kingdom of Lesotho 2025 Article IV Consultation."
  - "Lesotho Highlands Development Authority, Phase II project materials."
  - "Government of Lesotho financial-sector and financial-inclusion strategy materials."

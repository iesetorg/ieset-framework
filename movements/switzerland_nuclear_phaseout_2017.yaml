# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: switzerland_nuclear_phaseout_2017
status: candidate
name: "Switzerland Energy Strategy 2050 and nuclear new-build ban"
countries: [CHE]
timeframe: {start: 2011, end: ongoing, enacted_date: "2017-05-21"}
coalition: "Federal Council + Parliament, ratified by popular vote"
leaders: ["Doris Leuthard (Federal Councillor, Environment/Energy/Transport/Communications)"]
doctrine: >
  In response to Fukushima the Federal Council announced in May 2011 a
  gradual exit from nuclear power; Parliament adopted the Energy
  Strategy 2050 package in September 2016 (Energiegesetz). The
  referendum of 21 May 2017 confirmed the law with 58.2% yes,
  enshrining: a ban on new nuclear plant construction, continued
  operation of the five existing reactors for as long as they remain
  safe (no fixed shutdown calendar), efficiency targets, and renewable
  support mechanisms. Beznau I, the world's oldest operating reactor
  (1969), continues alongside Beznau II, Gösgen, and Leibstadt
  (Mühleberg closed 2019). The 2017 vote is the canonical direct-
  democracy ratification of a nuclear-new-build ban. Framework codes
  this as a mixed-magnitude movement: stringency increased but Swiss
  policy explicitly avoided forcing early shutdowns, preserving
  supply-security more than Germany or Belgium.
policies: [switzerland_energy_strategy_2050, switzerland_nuclear_new_build_ban_2017, switzerland_energiegesetz_2016]
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "New-build ban plus renewable mandates raise stringency; magnitude moderate because no forced early shutdowns."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Licensing regime for new nuclear closed permanently; renewable support allocations formalised."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: weak, rationale: "Option value on future nuclear foreclosed; existing reactors preserved; Swiss hydro base limits near-term exposure."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "KEV/EVS feed-in premia and investment contributions for renewables."}
outcome_hypotheses: [switzerland_electricity_import_dependence, direct_democracy_energy_policy_stability]
position_alignments:
  - {position_id: ecological, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "The no-forced-shutdown design is the pragmatic compromise feature."}
  - {position_id: austrian, alignment: opposed}
references:
  - "Energiegesetz vom 30. September 2016 (SR 730.0)"
  - "Abstimmung vom 21. Mai 2017 über das Energiegesetz (58.2% Ja)"
  - "SFOE/BFE Energy Strategy 2050 monitoring reports"
notes: >
  Direct-democracy ratification is the institutional feature that
  distinguishes this case; the decision carries a revealed-preference
  weight that executive decisions (Germany 2011, Belgium 2003) lack.

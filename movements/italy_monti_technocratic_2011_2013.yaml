  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Art. 18 reinstatement tightened; fixed-term contract rules recalibrated."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Cresci-Italia opened pharmacies, taxis, professional-service tariffs."}

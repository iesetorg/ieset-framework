movement_id: italy_monti_technocratic_2011_2013
status: candidate
name: "Monti technocratic emergency government 2011-2013"
countries: [ITA]
timeframe: {start: 2011, end: 2013, enacted_date: "2011-11-16"}
coalition: "Technocratic cabinet with PdL+PD+UDC parliamentary support"
leaders:
  - "Mario Monti (PM and Economy/Finance Minister)"
  - "Elsa Fornero (Labour Minister)"
  - "Corrado Passera (Economic Development)"
doctrine: >
  Technocratic emergency government appointed by President Napolitano in
  Nov 2011 after BTP-Bund spread crossed 550bps and Berlusconi resigned.
  Economic school: orthodox crisis-management combining front-loaded fiscal
  consolidation with supply-side structural reform to restore market access.
  Signature actions: 'Salva Italia' decree-law D.L. 201/2011 (Dec 2011 €30bn)
  combining IMU property-tax reinstatement, pension-age acceleration
  (Fornero reform raising retirement age to 66-67 with phase-in), VAT
  rise 21%→22% trigger; 'Cresci Italia' liberalisations (Jan 2012)
  opening professional services, pharmacies, local transport; 'Semplifica
  Italia' (Feb 2012); labour-market reform (L. 92/2012 Fornero, Jun 2012)
  tightening Art. 18 reinstatement remedy, extending unemployment insurance
  ASpI. Spread compressed from 553bps (Nov 2011) to ~280bps by end of tenure
  (aided by Draghi's 'whatever it takes' Jul 2012 and OMT announcement).
  EBA stress-test capital shortfalls addressed via Monte dei Paschi bailout
  trajectory. Left-right: orthodox centrist technocratic-supply-side. Popularity:
  support collapsed from ~70% (late 2011) to ~20% (late 2012); Monti's own
  Scelta Civica list received only 8.3% in Feb 2013 election, which produced
  a hung parliament. Coherence: high — integrated fiscal-structural
  programme disciplined by troika-equivalent market constraint.
policies:
  - it_salva_italia_2011
  - it_fornero_pension_reform_2011
  - it_fornero_labour_reform_2012
  - it_cresci_italia_liberalisations_2012
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Salva Italia €30bn+; primary surplus target; deficit 3.7%→2.9% GDP 2011-2012."}

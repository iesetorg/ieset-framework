notes: >
  Separate movement record from Paetongtarn preserves the distinct
  personnel and programme framing (Srettha as technocrat-outsider vs
  Paetongtarn as Shinawatra-family restoration), even though the
  coalition composition and policy programme are broadly continuous.
  Digital-wallet policy is coded under the Srettha movement because
  it was his signature announcement; any material modification under
  Paetongtarn would be captured by a separate enactment block.

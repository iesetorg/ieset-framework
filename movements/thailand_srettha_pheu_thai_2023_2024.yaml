movement_id: thailand_srettha_pheu_thai_2023_2024
status: candidate
name: "Srettha Thavisin — Pheu Thai-led post-Move-Forward coalition (2023-2024)"
countries: [THA]
timeframe:
  start: 2023
  end: 2024
  enacted_date: "2023-08-22"
coalition: "Pheu Thai-led 11-party coalition including Bhumjaithai, Palang Pracharath, United Thai Nation, Democrat, Chartthaipattana — the 'security-consensus' pact that excluded the first-placed Move Forward Party from government despite its 151/500 seats"
leaders:
  - "Srettha Thavisin (PM Aug 2023 - Aug 2024, ex-Sansiri property CEO)"
  - "Paetongtarn Shinawatra (Pheu Thai leader, deputy)"
  - "Phumtham Wechayachai (Deputy PM, Commerce then Defence)"
  - "Anutin Charnvirakul (Deputy PM, Interior, Bhumjaithai leader)"
  - "Pichai Chunhavajira (Finance Minister from May 2024)"
  - "Julapun Amornvivat (Deputy Finance Minister, digital-wallet architect)"
  - "Sethaput Suthiwartnarueput (BoT Governor)"
doctrine: >
  Technocratic Pheu Thai under the "security-consensus" coalition —
  a Pheu Thai-led cabinet formed via an anti-Move-Forward pact that
  brought former junta-aligned parties (Palang Pracharath, United
  Thai Nation) and Bhumjaithai into government in exchange for
  blocking the first-placed Move Forward from the premiership.
  Srettha, an ex-property-developer CEO imported directly into the
  PM slot, framed the programme as "economic rescue" through demand
  stimulus, tourism promotion, and targeted FDI pitches. Economic
  school: Thaksinist populist-left continuation with a business-
  friendly veneer — the 10,000-baht digital-wallet universal cash
  handout (announced 2023, recalibrated 2024 toward a means-tested
  rollout funded by supplementary budget rather than digital-rupee-
  style token), LPG and electricity price caps, diesel-excise cuts,
  minimum-wage trajectory toward 400 baht, visa-free tourism
  expansion, and a land-bridge mega-project (Chumphon-Ranong
  ~1 trillion baht concept linking Andaman and Gulf coasts). Stance
  toward the monarchy accommodative — lèse-majesté prosecutions not
  reversed; Thaksin's return from exile 22 Aug 2023 on reduced
  sentence by royal pardon was part of the political settlement.
  Sits centre-left economically, pragmatic-business on industrial
  policy, accommodating-royalist on the institutional axis. Popularity
  / seats: 2023 election Move Forward took 151/500 seats on ~38% party-
  list vote, Pheu Thai 141/500, Bhumjaithai 71/500, PPRP 40/500, UTN
  36/500, Democrat 25/500; Srettha won the 14 August 2023 PM vote
  with 482 of 747 joint-session votes (House + appointed Senate)
  after Move Forward's Pita Limjaroenrat was blocked by Senate. Srettha
  approval averaged 30-45% over his 12 months. On 14 August 2024
  the Constitutional Court removed Srettha for ethics violations
  related to a cabinet appointment, and on 16 August 2024 Paetongtarn
  Shinawatra was confirmed as PM — the swap triggered by the court
  rather than by election.
policies:
  - th_digital_wallet_10k_baht_2024
  - th_minimum_wage_400_baht_trajectory_2024
  - th_visa_free_tourism_expansion_2023

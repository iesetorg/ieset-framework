  - th_land_bridge_project_2023
  - th_thaksin_return_royal_pardon_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "10,000-baht digital-wallet universal-then-targeted handout budgeted ~450-500bn baht — largest single-stroke cash transfer in Thai history."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Supplementary budget for digital wallet; public-debt ceiling kept at 70% post-COVID; tourism and infra off-budget borrowing."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Energy price caps on diesel, electricity, LPG; land-bridge and EEC continuation."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Stepwise minimum-wage increases toward 400-baht floor announced 2024."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Visa-free regime expanded to China, India, Russia, Taiwan; EU FTA talks reopened."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Constitutional Court's ability to remove a sitting PM on ethics grounds (Srettha case, 14 Aug 2024) and dissolve Move Forward (7 Aug 2024) entrenched judicial veto."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "No major rollback of 2017-constitution framework; lèse-majesté prosecutions continued under coalition."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Srettha publicly pressured BoT to cut rates but formal independence preserved; BoT held rates through 2024."}

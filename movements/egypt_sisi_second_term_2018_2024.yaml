movement_id: egypt_sisi_second_term_2018_2024
status: candidate
name: "Sisi second term — constitutional amendment, New Administrative Capital, Hayah Karima"
countries: [EGY]
timeframe: {start: 2018, end: 2024}
coalition: "Presidency under Abdel Fattah el-Sisi; Mostaqbal Watan coalition; Armed Forces economic apparatus"
leaders:
  - "Abdel Fattah el-Sisi (President, re-elected Mar 2018 with 96.91% on ~41% turnout)"
  - "Mostafa Madbouly (Prime Minister, Jun 2018–)"
  - "Tarek Amer / Hassan Abdalla (CBE Governors)"
  - "Mohamed Maait (Finance Minister)"
doctrine: >
  Second-term consolidation of military-sovereign-directed capitalism built
  around three pillars: the April 2019 constitutional amendment (88.83% yes on
  44% turnout) extending presidential terms to six years and allowing Sisi to
  stand again in 2024; the New Administrative Capital mega-project (phased
  inauguration 2021-2024) as flagship off-budget investment anchored by the
  Armed Forces Engineering Authority and ACUD; and the Decent Life
  ("Hayah Karima") rural-upgrading initiative launched July 2019 covering
  ~58m inhabitants at a headline ~700bn EGP price tag. The period absorbed the
  COVID-19 shock via a $2.8bn IMF rapid-financing instrument (May 2020) and
  $5.2bn stand-by (Jun 2020), then re-entered programme territory with the
  $3bn EFF in December 2022 as FX shortages reappeared. Left-right: authoritarian
  nationalist-military with statist product-market content and orthodox-leaning
  fiscal content. The coherence line: megaproject Keynesianism financed by
  external borrowing, Gulf deposits, and military-economy rents, justified by
  a stability narrative in a region of failed neighbours.
policies:
  - eg_constitutional_amendment_2019
  - eg_new_administrative_capital_2015_ongoing
  - eg_hayah_karima_2019
  - eg_imf_rfi_stand_by_2020
  - eg_imf_eff_3bn_2022
  - eg_military_owned_enterprise_ipo_plan_2022
  - eg_state_ownership_policy_2022
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Mega-project off-budget capex, Hayah Karima rural spend, pandemic fiscal response."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Takaful/Karama expansion during COVID partially offset by continued subsidy reform."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Armed Forces economic footprint expanded across cement, steel, food, logistics, contracting."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "2019 amendments gave President enhanced role in judicial appointments; expanded military-court jurisdiction."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: weak, rationale: "Cuts 2018-2021; partial reversal post-Oct 2022 devaluation."}

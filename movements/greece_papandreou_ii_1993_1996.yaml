# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: greece_papandreou_ii_1993_1996
status: candidate
name: "Papandreou PASOK return: convergence rhetoric, continuity in practice"
countries: [GRC]
timeframe: {start: 1993, end: 1996}
coalition: "PASOK majority (170/300)"
leaders:
  - "Andreas Papandreou (PM, returned October 1993)"
  - "Alexandros Papadopoulos (Finance Minister)"
  - "Yannos Papantoniou (National Economy Minister from 1994)"
  - "Costas Simitis (Industry Minister, future PM)"
doctrine: >
  Papandreou's second stint returned to office on anti-austerity
  rhetoric but Papantoniou and Simitis drove pro-convergence economic
  policy substance. Economic school: social-democratic / modernising
  PASOK with growing pragmatic convergence orientation under
  Papantoniou-Simitis. Left-right axis: centre-left, rhetorically.
  Key content: (i) Convergence Programme 1994-1999 submitted to EU
  Commission — first Greek multi-year fiscal/monetary convergence
  plan; (ii) Partial reversal of Mitsotakis privatisations but
  continuation of OTE partial and DEH/PPC preparation; (iii) Social-
  security reforms 1992 Law 2084 implementation accelerated 1993-1996;
  (iv) Drachma managed depreciation within ERM preparation;
  (v) Public-sector hiring re-opened but with cap;
  (vi) EU Delors II (1994-1999) structural funds CSF II implementation
  ~€18bn — major infrastructure push (Attiki Odos motorway, Egnatia
  highway, Athens metro); (vii) Athens Olympics 2004 bid (won 1997
  under Simitis); (viii) Macedonia interim agreement September 1995
  with FYROM normalised relations; (ix) EU-Turkey Customs Union
  March 1995 not blocked; (x) Papandreou hospitalised November
  1995 — de facto handover to Simitis January 1996. Popularity:
  October 1993 PASOK 46.9% / 170 seats (landslide); subsequent erosion
  amid Papandreou health, corruption allegations around his circle;
  January 1996 Papandreou resigned, Simitis won PASOK leadership
  ballot over Papoulias, succeeded as PM 22 January 1996; Papandreou
  died 23 June 1996. September 1996 election PASOK 41.5% / 162
  seats under Simitis. Coherence: moderate — tension between
  rhetorical anti-austerity of Papandreou II and pragmatic
  convergence substance of Papantoniou-Simitis paved the way for
  explicit pro-convergence Simitis era.
policies:
  - greece_convergence_programme_1994_1999
  - greece_csf_ii_1994_1999
  - greece_social_security_law_2084_implementation
  - greece_macedonia_interim_agreement_1995
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "CSF II ~€18bn infrastructure investment."}
  - {axis: fiscal.spending_level, direction: "0", rationale: "Deficit reduction modest; spending share broadly stable."}
  - {axis: regulatory.product_market_competition, direction: "0", rationale: "Mixed — privatisation pace reduced vs Mitsotakis; no reversal enacted."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "Convergence orientation slowed drachma depreciation."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Public-sector hiring re-opened; social-spending commitments."}
predecessor_movements: [greece_mitsotakis_nd_1990_1993]
successor_movements: [greece_simitis_pasok_1996_2004]
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Papantoniou-Simitis modernising faction."}
references:
  - "EU Convergence Programme for Greece 1994-1999"
  - "Κοινοτικό Πλαίσιο Στήριξης II (CSF II), 1994-1999"
  - "Νόμος 2084/1992 (social security reform, implementation phase)"
notes: "Pre-1996 sample extension. Papandreou II was transitional — Simitis succeeded January 1996 and fell under successor movement."

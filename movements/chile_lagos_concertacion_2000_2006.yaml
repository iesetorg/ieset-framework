movement_id: chile_lagos_concertacion_2000_2006
status: candidate
name: "Lagos Concertación — AUGE health, US FTA, constitutional reform 2005"
countries: [CHL]
timeframe: {start: 2000, end: 2006, enacted_date: "2000-03-11"}
coalition: "Concertación de Partidos por la Democracia (PS-PPD-PDC-PRSD)"
leaders:
  - "Ricardo Lagos Escobar (President 2000-2006; PPD)"
  - "Nicolás Eyzaguirre (Hacienda)"
  - "Vittorio Corbo (BCCh 2003-2007)"
  - "Soledad Alvear (RR.EE.; Justicia)"
doctrine: >
  Centre-left Concertación third government — equity-with-growth
  doctrine completing the post-Pinochet institutional settlement. Five
  doctrinal pillars: (a) Plan AUGE (GES) Ley 19.966 of 3 September
  2004, in force 1 July 2005 — guaranteed coverage and maximum wait
  times for 56 health conditions at launch (expanded to 80 by 2013);
  universal public-private guarantee. (b) Chile-US FTA — signed 6
  June 2003, in force 1 January 2004; Chile-EU Association Agreement
  2002; Chile-Korea FTA 2003; cemented open-trade posture. (c)
  Constitutional reform 2005 (Ley 20.050 of 26 August 2005) — ended
  senadores designados and vitalicios, restored presidential power
  to remove military chiefs, shortened presidential term to 4 years
  (non-consecutive), subordinated National Security Council; Lagos
  signed a "fully democratic constitution" declaration. (d) Fiscal
  structural-balance rule 2001 — 1% structural surplus commitment
  (modified later); institutionalised countercyclical framework later
  codified 2006 FRL. (e) Transantiago design + Ricarte Soto social-
  policy prep — Transantiago plan approved 2005 for 2007 Bachelet-era
  launch. Stated school: social-democratic + market-liberal equity-
  growth synthesis. Left-right: centre-left. Popularity: January 2000
  runoff 51.3% vs Lavín (UDI) 48.7%; approval 50-60% through most of
  term, peaked 70% late-term; Bachelet (PS) continued Concertación
  December 2005 runoff 53.5% vs Piñera 46.5%. Coherence: trade
  Concertación gradualism for AUGE rights-based health architecture,
  trade-treaty web, and democratic-constitutional completion.
policies:
  - cl_plan_auge_ges_2004_2005
  - cl_us_fta_2003_2004
  - cl_constitutional_reform_2005
  - cl_fiscal_structural_balance_rule_2001
  - cl_transantiago_design_2005
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "AUGE universal-guarantee expanded public health coverage."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "US FTA + EU Assoc + Korea FTA secured market access."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "2005 constitutional reform removed authoritarian enclaves."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Structural-surplus rule held spending to rule-based path."}
outcome_hypotheses: [universal_health_guarantee_outcome, fta_trade_diversification_effect]
predecessor_movements: [chile_frei_concertacion_1994_2000]

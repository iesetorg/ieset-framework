movement_id: belgium_leterme_van_rompuy_2008_2009
status: candidate
name: "Leterme–Van Rompuy CD&V-led GFC governments 2008-2009"
countries: [BEL]
timeframe: {start: 2008, end: 2009, enacted_date: "2008-03-20"}
coalition: "CD&V + MR + PS + cdH + Open Vld (5-party, with CD&V-NVA cartel initially)"
leaders:
  - "Yves Leterme (PM 2008, 2009-2011)"
  - "Herman Van Rompuy (PM Dec 2008-Nov 2009)"
  - "Didier Reynders (MR, Finance)"
doctrine: >
  Tail of Belgium's 541-day-formation crisis (post-Jun 2007 election) and GFC
  response: Leterme I took office Mar 2008 after Verhofstadt III caretaker,
  fell Dec 2008 on the Fortis-BNP-Paribas court-intervention scandal
  (appearance of executive pressure on the judiciary); Van Rompuy formed a
  stopgap Dec 2008 - Nov 2009 until appointed first permanent European Council
  President; Leterme II resumed Nov 2009. Economic school: centrist christian-
  democratic with social-liberal bargain; GFC orthodoxy tempered by bilingual-
  political fragility. Signature actions: Fortis / Dexia / KBC bank rescues
  (Sep-Oct 2008 ~€21bn public commitments; Fortis Belgian-operations sold to
  BNP Paribas via court-approved path after ECJ-referral), Ethias rescue,
  automatic-stabiliser deficit expansion, €0.8bn scrappage-bonus, state
  guarantees on Dexia interbank funding (€150bn envelope); Belgian state
  acquired 25% Fortis stake then ~74% BNP-Paribas-Fortis stake. Left-right:
  centrist. Popularity: CD&V-NVA cartel broke Sep 2008; CD&V vote halved
  in subsequent cycle. Coherence: low institutionally (formation crisis,
  court-pressure scandal), moderate substantively on GFC response.
policies:
  - be_fortis_bnp_paribas_rescue_2008
  - be_dexia_rescue_2008
  - be_kbc_capital_injection_2008_2009
  - be_cd_v_nva_cartel_split_2008
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Three large-bank state recapitalisations; Fortis broken up under state ownership."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Bank-rescue commitments + automatic stabilisers pushed deficit from -1.1% to -5.4% GDP 2008-2009."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: weak, rationale: "Fortis-gate executive-judicial-boundary scandal triggered Leterme I resignation."}

movement_id: skorea_chun_doo_hwan_military_1980_1988
status: candidate
name: "Chun Doo-hwan military Fifth Republic (South Korea)"
countries: [KOR]
timeframe: {start: 1980, end: 1988}
coalition: "Democratic Justice Party (DJP) under Chun Doo-hwan, military-backed"
leaders:
  - "Chun Doo-hwan (President 1980-1988)"
  - "Kim Jae-ik (Chief Economic Secretary, killed Rangoon 1983)"
  - "Shin Byong-hyun (Economic Planning Board)"
  - "Kim Mahn-je (EPB Deputy PM from 1983)"
doctrine: >
  Chun export-led chaebol authoritarianism combining extractive political
  repression with technocratic price stabilisation and continued heavy-
  industry export promotion. Economic school: developmentalist export-
  led growth, sharper orthodox-macroeconomic discipline than Park's HCI
  drive after 1979-1980 stagflation. Dated actions: seized power via
  12-12 coup Dec 1979 and 5-17 martial-law extension May 1980;
  Gwangju Uprising 18-27 May 1980 suppressed with >200 killed; Fair
  Trade Law Dec 1980 (first Korean competition statute) and Fair Trade
  Commission established 1981; EPB-led price freeze + wage guidelines
  1981-1982 cutting CPI from ~29% (1980) to ~3% (1983); chaebol-
  rationalisation restructuring of Heavy-Chemical sectors 1980-1981;
  Rangoon bombing 9 Oct 1983 by North Korea killed Kim Jae-ik and 16
  others; capital-market and banking partial privatisation 1981-1983
  (commercial banks denationalised). Hosted 1986 Asian Games, prepared
  1988 Seoul Olympics as external-legitimacy project. Constitutional
  transition forced by June Democracy Movement 1987 (June 29
  declaration) — direct election law Oct 1987, passing power to Roh
  Tae-woo's peaceful handover Feb 1988. Left-right: hard-right
  authoritarian, market-oriented on macro discipline. Popularity: no
  meaningful democratic signal — Chun 'elected' by electoral college
  99.4% Aug 1980 and 90.2% Feb 1981 under Fifth Republic constitution;
  June 1987 mass protests forced democratisation. Coherence: high on
  economic content (stabilisation + chaebol-export growth ~8-10%
  1982-1987), zero on political legitimacy.
policies:
  - kr_chun_price_stabilisation_1981
  - kr_fair_trade_law_1980
  - kr_chaebol_restructuring_1980
  - kr_commercial_bank_denationalisation_1981
  - kr_june_29_declaration_1987
  - kr_seoul_olympics_preparation_1981_1988
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "First Fair Trade Law 1980 + KFTC 1981; chaebol cross-shareholding rules introduced."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "BOK tight stance + price/wage guidelines cut CPI from ~29% to ~3%."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Commercial bank denationalisation 1981-1983; interest-rate liberalisation preparation."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Gwangju massacre, martial-law rule, media-law controls."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Tariff reductions, import liberalisation schedule 1984-1988; export-performance subsidies partially retired."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Chun-appointed constitutional court and purge courts."}
predecessor_movements:

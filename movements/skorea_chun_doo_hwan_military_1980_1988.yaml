position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Price stabilisation + bank denationalisation aligned with monetarist stabilisation."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Political-repression dimension."}
references:
  - "Haggard (1990), Pathways from the Periphery"
  - "Amsden (1989), Asia's Next Giant"
  - "Korea Development Institute, 'The Korean Economy 1945-1995'"
notes: "Deep-history tranche 1. 1980 Gwangju, 1983 Rangoon bombing, 1988 Olympics preparation covered."

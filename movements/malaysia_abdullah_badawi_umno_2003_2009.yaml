# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: malaysia_abdullah_badawi_umno_2003_2009
status: candidate
name: "Abdullah Badawi UMNO/BN — Islam Hadhari and anti-corruption rhetoric administration (2003-2009)"
countries: [MYS]
timeframe:
  start: 2003
  end: 2009
  enacted_date: "2003-10-31"
coalition: "Barisan Nasional (BN) — UMNO-led with MCA, MIC, Gerakan, plus Sabah/Sarawak parties"
leaders:
  - "Abdullah Ahmad Badawi (PM 31 Oct 2003 - 3 Apr 2009)"
  - "Najib Razak (Deputy PM, defence)"
  - "Nor Mohamed Yakcop → Zeti Akhtar Aziz (Finance II, BNM Governor)"
  - "Ahmad Husni Hanadzlah (Finance II)"
doctrine: >
  UMNO-led BN post-Mahathir reformist continuity with "Islam
  Hadhari" (civilisational Islam) doctrine and anti-corruption
  rhetoric — Abdullah positioned as soft-spoken moderate contrast
  to Mahathir's combative style. Economic school: NEP-continuity
  affirmative-action plus mega-project developmentalism plus Islamic-
  finance hub-building; centre-right Malay-nationalist UMNO
  orthodoxy. Key policy content: (i) Iskandar Malaysia (Iskandar
  Development Region, IDR) launched November 2006 — 2,217 km²
  Johor-south-to-Singapore special economic region with residential
  and financial-services pillars; (ii) Ninth Malaysia Plan (9MP)
  launched 2006 — RM 200bn development expenditure, mega-project
  heavy; (iii) corridor-based regional development — Northern
  Corridor (NCER), East Coast (ECER), Sabah Development Corridor
  (SDC), Sarawak Corridor of Renewable Energy (SCORE); (iv) GST
  framework legislated in principle 2005-06 (but not implemented
  until 2015); (v) fuel-subsidy reform June 2008 — petrol price
  raised 41% from RM 1.92 to RM 2.70/litre, partially reversed
  after political backlash; (vi) 2008 general election "political
  tsunami" 8 March 2008 — BN lost 2/3 majority for first time
  since 1969 (140/222 seats, 50.3% popular vote); Pakatan Rakyat
  opposition took five states (Penang, Kedah, Perak, Selangor,
  Kelantan); (vii) Anwar Ibrahim release from prison September
  2004 (ISA overturned by Federal Court), returned to parliament
  2008; (viii) Bayan Lepas MSC/FIC Islamic-finance framework
  extensions; (ix) ASEAN Economic Community roadmap signed 2007;
  (x) Lingam tape scandal 2007 — judicial-appointment-fixing
  allegations; Royal Commission of Inquiry reported May 2008;
  (xi) Hindu Rights Action Force (Hindraf) rally 25 November 2007
  — 30,000+ protesters on ethnic-Indian marginalisation. Popularity:
  2004 election BN landslide 198/219 seats (90%) — biggest BN
  mandate ever; collapsed to 50% by March 2008; forced out April
  2009 by UMNO elite favouring Najib. Coherence line: reformist-
  tone with minimal substantive follow-through — flagship mega-
  projects slowed, fuel reform reversed, corridor plans largely
  unimplemented; ethnic and electoral headwinds compounded.
policies:
  - my_iskandar_malaysia_idr_2006
  - my_ninth_malaysia_plan_2006
  - my_fuel_subsidy_partial_reform_2008
  - my_2008_political_tsunami_election
  - my_corridor_development_plans_2007
  - my_hindraf_rally_ethnic_indian_grievance_2007
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "9MP RM 200bn development expenditure; corridor-based regional plans expanded capital spending."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Regional-corridor incentives, Iskandar framework tax breaks, continued fuel and rice subsidies partially rolled back mid-2008 then restored."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "AEC roadmap commitments; partial liberalisation of selected services sectors under 2009 announcements."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Anwar release 2004; Lingam Royal Commission of Inquiry conducted; reform rhetoric partly institutional."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Lingam tape scandal exposed judicial-appointment manipulation; no systemic repair enacted."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "ASEAN Economic Community roadmap 2007; Malaysia-Japan EPA 2005; US FTA talks stalled."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Corridor-based regional industrial policy textbook developmental state."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Partial fuel-subsidy reform welcomed; NEP-continuity and mega-project direction opposed."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Rural-development corridor framing aligned; ethnic-Indian marginalisation and Hindraf response failings."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Islamic-finance framework evidence-rich; corridor-plan delivery under-measured."}
references:
  - "Ninth Malaysia Plan 2006-2010"
  - "Iskandar Development Region Blueprint 2006"
  - "EC Malaysia Election Report, March 2008"
  - "Report of the Royal Commission of Inquiry on Lingam Tape, May 2008"
  - "Weiss (2013), 'Routledge Handbook of Contemporary Malaysia'"
notes: >
  Abdullah period bookended by Mahathir's 22-year tenure ending
  October 2003 and Najib's 1MDB-era premiership (2009-2018 —
  separate movement). 2008 'political tsunami' election is the
  hinge event.

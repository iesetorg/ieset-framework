movement_id: ireland_harris_fg_2024_present
status: candidate
name: "Harris FG-led rotating Taoiseach government (Ireland, 2024-present)"

countries: [IRL]

timeframe:
  start: 2024
  end: ongoing
  enacted_date: "2024-04-09"

coalition: "Fine Gael + Fianna Fáil + Green Party rotating-Taoiseach coalition (continuity of 2020 Programme for Government); Fine Gael took the Taoiseach office 9 April 2024 on Varadkar's resignation; reshaped after November 2024 general election into FG + FF + regional-independents coalition (January 2025 government formation)"

leaders:
  - "Simon Harris (Taoiseach, Fine Gael, April 2024 – January 2025 first term; returned as Tánaiste + Foreign Affairs Minister from January 2025)"
  - "Micheál Martin (Tánaiste April 2024 – January 2025; returned as Taoiseach from 23 January 2025 under renewed rotation deal)"
  - "Paschal Donohoe (Minister for Public Expenditure, FG; Eurogroup President)"
  - "Jack Chambers (Finance Minister, FF, from June 2024)"

doctrine: >
  Fine Gael-led continuation of the pro-business centre-right MNC-FDI-driven
  growth model, fused in coalition with Fianna Fáil centrism and (until
  November 2024) Green climate programme, operating under the windfall
  corporation-tax surplus regime created by OECD Pillar 2 and Apple arrears.
  Positioned on the centre to centre-right — socially liberal (post-abortion
  and marriage-equality referenda), fiscally expansionary within a rules-based
  frame, EU-institutional loyalist, Atlanticist, and pragmatically permissive on
  migration while tightening asylum accommodation. Key measures under this
  government: OECD Pillar 2 15% minimum effective corporate-tax transposition
  (Finance (No.2) Act 2023, effective 1 January 2024); Budget 2025 (1 October
  2024) €10.5bn giveaway package with €2.2bn cost-of-living one-offs, USC
  middle-band cut from 4% to 3%, and establishment of the Future Ireland Fund
  and Infrastructure, Climate and Nature Fund from Apple and windfall receipts;
  Apple state-aid case compliance following CJEU ruling (10 September 2024)
  releasing €14.1bn plus interest to the Exchequer; continuation of Housing
  for All with revised 2024 targets and vacant-property tax increase; national
  minimum wage €12.70 (Jan 2024) with statutory living-wage target of 60% of
  hourly median wage by 2026; hospitality VAT retained at 13.5% despite lobby
  pressure; National Children's Hospital continued cost-overrun (projected
  €2.2bn+ vs 2017 estimate of €650m). Popularity: inherited 35 FG + 37 FF +
  12 Green seats (84/160 Dáil); Harris polled ~40% personal favourability on
  entry (May 2024 Ireland Thinks) declining through autumn; Fine Gael took
  first-place slot in local elections (June 2024, 23% FG / 23% FF / 12% SF)
  but collapsed back to 20.8% vote share in the November 2024 general
  election (38 FG + 48 FF + 39 SF out of 174 Dáil seats post-expansion),
  forcing a renewed FG-FF rotation deal with regional-independent support
  rather than re-admitting the Greens (wiped out to a single seat). Coherence
  judgement: low-doctrine managerial continuity government whose defining
  feature is disposing of corporation-tax windfalls rather than structural
  reform, electorally rewarded by anti-Sinn Féin vote concentration despite
  housing crisis.

policies:
  - ie_oecd_pillar2_corporate_tax_2024
  - ie_budget_2025_giveaway_package
  - ie_apple_tax_state_aid_compliance_2024
  - ie_housing_for_all_continuation_2024
  - ie_living_wage_target_2024_2026
  - ie_national_childrens_hospital_overrun

axes_summary:
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "OECD Pillar 2 15% minimum effective rate transposed for in-scope groups (>€750m turnover); headline 12.5% unchanged for out-of-scope firms — net upward movement on the corporate-tax burden for large MNCs."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Budget 2025 €10.5bn package; core expenditure growth well above 5% ceiling target; Future Ireland + Infrastructure Funds seeding from corporation-tax surplus."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Repeated one-off cost-of-living packages (energy credits, double-weeks on social welfare, working-family payment increases); statutory living-wage glide path."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    rationale: "Minimum wage to €12.70 + living-wage target 60% of median by 2026; statutory sick pay expansion; pension auto-enrolment (My Future Fund) commencement 2025."
  - axis: regulatory.immigration_openness
    direction: "0"
    magnitude: weak
    rationale: "Work-permit liberalisation for critical skills coexists with tighter asylum-accommodation rules and designated safe-country list (post-October 2024); mixed signal."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: weak
    rationale: "Climate Action Plan annual updates, carbon-tax trajectory to €100/t by 2030, but diluted Green leverage after Nov 2024; moderate inherited stringency, not further advanced."
  - axis: institutional.rule_of_law
    direction: "0"
    rationale: "No material change; Apple state-aid case compliance reinforced EU-law primacy within domestic fiscal administration."

outcome_hypotheses:
  - corporate_tax_base_erosion_vs_base_broadening_oecd_pillar2
  - housing_supply_response_to_demand_side_transfers
  - windfall_revenue_fiscal_procyclicality

predecessor_movements:
  - ireland_varadkar_fg_2022_2024
  - ireland_martin_ff_rotating_2020_2022

position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Living-wage target and transfer one-offs align; pro-MNC tax stance does not."}
  - {position_id: austrian, alignment: partially_aligned, notes: "12.5% headline rate defended, but large structural spending ratchet opposed."}

references:
  - "Finance (No.2) Act 2023 — OECD Pillar 2 Qualifying Domestic Minimum Top-up Tax"
  - "Budget 2025 — Department of Finance, 1 October 2024"
  - "CJEU C-465/20 P Commission v Ireland and Apple (10 September 2024)"
  - "Programme for Government 2020 — Our Shared Future (rotation basis)"
  - "General Election 29 November 2024 — official results (RTE / Oireachtas)"

notes: >
  Dáil seat share at Harris's April 2024 accession (33rd Dáil): Fine Gael 35,
  Fianna Fáil 37, Greens 12 out of 160. Harris personal favourability May 2024
  Ireland Thinks ~40%, declining to ~30% by October. Local elections 7 June
  2024: FF 22.9%, FG 23.0%, SF 11.8% (Sinn Féin underperforming polls).
  European Parliament June 2024: FG 20.8%, FF 13.6%, Independent Ireland
  surge. General election 29 November 2024: FF 21.9% / 48 seats, FG 20.8% /
  38 seats, SF 19.0% / 39 seats, Greens 2.9% / 1 seat — FG+FF rebuilt
  majority with regional independents (23 January 2025 government formation).
  Abortion-referendum (2018) and marriage-equality (2015) wins remain
  background markers of Fine Gael's social-liberal drift. Programme is best
  read as a low-ideology disposal of windfall corporation-tax revenue under
  political cover provided by Sinn Féin's polling collapse.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: egypt_mubarak_neoliberal_late_era_1991_2011
status: candidate
name: "Egypt Economic Reform and Structural Adjustment (late Mubarak)"
countries: [EGY]
timeframe: {start: 1991, end: 2011}
coalition: "National Democratic Party under Mubarak; technocratic 'businessmen's cabinet' of Ahmed Nazif 2004-2011"
leaders:
  - "Hosni Mubarak (President 1981-2011)"
  - "Atef Ebeid (PM 1999-2004)"
  - "Ahmed Nazif (PM 2004-2011)"
  - "Youssef Boutros-Ghali (Finance Minister 2004-2011)"
  - "Mahmoud Mohieldin (Investment Minister 2004-2010)"
doctrine: >
  Phase one (1991-c.2004) was the IMF/World Bank ERSAP programme following
  the 1990-1991 Gulf War debt relief: currency unification, inflation
  stabilisation (from ~20% to single digits by late 1990s), fiscal deficit
  reduction, tariff reduction, partial SOE privatisation. Pace slowed
  substantially after 1998. Phase two (2004-2011) under the Nazif government
  accelerated: corporate tax cut from 40% to 20% (2005), personal income tax
  top rate cut to 20%, extensive bank-sector privatisation (Bank of
  Alexandria sold to Intesa Sanpaolo 2006), mobile-telecom licensing
  (Etisalat), customs reform, and a wave of industrial privatisations. Growth
  accelerated to ~7% in 2006-2008 but the gains concentrated in firms close
  to the NDP business elite (Ahmed Ezz steel, Sawiris telecoms), a pattern
  widely characterised as crony privatisation. Food and fuel subsidies
  remained large (~8-10% of GDP) and regressive. Post-2008 inflation shocks,
  combined with perceived elite capture of reform dividends, fed into the
  January 2011 uprising that ended the regime.
policies:
  - egypt_ersap_1991
  - egypt_tax_reform_2005
  - egypt_banking_privatisation_2004_2008
  - egypt_trade_tariff_reform_2004
  - egypt_partial_soe_privatisation_1991_2008
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: strong, rationale: "Corporate rate cut 40% to 20% in 2005; broad base-broadening."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Top marginal personal rate compressed to 20%; flatter schedule."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Partial privatisation + telecom licensing + customs reform; limited by crony concentration in select sectors."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Average tariff cut ~14% to ~7%; QIZ agreement with US/Israel 2004."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Emergency Law continuously renewed; selective enforcement in favour of NDP-affiliated business."}
outcome_hypotheses: [structural_adjustment_and_growth_in_mena]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "De jure reform content; de facto weakened by crony allocation."}
  - {position_id: institutionalism, alignment: opposed, notes: "Institutionalist critique — reforms without rule-of-law substrate produced rent redistribution, not competitive markets."}
references:
  - "Roll (2013), 'Egypt's Business Elite after Mubarak'"
  - "World Bank (2009), 'From Privilege to Competition: Unlocking Private-Led Growth in MENA'"
  - "IMF Article IV Egypt, 2007, 2010"
  - "Sfakianakis (2004), 'The Whales of the Nile: Networks, Businessmen, and Bureaucrats during the Era of Privatization in Egypt'"
notes: "Good case for testing invariant-3 distinction between reform content and institutional substrate: content codes market-liberalising, outcomes shaped by institutional gating."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kazakhstan_nazarbayev_resource_state_1991_2019
status: candidate
name: "Nazarbayev resource-state transition (Kazakhstan, 1991-2019)"
countries: [KAZ]
timeframe: {start: 1991, end: 2019}
coalition: "Nazarbayev presidential regime"
leaders:
  - "Nursultan Nazarbayev"
doctrine: >
  Post-Soviet presidential resource-state model combining rapid sovereignty
  consolidation, foreign-capital opening in oil and minerals, selective
  privatisation, a strong executive, and later sovereign-fund management of
  hydrocarbon revenues. The movement mixed market opening in extractives and
  finance with concentrated political authority, state holding companies, and
  managed distribution of resource rents.
policies:
  - kz_tengiz_oil_opening_1993
  - kz_mass_privatization_1993_1998
  - kz_national_fund_2000
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Oil and mining FDI opened Kazakhstan to global capital and export markets."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, rationale: "Private and foreign ownership expanded, but executive discretion and resource renegotiations limited security."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "State holding companies and resource-linked industrial policy channelled rents to favoured sectors."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Presidential concentration weakened checks on executive discretion."}
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: opposed}
references:
  - "Olcott (2010), Kazakhstan: Unfulfilled Promise"
  - "World Bank, Kazakhstan country economic memoranda"
  - "IMF reports on Kazakhstan oil revenue management"
notes: "Post-2019 Tokayev reforms and January 2022 crisis should be separate movements."

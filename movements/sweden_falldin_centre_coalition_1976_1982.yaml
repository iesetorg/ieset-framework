movement_id: sweden_falldin_centre_coalition_1976_1982
status: candidate
name: "Fälldin non-socialist coalitions — end of SAP 44-year hegemony"
countries: [SWE]
timeframe: {start: 1976, end: 1982}
coalition: "Centre Party + Moderates + Liberals (three-party non-socialist / borgerlig bloc)"
leaders:
  - "Thorbjörn Fälldin (Prime Minister 1976-1978, 1979-1982; Centre Party leader)"
  - "Ola Ullsten (Liberal PM interregnum 1978-1979)"
  - "Gösta Bohman (Moderate Party leader, Finance/Economy minister)"
doctrine: >
  Swedish centre-right "borgerlig" coalition government that ended the
  Social Democrats' (SAP) unbroken 1932-1976 run. School: pragmatic
  Nordic-model conservatism / Centre-Liberal mixed economy — nominally
  market-liberal on small-business and regulation, but in practice
  heavily interventionist on shipbuilding, steel, and mining to avoid
  job losses during the 1970s crisis; also strongly anti-nuclear under
  Fälldin's Centre Party leadership. Left-right axis: centre-right within
  Swedish spectrum, but far to the left of Anglo-Saxon conservatism of
  the period; maintained Rehn-Meidner wage-solidarity bargaining and
  expanded public sector employment during the crisis. Key policy
  content: nationalisation/rescue of the shipbuilding sector into
  Svenska Varv (1977), the Luleå/SSAB steel merger (1978) and mining
  rescues; 1977 krona devaluations (8% in April 1977, then effective
  10% via band shift in August 1977, further devaluation 1981) to
  restore cost competitiveness; 1980 advisory referendum on nuclear
  power (line 2 won, 12-reactor programme with phaseout intent); 1981
  tax reform ("wonderful night" agreement with SAP) lowering top
  marginal rates toward 50%. Popularity signals: 1976 election 50.8%
  non-socialist bloc ending SAP 42.7%; 1979 re-elected with bare
  171-seat majority (50.5%); 1982 defeat restored SAP at 45.6%. The
  coalition famously fractured over nuclear (Centre vs Moderate
  positions) — Fälldin resigned October 1978 on the issue. Coherence:
  moderate coherence — managed a crisis-era consolidation but the
  three-party nuclear split and recurring devaluations signal the
  regime was reactive rather than programmatic.
policies:
  - se_shipbuilding_nationalisation_1977
  - se_krona_devaluation_1977
  - se_nuclear_referendum_1980
  - se_wonderful_night_tax_deal_1981
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Major shipbuilding, steel, mining bailouts and nationalisations 1977-1979."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State absorbed failing industries into Svenska Varv and SSAB; not competitive-market exit."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "1981 'wonderful night' cut top marginal rates from ~85% toward 50%."}
  - {axis: regulatory.energy_supply_security, direction: "-", magnitude: moderate, rationale: "1980 referendum Line 2 mandated nuclear phaseout after existing reactors complete — later reversed."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Repeated devaluations 1977 and 1981 restored cost competitiveness via external channel."}

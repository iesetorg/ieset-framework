# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_menem_second_term_1995_1999
status: candidate
name: "Menem PJ second term — Tequila effect, privatisation completion, IMF orthodoxy"
countries: [ARG]
timeframe: {start: 1995, end: 1999, enacted_date: "1995-07-08"}
coalition: "Partido Justicialista (Peronist)"
leaders:
  - "Carlos Menem (President, re-elected 1995)"
  - "Domingo Cavallo (Economía until July 1996)"
  - "Roque Fernández (Economía 1996-1999; ex-BCRA)"
  - "Pedro Pou (BCRA 1996-2001)"
doctrine: >
  Convertibility second-chapter defending the currency board through
  Tequila contagion, completing privatisation, and drifting toward
  fiscal fragility. Five doctrinal pillars: (a) Tequila defence —
  Mexican December 1994 devaluation triggered bank run; $8B reserve
  drain; deposits fell 18% Dec 1994 - May 1995; 15 April 1995 IMF
  $2.4B EFF augmentation; 1995 GDP contracted 2.8% before rebound
  5.5% (1996) + 8.1% (1997). (b) Privatisation completion — YPF
  full divestment, banking consolidation (Banco Nación excepted),
  concessions for airports (Aeropuertos Argentina 2000, 1998),
  postal, nuclear; pension system reform AFJPs fully phased. (c)
  Cavallo rupture July 1996 — Cavallo dismissed over accusations of
  "mafias enquistadas"; Roque Fernández continued orthodoxy but
  without architect authority. (d) Corruption scandals — IBM-Banco
  Nación bribery, arms-to-Croatia/Ecuador (1991-1995, breaking UN
  embargo), AMIA bombing 1994 cover-up allegations, María Soledad
  case. (e) Late-term fragility — 1998 Asian+Russian contagion;
  1999 Brazilian Real devaluation eroded Mercosur competitiveness;
  unemployment 17.5% by Oct 1996; FREPASO-UCR Alianza formed 1997.
  Stated school: Washington Consensus + Peronist-populist retention.
  Left-right: economic right + Peronist-clientelist. Popularity:
  May 1995 first round 49.9% vs Bordón 29.3%; midterms 1997 PJ
  36.3% vs Alianza 45.7%; October 1999 Alianza's De la Rúa 48.4%
  vs Duhalde 38.1%. Coherence: trade deeper 1991-1994 popular
  mandate for privatisation-completion proceeds and orthodox
  fiscal-monetary cover-through, at mounting cost of unemployment,
  corruption saturation, and Alianza opposition consolidation.
policies:
  - ar_tequila_contagion_1995
  - ar_ypf_full_privatisation_1999
  - ar_afjp_pension_phase_in_completion_1995_1999
  - ar_imf_eff_1996_1998
  - ar_1998_1999_mercosur_stress
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Late-phase privatisation (airports, postal) and banking consolidation."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Currency-board continuity; Pou BCRA institutional orthodoxy."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Provincial transfers expanded; deficit grew to 2.5% by 1999."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "IBM-BNA, arms-embargo breach, AMIA cover-up; packed Supreme Court persisted."}
outcome_hypotheses: [currency_board_late_cycle_fragility, privatisation_growth_distribution_effect]
predecessor_movements: [argentina_menem_first_term_1989_1995]
successor_movements: [argentina_de_la_rua_alianza_1999_2001]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: post_keynesian, alignment: opposed}
references:
  - "IMF Article IV Argentina 1997, 1998"
  - "Blustein (2005) And the Money Kept Rolling In"
  - "Levitsky (2003) Transforming Labor-Based Parties in Latin America"
notes: "Supplements umbrella menem_convertibility_argentina_1991_2001 with the Tequila-to-exit second term."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_duque_centro_democratico_2018_2022
status: candidate
name: "Duque — Centro Democrático Uribista restoration (Colombia)"
countries: [COL]
timeframe: {start: 2018, end: 2022}
coalition: "Centro Democrático — right-conservative Uribista party + allied conservatives"
leaders:
  - "Iván Duque Márquez (President 2018-2022)"
  - "Alberto Carrasquilla (Finance Minister 2018-2021)"
  - "José Manuel Restrepo (Finance Minister 2021-2022)"
  - "Marta Lucía Ramírez (Vice President)"
doctrine: >
  Right-conservative Uribista restoration combining market-orthodox continuity
  with contested implementation of the 2016 Havana Agreement, a sustainability-
  tax reform agenda derailed by the 2021 paro nacional, OECD-accession
  completion (formal membership 28 Apr 2020), and one of Latin America's most
  open responses to Venezuelan migration. Economic programme: Ley 1943 de 2018
  "Ley de Financiamiento" (corporate-rate reduction, VAT base broadening,
  simple-regime for SMEs), struck down by the Constitutional Court on procedural
  grounds and replaced by Ley 2010 de 2019 "Ley de Crecimiento Económico" with
  similar content; attempted Ley de Solidaridad Sostenible (April 2021) to widen
  income-tax base and make VAT more progressive — withdrawn 2 May 2021 after
  paro nacional protests that ran April-June 2021, triggered ESMAD crackdown
  debates and over 40 civilian deaths per ombuds data; replaced by the more
  limited Ley 2155 de 2021 "Inversión Social" (corporate-rate hike to 35%,
  PAEF payroll-support extension). Pandemic response: large fiscal impulse
  via Ingreso Solidario cash transfer, PAEF payroll subsidy, FOME emergency
  fund — fiscal deficit peaked 7.8% of GDP in 2020 and S&P and Fitch downgraded
  Colombia below investment-grade in May-July 2021. On migration: Temporary
  Protection Status (Estatuto Temporal de Protección para Migrantes Venezolanos,
  Decreto 216 de 1 Mar 2021) regularised ~1.8M Venezuelans over 10 years.
  Popularity: 54.0% runoff 17 Jun 2018 vs Petro (41.8%); Centro Democrático
  largest Senate bench (19/108) but no majority — Duque governed through shifting
  conservative-Liberal-U coalitions. Approval collapsed from ~52% start to
  sub-30% from 2020 onward (Invamer bimonthly), reaching ~22% at peak protest.
  Coherence: market-orthodox continuity + sustainability-tax attempts + pandemic
  social-transfer scale-up + open-migration posture + securitised protest response.
policies:
  - co_ley_2010_2019_ley_crecimiento_economico
  - co_failed_solidaridad_sostenible_tax_reform_2021
  - co_ley_2155_2021_inversion_social
  - co_oecd_accession_2020
  - co_venezuelan_migrant_temporary_protection_2021
  - co_ingreso_solidario_pandemic_transfer_2020
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "Law 2155 raised corporate rate from 31% to 35% after Law 1943/2010 had cut it."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Ingreso Solidario, PAEF, pandemic expansions institutionalised partially."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: strong, rationale: "ETPMV regularised ~1.8M Venezuelans — one of world's most open responses."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Peace-agreement implementation contested; JEP defended against executive objections but rural-security deteriorated."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Pandemic fiscal impulse; deficit peaked 7.8% GDP 2020."}
position_alignments:
  - {position_id: new_keynesian, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "Peace-agreement implementation contested; migration regularisation aligned."}
predecessor_movements:
  - colombia_santos_ii_2014_2018
  - colombia_uribe_santos_duque_market_continuity_2002_2022
successor_movements:
  - colombia_petro_2022_present
references:
  - "Ley 1943 de 2018; sentencia C-481 de 2019"
  - "Ley 2010 de 2019 (Ley de Crecimiento Económico)"
  - "Ley 2155 de 2021 (Inversión Social)"
  - "Decreto 216 de 2021 (ETPMV)"
  - "IMF Article IV Colombia 2019, 2021"
  - "Invamer Gallup Poll trimestral 2018-2022"
notes: >
  Paro nacional 2021 and the tax-reform withdrawal are the single largest
  inflection — they set the stage for Petro's 2022 victory by fusing
  distributional grievance with ESMAD-violence debates.

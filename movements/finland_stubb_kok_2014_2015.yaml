status: candidate
name: "Stubb Kokoomus-led continuation 2014-2015"
countries: [FIN]
timeframe: {start: 2014, end: 2015, enacted_date: "2014-06-24"}
coalition: "Kokoomus-SDP-RKP-Kristillisdemokraatit (after Greens exit Sep 2014)"
leaders:
  - "Alexander Stubb (Prime Minister, Kokoomus, 2014-2015)"
  - "Antti Rinne (Finance Minister, SDP, 2014-2015)"
doctrine: >
  Brief Stubb premiership completing the Katainen programme after Katainen
  moved to the European Commission. Economic school: continuation of
  NCP-led consolidation and structural-reform agenda under continued
  euro-crisis fiscal pressure and emerging Ukraine-war sanctions impact
  on Finnish trade. Left-right: centre-right. Dated policies: Fennovoima
  nuclear reactor Rosatom-vendor vote Sep 2014 (Greens quit coalition),
  Russia-sanction contingencies, defence-cooperation deepening with
  Sweden. Popularity: Kokoomus slid in polls; Stubb lost to Sipila Centre
  in April 2015 election. Coherence: low — short-lived, dominated by
  post-Katainen drift and coalition unravelling.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: sudan_post_bashir_transition_conflict_state_2019_present
status: candidate
name: Sudan post-Bashir transition and conflict-era state management
countries: [SDN]
timeframe:
  start: 2019
  end: ongoing
coalition: Transitional civilian-military authorities, then fragmented wartime state institutions
leaders:
  - "Abdel Fattah al-Burhan (Sovereign Council chair and SAF commander)"
  - "Abdalla Hamdok (Prime Minister, 2019-2021)"
  - "Sudan Armed Forces-aligned wartime authorities after 2023"
doctrine: >
  Sudan's post-Bashir governing regime moved from a civilian-military transition
  promising peace, debt relief, and macroeconomic normalization into a
  fragmented wartime institutional order after the 2021 coup and 2023 conflict.
  The movement is coded as a transition-and-conflict state-management sequence:
  peace-agreement incorporation, exchange-rate and debt-relief reform, and
  constrained humanitarian-access decisions under wartime sovereignty claims.
policies:
  - sdn_juba_peace_agreement_2020
  - sdn_exchange_rate_unification_2021
  - sdn_adre_humanitarian_crossing_reopening_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", magnitude: weak, rationale: "Peace-agreement and humanitarian-access frameworks added formal channels, but coups and war left enforcement fragmented."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Exchange-rate unification reduced multiple-rate allocation rents."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Exchange-rate reform and Adre reopening supported formal trade and humanitarian flows."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Juba wealth-sharing commitments and humanitarian-access authorization expanded promised relief and reconstruction channels."}
references:
  - "Juba Peace Agreement for Peace in Sudan, 2020."
  - "IMF and World Bank materials on Sudan exchange-rate unification and HIPC decision point, 2021."
  - "UN OCHA and UN Security Council reporting on Adre humanitarian access, 2024-2025."
notes: >
  Sudan is treated as a fragmented transition/conflict policy regime. The entry
  should not be read as a coherent nationwide implementation claim.


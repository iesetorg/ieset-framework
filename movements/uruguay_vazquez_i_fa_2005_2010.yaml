movement_id: uruguay_vazquez_i_fa_2005_2010
status: candidate
name: Tabaré Vázquez first term — first FA government, IRPF tax reform
countries:
- URY
timeframe:
  start: 2005
  end: 2010
  enacted_date: '2005-03-01'
coalition: Frente Amplio (first FA government in Uruguayan history)
leaders:
- Tabaré Vázquez (President 2005-2010)
- Danilo Astori (Economy 2005-2008)
- Álvaro García (Economy 2008-2010)
- Mario Bergara (BCU 2008-2013)
doctrine: 'Vázquez I broke 170 years of Colorado/Blanco bipartisan rotation with the first Frente
  Amplio government, governing from disciplined centre-left. (a) Economic school: social-democratic
  / social-liberal — personal income tax IRPF introduced Ley 18.083 Jul 2007 (first in Uruguay''s
  modern history, replacing IRP), "Plan de Emergencia" transfer Apr 2005 (PANES emergency-cash),
  universal child allowance "Asignaciones Familiares" expansion 2008, FONASA universal health-insurance
  reform Dec 2007 (Ley 18.211 launching SNIS), free-trade disciplined with US BIT 2005 + partial
  opening, kept BCU inflation-targeting path. (b) Left-right: centre-left; institutionally orthodox,
  redistributive on tax + health. (c) Dated policies: PANES emergency plan Apr 2005, IRPF Ley
  18.083 (Jul 2007 in force), FONASA-SNIS Ley 18.211 Dec 2007, pension reform 2008 retirement-age
  flex, UPM (Botnia) pulp mill opening Nov 2007 (Argentine protests — Gualeguaychú blockade International
  Court ruling 2010), anti-smoking regulation 2005-2008. (d) Popularity: won Oct 2004 runoff-
  avoiding first round 50.45%; approval remained 50-60s through term; FA retained power Nov 2009
  with Mujica elected successor. (e) Coherence: high — tax + health + transfer reforms formed
  a coherent social-democratic package; macro-orthodoxy (debt restructuring 2003 stayed, fiscal
  anchors preserved) kept market access intact.

  '

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_prewar_state_building_social_incorporation_1906_1931
status: candidate
name: "Late Meiji-Taisho state-building and managed social incorporation"
countries: [JPN]
timeframe: {start: 1906, end: 1931}
coalition: "Imperial cabinets under the Meiji Constitution, moving from genro-guided rule to party cabinets under Seiyukai and Kenseikai-Minseito"
leaders:
  - "Saionji Kinmochi (Prime Minister 1906-1908, 1911-1912)"
  - "Hara Takashi (Prime Minister 1918-1921)"
  - "Kato Takaaki (Prime Minister 1924-1926)"
  - "Hamaguchi Osachi (Prime Minister 1929-1931)"
  - "Inoue Junnosuke (Finance Minister 1929-1931)"
doctrine: >
  From railway nationalisation through the collapse of party cabinets after the gold-
  standard shock, prewar Japan combined developmental-state infrastructure control,
  gradual labour and social-insurance incorporation, and increasingly coercive policing
  of dissent. The state absorbed the trunk railway network, imposed the first national
  factory protections, and created compulsory workers' health insurance, while the 1925
  Peace Preservation Law drew a hard line against socialism and anti-kokutai politics.
  The final phase returned the yen to gold at the prewar parity in 1930, enforcing
  orthodox deflation inside a weakening world economy. The movement's own case was that
  industrial modernity and imperial cohesion required bureaucratic coordination,
  selective welfare inclusion, and firm order rather than laissez-faire pluralism.
policies:
  - japan_railway_nationalisation_act_1906
  - japan_factory_act_1911_1916
  - japan_health_insurance_act_1922_1927
  - japan_peace_preservation_law_1925
  - japan_gold_standard_restoration_1930
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Railway nationalisation and the broader prewar bureaucratic state increased direct state gating in strategic sectors."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Compulsory workers' health insurance extended contributory social protection into urban industrial society."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "The Factory Act and later insurance obligations modestly thickened labour regulation in large firms."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "The Peace Preservation Law criminalised anti-kokutai and anti-property organising and empowered coercive policing of ideology."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "Return to gold at the old parity in 1930 forced a deflationary monetary stance during a deteriorating global economy."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Strategic infrastructure control and bureaucratic coordination make this a recognizable prewar developmental-state ancestor."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Factory regulation and workers' health insurance fit social-protection themes, but the coercive imperial-security state clearly does not."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Railway nationalisation, ideological policing, and bureaucratic gatekeeping sit well outside a classical-liberal policy mix."}
references:
  - "Railway Nationalization Act (1906)"
  - "Factory Act (1911; effective 1916)"
  - "Health Insurance Act (1922; effective 1927)"
  - "Peace Preservation Law (1925)"
  - "Gold embargo lifted and yen restored to gold parity (1930)"
  - "Gordon (2003), A Modern History of Japan"
  - "Pyle (2007), The Making of Modern Japan"
notes: "Historical backfill anchor moving Japan's authored movement coverage back into the early 1900s with a compact late-Meiji/Taisho-to-early-Showa bundle."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pakistan_benazir_ppp_second_1993_1996
status: candidate
name: "Benazir Bhutto PPP second term — privatisation continuation (Pakistan)"
countries: [PAK]
timeframe: {start: 1993, end: 1996}
coalition: "Pakistan Peoples Party-led coalition"
leaders:
  - "Benazir Bhutto (PM Oct 1993-Nov 1996)"
  - "Sartaj Aziz (initial Finance Minister, later replaced)"
  - "V.A. Jafarey (Finance Adviser)"
  - "Farooq Leghari (President from Nov 1993)"
doctrine: >
  Benazir Bhutto second-term doctrine — reform-continuity with
  populist overlay; PPP accepted the Nawaz-initiated privatisation
  architecture and IMF framework. Economic school: centre-left PPP
  rhetoric with market-liberal substance under IMF SAF continuity;
  energy policy flagship. Dated policies: 1994 Power Policy —
  independent power-producer (IPP) framework attracting Hubco
  (commissioned 1997) and other IPPs worth $5bn commitment, most
  ambitious power-privatisation IPP programme in developing world at
  the time; IMF Extended Fund Facility Feb 1994; further privatisation
  of banks (United Bank 1994 stalled, Habib Bank stalled);
  Women's Development programmes; Kashmir diplomacy vis-à-vis India;
  Murtaza Bhutto killing 20 Sep 1996; economic downturn 1995-1996 and
  foreign-exchange crisis; dismissed by President Farooq Leghari 5 Nov
  1996 under 8(2)(b) citing corruption and extrajudicial killings.
  Left-right: centre-left PPP nominal; economic policy centre-right in
  substance continuing Nawaz-era liberalisation. Popularity: Oct 1993
  general election PPP 37.9% / 86 seats / vs PML(N) 39.9% / 72 (PPP
  formed majority via allies); dismissed 5 Nov 1996. Coherence:
  moderate — Power Policy 1994 highly coherent sector flagship; broader
  reform track continuation; party patronage/corruption narratives
  undermined credibility and triggered 1996 dismissal.
policies:
  - pk_power_policy_ipp_1994
  - pk_imf_eff_1994
  - pk_8th_amendment_dismissal_precedent_1996
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "1994 Power Policy opened generation to IPPs — sector-licensing revolution."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "IPP framework included government take-or-pay guarantees — contingent liabilities."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Continued bank privatisation and financial-sector liberalisation under IMF EFF."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Presidential dismissal under 8(2)(b); corruption/extrajudicial-killing allegations."}
predecessor_movements:
  - pakistan_nawaz_sharif_pmln_first_1990_1993
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: aligned}
references:
  - "Fraser (2005), 'Pakistan's 1994 Power Policy' Energy Policy"
  - "Husain (1999), Pakistan: The Economy of an Elitist State"
notes: "Deep-history tranche 2. Second dismissal under 8th Amendment 1996."

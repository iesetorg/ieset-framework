movement_id: uk_may_conservative_2016_2019
status: candidate
name: "UK May Conservative Brexit-negotiation government 2016-2019"
countries: [GBR]
timeframe: {start: 2016, end: 2019, enacted_date: "2016-07-13"}
coalition: "Conservative majority (to Jun 2017), then Conservative minority + DUP confidence-and-supply (Jun 2017 - Jul 2019)"
leaders:
  - "Theresa May (PM 2016-2019)"
  - "Philip Hammond (Chancellor 2016-2019)"
  - "David Davis / Dominic Raab / Stephen Barclay (successive Brexit Secretaries)"
doctrine: >
  Post-Brexit-referendum Conservative government defined by the Article-50
  negotiation and its domestic political price. Economically a soft pivot away
  from Osborne austerity: slower deficit-reduction pace (Hammond's 'fiscal
  headroom'), industrial-strategy white paper (Nov 2017) reintroducing
  sector-focused state co-ordination, 'just about managing' rhetoric,
  and modest public-sector pay-cap relaxation. The signature set piece was
  the 2017 snap election: called to secure a Brexit mandate, delivered a
  hung parliament on 42.3% Conservative vs 40.0% Labour (Corbyn surge).
  Other defining episodes: Grenfell Tower fire (Jun 2017) and cladding-regime
  scandal; Windrush deportation scandal (Apr 2018) exposing 'hostile environment'
  immigration regime; and three House-of-Commons defeats of the Withdrawal
  Agreement (Jan/Mar 2019). Left-right: centre-right with interventionist-industrial
  tilt. Popularity: started with ~49% approval, collapsed through Brexit
  paralysis to ~25% by resignation. Coherence: fundamentally low — the Brexit
  mandate and the parliamentary arithmetic were incompatible after Jun 2017.
policies:
  - uk_article_50_notification_2017
  - uk_industrial_strategy_white_paper_2017
  - uk_grenfell_cladding_regime_response_2017
  - uk_windrush_scandal_response_2018
  - uk_withdrawal_agreement_three_defeats_2019

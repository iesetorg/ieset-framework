  - {axis: regulatory.immigration_openness, direction: "-", magnitude: moderate, rationale: "Hostile-environment continuation; end-of-free-movement commitments in Brexit negotiation."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Austerity pace slowed; pay cap relaxation; but deficit still falling."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: weak, rationale: "Industrial Strategy sector deals (aerospace, auto, life sciences, AI)."}

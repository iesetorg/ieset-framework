axes_summary:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
  rationale: NAFTA binding tariff eliminations + investment protections; followed GATT accession
    (1986).
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Privatisation of telecoms, banks, airlines, steel, sugar.
- axis: institutional.property_rights
  direction: +
  magnitude: moderate
  rationale: Article 27 reform + NAFTA investor protections; counter-weighted by weak judicial
    infrastructure.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: 1994 Banxico autonomy with constitutional price-stability mandate.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: moderate
  rationale: Primary surpluses 1990-1993; public-sector deficit near zero pre-crisis.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  rationale: Formal Ley Federal del Trabajo not reformed; de facto flexibilisation via pacto +
    informal sector.
outcome_hypotheses:
- exchange_rate_regime_choice_and_crisis_vulnerability
- trade_liberalisation_growth_effect
- privatisation_productivity_effect
- trade_agreement_growth_effects
position_alignments:
- position_id: classical_liberal
  alignment: aligned
  notes: Liberalising content — trade, privatisation, property rights.
- position_id: chicago_monetarism
  alignment: partially_aligned
  notes: Technocrat team largely MIT/Chicago/Yale trained; exchange-rate-anchor strategy not strictly
    monetarist.
- position_id: ordoliberal
  alignment: partially_aligned
  notes: Rule-based institutional reform of CB + trade commitments; weak competition-order enforcement
    (Telmex rent).
- position_id: institutionalism
  alignment: partially_aligned
  notes: Institutions formally strengthened on paper; one-party PRI political architecture + judicial
    weakness left fragility.
- position_id: empirical_pragmatist
  alignment: opposed
  notes: Ex-post the sequencing — peso anchor + tesobonos exposure + political instability — failed
    the 1994 stress test.
references:
- North American Free Trade Agreement 1994
- Reforma al Artículo 27 Constitucional (DOF 6 enero 1992)
- Ley del Banco de México 1993 + reforma constitucional abril 1994
- Pacto de Solidaridad Económica (1987) + pactos sucesivos
- 'Lustig (1998), Mexico: The Remaking of an Economy'
- Edwards (1995), Crisis and Reform in Latin America
- Krugman (1999), 'Analytical Afterthoughts on the Asian Crisis' (Mexico parallel)

movement_id: mexico_salinas_nafta_neoliberal_1988_1994
status: candidate
name: Mexico Salinas PRI neoliberal turn + NAFTA
countries:
- MEX
timeframe:
  start: 1988
  end: 1994
coalition: PRI under Carlos Salinas de Gortari with US-trained technocrat economic team
leaders:
- Carlos Salinas de Gortari (President 1988-1994)
- Pedro Aspe (Finance Minister 1988-1994)
- Jaime Serra Puche (Commerce, NAFTA negotiator)
- Miguel Mancera (Banco de México Governor)
- José Córdoba Montoya (Chief of Staff)
doctrine: 'Accelerated continuation of the market-liberalisation turn begun under de la Madrid
  (1982-1988), executed with technocratic concentration under Salinas. Major strands: (1) large
  privatisation programme — Telmex (1990), 18 commercial banks (1991-1992), Mexicana and Aeroméxico,
  steel and fertiliser SOEs, raising ~$23bn; (2) constitutional reform of Article 27 (1992) ending
  ejido inalienability and permitting transfer / private investment in communal lands; (3) NAFTA
  negotiation 1990-1992, signature December 1992, entry into force 1 January 1994; (4) Banco de
  México autonomy granted via constitutional reform in April 1994 with price- stability mandate;
  (5) Pacto de Solidaridad Económica — tripartite incomes/exchange-rate pact from 1987 binding
  wages, prices and a managed exchange-rate crawl; (6) Programa Nacional de Solidaridad (Pronasol)
  as discretionary social-spending vehicle. The regime''s external anchor — a managed, appreciating
  peso — proved fragile to the 1994 political shocks (Chiapas uprising Jan 1994, Colosio assassination
  Mar 1994, Ruiz Massieu Sep 1994) and to tesobonos dollar-indexed debt exposure; the Dec 1994
  devaluation triggered the Tequila Crisis. Stated case: transform Mexico into a North American
  manufacturing platform with locked-in liberalisation commitments; canonical case of structural
  reform paired with exchange-rate rigidity that could not absorb shocks.

  '

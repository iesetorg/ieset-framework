movement_id: portugal_passos_coelho_psd_cds_2011_2015
status: candidate
name: Passos Coelho PSD-CDS Troika-programme austerity (Portugal 2011-2015)
countries:
- PRT
timeframe:
  start: 2011
  end: 2015
  enacted_date: '2011-06-21'
coalition: 'PSD-CDS-PP centre-right coalition (Assembleia da República majority: PSD 108 + CDS-PP
  24 of 230 seats, June 2011 election)'
leaders:
- Pedro Passos Coelho (PSD, Prime Minister June 2011 - November 2015)
- Vítor Gaspar (Finance Minister 2011-2013, architect of programme fiscal package)
- Maria Luís Albuquerque (Finance Minister 2013-2015)
- Paulo Portas (CDS-PP leader, Deputy PM)
doctrine: 'Centre-right PSD-CDS coalition formed after José Sócrates''s PS government requested
  an EU-ECB-IMF bailout (April 2011) and lost the June 2011 snap election. Economic school: Troika-programme
  austerity plus structural reform — EU ordoliberal fiscal-consolidation template combined with
  OECD-style product- and labour-market liberalisation. Left-right axis: centre-right (PSD liberal-conservative
  + CDS-PP Christian-democratic). Core content: (a) €78bn EU-ECB-IMF Memorandum of Understanding
  signed 17 May 2011 with conditionality across fiscal, labour, judicial, product-market, and
  banking dimensions; (b) deep fiscal consolidation — VAT hike to 23%, public-sector wage cuts
  of 5-10% (2011 Budget Law) later extended and partially struck down by Tribunal Constitucional
  (Acórdãos 353/2012, 187/2013, 413/2014); 13th/14th-month bonus suspensions; pension freezes
  and convergence of CGA/Social Security rules; (c) labour-market reform (Lei 23/2012) reducing
  severance, overtime premia, and collective-agreement extension; (d) privatisations of EDP, REN,
  ANA Aeroportos, CTT Correios, TAP (process started), Águas de Portugal partial; (e) judicial
  and product-market reforms under Troika chapters. Exited programme 17 May 2014 clean (no precautionary
  facility). Popularity: PSD-CDS won 2011 with 50.4% combined vote share; by 2015 legislative
  election PSD-CDS ''Portugal à Frente'' list took 36.9% and 107 seats — a plurality but short
  of a majority, and the combined left (PS 32.3% + BE 10.2% + CDU 8.3%) formed the geringonça
  that ejected them. 2014 European elections: PSD 27.7%, CDS 7.7%. Approval collapsed during programme
  years (net -40 to -50 in Eurobarometer 2012-2013) and recovered only partially post-exit. Coherence
  judgement: doctrinally coherent Troika-programme execution that delivered programme exit and
  external-account correction but at the cost of deep social compression and eventual electoral
  defeat by a novel left coalition.

  '
policies:
- portugal_troika_programme_2011_2014
- pt_iva_vat_hike_2011
- pt_public_wage_cuts_2011_2014
- pt_labour_reform_lei_23_2012
- pt_privatisations_edp_ren_ana_ctt_2011_2014
- pt_pension_freeze_cga_convergence_2011_2014
axes_summary:
- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
  rationale: Public-wage cuts, pension freeze, bonus suspensions; primary balance moved from deficit
    to surplus by 2013-2014.
- axis: fiscal.tax_progressivity
  direction: '-'
  magnitude: moderate
  rationale: IRS bracket compression 2013 (five brackets) raised effective rates across middle
    deciles; combined with VAT-hike weight on lower deciles.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: strong
  rationale: 'Lei 23/2012: reduced severance (30→20→12 days/year), eased individual and collective
    dismissal, cut overtime premia, weakened sectoral-agreement extension (portarias de extensão).'
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Professional-services liberalisation (Law 2/2013 regulated professions), commerce
    licensing simplification, judicial-process acceleration — OECD PMR Portugal score improved
    2008→2013.
- axis: regulatory.sectoral_licensing
  direction: '-'
  magnitude: moderate
  rationale: Privatisations of EDP (2011-2012), REN (2012), ANA (2012-2013), CTT (2013-2014),
    TAP begun — reduced state gating in energy, aviation, postal.
- axis: regulatory.financial_deregulation
  direction: +
  magnitude: moderate
  rationale: BES resolution August 2014 (Banco Espírito Santo split into Novo Banco + bad bank),
    bank recapitalisation with CoCos; tighter supervision under BdP within ECB SSM framework from
    2014.
- axis: institutional.rule_of_law
  direction: '0'
  magnitude: weak
  rationale: Tribunal Constitucional struck down repeated austerity measures as violating equality
    principle but democratic institutions held; no institutional erosion.
position_alignments:
- position_id: ordoliberal
  alignment: aligned
  notes: EU-ECB fiscal-consolidation orthodoxy plus structural-reform agenda.
- position_id: empirical_pragmatist
  alignment: partially_aligned
  notes: Programme exit clean without second facility is cited in pragmatist literature as evidence
    conditional bailouts can work under favourable external conditions.
- position_id: post_keynesian
  alignment: opposed
  notes: Austerity depth and labour-reform content are the canonical post-Keynesian counter-case.
- position_id: democratic_socialist
  alignment: opposed
predecessor_movements: []
successor_movements:

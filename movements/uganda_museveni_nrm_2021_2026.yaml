movement_id: uganda_museveni_nrm_2021_2026
status: candidate
name: "Museveni NRM sixth elected term 2021-2026"
countries: [UGA]
timeframe: {start: 2021, end: 2026, enacted_date: "2021-05-12"}
coalition: "National Resistance Movement (NRM)"
leaders:
  - "Yoweri Kaguta Museveni (President, NRM)"
  - "Robinah Nabbanja (Prime Minister, 2021-)"
  - "Matia Kasaija (Finance Minister)"
  - "Ruth Nankabirwa Ssentamu (Energy and Mineral Development Minister)"
doctrine: >
  Museveni's 2021-2026 term continued the NRM's long-running developmental and
  security-state model: parish-level poverty-reduction finance, state-backed oil
  development around Lake Albert, and tight political and social control. The
  governing coalition framed the programme as wealth creation and sovereign
  resource development while using coercive legal instruments against opposition
  and LGBT communities.
policies:
  - ug_parish_development_model_2022
  - ug_lake_albert_oil_eacop_fid_2022
  - ug_anti_homosexuality_act_2023
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Parish Development Model expands direct revolving funds to local household enterprise groups."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "PDM credit and oil-project support target selected sectors and household-enterprise categories."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Lake Albert oil development and export-pipeline FID expand domestic hydrocarbon production capacity."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Anti-Homosexuality Act 2023 substantially broadens criminal penalties and rights restrictions for a targeted minority."}
references:

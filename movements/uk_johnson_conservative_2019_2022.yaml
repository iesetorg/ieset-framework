# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_johnson_conservative_2019_2022
status: candidate
name: "Johnson Conservative government (UK)"

countries: [GBR]

timeframe:
  start: 2019
  end: 2022
  enacted_date: "2019-12-13"

coalition: "Conservative majority (80-seat majority after December 2019 general election)"

leaders:
  - "Boris Johnson (PM, 2019-2022)"
  - "Rishi Sunak (Chancellor, 2020-2022)"
  - "Sajid Javid (Chancellor, 2019-2020)"

doctrine: >
  Drew from a hybrid of post-referendum Eurosceptic Tory nationalism and
  a levelling-up dirigiste Keynesianism that broke with Cameron-Osborne
  austerity orthodoxy, pairing fiscal loosening and regional industrial
  policy with immigration restriction and regulatory divergence from the
  EU. Positioned on the centre-right but with a redistributive
  geographic axis aimed at Red Wall seats — socially conservative,
  culturally nationalist, fiscally expansionary. Key measures:
  ratification of the EU Withdrawal Agreement (31 January 2020) and TCA
  (24 December 2020); points-based immigration system from 1 January
  2021; COVID furlough and CBILS/BBLS support (March 2020); planned
  corporate tax rise from 19% to 25% (announced March 2021 Budget for
  April 2023); Health and Social Care Levy (1.25pp NI rise, April 2022);
  Levelling Up White Paper (February 2022); Subsidy Control Act 2022.
  Entered office with 43.6% vote share (December 2019) and large
  approval bounce through early 2020 vaccine rollout, then collapsed
  through Partygate 2021-22 and cost-of-living erosion, triggering mass
  ministerial resignations and Johnson's own resignation July 2022.
  Programme was internally incoherent — levelling-up spend pulled
  opposite to fiscal-hawk Treasury instincts, and Brexit-driven labour
  tightness clashed with growth rhetoric.

policies:
  - uk_points_based_immigration_2021
  - uk_covid_furlough_scheme_2020
  - uk_corporation_tax_rise_announcement_2021
  - uk_health_social_care_levy_2022
  - uk_levelling_up_white_paper_2022
  - uk_subsidy_control_act_2022

axes_summary:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "COVID fiscal response pushed spending to peacetime peak; levelling-up capital programmes sustained elevated baseline."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Announced corporation tax rise 19% → 25% (later implemented under Sunak)."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: strong
    rationale: "End of EU free movement; points-based system from 2021."
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: strong
    rationale: "TCA implementation created customs friction with UK's largest trading bloc."
  - axis: fiscal.sectoral_subsidy
    direction: "+"
    magnitude: moderate
    rationale: "Levelling-up funds, freeports, Subsidy Control Act providing post-EU-state-aid framework."

position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: opposed}

disclosure: >
  The Johnson government is a contested case: coalition = Conservative but
  policy content broke with austerity-era Conservative fiscal conservatism
  on spending and tax. Illustrates Invariant 3 — party label does not
  drive scoring; policy content does.

references:

movement_id: greece_papandreou_pasok_1981_1989
status: candidate
name: "A. Papandreou PASOK first and second terms (Greece): allagi, wage compression, debt escalation"
countries: [GRC]
timeframe: {start: 1981, end: 1989}
coalition: "PASOK majority"
leaders:
  - "Andreas Papandreou (PM, 21 October 1981 - 2 July 1989)"
  - "Apostolos Lazaris (Finance 1981-1982)"
  - "Gerasimos Arsenis (Economy 1982-1985, National Economy 1983-1985)"
  - "Kostas Simitis (National Economy 1985-1987 — stabilisation programme architect)"
  - "Dimitrios Tsovolas (Finance 1985-1989)"
doctrine: >
  PASOK's 'allagi' (change) Socialist-Keynesian programme — expansionary
  redistribution in first term, forced 1985-87 IMF-adjacent stabilisation
  under Simitis, then expansionary backsliding pre-1989 election.
  Economic school: Socialist-Keynesian interventionism influenced by
  dependency theory and Andreas Papandreou's Berkeley academic Keynesianism;
  foreign-capital-sceptical rhetoric but pragmatic continuation of EEC
  structural-fund absorption. Left-right axis: left, decisively — first
  term involved minimum-wage rises, ATA automatic indexation, pension
  increases, welfare expansion, public-sector hiring. Content: (i)
  constitutional Law 1264/1982 trade-union reform; (ii) Automatic Cost-of-
  Living Adjustment (ATA, 1982) with trigger thresholds; (iii) pension
  expansion under OGA / IKA and public-sector employment doubled
  1981-1989; (iv) 1983 National Health System (ESY) founded under Law
  1397/1983 (Avgerinos); (v) 1985 peseta-equivalent drachma devaluation
  15% + Simitis stabilisation programme (two-year pay freeze, import-
  deposit scheme, fiscal restraint) — partial success before unwound
  1987-88; (vi) nationalisation of 'problematic enterprises' via Organismos
  Anasygkrotisis Epicheiriseon (OAE, Law 1386/1983); (vii) 1986
  constitutional amendment reducing presidential powers; (viii) EEC
  Integrated Mediterranean Programmes (IMPs) funds absorbed; (ix) debt/
  GDP trajectory: 23% (1980) → 67% (1989); (x) corruption scandals
  culminating in Koskotas / Bank of Crete affair 1988-89 and Papandreou
  personal impropriety crisis. Popularity: October 1981 election PASOK
  48.1% (172 of 300 seats) — historic first Socialist majority;
  June 1985 election PASOK 45.8% — retained majority; Simitis
  stabilisation cost PASOK internally; June 1989 election PASOK 39.1%
  — lost majority, led to inconclusive hung parliament and ND-KKE
  caretaker governments. Coherence: programme was coherent as a Socialist-
  expansionary model through 1984-85; Simitis 1985-87 stabilisation
  was an internally contradictory technocratic interlude forced by
  IMF-adjacent external accounts; unwinding 1987-89 rebuilt expansion
  + corruption eroded legitimacy. The movement established PASOK's
  durable clientelist-socialist identity that dominated Greek politics
  until 2010 debt crisis.
policies:
  - greece_trade_union_law_1264_1982
  - greece_ata_indexation_1982
  - greece_esy_national_health_system_1983
  - greece_oae_problematic_enterprises_1983
  - greece_simitis_stabilisation_1985_1987
  - greece_debt_trajectory_1981_1989

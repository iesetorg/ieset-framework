notes: "Pre-1996 sample extension. Papandreou era is foundational to understanding the pre-euro Greek fiscal trajectory linked to the 2010 crisis; the Simitis 1985-87 stabilisation shows that internal adjustment attempts existed but were politically unsustainable without external binding."

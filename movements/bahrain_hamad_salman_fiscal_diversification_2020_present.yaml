# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bahrain_hamad_salman_fiscal_diversification_2020_present
status: candidate
name: "Bahrain Hamad-Salman fiscal diversification and residency reform"
countries: [BHR]
timeframe: {start: 2020, end: ongoing}
coalition: "Al Khalifa monarchy under King Hamad; Crown Prince Salman as prime minister from November 2020"
leaders:
  - "Hamad bin Isa Al Khalifa (King)"
  - "Salman bin Hamad Al Khalifa (Crown Prince and Prime Minister)"
  - "Shaikh Salman bin Khalifa Al Khalifa (Minister of Finance and National Economy)"
doctrine: >
  Current Bahraini economic governance combines dynastic continuity with a
  post-oil fiscal-broadening and services-diversification agenda. The cabinet
  has pursued GCC-aligned VAT broadening, stronger payroll-compliance systems,
  and long-term residence routes for investors and skilled residents while
  retaining a security-state political structure and a large public-sector
  employment role for nationals.
policies:
  - bahrain_vat_rate_increase_2022
  - bahrain_golden_residency_visa_2022
  - bahrain_wage_protection_system_2021
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "The VAT rise shifted more non-oil revenue collection toward broad consumption taxation."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "Golden Residency created a renewable long-term residence route for investors, retirees, and high earners."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Wage Protection System monitoring tightened employer payroll-compliance obligations."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Digital payroll enforcement improved contract-payment verifiability, though wider political constraints remain."}
references:
  - "Bahrain National Portal, Golden Residency Visa Services: https://services.bahrain.bh/wps/portal/GoldenResidency_en"
  - "Bahrain eVisa official portal: https://www.evisa.gov.bh/"
  - "Bahrain National Bureau for Revenue VAT materials: https://www.nbr.gov.bh/"
notes: "First Lane D tranche movement for sparse BHR coverage; covers current fiscal, residency, and wage-compliance policies only."

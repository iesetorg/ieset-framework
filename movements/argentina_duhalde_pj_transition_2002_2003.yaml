  - {position_id: developmentalist, alignment: aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Ley 25.561 Emergencia Pública y Reforma del Régimen Cambiario"
  - "Decreto 214/2002 Pesificación"
  - "Decreto 565/2002 Plan Jefes y Jefas"
notes: "Legislative-Assembly selection after 20-Dec-2001 collapse; bridges to Kirchner 2003."

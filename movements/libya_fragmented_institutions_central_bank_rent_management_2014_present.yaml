# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: libya_fragmented_institutions_central_bank_rent_management_2014_present
status: candidate
name: "Libya fragmented institutions and central-bank oil-rent management"
countries: [LBY]
timeframe: {start: 2014, end: ongoing}
coalition: "UN-recognised Tripoli governments, House of Representatives and eastern authorities, Central Bank factions, National Oil Corporation bargaining, and armed-coalition veto players"
leaders:
  - "Fayez al-Sarraj (Presidency Council/GNA head 2016-2021)"
  - "Abdul Hamid Dbeibah (GNU Prime Minister 2021-present)"
  - "Aguila Saleh (House of Representatives Speaker)"
  - "Khalifa Haftar (Libyan Arab Armed Forces commander)"
  - "Sadiq al-Kabir (Central Bank of Libya Governor until 2024)"
doctrine: >
  Libya's post-2014 policy regime is not a unified national governing programme.
  It is a fragmented institutional settlement in which rival executives and
  armed coalitions contest legitimacy while the Central Bank of Libya, National
  Oil Corporation, UN mediation, and oil-revenue distribution remain the main
  policy channels that can operate across front lines. The regime's practical
  logic has been to preserve minimum macroeconomic and payment functions, unify
  exchange and central-bank arrangements where possible, and keep oil-rent
  flows from collapsing despite unresolved sovereignty disputes.
policies:
  - lby_libyan_political_agreement_gna_2015
  - lby_exchange_rate_unification_2021
  - lby_central_bank_reunification_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "mixed", rationale: "UN-brokered institutional frameworks and CBL reunification steps improved formal coordination, but rival governments and armed veto players kept enforcement fragmented."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Exchange-rate unification and central-bank reunification partially restored technocratic monetary functions after institutional split."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: weak, rationale: "Reunification and balance-sheet coordination strengthened financial supervision relative to rival CBL branches."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Reducing multiple exchange rates narrowed arbitrage channels that distorted imports and public allocation."}
references:
  - "UNSMIL, Libyan Political Agreement, 17 December 2015"
  - "Central Bank of Libya statements on exchange-rate unification and institutional reunification"
  - "IMF, Libya Article IV consultation reports, 2023-2024"
  - "World Bank Libya Economic Monitor coverage of exchange-rate and fiscal fragmentation"
notes: "The movement is deliberately framed as fragmented governance and central-bank/oil-rent management, not as a coherent national policy coalition."

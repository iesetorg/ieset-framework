movement_id: japan_hatoyama_dpj_2009_2010
status: candidate
name: "Hatoyama DPJ — regime change and Futenma collapse"
countries: [JPN]
timeframe: {start: 2009, end: 2010, enacted_date: "2009-09-16"}
coalition: "DPJ-SDP-PNP coalition (Hatoyama Yukio cabinet)"
leaders:
  - "Yukio Hatoyama (PM, 16 Sep 2009 - 8 Jun 2010)"
  - "Hirohisa Fujii / Naoto Kan (Finance)"
  - "Ichirō Ozawa (DPJ Secretary-General, parallel power centre)"
  - "Masaaki Shirakawa (BoJ Governor)"
doctrine: >
  DPJ regime-change doctrine — first full non-LDP majority government since
  1955. Hatoyama's programme rested on a redistributive-Keynesian platform
  ("people's livelihoods first") funded by wringing waste from the
  bureaucracy ("shiwake" public budget-screening process run by Renhō in
  November 2009) rather than tax hikes: new child allowance (¥13,000/month
  per child phased in April 2010), high-school tuition-free policy (April
  2010), highway-toll-free experiments, and farmer income-compensation
  scheme (kobetsu shotoku hoshō, FY2010 start). Institutional doctrine shift
  was seiji-shudō — political leadership over bureaucracy — abolishing
  administrative vice-minister meetings and empowering politically-appointed
  national strategy bureau. Foreign-policy doctrine was "equidistance" between
  US and China and an East Asian Community vision; collapsed over Hatoyama's
  mishandling of the Futenma Marine Corps base relocation on Okinawa, where
  he repudiated the 2006 Guam-relocation agreement, floated off-island
  alternatives, then capitulated back to Henoko in May 2010, triggering SDP
  exit from coalition. Popularity fell from ~75% to ~20%; combined with Ozawa
  political-funds scandal, Hatoyama resigned 2 June 2010. Coherence line:
  ambitious fiscal-redistribution + bureaucratic-politicisation programme,
  blown up by foreign-policy amateurism.
policies:
  - jp_dpj_child_allowance_2010
  - jp_dpj_high_school_tuition_free_2010
  - jp_dpj_farmer_income_compensation_2010
  - jp_dpj_shiwake_budget_screening_2009
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Universal child allowance + tuition-free high school + farmer income support."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Largest general-account budget to that date FY2010 at ¥92.3tn."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Seiji-shudō politicisation of bureaucracy — reform intent; contested effect."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "FTA/EPA agenda paused; TPP not yet on agenda."}
predecessor_movements:
  - japan_fukuda_aso_ldp_2007_2009
successor_movements:
  - japan_kan_dpj_2010_2011
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Transfer expansion as demand support during post-GFC slack."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Universal transfers without revenue base criticised as fiscally unsustainable."}
references:
  - "DPJ 2009 manifesto"
  - "Cabinet Office FY2010 budget documents"
  - "NHK approval series Sep 2009 - Jun 2010"
notes: >
  Regime change was the institutional event; the doctrinal substance of
  the DPJ programme is captured here rather than in a broader DPJ-era
  umbrella because Kan and Noda subsequently pivoted the doctrine in
  distinct directions (consumption-tax orthodoxy, Fukushima crisis
  management).

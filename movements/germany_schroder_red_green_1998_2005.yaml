movement_id: germany_schroder_red_green_1998_2005
status: candidate
name: Schröder SPD-Greens Red-Green government (broad)
countries:
- DEU
timeframe:
  start: 1998
  end: 2005
coalition: SPD + Bündnis 90/Die Grünen
leaders:
- Gerhard Schröder (Chancellor)
- Joschka Fischer (Foreign Minister, Vice-Chancellor)
- Hans Eichel (Finance Minister from 1999)
- Oskar Lafontaine (Finance 1998-March 1999)
doctrine: 'Economic school: modernising social democracy — early Keynesian Lafontaine phase (October
  1998 - March 1999) displaced by Eichel- Schröder supply-side turn delivering tax reform, Agenda
  2010 and Hartz reforms. Left-right axis: centre-left, with market-oriented content. Dated policies:
  nuclear phase-out agreement ("Atomkonsens") June 2000 / Atomgesetz amendment 2002; Renten-Riester
  pension reform 2001 introducing funded second-pillar incentives; Zuwanderungsgesetz (Immigration
  Act) 30 July 2004 first federal points-light framework; Lebenspartnerschaftsgesetz civil partnerships
  2001; refusal to participate in Iraq invasion 2002-2003 ("German way"); Agenda 2010 speech 14
  March 2003 launching Hartz I-IV labour reforms (Hartz I-II 2003, III 2004, IV January 2005);
  corporate tax rate cut from ~52% combined to ~39% combined (Steuerreform 2000); top personal
  rate 53% → 42% in tranches to 2005; EEG renewable-energy feed-in law 2000 introducing technology-specific
  tariffs; Grundsicherung pensioner safety-net 2003. Popularity: 1998 SPD 40.9% / landslide end
  of Kohl era; 2002 narrow re-election after Elbe-flood response and Iraq refusal (SPD 38.5%,
  Union 38.5%, SPD formed coalition); approval collapsed 2003-2005 under Hartz IV backlash. Coherence:
  moderate to high — deliberate reforming-social-democracy package, though internal SPD rupture
  birthed WASG/Linke split 2004-2005.

  '

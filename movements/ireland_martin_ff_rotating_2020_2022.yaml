# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ireland_martin_ff_rotating_2020_2022
status: candidate
name: "Martin FF-FG-Green rotating coalition (Ireland, 2020-2022)"

countries: [IRL]

timeframe:
  start: 2020
  end: 2022
  enacted_date: "2020-06-27"

coalition: "Fianna Fáil + Fine Gael + Green Party rotating-Taoiseach coalition (Programme for Government, Our Shared Future, 27 June 2020); Martin held the Taoiseach office from 27 June 2020 to 17 December 2022 before handing to Varadkar under the rotation agreement"

leaders:
  - "Micheál Martin (Taoiseach, Fianna Fáil, June 2020 – December 2022)"
  - "Leo Varadkar (Tánaiste + Enterprise, Trade and Employment, Fine Gael)"
  - "Eamon Ryan (Environment, Climate and Communications + Transport, Greens)"
  - "Paschal Donohoe (Finance Minister, FG, to December 2022)"
  - "Michael McGrath (Public Expenditure, FF)"

doctrine: >
  Fianna Fáil centrist big-tent government under the first rotating-Taoiseach
  agreement in Irish history, fusing FF housing-and-public-services instincts
  with Fine Gael pro-business FDI continuity and Green climate programme,
  operating under acute COVID-19 emergency conditions. Positioned on the
  centre — economically pro-MNC and EU-institutionalist, socially liberal, and
  climate-committed — but constrained throughout by housing-crisis political
  pressure and the pandemic fiscal emergency. Core programme: Employment Wage
  Subsidy Scheme (EWSS) and Pandemic Unemployment Payment (PUP) peaking at
  ~€28bn general-government deficit (2020); Housing for All plan (2 September
  2021) setting a target of 33,000 new homes/year with €4bn/year state-backed
  funding; Climate Action and Low Carbon Development (Amendment) Act 2021
  enshrining 51% emissions cut by 2030 and net-zero by 2050 with binding
  carbon budgets; carbon-tax trajectory to €100/t by 2030 (Finance Act 2020);
  Ireland's agreement to OECD Inclusive Framework Pillar 2 (7 October 2021),
  giving up the iconic 12.5% corporate rate in favour of 15% for in-scope
  firms; extension of free GP care, medicine-price reductions, and
  statutory-sick-pay legislation (Act 2022 — 3 days rising); carer's and
  parent's leave expansions; Russian invasion response (Feb-Mar 2022)
  including energy credits (€200 household electricity rebate Apr 2022,
  extended autumn 2022) and Ukrainian temporary-protection intake
  (~80,000 by end-2022). Popularity: entered with FF 38 + FG 35 + Green 12
  seats (85/160); Fianna Fáil polled 13-18% through tenure (historically low);
  Sinn Féin overtook as largest first-preference party in Ipsos/B&A series
  from mid-2021; local-authority by-elections and 2024 locals later confirmed
  erosion; Martin personally retained stronger approval (~45%) than his
  party. Abortion (2018) and marriage-equality (2015) referendum wins
  underpinned the social-liberal consensus. Coherence judgement: operationally
  competent on pandemic + Ukraine response and on climate-law scaffolding, but
  housing delivery undershot stated targets and the rotation architecture
  diluted programmatic authorship — codes as a crisis-management centrist
  coalition rather than a doctrine-driven government.

policies:
  - ie_ewss_covid_wage_subsidy_2020_2022
  - ie_housing_for_all_plan_2021
  - ie_climate_act_2021_carbon_budgets
  - ie_oecd_pillar2_agreement_2021
  - ie_statutory_sick_pay_act_2022

axes_summary:
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "COVID emergency spending peaked at 31% of GNI* in 2020; EWSS + PUP + health surge funded by record borrowing; structural expenditure grew above 5% ceiling target."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    rationale: "PUP (new transfer), EWSS (wage-subsidy), carer's/parent's leave, energy credits, working-family payment expansion."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Ireland joined OECD Inclusive Framework Pillar 2 on 7 October 2021 — accepting 15% minimum effective rate, ending the 12.5% uniform headline for in-scope MNCs (implementation 2024 under successor governments)."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: strong
    rationale: "Climate Act 2021 binding 51% by 2030 + net-zero 2050; sectoral carbon budgets; carbon-tax trajectory €26/t (2020) rising €7.50/yr to €100/t (2030)."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: weak
    rationale: "Statutory Sick Pay Act 2022 (first statutory sick pay in Ireland); parent's-leave and remote-working legislation; minimum wage €10.20 → €10.50."
  - axis: regulatory.immigration_openness
    direction: "+"
    magnitude: moderate
    rationale: "Ukrainian Temporary Protection Directive operationalised Mar 2022 with ~80,000 intake by year-end; regularisation scheme for undocumented migrants (Jan 2022)."
  - axis: regulatory.energy_supply_security
    direction: "+"
    magnitude: weak
    rationale: "Post-invasion diversification rhetoric; LNG regasification study; but no floating-storage terminal commissioned within term — mostly intention not delivery."

outcome_hypotheses:
  - covid_wage_subsidy_employment_retention_effect
  - housing_supply_response_to_demand_side_transfers
  - carbon_budget_binding_legislation_emissions_outcome

successor_movements:
  - ireland_varadkar_fg_2022_2024
  - ireland_harris_fg_2024_present

position_alignments:
  - {position_id: social_democratic, alignment: aligned, notes: "Transfer expansion, statutory sick pay, housing plan scaffolding all match."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Pandemic-response execution and Climate Act design broadly praised."}
  - {position_id: eco_socialist, alignment: aligned, notes: "Climate Act 2021 framework landmark."}
  - {position_id: austrian, alignment: opposed}

references:
  - "Programme for Government — Our Shared Future (27 June 2020)"
  - "Climate Action and Low Carbon Development (Amendment) Act 2021"
  - "Housing for All — A New Housing Plan for Ireland (2 September 2021)"
  - "OECD Inclusive Framework Statement on a Two-Pillar Solution (8 October 2021) — Ireland accession 7 October 2021"
  - "Sick Leave Act 2022 (No. 24 of 2022)"

notes: >
  General Election 8 February 2020 results: Sinn Féin 24.5% first-preference
  (37 seats), Fianna Fáil 22.2% (38 seats, largest bloc by seats), Fine Gael
  20.9% (35 seats), Greens 7.1% (12 seats). Government formation took 140
  days — the longest in the history of the state. Dáil seat share at
  formation: 85/160 = 53.1%. Fianna Fáil polled 13-18% throughout tenure;
  SF overtook as most-supported party mid-2021. Martin personal approval
  ~45% (higher than his party). Housing-delivery outturn: 20,433 completions
  2020, 20,560 in 2021, 29,851 in 2022 — the target of 33,000/year not hit
  under Martin's tenure. COVID deficit 2020: €19bn (~9% GDP). Apple
  corporate-tax case still open under this government (ultimately resolved
  2024 under Harris). Best read as a crisis-competent centrist coalition
  whose structural legacy is the Climate Act framework and the acceptance
  of OECD Pillar 2.

movement_id: vietnam_trong_era_2011_2024
status: candidate
name: "Nguyễn Phú Trọng era — 'Blazing Furnace' (Vietnam)"
countries: [VNM]
timeframe: {start: 2011, end: 2024}
coalition: "Communist Party of Vietnam (XI, XII, XIII Congresses) under Trọng as General Secretary"
leaders:
  - "Nguyễn Phú Trọng (General Secretary 2011-2024; concurrently State President 2018-2021)"
  - "Nguyễn Xuân Phúc (PM 2016-2021, State President 2021-2023)"
  - "Phạm Minh Chính (PM from Apr 2021)"
  - "Trần Quốc Vượng, Võ Văn Thưởng (Standing Secretariat)"
doctrine: >
  Continuation of the socialist-oriented market economy on the economic
  side — deeper trade integration through CPTPP (in force for Vietnam
  14 Jan 2019) and EVFTA (in force 1 Aug 2020), continued SOE
  equitisation, and a sustained FDI-and-export growth model — paired
  with a Party-discipline programme that Trọng framed as a "Blazing
  Furnace" (đốt lò) anti-corruption campaign from roughly 2016 onward.
  The campaign served three functions simultaneously: genuine
  prosecution of large graft cases (the Việt Á COVID test-kit scandal,
  the Vạn Thịnh Phát / SCB case, the FLC and Tân Hoàng Minh bond-market
  frauds), restoration of Party primacy over a premiership that had
  drifted toward personalistic SOE patronage under Dũng, and a purge
  instrument that drove unprecedented Politburo-level resignations
  including two sitting State Presidents (Phúc 2023, Thưởng 2024) and
  the National Assembly Chair (Huệ 2024). On the left-right reading
  best suited to single-party systems, the Trọng line is statist-
  reformist: tighter Party discipline and re-centralised decision
  rights, but with the underlying market-and-trade opening preserved
  and in several dimensions accelerated. The era ended with Trọng's
  death on 19 July 2024 and immediate handover to Tô Lâm.
policies:
  - vn_blazing_furnace_anti_corruption_2016_2024
  - vn_cptpp_entry_2019
  - vn_evfta_entry_2020
  - vn_land_law_revision_2024
  - vn_resolution_68_private_sector_2025
  - vn_state_economic_groups_soe_expansion_2006_2012
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "CPTPP (14 Jan 2019) and EVFTA (1 Aug 2020) locked in deep tariff-and-services liberalisation with high-standard disciplines."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-corruption prosecutions broke the prior impunity norm for Central Committee members; WGI control-of-corruption series ticks up 2017-2023."}
  - {axis: institutional.judicial_independence, direction: "mixed", rationale: "Prosecutions followed Party-led referral rather than independent judicial initiative; discipline arm strengthened, independent judicial review did not."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Continued SOE equitisation, CPTPP-driven state-enterprise disciplines, and 2024 Land Law broadening land-use rights."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Retention and targeting of state support in priority industries; anti-graft discipline narrowed leakage but did not end directed support."}
outcome_hypotheses:
  - developmentalist_state_growth_performance
  - anti_corruption_drives_and_growth
predecessor_movements: [vietnam_dung_pm_2006_2016, vietnam_doi_moi_1986]
successor_movements: [vietnam_to_lam_2024_present]
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: market_socialist, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Trade-opening and SOE-discipline components orthodox-consistent; retained directed credit and sectoral subsidy is not."}
references:
  - "Vuving (2017, 2023), 'Vietnam at a New Crossroads', Asian Survey series"
  - "Le Hong Hiep (2023), 'Vietnam's Anti-Corruption Campaign: Origins, Dynamics and Implications', ISEAS"
  - "Abuza (2024), 'Vietnam's anti-corruption campaign claims another senior Communist Party official'"
  - "World Bank, Taking Stock (Vietnam) 2016-2024"
  - "IMF Article IV Vietnam 2018, 2021, 2023"
notes: >
  Single-party — no vote share. Popularity / legitimacy signals: XII
  Congress (Jan 2016) elected Trọng to an exceptional second term and
  XIII Congress (Feb 2021) to an unprecedented third; Blazing Furnace
  produced roughly 200k Party members disciplined and dozens of
  Central-Committee-rank prosecutions; FDI inflows held above
  US$15-20bn/yr through the era; NA ratification votes on CPTPP and
  EVFTA ran above 95% yes.

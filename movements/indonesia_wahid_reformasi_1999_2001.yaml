# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: indonesia_wahid_reformasi_1999_2001
status: candidate
name: "Abdurrahman Wahid (Gus Dur) — PKB-led reformasi presidency (1999-2001)"
countries: [IDN]
timeframe:
  start: 1999
  end: 2001
  enacted_date: "1999-10-20"
coalition: "Poros Tengah (Central Axis) — PKB, PAN, PPP, Golkar with external PDI-P and PBB backing; coalition collapsed through 2000-2001"
leaders:
  - "Abdurrahman Wahid 'Gus Dur' (President 20 Oct 1999 - 23 Jul 2001, impeached)"
  - "Megawati Sukarnoputri (VP)"
  - "Kwik Kian Gie → Rizal Ramli (Coordinating Minister for Economy)"
  - "Bambang Sudibyo → Prijadi Praptosuhardjo (Finance)"
  - "Syahril Sabirin (BI Governor)"
doctrine: >
  PKB-led reformasi presidency — Gus Dur, chair of Nahdlatul Ulama
  (40m-member traditionalist Muslim association), came to the
  presidency on 20 October 1999 after MPR's selection (373 to 313
  against Megawati). Doctrine: pluralist-Islamic reformist, civilian
  supremacy over the military, pro-Chinese-minority rehabilitation,
  decentralisation implementation. Economic school: heterodox-
  developmentalist with Rizal Ramli favouring capital-controls-lite
  experimentation and IMF conditionality scepticism; tense with IMF.
  Centre-left on minority rights, nationalist-developmentalist on
  macro, pluralist on religion. Key policy content: (i) lifted
  Suharto-era ban on Chinese-language publications and public Chinese
  New Year celebration (Presidential Decree 6/2000); (ii) abolition
  of Department of Social Affairs and Department of Information
  (latter = ex-Ministry of Propaganda); (iii) civilian Defence
  Minister Juwono Sudarsono and subsequent reshuffles attempted TNI
  supremacy settlement; (iv) Aceh dialogue opened (2000 Humanitarian
  Pause), Papua dialogue via Papuan Congress May-June 2000;
  (v) "Buloggate" Rp 35bn and "Bruneigate" $2m scandals surrounding
  presidential aides — MPR memorandums I (February 2001) and II
  (April 2001); (vi) Rizal Ramli replaced Kwik as Coordinating
  Economy Minister August 2000 — renegotiated IMF LoI, capital-flow
  management proposals; (vii) emergency decree 23 July 2001
  dissolving MPR and suspending Golkar/PDI-P struck down; (viii)
  MPR impeachment 23 July 2001 on incompetence grounds (591 to 0
  vote with walkouts). Popularity: never directly elected; approval
  eroded through 2000-2001 on scandals, erratic dismissals (Laksamana
  Sukardi, Yusuf Kalla from cabinet January 2000), and coalition
  withdrawal. Coherence line: pluralist-civilian-supremacy reformasi
  plus IMF-sceptic heterodox macro — internally coherent doctrine
  that coalition politics could not sustain.
policies:
  - id_chinese_cultural_rehabilitation_2000
  - id_military_civilian_supremacy_reforms_2000
  - id_aceh_papua_dialogue_2000
  - id_wahid_impeachment_2001
  - id_imf_renegotiation_2000
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Chinese-minority rehabilitation; civilian-defence-minister settlement advanced TNI/civilian separation."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "Failed 23 July 2001 presidential decree dissolving MPR struck down by Supreme Court established constitutional check."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "IMF renegotiation pursued but no fundamental tariff reorientation; capital-control proposals not implemented."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "IBRA-inherited bank recapitalisation burden continued; new programme spend constrained."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Chinese-minority commercial normalisation; land-law reform tabled but not enacted."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Minority-rights and civilian-supremacy welcomed; Rizal Ramli heterodoxy opposed."}
  - {position_id: post_keynesian, alignment: aligned, notes: "Rizal Ramli capital-controls-lite stance aligned to post-Keynesian crisis management."}
  - {position_id: social_democratic, alignment: aligned, notes: "Pluralism and civilian-supremacy core to the doctrine."}
references:
  - "Presidential Decree 6/2000 on Chinese Cultural Rehabilitation"
  - "MPR Memorandum I (February 2001), Memorandum II (April 2001), Impeachment (23 July 2001)"
  - "IMF Indonesia Letter of Intent, August 2000 (Rizal Ramli renegotiation)"
  - "Mietzner (2009), 'Military Politics, Islam and the State in Indonesia'"
notes: >
  Gus Dur's presidency treated as distinct from Habibie and Megawati
  by coalition composition (Poros Tengah) and doctrine (pluralist-
  Islamic civilian supremacy plus Rizal Ramli heterodox macro), even
  though tenure was short.

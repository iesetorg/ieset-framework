# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: india_swadeshi_economic_nationalism_pre_1991
status: candidate
name: "India pre-1991 planned-economy / License Raj"
countries: [IND]
timeframe: {start: 1951, end: 1991}
coalition: "Indian National Congress-led governments with brief Janata interlude (1977-80)"
leaders: ["Jawaharlal Nehru (PM 1947-64)", "P. C. Mahalanobis (planner)", "Indira Gandhi (PM)", "Morarji Desai (Janata PM)"]
doctrine: >
  Self-reliance ('Swadeshi') through central planning, import
  substitution, and a dominant public sector. Five-Year Plans from
  1951 (Planning Commission) with the Mahalanobis heavy-industry
  model in the Second Plan (1956-61) allocating investment to
  capital-goods sectors. Industrial Policy Resolution 1948 and 1956
  reserved seventeen industries exclusively for the state and ring-
  fenced twelve more. Industries (Development and Regulation) Act
  1951 instituted industrial licensing. The Monopolies and
  Restrictive Trade Practices Act 1969 and FERA 1973 constrained
  large firms and foreign capital (producing Coca-Cola and IBM
  departures, 1977). Bank nationalisation 1969 and 1980 brought
  ~90% of banking assets into state ownership. High tariff walls
  (peak average tariffs ~80-125% in the 1980s), quantitative import
  restrictions, and an overvalued rupee insulated domestic producers.
  Growth averaged the ~3.5% 'Hindu rate' from 1950-1980 before
  modestly accelerating in the 1980s on debt-financed stimulus,
  culminating in the 1991 balance-of-payments crisis that triggered
  liberalisation.
policies: [india_industries_development_regulation_act_1951, india_industrial_policy_resolution_1956, india_bank_nationalisation_1969, india_mrtp_act_1969, india_fera_1973, india_quantitative_import_restrictions_pre_1991]
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "Industrial licensing, MRTP limits on expansion, reserved sectors for public sector and small-scale industry."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "High tariffs, extensive QRs, FERA restrictions on foreign equity."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Large public-sector footprint; SOE-led investment in capital goods and utilities."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Bank nationalisations, directed lending through priority-sector targets, administered interest rates."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Selective nationalisations and the 1978 46th Amendment removing property from fundamental rights."}
outcome_hypotheses: [developmentalist_state_growth_performance, structural_reform_absence_and_post_euro_stagnation]
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: marxian, alignment: partially_aligned, notes: "State control of 'commanding heights' consistent with socialist influence on Nehruvian planning, though within a mixed economy."}
  - {position_id: democratic_socialist, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Bhagwati & Desai (1970), 'India: Planning for Industrialisation'"
  - "Panagariya (2008), 'India: The Emerging Giant'"
  - "Ahluwalia (1991), 'Productivity and Growth in Indian Manufacturing'"

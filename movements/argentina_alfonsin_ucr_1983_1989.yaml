# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_alfonsin_ucr_1983_1989
status: candidate
name: "Alfonsín UCR — democratic transition, Austral heterodox plan"
countries: [ARG]
timeframe: {start: 1983, end: 1989, enacted_date: "1983-12-10"}
coalition: "Unión Cívica Radical (UCR) — first democratically elected post-Proceso"
leaders:
  - "Raúl Alfonsín (President 1983-1989)"
  - "Bernardo Grinspun (Economy 1983-1985)"
  - "Juan Vital Sourrouille (Economy 1985-1989)"
  - "José Luis Machinea (BCRA)"
  - "Dante Caputo (Foreign Affairs)"
doctrine: >
  Democratic-transition UCR programme combining human-rights accountability
  with heterodox stabilisation. Four doctrinal pillars: (1) human-rights
  accountability — Decree 158 (December 1983) ordered prosecution of the
  nine junta members; 1985 Trial of the Juntas (Juicio a las Juntas)
  convicted Videla, Massera, and others on the basis of the CONADEP
  Nunca Más report; subsequently constrained by Ley de Punto Final
  (December 1986) and Ley de Obediencia Debida (June 1987) under military
  carapintada pressure; (2) Austral Plan (14 June 1985) — heterodox
  stabilisation replacing the peso argentino with the austral at 1 to
  1,000, price-wage-exchange freeze, desagio conversion formula, and
  sharp monetary deceleration; inflation fell from ~1,100% annualised
  (April 1985) to <50% (early 1986) before re-accelerating; (3) Plan
  Primavera (August 1988) — second heterodox attempt collapsed in
  February 1989 BOP crisis ending in hyperinflation (4,923% 1989 CPI
  peak, cumulative ~200% in May-July 1989 alone); Alfonsín handed power
  early to Menem on 8 July 1989; (4) institutional reconstruction —
  1984 Sabato CONADEP commission; 1984 papal mediation of the
  Beagle Channel dispute with Chile; Multipartidaria consensus
  process. Stated school: democratic-social-liberal UCR tradition +
  structuralist-heterodox stabilisation (Sourrouille, Frenkel, Canitrot,
  Heymann). Left-right axis: centre-left economic content with
  progressive-liberal human-rights primacy. Popularity / legitimacy:
  October 1983 election Alfonsín won 51.75% vs Peronist Ítalo Luder
  40.16% — first UCR presidential victory over Peronism; September 1985
  midterms UCR ~43%; September 1987 midterms UCR lost most provinces;
  May 1989 Menem defeated UCR's Angeloz 47% to 32%. Coherence line:
  trade stabilisation orthodoxy and military détente for human-rights
  accountability and democratic institutional reconstruction — a bet
  that Austral heterodoxy could reconcile both but which failed at the
  macro end.
policies:
  - ar_austral_plan_1985
  - ar_trial_of_juntas_1985
  - ar_punto_final_obediencia_debida_1986_1987
  - ar_plan_primavera_1988
  - ar_hyperinflation_1989
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Trial of Juntas; constitutional order restored; CONADEP framework."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: strong, rationale: "Civilian Supreme Court restored; military jurisdiction narrowed."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "Initial Austral disinflation; reversed into hyperinflation 1989."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Public-sector deficits 6-8% GDP; state-enterprise losses unresolved."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Wage-price-FX freezes under Austral; capital controls."}
outcome_hypotheses: [heterodox_stabilisation_effectiveness, transition_from_authoritarian_rule]
predecessor_movements: [argentina_proceso_military_junta_1976_1983]
successor_movements: [menem_convertibility_argentina_1991_2001]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Sourrouille team drew on structuralist heterodoxy."}
  - {position_id: chicago_monetarism, alignment: opposed}
  - {position_id: institutionalism, alignment: aligned, notes: "Democratic-institutional reconstruction was the movement's central achievement."}
references:

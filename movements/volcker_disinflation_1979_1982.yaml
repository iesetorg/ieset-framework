doctrine: 'Break 1970s stagflation inflation expectations via aggressive monetary tightening.
  Fed funds rate spiked to ~20% in 1981; two back-to-back recessions (1980, 1981-82) with unemployment
  peaking ~10.8%. Demonstrated that central bank independence + willingness to accept short-term
  pain can restore price stability without a gold standard. Cited in mega-spec D.1.5 as evidence
  that fiat regimes with independent CB can govern inflation.

  '

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: vietnam_phuc_pm_2016_2021
status: candidate
name: "Nguyễn Xuân Phúc PM era — CPTPP and early COVID success"
countries: [VNM]
timeframe: {start: 2016, end: 2021, enacted_date: "2016-04-07"}
coalition: "Communist Party of Vietnam (Nguyễn Xuân Phúc as Prime Minister; Nguyễn Phú Trọng as General Secretary)"
leaders:
  - "Nguyễn Xuân Phúc (PM, 7 Apr 2016 - 5 Apr 2021; later President)"
  - "Nguyễn Phú Trọng (CPV General Secretary)"
  - "Đinh Tiến Dũng (Finance Minister)"
  - "Lê Minh Hưng (SBV Governor)"
doctrine: >
  Đổi Mới maturation under Phúc PM — CPV technocratic-developmentalist
  doctrine consolidating three tracks. (1) Trade-integration completion:
  CPTPP ratification 12 November 2018 (Vietnam seventh to ratify, effective
  14 January 2019); EU-Vietnam FTA signed June 2019 and ratified June 2020
  (effective 1 August 2020); RCEP signed November 2020. (2) Anti-corruption
  "blazing furnace" (đốt lò) campaign escalation under Trong with Phúc's
  government compliance — Đinh La Thăng (Politburo member, PetroVietnam
  chair) sentenced January 2018 to 13 years, rolling prosecutions in
  banking, oil, and real estate. (3) High-growth macro: real GDP 6-7%
  sustained 2016-2019, manufacturing FDI wave from US-China trade war
  diversion 2018-2020, current-account surpluses, FX reserves accumulation.
  (4) COVID-19 Wuhan-early pragmatic containment — border closure with
  China from February 2020, aggressive contact-tracing and centralised
  quarantine (at military-run facilities), kept case counts in three
  digits through most of 2020 with no lockdown; 2020 GDP grew +2.9%, one of
  only a handful of positive-growth economies globally. Coherence line:
  Đổi Mới trade-integration completion + anti-corruption institutional
  cleanup + technocratic pandemic management; doctrinally continuous with
  Trọng-era direction but executed by Phúc cabinet.
policies:
  - vn_cptpp_ratification_2018
  - vn_eu_vietnam_fta_ratification_2020
  - vn_blazing_furnace_anti_corruption_escalation_2016_2021
  - vn_covid_early_containment_border_closure_2020
  - vn_rcep_signature_2020
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "CPTPP + EVFTA + RCEP ratified in sequence; Vietnam among most-integrated emerging-market FTA networks."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Blazing-furnace prosecutions reached Politburo members; scope contested (one-party anti-corruption vs rule of law)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "CPTPP SOE disciplines + equitisation of some SOEs continued; pace slow."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Debt ceiling (65% GDP) observed; COVID fiscal response modest relative to peers."}
predecessor_movements:
  - vietnam_dung_pm_2006_2016
successor_movements:
  - vietnam_trong_era_2011_2024
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Trade-liberalisation completion and FDI-led growth model."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Technocratic COVID containment, cost-benefit-driven border closure."}
references:
  - "CPTPP ratification resolution, National Assembly 12 November 2018"
  - "EU-Vietnam FTA, ratified 8 June 2020 (National Assembly Resolution 102/2020/QH14)"
  - "Politburo / Central Commission for Inspection, blazing-furnace case records 2016-2021"
notes: >
  Phúc PM era is coded separately from the broader Trọng GenSec umbrella
  because the PM office is the executive driver of trade-agreement
  ratification and pandemic response; political-doctrinal supervision sits
  with Trọng's Party line.

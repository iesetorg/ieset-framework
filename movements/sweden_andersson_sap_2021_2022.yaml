# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: sweden_andersson_sap_2021_2022
status: candidate
name: "Andersson Social Democratic minority government (Sweden, 2021-2022)"
countries: [SWE]
timeframe: {start: 2021, end: 2022, enacted_date: "2021-11-30"}
coalition: "Socialdemokraterna (SAP) single-party minority (Sweden's first female-led government) with budget support from Miljöpartiet, Vänsterpartiet, and Centerpartiet under the residual January Agreement framework"
leaders:
  - "Magdalena Andersson (Prime Minister and former Finance Minister, Nov 2021 - Oct 2022)"
  - "Mikael Damberg (Finance Minister, 2021-2022)"
  - "Morgan Johansson (Justice / Migration Minister)"
  - "Annie Lööf (Centerpartiet leader — external support)"
doctrine: >
  Classic SAP social-democratic governance on a centre-left axis, but
  operating as a single-party minority under the residual constraints of
  the January Agreement (Januariavtalet) concessions to Centerpartiet and
  Liberalerna made in 2019 under Löfven. Economic content in the
  eleven-month government was dominated by three shocks: (i) Covid-19
  fiscal continuation — extended short-time work subsidies, business
  bridging loans, expanded sick-pay compensation; (ii) the energy and
  cost-of-living crisis following Russia's February 2022 invasion of
  Ukraine — electricity price support (elprisstöd) announced and prepared
  in summer 2022, fuel-tax reduction, compensation packages for low-income
  households; (iii) the strategic pivot on NATO — Sweden formally applied
  for NATO membership on 18 May 2022 alongside Finland, abandoning
  200-year non-alignment doctrine, ratifying a defence-policy break without
  a referendum. Additional economic content: raised defence budget
  trajectory, targeted tax cuts for pensioners, maintained fiscal-framework
  surplus target with temporary deviation acknowledged. Proponents frame
  the period as steady crisis management and doctrinal defence pivot;
  critics frame it as drift under January-Agreement concessions and an
  inability to reset the migration and integration debate that ultimately
  cost SAP the 2022 election.
policies:
  - se_nato_application_2022
  - se_electricity_price_support_2022
  - se_covid_fiscal_support_extension_2021_2022
  - se_pensioner_tax_relief_2022
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Extended Covid short-time work, elprisstöd preparation, pensioner garantitillägg."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence uplift announced post-Feb 2022; crisis packages summer 2022."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Post-invasion reset toward diversification and gas-storage posture; formal nuclear re-examination began though policy change came under successor."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Gang-crime legislative package (säkerhetszoner precursor, expanded search powers) initiated; largely landed under successor."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: weak, rationale: "Temporary Aliens Act made permanent (July 2021 prep, 2022 operation) — shorter residence permits, stricter family reunification relative to 2015 baseline."}
outcome_hypotheses:
  - nordic_outcome_persistence_decomposition_v3
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Prop. 2021/22:1 — Budgetproposition"
  - "Regeringsförklaringen 30 November 2021"
  - "Sveriges ansökan om medlemskap i Nato, 18 maj 2022"
  - "Prop. 2021/22:269 — elprisstöd"
  - "Utlänningslagen (2005:716), lydelse efter 20 juli 2021 (tillfälliga lagen permanentad)"
notes: >
  Popularity: Andersson took office with SAP polling 26-28%; the September
  2022 election delivered SAP 30.3% (107 seats) — a marginal gain for the
  party but a loss for the red-green-centre bloc overall (173 vs 176 for
  the right-bloc), forcing resignation. EU context: short tenure, no EU
  election cycle during period. Coherence judgement: short but
  consequential — the NATO application is the single largest doctrinal
  break of any Swedish government in this three-movement set; economic
  content was crisis-reactive rather than programmatic.

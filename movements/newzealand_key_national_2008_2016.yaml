# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: newzealand_key_national_2008_2016
status: candidate
name: "Key National government (New Zealand)"
countries: [NZL]
timeframe:
  start: 2008
  end: 2016
  enacted_date: "2008-11-19"
coalition: "National-led minority government with ACT, United Future, and Maori Party confidence-and-supply agreements across three terms (2008, 2011, 2014)"
leaders:
  - "John Key (Prime Minister 19 Nov 2008 - 12 Dec 2016)"
  - "Bill English (Deputy PM and Finance Minister)"
  - "Steven Joyce (Economic Development / Finance from 2015)"
  - "Alan Bollard (RBNZ Governor until Sep 2012)"
  - "Graeme Wheeler (RBNZ Governor from Sep 2012)"
doctrine: >
  National centre-right fiscal-discipline, tax-switch, and partial-asset-
  sales programme executed through GFC, Canterbury earthquakes, and global
  dairy-price cycle. Economic school: market-liberal centrist — 2010 tax
  switch cutting top marginal income-tax rate 38→33% and corporate rate
  30→28% while raising GST 12.5→15% effective 1 Oct 2010; Mixed Ownership
  Model partial privatisation (Mighty River Power 2013, Meridian 2013,
  Genesis 2014, Air New Zealand 2013) retaining 51% state stake;
  Canterbury earthquake response (Sep 2010, Feb 2011) via CERA legislation
  and ~NZ$40bn reconstruction commitment; National Standards in primary
  education; Partnership Schools (charter-schools) pilot 2013; Trans-
  Pacific Partnership signed 4 Feb 2016 (later suspended); welfare-reform
  investment approach under Paula Bennett. Dated policies: GST increase
  1 Oct 2010; Canterbury Earthquake Recovery Act 18 Apr 2011; Mixed
  Ownership Model Act 2012; TPP signed 4 Feb 2016; Christchurch Regeneration
  Act 2016. Left-right: centre-right economically orthodox, socially
  moderate — flag referendums 2015-2016, same-sex marriage 2013 (free
  vote). Popularity: 2008 election National 44.9%; 2011 47.3%; 2014
  47.0%; Key approval consistently above 45% throughout tenure, resigning
  voluntarily Dec 2016 handing over to English. Coherence: high — fiscal
  discipline (returned surplus FY 2014-15), GST/income-tax switch, and
  partial-privatisation pillars cohered; earthquake response effective.
policies:
  - nz_gst_increase_income_tax_cut_2010
  - nz_mixed_ownership_model_2012
  - nz_canterbury_earthquake_recovery_2011
  - nz_tpp_signing_2016
  - nz_welfare_investment_approach_2012
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Top marginal rate cut 38→33% and GST rise 12.5→15% shifted mix toward consumption tax."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Corporate rate cut 30→28% effective 2011; depreciation rules tightened."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Mixed-Ownership Model exposed four SOEs to NZX price discipline."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Post-GFC consolidation path to 2014-15 surplus; earthquake spending offset by baseline restraint."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "TPP signing (Feb 2016) and China FTA upgrade negotiations."}
outcome_hypotheses: [tax_switch_growth_effect, partial_privatisation_performance]
predecessor_movements: [newzealand_clark_labour_1999_2008]
successor_movements: [newzealand_english_national_2016_2017]
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Tax switch, partial-privatisation, trade-opening, fiscal discipline."}
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "RBNZ inflation-targeting anchor preserved; earthquake counter-cyclical response."}
references:
  - "New Zealand Treasury BEFU / HYEFU series 2009-2016"
  - "Canterbury Earthquake Recovery Act 2011"
  - "Mixed Ownership Model Act 2012"
  - "TPP Agreement (4 Feb 2016)"
notes: "Key resigned voluntarily Dec 2016; English continued National-led government under newzealand_english_national_2016_2017."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: thailand_samak_somchai_ppp_2008
status: candidate
name: "Samak-Somchai PPP — Thaksin-proxy cabinets and yellow-shirt siege"
countries: [THA]
timeframe: {start: 2008, end: 2008, enacted_date: "2008-01-29"}
coalition: "People's Power Party (PPP) — Thaksin-aligned successor to Thai Rak Thai"
leaders:
  - "Samak Sundaravej (PM, 29 Jan 2008 - 9 Sep 2008, removed by Constitutional Court over TV-cooking-show contract)"
  - "Somchai Wongsawat (PM, 18 Sep 2008 - 2 Dec 2008, Thaksin's brother-in-law)"
  - "Surapong Suebwonglee (Finance, Samak cabinet)"
  - "Tarisa Watanagase (BoT Governor)"
doctrine: >
  Populist-restoration doctrine — PPP formed from Thai Rak Thai successors
  won December 2007 election and installed Samak as Thaksin's chosen
  continuation vehicle. Programme on paper resumed the Thaksin
  dual-track: populist transfers and rural credit (30-baht universal
  healthcare entrenched, village fund rollover, SME credit) plus pro-
  business macro stance. Foreign-policy flashpoint was the Preah Vihear
  temple UNESCO World Heritage designation (July 2008) which triggered
  Cambodia-Thailand military standoff and domestic opposition from PAD
  (People's Alliance for Democracy, "yellow shirts"). PAD mounted mass
  street occupations including takeover of Government House (August 2008)
  and of Suvarnabhumi and Don Mueang airports (25 November - 3 December
  2008), paralysing Bangkok and the economy. Samak removed by
  Constitutional Court 9 September 2008 over paid appearances on a
  cooking TV show deemed a conflict of interest. Somchai served 2.5
  months; PPP dissolved by Constitutional Court 2 December 2008 for
  electoral fraud, removing Somchai from office. Legislative defections
  then swung the parliamentary majority to Democrat Abhisit December 2008.
  Coherence line: Thaksin-proxy populist continuation, never achieved
  stable governance due to yellow-shirt street pressure and court
  dissolution.
policies:
  - th_samak_preah_vihear_unesco_2008
  - th_ppp_village_fund_rollover_2008
  - th_ppp_dissolution_ruling_2008
  - th_samak_somchai_fiscal_stimulus_gfc_precursor_2008
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Village fund rollover; 30-baht healthcare preserved; limited scope given short tenures."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Two PMs removed by Constitutional Court rulings within 10 months; PPP dissolved; yellow-shirt occupation unconstrained."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Mid-2008 supplementary for rising fuel/food prices; pre-GFC."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "No substantive trade agenda; Preah Vihear dispute blocked Cambodia normalisation."}
predecessor_movements:
  - thailand_surayud_interim_2006_2008
successor_movements:
  - thailand_abhisit_democrat_2008_2011
position_alignments:
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Thaksinomics-continuation transfer programmes fit demand-support framework."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Populist transfers and SOE-policy continuity not aligned with market-process doctrine."}
references:
  - "Constitutional Court ruling on Samak cooking-show case, 9 September 2008"
  - "Constitutional Court dissolution of PPP, 2 December 2008"
  - "UNESCO World Heritage Committee, Preah Vihear inscription July 2008"
  - "BoT reports on airport-closure economic impact November-December 2008"
notes: >
  Two short cabinets combined into one movement because they share the same
  PPP coalition, same Thaksin-proxy doctrinal content, and same street-
  court-driven termination. Short tenure means axes movement modest relative
  to political noise level.

- Alexandre Tombini (BCB 2011-2016)
doctrine: 'Dilma''s doctrine evolved from "matriz econômica" interventionism to emergency orthodoxy
  to political paralysis. (a) Economic school: heterodox developmentalist "nova matriz econômica"
  (Mantega): administered prices (electricity tariff forcing Sep 2012, fuel price freeze), BNDES
  subsidised credit expansion, IPI auto-sector holidays, currency-intervention push, accounting
  manoeuvres ("pedaladas fiscais") to hide primary deficits via delayed transfers to Caixa/BB/BNDES,
  ending in Jan 2015 Joaquim Levy orthodox-adjustment U-turn (strong fiscal tightening, credit-cycle
  reversal) before Nelson Barbosa replacement Dec 2015. (b) Left-right: centre-left; structurally
  more interventionist than Lula. (c) Dated policies: Plano Brasil Maior Aug 2011, electricity
  tariff forcing MP 579 Sep 2012, IPI auto-holidays 2011-2014, Copa 2014, Lava Jato investigation
  launched 17 Mar 2014, re-election Oct 2014 51.6%, Levy fiscal contraction 2015, TCU rejection
  of Dilma 2014 accounts Oct 2015, Câmara impeachment vote 17 Apr 2016, Senate impeachment 31
  Aug 2016 (61-20). (d) Popularity: won first round 2010 then runoff 56.1%; approval 79% Mar 2013,
  collapsed to 8% in Mar 2016 after Petrolão + recession. (e) Coherence: low — "matriz" collided
  with 2014 commodity reversal + Petrobras scandal + hidden-deficit revelations; Levy pivot disavowed
  2010-2014 doctrine mid-stream; impeachment was formally on pedaladas but politically on recession
  + Lava Jato.

  '

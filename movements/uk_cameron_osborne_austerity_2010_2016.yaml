movement_id: uk_cameron_osborne_austerity_2010_2016
status: candidate
name: "UK Cameron–Osborne austerity"

countries: [GBR]

timeframe:
  start: 2010
  end: 2016

coalition: "Conservative–LibDem 2010–2015, Conservative 2015–2016"

leaders:
  - "David Cameron (PM)"
  - "George Osborne (Chancellor)"

doctrine: >
  Fiscal consolidation through spending-dominated deficit reduction;
  protected NHS and schools nominally, cut most other departments 20–40%
  real, tightened working-age welfare. Corporate tax rate cut from 28% to
  19% to stimulate business investment. Housing supply constraints left
  largely untouched despite rising affordability problem. The framework
  codes this as a market-oriented fiscal-discipline movement; controversial
  in its distributional effects.

policies:
  - uk_austerity_2010_2015
  - uk_corporate_tax_reduction_2010_2015
  - uk_working_age_welfare_reform_2010_2016

axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: strong
    rationale: "Non-protected departments cut ~30% real; deficit from ~10% to ~3% GDP."
  - axis: fiscal.tax_corporate
    direction: "-"
    magnitude: strong
    rationale: "Corporate rate 28% → 19%."
  - axis: fiscal.transfer_expansion
    direction: "-"
    magnitude: moderate
    rationale: "Working-age welfare frozen; Universal Credit roll-out with reduced generosity."


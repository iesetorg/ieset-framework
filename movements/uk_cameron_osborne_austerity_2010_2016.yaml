disclosure: >
  Austerity is one of the most-debated UK policies of the decade.
  Distributional costs were substantial; aggregate economic effects
  contested (productivity stagnation blamed on many causes). Framework
  codes the policy content (fiscal consolidation, corporate tax cuts,
  welfare tightening) without taking a position on whether the
  magnitude or composition was optimal.


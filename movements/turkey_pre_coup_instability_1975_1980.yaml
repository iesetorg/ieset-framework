movement_id: turkey_pre_coup_instability_1975_1980
status: candidate
name: "Turkey pre-coup instability — Demirel/Ecevit rotation, BoP crisis, January 24 package"
countries: [TUR]
timeframe: {start: 1975, end: 1980}
coalition: "Rotating fragile coalitions — Nationalist Front (Demirel AP+MSP+MHP) and CHP-led minority"
leaders:
  - "Süleyman Demirel (AP — PM 1975-1977, 1977-1978, 1979-1980)"
  - "Bülent Ecevit (CHP — PM January 1978 - October 1979)"
  - "Turgut Özal (Undersecretary of Prime Ministry 1979-1980 — architect of 24 January 1980 stabilisation package)"
doctrine: >
  This pre-coup period covers the collapse of Turkey's import-substitution
  industrialisation model amid rotating fragile coalitions, political
  violence (5,000+ killed 1975-80), and a balance-of-payments crisis
  culminating in the 24 January 1980 stabilisation package. Economic
  school: failing ISI model (fixed exchange rate, capital controls,
  state-enterprise-led heavy industry, price controls) under Demirel's
  Nationalist Front coalitions and Ecevit's CHP-left; the 24 January
  1980 package (designed by Özal under Demirel's minority government)
  represented the first clean break toward an export-oriented liberal
  model — 48.6% devaluation, price-control removal, export subsidies,
  interest-rate liberalisation. Left-right axis: the overall period
  straddles left (Ecevit CHP social-democratic) and right (Demirel AP
  centre-right, MHP ultranationalist) with no stable direction until
  the Özal package tilted sharply right-market. Popularity: 1977 election
  CHP 41% / AP 37% — neither could form a stable majority; political
  violence, hyperinflation (~100% in 1980), and coalition paralysis
  produced the September 12 1980 military coup. Coherence: essentially
  nil at the political level — the coherent economic content is
  concentrated in the January 1980 package, extended under the
  post-coup Evren junta and then Özal's ANAP (1983+).
policies:
  - tr_january_24_1980_stabilisation_package
  - tr_isi_model_terminal_crisis_1977_1980
  - tr_1977_1979_workers_remittance_fx_shortage
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "24 January 1980 package began export-led reorientation; effect mostly realised post-1980."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Price-control removal and SEE reform signalled under January 1980 package."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Inflation accelerated to ~100% by 1980 under deficit monetisation."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Coalition-era expansion of SEE transfers and populist subsidies."}

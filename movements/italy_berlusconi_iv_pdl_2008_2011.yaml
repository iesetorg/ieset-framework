movement_id: italy_berlusconi_iv_pdl_2008_2011
status: candidate
name: "Berlusconi IV PdL-Lega Nord GFC-era government 2008-2011"
countries: [ITA]
timeframe: {start: 2008, end: 2011, enacted_date: "2008-05-08"}
coalition: "Popolo della Libertà (PdL) + Lega Nord + MpA"
leaders:
  - "Silvio Berlusconi (PM)"
  - "Giulio Tremonti (Finance Minister)"
  - "Umberto Bossi (Lega Nord leader)"
doctrine: >
  Fourth Berlusconi government — populist-centre-right PdL-Lega majority
  hitting the GFC within months, running on low-tax supply-side rhetoric
  but forced into Tremonti crisis orthodoxy. Signature measures:
  'Tremonti-ter' accelerated depreciation for machinery investment (Jul 2009),
  ICI primary-residence property-tax abolition (2008), Robin-Hood energy-firm
  tax surtax (2008), anti-crisis decree-law D.L. 185/2008, Alitalia
  restructuring under CAI (Jan 2009), and — under mounting bond-market
  pressure — successive 'manovre' austerity packages (D.L. 78/2010 ~€25bn,
  D.L. 98/2011 €48bn, D.L. 138/2011 €54bn) after the Aug 2011 ECB
  Draghi-Trichet letter demanding reform. Also: Lodo Alfano immunity
  law (struck down 2009), prolonged Mediaset-conflict-of-interest and
  'Bunga Bunga' scandals, Ruby trial opened Feb 2011. Left-right: right of
  centre, populist-clientelist mode. Popularity: PdL+Lega 46.8% / 340 seats
  in 2008 general (decisive majority), Berlusconi personal approval collapsed
  from ~62% (mid-2008) to ~22% (Nov 2011); lost majority Nov 8 2011, resigned
  Nov 12 after BTP-Bund spread spiked over 550bps. Coherence: low — fiscal
  populism (ICI cut) vs crisis austerity (manovre) zigzag, legal-political
  scandals consumed reform bandwidth.
policies:
  - it_ici_abolition_2008
  - it_tremonti_ter_2009
  - it_manovra_estiva_2010
  - it_manovra_2011_ecb_letter
  - it_alitalia_cai_restructuring_2009

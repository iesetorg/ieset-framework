movement_id: thailand_chuan_leekpai_democrat_1992_1995
status: candidate
name: "Chuan Leekpai Democrat Party first term (Thailand)"
countries: [THA]
timeframe: {start: 1992, end: 1995}
coalition: "Democrat Party-led five-party coalition"
leaders:
  - "Chuan Leekpai (PM Sep 1992-May 1995)"
  - "Tarrin Nimmanahaeminda (Finance Minister)"
  - "Surin Pitsuwan (Deputy Foreign Minister)"
doctrine: >
  Chuan Leekpai Democrat Party reform-continuity doctrine — democratic
  civilian government extending Anand technocratic reform track.
  Economic school: centre-right liberal-democratic reformist;
  completion of BIBF Bangkok offshore-banking opening, which later
  became conduit for short-term capital flows driving 1997 crisis.
  Dated policies: Bangkok International Banking Facility (BIBF) launch
  Mar 1993 — 46 banks licensed for offshore lending, total Out-In
  loans grew to $50bn+ by 1996; Financial Institutions Development
  Fund expansion; tambon (subdistrict) 5 million baht budget programme
  1994 — rural-development decentralisation (later expanded by Thaksin);
  Public Debt Management Office; land reform Sor Por Kor 4-01 scandal
  May 1995 precipitated coalition collapse; Constitutional Drafting
  Assembly debate initiating 1997 'People's Constitution' process;
  continuing privatisation and SEC development. Left-right: centre-
  right liberal-democratic; economic policy market-liberal. Popularity:
  Sep 1992 election Democrat 21.0% / 79 seats (largest in multi-party
  field); approval high early, eroded by Sor Por Kor and coalition
  frictions; lost confidence motion May 1995 over land-reform scandal,
  triggered election. Coherence: high — continuation of Anand reform
  track, constitutional-reform process initiated, financial-liberalisation
  deepened — though BIBF architecture critical to 1997 crisis cause.
policies:
  - th_bibf_launch_1993
  - th_tambon_fund_1994
  - th_constitutional_drafting_initiation_1994_1995

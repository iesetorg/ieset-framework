# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: ecuador_correa_21st_century_socialism_2007_2017
status: candidate
name: "Correa Citizens' Revolution (Ecuador)"
countries: [ECU]
timeframe: {start: 2007, end: 2017}
coalition: "Alianza PAIS"
leaders:
  - "Rafael Correa (President 2007-2017)"
  - "Ricardo Patiño (multiple portfolios)"
  - "Fander Falconí (Planning)"
doctrine: >
  Self-described "socialism of the 21st century" executed under the
  binding constraint of an already-dollarised monetary regime that the
  government chose not to dismantle. Core content: the 2008 Constitution
  re-founded the state with expanded social and environmental rights;
  the November 2008 technical default on Global 2012 and 2030 bonds
  (declared "ilegítima" by the debt audit commission) reduced external
  debt service and was followed by successful re-engagement with
  Chinese lenders from 2009; renegotiation of oil contracts shifted
  rents to the state; tax reform raised corporate, capital-gains, and
  financial-transaction taxes; public investment in roads, hydro
  (Coca Codo Sinclair), and health and education rose sharply; cash
  transfers (Bono de Desarrollo Humano) were expanded; media regulation
  and judicial reorganisation consolidated executive authority. Because
  monetary policy was unavailable, the regime relied on counter-cyclical
  fiscal policy, Chinese credit, and later pre-sale oil financing,
  producing fiscal deficits from 2013 onwards as oil prices fell. Ended
  constitutionally in 2017; successor Moreno pivoted to an IMF programme.
  Outcomes: poverty headcount fell sharply, public infrastructure
  expanded, GDP growth averaged ~3% per year, but fiscal vulnerability
  accumulated and institutional-quality indicators weakened.
policies:
  - ecuador_new_constitution_2008
  - ecuador_debt_audit_default_2008
  - ecuador_tax_reforms_2007_2014
  - ecuador_oil_contract_renegotiation_2010
  - ecuador_china_financing_2009_2017
  - ecuador_public_investment_push_2008_2016
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public-spending share of GDP rose from roughly 25% to ~40%; public investment among the highest in the region."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "New levies including financial-transaction tax, capital-outflow tax, and anti-avoidance measures."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Bono de Desarrollo Humano expansion; housing, disability, and education transfers."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Oil contract re-negotiation shifted to service contracts; media and telecom regulation tightened."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Safeguard tariffs 2009 and 2015; exit from BIT (bilateral investment treaty) framework; ICSID withdrawal."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "2011 referendum restructured judicial council; executive influence over appointments increased."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Dollarisation binds monetary policy; central-bank reserve management was politicised but no independent monetary policy existed to lose."}
outcome_hypotheses:
  - commodity_boom_redistribution_sustainability
  - fiscal_expansion_under_fixed_exchange_regime
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: democratic_socialist, alignment: partially_aligned}
references:
  - "Constitución de la República del Ecuador (2008)"
  - "CAIC (2008), Informe Final de la Comisión para la Auditoría Integral del Crédito Público"
  - "Weisbrot, Johnston, Merling (2017), Ecuador's New Deal, CEPR"
  - "IMF Article IV Ecuador 2015; 2019 EFF programme request documents"
notes: >
  Analytically important case because the dollarised monetary regime
  pre-commits away one policy instrument, so the movement's content
  is concentrated in fiscal, regulatory, and institutional axes. Good
  stress test for whether the framework can separate fiscal expansion
  from monetary expansion effects.

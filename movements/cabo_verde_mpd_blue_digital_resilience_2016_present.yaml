movement_id: cabo_verde_mpd_blue_digital_resilience_2016_present
status: candidate
name: Cabo Verde MpD blue digital resilience programme 2016-present
countries: [CPV]
timeframe:
  start: 2016
  end: ongoing
coalition: Movement for Democracy-led governments
leaders:
  - "Ulisses Correia e Silva (Prime Minister, 2016-)"
  - "Olavo Correia (Deputy Prime Minister and Minister of Finance)"
doctrine: >
  Cabo Verde's MpD-led governing programme links tourism recovery and fiscal
  consolidation with the Ambition 2030 strategy, digital public services, blue
  economy development, and climate resilience. The movement is coded as a
  small-island reform regime that combines investment promotion and public debt
  repair with IMF-supported climate and macroeconomic anchors.
policies:
  - cpv_peds_ii_ambition_2030_2022
  - cpv_imf_ecf_fiscal_consolidation_2022
  - cpv_imf_rsf_climate_reforms_2023
axes_summary:
  - {axis: fiscal.spending_level, direction: mixed, magnitude: moderate, rationale: "PEDS II expands priority investment while IMF ECF targets debt reduction and fiscal consolidation."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "The development plan targets tourism, digital, blue-economy, and energy-transition sectors."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "RSF and climate-resilience measures strengthen adaptation and energy-transition policy."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "The strategy emphasizes private investment, tourism competitiveness, and digital-market development."}
references:
  - "Government of Cabo Verde, Plano Estrategico de Desenvolvimento Sustentavel II 2022-2026."
  - "IMF, Cabo Verde 2025 Article IV Consultation and reviews under the ECF and RSF, 2026."

doctrine: 'Pragmatic Liberal centrism that converted a deficit-reduction Red Book mandate into
  orthodox fiscal consolidation. Four doctrinal pillars: (a) fiscal slaying — the February 1995
  Martin Budget cut programme spending by ~19% over three years (1995-98), reduced the federal
  public service by ~45,000 positions, and converted Established Programs Financing and Canada
  Assistance Plan into the Canada Health and Social Transfer (CHST) block grant with ~$7B/year
  reduction; federal deficit went 5.3% GDP (FY1995) → surplus (FY1998), earliest G7 balanced budget.
  (b) Program review — every federal department required to justify programmes against six tests
  (public interest, role-of-government, federalism, partnership, efficiency, affordability). (c)
  NAFTA ratification and trade continuity — Chrétien ratified NAFTA despite Red Book renegotiation
  language; side agreements on labour and environment. (d) Quebec referendum 30 October 1995 —
  No 50.58% vs Yes 49.42%; Clarity Act response came in second term. Stated school: centrist-liberal
  Keynesian rebalanced toward fiscal orthodoxy under bond-market pressure (January 1995 Wall Street
  Journal "northern peso" editorial). Left-right: centre; economic content right-of-centre via
  deficit elimination, social content centre-left on rhetoric. Popularity: October 1993 Liberals
  41.3% / 177 seats — largest PC collapse in Canadian history; June 1997 returned 38.5% / 155
  seats (reduced majority). Coherence: trade Red Book social promises and PC-era civil-service
  capacity for credible fiscal anchor, CHST retrenchment, and bond-market relief that unlocked
  the 1997-2007 prosperity cycle.

  '

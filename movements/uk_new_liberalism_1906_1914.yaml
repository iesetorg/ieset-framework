movement_id: uk_new_liberalism_1906_1914
status: candidate
name: "New Liberalism and prewar welfare reforms (UK)"
countries: [GBR]
timeframe: {start: 1906, end: 1914}
coalition: "Liberal governments under Campbell-Bannerman and Asquith, with Lloyd George at the Treasury and Churchill in the reform wing"
leaders:
  - "Henry Campbell-Bannerman (Prime Minister 1905-1908)"
  - "H. H. Asquith (Prime Minister 1908-1916)"
  - "David Lloyd George (Chancellor of the Exchequer 1908-1915)"
  - "Winston Churchill (Board of Trade / Home Office reform wing)"
doctrine: >
  New Liberalism reworked British liberalism for mass industrial society. Rather than
  treating poverty and insecurity as purely private failures, it argued that old age,
  unemployment, sickness, and underemployment could justify limited but durable national
  social insurance and tax-financed support without abandoning market society. Between
  1906 and 1914 Liberal governments built the prewar skeleton of the British welfare
  state: non-contributory old-age pensions, labour exchanges, a more progressive fiscal
  base through the People's Budget, trade-board wage floors in low-pay sectors, and the
  National Insurance Act. The movement's own case was that freedom required social minimums,
  labour-market organisation, and a revenue system capable of financing them.
policies:
  - uk_old_age_pensions_act_1908
  - uk_peoples_budget_1909
  - uk_labour_exchanges_act_1909
  - uk_trade_boards_act_1909
  - uk_national_insurance_act_1911
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Old-age pensions and then sickness/unemployment insurance created a durable transfer-and-social-insurance footprint."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: strong, rationale: "The People's Budget expanded direct taxation of high incomes, land values, and inheritances to fund social reform."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "The package deliberately grew national social expenditure and administrative capacity before the First World War."}
  - {axis: regulatory.labour_market_flexibility, direction: mixed, magnitude: weak, rationale: "Labour exchanges made matching more fluid, while trade boards and contributory insurance modestly thickened labour-market rules and payroll administration."}
position_alignments:
- position_id: social_democratic
  alignment: aligned
  notes: Old-age pensions, national insurance, labor exchanges, and redistributive taxation formed a clear prewar welfare-state reform package.
- position_id: classical_liberal
  alignment: partially_aligned
  notes: The movement retained liberal parliamentarism and market society while revising laissez-faire toward social rights and public insurance.
- position_id: institutionalism
  alignment: partially_aligned
  notes: The reforms built administrative capacity for insurance, labor placement, and fiscal collection, though the program was ideological liberal reform rather than institutionalism as a school.

references:
  - "Old Age Pensions Act 1908"
  - "People's Budget 1909 / Finance (1909-10) Act 1910"
  - "Labour Exchanges Act 1909"
  - "Trade Boards Act 1909"
  - "National Insurance Act 1911"
  - "Harris (1972), Unemployment and Politics"
  - "Pugh (2011), State and Society"
notes: "Historical backfill anchor for pre-1945 British welfare-state formation, complementing the later Attlee-era expansion with its Edwardian precursor." 

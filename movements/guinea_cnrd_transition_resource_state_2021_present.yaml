# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: guinea_cnrd_transition_resource_state_2021_present
status: candidate
name: "Guinea CNRD transition and resource-infrastructure state 2021-present"
countries: [GIN]
timeframe: {start: 2021, end: ongoing, enacted_date: "2021-09-05"}
coalition: "National Committee of Reconciliation and Development (CNRD)"
leaders:
  - "Mamadi Doumbouya (transition president, 2021-present)"
  - "Bah Oury (Prime Minister, 2024-present)"
  - "Moussa Cisse (Minister of Economy and Finance, transition period)"
doctrine: >
  Guinea's CNRD transition framed military rule as a refoundation of state
  authority, constitutional order, and control over strategic mineral rents.
  The programme combines a transition charter and constitutional timetable with
  bauxite, iron-ore, local-content, and IMF-backed public-finance measures aimed
  at capturing more domestic value from mining while stabilizing the budget.
policies:
  - gin_cnrd_transition_charter_2021
  - gin_local_content_law_2022
  - gin_simandou_framework_agreement_2022
  - gin_imf_staff_monitored_program_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "The transition charter formalized interim institutions while replacing elected constitutional authority after the coup."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Simandou infrastructure and local-content rules direct state coordination and reserved opportunities toward mining-linked sectors."}
  - {axis: regulatory.trade_openness, direction: mixed, magnitude: weak, rationale: "Simandou seeks export corridor integration while local-content rules reserve parts of procurement and employment for domestic actors."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "The IMF staff-monitored programme emphasizes revenue mobilization, spending control, and arrears management."}
references:
  - "Conseil National de la Transition de Guinee, Charte de la Transition and adopted-law list."
  - "Government of Guinea and Simandou project partners, 2022 framework agreement and Compagnie du TransGuineen materials."
  - "IMF, Guinea 2024 Article IV Consultation and Staff-Monitored Program materials."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: western_sahara_contested_status_self_determination_process_1991_present
status: candidate
name: "Western Sahara contested-status self-determination and external legal-treatment process"
countries: [ESH]
timeframe: {start: 1991, end: ongoing}
coalition: "UN-supervised settlement process involving Morocco, Frente Polisario, neighbouring states, MINURSO, and external legal/economic actors affecting Western Sahara"
leaders:
  - "United Nations Security Council and Secretary-General / Personal Envoy process"
  - "United Nations Mission for the Referendum in Western Sahara (MINURSO)"
doctrine: >
  This special-status lane captures policy surfaces affecting Western Sahara
  without treating the territory as a normal sovereign-state policy case. It
  aggregates the UN-supervised ceasefire and self-determination process,
  continued UN Non-Self-Governing Territory treatment, Moroccan autonomy
  proposal and administration-facing policy claims, and external legal treatment
  of trade, fisheries, agricultural origin, and resource-consent questions. The
  lane is descriptive of policy instruments and legal treatment affecting the
  territory, not a recognition claim about Moroccan sovereignty, Sahrawi
  sovereignty, or a resolved final status.
policies:
  - esh_minurso_ceasefire_referendum_mandate_1991
  - esh_un_nsgt_self_determination_process_1991_present
  - esh_moroccan_autonomy_initiative_2007
  - esh_eu_morocco_resource_consent_rulings_2016_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "UN mandate architecture, Non-Self-Governing Territory treatment, and EU court consent/origin rulings impose procedural legal treatment on a contested-status territory."}
  - {axis: regulatory.trade_openness, direction: mixed, magnitude: weak, rationale: "EU-Morocco preferential-access efforts and CJEU annulment/origin rulings alternately opened, constrained, or relabelled trade involving Western Sahara products and waters."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Fisheries and resource-related external treatment increasingly depends on consent, benefit, origin, and territorial-status conditions rather than ordinary Morocco-only licensing."}
references:
  - "United Nations Peacekeeping, MINURSO fact sheet, https://peacekeeping.un.org/en/mission/minurso"
  - "United Nations Security Council, Resolution 690 (1991), S/RES/690(1991)"
  - "United Nations, Decolonization: Western Sahara profile, https://www.un.org/dppa/decolonization/en/nsgt/western-sahara"
  - "United Nations Security Council document S/2007/206, Moroccan initiative for negotiating an autonomy statute for the Sahara region"
  - "Court of Justice of the European Union, Press Releases 169/24 and 170/24, 4 October 2024"
notes: "Non-sovereign special-status coding. Use of countries: [ESH] is for coverage detection and does not take a position on sovereignty or final status."

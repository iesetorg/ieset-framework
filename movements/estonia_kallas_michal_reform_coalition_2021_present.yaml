# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: estonia_kallas_michal_reform_coalition_2021_present
status: candidate
name: "Estonia Reform-led security and rights agenda 2021-present"
countries: [EST]
timeframe: {start: 2021, end: ongoing}
coalition: "Reform Party-led coalitions under Kaja Kallas and Kristen Michal"
leaders:
  - "Kaja Kallas (Prime Minister, 2021-2024)"
  - "Kristen Michal (Prime Minister, 2024-present)"
doctrine: >
  Estonia's recent Reform-led governments paired a hard security posture after
  Russia's invasion of Ukraine with fiscal repair, environmental tax design,
  and liberal family-law reform. The agenda funds defence and security needs
  through broad tax increases, adds an emissions-weighted motor-vehicle tax,
  and extends equal civil-marriage rights while preserving Estonia's open
  digital-state and EU-aligned economic model.
policies:
  - ee_marriage_equality_family_law_2024
  - ee_motor_vehicle_tax_2025
  - ee_security_tax_package_2025
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "Security-tax package increases the business-tax burden to fund defence and security needs."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Security financing supports a higher defence and internal-security spending path."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Motor vehicle taxation adds emissions- and vehicle-characteristics-based charges."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Marriage-equality implementation strengthened equal treatment in family law."}
references:
  - "Estonian Tax and Customs Board, Motor vehicle tax guidance: https://www.emta.ee/en/private-client/taxes-and-payment/other-taxes/motor-vehicle-tax"
  - "Estonian Ministry of Finance materials on security-tax measures."

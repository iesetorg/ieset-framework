movement_id: nigeria_shagari_second_republic_1979_1983
status: candidate
name: "Shagari Second Republic — oil-bust fiscal crisis, austerity, coup end"
countries: [NGA]
timeframe: {start: 1979, end: 1983}
coalition: "National Party of Nigeria (NPN) — northern-led broad coalition"
leaders:
  - "Shehu Shagari (President 1979-1983)"
  - "Alex Ekwueme (Vice President)"
  - "Chief Sunday Essang (Finance Minister 1982-1983)"
doctrine: >
  Shagari's NPN government ruled Nigeria's Second Republic under the 1979
  US-style presidential constitution. Economic school: statist-developmentalist
  inheriting the Fourth National Development Plan (1981-85) calibrated
  on assumed $30+ oil — oil-price collapse 1981-82 produced current-account
  crisis, arrears to foreign contractors, and the April 1982 Economic
  Stabilization Act (import licensing, tariffs, expatriate labour restrictions)
  — a defensive rather than adjustment programme. Left-right axis:
  centre-right democratic politically; statist-nationalist economically
  with ethnic-regional patronage networks producing endemic corruption
  (Rice Deal scandals). Popularity / legitimacy: 1979 election Shagari
  won with plurality (controversial '2/3 of 19 states' ruling);
  August 1983 election re-elected him amid mass irregularities — the
  election fraud plus fiscal collapse triggered Buhari's December 31
  1983 coup. Coherence: low — the 1979 constitution, four-year plan,
  and oil-price assumption all collapsed simultaneously; defensive
  1982 Act failed to restore external balance.
policies:
  - ng_economic_stabilization_act_1982
  - ng_fourth_national_development_plan_1981_1985
  - ng_expulsion_of_aliens_1983
  - ng_1983_election_crisis
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "1982 Economic Stabilization Act imposed import licensing and tariffs in defensive posture."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Forced spending cuts as oil revenue collapsed; arrears and debt accumulation."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Deficit monetisation sustained inflation 20%+ through 1982-83."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "1983 elections widely considered fraudulent; coup 31 December 1983."}

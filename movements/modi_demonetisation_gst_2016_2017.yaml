# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: modi_demonetisation_gst_2016_2017
status: candidate
name: "Modi demonetisation + GST rollout"
countries: [IND]
timeframe: {start: 2016, end: 2017, enacted_date: "2016-11-08"}
coalition: "BJP-led NDA (Modi government)"
leaders: ["Narendra Modi (PM)", "Arun Jaitley (Finance)", "Raghuram Rajan (RBI outgoing)"]
doctrine: >
  Demonetisation 8-Nov-2016 — overnight voiding of ₹500 + ₹1000 notes
  (86% of currency in circulation) with stated aims of fighting black
  money, corruption, and counterfeiting. Followed by GST rollout
  1-Jul-2017, unifying ~17 state and central indirect taxes into a
  single national VAT regime. Demonetisation produced short-run GDP
  shock (~1-2pp growth loss 2016Q4-2017Q1), modest long-run digitalisation
  benefit. GST is a structural reform with genuine long-run benefits
  contested by execution issues and compliance cost in the informal sector.
policies: [india_demonetisation_2016, india_gst_2017]
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "GST unifies market across states; removes cascading taxes."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Demonetisation arbitrary voiding of legal tender hit hardest at informal-sector wage earners."}
  - {axis: fiscal.tax_corporate, direction: "0", rationale: "GST is indirect-tax reform; corporate rates changed separately in 2019."}
outcome_hypotheses: [structural_reform_absence_and_post_euro_stagnation]
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "RBI Annual Report 2016-17 (99% of demonetised notes returned)"
  - "Chodorow-Reich et al. (2020) 'Cash and the Economy: Evidence from India's Demonetisation' QJE"

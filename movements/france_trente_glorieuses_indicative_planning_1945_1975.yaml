# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: france_trente_glorieuses_indicative_planning_1945_1975
status: candidate
name: "France Trente Glorieuses: indicative planning and dirigisme"
countries: [FRA]
timeframe: {start: 1945, end: 1975}
coalition: "Fourth Republic coalitions to 1958; Fifth Republic Gaullist-led governments thereafter; tripartite technocracy"
leaders:
  - "Jean Monnet (Commissaire général du Plan from 1946)"
  - "Charles de Gaulle (President 1959-1969)"
  - "Pierre Mendès France (PM 1954-1955)"
  - "Georges Pompidou (PM 1962-1968, President 1969-1974)"
  - "Valéry Giscard d'Estaing (Finance Minister; President from 1974)"
  - "Antoine Pinay (stabilisation 1952, Finance 1958-1960)"
doctrine: >
  State-coordinated catch-up growth combining indicative (non-binding)
  planning, selective nationalisation, and progressive external
  integration. Commissariat général du Plan (CGP, January 1946) produced
  successive five-year plans (First Plan 1947-1953 on reconstruction
  priorities — coal, electricity, steel, cement, transport, agricultural
  machinery; subsequent plans through the VIth 1971-1975) through
  tripartite Commissions de Modernisation aligning expectations between
  state, banks, nationalised firms, and private industry. 1945-1946
  nationalisations: Banque de France, four main deposit banks (Crédit
  Lyonnais, Société Générale, BNP-ancestor CNEP and BNCI), Renault,
  coal (Charbonnages de France), electricity (EDF) and gas (GDF), major
  insurers. Monnet Plan financed via ERP Marshall aid 1948-1952 and
  Fonds de Modernisation. Pinay-Rueff stabilisation 1958 devalued franc,
  created the nouveau franc 1960, and committed France to EEC Rome Treaty
  obligations (signed 1957, implemented from 1958). Concorde, Airbus,
  CEA nuclear, Plan Calcul, minitel-era telecoms — large technology
  projects under state direction. Outcome: ~5% annual GDP growth
  1950-1973, full employment, rising real wages (SMIG 1950 then SMIC
  1970), closing of productivity gap with US. End date 1975 reflects
  first post-oil-shock downturn breaking the growth regime.
policies:
  - france_nationalisations_1945_1946
  - france_monnet_plan_1947
  - france_pinay_rueff_stabilisation_1958
  - france_eec_accession_rome_treaty_1957
  - france_indicative_planning_cgp
  - france_smic_1970
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "1945-46 nationalisation of banking, energy, autos (Renault); CGP-coordinated sectoral investment."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Fonds de Modernisation and sectoral capital allocation through state banks and plan contracts."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "EEC Rome Treaty 1957 customs union implementation 1958-1968; Pinay-Rueff 1958 opened trade jointly with devaluation."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Public investment as share of GDP sustained high; social-security expansion (ordonnances 1945)."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Banque de France nationalised 1945; operated under Treasury direction until 1993 statute."}
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Archetype of Western European developmental state with indicative planning rather than directive planning."}
  - {position_id: institutionalism, alignment: partially_aligned, notes: "CGP as coordination device bridging state and private sector."}
  - {position_id: austrian, alignment: opposed}
references:
  - "Monnet, Mémoires (1976)"
  - "Shonfield (1965), Modern Capitalism"
  - "Rueff Report (1958)"
  - "Hall (1986), Governing the Economy"
  - "Ordonnance du 4 octobre 1945 (Sécurité sociale)"
notes: "Pre-1996 sample extension. Distinct from, and predecessor to, mitterrand_nationalisations_1981_1983 (a renewed, left-driven nationalisation wave in a very different macro context)."

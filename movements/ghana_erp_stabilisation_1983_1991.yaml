movement_id: ghana_erp_stabilisation_1983_1991
status: candidate
name: "Ghana Economic Recovery Programme (Rawlings-ERP)"
countries: [GHA]
timeframe: {start: 1983, end: 1991}
coalition: "PNDC military-civilian regime under Jerry Rawlings"
leaders: ["Jerry Rawlings (PNDC Chairman)", "Kwesi Botchwey (Finance Secretary 1982-1995)"]
doctrine: >
  Following the 1983 fiscal and balance-of-payments collapse, the Provisional
  National Defence Council under Rawlings pivoted from early-1980s populism to
  an IMF/World Bank-supported structural adjustment programme. The Economic
  Recovery Programme (ERP, 1983) and Structural Adjustment Programme (SAP,
  1987) devalued the cedi from an overvalued fixed peg, dismantled price
  controls on cocoa and staples, liberalised imports, raised producer prices
  to farmers, rationalised the civil service (redundancy programme from 1987),
  privatised state-owned enterprises, and restored fiscal discipline. Ghana
  became the canonical African "reform success" case cited by the World Bank
  in the 1989 and 1994 Africa reports — growth recovered to ~5% p.a., inflation
  fell from triple digits to moderate, and cocoa production rebounded. Critics
  note social costs (PAMSCAD mitigation programme 1988) and that structural
  transformation remained limited. The episode is the clearest sub-Saharan
  instance of orthodox stabilisation under an authoritarian-left government.
policies: [ghana_cedi_devaluation_1983, ghana_cocobod_reform_1984, ghana_soe_divestiture_1987, ghana_civil_service_rationalisation_1987, ghana_trade_liberalisation_1986_1991]
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Tariff rationalisation, import licensing abolition, export retention scheme."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Price-control dismantling and SOE divestiture opened domestic markets."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Civil-service retrenchment and subsidy cuts under IMF fiscal targets."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Bank of Ghana shifted from fiscal-agent financing to market-based instruments under the programme."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Divestiture and titling progress, though land tenure remained customary."}
outcome_hypotheses: [structural_adjustment_growth_effect]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned, notes: "Textbook orthodox stabilisation — devaluation, fiscal consolidation, liberalisation."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Sequencing and PAMSCAD mitigation reflected pragmatic adaptation."}
references:
  - "World Bank (1984), Ghana: Policies and Program for Adjustment"
  - "World Bank (1994), Adjustment in Africa: Reforms, Results, and the Road Ahead"
  - "IMF Article IV consultations, Ghana, 1984-1991"
  - "Aryeetey-Harrigan-Nissanke (2000), Economic Reforms in Ghana"
  - "Hutchful (2002), Ghana's Adjustment Experience: The Paradox of Reform"

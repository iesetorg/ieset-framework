# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: greek_fiscal_dominance_post_euro_2001
status: candidate
name: Greek fiscal-dominance era post-euro entry
countries:
- GRC
timeframe:
  start: 2001
  end: 2010
coalition: Sequence of PASOK + ND governments 2001-2009; post-2010 Troika program partly supersedes
leaders:
- Kostas Simitis (PM, PASOK)
- Kostas Karamanlis (PM, ND)
- Giorgos Papandreou (PM to 2011 crisis)
doctrine: 'Greek euro-area entry in 2001 relied on fiscal statistics later found to have been
  misreported. The decade that followed saw sustained structural deficits, off-balance-sheet obligations
  (including swap arrangements that masked debt), public-sector wage growth outpacing productivity,
  and borrowing costs compressed by euro-area membership masking the underlying imbalance. This
  is not a single enacted reform — it is the systematic absence of fiscal discipline enabled by
  artificially cheap borrowing. The framework codes this as a movement because its policy-content
  fingerprint (fiscal expansion + borrowing accommodation + structural reform absence) is coherent
  and durable across coalitions of both parties over the decade.

  '
policies:
- greece_euro_entry_2001
- greece_fiscal_accommodation_2001_2009
- greece_public_sector_wage_growth_2001_2009
- greece_debt_statistic_misreporting_2002_2009
axes_summary:
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: Government spending from ~45% GDP at entry toward ~52% by 2009.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  rationale: Pension and social-transfer promises expanded substantially beyond structural revenue
    base.
- axis: institutional.property_rights
  direction: '0'
  magnitude: weak
  rationale: No major change; Greek regulatory environment remained difficult for business.
- axis: monetary.central_bank_independence
  direction: +
  rationale: ECB replaces Bank of Greece monetary function. Paradoxically the same feature that
    enabled fiscal-dominance-at-low-rates also imported credible monetary policy.
- axis: regulatory.product_market_competition
  direction: '0'
  rationale: Persistent closed-shop professions, restricted entry in many sectors.
outcome_hypotheses:
- nordic_outcome_persistence_decomposition_v3
- hyperinflation_requires_fiscal_dominance
predecessor_movements: []
successor_movements:
- greece_papandreou_pasok_iii_2009_2011
position_alignments:
- position_id: austrian
  alignment: aligned
  notes: Austrian tradition identifies credit-fuelled fiscal accommodation at artificially low
    rates (via euro-area entry) as a textbook fiscal-dominance-enabled bubble. Crisis 2010 consistent
    with Austrian priors.
steelman: movements/steelman/greek_fiscal_dominance_post_euro_2001.md
disclosure: 'The Greek crisis is a heavily-politicised case. Framework''s coding is policy-content-based:
  the fiscal trajectory 2001-2009 was unambiguously expansionary and unsustainable, documented
  in post-crisis forensic audits. The framework does not take a position on whether Troika-era
  austerity was the appropriate response; that is a separate movement (greek_austerity_troika_2010_2018)
  to be coded separately.

  '
references:
- Eurostat methodological investigations on Greek fiscal statistics, 2010-2012
- IMF Article IV consultations, Greece, 2002-2010
- European Commission 'Report on Greek government deficit and debt statistics' (2010)
notes: 'Treatment date 2001 is euro-area accession. The movement''s defining feature is the decade
  of policy content following entry. Post-2010 crisis + Troika is coded as a separate, successor
  movement.

  '

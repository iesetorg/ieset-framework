movement_id: us_bush_43_first_term_broad_2001_2005
status: candidate
name: "Bush 43 first term — 9/11, Patriot Act, tax cuts, Afghanistan+Iraq, SOX, Medicare Part D"
countries: [USA]
timeframe: {start: 2001, end: 2005, enacted_date: "2001-01-20"}
coalition: "Republican Party with narrow Senate majorities (Jeffords flip 2001; recaptured 2002)"
leaders:
  - "George W. Bush (President 2001-2009)"
  - "Dick Cheney (Vice President)"
  - "Paul O'Neill / John Snow (Treasury)"
  - "Alan Greenspan (Fed Chair)"
  - "Donald Rumsfeld (Defense)"
doctrine: >
  Compassionate-conservative supply-side tax-cut agenda transformed
  after 11 September 2001 into war-on-terror security state and
  war-deficit fiscal regime. Six doctrinal pillars: (a) EGTRRA 2001
  (P.L. 107-16, 7 June 2001) and JGTRRA 2003 (P.L. 108-27, 28 May
  2003) — top marginal rate 39.6%→35%, 10% bracket created,
  capital-gains cut to 15%, dividends taxed as capital gains,
  sunsetting 2010; CBO cost ~$1.7T over decade. (b) Patriot Act 2001
  (P.L. 107-56, 26 October 2001) — expanded surveillance, Section
  215 business records, FISA wall removal, Treasury Title III anti-
  money-laundering. (c) War authorisations — AUMF 18 Sept 2001
  (Afghanistan); Iraq AUMF 16 October 2002 (P.L. 107-243); Operation
  Enduring Freedom 7 October 2001; Operation Iraqi Freedom 19 March
  2003; direct war cost >$1T through 2011. (d) No Child Left Behind
  2002 (P.L. 107-110, 8 Jan 2002) — federal standardised-testing
  accountability regime; Title I funding expansion. (e) Sarbanes-
  Oxley Act 2002 (P.L. 107-204, 30 July 2002) — response to Enron,
  WorldCom; PCAOB creation; Section 404 internal-controls
  attestation. (f) Medicare Modernization Act 2003 (Part D,
  P.L. 108-173, 8 Dec 2003) — prescription-drug benefit added to
  Medicare; $400B (CBO) / $534B (CMS) ten-year cost; non-negotiation
  clause. Stated school: compassionate-conservative supply-side +
  neoconservative foreign policy + ownership society. Left-right:
  centre-right fiscally and on regulation of finance; right on
  security, taxation, and foreign intervention. Popularity: 2000
  won electoral college 271-266 despite losing popular vote by 0.5%;
  post-9/11 approval peaked 90% Sept 2001; 2002 midterms GOP gained
  Senate and House seats (rare for presidential party); 2004
  re-elected 50.7% vs Kerry 48.3% with 286 EVs. Coherence: trade
  Clinton-era surplus and civil-liberties baseline for permanent
  tax-cut baseline, security-state architecture, two wars, and
  major entitlement expansion (Part D) alongside corporate-
  governance tightening (SOX).
policies:

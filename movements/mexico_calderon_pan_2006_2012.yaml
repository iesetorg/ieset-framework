movement_id: mexico_calderon_pan_2006_2012
status: candidate
name: "Calderón PAN — drug war, macro orthodoxy, labour reform"
countries: [MEX]
timeframe: {start: 2006, end: 2012, enacted_date: "2006-12-01"}
coalition: "PAN (Partido Acción Nacional)"
leaders:
  - "Felipe Calderón Hinojosa (President 2006-2012)"
  - "Agustín Carstens (Finance 2006-2009, Banxico Gov 2010-2017)"
  - "Ernesto Cordero (Finance 2009-2011)"
doctrine: >
  Calderón's sexenio fused PAN market-liberal macroeconomics with a frontal
  militarised security strategy. (a) Economic school: centre-right orthodox
  — independent Banxico inflation-targeting, fiscal responsibility framework
  (LFPRH inherited, strengthened with structural-deficit rule 2006), 2007
  IETU flat-minimum corporate alt-tax, 2008 state-oil reform Pemex minor
  opening (no private upstream), transparency via IFAI strengthened, 2012
  Ley Federal del Trabajo reform (outgoing lame-duck Nov 2012) liberalising
  hiring, part-time + trial contracts, outsourcing rules. (b) Left-right:
  centre-right; pro-business, NAFTA-continuity, tight fiscal. (c) Dated
  policies: drug war launched 11 Dec 2006 (Operativo Conjunto Michoacán),
  IETU 1 Oct 2007, GFC countercyclical stimulus 2009, swine-flu H1N1
  response Apr 2009, IFAI transparency strengthening, labour reform Nov
  2012, Pacto de Calderón-era macroprudential framework for banks. (d)
  Popularity: won Jul 2006 by 0.58% over AMLO (disputed); approval entered
  low 60s on drug-war launch, fell to ~50% by 2012 exit as homicide-toll
  rose (~60,000 dead 2006-2012); PAN lost 2012 presidential to Peña Nieto
  PRI in first round. (e) Coherence: high macro-fiscal discipline; security
  strategy's escalation dynamic proved incoherent with rule-of-law goal as
  violence metastasised into organised-crime fragmentation.
policies:
  - mx_calderon_drug_war_2006
  - mx_ietu_flat_alt_tax_2007
  - mx_federal_labour_law_reform_2012
  - mx_ifai_transparency_strengthening_2007_2012
  - mx_gfc_countercyclical_package_2009
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Nov 2012 LFT reform: trial contracts, hourly pay, outsourcing framework."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "IETU alt-minimum corporate tax raised effective burden on low-paying firms."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Militarised security strategy correlated with homicide escalation + human-rights abuse allegations."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "Banxico independence + inflation-targeting further institutionalised."}
outcome_hypotheses: [militarised_drug_war_homicide_effect, labour_flexibility_informality_effect]
predecessor_movements: [mexico_fox_pan_2000_2006]
successor_movements: [mexico_pena_nieto_pri_2012_2018]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: ordoliberal, alignment: partially_aligned}
  - {position_id: post_keynesian, alignment: opposed}
references:
  - "Calderón Inaugural 1 Dec 2006"
  - "Diario Oficial — LFT reform 30 Nov 2012"
  - "INEGI homicide series 2000-2015"
notes: "Drug-war launch is defining non-economic signature; labour + IETU define economic content."

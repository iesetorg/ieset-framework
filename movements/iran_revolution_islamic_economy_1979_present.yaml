movement_id: iran_revolution_islamic_economy_1979_present
status: candidate
name: "Islamic Republic economic system (Iran)"
countries: [IRN]
timeframe: {start: 1979, end: ongoing}
coalition: "Islamic Republic clerical establishment; varying elected governments (Rafsanjani, Khatami, Ahmadinejad, Rouhani, Raisi, Pezeshkian) under Supreme Leader oversight"
leaders:
  - "Ruhollah Khomeini (Supreme Leader 1979-1989)"
  - "Ali Khamenei (Supreme Leader 1989-present)"
  - "Akbar Hashemi Rafsanjani (President 1989-1997)"
  - "Mahmoud Ahmadinejad (President 2005-2013)"
  - "Hassan Rouhani (President 2013-2021)"
doctrine: >
  Revolutionary mixed economy codified in Article 44 of the 1979 constitution:
  three sectors — state (heavy industry, oil, banking, major infrastructure),
  cooperative, and private. Large-scale nationalisations 1979-1982 (banks,
  insurers, "taghuti" industrial conglomerates) were followed by creation of
  parastatal "bonyads" (Mostazafan, Shahid) that control sizeable shares of
  non-oil GDP outside standard fiscal accountability. IRGC-linked
  conglomerates (Khatam al-Anbia) expanded after the 1988 Iran-Iraq war
  ceasefire. The state is heavily rentier: oil revenues finance generalised
  consumer subsidies (fuel, bread, utilities) which at peak exceeded 20% of
  GDP. Banking is nominally interest-free (Law for Usury-Free Banking 1983)
  with profit-sharing instruments. Sanctions-era macroeconomics: multiple
  exchange rates, chronic inflation (15-40% range, spikes during sanctions
  shocks), capital controls, and 2010 Targeted Subsidies Reform under
  Ahmadinejad converting part of fuel subsidies to cash transfers. Article 44
  amendment 2006 nominally opened space for privatisation but most divested
  shares went to quasi-state "Justice Shares" and parastatal entities rather
  than genuine private owners. Sanctions regimes (US 1995, UN 2006-2010,
  "maximum pressure" 2018-present) are exogenous drivers of some but not all
  macroeconomic stress.
policies:
  - iran_nationalisations_1979_1982
  - iran_bonyad_parastatal_system
  - iran_usury_free_banking_law_1983
  - iran_generalised_consumer_subsidy_regime
  - iran_targeted_subsidies_reform_2010
  - iran_article_44_privatisation_2006
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Bonyads + IRGC conglomerates + state banks dominate non-oil economy; private-sector entry obstructed by licensing and FX access."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Universal fuel/bread/utility subsidies historically >15% of GDP; post-2010 partial conversion to cash transfers."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Multiple exchange rates, import licensing, FX rationing; sanctions compound domestic restrictions."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Post-revolution expropriations; continuing uncertainty for foreign and dual-national owners; selective enforcement."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "CBI governors subject to executive and Supreme-Leader influence; deficit monetisation recurrent; oil revenue channelled through central bank."}
outcome_hypotheses: [sanctions_effect_on_growth, rentier_state_non_oil_development]
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned, notes: "State-directed investment + subsidy architecture; lacks East Asian export-discipline mechanism."}
  - {position_id: marxian, alignment: partially_aligned, notes: "Early-revolutionary nationalisations drew on mixed Islamist-socialist analysis; later trajectory is rentier rather than class-based."}
  - {position_id: chicago_monetarism, alignment: opposed}
references:
  - "Salehi-Isfahani (2009), 'Poverty, Inequality, and Populist Politics in Iran', Journal of Economic Inequality"
  - "Mazaheri (2016), 'Iran's Bonyads: Economic Power and Religious Authority'"
  - "Maloney (2015), 'Iran's Political Economy since the Revolution'"
  - "IMF Article IV Iran (2011 last before gap; 2018)"
notes: "Sanctions must be modelled as exogenous covariate; do not absorb into policy coding. Bonyad quantification imperfect — framework should note identification limit."

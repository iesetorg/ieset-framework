# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: burkina_faso_mpsr_transition_sovereignty_2022_present
status: candidate
name: Burkina Faso MPSR transition and resource-sovereignty government
countries: [BFA]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-09-30'
coalition: Patriotic Movement for Safeguard and Restoration military transition
leaders:
  - "Ibrahim Traore (Transition President, 2022-present)"
  - "Apollinaire Joachim Kyelem de Tambela (Prime Minister, 2022-present)"
doctrine: >
  Burkina Faso's post-September 2022 MPSR transition presents itself as a
  security-first sovereignty project: recover territory from insurgent control,
  mobilize society and fiscal resources behind the war effort, reduce external
  dependence, and capture more value from strategic minerals. The movement is
  coded as a governing transition regime rather than as an electoral party.
policies:
  - bfa_transition_charter_extension_2024
  - bfa_patriotic_support_fund_2023
  - bfa_mining_code_resource_sovereignty_2024
  - bfa_ecowas_withdrawal_aes_confederation_2024_2025
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "The transition extension and ECOWAS exit prolonged military-led rule outside ordinary electoral accountability."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "The Patriotic Support Fund and security mobilization expanded earmarked wartime spending."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Mining-code reform increased state gating and local-content expectations in the minerals sector."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "ECOWAS withdrawal reduced formal regional integration commitments."}
references:
  - "Burkina Faso transition-charter and national-consultation materials, 2022-2024."
  - "Burkina Faso government and finance-ministry materials on the Fonds de soutien patriotique."
  - "IMF and World Bank reporting on Burkina Faso fiscal pressures and mining-sector reform, 2023-2025."
  - "ECOWAS and Alliance of Sahel States statements on regional realignment, 2024-2025."
notes: >
  Coverage emphasizes formal governing instruments. Security outcomes and
  implementation capacity are highly contested and are not inferred from the
  existence of the policies.


# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: egypt_scaf_transition_2011_2012
status: candidate
name: "SCAF military-transitional government (Egypt)"
countries: [EGY]
timeframe:
  start: 2011
  end: 2012
  enacted_date: "2011-02-11"
coalition: "Supreme Council of the Armed Forces — 20-member military junta assuming executive power after Mubarak resignation"
leaders:
  - "Field Marshal Mohamed Hussein Tantawi (Chairman SCAF, de facto head of state)"
  - "General Sami Hafez Anan (SCAF Chief of Staff)"
  - "Essam Sharaf (Prime Minister Mar-Dec 2011)"
  - "Kamal Ganzouri (Prime Minister Dec 2011 - Aug 2012)"
  - "Samir Radwan / Hazem El Beblawi / Momtaz El-Said (Finance Ministers)"
doctrine: >
  Military-transitional stewardship — interim rule preserving economic
  status quo while managing sterling FX reserve drain and negotiating
  transition roadmap. Economic school: conservative-holding rentier-
  military management under reserve pressure — IMF $3.2bn standby
  negotiated then declined under political resistance Jun 2011; reserves
  fell from ~$36bn Jan 2011 to ~$15bn Jun 2012; tourism and FDI collapsed;
  wheat-import subsidies preserved. Dated policies: Mubarak resignation
  11 Feb 2011; Constitutional Declaration 30 Mar 2011; Maspero clashes
  9 Oct 2011; Parliament elections Nov 2011 - Jan 2012 producing Muslim
  Brotherhood Freedom and Justice Party plurality; SCAF dissolution of
  parliament Jun 2012 via SCC ruling; Morsi presidential win 30 Jun 2012
  handover. Left-right: military-conservative holding pattern; no
  ideological economic programme beyond preservation. Popularity: SCAF
  popular initially as guardian-of-revolution; declined sharply after
  Maspero Oct 2011 and Mohamed Mahmoud clashes Nov 2011 with ~50+
  protester deaths; street confidence collapsed. Coherence: narrow —
  intentionally a caretaker arrangement without reform mandate; fiscal
  situation worsened throughout with reserves bleeding and deficit
  widening to ~11% GDP by 2011-2012.
policies:
  - eg_scaf_imf_standby_decline_2011
  - eg_scaf_reserve_drawdown_2011_2012
  - eg_scaf_wheat_subsidy_continuation_2011
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Transition-period deficit widened to ~11% GDP with public-sector wage and subsidy continuation."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "No tariff or FDI regime change; collapse driven by exogenous confidence not policy."}
  - {axis: fiscal.sectoral_subsidy, direction: "0", magnitude: weak, rationale: "Subsidy architecture preserved without reform; stock continued."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Military tribunals for ~12,000 civilians during transition documented by HRW."}
outcome_hypotheses: [post_revolution_transition_macro_effects]
predecessor_movements: [egypt_mubarak_neoliberal_late_era_1991_2011]
successor_movements: [egypt_morsi_muslim_brotherhood_2012_2013]
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned, notes: "State-holding military stewardship without doctrinal frame."}
references:
  - "IMF Article IV Egypt 2011 (unpublished / delayed)"
  - "HRW (2012), 'The Road Ahead: A Human Rights Agenda for Egypt's New Parliament'"
  - "SCC ruling on People's Assembly elections (14 Jun 2012)"
notes: "17-month bracketed transition; fills gap between Mubarak late era movement and Morsi movement already in corpus."

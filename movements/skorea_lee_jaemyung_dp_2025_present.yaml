  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "Restoration of pre-Yoon 25% top corporate rate and bracket structure."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "Jongbuse restoration, multi-home surcharge restoration, financial-investment-income tax reintroduction."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Supplementary budget KRW 30+ trillion plus AI/advanced-industry package."}
  - {axis: regulatory.product_market_competition, direction: "mixed", rationale: "Chaebol-governance reforms tighten insider conduct (pro-minority-shareholder) while some Yoon deregulation preserved."}
  - {axis: regulatory.energy_supply_security, direction: "0", magnitude: weak, rationale: "Announced preserve of Yoon-era nuclear continuation while restoring renewable targets — net unchanged on supply-security axis."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Democratic restoration after the Dec 2024 martial-law episode; constitutional-court-affirmed transfer of power."}

  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Social transfers expanded on minimum pension, housing aid; counterbalanced by Barre restraint."}
successor_movements: [mitterrand_nationalisations_1981_1983]
position_alignments:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: norway_stoltenberg_ii_redgreen_2005_2013
status: candidate
name: "Stoltenberg II red-green coalition (Norway)"
countries: [NOR]
timeframe:
  start: 2005
  end: 2013
  enacted_date: "2005-10-17"

coalition: "Arbeiderpartiet (AP) + Sosialistisk Venstreparti (SV) + Senterpartiet (Sp) — first red-green majority coalition in Norwegian history (Rødgrønn regjering); majority for both 2005-2009 and 2009-2013 Storting terms"
leaders:
  - "Jens Stoltenberg (Statsminister / Prime Minister, AP)"
  - "Kristin Halvorsen (Finance Minister 2005-2009, SV; then Education Minister)"
  - "Sigbjørn Johnsen (Finance Minister 2009-2013, AP)"
  - "Liv Signe Navarsete (Sp leader 2008-2014)"
  - "Audun Lysbakken (SV leader from 2012)"

doctrine: >
  (a) Red-green coalition: social-democratic welfare investment and
  public-service expansion under strict fiscal-rule discipline, climate
  compromise (klimaforliket) brokered with the opposition, and a 2011
  pension reform re-gearing the statutory pension system toward
  longevity-adjusted sustainability. Economic school: mainstream Nordic
  social-democracy with handlingsregel discipline preserved and GPFG
  governance tightened (2006 ethical guidelines). (b) Left-right axis —
  centre-left on distribution, labour market, and public ownership;
  centre on fiscal-rule and petroleum-sector continuity; SV pulled the
  coalition leftward on climate and equality while Sp held agricultural
  and rural-tax positions. (c) Key policy content: 2006 introduction
  of the shareholder model (aksjonærmodellen) shifting personal capital
  taxation; 2008 klimaforliket cross-party climate settlement; 2009
  counter-cyclical fiscal stimulus (~NOK 20bn discretionary) during
  the global financial crisis — structural non-oil deficit reached
  4.8% of trend GDP, explicitly above the 4% rule, framed as
  temporary; 2011 pension reform (phased from 2011, effective 2011-2025)
  introducing life-expectancy adjustment, flexible retirement 62-75,
  and earnings-related accrual; 2006 ethical guidelines on GPFG
  (recommendation by Graver committee) and 2008-2010 responsible-
  investment mandate; parental leave extensions; 2013 gender-neutral
  marriage act (already 2008); continued handlingsregel observance
  through the GFC with return to rule trajectory 2011-2013.
  (d) Popularity — the red-green bloc won 87/169 seats in 2005 and 86/169
  in 2009 (first re-election of a majority government in Norway since
  the 1960s); AP peaked around 35.4% in the 2009 Storting vote;
  Stoltenberg's personal approval rose sharply after the 22 July 2011
  Utøya attacks; the coalition lost the 2013 election (red-green 72
  seats vs. right bloc 96) after fatigue and Sp's eroded rural base.
  (e) Coherence: unusually coherent red-green package — welfare
  investment + pension sustainability + fiscal-rule respect + climate
  settlement — but electoral fatigue and the 2011 terror-attack
  context dominate the late-period read.

policies:
  - no_pension_reform_2011
  - no_klimaforliket_2008
  - no_gfc_fiscal_stimulus_2009
  - no_gpfg_ethical_guidelines_2006
  - no_aksjonaermodellen_capital_tax_2006

axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Parental leave extensions, student-grant uprating, kindergarten universalisation via maximum-price caps."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Discretionary 2009 stimulus exceeded the 4% rule temporarily; structural non-oil deficit peaked 4.8% of trend GDP (2009)."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "2006 aksjonærmodellen integrated personal capital taxation with corporate tax via sheltering deduction, raising effective rate on distributed returns above a risk-free threshold."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Klimaforliket 2008 cross-party settlement; raised CO2 tax on offshore petroleum; expanded CCM research commitments (Mongstad) — later scaled back."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "2006 GPFG ethical guidelines codified after Graver committee report; responsible-investment mandate strengthened 2008-2010."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "2011 pension reform introduced long-term rule (life-expectancy adjustment) binding future governments — institutional commitment device."}

predecessor_movements: []
successor_movements:
  - norway_solberg_rightbloc_2013_2021

position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}

references:
  - "Soria Moria-erklæringen I (2005) + Soria Moria II (2009)"
  - "Klimaforliket 2008 — Stortingsmelding nr. 34 (2006–2007) + tilleggsmelding"
  - "Lov om endringer i folketrygdloven (pensjonsreformen, fra 2011)"
  - "NOU 2003:22 (Graver committee) and GPFG Ethical Guidelines, 19 November 2004 / 2006 operationalisation"
  - "Finansdepartementet — Revidert nasjonalbudsjett 2009 (stimulus package)"
  - "Statistics Norway — 2005, 2009, 2013 Storting election results"

notes: >
  Coded as one movement across both red-green terms because doctrinal
  content was continuous. 2009 stimulus treated as within-rule
  contingency per handlingsregel text permitting deviations in
  downturns. 2011 pension reform carries forward into the Solberg and
  Støre periods (multi-movement policy).

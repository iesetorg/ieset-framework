movement_id: malaysia_anwar_unity_2022_present
status: candidate
name: "Anwar Ibrahim Unity Government (Malaysia, 2022-present)"
countries: [MYS]
timeframe: {start: 2022, end: ongoing, enacted_date: "2022-11-24"}
coalition: "Pakatan Harapan + Barisan Nasional + GPS + GRS Unity Government (Kerajaan Perpaduan)"
leaders:
  - "Anwar Ibrahim (Prime Minister, PKR / Pakatan Harapan)"
  - "Ahmad Zahid Hamidi (Deputy PM, UMNO / Barisan Nasional)"
  - "Fadillah Yusof (Deputy PM, GPS)"
  - "Rafizi Ramli (Economy Minister to 2025, PKR)"
  - "Amir Hamzah Azizan (Finance II, then Finance Minister 2025-)"
  - "Tengku Zafrul Aziz (Investment, Trade & Industry, BN/UMNO)"
doctrine: >
  Reformist-multiracial Pakatan Harapan (PH) economic policy reconciled with
  Malay-Muslim establishment UMNO-BN via a hung-parliament-forced unity
  coalition after the November 2022 general election produced no bloc majority
  and the Yang di-Pertuan Agong appointed Anwar PM on 24 November 2022. The
  stated doctrine is the Madani Economy Framework (Ekonomi Madani, launched
  July 2023) — a dignity/sustainability-framed programme promising to move
  Malaysia into the top 30 economies by size, top 12 in competitiveness, and
  to raise the labour income share from 32% to 45% over a decade. Operational
  priorities: targeted subsidy rationalisation (replacing blanket fuel/food
  subsidies with means-tested cash transfers via PADU database), a Progressive
  Wage Policy pilot (Jun 2024), fiscal consolidation under the Fiscal
  Responsibility Act 2023, and revenue-side reforms (capital-gains tax on
  unlisted shares from Jan 2024, mandatory e-invoicing from Aug 2024,
  expanded sales-and-service tax from May 2024). The coalition functions as
  an explicit reconciliation between the reformist-liberal PH tradition and
  the Malay-nationalist UMNO-BN establishment — political content Anwar
  himself previously sat on opposite sides of — held together by the shared
  objective of blocking Perikatan Nasional (PN). Coherence judgement: fiscal
  discipline genuinely prioritised (deficit trajectory 5.0% 2023 -> targeted
  3.8% 2025), but subsidy rationalisation has proceeded faster on diesel
  (Jun 2024) than on the politically explosive RON95 petrol subsidy, which
  remained pending into 2025-26.
policies:
  - my_ekonomi_madani_framework_2023
  - my_diesel_subsidy_rationalisation_2024
  - my_progressive_wage_pilot_2024
  - my_capital_gains_tax_2024
  - my_einvoicing_mandate_2024
  - my_anti_hopping_law_2022
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Diesel subsidy rationalisation Jun 2024 (retail price raised from RM2.15 to RM3.35/litre for non-targeted users); electricity tariff restructuring; RON95 reform pending."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "PADU-database-targeted cash transfers (STR / SARA), Budi Madani diesel subsidy cards for qualifying users — replaces blanket subsidy with means-tested channel."}
  - {axis: fiscal.tax_capital, direction: "+", magnitude: weak, rationale: "Capital-gains tax on disposal of unlisted shares from 1 Jan 2024 (10% flat or 2% of gross), first broad CGT in Malaysian history."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "Expanded sales-and-service tax (SST) scope from 6% to 8% on selected services May 2024; e-invoicing mandate tightens compliance."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Progressive Wage Policy pilot (Jun 2024) adds state-subsidised wage-ladder incentive; minimum wage raised to RM1,700 Feb 2025."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Anti-Hopping Law (Constitutional Amendment Act 2022) reduces party-switching incentive that destabilised prior governments; MACC reforms; Parliament Services Act 2025."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Fiscal Responsibility Act 2023 sets medium-term deficit/debt ceilings; deficit trajectory 5.0% 2023 -> targeted 3.8% 2025."}
outcome_hypotheses:
  - subsidy_rationalisation_fiscal_space_outcome
  - targeted_cash_transfer_vs_blanket_subsidy_welfare
  - anti_defection_law_government_stability_effect
predecessor_movements: [malaysia_ismail_sabri_umno_2021_2022]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "Targeted-subsidy-plus-cash-transfer design is the mainstream reform template."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Fiscal Responsibility Act and deficit trajectory supported; subsidy removal pace criticised as slow on RON95."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Progressive Wage Policy and New Industrial Master Plan 2030 retain developmentalist channels."}
references:
  - "MADANI Economy Framework, Prime Minister's Office, July 2023"
  - "Fiscal Responsibility Act 2023 (Act 850)"
  - "Belanjawan 2023, 2024, 2025 (Ministry of Finance Malaysia)"
  - "Constitution (Amendment) (No. 3) Act 2022 (Anti-Hopping Law)"
notes: >
  Dewan Rakyat seat distribution after GE15 (19 Nov 2022, 222 seats):
  Pakatan Harapan 82 (PKR 31, DAP 40, Amanah 8, UPKO 1, MUDA 1+Syed Saddiq),
  Perikatan Nasional 74 (Bersatu 31, PAS 43, Gerakan 0), Barisan Nasional 30
  (UMNO 26, MCA 2, MIC 1, PBRS 1), GPS 23, GRS 6, Warisan 3, independent 4.
  Unity Government formed PH 82 + BN 30 + GPS 23 + GRS 6 + others = ~148
  seats (2/3 supermajority enabling Anti-Hopping constitutional amendment).
  Anwar sworn in 24 Nov 2022. Merdeka Center approval ratings: ~68% Dec
  2022 (honeymoon), ~50-52% mid-2023, ~54% post-Madani launch, ~48% after
  diesel subsidy reform mid-2024, ~45-50% through 2025. Six state elections
  (Aug 2023) produced PN retention of Kedah/Kelantan/Terengganu and PH+BN
  retention of Selangor/Penang/Negeri Sembilan — seen as green-wave warning
  but not a federal-confidence break. Sabah state election scheduled for
  2025 is next major test.

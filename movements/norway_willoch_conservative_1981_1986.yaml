movement_id: norway_willoch_conservative_1981_1986
status: candidate
name: "Willoch Høyre — liberalisation, housing-credit deregulation, broadcasting monopoly end"
countries: [NOR]
timeframe: {start: 1981, end: 1986}
coalition: "Høyre minority 1981-1983, then Høyre + KrF + Sp centre-right majority 1983-1986"
leaders:
  - "Kåre Willoch (Prime Minister 1981-1986; Høyre leader)"
  - "Rolf Presthus (Finance Minister 1981-1986)"
  - "Hermod Skånland (Norges Bank Governor from 1985)"
doctrine: >
  First Norwegian Conservative-led government in 53 years, riding the
  early-1980s "høyrebølgen" (right-wave) alongside Thatcher and Reagan.
  School: Norwegian moderate market-liberalism — pro-market on housing,
  credit, broadcasting and retail but retentive of welfare state and
  comprehensive oil-sector state ownership (Statoil-dominant structure).
  Left-right axis: centre-right; further right than Fälldin's Centre-led
  Swedish coalition on credit/housing liberalisation, but well to the
  left of Thatcher on public ownership and social spending. Core policy
  content: (i) housing-credit liberalisation 1984-1985 — relaxation of
  quantitative lending regulation by Norges Bank, removal of interest
  ceilings, effectively ending the post-war selective-credit regime;
  (ii) end of NRK broadcasting monopoly 1981-1984, licensing local radio
  and paving way for TV2 later; (iii) retail-hours and rental-market
  deregulation; (iv) 1984 "Tempo-utvalget" oil-pace review; (v) 1986
  oil-price collapse triggered 9.2% krone devaluation May 1986 just as
  government fell on a gasoline-tax proposal (no confidence vote 29
  April 1986). Popularity signals: 1981 Høyre 31.8% (its best result
  since 1924); 1985 election Høyre 30.4% with KrF+Sp holding non-
  socialist majority; lost confidence vote April 1986 on oil-crisis
  austerity package. Coherence: moderate — liberalisation reforms were
  ideologically coherent but the combination of financial-credit
  deregulation with pro-cyclical oil-boom spending produced the 1986-
  1992 Norwegian banking crisis, the unintended consequence that
  dominated the successor Brundtland years.
policies:
  - no_housing_credit_liberalisation_1984
  - no_broadcasting_monopoly_end_1984
  - no_krone_devaluation_may_1986
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Interest-rate ceilings removed 1984-1985; quantitative credit regulation dismantled."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Broadcasting and retail-hour liberalisation; end of NRK monopoly."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Modest corporate-tax reductions within oil-revenue fiscal space."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "May 1986 9.2% devaluation in response to oil-price collapse."}

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bolivia_morales_third_crisis_2014_2019
status: candidate
name: "Morales third-term entrenchment and 2019 crisis (Bolivia)"
countries: [BOL]
timeframe: {start: 2014, end: 2019}
coalition: "MAS-IPSP (Movimiento al Socialismo)"
leaders:
  - "Evo Morales (President, third term 2015-2019)"
  - "Álvaro García Linera (Vice-President)"
doctrine: >
  Narrower slice of the MAS period focused on political entrenchment after the
  commodity turn: Morales won the October 2014 election with ~61% on the
  strength of the prior boom, but the economic model — gas-revenue dependent,
  peg-maintained, deficit-financed after 2014 — began to fray as hydrocarbon
  prices fell and YPFB reserves depleted. Politically the period is defined by
  the February 2016 constitutional referendum, in which voters rejected
  unlimited re-election 51.3%-48.7%; the Plurinational Constitutional Court's
  Ruling 0084/2017 declaring term limits a violation of human rights and
  authorising Morales to stand again; and the disputed October 2019 election
  in which an OAS audit cited irregularities, triggering protests, police
  mutiny, and military "suggestion" that Morales resign on November 10, 2019.
  The movement represents democratic-backsliding-via-judicial-capture layered
  on top of the extractivist-redistributive base, with coherence eroding
  between stated plurinational-democracy doctrine and observed practice.
policies:
  - bo_constitutional_referendum_2016
  - bo_tcp_ruling_0084_2017
  - bo_2019_election_crisis
  - bo_litio_industrialisation_ylb
axes_summary:
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "TCP Ruling 0084/2017 widely read as politically captured; overturned referendum result."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Constitutional limits bypassed; electoral institutions lost credibility through 2019."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Deficits widened post-2014 as gas revenues fell but public investment maintained."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "YLB lithium-industrialisation project expanded state-monopoly framework."}
position_alignments:
  - {position_id: democratic_socialist, alignment: partially_aligned}
  - {position_id: classical_liberal, alignment: opposed}
predecessor_movements:
  - bolivia_mas_extractivist_2006_2019
successor_movements:
  - bolivia_anez_interim_2019_2020
references:
  - "TSE Referéndum Constitucional 21F 2016 results"
  - "Tribunal Constitucional Plurinacional, Sentencia 0084/2017"
  - "OAS Electoral Observation Mission final report, Bolivia Oct 2019"
notes: >
  Distinct from the 2006-2019 umbrella by focusing on the political-
  institutional decline phase rather than the boom-era material gains.

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: maastricht_convergence_criteria_1992
status: candidate
name: "Maastricht Treaty convergence criteria + monetary union preparation"
countries: [DEU, FRA, ITA, ESP, NLD, BEL, IRL, PRT, GRC, FIN, AUT]
timeframe: {start: 1992, end: 1999, enacted_date: "1992-02-07"}
coalition: "EU member state intergovernmental consensus"
leaders: ["Helmut Kohl", "François Mitterrand", "Jacques Delors", "Theo Waigel (German Finance)"]
doctrine: >
  Treaty on European Union (Maastricht) locked in convergence criteria
  for euro-area entry: debt ≤60% GDP, deficit ≤3% GDP, inflation + interest-
  rate convergence, 2-year ERM membership. Member states committed to
  fiscal discipline + central bank independence as precondition for
  monetary union. Created ECB statutory independence + Stability and
  Growth Pact 1997. Framework codes as a pro-fiscal-discipline + pro-
  central-bank-independence movement — D.1.5 relevant.
policies: [maastricht_treaty_1992, stability_growth_pact_1997, ecb_statute_1998]
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "ECB independence is treaty-protected; member central banks required to achieve statutory independence."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "SGP disciplines constrain spending."}
outcome_hypotheses: [monetary_union_benefits_and_costs, italy_euro_entry_non_reform_1999]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned}
references:
  - "Treaty on European Union (Maastricht, 1992)"
  - "Stability and Growth Pact (1997)"

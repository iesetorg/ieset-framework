# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_alberto_fernandez_fdt_2019_2023
status: candidate
name: "Alberto Fernández Frente de Todos Peronist restoration (Argentina)"
countries: [ARG]
timeframe: {start: 2019, end: 2023, enacted_date: "2019-12-10"}
coalition: "Frente de Todos (PJ + Kirchnerist La Cámpora + allied Peronist factions)"
leaders: ["Alberto Fernández (President)", "Cristina Fernández de Kirchner (Vice President)", "Martín Guzmán (Economy 2019-22)", "Silvina Batakis (Economy Jul-Aug 2022)", "Sergio Massa (Economy 'super-minister' 2022-23)"]
doctrine: >
  Peronist-Kirchnerist restoration running a heterodox expansionary
  programme: re-tightened cepo currency controls (Sep 2019 emergency
  measures continued and deepened), broad price-control schemes
  (Precios Cuidados, Precios Justos), energy and transport subsidy
  maintenance, expanded social transfers (IFE during COVID, Tarjeta
  Alimentar), sovereign-debt restructuring with private creditors
  concluded Aug 2020 covering USD 65bn, and a long-delayed IMF
  Extended Fund Facility signed Mar 2022 (USD 44bn) to replace Macri's
  SBA. COVID lockdowns were among the world's longest (Mar 2020 to
  late 2020), producing a ~10% GDP contraction and a fiscal deficit
  financed largely by BCRA money printing. Internal coalition
  fracture — CFK publicly attacked Guzmán's IMF deal — drove Guzmán's
  Jul 2022 resignation, Batakis's brief tenure, and Massa's Aug 2022
  appointment as economy super-minister. Inflation accelerated from
  54% (2019) to 95% (2022) to >211% by Dec 2023; multiple parallel
  FX markets (blue, MEP, CCL) traded at 100%+ premiums to official.
  Fernández won Oct 2019 first round with 48.2% (avoiding runoff);
  Frente de Todos lost the 2021 midterms (lower-house share falling
  to ~118/257); Massa lost the Nov 2023 runoff to Milei 44-56.
  Framework codes as fiscal-dominance variant alongside the earlier
  Kirchner-Fernández era, with COVID as an exogenous shock amplifier.
policies:
  - ar_fernandez_sovereign_debt_restructuring_2020
  - ar_fernandez_ife_covid_transfer_2020
  - ar_fernandez_precios_cuidados_justos_2019
  - ar_fernandez_imf_eff_2022
  - ar_fernandez_export_tax_hikes_2020
  - ar_fernandez_massa_devaluations_2023
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "COVID transfers + maintained subsidies + public-wage expansion."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "IFE, Tarjeta Alimentar, pension bonuses."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Energy + transport subsidies kept real prices suppressed; subsidy bill ballooned to ~3% GDP."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Expanded price controls + import licensing (SIRA)."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Export-tax hikes on grains; import restrictions."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "BCRA direct financing of Treasury resumed; inflation-target regime abandoned."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Deficit monetisation drove base-money growth >100% yoy by 2023."}
outcome_hypotheses: [hyperinflation_requires_fiscal_dominance, austerity_growth_recovery_tradeoff]
predecessor_movements: [argentina_macri_cambiemos_2015_2019]
successor_movements: [milei_shock_therapy_argentina_2023]
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: chicago_monetarist, alignment: opposed}
  - {position_id: austrian, alignment: opposed}
references:
  - "IMF (2022), Argentina Extended Fund Facility Request, Country Report 22/92"
  - "Exchange Offer Prospectus, Republic of Argentina, Apr-Aug 2020"
  - "BCRA (2023), Informe Monetario"
notes: "Fernández Oct 2019: 48.24% first round. Frente de Todos 2019 Chamber: 119 seats; 2021 midterms reduced to ~118 but lost Senate majority. Approval fell from ~60% (mid-2020) to ~20% (2023)."

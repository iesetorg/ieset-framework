movement_id: russia_gorbachev_perestroika_glasnost_1985_1991
status: candidate
name: "Gorbachev CPSU — perestroika, glasnost, and Soviet dissolution 1985-1991"
countries: [SUN]
timeframe: {start: 1985, end: 1991}
coalition: "Communist Party of the Soviet Union (CPSU) — reform faction under Gorbachev against hard-line and Yeltsin-led radical wings"
leaders:
  - "Mikhail Gorbachev (CPSU General Secretary 1985-1991; Soviet President 1990-1991)"
  - "Nikolai Ryzhkov (Premier 1985-1991, gradualist)"
  - "Valentin Pavlov (Premier 1991, failed 500-days alternative)"
  - "Leonid Abalkin and Stanislav Shatalin (reform-economist advisers)"
  - "Eduard Shevardnadze (Foreign Minister)"
doctrine: >
  Gorbachev's reform programme attempted to modernise Soviet
  socialism via perestroika (economic restructuring) and
  glasnost (openness) but unleashed forces that dissolved the
  USSR by December 1991. Economic school: reform-socialism
  gradualism — cooperative-sector legalisation, state-enterprise
  autonomy, price-reform proposals deferred, and multiple
  rival shock-therapy plans (500 Days, Abalkin, Pavlov) none
  fully adopted. Left-right axis: centre-left within Soviet
  framework — ambitious politically but economically cautious
  on price liberalisation and private property. Core policy
  content: (i) 1986 law on individual labour activity
  legalising limited private enterprise; (ii) 1987 Law on
  State Enterprises transferring budgetary autonomy to SOEs
  (self-financing, khozraschyot); (iii) 1988 Law on
  Cooperatives — major step legalising significant private
  cooperative sector; (iv) 1989 first competitive Congress
  of People's Deputies elections; (v) 1990 Shatalin-Yavlinsky
  500-Days shock-therapy plan proposed and rejected;
  Gorbachev adopted Ryzhkov-Pavlov hybrid; (vi) January 1991
  currency-confiscation reform withdrew 50/100-ruble notes;
  April 1991 Pavlov price reform raised administered prices
  ~200%; (vii) August 1991 hard-line coup attempt, Yeltsin's
  RSFSR resistance, Baltic-states independence, December 1991
  Belovezha Accords dissolved the USSR; (viii) external
  policy — INF Treaty 1987, unilateral troop withdrawals,
  German reunification acceptance 1990, withdrawal from
  Afghanistan completed February 1989. Macro: GDP contracted
  ~5% 1990, ~15% 1991; inflation accelerated to ~200% end-
  1991; budget deficit reached ~20% of GDP; foreign debt
  doubled. Popularity: Gorbachev's domestic approval collapsed
  from 80%+ in 1987 to <20% by 1991; resigned 25 December 1991.
  Coherence: low — gradualist reforms internal to preserving
  socialism clashed with the glasnost-enabled political
  mobilisation demanding deeper change; the institutional
  hybrid of party-state autonomy without price liberalisation
  proved unstable.
policies:
  - su_individual_labour_activity_law_1986
  - su_state_enterprise_law_1987
  - su_cooperative_law_1988
  - su_pavlov_price_reform_1991
  - su_belovezha_dissolution_1991
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Cooperative Law 1988 + State Enterprise Law 1987 created first competitive private-sector space."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "Limited private enterprise legalised but full private-ownership regime deferred."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Budget deficit exploded to ~20% of GDP by 1991; military-industrial and anti-alcohol revenue losses compounded."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "1987-1988 foreign-trade monopoly reform allowed direct enterprise trade, first joint ventures."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "1989 Congress elections and 1990 Article 6 removal introduced limited political competition."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Gosbank monetised growing deficits; currency-confiscation reform January 1991 signalled breakdown."}

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_non_ldp_interlude_1993_1994
status: candidate
name: "Hosokawa–Hata non-LDP reform interlude (Japan)"
countries: [JPN]
timeframe: {start: 1993, end: 1994}
coalition: "Seven/Eight-party non-LDP coalition (JNP, SDPJ, Komeito, DSP, JRP, Sakigake, SDF)"
leaders:
  - "Morihiro Hosokawa (PM Aug 1993-Apr 1994, JNP)"
  - "Tsutomu Hata (PM Apr-Jun 1994, JRP/Shinseito)"
  - "Ichiro Ozawa (Shinseito Secretary-General, coalition architect)"
doctrine: >
  Non-LDP reformist interlude — first non-LDP government since 1955,
  built around political-reform imperative after Sagawa Kyubin and
  Recruit. Economic school: pragmatic centre-reformist with market-
  opening tilt and administrative-reform focus; fiscal stimulus to
  address post-bubble slump. Dated policies: Political Reform Four
  Laws passed 29 Jan 1994 (single-member-district + proportional-
  representation mixed electoral system for House of Representatives,
  replacing multi-member SNTV; Political Funds Control Law amendment;
  Public Office Election Law amendment; Political Parties Subsidies
  Law); Uruguay Round rice-market partial opening Dec 1993 (minimum-
  access imports); ¥15.25 trillion Feb 1994 supplementary budget
  stimulus package. Left-right: centre to centre-left reformist
  amalgam — ideologically mixed coalition united by anti-LDP and pro-
  reform stance. Popularity: Hosokawa approval 70%+ at inauguration;
  Jul 1993 general election coalition parties combined 43.0% vs LDP
  36.6% / 223; Hosokawa resigned Apr 1994 Sagawa personal-loan
  scandal; Hata minority government collapsed 64 days. Coherence:
  moderate — electoral reform delivered (structural institutional
  change) but economic policy fragmented across 7-8 parties; coalition
  too fissile to last.
policies:
  - jp_political_reform_act_1994
  - jp_uruguay_rice_opening_1993
  - jp_hosokawa_stimulus_package_1994
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Electoral-system overhaul broke 1955-system multi-member SNTV; reduced money-politics incentives."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Partial rice-market opening under Uruguay Round — first breach of closed rice regime."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Large supplementary budgets addressing post-bubble slump."}
predecessor_movements:
  - japan_ldp_bubble_era_1987_1993
successor_movements:
  - japan_murayama_grand_coalition_1994_1996
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Otake (1996), 'Forces for Political Reform' JJS"
  - "Reed & Thies (2001), 'The Causes of Electoral Reform in Japan'"
notes: "Deep-history tranche 2. First non-LDP government since 1955."

  - "QatarEnergy media centre: https://www.qatarenergy.qa/en/MediaCenter/Pages/default.aspx"
notes: "First Lane D tranche movement for sparse QAT coverage; policies are limited to high-salience labour, LNG, and national-development strategy items."

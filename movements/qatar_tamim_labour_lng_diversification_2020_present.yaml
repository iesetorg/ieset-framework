movement_id: qatar_tamim_labour_lng_diversification_2020_present
status: candidate
name: "Qatar Tamim labour, LNG, and diversification agenda"
countries: [QAT]
timeframe: {start: 2020, end: ongoing}
coalition: "Al Thani monarchy under Emir Tamim; appointed cabinet led by Mohammed bin Abdulrahman Al Thani from 2023"
leaders:
  - "Tamim bin Hamad Al Thani (Amir)"
  - "Mohammed bin Abdulrahman bin Jassim Al Thani (Prime Minister and Foreign Minister)"
  - "Saad Sherida Al-Kaabi (Minister of State for Energy Affairs; QatarEnergy CEO)"
doctrine: >
  Qatar's post-blockade policy regime uses sovereign gas rents to expand LNG
  capacity, deepen state-led diversification under Qatar National Vision 2030,
  and preserve high-skilled foreign-labour dependence while partially
  liberalising the migrant-worker regime. The programme combines global
  energy-supply expansion, targeted non-hydrocarbon competitiveness goals, and
  selective labour-rights formalisation after World Cup scrutiny.
policies:
  - qatar_labour_reforms_minimum_wage_kafala_2020
  - qatar_north_field_expansion_2021_2030
  - qatar_third_national_development_strategy_2024
axes_summary:
  - {axis: regulatory.labour_market_flexibility, direction: "mixed", magnitude: moderate, rationale: "Removal of NOC constraints liberalised job mobility while the statutory minimum wage tightened the wage floor."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Written job-change and wage-floor rules improved contract enforceability for migrant workers."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "North Field and NDS3 rely on state-directed capital and sectoral investment programmes."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: strong, rationale: "LNG capacity expansion raises Qatar's role as a long-term global gas supplier."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "NDS3 emphasises private-sector growth and diversification beyond hydrocarbons."}
references:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_brexit_2016_2020
status: candidate
name: "Brexit — UK departure from EU"

countries: [GBR]

timeframe:
  start: 2016
  end: 2020
  enacted_date: "2020-01-31"

coalition: "Cross-party referendum (2016); Conservative governments under May and Johnson delivered"

leaders:
  - "David Cameron (called referendum)"
  - "Theresa May (PM 2016–2019, negotiated withdrawal)"
  - "Boris Johnson (PM 2019–2022, delivered withdrawal + TCA)"

doctrine: >
  Formal departure from the EU Single Market and Customs Union; re-
  imposition of trade frictions with the largest trading partner in
  exchange for regulatory autonomy + ending free movement of labour.
  The stated economic rationale was that regulatory autonomy + global-
  trade repositioning would offset single-market access loss; the OBR
  and most academic forecasts projected a ~4% long-run GDP level reduction
  relative to EU membership.

policies:
  - uk_trade_cooperation_agreement_2020
  - uk_end_of_free_movement_2021
  - uk_regulatory_divergence_post_brexit

axes_summary:
  - axis: regulatory.trade_openness
    direction: "-"
    magnitude: strong
    rationale: "Trade frictions re-imposed with EU; services access materially reduced."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: moderate
    rationale: "End of EU free movement; points-based system replaced it (net migration has subsequently risen via non-EU routes, producing mixed effect on some metrics)."
  - axis: regulatory.product_market_competition
    direction: "mixed"
    rationale: "Regulatory autonomy used inconsistently — some liberalisation (gene editing, financial services) but also continued alignment on many standards to preserve EU access."


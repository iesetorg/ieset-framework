movement_id: thailand_prayut_junta_pprp_2014_2023
status: candidate
name: "Prayut Chan-o-cha — NCPO junta then Palang Pracharath elected-junta (2014-2023)"
countries: [THA]
timeframe:
  start: 2014
  end: 2023
  enacted_date: "2014-05-22"
coalition: "National Council for Peace and Order (NCPO) military junta 2014-2019; then Palang Pracharath-led coalition 2019-2023 (PPRP + Bhumjaithai + Democrat + minor parties) under the 2017 constitution"
leaders:
  - "Prayut Chan-o-cha (Army Chief, NCPO Head, then PM 2014-2023)"
  - "Prawit Wongsuwan (Deputy PM, PPRP leader)"
  - "Anupong Paochinda (Interior Minister)"
  - "Somkid Jatusripitak (Deputy PM for economy, 2015-2020, EEC architect)"
  - "Uttama Savanayana (Finance Minister, PPRP)"
  - "Arkhom Termpittayapaisith (Finance Minister, 2020-2023)"
  - "Veerathai Santiprabhob (BoT Governor 2015-2020)"
  - "Sethaput Suthiwartnarueput (BoT Governor from 2020)"
doctrine: >
  Military-junta-then-elected-junta programme of constitution-engineered
  political continuity fused with pragmatic technocratic economic
  management. Economic school: dual-track developmentalism — orthodox
  macro aggregates (inflation targeting preserved, fiscal prudence,
  public-debt ceiling observed), an activist Board of Investment
  pushing targeted industrial policy through the Eastern Economic
  Corridor (EEC Act 2018) and "Thailand 4.0" upgrading narrative,
  alongside populist continuity on minimum-wage rises (300-baht floor
  preserved from Yingluck then stepped up toward 328-354 across 2017-
  2022), rice-farmer support, welfare cards, and village funds.
  Political-institutional content is materially negative: 2014 coup
  (22 May), NCPO interim constitution, suspension of the 2007
  constitution, prolonged martial law then Section 44 absolute-power
  orders, 2017 junta-drafted constitution (appointed 250-seat Senate
  that votes for PM for five years, MMA electoral system engineered
  against large parties), 20-Year National Strategy (Oct 2018) binding
  future governments, Future Forward Party dissolution (Feb 2020),
  pro-democracy protest wave 2020-2021 met with lèse-majesté
  prosecutions. Sits authoritarian on the institutional axis, centre-
  right-with-populist-redistribution on the economic axis, and
  conservative-royalist on the cultural axis. Popularity / seats: 2019
  election under junta rules delivered PPRP 116/500 House seats on
  ~23.7% party-list vote, Pheu Thai 136/500, Future Forward 81/500 —
  Prayut retained PM with the appointed Senate's 250 votes locking in
  continuity; 2023 election PPRP collapsed to 40/500 seats and United
  Thai Nation (Prayut's new vehicle) took 36/500, ending the
  continuation and opening the path to Pheu Thai's return.
policies:
  - th_2014_coup_ncpo_2014
  - th_2017_constitution
  - th_20_year_national_strategy_2018
  - th_eec_act_2018

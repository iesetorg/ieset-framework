axes_summary:
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "NCPO appointments to Constitutional Court and Election Commission; 2017 constitution-engineered judicial veto points; Future Forward dissolution Feb 2020."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Section 44 absolute-power orders during junta phase; prolonged martial law; expanded lèse-majesté (Article 112) enforcement."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "Macro property-rights environment stable; foreign-investor regime preserved; no major expropriations."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "EEC BOI incentives, Thailand 4.0 targeted S-curve industry support, rice-pledging replaced by direct farmer support."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "State welfare card (Bat Sawasdikan Haeng Rat) 2017 expanded; elderly allowance; village funds continued."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Gradual spending rise; COVID fiscal response 2020-2022 raised public debt ceiling from 60 to 70% of GDP."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: weak, rationale: "Minimum-wage floor preserved and stepped up 2017-2022; migrant-worker regularisation tightened."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "RCEP signed 2020 and ratified 2021; continued bilateral FTA engagement; EU-Thailand FTA negotiations relaunched."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "EEC special-zone licensing regime lowered entry friction for targeted industries in three eastern provinces."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BoT inflation-targeting regime and operational independence preserved."}

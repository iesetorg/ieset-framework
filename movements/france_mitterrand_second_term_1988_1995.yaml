  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Balladur privatisations 1993-95."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "RMI 1988; CSG funded welfare expansion."}
  - {axis: fiscal.tax_progressivity, direction: "0", rationale: "CSG broadened base with flat rate; income tax schedule broadly stable."}
predecessor_movements: [france_mitterrand_first_term_1981_1988]
successor_movements: [france_chirac_presidency_first_1995_2002]

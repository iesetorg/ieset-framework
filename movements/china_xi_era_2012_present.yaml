axes_summary:
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "SOE reassertion, platform / fintech crackdown, education-tutoring ban, party-committee presence in large private firms."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "Made in China 2025 sectoral gating + 'three red lines' property-developer credit regime + fintech and education licensing tightening."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "MIC2025, 'new quality productive forces', EV/battery/solar directed credit."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Export controls tightening (gallium, germanium, rare earths), dual-circulation inward tilt, Phase One deal partial and expired."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Anti-corruption campaign extra-judicial shuanggui detention; 2018 NSC absorbed CCDI's state-side powers; removal of presidential term limits 2018."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "2015 Supreme People's Court 'seven don'ts'; Party leadership of judiciary explicit 2017+."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Regulatory-expropriation precedents in platform / tutoring / property; asset seizures in anti-corruption cases."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Common prosperity — third distribution, regional rebalancing, poverty-alleviation campaign declared victory 2021."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "'Three red lines' property-developer prudential regime; fintech re-regulation; Ant Group restructuring."}
outcome_hypotheses:
  - developmentalist_state_growth_performance
  - china_wto_growth_effect
predecessor_movements: [china_hu_era_2002_2012]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Sectoral industrial policy and state-directed credit are developmentalist in form."}
  - {position_id: marxist_leninist, alignment: aligned, notes: "Explicit CCP doctrinal reassertion + party-leadership-of-everything framing."}
  - {position_id: market_socialist, alignment: partially_aligned, notes: "Redistributive 'common prosperity' framing within market-in-form economy."}
  - {position_id: chicago_monetarism, alignment: opposed, notes: "Regulatory unpredictability, property-rights erosion, and SOE reassertion are directly opposed."}
  - {position_id: classical_liberal, alignment: opposed}
  - {position_id: institutionalism, alignment: opposed, notes: "Term-limit removal + CCDI extrajudicial apparatus weaken institutional constraints."}

notes: >
  Ongoing movement; end field left as "ongoing" per schema allowance.
  Populism classification is deliberate — Xi's programme combines
  top-down strongman-nationalist mobilisation, platform-and-elite
  anti-concentration rhetoric, and cultural/demographic conservatism
  that are functionally populist even though elections are not the
  legitimation channel.

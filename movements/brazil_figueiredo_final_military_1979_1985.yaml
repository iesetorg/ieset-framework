movement_id: brazil_figueiredo_final_military_1979_1985
status: candidate
name: "Figueiredo final military — debt crisis, completed abertura"
countries: [BRA]
timeframe: {start: 1979, end: 1985, enacted_date: "1979-03-15"}
coalition: "Military regime (PDS after 1979 party reform); final Sorbonne phase"
leaders:
  - "João Figueiredo (President, General 1979-1985)"
  - "Mário Henrique Simonsen (Planning briefly 1979)"
  - "Delfim Netto (Planning 1979-1985)"
  - "Ernane Galvêas (Finance 1980-1985)"
  - "Antônio Carlos Lemgruber (Banco Central Governor)"
  - "Petrônio Portella (Casa Civil)"
doctrine: >
  Terminal military phase combining acute debt-crisis stabilisation with
  the transition to civilian rule. Four doctrinal phases: (1) 1979-1980
  reflation attempt — Delfim Netto's return to planning ministry with
  heterodox reflation (wage semestral indexation, interest-rate ceilings
  on agricultural credit); inflation accelerated from 40% to 110% and
  Delfim pivoted orthodox in late 1980; (2) 1981-1982 austerity prelude —
  IMF pressure, sharp fiscal retrenchment, industrial recession; (3)
  1982-1985 debt crisis management — Mexican default August 1982
  contagion closed Brazil's external credit; Brazil entered first IMF
  Extended Fund Facility February 1983; January-February 1983 maxi-
  devaluation (30%); seven successive IMF letters of intent; external
  debt peaked USD 104bn (1985), debt-service-to-export ratio ~60%; (4)
  completed political abertura — November 1979 Party Reform dissolved
  ARENA/MDB and created multi-party system; November 1982 direct
  gubernatorial elections; Diretas Já campaign (January-April 1984)
  demanded direct presidential election but Dante de Oliveira amendment
  failed; Tancredo Neves elected by electoral college January 1985
  (died before inauguration; Sarney sworn in 15 March 1985). Stated
  school: orthodox stabilisation with corporatist incomes-policy residue.
  Left-right axis: authoritarian-right on political content, centre-right
  on economic content post-1980 pivot. Popularity / legitimacy: no
  direct presidential election; November 1982 legislative elections —
  first under party reform — PDS retained Chamber (49%) against PMDB
  (43%), PDT (5%), PT (3%); 1984 Diretas Já rallies of 1.3M people in
  São Paulo pressed transition. Coherence line: trade heterodox
  reflation ambition for debt-crisis-compelled orthodoxy while
  completing the political negotiation of the handover to civilian rule.
policies:
  - br_imf_eff_1983
  - br_maxi_devaluation_1983
  - br_party_reform_1979
  - br_direct_state_elections_1982
  - br_delfim_heterodox_reflation_1979_1980
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Post-1982 IMF-compelled public-sector retrenchment."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Continued import licensing; export-promotion subsidies retained."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Exchange controls tightened; debt-service moratorium posture 1987 Sarney flagged."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "Belated orthodoxy 1981-82 after failed 1979-80 reflation."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Party reform 1979; state direct elections 1982; civilian handover January 1985."}
outcome_hypotheses: [debt_crisis_liability_dollarisation, transition_from_authoritarian_rule]
predecessor_movements: [brazil_geisel_abertura_1974_1979]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Delfim's 1979-80 reflation was developmentalist-heterodox; reversed under crisis."}
  - {position_id: post_keynesian, alignment: partially_aligned}
references:
  - "Lei 6767/1979 (Reforma Partidária)"
  - "Emenda Constitucional 22/1982 (eleições diretas para governador)"
  - "Brazil Extended Fund Facility, IMF Executive Board, 28 February 1983"
  - "Bresser-Pereira (1996), Economic Crisis and State Reform in Brazil"
  - "Skidmore (1988), The Politics of Military Rule in Brazil 1964-1985"
notes: "End of military rule; hands over to Sarney / Nova República 15 March 1985."

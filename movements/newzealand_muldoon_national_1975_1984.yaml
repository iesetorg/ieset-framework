movement_id: newzealand_muldoon_national_1975_1984
status: candidate
name: "Muldoon National — Think Big, wage-price freeze, exchange crisis, snap-election collapse"
countries: [NZL]
timeframe: {start: 1975, end: 1984}
coalition: "National Party"
leaders:
  - "Robert Muldoon (Prime Minister and Minister of Finance 1975-1984)"
  - "Hugh Templeton (Trade Minister)"
  - "Lance Adams-Schneider (Industry and Commerce)"
doctrine: >
  Muldoon's National government applied unusually interventionist, state-led
  economic policy during the OECD's transition toward liberalisation.
  Economic school: dirigiste Keynesian-plus — 'Think Big' state-led
  energy/industrial projects (Motunui synthetic fuel, Marsden Point
  expansion, Clyde Dam, NZ Steel Glenbrook) financed by overseas borrowing
  to target energy self-sufficiency post-oil-shocks; June 1982 wage-price
  freeze extended multiple times through 1984; 'carless days' (1979-80);
  extensive import licensing and multi-tier agricultural subsidies
  ('SMPs'). Left-right axis: nominally right (National Party) but
  economically centre-statist — in policy content closer to British
  Labour's Wilson-Callaghan era than to Thatcher. Popularity: 1975
  election 47.6% (landslide over Labour), 1978 39.8% (won on seat-count
  despite losing popular vote), 1981 38.8% (again won on seats),
  14 July 1984 snap election 35.9% losing sharply to Lange Labour
  (43%). Coherence: ideologically distinctive but financially unsustainable —
  current-account deficits, accelerating external debt, pre-election
  FX crisis (July 1984 constitutional crisis over devaluation) triggered
  Rogernomics liberalisation under successor government (already covered
  under nz_rogernomics_1984_1993).
policies:
  - nz_think_big_energy_projects_1977
  - nz_wage_price_freeze_1982
  - nz_carless_days_1979
  - nz_supplementary_minimum_prices_farmers_1978
  - nz_1984_fx_crisis_devaluation
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Think Big borrow-and-build energy projects; agricultural SMP subsidies peaked ~40% of farm income."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Wage-price freeze 1982-84; comprehensive import licensing; state marketing boards."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate, rationale: "Import licensing tightened; CER with Australia signed 1983 is a partial offset."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "External borrowing financed state projects; public debt rose to ~65% of GDP."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "Wage-price freeze rigidified nominal wage structure; compulsory unionism retained."}

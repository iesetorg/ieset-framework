# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: pinochet_chicago_boys_1975_1990
status: candidate
name: Chilean Chicago Boys market reforms under Pinochet
countries:
- CHL
timeframe:
  start: 1975
  end: 1990
coalition: Military dictatorship under Pinochet + Chicago-trained technocrats
leaders:
- Augusto Pinochet (junta leader)
- Sergio de Castro (Finance Minister 1976-1982)
- José Piñera (Labour+Social Security 1978-1980)
doctrine: 'Radical liberalisation programme 1975-1982: trade opening (tariffs from ~94% to 10%),
  SOE privatisations, unilateral FX opening, AFP pension privatisation 1981 (separately coded),
  fiscal discipline, banking liberalisation. 1982 crisis produced severe recession; recovery 1985+
  continued liberalisation under more orthodox framework. Framework codes as market-oriented content
  under authoritarian regime — an important boundary case where institutional quality (rule of
  law, democratic accountability) was NEGATIVE while economic content was market-oriented. Outcome:
  growth acceleration post-1985 but with heavy distributional cost and democratic deficit.

  '
policies:
- chile_trade_opening_1975_1979
- chile_soe_privatisations_1975_1989
- chile_fx_opening_1976
- chile_banking_liberalisation_1977
- chile_afp_1981
axes_summary:
- axis: regulatory.trade_openness
  direction: +
  magnitude: strong
- axis: regulatory.product_market_competition
  direction: +
  magnitude: strong
  rationale: Extensive privatisation + entry-barrier removal.
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  rationale: Banking rules liberalised pre-1982 crisis; re-tightened post-crisis.
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  rationale: Authoritarian regime with severe human rights violations — distinct from market-content
    coding.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: strong
outcome_hypotheses:
- market_reform_growth_effect_authoritarian_vs_democratic
position_alignments:
- position_id: chicago_monetarism
  alignment: aligned
- position_id: austrian
  alignment: partially_aligned
references:
- 'Edwards-Edwards (1991), Monetarism and Liberalization: The Chilean Experiment'
- Valdés (1995), Pinochet's Economists
- French-Davis (2010), Economic Reforms in Chile
notes: Pre-1996 sample extension; framework codes content + institutional-quality dimensions separately
  per Invariant 3.

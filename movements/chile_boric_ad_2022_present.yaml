# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: chile_boric_ad_2022_present
status: candidate
name: "Boric — Apruebo Dignidad + Socialismo Democrático millennial-left government (Chile 2022-present)"
countries: [CHL]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: "2022-03-11"
coalition: "Apruebo Dignidad (Frente Amplio + Partido Comunista + Federación Regionalista Verde Social) joined from July 2022 by Socialismo Democrático (PS + PPD + PR + PL) forming a de facto centre-left + far-left government coalition"
leaders:
  - "Gabriel Boric (President 2022-2026)"
  - "Mario Marcel (Finance Minister 2022-present, former Central Bank Governor)"
  - "Jeannette Jara (Labour Minister 2022-present)"
  - "Giorgio Jackson (Social Development Minister 2022-2023)"
  - "Camila Vallejo (Government Spokesperson)"
  - "Izkia Siches (Interior Minister 2022)"
  - "Carolina Tohá (Interior Minister from 2022)"
doctrine: >
  Millennial-left Frente Amplio plus Partido Comunista alliance,
  expanded from July 2022 to include the Socialismo Democrático
  bloc (PS-PPD-PR-PL) — the historical Concertación centre-left —
  attempting a redistributive transformation constrained by two
  constitutional rejections: the September 2022 exit plebiscite
  on the Convención Constitucional draft (Rechazo 61.9%) and the
  December 2023 exit plebiscite on the Consejo Constitucional draft
  (En Contra 55.8%) leaving the 1980 constitution in force. Stated
  doctrine: "transformation with responsibility" — expand the
  social-rights architecture (pensions, health, housing, labour
  formalisation), strengthen state revenue via extractive-sector
  royalties and wealth-tax reform, reduce the work week, and
  negotiate a new constitutional floor. Enacted files to date:
  mining royalty reform (Ley 21.591, enacted 2 August 2023) with
  a two-pillar ad-valorem + margin component yielding ~0.45% of GDP;
  40-hour work week phased-in reduction (Ley 21.561, signed 14 April
  2023, promulgated May 2023); minimum wage escalations to CLP
  500 000 by July 2024; pension reform (Ley 21.735, enacted
  20 March 2025) introducing a seguro social mutualised component
  (mixed DC with a solidarity DB top-up) and raising employer
  contribution from 0% to 8.5% phased to 2030. Unenacted or
  defeated: the broad tax reform (Reforma Tributaria "Pacto Fiscal")
  rejected by the Cámara in March 2023; the health-sector Isapres
  ruling (Supreme Court, November 2022) forced a legislative rescue
  via the Ley Corta de Isapres; the first constitutional draft
  (Convención Constitucional, September 2022) incorporating
  plurinationality and strong social rights was rejected. Coalition:
  Apruebo Dignidad + Socialismo Democrático held 67/155 Cámara seats
  (43.2%) after the 2021 elections — a structural minority;
  Boric's approval has run in the 30-40% band through most of the
  term with a low in the high 20s in mid-2023. Coherence: core
  labour and mining-royalty planks enacted; pension reform
  delivered in a mixed DC/DB compromise short of the original
  pay-as-you-go aspiration; tax reform defeated; constitutional
  replacement twice rejected, closing that file for the term.
policies:
  - cl_mining_royalty_reform_2023
  - cl_40_hour_work_week_2023
  - cl_pension_reform_ley_21735_2025
  - cl_reforma_tributaria_pacto_fiscal_rechazada_2023
  - cl_ley_corta_isapres_2024
  - cl_plebiscito_constitucional_2022_2023
axes_summary:
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: moderate
    rationale: "Mining royalty (Ley 21.591) added an ad-valorem component plus a mining-margin tier raising effective extractive-sector burden materially."
  - axis: fiscal.tax_progressivity
    direction: "mixed"
    magnitude: weak
    rationale: "Pacto Fiscal broad reform defeated March 2023; only narrow measures (royalty, selected loopholes) enacted; wealth-tax element shelved."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Ley 21.735 pension reform adds a mutualised solidarity / DB top-up component on top of individual accounts; PGU floor raised to CLP 250 000 early in the term."
  - axis: regulatory.labour_market_flexibility
    direction: "-"
    magnitude: moderate
    rationale: "40-hour work week phased reduction from 45; minimum wage escalation; no structural rollback."
  - axis: regulatory.sectoral_licensing
    direction: "-"
    magnitude: weak
    rationale: "Isapres ruling + Ley Corta tightened private-health pricing rules; mining royalty adds regulatory burden on concessions."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: weak
    rationale: "Closure schedule for coal-fired plants retained; lithium national strategy (April 2023) introduces public-private control structure over extraction permits."
  - axis: institutional.property_rights
    direction: "mixed"
    magnitude: weak
    rationale: "Pension reform preserves individual-account balances (no nationalisation) but adds mutualisation; lithium strategy tightens concession architecture."
outcome_hypotheses:
  - welfare_architecture_comparative_effectiveness
predecessor_movements:
  - chile_pinera_ii_2018_2022
  - chile_bachelet_ii_nm_2014_2018
position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: eco_socialist, alignment: partially_aligned, notes: "Lithium national strategy and environmental posture align; coalition constraint limits implementation."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Mario Marcel Finance Ministry is a technocratic-pragmatist anchor inside the coalition."}
disclosure: >
  Roughly 3 years of data at time of spec drafting (March 2022 to
  April 2026). Pre-registration locks the coding so a v1.1 run at
  the 2027 endpoint is meaningful. Author prior on the outcome
  trajectory is mid-range reflecting genuine uncertainty.
references:
  - "Ley 21.591 Royalty Minero (2023)"
  - "Ley 21.561 Reducción de la Jornada Laboral a 40 horas (2023)"
  - "Ley 21.735 Reforma Previsional (2025)"
  - "Sentencia Corte Suprema Isapres (noviembre 2022) + Ley Corta (2024)"
  - "Servicio Electoral de Chile (Servel) — Plebiscito 4 septiembre 2022, Plebiscito 17 diciembre 2023"
  - "Centro de Estudios Públicos — Encuesta CEP 2022-2025 approval series"
  - "IMF Article IV Chile 2023, 2024"
notes: >
  Coded as a structurally-minority reformist government with enacted
  labour + mining + pension planks and defeated tax + constitutional
  planks. Coalition content changed meaningfully July 2022 when
  Socialismo Democrático entered the cabinet; same movement record
  preserved since the governing programme continuity held. Invariant-3
  content-coding does not treat rejected constitutional drafts as
  negative movements on any axis — they are non-events, not rollbacks.

movement_id: us_trump_second_term_2025_present
status: candidate
name: "Trump second term — MAGA-populist economic nationalism (USA)"
countries: [USA]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-01-20"}
coalition: "Republican trifecta — narrow House majority + Senate + presidency. Vance as VP; MAGA-nationalist wing dominant over legacy Chamber-of-Commerce Republicans."
leaders:
  - "Donald Trump (President, second non-consecutive term)"
  - "JD Vance (Vice President)"
  - "Scott Bessent (Treasury Secretary)"
  - "Howard Lutnick (Commerce Secretary)"
  - "Jamieson Greer (USTR)"
  - "Peter Navarro (senior trade counsellor)"
  - "Stephen Miller (deputy chief of staff, immigration)"
  - "Elon Musk (DOGE adviser, exited May 2025)"
  - "Russell Vought (OMB)"
doctrine: >
  MAGA-populist economic-nationalist programme fusing mercantilist tariff-
  restrictionism, supply-side tax continuity, aggressive deregulation,
  interior immigration enforcement, and an executive state-capacity
  conservatism that uses the presidency to discipline what proponents call
  the "administrative state". Right-populist / right-authoritarian in
  left-right terms. Headline actions in first 100 days: the April 2 2025
  "Liberation Day" reciprocal-tariff executive order imposing a 10% baseline
  tariff on all imports plus country-specific tariffs up to 50%
  (subsequently paused, partially escalated against China to 145% then
  negotiated down over summer 2025), IEEPA-justified fentanyl/migration
  tariffs on Canada + Mexico + China (Feb 2025), withdrawal from the Paris
  Agreement, executive orders restoring Schedule F and shrinking agency
  headcount, creation of the Department of Government Efficiency (DOGE)
  led initially by Elon Musk with a mandate to cut ~$2T in outlays
  (subsequently narrowed), large-scale ICE enforcement + Alien Enemies Act
  invocations, CBP enforcement expansion with record-low southern border
  encounters by spring 2025, rollback of Biden student-debt relief and FTC
  merger guidelines, pro-crypto executive orders including a Strategic
  Bitcoin Reserve (March 2025), and a budget-reconciliation push to extend
  expiring TCJA provisions. Popularity: Trump won the 2024 popular vote
  (~49.8% vs Harris ~48.3%, first Republican popular-vote win since 2004);
  approval entered at ~52% in January 2025 and slid into the mid-40s by
  summer 2025 amid tariff-induced market volatility and inflation concerns.
  Coherence line: a coherent economic-nationalist package on trade +
  immigration + executive state-capacity, less internally coherent on
  fiscal policy (tariff revenue + TCJA extension + DOGE cuts versus
  growing deficits) and institutionally disruptive on rule-of-law /
  independent-agency axes.
policies:
  - us_trump2_liberation_day_tariffs_2025
  - us_trump2_ieepa_fentanyl_tariffs_2025
  - us_trump2_doge_executive_order_2025
  - us_trump2_paris_withdrawal_2025
  - us_trump2_immigration_enforcement_eos_2025
  - us_trump2_schedule_f_deregulation_2025
  - us_trump2_strategic_bitcoin_reserve_2025
axes_summary:
  - {axis: regulatory.trade_openness, direction: "-", magnitude: strong, rationale: "Average US effective tariff rose from ~2.5% to >15% after April 2 EO; highest since 1930s Smoot-Hawley era."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: strong, rationale: "Mass interior enforcement, asylum restrictions, CBP border crackdown, Alien Enemies Act invocations."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Rollback of Biden-era regulatory stringency (EPA, SEC climate rule, FTC non-compete + merger guidelines)."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: strong, rationale: "Paris withdrawal, IRA credit claw-back attempts, EPA Chevron-era rule reversals, drill-baby-drill posture."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "DOGE headcount cuts and programmatic reductions offset by TCJA extension + defence/enforcement surges; net direction unclear at this early stage."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Attempts to claw back IRA + CHIPS disbursements; selective re-subsidisation of fossil fuels and critical minerals."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "CFPB neutering, SEC crypto enforcement reversal, Basel III endgame paused."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Pressure on independent agencies (Fed, FTC, NLRB), Schedule F reclassification expanding political appointments, pardons of Jan 6 defendants."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Contested executive impoundments, defiance of lower-court orders in immigration removals, DOJ prosecutorial reshuffles."}
position_alignments:
  - {position_id: developmentalist, alignment: partially_aligned, notes: "Tariffs + industrial protection align in means; populist frame diverges from technocratic developmentalism."}
  - {position_id: austrian, alignment: opposed, notes: "Trade restriction + executive-state expansion contradict Austrian priors even if deregulation aligns."}
  - {position_id: classical_liberal, alignment: opposed}
  - {position_id: chicago_monetarist, alignment: opposed, notes: "Tariff-induced price distortions + Fed-pressure rhetoric contradict monetarist priors."}
references:
  - "Executive Order 14257 'Regulating Imports With a Reciprocal Tariff', April 2 2025"
  - "Executive Orders on IEEPA fentanyl/migration tariffs Feb 2025"
  - "Executive Order establishing the Department of Government Efficiency, January 20 2025"
  - "Paris Agreement withdrawal notification, January 20 2025"
  - "Alien Enemies Act Proclamation, March 15 2025"
  - "Cato Institute and Peterson Institute tariff-impact trackers 2025"
  - "Budget Lab at Yale, tariff distributional analysis 2025"
notes: >
  Coded as a single broad movement capturing the administration's economic-
  nationalist doctrine. Individual headline EOs and legislation will be
  decomposed into child policies as they mature. Framework Invariant 3
  requires coding state intervention under Republican coalition at content
  value — tariffs + executive deregulation + enforcement expansion
  represents a high-activism state-capacity conservatism, not a laissez-
  faire government.

movement_id: uk_energy_cost_regime_2021_2024
status: candidate
name: UK industrial energy cost regime
countries:
- GBR
timeframe:
  start: 2021
  end: 2024
coalition: Conservative successive administrations
doctrine: 'UK industrial electricity prices became the highest in the developed world by 2022-2023 (IEA
  data), driven by: (1) cumulative network-charge structure that loads fixed costs onto industrial users;
  (2) gas-indexed wholesale market even as renewable share grew; (3) net-zero transition costs layered
  on before replacement generation capacity was in place; (4) loss of cheap Russian gas post-2022 without
  diversification buffer. The framework codes this as a movement because the policy content (high environmental
  stringency + weak supply-security posture) is durable across governments and directly impacts manufacturing
  competitiveness.

  '
policies:
- uk_net_zero_transition_2019_2050
- uk_wholesale_market_gas_indexation
- uk_network_charge_structure
axes_summary:
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  rationale: Net-zero by 2050 legally binding; coal phase-out complete; gas phase-out committed.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  rationale: Nuclear build stalled since Hinkley Point C final-approval 2016; North Sea gas production
    decline unaddressed; import dependence rising.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: CfDs for renewable generators; nuclear RAB model; industrial-energy-intensive user support
    schemes.

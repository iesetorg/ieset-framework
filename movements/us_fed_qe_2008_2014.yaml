# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_fed_qe_2008_2014
status: candidate
name: "US Fed quantitative easing"
countries: [USA]
timeframe: {start: 2008, end: 2014}
coalition: "Fed under Bernanke → Yellen; bipartisan tolerance"
leaders: ["Ben Bernanke", "Janet Yellen", "Timothy Geithner (Treasury early)"]
doctrine: >
  Unconventional monetary policy: large-scale asset purchases (QE1-3), zero interest
  rate policy (ZIRP), forward guidance. Prevented 2008-09 financial collapse from
  becoming depression; Fed balance sheet expanded from ~$900B (2008) to ~$4.5T (2014).
  Cited in D.1.5 scope statement: produced asset price inflation but NOT severe
  consumer price inflation — key empirical update to ABCT predictions.
policies: [us_qe1_2008, us_qe2_2010, us_qe3_2012, us_zirp_2008_2015, us_forward_guidance]
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Fed balance sheet 5x growth over period."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Expanded CB operational space; some political pushback."}
outcome_hypotheses: [m2_expansion_correlates_with_asset_price_inflation, fiat_expansion_erodes_currency_purchasing_power_long_run]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: austrian, alignment: opposed, notes: "Predicted inflation that didn't arrive on schedule; empirical update in D.1.5."}
  - {position_id: post_keynesian, alignment: partially_aligned}
steelman: movements/steelman/us_fed_qe_2008_2014.md
references:
  - "Bernanke, The Courage to Act (2015)"
  - "Gagnon et al. (2011), Fed staff working paper on QE"

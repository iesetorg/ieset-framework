movement_id: newzealand_luxon_coalition_2023_present
status: candidate
name: "Luxon National-ACT-NZ First coalition — Ardern-era reversal (NZ 2023-present)"
countries: [NZL]
timeframe: {start: 2023, end: ongoing}
coalition: "National-ACT-NZ First three-party coalition (68/123 seats)"
leaders: ["Christopher Luxon (PM, National)", "Nicola Willis (Finance, National)", "David Seymour (ACT)", "Winston Peters (NZ First)"]
doctrine: >
  Centre-right three-way coalition (National 48 + ACT 11 + NZ First 8,
  68/123 seats) formed November 2023 on an explicit repeal-and-reverse
  agenda. Economic posture: market-liberal with fiscal tightening under
  Finance Minister Nicola Willis, personal-income tax cuts in Budget
  2024 (bracket-shift plus FamilyBoost childcare rebate), targeted
  public-sector headcount cuts (~6,500 roles across ministries 2024),
  and the Fast-Track Approvals Act 2024 accelerating infrastructure /
  mining / housing consents. Systematic rollback of Ardern-era signature
  policies: Three Waters reform repealed (Dec 2023), Fair Pay Agreements
  repealed (Dec 2023), Māori Health Authority disestablished (Feb-Jun
  2024), Smokefree 2025 generational tobacco ban repealed (Feb 2024),
  Clean Car Discount scrapped, RBNZ dual mandate narrowed back to
  price-stability (Dec 2023). ACT's Treaty Principles Bill advanced to
  first reading then defeated at second reading (Apr 2025) after record
  public submissions. Tough-on-crime posture (gang patch ban, three
  strikes restored). Coherence line: a content-consistent market-
  liberal, Crown-unitary, environment-light programme — the clearest
  single-direction axis reversal in NZ since Rogernomics, but delivered
  by a centre-right coalition rather than a Labour one.
policies:
  - nz_luxon_tax_cut_budget_2024
  - nz_fast_track_approvals_act_2024
  - nz_three_waters_repeal_2023
  - nz_fair_pay_agreements_repeal_2023
  - nz_maori_health_authority_repeal_2024
  - nz_smokefree_generation_repeal_2024

movement_id: greece_samaras_nd_pasok_2012_2015
status: candidate
name: "Greece Samaras ND-PASOK national-unity coalition 2012-2015"
countries: [GRC]
timeframe:
  start: 2012
  end: 2015
  enacted_date: "2012-06-20"
coalition: "New Democracy (ND) + PASOK + DIMAR (Democratic Left, until June 2013 when it exited over ERT closure); from mid-2013 ND-PASOK two-party coalition"
leaders:
  - "Antonis Samaras (PM, ND leader)"
  - "Evangelos Venizelos (Deputy PM, Foreign Minister, PASOK leader)"
  - "Yannis Stournaras (Finance Minister July 2012-June 2014, then Bank of Greece Governor)"
  - "Gikas Hardouvelis (Finance Minister June 2014-January 2015, academic technocrat)"
  - "Fotis Kouvelis (DIMAR leader, until June 2013 exit over ERT closure)"
doctrine: >
  Centrist ND-PASOK national-unity programme implementing the Second
  and Third Memorandum prior actions with the stated goal of returning
  Greece to sovereign-market funding and ending the adjustment
  programme. Stated doctrine: the 2010-2012 adjustment had been
  botched by delayed implementation and bank-deposit flight; a broad
  governing coalition with technocratic finance ministry leadership
  could credibly execute the Second Memorandum (€130bn February 2012),
  complete PSI-era debt restructuring, recapitalise the four systemic
  banks, reach primary surplus, and graduate from the programme.
  On the left-right axis the coalition sat centre / centre-right on
  economic dimensions (executing Memorandum-mandated labour, pension,
  and product-market reforms) while centrist-institutionalist on
  political dimensions (preserving constitutional order against
  Golden Dawn and early SYRIZA surge pressure). Key policies with
  dates: PSI debt exchange completed March-April 2012 (~€100bn
  private-sector haircut, 53.5% nominal, c.75% NPV); Second Economic
  Adjustment Programme (Second Memorandum) signed 14 March 2012 under
  Papademos interim government, executed primarily under Samaras
  from June 2012; ENFIA property tax introduced as unified property
  levy (Law 4223/2013, effective 2014) replacing the ad hoc
  electricity-bill property tax of 2011-2013; minimum wage cut to
  €586 (€510 for under-25s) under Memorandum prior actions (February
  2012, predecessor caretaker); labour reform bundle (Law 4046/2012
  and subsequent) reducing severance, loosening sectoral collective
  bargaining extension, reducing dismissal notice, cutting unit labour
  costs ~20% 2010-2014; OSE/TRAINOSE restructuring preparing sale;
  ERT public broadcaster closure (Legislative Act 11 June 2013,
  triggered DIMAR exit); bank recapitalisation via HFSF (€50bn
  earmarked, ~€25bn utilised 2013-2014, four systemic banks
  Piraeus/Alpha/NBG/Eurobank); primary surplus achieved 2013 (0.4%
  of GDP primary on programme definition, confirmed April 2014);
  first post-crisis five-year bond issuance April 2014 (€3bn at
  4.95%) interpreted at the time as near-graduation; Troika review
  deadlock autumn 2014 triggered presidential-election gambit
  December 2014; failed presidential vote (Stavros Dimas, third-round
  168 votes vs 180 required) triggered snap election 25 January
  2015 which ND lost to SYRIZA. Popularity: June 2012 election ND
  29.7% (129/300 Vouli seats under the 50-seat bonus), PASOK 12.3%
  (33), DIMAR 6.3% (17) — coalition 179 seats. May 2014 EU elections
  SYRIZA 26.6% (first), ND 22.7%, Golden Dawn 9.4%, PASOK-merger
  8.0%. Samaras approval declined steadily from ~35% 2012 to ~25%
  late 2014 as social cost of adjustment concentrated (unemployment
  peaked 27.5% 2013, youth unemployment 58%). January 2015 election
  ND 27.8% (76 seats), losing to SYRIZA's 36.3%. Coherence judgement:
  the most technocratically coherent post-memorandum Greek programme
  on content — labour cost adjustment, bank recapitalisation, primary
  surplus, bond-market return executed in sequence — but the ERT
  closure and Stournaras-to-BoG transition in mid-2014 eroded
  political capital ahead of the presidential vote.
policies:
  - gr_second_memorandum_implementation_2012_2014
  - gr_psi_debt_exchange_2012
  - gr_enfia_property_tax_introduction_2013
  - gr_labour_reform_memorandum_2012_2014
  - gr_bank_recapitalisation_hfsf_2013_2014
  - gr_ert_closure_2013
axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: strong
    rationale: "Primary surplus reached 2013 (~0.4% GDP on programme definition) from primary deficit ~10% 2009; spending cuts ~€20bn 2012-2014."
  - axis: fiscal.tax_progressivity
    direction: "+"
    magnitude: moderate
    rationale: "ENFIA property tax broadened base; solidarity surtax expanded; VAT raised on restaurants and hotels (later partially reversed)."
  - axis: fiscal.transfer_expansion
    direction: "-"
    magnitude: strong
    rationale: "Pension cuts (11% avg above €1,000 under Law 4093/2012); public-sector wage cuts; social transfers narrowed."
  - axis: regulatory.labour_market_flexibility
    direction: "+"
    magnitude: strong
    rationale: "Minimum wage reduced, sectoral collective bargaining extension suspended, severance and dismissal-notice reduced, unit labour costs cut ~20% cumulatively 2010-2014."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: moderate
    rationale: "OECD competition toolkit implemented partially; closed-profession deregulation; TAIPED privatisation portfolio defined."
  - axis: regulatory.financial_deregulation
    direction: "+"
    magnitude: moderate
    rationale: "HFSF recapitalisation and systemic bank consolidation (four pillars); tighter prudential framework; SSM transition preparation 2014."
  - axis: institutional.property_rights
    direction: "-"
    magnitude: moderate
    rationale: "PSI debt exchange imposed on private bondholders (including domestic institutions); tax-arrears confiscation powers expanded."
outcome_hypotheses:
  - structural_reform_absence_and_post_euro_stagnation
predecessor_movements:
  - greek_fiscal_dominance_post_euro_2001
successor_movements:
  - greece_tsipras_syriza_2015_2019
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Memorandum execution discipline, primary surplus attainment, bond-market return April 2014 align with ordoliberal convergence logic."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "PASOK partnership; social transfers narrowed but preserved core architecture."}
  - {position_id: post_keynesian, alignment: opposed, notes: "Pro-cyclical contraction deepened output gap; 2013 unemployment 27.5% implies demand shortfall."}
references:
  - "Second Economic Adjustment Programme for Greece (European Commission, March 2012)"
  - "Law 4046/2012 (Memorandum II implementation)"
  - "Law 4093/2012 (medium-term fiscal framework 2013-2016)"
  - "Law 4223/2013 (ENFIA)"
  - "Bank of Greece Annual Reports 2012, 2013, 2014"
  - "European Commission compliance reviews under Second Programme 2012-2014"
  - "IMF Fifth Review Greece (June 2014)"
notes: >
  Framework codes the Samaras period as a single movement distinct
  from both the preceding Papademos technocratic interim (November
  2011-May 2012) and the succeeding Tsipras-SYRIZA period. DIMAR's
  June 2013 exit over ERT is treated as an intra-movement event, not
  a coalition-change break. The Troika-review collapse of autumn
  2014 and the failed presidential vote of December 2014 mark the
  movement's political end, though policy content continued through
  the 25 January 2015 election.

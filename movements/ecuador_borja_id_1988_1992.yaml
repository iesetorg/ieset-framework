movement_id: ecuador_borja_id_1988_1992
status: candidate
name: "Borja Izquierda Democrática — gradualist stabilisation, CONAIE uprising"
countries: [ECU]
timeframe: {start: 1988, end: 1992, enacted_date: "1988-08-10"}
coalition: "Izquierda Democrática (social-democrat, Socialist International member)"
leaders:
  - "Rodrigo Borja Cevallos (President 1988-1992)"
  - "Jorge Gallardo Zavala (Finanzas)"
  - "Augusto de la Torre (BCE)"
doctrine: >
  Social-democratic Izquierda Democrática government pursuing
  gradualist stabilisation against high inflation inherited
  from Febres-Cordero. Four doctrinal pillars: (a) Gradualist
  heterodoxy — crawling-peg mini-devaluations; 36% CPI (1988)
  → 49% (1989) under shock correction → 54% (1990) → 49%
  (1991) → 60% (1992) — inflation never broken; programmatic
  wage-price concertation "Programa de Estabilización y
  Ajuste." (b) External debt — Brady-Plan negotiation
  progressed but not concluded under Borja (finalised under
  Durán Ballén 1995); IMF Stand-By Arrangements 1988, 1989,
  1991. (c) Indigenous recognition and CONAIE Levantamiento
  Indígena (June 1990) — first national indigenous uprising,
  road blockades across Sierra, demanded constitutional
  recognition, bilingual education, land reform; catalysed
  Ecuadorian indigenous politics. (d) Education reform and
  social investment — Ley de Educación Intercultural Bilingüe
  (1988); conditional transfers expansion; Frente Social
  coordination. Stated school: social-democratic / CEPAL
  reformist; heterodox-gradualist. Left-right: centre-left.
  Popularity: May 1988 runoff 54.0% vs Abdalá Bucaram (PRE)
  46.0%; approval declined from honeymoon ~60% to ~25% by
  exit under stubborn inflation; June 1992 runoff Durán Ballén
  (PUR) 57.3% vs Jaime Nebot (PSC) 42.7%. Coherence: trade
  Washington-Consensus-style shock for gradual adjustment,
  indigenous constitutional recognition, and social programme
  expansion — inflation persistence proved the framework's
  limit.
policies:
  - ec_borja_gradualist_stabilisation_1988_1992
  - ec_conaie_indigenous_uprising_1990
  - ec_bilingual_intercultural_education_1988
  - ec_imf_stand_by_1988_1991
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "Inflation persisted 49-60% per year."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Frente Social coordination; targeted transfer expansion."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Indigenous-bilingual education legal recognition; CONAIE dialogue."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Gradual tariff reduction continued."}
outcome_hypotheses: [gradualist_stabilisation_inflation_persistence, indigenous_mobilisation_institutional_effect]
predecessor_movements: []
successor_movements: [ecuador_duran_ballen_pur_1992_1996]
position_alignments:

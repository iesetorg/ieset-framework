# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: czech_republic_fiala_spolu_2021_2025
status: candidate
name: "Fiala SPOLU + Pirates/STAN coalition 2021-2025"
countries: [CZE]
timeframe: {start: 2021, end: 2025, enacted_date: "2021-12-17"}
coalition: "SPOLU (ODS + KDU-ČSL + TOP 09) + Pirates + STAN — five-party centre-right coalition"
leaders:
  - "Petr Fiala (Prime Minister, ODS, Dec 2021-Oct 2025)"
  - "Petr Pavel (President, March 2023-, defeated Babiš in 2023 run-off)"
  - "Zbyněk Stanjura (Finance Minister)"
  - "Jakub Vlček (Czech National Bank Governor from 2022)"
doctrine: >
  Centre-right coalition that displaced ANO in 2021. Pro-EU,
  pro-NATO, fiscally consolidating after pandemic deficits.
  Major file: 2024 consolidation package — VAT reorganisation
  (15% and 21% bands), windfall tax on energy and banks, pension
  age extension, public-wage restraint. Strong Ukraine support
  including artillery initiative procuring shells globally for
  Kyiv. CNB held high rates (7%) longer than ECB to combat
  post-Covid inflation. Lost October 2025 election to ANO; Fiala
  resigned, succeeded by Babiš ANO-led government.
policies:
  - cz_consolidation_package_2024
  - cz_pension_age_extension_2023
  - cz_ukraine_artillery_initiative_2024
  - cz_windfall_tax_2023
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "2024 consolidation cut structural deficit ~1.5pp of GDP."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: weak, rationale: "Windfall tax on energy and banks raised effective corporate rate on those sectors."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Deeper EU and NATO integration; supply-chain diversification away from RU."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "CNB 7% rate held against political pressure; inflation back to target by 2024."}
predecessor_movements: [czech_republic_babis_ano_first_2017_2021]
position_alignments:
  - {position_id: ordoliberal, alignment: aligned, notes: "Rules-based consolidation, EU-EDP-anchored fiscal discipline, central-bank-independence-respecting high-rate policy."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Consolidation + pension-age extension reduce structural deficit; offset by windfall taxes."}
  - {position_id: eco_socialist, alignment: partially_aligned, notes: "Ukraine artillery initiative + EU Green Deal alignment + post-RU energy diversification toward renewables."}
references:
  - "Fiala government programme declaration, Jan 2022"
  - "Czech consolidation package act, 2023"
notes: "Stub authored to close 2026 atlas-coverage gap for CZE. Successor (Babiš ANO 2025-present) deferred to a separate file."

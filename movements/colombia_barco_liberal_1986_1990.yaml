# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_barco_liberal_1986_1990
status: candidate
name: "Barco Liberal — narco-war, M-19 peace, apertura prelude"
countries: [COL]
timeframe: {start: 1986, end: 1990, enacted_date: "1986-08-07"}
coalition: "Partido Liberal (single-party government after National Front ended)"
leaders:
  - "Virgilio Barco Vargas (President 1986-1990)"
  - "Luis Carlos Galán (Liberal Party leader, assassinated August 1989)"
  - "César Gaviria (Interior Minister, Barco's successor)"
  - "Francisco Ortega (BanRep)"
doctrine: >
  First post-National-Front Liberal government fighting the
  Medellín Cartel war while laying the groundwork for apertura
  económica. Four doctrinal pillars: (a) Guerra contra el
  narcotráfico — Extradition Treaty invoked against Pablo
  Escobar and Los Extraditables; wave of assassinations (Lara
  Bonilla legacy) — Justice Minister (1984 predecessor), editor
  Guillermo Cano (December 1986), Attorney-General Carlos Mauro
  Hoyos (January 1988), presidential candidates Luis Carlos
  Galán (August 1989), Bernardo Jaramillo Ossa (March 1990),
  Carlos Pizarro (April 1990); August 1989 bombing of Avianca
  203 killed 107; "narcoterrorism" coined here. (b) M-19 peace
  process — Acuerdo de Corinto negotiations beginning November
  1988; Palacio de Justicia 1985 legacy under predecessor
  Betancur; demobilisation agreement 9 March 1990; Antonio
  Navarro Wolff led M-19 into electoral politics; Séptima
  Papeleta student movement May 1990 pushed constituent-assembly
  demand. (c) Macro stability with import-substitution winding
  down — Plan de Economía Social (1987); inflation ~25%;
  gradual tariff reduction path; Andean Pact Cartagena
  revitalisation. (d) Social-democratic rhetoric with orthodox
  governance — "Gobierno de Partido / Oposición" ended
  power-sharing; plan nacional de erradicación de la pobreza
  absoluta. Stated school: centrist Liberal + social-democratic
  rhetoric; macro-orthodox. Left-right: centre. Popularity: May
  1986 Barco won 58.3% vs Álvaro Gómez 35.8% — largest
  Liberal margin of the era; approval squeezed by narco
  violence but ~50% throughout; 1990 Liberal candidate Gaviria
  won after Galán's assassination.
policies:
  - co_narco_war_extraditables_1986_1990
  - co_m19_demobilisation_accord_1990
  - co_septima_papeleta_constituent_movement_1990
  - co_plan_economia_social_1987
  - co_barco_gradual_tariff_reduction_1989_1990
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Narcoterrorism killings of presidential candidates, judges, journalists collapsed judicial order in many regions."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "M-19 demobilisation reintegrated the country's second-largest guerrilla into electoral politics."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Gradual tariff reduction plan laid apertura foundation."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Plan de Erradicación de la Pobreza Absoluta."}
outcome_hypotheses: [demobilisation_to_electoral_politics_effect, narco_violence_institutional_erosion]
predecessor_movements: []
successor_movements: [colombia_gaviria_liberal_apertura_1990_1994]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: institutionalism, alignment: partially_aligned}
references:
  - "Acuerdo de Corinto (M-19, March 1990)"
  - "Plan de Economía Social, DNP (1987)"
  - "Palacios (2006), Between Legitimacy and Violence"
notes: "Bridges Betancur-era political violence into the Gaviria apertura."

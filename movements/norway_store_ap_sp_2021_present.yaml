# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: norway_store_ap_sp_2021_present
status: candidate
name: "Støre AP–Sp centre-left minority government (Norway)"
countries: [NOR]
timeframe:
  start: 2021
  end: ongoing
  enacted_date: "2021-10-14"

coalition: "Arbeiderpartiet (AP) + Senterpartiet (Sp) minority — Hurdal platform; SV external budget support 2021-2023; Sp exited February 2025 leaving AP single-party minority under Støre"
leaders:
  - "Jonas Gahr Støre (Statsminister / Prime Minister)"
  - "Trygve Slagsvold Vedum (Finance Minister, Sp, 2021-2025)"
  - "Jens Stoltenberg (Finance Minister, AP, from February 2025)"
  - "Audun Lysbakken / Kirsti Bergstø (SV, supply partners 2021-2023)"

doctrine: >
  (a) Mainstream Nordic social-democracy: preserve the handlingsregel (3%
  real-return spending ceiling on the Government Pension Fund Global) while
  widening redistributive transfers, green-transition industrial policy,
  and resource-rent capture on newly profitable sectors. (b) Left-right axis
  — centre-left on distribution and climate, but institutionally
  conservative on fiscal-rule discipline and NATO / EEA commitments; Sp
  pulled the coalition toward rural-periphery and anti-centralisation
  positioning until its February 2025 exit over EU energy-directive
  adoption. (c) Key policy content: resource-rent (grunnrenteskatt)
  extension to salmon aquaculture (2023, 25% effective rate after
  parliamentary compromise) and to onshore wind (2024, 25%); the
  electricity price-support scheme (strømstøtte) launched December 2021
  and repeatedly extended through 2022-2024 as Nord Pool prices spiked
  post-Russia gas shock; increased CO2 tax trajectory to NOK 2000/t by
  2030; 2024 abortion law reform extending the self-determination limit
  from week 12 to week 18 (Storting vote 2024-05-30); commitment to
  continued handlingsregel discipline and GPFG mandate continuity.
  (d) Popularity — the AP–Sp ticket won 100/169 Storting seats in
  September 2021 (AP 48, Sp 28, SV 13 as supply); approval declined
  through 2022-2024 with AP polling in the mid-high teens (worst for
  AP in the polling era) and heavy losses in the 2023 local elections
  (AP ~21.5%); Sp's February 2025 walkout over EU's Fourth Energy
  Package reset the coalition and produced a Stoltenberg-led Finance
  Ministry ahead of the September 2025 election. (e) Coherence:
  internally consistent social-democratic-with-fiscal-rule package but
  politically strained by the coalition's simultaneous pro-oil /
  anti-centralisation / climate-transition commitments, which the
  salmon and wind resource-rent fights surfaced publicly.

policies:
  - no_salmon_resource_rent_tax_2023
  - no_onshore_wind_resource_rent_tax_2024
  - no_electricity_price_support_stromstotte_2022
  - no_co2_tax_escalator_2021
  - no_abortion_law_reform_2024

axes_summary:
  - {axis: fiscal.tax_capital, direction: "+", magnitude: moderate, rationale: "Resource-rent tax extensions on salmon (25%) and onshore wind (25%) raise taxation of sector-specific economic rents."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Strømstøtte household electricity-cost transfers sustained 2022-2024; expanded child benefit and student-grant uprating."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Handlingsregel discipline preserved — structural non-oil deficit kept within 3% of GPFG rule; Støre government explicit on rule continuity."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "CO2 tax escalator to NOK 2000/t by 2030; updated Climate Act targets; offshore wind concession rounds."}
  - {axis: regulatory.immigration_openness, direction: "0", magnitude: weak, rationale: "Ukrainian collective-protection reception at scale; otherwise limited change to the Solberg-era tightened baseline."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "2024 abortion law reform extending self-determination; procedural continuity."}

predecessor_movements:
  - norway_solberg_rightbloc_2013_2021
successor_movements: []

position_alignments:
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: empirical_pragmatist, alignment: partially_aligned}

references:
  - "Hurdalsplattformen (Hurdal political platform), 13 October 2021"
  - "Prop. 78 LS (2022–2023) — grunnrenteskatt havbruk (salmon resource-rent tax)"
  - "Prop. 2 LS (2023–2024) — grunnrenteskatt landbasert vindkraft (onshore wind resource rent)"
  - "Storting vote on abortion law revision, 30 May 2024"
  - "Finansdepartementet budget proposals 2022-2025; NB-NOU on GPFG mandate continuity"
  - "Statistics Norway / Valgdirektoratet 2023 local election results"

notes: >
  Coded from 2021 Hurdal platform through ongoing single-party AP
  minority phase post-February 2025. Treated as one movement because
  the doctrinal content (social-democracy + fiscal-rule + resource-rent
  capture + climate transition) is continuous across Sp's participation
  and exit. A successor entry may be required after the September 2025
  Storting election depending on post-election coalition composition.

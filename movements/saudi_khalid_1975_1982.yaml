movement_id: saudi_khalid_1975_1982
status: candidate
name: "King Khalid era — oil-boom state-building and post-Grand-Mosque consolidation"
countries: [SAU]
timeframe: {start: 1975, end: 1982}
coalition: "Al Saud royal family; de facto Crown Prince Fahd running day-to-day policy"
leaders:
  - "King Khalid bin Abdulaziz (1975-1982)"
  - "Crown Prince Fahd bin Abdulaziz (de facto prime minister)"
  - "Zaki Yamani (Oil Minister, OPEC hawk/dove swing vote)"
doctrine: >
  Khalid-era doctrine was a high-rent, high-spend state-capitalist development
  model financed by the 1973-74 and 1979 oil price shocks. Economic school:
  rentier state-building with heavy capital spending channelled through the
  Second (1975-80) and Third (1980-85) Five-Year Plans — industrial cities
  Jubail and Yanbu, SABIC (founded 1976) as national-champion petrochemical
  vehicle, SAMA managing a pegged riyal. Left-right axis: absolutist monarchy
  — non-ideological by Western left-right mapping, but clerical-conservative
  on social policy and statist-developmentalist on economic policy with large
  public subsidies, free healthcare/education, and cradle-to-grave citizen
  entitlements. Popularity / legitimacy: no elections; the Grand Mosque
  seizure (20 November 1979) and Qatif Shia uprising (late 1979) exposed
  legitimacy fractures and prompted a sharp turn toward religious-establishment
  empowerment — expansion of mutawwa and CPVPV budgets, curriculum
  Islamisation, mass mosque-building overseas. Coherence: oil revenue
  financed simultaneous physical industrialisation, welfare expansion, and
  religious entrenchment without needing fiscal trade-offs — coherent while
  oil prices held.
policies:
  - sa_second_five_year_plan_1975
  - sa_sabic_founding_1976
  - sa_grand_mosque_religious_empowerment_1979
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Second and Third Five-Year Plans pushed capital spending to record levels financed by oil rent."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "SABIC, Jubail, Yanbu industrial-city subsidies; consumer energy and food subsidies."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "National-champion model under SABIC; heavy licensing regime."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Post-1979 empowerment of religious police and clerical establishment narrowed rule-based governance."}

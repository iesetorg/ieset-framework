# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: afg_pdpa_saur_socialist_state_1978
status: candidate
name: PDPA Saur Socialist State
countries:
- AFG
timeframe:
  start: 1978
  end: 1992
coalition: People's Democratic Party of Afghanistan
leaders:
- Nur Muhammad Taraki
- Hafizullah Amin
- Babrak Karmal
- Mohammad Najibullah
doctrine: The PDPA governments that followed the Saur Revolution sought to transform Afghanistan through socialist state power, land redistribution, mass literacy and women's emancipation programmes, state-led planning, and alignment with Soviet assistance, later moderating some revolutionary measures under national reconciliation while retaining a party-state war economy.
policies:
- afg_land_reform_decree_8_1978
- afg_literacy_womens_reforms_1978
- afg_soviet_aid_war_planning_1979_1992
axes_summary:
- axis: institutional.property_rights
  direction: '-'
  magnitude: strong
  rationale: Land reform and revolutionary decrees cancelled debts and redistributed property through state authority.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: moderate
  rationale: Literacy, education, and social programmes expanded state social provision ambitions.
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: Soviet-backed war mobilisation and state planning increased public command over resources.
- axis: regulatory.product_market_competition
  direction: '-'
  magnitude: moderate
  rationale: Planning, state enterprises, and war administration narrowed ordinary market allocation.
position_alignments:
- position_id: marxist_leninist
  alignment: aligned
  notes: PDPA rule was an explicitly Soviet-aligned Marxist-Leninist party-state project with land redistribution, state planning, and war-economy mobilisation.
- position_id: marxian
  alignment: partially_aligned
  notes: Class-conflict and anti-feudal land-reform framing drew on Marxian categories, though implementation was mediated through a Leninist party-state and civil war.
- position_id: developmentalism
  alignment: partially_aligned
  notes: Literacy, women's education, and state-led modernisation ambitions overlap with developmentalist goals, but coercive party-state planning and Soviet dependency dominate the movement coding.
references:
- Barnett R. Rubin (2002), The Fragmentation of Afghanistan
- Olivier Roy (1990), Islam and Resistance in Afghanistan
- "Thomas Barfield (2010), Afghanistan: A Cultural and Political History"
notes: The movement spans multiple PDPA leaders; policy implementation varied sharply because of insurgency, Soviet intervention, and later Najibullah-era moderation.

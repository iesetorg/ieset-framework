movement_id: uruguay_vazquez_ii_fa_2015_2020
status: candidate
name: "Vázquez II Frente Amplio — consolidation with macro-orthodoxy 2015-2020"
countries: [URY]
timeframe: {start: 2015, end: 2020, enacted_date: "2015-03-01"}
coalition: "Frente Amplio (FA) — third consecutive term, majority in both chambers"
leaders:
  - "Tabaré Vázquez (President, sworn 1 March 2015)"
  - "Raúl Sendic (Vice-President, 2015-2017, resigned)"
  - "Lucía Topolansky (Vice-President, 2017-2020)"
  - "Danilo Astori (Economy and Finance)"
  - "Mario Bergara (Central Bank President, then Economy)"
doctrine: >
  Frente Amplio consolidation phase: centre-left social-democratic doctrine
  maintaining Vázquez-I / Mujica-era social-rights expansion while anchoring
  the macro frame with Astori-school fiscal orthodoxy and large-industry
  FDI attraction. Left-right axis: centre-left on distribution and rights,
  centrist on macro management — an explicit continuity of inflation-targeting,
  central-bank independence, and investor-friendly signalling. Key policy
  content: (i) 2015 tax adjustment (Ley 19.333) raising top personal-income
  brackets and IASS pension tax to close a deficit widening under soft
  commodity prices; (ii) UPM-2 pulp mill investment contract signed
  November 2017 — ~US$3bn Finnish greenfield cellulose plant plus ~US$1bn
  state rail (Ferrocarril Central) co-investment, largest single FDI in
  Uruguayan history; (iii) cannabis market operational rollout — pharmacy
  sales began July 2017 under Ley 19.172 framework inherited from Mujica;
  (iv) education-reform attempts (ANEP governance, teacher-evaluation) that
  stalled against union resistance; (v) sustained social-transfer programs
  (Asignaciones Familiares Plan de Equidad, Tarjeta Uruguay Social); (vi)
  fiscal-deficit drift from ~3.5% to ~4.7% of GDP by 2019 triggering
  investor-grade anxiety; (vii) renewable-electricity buildout completed
  (~97% non-fossil generation by 2017). Popularity: Vázquez elected
  53.6% runoff November 2014; FA held 50/99 Diputados and 15/30 Senado;
  approval slid from ~60% early term to ~40s by 2019 on crime, fiscal,
  and education discontent — contributing to FA's 2019 runoff loss.
  Coherence line: "social continuity plus macro-orthodoxy plus UPM-anchor" —
  mature social-democracy banking on large-industry FDI.
policies:
  - uy_tax_reform_2015
  - uy_upm_ii_pulp_mill_contract_2017
  - uy_cannabis_market_rollout_2017
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "2015 Ley 19.333 raised top personal IRPF brackets and IASS pension tax."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "UPM-2 contract with ~US$1bn rail co-investment and tax-free-zone regime constitutes large sector-specific state commitment."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Cannabis market legal rollout opened new regulated product market."}
  - {axis: regulatory.environmental_stringency, direction: "0", magnitude: weak, rationale: "Renewables buildout largely inherited; UPM-2 environmental licensing was permissive."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "Inflation-targeting framework maintained; no structural change."}

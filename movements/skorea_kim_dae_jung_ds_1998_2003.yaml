movement_id: skorea_kim_dae_jung_ds_1998_2003
status: candidate
name: Kim Dae-jung — Sunshine Policy and IMF-conditioned chaebol reform (1998-2003)
countries:
- KOR
timeframe:
  start: 1998
  end: 2003
  enacted_date: '1998-02-25'
coalition: National Congress for New Politics (NCNP) then Millennium Democratic Party (MDP) —
  DJP coalition with Kim Jong-pil's United Liberal Democrats (dissolved 2001)
leaders:
- Kim Dae-jung (President 25 Feb 1998 - 25 Feb 2003)
- Lee Hun-jai (FSC Chair, chaebol-restructuring architect)
- Kang Bong-kyun → Jin Nyum (Finance-Economy Minister)
- Chun Chul-hwan → Park Seung (BoK Governor)
doctrine: 'Kim Dae-jung Sunshine Policy plus IMF-conditioned chaebol reform — a centre-left democratic
  mandate taking office during the December 1997 IMF bailout ($58bn package), combining engagement-with-North-
  Korea foreign policy with neoliberal crisis-resolution content at home. Economic school: IMF-Washington-Consensus
  conditionality forced externally, layered with social-insurance expansion and industrial-policy
  shift toward the "four-pillar" IT sector (telecom, semiconductors, broadband, digital content).
  Centre-left with progressive foreign policy, orthodox liberal on crisis resolution. Key policy
  content: (i) IMF programme conditions — raised interest rates to 30%+ February 1998, forex-market
  full liberalisation, foreign-investment cap lifted, M&A opened to foreigners; (ii) Chaebol "Five
  Plus Three" principles December 1998 — Big Deal swaps (Hyundai Electronics-LG Semicon, Samsung
  Motors-Renault), debt-to-equity caps 200%, cross-guarantee elimination, combined-financial-statement
  disclosure, controlling-family accountability; (iii) Daewoo collapse August 1999 — Kim Woo-jung''s
  chaebol broken up, ~$70bn NPL written down; (iv) National Basic Livelihood Security Act 1999
  (effective October 2000) — first statutory poverty-line minimum income; (v) National Health
  Insurance unified 2000 — merger of occupational schemes into single-payer; (vi) Sunshine Policy:
  June 2000 Pyongyang summit with Kim Jong-il (first-ever inter-Korean summit), Mt Kumgang tourism,
  Kaesong industrial complex agreement 2003; Kim Dae-jung Nobel Peace Prize 2000; (vii) Cyber-Korea
  21 plan 1999 — $11bn broadband rollout making ROK world''s highest-penetration broadband by
  2002. Popularity: December 1997 election won 40.3% (KDJ) vs Lee Hoi-chang 38.7%; approval ~80%
  in 1998-99 crisis recovery, ~30% by 2002 on "Hyundai slush-fund" scandal and son corruption
  cases. Coherence line: crisis-forced chaebol liberalisation plus social-insurance floor plus
  Sunshine engagement — the model Roh Moo-hyun would continue on foreign policy but pivot on trade.

  '

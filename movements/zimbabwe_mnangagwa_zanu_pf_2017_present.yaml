  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Patriotic Act 2023; opposition harassment; SADC-flagged 2023 election irregularities."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Mining-sector indigenisation regime; lithium-export levy; discretionary licensing in critical minerals."}
predecessor_movements: [zimbabwe_mugabe_land_reform_hyperinflation_2000_2008]
position_alignments:

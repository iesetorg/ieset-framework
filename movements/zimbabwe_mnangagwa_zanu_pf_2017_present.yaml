movement_id: zimbabwe_mnangagwa_zanu_pf_2017_present
status: candidate
name: "Mnangagwa ZANU-PF 'Second Republic' 2017-present"
countries: [ZWE]
timeframe: {start: 2017, end: ongoing, enacted_date: "2017-11-24"}
coalition: "Zimbabwe African National Union — Patriotic Front (ZANU-PF), dominant after 2018 and 2023 contested elections"
leaders:
  - "Emmerson Mnangagwa (President, ZANU-PF, Nov 2017-, succeeded Mugabe by military intervention, won 2018 and 2023 elections)"
  - "Constantino Chiwenga (Vice President; former general who led 2017 intervention)"
  - "Mthuli Ncube (Finance Minister, 2018-)"
  - "John Mushayavanhu (RBZ Governor from 2024)"
doctrine: >
  ZANU-PF "Second Republic" after the November 2017 military
  intervention removed Mugabe. Programme: National Development
  Strategy 1 (NDS1, 2021-2025) and NDS2 succeeding —
  ostensibly pro-business "Zimbabwe is open for business"
  rhetoric. Major files: 2019 currency reform reintroducing
  the Zimbabwe dollar (ZWL); persistent hyperinflation episodes
  through 2020-2024; ZiG (Zimbabwe Gold) currency launched
  April 2024 backed by gold and forex reserves to replace ZWL,
  with mixed credibility outcomes; agricultural-land
  compensation deal with white former farmers ($3.5bn over
  multi-year horizon, partly issued); patronage-style indigenous
  mining and land-allocation regime. Politically: 2018 and
  2023 elections both contested by SADC and EU observer missions
  for irregularities; opposition CCC under Chamisa fragmented
  by ZANU-PF-aligned faction; civic-space restrictions
  (Patriotic Act 2023). External: under continuing US-EU
  targeted sanctions; arrears clearance dialogue with World
  Bank, AfDB, IMF ongoing through 2024-2025 without resolution.
policies:
  - zw_zig_currency_launch_2024
  - zw_zwl_currency_reform_2019
  - zw_land_compensation_deal_2020
  - zw_nds1_2021_2025
  - zw_patriotic_act_2023

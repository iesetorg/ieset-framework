# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: france_sarkozy_ump_2007_2012
status: candidate
name: "Sarkozy UMP presidency — centre-right Gaullist 'rupture' (France)"
countries: [FRA]
timeframe: {start: 2007, end: 2012, enacted_date: "2007-05-16"}
coalition: "Union pour un Mouvement Populaire (UMP) with Nouveau Centre; UMP+allies comfortable Assemblée majority (~345/577 from June 2007)"
leaders:
  - "Nicolas Sarkozy (President 2007-2012)"
  - "François Fillon (PM 2007-2012)"
  - "Christine Lagarde (Economy/Finance 2007-2011)"
  - "François Baroin (Finance 2011-2012)"
  - "Éric Woerth (Budget/Labour; architect of 2010 pension reform)"
doctrine: >
  Centre-right Gaullist presidency branded as "rupture" with the French
  social-liberal equilibrium — campaigning on "travailler plus pour
  gagner plus", security, and state-reform, while remaining within
  the Fifth-Republic statist-executive tradition. Left-right axis:
  centre-right, with a clear pro-work/pro-capital tilt and Atlanticist
  foreign-policy re-alignment (NATO integrated command re-entry 2009).
  Signature content: Loi TEPA (Travail, Emploi, Pouvoir d'Achat) of
  21 August 2007 — overtime-hours income-tax and social-contribution
  exemption ("défiscalisation des heures supplémentaires"), inheritance-
  tax exemption for spouses and €150k/child threshold, mortgage-interest
  tax credit, ISF bouclier fiscal capping total direct tax at 50% of
  income; RGPP (Révision générale des politiques publiques) 2007-2012
  non-replacement of one retiring civil servant in two; university
  autonomy LRU law 10 August 2007; 2008 Loi de modernisation de
  l'économie (LME); 2008-2009 crisis response — bank recapitalisation
  SPPE, €26bn Plan de relance December 2008, GM/PSA/Renault support; 2010
  pension reform raising legal age 60 → 62 and full-rate age 65 → 67
  (enacted 9 November 2010 amid mass protests); auto-entrepreneur status
  2009; TVA sociale / CSG-labour cost shift partially enacted late-mandate;
  nuclear and EPR continuation. Popularity: 1st-round 31.2% / 2nd-round
  53.1% May 2007 vs Royal; approval from ~65% honeymoon 2007 to ~32-35%
  by late 2008 post-Bling-bling / bouclier fiscal controversy, recovering
  modestly during 2008-2009 crisis management, sagging to ~30% during
  2010 pension reform, ending at ~36% pre-election; 1st-round 27.2% /
  2nd-round 48.4% May 2012, losing to Hollande. UMP retained Assemblée
  majority throughout the mandate. Coherence judgement: doctrinally
  consistent pro-work, pro-capital, state-reform programme executed
  at scale (TEPA, RGPP, pensions) but compromised in perception by the
  bouclier fiscal distributional optics and by the 2008-2011 pivot to
  crisis-era interventionism and fiscal consolidation that muted the
  original supply-side story.
policies:
  - fr_tepa_2007
  - fr_lru_university_autonomy_2007
  - fr_rgpp_2007
  - fr_lme_2008
  - fr_plan_relance_2008
  - fr_pension_reform_2010
  - fr_auto_entrepreneur_2009
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "Bouclier fiscal (50% cap on direct tax/income); inheritance-tax exemptions; overtime tax/social exemption."}
  - {axis: fiscal.tax_capital, direction: "-", magnitude: moderate, rationale: "Inheritance-tax thresholds raised; ISF bouclier fiscal shield."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Loi TEPA overtime exemption relaxed 35-hour wall; 2008 rupture conventionnelle; 2010 pension-age increases."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "2008-2009 Plan de relance €26bn + bank recap; post-2010 fiscal consolidation only partially offset."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "LME 2008 easing entry/retail-pricing rules; auto-entrepreneur regime."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "LRU university autonomy institutional reform; no material change to judicial independence."}
outcome_hypotheses: [schroder_style_reform_effectiveness]
successor_movements: [france_hollande_ps_2012_2017]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: ordo_liberal, alignment: partially_aligned, notes: "Pension-reform and RGPP fiscal-discipline content."}
  - {position_id: social_democratic, alignment: opposed}
references:
  - "Loi n° 2007-1223 du 21 août 2007 en faveur du travail, de l'emploi et du pouvoir d'achat (TEPA)"
  - "Loi n° 2007-1199 du 10 août 2007 relative aux libertés et responsabilités des universités (LRU)"
  - "Loi n° 2008-776 du 4 août 2008 de modernisation de l'économie (LME)"
  - "Loi n° 2010-1330 du 9 novembre 2010 portant réforme des retraites"
  - "Ministère de l'Intérieur — résultats présidentiels 2007, 2012; législatives juin 2007"
  - "Cour des Comptes, Rapports annuels 2008-2012"
notes: >
  Covers the full Sarkozy presidency. Predecessor to
  france_hollande_ps_2012_2017. The 2008-2009 crisis-response policies
  are coded as part of this movement even though they partially reversed
  the original supply-side doctrinal direction.

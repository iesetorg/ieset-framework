# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: equatorial_guinea_obiang_hydrocarbon_transparency_state_2019_present
status: candidate
name: "Obiang hydrocarbon transparency and legal-modernisation state 2019-present"
countries: [GNQ]
timeframe: {start: 2019, end: ongoing, enacted_date: "2019-12-18"}
coalition: "Democratic Party of Equatorial Guinea (PDGE)"
leaders:
  - "Teodoro Obiang Nguema Mbasogo (President, 1979-present)"
  - "Manuela Roka Botey (Prime Minister, 2023-present)"
doctrine: >
  Equatorial Guinea's current policy package responds to hydrocarbon depletion
  and fiscal pressure by combining IMF-backed transparency commitments, legal
  modernization, and local-content regulation for the oil and gas economy.
  The model remains a centralized hydrocarbon-rent state but adds formal fiscal,
  criminal-law, and sectoral rules around that structure.
policies:
  - gnq_imf_eff_2019
  - gnq_hydrocarbons_local_content_regulation_2020
  - gnq_death_penalty_abolition_penal_code_2022
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The IMF EFF required consolidation after the hydrocarbon-revenue downturn."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "The EFF governance package and Penal Code reform add formal transparency and rights constraints."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Hydrocarbon local-content rules tighten state conditions on operators, procurement, and employment."}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: weak, rationale: "Local-content requirements reserve more activity for domestic participation inside the hydrocarbon supply chain."}
references:
  - "IMF, Republic of Equatorial Guinea Extended Fund Facility and Article IV materials."
  - "Republic of Equatorial Guinea, Ministry of Mines and Hydrocarbons local-content regulation materials."
  - "United Nations and OHCHR reporting on Equatorial Guinea's 2022 abolition of the death penalty."

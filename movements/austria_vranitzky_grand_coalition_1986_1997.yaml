movement_id: austria_vranitzky_grand_coalition_1986_1997
status: candidate
name: "Vranitzky SPÖ-ÖVP grand coalition — EU accession and ÖIAG privatisation 1986-1997"
countries: [AUT]
timeframe: {start: 1986, end: 1997}
coalition: "SPÖ-ÖVP grand coalition (große Koalition) re-established November 1986 after Haider's FPÖ turn; renewed 1990, 1994, 1995"
leaders:
  - "Franz Vranitzky (Federal Chancellor, SPÖ, 1986-1997)"
  - "Alois Mock (Vice-Chancellor/Foreign Minister, ÖVP, 1987-1995)"
  - "Ferdinand Lacina (Finance Minister, SPÖ, 1986-1995)"
  - "Viktor Klima (Finance Minister 1995-1997, then Chancellor)"
  - "Wolfgang Schüssel (Vice-Chancellor ÖVP 1995-)"
doctrine: >
  Vranitzky's eleven years defined Austria's convergence with
  European norms — EU accession, privatisation of the
  verstaatlichte-Industrie, fiscal consolidation for Maastricht,
  and the political-institutional containment of Haider's FPÖ.
  Economic school: Austro-Social-democratic corporatism merging
  with EU-convergence neoliberalism — hard-schilling peg, SGP-
  compliance, ÖIAG-privatisation programme. Left-right axis:
  centre, slightly right of Kreisky due to privatisation and
  EU-convergence. Core policy content: (i) 1987 grand-coalition
  programme including income-tax reform (top rate cut
  62→50%) and VAT-rate rationalisation; (ii) ÖIAG-Anstaltsgesetz
  1993 restructured state-holding company; listings of OMV
  (1987/1994), VA Tech (1995), Austria Tabak (1997);
  (iii) 1989 EU-membership application, 1994 accession treaty,
  12 June 1994 referendum 66.6% yes, accession 1 January 1995 —
  largest affirmation of any EU-accession referendum;
  (iv) Maastricht-convergence fiscal consolidation —
  "Sparpaket" 1995-1996 packages after second 1995 election,
  cutting ~2.5% of GDP; (v) 1993-1995 banking-sector
  reorganisation (Bank Austria acquires Creditanstalt 1997);
  (vi) hard-currency peg maintained 1981-1999 then euro
  founder-member via Klima-Schüssel; (vii) second grand
  coalition 1994 collapsed December 1995 on budget; new election
  December 1995 strengthened SPÖ and stabilised coalition.
  Popularity: 1986 SPÖ 43.1%, 1990 42.8%, 1994 34.9%, 1995
  38.1%; FPÖ rose from 9.7% to 21.9% over the period as
  containment eroded. Vranitzky resigned January 1997. Coherence:
  very high — EU accession, privatisation, Maastricht and
  Haider-containment formed a unified programme that transformed
  Austria from neutralist-corporatist periphery to euro founder.

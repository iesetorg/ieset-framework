# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bulgaria_rule_of_law_schengen_push_2023_present
status: candidate
name: "Bulgaria rule-of-law and Schengen push 2023-present"
countries: [BGR]
timeframe: {start: 2023, end: ongoing}
coalition: "Caretaker and parliamentary reform continuity through Denkov-Gabriel and Zhelyazkov governments"
leaders:
  - "Nikolai Denkov (Prime Minister, 2023-2024)"
  - "Mariya Gabriel (Deputy Prime Minister, 2023-2024)"
  - "Rosen Zhelyazkov (Prime Minister, 2025-present)"
doctrine: >
  Bulgaria's current EU-integration policy surface is less a stable party
  programme than a state-continuity push through caretaker and coalition
  governments. The enacted cluster combines whistleblower protection,
  anti-corruption institutional restructuring, and completion of Schengen land
  border accession with Romania, all framed around EU rule-of-law and acquis
  compliance conditions.
policies:
  - bg_whistleblower_protection_act_2023
  - bg_anticorruption_commission_reform_2023
  - bg_ro_schengen_land_borders_2025
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Whistleblower channels and anti-corruption commission reform strengthen detection and enforcement infrastructure."}
  - {axis: institutional.judicial_independence, direction: mixed, magnitude: weak, rationale: "Anti-corruption restructuring opened new channels while appointment and prosecutorial-dependence concerns remain."}
  - {axis: regulatory.immigration_openness, direction: "+", magnitude: moderate, rationale: "Schengen land-border accession lifted internal border checks on persons with and between Bulgaria and Romania."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Removal of land-border checks lowered passenger and freight frictions with Schengen partners."}
references:
  - "Bulgaria Protection of Persons Reporting or Publicly Disclosing Information on Breaches Act, State Gazette No. 11/2023."
  - "Bulgaria Counter-Corruption Act, State Gazette No. 84/2023."
  - "Council of the EU, Schengen land-border decision for Bulgaria and Romania, December 2024."

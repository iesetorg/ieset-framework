movement_id: finland_vanhanen_centre_first_2003_2007
status: candidate
name: "Vanhanen Centre-led I coalition 2003-2007"
countries: [FIN]
timeframe: {start: 2003, end: 2007, enacted_date: "2003-06-24"}
coalition: "Keskusta-SDP-RKP (Centre-Social Democrats-Swedish People's)"
leaders:
  - "Matti Vanhanen (Prime Minister, Keskusta, 2003-2010)"
  - "Antti Kalliomaki (Finance Minister, SDP, 2003-2005)"
  - "Eero Heinaeluoma (Finance Minister, SDP, 2005-2007)"
doctrine: >
  Vanhanen Centre-led consensus-coalition governance at the Nordic peak —
  euro-area convergence consolidation, Nokia-driven export boom, and
  income-policy agreements (tulopoliittiset kokonaisratkaisut) signed
  centrally with the labour-market partners. Economic school: Finnish
  consensus neo-corporatist — fiscal balance, euro-area discipline,
  trilateral tupo-agreements. Left-right axis: centre. Dated policies:
  tupo income-policy agreement (Nov 2004, 2.5% wage settlement over two
  years + tax-cut package), 2005 pension reform effective (raised
  effective retirement age, life-expectancy coefficient), 2006 Presidential
  election (Halonen re-elected), 2007 municipal reform PARAS framework
  (Laki kunta- ja palvelurakenneuudistuksesta, 9 Feb 2007). Popularity:
  Keskusta won 2003 election narrowly (24.7% seats 55) and narrowly
  re-elected 2007 (23.1% seats 51 — Kokoomus pulled ahead, but Vanhanen
  continued). Coherence: high — formal tripartite tupo discipline anchored
  wage/tax coordination.
policies:
  - fi_tupo_income_policy_2004
  - fi_pension_reform_2005
  - fi_paras_municipal_reform_2007
  - fi_nokia_export_peak_era_2003_2007
axes_summary:

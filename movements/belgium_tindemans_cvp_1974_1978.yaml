movement_id: belgium_tindemans_cvp_1974_1978
status: candidate
name: "Tindemans CVP/PSC-led coalitions (Belgium)"
countries: [BEL]
timeframe: {start: 1974, end: 1978}
coalition: "CVP/PSC Christian-democrat with PRLW/PVV liberals (Tindemans I, 1974-1977); then CVP/PSC-BSP/PSB-FDF/VU (Tindemans II Egmont Pact, 1977-1978)"
leaders:
  - "Leo Tindemans (PM, 25 April 1974 - 20 October 1978)"
  - "Willy De Clercq (Finance Minister 1974-1977)"
  - "Gaston Geens (Finance Minister 1977-1978)"
  - "André Vlerick (Finance secretary)"
doctrine: >
  Christian-democrat-liberal crisis-management premiership across the
  first oil shock, stagflation, and linguistic-constitutional pressures.
  Economic school: Belgian Christian-democratic sociale markteconomie
  (CVP/PSC tradition) with liberal-economy wing via PRLW/PVV 1974-77 —
  less disciplined than Dutch CDA analogue because the ethnic-linguistic
  political cleavage absorbed reform capacity. Left-right axis: centre
  to centre-right first cabinet, moving centre-left in 1977 with BSP/PSB;
  institutional focus dominates economic-axis positioning. Key content:
  (i) 1974 Rixensart declaration on linguistic-regional reform;
  (ii) Law of 15 July 1976 on economic expansion — investment-credit
  scheme with regional targeting (Flanders, Wallonia); (iii)
  Globalisation Law 19 July 1974 consolidating public expenditure
  framework; (iv) energy-crisis response — oil-price pass-through,
  speed limits, continuation of nuclear programme (Doel and Tihange
  plants commissioned 1974-1975+); (v) public-debt acceleration —
  debt/GDP 52% (1974) → 69% (1978) under combined transfer expansion and
  stagnant tax base; (vi) Egmont Pact 24 May 1977 linguistic-community
  agreement attempting full federalisation (never implemented — struck
  down by Council of State February 1978); (vii) unemployment rose
  4.8% (1974) → 8.4% (1978); (viii) wage indexation (automatic CPI
  linkage) preserved and strained through the cycle. Popularity:
  1974 legislative election CVP+PSC 32.3%, rose to 36.0% at 1977
  election (Tindemans personal popularity); Tindemans resigned 11
  October 1978 after Egmont Pact collapse, triggering 17 December 1978
  election and Martens I 3 April 1979. Coherence: tripartite bind of
  oil shock + indexation-driven wage-price spiral + constitutional
  reform paralysis meant no coherent economic adjustment; Tindemans
  achieved rhetorical-integrative role (his 1975 Tindemans Report on
  European Union gave him European stature) but the domestic programme
  fractured by 1978.
policies:
  - be_economic_expansion_law_1976
  - be_energy_crisis_response_1974_1976

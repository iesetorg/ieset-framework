movement_id: uae_zayed_late_era_1995_2004
status: candidate
name: "Zayed late era — Jebel Ali scale-up, Emirates expansion, DIFC launch, post-9/11 reputation management"
countries: [ARE]
timeframe: {start: 1995, end: 2004}
coalition: "UAE Federal government — Abu Dhabi ruling family (Zayed Al Nahyan) with rising Dubai autonomy (Maktoum)"
leaders:
  - "Sheikh Zayed bin Sultan Al Nahyan (President UAE 1971-2 November 2004)"
  - "Sheikh Maktoum bin Rashid Al Maktoum (PM and Ruler of Dubai)"
  - "Sheikh Mohammed bin Rashid Al Maktoum (Crown Prince, operational driver of Dubai strategy)"
doctrine: >
  Economic school: emirate-level state capitalism with free-zone arbitrage
  — Abu Dhabi retained oil-rent centralism while Dubai executed the
  free-zone + aviation + logistics + services playbook. Left-right axis:
  centre-right monarchy — pro-market on external openness (free zones,
  100% foreign ownership within zones, zero corporate tax) but state-
  controlled upstream oil (ADNOC) and strategic sectors. Dated policies:
  Emirates Airline fleet expansion 1996-2004 (Boeing/Airbus orders total
  >$15bn); Jebel Ali Free Zone expansion continuing 1995-2004 (DP World
  global consolidation 2005); Dubai International Financial Centre (DIFC)
  launched via Federal Law 8 of 2004 and Dubai Law 9 of 2004; Dubai
  Internet City 1999 and Media City 2000; post-9/11 US Patriot Act
  Section 311 compliance pressure on UAE correspondent banks 2002-2003.
  Popularity: unchallenged federal-legitimacy under Zayed's welfare
  distribution; Dubai achieved global visibility. Coherence: high —
  consistent emirate-level division-of-labour between Abu Dhabi (oil
  rent) and Dubai (services/logistics).
policies:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: luxembourg_eu_integrated_social_market_governance_2008_present
status: candidate
name: Luxembourg EU-integrated social-market governance 2008-present
countries: [LUX]
timeframe:
  start: 2008
  end: ongoing
coalition: Successive Luxembourg coalition governments, including Bettel II and Frieden CSV-DP
leaders:
- "Jean-Claude Juncker (Prime Minister, 1995-2013)"
- "Xavier Bettel (Prime Minister, 2013-2023)"
- "Luc Frieden (Prime Minister, 2023-present)"
doctrine: >
  Luxembourg's recent economic-policy regime combines small-state financial
  stability, EU single-market integration, tax-financed mobility and climate
  measures, and coalition-based social-market adjustment. The policy cluster
  runs from the Dexia crisis response through free nationwide public transport
  and carbon pricing to post-2023 CSV-DP positioning around housing,
  competitiveness, climate, energy security, and EU regulatory implementation.
policies:
- be_dexia_rescue_2008
- lux_free_public_transport_2020
- lux_climate_law_carbon_tax_2020
- eu_electricity_market_design_reform_2024
- eu_platform_work_directive_2024
axes_summary:
- axis: regulatory.financial_deregulation
  direction: '-'
  magnitude: strong
  rationale: The Dexia rescue combined state capital, guarantees, and supervised resolution for a cross-border bank.
- axis: fiscal.spending_level
  direction: +
  magnitude: moderate
  rationale: Bank-rescue commitments and free public transport increased the public financing role.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: Free-fare public transport and EU electricity-market support instruments expand sector-targeted public support.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: moderate
  rationale: The climate law, carbon tax, mobility policy, and EU electricity reform strengthen decarbonisation policy.
- axis: regulatory.labour_market_flexibility
  direction: '-'
  magnitude: weak
  rationale: EU platform-work rules add employment-status and algorithmic-management protections affecting Luxembourg-covered platform work.
- axis: regulatory.energy_supply_security
  direction: +
  magnitude: weak
  rationale: EU electricity-market design and national climate-energy planning increase hedging, flexibility, and energy-security posture.
references:
- "Luxembourg government, Accord de coalition 2023-2028: https://gouvernement.lu/fr/publications/accord-coalition/accord-de-coalition-2023-2028.html"
- "Legilux, Loi du 15 decembre 2020 relative au climat: https://legilux.public.lu/eli/etat/leg/loi/2020/12/15/a994/jo"
- "Luxembourg public transport portal, free public transport: https://mobiliteit.lu/en/tickets/free-transport/"
- "European Commission state-aid decisions on Dexia, including SA.33760."
- "Regulation (EU) 2024/1747 and Directive (EU) 2024/1711 on electricity market design."
- "Directive (EU) 2024/2831 on platform work."
notes: >
  The movement lists EU-wide policies that count toward Luxembourg coverage
  because they apply to Luxembourg as an EU member state. Policy-level
  enacted_by wiring is limited to Luxembourg national or joint-state policies;
  the two EU directives retain their supranational enactment posture.

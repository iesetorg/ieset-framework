movement_id: canada_martin_liberal_2003_2006
status: candidate
name: "Martin Liberal — same-sex marriage, Kelowna Accord, sponsorship fallout"
countries: [CAN]
timeframe: {start: 2003, end: 2006, enacted_date: "2003-12-12"}
coalition: "Liberal Party (majority 2003-2004; minority 2004-2006 with NDP support)"
leaders:
  - "Paul Martin (Prime Minister 2003-2006)"
  - "Ralph Goodale (Finance)"
  - "Anne McLellan (Deputy PM)"
  - "Irwin Cotler (Justice)"
doctrine: >
  Liberal centre-left minority government dominated by the Gomery
  sponsorship-scandal inquiry and a short burst of social-liberal
  legislation. Five doctrinal pillars: (a) Civil Marriage Act 2005
  (S.C. 2005 c.33, 20 July 2005) — codified same-sex marriage
  federally after provincial-court rulings; Canada became 4th
  country globally to legalise. (b) Kelowna Accord (24-25 November
  2005) — $5.1B ten-year federal-provincial-Indigenous framework
  agreement on health, education, housing, economic opportunities;
  cancelled by incoming Harper government 2006. (c) Gomery
  Commission (Feb 2004 - Nov 2005) — public inquiry into Chrétien-
  era sponsorship programme; Phase I 1 November 2005 report
  implicated PMO and Liberal Party; triggered 28 November 2005
  confidence-vote loss 133-171. (d) Health Accord (Sept 2004) —
  $41B over 10 years to provinces for wait-times and primary care.
  (e) Budget 2005 + NDP amendment — $4.6B reallocation to social
  programs to keep minority alive. Stated school: Liberal social-
  democratic with fiscal-moderate continuation; sharper left-tilt
  vs Chrétien. Left-right: centre-left. Popularity: June 2004 reduced
  to minority (36.7% 135 seats); 23 January 2006 election Liberals
  30.2% 103 seats, Conservatives 36.3% 124 seats formed minority;
  Martin resigned as Liberal leader election night. Coherence: trade
  Chrétien-era durable majority for social-liberal legislation burst
  and Indigenous framework — undone by scandal timing and Harper
  cancellation of Kelowna.
policies:
  - ca_civil_marriage_act_2005
  - ca_kelowna_accord_2005
  - ca_gomery_commission_2004_2005
  - ca_health_accord_2004
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Gomery Commission public-inquiry accountability."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Health Accord + Kelowna framework + Budget 2005 NDP amendment."}
  - {axis: institutional.property_rights, direction: "0", magnitude: weak, rationale: "Same-sex marriage civil-rights expansion; not an economic-property-rights movement."}
outcome_hypotheses: [scandal_incumbency_penalty, minority_government_policy_drift]
predecessor_movements: [canada_chretien_liberal_second_third_1997_2003]
successor_movements: [canada_harper_conservative_2006_2015]
position_alignments:

  - "Commission of Inquiry into the Sponsorship Program (Gomery) Phase I Report 2005"
  - "Kelowna First Ministers Meeting Communique 2005"
notes: "Short tenure; Kelowna Accord cancellation by Harper illustrates minority-policy reversibility."

movement_id: pakistan_nawaz_sharif_pmln_first_1990_1993
status: candidate
name: "Nawaz Sharif IJI/PML-N first term — privatisation launch (Pakistan)"
countries: [PAK]
timeframe: {start: 1990, end: 1993}
coalition: "Islami Jamhoori Ittehad (IJI) — PML(N)-led alliance"
leaders:
  - "Nawaz Sharif (PM Nov 1990-Apr 1993 and Nov-Dec 1993 contested)"
  - "Sartaj Aziz (Finance Minister)"
  - "Ghulam Ishaq Khan (President)"
doctrine: >
  Nawaz Sharif first-term privatisation-launch doctrine — centre-right
  business-oriented PML(N) reversing Bhutto-era nationalisations.
  Economic school: market-liberal reformist within 8th-Amendment
  presidential-parliamentary hybrid; heavy state-enterprise privatisation
  programme. Dated policies: Privatisation Commission established Jan
  1991 under PM office; Muslim Commercial Bank (Apr 1991), Allied Bank
  (Sep 1991), Habib Bank and United Bank prepared; 115+ state units
  privatised 1991-1993 including PTCL initial tranche; Islamic Shariat
  Act 1991 (Enforcement of Shariat Act) making Shariah supreme law
  subject to exceptions; Yellow Cab Scheme 1991-1992 (100,000+ cheap
  imported taxi loans); Motorway M-1/M-2 Lahore-Islamabad construction
  initiated; foreign-exchange reforms — Protection of Economic Reforms
  Act 1992 allowing foreign-currency accounts with property-rights
  guarantees; dismissal by President Ghulam Ishaq Khan 18 Apr 1993
  under 8(2)(b), restored by Supreme Court May 1993, Kakar Formula
  resolution Jul 1993 with simultaneous PM + President resignations.
  Left-right: centre-right PML(N) commercial-liberal; Shariat overlay.
  Popularity: Oct 1990 general election IJI 37.4% / 106 seats of 207
  (workable coalition); Oct 1993 general election PPP 37.9% / 86 vs
  PML(N) 39.9% / 72 (PPP formed government). Coherence: moderate —
  privatisation programme coherent; Yellow Cab fiscal cost and Islamic
  Act layered incoherent elements onto market-reform track.
policies:
  - pk_privatisation_commission_1991
  - pk_enforcement_of_shariat_act_1991
  - pk_protection_of_economic_reforms_1992
  - pk_motorway_m1_m2_initiation_1992
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Bank privatisation MCB/ABL; foreign-currency account property-rights guarantees."}
  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Protection of Economic Reforms Act 1992 enshrined foreign-exchange property rights; privatisation transferred 115+ units."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "Licensing and entry controls eased as part of privatisation-reform package."}
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Enforcement of Shariat Act formalised Islamic supremacy principle with carve-outs; 8(2)(b) dismissal reversed by Supreme Court set precedent."}

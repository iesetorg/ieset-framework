# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: paraguay_pena_colorado_2023_present
status: candidate
name: "Pena Colorado government - administrative centralisation and targeted programmes (Paraguay)"
countries: [PRY]
timeframe:
  start: 2023
  end: ongoing
  enacted_date: "2023-08-15"
coalition: "Partido Colorado / Asociacion Nacional Republicana, Honor Colorado-aligned congressional majority"
leaders:
  - "Santiago Pena (President, 2023-present)"
  - "Pedro Alliana (Vice-President, 2023-present)"
  - "Carlos Fernandez Valdovinos (Minister of Economy and Finance, 2023-present)"
doctrine: >
  Colorado government under Santiago Pena combining orthodox macro-fiscal
  signalling, administrative centralisation, targeted social spending, and
  sector-specific market-building. Early policy content includes a national
  school-feeding entitlement through Hambre Cero, tighter supervision of
  fragmented pension funds, legal architecture for voluntary carbon-credit
  markets, and a national integrity and transparency regime. The programme
  is not a break with Paraguay's low-tax, investment-facing model; it layers
  selected state-capacity and social-programme commitments onto that model.
policies:
  - pry_hambre_cero_school_feeding_2024
  - pry_pension_superintendency_law_7235_2023
  - pry_carbon_credit_market_law_7190_2023
  - pry_integrity_transparency_anticorruption_law_7389_2024
axes_summary:
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: moderate
    rationale: "Hambre Cero nationalised and expanded school-feeding coverage for the public education system."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: weak
    rationale: "School-feeding expansion and programme centralisation increased central-government social-programme obligations."
  - axis: regulatory.financial_deregulation
    direction: "+"
    magnitude: moderate
    rationale: "The pension-superintendency law added prudential supervision and reporting duties for pension funds."
  - axis: regulatory.environmental_stringency
    direction: "+"
    magnitude: weak
    rationale: "The carbon-credit law created a registry and state framework for verified emissions-reduction credits."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: weak
    rationale: "Integrity, transparency, and pension-supervision reforms added formal oversight and accountability mechanisms."
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: partially_aligned}
references:
  - "Presidencia de la Republica del Paraguay, transfer of command and Santiago Pena inauguration, 2023-08-15"
  - "Ley 7235/2023, Superintendencia de Jubilaciones y Pensiones"
  - "Ley 7264/2024, Hambre Cero en las Escuelas"
  - "Ley 7190/2023, Creditos de Carbono"
  - "Ley 7389/2024, Regimen Nacional de Integridad, Transparencia y Prevencion de la Corrupcion"
notes: >
  First Paraguay movement file in the corpus. Kept narrow to current-government
  enacted policies so later tranches can add Cartes-era fiscal, infrastructure,
  Itaipu, and maquila/export-platform policies without conflating periods.

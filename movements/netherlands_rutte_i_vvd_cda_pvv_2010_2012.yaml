movement_id: netherlands_rutte_i_vvd_cda_pvv_2010_2012
status: candidate
name: "Rutte I VVD-CDA minority with PVV parliamentary support 2010-2012"
countries: [NLD]
timeframe: {start: 2010, end: 2012, enacted_date: "2010-10-14"}
coalition: "VVD + CDA minority (52/150) + PVV gedoogsteun confidence-and-supply"
leaders:
  - "Mark Rutte (PM, VVD)"
  - "Jan Kees de Jager (Finance Minister, CDA)"
  - "Geert Wilders (PVV, external support)"
doctrine: >
  Innovative minority configuration: first VVD-led liberal government with
  PVV external support ('gedoogakkoord') trading immigration-tightening for
  coalition parliamentary stability. Economic school: centre-right fiscal
  orthodoxy and post-GFC consolidation under EU excessive-deficit-procedure
  scrutiny. Signature actions: €18bn austerity package in coalition
  agreement targeting deficit <3% GDP by 2013; AOW state-pension age
  rise from 65 to 67 (Wet verhoging AOW-leeftijd) legislated; health-care
  budget cap (macrobudgettaire kader zorg, BKZ); education funding cuts
  incl. passend-onderwijs; immigration-tightening (integration fees, burqa-
  ban attempt). Rutte I collapsed Apr 2012 when Wilders walked out of the
  Catshuisberaad negotiations on additional €14bn consolidation; emergency
  Lenteakkoord / Kunduz-akkoord struck with D66+GL+CU to deliver the
  consolidation and pension-age rise via alternative majority. Left-right:
  centre-right with PVV anti-immigration flank. Popularity: VVD won 2010
  election at 20.5% (first VVD-led government since 1918 ex-cabinet).
  Coherence: low — two-party minority with third-party veto on the headline
  consolidation and asymmetric preferences on EU/Greece-support votes.
policies:
  - nl_coalition_austerity_2010_2012
  - nl_aow_retirement_age_rise_2012
  - nl_lenteakkoord_kunduz_2012
  - nl_immigration_integration_tightening_2010_2012

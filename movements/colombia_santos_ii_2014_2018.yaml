# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: colombia_santos_ii_2014_2018
status: candidate
name: "Santos II — Unidad Nacional, FARC peace and OECD convergence (Colombia)"
countries: [COL]
timeframe: {start: 2014, end: 2018}
coalition: "Unidad Nacional — Partido de la U + Liberal + Cambio Radical + Conservador (partial)"
leaders:
  - "Juan Manuel Santos (President 2014-2018)"
  - "Mauricio Cárdenas (Finance Minister 2012-2018)"
  - "Humberto de la Calle (Chief peace negotiator)"
doctrine: >
  Liberal-centrist second-term administration combining market-orthodox
  macro management with a historic political project: concluding the
  FARC peace negotiation that began in Havana in 2012. Santos's economic
  doctrine continued the Uribe-era investor-friendly framework — inflation-
  targeting independent central bank, fiscal rule (Law 1473 of 2011),
  openness to FDI — while adding a sustainability-tax correction as oil
  prices collapsed in 2014-2016 (structural tax reform Law 1819 of Dec
  2016 broadened VAT from 16% to 19%, introduced corporate-rate unification
  and anti-evasion measures, and strengthened DIAN). On the political axis
  the Havana Final Agreement was signed 26 Sep 2016, narrowly rejected by
  plebiscite 2 Oct 2016 (50.2% No), then renegotiated and ratified by
  Congress Nov-Dec 2016; Santos received the 2016 Nobel Peace Prize.
  Parallel tracks: OECD accession roadmap completed with invitation 25
  May 2018 (formal accession confirmed 2020), minimum-wage increases
  above inflation, fuel-price stabilisation fund operation, 4G infrastructure
  concessions programme, and continued US-FTA implementation. Second-term
  approval trajectory declined from 50.9% runoff victory (15 Jun 2014, vs
  Zuluaga) to sub-30% by 2017 as peace fatigue and tax-reform backlash
  accumulated. Coherence: market-orthodox continuity + peace-dividend
  institutional project + fiscal-sustainability correction under oil shock.
policies:
  - co_tax_reform_law_1819_2016
  - co_farc_peace_final_agreement_2016
  - co_oecd_accession_invitation_2018
  - co_minimum_wage_above_inflation_2014_2018
  - co_4g_infrastructure_concessions_2014
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "Law 1819 added anti-evasion, dividend taxation, progressive PIT changes."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Peace-implementation spending and social transfers rose modestly."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Continued FTA implementation; OECD convergence-driven regulatory opening."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Havana Agreement extended territorial state presence; JEP transitional-justice system created."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "CREE surcharge phased down; unified corporate rate path under Law 1819."}
position_alignments:
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: institutionalism, alignment: aligned, notes: "Peace agreement framed as state-capacity extension."}
  - {position_id: classical_liberal, alignment: partially_aligned}
predecessor_movements:
  - colombia_uribe_santos_duque_market_continuity_2002_2022
successor_movements:
  - colombia_duque_centro_democratico_2018_2022
references:
  - "Ley 1819 de 2016 (Reforma Tributaria Estructural)"
  - "Acuerdo Final para la Terminación del Conflicto, 24 Nov 2016"
  - "OECD Council decision inviting Colombia to accede, 25 May 2018"
  - "IMF Article IV Colombia 2015, 2017"
notes: >
  Umbrella movement colombia_uribe_santos_duque_market_continuity_2002_2022
  aggregates the three administrations; this file codes the Santos II
  era specifically, distinct from Santos I (2010-2014, not yet specced).

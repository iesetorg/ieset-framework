# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: egypt_sisi_austerity_2016_present
status: candidate
name: "Egypt IMF-anchored adjustment and military state capitalism (Sisi era)"
countries: [EGY]
timeframe: {start: 2016, end: ongoing}
coalition: "Presidency under Abdel Fattah el-Sisi with Armed Forces-linked economic institutions"
leaders:
  - "Abdel Fattah el-Sisi (President 2014-present)"
  - "Tarek Amer (CBE Governor 2015-2022)"
  - "Mohamed Maait (Finance Minister 2018-2024)"
  - "Hassan Abdalla (CBE Governor 2022-present)"
doctrine: >
  Three overlapping IMF programmes anchor the era: the 2016 $12bn Extended
  Fund Facility (floated the Egyptian pound from ~8.8 to ~18 per USD in
  November 2016; fuel and electricity subsidies cut; VAT replacing general
  sales tax at 14%); the 2020 $8bn rapid-financing plus stand-by during
  COVID-19; and the 2022/2024 $3bn-then-extended-to-$8bn EFF that delivered
  a second float in March 2024 (pound to ~50/USD). Alongside the orthodox
  fiscal-monetary adjustment, the state expanded the economic footprint of
  the Armed Forces Engineering Authority, National Service Projects
  Organisation, and affiliated entities into housing, cement, steel,
  logistics, and retail — widely noted as crowding out private activity and
  complicating the privatisation pledge embedded in the IMF programmes. New
  Administrative Capital megaproject is the flagship off-budget investment.
  IMF conditionality has repeatedly flagged the State-Ownership Policy
  document (2022) as under-implemented. Inflation reached ~38% in mid-2023
  following FX shortages; external financing from Gulf bilateral deposits
  and the $35bn Ras El-Hekma UAE investment (Feb 2024) eased the immediate
  crisis.
policies:
  - egypt_egp_float_2016
  - egypt_vat_introduction_2016
  - egypt_energy_subsidy_reform_2014_2019
  - egypt_imf_eff_2016
  - egypt_military_economy_expansion_2013_present
  - egypt_egp_second_float_2024
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: strong, rationale: "Fuel and electricity subsidy cuts under 2016 and 2022 programmes; partial offset via Takaful/Karama cash transfers."}
  - {axis: fiscal.spending_level, direction: "mixed", rationale: "Consolidation at central-government level; expanded off-budget infrastructure and military-linked capex."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: moderate, rationale: "Repeated large rate hikes under CBE, though FX regime oscillated between float and de facto peg."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Military-economy expansion raised entry barriers in multiple sectors; 2022 State-Ownership Policy under-implemented."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Tariff adjustments mixed; COMESA/AfCFTA commitments."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Post-2013 reshuffles, expanded military-court jurisdiction over civilians; V-Dem scores declined sharply."}
outcome_hypotheses: [imf_programme_compliance_and_growth]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Fiscal and exchange-rate content orthodox; private-sector-friendliness contradicted by military-economy."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Mega-infrastructure drive without the export-discipline conditionality."}
references:
  - "IMF Country Reports Egypt, 2017, 2021, 2023, 2024"
  - "Sayigh (2019), 'Owners of the Republic: An Anatomy of Egypt's Military Economy', Carnegie Middle East Center"
  - "Adly (2020), Cleft Capitalism: The Social Origins of Failed Market Making in Egypt"
  - "Transparency International (2022), 'Inside Egypt's Military-Economy'"
notes: "Strong case for decomposing 'IMF-aligned' coding into fiscal-content axis (aligned) vs product-market axis (opposed)."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: turkey_erdogan_akp_2002_present
status: candidate
name: AKP / Erdoğan governance (Turkey)
countries:
- TUR
timeframe:
  start: 2002
  end: ongoing
coalition: Justice and Development Party (AKP); post-2018 presidential system with MHP alliance
leaders:
- Recep Tayyip Erdoğan (PM 2003-2014, President 2014-present)
- Ali Babacan (Economy/Deputy PM 2002-2015)
- Mehmet Şimşek (Finance 2009-2015; Treasury & Finance 2023-present)
doctrine: 'Two-phase governance. Phase one (2002-c.2011) continued the post-2001-crisis IMF-anchored
  programme inherited from the Ecevit/Derviş stabilisation: fiscal primary surpluses, banking-sector
  clean-up, inflation targeting at a de jure independent central bank, EU accession-driven regulatory
  convergence, and wide privatisation of SOEs (Türk Telekom, Tüpraş, Erdemir). Phase two (c.2013-present)
  reversed much of the monetary and institutional content: credit-fuelled construction booms,
  repeated political pressure on the Central Bank of the Republic of Turkey (CBRT) to cut rates
  despite rising inflation, repeated governor dismissals (2019, 2021), unorthodox "Erdoğanomics"
  claim that high rates cause inflation, FX-protected deposit scheme (KKM) 2021, and 2018/2021
  lira crises. Post-2023 election a partial orthodox pivot under Şimşek restored conventional
  rate hikes. Institutional quality declined sharply after the 2016 coup attempt and 2017 constitutional
  referendum consolidating executive power.

  '
policies:
- turkey_imf_stabilisation_continuation_2002_2008
- turkey_soe_privatisation_programme_2003_2013
- turkey_cbrt_political_pressure_2013_2023
- turkey_kkm_fx_protected_deposits_2021
- turkey_post_2016_institutional_consolidation
- turkey_erdogan_low_rate_heterodoxy_2021_2023
axes_summary:
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Early-era privatisations + EU-candidacy regulatory alignment; partially reversed
    by later state-linked contracting.
- axis: monetary.central_bank_independence
  direction: '-'
  magnitude: strong
  rationale: Repeated governor dismissals 2019-2021 and overt political rate direction mark de
    facto loss of independence; early-era independence was the baseline being eroded.
- axis: fiscal.spending_level
  direction: mixed
  rationale: Tight in 2002-2011 primary-surplus era; looser 2013+ with off-budget guarantees (PPP
    contingent liabilities, Credit Guarantee Fund).
- axis: institutional.rule_of_law
  direction: '-'
  magnitude: strong
  rationale: Post-2016 mass dismissals in judiciary and civil service; V-Dem and WGI series decline
    sharply 2013-2023.
- axis: institutional.judicial_independence
  direction: '-'
  magnitude: strong
  rationale: Constitutional Court composition changed; HSK restructured 2017.
outcome_hypotheses:
- central_bank_independence_and_inflation_anchoring
position_alignments:
- position_id: developmentalism
  alignment: partially_aligned
  notes: Construction + directed-credit phase has developmentalist features without the export-discipline
    conditionality of East Asian cases.
- position_id: chicago_monetarism
  alignment: opposed
  notes: Explicit rejection of Taylor-rule logic post-2013; partial return 2023.
- position_id: classical_liberal
  alignment: partially_aligned
  notes: Early-era EU-convergence liberalisation only.
references:
- Acemoğlu & Üçer (2015), 'The Ups and Downs of Turkish Growth 2002-2015', NBER WP 21608
- Öniş (2019), 'Turkey under the challenge of state capitalism'
- IMF Article IV Turkey, 2018, 2021, 2023
- V-Dem Turkey series 2002-2023
notes: Two-phase coding is essential; a single axis direction would misrepresent the programme.

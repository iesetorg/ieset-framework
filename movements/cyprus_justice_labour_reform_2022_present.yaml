# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: cyprus_justice_labour_reform_2022_present
status: candidate
name: "Cyprus justice and labour reform continuity 2022-present"
countries: [CYP]
timeframe: {start: 2022, end: ongoing}
coalition: "Democratic Rally administration followed by Christodoulides independent-centrist administration"
leaders:
  - "Nicos Anastasiades (President, 2013-2023)"
  - "Nikos Christodoulides (President, 2023-present)"
doctrine: >
  Cyprus's recent reform continuity combined court-capacity modernisation with
  selective social-market regulation after the post-bailout recovery period.
  The policy package emphasised faster commercial and appellate justice,
  clearer higher-court structure, and a national wage floor for workers not
  already covered by sectoral orders, while keeping the broader EU and eurozone
  policy setting intact.
policies:
  - cy_commercial_admiralty_court_2022
  - cy_supreme_courts_reform_2023
  - cy_national_minimum_wage_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Specialised commercial/admiralty courts plus higher-court restructuring target case delay and legal predictability."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: weak, rationale: "A differentiated Supreme Constitutional Court, Supreme Court, and Court of Appeal increases judicial capacity."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: moderate, rationale: "The statutory national minimum wage reduces low-wage contract flexibility outside sectoral wage-order coverage."}
references:
  - "European Commission, 2024 Rule of Law Report - Country Chapter Cyprus."
  - "Cyprus Commercial Court, Admiralty Court, and higher-court reform legislation, 2022-2023."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: guinea_bissau_embalo_stabilisation_cashew_state_2020_2025
status: candidate
name: "Embalo stabilisation and cashew-rent state 2020-2025"
countries: [GNB]
timeframe: {start: 2020, end: 2025, enacted_date: "2020-02-27"}
coalition: "Umaro Sissoco Embalo presidency and supporting parliamentary blocs"
leaders:
  - "Umaro Sissoco Embalo (President, 2020-2025)"
  - "Nuno Gomes Nabiam (Prime Minister, 2020-2023)"
  - "Geraldo Martins (Prime Minister, 2023)"
doctrine: >
  The Embalo era combined presidential consolidation, ECOWAS-backed security
  stabilization, IMF-supported public-finance reform, and annual cashew export
  management in an economy dominated by raw cashew sales. Its governing logic
  was to restore fiscal and security predictability while keeping tight
  executive control over a fragile political system.
policies:
  - gnb_ecowas_stabilisation_mission_2022
  - gnb_imf_ecf_2023
  - gnb_parliament_dissolution_2023
  - gnb_cashew_export_campaign_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: mixed, magnitude: moderate, rationale: "Security stabilization and IMF governance benchmarks formalized parts of state administration, while the 2023 dissolution concentrated executive authority."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "The ECF anchors revenue, expenditure, arrears, and debt controls in a fragile fiscal setting."}
  - {axis: regulatory.trade_openness, direction: mixed, magnitude: weak, rationale: "Cashew campaign rules support export marketing but rely on administered prices and state gatekeeping."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: weak, rationale: "Annual cashew export rules condition the dominant export crop through campaign, licence, and reference-price decisions."}
references:
  - "IMF, Guinea-Bissau 2023 Extended Credit Facility and 2025 Article IV materials."
  - "ECOWAS communiques on the Stabilisation Support Mission in Guinea-Bissau."
  - "Government of Guinea-Bissau annual cashew marketing campaign announcements."

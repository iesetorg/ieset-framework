movement_id: ecuador_duran_ballen_pur_1992_1996
status: candidate
name: "Durán Ballén PUR — Washington Consensus turn, Cenepa war, Brady Plan"
countries: [ECU]
timeframe: {start: 1992, end: 1996, enacted_date: "1992-08-10"}
coalition: "Partido Unidad Republicana (PUR) + Partido Conservador + Social Christian alliance"
leaders:
  - "Sixto Durán Ballén (President 1992-1996)"
  - "Alberto Dahik (Vice President, Plan Macroeconómico)"
  - "Mauricio Yépez (BCE)"
  - "Ana Lucía Armijos (Finanzas)"
doctrine: >
  Centre-right PUR government executing Ecuador's Washington-
  Consensus turn and exiting the Andean Pact low-integration
  orbit. Five doctrinal pillars: (a) Plan Macroeconómico /
  Modernización — Ley de Modernización del Estado (1993)
  authorised privatisations; CONAM Consejo Nacional de
  Modernización created; energy, telecoms, water targeted but
  progress limited by Supreme Court and protests. (b) Brady
  Plan — Ecuador's Brady Bonds closed February 1995 with
  ~$7.6B Paris Club + commercial debt restructuring; haircut
  ~45%; IMF Extended Fund Facility. (c) Cenepa War — late
  January 1995 territorial clash with Peru in Alto Cenepa;
  ended with Itamaraty ceasefire 17 February 1995; consolidated
  Ecuadorian military prestige. (d) Vice-presidential
  corruption scandal — Dahik fled to Costa Rica October 1995
  after Supreme Court ordered his arrest for gastos reservados
  misuse; Plan Macroeconómico credibility hit. (e) Consulta
  popular November 1995 — eleven-question referendum on
  modernisation reforms; all eleven rejected by majorities
  57-64% No — direct-democracy repudiation of the programme.
  Stated school: Washington-Consensus + social-Christian fiscal
  conservatism. Left-right: economic right. Popularity: July
  1992 runoff 57.3% vs Jaime Nebot (PSC) 42.7%; approval
  briefly boosted by Cenepa victory early 1995 then collapsed
  under Dahik scandal and consulta defeat; July 1996 runoff
  PRE's Abdalá Bucaram won 54.5% vs Nebot 45.5%. Coherence:
  trade gradualism and Andean-Pact model for Brady closure,
  modernisation framework, and export-oriented opening —
  delivered on debt and war but consulta popular rejected the
  broader programme.
policies:
  - ec_ley_modernizacion_estado_1993
  - ec_brady_plan_ecuador_1995
  - ec_cenepa_war_peru_1995
  - ec_consulta_popular_november_1995
  - ec_dahik_scandal_1995
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Ley de Modernización; CONAM created; limited privatisation progress."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Tariff reduction; WTO accession path."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Brady reduced debt-service; fiscal consolidation aspiration."}

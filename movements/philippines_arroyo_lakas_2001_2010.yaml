# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: philippines_arroyo_lakas_2001_2010
status: candidate
name: "Gloria Macapagal Arroyo Lakas-CMD — post-EDSA-II technocratic fiscal reform presidency (2001-2010)"
countries: [PHL]
timeframe:
  start: 2001
  end: 2010
  enacted_date: "2001-01-20"
coalition: "Lakas-CMD (later Lakas-Kampi-CMD) plus KAMPI, LP (until 2005 breakaway), LDP, NPC rotating"
leaders:
  - "Gloria Macapagal Arroyo (President 20 Jan 2001 - 30 Jun 2010)"
  - "Teofisto Guingona → Noli de Castro (VP)"
  - "Jose Isidro Camacho → Cesar Purisima → Margarito Teves (Finance)"
  - "Rafael Buenaventura → Amando Tetangco Jr (BSP Governor, July 2005)"
doctrine: >
  Lakas-CMD technocratic post-EDSA-II reform administration —
  Arroyo, Ateneo-trained economist and Georgetown PhD, succeeded
  Estrada in the EDSA II transition and won a disputed full term
  in 2004. Economic school: technocratic-liberal fiscal
  consolidation with targeted welfare, centre-right on macro and
  trade, continuity-on-US-alliance with Visiting Forces Agreement
  and Iraq humanitarian contingent (withdrawn July 2004 after
  Angelo de la Cruz hostage crisis). Key policy content: (i)
  Expanded Value-Added Tax Law (RVAT, RA 9337) July 2005 — lifted
  VAT exemptions on petroleum, electricity, and professional
  services, rate raised to 12% from February 2006 under R.A. 9361
  trigger; restored fiscal balance; (ii) "Hello Garci" scandal
  June 2005 — leaked call with COMELEC Commissioner Virgilio
  Garcillano allegedly fixing 2004 election margin; impeachment
  complaints September 2005 killed in House Justice Committee;
  (iii) 2007 Comprehensive Agrarian Reform Program Extension
  with Reforms (CARPER, RA 9700) extending CARP to June 2014;
  (iv) Pantawid Pamilyang Pilipino Program (4Ps) conditional
  cash transfer launched 2007-2008 (expanded massively under
  Aquino III) modelled on Mexico Oportunidades; (v) Visiting
  Forces Agreement implementation and Balikatan exercises
  continued; Enhanced Defense Cooperation Agreement precursor
  negotiations; (vi) Overseas Absentee Voting Act 2003 (RA 9189);
  (vii) Reproductive Health Bill stalled (passed 2012 under
  Aquino III); (viii) 2006 emergency decree PP 1017 proclaiming
  state of national emergency, struck down partially by Supreme
  Court in Randolf David v. Arroyo 3 May 2006; (ix) debt-to-GDP
  fell from 75% (2004) to 55% (2010) on RVAT and growth; GDP
  growth averaged 5.4% 2002-2007. Popularity: 2004 election won
  40% vs Fernando Poe Jr 36% (later-disputed margin); approval
  collapsed to single digits by 2009 — lowest of any post-Marcos
  president at handover. Coherence line: technocratic fiscal
  reform (VAT, CCT launch, debt reduction) with legitimacy
  eroded by "Hello Garci" and 2006 emergency-powers episode.
policies:
  - ph_expanded_vat_law_2005
  - ph_hello_garci_scandal_2005
  - ph_pantawid_4ps_launch_2007
  - ph_carper_extension_2009
  - ph_pp_1017_emergency_proclamation_2006
  - ph_vfa_balikatan_continuation_2002_2010
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Pantawid 4Ps launch and CARPER extension raised programme spend; debt-to-GDP fell due to revenue side."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "RVAT/VAT broadening to petroleum, electricity, professional services is regressive-indirect tax expansion."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "4Ps CCT piloted 2007, scaled to 700k households by 2010 handover (then expanded under Aquino III)."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Hello Garci episode, PP 1017, 2006 calibrated-preemptive-response doctrine flagged democratic backsliding."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Supreme Court struck portions of PP 1017 but upheld succession; midnight appointments late in term contested."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Japan-Philippines Economic Partnership Agreement (JPEPA) signed 2006, ratified 2008 — first bilateral FTA for Philippines."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "RVAT and fiscal consolidation are orthodox; Hello Garci erodes institutional pillar."}
  - {position_id: empirical_pragmatist, alignment: aligned, notes: "4Ps CCT launch adopts evidence-based anti-poverty design."}
  - {position_id: developmentalism, alignment: partially_aligned, notes: "JPEPA and infrastructure plans continuity with developmental state."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "4Ps and CARPER welcomed; VAT regressivity and rule-of-law erosion opposed."}
references:
  - "RA 9337 Expanded VAT Law 2005"
  - "RA 9700 CARPER 2009"
  - "DSWD Pantawid Pamilyang Pilipino Program documents 2007-2010"
  - "Randolf David v. Arroyo, G.R. No. 171396, 3 May 2006"
  - "Hutchcroft (2008), 'The Arroyo Imbroglio in the Philippines'"
notes: >
  Full Arroyo term 2001-2010 treated as single movement with
  coalition-label continuity under Lakas-CMD; RVAT, CCT, and Hello
  Garci are the defining policy-content events.

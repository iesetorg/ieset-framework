# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: namibia_swapo_green_industrialisation_2020_present
status: candidate
name: Namibia SWAPO green industrialisation and resource-beneficiation regime
countries: [NAM]
timeframe:
  start: 2020
  end: ongoing
coalition: South West Africa People's Organisation (SWAPO)
leaders:
  - "Hage Geingob (President, SWAPO, second term 2020-2024)"
  - "Nangolo Mbumba (President, SWAPO, 2024-2025)"
  - "Netumbo Nandi-Ndaitwah (President, SWAPO, 2025-)"
doctrine: >
  Namibia's current SWAPO resource-development programme links green hydrogen,
  sovereign savings from natural-resource rents, and mineral beneficiation into
  a small-state industrialisation strategy. The government presents the model as
  using renewable power, critical minerals, and public savings to diversify away
  from raw mineral exports while keeping macro-fiscal buffers.
policies:
  - na_green_hydrogen_strategy_2022
  - na_welwitschia_fund_2022
  - na_critical_minerals_beneficiation_policy_2023
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Green hydrogen and beneficiation policies target selected resource-processing sectors."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Hydrogen strategy ties industrial policy to renewable-energy and decarbonisation goals."}
  - {axis: regulatory.trade_openness, direction: mixed, magnitude: moderate, rationale: "Hydrogen strategy courts FDI, while raw-mineral export restrictions are more protectionist."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Welwitschia Fund rules add a formal savings and disclosure framework for resource revenues."}
references:
  - "Government of Namibia, Green Hydrogen and Derivatives Strategy, 2022."
  - "Bank of Namibia and Ministry of Finance, Welwitschia Fund launch and governance materials, 2022."
  - "Namibia Ministry of Mines and Energy, 2023 Cabinet decision on unprocessed critical-mineral exports."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: niger_cnsp_transition_sovereignty_2023_present
status: candidate
name: Niger CNSP transition and resource-sovereignty government
countries: [NER]
timeframe:
  start: 2023
  end: ongoing
  enacted_date: '2023-07-26'
coalition: National Council for the Safeguard of the Homeland military transition
leaders:
  - "Abdourahamane Tiani (Head of State, 2023-present)"
  - "Ali Lamine Zeine (Prime Minister, 2023-present)"
doctrine: >
  Niger's CNSP transition frames its governing programme around sovereignty
  after the 2023 coup: reject external sanction pressure, reorient regional
  alliances toward the Sahel military transitions, assert control over uranium
  and petroleum assets, and use strategic-resource revenue to support security
  and state survival during a prolonged transition.
policies:
  - ner_transition_charter_five_year_timeline_2025
  - ner_ecowas_withdrawal_aes_confederation_2024_2025
  - ner_imouraren_uranium_permit_withdrawal_2024
  - ner_benin_pipeline_crude_export_start_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "The transition charter and ECOWAS withdrawal prolonged military-led rule outside ordinary electoral constraints."}
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: weak, rationale: "ECOWAS withdrawal reduced regional integration while the oil pipeline opened a major export channel."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "Uranium permit withdrawal increased state discretion over strategic mining licenses."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Oil-export infrastructure and uranium-control measures strengthened state focus on strategic energy assets."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Mining permit revocation increased asset-security risk for foreign operators."}
references:
  - "Niger transition-charter and national-consultation reporting, 2025."
  - "ECOWAS and Alliance of Sahel States statements on regional withdrawal and confederation, 2024-2025."
  - "Orano, Reuters, IMF, and World Bank reporting on Niger uranium and oil-export policy, 2024-2025."
notes: >
  Niger's policy environment changed rapidly after the coup and sanctions. The
  movement is a formal-policy coding of the CNSP regime, not a stability claim.

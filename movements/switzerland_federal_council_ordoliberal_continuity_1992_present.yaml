movement_id: switzerland_federal_council_ordoliberal_continuity_1992_present
status: candidate
name: "Swiss Federal Council ordoliberal continuity 1992-present"
countries: [CHE]
timeframe: {start: 1992, end: ongoing, enacted_date: "1992-12-06"}
coalition: "Seven-member Federal Council (Bundesrat) under the 'magic formula' partisan composition: FDP-Liberal + SP + Mitte (formerly CVP) + SVP, with rotating annual presidency"
leaders:
  - "Karin Keller-Sutter (FDP, Federal President 2025)"
  - "Guy Parmelin (SVP, Federal Councillor; previous President)"
  - "Beat Jans (SP, Federal Councillor); Albert Rösti (SVP); Ignazio Cassis (FDP); Élisabeth Baume-Schneider (SP); Martin Pfister (Mitte, succeeding Viola Amherd)"
  - "Martin Schlegel (SNB Chairman, Oct 2024-)"
doctrine: >
  The defining structural movement is Swiss policy continuity rather
  than any specific government — the seven-member Federal Council with
  rotating presidency, the "magic formula" four-party-coalition rule,
  direct-democracy referendum constraint, and federalism produce one
  of the most policy-stable governance regimes in the OECD. The
  baseline is set by the 6 Dec 1992 EEA referendum (rejected 50.3%):
  Switzerland declined EU integration, instead negotiating bilateral
  agreements (Bilaterals I 1999, Bilaterals II 2004) and developing
  a sui-generis path. The economic-school identity is ordoliberal at
  the macro framework — debt-brake (Schuldenbremse) constitutional
  amendment ratified by referendum 2001, structural-balance rule
  binding since 2003; SNB constitutional-grade independence; freely
  floating CHF (after the 2011-2015 EUR-floor episode); openness on
  trade and capital; strict separation of fiscal and monetary
  authorities. Federalism gives the cantons primary tax-and-spending
  authority, producing low-tax cantonal competition. Decisive episodes:
  banking-secrecy retreat (FATCA 2010, OECD CRS automatic exchange
  2017, end of practical secrecy for non-residents); Credit Suisse
  forced merger into UBS by SNB-government emergency lending Mar 2023
  (technically a too-big-to-fail intervention, ideologically resisted
  but executed pragmatically); 2024 OECD/G20 minimum-tax adoption
  (15% for large MNEs); 2025 EU-Switzerland bilateral package III
  finalisation. Direct-democracy episodes: 2014 mass-immigration
  referendum (passed, then implemented in pro-business diluted form);
  9% AHV/13th-pension referendum 2024 (passed, fiscal expansion
  approved despite Federal Council opposition); 2017 Energy Strategy
  2050 (nuclear new-build ban). The dominant axis-signature is
  classical-liberal + ordoliberal with a social-democratic top-up via
  popular initiatives — closer to "embedded liberalism with
  referendum override" than to either pure market-liberal or
  social-democratic templates.
policies:
  - ch_eea_referendum_rejection_1992
  - ch_debt_brake_constitutional_2001
  - ch_bilaterals_i_with_eu_1999
  - ch_bilaterals_ii_with_eu_2004
  - ch_banking_secrecy_retreat_fatca_crs_2010_2017
  - ch_snb_eur_floor_2011_2015
  - ch_credit_suisse_ubs_forced_merger_2023
  - ch_oecd_minimum_tax_2024
  - ch_ahv_13th_pension_referendum_2024
  - ch_eu_bilaterals_iii_2025
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "SNB constitutional-grade independence, longer than ECB's; only weakly tested during EUR-floor 2011-2015 (technical, not political)."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Constitutional debt-brake binding since 2003; structurally low federal spending share of GDP relative to OECD peers."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Bilateral-agreements pathway preserved single-market access on goods and labour mobility; capital account fully open."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Post-Credit-Suisse banking-supervision tightening; FINMA powers expanded 2024; banking-secrecy regime retreat under OECD pressure."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Top-quartile WGI rule-of-law and judicial-independence scores; direct-democracy override is institutional, not adversarial."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "13th-pension referendum 2024 passed against Federal Council recommendation — popular-initiative-driven SD nudge on transfers."}
predecessor_movements: []
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Capital-account openness, low federal spending share, debt-brake, SNB independence, federalism preserving cantonal tax competition — full classical-liberal stack."}
  - {position_id: ordoliberal, alignment: aligned, notes: "Constitutional fiscal rules (Schuldenbremse), independent monetary authority, sovereign-default-precluding institutional architecture — Germanic ordoliberal template adapted via direct democracy."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Magic-formula coalition rule and Federal Council collegiality produce evidence-led, slow-moving consensus policymaking; deviation from a priori commitments common when data warrants."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "13th-pension referendum 2024, Mutterschaftsurlaub maternity-leave 2005, popular-initiative-driven welfare expansions — SD wins through referendum even when Federal Council opposes."}
references:

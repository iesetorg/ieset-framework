# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: austria_stocker_ovp_spo_neos_2025_present
status: candidate
name: "Stocker OeVP-SPOe-NEOS grand coalition 2025-present"
countries: [AUT]
timeframe: {start: 2025, end: ongoing, enacted_date: "2025-03-03"}
coalition: "OeVP-SPOe-NEOS (Dreierkoalition, 'Zuckerlkoalition')"
leaders:
  - "Christian Stocker (Chancellor, OeVP)"
  - "Andreas Babler (Vice-Chancellor + Minister for Social Affairs, SPOe)"
  - "Beate Meinl-Reisinger (Foreign Minister, NEOS)"
  - "Markus Marterbauer (Finance Minister, SPOe)"
doctrine: >
  Three-party centrist-liberal pro-EU stability coalition assembled explicitly
  to block Herbert Kickl's FPOe from the Chancellery after FPOe placed first
  in the 29 September 2024 Nationalrat election with 28.8% of the vote — the
  first FPOe national-election victory in the Second Republic. Positioned on
  the left-right axis as centre-right-anchored but compromised leftward by
  SPOe and the liberal NEOS, the doctrine fuses OeVP fiscal-consolidation
  commitments (closing a ~4.7% of GDP deficit inherited from the Nehammer
  period under EU excessive-deficit-procedure pressure), SPOe-demanded
  transfer protection (Klimabonus retention scaled down, rent-cap extension),
  and NEOS-demanded market-liberal structural reforms (pension indexing,
  Bildungsreform). Core early-period measures: consolidation budget doubling
  the bank levy and raising the top income-tax bracket, energy-crisis
  emergency subsidies wind-down, Klimabonus reform from flat to means-tested,
  abolition of the Bildungskarenz (paid education leave) as a labour-supply
  measure, and accelerated grid + PV buildout. Coherence judgement: a
  defensive cordon-sanitaire coalition whose internal fiscal-vs-transfer
  tensions resemble the German Ampel's, facing the added structural
  difficulty that the FPOe remains the strongest single opposition force
  in every post-formation poll.
policies:
  - at_konsolidierungspaket_2025
  - at_klimabonus_reform_2025
  - at_bildungskarenz_abschaffung_2025
  - at_bankenabgabe_verdopplung_2025
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Konsolidierungspaket targets deficit reduction from ~4.7% to under 3% of GDP across the legislative period; energy subsidy wind-down."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Top-bracket adjustment and extension of the Spitzensteuersatz above EUR 1m bracket partially offset inherited kalte Progression abolition."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: weak, rationale: "Klimabonus restricted to means-tested recipients; Bildungskarenz abolished; rent-cap extension is the counter-movement."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Bildungskarenz abolition raises effective labour supply; pension-indexing tightening."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Continued CO2 price trajectory (inherited from Nehammer 2022), grid buildout acceleration — but energy-subsidy wind-down softens stringency posture overall."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: moderate, rationale: "Coalition programme commits to tighter asylum procedures and family-reunification caps, partially co-opting FPOe framing under Kickl pressure."}
outcome_hypotheses:
  - fiscal_consolidation_growth_tradeoff_post_energy_shock
  - cordon_sanitaire_versus_mainstreaming_far_right_electoral_effect
predecessor_movements: [austria_nehammer_ovp_greens_2022_2025]
successor_movements: []
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Credits fiscal-consolidation pivot under EDP; sceptical of transfer-protection compromises."}
  - {position_id: ordoliberal, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "SPOe participation preserves Klimabonus architecture and rent regulation."}
references:
  - "Regierungsprogramm 2025-2029 (OeVP-SPOe-NEOS, 27 Feb 2025)"
  - "EU Council excessive-deficit-procedure decision for Austria, June 2025"
  - "Nationalratswahl 29 Sep 2024 final result (Bundesministerium fuer Inneres)"
notes: >
  Nationalrat seat distribution at formation (Feb 2025): OeVP 51 (26.3% of
  vote), SPOe 41 (21.1%), NEOS 18 (9.1%) — total 110/183 = 60.1%. FPOe
  largest opposition bloc with 57 seats (28.8%). First coalition attempt
  (FPOe-OeVP under Kickl mandate, January 2025) collapsed over finance
  ministry dispute; Stocker assembled the three-party formation in
  February-March 2025 after initial two-party OeVP-SPOe talks failed for
  want of a majority. Coalition nickname 'Zuckerlkoalition' (candy coalition,
  from the three party colours) coined in Austrian press. Approval at
  formation ~35%; FPOe polling above 30% through 2025.

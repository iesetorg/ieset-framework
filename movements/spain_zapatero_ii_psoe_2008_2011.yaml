movement_id: spain_zapatero_ii_psoe_2008_2011
status: candidate
name: "Zapatero II PSOE GFC-and-reversal government 2008-2011"
countries: [ESP]
timeframe: {start: 2008, end: 2011, enacted_date: "2008-04-12"}
coalition: "PSOE minority (169/350), varying external support (CiU, PNV, CC)"
leaders:
  - "José Luis Rodríguez Zapatero (PM)"
  - "Pedro Solbes / Elena Salgado (successive Finance Ministers)"
doctrine: >
  Second Zapatero term bracketed by housing-boom peak and sovereign-debt
  reversal. Economic school: centre-left stimulus-then-austerity — Plan E
  Keynesian pivot followed by forced Troika-pressure consolidation. Signature
  actions: Plan E / Fondo Estatal de Inversión Local (Nov 2008 €8bn) and
  Fondo Especial del Estado (€3bn) for municipal public works plus €400
  IRPF rebate; housing-sector cushion measures; banking reserves (FROB
  Jun 2009) channelling cajas-de-ahorro consolidation and recapitalisation;
  constitutional amendment Sep 2011 (Art. 135) introducing EU debt-brake /
  structural-balance principle — rare PSOE-PP cross-aisle reform signed in
  weeks; pension-age rise from 65 to 67 (Ley 27/2011); labour-market reform
  RDL 10/2010 lowering severance for objective dismissal. Popularity: PSOE
  43.9% / 169 seats 2008, collapsed to 28.8% / 110 seats in Nov 2011 snap
  election (PP won absolute majority). Zapatero personal approval fell from
  ~50% to ~20%. Coherence: low across the term (opposite-direction pivot
  mid-term under market pressure); moderately high within each phase.
policies:
  - es_plan_e_2008_2009
  - es_frob_cajas_consolidation_2009
  - es_constitutional_amendment_art_135_2011
  - es_pension_reform_2011
  - es_labour_reform_rdl_10_2010

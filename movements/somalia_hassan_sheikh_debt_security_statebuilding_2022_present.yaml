# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: somalia_hassan_sheikh_debt_security_statebuilding_2022_present
status: candidate
name: Somalia Hassan Sheikh debt-relief and security state-building government
countries: [SOM]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: '2022-05-15'
coalition: Federal Government of Somalia under President Hassan Sheikh Mohamud
leaders:
  - "Hassan Sheikh Mohamud (President, 2022-present)"
  - "Hamza Abdi Barre (Prime Minister, 2022-present)"
  - "Bihi Iman Egeh (Minister of Finance)"
doctrine: >
  Somalia's 2022-present federal governing programme combines debt-relief
  completion, IMF-backed fiscal institution building, constitutional completion,
  and Somali-led security transition. The stated policy logic is to convert
  HIPC relief and international security support into stronger federal revenue,
  public-finance controls, and national institutions capable of replacing
  externally led stabilization.
policies:
  - som_hipc_completion_point_debt_relief_2023
  - som_imf_ecf_revenue_pfm_2023
  - som_constitutional_amendments_2024
  - som_security_pact_atmis_transition_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "HIPC/ECF benchmarks, constitutional completion, and security-transition institutions strengthened formal state-building rules, despite political contestation."}
  - {axis: fiscal.spending_level, direction: "mixed", magnitude: weak, rationale: "Debt relief and security transition create fiscal space and obligations, while the ECF constrains spending to revenue and PFM rules."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: weak, rationale: "Revenue-mobilization reforms broaden formal tax and customs capacity."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "HIPC and IMF programme conditions support central-bank and financial-sector governance."}
references:
  - "IMF and World Bank Somalia HIPC Completion Point announcement, December 2023."
  - "IMF Somalia Extended Credit Facility staff reports, 2023-2025."
  - "Federal Parliament of Somalia and UN reporting on 2024 constitutional amendments."
  - "Somalia Security Pact and UN/AU reporting on ATMIS transition."
notes: >
  Constitutional and federal-security reforms are contested by some Somali
  actors. The coding reflects enacted federal-government policy instruments.


movement_id: philippines_ramos_lakas_nucd_1992_1998
status: candidate
name: "Fidel Ramos Philippines 2000 tiger-economy push (Philippines)"
countries: [PHL]
timeframe: {start: 1992, end: 1998}
coalition: "Lakas-NUCD (Lakas Tao — National Union of Christian Democrats)"
leaders:
  - "Fidel V. Ramos (President 1992-1998)"
  - "Roberto de Ocampo (Finance Secretary)"
  - "Gabriel Singson (BSP Governor)"
  - "Cesar Bautista (Trade Secretary)"
doctrine: >
  Fidel Ramos liberal-reformist 'Philippines 2000' doctrine — explicit
  tiger-economy aspiration, deregulation and privatisation blitz,
  peace-building with MNLF/MILF/CPP-NPA. Economic school: Washington-
  Consensus market-liberal modernisation adapted to post-Marcos
  constitutional constraints; foreign-investment opening; public-
  enterprise privatisation; telecom and power deregulation. Dated
  policies: New Central Bank Act (RA 7653) 14 Jun 1993 creating
  independent Bangko Sentral ng Pilipinas; Build-Operate-Transfer (BOT)
  Law RA 7718 amendment May 1994 expanding infrastructure BOT scope;
  telecom demonopolisation — EO 59 (Feb 1993) mandating interconnection
  ending PLDT monopoly, Public Telecommunications Policy Act RA 7925
  (1 Mar 1995); Oil Industry Deregulation Law RA 8180 (Mar 1996, struck
  down Nov 1997) and RA 8479 successor; Foreign Bank Liberalization
  Act RA 7721 (1994) allowing 10 new foreign bank branches; AFTA CEPT
  acceleration; WTO accession 1 Jan 1995; Comprehensive Tax Reform
  Program 1997; Peace agreement with MNLF (2 Sep 1996 Jakarta); Anti-
  Money Laundering foundation. Left-right: centre-right liberal-
  reformist Christian-Democratic coalition. Popularity: May 1992
  election Ramos 23.6% seven-way split; approval peak ~70% mid-term;
  1995 House/Senate midterms Lakas-NUCD-UMDP supermajority; charter-
  change (Cha-Cha) push for term extension failed mid-1997; succeeded
  by Joseph Estrada May 1998. Coherence: high — BOT, telecom, banking,
  oil, trade and central-banking reforms all pointed the same
  direction; Asian crisis Jul 1997 interrupted momentum but Philippines
  relatively mild impact vs Thailand/Indonesia/Korea.
policies:

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: peru_fujimori_stabilisation_1990_2000
status: candidate
name: "Fujimori stabilisation and liberalisation (Peru)"
countries: [PER]
timeframe: {start: 1990, end: 2000}
coalition: "Cambio 90 / Nueva Mayoría — executive-led technocracy after 1992 autogolpe"
leaders:
  - "Alberto Fujimori (President 1990-2000)"
  - "Carlos Boloña (Economy Minister 1991-1993)"
  - "Jorge Camet (Economy Minister 1993-1998)"
doctrine: >
  Inherited from Alan García's 1985-1990 heterodox experiment an inflation
  rate that peaked above 7,000% in 1990, empty reserves, and effective
  state insolvency. The August 1990 Fujishock liberalised prices, unified
  the exchange rate, cut fuel subsidies by orders of magnitude, and began
  re-entry to the international financial system arrears-clearance
  negotiations. Over 1991-1997 the programme executed large-scale
  privatisations (telecoms, electricity, mining), opened trade
  (uniform low tariff structure), liberalised the capital account,
  rewrote the 1993 Constitution to entrench central bank independence
  and fiscal rules, and created a rule-based monetary anchor under BCRP.
  Institutional quality declined sharply in a separate dimension: the
  1992 autogolpe suspended Congress and judiciary, the regime collapsed
  in 2000 amid corruption revelations (Vladimiro Montesinos), and human
  rights violations during the Shining Path counter-insurgency were later
  adjudicated. Framework records market-content and institutional-quality
  axes separately per Invariant 3.
policies:
  - peru_fujishock_1990
  - peru_privatisations_1991_1997
  - peru_trade_opening_1991_1993
  - peru_1993_constitution_central_bank
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: strong, rationale: "Hyperinflation ended via fiscal consolidation plus monetary reform; subsidy elimination."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Uniform low-tariff regime; export promotion; later WTO and FTA integration."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Telecoms, electricity, mining, and other SOE privatisations; entry-barrier removal."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "1993 Constitution entrenched BCRP autonomy and prohibited deficit financing."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "1992 autogolpe; judicial purges; later documented corruption network."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Capital-account liberalisation; banking law modernisation."}
outcome_hypotheses:
  - hyperinflation_requires_fiscal_dominance
  - market_reform_growth_effect_authoritarian_vs_democratic
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned}
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: institutionalism, alignment: opposed, notes: "Institutional quality declined sharply despite pro-market content."}
references:
  - "Boloña (1993), Cambio de Rumbo"
  - "Paredes & Sachs eds. (1991), Peru's Path to Recovery, Brookings"
  - "IMF Article IV Peru 1994, 1998"
  - "Dargent (2015), Technocracy and Democracy in Latin America"
notes: >
  Boundary case similar to Pinochet: market-oriented economic content
  combined with authoritarian institutional content. The framework's
  task is to separate these dimensions rather than collapse them.

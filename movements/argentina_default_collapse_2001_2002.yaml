# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_default_collapse_2001_2002
status: candidate
name: "Argentina 2001–2002 default + convertibility collapse"
countries: [ARG]
timeframe: {start: 2001, end: 2002, enacted_date: "2001-12-23"}
coalition: "Rotating presidents during collapse (De la Rúa, Rodríguez Saá, Duhalde)"
leaders: ["Fernando de la Rúa", "Adolfo Rodríguez Saá", "Eduardo Duhalde"]
doctrine: >
  Sovereign default December 2001 on ~US$100bn debt. Corralito banking
  freeze. Convertibility Law abandoned Jan 2002, peso depreciation to
  ~4/USD within weeks. Pesification of domestic-currency debts + dollar-
  indexation losses. GDP contracted ~11% in 2002; unemployment peaked ~25%.
  Framework codes as a failure-movement distinct from preceding Menem
  convertibility (the regime collapse vs the regime itself). Recovery
  2003+ via Kirchner-era expansion (separate movement).
policies: [argentina_default_2001, argentina_corralito_2001, argentina_convertibility_abandonment_2002, argentina_pesification_2002]
axes_summary:
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Corralito + pesification violated deposit contracts."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong, rationale: "Convertibility anchor abandoned; BCRA re-politicised."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Emergency welfare programmes (Jefes y Jefas) during collapse."}
outcome_hypotheses: [sovereign_default_output_effects]
position_alignments:
  - {position_id: austrian, alignment: aligned}
references:
  - "Blustein (2005), And the Money Kept Rolling In"
  - "Hornbeck (2013) CRS report on Argentina economic crisis"

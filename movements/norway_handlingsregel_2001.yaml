# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: norway_handlingsregel_2001
status: candidate
name: "Norway handlingsregel (fiscal rule) adoption"

countries: [NOR]

timeframe:
  start: 2001
  end: ongoing

coalition: "Stoltenberg I (Labour-led minority)"

leaders:
  - "Jens Stoltenberg (Prime Minister)"
  - "Karl Eirik Schjøtt-Pedersen (Finance)"
  - "Svein Gjedrem (Norges Bank governor, parallel reform of monetary framework)"

doctrine: >
  Lock the structural fiscal posture of the Norwegian state into a rule-
  based regime. The handlingsregel ("spending rule") commits the Storting
  to transfer only the expected real return (~3-4%) of the Government
  Pension Fund — Global (née Oljefondet) into the annual budget, saving
  the principal for inter-generational equity. Accompanying monetary
  reform gave Norges Bank operational independence with a 2.5% inflation
  target. Together: resource rents saved and invested through global
  markets; fiscal policy disciplined by a credible rule; monetary policy
  insulated from fiscal pressure. The stated goal was to avoid the
  Dutch-disease / resource-curse trajectory that had affected other oil
  states.

policies:
  - norway_handlingsregel_fiscal_rule_2001
  - norway_norges_bank_independence_2001
  - norway_gpfg_investment_mandate

axes_summary:
  - axis: fiscal.spending_level
    direction: "-"
    magnitude: strong
    rationale: "Spending capped at ~3% of SWF real returns; structural deficit kept below 3% of GDP under rule."

  - axis: monetary.central_bank_independence
    direction: "+"
    magnitude: strong
    rationale: "Norges Bank Act 1985 amended effective 2001 — inflation-target regime, operational independence."

  - axis: institutional.property_rights
    direction: "+"
    magnitude: moderate
    rationale: "Constitutional-like status of the Fund preserves resource rents from political extraction."

  - axis: fiscal.sectoral_subsidy
    direction: "0"
    rationale: "Explicit: the fund mandate forbids domestic investment and sector favouritism. Nordic SWF literature emphasises this discipline."

outcome_hypotheses:
  - nordic_outcome_persistence_decomposition_v3
  - welfare_architecture_comparative_effectiveness

predecessor_movements: []
successor_movements: []

position_alignments:
  - position_id: austrian
    alignment: partially_aligned
    notes: "Rule-based fiscal discipline + central bank independence align; sovereign-wealth-fund mechanism itself is state allocation of capital but operates through market-price discovery via global portfolio."

steelman: movements/steelman/norway_handlingsregel_2001.md

disclosure: >
  Per mega-spec §J.2.3, Norway's SWF is named as the canonical positive
  example of resource rent capture. Framework credits the policy content
  without claiming Norwegian outcomes are universally transferable (small
  population, high pre-existing institutional quality, specific geology).

references:
  - "St.meld. nr. 29 (2000–2001) (handlingsregel white paper)"
  - "Norges Bank Act, amendments effective 31 March 2001"
  - "IMF Article IV Norway, post-2001 reviews"

notes: >
  Treatment date 2001 is when the fiscal rule took legal effect. Norway
  continued to accumulate into the GPFG before this date, but discretion
  over fund deployment was only codified in 2001. Policy-content coding
  dates the movement to rule adoption, not fund establishment (1990).

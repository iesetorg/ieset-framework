movement_id: israel_shamir_likud_first_1983_1984
status: candidate
name: "Shamir Likud first term — bank-shares crash and hyperinflation peak"
countries: [ISR]
timeframe: {start: 1983, end: 1984}
coalition: "Likud-led coalition inherited from Begin"
leaders:
  - "Yitzhak Shamir (Prime Minister October 1983 - September 1984)"
  - "Yigal Cohen-Orgad (Finance Minister 1983-1984)"
doctrine: >
  Shamir's first brief term (October 1983 - September 1984) was consumed by
  the bank-shares collapse (October 1983) and runaway inflation — CPI rose
  at an annualised 400%+ by mid-1984. Economic school: reactive crisis
  management — Cohen-Orgad's 'package deals' between government, Histadrut,
  and manufacturers attempted wage-price coordination but without ending
  monetary financing or the underlying deficit. Left-right axis: Likud-right
  on security and settlement policy; no coherent economic direction given
  inherited crisis. Popularity: 1984 Knesset elections produced a deadlock
  (Labour 44, Likud 41) and forced the National Unity government with
  Peres. Coherence: low — the movement is essentially a failed stabilisation
  attempt on the path to the July 1985 Stabilization Plan; scored here
  to preserve the analytic distinction between Begin's liberalisation,
  Shamir's crisis management, and Peres's unity-government stabilisation.
policies:
  - il_1983_bank_shares_nationalisation
  - il_1984_package_deals_wage_price_coord
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "October 1983 state nationalisation of the four major bank-share portfolios reversed 1977 financial opening."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Inflation peaked near 400%+ annualised mid-1984 on continued monetary financing."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Inherited deficit continued; Lebanon War costs ongoing."}
predecessor_movements: [israel_begin_likud_1977_1983]
successor_movements: [israel_peres_national_unity_1984_1986]

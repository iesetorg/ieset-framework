# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: portugal_carnation_revolution_1974_1986
status: candidate
name: "Portugal Carnation Revolution: nationalisations, retrenchment, EEC accession"
countries: [PRT]
timeframe: {start: 1974, end: 1986}
coalition: "MFA-led provisional governments 1974-1976; constitutional governments PS, PSD, AD thereafter"
leaders:
  - "Movimento das Forças Armadas (MFA) officers — Vasco Gonçalves, Otelo Saraiva de Carvalho"
  - "Mário Soares (PS, PM 1976-1978 and 1983-1985)"
  - "Francisco Sá Carneiro (PSD/AD, PM 1980)"
  - "Aníbal Cavaco Silva (PSD, PM from November 1985)"
doctrine: >
  Revolutionary rupture of 25 April 1974 ended the Estado Novo and
  triggered a two-phase economic trajectory. Phase 1 (1974-1976): nationa-
  lisation of banks and insurance (Decree-Law 132-A/75, 11 March 1975),
  core industry (Decree-Law 205-G/75, 16 April 1975) covering petrochem-
  icals, steel, cement, tobacco, shipping, electricity, transport; agrarian
  reform in the Alentejo (collectivisation of large estates, Decree-Law
  406-A/75); decolonisation and ~half-million returnees (retornados) from
  Angola and Mozambique absorbed 1975-1976. 1976 Constitution codified
  socialist transition language and made nationalisations 'irreversible
  conquests' (Article 83/85 of the original text). Phase 2 (1977 onward):
  first IMF standby 1977-1978 under Soares's PS government — austerity,
  escudo devaluation, crawling peg. Second IMF standby 1983-1985 under
  Soares PS-PSD Bloco Central — sharper consolidation, external-account
  correction. Constitutional revision 1 (1982) removed Council of the
  Revolution; revision 2 (1989) later removed the irreversibility clause
  enabling formal privatisations (outside this window). EEC accession
  treaty signed 12 June 1985, entry 1 January 1986. Cavaco Silva PSD
  majority from 1987 begins a distinct later movement. Proponents on the
  revolutionary side framed Phase 1 as ending economic oligarchy;
  proponents of Phase 2 framed adjustment as necessary to stabilise the
  young democracy and align with Europe.
policies:
  - portugal_bank_nationalisations_1975
  - portugal_industrial_nationalisations_1975
  - portugal_agrarian_reform_1975
  - portugal_1976_constitution_socialist_clauses
  - portugal_imf_standby_1977_1978
  - portugal_imf_standby_1983_1985
  - portugal_eec_accession_treaty_1985
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "1975 nationalisations of banking, insurance, core industry; state-controlled entry codified constitutionally 1976."}
  - {axis: institutional.property_rights, direction: "-", magnitude: strong, rationale: "Compensated but contested nationalisations plus constitutional irreversibility clause until 1989."}
  - {axis: regulatory.trade_openness, direction: "mixed", rationale: "EFTA participation pre-1986 then EEC accession opens trade; IMF-era devaluations/crawling peg distinct channel."}
  - {axis: fiscal.spending_level, direction: "mixed", rationale: "Revolutionary-era wage and social-spending increases followed by IMF consolidations 1977-78 and 1983-85."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "National Health Service created 1979 (Lei 56/79); social-security universalisation extended under Constitution."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: moderate, rationale: "Democratic constitution 1976 replaced authoritarian regime; Tribunal Constitucional from 1983."}
position_alignments:
  - {position_id: marxian, alignment: partially_aligned, notes: "Phase 1 revolutionary content with explicit socialist transition language in 1976 Constitution."}
  - {position_id: democratic_socialist, alignment: partially_aligned, notes: "PS and Eurocommunist-influenced strands within MFA-era coalitions."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Phase 2 IMF-era adjustments."}
references:
  - "Decreto-Lei 132-A/75 (bank nationalisation)"
  - "Decreto-Lei 205-G/75 (industry nationalisation)"
  - "Constituição da República Portuguesa, 2 April 1976 (original text)"
  - "Treaty of Accession, Spain and Portugal to the EEC, 12 June 1985"
  - "Baklanoff (1996), 'Breaking with Collectivism'"
  - "Lopes (1996), A Economia Portuguesa desde 1960"
notes: "Pre-1996 sample extension. Coded as a single movement spanning revolution and adjustment because the content flows from the same rupture; Cavaco Silva privatisation era 1987+ is a separate movement."

movement_id: japan_nakasone_ldp_1982_1987
status: candidate
name: "Nakasone privatisation-reform LDP (Japan)"
countries: [JPN]
timeframe: {start: 1982, end: 1987}
coalition: "LDP single-party government, Nakasone faction-led"
leaders:
  - "Yasuhiro Nakasone (PM 1982-1987)"
  - "Noboru Takeshita (Finance Minister)"
  - "Toshio Doko (Rincho Chair, keidanren)"
doctrine: >
  Nakasone privatisation-reform LDP doctrine — Japan's equivalent strand
  of the 1980s Anglo-American supply-side turn, adapted to convoy
  capitalism. Economic school: market-liberal managerialism within a
  developmentalist frame; hawkish on US alliance, privatisation, and
  administrative reform. Dated policies: Nippon Telegraph and Telephone
  (NTT) privatisation (Apr 1985, NTT Corporation Act), Japan Tobacco and
  Salt Public Corporation (JT) privatisation (Apr 1985), Japanese
  National Railways (JNR) breakup and privatisation into 7 JR companies
  (Apr 1987, JNR Reform Law Nov 1986); Plaza Accord 22 Sep 1985
  coordinating yen appreciation from ¥240 to ¥150/USD by end-1987;
  1984 New Telecommunications Business Law ending NTT monopoly;
  Maekawa Report Apr 1986 urging domestic-demand-led growth and market
  opening. Left-right: centre-right market-liberal with nationalist
  overlay (Yasukuni visit 1985, defence-spending 1% GDP cap debate).
  Popularity: 1983 general election LDP 45.8% / 250 seats (coalition
  with NLC needed); double election 6 Jul 1986 LDP 49.4% / 300 seats —
  largest post-war LDP majority, popular privatisation mandate. Nakasone
  approval peaked ~60% mid-1986. Coherence: tight — privatisation,
  administrative reform, market opening, and US-alignment all pointed
  the same direction, reinforced by Doko Rincho recommendations.
policies:
  - jp_ntt_privatisation_1985
  - jp_jt_privatisation_1985
  - jp_jnr_privatisation_1987
  - jp_plaza_accord_1985
  - jp_maekawa_report_1986
  - jp_telecom_business_law_1984
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "NTT/JT/JNR privatisation + telecom market opening — largest Japanese deregulation wave to date."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Transfer of public corporations to shareholder-owned firms."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Maekawa Report opened procurement and standards; managed-trade pressures offset."}
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: moderate, rationale: "BoJ eased sharply after Plaza to offset yen-shock — fed 1986-1990 asset bubble."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Administrative-reform spending discipline; 'zero ceiling' budget requests from 1983."}

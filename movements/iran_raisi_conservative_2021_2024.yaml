movement_id: iran_raisi_conservative_2021_2024
status: candidate
name: "Raisi principlist-conservative government (Iran)"
countries: [IRN]
timeframe:
  start: 2021
  end: 2024
  enacted_date: "2021-08-03"
coalition: "Front of Islamic Revolution Stability and broader principlist bloc under Supreme Leader Khamenei; 11th Majles (elected 2020) principlist-dominated ~221/290 seats; 12th Majles (elected Mar 2024) continuation of principlist-conservative dominance with Paydari hardliner subfaction expansion"
leaders:
  - "Ebrahim Raisi (President 3 Aug 2021 - 19 May 2024, killed in helicopter crash)"
  - "Mohammad Mokhber (First Vice President 2021-2024, Acting President May-Jul 2024)"
  - "Hossein Amir-Abdollahian (Foreign Minister 2021-2024, killed with Raisi)"
  - "Ehsan Khandouzi (Minister of Economy 2021-2024)"
  - "Ali Salehabadi then Mohammad Reza Farzin (CBI Governors)"
  - "Mohammad Bagher Ghalibaf (Majles Speaker 2020-)"
doctrine: >
  Principlist-conservative resistance-economy doctrine: sanctions-endurance
  macroeconomics, BRICS-Eurasia pivot, domestic protest suppression, and
  nuclear-programme acceleration as negotiating leverage. Core programme —
  (i) JCPOA revival talks in Vienna 2021-2022 collapsed; uranium enrichment
  raised to 60% and IAEA monitoring degraded; (ii) Mahsa Amini death in
  morality-police custody 16 Sep 2022 triggered Women-Life-Freedom nationwide
  protests spanning ~120 cities, ~500+ killed, ~20,000 arrested, multiple
  protester executions; (iii) China-brokered Iran-Saudi normalisation 10 Mar
  2023; (iv) BRICS accession 1 Jan 2024 alongside Egypt, UAE, Ethiopia;
  Shanghai Cooperation Organisation full membership Jul 2023; (v) direct
  Iran-Israel military exchange 13-14 Apr 2024 (first direct state-to-state
  strike, ~300 drones/missiles) after Damascus consulate strike; (vi)
  resistance-economy rhetoric: "knowledge-based" production, import-
  substitution, neighbourhood trade via rial-rouble/yuan settlement; (vii)
  inflation 40-50% YoY range, rial depreciation to ~600,000/USD by mid-2024,
  oil exports partially recovered to ~1.5-1.6m bpd via discounted sales to
  China; (viii) fuel-quota adjustments and bread-subsidy restructuring 2022
  ("noon-kart" smart-card); (ix) hijab-law enforcement intensification and
  Chastity and Hijab Bill advanced through Majles Sep 2023; (x) demographic
  decline — fertility below replacement, net emigration of skilled workers.
  Left-right: principlist-conservative pole within clerical-theocratic
  system; more hardline than Rouhani-era on social enforcement, foreign
  alignment, and protest policing. Popularity: Raisi won 62.9% of votes
  2021 on lowest post-revolution turnout ~48.8% (after Guardian Council
  disqualifications of reformist candidates). Principlist bloc retained
  Majles dominance Mar 2024 on ~41% turnout, lowest ever. Approval
  collapsed through 2022-2023 Women-Life-Freedom period. Coherence line:
  resistance-economy + security-forward doctrine unified nuclear leverage,
  protest suppression, and BRICS pivot, at the cost of currency collapse
  and delegitimation among urban-middle-class and women's constituencies.
policies:
  - ir_brics_accession_2024
  - ir_hijab_chastity_bill_2023
  - ir_uranium_enrichment_60pct_2021
  - ir_saudi_iran_normalisation_2023
  - ir_bread_smartcard_subsidy_reform_2022
axes_summary:
  - {axis: regulatory.trade_openness, direction: "mixed", magnitude: moderate, rationale: "BRICS/SCO accession and neighbour-trade expansion partially offset continued US secondary-sanctions regime; discount-oil exports to China recovered."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "May 2022 bread/flour subsidy overhaul ('surgery') raised bread prices 300-400%; replaced with smart-card-mediated quotas."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Women-Life-Freedom protest crackdown with mass arrests and executions; expanded morality-enforcement scope."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: weak, rationale: "IRGC-linked conglomerate share of sanctions-era import channels expanded; bonyad architecture unchanged."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "CBI subordinated to resistance-economy priorities; persistent monetisation; inflation 40-50%."}
outcome_hypotheses: [sanctions_effect_on_growth, rentier_state_non_oil_development]
predecessor_movements: [iran_rouhani_moderate_2013_2021]
successor_movements: [iran_pezeshkian_reformist_2024_present]
position_alignments:
  - {position_id: developmentalism, alignment: partially_aligned, notes: "Resistance-economy rhetoric echoes import-substitution state-led investment."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Product-market competition restricted; parastatal dominance entrenched; capital controls tightened."}
  - {position_id: new_keynesian, alignment: opposed, notes: "CBI independence eroded; persistent high inflation."}
references:
  - "Iranian Ministry of Interior 2021 presidential election results"
  - "IAEA Board of Governors reports on Iran 2021-2024"
  - "BRICS Johannesburg II Declaration, Aug 2023"
  - "Amnesty International reports on 2022-2023 protests"
  - "UN Fact-Finding Mission on Iran report, Mar 2024"
notes: "Raisi died 19 May 2024 in helicopter crash near Varzaqan. Acting presidency under Mokhber until Pezeshkian's inauguration 28 Jul 2024."

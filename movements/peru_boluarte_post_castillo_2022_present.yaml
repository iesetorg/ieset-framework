# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: peru_boluarte_post_castillo_2022_present
status: candidate
name: "Boluarte post-Castillo government (Peru)"
countries: [PER]
timeframe:
  start: 2022
  end: ongoing
  enacted_date: "2022-12-07"
coalition: "Nominally independent (Boluarte expelled from Perú Libre in Jan 2022) governing on de-facto alliance with congressional right/centre-right blocs — Fuerza Popular, Alianza para el Progreso, Renovación Popular, Avanza País, Acción Popular — without a disciplined party whip."
leaders:
  - "Dina Boluarte (President 2022-present)"
  - "Alex Contreras (Economy Minister 2022-2023)"
  - "José Arista (Economy Minister 2024)"
  - "José Salardi (Economy Minister 2024-present)"
  - "Óscar Becerra / Rómulo Mucho / Jorge Montero (rotating Energy & Mines)"
  - "Víctor Torres / Juan José Santiváñez (Interior Ministers during protest crackdown)"
doctrine: >
  Continuity centrist macro-orthodoxy under de-facto congressional
  right-wing backing after Castillo's failed self-coup attempt
  (Dec 7 2022) and immediate impeachment. Economic doctrine is
  "muddling-through" pragmatism: preserve the 1993-Constitution
  macro framework (BCRP independence, fiscal rules, open capital
  account), facilitate large-scale mining and gas investment
  (Quellaveco ramp-up, Tía María restart, Michiquillay permitting,
  Camisea contract renegotiation), and avoid heterodox
  experiments. Parallel strands: (i) law-and-order posture
  justifying Dec 2022-Jan 2023 police and military deployment
  against southern-highlands protests that left ~49 civilians
  dead per IACHR and OHCHR tallies (Ayacucho, Apurímac, Puno,
  Junín) plus ~12 further deaths across 2023; (ii) serial
  Congress-driven populist pension withdrawals (seventh and
  eighth AFP retiro laws 2023-2024) eroding the private pension
  pillar; (iii) institutional-quality erosion via the Ley APCI
  (2024) restricting NGO cooperation and litigation, repeated
  weakening of the Junta Nacional de Justicia and prosecutorial
  independence, and assaults on the Fiscalía de la Nación
  investigating the Rolex / luxury-goods case against Boluarte
  herself; (iv) persistent executive-congressional collusion to
  roll back organized-crime and environmental-crime enforcement.
  Approval collapsed below 5% (IEP, Ipsos 2024) — historically
  unprecedented — yet the coalition persists because Congress
  and executive share an interest in avoiding early elections.
  The IESET coding separates pro-investment market-content
  moves from sharp rule-of-law and judicial-independence
  deterioration per Invariant 3.
policies:
  - pe_mining_investment_facilitation_2023
  - pe_protest_crackdown_2022_2023
  - pe_afp_pension_withdrawals_2023_2024
  - pe_ley_apci_ngo_restrictions_2024
  - pe_judicial_independence_rollback_2023_2025
axes_summary:
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Mining and hydrocarbons permitting facilitation; extractive-sector investment promotion."}
  - {axis: regulatory.environmental_stringency, direction: "-", magnitude: weak, rationale: "Rollback of environmental crime enforcement; weakening of forestry and prior-consultation checks."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Congress-driven AFP pension withdrawals act as one-off consumption transfers, eroding forced-saving pillar."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "BCRP autonomy preserved; Julio Velarde continued; no politicisation of monetary policy."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Lethal force against protesters with minimal prosecutorial accountability; Ley APCI restricts civil-society oversight; repeated interference with Fiscalía and JNJ."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Congress removed JNJ members; pressure on Attorney General investigating executive; Constitutional Tribunal reshuffles."}
outcome_hypotheses:
  - institutional_erosion_market_access_divergence
predecessor_movements:
  - peru_castillo_peru_libre_2021_2022
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Market-content continuity but rule-of-law degradation flagged as opposed."}
  - {position_id: institutionalism, alignment: opposed}
references:
  - "IACHR (2023), 'Situation of Human Rights in Peru'"
  - "OHCHR (2023), 'Informe sobre Perú diciembre 2022 - marzo 2023'"
  - "IEP Informe de Opinión 2023-2025 approval series"
  - "IMF Article IV Peru 2023, 2024"
  - "Ley N° 32301 (Ley APCI) 2024"
  - "Defensoría del Pueblo, Crisis Política y Protesta Social 2022-2023"
notes: >
  Approval under 5% (Ipsos, IEP 2024-2025) is historically
  unprecedented in the polled era for any sitting Peruvian
  president. Coalition survival explained by shared
  executive-congressional interest in completing the 2021-2026
  term rather than triggering early elections. Framework codes
  pro-investment market content and rule-of-law erosion as
  separate dimensions.

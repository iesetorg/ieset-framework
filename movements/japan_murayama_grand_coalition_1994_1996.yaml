# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_murayama_grand_coalition_1994_1996
status: candidate
name: "Murayama SDPJ-LDP-Sakigake grand coalition (Japan)"
countries: [JPN]
timeframe: {start: 1994, end: 1996}
coalition: "SDPJ-LDP-Sakigake grand coalition"
leaders:
  - "Tomiichi Murayama (PM Jun 1994-Jan 1996, SDPJ)"
  - "Yohei Kono (Deputy PM/Foreign Minister, LDP)"
  - "Masayoshi Takemura (Finance Minister, Sakigake)"
doctrine: >
  Improbable SDPJ-LDP grand coalition — Socialist PM with LDP
  providing parliamentary ballast, ideologically-incoherent marriage
  of convenience to displace non-LDP reformists. Economic school:
  status-quo convoy-capitalism with crisis-response interventionism;
  SDPJ's 1994 Murayama doctrine renounced unarmed neutrality and JSDF
  unconstitutionality — ideological realignment. Dated policies:
  Housing-loan companies (jusen) bailout ¥685bn Jun 1996, resolved via
  Deposit Insurance Law amendment and Housing Loan Administration
  Corporation; Kobe earthquake Jan 1995 reconstruction budget;
  consumption tax hike legislated Nov 1994 (to 5% effective Apr 1997);
  Murayama Statement 15 Aug 1995 on wartime aggression; Aum Shinrikyo
  sarin Mar 1995 + Religious Corporations Law revision Dec 1995.
  Left-right: nominally centre-left (SDPJ PM) but LDP-dominated
  substance; economic policy mildly centrist-statist. Popularity:
  Murayama approval fell steadily from ~55% to ~30% by resignation;
  1995 Upper House election SDPJ vote collapsed from 17.0% to 10.4%.
  Coherence: low — ideological contortions (Socialist PM endorsing
  JSDF) signalled SDPJ's post-war decline; economic drift rather than
  doctrine.
policies:
  - jp_jusen_bailout_1996
  - jp_consumption_tax_5pct_legislation_1994
  - jp_kobe_reconstruction_budget_1995
  - jp_murayama_statement_1995
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Consumption tax hike to 5% legislated (effective 1997) shifting burden further to consumption base."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Kobe reconstruction + jusen resolution + stimulus supplementary budgets."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Jusen bailout reinforced implicit too-connected-to-fail; delayed market exit of failing institutions."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Religious Corporations Law revision post-Aum; disaster-response institutional reform."}
predecessor_movements:
  - japan_non_ldp_interlude_1993_1994
position_alignments:
  - {position_id: developmentalism, alignment: aligned}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Cargill et al. (1997), The Political Economy of Japanese Monetary Policy"
  - "Curtis (1999), The Logic of Japanese Politics"
notes: "Deep-history tranche 2."

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_thatcher_first_term_1979_1983
status: candidate
name: "Thatcher first term: disinflation, MTFS, opening privatisations"
countries: [GBR]
timeframe: {start: 1979, end: 1983}
coalition: "Conservative majority (43-seat)"
leaders:
  - "Margaret Thatcher (PM)"
  - "Geoffrey Howe (Chancellor 1979-1983)"
  - "Keith Joseph (Industry Secretary 1979-1981)"
  - "Nigel Lawson (Financial Secretary to the Treasury, then Energy 1981-1983)"
doctrine: >
  Early-Thatcherite monetarist stabilisation and supply-side loosening,
  distinct in intensity and content from the second and third terms.
  Economic school: Friedman-monetarist on macro, Hayekian supply-side
  and union reform on micro — Keith Joseph / Centre for Policy Studies
  framing. Left-right axis: right, decisively — break with post-war
  Butskellite consensus on both fiscal/monetary discipline and labour
  power. Key content: (i) 1979 "Howe Budget" June 1979 — VAT unified
  to 15% (up from 8%/12.5%), top income tax rate 83% → 60%, basic
  rate 33% → 30%; (ii) exchange-control abolition (October 1979);
  (iii) Medium-Term Financial Strategy (MTFS) announced March 1980 —
  declining £M3 target path; (iv) Employment Act 1980 (restrictions on
  secondary picketing, closed shop) and Employment Act 1982 (abolition
  of statutory trade union immunity for unlawful acts); (v) first
  privatisations — British Aerospace (February 1981), Cable & Wireless
  (October 1981), Amersham International (February 1982), Britoil
  (November 1982), Associated British Ports (February 1983);
  (vi) Housing Act 1980 — Right to Buy; (vii) 1981 Budget raised taxes
  into a recession (£4bn fiscal tightening) — 364 economists protested;
  (viii) Falklands War April-June 1982 transformed political fortunes.
  Popularity signals: 1979 general election 43.9% vote (14m votes),
  Conservative Party approval fell to ~23% by December 1981 (lowest for
  any postwar government), Gallup Thatcher personal rating ~25% in early
  1982; post-Falklands surge — Conservatives recovered to >40%; 9 June
  1983 general election: Conservatives 42.4% (-1.5pp vote share but
  Labour collapsed to 27.6% with SDP-Liberal Alliance at 25.4%),
  seat swing +58 = 144-seat majority. Coherence: macro and micro content
  aligned around rolling back corporatist post-war settlement; early
  output and unemployment costs (unemployment 1.3m June 1979 → 3.1m
  January 1982) were politically survivable because alternative Labour
  party had split (SDP founding March 1981) and Falklands reset the
  legitimation frame.
policies:
  - uk_howe_budget_1979
  - uk_exchange_control_abolition_1979
  - uk_medium_term_financial_strategy_1980
  - uk_employment_act_1980
  - uk_employment_act_1982
  - uk_howe_budget_1981_tax_rise_in_recession
  - uk_first_wave_privatisations_1981_1983
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: strong, rationale: "Top rate 83→60% (1979), basic 33→30%."}
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: strong, rationale: "MTFS declining M3 path + Bank Rate peaks 17% 1979."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Employment Acts 1980/1982 begin dismantling secondary-action immunities and closed shop."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Exchange controls abolished October 1979 (pre-Big Bang)."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "First-wave privatisations opened aerospace, telecoms adjacent, and oil."}
  - {axis: institutional.property_rights, direction: "+", magnitude: moderate, rationale: "Right to Buy extended council-tenant purchase."}
predecessor_movements: [uk_callaghan_labour_1976_1979]
successor_movements: [uk_thatcher_second_term_1983_1987]
position_alignments:
  - {position_id: chicago_monetarism, alignment: aligned, notes: "MTFS is the clearest UK implementation of Friedman-style monetary targeting."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Supply-side content aligned; monetary-aggregate targeting only partially Austrian."}
  - {position_id: classical_liberal, alignment: aligned}
references:
  - "Medium-Term Financial Strategy, Budget Red Book March 1980"
  - "Employment Act 1980 (UK); Employment Act 1982 (UK)"
  - "Housing Act 1980 (UK)"
  - "Letter of 364 Economists, The Times, 30 March 1981"
  - "Lawson (1992), The View from No. 11"
notes: >
  Distinct from the broader thatcherism.yaml movement: this entry captures
  the first-term content block (disinflation + exchange-control abolition +
  opening privatisations + early union reform). Big Bang, Miners' Strike
  and heavyweight privatisations (BT, British Gas) belong to the second
  term and parent thatcherism movement.

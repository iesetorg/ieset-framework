movement_id: tanzania_suluhu_ccm_2021_present
status: candidate
name: "Samia Suluhu Hassan CCM presidency 2021-present"
countries: [TZA]
timeframe: {start: 2021, end: ongoing, enacted_date: "2021-03-19"}
coalition: "Chama Cha Mapinduzi (CCM) — dominant party"
leaders:
  - "Samia Suluhu Hassan (President, CCM, March 2021-, succeeded Magufuli; first woman president of Tanzania)"
  - "Kassim Majaliwa (Prime Minister, continuing from Magufuli era)"
  - "Mwigulu Nchemba (Finance and Planning Minister)"
  - "Emmanuel Tutuba (BoT Governor, 2023-)"
doctrine: >
  Suluhu succeeded John Magufuli in March 2021. Programme:
  partial reversal of Magufuli's authoritarian populism — "4Rs"
  framework (reconciliation, resilience, reforms, rebuilding);
  return to engagement with IMF and World Bank (Extended Credit
  Facility 2022); covid policy reversal (vaccination programme
  rolled out after Magufuli denial); media-restriction
  loosening (some bans lifted, opposition rallies allowed
  again 2023); foreign-investor re-engagement on natural-gas
  LNG project, mining-act amendments to soften 2017 Magufuli
  resource-nationalist regime. Politically: 2024 confrontation
  with CHADEMA opposition (leader Tundu Lissu and others
  arrested ahead of 2025 election); 2025 general election
  consolidated Suluhu's first elected term. Industrial-policy
  push: Standard Gauge Railway continuation, Julius Nyerere
  hydropower commissioning, East African Crude Oil Pipeline.
policies:
  - tz_imf_ecf_re_engagement_2022
  - tz_mining_act_amendments_2023
  - tz_eacop_construction_continuation
  - tz_julius_nyerere_hydropower_commissioning
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Foreign-investor re-engagement; reversal of Magufuli-era resource-nationalism extremes."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: weak, rationale: "BoT modernisation; IMF ECF compliance; inflation-target regime more credible."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "Some media and opposition restrictions loosened relative to Magufuli; arrests 2024-2025 partially walked back gains."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Major infrastructure (SGR, hydropower, EACOP) plus revived natural-gas LNG project."}
predecessor_movements: [tanzania_nyerere_ujamaa_1967_1985]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "CCM-developmentalist tradition; Standard Gauge Railway, Julius Nyerere hydropower, EACOP, LNG project — full developmentalist infrastructure stack."}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Free-education expansion + transfer programmes + return to evidence-based public health (covid vaccination, TB, malaria)."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "IMF ECF compliance; foreign-investor re-engagement; reversal of Magufuli-era denial-and-improvisation regime."}

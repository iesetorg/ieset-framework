# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: argentina_macri_cambiemos_2015_2019
status: candidate
name: "Macri Cambiemos market-liberal gradualism (Argentina)"
countries: [ARG]
timeframe: {start: 2015, end: 2019, enacted_date: "2015-12-10"}
coalition: "Cambiemos (PRO + UCR + Coalición Cívica)"
leaders: ["Mauricio Macri (President)", "Alfonso Prat-Gay (Economy 2015-16)", "Nicolás Dujovne (Treasury 2017-19)", "Federico Sturzenegger (BCRA 2015-18)", "Luis Caputo (BCRA 2018)", "Guido Sandleris (BCRA 2018-19)"]
doctrine: >
  Cambiemos pursued a market-liberal "gradualismo" programme: immediate
  December 2015 lifting of the cepo currency controls and peso
  unification (~40% devaluation), holdout-creditor settlement in Apr
  2016 returning Argentina to international capital markets, phased
  "sincere-pricing" tariff hikes on utilities and transport to cut
  subsidies, attempted inflation-targeting regime at BCRA, capital-
  account liberalisation, restoration of credible INDEC statistics,
  gradual rather than shock fiscal consolidation. The gradualism relied
  on external financing which broke in the 2018 emerging-market sudden
  stop: peso collapsed, Macri secured the then-largest IMF Stand-By
  Arrangement at USD 50bn (Jun 2018) expanded to USD 57bn (Sep 2018),
  economy fell into deep recession, inflation re-accelerated to 54%
  (2019). Macri won the 2015 runoff 51.34% vs Scioli but lost the Aug
  2019 PASO primary by ~15 points, triggering a further peso crash and
  re-imposition of capital controls before handing power to Fernández.
  Doctrine positioned as centrist-reformist; revealed content was
  partial liberalisation derailed by BOP crisis + IMF programme.
policies:
  - ar_macri_cepo_lift_peso_unification_2015
  - ar_macri_holdout_settlement_2016
  - ar_macri_utility_tariff_sincere_pricing_2016
  - ar_macri_tax_reform_2017
  - ar_macri_imf_stand_by_2018
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "Export taxes on grains reduced; import licensing eased."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Price-control rollback; utility tariff liberalisation."}
  - {axis: fiscal.sectoral_subsidy, direction: "-", magnitude: moderate, rationale: "Energy + transport subsidy cuts via tariff normalisation."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: weak, rationale: "Gradualism — deficit reduction slower than planned; re-tightened under IMF SBA."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Inflation-targeting regime + restored INDEC credibility; partially reversed after 2018 crisis."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Capital-account liberalisation; holdout settlement restored market access."}
outcome_hypotheses: [austerity_growth_recovery_tradeoff, hyperinflation_requires_fiscal_dominance]
predecessor_movements: [kirchner_fernandez_expansionary_2003_2015]
successor_movements: [argentina_alberto_fernandez_fdt_2019_2023]
position_alignments:
  - {position_id: chicago_monetarist, alignment: partially_aligned}
  - {position_id: austrian, alignment: partially_aligned, notes: "Austrians criticised gradualism as insufficient."}
  - {position_id: post_keynesian, alignment: opposed}
references:
  - "IMF (2018), Argentina Stand-By Arrangement Request, SM/18/141"
  - "Gerchunoff-Rapetti (2020), 'Macroeconomía en Tiempos de Cambiemos'"
  - "BCRA Annual Reports 2016-2019"
notes: "Chamber of Deputies 2015: Cambiemos ~91 seats (35%); after 2017 midterms ~107 seats (~42%). Never held Senate majority."

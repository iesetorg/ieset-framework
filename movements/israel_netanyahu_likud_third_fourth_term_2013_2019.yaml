  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: weak, rationale: "Gas Framework locked in concession stability against retroactive regulation."}
  - {axis: fiscal.tax_progressivity, direction: "0", magnitude: weak, rationale: "Mixed — zero-VAT first-buyer scheme shelved; marginal-rate stability."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "HCJ rulings respected; judicial-reform push not yet enacted in this period."}
outcome_hypotheses: [resource_taxation_and_growth, product_market_deregulation_effect]

movement_id: israel_netanyahu_likud_third_fourth_term_2013_2019
status: candidate
name: "Netanyahu III-IV Likud governments (Israel)"
countries: [ISR]
timeframe:
  start: 2013
  end: 2019
  enacted_date: "2013-03-18"
coalition: "Likud-led successive coalitions: III (2013-2015) with Yesh Atid, Habayit Hayehudi, Hatnuah; IV (2015-2020) with Kulanu, Habayit Hayehudi, Shas, UTJ, Yisrael Beiteinu"
leaders:
  - "Benjamin Netanyahu (Prime Minister 18 Mar 2013 - 17 May 2020, continuous)"
  - "Yair Lapid (Finance Minister 2013-2014)"
  - "Moshe Kahlon (Finance Minister 2015-2020)"
  - "Karnit Flug (Bank of Israel Governor 2013-2018)"
  - "Amir Yaron (Bank of Israel Governor from Dec 2018)"
doctrine: >
  Likud market-liberal coalition with incremental social-housing and
  competition reforms alongside sustained Iran-deal opposition and Trump-era
  alliance deepening. Economic school: market-liberal with household-cost
  targeted interventions — Kahlon (Kulanu) housing-supply and buyer-zero-VAT
  campaigns, 2015 Gas Framework judicial battle culminating HCJ approval
  Mar 2016, 2016 Cellular Reform, 2018 Bank Separation (Strum) Law;
  NIS-USD rate strength drove CBI FX interventions. Dated policies: Gas
  Framework signed 17 Dec 2015 and HCJ approval Mar 2016; 2016 Cellular
  Reform; 2018 Strum Law separating credit-card companies from banks;
  Nation-State Basic Law 19 Jul 2018; Trump embassy move 14 May 2018;
  Trump JCPOA withdrawal 8 May 2018 (Netanyahu-led lobbying). Left-right:
  centre-right economically liberal with consumer-price activism;
  nationally conservative, Abraham-Accords preparatory diplomacy. Popularity:
  2013 Likud-Beiteinu 31 seats; 2015 Likud 30 seats (alone); 2019a Apr Likud
  35; 2019b Sep Likud 32; neither 2019 election produced a government.
  Coherence: economic programme tight — housing, competition, banking
  structural — but political coherence fractured over 2017-2020 indictments
  (Cases 1000/2000/4000) and Gantz/Lapid Blue-White challenge.
policies:
  - il_gas_framework_2015
  - il_cellular_reform_2016
  - il_strum_banking_separation_2018
  - il_nation_state_basic_law_2018
  - il_kahlon_housing_vat_zero_2014
axes_summary:

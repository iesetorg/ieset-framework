position_alignments:
- position_id: empirical_pragmatist
  alignment: aligned
  notes: Ordoliberal mainstream with evidence-weighted crisis responses.
- position_id: ecological
  alignment: partially_aligned
  notes: Strong on decarbonisation rhetoric; weak on supply-security trade-off.
- position_id: austrian
  alignment: partially_aligned
  notes: Praises debt brake and Schwarze Null; criticises Energiewende subsidies and 2015 migration
    pull factor.
references:
- Grundgesetz Artikel 109, 115 (Schuldenbremse, 2009)
- Mindestlohngesetz (MiLoG, 2014)
- Dustmann et al. (2014), 'From Sick Man of Europe to Economic Superstar'
- Bundesrechnungshof reports on Investitionsstau 2015-2021
- BDEW + BMWi gas-import statistics 2005-2022
notes: 'Bundestag seat share at formation: 2005 CDU/CSU 35.2% (GroKo with SPD 34.2%); 2009 CDU/CSU
  33.8% + FDP 14.6%; 2013 CDU/CSU 41.5% (one seat short of majority, GroKo); 2017 CDU/CSU 32.9%
  (historic low, 171 days to form GroKo). Approval trajectory: Merkel personal approval 55-75%
  through most of tenure; sharp drop after 2015 refugee decision to ~49%; recovered during COVID
  to ~70%. State-election shifts: systematic AfD rise from 2014; Greens overtake SPD in multiple
  Länder by 2018-20; CDU lost Baden-Württemberg (2011, Greens) and Saarland/Schleswig-Holstein
  volatility. Distinct from germany_merkel_nuclear_phaseout_2011, which codes the specific 2011
  Atomgesetz pivot; this movement is the encompassing 16-year governance arc.

  '

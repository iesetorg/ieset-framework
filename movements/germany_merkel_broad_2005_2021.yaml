movement_id: germany_merkel_broad_2005_2021
status: candidate
name: Merkel-era CDU/CSU broad governance 2005-2021
countries:
- DEU
timeframe:
  start: 2005
  end: 2021
  enacted_date: '2005-11-22'
coalition: CDU/CSU — Grand Coalition with SPD (2005-09, 2013-17, 2018-21), CDU/CSU-FDP (2009-13)
leaders:
- Angela Merkel (Chancellor 2005-2021)
- Wolfgang Schäuble (Finance Minister 2009-2017)
- Olaf Scholz (Finance Minister 2018-2021, SPD)
- Peter Altmaier (Economy Minister 2018-2021)
doctrine: 'Sixteen-year Christian-democratic governance in the ordoliberal mainstream: fiscal
  orthodoxy built around the constitutional debt brake (Schuldenbremse, 2009), pragmatic incrementalism
  inheriting Schröder''s Agenda 2010 supply- side gains rather than reversing them, and selective
  technocratic pivots under crisis (Eurozone bailouts, 2011 Fukushima nuclear phase-out, 2015
  refugee intake, 2020 pandemic Sondervermögen). Economically centre-right but culturally centrist,
  Merkel''s CDU ran on "asymmetric demobilisation" — absorbing social-democratic social policy
  (minimum wage 2014, rent control Mietpreisbremse 2015) while preserving export-manufacturing
  competitiveness and balanced budgets (Schwarze Null 2014-2019). The era''s signature is consolidation
  of the Hartz-era reforms, deepening pipeline-gas dependence on Russia (Nord Stream 1 2011, Nord
  Stream 2 permitting 2015-2021), and deferral of capex on military, digital, and rail infrastructure
  — the Investitionsstau later used by the Ampel and Merz coalitions to justify debt-brake reform.
  Coherence judgement: fiscally disciplined but strategically complacent — the growth model depended
  on cheap Russian gas, Chinese export demand, and American security guarantees, all three of
  which eroded by 2022.

  '
policies:
- de_mindestlohn_2014
- de_schuldenbremse_2009
- de_fluechtlingspolitik_wir_schaffen_das_2015
- de_nord_stream_2_permitting_2015_2021
- de_eurozone_bailout_posture_2010_2015
- de_corona_sondervermoegen_2020
axes_summary:
- axis: fiscal.spending_level
  direction: '0'
  magnitude: weak
  rationale: Spending/GDP broadly flat 2005-2019; Schwarze Null balanced budgets 2014-2019; pandemic
    break 2020-21.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: weak
  rationale: Minimum wage 2014, Mütterrente 2014, Rente mit 63 added transfer-like commitments
    without reversing Hartz IV base.
- axis: regulatory.labour_market_flexibility
  direction: '0'
  magnitude: weak
  rationale: Preserved Hartz framework; minimum wage introduction marginally tightened but did
    not unwind the core flexibilisation.
- axis: regulatory.environmental_stringency
  direction: +
  magnitude: strong
  rationale: 2011 nuclear phase-out, EEG expansion, 2019 Klimapaket with CO2-Bepreisung.
- axis: regulatory.energy_supply_security
  direction: '-'
  magnitude: strong
  rationale: Simultaneous nuclear phase-out and Nord Stream 1/2 pipeline expansion deepened single-supplier
    dependence on Russia.
- axis: regulatory.immigration_openness
  direction: +
  magnitude: strong
  rationale: 2015 decision to admit ~1M Syrian refugees; subsequent integration legislation.
- axis: fiscal.sectoral_subsidy
  direction: +
  magnitude: moderate
  rationale: EEG renewable subsidies, auto-industry support through the decade.
outcome_hypotheses:
- german_export_model_sustainability
- debt_brake_growth_underinvestment_tradeoff
- energiewende_synthetic_control_vs_nuclear_peers

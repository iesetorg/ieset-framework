# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: us_fdr_new_deal_1933_1939
status: candidate
name: "FDR New Deal"
countries: [USA]
timeframe: {start: 1933, end: 1939}
coalition: "Democratic (FDR + large congressional majorities after 1932 + 1936)"
leaders:
  - "Franklin D. Roosevelt (President)"
  - "Frances Perkins (Labor)"
  - "Henry Morgenthau Jr. (Treasury 1934+)"
  - "Harry Hopkins (FERA / WPA)"
  - "Harold Ickes (Interior / PWA)"
doctrine: >
  Depression-era reconstruction programme combining emergency relief, industrial
  recovery, and durable institutional reform. First Hundred Days (March-June
  1933) produced the Emergency Banking Act, the Agricultural Adjustment Act
  (AAA), the National Industrial Recovery Act (NIRA) with its NRA codes and
  PWA, the Tennessee Valley Authority (TVA), and the Civilian Conservation
  Corps (CCC). Banking architecture was rebuilt through the Banking Act of
  1933 (Glass-Steagall) creating the FDIC and separating commercial from
  investment banking, followed by the Securities Act 1933 and Securities
  Exchange Act 1934 creating the SEC. The Second New Deal (1935) added the
  Social Security Act, the Wagner Act recognising collective bargaining, and
  the WPA. The Fair Labor Standards Act 1938 set a federal minimum wage,
  maximum hours, and child-labour limits. Stated case: restore purchasing
  power, stabilise banking, build permanent floors under workers and elderly,
  and reassert federal capacity where state-level action had failed.
policies:
  - us_glass_steagall_banking_act_1933
  - us_securities_act_1933
  - us_securities_exchange_act_1934
  - us_social_security_act_1935
  - us_wagner_act_1935
  - us_flsa_1938
  - us_tva_1933
  - us_aaa_1933
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Creation of Social Security old-age + unemployment insurance; large emergency relief via FERA/WPA/CCC."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Federal outlays rose from ~3% to ~9% of GDP; PWA/WPA capital spending."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Glass-Steagall separation, FDIC deposit insurance, SEC disclosure regime — tighter financial regulation."}
  - {axis: regulatory.labour_market_flexibility, direction: "-", magnitude: strong, rationale: "Wagner Act entrenched collective bargaining; FLSA introduced minimum wage and hours limits."}
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: moderate, rationale: "NRA industry codes (struck down 1935), AAA production quotas, TVA public utility."}
outcome_hypotheses: [great_depression_recovery_policy_mix, deposit_insurance_bank_run_prevention]
position_alignments:
  - {position_id: post_keynesian, alignment: aligned, notes: "Demand-side reflation + floors on labour incomes aligns with later Keynesian articulation."}
  - {position_id: democratic_socialist, alignment: partially_aligned, notes: "Collective bargaining + social insurance; private ownership preserved."}
  - {position_id: institutionalism, alignment: aligned, notes: "Institution-building emphasis — FDIC, SEC, SSA — is the canonical institutionalist move."}
  - {position_id: austrian, alignment: opposed, notes: "Price supports + cartelised NRA codes read as prolonging malinvestment."}
  - {position_id: classical_liberal, alignment: opposed}
references:
  - "Banking Act of 1933 (Public Law 73-66) — Glass-Steagall"
  - "Securities Act of 1933 (Public Law 73-22)"
  - "Securities Exchange Act of 1934 (Public Law 73-291)"
  - "Social Security Act of 1935 (Public Law 74-271)"
  - "National Labor Relations Act 1935 (Public Law 74-198) — Wagner Act"
  - "Fair Labor Standards Act 1938 (Public Law 75-718)"
  - "Kennedy (1999), Freedom From Fear"
  - "Rauchway (2008), The Great Depression and the New Deal"

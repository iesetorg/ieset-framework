# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: skorea_lee_myung_bak_gnp_2008_2013
status: candidate
name: "Lee Myung-bak Grand National business-friendly era"
countries: [KOR]
timeframe: {start: 2008, end: 2013, enacted_date: "2008-02-25"}
coalition: "Grand National Party / Saenuri Party (Lee Myung-bak administration)"
leaders:
  - "Lee Myung-bak (President, 25 Feb 2008 - 25 Feb 2013)"
  - "Kang Man-soo / Yoon Jeung-hyun / Bahk Jae-wan (Finance Minister / Deputy PM, rotating)"
  - "Han Duck-soo / Kim Jong-hoon (Trade)"
  - "Lee Seong-tae / Kim Choong-soo (BOK Governor)"
doctrine: >
  Lee Myung-bak business-friendly Grand National supply-side doctrine —
  former Hyundai E&C CEO who campaigned on a "747 plan" (7% annual growth,
  $40,000 per-capita income, 7th-largest economy) built on four pillars:
  (1) corporate-tax rate cuts (25% → 22% phased 2008-2009, with pass-through
  to mid-size businesses) and abolition of the comprehensive real-estate tax
  on top-bracket holders; (2) Four Major Rivers Restoration Project
  (4대강 사업, ~KRW 22tn / $19bn) — dredging, dam and weir construction across
  Han, Nakdong, Geum, Yeongsan rivers, pitched as green-growth stimulus and
  water security but widely critiqued as earth-moving public works; (3)
  trade-liberalisation completion — KORUS FTA ratification (22 November 2011
  National Assembly, effective 15 March 2012) and Korea-EU FTA (July 2011);
  (4) Low-Carbon Green Growth national strategy (2008, Green Growth Basic
  Act 2010) creating Korea's first emissions-trading framework (passed 2012,
  effective 2015) and cap-and-trade infrastructure. National-security turn
  after the Cheonan sinking (March 2010, 46 sailors killed) and Yeonpyeong
  shelling (November 2010) — "May 24 measures" cutting most inter-Korean
  economic ties except Kaesong. Popularity fell from 70%+ to ~20% over US
  beef imports protests (2008) and Four Rivers criticism; recovered somewhat.
  Coherence line: chaebol-friendly tax cuts, public-works green-growth,
  FTA completion, security-hard on North Korea.
policies:
  - kr_lee_corporate_tax_cut_2008_2009
  - kr_four_major_rivers_restoration_2009_2012
  - kr_lee_korus_fta_ratification_2011
  - kr_lee_green_growth_basic_act_2010
  - kr_lee_may_24_measures_2010
axes_summary:
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "Statutory corporate rate 25% → 22%; SME bracket cuts."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Comprehensive real-estate tax (종부세) weakened; top income-tax cuts partially reversed in 2012."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Four Major Rivers ~KRW 22tn infrastructure push plus GFC supplementary budget 2009."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: moderate, rationale: "Green Growth Basic Act 2010; emissions-trading legislation 2012 effective 2015."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "KORUS FTA ratified and effective; Korea-EU FTA; ASEAN-Korea FTA deepening."}
predecessor_movements:
  - skorea_roh_moo_hyun_uri_2003_2008
successor_movements:
  - skorea_park_geun_hye_saenuri_2013_2017
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Corporate-tax cuts, trade-liberalisation completion, property-tax rollback."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Four Rivers pitched as infrastructure with cost-benefit contest; green-growth framework coherent."}
references:
  - "Korea-US FTA, National Assembly ratification 22 November 2011"
  - "Low Carbon Green Growth Basic Act, Law No. 9931 of 14 January 2010"
  - "Board of Audit and Inspection reports on Four Rivers project (multiple)"
  - "Bank of Korea, Monetary Policy Report series 2008-2013"
notes: >
  Lee's five-year single term had distinct macro phases (2008 GFC crisis,
  2009-2010 recovery, 2011-2012 FTA completion and North Korea tension)
  coded here as one movement given continuity of the 747-plan
  business-friendly doctrine.

movement_id: benin_talon_pag_reform_state_2016_2026
status: candidate
name: "Talon PAG reform state 2016-2026"
countries: [BEN]
timeframe: {start: 2016, end: 2026, enacted_date: "2016-04-06"}
coalition: "Patrice Talon reform coalition"
leaders:
  - "Patrice Talon (President, 2016-2026)"
  - "Abdoulaye Bio Tchane (Minister of State for Development and Government Action Coordination)"
  - "Romuald Wadagni (Minister of Economy and Finance)"
doctrine: >
  Talon's two-term programme used the Programme d'Actions du Gouvernement as a
  central planning instrument for infrastructure, social protection, tourism,
  agro-processing, and public-administration reform. It paired investor-facing
  special-zone and logistics projects with targeted social-insurance expansion,
  while electoral and party-law changes narrowed the effective opposition field.
policies:
  - bj_arch_social_protection_rollout_2019
  - bj_glo_djigbe_industrial_zone_2020
  - bj_party_system_electoral_reforms_2018_2019
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "ARCH expands health insurance and social-protection coverage for poor and informal households."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Glo-Djigbe and PAG industrial projects channel state support to selected agro-industrial and logistics activities."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Special-zone and corridor investments are designed around export processing and foreign-investor access."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Party-system and electoral reforms raised ballot-access thresholds and concentrated representation in pro-government blocs."}
references:
  - "Government of Benin, Programme d'Actions du Gouvernement 2016-2021 and 2021-2026."
  - "Government of Benin, ARCH social-protection programme materials."
  - "Benin party-charter and electoral-code reform texts, 2018-2019."

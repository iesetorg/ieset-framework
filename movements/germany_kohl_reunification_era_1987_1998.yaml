  rationale: Treuhand privatised/liquidated ~14,000 GDR enterprises.
- axis: fiscal.transfer_expansion
  direction: +
  magnitude: strong
  rationale: Solidarpakt and east-west transfers ~DM120bn/year; Pflegeversicherung 1994-95.
- axis: fiscal.spending_level
  direction: +
  magnitude: strong
  rationale: Reunification transfers ballooned federal spending; debt/GDP climbed.
- axis: monetary.central_bank_independence
  direction: +
  magnitude: strong
  rationale: Bundesbank stability culture institutionalised into EMU/ECB framework.
- axis: institutional.rule_of_law
  direction: +
  magnitude: strong
  rationale: Extension of Grundgesetz, federal legal order, property-rights regime to eastern
    Länder.

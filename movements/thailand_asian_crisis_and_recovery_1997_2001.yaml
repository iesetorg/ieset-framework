movement_id: thailand_asian_crisis_and_recovery_1997_2001
status: candidate
name: "Thailand 1997 crisis, IMF programme, and Thaksin recovery"
countries: [THA]
timeframe: {start: 1997, end: 2006}
coalition: "Chavalit and Chuan Leekpai governments (crisis + IMF phase); Thai Rak Thai under Thaksin (recovery phase, from 2001)"
leaders: ["Chavalit Yongchaiyudh (PM, 1996-97)", "Chuan Leekpai (PM, 1997-2001)", "Tarrin Nimmanahaeminda (Finance)", "Thaksin Shinawatra (PM, 2001-06)"]
doctrine: >
  Canonical emerging-market currency-crisis case followed by a
  populist recovery programme. Through 1996 Thailand ran large
  current-account deficits financed by BIBF-intermediated short-
  dollar borrowing against an implicit baht peg. On 2 July 1997
  the Bank of Thailand floated the baht after losing reserves
  defending the peg; the baht fell from ~25 to ~56 to the dollar
  by early 1998. The IMF Letter of Intent (August 1997, ~$17bn
  package with Japan and bilateral lenders) required fiscal
  tightening, 56 finance-company closures, bank recapitalisation
  via the FIDF, and financial-sector legal reform. Output fell
  ~10% in 1998. Under Thaksin from 2001 the recovery phase added
  'dual-track' populist spending (village-fund micro-credit,
  universal 30-baht health scheme, farmer debt moratorium), while
  retaining the independent central bank, inflation targeting
  (2000), and floating exchange rate established during the crisis.
policies: [thailand_baht_float_1997, thailand_imf_letter_of_intent_1997, thailand_fidf_bank_restructuring_1998, thailand_inflation_targeting_2000, thailand_village_fund_2001, thailand_30_baht_health_2001]
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Post-crisis prudential tightening, BIBF wind-down, capital-adequacy and supervision upgrades under IMF programme."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "2000 inflation-targeting regime and 2008 BoT Act entrenched operational independence."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Countercyclical fiscal expansion and populist spending programmes under Thaksin after initial IMF tightening."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Universal 30-baht health coverage and rural cash transfer and credit schemes."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Continued tariff reductions and bilateral FTAs (with Australia, China-framework) in the 2000s."}
outcome_hypotheses: [currency_crisis_capital_flight_dynamic, structural_reform_absence_and_post_euro_stagnation]
position_alignments:
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Crisis-phase IMF programme reflects orthodox prescriptions; Thaksin populism diverges."}
  - {position_id: new_keynesian, alignment: aligned}
  - {position_id: post_keynesian, alignment: partially_aligned, notes: "Post-Keynesian interpretation reads the crisis as Minsky-type private-sector over-borrowing rather than fiscal misbehaviour."}
references:
  - "Lauridsen (1998), 'The Financial Crisis in Thailand', World Development"
  - "IMF (2000), 'Recovery from the Asian Crisis and the Role of the IMF'"
  - "Phongpaichit & Baker (2004), 'Thaksin: The Business of Politics in Thailand'"

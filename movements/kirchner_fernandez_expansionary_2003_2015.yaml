# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kirchner_fernandez_expansionary_2003_2015
status: candidate
name: "Kirchner–Fernández expansionary populism (Argentina)"
countries: [ARG]
timeframe: {start: 2003, end: 2015}
coalition: "Peronist Justicialist Party (Néstor Kirchner 2003-07, Cristina Fernández 2007-15)"
leaders: ["Néstor Kirchner", "Cristina Fernández de Kirchner", "Axel Kicillof (Economy 2013-15)"]
doctrine: >
  Commodity-boom-funded expansionary programme: strong peso via FX
  controls, domestic price controls, re-nationalisation of YPF (2012),
  pension renationalisation (2008), aggressive capital controls (cepo
  cambiario from 2011), fiscal expansion, subsidised utilities + fuel.
  Initial recovery 2003-2008 from collapse baseline; growth from 2008+
  less attributable to policy vs commodity cycle. 2011+ capital controls
  era produced persistent inflation (structural deficit + monetary
  financing), parallel FX markets, export collapse. Manipulated INDEC
  inflation statistics 2007-2015. Framework codes as fiscal-dominance
  type alongside Greece 2001-10 and Venezuela Chavismo (milder variant).
policies: [argentina_ypf_renationalisation_2012, argentina_pension_renationalisation_2008, argentina_cepo_cambiario_2011_2015, argentina_fuel_subsidies_2003_2015]
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Asignación Universal por Hijo + pension moratoria expanded transfer coverage."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "Re-nationalisation of YPF; price controls; trade restrictions."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: strong}
  - {axis: regulatory.trade_openness, direction: "-", magnitude: moderate}
outcome_hypotheses: [hyperinflation_requires_fiscal_dominance]
position_alignments:
  - {position_id: post_keynesian, alignment: partially_aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "Cavallo (2014), 'Argentina's Economic Policy under the Kirchners'"
  - "Gerchunoff-Rapetti (2016), 'La Economía Argentina y su Conflicto Distributivo'"

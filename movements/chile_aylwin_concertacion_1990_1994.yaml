movement_id: chile_aylwin_concertacion_1990_1994
status: candidate
name: "Aylwin Concertación — Pinochet transition, Rettig, growth-with-equity"
countries: [CHL]
timeframe: {start: 1990, end: 1994, enacted_date: "1990-03-11"}
coalition: "Concertación de Partidos por la Democracia (PDC-PS-PPD-PRSD)"
leaders:
  - "Patricio Aylwin (President 1990-1994)"
  - "Alejandro Foxley (Hacienda)"
  - "Roberto Zahler (Banco Central)"
  - "René Cortázar (Trabajo)"
  - "Raúl Rettig (Truth Commission Chair)"
doctrine: >
  Post-Pinochet democratic transition that preserved the
  1980-constitution macro framework while adding social
  investment and human-rights accountability. Four doctrinal
  pillars: (a) Rettig Commission — established April 1990 by
  Decreto Supremo 355; delivered report February 1991
  documenting 2,279 deaths and disappearances under 1973-1990
  dictatorship; Aylwin's "perdón de la nación" speech;
  complemented by reparations Ley 19.123 (1992). (b) Growth
  with equity "crecimiento con equidad" — 1990 tax reform Ley
  18.985 raised corporate rate from 10% to 15% and the top
  income bracket; VAT 16%→18%; yielded ~2% GDP additional
  revenue dedicated to education, health, housing. (c)
  Macroeconomic continuity — independent Banco Central (1989
  reform activated); crawling-peg + capital-controls encaje
  (1991) on short-term inflows; gradual disinflation 27%
  (1990) → 12% (1994). (d) Labour-law rebalance — Ley 19.049
  (1991) restored collective bargaining at firm level (but not
  sectoral as pre-1973); minimum-wage increases. Stated
  school: Christian-Democrat / social-democratic synthesis;
  CEPAL neo-structuralist "productive transformation with
  equity" (Fajnzylber/Ffrench-Davis). Left-right: centre to
  centre-left social; centre-right macro; explicitly
  preservationist of the Chicago-Boys macro framework.
  Popularity: October 1988 No 55.99% plebiscite ended Pinochet
  candidacy; December 1989 Aylwin won 55.17% vs Büchi 29.40%;
  approval remained ~60-70% through the term; December 1993
  Concertación's Frei Ruiz-Tagle won 57.98% — largest
  post-transition vote share. Coherence: trade doctrinal
  rupture with the Pinochet macro model for institutional
  stability, plus incremental tax/social spending and
  human-rights truth-telling — the explicit "grow the pie while
  rebalancing shares" bet.
policies:
  - cl_rettig_commission_1990_1991
  - cl_tax_reform_1990_growth_with_equity
  - cl_encaje_capital_controls_1991
  - cl_labour_law_restoration_1991
  - cl_bcch_autonomy_activation_1989_1990
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "Rettig Commission; democratic restoration; constitutional transition."}
  - {axis: fiscal.tax_progressivity, direction: "+", magnitude: moderate, rationale: "1990 corporate rate 10%→15%; top PIT bracket increase."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Education/health/housing social investment financed from tax reform."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Encaje unremunerated reserve requirement on short-term capital inflows."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "Activated 1989 autonomous BCCh law under first civilian administration."}
outcome_hypotheses: [truth_commission_institutional_effect, encaje_capital_controls_volatility_effect]
predecessor_movements: []
successor_movements: [chile_frei_concertacion_1994_2000]
position_alignments:
  - {position_id: empirical_pragmatist, alignment: aligned}
  - {position_id: institutionalism, alignment: aligned}
  - {position_id: chicago_monetarism, alignment: partially_aligned, notes: "Preserved macro framework."}
references:
  - "Rettig Commission Report (1991)"
  - "Ley 18.985 (Reforma Tributaria 1990)"
  - "Ley 19.049 (Relaciones Laborales 1991)"
  - "Ffrench-Davis (2002), Economic Reforms in Chile"
notes: "Most-studied Latin American democratic transition; growth-with-equity trope coined here."

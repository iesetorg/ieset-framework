# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: morocco_hassan_ii_monarchy_mixed_economy_1956_1999
status: candidate
name: "Morocco monarchy-led mixed economy and administrative consolidation"
countries: [MAR]
timeframe: {start: 1956, end: 1999}
coalition: "Alaouite monarchy, palace ministries, rural notables, and loyalist parties"
leaders:
  - "Mohammed V (Sultan/King 1955-1961)"
  - "Hassan II (King 1961-1999)"
doctrine: >
  Morocco's post-independence governing model kept the monarchy as the central
  arbiter over administration, land, investment, and political competition. It
  blended private commerce and foreign ties with palace-led planning, rural
  notability, agricultural infrastructure, selective state ownership, and
  periodic economic nationalism such as Moroccanisation. The regime presented
  this as gradual development and national integration under monarchical
  continuity rather than party-led revolutionary transformation.
policies:
  - mar_administrative_agrarian_consolidation_1956_1969
  - mar_moroccanisation_1973
  - mar_irrigation_dam_agriculture_strategy_1967_1990
axes_summary:
  - {axis: institutional.property_rights, direction: "mixed", rationale: "Private property and commerce remained central, but Moroccanisation and palace discretion raised expropriation and allocation risks."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "Licensing, state allocation, and politically connected ownership constrained competition in strategic sectors."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Large public investment and credit favoured irrigated agriculture, dams, and selected industrial assets."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Administrative and infrastructure consolidation increased the state's development role while preserving a mixed economy."}
references:
  - "Waterbury (1970), The Commander of the Faithful"
  - "Pennell (2000), Morocco Since 1830"
  - "World Bank (1995), Kingdom of Morocco: Country Economic Memorandum"
notes: "This broad movement spans Mohammed V's independence settlement and Hassan II's longer consolidation; the policy anchors focus on the durable monarchy-led economic model."

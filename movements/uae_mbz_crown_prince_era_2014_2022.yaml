movement_id: uae_mbz_crown_prince_era_2014_2022
status: candidate
name: "MBZ de-facto rule: Abraham Accords, Expo 2020, Covid and Yemen"
countries: [ARE]
timeframe: {start: 2014, end: 2022}
coalition: "Al Nahyan with Al Maktoum; MBZ Crown Prince of Abu Dhabi ruling de-facto during Khalifa's incapacitation after 2014 stroke"
leaders:
  - "Mohammed bin Zayed (Crown Prince of Abu Dhabi, de-facto ruler 2014-2022)"
  - "Khalifa bin Zayed (nominal President, incapacitated 2014-2022)"
  - "Mohammed bin Rashid Al Maktoum (VP/PM, Ruler of Dubai)"
  - "Anwar Gargash (Minister of State for Foreign Affairs)"
doctrine: >
  De-facto rule phase in which MBZ set strategic direction while Khalifa
  remained nominal President after his 2014 stroke. Economic school:
  sovereign-directed post-oil diversification accelerated — ADIA, Mubadala
  (merged with IPIC and Mubadala Development 2017) and newly-created ADQ
  (2018) as industrial-policy vehicles; VAT 5% introduction January 2018
  marking the first broad indirect tax; Golden Visa long-term residency
  launched 2019; foreign-ownership onshore reform 2020 repealing the 51%
  local-partner requirement for most sectors; free-zone deepening (DIFC,
  ADGM common-law). Left-right: absolute-monarchy federation, content is
  state-capitalist and pro-business with a simultaneous social-liberalising
  turn (alcohol licensing reform and cohabitation decriminalisation 2020,
  paving the way for the Jan 2022 weekend switch from Fri-Sat to Sat-Sun).
  Foreign policy is the defining feature: Abraham Accords signed September
  2020 with Israel, ending decades of formal hostility and catalysing trade
  and investment corridors; Yemen intervention from 2015 with partial wind-
  down from 2019; backing of Sisi's Egypt from 2013; tense relations with
  Qatar (2017-2021 blockade). Covid handling via Al Hosn app and early mass
  vaccination drove one of the world's highest per-capita vaccination rates.
  Expo 2020 Dubai opened October 2021 (delayed one year). Popularity proxies
  absent elections: FDI inflows, SWF AUM growth, expat retention through
  Golden Visa, Henley Passport Index gains. Coherence line: the strategic
  pivot toward normalisation with Israel, Covid-era social liberalisation,
  and tax-base broadening are all MBZ's direction even before formal title.
policies:

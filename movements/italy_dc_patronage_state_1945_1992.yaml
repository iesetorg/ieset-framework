# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: italy_dc_patronage_state_1945_1992
status: candidate
name: "Italy Christian Democrat partitocrazia and state-holding system"
countries: [ITA]
timeframe: {start: 1945, end: 1992}
coalition: "DC-led governments with variable partners (PSDI, PLI, PRI, PSI from 1963); PCI excluded (conventio ad excludendum)"
leaders:
  - "Alcide De Gasperi and successors (DC PMs across the period)"
  - "Amintore Fanfani, Aldo Moro, Giulio Andreotti, Bettino Craxi (PSI PM 1983-1987)"
  - "IRI and ENI chairmen as parallel power centres (Sinigaglia, Mattei, Cefis, Prodi)"
doctrine: >
  Long-cycle political-economic regime characterised by DC hegemony
  within a proportional-representation parliamentary system, a large
  state-holding sector, and patronage-based distribution across regions
  and client groups (partitocrazia). Retention and expansion of the
  Istituto per la Ricostruzione Industriale (IRI, 1933 origin) as a
  sprawling conglomerate spanning banking (Comit, Credito Italiano,
  Banco di Roma through 1994), steel (Finsider/Italsider), shipbuilding
  (Fincantieri), engineering, airlines (Alitalia), telecoms (STET/SIP),
  broadcasting (RAI); creation of ENI 1953 in hydrocarbons; EFIM in
  mechanical engineering. Manuale Cencelli (attributed to Massimiliano
  Cencelli) codified portfolio allocation by faction. Cassa per il
  Mezzogiorno (1950-1984) and later Agensud channelled state investment
  southward under DC electoral management. Scala mobile wage indexation
  from 1975 accommodated high inflation through the late 1970s-early
  1980s. Public-sector employment and pensions grew rapidly; public debt
  rose from ~40% of GDP in 1970 to over 100% by 1992. The system ended
  with Tangentopoli / Mani Pulite investigations (from February 1992),
  the collapse of DC and PSI, and the 1992-1994 privatisation wave under
  Amato and Ciampi. Proponents framed the model as national cohesion
  under a pluralist coalition structure; critics documented corruption
  costs and fiscal unsustainability.
policies:
  - italy_iri_state_holding_expansion_1945_1992
  - italy_eni_founding_1953
  - italy_scala_mobile_indexation_1975
  - italy_cassa_mezzogiorno_1950
  - italy_public_sector_pension_expansion_1965_1992
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "IRI/ENI/EFIM state-holding footprint across banking, heavy industry, utilities, media, airlines."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "Pension expansion, disability pensions used as regional patronage instrument, public-sector employment growth."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "Public debt from ~40% to >100% GDP 1970-1992 under structural primary deficits."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Patronage allocation, illicit party financing exposed by Mani Pulite 1992-1994."}
  - {axis: monetary.central_bank_independence, direction: "mixed", rationale: "'Divorce' between Treasury and Banca d'Italia 1981 partially restored autonomy; before then Banca d'Italia acted as residual buyer of government paper."}
position_alignments:
  - {position_id: institutionalism, alignment: aligned, notes: "Canonical case for studying formal vs informal institutions, patronage networks, and state-holding governance."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Within the miracolo sub-period; the long cycle as a whole is not well coded as pragmatist."}
  - {position_id: austrian, alignment: opposed}
references:
  - "Ginsborg (1990), A History of Contemporary Italy 1943-1988"
  - "Barca ed. (1997), Storia del capitalismo italiano"
  - "della Sala (1997), 'Hollowing Out and Hardening of the State'"
  - "Banca d'Italia / Treasury 'divorzio' letter, 12 February 1981"
  - "Cottarelli (2018), I sette peccati capitali dell'economia italiana"
notes: "Pre-1996 sample extension. Overlaps in time with italian_economic_miracle_1950_1970 but codes different content: the miracle movement captures trade opening and growth-era reforms; this movement captures the patronage-state and public-finance trajectory across the whole First Republic."

status: candidate
name: "English National government (New Zealand)"
countries: [NZL]
timeframe:
  start: 2016
  end: 2017
  enacted_date: "2016-12-12"
coalition: "National-led minority government continuing Key-era confidence-and-supply with ACT, United Future, Maori Party"
leaders:
  - "Bill English (Prime Minister 12 Dec 2016 - 26 Oct 2017)"
  - "Steven Joyce (Finance Minister)"
  - "Paula Bennett (Deputy PM)"
  - "Graeme Wheeler / Grant Spencer (RBNZ Governors)"
  - "Gabriel Makhlouf (Treasury Secretary)"
doctrine: >
  Continuity National government under English following Key's Dec 2016
  resignation, delivering a final 2017 budget with family-incomes package
  and running on fiscal discipline into the Sep 2017 election. Economic
  school: market-liberal centrist continuity with social-investment
  emphasis — Budget 2017 (25 May 2017) Family Incomes Package NZ$2bn/yr
  raising thresholds for low-to-middle-income earners, Working for
  Families extension, Accommodation Supplement increase; fiscal surplus
  maintained; social-investment-approach evaluation continued. Dated
  policies: Family Incomes Package 25 May 2017 (implementation 1 Apr 2018);
  TPP-11 negotiations post-US-withdrawal Jan 2017. Left-right: centre-
  right. Popularity: 2017 election (23 Sep 2017) National 44.4% largest
  share but insufficient; NZ First (Peters) coalition choice delivered
  Ardern Labour-led government Oct 2017. Coherence: continuity of Key-era
  programme without doctrinal innovation; bridge government bracketed by
  Key resignation and Ardern transition.

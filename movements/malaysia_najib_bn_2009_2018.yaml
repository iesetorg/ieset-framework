movement_id: malaysia_najib_bn_2009_2018
status: candidate
name: Najib BN — 1MDB kleptocracy, GST, and ETP market opening
countries:
- MYS
timeframe:
  start: 2009
  end: 2018
  enacted_date: '2009-04-03'
coalition: Barisan Nasional (UMNO-led; Najib Razak administration)
leaders:
- Najib Razak (PM, 3 Apr 2009 - 10 May 2018; later convicted of corruption)
- Ahmad Husni Hanadzlah / Johari Abdul Ghani (Finance deputies; Najib held Finance portfolio himself)
- Zeti Akhtar Aziz / Muhammad Ibrahim (BNM Governors)
doctrine: 'Najib BN kleptocratic-plus-market-opening ambivalent doctrine — entered office promising
  "1Malaysia" unity branding, New Economic Model (NEM 2010) and Economic Transformation Programme
  (ETP 2010) that identified 131 entry-point projects across 12 National Key Economic Areas aimed
  at raising GNI to $15,000 by 2020. Signature market-liberal reforms: (a) goods and services
  tax (GST) 6% implemented 1 April 2015 replacing sales and service tax, widening tax base; (b)
  fuel-subsidy rationalisation via managed-float-pricing 2014; (c) capital-market liberalisation
  (Bursa demutualisation completion, REIT growth); (d) partial relaxation of Bumiputera equity
  quotas for some listings. Parallel populist-transfer track: BR1M (Bantuan Rakyat 1Malaysia)
  cash transfers from 2012, scaling to RM 6.3bn annually and 7m households. Foreign-policy: TPP
  signature February 2016 (not ratified), China-Malaysia relationship deepening via ECRL rail
  project and port investments. Shadow: 1MDB sovereign wealth-fund fraud with ~$4.5bn diverted
  and traced to Jho Low, Najib personal accounts (RM 2.6bn "donation"), Hollywood film financing,
  luxury real estate — one of the largest kleptocracy scandals on record, investigated by DOJ,
  MAS, SFO, and later Malaysian prosecution. May 2018 shock election — opposition Pakatan Harapan
  under Mahathir (returning at age 92) ended BN''s 61-year uninterrupted federal rule. Najib convicted
  2020, exhausted appeals 2022, serving 12-year sentence. Coherence line: nominally pro-market
  transformation programme running alongside grand- scale sovereign-wealth-fund embezzlement.

  '

  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: weak, rationale: "Sukuk law enabled Islamic-finance instruments within existing regulation; net effect modest."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "Deficit widened; FX reserves fell from ~$15bn to ~$13bn across the year."}

movement_id: egypt_morsi_muslim_brotherhood_2012_2013
status: candidate
name: "Morsi / Muslim Brotherhood Freedom and Justice Party presidency"
countries: [EGY]
timeframe: {start: 2012, end: 2013}
coalition: "Muslim Brotherhood's Freedom and Justice Party (FJP); Nour Party (Salafi) partial support; Qandil technocratic cabinet"
leaders:
  - "Mohamed Morsi (President, Jun 30 2012 – Jul 3 2013; won runoff 51.73% over Ahmed Shafik)"
  - "Hisham Qandil (Prime Minister)"
  - "Momtaz al-Saeed / Fayyad Abdel Moneim (Finance Ministers)"
  - "Farouk El-Okda / Hisham Ramez (CBE Governors)"
doctrine: >
  Brief Muslim Brotherhood Freedom and Justice Party presidency attempting a
  hybrid Islamist-conservative economic line: nominal commitment to
  market-friendly investment promotion and an Islamic-finance-compatible
  sukuk framework alongside preserved food and energy subsidies, wage-bill
  expansion, and a renewed IMF standby negotiation ($4.8bn package agreed
  at staff level Nov 2012 but never signed as the government baulked at the
  tax and subsidy conditionality during the Constitutional Declaration
  backlash). Left-right placement: Islamist-conservative, socially
  religious-majoritarian, economically cautious-populist with episodic
  market-liberal gestures. Political economy dominated by the November 22
  2012 Constitutional Declaration — which placed presidential decisions
  beyond judicial review pending ratification of the new constitution — and
  the rushed December 2012 constitutional referendum (63.8% yes on ~33%
  turnout). The Tamarod ("Rebellion") petition collected a claimed ~22m
  signatures by June 2013; the June 30 2013 protests drew multi-million
  turnout across Cairo and delta governorates; the armed forces under then-
  Defence Minister el-Sisi removed Morsi on July 3 2013; the Rabaa al-Adawiya
  sit-in was dispersed on August 14 2013 with >800 killed. Coherence line:
  Brotherhood priors over-read a thin electoral mandate, and attempted a
  constitutional-declaration overreach that collapsed the cross-revolutionary
  coalition and triggered elite-military-secular realignment against them.
policies:
  - eg_morsi_constitutional_declaration_2012
  - eg_morsi_imf_sba_negotiation_2012_2013
  - eg_morsi_sukuk_law_2013
  - eg_morsi_2012_constitution_referendum
axes_summary:

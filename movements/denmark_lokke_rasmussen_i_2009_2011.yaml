movement_id: denmark_lokke_rasmussen_i_2009_2011
status: candidate
name: "Loekke Rasmussen I continuation government 2009-2011"
countries: [DNK]
timeframe: {start: 2009, end: 2011, enacted_date: "2009-04-05"}
coalition: "Venstre-Konservative minority with Dansk Folkeparti confidence-and-supply"
leaders:
  - "Lars Loekke Rasmussen (Prime Minister, Venstre, 2009-2011)"
  - "Claus Hjort Frederiksen (Finance Minister, Venstre)"
  - "Lene Espersen (Foreign Minister, Konservative)"
doctrine: >
  Continuation of the Fogh Rasmussen VKO programme after Fogh's ascension
  to NATO Secretary-General (Apr 2009). Economic school: Danish centre-right
  responsible-governance with GFC stabilisation tilt — Forsraspakken ("Spring
  Package 2.0") 2009 tax reform cut top marginal PIT and broadened base,
  financed partly by green-tax shifts; GenopretningsPakken ("Recovery
  Package" May 2010) tightened unemployment-benefit duration from 4 to 2
  years (enacted 2010, phased in from 2013) — the signature austerity move
  of the period. Left-right axis: centre-right. Dated policies:
  Forsraspakken May 2009, Genopretningspakken May 2010, Copenhagen COP15
  Dec 2009 hosting, 2011 election lost (Sept 2011) to Thorning-Schmidt
  red bloc by narrow margin. Popularity: declined sharply on unemployment-
  benefit cut controversy. Coherence: high within narrow VKO bloc, fragile
  in polls.
policies:
  - dk_forarspakke_2_0_2009
  - dk_genopretningspakken_2010
  - dk_dagpenge_duration_cut_2010
axes_summary:
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: moderate, rationale: "2009 tax reform cut top marginal PIT (63% -> 56%) and lifted thresholds."}
  - {axis: fiscal.transfer_expansion, direction: "-", magnitude: strong, rationale: "Unemployment-benefit duration halved 4y -> 2y; one of the largest Danish transfer cuts."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "GenopretningsPakken consolidation targeted 2.4% of GDP by 2013."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "COP15 hosting and green-tax-shift components of 2009 tax package."}

movement_id: ethiopia_abiy_prosperity_2018_present
status: candidate
name: "Abiy Ahmed Prosperity Party reform-and-war era (Ethiopia)"
countries: [ETH]
timeframe: {start: 2018, end: ongoing, enacted_date: "2018-04-02"}
coalition: "Prosperity Party (from Dec 2019; replaced EPRDF); OPDO-origin premiership"
leaders: ["Abiy Ahmed (PM from Apr 2 2018; Nobel Peace Prize 2019)"]
doctrine: >
  Abiy's era combines reformist-liberalising economic doctrine with acute
  political and military rupture. Economic school: Homegrown Economic Reform
  agenda (Sept 2019) plus IMF return, FX liberalisation, telecoms
  liberalisation (Safaricom licence awarded May 2021; Ethio Telecom partial
  IPO 2024), banking sector opening 2024, and Ethiopian Airlines preserved
  as strategic state asset — effectively a selective pivot away from the
  EPRDF developmental-state closure while retaining state ownership in
  crown jewels. Left-right: post-reformation Prosperity Party recentred as
  centrist-nationalist "Medemer" synthesis, dissolving EPRDF's
  ethnic-federal coalition (Dec 1 2019) and relegating TPLF. Key policies
  with dates: Abiy appointment Apr 2 2018; Eritrea peace Jul 8-9 2018
  (Nobel 2019); EPRDF → Prosperity Party Dec 1 2019; Tigray war Nov 4 2020;
  Pretoria peace agreement Nov 2 2022; Amhara Fano conflict 2023-present;
  Ethio Telecom partial IPO 2024; birr float Jul 29 2024; IMF EFF $3.4bn
  Jul 29 2024; Eurobond restructuring under common framework ongoing.
  Popularity: no competitive baseline (2021 election boycotted by major
  opposition; Prosperity won ~410/436 seats); Tigray war casualty estimates
  range 162,000-600,000; Afrobarometer round 9 (2022/23) shows sharply
  divided approval by region. Coherence: doctrine-level tension between
  liberalising economic reform and centralising political-military project;
  the two halves strain rather than reinforce each other.
policies: [et_eritrea_peace_2018, et_homegrown_economic_reform_2019, et_eprdf_to_prosperity_2019, et_tigray_war_2020, et_birr_float_2024, et_imf_eff_2024, et_telecoms_liberalisation_2021, et_banking_sector_opening_2024]

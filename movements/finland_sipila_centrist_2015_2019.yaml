movement_id: finland_sipila_centrist_2015_2019
status: candidate
name: "Sipilä liberal-agrarian structural-reform cabinet (Finland, 2015-2019)"
countries: [FIN]
timeframe: {start: 2015, end: 2019, enacted_date: "2015-05-29"}
coalition: "Keskusta (Centre) - Kansallinen Kokoomus (NCP) - Perussuomalaiset (Finns Party); after the June 2017 Finns Party split the Finns ministers remained in government as the new Sininen tulevaisuus (Blue Reform) faction until the cabinet resigned 8 March 2019"
leaders:
  - "Juha Sipilä (Prime Minister, Centre leader, 2015-2019; former Solidium / Fortum executive)"
  - "Alexander Stubb (Finance Minister 2015-2016, Kokoomus)"
  - "Petteri Orpo (Finance Minister 2016-2019, Kokoomus)"
  - "Timo Soini (Foreign Minister, Finns Party then Blue Reform)"
  - "Sampo Terho (Blue Reform leader from 2017)"
doctrine: >
  Liberal-agrarian structural-reform cabinet formed after Finland had
  suffered six straight years of zero or negative output growth
  (2012-2015, the so-called "lost decade" triggered by the Nokia
  contraction, eurozone slump and 2014 Russian sanctions). Stated
  doctrine: restore Finnish cost competitiveness vis-a-vis Sweden and
  Germany, balance the fiscal accounts by 2021, and push through
  long-stalled structural reforms that the Katainen/Stubb grand
  coalition had been unable to deliver. Core policy content:
  (i) Kilpailukykysopimus (Competitiveness Pact) of June 2016 — a tripartite
  agreement cutting unit labour costs by roughly 4 percent via a 24-hour
  unpaid working-time extension, a one-year wage freeze, and a shift of
  social-security contributions from employers to employees, combined
  with temporary public-sector holiday-bonus cuts; (ii) 4 billion euro
  multi-year spending cuts concentrated on education, R&D, unemployment
  benefit indexation freezes, and development aid; (iii) attempted
  sote-uudistus (regional social- and health-care reform) that collapsed
  in March 2019 after the Constitutional Law Committee repeatedly found
  the model incompatible with constitutional equal-access guarantees,
  triggering cabinet resignation; (iv) the "aktiivimalli" active-model
  unemployment-benefit reform (2018) conditioning full benefits on a
  minimum of 18 hours of work or training per quarter — politically
  costly and partially reversed after the 2019 election; (v) corporate
  tax kept at 20 percent (enacted 2014 under Katainen, preserved);
  (vi) basic-income pilot 2017-2018 with 2,000 unemployed recipients —
  the first nationally randomised basic-income experiment. Left-right
  axis: centre-right with populist-right partner; ideologically closer
  to classical liberal / agrarian-centrist structural-reform politics
  than to Nordic social democracy. Seat share at formation: Centre 49,
  Finns 38, Kokoomus 37 — 124/200; after 2017 Finns Party split, Blue
  Reform 18 plus continuing Finns 20 with Finns moving to opposition.
  Sipilä's approval fell from about 55 percent at formation to the
  mid-20s by the aktiivimalli controversy; Centre collapsed from 49 to
  31 seats in the April 2019 election, ending the government.
  Coherence judgement: doctrinally coherent on competitiveness
  consolidation; structurally undermined by the sote collapse and the
  2017 coalition reconfiguration, which mark this as a partial-success
  reform cabinet rather than a completed programme.

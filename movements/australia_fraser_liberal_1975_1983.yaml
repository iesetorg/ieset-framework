movement_id: australia_fraser_liberal_1975_1983
status: candidate
name: Fraser Liberal-National government — Whitlam dismissal successor, Campbell inquiry, stagflation
countries:
- AUS
timeframe:
  start: 1975
  end: 1983
  enacted_date: '1975-12-13'
coalition: Liberal-National Country Party coalition
leaders:
- Malcolm Fraser (Prime Minister 1975-1983)
- Phillip Lynch (Treasurer 1975-1977)
- John Howard (Treasurer 1977-1983)
- Doug Anthony (Deputy PM, Country/National leader)
doctrine: 'Fraser came to power via the 1975 constitutional crisis and dismissal of the Whitlam
  government, promising fiscal restraint and anti-inflation discipline. Economic school: orthodox
  conservative with fiscal consolidation intent but limited structural reform — rejected full-on
  monetarism and preserved protectionist auto/textile industries; commissioned the Campbell Committee
  (1979-81) which recommended financial-sector deregulation, floating dollar, and foreign bank
  entry, but Fraser largely did not implement them (left to Hawke-Keating). Left-right axis: centre-right
  — classic Australian Liberal ''broadchurch'' with substantial continuity of protectionist economic
  structures. Popularity: 1975 election 55.7% 2PP (Liberal-Country landslide), 1977 54.6% (another
  landslide), 1980 50.4% (reduced majority), 1983 losing 46.8% to Hawke Labor. Coherence: partial
  — Fraser''s anti-inflation rhetoric coexisted with industry protection and growing deficits
  during the 1981-83 global recession; Campbell blueprint existed but was politically banked by
  Labor.

  '

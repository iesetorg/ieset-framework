# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: chad_deby_transition_fifth_republic_2021_present
status: candidate
name: "Deby transition and Fifth Republic fiscal stabilization 2021-present"
countries: [TCD]
timeframe: {start: 2021, end: ongoing, enacted_date: "2021-04-20"}
coalition: "Transitional Military Council and Patriotic Salvation Movement (MPS)"
leaders:
  - "Mahamat Idriss Deby Itno (transition president and president, 2021-present)"
  - "Succes Masra (Prime Minister, 2024)"
  - "Allamaye Halina (Prime Minister, 2024-present)"
doctrine: >
  Chad's post-2021 governing project moved from military transition to the Fifth
  Republic while seeking to stabilize oil-linked public finances after debt and
  security shocks. It combines a constitutional referendum, G20/Common Framework
  debt treatment, and a new IMF ECF with continued central control over security
  and fiscal policy.
policies:
  - tcd_common_framework_debt_treatment_2022
  - tcd_constitutional_referendum_fifth_republic_2023
  - tcd_imf_ecf_2024
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "The 2023 constitution restored a formal post-transition constitutional framework."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Debt treatment and the 2024 ECF target debt sustainability, arrears control, and expenditure discipline."}
  - {axis: institutional.property_rights, direction: "+", magnitude: weak, rationale: "The debt-treatment framework formalized creditor claims and contingency clauses after oil-revenue shocks."}
references:
  - "IMF and World Bank, Chad G20 Common Framework debt-treatment and ECF materials."
  - "Republic of Chad, 2023 Fifth Republic constitutional referendum materials."

movement_id: spain_rajoy_pp_first_2011_2015
status: candidate
name: Rajoy I PP absolute-majority austerity and banking-bailout government 2011-2015
countries:
- ESP
timeframe:
  start: 2011
  end: 2015
  enacted_date: '2011-12-21'
coalition: PP absolute majority (186/350)
leaders:
- Mariano Rajoy (PM)
- Luis de Guindos (Economy Minister)
- Cristóbal Montoro (Finance Minister)
doctrine: 'Centre-right PP government in full-troika-pressure mode: €100bn EU banking- sector
  bailout facility (Memorandum of Understanding, Jul 2012 €41.3bn drawn, SAREB bad-bank), €65bn
  consolidation package (Jul 2012 RDL 20/2012: VAT 18%→21%, public-sector Christmas-bonus cut,
  unemployment-benefit tightening), labour-market reform (RDL 3/2012 and Ley 3/2012) reducing
  severance on unfair dismissal from 45 to 33 days/year, giving firms unilateral wage-setting
  scope, and restructuring collective bargaining away from sectoral pre-eminence. Banking resolution
  via FROB + Frob-III with Bankia nationalisation May 2012. Catalan constitutional crisis escalation
  (9N 2014 informal consultation; prosecution of Mas et al.). Popularity: PP 44.6% / 186 seats
  2011, fell to 28.7% / 123 seats Dec 2015 (fragmentation with Podemos + Ciudadanos entering parliament).
  Rajoy personal approval ~20-25% most of term. Coherence: high on economic programme (integrated
  consolidation + structural reform + banking clean-up); low on Catalan handling.

  '

movement_id: indonesia_suharto_deregulation_paket_1988_1996
status: candidate
name: "Suharto deregulation paket era — pre-crisis liberalisation (Indonesia)"
countries: [IDN]
timeframe: {start: 1988, end: 1996}
coalition: "Golkar under Suharto — technocrat-led economic policy"
leaders:
  - "Suharto (President 1967-1998)"
  - "Radius Prawiro (Coordinating Minister for Economics)"
  - "J.B. Sumarlin (Finance Minister)"
  - "Adrianus Mooy (Bank Indonesia Governor)"
  - "Mari Pangestu (technocrat, CSIS)"
doctrine: >
  Technocrat-led deregulation paket era under Suharto — sequence of
  reform 'packages' aimed at post-oil-bust export diversification.
  Economic school: Berkeley Mafia technocrats (Widjojo, Radius,
  Sumarlin) pragmatic market-liberalism within New Order developmental
  authoritarianism; Habibie high-tech statist faction rivalry building
  from late 1980s. Dated policies: Pakto October 1988 banking
  deregulation — permissive licensing drove bank count from 111 to 240
  by 1996; Pakdes December 1987 stock-market/capital-market opening;
  November 1988 Paknov trade deregulation (tariff cuts, NTB
  conversions); 1994 FDI deregulation allowing 100% foreign ownership;
  Uruguay Round signing Apr 1994; AFTA CEPT commitments from 1992;
  Timor Timur incorporation continued issues; 1996 PDI office attack
  27 Jul 1996 ('Kudatuli'). Left-right: centre-right authoritarian
  developmentalism with market-liberal veneer; crony-capitalism
  undercurrent (Bimantara, Humpuss, Bob Hasan conglomerates).
  Popularity: Golkar election shares 68.1% (1987), 68.1% (1992), 74.5%
  (1997) — controlled electoral system under Pancasila/massa-
  mengambang; Suharto approval proxy via regime stability ≈ absolute
  until 1997-98 collapse. Coherence: moderate — technocrat reform
  track genuinely market-opening (Pakto/Paknov architecture still
  cited as gold standard for Indonesia reform) but paralleled by
  licence-raj crony capitalism in strategic sectors; financial-sector
  deregulation without prudential regulation a direct contributor to
  1997-98 crisis.
policies:
  - id_pakto_banking_deregulation_1988
  - id_paknov_trade_dereg_1988
  - id_fdi_deregulation_1994
  - id_afta_cept_commitment_1992
  - id_uruguay_round_signing_1994
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: strong, rationale: "Pakto 1988 permissive bank licensing + Pakdes 1987 capital-market opening — deepest Indonesian financial liberalisation."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Paknov tariff cuts + NTB conversions; AFTA CEPT from 1992; Uruguay Round 1994."}
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: moderate, rationale: "FDI ownership caps relaxed; sectoral licence simplifications across 1989-1994 paket rounds."}
  - {axis: institutional.property_rights, direction: mixed, magnitude: moderate, rationale: "Formal rules strengthened; informal crony-capitalism privileges to Suharto-family conglomerates countered."}
predecessor_movements:

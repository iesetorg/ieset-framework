  - indonesia_suharto_oil_boom_1976_1985
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: developmentalism, alignment: aligned}
references:
  - "Hill (2000), The Indonesian Economy 2nd ed."
  - "Pangestu (1996), Economic Reform, Deregulation, and Privatization"
  - "World Bank (1993), The East Asian Miracle"
notes: "Deep-history tranche 2. Pre-1997 crisis peak of paket reforms."

movement_id: spain_rajoy_pp_second_2016_2018
status: candidate
name: "Rajoy II PP minority government (Catalan crisis) 2016-2018"
countries: [ESP]
timeframe: {start: 2016, end: 2018, enacted_date: "2016-10-31"}
coalition: "PP minority (137/350) + Ciudadanos investiture + abstentions"
leaders:
  - "Mariano Rajoy (PM)"
  - "Luis de Guindos (Economy, then ECB VP from May 2018)"
  - "Soraya Sáenz de Santamaría (Vice-PM coordinating Catalonia response)"
doctrine: >
  Second Rajoy government formed after 315-day political deadlock (two
  inconclusive elections Dec 2015 + Jun 2016) via PSOE abstention
  ('No es no' — Pedro Sánchez resigned PSOE secretariat rather than abstain;
  ultimately PSOE gestora allowed investiture). Economic school: centre-right
  stewardship with continued fiscal discipline; the political dominant is
  the Catalan sovereignty crisis. Signature actions: Catalan 1-O referendum
  (Oct 1 2017) declared unconstitutional; Art. 155 of the Constitution
  invoked (first ever, Oct 27 2017) imposing direct rule, dismissing
  Generalitat, calling 21-D regional elections; prosecution of pro-independence
  leaders (Supreme Court 'Proceso'); minimum-wage rise 8% 2017, 4% 2018 (with
  Ciudadanos bargain); 2018 budget expansionary relative to prior path.
  No-confidence motion by Pedro Sánchez succeeded Jun 1 2018 (180-169)
  triggered by PP Gürtel-corruption-case conviction. Left-right: centre-right.
  Popularity: PP 33.0% / 137 seats Jun 2016 (2.5% higher than Dec 2015 election),
  fell through 2017-2018 under Catalan and corruption pressure. Coherence:
  low — minority arithmetic, crisis-dominated agenda, ended by legal rather
  than electoral removal.
policies:
  - es_article_155_catalonia_2017
  - es_smi_minimum_wage_rises_2017_2018
  - es_presupuestos_2018_expansionary
  - es_no_confidence_motion_sanchez_2018

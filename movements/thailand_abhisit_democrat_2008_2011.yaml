movement_id: thailand_abhisit_democrat_2008_2011
status: candidate
name: "Abhisit Democrat — red-shirt crackdown and Bangkok-middle-class restoration"
countries: [THA]
timeframe: {start: 2008, end: 2011, enacted_date: "2008-12-17"}
coalition: "Democrat Party-led coalition (Bhumjaithai, Chart Thai Pattana etc; Abhisit Vejjajiva)"
leaders:
  - "Abhisit Vejjajiva (PM, 17 Dec 2008 - 5 Aug 2011)"
  - "Korn Chatikavanij (Finance)"
  - "Suthep Thaugsuban (Deputy PM, security)"
  - "Tarisa Watanagase / Prasarn Trairatvorakul (BoT Governor)"
doctrine: >
  Democrat Party Bangkok-middle-class restoration doctrine — Oxford-educated
  Abhisit took power in December 2008 via defections after PPP dissolution
  (not direct election). Programme combined (1) GFC-response fiscal stimulus:
  first "Thai Khem Khaeng" (Strong Thailand) stimulus Jan 2009 ~THB 117bn,
  second Thai Khem Khaeng 2012 infrastructure package THB 1.4tn pipeline
  announced 2009, THB 2,000 "cheque help the nation" per-capita transfer
  (2009); (2) continuation of populist entitlements (free 15-year education,
  elderly allowance THB 500/month universal); (3) red-shirt political
  containment — UDD (United Front for Democracy Against Dictatorship)
  Thaksin-aligned mass protests occupied Bangkok business district Mar-May
  2010 demanding dissolution and election; military crackdown 10 April
  and 19 May 2010 killed 91+ and injured 2,000+, central-Bangkok Central
  World shopping complex burned. Abhisit resisted calls for resignation,
  dissolved parliament May 2011 ahead of scheduled end, July 2011 election
  decisively won by Pheu Thai (Yingluck Shinawatra as PM-designate).
  Coherence line: Democrat Party mainstream centre-right stimulus +
  populist continuity + security-hard posture toward red shirts, ending in
  electoral defeat by the Thaksin vehicle they had supplanted.
policies:
  - th_abhisit_thai_khem_khaeng_stimulus_2009
  - th_abhisit_cheque_2000_baht_2009
  - th_abhisit_elderly_universal_allowance_2009
  - th_abhisit_red_shirt_crackdown_may_2010
  - th_abhisit_free_15_year_education_2009
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Thai Khem Khaeng stimulus packages 2009-2010; infrastructure commitments."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Universal elderly allowance, 15-year free education, THB 2,000 cheque."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Military crackdown on red-shirt protests with substantial civilian casualties; emergency decree extended."}
  - {axis: regulatory.trade_openness, direction: "0", magnitude: weak, rationale: "ASEAN FTA processes continued; no major unilateral liberalisation."}
predecessor_movements:
  - thailand_samak_somchai_ppp_2008
successor_movements:
  - thailand_yingluck_pheu_thai_2011_2014
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "GFC-period fiscal stimulus + universal transfers align with demand-support framework."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Democrat Party self-identifies market-liberal but retained and expanded Thaksin-era populist entitlements."}
references:
  - "Cabinet Office — Thai Khem Khaeng I-II fiscal packages 2009-2010"
  - "Truth for Reconciliation Commission of Thailand (TRCT), final report September 2012 on April-May 2010 events"

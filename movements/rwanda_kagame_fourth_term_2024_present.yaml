# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: rwanda_kagame_fourth_term_2024_present
status: candidate
name: "Kagame fourth elected term 2024-present"
countries: [RWA]
timeframe: {start: 2024, end: ongoing, enacted_date: "2024-08-11"}
coalition: "Rwandan Patriotic Front (RPF) — dominant party, post-genocide developmental authoritarian"
leaders:
  - "Paul Kagame (President, RPF, 4th elected term Aug 2024-2029; effectively in power since 2000)"
  - "Édouard Ngirente (Prime Minister, 2017-)"
  - "Yusuf Murangwa (Finance Minister, 2024-)"
  - "John Rwangombwa (BNR Governor)"
doctrine: >
  Continuation of the post-genocide developmental-authoritarian
  model. Programme: Vision 2050 long-term plan (high-income
  status by 2050) anchoring industrial policy, services-export
  pivot (tourism, conferencing, financial services via Kigali
  International Financial Centre), regional-hub strategy
  (single visa zone, integration with EAC). Macroeconomic
  orthodoxy retained — IMF Policy Support Instrument-class
  programmes, low-inflation regime, sovereign-bond access.
  Kagame won Aug 2024 election with ~99% reported share against
  symbolic opposition (Frank Habineza permitted; Diane Rwigara
  excluded). Major external file: M23 Rwandan-backed offensive
  in eastern DRC 2024-2025 reaching Goma and Bukavu, triggering
  international sanctions; UK Rwanda asylum-deal collapsed
  with UK government change. Continued post-2018 visa
  liberalisation and Made-in-Rwanda industrial push.
policies:
  - rw_vision_2050_continuation_2024
  - rw_made_in_rwanda_industrial_policy
  - rw_kigali_financial_centre_buildout
  - rw_drc_m23_external_intervention_2024
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "Vision 2050 + Made-in-Rwanda + KIFC active state-led industrial-policy stack."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "BNR retains technical independence; low-inflation, sovereign-bond access."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Single-party dominance; opposition exclusions; press restrictions persist."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "EAC integration; visa liberalisation; export-services pivot."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: moderate, rationale: "Single-party institutional dominance constrains independent adjudication of political cases."}
predecessor_movements: [rwanda_post_genocide_reconstruction_1994_2020]
position_alignments:
  - {position_id: developmentalist, alignment: aligned, notes: "Vision 2050 long-term plan; Made-in-Rwanda industrial-policy stack; KIFC services-export strategy; East Asian developmental-state model adapted."}
  - {position_id: national_conservative, alignment: partially_aligned, notes: "RPF single-party-dominant authoritarian developmentalism; ethnic-political-control framework; M23 external intervention reflecting strategic-depth doctrine."}
  - {position_id: classical_liberal, alignment: opposed, notes: "Single-party dominance; opposition exclusion; press restrictions; M23-driven sanctions exposure — opposed on rule-of-law and democratic-quality axes."}
references:
  - "Rwandan presidential election results July 2024"
  - "UN Group of Experts reports on M23 / DRC conflict"
notes: "Stub authored to close 2026 atlas-coverage gap for RWA. Earlier Kagame terms (2003-2010, 2010-2017, 2017-2024) remain unauthored."

movement_id: us_nixon_wage_price_controls_1971_1974
status: candidate
name: Nixon wage-price controls + Bretton Woods exit
countries:
- USA
timeframe:
  start: 1971
  end: 1974
coalition: Republican (Nixon) with Democratic-majority Congress that had delegated authority via
  the Economic Stabilization Act 1970
leaders:
- Richard Nixon (President)
- John Connally (Treasury 1971-1972)
- George Shultz (Treasury 1972-1974, OMB before)
- Arthur Burns (Fed Chair)
- Herbert Stein (CEA)
doctrine: 'Response to late-1960s inflation spillover from Vietnam + Great Society financing and
  to mounting Bretton Woods pressures. The August 15, 1971 ''Nixon Shock'' closed the gold window
  (suspending dollar-gold convertibility at $35/oz), imposed a 10% import surcharge, and announced
  a 90-day wage and price freeze. Controls then proceeded through Phase II (Nov 1971-Jan 1973,
  mandatory standards administered by the Cost of Living Council and Pay Board / Price Commission),
  Phase III (Jan-Jun 1973, weakened self- administration), a second 60-day freeze (Jun-Aug 1973),
  and Phase IV (Aug 1973-Apr 1974) with sectoral carve-outs. The Smithsonian Agreement (Dec 1971)
  briefly re-pegged dollar parities before collapsing in 1973 into generalised floating. Domestic
  regulatory state simultaneously expanded: EPA (1970), OSHA (1970), CPSC (1972). Stated case:
  buy time to dampen expectations while adjusting exchange rates; in practice controls suppressed
  measured inflation temporarily, produced shortages (gasoline, beef), and unwound into 1974 double-digit
  CPI.

  '
policies:

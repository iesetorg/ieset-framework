# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: peru_garcia_apra_second_2006_2011
status: candidate
name: "García APRA II — heterodox-turned-orthodox, 'dog in the manger', Bagua"
countries: [PER]
timeframe: {start: 2006, end: 2011, enacted_date: "2006-07-28"}
coalition: "APRA (Alianza Popular Revolucionaria Americana)"
leaders:
  - "Alan García Pérez (President 2006-2011; second term)"
  - "Luis Carranza / Luis Valdivieso / Mercedes Aráoz (MEF)"
  - "Julio Velarde (BCRP 2006-)"
  - "Yehude Simon / Javier Velásquez Quesquén (PCM)"
doctrine: >
  Ideological reversal from 1985-1990 heterodox-catastrophe first term
  to orthodox pro-investment second term, colliding with indigenous-
  rights conflicts. Five doctrinal pillars: (a) Orthodoxy reversal —
  García's first term (1985-90) had ended in hyperinflation 7,500%;
  second term maintained inflation targeting (Velarde BCRP), fiscal
  rule, US-Peru FTA implementation (in force Feb 2009); GDP growth
  averaged 6.8% 2006-2011 with peak 9.1% (2008). (b) "El perro del
  hortelano" ("dog in the manger") Op-Ed 28 October 2007 in El
  Comercio — argued Amazonian indigenous lands should be opened to
  private investment; sparked 18-24 months of tension. (c) Bagua
  massacre 5 June 2009 (Baguazo) — conflict at Curva del Diablo
  over Legislative Decrees 1015/1073/1090 opening Amazonian
  concessions; 33 deaths (including 23 police); decrees repealed;
  CGTP general strike; ILO Convention 169 consultation framework
  forced (Ley de Consulta Previa 2011). (d) Financial-crisis
  response — 2009 stimulus package; reserves-buffered exchange
  rate intervention; banking-sector remained sound. (e)
  Corruption shadow + post-presidency — Petroaudios scandal 2008
  (narcoindultos prosecution later); Odebrecht case (2017+)
  eventually led to García's suicide 17 Apr 2019 when arrest
  imminent. Stated school: pragmatic orthodox-APRA (renounced
  1985-90 heterodoxy); social-liberal rhetoric. Left-right:
  centre; APRA historically centre-left but García II operated
  centre-right. Popularity: 4 June 2006 runoff García 52.6% vs
  Humala 47.4%; approval >60% early, fell to ~20-30% post-Baguazo;
  5 June 2011 runoff Humala (Gana Perú) 51.4% vs Keiko Fujimori
  48.5%. Coherence: trade APRA heterodox identity and Amazonian
  concession opening for FTA implementation, 9.1% growth peak,
  and investment-grade rating (Fitch April 2008, S&P July 2008)
  — at direct cost of Baguazo conflict and downstream Odebrecht
  exposure.
policies:
  - pe_garcia_ii_perro_del_hortelano_2007
  - pe_bagua_massacre_legislative_decrees_2009
  - pe_us_fta_implementation_2009
  - pe_financial_crisis_stimulus_2009
  - pe_investment_grade_rating_2008
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "US FTA came into force Feb 2009; China FTA signed 2009."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Extractive-concessions opening attempted (partially reversed post-Baguazo)."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Baguazo conflict; legislative-decree abuse; later Odebrecht revelations."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: weak, rationale: "2009 stimulus; pro-investment tax incentives."}
outcome_hypotheses: [extractive_concession_conflict_tradeoff, apra_ideological_reversal_credibility]
predecessor_movements: [peru_toledo_pp_2001_2006]
successor_movements: []
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: social_liberal, alignment: partially_aligned}
references:
  - "García, 'El síndrome del perro del hortelano' El Comercio 2007-10-28"
  - "Defensoría del Pueblo Informe Baguazo 2009"
  - "ILO Convention 169; Ley 29.785 Consulta Previa 2011"
notes: "Distinct from García's catastrophic first term (1985-1990); contrast used as ieset ideological-reversal exemplar."

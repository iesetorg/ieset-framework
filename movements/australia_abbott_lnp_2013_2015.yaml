doctrine: 'Coalition fiscal-conservative repeal-and-consolidate programme centred on carbon and
  mining-tax repeal, border enforcement, and ambitious 2014 budget austerity that failed Senate
  passage. Economic school: market-liberal repeal-centric programme — Clean Energy Legislation
  (Carbon Tax Repeal) Act 17 Jul 2014; Minerals Resource Rent Tax Repeal 2 Sep 2014; Operation
  Sovereign Borders launched 18 Sep 2013; 2014 federal budget (13 May 2014) introduced Medicare
  co-payment A$7, university fee deregulation, Commonwealth Seniors Health Card indexation, fuel
  excise indexation, foreign aid cuts, with signature measures blocked in Senate by Greens/Labor/crossbench;
  FTA trifecta (Korea 5 Apr 2014, Japan 7 Apr 2014, China 17 Jun 2015); Royal Commission into
  Trade Union Governance (2014). Dated policies: Carbon Tax Repeal 17 Jul 2014; MRRT Repeal 2
  Sep 2014; 2014 Budget 13 May 2014; KAFTA, JAEPA, ChAFTA signed. Left-right: centre-right market-liberal
  with social-conservative tilt and border-enforcement hawkishness. Popularity: 2013 election
  53.5% 2PP; Abbott government approval fell to low-30s by late 2014 after budget-measure failures
  and knight/dame decoration controversy; Turnbull leadership challenge 14 Sep 2015 succeeded
  54-44. Coherence: repeal pillar executed; expansionary reform agenda blocked in Senate; fiscal-consolidation
  trajectory stalled with deficit not narrowing as forecast.

  '

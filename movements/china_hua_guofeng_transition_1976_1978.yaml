references:
  - "Teiwes & Sun (2007), 'The End of the Maoist Era: Chinese Politics During the Twilight of the Cultural Revolution'"
  - "MacFarquhar & Schoenhals (2006), 'Mao's Last Revolution'"
notes: "Deep-history tranche 1. Narrow scope vs. deng_xiaoping_reforms_1978."

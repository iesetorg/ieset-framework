movement_id: china_hua_guofeng_transition_1976_1978
status: candidate
name: "Hua Guofeng transitional 'Two Whatevers' era (China)"
countries: [CHN]
timeframe: {start: 1976, end: 1978}
coalition: "CCP under Hua Guofeng (Party Chairman Oct 1976)"
leaders:
  - "Hua Guofeng (Party Chairman, Premier)"
  - "Ye Jianshuai (NPC Chair)"
  - "Li Xiannian (Vice Premier, economics)"
doctrine: >
  Post-Mao orthodox-continuity CCP governance under the 'Two Whatevers'
  doctrine ('whatever Mao decided, we uphold; whatever Mao instructed,
  we follow'). Economic school: residual Maoist planned economy softened
  by the 'Ten-Year Plan 1976-1985' announced Feb 1978 — a Great-Leap-
  style push for 120 heavy industrial projects, US$65bn in plant imports,
  and 10% target GDP growth based on planned-economy extrapolation.
  Dated actions: arrest of Gang of Four (Oct 6 1976) ending Cultural
  Revolution politics; 11th Party Congress Aug 1977; NPC adoption of
  Ten-Year Plan Feb 1978; first major Western plant-import contracts
  (Baoshan Steel Dec 1977 contract with Nippon Steel). Left-right:
  hard-left statist by framework coding, but transitional — sets up
  Deng's Third Plenum Dec 1978 pivot by exposing plan-overstretch.
  Popularity: no electoral signal; Hua's factional base eroded at Central
  Work Conference Nov 1978 where Deng consolidated Standing Committee
  support. Coherence: low — Maoist continuity rhetoric combined with
  heavy foreign-technology imports produced balance-of-payments stress
  and the 1979-1980 'readjustment' that cancelled most Ten-Year Plan
  projects.
policies:
  - cn_arrest_gang_of_four_1976
  - cn_ten_year_plan_1978
  - cn_baoshan_steel_japan_contract_1977
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "Ten-Year Plan targeted 120 heavy industrial projects; planned-economy investment ratios pushed above sustainable levels."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "First large Western/Japanese plant-import contracts; still administrative, not market-opening."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: weak, rationale: "End of Cultural Revolution mass-campaign politics; modest legal-institution restoration."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "No market reforms; planned allocation retained."}
successor_movements:

movement_id: netherlands_rutte_ii_vvd_pvda_2012_2017
status: candidate
name: "Rutte II VVD-PvdA purple-red-blue coalition 2012-2017"
countries: [NLD]
timeframe: {start: 2012, end: 2017, enacted_date: "2012-11-05"}
coalition: "VVD + PvdA ('Paars II' without D66, two-party majority 79/150)"
leaders:
  - "Mark Rutte (PM, VVD)"
  - "Lodewijk Asscher (PvdA, Vice-PM / Social Affairs)"
  - "Jeroen Dijsselbloem (PvdA, Finance Minister, Eurogroup President 2013-2018)"
doctrine: >
  Cross-spectrum VVD-PvdA 'bruggen bouwen' coalition negotiated in 54 days.
  Economic school: centrist consolidation-plus-redistribution bargain —
  VVD tightening labour and housing, PvdA securing progressive tax and
  care-sector protection. Signature measures: housing-market reform (2013 —
  mortgage-interest deduction annually reduced 0.5pp, max-LTV declining to
  100%, rental-sector verhuurderheffing); further €16bn austerity package
  (Herfstakkoord Oct 2013); Participatiewet 2015 merging WSW+Wajong+WWB into
  one activation law; decentralisation of long-term-care Wlz+Wmo 2015 to
  municipalities with ~40% budget haircut; pension-sector second-pillar
  reforms; state-pension indexation slowdown; Wet werk en zekerheid 2015
  (flex-law) capping fixed-term chain contracts and cutting severance.
  Externally Dijsselbloem chaired Eurogroup through Greek Third Memorandum.
  Left-right: centrist; VVD centre-right, PvdA centre-left. Popularity:
  PvdA crashed from 24.8% (2012) to 5.7% (2017 — largest historic loss);
  VVD held 21.3%. Coherence: high programmatically for a VVD-PvdA
  bargain; unsustainable politically for PvdA base.
policies:
  - nl_housing_market_reform_2013
  - nl_herfstakkoord_2013
  - nl_participatiewet_2015
  - nl_wlz_wmo_decentralisation_2015
  - nl_wet_werk_zekerheid_2015

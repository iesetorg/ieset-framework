movement_id: norway_bondevik_jagland_transition_1996_2000
status: candidate
name: "Norway Jagland AP + Bondevik I centre coalition 1996-2000"
countries: [NOR]
timeframe: {start: 1996, end: 2000, enacted_date: "1996-10-25"}
coalition: "AP single-party minority (1996-1997); then KrF-Sp-V centre-coalition minority (1997-2000)"
leaders:
  - "Thorbjoern Jagland (Prime Minister, AP, Oct 1996 - Oct 1997)"
  - "Kjell Magne Bondevik (Prime Minister, KrF, Oct 1997 - Mar 2000)"
  - "Sigbjoern Johnsen (Finance Minister, AP, to 1996)"
  - "Gudmund Restad (Finance Minister, Sp, 1997-2000)"
doctrine: >
  Transitional period covering the end of the long AP hegemony and the
  first centre-coalition experiment. Economic school: Norwegian social-
  democratic / Christian-centrist oil-revenue stewardship — continuation
  of the Government Petroleum Fund (renamed 2006 to Government Pension
  Fund Global) framework with a cautious fiscal stance. Jagland AP set
  the famous 36.9% benchmark ("unless we beat Brundtland's 1993 result
  of 36.9%, I resign") and lost. Bondevik I assembled a minority
  KrF-Sp-V coalition around social values and rural interests, fell in
  March 2000 over a gas-power plant environmental dispute (Kaarstoe/
  Kollsnes). Left-right axis: centre-left (Jagland), centre (Bondevik).
  Dated policies: Petroleum Fund first deposit (May 1996), cash-for-care
  kontantstoette (1998), 1998 banking-crisis resolution reversal. Popularity:
  Jagland government survived less than a year; Bondevik I fell on a
  parliamentary vote 17 March 2000. Coherence: low — short-lived, formed
  under unusual conditions.
policies:
  - no_petroleum_fund_first_deposit_1996
  - no_kontantstoette_cash_for_care_1998
  - no_bondevik_i_gas_power_fall_2000
axes_summary:
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: weak, rationale: "Kontantstoette cash-for-care transfer for parents not using public daycare."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Oil-revenue discipline via Petroleum Fund mechanism preserved."}
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: weak, rationale: "Bondevik-I fell rather than authorise gas-power plants without CCS."}
successor_movements: [norway_bondevik_ii_centre_right_2001_2005]

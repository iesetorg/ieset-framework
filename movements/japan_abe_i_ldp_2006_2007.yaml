# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_abe_i_ldp_2006_2007
status: candidate
name: "Abe I LDP first cabinet — beautiful country conservatism"
countries: [JPN]
timeframe: {start: 2006, end: 2007, enacted_date: "2006-09-26"}
coalition: "LDP-Komeito (Abe Shinzō first cabinet)"
leaders:
  - "Shinzō Abe (PM, 26 Sep 2006 - 26 Sep 2007)"
  - "Kōji Omi (Finance, 2006-2007)"
  - "Fukushiro Nukaga (Finance, 2007)"
  - "Toshihiko Fukui (BoJ Governor, continuing)"
doctrine: >
  Abe I LDP pre-crisis conservative doctrine — a self-styled "beautiful country"
  (utsukushii kuni) programme blending Koizumi-era structural-reform continuity
  (postal privatisation implementation, general-account discipline) with a
  nationalist-conservative institutional turn: upgrade of the Defence Agency
  to full Ministry (January 2007), revision of the Fundamental Law of Education
  (December 2006) to add patriotism language, and a referendum procedure law
  for constitutional amendment (May 2007). Economically centre-right: continued
  BoJ zero-rate exit (July 2006 first hike to 0.25%, February 2007 to 0.50%),
  corporate-tax-competitiveness rhetoric, and FTA push (Japan-Indonesia EPA
  signed August 2007). Popularity collapsed from 70%+ at inauguration to sub-30%
  by mid-2007 after a string of cabinet scandals (agriculture minister Matsuoka
  suicide May 2007, pensions-records scandal June 2007) and an Upper House
  election defeat July 2007 where LDP lost its majority; Abe resigned
  September 2007 citing ill health. Coherence line: Koizumi-reform continuity
  plus nationalist institutional agenda, derailed by scandal management.
policies:
  - jp_defence_ministry_upgrade_2007
  - jp_fundamental_education_law_revision_2006
  - jp_boj_rate_normalisation_2006_2007
  - jp_japan_indonesia_epa_2007
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "-", magnitude: weak, rationale: "BoJ exited ZIRP — July 2006 hike to 0.25%, Feb 2007 to 0.50%."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Japan-Indonesia EPA signed Aug 2007, ASEAN EPA momentum."}
  - {axis: institutional.rule_of_law, direction: "0", magnitude: weak, rationale: "Constitutional-revision procedure law enacted but substantive amendment not pursued."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Koizumi-era primary-balance target held; no major fiscal impulse."}
predecessor_movements:
  - japan_koizumi_ldp_2001_2006
successor_movements:
  - japan_fukuda_aso_ldp_2007_2009
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Koizumi-reform continuity and BoJ normalisation welcomed; nationalist institutional moves not core."}
  - {position_id: empirical_pragmatist, alignment: partially_aligned, notes: "Technocratic continuation of postal privatisation phase-in."}
references:
  - "Fundamental Law of Education revision, Law No. 120 of 2006"
  - "Defence Ministry upgrade, Law No. 118 of 2006 (effective January 2007)"
  - "Japan-Indonesia Economic Partnership Agreement, signed 20 August 2007"
  - "NHK monthly approval series, Sep 2006 - Sep 2007"
notes: >
  First Abe cabinet coded distinctly from Abe II-IV (abenomics_2012_2020)
  because the doctrinal content differs: Abe I is Koizumi-reform continuity
  plus conservative-institutional agenda with tightening BoJ; Abe II is
  reflationary Abenomics macro + Womenomics + TPP. Same PM, different
  programme.

notes: >
  Popularity: SAP result 2014 31.0% / 113 seats, 2018 28.3% / 100 seats
  (SAP's worst since 1911 when in government until Andersson 2022).
  Löfven survived a June 2021 no-confidence motion triggered by V over
  rental reform, briefly resigned, was re-elected, then handed power to
  Andersson November 2021. EU-election share: SAP 23.5% 2019 (down from
  24.2% 2014). Novus/SCB partisympati: SAP approval ratings oscillated
  27-33% across the period, dipping sharply during the 2015-16 migration
  crisis and the January Agreement negotiation phase 2018-19. Coherence
  judgement: medium — the 2014-18 phase was doctrinally coherent
  SAP-green content; the 2019-21 phase was hybrid SAP/liberal under the
  January Agreement and created durable strategic confusion that the
  subsequent election punished.

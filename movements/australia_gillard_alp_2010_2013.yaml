# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: australia_gillard_alp_2010_2013
status: candidate
name: "Gillard ALP minority government (Australia)"
countries: [AUS]
timeframe:
  start: 2010
  end: 2013
  enacted_date: "2010-06-24"
coalition: "ALP minority government with Greens (Bandt) and Independents (Oakeshott, Windsor, Wilkie) under written agreements post-2010 hung parliament"
leaders:
  - "Julia Gillard (Prime Minister 24 Jun 2010 - 27 Jun 2013)"
  - "Wayne Swan (Treasurer and Deputy PM)"
  - "Kevin Rudd (Foreign Minister 2010-2012, returned as PM 27 Jun 2013)"
  - "Glenn Stevens (RBA Governor)"
  - "Martin Parkinson (Treasury Secretary from 2011)"
doctrine: >
  ALP-Greens-Independents minority agenda delivering the carbon-price
  package, NDIS groundwork, plain-packaging tobacco, and MRRT mining-tax
  revision. Economic school: centre-left reformist — Clean Energy
  Future legislated Nov 2011 with A$23/tonne fixed carbon price from 1 Jul
  2012 transitioning to ETS; Minerals Resource Rent Tax (22.5% effective
  on iron ore and coal) replacing RSPT, enacted 19 Mar 2012 from 1 Jul
  2012; Tobacco Plain Packaging Act enacted 1 Dec 2011 (world-first);
  National Disability Insurance Scheme Act 21 Mar 2013 with launch trials
  1 Jul 2013; Gonski school-funding review (Feb 2012) and National Plan
  for School Improvement Jun 2013; means-testing of private health
  insurance rebate (2012); 457 visa tightening 2013. Dated policies:
  Clean Energy Act 18 Nov 2011; MRRT 19 Mar 2012; Plain Packaging Act
  1 Dec 2011; NDIS Act 21 Mar 2013; Fair Work Amendment Act 2012. Left-
  right: centre-left, progressive on environment/health/disability, fiscally
  trying to maintain surplus trajectory (abandoned Dec 2012). Popularity:
  2010 election 50.12% 2PP (hung parliament); Gillard approval sank below
  30% late 2012; Rudd challenges Feb 2012 (failed) and Jun 2013 (succeeded);
  Abbott's Coalition won Sep 2013 53.5% 2PP. Coherence: high on progressive
  legislation pillar despite hung parliament; coherence undermined by
  visible leadership instability and Rudd-Gillard backgrounding.
policies:
  - au_clean_energy_future_carbon_price_2011
  - au_minerals_resource_rent_tax_2012
  - au_tobacco_plain_packaging_2011
  - au_ndis_act_2013
  - au_gonski_school_funding_review_2012
axes_summary:
  - {axis: regulatory.environmental_stringency, direction: "+", magnitude: strong, rationale: "Clean Energy Future package imposed A$23/t carbon price July 2012, covering ~60% emissions."}
  - {axis: fiscal.tax_corporate, direction: "+", magnitude: moderate, rationale: "MRRT levied 22.5% effective rate on iron ore/coal super-profits from 1 Jul 2012."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "NDIS legislated as major ongoing disability-entitlement scheme."}
  - {axis: regulatory.product_market_competition, direction: "0", magnitude: weak, rationale: "Plain-packaging tightening on tobacco branding; mixed elsewhere."}
  - {axis: regulatory.immigration_openness, direction: "-", magnitude: weak, rationale: "457 visa tightening and offshore-processing Malaysia solution (struck down by HCA 2011)."}
outcome_hypotheses: [carbon_price_emissions_effect, mining_super_profits_tax_effect]
predecessor_movements: [australia_rudd_alp_2007_2010]
successor_movements: [australia_abbott_lnp_2013_2015]
position_alignments:
  - {position_id: new_keynesian, alignment: aligned, notes: "Counter-cyclical fiscal stance; post-GFC consolidation attempted."}
  - {position_id: green_interventionism, alignment: aligned, notes: "Clean Energy Future is canonical carbon-pricing/renewable push."}
  - {position_id: social_democracy, alignment: aligned, notes: "NDIS, Gonski, plain-packaging expand social/regulatory state."}
references:
  - "Clean Energy Act 2011 (Cth)"
  - "Minerals Resource Rent Tax Act 2012 (Cth)"
  - "Tobacco Plain Packaging Act 2011 (Cth)"
  - "National Disability Insurance Scheme Act 2013 (Cth)"
notes: "Carbon price fully repealed 17 Jul 2014 under Abbott; movement captures enactment not subsequent repeal."

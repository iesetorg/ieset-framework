# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: bolivia_anez_interim_2019_2020
status: candidate
name: "Áñez conservative transitional government (Bolivia)"
countries: [BOL]
timeframe: {start: 2019, end: 2020}
coalition: "Movimiento Demócrata Social + Comunidad Ciudadana + conservative civic committees"
leaders:
  - "Jeanine Áñez (interim President Nov 2019 - Nov 2020)"
  - "Luis Fernando Camacho (Santa Cruz civic-committee leader)"
  - "Arturo Murillo (Interior Minister)"
doctrine: >
  De facto conservative transitional administration installed after Morales'
  November 2019 resignation, claiming constitutional succession through
  congressional vacancy. Stated doctrine: restore institutional order, hold
  clean elections, re-orient foreign policy westward (recognising Guaidó,
  withdrawing from ALBA/UNASUR, re-establishing ties with Israel and the US),
  and normalise relations with IMF — including a March 2020 USD 327m Rapid
  Financing Instrument loan during COVID, later cancelled by Arce as
  unconstitutional. Economic orientation was nominally market-liberal and
  FMI-normalising but was overwhelmed by COVID-19 response and by political
  violence: the Sacaba and Senkata massacres of November 2019 killed at least
  22 MAS supporters. Áñez repeatedly postponed the election (originally May
  2020, held Oct 2020) and Arce-MAS won decisively with 55.1%. Áñez and key
  ministers were later prosecuted; Áñez sentenced to 10 years in June 2022 on
  "violation of duties" / "decisions contrary to constitution" charges.
policies:
  - bo_imf_rfi_loan_2020
  - bo_anez_foreign_policy_realignment_2019
  - bo_covid_emergency_response_2020
axes_summary:
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Foreign-policy realignment toward US-aligned bloc; no major trade liberalisation enacted."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: moderate, rationale: "Contested constitutional succession; decree 4078 granting military immunity preceded Senkata/Sacaba massacres."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "COVID emergency bonds (Bono Familia, Canasta Familiar) expanded transfers."}
  - {axis: monetary.central_bank_independence, direction: "0", magnitude: weak, rationale: "No major monetary-framework change; peg maintained."}
position_alignments:
  - {position_id: classical_liberal, alignment: partially_aligned}
  - {position_id: democratic_socialist, alignment: opposed}
predecessor_movements:
  - bolivia_morales_third_crisis_2014_2019
successor_movements:
  - bolivia_arce_mas_2020_present
references:
  - "IMF Rapid Financing Instrument Bolivia, April 2020"
  - "IACHR GIEI-Bolivia report on Sacaba and Senkata, 2021"
  - "Decreto Supremo 4078 (2019)"
notes: >
  Characterised internationally as interim government; characterised by
  MAS and subsequent prosecutions as a "de facto" or coup government.
  Framework records policy content, not label.

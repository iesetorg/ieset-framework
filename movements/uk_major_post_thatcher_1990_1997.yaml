movement_id: uk_major_post_thatcher_1990_1997
status: candidate
name: 'UK Major government: ERM, privatisations, PFI'
countries:
- GBR
timeframe:
  start: 1990
  end: 1997
coalition: Conservative majority, narrowed after 1992 election
leaders:
- John Major (PM; previously Chancellor 1989-1990)
- Norman Lamont (Chancellor 1990-1993)
- Kenneth Clarke (Chancellor 1993-1997)
- Michael Heseltine (DPM 1995-1997)
doctrine: 'Continuation of Thatcher-era market orientation with modifications. Sterling entered
  the ERM on 8 October 1990 at DM2.95 central rate; Black Wednesday (16 September 1992) ejected
  sterling after failed intervention and a 15% single-day rate rise, forcing a new monetary framework:
  explicit inflation target (2.5% RPIX), published minutes of Chancellor-Governor meetings from
  1994 (the ''Ken and Eddie show''), a de facto precursor to 1997 BoE independence. Further privatisation
  continued: Railways Act 1993 (British Rail broken up into Railtrack + train operating companies
  1994-1997); British Coal (1994); nuclear generation restructuring. Private Finance Initiative
  launched 1992 (Lamont Autumn Statement) to bring private capital into public infrastructure.
  Council tax replaced the poll tax (Local Government Finance Act 1992) after the 1990 community
  charge crisis. Citizen''s Charter 1991 introduced service standards in public services. Maastricht
  Treaty ratified 1993 with UK opt-outs on single currency and Social Chapter. Deep recession
  1990-1992, then recovery with low inflation through 1996-97 handed to Blair.

  '
policies:
- uk_erm_entry_and_ejection_1990_1992
- uk_inflation_target_regime_1992
- uk_rail_privatisation_1993_1997
- uk_british_coal_privatisation_1994
- uk_pfi_launch_1992
- uk_council_tax_1992
- uk_maastricht_opt_outs_1993
axes_summary:
- axis: monetary.central_bank_independence
  direction: +
  magnitude: moderate
  rationale: Post-ERM inflation-target regime with published minutes narrowed Treasury discretion;
    full operational independence came 1997.
- axis: regulatory.product_market_competition
  direction: +
  magnitude: moderate
  rationale: Rail and coal privatisation, Citizen's Charter, utility-regulator extensions.
- axis: fiscal.tax_progressivity
  direction: '0'
  rationale: Basic rate stable at 25% falling to 23% in 1996; VAT extended to domestic fuel (reversed
    partly); council tax banded but regressive relative to income.
- axis: fiscal.spending_level
  direction: '-'
  magnitude: weak
  rationale: Post-recession consolidation 1993-1997 under Clarke; deficit from 7.8% GDP 1993 to
    ~2% by 1997.
- axis: regulatory.labour_market_flexibility
  direction: +
  magnitude: weak
  rationale: Trade Union Reform and Employment Rights Act 1993; continuation not escalation.
position_alignments:
- position_id: ordoliberal
  alignment: partially_aligned
  notes: Rules-based inflation targeting and fiscal consolidation.
- position_id: empirical_pragmatist
  alignment: partially_aligned
predecessor_movements:
- thatcherism
successor_movements:
- uk_blair_first_second_term_1997_2005
references:
- Railways Act 1993
- Local Government Finance Act 1992
- Lamont, Autumn Statement 12 November 1992 (PFI)
- HM Treasury, inflation-report regime documentation from 1993
- Stephens (1996), Politics and the Pound
notes: 'Pre-1996 sample extension. Coded as continuation-with-modifications of Thatcherism, not
  a break. Black Wednesday is pivotal: it produced the monetary framework that 1997 BoE independence
  operationalised.'

# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: israel_olmert_kadima_2006_2009
status: candidate
name: "Olmert Kadima centrist government (Israel)"
countries: [ISR]
timeframe:
  start: 2006
  end: 2009
  enacted_date: "2006-05-04"
coalition: "Kadima-led coalition with Labor, Shas, and Gil Pensioners; centrist-realignment government formed after Sharon's Jan 2006 stroke"
leaders:
  - "Ehud Olmert (Prime Minister 14 Apr 2006 - 31 Mar 2009)"
  - "Tzipi Livni (Foreign Minister)"
  - "Ehud Barak (Defence Minister from Jun 2007)"
  - "Roni Bar-On / Abraham Hirchson (Finance Ministers)"
  - "Stanley Fischer (Bank of Israel Governor from May 2005)"
doctrine: >
  Centrist Kadima realignment inheriting Sharon's disengagement logic,
  continuing Netanyahu-2003 structural fiscal discipline and pension-reform
  trajectory while managing two major exogenous shocks: the Second Lebanon
  War (12 Jul - 14 Aug 2006) and the 2008 GFC. Economic school: Kadima
  economic-continuity centrist — keeping Netanyahu's 2003 stabilisation
  framework, NIS monetary independence under Fischer, and gradualist
  welfare-consolidation while pursuing Convergence Plan (shelved post-war)
  and OECD accession (completed 2010). Dated policies: Bank of Israel
  Law 2010 drafted under Fischer-Olmert collaboration; 2008 fiscal
  stimulus moderate vs international peers; Annapolis peace conference
  Nov 2007; Operation Cast Lead Dec 2008-Jan 2009. Left-right: centre,
  economically liberal-continuity, security hawkish after Lebanon. Olmert's
  corruption indictments (Holyland, Rishon Tours) forced his resignation
  announcement Jul 2008 and Kadima primary Sep 2008 (Livni win). Popularity:
  Winograd Commission interim report Apr 2007 damaged approval severely
  post-Lebanon; late-term approval below 10% per Haaretz polling. Coherence:
  moderate — economic-policy continuity was tight but security/political
  coherence collapsed under the Lebanon-War Winograd findings and serial
  corruption investigations.
policies:
  - il_bank_of_israel_law_2010_draft_2008
  - il_oecd_accession_push_2008
  - il_cast_lead_security_spending_2008
axes_summary:
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: moderate, rationale: "Bank of Israel law draft under Fischer increased CBI operational independence; enacted 2010."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "OECD accession push drove PMR reforms across telecom and financial sectors."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Spending restrained vs GFC peers; modest 2008-2009 expansion."}
  - {axis: institutional.judicial_independence, direction: "0", magnitude: weak, rationale: "Independent prosecution of Olmert demonstrated AG/Supreme Court independence."}
outcome_hypotheses: [fiscal_discipline_growth_effect]
predecessor_movements: [israel_sharon_likud_2001_2006]
successor_movements: [israel_netanyahu_likud_second_term_2009_2013]
position_alignments:
  - {position_id: new_keynesian, alignment: partially_aligned, notes: "Moderate stimulus under Fischer-CBI anchor 2008-2009."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "OECD accession structural reform push."}
references:
  - "Winograd Commission Final Report (Jan 2008)"
  - "Bank of Israel Annual Report 2008, 2009"
  - "OECD Economic Survey Israel 2009, 2010"
notes: "Olmert resigned 21 Sep 2008 as Kadima leader; served as caretaker through Mar 2009 transition to Netanyahu II."

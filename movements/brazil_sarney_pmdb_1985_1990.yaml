movement_id: brazil_sarney_pmdb_1985_1990
status: candidate
name: "Sarney PMDB — Cruzado, Bresser, Summer heterodox stabilisation"
countries: [BRA]
timeframe: {start: 1985, end: 1990, enacted_date: "1985-03-15"}
coalition: "PMDB-PFL Aliança Democrática (Nova República civilian transition)"
leaders:
  - "José Sarney (President 1985-1990, ascended after Tancredo Neves's death)"
  - "Francisco Dornelles / Dílson Funaro / Luiz Bresser-Pereira / Maílson da Nóbrega (Fazenda, four ministers)"
  - "Fernando Henrique Cardoso (Senator; Constituent Assembly leader)"
  - "Ulysses Guimarães (Constituent Assembly President)"
doctrine: >
  Civilian-transition PMDB government that combined Constituent
  Assembly democratisation with four failed heterodox inflation
  plans. Five doctrinal pillars: (a) Cruzado Plan (28 February
  1986, Decreto-Lei 2.283) — heterodox shock: peg wages and
  prices, replace cruzeiro with cruzado at 1,000:1, eliminate
  indexation; inflation fell 15%→zero monthly by March-April
  1986; consumption boom; abandoned late 1986 after PMDB's 15
  November midterm electoral sweep; hyperinflation returned
  peaking ~80% monthly by early 1987. (b) Bresser Plan (June
  1987) and Summer Plan (15 January 1989, cruzado → cruzado
  novo at 1,000:1) — successive heterodox attempts, each
  failing within months. (c) 1988 Constitution (promulgated 5
  October 1988) — universalist welfare-state framework (SUS
  health, social security, earmarked spending, indexation of
  benefits); civil-rights progress paired with fiscal-rigidity
  time-bombs. (d) External default stance — February 1987
  Moratorium on external interest payments to commercial banks;
  reversed September 1988. (e) Loss of monetary control —
  monthly inflation hit 84% in March 1990; 1989 CPI 1,972%
  annualised. Stated school: CEPAL-structuralist heterodoxy
  (Bresser, Arida, Lara-Resende, Lopes, Nakano) + PMDB
  catch-all democratic politics. Left-right: centre to centre-left
  on 1988 Constitution, mixed on macro. Popularity: Cruzado
  honeymoon pushed Sarney approval to ~80% mid-1986 — PMDB
  won 22/23 governorships and massive Congressional majority
  November 1986 — collapsed to <10% by 1989; banned from
  1989 direct elections; Collor won December 1989 runoff 53%
  vs Lula 47%. Coherence: heterodox-stabilisation-first bet
  repeatedly failed; 1988 Constitution's institutional
  achievement survived hyperinflation legacy.
policies:
  - br_cruzado_plan_1986
  - br_constitution_1988
  - br_bresser_summer_plans_1987_1989
  - br_external_debt_moratorium_1987
  - br_hyperinflation_escalation_1989_1990
axes_summary:
  - {axis: monetary.monetary_expansion_direction, direction: "+", magnitude: strong, rationale: "Hyperinflation 1,972% 1989 after four failed plans."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "1988 Constitution universalised SUS health, social-security indexation, earmarked spending."}
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: moderate, rationale: "Price-wage freezes under heterodox plans; capital-flow controls."}
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "1988 Constitution; civilian transition from military rule; direct-election amendment movement 1984."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Debt monetisation; earmarked mandatory spending in new constitution."}
outcome_hypotheses: [heterodox_stabilisation_effectiveness, constitutional_mandate_fiscal_rigidity]
predecessor_movements: [brazil_figueiredo_final_military_1979_1985]
successor_movements: [brazil_collor_prn_1990_1992]
position_alignments:
  - {position_id: post_keynesian, alignment: aligned, notes: "Bresser, Arida, Lara-Resende structuralist heterodox school."}
  - {position_id: chicago_monetarism, alignment: opposed}
  - {position_id: social_liberal, alignment: partially_aligned}
references:

  - "Constituição Federal 1988"
  - "Bresser-Pereira (1996), Economic Crisis and State Reform in Brazil"
notes: "Heterodox stabilisation laboratory; pairs institutional success (1988 Constitution) with macro failure (1,972% 1989 CPI)."

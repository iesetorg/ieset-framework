  - "Hertog (2019), 'Challenges to the Saudi distributional state'"
  - "Saudi Opinion / Arab Barometer wave VI-VII approval data"
notes: "Nominal king is Salman; de-facto policy locus has been CP MBS throughout. Prime-ministership title transferred to MBS Sep 2022."

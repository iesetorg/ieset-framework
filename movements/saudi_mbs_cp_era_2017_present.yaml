movement_id: saudi_mbs_cp_era_2017_present
status: candidate
name: "MBS Crown Prince era (de-facto rule)"
countries: [SAU]
timeframe: {start: 2017, end: ongoing}
coalition: "Al Saud monarchy under Crown Prince Mohammed bin Salman (Chair of CEDA, PIF, MoD)"
leaders:
  - "King Salman bin Abdulaziz (nominal)"
  - "Mohammed bin Salman (Crown Prince, de-facto ruler; Prime Minister from Sep 2022)"
  - "Mohammed Al-Jadaan (Finance Minister)"
  - "Yasir Al-Rumayyan (PIF Governor, Aramco Chair)"
  - "Prince Abdulaziz bin Salman (Energy Minister)"
doctrine: >
  Broad post-Ritz-Carlton consolidation under Crown Prince Mohammed bin
  Salman, fusing Vision 2030 sovereign-directed modernisation with hard
  executive centralisation. Economic doctrine is state-capitalist
  diversification: PIF scaled from ~$150bn toward a $2tn target,
  giga-projects (NEOM announced Oct 2017, Qiddiya, Red Sea, Diriyah),
  Aramco partial IPO Dec 2019 and 2024 follow-on, fiscal-orthodoxy
  instruments (5% VAT Jan 2018 tripled to 15% Jul 2020, energy-subsidy
  reform), entertainment and tourism sector opening, and aggressive
  PIF-led FDI into global tech, sports and AI (Humain, LIV, Lucid).
  Politically the doctrine is conservative-nationalist monarchic
  modernisation — religious-establishment curtailment paired with
  expanded coercive capacity (Ritz-Carlton Nov 2017 detentions, women's
  rights activist arrests alongside the Jun 2018 driving-ban lift,
  Khashoggi killing Oct 2018). Foreign policy mixes security assertion
  (Yemen war from Mar 2015, Qatar blockade Jun 2017 through Jan 2021
  Al-Ula reconciliation, OPEC+ Mar 2020 price war then disciplined Oct
  2022 cut) with Great-Power balancing (Iran normalisation Mar 2023,
  refusal to sanction Russia, Saudi-Israel track alongside Abraham
  Accords). Left-right: absolute monarchy, framed as
  conservative-nationalist along identity/religious axes and
  reformist-modernising along economic/social axes. Popularity proxies
  (no elections): fiscal buffer used vs accumulated, PIF deployments,
  protest incidence (near-zero openly), Arab Barometer / Saudi Opinion
  survey approval (consistently 80%+ for MBS among Saudi nationals
  2018-2023). Coherence: a single authority bundling fiscal, regulatory,
  foreign and coercive instruments under one vertical chain, accepting
  rule-of-law costs to accelerate structural diversification.
policies:
  - sa_vision_2030_launch_2016
  - sa_neom_announcement_2017
  - sa_ritz_carlton_detentions_2017
  - sa_driving_ban_lifted_2018
  - sa_vat_introduction_2018
  - sa_aramco_ipo_2019
  - sa_khashoggi_killing_2018
  - sa_qatar_blockade_2017_2021
  - sa_opec_plus_strategy_2020_2022
  - sa_nitaqat_saudisation_2011
axes_summary:
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: strong, rationale: "PIF giga-project capex and sector-targeted industrial policy (EV, defence, tourism, AI) form the core investment programme."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Defence+PIF+transfer envelope sustains elevated spending share despite VAT revenue offset."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Entertainment, tourism, retail, SEZ (NEOM) openings; PIF expansion cuts the other way."}
  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: moderate, rationale: "Driving-ban lift, guardian-system reform, 2021 kafala reform — female LFP ~17%→~35%."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Ritz-Carlton extra-judicial detentions, Public Prosecution moved under royal authority 2017, politically-charged prosecutions."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Khashoggi operation, activist detentions, death-penalty expansion."}
  - {axis: regulatory.trade_openness, direction: "mixed", rationale: "Qatar blockade cut intra-GCC trade 2017-2021; post-2021 FDI liberalisation and tourist-visa opening pulls the other way."}
outcome_hypotheses: [resource_diversification_programme_effectiveness]
predecessor_movements: [saudi_salman_transition_2015_2017]
position_alignments:

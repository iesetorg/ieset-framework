movement_id: vietnam_linh_doi_moi_implementation_1986_1991
status: candidate
name: "Nguyễn Văn Linh Đổi Mới implementation (Vietnam)"
countries: [VNM]
timeframe: {start: 1986, end: 1991}
coalition: "Communist Party of Vietnam under General Secretary Nguyễn Văn Linh"
leaders:
  - "Nguyễn Văn Linh (General Secretary 1986-1991)"
  - "Đỗ Mười (Chairman of the Council of Ministers / Premier 1988-1991)"
  - "Võ Văn Kiệt (Vice Chairman Council of Ministers, reform architect)"
doctrine: >
  Đổi Mới (Renovation) implementation under Nguyễn Văn Linh — 6th
  Party Congress Dec 1986 legitimised household-agriculture + private-
  enterprise + price-liberalisation package ending central-planning
  orthodoxy after the 1985 currency reform debacle. Economic school:
  socialist-market transition via dual-track price reform (Chinese
  template), market-determined prices for non-strategic goods while
  retaining state leading role in strategic sectors. Dated policies:
  Resolution 10 (Khoán 10) 5 Apr 1988 household contract system in
  agriculture — returning land-use rights to 15-year contracts and de
  facto decollectivisation; Law on Foreign Investment 29 Dec 1987
  (first among reforming socialist states); Law on Private Enterprises
  Dec 1990; Law on Companies Dec 1990; Ordinance on Economic Contracts
  1989; 1989 unification of exchange rate and price liberalisation for
  most goods; 1989 IMF arrears resolution aborted by Tiananmen
  conservatism; CMEA collapse 1989-1991 forcing market transition;
  withdrawal from Cambodia Sep 1989. Left-right: Leninist single-party
  state executing pragmatic market transition — economic policy
  centre-right in comparative-transition framing. Popularity:
  controlled electoral/plebiscitary legitimacy; 6th Congress mandate
  strong internally; post-CMEA stagflation 1989 dampened momentum.
  Coherence: high within the constraint of CPV hegemony — agriculture
  decollectivisation, price liberalisation, FDI law, private-enterprise
  law all pointed the same direction, reinforced by external shock
  from CMEA collapse.
policies:
  - vn_khoan_10_agriculture_1988
  - vn_foreign_investment_law_1987
  - vn_private_enterprise_law_1990
  - vn_price_liberalisation_1989
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "-", magnitude: strong, rationale: "Private-enterprise law 1990 legalised private business; licensing relaxed across non-strategic sectors."}
  - {axis: institutional.property_rights, direction: "+", magnitude: strong, rationale: "Khoán 10 restored household land-use rights; foreign-investment law guaranteed FDI property."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: strong, rationale: "Foreign Investment Law 1987 opened to non-CMEA FDI; exchange-rate unification 1989."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: strong, rationale: "Price liberalisation 1989 ended dual-price for most goods; state monopolies retrenched to strategic sectors."}
predecessor_movements:

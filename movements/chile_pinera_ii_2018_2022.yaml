# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: chile_pinera_ii_2018_2022
status: candidate
name: "Piñera II — centre-right restorative, estallido social, pandemic IFE (Chile 2018-2022)"
countries: [CHL]
timeframe:
  start: 2018
  end: 2022
  enacted_date: "2018-03-11"
coalition: "Chile Vamos (RN + UDI + Evópoli + PRI) with rotating centrist legislative support, fragmenting after October 2019"
leaders:
  - "Sebastián Piñera (President 2018-2022, second non-consecutive term)"
  - "Felipe Larraín (Finance Minister 2018-2019)"
  - "Ignacio Briones (Finance Minister 2019-2020)"
  - "Rodrigo Cerda (Finance Minister 2021-2022)"
  - "Gonzalo Blumel (Interior Minister 2019-2020)"
  - "Rodrigo Delgado (Interior Minister 2020-2022)"
doctrine: >
  Centre-right liberal-conservative restoration on a Chile Vamos
  platform of growth acceleration, tax simplification, migration
  regularisation, and incremental social-policy expansion — elected
  after the reformist Nueva Mayoría cycle and inheriting a slowing
  copper-price environment. Early programme: Modernización Tributaria
  (Ley 21.210, enacted 24 February 2020) re-integrating the dual
  corporate-shareholder regime, introducing a digital-services tax,
  and targeted SME regime; Sistema de Garantías de la Niñez;
  Admisión Justa (later withdrawn) partially rolling back random-
  lottery admissions; migration law (Ley 21.325, April 2021) and
  mass regularisation-expulsion campaigns. The movement was
  structurally redefined by the October 2019 estallido social —
  initiated by a 30-peso Santiago Metro fare rise — which produced
  mass protests, institutional damage, and the cross-party Acuerdo
  por la Paz y Nueva Constitución (15 November 2019) opening a
  constitutional replacement process (plebiscite 25 October 2020:
  Apruebo 78.3%; Convención Constitucional elections May 2021;
  draft rejected in exit plebiscite 4 September 2022 with Rechazo
  61.9% under the successor Boric administration). Covid-19
  response: Ingreso Familiar de Emergencia (IFE) expanded through
  2020-2021 to near-universal transfers at peak, unemployment
  insurance (Ley Protección del Empleo), Fogape state-guarantee
  credit; and — forced by opposition + Chile Vamos defections —
  three rounds of 10% AFP pension withdrawals (July 2020, December
  2020, April 2021) totalling ~USD 50 bn drawn from individual
  accounts, and a constitutional process to enable a fourth that
  failed. Coalition: Chile Vamos held 72/155 Cámara seats post-2017
  (46.5%) and a Senado minority; Piñera's approval fell from ~54%
  at inauguration to ~6-10% post-estallido in late 2019 and
  remained below 30% for most of 2020-2022. Coherence: a market-
  liberal restoration programme overwritten mid-term by
  estallido-driven constitutional opening and by pandemic-era
  discretionary transfers on a scale no Chilean government had
  previously run.
policies:
  - cl_modernizacion_tributaria_2020
  - cl_acuerdo_paz_nueva_constitucion_2019
  - cl_ife_covid_2020_2021
  - cl_afp_retiros_10_2020_2021
  - cl_ley_migraciones_2021
axes_summary:
  - axis: fiscal.tax_corporate
    direction: "-"
    magnitude: weak
    rationale: "Modernización Tributaria re-integrated the dual regime for SMEs and simplified compliance; top effective rate on retained earnings essentially held."
  - axis: fiscal.transfer_expansion
    direction: "+"
    magnitude: strong
    rationale: "Pandemic-era IFE reached near-universal coverage at peak; a historic one-off expansion of Chile's transfer footprint."
  - axis: fiscal.spending_level
    direction: "+"
    magnitude: strong
    rationale: "Fiscal deficit widened to >7% of GDP in 2020 on emergency spending; total spending rose sharply before partial normalisation in 2021."
  - axis: regulatory.immigration_openness
    direction: "-"
    magnitude: moderate
    rationale: "Ley 21.325 tightened visa and residency requirements; administrative expulsions of Venezuelan and Haitian migrants increased."
  - axis: regulatory.labour_market_flexibility
    direction: "+"
    magnitude: weak
    rationale: "Ley Protección del Empleo introduced temporary contract-suspension mechanisms; no structural rollback of Bachelet labour reform."
  - axis: institutional.property_rights
    direction: "-"
    magnitude: moderate
    rationale: "Three rounds of legislated AFP pension withdrawals materially weakened the forced-saving property-rights architecture; framework codes policy content, not political authorship."
outcome_hypotheses:
  - welfare_architecture_comparative_effectiveness
predecessor_movements:
  - chile_bachelet_ii_nm_2014_2018
position_alignments:
  - {position_id: empirical_pragmatist, alignment: partially_aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Pandemic IFE expansion implemented under opposition pressure widened the transfer architecture beyond the coalition's stated doctrine."}
references:
  - "Ley 21.210 Modernización Tributaria (2020)"
  - "Ley 21.325 de Migración y Extranjería (2021)"
  - "Acuerdo por la Paz Social y la Nueva Constitución (15 Nov 2019)"
  - "Leyes 21.248, 21.295, 21.330 — retiros 10% AFP (2020-2021)"
  - "Centro de Estudios Públicos — Encuesta CEP 2018-2022 approval series"
  - "Ministerio de Hacienda — Informe de Finanzas Públicas 2020, 2021"
notes: >
  Piñera I (2010-2014) is a distinct earlier movement and is not
  coded here. Piñera II is the most analytically important entry:
  stated market-liberal restoration doctrine overwritten mid-term
  by estallido-era redistributive pressure and pandemic emergency
  transfers. Property-rights axis codes negative on AFP retiros
  regardless of which coalition passed them — Invariant-3 content-
  coding not party-label coding.

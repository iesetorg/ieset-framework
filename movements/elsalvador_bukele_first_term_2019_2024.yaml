movement_id: elsalvador_bukele_first_term_2019_2024
status: candidate
name: "Bukele first-term Nuevas Ideas consolidation (El Salvador)"
countries: [SLV]
timeframe:
  start: 2019
  end: 2024
  enacted_date: "2019-06-01"
coalition: "GANA-backed presidency 2019-2021; Nuevas Ideas Legislative Assembly supermajority 56/84 after Feb 28 2021 mid-term (with allied PCN and PDC bringing the bloc to ~64/84)."
leaders:
  - "Nayib Bukele (President, first term 2019-2024)"
  - "Félix Ulloa (Vice President)"
  - "Alejandro Zelaya (Finance Minister 2020-2024)"
  - "Douglas Rodríguez (BCR Governor)"
  - "Rogelio Rivas (Security Minister 2019-2021)"
  - "Gustavo Villatoro (Security Minister 2021-)"
  - "Osiris Luna (Prisons Director)"
  - "Rolando Castro (Labour Minister)"
  - "Raúl Melara (Attorney General, removed 1 May 2021)"
doctrine: >
  First-term consolidation phase of the Nuevas Ideas movement
  establishing the mass-incarceration security regime (Plan
  Control Territorial launched Jun 2019; régimen de excepción
  declared Mar 27 2022 after the 26-30 Mar 2022 gang massacre of
  87 civilians; monthly continuous legislative renewal since),
  Bitcoin legal tender (Ley Bitcoin Decreto 57 approved Jun 8
  2021 as world-first sovereign BTC adoption; effective Sep 7
  2021; Chivo wallet launched with $30 per-adult BTC buy-in), and
  institutional capture (Feb 9 2020 "9F crisis" armed-forces
  entry into the Legislative Assembly pressing for $109m security
  loan; May 1 2021 overnight removal of the five Constitutional
  Chamber magistrates and Attorney General Raúl Melara on the
  first day of the new Assembly; Sep 3 2021 replacement
  Constitutional Chamber ruling that consecutive presidential re-
  election is permitted despite the 1983 Constitution's explicit
  bans in Articles 152 and 248; Jun 2021 termination of the
  CICIES anti-corruption agreement with the OAS after CICIES
  began investigating Bukele-allied officials; CECOT Centro de
  Confinamiento del Terrorismo opened Jan 2023 as a 40,000-
  capacity mega-prison). Ideologically heterodox: right-
  authoritarian on rule-of-law and security, statist-libertarian
  on money, interventionist-developmentalist on tech incentives,
  and pragmatic on fiscal management (2022 sovereign-default fears
  managed via 2023 debt buyback, continued IMF engagement
  culminating in the Dec 2024 EFF). The movement was a coherent
  governing coalition with mass popular mandate: Bukele won 53.1%
  in Feb 3 2019 first round (end of two-party FMLN-ARENA era),
  Nuevas Ideas took 56/84 seats on Feb 28 2021, and approval
  polling sustained 80-90% through 2019-2024 on the homicide-rate
  collapse from 38/100k (2019) via 17.6/100k (2021) and 7.8/100k
  (2022) to 2.4/100k (2023). The coding separates security-and-
  monetary-reform content from institutional-quality deterioration
  per Invariant 3. Human-rights reporting (Human Rights Watch,
  Cristosal, Amnesty International) documents ~85,000+ detentions
  under régimen de excepción with minimal judicial review, ~300+
  deaths in state custody, and suspension of constitutional due-
  process guarantees via continuous 30-day renewal cycle.
policies:
  - sv_plan_control_territorial_2019
  - sv_state_of_exception_2022
  - sv_cecot_mega_prison_2023
  - sv_bitcoin_legal_tender_2021
  - sv_chivo_wallet_2021
  - sv_constitutional_chamber_removal_2021
  - sv_cicies_termination_2021
  - sv_bond_buyback_2023
  - sv_tax_reform_2023
  - sv_digital_asset_issuance_law_2023
  - sv_municipal_consolidation_262_to_44_2023
axes_summary:
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "Armed-forces entry into Legislative Assembly Feb 9 2020; régimen de excepción continuous since Mar 27 2022 suspending due-process; mass administrative detention."}
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "May 1 2021 overnight removal of Constitutional Chamber magistrates and Attorney General; Sep 3 2021 replacement Chamber authorised presidential re-election against constitutional text."}
  - {axis: institutional.property_rights, direction: "-", magnitude: weak, rationale: "Arbitrary detention raises ex-ante expropriation risk; offset by improved security for registered property."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "Bitcoin Law 2021 and Chivo wallet created a parallel monetary system with permissive crypto regime; Digital Asset Issuance Law 2023."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: moderate, rationale: "2023 tax-reform package lowered corporate and personal income tax rates while broadening base."}
  - {axis: fiscal.spending_level, direction: "0", magnitude: weak, rationale: "Security spending up; social spending flat; bond buyback reduced debt service but COVID transfers raised 2020 outlays."}
  - {axis: monetary.monetary_expansion_direction, direction: "0", magnitude: weak, rationale: "Dollarised since 2001; Bitcoin legal tender was parallel currency without seigniorage expansion."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Ley de Fomento a la Tecnología and FDI incentives lowered entry barriers for select sectors."}
outcome_hypotheses:

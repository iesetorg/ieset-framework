movement_id: philippines_cory_aquino_transition_1986_1992
status: candidate
name: "Cory Aquino post-EDSA democratic transition (Philippines)"
countries: [PHL]
timeframe: {start: 1986, end: 1992}
coalition: "Laban ng Demokratikong Pilipino / LABAN-PDP, post-EDSA pluralist"
leaders:
  - "Corazon C. Aquino (President 1986-1992)"
  - "Jaime Ongpin (Finance Secretary 1986-1987)"
  - "Solita Monsod (NEDA Director-General)"
  - "Jose B. Fernandez Jr. (Central Bank Governor)"
  - "Salvador Laurel (Vice President)"
doctrine: >
  Post-EDSA democratic-restoration centre doctrine combining constitutional
  restoration with orthodox market-liberalising stabilisation. Economic
  school: classical-liberal democratic-constitutionalism + IMF-orthodox
  macro + dismantling of Marcos crony monopolies. Dated policies:
  Freedom Constitution Mar 1986; 1987 Constitution ratified plebiscite
  2 Feb 1987 (76.4% Yes) — restored bicameral Congress, presidential
  single term, independent institutions; sequestration of crony assets
  via PCGG (Presidential Commission on Good Government) Mar 1986;
  Comprehensive Agrarian Reform Programme (CARP) RA 6657 of 10 Jun 1988
  covering ~10M ha over 10 years; privatisation of Marcos-era firms via
  APT (Asset Privatisation Trust) from 1986; tax reform 1986 simplifying
  rates, VAT 10% from 1 Jan 1988 (EO 273 of 25 Jul 1987); Brady Plan
  debt restructuring 1989-1990 (USD4.4bn buyback); coup attempts x7
  1986-1989 (most serious Dec 1989) destabilising investment; 1991
  Pinatubo eruption; US military bases rejected by Senate 16 Sep 1991.
  Left-right: centre to centre-right democratic-liberal; socially
  Catholic conservative. Popularity: Feb 1987 constitutional plebiscite
  76.4% Yes; May 1987 congressional election PDP-LABAN/Lakas 24/24
  Senate seats, 150/200 House; approval declined from ~80% 1986 to ~30%
  1990 amid coup attempts and power crisis. Coherence: moderate —
  durable constitutional restoration and crony-monopoly dismantlement
  coexisted with chronic governance instability (coups, power shortages,
  slow CARP implementation).
policies:
  - ph_1987_constitution
  - ph_pcgg_sequestration_1986
  - ph_carp_agrarian_reform_1988
  - ph_apt_privatisation_1986
  - ph_vat_ra_eo_273_1987
  - ph_us_bases_rejection_1991
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "1987 Constitution restored rule-of-law institutions post-Marcos; PCGG process formalised."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: strong, rationale: "Supreme Court restructured under 1987 Constitution; judicial review restored."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: moderate, rationale: "Dismantling of sugar/coconut monopolies; APT privatisation of ~120 Marcos-era sequestered firms."}
  - {axis: fiscal.tax_corporate, direction: "-", magnitude: weak, rationale: "Tax reform 1986-1987 simplified schedule and rates, broadened base via VAT."}
  - {axis: institutional.property_rights, direction: "mixed", magnitude: moderate, rationale: "CARP agrarian reform compulsory acquisition (negative for large landholders) balanced against strengthened property-rights framework in 1987 Constitution."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: weak, rationale: "Import liberalisation programme 1986-1992; tariff peak cuts."}
predecessor_movements:
  - philippines_marcos_crony_capitalism_1976_1986
position_alignments:
  - {position_id: classical_liberal, alignment: aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "CARP agrarian reform."}
references:
  - "1987 Constitution of the Republic of the Philippines"
  - "RA 6657 Comprehensive Agrarian Reform Law 1988"
  - "Hill (2003), 'Growth, Recovery and Reform since the Asian Crisis' in Dixon & Drakakis-Smith"
notes: "Deep-history tranche 1. Democratic restoration bookend to Marcos era."

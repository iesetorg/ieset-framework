# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: uk_attlee_welfare_state_1945_1951
status: candidate
name: "Attlee government: welfare state and nationalisations (UK)"
countries: [GBR]
timeframe: {start: 1945, end: 1951}
coalition: "Labour majority (1945 landslide, 393 seats)"
leaders:
  - "Clement Attlee (PM)"
  - "Hugh Dalton (Chancellor 1945-1947)"
  - "Stafford Cripps (Chancellor 1947-1950)"
  - "Aneurin Bevan (Health Minister; architect of NHS)"
  - "Ernest Bevin (Foreign Secretary)"
doctrine: >
  Implementation of the wartime cross-party Beveridge Report (1942)
  'social insurance against want' combined with the Labour Party's 1918
  Clause IV commitment to common ownership of the means of production.
  Legislative programme: Bank of England Act 1946 (nationalisation of the
  central bank); Coal Industry Nationalisation Act 1946 (NCB from January
  1947); Transport Act 1947 (British Rail, canals, long-distance road
  haulage); Electricity Act 1947; Gas Act 1948; Iron and Steel Act 1949
  (nationalisation effected February 1951). National Insurance Act 1946
  and National Assistance Act 1948 replaced the Poor Law. National Health
  Service Act 1946, operational 5 July 1948, as tax-funded free-at-point-
  of-use universal healthcare. Town and Country Planning Act 1947
  nationalised development rights. External context: 1945 US loan
  agreement (Keynes), 1947 sterling convertibility crisis, 1949 devaluation
  from $4.03 to $2.80, ERP Marshall aid from 1948, NATO 1949. Rationing
  continued into the 1950s. Proponents framed the programme as the
  post-war settlement translating wartime solidarity into peacetime
  institutions.
policies:
  - uk_bank_of_england_nationalisation_1946
  - uk_coal_nationalisation_1946
  - uk_nhs_act_1946
  - uk_national_insurance_act_1946
  - uk_transport_act_1947
  - uk_iron_steel_nationalisation_1949
  - uk_town_country_planning_act_1947
axes_summary:
  - {axis: regulatory.sectoral_licensing, direction: "+", magnitude: strong, rationale: "Nationalisation of coal, rail, steel, gas, electricity, Bank of England."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "National Insurance 1946 plus National Assistance 1948 created universal contributory + residual means-tested safety net."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: strong, rationale: "NHS, education, housing drove civilian state consumption share up sharply from pre-war."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: strong, rationale: "State monopolies replaced private and municipal provision in utilities and transport."}
  - {axis: institutional.property_rights, direction: "-", magnitude: moderate, rationale: "Compensated expropriation of owners of nationalised industries; development rights nationalised 1947."}
position_alignments:
  - {position_id: democratic_socialist, alignment: aligned, notes: "Clause IV-era Labour; canonical democratic-socialist programme in a parliamentary framework."}
  - {position_id: marxian, alignment: partially_aligned, notes: "Common-ownership agenda without revolutionary rupture; compensated nationalisations within a market wage labour economy."}
  - {position_id: social_democratic, alignment: aligned}
  - {position_id: austrian, alignment: opposed}
references:
  - "Beveridge, Social Insurance and Allied Services (Cmd 6404, 1942)"
  - "National Health Service Act 1946 (9 & 10 Geo. 6 c. 81)"
  - "Coal Industry Nationalisation Act 1946"
  - "Bank of England Act 1946"
  - "Cairncross (1985), Years of Recovery: British Economic Policy 1945-51"
notes: "Pre-1996 sample extension. End date 1951 marks the Churchill government's return; the 1951 Iron and Steel denationalisation and later partial reversals are coded separately."

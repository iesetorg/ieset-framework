movement_id: turkey_erdogan_akp_supermajority_2011_2018
status: candidate
name: "Erdoğan / AKP supermajority phase (Turkey 2011-2018)"
countries: [TUR]
timeframe: {start: 2011, end: 2018}
coalition: "Justice and Development Party (AKP) — third-term supermajority; post-2016 MHP alliance under OHAL"
leaders:
  - "Recep Tayyip Erdoğan (PM 2003-2014; President 2014-present)"
  - "Ahmet Davutoğlu (PM 2014-2016)"
  - "Binali Yıldırım (PM 2016-2018)"
  - "Ali Babacan (Deputy PM for economy, to 2015)"
  - "Mehmet Şimşek (Finance minister, to 2018)"
doctrine: >
  Transition phase from orthodox inflation-targeting / EU-anchored convergence
  to securitised executive consolidation. Economically, AKP maintained a
  credit-driven construction-led growth model — heavy TOKİ housing, PPP-guaranteed
  mega-projects (third bridge 2016, Istanbul airport 2018), and Credit Guarantee
  Fund (KGF) expansion in 2017 that pushed SME credit growth above 20% to
  re-stimulate after the 2016 shock. Left-right positioning: Islamic-conservative
  social policy, economic-nationalist rhetoric on "interest-rate lobby", and
  rising authoritarian content after Gezi (Jun 2013) and the Dec-2013 corruption
  probe. Key institutional events: Gezi Park protests June 2013, graft probe
  December 2013, presidential election Aug 2014 (Erdoğan 51.8%), Jun/Nov 2015
  double election, coup attempt 15 Jul 2016, state-of-emergency OHAL 2016-2018
  (21-month purge of ~150,000 public employees), constitutional referendum
  16 April 2017 (51.4% Yes) abolishing PM and switching to executive presidency,
  snap-election Jun 24 2018 inaugurating new system. Popularity: AKP 49.8%
  in Jun-2011, 40.9% Jun-2015, 49.5% Nov-2015, 42.6% Jun-2018; Erdoğan 52.6%
  in 2018 first-round presidential. Coherence: a single programme of
  centralising economic command, blunting checks, and running high credit
  growth to maintain mass support while remaking the constitutional order.
policies:
  - tr_gezi_protest_crackdown_2013
  - tr_kgf_credit_guarantee_expansion_2017
  - tr_ohal_state_of_emergency_2016_2018
  - tr_constitutional_referendum_executive_presidency_2017
  - tr_post_coup_judicial_purge_2016_2018
axes_summary:
  - {axis: institutional.judicial_independence, direction: "-", magnitude: strong, rationale: "Post-coup HSK restructuring 2017; ~4,000 judges/prosecutors dismissed under OHAL decrees."}
  - {axis: institutional.rule_of_law, direction: "-", magnitude: strong, rationale: "OHAL decree-law governance 2016-2018; ~150,000 public-sector dismissals by KHK."}
  - {axis: regulatory.product_market_competition, direction: "-", magnitude: moderate, rationale: "State-linked contracting in mega-projects; TMSF trusteeship of seized firms post-2016."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "KGF expansion 2017 functionally a contingent-liability subsidy to credit-demanding sectors."}
  - {axis: monetary.central_bank_independence, direction: "-", magnitude: moderate, rationale: "Political pressure on CBRT escalated from 2013; full capture arrives in the subsequent phase."}
outcome_hypotheses: [central_bank_independence_and_inflation_anchoring]

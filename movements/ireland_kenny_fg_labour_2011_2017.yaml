movement_id: ireland_kenny_fg_labour_2011_2017
status: candidate
name: "Kenny Fine Gael-Labour and FG-minority bailout-exit governments 2011-2017"
countries: [IRL]
timeframe: {start: 2011, end: 2017, enacted_date: "2011-03-09"}
coalition: "Fine Gael + Labour (2011-2016); Fine Gael minority + independents + FF confidence-and-supply (2016-2017)"
leaders:
  - "Enda Kenny (Taoiseach)"
  - "Michael Noonan (Finance Minister)"
  - "Eamon Gilmore / Joan Burton (Labour, Tánaiste)"
doctrine: >
  Post-bailout recovery government implementing remaining troika programme
  and executing clean exit. Economic school: centre-right Fine Gael with
  Labour partner, blending orthodox consolidation and selective public-service
  protection with a deliberate investment-climate / corporate-tax defence.
  Signature actions: programme-exit Dec 15 2013 (first euro-area bailout
  exit); Anglo Irish Bank promissory-note restructuring (Feb 2013, IBRC
  liquidation exchanging €25bn promissory notes for long-dated government
  bonds, effectively monetised via ECB acceptance); corporate-tax 12.5%
  defence through BEPS/Double-Irish discussions (phased out 2015-2020);
  'water charges' controversy — metering introduced 2014, suspended Jul 2016
  after mass protests and 2016 election pushback; Troika 'excellence-in-
  implementation' budgets 2011-2015; Action Plan for Jobs; Strategic Banking
  Corporation of Ireland (2014); Central Bank Macroprudential LTI/LTV caps
  (Feb 2015). Post Feb 2016 election FG formed minority with FF confidence-
  and-supply (May 2016, 'New Politics'). Left-right: centre-right.
  Popularity: FG+Labour 55.9% / 113 seats 2011; 2016 election FG 25.5% /
  50 seats, Labour collapsed to 6.6% / 7 seats; 2016 FG minority held until
  Kenny handed to Varadkar Jun 2017. Coherence: high on bailout exit and
  fiscal trajectory; lower on water-charges regime reversal.
policies:
  - ie_promissory_note_restructuring_2013
  - ie_bailout_exit_2013
  - ie_water_charges_introduction_suspension_2014_2016
  - ie_macroprudential_mortgage_caps_2015
  - ie_corporate_tax_beps_defence_2013_2017
axes_summary:
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Residual troika consolidation 2011-2014; deficit from 32.1% (2010 incl. bank costs) to 0.5% GDP 2016."}

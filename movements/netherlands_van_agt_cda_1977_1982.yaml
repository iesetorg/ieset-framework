# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: netherlands_van_agt_cda_1977_1982
status: candidate
name: "Van Agt CDA-led cabinets (Netherlands): Bestek '81 consolidation attempts"
countries: [NLD]
timeframe: {start: 1977, end: 1982}
coalition: "CDA-VVD (Van Agt I, 1977-1981); CDA-PvdA-D66 (Van Agt II, 1981-1982); CDA-D66 minority (Van Agt III, 1982)"
leaders:
  - "Dries van Agt (PM, 19 December 1977 - 4 November 1982)"
  - "Frans Andriessen (Finance Minister 1977-1980, Bestek '81 architect)"
  - "Hans van der Stee / Fons van der Stee (Finance 1980-1981)"
  - "Jan Terlouw (D66, Economic Affairs 1981-1982)"
  - "Dr Ad Nooteboom (senior Finance Ministry)"
doctrine: >
  Pro-market Christian-democrat consolidation programme (Bestek '81)
  coinciding with the peak of 'Dutch disease' natural-gas-fuelled
  public-sector expansion. Economic school: Christian-democratic CDA
  (1980 merger of KVP, ARP, CHU) sociale markteconomie with supply-side
  consolidation tilt under Andriessen; Lubbers' later no-nonsense
  restructuring is foreshadowed here. Left-right axis: centre-right
  economically relative to Den Uyl's PvdA predecessor; Van Agt II with
  PvdA briefly pulled left. Key content: (i) Bestek '81 policy framework
  1978 — ambitious target to cap public-expenditure growth, freeze
  public-sector wages, cut transfer index; blocked repeatedly by CNV/
  FNV union resistance and coalition infighting; (ii) Wet Investeringsrekening
  (WIR) investment-credit reform from 1978 (capital grants for
  investment); (iii) natural-gas revenue cycle: Slochterveld revenue
  peak 1977-1982 fuelling current spending rather than savings (the
  canonical 'Dutch disease' case); (iv) disability scheme (WAO) caseload
  explosion — 400k (1978) → 700k (1982), used as de facto early-retirement
  route; (v) 1980 coronation of Beatrix April 1980, squatter riots
  Amsterdam; (vi) Iran / Afghanistan oil shock 1979-80 recession;
  (vii) unemployment rose from 5.5% (1979) to 11.7% (1982); (viii)
  public-sector pay negotiations repeatedly reopened despite Bestek.
  Popularity: 1977 election CDA 31.9% PvdA 33.8% (PvdA larger but CDA
  formed coalition); 1981 election CDA 30.8% PvdA 28.3% — Van Agt II
  formed with PvdA + D66 but collapsed in 1982 over defence spending;
  1982 election CDA 29.4% PvdA 30.4% (CDA slipped). Coherence: Bestek
  '81 was repeatedly undermined by coalition dynamics and union
  opposition; Van Agt's three cabinets failed to arrest the transfer-
  spending escalation that Lubbers then tackled decisively through the
  Wassenaar Agreement (November 1982). The movement illustrates the
  political difficulty of consolidation before a visible crisis.
policies:
  - nl_bestek_81_1978
  - nl_wet_investeringsrekening_1978
  - nl_wao_disability_expansion_1978_1982
  - nl_natural_gas_revenue_cycle_1977_1982
axes_summary:
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Bestek '81 consolidation largely failed to bite; spending share of GDP continued to rise."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: strong, rationale: "WAO caseload doubled; unemployment benefits widened; indexation preserved."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "WIR investment-credit grants extended."}
  - {axis: regulatory.labour_market_flexibility, direction: "0", rationale: "No structural EPL reform; union bargaining architecture intact."}
  - {axis: regulatory.energy_supply_security, direction: "+", magnitude: moderate, rationale: "Slochterveld peak extraction + Gasunie state monopoly."}
successor_movements: [netherlands_lubbers_cda_1982_1989]
position_alignments:
  - {position_id: christian_democratic, alignment: aligned}
  - {position_id: social_democratic, alignment: partially_aligned, notes: "Van Agt II PvdA phase only."}
  - {position_id: ordoliberal, alignment: partially_aligned, notes: "Bestek aspirations align but implementation did not."}
references:
  - "Nota 'Bestek '81: hoofdlijnen van het financieel en sociaal-economisch beleid voor de middellange termijn', June 1978"
  - "CPB Memorandum 1982 on Dutch disease revenue cycle"
  - "Dutch Election Studies 1977, 1981, 1982"
notes: "Pre-1996 sample extension. Van Agt era is the classic case of attempted but politically undeliverable consolidation preceding the Wassenaar Agreement Lubbers-era adjustment."

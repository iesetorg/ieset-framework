notes: >
  Short tenure (17 months) but load-bearing in Italian post-crisis
  political economy because the PNRR milestone structure binds
  successor governments (Meloni) to the reform path under pain of
  EU disbursement suspension. Analytical value: sharpest natural
  experiment since Monti 2011-2012 for testing whether external
  conditionality can substitute for domestic reform coalitions.

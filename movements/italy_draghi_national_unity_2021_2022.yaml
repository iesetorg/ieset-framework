movement_id: italy_draghi_national_unity_2021_2022
status: candidate
name: "Italy Draghi technocratic national unity government 2021-2022"
countries: [ITA]
timeframe:
  start: 2021
  end: 2022
  enacted_date: "2021-02-13"
coalition: "National unity government including PD, M5S, Lega, Forza Italia, Italia Viva, LeU — only FdI in opposition"
leaders:
  - "Mario Draghi (PM, ex-ECB President, ex-Banca d'Italia Governor)"
  - "Daniele Franco (Economy Minister, ex-Banca d'Italia Director General)"
  - "Marta Cartabia (Justice Minister, ex-Constitutional Court President)"
  - "Roberto Cingolani (Ecological Transition Minister)"
  - "Vittorio Colao (Innovation Minister, ex-Vodafone CEO)"
doctrine: >
  Technocratic orthodox supply-side reformism backed by NGEU (Next
  Generation EU) conditionality. The stated case: exploit the one-off
  €191.5bn Recovery and Resilience Facility envelope (€68.9bn grants +
  €122.6bn loans) to deliver long-deferred structural reforms in
  judicial process, public administration, competition policy,
  procurement, and tax administration that Italian politics had been
  unable to legislate under normal coalition dynamics. On the left-right
  axis the government sat centrist-technocratic: fiscal orthodoxy by
  European standards (with the Stability Pact suspended it emphasised
  forward credibility), explicitly pro-market on product-market
  competition and judicial efficiency, while preserving the headline
  COVID supports inherited from Conte II. Key policies with dates: PNRR
  (Piano Nazionale di Ripresa e Resilienza) approved by EU Council 13
  July 2021 with milestone-linked disbursements; Cartabia justice
  reforms — civil procedure (Law 206/2021) and penal procedure (Law
  134/2021) targeting 40% reduction in civil proceeding time and 25%
  in penal; annual Competition Law 2022 (Legge Concorrenza, Law
  118/2022) addressing local public services, port concessions, beach
  concessions (Bolkestein compliance partially deferred), taxis;
  windfall-tax on energy producers (Decreto Aiuti, March 2022 at 10%
  then raised to 25%); extension and partial redesign of Superbonus.
  Popularity: Draghi personal approval peaked ~65% mid-2021 after
  vaccination rollout acceleration; coalition held a ~90% Camera
  majority given opposition confined to FdI (which rose sharply in
  polling during the period, from ~7% in Feb 2021 to ~22% by mid-2022).
  September 2021 municipal elections saw centre-left recovery (Rome,
  Milan, Turin, Naples, Bologna to PD/centre-left); October 2021
  referenda low-turnout defeats. Government fell 21 July 2022 after
  M5S, Lega, and FI abstained on a confidence vote on the Decreto
  Aiuti, triggering early elections 25 September 2022. Coherence
  judgement: the most internally coherent Italian government of the
  post-2018 period, coded as orthodox supply-side reformism whose
  durability depends on post-2022 successor commitment to PNRR
  milestones.
policies:
  - italy_pnrr_2021
  - italy_cartabia_justice_reforms_2021
  - italy_legge_concorrenza_2022
  - italy_windfall_tax_energy_2022
  - italy_superbonus_110_2020

    direction: "+"
    magnitude: strong
    rationale: "PNRR disburses €191.5bn across green transition, digitalisation, infrastructure, education, health — largest sectoral-subsidy envelope in Italian peacetime."
  - axis: regulatory.product_market_competition
    direction: "+"
    magnitude: moderate
    rationale: "Legge Concorrenza 2022 + PNRR milestones on local public services and port concessions; beach-concession reform deferred under coalition pressure."
  - axis: institutional.judicial_independence
    direction: "+"
    magnitude: moderate
    rationale: "Cartabia reforms targeting proceeding times + CSM reform (Law 71/2022) addressing disciplinary and meritocratic appointments."
  - axis: institutional.rule_of_law
    direction: "+"
    magnitude: moderate
    rationale: "Procurement simplification + milestone-audited disbursement structure under NGEU raises institutional-quality floor conditional on implementation."
  - axis: regulatory.trade_openness
    direction: "+"
    magnitude: weak
    rationale: "Alignment with EU single-market Bolkestein enforcement partially achieved; Russia-gas diversification accelerated after February 2022."
  - axis: fiscal.tax_corporate
    direction: "+"
    magnitude: weak
    rationale: "Windfall tax on energy producers (10% → 25%) introduced March-May 2022 as temporary surcharge."

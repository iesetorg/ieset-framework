# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: japan_hashimoto_ldp_1996_1998
status: candidate
name: "Hashimoto LDP — Big Bang financial reform and Asian-crisis response (1996-1998)"
countries: [JPN]
timeframe:
  start: 1996
  end: 1998
  enacted_date: "1996-01-11"
coalition: "LDP-SDP-Sakigake coalition (Hashimoto I) then LDP single-party (Hashimoto II)"
leaders:
  - "Ryutaro Hashimoto (PM 11 Jan 1996 - 30 Jul 1998)"
  - "Hiroshi Mitsuzuka → Hikaru Matsunaga (Finance)"
  - "Yasuo Matsushita → Masaru Hayami (BoJ Governor, March 1998)"
doctrine: >
  LDP-reformist moderate — Hashimoto framed his administration as a
  "six-reform" programme: financial Big Bang, administrative reform,
  fiscal structural reform, economic-structure reform, social-security
  reform, and education reform. Economic school reads as conservative
  fiscal consolidation plus financial-market liberalisation (Anglo-
  Saxon Big Bang template) — centre-right LDP orthodoxy. Key policy
  content: (i) Financial System Reform Act (Big Bang) announced
  November 1996, phased to 2001 — removed Article 65 Glass-Steagall
  equivalent, liberalised forex (revised Forex Law effective April
  1998), opened securities commissions; (ii) Fiscal Structural Reform
  Act December 1997 setting binding deficit-reduction targets;
  (iii) consumption tax raised from 3% to 5% on 1 April 1997 — widely
  blamed for tipping Japan back into recession alongside the Asian
  crisis; (iv) Hokkaido Takushoku Bank and Yamaichi Securities failures
  November 1997 — first postwar failures of a city bank and a Big-Four
  broker; (v) ¥30tn financial-stabilisation package February 1998,
  Financial Supervisory Agency spun off from MoF June 1998 (operational
  from FY1998); (vi) New BoJ Law effective April 1998 granting formal
  operational independence for the first time since 1942. Popularity
  collapsed after 1997 tax hike and banking failures; LDP lost the
  July 1998 Upper House election, Hashimoto resigned. Coherence line:
  fiscal consolidation and financial liberalisation in the teeth of
  the Asian crisis — the canonical case of pro-cyclical tightening
  into a downturn.
policies:
  - jp_big_bang_financial_reform_1996
  - jp_consumption_tax_hike_1997
  - jp_new_boj_law_1998
  - jp_financial_stabilisation_package_1998
  - jp_fiscal_structural_reform_act_1997
axes_summary:
  - {axis: regulatory.financial_deregulation, direction: "-", magnitude: strong, rationale: "Big Bang dismantled Article 65 separation, liberalised forex, opened brokerage commissions — semantic '-' = looser financial regulation."}
  - {axis: fiscal.spending_level, direction: "-", magnitude: moderate, rationale: "Fiscal Structural Reform Act 1997 set binding deficit caps; supplementary budgets restrained until crisis forced reversal."}
  - {axis: fiscal.tax_progressivity, direction: "-", magnitude: weak, rationale: "Consumption tax hike from 3% to 5% shifted burden toward regressive indirect taxation."}
  - {axis: monetary.central_bank_independence, direction: "+", magnitude: strong, rationale: "New BoJ Law April 1998 ended MoF dominance, established formal operational independence."}
  - {axis: fiscal.sectoral_subsidy, direction: "+", magnitude: moderate, rationale: "¥30tn financial-stabilisation package February 1998 extended capital injection scheme for banks."}
position_alignments:
  - {position_id: classical_liberal, alignment: aligned, notes: "Big Bang liberalisation and BoJ independence are core deregulatory/rules-based moves."}
  - {position_id: austrian, alignment: partially_aligned, notes: "Fiscal consolidation welcomed; bank bailout opposed."}
  - {position_id: new_keynesian, alignment: opposed, notes: "Pro-cyclical consumption tax hike into Asian-crisis demand shock canonical counterexample."}
references:
  - "Financial System Reform Act, 1998"
  - "Revised Bank of Japan Act, effective 1 April 1998"
  - "Fiscal Structural Reform Act, November 1997"
  - "Cargill, Hutchison & Ito (1997), 'The Political Economy of Japanese Monetary Policy'"
notes: >
  Hashimoto's consumption-tax-hike-plus-banking-crisis cycle is the
  archetypal case Koo (2003) cites for balance-sheet recession
  dynamics. Draft status pending outcome-hypothesis linkage.

movement_id: italy_andreotti_forlani_dc_1976_1983
status: candidate
name: "Italy DC-dominated governments: Andreotti, Cossiga, Forlani, Spadolini, Fanfani V (1976-1983)"
countries: [ITA]
timeframe: {start: 1976, end: 1983}
coalition: "DC-led with variable partners — 1976-1979 'solidarietà nazionale' external PCI support; then DC-PSI-PSDI-PRI-PLI (pentapartito) from 1981"
leaders:
  - "Giulio Andreotti (PM 1976-1979, DC) — III, IV, V Andreotti governments"
  - "Francesco Cossiga (PM 1979-1980, DC)"
  - "Arnaldo Forlani (PM 1980-1981, DC)"
  - "Giovanni Spadolini (PM 1981-1982, PRI — first non-DC PM since 1945)"
  - "Amintore Fanfani (PM December 1982-August 1983, DC)"
  - "Beniamino Andreatta (Treasury Minister 1980-1982, architect of 'divorzio')"
  - "Ciriaco De Mita (DC Secretary from May 1982)"
  - "Paolo Baffi / Carlo Azeglio Ciampi (Banca d'Italia Governors)"
doctrine: >
  Late-first-Republic DC patronage-consensus phase under acute inflation,
  terrorism (brigate rosse), and fiscal pressure, culminating in the 1981
  Treasury-Bank of Italy 'divorzio'. Economic school: Italian Christian-
  democratic patronage-corporatism overlaid with emerging monetarist
  discipline from the Banca d'Italia-Treasury axis (Andreatta-Ciampi). Not
  coherent as one doctrine — the movement aggregates a series of fragile
  coalitions that shared inability to deliver structural reform while
  Banca d'Italia quietly built independent monetary authority. Left-right
  axis: centre — DC centrist patronage with left-leaning 1976-1979 phase
  (solidarietà nazionale with PCI abstention) and rightward-drift 1980-1983
  under pentapartito. Key content: (i) 1976 scala mobile renegotiated to
  raise indexation thresholds (scala mobile pesante remained); (ii) EMS
  entry 13 March 1979 Italy in wider ±6% band; (iii) ENI corruption
  scandal 1979-1980 (petroli); (iv) P2 masonic lodge scandal May 1981
  bringing down Forlani; (v) 'divorzio' 12 February 1981 letter by
  Treasury Minister Andreatta to Banca d'Italia Governor Ciampi, ending
  Banca d'Italia's obligation to purchase unsold government paper at
  auction — de facto independence; (vi) public debt trajectory: debt/GDP
  55% (1976) → 70% (1983); (vii) accord Scotti 22 January 1983 between
  government, unions, and employers reducing scala mobile by 3 points,
  the first erosion of automatic indexation; (viii) Legge Visentini 1984
  preparation on tax reform (enacted later); (ix) Alto Adige/Südtirol
  autonomy package 1981. Popularity: 1976 election DC 38.7%, PCI 34.4%
  (peak PCI share); 1979 DC 38.3%, PCI 30.4%; 1983 DC 32.9% (worst result
  to date), PSI 11.4%, PCI 29.9%. The 1983 DC collapse ended the Andreotti-
  Forlani cycle and brought Craxi premiership August 1983. Coherence:
  fractured governance — five PMs in seven years, each coalition
  collapsing on scandal or internal faction fights; the one durable
  achievement (divorzio 1981) was technocratic and quietly executed by
  Andreatta-Ciampi rather than the political coalition.
policies:
  - italy_ems_entry_1979
  - italy_treasury_bankitalia_divorzio_1981
  - italy_accord_scotti_scala_mobile_1983
  - italy_alto_adige_autonomy_1981
  - italy_public_debt_trajectory_1976_1983

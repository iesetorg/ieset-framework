  - {axis: regulatory.labour_market_flexibility, direction: "+", magnitude: weak, rationale: "Accord Scotti 1983 first partial indexation cut."}
  - {axis: fiscal.transfer_expansion, direction: "+", magnitude: moderate, rationale: "Pension and disability expansion continued; public-sector employment growth."}
  - {axis: regulatory.trade_openness, direction: "+", magnitude: moderate, rationale: "EMS entry 1979 + integration pressures."}

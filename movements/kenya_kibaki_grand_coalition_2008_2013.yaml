# yaml-language-server: $schema=../schemas/movement.schema.json
movement_id: kenya_kibaki_grand_coalition_2008_2013
status: candidate
name: "Kibaki-Odinga grand-coalition government (Kenya)"
countries: [KEN]
timeframe:
  start: 2008
  end: 2013
  enacted_date: "2008-04-17"
coalition: "Grand Coalition: Party of National Unity (Kibaki, President) with Orange Democratic Movement (Odinga, Prime Minister) under National Accord post-PEV mediation"
leaders:
  - "Mwai Kibaki (President, PNU)"
  - "Raila Odinga (Prime Minister, ODM)"
  - "Uhuru Kenyatta (Deputy PM and Finance Minister 2009-2013)"
  - "Kofi Annan (AU-appointed mediator, National Accord 28 Feb 2008)"
  - "Njuguna Ndung'u (CBK Governor)"
doctrine: >
  Post-election-violence power-sharing coalition rewriting Kenya's
  constitutional-institutional foundations while launching Vision 2030
  long-horizon plan. Economic school: developmentalist Vision-2030
  structural transformation plus constitutional-institutional reformism
  under mediation constraints — Vision 2030 published Jun 2008 targeting
  middle-income status by 2030 via three pillars (economic, social,
  political); 2010 Constitution promulgated 27 Aug 2010 devolving power
  to 47 counties, entrenching Bill of Rights, and creating Supreme Court
  and independent offices; Kazi kwa Vijana youth-employment programme
  2009; mobile-money M-Pesa (launched 2007) regulatory accommodation and
  cross-border scaling under Safaricom-CBK framework. Dated policies:
  National Accord and Reconciliation Act 28 Feb 2008; Vision 2030 Jun 2008;
  Constitution of Kenya 2010 promulgated 27 Aug 2010; ICC indictments
  against Kenyatta and Ruto Mar 2011. Left-right: grand-coalition centrist
  developmentalism; Kibaki fiscally-orthodox, Odinga centre-left. Popularity:
  coalition formed under mediation not electoral win; 2010 constitutional
  referendum passed 68.6% in favour; Kenyatta-Ruto UhuRuto 2013 win
  validated Kibaki successor track. Coherence: moderate — constitutional
  reform pillar coherent and durable; economic pillar split across
  coalition partners with visible ministerial tension; Vision 2030
  implementation uneven.
policies:
  - ke_national_accord_2008
  - ke_constitution_of_kenya_2010
  - ke_vision_2030_launch_2008
  - ke_mpesa_scaling_regulation_2008_2013
axes_summary:
  - {axis: institutional.rule_of_law, direction: "+", magnitude: strong, rationale: "2010 Constitution enshrined Bill of Rights, devolution, Supreme Court, independent offices."}
  - {axis: institutional.judicial_independence, direction: "+", magnitude: strong, rationale: "Judicial vetting process and new Supreme Court established under 2010 Constitution."}
  - {axis: regulatory.financial_deregulation, direction: "+", magnitude: moderate, rationale: "CBK-enabled mobile-money framework allowed M-Pesa expansion outside bank-act constraints."}
  - {axis: fiscal.spending_level, direction: "+", magnitude: moderate, rationale: "Vision 2030 infrastructure pipeline and devolution transfers raised spending trajectory."}
  - {axis: regulatory.product_market_competition, direction: "+", magnitude: weak, rationale: "Competition Act 2010 modernised competition regime."}
outcome_hypotheses: [constitutional_reform_growth_effect, mobile_money_financial_inclusion]
predecessor_movements: [kenya_kibaki_narc_first_2002_2007]
successor_movements: [kenya_kenyatta_jubilee_2013_2022]
position_alignments:
  - {position_id: developmentalism, alignment: aligned, notes: "Vision 2030 long-horizon industrial-social transformation plan."}
  - {position_id: classical_liberal, alignment: partially_aligned, notes: "Competition Act 2010 and financial-sector opening."}
references:
  - "Constitution of Kenya (27 Aug 2010)"
  - "National Accord and Reconciliation Act 2008"
  - "Government of Kenya, Kenya Vision 2030 (2007 launch document)"
  - "Waki Commission Report on post-election violence (Oct 2008)"
notes: "Coexists with kenya_kibaki_vision_2030_2002_2013 umbrella movement; this entry scopes the 2008-2013 coalition phase specifically."

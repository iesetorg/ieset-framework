movement_id: turkey_erbakan_refah_1996_1997
status: candidate
name: "Erbakan Refah coalition — Islamist government cut short by 28 February 1997 postmodern coup"
countries: [TUR]
timeframe: {start: 1996, end: 1997}
coalition: "Refah (Welfare Party) — DYP (True Path Party) coalition (Refahyol)"
leaders:
  - "Necmettin Erbakan (Prime Minister 28 June 1996 - 30 June 1997)"
  - "Tansu Çiller (Deputy PM and Foreign Minister)"
  - "Abdüllatif Şener (State Minister for Treasury-adjacent affairs)"
doctrine: >
  Economic school: Islamist-populist with 'Just Order' (Adil Düzen)
  rhetoric — rent-redistribution through religious-charitable networks,
  closer ties to Muslim world (D-8 Developing Eight group founded
  June 1997), resistance to IMF conditionalities. Left-right axis:
  right on social-cultural axis, populist-heterodox on economics.
  Dated policies: D-8 founding 15 June 1997 (Turkey, Iran, Pakistan,
  Bangladesh, Malaysia, Indonesia, Egypt, Nigeria); Libya visit
  October 1996 and Iran gas deal August 1996 ($23bn over 23 years);
  expansion of public-sector wages and retirement-age reductions;
  resistance to customs-union deepening with EU. Popularity: 21.4%
  December 1995 election plurality; June 1997 MGK 'National Security
  Council' 18-point memorandum forced Erbakan's resignation ("postmodern
  coup" 28 February 1997). Refah closed by Constitutional Court
  January 1998. Coherence: low — economic programme was more
  rhetorical than legislated; coalition collapsed on secularist
  backlash before structural measures took effect.

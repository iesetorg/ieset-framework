# Cloudflare Workers Static Assets — IESET public platform
#
# Modern Cloudflare Workers + Pages-Static-Assets unified config.
# Build command (set in Cloudflare dashboard):
#   cd web && npm install && npm run build
# Output dir picked up via [assets] below.
#
# The site is a fully static export (Next.js output: 'export'). Every
# dynamic route (/h/[id], /p/[id], /m/[id], /pos/[id], /a/[id], /c/[id],
# /country/[iso3]) is pre-rendered at build time via generateStaticParams.
# No Worker compute is invoked at request time — pure edge static serving.

name = "ieset-framework1"
compatibility_date = "2026-04-29"

[assets]
directory = "./web/out"
not_found_handling = "404-page"
